translation:
  language: es
  text: Pero si tu hermano no está cerca de ti[a], y no lo conoces[b], entonces lo llevarás a tu casa, y permanecerá contigo hasta que tu hermano lo busque; entonces se lo devolverás[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'tu hermano' probablemente se refiere en sentido amplio a un miembro del pueblo del pacto, no solo a un hermano biológico.
    reason: cultural_note
  - marker: b
    text: 'O: ''no sabes de quién es''; literalmente, ''no lo conoces''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''se lo restituirás''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compañero de pacto
  - tu compatriota
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del hebreo, como en la POB inglesa. En este contexto legal puede abarcar ampliamente a un miembro de la comunidad del pacto, pero el texto no fuerza una neutralización más abstracta.
- source_word: קָרוֹב אֵלֶיךָ
  english_pob_choice: is not near you
  chosen_spanish: no está cerca de ti
  alternatives_spanish:
  - no está próximo a ti
  - no vive cerca de ti
  lexicon: HALOT
  rationale: El sentido es proximidad física; en español natural, 'no está cerca de ti' comunica bien la idea sin añadir matices de residencia.
- source_word: וְלֹא יְדַעְתּוֹ
  english_pob_choice: you do not know him
  chosen_spanish: no lo conoces
  alternatives_spanish:
  - no sabes quién es
  - no reconoces a quien es
  lexicon: HALOT
  rationale: Se mantiene la referencia personal que conserva la gramática hebrea, aunque el contexto indica que el desconocimiento se refiere al dueño o poseedor de lo perdido.
- source_word: וַאֲסַפְתּוֹ
  english_pob_choice: you shall bring it in
  chosen_spanish: lo llevarás
  alternatives_spanish:
  - lo recogerás
  - lo meterás
  lexicon: HALOT
  rationale: El verbo expresa recoger/traer hacia adentro; en español, 'lo llevarás a tu casa' es más natural y conserva el movimiento exigido por el siguiente sintagma.
- source_word: אֶל תּוֹךְ בֵּיתֶךָ
  english_pob_choice: into your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - dentro de tu casa
  - en tu casa
  lexicon: HALOT
  rationale: '''A tu casa'' funciona bien con el verbo de movimiento implícito en español y evita una construcción pesada.'
- source_word: וְהָיָה עִמְּךָ
  english_pob_choice: it shall remain with you
  chosen_spanish: permanecerá contigo
  alternatives_spanish:
  - estará contigo
  - quedará contigo
  lexicon: HALOT
  rationale: Se conserva el valor durativo de la cláusula; 'permanecerá contigo' refleja el estado continuo mejor que una simple copulación.
- source_word: עַד דְּרֹשׁ אָחִיךָ אֹתוֹ
  english_pob_choice: until your brother seeks it
  chosen_spanish: hasta que tu hermano lo busque
  alternatives_spanish:
  - hasta que tu hermano lo reclame
  - hasta que tu hermano lo pregunte
  lexicon: HALOT
  rationale: דָּרַשׁ aquí puede significar buscar, reclamar o inquirir por algo perdido; 'lo busque' preserva esa amplitud y suena natural en español.
- source_word: וַהֲשֵׁבֹתוֹ לוֹ
  english_pob_choice: then you shall restore it to him
  chosen_spanish: entonces se lo devolverás
  alternatives_spanish:
  - entonces lo restituirás
  - entonces se lo restituirás
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver; 'devolver' es la opción española más natural en contexto jurídico. 'Restituir' sería más formal, pero menos inmediato.
theological_decisions:
- issue: Alcance de 'tu hermano' en ley del pacto
  english_pob_reading: Hebrew 'your brother' likely refers broadly to a fellow member of the covenant community, not only a biological brother.
  chosen_spanish_reading: '''Tu hermano'' se conserva literalmente, con el alcance comunitario implícito en la ley.'
  alternative_spanish_readings:
  - '''tu compatriota'''
  - '''tu compañero de pacto'''
  rationale: El hebreo usa lenguaje de parentesco; la POB inglesa retiene esa forma y solo aclara su alcance en nota. El español debe mantener la tensión entre literalidad y uso comunitario sin reemplazarla por un término más interpretativo.
  doctrine_reference: Éxodo 23:4; Levítico 19:18
- issue: Valor de 'no lo conoces'
  english_pob_reading: Or 'you do not know whose it is'; literally, 'you do not know him.'
  chosen_spanish_reading: '''No lo conoces'' mantiene el pronombre directo, con posibilidad contextual de entender ''de quién es''.'
  alternative_spanish_readings:
  - '''no sabes de quién es'''
  - '''no reconoces a su dueño'''
  rationale: La POB documenta la ambigüedad entre desconocer a la persona y no saber de quién es la propiedad. El español debe dejar visible esa tensión; por eso se evita una paráfrasis demasiado explícita en el texto principal.
  doctrine_reference: Deuteronomio 22:1-4
- issue: Verbo final de restitución
  english_pob_reading: Or 'return it to him.'
  chosen_spanish_reading: '''Se lo devolverás'''
  alternative_spanish_readings:
  - '''se lo restituirás'''
  - '''lo devolverás a él'''
  rationale: El hebreo pide hacer volver el objeto a su dueño. 'Devolver' conserva el valor legal y es plenamente inteligible; 'restituir' queda como alternativa más formal.
  doctrine_reference: Éxodo 23:4; Deuteronomio 22:1-3
translation_notes:
  revision_awareness: 'La fuente hebrea y la POB inglesa coinciden en la estructura legal: proximidad, desconocimiento, resguardo en casa, espera hasta el reclamo y restitución. La revisión inglesa reciente solo ajustó la naturalidad de ''not near you''; el español adopta una formulación igualmente natural sin alterar el sentido. No hay divergencias textuales relevantes en el pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'tu hermano' por coherencia con la terminología de parentesco del pacto en Deuteronomio.
  - Se usa 'devolver' en lugar de 'restituir' en el texto principal por claridad natural, pero se preserva la alternativa en nota.
  - Se evita 'SEÑOR' y otros sustitutos porque este versículo no contiene el nombre divino.
  - Se conserva el pronombre directo 'lo' para reflejar la ambigüedad gramatical del hebreo, con nota explicativa.
