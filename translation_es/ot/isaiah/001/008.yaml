translation:
  language: es
  text: Y la hija de Sión[a] queda como una choza en una viña, como una cabaña en un campo de pepinos[b], como una ciudad sitiada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la hija de Sión». La expresión hebrea personifica a Sión/Jerusalén como una hija.
    reason: lexical_alternative
  - marker: b
    text: O «campo de melones» o «campo de calabazas». El término hebreo puede referirse de manera más amplia a una plantación de cucurbitáceas o de cultivos similares.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente «como una ciudad guardada», aunque «ciudad sitiada» encaja mejor con el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנוֹתְרָה
  english_pob_choice: And ... is left
  chosen_spanish: queda
  alternatives_spanish:
  - permanece
  - es dejada
  lexicon: HALOT
  rationale: El nifal de נותר expresa quedar/ser dejado después de la devastación. «Queda» es natural en español y conserva la idea de supervivencia residual sin añadir énfasis innecesario.
- source_word: בַת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: la hija de Sion
  alternatives_spanish:
  - hija Sion
  - la hija de Sion
  lexicon: HALOT
  rationale: Se preserva la personificación profética. «Hija de Sion» reproduce con fidelidad el constructo hebreo y mantiene la imagen poética, en vez de sustituirla por «Jerusalén» en el texto principal.
- source_word: כְּסֻכָּה
  english_pob_choice: like a shelter
  chosen_spanish: como una choza
  alternatives_spanish:
  - como una cabaña
  - como un refugio
  lexicon: HALOT
  rationale: סֻכָּה designa una estructura temporal y frágil. «Choza» comunica esa precariedad de forma natural en español; «cabaña» queda como alternativa cercana.
- source_word: בְכָרֶם
  english_pob_choice: in a vineyard
  chosen_spanish: en una viña
  alternatives_spanish:
  - en un viñedo
  lexicon: HALOT
  rationale: El singular hebreo se conserva. «Viña» es un equivalente directo, breve y adecuado al paralelismo poético.
- source_word: כִּמְלוּנָה
  english_pob_choice: like a hut
  chosen_spanish: como una cabaña
  alternatives_spanish:
  - como una choza
  - como un cobertizo temporal
  lexicon: HALOT
  rationale: מְלוּנָה refiere a un albergue temporal en el campo. «Cabaña» ofrece un paralelo natural con «choza» y mantiene la idea de provisionalidad.
- source_word: בְמִקְשָׁה
  english_pob_choice: in a cucumber field
  chosen_spanish: en un campo de pepinos
  alternatives_spanish:
  - en un campo de melones
  - en un campo de calabazas
  lexicon: HALOT
  rationale: מִקְשָׁה puede designar un cultivo de pepinos, melones o gourds. Se conserva una opción concreta y comprensible en español, dejando abiertas las variantes botánicas que el hebreo permite.
- source_word: כְּעִיר נְצוּרָה
  english_pob_choice: like a besieged city
  chosen_spanish: como una ciudad sitiada
  alternatives_spanish:
  - como una ciudad guardada
  - como una ciudad vigilada
  lexicon: HALOT
  rationale: En este contexto de juicio, la lectura de «asediada/sitiada» es la que mejor encaja. «Sitiada» mantiene la fuerza del participio pasivo y el contraste con las imágenes rurales anteriores.
theological_decisions:
- issue: Personificación de Sion
  english_pob_reading: daughter Zion
  chosen_spanish_reading: la hija de Sion
  alternative_spanish_readings:
  - Sion
  - Jerusalén
  - el pueblo de Sion
  rationale: Se conserva la personificación profética sin reducirla interpretativamente. Esto respeta el género poético y la textura teológica del texto hebreo.
  doctrine_reference: Principio de primacía del texto original y preservación de la personificación profética.
- issue: Lectura de la imagen final
  english_pob_reading: besieged city
  chosen_spanish_reading: ciudad sitiada
  alternative_spanish_readings:
  - ciudad guardada
  - ciudad vigilada
  rationale: La progresión de imágenes describe desamparo y juicio; «sitiada» expresa mejor ese contexto que opciones más neutras como «guardada».
  doctrine_reference: Contexto profético de juicio en Isaías 1.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC con el audit trail inglés y no se requirieron revisiones adicionales; la redacción española conserva la personificación de Sion, la secuencia de imágenes agrícolas y urbanas, y la ambigüedad léxica del campo cultivado mediante nota.
  spanish_consistency_notes:
  - Se usa «Sion» sin tilde por consistencia bíblica en español.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton.
  - «Sitiada» se mantiene como término de mayor fuerza contextual que «guardada».
  - Las notas al pie preservan las alternativas documentadas por el audit trail inglés sin sobreinterpretar el hebreo.
