base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/029.yaml
  text: In his days Pharaoh Neco king of Egypt went up against the king of Assyria to the Euphrates River[a]. And King Josiah went to meet him[c][b], and he killed him at Megiddo when he saw him.
  footnotes:
  - marker: a
    text: Hebrew Neco; traditionally, Necho.
    reason: lexical_alternative
  - marker: b
    text: Or, more explicitly by interpretation, 'Pharaoh Neco killed him at Megiddo when Josiah went to meet him.' The Hebrew uses ambiguous third-person pronouns.
    reason: alternative_reading
  - marker: c
    text: See also 2 Chronicles 35:20–24 for the parallel account of Josiah's death.
    reason: cross_reference
