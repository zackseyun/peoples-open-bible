translation:
  language: es
  text: 'Después de esto[a], David consultó a Yahvé, diciendo: «¿Subiré a una de las ciudades de Judá?» Yahvé le respondió: «Sube». Entonces David dijo: «¿Adónde subiré?» Y él dijo: «A Hebrón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego de esto
  - Después
  lexicon: HALOT
  rationale: La fórmula narrativa indica transición temporal. «Después de esto» conserva el valor secuencial sin volverse rígido ni añadir explicación que no está en el hebreo.
- source_word: וַיִּשְׁאַל ... בַּיהוָה
  english_pob_choice: inquired of Yahweh
  chosen_spanish: consultó a Yahvé
  alternatives_spanish:
  - preguntó a Yahvé
  - inquirió de Yahvé
  lexicon: HALOT
  rationale: שׁאל con ב + el nombre divino expresa búsqueda de guía, no mera pregunta. «Consultó» comunica bien esa idea en español bíblico moderno; «inquirió de» sería más literal pero menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del POB en español de usar «Yahvé» para el Tetragrama, manteniendo el nombre divino y evitando la sustitución por título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Funciona como introducción al contenido del discurso. «Diciendo» refleja la función discursiva sin sobretraducir.
- source_word: הַאֶעֱלֶה
  english_pob_choice: Shall I go up
  chosen_spanish: ¿Subiré?
  alternatives_spanish:
  - ¿Debo subir?
  - ¿He de subir?
  lexicon: HALOT
  rationale: El verbo עלה conserva su valor direccional. En español, la pregunta directa en primera persona con futuro simple expresa bien la duda consultiva y mantiene la repetición verbal con la respuesta.
- source_word: בְּאַחַת עָרֵי יְהוּדָה
  english_pob_choice: into one of the cities of Judah
  chosen_spanish: a una de las ciudades de Judá
  alternatives_spanish:
  - hacia una de las ciudades de Judá
  - en una de las ciudades de Judá
  lexicon: HALOT
  rationale: La construcción indica movimiento hacia una ciudad dentro de Judá. «A una de las ciudades de Judá» es natural en español y no fuerza un matiz de interioridad que el hebreo no exige explícitamente.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Sube allá
  - Ve
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica de עלה con un imperativo breve y natural. «Sube» preserva el eco de la pregunta anterior.
- source_word: אָנָה
  english_pob_choice: Where
  chosen_spanish: ¿Adónde?
  alternatives_spanish:
  - ¿Dónde?
  - ¿Hacia dónde?
  lexicon: HALOT
  rationale: Aquí el sentido es direccional, de destino. «¿Adónde?» comunica mejor la pregunta que «¿Dónde?».
- source_word: חֶבְרֹנָה
  english_pob_choice: To Hebron
  chosen_spanish: A Hebrón
  alternatives_spanish:
  - Hacia Hebrón
  - Para Hebrón
  lexicon: HALOT
  rationale: El sufijo direccional del hebreo se expresa en español con la preposición «a». El nombre propio se adapta a la forma castellana habitual «Hebrón».
theological_decisions:
- issue: Nombre divino יְהוָה en diálogo directo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto, como pide la línea editorial del POB, en vez de sustituirlo por un título. Esto mantiene visible la referencia al Tetragrama en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audio del POB en inglés muestra una traducción ya asentada y sin revisiones aplicadas. La versión española sigue esa lectura, adaptando las decisiones léxicas al sistema terminológico del POB en español y manteniendo el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - 'Se mantuvo la repetición de עלה con dos soluciones coherentes: «Subiré» / «Sube» / «A Hebrón».'
  - Se evitó la forma tradicional «el SEÑOR» para YHWH conforme al criterio doctrinal del proyecto.
  - El estilo es narrativo y bíblico, pero con sintaxis española natural y comprensible.
