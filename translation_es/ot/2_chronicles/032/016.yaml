translation:
  language: es
  text: Y además hablaron sus siervos contra[a] Yahvé Dios y contra su siervo Ezequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «acerca de»; sin embargo, el contexto de burla y desafío favorece «contra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  english_pob_choice: And further
  chosen_spanish: Y siguieron
  alternatives_spanish:
  - Y además
  - Y hablaron de nuevo
  - Y otra vez
  lexicon: HALOT
  rationale: El adverbio añade continuidad y escalada a la acción anterior. En español, 'siguieron' comunica bien la prolongación de la խոս. 'Y siguieron' conserva el avance narrativo sin sonar rígido.
- source_word: דִּבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablando
  alternatives_spanish:
  - hablaron
  - dijeron
  - pronunciaron
  lexicon: HALOT
  rationale: El verbo דבר en piel suele expresar 'hablar'. En esta construcción, el gerundio 'hablando' fluye de manera natural con 'siguieron' y mantiene el sentido de discurso continuado.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  - sus oficiales
  lexicon: HALOT
  rationale: En este contexto real, el término señala a los agentes del rey asirio. 'Siervos' conserva la amplitud semántica de עבד sin imponer la dureza de 'esclavos' ni restringir indebidamente a 'oficiales'.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Con דבר, עַל puede ser neutro ('acerca de') o adversativo ('contra'). El contexto hostil favorece claramente el sentido adversativo, por eso se traduce 'contra'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración siguiendo la política del proyecto. 'Yahvé' es la forma estándar en español para el Tetragrámaton y evita la sustitución por un título.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El sustantivo con artículo forma una expresión divina appositiva junto con el nombre Yahvé. En español, 'Dios' reproduce con naturalidad ese título sin necesidad de duplicar el artículo.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: HALOT
  rationale: Se usa la forma bíblica española establecida para el nombre propio, que es plenamente reconocible y fiel a la tradición textual en español.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su servidor
  - su esclavo
  lexicon: HALOT
  rationale: Aquí עבד se aplica a Ezequías en relación con Yahvé, un designación teológica y de lealtad. 'Siervo' preserva mejor ese matiz que 'esclavo', que sería demasiado fuerte en español.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino en español, evitando la sustitución litúrgica por 'SEÑOR' para mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de Ezequías con Yahvé
  english_pob_reading: his servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - su esclavo
  rationale: La referencia a Ezequías como 'siervo' expresa una relación de servicio fiel y de estatus pactal. 'Esclavo' comunicaría una dureza social que no es necesaria aquí y podría deformar el matiz teológico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms principle for servant/slave context-dependence
translation_notes:
  revision_awareness: 'El original hebreo presenta la repetición de עַל con dos objetos: Yahvé Dios y Ezequías. La lectura inglesa POB opta por el sentido hostil ''against''; esta versión española mantiene esa decisión con ''contra'' y conserva la referencia al nombre divino Yahvé. No se requieren revisiones adicionales respecto del estado auditado más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton en todo el versículo.
  - '''Siervo'' se usa para עבד tanto en referencia a los servidores del rey asirio como a Ezequías, pero con notas de contexto distintas.'
  - La estructura verbal 'siguieron hablando' busca naturalidad española sin perder la continuación intensiva del hebreo.
  - Se evita 'el SEÑOR' o 'el Señor' para no ocultar el nombre divino presente en el texto fuente.
