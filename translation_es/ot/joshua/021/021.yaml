translation:
  language: es
  text: Les dieron Siquem con sus tierras de pasto en la región montañosa de Efraín[b], la ciudad de refugio para el homicida[a], y Gezer con sus tierras de pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ciudad de refugio para el que mató». El término legal hebreo se refiere a quien ha causado una muerte y puede huir en busca de asilo mientras se determina su caso, no necesariamente a un asesino condenado.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «monte de Efraín»; es decir, la región montañosa de Efraín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: They gave
  chosen_spanish: Les dieron
  alternatives_spanish:
  - Y les dieron
  - Dieron
  lexicon: HALOT
  rationale: El wayyiqtol narra acción consecutiva en pasado. En español, «Les dieron» conserva el sentido narrativo sin forzar una conjunción inicial innecesaria.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les
  lexicon: HALOT
  rationale: Pronombre de objeto indirecto natural en español para los destinatarios del reparto territorial.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  english_pob_choice: the city of refuge for the manslayer
  chosen_spanish: la ciudad de refugio para el homicida
  alternatives_spanish:
  - la ciudad de refugio para el matador
  - la ciudad de refugio para el asesino
  lexicon: HALOT
  rationale: El sintagma legal hebreo describe a quien ha causado una muerte y puede buscar asilo. «Homicida» preserva la tensión legal sin afirmar automáticamente culpa de asesinato, aunque suena más fuerte que «manslayer» en inglés.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  - Siquem
  lexicon: HALOT
  rationale: Topónimo bíblico establecido en español; «Siquem» es la forma más reconocible y respetuosa del uso bíblico.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus pastos
  - sus pastizales
  - sus tierras pastoriles
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno abierto asociado a la ciudad para uso y pastoreo. «Tierras de pasto» comunica bien esa zona adjunta sin volverla demasiado técnica.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en el monte de Efraín
  - en la serranía de Efraín
  lexicon: HALOT
  rationale: El hebreo usa «montaña/monte» como designación regional. En español, «región montañosa» transmite mejor el valor geográfico colectivo que un monte aislado.
- source_word: גֶּזֶר
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  alternatives_spanish:
  - Guézer
  lexicon: HALOT
  rationale: Topónimo conservado en transliteración estándar; se mantiene la forma usada habitualmente en traducciones bíblicas en español.
theological_decisions:
- issue: Título legal de la persona que busca asilo
  english_pob_reading: the city of refuge for the manslayer
  chosen_spanish_reading: la ciudad de refugio para el homicida
  alternative_spanish_readings:
  - la ciudad de refugio para el matador
  - la ciudad de refugio para el asesino
  rationale: La POB inglesa opta por un término que no carga necesariamente con la idea de asesinato condenado. En español, «homicida» conserva la referencia a la muerte causada y permite la misma tensión jurídica del pasaje, sin precisar más de lo que el hebreo legal exige.
  doctrine_reference: Números 35; Deuteronomio 19; Josué 20
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del texto inglés: las frases aposicionales van entre comas, no con guiones. Se mantuvo esa lectura en español con una estructura fluida y formal.'
  spanish_consistency_notes:
  - Se conservó el nombre propio «Siquem» y «Gezer» como topónimos bíblicos estables.
  - Se mantuvo «tierras de pasto» para reflejar de forma consistente מִגְרָשׁ en listas territoriales.
  - Se evitó «SEÑOR» y no aparece ninguna alusión al Tetragrámaton en este versículo.
  - La apposición «la ciudad de refugio para el homicida» sigue la puntuación de la revisión inglesa y queda integrada sin ruptura retórica.
