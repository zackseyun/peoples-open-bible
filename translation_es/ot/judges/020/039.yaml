    reason: lexical_alternative
  revision_rationale: Se ajustó el verbo de combate a «abatir» para reflejar mejor el sentido bélico de לְהַכּוֹת, se suavizó la frase de las bajas para un español más natural sin perder la aproximación numérica, se elevó levemente el registro con «ante nosotros», y se reemplazó la nota [b] por la alternativa lexical realmente documentada en la auditoría inglesa.
