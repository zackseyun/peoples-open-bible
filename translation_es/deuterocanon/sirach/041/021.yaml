review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue fielmente el hebreo ni la traza auditada inglesa en la primera frase. La fuente hebrea dice מהביט אל פני זרה, 'de mirar/al rostro de una mujer extraña/ajena', y el inglés POB revisado quedó en 'of looking at the face of a strange woman[a]'. El borrador cambia esto a 'de apartar la mirada', que invierte el sentido. La segunda frase 'de acercarse a su sirvienta' sí preserva adecuadamente ומהתקרב אל שפחתה, con una opción española natural.
  spanish_quality_summary: El español es legible y digno, pero el giro 'apartar la mirada' introduce un gesto evitativo no presente aquí y contradice el contexto de impropiedad visual. Además, conviene reflejar 'rostro/cara' porque tanto el hebreo אל פני como el griego προσώπου lo conservan concretamente. 'Sirvienta' es comprensible, aunque 'criada' o 'sirvienta' son ambas válidas; no exige cambio.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto. Sí hay un desajuste con la decisión léxica auditada: zara debe mantenerse en el texto principal como ''mujer extraña/ajena'' con nota, no resolverse como ''mujer casada'' en el texto principal tras la revisión inglesa. También debe mantenerse el matiz básico de ''mirar'' y no cambiarse por ''apartar la mirada''.'
  issues:
  - severity: high
    issue: La frase 'de apartar la mirada' invierte el sentido de la fuente.
    rationale: El hebreo מהביט y la auditoría inglesa apuntan a 'mirar', no a desviar la vista. El griego citado en el paquete incluye ἀποστροφῆς en otra línea textual, pero el segmento traducido en la traza POB para este hemistiquio conserva 'looking at the face'. El español actual contradice el sentido resultante.
  - severity: medium
    issue: '''una mujer casada'' en el texto principal no sigue la revisión auditada inglesa.'
    rationale: La traza inglesa fue revisada desde 'another man’s wife' a 'a strange woman' por precisión léxica, conservando la especificación del griego solo en nota. El español debería reflejar esa decisión y dejar 'mujer casada' como alternativa explicativa, no como texto base.
  - severity: medium
    issue: Se omite el elemento concreto 'rostro/cara'.
    rationale: אל פני y προσώπου están presentes en la evidencia fuente y en la decisión léxica inglesa. Incluir 'rostro' preserva mejor la imagen concreta sin sonar antinatural en español.
  revised_spanish_text: y de mirar el rostro de una mujer extraña[a], y de acercarse a su sirvienta.
  revised_footnotes:
