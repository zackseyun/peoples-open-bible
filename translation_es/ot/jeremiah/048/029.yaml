translation:
  language: es
  text: 'Hemos oído acerca del orgullo de Moab—es sumamente orgulloso[a]—: de su altivez, su orgullo, su arrogancia y la altivez de su corazón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hemos oído acerca del orgullo de Moab—muy orgulloso en verdad—: de su altivez, su orgullo, su arrogancia y la altivez de su corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַ֥עְנוּ
  english_pob_choice: We have heard
  chosen_spanish: Hemos oído
  alternatives_spanish:
  - Oímos
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una noticia ya conocida y asentada; en español, el pretérito perfecto compuesto mantiene esa actualidad del reporte sin volverlo narración pasada simple.
- source_word: גְאוֹן
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - altivez
  - majestad
  lexicon: HALOT
  rationale: En este contexto de juicio contra Moab, el término tiene carga negativa de arrogancia; 'orgullo' es natural en español y conserva el valor moral. 'Altivez' queda disponible para las repeticiones siguientes.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: Transliteration
  rationale: Se conserva el nombre propio por transliteración estándar.
- source_word: גֵּאֶ֣ה מְאֹ֑ד
  english_pob_choice: he is exceedingly proud
  chosen_spanish: es sumamente orgulloso
  alternatives_spanish:
  - es muy orgulloso
  - es extremadamente altivo
  lexicon: HALOT
  rationale: El hebreo intensifica el adjetivo con מאד. En español, una construcción copulativa resulta más natural que una repetición nominal; 'sumamente' reproduce bien la fuerza enfática.
- source_word: גָּבְהוֹ
  english_pob_choice: his loftiness
  chosen_spanish: su altivez
  alternatives_spanish:
  - su altura
  - su elevación
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar 'altura', aquí forma parte de una cadena de términos de soberbia; 'altivez' preserva el sentido moral y evita una lectura meramente física.
- source_word: וּגְאוֹנוֹ
  english_pob_choice: his pride
  chosen_spanish: su orgullo
  alternatives_spanish:
  - su majestad
  - su exaltación
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica para reflejar el amontonamiento retórico del hebreo, sin borrar la insistencia en la soberbia de Moab.
- source_word: וְגַאֲוָתוֹ
  english_pob_choice: his arrogance
  chosen_spanish: su arrogancia
  alternatives_spanish:
  - su insolencia
  - su orgullo
  lexicon: HALOT
  rationale: '''Arrogancia'' comunica de forma clara el matiz despectivo del término y evita suavizar la progresión de sinónimos.'
- source_word: וְרֻם לִבּוֹ
  english_pob_choice: the haughtiness of his heart
  chosen_spanish: la altivez de su corazón
  alternatives_spanish:
  - el orgullo de su corazón
  - su corazón altivo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la elevación de su corazón'; en español, 'altivez de su corazón' conserva la imagen antropológica del corazón como sede de la disposición interior y la tensión entre altura física y soberbia moral.
translation_notes:
  revision_awareness: 'La redacción sigue el tramo final del audit trail inglés: se distingue גָּבְהוֹ como ''altivez/loftiness'' y רֻם לִבּוֹ como ''altivez del corazón/haughtiness of his heart'', manteniendo la acumulación retórica de términos de soberbia sin fusionarlos en una sola idea.'
  spanish_consistency_notes:
  - Se preserva la repetición de vocabulario de soberbia para no desactivar el énfasis acumulativo del hebreo.
  - Se usa 'corazón' como sede interior, coherente con el uso bíblico habitual y con la decisión inglesa de mantener la imagen antropológica.
  - '''Hemos oído'' armoniza con un reporte profético ya recibido, no con una mera noticia puntual del pasado.'
