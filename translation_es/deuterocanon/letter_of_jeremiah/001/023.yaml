review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: el oro ornamental de los ídolos no brilla si no se le limpia la capa que lo opaca, y la cláusula final conserva la ironía antiidolátrica de que no percibían nada ni durante su fabricación. Sin embargo, «tizne» no representa bien ἰόν en este contexto de metal, y «se adornan» puede sonar demasiado reflexivo en español para imágenes inertes, cuando el sentido es que son adornados con oro.'
  spanish_quality_summary: El texto es legible, pero «tizne» sugiere hollín/ahumado más que empañamiento o corrosión metálica. «Para hermosura» es aceptable y digno. La frase final funciona, aunque «eran fundidos» es un poco menos preciso que «eran fundidas» si el referente son las imágenes; aun así, la mayor necesidad es mejorar la naturalidad y exactitud léxica del segmento sobre el oro y el ἰόν.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. La revisión propuesta mantiene fidelidad al campo semántico de ἰόν con «empañamiento» y evita un falso amigo semántico. También ajusta περιτίθενται a una forma pasiva más natural en español para ídolos: «con que son adornados».'
  issues:
  - severity: high
    issue: «tizne» para ἰόν
    rationale: ἰόν en metal se refiere a herrumbre/corrosión/empañamiento; «tizne» en español normalmente es hollín o mancha negra de humo, lo que desvía el sentido material del original y de la decisión inglesa revisada a «tarnish».
  - severity: medium
    issue: «se adornan» para περιτίθενται
    rationale: Aunque defendible, en español puede leerse como acción reflexiva de los ídolos («se adornan a sí mismos»). El contexto exige más claramente que otros los adornan con oro.
  - severity: low
    issue: Anclaje de nota dentro de la palabra
    rationale: El formato «[a]tizne[a]» no sigue la convención pedida; el marcador debe aparecer una sola vez en el punto relevante del texto.
  revised_spanish_text: Porque el oro con que son adornados para hermosura, si alguien no le quita el empañamiento[a], de ningún modo brillará; pues ni aun cuando eran fundidos se daban cuenta de ello.
  revised_footnotes:
