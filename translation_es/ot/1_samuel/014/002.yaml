revisions:
- from: Saúl estaba al borde de Gibeá[a], bajo el granado[b] que está en Migrón, y el pueblo que estaba con él era como seiscientos hombres.
  to: Saúl se encontraba en las afueras de Gibeá[a], bajo el granado[b] que está en Migrón, y el pueblo que estaba con él era de unos seiscientos hombres.
  rationale: Se ajustó ‘al borde de’ a ‘en las afueras de’ para reflejar mejor בִּקְצֵה en español idiomático y alinearse con la decisión auditada del POB. Se cambió ‘estaba’ por ‘se encontraba’ para expresar mejor la ubicación continuada implícita en יוֹשֵׁב. También se reemplazó ‘como seiscientos’ por ‘de unos seiscientos’ por mayor naturalidad, manteniendo el matiz aproximativo del prefijo כ.
