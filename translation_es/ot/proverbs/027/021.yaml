translation:
  language: es
  text: El crisol es para la plata, y el horno para el oro; y el hombre es probado por su alabanza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hombre es probado por lo que alaba»; alternativamente, «el hombre es probado por la alabanza que recibe».'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצְרֵף
  english_pob_choice: crucible
  chosen_spanish: crisol
  alternatives_spanish:
  - crucible
  - refinador
  lexicon: HALOT
  rationale: El término hebreo designa un recipiente para refinar metales. «Crisol» es el equivalente español natural y preciso; «crucible» suena menos idiomático en español y «refinador» desplaza el objeto al agente/proceso.
- source_word: לַכֶּסֶף
  english_pob_choice: for silver
  chosen_spanish: para la plata
  alternatives_spanish:
  - para plata
  - para la plata refinada
  lexicon: HALOT
  rationale: 'La preposición expresa finalidad o adecuación: el crisol sirve para trabajar la plata. En español, el artículo es natural y conserva la imagen metalúrgica.'
- source_word: כּוּר
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - furnace
  - fundición
  - horno de fundición
  lexicon: HALOT
  rationale: En este paralelismo sapiencial, «horno» comunica bien la idea de un recinto de calor intenso para trabajar metal. «Horno de fundición» es más explícito pero más pesado; «furnace» no es español.
- source_word: לַזָּהָב
  english_pob_choice: for gold
  chosen_spanish: para el oro
  alternatives_spanish:
  - para oro
  - para el oro refinado
  lexicon: HALOT
  rationale: Paralelo a la primera cola; la relación de finalidad se expresa con naturalidad en español mediante «para el oro».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo usa singular masculino genérico. «El hombre» mantiene el valor proverbial y la correspondencia de género gramatical sin neutralizar indebidamente el rasgo del texto.
- source_word: לְפִי
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - según
  - de acuerdo con
  - a la medida de
  lexicon: HALOT
  rationale: La expresión idiomática marca la norma o criterio por el que algo es evaluado. «Por» es la opción más breve y natural en español en esta construcción pasiva de prueba.
- source_word: מַהֲלָלוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - lo que alaba
  - la alabanza que recibe
  - su reputación
  lexicon: HALOT
  rationale: El sustantivo puede referirse a alabanza, elogio o aquello digno de elogio. «Su alabanza» conserva la ambigüedad del hebreo y permite leer tanto la alabanza que emite como la que recibe, sin resolver prematuramente el proverbio.
theological_decisions:
- issue: Ambigüedad interpretativa del último hemistiquio
  english_pob_reading: a man is tested by his praise
  chosen_spanish_reading: el hombre es probado por su alabanza
  alternative_spanish_readings:
  - el hombre es probado por lo que alaba
  - el hombre es probado por la alabanza que recibe
  rationale: El hebreo לְפִי מַהֲלָלוֹ es genuinamente ambiguo. La redacción principal en español conserva esa tensión con «su alabanza», evitando imponer una única interpretación y dejando abiertas las dos lecturas principales documentadas por el POB inglés.
  doctrine_reference: Translation philosophy §3 (preservar tensiones reales en lugar de resolverlas prematuramente)
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «refining pot» por «crucible» para mayor precisión; el español sigue esa actualización con «crisol», que es el equivalente más natural y técnico en español, manteniendo el paralelismo con «horno».
  spanish_consistency_notes:
  - 'Se preserva la imagen metalúrgica completa: crisol / oro / horno / plata.'
  - Se mantiene la ambigüedad de מַהֲלָלוֹ con una formulación española que no fuerza el sentido.
  - Se evitó «SEÑOR» o terminología teológica no pertinente, ya que el versículo es proverbial y no contiene el Nombre divino.
