base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/003/008.yaml
  text: And he tore down all their borders and cut down their sacred groves[a]; and it had been granted to him to destroy all the gods of the earth, so that all the nations might worship Nebuchadnezzar alone[c][b], and that all their languages and all their tribes might call on him as god.
