  language: en
  yaml_path: translation/ot/genesis/044/002.yaml
  text: And put my cup[a], the silver cup, in the mouth of the youngest one's sack, along with the silver for his grain purchase." And he did according to Joseph's word[b], which he had spoken.
  footnotes:
