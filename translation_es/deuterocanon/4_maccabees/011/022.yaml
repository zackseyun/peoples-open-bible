lexical_decisions:
- source_word: καλοκαγαθίᾳ
  english_pob_choice: with noble virtue
  chosen_spanish: con noble virtud
  alternatives_spanish:
  - con nobleza y bondad
  - con excelencia moral
  - con honor
  lexicon: LSJ
  rationale: El dativo expresa la cualidad con la que el hablante está “armado”. En español, “noble virtud” conserva la fuerza ética y elevada de καλοκαγαθία sin sonar técnico ni artificial. Mantiene además el paralelismo con el inglés POB sin depender mecánicamente de él.
- source_word: καθωπλισμένος
  english_pob_choice: armed
  chosen_spanish: armado
  alternatives_spanish:
  - equipado
  - plenamente armado
  lexicon: LSJ
  rationale: El participio conserva la metáfora bélica de estar provisto para la acción. “Armado” es natural en español y reproduce mejor la imagen que “equipado”, que debilita el matiz militar.
- source_word: τεθήσομαι
  english_pob_choice: will be laid to rest
  chosen_spanish: seré puesto a descansar
  alternatives_spanish:
  - seré puesto
  - seré colocado
  - seré sepultado
  lexicon: LSJ
  rationale: Es futuro pasivo de τίθημι. En este contexto martirial sugiere morir e ir a reunirse con los hermanos, con posible resonancia funeraria. “Seré puesto a descansar” mantiene la pasividad y la lectura orientada a la muerte sin cerrar indebidamente la ambigüedad del griego.
- source_word: κἀγώ
  english_pob_choice: I too
  chosen_spanish: Yo también
  alternatives_spanish:
  - también yo
  - aun yo
  lexicon: LSJ
  rationale: La crasis refuerza la inclusión enfática del hablante junto con sus hermanos. “Yo también” es la forma más natural en español y conserva esa solidaridad.
- source_word: μετὰ τῶν ἀδελφῶν μου
  english_pob_choice: with my brothers
  chosen_spanish: con mis hermanos
  alternatives_spanish:
  - entre mis hermanos
  - junto con mis hermanos
  lexicon: LSJ
  rationale: μετά con genitivo expresa acompañamiento. “Con mis hermanos” es fiel y fluido; dado el contexto de los siete hermanos, “hermanos” debe conservarse en masculino por referencia al grupo textual.
theological_decisions:
- issue: Sentido de τεθήσομαι en contexto de martirio y reunión con los hermanos
  english_pob_reading: 'A death/burial-oriented sense: ''will be laid to rest with my brothers'''
  chosen_spanish_reading: 'Lectura funeraria/martirial: ''seré puesto a descansar con mis hermanos'''
  alternative_spanish_readings:
  - seré puesto con mis hermanos
  - seré colocado con mis hermanos
  - seré sepultado con mis hermanos
  rationale: El contexto inmediato es la disposición del hablante a unirse a sus hermanos ya muertos como mártir. Por eso conviene una formulación que sugiera descanso/sepultura, pero sin eliminar la pasiva abierta del verbo griego ni convertirla en una paráfrasis demasiado explícita.
  doctrine_reference: Preservar la tensión contextual sin resolverla por completo; documentar el matiz funerario según el uso del pasivo griego.
translation_notes:
  revision_awareness: La redacción española sigue el estado revisado más reciente del audit trail inglés, que refinó 'will be laid down' a 'will be laid to rest' para un contexto funerario más natural, sin perder la pasividad de τεθήσομαι. Se conserva la tensión entre colocación general y sentido de muerte/entierro.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general solo cuando el nombre divino aparece; aquí no aplica.
  - Se mantiene 'hermanos' en masculino por el referente histórico-textual del grupo de los siete hermanos.
  - '''Armado'' conserva la metáfora militar del participio griego.'
  - La nota de 'noble virtud' responde a la decisión léxica documentada y evita sustituirla por un término eclesiástico más tradicional pero menos preciso.
