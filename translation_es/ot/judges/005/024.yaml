base_translation:
  language: en
  yaml_path: translation/ot/judges/005/024.yaml
  text: Most blessed among women is Jael[a], the wife of Heber the Kenite; among women in the tent[b], most blessed is she.
  footnotes:
  - marker: a
    text: Or 'Blessed above women is Jael … above the women in the tent.' The Hebrew uses a comparative construction that can be rendered either 'among' or 'above.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the tent.' This may idiomatically evoke women of the tent, that is, tent-dwelling women, but the Hebrew is singular.
    reason: cultural_note
