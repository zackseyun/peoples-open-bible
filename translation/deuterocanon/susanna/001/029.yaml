translation:
  text: And it happened on the next day[a], when the people had gathered to her husband Joakim, that the two elders came, full of their lawless intent against Susanna to put her to death, and they said before the people, “Send for Susanna daughter of Hilkiah, who is the wife of Joakim.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of lawless purpose' or 'filled with unlawful design.' The Greek emphasizes an inward plan or intention that is contrary to law.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ἐπαύριον
  chosen: on the next day
  alternatives:
  - the following day
  - on the morrow
  lexicon: LSJ
  rationale: A straightforward temporal expression. 'On the next day' is natural modern English and preserves the narrative sequence without archaism.
- source_word: συνῆλθεν
  chosen: had gathered
  alternatives:
  - came together
  - assembled
  lexicon: BDAG
  rationale: The aorist with ὡς introduces the circumstance of the scene. 'Had gathered' reads smoothly in English while preserving the collective assembling of the people.
- source_word: πρὸς τὸν ἄνδρα αὐτῆς Ἰωακείμ
  chosen: to her husband Joakim
  alternatives:
  - to Joakim her husband
  - before her husband Joakim
  lexicon: LSJ
  rationale: πρός with a person here indicates movement toward or gathering at Joakim. Rendering ἄνδρα as 'husband' makes explicit the marital relationship signaled by αὐτῆς and fits the legal-social setting.
- source_word: οἱ δύο πρεσβῦται
  chosen: the two elders
  alternatives:
  - the two old men
  lexicon: LSJ
  rationale: In context πρεσβῦται refers to office-bearing community elders, not merely aged men. 'Elders' preserves the judicial and social authority implied in the story.
- source_word: πλήρεις τῆς ἀνόμου ἐννοίας
  chosen: full of their lawless intent
  alternatives:
  - full of lawless purpose
  - filled with unlawful design
  - full of wicked intent
  lexicon: LSJ
  rationale: ἐννοία denotes thought, purpose, or intent; ἄνομος adds the sense of being contrary to law. 'Lawless intent' captures both the inward plan and its juridical perversity in a courtroom context.
- source_word: κατὰ Σουσάννης
  chosen: against Susanna
  alternatives:
  - concerning Susanna
  lexicon: BDAG
  rationale: 'κατά with the genitive here is adversative: their intent is directed against her. ''Against Susanna'' is the plain sense.'
- source_word: τοῦ θανατῶσαι αὐτήν
  chosen: to put her to death
  alternatives:
  - to kill her
  - that they might put her to death
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose or result. 'To put her to death' fits the legal setting better than the more general 'kill her'.
- source_word: Ἀποστείλατε ἐπὶ Σουσάνναν
  chosen: Send for Susanna
  alternatives:
  - Send to fetch Susanna
  - Send for Susanna here
  lexicon: LSJ
  rationale: The idiom means to dispatch someone to bring her. 'Send for' is concise, idiomatic English that preserves the summons.
- source_word: θυγατέρα Χελκίου
  chosen: daughter of Hilkiah
  lexicon: LSJ
  rationale: A standard patronymic identification. 'Hilkiah' is the conventional English transliteration of Χελκίου in biblical usage.
- source_word: ἥ ἐστιν γυνὴ Ἰωακείμ
  chosen: who is the wife of Joakim
  alternatives:
  - who is Joakim's wife
  lexicon: BDAG
  rationale: γυνή here clearly means 'wife,' not merely 'woman.' The relative clause identifies her formally in the public accusation scene.
