id: 2CH.20.10
reference: 2 Chronicles 20:10
source:
  edition: WLC
  text: וְ/עַתָּ֡ה הִנֵּה֩ בְנֵֽי עַמּ֨וֹן וּ/מוֹאָ֜ב וְ/הַר שֵׂעִ֗יר אֲ֠שֶׁר לֹֽא נָתַ֤תָּה לְ/יִשְׂרָאֵל֙ לָ/ב֣וֹא בָ/הֶ֔ם בְּ/בֹאָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם כִּ֛י סָ֥רוּ מֵ/עֲלֵי/הֶ֖ם וְ/לֹ֥א הִשְׁמִידֽוּ/ם־־־׃
translation:
  text: And now[a], behold, the people of Ammon and Moab and Mount Seir[b], whom you did not allow Israel to enter against when they came from the land of Egypt—for they turned away from them and did not destroy them—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites and Moabites and those of Mount Seir.' The Hebrew literally names 'the sons of Ammon and Moab and Mount Seir.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'whom you did not give Israel to enter into/against'; the sense in context is that God did not permit Israel to attack them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the present situation in light of the preceding prayer. 'And now' preserves the connective force of ו plus the temporal adverb.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the deictic/emphatic force of the Hebrew in elevated but still understandable English. It marks the immediacy of the complaint.
- source_word: בְנֵי עַמּוֹן
  chosen: the people of Ammon
  alternatives:
  - the Ammonites
  - the sons of Ammon
  lexicon: HALOT
  rationale: Literally 'sons of Ammon,' but in English this idiom refers to the national group. 'The people of Ammon' stays close to the Hebrew while remaining natural.
- source_word: מוֹאָב
  chosen: Moab
  alternatives:
  - the Moabites
  lexicon: HALOT
  rationale: Used in coordination with 'the people of Ammon' and 'Mount Seir.' The phrase as a whole names the hostile groups/territory; 'Moab' is a natural English rendering.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  lexicon: HALOT
  rationale: Standard rendering of the place name; preserves the geographic designation rather than converting it into an ethnic label.
- source_word: אֲשֶׁר לֹא נָתַתָּה לְיִשְׂרָאֵל לָבוֹא בָהֶם
  chosen: whom you did not allow Israel to invade
  alternatives:
  - which you did not give Israel to enter against
  - whom you did not permit Israel to enter
  lexicon: HALOT
  rationale: The idiom 'give to enter into/against them' means to permit military incursion. 'Allow ... to invade' expresses the sense clearly in context without wooden literalism.
- source_word: בְּבֹאָם מֵאֶרֶץ מִצְרָיִם
  chosen: when they came from the land of Egypt
  alternatives:
  - when they were coming from the land of Egypt
  - at their coming from the land of Egypt
  lexicon: HALOT
  rationale: Temporal infinitive construct with preposition; 'when they came' is idiomatic English and preserves the timing reference.
- source_word: כִּי סָרוּ מֵעֲלֵיהֶם
  chosen: for they turned away from them
  alternatives:
  - because they turned aside from them
  - for they departed from them
  lexicon: HALOT
  rationale: Refers to Israel's diverting their course rather than attacking these peoples. 'Turned away from them' best fits the narrative allusion.
- source_word: וְלֹא הִשְׁמִידוּם
  chosen: and did not destroy them
  alternatives:
  - and did not annihilate them
  lexicon: HALOT
  rationale: Hiphil of שׁמד commonly denotes destruction/devoted wiping out in warfare. 'Destroy' is the most natural and sufficiently strong English equivalent.
