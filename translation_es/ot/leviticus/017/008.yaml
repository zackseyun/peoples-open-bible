    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin cambiar el sentido fuente ni las decisiones léxicas principales del POB. «Y les dirás» reemplaza un calco poco idiomático; «o del forastero residente» corrige la preposición; y la nota b se hispaniza para mantener coherencia editorial.
