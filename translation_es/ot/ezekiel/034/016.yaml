translation:
  language: es
  text: Buscaré a la perdida, y haré volver a la descarriada, vendaré a la herida y fortaleceré a la enferma; pero a la gorda y a la fuerte las destruiré. Las pastorearé[a] con justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Las alimentaré con justicia” o “Las apacentaré con justicia”. El verbo hebreo puede significar alimentar, apacentar o pastorear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹבֶדֶת
  english_pob_choice: the lost
  chosen_spanish: la perdida
  alternatives_spanish:
  - la que se pierde
  - la perdida
  lexicon: HALOT
  rationale: El participio femenino singular se usa colectivamente para ovejas. En español, 'la perdida' conserva la imagen pastoral y la fuerza del adjetivo participial sin volverla demasiado explicativa.
- source_word: אֲבַקֵּשׁ
  english_pob_choice: I will seek
  chosen_spanish: buscaré
  alternatives_spanish:
  - la buscaré
  - la procuraré
  lexicon: HALOT
  rationale: בקש puede significar buscar/seek. 'Buscaré' es natural en español y mantiene el impulso de salir en busca de la oveja.
- source_word: הַנִּדַּחַת
  english_pob_choice: the strayed
  chosen_spanish: la descarriada
  alternatives_spanish:
  - la apartada
  - la dispersada
  lexicon: HALOT
  rationale: נדה/נדח expresa ser apartada o empujada lejos. 'Descarriada' comunica el resultado de haberse desviado en un registro bíblico inteligible, sin reducirlo a mera dispersión.
- source_word: אָשִׁיב
  english_pob_choice: I will bring back
  chosen_spanish: haré volver
  alternatives_spanish:
  - la traeré de vuelta
  - la restauraré
  lexicon: HALOT
  rationale: El hifil de שוב es causativo. 'Haré volver' preserva el movimiento de retorno y suena más directo que una paráfrasis como 'restauraré'.
- source_word: לַנִּשְׁבֶּרֶת
  english_pob_choice: the injured
  chosen_spanish: la herida
  alternatives_spanish:
  - la quebrada
  - la lastimada
  lexicon: HALOT
  rationale: Aunque el sentido literal es 'quebrada/rota', en español 'la herida' mantiene la idea de daño corporal en un giro más natural. Se evita 'la rota', que sonaría demasiado mecánico.
- source_word: אֶחֱבֹשׁ
  english_pob_choice: I will bind up
  chosen_spanish: vendaré
  alternatives_spanish:
  - la vendaré
  - la curaré
  lexicon: HALOT
  rationale: חבש alude a vendar o fajar una herida. 'Vendaré' expresa con precisión la acción médica concreta mejor que el más idiomático pero menos específico 'curaré'.
- source_word: הַחוֹלָה
  english_pob_choice: the sick
  chosen_spanish: la enferma
  alternatives_spanish:
  - la enferma
  - la débil
  lexicon: HALOT
  rationale: חלה es 'estar enfermo'. 'La enferma' conserva la distinción frente a 'la fuerte' y evita diluir el contraste en debilidad general.
- source_word: אֲחַזֵּק
  english_pob_choice: I will strengthen
  chosen_spanish: fortaleceré
  alternatives_spanish:
  - la fortaleceré
  - la haré fuerte
  lexicon: HALOT
  rationale: El piel de חזק significa fortalecer. 'Fortaleceré' es la forma verbal más natural en español y mantiene la idea de dar vigor.
- source_word: הַשְּׁמֵנָה
  english_pob_choice: the fat
  chosen_spanish: la gorda
  alternatives_spanish:
  - la bien cebada
  - la gorda
  lexicon: HALOT
  rationale: Se conserva la aspereza del hebreo, que en este contexto tiene carga social y moral. 'La gorda' reproduce esa dureza mejor que 'la bien cebada', que suavizaría el juicio.
- source_word: הַחֲזָקָה
  english_pob_choice: the strong
  chosen_spanish: la fuerte
  alternatives_spanish:
  - la poderosa
  - la robusta
  lexicon: HALOT
  rationale: El adjetivo חזק significa fuerte. 'La fuerte' mantiene el paralelismo con 'la gorda' y el contraste interno del verso.
- source_word: אַשְׁמִיד
  english_pob_choice: I will destroy
  chosen_spanish: las destruiré
  alternatives_spanish:
  - las exterminaré
  - las aniquilaré
  lexicon: HALOT
  rationale: El hifil de שמד significa destruir con fuerza. 'Las destruiré' conserva la severidad sin intensificar más allá de lo que el texto exige.
- source_word: אֶרְעֶנָּה
  english_pob_choice: I will shepherd them
  chosen_spanish: Las pastorearé
  alternatives_spanish:
  - las apacentaré
  - las pastorearé
  lexicon: HALOT
  rationale: רעה puede significar apacentar, pastorear o pastorear como gobernar. 'Las pastorearé' conserva el campo semántico pastoral y la dimensión de guía/cuidado que el capítulo desarrolla.
- source_word: בְמִשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - en justicia
  - con juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser justicia o juicio. 'Con justicia' suena natural en español y mantiene la tensión entre cuidado pastoral y acto recto de gobierno.
theological_decisions:
- issue: Cómo expresar el cierre entre cuidado de las débiles y juicio contra las fuertes
  english_pob_reading: '"I will shepherd them with justice" after the destruction of the fat and strong'
  chosen_spanish_reading: '"Las pastorearé con justicia" después de destruir a la gorda y a la fuerte'
  alternative_spanish_readings:
  - '"Las apacentaré con justicia"'
  - '"Las gobernaré con justicia"'
  rationale: 'La frase final debe conservar la tensión teológica: cuidado real para unas ovejas y acto judicial contra otras. ''Pastorearé'' mantiene el marco pastoral del capítulo y ''con justicia'' evita reducir משפט a castigo o a simple alimentación.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios en la revisión más reciente, y el cotejo externo mostró alta concordancia.'
  spanish_consistency_notes:
  - Se conserva un registro pastoral sobrio y bíblico, evitando sustituir el verbo final por un equivalente eclesiástico genérico como 'guiar'.
  - Se mantiene la distinción entre dañada/enferma/fuerte para no borrar el contraste del hebreo.
  - La nota de pie se ancla en 'perdida' porque en español la frase admite varias lecturas semánticas sin alterar el sentido principal.
