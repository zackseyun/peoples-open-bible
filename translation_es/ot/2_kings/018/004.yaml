translation:
  language: es
  text: Él quitó los lugares altos, hizo pedazos los pilares, cortó la Aserá[a] e hizo pedazos la serpiente de bronce que Moisés había hecho, porque hasta aquellos días los hijos de Israel le quemaban incienso[c][b]; y se le llamaba Nehustán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cortó el poste de Aserá', o 'cortó el poste sagrado'.
    reason: lexical_alternative
  - marker: b
    text: Nehustán probablemente juega con la idea de 'bronce' y puede significar algo así como 'un simple trozo de bronce'.
    reason: cultural_note
  - marker: c
    text: O 'él la llamó Nehustán'. El hebreo no hace explícito el sujeto de una manera que deba conservarse de forma obligatoria en español.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵסִיר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - eliminó
  lexicon: HALOT
  rationale: El verbo expresa sacar o quitar algo de su lugar/función. 'Quitó' es natural en español y mantiene el sentido de remoción cultual sin volverlo más técnico de lo necesario.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos
  - los santuarios de las alturas
  lexicon: HALOT
  rationale: '''Lugares altos'' comunica bien el término cultual hebreo en español contemporáneo. Conserva el referente religioso sin sustituirlo por una explicación excesiva.'
- source_word: שִׁבַּר
  english_pob_choice: shattered
  chosen_spanish: derribó
  alternatives_spanish:
  - hizo pedazos
  - destrozó
  lexicon: HALOT
  rationale: Para los pilares/estelas cultuales, 'derribó' expresa la destrucción física de manera natural en español. Se evita un calco demasiado fuerte si el contexto ya presenta acciones de demolición en secuencia.
- source_word: הַמַּצֵּבֹת
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las estelas
  - las columnas sagradas
  lexicon: HALOT
  rationale: '''Pilares'' reproduce de forma clara el objeto cultual sin añadir una interpretación que el texto no explicita aquí. Es un término entendible y suficientemente amplio.'
- source_word: כָרַת ... הָאֲשֵׁרָה
  english_pob_choice: cut down the Asherah
  chosen_spanish: cortó la Aserá
  alternatives_spanish:
  - cortó la Asherah
  - derribó el poste de Aserá
  lexicon: HALOT
  rationale: Se conserva el término transliterado para no borrar la referencia cultual específica. 'Aserá' adapta la transliteración al uso español y deja abierta la tensión entre objeto cultual y referente religioso, como hace el POB inglés.
- source_word: כִתַּת
  english_pob_choice: crushed to pieces
  chosen_spanish: hizo pedazos
  alternatives_spanish:
  - machacó
  - trituró
  lexicon: HALOT
  rationale: La idea es una destrucción intensiva, no solo romper. 'Hizo pedazos' transmite esa fuerza de modo idiomático y claro en español.
- source_word: נְחַשׁ הַנְּחֹשֶׁת
  english_pob_choice: the bronze serpent
  chosen_spanish: la serpiente de bronce
  alternatives_spanish:
  - la serpiente de cobre
  - la culebra de bronce
  lexicon: HALOT
  rationale: '''Serpiente de bronce'' es la equivalencia más natural y fiel al sustantivo compuesto. Mantiene el vínculo con el relato de Números y con el juego de palabras señalado en la nota.'
- source_word: מְקַטְּרִים לוֹ
  english_pob_choice: had been burning incense to it
  chosen_spanish: le estaban quemando incienso
  alternatives_spanish:
  - le ofrecían incienso
  - le hacían humear incienso
  lexicon: HALOT
  rationale: El giro hebreo alude a ofrecer incienso por medio de humo ritual. En español, 'quemar incienso' es la forma más clara y bíblica de expresarlo. El dativo 'le' conserva el objeto de la acción.
- source_word: וַיִּקְרָא לוֹ נְחֻשְׁתָּן
  english_pob_choice: it was called Nehushtan
  chosen_spanish: fue llamada Nehustán
  alternatives_spanish:
  - se le llamó Nehustán
  - él la llamó Nehustán
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad del hebreo sin decidir explícitamente el sujeto. 'Fue llamada' preserva el carácter impersonal del POB inglés y permite el juego semántico del nombre.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar tradicional del hebreo. 'Hijos de Israel' es claro, fiel y mantiene el paralelismo bíblico sin neutralizarlo.
- source_word: עַד הַיָּמִים הָהֵמָּה
  english_pob_choice: until those days
  chosen_spanish: hasta aquellos días
  alternatives_spanish:
  - hasta ese tiempo
  - hasta entonces
  lexicon: HALOT
  rationale: La fórmula temporal se vierte de manera cercana al hebreo. 'Aquellos días' preserva el tono de referencia histórica del texto.
theological_decisions:
- issue: Rendering of אֲשֵׁרָה as a cultic object without erasing ambiguity
  english_pob_reading: the Asherah
  chosen_spanish_reading: la Aserá
  alternative_spanish_readings:
  - la Asherah
  - el poste de Aserá
  - el poste sagrado
  rationale: El pasaje describe un objeto derribado/cortado, pero el término también carga historia cultual y posible ambigüedad religiosa. 'Aserá' conserva la referencia específica sin cerrar prematuramente el sentido como 'poste' en el texto principal.
  doctrine_reference: Translation philosophy 3, 5
- issue: Maintaining the passive ambiguity of the naming clause וַיִּקְרָא לוֹ נְחֻשְׁתָּן
  english_pob_reading: it was called Nehushtan
  chosen_spanish_reading: fue llamada Nehustán
  alternative_spanish_readings:
  - se le llamó Nehustán
  - él la llamó Nehustán
  rationale: El hebreo permite más de una lectura del sujeto. La forma impersonal en español evita imponer una identificación interpretativa no obligada por el texto y conserva la apertura del audit trail.
  doctrine_reference: Translation philosophy 3
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail inglés, que mantiene alta concordancia y no registra cambios posteriores. La redacción española conserva las decisiones léxicas y la ambigüedad del sujeto en la cláusula final, con notas que reflejan las alternativas documentadas en el POB inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque el hebreo aquí no usa el nombre divino explícito.
  - Se eligió 'Aserá' para conservar la terminología cultual específica y evitar sustituirla por una explicación que estreche indebidamente el término.
  - Se conservó la voz impersonal en la cláusula final para no decidir el sujeto donde el hebreo y el audit trail permiten ambigüedad.
  - La secuencia verbal en español sigue el encadenamiento narrativo del hebreo, con un estilo natural y publicable.
