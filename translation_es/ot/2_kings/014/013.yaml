translation:
  language: es
  text: Jehoás rey de Israel capturó a Amasías rey de Judá[a], hijo de Jehoás, hijo de Ocozías, en Bet-semes; luego vino a Jerusalén y abrió una brecha en la muralla de Jerusalén, desde la puerta de Efraín hasta la puerta de la Esquina, cuatrocientos codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto consonántico hebreo dice «y ellos vinieron a Jerusalén», pero el contexto y el verbo singular siguiente apoyan el sentido «y él vino a Jerusalén», refiriéndose a Jehoás.
    reason: textual_variant
lexical_decisions:
- source_word: תָּפַשׂ
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - apresó
  - se apoderó de
  - tomó prisionero
  lexicon: HALOT
  rationale: En este contexto militar, el verbo expresa tomar prisionero a un rey tras la batalla. «Capturó» conserva la fuerza de aprehensión sin añadir interpretación excesiva.
- source_word: בְּבֵית שָׁמֶשׁ
  english_pob_choice: at Beth-shemesh
  chosen_spanish: en Bet-semes
  alternatives_spanish:
  - en Bet-Semes
  - en la casa de Semes
  lexicon: HALOT
  rationale: Con un topónimo precedido por ב, el español natural es «en». Se conserva el nombre propio tradicional transliterado de forma sobria.
- source_word: ו/יבאו
  english_pob_choice: then he came
  chosen_spanish: luego él vino
  alternatives_spanish:
  - y él vino
  - luego vino
  - y vinieron
  lexicon: HALOT
  rationale: El consonántico sugiere plural, pero el contexto inmediato y el verbo singular siguiente favorecen entender a Jehoás como sujeto. «Luego él vino» mantiene esa decisión textual en español claro; el contraste se documenta en la nota.
- source_word: וַיִּפְרֹץ
  english_pob_choice: broke down
  chosen_spanish: derribó
  alternatives_spanish:
  - abrió brecha en
  - rompió
  - hizo brecha en
  lexicon: HALOT
  rationale: El verbo denota romper o abrir una brecha. Con «muro» como objeto, «derribó» comunica de manera natural la demolición de una parte de la muralla sin perder el sentido de ruptura.
- source_word: בְּחוֹמַת יְרוּשָׁלִַם
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: el muro de Jerusalén
  alternatives_spanish:
  - la muralla de Jerusalén
  - el muro en Jerusalén
  lexicon: HALOT
  rationale: El español bíblico moderno admite tanto «muro» como «muralla». Aquí «muro» sigue de cerca la línea inglesa y conserva la referencia concreta al tramo de fortificación.
- source_word: בְּשַׁעַר אֶפְרַיִם עַד שַׁעַר הַפִּנָּה
  english_pob_choice: from the Ephraim Gate to the Corner Gate
  chosen_spanish: desde la puerta de Efraín hasta la puerta de la Esquina
  alternatives_spanish:
  - desde la puerta de Efraín hasta la puerta del Ángulo
  - de la puerta de Efraín a la puerta de la Esquina
  lexicon: HALOT
  rationale: La construcción marca la extensión de la brecha. «Desde ... hasta ...» es la forma más natural en español. «Puerta de la Esquina» refleja el nombre propio del lugar, siguiendo el tratamiento del inglés POB para el topónimo.
- source_word: הַפִּנָּה
  english_pob_choice: Corner
  chosen_spanish: la Esquina
  alternatives_spanish:
  - el Ángulo
  - la esquina
  lexicon: HALOT
  rationale: En un nombre de puerta, la capitalización ayuda a tratarlo como designación fija. «Esquina» mantiene la imagen semántica de forma inteligible en español.
- source_word: אַרְבַּע מֵאוֹת אַמָּה
  english_pob_choice: four hundred cubits
  chosen_spanish: cuatrocientos codos
  alternatives_spanish:
  - cuatrocientos codos de longitud
  - cuatrocientos codos de ancho
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para evitar convertirla o explicarla de más. El hebreo da la medida de forma directa, y el español puede reproducirla fielmente.
- source_word: בֶּן ... בֶּן ...
  english_pob_choice: the son of Jehoash, son of Ahaziah
  chosen_spanish: hijo de Jehoás, hijo de Ocozías
  alternatives_spanish:
  - son de Jehoás, hijo de Ocozías
  - nieto de Ocozías
  lexicon: HALOT
  rationale: Se preserva la repetición genealógica del hebreo con «hijo de», evitando una armonización interpretativa como «nieto». Esto mantiene la forma textual y la cadencia del linaje.
theological_decisions:
- issue: Sujeto de «ו/יבאו» frente al plural consonántico
  english_pob_reading: the context and the following singular verb support the sense 'and he came to Jerusalem,' referring to Jehoash.
  chosen_spanish_reading: «luego él vino a Jerusalén» con nota textual sobre el plural consonántico
  alternative_spanish_readings:
  - «y ellos vinieron a Jerusalén»
  - «y vino a Jerusalén»
  rationale: La cláusula siguiente usa un verbo singular, lo que favorece entender a Jehoás como sujeto. Para no borrar la tensión textual, el texto principal adopta la lectura contextual y la nota registra la alternativa consonántica.
  doctrine_reference: Crítica textual y sintaxis narrativa del hebreo bíblico
translation_notes:
  revision_awareness: El texto español sigue el juicio revisado del expediente inglés, que mantiene alta concordancia y no requiere cambios adicionales. La única decisión sensible es la variante textual de ויבאו, resuelta de modo explícito en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige; en este versículo no aparece.
  - Se mantiene «Jehoás» para יוֹאָשׁ y «Amasías» para אֲמַצְיָהוּ con ortografía castellana convencional.
  - Se conserva el nombre de lugar «Bet-semes» y los topónimos «Efraín» y «la Esquina» de forma consistente con una transliteración bíblica readable.
  - «Codos» se deja sin conversión métrica para respetar la unidad antigua del texto.
