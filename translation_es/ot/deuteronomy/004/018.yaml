    issue: La nota [a] está anclada en «tierra» en vez de «forma».
    rationale: La nota explica alternativas de traducción para תַּבְנִית («forma»), por lo que debe marcar ese término en el texto español para mantener correspondencia exacta con la evidencia fuente y el rastro de auditoría.
  - severity: low
    issue: La nota [b] usa «ecoa», forma poco natural/no estándar en español general.
    rationale: Aunque el sentido se entiende, «hace eco de» es la formulación idiomática y eclesialmente legible en español neutral.
  revised_spanish_text: la forma[a] de cualquier ser que se arrastra sobre la tierra, la forma de cualquier pez que está en las aguas debajo de la tierra[b].
