translation:
  language: es
  text: Por eso no comemos alimento[a] impuro; porque creemos que la ley ha sido establecida por Dios, sabemos que el Creador del mundo, al legislar[b], también simpatiza con nuestra naturaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Por eso no comemos lo que está contaminado»'
    reason: lexical_alternative
  - marker: b
    text: 'El griego también puede entenderse como: «el Creador del mundo, al legislar, muestra simpatía hacia nosotros conforme a la naturaleza»'
    reason: alternative_reading
lexical_decisions:
- source_word: μιεροφαγοῦμεν
  english_pob_choice: eat defiling food
  chosen_spanish: comemos alimento contaminado
  alternatives_spanish:
  - comemos lo contaminado
  - comemos alimento impuro
  - comemos lo que está contaminado
  lexicon: LSJ
  rationale: El verbo compuesto expresa comer lo que está contaminado o profanado. En español, 'alimento contaminado' comunica el sentido de manera natural sin perder la referencia a la comida afectada por impureza ritual o contaminación.
- source_word: πιστεύοντες
  english_pob_choice: because we believe
  chosen_spanish: porque, creyendo
  alternatives_spanish:
  - porque creemos
  - ya que creemos
  - creyendo
  lexicon: BDAG
  rationale: El participio tiene valor causal. 'Porque, creyendo' mantiene el matiz causal y deja visible que la convicción religiosa explica la conducta.
- source_word: θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de Dios
  - por parte de Dios
  lexicon: LSJ
  rationale: El genitivo en esta construcción indica agencia o fuente de la instauración de la ley. 'Por Dios' conserva con naturalidad esa relación activa.
- source_word: καθέστασθαι
  english_pob_choice: has been established
  chosen_spanish: ha sido establecida
  alternatives_spanish:
  - ha sido instituida
  - ha sido ordenada
  - ha sido puesta en vigor
  lexicon: LSJ
  rationale: El perfecto infinitivo presenta la ley como instituida y vigente. 'Ha sido establecida' reproduce esa idea de institución con continuidad.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: Se refiere a la ley concreta dada para la práctica del pueblo, no a la ley en abstracto. En español, el artículo definido basta para marcar esa especificidad.
- source_word: κατὰ φύσιν
  english_pob_choice: with our nature
  chosen_spanish: con nuestra naturaleza
  alternatives_spanish:
  - según la naturaleza
  - de acuerdo con la naturaleza
  - en conformidad con nuestra naturaleza
  lexicon: LSJ
  rationale: La frase modifica la manera en que el Legislador se muestra compasivo. 'Con nuestra naturaleza' conserva la cercanía semántica con la formulación inglesa y la idea de consonancia con lo humano.
- source_word: συμπαθεῖ
  english_pob_choice: sympathizes
  chosen_spanish: simpatiza
  alternatives_spanish:
  - tiene compasión
  - se compadece
  - tiene simpatía
  lexicon: LSJ
  rationale: El verbo expresa sentir con otro o mostrarse considerado. 'Simpatiza' preserva ese matiz relacional sin convertirlo en mera benevolencia general.
- source_word: νομοθετῶν
  english_pob_choice: in giving the law
  chosen_spanish: al legislar
  alternatives_spanish:
  - al dar la ley
  - como legislador
  - cuando legisla
  lexicon: LSJ
  rationale: El participio describe la acción de legislar. 'Al legislar' es breve, fiel y natural en español, y mantiene la conexión con la ley mencionada antes.
- source_word: ὁ τοῦ κόσμου κτίστης
  english_pob_choice: the Creator of the world
  chosen_spanish: el Creador del mundo
  alternatives_spanish:
  - el Creador del mundo entero
  - el Hacedor del mundo
  lexicon: LSJ
  rationale: La expresión titular se traduce de forma directa, conservando el peso teológico y la amplitud cósmica del original.
theological_decisions:
- issue: Sentido de la negativa alimentaria
  english_pob_reading: The statement refers to refusal to eat food regarded as defiling under the divine law.
  chosen_spanish_reading: La frase se entiende como rechazo a comer alimento considerado contaminado según la ley divina.
  alternative_spanish_readings:
  - No comemos para no contaminarnos al comer
  - No comemos lo que nos contamina
  rationale: El compuesto griego apunta a comer lo impuro o contaminado, y el contexto inmediato trata de la observancia de la ley. La formulación española conserva esa referencia sin diluirla en una paráfrasis más general.
  doctrine_reference: Principio de equivalencia óptima y respeto a la fuerza léxica del compuesto griego.
- issue: Relación de Dios con la naturaleza al legislar
  english_pob_reading: The Creator, in legislating, acts with sympathy toward human nature.
  chosen_spanish_reading: El Creador, al legislar, muestra simpatía hacia nuestra naturaleza.
  alternative_spanish_readings:
  - El Creador legisla según la naturaleza
  - El Creador, al dar la ley, se adapta a nuestra naturaleza
  rationale: El griego une la acción de legislar con un trato συμπαθής hacia 'nosotros' y con la expresión κατὰ φύσιν. 'Simpatía' y 'nuestra naturaleza' conservan esa tensión entre consideración personal y consonancia con lo natural, sin resolverla filosóficamente de más.
  doctrine_reference: Preservar la tensión semántica del original; no imponer un sistema filosófico ajeno.
translation_notes:
  revision_awareness: La versión española sigue de cerca el estado final del audit trail inglés, sin introducir cambios sustanciales. Se mantuvo la decisión de explicitar el objeto implícito de μιεροφαγοῦμεν y de conservar la ambigüedad razonable de κατὰ φύσιν / συμπαθεῖ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usó 'Dios' para θεοῦ y 'el Creador del mundo' para ὁ τοῦ κόσμου κτίστης, manteniendo la distinción entre agente de la ley y título creador.
  - Se prefirió 'al legislar' para νομοθετῶν por naturalidad en español y cercanía semántica al acto de dar la ley.
  - '''Naturaleza'' se conservó como traducción de φύσις para no suavizar la tensión entre lo natural y lo legislado.'
  - Se evitó 'SEÑOR' para el nombre divino, conforme a la terminología del proyecto.
