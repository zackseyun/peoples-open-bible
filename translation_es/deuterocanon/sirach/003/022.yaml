  spanish_quality_summary: «Considera lo que se te ha asignado[a]» es natural y fiel. En cambio, «no tienes que ver con las cosas ocultas» suena algo coloquial y ligeramente ambiguo en español contemporáneo, pues puede sugerir simple relación o contacto, no propiamente falta de incumbencia. «No te conciernen las cosas ocultas» o «no tienes nada que hacer con las cosas ocultas» serían más precisas; la primera es más digna y limpia.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de «asignado» concuerda con el rastro de auditoría inglés revisado. «Cosas ocultas» preserva bien hidden things y evita la sobreinterpretación de «misterios».
