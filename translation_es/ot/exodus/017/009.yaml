revisions:
- from: 'Entonces Moisés dijo a Josué[a]: «Escoge hombres para nosotros y sal; pelea contra Amalec. Mañana yo estaré en la cima de la colina[b], con la vara de Dios en mi mano».'
  to: 'Entonces Moisés dijo a Josué: «Escoge hombres para nosotros y sal; pelea[a] contra Amalec. Mañana yo estaré de pie en la cima de la colina[b], con la vara de Dios en mi mano».'
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a la acción de pelear, no al nombre «Josué». Además, se ajusta «yo estaré» a «yo estaré de pie» para reflejar con mayor precisión el valor imagístico de נִצָּב, manteniendo un español natural y fiel al hebreo y al audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:42:33Z'
