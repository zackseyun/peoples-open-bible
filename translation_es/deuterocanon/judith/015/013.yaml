translation:
  language: es
  text: Y le dieron a Judith la tienda de Holofernes, y todos los objetos de plata[a], y los lechos, y los utensilios, y todos sus enseres. Y ella los tomó y los puso sobre su mula, y aparejó sus carretas[b], y los amontonó sobre ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego se refiere en general a artículos u objetos hechos de plata; también podría traducirse «vasos de plata», pero el término no obliga a restringirlo a recipientes específicos.
    reason: lexical_alternative
  - marker: b
    text: El griego presenta un final comprimido; la lectura más natural es que Judith cargó los bienes sobre las carretas ya preparadas para el transporte.
    reason: source_note
lexical_decisions:
- source_word: σκηνὴν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - carpa
  lexicon: LSJ
  rationale: El griego designa una tienda o pabellón portátil; en español bíblico y militar, «tienda» comunica bien la estructura de campaña sin añadir una imagen más doméstica que «casa» o más moderna que «carpa».
- source_word: ἀργυρώματα
  english_pob_choice: silver vessels
  chosen_spanish: plata labrada
  alternatives_spanish:
  - vasos de plata
  - objetos de plata
  lexicon: LSJ
  rationale: El término alude a piezas hechas de plata. «Plata labrada» conserva el valor material y la idea de objetos trabajados, sin limitarse solo a recipientes de mesa.
- source_word: κλίνας
  english_pob_choice: couches
  chosen_spanish: lechos
  alternatives_spanish:
  - camas
  - divanes
  lexicon: LSJ
  rationale: κλίνη puede ser cama o lecho de descanso. «Lechos» es suficientemente amplio y solemne; evita cargar el verso hacia el mobiliario moderno o hacia un sentido demasiado específico de banquete.
- source_word: ὅλκια
  english_pob_choice: utensils
  chosen_spanish: utensilios
  alternatives_spanish:
  - enseres
  - colgaduras
  - apéndices de tienda
  lexicon: LSJ
  rationale: La palabra es rara y su sentido exacto es incierto. Siguiendo el valor amplio que permite el audit trail, «utensilios» conserva una referencia general a piezas o artículos de uso, sin cerrar indebidamente la ambigüedad.
- source_word: σκευάσματα
  english_pob_choice: furnishings
  chosen_spanish: enseres
  alternatives_spanish:
  - mobiliario
  - pertenencias
  - equipos
  lexicon: LSJ
  rationale: El sustantivo es un término amplio para objetos, equipo o enseres. «Enseres» encaja bien con el conjunto de bienes portátiles y mantiene el carácter no técnico del original.
- source_word: ἡμίονον
  english_pob_choice: mule
  chosen_spanish: mula
  alternatives_spanish:
  - mula hembra
  lexicon: LSJ
  rationale: El griego puede ser más preciso en cuanto al sexo, pero en español «mula» es la forma natural y suficiente, salvo que el contexto exija especificarlo.
- source_word: ἔζευξεν
  english_pob_choice: harnessed
  chosen_spanish: unció
  alternatives_spanish:
  - aparejó
  - harnessed
  lexicon: LSJ
  rationale: El verbo significa yuntar o poner al yugo / enganchar para el tiro. «Unció» es una equivalencia digna y tradicional en español, adecuada para carretas y vehículos de carga.
- source_word: ἁμάξας
  english_pob_choice: wagons
  chosen_spanish: carretas
  alternatives_spanish:
  - carros
  - carruajes
  lexicon: LSJ
  rationale: El término refiere a vehículos con ruedas para transportar carga. «Carretas» transmite bien la función de traslado de bienes y evita una connotación más ceremonial como «carruajes».
- source_word: ἐσώρευσεν
  english_pob_choice: piled
  chosen_spanish: amontonó
  alternatives_spanish:
  - apiló
  - amásó
  lexicon: LSJ
  rationale: El verbo expresa la acción de amontonar o apilar encima. «Amontonó» reproduce la imagen concreta del texto y el movimiento de cargar los bienes sobre los vehículos.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés, pero se corrigieron sus oscilaciones léxicas para seguir más de cerca el griego: ἀργυρώματα se entendió como bienes de plata, ὅλκια como un término incierto de enseres/utensilios, y σκευάσματα como enseres generales. También se prefirió un registro español formal y bíblico, con ‘unció’ para ἔζευξεν.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’/‘Mesías’ no aplicable en este verso.
  - Se evitó ‘SEÑOR’ porque el texto no contiene el nombre divino ni κύριος.
  - La secuencia de bienes se traduce con sustantivos concretos y luego más generales para conservar la lista y la ambigüedad del griego.
  - Se preservó la compresión sintáctica final mediante una frase natural en español con nota explicativa.
