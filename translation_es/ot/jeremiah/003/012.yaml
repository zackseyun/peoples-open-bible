review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: mandato de ir y proclamar hacia el norte, llamado al regreso de Israel, fórmula profética con Yahvé, negativa de oposición divina y cierre sobre no mantener el enojo para siempre. Sin embargo, dos decisiones importantes no reflejan tan fielmente el expediente auditado: «Israel rebelde» desplaza el matiz de מְשֻׁבָה desde ‘desleal/apóstata/infiel’ hacia rebeldía más genérica, y «soy benigno» debilita y vuelve demasiado difuso el valor de חָסִיד, cuando el POB inglés revisado fijó «merciful» y preservó la alternativa en nota.'
  spanish_quality_summary: El español es claro y legible, con buena puntuación y registro digno. «Ve y proclama…» y «hacia el norte» funcionan bien. No obstante, «Vuélvete» puede sonar algo menos natural para lector general que «Vuelve» en este contexto profético, y «benigno» resulta menos idiomático y menos preciso teológicamente que «misericordioso». «No pondré mi rostro contra ustedes» es aceptable aunque algo rígido; conserva bien la metáfora.
  glossary_alignment: 'Buen cumplimiento del nombre divino como «Yahvé». No hay conflicto con otros términos del glosario. La principal desalineación está en חָסִיד: el proyecto auditado terminó con «merciful», y en español «misericordioso» corresponde mejor que «benigno». Para מְשֻׁבָה conviene una opción como «infiel» o «apóstata» antes que «rebelde», para reflejar mejor la deslealtad de pacto.'
  issues:
  - severity: medium
    issue: «rebelde» para מְשֻׁבָה
    rationale: El sustantivo señala apostasía o deslealtad de pacto más específicamente que mera rebeldía. «Infiel» refleja mejor el llamamiento profético y se acerca más a «faithless» del POB inglés.
  - severity: medium
    issue: «benigno» para חָסִיד
    rationale: Aunque semánticamente relacionado con bondad, «benigno» en español bíblico actual suena difuso y menos natural. El POB auditado revisó este punto a «merciful»; «misericordioso» lo representa con mayor fidelidad y claridad, preservando las alternativas en nota.
  - severity: low
    issue: «Vuélvete» podría mejorarse a «Vuelve»
    rationale: «Vuélvete» no es incorrecto, pero «Vuelve» suena más natural y directo en español neutro para un llamado profético singular.
  revised_spanish_text: 'Ve y proclama estas palabras hacia el norte[a], y di: «Vuelve, Israel infiel, declara Yahvé. No pondré mi rostro contra ustedes, porque soy misericordioso[b], declara Yahvé; no guardaré enojo para siempre».'
  revised_footnotes:
