  glossary_alignment: No hay conflicto con los términos globales del proyecto. La elección «amor constante» intenta reflejar steadfast love, pero en español eclesial amplio «amor fiel» preserva mejor la densidad de חֶסֶד sin sonar calcado. «Corrección» y «su tierra» están alineados con la auditoría inglesa.
