translation:
  language: es
  text: Escúchenme[a], casa de Jacob, y todo el remanente de la casa de Israel, los que han sido llevados por mí desde el nacimiento, sostenidos por mí desde el vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa dos expresiones relacionadas: «desde el nacimiento» y «desde el vientre», un paralelismo poético para el cuidado de Dios desde la vida más temprana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Atiéndanme
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע exige un llamado a prestar atención; «Escúchenme» transmite con naturalidad la invitación urgente y directa del hebreo, con registro digno y bíblico sin arcaísmo excesivo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El objeto de atención se incorpora de forma natural en español con el enclítico «me», que mantiene la dirección personal del mandato sin añadir palabras innecesarias.
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: house of Jacob
  chosen_spanish: casa de Jacob
  alternatives_spanish:
  - familia de Jacob
  - linaje de Jacob
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática del hebreo. «Casa de Jacob» en español es comprensible y mantiene la designación colectiva del pueblo descendiente de Jacob.
- source_word: שְׁאֵרִית בֵּית יִשְׂרָאֵל
  english_pob_choice: the remnant of the house of Israel
  chosen_spanish: el remanente de la casa de Israel
  alternatives_spanish:
  - los que quedan de la casa de Israel
  - el resto de la casa de Israel
  lexicon: HALOT
  rationale: «Remanente» conserva el peso técnico profético de שְׁאֵרִית, especialmente importante en Isaías. Se mantiene la estructura formal para no diluir el término teológico.
- source_word: הָעֲמֻסִים
  english_pob_choice: who have been carried
  chosen_spanish: los que han sido llevados
  alternatives_spanish:
  - los que han sido cargados
  - los que han sido transportados
  lexicon: HALOT
  rationale: El participio pasivo comunica que Israel no se carga a sí mismo sino que es sostenido por Dios. «Llevados» es más natural en español para una acción de sostén/custodia y evita una imagen demasiado literal de «cargados» que podría sonar pesada o impersonal.
- source_word: מִנִּי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - de parte de mí
  - por parte de mí
  lexicon: HALOT
  rationale: Aquí la preposición expresa agencia en la voz pasiva. «Por mí» reproduce esa relación de agente de manera clara y normal en español.
- source_word: בֶטֶן
  english_pob_choice: from birth
  chosen_spanish: desde el nacimiento
  alternatives_spanish:
  - desde el vientre
  - desde que nacieron
  lexicon: HALOT
  rationale: La revisión inglesa distinguió בטן de רָחַם para evitar repetir «womb». En español, «desde el nacimiento» expresa con naturalidad el comienzo de la vida y preserva la diferencia con la segunda expresión.
- source_word: הַנְּשֻׂאִים
  english_pob_choice: borne
  chosen_spanish: cargados
  alternatives_spanish:
  - llevados
  - sostenidos
  lexicon: HALOT
  rationale: נשׂא mantiene la idea de portar/soportar. Para conservar el paralelismo con «llevados» y reflejar la imagen poética de Dios sosteniendo a su pueblo, se usa «cargados» en español, sin perder la pasividad del participio.
- source_word: רָחַם
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde el vientre materno
  lexicon: HALOT
  rationale: Aunque בטן y רָחַם apuntan ambos al vientre, el hebreo usa dos términos relacionados en paralelismo poético. «Desde el vientre» permite conservar la repetición intencional en español, con un registro natural y comprensible.
theological_decisions:
- issue: Término profético «remanente»
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - los que quedan
  - el resto
  rationale: Isaías emplea un término cargado de continuidad histórica y teológica. «Remanente» conserva esa densidad y evita una paráfrasis que debilite el motivo profético.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms)
- issue: Agencia divina en los participios pasivos
  english_pob_reading: borne by me ... carried from the womb
  chosen_spanish_reading: llevados por mí ... cargados desde el vientre
  alternative_spanish_readings:
  - llevados por mí ... llevados desde el vientre
  - cargados por mí ... cargados desde el vientre
  rationale: El contexto inmediato contrasta a los ídolos, que deben ser cargados por personas, con Yahvé, que carga a su pueblo. Mantener la agencia divina explícita con «por mí» preserva ese contraste teológico.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
- issue: Doble imagen poética del origen de la vida
  english_pob_reading: from birth ... from the womb
  chosen_spanish_reading: desde el nacimiento ... desde el vientre
  alternative_spanish_readings:
  - desde el vientre ... desde el vientre
  - desde la concepción ... desde el vientre
  rationale: El hebreo usa dos expresiones emparentadas para enfatizar el cuidado divino desde la vida más temprana. En español se conserva la distinción entre ambas imágenes y se evita borrar la tensión léxica documentada por la revisión inglesa.
  doctrine_reference: Translation philosophy §2 (Transparency in lexical tensions)
translation_notes:
  revision_awareness: La revisión inglesa reciente distinguió בטן como «from birth» y רָחַם como «from the womb» para evitar repetir la misma expresión. La presente versión española sigue esa distinción con «desde el nacimiento» y «desde el vientre», manteniendo el paralelismo poético y la agencia divina explícita.
  spanish_consistency_notes:
  - Se conserva «Yahvé» implícito en el contexto del libro, pero en este versículo la referencia divina aparece mediante el pronombre agente «por mí».
  - Se mantiene «remanente» como término técnico profético en Isaías.
  - Se evita el calco rígido de «casa» como simple estructura física; aquí funciona como fórmula colectiva idiomática.
  - Se distingue entre «llevados» y «cargados» para reflejar el doble participio hebreo sin perder naturalidad en español.
