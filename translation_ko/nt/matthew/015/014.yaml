id: MAT.15.14
reference: Matthew 15:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἄφετε αὐτούς· ⸂τυφλοί εἰσιν ὁδηγοὶ τυφλῶν⸃· τυφλὸς δὲ τυφλὸν ἐὰν ὁδηγῇ, ἀμφότεροι εἰς βόθυνον πεσοῦνται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/014.yaml
  text: 'Leave them alone[a]; they are blind guides of the blind. But if a blind man guides a blind man[c][b], both will fall into a pit.'
translation:
  language: ko
  text: '「그들을 내버려 두라. 그들은 눈먼 자들의 눈먼 인도자들이다. 눈먼 자가 눈먼 자를 인도하면, 둘 다 구덩이에 빠질 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「눈먼 자들을 위한 눈먼 인도자들」.
    reason: lexical_alternative
  - marker: b
    text: 「눈먼 자」 단수형은 비유에서 대표적이며, 남성에게만 적용되는 것이 아니다.
    reason: cultural_note
  - marker: c
    text: 또는 「도랑」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφετε αὐτούς
  english_pob_choice: Leave them alone
  chosen_korean: 그들을 내버려 두라
  alternatives_korean:
  - 그들을 놓아 두라
  lexicon: BDAG
  rationale: ἀφίημι의 「버려두다·놓아두다」의 명령형. 한국어 「내버려 두라」가 가장 자연스럽다.
- source_word: ὁδηγοὶ
  english_pob_choice: guides
  chosen_korean: 인도자들
  alternatives_korean:
  - 길잡이들
  lexicon: BDAG
  rationale: 종교 지도자에 대한 비유적 호칭. 「인도자」가 정착어이다.
- source_word: βόθυνον
  english_pob_choice: pit
  chosen_korean: 구덩이
  alternatives_korean:
  - 도랑
  lexicon: BDAG
  rationale: 길가의 깊은 구멍·구덩이. 「구덩이」가 자연스럽다.
