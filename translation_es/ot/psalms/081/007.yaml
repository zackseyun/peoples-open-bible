    rationale: El rastro inglés conserva como nota la posibilidad «I removed his shoulder from the burden», no una expansión interpretativa como «tarea pesada». Las notas deben seguir la evidencia documentada.
  - severity: low
    issue: La nota [b] podría explicitar mejor que la alternativa busca claridad, no cambio de sentido
    rationale: «Se apartaron» comunica mejor el resultado de עבר en español; la nota actual no deja claro el problema de comprensibilidad de la forma más literal.
