translation:
  language: es
  text: A los hijos de Merari, según sus clanes, de la tribu de Rubén, de la tribu de Gad y de la tribu de Zabulón, doce ciudades por suerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: to the sons of
  chosen_spanish: a los hijos de
  alternatives_spanish:
  - para los hijos de
  - a los descendientes de
  lexicon: HALOT
  rationale: En este contexto de distribución de ciudades, la preposición ל marca destinatario. «Hijos de» conserva la fórmula genealógica y el vínculo con la línea levítica; «descendientes de» sería posible, pero menos literal.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: En listas de reparto tribal, מִשְׁפָּחָה suele referirse a subdivisiones de clan. «Clanes» preserva mejor ese nivel que el más general «familias».
- source_word: מִמַּטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la tribu
  - a partir de la tribu de
  lexicon: HALOT
  rationale: Aquí מַטֶּה significa «tribu» en el marco de asignación territorial; la repetición indica las tribus de las que provinieron las ciudades.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  lexicon: HALOT
  rationale: Nombre tribal en forma española tradicional y ampliamente inteligible.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  lexicon: HALOT
  rationale: Se adopta la forma española bíblica más reconocible y natural en lectura eclesial.
- source_word: בַּגּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - por medio de sorteo
  lexicon: HALOT
  rationale: «גּוֹרָל» refiere al procedimiento de asignación por suerte/lotes. «Por sorteo» es claro en español y conserva el sentido de distribución sin introducir una paráfrasis extensa.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - ciudades y aldeas
  lexicon: HALOT
  rationale: En contextos de reparto territorial, עָרִים designa centros habitados; «ciudades» es el equivalente más convencional y preciso.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: HALOT
  rationale: Numeral cardinal estándar.
