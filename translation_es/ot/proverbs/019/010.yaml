base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/010.yaml
  text: Luxury is not fitting for a fool[c][b][a], much less for a slave to rule over princes.
  footnotes:
  - marker: a
    text: Or 'pleasure' or 'delight' for 'luxury.' The Hebrew term can denote enjoyment generally, but here likely refers to affluent ease or indulgence.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant' instead of 'slave.' The Hebrew עֶבֶד can cover a range of servile statuses; 'slave' is used here because the proverb's force depends on the sharp social reversal.
    reason: lexical_alternative
  - marker: c
    text: Or 'nobles' or 'officials' for 'princes.'
    reason: lexical_alternative
