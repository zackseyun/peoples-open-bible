translation:
  language: es
  text: 'Pero hagan esto por ellos, para que vivan y no mueran cuando se acerquen a los objetos santísimos[a]: Aarón y sus hijos vendrán y asignarán a cada uno[b] su servicio y su carga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el Santo de los Santos' / 'el Lugar Santísimo'. Aquí la frase probablemente se refiere a los objetos sagrados más santos, y no al recinto interior mismo, dado el contexto de las tareas de transporte.
    reason: alternative_reading
  - marker: b
    text: Hebreo 'hombre por hombre', una expresión distributiva que significa que a cada individuo se le asignaba su propio servicio y su propia carga.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: But do this
  chosen_spanish: Pero hagan esto
  alternatives_spanish:
  - Y hagan esto
  - Ahora hagan esto
  lexicon: HALOT
  rationale: La conjunción con el demostrativo introduce una transición exhortativa con matiz de contraste respecto de la advertencia anterior; en español, 'Pero hagan esto' comunica bien ese giro sin perder el carácter imperativo.
- source_word: עֲשׂוּ לָהֶם
  english_pob_choice: do this for them
  chosen_spanish: hagan esto por ellos
  alternatives_spanish:
  - hagan esto para ellos
  - traten así con ellos
  lexicon: HALOT
  rationale: 'El לָהֶם tiene sentido benefactivo en este contexto sacerdotal: la acción se realiza en favor de los levitas para preservarles la vida. ''Por ellos'' conserva ese beneficio con naturalidad en español.'
- source_word: וְחָיוּ וְלֹא יָמֻתוּ
  english_pob_choice: so that they may live and not die
  chosen_spanish: para que vivan y no mueran
  alternatives_spanish:
  - a fin de que vivan y no mueran
  - para que puedan vivir y no morir
  lexicon: HALOT
  rationale: La secuencia expresa resultado/intención. 'Para que' es la manera más natural de mantener la finalidad del mandato, y el paralelismo 'vivan y no mueran' conserva la fuerza del hebreo.
- source_word: בְּגִשְׁתָּם
  english_pob_choice: when they come near
  chosen_spanish: cuando se acerquen
  alternatives_spanish:
  - al acercarse
  - cuando se aproximen
  lexicon: HALOT
  rationale: El valor circunstancial temporal del infinitivo con בּ se expresa con 'cuando'. 'Acercarse' mantiene el matiz cultual de n-g-š sin sonar arcaico.
- source_word: אֶת קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the most holy things
  chosen_spanish: las cosas santísimas
  alternatives_spanish:
  - los objetos santísimos
  - las cosas más santas
  - el Lugar Santísimo
  lexicon: HALOT
  rationale: El contexto trata del traslado y manipulación de objetos sagrados, no del recinto interior en sí; por eso se traduce como plural colectivo. 'Cosas santísimas' refleja el superlativo hebreo y mantiene la referencia a los objetos.
- source_word: אַהֲרֹן וּבָנָיו
  english_pob_choice: Aaron and his sons
  chosen_spanish: Aarón y sus hijos
  alternatives_spanish:
  - Aarón y sus descendientes
  lexicon: HALOT
  rationale: Se mantiene el lenguaje familiar literal, que en el contexto sacerdotal designa a Aarón y a sus hijos varones con función sacerdotal.
- source_word: יָבֹאוּ
  english_pob_choice: shall come
  chosen_spanish: entrarán
  alternatives_spanish:
  - vendrán
  - deberán entrar
  lexicon: HALOT
  rationale: En este contexto de acceso al santuario/área sagrada, 'entrarán' transmite mejor la acción autorizada de ingreso que el más general 'vendrán'.
- source_word: וְשָׂמ֣וּ אוֹתָ֗ם
  english_pob_choice: appoint each man
  chosen_spanish: asignarán a cada uno
  alternatives_spanish:
  - apuntarán a cada uno
  - designarán a cada uno
  lexicon: HALOT
  rationale: 'El verbo poner/colocar aquí tiene sentido administrativo: establecer a cada individuo en su función. ''Asignarán'' es claro y refleja el acto de distribuir responsabilidades.'
- source_word: אִישׁ אִישׁ
  english_pob_choice: each man
  chosen_spanish: a cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: La repetición distributiva se expresa naturalmente como 'a cada uno'. En español permite mantener el sentido individual sin sonar forzado.
- source_word: עַל עֲבֹדָתוֹ
  english_pob_choice: to his service
  chosen_spanish: su servicio
  alternatives_spanish:
  - su tarea
  - su labor
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto levítico designa el servicio/deber asignado; 'su servicio' conserva esa terminología técnica.
- source_word: וְאֶל מַשָּׂאוֹ
  english_pob_choice: and to his burden
  chosen_spanish: su carga
  alternatives_spanish:
  - su peso
  - lo que debe cargar
  lexicon: HALOT
  rationale: מַשָּׂא en este pasaje se refiere concretamente a lo que cada uno debe transportar. 'Carga' mantiene el sentido material y ritual del traslado.
theological_decisions:
- issue: Referente de קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_reading: Rendered as 'the most holy things' rather than a spatial 'Holy of Holies.'
  chosen_spanish_reading: '''las cosas santísimas'' en sentido colectivo de objetos sagrados, no como un lugar'
  alternative_spanish_readings:
  - el Lugar Santísimo
  - las cosas más santas
  rationale: El contexto inmediato trata del manejo de objetos para transporte bajo supervisión sacerdotal. En español, un plural colectivo evita imponer un sentido espacial que el versículo no exige.
  doctrine_reference: Translation philosophy §1, §5
- issue: Distribución individual de אִישׁ אִישׁ
  english_pob_reading: Rendered 'each man.'
  chosen_spanish_reading: '''a cada uno'' sin neutralizar el referente masculino del contexto levítico'
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: El contexto describe a varones levitas con funciones concretas. 'A cada uno' conserva la distribución individual y permite evitar una formulación pesada, sin borrar la masculinidad contextual.
  doctrine_reference: Translation philosophy §4
- issue: Matiz benefactivo de לָהֶם
  english_pob_reading: do this for them
  chosen_spanish_reading: '''hagan esto por ellos'' como acción en su favor'
  alternative_spanish_readings:
  - hagan esto para ellos
  - hagan esto a favor de ellos
  rationale: El mandato no indica daño sino provisión protectora. La traducción en favor de ellos refleja la finalidad de preservar la vida de los levitas al acercarse a los objetos santísimos.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción toma como base el sentido revisado del texto inglés: la finalidad protectora (''so that they may live and not die''), el referente colectivo de ''the most holy things'', y la asignación individual de servicio/carga. También se integra el ajuste final de registro más formal en la asignación de tareas, reflejado en ''asignarán''.'
  spanish_consistency_notes:
  - Se usa 'Aarón' con tilde para el nombre propio en español.
  - '''cosas santísimas'' mantiene la superlatividad del hebreo y evita introducir un ''Lugar Santísimo'' no requerido por el contexto.'
  - '''servicio'' y ''carga'' conservan el paralelismo técnico levítico de labor asignada y objeto transportado.'
  - El tono es formal y bíblico sin recurrir a una dicción arcaizante.
