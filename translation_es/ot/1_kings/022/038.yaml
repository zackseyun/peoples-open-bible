translation:
  language: es
  text: Y lavaron el carro en el estanque de Samaria, y los perros lamieron su sangre, y las prostitutas lavaron allí[a], conforme a la palabra de Yahvé, que él había hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las prostitutas se lavaron» o «se bañaron». El hebreo no expresa explícitamente el objeto del verbo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁטֹף
  english_pob_choice: they washed
  chosen_spanish: lavaron
  alternatives_spanish:
  - se lavó
  - lavaron
  lexicon: HALOT
  rationale: El hebreo presenta un verbo en tercera persona singular con sujeto implícito; en español, un plural impersonal/indefinido es natural y mantiene la escena sin forzar un sujeto explícito.
- source_word: הָרֶכֶב
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carruaje
  - el carro de guerra
  lexicon: HALOT
  rationale: En este contexto narrativo español, 'carro' comunica con claridad el vehículo ensangrentado; 'carro de guerra' explicita de más y 'carruaje' suena menos probable en el marco bélico.
- source_word: עַל בְּרֵכַת שֹׁמְרוֹן
  english_pob_choice: at the pool of Samaria
  chosen_spanish: en el estanque de Samaria
  alternatives_spanish:
  - junto al estanque de Samaria
  - en la alberca de Samaria
  lexicon: HALOT
  rationale: '''עַל'' puede señalar ubicación asociada al punto de lavado; ''en'' suena natural en español y preserva la referencia al lugar. ''Estanque'' es amplio y comprensible; ''alberca'' es viable pero más regional.'
- source_word: וַיָּלֹקּוּ
  english_pob_choice: licked up
  chosen_spanish: lamieron
  alternatives_spanish:
  - lamieron por completo
  - lamieron y bebieron
  lexicon: HALOT
  rationale: El verbo denota lamer/lapear. En español, 'lamieron' basta en esta imagen; añadir 'por completo' sería interpretativo y 'bebieron' no está en el hebreo.
- source_word: דָּמ֔וֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - su propia sangre
  lexicon: HALOT
  rationale: El sufijo pronominal refiere a Acab; 'su sangre' es la formulación más natural en español y mantiene la referencia sin redundancia.
- source_word: וְהַזֹּנוֹת
  english_pob_choice: the prostitutes
  chosen_spanish: las prostitutas
  alternatives_spanish:
  - las rameras
  - las mujeres prostitutas
  lexicon: HALOT
  rationale: '''Prostitutas'' corresponde directamente a זוֹנוֹת y conserva el registro claro y no arcaizante del POB en español.'
- source_word: רָחָצוּ
  english_pob_choice: washed there
  chosen_spanish: se lavaron allí
  alternatives_spanish:
  - se bañaron allí
  - se lavaron
  - se bañaban allí
  lexicon: HALOT
  rationale: El hebreo no expresa objeto; el reflexivo en español hace transparente que ellas mismas realizaron la acción, sin añadir contenido ajeno. 'Se bañaron' es posible, pero 'lavarse' mantiene mejor la relación con el verbo de lavado del contexto.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la terminología base del proyecto: יְהוָה se rinde como ''Yahvé''. ''Conforme a'' conserva el valor de cumplimiento/formulación profética.'
- source_word: אֲשֶׁר דִּבֵּר
  english_pob_choice: that he had spoken
  chosen_spanish: que él había hablado
  alternatives_spanish:
  - que había hablado
  - que habló
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien el carácter cumplido de la palabra pronunciada previamente. Se conserva el pronombre explícito por claridad y por concordancia con el sujeto divino ya mencionado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto español define 'Yahvé' como forma principal. Se evita 'SEÑOR' porque vela el nombre propio y no sigue el estándar del proyecto.
  doctrine_reference: Contested terms — יְהוָה YHWH → Yahvé
- issue: Relación entre las dos cláusulas finales y el cumplimiento profético
  english_pob_reading: according to the word of Yahweh that he had spoken
  chosen_spanish_reading: conforme a la palabra de Yahvé, que él había hablado
  alternative_spanish_readings:
  - según la palabra de Yahvé, que había hablado
  - de acuerdo con la palabra de Yahvé, que él había hablado
  rationale: La frase final funciona como fórmula de cumplimiento. El español mantiene la relación entre 'palabra' y 'hablado' sin suavizar la afirmación de que lo sucedido corresponde a una declaración previa de Yahvé.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpretive tension rather than resolve it'
- issue: Ambigüedad de וְהַזֹּנוֹת רָחָצוּ
  english_pob_reading: the prostitutes washed there
  chosen_spanish_reading: las prostitutas se lavaron allí
  alternative_spanish_readings:
  - las prostitutas se bañaron allí
  - las prostitutas lavaron allí
  rationale: El hebreo deja sin objeto explícito el verbo final; el reflexivo español evita imponer un objeto no expresado y conserva la posibilidad de que la acción sea lavarse o bañarse, sin borrar que el sujeto son las prostitutas.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpretive tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: se prefiere una localización natural para el lugar de lavado (''en el estanque de Samaria'') y se mantiene sin expansión la cláusula final sobre las prostitutas, preservando la ambigüedad verbal documentada. También se incorpora la decisión de usar ''Yahvé'' como forma del nombre divino en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se usa 'prostitutas' por correspondencia léxica directa con זֹנוֹת.
  - Se prefiere 'lavaron'/'se lavaron' en lugar de perífrasis explicativas para no añadir contenido.
  - '''Estanque'' funciona como equivalente neutral de בְּרֵכָה en este contexto narrativo.'
