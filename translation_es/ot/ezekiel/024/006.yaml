revisions:
- from: 'Por tanto, así dice Yahvé, el Señor: ¡Ay de la ciudad de sangre[a], de la olla en la que está su herrumbre, y de la que su herrumbre no ha salido de ella! Sáquenla[b] pieza por pieza; no ha caído sobre ella ninguna suerte.'
  to: 'Por tanto, así dice el Señor Yahvé: ¡Ay de la ciudad de derramamiento de sangre[a], de la olla en la que está su herrumbre y cuya herrumbre no ha salido de ella! Sáquenla[b] pieza por pieza; no ha caído sobre ella ninguna suerte.'
  rationale: Se corrigió el compuesto divino a «el Señor Yahvé» para reflejar mejor אֲדֹנָי יְהוִה dentro de la política que preserva «Yahvé». Se rehízo la cláusula relativa de la olla para lograr español natural y fiel («cuya herrumbre no ha salido de ella»). También se ajustó «ciudad de sangre» a «ciudad de derramamiento de sangre», más idiomático y más cercano al valor de דמים en el expediente POB. Las notas se actualizaron para conservar la alternativa léxica y aclarar que se extrae el contenido de la olla, no la olla misma, pieza por pieza.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: partícula inferencial, fórmula profética, ay contra la ciudad/olla, permanencia de la herrumbre y extracción distributiva sin sorteo. Sin embargo, hay dos puntos que requieren ajuste para mayor fidelidad y naturalidad: (1) אֲדֹנָי יְהוִה está mejor como «el Señor Yahvé» en español, no «Yahvé, el Señor», porque el hebreo presenta un título compuesto continuo, no una aposición invertida; (2) «de la que su herrumbre no ha salido de ella» es gramaticalmente torpe y redundante; debe simplificarse a «cuya herrumbre no ha salido de ella». Además, «ciudad de sangre» suena menos idiomático que «ciudad de derramamiento de sangre», que preserva mejor דמים como sangre derramada/bloodshed.'
  spanish_quality_summary: El registro es digno y comprensible, pero contiene una construcción poco natural («de la que su herrumbre no ha salido de ella») y una puntuación/formulación del nombre divino algo forzada. «Sáquenla pieza por pieza» funciona bien. «Ninguna suerte» es entendible, aunque «no ha caído sobre ella suerte» o «no se echó suerte sobre ella» serían más transparentes; no obstante, no exige adjudicación difícil.
  glossary_alignment: 'Se alinea parcialmente con la glosa del proyecto: usa «Yahvé» correctamente para יהוה, pero el orden «Yahvé, el Señor» no refleja tan bien el compuesto אֲדֹנָי יְהוִה como «el Señor Yahvé». El resto de la terminología principal es aceptable: «olla» por סיר, «herrumbre» por חלאה, y el mantenimiento del lenguaje figurado y distributivo están en línea con el expediente POB.'
  issues:
  - severity: medium
    issue: Orden poco fiel del título divino compuesto
    rationale: אֲדֹנָי יְהוִה se vierte mejor como «el Señor Yahvé» que como «Yahvé, el Señor». La inversión con coma suena a aposición explicativa y debilita la unidad del título fuente.
  - severity: high
    issue: Construcción española defectuosa en la segunda cláusula de la olla
    rationale: «de la que su herrumbre no ha salido de ella» combina relativo y retomada pronominal redundante, resultando antinatural y poco legible. Debe corregirse a una relativa posesiva natural, por ejemplo «cuya herrumbre no ha salido de ella».
  - severity: medium
    issue: «Ciudad de sangre» es menos idiomático que la opción del expediente inglés
    rationale: El hebreo דמים aquí apunta a bloodshed/bloodguilt. «Ciudad de derramamiento de sangre» comunica mejor la idea que «ciudad de sangre», que en español puede sonar truncado o ambiguo.
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: ¡Ay de la ciudad de derramamiento de sangre[a], de la olla en la que está su herrumbre y cuya herrumbre no ha salido de ella! Sáquenla[b] pieza por pieza; no ha caído sobre ella ninguna suerte.'
  revised_footnotes:
  - marker: a
    text: O «la ciudad de sangre»; el hebreo plural apunta a culpa de sangre o derramamiento de sangre.
    reason: lexical_alternative
  - marker: b
    text: Es decir, saquen su contenido en porciones separadas, sin escogerlas por sorteo.
    reason: cultural_note
  revision_rationale: Se corrigió el compuesto divino a «el Señor Yahvé» para reflejar mejor אֲדֹנָי יְהוִה dentro de la política que preserva «Yahvé». Se rehízo la cláusula relativa de la olla para lograr español natural y fiel («cuya herrumbre no ha salido de ella»). También se ajustó «ciudad de sangre» a «ciudad de derramamiento de sangre», más idiomático y más cercano al valor de דמים en el expediente POB. Las notas se actualizaron para conservar la alternativa léxica y aclarar que se extrae el contenido de la olla, no la olla misma, pieza por pieza.
