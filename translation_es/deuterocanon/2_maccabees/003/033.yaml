translation:
  language: es
  text: 'Y mientras el sumo sacerdote hacía expiación[a], esos mismos jóvenes aparecieron de nuevo a Heliodoro, vestidos con las mismas vestiduras, y, estando de pie, dijeron: «Da muchas gracias a Onías el sumo sacerdote, porque a causa de él el Señor te ha concedido graciosamente la vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacía la expiación»; más técnicamente, «hacía propiciación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιουμένου ... τὸν ἱλασμόν
  english_pob_choice: was making atonement
  chosen_spanish: hacía expiación
  alternatives_spanish:
  - hacía la expiación
  - realizaba la expiación
  - hacía propiciación
  lexicon: LSJ
  rationale: ἱλασμός en este contexto sacerdotal describe la acción ritual de expiación/atonement. «Hacía expiación» conserva el valor cultual y evita imponer una formulación doctrinal más estrecha. «Propiciación» queda como posibilidad más técnica, pero en español suena más interpretativa.
- source_word: οἱ αὐτοὶ νεανίαι
  english_pob_choice: the same young men
  chosen_spanish: esos mismos jóvenes
  alternatives_spanish:
  - los mismos jóvenes
  - esos mismos muchachos
  - los mismos muchachos
  lexicon: LSJ
  rationale: νεανίαι designa jóvenes varones; «jóvenes» es natural y respetuoso en español. «Esos mismos» mantiene la referencia a los que ya habían aparecido antes, como en el inglés POB.
- source_word: ἐν ταῖς αὐταῖς ἐσθήσεσιν ἐστολισμένοι
  english_pob_choice: clothed in the same garments
  chosen_spanish: vestidos con las mismas vestiduras
  alternatives_spanish:
  - vestidos con la misma ropa
  - adornados con las mismas vestiduras
  - ataviados con las mismas vestiduras
  lexicon: LSJ
  rationale: ἐσθής apunta a ropa/vestidura; «vestiduras» preserva un registro sobrio y bíblico sin caer en arcaísmo. «Vestidos» expresa de forma directa ἐστολισμένοι.
- source_word: στάντες
  english_pob_choice: standing there
  chosen_spanish: puestos de pie
  alternatives_spanish:
  - de pie
  - estando de pie
  - puestos allí de pie
  lexicon: LSJ
  rationale: El participio indica su postura al hablar. «Puestos de pie» comunica la acción/postura sin añadir un lugar («allí») que no está explicitado en el griego.
- source_word: Πολλὰ ... χάριτας ἔχε
  english_pob_choice: Give many thanks
  chosen_spanish: Da muchas gracias
  alternatives_spanish:
  - Ten muchas gracias
  - Sé muy agradecido
  - Da abundantes gracias
  lexicon: LSJ
  rationale: La expresión idiomática griega usa χάριτας en plural y πολλὰ intensifica. «Da muchas gracias» conserva la estructura exhortativa y el énfasis, de manera más natural que una calca literal.
- source_word: διὰ γὰρ αὐτὸν
  english_pob_choice: for because of him
  chosen_spanish: porque por medio de él
  alternatives_spanish:
  - porque a causa de él
  - pues por él
  - porque gracias a él
  lexicon: LSJ
  rationale: 'διά con acusativo expresa causa o motivo; aquí el contexto favorece una relación instrumental/causal: por su intervención, la vida fue concedida. «Por medio de él» mantiene esa mediación sin introducir demasiado.'
- source_word: σοὶ κεχάρισται τὸ ζῆν
  english_pob_choice: has graciously granted you your life
  chosen_spanish: te ha concedido graciosamente la vida
  alternatives_spanish:
  - te ha concedido la vida por gracia
  - te ha dado la vida como favor
  - te ha concedido vivir
  lexicon: LSJ
  rationale: χαρίζομαι implica conceder con favor o gracia. «Concedido graciosamente» retiene la raíz de χάρις y el matiz de favor, mientras «la vida» traduce el infinitivo sustantivado τὸ ζῆν con naturalidad en español.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: En esta fórmula narrativa, «el Señor» refleja el uso reverente habitual del término griego κύριος en el contexto bíblico español, y funciona con naturalidad sintáctica tras «ha concedido». No se usa como máscara tipográfica del nombre divino, sino como la forma estable del título en esta expresión.
theological_decisions:
- issue: ἱλασμός en contexto sacerdotal y ritual
  english_pob_reading: atonement
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - atonación
  - propiciación
  rationale: El acto descrito es el del sumo sacerdote realizando un rito de purificación/expiación. «Expiación» preserva la carga sacrificial y evita reducir el término a una sola teoría doctrinal. «Propiciación» se mantiene como alternativa más técnica, pero no se impone en el texto principal.
  doctrine_reference: 'DOCTRINE.md: preservar la fuerza cultual y la tensión lexical sin sobre-teologizar'
- issue: κεχάρισται y el matiz de favor/gracia
  english_pob_reading: has graciously granted
  chosen_spanish_reading: te ha concedido graciosamente
  alternative_spanish_readings:
  - te ha concedido por gracia
  - te ha mostrado favor al concederte
  rationale: El verbo lleva el campo semántico de conceder con favor, no solo de permitir. «Graciosamente» conserva la relación con χάρις y el tono de favor inmerecido sin agregar contenido doctrinal ajeno al pasaje.
  doctrine_reference: 'DOCTRINE.md: conservar el matiz de gracia/favor en el léxico cuando el griego lo exige'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y toma como guía el audit trail inglés, pero ajusta la sintaxis para el español natural: mantiene el paralelismo de la aparición repetida, evita añadir el complemento «by him» que no está en el griego, y conserva el matiz cultual de ἱλασμός y el de favor de κεχάρισται.'
  spanish_consistency_notes:
  - Usa «sumo sacerdote» para ἀρχιερεύς en coherencia con el registro bíblico general del proyecto.
  - Mantiene «Señor» para Κύριος como título reverente estable en español.
  - Traduce νεανίαι como «jóvenes», evitando tanto arcaísmo como ambigüedad de género.
  - Conserva la mediación causal con «por medio de él» para διὰ αὐτόν.
  - Respeta el valor sustantivado de τὸ ζῆν con «la vida» en vez de una paráfrasis más larga.
