    text: 'Hebreo: «como un guerrero poderoso, formidable».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que me persiguen».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque no han comprendido» / «porque no han actuado con discernimiento».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes y el contenido de las notas para que correspondan exactamente a las palabras fuente auditadas. También se mejora la naturalidad del español en dos puntos: «Quedarán muy avergonzados» por «Serán avergonzados en gran manera», y «no han actuado sabiamente» como opción principal para reflejar mejor el valor práctico de הִשְׂכִּילוּ, dejando las alternativas documentadas en nota.'
