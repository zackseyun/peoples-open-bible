  yaml_path: translation/nt/acts/005/036.yaml
  text: For before these days Theudas rose up[a], claiming to be somebody, and a number of men, about four hundred, joined him. He was killed[c][b], and all who had been persuaded by him were scattered and came to nothing.
  footnotes:
  - marker: a
    text: Or 'claiming to be someone important.' The Greek idiom means that he presented himself as a person of significance.
    reason: lexical_alternative
  - marker: b
    text: Or 'attached themselves to him' or 'rallied to him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all who followed him.' More literally, 'all who were persuaded by him.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이 일이 있기 전에 드다라는 사람이 일어나, 자기가 대단한 사람이라고 자처하여 약 사백 명 정도의 사람이 그와 어울렸으나, 그는 죽임을 당하였고 그를 따르던 사람들은 다 흩어져 아무것도 아닌 것이 되고 말았습니다.
