    rationale: Puede sugerir una perspectiva de 'llevarse' que no es la más directa para וַיָּבִיאוּ אֶל. 'Los llevaron a Aarón' conserva mejor el sentido simple de traer/llevar hacia Aarón sin matiz adicional.
