base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/052/012.yaml
  text: Now in the fifth month[a], on the tenth day of the month—which was the nineteenth year of King Nebuchadnezzar, king of Babylon—Nebuzaradan the captain of the guard, who stood before the king of Babylon[c][b], came to Jerusalem.
  footnotes:
  - marker: a
    text: Or more literally, 'chief of the executioners' or 'chief butcher'; the title likely refers to a high royal official over the guard.
    reason: lexical_alternative
  - marker: b
    text: '''Stood before the king of Babylon'' is a court expression for serving in the king’s presence.'
    reason: cultural_note
  - marker: c
    text: Hebrew has 'in Jerusalem'; English idiom with 'came' normally uses 'to Jerusalem.'
    reason: lexical_alternative
