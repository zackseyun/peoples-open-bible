review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: Noé construye un altar a Yahvé, toma de todos los animales limpios y de todas las aves limpias con sentido partitivo contextual, y ofrece עֹלֹת sobre el altar. También respeta correctamente la política del proyecto al usar «Yahvé». Sin embargo, las notas están invertidas respecto de sus anclajes: [a] en el texto marca «Yahvé», pero la nota [a] explica el partitivo; y [b] marca «ave limpia», pero la nota [b] repite información sobre el partitivo. Hace falta reparar esa correspondencia.'
  spanish_quality_summary: El español es claro, natural y digno. «Edificó», «altar», «ave» y «ofreció» funcionan bien. «Holocaustos» es una opción bíblica válida y legible en este contexto. El principal problema es de aparato de notas, no de redacción principal.
  glossary_alignment: Se alinea con la terminología del proyecto en «Yahvé», «Dios» no aplica, y el tratamiento sacrificial es consistente. La decisión «holocaustos» para עֹלֹת es aceptable dentro del registro bíblico español. No hay conflicto terminológico mayor, salvo que la nota sobre Yahvé debe reflejar correctamente la razón lexical/teológica en vez de una alternativa trivial.
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden a los anclajes del texto.
    rationale: En «Yahvé[a]» la nota debería tratar el nombre divino יהוה, pero actualmente [a] dice «O, más literalmente, “a Yahvé”», lo cual no añade nada útil. En cambio, la explicación del sentido partitivo pertenece al segmento «tomó algunos de cada...», no a «ave limpia[b]» tal como está redactado.
  - severity: low
    issue: La nota [a] es redundante y poco informativa.
    rationale: Decir «O, más literalmente, “a Yahvé”» no ofrece una alternativa real ni una aclaración útil. Conviene usar esa nota para explicar que el hebreo tiene «a YHWH» y que se vierte «a Yahvé» conforme a la convención del proyecto.
  revised_spanish_text: Entonces Noé edificó un altar a Yahvé[a], y tomó algunos[b] de cada animal limpio y de cada ave limpia, y ofreció holocaustos sobre el altar.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «a YHWH»; aquí se vierte el nombre divino como «Yahvé» conforme a la convención del proyecto.'
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «tomó de cada animal limpio y de cada ave limpia»; el sentido es partitivo, es decir, tomó algunos de cada clase apta para sacrificio.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto, pero se corrigen los anclajes y el contenido de las notas para que correspondan al hebreo y al texto español. La nota del nombre divino ahora explica adecuadamente יהוה → «Yahvé», y la nota partitiva se ancla en «algunos», donde realmente aclara la expansión óptimo-equivalente.
