translation:
  language: es
  text: Tendrá compasión del pobre y del necesitado, y salvará las vidas[a] de los necesitados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las almas de los necesitados». El término hebreo puede significar «vida», «yo», «persona» o «alma», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָחֹס
  english_pob_choice: will have compassion
  chosen_spanish: tendrá compasión
  alternatives_spanish:
  - tendrá piedad
  - perdonará
  - se apiadará
  lexicon: HALOT
  rationale: El verbo expresa aquí un trato compasivo hacia personas vulnerables. «Tendrá compasión» reproduce bien el valor afectivo y relacional del hebreo sin introducir la idea de perdonar pecados ni una omisión judicial que no aparece en el verso.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: de
  alternatives_spanish:
  - sobre
  - para
  - hacia
  lexicon: HALOT
  rationale: Con un verbo de compasión, el español natural suele expresar el objeto con «de» o con una construcción equivalente. «De» mantiene la relación sin sonar forzada en español.
- source_word: דַּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el débil
  - el humilde
  - el menesteroso
  lexicon: HALOT
  rationale: דַּל puede señalar pobreza o debilidad social. Aquí «el pobre» es el equivalente más claro y directo en español, conservando la dimensión socioeconómica que el contexto poético sugiere.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el indigente
  - el menesteroso
  lexicon: HALOT
  rationale: Se distingue de דַּל para conservar el paralelismo poético. «Necesitado» evita repetir «pobre» y comunica bien la idea de carencia o dependencia.
- source_word: נַפְשׁוֹת
  english_pob_choice: the lives
  chosen_spanish: las vidas
  alternatives_spanish:
  - las almas
  - las personas
  - los seres
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ apunta a vida, persona o ser viviente, no necesariamente al sentido teológico posterior de «alma». «Las vidas» preserva la lectura concreta de salvación y evita imponer una antropología ajena al verso.
- source_word: אֶבְיוֹנִים
  english_pob_choice: the needy
  chosen_spanish: de los necesitados
  alternatives_spanish:
  - de los pobres
  - de los indigentes
  - de los menesterosos
  lexicon: HALOT
  rationale: Mantengo la correspondencia con אֶבְיוֹן mediante «necesitados», pero en plural y con artículo genitivo para que el español suene natural. Así se conserva la repetición léxica sin perder fluidez.
- source_word: יוֹשִׁיעַ
  english_pob_choice: he will save
  chosen_spanish: salvará
  alternatives_spanish:
  - rescatará
  - librará
  - dará salvación a
  lexicon: HALOT
  rationale: El causativo de ישׁע suele significar salvar o librar. «Salvará» es la opción más directa y mantiene la conexión verbal con el lenguaje bíblico de salvación sin sobreespecificar el modo de la acción.
theological_decisions:
- issue: Sentido de נַפְשׁוֹת en un contexto de protección real
  english_pob_reading: Rendered as 'the lives' rather than 'the souls.'
  chosen_spanish_reading: «las vidas»
  alternative_spanish_readings:
  - «las almas»
  - «las personas»
  rationale: El hebreo permite un rango semántico amplio, pero en este contexto la referencia más natural es a la vida concreta de personas necesitadas. «Las vidas» evita una lectura dualista innecesaria y conserva la tensión semántica del término.
  doctrine_reference: Prioridad del sentido hebreo contextual sobre la terminología religiosa tradicional.
translation_notes:
  revision_awareness: 'El texto coincide con la decisión revisada del expediente inglés: no se requieren cambios adicionales; se conserva la distinción entre דַּל y אֶבְיוֹן, y נַפְשׁוֹת se vierte como «vidas» para reflejar el contexto.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo poético con dos términos distintos: «pobre» / «necesitado».'
  - Se evita la sustitución por «Señor» u otra terminología de máscara, ya que el verso no contiene el Tetragrámaton.
  - «Salvará» conserva el lenguaje bíblico de liberación sin forzar una paráfrasis interpretativa.
