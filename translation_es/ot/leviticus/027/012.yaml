  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sacerdote» para הַכֹּהֵן es correcto. La elección de «tasará / tasación» concuerda con la decisión lexical documentada para el acto de valorar oficialmente. La nota conserva la alternativa literal relevante sobre «tu tasación» y explica bien por qué el sentido contextual remite a la valoración sacerdotal.
