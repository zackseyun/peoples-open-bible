translation:
  language: es
  text: Porque yo, Yahvé, no cambio; y ustedes, hijos de Jacob[b], no han llegado a su fin.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no han sido consumidos», «no han perecido» o «no han sido acabados». El verbo hebreo puede expresar haber llegado al fin, ser consumidos o perecer.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Jacob», una designación de pacto para los descendientes de Jacob, es decir, Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Marca la relación explicativa o de fundamento con la declaración anterior. «Porque» conserva esa fuerza causal/explanatoria en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino: «Yahvé», manteniendo el Tetragrámaton sin sustituirlo por un título enmascarado.'
- source_word: שָׁנִיתִי
  english_pob_choice: do not change
  chosen_spanish: no cambio
  alternatives_spanish:
  - no he cambiado
  - no soy mutable
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una constancia vigente y permanente. En español, el presente gnómico «no cambio» comunica bien esa afirmación sin cargarla con una formulación filosófica ajena al texto.
- source_word: בְּנֵי יַעֲקֹב
  english_pob_choice: sons of Jacob
  chosen_spanish: hijos de Jacob
  alternatives_spanish:
  - descendientes de Jacob
  - hijos varones de Jacob
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino de filiación/covenio. «Hijos de Jacob» preserva la forma y es más natural en español que un calco literal de «sons».
- source_word: כְלִיתֶם
  english_pob_choice: have not come to an end
  chosen_spanish: no han llegado a su fin
  alternatives_spanish:
  - no han sido consumidos
  - no han perecido
  - no se han acabado
  lexicon: HALOT
  rationale: El verbo puede abarcar la idea de acabar, consumirse o perecer. «No han llegado a su fin» mantiene ese rango semántico sin restringirlo a una sola modalidad de juicio o destrucción.
- source_word: וְ/אַתֶּם
  english_pob_choice: and you
  chosen_spanish: y ustedes
  alternatives_spanish:
  - y vosotros
  - pero ustedes
  lexicon: HALOT
  rationale: La conjunción hebrea es simplemente coordinante. «Y» evita introducir una relación lógica más fuerte que la del texto; «ustedes» ofrece claridad y registro público en español latinoamericano.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Se conserva el nombre pactal «Yahvé» para mantener la transparencia textual y la alineación con la guía terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Afirmación de la constancia divina
  english_pob_reading: do not change
  chosen_spanish_reading: no cambio
  alternative_spanish_readings:
  - no he cambiado
  - soy inmutable
  rationale: La frase comunica la permanencia constante de Yahvé. «No cambio» preserva la afirmación bíblica sin convertirla en una categoría filosófica abstracta que el verso no desarrolla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Designación de Israel como hijos de Jacob
  english_pob_reading: sons of Jacob
  chosen_spanish_reading: hijos de Jacob
  alternative_spanish_readings:
  - descendientes de Jacob
  - casa de Jacob
  rationale: La expresión hebrea es una designación de pacto para los descendientes de Jacob/Israel. «Hijos de Jacob» mantiene la referencia histórica y la forma masculina plural del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «and» en lugar de una conexión inferida como «therefore». Por eso se usa «y» en español, sin añadir una conclusión explícita inexistente en el hebreo. También se mantiene el tono gnómico de la afirmación divina y la amplitud semántica de כְלִיתֶם mediante una frase no restrictiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se evita «SEÑOR» como sustituto editorial.
  - «Hijos de Jacob» conserva el plural masculino del hebreo y su valor pactual.
  - La negación verbal en presente («no cambio») refleja constancia permanente y es consistente con el modo en que el POB inglés actualiza el perfecto hebreo.
  - La puntuación separa las dos cláusulas principales con punto y coma para respetar la coordinación sin forzar causalidad explícita.
