    text: Or 'They were among the rebels against the light.' The Hebrew verb can be read as past ('were'), but in this poetic context it likely describes an ongoing class of people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his ways ... his paths'; the suffixes most naturally refer to 'light,' hence 'its ways ... its paths' in English.
    reason: lexical_alternative
