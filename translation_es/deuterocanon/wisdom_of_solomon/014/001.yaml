translation:
  language: es
  text: De nuevo[a], alguien que se prepara para navegar y está a punto de atravesar olas furiosas se sube a un madero más frágil que el barco que lo lleva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un madero más podrido que el barco que lo lleva». El comparativo griego puede sugerir tanto fragilidad o falta de solidez como deterioro material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰλοῦν
  english_pob_choice: preparing to sail
  chosen_spanish: se prepara para navegar
  alternatives_spanish:
  - está por zarpar
  - se dispone a navegar
  lexicon: LSJ
  rationale: El participio indica una preparación para emprender viaje por mar. En español, 'se prepara para navegar' conserva la idea de disposición previa y suena natural en el contexto náutico.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - una persona
  - un hombre
  lexicon: LSJ
  rationale: El indefinido griego es singular e inespecífico. 'Alguien' mantiene esa indefinición sin imponer género, mientras que el griego aquí funciona como sujeto representativo.
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Una vez más
  lexicon: LSJ
  rationale: '''Otra vez'' reproduce con naturalidad la reanudación de un ejemplo ilustrativo y evita solemnidad innecesaria.'
- source_word: ἄγρια
  english_pob_choice: wild
  chosen_spanish: furiosas
  alternatives_spanish:
  - violentas
  - salvajes
  - bravas
  lexicon: LSJ
  rationale: El adjetivo describe el carácter amenazante de las olas. 'Furiosas' comunica bien esa intensidad en español y conserva el tono vívido.
- source_word: διοδεύειν
  english_pob_choice: to pass through
  chosen_spanish: atravesar
  alternatives_spanish:
  - cruzar
  - pasar por
  - recorrer
  lexicon: LSJ
  rationale: El infinitivo expresa el paso a través de las olas, no solo el acercamiento. 'Atravesar' preserva esa idea de pasar por en medio del peligro.
- source_word: κύματα
  english_pob_choice: waves
  chosen_spanish: olas
  alternatives_spanish:
  - olas del mar
  - ondas
  - oleaje
  lexicon: LSJ
  rationale: '''Olas'' es el equivalente más directo y natural para el cuadro náutico.'
- source_word: τοῦ φέροντος αὐτὸν πλοίου
  english_pob_choice: the ship that carries him
  chosen_spanish: el barco que lo lleva
  alternatives_spanish:
  - la nave que lo transporta
  - el barco que lo transporta
  - la nave que lo lleva
  lexicon: LSJ
  rationale: La construcción genitiva identifica al barco como medio de transporte. 'Lo lleva' es claro, idiomático y mantiene la relación funcional sin sobrecargar el estilo.
- source_word: σαθρότερον
  english_pob_choice: more fragile
  chosen_spanish: más frágil
  alternatives_spanish:
  - más podrida
  - más endeble
  - más deteriorada
  lexicon: LSJ
  rationale: El comparativo admite la idea de debilidad o descomposición. 'Más frágil' conserva la comparación sin reducirla solo a corrupción material.
- source_word: ξύλον
  english_pob_choice: piece of wood
  chosen_spanish: una madera
  alternatives_spanish:
  - un trozo de madera
  - un madero
  - madera
  lexicon: LSJ
  rationale: El contraste irónico se entiende con 'una madera' en español, que permite aludir al objeto de madera sobre el que se sube sin añadir material inexistente en el griego.
- source_word: ἐπιβᾶται
  english_pob_choice: boards
  chosen_spanish: se sube a
  alternatives_spanish:
  - sube a
  - se monta en
  - embarca en
  lexicon: LSJ
  rationale: El verbo expresa la acción de subir o ponerse sobre algo. 'Se sube a' conserva el gesto físico de la imagen y funciona bien con el objeto de madera.
theological_decisions:
- issue: Indefinido singular representativo
  english_pob_reading: someone
  chosen_spanish_reading: alguien
  alternative_spanish_readings:
  - una persona
  - un hombre
  rationale: El griego presenta un caso representativo, no una figura doctrinal. 'Alguien' respeta la indefinición del sujeto sin añadir contenido ajeno al texto.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral; §1 Original-language primacy
- issue: Fuerza de σαθρότερον ξύλον
  english_pob_reading: more fragile wood / more rotten piece of wood
  chosen_spanish_reading: más frágil madera
  alternative_spanish_readings:
  - más podrida madera
  - más endeble madera
  rationale: La comparación busca resaltar la ironía de confiar en un soporte precario. 'Más frágil' preserva la amplitud semántica entre deterioro físico y debilidad estructural sin cerrar el sentido demasiado pronto.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy; §6 Readable modern Spanish
translation_notes:
  revision_awareness: El inglés auditado pasó de 'a man' a 'someone' y luego simplificó 'more fragile wood'. La versión española sigue la revisión más reciente en la indefinición del sujeto, pero conserva la ambigüedad lexical de σαθρότερον con una nota alternativa para no perder la posible idea de deterioro material.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - '''Alguien'' conserva el valor indefinido del griego mejor que ''un hombre'' en este contexto.'
  - '''Olas'' y ''barco'' sostienen un registro náutico natural en español.'
  - La comparación queda explícita sin añadir artículos o sustantivos innecesarios al núcleo de la imagen.
