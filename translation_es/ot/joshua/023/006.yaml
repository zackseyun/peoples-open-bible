translation:
  language: es
  text: Por tanto, sean muy fuertes para guardar y hacer todo lo que está escrito en el Libro de la Ley de Moisés[a], para no apartarse de él ni a la derecha ni a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el Libro de la Instrucción de Moisés'; la palabra hebrea torá puede significar 'instrucción' además de 'ley', aunque aquí se refiere específicamente al corpus legal mosaico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַחֲזַקְתֶּם
  english_pob_choice: be very strong
  chosen_spanish: sean muy fuertes
  alternatives_spanish:
  - sean fuertes
  - manténganse muy firmes
  - sean valientes
  lexicon: HALOT
  rationale: חזק expresa fortaleza, firmeza y robustez; en un mandato colectivo, 'sean muy fuertes' conserva el énfasis exhortativo de 'be very strong' sin perder naturalidad en español.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  - excesivamente
  lexicon: HALOT
  rationale: Es un intensificador simple. 'Muy' reproduce bien la fuerza del hebreo con español actual y claro.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - cumplir
  - vigilar
  lexicon: HALOT
  rationale: En un contexto de pacto y mandamiento, שׁמר puede ser 'guardar' en el sentido de cumplir fielmente. 'Guardar' mantiene la cercanía al verbo de la fuente y funciona con 'hacer'.
- source_word: וְלַעֲשׂוֹת
  english_pob_choice: and to do
  chosen_spanish: y hacer
  alternatives_spanish:
  - y cumplir
  - y poner por obra
  - y ejecutar
  lexicon: HALOT
  rationale: עשה en este marco legal se refiere a realizar/obedecer lo mandado. 'Hacer' preserva la formulación hebrea y la pareja tradicional 'guardar y hacer' sin sobreinterpretar.
- source_word: כָּל הַכָּתוּב
  english_pob_choice: all that is written
  chosen_spanish: todo lo que está escrito
  alternatives_spanish:
  - todo lo escrito
  - cuanto está escrito
  - todo lo que fue escrito
  lexicon: HALOT
  rationale: La construcción abarca el contenido escrito en su totalidad. 'Todo lo que está escrito' es natural en español y refleja bien la plenitud del hebreo.
- source_word: בְּסֵפֶר תּוֹרַת מֹשֶׁה
  english_pob_choice: in the Book of the Law of Moses
  chosen_spanish: en el Libro de la Ley de Moisés
  alternatives_spanish:
  - en el Libro de la Instrucción de Moisés
  - en el libro de la ley de Moisés
  - en el rollo de la Ley de Moisés
  lexicon: HALOT
  rationale: En esta fórmula fija, תּוֹרָה designa el corpus legal mosaico; por eso 'Ley' es el equivalente más preciso en español. 'Libro' mantiene la forma común y comprensible de סֵפֶר.
- source_word: לְבִלְתִּי סוּר
  english_pob_choice: so as not to turn
  chosen_spanish: para no apartarse
  alternatives_spanish:
  - para no desviarse
  - a fin de no apartarse
  - para no volverse atrás
  lexicon: HALOT
  rationale: El infinitivo de propósito indica evitar una desviación. 'Apartarse' expresa con naturalidad en español la idea idiomática de dejar el camino recto.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - de ella
  - del mismo
  lexicon: HALOT
  rationale: El sufijo singular remite al libro/la ley como unidad. 'De él' conserva esa referencia singular y es la forma española más directa.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - a la derecha o a la izquierda
  - ni hacia la derecha ni hacia la izquierda
  - ni a derecha ni a izquierda
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de desviación en cualquiera de los dos sentidos. La doble negación en español comunica mejor la prohibición total de apartarse.
theological_decisions:
- issue: Valor de תּוֹרָה en el sintagma fijado 'תּוֹרַת מֹשֶׁה'
  english_pob_reading: Law in 'the Book of the Law of Moses'
  chosen_spanish_reading: Ley en 'el Libro de la Ley de Moisés'
  alternative_spanish_readings:
  - Instrucción en 'el Libro de la Instrucción de Moisés'
  - Enseñanza en 'el Libro de la Enseñanza de Moisés'
  rationale: Aunque תּוֹרָה puede significar 'instrucción' o 'enseñanza', aquí la referencia es al cuerpo normativo mosaico. 'Ley' conserva ese sentido jurídico-covenantal que la fórmula exige y coincide con el uso bíblico tradicional sin ocultar la amplitud semántica.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Cómo expresar el mandato preventivo de לְבִלְתִּי סוּר מִמֶּנּוּ
  english_pob_reading: so as not to turn from it
  chosen_spanish_reading: para no apartarse de él
  alternative_spanish_readings:
  - para no desviarse de él
  - a fin de no apartarse de él
  - para no torcerse de él
  rationale: El hebreo no solo describe un movimiento físico sino una desviación normativa. 'Apartarse' comunica bien el sentido moral y covenantal de no desviarse del texto/ley sin introducir una imagen ajena.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve idiom and covenantal force.'
translation_notes:
  revision_awareness: El texto inglés POB y la auditoría léxica muestran alta concordancia y no registran revisiones aplicadas; este borrador sigue la misma lectura, preservando la fórmula fija 'Libro de la Ley de Moisés' y el modismo de no apartarse ni a derecha ni a izquierda.
  spanish_consistency_notes:
  - Se mantuvo 'Ley' para תּוֹרָה en la fórmula mosaica fija, coherente con la decisión inglesa auditada y con el contexto jurídico del pasaje.
  - Se tradujo וַחֲזַקְתֶּם por 'sean muy fuertes' para conservar la fuerza exhortativa del plural.
  - Se optó por 'guardar y hacer' como pareja verbal estable, evitando reemplazos interpretativos como 'obedecer' que debilitan la correspondencia formal.
  - La negación doble 'ni a la derecha ni a la izquierda' refleja el hebraísmo de desviación total y suena natural en español bíblico actual.
