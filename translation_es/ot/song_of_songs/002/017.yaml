translation:
  language: es
  text: Hasta que el día[a] respire y las sombras huyan, gira, amado mío; sé como una gacela o como un cervatillo sobre los montes de Bether[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hasta que el día se refresque». El hebreo dice literalmente que el día «respira» o «sopla»; es una expresión poética que suele entenderse como la brisa de la tarde o el frescor del alba.'
    reason: lexical_alternative
  - marker: b
    text: «Bether» quizá sea un nombre de lugar. También podría significar «montes de separación» o, menos probablemente, «montes escarpados».
    reason: alternative_reading
lexical_decisions:
- source_word: עַד שֶׁיָּפוּחַ הַיּוֹם
  english_pob_choice: Until the day breathes
  chosen_spanish: Hasta que el día despunte
  alternatives_spanish:
  - Hasta que el día respire
  - Hasta que el día sople
  - Hasta que el día se refresque
  lexicon: HALOT
  rationale: El hebreo presenta una imagen poética del día 'soplando' o 'respirando'. En español, 'despuntar' comunica de manera natural el inicio del día sin perder el sentido de transición temporal. Se conserva la metáfora en la nota, porque 'respire' sería más literal pero menos idiomático en español.
- source_word: וְנָסוּ הַצְּלָלִים
  english_pob_choice: and the shadows flee
  chosen_spanish: y las sombras huyan
  alternatives_spanish:
  - y las sombras se vayan
  - y las sombras desaparezcan
  - y las sombras pasen
  lexicon: HALOT
  rationale: Se mantiene la fuerza verbal de נוּס con 'huyan', que conserva el movimiento poético de las sombras retirándose. 'Desaparezcan' suaviza la imagen; 'huyan' la mantiene más cercana al verbo hebreo.
- source_word: סֹב
  english_pob_choice: turn
  chosen_spanish: vuelve
  alternatives_spanish:
  - gira
  - vuélvete
  - regresa
  lexicon: HALOT
  rationale: El imperativo puede expresar giro o retorno según el contexto. En español, 'vuelve' funciona de manera natural como llamada afectuosa al amado y puede abarcar el movimiento implícito sin sonar rígido.
- source_word: דְּמֵה לְךָ
  english_pob_choice: be like
  chosen_spanish: sé como
  alternatives_spanish:
  - hazte como
  - asemeja a ti mismo como
  - parece como
  lexicon: HALOT
  rationale: La construcción expresa comparación. 'Sé como' es la forma más natural en español para un imperativo de semejanza y preserva la metáfora sin explicitarla de más.
- source_word: דוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: amado mío
  alternatives_spanish:
  - mi amado
  - mi amado mío
  - mi amor
  lexicon: HALOT
  rationale: '''Amado mío'' mantiene el tono íntimo de דוֹדִי y su valor relacional en Cantar, sin caer en la ambigüedad afectiva de ''mi amor'' ni en una formulación excesivamente rígida.'
- source_word: לִצְבִי
  english_pob_choice: like a gazelle
  chosen_spanish: como una gacela
  alternatives_spanish:
  - como una cierva
  - como un venado
  lexicon: HALOT
  rationale: Se conserva 'gacela' para reflejar la imagen concreta del hebreo y el paralelo con el joven ciervo. Es la opción más clara y reconocible en español.
- source_word: לְעֹפֶר הָאַיָּלִים
  english_pob_choice: or a young stag
  chosen_spanish: o como un cervatillo de los ciervos
  alternatives_spanish:
  - o como un joven ciervo
  - o como un corzo joven
  lexicon: HALOT
  rationale: עֹפֶר designa un animal joven; con אַיָּלִים, el paralelismo apunta a un ciervo joven. 'Cervatillo de los ciervos' conserva el matiz de juventud, aunque en español resulta algo más marcado que 'joven ciervo'. Se elige por cercanía imagética y porque mantiene el contraste paralelo con la gacela.
- source_word: עַל הָרֵי בָתֶר
  english_pob_choice: on the mountains of Bether
  chosen_spanish: sobre los montes de Bether
  alternatives_spanish:
  - sobre los montes de separación
  - sobre los montes escarpados
  lexicon: HALOT
  rationale: Se preserva la transliteración 'Bether' porque el hebreo es incierto y puede ser un topónimo. 'Montes de separación' o 'escarpados' son interpretaciones posibles, pero el texto base de la POB mantiene la ambigüedad con el nombre transliterado.
translation_notes:
  revision_awareness: No se requieren revisiones respecto al tramo anterior del POB inglés auditado; la versión española conserva la ambigüedad poética principal (día que ‘respira/sopla’, y Bether como posible topónimo) y ajusta la sintaxis a un español natural sin perder el paralelismo.
  spanish_consistency_notes:
  - Se usa «amado mío» para דוֹדִי, coherente con el registro afectivo del Cantar.
  - Se mantiene «gacela» y «cervatillo» para reflejar el paralelismo zoológico del hebreo.
  - Se conserva «Bether» transliterado para no resolver prematuramente una ambigüedad textual/geográfica.
  - La puntuación con dos puntos y coma refuerza la cadencia poética sin alterar el contenido semántico.
