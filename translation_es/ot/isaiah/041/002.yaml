translation:
  language: es
  text: ¿Quién suscitó del oriente a uno, llamándolo en justicia[a] a sus pies? Entrega naciones delante de él y subyuga reyes; los entrega como polvo a su espada[b], como rastrojo arrastrado a su arco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en victoria/justicia»; la expresión hebrea es difícil, y «justicia» también puede llevar aquí el sentido de vindicación o de causa justa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y subyuga reyes delante de él» o «y lo hace pisotear reyes»; el hebreo de esta cláusula es textualmente y sintácticamente difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵעִיר
  english_pob_choice: has stirred up
  chosen_spanish: levantó
  alternatives_spanish:
  - despertó
  - suscitó
  lexicon: HALOT
  rationale: El hebreo en hifil expresa causar que alguien se levante o entre en acción. «Levantó» conserva la fuerza causativa y suena natural en español bíblico contemporáneo.
- source_word: מִמִּזְרָח
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - del este
  - desde el este
  lexicon: HALOT
  rationale: «Oriente» refleja bien el valor geográfico del término hebreo y mantiene un registro bíblico claro sin ser arcaizante en exceso.
- source_word: צֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - en justicia vindicadora
  lexicon: HALOT
  rationale: El término puede abarcar justicia, rectitud o vindicación. «En justicia» conserva el núcleo léxico y deja abierta la posible fuerza de vindicación indicada en la nota inglesa.
- source_word: יִקְרָאֵהוּ לְרַגְלוֹ
  english_pob_choice: calling him in righteousness to his feet
  chosen_spanish: llama en justicia a sus pies
  alternatives_spanish:
  - lo convoca para su servicio
  - lo llama a su presencia
  lexicon: HALOT
  rationale: La construcción es difícil; «a sus pies» preserva la imagen hebrea de estar al servicio o a disposición de otro, sin resolverla demasiado. «Llama» reproduce el valor de convocar/summon.
- source_word: יִתֵּן לְפָנָיו גּוֹיִם
  english_pob_choice: He gives nations before him
  chosen_spanish: Entrega naciones delante de él
  alternatives_spanish:
  - Pone naciones delante de él
  - Entrega pueblos delante de él
  lexicon: HALOT
  rationale: «Entrega» comunica la idea de poner o ceder pueblos en manos del vencedor. «Delante de él» sigue la estructura hebrea y conserva la imagen espacial.
- source_word: וּמְלָכִים יַרְדְּ
  english_pob_choice: and subdues kings
  chosen_spanish: y subyuga reyes
  alternatives_spanish:
  - y somete reyes
  - y domina reyes
  lexicon: HALOT
  rationale: La tradición textual y sintáctica es difícil; la lectura más natural en español para el sentido de dominación es «subyuga reyes». Conserva la idea de someter sin introducir una explicación interpretativa excesiva.
- source_word: יִתֵּן כֶּעָפָר חַרְבּוֹ
  english_pob_choice: he gives them like dust to his sword
  chosen_spanish: los entrega como polvo a su espada
  alternatives_spanish:
  - los hace como polvo ante su espada
  - los da como polvo a su espada
  lexicon: HALOT
  rationale: El objeto implícito se entiende por el contexto (naciones y reyes). «Como polvo» reproduce la comparación hebrea; «a su espada» mantiene el giro poco usual del original sin reconfigurarlo.
- source_word: כְּקַשׁ נִדָּף קַשְׁתּוֹ
  english_pob_choice: like driven stubble to his bow
  chosen_spanish: como rastrojo arrastrado a su arco
  alternatives_spanish:
  - como paja llevada por el viento a su arco
  - como rastrojo que vuela ante su arco
  lexicon: HALOT
  rationale: «Rastrojo» conserva el campo agrícola mejor que «paja» y «arrastrado» intenta reflejar נִדָּף como algo llevado o dispersado. Se mantiene la dificultad del paralelismo con una imagen inteligible.
theological_decisions:
- issue: Identidad del que viene desde el oriente
  english_pob_reading: Leave the figure unnamed in the translation
  chosen_spanish_reading: Dejar la figura sin identificar en el texto principal
  alternative_spanish_readings:
  - Ciro
  - Abraham
  - un conquistador ideal levantado por Dios
  rationale: El hebreo no lo nombra. Nombrarlo en el texto principal cerraría una tensión interpretativa que el pasaje deja abierta; por eso se preserva la referencia indefinida.
  doctrine_reference: 'Transparencia textual: preservar la tensión interpretativa del pasaje'
- issue: Sentido de צֶדֶק en la expresión inicial
  english_pob_reading: righteousness may also carry the sense of vindication or just cause
  chosen_spanish_reading: «en justicia» con nota sobre posible vindicación
  alternative_spanish_readings:
  - en rectitud
  - con justicia vindicadora
  - en victoria
  rationale: La expresión hebrea admite más de un matiz. El texto principal conserva «justicia» y la nota explica que también puede entenderse como vindicación o causa justa, sin borrar la ambigüedad documentada.
  doctrine_reference: HALOT; decisión lexical con ambigüedad preservada
- issue: Final de וּמְלָכִים יַרְדְּ
  english_pob_reading: or 'and subdues kings' or 'and makes him tread down kings'; the Hebrew of this clause is textually and syntactically difficult
  chosen_spanish_reading: «y subyuga reyes» con nota alternativa
  alternative_spanish_readings:
  - y hace que reyes desciendan
  - y hace que pise reyes
  - y somete reyes
  rationale: La cláusula es difícil y admite varias soluciones. «Subyuga» refleja bien el sentido de dominación sin afirmar más de lo que el hebreo permite; la nota mantiene las alternativas relevantes.
  doctrine_reference: Crítica textual y sintáctica del hebreo
- issue: Léxico de calidad humana en la comparación final
  english_pob_reading: like driven stubble to his bow
  chosen_spanish_reading: como rastrojo arrastrado a su arco
  alternative_spanish_readings:
  - como paja arrastrada a su arco
  - como rastrojo impulsado por el viento a su arco
  rationale: La imagen agrícola debe conservarse. «Rastrojo» y «arrastrado» mantienen la fuerza pictórica de la comparación sin diluirla en una explicación demasiado libre.
  doctrine_reference: HALOT; imagen poética del hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «subdues kings» frente a «makes kings rule». En español se optó por «subyuga reyes», que preserva el sentido de sometimiento y evita la lectura errónea de hacerlos gobernar. También se mantuvo la ambigüedad del personaje no identificado y se reflejó la dificultad de צֶדֶק y de יַרְדְּ mediante nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto no lo exigía; este versículo no contiene el nombre divino explícito.
  - Se prefirió «oriente» por su claridad y registro bíblico.
  - Se mantuvo el tono poético y sintácticamente denso del hebreo sin convertirlo en paráfrasis interpretativa.
  - 'Se respetó la ambigüedad del versículo en dos puntos clave: la identidad del personaje y el valor de la cláusula sobre los reyes.'
