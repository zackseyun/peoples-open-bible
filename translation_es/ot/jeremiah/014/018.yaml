base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/014/018.yaml
  text: If I go out into the field[a], look—those slain by the sword! And if I enter the city[b], look—those sick with famine! For both prophet and priest go about in the land and do not know.
  footnotes:
  - marker: a
    text: Or, 'both prophet and priest go about trading in the land and do not understand,' since the Hebrew verb can carry a commercial sense as well as movement.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew. It may also mean 'they have gone into a land they do not know' or simply 'they do not understand.'
    reason: alternative_reading
