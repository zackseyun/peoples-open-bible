- from: Y pondrá su mano sobre su cabeza y lo degollará delante del tabernáculo de reunión, y los hijos de Aarón rociarán su sangre alrededor sobre el altar.
  to: Y pondrá su mano sobre su cabeza y lo degollará delante de la tienda de reunión, y los hijos de Aarón arrojarán[a] su sangre contra el altar alrededor.
  rationale: 'Se revisa para reflejar con mayor fidelidad el hebreo y la auditoría inglesa en el punto principal del rito de la sangre: וזרקו exige una acción de arrojar, no de rociar. También se ajusta «contra el altar» para acompañar naturalmente ese verbo y se preserva la nota léxica correspondiente. Se adopta «tienda de reunión» por mayor cercanía a אהל מועד, manteniendo un español claro y digno.'
