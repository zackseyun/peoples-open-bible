translation:
  language: es
  text: Así David prevaleció sobre el filisteo con una honda y con una piedra; golpeó al filisteo y lo mató[a], aunque no había espada en la mano de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y no había espada en la mano de David». El hebreo permite leer la conjunción de manera más simplemente aditiva; la traducción principal usa «aunque» para expresar la fuerza concesiva del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  english_pob_choice: prevailed over
  chosen_spanish: prevaleció sobre
  alternatives_spanish:
  - fue más fuerte que
  - venció a
  lexicon: HALOT
  rationale: En esta construcción con מִן, el verbo expresa que David resultó superior al adversario, no solo que “se fortaleció”. «Prevaleció sobre» conserva esa idea de superioridad en combate y suena natural en español.
- source_word: מִן הַפְּלִשְׁתִּי
  english_pob_choice: over the Philistine
  chosen_spanish: sobre el filisteo
  alternatives_spanish:
  - contra el filisteo
  - más que el filisteo
  lexicon: HALOT
  rationale: Con חזק, מִן marca al oponente sobre quien se impone David. En español, «sobre» comunica bien esa relación de ventaja.
- source_word: בַּקֶּלַע
  english_pob_choice: with a sling
  chosen_spanish: con una honda
  alternatives_spanish:
  - mediante una honda
  - con el tirachinas
  lexicon: HALOT
  rationale: El ב instrumental pide un medio de acción. «Honda» es el equivalente bíblico y claro en español; «tirachinas» sería demasiado coloquial y menos preciso en contexto antiguo.
- source_word: וּבָאֶבֶן
  english_pob_choice: and with a stone
  chosen_spanish: y con una piedra
  alternatives_spanish:
  - y mediante una piedra
  lexicon: HALOT
  rationale: 'Se conserva el singular del hebreo: no dice “piedras”, sino una piedra. «Con» mantiene el valor instrumental sin forzar la frase.'
- source_word: וַיַּךְ
  english_pob_choice: he struck
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo derribó
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir según contexto. Aquí, en una escena mortal de combate, «lo hirió» expresa el impacto decisivo sin sonar arcaico; la muerte se explicita en el verbo siguiente.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: and killed him
  chosen_spanish: y lo mató
  alternatives_spanish:
  - y le dio muerte
  - y lo hizo morir
  lexicon: HALOT
  rationale: El hifil de מות significa causar la muerte. «Lo mató» es la forma directa y fiel en español.
- source_word: וְחֶרֶב אֵין בְּיַד דָּוִד
  english_pob_choice: though there was no sword in David’s hand
  chosen_spanish: aunque no había espada en la mano de David
  alternatives_spanish:
  - y no había espada en la mano de David
  - pero no había espada en la mano de David
  lexicon: HALOT
  rationale: La cláusula es circunstancial y tiene fuerza concesiva en contexto; por eso «aunque» reproduce bien el contraste. Se conserva la imagen concreta «en la mano de David».
- source_word: בְּיַד דָּוִד
  english_pob_choice: in David’s hand
  chosen_spanish: en la mano de David
  alternatives_spanish:
  - en poder de David
  - en manos de David
  lexicon: HALOT
  rationale: Se mantiene la metáfora corporal del texto hebreo. En español, «mano» es natural en un contexto de armas y combate.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y coincide en sustancia con el auditable English POB: prevalecer sobre, honda, piedra singular, herir/matar, y la cláusula final concesiva. No se detectan revisiones aplicadas en el contexto inglés; se conserva la misma decisión interpretativa en español.'
  spanish_consistency_notes:
  - Se usa «filisteo» en minúscula por tratarse del gentilicio/etnónimo común en la narración.
  - Se conserva «honda» como término bíblico claro y no se sustituye por un equivalente moderno coloquial.
  - Se mantiene la imagen de «la mano de David» para reflejar el hebreo, aun cuando la escena sugiere ausencia de espada como medio de combate.
