translation:
  language: es
  text: Así que los extranjeros no tomaron en cuenta[a] en absoluto la beneficencia[b] por la que la nación era conocida en todas partes;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no tuvieron en cuenta'', ''no consideraron''. El verbo griego está relacionado literalmente con contar o enumerar, pero aquí tiene el sentido de dar peso a algo o tomarlo en consideración.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'buen proceder' o 'buenas obras'. εὐπραξία aquí no se limita a prosperidad material.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν ... εὐπραξίαν
  english_pob_choice: the beneficence
  chosen_spanish: la beneficencia
  alternatives_spanish:
  - la buena conducta
  - las buenas obras
  - el buen hacer
  lexicon: LSJ
  rationale: εὐπραξία puede abarcar buen obrar, buen proceder o prosperidad; en este contexto, con θρυλουμένην y περὶ τὸ γένος, la idea es una cualidad o desempeño ampliamente reconocido. 'Beneficencia' conserva el peso de obras/acción beneficiosa sin reducirlo solo a conducta moral.
- source_word: περὶ τὸ γένος
  english_pob_choice: for which the nation
  chosen_spanish: por la cual la nación
  alternatives_spanish:
  - respecto de la nación
  - acerca del pueblo
  - con relación a la nación
  lexicon: LSJ
  rationale: γένος se refiere al pueblo como colectividad étnica/nacional; 'nación' es el equivalente español más natural y conserva el sentido colectivo. La relación se expresa con 'por la cual' para mantener fluidez sin perder el vínculo causal o referencial del griego.
- source_word: ἐν πᾶσιν
  english_pob_choice: everywhere
  chosen_spanish: en todas partes
  alternatives_spanish:
  - entre todos
  - en todo aspecto
  lexicon: LSJ
  rationale: En este giro, ἐν πᾶσιν con θρυλουμένην indica difusión amplia y pública. 'En todas partes' comunica bien la notoriedad generalizada en español moderno.
- source_word: θρυλουμένην
  english_pob_choice: was spoken of
  chosen_spanish: era celebrada
  alternatives_spanish:
  - era ampliamente comentada
  - era muy divulgada
  - se hablaba de ella
  lexicon: LSJ
  rationale: El participio pasivo expresa que algo circulaba en el habla pública. 'Era celebrada' captura esa notoriedad positiva y encaja con el valor elogioso de εὐπραξία, sin forzar una lectura litúrgica.
- source_word: οἱ ἀλλόφυλοι
  english_pob_choice: the foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los de otro pueblo
  - los gentiles
  - los forasteros
  lexicon: LSJ
  rationale: ἀλλόφυλοι designa a los de otra etnia o pueblo. 'Extranjeros' transmite bien el contraste étnico-contextual y evita la carga confesional que 'gentiles' puede tener en español bíblico posterior.
- source_word: οὐδαμῶς
  english_pob_choice: not at all
  chosen_spanish: en absoluto
  alternatives_spanish:
  - de ningún modo
  - para nada
  lexicon: LSJ
  rationale: Es una negación enfática. 'En absoluto' reproduce ese énfasis con registro natural y sobrio.
- source_word: διηριθμήσαντο
  english_pob_choice: take into account
  chosen_spanish: tomaron en cuenta
  alternatives_spanish:
  - consideraron
  - contaron con
  - estimaron
  lexicon: LSJ
  rationale: El verbo procede de la idea de contar o enumerar, pero aquí significa valorar o considerar algo. 'Tomaron en cuenta' conserva la noción evaluativa que el POB inglés explicitó con 'take into account'.
translation_notes:
  revision_awareness: El texto griego y el paquete inglés están en alto acuerdo. Sigo la revisión más reciente del inglés que prefirió 'beneficence' frente a 'good conduct' para εὐπραξία, pero en español empleo 'beneficencia' con nota para conservar la amplitud semántica de obras/bienhacer sin reducirlo a conducta moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según las normas del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Extranjeros'' se usa como equivalente neutral de ἀλλόφυλοι en un contexto étnico-nacional.'
  - La negación enfática de οὐδαμῶς queda reforzada por la colocación 'en absoluto'.
  - No se introduce terminología eclesiástica ajena al pasaje.
