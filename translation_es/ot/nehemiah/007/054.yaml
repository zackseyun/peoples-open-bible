  lexicon: HALOT
  rationale: En este contexto genealógico y de registro, בני introduce un grupo familiar o de clan. En español, «los hijos de» conserva con claridad la relación de pertenencia/descentencia sin añadir una formulación explicativa no presente en el hebreo.
- source_word: בַצְלִית
  english_pob_choice: Bazlith
  chosen_spanish: Bazlit
  alternatives_spanish:
  - Bazlith
  - Bazlit
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse, no traducirse. En español, la forma «Bazlit» evita introducir una h final etimológica que no se pronuncia normalmente en español y mantiene una transliteración legible y cercana al hebreo.
- source_word: מְחִידָא
  english_pob_choice: Mehida
  chosen_spanish: Mehida
  alternatives_spanish:
  - Mejida
  - Mehida
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Mehida» por continuidad con el audit trail inglés y porque representa de manera transparente las consonantes hebreas sin forzar una adaptación innecesaria al sistema gráfico español.
- source_word: חַרְשָׁא
  english_pob_choice: Harsha
  chosen_spanish: Harsha
  alternatives_spanish:
  - Jarsha
  - Harsha
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene «Harsha» porque refleja la convención del POB en inglés y evita sugerir un significado léxico que el contexto no desarrolla; en español, la h inicial queda como parte del nombre transliterado.
translation_notes:
