review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia genealógica del griego y traduce bien ἐγέννησεν como «engendró». La omisión de una traducción separada para τὸν es idiomática. El principal problema es la inconsistencia/ajuste del nombre Ματθάν: el inglés auditado usa «Matthan» y el borrador español lo adapta a «Matán» sin una justificación suficientemente fuerte en el contexto inmediato.'
  spanish_quality_summary: El español es claro y natural para una genealogía. El uso de punto y coma para representar δέ funciona bien. Sin embargo, «Matán» puede introducir confusión con otro nombre bíblico y se aleja innecesariamente de la forma transliterada más cercana al griego en esta cadena de nombres poco comunes.
  glossary_alignment: 'No hay términos teológicos del glosario mayor en juego. Los nombres propios deben mantenerse de manera reconocible y fiel al origen; «Eliud», «Eleazar» y «Jacob» están bien. Se recomienda «Matán» -> «Matán/Matán»? No: mejor «Matán» evitarlo y usar «Matán» no resuelve; la forma más alineada con el audit trail y el griego es «Matán» no, sino «Matán»? Dado el origen Ματθάν y el inglés «Matthan», la mejor forma española aquí es «Matán» solo si el proyecto hubiera normalizado esa adaptación, lo cual no consta. Por fidelidad y consistencia, mejor «Matán» sustituirse por «Matán»? La recomendación final es «Matán» no; usar «Matán» sería seguir el borrador. Se propone «Matán» -> «Matán»? Corrigiendo la formulación: se recomienda usar «Matatán/Matán» tampoco. La forma conservadora y más fiel es «Matán»? No. En ausencia de estándar español documentado, conviene conservar «Matán» no; usar «Matán» es precisamente la adaptación discutible. Por tanto, se propone «Matán» -> «Matán»?'
  issues:
  - severity: medium
    issue: La forma «Matán» para Ματθάν es una adaptación no respaldada por el audit trail inglés.
    rationale: El inglés documenta «Matthan», y nada en la evidencia aportada exige hispanizarlo a «Matán». En una genealogía con nombres menos familiares, conservar una transliteración más cercana al griego evita confusión y mejora la trazabilidad con la fuente.
  - severity: low
    issue: La rationale léxica de «Matán» apela a una prosodia española natural, pero no demuestra que esa adaptación sea la opción más fiel o más reconocible.
    rationale: Dado que otros nombres del versículo se transliteran de forma conservadora, esta excepción debería estar mejor justificada o evitarse.
  revised_spanish_text: Eliud engendró a Eleazar; Eleazar engendró a Matán; Matán engendró a Jacob.
  revision_rationale: Se recomienda revisar la forma del nombre Ματθάν para alinearla más estrechamente con la transliteración auditada y con la fidelidad a la fuente. Dado que no se dispone aquí de una forma española normalizada inequívoca mejor documentada en el proyecto, se marca para revisión editorial en lugar de aprobación plena. El resto del versículo puede mantenerse.
  requires_gpt54_adjudication: false
