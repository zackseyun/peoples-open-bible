translation:
  language: es
  text: 'Y si alguien le dice[a]: «¿Qué son estas heridas entre tus manos?», él dirá[c][b]: «Aquellas con las que fui herido en casa de los que me aman».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre tus manos»; probablemente es un modismo que alude al pecho o al torso («entre tus brazos»).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la casa de mis amantes»; el hebreo puede referirse a compañeros cercanos, seres amados o asociados íntimos.'
    reason: lexical_alternative
  - marker: c
    text: Algunos intérpretes cristianos entienden estas heridas en sentido mesiánico, en relación con el sufrimiento del Mesías; el versículo mismo no lo afirma de manera explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: And if one says
  chosen_spanish: Y si alguien le dice
  alternatives_spanish:
  - Y dirá
  - Y si uno le dice
  lexicon: HALOT
  rationale: El hebreo introduce una secuencia dialogal de valor futuro/modal en el discurso profético. En español, «si alguien le dice» expresa mejor la situación hipotética e interrogativa implícita sin perder la apertura del sujeto indefinido.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo de tercera persona masculina singular se refleja de manera natural con el dativo átono «le» en español, manteniendo la referencia al interrogado.
- source_word: מָה
  english_pob_choice: What are
  chosen_spanish: ¿Qué son
  alternatives_spanish:
  - ¿Qué significan
  - ¿Qué son estas
  lexicon: HALOT
  rationale: La pregunta exige una cópula suplida en español. «¿Qué son?» conserva la forma directa y natural de la interrogación.
- source_word: הַמַּכּוֹת
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - golpes
  - marcas
  - llagas
  lexicon: HALOT
  rationale: Aunque el sustantivo puede denotar golpes, aquí el contexto visible de lesiones favorece «heridas», que comunica el resultado físico de la acción sin alejarse del campo semántico del hebreo.
- source_word: בֵּין יָדֶיךָ
  english_pob_choice: between your hands
  chosen_spanish: entre tus manos
  alternatives_spanish:
  - entre tus brazos
  - sobre tu pecho
  - entre tus brazos y tu pecho
  lexicon: HALOT
  rationale: Se conserva la formulación más cercana al hebreo. «Manos» mantiene la imagen textual y su posible ambigüedad idiomática; la nota explica la probable referencia al torso o pecho.
- source_word: הֻכֵּיתִי
  english_pob_choice: I was wounded
  chosen_spanish: fui herido
  alternatives_spanish:
  - fui golpeado
  - me hirieron
  - he sido herido
  lexicon: HALOT
  rationale: El hofal de נכה expresa pasivo resultativo. «Fui herido» preserva la idea de lesión sufrida y suena más natural en español que una traducción más mecánica como «fui golpeado».
- source_word: בֵּית
  english_pob_choice: in the house of
  chosen_spanish: en casa de
  alternatives_spanish:
  - en la casa de
  - en el hogar de
  - en la casa/compañía de
  lexicon: HALOT
  rationale: «Casa de» reproduce de forma directa la construcción hebrea y puede abarcar tanto lugar como compañía/hogar, como sugiere la nota textual sobre el sentido relacional posible.
- source_word: מְאַהֲבָי
  english_pob_choice: those who love me
  chosen_spanish: los que me aman
  alternatives_spanish:
  - mis amantes
  - mis amigos
  - los que me quieren
  lexicon: HALOT
  rationale: El participio con sufijo expresa literalmente «los que me aman». Se evita «mis amantes» por su carga sexual demasiado estrecha en español contemporáneo, mientras que «los que me aman» preserva la relación afectiva sin sobreinterpretarla.
theological_decisions:
- issue: Si la mención de las heridas debe explicitarse como mesiánica en el texto principal
  english_pob_reading: The translation remains text-immanent and does not make an explicit messianic identification in the main text.
  chosen_spanish_reading: La traducción principal permanece centrada en el texto y no identifica explícitamente al hablante como el Mesías ni las heridas como de crucifixión.
  alternative_spanish_readings:
  - Una lectura cristológica que relacione las heridas con la crucifixión de Jesús
  - Una lectura no mesiánica en la que el hablante explique heridas disciplinarias o rituales
  rationale: El hebreo presenta un diálogo sobre heridas visibles y su explicación, pero no nombra al Mesías ni la crucifixión. Por fidelidad al texto y a la tensión interpretativa documentada, el cuerpo principal no resuelve la identificación teológica, aunque la nota conserva la lectura cristiana posible.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el último pase indicó que no eran necesarios cambios y la concordancia global fue alta con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto bíblico cuando aparezca el nombre divino, según el criterio del proyecto; este versículo no lo contiene.
  - Se conserva un registro de ambigüedad en «entre tus manos» y «los que me aman», sin sustituirlo por una interpretación doctrinal cerrada.
  - El tono es bíblico moderno y digno, con sintaxis natural para lectura pública en español.
