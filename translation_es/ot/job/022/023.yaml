translation:
  language: es
  text: Si vuelves al Todopoderoso[a], serás restaurado; si alejas la injusticia[b] de tu tienda,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'serás edificado' o 'serás reconstruido'. El verbo hebreo significa literalmente 'ser construido' y se usa metafóricamente para restauración o restablecimiento.
    reason: lexical_alternative
  - marker: b
    text: O 'maldad', 'agravio' o 'iniquidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - En caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición directa; 'Si' conserva la relación sintáctica sin añadir matices que el hebreo no exige.
- source_word: תָּשׁוּב
  english_pob_choice: you return
  chosen_spanish: vuelves
  alternatives_spanish:
  - regresas
  - te vuelves
  - te arrepientes
  lexicon: HALOT
  rationale: שוב expresa volver/retornar. 'Vuelves' preserva el valor básico y evita explicitar 'arrepentirte', que sería una interpretación más estrecha que el texto no formula aquí.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: El título divino se traduce en español para mantener la claridad y seguir la pauta del proyecto de traducir títulos divinos; 'el Todopoderoso' es el equivalente natural y reverente.
- source_word: תִּבָּנֶה
  english_pob_choice: you will be restored
  chosen_spanish: serás restaurado
  alternatives_spanish:
  - serás edificado
  - serás reconstruido
  lexicon: HALOT
  rationale: La pasiva nifal de בנה es literalmente 'ser construido/edificado'. En este contexto metafórico de reestablecimiento personal, 'serás restaurado' comunica el sentido sin borrar la imagen subyacente; las opciones más literales quedan como alternativas auditablemente posibles.
- source_word: תַּרְחִיק
  english_pob_choice: you put far
  chosen_spanish: apartas
  alternatives_spanish:
  - alejas
  - remueves lejos
  lexicon: HALOT
  rationale: La forma causativa expresa poner lejos o alejar. 'Apartas' es natural en español y conserva la fuerza de separación requerida por el verbo.
- source_word: עַוְלָה
  english_pob_choice: unrighteousness
  chosen_spanish: la injusticia
  alternatives_spanish:
  - el mal
  - la perversidad
  - el agravio
  lexicon: HALOT
  rationale: El sustantivo abarca injusticia, agravio e iniquidad. 'Injusticia' mantiene bien el peso moral y jurídico del término, y encaja con el marco exhortativo del versículo.
- source_word: מֵאָהֳלֶךָ
  english_pob_choice: from your tent
  chosen_spanish: de tu tienda
  alternatives_spanish:
  - de tu morada
  - de tu hogar
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'tienda', que en español sigue siendo transparente y mantiene el color cultural del hebreo sin sustituirla por una paráfrasis.
theological_decisions:
- issue: Cómo rendir la posibilidad de arrepentimiento implícita en שוב
  english_pob_reading: return
  chosen_spanish_reading: vuelves
  alternative_spanish_readings:
  - te arrepientes
  - te conviertes
  rationale: El hebreo בסיס de שוב significa 'volver/regresar'. Traducirlo como 'vuelves' preserva la apertura semántica del original y evita introducir una carga doctrinal que el texto no verbaliza explícitamente, aunque el contexto la sugiera.
  doctrine_reference: Translation philosophy §1; §3
- issue: Si traducir la metáfora de construcción de forma literal o interpretativa
  english_pob_reading: you will be restored
  chosen_spanish_reading: serás restaurado
  alternative_spanish_readings:
  - serás edificado
  - serás reconstruido
  rationale: El hebreo usa 'ser construido' de manera metafórica para reestablecimiento. 'Serás restaurado' comunica esa metáfora de modo claro en español moderno, sin negar la base literal documentada por el audit trail.
  doctrine_reference: Translation philosophy §6; §5 documented exception
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador mantiene esa lectura alta concordancia y conserva las alternativas auditablemente atestiguadas por el contexto inglés.
  spanish_consistency_notes:
  - Se mantiene 'el Todopoderoso' para שַׁדַּי conforme a la pauta del proyecto.
  - Se conserva la imagen de 'tienda' en vez de suavizarla a 'hogar' o 'morada'.
  - '''Restaurado'' refleja la metáfora de ''ser edificado'' sin perder inteligibilidad en español.'
  - '''Injusticia'' preserva el campo moral-jurídico de עַוְלָה.'
