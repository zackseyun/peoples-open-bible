    rationale: El hebreo בַר significa «hijo»; la lectura mesiánico-real ya queda suficientemente marcada por el contexto y la nota. La mayúscula puede sobredeterminar cristológicamente el sentido en español más allá de lo exigido por la evidencia fuente y el rastro POB.
