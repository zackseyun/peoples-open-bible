    rationale: La nota [a] sobre «Espíritu» sí corresponde al alternativo «un espíritu / viento», pero la nota [b] aparece tras «lejos» aunque su contenido explica «en el ardor de mi espíritu». Esto incumple la disciplina requerida de marcadores exactos en la frase relevante.
  - severity: medium
