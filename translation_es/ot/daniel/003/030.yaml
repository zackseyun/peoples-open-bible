translation:
  language: es
  text: Entonces el rey hizo prosperar[a] a Sadrac, Mesac y Abednego en la provincia de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «promovió a Sadrac, Mesac y Abednego en la provincia de Babilonia». El verbo arameo puede significar hacer prosperar o hacer que alguien tenga éxito, lo que en este contexto puede incluir ascenso oficial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - At that time
  - Luego
  - En aquel momento
  lexicon: HALOT
  rationale: Marca discursiva aramea que introduce la consecuencia narrativa; «Entonces» conserva la secuencia y suena natural en español.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Nabucodonosor
  lexicon: HALOT
  rationale: El sustantivo en estado enfático significa «el rey»; el nombre propio se entiende por el contexto inmediato, pero no aparece en el hebreo/aramaico del versículo.
- source_word: הַצְלַח
  english_pob_choice: caused ... to prosper
  chosen_spanish: hizo prosperar
  alternatives_spanish:
  - prosperó
  - los promovió
  - los hizo सफल
  lexicon: HALOT
  rationale: El verbo arameo puede significar hacer prosperar o dar éxito. «Hizo prosperar» mantiene el valor causativo y evita estrechar indebidamente el sentido a «promover», aunque esa posibilidad sigue implícita por el contexto administrativo.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abednego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Shadrach, Meshach y Abed-nego
  lexicon: nombres propios bíblicos tradicionales en español
  rationale: Se conservan como nombres propios transliterados en su forma corriente en español bíblico, con adaptación ortográfica mínima para la lectura natural.
- source_word: בִּמְדִינַת בָּבֶל
  english_pob_choice: in the province of Babylon
  chosen_spanish: en la provincia de Babilonia
  alternatives_spanish:
  - en la provincia de Babilonia
  - en la provincia de Babilonía
  lexicon: HALOT
  rationale: מְדִינָה designa un distrito administrativo o provincia; «provincia de Babilonia» es la forma natural y fiel al marco imperial del texto.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto arameo y conserva la ambigüedad del verbo הַצְלַח señalada en el audit trail inglés: puede leerse como prosperar o como promover/ascender. No se añaden elementos ajenos al versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa una transliteración española estable para los nombres propios bíblicos, sin introducir equivalencias explicativas innecesarias.
  - «Provincia» se conserva por su valor administrativo, coherente con el arameo מְדִינָה.
