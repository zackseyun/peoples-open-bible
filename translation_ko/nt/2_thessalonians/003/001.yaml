id: 2TH.3.1
reference: 2 Thessalonians 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τὸ λοιπὸν προσεύχεσθε, ἀδελφοί, περὶ ἡμῶν, ἵνα ὁ λόγος τοῦ κυρίου τρέχῃ καὶ δοξάζηται καθὼς καὶ πρὸς ὑμᾶς,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/001.yaml
  text: Finally[a], brothers, pray for us, that the word of the Lord may spread rapidly and be honored, just as it was among you[b],
translation:
  language: ko
  text: 끝으로 형제[a] 여러분, 우리를 위하여 기도해 주십시오. 주의 말씀이 여러분 가운데서 그러했던 것처럼 빠르게 퍼지고[b] 존귀하게 여겨지도록 말입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수 호격이며 회중 전체를 대표적으로 가리킨다.
    reason: cultural_note
  - marker: b
    text: 문자적으로는 「달리고 영광 받도록」. 헬라어 τρέχῃ는 복음의 빠른 전진을 비유한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ λοιπὸν
  english_pob_choice: Finally
  chosen_korean: 끝으로
  alternatives_korean:
  - 마지막으로
  - 이제 남은 것은
  lexicon: BDAG
  rationale: 서신 마무리부의 정형 표현. 「끝으로」가 자연스럽다.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_korean: 기도해 주십시오
  alternatives_korean:
  - 기도하십시오
  - 기도해 주세요
  lexicon: BDAG
  rationale: 합쇼체 명령 + 부탁 어조를 「기도해 주십시오」로 자연스럽게 표현한다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제
  alternatives_korean:
  - 형제자매
  lexicon: BDAG
  rationale: 성별 정확성 원칙.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_korean: 우리를 위하여
  alternatives_korean:
  - 우리에 대하여
  lexicon: BDAG
  rationale: 기도 대상을 「~을 위하여」로 자연스럽게 표현.
- source_word: ὁ λόγος τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_korean: 주의 말씀
  alternatives_korean:
  - 주님의 말씀
  - 주의 말
  lexicon: BDAG
  rationale: 신적 권위의 말씀을 가리키므로 「말씀」(경어형). 일반적인 「말」(인간 발화)과 구분.
- source_word: τρέχῃ
  english_pob_choice: may spread rapidly
  chosen_korean: 빠르게 퍼지고
  alternatives_korean:
  - 달리고
  - 거침없이 나아가고
  lexicon: BDAG
  rationale: 비유의 의미를 살리되 한국어 자연성을 위해 「빠르게 퍼지고」로 옮긴다. 「달리고」는 직역이나 한국어로 어색.
- source_word: δοξάζηται
  english_pob_choice: be honored
  chosen_korean: 존귀하게 여겨지도록
  alternatives_korean:
  - 영광 받도록
  - 영화롭게 되도록
  lexicon: BDAG
  rationale: 「말씀」이 주어이므로 「영광 받도록」보다 「존귀하게 여겨지도록」이 자연스럽다.
- source_word: καθὼς καὶ πρὸς ὑμᾶς
  english_pob_choice: just as it was among you
  chosen_korean: 여러분 가운데서 그러했던 것처럼
  alternatives_korean:
  - 여러분에게도 그랬듯이
  - 여러분 곁에서 그랬듯이
  lexicon: BDAG
  rationale: 이전 데살로니가 신자들의 경험을 가리키는 비교. 동사를 보충하여 자연스러운 한국어로.
theological_decisions:
- issue: τρέχῃ의 비유적 표현 처리
  chosen_reading: 「빠르게 퍼지다」 — 의미를 명확히
  alternative_readings:
  - 직역 「달리다」
  rationale: 본 번역은 의미가 가려지는 직역을 피하고, 「빠르게 퍼지다」로 복음 전진의 비유적 의미를 명료하게 옮긴다. 직역은 각주.
  doctrine_reference: 'Optimal equivalence'
