translation:
  language: es
  text: Y Acab durmió con sus padres[a], y Ocozías, su hijo, llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», fórmula real estándar que significa que murió.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - se durmió
  - murió
  lexicon: HALOT
  rationale: 'El hebreo usa una fórmula real de muerte: ‘acostarse con los padres’. En español, ‘se acostó con sus padres’ suena natural y conserva la idiomaticidad; ‘murió’ explicita la interpretación, pero pierde la forma del hebreo. ‘Durmió’ podría sonar ambiguo o demasiado literal sin el complemento idiomático.'
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres y antepasados
  lexicon: HALOT
  rationale: ‘Padres’ mantiene el valor dinástico y la fórmula bíblica. ‘Antepasados’ es comprensible, pero suaviza la expresión establecida del texto hebreo. En español, ‘padres’ comunica adecuadamente la relación ancestral sin perder el tono formular.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - fue hecho rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por ‘became king’ para la sucesión, en español ‘reinó’ funciona como fórmula sobria de entronización y evita una perífrasis poco natural. Aquí el contexto sucesorio ya queda claro por ‘en su lugar’.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: ‘En su lugar’ expresa con claridad la sustitución en el trono y coincide con la fuerza sucesoria del hebreo. ‘Después de él’ sería más débil; ‘en vez de él’ puede sonar menos regio y más general.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Acab
  alternatives_spanish:
  - Ahab
  lexicon: Standard Spanish biblical name form
  rationale: Se usa la forma española tradicional ‘Acab’, ampliamente reconocible en lectura bíblica en español. No se translitera de manera inglesa porque la tradición española ya cuenta con esta forma asentada y perfectamente identificable.
- source_word: אֲחַזְיָהוּ
  english_pob_choice: Ahaziah
  chosen_spanish: Ocozías
  alternatives_spanish:
  - Ahazías
  lexicon: Standard Spanish biblical name form
  rationale: Se adopta ‘Ocozías’, la forma bíblica española establecida para este rey. Aunque ‘Ahazías’ refleja mejor la transliteración, ‘Ocozías’ es la forma canónica en español e inteligible para la comunidad lectora.
theological_decisions:
- issue: 'Fórmula real de muerte: ‘sleep with his fathers’'
  english_pob_reading: The English POB preserves the idiom and notes that it means he died.
  chosen_spanish_reading: ‘Se acostó con sus padres’ conserva la fórmula idiomática y deja que el contexto indique la muerte.
  alternative_spanish_readings:
  - murió
  - descansó con sus padres
  rationale: El texto hebreo presenta una fórmula técnica de noticia real. Mantenerla en español respeta la fuente y evita borrar la tensión entre literalidad e interpretación. La nota puede aclarar que se trata de una expresión de muerte.
  doctrine_reference: Uso bíblico formular de noticias regias; no implica doctrina específica.
- issue: Sucesión al trono
  english_pob_reading: Ahaziah his son became king in his place.
  chosen_spanish_reading: ‘Ocozías, su hijo, reinó en su lugar’ expresa sucesión real directa.
  alternative_spanish_readings:
  - su hijo llegó a ser rey en su lugar
  - su hijo comenzó a reinar en su lugar
  rationale: La relación filial y la sustitución política están explícitas en el hebreo. En español, ‘reinó en su lugar’ comunica la sucesión sin añadir matices ajenos al texto.
  doctrine_reference: Historia dinástica de Israel; no hay afirmación doctrinal adicional.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se conserva la fórmula de muerte regia, la relación filial y la sucesión al trono. La principal adaptación es idiomática en español (‘se acostó’ y ‘reinó’) y en nombres propios con formas bíblicas españolas establecidas (‘Acab’, ‘Ocozías’).'
  spanish_consistency_notes:
  - Se mantiene el tono de noticia real breve y formular.
  - No se usa ‘SEÑOR’ ni terminología doctrinal ajena al verso.
  - La nota al pie explica la idiomaticidad de ‘se acostó con sus padres’ sin eliminarla del texto principal.
