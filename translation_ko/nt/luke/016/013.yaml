  text: 「한 집의 종이 두 주인을 섬길 수 없으니, 혹 이를 미워하고 저를 사랑하거나, 혹 이를 따르고 저를 업신여길 것이기 때문이다. 너희가 하나님과 재물을 함께 섬길 수 없다.」
