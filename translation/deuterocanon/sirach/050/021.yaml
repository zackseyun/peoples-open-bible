theological_decisions:
- issue: Antecedent of 'him' in מִפָּנָיו versus Greek interpretive expansion
  chosen_reading: Retain the Hebrew-based 'from before him' in the main text.
  alternative_readings:
  - from the Most High
  - from his presence
  rationale: The primary witness for this verse is the extant Hebrew, which ends with a third-person singular suffix. The Greek parallel appears to interpret the source as referring ultimately to the Most High. Because the project gives primacy to the surviving Hebrew where available, the main text keeps the pronominal wording, while preserving the Greek-based alternative in a footnote.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition; §3, preserve tension rather than resolve it.
