  to: 'Ella le dijo: «Soy la hija de Betuel, hijo de Milcá, a quien Milcá dio a luz para Najor[a]».'
  rationale: 'Se corrigió la cláusula relativa para preservar el sentido del hebreo: el nacido es Betuel, no Najor. Se explicitó «Milcá» dentro de la relativa para evitar ambigüedad en español. Se mantuvo la alternativa documentada sobre la preposición ל, pero con una redacción que no distorsiona la genealogía. También se movió el marcador de nota a la frase exacta afectada.'
