revisions:
- from: Ahora bien, los oficiales del pueblo habitaban en Jerusalén, y el resto del pueblo echó suertes para hacer venir a uno de cada diez a habitar en Jerusalén, la ciudad santa, mientras que nueve partes quedaron en las ciudades.
  to: Los oficiales del pueblo vivían en Jerusalén, y el resto del pueblo echó suertes para hacer venir a uno de cada diez a vivir en Jerusalén, la ciudad santa, mientras que nueve partes[a] quedaron en los poblados.
  rationale: Se ajustó el español para mayor naturalidad («vivían», «a vivir»), se cambió «ciudades» por «poblados» para reflejar mejor el contraste contextual de עָרִים con Jerusalén, y se añadió la nota requerida para preservar el modismo hebreo detrás de «nueve partes», en línea con la auditoría inglesa.
