translation:
  language: es
  text: Le hizo oír su voz, y lo acercó a la nube oscura. Puso en su mano el mandamiento[a], una ley de vida y entendimiento, para enseñar a Jacob sus estatutos[b], y a Israel sus testimonios y sus juicios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La LXX dice: «mandamientos» en plural, en lugar de «el mandamiento».'
    reason: textual_variant
  - marker: b
    text: 'La LXX lee: «para enseñar a Jacob el pacto, y a Israel sus juicios»; el hebreo dice: «sus estatutos ... sus testimonios y sus juicios».'
    reason: alternative_reading
lexical_decisions:
- source_word: וישמיעהו את קולו / ἠκούτισεν αὐτὸν τῆς φωνῆς αὐτοῦ
  english_pob_choice: He let him hear his voice
  chosen_spanish: Lo hizo oír su voz
  alternatives_spanish:
  - Le permitió oír su voz
  - Lo hizo escuchar su voz
  lexicon: HALOT; LXX ἀκούω causativo
  rationale: La forma causativa pide en español una construcción también causativa. «Lo hizo oír» conserva la iniciativa divina y evita un calco torpe. «Escuchar» puede sonar demasiado voluntario; «oir» mantiene mejor la simple recepción del sonido/voz.
- source_word: ויגישהו לערפל / εἰσήγαγεν αὐτὸν εἰς τὸν γνόφον
  english_pob_choice: brought him near into the dark cloud
  chosen_spanish: lo introdujo en la nube oscura
  alternatives_spanish:
  - lo introdujo en la oscura neblina
  - lo acercó a la densa oscuridad
  lexicon: HALOT; LXX γνόφος
  rationale: El hebreo sugiere nube/niebla densa de teofanía, y el griego usa γνόφος, “oscuridad densa”. En español, «nube oscura» comunica bien la imagen teofánica sin perder la idea de oscuridad envolvente.
- source_word: מצוה / ἐντολάς
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - los mandamientos
  lexicon: HALOT; NT/LXX ἐντολή
  rationale: Aunque el griego trae plural, el hebreo tiene singular y la auditable English POB siguió el hebreo en el cuerpo. «Mandamiento» mantiene la concreción de una entrega divina específica.
- source_word: תורת חיים ותבונה / νόμον ζωῆς καὶ ἐπιστήμης
  english_pob_choice: a law of life and understanding
  chosen_spanish: una ley de vida y entendimiento
  alternatives_spanish:
  - una instrucción de vida y entendimiento
  - una ley de vida y conocimiento
  lexicon: HALOT; LXX νόμος, ἐπιστήμη
  rationale: «Ley» refleja תורה en el contexto sinaítico y conserva el tono normativo. «Entendimiento» sigue mejor תבונה que «conocimiento», aunque el griego ἐπιστήμη abre también esa posibilidad; por eso se mantiene «entendimiento» en el texto y se deja la tensión léxica visible.
- source_word: ללמד ביעקב חוקיו
  english_pob_choice: to teach Jacob his statutes
  chosen_spanish: para enseñar a Jacob sus estatutos
  alternatives_spanish:
  - para enseñar en Jacob sus estatutos
  - para enseñar a Jacob sus decretos
  lexicon: HALOT
  rationale: «Estatutos» es el equivalente más estable para חוקים en registro bíblico y jurídico. La preposición del hebreo se naturaliza en español como objeto directo de enseñar.
- source_word: ועדותיו ומשפטיו לישראל / διαθήκην καὶ κρίματα αὐτοῦ τὸν Ἰσραήλ
  english_pob_choice: and Israel his testimonies and judgments
  chosen_spanish: y a Israel sus testimonios y sus juicios
  alternatives_spanish:
  - y a Israel su pacto y sus juicios
  - y a Israel sus testimonios y sus decretos
  lexicon: HALOT; LXX διαθήκη, κρίματα
  rationale: El hebreo leído como base da «testimonios» y «juicios». «Juicios» preserva la fuerza forense de משפטים. La posible lectura griega de «pacto» se conserva en nota, no en el cuerpo, porque el hebreo aquí es la lectura primaria y coherente.
theological_decisions:
- issue: Imagen teofánica de la nube oscura/ערפל
  english_pob_reading: dark cloud
  chosen_spanish_reading: nube oscura
  alternative_spanish_readings:
  - nube densa
  - oscuridad espesa
  rationale: La expresión debe retener la ocultación reverente propia de la revelación en Sinaí. «Nube oscura» une visibilidad e invisibilidad, sin resolver la tensión entre nube y oscuridad que el término bíblico concentra.
  doctrine_reference: Teofanía sinaítica; preservación de la imaginería de revelación velada
- issue: Divergencia hebreo-griego en los términos legales
  english_pob_reading: the commandment ... a law of life and understanding ... his testimonies and judgments
  chosen_spanish_reading: el mandamiento ... una ley de vida y entendimiento ... sus testimonios y sus juicios
  alternative_spanish_readings:
  - los mandamientos ... una ley de vida y conocimiento ... su pacto y sus juicios
  - el mandamiento ... una instrucción de vida y discernimiento ... sus estatutos y sus decretos
  rationale: Se sigue el hebreo donde está conservado, pero se preserva la variante griega mediante nota. Así no se borra la tensión textual real entre singular/plural y entre 'testimonios'/'pacto'.
  doctrine_reference: Primacía del hebreo conservado con testimonio secundario de la LXX en Sirácida
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del hebreo conservado de Kahana y de la paralela griega de Swete. La redacción española sigue el hebreo en el cuerpo principal, pero conserva en nota las divergencias relevantes de la LXX, especialmente en 'mandamiento/mandamientos' y 'estatutos/testimonios/pacto'.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino en la línea versal.
  - Se mantuvo el registro bíblico formal sin arcaísmo excesivo.
  - Se prefirió «juicios» para משפטים y «estatutos» para חוקים, distinguiendo ambos términos.
  - «Ley de vida y entendimiento» conserva la pareja normativa-cognitiva del original sin convertirla en paráfrasis.
