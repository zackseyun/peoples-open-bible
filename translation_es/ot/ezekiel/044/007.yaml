translation:
  language: es
  text: cuando ustedes trajeron extranjeros[a], incircuncisos de corazón e incircuncisos de carne, para estar en mi santuario, para profanar mi casa, cuando presentaron mi alimento[b], la grasa y la sangre, y ellos quebrantaron mi pacto[c], además de todas sus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘hijos de una tierra extraña’ / ‘hijos extranjeros’. Hebreo literalmente: ‘hijos de extranjería’.'
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘mi pan’; en contexto sacrificial, esta expresión se refiere al alimento de la ofrenda destinado a Dios.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice ‘ellos quebrantaron mi pacto’, probablemente refiriéndose a los extranjeros recién mencionados; algunos entienden más generalmente que la acusación sigue dirigida a ‘ustedes’.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּהֲבִיאֲכֶם
  english_pob_choice: when you brought in
  chosen_spanish: cuando ustedes trajeron
  alternatives_spanish:
  - cuando ustedes introdujeron
  - al traer ustedes
  lexicon: HALOT
  rationale: 'El infinitivo constructo con sufijo expresa tiempo: ‘cuando’. En español, ‘trajeron’ comunica bien el acto causativo de introducir personas en un espacio sagrado, sin volverlo mecánico.'
- source_word: בְּנֵי נֵכָר
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - hijos de la extranjería
  - hijos de tierra extraña
  - forasteros
  lexicon: HALOT
  rationale: ‘Extranjeros’ transmite de forma natural la idea idiomática de personas ajenas al pueblo/pacto. Evita el literalismo de ‘hijos de extranjería’ sin perder la fuerza de exclusión.
- source_word: עַרְלֵי לֵב
  english_pob_choice: uncircumcised in heart
  chosen_spanish: incircuncisos de corazón
  alternatives_spanish:
  - incircuncisos en corazón
  - con corazón incircunciso
  lexicon: HALOT
  rationale: Se conserva la metáfora profética fija y su carga de impureza/rebeldía interna. ‘De corazón’ suena natural en español y mantiene el paralelismo con la siguiente frase.
- source_word: וְעַרְלֵי בָשָׂר
  english_pob_choice: uncircumcised in flesh
  chosen_spanish: incircuncisos de carne
  alternatives_spanish:
  - incircuncisos en la carne
  - incircuncisos en el cuerpo
  lexicon: HALOT
  rationale: ‘Carne’ sigue de cerca el hebreo בָּשָׂר y preserva el contraste con ‘corazón’. Aunque en español puede sonar duro, aquí esa aspereza es parte de la forma profética.
- source_word: לִהְיוֹת בְּמִקְדָּשִׁי
  english_pob_choice: to be in my sanctuary
  chosen_spanish: para estar en mi santuario
  alternatives_spanish:
  - para entrar en mi santuario
  - para permanecer en mi santuario
  lexicon: HALOT
  rationale: El hebreo enfatiza estar presente dentro del recinto santo; por eso se evita añadir ‘entrar’ si no es necesario. ‘Estar’ conserva el sentido locativo del texto.
- source_word: לְחַלְּלוֹ
  english_pob_choice: to profane it
  chosen_spanish: para profanar mi casa
  alternatives_spanish:
  - para profanarlo
  - para profanarla
  - para contaminarla
  lexicon: HALOT
  rationale: El sufijo del verbo se entiende mejor en español unido a ‘mi casa’, siguiendo la revisión del audit trail. ‘Profanar’ mantiene el valor cultual fuerte de חלל.
- source_word: אֶת בֵּיתִי
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa/templo
  - mi templo
  lexicon: HALOT
  rationale: ‘Casa’ preserva la metáfora bíblica del templo como casa de Dios y evita imponer una equivalencia interpretativa demasiado específica. En español, ‘mi casa’ comunica bien la restitución appositiva del hebreo.
- source_word: בְּהַקְרִיבְכֶם
  english_pob_choice: when you presented
  chosen_spanish: cuando presentaron
  alternatives_spanish:
  - cuando ofrecieron
  - al presentar ustedes
  lexicon: HALOT
  rationale: En contexto sacrificial, ‘presentaron’ reproduce el valor de ‘presentar/ofrecer’ sin perder naturalidad. La frase siguiente aclara que se trata de una ofrenda.
- source_word: לַחְמִי
  english_pob_choice: my food
  chosen_spanish: mi alimento
  alternatives_spanish:
  - mi pan
  - mi comida
  - mi pan de ofrenda
  lexicon: HALOT
  rationale: Aunque literalmente es ‘mi pan’, en el contexto cultual la metáfora apunta al alimento ofrecido a Dios. ‘Mi alimento’ es claro en español y mantiene la amplitud del idiomа.
- source_word: חֵלֶב וָדָם
  english_pob_choice: the fat and the blood
  chosen_spanish: la grasa y la sangre
  alternatives_spanish:
  - el sebo y la sangre
  - la grasa y la sangre derramada
  lexicon: HALOT
  rationale: ‘Grasa’ es comprensible para lectores modernos; aunque ‘sebo’ puede ser más técnico, aquí ‘grasa’ comunica bien la porción sacrificial mencionada junto con la sangre.
- source_word: וַיָּפֵרוּ
  english_pob_choice: and they broke
  chosen_spanish: y quebrantaron
  alternatives_spanish:
  - y violaron
  - y anularon
  lexicon: HALOT
  rationale: ‘Quebrantaron’ reproduce con solemnidad el valor de romper/violar un pacto. Es una opción bíblica y readable en español, sin debilitar la fuerza jurídica del verbo.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: ‘Pacto’ es el equivalente estándar para בְּרִית en español bíblico y mantiene mejor el peso relacional-jurídico que ‘alianza’ en este contexto.
- source_word: אֶל כָּל תּוֹעֲבוֹתֵיכֶם
  english_pob_choice: in addition to all your abominations
  chosen_spanish: además de todas sus abominaciones
  alternatives_spanish:
  - en adición a todas sus abominaciones
  - junto con todas sus abominaciones
  lexicon: HALOT
  rationale: ‘Además de’ refleja bien el valor aditivo de אֶל en este pasaje según la revisión auditada. Se mantiene ‘abominaciones’ para תּוֹעֲבוֹת, término técnico de impureza moral/cultual.
theological_decisions:
- issue: Cambio de sujeto en וַיָּפֵרוּ
  english_pob_reading: The introduced foreigners are the likely subject of 'and they broke my covenant,' though some take it as continuing to accuse 'you.'
  chosen_spanish_reading: ‘Y quebrantaron mi pacto’ se entiende naturalmente con los ‘extranjeros’ como sujeto inmediato, aunque el contexto sigue acusando al pueblo que los introdujo.
  alternative_spanish_readings:
  - ‘y quebrantaron mi pacto’ manteniendo como sujeto ‘ustedes’
  - ‘y ellos quebrantaron mi pacto’ con referencia más explícita a los extranjeros
  rationale: El hebreo pasa a tercera plural; la traducción debe conservar ese cambio sin suavizarlo. En español, dejar el verbo sin sujeto explícito permite oír la referencia inmediata a los extranjeros y, a la vez, conservar la tensión interpretativa documentada.
  doctrine_reference: 'Translation philosophy §3: preserve tension rather than resolve it without documentation'
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del audit trail: el texto español refleja la alineación más estrecha con la sintaxis hebrea (‘para profanar mi casa’) y el matiz aditivo de אֶל con ‘además de’. También conservo la posible tensión del cambio a tercera persona plural en ‘quebrantaron mi pacto’ sin explicitar un sujeto adicional que el hebreo no exige.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma predeterminada solo cuando aparezca el Tetragrámaton; aquí no aparece, por lo que no se introduce.
  - Se conserva ‘pacto’ para בְּרִית, ‘santuario’ para מִקְדָּשׁ, y ‘profanar’ para חלל en línea con la terminología POB.
  - ‘Carne’ se mantiene por cercanía al hebreo en la pareja ‘corazón/carne’, aunque la versión final opta por ‘grasa’ para חֵלֶב por claridad en español.
  - Las notas con marcador se han anclado solo donde hay alternativa lexical documentada en el audit trail inglés.
