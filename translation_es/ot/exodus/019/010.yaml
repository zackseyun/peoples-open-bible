translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Ve al pueblo y conságralos[a] hoy y mañana, y que laven sus vestidos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “santifícalos” o “sepáralos como santos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino, no un título. En español, ‘Yahvé’ preserva el nombre propio del pacto y sigue el criterio auditado del POB para no sustituirlo por una máscara confesional.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y luego ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narratival con waw consecutivo avanza la acción. ‘Entonces’ comunica bien la secuencia en español sin añadir matiz ajeno.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: Es el imperativo directo de הלך. ‘Ve’ es natural, formal y suficientemente preciso en español bíblico actual.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En el contexto del Sinaí se refiere a la comunidad de Israel. ‘Pueblo’ conserva el sentido colectivo-covenantal mejor que ‘gente’.
- source_word: וְקִדַּשְׁתָּם
  english_pob_choice: consecrate them
  chosen_spanish: conságralos[a]
  alternatives_spanish:
  - santifícalos
  - sepáralos como santos
  lexicon: HALOT
  rationale: קדשׁ en piel aquí es preparación ritual para el encuentro con Dios. ‘Consagrar’ preserva mejor el valor cultual y preparatorio que una lectura sólo moral o devocional.
- source_word: הַיּוֹם וּמָחָר
  english_pob_choice: today and tomorrow
  chosen_spanish: hoy y mañana
  alternatives_spanish:
  - este día y mañana
  lexicon: HALOT
  rationale: La expresión marca un período de preparación de dos días. ‘Hoy y mañana’ es la equivalencia idiomática más clara y exacta.
- source_word: וְכִבְּסוּ
  english_pob_choice: let them wash
  chosen_spanish: y laven
  alternatives_spanish:
  - y se laven
  - y lavarán
  lexicon: HALOT
  rationale: El verbo es plural y continúa la instrucción para el pueblo. En español, ‘laven’ comunica bien la orden sin sobreinterpretar la agencia de Moisés.
- source_word: שִׂמְלֹתָם
  english_pob_choice: their garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: שִׂמְלָה denota vestimenta/ropa, con tono algo solemne. ‘Vestidos’ mantiene el registro bíblico y es comprensible en español general.
theological_decisions:
- issue: קדשׁ como rito de preparación para la teofanía
  english_pob_reading: consecrate them
  chosen_spanish_reading: conságralos
  alternative_spanish_readings:
  - santifícalos
  - sepáralos como santos
  rationale: La escena trata de preparación ritual para estar ante Yahvé en Sinaí. ‘Conságralos’ mantiene la dimensión sacra y comunitaria sin reducir el mandato a transformación interior.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La traducción española debe reflejar el Nombre revelado, no sustituirlo por un título. ‘Yahvé’ es la forma usada en el proyecto para preservar la referencia directa al Tetragrama.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el verso contra el hebreo fuente y el audio-trail inglés. No se detectaron cambios textuales recientes en la revisión más nueva; se mantuvo la lectura auditada de קדשׁ como mandato ritual de consagración y el Nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento del Nombre divino como Yahvé, coherente con el estándar del proyecto.
  - ‘Conságralos’ se usa con sentido cultual, no como simple exhortación moral.
  - ‘Vestidos’ conserva un registro bíblico natural en español y corresponde al campo semántico de שִׂמְלָה.
