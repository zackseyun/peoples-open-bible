revisions:
- from: 'Así hablaron al rey de Asiria, diciendo: «Las naciones que tú has exiliado y establecido en las ciudades de Samaria no conocen la ley del dios de la tierra; por eso ha enviado leones entre ellas, y miren[a], los están matando[b], porque no conocen la ley del dios de la tierra».'
  to: 'Así hablaron al rey de Asiria, diciendo: «Las naciones que tú has exiliado y asentado en las ciudades de Samaria no conocen la ley del dios de la tierra; por eso ha enviado leones entre ellos, y he aquí[a], los están matando[b], porque no conocen la ley del dios de la tierra».'
  rationale: Se reemplaza «establecido» por «asentado» para reflejar mejor el reasentamiento poblacional; «entre ellas» por «entre ellos» por mayor naturalidad con referente humano; y «miren» por «he aquí» para representar con más fidelidad y mejor registro la partícula וְהִנָּם, en línea con la auditoría inglesa.
