translation:
  language: es
  text: El que está siendo purificado lavará sus vestidos[a], se afeitará todo el cabello, y se bañará en agua; entonces quedará limpio. Después podrá entrar en el campamento[b], pero permanecerá fuera de su tienda por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el que está siendo limpiado". El hebreo se refiere a la persona que atraviesa el rito de purificación prescrito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "entrará en el campamento". El verbo hebreo puede leerse como futuro simple o como permiso; el contexto favorece un reingreso permitido con restricciones continuas.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que se está purificando
  alternatives_spanish:
  - el que está siendo limpiado
  - la persona que se está purificando
  - el que ha de ser purificado
  lexicon: HALOT
  rationale: El participio hitpael describe a la persona que pasa por el proceso ritual, no a alguien que se limpia a sí mismo. 'Se está purificando' conserva el sentido procesual y evita una voz pasiva demasiado pesada en español.
- source_word: כִבֶּס ... בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - deberá lavar sus vestidos
  - lavará sus prendas
  lexicon: HALOT
  rationale: כִּבֵּס se refiere a lavar ropa; 'vestidos' mantiene un registro bíblico claro en español sin perder naturalidad. 'Ropas' sería posible, pero 'vestidos' preserva mejor el tono y el objeto ritual.
- source_word: גִלַּח אֶת כָּל שְׂעָרוֹ
  english_pob_choice: shave off all his hair
  chosen_spanish: se afeitará todo el cabello
  alternatives_spanish:
  - se rasurará todo el cabello
  - se afeitará todo su pelo
  - se cortará todo el cabello
  lexicon: HALOT
  rationale: El verbo indica eliminación completa del vello/cabello. 'Todo el cabello' reproduce la totalidad de כָּל שְׂעָרוֹ con español natural; 'afeitar' aquí comunica bien la acción ritual de rasurado total.
- source_word: רָחַץ בַּמַּיִם
  english_pob_choice: bathe in water
  chosen_spanish: se bañará en agua
  alternatives_spanish:
  - se lavará en agua
  - se bañará con agua
  - se sumergirá en agua
  lexicon: HALOT
  rationale: En contexto ritual, רָחַץ alude al lavado del cuerpo. 'Bañarse en agua' distingue esta acción del lavado de los vestidos y conserva la imagen general sin especificar inmersión que el hebreo no exige aquí.
- source_word: וְטָהֵר
  english_pob_choice: then he shall be clean
  chosen_spanish: entonces quedará limpio
  alternatives_spanish:
  - y quedará limpio
  - entonces será limpio
  - y será limpio
  lexicon: HALOT
  rationale: La cláusula expresa el resultado ritual posterior a las acciones anteriores. 'Quedará limpio' comunica bien el estado resultante en español moderno y evita moralizar el término.
- source_word: יָבֹא אֶל הַמַּחֲנֶה
  english_pob_choice: he may come into the camp
  chosen_spanish: podrá entrar en el campamento
  alternatives_spanish:
  - entrará en el campamento
  - podrá venir al campamento
  - deberá entrar en el campamento
  lexicon: HALOT
  rationale: 'El imperfecto aquí puede leerse de modo permisivo por el contexto: se le permite reingresar al campamento, aunque aún con restricciones. ''Podrá entrar'' recoge esa posibilidad autorizada.'
- source_word: וְיָשַׁב מִחוּץ לְאָהֳלוֹ
  english_pob_choice: but he shall stay outside his tent
  chosen_spanish: pero permanecerá fuera de su tienda
  alternatives_spanish:
  - y permanecerá fuera de su tienda
  - pero vivirá fuera de su tienda
  - y se quedará fuera de su tienda
  lexicon: HALOT
  rationale: יָשַׁב aquí expresa permanecer o residir temporalmente; 'permanecerá' suena natural y sostiene la restricción posterior. 'Tienda' traduce אָהֶל en un registro cercano al del texto hebreo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  - por siete jornadas
  lexicon: HALOT
  rationale: La expresión de duración se transmite con una fórmula española idiomática y precisa. 'Por siete días' corresponde bien a la restricción temporal establecida en el verso.
theological_decisions:
- issue: Lenguaje de pureza ritual frente a pureza moral
  english_pob_reading: Rendered טהר/מטהר with 'cleansed/clean' in ritual terms rather than moralized language.
  chosen_spanish_reading: '''Purificando'' y ''limpio'' en sentido ritual, no moral.'
  alternative_spanish_readings:
  - purificado/puro
  - limpio en sentido ceremonial
  rationale: El contexto es levítico y trata de restauración ritual tras una condición de impureza, no de santificación moral interior. Mantener el campo semántico de purificación/limpieza evita introducir una lectura doctrinal ajena al pasaje.
  doctrine_reference: 'Principio de traducción: respetar el sentido ritual del texto sin cargarlo con inferencias morales no presentes en el hebreo.'
translation_notes:
  revision_awareness: Se siguió el sentido y la resolución auditada de la traducción inglesa POB, sin cambios textuales reportados en la revisión más reciente; la concordancia de revisión indica alta coincidencia y ausencia de cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo 'campamento' para הַמַּחֲנֶה, en línea con el uso bíblico de contexto levítico.
  - Se usó 'tienda' para אָהֶל sin ampliar a 'hogar' o 'vivienda', para conservar la imagen del hebreo.
  - Se preservó la distinción entre lavar vestidos, afeitar cabello y bañarse, ya que el texto enumera acciones separadas con finalidad ritual.
  - No se introdujo 'SEÑOR' ni otra sustitución nominal; este verso no contiene el Nombre divino.
