revisions:
- from: 'Y respondió todo el pueblo unido y dijo: “Todo lo que Yahvé ha hablado, haremos”. Entonces Moisés llevó de regreso las palabras del pueblo a Yahvé.'
  to: 'Y todo el pueblo respondió a una y dijo: «Todo lo que Yahvé ha hablado, haremos». Entonces Moisés devolvió las palabras del pueblo a Yahvé.[a]'
  rationale: Se reemplaza «unido» por «a una» para reflejar con más precisión el adverbio יַחְדָּו y sonar natural en español. Se cambia «llevó de regreso» por «devolvió» para conservar la idea de retorno de וַיָּשֶׁב con mejor fluidez. Se añade la nota léxica alternativa porque el inglés auditado preservó «reported» como opción significativa. También se ajusta la puntuación de la cita a un español más natural.
