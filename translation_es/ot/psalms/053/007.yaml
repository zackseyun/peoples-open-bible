translation:
  language: es
  text: ¡Oh, que la salvación de Israel viniera de Sion! Cuando Dios restaure la suerte[a] de su pueblo, que Jacob se alegre; que Israel se goce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando Dios haga volver la cautividad de su pueblo» o «Cuando Dios restaure a su pueblo cautivo». El modismo hebreo puede denotar la restauración desde una situación de aflicción en general, a menudo incluyendo el regreso del cautiverio.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that ... would come
  chosen_spanish: ¡Oh, que ... viniera!
  alternatives_spanish:
  - ¡Si tan solo ... viniera!
  - ¡Ojalá ... viniera!
  lexicon: HALOT
  rationale: El hebreo expresa deseo o anhelo, no una pregunta literal. En español, «¡Oh, que...!» comunica ese tono optativo con naturalidad y dignidad, sin endurecerlo en una interrogación.
- source_word: מִצִּיּוֹן
  english_pob_choice: out of Zion
  chosen_spanish: de Sion
  alternatives_spanish:
  - desde Sion
  - de la Sion
  lexicon: HALOT
  rationale: La preposición de origen se rinde de forma natural con «de», que en español puede expresar procedencia. «Desde Sion» también es posible, pero «de Sion» mantiene concisión y fluidez poética.
- source_word: יְשֻׁעוֹת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - las salvaciones
  - la liberación
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, funciona aquí como plural intensivo o abstracto. En español, el singular «la salvación» comunica mejor el sentido colectivo y esperado del socorro para Israel.
- source_word: בְּשׁוּב
  english_pob_choice: When ... restores
  chosen_spanish: Cuando ... restaure
  alternatives_spanish:
  - cuando ... vuelva
  - al volver
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. «Cuando» reproduce bien el valor temporal del hebreo; «restaure» expresa el matiz de reversión/restauración que el contexto requiere.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios de Israel
  lexicon: HALOT
  rationale: El texto hebreo usa אֱלֹהִים, no el nombre divino. En español, «Dios» es la correspondencia directa y evita introducir una designación no presente en el hebreo.
- source_word: שְׁבוּת עַמּוֹ
  english_pob_choice: the fortunes of his people
  chosen_spanish: la suerte de su pueblo
  alternatives_spanish:
  - la cautividad de su pueblo
  - el cautiverio de su pueblo
  - la restauración de su pueblo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede abarcar reversión de aflicción o cautiverio. «La suerte de su pueblo» mantiene el sentido de cambio de condición sin forzar la imagen exclusivamente a cautiverio; «restaurar» en el verbo principal conserva el eje de reversión.
- source_word: יָגֵל
  english_pob_choice: let Jacob rejoice
  chosen_spanish: se alegrará Jacob
  alternatives_spanish:
  - que Jacob se alegre
  - Jacob se alegrará
  lexicon: HALOT
  rationale: Tras la construcción optativa inicial, el perfecto/yiqtol puede funcionar como resultado deseado. En español, el futuro simple «se alegrará» conserva el efecto de expectativa poética y suena natural en paralelo con la segunda cola.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio como paralelismo poético con Israel, sin sustitución interpretativa.
- source_word: יִשְׂמַח
  english_pob_choice: let ... be glad
  chosen_spanish: se gozará
  alternatives_spanish:
  - que se goce
  - se alegrará
  lexicon: HALOT
  rationale: Se distingue de יָגֵל con «gozará», una variación semántica natural en español que preserva el paralelismo poético sin repetir exactamente el mismo verbo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre del pueblo del pacto en la cola paralela, como en el hebreo.
theological_decisions:
- issue: Sentido de שׁוּב שְׁבוּת / שְׁבֻת
  english_pob_reading: restores the fortunes of his people
  chosen_spanish_reading: restaure la suerte de su pueblo
  alternative_spanish_readings:
  - traiga de vuelta la cautividad de su pueblo
  - restaure a su pueblo cautivo
  - restaure el cautiverio de su pueblo
  rationale: 'La expresión es un modismo hebreo que puede incluir el regreso del cautiverio, pero normalmente es más amplia: reversión de la desgracia y restauración de la condición del pueblo. «La suerte de su pueblo» conserva esa amplitud sin eliminar la posible resonancia histórica con el exilio; la nota preserva la lectura más literal.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Concordancia alta con el texto hebreo y con el aparato en inglés; sin revisiones aplicadas respecto del último pase. Se preserva la tensión del modismo שׁוּב שְׁבוּת mediante una opción idiomática amplia en el cuerpo y una nota con la alternativa más literal.
  spanish_consistency_notes:
  - Se usa «Sion» sin artículo para seguir el nombre propio bíblico y evitar un calco innecesario.
  - Se conserva «Dios» para אֱלֹהִים, ya que el verso no usa el Tetragrámaton.
  - 'Se mantiene la simetría poética con dos verbos distintos: «se alegrará» / «se gozará».'
  - La puntuación reproduce el tono optativo inicial y la estructura paralela del verso.
