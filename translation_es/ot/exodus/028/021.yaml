    reason: lexical_alternative
  - marker: b
    text: O «con grabados de sello» o «grabadas con el grabado de un sello».
    reason: lexical_alternative
  - marker: c
    text: «Hijos de Israel» es la expresión hebrea; algunas traducciones la vierten «israelitas» o «hijos de Jacob/Israel», pero aquí se conserva la formulación formal del texto fuente.
    reason: lexical_alternative
  revision_rationale: Se ajusta «estarán» a «serán» por mayor naturalidad en español, se cambia «cada una» por «cada cual» para reflejar mejor el distributivo hebreo אִישׁ sin sonar forzado, y se añade la nota faltante sobre «hijos de Israel» para preservar la justificación lexical/theológica del POB auditado.
