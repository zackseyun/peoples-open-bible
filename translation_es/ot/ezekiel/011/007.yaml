revisions:
- from: 'Por tanto, así dice el Señor Yahvé: Vuestros muertos[a], que habéis puesto en medio de ella, ellos son la carne[b], y ella es la olla; pero a vosotros os sacaré de en medio de ella.'
  to: 'Por tanto, así dice el Señor Yahvé: Sus caídos[a], a quienes han puesto en medio de ella, ellos son la carne[b], y ella es la olla; pero a ustedes los sacaré de en medio de ella.'
  rationale: Se ajustó el registro al español neutral latinoamericano, se mejoró la naturalidad de la fórmula divina con 'el Señor Yahvé', se fortaleció el sentido de חַלְלֵיכֶם con 'sus caídos', y se corrigió la nota sobre בָּשָׂר para que presente una alternativa real sin perder 'carne' en el texto principal.
