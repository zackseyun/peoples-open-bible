  glossary_alignment: No hay conflicto con las directrices principales de terminología (Yahvé, Mesías, etc.). La decisión crítica aquí es הֶבֶל. Dado el razonamiento POB documentado — privilegiar la imagen concreta sobre abstracciones como «vanidad» o «futilidad» — «vapor» alinea mejor el español con esa filosofía que «aliento». «Qohelet» es una transliteración aceptable en español para conservar apertura semántica.
