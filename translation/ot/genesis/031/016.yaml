id: GEN.31.16
reference: Genesis 31:16
source:
  edition: WLC
  text: כִּ֣י כָל הָ/עֹ֗שֶׁר אֲשֶׁ֨ר הִצִּ֤יל אֱלֹהִים֙ מֵֽ/אָבִ֔י/נוּ לָ֥/נוּ ה֖וּא וּ/לְ/בָנֵ֑י/נוּ וְ/עַתָּ֗ה כֹּל֩ אֲשֶׁ֨ר אָמַ֧ר אֱלֹהִ֛ים אֵלֶ֖י/ךָ עֲשֵֽׂה־׃
translation:
  text: For all the wealth that God has taken from our father belongs to us and to our children. So now[a], whatever God has said to you, do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has rescued' / 'has delivered.' The Hebrew verb often carries the sense of deliverance, but here it refers to God removing wealth from Laban and giving it to Jacob's household.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the sisters' rationale for agreeing with Jacob. 'For' fits the explanatory force in context better than the more causal 'because' in English sentence flow.
- source_word: כָל הָעֹשֶׁר
  chosen: all the wealth
  alternatives:
  - all the riches
  - all the property
  lexicon: HALOT
  rationale: עֹשֶׁר denotes wealth/riches; 'wealth' is natural modern English and broad enough to include livestock and material assets in the narrative context.
- source_word: הִצִּיל
  chosen: has taken away
  alternatives:
  - has delivered
  - has rescued
  - has snatched away
  lexicon: HALOT
  rationale: The hiphil of נצל often means 'deliver/rescue,' but here the object is wealth removed from Laban and transferred in justice to Jacob's household. 'Has taken away' best reflects the transfer sense in context without implying violent seizure.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for אֱלֹהִים referring to the true God in this narrative.
- source_word: מֵאָבִינוּ
  chosen: from our father
  alternatives:
  - out of our father's possession
  lexicon: HALOT
  rationale: 'The preposition מן marks source: the wealth was taken from their father. The simple rendering is sufficient and clear.'
- source_word: לָנוּ הוּא וּלְבָנֵינוּ
  chosen: belongs to us and to our children
  alternatives:
  - is ours and our children's
  - is for us and for our children
  lexicon: HALOT
  rationale: The Hebrew expresses possession/entitlement. 'Belongs to us and to our children' makes the implied possessive sense explicit in idiomatic English.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Marks transition from rationale to exhortation. 'So now' captures the inferential force naturally.
- source_word: כֹּל אֲשֶׁר אָמַר אֱלֹהִים אֵלֶיךָ
  chosen: whatever God has said to you
  alternatives:
  - all that God has said to you
  lexicon: HALOT
  rationale: כֹּל אֲשֶׁר can be rendered 'all that' or 'whatever.' 'Whatever' sounds more natural in direct exhortation while preserving totality.
- source_word: עֲשֵׂה
  chosen: do
  alternatives:
  - do it
  - carry it out
  lexicon: HALOT
  rationale: The imperative is concise. English can omit the object because it is supplied by the preceding clause; 'do' preserves the terseness of the Hebrew.
