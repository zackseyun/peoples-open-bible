review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura general del hebreo: mandato introductorio, vocativo al rey de Judá, mención del trono de David, y ampliación del destinatario a rey, siervos/servidores y pueblo que entran por esas puertas. También preserva correctamente «Yahvé» para יְהוָה. Sin embargo, hay un desajuste léxico importante en עֲבָדֶיךָ: en este contexto cortesano el inglés auditado eligió «your servants» con nota alternativa «officials», y rechazó restringirlo a un cargo específico; en español, «tus esclavos» introduce una fuerza social demasiado estrecha y poco natural para un entorno de corte real, alterando el referente probable. Además, «tú que te sientas» duplica de manera algo torpe el pronombre enfático אַתָּה, que en el hebreo va después de la cláusula relativa y debe conservarse mejor como enumeración separada.'
  spanish_quality_summary: 'El español es generalmente claro, pero «tus esclavos» suena impropio en una dirección al rey y puede distraer al lector moderno hacia esclavitud doméstica/chattel más que hacia servidores de la corte. También la secuencia «rey de Judá, tú que te sientas...: tú...» resulta pesada y menos elegante que una relativa simple seguida de la aposición enfática. Una redacción más natural y fiel sería «rey de Judá, que te sientas sobre el trono de David: tú, tus servidores[a] y tu pueblo, los que entran por estas puertas».'
  glossary_alignment: 'Alinea bien con el proyecto en «Yahvé». La excepción principal es עֲבָדֶיךָ: aunque el proyecto favorece «esclavo» para עֶבֶד/δοῦλος cuando el inglés POB eligió «slave», aquí el inglés auditado eligió «servants» precisamente por el contexto real. Por eso el español debe seguir la decisión contextual documentada y no aplicar mecánicamente «esclavos».'
  issues:
  - severity: high
    issue: «tus esclavos» para עֲבָדֶיךָ en contexto cortesano
    rationale: El audit trail inglés opta por «your servants» y solo ofrece «officials» como alternativa. «Esclavos» en español restringe y endurece el referente de forma no apoyada por esta decisión contextual, y reduce la legibilidad.
  - severity: medium
    issue: 'Duplicación poco natural de «tú» en «tú que te sientas ...: tú...»'
    rationale: El hebreo tiene primero la cláusula relativa «que se sienta» aplicada a «rey de Judá» y luego el pronombre enfático אַתָּה al iniciar la enumeración. En español conviene separar ambas funciones para mayor fidelidad y fluidez.
  - severity: low
    issue: Nota léxica actual anclada a una elección principal problemática
    rationale: Si se corrige el texto a «servidores» o «siervos», la nota debe ajustarse para conservar la alternativa documentada «funcionarios» sin crear tensión innecesaria con una base incorrecta.
