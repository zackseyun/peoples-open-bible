revisions:
- from: Y aun nuestro ganado irá con nosotros; no quedará una pezuña [a], porque de él hemos de tomar para servir a Yahvé nuestro Dios, y no sabemos con qué hemos de servir a Yahvé hasta que lleguemos allí.
  to: Y aun nuestro ganado irá con nosotros; no quedará ni una pezuña, porque de nuestro ganado hemos de tomar para servir[a] a Yahvé nuestro Dios, y no sabemos con qué hemos de servir a Yahvé hasta que lleguemos allí.
  rationale: 'Se ajustó el español para mejorar claridad y naturalidad sin apartarse del hebreo ni del rastro de auditoría inglés: ''ni una pezuña'' refleja mejor la negación enfática; ''de nuestro ganado hemos de tomar'' aclara el referente colectivo de מִמֶּנּוּ en español; y la nota se movió al verbo ''servir'', que es donde corresponde la alternativa léxica.'
  reviewer_model: gpt-5.4
