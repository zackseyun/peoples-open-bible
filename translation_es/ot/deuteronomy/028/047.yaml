translation:
  language: es
  text: porque no serviste a Yahvé tu Dios con gozo y con alegría de corazón[a], por la abundancia de todas las cosas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «con bondad de corazón» o «con bien de corazón»; el hebreo puede solaparse con la idea de «alegría de corazón».
    reason: lexical_alternative
  - marker: b
    text: 'O: «a partir de la abundancia de todo» o «cuando había abundancia de todo». La frase indica que Israel no sirvió a Yahvé pese a la provisión abundante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - a causa de que
  lexicon: HALOT
  rationale: El hebreo introduce la razón del juicio/castigo del pacto; en español, «porque» comunica de manera natural ese valor causal sin volver la frase rígida.
- source_word: עָבַדְתָּ
  english_pob_choice: serve
  chosen_spanish: serviste
  alternatives_spanish:
  - adoraste
  - trabajaste para
  - prestaste servicio
  lexicon: HALOT
  rationale: Con Dios como objeto, עבד conserva el sentido de servicio de pacto. «Serviste» preserva esa amplitud mejor que «adoraste», que estrecha el término a culto formal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la política del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el tuyo
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se refleja de forma directa y natural con «tu Dios».
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - gozoso
  - con gozo
  lexicon: HALOT
  rationale: La preposición indica manera; «con alegría» es una equivalencia clara y digna para el sustantivo שִׂמְחָה.
- source_word: וּבְטוּב לֵבָב
  english_pob_choice: with gladness of heart
  chosen_spanish: con alegría de corazón[a]
  alternatives_spanish:
  - con bondad de corazón
  - con un corazón bueno
  - con gozo de corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «bondad de corazón» o «bien de corazón», pero el propio audit trail inglés reconoce la cercanía a «gladness of heart». En español, «alegría de corazón» expresa de forma natural esa superposición semántica sin perder la tensión léxica entre טוב y שִׂמְחָה.
- source_word: מֵרֹב כֹּל
  english_pob_choice: because of the abundance of all things
  chosen_spanish: por la abundancia de todas las cosas[b]
  alternatives_spanish:
  - a causa de la abundancia de todo
  - cuando había abundancia de todo
  - en medio de la abundancia de todas las cosas
  lexicon: HALOT
  rationale: La frase señala que la desobediencia ocurrió en un contexto de abundancia. «Por la abundancia de todas las cosas» conserva el valor circunstancial del hebreo y sigue de cerca la formulación auditada en inglés.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se preserva el nombre propio del pacto en vez de un sustituto honorífico. Esto mantiene visible la identidad del Dios que habla y juzga en el contexto del Deuteronomio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עבד con Dios como objeto
  english_pob_reading: serve
  chosen_spanish_reading: servir
  alternative_spanish_readings:
  - adorar
  - rendir culto
  rationale: El verso acusa la falta de servicio fiel a Yahvé en un contexto de obediencia de pacto. «Servir» deja abierta la dimensión de culto sin reducirla solo a liturgia.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Tensión entre טוּב לֵבָב y שִׂמְחָה
  english_pob_reading: with gladness of heart
  chosen_spanish_reading: con alegría de corazón
  alternative_spanish_readings:
  - con bondad de corazón
  - con un corazón alegre
  rationale: El hebreo mantiene dos expresiones cercanas pero no idénticas. «Alegría de corazón» conserva la relación con שִׂמְחָה y permite reflejar, en español, que טוּב לֵבָב apunta a una disposición interior benigna o gozosa sin borrar la ambigüedad lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, lexical nuance
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «with gladness of heart» frente a «with a good heart». La versión española conserva esa decisión interpretativa, pero formula la expresión de modo natural en español sin perder la tensión entre el valor literal de טוּב לֵבָב y su posible equivalencia idiomática con una disposición gozosa interior.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se traduce עבד con «servir/serviste» para preservar el valor de servicio de pacto.
  - Se mantiene una duplicación expresiva en la segunda cola («alegría de corazón») para no borrar la cercanía semántica con la primera frase.
  - Se conserva «abundancia de todas las cosas» para reflejar el alcance amplio de כֹּל sin estrecharlo innecesariamente.
