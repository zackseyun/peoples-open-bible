translation:
  language: es
  text: No se apartará el cetro de Judá, ni el bastón del gobernante de entre sus pies, hasta que venga Shiloh[a]; y a él le pertenecerá la obediencia de los pueblos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hasta que venga el que tiene el derecho’; el hebreo שילה es difícil y también se ha entendido como un título, un nombre de lugar o una referencia al tributo.
    reason: alternative_reading
  - marker: b
    text: O ‘y a él le pertenecerá la reunión de los pueblos’, o ‘la sumisión de los pueblos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁבֶט
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  - vara de mando
  lexicon: HALOT
  rationale: En este contexto regio-poético, el hebreo no apunta primero a una vara común ni a ‘tribu’, sino al emblema de autoridad real. ‘Cetro’ conserva mejor esa carga de gobierno y dignidad en español.
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - de Yehudá
  lexicon: HALOT
  rationale: '‘Judá’ es la forma estándar y clara en español. La preposición expresa procedencia/separación: el cetro no se apartará de Judá.'
- source_word: מְחֹקֵק
  english_pob_choice: ruler’s staff
  chosen_spanish: bastón del gobernante
  alternatives_spanish:
  - vara del gobernante
  - gobernante
  - legislador
  lexicon: HALOT
  rationale: El término puede referirse a quien decreta o al símbolo asociado con el mando. Aquí, en paralelo con ‘cetro’ y con la expresión siguiente, ‘bastón del gobernante’ comunica el sentido de insignia de autoridad sin reducirlo a ‘legislador’.
- source_word: מִבֵּין רַגְלָיו
  english_pob_choice: from between his feet
  chosen_spanish: de entre sus pies
  alternatives_spanish:
  - de entre sus piernas
  - de entre sus descendientes
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo, porque el texto usa una expresión poética literal. No se traslada una interpretación explicativa al cuerpo del versículo.
- source_word: עַד כִּי
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: HALOT
  rationale: ‘Hasta que’ es la forma natural en español para introducir el límite temporal de la afirmación.
- source_word: שילה
  english_pob_choice: Shiloh
  chosen_spanish: Shiloh
  alternatives_spanish:
  - el que tiene el derecho
  - tributo
  - Silo
  lexicon: HALOT
  rationale: El hebreo es difícil y discutido. Se conserva ‘Shiloh’ como transliteración en el texto principal para no resolver dogmáticamente el crux; las alternativas se mantienen implícitamente abiertas por el contexto y la nota.
- source_word: וְלוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - a ello
  lexicon: HALOT
  rationale: Tomando ‘Shiloh’ como referente personal en el texto principal, el sufijo se vierte naturalmente como ‘a él’, manteniendo la sintaxis clara en español.
- source_word: יִקְּהַת
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - reunión
  - sumisión
  - homenaje
  lexicon: HALOT
  rationale: En el contexto de la llegada del gobernante y de los ‘pueblos’, ‘obediencia’ capta bien la idea de sometimiento o respuesta leal. Es más natural que ‘reunión’ en el cuerpo principal, aunque esa alternativa sigue siendo posible.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: ‘Pueblos’ reproduce de manera más directa el plural hebreo y conserva el alcance amplio del texto sin introducir un matiz más interpretativo como ‘naciones’.
theological_decisions:
- issue: Identidad de Shiloh y tensión interpretativa del pasaje
  english_pob_reading: Retain 'Shiloh' in the main text as a transliterated proper name, without explicitly identifying the referent as the Messiah in translation.
  chosen_spanish_reading: Conservar ‘Shiloh’ en el texto principal, sin identificar explícitamente al referente como el Mesías.
  alternative_spanish_readings:
  - el que tiene el derecho
  - hasta que venga a Silo
  - hasta que le pertenezca
  rationale: La traducción preserva la dificultad del hebreo y evita resolver el pasaje de forma más precisa de lo que el texto permite. Así se mantiene la tensión interpretativa y la apertura canónica, sin imponer una lectura doctrinal en la línea principal.
  doctrine_reference: Translation philosophy §§1, 3; translate names; preserve tensions
- issue: Imagen real sin expansión doctrinal explícita
  english_pob_reading: Use royal language ('scepter,' 'ruler’s staff,' 'obedience of the peoples') that reflects the Hebrew imagery without making an explicit doctrinal claim beyond the text.
  chosen_spanish_reading: Usar lenguaje real (‘cetro’, ‘bastón del gobernante’, ‘obediencia de los pueblos’) sin convertir el versículo en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - lectura dinástica-política más literal
  - paráfrasis mesiánica explícita
  rationale: El hebreo presenta una imagen de dominio y homenaje de alcance amplio. La versión española conserva esa fuerza regia, pero no añade una identificación cristológica explícita que el versículo no formula directamente.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue la lectura estable del audit trail inglés y no incorpora revisiones posteriores; el pass más reciente quedó sin cambios y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se mantiene ‘Judá’ como forma bíblica estándar en español.
  - Se conserva ‘Shiloh’ transliterado para respetar la ambigüedad del hebreo.
  - Se usa ‘pueblos’ para reflejar el plural hebreo sin forzar ‘naciones’.
  - ‘Cetro’ y ‘bastón del gobernante’ preservan el paralelismo regio del verso.
  - La sintaxis de ‘hasta que venga Shiloh’ refleja el inglés auditado y el hebreo sin expandir el sentido.
