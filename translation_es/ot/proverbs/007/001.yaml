translation:
  language: es
  text: Hijo mío, guarda mis palabras, y atesora[a] mis mandamientos contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guarda cuidadosamente». El verbo hebreo puede transmitir la idea de almacenar o esconder algo con cuidado para preservarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío, hijo
  lexicon: HALOT
  rationale: El hebreo es una vocación paternal singular masculina con sufijo de 1ª persona. «Hijo mío» reproduce con naturalidad y fidelidad esa forma de dirección en español, conservando el tono sapiencial.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - mantén
  - custodia
  - observa
  lexicon: HALOT
  rationale: El imperativo pide retener con cuidado y obedecer lo recibido. «Guarda» comunica en español tanto la conservación atenta como la idea de obediencia, sin sonar rígido.
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis enseñanzas
  lexicon: HALOT
  rationale: אָמַר aquí apunta a las palabras o dichos del hablante. «Mis palabras» es la opción más directa y natural, y no estrecha innecesariamente el alcance del término.
- source_word: וּמִצְוֺתַי
  english_pob_choice: and my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: מִצְוָה tiene peso normativo fuerte. «Mandamientos» preserva ese valor de instrucción obligatoria y encaja bien con el registro sapiencial.
- source_word: תִּצְפֹּן
  english_pob_choice: treasure up
  chosen_spanish: atesora
  alternatives_spanish:
  - guarda cuidadosamente
  - reserva
  - enciérralos
  lexicon: HALOT
  rationale: El verbo צפן conlleva ocultar o guardar para seguridad. Dado el ajuste del POB inglés a «treasure up», «atesora» transmite la idea de preservar con estima y cuidado, sin introducir la noción de secreto.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - junto a ti
  - en ti
  lexicon: HALOT
  rationale: La preposición con sufijo expresa proximidad posesiva o acompañante. «Contigo» es la forma idiomática y fiel en español; «en ti» sería más interpretativo que el hebreo.
translation_notes:
  revision_awareness: La versión española sigue el ajuste más reciente del audit trail inglés, que prefirió una equivalencia más natural para תִּצְפֹּן («treasure up») sin perder la idea de guardar/reservar cuidadosamente. En español se resolvió con «atesora», que preserva tanto la imagen de valor como la de custodia.
  spanish_consistency_notes:
  - Se mantuvo un registro sapiencial claro y digno, acorde con Proverbios.
  - Se evitó «SEÑOR» u այլ masking convention porque no aparece el tetragrámaton en este versículo.
  - «Mandamientos» y «guarda» mantienen coherencia terminológica con la tradición bíblica en español, pero sin depender de un calco arcaizante.
