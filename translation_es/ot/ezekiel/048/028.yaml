review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura geográfica del hebreo y respeta la revisión inglesa al no añadir «de Egipto» a נַחֲלָה. También preserva la duplicación direccional del sur y mantiene el topónimo Meribat-cades con nota alternativa adecuada. Sin embargo, «junto al límite de Gad» debilita וְעַל גְּבוּל גָּד, que en fórmula limítrofe se expresa mejor como «a lo largo del límite de Gad» o equivalente, y «el límite estará desde» suena poco natural en español para una fórmula de delimitación.
  spanish_quality_summary: 'El texto es generalmente claro, pero presenta dos puntos de estilo importantes: «junto al límite» suena más a proximidad que a trazado del lindero, y «el límite estará desde Tamar» resulta rígido e idiomáticamente flojo en español bíblico moderno. «Torrente» es comprensible, pero en este contexto limítrofe «wadi» comunica mejor el valor de cauce estacional, especialmente porque ya se explica en nota y evita sugerir un flujo permanente fuerte.'
  glossary_alignment: No hay términos del glosario teológico principal en juego. La transliteración de Meribat-cades está bien motivada. La elección de «wadi» se alinea mejor con la decisión léxica documentada del POB para נַחֲלָה en este versículo que «torrente», aunque una nota puede mantener la explicación para lectores hispanos.
  issues:
  - severity: medium
    issue: «junto al límite de Gad» para וְעַל גְּבוּל גָּד
    rationale: «Junto a» indica cercanía, pero la fórmula hebrea describe el trazado a lo largo de un lindero. «A lo largo del límite de Gad» preserva mejor la función espacial.
  - severity: medium
    issue: «el límite estará desde Tamar» es poco natural
    rationale: Aunque intenta reflejar literalmente וְהָיָה גְבוּל, en español la combinación con «desde» queda torpe. «El límite será desde Tamar…» conserva la literalidad mejor que «estará», o alternativamente una fórmula de recorrido más idiomática.
  - severity: low
    issue: «el torrente» para נַחֲלָה puede desalinearse de la decisión auditada «the Wadi»
    rationale: La auditoría inglesa eligió «the Wadi» precisamente para evitar expansión geográfica y mantener el matiz de cauce estacional. En español, «wadi» es aceptable con nota explicativa y evita asociaciones distintas de «torrente».
  revised_spanish_text: Y a lo largo del límite de Gad, en el lado del sur, hacia el sur, el límite será desde Tamar hasta las aguas de Meribat-cades[a], hasta el wadi[b], hasta el Mar Grande.
  revised_footnotes:
  - marker: a
    text: «Meribat-cades» refleja el constructo hebreo מְרִיבַת קָדֵשׁ. La forma más familiar en algunas traducciones es «Meribá-cades».
    reason: lexical_alternative
  - marker: b
    text: O «el torrente». El hebreo puede denotar un cauce estacional o wadi; aquí se usa «wadi» para evitar sugerir un curso de agua permanente y para no añadir una identificación geográfica que el verso no expresa.
    reason: lexical_alternative
  revision_rationale: Se ajusta la preposición inicial para expresar el trazado del lindero en vez de mera proximidad, se mejora la naturalidad de la fórmula de delimitación con «será desde», y se alinea נַחֲלָה con la decisión auditada usando «wadi» con nota explicativa.
