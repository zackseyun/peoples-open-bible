translation:
  language: es
  text: y todos los reyes de Zimri[a], y todos los reyes de Elam, y todos los reyes de Media[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posiblemente 'los medos'. El hebreo מָדָי puede designar la tierra de Media o al pueblo medo.
    reason: lexical_alternative
  - marker: b
    text: La identidad de Zimri es incierta; quizá designa un pueblo o una región no identificados con claridad en otras fuentes.
    reason: cultural_note
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - y [marcador de objeto omitido en español]
  lexicon: HALOT
  rationale: En español, el objeto directo queda marcado por la preposición y el orden; el objeto marcador אֵת no requiere equivalente separado. Se mantiene la conjunción copulativa simple para reflejar la secuencia enumerativa.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los
  alternatives_spanish:
  - cada uno de los
  - todos los demás
  lexicon: HALOT
  rationale: Antes de un sustantivo plural en construcción, 'todos los' expresa la totalidad del grupo de manera natural en español y conserva la fuerza inclusiva del hebreo.
- source_word: מַלְכֵי
  english_pob_choice: the kings of
  chosen_spanish: los reyes de
  alternatives_spanish:
  - reyes de
  - los gobernantes de
  lexicon: HALOT
  rationale: La construcción en hebreo es un estado constructo plural ('reyes de'); en español, 'los reyes de' transmite con claridad la relación de pertenencia o asociación sin añadir matices no presentes en el texto.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  alternatives_spanish:
  - Zimry
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva 'Zimri' para respetar la forma hebrea y la política de transliteración del proyecto; el referente sigue siendo incierto.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  lexicon: HALOT
  rationale: Topónimo establecido; se mantiene la transliteración estándar en español bíblico.
- source_word: מָדָי
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - los medos
  lexicon: HALOT
  rationale: El hebreo puede referirse a la región o al pueblo. Dado el paralelismo con otros nombres territoriales y la construcción 'reyes de', 'Media' es la opción principal; 'los medos' queda como alternativa posible en nota.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al texto fuente-auditado en inglés; se conserva la estructura enumerativa y las incertidumbres léxicas documentadas.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el verso no contiene el tetragrámaton ni una cita de κύριος.
  - Se mantiene 'todos los reyes de' para reflejar el plural constructo hebreo y la lista geográfica.
  - Los nombres propios se transliteran sin domesticación interpretativa.
  - La puntuación con punto y coma final sigue el valor enumerativo del hebreo y la práctica del tramo en inglés.
