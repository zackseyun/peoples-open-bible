translation:
  language: es
  text: Egipto es hombre y no Dios[a], y sus caballos son carne y no espíritu[b]. Cuando Yahvé extienda su mano, tropezará el que ayuda y caerá el ayudado, y juntos todos ellos llegarán a su fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Egipto es humano y no Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus caballos son carne y no espíritu»; «espíritu» puede entenderse aquí más ampliamente como fuerza vital o poder inmaterial, no necesariamente como una referencia directa al Espíritu Santo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todos ellos perecerán» / «todos ellos serán consumidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mizraim
  lexicon: HALOT
  rationale: Nombre propio nacional estándar en español; mantiene la referencia colectiva al país/nación.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humano
  - humanidad
  lexicon: HALOT
  rationale: En el contraste con Dios, 'hombre' conserva la tersura y fuerza retórica del hebreo, sin borrar que se trata de la condición humana.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  lexicon: HALOT
  rationale: Aquí el contraste apunta al Dios verdadero frente a la mera criatura; en español 'Dios' comunica con claridad esa oposición.
- source_word: סוּסֵיהֶם
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - los caballos de ellos
  lexicon: HALOT
  rationale: Traducción literal y directa del posesivo plural.
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - mera carne
  - carne mortal
  lexicon: HALOT
  rationale: '''Carne'' preserva la oposición con ''espíritu'' y el matiz de fragilidad material sin explicar más de lo que el texto dice.'
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  lexicon: HALOT
  rationale: En este paralelismo con 'carne', 'espíritu' refleja el contraste entre lo material y lo no material/animado, sin imponer una referencia específica al Espíritu Santo.
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, sin mascarlo con una convención editorial.
- source_word: יַטֶּה יָדוֹ
  english_pob_choice: stretches out his hand
  chosen_spanish: extienda su mano
  alternatives_spanish:
  - tienda su mano
  - alargue su mano
  lexicon: HALOT
  rationale: La expresión es idiomática; 'extienda su mano' conserva el sentido de acción decisiva divina con español natural.
- source_word: עוֹזֵר
  english_pob_choice: the helper
  chosen_spanish: el ayudador
  alternatives_spanish:
  - el que ayuda
  - el auxiliar
  lexicon: HALOT
  rationale: Se conserva la relación semántica con el participio activo y con la simetría del verso; 'ayudador' es comprensible en registro bíblico y evita perder el eco formal.
- source_word: עָזֻר
  english_pob_choice: the one helped
  chosen_spanish: el ayudado
  alternatives_spanish:
  - el socorrido
  - el que recibe ayuda
  lexicon: HALOT
  rationale: Renderiza el participio pasivo con una forma breve y contrastiva que corresponde al paralelismo con 'el ayudador'.
- source_word: כָּשַׁל
  english_pob_choice: will stumble
  chosen_spanish: tropezará
  alternatives_spanish:
  - vacilará
  - caerá
  lexicon: HALOT
  rationale: '''Tropezará'' comunica bien el inicio del colapso en español moderno y mantiene la imagen concreta del tropiezo.'
- source_word: נָפַל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - se derrumbará
  lexicon: HALOT
  rationale: Complementa naturalmente 'tropezará' y conserva la progresión de ruina.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - todos juntos
  lexicon: HALOT
  rationale: Mantiene la idea de destino compartido entre el ayudador y el ayudado.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: Explicita el referente plural para reforzar la totalidad.
- source_word: יִכְלָיוּן
  english_pob_choice: will come to an end
  chosen_spanish: llegarán a su fin
  alternatives_spanish:
  - perecerán
  - serán consumidos
  lexicon: HALOT
  rationale: '''Llegarán a su fin'' comunica un término total sin reducir el hebreo a una sola imagen de destrucción.'
theological_decisions:
- issue: Cómo traducir רוּחַ en el paralelismo 'carne / espíritu'
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - Espíritu
  - aliento
  rationale: El paralelismo contrasta lo meramente material con lo no material o vital. 'Espíritu' mantiene esa tensión y no introduce por sí solo una referencia explícita al Espíritu Santo.
  doctrine_reference: Preservar la tensión léxica y teológica del original; no resolverla doctrinalmente más allá del texto.
- issue: Cómo reflejar אָדָם en el contraste 'Egipto es אָדָם y no Dios'
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humano
  - humanidad
  rationale: '''Hombre'' conserva la contundencia del contraste y respeta la preferencia del proyecto por una traducción con fuerza léxica, sin que el foco sea la masculinidad biológica.'
  doctrine_reference: 'DOCTRINE.md: אָדָם puede rendirse como ''man / humankind'' según el contexto; aquí el contraste retórico favorece ''hombre''.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se adoptan las mismas decisiones de contraste: אָדָם = ''hombre'', אֵל = ''Dios'', בָּשָׂר = ''carne'', רוּחַ = ''espíritu'', y יִכְלָיוּן = ''llegarán a su fin''. Se ajusta el verbo de acción divina a un español idiomático (''extienda su mano'') y se conserva la estructura paralela del verso.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al criterio general del proyecto.
  - Se mantiene 'espíritu' en minúscula, porque el contraste es con 'carne' y no con una mención explícita al Espíritu Santo.
  - '''Hombre'' se emplea como equivalente de אָדָם en este contraste antitético, no como marcador de género biológico.'
  - '''Ayudador'' y ''ayudado'' conservan el paralelismo funcional del hebreo.'
  - '''Llegarán a su fin'' preserva el valor totalizante del cierre sin añadir imágenes no presentes en el texto.'
