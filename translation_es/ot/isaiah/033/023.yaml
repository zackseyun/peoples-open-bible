    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto principal para alinear la decisión léxica española con la evidencia fuente y con la auditoría del POB inglés: mantener la metáfora del barco averiado exige ''vela'' para נֵס, con ''bandera/enseña'' conservado en nota como alternativa. También se suaviza la última cláusula a una formulación más idiomática en español (''se llevarán el botín'').'
