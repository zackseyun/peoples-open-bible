  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, etc. La fórmula 'Hijo de hombre' concuerda con la racionalidad documentada del POB para בֶּן אָדָם en Ezequiel.
