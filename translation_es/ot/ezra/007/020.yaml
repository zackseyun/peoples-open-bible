revisions:
- from: Y cualquier otra necesidad de la casa de tu Dios que te corresponda proveer[a], la proveerás de la casa de los tesoros del rey.
  to: Y cualquier otra necesidad de la casa de tu Dios que te corresponda suplir[a], la suplirás de la casa de los tesoros del rey.
  rationale: Se reemplaza "proveer" por "suplir" para que el español trate de manera idiomática el objeto "necesidad" y conserve con claridad el sentido administrativo de suministrar lo necesario. Se mantiene la estructura literal "de la casa de los tesoros del rey" y la nota con la alternativa más fluida.
