translation:
  language: es
  text: 'Y sucedió que, cuando el rey oyó la palabra del hombre de Dios, que había clamado contra el altar en Betel, Jeroboam extendió su mano desde el altar, diciendo: «¡Agárrenlo!». Pero su mano, que había extendido contra él, se secó[a], y no pudo volverla hacia sí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «se marchitó». Hebreo: «se secó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el dicho
  lexicon: HALOT
  rationale: דבר puede significar 'palabra', 'asunto' o 'mensaje'. 'La palabra' conserva la formulación concreta y el tono profético del original, sin expandir el sentido más de lo que exige el contexto.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: El hebreo usa un título establecido. 'Hombre de Dios' sigue de cerca la expresión fuente y evita sustituirla por una identificación interpretativa como 'profeta'.
- source_word: קָרָא עַל
  english_pob_choice: cried out against
  chosen_spanish: había clamado contra
  alternatives_spanish:
  - había proclamado contra
  - había gritado contra
  lexicon: HALOT
  rationale: '''Clamar'' reproduce el carácter oral y enfático de קרא en este juicio profético. ''Contra'' conserva la dirección adversativa de עַל en el contexto del altar.'
- source_word: בְּבֵית אֵל
  english_pob_choice: at Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Beth-el
  - en la casa de Dios
  lexicon: HALOT
  rationale: Como topónimo, 'Betel' es la forma castellana habitual y clara. 'En' funciona bien con el lugar del altar en la narración española.
- source_word: וַיִּשְׁלַח ... אֶת יָדוֹ מֵעַל הַמִּזְבֵּחַ
  english_pob_choice: stretched out his hand from the altar
  chosen_spanish: extendió su mano desde el altar
  alternatives_spanish:
  - alargó su mano desde el altar
  - extendió la mano desde el altar
  lexicon: HALOT
  rationale: La locución שׁלח יד se traduce naturalmente como 'extender la mano'. 'Desde el altar' refleja מֵעַל הַמִּזְבֵּחַ sin forzar una explicación adicional, manteniendo la imagen física del gesto.
- source_word: תִּפְשֻׂהוּ
  english_pob_choice: Seize him!
  chosen_spanish: ¡Apréndanlo!
  alternatives_spanish:
  - ¡Agárrenlo!
  - ¡Atrápenlo!
  - ¡Apresénlo!
  lexicon: HALOT
  rationale: El imperativo plural pide que los servidores tomen al hombre. 'Apréndanlo' sería poco natural y no refleja bien el valor léxico ni la fuerza del mandato; por eso se opta por '¡Atrápenlo!' en el sentido de capturar o detener a alguien.
- source_word: וַתִּיבַשׁ יָדוֹ
  english_pob_choice: his hand ... dried up
  chosen_spanish: su mano se secó
  alternatives_spanish:
  - su mano se le secó
  - su mano quedó seca
  - su mano se le paralizó
  lexicon: HALOT
  rationale: יַבשׁ significa 'secarse'. 'Se secó' conserva la imagen verbal directa del hebreo y permite dejar abierta la fuerza del juicio sin sustituirla por una explicación médica.
- source_word: אֲשֶׁר שָׁלַח עָלָיו
  english_pob_choice: which he stretched out against him
  chosen_spanish: que había extendido contra él
  alternatives_spanish:
  - que había lanzado contra él
  - que había alargado hacia él
  lexicon: HALOT
  rationale: El relativo recalca la misma mano en una acción hostil. 'Contra él' preserva el valor adversativo de על y mantiene la conexión con el gesto anterior.
- source_word: לַהֲשִׁיבָהּ אֵלָיו
  english_pob_choice: draw it back to himself
  chosen_spanish: volverla hacia sí
  alternatives_spanish:
  - traerla de vuelta a sí
  - retraerla hacia sí
  lexicon: HALOT
  rationale: שוב en hifil expresa hacer volver. En español, 'volverla hacia sí' comunica con naturalidad la imposibilidad física de replegar la mano, sin añadir matices ajenos al texto.
theological_decisions:
- issue: Naturaleza del juicio sobre la mano de Jeroboam
  english_pob_reading: Render the physical effect straightforwardly as a sudden disabling drying up of the hand, without specifying a medical diagnosis or softening the miraculous judgment.
  chosen_spanish_reading: Presentar el efecto físico de manera directa como una mano que se seca, sin diagnosticarla ni atenuar el carácter de juicio inmediato.
  alternative_spanish_readings:
  - su mano quedó paralizada
  - su mano se le secó como por una enfermedad
  rationale: El relato presenta una intervención divina inmediata ligada a la orden hostil del rey. 'Se secó' mantiene la imagen hebrea y evita tanto una medicalización como una suavización del juicio narrado.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no hubo cambios sustantivos en el análisis; se mantiene la lectura directa del hebreo y la preferencia por preservar la imagen de ''secarse'' frente a una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se conserva 'Betel' como topónimo castellano estándar.
  - Se mantiene 'hombre de Dios' por consistencia con el título hebreo y con el audit trail inglés.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino; el texto se centra en 'Dios'.
  - Se usa 'contra él' para reflejar el valor adversativo de עַל en la escena de confrontación.
  - La nota [a] queda anclada en 'se secó' para conservar la alternativa léxica documentada.
