id: GEN.43.6
reference: Genesis 43:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יִשְׂרָאֵ֔ל לָ/מָ֥ה הֲרֵעֹתֶ֖ם לִ֑/י לְ/הַגִּ֣יד לָ/אִ֔ישׁ הַ/ע֥וֹד לָ/כֶ֖ם אָֽח׃
translation:
  text: Then Israel said[a], “Why did you do me harm by telling the man that you still had another brother?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Why did you do me harm by telling the man that you still had a brother?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' is natural modern English while preserving the sequential force.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses the personal name/title 'Israel,' so it is retained rather than harmonized to 'Jacob.' This preserves the narrator's chosen designation.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the plain and natural equivalent.
- source_word: הֲרֵעֹתֶם
  chosen: did you bring this trouble on
  alternatives:
  - did you do evil to
  - did you harm
  - did you make things worse for
  lexicon: HALOT
  rationale: From רעע in the Hiphil, meaning to cause harm/do ill. In context Jacob is complaining that their disclosure caused him distress, so 'bring this trouble on me' captures the causative sense idiomatically without overstating moral evil.
- source_word: לִי
  chosen: on me
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: With the causative verb, English idiom prefers 'on me' ('bring trouble on me') rather than the more wooden 'to me.'
- source_word: לְהַגִּיד
  chosen: by telling
  alternatives:
  - to tell
  - by reporting
  - by informing
  lexicon: HALOT
  rationale: The infinitive expresses the means/circumstance by which the harm was done. 'By telling' makes that relation clear in English.
- source_word: לָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Refers to the Egyptian official already known in the narrative. 'The man' is the straightforward rendering of the definite phrase.
- source_word: הַעוֹד
  chosen: still
  alternatives:
  - yet
  - again
  lexicon: HALOT
  rationale: 'Here עוֹד marks continued existence/remaining status: whether they still had another brother. ''Still'' is the most natural English adverb in this question.'
- source_word: לָכֶם אָח
  chosen: you still had another brother
  alternatives:
  - you had yet another brother
  - there was still a brother for you
  lexicon: HALOT
  rationale: The phrase means 'there is/still remains for you a brother.' English idiom expresses this as 'you still had another brother.' 'Another' is implied by the context of existing brothers and the inquiry about one more.
