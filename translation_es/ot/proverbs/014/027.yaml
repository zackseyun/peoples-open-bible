translation:
  language: es
  text: El temor de Yahvé es fuente[a] de vida, para apartar a uno[b] de los lazos de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manantial de vida».
    reason: lexical_alternative
  - marker: b
    text: O «para apartarse de los lazos de la muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  english_pob_choice: fear of
  chosen_spanish: el temor de
  alternatives_spanish:
  - la reverencia de
  - el miedo de
  lexicon: HALOT
  rationale: La construcción sapiencial con YHWH expresa una actitud de temor reverente y obediente; en español, «temor de» preserva la formulación canónica sin suavizarla indebidamente. «Reverencia» sería más interpretativo y perdería parte de la tensión del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título. «Yahvé» es la forma española natural y reconocible para el nombre propio revelado.'
- source_word: מְקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - fuente manantial
  - manantial
  lexicon: HALOT
  rationale: El sustantivo denota una fuente o manantial como origen vivificante. En español, «fuente de vida» mantiene bien la metáfora y suena más natural y sobria que «fuente»/«manantial» con mayor expansión.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque el plural hebreo es morfológico, el sentido es abstracto singular. «Vida» reproduce ese valor sin forzar un plural ajeno al español.
- source_word: לָסוּר
  english_pob_choice: to turn one away
  chosen_spanish: para apartar
  alternatives_spanish:
  - para alejar
  - para hacer apartar
  - para desviar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad/resulto. En español, «para apartar» comunica con naturalidad la función del temor de Yahvé, manteniendo la relación causal sin añadir contenido doctrinal.
- source_word: מִמֹּקְשֵׁי
  english_pob_choice: from the snares of
  chosen_spanish: de los lazos de
  alternatives_spanish:
  - de las trampas de
  - de los snare de
  lexicon: HALOT
  rationale: El término se refiere a trampas o lazos; «lazos» es una solución idiomática y bíblica en español que conserva la imagen de captura oculta y resulta menos técnica que «trampas».
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - la muerte
  lexicon: HALOT
  rationale: Traducción directa del sustantivo. En el proverbio conserva tanto el sentido literal como el de ruina mortal o destructiva sin especificarlo de más.
theological_decisions:
- issue: Conservación del motivo sapiencial «fear of Yahweh»
  english_pob_reading: Retain 'fear' rather than interpretively reducing it to 'reverence' or 'worship.'
  chosen_spanish_reading: Mantener «temor» y no reducirlo a «reverencia» o «adoración».
  alternative_spanish_readings:
  - La reverencia de Yahvé es fuente de vida
  - La adoración de Yahvé es fuente de vida
  rationale: El hebreo expresa una categoría teológica clave en Proverbios que incluye temor, reverencia y sumisión obediente. «Temor» preserva esa amplitud y la tensión canónica; «reverencia» la atenúa demasiado.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
- issue: Fuerza del infinitivo לָסוּר
  english_pob_reading: 'Express the clause as result/purpose: the fear of the LORD turns a person away from death''s snares.'
  chosen_spanish_reading: 'Expresar la cláusula como finalidad: «para apartar de los lazos de muerte».'
  alternative_spanish_readings:
  - para apartarse de los lazos de muerte
  - para apartar a uno de los lazos de muerte
  - para ser apartado de los lazos de muerte
  rationale: El infinitivo con ל puede traducirse de modo rígido como infinitivo de finalidad. En español, «para apartar» conserva la relación de propósito y mantiene la brevedad proverbial sin introducir un sujeto explícito innecesario.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la cláusula final de una forma más literal («to turn one away») respecto de una redacción previa más participial. La presente propuesta española refleja esa finalidad con «para apartar», manteniendo la fuerza del infinitivo hebreo sin sobrerrepresentarlo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se traduce יִרְאַת con «temor» para preservar el motivo sapiencial clásico.
  - «Fuente de vida» mantiene la imagen metafórica sin expandirla innecesariamente.
  - «Lazos de muerte» sigue la imagen de captura del hebreo y el inglés POB («snares of death»).
