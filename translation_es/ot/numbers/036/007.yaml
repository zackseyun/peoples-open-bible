translation:
  language: es
  text: Así, ninguna herencia de los hijos de Israel pasará de tribu a tribu[a], porque los hijos de Israel cada uno se mantendrá unido a la herencia de la tribu de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hijos de Israel cada uno se aferrará a su herencia tribal ancestral».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִסֹּב
  english_pob_choice: shall pass
  chosen_spanish: pasará
  alternatives_spanish:
  - se moverá
  - se trasladará
  lexicon: HALOT
  rationale: En este contexto legal, el verbo no describe un giro físico sino un cambio de adscripción de la herencia entre tribus. «Pasará» comunica de manera natural en español la idea de transferencia sin perder el valor jurídico del hebreo.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - posesión
  lexicon: HALOT
  rationale: El término alude a la porción heredada y asignada dentro de Israel. «Herencia» es claro en español bíblico y conserva bien la idea de lote patrimonial tribal.
- source_word: מִמַּטֶּה אֶל מַטֶּה
  english_pob_choice: from tribe to tribe
  chosen_spanish: de tribu a tribu
  alternatives_spanish:
  - de una tribu a otra
  - entre tribus
  lexicon: HALOT
  rationale: Aquí מַטֶּה significa «tribu», no «vara». La construcción española «de tribu a tribu» reproduce la idiomática legal del hebreo con naturalidad.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica y corporativa del hebreo. «Hijos de Israel» mantiene la forma del original y su valor de pertenencia pactual.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque literalmente es «hombre», el valor distributivo aquí exige una expresión española natural. «Cada uno» preserva el alcance individual sin introducir una lectura demasiado masculina o demasiado general.
- source_word: יִדְבְּקוּ
  english_pob_choice: shall hold fast to
  chosen_spanish: se adherirán
  alternatives_spanish:
  - se mantendrán unidos a
  - se aferrarán a
  lexicon: HALOT
  rationale: דבק expresa apego firme. «Se adherirán» comunica esa unión estable y deliberada; en español suena más fiel y menos idiomáticamente cargado que «se aferrarán», que podría sugerir ansiedad o tensión excesiva.
- source_word: בְּנַחֲלַת מַטֵּה אֲבֹתָיו
  english_pob_choice: to the inheritance of the tribe of his fathers
  chosen_spanish: a la herencia de la tribu de sus padres
  alternatives_spanish:
  - a la herencia ancestral de su tribu
  - a la herencia de la tribu de sus padres
  lexicon: HALOT
  rationale: La frase especifica el lote tribal heredado por línea paterna. «De sus padres» conserva el plural hebreo y la referencia ancestral sin sustituirla por una formulación más interpretativa.
theological_decisions:
- issue: Lenguaje genealógico masculino en una norma legal de alcance corporativo
  english_pob_reading: the sons of Israel ... each ... his fathers
  chosen_spanish_reading: los hijos de Israel ... cada uno ... de sus padres
  alternative_spanish_readings:
  - los israelitas ... cada persona ... de sus antepasados
  - los hijos de Israel ... cada uno ... de su linaje
  rationale: Se preserva el lenguaje genealógico masculino del hebreo (בני, איש, אבתיו) en vez de neutralizarlo por completo. Al mismo tiempo, «cada uno» da el valor distributivo que el contexto requiere en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto se mantiene alineado con la revisión final del inglés POB, que no requirió cambios tras el último pase y conserva la lectura legal de transferencia de herencia entre tribus.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - «Hijos de Israel» se mantiene de forma consistente con el valor corporativo-genealógico del hebreo.
  - «Herencia» y «tribu» se usan con sentido técnico legal, no como metáforas generales.
