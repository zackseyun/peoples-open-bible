translation:
  language: es
  text: Moisés tomaba la tienda y la instalaba para sí fuera del campamento[a], lejos del campamento, y la llamaba la tienda de reunión[b]. Y todo el que buscaba a Yahvé salía a la tienda de reunión que estaba fuera del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la tienda». El texto no dice explícitamente «su tienda», aunque algunos entienden que se trata de la tienda de Moisés o de una tienda distinta usada para este propósito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «solía tomar» y «solía salir»; las formas verbales hebreas probablemente describen una acción habitual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקַּח
  english_pob_choice: would take
  chosen_spanish: tomaría
  alternatives_spanish:
  - tomaba
  - iba a tomar
  - tomaba para sí
  lexicon: HALOT
  rationale: El yiqtol en este contexto narrativo expresa acción habitual o recurrente; por eso uso imperfecto con valor habitual en español. 'Tomaría' conserva esa idea de práctica repetida, en línea con el audit trail inglés.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la tienda de campaña
  - la tienda
  lexicon: HALOT
  rationale: El hebreo dice 'la tienda' con artículo definido, sin especificar 'su tienda'. 'La tienda' respeta la explicitud del texto y deja abierta la identificación.
- source_word: וְנָטָה לוֹ
  english_pob_choice: and pitch it for himself
  chosen_spanish: la extendería para sí
  alternatives_spanish:
  - la plantaría para sí
  - la levantaría para sí
  - la instalaría para sí
  lexicon: HALOT
  rationale: נטה con tienda tiene el sentido de tender/pitch. En español, 'extender' refleja el movimiento literal de la tienda y mantiene el matiz de acción intencional; 'para sí' conserva לוֹ.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - más allá del campamento
  lexicon: HALOT
  rationale: 'La referencia locativa es clara: la tienda se colocó fuera del campamento. ''Fuera del campamento'' es natural y fiel.'
- source_word: הַרְחֵק מִן הַמַּחֲנֶה
  english_pob_choice: far from the camp
  chosen_spanish: lejos del campamento
  alternatives_spanish:
  - a distancia del campamento
  - bien lejos del campamento
  lexicon: HALOT
  rationale: La forma intensifica la separación ya expresada. 'Lejos del campamento' es idiomático y conserva la idea de distancia marcada.
- source_word: וְקָרָא לוֹ אֹהֶל מוֹעֵד
  english_pob_choice: and he called it the tent of meeting
  chosen_spanish: y la llamaba la tienda de reunión
  alternatives_spanish:
  - y la llamó la tienda de reunión
  - y la nombraba tienda de reunión
  lexicon: HALOT
  rationale: קרא con pronombre y nombre funciona como nombrar. Dado el valor habitual del yiqtol en el versículo, 'la llamaba' refleja bien la acción recurrente. 'Tienda de reunión' conserva el nombre establecido de אֹהֶל מוֹעֵד.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de cita
  lexicon: HALOT
  rationale: '''Reunión'' comunica de forma natural el lugar señalado para el encuentro pactal y evita un giro demasiado técnico en español.'
- source_word: כָּל מְבַקֵּשׁ יְהוָה
  english_pob_choice: everyone seeking Yahweh
  chosen_spanish: todo el que buscaba a Yahvé
  alternatives_spanish:
  - todo el que procuraba a Yahvé
  - cualquiera que buscaba a Yahvé
  - todo el que consultaba a Yahvé
  lexicon: HALOT
  rationale: מבקש puede abarcar buscar e inquirir. 'Buscaba a Yahvé' es amplio y natural en español, y conserva la dimensión devocional y consultiva sin restringirla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto, el Tetragrámaton se vierte como 'Yahvé' y no como sustituto litúrgico. Esto preserva el nombre propio revelado.
- source_word: יֵצֵא
  english_pob_choice: would go out
  chosen_spanish: salía
  alternatives_spanish:
  - saldría
  - iba a salir
  lexicon: HALOT
  rationale: El imperfecto también aquí puede expresar acción acostumbrada. 'Salía' fluye mejor en español y conserva el hábito descrito.
- source_word: אֶל אֹהֶל מוֹעֵד
  english_pob_choice: to the tent of meeting
  chosen_spanish: a la tienda de reunión
  alternatives_spanish:
  - hasta la tienda de reunión
  - hacia la tienda de reunión
  lexicon: HALOT
  rationale: La preposición indica movimiento hacia el lugar designado. 'A la tienda de reunión' es la formulación más directa y natural.
- source_word: אֲשֶׁר מִחוּץ לַמַּחֲנֶה
  english_pob_choice: that was outside the camp
  chosen_spanish: que estaba fuera del campamento
  alternatives_spanish:
  - la cual estaba fuera del campamento
  - que quedaba fuera del campamento
  lexicon: HALOT
  rationale: La cláusula relativa identifica el lugar de la tienda. 'Que estaba fuera del campamento' es claro y evita sobrecargar el verso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La política del proyecto exige transliterar el Tetragrámaton como 'Yahvé'. Se conserva el nombre personal del pacto y se evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor habitual de los imperfectos narrativos
  english_pob_reading: would take / would go out
  chosen_spanish_reading: tomaría / salía / llamaba
  alternative_spanish_readings:
  - tomó / salió / llamó
  - tomaba / salía / llamaba
  rationale: El audit trail inglés señala acción acostumbrada. En español, el imperfecto expresa con naturalidad esa habitualidad sin convertir el verso en un perfecto puntual.
  doctrine_reference: English POB footnote b on customary action
translation_notes:
  revision_awareness: 'Se respetó el audit trail inglés: ''the tent'' sin añadir posesivo, el valor habitual de los yiqtol y la transliteración de יְהוָה como Yahvé. No se introdujeron lecturas textuales alternativas no documentadas.'
  spanish_consistency_notes:
  - Se mantuvo 'tienda de reunión' de manera uniforme para אֹהֶל מוֹעֵד.
  - Se conservó 'Yahvé' según la terminología del proyecto.
  - Se optó por imperfectos españoles para reflejar el aspecto habitual indicado por el inglés auditado.
  - '''Fuera del campamento'' se repite de forma consistente para מִחוּץ לַמַּחֲנֶה.'
