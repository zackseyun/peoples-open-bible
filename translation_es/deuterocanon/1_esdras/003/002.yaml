translation:
  language: es
  text: y a todos los sátrapas, generales y gobernadores que estaban bajo él, desde la India hasta Etiopía, en las ciento veintisiete satrapías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a lo largo de las ciento veintisiete satrapías» o «en las ciento veintisiete provincias». El griego usa un término administrativo persa; se mantiene «satrapías» por coherencia con «sátrapas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σατράπαις
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  - satrapas
  lexicon: LSJ
  rationale: Conserva el título persa administrativo específico. En español, «sátrapas» es el préstamo histórico más reconocible y mantiene el color imperial del original.
- source_word: στρατηγοῖς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  - jefes militares
  lexicon: LSJ
  rationale: El término apunta a líderes militares; «generales» es el equivalente moderno más natural y claro en español.
- source_word: τοπάρχαις
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - príncipes locales
  - gobernantes de distrito
  - toparcas
  lexicon: LSJ
  rationale: Designa gobernantes de distritos locales. «Gobernadores» comunica bien la función administrativa sin introducir un tecnicismo opaco como «toparcas».
- source_word: τοῖς ὑπʼ αὐτὸν
  english_pob_choice: under him
  chosen_spanish: que estaban bajo él
  alternatives_spanish:
  - sujetos a él
  - bajo su autoridad
  lexicon: LSJ
  rationale: Expresa subordinación política al rey de forma idiomática en español, sin perder la idea de dependencia del poder real.
- source_word: ἀπὸ τῆς Ἰνδικῆς μέχρι Αἰθιοπίας
  english_pob_choice: from India to Ethiopia
  chosen_spanish: desde la India hasta Etiopía
  alternatives_spanish:
  - desde la India hasta Etiopía
  - de la India a Etiopía
  lexicon: LSJ
  rationale: Es una fórmula geográfica de extensión territorial. La preposición correlativa «desde… hasta…» reproduce con claridad el alcance del imperio.
- source_word: ἐν ταῖς ἑκατὸν εἴκοσι ἑπτὰ σατραπείαις
  english_pob_choice: in the one hundred twenty-seven satrapies
  chosen_spanish: en las ciento veintisiete satrapías
  alternatives_spanish:
  - a través de las ciento veintisiete provincias
  - en las ciento veintisiete provincias
  lexicon: LSJ
  rationale: «Satrapías» conserva el término administrativo persa y enlaza con «sátrapas»; no se sustituye por «provincias» para no perder la especificidad del original.
