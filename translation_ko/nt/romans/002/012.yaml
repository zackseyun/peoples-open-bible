id: ROM.2.12
reference: Romans 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὅσοι γὰρ ἀνόμως ἥμαρτον, ἀνόμως καὶ ἀπολοῦνται· καὶ ὅσοι ἐν νόμῳ ἥμαρτον, διὰ νόμου κριθήσονται·
base_translation:
  language: en
  yaml_path: translation/nt/romans/002/012.yaml
  text: For all who sinned apart from the law will also perish apart from the law[c][b][a], and all who sinned under the law will be judged through the law.
  footnotes:
  - marker: a
    text: Or 'without the law' / 'lawlessly' for both occurrences of ἀνόμως.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the law'; 'under the law' brings out the sense of being within the law's jurisdiction.
    reason: lexical_alternative
  - marker: c
    text: Or 'by the law' for 'through the law.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이는 율법 없이 죄를 지은 자들은 모두 율법 없이 멸망할 것이고, 율법 안에서 죄를 지은 자들은 모두 율법을 통하여 심판을 받을 것이기 때문이다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νόμος
  english_pob_choice: law
  chosen_korean: 율법
  alternatives_korean:
  - 법
  lexicon: BDAG
  rationale: 문맥상 모세 율법을 가리키므로 용어집 기본값 「율법」을 채택한다.
- source_word: ἀνόμως
  english_pob_choice: apart from the law
  chosen_korean: 율법 없이
  alternatives_korean:
  - 법 없이
  - 불법하게
  lexicon: BDAG
  rationale: 율법의 부재라는 본문 의도를 「율법 없이」로 옮긴다.
