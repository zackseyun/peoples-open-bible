translation:
  language: es
  text: 'Y uno de los jóvenes[a] de Joab se quedó de pie junto a él y dijo: «Quien esté de parte de Joab, y quien esté por David, siga a Joab».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Jóvenes» también puede traducirse «servidores» o «asistentes», refiriéndose a los subordinados de Joab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: And one
  chosen_spanish: Y uno
  alternatives_spanish:
  - Y un hombre
  - Y alguien
  lexicon: HALOT
  rationale: אִישׁ introduce aquí a un individuo indefinido del grupo de Joab; «uno» conserva bien ese valor sin sobreespecificar «hombre».
- source_word: עָמַד עָלָיו
  english_pob_choice: stood over him
  chosen_spanish: se puso sobre él
  alternatives_spanish:
  - se puso junto a él
  - se quedó sobre él
  lexicon: HALOT
  rationale: El hebreo presenta la acción física de colocarse encima o sobre la víctima; «se puso sobre él» preserva esa escena y el matiz de posición.
- source_word: מִנַּעֲרֵי יוֹאָב
  english_pob_choice: of Joab’s young men
  chosen_spanish: de los jóvenes de Joab
  alternatives_spanish:
  - de los servidores de Joab
  - de los asistentes de Joab
  lexicon: HALOT
  rationale: נַעַר puede significar joven, servidor o asistente según el contexto; aquí el sentido militar de subordinados de Joab queda bien expresado con «jóvenes».
- source_word: מִי אֲשֶׁר חָפֵץ בְּיוֹאָב
  english_pob_choice: Whoever favors Joab
  chosen_spanish: Quien favorezca a Joab
  alternatives_spanish:
  - Quien se complazca en Joab
  - Quien esté a favor de Joab
  lexicon: HALOT
  rationale: חָפֵץ implica inclinarse por, desear o favorecer; en este llamado de reclutamiento, «favorezca» conserva la idea de apoyo o adhesión.
- source_word: וּמִי אֲשֶׁר לְדָוִד
  english_pob_choice: and whoever is for David
  chosen_spanish: y quien esté por David
  alternatives_spanish:
  - y quien pertenezca a David
  - y quien esté del lado de David
  lexicon: HALOT
  rationale: El לamed con David marca lealtad o pertenencia. «Esté por David» conserva el sentido político-militar de estar del lado de alguien.
- source_word: אַחֲרֵי יוֹאָב
  english_pob_choice: follow Joab
  chosen_spanish: siga a Joab
  alternatives_spanish:
  - vaya tras Joab
  - siga detrás de Joab
  lexicon: HALOT
  rationale: אַחֲרֵי significa literalmente «después de», pero en una convocatoria imperativa funciona como «seguir». El imperativo español hace explícito el valor exhortativo del hebreo.
translation_notes:
  revision_awareness: El texto español sigue el último estado del POB inglés, que sustituyó la raya por una coma antes de «follow Joab»; aquí se optó por una estructura natural en español con el imperativo final explícito. Se mantuvo la tensión entre el sentido literal de אַחֲרֵי («después de») y su valor idiomático exhortativo, reflejada en la nota [a].
  spanish_consistency_notes:
  - Se evitó «Señor» u otra terminología teológica ajena al hebreo, ya que el versículo no contiene nombres divinos ni fórmulas cultuales.
  - «Jóvenes» se mantiene como equivalente amplio y no técnico de נַעַר, coherente con el contexto militar de Joab.
