translation:
  language: es
  text: No se hagan impuros[a] con ninguna de estas cosas, pues por todas estas cosas se hicieron impuras las naciones que yo expulso de delante de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se contaminen con ninguna de estas cosas ... las naciones ... quedaron impuras» o «fueron contaminadas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תִּטַּמְּאוּ
  english_pob_choice: Do not make yourselves unclean
  chosen_spanish: No se hagan impuros
  alternatives_spanish:
  - No se contaminen
  - No se profanen
  lexicon: HALOT
  rationale: El valor prohibitivo de אַל con el imperfecto se expresa naturalmente con «No se...». El Hitpael de טמא es reflexivo; «se hagan impuros» conserva la acción autoinvolucrada. «Impuro» mantiene la categoría levítica de impureza ritual-moral mejor que un término más interpretativo.
- source_word: בְּכָל אֵלֶּה
  english_pob_choice: by any of these things
  chosen_spanish: con ninguna de estas cosas
  alternatives_spanish:
  - por ninguna de estas cosas
  - mediante ninguna de estas cosas
  lexicon: HALOT
  rationale: El ב aquí expresa medio/ámbito. En español, «con ninguna de estas cosas» transmite bien el sentido instrumental o de asociación sin sonar forzado. «Por» también sería posible, pero puede sonar menos preciso en este contexto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la base explicativa de la prohibición. «Porque» conserva esa relación causal o explicativa de manera clara y natural en español.
- source_word: נִטְמְאוּ
  english_pob_choice: became unclean
  chosen_spanish: se hicieron impuras
  alternatives_spanish:
  - quedaron impuras
  - fueron contaminadas
  lexicon: HALOT
  rationale: El Niphal de טמא expresa el estado resultante; «se hicieron impuras» refleja ese cambio de estado sin imponer una lectura puramente pasiva. Se mantiene la coherencia con «impuros» en la primera mitad del versículo.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Naciones» es la correspondencia más estándar y acorde al contexto de pueblos no israelitas en la tierra. «Gentiles» sería anacrónico o marcadamente eclesial en este pasaje.
- source_word: אֲשֶׁר אֲנִי מְשַׁלֵּחַ
  english_pob_choice: that I am driving out
  chosen_spanish: que yo expulso
  alternatives_spanish:
  - que yo estoy echando
  - que yo saco
  lexicon: HALOT
  rationale: Aunque שׁלח suele ser «enviar», en este contexto de juicio y desposesión adquiere el sentido de expulsar/remover. «Expulso» comunica mejor esa fuerza contextual en español; «estoy expulsando» sería posible, pero menos sobrio.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - de su presencia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea «de delante de» reproduce con claridad la idea espacial de remoción de la presencia de Israel. «De delante de ustedes» es natural y conserva el valor locativo del original.
theological_decisions:
- issue: Terminología de impureza ritual-moral en Levítico 18
  english_pob_reading: unclean / became unclean
  chosen_spanish_reading: impuros / se hicieron impuras
  alternative_spanish_readings:
  - contaminados / se contaminaron
  - defiles / fueron defilados
  rationale: El capítulo presenta estas prácticas como causantes de una impureza real dentro del marco de santidad. «Impuro» preserva la categoría levítica sin reducirla a mera suciedad moral ni sustituirla por una paráfrasis más general. La alternancia de género entre «impuros» e «impuras» sigue el referente plural implícito en la construcción española y evita un masculino genérico forzado en la segunda cláusula.
  doctrine_reference: Levítico 18; filosofía de traducción §§1, 5, 6
- issue: Valor de שׁלח en un contexto de juicio sobre las naciones
  english_pob_reading: I am driving out
  chosen_spanish_reading: yo expulso
  alternative_spanish_readings:
  - yo saco
  - yo echo
  rationale: Aquí el verbo no describe mero envío sino remoción judicial de pueblos de la tierra. «Expulso» mantiene la tensión entre el término básico y su fuerza contextual, y evita debilitar el acto divino a una simple partida o traslado.
  doctrine_reference: Deuteronomio 9:4-5; Levítico 18:28
translation_notes:
  revision_awareness: 'Se revisó el borrador a la luz del texto hebreo y del audit trail inglés. No se requirieron cambios de fondo respecto del sentido: se mantuvo la prohibición reflexiva, el valor instrumental de בְּכָל אֵלֶּה, el estado resultante de נִטְמְאוּ y el sentido contextual de מְשַׁלֵּחַ como expulsión judicial. La nota alternativa preserva la tensión lexical entre «impuro/contaminar/defile» sin eclipsar la opción principal.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el nombre divino en todo el proyecto; aquí el hebreo usa el pronombre de primera persona («yo»), así que no aparece en el versículo.
  - Se mantiene «impuros/impuras» en vez de «contaminados» para conservar la terminología levítica de טמא.
  - «Naciones» se usa de forma consistente para הַגּוֹיִם en este contexto.
  - La expresión «de delante de ustedes» sigue el patrón del hebreo מִפְּנֵיכֶם y evita una paráfrasis excesiva.
