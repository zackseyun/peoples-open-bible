translation:
  language: es
  text: Porque un alma feroz[a] destruye a su dueño, y la alegría de un enemigo lo alcanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque un alma feroz destruye a su dueño, y la alegría de un enemigo los alcanza». El verbo final hebreo presenta una dificultad de número y referente; el paralelo griego dice: «y hará de él un motivo de alegría para enemigos». El texto principal sigue más de cerca el hebreo, mientras la nota preserva la dificultad textual.'
    reason: textual_variant
lexical_decisions:
- source_word: נֶפֶשׁ / ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - persona
  - vida
  - ser interior
  lexicon: HALOT; LSJ
  rationale: En este proverbio sapiencial, נפש / ψυχή apunta a la disposición interior de la persona. En español, «alma» conserva esa fuerza antropológica y mantiene la correspondencia conceptual con la línea hebrea y la griega, sin reducirla a «persona» o «vida».
- source_word: עַזָּה / πονηρά
  english_pob_choice: fierce
  chosen_spanish: violenta
  alternatives_spanish:
  - fiera
  - dura
  - malvada
  - desenfrenada
  lexicon: HALOT; LSJ
  rationale: La idea no es solo intensidad, sino una disposición dañina y sin freno. «Violenta» comunica bien el carácter agresivo y destructivo que el contexto exige, y evita sobrerinterpretar como «malvada» si se prefiere conservar el énfasis práctico del proverbio.
- source_word: תַּשְׁחִית / ἀπολεῖ
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - corrompe
  - devasta
  lexicon: HALOT; LSJ
  rationale: El verbo expresa destrucción real y grave. «Destruye» es claro, directo y fiel tanto al hebreo como al griego, y encaja naturalmente con el ritmo sentencioso del verso.
- source_word: בְּעָלֶיהָ / τὸν κτησάμενον αὐτήν
  english_pob_choice: its owner
  chosen_spanish: a su dueño
  alternatives_spanish:
  - a su propietario
  - al que la posee
  - a su poseedor
  lexicon: HALOT; LSJ
  rationale: La relación es de posesión, no de parentesco ni matrimonio. «Dueño» reproduce bien el sentido de בעל / κτησάμενον en español bíblico actual, con concisión y claridad.
- source_word: וְשִׂמְחַת שׂוֹנֵא / ἐπίχαρμα ἐχθρῶν
  english_pob_choice: the rejoicing of an enemy
  chosen_spanish: la alegría de un enemigo
  alternatives_spanish:
  - el regocijo de un enemigo
  - el motivo de alegría de un enemigo
  - la burla de enemigos
  lexicon: HALOT; LSJ
  rationale: La variante hebrea y la griega convergen en que la persona termina siendo objeto de alegría para el adversario. «La alegría de un enemigo» conserva el valor nominal del hebreo שמחה / el griego ἐπίχαρμα, y funciona bien en español sin volver la frase demasiado explicativa.
- source_word: תַּשִּׂיגֵם / ποιήσει
  english_pob_choice: overtakes him
  chosen_spanish: lo alcanza
  alternatives_spanish:
  - lo sobrepasa
  - le sobreviene
  - los alcanza
  lexicon: HALOT; LSJ
  rationale: El hebreo presenta una dificultad de número y de sujeto, y el griego ofrece una formulación más coherente para el efecto del verso. «Lo alcanza» preserva la idea de que la desgracia llega y se cierne sobre la persona, sin forzar demasiado la construcción española.
theological_decisions:
- issue: 'Tratamiento del final difícil: hebreo con desajuste gramatical frente al paralelo griego'
  english_pob_reading: The English POB chooses a sense-based rendering while footnoting the Hebrew difficulty and the Greek parallel; the latest revision leans closer to the Hebrew surface but still acknowledges the mismatch.
  chosen_spanish_reading: Se traduce la línea final como «la alegría de un enemigo lo alcanza», manteniendo en nota la dificultad textual y el apoyo del paralelo griego/hebreo.
  alternative_spanish_readings:
  - y la alegría de un enemigo lo sobrepasa
  - y lo convierte en alegría de enemigos
  - y la alegría de enemigos lo alcanza
  rationale: El versículo está marcado con desajuste importante entre testigos. La redacción española debe ser legible y, a la vez, transparente respecto a la tensión textual. «Lo alcanza» comunica el impacto del daño y deja espacio para la nota, sin ocultar que la base hebrea es problemática.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo preservado en Sirácida, usando el paralelo griego como apoyo interpretativo cuando el hebreo presenta dificultad significativa'
- issue: Elección de «alma» frente a «persona» o «vida»
  english_pob_reading: The English POB keeps 'soul' to preserve anthropological force and match ψυχή.
  chosen_spanish_reading: «alma»
  alternative_spanish_readings:
  - persona
  - vida
  rationale: «Alma» es el equivalente español más natural para conservar la correspondencia con ψυχή y la fuerza sapiencial del proverbio. En este contexto no se trata de una abstracción doctrinal, sino de la interioridad que gobierna la conducta.
  doctrine_reference: 'PHILOSOPHY.md: conservar el peso antropológico del vocabulario sapiencial cuando el contexto lo justifica'
translation_notes:
  revision_awareness: La redacción española toma en cuenta el audit trail inglés y la última revisión, pero conserva la claridad del sentido con transparencia textual. Se evita una calca rígida del inglés y se mantiene la tensión entre el hebreo difícil y el paralelo griego, como pide el expediente de Sirácida 6:4.
  spanish_consistency_notes:
  - Se usa «alma» para נֶפֶשׁ / ψυχή, coherente con el valor antropológico en literatura sapiencial.
  - Se usa «dueño» para בעל / κτησάμενον como término de posesión, no litúrgico.
  - Se mantiene «alegría de un enemigo» para preservar el sustantivo del hebreo y el eco del griego ἐπίχαρμα.
  - Se evita «SEÑOR» u otra normalización innecesaria, ya que el verso no contiene el nombre divino.
  - La nota refleja la tensión textual sin borrar la divergencia entre hebreo y griego.
