  glossary_alignment: No hay conflicto con los términos nucleares del proyecto. «ley ancestral» alinea bien con πατρῷος νόμος. No intervienen Yahvé/Mesías/etc. La decisión «presbíteros» no contradice un glosario fijo, pero sí choca con la racionalidad léxica auditada, que distingue γεραιῶν de πρεσβυτέρων como edad avanzada frente a dirigentes mayores; en español «presbíteros» sobreinterpreta hacia un cargo eclesiástico.
