  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: una pregunta retórica de reprensión, con dos sustantivos abstractos paralelos (''injusticia'' / ''engaño'') y el valor contextual de ל como hablar en favor de Dios. También preserva la nota sobre la ambigüedad preposicional. Sin embargo, ''para Yahvé'' suena poco natural en español para expresar defensa o representación, y además el texto principal mezcla ''Yahvé'' con una nota que luego habla de ''Dios'', creando una leve inconsistencia terminológica.'
  spanish_quality_summary: La frase es comprensible, pero '¿Hablaréis injusticia para Yahvé...?' resulta algo forzada en español eclesial actual. Una formulación más natural y fiel al sentido documentado es '¿Hablaréis injusticia en favor de Yahvé, y engaño en favor de él?'. Esto hace explícito en español el valor representativo que el contexto favorece, sin alterar el sentido. El futuro retórico 'Hablaréis' funciona bien.
  glossary_alignment: Se usa correctamente 'Yahvé' para el nombre divino. 'Injusticia' para עַוְלָה y 'engaño' para רְמִיָּה están bien alineados con el audit trail. El único ajuste recomendado es sustituir 'para Yahvé / para él' por 'en favor de Yahvé / en favor de él' para corresponder mejor al sentido teológico y lexical ya documentado.
  issues:
  - severity: medium
    issue: '''para Yahvé'' y ''para él'' suenan poco idiomáticos y ambiguos en español'
    rationale: Aunque calcan de cerca el inglés 'for God/for him', en español pueden leerse como finalidad vaga más que como representación o defensa. El contexto en Job 13 favorece claramente 'en favor de', como incluso indica la nota.
  - severity: low
    issue: Ligera inconsistencia terminológica en la nota al pasar de 'Yahvé' a 'Dios'
    rationale: La nota menciona 'en defensa de Dios' después de usar 'Yahvé'. No es incorrecto, pero para coherencia con la política del proyecto conviene mantener 'Yahvé' también allí.
  revised_spanish_text: ¿Hablaréis injusticia[a] en favor de Yahvé, y engaño en favor de él?
