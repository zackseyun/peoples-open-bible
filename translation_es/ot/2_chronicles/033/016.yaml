    reason: lexical_alternative
  revision_rationale: La revisión corrige los anclajes de las notas para que correspondan a las palabras comentadas y mejora la naturalidad del español en la frase sacrificial. «Sacrificios de paz» mantiene la fuerza del hebreo mejor que la formulación más pesada «sacrificios de ofrendas de paz», y «acción de gracias» suena más idiomático en español bíblico sin perder el sentido de תוֹדָה. No se requieren cambios doctrinales ni de fondo.
