translation:
  language: es
  text: Entonces Noé edificó un altar a Yahvé[a], y tomó algunos[b] de cada animal limpio y de cada ave limpia, y ofreció holocaustos sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a YHWH»; aquí se vierte el nombre divino como «Yahvé» conforme a la convención del proyecto.'
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «tomó de cada animal limpio y de cada ave limpia»; el sentido es partitivo, es decir, tomó algunos de cada clase apta para sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: בנה expresa la acción de edificar/construir. En español, "edificó" conserva el sentido narrativo y encaja bien con un altar sin sonar técnico ni forzado.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  - altar de sacrificio
  lexicon: HALOT
  rationale: מזבח designa el lugar de sacrificio; "altar" es el equivalente claro y estándar en español bíblico y moderno.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: El nombre divino YHWH se rinde como "Yahvé" según la convención de este proyecto, evitando el ocultamiento mediante "SEÑOR".
- source_word: מִכֹּל
  english_pob_choice: some of every
  chosen_spanish: algunos de cada
  alternatives_spanish:
  - de cada
  - algunos de cada especie
  lexicon: HALOT
  rationale: 'El hebreo tiene fuerza partititiva con לקח: Noé no toma todos los animales limpios, sino una porción de cada categoría apta. "Algunos de cada" comunica esa selección sin añadir más de lo que el texto exige.'
- source_word: הַבְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - ganado
  - bestia
  lexicon: HALOT
  rationale: בהמה puede abarcar animales domésticos o cuadrúpedos en general. "Animal" es amplio y natural aquí; "ganado" sería demasiado restrictivo.
- source_word: הַטְּהוֹרָה
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - ritualmente limpio
  - ceremonialmente limpio
  lexicon: HALOT
  rationale: טהור en este contexto sacrificial indica aptitud ritual. "Limpio" es la forma breve y fiel; las ampliaciones explicarían más de lo que el versículo dice.
- source_word: הָעוֹף
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave alada
  lexicon: HALOT
  rationale: עוֹף se refiere a aves o criaturas voladoras; "ave" suena más amplio y digno en español bíblico que "pájaro", que puede sonar demasiado coloquial.
- source_word: הַטָּהֹר
  english_pob_choice: clean
  chosen_spanish: limpia
  alternatives_spanish:
  - ritualmente limpia
  - ceremonialmente limpia
  lexicon: HALOT
  rationale: Se mantiene la misma decisión para el término de pureza ritual aplicado a las aves.
- source_word: וַיַּעַל
  english_pob_choice: offered
  chosen_spanish: ofreció
  alternatives_spanish:
  - hizo subir
  - presentó
  lexicon: HALOT
  rationale: La forma causativa de עלה en contexto sacrificial significa ofrecer/elevar una ofrenda. "Ofreció" comunica la acción cultual de modo natural en español.
- source_word: עֹלֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - sacrificios enteramente quemados
  lexicon: HALOT
  rationale: עֹלָה designa el sacrificio totalmente quemado. "Holocaustos" es un término bíblico tradicional en español que expresa bien esa totalidad sacrificial; se evita confundirlo con el uso moderno no bíblico del término.
- source_word: בַּמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La preposición expresa colocación sobre la superficie del altar. "Sobre el altar" es la opción más natural y fiel en español.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. Según la convención del proyecto, el nombre del pacto se translitera como "Yahvé" en vez de ocultarse tras "SEÑOR".
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Partitive force of Noah’s selection for sacrifice
  english_pob_reading: some of every clean animal and of every clean bird
  chosen_spanish_reading: algunos de cada animal limpio y de cada ave limpia
  alternative_spanish_readings:
  - de cada animal limpio y de cada ave limpia
  - algunos de cada especie limpia
  rationale: 'El hebreo literal puede leerse como "tomó de cada...". En contexto, la idea es partitiva: Noé selecciona una porción de cada clase apta para sacrificio, no todos los animales limpios. "Algunos de cada" preserva esa tensión sin expandir indebidamente el texto.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Choice of sacrificial term for עֹלֹת
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - sacrificios totalmente quemados
  rationale: La palabra hebrea indica una ofrenda completamente consumida por el fuego. "Holocaustos" es un equivalente tradicional en español bíblico que conserva esa totalidad sacrificial; se anota para evitar asociación con usos modernos ajenos al texto.
  doctrine_reference: HALOT; Spanish biblical usage
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión que refinó la formulación partitiva de "from every" a "of every" para mayor naturalidad, manteniendo el mismo valor semántico. La propuesta española sigue esa misma intención: hace explícita la selección parcial con "algunos de cada", sin debilitar la base hebrea.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa "holocaustos" para עֹלֹת por fidelidad al sacrificio totalmente quemado y por consistencia con terminología bíblica española.
  - '"Ave" se prefiere a "pájaro" por registro más solemne y amplio.'
  - No se usa "SEÑOR" como sustituto del nombre divino en el texto principal.
