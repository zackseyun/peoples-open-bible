translation:
  language: es
  text: 'Por tanto, di a la casa de Israel[a]: «Así dice el Señor Yahvé[b]: Vuélvanse, y aléjense de sus ídolos, y aparten su rostro de todas sus abominaciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Arrepiéntanse y aléjense de sus ídolos». El verbo hebreo שׁוּב puede llevar el sentido de volver o arrepentirse.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa אֲדֹנָי יְהוִה, combinando el título «Señor» con el nombre divino YHWH.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Expresa bien la conclusión inferida del contexto inmediato y mantiene el tono profético claro y natural en español.
- source_word: אֱמֹר אֶל־בֵּית יִשְׂרָאֵל
  english_pob_choice: say to the house of Israel
  chosen_spanish: di a la casa de Israel
  alternatives_spanish:
  - habla a la casa de Israel
  lexicon: HALOT
  rationale: Conserva la fórmula profética directa y la designación covenantal de 'casa de Israel' sin reducirla a una expresión menos formal.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Esto dice
  lexicon: HALOT
  rationale: Reproduce la fórmula mensajera profética con dignidad y con un registro natural en español bíblico contemporáneo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Siguiendo el principio del proyecto, el nombre divino YHWH se vierte como 'Yahvé' en el texto principal; 'Señor' conserva el valor de אֲדֹנָי como título de soberanía.
- source_word: שׁוּבוּ
  english_pob_choice: Turn back
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Arrepiéntanse
  - Retornen
  lexicon: HALOT
  rationale: '''Volverse'' en español comunica el movimiento de retorno y, en contexto profético, puede incluir el llamado al arrepentimiento sin reducirlo solo a un tecnicismo religioso.'
- source_word: וְהָשִׁיבוּ מֵעַל גִּלּוּלֵיכֶם
  english_pob_choice: and turn away from your idols
  chosen_spanish: y aléjense de sus ídolos
  alternatives_spanish:
  - y aparten de sí sus ídolos
  - y vuélvanse de sus ídolos
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa de apartarse/separarse; 'aléjense de' comunica con claridad la separación exigida, sin suavizar el término despectivo 'ídolos'.
- source_word: גִּלּוּלֵיכֶם
  english_pob_choice: your idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos despreciables
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: Se mantiene el sentido estable de culto falso; no se explicita el matiz insultante etimológico para no sobrecargar el texto principal.
- source_word: וּמֵעַל כָּל תּוֹעֲבֹתֵיכֶם
  english_pob_choice: from all your abominations
  chosen_spanish: de todas sus abominaciones
  alternatives_spanish:
  - de todas sus cosas detestables
  - de todas sus prácticas abominables
  lexicon: HALOT
  rationale: '''Abominaciones'' preserva el peso moral y cultual del término hebreo en un registro bíblico inteligible en español.'
- source_word: הָשִׁיבוּ פְנֵיכֶם
  english_pob_choice: turn your faces away
  chosen_spanish: vuelvan su rostro
  alternatives_spanish:
  - aparten su rostro
  - vuelvan el rostro
  lexicon: HALOT
  rationale: Se conserva la imagen corporal de orientación deliberada; en español, 'rostro' resulta más natural que una repetición literal de 'caras'.
theological_decisions:
- issue: Rendering of יהוה in a compound divine title
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El proyecto exige transliterar YHWH como 'Yahvé' en el texto principal. Como אֲדֹנָי ya aporta el título de soberanía, 'Señor Yahvé' refleja ambos elementos sin esconder el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of שׁוּב in prophetic summons
  english_pob_reading: Turn back
  chosen_spanish_reading: Vuélvanse
  alternative_spanish_readings:
  - Arrepiéntanse
  - Retornen
  rationale: '''Vuélvanse'' preserva la metáfora direccional del hebreo y, en contexto, permite incluir la dimensión de arrepentimiento sin convertirla en una paráfrasis más abstracta.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: No se registraron cambios en la última revisión; el pasaje quedó con alta concordancia en la auditoría inglesa. Esta propuesta conserva esa lectura y adapta las decisiones léxicas al mandato del proyecto de usar Yahvé para YHWH en el texto español.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - '''Casa de Israel'' se conserva de manera uniforme como designación colectiva.'
  - '''Ídolos'' y ''abominaciones'' reproducen el léxico moral del pasaje sin intensificarlo innecesariamente.'
  - Se usa 'rostro' para conservar la imagen hebrea de orientación deliberada.
  - La nota sobre שׁוּב preserva la tensión entre 'volver' y 'arrepentirse' sin resolverla unilateralmente.
