translation:
  language: es
  text: Hasta el día de hoy actúan conforme a las costumbres antiguas[a]. No temen a Yahvé, y no actúan conforme a sus estatutos y a sus ordenanzas, ni conforme a la ley y al mandamiento que Yahvé mandó a los hijos de Jacob[c][d][b], a quien llamó Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a las antiguas ordenanzas» o «conforme a las antiguas prácticas».'
    reason: alternative_reading
  - marker: b
    text: «Temen a Yahvé» también puede expresarse como «reverencian a Yahvé»; el hebreo incluye temor y lealtad reverente de pacto.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los hijos de Jacob»; se refiere corporativamente al pueblo descendiente de Jacob.'
    reason: lexical_alternative
  - marker: d
    text: Es decir, Jacob; compárese Génesis 32:28; 35:10.
    reason: cross_reference
lexical_decisions:
- source_word: כַּמִּשְׁפָּטִים הָרִאשֹׁנִים
  english_pob_choice: according to the former customs
  chosen_spanish: conforme a las costumbres antiguas
  alternatives_spanish:
  - conforme a las antiguas ordenanzas
  - conforme a las antiguas prácticas
  - conforme a los antiguos decretos
  lexicon: HALOT
  rationale: מִשְׁפָּט puede expresar juicio, ordenanza, costumbre o práctica prescrita. En este contexto se trata de una conducta religiosa heredada, por lo que «costumbres antiguas» comunica bien el valor de práctica establecida sin forzar un sentido judicial.
- source_word: יְרֵאִים אֶת־יְהוָה
  english_pob_choice: fear Yahweh
  chosen_spanish: temen a Yahvé
  alternatives_spanish:
  - reverencian a Yahvé
  - temen al Yahvé
  - guardan reverencia hacia Yahvé
  lexicon: HALOT
  rationale: El hebreo ירא את־יהוה abarca temor y reverencia pactal. «Temen a Yahvé» conserva el idioma bíblico y su peso teológico, mientras que «reverencian» suavizaría demasiado la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino propio, de acuerdo con la política del proyecto, en lugar de sustituirlo por un título o una convención litúrgica.
- source_word: כְּחֻקֹּתָם
  english_pob_choice: according to their statutes
  chosen_spanish: conforme a sus estatutos
  alternatives_spanish:
  - según sus decretos
  - de acuerdo con sus prescripciones
  lexicon: HALOT
  rationale: חֻקּוֹת suele referirse a estatutos o prescripciones fijas. «Estatutos» preserva el registro legal-covenantal y armoniza con el paralelismo siguiente.
- source_word: וּכְמִשְׁפָּטָם
  english_pob_choice: and their ordinances
  chosen_spanish: y a sus ordenanzas
  alternatives_spanish:
  - y a sus juicios
  - y a sus costumbres
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט funciona en paralelo con חֻקּוֹת, por lo que «ordenanzas» mantiene la pareja legal sin repetir «costumbres», que ya se usó en la primera cláusula.
- source_word: וְכַתּוֹרָה
  english_pob_choice: or according to the law
  chosen_spanish: ni conforme a la ley
  alternatives_spanish:
  - y conforme a la ley
  - o conforme a la instrucción
  lexicon: HALOT
  rationale: תּוֹרָה puede significar ley o instrucción. En este contexto de pacto, «ley» es la opción más natural y clara en español; el contexto negativo permite ligar la serie con «ni».
- source_word: וְכַמִּצְוָה
  english_pob_choice: and the commandment
  chosen_spanish: y al mandamiento
  alternatives_spanish:
  - y al mandato
  - y a los mandamientos
  lexicon: HALOT
  rationale: El singular מִצְוָה se conserva como «mandamiento», manteniendo el número hebreo y la fuerza de resumen covenantal en lugar de generalizarlo a plural.
- source_word: בְּנֵי יַעֲקֹב
  english_pob_choice: the sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los descendientes de Jacob
  - los hijos/descendientes de Jacob
  lexicon: HALOT
  rationale: Se mantiene la pluralidad masculina del hebreo con una expresión directa y formal. Aunque el referente es corporativo, «los hijos de Jacob» refleja de cerca la forma original.
- source_word: אֲשֶׁר שָׂם שְׁמוֹ יִשְׂרָאֵל
  english_pob_choice: whom he named Israel
  chosen_spanish: a quien puso por nombre Israel
  alternatives_spanish:
  - a quien llamó Israel
  - cuyo nombre puso Israel
  lexicon: HALOT
  rationale: שׂוּם שֵׁם expresa poner nombre. «Puso por nombre Israel» reproduce bien el hebraísmo en español y preserva la alusión a la imposición del nombre en Génesis.
theological_decisions:
- issue: Referencia del temor reverente a Yahvé
  english_pob_reading: fear Yahweh can also be expressed revere Yahweh; the Hebrew idiom carries both dread and reverent covenant loyalty.
  chosen_spanish_reading: temen a Yahvé
  alternative_spanish_readings:
  - reverencian a Yahvé
  - temen/reverencian a Yahvé
  rationale: Se conserva la ambivalencia del idiom hebreo sin explicitarla en el texto principal. «Temen» mantiene la tensión entre miedo y lealtad reverente mejor que una paráfrasis explicativa.
  doctrine_reference: Uso bíblico de ירא את־יהוה en el AT; fidelidad del pacto y reverencia debida a Dios.
- issue: Contraste entre costumbres propias y la ley/mandamiento de Yahvé
  english_pob_reading: the standards belonging to the peoples described, contrasted with the LORD's law and commandment
  chosen_spanish_reading: sus estatutos y sus ordenanzas, ni conforme a la ley y al mandamiento que Yahvé mandó
  alternative_spanish_readings:
  - sus estatutos y ordenanzas de ellos, frente a la ley y mandamiento de Yahvé
  - sus normas y prácticas, en contraste con la ley y el mandamiento de Yahvé
  rationale: El hebreo usa sufijos de tercera persona plural en «sus estatutos» y «sus ordenanzas», distinguiéndolos de la «ley y mandamiento» dados por Yahvé. La versión española conserva ese contraste sin resolverlo artificialmente.
  doctrine_reference: Distinción entre prácticas humanas y la instrucción pactal dada por Yahvé.
translation_notes:
  revision_awareness: La redacción sigue la revisión del audit trail que corrigió el inglés de «are doing» a «act» por naturalidad formal. En español se eligió igualmente «actúan» para mantener un presente descriptivo natural y consistente con el paralelismo verbal del versículo. También se respetó la decisión revisada de conservar la secuencia adversativa/negativa del hebreo, sin convertirla en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme a la terminología doctrinal del proyecto.
  - Se distingue «estatutos», «ordenanzas», «ley» y «mandamiento» para reflejar el paralelismo hebreo.
  - «Temen» conserva el valor idiomático de ירא sin borrar la reverencia del pacto.
  - «Hijos de Jacob» se mantiene en la línea del texto fuente y se aclara en nota su alcance corporativo.
  - Se evita «SEÑOR» para no enmascarar el nombre divino.
  - «Puso por nombre» reproduce de forma natural el hebraísmo de שָׂם שְׁמוֹ.
