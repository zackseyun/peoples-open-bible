translation:
  language: es
  text: 'Y cuando Hiram oyó las palabras de Salomón, se alegró mucho y dijo: «Bendito sea Yahvé este día, que ha dado a David un hijo sabio para este gran pueblo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: And when ... heard
  chosen_spanish: Y sucedió que, al oír ...
  alternatives_spanish:
  - Y cuando ... oyó
  - Y aconteció que, al oír ...
  lexicon: HALOT
  rationale: La construcción con waw consecutiva e infinitivo introduce una acción temporal. En español, «Y sucedió que, al oír...» conserva el valor narrativo sin volverse rígidamente literal ni perder la secuencia.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - las declaraciones de
  lexicon: HALOT
  rationale: דִּבְרֵי puede significar «palabras», «asunto» o «mensaje». Aquí se refiere a lo que Salomón comunicó; «las palabras de» es fiel y natural en español.
- source_word: וַיִּשְׂמַח מְאֹד
  english_pob_choice: he rejoiced greatly
  chosen_spanish: se alegró mucho
  alternatives_spanish:
  - se regocijó grandemente
  - se alegró en gran manera
  lexicon: HALOT
  rationale: El verbo שׂמח expresa alegría o regocijo. «Se alegró mucho» comunica bien la intensidad de מְאֹד en un español moderno y digno.
- source_word: בָּרוּךְ יְהוָה
  english_pob_choice: Blessed be Yahweh
  chosen_spanish: Bendito sea Yahvé
  alternatives_spanish:
  - Bendito sea Yahvé
  - Alabado sea Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de bendición en pasiva/optativa con «Bendito sea». El nombre divino se rinde como «Yahvé» según la decisión doctrinal del proyecto para יְהוָה.
- source_word: הַיּוֹם
  english_pob_choice: this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - este día
  lexicon: HALOT
  rationale: La expresión hebrea tiene un matiz formal y enfático. «En este día» mantiene la solemnidad y refleja de cerca el valor del deíctico.
- source_word: נָתַן לְדָוִד בֵּן חָכָם
  english_pob_choice: has given David a wise son
  chosen_spanish: ha dado a David un hijo sabio
  alternatives_spanish:
  - ha dado a David un hijo sabio
  - le ha dado a David un hijo sabio
  lexicon: HALOT
  rationale: בֵּן חָכָם se traduce de manera directa como «hijo sabio». Se evita añadir interpretaciones sobre oficio o rango; el hebreo solo afirma la sabiduría del hijo dado a David.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - por encima de
  lexicon: HALOT
  rationale: En este contexto עַל indica posición o autoridad respecto del pueblo. «Sobre» conserva esa relación sin introducir una perífrasis ajena al texto.
- source_word: הָעָם הָרָב הַזֶּה
  english_pob_choice: this great people
  chosen_spanish: este gran pueblo
  alternatives_spanish:
  - este pueblo grande
  - este pueblo numeroso
  lexicon: HALOT
  rationale: רָב puede implicar grandeza o multitud. «Gran pueblo» conserva la amplitud semántica y suena natural en español, sin cerrar la posible tensión entre tamaño y importancia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce directamente como «Yahvé» y no se vela bajo «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «today» por «this day» para un registro más formal; en español se reflejó esa formalidad con «en este día» y se mantuvo el resto de la lectura inglesa corroborada por el control de revisiones, sin depender mecánicamente del inglés frente al hebreo.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» de forma coherente con el estándar del proyecto.
  - Se prefirió «hijo sabio» en vez de expandir a una interpretación más explicativa, para no exceder el hebreo.
  - La formulación es formal pero idiomática para lectura eclesial en español latinoamericano.
