  glossary_alignment: No hay términos teológicos sensibles en este versículo. El borrador respeta la política general; no aparecen Yahvé, Mesías, etc. 'Clanes' para מִשְׁפָּחֹת está bien. 'Hijas' e 'hijo de' están correctamente alineados con las decisiones léxicas documentadas.
