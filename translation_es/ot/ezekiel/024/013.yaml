revisions:
- from: En tu impureza hay lascivia[a]. Porque te purifiqué, pero no te purificaste de tu impureza[b]; ya no te purificarás más, hasta que haya dado descanso a mi ira contra ti.
  to: En tu impureza hay lascivia[a]. Porque te purifiqué, pero no fuiste purificada de tu impureza; ya no serás purificada más, hasta que haya satisfecho mi ira contra ti[b].
  rationale: Se corrigió el reflexivo «no te purificaste» a una forma pasiva más fiel al contraste del hebreo y del POB auditado. También se reemplazó «haya dado descanso a mi ira» por «haya satisfecho mi ira», que comunica de forma natural en español el sentido documentado del modismo. La nota final se reubicó para explicar precisamente ese modismo, siguiendo mejor el aparato del POB inglés.
