translation:
  language: es
  text: que solo extiende los cielos y pisa sobre las alturas del mar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «camina sobre las olas del mar».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹטֶה
  english_pob_choice: stretches out
  chosen_spanish: extiende
  alternatives_spanish:
  - tiende
  - despliega
  - estira
  lexicon: HALOT
  rationale: El participio qal de נטה puede expresar la acción de extender o desplegar. En español, «extiende» es natural y conserva el valor descriptivo y continuo de la imagen poética sin forzar un giro más mecánico.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: En poesía cósmica, שָׁמַיִם se refiere a la bóveda celeste en sentido elevado. «Los cielos» conserva mejor el plural hebreo y el registro bíblico que «el cielo» en singular.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por sí solo
  lexicon: HALOT
  rationale: La expresión enfatiza que la acción es exclusiva de Dios. «Solo» es breve, idiomático y mantiene esa exclusividad sin añadir explicaciones.
- source_word: וְדוֹרֵךְ
  english_pob_choice: and treads
  chosen_spanish: y pisa
  alternatives_spanish:
  - y anda sobre
  - y camina sobre
  - y pisa con fuerza
  lexicon: HALOT
  rationale: דרך en qal puede significar pisar o andar sobre algo. «Pisa» conserva la metáfora corporal y el paralelismo con el paralelo inglés «treads», sin introducir una interpretación demasiado fuerte como «aplasta».
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición expresa la relación espacial normal. «Sobre» funciona bien en español y mantiene el valor imagístico del hebreo.
- source_word: בָּמֳתֵי
  english_pob_choice: the heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - las alturas del mar
  - las olas
  - los altos
  lexicon: HALOT
  rationale: במה suele aludir a alturas o lugares elevados. En la construcción «alturas del mar», la imagen apunta a la superficie levantada del mar, es decir, sus crestas u olas. «Las alturas» preserva la metáfora más formalmente que una interpretación explícita como «olas».
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - del mar
  - del océano
  lexicon: HALOT
  rationale: 'El singular hebreo corresponde al español «mar». El genitivo conserva la imagen poética completa: «las alturas del mar».'
theological_decisions:
- issue: Imagen cósmica de la soberanía divina
  english_pob_reading: Retain the poetic depiction of God alone stretching out the heavens and treading on the sea without reducing it to a mere metaphor or importing later doctrinal claims.
  chosen_spanish_reading: Conservar la imagen poética de Dios, que solo extiende los cielos y pisa las alturas del mar, sin convertirla en una explicación prosaica ni añadir contenido doctrinal ajeno.
  alternative_spanish_readings:
  - que camina sobre las olas del mar
  - que extiende el firmamento y anda sobre el mar
  rationale: El versículo presenta a Dios como soberano único sobre la creación mediante lenguaje poético elevado. La traducción conserva esa fuerza imagística y evita reducir «las alturas del mar» a una glosa interpretativa en el texto principal, aunque la posible lectura más dinámica quede disponible como alternativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el estado de la auditoría inglesa: no hay revisiones aplicadas y el pasaje mantiene el alto nivel de acuerdo del control cruzado. La redacción española sigue esa decisión estable, conservando la metáfora poética y una equivalencia óptima sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se mantuvo el registro poético y sobrio, adecuado para un verso sapiencial.
  - «Cielos» conserva el plural hebreo y la terminología bíblica habitual del proyecto.
  - «Alturas del mar» preserva la metáfora; la nota ofrece la lectura dinámica sin desplazarla del texto principal.
  - No se usó «SEÑOR» ni «Cristo»; el versículo no contiene esos términos.
  - Se evitó una paráfrasis como «olas» en el cuerpo principal para respetar la tensión lexical documentada.
