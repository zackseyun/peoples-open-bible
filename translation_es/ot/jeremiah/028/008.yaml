  to: Los profetas que fueron antes de mí y antes de ti desde tiempos antiguos profetizaron contra muchas tierras y contra grandes reinos[a], de guerra, de calamidad y de peste[b].
  rationale: Se ajusta únicamente la expresión temporal de precedencia profética para que el español suene más natural y preciso, sin cambiar el sentido ni las decisiones léxicas centrales del POB inglés.
