    text: 'O, más literalmente: «sobre la cual es llamado mi nombre». Este modismo hebreo indica que la casa pertenece a Yahvé o está identificada con él.'
    reason: lexical_alternative
  - marker: b
    text: Silo fue el antiguo sitio del santuario cuya destrucción sirvió como advertencia; véanse 1 Samuel 4 y Jeremías 7:12.
    reason: cross_reference
  revision_rationale: Se ajusta la construcción verbal para que el español exprese con naturalidad el hebreo עשה + ל sin perder la elipsis ominosa del juicio; se acerca además el modismo del nombre a la formulación fuente y auditada. Se mantiene la distinción «casa/lugar», la referencia a «sus padres» y el precedente histórico de Silo.
