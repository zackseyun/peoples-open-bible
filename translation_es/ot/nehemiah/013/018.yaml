translation:
  language: es
  text: ¿No hicieron así sus padres, y nuestro Dios trajo sobre nosotros todo este mal[a] y sobre esta ciudad? Pero ustedes siguen atrayendo ira sobre Israel al profanar el sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo este desastre» o «toda esta calamidad». El hebreo רָעָה puede referirse a calamidad en contextos de juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Did not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no?
  - ¿No es verdad que no?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento. En español, «¿No…?» transmite de forma natural esa fuerza interrogativa sin volverla más pesada de lo necesario.
- source_word: כֹה עָשׂוּ
  english_pob_choice: did this
  chosen_spanish: hicieron así
  alternatives_spanish:
  - hicieron esto
  - obraron así
  lexicon: HALOT
  rationale: El conjunto expresa «hacer así / de esta manera». «Hicieron así» mantiene la referencia al patrón de conducta sin introducir una paráfrasis más libre.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: «Padres» conserva la forma familiar y directa del hebreo. En español, con el posesivo «sus», evita forzar género o estilo y sigue siendo plenamente comprensible.
- source_word: וַיָּבֵא אֱלֹהֵינוּ
  english_pob_choice: our God brought
  chosen_spanish: nuestro Dios trajo
  alternatives_spanish:
  - nuestro Dios hizo venir
  - nuestro Dios hizo caer
  lexicon: HALOT
  rationale: El hifil de בוא aquí expresa traer/conducir calamidad sobre el pueblo. «Trajo» reproduce bien esa acción de juicio sin suavizarla.
- source_word: כָּל הָרָעָה הַזֹּאת
  english_pob_choice: all this evil
  chosen_spanish: todo este mal[a]
  alternatives_spanish:
  - todo este desastre[a]
  - toda esta calamidad[a]
  lexicon: HALOT
  rationale: «רָעָה» puede abarcar mal moral o calamidad punitiva. «Mal» conserva la amplitud del término; la nota recoge las alternativas cuando el contexto de juicio puede hacer preferible «desastre» o «calamidad».
- source_word: וְעַל הָעִיר הַזֹּאת
  english_pob_choice: and on this city
  chosen_spanish: y sobre esta ciudad
  alternatives_spanish:
  - y contra esta ciudad
  - y sobre la ciudad esta
  lexicon: HALOT
  rationale: «Sobre» mantiene el paralelo con la idea de carga/jucio que recae tanto sobre el pueblo como sobre la ciudad, sin imponer el matiz adversativo de «contra».
- source_word: מוֹסִיפִים חָרוֹן עַל יִשְׂרָאֵל
  english_pob_choice: you are adding wrath against Israel
  chosen_spanish: están añadiendo ira contra Israel
  alternatives_spanish:
  - están aumentando el furor contra Israel
  - están acrecentando la ira sobre Israel
  lexicon: HALOT
  rationale: El participio indica acción continua; «están añadiendo» la reproduce bien. «Ira» es el equivalente natural de חָרוֹן; «contra Israel» expresa el destinatario del juicio en español de modo claro.
- source_word: לְחַלֵּל אֶת הַשַּׁבָּת
  english_pob_choice: by profaning the Sabbath
  chosen_spanish: al profanar el sábado
  alternatives_spanish:
  - al desacralizar el sábado
  - al violar el sábado
  lexicon: HALOT
  rationale: El infinitivo explica el medio o la circunstancia por la cual se añade esa ira. «Profanar» conserva el peso cultual y moral del verbo mejor que una opción más genérica como «violar».
theological_decisions:
- issue: Cómo traducir רָעָה en un contexto de juicio divino
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - desastre
  - calamidad
  rationale: «Mal» conserva la amplitud semántica del hebreo y no obliga a elegir de entrada solo el aspecto de desastre. En contexto queda claro que se trata de un mal/castigo judicial traído por Dios, no de mal moral cometido por él.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo expresar חָרוֹן sin diluir la dureza del juicio
  english_pob_reading: wrath
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - furor
  - ardor de ira
  rationale: «Ira» comunica de forma directa la gravedad judicial del término. No se suaviza a un mero enojo subjetivo, porque el pasaje denuncia la acumulación de culpa contra Israel.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se revisó el paralelo hebreo completo y el audit trail en inglés. No se detectaron cambios posteriores en la versión inglesa; la decisión española sigue la lectura óptima-equivalente con cuidado de mantener la tensión lexical de רָעָה y חָרוֹן sin endurecer ni suavizar indebidamente el juicio divino.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto base lo requiera; aquí aparece «Dios» porque el hebreo tiene אֱלֹהֵינוּ.
  - Se prefirió «sábado» para הַשַּׁבָּת, que es idiomático y fiel en español contemporáneo.
  - «Padres» se mantuvo frente a «antepasados» por correspondencia más directa con אֲבֹתֵיכֶם.
  - La estructura retórica interrogativa se conservó con puntuación española natural.
  - Se mantuvo la progresión verbal con «están añadiendo» para reflejar el participio hebreo.
