translation:
  language: es
  text: 'Ahora, después de estas cosas, se informó a Abraham, diciendo: «He aquí[a], Milca también ha dado a luz hijos varones a tu hermano Nacor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Milca también ha dado a luz hijos varones a tu hermano Nacor»; el hebreo הִנֵּה introduce la noticia con una llamada de atención enfática y formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... it was
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: Marca la transición narrativa en español moderno sin caer en fórmulas arcaicas; conserva el cambio de escena que introduce el hebreo.
- source_word: אַחֲרֵי הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de estos acontecimientos
  - tras estas cosas
  lexicon: HALOT
  rationale: Mantiene la referencia temporal amplia y literal del hebreo דְּבָרִים הָאֵלֶּה.
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se informó
  alternatives_spanish:
  - se le dijo
  - le llegó la noticia
  lexicon: HALOT
  rationale: 'Reproduce la pasiva comunicativa del hophal: la noticia fue llevada a Abraham sin especificar al mensajero.'
- source_word: לְאַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: HALOT
  rationale: Equivale naturalmente al complemento indirecto del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijeron
  - así
  lexicon: HALOT
  rationale: Conserva la fórmula narrativa de introducción de discurso.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira[a]
  alternatives_spanish:
  - Mira
  - Mira aquí
  lexicon: HALOT
  rationale: Renderiza la fuerza deíctica de הִנֵּה con un imperativo natural en español; la nota preserva que el inglés POB también admitía una alternativa más literal y formal.
- source_word: יָלְדָה
  english_pob_choice: has borne
  chosen_spanish: ha dado a luz
  alternatives_spanish:
  - ha parido
  - ha tenido
  lexicon: HALOT
  rationale: Expresa el perfecto con resultado presente y conserva el sentido de nacimiento/parto en un español claro.
- source_word: מִלְכָּה
  english_pob_choice: Milcah
  chosen_spanish: Milcá
  alternatives_spanish:
  - Milca
  - Mílca
  lexicon: HALOT
  rationale: Translitera el nombre de forma consistente y natural en español; el acento ayuda a la pronunciación sin alterar el nombre.
- source_word: גַם הִוא
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - ella también
  lexicon: HALOT
  rationale: Conserva la adición enfática de גַם הִוא sin redundancia innecesaria en español.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'hijos/sons', en este contexto genealógico español puede referirse al conjunto de descendientes masculinos; 'hijos' es claro y fluido. Se preserva la tensión lexical respecto de la precisión masculina en la nota de decisión.
- source_word: לְנָחוֹר
  english_pob_choice: to ... Nahor
  chosen_spanish: para tu hermano Nacor
  alternatives_spanish:
  - a Nacor
  - para Nacor
  lexicon: HALOT
  rationale: Con ילד, el complemento con לְ indica el padre asociado al nacimiento; 'para' refleja la relación genética resultante. Se mantiene la identificación relacional del siguiente término.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano cercano
  lexicon: HALOT
  rationale: Traducción directa del parentesco dirigido a Abraham.
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés POB que elevó 'Look' a 'Behold' para un registro más formal, pero en español se optó por 'Mira' para un equivalente deíctico natural y publicable; la nota conserva la alternativa más literal/formal vinculada al hebreo הִנֵּה. No se siguió una traducción mecánica del inglés, sino una lectura del hebreo con el audit trail en cuenta.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'hijos' para בָּנִים por fluidez en español genealógico, aunque el hebreo es masculino; se documenta la opción y su matiz.
  - 'Los nombres propios se transliteran de forma estable: Abraham, Milcá, Nacor.'
  - La puntuación reproduce una cita directa con cierre sin punto final final, conforme al tono de anuncio del hebreo.
