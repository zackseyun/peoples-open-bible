translation:
  language: es
  text: Entonces el rey mandó a Ashpenaz[a], jefe de sus oficiales de palacio, que trajera a algunos de los hijos de Israel, tanto del linaje real como de los nobles,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el jefe de sus eunucos». El término hebreo puede denotar eunucos literales o, más ampliamente, altos funcionarios de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... told
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Entonces ... habló
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» refleja bien la secuencia. «Dijo» conserva el valor básico de decir sin forzar el tono a una orden explícita, que el hebreo no exige por sí mismo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo con artículo.
- source_word: לְאַשְׁפְּנַז
  english_pob_choice: Ashpenaz
  chosen_spanish: Ashpenaz
  alternatives_spanish:
  - Asfenez
  lexicon: transliteration
  rationale: Nombre propio transliterado de manera estándar; se conserva la forma reconocible del personaje.
- source_word: רַב סָרִיסָיו
  english_pob_choice: the chief of his court officials
  chosen_spanish: jefe de sus oficiales de palacio
  alternatives_spanish:
  - jefe de sus eunucos
  - el principal de sus eunucos
  - maestro de sus eunucos
  lexicon: HALOT
  rationale: «רַב» expresa jefatura o rango principal. «סָרִיס» puede referirse a eunucos literales o, más ampliamente, a altos funcionarios de corte; en este contexto palaciego, «oficiales de palacio» comunica ese campo semántico sin imponer una lectura anatómica. Se mantiene abierta la tensión documentada con la alternativa «eunucos».
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: que trajera
  alternatives_spanish:
  - para traer
  - que llevara
  lexicon: HALOT
  rationale: Después de un verbo de mandato, el infinitivo se vierte naturalmente como subordinada final en español. «Trajera» expresa bien la acción requerida sin añadir matices.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: some of the sons of Israel
  chosen_spanish: a algunos de los hijos de Israel
  alternatives_spanish:
  - a algunos israelitas
  - a algunos de los hijos de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» preserva la forma hebrea y su valor colectivo; «a algunos de» refleja el partitivo implícito. Se evita reducirlo a «israelitas» para no perder la transparencia formal.
- source_word: וּמִזֶּרַע הַמְּלוּכָה
  english_pob_choice: both from the royal offspring
  chosen_spanish: tanto del linaje real
  alternatives_spanish:
  - del linaje real
  - de la descendencia real
  - del linaje de la realeza
  lexicon: HALOT
  rationale: «זֶרַע» es literalmente «semilla» o «descendencia». «Linaje real» transmite la idea de descendencia dinástica en español claro y digno. Se añade «tanto» para reflejar la coordinación enfática del hebreo con la siguiente frase.
- source_word: וּמִן הַפַּרְתְּמִים
  english_pob_choice: and from the nobles
  chosen_spanish: como de entre los nobles
  alternatives_spanish:
  - y de los nobles
  - y de entre los nobles
  - de los nobles
  lexicon: HALOT
  rationale: «פַּרְתְּמִים» designa nobles o la élite alta. «De entre los nobles» preserva el matiz de extracción social, y «como» completa la correlación con «tanto» para una construcción española natural y fiel.
theological_decisions:
- issue: Сָרִיס / eunucos vs. funcionarios de corte
  english_pob_reading: The Hebrew term can denote either literal eunuchs or high royal officials more generally.
  chosen_spanish_reading: El término hebreo puede denotar eunucos literales o, más ampliamente, altos funcionarios de la corte.
  alternative_spanish_readings:
  - eunucos
  - funcionarios de palacio
  - cortesanos
  rationale: No se borra la tensión lexical. El texto principal opta por una expresión amplia («oficiales de palacio») que cabe en el contexto administrativo, mientras la nota mantiene la posibilidad de «eunucos» documentada por el POB en inglés.
  doctrine_reference: No aplica; es una decisión lexical-histórica, no doctrinal.
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa que aclaró la construcción correlativa con «both ... and ...». En español, esa relación se refleja con «tanto ... como ...» y con «a algunos de», de modo que el paralelismo del hebreo quede visible sin sonar forzado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto solo cuando aparece el Tetragrámaton; aquí no aplica.
  - «Hijos de Israel» mantiene transparencia formal frente a una adaptación más idiomática como «israelitas».
  - La ambigüedad de סָרִיס queda documentada en nota para no resolverla silenciosamente.
  - El cierre queda abierto en esta unidad porque el versículo continúa en la siguiente sección del texto fuente.
