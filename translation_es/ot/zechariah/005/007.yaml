review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la escena básica del hebreo: la irrupción visual, el objeto de plomo que se alza, y la mujer sentada dentro del efa. Sin embargo, la alineación de notas está invertida respecto del rastro auditado en inglés: la nota léxica sobre כִּכַּר עֹפֶרֶת debe anclarse al objeto de plomo, mientras que la nota cultural debe acompañar a «efa». Además, «esta era una mujer» suena algo poco natural en español para una cláusula demostrativa identificativa; «y esta era una mujer» es comprensible, pero «y esta: una mujer...» o mantener la forma simple con mejor puntuación sigue más de cerca el efecto visual. La mejor reparación mínima es conservar la sintaxis básica y mover las notas a los lugares correctos.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos detalles mejorables: 1) las notas no corresponden a los puntos correctos del texto; 2) falta la nota cultural para «efa», que ayuda a lectores hispanos igual que en inglés. «Y he aquí» es aceptable en registro profético; «un disco de plomo fue levantado» y «sentada dentro del efa» son naturales. El texto requiere una corrección menor, no una reescritura extensa.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Efa» preserva el término cultural correctamente. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión de usar «disco de plomo» concuerda con la revisión inglesa más literal, mientras que la función de tapa puede conservarse en nota.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a los lugares incorrectos.
    rationale: En el audit trail inglés, la nota sobre alternativas de כִּכַּר עֹפֶרֶת corresponde al objeto de plomo, no a «he aquí»; y la segunda nota es una nota cultural sobre «efa», no sobre «fue levantado».
  - severity: medium
    issue: Falta la nota cultural para «efa».
    rationale: El inglés explica que un ephah era una medida seca y por extensión el recipiente; esa información debe preservarse en español, especialmente porque se mantiene el préstamo cultural «efa».
  - severity: low
    issue: La razón léxica de אִשָּׁה אַחַת no queda del todo bien reflejada en la formulación explicativa del borrador.
    rationale: Aunque «una mujer» puede bastar en español, conviene reconocer que אַחַת es significativo. El texto puede permanecer así, pero la justificación debe descansar en naturalidad española, no en negar valor al numeral.
  revised_spanish_text: Y he aquí[a], un disco de plomo[b] fue levantado, y esta era una mujer sentada dentro del efa[c].
  revised_footnotes:
  - marker: a
    text: 'O: «Y mira». La expresión hebrea introduce de modo repentino otro elemento de la visión.'
    reason: alternative_reading
  - marker: b
    text: 'O: «un peso redondo de plomo», «un disco de plomo» o, más literalmente, «un talento de plomo». La expresión hebrea puede denotar una masa redonda y pesada de plomo; aquí parece funcionar como la tapa del efa.'
    reason: lexical_alternative
  - marker: c
    text: Un efa era una medida para áridos y, por extensión, el recipiente usado para ella; por eso algunos traducen «canasta» o «cesta».
    reason: cultural_note
  revision_rationale: Se conserva casi todo el texto, pero se corrigen los anclajes de las notas para que correspondan al rastro auditado y se añade la nota cultural necesaria sobre «efa». El contenido principal del versículo ya era fiel; la reparación es principalmente de aparato crítico y claridad editorial.
