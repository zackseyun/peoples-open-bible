translation:
  text: Jesus said[a], “Seek, and you will find. But the things that you asked me
    about in those days, which I did not tell you on that day—now I am willing to
    tell them[e][d][c][b], and you are not seeking them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The relative construction can be read as singular (“that which”) or plural
      (“the things that”). The surrounding plural pronominal references favor a plural
      sense.
    reason: textual_variant
  - marker: b
    text: Printed morphological segmentation shows “you asked them,” while the normalized
      line supports “you asked me.” The translation follows “me.”
    reason: textual_variant
  - marker: c
    text: ⲉϩⲛⲁ + infinitive expresses readiness or intention in Coptic; hence “I am
      willing to tell” could also be rendered “I am about to tell.”
    reason: lexical_alternative
  - marker: d
    text: “Seek … find” is a well-known pair (cf. Matt 7:7; Luke 11:9), but Thomas’s
      saying continues in a different direction, contrasting “then” and “now.”
    reason: cross_reference
  - marker: e
    text: Or 'But the things that you asked me in those days, I did not tell you then;
      now I am willing to tell them, and you are not seeking them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϣⲓⲛⲉ
  chosen: seek
  alternatives:
  - look for
  lexicon: Crum; Layton
  rationale: In Thomas, ϣⲓⲛⲉ regularly carries the sense of active searching. Retaining
    “seek” preserves Thomas’s terse imperative and echoes the idiomatic pair with
    ϭⲓⲛⲉ.
- source_word: ϭⲓⲛⲉ
  chosen: find
  alternatives:
  - discover
  lexicon: Crum; Layton
  rationale: Standard counterpart to ϣⲓⲛⲉ in Thomas; “find” is the most direct, unembellished
    English.
- source_word: ⲁⲗⲗⲁ
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: Loan from Greek
  rationale: Greek loanword alla; simple adversative best fits the abrupt contrastive
    turn in Thomasine style.
- source_word: ⲡⲉⲧⲉⲣⲉ… / ⲛⲉⲧⲁ…
  chosen: the things that
  alternatives:
  - that which
  lexicon: Layton (relative converter usage)
  rationale: Although the normalized line shows singular relative ⲡⲉⲧⲉⲣⲉ-, the context
    and later plural pronominal references favor plural sense; rendering as “the things
    that” keeps the natural English and matches later “them.”
- source_word: ϫⲛⲟⲩⲉⲓ
  chosen: asked
  alternatives:
  - inquired about
  lexicon: Crum; Lambdin
  rationale: ϫⲛⲟⲩⲉⲓ commonly means ‘ask, inquire.’ The prepositional object (to me
    / to them) is carried in the following pronominal element.
- source_word: ⲛⲛⲓϩⲟⲟⲩ / ⲉⲛⲧⲟⲟⲩ ⲛⲡⲓϩⲟⲟⲩ
  chosen: in those days
  alternatives:
  - on those days
  lexicon: Crum
  rationale: Both spellings point to a temporal deictic phrase; “in those days” is
    idiomatic and faithful.
- source_word: ϫⲱ (ⲟⲩ)
  chosen: tell
  alternatives:
  - say
  lexicon: Crum; Lambdin
  rationale: Given the double objects (content and indirect object), “tell” is the
    natural English mapping for ϫⲱ in this context.
- source_word: ⲙⲙⲁⲩ
  chosen: then
  alternatives:
  - there (then)
  lexicon: Crum
  rationale: Adverb ⲙⲙⲁⲩ is spatial ‘there’ but often functions temporally as ‘then’;
    here the temporal sense fits the contrast with “now.”
- source_word: ⲧⲉⲛⲟⲩ
  chosen: now
  alternatives: []
  lexicon: Crum
  rationale: Deictic temporal adverb; straightforward.
- source_word: ⲉϩⲛⲁ + (ϫⲟⲟⲩ)
  chosen: I am willing to tell
  alternatives:
  - I am about to tell
  - I intend to say
  lexicon: Layton; Lambdin
  rationale: Periphrasis ⲉϩⲛⲁ + infinitive expresses intention/readiness. Given the
    contrast with prior refusal, “willing” captures volition.
- source_word: ⲛⲥⲁⲛⲧⲟⲟⲩ / ⲛⲥⲱⲟⲩ
  chosen: them
  alternatives:
  - after them
  lexicon: Crum
  rationale: Preposition ⲛⲥⲁ can mark the object of seeking (‘seek after’). Rendering
    simply as “them” in English preserves the object without over-idiomatizing.
textual_note: 'No Greek Oxyrhynchus witness overlaps Saying 92. The NH II Coptic shows
  some orthographic and pronominal variation reflected between Dilley’s printed morphologically
  joined text and his normalized lemmatization: (1) Relative converter/number: printed
  has ⲛⲉⲧⲁⲧⲉⲧⲛ̄… (‘the things that…’), while the normalized line reads ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲱⲧⲛ…;
  the ensuing plural pronominal references (e.g., ⲛⲥⲁⲛⲧⲟⲟⲩ/ⲛⲥⲱⲟⲩ) support a plural
  sense. The translation reflects “the things that.” (2) Object of ‘ask’: the printed
  line reads ϫⲛⲟⲩⲉⲓ ⲉⲣⲟⲟⲩ (‘ask them’), while the normalized reading construes ‘ask
  me’ (via ⲁⲛⲟⲕ). I have followed the normalized sense ‘you asked me’, as it yields
  a smoother internal logic (“I did not tell you then; now I am willing to tell [them]”).
  (3) Temporal phrase: variation between ⲛ̄ⲛⲓϩⲟⲟⲩ and ⲉⲛⲧⲟⲟⲩ ⲛⲡⲓϩⲟⲟⲩ both convey ‘in
  those days’; likewise ⲙⲙⲁⲩ functions temporally as ‘then’ in contrast to ⲧⲉⲛⲟⲩ ‘now’.
  (4) The sequence ⲉϫⲟⲛⲧⲟⲟⲩ likely reflects ⲉϩⲛⲁ + infinitive ϫⲟⲟⲩ with the following
  pronominal ‘them’ assimilated; I render ‘I am willing to tell [them]’. (5) Final
  object preposition varies between ⲛⲥⲁⲛⲧⲟⲟⲩ (“seek after them”) and ⲛⲥⲱⲟⲩ; both support
  the translated ‘seek them’. No lacunae or conjectural restorations are indicated
  by Dilley for this saying.'
