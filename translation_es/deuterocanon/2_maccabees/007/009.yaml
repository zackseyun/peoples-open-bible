- from: 'Y cuando estuvo en su último aliento[a], dijo: “Tú, maldito[b], nos privas de esta vida presente, pero el Rey del mundo nos resucitará, a nosotros que hemos muerto por sus leyes[c], para una renovación eterna de la vida[d].”'
