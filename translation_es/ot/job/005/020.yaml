translation:
  language: es
  text: En la hambruna, te rescatará[a] de la muerte, y en la guerra, del poder[b] de la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “te redimirá” o “te librará”. El verbo hebreo lleva la idea de liberar o rescatar.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “de las manos de la espada”, un modismo que significa “del poder de la espada”.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרָעָב
  english_pob_choice: In famine
  chosen_spanish: En el hambre
  alternatives_spanish:
  - En tiempo de hambre
  - Durante el hambre
  - En la hambruna
  lexicon: HALOT
  rationale: 'El hebreo con ב marca circunstancia: “en/durante”. POB opta por “famine” para expresar una calamidad concreta; en español, “hambre” mantiene la idea del desastre de escasez, aunque “hambruna” sería más específico. Se eligió una forma breve y natural para conservar el paralelismo.'
- source_word: פָּדְךָ
  english_pob_choice: he will redeem you
  chosen_spanish: te rescatará
  alternatives_spanish:
  - te redimirá
  - te librará
  - te rescatará a cambio de rescate
  lexicon: HALOT
  rationale: פדה puede expresar rescate/liberación con matiz de redención o rescate. En español, “rescatará” conserva la fuerza de liberación sin sugerir de manera innecesaria un marco doctrinal más amplio. Se evita “librará” por ser más general y “redimirá” por sonar más teológico en español.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de la muerte
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto “muerte”, como en el hebreo, en lugar de verbalizarlo. La preposición de separación se expresa naturalmente como “de la muerte” en español.
- source_word: וּבְמִלְחָמָה
  english_pob_choice: and in war
  chosen_spanish: y en la guerra
  alternatives_spanish:
  - y en batalla
  - y durante la guerra
  lexicon: HALOT
  rationale: מִלְחָמָה es el término general para guerra, y “guerra” corresponde mejor al paralelo con “hambre”. “Batalla” sería más restringido.
- source_word: מִידֵי
  english_pob_choice: from the power of
  chosen_spanish: del poder de
  alternatives_spanish:
  - de la mano de
  - del dominio de
  - del alcance de
  lexicon: HALOT
  rationale: La expresión idiomática “de la mano de” es literal, pero en español puede sonar extraña aplicada a “espada”. POB explicita el sentido idiomático como “from the power of”; por eso se usa “del poder de”, que conserva la idea de control o capacidad mortífera.
- source_word: חָרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada
  - la hoja
  lexicon: HALOT
  rationale: חָרֶב es el sustantivo común para espada. “Espada” es la equivalencia natural en español y preserva la imagen metonímica de violencia bélica.
theological_decisions:
- issue: Valor de פדה en un contexto sapiencial de salvación temporal
  english_pob_reading: redeem
  chosen_spanish_reading: rescatará
  alternative_spanish_readings:
  - redimirá
  - librará
  - salvará
  rationale: Aunque el verbo hebreo puede tener peso de “redimir”, aquí el contexto habla de liberación en calamidades históricas. “Rescatará” comunica bien el acto de sacar de peligro sin cargar el texto con un sentido soteriológico más amplio que el versículo no exige.
  doctrine_reference: Translation philosophy §1, §5
- issue: Expresión idiomática “from the hands of the sword”
  english_pob_reading: from the power of the sword
  chosen_spanish_reading: del poder de la espada
  alternative_spanish_readings:
  - de la mano de la espada
  - del alcance de la espada
  rationale: 'El hebreo literal “de la mano(s) de la espada” es una personificación idiomática. Siguiendo la lectura de POB, se explicita el sentido: la espada como instrumento mortal del poder bélico. “Del poder de la espada” conserva la imagen y evita una literalidad opaca.'
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Se siguió el pass más reciente con estado de alta concordancia y sin cambios necesarios. La versión española conserva el paralelismo de calamidades (“hambre” / “guerra”), mantiene el valor fuerte de פדה mediante “rescatará”, y explicita el modismo final con nota para no perder la imagen hebrea.
  spanish_consistency_notes:
  - Se evita “SEÑOR” porque no aparece aquí el Tetragrámaton; no se introduce terminología divina adicional.
  - Se eligió “rescatará” en vez de “redimirá” para no endurecer el versículo en un registro técnico-teológico que el contexto sapiencial no demanda.
  - Se conserva “espada” como traducción estándar de חָרֶב y se explica el hebraísmo “manos de la espada” en nota.
  - La puntuación mantiene la coordinación del hebreo y el flujo natural del español, con coma antes de la segunda cláusula para claridad.
