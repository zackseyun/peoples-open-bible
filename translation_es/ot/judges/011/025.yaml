translation:
  language: es
  text: Y ahora[a], ¿eres realmente mejor que Balac hijo de Zipor, rey de Moab? ¿Acaso contendió[b] con Israel, o acaso peleó contra ellos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿eres en algo mejor que Balac hijo de Zipor, rey de Moab?». El hebreo emplea una repetición enfática («bueno, bueno») para intensificar la comparación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Disputó alguna vez con Israel, o peleó alguna vez contra ellos?». El primer verbo puede denotar disputa, pleito o contienda, mientras que el segundo apunta más específicamente al combate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora pues
  - Y ahora bien
  lexicon: HALOT
  rationale: Mantiene la transición discursiva y el matiz temporal del hebreo, con una coordinación natural en español.
- source_word: הֲטוֹב טוֹב אַתָּה
  english_pob_choice: are you really better
  chosen_spanish: ¿eres realmente mejor?
  alternatives_spanish:
  - ¿eres de veras mejor?
  - ¿eres acaso mejor?
  lexicon: HALOT
  rationale: El hebreo usa interrogación con intensificación por repetición; ‘realmente’ comunica bien la fuerza enfática sin volver la frase extraña en español.
- source_word: מִבָּלָק בֶּן־צִפּוֹר מֶלֶךְ מוֹאָב
  english_pob_choice: than Balak son of Zippor, king of Moab
  chosen_spanish: que Balac hijo de Zipor, rey de Moab
  alternatives_spanish:
  - que Balac, hijo de Zipor, rey de Moab
  - que Balac hijo de Zipor, el rey de Moab
  lexicon: HALOT
  rationale: Se conserva la cadena de nombres y títulos de manera directa; ‘que’ expresa el comparativo implícito en el hebreo y el uso bíblico en español.
- source_word: הֲרֹב רָב
  english_pob_choice: Did he ever contend
  chosen_spanish: ¿Acaso contendió?
  alternatives_spanish:
  - ¿Acaso disputó?
  - ¿Acaso litigó?
  lexicon: HALOT
  rationale: ‘Contender’ preserva el rango semántico amplio de ריב, que puede abarcar disputa, reclamación o pleito, sin reducirlo sólo a lo legal ni sólo a lo militar.
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: with Israel
  chosen_spanish: con Israel
  alternatives_spanish:
  - contra Israel
  - frente a Israel
  lexicon: HALOT
  rationale: El hebreo usa עִם, ‘con’; se conserva esa relación para no adelantar el matiz adversativo que ya queda explicitado en la siguiente cláusula.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o si
  - o bien
  lexicon: HALOT
  rationale: En esta pregunta retórica, אִם funciona como alternativa coordinada; ‘o’ reproduce el valor idiomático reconocido en el texto de referencia.
- source_word: נִלְחֹם נִלְחַם בָּם
  english_pob_choice: did he ever fight against them
  chosen_spanish: ¿alguna vez peleó contra ellos?
  alternatives_spanish:
  - ¿alguna vez guerreó contra ellos?
  - ¿alguna vez libró batalla contra ellos?
  lexicon: HALOT
  rationale: ‘Peleó contra ellos’ expresa el combate hostil de forma natural en español, y conserva la oposición con la cláusula anterior sin sobrecargarla con tecnicismo.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de fuente; la versión inglesa auditada permanece sin cambios y con alta concordancia del revisor. La propuesta española sigue esa lectura, preservando la pregunta retórica doble y la distinción entre contienda amplia y pelea militar.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - Se usa un español bíblico moderno y claro, evitando calcos innecesarios pero conservando la fuerza retórica del hebreo.
  - 'Los nombres propios se transliteran en forma castellana usual: Balac, Zipor, Moab, Israel.'
