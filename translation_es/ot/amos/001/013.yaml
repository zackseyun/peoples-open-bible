translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones de los hijos de Amón[a], y por cuatro, no lo revocaré[b], porque desgarraron el vientre de las mujeres embarazadas de Galaad, con el fin de ensanchar su frontera»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los amonitas» para «los hijos de Amón».
    reason: lexical_alternative
  - marker: b
    text: O, «no lo volveré atrás»; es decir, no retiraré el juicio anunciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Señor
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera directa y natural en español. Se mantiene «Yahvé» según el criterio del proyecto para el nombre divino, sin sustituirlo por un título que lo oculte.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי ... וְעַל אַרְבָּעָה
  english_pob_choice: For three transgressions ... and for four
  chosen_spanish: Por tres transgresiones ... y por cuatro
  alternatives_spanish:
  - Por tres pecados ... y por cuatro
  - Por tres ofensas ... y por cuatro
  lexicon: HALOT
  rationale: Se preserva la fórmula numérica escalonada de Amós. «Transgresiones» conserva el matiz de rebeldía o quebrantamiento moral mejor que opciones más suaves.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: «Hijos de Amón» sigue de cerca la construcción hebrea y coincide con la decisión inglesa de preservar la forma fuente. «Amón» conserva el nombre propio bíblico en español.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke it
  chosen_spanish: no lo revocaré
  alternatives_spanish:
  - no me retractaré de ello
  - no lo volveré atrás
  lexicon: HALOT
  rationale: El hebreo expresa que Yahvé no retirará la acción anunciada. «Revocar» mantiene la idea judicial de retirar o anular lo decretado sin añadir un objeto interpretativo como «castigo».
- source_word: בִּקְעָם הָרוֹת הַגִּלְעָד
  english_pob_choice: they ripped open the pregnant women of Gilead
  chosen_spanish: abrieron a las mujeres embarazadas de Galaad
  alternatives_spanish:
  - rrajaron a las mujeres embarazadas de Galaad
  - abrieron en canal a las mujeres embarazadas de Galaad
  lexicon: HALOT
  rationale: El verbo hebreo describe una violencia extrema contra mujeres embarazadas. «Abrieron» conserva la imagen básica sin volver más gráfica la frase de lo que exige el texto; «embarazadas» expresa el sustantivo/adjetivo de forma natural en español.
- source_word: הַגִּלְעָד
  english_pob_choice: of Gilead
  chosen_spanish: de Galaad
  alternatives_spanish:
  - en Galaad
  lexicon: HALOT
  rationale: Se entiende como pertenencia o procedencia de las víctimas, de acuerdo con la lectura auditada en inglés. «Galaad» es la forma habitual en español bíblico.
- source_word: לְמַעַן הַרְחִיב אֶת גְּבוּלָם
  english_pob_choice: in order to enlarge their border
  chosen_spanish: con el fin de ensanchar su frontera
  alternatives_spanish:
  - para ampliar su territorio
  - para ensanchar su límite
  lexicon: HALOT
  rationale: Se conserva la finalidad explícita. «Frontera» traduce bien גְּבוּל en español bíblico y mantiene la imagen de límite territorial sin sobreparafrasear.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: Se sigue el estándar del proyecto para el tetragrámaton, manteniendo visible el nombre propio del pacto en lugar de ocultarlo tras una sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura de לֹא אֲשִׁיבֶנּוּ
  english_pob_reading: I will not revoke it
  chosen_spanish_reading: no lo revocaré
  alternative_spanish_readings:
  - no me retractaré de ello
  - no lo volveré atrás
  rationale: 'Se preserva la tensión judicial del texto: no se trata de un cambio emocional, sino de la decisión divina de no retirar lo anunciado.'
  doctrine_reference: Amós 1:13; audit trail lexical decision on Amos 1:13
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del inglés POB: se conserva «I will not revoke it» como base, sin añadir un objeto explícito como «castigo». La versión española refleja esa misma precisión y mantiene la fórmula profética y la acusación de violencia extrema con un nivel de literalidad natural en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene «hijos de Amón» para reproducir la construcción hebrea; la nota ofrece «amonitas» como alternativa legítima.
  - «No lo revocaré» conserva el valor judicial del verbo sin ampliar el sentido.
  - «Galaad» sigue la forma bíblica castellana habitual.
  - Se emplea «frontera» para גְּבוּל por su claridad y por conservar la imagen de límite territorial.
