translation:
  language: es
  text: Quien golpee[a] a su padre o a su madre, ciertamente se le dará muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente «y su madre», pero el sentido legal exige «o su madre»: golpear a cualquiera de los dos padres está en vista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכֵּה
  english_pob_choice: strikes
  chosen_spanish: golpee
  alternatives_spanish:
  - hiere
  - golpea
  - azote
  lexicon: HALOT
  rationale: El participio hebreo de נכה designa al que da un golpe/una agresión física. En español, «golpee» comunica el acto legalmente relevante sin exagerar a «hiere» ni introducir una idea más fuerte de violencia continua como «azote».
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su progenitor
  - a su padre
  lexicon: HALOT
  rationale: El hebreo menciona específicamente «su padre». Se conserva la especificidad filial y la formulación legal directa.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: o a su madre
  alternatives_spanish:
  - y a su madre
  - o a su madre
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea lleva una conjunción coordinante, el sentido legal en este contexto es disyuntivo: golpear a cualquiera de los dos padres activa la pena. Por eso se traduce «o» para reflejar el alcance jurídico correcto.'
- source_word: מ֥וֹת יוּמָֽת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente será muerto
  alternatives_spanish:
  - morirá ciertamente
  - será sin duda ejecutado
  - debe morir
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la fórmula penal. «Ciertamente será muerto» preserva el tono jurídico solemne y la pasiva legal, sin reducirla a una simple obligación ni suavizarla indebidamente.
theological_decisions:
- issue: Forma de la pena capital en un contexto legal de pacto
  english_pob_reading: shall surely be put to death
  chosen_spanish_reading: ciertamente será muerto
  alternative_spanish_readings:
  - debe morir
  - será ejecutado
  rationale: El versículo expresa una sanción judicial formal, no una descripción general de mortalidad. «Será muerto» mantiene la pasiva legal y el peso de la sentencia; «será ejecutado» explicita el acto judicial, pero añade una precisión no explicitada en el hebreo.
  doctrine_reference: Éxodo 21:15; traducción jurídica del hebreo legal casuístico.
translation_notes:
  revision_awareness: 'La revisión inglesa mantuvo sin cambios la lectura óptima: el único ajuste relevante para el español es preservar la misma decisión disyuntiva («o») que el audit trail inglés ya justificó para la cláusula coordinada. No hay cambios textuales adicionales respecto del hebreo base.'
  spanish_consistency_notes:
  - Se mantiene el registro legal sobrio y directo.
  - Se evita «padre o madre» genérico porque el hebreo distingue ambos términos y la nota explica la adaptación disyuntiva.
  - «Será muerto» conserva la fórmula penal bíblica sin imponer una paráfrasis explicativa.
  - La puntuación y el orden siguen el estilo jurídico español natural, con la nota anclada en la conjunción disyuntiva.
