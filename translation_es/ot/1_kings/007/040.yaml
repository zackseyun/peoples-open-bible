translation:
  language: es
  text: Y Hiram hizo las pilas, las palas y los cuencos[a]. Así, Hiram terminó de hacer toda la obra que hizo para el rey Salomón, para la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuencos para aspersión», es decir, recipientes usados en ritos sacrificiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּיֹּרוֹת
  english_pob_choice: basins
  chosen_spanish: pilas
  alternatives_spanish:
  - vasijas
  - lavas
  lexicon: HALOT
  rationale: El término designa recipientes grandes de agua en el mobiliario del templo. En español, «pilas» comunica bien ese tipo de recipiente cultual sin sonar tan arcaico como «laveras» ni tan general como «vasijas».
- source_word: יָּעִים
  english_pob_choice: shovels
  chosen_spanish: palas
  alternatives_spanish:
  - pala
  - paletas
  lexicon: HALOT
  rationale: Se refiere a utensilios para retirar brasas o cenizas. «Palas» es la equivalencia más natural y clara en español para este contexto.
- source_word: מִּזְרָקוֹת
  english_pob_choice: bowls
  chosen_spanish: cuencos
  alternatives_spanish:
  - tazones
  - copas
  lexicon: HALOT
  rationale: El objeto es un recipiente para usos rituales; «cuencos» preserva el sentido amplio del inglés «bowls» sin especificar más de lo que el texto exige.
- source_word: וַיְכַל
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - completó
  lexicon: HALOT
  rationale: El verbo marca conclusión de una labor asignada. «Terminó» es idiomático en español y mantiene la idea de finalización del trabajo.
- source_word: כָּל הַמְּלָאכָה
  english_pob_choice: all the work
  chosen_spanish: toda la obra
  alternatives_spanish:
  - todo el trabajo
  - toda la labor
  lexicon: HALOT
  rationale: מְלָאכָה puede abarcar trabajo, labor u obra. En este contexto de artesanía del templo, «obra» conserva mejor el matiz de manufactura y ejecución artística.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto de traducir יְהוָה como «Yahvé». «Casa» reproduce fielmente la construcción hebrea y refleja la relación de finalidad: la obra fue hecha para ese santuario.'
- source_word: חִירוֹם / חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Huram
  lexicon: HALOT
  rationale: El nombre propio presenta variación ortográfica en hebreo; se conserva la forma usual «Hiram» por coherencia y reconocimiento del personaje.
- source_word: עָשָׂה ... לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: that he did for King Solomon
  chosen_spanish: que hizo para el rey Salomón
  alternatives_spanish:
  - que realizó para el rey Salomón
  - que preparó para el rey Salomón
  lexicon: HALOT
  rationale: El resumen retoma el verbo anterior y señala la obra realizada en favor de Salomón. «Hizo» preserva la repetición verbal del hebreo y su valor resumitivo.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce con el nombre propio «Yahvé» en lugar de ocultarlo con una convención titular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre la obra y la casa de Yahvé
  english_pob_reading: for the house of Yahweh
  chosen_spanish_reading: para la casa de Yahvé
  alternative_spanish_readings:
  - en la casa de Yahvé
  - en favor de la casa de Yahvé
  rationale: La revisión inglesa corrigió «in the house» a «for the house» para reflejar que la labor fue hecha para el santuario, no simplemente dentro de él. El español conserva esa relación de finalidad con «para».
  doctrine_reference: Hebrew syntax and revision awareness
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que ajustó la frase final de «in the house of the LORD» a «for the house of the LORD» para reflejar con más precisión la relación de finalidad del hebreo. El español adopta explícitamente «para la casa de Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió una secuencia verbal natural en español («hizo», «terminó de hacer») sin perder la repetición significativa del hebreo.
  - Se preservó la tríada de objetos del templo con términos claros y relativamente literales.
  - 'El orden final mantiene la conclusión resumiva del original: primero los objetos, luego el cierre de la obra.'
