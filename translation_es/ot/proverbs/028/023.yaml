translation:
  language: es
  text: Quien reprende a un hombre hallará después favor[a], más que el que halaga con la lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien reprende a un hombre hallará después favor, más que un adulador de lengua suave».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹכִיחַ
  english_pob_choice: rebukes
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprocha
  lexicon: HALOT
  rationale: El participio hifil de יכח expresa reprensión/corrección. «Reprende» conserva el matiz confrontativo del proverbio sin volverlo más fuerte de lo que el hebreo exige.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם designa a un individuo concreto en singular. «Un hombre» mantiene la fuerza singular y la concordancia con la formulación proverbial, como en la decisión inglesa.
- source_word: אַחֲרַי
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - más tarde
  lexicon: HALOT
  rationale: El valor temporal natural en el contexto es posterioridad. «Después» es claro y neutro en español; evita la rareza de una glosa literal como «tras de mí».
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: HALOT
  rationale: En este proverbio חֵן apunta a favor o aceptación favorable. «Favor» reproduce bien el uso sapiencial y no introduce un tono teológico más cargado que el hebreo no requiere aquí.
- source_word: מִמַּחֲלִיק לָשׁוֹן
  english_pob_choice: more than one who flatters with the tongue
  chosen_spanish: más que el que lisonjea con la lengua
  alternatives_spanish:
  - más que el de lengua melosa
  - más que el que halaga con la lengua
  lexicon: HALOT
  rationale: מַחֲלִיק comunica la idea de hacer suave/liso, de donde «lisonjear/halagar». «Lisonjea con la lengua» conserva la imagen hebrea y mantiene el contraste proverbial sin necesidad de parafrasear demasiado.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés y con la lectura hebrea: se mantuvo el contraste entre la reprensión franca y la lisonja, sin suavizar el verbo principal ni convertir el comparativo en una simple oposición de cualidades. No se requirieron revisiones respecto del sentido base.'
  spanish_consistency_notes:
  - Se preservó el paralelismo sapiencial con sintaxis natural en español.
  - «Después» refleja el valor adverbial de אַחֲרַי sin añadir información.
  - «Lisonjea con la lengua» mantiene la imagen corporal de לָשׁוֹן y el matiz de flattery del contexto.
  - Se evitó «gracia» para חֵן porque el contexto es relacional/sapiencial y no técnico-teológico.
