id: 2CO.1.11
reference: 2 Corinthians 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: συνυπουργούντων καὶ ὑμῶν ὑπὲρ ἡμῶν τῇ δεήσει, ἵνα ἐκ πολλῶν προσώπων τὸ εἰς ἡμᾶς χάρισμα διὰ πολλῶν εὐχαριστηθῇ ὑπὲρ ⸀ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/011.yaml
  text: as you also join in helping us by prayer, so that thanks may be given by many on our behalf for the gracious gift given to us.
  footnotes:
  - marker: a
    text: Or possibly, “so that through many, thanks may be given by many people on our behalf for the gracious gift given to us.”
    reason: alternative_reading
  - marker: b
    text: Literally, “from many faces.”
    reason: lexical_alternative
  - marker: c
    text: “Gracious gift” may also be rendered “blessing” or “favor shown to us.”
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분도 기도로 우리를 위해 함께 도와주십시오. 이는 많은 사람의 입을 통하여 우리에게 주신 은혜의 선물에 대해 여러 사람이 우리를 위하여 감사하게 하려는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνυπουργούντων
  english_pob_choice: join in helping
  chosen_korean: 함께 도와주다
  alternatives_korean:
  - 협력하다
  lexicon: BDAG
  rationale: 드문 합성어로 적극적 협력의 의미. 한국어 분사 구문을 청유형으로 풀어 합쇼체 어조를 유지한다.
- source_word: δεήσει
  english_pob_choice: prayer
  chosen_korean: 기도
  alternatives_korean:
  - 간구
  lexicon: BDAG
  rationale: δέησις는 특정한 간구를 가리키나, 본 문맥에서는 일반적 「기도」로도 자연스럽다.
- source_word: χάρισμα
  english_pob_choice: gracious gift
  chosen_korean: 은혜의 선물
  alternatives_korean:
  - 은사
  lexicon: BDAG
  rationale: 본 문맥에서는 하나님이 베푸신 구원·건지심의 「선물」을 가리키므로 「은혜의 선물」이 적절하다. 후대의 「은사」(영적 은사)와 구별.
