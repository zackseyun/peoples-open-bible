base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/012/004.yaml
  text: and the doors on the street are shut when the sound of the grinding is low[a], and one rises at the sound of a bird[c][b], and all the daughters of song are brought low.
  footnotes:
  - marker: a
    text: Or 'the double doors'; many interpreters understand 'the doors' here metaphorically as the lips or mouth in the poem's depiction of old age.
    reason: alternative_reading
  - marker: b
    text: Or 'when the sound of the mill grows faint'; many take this as an image for diminished chewing because the preceding and following lines are often read as bodily metaphors.
    reason: lexical_alternative
  - marker: c
    text: Literally 'all the daughters of song.' This may refer to singing women, the faculties of singing, or the sounds associated with song.
    reason: lexical_alternative
