translation:
  language: es
  text: Y tu pacto con la muerte será anulado, y tu acuerdo con el Seol[b] no permanecerá; cuando pase el azote arrollador[a], serás para él un lugar para ser hollado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el azote desbordante». La imagen hebrea combina un azote con una fuerza de avance semejante a una inundación.
    reason: lexical_alternative
  - marker: b
    text: El Seol es el término hebreo para la morada de los muertos; alternativamente, «la tumba».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֻפַּר / כֻפַּר
  english_pob_choice: will be annulled
  chosen_spanish: será anulado
  alternatives_spanish:
  - será cubierto
  - será expiado
  - será cancelado
  lexicon: HALOT
  rationale: En este contexto jurídico de alianza, כפר no se expresa naturalmente en español como expiación sacrificial. «Será anulado» comunica bien la fuerza pasiva legal de invalidar un pacto, como en el audit trail inglés.
- source_word: בְּרִיתְכֶם
  english_pob_choice: your covenant
  chosen_spanish: tu pacto
  alternatives_spanish:
  - tu alianza
  - tu convenio
  lexicon: HALOT
  rationale: בְּרִית puede ser pacto, alianza o tratado. «Pacto» es claro y recoge el valor formal del término sin ocultar la ironía del texto.
- source_word: אֶת מָוֶת
  english_pob_choice: with death
  chosen_spanish: con la muerte
  alternatives_spanish:
  - con Muerte
  - con la muerte personificada
  lexicon: HALOT
  rationale: El español requiere la preposición explícita. «La muerte» mantiene la personificación retórica sin forzar mayúscula interpretativa.
- source_word: וְחָזוּתְכֶם
  english_pob_choice: your agreement
  chosen_spanish: tu acuerdo
  alternatives_spanish:
  - tu pacto
  - tu visión
  lexicon: HALOT
  rationale: Aunque חָזוּת puede relacionarse con visión, aquí el paralelismo con «pacto con la muerte» y «Seol» favorece un valor de acuerdo/compacto. «Acuerdo» evita introducir una lectura visionaria ajena al contexto.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - Sheol
  - la tumba
  - la muerte
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional de la noción hebrea. «El Seol» preserva el trasfondo conceptual más amplio que «la tumba» o «la muerte».
- source_word: לֹא תָקוּם
  english_pob_choice: will not stand
  chosen_spanish: no permanecerá
  alternatives_spanish:
  - no se mantendrá
  - no se levantará
  - no quedará en pie
  lexicon: HALOT
  rationale: קום en este contexto expresa vigencia o estabilidad de un acuerdo. «No permanecerá» comunica en español la idea de no seguir en fuerza.
- source_word: שׁוֹט שׁוֹטֵף
  english_pob_choice: the overwhelming scourge
  chosen_spanish: el azote arrollador
  alternatives_spanish:
  - el azote desbordante
  - el azote que todo lo barre
  - el azote que lo inunda
  lexicon: HALOT
  rationale: La imagen combina azote/vara con un movimiento de arrastre o inundación. «Arrollador» transmite la violencia y el avance envolvente de manera idiomática en español.
- source_word: יַעֲבֹר
  english_pob_choice: passes through
  chosen_spanish: pase
  alternatives_spanish:
  - pase a través
  - cruce
  - atraviese
  lexicon: HALOT
  rationale: Aquí el verbo describe el paso del azote por el territorio o la gente. En una subordinada temporal española, el subjuntivo «pase» resulta natural y conserva el sentido de atravesar.
- source_word: וִהְיִיתֶם לוֹ
  english_pob_choice: you will become for it
  chosen_spanish: seréis para él
  alternatives_spanish:
  - llegaréis a ser para él
  - os convertiréis para él
  lexicon: HALOT
  rationale: El hebreo expresa una relación resultante con el azote. En español, la frase queda completa con la expresión siguiente; se mantiene la dirección relacional sin sobreexplicar.
- source_word: לְמִרְמָס
  english_pob_choice: a trampling place
  chosen_spanish: un lugar para ser hollado
  alternatives_spanish:
  - un lugar de pisoteo
  - una cosa para ser pisoteada
  - un lugar de trampling
  lexicon: HALOT
  rationale: מִרְמָס es la idea de ser pisoteado/hollado. «Un lugar para ser hollado» conserva la imaginería concreta y resulta más natural que una calca rígida.
theological_decisions:
- issue: Personificación de la muerte y el Seol
  english_pob_reading: Retain 'death' and 'Sheol' as personified powers in the main text.
  chosen_spanish_reading: Mantener «la muerte» y «el Seol» como poderes personificados en el texto principal.
  alternative_spanish_readings:
  - despersonalizar a «la tumba»
  - reducir «Seol» a «sepulcro»
  rationale: 'El verso es retórico e irónico: denuncia una falsa seguridad al hablar de un pacto con Muerte y un acuerdo con el Seol. Conservar esta personificación respeta el efecto del hebreo y la lectura auditada en inglés.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de כפר en una alianza
  english_pob_reading: will be annulled
  chosen_spanish_reading: será anulado
  alternative_spanish_readings:
  - será cubierto
  - será purgado
  - será expiado
  rationale: Aunque כפר suele vincularse con expiación/cobertura, aquí el contexto de pacto exige una lectura jurídico-legal. «Será anulado» evita importar una teología sacrificial no indicada por la sintaxis.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the grave.'
  chosen_spanish_reading: Conservar «el Seol» en transliteración.
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: La transliteración preserva la tensión semántica y el trasfondo hebreo. Traducirlo como «la tumba» estrecharía demasiado su alcance y debilitaría el paralelismo con Muerte.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios sustanciales; el borrador español sigue el mismo sentido auditado, con adaptación idiomática al español y sin alterar las decisiones léxicas ni teológicas principales.
  spanish_consistency_notes:
  - Se mantuvo la personificación de Muerte y Seol tal como exige el paralelismo hebreo.
  - «Pacto» y «acuerdo» distinguen בְּרִית y חָזוּת sin borrar la cercanía semántica entre ambos.
  - Se prefirió «anulado» para כֻפַּר por el contexto jurídico del versículo.
  - «Azote arrollador» busca reproducir la combinación de violencia y movimiento inundante del hebreo.
  - La clausula final conserva la imagen concreta de quedar sometidos al pisoteo del azote.
