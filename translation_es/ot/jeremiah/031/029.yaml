translation:
  language: es
  text: 'En aquellos días ya no dirán[a]: «Los padres comieron uvas agrias, y los dientes de los hijos quedan destemplados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los padres comieron uvas verdes o inmaduras, y los dientes de los hijos quedan destemplados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: La expresión hebrea es un marcador temporal profético fijo. «En aquellos días» conserva el tono natural y solemne en español sin introducir una paráfrasis excesiva.
- source_word: לֹא יֹאמְרוּ עוֹד
  english_pob_choice: they will no longer say
  chosen_spanish: ya no dirán
  alternatives_spanish:
  - no volverán a decir
  - ya no se dirá
  lexicon: HALOT
  rationale: El hebreo usa verbo activo en tercera persona plural con עוֹד para indicar cese. «Ya no dirán» comunica con claridad esa cesación futura en un español fluido.
- source_word: אָב֖וֹת
  english_pob_choice: the fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los padres varones
  - los antepasados
  lexicon: HALOT
  rationale: Aunque el inglés POB retuvo «fathers» por precisión léxica, en español «padres» es el equivalente masculino y natural para אָבוֹת. «Antepasados» ampliaría indebidamente el sentido; «padres varones» sería innecesariamente marcado.
- source_word: אָכְלוּ
  english_pob_choice: have eaten
  chosen_spanish: comieron
  alternatives_spanish:
  - han comido
  lexicon: HALOT
  rationale: En el proverbio hebreo la forma perfecta expresa una acción proverbial ya realizada. En español, el pretérito simple transmite mejor la sentencia proverbial que el perfecto compuesto, que sonaría menos natural aquí.
- source_word: בֹסֶר
  english_pob_choice: sour grapes
  chosen_spanish: uvas agrias
  alternatives_spanish:
  - uvas verdes
  - uvas agraz
  lexicon: HALOT
  rationale: El valor léxico apunta a uvas inmaduras y de sabor agrio. «Uvas agrias» conserva el efecto sensorial del proverbio y evita una idiomatización demasiado inglesa como «sour grapes».
- source_word: וְשִׁנֵּי בָנִים
  english_pob_choice: and the sons’ teeth
  chosen_spanish: a los hijos
  alternatives_spanish:
  - los dientes de los hijos
  - a los hijos varones
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «y los dientes de los hijos». En español, la construcción impersonal con dativo anticipa de forma natural el sujeto afectado; se mantiene la referencia filial sin forzar una calcada estructura posesiva.
- source_word: תִּקְהֶינָה
  english_pob_choice: are set on edge
  chosen_spanish: se les destemplaron los dientes
  alternatives_spanish:
  - se les quedaron adormecidos los dientes
  - se les afilaron los dientes
  lexicon: HALOT
  rationale: El verbo describe el efecto desagradable y punzante causado por comer algo agrio. «Destemplar» es una forma idiomática española que comunica ese efecto sin perder la imagen corporal del texto.
theological_decisions:
- issue: Conservación del proverbio intergeneracional con términos masculinos
  english_pob_reading: Retain 'fathers' and 'sons' in the main text
  chosen_spanish_reading: Mantener «padres» e «hijos» en la formulación principal
  alternative_spanish_readings:
  - padres y niños
  - antepasados y descendientes
  rationale: El dicho hebreo emplea términos de parentesco masculinos específicos para formular una idea de responsabilidad o consecuencia intergeneracional. La traducción conserva esa forma léxica en lugar de neutralizarla, siguiendo la fidelidad de género del proyecto y evitando diluir el proverbio.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto inglés auditado no mostró revisiones pendientes; la versión española sigue la misma lectura sin añadir variantes textuales. La única decisión de matiz está en la naturalización española de la imagen proverbial y en la conservación de la referencia masculina del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto para el nombre divino, pero este versículo no lo contiene.
  - «Padres» y «hijos» reflejan el parentesco masculino del hebreo; no se neutraliza a «padres e hijos» en el sentido de «parents/children» porque el dicho original es específico.
  - La imagen de «uvas agrias» mantiene el efecto del proverbio sin depender de un calco idiomático inglés.
