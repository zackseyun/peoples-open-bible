  text: βλέπω δὲ ἕτερον νόμον ἐν τοῖς μέλεσίν μου ἀντιστρατευόμενον τῷ νόμῳ τοῦ νοός μου καὶ αἰχμαλωτίζοντά με ⸀ἐν τῷ νόμῳ τῆς ἁμαρτίας τῷ ὄντι ἐν τοῖς μέλεσίν μου.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/023.yaml
  text: But I see another law in my members[b][a], waging war against the law of my mind and taking me captive to the law of sin that is in my members.
translation:
  language: ko
  text: 그러나 내 지체 가운데서 또 다른 법이 내 마음의 법을 거슬러 싸우고, 내 지체 가운데 있는 죄의 법으로 나를 사로잡는 것을 봅니다.
  philosophy: optimal-equivalence
lexical_decisions:
