- source_word: יוֹבָ֑ב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  alternatives_spanish:
  - Yobab
  lexicon: HALOT
  rationale: Nombre propio. Se mantiene la transliteración tradicional ampliamente reconocible en español bíblico.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Estos todos
  lexicon: HALOT
  rationale: Equivale de manera directa al resumen conclusivo del hebreo. 'Todos estos' suena natural y conserva el alcance totalizador.
- source_word: בְּנֵי
