revisions:
- from: Azarías, el sacerdote, entró[a] detrás de él, y con él había ochenta sacerdotes de Yahvé, hombres valientes.
  to: Azarías, el sacerdote, entró tras él, y con él iban ochenta sacerdotes de Yahvé, hombres valientes.[a]
  rationale: Se ajusta אַחֲרָיו a 'tras él' para reflejar mejor el seguimiento narrativo sin sobrecargar el matiz espacial, y se cambia 'había' por 'iban' para un español más natural en contexto de acompañamiento. Se mantiene el resto por fidelidad al hebreo y a la terminología del proyecto.
  reviewer_model: gpt-5.4
