base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/016.yaml
  text: And they abandoned all the commandments of Yahweh their God[a], and made for themselves cast images, two calves, and made an Asherah, and bowed down to all the host of heaven, and served Baal.
  footnotes:
