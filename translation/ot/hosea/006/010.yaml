id: HOS.6.10
reference: Hosea 6:10
source:
  edition: WLC
  text: בְּ/בֵית֙ יִשְׂרָאֵ֔ל רָאִ֖יתִי שעריריה שָׁ֚ם זְנ֣וּת לְ/אֶפְרַ֔יִם נִטְמָ֖א יִשְׂרָאֵֽל׃
translation:
  text: 'In the house of Israel I have seen a horrible thing: there is prostitution in Ephraim[c][b][a]; Israel has defiled itself.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an appalling thing.' The Hebrew term denotes something shocking or atrocious.
    reason: lexical_alternative
  - marker: b
    text: Or 'there is prostitution in Ephraim' or 'there is whoredom of Ephraim.' The Hebrew phrase is compressed, and the relation marked by 'to/for Ephraim' can be expressed in several ways.
    reason: alternative_reading
  - marker: c
    text: Or 'Israel is defiled' or 'Israel has become unclean.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּבֵית יִשְׂרָאֵל
  chosen: In the house of Israel
  alternatives:
  - Among the house of Israel
  - In Israel
  lexicon: HALOT
  rationale: The preposition ב plus construct בֵית is most naturally rendered spatially/metaphorically as 'in the house of Israel.' This preserves the covenant-family imagery better than flattening to simply 'in Israel.'
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The qatal first-person singular is rendered with English present perfect to convey a present-relevant observation in prophetic discourse, while remaining close to the Hebrew verbal form.
- source_word: שעריריה
  chosen: a horrible thing
  alternatives:
  - a horrid thing
  - an appalling thing
  lexicon: HALOT
  rationale: The noun denotes something horrible, shocking, or atrocious. 'A horrible thing' is idiomatic modern English and preserves the moral revulsion of the Hebrew.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The adverb points to the location just mentioned and is best kept explicitly as 'there' rather than absorbed into the clause.
- source_word: זְנוּת
  chosen: prostitution
  alternatives:
  - whoredom
  - fornication
  - sexual immorality
  lexicon: HALOT
  rationale: The noun often carries both literal and metaphorical covenant-unfaithfulness overtones in Hosea. 'Prostitution' preserves the sexual metaphor clearly in contemporary English without archaic diction like 'whoredom.'
- source_word: לְאֶפְרַיִם
  chosen: belongs to Ephraim
  alternatives:
  - is in Ephraim
  - of Ephraim
  lexicon: HALOT
  rationale: The prefixed ל is somewhat elliptical here. 'Belongs to Ephraim' communicates association/attribution in smooth English while preserving the sense that this prostitution is characteristically Ephraim's.
- source_word: נִטְמָא
  chosen: has defiled itself
  alternatives:
  - is defiled
  - has become unclean
  lexicon: HALOT
  rationale: The Niphal of טמא can be rendered statively ('is defiled') or as entering a state ('has become unclean/defiled'). 'Has defiled itself' brings out the reflexive/resultative force in context, where Israel is culpably polluted by its own unfaithfulness.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Retained as the covenant people name. The verse distinguishes 'house of Israel,' 'Ephraim,' and 'Israel' rhetorically; the English keeps those distinctions visible.
