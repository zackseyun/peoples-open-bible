translation:
  language: es
  text: También[a], tu siervo es advertido por ellos[b]; en guardarlos hay gran recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toma aviso de ellos»; el verbo hebreo puede expresar ser advertido o prestar atención a la advertencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hay abundante recompensa/consecuencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Asimismo
  - Además
  - Incluso
  lexicon: HALOT
  rationale: El adverbio añade esta cláusula a lo dicho antes. «También» conserva la fuerza aditiva de גַּם con naturalidad en español moderno y lectura bíblica pública.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En este contexto el hablante se presenta en relación de pertenencia y servicio a Dios; «siervo» es el equivalente natural y reverente en español, sin forzar la dureza legal de «esclavo».
- source_word: נִזְהָר
  english_pob_choice: is warned
  chosen_spanish: es advertido
  alternatives_spanish:
  - toma aviso
  - recibe advertencia
  - es amonestado
  lexicon: HALOT
  rationale: El nifal de זהר expresa aquí el sentido pasivo de ser advertido o recibir advertencia. «Es advertido» mantiene esa pasividad; «amonestado» sería más interpretativo y más fuerte.
- source_word: בָּהֶם
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - por ellos
  - mediante ellas
  - a causa de ellas
  lexicon: HALOT
  rationale: El referente inmediato son los mandamientos/juicios divinos del contexto previo, que en español se perciben mejor como femeninos plurales según el antecedente implícito. «Por ellas» conserva el valor instrumental/catalizador de la expresión.
- source_word: בְּשָׁמְרָם
  english_pob_choice: in keeping them
  chosen_spanish: en guardarlas
  alternatives_spanish:
  - al guardarlas
  - al observarlas
  - en observarlas
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o mantener. «Guardar» conserva el campo semántico de custodia/observancia y encaja bien con el infinitivo constructo precedido por בְּ.
- source_word: עֵקֶב
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - resultado
  - consecuencia
  lexicon: HALOT
  rationale: Aquí עֵקֶב denota lo que sigue como resultado beneficioso de obedecer. «Recompensa» preserva ese beneficio sin imponer de entrada una lectura meritoria cerrada; deja abierta la tensión bíblica entre consecuencia y don.
- source_word: רָב
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - abundante
  - grande
  - mucha
  lexicon: HALOT
  rationale: Como adjetivo de intensidad, modifica la recompensa/resultado. «Gran» es idiomático en español antes de un sustantivo femenino y mantiene el matiz de abundancia/intensidad.
theological_decisions:
- issue: Si el verso enseña mérito humano o simplemente el resultado beneficioso de la obediencia
  english_pob_reading: The wording states that obedience to God's revealed commands brings great reward, without importing a doctrine of human merit.
  chosen_spanish_reading: El verso afirma que guardar los mandamientos de Dios trae una gran recompensa, sin convertir esa recompensa en una doctrina cerrada de mérito humano.
  alternative_spanish_readings:
  - Guardar los mandamientos merece una recompensa ante Dios.
  - La obediencia produce un resultado grande y beneficioso.
  rationale: La sintaxis hebrea permite hablar de consecuencia/recompensa sin definir un sistema de mérito. La traducción española debe conservar esa apertura y no resolver la tensión teológica que el texto no explicita.
  doctrine_reference: Preservar la tensión bíblica entre obediencia, recompensa y gracia.
translation_notes:
  revision_awareness: El texto coincide con el audit trail inglés más reciente y con el veredicto de alta concordancia; no se registran revisiones aplicadas en la fuente auditada.
  spanish_consistency_notes:
  - Se mantuvo «siervo» en lugar de «esclavo» porque el contexto es de pertenencia devota a Yahvé, no de énfasis jurídico sobre servidumbre.
  - Se eligió «recompensa» para עֵקֶב, pero la nota conserva la alternativa de «consecuencia» para no perder la amplitud semántica.
  - «Por ellas» sigue el antecedente implícito plural de los mandamientos/juicios del contexto previo; si se desea máxima explicitud, puede leerse como referencia a las instrucciones divinas.
  - «Guardar» refleja bien שׁמר y permite una lectura bíblica fluida sin dejar de ser fiel al hebreo.
