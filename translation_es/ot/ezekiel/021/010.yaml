revisions:
- from: Y todo ser humano[a] sabrá que yo, Yahvé, he sacado mi espada de su vaina; no volverá nunca más.
  to: Y toda carne[a] sabrá que yo, Yahvé, he sacado mi espada de su vaina; ya no volverá.
  rationale: Se revisa principalmente כָּל בָּשָׂר para alinearlo con la decisión fuente y la auditoría inglesa, preservando la expresión bíblica 'toda carne' en el texto principal y dejando las opciones interpretativas en la nota. También se ajusta לֹא תָשׁוּב עוֹד a 'ya no volverá' para reflejar con más precisión y sobriedad el valor de עוד. Se mantiene 'Yahvé' según la política del proyecto y 'he sacado mi espada de su vaina' por su cercanía al hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:45:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: reconocimiento universal, nombre divino Yahvé, acción de sacar la espada y afirmación de que no volverá. Sin embargo, כָּל בָּשָׂר se ha estrechado innecesariamente a ''todo ser humano'', cuando el original y la auditoría inglesa preservan deliberadamente ''all flesh'' por su fuerza idiomática y amplitud retórica. Además, ''nunca más'' es defendible, pero ''ya no volverá'' o ''no volverá otra vez'' refleja mejor לֹא ... עוֹד sin intensificar tanto el matiz temporal.'
  spanish_quality_summary: El español es claro y digno. No obstante, 'Y todo ser humano sabrá' suena algo individualizante y menos bíblico que una solución como 'Y toda carne[a] sabrá' o 'Y todos[a] sabrán'. Dado que la auditoría inglesa mantuvo la literalidad con nota, en español conviene hacer lo mismo. El resto fluye naturalmente; 'he sacado mi espada de su vaina' es comprensible, aunque 'he desenvainado mi espada' también sería válido. Mantener 'he sacado ... de su vaina' conserva mejor la forma del original.
  glossary_alignment: '''Yahvé'' está correctamente alineado con la política del proyecto para יְהוָה. No hay conflicto con otros términos clave. La principal desalineación terminológica es כָּל בָּשָׂר, donde el proyecto inglés retuvo la expresión literal con nota; el español debería seguir esa rationale documental en vez de sustituirla por ''todo ser humano''.'
  issues:
  - severity: medium
    issue: כָּל בָּשָׂר fue vertido como 'todo ser humano' en vez de conservar la literalidad principal.
    rationale: La auditoría inglesa documenta una decisión consciente de mantener 'all flesh' en el texto por su fuerza bíblica y amplitud universal, relegando alternativas interpretativas a nota. 'Todo ser humano' reduce esa textura idiomática y cambia la estrategia documentada.
  - severity: low
    issue: La nota al pie ya explica 'toda carne', pero el texto principal no la usa.
    rationale: 'Esto crea una incoherencia entre el texto y la justificación léxica: la nota presenta como literal una opción que el texto principal descartó, aunque la decisión inglesa fue precisamente mantenerla.'
  - severity: low
    issue: '''No volverá nunca más'' puede sonar un poco más enfático que לֹא תָשׁוּב עוֹד.'
    rationale: No es una mala traducción, pero 'ya no volverá' reproduce con más sobriedad la combinación de negación + עוד ('ya no / no más'), evitando una posible sobreintensificación.
  revised_spanish_text: Y toda carne[a] sabrá que yo, Yahvé, he sacado mi espada de su vaina; ya no volverá.
  revised_footnotes:
  - marker: a
    text: O 'toda la humanidad' o 'todas las personas'; literalmente, 'toda carne'.
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente כָּל בָּשָׂר para alinearlo con la decisión fuente y la auditoría inglesa, preservando la expresión bíblica 'toda carne' en el texto principal y dejando las opciones interpretativas en la nota. También se ajusta לֹא תָשׁוּב עוֹד a 'ya no volverá' para reflejar con más precisión y sobriedad el valor de עוד. Se mantiene 'Yahvé' según la política del proyecto y 'he sacado mi espada de su vaina' por su cercanía al hebreo.
