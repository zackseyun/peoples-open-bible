  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Yahvé» para יהוה, «todos los hombres de Israel» preservando la fuerza masculina/distributiva, y registro digno y natural. La principal corrección es acercar לא אֶהְיֶה a la elipsis de lealtad del original con «seré suyo» en vez de «perteneceré al que...».'
