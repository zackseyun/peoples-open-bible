base_translation:
  language: en
  yaml_path: translation/ot/proverbs/028/021.yaml
  text: To show partiality is not good[c][b][a], yet for a piece of bread a man will transgress.
  footnotes:
  - marker: a
    text: Hebrew literally, 'to recognize faces,' an idiom meaning to show partiality or favoritism.
    reason: lexical_alternative
  - marker: b
    text: Or 'for a morsel of bread'; the point is that a person may commit wrongdoing for something very small.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'a man' in a generic proverbial sense.
    reason: cultural_note
