id: PSS.2.24
reference: Psalms of Solomon 2:24
source:
  edition: lxx-swete-1909
  text: καὶ ἐγὼ εἶδον, καὶ ἐδεήθην τοῦ προσώπου Κυρίου καὶ εἶπον Ἱκάνωσον, Κύριε, τοῦ βαρύνεσθαι χεῖράς σου ἐπʼ Ἰσραὴλ ἐν ἐπαγωγῇ ἐθνῶν.
  language: Greek
  pages:
  - 790
  validation: swete_direct
translation:
  text: And I saw[a], and I entreated the face of the Lord and said, “Enough, Lord[d][c][b], of your hand weighing heavily on Israel by the attack of the nations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be satisfied, Lord,' or 'Let it suffice, Lord.' The Greek imperative Ἱκάνωσον can be read more literally than the concise rendering 'Enough.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'of your hands being heavy upon Israel,' preserving a common biblical image of divine pressure or judgment.
    reason: cultural_note
  - marker: c
    text: Or 'through the invasion of nations.' The noun ἐπαγωγή can suggest either the bringing-on of nations or their assault.
    reason: alternative_reading
  - marker: d
    text: Or 'I implored before the Lord'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐδεήθην τοῦ προσώπου Κυρίου
  chosen: I implored before the Lord
  alternatives:
  - I begged before the face of the Lord
  - I entreated the Lord
  lexicon: LSJ
  rationale: δέομαι denotes earnest petition. τοῦ προσώπου Κυρίου is a Semitic-style expression literally involving the 'face' or 'presence' of the Lord; 'before the Lord' preserves the relational setting without awkward English.
- source_word: Ἱκάνωσον
  chosen: Enough
  alternatives:
  - Be satisfied
  - Let it suffice
  lexicon: LSJ
  rationale: The imperative calls for sufficiency or cessation. In this plea context, 'Enough' best captures the speaker's urgent request that the present affliction not continue, while the alternatives are preserved because the verb can be construed more literally as 'be satisfied' or 'let it suffice.'
- source_word: τοῦ βαρύνεσθαι χεῖράς σου ἐπʼ Ἰσραήλ
  chosen: of your hands weighing heavily on Israel
  alternatives:
  - of your hands being heavy upon Israel
  - of your hand pressing hard on Israel
  lexicon: LSJ
  rationale: The genitive articular infinitive depends on Ἱκάνωσον. βαρύνεσθαι with χεῖράς σου preserves the biblical idiom of God's hand(s) lying heavy in judgment. 'Weighing heavily on Israel' is readable modern English while retaining the metaphor.
- source_word: ἐν ἐπαγωγῇ ἐθνῶν
  chosen: through the assault of the nations
  alternatives:
  - in the invasion of nations
  - at the bringing on of nations
  lexicon: LSJ
  rationale: ἐπαγωγή can denote a bringing on or an attack. In context of foreign oppression against Jerusalem and Israel, 'through the assault of the nations' expresses the likely instrumental sense without over-specifying beyond the Greek.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: This follows the project's default rendering for κύριος and fits direct address to Israel's God in prayer.
