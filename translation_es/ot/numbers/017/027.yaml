translation:
  language: es
  text: 'Y los hijos de Israel[a] dijeron a Moisés, diciendo: «¡Miren[b][c], morimos! ¡Estamos perdidos! ¡Todos nosotros estamos perdidos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'He aquí'; una exclamación de alarma.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa dos verbos distintos en secuencia: ''morimos'' (גוע) y ''estamos perdidos'' (אבד), lo que intensifica el pánico del pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conserva la forma idiomática hebrea y la referencia corporativa al pueblo. 'Hijos' refleja mejor el paralelo de la POB en inglés que 'israelitas', aunque esta última sería más natural en español.
- source_word: וַיֹּאמְרוּ ... לֵאמֹר
  english_pob_choice: said ... saying
  chosen_spanish: dijeron ... diciendo
  alternatives_spanish:
  - hablaron ... diciendo
  - dijeron
  lexicon: HALOT
  rationale: Mantiene la estructura narrativa con el verbo de habla y la subordinación introducida por לֵאמֹר. En español, 'diciendo' conserva esa transparencia mejor que omitirla por completo.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira!
  - ¡He aquí!
  - ¡Miren!
  lexicon: HALOT
  rationale: La partícula funciona como llamada de atención en un grito de alarma. 'Mira' comunica mejor la urgencia que 'He aquí', que suena más arcaico en español.
- source_word: גָּוַעְנוּ
  english_pob_choice: we are dying
  chosen_spanish: perecemos
  alternatives_spanish:
  - estamos muriendo
  - morimos
  lexicon: HALOT
  rationale: El verbo denota morir o exhalar la vida. Aquí el presente simple español expresa una realidad inmediata y angustiosa; evita sonar menos natural que 'estamos muriendo'.
- source_word: אָבַדְנוּ
  english_pob_choice: we are perishing
  chosen_spanish: estamos arruinados
  alternatives_spanish:
  - estamos perdidos
  - perecemos
  - estamos destruidos
  lexicon: HALOT
  rationale: אָבַד intensifica la idea de ruina o pérdida total. 'Estamos arruinados' preserva la noción de desastre y diferencia este verbo del primero sin volverlo redundante en español.
- source_word: כֻּלָּנוּ
  english_pob_choice: All of us
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  - cada uno de nosotros
  lexicon: HALOT
  rationale: Expresa el énfasis hebreo sobre la totalidad del grupo. 'Todos nosotros' es claro y reproduce la fuerza colectiva.
- source_word: אָבָדְנוּ
  english_pob_choice: are perishing
  chosen_spanish: estamos arruinados
  alternatives_spanish:
  - perecemos
  - estamos destruidos
  - estamos perdidos
  lexicon: HALOT
  rationale: Se mantiene la repetición del segundo verbo con el mismo valor semántico para conservar el efecto retórico de pánico y desesperación.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo, pero adapta el orden y la fluidez para un español bíblico actual. A diferencia del borrador inglés final, aquí se conserva la repetición enfática con dos verbos de desastre en secuencia, y se explicita 'diciendo' para reflejar לֵאמֹר.
  spanish_consistency_notes:
  - Se prefirió 'hijos de Israel' para mantener la transparencia formal del idiomático hebreo.
  - Se distinguieron los dos verbos hebreos con dos expresiones españolas de desastre para no aplanar la intensificación del lamento.
  - '''Mira'' se usa como interjección de alarma, no como mandato visual literal.'
