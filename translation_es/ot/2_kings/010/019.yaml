source:
  edition: WLC
  text: וְ/עַתָּ֣ה כָל נְבִיאֵ֣י הַ/בַּ֡עַל כָּל עֹבְדָ֣י/ו וְ/כָל כֹּהֲנָי/ו֩ קִרְא֨וּ אֵלַ֜/י אִ֣ישׁ אַל יִפָּקֵ֗ד כִּי֩ זֶ֨בַח גָּד֥וֹל לִ/י֙ לַ/בַּ֔עַל כֹּ֥ל אֲשֶׁר יִפָּקֵ֖ד לֹ֣א יִֽחְיֶ֑ה וְ/יֵהוּא֙ עָשָׂ֣ה בְ/עָקְבָּ֔ה לְמַ֥עַן הַאֲבִ֖יד אֶת עֹבְדֵ֥י הַ/בָּֽעַל־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/019.yaml
  text: Now summon to me all the prophets of Baal[a], all his worshipers, and all his priests; let no man be missing, for I have a great sacrifice for Baal. Whoever is missing shall not live.” But Jehu did it in deceit[b], in order to destroy the worshipers of Baal.
  footnotes:
  - marker: a
    text: Or, “let no one be missing.” The Hebrew reads “let not a man be missing,” using a singular masculine form generically.
    reason: lexical_alternative
  - marker: b
    text: Or, “with cunning” / “by trickery.”
    reason: lexical_alternative
