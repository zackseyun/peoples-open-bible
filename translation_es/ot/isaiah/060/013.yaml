translation:
  language: es
  text: La gloria del Líbano vendrá a ti—ciprés[a], plátano y pino juntos—para embellecer el lugar de mi santuario, y honraré el lugar de mis pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo nombra tres clases de árboles: ciprés, plátano y pino. La identificación exacta de la segunda y la tercera especies es incierta; entre las alternativas están “olmo” y “boj”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “mi estrado”. El hebreo dice más literalmente: “el lugar de mis pies”.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - riqueza
  lexicon: HALOT
  rationale: “Gloria” reproduce bien la idea de magnificencia y honra del hebreo en este contexto. En español también mantiene la relación con la fama de los bosques del Líbano sin volver la frase demasiado explicativa.
- source_word: הַלְּבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: Líbano
  alternatives_spanish:
  - el Líbano
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español se expresa naturalmente como “Líbano”. El artículo se conserva en la frase según la sintaxis del español.
- source_word: אֵלַיִךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: La preposición hebrea indica dirección hacia la destinataria femenina singular. “A ti” es la forma más natural en español y conserva el matiz de destino.
- source_word: יָבוֹא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrán
  - será traído
  lexicon: HALOT
  rationale: El verbo hebreo es activo (“vendrá”). En español, “vendrá” conserva la imagen de llegada sin introducir una pasiva que el texto no exige.
- source_word: בְּרוֹשׁ
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - junípero
  - abeto
  lexicon: HALOT
  rationale: “Ciprés” es una equivalencia natural y ampliamente reconocida para el término en un contexto de árboles valiosos para embellecer. La identificación botánica exacta sigue siendo incierta, pero el sentido general se conserva.
- source_word: תִּדְהָר
  english_pob_choice: plane tree
  chosen_spanish: plátano
  alternatives_spanish:
  - plátano de sombra
  - olmo
  lexicon: HALOT
  rationale: La especie precisa es incierta. En español, “plátano” puede comunicar el árbol de avenida/sombra que suele corresponder al “plane tree” de traducciones modernas, sin afirmar más certeza de la que ofrece el hebreo.
- source_word: וּתְאַשּׁוּר
  english_pob_choice: pine
  chosen_spanish: pino
  alternatives_spanish:
  - abeto
  - boj
  lexicon: HALOT
  rationale: “Pino” transmite bien un árbol valioso de madera en una serie ornamental. Aunque la identificación exacta es debatida, funciona en español como término claro y natural dentro del listado.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio indica que los árboles llegan como grupo. “Juntos” es conciso y fiel al sentido.
- source_word: לְפָאֵר
  english_pob_choice: to beautify
  chosen_spanish: para embellecer
  alternatives_spanish:
  - para adornar
  - para glorificar
  lexicon: HALOT
  rationale: El infinitivo piel expresa hacer bello o espléndido. “Para embellecer” comunica bien la finalidad estética del pasaje en un español natural.
- source_word: מְקוֹם מִקְדָּשִׁי
  english_pob_choice: the place of my sanctuary
  chosen_spanish: el lugar de mi santuario
  alternatives_spanish:
  - el sitio de mi santuario
  - mi lugar santo
  lexicon: HALOT
  rationale: Se conserva la relación posesiva y el sentido de un espacio sagrado concreto. “Santuario” es más preciso y menos ambiguo que “lugar santo” en este contexto.
- source_word: וּמְקוֹם רַגְלַי
  english_pob_choice: the place of my feet
  chosen_spanish: el lugar de mis pies
  alternatives_spanish:
  - mi estrado
  - el lugar donde reposan mis pies
  lexicon: HALOT
  rationale: Se mantiene la expresión literal para no borrar la imagen antropomórfica preservada por la POB en inglés. “El lugar de mis pies” deja abierta la lectura figurada sin imponer una equivalencia interpretativa.
- source_word: אֲכַבֵּד
  english_pob_choice: I will honor
  chosen_spanish: honraré
  alternatives_spanish:
  - glorificaré
  - haré glorioso
  lexicon: HALOT
  rationale: El piel de כבד puede significar honrar o glorificar. “Honraré” evita una repetición innecesaria con “gloria” al inicio y mantiene la idea de conferir dignidad al lugar.
theological_decisions:
- issue: Imagen antropomórfica de “el lugar de mis pies”
  english_pob_reading: retain 'the place of my feet' in the main text
  chosen_spanish_reading: mantener 'el lugar de mis pies' en el texto principal
  alternative_spanish_readings:
  - mi estrado
  - el lugar donde reposan mis pies
  rationale: El hebreo es literal y poético; conservar la imagen evita introducir una interpretación no expresada por el término usado aquí. En español, la expresión puede sonar extraña, pero esa tensión está documentada y es parte del valor auditivo del versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente implícito del destinatario 'tú'
  english_pob_reading: leave implicit in the main text
  chosen_spanish_reading: dejar implícita la destinataria
  alternative_spanish_readings:
  - Sion
  - Jerusalén
  rationale: El hebreo usa segunda persona femenina singular sin nombrar a la ciudad. Mantener el pronombre en español preserva el flujo discursivo y evita añadir un nombre que el versículo no dice.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios; por eso se mantiene la estructura del verso, la lista de árboles y la literalidad de “el lugar de mis pies”, con una redacción española natural pero sin suavizar la tensión semántica documentada.
  spanish_consistency_notes:
  - Se usó “Yahvé” según el estándar del proyecto solo cuando el hebreo lo exige; en este versículo no aparece el tetragrámaton, por lo que no corresponde introducirlo.
  - Se prefirió “gloria”/“honraré” para distinguir el sustantivo inicial del verbo final sin perder el campo semántico de כבד.
  - Se mantuvo “santuario” y no “templo” para respetar el paralelismo del hebreo y la formulación auditada en inglés.
  - Los nombres de árboles siguen la equivalencia adoptada por la POB en inglés, pero en español se eligieron formas naturales y publicables, dejando constancia de la incertidumbre botánica en los casos pertinentes.
