  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, οὐκ ἐγήγερται ἐν γεννητοῖς γυναικῶν μείζων Ἰωάννου τοῦ βαπτιστοῦ· ὁ δὲ μικρότερος ἐν τῇ βασιλείᾳ τῶν οὐρανῶν μείζων αὐτοῦ ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/011.yaml
  text: 'Truly I say to you[a], among those born of women no one greater than John the Baptist has arisen[c][b]; yet the least in the kingdom of heaven is greater than he.'
  footnotes:
  - marker: a
    text: Or 'has been raised up.' The Greek verb can mean 'has arisen' or 'has been raised up'; here it most likely refers to appearing on the stage of history, not resurrection.
    reason: lexical_alternative
  - marker: b
    text: '''Among those born of women'' is a Semitic expression meaning among human beings.'
    reason: cultural_note
  - marker: c
    text: Or 'the lesser one' / 'the smallest one.' The Greek literally uses a comparative form, but the sense here is the one of least rank or status in the kingdom of heaven.
    reason: lexical_alternative
translation:
  language: ko
  text: '진실로 너희에게 말한다. 여인이 낳은 자들 중에 침례자 요한보다 더 큰 자가 일어나지 않았다. 그러나 하늘 나라에서는 가장 작은 자라도 그보다 더 크다.'
  philosophy: optimal-equivalence
