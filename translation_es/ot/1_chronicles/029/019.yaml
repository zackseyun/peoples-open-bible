translation:
  language: es
  text: Y a Salomón, mi hijo, dale un corazón íntegro para guardar tus mandamientos, tus testimonios y tus estatutos, y para hacerlo todo, y para construir la fortaleza[a] que yo he preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palacio» o simplemente «templo». El hebreo usa un término inusual para una estructura grande o fortificada, y aquí se refiere al santuario cuya construcción David preparó para Salomón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁלֹמֹה בְנִי
  english_pob_choice: And give to Solomon my son
  chosen_spanish: Y a Salomón, mi hijo, dale
  alternatives_spanish:
  - Y dale a Salomón, mi hijo
  - Y a Salomón, mi hijo, concede
  lexicon: HALOT
  rationale: La preposición לִ introduce el destinatario indirecto de la petición. Mantengo el nombre propio «Salomón» y la relación filial «mi hijo». «Dale» expresa de forma directa la petición en español y conserva el valor de dar/otorgar del hebreo.
- source_word: תֵּן
  english_pob_choice: give
  chosen_spanish: dale
  alternatives_spanish:
  - concede
  - otorga
  lexicon: HALOT
  rationale: נתן en una súplica se traduce naturalmente como «dar». «Dale» preserva la inmediatez de la petición y suena más natural que una fórmula más abstracta.
- source_word: לֵבָב שָׁלֵם
  english_pob_choice: a whole heart
  chosen_spanish: un corazón íntegro
  alternatives_spanish:
  - un corazón completo
  - un corazón perfecto
  - un corazón indiviso
  lexicon: HALOT
  rationale: לֵבָב es el centro interior de voluntad y pensamiento; שָׁלֵם comunica integridad, completitud y falta de división. «Íntegro» conserva bien esa idea en español contemporáneo y evita el matiz potencialmente moralizante o arcaico de «perfecto».
- source_word: לִשְׁמוֹר
  english_pob_choice: to keep
  chosen_spanish: para guardar
  alternatives_spanish:
  - para observar
  - para obedecer y guardar
  lexicon: HALOT
  rationale: Con mandamientos, שׁמר significa custodiar/obedecer fielmente. «Guardar» es el equivalente bíblico más estable en español y preserva el matiz de cumplimiento atento.
- source_word: מִצְוֺתֶיךָ
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus órdenes
  - tus preceptos
  lexicon: HALOT
  rationale: מִצְוָה se corresponde bien con «mandamiento» en contexto de pacto y obediencia. Mantiene una distinción clara frente a los términos legales siguientes.
- source_word: עֵדְוֺתֶיךָ
  english_pob_choice: your testimonies
  chosen_spanish: tus testimonios
  alternatives_spanish:
  - tus decretos
  - tus estipulaciones del pacto
  lexicon: HALOT
  rationale: «Testimonios» conserva la distinción léxica tradicional de עֵדוֹת y sigue siendo reconocible en español bíblico sin borrar su peso legal/covenantal.
- source_word: וְחֻקֶּיךָ
  english_pob_choice: and your statutes
  chosen_spanish: y tus estatutos
  alternatives_spanish:
  - y tus decretos
  lexicon: HALOT
  rationale: חֻקִּים son prescripciones establecidas; «estatutos» refleja esa fijación normativa y mantiene la serie distintiva de tres términos.
- source_word: וְלַעֲשׂוֹת הַכֹּל
  english_pob_choice: and to do all of them
  chosen_spanish: y para hacer todo
  alternatives_spanish:
  - y para hacerlas todas
  - y para cumplirlo todo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacer el todo». Dado que los referentes inmediatos ya son plurales, «hacer todo» es natural en español y no añade contenido ajeno. También conserva la amplitud total de la obediencia.
- source_word: וְלִבְנוֹת הַבִּירָה
  english_pob_choice: and to build the fortress
  chosen_spanish: y para construir la fortaleza[a]
  alternatives_spanish:
  - y para construir la ciudadela
  - y para construir la fortaleza del templo
  lexicon: HALOT
  rationale: בִּירָה es un término poco común para una estructura grande y fortificada. Dado el ajuste revisado en el POB inglés desde «temple-fortress» a «fortress», traduzco de manera más directa como «fortaleza», preservando el valor fortificado sin imponer «templo» en el texto principal. La nota puede explicar el alcance cultual del término en el contexto de Crónicas.
- source_word: אֲשֶׁר הֲכִינוֹתִי
  english_pob_choice: that I have prepared
  chosen_spanish: que yo he preparado
  alternatives_spanish:
  - que preparé
  - que he dispuesto
  lexicon: HALOT
  rationale: כּוּן en hifil significa preparar o dejar listo. El perfecto se expresa bien con «he preparado», y el pronombre explícito «yo» resalta el sujeto del verbo sin alterar el sentido.
theological_decisions:
- issue: Alcance de בִּירָה en relación con el proyecto davídico
  english_pob_reading: fortress
  chosen_spanish_reading: fortaleza
  alternative_spanish_readings:
  - ciudadela
  - fortaleza del templo
  - templo-fortaleza
  rationale: El POB inglés revisó el término desde una formulación compuesta hacia una más directa. En español, «fortaleza» conserva la idea de estructura fortificada sin resolver de antemano si el énfasis es palaciego, cívico o cultual. La nota permite señalar que en el contexto de Crónicas se trata de la gran obra preparada para Salomón.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail en inglés, que simplificó «temple-fortress» a «fortress». Por eso el texto principal español evita una expansión interpretativa y conserva el término fortificado más directo, dejando en nota la posibilidad de «ciudadela» y el trasfondo contextual de la obra preparada por David.
  spanish_consistency_notes:
  - Usé «mandamientos / testimonios / estatutos» para mantener la tríada legal del hebreo y la distinción léxica que el POB inglés preserva.
  - Elegí «guardar» para שׁמר porque es el verbo bíblico más natural en español para obediencia fiel a mandatos.
  - «Corazón íntegro» evita el falso amigo de «perfecto» y comunica mejor la idea de integridad/totalidad del hebreo.
  - Mantuve un español sobrio y eclesial, sin sustituir terminología fuente por equivalentes tradicionales menos precisos.
