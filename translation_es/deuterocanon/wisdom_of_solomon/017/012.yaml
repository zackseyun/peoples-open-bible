lexical_decisions:
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - terror
  lexicon: LSJ
  rationale: φόβος nombra el estado de miedo o temor. «Miedo» es natural en español actual y conserva el sentido básico sin exagerarlo; «terror» sería demasiado fuerte.
- source_word: οὐθὲν ... εἰ μὴ
  english_pob_choice: nothing but
  chosen_spanish: no es otra cosa que
  alternatives_spanish:
  - nada sino
  - solo
  lexicon: LSJ
  rationale: La expresión exclusiva define el sustantivo por exclusión. «No es otra cosa que» reproduce bien esa fuerza idiomática en español y suena más natural que un calco rígido.
- source_word: προδοσία
  english_pob_choice: betrayal
  chosen_spanish: traición
  alternatives_spanish:
  - deslealtad
  - traición pérfida
  lexicon: LSJ
  rationale: El término denota abandono traicionero. «Traición» conserva la carga relacional y moral del sustantivo griego y encaja con la imagen del verso.
- source_word: βοηθημάτων
  english_pob_choice: helps
  chosen_spanish: ayudas
  alternatives_spanish:
  - auxilios
  - apoyos
  - recursos de ayuda
  lexicon: LSJ
  rationale: 'βοηθήματα es plural y concreto: medios o recursos de ayuda. «Ayudas» preserva la pluralidad y la concreción mejor que una abstracción más interpretativa.'
- source_word: τῶν ἀπὸ λογισμοῦ
  english_pob_choice: that come from reason
  chosen_spanish: que provienen de la razón
  alternatives_spanish:
  - derivadas del razonamiento
  - que proceden del razonamiento
  - que nacen de la reflexión
  lexicon: LSJ
  rationale: λογισμός aquí apunta a la razón o el razonamiento reflexivo. «Que provienen de la razón» conserva la relación de origen expresada por ἀπό y mantiene la claridad en español.
theological_decisions:
- issue: Nuance filosófica/antropológica de λόγισμος
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el razonamiento
  - la reflexión racional
  rationale: El verso presenta una observación conceptual sobre el miedo y el abandono de recursos racionales, no una tesis doctrinal separada. «La razón» es la forma más clara y fiel para el lector hispanohablante, sin borrar el matiz filosófico del griego.
  doctrine_reference: 'Translation philosophy: preserve source meaning with minimal interpretive expansion.'
translation_notes:
  revision_awareness: 'El griego leído en la capa de traducción coincide sustancialmente con el audit trail inglés: φόβος / οὐθὲν ... εἰ μὴ / προδοσία / βοηθημάτων / τῶν ἀπὸ λογισμοῦ. La versión española sigue la misma lectura y conserva la alternativa lexical del pie de nota para λογισμοῦ/βοηθημάτων.'
  spanish_consistency_notes:
  - Se usa «miedo» para φόβος por naturalidad contemporánea; «temor» queda como alternativa viable pero más marcada.
  - «Razón» mantiene el sentido de λογισμός sin convertirlo en una categoría doctrinal.
  - La estructura exclusiva «no es otra cosa que» reproduce οὐθὲν ... εἰ μὴ sin sonar forzada.
  - «Ayudas» conserva el plural concreto de βοηθημάτων; «auxilios» sería posible, pero más solemne.
