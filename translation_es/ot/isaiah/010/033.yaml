base_translation:
  language: en
  yaml_path: translation/ot/isaiah/010/033.yaml
  text: Behold[a], the Lord, Yahweh of Armies, is lopping off the boughs with terrifying power; the tall in stature are cut down[b], and the lofty are brought low.
  footnotes:
  - marker: a
    text: Or 'with a crash,' 'with violence,' or 'in terror'; the Hebrew term conveys fearsome, violent force.
    reason: lexical_alternative
  - marker: b
    text: The imagery is of cutting down branches and tall trees, symbolizing the downfall of the exalted.
    reason: cultural_note
