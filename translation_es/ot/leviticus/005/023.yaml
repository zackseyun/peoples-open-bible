revisions:
- from: Y sucederá[a] que, cuando peque y se haga culpable, restituirá lo que tomó por robo, o lo que extorsionó[b], o el depósito que le fue confiado, o la cosa perdida que halló[c].
  to: Y será[a] que, cuando peque y se haga culpable, restituirá lo que tomó por robo, o lo que obtuvo por opresión[b], o el depósito que le fue confiado, o la cosa perdida que halló[c].
  rationale: Se ajustó la apertura a «Y será» para una fórmula legal más natural y cercana al hebreo, y se reemplazó «lo que extorsionó» por «lo que obtuvo por opresión», que representa mejor הָעֹשֶׁק אֲשֶׁר עָשָׁק en español claro y jurídicamente apto, preservando «extorsionó» como alternativa de nota.
  reviewer_model: gpt-5.4
