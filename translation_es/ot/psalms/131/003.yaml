translation:
  language: es
  text: Israel[a], espera en Yahvé, desde ahora y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que Israel espere en Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: יַחֵל
  english_pob_choice: hope
  chosen_spanish: espera
  alternatives_spanish:
  - espera con esperanza
  - pon tu esperanza
  - aguarda
  lexicon: HALOT
  rationale: El hebreo expresa una exhortación de confianza expectante. En español, «espera» conserva el valor de aguardar con fe, sin volverlo demasiado técnico ni mecánico. «Pon tu esperanza» es posible, pero resulta más largo; «aguarda» suena más temporal que relacional.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio
  rationale: Se conserva el nombre propio del pueblo del pacto, como en el texto fuente.
- source_word: אֶל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Con יחל, la construcción idiomática comunica confianza dirigida a alguien. En español, «espera en Yahvé» reproduce naturalmente esa relación de dependencia y confianza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: nombre divino
  rationale: Se mantiene la transliteración del Nombre divino, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: מֵעַתָּה
  english_pob_choice: from now
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento
  lexicon: HALOT
  rationale: La frase temporal indica el punto de inicio de la exhortación; «desde ahora» es natural y fiel.
- source_word: וְעַד עוֹלָם
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y por siempre
  - y eternamente
  lexicon: HALOT
  rationale: El idioma expresa duración sin límite; «para siempre» es la forma española más clara y común para ese alcance.
theological_decisions:
- issue: Forma exhortativa del verbo inicial
  english_pob_reading: 'Direct address: ''Israel, hope in Yahweh'''
  chosen_spanish_reading: 'Vocativo exhortativo: «Israel, espera en Yahvé»'
  alternative_spanish_readings:
  - «Que Israel espere en Yahvé»
  - «Israel, pon tu esperanza en Yahvé»
  rationale: El hebreo admite un matiz exhortativo dirigido al pueblo. En español, «Israel, espera en Yahvé» mantiene la fuerza de llamada comunitaria y evita añadir una perífrasis innecesaria. No cambia ninguna afirmación doctrinal; solo la forma retórica.
  doctrine_reference: Equivalencia óptima; preservación del imperativo/exhortación implícitos del hebreo.
translation_notes:
  revision_awareness: El contexto inglés está en alta concordancia y sin revisiones sustantivas; el español sigue esa lectura estable, conservando la exhortación directa y el nombre divino Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se eligió «espera» para reflejar la exhortación de confianza de יחל sin forzar un calco excesivamente literal.
  - «Para siempre» comunica adecuadamente el valor durativo de עוֹלָם en español contemporáneo.
  - La nota al pie recoge la alternativa exhortativa con «que... espere», correspondiente a la ambigüedad ya documentada en el audit trail inglés.
