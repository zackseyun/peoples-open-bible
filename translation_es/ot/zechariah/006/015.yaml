    reason: alternative_reading
  revision_rationale: 'Se reubicaron las notas para que coincidan con la evidencia y la auditoría inglesa: la alternativa léxica va con «Yahvé de los Ejércitos», y la nota interpretativa con «los que están lejos». Además, se ajustó «obedecen atentamente» a «obedecen diligentemente» para reflejar mejor la intensificación hebrea en un español más natural.'
