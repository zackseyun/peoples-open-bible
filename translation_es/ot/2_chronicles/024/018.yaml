base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/018.yaml
  text: And they abandoned the house of Yahweh[a], the God of their fathers, and served the Asherim and the idols. So wrath came upon Judah and Jerusalem because of this guilt of theirs.
  footnotes:
