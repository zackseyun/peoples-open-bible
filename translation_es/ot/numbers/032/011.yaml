translation:
  language: es
  text: Ciertamente ninguno de los hombres[a] que subieron de Egipto, de veinte años para arriba, verá la tierra que juré a Abraham, a Isaac y a Jacob, porque no me siguieron plenamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo usa una fórmula de juramento con «si»: «si los hombres ... verán la tierra», con una negación enfática implícita; por eso se traduce con una afirmación negativa fuerte.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no me siguieron por completo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Surely none ... shall
  chosen_spanish: Ciertamente ninguno ... verá
  alternatives_spanish:
  - si
  - seguramente ninguno ... verá
  lexicon: HALOT
  rationale: En un contexto de juramento, אִם funciona como fórmula elíptica de negación enfática. En español, «Ciertamente ninguno ... verá» conserva esa fuerza sin introducir un «si» engañoso.
- source_word: יִרְאוּ
  english_pob_choice: shall see
  chosen_spanish: verá
  alternatives_spanish:
  - verán
  - llegará a ver
  lexicon: HALOT
  rationale: Aquí «ver» implica experimentar o entrar en la posesión de la tierra. El singular estilístico «verá» concuerda con «ninguno» y mantiene el tono solemne del juramento.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - los varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural y el contexto es censal y militar. «Los hombres» conserva la precisión de género mejor que un genérico más amplio.
- source_word: הָעֹלִים מִמִּצְרַיִם
  english_pob_choice: who came up from Egypt
  chosen_spanish: que subieron de Egipto
  alternatives_spanish:
  - que salieron de Egipto
  - que vinieron de Egipto
  lexicon: HALOT
  rationale: עלה con מִן en contextos del éxodo suele expresar «subir/salir de». «Subieron de Egipto» preserva el giro hebreo y su matiz tradicional de ascenso desde Egipto.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años de edad para arriba
  alternatives_spanish:
  - desde los veinte años en adelante
  - mayores de veinte años
  lexicon: HALOT
  rationale: Es una fórmula fija de umbral de edad. «De veinte años de edad para arriba» es natural en español y refleja con fidelidad la estructura hebrea.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aunque literalmente puede significar «suelo/tierra», en este contexto pactal se refiere a la tierra prometida como territorio. «La tierra» es la equivalencia contextual más adecuada en español.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - hice juramento
  - solemnemente juré
  lexicon: HALOT
  rationale: La forma verbal expresa el juramento divino. «Juré» es breve, claro y suficientemente solemne sin sobrecargar el verso.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  - para Abraham, para Isaac y para Jacob
  lexicon: HALOT
  rationale: Repetir «a» sigue de cerca las preposiciones hebreas y mantiene el cadencioso tono del pacto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del juicio jurado. «Porque» expresa claramente el valor causal en español contemporáneo.
- source_word: לֹא מִלְאוּ אַחֲרַי
  english_pob_choice: they have not fully followed me
  chosen_spanish: no me siguieron plenamente
  alternatives_spanish:
  - no siguieron completamente detrás de mí
  - no me han seguido del todo
  lexicon: HALOT
  rationale: El modismo מלא אחרי significa seguir de manera completa o íntegra. «No me siguieron plenamente» conserva la fuerza del idioma sin expandirlo a una paráfrasis doctrinal.
theological_decisions:
- issue: Fórmula de juramento introducida por אִם
  english_pob_reading: Surely none of the men ... shall see the land
  chosen_spanish_reading: Ciertamente ninguno de los hombres ... verá la tierra
  alternative_spanish_readings:
  - Si los hombres ... verán la tierra
  - Ninguno de los hombres ... verá la tierra
  rationale: El hebreo usa una fórmula de juramento con negación elíptica. En español, «Ciertamente ninguno ... verá» comunica la sentencia con la misma fuerza solemne y evita el falso condicionante de un «si» literal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de לֹא מִלְאוּ אַחֲרַי
  english_pob_reading: they have not fully followed me
  chosen_spanish_reading: no me siguieron plenamente
  alternative_spanish_readings:
  - no fueron totalmente fieles a mí
  - no me siguieron completamente
  rationale: La frase describe seguimiento completo tras Yahvé, no una categoría doctrinal abstracta. «No me siguieron plenamente» conserva el lenguaje relacional y de pacto del hebreo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; este borrador sigue de cerca la lectura inglesa auditada y el hebreo, sin introducir revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término de referencia divina solo cuando el hebreo lo exige explícitamente; en este versículo no aparece el Tetragrámaton.
  - «Tierra» traduce aquí אֲדָמָה por el contexto pactal de la herencia prometida, no como «suelo».
  - Se conserva la cadencia formal con repeticiones de «a» en la lista de patriarcas para reflejar el hebreo.
  - La nota sobre el seguimiento pleno evita suavizar el modismo hebreo con una expresión demasiado general.
