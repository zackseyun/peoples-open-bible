    rationale: La forma pierde demasiado de la estructura del topónimo hebreo y de la referencia auditada 'Mareshah'. Una forma como 'Maresá' conserva mejor la vocalización final y la identificación del nombre sin recurrir al anglicismo 'Mareshah'.
