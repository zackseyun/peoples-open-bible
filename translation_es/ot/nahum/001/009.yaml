translation:
  language: es
  text: ¿Qué maquinan[a] contra Yahvé? Él pondrá fin por completo; la aflicción[b] no se levantará una segunda vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué planean contra Yahvé?» El verbo hebreo puede significar «pensar», «idear» o «maquinar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «La aflicción no surgirá dos veces», o «La angustia no vendrá una segunda vez». El hebreo es conciso y puede referirse al ataque del enemigo o a que no será necesario repetir el juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Por qué?
  lexicon: HALOT
  rationale: La forma interrogativa introduce una pregunta retórica. En español, «¿Qué» conserva de manera directa la estructura y la fuerza de la pregunta del hebreo.
- source_word: תְּחַשְּׁבוּן
  english_pob_choice: are you plotting
  chosen_spanish: planean
  alternatives_spanish:
  - maquinan
  - conspiran
  - piensan
  lexicon: HALOT
  rationale: El verbo hebreo puede significar pensar, idear o planear. En este contexto de oposición hostil contra Yahvé, un verbo como «planean» comunica la intención adversarial sin volverlo más fuerte de lo que el texto exige. Se evita un calco rígido y también una especificación demasiado cerrada como «conspiran».
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: Aunque el valor básico es direccional, aquí el contexto de maquinación hostil justifica «contra» como equivalente natural en español para expresar oposición.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma de uso editorial del proyecto, «Yahvé», en lugar de sustituirlo por un título. Esto mantiene la distinción entre el nombre propio y un apelativo.
- source_word: כָּלָה
  english_pob_choice: a complete end
  chosen_spanish: un fin completo
  alternatives_spanish:
  - un fin total
  - una destrucción completa
  - el fin
  lexicon: HALOT
  rationale: El sustantivo combina la idea de término y consumación/juicio. «Un fin completo» procura retener esa carga de conclusión decisiva sin reducirla solo a «destrucción» ni borrar la noción de finalidad plena.
- source_word: הוּא עֹשֶׂה
  english_pob_choice: He will make
  chosen_spanish: Él hará
  alternatives_spanish:
  - Él hace
  - Él realizará
  lexicon: HALOT
  rationale: En un discurso profético, el participio puede expresar certeza futura. «Él hará» transmite la acción segura de Yahvé con naturalidad en español.
- source_word: לֹא תָקוּם
  english_pob_choice: will not rise up
  chosen_spanish: no se levantará
  alternatives_spanish:
  - no surgirá
  - no se alzará
  lexicon: HALOT
  rationale: «Levantarse» reproduce bien la imagen verbal de קום y sugiere el surgimiento de una realidad que intenta ponerse en pie. Se opta por una forma natural en español manteniendo la metáfora.
- source_word: פַּעֲמַיִם
  english_pob_choice: a second time
  chosen_spanish: dos veces
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: HALOT
  rationale: El hebreo indica repetición. «Dos veces» es una traducción directa y clara; en español también es idiomática en esta estructura.
- source_word: צָרָה
  english_pob_choice: trouble
  chosen_spanish: la calamidad
  alternatives_spanish:
  - la angustia
  - el mal
  - la aflicción
  - el desastre
  lexicon: HALOT
  rationale: El término puede abarcar aflicción, angustia, calamidad o desastre. Dado el contexto de juicio final y la brevedad del cola, «la calamidad» conserva la amplitud del daño sin especificarlo excesivamente. Se añade nota para mantener abierta la posible referencia alternativa.
theological_decisions:
- issue: Alcance del final de la línea final
  english_pob_reading: 'The verse declares the decisiveness of the LORD''s judgment: once he makes a complete end, trouble will not need to arise again.'
  chosen_spanish_reading: El versículo declara la निर्णidez?
  alternative_spanish_readings:
  - 'El versículo declara la decisión definitiva del juicio de Yahvé: una vez que hace un fin completo, la calamidad no necesita levantarse otra vez.'
  - El enemigo no volverá a levantarse con esta calamidad.
  rationale: El hebreo es breve y deja abierta la relación exacta entre la calamidad, el juicio y sus posibles sujetos implícitos. La traducción conserva esa concisión y la nota permite leer tanto la referencia a un juicio definitivo como la posibilidad de otra articulación contextual, sin imponer una resolución doctrinal cerrada.
  doctrine_reference: Preservar la tensión teológica y la ambigüedad legítima del texto.
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del control de revisión: no se requirieron cambios sustantivos respecto del borrador inglés auditado. Se mantuvo la ambigüedad del final, con una nota española para la alternativa léxica de צָרָה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el registro sobrio y bíblico sin recurrir a calcos del inglés.
  - Se preserva la tensión entre juicio final, calamidad y posible repetición mediante una nota, sin sobreespecificar el referente final.
