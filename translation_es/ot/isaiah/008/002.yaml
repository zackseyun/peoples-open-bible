translation:
  language: es
  text: 'Y tomaré para mí mismo testigos fieles[a][b]: Urías el sacerdote y Zacarías hijo de Jeberequías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confiables». El adjetivo hebreo expresa tanto fidelidad como fiabilidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «llamaré» o «nombraré» testigos. El verbo hebreo también puede entenderse como una designación formal para dar testimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָעִ֣ידָה
  english_pob_choice: And I will take ... witnesses
  chosen_spanish: Y atestiguaré
  alternatives_spanish:
  - Y tomaré como testigos
  - Y llamaré testigos
  - Y pondré testigos
  lexicon: HALOT
  rationale: 'El hifil de עוד aquí tiene fuerza legal y declarativa: convocar o establecer testigos para una atestación formal. ''Atestiguaré'' conserva ese valor jurídico y la iniciativa personal del hablante sin volverlo una paráfrasis demasiado libre.'
- source_word: לִּי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - para mi propio beneficio
  lexicon: HALOT
  rationale: La preposición con sufijo de 1cs expresa interés o implicación personal. 'Para mí' transmite de forma natural ese matiz en español y mantiene la referencia al acto del profeta.
- source_word: עֵדִים
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - atestigos
  - testimonios
  lexicon: HALOT
  rationale: Es el término legal normal para personas que dan testimonio. 'Testigos' es la equivalencia directa y más natural en español.
- source_word: נֶאֱמָנִים
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - fiables
  - confiables
  - dignos de confianza
  lexicon: HALOT
  rationale: El adjetivo incluye fidelidad y confiabilidad. 'Fieles' sigue de cerca la opción inglesa y mantiene bien la resonancia relacional y legal aplicada a testigos.
- source_word: אוּרִיָּה
  english_pob_choice: Uriah
  chosen_spanish: Urías
  alternatives_spanish:
  - Uría
  lexicon: Hebrew proper name
  rationale: Se usa la transliteración española usual del nombre propio.
- source_word: הַ/כֹּהֵ֔ן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote consagrado
  - el ministro
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente directo y comprensible del título definido en español.'
- source_word: זְכַרְיָ֖הוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zeharías
  lexicon: Hebrew proper name
  rationale: Nombre propio vertido con la forma española habitual.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Construcción patronímica estándar y natural en español.
- source_word: יְבֶרֶכְיָהוּ
  english_pob_choice: Jeberekiah
  chosen_spanish: Jeberequías
  alternatives_spanish:
  - Jeberekías
  - Yeberequías
  lexicon: Hebrew proper name
  rationale: Transliteración española consistente del nombre propio hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota en el texto principal. La redacción sigue de cerca el valor legal del hebreo y la auditoría inglesa, pero en español se prefirió una formulación más natural ('atestiguaré para mí testigos fieles') en vez de traducir mecánicamente 'tomaré'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - 'Se usaron nombres propios en formas españolas habituales: Urías, Zacarías y Jeberequías.'
  - '''Fieles'' conserva la tensión entre fidelidad y confiabilidad sin borrar la alternativa lexical, ahora explicada en nota.'
