translation:
  language: es
  text: 'Entonces Ocozías hijo de Ahab dijo a Josafat[b]: «Que vayan mis siervos con tus siervos en las naves[a]»; pero Josafat no quiso[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también, «sobre las naves». La preposición hebrea puede entenderse de cualquiera de las dos maneras en contextos marítimos.
    reason: lexical_alternative
  - marker: b
    text: O también, «pero Josafat no estuvo dispuesto» o «pero Josafat rehusó». El hebreo dice más literalmente que él «no quiso» o «no estuvo dispuesto».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: HALOT
  rationale: Marca secuencia narrativa temporal; «Entonces» suena natural en español y conserva el avance del relato.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: En este marco introductorio de discurso directo, «habló a» comunica el acto de dirigirse a alguien con fluidez en español, sin perder el valor de emisión verbal.
- source_word: אֲחַזְיָהוּ בֶן אַחְאָב
  english_pob_choice: Ahaziah son of Ahab
  chosen_spanish: Ocozías hijo de Ahab
  alternatives_spanish:
  - Ocozías, hijo de Ahab
  - Ocozías hijo de Acab
  lexicon: Nombre propio / convención bíblica
  rationale: Se mantiene el nombre bíblico español tradicional «Ocozías»; «hijo de» reproduce la relación filial. Se conservó «Ahab» por coherencia con el nombre propio heredado en esta tradición de trabajo, sin introducir una normalización no documentada aquí.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección o destinatario se expresa naturalmente con «a» en español.
- source_word: יֵלְכ֧וּ
  english_pob_choice: Let ... go
  chosen_spanish: Que vayan
  alternatives_spanish:
  - Dejen que vayan
  - Que salgan
  lexicon: HALOT
  rationale: El imperfecto con valor volitivo/propositivo se vierte con una construcción exhortativa natural en español; «Que vayan» preserva la fuerza de propuesta sin sobreexplicarla.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis servidores
  - mis esclavos
  lexicon: HALOT
  rationale: Aquí el contexto de servicio personal y acompañamiento real favorece «siervos». «Esclavos» sería demasiado fuerte para este pasaje y no está exigido por el contexto inmediato.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - con
  lexicon: HALOT
  rationale: Preposición comitativa estándar en español.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «mis siervos» y la misma gama semántica de עֶבֶד, sin introducir una diferencia innecesaria entre ambos grupos.
- source_word: בָּאֳנִיּוֹת
  english_pob_choice: in the ships
  chosen_spanish: en las naves
  alternatives_spanish:
  - en los barcos
  - en las naves
  - sobre las naves
  lexicon: HALOT
  rationale: «Naves» es un término digno y bíblicamente apropiado para el contexto marítimo; «en» conserva el valor locativo del hebreo y evita forzar una lectura distinta como «sobre».
- source_word: וְלֹא אָבָה
  english_pob_choice: but ... was not willing
  chosen_spanish: pero Josafat no quiso
  alternatives_spanish:
  - pero Josafat no estaba dispuesto
  - pero Josafat no accedió
  - pero Josafat no quiso
  lexicon: HALOT
  rationale: El verbo אָבָה expresa voluntad/consentimiento; «no quiso» es una forma natural y breve que mantiene la negativa de disposición sin añadir dureza interpretativa.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Josafat
  - Jehosafat
  lexicon: Nombre propio / convención bíblica
  rationale: Se usa la forma española establecida del nombre bíblico, más reconocible para lectores hispanos.
theological_decisions:
- issue: Consistencia de nombres divinos y reales; no aplica una fórmula teológica específica en este versículo.
  english_pob_reading: No theological footnote in the English audit trail; the verse is a narrative statement about royal speech and refusal.
  chosen_spanish_reading: No se introduce interpretación doctrinal adicional; se conserva el tono narrativo y la relación entre los dos reyes.
  alternative_spanish_readings:
  - Añadir una nota teológica sobre obediencia o alianza
  - Parafrasear la negativa de Josafat como rechazo diplomático explícito
  rationale: El texto no exige elaboración doctrinal. Mantener la narración directa evita cargar el versículo con inferencias que no están en el hebreo ni en el auditor inglés.
  doctrine_reference: Principio de suficiencia textual; no se añade doctrina no explicitada por el pasaje.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el inglés auditado: la única nota inglesa relevante es la alternativa para בָּאֳנִיּוֹת (''in/on the ships'') y para אָבָה (''was not willing/refused''). En español se resolvió sin nota, usando ''en las naves'' y ''no quiso'' como opciones naturales que conservan ambos matices dentro del flujo narrativo.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo «mis siervos / tus siervos» para reflejar la simetría del hebreo.
  - Se prefirió el nombre bíblico español «Josafat»; en cambio, se conservó «Ahab» en la entrada de decisiones para documentar la correspondencia con el nombre fuente del audit trail.
  - No se usó «SEÑOR» ni ninguna terminología cultual ajena al contenido del versículo.
  - La opción «naves» conserva un registro bíblico y marítimo adecuado; no altera el sentido locativo del hebreo.
