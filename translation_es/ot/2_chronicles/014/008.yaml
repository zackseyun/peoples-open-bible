    reason: lexical_alternative
  - marker: b
    text: «Mil miles» refleja literalmente la construcción hebrea אֶלֶף אֲלָפִים; también puede entenderse como «un millón».
    reason: lexical_alternative
  revision_rationale: Se añade la nota sobre «cusita» para conservar la decisión lexical documentada en el English POB, y se ajusta «mil millares» a «mil miles» por mayor transparencia en español, manteniendo la literalidad con nota explicativa.
