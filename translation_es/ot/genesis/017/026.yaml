lexical_decisions:
- source_word: בְּעֶצֶם
  english_pob_choice: on that very
  chosen_spanish: en ese mismo
  alternatives_spanish:
  - en ese mismo día
  - ese mismo
  lexicon: HALOT
  rationale: El hebreo intensifica la referencia temporal con una expresión enfática. «En ese mismo» conserva la fuerza de inmediatez y especificidad sin volver la frase rígida en español.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «día» y la deixis enfática queda absorbida por «ese mismo», que reproduce mejor el valor del conjunto hebreo en español natural.
- source_word: נִמּוֹל
  english_pob_choice: were circumcised
  chosen_spanish: fueron circuncidados
  alternatives_spanish:
  - fue circuncidado
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular pasivo, el sujeto coordinado («Abraham e Ismael») exige plural en español. Se conserva el pasivo con «fueron circuncidados».
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: nombre propio
  rationale: Se conserva la forma tradicional y transparente del nombre propio en español.
- source_word: וְיִשְׁמָעֵאל
  english_pob_choice: and Ishmael
  chosen_spanish: e Ismael
  alternatives_spanish:
  - y Ismael
  lexicon: conjunción e + nombre propio
  rationale: La conjunción se adapta a la eufonía del español ante palabra iniciada por /i/. El nombre se da en forma usual en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina se traduce de forma natural como «su hijo», conservando la relación filial con Abraham.
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas ni variantes textuales; la versión española sigue el mismo valor temporal enfático y la misma lectura de pasivo con sujeto compuesto, ajustada a la sintaxis española.
  spanish_consistency_notes:
  - Se mantiene «Ismael» como forma española del nombre propio.
  - Se preserva «circuncidados» en pasivo plural para reflejar el verbo hebreo sin sacrificar la gramática española.
  - La deixis temporal se expresa con una fórmula idiomática y enfática, evitando un calco duro de la construcción hebrea.
