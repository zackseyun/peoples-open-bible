translation:
  language: es
  text: Entonces el sacerdote tomará la canasta de tu mano y la pondrá delante del altar de Yahvé tu Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - Y ... toma
  lexicon: HALOT
  rationale: En un contexto ritual secuencial, el waw conversivo introduce una acción siguiente; «Entonces» conserva bien esa progresión en español y «tomará» expresa el valor modal/futuro adecuado para la instrucción.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: El sustantivo definido designa al funcionario cultual. En español, «sacerdote» es natural y fiel; «oficiante» sería más explicativo de lo que el hebreo dice.
- source_word: הַטֶּנֶא
  english_pob_choice: the basket
  chosen_spanish: la canasta
  alternatives_spanish:
  - el canasto
  - la canasta
  - el cesto
  lexicon: HALOT
  rationale: טֶּנֶא refiere al recipiente para las primicias. «Canasta» comunica el objeto concreto con claridad en español actual; «cesto» o «canasto» también serían posibles, pero menos neutrales aquí.
- source_word: מִיָּדֶךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu mano
  - desde tu mano
  lexicon: HALOT
  rationale: La expresión conserva la imagen física de transferencia desde la posesión del oferente al sacerdote. «De tu mano» suena natural y mantiene la concreción del hebreo.
- source_word: וְהִנִּיחוֹ
  english_pob_choice: and set it
  chosen_spanish: y la pondrá
  alternatives_spanish:
  - y la colocará
  - y la pondrá
  - y la depositará
  lexicon: HALOT
  rationale: El hifil de נוח aquí significa poner/colocar. «Pondrá» es una equivalencia natural en español y evita añadir la idea de «bajar» o «poner abajo» que no está explícita en el hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - delante de
  - ante
  - frente a
  lexicon: HALOT
  rationale: En un contexto cultual, la preposición espacial funciona bien como «delante de». Es clara y mantiene el sentido de ubicación ante el altar.
- source_word: מִזְבַּח
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar
  lexicon: HALOT
  rationale: Correspondencia estándar para el lugar de sacrificio; no requiere variación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el default español del proyecto para el Nombre divino. «Yahvé» preserva la distinción del Tetragrámaton frente a una sustitución por título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: Se mantiene el posesivo de segunda persona singular para reflejar el trato de pacto directo y personal.
theological_decisions:
- issue: Representación del Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente יהוה. El proyecto pide «Yahvé» como forma principal en español, para conservar el Nombre propio de Dios sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción refleja la revisión auditada del inglés: se evita añadir cualquier matiz equivalente a ‘down’ en la acción de poner la canasta; la formulación española se limita a «la pondrá», que corresponde al hebreo sin expansión interpretativa.'
  spanish_consistency_notes:
  - «Yahvé» se usa para el Nombre divino de manera consistente con el estándar del proyecto.
  - «Canasta» se mantiene como equivalente simple de טֶּנֶא en un contexto agrícola-ritual.
  - Se conserva el orden narrativo-ritual con «Entonces» para reflejar la secuencia del hebreo.
  - «Pondrá» evita agregar una direccionalidad o descenso no expresado en el texto fuente.
