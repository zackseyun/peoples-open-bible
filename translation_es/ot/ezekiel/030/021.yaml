translation:
  language: es
  text: Hijo de hombre[a], he quebrado el brazo de Faraón, rey de Egipto; y he aquí, no ha sido vendado para aplicarle remedios[b], para ponerle un vendaje, para vendarlo, para fortalecerlo, para que pueda asir la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Vocativo profético tradicional de Ezequiel; se conserva la forma idiomática sin reinterpretarla.
    reason: source_note
  - marker: b
    text: El hebreo usa el plural רְפֻאוֹת ("remedios"), por eso se traduce con un plural concreto y no con un abstracto como "sanidad".
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Hombre mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conserva el vocativo profético fijo de Ezequiel y su forma idiomática tradicional sin sustituirlo por una paráfrasis interpretativa.
- source_word: זְרֹעַ
  english_pob_choice: arm
  chosen_spanish: brazo
  alternatives_spanish:
  - brazo
  - antebrazo
  - fuerza
  lexicon: HALOT
  rationale: En español, 'brazo' es el equivalente natural para la imagen corporal y militar; mantiene el valor metafórico de poder/capacidad sin explicitarlo en el texto principal.
- source_word: שָׁבַרְתִּי
  english_pob_choice: I have broken
  chosen_spanish: he quebrado
  alternatives_spanish:
  - he roto
  - rompí
  lexicon: HALOT
  rationale: '''He quebrado'' reproduce bien la acción causada y el efecto vigente en el contexto; ''quebrar'' encaja con un miembro fracturado y suena dignamente bíblico en español actual.'
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y mira, he aquí
  lexicon: HALOT
  rationale: '''Y he aquí'' conserva la fuerza discursiva profética del marcador y su tono solemne.'
- source_word: חֻבְּשָׁה
  english_pob_choice: it has not been bound up
  chosen_spanish: no ha sido vendado
  alternatives_spanish:
  - no ha sido atado
  - no ha sido cubierto con vendaje
  lexicon: HALOT
  rationale: '''Vendado'' comunica la imagen médica con claridad y distingue esta acción del sustantivo posterior para ''vendaje''.'
- source_word: לָתֵת רְפֻאוֹת
  english_pob_choice: to apply remedies
  chosen_spanish: para ponerle remedios
  alternatives_spanish:
  - para aplicarle remedios
  - para darle remedios
  - para aplicarle curas
  lexicon: HALOT
  rationale: El hebreo usa un plural concreto; 'remedios' refleja mejor esa forma que 'sanidad'. Se usa 'ponerle' para mantener el valor práctico de aplicar tratamiento, como en el audit trail inglés.
- source_word: חִתּוּל
  english_pob_choice: a bandage
  chosen_spanish: un vendaje
  alternatives_spanish:
  - una venda
  - un apósito
  - un vendado
  lexicon: HALOT
  rationale: '''Vendaje'' es el equivalente más transparente y mantiene la serie médica junto con ''vendarlo''.'
- source_word: לְחָבְשָׁהּ
  english_pob_choice: to bind it
  chosen_spanish: para vendarlo
  alternatives_spanish:
  - para ligarlo
  - para atarlo con venda
  lexicon: HALOT
  rationale: '''Vendarlo'' mantiene la relación verbal con el sustantivo ''vendaje'' y reproduce la imagen de tratar la fractura.'
- source_word: לְחָזְקָהּ
  english_pob_choice: to strengthen it
  chosen_spanish: para fortalecerlo
  alternatives_spanish:
  - para hacerlo fuerte
  - para darle fuerza
  lexicon: HALOT
  rationale: '''Fortalecerlo'' es el equivalente natural y conserva la intención terapéutica de recuperar la capacidad del brazo.'
- source_word: לִתְפֹּשׂ בֶּחָרֶב
  english_pob_choice: so that it may grasp the sword
  chosen_spanish: para que pueda asir la espada
  alternatives_spanish:
  - para que pueda tomar la espada
  - para empuñar la espada
  lexicon: HALOT
  rationale: '''Asir'' mantiene el matiz literal de agarrar/aferrar y conserva la imagen de capacidad militar restaurada.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se incorporó la revisión inglesa que cambió ''healing'' por ''remedies'', reflejándola en español con ''remedios'' y conservando la secuencia médica: vendado, remedios, vendaje, vendar, fortalecer, asir la espada.'
  spanish_consistency_notes:
  - Se mantuvo 'Hijo de hombre' como vocativo fijo de Ezequiel para coherencia intrabíblica.
  - Se prefirió 'brazo' para זְרֹעַ, en línea con el valor corporal/metafórico del pasaje.
  - Se evitó 'SEÑOR' porque aquí no aparece el tetragrámaton ni una cita directa del nombre divino.
  - Se conservaron verbos médicos distintos ('vendado', 'vendar', 'vendaje') para no borrar la progresión del hebreo.
  - '''Remedios'' refleja el plural hebreo y la revisión inglesa más reciente.'
