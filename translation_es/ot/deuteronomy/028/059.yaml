  source_alignment_summary: 'El borrador capta bien la estructura del hebreo: Yahvé como sujeto, las plagas del destinatario y de su descendencia, y la doble calificación de plagas y enfermedades como grandes/graves y duraderas. Sin embargo, el punto principal de desalineación es מַכּוֹת, que en este contexto de maldiciones pactuales se entiende mejor como ''plagas'' que como ''golpes''; ''golpes'' suena demasiado físico y reduce el campo semántico que el inglés POB documentó deliberadamente. También conviene reflejar mejor el valor intensificador de וְהִפְלָא con una sintaxis española más natural: ''hará extraordinarias tus plagas'' o ''volverá extraordinarias''.'
  spanish_quality_summary: El español es claro y digno, pero 'hará extraordinarios tus golpes' suena algo rígido y menos natural que 'hará extraordinarias tus plagas'. Además, la repetición de 'golpes' con dos notas ancladas funciona, pero el término escogido no es el más legible ni el más adecuado al registro bíblico contemporáneo. El resto —'descendencia', 'enfermedades graves y duraderas'— está bien logrado.
  glossary_alignment: 'Alinea correctamente ''Yahvé'' para יְהוָה. No hay términos doctrinales problemáticos adicionales. La principal desviación terminológica es מַכּוֹת: el POB inglés eligió ''plagues'' con una justificación contextual fuerte, y el español debería seguir ''plagas'' salvo razón contextual convincente, que aquí no se da.'
  issues:
  - severity: medium
    issue: מַכֹּת / מַכּוֹת se tradujo como 'golpes' en vez de 'plagas'.
    rationale: En Deuteronomio 28, dentro de la lista de maldiciones del pacto y en paralelo con 'enfermedades', 'plagas' comunica mejor aflicciones divinamente enviadas. 'Golpes' estrecha el sentido hacia impactos físicos y se aparta de la decisión léxica auditada en inglés.
  - severity: low
    issue: La sintaxis 'hará extraordinarios tus golpes' suena algo forzada en español.
    rationale: Aunque comprensible, el orden y la combinación verbal-adjetival son menos naturales. 'hará extraordinarias tus plagas' fluye mejor y preserva el intensificador de פלא.
  revised_spanish_text: 'entonces Yahvé hará extraordinarias tus plagas y las plagas de tu descendencia: plagas grandes y duraderas[a][b], y enfermedades graves y duraderas.'
