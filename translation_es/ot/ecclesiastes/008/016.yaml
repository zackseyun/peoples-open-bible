translation:
  language: es
  text: Cuando puse mi corazón[a] en conocer sabiduría y en observar la actividad[b] que se hace sobre la tierra—porque aun de día y de noche sus ojos no ven sueño[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Puse mi corazón'' conserva la imagen hebrea del corazón como centro de intención y atención; una opción más idiomática sería ''me dediqué por completo''.'
    reason: lexical_alternative
  - marker: b
    text: '''Actividad'' traduce הָעִנְיָן en el sentido de ocupación o quehacer humano; también puede entenderse como ''ocupación'' o, más ampliamente, ''asunto''.'
    reason: lexical_alternative
  - marker: c
    text: 'La frase preserva la imagen hebrea, literalmente: ''sus ojos no ven sueño''. Una formulación más idiomática sería: ''no duerme ni de día ni de noche'' o ''no logra dormir de día ni de noche''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַתִּי אֶת לִבִּי
  english_pob_choice: I applied my heart
  chosen_spanish: puse mi corazón
  alternatives_spanish:
  - apliqué mi corazón
  - puse mi mente
  - me dediqué de corazón
  lexicon: HALOT
  rationale: Conservo la imagen hebrea del corazón como sede de la atención y la intención, sin endurecerla en un giro demasiado literal. 'Puse mi corazón' mantiene la metáfora y su valor de enfoque deliberado.
- source_word: לָדַעַת חָכְמָה
  english_pob_choice: to know wisdom
  chosen_spanish: en conocer sabiduría
  alternatives_spanish:
  - para conocer sabiduría
  - para entender sabiduría
  lexicon: HALOT
  rationale: '''Conocer sabiduría'' sigue de cerca el infinitivo de finalidad y mantiene la correspondencia léxica entre ידע y ''conocer''.'
- source_word: וְלִרְאוֹת
  english_pob_choice: and to observe
  chosen_spanish: y en observar
  alternatives_spanish:
  - y en ver
  - y en considerar
  lexicon: HALOT
  rationale: '''Observar'' comunica examen atento y evita que el verbo suene demasiado visual o casual en español.'
- source_word: הָעִנְיָן
  english_pob_choice: the activity
  chosen_spanish: el asunto
  alternatives_spanish:
  - la actividad
  - el negocio
  - la tarea
  lexicon: HALOT
  rationale: '''עִנְיָן'' en Eclesiastés puede referirse a lo que ocurre o se ocupa bajo el sol. En español, ''asunto'' conserva una amplitud semántica más natural que ''actividad'' sin volverlo comercial como ''negocio''.'
- source_word: אֲשֶׁר נַעֲשָׂה עַל־הָאָרֶץ
  english_pob_choice: that is done on the earth
  chosen_spanish: que se hace sobre la tierra
  alternatives_spanish:
  - que se hace en la tierra
  - que es hecho sobre la tierra
  lexicon: HALOT
  rationale: Uso una pasiva/impersonal natural en español que conserva el alcance universal de la expresión hebrea.
- source_word: שֵׁנָה
  english_pob_choice: sleep
  chosen_spanish: el sueño
  alternatives_spanish:
  - sueño
  - dormir
  lexicon: HALOT
  rationale: Aquí 'sueño' funciona mejor en español para reflejar el sustantivo hebreo y la imagen poética de la frase.
- source_word: בְּעֵינָיו אֵינֶנּוּ רֹאֶה
  english_pob_choice: his eyes do not see sleep
  chosen_spanish: el sueño no lo ve en sus ojos
  alternatives_spanish:
  - sus ojos no ven el sueño
  - no ve sueño con sus ojos
  - no duerme
  lexicon: HALOT
  rationale: 'Mantengo la tensión imagética del hebreo, pero adapto el orden para que el español sea publicable. La expresión conserva la rareza deliberada: las ''ojos'' no ''ven'' el sueño.'
theological_decisions:
- issue: Referente del sufijo de tercera persona masculina en 'his eyes do not see sleep'
  english_pob_reading: Retain the singular masculine wording without specifying a new subject
  chosen_spanish_reading: Conservar la tercera persona en 'en sus ojos' y no resolver el referente
  alternative_spanish_readings:
  - en mis ojos
  - en sus ojos no lo ve
  - no duerme
  rationale: El hebreo preserva una forma masculina singular ambigua. En español, mantener 'sus ojos' conserva la ambigüedad sin forzar una identificación que el texto no explicita. Evito sustituir la imagen por el modismo 'no duerme' para no borrar la tensión poética.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la imagen de 'his eyes do not see sleep' y la nota de alternativa idiomática. La versión española conserva esa tensión, ajustando solo el orden para naturalidad sintáctica. No se requieren correcciones textuales mayores respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para חָכְמָה y no 'prudencia', conforme al paralelismo con el inglés auditado.
  - Se evita 'SEÑOR' o sustituciones teológicas ajenas, porque este versículo no contiene el nombre divino.
  - '''Sobre la tierra'' conserva el alcance amplio de עַל הָאָרֶץ, sin restringirlo a un contexto local.'
  - La cláusula final conserva la ambigüedad de la referencia masculina singular sin suplir un sujeto explícito.
