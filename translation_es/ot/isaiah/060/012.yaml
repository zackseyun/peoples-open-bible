  - marker: b
    text: 'O: «serán destruidas por completo». El hebreo usa un infinitivo absoluto con un verbo finito de la misma raíz para intensificar la expresión.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrige la nota [a] para reflejar con precisión la evidencia hebrea y la explicación de la auditoría inglesa sobre el cambio retórico de singular a plural.
