base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/013.yaml
  text: And the king defiled the high places that were before Jerusalem[a], which were to the right of the Mount of Destruction, which Solomon king of Israel had built for Ashtoreth, the abomination of the Sidonians, and for Chemosh, the abomination of Moab, and for Milcom[c][b], the abomination of the Ammonites.
  footnotes:
  - marker: a
    text: Or 'south of the Mount of Destruction,' since 'to the right' can reflect directional orientation in Hebrew topography.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Mount of Destruction'; possibly the hill later identified with the Mount of Olives.
    reason: cross_reference
  - marker: c
    text: Hebrew reads 'Milcom'; some readers may associate this deity with 'Molech.'
    reason: alternative_reading
