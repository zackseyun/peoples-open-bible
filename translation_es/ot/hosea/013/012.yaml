translation:
  language: es
  text: La iniquidad de Efraín está atada; su pecado está guardado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oculto» o «reservado» para «guardado»; el hebreo puede significar escondido o mantenido en reserva, probablemente con la idea de que el pecado de Efraín queda conservado para un ajuste de cuentas futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרוּר
  english_pob_choice: is bound up
  chosen_spanish: está atada
  alternatives_spanish:
  - está ligada
  - está envuelta
  - está amarrada
  lexicon: HALOT
  rationale: El participio pasivo expresa algo sujeto o atado. «Está atada» conserva la imagen de quedar fijada y retenida, de modo natural en español y en paralelo con «está almacenado».
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: Aquí conviene mantener el peso moral del sustantivo hebreo sin reducirlo a mero daño o castigo. «Iniquidad» preserva el matiz ético y la relación con «pecado» en el segundo hemistiquio.
- source_word: אֶפְרָיִם
  english_pob_choice: Ephraim’s
  chosen_spanish: de Efraín
  alternatives_spanish:
  - de Ephraim
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en forma española usual. La relación posesiva se expresa con «de Efraín», que es la construcción natural en español.
- source_word: צְפוּנָה
  english_pob_choice: is stored up
  chosen_spanish: está almacenado
  alternatives_spanish:
  - está guardado
  - está depositado
  - está reservado
  lexicon: HALOT
  rationale: El participio puede significar escondido, guardado o reservado. En este contexto judicial, «almacenado» comunica que el pecado permanece retenido para futura cuenta, sin borrar la tensión del texto entre ocultamiento y reserva.
- source_word: חַטָּאתוֹ
  english_pob_choice: his sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su ofensa
  - su culpa
  lexicon: HALOT
  rationale: «Pecado» es la equivalencia directa y más clara en español. El sufijo de tercera persona se resuelve naturalmente como «su», refiriéndose a Efraín como singular corporativo.
theological_decisions:
- issue: Imagen de pecado retenido para juicio
  english_pob_reading: The verse depicts Ephraim's guilt as preserved and kept on record for coming judgment, without specifying a doctrine beyond the prophetic image.
  chosen_spanish_reading: El versículo presenta la iniquidad y el pecado de Efraín como retenidos y conservados para un futuro ajuste de cuentas, sin cerrar la imagen profética con una explicación doctrinal adicional.
  alternative_spanish_readings:
  - El versículo podría entenderse solo como pecado escondido, sin énfasis en juicio futuro.
  - El versículo podría suavizarse hacia la idea de pecado perdonado o ya cubierto.
  rationale: La pareja verbal y el contexto profético favorecen la idea de conservación con vistas a juicio. La traducción mantiene la metáfora sin convertirla en una afirmación doctrinal más fuerte de la que el hebreo exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisó «stored away» por «stored up» para acercarse más al hebreo y preservar el paralelismo con «bound up». La redacción española sigue esa dirección con «almacenado», que mantiene la idea de reserva retenida y el paralelo con «está atada».
  spanish_consistency_notes:
  - Se mantuvo «Efraín» como nombre propio transliterado, en línea con la política del proyecto.
  - Se prefirió «iniquidad» para עֲוֺן y «pecado» para חַטָּאתוֹ para conservar el paralelismo semántico.
  - Se evitó «SEÑOR» u otras sustituciones, porque no aparece el nombre divino en este versículo.
  - El tono es sobrio y bíblico, pero con sintaxis natural en español moderno.
