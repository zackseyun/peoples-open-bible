base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/002/003.yaml
  text: I searched in my heart how to draw my flesh with wine[a], while my heart was guiding me with wisdom, and how to lay hold of folly[b], until I might see what was good for the sons of man to do under the heavens during the number of the days of their lives.
  footnotes:
