    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR». Otra alternativa es «Jehová».'
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota al pie para que no presente la lectura adoptada («Yahvé») como si fuera una alternativa, preservando así la coherencia entre texto, glosario y justificación teológica.
