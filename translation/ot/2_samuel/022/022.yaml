theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of רָשַׁעְתִּי מֵאֱלֹהָי
  chosen_reading: have not acted wickedly by turning from my God
  alternative_readings:
  - have not wickedly departed from my God
  - have not been wicked toward my God
  rationale: The Hebrew combines a verb of wickedness with a prepositional phrase 'from my God.' The chosen rendering preserves both moral and relational dimensions without flattening the phrase into a mere abstract statement of innocence.
