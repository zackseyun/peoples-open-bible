translation:
  language: es
  text: Entonces hizo entrar a los sacerdotes y a los levitas, y los reunió en la plaza del este[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la plaza del lado oriental».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: Then he brought in
  chosen_spanish: Entonces hizo entrar
  alternatives_spanish:
  - Entonces trajo
  - Y trajo
  lexicon: HALOT
  rationale: El verbo hebreo en hifil de בוא expresa hacer venir o introducir. En español, 'hacer entrar' comunica mejor la idea de introducirlos en un lugar concreto que un simple 'trajo', y conserva el movimiento narrativo marcado por 'Then'.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: כהנים se refiere de forma estándar a los sacerdotes. 'Sacerdotes' es el equivalente natural y fiel en español; 'presbíteros' sería anacrónico aquí.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los hijos de Leví
  - los levitas del templo
  lexicon: HALOT
  rationale: לוים designa al grupo levítico distintivo de los sacerdotes. 'Levitas' es el término bíblico normal y claro en español.
- source_word: וַיַּאַסְפֵם
  english_pob_choice: assembled them
  chosen_spanish: los reunió
  alternatives_spanish:
  - los juntó
  - los congregó
  lexicon: HALOT
  rationale: אסף con sufijo pronominal significa reunir o juntar. 'Reunió' comunica bien la acción pública y ordenada, sin añadir matices eclesiásticos no presentes en el hebreo.
- source_word: לִרְחוֹב
  english_pob_choice: in the square
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en el espacio abierto
  - en la plaza pública
  - en la explanada
  lexicon: HALOT
  rationale: רחוב denota un lugar amplio y abierto, una plaza o explanada pública, no una 'calle' en sentido moderno. 'Plaza' es la opción más natural y sobria en español.
- source_word: הַמִּזְרָח
  english_pob_choice: the eastern
  chosen_spanish: oriental
  alternatives_spanish:
  - del este
  - del lado oriental
  - oriental
  lexicon: HALOT
  rationale: מזרח indica el oriente o el lado oriental. 'Oriental' en español conserva la relación adjetival con 'plaza' y evita la construcción menos idiomática 'plaza del este'.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la lectura auditada en inglés: ''brought in'' + ''assembled'' + ''eastern square''. Se ajustó la sintaxis al español para que el movimiento narrativo y la localización espacial quedaran naturales sin perder la distinción entre sacerdotes y levitas.'
  spanish_consistency_notes:
  - Se mantiene la terminología bíblica estándar 'sacerdotes' y 'levitas'.
  - '''Plaza oriental'' conserva la idea de un espacio amplio situado al oriente, equivalente a la nota inglesa sobre ''the square on the east side''.'
  - El marcador [a] está anclado en 'plaza oriental' para señalar la alternativa espacial sin duplicar sentidos.
