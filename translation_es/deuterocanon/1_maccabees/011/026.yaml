revisions:
- from: Y el rey hizo por él como habían hecho por él los que antes que él, y lo exaltó sobre todos sus amigos[a].
  to: Y el rey hizo con él como habían hecho con él sus predecesores, y lo exaltó por encima de todos sus amigos[a].
  rationale: Se ajusta el español para reflejar con mayor naturalidad y precisión el sentido del griego sin apartarse del rastro de auditoría del POB. «Hizo con él» conserva la amplitud de ἐποίησεν αὐτῷ mejor que «hizo por él» en español. «Sus predecesores» explicita limpiamente οἱ πρὸ αὐτοῦ, cuyo referente contextual es claro. «Por encima de todos sus amigos» expresa mejor la elevación comparativa de rango, mientras la nota mantiene la alternativa espacial documentada.
