translation:
  language: es
  text: Entonces llegaron ochenta hombres de Siquem, de Silo y de Samaria, con sus barbas rasuradas, sus ropas rasgadas y haciéndose cortes[a], con ofrendas vegetales[b] y olíbano en sus manos para llevar a la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortándose». El hebreo describe la práctica de hacerse incisiones sobre el cuerpo como señal de duelo.
    reason: lexical_alternative
  - marker: b
    text: O «ofrendas de cereal». El hebreo minḥāh suele designar una ofrenda vegetal en contexto cultual.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la casa de Yahvé». Puede aludir al santuario como sitio de culto más que a un edificio del templo intacto.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  lexicon: HALOT 76
  rationale: El hebreo se refiere a varones concretos, y el contexto narrativo y las descripciones rituales/mortuorias confirman ese sentido. 'Hombres' es natural y preciso en español.
- source_word: מִ/שְּׁכֶ֞ם מִ/שִּׁל֤וֹ וּ/מִ/שֹּֽׁמְרוֹן֙
  english_pob_choice: from Shechem, from Shiloh, and from Samaria
  chosen_spanish: de Siquem, de Silo y de Samaria
  alternatives_spanish:
  - desde Siquem, desde Silo y desde Samaria
  lexicon: HALOT 7927; 7887; 8111
  rationale: Son topónimos que conviene transliterar en forma española tradicional. Repetir 'de' conserva la estructura de lista y el matiz locativo del hebreo.
- source_word: שְׁמֹנִ֣ים אִ֔ישׁ
  english_pob_choice: eighty men
  chosen_spanish: ochenta hombres
  alternatives_spanish:
  - ochenta personas
  lexicon: HALOT 8084; 376
  rationale: La expresión idiomática hebrea es literalmente 'ochenta hombre', pero en español se expresa de forma natural como plural cuantificado.
- source_word: מְגֻלְּחֵ֥י זָקָ֛ן
  english_pob_choice: with their beards shaved
  chosen_spanish: con la barba rasurada
  alternatives_spanish:
  - con las barbas rasuradas
  - con la barba afeitada
  lexicon: HALOT 1548; 2206
  rationale: Se mantiene la imagen concreta del estado de duelo. El singular colectivo 'la barba' suena más natural en español, sin perder el sentido plural distributivo.
- source_word: וּ/קְרֻעֵ֥י בְגָדִ֖ים
  english_pob_choice: their clothes torn
  chosen_spanish: los vestidos rasgados
  alternatives_spanish:
  - sus ropas rasgadas
  - sus vestidos rotos
  lexicon: HALOT 7167; 899
  rationale: '''Vestidos rasgados'' conserva el valor de señal externa de duelo y evita una paráfrasis excesiva. ''Vestidos'' puede abarcar ropa/vestiduras en registro bíblico.'
- source_word: וּ/מִתְגֹּֽדְדִ֑ים
  english_pob_choice: gashing themselves
  chosen_spanish: haciéndose cortes
  alternatives_spanish:
  - cortándose
  - lacerándose
  lexicon: HALOT 1413
  rationale: El verbo expresa autolesión ritual/mortuoria. 'Haciéndose cortes' preserva el acto sin exagerar más allá de lo que el hebreo requiere, pero mantiene la fuerza de la práctica.
- source_word: וּ/מִנְחָ֤ה
  english_pob_choice: grain offerings
  chosen_spanish: ofrendas vegetales
  alternatives_spanish:
  - ofrendas de cereal
  - ofrendas de grano
  lexicon: HALOT 4503
  rationale: En contexto cultual, minḥāh suele denotar ofrenda vegetal o de cereal. 'Ofrendas vegetales' comunica bien el término técnico sin importar una terminología eclesiástica tradicional no auditada.
- source_word: וּ/לְבוֹנָה֙
  english_pob_choice: frankincense
  chosen_spanish: olíbano
  alternatives_spanish:
  - incienso
  - franquincenso
  lexicon: HALOT 3828
  rationale: El término específico es el aromático resinoso, no 'incienso' en general. 'Olíbano' es el equivalente español más preciso y reconocible en registro bíblico.
- source_word: בְּ/יָדָ֔/ם
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - con ellos
  - entre sus manos
  lexicon: HALOT 3027
  rationale: Se conserva la concreción corporal del hebreo, que contribuye al cuadro visual de la ofrenda llevada físicamente.
- source_word: לְ/הָבִ֖יא
  english_pob_choice: to bring
  chosen_spanish: para llevar
  alternatives_spanish:
  - para traer
  - para presentar
  lexicon: HALOT 935
  rationale: '''Para llevar'' funciona naturalmente con el movimiento hacia la casa de Yahvé; mantiene el sentido de traslado sin introducir una noción más litúrgica que el hebreo no exige.'
- source_word: בֵּ֥ית יְהוָֽה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del Señor
  - el templo de Yahvé
  lexicon: HALOT 1004; 3068
  rationale: Se sigue el estándar del proyecto para יְהוָה como 'Yahvé'. 'Casa' se mantiene frente a 'templo' porque el hebreo dice literalmente 'casa', y el contexto histórico hace significativa esa literalidad.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El proyecto español usa 'Yahvé' para reflejar directamente el Tetragrama sin ocultarlo mediante una convención de sustitución. Esto mantiene la transparencia y la continuidad con el texto fuente.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó 'grain offering' a 'grain offerings' por mejor reflejo del colectivo hebreo. En español se resolvió con 'ofrendas vegetales', que naturalmente puede abarcar ese valor colectivo sin perder especificidad cultual.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conservó la lista locativa con repetición de 'de' para reflejar el hebreo.
  - '''Hombres'' responde al hebreo masculino específico; no se neutralizó como ''personas''.'
  - La autolesión ritual se expresó con un verbo claro pero sin ampliar innecesariamente la intensidad del original.
  - '''Casa'' se preservó frente a ''templo'' para no borrar la literalidad del hebreo.'
