  text: מִזְמ֥וֹר לְ/תוֹדָ֑ה הָרִ֥יעוּ לַ֝/יהוָ֗ה כָּל הָ/אָֽרֶץ־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/100/000.yaml
  text: A psalm for thanksgiving[a]. Shout joyfully to Yahweh[d][c][b], all the earth.
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh.'' The divine name יְהוָה is rendered ''the LORD'' in keeping with the project''s stated convention.'
    reason: alternative_reading
  - marker: b
    text: Or 'Make a joyful noise to the LORD, all the earth.'
    reason: lexical_alternative
  - marker: c
    text: The heading may also be understood as 'A psalm for a thank offering' or 'A psalm of thanksgiving.'
    reason: lexical_alternative
  - marker: d
    text: Or 'A psalm for thanksgiving.'.
    reason: previous_rendering
  revision_pass:
