translation:
  language: es
  text: Pero la grasa del animal muerto naturalmente[a] y la grasa del animal despedazado por fieras[b] puede usarse para cualquier trabajo; pero ciertamente no la comeréis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo nevelá: se refiere a un animal que murió sin el degüello adecuado; «animal hallado muerto» es una traducción alternativa posible.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «despedazado por animales salvajes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - la grasa del animal
  lexicon: HALOT
  rationale: En español, 'grasa' comunica de manera natural el componente animal prohibido para consumo; 'sebo' es posible pero más técnico y menos transparente para lectores generales.
- source_word: נְבֵלָה
  english_pob_choice: an animal that dies naturally
  chosen_spanish: el animal muerto naturalmente
  alternatives_spanish:
  - el animal hallado muerto
  - el cadáver del animal
  lexicon: HALOT
  rationale: La expresión busca reflejar que el animal murió sin sacrificio adecuado. 'Muerto naturalmente' sigue el sentido auditado de la POB inglesa, aunque en español no implica muerte por causas naturales en sentido médico, sino una muerte no ritualizada.
- source_word: טְרֵפָה
  english_pob_choice: one torn by beasts
  chosen_spanish: el desgarrado por fieras
  alternatives_spanish:
  - el animal desgarrado por fieras
  - uno desgarrado por animales salvajes
  lexicon: HALOT
  rationale: Mantiene el agente implícito de la imagen hebrea y conserva la fuerza legal del término. 'Fieras' es conciso y bíblico en español, sin perder inteligibilidad.
- source_word: יֵעָשֶׂה
  english_pob_choice: may be used
  chosen_spanish: puede usarse
  alternatives_spanish:
  - puede ser usado
  - puede emplearse
  lexicon: HALOT
  rationale: El niphal aquí expresa permiso para un uso no alimentario; 'puede usarse' es natural y conserva la idea de uso permitido, no de fabricación.
- source_word: לְכָל מְלָאכָה
  english_pob_choice: for any work
  chosen_spanish: para cualquier trabajo
  alternatives_spanish:
  - para cualquier obra
  - para cualquier uso
  lexicon: HALOT
  rationale: '''Trabajo'' mantiene la amplitud funcional del hebreo sin sonar excesivamente técnico. ''Uso'' sería más interpretativo; ''obra'' puede sonar más eclesiástico que legal.'
- source_word: וְאָכֹל לֹא תֹאכְלֻהוּ
  english_pob_choice: but you must certainly not eat it
  chosen_spanish: pero ciertamente no la comeréis
  alternatives_spanish:
  - pero no la comeréis en absoluto
  - pero de ningún modo la comeréis
  lexicon: HALOT
  rationale: La construcción intensiva se refleja con 'ciertamente no'. Se usa 'la' para concordar con 'grasa', el referente inmediato y natural en español.
theological_decisions:
- issue: Prohibición absoluta de comer la grasa reservada por la ley
  english_pob_reading: but you must certainly not eat it
  chosen_spanish_reading: pero ciertamente no la comeréis
  alternative_spanish_readings:
  - pero no la comeréis
  - pero de ningún modo la comeréis
  rationale: La intensificación del hebreo debe quedar audible. 'Ciertamente no' preserva la fuerza prohibitiva sin exagerar el tono más allá del texto.
  doctrine_reference: Ley ritual de Levítico; énfasis en distinción entre usos permitidos y consumo prohibido.
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del audit trail inglés, sin revisiones pendientes. La redacción española conserva las dos categorías legales y la prohibición enfática, y adapta el orden para fluidez natural en español.
  spanish_consistency_notes:
  - Se mantuvo 'grasa' para חֵלֶב por coherencia con el valor léxico adoptado en el proyecto.
  - Se preservó la distinción entre muerte no ritualizada y desgarro por fieras sin fusionarlas en una sola categoría.
  - La forma 'puede usarse' conserva el permiso legal del hebreo y evita un calco mecánico de 'ser hecho'.
