    changes_summary: Changed “shield”/“shielding” to “protect”/“protecting” for closer lexical alignment with יגן/גנון and smoother consistency within the verse; retained “passing over and rescuing” as a natural rendering of פסח והמליט.
translation:
  language: es
  text: 'Como aves que vuelan, así Yahvé de los Ejércitos protegerá a Jerusalén: protegiendo y librando, pasando de largo[a] y rescatando.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdonando» o «protegiendo»; el verbo hebreo también evoca el lenguaje de la Pascua en Éxodo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/צִפֳּרִים
  english_pob_choice: Like birds
  chosen_spanish: Como aves
  alternatives_spanish:
  - Como pájaros
  - Como aves en vuelo
  lexicon: HALOT
  rationale: El comparativo כ pide una equivalencia natural en español; "aves" conserva el sentido general de צִפֳּרִים sin perder dignidad estilística.
- source_word: עָפוֹת
  english_pob_choice: hovering
  chosen_spanish: que vuelan
  alternatives_spanish:
  - que planean
  - que aletean
  lexicon: HALOT
  rationale: El participio de עוּף expresa la acción de volar. "Que vuelan" es más directo en español; la imagen protectora se mantiene por el contexto de la comparación, sin forzar un calco como "planeando".
- source_word: יָגֵן
  english_pob_choice: will protect
  chosen_spanish: protegerá
  alternatives_spanish:
  - resguardará
  - defenderá
  lexicon: HALOT
  rationale: גּנן tiene fuerza concreta de proteger/cubrir. "Protegerá" sigue de cerca la revisión inglesa y comunica bien la acción divina sobre la ciudad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito según la política del proyecto, en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: צְבָאוֹת tiene sentido militar y colectivo; "de los Ejércitos" es claro y solemne en español, equivalente al inglés auditado.
- source_word: גָּנוֹן
  english_pob_choice: protecting
  chosen_spanish: protegiendo
  alternatives_spanish:
  - protección
  - resguardando
  lexicon: HALOT
  rationale: La forma intensiva/reiterativa de גנן se refleja con un gerundio para preservar la cadencia verbal del hebreo y la reiteración del acto protector.
- source_word: וְ/הִצִּיל
  english_pob_choice: and delivering
  chosen_spanish: y librando
  alternatives_spanish:
  - y rescatando
  - y salvando
  lexicon: HALOT
  rationale: נצל expresa librar/rescatar. "Librando" mantiene la fuerza verbal y evita confundirlo con la acción siguiente.
- source_word: פָּסֹחַ
  english_pob_choice: passing over
  chosen_spanish: pasando por alto
  alternatives_spanish:
  - saliendo de largo
  - perdonando
  lexicon: HALOT
  rationale: Se conserva la lectura literal de פסח como "pasar por alto", que en español puede sugerir el eco pascual sin resolver de antemano si el matiz principal es "sparing" o "passing over".
- source_word: וְ/הִמְלִיט
  english_pob_choice: and rescuing
  chosen_spanish: y rescatando
  alternatives_spanish:
  - y haciendo escapar
  - y liberando
  lexicon: HALOT
  rationale: מלט significa dejar escapar/rescatar. "Rescatando" es natural y mantiene la variedad verbal respecto de נצל.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión del POB de preservar el nombre propio divino en transliteración, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Preservación del eco pascual en פָּסֹחַ
  english_pob_reading: passing over
  chosen_spanish_reading: pasando por alto
  alternative_spanish_readings:
  - sparing
  - protegiendo
  rationale: La expresión conserva la tensión teológica entre el sentido de pasar de largo y la posible implicación de perdonar/proteger. El español mantiene la literalidad sin cerrar el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail inglés: se prefirió un verbo de protección más cercano a יָגֵן/גָּנֹון y se mantuvo la secuencia verbal compacta con proteger/protegiendo, librando, pasando por alto y rescatando. La nota de pie conserva la alternativa semántica ligada a פָּסֹחַ y su eco pascual.'
  spanish_consistency_notes:
  - Se usó "Yahvé de los Ejércitos" para mantener consistencia con la terminología POB y la dignidad del registro.
  - '"Librando" y "rescatando" distinguen bien los dos verbos hebreos de salvación y evitan redundancia plana.'
  - La frase "pasando por alto[a]" lleva el marcador exactamente en el texto para que la nota quede anclada.
  - Se evitó "SEÑOR" para no ocultar el nombre divino en el texto principal.
