translation:
  language: es
  text: Y sus hermanos, en sus aldeas, debían venir cada siete días[a], de tiempo en tiempo[b], con estos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por siete días»; la expresión hebrea probablemente se refiere a una rotación de servicio de siete días.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con estos», refiriéndose a los que ya estaban sirviendo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus hermanos de familia
  lexicon: HALOT
  rationale: אֲחֵיהֶם significa literalmente «sus hermanos»; en este contexto administrativo puede ampliar su referencia a parientes o compañeros levitas, pero «sus hermanos» conserva mejor la forma y el sentido social del hebreo y del POB inglés.
- source_word: בְּחַצְרֵיהֶם
  english_pob_choice: in their villages
  chosen_spanish: en sus aldeas
  alternatives_spanish:
  - en sus poblados
  - en sus asentamientos
  - en sus patios
  lexicon: HALOT
  rationale: חָצֵר puede significar patio, recinto o aldea/asentamiento. Aquí, por el contexto de residencia fuera del santuario, «aldeas» expresa mejor el sentido residencial que «patios».
- source_word: לָבוֹא
  english_pob_choice: were to come
  chosen_spanish: debían venir
  alternatives_spanish:
  - iban a venir
  - habían de venir
  - deberían venir
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad u obligación según el contexto. En español, «debían venir» comunica mejor el turno programado de servicio que un simple pasado narrativo.
- source_word: לְשִׁבְעַת הַיָּמִים
  english_pob_choice: in every seven days
  chosen_spanish: cada siete días
  alternatives_spanish:
  - por siete días
  - a intervalos de siete días
  - en cada siete días
  lexicon: HALOT
  rationale: La frase apunta naturalmente a una rotación o intervalo de siete días. «Cada siete días» conserva esa periodicidad sin forzar el texto hacia una precisión mayor que la del hebreo.
- source_word: מֵעֵת אֶל עֵת
  english_pob_choice: from time to time
  chosen_spanish: de tiempo en tiempo
  alternatives_spanish:
  - de una vez a otra
  - de tiempo a tiempo
  - en ocasiones sucesivas
  lexicon: HALOT
  rationale: El modismo describe repeticiones u ocasiones sucesivas. «De tiempo en tiempo» es una equivalencia natural en español y refleja la recurrencia del turno.
- source_word: עִם אֵלֶּה
  english_pob_choice: with these
  chosen_spanish: con estos
  alternatives_spanish:
  - con ellos
  - junto con estos
  - al lado de estos
  lexicon: HALOT
  rationale: Literalmente es «con estos». En español, el demostrativo masculino plural «estos» conserva la referencia cercana a los guardias/levitas ya mencionados y evita suavizar el texto como una simple paráfrasis relacional.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para volver más literal עִם אֵלֶּה («with these») en vez de una paráfrasis relacional. La redacción española sigue ese ajuste con «con estos» y mantiene la estructura temporal del versículo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otros términos no pertinentes; el versículo no contiene lenguaje divino.
  - «Aldeas» se eligió para reflejar el sentido residencial de חַצְרֵיהֶם en Chronicles.
  - «Debían venir» comunica obligación/turno, coherente con la descripción administrativa del contexto.
  - Se conserva el demostrativo próximo «estos» para reflejar la literalidad de עִם אֵלֶּה.
