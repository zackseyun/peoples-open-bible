revisions:
- from: Por tanto, entrega a sus hijos al hambre[a], y entrégalos al poder de la espada. Que sus esposas queden[b] viudas y sin hijos, y que sus hombres sean muertos por muerte[c], sus jóvenes heridos por la espada en la guerra.
  to: Por tanto, entrega a sus hijos al hambre[a], y entrégalos al poder de la espada. Que sus esposas queden privadas de sus hijos[b] y viudas, y que sus hombres sean muertos por muerte[c], sus jóvenes abatidos por la espada en batalla.
  rationale: 'Se revisa para alinear mejor el español con la evidencia hebrea y la auditoría inglesa: la nota [a] ahora preserva la alternativa concreta «en manos de la espada»; שַׁכֻּלוֹת se traduce con un giro que expresa pérdida real de hijos, no mera falta de ellos; y מֻכֵּי חֶרֶב se fortalece a «abatidos por la espada», que encaja con el contexto de muerte violenta. También se ajusta «en batalla» por mayor naturalidad y cercanía al sentido contextual.'
  reviewer_model: gpt-5.4
