review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: cláusula temporal («Cuando ... llegó»), «arca del pacto de Yahvé», entrada «al campamento», clamor colectivo de Israel y efecto final sobre «la tierra». También preserva correctamente «Yahvé» para יְהוָה y la cautela lexical de וַתֵּהֹם con una nota alternativa. Sin embargo, hay un error gramatical importante en español: «todo Israel gritó» no concuerda con el verbo hebreo plural וַיָּרִיעוּ ni con el sentido colectivo explícito de «all Israel shouted».'
  spanish_quality_summary: 'El español es generalmente claro y digno. «La tierra resonó» es natural y fiel a la decisión auditada. No obstante, el anclaje de la nota está mal colocado: [a] aparece en «campamento» aunque la nota explica «la tierra resonó/tembló». Además, «todo Israel gritó» suena menos natural aquí que «todo Israel lanzó un gran clamor» o «todos los israelitas gritaron», y la concordancia verbal singular desmejora la legibilidad.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; בְּרִית → «pacto» es aceptable en este contexto; הָאָרֶץ → «la tierra»; y la decisión no sísmica para וַתֵּהֹם se conserva. No hay conflicto doctrinal relevante.'
  issues:
  - severity: high
    issue: Concordancia y fuerza del verbo principal
    rationale: El hebreo וַיָּרִיעוּ es 3mp («gritaron/clamaron»). «Todo Israel gritó» usa singular y debilita la explicitud del plural colectivo del original. En español bíblico natural, «todo Israel lanzó un gran clamor» preserva mejor tanto el colectivo como el cognado intensivo.
  - severity: medium
    issue: Ubicación incorrecta de la nota al pie
    rationale: La nota [a] comenta «y la tierra resonó / tembló», pero el marcador está anclado a «campamento». Debe colocarse junto a «resonó» o la cláusula final pertinente.
  - severity: low
    issue: Redacción del pie de nota mejorable
    rationale: 'La formulación actual es comprensible, pero puede sonar algo calcada. Una redacción más natural en español mantiene el mismo contenido: «se eligió “resonó” para no dar a entender un terremoto definido...».'
  revised_spanish_text: Cuando el arca del pacto de Yahvé llegó al campamento, todo Israel lanzó un gran clamor, y la tierra resonó[a].
