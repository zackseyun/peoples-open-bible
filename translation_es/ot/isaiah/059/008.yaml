    rationale: El audit trail inglés dice «there is no judgment in their tracks», no un cambio temporal como «no hubo». Conviene mantener el presente para ajustarse mejor a la cláusula principal española.
  revised_spanish_text: No conocieron el camino de la paz, y no hay justicia en sus sendas[a]; torcieron sus caminos para sí. Todo el que anda en ellas[b] no conoce la paz.
