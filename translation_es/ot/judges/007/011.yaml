review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia del hebreo: oír lo que dicen, luego fortalecerse las manos, y descender al campamento; además refleja adecuadamente la bajada de Gedeón con Purá al borde de los hombres armados en el campamento. Sin embargo, ''lo que ellos hablan'' no es español natural para מַה יְדַבֵּרוּ y debilita la idea de conversación o discurso oído. También conviene alinear la nota [a] con una alternativa española más natural. El resto de las decisiones principales sigue fielmente el sentido fuente y el audit trail inglés.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero requiere un ajuste de naturalidad importante: ''oirás lo que ellos hablan'' suena forzado en español; ''oirás lo que dicen'' o ''lo que están diciendo'' comunica mejor el sentido. ''Purá su siervo'' es comprensible, aunque algo más fluido con coma appositiva: ''con Purá, su siervo''. Las demás frases son legibles y conservan bien la imaginería hebrea de ''tus manos''.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. 'Siervo' para נַעֲרוֹ es aceptable aquí por el audit trail documentado, aunque el hebreo permite 'criado', 'sirviente' o 'asistente'. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: '''lo que ellos hablan'' es una formulación poco natural en español'
    rationale: Aunque intenta reflejar literalmente מַה יְדַבֵּרוּ, en español idiomático se dice 'lo que dicen' o 'lo que están diciendo'. La redacción actual suena calcada y reduce la legibilidad sin ganar fidelidad.
  - severity: low
    issue: La nota [a] ofrece una alternativa menos natural que el texto principal
    rationale: Si el texto principal se corrige a 'lo que dicen', la nota debe reflejar una alternativa real y útil, por ejemplo 'lo que están diciendo', que sí preserva el matiz de habla en curso destacado por el POB inglés.
  - severity: low
    issue: Falta una coma explicativa en 'con Purá su siervo'
    rationale: 'En español, la aposición ''su siervo'' se lee mejor entre comas: ''con Purá, su siervo''. No es un error de sentido, pero mejora notablemente la fluidez.'
