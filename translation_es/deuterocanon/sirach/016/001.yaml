revisions:
- from: No desees la apariencia de jóvenes inútiles[a], ni te alegres en hijos de injusticia.
  to: No desees la apariencia de jóvenes vanos[a], ni te alegres con hijos de injusticia.
  rationale: Se ajusta 'jóvenes inútiles' a 'jóvenes vanos' para reflejar mejor שָׁוְא en un registro sapiencial natural en español. Se cambia 'te alegres en' por 'te alegres con' para mejorar la idiomaticidad sin perder el paralelismo. La nota se amplía para preservar explícitamente el contraste textual documentado por el POB inglés entre la lectura griega y la hebrea.
  reviewer_model: gpt-5.4
