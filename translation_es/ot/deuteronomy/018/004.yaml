  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones 'primicias', 'vino nuevo', 'aceite' y 'rebaño' son apropiadas. La preferencia del proyecto por claridad natural en español favorece 'Le darás' sobre el calco 'Darás a él'.
