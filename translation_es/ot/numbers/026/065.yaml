base_translation:
  language: en
  yaml_path: translation/ot/numbers/026/065.yaml
  text: For Yahweh had said of them[b][a], ‘They shall surely die in the wilderness,’ and not a man was left of them except Caleb son of Jephunneh and Joshua son of Nun.
