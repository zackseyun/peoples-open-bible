translation:
  language: es
  text: Pero los hijos de adúlteros serán imperfectos[a], y la descendencia de una unión ilícita perecerá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incompletos», «inacabados» o «sin pleno desarrollo» para ἀτέλεστα. El término griego puede sugerir falta de plenitud más que precisar la forma exacta de esa deficiencia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «descendencia de un lecho ilícito». «Lecho» es un modismo griego para la unión sexual o el lecho matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: BDAG / uso bíblico general
  rationale: τέκνα designa aquí descendencia en plural dentro de un juicio sapiencial. En español, 'hijos' comunica de manera natural la relación filial y conserva la referencia a progenie sin restringirla a varones.
- source_word: μοιχῶν
  english_pob_choice: adulterers
  chosen_spanish: adúlteros
  alternatives_spanish:
  - los que cometen adulterio
  - adúlteras
  lexicon: BDAG
  rationale: El genitivo plural caracteriza a personas marcadas por el adulterio. 'Adúlteros' reproduce esa categoría moral con concisión y sin atenuarla.
- source_word: ἀτέλεστα
  english_pob_choice: imperfect
  chosen_spanish: imperfectos
  alternatives_spanish:
  - incompletos
  - inacabados
  - sin pleno desarrollo
  lexicon: LSJ
  rationale: El término expresa falta de culminación o plenitud. 'Imperfectos' es una solución española natural que conserva la idea de carencia de plenitud sin especificar indebidamente su forma.
- source_word: ἐκ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  lexicon: BDAG
  rationale: En la expresión de procedencia 'de una unión ilícita' refleja bien el origen sin forzar la imagen idiomática del griego.
- source_word: παρανόμου
  english_pob_choice: unlawful
  chosen_spanish: ilícita
  alternatives_spanish:
  - ilegal
  - contra la ley
  - sin ley
  lexicon: BDAG
  rationale: El adjetivo significa 'contrario a la ley'. 'Ilícita' conserva la fuerza legal-moral y resulta más idiomática en español que una calca más pesada.
- source_word: κοίτης
  english_pob_choice: union
  chosen_spanish: unión
  alternatives_spanish:
  - lecho
  - cama
  - unión sexual
  lexicon: BDAG
  rationale: Aunque literalmente significa 'lecho', aquí funciona como metonimia de unión sexual o conyugal. 'Unión' preserva el sentido relacional en español y evita una expresión demasiado cruda o artificial en una traducción de lectura pública.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - prole
  - hijos
  lexicon: BDAG
  rationale: '''Descendencia'' comunica el sentido colectivo de progenie mejor que ''semilla'' en español contemporáneo, manteniendo la referencia a los nacidos de esa unión.'
- source_word: ἀφανισθήσεται
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - será destruida
  - desaparecerá
  - se extinguirá
  lexicon: BDAG
  rationale: El pasivo futuro expresa desaparición o ruina. 'Perecerá' conserva la gravedad del juicio y evita debilitar el verbo con una mera idea de desaparecer.
theological_decisions:
- issue: Juicio sapiencial sobre los hijos de adulterio y una unión ilícita
  english_pob_reading: Retain the verse's stark statement as a wisdom judgment without softening it into a merely social observation.
  chosen_spanish_reading: Mantener la afirmación contundente como juicio sapiencial, sin reducirla a una simple observación social.
  alternative_spanish_readings:
  - Interpretarlo solo como estigma social sobre los descendientes
  - Generalizarlo como proverbio sobre ilegitimidad sin fuerza moral
  rationale: El griego presenta una evaluación severa ligada al adulterio y a una unión contraria a la ley. La traducción debe preservar esa tensión y gravedad, sin introducir una doctrina más específica de culpa heredada que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión inglesa: ἀτέλεστα se entiende como una carencia de plenitud (aquí vertida como «imperfectos») y παρανόμου κοίτης se mantiene con una expresión española más clara y pública («unión ilícita») sin perder la referencia idiomática al ''lecho'' sexual. ἀφανισθήσεται se traduce con un verbo fuerte de juicio («perecerá») conforme al último pase revisado.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; el pasaje no contiene el nombre divino.
  - '''Hijos'' y ''descendencia'' mantienen el paralelismo de dos miembros sin estrechar el alcance a un solo tipo de parentesco.'
  - '''Unión ilícita'' conserva la tensión legal-moral de παρανόμου κοίτης y es más natural para lectura pública que ''lecho ilícito''.'
  - '''Perecerá'' sostiene el tono de juicio del pasaje y evita suavizarlo en mera desaparición.'
