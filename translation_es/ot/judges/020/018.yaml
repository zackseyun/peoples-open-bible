translation:
  language: es
  text: 'Entonces se levantaron y subieron a Betel, y consultaron a Dios. Y los hijos de Israel[a] dijeron: “¿Quién subirá primero por nosotros a la guerra contra los hijos de Benjamín[c]?” Y Yahvé dijo: “Judá primero.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “los israelitas”. Hebreo: “los hijos de Israel”.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: “con los hijos de Benjamín”, es decir, en guerra contra ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: they arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  lexicon: HALOT
  rationale: La forma narrativa indica la acción siguiente en la secuencia. En español, “se levantaron” comunica bien ese inicio de movimiento sin sonar forzado.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - fueron
  lexicon: HALOT
  rationale: עלה conserva la idea de subir, especialmente en el viaje a un lugar elevado o santuario. “Subieron” mantiene esa imagen mejor que un simple “fueron”.
- source_word: בֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Beth-el
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. “Betel” es la forma española más natural y reconocible, sin perder la referencia al topónimo bíblico.
- source_word: וַיִּשְׁאֲלוּ בֵאלֹהִים
  english_pob_choice: they inquired of God
  chosen_spanish: inquirieron de Dios
  alternatives_spanish:
  - consultaron a Dios
  - preguntaron a Dios
  lexicon: HALOT
  rationale: שׁאל con ב expresa consultar o pedir guía divina. “Inquirieron de Dios” preserva ese matiz formal de búsqueda de dirección, más preciso que “preguntaron”.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: The sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión genealógica masculina del hebreo. “Los hijos de Israel” es transparente y fiel a la forma original.
- source_word: מִי יַעֲלֶה לָּנוּ
  english_pob_choice: Who will go up first for us
  chosen_spanish: ¿Quién subirá primero por nosotros
  alternatives_spanish:
  - ¿Quién irá primero por nosotros
  - ¿Quién nos encabezará primero
  lexicon: HALOT
  rationale: La pregunta busca quién tomará la delantera. “Subirá primero por nosotros” conserva עלה y el valor de prioridad del contexto militar.
- source_word: בַתְּחִלָּה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - al principio
  - inicialmente
  lexicon: HALOT
  rationale: En este contexto, la idea es de precedencia u orden de ataque, y “primero” es la solución más natural en español.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to the battle
  chosen_spanish: a la guerra
  alternatives_spanish:
  - al combate
  - a la batalla
  lexicon: HALOT
  rationale: מִלְחָמָה puede referir guerra o combate. Dado el conflicto civil del contexto, “a la guerra” es claro y digno en español.
- source_word: עִם בְּנֵי בִנְיָמִן
  english_pob_choice: against the sons of Benjamin
  chosen_spanish: contra los hijos de Benjamín
  alternatives_spanish:
  - contra los benjamitas
  - con los hijos de Benjamín
  lexicon: HALOT
  rationale: Aunque עִם normalmente es “con”, en contexto bélico expresa oposición. “Contra” explicita correctamente la relación de combate; “hijos de Benjamín” conserva el giro hebreo.
- source_word: יְהוָה
  english_pob_choice: And the LORD said
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Nombre divino. En el texto principal, “Yahvé” preserva la forma del Tetragrámaton de manera auditable.
- source_word: יְהוּדָה בַתְּחִלָּה
  english_pob_choice: Judah first
  chosen_spanish: Judá primero
  alternatives_spanish:
  - Judá irá primero
  - Judá, primero
  lexicon: HALOT
  rationale: La respuesta hebrea es breve y elíptica. “Judá primero” conserva esa concisión y refleja adecuadamente la decisión divina.
theological_decisions:
- issue: Rendición del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto en español es verterlo como “Yahvé”, preservando el nombre de pacto sin recurrir a una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: The sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se mantiene la forma masculina y genealógica del hebreo. Esta elección conserva transparencia textual y evita neutralizar una expresión que funciona como designación corporativa del pueblo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y solo quedaron observaciones menores, sin necesidad de ajuste textual sustantivo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para יְהוָה conforme al estándar español del proyecto.
  - Se conserva “los hijos de Israel” y “los hijos de Benjamín” para reflejar con transparencia las expresiones corporativas del hebreo.
  - “Inquirieron de Dios” preserva el valor de consultar dirección divina, no mera formulación de una pregunta.
  - 'La puntuación y el orden de las frases siguen el paralelismo narrativo del hebreo con una elipsis final breve: “Judá primero.”'
