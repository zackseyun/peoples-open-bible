translation:
  language: es
  text: Inclina tu hombro y cárgala[a], y no aborrezcas sus ataduras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la segunda mitad del versículo es difícil; el paralelo griego dice «sus ataduras», lo que probablemente preserva la imagen de la disciplina restrictiva de la Sabiduría.
    reason: textual_variant
lexical_decisions:
- source_word: הַט / ὑπόθες
  english_pob_choice: Bend
  chosen_spanish: Inclina
  alternatives_spanish:
  - Dobla
  - Baja
  - Inclina hacia
  lexicon: HALOT; Swete LXX 1909
  rationale: El verbo pide una acción corporal de sometimiento o disposición ante la Sabiduría. «Inclina» conserva la imagen física sin sonar forzado en español, y se ajusta bien al paralelo griego con ὑπόθες.
- source_word: שִׁכְמְךָ / τὸν ὦμόν σου
  english_pob_choice: your shoulder
  chosen_spanish: tu hombro
  alternatives_spanish:
  - tu espalda
  - tu cuello
  lexicon: HALOT; Swete LXX 1909
  rationale: «Hombro» reproduce de forma directa la imagen del peso o yugo, y coincide con el griego ὦμος. «Espalda» o «cuello» serían más interpretativos.
- source_word: וְשָׂאֶהָ / βάσταξον αὐτήν
  english_pob_choice: and carry her
  chosen_spanish: y cárgala
  alternatives_spanish:
  - y llévala
  - y sosténla
  - y bástala
  lexicon: HALOT; Swete LXX 1909
  rationale: El imperativo transmite llevar algo de manera sostenida. «Cárgala» mantiene la metáfora de asumir un peso; «llevarla» es posible, pero menos enfático en la idea de carga.
- source_word: וְאַל תָּקוֹץ / μὴ προσοχθίσῃς
  english_pob_choice: and do not loathe
  chosen_spanish: y no te repugnen
  alternatives_spanish:
  - y no la aborrezcas
  - y no te hastíen
  - y no la rehúses
  lexicon: HALOT; Greek προσοχθίζω
  rationale: El hebreo תָּקוֹץ expresa aversión/repulsión, y el griego puede incluir fastidio o resentimiento. «No te repugnen» conserva ese rechazo fuerte sin adoptar un giro demasiado coloquial o psicológico.
- source_word: בְּתַחְבּוּלוֹתֶיהָ / τοῖς δεσμοῖς αὐτῆς
  english_pob_choice: her bonds
  chosen_spanish: sus ataduras
  alternatives_spanish:
  - sus lazos
  - sus vínculos
  - sus ligaduras
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo es difícil y el testimonio griego aclara la imagen como vínculos o lazos restrictivos. «Ataduras» mantiene esa idea de disciplina constrictiva y resulta natural en español bíblico contemporáneo.
- source_word: Personificación de la sabiduría
  english_pob_choice: Retain feminine pronouns ('her') for wisdom
  chosen_spanish: Conservar el femenino («la» / «sus») para la Sabiduría
  alternatives_spanish:
  - Neutralizar con «la sabiduría» repetida
  - Usar «eso»
  lexicon: Contexto literario de Sirácida
  rationale: El pasaje personifica a la Sabiduría como mujer; por eso se conserva el femenino en el objeto y los posesivos. Esto evita aplanar la figura retórica y respeta el sentido del contexto.
theological_decisions:
- issue: Sabiduría personificada como figura femenina
  english_pob_reading: Retain feminine pronouns ('her') for wisdom
  chosen_spanish_reading: Mantener la personificación femenina de la Sabiduría
  alternative_spanish_readings:
  - Despersonalizar la Sabiduría
  - Reformular en masculino impersonal
  rationale: Tanto el hebreo como el griego presentan a la Sabiduría como entidad femenina. Conservar esa forma protege la lectura literaria y teológica del texto, en vez de convertirla en una abstracción.
  doctrine_reference: Poética sapiencial; principio de primacía del sentido original
- issue: Tratamiento de la lectura textual difícil en בְּתַחְבּוּלוֹתֶיהָ frente al paralelo griego
  english_pob_reading: Translate with Greek-supported 'bonds' in the main text
  chosen_spanish_reading: 'Traducir con una imagen de restricción: «ataduras»'
  alternative_spanish_readings:
  - disciplinas
  - restricciones
  - lazos
  rationale: El hebreo transmitido es oscuro y el paralelo griego sugiere vínculos restrictivos. «Ataduras» permite reflejar esa tensión textual sin pretender resolverla de manera más segura de lo que permiten los datos.
  doctrine_reference: Crítica textual responsable; traducción desde fuentes originales con paralelo de apoyo
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que prefirió «loathe» sobre «be disgusted by» por naturalidad formal. En español, «no te repugnen» conserva la fuerza de aversión del hebreo y evita una paráfrasis débil. También se incorporó el apoyo del paralelo griego para resolver la imagen de restricción en la segunda mitad del versículo.
  spanish_consistency_notes:
  - Se mantiene la personificación femenina de la Sabiduría con formas femeninas («cárgala», «sus»).
  - «Hombro» sigue el paralelismo corporal de ambos testigos, hebreo y griego.
  - «Ataduras» se usa como solución pública y comprensible para la lectura textual difícil, sin borrar el trasfondo de restricción disciplinaria.
