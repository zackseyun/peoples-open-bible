review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del proverbio y la lectura principal del hebreo: la primera línea se entiende de forma predicativa y la segunda expresa correctamente la comparación. También preserva la ambigüedad documentada con una nota alternativa y refleja adecuadamente חֶסֶד como una cualidad relacional fuerte. Sin embargo, «Deseable en el hombre es...» suena algo forzado en español y no expresa tan claramente como el inglés POB el valor de «lo que es deseable».'
  spanish_quality_summary: El texto es comprensible, pero la primera línea resulta algo rígida y poco idiomática para español bíblico moderno. «Lo deseable en una persona» mejora mucho la naturalidad sin alejarse del hebreo ni del análisis del POB. Además, «una persona» evita que «hombre» suene innecesariamente masculino en español cuando el sentido es genérico, manteniendo la intención sapiencial representativa.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Amor leal» es una buena opción contextual para חֶסֶד, respaldada por la nota léxica. «Mentiroso» para כָּזָב es idiomático y fiel. La única mejora recomendada es estilística y de claridad en la primera línea.
  issues:
  - severity: medium
    issue: La frase «Deseable en el hombre es su amor leal» suena poco natural en español.
    rationale: Aunque formalmente refleja la concisión del hebreo, en español moderno la construcción predicativa sin artículo ni apoyo pronominal queda rígida. «Lo deseable en una persona es...» comunica con más claridad el sentido elegido por el POB.
  - severity: low
    issue: «En el hombre» puede sonar innecesariamente marcado en masculino en español.
    rationale: El hebreo usa singular representativo genérico. En español contemporáneo eclesial, «en una persona» transmite mejor el valor genérico sin perder fidelidad al sentido.
  revised_spanish_text: Lo deseable en una persona es su amor leal[a][b], y un pobre es mejor que un mentiroso.
  revised_footnotes:
  - marker: a
    text: 'O: «El deseo de una persona es su amor leal». El hebreo de la primera línea es breve y puede leerse también como identificación del deseo de una persona con su cualidad de lealtad o bondad.'
    reason: alternative_reading
  - marker: b
    text: «Amor leal» traduce חֶסֶד, término rico que según el contexto puede significar bondad, lealtad o amor fiel.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera línea para que suene natural y clara en español, manteniendo la lectura predicativa preferida por el POB y conservando la alternativa en nota. También se sustituye «el hombre» por «una persona» para expresar mejor el sentido genérico del proverbio en español actual.
