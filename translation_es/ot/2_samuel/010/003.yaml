translation:
  language: es
  text: 'Y los príncipes de los amonitas dijeron a Hanún, su señor[a]: «¿Acaso David está honrando a tu padre a tus ojos porque te ha enviado consoladores? ¿No ha enviado David a sus siervos para investigar la ciudad, espiarla[c][b] y derribarla?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante tus ojos».
    reason: lexical_alternative
  - marker: b
    text: «Consoladores» se refiere a los enviados que fueron a consolar a Hanún después de la muerte de su padre.
    reason: cultural_note
  - marker: c
    text: O «registrar la ciudad, espiarla y trastornarla».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי בְנֵי עַמּוֹן
  english_pob_choice: the princes of the Ammonites
  chosen_spanish: los príncipes de los hijos de Amón
  alternatives_spanish:
  - los oficiales de los amonitas
  - los líderes de los amonitas
  lexicon: HALOT
  rationale: שָׂרִים puede ser príncipes, oficiales o líderes. «Príncipes» conserva el tono cortesano y político del contexto, y «hijos de Amón» refleja con naturalidad la forma hebrea בני עמון.
- source_word: אֲדֹנֵיהֶם
  english_pob_choice: their lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su maestro
  lexicon: HALOT
  rationale: Aquí אדון es un título humano de autoridad. «Señor» mantiene la relación jerárquica sin convertirlo en un título divino ni endurecerlo con «amo».
- source_word: הַמְכַבֵּד
  english_pob_choice: honoring
  chosen_spanish: honrando
  alternatives_spanish:
  - mostrando honor a
  - glorificando
  lexicon: HALOT
  rationale: El participio de כבד expresa mostrar honor o respeto. «Honrando» es natural en español y conserva el valor relacional del verbo sin introducir un sentido teológico ajeno.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your sight
  chosen_spanish: en tu presencia
  alternatives_spanish:
  - a tus ojos
  - a tu parecer
  lexicon: HALOT
  rationale: La expresión literal es «en tus ojos». En español, «en tu presencia» comunica el ámbito de la valoración directa de Hanún y evita una calca demasiado rígida; se mantiene la idea de percepción personal.
- source_word: מְנַחֲמִים
  english_pob_choice: comforters
  chosen_spanish: consoladores
  alternatives_spanish:
  - quienes te consuelan
  - consuelos
  lexicon: HALOT
  rationale: El término alude a los enviados que iban a consolar a Hanún tras la muerte de su padre. «Consoladores» conserva el participio y la función de los mensajeros.
- source_word: הֲלוֹא
  english_pob_choice: Has not
  chosen_spanish: ¿Acaso no
  alternatives_spanish:
  - ¿No es cierto que
  - ¿No
  lexicon: HALOT
  rationale: Es una pregunta retórica que espera asentimiento. «¿Acaso no» mantiene el tono suspicaz de los consejeros sin volverlo meramente informativo.
- source_word: בַּעֲבוּר
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - con el propósito de
  - a fin de
  lexicon: HALOT
  rationale: Aquí introduce finalidad. «Para» es lo más natural en español; el contexto deja claro el propósito sospechado.
- source_word: חֲקוֹר
  english_pob_choice: search
  chosen_spanish: registrar
  alternatives_spanish:
  - investigar
  - explorar
  lexicon: HALOT
  rationale: חקר expresa examinar o averiguar. «Registrar» en español bíblico puede significar explorar cuidadosamente o inspeccionar; además encaja con el lenguaje militar del pasaje sin limitarse a una simple búsqueda casual.
- source_word: וּלְרַגְּלָהּ
  english_pob_choice: to spy it out
  chosen_spanish: espiarla
  alternatives_spanish:
  - reconocerla
  - explorarla
  lexicon: HALOT
  rationale: De רגל en piel, el sentido es espiar o reconocer con fines hostiles. «Espiarla» conserva la sospecha militar y la referencia al sustantivo femenino «la ciudad».
- source_word: וּלְהָפְכָהּ
  english_pob_choice: to overthrow it
  chosen_spanish: derribarla
  alternatives_spanish:
  - volcarla
  - destruirla
  lexicon: HALOT
  rationale: הפך puede significar voltear, trastornar o derribar. En este contexto de amenaza contra la ciudad, «derribarla» transmite el acto de subvertirla o abatirla sin añadir más de lo que el hebreo exige.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus hombres
  lexicon: HALOT
  rationale: עבד aquí se refiere a los enviados de David; «siervos» mantiene la fuerza del término de servicio/subordinación y sigue el uso poético-bíblico sin introducir una categoría más administrativa de lo necesario.
theological_decisions:
- issue: La sospecha de los príncipes no debe sonar como afirmación del narrador
  english_pob_reading: Render the princes' accusation straightforwardly as a rhetorical question without implying their assessment is true.
  chosen_spanish_reading: Presentar la acusación como pregunta retórica de los consejeros, sin sugerir que el narrador la avala.
  alternative_spanish_readings:
  - Convertirla en una afirmación directa y factual
  - Suavizarla como mera duda neutral
  rationale: El hebreo pone estas palabras en boca de los príncipes de Amón. La puntuación y el tono en español mantienen la sospecha y dejan intacta la tensión narrativa; no se resuelve el juicio de los consejeros como si fuera verdad del relato.
  doctrine_reference: 'Translation philosophy §3: preserve tension rather than resolve it'
translation_notes:
  revision_awareness: 'Revisión contemporánea: el pasaje quedó estable en el último pase auditado, con acuerdo alto y sin cambios sustantivos necesarios. Se conservó la lectura óptima ya aprobada, ajustando solo el español para fluidez natural y claridad publicada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió «hijos de Amón» para reflejar la forma hebrea בני עמון y evitar una abstracción excesiva.
  - «Siervos» conserva la fuerza subordinada de עבד sin introducir terminología eclesial.
  - Las notas a pie preservan la ambigüedad lexical relevante sin borrar la sospecha militar del pasaje.
