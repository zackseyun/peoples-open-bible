translation:
  language: es
  text: El Señor, Yahvé[c], me ha dado lengua de los instruidos[a], para saber sostener al cansado con una palabra. Mañana tras mañana despierta[b]; despierta mi oído para oír como los instruidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la lengua de discípulos" / "la lengua de los enseñados".
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo traducido "sostener" es difícil; también puede entenderse como "ayudar" o, menos probablemente, "responder" al cansado con una palabra.
    reason: lexical_alternative
  - marker: c
    text: El hebreo combina el título אֲדֹנָי con el nombre divino YHWH, que en este proyecto se traduce "Yahvé".
    reason: cultural_note
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: The Lord GOD
  chosen_spanish: El Señor Yahvé
  alternatives_spanish:
  - El Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino YHWH. En español, “El Señor Yahvé” preserva ambos elementos sin ocultar el nombre propio, siguiendo la convención del proyecto para YHWH.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - boca
  - lenguaje
  lexicon: HALOT
  rationale: “Lengua” conserva la imagen corporal y metafórica del hebreo para la facultad de hablar, de modo natural en español.
- source_word: לִמּוּדִים
  english_pob_choice: those who are taught
  chosen_spanish: instruidos
  alternatives_spanish:
  - los que son enseñados
  - discípulos
  - los instruidos
  lexicon: HALOT
  rationale: El término puede referirse a personas enseñadas o formadas. “Instruidos” mantiene el valor pasivo/adjetival y suena natural en español, sin cargar de más el sentido religioso de “discípulos”.
- source_word: לָדַעַת
  english_pob_choice: that I may know
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - a fin de saber
  lexicon: HALOT
  rationale: La forma infinitiva expresa propósito. “Para saber” conserva la finalidad y encaja bien con la construcción española.
- source_word: לָעוּת
  english_pob_choice: how to sustain
  chosen_spanish: sostener
  alternatives_spanish:
  - ayudar
  - responder
  - alentar
  lexicon: HALOT
  rationale: El verbo es difícil. “Sostener” refleja el apoyo efectivo al cansado y mantiene una relación cercana con la idea de sostén sin sobreinterpretar el matiz.
- source_word: יָעֵף
  english_pob_choice: the weary
  chosen_spanish: el cansado
  alternatives_spanish:
  - el fatigado
  - el agotado
  - el exhausto
  lexicon: HALOT
  rationale: “Cansado” es una equivalencia amplia y clara en español; conserva la referencia a fatiga física o anímica.
- source_word: דָּבָר
  english_pob_choice: with a word
  chosen_spanish: con una palabra
  alternatives_spanish:
  - con una palabra
  - por medio de una palabra
  - con un mensaje
  lexicon: HALOT
  rationale: El hebreo funciona de modo instrumental. “Con una palabra” expresa bien que el apoyo se da mediante el habla, como en el auditorio inglés.
- source_word: יָעִיר
  english_pob_choice: awakens
  chosen_spanish: despierta
  alternatives_spanish:
  - espabila
  - aviva
  - sacude
  lexicon: HALOT
  rationale: El Hifil de עור significa despertar o rousing. “Despierta” es claro y conserva el paralelismo de las dos cláusulas.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: Morning by morning
  chosen_spanish: Mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición hebrea indica regularidad continua. “Mañana tras mañana” reproduce la cadencia y la insistencia del original.
- source_word: אֹזֶן
  english_pob_choice: my ear
  chosen_spanish: mi oído
  alternatives_spanish:
  - mi oreja
  - un oído
  lexicon: HALOT
  rationale: En español “oído” funciona mejor que “oreja” en un registro poético y formal, y conserva la imagen de la facultad de percibir.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para que oiga
  alternatives_spanish:
  - para escuchar
  - para oír
  lexicon: HALOT
  rationale: El verbo básico es “oír”. Aquí, por fluidez y paralelismo, “para que oiga” comunica la finalidad sin añadir más intensidad que la que exige el hebreo.
- source_word: כַּלִּמּוּדִים
  english_pob_choice: like those who are taught
  chosen_spanish: como los instruidos
  alternatives_spanish:
  - como los que son enseñados
  - como discípulos
  lexicon: HALOT
  rationale: La comparación retoma el mismo grupo de לִמּוּדִים. Traducirlo de modo consistente preserva el paralelismo y la unidad del versículo.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: The Lord GOD
  chosen_spanish_reading: El Señor Yahvé
  alternative_spanish_readings:
  - El Señor Dios
  - El Señor Yahvé
  rationale: La lectura inglesa combina un título y el Tetragrámaton. En el texto español se mantiene el título con “Señor” y el nombre propio “Yahvé”, evitando ocultar el nombre divino bajo una sustitución convencional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide en lo esencial con el audit trail inglés. Se conservaron la repetición enfática de “mañana tras mañana”, la comparación final “como los instruidos” y la dificultad del verbo לָעוּת mediante una solución española sobria. La única adaptación principal es el tratamiento explícito de YHWH como “Yahvé”, conforme a la norma del proyecto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - Se conservó la repetición paralela del hebreo en ambas apariciones de “despierta”.
  - “Instruidos” se usó de manera consistente para לִמּוּדִים en ambas cláusulas.
  - Se evitó “SEÑOR” como máscara del nombre divino, en coherencia con la política del proyecto para YHWH.
