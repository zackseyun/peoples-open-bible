review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, el sentido de acompañamiento y la idea de comprar comida para el padre. Sin embargo, el hebreo יֶשְׁךָ + participio está mejor representado en español con una formulación de voluntad o disposición, como ya preserva la nota inglesa; «Si envías» es aceptable pero reduce un poco ese matiz idiomático.
  spanish_quality_summary: 'El español es claro y natural. No obstante, «descenderemos» suena algo rígido en registro narrativo; «bajaremos» es más natural y sigue siendo fiel. Además, la nota al pie debe limpiarse: no debe comenzar con comilla suelta ni con comillas anidadas innecesarias.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Alimento» es aceptable para אֹכֶל, aunque «comida» también sería posible; no hace falta cambiarlo. La nota léxica sobre el modismo con יֵשׁ + participio debe mantenerse en español claro.
  issues:
  - severity: medium
    issue: «Si envías» atenúa el matiz de disposición/voluntad del modismo hebreo יֵשׁ + participio.
    rationale: El inglés POB documenta explícitamente la alternativa «If you are willing to send». En español, «si estás dispuesto a enviar» preserva mejor el valor idiomático sin perder naturalidad.
  - severity: low
    issue: «Descenderemos» es correcto pero algo acartonado en español bíblico narrativo.
    rationale: «Bajaremos» comunica el mismo descenso geográfico de forma más idiomática y ampliamente legible en español neutral.
  - severity: low
    issue: La nota al pie tiene puntuación/comillas defectuosas al inicio.
    rationale: Debe presentarse como una alternativa clara en español, sin comilla inicial sobrante ni doble marcado innecesario.
  revised_spanish_text: Si estás dispuesto a enviar a nuestro hermano con nosotros[a], bajaremos y compraremos alimento para ti.
