translation:
  language: es
  text: Y produce para toda tu nación y para cada tribu conocimiento[a], para que sepan que tú eres el Dios de todo poder y poderío[b], y que no hay otro que defienda a la raza de Israel sino tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «reconocimiento» o «pleno conocimiento» para ἐπίγνωσιν.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el Dios de todo poder y poderío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίησον
  english_pob_choice: bring about
  chosen_spanish: haz que llegue
  alternatives_spanish:
  - haz
  - causa
  - produce
  lexicon: LSJ
  rationale: El imperativo aoristo de ποιέω aquí tiene valor causativo respecto de ἐπίγνωσιν. En español, «haz que llegue» comunica mejor esa causación sin sonar mecánico ni perder la idea de producir o provocar el conocimiento.
- source_word: ἐπὶ πᾶν τὸ ἔθνος σου
  english_pob_choice: for all your nation
  chosen_spanish: a todo tu pueblo
  alternatives_spanish:
  - para toda tu nación
  - sobre toda tu nación
  - para todo tu pueblo
  lexicon: LSJ
  rationale: ἔθνος puede ser «nación» o «pueblo». Dado el registro bíblico en español y la fluidez de la oración, «tu pueblo» transmite la referencia colectiva de forma natural; se mantiene el alcance total con «a todo».
- source_word: πάσης φυλῆς
  english_pob_choice: every tribe
  chosen_spanish: a toda tribu
  alternatives_spanish:
  - a cada tribu
  - a todas las tribus
  lexicon: LSJ
  rationale: φυλή es «tribu»; el distributivo griego se refleja con «toda tribu», que en español suena natural y conserva la extensión universal del ruego.
- source_word: ἐπίγνωσιν
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el reconocimiento
  - el pleno conocimiento
  - el conocimiento pleno
  lexicon: LSJ
  rationale: La voz griega puede implicar conocimiento, reconocimiento o conocimiento pleno. Aquí el contexto oracional pide una meta otorgada a los pueblos; «el conocimiento» mantiene amplitud semántica sin forzar una interpretación más estrecha.
- source_word: ὁ θεὸς πάσης δυνάμεως καὶ κράτους
  english_pob_choice: the God of all power and might
  chosen_spanish: el Dios de todo poder y dominio
  alternatives_spanish:
  - el Dios de toda fuerza y poder
  - el Dios de todo poder y fuerza
  - el Dios de todo poder y autoridad
  lexicon: LSJ
  rationale: δύναμις y κράτος forman un par intensivo en el campo de fuerza/poder/dominio. «Poder y dominio» conserva esa duplicación con un español solemne y comprensible; «dominio» da cuenta de κράτος sin reducirlo a mera fuerza física.
- source_word: ὑπερασπίζων
  english_pob_choice: defends
  chosen_spanish: defienda
  alternatives_spanish:
  - proteja
  - ampare
  - respalde
  lexicon: LSJ
  rationale: El participio expresa a quien defiende o protege. En esta cláusula relativa, «defienda» preserva el matiz activo y el tono de súplica, y encaja con el contexto militar y salvífico de Judith.
- source_word: τοῦ γένους Ἰσραήλ
  english_pob_choice: the race of Israel
  chosen_spanish: la raza de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - la estirpe de Israel
  - la familia de Israel
  lexicon: LSJ
  rationale: γένος puede significar raza, linaje, estirpe o pueblo. Dado que el audit trail inglés terminó optando por una lectura más literal, se conserva «raza», que mantiene la fuerza de pertenencia étnica/ancestral sin suavizarla a «pueblo».
- source_word: εἰ μὴ σύ
  english_pob_choice: except you
  chosen_spanish: sino tú
  alternatives_spanish:
  - excepto tú
  - más que tú
  - fuera de ti
  lexicon: LSJ
  rationale: La exclusión es enfática. «Sino tú» es una forma idiomática y clara en español para expresar la exclusividad del defensor final, manteniendo la fuerza absoluta del griego.
theological_decisions:
- issue: Exclusividad divina en la defensa de Israel
  english_pob_reading: there is no other who defends the race of Israel except you
  chosen_spanish_reading: no hay otro que defienda a la raza de Israel sino tú
  alternative_spanish_readings:
  - no hay otro protector de la raza de Israel sino tú
  - no existe otro que defienda a Israel excepto tú
  rationale: El griego afirma de manera exclusiva que Dios es el único defensor de Israel. La redacción española conserva esa exclusividad sin ampliarla doctrinalmente ni atenuarla con lenguaje más general.
  doctrine_reference: Mantener la tensión teológica del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió una formulación más literal para γένος («race») y ajustó la preposición con ἐπί a una construcción más natural. En español, se mantuvo la literalidad de γένος con «raza» y se optó por una solución idiomática para ἐπὶ + acusativo («a todo tu pueblo / a toda tribu») sin perder el alcance distributivo.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva «raza» para γένος por coherencia con la decisión inglesa más literal y para no diluir la pertenencia ancestral.
  - «Defienda» mantiene el valor activo de ὑπερασπίζων en un registro de oración.
  - La puntuación y el orden verbal se adaptan al español natural sin añadir contenido ajeno al griego.
