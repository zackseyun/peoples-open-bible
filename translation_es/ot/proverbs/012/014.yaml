translation:
  language: es
  text: Del fruto de la boca de un hombre se sacia con bien,[a] y la recompensa[b] de las manos de un hombre vuelve a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hombre» en ambos miembros usa términos masculinos singulares de manera genérica; el proverbio expresa una verdad general sobre las personas.'
    reason: cultural_note
  - marker: b
    text: O «la retribución de las manos de un hombre vuelve a él». El hebreo puede destacar lo que las acciones de uno merecen o hacen volver sobre sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּרִי
  english_pob_choice: From the fruit of
  chosen_spanish: Del fruto de
  alternatives_spanish:
  - A partir del fruto de
  - Del producto de
  lexicon: HALOT
  rationale: מִן marca aquí origen o fuente; en español, «del fruto de» conserva la metáfora y expresa que lo que sigue procede de la palabra pronunciada.
- source_word: פִי אִישׁ
  english_pob_choice: a man's mouth
  chosen_spanish: la boca de un hombre
  alternatives_spanish:
  - la boca del hombre
  - la boca de una persona
  lexicon: HALOT
  rationale: El hebreo dice literalmente «boca de un hombre». «Boca» es más natural en español que «mouth» traducido mecánicamente como «boca»? Here it is the normal equivalent; se mantiene el singular genérico masculino de אִישׁ para reflejar el paralelismo y la forma proverbial.
- source_word: יִשְׂבַּע
  english_pob_choice: he is satisfied
  chosen_spanish: se sacia
  alternatives_spanish:
  - será saciado
  - se llena
  lexicon: HALOT
  rationale: שׂבע significa «saciarse, quedar lleno». En un proverbio, el presente gnómico en español comunica bien la verdad general; «se sacia» mantiene la idea de quedar plenamente satisfecho.
- source_word: טוֹב
  english_pob_choice: with good
  chosen_spanish: de bien
  alternatives_spanish:
  - con bien
  - con lo bueno
  - de bondad
  lexicon: HALOT
  rationale: טוֹב abarca bien, bondad, beneficio. «De bien» es conciso y conserva la amplitud semántica sin especificar indebidamente prosperidad material o moral.
- source_word: וּגְמוּל
  english_pob_choice: the recompense
  chosen_spanish: el pago
  alternatives_spanish:
  - la recompensa
  - la retribución
  - el fruto
  lexicon: HALOT
  rationale: גְמוּל puede denotar lo que se devuelve o se da como retribución. «El pago» comunica en español la idea de resultado devuelto/recibido por las acciones, sin reducirlo a mera labor; se preserva la relación causa-efecto del paralelismo.
- source_word: יְדֵי אָדָם
  english_pob_choice: a man's hands
  chosen_spanish: las manos de un hombre
  alternatives_spanish:
  - las manos del hombre
  - las manos humanas
  lexicon: HALOT
  rationale: Literalmente, «manos de un hombre/humano». Se conserva el singular genérico de אָדָם en paralelo con אִישׁ, manteniendo la simetría proverbial y su alcance general.
- source_word: ישוב לו
  english_pob_choice: returns to him
  chosen_spanish: vuelve a él
  alternatives_spanish:
  - regresa a él
  - retorna a él
  lexicon: HALOT
  rationale: שׁוּב significa «volver, regresar». «Vuelve a él» es una formulación natural y breve en español que expresa la verdad proverbial de que lo producido por las manos retorna sobre la persona.
theological_decisions:
- issue: 'Términos genéricos masculinos en la sabiduría proverbial: אִישׁ y אָדָם'
  english_pob_reading: Rendered as singular generic 'a man' in both cola
  chosen_spanish_reading: Se mantiene «un hombre» / «de un hombre» como singular genérico en ambos miembros
  alternative_spanish_readings:
  - una persona
  - alguien
  - ser humano
  rationale: El hebreo usa sustantivos masculinos singulares de manera representativa; la traducción conserva esa forma para no borrar el rasgo formal del proverbio. La aplicación es general, pero la forma queda marcada como masculina genérica, en línea con la política de precisión de género.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: 'Naturaleza de גְּמוּל: resultado, retribución, pago'
  english_pob_reading: The recompense of a man's hands returns to him
  chosen_spanish_reading: Se traduce como «el pago de las manos de un hombre»
  alternative_spanish_readings:
  - la recompensa de las manos de un hombre
  - la retribución de las manos de un hombre
  - lo que las manos de un hombre reciben
  rationale: El término puede enfatizar tanto el mérito/resultado como la retribución. «Pago» comunica la devolución correspondiente a lo hecho sin neutralizar la reciprocidad moral del proverbio; no se reduce a simple trabajo manual.
  doctrine_reference: HALOT; parallelism in Proverbs 12:14
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la segunda cola de «work» a «recompense» por ajustarse mejor a גְּמוּל. En español se reflejó esa precisión con «el pago», manteniendo la idea de retribución/retorno sin caer en una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se preservó la metáfora de fruto/boca y el paralelismo entre boca y manos.
  - Se mantuvo el singular genérico masculino de los dos sustantivos hebreos para respetar la forma del proverbio.
  - La segunda cola deja visible la tensión entre «pago», «recompensa» y «retribución» mediante la nota textual.
  - El tono es bíblico y sobrio, pero con sintaxis española natural.
