translation:
  language: es
  text: 'Y de la tribu de Dan: Eltequé[a] con sus tierras de pasto, y Gibetón con sus tierras de pasto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «su pastizal circundante» o «su tierra común» para מִגְרָשֶׁהָ.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֵּה דָן
  english_pob_choice: the tribe of Dan
  chosen_spanish: la tribu de Dan
  alternatives_spanish:
  - el clan de Dan
  - la vara/ramo de Dan
  lexicon: HALOT
  rationale: En contextos de reparto tribal, מַטֶּה designa la tribu; en español bíblico y moderno, «tribu» comunica con claridad el valor colectivo sin perder el sentido del allotment.
- source_word: אֶלְתְּקֵא
  english_pob_choice: Eltekeh
  chosen_spanish: Eltequé
  alternatives_spanish:
  - Elteke
  lexicon: transliteración estándar
  rationale: Es nombre propio de lugar; se conserva transliterado. La acentuación en español ayuda a la pronunciación natural sin alterar la forma básica del topónimo.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - su tierra de pastoreo
  - su terreno común
  - sus tierras abiertas
  lexicon: HALOT
  rationale: מִגְרָשׁ denota el terreno abierto alrededor de la ciudad, usado para pasto o como terreno común. «Tierras de pasto» mantiene la función y suena natural en español; el posesivo femenino singular se refleja en «sus», referido a la ciudad.
- source_word: גִּבְּתוֹן
  english_pob_choice: Gibbethon
  chosen_spanish: Guitón
  alternatives_spanish:
  - Gibetón
  - Gibeton
  lexicon: transliteración estándar
  rationale: Es nombre propio de lugar y se translitera al español. Se adopta una forma breve y legible, ajustada a la pronunciación probable del topónimo.
- source_word: אֶת
  english_pob_choice: '[direct object marker omitted in English]'
  chosen_spanish: '[omisión en español]'
  alternatives_spanish:
  - —
  lexicon: gramática hebrea
  rationale: El marcador de objeto directo hebreo no tiene equivalente funcional en español y no se expresa en la redacción.
translation_notes:
  revision_awareness: El texto hebreo y el expediente inglés están en alto acuerdo y no muestran revisiones sustantivas aplicadas; por eso se mantiene una solución directa, con sola matización léxica para מִגְרָשׁ.
  spanish_consistency_notes:
  - Se mantiene «tribu» para מַטֵּה por consistencia con el contexto de repartición territorial.
  - Se traduce מִגְרָשׁ con un sintagma natural en español, evitando el calco «pasturas» cuando podría sonar excesivamente técnico o regional.
  - Los nombres propios se conservan en transliteración española sobria, sin sustituirlos por formas tradicionales ajenas al expediente.
