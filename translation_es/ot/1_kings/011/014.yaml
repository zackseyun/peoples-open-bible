translation:
  language: es
  text: Entonces Yahvé levantó un adversario contra Salomón[a], Hadad el edomita; él era de la línea real en Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo satan; aquí significa «adversario» u «oponente», no el nombre propio Satanás.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - suscitó
  - levantó en oposición
  - hizo surgir
  lexicon: HALOT
  rationale: El verbo causativo de קום aquí expresa que Yahvé hizo aparecer a alguien como oposición. En español, «levantó» conserva la acción divina y la idea de suscitar un opositor sin volverlo demasiado interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de transliterar el Nombre divino como «Yahvé», evitando la sustitución por un título y manteniendo la referencia personal del texto hebreo.
- source_word: שָׂטָן
  english_pob_choice: an adversary
  chosen_spanish: un adversario
  alternatives_spanish:
  - un opositor
  - Satanás
  - un enemigo
  lexicon: HALOT
  rationale: Aquí שָׂטָן funciona como sustantivo común, no como nombre propio. «Adversario» conserva la fuerza relacional y la oposición política del contexto.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: against Solomon
  chosen_spanish: contra Salomón
  alternatives_spanish:
  - para Salomón
  - a Salomón
  lexicon: HALOT
  rationale: Con שָׂטָן, la relación es de oposición; «contra» expresa mejor esa fuerza en español que una dativa más neutra.
- source_word: הֲדַד הָאֲדֹמִי
  english_pob_choice: Hadad the Edomite
  chosen_spanish: Hadad el edomita
  alternatives_spanish:
  - Hadad de Edom
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio y se traduce el gentilicio de modo natural y reconocible en español.
- source_word: מִזֶּרַע הַמֶּלֶךְ
  english_pob_choice: of the royal line
  chosen_spanish: de la línea real
  alternatives_spanish:
  - de la descendencia del rey
  - de la estirpe real
  - de la semilla del rey
  lexicon: HALOT
  rationale: La expresión literal «de la semilla del rey» es idiomática de descendencia real. «Línea real» comunica ese valor genealógico en español sin perder la referencia a la realeza.
- source_word: הוּא בֶּאֱדוֹם
  english_pob_choice: in Edom
  chosen_spanish: él era en Edom
  alternatives_spanish:
  - él estaba en Edom
  - él era de Edom
  lexicon: HALOT
  rationale: El pronombre hebreo añade énfasis y la cláusula final sitúa esa descendencia real en Edom. En español, «él era de la línea real en Edom» integra ambos elementos con naturalidad.
theological_decisions:
- issue: Sentido de שָׂטָן en este versículo
  english_pob_reading: common noun ('adversary'), not the personal name Satan
  chosen_spanish_reading: sustantivo común («adversario»), no el nombre propio Satanás
  alternative_spanish_readings:
  - Satanás
  - el acusador
  rationale: El contexto identifica a Hadad como el oponente humano suscitado por Yahvé contra Salomón. Traducirlo como «adversario» evita importar una referencia al diablo que el hebreo no exige aquí y preserva la tensión teológica del texto.
  doctrine_reference: Mantener la lectura contextual del sustantivo común sin resolverla en una identificación demonológica ajena al pasaje.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés, que suavizó la puntuación sin cambiar el contenido: en español se mantuvo la estructura appositiva y se evitó una puntuación más fuerte que alterara el fluir natural del versículo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología del proyecto para יהוה.
  - Se prefirió «adversario» por la fuerza común de שָׂטָן en este contexto.
  - Se mantuvo «edomita» para el gentilicio, conforme al uso bíblico en español.
  - La relación final se resolvió como «de la línea real en Edom» para conservar el matiz genealógico de מִזֶּרַע הַמֶּלֶךְ.
