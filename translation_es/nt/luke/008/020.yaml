translation:
  language: es
  text: 'Y se le informó[a]: «Tu madre y tus hermanos están afuera y quieren verte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes», si ἀδελφοί se entiende en un sentido más amplio por el contexto; el término griego ordinariamente significa «hermanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπηγγέλη
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - le avisaron
  - se le comunicó
  - le dijeron
  lexicon: BDAG
  rationale: El aoristo pasivo de ἀπαγγέλλω expresa que llegó un informe a Jesús. «Se le informó» conserva la pasiva y suena natural en español sin añadir matices de habla directa que el griego no exige.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ funciona aquí como conector narrativo suave. «Y» mantiene el avance de la escena sin cargar el contraste que no está en el contexto inmediato.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - le
  lexicon: BDAG
  rationale: El dativo se refleja en español mediante construcción pronominal indirecta, que expresa con naturalidad que el aviso llegó a Jesús.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: «Madre» conserva el registro digno y directo del relato, sin coloquialismo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  - familiares
  lexicon: BDAG
  rationale: El plural masculino griego corresponde de manera básica a «hermanos». En español, «hermanos» preserva la misma forma lexical y evita expandir el alcance más allá del texto.
- source_word: ἑστήκασιν
  english_pob_choice: are standing
  chosen_spanish: están
  alternatives_spanish:
  - están de pie
  - permanecen
  - han estado
  lexicon: BDAG
  rationale: El perfecto de ἵστημι tiene fuerza de estado resultante. En español, «están» comunica que se hallan en esa posición, con la continuidad implícita que el contexto aporta.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en la calle
  lexicon: BDAG
  rationale: «Afuera» reproduce el adverbio espacial de forma natural y concisa, sin especificar un lugar que el griego no detalla.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: verte
  alternatives_spanish:
  - verte
  - verte a ti
  - hablar contigo
  lexicon: BDAG
  rationale: 'El infinitivo de ὁράω significa básicamente «ver». En este contexto, el complemento directo con pronombre enclítico en español mantiene la relación personal: quieren ver a Jesús.'
- source_word: θέλοντες
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo ver
  - con deseo de
  lexicon: BDAG
  rationale: El participio presente expresa una acción concomitante. «Queriendo» conserva ese valor aspectual en español de manera idiomática.
theological_decisions:
- issue: Referencia de «hermanos» respecto de la familia de Jesús
  english_pob_reading: Render ἀδελφοί as 'brothers' without interpretive expansion.
  chosen_spanish_reading: Traducir ἀδελφοί como «hermanos» sin expansión interpretativa.
  alternative_spanish_readings:
  - parientes
  - familiares
  - hermanos y hermanas
  rationale: El versículo usa el término ordinario ἀδελφοί. Dado que las discusiones sobre la familia de Jesús exceden este pasaje, la traducción conserva la tensión lexical y no la resuelve con una paráfrasis armonizadora.
  doctrine_reference: Preservar la tensión teológica; priorizar precisión lexical sobre neutralización interpretativa.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue en acuerdo alto con la auditoría inglesa y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no lo contiene.
  - Se conserva «hermanos» por fidelidad al término griego y para no borrar la tensión documentada sobre el alcance de ἀδελφοί.
  - El verbo español «se le informó» refleja la pasiva griega sin volverla una formulación más libre como «le avisaron».
