  glossary_alignment: 'Se alinea bien con los términos del proyecto: «Yahvé», «Dios», «espíritu» en minúscula, «carne». No hay conflicto con los defaults. La excepción necesaria es estilística: sustituir «ayudador» por «el que ayuda» para fidelidad funcional en español.'
