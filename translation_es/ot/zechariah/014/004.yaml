revisions:
- from: En aquel día sus pies se afirmarán sobre el monte de los Olivos[a], que está delante de Jerusalén, al oriente; y el monte de los Olivos se partirá por la mitad, de oriente a occidente, en un valle muy grande[b], y la mitad del monte se moverá hacia el norte y la otra mitad hacia el sur.
  to: En aquel día sus pies estarán sobre el Monte de los Olivos[a], que está delante de Jerusalén, al oriente; y el Monte de los Olivos se partirá por la mitad, de oriente a occidente, en un valle muy grande[b], y la mitad del monte se moverá hacia el norte y la otra mitad hacia el sur.
  rationale: Se reemplazó «se afirmarán» por «estarán» para reflejar con más precisión y naturalidad el valor de וְעָמְדוּ sin añadir matiz de afianzamiento. Se capitalizó «Monte de los Olivos» como topónimo establecido. Se ajustó la nota [b] para apegarse mejor a la descripción hebrea de la partición del monte y el apartamiento de sus mitades.
  reviewer_model: gpt-5.4
