review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no preserva fielmente dos decisiones clave del hebreo y del rastro de auditoría POB. El texto fuente dice solo יֵאָסֵף, 'será reunido', sin complemento expreso; el borrador añade 'con sus padres', importando una expansión no presente en este versículo. Además, la nota [a] se contradice al decir primero 'sus vestiduras' y luego que el hebreo dice 'sus prendas'; debe aclarar que el hebreo dice simplemente 'sus vestiduras/ropa', no 'vestiduras sacerdotales'. El resto del mandato y la secuencia verbal están bien encaminados.
  spanish_quality_summary: El español es claro y digno, pero 'vístelas a Eleazar' suena menos natural que 'ponlas sobre Eleazar' o 'viste con ellas a Eleazar'. También conviene evitar la coma en 'Eleazar, su hijo' en flujo bíblico directo. 'Despoja' es aceptable y solemne. La revisión puede mejorar naturalidad sin perder precisión.
  glossary_alignment: No hay conflictos con términos doctrinales mayores del glosario. El punto principal es mantener el idiomático hebreo de muerte como 'será reunido', sin expandirlo a 'con sus padres' ni a 'con su pueblo' en el cuerpo del texto, en línea con la decisión léxica y teológica documentada por el POB inglés.
  issues:
  - severity: high
    issue: Se añadió 'con sus padres' en el texto principal.
    rationale: El hebreo dice solo יֵאָסֵף, 'será reunido'. La expansión 'con sus padres' no está en este versículo y contradice la decisión auditada de conservar el idiomático sin completarlo.
  - severity: medium
    issue: La nota [b] interpreta de más al hablar del 'sentido completo'.
    rationale: La nota puede explicar que es un modismo de muerte y mencionar expresiones más plenas en otros pasajes, pero no debe sugerir que este versículo incluya explícitamente ese complemento.
  - severity: medium
    issue: La nota [a] es internamente inconsistente.
    rationale: 'Dice ''Más literalmente, sus vestiduras'' pero luego afirma que el hebreo dice ''sus prendas''. Debe formularse de modo estable: el hebreo dice simplemente ''sus vestiduras/ropa'', y ''sacerdotales'' sería una explicitación contextual.'
  - severity: low
    issue: '''Vístelas a Eleazar'' es algo forzado en español.'
    rationale: Aunque comprensible, suena menos natural que una formulación como 'ponlas sobre Eleazar, su hijo' o 'viste con ellas a Eleazar, su hijo', que expresa mejor la transferencia de las vestiduras.
  revised_spanish_text: Despoja a Aarón de sus vestiduras[a] y ponlas sobre Eleazar su hijo. Luego Aarón será reunido[b] y morirá allí.
