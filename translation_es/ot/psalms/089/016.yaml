revisions:
- from: ¡Bienaventurado el pueblo que conoce la aclamación festiva[a]! Oh Yahvé[b], andan en la luz de tu rostro.
  to: Bienaventurado es el pueblo que conoce la aclamación festiva[a]; Yahvé[b], andan en la luz de tu rostro.
  rationale: Se ajusta la apertura a una bienaventuranza española más natural y fiel a אַשְׁרֵי; se mejora la nota de תְּרוּעָה para conservar la alternativa léxica real documentada por el POB inglés; y se simplifica el vocativo con «Yahvé» para una lectura más idiomática sin perder el nombre divino ni la dirección directa. No se requiere adjudicación adicional porque los cambios son menores y están bien sustentados por el expediente.
  reviewer_model: gpt-5.4
