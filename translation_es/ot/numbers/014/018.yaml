    reason: lexical_alternative
  - marker: c
    text: Or 'he will certainly not leave unpunished' or 'he will not acquit.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'to the third and to the fourth' refers to generations.
    reason: cultural_note
