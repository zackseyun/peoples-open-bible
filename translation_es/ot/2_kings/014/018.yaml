- from: Ahora, ¿no están escritas las demás acciones de Amasías[a] en el Libro de las Crónicas de los reyes de Judá?
  to: Los demás hechos de Amasías[a], ¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  rationale: Se reordena la oración para reflejar mejor la fórmula hebrea de resumen regio, se sustituye 'acciones' por 'hechos' por mayor naturalidad historiográfica en español, y se mantiene la pregunta retórica archivística y la nota alternativa ya documentada.
