translation:
  language: es
  text: Aunque ayunen[a], no oigo su clamor; y aunque ofrezcan holocausto y ofrenda[b] de cereal, no los acepto[c]. Más bien, por la espada, por el hambre y por la pestilencia[d] los estoy consumiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aunque estén ayunando».'
    reason: alternative_reading
  - marker: b
    text: 'O: «ofrenda vegetal»; aquí «ofrenda de cereal» traduce el sentido cultual de מִנְחָה.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no me complazco en ellos» o «no los favorezco».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «plaga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצֻמוּ
  english_pob_choice: they fast
  chosen_spanish: ayunen
  alternatives_spanish:
  - estén ayunando
  - hagan ayuno
  lexicon: HALOT
  rationale: El imperfecto verbal en este contexto concesivo expresa la acción de ayunar como hecho hipotético o reiterado. En español, 'aunque ayunen' suena natural y conserva la fuerza concesiva del hebreo mejor que una perífrasis más pesada.
- source_word: אֵינֶנִּי שֹׁמֵעַ אֶל רִנָּתָם
  english_pob_choice: I do not hear their cry
  chosen_spanish: no oigo su clamor
  alternatives_spanish:
  - no escucho su clamor
  - no presto atención a su clamor
  - no oigo su grito
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de no atender la súplica. 'Clamor' transmite el alcance de רִנָּה en un contexto de petición y lamentación, mientras que 'oigo' sigue de cerca la revisión inglesa más literal.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: HALOT
  rationale: '''Holocausto'' es el término bíblico y cultual más asentado en español para עֹלָה. Aunque hoy puede tener asociaciones extra-bíblicas, aquí sigue siendo la traducción más precisa y tradicionalmente inteligible.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda vegetal
  - ofrenda de grano
  - tributo
  lexicon: HALOT
  rationale: Se evita 'tributo' como opción demasiado amplia y se opta por 'ofrenda de cereal' para comunicar la ofrenda cultual de producto vegetal. Es una equivalencia clara en español moderno sin perder el referente sacrificial.
- source_word: רֹצָם
  english_pob_choice: I do not accept them
  chosen_spanish: no los acepto
  alternatives_spanish:
  - no me complazco en ellos
  - no los favorezco
  - no los recibo con agrado
  lexicon: HALOT
  rationale: Se mantiene la aceptación desfavorable del contexto sacrificial. 'No los acepto' reproduce con claridad la negativa divina y permite que el pronombre refiera naturalmente a las ofrendas, como en la auditoría inglesa.
- source_word: בַּחֶרֶב וּבָרָעָב וּבַדֶּבֶר
  english_pob_choice: by the sword, by famine, and by pestilence
  chosen_spanish: por espada, por hambre y por pestilencia
  alternatives_spanish:
  - a espada, al hambre y a la pestilencia
  - con espada, hambre y pestilencia
  - por la espada, por el hambre y por la peste
  lexicon: HALOT
  rationale: Se conserva la tríada profética de juicio con un estilo sobrio y directo. 'Pestilencia' mantiene el peso formal del término hebreo, y 'hambre' es la forma española natural del juicio expresado por רעב.
- source_word: אָנֹכִי מְכַלֶּה אוֹתָם
  english_pob_choice: I am consuming them
  chosen_spanish: los estoy consumiendo
  alternatives_spanish:
  - los estoy destruyendo
  - los estoy acabando
  - los consumiré
  lexicon: HALOT
  rationale: El participio intensivo/durativo se refleja con una perífrasis progresiva. 'Consumiendo' conserva la fuerza léxica de כלה sin convertirla en una simple promesa futura ni debilitar su aspecto de acción en curso.
theological_decisions:
- issue: Rechazo divino de ayuno y sacrificios en contexto de juicio
  english_pob_reading: The verse states that fasting and sacrificial offerings from this people will not be heard or accepted, because God is judging them.
  chosen_spanish_reading: El texto afirma que el ayuno y las ofrendas sacrificiales de este pueblo no serán atendidos ni aceptados, porque Yahvé está ejerciendo juicio contra ellos.
  alternative_spanish_readings:
  - El rechazo se limita solo al clamor, no a las ofrendas.
  - La negativa divina es temporal y no enfatiza el juicio.
  rationale: La estructura paralela rechaza tanto el clamor como las ofrendas, y la cláusula final fundamenta esa negativa en instrumentos concretos de juicio. La redacción española sigue esa relación causal sin añadir doctrina ajena al versículo.
  doctrine_reference: Jeremías 14:12; decisión de traducción sobre paralelo de juicio y culto
- issue: Referencia del pronombre en 'no los acepto'
  english_pob_reading: The pronoun is rendered as referring to the offered sacrifices in immediate context.
  chosen_spanish_reading: El pronombre se entiende principalmente de los sacrificios ofrecidos en el contexto inmediato.
  alternative_spanish_readings:
  - El pronombre se refiere al pueblo mismo.
  - El pronombre abarca tanto las ofrendas como a los oferentes.
  rationale: En español, 'los' puede referirse de modo natural a las ofrendas mencionadas inmediatamente antes. Esa solución conserva la ambigüedad controlada del hebreo y permite el alcance teológico más amplio sin explicitarlo en exceso.
  doctrine_reference: Jeremías 14:12; antecedente inmediato y ambigüedad referencial
- issue: Relación de 'pestilencia' con el juicio profético
  english_pob_reading: '''Pestilence'' may also be rendered ''plague.'''
  chosen_spanish_reading: '''Pestilencia'' mantiene el tono profético-formal; ''plaga'' queda como posible alternativa interpretativa.'
  alternative_spanish_readings:
  - plaga
  - epidemia
  rationale: En castellano bíblico, 'pestilencia' comunica la gravedad del juicio con mayor continuidad terminológica. Se preserva así la tríada clásica sin banalizar el término ni reducirlo a una noción meramente médica.
  doctrine_reference: Jeremías 14:12; fórmula de juicio profético
translation_notes:
  revision_awareness: La auditoría inglesa revisó 'I am not listening to their cry' a 'I do not hear their cry' por mayor precisión y registro más formal. En español se refleja esa preferencia con 'no oigo su clamor', manteniendo la lectura concesiva de 'aunque' y la secuencia final de juicio sin introducir cambios no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino según el estándar del proyecto, aunque este versículo no lo explicita en el texto hebreo.
  - '''Holocausto'' se conserva por fidelidad cultual y uso bíblico estable en español.'
  - '''Ofrenda de cereal'' se elige para מִנְחָה en este contexto sacrificial; no se usa ''tributo'' porque aquí la ofrenda es claramente cultual.'
  - La sintaxis conserva la estructura concesiva doble del hebreo y el cierre causal de juicio.
  - Se mantiene la tríada 'espada, hambre y pestilencia' como fórmula profética reconocible y formal.
