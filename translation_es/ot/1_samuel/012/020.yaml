revisions:
- from: 'Y Samuel dijo al pueblo[a]: «No teman. Ustedes han hecho todo este mal. Pero no se desvíen de seguir a Yahvé[b], sino sirvan a Yahvé con todo su corazón».'
  to: 'Y Samuel dijo al pueblo[a]: «No tengan miedo. Ustedes han hecho todo este mal. Pero no se aparten de ir en pos de Yahvé[b]; más bien, sirvan a Yahvé con todo su corazón».'
  rationale: Se ajusta la frase inicial a «No tengan miedo» para que la nota [a] preserve correctamente la alternativa «No teman», en línea con el audit trail del inglés POB. También se mejora la naturalidad española de la exhortación central con «no se aparten de ir en pos de Yahvé; más bien, sirvan a Yahvé», que conserva la imagen relacional del hebreo מֵאַחֲרֵי יְהוָה y evita una construcción forzada tras «sino».
  reviewer_model: gpt-5.4
