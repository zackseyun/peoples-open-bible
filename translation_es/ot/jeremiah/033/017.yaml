translation:
  language: es
  text: 'Porque así dice Yahvé: David nunca carecerá de un hombre que se siente sobre el trono de la casa de Israel[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no será cortado para David un hombre sentado sobre el trono de la casa de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O simplemente: «sobre el trono de Israel». El hebreo dice «la casa de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduzco la declaración como fundamento de la promesa anterior. En español, «Porque» suena natural y conserva la función conectiva causal/explicativa de כִּי en este contexto profético.
- source_word: כֹה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así ha dicho Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Mantengo la fórmula profética solemne y directa. «Ha dicho» refleja bien la declaración establecida; «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: לֹא יִכָּרֵת
  english_pob_choice: shall never lack
  chosen_spanish: nunca carecerá
  alternatives_spanish:
  - nunca será cortado
  - nunca dejará de tener
  lexicon: HALOT
  rationale: El hebreo usa literalmente la idea de «ser cortado», pero en esta construcción expresa ausencia de una línea o representante. «Nunca carecerá» comunica el sentido idiomático en español sin borrar el trasfondo verbal del original.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - para David
  - a David
  lexicon: HALOT
  rationale: 'La relación marcada por ל aquí pertenece al modismo hebreo; en español conviene integrar el nombre como sujeto lógico de la promesa: David no carecerá de...'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de alguien
  - de un varón
  lexicon: HALOT
  rationale: Conservo el singular masculino del hebreo. En castellano, «un hombre» es el equivalente más directo y mantiene la fuerza dinástica del sustantivo.
- source_word: יֹשֵׁב
  english_pob_choice: to sit
  chosen_spanish: que se siente
  alternatives_spanish:
  - sentado
  - que ocupa
  lexicon: HALOT
  rationale: El participio describe la función real continua del heredero. En español, la subordinada relativa «que se siente» expresa bien esa acción habitual sobre el trono.
- source_word: עַל כִּסֵּא
  english_pob_choice: on the throne
  chosen_spanish: sobre el trono
  alternatives_spanish:
  - en el trono
  - sobre un trono
  lexicon: HALOT
  rationale: El trono es real y definido por el contexto; «sobre el trono» conserva el valor literal de עַל y suena natural en español bíblico contemporáneo.
- source_word: בֵית יִשְׂרָאֵל
  english_pob_choice: of the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de Israel
  - sobre la casa de Israel
  lexicon: HALOT
  rationale: Retengo la expresión completa «casa de Israel», porque el hebreo la presenta explícitamente y tiene valor pactual y nacional. No la simplifico a «Israel» en el texto principal.
theological_decisions:
- issue: Promesa dinástica davídica
  english_pob_reading: The verse promises an enduring Davidic royal line without specifying here the exact historical or messianic mechanism.
  chosen_spanish_reading: El versículo promete una continuidad real davídica sin precisar aquí el mecanismo histórico exacto ni cerrarlo exclusivamente en una sola lectura mesiánica.
  alternative_spanish_readings:
  - Promesa solo de sucesión histórica inmediata
  - Profecía exclusivamente mesiánica de un rey final
  rationale: La forma hebrea afirma que David no quedará sin un hombre sentado en el trono. La traducción mantiene esa formulación dinámica de sucesión real y no fuerza una resolución interpretativa que el texto no explicita.
  doctrine_reference: Conservar la tensión teológica documentada sin resolverla prematuramente.
translation_notes:
  revision_awareness: La versión coincide con el alto acuerdo del control previo y no requiere cambios sustanciales; se mantiene la equivalencia óptima sin perder el modismo hebreo de la sucesión davídica.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «casa de Israel» en vez de reducirlo a «Israel», porque el hebreo lo expresa explícitamente.
  - «Nunca carecerá» traduce el valor idiomático de לֹא יִכָּרֵת sin volverlo una paráfrasis excesiva.
  - El singular «un hombre» mantiene la forma del hebreo y la referencia dinástica implícita.
