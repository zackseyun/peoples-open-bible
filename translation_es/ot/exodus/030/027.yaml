  source_alignment_summary: 'El borrador refleja bien la enumeración hebrea: la mesa, todos sus utensilios, la lámpara/candelabro con sus utensilios, y el altar del incienso. La principal desalineación está en la nota al pie: el marcador [a] está anclado en «utensilios», pero la alternativa inglesa y la decisión léxica correspondiente pertenecen a מִזְבַּח הַקְּטֹרֶת («altar de incienso / altar del incienso»), no a «utensilios».'
  spanish_quality_summary: El español es claro y natural. «La mesa», «sus utensilios» y «el altar del incienso» son buenas opciones. «El candelabro» es aceptable y legible, aunque «el soporte de lámparas» sería más técnico; no hace falta cambiarlo. Sí hace falta corregir la ubicación y formulación de la nota para que no cree confusión.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas concuerdan con el rastro POB salvo por la nota mal ubicada. La alternativa española correcta para מִזְבַּח הַקְּטֹרֶת sería «el altar de incienso» frente al principal «el altar del incienso».
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «utensilios» pero su contenido trata del «altar del incienso».
    rationale: El English POB conserva una alternativa léxica para מִזְבַּח הַקְּטֹרֶת («the incense altar»), no para כָּל כֵּלָיו. En español, mantener la nota en «utensilios» distorsiona qué palabra o frase tiene la alternativa.
