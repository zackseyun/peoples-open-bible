translation:
  language: es
  text: Aunque fructifique entre hermanos[a], vendrá un viento del oriente, el viento de Yahvé, que sube del desierto; se secará su manantial y se agotará su fuente[b]; saqueará la tesorería de toda vasija preciosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque es fecundo entre hermanos». El hebreo también puede leerse de manera más formal, pero el contexto favorece un sentido concesivo: aunque Efraín parezca próspero, viene el juicio.'
    reason: lexical_alternative
  - marker: b
    text: «Viento de Yahvé» también podría entenderse como «aliento de Yahvé»; aquí se prefiere «viento» por el paralelo con «viento del oriente» y con «que sube del desierto».
    reason: alternative_reading
  - marker: c
    text: 'O: «él saqueará la tesorería de toda vasija preciosa». El sujeto del verbo puede entenderse como el viento del oriente o, menos probablemente, como Efraín o un atacante personificado.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Porque
  - Pues
  - Aun cuando
  lexicon: HALOT
  rationale: 'En este contexto, כִּי introduce una concesión: pese a la aparente prosperidad, viene el juicio. «Aunque» reproduce mejor ese giro que una causal simple.'
- source_word: בֵּן אַחִים
  english_pob_choice: among brothers
  chosen_spanish: entre hermanos
  alternatives_spanish:
  - entre sus hermanos
  - como hijo entre hermanos
  - entre el grupo de hermanos
  lexicon: HALOT
  rationale: La imagen es idiomática y expresa pertenencia a un grupo fraternal. «Entre hermanos» suena natural en español y conserva la relación familiar sin forzar el hebreo.
- source_word: יַפְרִיא
  english_pob_choice: may flourish
  chosen_spanish: fructifique
  alternatives_spanish:
  - florezca
  - sea fecundo
  - prospera
  lexicon: HALOT
  rationale: El verbo hiphil de פרה tiene la idea de dar fruto, prosperar. «Fructifique» preserva la metáfora de fecundidad y encaja bien con la concesión.
- source_word: קָדִים
  english_pob_choice: east wind
  chosen_spanish: un viento del oriente
  alternatives_spanish:
  - un viento de oriente
  - un viento oriental
  lexicon: HALOT
  rationale: «Viento del oriente» conserva el valor meteorológico y profético tradicional del קָדִים. Se evita una expresión demasiado técnica o moderna.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the wind of Yahweh
  chosen_spanish: el viento de Yahvé
  alternatives_spanish:
  - el aliento de Yahvé
  - el espíritu de Yahvé
  lexicon: HALOT
  rationale: Aquí רוּחַ funciona en sentido meteorológico, en paralelo con «viento del oriente» y con la idea de que sube del desierto. Se mantiene la agencia divina con «de Yahvé» sin convertirlo en «Espíritu».
- source_word: מִמִּדְבָּר עֹלֶה
  english_pob_choice: rising from the wilderness
  chosen_spanish: que sube del desierto
  alternatives_spanish:
  - que viene del desierto
  - que asciende del desierto
  lexicon: HALOT
  rationale: «Sube del desierto» sigue de cerca el participio y conserva la vividez del movimiento ascendente. «Desierto» es el equivalente normal y claro para מִדְבָּר.
- source_word: מְקוֹרוֹ
  english_pob_choice: his spring
  chosen_spanish: su manantial
  alternatives_spanish:
  - su fuente
  - su naciente
  lexicon: HALOT
  rationale: מָקוֹר denota una fuente de agua; «manantial» es concreto y se ajusta bien al paralelismo acuático del versículo.
- source_word: וְיֵבֹשׁ
  english_pob_choice: will dry up
  chosen_spanish: se secará
  alternatives_spanish:
  - se resecará
  - se agotará
  - se secará por completo
  lexicon: HALOT
  rationale: La expresión natural en español para la desaparición del agua es «se secará». Mantiene el sentido de la fuente que deja de dar agua.
- source_word: מַעְיָנוֹ
  english_pob_choice: his fountain
  chosen_spanish: su fuente
  alternatives_spanish:
  - su manantial
  - su pozo
  - su resorte
  lexicon: HALOT
  rationale: Se conserva el segundo término de agua con una palabra distinta pero equivalente en español, para respetar el paralelismo hebreo sin sonar forzado.
- source_word: וְיֶחֱרַב
  english_pob_choice: will be dried up
  chosen_spanish: se agotará
  alternatives_spanish:
  - se secará
  - quedará árida
  - se consumirá
  lexicon: HALOT
  rationale: En el contexto del agua, «se agotará» comunica que la fuente queda sin caudal. Mantiene la idea de ruina hídrica sin redundar excesivamente con el miembro anterior.
- source_word: יִשְׁסֶה
  english_pob_choice: it will plunder
  chosen_spanish: saqueará
  alternatives_spanish:
  - despojará
  - robará
  - saqueará el
  lexicon: HALOT
  rationale: El verbo expresa despojo/plundering. «Saqueará» mantiene la fuerza violenta del hebreo y permite tomar como sujeto al viento ya mencionado, conforme al contexto.
- source_word: אוֹצַר
  english_pob_choice: the treasury
  chosen_spanish: el tesoro
  alternatives_spanish:
  - el depósito
  - la tesorería
  - el almacén
  lexicon: HALOT
  rationale: אוֹצָר puede significar tesoro o depósito de objetos valiosos. «Tesoro» es fiel, claro y encaja con el campo semántico de bienes preciosos.
- source_word: כְּלִי חֶמְדָּה
  english_pob_choice: every precious vessel
  chosen_spanish: todo objeto precioso
  alternatives_spanish:
  - todo vaso precioso
  - todo utensilio precioso
  - cada objeto deseable
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto/utensilio/vasija; en español «objeto precioso» preserva la amplitud y el valor apreciado sin restringir indebidamente a recipientes.
theological_decisions:
- issue: Agencia del viento destructivo
  english_pob_reading: The east wind is presented as the LORD's wind, indicating divine judgment mediated through natural/historical means.
  chosen_spanish_reading: El viento del oriente aparece como el viento de Yahvé, señalando juicio divino mediado por un fenómeno natural.
  alternative_spanish_readings:
  - El Espíritu de Yahvé como agente personal distinto
  - El viento del Señor sin nombrar explícitamente a Yahvé
  rationale: El paralelismo con «viento del oriente» y «que sube del desierto» favorece una lectura meteorológica. La mención de Yahvé mantiene la soberanía divina sin exigir una lectura pneumatológica que el texto no demanda.
  doctrine_reference: Poética profética; distinción de רוּחַ por contexto
- issue: Sujeto de «saqueará»
  english_pob_reading: The subject may be understood as the east wind or, less likely, the personified Ephraim/attacker.
  chosen_spanish_reading: Se deja abierto que el sujeto sea el viento ya nombrado, aunque la sintaxis hebrea permite alguna ambigüedad.
  alternative_spanish_readings:
  - «él saqueará» con sujeto personal implícito
  - «saqueará el viento» explicitándolo en el texto
  rationale: La lectura más coherente con la secuencia imagética es que el mismo viento despoja. El español conserva la ambigüedad del hebreo sin resolverla de manera artificial.
  doctrine_reference: Ambigüedad sintáctica del verbo final
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que fijó «Yahweh», «be dried up» y «treasury». En español se mantuvo la decisión de nombrar el nombre divino como «Yahvé», se evitó una calca rígida de la secuencia verbal y se conservó la imagen de doble fuente de agua. También se respetó la ambigüedad del sujeto final, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «viento» para רוּחַ en este contexto, no «Espíritu», por el paralelismo meteorológico.
  - «Entre hermanos» conserva la idiomaticidad sin perder la referencia fraternal del hebreo.
  - «Tesoro» y «objeto precioso» preservan el campo semántico de objetos valiosos sin reducir כְּלִי a una sola clase de recipientes.
  - La puntuación con punto y coma y guiones busca reflejar el encadenamiento poético del hebreo y la lectura auditada en inglés.
