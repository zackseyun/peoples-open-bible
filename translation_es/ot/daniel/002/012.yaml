translation:
  language: es
  text: Por esto[a], el rey se enfureció y se llenó de gran ira, y ordenó[b] destruir a todos los sabios de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esta razón» o «Por tanto».'
    reason: lexical_alternative
  - marker: b
    text: El verbo es literalmente «dijo», pero aquí introduce un decreto real; por eso se traduce «ordenó».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל קֳבֵל דְּנָה
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por esta razón
  - Por tanto
  - A causa de esto
  lexicon: HALOT
  rationale: La expresión aramea es causal. «Por esto» conserva la relación explícita con el contexto inmediato y suena natural en español bíblico moderno.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  - el monarca
  lexicon: HALOT
  rationale: El término designa al gobernante; «rey» es la equivalencia directa y estándar en español bíblico.
- source_word: בְּנַס
  english_pob_choice: became furious
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se puso furioso
  - se irritó
  - ardió de furor
  lexicon: HALOT
  rationale: El verbo expresa llegar a un estado de ira intensa. «Se enfureció» preserva la fuerza emocional del contexto narrativo.
- source_word: וּקְצַף שַׂגִּיא
  english_pob_choice: and very enraged
  chosen_spanish: y se irritó muchísimo
  alternatives_spanish:
  - y se enfureció muchísimo
  - y se airó en gran manera
  - y se llenó de gran ira
  lexicon: HALOT
  rationale: קצף es «enfadarse/airarse» y שׂגיא intensifica el grado. «Se irritó muchísimo» refleja la acumulación semítica de ira sin repetir de forma torpe el mismo verbo base.
- source_word: וַאֲמַר
  english_pob_choice: and he commanded
  chosen_spanish: y ordenó
  alternatives_spanish:
  - y mandó
  - y dio la orden
  lexicon: HALOT
  rationale: Aunque la forma verbal dice literalmente «dijo», en este contexto introduce una orden real. «Ordenó» preserva la fuerza pragmática reconocida por la POB inglesa.
- source_word: לְהוֹבָדָה
  english_pob_choice: that ... be destroyed
  chosen_spanish: destruir
  alternatives_spanish:
  - que fueran destruidos
  - hacer morir
  - acabar con
  lexicon: HALOT
  rationale: La forma causativa/infinitiva de אבד comunica hacer perecer o destruir. En español, el infinitivo dependiente de «ordenó» expresa bien el decreto sin añadir interpretación innecesaria.
- source_word: לְכֹל חַכִּימֵי בָבֶל
  english_pob_choice: all the wise men of Babylon
  chosen_spanish: a todos los sabios de Babilonia
  alternatives_spanish:
  - a todos los sabios de Babilonia
  - a todos los hombres sabios de Babilonia
  lexicon: HALOT
  rationale: «Sabios» es el equivalente contextual para la clase cortesana de consejeros y expertos. Se mantiene «de Babilonia» como genitivo de procedencia/ámbito.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó el segundo calificativo de ira de «very angry» a «very enraged». Por eso el español distingue dos escalones: «se enfureció» y «se irritó muchísimo», manteniendo la intensificación acumulativa del hebreo/arameo sin depender de una repetición plana.'
  spanish_consistency_notes:
  - Se preservó el nombre «Babilonia» y no se empleó una paráfrasis culturalizante.
  - Se evitó «SEÑOR» o terminología no pertinente, porque el versículo no contiene el tetragrámaton ni un título divino.
  - La secuencia verbal en español respeta el tono de decreto real reconocido en la auditoría inglesa.
