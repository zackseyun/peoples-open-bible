base_translation:
  language: en
  yaml_path: translation/ot/genesis/030/001.yaml
  text: When Rachel saw that she had borne no children to Jacob[a], she became jealous of her sister, and she said to Jacob, “Give me children[b], or I will die!”
  footnotes:
  - marker: a
    text: Hebrew 'sons'; here rendered 'children' because the context is Rachel's desire to bear offspring generally, not necessarily to specify male children.
    reason: lexical_alternative
  - marker: b
    text: Or 'Rachel became jealous'.
    reason: previous_rendering
