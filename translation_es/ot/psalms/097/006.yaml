translation:
  language: es
  text: Los cielos declaran su rectitud[a], y todos los pueblos ven su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia». El término hebreo puede denotar tanto rectitud como justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּידוּ
  english_pob_choice: declare
  chosen_spanish: declaran
  alternatives_spanish:
  - proclaman
  - anuncian
  - dan a conocer
  lexicon: HALOT
  rationale: El verbo en hifil expresa hacer saber o declarar. «Declaran» conserva la fuerza poética y la proclamación pública sin sonar forzado en español.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos arriba
  lexicon: HALOT
  rationale: En este contexto poético y cósmico, «los cielos» preserva el registro elevado de הַשָּׁמַיִם y funciona naturalmente en español bíblico contemporáneo.
- source_word: צִדְקוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia/righteousness
  lexicon: HALOT
  rationale: El hebreo צֶדֶק/צְדָקָה puede abarcar tanto justicia como rectitud/righteousness. Se eligió «justicia» porque en español refleja bien el campo semántico legal y moral, y la nota preserva la alternativa. La tensión no se aplana, sino que se documenta.
- source_word: וְרָאוּ
  english_pob_choice: and all the peoples see
  chosen_spanish: y todos los pueblos ven
  alternatives_spanish:
  - y todos los pueblos han visto
  - y todos los pueblos verán
  lexicon: HALOT
  rationale: El perfecto poético puede leerse de manera vívida o general. «Ven» comunica la fuerza presente y universal del enunciado en español sin perder el carácter poético.
- source_word: כָל הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos
  lexicon: HALOT
  rationale: «Pueblos» reproduce con más precisión el plural hebreo עַמִּים y evita restringir innecesariamente el sentido a unidades políticas modernas.
- source_word: כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su honor
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia más estable para כָּבוֹד en referencia divina y mantiene el sentido de majestad manifiesta.
theological_decisions:
- issue: Tensión semántica de צִדְקוֹ entre “justicia” y “righteousness/rectitud”
  english_pob_reading: The heavens declare his righteousness[a]. Or "his justice." The Hebrew term can denote both righteousness and justice.
  chosen_spanish_reading: Los cielos declaran su justicia.
  alternative_spanish_readings:
  - Los cielos declaran su rectitud.
  - Los cielos declaran su justicia/rectitud.
  rationale: La elección principal «justicia» es plenamente legítima para צִדְקוֹ y resulta natural en español. La nota conserva explícitamente que el término hebreo puede significar también «rectitud» o «righteousness», manteniendo la tensión lexical documentada por el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; keep documented lexical alternatives when both senses are plausible.'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directamente y se mantuvo la decisión auditada del POB inglés para צִדְקוֹ, conservando en español la tensión entre justicia y rectitud sin reducirla a una sola idea cerrada.
  spanish_consistency_notes:
  - Se prefirió «los cielos» para mantener el registro poético elevado de שָׁמַיִם.
  - Se usó «pueblos» para reflejar el plural hebreo עַמִּים con alcance universal.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton; el posesivo «su» remite naturalmente a Dios en el contexto.
  - La puntuación sigue el paralelismo poético del hebreo y la estructura del inglés auditado.
