translation:
  language: es
  text: Ellos custodiarán[a] todos los utensilios[b] de la tienda de reunión, y el deber[c] de los hijos de Israel, para realizar[d] el servicio del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mantendrán la custodia de".
    reason: lexical_alternative
  - marker: b
    text: O "objetos" o "enseres".
    reason: lexical_alternative
  - marker: c
    text: O "la responsabilidad" o "el encargo".
    reason: lexical_alternative
  - marker: d
    text: O "para servir en".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  english_pob_choice: They shall keep charge of
  chosen_spanish: custodiarán
  alternatives_spanish:
  - guardarán
  - mantendrán la custodia de
  - velarán por
  lexicon: HALOT
  rationale: En un contexto sacerdotal y cultual, שׁמר no es solo 'vigilar', sino asumir una custodia o encargo. 'Custodiarán' comunica bien esa responsabilidad asignada sin sonar tan repetitivo como una calca de 'guardar cargo'.
- source_word: כָּל כְּלֵי אֹהֶל מוֹעֵד
  english_pob_choice: all the furnishings of the tent of meeting
  chosen_spanish: todos los utensilios del tabernáculo de reunión
  alternatives_spanish:
  - todos los objetos del tabernáculo de reunión
  - todos los enseres de la tienda de reunión
  - todos los muebles del tabernáculo de reunión
  lexicon: HALOT
  rationale: כְּלִים puede abarcar utensilios, objetos o implementos. 'Utensilios' preserva el valor material y funcional para el culto; 'muebles' sería demasiado estrecho en español y 'furnishings' no es natural en este contexto.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: tabernáculo de reunión
  alternatives_spanish:
  - tienda de reunión
  - tienda del encuentro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'tienda de reunión', en español bíblico 'tabernáculo' identifica de manera clara el santuario del desierto. Se mantiene 'de reunión' para no perder el sentido de encuentro señalado por מוֹעֵד.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the duty
  chosen_spanish: el deber
  alternatives_spanish:
  - la responsabilidad
  - la custodia
  - el encargo
  lexicon: HALOT
  rationale: La POB en inglés pasó de 'obligation' a 'duty' por naturalidad. En español, 'deber' reproduce bien la idea de función asignada o responsabilidad encomendada, sin reducirla a mera obligación jurídica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma masculina y corporativa del hebreo, equivalente al criterio de la POB en inglés. 'Los hijos de Israel' es idiomático y fiel al formante textual.
- source_word: לַעֲבֹד
  english_pob_choice: to perform
  chosen_spanish: para realizar
  alternatives_spanish:
  - para hacer
  - para ejecutar
  - para servir en
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad respecto del servicio cultual. 'Realizar' funciona en español con 'servicio' y evita la posible ambigüedad de 'servir' cuando el objeto directo es una tarea.
- source_word: עֲבֹדַת הַמִּשְׁכָּן
  english_pob_choice: the service of the tabernacle
  chosen_spanish: el servicio del tabernáculo
  alternatives_spanish:
  - la labor del tabernáculo
  - el trabajo del tabernáculo
  lexicon: HALOT
  rationale: עֲבֹדָה en contextos sacerdotales denota servicio o labor ritual. 'Servicio' es la opción más natural y exacta en español para este uso cultual.
theological_decisions:
- issue: Renderización del corpus cultual y del encargo sacerdotal
  english_pob_reading: keep charge / duty / service of the tabernacle
  chosen_spanish_reading: custodiar / deber / servicio
  alternative_spanish_readings:
  - guardar cargo / obligación / labor
  - velar por / responsabilidad / obra
  rationale: 'El hebreo acumula ideas de custodia, encargo y servicio ritual. La versión española conserva esa tríada sin borrar la tensión entre vigilancia y tarea asignada: ''custodiarán'' para שׁמר, ''deber'' para מִשְׁמֶרֶת y ''servicio'' para עֲבֹדָה.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: Forma masculina corporativa en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los descendientes de Israel
  rationale: Se mantiene la forma masculina explícita del hebreo, siguiendo el principio de no aplanar la forma gramatical cuando no hay una razón contextual para ello. La expresión sigue funcionando de manera corporativa en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente en מִשְׁמֶרֶת: de ''obligation'' a ''duty'' por naturalidad contextual. La redacción española sigue ese ajuste con ''deber'', evitando tanto ''obligación'' como una repetición pesada de ''custodia''. También conserva la decisión estable de traducir שׁמר con un verbo de custodia/encargo en lugar de un simple ''guardar''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el verso no contiene el Tetragrámaton ni un sustituto directo.
  - '''Tabernáculo de reunión'' conserva la identidad cultual del אֹהֶל מוֹעֵד con español bíblico inteligible.'
  - '''Servicio'' para עֲבֹדָה mantiene el registro sacerdotal y no se reduce a servicio genérico.'
  - La puntuación sigue el flujo de una sola cláusula con infinitivo de propósito final.
