  - marker: b
    text: 'O: «dos veces más señales» o «signos dobles». El hebreo es abreviado y puede aludir a la porción doble asociada con Eliseo.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la apertura para ajustarla más estrechamente al hebreo y mejorar la naturalidad del español. Se cambió «almacén» por «depósito», que preserva mejor el matiz de אוצר sin sonar demasiado cotidiano. Se reemplazó «Dos veces más señales» por «El doble de señales», una formulación más idiomática y fiel a la elipsis cuantitativa de פי שנים. Se conservaron la variante griega en nota y la referencia a «su espíritu» como el espíritu de Elías.
