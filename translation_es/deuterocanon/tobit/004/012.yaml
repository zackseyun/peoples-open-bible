  to: Cuídate[a], hijo, de toda inmoralidad sexual, y primero toma esposa de la descendencia de tus padres. No tomes esposa extranjera, que no sea de la tribu de tu padre, porque somos hijos de los profetas[b]. Recuerda, hijo, a Noé, Abraham, Isaac y Jacob, nuestros padres desde antiguo, que todos ellos tomaron esposas de entre sus hermanos[c], y fueron bendecidos en sus hijos, y su descendencia heredará la tierra.
