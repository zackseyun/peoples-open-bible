  to: 'Y Balac dijo a Balaam[c]: «¿No te envié[a] de veras a llamarte? ¿Por qué no viniste a mí[b]? ¿Acaso realmente no puedo honrarte[c]?».'
  rationale: 'Se ajustó la frase inicial para expresar con español más natural el énfasis del infinitivo absoluto sin añadir una interpretación no exigida por el hebreo. Se añadieron notas alineadas con el audit trail inglés para preservar alternativas significativas: el énfasis de ''envié'', la literalidad de ''fuiste'', y el alcance semántico de ''honrarte''.'
