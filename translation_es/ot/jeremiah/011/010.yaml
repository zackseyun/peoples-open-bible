revisions:
- from: Han vuelto a las iniquidades de sus padres antiguos[a], quienes rehusaron escuchar[b] mis palabras; y ellos han ido tras otros dioses para servirles. La casa de Israel y la casa de Judá han quebrantado[c] mi pacto, que hice con sus padres.
  to: Han vuelto a las iniquidades de sus antepasados de antaño[a], quienes rehusaron escuchar[b] mis palabras, y han ido tras otros dioses para servirles. La casa de Israel y la casa de Judá han quebrantado mi pacto, que hice[c] con sus padres.
  rationale: Se corrige el anclaje de la nota sobre 'cortar un pacto' para que recaiga en 'hice', que traduce כָּרַתִּי, no en 'quebrantado'. Se mejora la naturalidad de אֲבוֹתָם הָרִאשֹׁנִים con 'antepasados de antaño' y se limpia la redacción de la nota correspondiente. También se elimina 'ellos' y se aligera la puntuación para un español más fluido, sin alterar el sentido fuente ni la lógica del audit trail inglés.
  reviewer_model: gpt-5.4
