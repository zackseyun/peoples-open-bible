translation:
  language: es
  text: ¿Y no lo escogí yo de entre todas las tribus de Israel para que fuera mi sacerdote, para subir a mi altar, para quemar incienso y para vestir el efod delante de mí? Y di a la casa de tu padre todas las ofrendas de alimento[a] de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «todas las ofrendas hechas por fuego de los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָחֹר
  english_pob_choice: did I not choose
  chosen_spanish: ¿Y no lo escogí yo?
  alternatives_spanish:
  - ¿Y acaso no lo escogí yo?
  - ¿No lo elegí yo?
  lexicon: HALOT
  rationale: El hebreo tiene fuerza enfática y retórica; en español la pregunta negativa expresa esa afirmación intensa sin volverla mecánica.
- source_word: מִכָּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de entre todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - de entre todas las tribus de Israel
  lexicon: HALOT
  rationale: '''De entre'' preserva mejor el valor partitivo de selección desde un conjunto.'
- source_word: לִי לְכֹהֵן
  english_pob_choice: to be my priest
  chosen_spanish: para que fuera mi sacerdote
  alternatives_spanish:
  - para ser mi sacerdote
  - para que fuera mi sacerdote
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente natural en español para el oficio; se conserva la relación de pertenencia con Dios mediante ''mi''.'
- source_word: לַעֲלוֹת עַל מִזְבְּחִי
  english_pob_choice: to go up to my altar
  chosen_spanish: para subir a mi altar
  alternatives_spanish:
  - para ascender a mi altar
  - para ir a mi altar
  lexicon: HALOT
  rationale: '''Subir'' conserva el verbo concreto del hebreo y funciona bien en español para el acceso ritual al altar.'
- source_word: לְהַקְטִיר קְטֹרֶת
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer subir incienso
  lexicon: HALOT
  rationale: '''Quemar incienso'' comunica el acto cultual de manera clara y fiel al idioma de destino.'
- source_word: לָשֵׂאת אֵפוֹד לְפָנַי
  english_pob_choice: to wear an ephod before me
  chosen_spanish: para llevar el efod delante de mí
  alternatives_spanish:
  - para portar el efod delante de mí
  - para usar el efod delante de mí
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'llevar/bear'; en español 'llevar' conserva el movimiento concreto. Se mantiene 'efod' por ser un término técnico sin equivalente preciso.
- source_word: וָאֶתְּנָה
  english_pob_choice: And I gave
  chosen_spanish: Y di
  alternatives_spanish:
  - Y entregué
  - Y concedí
  lexicon: HALOT
  rationale: Verbo simple y directo que reproduce el pasado narrativo.
- source_word: לְבֵית אָבִיךָ
  english_pob_choice: to your father's house
  chosen_spanish: a la casa de tu padre
  alternatives_spanish:
  - a la casa de tu padre
  - a la casa de tus padres
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se refiere a la línea/familia paterna; en español se mantiene la formulación más cercana.
- source_word: אֶת כָּל אִשֵּׁי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the food offerings of the sons of Israel
  chosen_spanish: todas las ofrendas encendidas de los hijos de Israel
  alternatives_spanish:
  - todas las ofrendas hechas por fuego de los hijos de Israel
  - todas las ofrendas quemadas de los hijos de Israel
  lexicon: HALOT
  rationale: אִשֵּׁי refiere a ofrendas por fuego; 'ofrendas encendidas' preserva el vínculo con el fuego sin restringir indebidamente a un solo tipo de sacrificio. 'Hijos de Israel' conserva la forma masculina plural del hebreo.
theological_decisions:
- issue: Valor sacrificial de אִשֵּׁי
  english_pob_reading: food offerings
  chosen_spanish_reading: ofrendas encendidas
  alternative_spanish_readings:
  - ofrendas hechas por fuego
  - ofrendas quemadas
  rationale: La POB inglesa opta por una equivalencia idiomática pero deja nota del sentido literal. En español, 'ofrendas encendidas' comunica el origen ígneo del término sin introducir la restricción de 'holocaustos' o 'ofrendas de alimento'.
  doctrine_reference: Translation philosophy §§5–6
- issue: Fórmula étnico-covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - israelitas
  rationale: Se conserva la forma masculina plural del hebreo por fidelidad al registro y a la fórmula de pacto, evitando neutralizar el texto sin necesidad textual.
  doctrine_reference: Translation philosophy §4
- issue: Sentido de לָשֵׂאת אֵפוֹד
  english_pob_reading: to wear an ephod
  chosen_spanish_reading: llevar el efod
  alternative_spanish_readings:
  - portar el efod
  - usar el efod
  rationale: El hebreo dice literalmente 'llevar'. En español, 'llevar' mantiene esa concreción y evita suponer demasiado sobre la función exacta, aunque en contexto sea la acción sacerdotal de vestirlo.
  doctrine_reference: Translation philosophy §§2–3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que sustituyó 'carry an ephod' por 'wear an ephod' por mayor precisión contextual. En español, se eligió 'llevar el efod' para mantener la literalidad del hebreo y la neutralidad semántica, ya que 'llevar' puede abarcar tanto portar como vestir en este contexto sacerdotal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo cuando el texto lo requiere; en este versículo no aparece explícitamente.
  - Se conserva el término técnico 'efod' sin traducir, por falta de equivalente preciso y por consistencia con el uso bíblico.
  - La pregunta retórica inicial se traduce como una sola unidad interrogativa para conservar el énfasis del hebreo.
  - '''Hijos de Israel'' sigue la política de preservar la forma masculina plural cuando el hebreo la usa explícitamente.'
