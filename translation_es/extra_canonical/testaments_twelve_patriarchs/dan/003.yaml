  text: '[II.1 tail] τὴν ἀλήθειαν καὶ τὴν μακροθυμίαν, ἀπολεῖσθε⁸. 2. Τύφλωσις *γάρ ἐστιν ὁ θυμὸς καὶ οὐκ ἐᾷ ὁρᾶν πρόσωπόν τινος ἐν ἀληθείᾳ⁹. 3. ⌜Ὅτι⁷, κἂν πατήρ, *ἢ μήτηρ¹⁰ ἐστίν¹¹, ⌜ὡς πολεμίοις¹² προσέχει¹³ αὐτοῖς¹⁴⌝. *ἢ⁷ ἀδελφός ἐστιν¹⁵ οὐκ οἶδεν¹⁶. ἢ¹⁷ *προφήτης Κυρίου, παρακούει¹⁸· ἢ¹⁷ δίκαιος¹⁹, οὐ βλέπει· ⌜*ἢ φίλος²⁰, οὐ γνωρίζει⁷⌝. 4. *Περιβάλλεται γὰρ ⌈αὐτὸν⌉⁷ τὸ πνεῦμα τοῦ θυμοῦ τὸ δίκτυον τῆς πλάνης²¹ καὶ τυφλοῖ τοὺς²² ὀφθαλμοὺς αὐτοῦ, καὶ¹ διὰ τοῦ ψεύδους σκοτοῖ²³ τὴν διάνοιαν ⌈αὐτοῦ⌉⁷²⁴, καὶ τὴν ἰδίαν ὅρασιν παρέχει αὐτῷ. 5. *Ἐν τίνι δὲ²⁵ περιβάλλει τοὺς ὀφθαλμοὺς αὐτοῦ²⁶; *ἐν μίσει καρδίας²⁷ κατὰ τοῦ ἀδελφοῦ αὐτοῦ²⁸ *εἰς φθόνον²⁹. III. *Καὶ γὰρ πονηρὸς ὁ θυμός¹, τέκνα μου, *ὡς καὶ αὐτὴν τὴν ψυχὴν ἐκταράσσει². 2. Καὶ τὸ μὲν σῶμα *ἴδιον ποιεῖται³ τοῦ θυμουμένου⁴, *τῆς δὲ ψυχῆς⁵ κατακυριεύει, καὶ παρέχει σώματι⁶· ⌈δύναμιν⌉⁷, ἵνα ποιήσῃ⁸ πᾶσαν⁹ ἀνομίαν⁹. 3. *Καὶ ὅταν ταῦτα πάντα πράξῃ τὸ σῶμα, δικαιοῖ τὰ πραχθέντα καὶ ἡ ψυχή¹⁰, ἐπειδὴ οὐ βλέπει ὀρθῶς. 4. *Διὰ τοῦτο¹¹ ὁ θυμούμενος¹²,
    *ἐὰν μὲν ᾖ¹³ *δυνατὸς ⌈τῷ σώματι⌉¹⁴, *τριπλῆν ἐν τῷ θυμῷ τὴν δύναμιν κέκτηται¹⁵· μίαν¹⁶ μὲν ἀπὸ¹⁷ τῆς βοηθείας *τῶν ὑπουργούντων¹⁸. *δεύτερον δὲ¹⁹ διὰ τοῦ πλούτου *πείθων καὶ νικῶν [αὐτὸν] ἀδίκως²⁰. *τρίτον τὴν²¹ φυσικὴν ἔχων *δύναμιν δι'' αὐτῆς δρᾷ²² τὸ κακόν²³. 5. Ἐὰν δὲ ἀσθενὴς ᾖ ὁ²⁴ θυμούμενος²⁵, *διπλοῦν τὸ τῆς ὀργῆς πάθος ἐν αὐτῷ ἀναφύει²⁶· βοηθεῖ *γὰρ αὐτῷ ὁ θυμὸς²⁷ πάντοτε ἐν παρανομίᾳ²⁸. 6. Τοῦτο τὸ πνεῦμα ἀεὶ μετὰ τοῦ ψεύδους *ἐκ δεξιῶν τοῦ Σατανᾶ πορεύεται, ἵνα ἐν ὠμότητι καὶ ψεύδει³⁰ γίνωνται³¹ αἱ πράξεις αὐτοῦ³².'
