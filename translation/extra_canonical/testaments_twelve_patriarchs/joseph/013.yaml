theological_decisions:
- issue: Anthropological force of ψυχὰς in a slave-trading accusation
  chosen_reading: Rendered literally as 'souls' in the main text while allowing the sense 'persons' to remain evident from context.
  alternative_readings:
  - persons
  - people
  rationale: The Greek idiom likely means human beings/lives, but the testament's moral rhetoric is sharpened by retaining 'souls.' This preserves the gravity of trafficking without importing later dualistic theology.
