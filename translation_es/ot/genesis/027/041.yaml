translation:
  language: es
  text: 'Y Esaú odió a Jacob[a] por la bendición con que su padre lo había bendecido, y Esaú dijo en su corazón[b]: «Se acercan los días del luto por mi padre[c]; entonces mataré a Jacob mi hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aborreció a Jacob». El verbo hebreo puede expresar hostilidad sostenida o enemistad duradera, no solo un sentimiento pasajero.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «dijo en su corazón».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Los días del luto de mi padre se acercan». El hebreo puede entenderse como el luto por Isaac después de su muerte, o como el periodo de duelo de Isaac mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂטֹם
  english_pob_choice: hated
  chosen_spanish: aborreció
  alternatives_spanish:
  - odiaba
  - guardó rencor contra
  - tuvo odio contra
  lexicon: HALOT
  rationale: El verbo hebreo expresa hostilidad sostenida, no solo un sentimiento momentáneo. «Aborreció» conserva esa fuerza de enemistad y evita debilitar el matiz lexical que el POB documenta como más que una emoción pasajera.
- source_word: עַל הַבְּרָכָה
  english_pob_choice: because of the blessing
  chosen_spanish: por la bendición
  alternatives_spanish:
  - a causa de la bendición
  - debido a la bendición
  - por motivo de la bendición
  lexicon: HALOT
  rationale: El עַל aquí es causal. «Por» comunica de modo natural la causa del resentimiento en español y mantiene la relación explicativa con la bendición recibida por Jacob.
- source_word: אֲשֶׁר בֵּרֲכוֹ אָבִיו
  english_pob_choice: with which his father had blessed him
  chosen_spanish: con que su padre lo había bendecido
  alternatives_spanish:
  - con la cual su padre lo había bendecido
  - que su padre le había dado al bendecirlo
  - con la que su padre lo bendijo
  lexicon: HALOT
  rationale: La construcción conserva la repetición del verbo «bendecir» y su relación instrumental. El pluscuamperfecto «había bendecido» reproduce la secuencia narrativa y ayuda a mostrar que la bendición ya otorgada es la causa del odio.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - dentro de sí
  - en su interior
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de habla interior. «En su corazón» es fiel y transparente en español bíblico contemporáneo, y preserva la antropología bíblica implícita.
- source_word: יִקְרְבוּ יְמֵי אֵבֶל אָבִי
  english_pob_choice: The days of mourning for my father are drawing near
  chosen_spanish: Se acercan los días del luto por mi padre
  alternatives_spanish:
  - Se acercan los días del duelo por mi padre
  - Los días de luto por mi padre están cerca
  - Se acercan los días de luto por mi padre
  lexicon: HALOT
  rationale: La cadena constructa permite entender el luto relacionado con el padre, especialmente a su muerte. «Luto» comunica el duelo funerario con registro digno. Se evita cerrar demasiado la ambigüedad interpretativa, aunque la lectura más probable es la que el POB señala.
- source_word: וְאַהַרְגָה
  english_pob_choice: then I will kill
  chosen_spanish: entonces mataré
  alternatives_spanish:
  - y mataré
  - así que mataré
  - luego mataré
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención resuelta. «Entonces mataré» transmite la decisión de Esau en relación temporal con el período de luto, sin añadir explicación ajena al texto.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - hermano mío
  - mi propio hermano
  lexicon: HALOT
  rationale: El posesivo explícito intensifica la tragedia del acto proyectado. Se conserva directamente en español para no diluir la carga familiar del original.
translation_notes:
  revision_awareness: El pasaje sigue la última revisión inglesa que prefirió «hated» sobre una paráfrasis más débil como «held a grudge against». La versión española adopta un equivalente léxico fuerte («aborreció») para reflejar esa decisión revisada y mantener la fuerza del verbo hebreo שׂטם, a la vez que preserva el resto de la estructura narrativa y las ambigüedades documentadas en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «luto» para el contexto funerario; no se sustituye por un lenguaje eclesiástico más interpretativo.
  - Se conserva el paralelo semántico entre el odio/hostilidad de Esaú y su resolución interna expresada «en su corazón».
