translation:
  language: es
  text: Pero si la hija de un sacerdote llega a ser viuda o divorciada, y no tiene descendencia, y vuelve a la casa de su padre como en su juventud, podrá comer del alimento[a] de su padre; pero ninguna persona ajena[b] podrá comer de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'del pan de su padre'. Aquí 'pan' probablemente se refiere más ampliamente a las provisiones alimentarias de la casa sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O 'ninguna persona no autorizada'. El término hebreo se refiere a alguien fuera del círculo sacerdotal permitido, no necesariamente a un extranjero por etnia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת כֹּהֵן
  english_pob_choice: a priest’s daughter
  chosen_spanish: la hija de un sacerdote
  alternatives_spanish:
  - la hija del sacerdote
  - una hija de sacerdote
  lexicon: HALOT
  rationale: La construcción hebrea es literal “hija de un sacerdote”. En español, “la hija de un sacerdote” expresa con naturalidad la relación filial y la pertenencia al ámbito sacerdotal, manteniendo el contraste legal del pasaje.
- source_word: כִּ֨י תִהְיֶ֜ה
  english_pob_choice: becomes
  chosen_spanish: llega a ser
  alternatives_spanish:
  - es
  - se encuentra
  lexicon: HALOT
  rationale: En contexto legal, היה con כִּי introduce una condición circunstancial. “Llega a ser” conserva la idea de entrar en ese estado, sin forzar un matiz más temporal de lo que el hebreo exige.
- source_word: אַלְמָנָה וּ/גְרוּשָׁה
  english_pob_choice: a widow or divorced
  chosen_spanish: viuda o divorciada
  alternatives_spanish:
  - viuda o repudiada
  - viuda y divorciada
  lexicon: HALOT
  rationale: El hebreo enumera dos estados alternativos. “O” preserva esa alternativa; “divorciada” es la opción más transparente en español. “Repudiada” sería posible, pero menos neutral para lectura pública.
- source_word: וְ/זֶרַע אֵין לָהּ
  english_pob_choice: and has no offspring
  chosen_spanish: y no tiene descendencia
  alternatives_spanish:
  - y no tiene hijos
  - y no tiene prole
  lexicon: HALOT
  rationale: זֶרַע en este contexto apunta a descendencia, no sólo a un hijo individual. “Descendencia” mantiene la amplitud semántica y sigue de cerca la decisión inglesa de “offspring”.
- source_word: וְ/שָׁבָה אֶל בֵּית אָבִיהָ
  english_pob_choice: and returns to her father’s house
  chosen_spanish: y vuelve a la casa de su padre
  alternatives_spanish:
  - y regresa a la casa de su padre
  - y retorna a la casa de su padre
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar. “Vuelve” es natural y fiel; “casa de su padre” corresponde al hebreo sin añadir interpretación.
- source_word: כִּ/נְעוּרֶי/הָ
  english_pob_choice: as in her youth
  chosen_spanish: como en su juventud
  alternatives_spanish:
  - como cuando era joven
  - como en sus años mozos
  lexicon: HALOT
  rationale: La comparación remite a su estado anterior en la casa paterna. “Juventud” transmite esa etapa sin cargarla de un tono demasiado coloquial.
- source_word: מִ/לֶּחֶם אָבִי/הָ
  english_pob_choice: from her father’s food
  chosen_spanish: del pan de su padre
  alternatives_spanish:
  - de la comida de su padre
  - de los alimentos de su padre
  lexicon: HALOT
  rationale: 'Aquí se conserva la tensión lexical del hebreo: לֶחֶם es literalmente “pan”, aunque por metonimia abarque provisiones alimenticias. Dado que el texto fuente y el audit trail señalan esa literalidad, se mantiene “pan” en el texto principal.'
- source_word: וְ/כָל זָר
  english_pob_choice: but no outsider
  chosen_spanish: pero ningún extraño
  alternatives_spanish:
  - pero ninguna persona ajena
  - pero ningún no autorizado
  lexicon: HALOT
  rationale: זָר en la legislación sacerdotal no significa sólo “extranjero” étnico, sino alguien no perteneciente al círculo autorizado. “Extraño” comunica la exclusión legal con una palabra natural en español.
- source_word: לֹא יֹ֥אכַל בּֽ/וֹ
  english_pob_choice: may eat of it
  chosen_spanish: podrá comer de ello
  alternatives_spanish:
  - podrá comer de eso
  - comerá de ello
  lexicon: HALOT
  rationale: El hebreo prohíbe el acceso al alimento provisto. “Comer de ello” mantiene el referente colectivo sin especificarlo más allá de lo que el versículo dice.
theological_decisions:
- issue: Sentido de לֶחֶם en el contexto sacerdotal
  english_pob_reading: Render as 'food' rather than narrowly 'bread,' implying the priestly provisions available to the household.
  chosen_spanish_reading: Mantener 'pan' en el texto principal, con la idea amplia de provisión alimentaria en el contexto sacerdotal.
  alternative_spanish_readings:
  - comida
  - alimentos
  rationale: El audit trail inglés nota que לֶחֶם funciona metonímicamente. Sin embargo, el hebreo literal y la tradición de lectura legal justifican conservar 'pan' para no borrar la tensión lexical; el sentido de provisiones queda implícito en el contexto del sacerdocio.
  doctrine_reference: Levítico 22:10-16; provisiones sagradas del ámbito sacerdotal
- issue: Sentido de זָר en la ley sacerdotal
  english_pob_reading: '''No unauthorized person'' rather than ethnically ''foreigner.'''
  chosen_spanish_reading: “Extraño” como persona no perteneciente al círculo autorizado.
  alternative_spanish_readings:
  - persona no autorizada
  - ajeno
  rationale: El término hebreo es social-cultual, no étnico. 'Extraño' mantiene la amplitud semántica y deja visible la exclusión normativa sin reducirla sólo a nacionalidad.
  doctrine_reference: Levítico 22:10-16; santidad y acceso restringido
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés al reflejar זֶרַע con 'descendencia' y mantener la estructura legal condicional. Se conserva, no obstante, la literalidad de לֶחֶם como 'pan' para no perder una tensión léxica documentada por el hebreo y por el aparato inglés, mientras que זָר se traduce con un término que expresa exclusión cultual sin convertirlo en una referencia étnica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Hija de un sacerdote'' conserva la relación filial y el marco sacerdotal sin introducir ''sacerdotisa'', que no corresponde al hebreo.'
  - '''Descendencia'' se usa para זֶרַע siguiendo el sentido amplio de la revisión inglesa.'
  - '''Extraño'' se reserva aquí para la exclusión legal/cultual de זָר, no como simple ''forastero''.'
