translation:
  language: es
  text: Porque él se considera bendecido durante su vida[a], y la gente te alaba cuando te va bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque él se bendice a sí mismo mientras vive, y la gente te alaba cuando prosperas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del cuadro anterior. En español, «Porque» conserva la relación causal/explicativa sin sonar forzado.
- source_word: נַפְשׁוֹ
  english_pob_choice: he / his soul
  chosen_spanish: él
  alternatives_spanish:
  - su alma
  - sí mismo
  lexicon: HALOT
  rationale: 'Aunque el hebreo dice literalmente «su alma», el audit trail reconoce el sentido idiomático reflexivo: se refiere a la persona misma. «Él» evita una calca poco natural y mantiene la referencia correcta.'
- source_word: בְּחַיָּיו
  english_pob_choice: during his life
  chosen_spanish: durante su vida
  alternatives_spanish:
  - mientras vive
  - en su vida
  lexicon: HALOT
  rationale: La frase marca el ámbito temporal de la acción. «Durante su vida» es natural y conserva el matiz temporal.
- source_word: יְבָרֵךְ
  english_pob_choice: blesses himself
  chosen_spanish: se bendice a sí mismo
  alternatives_spanish:
  - se considera bendecido
  - se felicita
  lexicon: HALOT
  rationale: 'El contexto sugiere un valor reflexivo: el hombre se atribuye bendición a sí mismo. «Se bendice a sí mismo» conserva la fuerza verbal del hebreo sin confundirlo con bendecir a Dios.'
- source_word: וְיוֹדֻךָ
  english_pob_choice: and they praise you
  chosen_spanish: y ellos te alaban
  alternatives_spanish:
  - y la gente te alaba
  - y te dan gracias
  lexicon: HALOT
  rationale: יָדָה en este contexto apunta a alabanza o reconocimiento social. «Ellos» mantiene el sujeto indefinido/generico del hebreo y el tono del verso.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí la partícula introduce la circunstancia bajo la cual ocurre la alabanza. «Cuando» expresa mejor la relación temporal-pragmática.
- source_word: תֵיטִיב
  english_pob_choice: you do well
  chosen_spanish: te va bien
  alternatives_spanish:
  - prosperas
  - haces bien
  lexicon: HALOT
  rationale: El verbo puede implicar bienestar o prosperidad. «Te va bien» suena natural en español y conserva esa amplitud semántica.
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - para ti mismo
  lexicon: HALOT
  rationale: El sufijo dativo/reflexivo se entiende en el conjunto del verso. «A ti» evita recargar la línea con una reflexión redundante y mantiene la naturalidad en español.
theological_decisions:
- issue: El alcance de נֶפֶשׁ en contexto reflexivo
  english_pob_reading: he blesses himself
  chosen_spanish_reading: él se bendice a sí mismo
  alternative_spanish_readings:
  - su alma se bendice
  - él se considera bendecido
  rationale: No se debe espiritualizar ni desdibujar el hebreo. El verso retrata autoevaluación favorable del rico, no una acción litúrgica hacia Dios. La elección española conserva la tensión entre el valor literal de נֶפֶשׁ y el sentido idiomático reflexivo.
  doctrine_reference: SAL 49:19; cf. uso de נֶפֶשׁ como ‘persona’ o ‘sí mismo’ en contexto.
- issue: Valor de יָדָה en la segunda cola
  english_pob_reading: they praise you
  chosen_spanish_reading: ellos te alaban
  alternative_spanish_readings:
  - ellos te dan gracias
  - te confiesan
  rationale: En este pasaje el verbo no se refiere primariamente a gratitud religiosa, sino a reconocimiento/aprobación social ante el éxito. «Alaban» preserva esa lectura sin perder la ambigüedad básica del verbo.
  doctrine_reference: SAL 49:19; HALOT sobre ידה en Hiphil.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés, pero ajusta la sintaxis para que el verso sea natural en español: se resolvió נַפְשׁוֹ con un sujeto personal («él») y se mantuvo la relación pragmática de כִּי con «cuando» en la segunda cola. También se preservó la lectura reflexiva de יְבָרֵךְ sin convertirla en una paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se emplea un español neutral y eclesialmente legible, con preferencia por construcciones claras sobre calcos literales.
  - Se conservó la tensión semántica de bendecirse a sí mismo / considerarse bendecido mediante una nota alternativa, como en el audit trail inglés.
  - «Te va bien» se usa como equivalente amplio de prosperidad/bienestar, evitando restringir el sentido a mero éxito material.
