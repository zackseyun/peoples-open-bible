translation:
  language: es
  text: Así volviste a la lascivia[a] de tu juventud, cuando en Egipto te manoseaban[b][c] tus pechos, los pechos de tu juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘recordaste la lascivia de tu juventud’. El verbo hebreo puede significar ‘visitar’, ‘atender’ o ‘traer a la memoria’; aquí probablemente incluye la idea de volver a una conducta anterior.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘de Egipto’. La frase se entiende de manera idiomática como ‘en Egipto’, porque la acción se sitúa allí.
    reason: lexical_alternative
  - marker: c
    text: O ‘te sobaban los pechos’. La expresión hebrea es sexualmente explícita y alude a un trato erótico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְקְדִי
  english_pob_choice: you revisited
  chosen_spanish: volviste a ocuparte
  alternatives_spanish:
  - recordaste
  - volviste a recordar
  - te ocupaste de nuevo
  lexicon: HALOT
  rationale: פקד puede significar ‘visitar’, ‘atender’, ‘hacer caso de’ o ‘traer a la memoria’. En este contexto de infidelidad reiterada, ‘volviste a ocuparte de’ conserva la idea de volver sobre algo ya vivido, sin reducirlo solo a memoria ni sonar demasiado libre.
- source_word: זִמַּת
  english_pob_choice: lewdness
  chosen_spanish: lascivia
  alternatives_spanish:
  - maldad
  - depravación
  - impureza sexual
  lexicon: HALOT
  rationale: En contextos sexuales, זִמָּה expresa conducta sexual moralmente pervertida. ‘Lascivia’ mantiene la carga sexual y degradante de forma natural en español, sin volverlo demasiado abstracto.
- source_word: נְעוּרַיִךְ
  english_pob_choice: your youth
  chosen_spanish: tu juventud
  alternatives_spanish:
  - tus años jóvenes
  - tu adolescencia
  lexicon: HALOT
  rationale: El término denota el periodo de juventud. ‘Tu juventud’ es fiel, natural y mantiene la repetición enfática del hebreo.
- source_word: בַּעֲשׂוֹת
  english_pob_choice: when ... fondled
  chosen_spanish: cuando ... te acariciaban
  alternatives_spanish:
  - cuando ... te manoseaban
  - cuando ... te tocaban
  - cuando ... te acariciaron
  lexicon: HALOT
  rationale: La construcción con עשה aquí es idiomática y, por el contexto, implica una acción física de tipo sexual. ‘Te acariciaban’ recoge el sentido relacional y erótico del pasaje en un español publicable; ‘manoseaban’ sería más brusco, pero menos uniforme estilísticamente.
- source_word: מִמִּצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - desde Egipto
  - por los egipcios
  lexicon: HALOT
  rationale: 'Aunque la forma es literalmente ‘de Egipto’, el contexto es locativo: la acción ocurrió allí. ‘En Egipto’ sigue la lectura idiomática del POB inglés y evita una traducción mecánica.'
- source_word: דַּדַּיִךְ
  english_pob_choice: your breasts
  chosen_spanish: los pechos
  alternatives_spanish:
  - tus pechos
  - tu busto
  lexicon: HALOT
  rationale: El término es anatómico y concreto. En español, ‘los pechos’ suena natural cuando el verso ya ha establecido el referente con pronombre; además mantiene el tono explícito del texto.
- source_word: לְמַעַן
  english_pob_choice: for
  chosen_spanish: de
  alternatives_spanish:
  - por
  - a causa de
  - para
  lexicon: HALOT
  rationale: 'En esta clausula final el hebreo introduce la expresión que completa la repetición: ‘los pechos de tu juventud’. En español, la relación se expresa de modo más natural con ‘de’.'
- source_word: שְׁדֵי נְעוּרַיִךְ
  english_pob_choice: the breasts of your youth
  chosen_spanish: los pechos de tu juventud
  alternatives_spanish:
  - tus pechos juveniles
  - los pechos de tus años jóvenes
  lexicon: HALOT
  rationale: Conservar la construcción genitiva reproduce el énfasis poético del hebreo y la repetición del miembro anterior, sin suavizar la imagen.
theological_decisions:
- issue: Imagen sexual explícita en lenguaje profético de juicio
  english_pob_reading: Retain the explicit imagery ('breasts,' 'lewdness') without euphemistic softening.
  chosen_spanish_reading: Mantener la imagen explícita (‘pechos’, ‘lascivia’) sin suavizarla.
  alternative_spanish_readings:
  - Usar términos atenuados como ‘deshonra’ o ‘inmoralidad’
  - convertir la imagen en una metáfora menos corporal
  rationale: El pasaje usa una acusación deliberadamente gráfica para denunciar la infidelidad de Jerusalén. Suavizar el lenguaje debilitaría el impacto retórico y oscurecería la fuerza del original.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa, que prefirió 'fondled' por encima de 'handled' y simplificó la clausula final. En español, eso inclina la elección hacia un verbo con fuerza erótica explícita y mantiene la repetición final sin añadir preposición innecesaria.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se conserva un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se mantiene la tensión sexual del hebreo con vocabulario explícito, sin eufemismos.
  - La repetición final se preserva para reflejar el paralelismo poético del hebreo.
