translation:
  language: es
  text: Mira[a], yo he puesto la tierra delante de ustedes. Entren y tomen posesión[b] de la tierra que Yahvé juró a sus padres[c] —a Abraham, a Isaac y a Jacob— para dársela a ellos y a su descendencia[d] después de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Observa» o «He aquí».
    reason: lexical_alternative
  - marker: b
    text: O «posean la tierra»; el verbo hebreo también puede llevar el sentido de heredar o tomar posesión.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sus padres», refiriéndose específicamente a Abraham, Isaac y Jacob.
    reason: alternative_reading
  - marker: d
    text: O «su simiente después de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Observa
  - Ve
  lexicon: HALOT
  rationale: El imperativo singular introduce una llamada enfática a prestar atención. «Mira» conserva esa fuerza directa en español moderno y evita un tono excesivamente arcaico; «Ve» no expresa bien aquí la apelación a fijar la atención.
- source_word: נָתַתִּי לִפְנֵיכֶם
  english_pob_choice: I have set ... before you
  chosen_spanish: yo he puesto la tierra delante de ustedes
  alternatives_spanish:
  - yo he dado la tierra delante de ustedes
  - yo he colocado la tierra delante de ustedes
  - yo les he puesto la tierra delante
  lexicon: HALOT
  rationale: El hebreo combina el verbo «dar» con la idea espacial de poner algo ante alguien. «He puesto ... delante de ustedes» refleja esa disponibilidad inmediata con una expresión natural en español. Se mantiene el perfecto para expresar una acción ya realizada con efecto presente.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En contexto deuteronómico y pactal, אֶרֶץ se refiere a la tierra prometida. «Tierra» es la equivalencia más sobria y fiel; «país» suena menos bíblico en este contexto, y «tierra prometida» añade una glosa que el versículo no explicita.
- source_word: בֹּאוּ
  english_pob_choice: Go in
  chosen_spanish: Entren
  alternatives_spanish:
  - Entren
  - Vayan adentro
  - Pasen
  lexicon: HALOT
  rationale: Como imperativo plural, el sentido es ingresar en la tierra. «Entren» es la forma más natural y precisa en español; «vayan adentro» es más pesado y «pasen» no expresa con suficiente claridad el movimiento de entrada.
- source_word: וּרְשׁוּ
  english_pob_choice: take possession of
  chosen_spanish: tomen posesión de
  alternatives_spanish:
  - posean
  - hereden
  - tomen posesión
  lexicon: HALOT
  rationale: ירשׁ en este contexto combina conquista y posesión hereditaria. «Tomen posesión de» conserva la acción activa sin reducir el verbo a un simple «poseer»; «hereden» destacaría más la herencia que la toma efectiva.
- source_word: נִשְׁבַּע יְהוָה
  english_pob_choice: the LORD swore
  chosen_spanish: Yahvé juró
  alternatives_spanish:
  - Yahvé juró
  - el Señor juró
  - Yahvé hizo juramento
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la terminología del proyecto, porque el hebreo usa directamente el Tetragrámaton. «Juró» reproduce el acto de compromiso pactal expresado por el verbo.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus padres
  - a sus antepasados
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino plural y aquí apunta a los patriarcas. «Padres» mantiene esa concreción; «antepasados» neutraliza el matiz masculino que el texto sí presenta.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, a Isaac y a Jacob
  - a Abraham, a Isaac, y a Jacob
  lexicon: HALOT
  rationale: Se conserva la enumeración de los tres patriarcas de forma clara y directa. El repetido «a» del hebreo puede mantenerse en español por ritmo y claridad, aunque no es obligatorio repetirlo antes de cada nombre.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give to them
  chosen_spanish: darles a ellos
  alternatives_spanish:
  - darles
  - dar a ellos
  lexicon: HALOT
  rationale: El infinitivo «dar» expresa la finalidad del juramento. «Darles a ellos» conserva la referencia explícita del pronombre y evita ambigüedad en la cadena de complementos; la duplicación pronominal es natural en español y refleja el énfasis del hebreo.
- source_word: וּלְזַרְעָם אַחֲרֵיהֶם
  english_pob_choice: and to their offspring after them
  chosen_spanish: y a su descendencia después de ellos
  alternatives_spanish:
  - y a su descendencia después de ellos
  - y a su simiente después de ellos
  - y a sus descendientes después de ellos
  lexicon: HALOT
  rationale: זרע es un singular colectivo; «descendencia» comunica bien esa continuidad generacional en español actual. «Simiente» conserva una resonancia más literal pero es menos natural; «descendientes» es posible, aunque dispersa algo el valor colectivo del sustantivo.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. Según la terminología del proyecto, se mantiene «Yahvé» en el cuerpo principal para no enmascarar el nombre del pacto; la alternativa litúrgica «el SEÑOR» no se adopta aquí porque la política de la serie privilegia la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Referencia de אֲבֹתֵיכֶם a los patriarcas
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus padres
  - sus antepasados
  rationale: El hebreo es explícitamente masculino y la identificación inmediata con Abraham, Isaac y Jacob confirma que se trata de los patriarcas. Se conserva «padres» para no desactivar un rasgo semántico del original; «antepasados» sería más neutro, pero menos exacto respecto del término usado.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de וּרְשׁוּ en contexto de promesa territorial
  english_pob_reading: take possession of
  chosen_spanish_reading: tomen posesión de
  alternative_spanish_readings:
  - posean
  - hereden
  - tomen posesión
  rationale: El verbo puede abarcar posesión, herencia y apropiación efectiva de la tierra. «Tomen posesión de» preserva la tensión entre heredar y ocupar activamente, sin reducir el mandato a una mera posesión estática.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'Se revisó el pasaje frente al WLC y al audit trail inglés: no se detectaron cambios textuales relevantes en la última pasada; la redacción española preserva la secuencia imperativa, el juramento de Yahvé y la formulación patriarcal sin añadir glosas interpretativas no requeridas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la política del proyecto.
  - Se usa «tierra» para אֶרֶץ en contexto pactal y territorial.
  - Se conserva la expresión masculina «padres» en armonía con Abraham, Isaac y Jacob.
  - La duplicación pronominal en «darles a ellos» ayuda a reflejar el hebreo sin oscurecer el español.
  - «Descendencia» reproduce mejor el colectivo singular זרע que una pluralización inmediata.
