lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Cuando
  lexicon: LSJ
  rationale: La construcción narrativa introduce el siguiente episodio con valor temporal. «Y cuando» mantiene la transición secuencial y suena natural en español sin perder el matiz de continuidad.
- source_word: προσήγγισαν
  english_pob_choice: they came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - llegaron cerca
  lexicon: LSJ
  rationale: El aoristo en este contexto expresa que se aproximaron a un lugar. «Se acercaron» conserva el movimiento hacia el destino y es más idiomático que una calca más rígida.
- source_word: τῇ Ῥάγῃ
  english_pob_choice: to Rages
  chosen_spanish: a Ragés
  alternatives_spanish:
  - a Rhages
  - a Ragē
  lexicon: LSJ
  rationale: El dativo marca el lugar al que se aproximan. Se translitera el topónimo como nombre propio geográfico; «Ragés» respeta la forma tradicional en español sin añadir interpretación.
translation_notes:
  revision_awareness: El texto griego disponible es breve y coincide sustancialmente con el testigo auditado en inglés; no se requieren revisiones textuales ni ajustes doctrinales. Se conserva la puntuación mínima de transición narrativa.
  spanish_consistency_notes:
  - Se mantiene «Ragés» como transliteración del topónimo, coherente con una política de nombres propios geográficos.
  - La frase conserva un orden natural en español sin ampliar el contenido más allá del movimiento indicado por el griego.
