translation:
  language: es
  text: El rey se lamentará, y el príncipe se vestirá de desolación[a]; y las manos del pueblo de la tierra temblarán[b]. Según su camino los trataré, y según sus propios juicios los juzgaré[c]. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el príncipe se vestirá de horror» o «será vestido de desolación». El hebreo usa una metáfora de vestirse con un sustantivo que puede denotar desolación o ruina espantosa.
    reason: lexical_alternative
  - marker: b
    text: O, «las manos del pueblo común temblarán». «Pueblo de la tierra» es una expresión hebrea para la población en general.
    reason: lexical_alternative
  - marker: c
    text: O, «según sus juicios los juzgaré». El hebreo puede significar que Dios los juzga según los estándares reflejados en sus propias prácticas judiciales.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: מֶלֶךְ es el título político básico; «rey» es el equivalente natural y directo en español, sin añadir matices que el hebreo no exige.
- source_word: יִתְאַבָּל
  english_pob_choice: will mourn
  chosen_spanish: se lamentará
  alternatives_spanish:
  - hará duelo
  - estará de duelo
  lexicon: HALOT
  rationale: El verbo expresa duelo/lamento por calamidad. «Se lamentará» conserva la reacción de duelo con un español fluido y solemne.
- source_word: וְנָשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el jefe
  - el gobernante
  lexicon: HALOT
  rationale: נָשִׂיא puede ser jefe, príncipe o líder; «príncipe» mantiene el rango elevado y coincide con la decisión inglesa sin reducirlo a un término genérico.
- source_word: יִלְבַּשׁ שְׁמָמָה
  english_pob_choice: will clothe himself with desolation
  chosen_spanish: se vestirá de desolación
  alternatives_spanish:
  - se vestirá de horror
  - será vestido de desolación
  lexicon: HALOT
  rationale: Se preserva la metáfora de vestirse con un sustantivo que puede significar desolación o espanto/ruina. «Se vestirá de desolación» refleja esa imagen sin paraphrasearla.
- source_word: וִידֵי עַם הָאָרֶץ
  english_pob_choice: the hands of the people of the land
  chosen_spanish: las manos del pueblo de la tierra
  alternatives_spanish:
  - las manos de la gente del país
  - las manos del pueblo común
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea «pueblo de la tierra», que en este contexto designa a la población. «Las manos» conserva la concreción corporal del hebreo.
- source_word: תִּבָּהַלְנָה
  english_pob_choice: will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - se aterrorizarán
  - entrarán en pánico
  lexicon: HALOT
  rationale: El nifal comunica ser sacudidos/aterrados. «Temblarán» conserva el efecto físico del temor que la imagen de las manos sugiere.
- source_word: מִדַּרְכָּם אֶעֱשֶׂה אוֹתָם
  english_pob_choice: According to their way I will deal with them
  chosen_spanish: Conforme a su camino actuaré con ellos
  alternatives_spanish:
  - Conforme a su conducta obraré con ellos
  - Según su manera de vivir actuaré con ellos
  lexicon: HALOT
  rationale: דֶּרֶךְ aquí es conducta o manera de vida. «Conforme a su camino» preserva la imagen bíblica sin perder la idea de retribución acorde a su conducta.
- source_word: וּבְמִשְׁפְּטֵיהֶם אֶשְׁפְּטֵם
  english_pob_choice: by their own judgments I will judge them
  chosen_spanish: según sus propios juicios los juzgaré
  alternatives_spanish:
  - conforme a sus juicios los juzgaré
  - por sus propios decretos los juzgaré
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser juicio, decisión legal o norma. «Juicios» conserva el campo forense; «propios» explicita la referencia reflexiva del sufijo.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  english_pob_choice: Then they will know that I am Yahweh
  chosen_spanish: Entonces sabrán que yo soy Yahvé
  alternatives_spanish:
  - Y sabrán que yo soy Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula de reconocimiento de Ezequiel con valor resultativo. «Entonces» expresa el desenlace de juicio; «Yahvé» sigue el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» según la terminología por defecto del proyecto en español, no se vela como «SEÑOR».
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula de reconocimiento
  english_pob_reading: Then they will know that I am Yahweh
  chosen_spanish_reading: Entonces sabrán que yo soy Yahvé
  alternative_spanish_readings:
  - Entonces sabrán que yo soy el SEÑOR
  rationale: El hebreo usa el Nombre del pacto directamente. La lectura española conserva ese valor nominal y evita el ocultamiento litúrgico, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de וּבְמִשְׁפְּטֵיהֶם אֶשְׁפְּטֵם
  english_pob_reading: by their own judgments I will judge them
  chosen_spanish_reading: según sus propios juicios los juzgaré
  alternative_spanish_readings:
  - de acuerdo con sus propios juicios los juzgaré
  - conforme a sus propios juicios los juzgaré
  rationale: La frase puede implicar retribución conforme a las normas/decisiones que ellos mismos han practicado. «Según sus propios juicios» mantiene esa reciprocidad judicial sin fijar de más una sola interpretación.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión en inglés, que no introdujo cambios. Se conserva la imagen metafórica de vestirse con desolación, la expresión idiomática «pueblo de la tierra» y la fórmula final de reconocimiento con el Nombre divino transliterado según el estándar español del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en consonancia con el estándar del proyecto.
  - «Juicios» traduce מִשְׁפָּטֵיהֶם con sentido forense y judicial, no como «leyes» o «ordenanzas».
  - «Pueblo de la tierra» conserva la expresión hebrea; la nota explica su valor idiomático.
  - La metáfora de «vestirse» se preserva para no perder el color figurado del hebreo.
