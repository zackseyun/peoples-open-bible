review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la topografía del hebreo: montes/collados/valles/barrancos reflejan adecuadamente הָרָיו, גבעותיך, גאותיך y אפיקיך. También preserva el contraste de sufijos 3ms/2ms con ''sus'' y ''tus''. Sin embargo, dos decisiones no conservan plenamente el sentido fuente ni el rastro POB: (1) el waw inicial fue retenido en la revisión inglesa y conviene representarlo en español con ''Y''; (2) חֲלָלָיו / חַלְלֵי חֶרֶב denota muertos/caídos/slain, no meramente ''heridos''.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico. 'Collados' y 'barrancos' funcionan bien. No obstante, 'heridos a espada' suena menos preciso que 'muertos a espada' o 'caídos por la espada', porque el contexto afirma muerte. Además, la coma antes de 'y en todos tus barrancos' mejora el ritmo de la enumeración, en paralelo con el inglés auditado.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La principal cuestión léxica es mantener la fuerza bélica de חלל como 'muertos/caídos', no atenuarla a 'heridos'.
  issues:
  - severity: medium
    issue: Falta la conjunción inicial 'Y'.
    rationale: "La revisión inglesa final añadió 'And' para reflejar el waw inicial. En español, 'Y llenar\e' o 'Y llenaré' suena natural y conserva mejor la conexión discursiva."
  - severity: high
    issue: '''Sus muertos'' / ''los heridos a espada'' rompe la coherencia léxica de חלל.'
    rationale: El mismo lexema hebreo aparece dos veces en el versículo y en ambos casos señala personas muertas o abatidas violentamente. Traducir primero 'muertos' y luego 'heridos' debilita el paralelismo y atenúa indebidamente el sentido de 'slain'.
  - severity: low
    issue: Puntuación de la enumeración mejorable.
    rationale: 'Agregar una coma antes de ''y en todos tus barrancos'' da una serie más natural: ''sobre tus collados, en tus valles, y en todos tus barrancos'' o mejor sin Oxford innecesaria en español: ''sobre tus collados, en tus valles y en todos tus barrancos'' con coma tras ''collados''.'
  revised_spanish_text: Y llenaré sus montes con sus muertos; sobre tus collados[a], en tus valles y en todos tus barrancos, caerán los muertos a espada.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «caerán en ellos», refiriéndose a los collados, valles y barrancos recién nombrados.
    reason: lexical_alternative
  revision_rationale: Se añadió 'Y' para reflejar el waw inicial conforme a la revisión inglesa auditada. Se cambió 'los heridos a espada' por 'los muertos a espada' para preservar la fuerza de חללי חרב y mantener coherencia con el primer 'sus muertos'. Se conservó la nota locativa, ya que el español principal puede omitir 'en ellos' igual que el inglés POB.
