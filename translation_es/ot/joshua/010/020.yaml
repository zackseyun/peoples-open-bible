translation:
  language: es
  text: Y aconteció que, cuando Josué y los hijos de Israel terminaron de herirlos con una matanza muy grande, hasta que fueron exterminados, y los sobrevivientes[a] de entre ellos sobrevivieron y entraron en las ciudades fortificadas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo literalmente dice: «los sobrevivientes sobrevivieron de entre ellos», una repetición enfática de sustantivo y verbo que el español principal conserva de forma cercana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened that
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y fue que
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo tramo del relato; «aconteció que» mantiene ese valor discursivo con dignidad y sin arcaísmo excesivo.
- source_word: כְכַלּוֹת
  english_pob_choice: when ... had finished
  chosen_spanish: cuando ... terminaron de
  alternatives_spanish:
  - al terminar de
  - cuando acabaron de
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa un marco temporal; «cuando terminaron de» conserva el orden temporal de la acción principal.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea de manera transparente; en español «hijos de Israel» es comprensible y preserva el eco formal del original.
- source_word: לְהַכּוֹתָם
  english_pob_choice: striking them
  chosen_spanish: de herirlos
  alternatives_spanish:
  - de golpearlos
  - de abatirlos
  lexicon: HALOT
  rationale: El hiphil de נכה puede ser «herir/pegar/smitar». Aquí «herir» reproduce el verbo base sin forzar aún una traducción interpretativa.
- source_word: מַכָּה גְדוֹלָה מְאֹד
  english_pob_choice: a very great slaughter
  chosen_spanish: una matanza muy grande
  alternatives_spanish:
  - un golpe muy grande
  - una gran derrota
  lexicon: HALOT
  rationale: En contexto militar, מַכָּה no es solo «golpe» sino daño letal; «matanza» comunica mejor el resultado violento que el texto describe.
- source_word: עַד תֻּמָּם
  english_pob_choice: until they were wiped out
  chosen_spanish: hasta que fueron exterminados
  alternatives_spanish:
  - hasta que fueron destruidos
  - hasta que quedaron acabados
  lexicon: HALOT
  rationale: La pasiva de תמם indica llegar al fin total; «exterminados» transmite con fuerza esa culminación total sin añadir más que el contexto bélico exige.
- source_word: וְהַשְּׂרִידִים
  english_pob_choice: and the survivors
  chosen_spanish: y los sobrevivientes
  alternatives_spanish:
  - y los restantes
  - y el remanente
  lexicon: HALOT
  rationale: «Sobrevivientes» es el equivalente natural y directo del sustantivo; se conserva la coordinación simple de la conjunción hebrea.
- source_word: שָׂרְדוּ מֵהֶם
  english_pob_choice: the survivors from them survived
  chosen_spanish: de entre ellos sobrevivieron
  alternatives_spanish:
  - sobrevivieron de ellos
  - escaparon de entre ellos
  lexicon: HALOT
  rationale: Se respeta la repetición cognada de la idea de sobrevivir, pero en español se suaviza para evitar torpeza excesiva; «de entre ellos» preserva el valor partitivo de מֵהֶם.
- source_word: וַיָּבֹאוּ אֶל עָרֵי הַמִּבְצָר
  english_pob_choice: and entered the fortified cities
  chosen_spanish: y entraron en las ciudades fortificadas
  alternatives_spanish:
  - y llegaron a las ciudades fortificadas
  - y entraron en las ciudades de fortaleza
  lexicon: HALOT
  rationale: עָרֵי הַמִּבְצָר se refiere a ciudades protegidas por fortificación; «ciudades fortificadas» es el español más natural y fiel.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó un matiz concesivo incorrecto por una coordinación simple («and»). La redacción española sigue esa coordinación con «y» antes de «los sobrevivientes», evitando cualquier lectura concesiva. También se mantiene la transparencia formal de «hijos de Israel» y la idea de una destrucción total seguida por la supervivencia de unos pocos.
  spanish_consistency_notes:
  - Se usó «Y aconteció que» para mantener el tono narrativo bíblico con español claro.
  - 'Se preservó la secuencia causal-temporal del hebreo: terminación de la acción, exterminio, supervivencia de algunos, entrada en ciudades fortificadas.'
  - «Exterminados» y «matanza» reflejan el campo semántico bélico del pasaje sin suavizarlo.
  - «Ciudades fortificadas» mantiene la fuerza defensiva de הַמִּבְצָר.
  - No se empleó «SEÑOR» ni otras sustituciones de nombre divino, ya que este versículo no las contiene.
