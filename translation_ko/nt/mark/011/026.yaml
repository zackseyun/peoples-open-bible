  yaml_path: translation/nt/mark/011/026.yaml
  text: But[a] if you do not forgive, neither will your Father who is in heaven forgive your trespasses.
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the 4th-century Sinaiticus and Vaticanus) and early Coptic versions, but is present in the Byzantine majority tradition, the Latin tradition, and most Syriac witnesses. It was likely added by later scribes to harmonize with Jesus's words in Matthew 6:15.
    reason: textual_critical
translation:
  language: ko
  text: '[그러나 여러분이 용서하지 않으면, 하늘에 계신 여러분의 아버지께서도 여러분의 잘못을 용서하지 않으실 것입니다.]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이 절은 가장 오래된 헬라어 사본에는 나타나지 않으며, 후대에 마태복음 6:15에서 옮겨 적은 것으로 보입니다. 본문의 흐름을 위해 대괄호 안에 보존합니다.
    reason: textual_variant
theological_decisions:
- issue: 11:26의 본문 비평적 위상
  chosen_reading: 본문에서 대괄호로 표시하되 본체에 보존
  alternative_readings:
  - 본체에서 제외
  - 각주로 옮김
  rationale: 11:26은 시내, 바티칸, 베자 등 주요 사본에서 누락되며, NA28/SBLGNT는 의심스러운 본문으로 처리한다. 영어 POB가 본문에 포함하였으므로 일관성을 위해 대괄호 표시로 보존하되, 후대 첨가일 가능성을 각주에서 명시한다.
