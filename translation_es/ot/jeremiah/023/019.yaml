translation:
  language: es
  text: Mira[a], la tormenta de Yahvé ha salido[b] en ira, una tempestad arremolinada[c]; se arremolinará sobre la cabeza de los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tempestad de Yahvé» o «el torbellino de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: '«Ha salido» refleja el perfecto profético: un juicio futuro presentado como ya puesto en marcha.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se descargará sobre la cabeza de los malvados». El verbo final puede destacar tanto el movimiento de remolino como el impacto con que la tormenta cae sobre ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: Expresa la partícula deíctica con inmediatez natural en español moderno. 'Mira' conserva el tono de anuncio vívido mejor que un calco más arcaico.
- source_word: סַעֲרַת יְהוָה
  english_pob_choice: the storm of Yahweh
  chosen_spanish: la tormenta de Yahvé
  alternatives_spanish:
  - la tempestad de Yahvé
  - el torbellino de Yahvé
  lexicon: HALOT
  rationale: סַעֲרָה nombra una tormenta/ tempestad violenta. 'Tormenta' es la opción más clara y natural en español, mientras que el genitivo 'de Yahvé' preserva que la tormenta procede de él o le pertenece.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el Tetragrámaton. 'Yahvé' es la forma establecida en el texto español base y preserva el nombre pactual sin sustituirlo por una máscara litúrgica.
- source_word: חֵמָה
  english_pob_choice: in wrath
  chosen_spanish: en ira
  alternatives_spanish:
  - en furor
  - en cólera
  lexicon: HALOT
  rationale: La construcción adverbial se vierte de forma natural como 'en ira'. Mantiene el sentido de juicio encendido sin suavizar el término.
- source_word: יָצְאָה
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido afuera
  - ha salido ya
  lexicon: HALOT
  rationale: El perfecto profético se mantiene con pretérito perfecto compuesto. 'Ha salido' conserva la imagen de un movimiento ya desencadenado y la certeza del juicio futuro.
- source_word: וְסַעַר
  english_pob_choice: a whirling tempest
  chosen_spanish: un torbellino
  alternatives_spanish:
  - un vendaval
  - una tempestad
  lexicon: HALOT
  rationale: El segundo término intensifica la imagen de violencia giratoria. 'Torbellino' comunica bien esa energía de remolino y permite conservar la progresión de la metáfora meteorológica.
- source_word: מִתְחוֹלֵל
  english_pob_choice: whirling
  chosen_spanish: que gira
  alternatives_spanish:
  - girando
  - remolinando
  lexicon: HALOT
  rationale: El participio hitpolel de חול expresa movimiento circular violento. En español, 'que gira' es breve y natural, y puede funcionar atributivamente con 'torbellino'.
- source_word: עַל רֹאשׁ רְשָׁעִים
  english_pob_choice: on the head of the wicked
  chosen_spanish: sobre la cabeza de los malvados
  alternatives_spanish:
  - sobre la cabeza de los impíos
  - sobre las cabezas de los malvados
  lexicon: HALOT
  rationale: Se conserva el singular 'cabeza' del hebreo como idiomatismo colectivo. 'Malvados' transmite el plural sustantivado sin introducir un tecnicismo eclesiástico.
- source_word: יָחוּל
  english_pob_choice: it will whirl down
  chosen_spanish: girará
  alternatives_spanish:
  - caerá
  - se precipitará
  lexicon: HALOT
  rationale: El verbo final comparte raíz e imagen con el participio anterior y puede seguir la idea de movimiento giratorio. 'Girará' preserva la conexión léxica y deja implícito el impacto sobre los malvados.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, por lo que se conserva el nombre propio divino en español. Se evita 'el SEÑOR' porque en este proyecto funcionaría como ocultamiento del nombre original, no como traducción directa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Perfecto profético en יָצְאָה
  english_pob_reading: has gone out
  chosen_spanish_reading: ha salido
  alternative_spanish_readings:
  - sale
  - saldrá
  rationale: La forma perfecta hebrea presenta como ya iniciado un juicio futuro cierto. El pretérito perfecto compuesto español conserva esa fuerza retórica sin convertirlo en un futuro plano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense and theological tension'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail en inglés: mantiene la imagen de tormenta/torbellino, conserva el perfecto profético y evita suavizar el juicio. Se prefirió un español más natural (''tormenta'', ''mira'', ''ha salido'') sin perder la conexión verbal entre el participio y el verbo final.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - '''Malvados'' traduce el plural sustantivado רְשָׁעִים sin forzar un singular o un tecnicismo.'
  - Se mantiene la imaginería meteorológica completa para no desdibujar la amenaza profética.
