base_translation:
  language: en
  yaml_path: translation/ot/1_kings/011/020.yaml
  text: And the sister of Tahpenes bore him Genubath his son[a], and Tahpenes weaned him within Pharaoh’s house[b]; and Genubath was in Pharaoh’s house among the sons of Pharaoh.
  footnotes:
  - marker: a
    text: Or, 'Tahpenes’s sister bore him a son, Genubath.' The Hebrew word order can be represented either way in English, but the sense is unchanged.
    reason: lexical_alternative
  - marker: b
    text: '''Weaned him'' refers to the child’s being brought to the stage of no longer nursing, after which he remained in Pharaoh’s household.'
    reason: cultural_note
