review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el λόγος es necesario para la ἐπιστήμη y contiene elogio de la virtud suprema identificada como φρόνησις. Sin embargo, la colocación de las notas no sigue la lógica del audit trail inglés: la alternativa de «entendimiento/conocimiento» debe anclarse en la frase correspondiente, y la alternativa de φρόνησις debe anclarse en «prudencia», no en «la virtud más grande». También conviene mejorar la naturalidad de «contiene elogio de» en español.'
  spanish_quality_summary: El español es claro y digno, pero «contiene elogio de la virtud más grande» suena algo duro e idiomáticamente débil. «Contiene alabanza de la mayor virtud» o «incluye elogio de la mayor virtud» fluye mejor. Además, «porque en verdad» puede simplificarse a «pues en verdad» para un arranque más natural en registro literario.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Discurso», «virtud» y «prudencia» encajan bien con el registro filosófico documentado. La nota alternativa para εἰς ἐπιστήμην debe mantener «conocimiento»/«entendimiento», y la de φρόνησις debe acompañar a «prudencia».
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota [b] explica φρόνησις («sabiduría práctica»), pero en el texto actual está anclada a «la virtud más grande» en vez de a «prudencia», lo que desajusta el soporte documental.
  - severity: low
    issue: 'Expresión algo rígida: «contiene elogio de»'
    rationale: Aunque es comprensible y cercana al griego, en español suena menos natural que «contiene alabanza de» o «incluye elogio de».
  - severity: low
    issue: 'Superlativo mejorable: «la virtud más grande»'
    rationale: «La mayor virtud» suena más idiomático en español para una clasificación de virtudes, sin pérdida de sentido.
  revised_spanish_text: Pues en verdad este discurso es necesario para el conocimiento[a], e incluye elogio de la mayor virtud, quiero decir, de la prudencia[b].
  revised_footnotes:
  - marker: a
    text: O «entendimiento». El griego εἰς ἐπιστήμην puede traducirse de ambas maneras.
    reason: alternative_reading
  - marker: b
    text: O «sabiduría práctica». El griego φρόνησις denota un juicio moral prudente.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota sobre φρόνησις para que recaiga en «prudencia», se mejora la naturalidad del español con «incluye elogio» y «la mayor virtud», y se mantiene intacto el sentido filosófico del original y del audit trail inglés.
