  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה -> «Yahvé»; no hay conflicto con otros términos clave. La decisión de «habló a Israel y a Judá» sigue la revisión auditada y es aceptable en español.'
