translation:
  language: es
  text: Recibirá bendición de Yahvé y justicia[a] del Dios de su salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vindicación» o «rectitud». El término hebreo también puede tener matices judiciales y salvíficos, además del sentido moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  english_pob_choice: will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - llevará
  - cargará con
  - alzará
  lexicon: HALOT
  rationale: Con un objeto abstracto como «bendición», el verbo hebreo expresa obtener o recibir más que portar físicamente. «Recibirá» conserva ese sentido idiomático en español natural sin perder la relación con el hebreo.
- source_word: בְּרָכָה
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendiciones
  - favor
  lexicon: HALOT
  rationale: «Bendición» es el equivalente más directo y fiel para בְּרָכָה. Se mantiene en singular, como en el hebreo, para preservar la unidad del don recibido.
- source_word: יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: 'DOCTRINE.md contested term: YHWH'
  rationale: El texto hebreo usa directamente el nombre divino. En este proyecto, la convención es traducirlo como «Yahvé» en lugar de ocultarlo con un título. Aquí el matiz de origen está implícito por el verbo y el paralelismo, por lo que no hace falta repetir una preposición adicional en la frase principal.
- source_word: וּצְדָקָה
  english_pob_choice: and righteousness
  chosen_spanish: y justicia
  alternatives_spanish:
  - y rectitud
  - y vindicación
  lexicon: HALOT
  rationale: צְדָקָה puede abarcar justicia, rectitud o vindicación. «Justicia» preserva mejor en español la amplitud legal y salvífica del término en este contexto, sin reducirlo a una sola lectura moral.
- source_word: מֵאֱלֹהֵי יִשְׁעוֹ
  english_pob_choice: from the God of his salvation
  chosen_spanish: del Dios de su salvación
  alternatives_spanish:
  - del Dios que lo salva
  - de Dios, su Salvador
  lexicon: HALOT
  rationale: 'La construcción hebrea se conserva de forma bastante literal para mantener la relación genitiva: Dios es el Dios perteneciente a, o caracterizado por, su salvación. «De su salvación» refleja la forma y deja abierta la doble fuerza de origen y de acción salvadora.'
- source_word: יִשְׁעוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su rescate
  lexicon: HALOT
  rationale: «Salvación» es el sustantivo más natural y teológicamente adecuado en este salmo. Mantiene el campo semántico amplio de יִשְׁעֹ, que puede incluir liberación o rescate.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto masorético contiene el Tetragrámaton. Siguiendo la convención doctrinal del proyecto, se conserva el nombre propio divino en español como «Yahvé», evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Range of צְדָקָה
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - vindicación
  rationale: La palabra hebrea puede señalar justicia, vindicación judicial o rectitud covenantal. En este verso, «justicia» permite conservar la amplitud del término y su posible carga salvífica sin cerrar indebidamente el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; contested terms principle
translation_notes:
  revision_awareness: La revisión más reciente reporta el texto como estable y sin cambios necesarios; este borrador sigue esa línea y mantiene las decisiones léxicas y teológicas ya auditadas, con adaptación natural al español.
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé» según la convención del proyecto.
  - Se mantiene el paralelismo hebreo entre «bendición» y «justicia».
  - La nota de pie preserva la ambigüedad de צְדָקָה sin reducirla a una sola lectura.
  - El tono es bíblico y digno, pero en español contemporáneo claro.
