translation:
  language: es
  text: 'Y esto será para ustedes una ordenanza permanente: en el séptimo mes[a], el día diez del mes, se humillarán, y no harán ningún trabajo, tanto el nativo como el forastero que reside[b] entre ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se afligirán». La expresión se entiende tradicionalmente como que incluye el ayuno.
    reason: lexical_alternative
  - marker: b
    text: O, «el residente foráneo que reside entre ustedes». El hebreo conserva un matiz legal de permanencia dentro de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And this shall be
  chosen_spanish: Y esto será
  alternatives_spanish:
  - Y será
  - Y esto se hará
  lexicon: HALOT
  rationale: En una fórmula legal, הָיְתָה introduce una disposición vigente. «Esto» recoge el referente implícito del mandato previo sin añadir contenido nuevo, y «será» conserva el valor normativo futuro del texto.
- source_word: לְחֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: una ordenanza permanente
  alternatives_spanish:
  - una ordenanza perpetua
  - un estatuto para siempre
  lexicon: HALOT
  rationale: חֻקָּה expresa una disposición normativa establecida; en español «ordenanza» funciona bien en registro bíblico y jurídico. עוֹלָם comunica duración continua dentro del marco del pacto, por eso «permanente» preserva la fuerza sin sonar arcaico.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el mes séptimo
  alternatives_spanish:
  - en el séptimo mes
  - en el séptimo mes del año
  lexicon: HALOT
  rationale: חֹדֶשׁ en datación calendárica significa «mes». «Mes séptimo» mantiene el orden natural del hebreo y es claro en español bíblico contemporáneo.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: el día diez del mes
  alternatives_spanish:
  - el diez del mes
  - en el décimo día del mes
  lexicon: HALOT
  rationale: La expresión hebrea indica el décimo día del mes; «el día diez del mes» es natural, preciso y fiel al sentido temporal.
- source_word: תְּעַנּוּ אֶת נַפְשֹׁתֵיכֶם
  english_pob_choice: you shall humble yourselves
  chosen_spanish: se humillarán
  alternatives_spanish:
  - se afligirán
  - se negarán a sí mismos
  lexicon: HALOT
  rationale: El POB inglés opta por un sentido amplio de auto-humillación o auto-denegación. En español, «se humillarán» conserva esa amplitud mejor que «se afligirán», que podría sonar más estrecho o físico; la lectura tradicional de ayuno queda implícita, no explicitada en el texto principal.
- source_word: וְכָל מְלָאכָה לֹא תַעֲשׂוּ
  english_pob_choice: and you shall do no work
  chosen_spanish: y no harán ninguna obra
  alternatives_spanish:
  - y no harán ningún trabajo
  - y no realizarán obra alguna
  lexicon: HALOT
  rationale: מְלָאכָה puede referirse a trabajo, labor u obra. «Obra» conserva bien el registro bíblico-jurídico y evita reducir el término a trabajo ordinario; la negación total sigue de cerca el hebreo.
- source_word: הָאֶזְרָח
  english_pob_choice: the native-born
  chosen_spanish: el nacido en la tierra
  alternatives_spanish:
  - el nativo
  - el ciudadano
  lexicon: HALOT
  rationale: אֶזְרָח designa al miembro autóctono de la comunidad. «Nacido en la tierra» mantiene la idea de pertenencia originaria y el contraste con el residente extranjero.
- source_word: הַגֵּר הַגָּר בְּתוֹכְכֶם
  english_pob_choice: the sojourner who sojourns among you
  chosen_spanish: el forastero que reside entre ustedes
  alternatives_spanish:
  - el extranjero residente entre ustedes
  - el forastero que mora entre ustedes
  lexicon: HALOT
  rationale: גֵּר es el residente foráneo integrado en la vida social de Israel. «Forastero» evita connotaciones políticas modernas de «extranjero» y «reside» refleja la permanencia social del verbo hebreo, manteniendo la repetición enfática del original con una forma natural en español.
theological_decisions:
- issue: Sentido de la auto-humillación en la legislación del Día de la Expiación
  english_pob_reading: Render broadly as 'you shall humble yourselves' rather than specifying fasting in the main text.
  chosen_spanish_reading: «se humillarán» en el texto principal, sin especificar ayuno.
  alternative_spanish_readings:
  - se afligirán
  - ayunarán
  rationale: El hebreo permite una gama más amplia que un único acto ritual. La redacción española conserva esa amplitud y evita cerrar la interpretación a ayuno, aunque esa práctica quede tradicionalmente asociada y pueda mencionarse en una nota.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje base auditado, y la solución española preserva el alcance semántico del hebreo y la decisión inglesa de no especificar ayuno en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma base del proyecto cuando aparezca el nombre divino; aquí no hay ocurrencia.
  - Se usa una distinción consistente entre el miembro autóctono («nacido en la tierra») y el residente foráneo («forastero»), preservando el contraste legal del hebreo.
  - La nota sobre auto-humillación evita imponer una interpretación ritual única en el cuerpo principal.
  - «Obra» se emplea por el valor jurídico de מְלָאכָה en este contexto, sin necesidad de cambiar a «trabajo».
