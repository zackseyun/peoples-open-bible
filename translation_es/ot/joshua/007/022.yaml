translation:
  language: es
  text: Así Josué envió mensajeros[a], y corrieron a la tienda; y he aquí que estaba escondido en su tienda, con la plata debajo de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la plata estaba debajo de ella». El hebreo simplemente coordina «y la plata» con la cláusula anterior; el español puede expresarlo como un detalle adicional de la escena o como una oración separada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שלח en narración se expresa naturalmente como «envió». Mantiene el valor básico de envío sin añadir matices de orden militar o formalidad excesiva.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  lexicon: HALOT
  rationale: El referente aquí es humano, no celestial; «mensajeros» preserva el sentido léxico y suena natural en español bíblico contemporáneo.
- source_word: וַיָּרֻצוּ
  english_pob_choice: they ran
  chosen_spanish: corrieron
  alternatives_spanish:
  - se apresuraron
  lexicon: HALOT
  rationale: רץ indica correr. «Corrieron» conserva la vividez narrativa mejor que una equivalencia más interpretativa como «se apresuraron».
- source_word: הָאֹהֱלָה
  english_pob_choice: to the tent
  chosen_spanish: hacia la tienda
  alternatives_spanish:
  - a la tienda
  lexicon: HALOT
  rationale: El hebreo señala movimiento direccional hacia la tienda; «hacia la tienda» comunica bien ese desplazamiento y resulta claro en español. «Tienda» mantiene la referencia concreta del contexto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y allí
  lexicon: HALOT
  rationale: La fórmula narrativa de descubrimiento se conserva con «y he aquí», que corresponde bien a la fuerza deíctica y dramática del hebreo.
- source_word: טְמוּנָה
  english_pob_choice: it was hidden
  chosen_spanish: estaba escondido
  alternatives_spanish:
  - estaba oculto
  - estaba sepultado
  lexicon: HALOT
  rationale: El participio femenino singular describe algo oculto/puesto a escondidas. «Estaba escondido» es fiel y natural; evita especificar «sepultado», que sería demasiado preciso para el lexema.
- source_word: בְּאָהֳלוֹ
  english_pob_choice: in his tent
  chosen_spanish: en su tienda
  alternatives_spanish:
  - dentro de su tienda
  lexicon: HALOT
  rationale: La forma con sufijo masculino singular remite a la tienda de Acán. «En su tienda» conserva la relación poseída sin sobrecargar la frase.
- source_word: וְהַכֶּסֶף
  english_pob_choice: with the silver
  chosen_spanish: con la plata
  alternatives_spanish:
  - y la plata
  lexicon: HALOT
  rationale: כֶּסֶף se traduce normalmente como «plata» en este contexto de botín. La coordinación hebrea permite entender un elemento adicional asociado al objeto escondido; «con la plata» refleja bien esa relación.
- source_word: תַּחְתֶּיהָ
  english_pob_choice: underneath it
  chosen_spanish: debajo de ella
  alternatives_spanish:
  - bajo ella
  - debajo de eso
  lexicon: HALOT
  rationale: El sufijo femenino singular remite probablemente al objeto ocultado mencionado en el verso anterior. «Debajo de ella» preserva el antecedente femenino y la relación espacial sin imponer una identificación más explícita que la del hebreo.
theological_decisions:
- issue: Referente implícito de «su tienda» y «debajo de ella»
  english_pob_reading: The Hebrew simply coordinates 'and the silver' with the preceding clause; English may express this either as an additional item in the scene or as a separate clause.
  chosen_spanish_reading: El español mantiene la coordinación narrativa y deja implícito que la plata está asociada con lo hallado, sin forzar una reescritura explicativa.
  alternative_spanish_readings:
  - «y la plata estaba debajo de ella»
  - «con la plata debajo de ella»
  rationale: El hebreo permite varias relaciones sintácticas entre el objeto escondido y la plata. La versión española conserva esa tensión al no resolverla de manera excesiva, siguiendo la prudencia auditada en el inglés POB.
  doctrine_reference: Ninguno; decisión sintáctica y semántica del texto narrativo.
translation_notes:
  revision_awareness: Se revisó el punto sintáctico señalado en el audit trail inglés sobre la coordinación de וְהַכֶּסֶף y se mantuvo una solución que no clausura la ambigüedad del original. No se registraron revisiones textuales posteriores; el pasaje quedó en alto acuerdo y sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «plata» para כֶּסֶף por el contexto de botín/metal precioso, no «dinero», siguiendo el uso léxico bíblico.
  - Se optó por «mensajeros» para מַלְאָכִים porque el referente es humano; no se usó «ángeles».
  - La puntuación reproduce una secuencia narrativa fluida con dos puntos y coma equivalente al ritmo del original, sin añadir interpretación.
