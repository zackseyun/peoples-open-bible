translation:
  language: es
  text: Lo vistió con esplendor completo[a] y lo adornó con gloria y fuerza, con prendas interiores, túnicas y una túnica exterior; y lo rodeó con campanillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conservado y el griego difieren en los detalles de las vestiduras sacerdotales en este punto. El hebreo dice «prendas interiores, túnicas y una túnica exterior ... campanillas», mientras que el testigo griego presenta otra secuencia e incluye el efod. O «pleno ornamento de belleza» para «esplendor completo»; la expresión hebrea es compacta y exaltada, y el griego apunta en una dirección igualmente elevada.
    reason: textual_variant_and_lexical_alternative
lexical_decisions:
- source_word: וילבישהו
  english_pob_choice: He clothed him
  chosen_spanish: Lo vistió
  alternatives_spanish:
  - Lo clotó
  - Lo revistió
  lexicon: HALOT
  rationale: El hifil de לבש expresa vestir a alguien. En español, "lo vistió" conserva el acto ceremonial con naturalidad y sin introducir terminología eclesiástica posterior.
- source_word: כליל תפארת
  english_pob_choice: complete splendor
  chosen_spanish: completa gloria
  alternatives_spanish:
  - esplendor completo
  - gloria plena
  - ornamento perfecto de belleza
  lexicon: HALOT
  rationale: La expresión hebrea comunica totalidad y esplendor exaltado; el griego también apunta a una noción elevada de honor. "Completa gloria" suena natural en español y mantiene el sentido de plenitud honorífica.
- source_word: ויפארהו
  english_pob_choice: adorned him
  chosen_spanish: lo adornó
  alternatives_spanish:
  - lo glorificó
  - lo embelleció
  - lo honró
  lexicon: HALOT
  rationale: El verbo פאר aquí se refiere al embellecimiento solemne mediante vestiduras. "Lo adornó" conserva el valor concreto y honorífico a la vez.
- source_word: בכבוד ועוז
  english_pob_choice: with glory and strength
  chosen_spanish: con gloria y fuerza
  alternatives_spanish:
  - con honor y poder
  - con esplendor y poder
  lexicon: HALOT
  rationale: כבוד y עוז expresan dignidad y fortaleza. "Gloria y fuerza" sigue de cerca el paralelismo hebreo y es claro para el lector español.
- source_word: מכנסים
  english_pob_choice: undergarments
  chosen_spanish: calzoncillos
  alternatives_spanish:
  - ropa interior
  - pantalones
  - prendas interiores
  lexicon: HALOT
  rationale: El término designa la prenda inferior sacerdotal. En español, "calzoncillos" comunica bien la función de prenda interior; se evita "pantalones" por anacrónico y por perder el matiz de ropa interior ritual.
- source_word: כתנות
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - vestiduras
  - ropas
  - sayos
  lexicon: HALOT
  rationale: כתנת se traduce con frecuencia como "túnica" en contextos bíblicos. El plural se mantiene para reflejar la lista de prendas.
- source_word: ומעיל
  english_pob_choice: and a robe
  chosen_spanish: un manto
  alternatives_spanish:
  - una capa
  - un vestido exterior
  - una túnica exterior
  lexicon: HALOT
  rationale: מעיל es una prenda exterior de tipo manto o túnica larga. "Manto" es un equivalente claro y digno en español, menos eclesiástico que "sotana" y más preciso que "ropa".
- source_word: ויקיפהו
  english_pob_choice: he encircled him
  chosen_spanish: lo rodeó
  alternatives_spanish:
  - lo circundó
  - lo ceñó
  - lo cercó
  lexicon: HALOT
  rationale: El verbo expresa rodear/encerrar alrededor. Dado que las campanillas se colocan alrededor de la vestidura, "lo rodeó" reproduce bien la imagen sin sonar forzado.
- source_word: פעמונים
  english_pob_choice: bells
  chosen_spanish: campanillas
  alternatives_spanish:
  - campanas
  - sonajas
  lexicon: HALOT
  rationale: El hebreo dice simplemente "bells". "Campanillas" funciona mejor en español para pequeñas campanas ornamentales y mantiene el carácter sacerdotal de la prenda.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en un pasaje con divergencia textual
  english_pob_reading: Translate primarily from the extant Hebrew, with the Greek used as a control for the elevated clothing imagery.
  chosen_spanish_reading: Traducir principalmente desde el hebreo conservado, usando el griego solo como control del tono y de la imaginería vestimentaria.
  alternative_spanish_readings:
  - Seguir más de cerca el orden griego con referencias al efod
  - Fusionar ambos testigos en una sola redacción armonizada
  rationale: La base hebrea es coherente y suficiente, aunque el expediente marca una discrepancia importante con el griego. Por eso la versión española sigue al hebreo y conserva la lista de prendas y campanillas, sin imponer elementos que el hebreo de esta línea no nombra.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach; use Greek parallel as actual input'
- issue: Valor de כליל תפארת como expresión intensiva de honor
  english_pob_reading: complete splendor / full ornament of beauty
  chosen_spanish_reading: completa gloria
  alternative_spanish_readings:
  - esplendor perfecto
  - ornamento completo de belleza
  - gloria plena
  rationale: La expresión hebrea es compacta y exaltada; en español, "completa gloria" conserva la fuerza totalizante sin sobrecargar la frase. Se evita banalizarla con una paráfrasis demasiado libre.
  doctrine_reference: Lexical-theological consistency for exalted priestly investiture
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al preferir una formulación más natural para כליל תפארת, tratar מכנסים como prenda interior y mantener la puntuación fluida con una lista de vestiduras seguida de las campanillas.
  spanish_consistency_notes:
  - Se conservó el paralelismo de prendas y adorno ritual con un registro bíblico sobrio.
  - Se evitó traducir mecánicamente desde el inglés; las decisiones se tomaron a partir del hebreo y del control griego.
  - Los marcadores de nota [a] y [b] aparecen exactamente donde sus alternativas corresponden en el texto.
