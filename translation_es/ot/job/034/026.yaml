revisions:
- from: Él los derriba como[a] impíos, en un lugar donde se les puede ver.
  to: Él los golpea como[a] impíos, en un lugar donde todos pueden ver[b].
  rationale: Se cambia 'derriba' por 'golpea' para reflejar mejor el valor verbal de סְפָקָם como acto de golpe judicial. Se revisa la última frase a 'donde todos pueden ver' para expresar con más naturalidad la publicidad del castigo, y se añade una nota para preservar la alternativa participial de רֹאִים ya documentada en el POB inglés.
