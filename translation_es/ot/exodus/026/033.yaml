revisions:
- from: Pondrás el velo[a] debajo de los corchetes, y allá, dentro del velo, meterás el arca del testimonio[b]; y el velo separará para ustedes entre el Lugar Santo y el Lugar Santísimo[c].
  to: Pondrás el velo debajo de los corchetes, y allí, dentro del velo, traerás el arca del testimonio[a]; y el velo hará separación para ustedes entre el Lugar Santo y el Lugar Santísimo[b].
  rationale: Se corrigió 'meterás' a 'traerás' para reflejar mejor וְהֵבֵאתָ y mantener un registro más digno; 'allá' a 'allí' por naturalidad; y 'separará' a 'hará separación' para una lectura más idiomática con לָכֶם conservado. Se eliminó la nota sobre 'velo/cortina' por no ser la alternativa principal documentada en el audit trail y se corrigió la nota del recinto interior para que el literal corresponda realmente al hebreo.
