  yaml_path: translation/ot/1_samuel/024/007.yaml
  text: And he said to his men[a], “Far be it from me, from Yahweh, that I should do this thing to my lord, Yahweh’s anointed, to stretch out my hand against him, for he is Yahweh’s anointed.”
  footnotes:
