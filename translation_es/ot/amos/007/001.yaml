translation:
  language: es
  text: 'Esto es lo que el Señor Yahvé me mostró: he aquí que estaba formando langostas al comienzo del brote del crecimiento tardío[a], y he aquí que era el crecimiento tardío[a] después de los cortes del rey[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el segundo crecimiento» o «la cosecha tardía». El hebreo se refiere al crecimiento posterior al primer corte.'
    reason: lexical_alternative
  - marker: b
    text: «Los cortes del rey» probablemente se refiere a un corte inicial de pasto o forraje reclamado como tributo real, después del cual brotaba el crecimiento tardío.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: This is what
  chosen_spanish: Así me mostró
  alternatives_spanish:
  - Esto es lo que me mostró
  - De esta manera me mostró
  lexicon: HALOT
  rationale: La fórmula introductoria del reportaje visionario se expresa de modo natural en español con una construcción que introduce el contenido de la visión sin sonar arcaica. 'Así me mostró' conserva la fuerza demostrativa y el carácter profético de la expresión hebrea.
- source_word: הִרְאַנִי
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me causó ver
  lexicon: HALOT
  rationale: El hifil de ראה introduce una visión profética. 'Me mostró' es idiomático en español y comunica la percepción causada sin forzar una calca.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como 'Yahvé' según la política del proyecto. La combinación con אֲדֹנָי se vuelve 'el Señor Yahvé' para evitar la doblez artificial de 'Señor SEÑOR' y mantener ambos elementos del título compuesto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce una presentación vívida en la visión. 'He aquí' preserva la solemnidad y la inmediatez profética en español bíblico contemporáneo.
- source_word: יוֹצֵר
  english_pob_choice: was forming
  chosen_spanish: estaba formando
  alternatives_spanish:
  - formaba
  - iba formando
  lexicon: HALOT
  rationale: El participio presenta una acción en curso dentro de la visión. 'Estaba formando' refleja bien el aspecto progresivo sin perder claridad.
- source_word: גֹּבַי
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - saltamontes
  - langosta
  lexicon: HALOT
  rationale: En contexto agrícola de juicio, el término natural y preciso en español es 'langostas'. Evita una lectura de insecto genérico y conserva el sentido devastador.
- source_word: בִּתְחִלַּת עֲלוֹת
  english_pob_choice: at the beginning of ... coming up
  chosen_spanish: al comienzo de la subida de
  alternatives_spanish:
  - al principio de la aparición de
  - cuando comenzaba a brotar
  lexicon: HALOT
  rationale: La frase marca el inicio del emerger del cultivo. 'Al comienzo de la subida de' mantiene la secuencia temporal y el movimiento verbal del hebreo, aunque se complementa con un término agrícola más claro en el sustantivo siguiente.
- source_word: הַלָּקֶשׁ / לֶקֶשׁ
  english_pob_choice: the spring crop / the spring crop
  chosen_spanish: el segundo crecimiento
  alternatives_spanish:
  - la cosecha tardía
  - el crecimiento tardío
  lexicon: HALOT
  rationale: לקש designa la vegetación/cosecha posterior. 'Segundo crecimiento' comunica la relación temporal y la idea de crecimiento posterior de manera transparente en español, sin reducirlo a una cosecha ya recogida.
- source_word: אַחַר
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: Preposición temporal directa que expresa secuencia en español natural.
- source_word: גִּזֵּי הַמֶּלֶךְ
  english_pob_choice: the king's mowings
  chosen_spanish: los primeros cortes del rey
  alternatives_spanish:
  - los segados del rey
  - los cortes de hierba del rey
  lexicon: HALOT
  rationale: La expresión alude al primer corte de pasto o forraje reservado como derecho real. 'Los primeros cortes del rey' conserva la imagen agrícola y la referencia cultural sin sobrecargar el texto con explicación interpretativa.
theological_decisions:
- issue: Título divino compuesto con el Nombre de Yahvé
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo usa אֲדֹנָי junto con el Tetragrammaton. En español se mantiene el valor de ambos elementos sin sustituir el Nombre por una convención de ocultamiento. 'Señor Yahvé' es claro, reverente y coherente con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretación de לֶקֶשׁ
  english_pob_reading: the spring crop / the spring crop after the king's mowings
  chosen_spanish_reading: el segundo crecimiento ... después de los primeros cortes del rey
  alternative_spanish_readings:
  - la cosecha tardía ... después de los cortes del rey
  - el crecimiento tardío ... después del corte del rey
  rationale: El énfasis del hebreo está en la vegetación posterior a un primer corte. La redacción española conserva esa tensión agrícola sin cerrar indebidamente el sentido entre 'cosecha' y 'crecimiento'.
  doctrine_reference: HALOT s.v. לקש; contexto agrícola de juicio en Amós
- issue: Valor de la visión profética en וְהִנֵּה
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mira
  - y he aquí
  rationale: Se mantiene el golpe visual y exhortativo de la visión. 'He aquí' es formal y adecuado a un registro profético, evitando una banalización coloquial.
  doctrine_reference: Uso discursivo profético en literatura bíblica
translation_notes:
  revision_awareness: La versión inglesa ya fue revisada y quedó sin cambios; esta propuesta española sigue la misma lectura alta de concordancia, preservando el reporte visionario, el Nombre divino como Yahvé y la ambigüedad agrícola de לקש sin neutralizarla.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''He aquí'' reproduce ambas apariciones de וְהִנֵּה con el mismo valor discursivo.'
  - '''Langostas'' conserva la fuerza de juicio agrícola; no se suaviza a un término genérico.'
  - '''Segundo crecimiento'' intenta equilibrar claridad y literalidad para לקש, sin decidir de forma cerrada entre ''cosecha'' y ''crecimiento''.'
