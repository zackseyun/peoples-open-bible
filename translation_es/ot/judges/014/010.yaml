  glossary_alignment: No hay conflicto con la terminología de proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. 'Sansón', 'mujer', 'banquete' y 'jóvenes' son adecuados. La opción 'banquete' para מִשְׁתֶּה es aceptable dentro de la justificación dada.
