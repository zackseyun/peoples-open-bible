translation:
  language: es
  text: 'Jesús dijo[a]: «Busquen al Viviente[b] mientras estén vivos, para que no mueran[c] y luego busquen verlo[d]; y no podrán verlo[e][f].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Busquen al» refleja ϭⲱϣⲧ con ⲛⲥⲁ; también podría entenderse como «busquen» o «busquen tras».
    reason: lexical_alternative
  - marker: b
    text: «El Viviente» traduce la construcción relativa ⲡⲉⲧⲉⲣⲉⲱⲛϩ, literalmente «el que está viviendo».
    reason: lexical_alternative
  - marker: c
    text: La construcción negativa de propósito también puede rendirse de forma más compacta como «no sea que mueran».
    reason: lexical_alternative
  - marker: d
    text: ϣⲓⲛⲉ puede significar «buscar»; aquí, con «ver», la idea es «buscar ver» o «procurar ver». Se conserva «buscar» para mantener el motivo temático de Thomas.
    reason: lexical_alternative
  - marker: e
    text: ϣϭⲙϭⲟⲙ significa literalmente «ser fuerte»; idiomáticamente, «poder» o «ser capaz».
    reason: cultural_note
  - marker: f
    text: El manuscrito tiene ⲉⲣⲟϥ y el texto normalizado ⲉⲛⲧⲟϥ; ambas formas significan «a él / lo».
    reason: dialect_note
lexical_decisions:
- source_word: ϭⲱϣⲧ ⲛⲥⲁ
  english_pob_choice: seek after
  chosen_spanish: busca al
  alternatives_spanish:
  - busca tras
  - busca después de
  - busca
  lexicon: Crum; Layton
  rationale: Con ⲛⲥⲁ, ϭⲱϣⲧ expresa búsqueda dirigida o de persecución. En español, «busca al» conserva la fuerza verbal sin sonar forzado; el valor de «after» se mantiene implícito por el contexto y por el objeto personal.
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ
  english_pob_choice: the Living One
  chosen_spanish: el Viviente
  alternatives_spanish:
  - el que vive
  - el que está vivo
  - el Ser viviente
  lexicon: Layton (construcción relativa)
  rationale: La construcción relativa apunta a «el que está viviendo». «El Viviente» preserva el peso titular de la expresión en Thomas sin imponer una identificación cristológica específica.
- source_word: ϩⲱⲥ ⲉⲣⲉ…ⲱⲛϩ
  english_pob_choice: while you are living
  chosen_spanish: mientras estés vivo
  alternatives_spanish:
  - mientras vivas
  - cuando estés vivo
  - así como estás vivo
  lexicon: Lambdin §157; Layton
  rationale: La cláusula circumstancial exige valor temporal. «Mientras estés vivo» es natural en español y reproduce la condición temporal del original.
- source_word: ϩⲓⲛⲁ ϫⲉ
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para no
  - con el fin de que
  lexicon: Lambdin §167; Layton
  rationale: El giro de propósito negativo se expresa con claridad en español mediante «para que» + subjuntivo, manteniendo la relación de finalidad y prevención.
- source_word: ⲛⲛⲉ … ⲙⲟⲩ
  english_pob_choice: you do not die
  chosen_spanish: no mueras
  alternatives_spanish:
  - no mueras tú
  - no vayas a morir
  - no mueres
  lexicon: Lambdin; Crum (ⲙⲟⲩ)
  rationale: 'La negación de propósito en segunda persona singular se rinde con un subjuntivo natural: «no mueras». Evita el calco «para que no mueras» repetido de forma pesada en la frase final.'
- source_word: ϣⲓⲛⲉ
  english_pob_choice: seek / try
  chosen_spanish: busques
  alternatives_spanish:
  - intentes buscar
  - procures buscar
  - buscar
  lexicon: Crum
  rationale: Siguiendo la revisión del POB, ϣⲓⲛⲉ mantiene el motivo temático de «buscar». En español, «busques» preserva esa red lexical y evita diluir el verbo en «intentar».
- source_word: ⲉⲛⲁⲩ
  english_pob_choice: to see
  chosen_spanish: verlo
  alternatives_spanish:
  - ver a él
  - mirarlo
  lexicon: Crum
  rationale: ⲉⲛⲁⲩ es el infinitivo «ver». En español, el clítico «lo» expresa de modo natural el objeto masculino retomando al Viviente.
- source_word: ϣϭⲙϭⲟⲙ
  english_pob_choice: be able
  chosen_spanish: podrás
  alternatives_spanish:
  - serás capaz de
  - tendrás poder para
  lexicon: Crum
  rationale: El idiomatismo copto «ser fuerte/poder» con infinitivo se traduce de forma directa y clara por «podrás», que en español comunica la capacidad sin inflar el enunciado.
theological_decisions:
- issue: Identificación del «Viviente»
  english_pob_reading: Capitalized title-like expression without forcing a specific christological label.
  chosen_spanish_reading: «el Viviente» como título abierto, sin añadir «Cristo» ni «Mesías».
  alternative_spanish_readings:
  - «el que vive»
  - «el que está vivo»
  - «Cristo vivo»
  rationale: El texto copto usa una expresión relativa con fuerza nominal, pero no exige en este dicho una identificación explícita. Mantenerla abierta respeta la prudencia del POB y evita introducir un título no atestiguado por el pasaje.
  doctrine_reference: Criterio de fidelidad semántica y cautela cristológica en textos no explícitos.
- issue: Valor del propósito negativo
  english_pob_reading: so that you do not die / lest you die.
  chosen_spanish_reading: «para que no mueras».
  alternative_spanish_readings:
  - «no sea que mueras»
  - «lest you die»
  - «para no morir»
  rationale: El copto marca una finalidad preventiva. En español, «para que no mueras» conserva el sentido de prevención sin volver arcaico el registro. «No sea que» sería posible, pero menos directo para una lectura pública.
  doctrine_reference: Sintaxis de finalidad y prevención; no implica una doctrina especial.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB que corrigió una propuesta de «try to see him» a favor de preservar la red temática de ϣⲓⲛⲉ como «seek». Por eso la traducción española usa «busques» y no un equivalente de «intentar». También se tuvo presente que la lectura final del audit trail considera estable el texto sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa «Jesús» para ⲓⲏⲥⲟⲩⲥ conforme al estándar del proyecto.
  - Se mantiene «Viviente» con mayúscula inicial para reflejar su peso titular en Thomas.
  - Se evita «SEÑOR» o una sustitución confesional no presente en el copto.
  - «Podrás verlo» recoge la capacidad implícita de ϣϭⲙϭⲟⲙ sin sobreexplicar.
  - La puntuación y el orden de la frase buscan una lectura pública natural en español.
