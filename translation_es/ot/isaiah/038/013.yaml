    rationale: Aunque transmite el sentido, en español suena más idiomático y preciso decir 'así quiebra todos mis huesos'. Esto además refleja mejor el hebreo, donde el objeto directo es 'todos mis huesos'.
  - severity: low
    issue: Omisión del posesivo en 'todos los huesos'
    rationale: El hebreo expresa explícitamente 'mis huesos'. En español puede omitirse a veces, pero aquí conviene conservarlo por fuerza poética y por cercanía al original.
  - severity: low
    issue: Expresión temporal mejorable en 'De día hasta la noche'
    rationale: No es incorrecta, pero 'Del día a la noche' suena más natural y más cercana al patrón 'from day to night' ya adoptado en el POB inglés.
  revised_spanish_text: Esperé hasta la mañana[a]; como un león, así quiebra[b] todos mis huesos. Del día a la noche me llevas a mi fin.
