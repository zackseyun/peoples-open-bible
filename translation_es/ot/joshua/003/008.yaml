translation:
  language: es
  text: 'Y tú ordenarás a los sacerdotes que llevan el arca del pacto[a], diciendo: «Cuando lleguen al borde de las aguas del Jordán, se pararán en el Jordán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la orilla de las aguas del Jordán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Ahora tú
  - Y usted
  lexicon: HALOT
  rationale: La conjunción más el pronombre independiente conservan la continuidad enfática del discurso dirigido a Josué. “Y tú” reproduce esa conexión y la focalización sin volver la frase innecesariamente pesada.
- source_word: תְּצַוֶּה
  english_pob_choice: shall command
  chosen_spanish: darás la orden
  alternatives_spanish:
  - mandarás
  - ordenarás
  lexicon: HALOT
  rationale: El piel imperfecto comunica una instrucción que Josué debe transmitir. “Darás la orden” mantiene la fuerza directiva y resulta natural en español bíblico moderno.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes levitas
  - los ministros
  lexicon: HALOT
  rationale: El término estándar en español para כֹּהֲנִים es “sacerdotes”; conserva la referencia cultual sin añadir precisión no presente en el hebreo.
- source_word: נֹשְׂאֵי
  english_pob_choice: who carry
  chosen_spanish: que llevan
  alternatives_spanish:
  - que cargan
  - portadores de
  lexicon: HALOT
  rationale: El participio en constructo funciona como modificador atributivo. “Que llevan” expresa de forma natural la idea de los sacerdotes como quienes llevan el arca.
- source_word: אֲרוֹן הַבְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca del convenio
  - el arca de la alianza
  lexicon: HALOT
  rationale: La POB en inglés usa “covenant” de manera técnica; en español, “pacto” conserva el sentido bíblico y evita un giro eclesiástico menos directo. “Alianza” sería posible, pero “pacto” mantiene mejor la fórmula clásica del concepto sin borrar su contenido jurídico-relacional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: Es la introducción quotativa estándar. “Diciendo” mantiene la relación sintáctica con la orden previa y prepara la cita directa.
- source_word: כְּבֹאֲכֶם
  english_pob_choice: When you come
  chosen_spanish: Cuando lleguen
  alternatives_spanish:
  - Cuando ustedes lleguen
  - Al llegar
  lexicon: HALOT
  rationale: El hebreo tiene valor temporal. En español, la segunda persona plural en contexto directo puede expresarse naturalmente con “lleguen” dentro de la cita, manteniendo la referencia a los sacerdotes sin rigidez innecesaria.
- source_word: עַד קְצֵה מֵי הַיַּרְדֵּן
  english_pob_choice: to the edge of the waters of the Jordan
  chosen_spanish: al borde de las aguas del Jordán
  alternatives_spanish:
  - hasta la orilla de las aguas del Jordán
  - al borde del agua del Jordán
  lexicon: HALOT
  rationale: “קְצֵה” expresa límite o extremo; “borde” recoge bien esa idea. “Aguas del Jordán” conserva la construcción hebrea y el plural poético/narrativo del original. La alternativa “orilla” es posible, pero “borde” sigue de cerca la imagen del texto.
- source_word: בַּיַּרְדֵּן
  english_pob_choice: in the Jordan
  chosen_spanish: en el Jordán
  alternatives_spanish:
  - dentro del Jordán
  - en el río Jordán
  lexicon: HALOT
  rationale: La preposición ב indica localización. “En el Jordán” es fiel al hebreo y natural en español bíblico; no añade “río” porque el contexto ya identifica el referente.
- source_word: תַּעֲמֹדוּ
  english_pob_choice: you shall stand
  chosen_spanish: se detendrán
  alternatives_spanish:
  - se pararán
  - permanecerán de pie
  lexicon: HALOT
  rationale: Aunque el verbo básico es “estar de pie”, aquí el mandato en contexto narrativo describe la acción de tomar posición en el río. “Se detendrán” comunica esa orden con claridad en español y evita una repetición poco idiomática de “estarán de pie”.
theological_decisions:
- issue: Nombre divino y fórmula de pacto en la tradición del arca
  english_pob_reading: the ark of the covenant
  chosen_spanish_reading: el arca del pacto
  alternative_spanish_readings:
  - el arca de la alianza
  - el arca del convenio
  rationale: No hay aquí una referencia explícita al Nombre divino, pero sí al arca vinculada al pacto. “Pacto” preserva el peso teológico y jurídico del término sin introducir una formulación denominacional ajena al hebreo.
  doctrine_reference: Pacto bíblico / teología del arca
- issue: Dirección imperativa dada a Josué y a los sacerdotes
  english_pob_reading: And you shall command ... saying
  chosen_spanish_reading: Y tú darás la orden ... diciendo
  alternative_spanish_readings:
  - Y tú mandarás ... diciendo
  - Y tú ordenarás ... diciendo
  rationale: El hebreo presenta a Josué como mediador de una orden divina. “Darás la orden” conserva esa cadena de autoridad sin suavizarla ni convertirla en mero consejo.
  doctrine_reference: Autoridad profética y obediencia al mandato divino
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se mantiene la equivalencia óptima sin cambios relevantes respecto a la decisión base. Se conservó la imagen de “borde/aguas del Jordán” y la localización “en el Jordán”, sin introducir ampliaciones interpretativas. No hay revisiones aplicadas en el expediente inglés, por lo que el borrador español sigue el mismo perfil textual.'
  spanish_consistency_notes:
  - Se usa “Jordán” con artículo implícito conforme al uso bíblico habitual en español.
  - Se prefirió “pacto” sobre “alianza” para mantener la terminología técnica del arca y del convenio sin desplazamiento semántico.
  - Se mantuvo la segunda persona plural en la cita directa (“lleguen”, “se detendrán”) para concordar con los sacerdotes destinatarios.
  - El único pie de nota corresponde a la alternativa léxica documentada para קְצֵה מֵי הַיַּרְדֵּן.
