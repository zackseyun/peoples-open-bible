translation:
  language: es
  text: ¡Guarden silencio ante el Señor Yahvé, porque el día de Yahvé está cerca! Porque Yahvé ha preparado un sacrificio; ha consagrado a sus invitados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «sus convocados», «sus llamados» o «sus huéspedes». En contexto, probablemente alude a quienes Yahvé ha reunido para el acto de juicio sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַס
  english_pob_choice: Be silent
  chosen_spanish: ¡Callen!
  alternatives_spanish:
  - ¡Guarden silencio!
  - ¡Callad!
  - ¡Silencio!
  lexicon: HALOT
  rationale: El hebreo es una interjección/imperativo breve que exige silencio solemne. En español, «¡Callen!» conserva la urgencia y funciona con naturalidad en un registro bíblico actual.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La frase idiomática expresa estar en la presencia de alguien. «Delante de» mantiene claridad y un tono reverente sin volverlo rígido.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: El hebreo combina Adonái con el nombre divino. En español, «el Señor Dios» reproduce la doble designación sin sonar artificial; se conserva Yahvé en el nombre propio del versículo y se mantiene la distinción reverente del título compuesto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato de silencio. «Porque» es la forma más directa y natural en español.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - se acerca
  lexicon: HALOT
  rationale: Expresa inminencia profética de manera clara y sobria.
- source_word: י֣וֹם יְהוָ֔ה
  english_pob_choice: the day of the LORD
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahweh
  - el día del Señor
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יְהוָה: «Yahvé». Así se preserva el nombre divino explícito del hebreo, en vez de sustituirlo por un título genérico.'
- source_word: הֵכִ֧ין
  english_pob_choice: has prepared
  chosen_spanish: ha preparado
  alternatives_spanish:
  - ha dispuesto
  - ha hecho listo
  lexicon: HALOT
  rationale: El perfecto comunica acción ya dispuesta/certidumbre. «Ha preparado» conserva la imaginería sacrificial sin añadir explicación.
- source_word: זֶבַח
  english_pob_choice: a sacrifice
  chosen_spanish: un sacrificio
  alternatives_spanish:
  - una víctima
  - un banquete sacrificial
  lexicon: HALOT
  rationale: El término básico es sacrificial; el contexto profético carga la imagen con juicio, pero la traducción principal debe dejar que esa tensión permanezca en el texto.
- source_word: הִקְדִּישׁ
  english_pob_choice: has consecrated
  chosen_spanish: ha consagrado
  alternatives_spanish:
  - ha santificado
  - ha apartado
  lexicon: HALOT
  rationale: «Consagrado» conserva el registro cultual y la idea de apartar para un fin específico.
- source_word: קְרֻאָיו
  english_pob_choice: his invited ones
  chosen_spanish: a sus invitados
  alternatives_spanish:
  - a sus convocados
  - a sus llamados
  lexicon: HALOT
  rationale: 'El participio pasivo admite varias posibilidades. «Invitados» mantiene la ambigüedad útil del hebreo: puede referirse a huéspedes, convocados o llamados sin resolver prematuramente la identidad.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh / GOD in the compound title 'the Lord GOD'
  chosen_spanish_reading: Yahvé / el Señor Dios
  alternative_spanish_readings:
  - Yahweh / el Señor Yahvé
  - el Señor
  rationale: 'El texto hebreo usa directamente el Tetragrámaton en dos lugares. Se sigue la norma del proyecto: «Yahvé» en el texto principal. En la combinación con אֲדֹנָי, «el Señor Dios» refleja la fórmula compuesta sin borrar el nombre propio divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretación de la imagen sacrificial y de los 'invitados'
  english_pob_reading: Retain the metaphor of the LORD preparing a sacrifice and consecrating invited ones without identifying them in the main text
  chosen_spanish_reading: Mantener el sacrificio y a los invitados sin identificarlos explícitamente
  alternative_spanish_readings:
  - Identificar a los invitados como naciones convocadas al juicio
  - Identificar el sacrificio como la destrucción de Judá
  rationale: El hebreo es deliberadamente terso. La traducción conserva la tensión teológica y la metáfora sacrificial sin resolver en el cuerpo del versículo quiénes son exactamente los invitados o qué detalle histórico se presupone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La versión coincide con el último pase de revisión y no requiere cambios respecto del control más reciente: se mantuvo el nombre divino explícito, la imagen sacrificial y la ambigüedad de ''sus invitados''.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «el Señor Dios» para la combinación אֲדֹנָי יְהוִה, evitando calcos poco naturales.
  - «Invitados» mantiene la ambigüedad del participio pasivo hebreo y permite lecturas alternativas en nota.
  - El tono es solemne y bíblico, pero con español actual y legible.
