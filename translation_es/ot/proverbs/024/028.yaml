  source_alignment_summary: 'El borrador español refleja bien la estructura prohibitiva del hebreo y el sentido principal: no dar testimonio contra el prójimo sin fundamento y no usar los labios para engañar. Sin embargo, la nota b no corresponde bien al texto español actual: presenta como alternativa precisamente la lectura ya adoptada en el texto principal, y además la razón documentada en inglés era la alternativa «y engañes / y engañar», no una explicación de segunda prohibición. Conviene reparar esa nota para alinearla con la evidencia fuente y el rastro de auditoría.'
