translation:
  language: es
  text: Mis heridas hieden y se pudren[a] por mi insensatez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mis moretones se han vuelto repugnantes y podridos por mi necedad»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבְאִ֣ישׁוּ
  english_pob_choice: stink
  chosen_spanish: hieden
  alternatives_spanish:
  - huelen mal
  - apestan
  - despiden un hedor
  lexicon: HALOT
  rationale: El verbo hiphil de באש expresa que algo llega a ser ofensivo al olfato o produce un olor repugnante. «Hieden» conserva esa fuerza sensorial y el registro digno del español bíblico sin suavizar la imagen.
- source_word: נָ֭מַקּוּ
  english_pob_choice: fester
  chosen_spanish: se pudren
  alternatives_spanish:
  - se corrompen
  - se descomponen
  - se deshacen
  lexicon: HALOT
  rationale: El verbo comunica deterioro, corrupción y descomposición progresiva. «Se pudren» refleja bien ese proceso en español y se ajusta al paralelismo con «hieden».
- source_word: חַבּוּרֹתָי
  english_pob_choice: my wounds
  chosen_spanish: mis heridas
  alternatives_spanish:
  - mis moretones
  - mis magulladuras
  - mis llagas
  lexicon: HALOT
  rationale: Aunque el término puede abarcar moretón, magulladura o herida, el contexto de hedor y pudrición apunta a una lesión seria. «Heridas» comunica mejor la gravedad que «moretones» y evita una atenuación indebida.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por causa de
  lexicon: HALOT
  rationale: La preposición marca aquí relación causal. «Por» es una forma natural y concisa en español; «a causa de» sería una alternativa más explícita, pero más pesada en el ritmo del verso.
- source_word: אִוַּלְתִּי
  english_pob_choice: my foolishness
  chosen_spanish: mi insensatez
  alternatives_spanish:
  - mi necedad
  - mi necedad y tontería
  - mi locura
  lexicon: HALOT
  rationale: El sustantivo expresa necedad/folly con connotación moral. «Insensatez» conserva ese tono sin reducirlo a simple falta de inteligencia; «necedad» también sería posible, pero «insensatez» suena más amplio y natural en español actual.
theological_decisions:
- issue: Relación causal entre sufrimiento corporal y culpa moral
  english_pob_reading: because of my foolishness
  chosen_spanish_reading: por mi insensatez
  alternative_spanish_readings:
  - a causa de mi necedad
  - debido a mi insensatez
  - por mi necedad
  rationale: El verso vincula explícitamente el estado del salmista con su propia necedad/insensatez. La traducción mantiene esa relación causal sin expandirla a una tesis general sobre todo sufrimiento humano, preservando la tensión del texto.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción inglesa auditada unificó los dos verbos en una sola cláusula con 'and'. En español se preserva esa coordinación con «y», manteniendo el paralelismo verbal del hebreo y el vínculo causal explícito del cierre.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - «Insensatez» se emplea como equivalente de folly/necedad con matiz moral, acorde al contexto.
  - «Heridas» se prefirió sobre «moretones» para no debilitar la imagen de putrefacción y hedor.
  - La coordinación «hieden y se pudren» refleja ambos verbos hebreos de manera directa y natural en español.
