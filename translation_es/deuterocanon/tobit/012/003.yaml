translation:
  language: es
  text: porque me devolvió a ti sano y salvo, y curó a mi esposa[a] y devolvió mi dinero[b], y asimismo te curó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto es implícito en el griego («él… curó… devolvió… curó»). En contexto, se refiere a Rafael.
    reason: alternative_reading
  - marker: b
    text: Griego literalmente «mi plata»; aquí se refiere al dinero recuperado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγώχεν
  english_pob_choice: brought me back
  chosen_spanish: me trajo de vuelta
  alternatives_spanish:
  - me llevó
  - me condujo
  - me devolvió
  lexicon: LSJ
  rationale: El griego expresa la idea de llevar o traer; en este contexto narrativo de restauración familiar, «me trajo de vuelta» comunica mejor la vuelta a Tobit que un simple traslado.
- source_word: ὑγιῆ
  english_pob_choice: safe and sound
  chosen_spanish: sano y salvo
  alternatives_spanish:
  - saludable
  - bien
  - sin daño
  lexicon: LSJ
  rationale: En este pasaje no se trata de un diagnóstico médico sino de haber sido devuelto sin daño; «sano y salvo» reproduce bien ese valor contextual y la revisión inglesa reciente.
- source_word: ἐθεράπευσεν
  english_pob_choice: healed
  chosen_spanish: curó
  alternatives_spanish:
  - sanó
  - restauró
  - sanó completamente
  lexicon: BDAG
  rationale: El verbo significa curar/sanar. «Curó» es directo, natural en español y mantiene el paralelo con la sanación de la esposa y de Tobit.
- source_word: τὴν γυναῖκά μου
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  lexicon: BDAG
  rationale: Aquí γυνή designa claramente a la cónyuge. «Mi esposa» evita ambigüedad y es el equivalente natural en español.
- source_word: τὸ ἀργύριόν μου
  english_pob_choice: my money
  chosen_spanish: mi dinero
  alternatives_spanish:
  - mi plata
  - mi plata recuperada
  lexicon: LSJ
  rationale: Aunque literalmente es «mi plata», el contexto narrativo indica fondos recuperados. «Mi dinero» expresa el referente con naturalidad en español, como en la auditoría inglesa.
- source_word: ἤνεγκεν
  english_pob_choice: brought back
  chosen_spanish: devolvió
  alternatives_spanish:
  - trajo
  - trajo de vuelta
  - volvió a traer
  lexicon: BDAG
  rationale: En este contexto de bienes recuperados, «devolvió» capta la idea de restitución implícita en el movimiento de regreso del dinero.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - también
  - de la misma manera
  lexicon: BDAG
  rationale: «Asimismo» conserva la relación comparativa y enlaza la curación de Tobit con la de su esposa.
theological_decisions:
- issue: Referente implícito del agente que cura y devuelve
  english_pob_reading: The repeated third-person verbs are rendered with 'he,' leaving the immediate referent implicit in the discourse rather than specifying a name in the translation.
  chosen_spanish_reading: Los verbos quedan sin nombrar explícitamente al sujeto; el contexto lo deja implícito.
  alternative_spanish_readings:
  - Añadir «Rafael» para claridad
  - Explicitar «Dios» como agente último
  rationale: El griego usa verbos en tercera persona sin repetir el nombre en esta cláusula. Mantener el sujeto implícito respeta la forma del texto y preserva la tensión discursiva que el contexto resuelve, en vez de adelantarse con una aclaración no presente en la línea.
  doctrine_reference: Preservar la tensión textual sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail para ὑγιῆ: la redacción inglesa pasó de «healthy» a «safe and sound»; por eso en español se eligió «sano y salvo». También se mantuvo la decisión auditada de no nombrar explícitamente al sujeto agente en la cláusula, dejando su referencia contextual implícita.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa que lo exija.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se mantuvo el contraste entre curación de la esposa y retorno del dinero con verbos distintos, conforme al griego.
  - Se prefirió «mi dinero» en el cuerpo y se anotó la literalidad «mi plata» en nota para preservar la tensión léxica.
