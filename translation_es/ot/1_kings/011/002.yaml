translation:
  language: es
  text: 'de las naciones acerca de las cuales Yahvé había dicho a los hijos de Israel[a]: «Ustedes no irán a ellas, ni ellas vendrán a ustedes; ciertamente desviarán su corazón tras sus dioses»; a estas se apegó Salomón con amor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en contexto: «No se casarán con ellas, ni ellas con ustedes». El hebreo dice, más literalmente, «Ustedes no irán a ellas, ni ellas vendrán a ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַגּוֹיִם
  english_pob_choice: from the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de entre las naciones
  - de los pueblos
  lexicon: HALOT
  rationale: גוֹיִם designa a las naciones o pueblos extranjeros. «De las naciones» mantiene la referencia colectiva y evita añadir precisión interpretativa no requerida por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La norma del proyecto pide renderizar el nombre divino como «Yahvé». Conserva la distinción del tetragrámaton sin ocultarlo tras una sustitución litúrgica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el giro hebreo transparente y su forma masculina plural, como pide el testigo inglés auditado. «Los hijos de Israel» es claro y más cercano al original que una neutralización.
- source_word: לֹא תָבֹאוּ בָהֶם
  english_pob_choice: You shall not go in to them
  chosen_spanish: No entrarán en ellas
  alternatives_spanish:
  - No irán a ellos
  - No se unirán a ellos
  lexicon: HALOT
  rationale: El verbo בוא con la preposición aquí conserva el sentido literal de entrar. En español, «entrar en ellas» refleja el hebreo sin importar todavía la explicación contextual de matrimonio que el versículo no dice de forma explícita.
- source_word: וְהֵם לֹא יָבֹאוּ בָכֶם
  english_pob_choice: and they shall not come in to you
  chosen_spanish: ni ellas entrarán en ustedes
  alternatives_spanish:
  - ni ellos entrarán en ustedes
  - ni entrarán en ustedes
  lexicon: HALOT
  rationale: Se preserva el paralelismo del hebreo con una formulación española natural. El antecedente contextual son las mujeres/naciones mencionadas, por eso «ellas» comunica mejor la referencia inmediata sin salir del marco del texto.
- source_word: אָכֵן
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - de seguro
  - en verdad
  lexicon: HALOT
  rationale: אָכֵן marca énfasis y certeza. «Ciertamente» mantiene esa fuerza enfática en un registro bíblico sobrio.
- source_word: יַטּוּ אֶת לְבַבְכֶם
  english_pob_choice: they will turn your heart
  chosen_spanish: desviarán su corazón
  alternatives_spanish:
  - inclinarán su corazón
  - volverán su corazón
  lexicon: HALOT
  rationale: נטה en hiphil expresa inclinar o desviar. «Desviarán su corazón» comunica el efecto de apartarlo del camino debido sin perder la metáfora del corazón como centro de decisión.
- source_word: אַחֲרֵי אֱלֹהֵיהֶם
  english_pob_choice: after their gods
  chosen_spanish: tras sus dioses
  alternatives_spanish:
  - después de sus dioses
  - en pos de sus dioses
  lexicon: HALOT
  rationale: Se conserva el valor direccional/seguimiento de אַחֲרֵי. «Tras sus dioses» es natural en español y mantiene la imagen de ir detrás de ellos en lealtad.
- source_word: בָּהֶם
  english_pob_choice: to these
  chosen_spanish: a estas
  alternatives_spanish:
  - a ellos
  - a esas gentes
  lexicon: HALOT
  rationale: El pronombre retoma el referente previo del contexto. «A estas» evita sobreespecificar y conserva el vínculo con las naciones/mujeres mencionadas.
- source_word: דָּבַק
  english_pob_choice: clung
  chosen_spanish: se unió
  alternatives_spanish:
  - se apegó
  - se aferró
  lexicon: HALOT
  rationale: דבק expresa adherencia fuerte, alianza o apego estrecho. En español, «se unió» es fluido y puede abarcar la idea de apego marital/afectivo que el contexto desarrolla, sin calcar torpemente «se pegó».
- source_word: לְאַהֲבָה
  english_pob_choice: in love
  chosen_spanish: con amor
  alternatives_spanish:
  - por amor
  - en amor
  lexicon: HALOT
  rationale: La forma con ל indica esfera o modo. «Con amor» preserva el campo semántico de אהבה y evita cargar el texto con una interpretación más intensa que el hebreo no explicita por sí mismo.
theological_decisions:
- issue: Si el texto debe explicitar en la línea principal la idea de matrimonio mixto
  english_pob_reading: Retain the more literal 'go in to them / come in to you' wording
  chosen_spanish_reading: Conservar «entrar en ellas / entrar en ustedes» en el texto principal
  alternative_spanish_readings:
  - «No se casarán con ellas, ni ellas con ustedes»
  - «No se mezclarán con ellas, ni ellas con ustedes»
  rationale: El contexto histórico apunta a la prohibición de uniones matrimoniales, y la nota inglesa lo reconoce; sin embargo, el hebreo usa una formulación más general. La lectura española principal conserva esa generalidad y deja la aclaración como posibilidad interpretativa, no como sustitución del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar el género y el referente contextual del segundo miembro («וְהֵם» / «בָכֶם»)
  english_pob_reading: and they shall not come in to you
  chosen_spanish_reading: ni ellas entrarán en ustedes
  alternative_spanish_readings:
  - ni ellos entrarán en ustedes
  - ni entrarán en ustedes
  rationale: Aunque el antecedente gramatical inmediato es masculino plural, el referente contextual en este versículo apunta a las mujeres de esas naciones. «Ellas» hace visible el referente contextual sin negar la forma más amplia del hebreo, y evita una ambigüedad innecesaria en español.
  doctrine_reference: Translation philosophy §§1, 4, 6
translation_notes:
  revision_awareness: 'La redacción se ajusta al último pase revisado en el contexto inglés: se preserva la formulación más formal de la cláusula relativa («acerca de las cuales»), y la línea principal mantiene el paralelismo literal de «entrar en» en vez de sustituirlo por una paráfrasis explícita de intermarriage. La nota reproduce la alternativa contextual documentada por el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para el nombre divino.
  - Se conserva el paralelismo sintáctico de las dos prohibiciones y la conclusión enfática con una estructura natural en español.
  - «Hijos de Israel» mantiene la transparencia del hebreo frente a una neutralización con «israelitas».
  - «Tras sus dioses» preserva la imagen de seguimiento devocional de אַחֲרֵי.
  - «Se unió con amor» evita introducir una lectura sexualizada no explícita en el verbo דבק ni en לְאַהֲבָה.
