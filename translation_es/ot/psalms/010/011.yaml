translation:
  language: es
  text: 'Dice en su corazón[a]: «Dios se ha olvidado; ha escondido su rostro; nunca verá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dijo en su corazón … Dios se olvida … esconde su rostro … no verá para siempre». Los verbos perfectos hebreos en poesía pueden traducirse con fuerza presente o pasada/presente-perfecta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר
  english_pob_choice: He says
  chosen_spanish: Dice
  alternatives_spanish:
  - Dijo
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía puede funcionar con valor presente o gnómico para la acción interior reiterada del impío; en español, el presente «dice» reproduce bien esa vivacidad descriptiva. No se fuerza un pasado si el contexto retrata un pensamiento en curso.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí mismo
  - dentro de sí
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico y resulta natural en español. Mantiene la idea de habla interior, no de voz audible.
- source_word: שָׁכַח
  english_pob_choice: has forgotten
  chosen_spanish: se ha olvidado
  alternatives_spanish:
  - olvida
  - ha dejado de recordar
  lexicon: HALOT
  rationale: El verbo expresa «olvidar»; en español, «se ha olvidado» comunica el estado asumido por el impío acerca de Dios. Es una equivalencia natural sin perder la fuerza de una omisión ya considerada realizada.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios fuerte
  - dios
  lexicon: HALOT
  rationale: Aquí el término nombra al verdadero Dios; «Dios» es la forma adecuada y transparente en español, conservando la referencia reverente sin añadir calificativos no exigidos.
- source_word: הִסְתִּיר פָּנָיו
  english_pob_choice: he has hidden his face
  chosen_spanish: ha escondido su rostro
  alternatives_spanish:
  - ha ocultado su rostro
  - ha apartado su rostro
  lexicon: HALOT
  rationale: Se preserva el modismo antropomórfico. «Rostro» es el equivalente bíblico natural de «face» en español, y «ha escondido» mantiene la imagen de retiro o ocultamiento sin interpretarla en exceso.
- source_word: בַּל ... לָנֶצַח
  english_pob_choice: he will never see
  chosen_spanish: nunca verá
  alternatives_spanish:
  - no verá jamás
  - no verá para siempre
  lexicon: HALOT
  rationale: La combinación de negación con לָנֶצַח expresa negación duradera; «nunca» condensa esa fuerza de manera idiomática en español. El futuro «verá» sigue la lectura poética de la afirmación atribuida al impío.
- source_word: רָאָה
  english_pob_choice: see
  chosen_spanish: verá
  alternatives_spanish:
  - mirará
  - notará
  lexicon: HALOT
  rationale: «Ver» conserva el sentido básico del verbo hebreo. En el contexto implica percibir para intervenir o juzgar, pero no se explicita eso para no sobretraducir.
theological_decisions:
- issue: Antropomorfismo de Dios escondiendo su rostro
  english_pob_reading: Retain the idiom 'he has hidden his face' in the main text
  chosen_spanish_reading: Mantener «ha escondido su rostro» en el texto principal
  alternative_spanish_readings:
  - ha retirado su atención
  - se ha apartado
  rationale: El hebreo usa una imagen concreta y teológicamente cargada. Conservarla en español preserva la textura bíblica y evita reducirla a una explicación interpretativa. La expresión es entendible para lectores eclesiales modernos.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés. Se adoptó la lectura presentiva en español para la voz interior del impío, manteniendo el modismo de «corazón» y el antropomorfismo de «rostro». No se introducen cambios textuales ni variantes mayores respecto del consenso del audit trail.
  spanish_consistency_notes:
  - Se prefirió «corazón» y «rostro» por ser equivalentes bíblicos naturales y transparentes en español.
  - «Nunca verá» conserva la negación intensificada de בַּל + לָנֶצַח sin añadir glosas al cuerpo del texto.
  - Se evitó «SEÑOR» para אֵל, porque el hebreo aquí dice simplemente «Dios».
