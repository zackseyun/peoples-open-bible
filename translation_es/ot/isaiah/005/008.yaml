review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: denuncia profética, acumulación de propiedades, resultado de exclusión espacial y cambio a segunda persona. Sin embargo, no preserva bien la nota inglesa [a]: la nota del POB inglés ofrece alternativas para el segundo hemistiquio (''field to field''), no para ''house to house''; la nota española actual está anclada en ''casa con casa'' y además afirma erróneamente que el verbo hebreo allí es literalmente ''acercar''. También conviene mejorar וְהוּשַׁבְתֶּם para reflejar mejor la pasividad causativa del hebreo.'
  spanish_quality_summary: El español es legible, pero mezcla registro peninsular ('vosotros') con el objetivo de español neutro latinoamericano. 'Quedáis habitando' suena poco natural y no comunica claramente la pasividad de 'you are made to dwell'. Una formulación como 'se les hace vivir ustedes solos' preserva mejor tanto la segunda persona como el matiz pasivo, aunque sigue siendo algo marcada; en contexto profético funciona mejor que el borrador actual.
  glossary_alignment: 'No hay términos del glosario mayor en disputa en este versículo. La principal cuestión es fidelidad léxica y de registro: mantener la distinción entre מַגִּיעֵי (''juntar/unir'') y יַקְרִיבוּ (''acercar''), y usar un español neutral evitando ''vosotros''.'
  issues:
