- from: Y subieron los hijos de Esaú y los hijos de Amón, y acamparon en la región montañosa frente a Dotaim[a], y enviaron de entre ellos hacia el sur y el oriente, frente a Egrebel, que está cerca de Chus, que está junto al wadi Mochmur. Y el resto del ejército de Asiria acampó en la llanura y cubrió toda la faz de la tierra, y sus tiendas y su bagaje quedaron acampados en una multitud muy grande[b], y eran extraordinariamente numerosos.
  to: Y subieron los hijos de Esaú y los hijos de Amón, y acamparon en la región montañosa frente a Dotaim, y enviaron a algunos de los suyos hacia el sur y el oriente[a], frente a Egrebel, que está cerca de Chus, que está junto al wadi[b] Mochmur. Y el resto del ejército asirio acampó en la llanura y cubrió toda la faz de la tierra, y sus tiendas y su bagaje se extendieron en una multitud muy grande, y eran extraordinariamente numerosos.
