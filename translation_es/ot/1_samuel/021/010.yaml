translation:
  language: es
  text: 'Y el sacerdote dijo: «La espada de Goliat el filisteo, a quien tú derribaste en el valle de Elá, he aquí, está envuelta en una tela[a] detrás del efod. Si quieres tomarla para ti, tómala, porque no hay otra aquí aparte de ella». Y David dijo: «No hay ninguna como ella; dámela».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «envuelta en la prenda»; el sustantivo también puede traducirse «vestidura» o «manto», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב גָּלְיָת הַפְּלִשְׁתִּי
  english_pob_choice: The sword of Goliath the Philistine
  chosen_spanish: La espada de Goliat el filisteo
  alternatives_spanish:
  - La espada de Goliat, el filisteo
  - La espada de Goliat, el filisteo
  lexicon: HALOT
  rationale: 'Mantengo la relación posesiva con «de» en español, y conservo el identificador étnico como aposición natural: «el filisteo». No se introduce «Cristo» ni otro término tradicional ajeno al texto.'
- source_word: הִכִּיתָ
  english_pob_choice: you struck down
  chosen_spanish: tú hiriste
  alternatives_spanish:
  - tú derribaste
  - tú golpeaste
  lexicon: HALOT
  rationale: El verbo puede abarcar golpear o abatir en contexto bélico. «Hiriste» preserva el hecho de infligir daño sin afirmar más de lo que exige el hebreo; «derribaste» sería más interpretativo.
- source_word: בְּעֵמֶק הָאֵלָה
  english_pob_choice: in the Valley of Elah
  chosen_spanish: en el valle de Elá
  alternatives_spanish:
  - en el Valle de Elá
  - en el valle de Ela
  lexicon: HALOT
  rationale: «Valle de Elá» es la forma clara y reverente en español; mantengo el nombre propio transliterado de manera consistente.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: HALOT
  rationale: «Mira» conserva la función deíctica y suena natural en español moderno. «He aquí» sería más solemne, pero menos fluido.
- source_word: לוּטָה
  english_pob_choice: wrapped
  chosen_spanish: envuelta
  alternatives_spanish:
  - envuelta
  - cubierta
  - arropada
  lexicon: HALOT
  rationale: El participio pasivo indica que el objeto está envuelto o cubierto. «Envuelta» es la opción más directa y natural en español.
- source_word: בַשִּׂמְלָה
  english_pob_choice: in a cloth
  chosen_spanish: en una tela
  alternatives_spanish:
  - en un paño
  - en una prenda
  - en un lienzo
  lexicon: HALOT
  rationale: Sִׂמְלָה puede referirse a una prenda exterior o a un paño/vestidura usado para envolver. Siguiendo la revisión inglesa que precisó el objeto como «cloth», «tela» comunica mejor el material sin sobrecargarlo con «manto» o «capa».
- source_word: אַחֲרֵי הָאֵפוֹד
  english_pob_choice: behind the ephod
  chosen_spanish: detrás del efod
  alternatives_spanish:
  - tras el efod
  - al dorso del efod
  lexicon: HALOT
  rationale: La referencia es espacial, no temporal. «Detrás» es el equivalente idiomático más claro en español.
- source_word: אִם אֹתָהּ תִּקַּח לְךָ קָח
  english_pob_choice: If you will take that for yourself, take it
  chosen_spanish: Si quieres tomarla para ti, tómala
  alternatives_spanish:
  - Si la quieres tomar para ti, tómala
  - Si deseas llevarla para ti, tómala
  lexicon: HALOT
  rationale: La prótasis tiene matiz permisivo/volitivo. «Si quieres» preserva esa oferta sin volverla un mandato. «Tomarla» y «tómala» conservan el objeto femenino, la espada.
- source_word: כִּי אֵין אַחֶרֶת זוּלָתָהּ בָּזֶה
  english_pob_choice: for there is no other here except it
  chosen_spanish: porque aquí no hay otra sino ella
  alternatives_spanish:
  - porque aquí no hay otra fuera de ella
  - porque aquí no hay otra aparte de ella
  lexicon: HALOT
  rationale: La construcción exclusoria se expresa con naturalidad mediante «no hay otra sino ella». Conservo el femenino porque el referente es «espada».
- source_word: אֵין כָּמוֹהָ
  english_pob_choice: There is none like it
  chosen_spanish: No hay ninguna como ella
  alternatives_spanish:
  - No hay otra como ella
  - Ninguna es como ella
  lexicon: HALOT
  rationale: La frase hebrea expresa singularidad/excelencia. En español, «No hay ninguna como ella» es idiomático y mantiene el femenino.
- source_word: תְּנֶנָּה לִּי
  english_pob_choice: give it to me
  chosen_spanish: dámela
  alternatives_spanish:
  - dámela a mí
  - dame esa espada
  lexicon: HALOT
  rationale: El sufijo femenino remite a la espada. En español, el imperativo con pronombre enclítico expresa bien la petición breve y enfática.
theological_decisions:
- issue: Tratamiento del nombre divino y títulos
  english_pob_reading: No explicit divine-name issue in this verse; the setting includes the priest and the ephod without substituting reverential masking terms.
  chosen_spanish_reading: No hay sustitución devocional del texto por «SEÑOR» ni por fórmulas de máscara.
  alternative_spanish_readings:
  - usar «SEÑOR» por convención litúrgica
  - usar «Yahvé» donde no aparece el tetragrámaton
  rationale: El versículo no contiene el tetragrámaton ni una cita directa que lo requiera. Mantengo neutralidad textual y evito introducir terminología no motivada por el hebreo de este versículo.
  doctrine_reference: Éxodo 3:15; práctica textual POB sobre YHWH
- issue: Valor semántico de נכה en contexto bélico
  english_pob_reading: you struck down
  chosen_spanish_reading: tú hiriste
  alternative_spanish_readings:
  - tú derribaste
  - tú mataste
  rationale: No se fuerza el verbo hacia «matar», aunque el contexto lo permita. Se conserva la tensión entre herir y derrotar sin sobreespecificar el resultado verbal.
  doctrine_reference: Uso léxico contextual del hebreo bíblico; 1 Samuel 17:50 y contexto narrativo
- issue: Objeto envuelto y precisión material
  english_pob_reading: wrapped in a cloth
  chosen_spanish_reading: envuelta en una tela
  alternative_spanish_readings:
  - envuelta en un paño
  - cubierta con una prenda
  rationale: La revisión inglesa favoreció «cloth» sobre «cloak» por precisión. En español, «tela» evita imponer una prenda concreta y sigue la misma precisión revisada.
  doctrine_reference: Jeremías 13:1-11; uso flexible de שִׂמְלָה en hebreo bíblico
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la nota material de «cloak» a «cloth» y elevó el registro de «look» a «behold». En español se reflejó esa precisión con «tela» y se mantuvo un tono digno mediante «mira» sin perder naturalidad; la nota textual sobre שִׂמְלָה se conserva como alternativa lexical.
  spanish_consistency_notes:
  - Se mantiene «efod» de forma uniforme, sin adaptar a «éfod» o «ephod», por consistencia con el proyecto.
  - Se conserva el nombre propio «Goliat» y el topónimo «Elá» con transliteración estable.
  - Los referentes femeninos («la», «ella») se preservan para la espada, evitando masculinizar el objeto.
  - Se usa español moderno pero reverente, evitando el calco arcaico cuando no aporta precisión.
