id: 1SA.10.24
reference: 1 Samuel 10:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שְׁמוּאֵ֜ל אֶל כָּל הָ/עָ֗ם הַ/רְּאִיתֶם֙ אֲשֶׁ֣ר בָּֽחַר בּ֣/וֹ יְהוָ֔ה כִּ֛י אֵ֥ין כָּמֹ֖/הוּ בְּ/כָל הָ/עָ֑ם וַ/יָּרִ֧עוּ כָל הָ/עָ֛ם וַ/יֹּאמְר֖וּ יְחִ֥י הַ/מֶּֽלֶךְ־־־־־׃פ
translation:
  text: Then Samuel said to all the people[a], “Do you see the one whom Yahweh has chosen? There is no one like him among all the people.” And all the people shouted and said[b], “Long live the king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Have you seen the one whom the LORD chose?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “May the king live!”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving sequential force.
- source_word: הָרְּאִיתֶם
  chosen: Do you see
  alternatives:
  - Have you seen
  - See
  lexicon: HALOT
  rationale: Though morphologically perfect 2mp, in direct speech it functions naturally as an attention-directing question. 'Do you see' is idiomatic English that fits Samuel's presentation of Saul to the people.
- source_word: אֲשֶׁר בָּחַר בוֹ יְהוָה
  chosen: the one whom the LORD has chosen
  alternatives:
  - him whom the LORD chose
  - the one the LORD chose
  lexicon: HALOT
  rationale: This relative clause identifies Saul. 'Has chosen' slightly reflects the present relevance of the completed action in context; 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי אֵין כָּמֹהוּ
  chosen: There is no one like him
  alternatives:
  - For there is none like him
  - Indeed, there is no one like him
  lexicon: HALOT
  rationale: This expresses Saul's unmatched status among the people. English supplies 'one' for naturalness. The conjunction כִּי is represented by the explanatory sentence structure without forcing a wooden 'for'.
- source_word: בְּכָל הָעָם
  chosen: among all the people
  alternatives:
  - in all the people
  - among all the nation
  lexicon: HALOT
  rationale: The phrase denotes comparison within the assembled populace. 'Among all the people' is the most natural English rendering here.
- source_word: וַיָּרִעוּ
  chosen: shouted
  alternatives:
  - raised a shout
  - cheered
  lexicon: HALOT
  rationale: The verb denotes raising a loud cry. 'Shouted' preserves the vocal acclamation without importing the more interpretive tone of 'cheered'.
- source_word: יְחִי הַמֶּלֶךְ
  chosen: Long live the king!
  alternatives:
  - May the king live!
  lexicon: HALOT
  rationale: The jussive expresses an acclamation or wish for the king's life and reign. 'Long live the king!' is the standard idiomatic English equivalent.
