translation:
  language: es
  text: 'De entre los hijos de Lam: Esías, hijo de Gótolias[a], y con él setenta hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo aproximado de Esdras 8:3 lee de manera distinta en los nombres y en el número: «de los hijos de Secanías, hijo de Jahaziel ... trescientos varones». Como 1 Esdras se traduce aquí desde el testimonio griego, el texto principal sigue los nombres griegos y el número setenta.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: From the sons of
  chosen_spanish: De entre los hijos de
  alternatives_spanish:
  - De los hijos de
  - Entre los hijos de
  lexicon: LSJ
  rationale: La preposición ἐκ con un grupo de linaje o clan expresa procedencia desde dentro de ese conjunto. En español, «De entre los hijos de» conserva esa idea de selección/procedencia sin sonar forzado.
- source_word: Λάμ
  english_pob_choice: Lam
  chosen_spanish: Lam
  alternatives_spanish:
  - Lam
  - Lām
  lexicon: LSJ
  rationale: Nombre propio transliterado. Se conserva la forma breve del griego sin intentar armonizarlo con el paralelo hebreo aproximado.
- source_word: Ἐσίας
  english_pob_choice: Esias
  chosen_spanish: Esías
  alternatives_spanish:
  - Esias
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego, con acento gráfico español para facilitar la lectura. Se mantiene la forma del testimonio griego, no la del paralelo masorético.
- source_word: Γοθολίου
  english_pob_choice: Gotholias
  chosen_spanish: Gótolias
  alternatives_spanish:
  - Gotholias
  - Gedolías
  lexicon: LSJ
  rationale: El genitivo griego indica relación patronímica. En español se expresa naturalmente como «hijo de Gótolias». Se usa una adaptación ortográfica hispana del nombre griego sin importar la variante del paralelo hebreo.
- source_word: καὶ μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y con él iba
  - y acompañado de él
  lexicon: LSJ
  rationale: En un contexto de lista/censo, «y con él» reproduce de manera natural la idea de acompañamiento sin añadir información no presente en el griego.
- source_word: ἄνδρες ἑβδομήκοντα
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta varones
  - setenta personas
  lexicon: LSJ
  rationale: ἄνδρες designa literalmente hombres/varones. «Hombres» mantiene la correspondencia directa y evita neutralizar indebidamente el término.
theological_decisions:
- issue: Diferencia textual entre el griego de 1 Esdras y el paralelo aproximado de Esdras 8:3 en el hebreo/MT
  english_pob_reading: Because 1 Esdras is translated here from the Greek witness, the main text follows the Greek names and the number seventy.
  chosen_spanish_reading: El texto principal sigue los nombres griegos y el número setenta, sin armonizarlo con el paralelo hebreo aproximado.
  alternative_spanish_readings:
  - Armonizar el texto con el paralelo de Esdras 8:3
  - Reemplazar los nombres por la forma del MT y el número trescientos
  rationale: La edición base de 1 Esdras aquí es el testimonio griego; el paralelo hebreo sirve como control, no como texto rector. Mantener los nombres y el número del griego preserva la integridad textual y no borra la variante documentada.
  doctrine_reference: Principio de crítica textual y fidelidad al testimonio fuente
translation_notes:
  revision_awareness: 'No se requieren cambios respecto del último pase: el testimonio griego se mantiene como ancla principal y no hay revisiones aplicadas en el registro inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparece el nombre divino, pero aquí no se presenta.
  - Se conserva el patrón genealógico «hijo de» para reflejar el genitivo relacional del griego.
  - Se evita «varones» en el texto principal porque «hombres» ya reproduce adecuadamente ἄνδρες en este contexto de lista.
