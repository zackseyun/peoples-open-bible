translation:
  language: es
  text: Y él consultó con Joab hijo de Sarvia y con Abiatar el sacerdote, y ayudaron[a] a Adonías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ayudaron después de Adonías», es decir, lo apoyaron o lo siguieron.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבָרָיו
  english_pob_choice: he conferred with / his words were with
  chosen_spanish: sus palabras estaban con
  alternatives_spanish:
  - conferenció con
  - habló con
  - sus asuntos estaban con
  lexicon: HALOT
  rationale: דבר puede significar 'palabras', 'asunto' o 'cosa'. El POB inglés pasó de la forma hebrea literal a una equivalencia óptima más natural ('he conferred with'). En español, 'sus palabras estaban con' conserva la imagen hebrea y deja claro el giro idiomático sin introducir más interpretación de la necesaria.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en consulta con
  - junto con
  lexicon: HALOT
  rationale: La preposición básica es 'con'. Mantenerla preserva la sintaxis relacional del hebreo y funciona bien en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote consagrado
  - el presbítero
  lexicon: HALOT
  rationale: El título definido identifica el oficio de Abiatar. 'Sacerdote' es el equivalente directo y más transparente en español moderno.
- source_word: וַיַּעְזְרוּ
  english_pob_choice: they helped
  chosen_spanish: ayudaban
  alternatives_spanish:
  - ayudaron
  - apoyaban
  - prestaban ayuda
  lexicon: HALOT
  rationale: עזר significa 'ayudar', 'asistir', 'apoyar'. El contexto político permite 'apoyaban', pero 'ayudaban' sigue más de cerca el verbo base elegido por el POB inglés y mantiene la relación léxica abierta.
- source_word: אַחֲרֵי אֲדֹנִיָּה
  english_pob_choice: Adonijah / after Adonijah
  chosen_spanish: a Adonías
  alternatives_spanish:
  - tras Adonías
  - después de Adonías
  - siguiendo a Adonías
  lexicon: HALOT
  rationale: אַחֲרֵי puede ser literalmente 'después de', pero aquí expresa seguimiento o adhesión. El inglés POB conservó la nota literal mientras tradujo el sentido. En español, 'ayudaban a Adonías' comunica el valor idiomático con naturalidad; la nota preserva la lectura literal.
- source_word: אֲדֹנִיָּה
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonía
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de forma estándar y bíblicamente reconocible.
- source_word: יוֹאָב בֶּן צְרוּיָה
  english_pob_choice: Joab son of Zeruiah
  chosen_spanish: Joab hijo de Sarvia
  alternatives_spanish:
  - Joab, hijo de Zeruiah
  - Joab, hijo de Sarvia
  lexicon: HALOT
  rationale: Se conserva el patronímico con 'hijo de'. 'Sarvia' es la forma habitual en español bíblico para Zeruiah, y resulta más natural para lectores hispanohablantes sin perder identificabilidad.
theological_decisions:
- issue: Relación entre la forma hebrea literal 'después de' y el sentido de apoyo político
  english_pob_reading: The English POB preserved the literal alternative in a footnote while rendering the main clause as political support.
  chosen_spanish_reading: La versión principal dice que ellos 'ayudaban a Adonías', y la nota aclara el hebreo literal 'después de' como seguimiento o apoyo.
  alternative_spanish_readings:
  - y ellos siguieron a Adonías
  - y ellos estaban detrás de Adonías
  - y ellos apoyaban a Adonías
  rationale: El hebreo no describe solo secuencia temporal, sino adhesión a una figura. La redacción principal evita una literalidad confusa en español, pero la nota mantiene la tensión documental entre forma y sentido.
  doctrine_reference: No aplica; decisión semántica/idiomática del texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que reemplazó una literalidad incómoda ('his words were with') por una equivalencia natural ('he conferred with'). En español se optó por conservar una transparencia algo mayor al hebreo ('sus palabras estaban con') sin perder inteligibilidad, y se mantuvo la equivalencia dinámica en el verbo final ('ayudaban a Adonías') con nota del sentido literal subyacente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma base del proyecto cuando el texto lo requiera, pero aquí no aparece el Tetragrámaton.
  - '''Abiatar'' se deja como nombre propio tradicional en español.'
  - Se mantiene 'sacerdote' para הַכֹּהֵן por ser un título formal directo.
  - La nota a conserva la ambigüedad útil entre 'después de' y 'seguir/apoyar'.
