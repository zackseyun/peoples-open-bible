review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del hebreo: la sangre no fue llevada al área sagrada interior, por lo tanto la ofrenda debía comerse en el lugar santo, como Moisés había mandado. También mantiene la fuerza enfática de הֵן y de אָכוֹל תֹּאכְלוּ mediante nota. Sin embargo, la primera cláusula en español suena poco natural y algo ambigua: «dentro, en el lugar santo» no expresa con suficiente claridad el movimiento direccional de אֶל ... פְּנִימָה y puede leerse como una aposición torpe más que como ‘hacia dentro del lugar santo’.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere un ajuste menor para mejorar naturalidad y precisión cultual. «Mira» funciona, aunque «Miren» podría reflejar el plural implícito del discurso; no es necesario cambiarlo porque הֵן es partícula de atención, no verbo. El problema principal es la redacción «no fue llevada dentro, en el lugar santo», que en español suena forzada. «Al interior del lugar santo» o «dentro del lugar santo» comunica mejor la idea. El resto del verso es legible y fiel.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Lugar santo» es aceptable aquí para הַקֹּדֶשׁ / בַּקֹּדֶשׁ, y ayuda a mantener la lógica ritual. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La distinción entre la cláusula de entrada interior y la de consumo en el lugar santo debe preservarse mejor en español.
  issues:
  - severity: medium
    issue: La frase «dentro, en el lugar santo» es poco natural en español y no refleja con claridad el movimiento hacia el interior.
    rationale: אֶל הַקֹּדֶשׁ פְּנִימָה combina dirección («a/hacia») con interioridad («adentro»). La redacción actual suena fragmentada y ambigua. «Al interior del lugar santo» preserva mejor la construcción y suena idiomática.
  - severity: low
    issue: La nota a no corresponde bien al texto español revisable.
    rationale: La nota inglesa ofrece una alternativa sobre la frase espacial («into the holy place, inside»), mientras que la nota española actual solo comenta «Mira». Puede mantenerse una nota sobre הֵן, pero conviene añadir o trasladar la nota espacial para conservar el rastro de auditoría más significativo.
  revised_spanish_text: Mira, su sangre no fue llevada al interior del lugar santo[a]. Ciertamente debieron comerla en el lugar santo[b], como yo mandé.
  revised_footnotes:
  - marker: a
    text: O «en el lugar santo, adentro». El hebreo usa el término para el área sagrada junto con «adentro», enfatizando el interior del santuario.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo intensifica la obligación con un infinitivo absoluto más verbo finito: literalmente, «comiendo debieron comerla».'
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la primera cláusula para expresar de manera natural y fiel la combinación hebrea de movimiento hacia el interior y espacio sagrado. También se alinearon las notas con las decisiones léxicas más significativas del inglés auditado: la expresión espacial y la intensificación verbal.'
