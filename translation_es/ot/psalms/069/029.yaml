  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: mantiene el valor yusivo/imprecatorio de יִמָּחוּ ... אַל יִכָּתֵבוּ, conserva la metáfora de registro en ''libro de la vida'' para מִסֵּפֶר חַיִּים, y traduce adecuadamente צַדִּיקִים como ''los justos''. Sin embargo, la nota [b] del inglés POB no corresponde a ''inscritos'', sino a una alternativa de estructuración para la segunda cláusula; además, en español conviene anclar la nota léxica de חַיִּים directamente en ''vida''.'
  spanish_quality_summary: El texto es claro, natural y digno en español bíblico contemporáneo. 'Sean borrados ... y no sean escritos' suena fiel y legible. 'Junto con' es aceptable, pero 'con' es más directo y más cercano a וְעִם sin pérdida de naturalidad. Las notas necesitan reparación de forma y contenido para ajustarse al expediente auditado y a la disciplina de marcadores.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Libro de la vida' preserva la decisión teológica documentada; 'los justos' corresponde bien a צַדִּיקִים; no aparecen términos sensibles del glosario principal como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: La nota [b] no preserva la alternativa documentada en el POB inglés.
    rationale: El expediente inglés tiene la nota b sobre una lectura/estructuración alternativa de la cláusula, no sobre 'inscritos'. Cambiarla a 'inscritos' altera la trazabilidad del audit trail.
  - severity: low
    issue: La nota [a] está anclada al sintagma completo en vez de al término relevante.
    rationale: La alternativa léxica afecta específicamente חַיִּים ('vida' / 'vivientes'), por lo que en español conviene colocar [a] sobre 'vida' para mayor precisión.
  - severity: low
    issue: '''junto con'' es ligeramente más expansivo que el hebreo simple ''con''.'
    rationale: No es incorrecto, pero 'con' reproduce mejor וְעִם y suena plenamente natural en español.
  revised_spanish_text: Sean borrados del libro de la vida[a], y no sean escritos con los justos[b].
  revised_footnotes:
