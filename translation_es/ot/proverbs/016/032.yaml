translation:
  language: es
  text: Mejor es el que tarda en airarse[a] que el poderoso, y el que domina su espíritu[b] que el que toma una ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paciente»; literalmente, «largo de nariz», un modismo hebreo para ser lento para la ira.
    reason: lexical_alternative
  - marker: b
    text: O «su temperamento» o «él mismo» para «su espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Mejor
  lexicon: HALOT
  rationale: En los proverbios comparativos, טוֹב introduce una valoración comparativa. «Mejor es» conserva la forma proverbial y la comparación explícita con מִן, con español natural y directo.
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: one who is slow to anger
  chosen_spanish: el lento para la ira
  alternatives_spanish:
  - el paciente
  - el de larga paciencia
  - el tardo para airarse
  lexicon: HALOT
  rationale: El hebreo es un idiomático «largo de narices», que significa ser lento para enojarse. «El lento para la ira» mantiene el sentido idiomático con fidelidad y evita que «paciente» se vuelva demasiado general.
- source_word: מִגִּבּוֹר
  english_pob_choice: than a mighty man
  chosen_spanish: que el poderoso
  alternatives_spanish:
  - que un guerrero
  - que el valiente
  - que el hombre fuerte
  lexicon: HALOT
  rationale: גִּבּוֹר designa a un hombre fuerte o poderoso, a menudo con resonancias militares. «El poderoso» conserva la amplitud del término sin forzar «guerrero».
- source_word: וּמֹשֵׁל
  english_pob_choice: and one who rules
  chosen_spanish: y el que domina
  alternatives_spanish:
  - y el que gobierna
  - y el que ejerce dominio
  lexicon: HALOT
  rationale: El participio expresa una acción o rasgo habitual. «El que domina» reproduce bien la idea de gobierno/autodominio en un paralelo con la primera cola.
- source_word: בְּרוּחוֹ
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su temperamento
  - él mismo
  - su interior
  lexicon: HALOT
  rationale: רוּחַ aquí apunta al impulso interior o disposición personal bajo control. «Su espíritu» se mantiene cerca del hebreo y deja visible la tensión entre interioridad, impulso y autocontrol.
- source_word: מִלֹּכֵד עִיר
  english_pob_choice: than one who captures a city
  chosen_spanish: que el que toma una ciudad
  alternatives_spanish:
  - que el que captura una ciudad
  - que el conquistador de una ciudad
  lexicon: HALOT
  rationale: לכד significa capturar o tomar, con contexto militar. «Toma una ciudad» suena natural en español y preserva la imagen de conquista externa.
theological_decisions:
- issue: Sentido antropológico de רוּחַ
  english_pob_reading: '''his spirit'' referring to a person''s inner disposition or impulses under self-control'
  chosen_spanish_reading: '''su espíritu'' como la disposición interior o los impulsos de la persona bajo dominio propio'
  alternative_spanish_readings:
  - '''su temperamento'''
  - '''sí mismo'''
  rationale: La comparación contrasta el dominio de sí con la conquista de una ciudad. Traducirlo como «su espíritu» conserva la amplitud del término y evita reducirlo a mera emoción o a una paráfrasis totalizante.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide en sustancia con el audit trail inglés, manteniendo la comparación proverbial, el idiomatismo de אֶרֶךְ אַפַּיִם y la ambigüedad controlada de רוּחַ.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «el poderoso» para גִּבּוֹר por ser una equivalencia breve y amplia, en línea con el matiz militar implícito sin especificarlo.
  - «Domina su espíritu» conserva el paralelismo con «el lento para la ira» y evita una lectura puramente psicológica o moralizante.
