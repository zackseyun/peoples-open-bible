  text: גִּלְעָ֗ד בְּ/עֵ֤בֶר הַ/יַּרְדֵּן֙ שָׁכֵ֔ן וְ/דָ֕ן לָ֥/מָּה יָג֖וּר אֳנִיּ֑וֹת אָשֵׁ֗ר יָשַׁב֙ לְ/ח֣וֹף יַמִּ֔ים וְ/עַ֥ל מִפְרָצָ֖י/ו יִשְׁכּֽוֹן׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/005/017.yaml
  text: Gilead stayed beyond the Jordan[b][a]; and Dan—why did he sojourn by the ships? Asher sat by the seashore and stayed by his harbors.
  footnotes:
  - marker: a
    text: Or 'why did he sojourn by ships?' The Hebrew verb can mean 'reside' or 'sojourn'; 'linger' is chosen here to reflect the song's tone of reproach.
    reason: lexical_alternative
  - marker: b
    text: Or 'at his inlets/bays.' The Hebrew term refers to openings or breaks and in this coastal context likely means harbors or inlets.
    reason: lexical_alternative
