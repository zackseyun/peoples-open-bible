  glossary_alignment: No hay términos teológicos mayores en juego. La revisión propuesta mantiene la política de transliterar nombres propios y de no armonizar el texto principal con pasajes paralelos. También preserva la alternativa «Tohu» y la referencia comparativa a «Nahat» solo en nota, conforme al expediente inglés.
