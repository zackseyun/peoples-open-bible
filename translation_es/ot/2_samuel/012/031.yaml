translation:
  language: es
  text: Y sacó al pueblo que estaba en ella y los puso[a] a trabajar con sierras, con picos de hierro y con hachas de hierro, y los hizo laborar en el horno de ladrillos[b]. Así hizo con todas las ciudades de los amonitas[c]. Luego David y todo el pueblo regresaron a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los puso en la sierra, en herramientas de hierro afiladas y en instrumentos de hierro para cortar». Los nombres exactos de los implementos son inciertos.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo difícil; tradicionalmente, «los hizo pasar por el horno de ladrillos», y algunos entienden esto como ejecución y no como trabajo forzado.
    reason: alternative_reading
  - marker: c
    text: Compárese 1 Crónicas 20:3, un pasaje paralelo con redacción igualmente difícil.
    reason: cross_reference
lexical_decisions:
- source_word: הוֹצִיא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo fuera
  - llevó fuera
  lexicon: HALOT
  rationale: El verbo causativo de יצא pide una forma natural en español que conserve la acción de extraer a la población de la ciudad. 'Sacó' expresa bien el movimiento de salida sin añadir matices innecesarios.
- source_word: וַיָּשֶׂם
  english_pob_choice: put them to work with
  chosen_spanish: lo puso a trabajar
  alternatives_spanish:
  - lo colocó
  - los puso bajo
  lexicon: HALOT
  rationale: En este contexto la idea no es solo 'poner' físicamente, sino asignar trabajo forzado. 'Lo puso a trabajar' mantiene esa función instrumental y evita decidir de antemano entre labor forzada y ejecución.
- source_word: בַּמְּגֵרָה
  english_pob_choice: with saws
  chosen_spanish: con sierras
  alternatives_spanish:
  - con serruchos
  - con sierras de mano
  lexicon: HALOT
  rationale: מְגֵרָה significa 'sierra'. El plural español fluye naturalmente en la lista de herramientas y conserva el carácter instrumental del hebreo.
- source_word: בַחֲרִצֵי הַבַּרְזֶל
  english_pob_choice: iron picks
  chosen_spanish: con picos de hierro
  alternatives_spanish:
  - con herramientas de hierro afiladas
  - con rastrillos de hierro
  lexicon: HALOT
  rationale: El término es oscuro y puede referirse a implementos afilados o de trilla. 'Picos de hierro' ofrece una herramienta concreta en español, pero sin cerrar por completo la incertidumbre léxica.
- source_word: בְמַגְזְרֹת הַבַּרְזֶל
  english_pob_choice: iron axes
  chosen_spanish: con hachas de hierro
  alternatives_spanish:
  - con herramientas de corte de hierro
  - con instrumentos de hierro
  lexicon: HALOT
  rationale: El sustantivo designa instrumentos de corte de forma amplia. 'Hachas de hierro' es una opción concreta y comprensible en español, manteniendo la idea de herramientas cortantes.
- source_word: וְהֶעֱבִיר אוֹתָם
  english_pob_choice: made them labor
  chosen_spanish: los hizo laborar
  alternatives_spanish:
  - los hizo pasar
  - los puso a trabajar
  lexicon: HALOT
  rationale: El hebreo literal es 'hacer pasar', pero aquí el contexto sugiere servicio laboral bajo coerción. 'Los hizo laborar' comunica el sentido contextual sin perder la tensión del texto.
- source_word: ב/מלכן
  english_pob_choice: at the brick kiln
  chosen_spanish: en el horno de ladrillos
  alternatives_spanish:
  - en la fábrica de ladrillos
  - en el lugar de ladrillos
  - por el horno de ladrillos
  lexicon: HALOT
  rationale: La consonancia es difícil. Siguiendo la lectura laboral adoptada en el audit trail inglés, 'horno de ladrillos' expresa una instalación relacionada con ladrillos y deja abierta la dificultad textual mejor que una paráfrasis más cerrada.
- source_word: וְכֵן יַעֲשֶׂה
  english_pob_choice: Thus he did
  chosen_spanish: Así hizo
  alternatives_spanish:
  - Y así hizo
  - De este modo hizo
  lexicon: HALOT
  rationale: Es una fórmula narrativa resumidora. 'Así hizo' es breve, natural y fiel al movimiento del hebreo.
- source_word: לְכֹל עָרֵי בְנֵי עַמּוֹן
  english_pob_choice: to all the cities of the Ammonites
  chosen_spanish: con todas las ciudades de los amonitas
  alternatives_spanish:
  - a todas las ciudades de los amonitas
  - contra todas las ciudades de los amonitas
  lexicon: HALOT
  rationale: '''Ammonitas'' es el etnónimo natural en español para בְנֵי עַמּוֹן. La preposición ''con'' acompaña la construcción verbal previa en esta formulación del español sin alterar el referente.'
- source_word: וַיָּשָׁב ... יְרוּשָׁלִָם
  english_pob_choice: returned to Jerusalem
  chosen_spanish: regresaron a Jerusalén
  alternatives_spanish:
  - volvieron a Jerusalén
  - retornaron a Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo singular marca a David como sujeto inmediato, la coordinación con 'todo el pueblo' exige una solución de español natural en plural. 'Regresaron' respeta el cierre narrativo de retorno conjunto.
theological_decisions:
- issue: ¿Trabajo forzado o ejecución de los cautivos amonitas?
  english_pob_reading: conscripted them into forced labor with tools and at the brick kiln
  chosen_spanish_reading: trabajo forzado con herramientas y en el horno de ladrillos
  alternative_spanish_readings:
  - los ejecutó con sierras, herramientas de hierro y al hacerlos pasar por el horno
  - los pasó por el horno de ladrillos
  - los mató de manera cruel
  rationale: El hebreo permite más de una lectura, en especial en וַיָּשֶׂם y וְהֶעֱבִיר ... במלכן. Siguiendo el auditor inglés, la traducción principal adopta la lectura de labor forzada, pero sin borrar la ambigüedad del pasaje. Así se preserva la tensión textual en lugar de resolverla dogmáticamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el audit trail inglés con acuerdo alto; se mantuvo la lectura principal de trabajo forzado, pero se conservó la dificultad léxica y la ambigüedad teológica en notas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma en el proyecto, pero en este versículo no aparece el nombre divino.
  - '''amonitas'' traduce בני עמון con etnónimo natural en español.'
  - Se prefirió 'sacó' para el valor causativo de יצא y 'regresaron' para el cierre narrativo conjunto.
  - Se mantuvo el registro bíblico moderno y dignificado, evitando arcaísmos innecesarios.
