id: JHN.19.16
reference: John 19:16
source:
  edition: SBLGNT
  text: τότε οὖν παρέδωκεν αὐτὸν αὐτοῖς ἵνα σταυρωθῇ. Παρέλαβον ⸀οὖν τὸν ⸀Ἰησοῦν·
translation:
  text: Then he handed him over to them to be crucified[b][a]. So they took Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Then he handed him over to them to be crucified.' The Greek purpose clause can be rendered more compactly in English.
    reason: lexical_alternative
  - marker: b
    text: The pronouns 'them' and 'they' are not explicitly identified in this verse; the immediate context informs the reader, but the Greek here does not name the group.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the next step in the narrative. 'Then' is the most natural concise English equivalent.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Inferential/consecutive particle linking Pilate's action to the preceding scene. Here rendered explicitly in the first clause to preserve the Greek's logical progression.
- source_word: παρέδωκεν
  chosen: handed ... over
  alternatives:
  - delivered
  - turned over
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over or deliver into another's control. 'Handed over' is idiomatic and preserves the judicial-transfer sense without adding interpretation.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; simple pronoun is sufficient because the following sentence names Jesus explicitly.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - over to them
  lexicon: BDAG
  rationale: Dative plural indicating the recipients of Pilate's action. 'To them' preserves the Greek reference without over-specifying beyond the text.
- source_word: ἵνα σταυρωθῇ
  chosen: so that he might be crucified
  alternatives:
  - to be crucified
  - so that he would be crucified
  lexicon: BDAG
  rationale: ἵνα with aorist passive subjunctive expresses intended result/purpose. 'So that he might be crucified' preserves both the purposive force and the passive voice.
- source_word: Παρέλαβον
  chosen: they took
  alternatives:
  - they received
  - they took custody of
  lexicon: BDAG
  rationale: παραλαμβάνω here denotes taking charge of or taking along. 'They took' is the clearest natural rendering in context; 'received' is too formal and less idiomatic in English narrative.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰησοῦς, in keeping with the translation policy to transliterate names.
