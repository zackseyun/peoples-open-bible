base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/007/003.yaml
  text: Sorrow is better than laughter[b][a], for by a sad face the heart is made better.
  footnotes:
  - marker: a
    text: Or 'Anger is better than laughter,' since Hebrew כַּעַס can also mean 'anger' or 'vexation.' Here it is rendered 'sorrow' because the context emphasizes the beneficial effect of grief or seriousness rather than anger itself.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for by the badness of face the heart becomes good.' The Hebrew idiom refers to a sad or troubled countenance.
    reason: lexical_alternative
