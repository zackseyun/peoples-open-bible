translation:
  language: es
  text: Bendito sea Yahvé, el Dios de nuestros padres, que puso esto en el corazón del rey, para hermosear[a] la casa de Yahvé que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adornar» o «glorificar».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Alabado sea
  lexicon: HALOT
  rationale: En una fórmula de bendición/doxología, el español idiomático y reverente es «Bendito sea», que conserva el carácter performativo de la alabanza sin volverla rígidamente adjetival.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como «Yahvé», conforme al criterio del proyecto de no sustituirlo por un título. «SEÑOR» no se usa aquí como máscara editorial.
- source_word: אֱלֹהֵי אֲבוֹתֵינוּ
  english_pob_choice: the God of our fathers
  chosen_spanish: el Dios de nuestros padres
  alternatives_spanish:
  - el Dios de nuestros antepasados
  lexicon: HALOT
  rationale: «Padres» reproduce más de cerca la fórmula pactual del hebreo y mantiene el eco bíblico tradicional, sin perder claridad en español.
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: who put
  chosen_spanish: que puso
  alternatives_spanish:
  - que dio
  - que metió
  lexicon: HALOT
  rationale: En el giro «poner en el corazón», el español natural expresa mejor la idea de infundir o introducir una disposición con «puso», equivalente al inglés auditado y al hebreo נתן en este contexto.
- source_word: כָּזֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - tal cosa
  - así
  lexicon: HALOT
  rationale: El demostrativo femenino hebreo se vierte aquí de forma neutral y breve como «esto», como ya había afinado la revisión inglesa, para mantener cercanía léxica sin sobreexplicar.
- source_word: בְּלֵב הַמֶּלֶךְ
  english_pob_choice: into the king’s heart
  chosen_spanish: en el corazón del rey
  alternatives_spanish:
  - dentro del corazón del rey
  - al corazón del rey
  lexicon: HALOT
  rationale: El español «en el corazón» expresa con naturalidad el ámbito interior de intención y resolución. «En» conserva mejor el sentido idiomático que un literal «hacia/dentro de».
- source_word: לְפָאֵר
  english_pob_choice: to beautify
  chosen_spanish: para hermosear
  alternatives_spanish:
  - para adornar
  - para glorificar
  lexicon: HALOT
  rationale: «Hermosear» conserva el sentido concreto de hacer bello o espléndido el edificio. Se evita «glorificar» por ser más abstracto y teológicamente cargado en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea «casa de Yahvé», que preserva la resonancia formal del original. «Templo» sería comprensible, pero menos literal.
- source_word: אֲשֶׁר בִּירוּשָׁלִָם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se encuentra en Jerusalén
  lexicon: HALOT
  rationale: La relativa locativa se traduce con una construcción directa y natural en español, sin añadir matices que el hebreo no exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto de preservar el nombre propio divino en español. «Yahvé» comunica el Tetragrámaton de manera transparente y evita sustituirlo por un título funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de לְפָאֵר en el contexto del templo
  english_pob_reading: to beautify
  chosen_spanish_reading: para hermosear
  alternative_spanish_readings:
  - para adornar
  - para glorificar
  rationale: 'El contexto concreto del edificio favorece una acción estética/material: embellecer o hacer espléndido el templo. «Hermosear» preserva esa concreción y evita una lectura excesivamente abstracta.'
  doctrine_reference: HALOT, uso contextual de פאר en textos de construcción/ornamentación
translation_notes:
  revision_awareness: La redacción inglesa más reciente ajustó כזאת de «such a thing» a «this» para mayor precisión léxica. La versión española refleja ese ajuste con «esto», evitando ampliar el demostrativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se mantiene «casa de Yahvé» y no «templo» en el texto principal para preservar la forma hebrea; la alternativa se documenta en nota.
  - «Hermosear» se eligió por ser comprensible y más cercano al sentido concreto de פאר; la nota preserva las alternativas semánticas relevantes.
  - La sintaxis española sigue el orden natural del idioma sin perder la estructura de bendición + relativo + propósito del hebreo.
