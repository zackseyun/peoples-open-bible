lexical_decisions:
- source_word: αἱ χεῖρές μου
  english_pob_choice: My hands
  chosen_spanish: Mis manos
  alternatives_spanish:
  - Mis propias manos
  lexicon: BDAG
  rationale: El posesivo de primera persona ya está explícito en el griego; en español, «mis manos» reproduce con naturalidad esa posesión sin añadir énfasis innecesario.
- source_word: ἐποίησαν
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - hicieron
  - fabricaron
  - forjaron
  lexicon: BDAG
  rationale: ποιέω aquí expresa el acto general de hacer o producir. «Hicieron» es la equivalencia más directa y idiomática en español, manteniendo el paralelismo con la segunda cláusula.
- source_word: ὄργανον
  english_pob_choice: an instrument
  chosen_spanish: un instrumento
  alternatives_spanish:
  - un instrumento musical
  - una herramienta
  lexicon: LSJ
  rationale: ὄργανον puede ser herramienta o instrumento; en este contexto poético y musical, «un instrumento» conserva la amplitud del término griego sin especificarlo en exceso.
- source_word: οἱ δάκτυλοί μου
  english_pob_choice: my fingers
  chosen_spanish: mis dedos
  alternatives_spanish:
  - mis propios dedos
  lexicon: BDAG
  rationale: Equivalencia léxica directa y natural en español; el plural se conserva sin dificultad.
- source_word: ἥρμοσαν
  english_pob_choice: fashioned
  chosen_spanish: hicieron
  alternatives_spanish:
  - formaron
  - forjaron
  - compusieron
  lexicon: LSJ
  rationale: La revisión inglesa pasó de una idea más literal de ensamblaje a «fashioned», buscando naturalidad. En español, «hicieron» mantiene el sentido amplio de producir/realizar y evita forzar una imagen mecánica que el contexto no exige de manera explícita.
- source_word: ψαλτήριον
  english_pob_choice: a lyre
  chosen_spanish: un arpa
  alternatives_spanish:
  - una lira
  - un salterio
  lexicon: LSJ
  rationale: El griego designa un instrumento de cuerdas. Aunque el inglés optó por «lyre», en español «arpa» comunica con claridad la clase de instrumento antiguo de cuerdas; «salterio» es tradicional pero menos transparente para un lector moderno, y «lira» puede sonar menos natural en este contexto poético.
translation_notes:
  revision_awareness: Tomé en cuenta que la revisión inglesa reciente sustituyó una formulación de ensamblaje por «fashioned» para ἥρμοσαν, lo que favorece en español una solución más natural y menos técnica. También preservé la distinción entre ὄργανον y ψαλτήριον, reflejándola como «un instrumento» y «un arpa».
  spanish_consistency_notes:
  - Mantengo «instrumento» para ὄργανον, evitando igualarlo con el instrumento más específico de la segunda cola.
  - Uso tiempos pasados simples para conservar el tono poético y la brevedad del paralelismo.
  - La nota al pie preserva la alternativa tradicional «salterio» porque el término griego admite esa correspondencia y el inglés POB la documenta.
