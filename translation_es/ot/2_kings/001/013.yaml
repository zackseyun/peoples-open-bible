  glossary_alignment: No hay conflicto con la terminología de proyecto. «Hombre de Dios» es adecuado. «Vida» para נֶפֶשׁ coincide con la decisión teológica documentada. «Siervos» es defendible para עֲבָדֶיךָ en este contexto, aunque «servidores» también sería posible; no requiere cambio. No aparece el nombre divino ni otros términos del glosario principal.
