  rationale: Se revisa el modismo económico para evitar un calco poco natural en español y comunicar con claridad la suficiencia de recursos implícita en תַשִּׂיג יַד. También se cambia 'retoño' por 'rama' para una metáfora familiar más idiomática sin abandonar la incertidumbre léxica documentada para עֵקֶר. Se mantienen la doble categoría 'forastero o residente', 'tu hermano' y 'se vende', que reflejan bien el hebreo y las decisiones POB.
