revisions:
- from: Y no volveré a hacer que Israel ande errante[a] fuera de la tierra que di a sus padres[b], con tal que guarden[c] para hacer conforme a todo lo que les mandé, y conforme a toda la ley[d] que mi siervo Moisés les mandó.
  to: Y no volveré a hacer que los pies de Israel vaguen[a] de la tierra que di a sus padres[b], con tal que se cuiden de hacer conforme a todo lo que les mandé, y conforme a toda la ley[c] que mi siervo Moisés les mandó.
  rationale: 'La revisión corrige dos problemas principales: evita la sobreinterpretación de ''fuera de la tierra'' y reemplaza la expresión poco idiomática ''guarden para hacer'' por ''se cuiden de hacer''. Además, recupera en el texto principal la imagen corporal del hebreo con ''los pies de Israel'', en consonancia con la racionalidad léxica documentada, mientras mantiene un español claro y natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:12:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura condicional del hebreo, el sentido territorial de הָאֲדָמָה como ''la tierra'', y la referencia a ''mi siervo Moisés''. También preserva adecuadamente las alternativas léxicas en notas. Sin embargo, dos puntos necesitan ajuste: (1) ''fuera de la tierra'' sobretraduce מִן en esta construcción y sugiere expulsión completa, mientras que el hebreo/POB conserva la imagen de desplazamiento ''de la tierra''; y (2) ''guarden para hacer'' es poco natural en español y no comunica bien el valor idiomático de שׁמר + infinitivo, que aquí pide algo como ''tengan cuidado de hacer'' o ''se cuiden de hacer''.'
  spanish_quality_summary: 'El texto es en general comprensible y digno, pero contiene formulaciones algo forzadas: ''ande errante'' suena menos natural que ''vague'' o una construcción con ''los pies de Israel'', y ''guarden para hacer'' resulta claramente poco idiomático. La revisión propuesta mejora la legibilidad sin perder la imagen del hebreo ni el registro bíblico.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ley', 'siervo', 'Moisés' y la ausencia de sustituciones teológicas problemáticas están bien. La decisión de no usar 'Yahvé' no aplica porque el versículo no contiene el nombre divino. Se mantiene 'ley' con nota sobre 'instrucción', en línea con la guía.
  issues:
  - severity: medium
    issue: '''fuera de la tierra'' añade un matiz de exterioridad no explícito'
    rationale: El hebreo dice literalmente 'de la tierra' en una imagen de desplazamiento. 'Fuera de' interpreta más de la cuenta hacia expulsión total, mientras que el POB quiso conservar la metáfora sin aplanarla demasiado.
  - severity: medium
    issue: '''guarden para hacer'' es poco natural y opaco en español'
    rationale: Aunque intenta reflejar שמר + infinitivo, la expresión no es idiomática en español bíblico moderno. 'se cuiden de hacer' o 'tengan cuidado de hacer' expresa mejor la idea de obediencia atenta.
  - severity: low
    issue: '''ande errante'' suena algo pesado'
    rationale: No es incorrecto, pero en español suena menos natural. Una formulación con 'los pies de Israel vaguen' preserva mejor la imagen corporal destacada por el proyecto y suena más fluida en contexto.
  revised_spanish_text: Y no volveré a hacer que los pies de Israel vaguen[a] de la tierra que di a sus padres[b], con tal que se cuiden de hacer conforme a todo lo que les mandé, y conforme a toda la ley[c] que mi siervo Moisés les mandó.
  revised_footnotes:
