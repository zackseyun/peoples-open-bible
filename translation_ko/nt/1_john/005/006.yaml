id: 1JN.5.6
reference: 1 John 5:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὗτός ἐστιν ὁ ἐλθὼν δι’ ὕδατος καὶ αἵματος, Ἰησοῦς Χριστός· οὐκ ἐν τῷ ὕδατι μόνον ἀλλ’ ἐν τῷ ὕδατι καὶ ⸀ἐν τῷ αἵματι· καὶ τὸ πνεῦμά ἐστιν τὸ μαρτυροῦν, ὅτι τὸ πνεῦμά ἐστιν ἡ ἀλήθεια.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/005/006.yaml
  text: This is the one who came by water and blood—Jesus Messiah[a]; not by the water only, but by the water and by the blood. And the Spirit is the one testifying[c][b], because the Spirit is the truth.
  footnotes:
  - marker: a
    text: Or 'through water and blood.' The phrase itself is debated; interpreters variously understand 'water and blood' as referring to Jesus' baptism and death, his birth and death, or sacramental imagery. The translation preserves the Greek expression without choosing among these views.
    reason: alternative_reading
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus the Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
  - marker: c
    text: Or 'that the Spirit is the truth.' The conjunction can be read as introducing content or cause; 'because' best fits the flow here.
    reason: lexical_alternative
translation:
  language: ko
  text: 이분이 물과 피로 오신 분, 곧 예수 메시아이십니다. 물로만이 아니라 물과 피로 오셨습니다. 그리고 영이 증언하시는 분입니다 — 영은 진리이시기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δι’ ὕδατος καὶ αἵματος
  english_pob_choice: by water and blood
  chosen_korean: 물과 피로
  alternatives_korean:
  - 물과 피를 통하여
  lexicon: BDAG
  rationale: 전통적으로 예수의 세례(물)와 십자가 죽음(피) 또는 요한 19:34의 옆구리에서 흐른 물과 피로 해석된다. 본문의 모호성을 보존하여 「물과 피로」로 옮긴다.
- source_word: τὸ πνεῦμά ἐστιν τὸ μαρτυροῦν
  english_pob_choice: the Spirit is the one testifying
  chosen_korean: 영이 증언하시는 분
  alternatives_korean:
  - 성령이 증언하시는 분
  lexicon: BDAG
  rationale: 본 문맥은 신적 영의 증언이므로 「영」으로 옮긴다(존칭형 「-하시는」으로 신적 인격을 표지).
