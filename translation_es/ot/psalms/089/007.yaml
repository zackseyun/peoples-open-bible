translation:
  language: es
  text: Porque ¿quién en los cielos puede ser comparado con Yahvé? ¿Quién entre los hijos de Dios[a] es semejante a Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, 'entre los seres celestiales', 'entre los seres divinos' o 'entre los hijos de los poderosos'. La expresión hebrea dice literalmente 'entre los hijos de Dios/dioses'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - En efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la pregunta retórica anterior; 'Pues' conserva ese valor discursivo en español sin sonar rígido.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: Interrogativo directo natural en español para una pregunta retórica.
- source_word: בַשַּׁחַק
  english_pob_choice: in the skies
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en las nubes
  - en los cielos altos
  lexicon: HALOT
  rationale: שׁחק puede referir al cielo/los cielos o a las alturas celestes. 'En los cielos' preserva el marco celestial del paralelismo hebreo y es más natural y reverente en español bíblico que una traducción demasiado técnica o meteorológica.
- source_word: יַעֲרֹךְ
  english_pob_choice: can be compared to
  chosen_spanish: puede ser comparado con
  alternatives_spanish:
  - puede ponerse al lado de
  - puede ser igualado con
  - puede ser puesto en parangón con
  lexicon: HALOT
  rationale: El valor aquí es de poner en paralelo para comparación. 'Puede ser comparado con' expresa bien la fuerza retórica y mantiene la voz pasiva natural en español.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: con Yahvé
  alternatives_spanish:
  - a Yahvé
  - delante de Yahvé
  - frente a Yahvé
  lexicon: HALOT
  rationale: La política del proyecto para יהוה es 'Yahvé' en el texto principal. En español, la comparación se expresa de forma más idiomática con 'con' después de 'comparado', sin perder el referente divino del hebreo.
- source_word: יִדְמֶה
  english_pob_choice: is like
  chosen_spanish: es semejante
  alternatives_spanish:
  - se parece
  - es como
  - puede compararse
  lexicon: HALOT
  rationale: דמה expresa semejanza; 'es semejante' conserva el paralelo semántico con la primera cola y suena natural en español bíblico.
- source_word: בִּבְנֵי אֵלִים
  english_pob_choice: among the sons of God
  chosen_spanish: entre los hijos de Dios
  alternatives_spanish:
  - entre los hijos de los poderosos
  - entre los seres celestiales
  - entre los hijos de los dioses
  lexicon: HALOT
  rationale: La frase hebrea conserva la imagen de una asamblea celestial. 'Hijos de Dios' mantiene la literalidad relevante y la fuerza imagética, dejando abierta la lectura de seres celestiales sin introducir una interpretación demasiado explicativa en el cuerpo principal.
theological_decisions:
- issue: Rendering of יהוה
  english_pob_reading: the LORD / Yahweh in English audit context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: La política terminológica del proyecto para el Tetragrámaton exige 'Yahvé' en el texto español principal. Aquí no hay justificación para enmascarar el nombre divino con 'SEÑOR', y mantenerlo hace auditable la correspondencia con el hebreo.
  doctrine_reference: 'Proyecto POB terminología: יהוה / YHWH → Yahvé'
- issue: Interpretation of בִּבְנֵי אֵלִים
  english_pob_reading: among the sons of God
  chosen_spanish_reading: entre los hijos de Dios
  alternative_spanish_readings:
  - entre los seres celestiales
  - entre los seres divinos
  - entre los hijos de los poderosos
  rationale: La expresión apunta al consejo celestial/divino. La versión principal conserva la imagen hebrea sin despojarla de su tensión teológica; las alternativas reflejan interpretaciones posibles que el inglés POB también preserva en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
- issue: Rhetorical comparison with celestial beings
  english_pob_reading: Who in the skies... Who among the sons of God...
  chosen_spanish_reading: ¿Pues quién en los cielos puede ser comparado con Yahvé? ¿Quién entre los hijos de Dios es semejante a Yahvé?
  alternative_spanish_readings:
  - ¿Pues quién en el cielo...
  - ¿Quién puede compararse con Yahvé entre los hijos de Dios?
  rationale: Se conserva la doble pregunta retórica y el paralelismo hebreo, evitando suavizar la afirmación comparativa. 'En los cielos' y 'entre los hijos de Dios' mantienen el ámbito celeste de la segunda cola.
  doctrine_reference: Salmos 89:7 contexto poético y consejo celestial
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hubo alto acuerdo en la evaluación cruzada; por eso la redacción española sigue de cerca la lectura auditada del hebreo y conserva las alternativas interpretativas en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la terminología del proyecto para יהוה.
  - Se conservó el paralelismo de las dos preguntas retóricas.
  - '''Hijos de Dios'' se dejó en el texto principal para preservar la imaginería del hebreo, con alternativas interpretativas en nota.'
  - No se usó 'Cristo', 'SEÑOR' ni un equivalente tradicional que ocultara el nombre divino.
  - El registro es bíblico moderno y sobrio, apto para lectura eclesial amplia.
