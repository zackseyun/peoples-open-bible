  - severity: medium
    issue: «rogó a los judíos» estrecha demasiado παρεκάλεσεν
    rationale: El POB inglés eligió «appealed to» por su amplitud diplomática. «Rogó a» suena más suplicante y más estrecho que el contexto exige. «apeló a los judíos» o «les pidió a los judíos» conserva mejor la amplitud.
  - severity: low
    issue: «Habiendo caído en desesperación» suena pesado
    rationale: Aunque fiel, el giro es poco natural en español bíblico moderno. «Desesperado» mantiene el valor participial de forma más fluida y digna.
  - severity: low
    issue: «mostró bondad» es menos idiomático para ἐφιλανθρώπησεν
    rationale: La idea es benevolencia o trato humano. «mostró benevolencia» o «actuó con bondad» suena más natural en registro formal.
  - severity: low
