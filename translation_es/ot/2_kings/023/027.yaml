base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/027.yaml
  text: And Yahweh said[a], “I will also remove Judah from before me, just as I removed Israel; and I will reject this city that I chose—Jerusalem—and the house of which I said[b], ‘My name will be there.’”
  footnotes:
  - marker: a
    text: Or 'the temple.' Hebrew 'the house,' referring to the temple in Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I have rejected this city that I chose—Jerusalem.' The Hebrew verb can be read as a completed action, though here it is rendered with future force to match the surrounding judgment declaration.
    reason: alternative_reading
