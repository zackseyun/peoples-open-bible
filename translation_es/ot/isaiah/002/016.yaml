translation:
  language: es
  text: y contra todos los barcos de Tarsis[a], y contra todas las hermosas embarcaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «todas las hermosas imágenes» o «todas las obras deseables». El término hebreo traducido aquí como «embarcaciones» es raro, y su sentido preciso es incierto; el contexto marítimo favorece una traducción relacionada con naves o con objetos finamente elaborados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - y en contra de
  lexicon: HALOT
  rationale: En el contexto de juicio de Isaías 2:12–16, עַל introduce aquello sobre lo que cae la acción hostil de Yahvé. «Contra» comunica mejor esa dirección adversativa en español que «sobre», y conserva el paralelismo repetido con la conjunción inicial.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: «Todos los» mantiene el valor colectivo y la amplitud total del juicio, además de sonar natural con los sustantivos plurales del texto.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  english_pob_choice: the ships of Tarshish
  chosen_spanish: los barcos de Tarsis
  alternatives_spanish:
  - las naves de Tarsis
  - los barcos tarshisitas
  - los barcos de Tarsis
  lexicon: HALOT
  rationale: El giro hebreo se conserva como construcción posesiva con el topónimo. «Barcos» es un equivalente claro y natural en español; «naves» sería posible, pero aquí «barcos» resulta más directo. Se mantiene «Tarsis» como transliteración del nombre propio.
- source_word: שְׂכִיּוֹת הַחֶמְדָּה
  english_pob_choice: beautiful craft
  chosen_spanish: artefactos hermosos
  alternatives_spanish:
  - objetos bellos
  - obras hermosas
  - imágenes hermosas
  lexicon: HALOT
  rationale: El sustantivo raro שְׂכִיּוֹת admite varios sentidos, y el contexto poético-marítimo no fija uno único. «Artefactos» preserva la vaguedad de cosas hechas o confeccionadas, y «hermosos» refleja el valor de lo deseable/atractivo que el inglés POB expresó como «beautiful». Esta opción evita decidir dogmáticamente por «imágenes» u otro sentido más estrecho.
theological_decisions:
- issue: Objeto del juicio divino en la línea poética
  english_pob_reading: and against all the ships of Tarshish, and against all the beautiful craft.
  chosen_spanish_reading: y contra todos los barcos de Tarsis, y contra todos los artefactos hermosos.
  alternative_spanish_readings:
  - y contra todos los barcos de Tarsis, y contra todas las imágenes hermosas.
  - y contra todos los barcos de Tarsis, y contra todas las obras deseables.
  rationale: El hebreo presenta un paralelismo de objetos alcanzados por el juicio, pero el segundo miembro es lexically incierto. El español debe conservar esa tensión sin resolverla artificialmente. «Artefactos hermosos» mantiene la amplitud semántica y la fuerza del pasaje como anuncio de abatimiento de lo valioso y bien hecho.
  doctrine_reference: Isaías 2:12–16; juicio de Yahvé contra la soberbia humana y sus obras.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión («No changes needed»). Esta versión española sigue esa lectura de alta concordancia y conserva la misma cautela lexical en el segundo miembro poético.
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el estándar del proyecto para el Tetragrámaton en el contexto inmediato de Isaías.
  - Se mantiene «Tarsis» como topónimo transliterado, sin explicar el referente geográfico más allá del texto.
  - «Hermosos» traduce el componente de valor/atractivo del hebreo sin introducir una interpretación doctrinal adicional.
