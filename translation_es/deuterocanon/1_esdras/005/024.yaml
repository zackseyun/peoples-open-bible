base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/024.yaml
  text: 'The priests: the sons of Jeddus[a], the son of Jeshua, of the sons of Sanabeis, eight hundred seventy-two; the sons of Emerus[c][b], two hundred fifty-two.'
  footnotes:
  - marker: a
    text: Greek has 'among the sons of Sanabeis.' The construction is unusual in this census list; it likely marks family affiliation rather than motion or purpose.
    reason: lexical_alternative
  - marker: b
    text: The Greek name 'Emerus' may correspond to the priestly family elsewhere known in Hebrew tradition as 'Emmer.' The main text follows the Greek witness directly.
    reason: alternative_reading
  - marker: c
    text: The MT parallel supplied for this location does not match this Greek line closely, reflecting the known reordering and recomposition in 1 Esdras. The translation therefore follows the Greek as primary.
    reason: textual_variant
