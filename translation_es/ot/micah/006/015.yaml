translation:
  language: es
  text: Tú sembrarás[a], pero no segarás; pisarás aceitunas, pero no te ungirás con aceite; y pisarás vino nuevo, pero no beberás vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «pisarás aceitunas ... y vino nuevo»; la segunda cláusula probablemente omite el verbo «pisar/prensar», heredándolo de la primera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְרַע
  english_pob_choice: you will sow
  chosen_spanish: sembrarás
  alternatives_spanish:
  - sembrarás la semilla
  - plantarás
  lexicon: HALOT
  rationale: זרע significa literalmente ‘sembrar’. En español, ‘sembrar’ conserva la imagen agrícola y su relación natural con ‘segar’, sin introducir una paráfrasis innecesaria.
- source_word: תִקְצֹור
  english_pob_choice: you will not reap
  chosen_spanish: no segarás
  alternatives_spanish:
  - no cosecharás
  - no recogerás
  lexicon: HALOT
  rationale: קצר expresa la acción de segar o cosechar el grano. ‘Segar’ mantiene el paralelismo directo con ‘sembrar’ y el tono de juicio agrícola del verso.
- source_word: תִדְרֹךְ זַיִת
  english_pob_choice: you will tread olives
  chosen_spanish: pisarás aceitunas
  alternatives_spanish:
  - prensarás aceitunas
  - pisarás las aceitunas
  lexicon: HALOT
  rationale: דרך significa ‘pisar/troddar’. ‘Pisarás aceitunas’ conserva la imagen concreta del pisado de aceitunas para extraer su contenido, sin volverla demasiado explicativa.
- source_word: תָסוּךְ שֶׁמֶן
  english_pob_choice: you will not anoint yourself with oil
  chosen_spanish: no te ungirás con aceite
  alternatives_spanish:
  - no te untarás con aceite
  - no usarás el aceite
  lexicon: HALOT
  rationale: סוך puede referirse a untar o ungir con aceite sobre el cuerpo. ‘Ungirte con aceite’ refleja bien el sentido reflexivo y la privación personal implicada por el contexto.
- source_word: תִירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino joven
  lexicon: HALOT
  rationale: תירוש designa el vino recién producido, o mosto. Aquí ‘mosto’ conserva la referencia a la producción agrícola y permite distinguirlo de ‘vino’ en la cláusula final.
- source_word: וְתִירוֹשׁ
  english_pob_choice: and you will tread out new wine
  chosen_spanish: y pisarás mosto
  alternatives_spanish:
  - y prensarás mosto
  - y pisarás vino nuevo
  lexicon: HALOT
  rationale: El hebreo omite un verbo explícito antes de תירוש, pero la sintaxis da a entender que se sobreentiende el mismo verbo de ‘pisar’. En español, repetirlo hace clara la elipsis sin añadir contenido ajeno.
- source_word: תִשְׁתֶּה יָּיִן
  english_pob_choice: you will not drink wine
  chosen_spanish: pero no beberás vino
  alternatives_spanish:
  - pero no tomarás vino
  - pero no beberás del vino
  lexicon: HALOT
  rationale: יין es el término ordinario para ‘vino’. ‘Beberás vino’ preserva la oposición entre la producción frustrada y el disfrute negado al final de la línea.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  - Tú, en persona
  lexicon: HALOT
  rationale: El pronombre repetido intensifica la acusación directa. En español puede expresarse con ‘Tú’ al inicio y con la flexión verbal en las demás cláusulas, manteniendo el énfasis sin forzar la sintaxis.
theological_decisions:
- issue: Imagen de juicio con frustración agrícola
  english_pob_reading: Covenantal judgment expressed as frustrated agricultural labor and denied enjoyment of produce
  chosen_spanish_reading: Juicio expresado como trabajo agrícola frustrado y disfrute negado de lo producido
  alternative_spanish_readings:
  - Desgracia general sin matiz pactual
  - Simple escasez económica
  rationale: 'El verso presenta un patrón de maldición: labor sin cosecha, producción sin aprovechamiento. La traducción conserva esa dureza sin suavizarla ni explicitar más de lo que el texto dice.'
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se revisó el pasaje frente al hebreo masorético y el audit trail en inglés. La decisión principal fue conservar el paralelismo agrícola, explicitar en español la elipsis del segundo miembro y mantener un registro natural para una lectura eclesial contemporánea sin perder la imagen de juicio.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando corresponde al tetragrámaton en otros pasajes; aquí no aparece.
  - Se mantuvo el paralelismo semántico entre sembrar/segar, pisar/ungir y pisar/beber.
  - ‘Mosto’ se eligió para תירוש por ser más preciso que ‘vino nuevo’ en este contexto de producción agrícola, sin borrar la tensión con ‘vino’ al final.
