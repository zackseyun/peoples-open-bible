review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: acusa la venta de los habitantes de Judá y Jerusalén a los griegos con el propósito de alejarlos de su propio ámbito. Sin embargo, hay dos desajustes importantes con el texto fuente y con el rastro de auditoría inglés: (1) מְכַרְתֶּם es 2mp (''ustedes vendieron''), no 3pl (''los vendieron''); (2) el inglés POB escogió ''from their border'' como texto principal, dejando ''territory'' como alternativa en nota, mientras que el español invirtió esa prioridad.'
  spanish_quality_summary: 'El español es legible y digno, pero ''los vendieron'' introduce ambigüedad de sujeto y pierde la fuerza directa de la acusación profética. También ''de su territorio'' suaviza la imagen espacial concreta de גְּבוּלָם. Conviene mantener un español natural pero más fiel: ''ustedes vendieron'' y ''de su frontera'', con nota para ''territorio''.'
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. 'Judá', 'Jerusalén' y 'griegos' están bien. 'Hijos de' es aceptable aquí para reflejar בני, y la nota idiomática hacia 'a los griegos' preserva la alternativa documentada. La única corrección léxica de peso es priorizar 'frontera'/'límite fronterizo' en el texto principal para גְּבוּלָם, según la decisión auditada.
  issues:
  - severity: high
    issue: 'El verbo principal está en persona incorrecta: ''los vendieron'' en vez de ''ustedes vendieron''.'
    rationale: 'מְכַרְתֶּם es perfecto qal 2mp, dirigido a los acusados: ''ustedes vendieron''. La forma 3pl del borrador cambia el sujeto y debilita la reprensión directa del oráculo.'
  - severity: medium
    issue: El texto principal usa 'de su territorio' donde la decisión auditada priorizó 'de su frontera'.
    rationale: גְּבוּלָם puede significar 'frontera/borde/territorio', pero el English POB conservó 'border' en el texto y relegó 'territory' a nota. El español debería reflejar esa prioridad salvo razón fuerte, que aquí no es necesaria.
  - severity: low
    issue: La nota b presenta dos alternativas ('frontera' o 'límite') cuando una de ellas debería subir al texto principal.
    rationale: Si el texto principal se corrige a 'frontera', la nota debe reservar la alternativa restante relevante, p. ej. 'territorio', manteniendo la relación entre texto y nota.
  revised_spanish_text: Y a los hijos de Judá y a los hijos de Jerusalén ustedes los vendieron a los hijos de los griegos[a], para alejarlos de su frontera[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: “a los hijos de los griegos”; también puede traducirse más idiomáticamente “a los griegos”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “de su territorio”, para גְּבוּלָם.'
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal para reflejar el hebreo 2mp y mantener la acusación directa del profeta. Se restituye 'frontera' al texto principal para seguir la decisión lexical auditada sobre גְּבוּלָם, dejando 'territorio' como alternativa en nota. El resto del texto puede mantenerse, pues conserva adecuadamente el sentido y la forma del original en español natural.
