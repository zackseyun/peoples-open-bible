translation:
  language: es
  text: 'Y Judá dijo a Israel su padre: «Envía al muchacho conmigo[a], y levantémonos y vayamos, para que vivamos y no muramos, tanto nosotros como tú como nuestros pequeños».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el joven» para «el muchacho». El hebreo נער puede referirse a un joven o muchacho, no solo a un niño pequeño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Y ... dijo» conserva el flujo narrativo sin añadir una relación causal o temporal más fuerte de la que el hebreo exige.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico en la forma española habitual y reconocible.
- source_word: יִשְׂרָאֵל אָבִיו
  english_pob_choice: Israel his father
  chosen_spanish: Israel su padre
  alternatives_spanish:
  - su padre Israel
  - Israel, su padre
  lexicon: HALOT
  rationale: Se conserva «Israel» en lugar de sustituirlo por «Jacob», y se expresa la relación apposicional de modo natural en español.
- source_word: שִׁלְחָה
  english_pob_choice: Send
  chosen_spanish: Envía
  alternatives_spanish:
  - Manda
  - Deja ir
  lexicon: HALOT
  rationale: El imperativo transmite la petición directa de Judá. «Envía» es preciso y natural en español para este mandato.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el muchacho joven
  lexicon: HALOT
  rationale: El hebreo נער puede referirse a un joven o muchacho, no necesariamente a un niño pequeño. «El muchacho» conserva la cercanía familiar y evita forzar una edad más precisa de la que el texto da.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  lexicon: HALOT
  rationale: Corresponde de manera directa al valor preposicional del hebreo y expresa la compañía personal de Judá.
- source_word: וְנָקוּמָה וְנֵלֵכָה
  english_pob_choice: and let us arise and go
  chosen_spanish: y levantémonos y vayamos
  alternatives_spanish:
  - y nos levantemos y vayamos
  - y nos pongamos en camino
  lexicon: HALOT
  rationale: Los cohortativos expresan acción conjunta e inmediata. «Levantémonos y vayamos» conserva la secuencia de dos verbos y el tono exhortativo sin perder naturalidad en español.
- source_word: וְנִחְיֶה וְלֹא נָמוּת
  english_pob_choice: so that we may live and not die
  chosen_spanish: para que vivamos y no muramos
  alternatives_spanish:
  - a fin de que vivamos y no muramos
  - para vivir y no morir
  lexicon: HALOT
  rationale: La frase expresa propósito/resulta de ir. «Para que vivamos y no muramos» comunica ese sentido con fidelidad y una sintaxis clara en español.
- source_word: גַּם אֲנַחְנוּ גַּם אַתָּה גַּם טַפֵּנוּ
  english_pob_choice: both we and you and our little ones
  chosen_spanish: tanto nosotros como tú y nuestros pequeños
  alternatives_spanish:
  - nosotros también, tú también y nuestros pequeños también
  - tanto nosotros como tú como nuestros pequeños
  lexicon: HALOT
  rationale: El repetido גַּם introduce énfasis inclusivo. En español, «tanto ... como ... y ...» conserva la acumulación sin sonar forzado y mantiene presentes los tres grupos.
- source_word: טַפֵּנוּ
  english_pob_choice: our little ones
  chosen_spanish: nuestros pequeños
  alternatives_spanish:
  - nuestros niños
  - nuestros hijos pequeños
  - nuestra familia pequeña
  lexicon: HALOT
  rationale: טַף se refiere a los pequeños/dependientes vulnerables del hogar. «Nuestros pequeños» preserva la ternura y la indefensión del término más que un genérico como «hijos».
theological_decisions:
- issue: Alcance de la amenaza de muerte y del propósito de ir a Egipto
  english_pob_reading: so that we may live and not die
  chosen_spanish_reading: para que vivamos y no muramos
  alternative_spanish_readings:
  - para vivir y no morir
  - a fin de que vivamos y no muramos
  rationale: La formulación mantiene el propósito vital y la urgencia existencial del texto sin suavizar la gravedad de «no muramos».
  doctrine_reference: Providencia divina y preservación de la familia del pacto en el relato de Génesis
- issue: Identidad de «Israel» frente a «Jacob»
  english_pob_reading: Israel his father
  chosen_spanish_reading: Israel su padre
  alternative_spanish_readings:
  - Jacob su padre
  - Israel, su padre
  rationale: Se conserva el nombre «Israel» como en el hebreo, evitando una harmonización interpretativa con «Jacob» que el texto aquí no usa.
  doctrine_reference: Respeto al nombre narrativo-teológico elegido por el texto hebreo
translation_notes:
  revision_awareness: El texto inglés revisado cambió «get up» por «arise» para elevar el registro. La versión española sigue esa revisión con «levantémonos», un equivalente natural y formal que conserva la fuerza cohortativa y el paralelismo verbal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Israel» y no «Jacob», en línea con el audit trail.
  - Se evitó «SEÑOR» y no aplica aquí, pues el versículo no contiene יהוה ni κύριος.
  - «Nuestros pequeños» conserva la sensibilidad de טַף sin introducir una edad específica.
  - La nota [a] está anclada explícitamente en «conmigo[a]» para cumplir la validación de marcadores.
