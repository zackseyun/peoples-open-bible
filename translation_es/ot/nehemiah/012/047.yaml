revisions:
- from: Y todo Israel, en los días de Zorobabel y en los días de Nehemías, daba las porciones[a] para los cantores y los porteros, según lo que cada día requería[b]; y apartaban para los levitas, y los levitas apartaban para los hijos de Aarón[c].
  to: Y todo Israel, en los días de Zorobabel y en los días de Nehemías, daban las porciones[a] para los cantores y los porteros, según lo que cada día requería[b]; y apartaban para los levitas, y los levitas apartaban para los hijos de Aarón[c].
  rationale: Se ajustó la concordancia verbal para que el sujeto colectivo «todo Israel» rija formas plurales naturales en español dentro de toda la oración, sin alterar el sentido. También se armonizó la nota c con la alternativa léxica documentada en el rastro inglés POB.
