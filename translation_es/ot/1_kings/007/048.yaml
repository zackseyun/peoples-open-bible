translation:
  language: es
  text: 'Y Salomón hizo todos los utensilios que estaban en la casa de Yahvé[a]: el altar de oro, y la mesa sobre la cual estaba el pan de la Presencia[b], de oro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». Literalmente, «la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «el pan de la proposición». Literalmente, «el pan de la Presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: En este inventario cultual, עשה expresa la acción general de producir o preparar. «Hizo» es natural en español y conserva la amplitud del verbo sin añadir un matiz técnico excesivo.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los vasos
  - todos los muebles
  lexicon: HALOT
  rationale: כֵּלִים puede abarcar artículos, instrumentos o utensilios. Aquí se trata de objetos del santuario; «utensilios» mantiene el sentido material y cultual sin forzar «vasos» ni ampliar a «muebles».
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of the LORD
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea básica «casa de Yahvé» para reflejar בֵּית יְהוָה con transparencia. «Templo» sería posible, pero atenúa la forma literal documentada.
- source_word: מִזְבַּח הַזָּהָב
  english_pob_choice: the golden altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  - el altar de oro
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo + calificativo material; «altar de oro» preserva mejor la estructura que un adjetivo como «dorado» y evita interpretar de más el modo de fabricación.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - el table
  lexicon: HALOT
  rationale: שֻׁלְחָן es el término usual para «mesa». En español, «mesa» es claro y exacto, y el contexto cultual la identifica como la mesa sagrada.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: on which was
  chosen_spanish: sobre la cual estaba
  alternatives_spanish:
  - en la que estaba
  - sobre la que estaba
  lexicon: HALOT
  rationale: La relativa preposicional se vierte de modo idiomático en español. «Sobre la cual estaba» conserva el valor locativo de עָלָיו y mantiene el tono formal.
- source_word: לֶחֶם הַפָּנִים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la presencia
  - el pan de la proposición
  - el showbread
  lexicon: HALOT
  rationale: Se mantiene la traducción transparente «pan de la Presencia», que preserva el sentido literal del término cultual y evita el arcaismo menos claro «pan de la proposición».
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorada
  - oro
  lexicon: HALOT
  rationale: 'El זָהָב final califica la mesa en apposición: «la mesa ... de oro». En español, «de oro» reproduce con naturalidad esa relación y evita ambigüedad sobre si modifica solo al pan.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La forma española adoptada por defecto en este proyecto es «Yahvé», que preserva el nombre propio del pacto sin la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El contexto inglés muestra alta concordancia y sin cambios recientes en la revisión más nueva; por eso la redacción española sigue de cerca el sentido literal del hebreo y conserva las dos decisiones léxicas ya auditadas: בֵּית יְהוָה como «casa de Yahvé» y לֶחֶם הַפָּנִים como «pan de la Presencia».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se prefirió «utensilios» sobre «vasos» porque el contexto lista objetos del santuario de manera general.
  - Se evitó «Cristo» u otras equivalencias no pertinentes; el versículo no contiene cristología.
  - La colocación final «de oro» se dejó al cierre de la frase para reflejar la sintaxis hebrea y la decisión auditada en inglés.
