review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo: incapacidad de Moisés, énfasis en hacerlo sin ayuda, objeto colectivo singular («todo este pueblo») y razón causal por la carga excesiva. Sin embargo, la nota al pie va más allá del rastro inglés auditado: introduce «soportar»/«cargar con» como matices adicionales no preservados como nota en el POB inglés. Además, la redacción española puede sonar más natural con «demasiado pesado para mí» en lugar de «me es demasiado pesado».'
  spanish_quality_summary: La frase principal es clara y fiel, pero «me es demasiado pesado» resulta algo tiesa en español general. «Yo solo» funciona bien para el énfasis de אָנֹכִי + לְבַדִּי. La nota actual está sobrecargada y mezcla una alternativa de orden con explicación léxica extra; conviene simplificarla para corresponder al audit trail inglés y mantener legibilidad.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Pueblo» preserva correctamente el colectivo singular de הָעָם. «Llevar» corresponde bien a לָשֵׂאת, con «soportar» reservado solo como alternativa léxica en nota si se desea, pero en este caso debe ajustarse a la nota inglesa documentada.
  issues:
  - severity: medium
    issue: La nota al pie añade matices no documentados en el audit trail inglés.
    rationale: La nota inglesa solo preserva la alternativa «to bear all this people by myself». La nota española agrega «cargar con» y una explicación interpretativa sobre «la carga», lo que excede la evidencia documentada.
  - severity: low
    issue: «Me es demasiado pesado» suena menos natural que una formulación más idiomática.
    rationale: Aunque comprensible y fiel, «es demasiado pesado para mí» mantiene el sentido de כָבֵד מִמֶּנִּי con mejor fluidez en español neutro.
  revised_spanish_text: No puedo llevar yo solo[a] a todo este pueblo, porque es demasiado pesado para mí.
