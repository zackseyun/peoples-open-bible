revisions:
- from: Él tragará a la muerte para siempre[a], y el Señor Yahvé enjugará las lágrimas de todo rostro, y quitará de sobre toda la tierra el oprobio de su pueblo[b][c], porque Yahvé ha hablado.
  to: Tragará a la muerte para siempre[b], y el Señor Dios[a] enjugará las lágrimas de todo rostro, y quitará de toda la tierra el oprobio de su pueblo[c], porque Yahvé ha hablado.
  rationale: La revisión mejora la naturalidad del español y alinea mejor las notas con el expediente auditado. Se elimina el pronombre innecesario, se reemplaza el calco poco idiomático 'el Señor Yahvé' por una forma principal más legible con nota que preserva la información fuente, se simplifican las notas léxicas de חֶרְפַּת y se suaviza 'de sobre toda la tierra' a un español más natural.
  reviewer_model: gpt-5.4
