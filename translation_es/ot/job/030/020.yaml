- from: Clamo a ti[a], y no me respondes; me detengo, y tú solo miras hacia mí.
  to: Clamo a ti, pero no me respondes; estoy de pie[a], y tú solo me miras.
  rationale: Se corrige «me detengo» a «estoy de pie» para reflejar fielmente עָמַדְתִּי y se simplifica «miras hacia mí» a «me miras» por naturalidad y precisión. La nota al pie se rehace para conservar la alternativa documentada en el POB inglés para la segunda cláusula completa, incluyendo el posible sentido pasado y el matiz de mirada atenta. No se requiere adjudicación adicional.
