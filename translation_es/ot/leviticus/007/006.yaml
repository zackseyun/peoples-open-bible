translation:
  language: es
  text: Todo varón[a] entre los sacerdotes podrá comerlo; se comerá en un lugar santo[b]. Es cosa santísima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo varón de los sacerdotes comerá de ella». El hebreo puede expresarse de modo más formal, pero el sentido es que cualquier varón perteneciente al grupo sacerdotal está autorizado a comerla.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «santo de santos», un modismo que significa «cosa santísima».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo y cada
  lexicon: HALOT
  rationale: El sentido distributivo exige incluir a cada miembro calificado del grupo sacerdotal; en español, «todo varón» comunica bien ese alcance sin sonar forzado.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - hombre
  lexicon: HALOT
  rationale: El hebreo especifica sexo biológico y no solo pertenencia adulta; «varón» conserva esa precisión en español bíblico y evita la ambigüedad de «hombre».
- source_word: בַּכֹּהֲנִים
  english_pob_choice: among the priests
  chosen_spanish: entre los sacerdotes
  alternatives_spanish:
  - de los sacerdotes
  - entre el sacerdocio
  lexicon: HALOT
  rationale: La preposición indica pertenencia dentro del grupo sacerdotal; «entre los sacerdotes» conserva la restricción de membresía y es natural en español.
- source_word: יֹאכְלֶנּוּ
  english_pob_choice: may eat it
  chosen_spanish: podrá comerlo
  alternatives_spanish:
  - puede comerlo
  - deberá comerlo
  lexicon: HALOT
  rationale: Aquí el imperfecto expresa permiso/autorización cultual. «Podrá comerlo» comunica mejor el derecho permitido que una simple obligación futura.
- source_word: בְּמָקוֹם קָדוֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en un lugar sagrado
  - en el lugar santo
  lexicon: HALOT
  rationale: Se conserva la falta de artículo en «lugar»; «un lugar santo» evita sugerir de manera indebida un lugar específico ya identificado como recinto sagrado.
- source_word: יֵאָכֵל
  english_pob_choice: it shall be eaten
  chosen_spanish: se comerá
  alternatives_spanish:
  - será comido
  - debe comerse
  lexicon: HALOT
  rationale: El pasivo legal se expresa con una construcción natural en español. «Se comerá» transmite la instrucción normativa sin sonar demasiado literal.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - santísimo
  - lo más santo
  lexicon: HALOT
  rationale: El hebreo es un idiomático de grado máximo de santidad aplicado a la porción sacrificial. «Cosa santísima» mantiene el valor clasificatorio sin confundirlo con el nombre del Lugar Santísimo.
- source_word: הוּא
  english_pob_choice: It is
  chosen_spanish: Es
  alternatives_spanish:
  - Esto es
  - Ella es
  lexicon: HALOT
  rationale: El pronombre retoma la porción del sacrificio en discusión; en español una cópula simple basta y resulta más natural.
theological_decisions:
- issue: Restricción de consumo a varones dentro del grupo sacerdotal
  english_pob_reading: Every male among the priests may eat it
  chosen_spanish_reading: Todo varón entre los sacerdotes podrá comerlo
  alternative_spanish_readings:
  - Todo sacerdote podrá comerlo
  - Todos los sacerdotes podrán comerlo
  rationale: El hebreo distingue explícitamente el rasgo sexual («varón») y la pertenencia al cuerpo sacerdotal. No se generaliza a «todo sacerdote», porque eso borraría una restricción presente en el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
- issue: Valor idiomático de «holy of holies» aplicado a la ofrenda
  english_pob_reading: Hebrew 'holy of holies,' an idiom meaning 'most holy.'
  chosen_spanish_reading: cosa santísima
  alternative_spanish_readings:
  - santísimo
  - santo de santos
  rationale: En español, «santo de santos» suele remitir al recinto interior del tabernáculo/templo, no a una clasificación sacrificial. «Cosa santísima» conserva la intensidad superlativa sin introducir una asociación indebida.
  doctrine_reference: Lexical/theological equivalence for cultic idiom in sacrificial context
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no hubo cambios necesarios y el texto mantiene alta concordancia con el análisis fuente y la auditoría inglesa.'
  spanish_consistency_notes:
  - Se preservó la restricción de género con «varón» para reflejar זָכָר.
  - Se evitó «SEÑOR» o formulaciones tradicionales no presentes en este versículo.
  - «Lugar santo» se mantuvo sin artículo para respetar el matiz del hebreo.
  - La cláusula final se tradujo como clasificación sacrificial, no como nombre del santuario.
