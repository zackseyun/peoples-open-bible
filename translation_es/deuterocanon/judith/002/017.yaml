  - marker: b
    text: Or 'for their supplies' at 'for their provisions' (εἰς τὴν παρασκευὴν αὐτῶν); the term can denote preparation or supplies, and here likely refers to food provisioning.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'of which there was no number,' an idiom meaning they were innumerable.
    reason: lexical_alternative
