  revised_spanish_text: De la porción de los hijos de Judá vino la herencia de los hijos de Simeón[a], porque la porción de los hijos de Judá era demasiado grande para ellos[b]; así los hijos de Simeón recibieron su herencia dentro de la herencia de Judá[c].
