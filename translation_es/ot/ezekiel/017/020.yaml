base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/020.yaml
  text: I will spread my net over him[a], and he will be caught in my snare; then I will bring him to Babylon[b], and there I will enter into judgment with him for his treachery by which he acted treacherously against me.
  footnotes:
  - marker: a
    text: Or 'there I will judge him.' The Hebrew expression can be rendered more simply, but the wording used in the main text preserves the legal nuance of entering into judgment with him.
    reason: lexical_alternative
  - marker: b
    text: '''Treachery'' may also be rendered ''unfaithfulness'' or ''breach of faith.'' The Hebrew emphasizes covenant violation.'
    reason: lexical_alternative
