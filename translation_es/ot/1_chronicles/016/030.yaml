translation:
  language: es
  text: ¡Tiemblen delante de él, toda la tierra! Sí, el mundo está establecido; no será movido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no vacilará» o «no será sacudido». La imagen hebrea es de firme estabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִילוּ
  english_pob_choice: Tremble
  chosen_spanish: Tiemblen
  alternatives_spanish:
  - Tiemblen de temor
  - Estremézcanse
  - Tiemblen ante su presencia
  lexicon: HALOT
  rationale: El verbo puede expresar temblor físico o estremecimiento ante una manifestación divina. En este contexto de convocatoria litúrgica, «Tiemblen» conserva la fuerza reverente sin volver la frase demasiado literal o extraña en español.
- source_word: מִלְּפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - de su presencia
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'de delante de su rostro/presencia'. «Delante de él» reproduce bien la relación espacial-reverente en español y mantiene la naturalidad del mandato.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - toda la tierra
  - todo el mundo
  lexicon: HALOT
  rationale: En este llamado universal, la referencia apunta a la totalidad de la tierra en su población. «Todos los habitantes de la tierra» explicita el alcance universal sin perder el sentido de כָּל הָאָרֶץ.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - ciertamente
  - en verdad
  - además
  lexicon: HALOT
  rationale: Aquí la partícula es enfática y no meramente aditiva. «Sí» introduce en español la misma intensificación retórica que la POB inglesa expresó con «indeed».
- source_word: תִּכּוֹן
  english_pob_choice: is established
  chosen_spanish: está establecido
  alternatives_spanish:
  - está firmemente establecido
  - está firme
  - fue establecido
  lexicon: HALOT
  rationale: El nifal de כון comunica la idea de estar firmemente asentado o establecido. «Está establecido» preserva la estabilidad afirmada por el texto sin sobreinterpretar el verbo.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  - el orbe
  lexicon: HALOT
  rationale: תֵבֵל designa el mundo habitado, ordenado. «El mundo» es la equivalencia española más natural y mantiene la amplitud cósmica del hebreo.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La partícula negativa poética se traduce con el negador simple español «no», que reproduce con sobriedad el valor semántico del original.
- source_word: תִּמּוֹט
  english_pob_choice: it shall not be moved
  chosen_spanish: será movido
  alternatives_spanish:
  - vacilará
  - será sacudido
  - tambaleará
  lexicon: HALOT
  rationale: El nifal de מוט expresa idea de tambalearse, vacilar o moverse de su firmeza. «No será movido» conserva la imagen de estabilidad que subraya el poema; se mantiene el sentido de firmeza sin resolver la tensión cosmológica del texto.
theological_decisions:
- issue: Estabilidad cósmica y lenguaje poético
  english_pob_reading: The verse affirms the world's established order under God's rule without specifying a scientific claim about immobility.
  chosen_spanish_reading: El verso afirma el orden firme del mundo bajo el gobierno de Dios, sin convertir la imagen poética en una afirmación científica sobre inmovilidad absoluta.
  alternative_spanish_readings:
  - El mundo no se moverá nunca
  - El mundo no caerá
  rationale: La poesía hebrea usa imágenes de firmeza y estabilidad. La redacción española conserva esa afirmación teológica —Dios sostiene el orden creado— sin borrar la tensión imagística del verbo hebreo.
  doctrine_reference: 'Principio POB: mantener la tensión teológica y priorizar la evidencia de la lengua original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail en inglés: conserva el llamado universal, la partícula enfática y el lenguaje de estabilidad cósmica, evitando una paráfrasis que suavice la imagen hebrea. No se requirieron revisiones adicionales respecto del pass más reciente.'
  spanish_consistency_notes:
  - Se usó «Dios» solo en la decisión teológica; el versículo mismo no nombra a Yahvé, pero el contexto del pasaje es de alabanza al Dios de Israel.
  - Se prefirió «el mundo» como equivalente natural de תֵּבֵל, manteniendo la amplitud cósmica del texto.
  - Se mantuvo la tensión entre ‘no será movido’ y la imagen de firmeza del hebreo, sin sustituirla por una explicación doctrinal posterior.
