translation:
  language: es
  text: Mano con mano[a], el malo no quedará impune, pero la descendencia de los justos escapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mano con mano», un modismo que probablemente expresa certeza firme; también puede entenderse como «ciertamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד לְיָד
  english_pob_choice: Hand to hand
  chosen_spanish: Mano a mano
  alternatives_spanish:
  - Ciertamente
  - Mano en mano
  lexicon: HALOT
  rationale: El hebreo presenta un modismo literal, paralelo al inglés POB ‘Hand to hand’. En español, ‘mano a mano’ conserva la imagen hebrea y suena natural; ‘ciertamente’ explicita el valor idiomático pero borra la figura. ‘Mano en mano’ es posible, pero menos fijo y menos transparente como eco del hebreo.
- source_word: יִנָּקֶה
  english_pob_choice: will go unpunished
  chosen_spanish: no quedará sin castigo
  alternatives_spanish:
  - no será absuelto
  - no quedará impune
  lexicon: HALOT
  rationale: El nifal de נקה expresa quedar libre de castigo o ser absuelto. En este contexto sapiencial, la idea principal es la consecuencia punitiva; ‘no quedará sin castigo’ mantiene ese valor con naturalidad en español. ‘No quedará impune’ es muy cercano, pero ‘sin castigo’ hace más explícita la noción judicial-moral.
- source_word: רָּע
  english_pob_choice: the evil
  chosen_spanish: el malo
  alternatives_spanish:
  - el malvado
  - el impío
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular y funciona sustantivamente para una persona caracterizada por el mal. ‘El malo’ preserva esa fuerza sin convertirla en un abstracto. ‘El malvado’ es posible, pero suena más interpretativo; ‘el impío’ introduce un matiz religioso no requerido por la forma.
- source_word: וְזֶרַע
  english_pob_choice: but the offspring
  chosen_spanish: pero la descendencia
  alternatives_spanish:
  - pero la simiente
  - pero los descendientes
  lexicon: HALOT
  rationale: זֶרַע aquí significa progenie/descendencia. ‘Descendencia’ es claro y bíblicamente adecuado en español; ‘simiente’ conserva una forma más literal, pero puede sonar arcaica o ambigua. Se mantiene el valor colectivo del término.
- source_word: צַדִּיקִים
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos hombres
  lexicon: HALOT
  rationale: El plural sustantivado designa a los justos como grupo. ‘De los justos’ es natural y preciso en español, conservando el sentido colectivo sin sobrecargar el género. ‘Rectos’ es posible, pero menos estable en el registro bíblico común.
- source_word: נִמְלָט
  english_pob_choice: will escape
  chosen_spanish: escapará
  alternatives_spanish:
  - será librada
  - será salvada
  lexicon: HALOT
  rationale: El nifal de מלט denota escapar o ser librado. ‘Escapará’ reproduce la concisión proverbial y mantiene abierta la referencia a escape/deliverance. ‘Será librada’ añade una tonalidad más interpretativa, y ‘será salvada’ introduce connotación soteriológica no exigida por el hebreo.
theological_decisions:
- issue: Tratamiento del modismo יָד לְיָד
  english_pob_reading: Preserve the literal idiom in the main text
  chosen_spanish_reading: Mano a mano
  alternative_spanish_readings:
  - Ciertamente
  - Con toda seguridad
  rationale: Se conserva la imagen literal para no resolver prematuramente una locución algo opaca y para mantener la auditabilidad con el hebreo. El español ‘mano a mano’ permite esa preservación y sigue siendo comprensible; las alternativas explicitan el sentido, pero perderían el eco verbal del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Valor substantivado de רָּע
  english_pob_reading: the evil
  chosen_spanish_reading: el malo
  alternative_spanish_readings:
  - el malvado
  - el impío
  - la persona malvada
  rationale: La forma hebrea es masculina singular y representa a una persona caracterizada por el mal. Se evita neutralizarla en un abstracto. ‘El malo’ conserva la concreción moral y la concordancia con el singular masculino del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que corrigió «the evil man» a «the evil» para acercarse más al hebreo. En español, se optó por «el malo», porque mantiene la fuerza personal y la concordancia masculina singular del original sin añadir «hombre». También se preservó la decisión del POB inglés de no colapsar el modismo יָד לְיָד en un adverbio interpretativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Justos» se mantiene como sustantivo plural colectivo, coherente con el estilo bíblico del proyecto.
  - «Descendencia» se prefiere a «simiente» para un español actual y claro, sin perder el sentido genealógico.
  - Se conserva el paralelismo proverbial con una cláusula negativa seguida de una adversativa con «pero».
