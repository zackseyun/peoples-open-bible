    rationale: Aunque literalmente defendible, suena más a calco del inglés que a español natural. El hebreo expresa que Dios no sea para Jeremías una fuente de terror/dismayo; «causa de terror» conserva ese sentido con mejor fluidez.
  - severity: medium
    issue: «Desgracia» es posible, pero menos preciso que «calamidad» para רָעָה en este contexto.
    rationale: La auditoría inglesa enfatiza calamity/trouble, no mal moral. «Calamidad» transmite con más exactitud un contexto de desastre o adversidad seria y armoniza mejor con la nota explicativa.
