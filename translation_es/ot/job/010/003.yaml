review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: mantiene la pregunta retórica, la acusación directa a Dios, «oprimas» para תַעֲשֹׁק, «desprecies» para תִמְאַס, «la obra de tus manos» para יְגִיעַ כַּפֶּיךָ, y conserva la metáfora de הוֹפָעְתָּ en el texto principal con alternativa interpretativa en nota. La única desviación relevante es sintáctica y de anclaje de nota: la nota [a] está colocada en «oprimas», pero el contenido de la nota explica הוֹפָעְתָּ/«resplandezcas sobre».'
  spanish_quality_summary: El español es claro y digno, pero «resplandezcas sobre el consejo de los impíos» suena algo rígido y menos natural que «brilles sobre». Además, en una serie con «que oprimas..., que desprecies..., y que...», la puntuación española fluye mejor sin coma antes de «y». La nota también necesita corregir su formato inicial y anclarse donde corresponde.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo u otros términos sensibles. «Impíos» es aceptable para רְשָׁעִים en registro bíblico. Se preserva correctamente la tensión teológica sin suavizarla.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «oprimas», pero explica el verbo final הוֹפָעְתָּ.
    rationale: Esto induce al lector a pensar que la alternativa se refiere a «oprimir», cuando en realidad corresponde a «resplandecer/brillar sobre» el consejo de los impíos.
  - severity: medium
    issue: «Resplandezcas sobre» es comprensible pero poco natural en español actual en este contexto.
    rationale: La metáfora debe conservarse, pero «brilles sobre» expresa mejor el valor de הוֹפָעְתָּ sin sonar forzado ni perder la nota alternativa «muestres favor».
  - severity: low
    issue: Coma innecesaria antes de «y que» en la serie verbal.
    rationale: En español moderno, la coordinación final en una serie simple normalmente no lleva esa coma.
  - severity: low
    issue: La redacción de la nota comienza con una comilla sobrante.
    rationale: Debe decir «O «muestres favor...»» o formulación equivalente, no comenzar con una comilla aislada.
  revised_spanish_text: ¿Acaso es bueno para ti que oprimas, que desprecies la obra de tus manos y que brilles[a] sobre el consejo de los impíos?
