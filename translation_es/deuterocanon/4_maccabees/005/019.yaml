  - severity: medium
    issue: «Alimento contaminado» puede sugerir contaminación física más que impureza ritual.
    rationale: Dado el contexto de comida prohibida e impureza cultual, «impuro» comunica más directamente el sentido religioso documentado en la auditoría inglesa y evita ambigüedad innecesaria.
