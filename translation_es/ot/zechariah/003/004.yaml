translation:
  language: es
  text: 'Y él respondió y dijo a los que estaban delante de él[b]: «Quiten de sobre él las vestiduras sucias». Entonces le dijo: «Mira, he quitado tu iniquidad de sobre ti, y te vestiré con vestiduras finas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestiduras de gala» / «vestiduras finas». El término hebreo denota ropa rica, elegante o de dignidad.
    reason: lexical_alternative
  - marker: b
    text: «Los que estaban delante de él» probablemente se refiere a asistentes celestiales, pero el hebreo lo deja descriptivo.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: HALOT
  rationale: ענה en narrativa introduce la réplica; en español, «respondió» conserva bien el valor discursivo natural sin forzar una pregunta previa explícita.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אמר se rinde de forma estándar con «dijo», que es natural y fiel al movimiento narrativo.
- source_word: הָעֹמְדִים לְפָנָיו
  english_pob_choice: those standing before him
  chosen_spanish: los que estaban delante de él
  alternatives_spanish:
  - los que se hallaban delante de él
  - sus servidores
  lexicon: HALOT
  rationale: La expresión es descriptiva; se mantiene sin interpretar como «servidores» o «ángeles», porque el hebreo no lo dice de manera explícita.
- source_word: הָסִירוּ
  english_pob_choice: Remove
  chosen_spanish: Quiten
  alternatives_spanish:
  - Retiren
  - Saquen
  lexicon: HALOT
  rationale: El imperativo plural exige una acción de quitar o retirar; «Quiten» suena natural en español y conserva la fuerza directa.
- source_word: הַבְּגָדִים הַצֹּאִים
  english_pob_choice: the filthy garments
  chosen_spanish: las vestiduras sucias
  alternatives_spanish:
  - las vestiduras inmundas
  - las ropas sucias
  lexicon: HALOT
  rationale: בגדים admite «vestiduras» o «ropas»; צואים tiene la idea de suciedad/impureza fuerte. «Vestiduras sucias» preserva la imagen sin explicitar más de lo que el término hebreo exige.
- source_word: מֵעָלָיו
  english_pob_choice: from upon him
  chosen_spanish: de sobre él
  alternatives_spanish:
  - de encima de él
  - de él
  lexicon: HALOT
  rationale: Se conserva la concreción espacial de la preposición compuesta, especialmente importante porque reaparece en la declaración simbólica posterior.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: Es un marcador discursivo que llama la atención sobre el acto simbólico; «Mira» es breve, claro y reverente.
- source_word: הֶעֱבַרְתִּי
  english_pob_choice: I have taken ... away
  chosen_spanish: he quitado
  alternatives_spanish:
  - he hecho pasar
  - he apartado
  lexicon: HALOT
  rationale: El hifil de עבר aquí expresa quitar o hacer pasar lejos. «He quitado» comunica bien la acción consumada sin volverse técnico.
- source_word: עֲוֺנֶךָ
  english_pob_choice: your iniquity
  chosen_spanish: tu iniquidad
  alternatives_spanish:
  - tu culpa
  - tu pecado
  lexicon: HALOT
  rationale: Se conserva «iniquidad» para mantener el peso ético y judicial del término, y también la tensión teológica de su remoción.
- source_word: וְהַלְבֵּשׁ אֹתְךָ
  english_pob_choice: and I will clothe you
  chosen_spanish: y te vestiré
  alternatives_spanish:
  - y te pondré
  - y te cubriré con
  lexicon: HALOT
  rationale: En español, «vestir» expresa naturalmente la imagen y evita una construcción rígida; el futuro mantiene el valor resultativo/promisorio.
- source_word: מַחֲלָצוֹת
  english_pob_choice: fine garments
  chosen_spanish: vestiduras finas
  alternatives_spanish:
  - vestiduras de gala
  - vestiduras ricas
  - ropas finas
  lexicon: HALOT
  rationale: El término denota ropa de calidad, elegante o de gala. «Vestiduras finas» recoge esa dignidad sin decidir de más sobre la ocasión.
theological_decisions:
- issue: Relación entre quitar las vestiduras sucias y quitar la iniquidad
  english_pob_reading: Retain the imagery of filthy garments removed and iniquity taken away without expanding it into a doctrinal paraphrase.
  chosen_spanish_reading: Mantener la imagen de las vestiduras sucias quitadas y la iniquidad removida sin convertirla en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - explicitarlo como justificación
  - explicitarlo como reintegración sacerdotal
  rationale: El versículo une la purificación simbólica con la remoción de la iniquidad, pero no define por sí mismo una categoría doctrinal posterior. La traducción preserva la tensión y la imagen.
  doctrine_reference: Principio de transparencia textual del POB; Zac 3:4 en su contexto inmediato
- issue: Identidad de «los que estaban delante de él»
  english_pob_reading: Translate descriptively rather than interpretively as angelic attendants.
  chosen_spanish_reading: Traducir de manera descriptiva, no como «ángeles» o «servidores» interpretativos.
  alternative_spanish_readings:
  - sus servidores
  - los ángeles que estaban delante de él
  rationale: El contexto sugiere seres celestiales, pero el hebreo solo dice que estaban de pie delante de él. Se evita añadir una identificación no explícita.
  doctrine_reference: Principio de transparencia textual del POB; Zac 3:4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa: se evita un equivalente demasiado interpretativo para מַחֲלָצוֹת y se conserva la construcción descriptiva de «los que estaban delante de él». También se reflejó la eliminación del redundante «saying» con una sintaxis española natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma habitual del nombre divino solo cuando aparezca explícitamente en el texto; aquí no aparece.
  - Se mantiene «iniquidad» para עָוֹן, en coherencia con el valor moral/judicial del término.
  - «Vestiduras» se elige por el tono digno y bíblico, sin perder naturalidad en español.
  - La puntuación y el estilo buscan una lectura pública sobria y moderna, sin arcaísmos innecesarios.
