id: ISA.54.8
reference: Isaiah 54:8
source:
  edition: WLC
  text: בְּ/שֶׁ֣צֶף קֶ֗צֶף הִסְתַּ֨רְתִּי פָנַ֥/י רֶ֨גַע֙ מִמֵּ֔/ךְ וּ/בְ/חֶ֥סֶד עוֹלָ֖ם רִֽחַמְתִּ֑י/ךְ אָמַ֥ר גֹּאֲלֵ֖/ךְ יְהוָֽה׃ס
translation:
  text: In a surge of wrath I hid my face from you for a moment[a], but with everlasting lovingkindness I have had compassion on you, says Yahweh[b], your Redeemer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In overflowing anger' or 'In a burst of anger.' The Hebrew expression is rare and intensifies the idea of wrath.
    reason: lexical_alternative
  - marker: b
    text: Or 'with everlasting steadfast love.' The Hebrew חֶסֶד includes covenant loyalty, mercy, and steadfast love.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשֶׁצֶף קֶצֶף
  chosen: in a surge of wrath
  alternatives:
  - in overflowing anger
  - in a burst of anger
  lexicon: HALOT
  rationale: The paired nouns intensify the idea of anger. שֶׁצֶף is rare and suggests an outburst, surge, or overflowing, while קֶצֶף is wrath/anger. 'Surge of wrath' preserves the compact poetic force without over-paraphrasing.
- source_word: הִסְתַּרְתִּי פָנַי
  chosen: I hid my face
  alternatives:
  - I concealed my face
  - I turned my face away
  lexicon: HALOT
  rationale: A standard Hebrew idiom for withdrawing favor or presence. 'Hid my face' is the most direct and recognizable rendering and preserves the covenantal resonance of the idiom.
- source_word: רֶגַע
  chosen: for a moment
  alternatives:
  - briefly
  - for an instant
  lexicon: HALOT
  rationale: The noun denotes a brief span. 'For a moment' fits natural English and preserves the contrast with the following everlasting mercy.
- source_word: וּבְחֶסֶד עוֹלָם
  chosen: but with everlasting covenant love
  alternatives:
  - but with everlasting steadfast love
  - but with everlasting lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and steadfast love. 'Covenant love' makes that relational-theological dimension explicit in accessible English; 'everlasting' renders עוֹלָם and sharpens the contrast with the momentary anger.
- source_word: רִחַמְתִּיךְ
  chosen: I have had compassion on you
  alternatives:
  - I have shown you mercy
  - I have loved you tenderly
  lexicon: HALOT
  rationale: The verb רחם denotes deep compassion/mercy. 'Have had compassion on you' is faithful and readable, and the perfect aspect works naturally in English as a divine declaration of completed compassionate action.
- source_word: גֹּאֲלֵךְ
  chosen: your Redeemer
  alternatives:
  - the one who redeems you
  - your kinsman-redeemer
  lexicon: HALOT
  rationale: גאל in this nominal form denotes a redeemer, often with covenantal and familial overtones. 'Your Redeemer' is the most natural English title here; 'kinsman-redeemer' would over-specify a nuance not explicit in this immediate context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
