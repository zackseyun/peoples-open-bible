translation:
  language: es
  text: Y en aquel tiempo tomamos la tierra de la mano de los dos reyes de los amorreos, que estaban al otro lado del Jordán, desde el valle del Arnón[a] hasta el monte Hermón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el wadi Arnón» o «desde el río Arnón»; el hebreo נחל puede referirse a un wadi, cauce o valle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּקַּח
  english_pob_choice: we took
  chosen_spanish: tomamos
  alternatives_spanish:
  - la tomamos
  - conquistamos
  - apropiamos
  lexicon: HALOT
  rationale: El verbo hebreo לקח, en este contexto narrativo, expresa la toma de posesión de un territorio. 'Tomamos' reproduce bien el sentido básico sin añadir un matiz militar más fuerte que el del hebreo.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: '''En aquel tiempo'' es una equivalencia natural y digna en español, y conserva la referencia temporal narrativa del original.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - la región
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere a una porción concreta de territorio. 'La tierra' mantiene la amplitud semántica bíblica y suena natural en español bíblico; 'territorio' estrecha demasiado el campo semántico.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de mano de
  alternatives_spanish:
  - de la mano de
  - de poder de
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo 'mano' para expresar posesión o control. 'De mano de' es más sobrio y bíblico en español que una paráfrasis explicativa.
- source_word: שְׁנֵי מַלְכֵי הָאֱמֹרִי
  english_pob_choice: the two kings of the Amorites
  chosen_spanish: los dos reyes de los amorreos
  alternatives_spanish:
  - los dos reyes amorreos
  - los dos monarcas de los amorreos
  lexicon: HALOT
  rationale: La construcción refleja de cerca el hebreo y usa el etnónimo tradicional 'amorreos', ampliamente comprensible en español bíblico.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: who were beyond the Jordan
  chosen_spanish: que estaban al otro lado del Jordán
  alternatives_spanish:
  - que estaban más allá del Jordán
  - que estaban del otro lado del Jordán
  lexicon: HALOT
  rationale: '''Al otro lado del Jordán'' expresa con naturalidad la referencia espacial desde la perspectiva del narrador, sin perder el valor geográfico de בְּעֵבֶר.'
- source_word: מִנַּחַל אַרְנֹן
  english_pob_choice: from the Wadi Arnon
  chosen_spanish: desde el valle del Arnón
  alternatives_spanish:
  - desde el wadi Arnón
  - desde el torrente Arnón
  lexicon: HALOT
  rationale: נחל puede significar wadi, cauce o valle. En español, 'valle del Arnón' resulta más claro y natural para lectores amplios que dejar 'wadi' o forzar 'torrente'. Mantiene la nota geográfica sin decidir de manera excesiva entre los matices posibles.
- source_word: עַד הַר חֶרְמוֹן
  english_pob_choice: as far as Mount Hermon
  chosen_spanish: hasta el monte Hermón
  alternatives_spanish:
  - hasta el monte Hermón
  - así como el monte Hermón
  lexicon: HALOT
  rationale: '''Hasta'' expresa el límite territorial marcado por עַד. ''Monte Hermón'' traduce הַר con el término español común y respeta el nombre propio transliterado.'
theological_decisions:
- issue: Alcance geográfico de la posesión territorial
  english_pob_reading: And at that time we took the land ... from the Wadi Arnon as far as Mount Hermon.
  chosen_spanish_reading: Y en aquel tiempo tomamos la tierra ... desde el valle del Arnón hasta el monte Hermón.
  alternative_spanish_readings:
  - Y en aquel tiempo conquistamos la tierra ...
  - Y en aquel tiempo arrebatamos la tierra ...
  rationale: La frase española conserva la idea de toma posesoria territorial sin intensificar innecesariamente el acto como conquista violenta. Esto sigue el valor narrativo del hebreo y la prudencia del POB inglés.
  doctrine_reference: Josué 13:8-12; Deuteronomio 2:24-36
translation_notes:
  revision_awareness: El texto coincide con el análisis auditado de la edición inglesa POB y no requiere revisiones posteriores; se conservó la equivalencia óptima establecida para los topónimos y para נחל.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa 'los amorreos' como etnónimo bíblico estándar, en paralelo con la traducción inglesa auditada.
  - Se prefirió 'tomamos' sobre 'conquistamos' para no añadir matiz bélico no requerido por el hebreo ni por el POB inglés.
