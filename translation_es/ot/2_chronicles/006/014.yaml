translation:
  language: es
  text: 'Y dijo[a]: «Oh Yahvé, Dios de Israel, no hay Dios como tú en los cielos ni en la tierra, tú que guardas el pacto y el amor constante[b] para tus siervos, los que andan delante de ti con todo su corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces dijo».
    reason: alternative_reading
  - marker: b
    text: O «la fidelidad pactual»; el hebreo חֶסֶד puede abarcar amor leal, amor constante y fidelidad del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino del pacto, no un título. En español se mantiene la transliteración 'Yahvé' según la norma del proyecto, preservando el nombre propio y evitando la sustitución litúrgica 'SEÑOR'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - Dios de Isra'el
  lexicon: HALOT
  rationale: La construcción en hebreo identifica a Yahvé como el Dios perteneciente a Israel en sentido pactual. 'Dios de Israel' es la equivalencia natural y fiel en español.
- source_word: אֵין כָּמוֹךָ אֱלֹהִים
  english_pob_choice: there is no God like you
  chosen_spanish: no hay Dios como tú
  alternatives_spanish:
  - no hay ninguno como tú entre los dioses
  - no existe Dios semejante a ti
  lexicon: HALOT
  rationale: La frase expresa incomparabilidad. En español, 'no hay Dios como tú' conserva la fuerza singular del predicado y suena natural sin añadir una glosa interpretativa.
- source_word: בַּשָּׁמַיִם וּבָאָרֶץ
  english_pob_choice: in heaven or on earth
  chosen_spanish: en los cielos ni en la tierra
  alternatives_spanish:
  - en el cielo y en la tierra
  - en los cielos y en la tierra
  lexicon: HALOT
  rationale: 'Se trata de un merismo de totalidad. ''Ni... ni...'' reproduce bien la exclusión comparativa del hebreo: no hay Dios comparable en ninguna esfera creada. Se prefiere ''cielos'' en plural por el uso bíblico y por la forma hebrea.'
- source_word: שֹׁמֵר הַבְּרִית וְהַחֶסֶד
  english_pob_choice: keeping the covenant and the steadfast love
  chosen_spanish: que guardas el pacto y la misericordia
  alternatives_spanish:
  - que guardas el pacto y la fidelidad amorosa
  - que guardas el pacto y el amor constante
  - que guardas el pacto y la gracia
  lexicon: HALOT
  rationale: '''שֹׁמֵר'' se expresa con un participio verbal de acción continua; en español, ''que guardas'' transmite esa cualidad. Para ''חֶסֶד'', el POB inglés eligió ''steadfast love'', pero en español ''misericordia'' comunica una amplitud semántica aceptable y litúrgicamente clara; se mantiene la tensión pactual sin reducirla a un mero sentimiento.'
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: for your servants
  chosen_spanish: para tus siervos
  alternatives_spanish:
  - para tus esclavos
  - a favor de tus siervos
  lexicon: HALOT
  rationale: Aunque el término puede tener fuerza servil, aquí el contexto pactual y la relación de fidelidad favorecen 'siervos' en español, como equivalente tradicional y comprensible. Se evita 'esclavos' porque en este verso la función relacional es más prominente que el estatus legal.
- source_word: הַהֹלְכִים לְפָנֶיךָ
  english_pob_choice: who walk before you
  chosen_spanish: los que andan delante de ti
  alternatives_spanish:
  - los que caminan delante de ti
  - los que viven delante de ti
  lexicon: HALOT
  rationale: La expresión es un modismo bíblico para conducta fiel en la presencia de Dios. 'Andan delante de ti' conserva la metáfora y es natural en español bíblico contemporáneo.
- source_word: בְּכָל לִבָּם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo el corazón
  - con sus corazones enteros
  lexicon: HALOT
  rationale: La imagen hebrea de 'corazón' expresa la interioridad y la voluntad. 'Con todo su corazón' reproduce bien el sentido de entrega indivisa y mantiene la concordancia colectiva del sufijo.
theological_decisions:
- issue: Uso del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El verso presenta explícitamente el Tetragrama. La lectura del proyecto es transliterarlo como nombre propio, no ocultarlo tras un título. 'Yahvé' mantiene la referencia al nombre revelado y sigue la convención establecida para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de חֶסֶד en paralelo con הַבְּרִית
  english_pob_reading: the steadfast love
  chosen_spanish_reading: la misericordia
  alternative_spanish_readings:
  - la fidelidad amorosa
  - el amor constante
  - la misericordia y fidelidad
  rationale: El hebreo une 'pacto' y 'חֶסֶד', por lo que el término no debe reducirse a una sola cualidad emocional. 'Misericordia' es una opción española legítima que conserva amplitud relacional y funciona en la sintaxis del verso, aunque el trasfondo pactual sigue presente por el contexto inmediato.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el trazado auditado en inglés. Se ajustó el orden natural del español para lectura pública, se conservó el nombre divino como 'Yahvé', y se mantuvo la tensión de חֶסֶד con una nota alternativa porque el español obliga a elegir entre varios matices que el hebreo reúne en un solo término.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como nombre divino propio, coherente con la política del proyecto.
  - Se usó 'pacto' para בְּרִית y 'misericordia' para חֶסֶד, con nota para la alternativa pactual.
  - Se evitó 'SEÑOR' como sustituto del Tetragrama.
  - Se prefirió 'siervos' en vez de 'esclavos' por el marco relacional del verso y la lectura POB auditada.
