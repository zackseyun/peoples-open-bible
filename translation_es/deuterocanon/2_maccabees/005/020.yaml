base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/005/020.yaml
  text: Therefore even the place itself[a], after sharing in the nation's misfortunes, later also shared in its benefits; and though it had been overtaken in the wrath of the Almighty, it was restored again in the reconciliation of the great Master[b], with all glory.
  footnotes:
  - marker: a
    text: Or 'calamities' for 'misfortunes'; the Greek term denotes severe troubles experienced along with the nation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the great Lord' or 'the great Sovereign' for 'the great Master'; Greek δεσπότης emphasizes absolute authority and is distinct from κύριος.
    reason: lexical_alternative
