translation:
  language: es
  text: ¿Por qué se enaltece polvo y cenizas[a], aunque en su vida su cuerpo es alzado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo final es difícil. El paralelo griego dice: «Porque en vida arrojé sus entrañas», lo cual enfatiza la corrupción corporal y la mortalidad humana. El hebreo puede apuntar de manera semejante a la humillación o perecibilidad del cuerpo.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה / τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: En esta pregunta retórica de reprensión, «¿Por qué» comunica mejor el sentido exhortativo/critico que un simple «¿Qué».
- source_word: יִּגְאֶה / ὑπερηφανεύεται
  english_pob_choice: does exalt itself
  chosen_spanish: se enaltece
  alternatives_spanish:
  - se exalta
  - se hace soberbio
  - se engríe
  lexicon: HALOT
  rationale: «Se enaltece» conserva la imagen de elevación propia del verbo y su connotación de orgullo sin forzar un español demasiado literal.
- source_word: עָפָר וָאֵפֶר / γῆ καὶ σποδός
  english_pob_choice: dust and ashes
  chosen_spanish: el polvo y la ceniza
  alternatives_spanish:
  - polvo y ceniza
  - tierra y ceniza
  lexicon: HALOT
  rationale: La pareja fija bíblica expresa fragilidad y mortalidad humanas. En español, «polvo y ceniza» es la forma más natural y fiel; se añadió artículo por fluidez.
- source_word: אֲשֶׁר / ὅτι
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - cuando
  - porque
  - si bien
  lexicon: HALOT
  rationale: 'La lógica del verso es concesiva: la elevación corporal no justifica el orgullo. «Aunque» refleja mejor esa tensión que una lectura puramente temporal o causal.'
- source_word: בְּחַיָּיו / ἐν ζωῇ
  english_pob_choice: in its life
  chosen_spanish: en su vida
  alternatives_spanish:
  - durante su vida
  - mientras vive
  lexicon: HALOT
  rationale: «En su vida» sigue de cerca la frase fuente y mantiene el contraste entre la vida presente y la humillación corporal implícita.
- source_word: יוּרַם / ἔρριψα ... / (English) is lifted up
  english_pob_choice: is lifted up
  chosen_spanish: es levantado
  alternatives_spanish:
  - es alzado
  - es elevado
  lexicon: HALOT
  rationale: «Es levantado» conserva el movimiento ascendente del hebreo y del paralelo griego sin introducir una idea más interpretativa de exaltación.
- source_word: גִּוְיוֹ / τὰ ἐνδόσθια αὐτοῦ
  english_pob_choice: its body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su cadáver
  - sus entrañas
  lexicon: HALOT
  rationale: El hebreo permite «cuerpo»; el griego paralelo apunta a una imaginería de mortalidad corporal. «Su cuerpo» mantiene la prudencia textual del testimonio hebreo y deja visible la tensión con el griego.
theological_decisions:
- issue: Tensión entre el hebreo difícil y el paralelo griego sobre la mortalidad corporal
  english_pob_reading: Translate from the extant Hebrew, while allowing the Greek parallel to inform the sense of mortality and humiliation.
  chosen_spanish_reading: Traducir el hebreo conservado, pero dejando que el paralelo griego refuerce la idea de la fragilidad y humillación del cuerpo.
  alternative_spanish_readings:
  - 'Traducir principalmente el griego: «¿Por qué se enaltece la tierra y la ceniza? Porque en vida arrojé sus entrañas».'
  - Emendar el hebreo hacia una lectura mortuoria más explícita.
  rationale: 'La política del proyecto prioriza el hebreo cuando está disponible, aunque aquí el final es textualmente difícil. La versión española mantiene esa base y, al mismo tiempo, no borra la tensión que el griego aclara: la necedad del orgullo humano frente a la mortalidad del cuerpo.'
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives; use Greek parallel as actual translation input.'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés auditado, que pasó de «cuando» a una lectura concesiva («though»). En español se reflejó esa misma mejora con «aunque», y se mantuvo el lenguaje corporal sin endurecerlo hacia una emendación no justificada.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; aquí no aparece el Tetragrámaton.
  - Se mantuvo «polvo y ceniza» como expresión bíblica estable, con artículo para naturalidad editorial.
  - Se evitó «Señor» o formulaciones eclesiásticas no presentes en la fuente.
  - La ambigüedad final se conserva mediante nota, sin resolverla artificialmente.
