translation:
  language: es
  text: 'Pero el jefe de los eunucos dijo[a] a Daniel: «Temo a mi señor el rey, que asignó su comida y su bebida. ¿Por qué habría de ver sus rostros[b] abatidos, más que los de los jóvenes de su misma edad? Así pondrían en peligro mi cabeza ante el rey[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el principal oficial’. El término hebreo para ‘eunucos’ también puede referirse más ampliamente a funcionarios de la corte.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘sus rostros abatidos’ o ‘turbados’.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘harían responsable mi cabeza ante el rey’, un modismo que significa poner su vida en peligro ante el rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר הַסָּרִיסִים
  english_pob_choice: the chief of the eunuchs
  chosen_spanish: el jefe de los eunucos
  alternatives_spanish:
  - el jefe de los oficiales
  - el principal oficial
  lexicon: HALOT
  rationale: שַׂר indica un jefe o dirigente, y סָרִיס puede significar literalmente ‘eunuco’ o, en sentido amplio, funcionario de corte. Mantengo ‘eunucos’ porque ese es el equivalente elegido en el texto inglés auditado y porque preserva la referencia directa del hebreo, aunque el término pueda abarcar funcionarios.
- source_word: יָרֵא אֲנִי
  english_pob_choice: I fear
  chosen_spanish: temo
  alternatives_spanish:
  - tengo temor
  - estoy temeroso
  lexicon: HALOT
  rationale: La construcción expresa temor o aprensión actual. ‘Temo’ es natural en español y conserva el valor inmediato de la frase.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi señor el rey
  lexicon: HALOT
  rationale: אֲדֹנִי es un tratamiento respetuoso; en español, ‘mi señor el rey’ reproduce el registro cortesano sin forzar una paráfrasis.
- source_word: מִנָּה
  english_pob_choice: assigned
  chosen_spanish: asignó
  alternatives_spanish:
  - apuntó
  - destinó
  - dispuso
  lexicon: HALOT
  rationale: El verbo señala que el rey fijó o destinó provisiones para ellos. ‘Asignó’ es claro y corresponde bien al contexto de la corte.
- source_word: מַאֲכַלְכֶם
  english_pob_choice: your food
  chosen_spanish: su comida
  alternatives_spanish:
  - vuestra comida
  - su alimento
  lexicon: HALOT
  rationale: El hebreo habla de la provisión de comida. Opto por ‘su comida’ para reflejar el referente a la porción asignada por el rey en un español fluido; el posesivo queda contextualizado por la referencia a Daniel y sus compañeros.
- source_word: מִשְׁתֵּיכֶם
  english_pob_choice: your drink
  chosen_spanish: su bebida
  alternatives_spanish:
  - vuestro beber
  - vuestro vino
  - sus bebidas
  lexicon: HALOT
  rationale: El sustantivo puede abarcar la bebida provista. ‘Su bebida’ mantiene amplitud sin añadir ‘vino’, que el hebreo no exige aquí.
- source_word: לָמָּה יִרְאֶה
  english_pob_choice: Why should he see
  chosen_spanish: ¿Por qué habría de ver?
  alternatives_spanish:
  - ¿Por qué vería?
  - ¿Para qué vería?
  lexicon: HALOT
  rationale: La pregunta expresa una consecuencia temida. ‘¿Por qué habría de ver?’ conserva el valor retórico del hebreo y su matiz de expectativa negativa.
- source_word: פְּנֵי/כֶם זֹעֲפִים
  english_pob_choice: your faces looking worse
  chosen_spanish: vuestro rostro abatido
  alternatives_spanish:
  - vuestras caras turbias
  - vuestros rostros sombríos
  - vuestro semblante abatido
  lexicon: HALOT
  rationale: זֹעֲפִים describe rostros airados, turbados o sombríos. En contexto el problema es su apariencia deteriorada; ‘abatido’ recoge esa impresión visible sin exagerar, y el singular colectivo ‘rostro’ funciona naturalmente en español para el plural hebreo.
- source_word: מִן הַיְלָדִים
  english_pob_choice: than the youths
  chosen_spanish: más que el de los jóvenes
  alternatives_spanish:
  - más que el de los muchachos
  - más que el de los jóvenes de su edad
  lexicon: HALOT
  rationale: יְלָדִים puede referirse a jóvenes en este contexto de formación de corte. ‘Jóvenes’ es el equivalente más natural y suficientemente amplio.
- source_word: אֲשֶׁר כְּגִילְכֶם
  english_pob_choice: who are of your own age
  chosen_spanish: de vuestra misma edad
  alternatives_spanish:
  - que son de vuestra edad
  - de la misma edad que vosotros
  lexicon: HALOT
  rationale: La comparación indica la misma franja de edad. ‘De vuestra misma edad’ es claro y fiel.
- source_word: וְחִיַּבְתֶּם
  english_pob_choice: Then you would endanger
  chosen_spanish: así pondríais en peligro
  alternatives_spanish:
  - y haríais responsable
  - y me haríais liable
  - y me expondríais
  lexicon: HALOT
  rationale: El verbo puede expresar hacer responsable o dejar en situación de culpa/peligro. ‘Pondríais en peligro’ transmite la fuerza práctica de la advertencia en español, como en la versión inglesa auditada.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi vida
  - mi cuello
  lexicon: HALOT
  rationale: ‘Cabeza’ conserva el hebraísmo e idiomatiza la idea de la vida del funcionario en riesgo. La imagen se mantiene sin explicar de más.
translation_notes:
  revision_awareness: Se corrigió la validación anterior unificando los marcadores de nota con sus anclajes en el texto y evitando dejar notas sin referencia. También se conservó la decisión léxica de ‘eunucos’ con la alternativa amplia documentada en nota.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en este pasaje solo si apareciera el nombre divino; aquí no aparece.
  - Se mantuvo un registro cortesano sobrio y consistente con Daniel 1.
  - Se preserva la imagen idiomática de ‘mi cabeza’ para רֹאשִׁי.
  - Se evitó traducir mecánicamente desde el inglés cuando el español exigía ajuste de número o naturalidad, como en ‘rostro’ para un plural colectivo.
