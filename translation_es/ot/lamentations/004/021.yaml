translation:
  language: es
  text: ¡Regocíjate y alégrate, hija de Edom, tú que habitas en la tierra de Uz; la copa pasará también a ti[a]—te embriagarás y te desnudarás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la copa también vendrá a ti». La imagen es la copa del juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quedarás expuesta» o «te descubrirás». El hebreo comunica desnudez vergonzosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂישִׂי
  english_pob_choice: Rejoice
  chosen_spanish: Regocíjate
  alternatives_spanish:
  - Alégrate
  - Goza
  lexicon: HALOT
  rationale: El imperativo femenino singular expresa júbilo intenso. «Regocíjate» conserva esa fuerza y funciona bien junto al paralelismo inmediato.
- source_word: וְשִׂמְחִי
  english_pob_choice: and be glad
  chosen_spanish: y alégrate
  alternatives_spanish:
  - y regocíjate
  - y sé alegre
  lexicon: HALOT
  rationale: La segunda orden intensifica la primera. En español conviene variar levemente para mantener el paralelismo sin sonar redundante.
- source_word: בַּת אֱדוֹם
  english_pob_choice: daughter of Edom
  chosen_spanish: hija de Edom
  alternatives_spanish:
  - hija Edom
  lexicon: HALOT
  rationale: Se conserva la personificación profética de la nación como «hija», que refleja el vocativo femenino del hebreo.
- source_word: יֹשַׁבְתִּי
  english_pob_choice: you who dwell
  chosen_spanish: tú que habitas
  alternatives_spanish:
  - tú que vives
  - moradora
  lexicon: HALOT
  rationale: El participio funciona aquí como apelativo descriptivo. «Tú que habitas» es natural en español y preserva el valor vocativo/aposicional.
- source_word: בְּאֶרֶץ עוּץ
  english_pob_choice: in the land of Uz
  chosen_spanish: en la tierra de Uz
  alternatives_spanish:
  - en el país de Uz
  lexicon: HALOT
  rationale: «Tierra de Uz» es la correspondencia más directa y tradicional para el topónimo, sin añadir matices geográficos no presentes.
- source_word: גַּם עָלַיִךְ תַּעֲבָר כּוֹס
  english_pob_choice: the cup will also pass to you
  chosen_spanish: la copa también pasará a ti
  alternatives_spanish:
  - la copa también vendrá a ti
  - la copa también te sobrepasará
  lexicon: HALOT
  rationale: Se preserva la metáfora de la copa que pasa, entendida como juicio divino. «Pasará a ti» mantiene la imagen sin explicitarla en exceso.
- source_word: כּוֹס
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - una copa
  lexicon: HALOT
  rationale: El contexto profético hace de la copa una imagen definida de juicio; por eso el artículo definido comunica mejor la referencia compartida.
- source_word: תִּשְׁכְּרִי
  english_pob_choice: you will become drunk
  chosen_spanish: te embriagarás
  alternatives_spanish:
  - te emborracharás
  - llegarás a estar ebria
  lexicon: HALOT
  rationale: El verbo describe el efecto de la copa. «Te embriagarás» conserva el sentido y suena más digno y literario que una opción más coloquial.
- source_word: וְתִתְעָרִי
  english_pob_choice: and strip yourself bare
  chosen_spanish: y te desnudarás
  alternatives_spanish:
  - y quedarás desnuda
  - y te descubrirás
  lexicon: HALOT
  rationale: El hitpael expresa desnudarse/ser dejado al descubierto en vergüenza. «Te desnudarás» preserva la acción reflexiva y la vergüenza implícita, con español claro.
theological_decisions:
- issue: La imagen de la copa como juicio divino
  english_pob_reading: The cup is retained as a metaphor for divine judgment rather than paraphrased away.
  chosen_spanish_reading: La copa se mantiene como metáfora del juicio divino.
  alternative_spanish_readings:
  - el castigo te llegará
  - la pena también vendrá a ti
  rationale: El texto profético conserva la imagen intertextual de la copa. Traducirla literalmente mantiene su peso teológico y literario sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: La vergüenza de la desnudez
  english_pob_reading: The Hebrew conveys shameful nakedness.
  chosen_spanish_reading: La desnudez se entiende como vergüenza pública y humillación.
  alternative_spanish_readings:
  - quedarás expuesta
  - te descubrirás
  rationale: El verbo final no describe mera desnudez física, sino exposición vergonzosa bajo juicio. La redacción española debe conservar esa connotación sin explicarla de más en el texto principal.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se evitó añadir un equivalente de «yet», ya que la revisión inglesa lo eliminó por no estar en el original. Se mantuvo la metáfora de la copa y la imagen final de vergüenza/desnudez.
  spanish_consistency_notes:
  - Se usa «copa» para כּוֹס por coherencia con la imaginería profética de juicio.
  - Se prefiere «Yahvé» cuando el hebreo lo exija; en este versículo no aparece el tetragrámaton.
  - Se conserva la personificación nacional con «hija de Edom».
  - «Te desnudarás» mantiene la reflexividad del hitpael y evita una paráfrasis demasiado interpretativa.
