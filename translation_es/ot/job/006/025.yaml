translation:
  language: es
  text: ¡Qué vigorosas son las palabras rectas! Pero ¿qué reprende la reprensión de ustedes?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Qué dolorosas son las palabras honestas! Pero ¿qué argumenta el argumento de ustedes?». El hebreo permite matices como «dolorosas», «persuasivas» o «vigorosas» para la primera cláusula, y «argumenta» o «reprende» para la segunda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Qué...!
  alternatives_spanish:
  - ¿Cómo...?
  - ¡Cuán...!
  lexicon: HALOT
  rationale: La partícula interrogativa/exclamativa expresa admiración de grado, no una pregunta de información. En español, «¡Qué...!» comunica bien ese valor exclamativo y suena natural en un registro bíblico digno.
- source_word: נִּמְרְצוּ
  english_pob_choice: are forceful
  chosen_spanish: vigorosas
  alternatives_spanish:
  - fuertes
  - persuasivas
  - dolorosas
  lexicon: HALOT
  rationale: El hebreo transmite fuerza/eficacia intensa. «Vigorosas» conserva la idea de energía y fuerza verbal sin decidir exclusivamente entre el efecto de persuadir o de causar dolor.
- source_word: אִמְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - afirmaciones
  lexicon: HALOT
  rationale: El constructo plural de אמר se refiere a expresiones habladas. «Palabras» es natural en español y mantiene el tono formal sin perder la referencia a discurso concreto.
- source_word: יֹשֶׁר
  english_pob_choice: upright
  chosen_spanish: rectas
  alternatives_spanish:
  - honestas
  - íntegras
  - justas
  lexicon: HALOT
  rationale: יֹשֶׁר lleva la idea de rectitud/straightness moral y verbal. «Rectas» conserva la imagen hebrea y funciona bien con «palabras» en español.
- source_word: וּמַה
  english_pob_choice: But what
  chosen_spanish: Pero ¿qué...?
  alternatives_spanish:
  - Y ¿qué...?
  - Mas ¿qué...?
  lexicon: HALOT
  rationale: 'El valor contextual es adversativo: Job contrapone el habla realmente recta con la reprensión de sus compañeros. «Pero» expresa mejor la oposición que «y».'
- source_word: יּוֹכִיחַ
  english_pob_choice: does ... reprove
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - demuestra
  - argumenta
  lexicon: HALOT
  rationale: El verbo יכח puede abarcar reprender, corregir, discutir o probar. En esta pregunta retórica, «reprende» preserva el matiz de amonestación y mantiene la relación con el sustantivo siguiente.
- source_word: הוֹכֵחַ
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: La forma intensiva/noun-like intensifica o especifica el acto de reprochar. «Reprensión» es un equivalente claro y digno en español para ese acto de corrección dura.
- source_word: מִכֶּם
  english_pob_choice: from you
  chosen_spanish: tu
  alternatives_spanish:
  - de ustedes
  - por ustedes
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «de/desde ustedes», pero en español la construcción posesiva con el sustantivo abstracto resulta más natural: «tu reprensión» reproduce el origen implícito del reproche y evita una formulación pesada.'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail al conservar el paralelismo y la repetición verbal del hebreo en la segunda cláusula, evitando una paráfrasis interpretativa como «demuestra» y manteniendo el juego de palabra entre reprensión/reprende.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «rectas» sobre «honestas» para mantener la imagen espacial/moral de יֹשֶׁר y un registro bíblico natural.
  - La segunda cláusula conserva una repetición cercana del verbo y el sustantivo («reprende» / «reprensión») para reflejar el efecto retórico del hebreo.
