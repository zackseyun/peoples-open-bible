  glossary_alignment: 'Alineado en términos generales con la guía del proyecto: «Yahvé» para יהוה, «justicia» para צְדָקָה, y mantenimiento de «hijos de Leví» en vez de «levitas». No hay conflicto terminológico mayor. La excepción necesaria es solo de formato/ubicación de la nota y una leve mejora sintáctica.'
