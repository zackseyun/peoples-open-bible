translation:
  language: es
  text: Hagan votos a Yahvé su Dios y cúmplanlos; que todos los que están alrededor de él traigan tributo[a] al Temible[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «traigan un regalo» o «traigan presentes». El hebreo שַׁי puede designar un don ofrecido a un superior; «tributo» resalta mejor el matiz reverencial y, posiblemente, político.
    reason: lexical_alternative
  - marker: b
    text: O «al que debe ser temido» o «al Asombroso». El título hebreo enfatiza que Dios es el objeto propio del temor y la reverencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדֲרוּ
  english_pob_choice: Make vows
  chosen_spanish: Hagan votos
  alternatives_spanish:
  - Prometan votos
  - Voten
  lexicon: HALOT
  rationale: El imperativo plural pide una acción verbal directa. «Hagan votos» conserva el valor de נדר y suena natural en español bíblico actual sin perder precisión.
- source_word: וְשַׁלְּמוּ
  english_pob_choice: and fulfill them
  chosen_spanish: y cúmplanlos
  alternatives_spanish:
  - y páguenlos
  - y complétenlos
  lexicon: HALOT
  rationale: שׁלם aquí expresa cumplir o saldar votos. «Cúmplanlos» preserva la relación con «votos» sin forzar una traducción contable de «pagar», que en español puede sonar menos clara en este contexto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino YHWH como «Yahvé», conforme a la terminología del proyecto, en lugar de reemplazarlo por un título disimulado.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona se expresa con el posesivo respetuoso «su» en español neutro, manteniendo la referencia plural del hebreo y evitando una construcción demasiado pesada.
- source_word: כָּל סְבִיבָיו
  english_pob_choice: let all around him
  chosen_spanish: todos los de alrededor de él
  alternatives_spanish:
  - todos los que están alrededor de él
  - todos sus alrededores
  lexicon: HALOT
  rationale: La frase hebrea apunta a personas o pueblos circundantes, no solo a lugares. «Los de alrededor de él» conserva esa amplitud y refleja bien el plural verbal implícito en la acción colectiva.
- source_word: יוֹבִילוּ
  english_pob_choice: bring
  chosen_spanish: traigan
  alternatives_spanish:
  - lleven
  - presenten
  lexicon: HALOT
  rationale: En contexto de tributo/ofrenda, el verbo hiphil expresa llevar o traer como presente. «Traigan» es la opción más natural en español y conserva la dirección hacia la entrega.
- source_word: שַׁי
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - regalo
  - presente
  lexicon: HALOT
  rationale: El sustantivo puede designar un don ofrecido a un superior. «Tributo» reproduce mejor la carga reverencial y potencialmente política que el contexto sugiere.
- source_word: לַמּוֹרָא
  english_pob_choice: the Fearsome One
  chosen_spanish: el Temible
  alternatives_spanish:
  - el que debe ser temido
  - el Asombroso
  lexicon: HALOT
  rationale: El término funciona como título divino basado en מורא, 'temor, terror, awe'. «El Temible» mantiene la fuerza semántica y la tensión teológica de un Dios que inspira reverencia y temor.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la decisión del POB inglés de recuperar el Nombre divino en la forma vernácula del proyecto. «Yahvé» preserva la identidad del pacto sin ocultarla tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering לַמּוֹרָא as a divine title
  english_pob_reading: the Fearsome One
  chosen_spanish_reading: el Temible
  alternative_spanish_readings:
  - el que debe ser temido
  - el Asombroso
  rationale: La línea final no suaviza el lenguaje de temor reverente. «El Temible» conserva el énfasis del salmo en la majestad imponente de Dios y evita diluirlo en una noción meramente amable o abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y coincide con el juicio de alta concordancia del control de revisión: no se registraron cambios necesarios en la pasada más reciente. Se mantuvo la tensión lexical entre don/tributo y temor/awe, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para conservar el Nombre divino según la política del proyecto.
  - «Tributo» se reserva aquí para שַׁי por su sentido reverencial/político; no se sustituyó por «regalo» en el texto principal.
  - «El Temible» mantiene el valor de título divino de לַמּוֹרָא sin neutralizar el elemento de temor reverente.
  - El posesivo «su» refleja el plural de segunda persona de אֱלֹהֵיכֶם en español neutro y respetuoso.
