translation:
  language: es
  text: Un corazón alegre[a] promueve la sanidad, pero un espíritu abatido seca los huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace bien como medicina». El sustantivo hebreo גֵּהָה puede denotar sanidad, recuperación o remedio/medicina; el texto principal usa el sentido más amplio, «sanidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - ser interior
  lexicon: HALOT
  rationale: En Proverbios, לֵב designa el centro interior de la persona, incluyendo emociones y voluntad. «Corazón» es el equivalente natural en español y conserva la imagen antropológica.
- source_word: שָׂמֵחַ
  english_pob_choice: joyful
  chosen_spanish: alegre
  alternatives_spanish:
  - gozoso
  - contento
  lexicon: HALOT
  rationale: El adjetivo expresa gozo o alegría. «Alegre» suena natural con «corazón» en español y evita un registro poco idiomático.
- source_word: יֵיטִב
  english_pob_choice: promotes
  chosen_spanish: favorece
  alternatives_spanish:
  - hace bien a
  - mejora
  - promueve
  lexicon: HALOT
  rationale: 'El hifil de יטב tiene sentido causativo: «hacer bien» o «beneficiar». «Favorece» comunica con claridad que el corazón alegre contribuye a la sanidad sin sonar forzado.'
- source_word: גֵּהָה
  english_pob_choice: healing
  chosen_spanish: la sanidad
  alternatives_spanish:
  - la sanación
  - el remedio
  - la recuperación
  lexicon: HALOT
  rationale: El sustantivo puede denotar sanidad, recuperación o remedio. «La sanidad» conserva amplitud semántica y funciona bien con el paralelismo del proverbio.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - disposición interior
  lexicon: HALOT
  rationale: Aquí רוּחַ se refiere a la dimensión interior de la persona, en contraste con לֵב. «Espíritu» preserva el paralelismo antropológico.
- source_word: נְכֵאָה
  english_pob_choice: crushed
  chosen_spanish: abatido
  alternatives_spanish:
  - quebrantado
  - aplastado
  - desanimado
  lexicon: HALOT
  rationale: El adjetivo comunica estar golpeado o derribado. «Abatido» es una equivalencia idiomática en español que conserva la idea de un espíritu doblegado sin perder dignidad literaria.
- source_word: תְּיַבֶּשׁ
  english_pob_choice: dries up
  chosen_spanish: seca
  alternatives_spanish:
  - agota
  - marchita
  - hace secar
  lexicon: HALOT
  rationale: El verbo intensifica la acción de secar. «Seca» es directo, concreto y conserva la metáfora corporal.
- source_word: גָּרֶם
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - el hueso
  - la estructura ósea
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, en el refrán el español pide el plural colectivo. «Los huesos» mantiene la imagen corporal de manera natural.
translation_notes:
  revision_awareness: 'Se siguió el audito inglés: se conservó la oposición entre un corazón alegre que beneficia la sanidad y un espíritu abatido que seca los huesos. No hubo revisiones aplicadas en el registro inglés; por eso la redacción española mantiene el mismo alcance semántico y la misma tensión léxica principal alrededor de גֵּהָה.'
  spanish_consistency_notes:
  - Se prefirió «corazón» y «espíritu» para mantener el paralelismo antropológico de Proverbios.
  - Se eligió «sanidad» por su amplitud semántica y porque suena natural en español bíblico contemporáneo.
  - «Abatido» comunica mejor el estado de un espíritu doblegado que una traducción demasiado literal y pesada.
