revisions:
- from: Ahora Rebeca tenía un hermano[a], y su nombre era Labán; y Labán corrió hacia el hombre[b], fuera, junto a la fuente.
  to: Ahora Rebeca tenía un hermano, y su nombre era Labán; y Labán corrió afuera hacia el hombre[a], junto al manantial.
  rationale: 'Se revisa para mejorar la naturalidad del español sin perder ningún elemento del hebreo: «afuera» expresa הַחוּצָה; «hacia el hombre» conserva el movimiento de אֶל הָאִישׁ; «junto al manantial» resuelve de forma idiomática la relación espacial final y preserva mejor el valor léxico de עַיִן. Se elimina la nota innecesaria sobre «un hermano» y se conserva una sola nota útil para documentar la construcción alternativa más literal.'
