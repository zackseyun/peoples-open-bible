base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/023.yaml
  text: Then King Solomon swore by Yahweh[a], saying, “May God do so to me, and more also[b], for Adonijah has spoken this word against his own life.”
  footnotes:
