translation:
  language: es
  text: 'Los hijos de Salma: Belén, los netofatitas, Atrot-bet-joab, la mitad de los manahatitas[a], los zoritas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los menuhotitas» para «los manahatitas». El gentilicio hebreo es incierto en su asociación precisa con un lugar.
    reason: lexical_alternative
  - marker: b
    text: O «los zareatitas», es decir, personas asociadas con Zorá.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los clanes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede señalar descendientes o grupos familiares/clánicos. «Los hijos de» conserva el giro genealógico formal y es natural en español bíblico sin forzar una paráfrasis excesiva.
- source_word: שַׂלְמָא
  english_pob_choice: Salma
  chosen_spanish: Salma
  alternatives_spanish:
  - Salmá
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa. Se conserva «Salma» como forma breve y reconocible, acorde con el valor consonántico del hebreo y con la práctica de transliteración del registro.
- source_word: בֵּית לֶחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bet-lehem
  - Belén de Judá
  lexicon: HALOT
  rationale: En español, el topónimo establecido y más inteligible es «Belén». Aquí funciona como designación de grupo/topónimo en la lista genealógica, no como mera traducción lexical del sintagma «casa de pan».
- source_word: וּנְטוֹפָתִי
  english_pob_choice: the Netophathites
  chosen_spanish: los netofatitas
  alternatives_spanish:
  - los netofatititas
  - los habitantes de Netofa
  lexicon: HALOT
  rationale: El gentilicio se expresa mejor como grupo étnico/clánico. «Netofatitas» sigue la forma del gentilicio y evita convertirlo en un lugar aislado o en singular.
- source_word: עַטְרוֹת בֵּית יוֹאָב
  english_pob_choice: Atroth-beth-joab
  chosen_spanish: Atrot-bet-joab
  alternatives_spanish:
  - Atarot-bet-joab
  - Atrot, casa de Joab
  lexicon: HALOT
  rationale: Se preserva como nombre propio compuesto, sin desglosar su sentido léxico. «Atrot-bet-joab» mantiene la estructura del hebreo y la convención transliterada más transparente para el lector español.
- source_word: וַחֲצִי
  english_pob_choice: half of
  chosen_spanish: la mitad de
  alternatives_spanish:
  - y la mitad de
  - media parte de
  lexicon: HALOT
  rationale: «La mitad de» reproduce con claridad el valor cuantitativo del hebreo. En español, la conjunción inicial puede omitirse sin pérdida de sentido dentro de la enumeración, y la puntuación ya marca la continuidad de la lista.
- source_word: הַמָּנַחְתִּי
  english_pob_choice: the Manahathites
  chosen_spanish: los manahatitas
  alternatives_spanish:
  - los menuhotitas
  - los de Manahat
  lexicon: HALOT
  rationale: Se opta por el gentilicio más probable y transparente en español. La tradición textual admite incertidumbre sobre la asociación precisa del topónimo, por lo que se mantiene el valor de clan/grupo sin resolver en exceso la referencia.
- source_word: הַצָּרְעִי
  english_pob_choice: the Zorites
  chosen_spanish: los zoritas
  alternatives_spanish:
  - los zareatitas
  - los de Zorá
  lexicon: HALOT
  rationale: Se conserva el gentilicio como grupo ligado a un lugar. «Zoritas» refleja la opción breve del POB inglés y deja abierta la asociación geográfica tradicional con Zorá/Zarea.
translation_notes:
  revision_awareness: La versión española sigue de cerca el estado sin cambios del audit trail inglés (pass_count 1, unchanged true). No se introducen reajustes textuales ni se resuelven las incertidumbres léxicas que el POB ya documentó; solo se adaptan al español las mismas decisiones de transliteración y gentilicios, manteniendo las alternativas donde el inglés preservó ambigüedad.
  spanish_consistency_notes:
  - Se usa «Belén» como topónimo establecido en español, aunque el hebreo subyacente es literalmente «casa de pan».
  - Se mantiene el patrón de lista genealógica con artículos plurales en gentilicios («los netofatitas», «los manahatitas», «los zoritas»).
  - Los nombres compuestos se transliteran de forma consistente sin introducir traducción interpretativa del componente «casa de Joab».
