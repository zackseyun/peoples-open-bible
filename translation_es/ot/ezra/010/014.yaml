revisions:
- from: Por favor, que se pongan en pie nuestros jefes[a] delante de toda la asamblea, y que vengan, en tiempos señalados, todos los que en nuestras ciudades han tomado mujeres extranjeras, junto con ellos los ancianos de cada ciudad y sus jueces, hasta que el ardor de la ira de nuestro Dios sea apartado de nosotros en este asunto.
  to: Por favor, que nuestros líderes[a] representen a toda la asamblea, y que todos los que en nuestras ciudades han tomado esposas extranjeras[b] vengan en tiempos señalados, con ellos los ancianos de cada ciudad y sus jueces, hasta que la ardiente ira de nuestro Dios sea apartada de nosotros en este asunto.[c]
  rationale: 'Se corrigen dos puntos de fidelidad principales: el sentido representativo de לְכָל הַקָּהָל y el valor marital de נָשִׁים נָכְרִיּוֹת. Además, se mejora la naturalidad y el registro con ''líderes'', ''esposas extranjeras'' y ''la ardiente ira'', manteniendo el contenido del hebreo y las alternativas documentadas por el POB en notas.'
