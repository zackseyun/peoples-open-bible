source:
  edition: SBLGNT
  text: ὁ οὖν Ἰούδας λαβὼν τὴν σπεῖραν καὶ ἐκ τῶν ἀρχιερέων καὶ ⸂ἐκ τῶν⸃ Φαρισαίων ὑπηρέτας ἔρχεται ἐκεῖ μετὰ φανῶν καὶ λαμπάδων καὶ ὅπλων.
base_translation:
  language: en
  yaml_path: translation/nt/john/018/003.yaml
  text: So Judas[a], having taken the cohort and officers from the chief priests and from the Pharisees[b], comes there with lanterns and torches and weapons.
  footnotes:
  - marker: a
    text: Or 'detachment' or 'band of soldiers' for 'cohort' (σπεῖρα). The Greek term can refer to a military unit without requiring that the entire unit was present.
    reason: lexical_alternative
  - marker: b
    text: Or 'guards' or 'temple police' for 'officers' (ὑπηρέτας). The term refers to official attendants serving the Jewish authorities.
    reason: lexical_alternative
translation:
  language: ko
  text: 그래서 유다는 군대 한 부대와, 대제사장들과 바리새인들에게서 보낸 부하들을 데리고, 등불과 횃불과 무기를 가지고 그곳으로 왔습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「분견대」, 「병사대」. 헬라어 σπεῖρα는 군대 단위를 가리키며, 본 절은 전체 부대가 다 동원되었음을 요구하지는 않는다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「경비병」, 「성전 경찰」. 본 헬라어는 유대 당국에 속한 공식 수행원을 가리킨다.
    reason: lexical_alternative
