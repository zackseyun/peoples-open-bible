translation:
  language: es
  text: Como una subida arenosa bajo los pies de un anciano[c][b][a], así es una esposa de lengua áspera para un hombre apacible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo חוּץ es difícil aquí; el paralelo griego lee ''arenosa'', lo que probablemente conserva el sentido de la imagen: un paso inestable para un hombre anciano.'
    reason: textual_variant
  - marker: b
    text: O 'una esposa habladora'. El hebreo dice literalmente 'una esposa de lengua', y el griego tiene una mujer dada a la lengua.
    reason: lexical_alternative
  - marker: c
    text: O 'para un hombre tranquilo'. El griego usa un término que puede significar 'tranquilo' o 'pacífico'; se eligió 'apacible' por naturalidad en español y para reflejar mejor el contraste de carácter.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַעֲלֵה / ἀνάβασις
  english_pob_choice: Like an ascent
  chosen_spanish: Como una subida
  alternatives_spanish:
  - Como un ascenso
  - Como una cuesta
  - Como una subida cuesta arriba
  lexicon: HALOT; LXX ἀνάβασις
  rationale: El sustantivo denota una subida o camino ascendente. En español, 'subida' conserva la imagen física sin sonar forzado, y mantiene el paralelismo proverbial con la línea siguiente.
- source_word: חוּץ / ἀμμώδης
  english_pob_choice: sandy
  chosen_spanish: arenosa
  alternatives_spanish:
  - de arena
  - pedregosa
  - de terreno suelto
  lexicon: HALOT; LXX ἀμμώδης
  rationale: Aunque el hebreo es difícil, el paralelo griego apunta claramente a una superficie con arena. 'Arenosa' comunica bien la inestabilidad del terreno y evita una traducción demasiado explicativa.
- source_word: לְרַגְלֵי יָשִׁישׁ / ἐν ποσὶν πρεσβυτέρου
  english_pob_choice: under the feet of an old man
  chosen_spanish: bajo los pies de un anciano
  alternatives_spanish:
  - bajo los pies de un viejo
  - para los pies de un anciano
  - bajo los pasos de un anciano
  lexicon: HALOT; LXX πρεσβυτέρου
  rationale: '''Bajo los pies'' reproduce la imagen de apoyo y equilibrio peligroso. ''Anciano'' rinde adecuadamente el sentido de un hombre de edad avanzada sin convertirlo en título funcional.'
- source_word: אֵשֶׁת לָשׁוֹן / γυνὴ γλωσσώδης
  english_pob_choice: a sharp-tongued wife
  chosen_spanish: una esposa charlatana
  alternatives_spanish:
  - una esposa lenguaraz
  - una esposa de lengua
  - una esposa de lengua suelta
  lexicon: HALOT; LXX γλωσσώδης
  rationale: El hebreo dice literalmente 'mujer/esposa de lengua', y el griego expresa a una mujer dada a la lengua. 'Charlatana' es una opción española natural que refleja la idea de hablar mucho y de forma molesta, sin endurecer el texto más allá de lo que exige el proverbio. 'Lenguaraz' también sería posible, pero su tono puede ser más idiomático que neutral.
- source_word: לְאִישׁ רַךְ / ἀνδρὶ ἡσύχῳ
  english_pob_choice: to a gentle man
  chosen_spanish: para un hombre tranquilo
  alternatives_spanish:
  - para un hombre manso
  - para un hombre apacible
  - para un hombre callado
  lexicon: HALOT; LXX ἡσύχῳ
  rationale: El griego apunta a un hombre 'tranquilo/quieto' y el hebreo a alguien 'suave, tierno'. 'Tranquilo' comunica bien la disposición pacífica sin forzar una connotación de debilidad; 'manso' o 'apacible' serían opciones posibles, pero aquí 'tranquilo' mantiene mejor el contraste proverbístico.
theological_decisions:
- issue: Mantenimiento del paralelismo de género en el proverbio
  english_pob_reading: wife ... man
  chosen_spanish_reading: esposa ... hombre
  alternative_spanish_readings:
  - mujer ... esposo
  - cónyuge ... persona
  rationale: El hebreo y el griego usan formas marcadas por género; por eso se conserva la estructura 'esposa ... hombre'. Neutralizarla debilitaría la forma proverbial y el contraste social del dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el consenso alto del expediente auditado: el hebreo y el griego coinciden en la imagen de un terreno peligroso para un hombre anciano y en el contraste con una mujer dada a hablar mucho frente a un hombre de carácter quieto. No se introdujeron cambios revisionales respecto del pasaje base, y se mantuvieron las tres notas alternativas documentadas por la POB inglesa, adaptadas al español.'
  spanish_consistency_notes:
  - Se prefirió 'anciano' para יָשִׁישׁ / πρεσβυτέρου, evitando un título eclesiástico o un matiz de cargo.
  - '''Charlatana'' preserva el juicio negativo del proverbio sin añadir insulto sexual o moral no exigido por el texto.'
  - '''Tranquilo'' corresponde al valor de ἡσύχῳ y mantiene un contraste natural con ''charlatana''.'
  - Se conservaron las notas alternativas porque el hebreo presenta una dificultad textual y el griego ofrece una lectura aclaratoria.
