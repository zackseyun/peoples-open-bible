translation:
  language: es
  text: 'No dijeron en su corazón: «Temamos ahora a Yahvé nuestro Dios, que da la lluvia en su tiempo, la lluvia temprana[a] y la lluvia tardía, y que nos guarda las semanas fijadas para la cosecha».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la lluvia de otoño y la lluvia de primavera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא אָמְרוּ
  english_pob_choice: They did not say
  chosen_spanish: No dijeron
  alternatives_spanish:
  - Y no dijeron
  lexicon: HALOT
  rationale: La negación con verbo de acción se expresa de forma natural en español con «No dijeron». Se omite «y» por fluidez, sin perder el valor narrativo de introducción de la acusación.
- source_word: בִלְבָבָם
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí mismos
  - en sus corazones
  lexicon: HALOT
  rationale: Se conserva el hebraísmo del singular colectivo con «corazón», que en español comunica bien la interioridad. El singular mantiene mejor el eco del original que una paráfrasis reflexiva.
- source_word: נִירָא נָא
  english_pob_choice: Let us now fear
  chosen_spanish: Temamos ahora
  alternatives_spanish:
  - Temamos, por favor
  - Debemos temer ahora
  lexicon: HALOT
  rationale: El cohortativo exhortativo se vierte con un subjuntivo exhortativo natural en español. «Ahora» reproduce la urgencia de נָא sin introducir una cortesía ajena al contexto.
- source_word: אֶת יְהוָה אֱלֹהֵינוּ
  english_pob_choice: Yahweh our God
  chosen_spanish: a Yahvé, nuestro Dios
  alternatives_spanish:
  - a Yahvé nuestro Dios
  - al Señor, nuestro Dios
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se usa «Yahvé» conforme a la política del proyecto para el Tetragrama. Se mantiene el vocativo relacional «nuestro Dios» para conservar el tono pactal del texto.
- source_word: הַנֹּתֵן
  english_pob_choice: who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - quien da
  - el que concede
  lexicon: HALOT
  rationale: El participio atributivo se traduce con una relativa directa y natural. «Da» es el verbo más simple y preciso para la provisión de lluvia.
- source_word: גֶּשֶׁם
  english_pob_choice: rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - lluvia
  - el aguacero
  lexicon: HALOT
  rationale: «Lluvia» es el equivalente general y claro para גֶּשֶׁם. Se mantiene el artículo por la estructura española.
- source_word: וְיוֹרֶה
  english_pob_choice: the early rain
  chosen_spanish: la lluvia temprana
  alternatives_spanish:
  - la lluvia de otoño
  - la lluvia temprana
  lexicon: HALOT
  rationale: Se preserva la ambigüedad agrícola con una traducción transparente. «Temprana» refleja el valor temporal y permite la nota alternativa tradicional sin imponer una calendarización específica en el texto principal.
- source_word: וּמַלְקוֹשׁ
  english_pob_choice: the latter rain
  chosen_spanish: la lluvia tardía
  alternatives_spanish:
  - la lluvia de primavera
  - la lluvia tardía
  lexicon: HALOT
  rationale: «Tardía» mantiene la pareja léxica con «temprana» y respeta la relación semántica del hebreo. Es suficientemente clara para el lector moderno.
- source_word: בְּעִתּוֹ
  english_pob_choice: in its season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en su estación
  lexicon: HALOT
  rationale: La frase se coloca con la lluvia, siguiendo el ajuste revisado en el audit trail. «En su tiempo» es idiomático en español y conserva el sentido de momento apropiado o designado.
- source_word: שְׁבֻעוֹת חֻקּוֹת קָצִיר
  english_pob_choice: the appointed weeks of the harvest
  chosen_spanish: las semanas establecidas de la cosecha
  alternatives_spanish:
  - las semanas fijadas para la cosecha
  - las semanas decretadas de la cosecha
  lexicon: HALOT
  rationale: La secuencia constructa se vierte de manera directa para conservar la idea de un período marcado/ordenado. «Establecidas» comunica bien la fijación normativa sin sobrecargar con lenguaje técnico.
- source_word: יִשְׁמָר לָנוּ
  english_pob_choice: who keeps for us
  chosen_spanish: el que guarda para nosotros
  alternatives_spanish:
  - el que preserva para nosotros
  - el que reserva para nosotros
  lexicon: HALOT
  rationale: שׁמר se entiende aquí como conservar o guardar para uso futuro. «Guarda para nosotros» mantiene la continuidad de la descripción divina y su sentido de provisión reservada.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera explícita. Conforme a la política del proyecto, se traduce con «Yahvé» para preservar el nombre del pacto y no ocultarlo tras un título. Esto también evita mezclar el nombre divino con la palabra común «señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de יוֹרֶה y מַלְקוֹשׁ
  english_pob_reading: the early rain / the latter rain
  chosen_spanish_reading: la lluvia temprana / la lluvia tardía
  alternative_spanish_readings:
  - la lluvia de otoño / la lluvia de primavera
  - la lluvia temprana / la lluvia tardía
  rationale: En español conviene conservar el paralelismo del hebreo sin fijar dogmáticamente una identificación estacional que el contexto no exige. La nota alternativa preserva la lectura tradicional agraria sin convertirla en el sentido principal.
  doctrine_reference: Uso lexical agrícola del AT; sin implicación doctrinal directa
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del audit trail: «en su tiempo» modifica a «la lluvia», no a toda la cláusula. Además, se mantuvo el paralelismo agrícola de יוֹרֶה / מַלְקוֹשׁ con una traducción principal transparente y una alternativa estacional en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se conserva «corazón» como sede interior, en singular colectivo, siguiendo el hebreo.
  - «Temamos ahora» refleja un exhortativo colectivo, no una mera recomendación.
  - La nota de pie de página cubre la alternativa estacional para la pareja de lluvias.
  - «En su tiempo» se vincula explícitamente con «la lluvia», conforme a la revisión del inglés POB.
