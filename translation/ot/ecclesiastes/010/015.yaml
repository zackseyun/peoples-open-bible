id: ECC.10.15
reference: Ecclesiastes 10:15
source:
  edition: WLC
  text: עֲמַ֥ל הַ/כְּסִילִ֖ים תְּיַגְּעֶ֑/נּוּ אֲשֶׁ֥ר לֹֽא יָדַ֖ע לָ/לֶ֥כֶת אֶל עִֽיר־־׃
translation:
  text: The labor of fools wearies them[a], for he does not know how to go to the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The toil of fools wears them out, for they do not know the way to the city.' The Hebrew suffixes and relative clause permit a more collective sense, but the singular 'him who does not know' follows the most straightforward grammatical linkage.
    reason: alternative_reading
lexical_decisions:
- source_word: עֲמַל
  chosen: labor
  alternatives:
  - toil
  - trouble
  lexicon: HALOT
  rationale: The noun denotes toil or laborious effort. 'Labor' preserves the concrete sense of exertion without overinterpreting it as mere 'trouble.'
- source_word: הַכְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  - stupid people
  lexicon: HALOT
  rationale: כְּסִיל in Wisdom literature is a moral-intellectual category, conventionally and accurately rendered 'fool.' The plural is retained.
- source_word: תְּיַגְּעֶנּוּ
  chosen: wearies him
  alternatives:
  - wears him out
  - exhausts him
  lexicon: HALOT
  rationale: From יגע in the Piel, 'to weary, exhaust.' The 3fs verb agrees with the feminine subject עמל, and the 3ms suffix gives 'him.' 'Wearies him' is natural English and preserves the singular object.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: Here the relative particle introduces a clause describing the singular object suffix in תְּיַגְּעֶנּוּ. 'Who' fits the personal referent in English.
- source_word: לֹא יָדַע
  chosen: does not know
  alternatives:
  - has not known
  - doesn't understand
  lexicon: HALOT
  rationale: 'Although the Hebrew form is qatal, in this proverbial context English present sense is most natural: a characteristic lack of knowledge, not merely a past event.'
- source_word: לָלֶכֶת
  chosen: how to go
  alternatives:
  - to walk
  - how to make his way
  lexicon: HALOT
  rationale: הלך commonly means 'go, walk.' With ידע plus infinitive, the idiom is 'know how to go' or 'know how to make one's way.' The simpler rendering stays closer to the Hebrew.
- source_word: אֶל עִיר
  chosen: to a city
  alternatives:
  - to town
  - into a city
  lexicon: HALOT
  rationale: The phrase is indefinite in Hebrew. 'To a city' preserves the proverbial, generic force better than specifying 'the city' or using the more colloquial 'town.'
