translation:
  language: es
  text: los tocados[a], las cadenillas de tobillo, las fajas, las cajas de perfume[b] y los amuletos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adornos para la cabeza»; el hebreo designa ornamentos o cubiertas de la cabeza.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «casas del alma/vida»; probablemente pequeños recipientes para perfume o sustancias aromáticas.
    reason: lexical_alternative
  - marker: c
    text: O «encantos»; el término hebreo se relaciona con susurros o encantamientos, por lo que puede referirse a amuletos asociados con fórmulas mágicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּאֵרִים
  english_pob_choice: the headdresses
  chosen_spanish: los tocados
  alternatives_spanish:
  - los adornos para la cabeza
  - los turbantes
  lexicon: HALOT
  rationale: פְּאֵרִים designa adorno u ornamento de la cabeza. En español, «tocados» conserva el valor de prenda ornamental sin concretar indebidamente la forma exacta del adorno, y encaja bien con la lista de joyas y accesorios.
- source_word: הַצְּעָדוֹת
  english_pob_choice: the ankle chains
  chosen_spanish: las cadenillas para los tobillos
  alternatives_spanish:
  - los tobilleras
  - las cadenillas de los tobillos
  lexicon: HALOT
  rationale: El término se relaciona con el paso/marcha y aquí probablemente nombra adornos llevados en los tobillos o pies. «Cadenillas para los tobillos» mantiene la idea de cadena y el lugar de uso con un español natural y claro.
- source_word: הַקִּשֻּׁרִים
  english_pob_choice: the sashes
  chosen_spanish: las fajas
  alternatives_spanish:
  - los cinturones
  - las bandas
  lexicon: HALOT
  rationale: De una raíz vinculada con atar o ceñir, el término apunta a un elemento de vestir que sujeta o adorna. «Fajas» es una opción castellana amplia y digna, sin forzar la imagen hacia una prenda demasiado específica.
- source_word: בָּתֵּי הַנֶּפֶשׁ
  english_pob_choice: the perfume boxes
  chosen_spanish: las cajas de perfumes
  alternatives_spanish:
  - los frascos de perfume
  - las casas del alma
  lexicon: HALOT
  rationale: La expresión literal «casas del alma/vida» es oscura en español y, en este catálogo de adornos, el sentido probable es el de pequeños recipientes para perfumes o sustancias aromáticas. «Cajas de perfumes» comunica el referente con naturalidad, manteniendo el carácter de objeto tangible.
- source_word: הַלְּחָשִׁים
  english_pob_choice: the amulets
  chosen_spanish: los amuletos
  alternatives_spanish:
  - los talismanes
  - los encantamientos
  lexicon: HALOT
  rationale: El sustantivo está emparentado con el susurrar o las fórmulas de encantamiento, por lo que puede aludir a objetos ligados a prácticas mágicas. «Amuletos» conserva la concreción del objeto y su asociación supersticiosa, en línea con la decisión inglesa.
theological_decisions:
- issue: Connotación de prácticas ocultas en לְחָשִׁים
  english_pob_reading: Rendered as 'amulets' in the main text, with a note that the Hebrew term relates to whispering or incantation.
  chosen_spanish_reading: «amuletos» en el texto principal, con nota que advierte la relación con susurro o encantamiento.
  alternative_spanish_readings:
  - los talismanes
  - los encantamientos
  rationale: El verso enumera objetos de adorno retirados en juicio; por eso conviene mantener un sustantivo concreto. La nota preserva la tensión semántica del hebreo sin convertir el elemento en una acción verbal ni suavizar su posible vínculo con la magia.
  doctrine_reference: Preservar tensión léxica y teológica documentada; no resolverla por paráfrasis.
translation_notes:
  revision_awareness: La versión española sigue el estado revisado más reciente sin cambios sustanciales respecto del audit trail inglés; se mantuvo la lectura óptima-equivalente para una lista de adornos concretos, preservando la posible carga de incantación en לְחָשִׁים y explicando la expresión oscura de בָּתֵּי הַנֶּפֶשׁ en nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se prefirieron sustantivos concretos para una lista de objetos, coherentes con el contexto de Isaías 3:20.
  - Se mantuvo un registro neutral y publicable, sin arcaísmos innecesarios.
