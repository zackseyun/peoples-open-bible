revisions:
- from: El rey negoció más con los de Bet-sur[a], dio y recibió garantías de buena fe, y se fue[b].
  to: El rey siguió negociando con los de Bethsura, dio y recibió garantías de buena fe[a], y se fue[b].
  rationale: 'Se corrige la alineación con el expediente inglés y con el griego: se adopta “Bethsura” como forma principal del topónimo, se mueve la nota del modismo de la diestra a la frase correcta, y se conserva la alternativa del lugar en una nota separada. También se mejora levemente la naturalidad de ἐδευτερολόγησεν con “siguió negociando”.'
