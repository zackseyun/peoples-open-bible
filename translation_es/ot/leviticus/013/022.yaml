    text: Or 'declare him unclean.' The Hebrew verb can be rendered either way in priestly legal contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'a disease,' 'a plague,' or 'an infected spot.' The Hebrew term is broad and does not map neatly onto a modern medical category.
    reason: lexical_alternative
