translation:
  language: es
  text: Entonces el rey Joram volvió a Jezreel para recuperarse de las heridas[a] que los arameos[b] le habían causado en Ramá, cuando peleó contra Hazael, rey de Aram. Y Ocozías, hijo de Joram, rey de Judá, bajó para ver[c] a Joram, hijo de Acab, en Jezreel, porque estaba enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los golpes»; el hebreo dice literalmente «de los golpes/heridas».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «arameos»; tradicionalmente «sirios».
    reason: lexical_alternative
  - marker: c
    text: O «para visitar a Joram». El hebreo literalmente dice «para ver a Joram».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de שוב expresa regreso en secuencia; «volvió» suena natural en español y conserva el movimiento de retorno a Jezreel.
- source_word: לְהִתְרַפֵּא
  english_pob_choice: to recover
  chosen_spanish: para recuperarse
  alternatives_spanish:
  - para ser sanado
  - para sanar
  lexicon: HALOT
  rationale: El hitpael de רפא puede ser ‘sanarse’ o ‘recuperarse’; aquí el contexto de convalecencia tras heridas hace más natural «recuperarse» sin implicar auto-sanación.
- source_word: מִן הַמַּכִּים
  english_pob_choice: from the wounds
  chosen_spanish: de las heridas
  alternatives_spanish:
  - de los golpes
  - de las lesiones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘de los golpes’, el contexto militar-médico apunta al resultado sufrido. «Heridas» comunica con claridad el efecto sin perder la fuerza física del término.
- source_word: אֲשֶׁר יַכֻּהוּ אֲרַמִּים
  english_pob_choice: that the Arameans had inflicted on him
  chosen_spanish: que los arameos le habían causado
  alternatives_spanish:
  - que los arameos le habían dado
  - que los arameos le habían asestado
  lexicon: HALOT
  rationale: El causativo hebreo explica el origen de las heridas. «Causado» expresa bien la relación de agencia sin volver la frase torpe en español.
- source_word: בָּרָמָה
  english_pob_choice: at Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en Ramah
  lexicon: HALOT
  rationale: El topónimo se adapta a la forma castellana habitual «Ramá». La preposición ב puede ser ‘en’ o ‘a’; aquí ‘en’ funciona con naturalidad para ubicar el combate.
- source_word: בְּהִלָּחֲמוֹ
  english_pob_choice: when he fought
  chosen_spanish: cuando peleó
  alternatives_spanish:
  - mientras peleaba
  - al pelear
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. «Cuando peleó» reproduce la relación narrativa de forma clara y breve.
- source_word: אֶת חֲזָהאֵל מֶלֶךְ אֲרָם
  english_pob_choice: against Hazael king of Aram
  chosen_spanish: contra Hazael, rey de Aram
  alternatives_spanish:
  - con Hazael, rey de Aram
  - ante Hazael, rey de Aram
  lexicon: HALOT
  rationale: Con הלחם, el español requiere la preposición «contra» para expresar lucha opositiva. «Rey de Aram» mantiene el designador nacional del original.
- source_word: וַאֲחַזְיָהוּ...יָרַד
  english_pob_choice: And Ahaziah...went down
  chosen_spanish: Y Ocozías...bajó
  alternatives_spanish:
  - Y Ocozías...descendió
  - Entonces Ocozías...bajó
  lexicon: HALOT
  rationale: ירד conserva el matiz direccional. «Bajó» respeta el movimiento desde Judá/Jerusalén hacia Jezreel y suena natural en español bíblico contemporáneo.
- source_word: לִרְאוֹת אֶת יוֹרָם
  english_pob_choice: to see Yoram
  chosen_spanish: para ver a Joram
  alternatives_spanish:
  - para visitar a Joram
  - para ir a ver a Joram
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘ver’; en contexto implica una visita, pero «para ver» conserva la literalidad que el POB inglés preservó, sin forzar una paráfrasis.
- source_word: כִּי חֹלֶה הוּא
  english_pob_choice: because he was sick
  chosen_spanish: porque estaba enfermo
  alternatives_spanish:
  - porque estaba sick
  - porque estaba mal
  lexicon: HALOT
  rationale: חֹלֶה designa enfermedad/estar enfermo. «Estaba enfermo» es la equivalencia natural en español para el estado presente descrito por el hebreo.
theological_decisions:
