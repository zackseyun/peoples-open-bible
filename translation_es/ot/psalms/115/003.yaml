translation:
  language: es
  text: Pero nuestro Dios está en los cielos[a]; hace todo lo que quiere[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en los cielos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hace todo lo que dispone».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֵאלֹהֵינוּ
  english_pob_choice: But our God
  chosen_spanish: Pero nuestro Dios
  alternatives_spanish:
  - Y nuestro Dios
  - Sin embargo, nuestro Dios
  lexicon: HALOT
  rationale: El ו inicial funciona con matiz adversativo en el contexto inmediato frente a los ídolos; por eso 'Pero' comunica mejor el contraste que una simple copulativa. אֱלֹהֵינוּ se vierte naturalmente como 'nuestro Dios'.
- source_word: בַשָּׁמַיִם
  english_pob_choice: is in the heavens
  chosen_spanish: está en los cielos
  alternatives_spanish:
  - está en el cielo
  - está en los cielos
  lexicon: HALOT
  rationale: El hebreo plural שָׁמַיִם se refleja mejor con 'los cielos'. 'Está' expresa la localización en español sin forzar una traducción más teológica que el texto.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todas las cosas que
  lexicon: HALOT
  rationale: La construcción hebrea introduce alcance total; en español 'todo lo que' es la forma más natural y fiel para esa amplitud.
- source_word: חָפֵץ
  english_pob_choice: he pleases
  chosen_spanish: quiere
  alternatives_spanish:
  - le agrada
  - desea
  - le place
  lexicon: HALOT
  rationale: חפץ abarca querer, deleitarse y desear. En este contexto de soberanía divina, 'quiere' mantiene la fuerza volitiva sin suavizarla ni convertirla en un término técnico ajeno al español bíblico.
- source_word: עָשָׂה
  english_pob_choice: he does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  - actúa
  lexicon: HALOT
  rationale: El verbo qal en presente gnómico comunica acción efectiva y habitual de Dios; 'hace' es la opción más directa y transparente en español.
theological_decisions:
- issue: Soberanía divina y fuerza de חפץ
  english_pob_reading: he does all that he pleases
  chosen_spanish_reading: hace todo lo que quiere
  alternative_spanish_readings:
  - hace todo lo que le agrada
  - hace todo lo que desea
  - hace todo lo que decide
  rationale: La frase afirma la libertad y eficacia de Dios frente a los ídolos. 'Quiere' conserva el componente volitivo de חפץ sin atarlo a una formulación doctrinal más estrecha que la del hebreo.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; se mantiene la lectura adversativa inicial, el plural hebreo 'los cielos' y la fuerza volitiva de חפץ en una formulación española natural.
  spanish_consistency_notes:
  - Se usa 'Dios' de manera consistente para אֱלֹהִים.
  - Se mantiene 'los cielos' para reflejar el plural hebreo שָׁמַיִם.
  - No se introduce 'Señor' ni un sustituto tradicional que oculte el nombre divino, porque aquí el término fuente es אֱלֹהֵינוּ.
  - La elección 'quiere' preserva el matiz de voluntad/placer sin perder legibilidad en español.
