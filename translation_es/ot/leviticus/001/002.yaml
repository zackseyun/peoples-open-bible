revisions:
- from: 'Habla a los hijos de Israel y diles: Cuando un hombre de entre ustedes presente una ofrenda[a] a Yahvé[b], ustedes presentarán su ofrenda de entre el ganado: del vacuno o del rebaño.'
  to: 'Habla a los hijos de Israel[a] y diles: Cuando un hombre[b] de entre ustedes traiga una ofrenda a Yahvé, ustedes traerán su ofrenda de entre el ganado: del vacuno o del rebaño.'
  rationale: 'Se corrige el texto para alinearlo mejor con el hebreo y con el rastro léxico-teológico del POB: se mantiene ''hijos de Israel'' y ''un hombre'', se cambia el verbo a ''traiga/traerán'' para reflejar mejor יקריב/תקריבו, y se eliminan notas no justificadas sobre ''sacrificio'' y ''Yahweh''. Se conservan solo las notas léxicas significativas que el expediente inglés también preserva para los masculinos representativos.'
