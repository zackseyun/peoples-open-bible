translation:
  language: es
  text: Quita al malvado[a] de delante del rey, y su trono quedará afirmado[b] en justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Aparta al malvado de delante del rey». El imperativo probablemente tiene el sentido de quitar la influencia corrupta de la corte real.'
    reason: lexical_alternative
  - marker: b
    text: «En justicia» también puede traducirse «en rectitud» o «por justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָגוֹ
  english_pob_choice: Remove
  chosen_spanish: Quita
  alternatives_spanish:
  - Remueve
  - Aparta
  - Quita de en medio
  lexicon: HALOT
  rationale: El imperativo hebreo pide apartar o retirar a alguien de la escena. «Quita» expresa bien la acción de remover y resulta natural en español bíblico contemporáneo sin volverlo más fuerte de lo que el texto exige.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el malo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo funciona de manera sustantiva para una persona concreta. «El malvado» mantiene esa fuerza personal y evita neutralizarlo en una abstracción.
- source_word: לִפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - de ante
  - de frente a
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática en contexto de corte. «De delante de» conserva la imagen espacial y la relación de presencia ante el rey.
- source_word: מֶלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: HALOT
  rationale: El proverbio usa figura real genérica, pero en español el artículo definido suena natural y refleja el valor proverbial del enunciado.
- source_word: וְיִכּוֹן
  english_pob_choice: will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - se afirmará
  - será firme
  - quedará establecido
  lexicon: HALOT
  rationale: El nifal comunica quedar firme o ser establecido. «Será establecido» preserva la pasividad/resultatividad y la formulación proverbial.
- source_word: בַּצֶּדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - por justicia
  - por rectitud
  lexicon: HALOT
  rationale: Aquí צֶדֶק puede referirse al ámbito o cualidad de justicia en sentido judicial/moral. «En justicia» mantiene el vínculo con la esfera recta del gobierno; «rectitud» es posible, pero menos natural en este contexto de trono y rey.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - el trono de él
  - su silla real
  lexicon: HALOT
  rationale: El sufijo posesivo remite al rey. «Su trono» es la manera más clara y fiel de expresar el posesivo en español.
theological_decisions:
- issue: צֶדֶק aplicado al trono real
  english_pob_reading: '''In righteousness'' could also be rendered ''in justice'' or ''by righteousness.'''
  chosen_spanish_reading: «en justicia»
  alternative_spanish_readings:
  - «en rectitud»
  - «por justicia»
  - «por rectitud»
  rationale: No se debe borrar la tensión entre justicia como cualidad moral y justicia como orden judicial del rey. «En justicia» deja abierto el matiz de esfera/criterio por el cual el trono queda firme.
  doctrine_reference: sabiduría real; justicia de gobierno
- issue: Relación entre el mandato de remover al malvado y la estabilidad del trono
  english_pob_reading: The imperative likely has the sense of removing corrupt influence from the royal court.
  chosen_spanish_reading: Quitar al malvado de delante del rey para que el trono quede firme
  alternative_spanish_readings:
  - expulsar al malvado
  - alejar la influencia corrupta de la corte
  rationale: La versión española mantiene el vínculo causal implícito sin explicitarlo demasiado. No añade una explicación interpretativa al cuerpo del texto, pero la deja visible en la nota.
  doctrine_reference: sabiduría ética y política; gobierno justo
translation_notes:
  revision_awareness: La base inglesa revisó «the wicked man» a «the wicked» para reflejar que el hebreo dice un singular sustantivado sin añadir «man». La redacción española sigue ese ajuste y evita introducir «hombre»; además conserva la nota de variante léxica sobre la fuerza del imperativo y sobre בַּצֶּדֶק.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar, pero este versículo no la contiene.
  - «Justicia» se eligió como equivalente principal de צֶדֶק; no se sustituyó por «rectitud» en el texto principal para mantener naturalidad en español.
  - 'El posesivo se mantuvo explícito: «su trono».'
  - No se añadió «hombre» tras «malvado» para respetar el singular sustantivado del hebreo.
