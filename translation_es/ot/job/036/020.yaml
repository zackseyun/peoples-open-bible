translation:
  language: es
  text: No anheles la noche[a], cuando los pueblos son arrancados de su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No anheles la noche, para que los pueblos suban debajo de ellos». El hebreo es difícil; «son arrancados de su lugar» refleja una comprensión contextual común.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No vayas a
  - Nunca
  lexicon: HALOT
  rationale: אַ ל con imperfecto expresa prohibición; en español, la negación simple antes del imperativo/jussivo comunica de manera natural esa fuerza exhortativa sin añadir matices no sustentados.
- source_word: תִּשְׁאַף
  english_pob_choice: long for
  chosen_spanish: anheles
  alternatives_spanish:
  - desees
  - suspíres por
  - codicies
  lexicon: HALOT
  rationale: El verbo puede expresar respirar jadeando o un deseo intenso. En este contexto, con "la noche" como objeto, "anhelar" conserva la idea de deseo intenso y suena natural en español bíblico contemporáneo.
- source_word: הַלָּיְלָה
  english_pob_choice: the night
  chosen_spanish: la noche
  alternatives_spanish:
  - la noche misma
  - la oscuridad de la noche
  lexicon: HALOT
  rationale: El sustantivo definido se vierte de forma directa y transparente como "la noche".
- source_word: לַעֲלוֹת
  english_pob_choice: when ... are taken away
  chosen_spanish: cuando ... son quitados
  alternatives_spanish:
  - cuando ... suben
  - para que ... suban
  - cuando ... son llevados
  lexicon: HALOT
  rationale: 'La construcción infinitiva es difícil. Siguiendo la lectura contextual reflejada en el POB inglés, se expresa con pasiva temporal: "cuando ... son quitados", que comunica la remoción de los pueblos sin forzar una literalidad opaca.'
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos enteros
  lexicon: HALOT
  rationale: El plural apunta a grupos étnicos o colectivos; "los pueblos" preserva bien ese matiz plural y corporativo en español.
- source_word: תַּחְתָּם
  english_pob_choice: from their place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de debajo de ellos
  - de su posición
  - desde su sitio
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente sugiere "debajo de ellos", el uso idiomático aquí parece referirse a ser removidos de su lugar. "De su lugar" reproduce la comprensión contextual adoptada por el POB inglés sin perder claridad.
translation_notes:
  revision_awareness: El borrador sigue la lectura ya validada por el POB inglés (sin cambios en la revisión más reciente) y mantiene la misma resolución contextual de la construcción hebrea difícil en לַעֲלוֹת עַמִּים תַּחְתָּם.
  spanish_consistency_notes:
  - Se preservó el tono de prohibición breve y directo.
  - Se evitó "SEÑOR" u otra terminología no presente; el verso no contiene referencias divinas explícitas.
  - '"Los pueblos" mantiene el plural colectivo de עַמִּים.'
  - La nota de pie conserva la alternativa literal difícil para no borrar la tensión lexical del hebreo.
