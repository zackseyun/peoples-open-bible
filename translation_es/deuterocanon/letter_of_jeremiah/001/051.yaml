review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: Τίνι οὖν γνωστὸν ἐστὶν ὅτι οὐκ εἰσὶν θεοί se refleja correctamente en la estructura interrogativa, el valor continuativo de οὖν y la negación ''no son dioses''. Sin embargo, ''le es conocido'' suena poco natural en español actual para esta construcción impersonal.'
  spanish_quality_summary: La frase es comprensible, pero '¿A quién, pues, le es conocido...?' resulta rígida y algo calcada. '¿A quién, pues, le es sabido...?' tampoco sería ideal; la opción más natural y fiel es '¿Quién, pues, sabe que no son dioses?' con nota para la alternativa más literal, o bien '¿A quién, pues, le consta...?' pero esta última desplaza el matiz semántico. Conviene mejorar la legibilidad sin perder el sentido.
  glossary_alignment: No hay conflicto con la terminología del proyecto. θεοί = 'dioses' está bien preservado. No aparecen términos sensibles del glosario principal como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: Construcción 'le es conocido' poco idiomática
    rationale: Aunque formalmente posible, en español bíblico actual suena forzada y menos natural que una formulación interrogativa directa. El inglés POB ya documenta una alternativa idiomática ('Who then knows...'), y el español se beneficia de adoptar esa forma en el texto principal.
  - severity: low
    issue: Falta de nota para preservar la alternativa más literal
    rationale: 'Dado que el POB inglés conserva en nota la formulación más idiomática frente a la literal, aquí conviene hacer lo inverso: usar el español más natural en el texto y conservar en nota la alternativa más literal ''¿A quién... le es conocido...?'' para transparentar la sintaxis griega.'
  revised_spanish_text: ¿Quién, pues, sabe[a] que no son dioses?
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «¿A quién, pues, le es conocido que no son dioses?»'
    reason: lexical_alternative
  revision_rationale: Se adopta una formulación española más natural para la construcción impersonal griega, sin alterar el sentido. La nota preserva la opción más literal y mantiene visible la sintaxis del original.
