translation:
  language: es
  text: Los justos heredarán la tierra y habitarán en ella para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra». El hebreo אֶרֶץ puede significar tanto «tierra» como «tierra» en sentido más amplio; aquí «la tierra» encaja con el lenguaje repetido del Salmo 37 sobre heredar la tierra.
    reason: alternative_reading
lexical_decisions:
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos (como grupo)
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente para designar a un grupo. En español, «los justos» es natural, mantiene el sentido moral y evita la rareza de una forma como «los justos» explicada o «los rectos», que puede sonar más técnico o menos bíblico en este contexto.
- source_word: יִירְשׁוּ
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán posesión de
  lexicon: HALOT
  rationale: El verbo ירשׁ puede significar heredar o tomar posesión. «Heredarán» conserva la fuerza promesal y pactal del texto en el Salmo 37, y es idiomático en español bíblico sin perder el matiz de recepción de una herencia.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la tierra / la tierra
  lexicon: HALOT
  rationale: En español, «tierra» puede abarcar el campo semántico de אֶרֶץ tanto como «land» en inglés. Dado que el POB inglés prefirió «the land» por el contexto repetido de herencia en el salmo, «la tierra» comunica bien el referente sin forzar una paráfrasis. La posible lectura amplia «la tierra» se conserva en la nota.
- source_word: וְיִשְׁכְּנוּ
  english_pob_choice: and dwell
  chosen_spanish: y habitarán
  alternatives_spanish:
  - y morarán
  - y residirán
  lexicon: HALOT
  rationale: שׁכן expresa morar o habitar con permanencia. «Habitarán» suena natural y solemne en español bíblico, y mantiene la idea de residencia estable que el verso enlaza con «para siempre».
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La locución denota duración continua. «Para siempre» es clara, bíblica y plenamente natural en español, preservando el énfasis de permanencia.
- source_word: עָלֶיהָ
  english_pob_choice: on it
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - en la tierra
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a «la tierra». En español, con un verbo de permanencia, «habitar en ella» expresa con naturalidad el sentido locativo de על sin sonar rígido. Aunque el inglés dice «on it», el español exige una preposición más idiomática para residencia estable.
theological_decisions:
- issue: Alcance de אֶרֶץ en una promesa de herencia
  english_pob_reading: the land, with a footnote allowing 'the earth'
  chosen_spanish_reading: la tierra, con nota que admite «la tierra» en sentido más amplio
  alternative_spanish_readings:
  - la tierra
  - el mundo
  rationale: El contexto inmediato del Salmo 37 repite el lenguaje de heredar la tierra, por lo que la lectura principal debe mantenerse concreta. A la vez, como אֶרֶץ puede abarcar un sentido más amplio, la nota preserva esa tensión sin resolverla dogmáticamente. En español, «la tierra» cubre ambos valores mejor que una formulación más interpretativa.
  doctrine_reference: Preservar la tensión semántica documentada; no neutralizar la promesa ni expandirla sin base textual.
translation_notes:
  revision_awareness: 'Se siguió la pauta de revisión más reciente sin cambios sustanciales: el texto inglés mantiene «the land» y la nota alternativa «the earth». La versión española conserva esa tensión con una formulación natural y auditable, sin introducir lecturas doctrinales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «justos» como sustantivo colectivo para reflejar el hebreo plural adjetival.
  - «Heredarán» conserva la fuerza de promesa y herencia del verbo ירשׁ.
  - «La tierra» se usa de manera consistente con el campo semántico de אֶרֶץ en este salmo.
  - «Habitarán en ella» evita calcar «sobre ella» y suena natural en español, sin perder la referencia local.
  - La nota al pie preserva la alternativa semántica documentada por el texto fuente y el audit trail inglés.
