translation:
  language: es
  text: Entonces Josué[a] y todo el pueblo de guerra con él vinieron contra ellos de repente, junto a las aguas de Merom, y cayeron sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el pueblo guerrero», tradicionalmente «los hombres de guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - avanzó
  lexicon: HALOT
  rationale: En este contexto de movimiento hostil hacia el enemigo, «vino contra ellos» comunica bien la dirección del ataque sin perder la naturalidad del español narrativo. «Llegó» sería más neutro y «avanzó» más interpretativo.
- source_word: עַם הַמִּלְחָמָה
  english_pob_choice: the people of war
  chosen_spanish: todo el pueblo de guerra
  alternatives_spanish:
  - todo el pueblo guerrero
  - todo el ejército
  - todos los hombres de guerra
  lexicon: HALOT
  rationale: Se conserva el valor colectivo de עַם y la construcción literal de «la guerra» en aposición. «Pueblo de guerra» es menos idiomático que «ejército», pero mantiene mejor la fuerza léxica sin introducir una equivalencia demasiado interpretativa.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sufijo pronominal con preposición de acompañamiento.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  lexicon: HALOT
  rationale: En un contexto militar, על con verbo de movimiento expresa hostilidad dirigida hacia el enemigo; «contra ellos» es la forma española más clara y fiel.
- source_word: עַל מֵי מֵרוֹם
  english_pob_choice: at the waters of Merom
  chosen_spanish: junto a las aguas de Merom
  alternatives_spanish:
  - en las aguas de Merom
  - a las aguas de Merom
  lexicon: HALOT
  rationale: La expresión señala localización cercana al cuerpo de agua. «Junto a» conserva la referencia espacial sin sugerir que se movieron literalmente sobre el agua.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - inesperadamente
  lexicon: HALOT
  rationale: «De repente» es idiomático en español y preserva la abrupta irrupción del ataque.
- source_word: וַיִּפְּלוּ בָּהֶם
  english_pob_choice: fell upon them
  chosen_spanish: cayó sobre ellos
  alternatives_spanish:
  - cayeron sobre ellos
  - se abalanzó sobre ellos
  lexicon: HALOT
  rationale: El hebreo usa el plural, pero en español el sujeto colectivo «todo el pueblo de guerra» puede tratarse como singular colectivo en una construcción estilística natural; aun así, se conserva la imagen de asalto con «cayó sobre ellos». La alternativa plural también sería válida si se privilegia la concordancia estricta.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «fighting people» por «people of war» para mayor literalidad y registro. En español se siguió esa revisión con «pueblo de guerra», evitando «ejército» por ser más interpretativo y manteniendo el matiz colectivo del sustantivo עַם.
  spanish_consistency_notes:
  - Se usó «Josué» como forma estable del nombre propio.
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo el tono narrativo sobrio y directo, sin añadir elementos explicativos no presentes en el hebreo.
  - La concordancia singular en «cayó» busca naturalidad estilística con un sujeto colectivo; la alternativa plural se documenta en las decisiones léxicas.
