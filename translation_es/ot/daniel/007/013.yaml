base_translation:
  language: en
  yaml_path: translation/ot/daniel/007/013.yaml
  text: I kept looking in the visions of the night[a], and behold, with the clouds of heaven one like a son of man was coming, and he came to the Ancient of Days[b], and they brought him near before him.
  footnotes:
  - marker: a
    text: Or, 'one like a human being.' The Aramaic literally says 'like a son of man,' an expression that can denote a human figure and later becomes a significant messianic title in biblical interpretation.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'on the clouds of heaven.' The Aramaic preposition here is 'with,' which may describe accompaniment rather than explicitly stating motion upon the clouds.
    reason: alternative_reading
