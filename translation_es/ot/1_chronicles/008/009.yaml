translation:
  language: es
  text: Y engendró a Jobab[a], a Zibia, a Mesha y a Malcam, de Hodesh, su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Hodesh su esposa». La preposición hebrea puede verterse también con sentido de origen en esta fórmula genealógica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En una lista genealógica, el verbo expresa la generación de hijos; en español, «engendró» conserva ese valor genealógico y el sujeto masculino activo mejor que una formulación más explicativa.
- source_word: מִן
  english_pob_choice: by
  chosen_spanish: de
  alternatives_spanish:
  - por
  - de parte de
  lexicon: HALOT
  rationale: La preposición hebrea aquí señala origen/maternidad dentro de la fórmula genealógica. En español, «de Hodesh su esposa» reproduce de manera natural ese valor de procedencia sin sobrecargar la frase.
- source_word: חֹדֶשׁ
  english_pob_choice: Hodesh
  chosen_spanish: Hodesh
  alternatives_spanish:
  - Jodes
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera para mantener la correspondencia con el texto fuente.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: En este contexto el sustantivo designa claramente a la cónyuge. «Esposa» es idiomático y preciso en español contemporáneo.
- source_word: יוֹבָב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  alternatives_spanish:
  - Yobab
  lexicon: HALOT
  rationale: Nombre propio transliterado según la forma usual en español bíblico contemporáneo.
- source_word: צִבְיָא
  english_pob_choice: Zibia
  chosen_spanish: Zibia
  alternatives_spanish:
  - Zibia
  lexicon: HALOT
  rationale: Transliteración del nombre propio con ajuste ortográfico mínimo para lectura en español.
- source_word: מֵישָׁא
  english_pob_choice: Mesha
  chosen_spanish: Mesa
  alternatives_spanish:
  - Mesha
  lexicon: HALOT
  rationale: Se conserva el nombre propio en una forma española legible; «Mesa» sigue de cerca la transliteración y evita una grafía más ajena al español.
- source_word: מַלְכָּם
  english_pob_choice: Malcam
  chosen_spanish: Malcán
  alternatives_spanish:
  - Malcam
  - Malcham
  lexicon: HALOT
  rationale: Como nombre propio genealógico, se translitera. Se añade tilde para ajustar la acentuación natural del español y facilitar la lectura, sin alterar el nombre.
theological_decisions:
- issue: Valor de la preposición מִן en una fórmula genealógica
  english_pob_reading: by Hodesh his wife
  chosen_spanish_reading: de Hodesh su esposa
  alternative_spanish_readings:
  - por Hodesh su esposa
  - desde Hodesh su esposa
  rationale: No hay tensión doctrinal; la cuestión es semántica. La preposición puede indicar origen materno/agentivo. «De» mantiene la relación de procedencia dentro de una genealogía sin forzar una lectura más interpretativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el mismo juicio auditado del POB en inglés: la expresión genealogíca admite tanto una lectura con «by/from» como una con preposición de origen; en español se optó por una formulación natural y transparente que conserva esa ambigüedad sin eliminarla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Los nombres propios se transliteran de manera consistente y legible para español.
  - Se evitó «engendró» en un sentido biológico moderno; aquí funciona como término genealógico bíblico, equivalente al valor del hebreo en este contexto.
