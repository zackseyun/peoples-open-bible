lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En contexto genealógico, el constructo plural introduce una lista de descendientes. «Los hijos de» reproduce con naturalidad y fidelidad la relación genealógica; «descendientes de» sería posible, pero atenúa la forma directa del hebreo.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración habitual al español con acento gráfico conforme a la pronunciación española común.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coraj
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: Nombre propio. En español bíblico es natural «Coraj» para reflejar la consonante final hebrea ח con una adaptación fonética estable, en vez de copiar la forma inglesa.
- source_word: תַּפּוּחַ
  english_pob_choice: Tappuah
  chosen_spanish: Tappúaj
  alternatives_spanish:
  - Tapúa
  - Tappuah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se preserva la secuencia consonántica y la aspiración final aproximada con «-aj», evitando confundirlo con el sustantivo común «manzana».
- source_word: רֶקֶם
  english_pob_choice: Rekem
  chosen_spanish: Réquem
  alternatives_spanish:
  - Rekem
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se adapta la vocalización de manera legible para lectores hispanohablantes, manteniendo el valor propio del nombre.
- source_word: שָׁמַע
  english_pob_choice: Shema
  chosen_spanish: Sama
  alternatives_spanish:
  - Sema
  - Shema
  - Shamma
  lexicon: HALOT
  rationale: Nombre propio. Se opta por una forma hispanizada breve y pronunciable. El audit trail inglés preserva la variación «Shema/Shamma»; en español, «Sama» mantiene la sonoridad básica sin introducir una grafía inglesa.
theological_decisions:
- issue: Lista genealógica sin contenido doctrinal explícito
  english_pob_reading: No theological decisions.
  chosen_spanish_reading: Sin implicación doctrinal explícita; se mantiene como genealogía literal.
  alternative_spanish_readings:
  - Interpretación simbólica de los nombres
  - Paráfrasis explicativa
  rationale: El hebreo presenta simplemente una enumeración de descendientes. No hay razón textual para añadir explicación teológica o simbólica en el cuerpo del versículo.
  doctrine_reference: Ninguna; texto genealógico.
translation_notes:
  revision_awareness: El pasaje coincide con el hebreo masorético y con la auditoría inglesa; no se identifican revisiones sustantivas ni variantes textuales que afecten la traducción española.
  spanish_consistency_notes:
  - Se usó «hijos de» por coherencia con genealogías bíblicas y con el valor constructo del hebreo.
  - 'Se preservó la distinción entre nombres propios y vocabulario común: Tappúaj se translitera, no se traduce como «manzana».'
  - La forma «Coraj» refleja una adaptación española habitual para nombres hebreos con consonante final gutural.
  - La nota sobre Sama conserva la tensión onomástica documentada en el audit trail inglés.
