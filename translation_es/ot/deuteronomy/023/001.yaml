translation:
  language: es
  text: Un hombre no tomará la mujer de su padre[a], ni descubrirá el faldón de su padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomará en matrimonio a la mujer de su padre».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «descubrirá el faldón de su padre». La expresión es un eufemismo sexual; compárese con «descubrir la desnudez de su padre» o «violar el lecho matrimonial de su padre».'
    reason: alternative_reading
lexical_decisions:
- source_word: יִקַּח
  english_pob_choice: take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará en matrimonio
  - desposará
  lexicon: HALOT
  rationale: לָקַח con objeto matrimonial puede implicar ‘tomar’ en matrimonio. En español, ‘tomará’ mantiene la forma verbal y deja oír el sentido relacional sin volverlo más explícito que el hebreo.
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Ningún hombre
  - Una persona
  lexicon: HALOT
  rationale: El singular masculino se conserva con una referencia directa y natural en español, reflejando la forma del hebreo.
- source_word: אֵשֶׁת אָבִיו
  english_pob_choice: his father’s wife
  chosen_spanish: la mujer de su padre
  alternatives_spanish:
  - la esposa de su padre
  - su madrastra
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente ‘la mujer de su padre’. ‘La mujer de su padre’ es transparente y evita limitar indebidamente el alcance legal con ‘madrastra’.
- source_word: יְגַלֶּה
  english_pob_choice: uncover
  chosen_spanish: descubrirá
  alternatives_spanish:
  - desnudarás?
  - expondrá
  lexicon: HALOT
  rationale: גלה en contexto sexual/legal conserva bien el valor de ‘descubrir’. En español, ‘descubrir’ reproduce el paralelo con el inglés POB y mantiene el eufemismo.
- source_word: כְּנַף
  english_pob_choice: skirt
  chosen_spanish: el faldón
  alternatives_spanish:
  - la falda
  - el borde
  - el manto
  lexicon: HALOT
  rationale: כָּנָף designa ‘ala, extremo, borde’ y en vestimenta puede referirse al faldón o ala del manto. ‘Faldón’ comunica mejor que ‘falda’ el sentido de una prenda/parte de prenda en registro bíblico y conserva el matiz eufemístico.
theological_decisions:
- issue: Mantener el eufemismo sexual en el texto principal
  english_pob_reading: Retain the metaphor 'uncover his father’s skirt' in the main text
  chosen_spanish_reading: Conservar ‘descubrirá el faldón de su padre’ en el texto principal
  alternative_spanish_readings:
  - descubrirá la desnudez de su padre
  - violará el lecho matrimonial de su padre
  rationale: El hebreo usa una expresión eufemística; la POB en inglés la preserva. En español, conservar el eufemismo evita explicar de más y respeta la forma literaria y legal del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Evitar una interpretación demasiado estrecha de אֵשֶׁת אָבִיו
  english_pob_reading: his father’s wife
  chosen_spanish_reading: la mujer de su padre
  alternative_spanish_readings:
  - la esposa de su padre
  - su madrastra
  rationale: ‘Mujer de su padre’ preserva el vínculo legal sin introducir una identificación más específica que el hebreo no exige necesariamente.
  doctrine_reference: HALOT; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió ‘covering’ por ‘skirt’ para reflejar más directamente כְּנָף; la redacción española sigue ese ajuste con ‘faldón’, manteniendo el registro bíblico y el eufemismo. También se conservó la idea verbal de לָקַח con ‘tomará’ en lugar de ‘se casará’ para no sobreinterpretar el verbo.
  spanish_consistency_notes:
  - Se prefirió ‘Yahvé’ en otros contextos, pero este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ o sustituciones litúrgicas porque no aparecen en el hebreo.
  - ‘Descubrirá’ mantiene la correspondencia con la serie eufemística bíblica y con el POB inglés.
  - ‘Faldón’ es más natural que ‘skirt’ literal en español y conserva el tono bíblico sin sonar coloquial.
