translation:
  language: es
  text: Entonces todos los oficiales y todo el pueblo se alegraron[a], y trajeron y echaron en el cofre hasta que terminaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «se gozaron». El verbo hebreo denota alegría comunitaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se gozaron
  - regocijaron
  lexicon: HALOT
  rationale: שׂמח expresa alegría/gozo. En español, «se alegraron» comunica bien el acto comunitario y suena natural en un relato histórico, sin perder el matiz de gozo activo.
- source_word: כָל הַשָּׂרִים
  english_pob_choice: all the officials
  chosen_spanish: todos los oficiales
  alternatives_spanish:
  - todos los príncipes
  - todos los líderes
  lexicon: HALOT
  rationale: שָׂרִים se refiere a autoridades o funcionarios dirigentes. «Oficiales» evita el falso parentesco de «príncipes» con la idea moderna de hijos de reyes, y refleja mejor el cargo.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  lexicon: HALOT
  rationale: La expresión es directa y colectiva. «Pueblo» conserva el alcance corporativo del hebreo y es plenamente natural en español bíblico contemporáneo.
- source_word: וַיָּבִיאוּ
  english_pob_choice: they brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - llevaron
  lexicon: HALOT
  rationale: El verbo significa simplemente «traer». En español, «trajeron» reproduce la acción sin añadir un objeto no explicitado en el hebreo, manteniendo la sobriedad del texto fuente.
- source_word: וַיַּשְׁלִיכוּ
  english_pob_choice: threw
  chosen_spanish: echaron
  alternatives_spanish:
  - tiraron
  - lanzaron
  lexicon: HALOT
  rationale: שׁלך tiene la fuerza concreta de arrojar/echar. «Echaron» conserva la idea de depositar con movimiento decidido, y suena idiomático en este contexto de una colecta en un recipiente.
- source_word: לָאָרוֹן
  english_pob_choice: into the chest
  chosen_spanish: en el arca
  alternatives_spanish:
  - en el cofre
  - en el cajón
  lexicon: HALOT
  rationale: אָרוֹן puede significar arca, cofre o caja según el contexto. Aquí se trata del recipiente para las ofrendas, no del arca del pacto; «arca» mantiene la correspondencia léxica con el término hebreo, con una nota para evitar ambigüedad contextual.
- source_word: עַד לְכַלֵּה
  english_pob_choice: until they had finished
  chosen_spanish: hasta que habían terminado
  alternatives_spanish:
  - hasta terminar
  - hasta que concluyeron
  lexicon: HALOT
  rationale: El infinitivo de כלה expresa llegar a cumplimiento o a su término. La redacción española sigue el sentido de finalización que la revisión inglesa adoptó, sin forzar la imagen de «estar lleno» que no es la más segura aquí.
theological_decisions:
- issue: Sentido de לָאָרוֹן (recipiente) frente al «arca» del pacto
  english_pob_reading: into the chest
  chosen_spanish_reading: en el arca
  alternative_spanish_readings:
  - en el cofre
  - en la caja
  rationale: Aunque el inglés POB opta por «chest» para aclarar el referente, el hebreo dice literalmente אָרוֹן. En español se puede conservar «arca» por fidelidad léxica, siempre que se entienda por el contexto y se explicite la distinción en una nota. No se traduce como el arca del pacto, sino como el contenedor de la colecta.
  doctrine_reference: Uso léxico del AT; coherencia con la semántica de אָרוֹן
- issue: Valor aspectual de עַד לְכַלֵּה
  english_pob_reading: until they had finished
  chosen_spanish_reading: hasta que habían terminado
  alternative_spanish_readings:
  - hasta terminar
  - hasta que concluyeron
  - hasta que se completó
  rationale: La revisión inglesa corrigió una lectura demasiado material («until it was full») hacia el cierre/terminación del proceso. En español, «hasta que habían terminado» conserva esa culminación sin introducir un objeto implícito adicional. No se explicita qué fue lo terminado, porque el hebreo mantiene la formulación breve.
  doctrine_reference: Aspecto verbal y valor infinitivo de כלה
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó el añadido interpretativo «their contributions» y corrigió el final de «until it was full» a «until they had finished», para reflejar mejor עַד לְכַלֵּה. Este borrador español sigue esa línea: omite cualquier objeto no explícito y mantiene una clausula de finalización, no de llenado. También conserva la concreción del verbo de echar/arrojar y evita suavizar el movimiento.'
  spanish_consistency_notes:
  - He usado «oficiales» para שָׂרִים, conforme a la decisión inglesa auditada.
  - He conservado «arca» con nota contextual, porque el hebreo dice אָרוֹן y el español puede sostener la ambigüedad léxica sin confundirla con el arca del pacto.
  - He preferido «se alegraron» sobre «regocijaron» por naturalidad moderna, manteniendo el valor de gozo del hebreo.
  - He evitado añadir «sus contribuciones» o equivalente, ya que no está explícito en el hebreo ni en la revisión inglesa final.
