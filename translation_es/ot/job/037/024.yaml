translation:
  language: es
  text: Por tanto, la gente le temerá[a]; él no considera a los sabios de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él no ve a los sabios de corazón»; el verbo hebreo puede significar «ver» o «considerar», y la frase puede subrayar el desdén de Dios por la sabiduría humana ante él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor inferencial conclusivo del hebreo, manteniendo la relación lógica con el contexto anterior.
- source_word: יְרֵאוּהוּ
  english_pob_choice: fear him
  chosen_spanish: le temerán
  alternatives_spanish:
  - lo reverenciarán
  - sentirán temor de él
  lexicon: HALOT
  rationale: ירא puede abarcar temor, reverencia o asombro; 'temerán' conserva la fuerza directa del texto y el peso teológico de la respuesta humana ante la majestad divina.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: HALOT
  rationale: Aunque el sustantivo es genérico, 'los hombres' refleja la forma plural humana del hebreo y sigue funcionando representativamente en el contexto.
- source_word: לֹא יִרְאֶה
  english_pob_choice: he does not regard
  chosen_spanish: no considera
  alternatives_spanish:
  - no mira
  - no ve
  - no presta atención a
  lexicon: HALOT
  rationale: ראה puede significar 'ver', pero aquí el sentido idiomático es de tomar en cuenta o prestar atención favorable; 'no considera' comunica ese valor relacional sin borrar la ambigüedad del verbo hebreo.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: ningún
  alternatives_spanish:
  - ninguno de
  - algún
  lexicon: HALOT
  rationale: En español, con la negación, 'ningún' transmite mejor el valor distributivo que 'any' en inglés, preservando la idea de que no hay ni uno solo entre ellos que reciba consideración.
- source_word: חַכְמֵי לֵב
  english_pob_choice: wise of heart
  chosen_spanish: sabio de corazón
  alternatives_spanish:
  - sabio de mente
  - sabio en su corazón
  - los de corazón sabio
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para quienes poseen sabiduría interior; 'sabio de corazón' conserva la metáfora del corazón como centro de entendimiento sin añadir la idea de autoevaluación que el texto no explicita.
theological_decisions:
- issue: El sujeto implícito de 'no considera' y su relación con Dios
  english_pob_reading: The line states that God does not regard those characterized as wise of heart, likely in the sense of self-sufficient human wisdom before divine majesty.
  chosen_spanish_reading: 'La frase se entiende de Dios: él no toma en cuenta a los sabios de corazón, en contraste con la respuesta humana de temor ante su grandeza.'
  alternative_spanish_readings:
  - No es visto por ningún sabio de corazón
  - No mira a ningún sabio de corazón
  rationale: El contexto inmediato y la sintaxis favorecen entender a Dios como sujeto implícito. 'No considera' mantiene el matiz de no otorgar atención o favor, sin resolver en exceso la tensión semántica de ראה.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto español sigue de cerca el sentido reconocido en el auditorial inglés y conserva la ambigüedad productiva de ראה mediante 'considera', una opción natural en español para el valor de 'regard'. No se introdujeron cambios de revisión adicionales, y se mantuvo la lectura teológica de advertencia frente a la autosuficiencia humana.
  spanish_consistency_notes:
  - Se usó 'Dios' solo en la nota teológica; el texto principal conserva el sujeto implícito como en el hebreo y el POB inglés.
  - '''Sabio de corazón'' mantiene la metáfora hebrea sin convertirla en una explicación interpretativa.'
  - La negación con 'ningún' funciona mejor que un calco de 'cualquier' en español y preserva el alcance distributivo negativo.
