revisions:
- from: ¡Levántate[a], oh Dios; juzga la tierra[b], porque tú heredarás a todas las naciones.
  to: ¡Levántate[a], oh, Dios; juzga la tierra, porque tú heredarás[b] todas las naciones.
  rationale: Se corrige el anclaje de la nota léxica para que corresponda a «heredarás», se mejora la naturalidad española suprimiendo la preposición personal con «heredar», y se ajusta levemente la puntuación del vocativo sin cambiar el sentido.
