  - severity: low
    issue: ‘Se recuestan’ puede sonar demasiado coloquial o voluntario.
    rationale: Para un registro bíblico digno, ‘yacen’ expresa mejor la imagen de líderes tendidos/inactivos y encaja con el paralelismo poético.
