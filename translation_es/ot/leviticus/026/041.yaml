  text: אַף אֲנִ֗י אֵלֵ֤ךְ עִמָּ/ם֙ בְּ/קֶ֔רִי וְ/הֵבֵאתִ֣י אֹתָ֔/ם בְּ/אֶ֖רֶץ אֹיְבֵי/הֶ֑ם אוֹ אָ֣ז יִכָּנַ֗ע לְבָבָ/ם֙ הֶֽ/עָרֵ֔ל וְ/אָ֖ז יִרְצ֥וּ אֶת עֲוֺנָֽ/ם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/041.yaml
  text: I too will walk contrary to them and bring them into the land of their enemies[a]; or then their uncircumcised heart will be humbled[e][d][c][b], and then they will accept the punishment for their iniquity.
  footnotes:
  - marker: a
    text: Or 'even I.' The Hebrew adds emphasis to God's reciprocal action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'walk with them in hostility' or 'walk contrary to them'; this repeats the covenant-curse language of this chapter.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'or then'; the phrase is difficult and may introduce the point at which their heart is humbled.
    reason: alternative_reading
  - marker: d
    text: Literally 'their uncircumcised heart,' a covenantal metaphor for inner stubbornness and uncleanness.
    reason: cultural_note
  - marker: e
    text: Or 'they will make amends for their iniquity' / 'their iniquity will be paid for.' The Hebrew idiom refers to accepting or bearing the due consequence of guilt.
    reason: alternative_reading
