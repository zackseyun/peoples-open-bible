    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: “con los hijos de Benjamín”, es decir, en guerra contra ellos.'
    reason: lexical_alternative
  revision_rationale: Se corrigen las notas para que coincidan con el contenido y los anclajes pertinentes del verso, y se mejora “inquirieron de Dios” a “consultaron a Dios” por claridad y naturalidad en español. No se añadió una nota sobre “Yahvé” porque en español del proyecto esa forma ya es la principal en el texto, no una alternativa marginal.
