translation:
  language: es
  text: Enoc vivió sesenta y cinco años y engendró a Matusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió durante
  lexicon: HALOT
  rationale: En la fórmula genealógica, חיה expresa el período de vida hasta el nacimiento del hijo nombrado. «Vivió» reproduce de forma natural y directa ese valor temporal en español.
- source_word: חֲנוֹךְ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enoch
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma castellana tradicional y ampliamente reconocible «Enoc», manteniendo la identificación del nombre propio sin añadir explicación.
- source_word: חָמֵשׁ וְשִׁשִּׁים שָׁנָה
  english_pob_choice: sixty-five years
  chosen_spanish: sesenta y cinco años
  alternatives_spanish:
  - sesenta y cinco años de edad
  - sesenta y cinco años de vida
  lexicon: Número cardinal + sustantivo temporal
  rationale: El orden hebreo se normaliza al orden natural del español. «Años» conserva el dato cronológico genealógico sin sobretraducir.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En contextos genealógicos, ילד con sujeto masculino significa engendrar/father. «Engendró» mantiene la fuerza genealógica y es más fiel al registro bíblico que una paráfrasis más amplia.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: a
  alternatives_spanish:
  - —
  lexicon: Marcador de objeto directo
  rationale: Aunque el hebreo usa el marcador אֶת, el español requiere la preposición «a» ante el objeto personal directo. Esto expresa la función sintáctica sin importar un significado autónomo al marcador.
- source_word: מְתוּשָׁלַח
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Methuselah
  lexicon: Nombre propio bíblico
  rationale: Se adopta la forma castellana tradicional «Matusalén», plenamente inteligible en español y estándar en lectura bíblica.
