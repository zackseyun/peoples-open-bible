translation:
  language: es
  text: Por tanto, él reconoce sus obras; los derriba de noche[a], y quedan aplastados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los derroca de noche». El hebreo no expresa de manera explícita el objeto de «derriba», pero el contexto apunta a los gobernantes impíos bajo juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: HALOT
  rationale: 'Expresa con naturalidad en español la fuerza inferencial del hebreo: una conclusión que sigue de lo dicho antes.'
- source_word: יַכִּיר
  english_pob_choice: he recognizes
  chosen_spanish: él reconoce
  alternatives_spanish:
  - él conoce
  - él toma nota de
  - él discierne
  lexicon: HALOT
  rationale: El hifil de נכר aquí comunica reconocer o tomar cognizancia; «reconoce» conserva la idea de discernir e identificar sus actos.
- source_word: מַעְבָּדֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: El término se refiere a lo que hacen; «obras» es una forma natural en español y mantiene el peso moral del contexto judicial.
- source_word: וְהָפַךְ
  english_pob_choice: he overturns them
  chosen_spanish: los trastorna
  alternatives_spanish:
  - los derriba
  - los voltea
  - los destrona
  lexicon: HALOT
  rationale: El verbo puede significar voltear/derribar/volver del revés. «Trastorna» preserva la idea de reversión violenta y juicio súbito sin forzar una imagen demasiado literal.
- source_word: לַיְלָה
  english_pob_choice: in the night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: La expresión adverbial temporal se vierte de modo natural en español; «de noche» mantiene la referencia temporal y el matiz de acción nocturna.
- source_word: וְיִדַּכָּאוּ
  english_pob_choice: and they are crushed
  chosen_spanish: quedan aplastados
  alternatives_spanish:
  - son aplastados
  - quedan quebrantados
  - quedan triturados
  lexicon: HALOT
  rationale: La raíz דכא indica ser aplastado/quebrado. «Quedan aplastados» comunica el resultado pasivo y el desenlace de juicio con fuerza idiomática en español.
theological_decisions:
- issue: Sujeto implícito del juicio
  english_pob_reading: The subject throughout is God, and the implied object of 'he overturns' is the wicked persons under discussion.
  chosen_spanish_reading: El sujeto implícito sigue siendo Dios, y el objeto de «los trastorna» son los hombres impíos del contexto inmediato.
  alternative_spanish_readings:
  - Una lectura impersonal de los verbos
  - Tomar «la noche» como objeto de «trastorna»
  rationale: El contexto de Job 34:24–26 habla de Dios que conoce y juzga a los poderosos malvados. La traducción explicita el objeto implícito en español para evitar ambigüedad, sin añadir contenido ajeno al pasaje.
  doctrine_reference: 'Filosofía de traducción: equivalencia óptima; respetar el sentido llano del texto según su contexto.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso se conserva el sentido del pasaje con una formulación española clara y ajustada al contexto, sin introducir una lectura nueva.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de Dios sin sustituir el nombre divino por un título de ocultamiento.
  - «Obras» traduce el valor moral de מַעְבָּדֵיהֶם sin sobrecargar el verso.
  - «De noche» conserva el valor temporal del hebreo y evita una lectura causal no explicitada.
  - La nota conserva la alternativa léxica relevante donde el hebreo deja implícito el objeto del verbo.
