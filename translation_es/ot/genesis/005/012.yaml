translation:
  language: es
  text: Kenan vivió setenta años y fue padre de Mahalalel.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más formal, «Kenan vivió setenta años y engendró a Mahalalel».
