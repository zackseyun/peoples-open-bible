translation:
  language: es
  text: 'Entonces Jeremías dijo a todos los oficiales y a todo el pueblo: «Yahvé me envió para profetizar contra esta casa[a] y contra esta ciudad todas las palabras que ustedes han oído».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «este templo». Hebreo: «esta casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / וַ-וַּיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... dijo
  lexicon: WLC/HALOT
  rationale: La waw consecutiva marca avance narrativo; «entonces» reproduce bien esa secuencia en español sin sonar forzado. «Dijo» conserva el verbo de habla directo.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: HALOT
  rationale: En español eclesiástico, «Jeremías» es la forma natural y ampliamente inteligible del nombre propio. No hay una razón de transparencia aquí para transliterar en el texto principal.
- source_word: הַשָּׂרִים
  english_pob_choice: officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los líderes
  - los gobernantes
  lexicon: HALOT
  rationale: En este contexto judicial y público, שָׂרִים refiere a autoridades o funcionarios. «Oficiales» comunica ese matiz con claridad y evita el arcaísmo de «príncipes».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: «El pueblo» es la correspondencia más natural y fiel para עָם en este tipo de discurso colectivo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: —
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: HALOT
  rationale: El marcador introductorio de discurso no se traduce de forma mecánica en español cuando ya queda cubierto por la puntuación y la sintaxis («dijo:»).
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: Project default
  rationale: Se sigue el valor de nombre divino directo del Tetragrama, conforme al estándar del proyecto en español. «Yahvé» conserva la identidad del nombre revelado sin ocultarlo detrás de un título.
- source_word: שְׁלָחַנִי
  english_pob_choice: sent me
  chosen_spanish: me envió
  alternatives_spanish:
  - ha enviado
  - mandó que yo fuera
  lexicon: HALOT
  rationale: El perfecto hebreo en este relato se vierte naturalmente con pasado simple español. «Me envió» mantiene la idea de comisión profética.
- source_word: לְהִנָּבֵא
  english_pob_choice: to prophesy against
  chosen_spanish: para profetizar[a] contra
  alternatives_spanish:
  - para profetizar a
  - para anunciar como profeta contra
  lexicon: HALOT
  rationale: La preposición אֶל y el contexto de defensa ante autoridades hacen claro el sentido confrontativo. «Profetizar contra» preserva la fuerza judicial del pasaje. Se ancla la nota para explicar la posible lectura neutral «profetizar a».
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - este edificio
  lexicon: HALOT
  rationale: «Casa» reproduce el sustantivo hebreo בַּיִת; en este contexto remite al templo sin necesidad de sustituirlo por la interpretación.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esta urbe
  lexicon: HALOT
  rationale: Referencia directa a Jerusalén mediante un deíctico simple y claro.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todo lo que
  - todos los dichos
  lexicon: HALOT
  rationale: '«Palabras» preserva el vínculo con דְּבָרִים y la carga profética del mensaje verbal, mejor que una generalización como «todo». '
- source_word: אֲשֶׁר שְׁמַעְתֶּם
  english_pob_choice: that you have heard
  chosen_spanish: que ustedes han oído
  alternatives_spanish:
  - que oyeron
  - que han escuchado
  lexicon: HALOT
  rationale: El perfecto español expresa bien un dicho ya recibido y aún vigente en la escena actual. «Ustedes» hace explícito el plural del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. El español del proyecto lo vierte como «Yahvé» para no ocultar el nombre propio de Dios detrás de un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor adversativo de לְהִנָּבֵא אֶל
  english_pob_reading: to prophesy against this house and against this city
  chosen_spanish_reading: para profetizar contra esta casa y contra esta ciudad
  alternative_spanish_readings:
  - para profetizar a esta casa y a esta ciudad
  - para anunciar como profeta a esta casa y a esta ciudad
  rationale: 'Aunque אֶל puede ser simplemente «a», el contexto de Jeremías 26 es de confrontación judicial: Jeremías defiende que fue enviado a declarar juicio. «Contra» preserva esa fuerza sin añadir contenido ajeno.'
  doctrine_reference: Jeremiah 26 context; POB audit trail on adversative force
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés que eliminó el «saying» redundante; por eso el español usa puntuación directa de discurso («dijo:»). También se mantuvo la decisión auditada de traducir el Tetragrama como nombre propio y de conservar la fuerza adversativa de לְהִנָּבֵא en el contexto de Jeremías 26.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino según el proyecto.
  - Se prefirió «casa» sobre «templo» para reflejar el hebreo literal, dejando la identificación contextual implícita.
  - Se usó «oficiales» para שָׂרִים por adecuación al contexto político-administrativo.
  - Se evitó traducir mecánicamente לֵאמֹר, ya cubierto por la sintaxis española natural.
