translation:
  language: es
  text: El que trabaja su tierra tendrá pan en abundancia, pero el que persigue cosas vacías[a] carece de entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «personas vacías». El hebreo רֵיקִים puede entenderse de modo personal o impersonal; el contexto permite ambas posibilidades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵד
  english_pob_choice: works
  chosen_spanish: trabaja
  alternatives_spanish:
  - labra
  - cultiva
  - trabaja la tierra
  lexicon: HALOT
  rationale: El participio expresa labor agrícola. "Trabaja" es natural y fiel en español; "labra" o "cultiva" son posibles, pero "trabaja" evita tecnicismos y conserva la idea de esfuerzo sostenido.
- source_word: אַדְמָתוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su campo
  - su suelo
  - su terreno
  lexicon: HALOT
  rationale: אַדְמָה significa tierra/suelo/campo. En el contexto sapiencial agrícola, "su tierra" mantiene la imagen concreta y suena más idiomático que una traducción demasiado técnica.
- source_word: יִשְׂבַּע לָחֶם
  english_pob_choice: will have plenty of bread
  chosen_spanish: tendrá abundancia de pan
  alternatives_spanish:
  - quedará satisfecho con pan
  - tendrá su pan en abundancia
  - se saciará de pan
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que será satisfecho con pan, es decir, tendrá provisión suficiente. "Tendrá abundancia de pan" comunica bien esa suficiencia sin perder la imagen concreta del pan.
- source_word: וּמְרַדֵּף
  english_pob_choice: but he who pursues
  chosen_spanish: pero el que persigue
  alternatives_spanish:
  - pero el que corre tras
  - pero el que anda tras
  - y el que persigue
  lexicon: HALOT
  rationale: La conjunción introduce contraste. "Persigue" conserva el sentido de seguir obsesivamente una meta o curso de vida, en paralelo con la primera línea del proverbio.
- source_word: רֵיקִים
  english_pob_choice: empty things
  chosen_spanish: cosas vacías
  alternatives_spanish:
  - cosas vanas
  - cosas inútiles
  - personas vacías
  lexicon: HALOT
  rationale: רֵיקִים puede entenderse como vacíos/vanos/inútiles y también como personas vacías. Aquí opto por un objeto impersonal, "cosas vacías", porque el contexto favorece la idea de afanes vanos más que la referencia directa a personas.
- source_word: חֲסַר לֵב
  english_pob_choice: lacks sense
  chosen_spanish: carece de entendimiento
  alternatives_spanish:
  - le falta corazón
  - no tiene juicio
  - es insensato
  lexicon: HALOT
  rationale: La idiomática hebrea "lacking heart" alude a falta de entendimiento o juicio. "Carece de entendimiento" es claro y fiel al valor sapiencial de "corazón" como sede de discernimiento.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y coincide sustancialmente con la lectura y las decisiones léxicas del POB en inglés. Se conserva la tensión interpretativa de רֵיקִים mediante nota, como en el audit trail inglés, y se mantiene la imaginería concreta de pan y tierra sin sobrerreformular.
  spanish_consistency_notes:
  - Se mantuvo "tierra" para אַדְמָה en vez de un equivalente más técnico como "suelo" por naturalidad bíblica en español.
  - Se prefirió "entendimiento" a "sentido" para reflejar el valor sapiencial de לֵב como facultad de juicio.
  - '"Cosas vacías" conserva la ambigüedad entre lo vano y lo inútil, sin fijar indebidamente una sola lectura.'
