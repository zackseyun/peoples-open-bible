id: ACT.17.18
reference: Acts 17:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τινὲς δὲ καὶ τῶν Ἐπικουρείων ⸀καὶ Στοϊκῶν φιλοσόφων συνέβαλλον αὐτῷ, καί τινες ἔλεγον· Τί ἂν θέλοι ὁ σπερμολόγος οὗτος λέγειν; οἱ δέ· Ξένων δαιμονίων δοκεῖ καταγγελεὺς εἶναι· ὅτι τὸν Ἰησοῦν καὶ τὴν ἀνάστασιν εὐηγγελίζετο.
base_translation:
  language: en
  yaml_path: translation/nt/acts/017/018.yaml
  text: Some of the Epicurean and Stoic philosophers also engaged with him[a], and some were saying, “What is this babbler trying to say?” But others said[d][c][b], “He seems to be a proclaimer of foreign deities,” because he was proclaiming the good news about Jesus and the resurrection.
  footnotes:
  - marker: a
    text: Or 'debated with him' or 'conversed with him'; the Greek verb can denote active discussion or dispute.
    reason: lexical_alternative
  - marker: b
    text: '''Babbler'' translates a derogatory term literally associated with a ''seed-picker,'' used for someone viewed as a collector and repeater of scraps of ideas.'
    reason: cultural_note
  - marker: c
    text: Or 'foreign demons' or 'strange gods.' Here the speakers likely mean unfamiliar divine beings according to their own pagan framework, not necessarily evil spirits in the later Christian sense.
    reason: alternative_reading
  - marker: d
    text: Some interpreters think the Athenians may have mistaken 'the resurrection' for another deity because Paul was proclaiming Jesus and the resurrection.
    reason: alternative_reading
translation:
  language: ko
  text: 에피쿠로스 학파와 스토아 학파의 어떤 철학자들이 그와 논쟁하였는데, 어떤 이들은 「이 말쟁이가 무슨 말을 하려고 하는가?」 하였고, 또 어떤 이들은 「이방의 신들을 전하는 자 같다」 하였으니, 이는 그가 예수와 부활을 복음으로 전하였기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐπικουρείων καὶ Στοϊκῶν
  english_pob_choice: Epicurean and Stoic
  chosen_korean: 에피쿠로스 학파와 스토아 학파
  alternatives_korean:
  - 에피쿠레오스 학파
  - 스토익 학파
  lexicon: BDAG
  rationale: 한국어 학술 표기 정착어를 사용한다.
- source_word: σπερμολόγος
  english_pob_choice: babbler
  chosen_korean: 말쟁이
  alternatives_korean:
  - 새들이 줍는 쓰레기 같은 자
  - 주워들은 말꾼
  lexicon: BDAG
  rationale: 본 단어는 본래 「씨 줍는 새」를 가리키며, 비유적으로 「잡다한 지식을 주워 떠드는 사람」을 폄하한다. 한국어 「말쟁이」가 그 폄하의 음조를 자연스럽게 담는다.
- source_word: Ξένων δαιμονίων
  english_pob_choice: foreign deities
  chosen_korean: 이방의 신들
  alternatives_korean:
  - 낯선 귀신들
  lexicon: BDAG
  rationale: 아테네 청중에게 δαιμόνια는 부정적 「귀신」이 아니라 신성한 존재 일반을 가리키는 중립적 용어. 「이방의 신들」이 본문 맥락에 부합한다.
