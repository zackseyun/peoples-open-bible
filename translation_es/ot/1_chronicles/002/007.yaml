translation:
  language: es
  text: 'Y los hijos de Karmi: Acar[a], el perturbador de Israel, quien actuó infielmente respecto de las cosas dedicadas al anatema[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Achan». Crónicas usa la forma «Acar», probablemente para reflejar el juego de palabras con el hebreo de «perturbador». Véase Josué 7.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «las cosas dedicadas al anatema»; es decir, lo puesto bajo prohibición divina, destinado a destrucción. La expresión puede abarcar un conjunto de objetos o bienes, no solo uno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Y los hijos de familia de
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי se expresa de manera natural y precisa como «hijos de»; conserva el valor genealógico directo sin ampliar innecesariamente el sentido.
- source_word: כַּרְמִי
  english_pob_choice: Karmi
  chosen_spanish: Karmi
  alternatives_spanish:
  - Carmi
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio tal como aparece en el hebreo. «Karmi» refleja de forma más directa la vocalización hebrea que «Carmi».
- source_word: עָכָר
  english_pob_choice: Achar
  chosen_spanish: Acar
  alternatives_spanish:
  - Achan
  lexicon: HALOT
  rationale: Se preserva la forma específica de Crónicas, עָכָר, en vez de armonizarla con Josué 7. En español, «Acar» mantiene la correspondencia con la consonancia y el juego verbal del texto.
- source_word: עוֹכֵר יִשְׂרָאֵל
  english_pob_choice: the troubler of Israel
  chosen_spanish: el perturbador de Israel
  alternatives_spanish:
  - el que perturbó a Israel
  - el que trastornó a Israel
  lexicon: HALOT
  rationale: El participio funciona en aposición y participa del juego de palabras con el nombre Acar/עָכָר. «Perturbador» conserva la fuerza nominal y el vínculo literario mejor que una paráfrasis verbal.
- source_word: מָעַל
  english_pob_choice: acted unfaithfully
  chosen_spanish: actuó infielmente
  alternatives_spanish:
  - fue infiel
  - cometió una infidelidad
  - obró con traición
  lexicon: HALOT
  rationale: מָעַל expresa quebranto de lealtad o deslealtad en un marco moral/covenantal. «Actuó infielmente» reproduce ese valor con naturalidad en español y evita reducirlo a un mero acto jurídico.
- source_word: בַּחֵרֶם
  english_pob_choice: regarding the devoted things
  chosen_spanish: respecto de las cosas consagradas
  alternatives_spanish:
  - respecto de lo consagrado al anatema
  - respecto de las cosas dedicadas al anatema
  - en cuanto a las cosas puestas bajo el anatema
  lexicon: HALOT
  rationale: חֵרֶם en este contexto alude a lo apartado para destrucción bajo prohibición divina. «Las cosas consagradas» mantiene la idea de dedicación/prohibición sin cargar el texto principal con una glosa explicativa excesiva; la nota preserva la alternativa interpretativa.
theological_decisions:
- issue: Sentido de חֵרֶם en un relato de transgresión y juicio
  english_pob_reading: the devoted things
  chosen_spanish_reading: las cosas consagradas
  alternative_spanish_readings:
  - lo consagrado al anatema
  - las cosas dedicadas para destrucción
  - el anatema
  rationale: El término combina dedicación especial y destrucción bajo prohibición. La redacción principal opta por una formulación clara en español y conserva el matiz de consagración/separación; la nota explica la carga semántica del hebreo para no perder la tensión lexical-teológica.
  doctrine_reference: Translation philosophy §3, §5
- issue: Juego de palabras entre el nombre Acar y el participio ocer/‘troubling’
  english_pob_reading: Achar, the troubler of Israel
  chosen_spanish_reading: Acar, el perturbador de Israel
  alternative_spanish_readings:
  - Acar, el que perturbó a Israel
  - Acar, el que trastornó a Israel
  rationale: Crónicas conserva la forma Acar precisamente para reforzar la correspondencia sonora con el participio. «Perturbador» mantiene el paralelismo nominal y el eco literario en español, sin diluirlo en una construcción más explicativa.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El inglés POB revisó su texto de «the devoted thing» a «the devoted things» para reflejar mejor el sentido colectivo de חֵרֶם en este contexto; la versión española sigue esa lectura colectiva con «las cosas consagradas» y mantiene la nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no hay mención divina explícita.
  - 'Se translitera el nombre propio según la forma hebrea presente en Crónicas: «Karmi» y «Acar».'
  - «Infielmente» se eligió para conservar la carga de deslealtad pactal de מָעַל sin volver el texto demasiado técnico.
  - La nota sobre חֵרֶם preserva la tensión entre dedicación, prohibición y destrucción, evitando reducir el término a una sola palabra española.
