  glossary_alignment: 'No hay conflictos con terminología teológica del proyecto. Las principales cuestiones son de español natural y de correspondencia lexical: mantener la amplitud de נֶזֶם y חֲלִי, expresar כָּתֶם como ''oro fino'', y representar מוֹכִיחַ de manera más idiomática que ''reprensor''.'
