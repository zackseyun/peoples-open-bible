translation:
  language: es
  text: Sobre los rebaños estaba Jaziz[a] el hagrita. Todos estos eran oficiales sobre los bienes que pertenecían al rey David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hagrí». El gentilicio hebreo admite varias transliteraciones en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: Over
  chosen_spanish: Sobre
  alternatives_spanish:
  - Encargado de
  - Al cargo de
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa supervisión o responsabilidad administrativa. «Sobre» conserva esa relación de cargo de manera natural en español sin añadir matices no presentes en el hebreo.
- source_word: הַצֹּאן
  english_pob_choice: the flocks
  chosen_spanish: los rebaños
  alternatives_spanish:
  - las ovejas
  - el ganado menor
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y, por extensión, ganado menor. «Rebaños» reproduce bien el sentido colectivo y administrativo del contexto.
- source_word: יָזִיז
  english_pob_choice: Jaziz
  chosen_spanish: Jaziz
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera para mantener la forma del texto fuente.
- source_word: הַהַגְרִי
  english_pob_choice: the Hagrite
  chosen_spanish: el hagrita
  alternatives_spanish:
  - el hagareo
  - el hagrí
  lexicon: HALOT
  rationale: El gentilicio puede verterse como transliteración étnica. «Hagrita» mantiene la referencia de grupo sin imponer una equivalencia más interpretativa como «hagareo».
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos هؤلاء
  alternatives_spanish:
  - Todos estos
  - Todos ellos
  lexicon: HALOT
  rationale: 'La intención era resumidora: «Todos estos» o «Todos ellos». Se corrige para reflejar la suma conclusiva de la lista en español natural.'
- source_word: שָׂרֵי
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - jefes
  - encargados
  - príncipes
  lexicon: HALOT
  rationale: En este contexto administrativo, שָׂרִים designa funcionarios u oficiales a cargo, no necesariamente príncipes ni jefes militares. «Oficiales» conserva el sentido burocrático.
- source_word: הָרְכוּשׁ
  english_pob_choice: the property
  chosen_spanish: los bienes
  alternatives_spanish:
  - la propiedad
  - las posesiones
  - los recursos
  lexicon: HALOT
  rationale: רְכוּשׁ se refiere a bienes/posesiones/activos. «Bienes» suena natural en español y conserva el matiz patrimonial del inventario real.
- source_word: אֲשֶׁר לַמֶּלֶךְ דָּוִיד
  english_pob_choice: that belonged to King David
  chosen_spanish: que pertenecían al rey David
  alternatives_spanish:
  - que eran del rey David
  - del rey David
  lexicon: HALOT
  rationale: La cláusula relativa expresa pertenencia. «Pertenecían al rey David» es claro, idiomático y fiel al valor posesivo del hebreo.
translation_notes:
  revision_awareness: Se toma como base el texto hebreo masorético (WLC) y el audit trail inglés. La redacción española sigue la estructura administrativa del versículo y conserva el gentilicio como transliteración, evitando una paráfrasis. Se corrige un error accidental en el borrador inicial («Todos هؤلاء») para dar una lectura publicable.
  spanish_consistency_notes:
  - Se mantiene «Jaziz» como nombre propio transliterado.
  - «el hagrita» conserva el gentilicio étnico sin forzar una forma tradicional no documentada.
  - Se usa «rebaños» para צֹאן por el contexto de administración pecuaria.
  - Se usa «oficiales» para שָׂרֵי conforme al sentido administrativo del pasaje.
  - «bienes» refleja רְכוּשׁ como patrimonio o activos del rey.
