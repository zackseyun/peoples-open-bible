translation:
  language: es
  text: 'Como la ofrenda por el pecado[a], así la ofrenda por la culpa: una sola ley[b] para ellas. El sacerdote que hace expiación con ella, será suyo[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como la ofrenda por el pecado, así la ofrenda por la culpa».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo torá; también «instrucción».
    reason: lexical_alternative
  - marker: c
    text: 'O: «El sacerdote que hace expiación por medio de ella, será suyo»; es decir, la ofrenda pertenece al sacerdote oficiante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּֽ/חַטָּאת
  english_pob_choice: Like the sin offering
  chosen_spanish: Como la ofrenda por el pecado
  alternatives_spanish:
  - Como la ofrenda por el pecado, así la ofrenda por la culpa
  - Así como la ofrenda por el pecado
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת designa la ofrenda por el pecado, no simplemente el pecado. Mantengo la comparación marcada por כַּ con ‘como’, que suena natural en español y conserva la relación formal entre las dos ofrendas.
- source_word: כָּֽ/אָשָׁ֔ם
  english_pob_choice: so the guilt offering
  chosen_spanish: así la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda por la culpa
  - la ofrenda de reparación
  lexicon: HALOT
  rationale: אָשָׁם en Levítico se refiere a la ofrenda por la culpa o de reparación. ‘Ofrenda por la culpa’ refleja bien el valor tradicional y transparente del término en español. ‘Así’ conserva el paralelismo comparativo con la primera cola del verso.
- source_word: תּוֹרָ֥ה אַחַ֖ת
  english_pob_choice: one law
  chosen_spanish: una sola ley
  alternatives_spanish:
  - una sola instrucción
  - un solo estatuto
  lexicon: HALOT
  rationale: תּוֹרָה puede significar ‘ley’ o ‘instrucción’. Aquí, en un contexto jurídico-cúltico, ‘ley’ preserva la fuerza normativa. ‘Una sola’ expresa la unicidad enfática del hebreo אַחַת.
- source_word: לָ/הֶ֑ם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para ambos
  - para las dos
  lexicon: HALOT
  rationale: El pronombre plural retoma las dos ofrendas como conjunto. ‘Para ellos’ es fiel y natural en español; ‘ambos’ aclararía la referencia, pero no está explícita en el hebreo.
- source_word: הַ/כֹּהֵ֛ן
  english_pob_choice: The priest
  chosen_spanish: El sacerdote
  alternatives_spanish:
  - El sacerdote oficiante
  - El sacerdote
  lexicon: HALOT
  rationale: כֹּהֵן se traduce de forma directa por ‘sacerdote’. En este contexto, el español admite esta equivalencia sin pérdida, y evita introducir un matiz no expresado en el hebreo.
- source_word: אֲשֶׁ֥ר יְכַפֶּר בּ֖/וֹ
  english_pob_choice: who makes atonement with it
  chosen_spanish: que hace expiación con ella
  alternatives_spanish:
  - que hace expiación por medio de ella
  - que hace expiación con ella
  lexicon: HALOT
  rationale: 'כפר en el marco sacrificial debe conservar su sentido técnico: ‘hacer expiación’. Opto por ‘con ella’ porque el pronombre femenino concuerda con la ofrenda en español y representa el instrumental hebreo de manera clara.'
- source_word: ל֥/וֹ יִהְיֶֽה
  english_pob_choice: shall have it
  chosen_spanish: tendrá la ofrenda
  alternatives_spanish:
  - le pertenecerá
  - será de él
  lexicon: HALOT
  rationale: La expresión hebrea indica posesión/asignación al sacerdote oficiante. ‘Tendrá la ofrenda’ comunica de manera natural el derecho de posesión implícito sin forzar un giro más legalista que en español resultaría menos fluido.
theological_decisions:
- issue: Sentido de כפר en legislación sacrificial
  english_pob_reading: makes atonement
  chosen_spanish_reading: hace expiación
  alternative_spanish_readings:
  - hace atonación
  - realiza expiación
  rationale: Conservo el peso cultual y teológico del verbo sacerdotal sin reducirlo a una acción meramente ritual. ‘Hacer expiación’ es una fórmula estable en español bíblico y mantiene la ambigüedad productiva del concepto.
  doctrine_reference: Translation philosophy §3, §6
- issue: Relación entre la ofrenda y su asignación al sacerdote
  english_pob_reading: that is, it belongs to the officiating priest
  chosen_spanish_reading: tendrá la ofrenda
  alternative_spanish_readings:
  - le pertenecerá
  - será suya
  rationale: El hebreo final expresa pertenencia o asignación. En español, ‘tendrá la ofrenda’ deja visible el beneficio del sacerdote sin añadir una glosa explicativa dentro del texto principal.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el trazo inglés auditado y no requiere revisión adicional; se mantiene la estructura comparativa, el valor técnico de la terminología sacrificial y la asignación de la ofrenda al sacerdote oficiante.
  spanish_consistency_notes:
  - Se usa «ofrenda por el pecado» y «ofrenda por la culpa» para mantener consistencia terminológica con la sección sacrificial de Levítico.
  - «Hacer expiación» se conserva como equivalente técnico de כפר.
  - «Ley» traduce תּוֹרָה en sentido normativo-cúltico, con nota para la posible alternativa «instrucción».
