translation:
  language: es
  text: 'Los hijos de Simeón: Nemuel[a], y Jamín, Jarib, Zérah[b] y Shaul[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nemuel es la forma hebrea en este versículo; en algunas tradiciones y en la genealogía paralela de Génesis 46:10 aparece Jemuel.
    reason: alternative_reading
  - marker: b
    text: Zérah corresponde a Zóhar en la genealogía paralela de Génesis 46:10 y Éxodo 6:15.
    reason: textual_variant
  - marker: c
    text: Shaul es la forma hebrea del nombre que a menudo se traduce o adapta como Saúl en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica, el plural constructo de "hijo" introduce de manera directa a los varones nombrados. "Hijos de" es natural, preciso y conserva la relación genealógica inmediata del hebreo.
- source_word: שִׁמְע֑וֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español para el patriarca y antepasado tribal. "Simeón" distingue mejor esta figura de "Simón" y refleja la forma tradicional del nombre en genealogías.
- source_word: נְמוּאֵ֣ל
  english_pob_choice: Nemuel
  chosen_spanish: Nemuel
  alternatives_spanish:
  - Jemuel
  lexicon: HALOT
  rationale: La forma consonántica de este versículo apoya "Nemuel". Se conserva la variante conocida "Jemuel" como alternativa textual/genealógica porque aparece en tradiciones y en el paralelo de Génesis 46:10.
- source_word: וְ/יָמִ֔ין
  english_pob_choice: and Jamin
  chosen_spanish: Jamín
  alternatives_spanish:
  - y Jamín
  lexicon: HALOT
  rationale: El nombre propio se translitera como "Jamín" para reflejar la forma hebrea. El valor conjuntivo ya queda implícito por la enumeración en español, por lo que no es necesario repetir "y" dentro de la serie si se prefiere un listado más fluido.
- source_word: יָרִ֖יב
  english_pob_choice: Jarib
  chosen_spanish: Jarib
  alternatives_spanish:
  - Yarib
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente del hebreo. Se mantiene "Jarib" por ser la adaptación española más transparente y cercana a la pronunciación hebrea.
- source_word: זֶ֥רַח
  english_pob_choice: Zerah
  chosen_spanish: Zérah
  alternatives_spanish:
  - Zerah
  - Zóhar
  lexicon: HALOT
  rationale: Se conserva la transliteración del hebreo de este versículo; la tilde ayuda a la lectura española. Se mantiene la relación con la variante genealógica "Zóhar" en pasajes paralelos sin sustituir la forma de este texto.
- source_word: שָׁאֽוּל
  english_pob_choice: Shaul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Shaúl
  - Saul
  lexicon: HALOT
  rationale: Aquí el nombre hebreo corresponde al conocido nombre bíblico español "Saúl". Aunque la forma hebrea es Shaul, en español la equivalencia estable y más inteligible es "Saúl"; se preserva la decisión de no ocultar la forma original como "Shaul" cuando el lector español reconoce de inmediato el nombre tradicional.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se requieren revisiones textuales. La principal decisión española es cómo transliterar nombres propios y cómo presentar la lista genealógica con fluidez natural sin perder la correspondencia con el hebreo.
  spanish_consistency_notes:
  - Se mantuvo la estructura genealógica breve del hebreo.
  - 'Se usaron formas españolas estándar para nombres bíblicos cuando existen equivalentes asentados: Simeón, Saúl.'
  - 'Se conservaron transliteraciones transparentes para nombres menos fijados: Nemuel, Jamín, Jarib, Zérah.'
  - Las notas mantienen las variantes documentadas sin introducir interpretaciones adicionales.
