  rationale: 신명기 본문은 「야훼」가 아닌 「하나님」(엘로힘 라인) 호칭으로 직접 야훼 호명이 없는 구절이므로, 한국어 「하나님」을 그대로 보존한다. 야훼 회복은 본문의 יהוה / κύριος(=YHWH) 라인에만 적용한다.
  doctrine_reference: 'Glossary: YHWH → 야훼 only where source has YHWH'
