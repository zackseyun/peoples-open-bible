translation:
  language: es
  text: Y si un hombre consagra su casa como santa para Yahvé, entonces el sacerdote la tasará, sea buena o mala[a]; según la tasación del sacerdote[b], así quedará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sea buena o mala», es decir, cualquiera sea la condición o calidad de la casa en la tasación sacerdotal.'
    reason: cultural_note
  - marker: b
    text: O «como el sacerdote la valore» / «como el sacerdote la tase», para el verbo hebreo repetido que expresa la valuación sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ כִּי
  english_pob_choice: And if a man
  chosen_spanish: Y si un hombre
  alternatives_spanish:
  - Y cuando un hombre
  - Si alguien
  lexicon: HALOT
  rationale: La construcción introduce un caso legal condicional. «Un hombre» conserva el singular masculino del hebreo, y «si» expresa con naturalidad כִּי en este contexto.
- source_word: יַקְדִּשׁ
  english_pob_choice: consecrates
  chosen_spanish: consagra
  alternatives_spanish:
  - santifica
  - dedica
  lexicon: HALOT
  rationale: El hifil de קדשׁ expresa poner algo aparte para uso sagrado. «Consagra» comunica esa dedicación formal en español bíblico sin sonar tan técnico como «santifica».
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su vivienda
  lexicon: HALOT
  rationale: Aquí se trata de una casa como propiedad susceptible de valoración; «casa» es más preciso que «hogar».
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: as holy to Yahweh
  chosen_spanish: como santa para Yahvé
  alternatives_spanish:
  - como cosa santa para Yahvé
  - consagrada a Yahvé
  lexicon: HALOT
  rationale: Se preserva el valor adjetival de קֹדֶשׁ con «santa» y el destinatario divino con «para Yahvé», siguiendo la norma del proyecto para el nombre divino.
- source_word: וְהֶעֱרִיכוֹ הַכֹּהֵן
  english_pob_choice: then the priest shall assess it
  chosen_spanish: entonces el sacerdote la tasará
  alternatives_spanish:
  - entonces el sacerdote la valorará
  - entonces el sacerdote la apreciará
  lexicon: HALOT
  rationale: El verbo ערך en este capítulo tiene sentido de valoración oficial sacerdotal. «Tasar» reproduce bien la idea de fijar un valor, con registro legal claro en español.
- source_word: בֵּין טוֹב וּבֵין רָע
  english_pob_choice: whether good or bad
  chosen_spanish: sea buena o mala
  alternatives_spanish:
  - sea buena o sea mala
  - sea de buena o mala condición
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo que abarca cualquier condición o calidad de la casa en la tasación. En español, «sea buena o mala» comunica esa amplitud de forma natural.
- source_word: כַּאֲשֶׁר יַעֲרִיךְ אֹתוֹ הַכֹּהֵן
  english_pob_choice: as the priest assesses it
  chosen_spanish: como el sacerdote la tasare
  alternatives_spanish:
  - según el sacerdote la tasare
  - tal como el sacerdote la valore
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo valorativo para reflejar el paralelismo del hebreo. «Tasare» conserva un tono legal-formal adecuado; el pronombre femenino concuerda con «casa».
- source_word: כֵּן יָקוּם
  english_pob_choice: so it shall stand
  chosen_spanish: así quedará
  alternatives_spanish:
  - así permanecerá
  - así quedará establecido
  lexicon: HALOT
  rationale: El verbo קום aquí expresa que la tasación queda vigente y firme. «Así quedará» transmite esa validez establecida en español llano y digno.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé» mantiene visible el nombre de pacto y evita el enmascaramiento devocional con mayúsculas.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con la auditoría inglesa de alta concordancia; se respetó la repetición del verbo de valoración y la nota cultural sobre «buena o mala». La única decisión de fondo ajustada al contexto del proyecto fue rendir el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo el registro legal-sacerdotal del capítulo con «tasará / tasare» y «quedará».
  - Se usó «casa» en vez de «hogar» por el contexto de valuación de propiedad.
  - La nota [a] conserva la explicación idiomática del hebreo sin expandirla en el cuerpo del texto.
