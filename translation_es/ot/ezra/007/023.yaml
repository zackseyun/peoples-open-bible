translation:
  language: es
  text: Todo lo que sea mandado por el Dios del cielo, hágase con diligencia para la casa del Dios del cielo[a], no sea que venga ira sobre el reino del rey y sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque, ¿por qué habría de haber ira sobre el reino del rey y sus hijos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל דִּי
  english_pob_choice: Whatever
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Lo que sea
  - Cualquier cosa que
  lexicon: HALOT
  rationale: La expresión introduce una cláusula relativa de alcance total. «Todo lo que» preserva el sentido inclusivo y suena natural en español, sin perder la amplitud del original.
- source_word: מִן טַעַם
  english_pob_choice: is commanded by
  chosen_spanish: sea mandado por
  alternatives_spanish:
  - sea decretado por
  - sea ordenado por
  lexicon: HALOT
  rationale: El arameo puede significar mandato, decreto u आदेश. En este contexto administrativo, «mandado por» conserva la fuerza de una orden procedente de Dios y evita una traducción demasiado interpretativa.
- source_word: אֱלָהּ שְׁמַיָּא
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - Dios del cielo
  lexicon: HALOT
  rationale: Se mantiene el título establecido en Esdras-arameo. El artículo en español hace la frase natural y refleja el valor determinado del original.
- source_word: יִתְעֲבֵד
  english_pob_choice: let it be done
  chosen_spanish: hágase
  alternatives_spanish:
  - sea hecho
  - que se haga
  lexicon: HALOT
  rationale: La forma funciona como jussivo en el contexto. «Hágase» comunica de manera directa la orden o disposición sin sobreespecificar el matiz modal.
- source_word: אַדְרַזְדָּא
  english_pob_choice: diligently
  chosen_spanish: con diligencia
  alternatives_spanish:
  - cuidadosamente
  - con esmero
  lexicon: HALOT
  rationale: El adverbio expresa prontitud, cuidado y exactitud en la ejecución. «Con diligencia» conserva ese énfasis administrativo y es claro en español bíblico actual.
- source_word: לְבֵית
  english_pob_choice: for the house of
  chosen_spanish: para la casa de
  alternatives_spanish:
  - para el templo de
  - en la casa de
  lexicon: HALOT
  rationale: Se conserva «casa» en la línea principal porque es la palabra del texto y del audit trail inglés. Aunque el referente es el templo, la metáfora se mantiene sin perder inteligibilidad.
- source_word: בֵית אֱלָהּ שְׁמַיָּא
  english_pob_choice: house of the God of heaven
  chosen_spanish: la casa del Dios del cielo
  alternatives_spanish:
  - el templo del Dios del cielo
  lexicon: HALOT
  rationale: La elección mantiene el lenguaje fuente «casa» en vez de sustituirlo por «templo» en el texto principal. La identificación con el templo se entiende por contexto, no por paráfrasis.
- source_word: דִּי לְמָה
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de lo contrario
  lexicon: HALOT
  rationale: El giro arameo introduce una advertencia con valor de fin/resultado negativo. «No sea que» expresa bien ese matiz preventivo en español y evita una formulación demasiado moderna o explicativa.
- source_word: לֶהֱוֵא קְצַף
  english_pob_choice: wrath come
  chosen_spanish: venga ira
  alternatives_spanish:
  - haya ira
  - caiga ira
  lexicon: HALOT
  rationale: La construcción literal expresa que la ira «sea/ocurra». «Venga ira» conserva el movimiento de amenaza inminente y suena natural en español.
- source_word: עַל מַלְכוּת מַלְכָּא
  english_pob_choice: upon the kingdom of the king
  chosen_spanish: sobre el reino del rey
  alternatives_spanish:
  - contra el reino del rey
  - sobre el reino real
  lexicon: HALOT
  rationale: «Reino del rey» traduce de modo directo el sustantivo con su genitivo. «Sobre» conserva el valor de amenaza o recaída de la ira, como en el inglés auditado.
- source_word: וּבְנוֹהִי
  english_pob_choice: and his sons
  chosen_spanish: y sobre sus hijos
  alternatives_spanish:
  - y sus hijos
  - y sus descendientes
  lexicon: HALOT
  rationale: El sentido básico es «sus hijos». En español, la repetición de «sobre» mantiene el paralelismo con el miembro anterior y la dirección de la amenaza implícita.
theological_decisions:
- issue: Conservar «casa» en vez de sustituirlo por «templo»
  english_pob_reading: for the house of the God of heaven
  chosen_spanish_reading: para la casa del Dios del cielo
  alternative_spanish_readings:
  - para el templo del Dios del cielo
  rationale: El audit trail inglés preserva la metáfora fuente «house» aunque reconoce que se refiere al templo. En español se mantiene la misma estrategia para no borrar el lenguaje del original, dejando la identificación contextual al lector.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reproducir la advertencia como prevención de ira
  english_pob_reading: lest wrath come upon the kingdom of the king and his sons
  chosen_spanish_reading: no sea que venga ira sobre el reino del rey y sobre sus hijos
  alternative_spanish_readings:
  - para que no venga ira
  - no vaya a venir ira
  rationale: El arameo funciona como advertencia preventiva. «No sea que» conserva esa función sin convertirla en una explicación doctrinal distinta ni en una paráfrasis excesiva.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre el texto fuente, la traducción auditada en inglés y la revisión posterior; no se detectaron cambios necesarios en la última pasada. La versión española sigue de cerca esa decisión establecida, manteniendo la metáfora «casa» y la advertencia «no sea que» sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Dios del cielo» de forma uniforme para אֱלָהּ שְׁמַיָּא.
  - Se prefiere «casa» en el texto principal y se explica su referencia al templo en nota.
  - «Con diligencia» conserva el matiz adverbial de prontitud y exactitud del arameo.
  - «No sea que» reproduce la fuerza preventiva del original sin suavizarla.
