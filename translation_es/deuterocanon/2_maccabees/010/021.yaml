  - marker: a
    text: Fecha del cómputo seléucida, expresada en el texto griego como «el año ciento cuarenta y ocho».
    reason: cultural_note
  - marker: b
    text: Dioscorintio es el nombre de un mes macedonio, conservado por transliteración.
    reason: cultural_note
