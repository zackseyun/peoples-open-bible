translation:
  language: es
  text: 'Y dijo: «Mira, he oído que hay grano en Egipto. Bajen allá y compren grano[a] para nosotros de allí, para que vivamos y no muramos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compren para nosotros de allí». El verbo hebreo aquí se usa en sentido comercial específico para comprar grano; el objeto puede quedar implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce atención inmediata al discurso. «Mira» conserva la vivacidad y naturalidad en español moderno sin recurrir a un calco arcaico como «He aquí».
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  - he escuchado
  lexicon: HALOT
  rationale: El perfecto comunica información recibida con relevancia presente. «He oído» refleja bien esa fuerza y suena más natural que un pretérito simple en este contexto.
- source_word: שֶׁבֶר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - alimento
  - cereal
  lexicon: HALOT
  rationale: En el contexto de hambre y compra en Egipto, el término apunta a provisiones de cereal/grano para adquirir. «Grano» es la opción más precisa y sobria en español; «alimento» sería demasiado general.
- source_word: רְדוּ
  english_pob_choice: Go down
  chosen_spanish: Bajen
  alternatives_spanish:
  - Vayan
  - Desciendan
  lexicon: HALOT
  rationale: El verbo conserva la dirección geográfica desde Canaán hacia Egipto. «Bajen» mantiene ese matiz sin sonar forzado en español.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allá
  alternatives_spanish:
  - allí
  - ahí
  lexicon: HALOT
  rationale: El adverbio direccional se mantiene con un equivalente natural. «Allá» encaja bien con el movimiento hacia un lugar distante.
- source_word: וְשִׁבְרוּ
  english_pob_choice: buy some
  chosen_spanish: compren
  alternatives_spanish:
  - compren grano
  - adquieran
  lexicon: HALOT
  rationale: El verbo hebreo tiene aquí valor comercial específico de comprar grano. En español, «compren» es el verbo directo y claro; el objeto se entiende por el contexto inmediato, como en la nota auditada del inglés.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - por nosotros
  - para nosotros mismos
  lexicon: HALOT
  rationale: Expresa beneficio/destinatario de la compra. «Para nosotros» es la forma más natural y transparente en español.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de allá
  lexicon: HALOT
  rationale: La preposición explícita se conserva para mostrar que el grano debe obtenerse desde Egipto. «De allí» es idiomático y suficiente en español.
- source_word: וְנִחְיֶה
  english_pob_choice: so that we may live
  chosen_spanish: para que vivamos
  alternatives_spanish:
  - y viviremos
  - a fin de que vivamos
  lexicon: HALOT
  rationale: La forma expresa finalidad o resultado deseado. «Para que vivamos» reproduce con naturalidad el valor de propósito en español.
- source_word: וְלֹא נָמוּת
  english_pob_choice: and not die
  chosen_spanish: y no muramos
  alternatives_spanish:
  - y no moriremos
  - para que no muramos
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «vivamos» y el contraste urgente del hebreo. El subjuntivo en español encaja con la cláusula final de propósito.
translation_notes:
  revision_awareness: 'Se siguió el sentido del texto hebreo con apoyo del audit trail inglés: se conservó el matiz direccional de «bajar», el valor comercial de שׁבר en este contexto de hambruna, y la estructura final de propósito/resulto («para que vivamos y no muramos»). No se adoptó una traducción mecánica del inglés; se ajustó la sintaxis para una lectura natural en español sin perder la tensión léxica documentada.'
  spanish_consistency_notes:
  - Se usa «Mira» como equivalente de la partícula discursiva הִנֵּה, en línea con un español actual y reverente.
  - «Grano» se mantiene como término técnico-contextual para שֶׁבֶר en escenas de escasez y compra.
  - Se preserva el movimiento espacial con «bajen» / «de allí», siguiendo el hebreo.
  - La cláusula final conserva el paralelismo de vida/muerte con subjuntivo final en español.
