review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no preserva fielmente varios rasgos del hebreo: cambia inconsistente e injustificadamente la segunda persona plural del verso a una mezcla de singular y tercera plural; convierte בַּעֲוֺנֹתֵיכֶם (''en sus/vuestras iniquidades'') en una causal explícita (''por causa de''), pese a que la auditoría POB quiso conservar la compacidad no interpretativa; y neutraliza אִישׁ אֶל אָחִיו sin nota, perdiendo el detalle relacional masculino singular documentado. El sentido general se entiende, pero hay desviaciones significativas respecto a la evidencia fuente y al rastro de decisiones POB.'
  spanish_quality_summary: 'El español es legible, pero la sintaxis pronominal es defectuosa: ''Tu tocado... tus sandalias... no harán duelo ni llorarán'' mezcla singular y plural de manera impropia, y además el hebreo aquí exige plural. ''Gemirán unos a otros'' suena poco natural; en español es mejor ''gemirán el uno al otro'' o, si se conserva la literalidad documentada, ''gemirán cada uno a su hermano'' con nota. También ''tu finura'' en la nota no es una alternativa idiomática adecuada para פְאֵר en este contexto.'
  glossary_alignment: 'No hay conflictos con términos teológicos mayores del glosario del proyecto, pero sí con la política de fidelidad léxica: debe mantenerse ''turbantes/tocados'' en plural, ''sandalias'', ''harán duelo/llorarán'', y especialmente ''en sus iniquidades'' en vez de una reformulación causal. La decisión inglesa documentó la literalidad masculina de ''cada uno a su hermano''; en español conviene preservarla en el texto o al menos marcarla en nota. Aquí es preferible preservarla directamente en el texto por claridad y fidelidad.'
  issues:
  - severity: high
    issue: Cambio indebido de persona y número
    rationale: 'El hebreo usa segunda persona plural de principio a fin: ''vuestros turbantes... vuestros pies... no haréis... lloraréis... os consumiréis... gemiréis''. El borrador mezcla singular (''tu tocado'', ''tu cabeza'') con tercera plural (''harán'', ''llorarán'', ''se consumirán''), lo cual distorsiona la referencia gramatical del original.'
  - severity: high
    issue: Sobreinterpretación de בַּעֲוֺנֹתֵיכֶם
    rationale: La auditoría POB mantuvo 'in your iniquities' para conservar la fuerza compacta del hebreo y evitar imponer una lectura causal. 'Por causa de sus iniquidades' cambia tanto el matiz semántico como la persona gramatical.
  - severity: medium
    issue: Pérdida del detalle relacional masculino singular
    rationale: אִישׁ אֶל אָחִיו está documentado como 'cada uno a su hermano'. 'Unos a otros' borra ese rasgo. En español puede sonar natural conservarlo como 'cada uno a su hermano'.
  - severity: medium
    issue: Nota léxica poco idiomática
    rationale: La alternativa 'tu finura' no es español natural para פְאֵר en este contexto. 'Tu adorno' o 'tu adorno de cabeza' sí lo sería; además todo debe ir en plural para concordar con el verso.
  - severity: low
    issue: Elección principal de פְאֵר puede ser más específica
    rationale: Aunque 'tocado' es posible, la auditoría favorece un cubrecabeza en contexto de duelo, probablemente 'turbantes'. En español bíblico moderno, 'turbantes' transmite mejor el referente concreto y evita ambigüedad.
