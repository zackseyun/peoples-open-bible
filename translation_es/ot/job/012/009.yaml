translation:
  language: es
  text: ¿Quién entre todos estos no sabe que la mano de Yahvé ha hecho esto?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién entre
  - ¿Quién de
  lexicon: HALOT
  rationale: La pregunta retórica pide una interrogación directa en español. «¿Quién» conserva la fuerza inmediata del hebreo sin añadir más de lo que el texto exige.
- source_word: בְּ/כָל אֵלֶּה
  english_pob_choice: among all these
  chosen_spanish: entre todos éstos
  alternatives_spanish:
  - de todos éstos
  - en todos éstos
  lexicon: HALOT
  rationale: El ב distributivo/partitivo en este contexto se entiende naturalmente como «entre». Mantiene el sentido de conjunto referido a las criaturas o realidades mencionadas antes.
- source_word: יָדַע
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - no conoce
  lexicon: HALOT
  rationale: En español, con una pregunta retórica general, «sabe» comunica la noción de conocimiento o reconocimiento común con naturalidad. Evita una construcción más pesada como «conoce» aquí.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido conocido, no una causa. «Que» es la equivalencia natural en español para esta función completiva.
- source_word: יַד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - el poder
  - la acción
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «mano» para mantener la imagen antropomórfica y la agencia divina expresa en el texto, como en la decisión inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» según la terminología del proyecto, preservando el Tetragrámaton como nombre propio y no como título.
- source_word: עָשְׂתָה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha realizado
  - ha hecho acontecer
  lexicon: HALOT
  rationale: El perfecto hebreo expresa acción completa con relevancia presente. «Ha hecho» mantiene la amplitud de עשה y suena natural en español.
- source_word: זֹּאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esta realidad
  lexicon: HALOT
  rationale: El demostrativo singular se refiere de manera global a la realidad discutida. «Esto» conserva la referencia deíctica amplia sin pluralizar indebidamente.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto distingue el nombre propio de Yahvé de un título sustitutivo. En este versículo, el texto hebreo usa explícitamente el Tetragrámaton, por lo que se conserva como nombre propio en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés de referencia y la revisión más reciente coinciden sin cambios sustantivos; no se documentan ajustes de sentido en el pasaje. La traducción española sigue esa estabilidad y mantiene el mismo valor semántico del original hebreo, incluido el uso del nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la norma del proyecto para יְהוָה.
  - Se conserva la imagen bíblica de «la mano» en vez de sustituirla por una abstracción como «poder».
  - «Esto» se deja en singular para respetar el demostrativo hebreo y la referencia colectiva implícita.
  - La sintaxis española sigue la pregunta retórica del hebreo sin añadir explicaciones interpretativas.
