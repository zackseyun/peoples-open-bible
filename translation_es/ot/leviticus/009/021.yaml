translation:
  language: es
  text: Aarón meció los pechos y el muslo derecho como ofrenda mecida[a] delante de Yahvé, tal como Moisés había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda agitada'; el hebreo usa el término técnico de la ofrenda movida ritualmente ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָזוֹת
  english_pob_choice: the breasts
  chosen_spanish: los pechos
  alternatives_spanish:
  - las pechugas
  - las partes de pecho
  lexicon: HALOT
  rationale: En contexto sacrificial, חָזֶה designa la porción del pecho del animal. 'Pechos' mantiene la referencia corporal y funciona bien en español bíblico sin añadir explicaciones que el texto no trae.
- source_word: שׁוֹק הַיָּמִין
  english_pob_choice: the right thigh
  chosen_spanish: el muslo derecho
  alternatives_spanish:
  - la pierna derecha
  - la pantorrilla derecha
  lexicon: HALOT
  rationale: שׁוֹק nombra la porción de la pierna asociada al sacrificio. 'Muslo' es una solución natural en español para esta porción, y 'derecho' expresa directamente הַיָּמִין.
- source_word: הֵנִיף
  english_pob_choice: waved
  chosen_spanish: meció
  alternatives_spanish:
  - agitó
  - presentó meciendo
  lexicon: HALOT
  rationale: El verbo describe la acción ritual de mover o mecer la porción delante de Dios. 'Meció' es el equivalente español más idiomático para esta ofrenda, conservando el gesto cultual sin convertirlo en una paráfrasis.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda mecida delante de Yahvé
  - como ofrenda agitatoria
  lexicon: HALOT
  rationale: תְּנוּפָה es el término técnico de la ofrenda mecida. 'Ofrenda mecida' preserva el valor cultual y evita sustituirlo por un término eclesiástico no derivado del hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición o ámbito 'ante / delante de'. Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה, sin enmascararlo con 'SEÑOR'.
- source_word: כַּאֲשֶׁר צִוָּה מֹשֶׁה
  english_pob_choice: just as Moses had commanded
  chosen_spanish: tal como Moisés había mandado
  alternatives_spanish:
  - como Moisés había mandado
  - según había mandado Moisés
  lexicon: HALOT
  rationale: La cláusula expresa conformidad con una instrucción previa. 'Había mandado' refleja bien la anterioridad de la orden de Moisés respecto de la acción de Aarón.
- source_word: וְאֵת ... וְאֵת
  english_pob_choice: the breasts and the right thigh
  chosen_spanish: los pechos y el muslo derecho
  alternatives_spanish:
  - ambos, los pechos y el muslo derecho
  lexicon: HALOT
  rationale: Los marcadores de objeto coordinan dos elementos directos; el español no requiere reproducirlos. La coordinación simple conserva la fluidez sin perder ninguno de los objetos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. Según la terminología del proyecto, se traslada como 'Yahvé' para preservar el nombre de pacto, en vez de enmascararlo como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no muestra notas textuales ni variantes; la concordancia general es alta y no se reportan revisiones aplicadas. La presente versión sigue el sentido ritual del hebreo y adopta la decisión doctrinal del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - '''Meció'' conserva el gesto ritual sin introducir una explicación ajena al texto.'
  - '''Ofrenda mecida'' reproduce el término técnico sin sustituirlo por vocabulario litúrgico tradicional no documentado en el hebreo.'
