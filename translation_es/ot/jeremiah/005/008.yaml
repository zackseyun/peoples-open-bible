translation:
  language: es
  text: Eran sementales bien alimentados, fogosos[a]; cada uno relinchando tras la mujer de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «sementales bien alimentados y madrugadores»; el término hebreo traducido aquí como «fogosos» es difícil y puede llevar la idea de salir temprano con avidez o vagar temprano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּסִים
  english_pob_choice: stallions
  chosen_spanish: sementales
  alternatives_spanish:
  - caballos
  lexicon: HALOT
  rationale: El hebreo dice simplemente ‘caballos’, pero el contexto compara a varones codiciosos con animales macho sexualmente excitados. ‘Sementales’ preserva el rasgo masculino que la versión inglesa marcó con ‘stallions’ sin perder naturalidad en español.
- source_word: מְיֻזָּנִים
  english_pob_choice: well-fed
  chosen_spanish: bien alimentados
  alternatives_spanish:
  - alimentados
  - bien nutridos
  lexicon: HALOT
  rationale: El participio pasivo describe animales engordados o mantenidos en buen estado. ‘Bien alimentados’ reproduce esa idea de forma clara y digna en español.
- source_word: מַשְׁכִּים
  english_pob_choice: lusty
  chosen_spanish: fogosos
  alternatives_spanish:
  - ardientes
  - apasionados
  - que madrugan
  lexicon: HALOT
  rationale: Es un término difícil y el inglés POB documenta una alternativa relacionada con ‘levantarse temprano’ o vagar temprano. En el contexto inmediato domina la imagen de excitación y empuje sexual; ‘fogosos’ conserva ese impulso sin borrar la ambigüedad subyacente.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - un hombre
  lexicon: HALOT
  rationale: Es un singular distributivo. ‘Cada uno’ mantiene la referencia individual sin introducir una lectura demasiado idiomática o genérica.
- source_word: אֶל אֵשֶׁת רֵעֵהוּ
  english_pob_choice: after his neighbor’s wife
  chosen_spanish: tras la mujer de su prójimo
  alternatives_spanish:
  - hacia la esposa de su prójimo
  - tras la esposa de su vecino
  lexicon: HALOT
  rationale: El hebreo literalmente apunta ‘a/ hacia la mujer de su prójimo’; el verbo de relincho permite en español ‘tras’ para expresar persecución deseosa. ‘Prójimo’ conserva el valor relacional de רֵעֵהוּ sin reducirlo a mera vecindad geográfica.
- source_word: יִצְהָלוּ
  english_pob_choice: neighing
  chosen_spanish: relinchando
  alternatives_spanish:
  - hinnando
  - neighando
  lexicon: HALOT
  rationale: Es el sonido propio del caballo. ‘Relinchando’ es el equivalente español natural y vívido, y mantiene la imagen animal del símil.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y la audición inglesa, pero adapta la metáfora zoológica a un español natural. Se conserva la dificultad de מַשְׁכִּים mediante una nota alternativa, como hace la POB inglesa, sin ocultar el matiz sexual del contexto ni reducir la imagen a una traducción mecánica.
  spanish_consistency_notes:
  - Se prefirió ‘prójimo’ para רֵעֵהוּ por consistencia con el valor relacional del hebreo y para evitar limitar indebidamente el alcance a un vecino literal.
  - ‘Sementales’ se usa aquí por la fuerte carga contextual masculina; no pretende convertir el sustantivo básico de ‘caballos’ en un cambio léxico permanente.
  - La nota al pie mantiene la alternativa de ‘madrugadores’ para preservar la tensión documental del término קשה, en línea con el expediente inglés.
