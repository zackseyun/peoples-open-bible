  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Caldeos», «siervos», «rey de Babilonia» y «les irá bien» están bien alineados. No intervienen términos sensibles como Yahvé, Mesías, esclavo/siervo en sentido doctrinal, etc.
