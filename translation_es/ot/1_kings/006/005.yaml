translation:
  language: es
  text: Construyó adosada al muro de la casa una estructura alrededor[a], contra los muros de la casa alrededor, alrededor del salón principal[b] y del santuario interior[c]; e hizo cámaras laterales alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un anexo circundante» para el raro término hebreo יצוע, que se refiere a la estructura construida alrededor de los muros del templo.
    reason: lexical_alternative
  - marker: b
    text: Aquí הֵיכָל designa el recinto principal del templo, distinto del santuario interior (דְּבִיר).
    reason: cultural_note
  - marker: c
    text: O «lugar santísimo» para «santuario interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: Construyó
  alternatives_spanish:
  - Y construyó
  - Edificó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de בנה se vierte naturalmente en pasado simple. «Construyó» conserva el valor narrativo sin arcaísmo y es fiel al contexto arquitectónico.
- source_word: עַל קִיר הַבַּיִת
  english_pob_choice: against the wall of the house
  chosen_spanish: junto al muro de la casa
  alternatives_spanish:
  - contra el muro de la casa
  - sobre el muro de la casa
  lexicon: HALOT
  rationale: En este contexto constructivo, עַל expresa adyacencia o apoyo junto a la pared, no ubicación literalmente encima de ella. «Junto al» comunica la relación espacial de manera natural en español.
- source_word: צוע / יצוע
  english_pob_choice: a structure
  chosen_spanish: una estructura
  alternatives_spanish:
  - un anexo
  - una construcción
  - un conjunto
  lexicon: HALOT
  rationale: El término es raro y el POB inglés evitó especificarlo demasiado en la revisión final. En español, «estructura» mantiene la neutralidad arquitectónica y respeta la incertidumbre léxica del hebreo.
- source_word: סָבִיב
  english_pob_choice: all around / around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: La repetición de סָבִיב subraya el contorno envolvente. «Alrededor» es idiomático y puede repetirse sin perder la insistencia del original.
- source_word: קִירוֹת הַבַּיִת
  english_pob_choice: the walls of the house
  chosen_spanish: los muros de la casa
  alternatives_spanish:
  - las paredes de la casa
  lexicon: HALOT
  rationale: El plural hebreo debe preservarse. «Muros» es más congruente con el registro arquitectónico del templo que «paredes».
- source_word: לַהֵיכָל
  english_pob_choice: the nave
  chosen_spanish: el santuario
  alternatives_spanish:
  - la nave
  - el templo-hall
  lexicon: HALOT
  rationale: Aunque el POB inglés usa «nave», en español esa palabra puede sonar eclesiástica o ambigua; «santuario» mantiene la función del recinto principal del templo sin forzar un tecnicismo menos transparente. Se conserva la distinción frente al «santuario interior».
- source_word: וְלַדְּבִיר
  english_pob_choice: the inner sanctuary
  chosen_spanish: el santuario interior
  alternatives_spanish:
  - el lugar santísimo
  - el santísimo
  lexicon: HALOT
  rationale: «Santuario interior» refleja bien דְּבִיר como recinto más interno y evita imponer de entrada una formulación litúrgica posterior. La alternativa tradicional «lugar santísimo» queda disponible como equivalente interpretativo.
- source_word: וַיַּעַשׂ צְלָעוֹת
  english_pob_choice: he made side chambers
  chosen_spanish: hizo cámaras laterales
  alternatives_spanish:
  - hizo cuartos laterales
  - hizo dependencias laterales
  lexicon: HALOT
  rationale: El hebreo arquitectónico aquí apunta a espacios adosados al edificio. «Cámaras laterales» conserva la concreción espacial y la forma plural del término, sin reducirlo a «costillas» ni sobrespecificarlo.
theological_decisions:
- issue: Cómo distinguir הֵיכָל de דְּבִיר en la arquitectura del templo
  english_pob_reading: the nave ... the inner sanctuary
  chosen_spanish_reading: el santuario ... el santuario interior
  alternative_spanish_readings:
  - la nave ... el santuario interior
  - el templo-hall ... el lugar santísimo
  rationale: El texto exige mantener dos espacios distintos. En español, «santuario»/«santuario interior» comunica la relación jerárquica sin introducir un tecnicismo litúrgico que pueda oscurecer la arquitectura del pasaje. Se conserva la distinción documental entre el recinto principal y el más interno.
  doctrine_reference: Descriptivo; no doctrinal directo. Relacionado con la topografía del templo en 1 Reyes 6.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que separa la estructura envolvente de las cámaras laterales finales y conserva la repetición espacial de סביב. En español se ha respetado esa distribución: primero la estructura alrededor del muro, luego la mención de los muros, después los dos recintos del templo, y por último las cámaras laterales.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - 'Se mantiene un registro arquitectónico consistente: muro/muros, santuario/santuario interior, cámaras laterales.'
  - No se traduce mecánicamente el inglés 'nave' porque en español puede inducir una lectura eclesiástica; se optó por una solución más transparente al contexto del templo hebreo.
