id: 2CH.5.9
reference: 2 Chronicles 5:9
source:
  edition: WLC
  text: וַֽ/יַּאֲרִיכוּ֮ הַ/בַּדִּים֒ וַ/יֵּרָאוּ֩ רָאשֵׁ֨י הַ/בַּדִּ֤ים מִן הָ/אָרוֹן֙ עַל פְּנֵ֣י הַ/דְּבִ֔יר וְ/לֹ֥א יֵרָא֖וּ הַ/ח֑וּצָ/ה וַֽ/יְהִי שָׁ֔ם עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־׃
translation:
  text: And the poles were so long that the heads of the poles were seen from the ark before the inner sanctuary[a], but they could not be seen from outside; and they are there to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the Most Holy Place' for 'in front of the inner sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲרִיכוּ
  chosen: were made long
  alternatives:
  - were lengthened
  - extended
  lexicon: HALOT
  rationale: The Hiphil form of ארך here is causative, referring to the poles being lengthened or drawn out. 'Were made long' is idiomatic English that preserves the passive/resultative sense without over-specifying the mechanism.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים refers to the poles used to carry the ark. 'Poles' is clear modern English; 'staves' is traditional but archaic.
- source_word: וַיֵּרָאוּ רָאשֵׁי הַבַּדִּים
  chosen: the ends of the poles could be seen
  alternatives:
  - the heads of the poles were visible
  - the tips of the poles were seen
  lexicon: HALOT
  rationale: רָאשֵׁי literally means 'heads,' but in English 'ends' best conveys the physical extremities of the poles. The Niphal of ראה is naturally rendered as passive visibility.
- source_word: מִן הָאָרוֹן
  lemma: מִן
  chosen: from the ark
  alternatives:
  - extending from the ark
  - out from the ark
  lexicon: HALOT
  rationale: The preposition מִן marks the point from which the pole ends were visible. 'From the ark' is concise and fits the spatial description, though the sense is that the poles projected from the ark.
- source_word: עַל פְּנֵי הַדְּבִיר
  chosen: in front of the inner sanctuary
  alternatives:
  - before the inner sanctuary
  - toward the inner sanctuary
  - before the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר denotes the inner sanctuary/most holy place. 'Inner sanctuary' is a transparent architectural term; 'in front of' renders עַל פְּנֵי idiomatically in this spatial context.
- source_word: וְלֹא יֵרָאוּ הַחוּצָה
  chosen: but they could not be seen from outside
  alternatives:
  - but they were not visible outside
  - but they could not be seen from the outside
  lexicon: HALOT
  rationale: הַחוּצָה means 'outside/outward.' The clause contrasts visibility from within versus invisibility from outside the inner room. 'From outside' is natural English and preserves the contrast.
- source_word: וַיְהִי שָׁם
  chosen: and they are there
  alternatives:
  - and they remained there
  - and they were there
  lexicon: HALOT
  rationale: Though the verb is singular, the sense is existential with the poles as the referent. English naturally supplies the plural pronoun. Present tense in English reflects the idiom when followed by 'to this day,' indicating the writer's present standpoint.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom marking the situation as continuing to the time of writing. 'To this day' is the conventional and accurate English equivalent.
