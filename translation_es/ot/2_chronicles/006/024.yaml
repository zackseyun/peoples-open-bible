    reason: lexical_alternative
  - marker: b
    text: O 'regresa' o 'se arrepiente'. El hebreo שׁוב puede abarcar retorno y arrepentimiento en contexto de pacto.
    reason: lexical_alternative
  - marker: c
    text: O 'hace súplica' o 'pide misericordia'. El verbo expresa súplica intensa por gracia o favor.
    reason: lexical_alternative
  revision_rationale: 'Ajusté la redacción para un español más natural y fiel al hebreo: ''tu pueblo de Israel'' evita una construcción áspera; mantuve el sujeto colectivo en singular con verbos singulares; cambié ''te suplican'' por ''implora tu favor'' para reflejar mejor el matiz de חנן como súplica por favor/gracia y eliminar la redundancia con ''delante de ti''. También armonicé las notas con el singular del sujeto colectivo en la redacción revisada.'
