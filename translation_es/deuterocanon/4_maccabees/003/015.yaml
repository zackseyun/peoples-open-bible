translation:
  language: es
  text: Y aun mientras ardía de sed, razonó que sería un peligro sumamente terrible[a] para el alma si la bebida fuera considerada equivalente a sangre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un peligro absolutamente espantoso para el alma». El griego πάνδεινον intensifica fuertemente «peligro».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el sentido es que tomar la bebida equivaldría a tratarla como sangre.
    reason: cultural_note
lexical_decisions:
- source_word: διαπυρούμενος
  english_pob_choice: burning
  chosen_spanish: ardía de sed
  alternatives_spanish:
  - estaba ardiendo de sed
  - consumido por la sed
  - inflamado de sed
  lexicon: LSJ
  rationale: La imagen verbal de arder conserva la metáfora corporal intensa del griego y suena natural en español. 'Ardía de sed' comunica mejor el estado durativo que una simple equivalencia como 'tenía mucha sed'.
- source_word: δίψαν
  english_pob_choice: thirst
  chosen_spanish: sed
  alternatives_spanish:
  - thirstiness
  lexicon: LSJ
  rationale: '''Sed'' es el equivalente directo y más idiomático; con ''ardía'' mantiene la fuerza expresiva sin perder precisión.'
- source_word: ἐλογίσατο
  english_pob_choice: he reasoned
  chosen_spanish: juzgó
  alternatives_spanish:
  - razonó
  - consideró
  - concluyó
  lexicon: LSJ
  rationale: En 4 Macabeos el verbo pertenece al campo del discernimiento racional. 'Juzgó' conserva la idea de evaluación reflexiva y funciona con fluidez en español.
- source_word: πάνδεινον
  english_pob_choice: utterly dreadful
  chosen_spanish: sumamente terrible
  alternatives_spanish:
  - sumamente temible
  - enteramente espantoso
  - absolutamente dreadful
  lexicon: LSJ
  rationale: El compuesto intensifica el adjetivo y exige una fuerte intensificación en español. 'Sumamente terrible' mantiene la gravedad sin sonar artificial.
- source_word: κίνδυνον
  english_pob_choice: danger
  chosen_spanish: peligro
  alternatives_spanish:
  - riesgo
  - peligro mortal
  lexicon: LSJ
  rationale: '''Peligro'' es la correspondencia más directa y común; conserva el valor ético del aviso sin sobreinterpretarlo.'
- source_word: τῇ ψυχῇ
  english_pob_choice: to the soul
  chosen_spanish: para el alma
  alternatives_spanish:
  - al alma
  - para la vida
  - a su alma
  lexicon: LSJ
  rationale: En este contexto moral-filosófico ψυχή apunta al alma como sede de la integridad ética, no solo a la vida física. 'Para el alma' expresa con naturalidad el alcance del daño.
- source_word: λογισθὲν
  english_pob_choice: were regarded
  chosen_spanish: fuera considerada
  alternatives_spanish:
  - fuera juzgada
  - fuera tenida por
  - se la considerara
  lexicon: LSJ
  rationale: La forma pasiva mantiene la idea de calcular/estimar algo como equivalente. 'Fuera considerada' es clara y respeta el matiz de valoración mental.
- source_word: ἰσοδύναμον
  english_pob_choice: equivalent
  chosen_spanish: equivalente
  alternatives_spanish:
  - igual
  - de igual valor
  - a la par con
  lexicon: LSJ
  rationale: '''Equivalente'' expresa con precisión la igualdad de valor o fuerza que establece el griego.'
- source_word: τὸ ποτόν
  english_pob_choice: the drink
  chosen_spanish: la bebida
  alternatives_spanish:
  - la copa
  - la pócima
  - el brebaje
  lexicon: LSJ
  rationale: En español, 'la bebida' suena más natural y general que 'el drink'. Mantiene la referencia al líquido sin añadir coloración innecesaria.
- source_word: αἵματι
  english_pob_choice: blood
  chosen_spanish: sangre
  lexicon: LSJ
  rationale: La equivalencia literal es necesaria; el contraste con sangre sostiene el peso moral de la cláusula final.
theological_decisions:
- issue: Sentido de ψυχή en el marco moral del pasaje
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  rationale: Aunque ψυχή puede significar vida física, el contexto de razonamiento ético favorece 'alma', que preserva el registro moral y filosófico del libro sin desplazar el sentido hacia una mera supervivencia corporal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Fuerza de la comparación final entre bebida y sangre
  english_pob_reading: the drink being regarded as equivalent to blood
  chosen_spanish_reading: si la bebida fuera considerada equivalente a sangre
  alternative_spanish_readings:
  - si beberla se considerara igual a sangre
  - si la bebida se tomara como sangre
  rationale: La traducción mantiene explícita la equivalencia mental/jurídica sin introducir una explicación amplia en el cuerpo del texto. Así se conserva la tensión entre el acto de beber y la prohibición de la sangre.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español. También se evitó dejar notas sueltas sin anclaje y se mantuvo la fuerza de πάνδεινον con una intensificación natural en español.
  spanish_consistency_notes:
  - Se prefirió 'alma' para ψυχή por coherencia con el registro moral-filosófico del contexto.
  - Se usó 'bebida' como equivalente natural de τὸ ποτόν, manteniendo la referencia concreta al líquido en cuestión.
  - Se conservó la relación de equivalencia con 'sangre' sin explicitar la ley en el texto principal, reservando esa aclaración para la nota.
  - La puntuación y el orden siguen un español fluido y publicable, sin perder la sintaxis comprimida del griego.
