    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota [a] explica una alternativa para חֶמְדַּת יִשְׂרָאֵל, no para «hace tres días». La nota [b] explica «la casa de tu padre», no «fueron halladas». Esto rompe la correspondencia exigida entre marcador y palabra/frase relevante.
  - severity: medium
    issue: La nota cultural [b] traduce de forma poco natural el hebreo citado.
    rationale: «Tu casa de padre» suena antinatural en español. Mejor «la casa de tu padre», manteniendo luego la explicación de que es una expresión de hogar/clan.
  - severity: low
    issue: «Ya fueron halladas» es menos natural que una forma perfectiva resultativa más directa.
    rationale: El hebreo נִמְצָאוּ expresa estado resultante. «Han sido halladas» o «ya aparecieron» suena más natural; la primera conserva mejor la voz pasiva del original.
