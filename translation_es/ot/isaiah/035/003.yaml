translation:
  language: es
  text: Fortalezcan las manos débiles, y afiancen las rodillas vacilantes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rodillas débiles» o «rodillas que flaquean». El participio hebreo pinta rodillas que titubean o ceden.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַזְּקוּ
  english_pob_choice: Strengthen
  chosen_spanish: Fortalezcan
  alternatives_spanish:
  - Esfuercen
  - Hagan fuertes
  lexicon: HALOT
  rationale: El piel imperativo plural expresa una acción causativa/exhortativa dirigida a otros; «fortalezcan» conserva ese impulso y suena natural en español bíblico contemporáneo.
- source_word: יָדַיִם
  english_pob_choice: hands
  chosen_spanish: las manos
  alternatives_spanish:
  - las manos
  - manos
  lexicon: HALOT
  rationale: «Yadáyim» es un plural/dual concreto; «manos» mantiene la imagen física sin perder claridad en español.
- source_word: רָפוֹת
  english_pob_choice: weak
  chosen_spanish: débiles
  alternatives_spanish:
  - flojas
  - debilitadas
  - sin fuerza
  lexicon: HALOT
  rationale: El adjetivo describe manos sin vigor; «débiles» comunica bien la falta de fuerza y evita una rigidez excesiva en español.
- source_word: וּבִרְכַּיִם
  english_pob_choice: and ... knees
  chosen_spanish: las rodillas
  alternatives_spanish:
  - rodillas
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto en paralelo con «manos»; el valor conjuntivo queda expresado por «y» en la coordinación del verso.
- source_word: כֹּשְׁלוֹת
  english_pob_choice: feeble knees
  chosen_spanish: vacilantes
  alternatives_spanish:
  - tambaleantes
  - que flaquean
  - debilitadas
  lexicon: HALOT
  rationale: El participio femenino plural de כשל evoca rodillas que titubean o ceden; «vacilantes» preserva la imagen dinámica sin forzar un calco demasiado áspero.
- source_word: אַמֵּצוּ
  english_pob_choice: make firm
  chosen_spanish: afiancen
  alternatives_spanish:
  - fortalezcan
  - hagan firmes
  - aseguren
  lexicon: HALOT
  rationale: אמץ no repite exactamente חזק; «afiancen» conserva la variación poética y la idea de hacer estables o firmes las rodillas.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético de Isaías 35:3 y toma como guía la decisión revisada del POB en inglés de evitar una lectura demasiado literal de כשל como «stumbling»; por eso se opta por un adjetivo dinámico en español que conserve la imagen de rodillas que flaquean o vacilan.
  spanish_consistency_notes:
  - Se usa un imperativo plural en segunda persona («Fortalezcan», «afiancen») para reflejar el plural hebreo.
  - 'Se mantiene el paralelismo de miembros corporales concretos: manos / rodillas.'
  - La nota al pie preserva la alternativa semántica documentada en el audit trail inglés y la hace natural para el español.
