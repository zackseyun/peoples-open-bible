translation:
  language: es
  text: El oráculo sobre Babilonia[a], que vio Isaías hijo de Amoz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la carga de Babilonia» o «el pronunciamiento contra Babilonia». El hebreo מַשָּׂא es un encabezamiento profético para un mensaje de peso, a menudo de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא introduce un mensaje profético de peso, a menudo de juicio. «Oráculo» comunica ese género con naturalidad en español y evita la posible ambigüedad de «carga».
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: «Babilonia» es el equivalente español estándar del topónimo y coincide con el valor habitual del nombre en contextos bíblicos.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La relativa introduce la cláusula que modifica al encabezado; «que» es la forma más natural y sobria en español para este registro.
- source_word: חָזָה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - contempló
  - recibió en visión
  lexicon: HALOT
  rationale: El verbo hebreo significa «ver» y se usa para la experiencia profética. «Vio» conserva la literalidad básica sin añadir una interpretación explicativa que el hebreo no explicita.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: HALOT
  rationale: Nombre propio estándar en español para el profeta.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Expresión genealógica directa y natural en español.
- source_word: אָמֽוֹץ
  english_pob_choice: Amoz
  chosen_spanish: Amoz
  lexicon: HALOT
  rationale: Transliteración estándar del nombre propio.
theological_decisions:
- issue: Renderización de מַשָּׂא como encabezamiento profético
  english_pob_reading: '''The oracle concerning Babylon'' instead of the more literal but opaque ''The burden of Babylon.'''
  chosen_spanish_reading: «El oráculo sobre Babilonia»
  alternative_spanish_readings:
  - «La carga de Babilonia»
  - «El pronunciamiento contra Babilonia»
  rationale: Se preserva el valor de encabezamiento profético y su densidad de juicio sin recurrir a una traducción literal que en español sonaría oscura o podría entenderse en sentido no profético. «Sobre» mantiene la relación amplia del genitivo sin estrecharla indebidamente.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; transparency in prophetic superscriptions.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el pasaje muestra alto acuerdo entre el texto base, la traducción inglesa y la revisión automática, por lo que la redacción española sigue de cerca la estructura del hebreo y la decisión léxica auditada de la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «oráculo» para מַשָּׂא conforme al valor de encabezamiento profético documentado.
  - Se usa «Babilonia» en vez de «Babel» por consistencia con el equivalente español estándar del topónimo bíblico.
  - 'Se conserva la estructura breve del hebreo: encabezamiento + cláusula relativa + identificación del vidente.'
