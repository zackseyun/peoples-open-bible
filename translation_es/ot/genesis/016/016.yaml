translation:
  language: es
  text: Abram tenía ochenta y seis años cuando Hagar dio a luz a Ismael a Abram[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para Abram». La preposición hebrea puede entenderse de ambas maneras en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar. Se conserva Abram para mantener continuidad con el texto fuente y con la tradición de transliteración del nombre en esta sección.
- source_word: בֶּן
  english_pob_choice: was ... years old
  chosen_spanish: tenía ... años
  alternatives_spanish:
  - era ... años de edad
  - era de ... años
  lexicon: HALOT
  rationale: En fórmulas de edad, בן expresa una edad absoluta; en español la estructura natural y fiel es 'tenía ... años', no una traducción literal de 'hijo de'.
- source_word: שְׁמֹנִים שָׁנָה וְשֵׁשׁ שָׁנִים
  english_pob_choice: eighty-six years old
  chosen_spanish: ochenta y seis años
  alternatives_spanish:
  - ochenta y seis años de edad
  - ochenta y seis
  lexicon: HALOT
  rationale: La combinación numeral + 'años' forma la edad completa. En español se expresa de manera compacta como 'ochenta y seis años'.
- source_word: בְּ/לֶדֶת
  english_pob_choice: when ... bore
  chosen_spanish: cuando dio a luz
  alternatives_spanish:
  - cuando nació
  - al dar a luz
  lexicon: HALOT
  rationale: El infinitivo constructo con ב introduce una cláusula temporal. 'Cuando dio a luz' comunica el evento de parto de manera natural y fiel.
- source_word: הָגָר
  english_pob_choice: Hagar
  chosen_spanish: Hagar
  alternatives_spanish:
  - Agar
  lexicon: HALOT
  rationale: Se mantiene la transliteración Hagar para corresponder al tratamiento del POB en inglés y al nombre propio del hebreo. 'Agar' es una adaptación tradicional española, pero aquí se prefiere la forma transliterada.
- source_word: אֶת יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ishmael
  lexicon: HALOT
  rationale: Nombre propio adaptado a la forma bíblica natural en español, Ismael, conforme al uso extendido y a la inteligibilidad pública.
- source_word: לְ/אַבְרָֽם
  english_pob_choice: to Abram
  chosen_spanish: para Abram
  alternatives_spanish:
  - a Abram
  - de Abram
  lexicon: HALOT
  rationale: La preposición ל aquí marca la relación del parto con Abram. El audit trail en inglés preserva la alternativa 'for Abram'; en español, 'para Abram' comunica mejor ese matiz relacional y evita una calca menos natural.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; por ello se mantiene el sentido base de la cláusula temporal y la relación de ל con Abram, con adaptación española natural para la fórmula de edad y la preposición relacional.
  spanish_consistency_notes:
  - Se conserva Abram como nombre propio transliterado, y Ismael como forma española estable del mismo nombre.
  - Se usa 'dar a luz' para reflejar el verbo de parto del hebreo sin añadir información no presente.
  - Se prefiere 'para Abram' en el texto principal, dejando 'a Abram' como alternativa en nota por la ambigüedad documentada del hebreo.
