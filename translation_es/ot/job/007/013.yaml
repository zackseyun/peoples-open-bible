  language: en
  yaml_path: translation/ot/job/007/013.yaml
  text: When I say[a], ‘My bed will comfort me[b]; my couch will bear my complaint,’
  footnotes:
  - marker: a
    text: Or 'For I said' or 'If I said.' The Hebrew כִּי can be read in more than one way here; 'When I say' best fits the immediate context and the movement into the next verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'my musing' or 'my meditation' for 'my complaint.' The Hebrew שִׂיחַ can refer to reflective musing or lamenting speech; in Job's context of suffering, 'complaint' is likely.
    reason: lexical_alternative
