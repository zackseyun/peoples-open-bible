  spanish_quality_summary: El español es comprensible, pero «cuando estaban en necesidad» resulta algo poco idiomático, y «fueron beneficiados» suena administrativo. Una formulación más natural y digna sería «cuando estaban necesitados» y «recibieron un beneficio», manteniendo el contraste sin rigidez. También conviene hacer explícita la segunda mitad del paralelismo instrumental con «por esas mismas cosas».
