translation:
  language: es
  text: El día en que presenten meciendo la gavilla[a], ofrecerán un cordero macho sin defecto, de un año, como holocausto para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el omer»; aquí el término probablemente se refiere a la gavilla presentada en el rito de la ofrenda, no meramente a una medida seca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - harán
  - presentarán
  - prepararán
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hacer tiene valor idiomático de realizar u ofrecer un rito. «Ofrecerán» comunica naturalmente la acción cultual sin perder el sentido ritual del hebreo.
- source_word: בְּיוֹם
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - El día
  - En aquel día
  lexicon: HALOT
  rationale: La preposición temporal con «día» se expresa de forma natural en español como «En el día», manteniendo el marco temporal del mandato.
- source_word: הֲנִיפְכֶם
  english_pob_choice: you wave
  chosen_spanish: ustedes mezan
  alternatives_spanish:
  - ustedes ondean
  - ustedes presentan meciendo
  - ustedes alzan y mecen
  lexicon: HALOT
  rationale: El gesto ritual de תנוף/הניף se puede verter como «mecer» o «ondear». «Mezan» conserva la acción física y el sentido técnico del rito; «mecer» podría sonar menos natural en este contexto jurídico-cultual, pero sigue siendo posible.
- source_word: הָעֹמֶר
  english_pob_choice: the sheaf
  chosen_spanish: la gavilla
  alternatives_spanish:
  - el omer
  - la medida
  - la gavilla ofrendada
  lexicon: HALOT
  rationale: En este contexto agrícola-cultual, עֹמֶר apunta a la gavilla presentada en el rito. «Gavilla» comunica el objeto concreto; «omer» sería más transliterado pero menos claro para el lector español.
- source_word: כֶּבֶשׂ
  english_pob_choice: a male lamb
  chosen_spanish: un cordero macho
  alternatives_spanish:
  - un cordero
  - un carnero joven
  lexicon: HALOT
  rationale: כֶּבֶשׂ denota un cordero; el contexto sacrificial y la especificación posterior justifican hacer explícito el sexo con «macho».
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin blemish
  - impecable
  lexicon: HALOT
  rationale: En legislación sacrificial, תָּמִים significa libre de defecto. «Sin defecto» es una fórmula clara, bíblicamente precisa y natural en español.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - en su primer año
  - de su primer año
  lexicon: HALOT
  rationale: La locución idiomática se expresa de manera idiomática y breve en español como «de un año», manteniendo el dato de edad requerido por el texto.
- source_word: לְעֹלָה
  english_pob_choice: as a burnt offering
  chosen_spanish: como holocausto
  alternatives_spanish:
  - como ofrenda quemada
  - como ofrenda totalmente quemada
  lexicon: HALOT
  rationale: Para עֹלָה, «holocausto» es el término bíblico tradicional y técnico en español. Conserva el valor cultual de una ofrenda completamente consumida por el fuego.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se adopta la forma del proyecto en español «Yahvé» para el Tetragrámaton, coherente con la política del POB en español de no ocultar el nombre divino con una sustitución reverencial.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. En español, el estándar del proyecto es «Yahvé», que preserva el nombre del pacto sin recurrir a la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Value of הָעֹמֶר in the ritual context
  english_pob_reading: the sheaf
  chosen_spanish_reading: la gavilla
  alternative_spanish_readings:
  - el omer
  - la medida
  - la gavilla de la ofrenda
  rationale: Aquí עֹמֶר probablemente designa la gavilla presentada en el rito de la cosecha, no solo una medida seca. «Gavilla» mantiene la concreción agrícola y evita la ambigüedad de un mero término de volumen.
  doctrine_reference: Lexical context from Leviticus 23 harvest offering ritual
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios en la última revisión; la redacción española sigue de cerca las decisiones léxicas consolidadas del inglés POB, adaptándolas al uso bíblico-natural del español y preservando la referencia cultual del texto hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto para יהוה.
  - Se usa «holocausto» como término técnico estable para עֹלָה.
  - «Gavilla» traduce el valor contextual de הָעֹמֶר en este rito agrícola, con nota para la alternativa transliterada.
  - «Sin defecto» refleja el valor sacrificial de תָּמִים sin añadir matices no requeridos.
