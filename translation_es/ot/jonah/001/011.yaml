    issue: «¿Qué haremos contigo?» no expresa tan claramente el matiz deliberativo de נַּעֲשֶׂה
    rationale: El hebreo pregunta qué acción deberían tomar. En español bíblico-natural, «¿Qué debemos hacerte?» o «¿Qué hemos de hacer contigo?» comunica mejor esa fuerza que un futuro simple meramente predictivo.
  - severity: medium
    issue: «para que el mar se calme para nosotros» suena poco idiomático
    rationale: Aunque intenta seguir la revisión inglesa «for us», en español esa repetición de «para» resulta torpe. «para que el mar se nos calme» preserva el beneficio para ellos y suena natural.
  - severity: low
