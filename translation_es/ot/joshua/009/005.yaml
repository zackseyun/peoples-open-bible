revisions:
- from: Traían sandalias gastadas y remendadas en sus pies[a], y vestidos gastados sobre sí; y todo el pan de su provisión estaba seco y desmenuzable.
  to: Traían sandalias gastadas y remendadas en sus pies[a], y ropas gastadas encima; y todo el pan de su provisión estaba seco y desmigajado.
  rationale: Se cambió «vestidos» por «ropas» para reflejar mejor el sentido general de שְׂלָמוֹת y evitar una lectura demasiado específica o poco natural. Se reemplazó «sobre sí» por «encima» para mantener la imagen espacial de עֲלֵיהֶם con español más fluido. Se ajustó «desmenuzable» a «desmigajado» porque expresa mejor el estado del pan ya seco y hecho migas, en línea con la justificación léxica del POB. La nota se actualizó para anclar el nuevo término español.
