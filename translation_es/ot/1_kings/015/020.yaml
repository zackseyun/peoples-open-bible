translation:
  language: es
  text: Ben-adad escuchó al rey Asa[a] y envió a los comandantes de los ejércitos que tenía contra las ciudades de Israel, y atacó Ijón, Dan, Abel-bet-Maacá y todo Quinerot[b], contra toda la tierra de Neftalí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo caso al rey Asa». El modismo hebreo puede incluir la idea de escuchar favorablemente y actuar según la petición.
    reason: lexical_alternative
  - marker: b
    text: Quinerot es aquí un nombre de lugar, probablemente una región o distrito, no el sustantivo común «arpas».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמַע אֶל
  english_pob_choice: listened to
  chosen_spanish: escuchó a
  alternatives_spanish:
  - hizo caso a
  - atendió a
  lexicon: HALOT
  rationale: El hebreo שׁמע con אֶל suele expresar oír/escuchar con atención y, en este contexto, aceptar favorablemente la petición. «Escuchó a» suena natural en español y no fuerza la idea de obediencia plena.
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the armies
  chosen_spanish: los comandantes de sus ejércitos
  alternatives_spanish:
  - los capitanes de las tropas
  - los jefes de los ejércitos
  lexicon: HALOT
  rationale: שָׂרִים son jefes o comandantes, y חַיִל en contexto militar alude a fuerzas/ejército. «Comandantes de sus ejércitos» conserva el matiz militar y la relación de pertenencia/subordinación del texto.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that were his
  chosen_spanish: de sus
  alternatives_spanish:
  - que eran suyos
  - bajo su mando
  lexicon: HALOT
  rationale: La frase hebrea indica posesión o pertenencia. En español, «de sus ejércitos» integra esa relación de modo natural en la construcción anterior.
- source_word: עַל עָרֵי יִשְׂרָאֵל
  english_pob_choice: against the cities of Israel
  chosen_spanish: contra las ciudades de Israel
  alternatives_spanish:
  - sobre las ciudades de Israel
  - a las ciudades de Israel
  lexicon: HALOT
  rationale: Con שׁלח + עַל en contexto bélico, el sentido es enviar fuerzas en contra de un objetivo. «Contra» expresa bien la hostilidad implícita.
- source_word: וַיַּךְ
  english_pob_choice: he struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - atacó
  - derrotó
  lexicon: HALOT
  rationale: נכה es amplio, pero aquí implica ataque violento contra ciudades. «Hirió» mantiene la fuerza del verbo sin añadir más especificación de la que el hebreo exige.
- source_word: עִיּוֹן
  english_pob_choice: Ijon
  chosen_spanish: Ijón
  alternatives_spanish:
  - Iyon
  lexicon: HALOT
  rationale: Transliteración estándar del topónimo, adaptada a la ortografía española con tilde por la acentuación natural del nombre.
- source_word: אָבֵל בֵּית מַעֲכָה
  english_pob_choice: Abel-beth-maacah
  chosen_spanish: Abel-bet-Maacá
  alternatives_spanish:
  - Abel-bet-maacá
  - Abel Bet-Maacá
  lexicon: HALOT
  rationale: Nombre compuesto de lugar; «bet» refleja de forma transparente בֵּית («casa de») y «Maacá» conserva el nombre propio con acentuación española.
- source_word: כָּל כִּנְרוֹת
  english_pob_choice: all Chinneroth
  chosen_spanish: todas las de Quinarot[a]
  alternatives_spanish:
  - todo Quinarot
  - toda Quinarot
  - todas las tierras de Quinarot
  lexicon: HALOT
  rationale: La POB inglesa entiende aquí כִּנְרוֹת como topónimo/region y no como sustantivo común. En español, «las de Quinarot» evita confundirlo con una cosa común y permite una lectura colectiva o territorial.
- source_word: עַל כָּל אֶרֶץ נַפְתָּלִי
  english_pob_choice: against all the land of Naphtali
  chosen_spanish: contra toda la tierra de Neftalí
  alternatives_spanish:
  - sobre toda la tierra de Neftalí
  - en toda la tierra de Neftalí
  lexicon: HALOT
  rationale: Se conserva el segundo עַל con el mismo valor hostil/direccional que en la revisión inglesa final, manteniendo la acción militar dirigida contra el territorio.
theological_decisions:
- issue: Valor del verbo שׁמע con אֶל en la relación Ben-adad/Asa
  english_pob_reading: listened to King Asa; the idiom can carry the sense of listening favorably and acting on the request
  chosen_spanish_reading: escuchó a el rey Asa con respuesta favorable implícita
  alternative_spanish_readings:
  - obedeció al rey Asa
  - hizo caso al rey Asa
  rationale: El hebreo permite una respuesta favorable sin implicar necesariamente sumisión política total. «Escuchó a» conserva esa tensión y deja que la acción posterior muestre la respuesta.
  doctrine_reference: No aplica; decisión de semántica narrativa y diplomática.
- issue: Doble uso de עַל en un contexto bélico
  english_pob_reading: against the cities of Israel ... against all the land of Naphtali
  chosen_spanish_reading: contra las ciudades de Israel ... contra toda la tierra de Neftalí
  alternative_spanish_readings:
  - sobre las ciudades de Israel ... sobre toda la tierra de Neftalí
  - a las ciudades de Israel ... a toda la tierra de Neftalí
  rationale: La revisión inglesa final preserva el paralelismo hostil de ambos עַל. El español mantiene esa repetición para no diluir el sentido militar del versículo.
  doctrine_reference: No aplica; decisión de sintaxis y aspecto semántico.
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente que cambió «along with all the land of Naphtali» por «against all the land of Naphtali», manteniendo en español la doble dirección hostil de עַל. También he preservado la lectura toponímica de כִּנְרוֹת y la tendencia de la POB a no suavizar el verbo נכה más allá de lo que exige el español.
  spanish_consistency_notes:
  - Uso «Yahvé» como forma base del proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - 'Mantengo transliteraciones consistentes para topónimos: Ijón, Dan, Abel-bet-Maacá, Quinarot, Neftalí.'
  - Conservo el registro narrativo sobrio y directo, sin añadir explicaciones interpretativas al cuerpo del versículo.
