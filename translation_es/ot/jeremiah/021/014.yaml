translation:
  language: es
  text: Y yo los castigaré[a] según el fruto de sus obras, declara Yahvé; encenderé un fuego en su bosque[b], y el fuego consumirá todo lo que está alrededor de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los visitaré» o «los atenderé»; el verbo hebreo puede tener un sentido más amplio que una acción punitiva, aunque aquí claramente aparece en un contexto de juicio.
    reason: lexical_alternative
  - marker: b
    text: «Su bosque» probablemente alude poéticamente a Jerusalén o a su complejo real o palaciego; algunos entienden «bosque» de manera metafórica como una espesura de edificios o defensas.
    reason: cultural_note
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: los castigaré
  alternatives_spanish:
  - los visitaré
  - los atenderé
  - los llamaré a cuentas
  lexicon: HALOT
  rationale: פקד tiene un campo semántico amplio, pero en este contexto de juicio la fuerza punitiva es la más clara. En español, «castigar» comunica bien esa lectura sin perder la relación de retribución judicial.
- source_word: עֲלֵיכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - sobre ustedes
  - contra ustedes
  lexicon: HALOT
  rationale: La preposición hebrea con פקד se expresa naturalmente en español con objeto directo en un contexto de castigo. «Los» conserva la referencia plural sin sonar forzado.
- source_word: כִּפְרִי
  english_pob_choice: according to the fruit of
  chosen_spanish: según el fruto de
  alternatives_spanish:
  - conforme al fruto de
  - en proporción al fruto de
  lexicon: HALOT
  rationale: כ marca correspondencia o medida. «Según el fruto de» conserva la metáfora y la idea de retribución proporcional a la conducta.
- source_word: מַעַלְלֵיכֶם
  english_pob_choice: your deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  - sus prácticas
  lexicon: HALOT
  rationale: מעללים se refiere a actos o hechos, a menudo con carga moral en contextos proféticos. «Obras» es natural en español bíblico y mantiene la evaluación moral del pasaje.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética puede vertirse de manera directa y digna en español. «Dice Yahvé» es breve, transparente y conserva el nombre divino sin sustituirlo por un título.
- source_word: וְהִצַּתִּי אֵשׁ
  english_pob_choice: I will kindle a fire
  chosen_spanish: prenderé fuego
  alternatives_spanish:
  - encenderé un fuego
  - haré prender fuego
  - avivaré un fuego
  lexicon: HALOT
  rationale: El causativo de יצת expresa encender o prender fuego. «Prenderé fuego» es idiomático en español y mantiene la acción deliberada de juicio.
- source_word: בְּיַעְרָהּ
  english_pob_choice: in her forest
  chosen_spanish: en su bosque
  alternatives_spanish:
  - en su bosque/selva
  - en su arboleda
  lexicon: HALOT
  rationale: יער significa bosque. Se conserva el femenino «su» para reflejar el sufijo del hebreo y la personificación implícita sin resolver el referente metafórico en el texto principal.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y comerá
  lexicon: HALOT
  rationale: Con el fuego como sujeto, אכל funciona metafóricamente como consumir por ardor. «Consumirá» es claro, sobrio y fiel al efecto del hebreo.
- source_word: כָּל סְבִיבֶיהָ
  english_pob_choice: all that is around her
  chosen_spanish: todo lo que la rodea
  alternatives_spanish:
  - todo lo que está alrededor de ella
  - todo su entorno
  lexicon: HALOT
  rationale: La expresión denota todo lo circundante. «Todo lo que la rodea» mantiene la referencia femenina y evita especificar más allá del texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el POB adopta «Yahvé» como forma estándar del nombre divino, preservando la referencia personal y pactal sin reemplazarla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de los sufijos femeninos en «su bosque» y «la rodea»
  english_pob_reading: Preserve the feminine pronoun in English ('her') without resolving the metaphor beyond the text
  chosen_spanish_reading: Conservar el femenino implícito en español sin identificar explícitamente el referente
  alternative_spanish_readings:
  - usar un neutro contextual como «su» sin carga personificada
  - especificar Jerusalén/Sion en el texto principal
  rationale: El hebreo usa sufijos femeninos que aluden naturalmente a una ciudad personificada. Se preserva esa tensión literaria y teológica en español sin sobre-explicar el referente en la línea principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje se mantiene en acuerdo alto con el texto fuente y con la auditoría inglesa. No se detectaron revisiones adicionales que obliguen a modificar la redacción española.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la metáfora de «bosque» y el femenino implícito sin resolverlo interpretativamente en el texto principal.
  - «Castigar» refleja la lectura punitiva de פקד en contexto judicial, sin borrar el rango semántico documentado en la nota.
  - La frase final «todo lo que la rodea» reproduce el alcance inclusivo de כָּל סְבִיבֶיהָ y mantiene la personificación femenina.
