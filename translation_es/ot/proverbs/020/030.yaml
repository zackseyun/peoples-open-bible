base_translation:
  language: en
  yaml_path: translation/ot/proverbs/020/030.yaml
  text: The bruises of a wound cleanse away evil[b][a], and blows cleanse the innermost parts of the belly.
  footnotes:
  - marker: a
    text: Or 'The bruises of a wound purge evil'; the Hebrew verb can carry the sense of scouring or purging.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the chambers of the belly,' a Hebrew expression for the deepest inward parts of a person.
    reason: cultural_note
