  to: y a todas las regiones[a], y a Sampsame, y a los espartanos[b], y a Delos, y a Mindo, y a Sición, y a Caria, y a Samos, y a Panfilia, y a Licia, y a Halicarnaso, y a Cos, y a Side, y a Arad, y a Rodas, y a Fasélide, y a Gortina, y a Cnido, y a Chipre, y a Cirene.
