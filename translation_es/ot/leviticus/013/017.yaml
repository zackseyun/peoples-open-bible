review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: el sacerdote inspecciona, observa el cambio de color del negaʿ, y emite un veredicto de pureza ritual. También preserva correctamente la decisión teológica clave de que el sacerdote declara limpio en vez de sanar. Sin embargo, la cláusula final «limpia es» suena forzada e innecesariamente arcaizante en español moderno, y la nota c introduce confusión al decir «él» cuando el español ya ha feminizado el referente como «mancha».'
  spanish_quality_summary: 'La mayor parte del versículo es clara y natural: «lo examinará», «la mancha se ha vuelto blanca», «declarará limpia la mancha». El principal problema de legibilidad está en «limpia es», que no es la forma más inteligible ni digna en español eclesial contemporáneo. «Está limpia» expresa mejor el veredicto resultante en español natural, sin perder la brevedad. La nota a también conviene ajustarla para reflejar mejor las alternativas del inglés auditado.'
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. «Sacerdote», «blanca» y el tratamiento de pureza ritual están bien. «Mancha» es aceptable para נֶגַע según el expediente inglés, aunque conviene conservar en nota alternativas como «infección», «lesión» o «afección» para reflejar mejor el rango léxico auditado. La decisión «declarará limpia» alinea bien con la racionalidad teológica documentada para וְטִהַר.
  issues:
  - severity: medium
    issue: «limpia es» es poco natural en español actual
    rationale: Aunque intenta imitar la concisión hebrea, en español moderno suena invertido y rígido. «Está limpia» comunica con claridad el veredicto ritual resultante.
  - severity: low
    issue: La nota c dice «limpio/limpia es él», formulación confusa
    rationale: El inglés auditado explica que el pronombre hebreo es masculino singular; la nota española actual mezcla género y referencia de forma poco clara. Debe explicarse sin sugerir un «él» español extraño al contexto.
  - severity: low
    issue: La nota a no refleja bien las alternativas léxicas auditadas para נֶגַע
    rationale: El expediente inglés preserva alternativas como «infection/lesion/affliction» para el sustantivo, mientras la nota a actual trata solo del verbo «ver/examinar». Conviene mantener una nota sobre «mancha» para reflejar el rango léxico relevante.
  revised_spanish_text: Y el sacerdote lo examinará, y he aquí, la mancha[a] se ha vuelto blanca; entonces el sacerdote declarará limpia[b] la mancha; está limpia[c].
