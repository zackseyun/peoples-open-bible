translation:
  language: es
  text: con una mano fuerte y con un brazo extendido[a], porque su amor leal dura para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una mano poderosa y con un brazo extendido».
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce el hebreo hesed, término que suele incluir la idea de amor fiel, leal y de pacto; también puede expresarse como «lealtad de pacto» o «misericordia».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָד
  english_pob_choice: with a ... hand
  chosen_spanish: con mano
  alternatives_spanish:
  - con una mano
  - por mano
  lexicon: HALOT
  rationale: La preposición ב expresa aquí instrumento o medio. En español, la fórmula natural y fiel es «con mano», conservando el giro idiomático del hebreo sin volverlo excesivamente literal con «por mano».
- source_word: חֲזָקָה
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderosa
  - mighty
  lexicon: HALOT
  rationale: El campo semántico es el de fuerza/poder. «Fuerte» es una equivalencia clara y sobria en español; «poderosa» o «mighty» elevan el registro, pero no son necesarias para el sentido básico.
- source_word: וּבִזְרוֹעַ
  english_pob_choice: and an ... arm
  chosen_spanish: y con brazo
  alternatives_spanish:
  - y por brazo
  - y con un brazo
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal hebrea de «brazo» y el valor instrumental de la preposición con «con». Añadir el artículo indefinido sería posible, pero en español la fórmula fluye mejor sin él en esta expresión fija.
- source_word: נְטוּיָה
  english_pob_choice: outstretched
  chosen_spanish: extendido
  alternatives_spanish:
  - tendido
  - alargado
  lexicon: HALOT
  rationale: El participio describe el brazo en posición extendida. «Extendido» comunica con naturalidad la imagen y evita una dureza innecesaria; «tendido» puede sonar menos preciso en este contexto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce el fundamento del refrán. «Porque» expresa de forma directa esa relación causal/explicativa y es plenamente natural en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para siempre». En español, el verbo de continuidad está implícito en el refrán; se preserva la concisión litúrgica con «para siempre».
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su lealtad de pacto
  lexicon: HALOT
  rationale: חֶסֶד tiene una carga de amor fiel, leal y de pacto. «Amor leal» intenta retener ambas dimensiones sin reducirlo solo a «misericordia» ni imponer un tecnicismo excesivo. Se mantiene el possessivo «su» para reflejar el sufijo pronominal.
theological_decisions:
- issue: Cómo traducir חֶסֶד en el refrán de Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal es para siempre
  alternative_spanish_readings:
  - su misericordia es para siempre
  - su lealtad de pacto es para siempre
  - su amor constante es para siempre
  rationale: 'El refrán celebra la benevolencia fiel y duradera de Yahvé en sus actos redentores. «Amor leal» conserva la amplitud teológica de חֶסֶד: amor, fidelidad y permanencia. Otras opciones estrechan el sentido (solo misericordia) o suenan demasiado técnicas.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, con excepción documentada)
- issue: Estructura del refrán con לְעוֹלָם
  english_pob_reading: endures forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - dura para siempre
  - permanece para siempre
  rationale: El hebreo usa una construcción breve y formularia. En español, la repetición litúrgica queda mejor con «para siempre», dejando implícita la continuidad como en el original y evitando una expansión innecesaria.
  doctrine_reference: Translation philosophy §3 (economía y ritmo de fórmulas litúrgicas)
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no se identificaron cambios aplicados en la última pasada; la lectura española sigue de cerca las decisiones inglesas documentadas para בְּיָד, חֲזָקָה, וּבִזְרוֹעַ, נְטוּיָה, כִּי, לְעוֹלָם y חַסְדּוֹ.
  spanish_consistency_notes:
  - Se preserva el paralelismo y el tono refrán del Salmo 136.
  - Se usa «Yahvé» en línea con la convención del proyecto para el nombre divino, aunque este versículo no lo contiene explícitamente.
  - Se mantiene la imagen corporal hebrea («mano», «brazo») sin reinterpretarla alegóricamente.
  - La nota sobre חֶסֶד se ancla en el término traducido para conservar la tensión léxica entre amor, lealtad y misericordia.
