base_translation:
  language: en
  yaml_path: translation/ot/numbers/024/017.yaml
  text: I see him[a], but not now; I behold him, but not near. A star shall come forth from Jacob, and a scepter shall rise from Israel[c][b]; it shall crush the corners of Moab and tear down all the sons of Sheth.
  footnotes:
  - marker: a
    text: Or 'A star rises from Jacob, and a scepter arises from Israel.' The Hebrew uses royal imagery that can be read as referring to a coming ruler.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the corners of Moab,' likely a figurative expression for Moab's extremities or strength.
    reason: cultural_note
  - marker: c
    text: Or 'all the sons of Seth.' The Hebrew שֵׁת may be read as the proper name Seth/Sheth; some understand it more broadly as a poetic designation for humanity or for a hostile people.
    reason: alternative_reading
