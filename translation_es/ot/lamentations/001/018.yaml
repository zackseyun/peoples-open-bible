translation:
  language: es
  text: 'Yahvé es justo, porque yo me he rebelado contra su palabra[a]. Escuchen, por favor, todos los pueblos, y vean mi dolor: mis vírgenes[b] y mis jóvenes varones han ido al cautiverio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su boca»; es decir, lo que él habló o mandó.
    reason: lexical_alternative
  - marker: b
    text: O «mis doncellas» / «mis jóvenes mujeres».
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo y recto
  lexicon: HALOT
  rationale: En este lamento judicial, el adjetivo describe la rectitud de Yahvé al juzgar. «Justo» comunica bien la idea forense y moral en español; «recto» es posible, pero menos natural aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: פִיו
  english_pob_choice: his word
  chosen_spanish: su boca
  alternatives_spanish:
  - su palabra
  - lo que él habló
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su boca». Mantengo la metáfora corporal para transparencia textual, sin borrar la tensión entre literalidad y sentido metonímico; en contexto alude a lo que Yahvé ha dicho o mandado.
- source_word: מָרִיתִי
  english_pob_choice: I have rebelled against
  chosen_spanish: me he rebelado contra
  alternatives_spanish:
  - he sido rebelde contra
  - lo he desafiado
  lexicon: HALOT
  rationale: «Rebelarse contra» reproduce bien la fuerza de מרה y el matiz de resistencia culpable frente a la autoridad divina.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Hear, please
  chosen_spanish: Escuchad, por favor
  alternatives_spanish:
  - Oíd, por favor
  - Escuchen, por favor
  lexicon: HALOT
  rationale: La forma imperativa plural más natural y digna en español bíblico contemporáneo es «Escuchad»; se mantiene la súplica de «por favor».
- source_word: כָל עמים
  english_pob_choice: all peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos de la tierra
  lexicon: HALOT
  rationale: «Pueblos» conserva el valor colectivo de עמים sin imponer una lectura más política que la del hebreo.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y ved
  alternatives_spanish:
  - y mirad
  - y contemplad
  lexicon: HALOT
  rationale: «Ved» conserva el paralelismo con el imperativo anterior y el tono exhortativo poético.
- source_word: מַכְאֹבִי
  english_pob_choice: my pain
  chosen_spanish: mi dolor
  alternatives_spanish:
  - mi sufrimiento
  - mi angustia
  lexicon: HALOT
  rationale: «Dolor» es claro y concreto en español, y refleja adecuadamente el sustantivo de padecimiento del contexto de lamentación.
- source_word: בְּתוּלֹתַי
  english_pob_choice: my virgins
  chosen_spanish: mis vírgenes
  alternatives_spanish:
  - mis doncellas
  - mis jóvenes mujeres
  lexicon: HALOT
  rationale: Se conserva el contenido léxico explícito de בְּתוּלֹתַי. Aunque «doncellas» suaviza el término, «vírgenes» es más transparente y fiel al hebreo.
- source_word: וּבַחוּרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes
  alternatives_spanish:
  - mis muchachos
  - mis mozos
  lexicon: HALOT
  rationale: «Jóvenes» reproduce bien el paralelo con «vírgenes» y mantiene el sentido de la palabra en este contexto sin forzar una precisión etaria innecesaria.
- source_word: הָלְכוּ
  english_pob_choice: have gone
  chosen_spanish: han ido
  alternatives_spanish:
  - se han ido
  - han marchado
  lexicon: HALOT
  rationale: El verbo hebreo es simplemente «ir/andar». «Han ido» evita introducir una causación que no está en la forma verbal, dejando que el contexto de cautiverio aporte la implicación de deportación.
- source_word: בַשֶּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - en cautiverio
  - al exilio
  lexicon: HALOT
  rationale: «Cautiverio» refleja el estado de deportación/ser llevado cautivo y es la forma más natural en español para este contexto militar.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo emplea directamente el Nombre. En español se usa «Yahvé» como forma reverente y reconocible, evitando la sustitución por un título y preservando la identificación del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Metonimia de פִיו ('su boca')
  english_pob_reading: his mouth / his word
  chosen_spanish_reading: su boca
  alternative_spanish_readings:
  - su palabra
  - su mandato
  - lo que él habló
  rationale: La frase hebrea es literalmente corporal, pero funciona metonímicamente para lo dicho o mandado por Yahvé. Mantener «su boca» conserva la textura original y deja visible la tensión entre literalidad y sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «his mouth» a «his word» en la línea principal por naturalidad, pero retuvo la nota literal. En español se preserva la misma tensión: el cuerpo del texto conserva la imagen hebrea «su boca», y la nota explica el sentido metonímico de palabra/mandato. También se siguió la decisión establecida para el Nombre divino y para traducir בְּתוּלֹתַי con un término transparente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el criterio del proyecto para יְהוָה.
  - 'Se conserva el paralelismo poético: justo / porque / me he rebelado / escuchad / ved / mis vírgenes y mis jóvenes / al cautiverio.'
  - No se suaviza «vírgenes», porque el hebreo lo expresa explícitamente y el texto lamenta la pérdida de ese grupo concreto.
