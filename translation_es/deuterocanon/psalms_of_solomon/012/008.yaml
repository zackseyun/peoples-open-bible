revisions:
- from: Que los pecadores perezcan de la presencia de Yahvé una vez por todas, y que los devotos de Yahvé hereden las promesas.
  to: Que los pecadores perezcan de delante de Yahvé una vez por todas[a], y que los devotos[b] de Yahvé hereden las promesas.
  rationale: Se ajustó una frase poco idiomática ('de la presencia') a una formulación española más natural ('de delante de Yahvé') que sigue siendo fiel al griego ἀπὸ προσώπου Κυρίου. También se añadieron las notas léxicas relevantes que el rastro inglés preserva para ἅπαξ y ὅσιοι, sin alterar el sentido principal del verso.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:26:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: mantiene el matiz optativo con ''Que... perezcan / que... hereden'', conserva el artículo en ''los pecadores'', y traduce adecuadamente la segunda mitad con herencia de las promesas. Sin embargo, ''de la presencia de Yahvé'' suena menos natural en español que ''de delante de Yahvé'' o ''de la presencia de Yahvé'', y la ausencia de notas omite alternativas que el rastro inglés preservó para ἅπαξ y ὅσιοι. La revisión propuesta mantiene el sentido fuente con mejor idiomaticidad y preserva las alternativas significativas.'
  spanish_quality_summary: El texto es claro y digno, pero 'perezcan de la presencia de Yahvé' resulta poco idiomático en español bíblico natural; 'perezcan de delante de Yahvé' fluye mejor y conserva el trasfondo de 'del rostro/presencia'. Además, conviene anclar notas para 'una vez por todas' y 'devotos', ya que esas decisiones tienen alternativas léxicas documentadas. El resto del verso lee bien.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Yahvé'' es correcto, ''pecadores'' preserva οἱ ἁμαρτωλοὶ, ''devotos'' sigue la decisión POB para ὅσιοι, y ''hereden las promesas'' respeta el matiz pactal. La única mejora necesaria es una formulación española más natural para ἀπὸ προσώπου Κυρίου y la inclusión de notas léxicas donde el expediente inglés las conserva.'
  issues:
