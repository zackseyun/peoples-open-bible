translation:
  language: es
  text: Así, pues, Antíoco, profundamente afligido en su alma y movido a compasión[a], y habiendo llorado por el autodominio y el gran orden[b] del que había muerto[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «movido a piedad»; literalmente, «vuelto hacia misericordia».
    reason: lexical_alternative
  - marker: b
    text: «Orden» también puede entenderse como «disciplina» o «conducta adecuada».
    reason: lexical_alternative
  - marker: c
    text: O «el difunto» para «el que había muerto».
    reason: lexical_alternative
lexical_decisions:
- source_word: ψυχικῶς
  english_pob_choice: deeply grieved in soul
  chosen_spanish: profundamente afligido en su alma
  alternatives_spanish:
  - interiormente afligido
  - profundamente apenado en su interior
  - afligido de alma
  lexicon: LSJ
  rationale: 'El adverbio intensifica el estado emocional y conserva el elemento explícito de ψυχή. «Profundamente afligido en su alma» mantiene ambos aspectos: intensidad y referencia interior/al alma, sin sonar forzado en español.'
- source_word: ὑπολυπηθεὶς
  english_pob_choice: grieved
  chosen_spanish: afligido
  alternatives_spanish:
  - apenado
  - entristecido
  - dolido
  lexicon: LSJ
  rationale: El participio expresa quedar afectado por tristeza. «Afligido» es natural en español y conserva el tono solemne del pasaje.
- source_word: τραπεὶς ἐπὶ ἔλεος
  english_pob_choice: moved to pity
  chosen_spanish: movido a compasión
  alternatives_spanish:
  - movido a piedad
  - inclinado a misericordia
  - vuelto a la misericordia
  lexicon: LSJ
  rationale: El griego dice literalmente ‘vuelto hacia la misericordia/piedad’. En español, «movido a compasión» comunica bien el cambio interior sin perder el valor afectivo de ἔλεος.
- source_word: δακρύσας
  english_pob_choice: having wept
  chosen_spanish: habiendo llorado
  alternatives_spanish:
  - llorando
  - después de llorar
  - habiendo derramado lágrimas
  lexicon: LSJ
  rationale: El aoristo participial antecede a la frase causal. «Habiendo llorado» preserva la secuencia verbal y el registro formal.
- source_word: διὰ τὴν
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - porque
  lexicon: LSJ
  rationale: Aquí la construcción causal admite varias opciones. «Por» resulta natural en español y conserva la relación causal con sobriedad.
- source_word: τοῦ μετηλλαχότος
  english_pob_choice: the one who had died
  chosen_spanish: el que había muerto
  alternatives_spanish:
  - el difunto
  - el fallecido
  - el muerto
  lexicon: LSJ
  rationale: El participio perfecto se refiere a la persona mencionada como ya muerta. «El que había muerto» sigue de cerca el valor verbal y evita suavizarlo con un eufemismo.
- source_word: σωφροσύνην
  english_pob_choice: self-control
  chosen_spanish: sobriedad
  alternatives_spanish:
  - autodominio
  - sensatez
  - templanza
  lexicon: LSJ
  rationale: El término puede abarcar moderación, dominio propio y juicio sobrio. «Sobriedad» mantiene esa amplitud y enlaza bien con la evaluación moral del difunto.
- source_word: πολλὴν εὐταξίαν
  english_pob_choice: great good order
  chosen_spanish: gran orden
  alternatives_spanish:
  - gran disciplina
  - excelente conducta
  - gran decoro
  lexicon: LSJ
  rationale: εὐταξία puede ser orden, disciplina o conducta ordenada. «Gran orden» es cercano al griego; el adjetivo «gran» refleja πολύν y mantiene abierta la gama semántica.
theological_decisions:
- issue: 'Tono valorativo del difunto: σωφροσύνη / εὐταξία como elogio moral'
  english_pob_reading: The verse commends the deceased's self-control and great good order.
  chosen_spanish_reading: El versículo elogia la sobriedad y el gran orden del difunto.
  alternative_spanish_readings:
  - El versículo elogia el autodominio y la buena conducta del difunto.
  - El versículo destaca la disciplina y el decoro del difunto.
  rationale: 'No hay una cuestión doctrinal compleja, pero sí una decisión de matiz: conviene conservar el elogio moral sin estrechar εὐταξία a una sola virtud. «Gran orden» y «sobriedad» respetan la amplitud del griego.'
  doctrine_reference: Virtudes morales en la literatura sapiencial/deuterocanónica; no aplica doctrina dogmática específica
translation_notes:
  revision_awareness: 'Texto revisado con acuerdo alto en el audit trail inglés: no se registraron cambios de última revisión, y la redacción española sigue de cerca las decisiones léxicas ya estabilizadas, especialmente en el encadenamiento participial y en la amplitud semántica de σωφροσύνη / εὐταξία.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva un registro solemne y bíblico, evitando tanto calco duro como paráfrasis libre.
  - «Compasión» se usa como equivalente idiomático de ἔλεος, sin borrar la alternativa literal «misericordia» documentada en nota.
  - «El que había muerto» mantiene la referencia directa sin eufemismo excesivo.
  - Las notas preservan las alternativas semánticas relevantes que el audit trail inglés documenta para σωφροσύνη y εὐταξία.
