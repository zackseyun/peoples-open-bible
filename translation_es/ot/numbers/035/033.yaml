revisions:
- from: No contaminarás[a] la tierra en la que habitas, porque la sangre contamina la tierra, y no se hará expiación[b] por la tierra a causa de la sangre que fue derramada en ella, excepto por la sangre del que la derramó.
  to: No contaminen[a] la tierra en la que ustedes están, porque la sangre contamina la tierra, y no se hará expiación[b] por la tierra a causa de la sangre que fue derramada en ella, excepto por la sangre del que la derramó.
  rationale: Se corrigió la segunda persona singular a plural para reflejar el hebreo y se reemplazó 'habitas' por 'ustedes están', que reproduce con mayor fidelidad אֲשֶׁר אַתֶּם בָּהּ sin añadir el matiz de 'habitar'. Se mantuvieron 'contaminar' y 'expiación' porque representan bien las decisiones léxicas y teológicas del expediente inglés y suenan naturales en español bíblico contemporáneo.
  reviewer_model: gpt-5.4
