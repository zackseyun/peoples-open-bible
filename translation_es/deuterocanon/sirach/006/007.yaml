  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo y del griego paralelo: adquirir un amigo, hacerlo por medio de prueba, y no confiar apresuradamente en él. Sin embargo, ''mediante prueba'' suena incompleto o poco idiomático en español; el sentido instrumental/circunstancial de בְּנִסָּיוֹן / ἐν πειρασμῷ se expresa mejor como ''mediante una prueba'' o ''poniéndolo a prueba''.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta dos puntos de naturalidad mejorables: ''mediante prueba'' carece de artículo y resulta algo forzado, y ''con rapidez'' es menos idiomático en este tipo de exhortación que ''rápidamente'' o ''demasiado pronto''. Una leve revisión produce un español más natural sin apartarse del texto fuente ni del audit trail inglés.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Amigo' y 'confíes en él' están bien alineados con las decisiones léxicas auditadas. La nota léxica también preserva adecuadamente la alternativa de 'ganar' frente a 'adquirir'.
  issues:
  - severity: medium
    issue: '''mediante prueba'' suena poco idiomático e incompleto'
    rationale: Aunque formalmente posible, en español natural normalmente se diría 'mediante una prueba' o 'poniéndolo a prueba'. El hebreo/greigo hablan de testing/trial, no de una 'prueba' desnuda como sintagma fijo.
  - severity: low
    issue: '''con rapidez'' es menos natural que una formulación adverbial más directa'
    rationale: La idea de וְאַל תְּמַהֵר se comunica mejor en español con 'no confíes en él demasiado pronto' o 'no confíes rápidamente en él'. La redacción actual es entendible, pero algo rígida.
  - severity: low
    issue: La nota al pie usa 'mediante prueba', repitiendo la misma aspereza idiomática
    rationale: Conviene ajustar también la alternativa explicativa para que el aparato crítico mantenga buen español.
  revised_spanish_text: Si adquieres un amigo[a], adquiérelo mediante una prueba, y no confíes en él demasiado pronto.
  revised_footnotes:
