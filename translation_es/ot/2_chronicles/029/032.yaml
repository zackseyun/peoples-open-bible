  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el pueblo reunido
  lexicon: HALOT
  rationale: «Asamblea» preserva el sentido colectivo y público del término hebreo sin introducir un sesgo eclesial propio de «congregación».
- source_word: בָּקָר
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - ganado vacuno
  lexicon: HALOT
  rationale: En esta lista sacrificial, el hebreo apunta a bovinos de mayor tamaño; «toros» conserva la precisión sacrificial que el repaso final del inglés corrigió desde el más genérico «cattle».
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - borregos machos
  lexicon: HALOT
  rationale: Es el equivalente español directo y tradicional para machos de oveja en contexto sacrificial.
- source_word: כְּבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas jóvenes
  - borregos
  lexicon: HALOT
  rationale: «Corderos» mantiene la referencia cultual a animales jóvenes ofrecidos en holocausto y suena natural en español bíblico contemporáneo.
- source_word: לְעֹלָה
