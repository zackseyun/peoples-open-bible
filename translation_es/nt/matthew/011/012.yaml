translation:
  language: es
  text: Pero desde los días de Juan el Bautista hasta ahora, el reino de los cielos sufre violencia[a], y hombres violentos lo arrebatan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el reino de los cielos avanza con fuerza, y hombres violentos se apoderan de él». El verbo griego traducido «sufre violencia» también puede entenderse en sentido medio.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπὸ δὲ
  english_pob_choice: But from
  chosen_spanish: Pero desde
  alternatives_spanish:
  - Y desde
  - Ahora desde
  lexicon: BDAG
  rationale: ἀπό marca punto de inicio y δέ introduce una conexión leve con matiz de transición. «Pero desde» conserva ese giro discursivo sin exagerar el contraste.
- source_word: τῶν ἡμερῶν Ἰωάννου τοῦ βαπτιστοῦ
  english_pob_choice: the days of John the Baptist
  chosen_spanish: los días de Juan el Bautista
  alternatives_spanish:
  - el tiempo de Juan el Bautista
  lexicon: BDAG
  rationale: «Días» reproduce mejor el modismo griego que una abstracción como «tiempo», y «Juan el Bautista» es el equivalente natural y claro en español.
- source_word: ἕως ἄρτι
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el presente
  - hasta este momento
  lexicon: BDAG
  rationale: Es la equivalencia idiomática más natural en español y conserva la continuidad temporal desde Juan hasta el presente del hablante.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  lexicon: BDAG
  rationale: En Mateo, la expresión característica es plural en griego, y en español la forma establecida y fiel es «el reino de los cielos». Mantiene la formulación tradicional sin perder el valor referencial del original.
- source_word: βιάζεται
  english_pob_choice: suffers violence
  chosen_spanish: sufre violencia[a]
  alternatives_spanish:
  - avanza con fuerza
  - es tratado violentamente
  lexicon: BDAG
  rationale: Se adopta en el texto principal la lectura pasiva/causal «sufre violencia», porque preserva la tensión textual documentada por el POB en inglés. «Sufre» en español sostiene bien la idea de recibir violencia.
- source_word: βιασταὶ
  english_pob_choice: violent men
  chosen_spanish: hombres violentos
  alternatives_spanish:
  - personas violentas
  - varones violentos
  lexicon: BDAG
  rationale: El griego está en masculino plural; «hombres violentos» respeta esa forma sin perder la fuerza semántica de βιασταί como personas caracterizadas por la violencia o la fuerza.
- source_word: ἁρπάζουσιν αὐτήν
  english_pob_choice: seize it
  chosen_spanish: lo arrebatan
  alternatives_spanish:
  - lo agarran con violencia
  - lo toman por la fuerza
  lexicon: BDAG
  rationale: ἁρπάζω implica tomar de manera violenta o con ímpetu. «Arrebatan» es natural en español y conserva el matiz de forcejeo sin añadir explicación.
theological_decisions:
- issue: Ambigüedad de βιάζεται aplicada al reino
  english_pob_reading: 'Passive sense in the main text: ''the kingdom of heaven suffers violence'''
  chosen_spanish_reading: 'Sentido pasivo en el texto principal: «el reino de los cielos sufre violencia»'
  alternative_spanish_readings:
  - 'Sentido medio/intransitivo: «el reino de los cielos avanza con fuerza»'
  rationale: La frase griega admite una lectura pasiva y otra media/intransitiva. El texto principal mantiene la lectura pasiva, mientras que la nota preserva la alternativa para no resolver artificialmente una tensión real del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; se conserva el criterio auditado del POB en inglés, con la ambigüedad de βιάζεται preservada en español mediante nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «reino de los cielos» como expresión fija de Mateo, coherente con el audit trail en inglés.
  - Se preserva la tensión interpretativa de βιάζεται en vez de armonizarla con una sola explicación.
  - La nota alternativa usa una forma española natural sin imponer una solución doctrinal.
