translation:
  language: es
  text: 'Por tanto, profetiza y diles: «Así dice el Señor Dios, Yahvé: He aquí, yo abro sus sepulcros y los haré subir[a] de sus sepulcros, pueblo mío[b], y los llevaré a la tierra de Israel»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los levantaré de sus sepulcros». El hebreo literalmente dice: «los haré subir de sus sepulcros».'
    reason: lexical_alternative
  - marker: b
    text: La imagen puede describir la restauración de Israel desde el exilio mediante el lenguaje de abrir sepulcros, y también resonar con la esperanza posterior de resurrección.
    reason: cross_reference
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa la conexión inferencial con lo anterior sin sonar forzado; mantiene el valor lógico de la partícula inicial.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla proféticamente
  - profetiza en voz alta
  lexicon: HALOT
  rationale: Imperativo directo y natural para el mandato profético a Ezequiel.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y les dirás
  - y habla a ellos
  lexicon: HALOT
  rationale: En español, el clítico de objeto indirecto hace la frase más natural sin alterar el valor del mandato.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética convencional; 'Así dice' conserva el tono solemne y la equivalencia funcional.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se mantiene Yahvé por la norma del proyecto. En español, 'Señor Yahvé' evita la combinación artificial 'Señor Dios' y conserva el valor del título compuesto.
- source_word: הִנֵּה אֲנִי
  english_pob_choice: Behold, I
  chosen_spanish: Miren, yo
  alternatives_spanish:
  - He aquí que yo
  - He aquí, yo
  lexicon: HALOT
  rationale: '''Miren'' comunica la fuerza deíctica e imperativa de הִנֵּה en un español actual y digno, sin perder énfasis.'
- source_word: פֹתֵחַ
  english_pob_choice: am opening
  chosen_spanish: abro
  alternatives_spanish:
  - estoy abriendo
  - estoy por abrir
  lexicon: HALOT
  rationale: El participio con énfasis profético se puede expresar de forma simple y viva en español; 'abro' mantiene la acción presente-divina sin introducir perífrasis innecesaria.
- source_word: קִבְרוֹתֵיכֶם
  english_pob_choice: your graves
  chosen_spanish: sus sepulcros
  alternatives_spanish:
  - sus tumbas
  - sus sepulturas
  lexicon: HALOT
  rationale: '''Sepulcros'' conserva el registro solemne y el campo semántico funerario; evita la posible repetición pesada de ''graves'' en español. El posesivo plural de cortesía se usa por concordancia con el contexto corporativo.'
- source_word: וְהַעֲלֵיתִי אֶתְכֶם מִקִּבְרוֹתֵיכֶם
  english_pob_choice: and will bring you up from your graves
  chosen_spanish: y los haré subir de sus sepulcros
  alternatives_spanish:
  - y los levantaré de sus sepulcros
  - y los haré salir de sus sepulcros
  lexicon: HALOT
  rationale: '''Haré subir'' reproduce bien el causativo de העלה y conserva la imagen espacial ascendente del hebreo; ''de sus sepulcros'' refleja el origen del movimiento.'
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: Se invierte el orden por naturalidad y énfasis vocativo en español; 'pueblo mío' suena más bíblico sin ser arcaico.
- source_word: וְהֵבֵאתִי אֶתְכֶם
  english_pob_choice: and I will bring you
  chosen_spanish: y los haré entrar
  alternatives_spanish:
  - y los traeré
  - y los llevaré
  lexicon: HALOT
  rationale: '''Haré entrar'' expresa con precisión el causativo de בוא y prepara bien el complemento final de destino.'
- source_word: אֶל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: into the land of Israel
  chosen_spanish: en la tierra de Israel
  alternatives_spanish:
  - a la tierra de Israel
  - hacia la tierra de Israel
  lexicon: HALOT
  rationale: '''Tierra'' reproduce el valor territorial y teológico de אַדְמָה en contexto de restauración; ''en'' funciona naturalmente con el movimiento de entrada implícito en el verbo.'
theological_decisions:
- issue: Imágenes de sepulcros y ascenso
  english_pob_reading: Retain the concrete resurrection-like language without narrowing it to either purely metaphorical national restoration or a full doctrinal statement of final bodily resurrection.
  chosen_spanish_reading: Conservar el lenguaje concreto de sepulcros y subida, sin resolver en el texto si se trata solo de restauración nacional o también de resonancia de resurrección corporal.
  alternative_spanish_readings:
  - Reducirlo a una metáfora del regreso del exilio
  - Explicarlo como una profecía directa de resurrección física final
  rationale: El hebreo presenta una imagen fuerte y deliberadamente ambigua; la traducción debe preservar esa tensión sin imponer una interpretación interpretativa en el cuerpo del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción
translation_notes:
  revision_awareness: 'Alineado con la última revisión sin cambios: se conserva la imagen de sepulcros/graves y el movimiento ascendente, respetando la formulación profética del texto hebreo y la decisión inglesa de no resolver la tensión entre restauración nacional y resonancia de resurrección.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la norma del proyecto para יהוה.
  - Se mantiene «Señor Yahvé» para reflejar el título compuesto אֲדֹנָי יְהוִה sin recurrir a la convención 'SEÑOR'.
  - El registro es solemne pero fluido en español, evitando arcaísmos innecesarios.
  - Los pronombres y posesivos plurales se ajustan al destinatario corporativo de Israel.
  - «Tierra de Israel» conserva la referencia territorial y de restauración del hebreo.
