translation:
  language: es
  text: ¿Cómo, pues, podrán durar las cosas hechas por ellos? Porque han dejado mentiras y deshonra para los que vienen después.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πῶς τε δὴ
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues,
  alternatives_spanish:
  - ¿Cómo entonces,
  - ¿Cómo, en verdad, pues,
  lexicon: BDAG
  rationale: La partícula interrogativa y el refuerzo inferencial se expresan de forma natural con «cómo, pues», conservando el tono retórico sin cargar el español con calcos excesivos.
- source_word: μέλλει
  english_pob_choice: can ... endure
  chosen_spanish: podrán durar
  alternatives_spanish:
  - podrán mantenerse
  - pueden subsistir
  - han de durar
  lexicon: BDAG
  rationale: El griego plantea la viabilidad futura de lo fabricado; en español, «podrán durar» comunica mejor esa pregunta retórica de permanencia que una traducción futura literal.
- source_word: τὰ ὑπʼ αὐτῶν κατασκευασθέντα
  english_pob_choice: the things made by them
  chosen_spanish: las cosas hechas por ellos
  alternatives_spanish:
  - lo hecho por ellos
  - las cosas fabricadas por ellos
  - las cosas construidas por ellos
  lexicon: BDAG
  rationale: «Hechas» refleja directamente κατασκευασθέντα y mantiene la referencia general a objetos producidos por manos humanas, sin introducir «ídolos» en el texto principal.
- source_word: κατέλιπον
  english_pob_choice: they have left behind
  chosen_spanish: han dejado tras de sí
  alternatives_spanish:
  - han dejado
  - dejaron
  - han abandonado
  lexicon: BDAG
  rationale: «Han dejado tras de sí» conserva el matiz de legado para generaciones posteriores que el contexto pide, mejor que un simple «dejaron».
- source_word: ψεύδη
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: BDAG
  rationale: «Mentiras» es la equivalencia más directa y natural en español para el plural ψεύδη, y encaja con la acusación contra los objetos idolátricos.
- source_word: ὄνειδος
  english_pob_choice: disgrace
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - oprobio
  - desprestigio
  lexicon: BDAG
  rationale: «Vergüenza» comunica bien la idea de reproche público y deshonra; en español lector moderno suena más claro que «oprobio» o «deshonra».
- source_word: τοῖς ἐπιγινομένοις
  english_pob_choice: for those who come after
  chosen_spanish: para los que vienen después
  alternatives_spanish:
  - para las generaciones futuras
  - para los que siguen
  - para la posteridad
  lexicon: BDAG
  rationale: La expresión española reproduce de manera idiomática el sentido de sucesión temporal de τοῖς ἐπιγινομένοις.
theological_decisions:
- issue: Referencia implícita de las cosas hechas por humanos
  english_pob_reading: The phrase refers to idols or cult objects made by human hands.
  chosen_spanish_reading: El texto principal mantiene la referencia general a «las cosas hechas por ellos», entendidas por el contexto como ídolos u objetos de culto.
  alternative_spanish_readings:
  - las cosas hechas por ellos
  - los ídolos hechos por ellos
  - las imágenes fabricadas por ellos
  rationale: El contexto inmediato de la Carta de Jeremías es una denuncia sostenida de los ídolos. Por fidelidad al griego, no se añade «ídolos» al cuerpo del versículo, pero la lectura contextual queda indicada en la decisión teológica.
  doctrine_reference: 'Translation philosophy: original-language primacy; no añadir explicaciones ajenas al texto base.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió κατασκευασθέντα de un matiz más general («prepared») a un rendering más directo («made»). La traducción española adopta ese ajuste con «hechas por ellos» y mantiene el resto del versículo de forma concordante con la lectura final inglesa.
  spanish_consistency_notes:
  - Se conservó el tono retórico de la pregunta sin convertirla en una afirmación.
  - No se introdujo «Yahvé» ni terminología cristológica, porque el versículo no contiene esos términos.
  - Se evitó «señor» o «ídolos» en el texto principal para respetar la economía del griego y el contexto ya disponible en la nota teológica.
