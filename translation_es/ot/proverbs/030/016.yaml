translation:
  language: es
  text: 'Seol[a], y vientre estéril[b]; tierra, nunca saciada de agua; y fuego, que nunca dice[c]: «¡Basta!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sepulcro» o «el reino de los muertos» para «Seol».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la restricción o el cierre del vientre», es decir, un vientre que no da hijos.
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea final es difícil; muchos la entienden como «¡Basta!». Otros han propuesto un sentido relacionado con «riqueza» o «sustancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo en transliteración, porque el concepto no se reduce a una tumba física. «Seol» permite mantener la carga semántica del lugar de los muertos sin aplanarla a «sepulcro».
- source_word: עֹצֶר רָחַם
  english_pob_choice: a barren womb
  chosen_spanish: vientre estéril
  alternatives_spanish:
  - la restricción del vientre
  - un vientre cerrado
  lexicon: HALOT
  rationale: La expresión hebrea alude literalmente a un vientre «restringido/cerrado», es decir, que no da hijos. En español, «vientre estéril» comunica el sentido idiomático con naturalidad y sin añadir más de lo que el proverbio permite.
- source_word: אֶרֶץ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: Aquí el paralelo enumera realidades elementales e insaciables; «tierra» comunica bien ese valor general y evita limitarlo a un territorio específico.
- source_word: לֹא שָׂבְעָה מַּיִם
  english_pob_choice: never satisfied with water
  chosen_spanish: nunca saciada de agua
  alternatives_spanish:
  - nunca satisfecha con agua
  - no se sacia con agua
  lexicon: HALOT
  rationale: «Saciada» conserva el verbo de saciedad del hebreo y su fuerza proverbial. «Nunca saciada de agua» mantiene el ritmo conciso del original.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: Traducción directa y transparente del sustantivo común.
- source_word: לֹא אָמְרָה הוֹן
  english_pob_choice: which never says, “Enough.”
  chosen_spanish: 'que nunca dice: «¡Basta!»'
  alternatives_spanish:
  - 'que nunca dice: «Suficiente»'
  - 'que nunca dice: «¡Ya basta!»'
  - 'que nunca dice: «¡Basta de eso!»'
  lexicon: HALOT
  rationale: El término final es difícil y el POB inglés entiende aquí una negación de suficiencia. En español, «¡Basta!» reproduce bien la idea de límite/culminación que el proverbio exige por paralelismo, sin decidir indebidamente entre las propuestas léxicas alternativas.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל como término conceptual
  english_pob_reading: Sheol rather than 'the grave' or 'the realm of the dead' in the main text
  chosen_spanish_reading: Seol en el texto principal, con nota de alternativa semántica
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: El proverbio usa un término con peso conceptual propio; mantenerlo transliterado evita perder el trasfondo bíblico y deja abierta la gama semántica documentada.
  doctrine_reference: Sabiduría bíblica y antropología del AT; cf. uso de Seol en poesía hebrea
- issue: Valor del final oscuro הוֹן
  english_pob_reading: Many understand it as 'Enough!' Others have proposed a sense related to 'wealth' or 'substance.'
  chosen_spanish_reading: «¡Basta!» en el texto principal, con reconocimiento de la oscuridad del término
  alternative_spanish_readings:
  - «riqueza»
  - «sustancia»
  - «¡Ya basta!»
  rationale: La línea final funciona mejor en el paralelismo de cosas insaciables si se entiende como una exclamación de suficiencia. La traducción conserva la tensión textual sin forzar una solución dogmática.
  doctrine_reference: Crítica textual y semántica hebrea; prudencia exegética en literatura sapiencial
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje permanece en alta concordancia con la fuente hebrea y con el audit trail inglés. Se conservó la solución proverbial para הוֹן como exclamación de suficiencia, por ser la lectura mejor respaldada por el paralelismo y por el POB inglés.
  spanish_consistency_notes:
  - Se usó «Seol» para mantener consistencia terminológica con la tradición de transliterar el término técnico hebreo.
  - «Vientre estéril» evita la formulación más literal pero menos natural «restricción del vientre», aunque la nota preserva esa alternativa.
  - «Tierra» traduce אֶרֶץ en sentido amplio y elemental, coherente con la serie de cosas insaciables.
  - '«Saciada» y «dice: ¡Basta!» conservan la estructura proverbial de negación repetida del hebreo.'
  - Se mantuvo puntuación española con comillas angulares para la cita final.
