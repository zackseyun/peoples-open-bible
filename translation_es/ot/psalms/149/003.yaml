  text: יְהַֽלְל֣וּ שְׁמ֣/וֹ בְ/מָח֑וֹל בְּ/תֹ֥ף וְ֝/כִנּ֗וֹר יְזַמְּרוּ לֽ/וֹ־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/149/003.yaml
  text: Let them praise his name with dancing[c][b][a]; let them make music to him with tambourine and lyre.
  footnotes:
  - marker: a
    text: Or 'with the dance.' The Hebrew מָחוֹל can denote either dancing as an activity or a dance setting/form.
    reason: lexical_alternative
  - marker: b
    text: Or 'sing praises to him.' The verb זמר can refer to sung praise as well as instrumental music-making.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'harp'; the Hebrew כִּנּוֹר more specifically refers to a lyre-like stringed instrument.
    reason: lexical_alternative
