translation:
  language: es
  text: Y reunió a toda Judá y Benjamín, y a los extranjeros[a] con ellos, de Efraín, Manasés y Simeón, porque muchos de Israel se habían pasado a él[b] al ver que Yahvé su Dios estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Extranjeros” traduce el hebreo גֵּרִים: residentes no israelitas que vivían entre el pueblo. Puede entenderse también como “forasteros” o “residentes extranjeros”.'
    reason: lexical_alternative
  - marker: b
    text: 'O más literalmente: “habían caído a él”. El hebreo usa un modismo de adhesión o cambio de bando, es decir, de transferir su lealtad a Asa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: he gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agregó
  lexicon: HALOT
  rationale: קבץ en este contexto describe reunir personas; en español “reunió” conserva la acción concreta y suena natural para una frase narrativa bíblica.
- source_word: כָּל יְהוּדָה וּבִנְיָמִן
  english_pob_choice: all Judah and Benjamin
  chosen_spanish: toda Judá y Benjamín
  alternatives_spanish:
  - todo Judá y Benjamín
  - todo el pueblo de Judá y Benjamín
  lexicon: HALOT
  rationale: Se mantiene el valor metonímico de los nombres territoriales/tribales. “Toda” reproduce bien el hebreo y evita expandir innecesariamente a “el pueblo”.
- source_word: הַגָּרִים
  english_pob_choice: the sojourners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los forasteros
  - los residentes extranjeros
  - los peregrinos
  lexicon: HALOT
  rationale: גר designa personas no nativas residentes entre el pueblo. “Extranjeros” es comprensible y evita el calco algo técnico “sojourners”; aquí se usa una equivalencia funcional por claridad española.
- source_word: עִמָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  lexicon: HALOT
  rationale: La preposición con sufijo expresa acompañamiento; “con ellos” es la equivalencia directa y natural.
- source_word: מֵאֶפְרַיִם וּמְנַשֶּׁה וּמִשִּׁמְעֹן
  english_pob_choice: from Ephraim, Manasseh, and Simeon
  chosen_spanish: de Efraín, Manasés y Simeón
  alternatives_spanish:
  - desde Efraín, Manasés y Simeón
  - procedentes de Efraín, Manasés y Simeón
  lexicon: HALOT
  rationale: מִן indica origen/pertenencia de procedencia. “De” es la solución más natural en español y conserva el vínculo territorial/tribal.
- source_word: נָפְלוּ עָלָיו
  english_pob_choice: had fallen to him
  chosen_spanish: se habían pasado a él
  alternatives_spanish:
  - habían caído a él
  - habían venido a él
  - habían desertado a él
  lexicon: HALOT
  rationale: El hebreo es un giro idiomático de cambio de lealtad. En español, “se habían pasado a él” comunica ese traslado de adhesión sin sonar demasiado literal, preservando la fuerza política del idioma original.
- source_word: מִיִּשְׂרָאֵל לָרֹב
  english_pob_choice: many from Israel
  chosen_spanish: muchos de Israel
  alternatives_spanish:
  - muchos de entre Israel
  - una gran multitud de Israel
  lexicon: HALOT
  rationale: לָרֹב expresa abundancia. “Muchos de Israel” mantiene concisión y naturalidad, sin perder el sentido de número elevado.
- source_word: בִּרְאֹתָם
  english_pob_choice: when they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - porque vieron
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca ocasión/circunstancia. “Al ver” suena fluido en español y conserva esa relación temporal-causal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración “Yahvé”, según la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de él
  lexicon: HALOT
  rationale: El sufijo posesivo se traduce de forma directa. “Su Dios” mantiene la relación de pertenencia y la formulación española bíblica estándar.
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba de su lado
  - lo acompañaba
  lexicon: HALOT
  rationale: La presencia divina se expresa de modo sobrio y directo. “Estaba con él” evita añadir interpretación y conserva el paralelismo con el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide preservarlo como nombre propio en español; “Yahvé” es la forma adoptada para el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido idiomático de נָפְלוּ עָלָיו
  english_pob_reading: had fallen to him
  chosen_spanish_reading: se habían pasado a él
  alternative_spanish_readings:
  - habían caído a él
  - se le habían unido
  - habían desertado a él
  rationale: Aunque la imagen literal es “caer sobre/para”, el contexto político de adhesión a Asa exige conservar la tensión idiomática sin volver el español opaco. “Se habían pasado a él” expresa transferencia de lealtad y respeta la relación semántica del hebreo.
  doctrine_reference: Nota léxica contextual en HALOT para נפל על en usos de adhesión/paso de bando
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se preservó el nombre divino como Yahvé, se evitó sustituir términos clave por equivalentes eclesiásticos más tradicionales cuando el hebreo exige precisión léxica, y se mantuvo la nota de tensión idiomática en נפל על mediante una solución española natural.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se eligió “extranjeros” para גָּרִים por claridad natural en español, con nota explicativa por la posible ambigüedad social-legal del término.
  - Se conservó la metonimia tribal Judá/Benjamín/Efraín/Manasés/Simeón sin expandir a formulaciones interpretativas.
  - La expresión de adhesión política se resolvió con “se habían pasado a él” para preservar el matiz del hebreo sin calco rígido.
