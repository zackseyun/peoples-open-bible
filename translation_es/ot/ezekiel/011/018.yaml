review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: futuro profético (''Vendrán''), adverbio locativo (''allí''), eliminación de objetos impuros, y la distinción entre שִׁקּוּצִים y תּוֹעֲבוֹת. Sin embargo, ''quitarán de allí'' no representa con precisión מִמֶּנָּה (''de ella/de eso'', es decir, del lugar) después de ''vendrán allí'', y produce una repetición menos fiel que ''la quitarán de él/ella'' o ''los quitarán de allí''. Además, ''cosas detestables'' es comprensible pero algo débil/coloquial para el peso del término.'
  spanish_quality_summary: El español es generalmente claro, pero 'todas sus cosas detestables' suena poco digno y algo impreciso. Una formulación como 'todas sus cosas repugnantes' o 'todas sus cosas detestables' puede funcionar, pero en este contexto bíblico 'cosas detestables' queda menos natural que una solución con complemento explícito de extracción. La frase mejora en fluidez y precisión con 'y quitarán de ella todas sus cosas detestables y todas sus abominaciones[a]'.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. La nota léxica sobre שִׁקּוּץ como posible 'ídolos' está bien alineada con la auditoría inglesa. Se preserva la distinción teológica/lexical entre 'cosas detestables' y 'abominaciones'.
  issues:
  - severity: medium
    issue: '''de allí'' para מִמֶּנָּה'
    rationale: El hebreo usa preposición + sufijo pronominal femenino singular ('de ella/de eso'), no simplemente un segundo adverbio locativo. Después de 'Vendrán allí', repetir 'de allí' debilita la referencia al lugar y se aparta del valor pronominal del original.
  - severity: low
    issue: Registro de 'cosas detestables'
    rationale: Es fiel en sentido amplio, pero suena algo llano. Aun así, no exige rehacer la elección principal si se corrige la sintaxis general.
  revised_spanish_text: Vendrán allí y quitarán de ella todas sus cosas detestables y todas sus abominaciones[a].
  revised_footnotes:
  - marker: a
    text: O 'todos sus ídolos'; el hebreo suele referirse a objetos idolátricos detestables.
    reason: lexical_alternative
