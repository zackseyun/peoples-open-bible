review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: relación explicativa con כִּי, participios pasivos con agente implícito hecho explícito por «por él», contraste adversativo, y promesa de heredar אָרֶץ. Sin embargo, se aparta de una decisión clave del POB en יִכָּרֵתוּ: el inglés auditado preserva el modismo judicial/covenantal «will be cut off», mientras que «serán exterminados» lo interpreta de forma más fuerte y menos fiel al hebreo.'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse. «Porque» es aceptable, aunque «Pues» suele encajar mejor en continuidad poética. La principal reparación necesaria es reemplazar «serán exterminados» por una formulación que conserve el modismo hebreo sin sonar torpe en español. Además, la nota de «la tierra» debe corregirse para que la alternativa no repita el mismo término que el texto principal y exprese mejor la oposición «tierra/país» vs. «tierra entera / mundo».
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. La decisión sobre אָרֶץ debe alinearse mejor con el audit trail: el texto principal puede mantener «la tierra», pero la nota debe dar la alternativa equivalente a «la tierra entera» o «la tierra/mundo», no repetir «la tierra». Para יִכָּרֵתוּ conviene «serán eliminados» solo como alternativa de nota o decisión léxica, no como texto principal; el valor preferido es «serán excluidos» o mejor «serán cortados de raíz»/«serán removidos», pero el modismo más fiel y legible aquí es «serán eliminados de la tierra» solo si se explicitara un elemento ausente. Por fidelidad estrecha, «serán cortados» sigue siendo demasiado opaco; «serán arrancados» cambia la imagen. La mejor solución breve y fiel es «serán eliminados» no preserva el modismo; por eso se recomienda «serán destruidos» menos, o mejor «serán suprimidos». Aun así, para mantener el hebraísmo judicial, «serán cortados» con una nota sería ideal, pero como el inglés principal no lleva
    nota aquí, la reparación más equilibrada es «serán excluidos»? No, añade interpretación. Mejor: «serán eliminados» sigue siendo demasiado interpretativo. En español bíblico legible, «serán destruidos» es más natural pero pierde כרת. Por tanto, propongo «serán cortados» como la opción más fiel, aceptando ligera extrañeza poética.'
  issues:
  - severity: high
    issue: «serán exterminados» para יִכָּרֵתוּ sobretraduce el hebreo
    rationale: El nifal de כרת en este contexto significa «ser cortado» / «ser quitado de en medio», con fuerza judicial y covenantal. «Exterminados» intensifica hacia aniquilación total y borra el modismo que el POB inglés preservó deliberadamente.
  - severity: medium
    issue: La nota [a] no preserva bien la alternativa del audit trail
    rationale: El texto principal ya dice «la tierra», pero la nota comienza «O «la tierra»», lo cual no ofrece una alternativa real. Debe reflejar la opción equivalente a «la tierra entera», «el mundo» o «la tierra» en sentido global frente a «la tierra/el país» en sentido territorial.
  - severity: low
    issue: «Porque» es posible, pero «Pues» puede fluir mejor en poesía argumentativa
    rationale: No es error. «Porque» suena más subordinante/causal; «Pues» reproduce con mayor naturalidad el valor discursivo de כִּי = «for» al inicio de un verso conectado al anterior.
