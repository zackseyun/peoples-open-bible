translation:
  language: es
  text: Y saldrán y verán los cadáveres de los hombres que se rebelaron contra mí. Porque su gusano[a] no morirá, y su fuego no se apagará, y serán una abominación[b] para toda carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su larva»; el término hebreo puede referirse a un gusano o una larva.
    reason: lexical_alternative
  - marker: b
    text: O «un horror» o «algo repulsivo».
    reason: lexical_alternative
  - marker: c
    text: «Toda carne» es una expresión hebrea que significa toda la humanidad o todas las personas.
    reason: cultural_note
lexical_decisions:
- source_word: וְיָצְאוּ
  english_pob_choice: And they will go out
  chosen_spanish: Y saldrán
  alternatives_spanish:
  - Y ellos saldrán
  - Y saldrán afuera
  lexicon: HALOT
  rationale: El wayyiqtol plural se vierte naturalmente con futuro simple en español; 'saldrán' conserva el movimiento de salida sin añadir elementos no presentes.
- source_word: וְרָאוּ
  english_pob_choice: and look on
  chosen_spanish: y verán
  alternatives_spanish:
  - y mirarán
  - y contemplarán
  lexicon: HALOT
  rationale: En español, 'verán' mantiene la observación directa del texto. 'Mirarán' sonaría más activo, pero el hebreo aquí puede expresarse de manera simple y directa sin perder el matiz.
- source_word: בְּפִגְרֵי
  english_pob_choice: the corpses of
  chosen_spanish: los cadáveres de
  alternatives_spanish:
  - los cuerpos muertos de
  - los cuerpos sin vida de
  lexicon: HALOT
  rationale: פגר refiere a un cuerpo muerto, cadáver. 'Cadáveres' es claro, digno y fiel al tono severo del pasaje.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los humanos
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino de אִישׁ; se conserva 'los hombres' por fidelidad gramatical y por la concreción del grupo referido.
- source_word: הַפֹּשְׁעִים בִּי
  english_pob_choice: who rebelled against me
  chosen_spanish: que se rebelaron contra mí
  alternatives_spanish:
  - que transgredieron contra mí
  - que pecaron contra mí
  lexicon: HALOT
  rationale: פָּשַׁע expresa rebelión o transgresión con matiz de deslealtad. 'Se rebelaron contra mí' reproduce bien la fuerza relacional y acusatoria del hebreo.
- source_word: תוֹלַעְתָּם
  english_pob_choice: their worm
  chosen_spanish: su gusano
  alternatives_spanish:
  - su lombriz
  - su larva
  lexicon: HALOT
  rationale: El término puede abarcar gusano, larva o maggot. 'Gusano' preserva la amplitud léxica y la resonancia intertextual sin decidir de más sobre la especie.
- source_word: לֹא תָמוּת
  english_pob_choice: will not die
  chosen_spanish: no morirá
  alternatives_spanish:
  - no muere
  - no llegará a morir
  lexicon: HALOT
  rationale: Se mantiene el futuro profético en español. El sujeto femenino singular exige 'morirá' por concordancia con 'gusano'.
- source_word: וְאִשָּׁם
  english_pob_choice: and their fire
  chosen_spanish: y su fuego
  alternatives_spanish:
  - y el fuego de ellos
  - y su incendio
  lexicon: HALOT
  rationale: אֵשׁ con sufijo posesivo se traduce de modo natural como 'su fuego'. La elección conserva el vínculo con los impíos sin sobreexplicar la imagen.
- source_word: לֹא תִכְבֶּה
  english_pob_choice: will not be quenched
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no será apagado
  - no se extinguirá
  lexicon: HALOT
  rationale: כבה aplicado al fuego se puede verter como 'apagarse' en español. Es la forma más natural y fiel al idioma, manteniendo el sentido pasivo.
- source_word: וְהָיוּ
  english_pob_choice: and they will be
  chosen_spanish: y serán
  alternatives_spanish:
  - y llegarán a ser
  - y quedarán
  lexicon: HALOT
  rationale: Verbo copulativo/resultativo simple. 'Serán' conserva la secuencia narrativa y no introduce un cambio de estado que el hebreo no exija explícitamente.
- source_word: דֵרָאוֹן
  english_pob_choice: an abhorrence
  chosen_spanish: una abominación
  alternatives_spanish:
  - un horror
  - algo repulsivo
  lexicon: HALOT
  rationale: El sustantivo raro comunica repulsión y objeto detestable. 'Abominación' es una equivalencia española fuerte y bíblica que conserva el peso nominal del término.
- source_word: לְכָל בָּשָׂר
  english_pob_choice: to all flesh
  chosen_spanish: para toda carne
  alternatives_spanish:
  - para toda la humanidad
  - para todos
  lexicon: HALOT
  rationale: Se preserva la literalidad idiomática de בָּשָׂר como 'carne', manteniendo la amplitud universal de la expresión hebrea y su textura bíblica.
theological_decisions:
- issue: Naturaleza de la imagen de juicio
  english_pob_reading: The verse describes the visible aftermath of divine judgment in terms of corpses, unending worm, and unquenched fire, without specifying in this verse alone a full doctrine of final punishment beyond the imagery stated.
  chosen_spanish_reading: El versículo describe las consecuencias visibles del juicio divino con imágenes de cadáveres, gusano que no muere y fuego que no se apaga, sin cerrar en este versículo por sí solo una doctrina completa del castigo final más allá de la imagen dada.
  alternative_spanish_readings:
  - La imagen es solo simbólica de vergüenza y derrota.
  - La imagen define directamente el mecanismo del castigo eterno consciente.
  rationale: La redacción conserva la materialidad de las imágenes hebreas sin convertirlas prematuramente en una teoría sistemática. Así se respeta la tensión interpretativa documentada por el POB en inglés.
  doctrine_reference: Translation philosophy §3
- issue: Valor de לְכָל בָּשָׂר
  english_pob_reading: '''All flesh'' is a Hebrew expression meaning all people or all humanity.'
  chosen_spanish_reading: '''Toda carne'' mantiene el hebraísmo y remite a toda la humanidad o a todas las personas.'
  alternative_spanish_readings:
  - '''Toda la humanidad'''
  - '''Todas las personas'''
  rationale: Se conserva la expresión semítica para no perder el eco bíblico, pero se explicita su alcance universal para claridad del lector español.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el último paso de revisión indicó que no había cambios necesarios y que existía alto grado de acuerdo con la traducción de referencia en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino; la primera persona divina aparece en 'contra mí'.
  - Se conserva 'carne' para בָשָׂר siguiendo la decisión auditada de mantener la textura hebrea.
  - Se usa 'gusano' en lugar de 'maggot' o 'larva' porque el español bíblico admite la misma amplitud léxica y preserva mejor la intertextualidad.
  - Se evita suavizar 'se rebelaron contra mí' a 'pecaron contra mí' para no perder la fuerza de פָּשַׁע.
