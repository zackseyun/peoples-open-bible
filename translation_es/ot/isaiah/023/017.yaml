    rationale: El texto ya dice «sobre la faz de la tierra[c]», por lo que la nota «O “sobre la faz de la tierra”» no añade información. Debe explicar más bien que el hebreo usa dos términos relacionados pero distintos, aunque en español se haya preferido repetir «tierra» por naturalidad.
