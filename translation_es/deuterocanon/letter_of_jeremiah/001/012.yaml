translation:
  language: es
  text: Les limpian los rostros a causa del polvo de la casa[a], que está sobre ellos en mayor cantidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «que está más sobre ellos»; esto es, polvo acumulado en mayor cantidad sobre ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκμάσσονται
  english_pob_choice: they wipe off
  chosen_spanish: se limpian
  alternatives_spanish:
  - se sacuden
  - se limpian el rostro
  - se enjugan
  lexicon: LSJ
  rationale: El griego expresa una acción concreta de quitar algo de la superficie; en español, 'se limpian' transmite el gesto sin sonar artificial. Se conserva el matiz reflexivo/recíproco implícito en la forma media del verbo.
- source_word: τὸ πρόσωπον αὐτῶν
  english_pob_choice: their faces
  chosen_spanish: el rostro
  alternatives_spanish:
  - sus rostros
  - su rostro
  - la cara
  lexicon: LSJ
  rationale: En este contexto el singular colectivo español puede sonar más natural que el plural, pero se mantiene la referencia al rostro de las imágenes. 'Rostro' conserva el tono más digno que 'cara'.
- source_word: διὰ τὸν ... κονιορτόν
  english_pob_choice: because of the dust
  chosen_spanish: a causa del polvo
  alternatives_spanish:
  - por el polvo
  - debido al polvo
  - a causa del polvo de
  lexicon: LSJ
  rationale: διὰ con acusativo expresa causa. 'Polvo' es el equivalente natural de κονιορτός en español; 'a causa de' mantiene claramente la relación causal.
- source_word: ἐκ τῆς οἰκίας
  english_pob_choice: from the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - de la vivienda
  - del edificio
  - del santuario
  lexicon: LSJ
  rationale: Se mantiene 'casa' porque el griego dice οἰκίας. Aunque el contexto apunta a un recinto idolátrico, 'casa' evita introducir una identificación cultual que no está explicitada en la frase.
- source_word: ὃς ἐστιν πλείω ἐπʼ αὐτοῖς
  english_pob_choice: which is thick upon them
  chosen_spanish: que cae sobre ellos en mayor cantidad
  alternatives_spanish:
  - que está más sobre ellos
  - que está en mayor cantidad sobre ellos
  - que los cubre en abundancia
  lexicon: LSJ
  rationale: πλείω significa 'más' o 'en mayor cantidad'. En español, 'en mayor cantidad' preserva la idea cuantitativa del griego sin forzar un calco como 'más sobre ellos'. La imagen del polvo acumulado queda explícita.
theological_decisions:
- issue: Referente de los pronombres y sátira idolátrica
  english_pob_reading: The pronouns refer to the idols, whose faces are being wiped by others.
  chosen_spanish_reading: Los pronombres remiten a los ídolos, cuyas caras/rostros son limpiados por otros.
  alternative_spanish_readings:
  - Los pronombres podrían entenderse de forma más literal como si ellos mismos se limpiaran el rostro.
  - Podría leerse de manera impersonal sin especificar quién limpia.
  rationale: El contexto inmediato es una sátira contra los ídolos; por eso el español debe permitir entender que el cuidado lo realizan otras personas, no los ídolos mismos. La redacción evita atribuirles agencia propia y preserva el efecto irónico del pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios en el último pase. No se registran revisiones aplicadas al texto fuente; la presente propuesta sigue la lectura estable del griego de Swete 1909 y conserva la alternativa léxica documentada para πλείω.
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' fuera del versículo porque no aparecen en el texto.
  - Se evitó 'templo' o 'santuario' para οἰκίας, conforme al audit trail inglés.
  - Se prefirió 'rostro' en lugar de 'cara' por registro bíblico, aunque el plural 'rostros' también sería posible según el referente colectivo.
  - La nota al pie conserva la tensión entre el valor comparativo literal de πλείω y su sentido contextual de acumulación abundante.
