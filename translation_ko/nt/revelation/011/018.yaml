  text: 또 만국이 분노하였고, 주의 진노가 임하였으며, 죽은 자들이 심판받을 때, 곧 주의 노예들 예언자들과 성도들과 주의 이름을 경외하는 자들, 작은 자나 큰 자나 그들에게 상을 주실 때, 또 땅을 멸하는 자들을 멸하실 때가 임하였나이다.
