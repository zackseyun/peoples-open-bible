translation:
  language: es
  text: Que Yahvé corte todos los labios lisonjeros[b], la lengua que habla grandes cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente «grandes cosas»; en este contexto, es decir, afirmaciones jactanciosas o arrogantes.
    reason: lexical_alternative
  - marker: b
    text: O «labios suaves»; la imagen hebrea es de habla lisa y halagadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְרֵת
  english_pob_choice: may ... cut off
  chosen_spanish: Que Yahvé corte
  alternatives_spanish:
  - Que Yahvé quite
  - Que Yahvé destruya
  - Cortará
  lexicon: HALOT
  rationale: 'El hebreo es un yiqtol con fuerza volitiva en un contexto imprecatorio, por lo que en español conviene una forma desiderativa: «Que Yahvé corte». Mantiene el valor de petición/judicio sin volverlo una simple predicción.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrama con la forma de uso estable del proyecto en español: «Yahvé». Evita la sustitución por un título y mantiene la referencia al nombre personal del pacto.'
- source_word: שִׂפְתֵי חֲלָקוֹת
  english_pob_choice: flattering lips
  chosen_spanish: labios lisonjeros
  alternatives_spanish:
  - labios suaves
  - labios halagadores
  - labios lisos
  lexicon: HALOT
  rationale: La imagen literal es «labios de suavidad/suavidad resbaladiza». En español, «lisonjeros» comunica bien el sentido idiomático de habla aduladora y manipuladora, sin perder la valoración negativa. Se evita «suaves» por sonar demasiado general.
- source_word: לָשׁוֹן
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua
  - una lengua
  - toda lengua
  lexicon: HALOT
  rationale: Se traduce con el sustantivo singular concreto «la lengua», que en español conserva la personificación de la facultad de hablar y enlaza naturalmente con el participio siguiente.
- source_word: מְדַבֶּרֶת
  english_pob_choice: that speaks
  chosen_spanish: que habla
  alternatives_spanish:
  - que dice
  - hablante
  lexicon: HALOT
  rationale: El participio describe a «la lengua»; en español la relativa simple «que habla» reproduce con naturalidad la función atributiva sin sobrecargar la frase.
- source_word: גְּדֹלוֹת
  english_pob_choice: great things
  chosen_spanish: grandes cosas
  alternatives_spanish:
  - cosas grandiosas
  - cosas altivas
  - cosas jactanciosas
  lexicon: HALOT
  rationale: Se mantiene la literalidad semántica de «grandes cosas» para respetar la imagen hebrea. En contexto, la expresión implica jactancia o arrogancia, pero se conserva esa tensión en el texto principal y se explicita en la nota.
theological_decisions:
- issue: Función imprecatoria del verbo en el inicio del verso
  english_pob_reading: May Yahweh cut off ...
  chosen_spanish_reading: Que Yahvé corte ...
  alternative_spanish_readings:
  - Yahvé cortará ...
  - Yahvé corte ...
  rationale: La secuencia poética expresa una súplica/judicio deseado contra la habla perversa, no una mera predicción. «Que Yahvé corte» conserva esa fuerza oracional y el tono imprecatorio del salmo.
  doctrine_reference: Salmos imprecatorios; pragmática del yiqtol en poesía hebrea
- issue: Valor de גְּדֹלוֹת en contexto
  english_pob_reading: Literally 'great things'; that is, boastful or arrogant claims.
  chosen_spanish_reading: grandes cosas[b]
  alternative_spanish_readings:
  - cosas jactanciosas
  - cosas arrogantes
  - cosas grandiosas
  rationale: Se retiene la traducción literal en el cuerpo del texto para no borrar la ambigüedad poética. La nota aclara que, en este contexto, la expresión alude a afirmaciones jactanciosas o arrogantes.
  doctrine_reference: Poética hebrea; semántica contextual
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión adicional. Se mantiene la fuerza imprecatoria del verbo, el nombre divino como Yahvé, y la tensión poética de «grandes cosas» con aclaración en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - «La lengua» conserva la personificación hebrea y concuerda con el participio relativo.
  - «Labios lisonjeros» comunica el sentido idiomático de שִׂפְתֵי חֲלָקוֹת sin volverlo excesivamente explicativo.
  - Se conserva la literalidad de «grandes cosas» para respetar la imagen poética y se aclara su carga semántica en nota.
