  revised_footnotes:
  - marker: a
    text: O, más idiomáticamente, «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se cambia 'esclavo' por 'siervo' para respetar la decisión contextual documentada para עֶבֶד en el título honorífico de Moisés. Se corrige 'lo dio' a 'la dio' por concordancia natural con el referente implícito femenino ('la tierra' / 'la región'). Se mantiene 'los derrotaron' como una opción española natural aceptable para el resumen militar, y se conserva la nota sobre 'los hijos de Israel'.
