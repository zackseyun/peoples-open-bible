revisions:
- from: Pero si no es redimida antes de que se cumpla un año completo para él[a], entonces la casa que está en una ciudad que no tiene muralla quedará establecida permanentemente para el comprador, por todas sus generaciones[b]; no saldrá en el Jubileo.
  to: Pero si no es redimida antes de que se cumpla para ella[a] un año completo, entonces la casa que está en una ciudad que no tiene muralla pasará permanentemente al comprador, por todas sus generaciones[b]; no saldrá en el Jubileo.
  rationale: Se corrige el referente pronominal para reflejar adecuadamente el sufijo hebreo en contexto ('para ella', referido a la casa/venta) y se reemplaza 'quedará establecida permanentemente' por 'pasará permanentemente' para expresar con más claridad en español la fijación legal de la venta que documenta la auditoría inglesa para וְקָם + לַצְּמִיתֻת. Se conserva 'no saldrá en el Jubileo' con nota explicativa, en línea con la filosofía POB.
