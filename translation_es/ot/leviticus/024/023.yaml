  language: en
  yaml_path: translation/ot/leviticus/024/023.yaml
  text: So Moses spoke to the sons of Israel[a], and they brought the one who had cursed outside the camp and stoned him with stones. Thus the sons of Israel did as Yahweh had commanded Moses.
  footnotes:
