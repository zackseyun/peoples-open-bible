translation:
  language: es
  text: Porque la madre de los siete jóvenes soportó las torturas de cada uno de sus hijos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «los suplicios del potro infligidos a cada uno de sus hijos», pues el término griego puede denotar tortura por medio del potro.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: LSJ
  rationale: μήτηρ designa literalmente a la madre; «madre» conserva el registro formal y el valor afectivo del contexto.
- source_word: τῶν ἐπτὰ νεανίσκων
  english_pob_choice: of the seven young men
  chosen_spanish: de los siete jóvenes
  alternatives_spanish:
  - de los siete muchachos
  - de los siete varones jóvenes
  lexicon: LSJ
  rationale: νεανίσκοι refiere a jóvenes varones; «jóvenes» es natural en español y mantiene la referencia de edad y género sin sobretraducir a «hijos».
- source_word: ὑπήνεγκεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - padeció
  - aguantó
  lexicon: LSJ
  rationale: El verbo expresa resistencia bajo sufrimiento; «soportó» conserva la idea de cargar con dolor de manera sobria y idiomática.
- source_word: στρέβλας
  english_pob_choice: tortures
  chosen_spanish: las torturas
  alternatives_spanish:
  - los tormentos
  - las torturas del potro
  lexicon: LSJ
  rationale: στρέβλα puede aludir a tortura en general o al potro de suplicio; aquí «torturas» sigue la decisión inglesa de evitar una especificación demasiado estrecha no exigida por el texto.
- source_word: τὰς ἐφʼ ἑνὶ ἑκάστῳ τῶν τέκνων
  english_pob_choice: of each one of her children
  chosen_spanish: de cada uno de sus hijos
  alternatives_spanish:
  - para cada uno de sus hijos
  - sobre cada uno de sus hijos
  lexicon: LSJ
  rationale: La construcción distributiva indica que las torturas recaen individualmente sobre cada hijo. «De cada uno de sus hijos» reproduce esa distribución con español claro y sin añadir una preposición interpretativa no explicitada por el griego.
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó «inflicted on» para no añadir algo no explícito en el griego y dejó la frase como «the tortures of each one of her children». La propuesta española sigue esa revisión, manteniendo la distribución sobre cada hijo sin introducir una acción adicional no atestiguada.
  spanish_consistency_notes:
  - Se mantuvo «torturas» para conservar la amplitud semántica del griego στρέβλας y evitar fijar indebidamente el instrumento de suplicio.
  - Se eligió «hijos» en lugar de «niños» porque τέκνα en este contexto remite a la filiación de los siete jóvenes con la madre, no a la edad infantil.
  - La puntuación con coma inicial no es necesaria en español; la oración fluye con «Porque».
