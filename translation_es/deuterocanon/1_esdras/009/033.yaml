translation:
  language: es
  text: 'Y de los hijos de Asom[a]: Maltannaios, Matatías, Sabannaious, Eleiphalat, Manasés[b] y Shimei.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego lee «Asom». El paralelo hebreo probablemente corresponde a «Hasum».
    reason: alternative_reading
  - marker: b
    text: Varios nombres de esta lista reflejan formas griegas que no coinciden exactamente con la tradición hebrea paralela; el texto principal sigue el testimonio griego de 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y entre los hijos de
  - Y de los descendientes de
  lexicon: LSJ
  rationale: La frase introduce otro grupo familiar dentro de una lista. En español, 'de los hijos de' reproduce con naturalidad la relación de pertenencia sin forzar una construcción más literal que sonaría extraña.
- source_word: Ἀσόμ
  english_pob_choice: Asom
  chosen_spanish: Asom
  alternatives_spanish:
  - Hasum
  lexicon: LSJ
  rationale: Se conserva la forma griega del testigo principal de 1 Esdras. Aunque el paralelo hebreo probablemente corresponda a Hasum, la fuente primaria aquí es el griego, por lo que el nombre se translitera desde esa forma.
- source_word: Μαλτανναῖος
  english_pob_choice: Maltannaios
  chosen_spanish: Maltannaios
  alternatives_spanish:
  - Maltanneo
  - Matanías
  lexicon: LSJ
  rationale: Nombre propio preservado en griego. Se translitera la forma griega, sin armonizarla con una posible equivalencia hebrea, para respetar el testimonio principal.
- source_word: Ματταθίας
  english_pob_choice: Mattathias
  chosen_spanish: Mattatías
  alternatives_spanish:
  - Matatías
  lexicon: LSJ
  rationale: Se adopta una transliteración española clara y reconocible del nombre griego, manteniendo cercanía fonética y legibilidad bíblica.
- source_word: Σαβανναιούς
  english_pob_choice: Sabannaious
  chosen_spanish: Sabannaious
  alternatives_spanish:
  - Sabanaeus
  - Zabad
  lexicon: LSJ
  rationale: Se mantiene la forma griega transliterada, porque el testigo griego presenta un nombre no alineado de manera exacta con la tradición hebrea paralela.
- source_word: Ἐλειφαλὰτ
  english_pob_choice: Eleiphalat
  chosen_spanish: Eleiphalat
  alternatives_spanish:
  - Elifalat
  - Elifelet
  lexicon: LSJ
  rationale: Transliteración de la forma griega del nombre propio. Se evita normalizarlo al equivalente hebreo para no borrar la huella del testigo principal.
- source_word: Μανασση
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  - Manasés
  lexicon: LSJ
  rationale: Se usa la forma española bíblica más establecida y natural. Aunque el griego permita una transliteración más mecánica, 'Manasés' es plenamente reconocible y fiel al nombre.
- source_word: Σεμεεί
  english_pob_choice: Shimei
  chosen_spanish: Shimei
  alternatives_spanish:
  - Semeei
  - Simeí
  lexicon: LSJ
  rationale: Se sigue la normalización del audit trail inglés hacia el nombre bíblico conocido en el paralelo hebreo. En español, 'Shimei' conserva esa identificación mejor que una transliteración rígida del griego.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de Swete como fuente primaria y refleja el estado de revisión más reciente sin cambios sustantivos; la lista de nombres conserva las formas griegas donde el audit trail inglés las preserva y solo normaliza 'Manasés' y 'Shimei' por legibilidad e identificación bíblica.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio para conservar el enlace de lista.
  - Los nombres propios se presentan en transliteración española uniforme y sin puntuación adicional dentro de la lista.
  - Se evita sustituir sistemáticamente por formas hebreas cuando el griego es la fuente primaria, salvo en el caso de 'Shimei' ya normalizado en el audit trail inglés.
