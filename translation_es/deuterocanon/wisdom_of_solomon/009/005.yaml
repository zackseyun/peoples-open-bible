review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien los elementos principales del griego: ὅτι como «porque», δοῦλος / παιδίσκη con lenguaje de esclavitud, ἄνθρωπος ἀσθενής como autodescripción de debilidad humana, y νόμων en plural. Sin embargo, dos giros no representan con suficiente fidelidad ni naturalidad la segunda mitad del verso: «de poca duración» suena impropio para ὀλιγόχρονιος aplicado a una persona, y «con menos entendimiento para juzgar y para las leyes» reconfigura κρίσεως de sustantivo a infinitivo y produce una construcción española poco idiomática. Conviene reflejar mejor la idea de vida breve y de insuficiencia de entendimiento respecto del juicio y las leyes.'
  spanish_quality_summary: El español es generalmente claro, pero «hombre débil y de poca duración» suena antinatural en registro bíblico moderno; «de vida breve» o «de pocos años» lee mucho mejor. Además, «con menos entendimiento para juzgar y para las leyes» resulta forzado y algo confuso. Una formulación como «falto de entendimiento del juicio y de las leyes» o «con poco entendimiento del juicio y de las leyes» es más natural y más cercana a la estructura griega.
  glossary_alignment: Alinea correctamente δοῦλος con «esclavo» y παιδίσκη con «esclava», conforme a la política del proyecto. No hay términos teológicos mayores en disputa aquí. La revisión propuesta mantiene esa terminología y mejora la correspondencia de ὀλιγόχρονιος, κρίσεως y ἐλάσσων sin apartarse del expediente léxico inglés.
  issues:
  - severity: medium
    issue: «de poca duración» para ὀλιγόχρονιος
    rationale: Aunque transmite brevedad, en español se aplica de modo extraño a una persona. «De vida breve» conserva el sentido de mortalidad breve de forma natural y digna.
  - severity: medium
    issue: «con menos entendimiento para juzgar y para las leyes» reestructura el original y suena poco idiomático
    rationale: El griego tiene «ἐλάσσων ἐν συνέσει κρίσεως καὶ νόμων», con κρίσεως y νόμων como complementos nominales. La redacción actual convierte κρίσις en acción verbal («juzgar») y deja «para las leyes» desajustado. Una formulación nominal como «falto de entendimiento del juicio y de las leyes» preserva mejor el original.
  - severity: low
    issue: La nota b introduce «justicia» donde el texto principal trabaja con «juicio»
    rationale: Eso puede desalinear innecesariamente la nota con la decisión léxica principal para κρίσις. Conviene mantener «juicio» en la alternativa o explicar mejor el matiz.
  revised_spanish_text: porque yo soy tu esclavo y el hijo de tu esclava[a], hombre débil y de vida breve, y falto de entendimiento del juicio y de las leyes[b];
  revised_footnotes:
