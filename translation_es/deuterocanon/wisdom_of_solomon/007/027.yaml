review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: la Sabiduría, siendo una, puede todo; permaneciendo en sí misma, renueva todas las cosas; y al pasar a almas santas de generación en generación, hace de ellas amigos de Dios y profetas. Sin embargo, hay dos desajustes relevantes: (1) la nota [a] está anclada en «una», pero el contenido de la nota corresponde a καινίζει («renueva / hace nuevas»), no a μία; (2) «amigas de Dios» introduce una feminización semántica no exigida por φίλους θεοῦ y además puede sonar restrictiva, ya que el referente son «almas santas» en sentido genérico, no necesariamente femenino.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la secuencia «pasando de generación en generación a almas santas» resulta algo menos natural que «pasando a almas santas de generación en generación». También conviene usar «amigos de Dios» como plural inclusivo y más idiomático en registro bíblico general. El resto fluye bien y conserva la personificación femenina de Sabiduría sin sobreexplicarla.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «almas», «profetas» y la personificación femenina están bien encaminados. La principal corrección terminológica es evitar que el femenino gramatical de «almas» fuerce «amigas» para φίλους, ya que el griego usa el plural masculino estándar para ‘friends’ y el sentido es genérico.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «una», pero su contenido explica «hace nuevas todas las cosas».
    rationale: La alternativa lexical documentada corresponde a τὰ πάντα καινίζει, no a μία. Tal como está, la nota induce a error sobre qué palabra griega está siendo comentada.
  - severity: medium
    issue: «Amigas de Dios» no refleja bien el valor genérico de φίλους θεοῦ.
    rationale: 'El uso de «amigas» depende del género gramatical de «almas», pero el sentido del griego es inclusivo/genérico: las almas llegan a ser ‘amigos de Dios y profetas’. «Amigos» preserva mejor la formulación tradicional y evita una inferencia femenina innecesaria.'
  - severity: low
    issue: El orden «pasando de generación en generación a almas santas» es menos natural en español.
    rationale: 'Aunque comprensible, la colocación de la frase adverbial suena más fluida si se une primero el movimiento hacia «almas santas» y luego la repetición temporal: «pasando a almas santas de generación en generación».'
  revised_spanish_text: Aunque es una, puede hacerlo todo, y permaneciendo en sí misma renueva[a] todas las cosas; y pasando a almas santas[b] de generación en generación, las hace amigos de Dios y profetas;
  revised_footnotes:
  - marker: a
    text: O «hace nuevas todas las cosas». El verbo griego puede significar renovar o hacer nuevo.
    reason: lexical_alternative
  - marker: b
    text: O «entrando en almas santas». El participio describe el movimiento de la Sabiduría hacia sucesivas almas santas a lo largo de las generaciones.
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación de la nota lexical para que comente el verbo «renueva», que es donde corresponde la alternativa «hace nuevas». También se mejoró el orden sintáctico de la frase participial para mayor naturalidad en español y se sustituyó «amigas de Dios» por «amigos de Dios» para reflejar mejor el valor genérico de φίλους θεοῦ sin imponer un femenino semántico no presente en el original.
