revisions:
- from: y que toda la tierra que posean[a] les sea libre de tributo; y que los caldeos[b] dejen las aldeas de los judíos que tienen bajo su control.
  to: y que toda la tierra que posean[a] esté exenta de tributo para ellos; y que los caldeos[b] dejen las aldeas judías que retienen.
  rationale: Se ajustó la primera cláusula a una formulación más natural en español jurídico-narrativo («esté exenta de tributo para ellos»). En la segunda, se eliminó la ambigüedad del relativo haciendo que la acción de retener recaiga inequívocamente sobre «las aldeas». «Aldeas judías» reproduce de forma natural «las aldeas de los judíos» en este contexto posesivo, y «retienen» expresa bien el matiz de control persistente de διακρατοῦσιν sin perífrasis pesada.
