translation:
  language: es
  text: Y era muy hermosa en apariencia y hermosa de ver; y Manasés, su marido, le había dejado oro y plata, y siervos y siervas[a], y ganado y campos; y ella seguía al frente de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavos y esclavas». Los términos griegos pueden denotar dependientes domésticos como parte del patrimonio de la casa.
    reason: lexical_alternative
  - marker: b
    text: O «seguía sobre ellos» o «continuaba administrándolos». La expresión griega es algo ambigua acerca de si enfatiza posesión, administración o ambas.
    reason: alternative_reading
lexical_decisions:
- source_word: καλὴ
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bonita
  - bella
  lexicon: LSJ
  rationale: En καλὴ τῷ εἴδει, el adjetivo describe atractivo físico, no bondad moral. «Hermosa» es natural en español y conserva ese valor descriptivo.
- source_word: τῷ εἴδει
  english_pob_choice: in appearance
  chosen_spanish: en apariencia
  alternatives_spanish:
  - en forma
  - en figura
  lexicon: LSJ
  rationale: εἶδος aquí apunta a la forma externa o lo visible. «En apariencia» comunica con claridad ese sentido visual.
- source_word: ὡραία
  english_pob_choice: lovely
  chosen_spanish: encantadora
  alternatives_spanish:
  - hermosa
  - bella
  lexicon: LSJ
  rationale: La palabra intensifica y varía el primer adjetivo. «Encantadora» evita repetición de «hermosa» y mantiene la apreciación estética positiva.
- source_word: τῇ ὄψει
  english_pob_choice: to behold
  chosen_spanish: de ver
  alternatives_spanish:
  - para mirar
  - a la vista
  lexicon: LSJ
  rationale: ὄψις se refiere a la percepción visual. «De ver» reproduce de manera natural en español la idea de «lovely to behold» y mantiene el énfasis visual.
- source_word: σφόδρα
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: LSJ
  rationale: El adverbio intensifica toda la descripción. «Muy» es fiel, directo y idiomático.
- source_word: ὑπελείπετο
  english_pob_choice: had left
  chosen_spanish: le había dejado
  alternatives_spanish:
  - había dejado atrás
  - le había legado
  lexicon: LSJ
  rationale: El verbo indica que el esposo dejó bienes a su esposa. «Le había dejado» expresa la acción anterior sin introducir un matiz testamentario demasiado específico.
- source_word: παῖδας
  english_pob_choice: male servants
  chosen_spanish: siervos varones
  alternatives_spanish:
  - criados varones
  - esclavos varones
  lexicon: LSJ
  rationale: En una lista patrimonial con παιδίσκας, el término designa dependientes domésticos. «Siervos varones» conserva la distinción de género y mantiene una fuerza socialmente más marcada que «criados».
- source_word: παιδίσκας
  english_pob_choice: female servants
  chosen_spanish: siervas
  alternatives_spanish:
  - criadas
  - esclavas
  lexicon: LSJ
  rationale: La contraparte femenina de παῖδας se traduce de modo paralelo. «Siervas» es breve y mantiene el paralelismo de estatus y género.
- source_word: κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales
  - bestias de carga
  lexicon: LSJ
  rationale: κτήνη denota animales de propiedad doméstica o de trabajo. «Ganado» es el equivalente más natural en español general para este inventario de bienes.
- source_word: ἀγρούς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - tierras
  - terrenos
  lexicon: LSJ
  rationale: ἀγροί son campos o parcelas cultivadas. «Campos» es directo y conserva la referencia agrícola.
- source_word: ἔμενεν ἐπʼ αὐτῶν
  english_pob_choice: she remained over them
  chosen_spanish: permanecía sobre ellos
  alternatives_spanish:
  - seguía al frente de ellos
  - los administraba
  lexicon: LSJ
  rationale: La expresión griega es ambigua entre posesión, permanencia y administración. «Permanecía sobre ellos» sigue de cerca la estructura y deja abierta esa ambigüedad.
theological_decisions:
- issue: Término para παῖδας / παιδίσκας en un inventario de bienes
  english_pob_reading: male servants and female servants
  chosen_spanish_reading: siervos varones y siervas
  alternative_spanish_readings:
  - esclavos varones y esclavas
  - criados varones y criadas
  rationale: En este contexto patrimonial, el pasaje enumera bienes del patrimonio heredado. Mantener «siervos/siervas» conserva la fuerza social del término sin fijar más de lo que el inventario exige; la alternativa más fuerte «esclavos» queda disponible por la tensión lexical, pero no se impone en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table on δοῦλος'
- issue: Sentido de ἔμενεν ἐπʼ αὐτῶν
  english_pob_reading: she remained over them
  chosen_spanish_reading: permanecía sobre ellos
  alternative_spanish_readings:
  - seguía al frente de ellos
  - continuaba sobre ellos
  rationale: La frase puede sugerir continuidad de posesión, supervisión o administración. La redacción escogida conserva la ambigüedad y no la resuelve en exceso.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete y mantiene el mismo perfil semántico que el audit trail inglés: doble descripción estética de la mujer, lista patrimonial de bienes heredados y una clausula final deliberadamente ambigua sobre su relación con esos bienes. No se detectaron revisiones aplicadas en el pasaje fuente, por lo que se preserva la lectura confirmada por el control de concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «siervos/siervas» como término de dependencia doméstica en un inventario de bienes, coherente con el tratamiento auditado del griego.
  - Se conserva la ambigüedad de ἔμενεν ἐπʼ αὐτῶν con una formulación cercana al griego y una nota alternativa.
  - El registro es bíblico-formal, pero con sintaxis española natural y puntuación moderna.
