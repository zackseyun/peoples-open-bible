    issue: Falta la nota léxica sobre «ángel/mensajero» para מַלְאַךְ.
    rationale: El audit trail inglés documenta explícitamente la alternativa «messenger». La revisión española debe preservarla porque sigue siendo una alternativa significativa y natural en español («mensajero»).
  - severity: medium
    issue: La nota actual sobre «desierto» no corresponde a una alternativa real y está mal anclada.
    rationale: La nota dice «O “en el desierto”» cuando el texto principal ya dice «en el desierto». Además, el inglés no preserva aquí una nota léxica sobre wilderness/desert; por tanto, la nota no añade información útil y puede confundir.
  - severity: low
    issue: «Fuente de agua» es aceptable, pero «manantial» podría ser ligeramente más exacto para עַיִן.
    rationale: עַיִן en este contexto denota un surgimiento de agua. «Fuente» funciona bien en español bíblico general; no exige corrección, pero «manantial» sería una opción más precisa si se buscara mayor fineza léxica.
  revised_spanish_text: Y el ángel[a] de Yahvé la encontró junto a una fuente de agua en el desierto, junto a la fuente, en el camino a Shur.
