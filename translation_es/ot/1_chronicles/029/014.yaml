translation:
  language: es
  text: Pero ¿quién soy yo[a], y quién es mi pueblo, para que podamos ofrecer voluntariamente así? Porque todo viene de ti, y de tu mano te lo hemos dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «para que tengamos fuerza de ofrecer voluntariamente así».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  - Y en verdad
  lexicon: HALOT
  rationale: En este giro retórico de humildad, la conjunción introduce contraste y continuación; 'Pero' comunica bien el cambio de tono sin sonar rígido.
- source_word: מִי אֲנִי וּמִי עַמִּי
  english_pob_choice: who am I, and who are my people
  chosen_spanish: ¿quién soy yo, y quiénes son mi pueblo?
  alternatives_spanish:
  - ¿quién soy yo, y quién es mi pueblo?
  - ¿qué soy yo, y qué es mi pueblo?
  lexicon: HALOT
  rationale: '''מִי'' pide normalmente ''quién''; en español mantengo la pregunta de identidad/humildad. Uso ''mi pueblo'' como equivalente natural del posesivo colectivo, conservando el valor retórico.'
- source_word: נַעְצֹר כֹּחַ
  english_pob_choice: we should be able
  chosen_spanish: tengamos fuerza
  alternatives_spanish:
  - podamos
  - tengamos poder
  - retengamos fuerza
  lexicon: HALOT
  rationale: El hebreo literalmente habla de 'retener/frenar fuerza', pero aquí expresa capacidad para actuar. 'Tengamos fuerza' conserva la imagen de capacidad sin volverlo pesado o demasiado explicativo.
- source_word: לְהִתְנַדֵּב
  english_pob_choice: to offer willingly
  chosen_spanish: de ofrecer voluntariamente
  alternatives_spanish:
  - de ofrecer de buena voluntad
  - de dar voluntariamente
  - de presentar una ofrenda voluntaria
  lexicon: HALOT
  rationale: La forma hitpael comunica voluntariedad en el dar/ofrecer; 'ofrecer voluntariamente' preserva ese matiz y coincide con el contexto de contribución para la obra.
- source_word: כָּזֹאת
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - tal como esto
  - tan generosamente
  lexicon: HALOT
  rationale: '''Así'' es la equivalencia más natural y breve; mantiene la referencia a la extraordinaria liberalidad recién descrita sin añadir interpretación.'
- source_word: מִמְּךָ הַכֹּל
  english_pob_choice: everything comes from you
  chosen_spanish: todo viene de ti
  alternatives_spanish:
  - todo procede de ti
  - todo es de ti
  - todo proviene de ti
  lexicon: HALOT
  rationale: El hebreo declara origen/procedencia divina. 'Todo viene de ti' suena natural en español y preserva la afirmación de fuente y posesión.
- source_word: וּמִיָּדְךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - desde tu mano
  - de tus manos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como fuente/provisión, ya que es transparente en español y teológicamente significativa.
- source_word: נָתַנּוּ לָךְ
  english_pob_choice: we have given to you
  chosen_spanish: te lo hemos dado
  alternatives_spanish:
  - te hemos dado
  - te lo damos
  - lo hemos puesto en tus manos
  lexicon: HALOT
  rationale: El hebreo completa el movimiento de devolución a Dios. En español, el pronombre neutro 'lo' recoge el objeto colectivo implícito y evita redundancia torpe.
theological_decisions:
- issue: Origen divino de toda ofrenda y devolución a Dios
  english_pob_reading: The verse emphasizes that Israel's giving is derivative of God's prior provision, without later doctrinal expansion.
  chosen_spanish_reading: El verso subraya que lo ofrecido por el pueblo procede antes de Dios y regresa a él como entrega derivada, sin añadir formulaciones doctrinales posteriores.
  alternative_spanish_readings:
  - Todo es tuyo y solo te devolvemos lo que ya nos diste.
  - Nuestra ofrenda es simplemente una devolución de lo que es tuyo.
  rationale: El hebreo afirma explícitamente que todo viene de Dios y que lo dado procede de su mano. La redacción española conserva esa tensión de dependencia y devolución sin ampliar más allá del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Capacidad/habilidad para ofrecer voluntariamente
  english_pob_reading: '''that we should have strength to offer willingly thus.'''
  chosen_spanish_reading: '''para que tengamos fuerza de ofrecer voluntariamente así'''
  alternative_spanish_readings:
  - '''para que pudiéramos ofrecer voluntariamente así'''
  - '''para que tengamos capacidad de ofrecer así'''
  rationale: El hebreo usa el giro de 'retener fuerza' con sentido de capacidad. 'Tengamos fuerza' mantiene esa base lexical y deja visible la relación entre poder y disposición voluntaria.
  doctrine_reference: Lexical note on נַעְצֹר כֹּחַ
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que prefirió 'offer willingly' sobre 'give willingly'; en español se reflejó con 'ofrecer voluntariamente' para mantener el matiz de contribución libre. También se preservó la imagen de la mano divina como fuente/provisión y la estructura retórica de humildad del versículo.
  spanish_consistency_notes:
  - Se usó 'Dios' implícito mediante el contexto inmediato, sin sustituir el pronombre divino por un título litúrgico no presente en el hebreo.
  - Se mantuvo 'mano' en singular, conforme al hebreo, para conservar la imagen de provisión divina.
  - '''Todo viene de ti'' conserva el valor de origen y posesión sin sobreexplicar la teología del pasaje.'
  - Se prefirió 'ofrecer voluntariamente' frente a 'dar voluntariamente' para reflejar mejor la contribución ofrecida en contexto cultual.
  - La pregunta '¿quién soy yo?' se mantiene en registro humilde y retórico, en línea con el hebreo y la traducción inglesa auditada.
