- from: También hay un hombre sabio cuyo consejo interno es digno de confianza para él[a][b].
  to: También hay un hombre sabio que confía en su propio discernimiento[a][b].
  rationale: 'Se revisa la cláusula final para expresar con español natural la decisión auditada del POB: el hombre sabio tiene confianza en su propia deliberación interior. «Discernimiento» comunica mejor el modismo hebreo que «consejo interno» dentro del flujo del español, mientras las notas preservan tanto el literal hebreo como la variante griega divergente.'
  reviewer_model: gpt-5.4
