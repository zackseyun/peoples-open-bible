translation:
  language: es
  text: los hijos de Dios[a] vieron que las hijas del hombre eran hermosas[b], y tomaron para sí esposas de entre todas las que eligieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los seres divinos»; la identidad de «los hijos de Dios» es debatida, con interpretaciones principales que incluyen seres celestiales, gobernantes humanos o la línea de Set.
    reason: alternative_reading
  - marker: b
    text: O «eran bellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הָאֱלֹהִים
  english_pob_choice: the sons of God
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los seres divinos
  - los hijos de los dioses
  lexicon: HALOT
  rationale: Conserva la expresión constructa hebrea sin resolver la identidad discutida de los referidos. «Hijos de Dios» es el equivalente español más transparente y auditable, y mantiene abierta la tensión interpretativa.
- source_word: בְּנוֹת הָאָדָם
  english_pob_choice: the daughters of man
  chosen_spanish: las hijas del hombre
  alternatives_spanish:
  - las hijas de la humanidad
  - las hijas de los hombres
  lexicon: HALOT
  rationale: Sigue de cerca el paralelo con «hijos de Dios» y preserva el contraste literario del hebreo. «Hombre» mantiene el valor colectivo de אָדָם sin forzar una reinterpretación más explicativa.
- source_word: כִּי טֹבֹת הֵנָּה
  english_pob_choice: were beautiful
  chosen_spanish: eran hermosas
  alternatives_spanish:
  - eran bellas
  - eran bonitas
  lexicon: HALOT
  rationale: La revisión inglesa optó por «beautiful» como una forma más natural y formal; en español, «hermosas» comunica bien la cualidad estética en este contexto sin cargar un sentido moral de «buenas».
- source_word: וַיִּקְחוּ לָהֶם נָשִׁים
  english_pob_choice: they took wives for themselves
  chosen_spanish: tomaron para sí mujeres
  alternatives_spanish:
  - tomaron para sí esposas
  - se casaron con mujeres
  lexicon: HALOT
  rationale: «Tomaron para sí» preserva לָהֶם. «Mujeres» refleja la amplitud de נָשִׁים; se evita estrechar demasiado a «esposas» en una frase cuyo movimiento narrativo subraya la apropiación de mujeres por selección.
- source_word: מִכֹּל אֲשֶׁר בָּחָרוּ
  english_pob_choice: from any they chose
  chosen_spanish: de entre todas las que eligieron
  alternatives_spanish:
  - de entre cualquiera que eligieron
  - de entre las que escogieron
  lexicon: HALOT
  rationale: La frase distributiva se expresa de modo natural en español con «de entre todas las que eligieron», conservando la idea de selección amplia e irrestricta sin añadir interpretación.
theological_decisions:
- issue: Identidad de «los hijos de Dios»
  english_pob_reading: Retain the literal phrase 'the sons of God' without specifying whether these are angelic beings, rulers, or the Sethite line.
  chosen_spanish_reading: Mantener «los hijos de Dios» sin identificar si son seres celestiales, gobernantes humanos o la línea de Set.
  alternative_spanish_readings:
  - ángeles o seres celestiales
  - gobernantes o nobles humanos
  - la línea piadosa de Set
  rationale: El hebreo no resuelve el referente y la POB inglesa preserva esa tensión interpretativa. La traducción española evita decidir por una opción doctrinal no explicitada por el verso y deja constancia de las alternativas mayores.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «good-looking» a «beautiful» por mayor naturalidad y adecuación formal al hebreo; por eso el español usa «hermosas», que conserva el valor estético sin moralizar el adjetivo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים y no se introdujo «SEÑOR», porque aquí el texto hebreo no usa el nombre divino YHWH.
  - Se preservó el contraste paralelo entre «hijos de Dios» e «hijas del hombre» para no borrar la ambigüedad teológica del pasaje.
  - «Tomaron para sí» refleja explícitamente el dativo/pronombre לָהֶם.
  - La nota al pie se ancla en «hermosas» porque esa es la principal alternativa lexical documentada en el audit trail inglés.
