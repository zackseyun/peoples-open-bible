translation:
  language: es
  text: Y al tercer día, el cumpleaños de Faraón, hizo un banquete para todos sus siervos, y levantó[a] la cabeza del jefe de los coperos y la cabeza del jefe de los panaderos entre sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más interpretativa: "lo distinguió" o "tomó cuenta de él". El hebreo dice literalmente "levantó la cabeza de"; se conserva el giro porque el relato lo reaprovecha con desenlaces distintos para los dos oficiales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And on ... / it happened
  chosen_spanish: Y al
  alternatives_spanish:
  - Entonces
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la secuencia; en español, 'Y al' transmite el avance temporal con naturalidad sin añadir contenido inexistente.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  lexicon: HALOT
  rationale: Corresponde al valor temporal directo del hebreo y es la formulación más natural en español bíblico actual.
- source_word: יוֹם הֻלֶּדֶת אֶת־פַּרְעֹה
  english_pob_choice: Pharaoh’s birthday
  chosen_spanish: día del cumpleaños de Faraón
  alternatives_spanish:
  - día del nacimiento de Faraón
  - el cumpleaños de Faraón
  lexicon: HALOT
  rationale: Se conserva el sentido de celebración del nacimiento con una construcción clara en español. 'Cumpleaños' comunica bien el hebreo sin volverlo más interpretativo de lo que exige el texto.
- source_word: וַיַּעַשׂ מִשְׁתֶּה
  english_pob_choice: he made a feast
  chosen_spanish: hizo un banquete
  alternatives_spanish:
  - celebró un banquete
  - hizo una fiesta
  lexicon: HALOT
  rationale: מִשְׁתֶּה designa un banquete o fiesta solemne, a menudo con bebida. 'Banquete' preserva mejor ese matiz que 'fiesta'.
- source_word: לְכָל עֲבָדָיו
  english_pob_choice: for all his servants
  chosen_spanish: para todos sus siervos
  alternatives_spanish:
  - para todos sus servidores
  - para todos sus servidores/cortesanos
  lexicon: HALOT
  rationale: '''Siervos'' refleja con mayor fuerza la relación de dependencia del término עֲבָדָיו y evita suavizarlo indebidamente en un contexto real de corte.'
- source_word: וַיִּשָּׂא אֶת־רֹאשׁ
  english_pob_choice: he lifted up the head of
  chosen_spanish: levantó la cabeza de
  alternatives_spanish:
  - tomó en cuenta a
  - distinguió a
  lexicon: HALOT
  rationale: Se preserva el idiomatismo hebreo porque el relato juega con la expresión en los versículos vecinos y el contraste entre ambos oficiales.
- source_word: שַׂר הַמַּשְׁקִים
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el principal copero
  - el jefe del copero
  lexicon: HALOT
  rationale: '''Jefe de los coperos'' reproduce con transparencia el título cortesano y evita reducirlo a un oficio meramente doméstico.'
- source_word: שַׂר הָאֹפִים
  english_pob_choice: the chief baker
  chosen_spanish: el jefe de los panaderos
  alternatives_spanish:
  - el principal panadero
  - el jefe de los pasteleros
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el título anterior y la referencia a un cargo oficial, no solo a una ocupación artesanal.
- source_word: בְּתוֹךְ עֲבָדָיו
  english_pob_choice: among his servants
  chosen_spanish: entre sus siervos
  alternatives_spanish:
  - en medio de sus siervos
  - en presencia de sus siervos
  lexicon: HALOT
  rationale: '''Entre'' expresa bien la ubicación pública dentro del grupo de la corte y mantiene la relación con el sustantivo repetido al final del versículo.'
theological_decisions:
- issue: Título real 'Faraón' y referencia al cumpleaños
  english_pob_reading: Pharaoh’s birthday
  chosen_spanish_reading: día del cumpleaños de Faraón
  alternative_spanish_readings:
  - cumpleaños de Faraón
  - día del nacimiento de Faraón
  rationale: No hay tensión doctrinal específica; la decisión es de claridad semántica. Se mantiene 'Faraón' como título/regente sin introducir glosa adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: se conservó el idiomatismo ''levantó la cabeza de'' por su función literaria, y se optó por equivalentes españoles naturales para los elementos narrativos y cortesanos.'
  spanish_consistency_notes:
  - Se mantiene 'Faraón' como título propio, no como nombre personal.
  - Se usa 'siervos' para עֲבָדָיו, coherente con el contexto de corte y con la fuerza relacional del hebreo.
  - '''Jefe de los coperos'' y ''jefe de los panaderos'' preservan el paralelismo oficial del texto.'
  - La nota [a] acompaña solo al idiomático 'levantó la cabeza de' para señalar la alternativa interpretativa sin perder la literalidad del hebreo.
