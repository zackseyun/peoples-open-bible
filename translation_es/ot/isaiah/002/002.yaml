    issue: «en los últimos días» frente a la preferencia auditada «in the latter days»
    rationale: Aunque no es incorrecto, «últimos días» en español puede activar asociaciones escatológicas más fuertes que el hebreo exige. «En los días postreros» o «en los días venideros» preserva mejor la amplitud profética documentada.
  - severity: medium
    issue: «fluirán hacia él» suena algo literal y poco idiomático para personas/naciones
    rationale: El hebreo sí usa una metáfora de flujo, pero en español «afluirán a él» comunica mejor movimiento masivo de pueblos hacia un lugar, mientras la nota puede explicar la imagen de río.
  - severity: low
