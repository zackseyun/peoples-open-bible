revisions:
- from: Cuando David terminó de ofrecer el holocausto[a] y los sacrificios de comunión[b], bendijo al pueblo en el nombre de Yahvé.
  to: Cuando David terminó de ofrecer la ofrenda quemada y las ofrendas de paz[a], bendijo al pueblo en el nombre de Yahvé.
  rationale: Se ajusta שְׁלָמִים a la decisión principal documentada en el audit trail («peace offerings»), usando «ofrendas de paz» como texto base y preservando las otras opciones en nota. También se reemplaza «holocausto» por «ofrenda quemada» para mayor claridad y consistencia estilística en español moderno, sin perder el sentido cultual de עֹלָה. El resto del versículo se mantiene por su buena fidelidad al hebreo y a la terminología del proyecto.
