review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en casi todos los elementos: comparación de la hechura artesanal, grabado de las dos piedras, nombres de los hijos de Israel y engastes de oro. Sin embargo, dos puntos requieren ajuste: el anclaje de la nota [a] está mal ubicado porque la alternativa corresponde a «como las grabaduras de un sello», no a «grabador en piedra»; y «las harás rodeadas en engastes de oro» suena poco natural y no expresa bien el valor de מֻסַבֹּת + מִשְׁבְּצֹת זָהָב como piedras montadas/encerradas en engastes de oro.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una torpeza importante en «rodeadas en engastes de oro». En español bíblico-natural y de joyería, «engastadas en oro» o «encerradas en engastes de oro» funciona mejor. También «grabaduras» es comprensible pero menos idiomático que «grabados» o «incisiones»; no obstante, puede mantenerse si se desea cercanía con el registro técnico. La reparación principal es de fluidez y de colocación correcta de la nota.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. «Hijos de Israel» preserva correctamente בְּנֵי יִשְׂרָאֵל según la decisión documentada. No aparecen términos como Yahvé/Mesías que requieran control adicional.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al sintagma equivocado.
    rationale: 'La nota dice «O: “las grabaduras de un sello”», que es alternativa para פִּתּוּחֵי חֹתָם, no para «grabador en piedra». Debe anclarse en la frase correspondiente dentro del texto.'
  - severity: medium
    issue: «las harás rodeadas en engastes de oro» es español poco natural y léxicamente flojo.
    rationale: מֻסַבֹּת describe las piedras como circundadas/encerradas/montadas, y la combinación con מִשְׁבְּצֹת זָהָב pide una expresión de joyería más idiomática. «Encerradas en engastes de oro» conserva bien el sentido auditado en inglés («enclosed in settings of gold»).
  - severity: low
    issue: «grabaduras» es menos idiomático que alternativas posibles.
    rationale: No es un error de fidelidad, pero suena algo forzado en español actual. Aun así, puede conservarse por cercanía técnica al original si se prefiere evitar una revisión mayor.
  revised_spanish_text: Como la obra de un grabador en piedra, como las grabaduras de un sello[a], grabarás las dos piedras con los nombres de los hijos de Israel[b]; las harás encerradas en engastes de oro.
  revised_footnotes:
