translation:
  language: es
  text: Pero si este asunto resulta ser cierto[a], y no se encontraron pruebas de virginidad para la joven,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se encontraron señales de virginidad para la joven». El hebreo usa בְּתוּלִים, literalmente «virginidad» o «señales/evidencia de virginidad», en el contexto de una antigua costumbre legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si, pero
  lexicon: HALOT
  rationale: La partícula condicional con valor adversativo se refleja de forma natural con 'Pero si', conservando el contraste con el contexto inmediato sin forzar un calco.
- source_word: אֱמֶת
  english_pob_choice: 'true'
  chosen_spanish: verdad
  alternatives_spanish:
  - verdadero
  - cierto
  lexicon: HALOT
  rationale: En esta construcción predicativa, el español suena más natural con 'es verdad' que con un adjetivo aislado. Mantiene el valor de veracidad del enunciado legal.
- source_word: הָיָה
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - era
  - fue
  lexicon: HALOT
  rationale: 'Aunque el hebreo está en perfecto, en español jurídico general la condición se expresa mejor en presente: ''si este asunto es verdad''. No cambia la fuerza del enunciado.'
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - este hecho
  - este caso
  - esta cuestión
  lexicon: HALOT
  rationale: '''דָּבָר'' aquí funciona como un caso o asunto legal. ''Asunto'' comunica bien ese campo semántico sin sobreespecificar ni sonar demasiado coloquial.'
- source_word: לֹא נִמְצְאוּ
  english_pob_choice: was not found
  chosen_spanish: no se encontraron
  alternatives_spanish:
  - no fue encontrado
  - no se hallaron
  lexicon: HALOT
  rationale: El plural hebreo concuerda con בְתוּלִים; en español, 'no se encontraron' conserva la pasiva impersonal y la naturalidad sintáctica.
- source_word: בְתוּלִים
  english_pob_choice: evidence of virginity
  chosen_spanish: evidencias de virginidad
  alternatives_spanish:
  - señales de virginidad
  - pruebas de virginidad
  - virginidad
  lexicon: HALOT
  rationale: Se conserva la tensión lexical entre 'virginidad' y las señales o pruebas asociadas en el contexto legal antiguo. 'Evidencias de virginidad' sigue de cerca la decisión auditada en inglés y su pluralidad hebrea.
- source_word: לַנַּעֲרָ
  english_pob_choice: for the young woman
  chosen_spanish: para la joven
  alternatives_spanish:
  - para la muchacha
  - para la joven mujer
  - para la muchacha joven
  lexicon: HALOT
  rationale: נַעֲרָה denota a una joven en edad de casarse; 'la joven' es natural en español y evita tanto arcaísmos como una posible rebaja de edad implícita en 'niña' o 'muchacha'.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustantivos; este borrador mantiene la misma lectura de alto acuerdo y conserva la alternativa léxica documentada para בְתוּלִים en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el texto lo requiera, aunque este versículo no lo contiene.
  - Se evita 'SEÑOR' y otras máscaras litúrgicas no pertinentes aquí.
  - Se conserva la diferencia entre el valor legal de 'asunto' y la simple idea de 'palabra'.
  - La pluralidad de בְתוּלִים queda reflejada en 'evidencias' para no borrar la forma hebrea.
