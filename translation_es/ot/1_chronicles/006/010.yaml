lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: Se conserva la secuencia genealógica con una conjunción explícita; en español, 'los hijos de' es la forma natural para בְנֵי en listas de descendencia. 'Y' reproduce el ו inicial sin sobrecargar el tono.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento final para reflejar la pronunciación habitual en español bíblico y mantener inteligibilidad. No se traduce el nombre.
- source_word: עֲמָשַׂי
  english_pob_choice: Amasai
  chosen_spanish: Amasai
  alternatives_spanish:
  - Amassai
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma más cercana al valor auditado en inglés POB; la variante 'Amassai' queda como alternativa ortográfica, no como cambio de identificación.
- source_word: וַ/אֲחִימוֹת
  english_pob_choice: and Ahimoth
  chosen_spanish: y Ahimot
  alternatives_spanish:
  - y Ahimot[a]
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con 't' final para reflejar la forma hebrea y la transliteración inglesa 'Ahimoth'. La conjunción se mantiene como 'y' por el valor del prefijo ו.
translation_notes:
