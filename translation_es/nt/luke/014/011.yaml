translation:
  language: es
  text: Porque todo el que se enaltece será humillado[a][b], y el que se humilla será enaltecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pues todo el que se enaltece será humillado, y el que se humilla será enaltecido».
    reason: lexical_alternative
  - marker: b
    text: El griego usa formas masculinas singulares con valor genérico; en español se refleja con «el que».
    reason: cultural_note
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: BDAG
  rationale: ὅτι introduce aquí la razón o fundamento de la exhortación previa. En español, «Porque» conserva bien ese valor explicativo-causal sin sonar rígido.
- source_word: πᾶς ὁ ὑψῶν
  english_pob_choice: everyone who exalts
  chosen_spanish: todo el que se enaltece
  alternatives_spanish:
  - todo el que se exalta
  - quien se enaltece
  lexicon: BDAG
  rationale: El participio articular funciona de manera genérica y proverbial. «Todo el que» conserva esa universalidad; «se enaltece» comunica la autoexaltación moral implícita en ὑψόω.
- source_word: ὑψῶν
  english_pob_choice: exalts
  chosen_spanish: se enaltece
  alternatives_spanish:
  - se exalta
  - se levanta
  lexicon: BDAG
  rationale: 'Aunque ὑψόω puede ser literalmente «levantar», aquí es metafórico: hablar de auto-promoción o autoexaltación. «Se enaltece» mantiene el contraste con «humillado / enaltecido» y su tono proverbial.'
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - a sí mismo
  - él mismo
  lexicon: BDAG
  rationale: El griego usa un reflexivo masculino singular genérico. En español, la forma verbal reflexiva ya expresa bien el sentido sin perder la referencia genérica.
- source_word: ταπεινωθήσεται
  english_pob_choice: will be humbled
  chosen_spanish: será humillado
  alternatives_spanish:
  - será rebajado
  - será abatido
  lexicon: BDAG
  rationale: El futuro pasivo comunica que el sujeto recibirá humillación. «Será humillado» preserva la fuerza pasiva y el contraste antitético con «será enaltecido».
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: La coordinación simple mantiene la forma del dicho griego; el contraste queda claro por el paralelismo de las dos cláusulas.
- source_word: ὁ ταπεινῶν
  english_pob_choice: the one who humbles
  chosen_spanish: el que se humilla
  alternatives_spanish:
  - el que se abaja
  - quien se humilla
  lexicon: BDAG
  rationale: El participio articular es sustantivo y genérico. «El que se humilla» es natural en español y conserva la idea de auto-humillación voluntaria.
- source_word: ταπεινῶν
  english_pob_choice: humbles
  chosen_spanish: se humilla
  alternatives_spanish:
  - se abaja
  - se hace humilde
  lexicon: BDAG
  rationale: En este contexto ταπεινόω apunta a humillarse a uno mismo, no a ser humillado por otro. «Se humilla» mantiene la simetría con la primera cláusula.
- source_word: ὑψωθήσεται
  english_pob_choice: will be exalted
  chosen_spanish: será enaltecido
  alternatives_spanish:
  - será exaltado
  - será levantado
  lexicon: BDAG
  rationale: El futuro pasivo mantiene la misma forma que la primera mitad. «Será enaltecido» suena natural en español y conserva el contraste con «será humillado».
theological_decisions:
- issue: Agente implícito en los pasivos futuros
  english_pob_reading: Retain passive forms without supplying 'by God'
  chosen_spanish_reading: Conservar los pasivos sin añadir «por Dios»
  alternative_spanish_readings:
  - será humillado por Dios
  - será enaltecido por Dios
  rationale: El griego no menciona explícitamente el agente. Aunque la agencia divina está implícita en el trasfondo bíblico, añadirla resolvería una tensión que el texto deja abierta. La traducción conserva ese pasivo sin explicitar el agente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor genérico del masculino singular
  english_pob_reading: Use 'himself' in the main text
  chosen_spanish_reading: Mantener una formulación genérica en español sin marcar género en la superficie reflexiva
  alternative_spanish_readings:
  - todo el que se enaltece...
  - todo aquel que se enaltece...
  rationale: El griego usa formas masculinas singulares con valor genérico. En español, la construcción con «todo el que / el que» comunica ese valor representativo sin introducir una neutralización innecesaria ni perder naturalidad.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no hubo cambios en el pasaje según el registro de revisión más reciente, y la alta concordancia del control cruzado confirma que no se requieren ajustes adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda a יהוה; aquí no aparece ningún nombre divino explícito.
  - Se usa un estilo proverbial claro y sobrio, adecuado para una sentencia breve de Jesús.
  - Se conserva el pasivo verbal en ambas cláusulas para no añadir agentes implícitos que el griego no expresa.
  - «Enaltecer / enaltecido» mantiene mejor el paralelo semántico con «humillar / humillado» que alternativas más literales como «levantar».
