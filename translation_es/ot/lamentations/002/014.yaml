base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/014.yaml
  text: Your prophets saw for you falsehood and folly[a], and they did not uncover your iniquity to restore your fortunes; instead[b], they saw for you false oracles and delusions.
  footnotes:
  - marker: a
    text: Or, more literally, “to turn back your captivity” or “to restore your captives.” The Hebrew idiom often refers to restoring a people from calamity or exile.
    reason: alternative_reading
  - marker: b
    text: Or “burdens,” a traditional rendering of the prophetic term translated here as “oracles.”
    reason: lexical_alternative
