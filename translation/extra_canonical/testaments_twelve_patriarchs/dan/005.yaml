translation:
  text: '1 Therefore[v6], my children, keep the commandment of the Lord, and keep his law. Depart from anger, and hate falsehood, so that the Lord may dwell in you and Beliar may flee from you.


    2 Speak truth, each one to his neighbor, and you will certainly not fall into wrath and tumults; rather, you will be in peace, having the God of peace[v8], and war will certainly not prevail against you.


    3 Love the Lord throughout all your life, and one another with a true heart.


    4 I know that in the last days you will depart from the Lord, and you will provoke Levi, and you will set yourselves in battle array against Judah, but you will not prevail against them. For an angel of the Lord guides them both, because by them Israel will stand.


    5 And whenever you depart from the Lord, walking in every wickedness, you will do the abominations of the nations, prostituting yourselves with lawless women, and the spirits of wickedness working among you in every evil.


    6 For I have read in the book of Enoch the righteous, and I learned that your ruler is Satan, and that the spirits of wickedness and of pride will attend on the sons of Levi, to make them sin before the Lord.


    7 And my sons will draw near to Levi and will sin together with them in all things. But the sons of Judah will be greedy, snatching what belongs to others like lions.


    8 Therefore you will be led away with them into captivity, and there you will receive all the plagues of Egypt and all the evils of the nations.


    9 And so, when you return to the Lord, you will receive mercy, and he will bring you into his sanctuary, and he will give you peace.


    10 And for you the salvation of the Lord will arise from the tribe of Judah and of Levi. For he himself will make war against Beliar, and he will grant the vengeance of victory to your fathers.


    11 And he will take the captivity from Beliar, even the souls of the holy ones, and he will turn disobedient hearts to the Lord, and he will give eternal peace to those who call on him.


    12 And the holy ones will rest in Eden, and the righteous will rejoice over the new Jerusalem, which is the eternal glory of God.


    13 And Jerusalem will no longer endure desolation, nor will Israel be taken captive, because the Lord will be in her midst[v13][v12][v11][v10], and the Holy One of Israel will reign over her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v6
    text: The reference to 'the book of Enoch' is explicit in the Greek witness and likely alludes to Enochic traditions known in Second Temple Judaism.
    reason: cross_reference
  - marker: v8
    text: Some witnesses include 'with them' after 'you will be led away,' making the association with Levi and Judah even more explicit.
    reason: textual_variant
  - marker: v10
    text: Some manuscripts read 'from the tribe of Judah and of Levi'; the bracketed 'Judah and' reflects textual variation, but the combined tribal reference is well represented in the tradition.
    reason: textual_variant
  - marker: v11
    text: The phrase 'even the souls of the holy ones' is textually uncertain in some editions but clarifies that liberation from Beliar concerns persons held in bondage.
    reason: textual_variant
  - marker: v12
    text: '''The new Jerusalem'' is an eschatological image of restored and glorified Zion, not merely the historical city in its present condition.'
    reason: cultural_note
  - marker: v13
    text: Some witnesses continue with additional phrases about the Lord dwelling with humans and reigning in humility and poverty; these are often regarded as later expansions and are not included in the main text here.
    reason: textual_variant
lexical_decisions:
- source_word: φυλάξατε / τηρήσατε
  chosen: keep / observe
  alternatives:
  - guard / keep
  - keep / keep
  lexicon: BDAG
  rationale: Used a paired rendering to preserve the rhetorical parallelism between guarding the commandment and observing the law without sounding mechanically repetitive in English.
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: BDAG
  rationale: In this paraenetic context 'anger' is the clearest and most natural term, while still carrying moral force.
- source_word: ψεῦδος
  chosen: falsehood
  alternatives:
  - lie
  - deceit
  lexicon: BDAG
  rationale: Dan emphasizes a vice category rather than a single utterance; 'falsehood' better matches the broader ethical contrast with truth-speaking.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Greek witness tradition
  rationale: Retained the Greek-form name reflected in this witness rather than normalizing to the more familiar Hebrew-derived 'Belial.'
- source_word: ἀλήθειαν φθέγγεσθε
  chosen: Speak truth
  alternatives:
  - utter truth
  - speak the truth
  lexicon: BDAG
  rationale: Compact imperative English preserves the direct exhortational tone.
- source_word: μῆνις
  chosen: wrath
  alternatives:
  - anger
  - rage
  lexicon: LSJ
  rationale: Kept a stronger term here than in v.1 to reflect the elevated diction and the danger of falling into destructive hostility.
- source_word: ταραχαί
  chosen: tumults
  alternatives:
  - disturbances
  - troubles
  lexicon: BDAG
  rationale: The plural suggests social upheavals, not merely inward anxiety; 'tumults' preserves that public, conflict-laden sense.
- source_word: κατισχύσει
  chosen: prevail against
  alternatives:
  - overcome
  - be stronger than
  lexicon: BDAG
  rationale: Standard idiomatic rendering in conflict contexts.
- source_word: ἐν πάσῃ τῇ ζωῇ ὑμῶν
  chosen: throughout all your life
  alternatives:
  - all your days
  - with all your life
  lexicon: BDAG
  rationale: Expresses enduring lifelong devotion in natural English.
- source_word: ἀποστήσεσθε
  chosen: depart
  alternatives:
  - fall away
  - turn away
  lexicon: BDAG
  rationale: Used 'depart' to preserve the testamentary warning without importing later technical apostasy language too strongly.
- source_word: προσοχθιεῖτε
  chosen: provoke ... to anger
  alternatives:
  - be hostile to
  - offend
  lexicon: LSJ
  rationale: The verb implies causing vexation or irritation; this rendering makes the relational hostility explicit.
- source_word: παρατάξεσθε
  chosen: set yourselves in battle array
  alternatives:
  - array yourselves against
  - take your stand against
  lexicon: LSJ
  rationale: Military imagery is explicit in the Greek and should not be flattened into generic opposition.
- source_word: ἐν πάσῃ κακίᾳ πορευόμενοι
  chosen: walking in every wickedness
  alternatives:
  - living in all evil
  - conducting yourselves in every evil
  lexicon: BDAG
  rationale: Preserves the moral-walk idiom common in Jewish ethical discourse.
- source_word: ἐκπορνεύοντες
  chosen: prostituting yourselves
  alternatives:
  - committing sexual immorality
  - playing the harlot
  lexicon: BDAG
  rationale: The verb is stronger and more vivid than a generic sexual-sin term; it also preserves the degrading force of the Greek.
- source_word: γυναιξὶν ἀνόμων
  chosen: lawless women
  alternatives:
  - women outside the law
  - wicked women
  lexicon: BDAG
  rationale: A close rendering that preserves the moral-legal characterization in the text.
- source_word: ἐνεργούντων ... τῶν πνευμάτων τῆς πονηρίας
  chosen: at work among you through the spirits of wickedness
  alternatives:
  - the spirits of wickedness operating in you
  - the evil spirits working among you
  lexicon: BDAG
  rationale: Makes the participial construction intelligible while preserving the text's demonological causation language.
- source_word: βίβλος Ἐνὼχ
  chosen: the book of Enoch
  alternatives:
  - Enoch's book
  lexicon: BDAG
  rationale: Straightforward rendering of the explicit literary reference.
- source_word: παρεδρεύειν
  chosen: attend on
  alternatives:
  - stand beside
  - be in attendance on
  lexicon: LSJ
  rationale: Conveys subordinate attendance or service to the sons of Levi in the corrupting sense of the passage.
- source_word: συνεγγίζοντες
  chosen: draw near
  alternatives:
  - associate closely
  - come near
  lexicon: BDAG
  rationale: Preserves both physical/social closeness and moral alignment.
- source_word: πλεονεξία
  chosen: greedy
  alternatives:
  - covetous
  - grasping
  lexicon: BDAG
  rationale: Rendered adjectivally for natural English while retaining the vice of acquisitiveness.
- source_word: ἁρπάζοντες ἀλλότρια
  chosen: snatching what belongs to others
  alternatives:
  - plundering others' goods
  - seizing чуж?
  lexicon: BDAG
  rationale: Makes explicit that the object is property belonging to others.
- source_word: αἰχμαλωσία
  chosen: captivity
  alternatives:
  - exile
  lexicon: BDAG
  rationale: The noun naturally denotes being taken captive; 'captivity' preserves the punitive force, while exile remains a possible nuance.
- source_word: ἐλεηθήσεσθε
  chosen: you will receive mercy
  alternatives:
  - you will be shown mercy
  - you will be pitied
  lexicon: BDAG
  rationale: Natural passive sense in English while keeping divine mercy central.
- source_word: τὸ σωτήριον Κυρίου
  chosen: the salvation of the Lord
  alternatives:
  - the Lord's salvation
  - the saving one of the Lord
  lexicon: BDAG
  rationale: Preserves the ambiguity between saving act and saving figure; the phrase is left broad in the main text.
- source_word: ἐκδίκησιν τοῦ νίκους
  chosen: the vengeance of victory
  alternatives:
  - the avenging of victory
  - victorious vengeance
  lexicon: LSJ
  rationale: A difficult phrase; retained its forceful, somewhat compressed character rather than over-explaining it.
- source_word: τὴν αἰχμαλωσίαν λήψεται ἀπὸ τοῦ Βελίαρ
  chosen: he will take the captivity from Beliar
  alternatives:
  - he will take captive what Beliar holds
  - he will seize back the captives from Beliar
  lexicon: BDAG
  rationale: The Greek is compressed; the chosen rendering stays close while allowing the following apposition to clarify the sense.
- source_word: ἀπειθεῖς καρδίας
  chosen: disobedient hearts
  alternatives:
  - rebellious hearts
  - unpersuaded hearts
  lexicon: BDAG
  rationale: Best captures the moral and covenantal sense of refusal.
- source_word: ἐπικαλουμένοις αὐτόν
  chosen: those who call on him
  alternatives:
  - those who invoke him
  lexicon: BDAG
  rationale: Standard biblical idiom, clear and theologically resonant.
- source_word: ἀναπαύσονται ἐν Ἐδέν
  chosen: will rest in Eden
  alternatives:
  - will find rest in Eden
  lexicon: BDAG
  rationale: Simple future preserves eschatological promise.
- source_word: ἡ νέα Ἱερουσαλήμ
  chosen: the new Jerusalem
  alternatives:
  - New Jerusalem
  lexicon: BDAG
  rationale: Lowercase adjective in running translation is natural English while preserving the eschatological designation.
- source_word: ἐν μέσῳ αὐτῆς
  chosen: in her midst
  alternatives:
  - in the midst of her
  - among her
  lexicon: BDAG
  rationale: Maintains the personified-city imagery and elevated register.
