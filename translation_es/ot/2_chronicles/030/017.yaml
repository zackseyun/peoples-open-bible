    issue: '''degollación'' para שְׁחִיטַת'
    rationale: Aunque puede describir el acto físico, en español general y eclesial suena áspero y poco idiomático. 'Inmolación' comunica mejor el contexto sacrificial y mantiene dignidad estilística sin alejarse del hebreo.
  - severity: low
    issue: Matiz de 'no estaban limpios'
    rationale: Es fiel al POB inglés y al contraste cultual, aunque en español suena algo menos natural que 'impuros'. No exige cambio porque la nota ya preserva la alternativa y el sentido ritual queda claro.
