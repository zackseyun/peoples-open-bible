translation:
  language: es
  text: Todas las contribuciones de las cosas santas que los hijos de Israel presentan[a] a Yahvé te he dado, y a tus hijos y a tus hijas contigo, como estatuto perpetuo[b]. Es un pacto de sal perpetuo delante de Yahvé, para ti y para tu descendencia contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Presentan» traduce el sentido sacrificial técnico del verbo hebreo; literalmente, la imagen es la de «levantar» o «elevar» una ofrenda.
    reason: lexical_alternative
  - marker: b
    text: «Pacto de sal» es una expresión pactal que comunica permanencia e inviolabilidad; compárese 2 Crónicas 13:5.
    reason: cultural_note
lexical_decisions:
- source_word: תְּרוּמֹת
  english_pob_choice: contributions
  chosen_spanish: contribuciones
  alternatives_spanish:
  - ofrendas
  - aportaciones
  - contribuciones elevadas
  lexicon: HALOT
  rationale: תְּרוּמָה nombra una entrega apartada y presentada a Dios. «Contribuciones» comunica bien en español moderno la idea de algo separado y ofrecido, sin recurrir a una fórmula tradicional opaca. Se evita «ofrendas» como término más general y menos preciso para el matiz de contribución apartada.
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas consagradas
  - los objetos santos
  - las ofrendas santas
  lexicon: HALOT
  rationale: La expresión se refiere a las realidades santificadas de las que proceden esas contribuciones. «Cosas santas» mantiene la categoría cultual sin forzar una identificación más específica que el hebreo no explicita aquí.
- source_word: יָרִימוּ
  english_pob_choice: present
  chosen_spanish: presentan
  alternatives_spanish:
  - levantan
  - ofrecen
  - presentan ante
  lexicon: HALOT
  rationale: Aunque la raíz tiene la imagen de «levantar», el sentido técnico aquí es presentar una ofrenda. En español, «presentan» conserva el valor sacrificial con naturalidad y coincide con la revisión inglesa más reciente.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma filial-covenantal del hebreo, en línea con la decisión inglesa de no neutralizar la designación nacional. «Los israelitas» sería más idiomático, pero pierde esa textura textual.
- source_word: לַיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  - Jehová
  lexicon: Doctrinal project default
  rationale: El proyecto pide usar «Yahvé» como forma principal en español para יהוה. No se sustituye por «SEÑOR» porque el mandato editorial favorece una transliteración audible y auditable del nombre divino.
- source_word: לְחָק עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - como decreto perpetuo
  - como ley perpetua
  lexicon: HALOT
  rationale: חֹק/חָק designa una disposición fija o estatuto prescrito. «Estatuto perpetuo» es la equivalencia más clara y tradicionalmente comprensible en español, y mantiene el valor jurídico-duradero del hebreo.
- source_word: בְּרִית מֶלַח
  english_pob_choice: a covenant of salt
  chosen_spanish: un pacto de sal
  alternatives_spanish:
  - un pacto salado
  - un pacto de sal
  - un convenio de sal
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática literal porque es una fórmula pactal reconocible y cargada de simbolismo de permanencia e inviolabilidad. «Un pacto de sal» suena natural en español bíblico y no diluye la imagen.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: perpetuo
  alternatives_spanish:
  - para siempre
  - eterno
  - perdurable
  lexicon: HALOT
  rationale: En este contexto, «perpetuo» reproduce el valor durativo del término sin sonar excesivamente arcaico. La repetición enfatiza la duración del estatuto y del pacto.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  - delante del Yahvé
  lexicon: HALOT
  rationale: La fórmula cultual se traduce de modo literal e idiomático con «delante de Yahvé», que conserva la relación de comparecencia/presencia sin añadir matices no explícitos.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu prole
  - tus descendientes
  - tu linaje
  lexicon: HALOT
  rationale: «Descendencia» conserva el sentido colectivo singular de זֶרַע en español natural. «Tu linaje» sería posible, pero más interpretativo; «tu descendencia» es la opción más clara y fiel aquí.
theological_decisions:
- issue: Conservación de la expresión pactal «pacto de sal»
  english_pob_reading: a covenant of salt
  chosen_spanish_reading: un pacto de sal
  alternative_spanish_readings:
  - un pacto permanente
  - un pacto inviolable
  rationale: Se mantiene la metáfora concreta en vez de reemplazarla por una explicación abstracta. Así se preserva la textura literaria y la fuerza teológica de la alianza expresada por el texto, dejando la interpretación al lector y a posibles notas.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Renderización del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La pauta del proyecto exige una transliteración del Tetragrámaton en lugar de una máscara litúrgica. «Yahvé» mantiene la referencia directa al nombre divino y hace auditable la decisión de traducción.
  doctrine_reference: Project terminology defaults
- issue: Referencia a la familia de Aarón y al pueblo de Israel
  english_pob_reading: to you, and to your sons and your daughters with you ... the sons of Israel
  chosen_spanish_reading: a ti, y a tus hijos y a tus hijas contigo ... los hijos de Israel
  alternative_spanish_readings:
  - a ti y a tu familia ... los israelitas
  - a ti y a tus descendientes ... el pueblo de Israel
  rationale: Se preservan explícitamente los hijos y las hijas de Aarón, como en el hebreo, y también la designación masculina nacional «hijos de Israel». Esto evita neutralizaciones que borren rasgos formales del texto fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en el verbo principal de «lift up» a «present» para mayor naturalidad. La redacción española sigue esa revisión con «presentan», sin perder el trasfondo técnico del gesto de ofrenda. También se respetó la equivalencia final de «permanent statute» como «estatuto perpetuo» y la conservación literal de «covenant of salt».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יהוה.
  - Se mantiene «hijos de Israel» para la designación nacional masculina, en paralelo con la decisión inglesa.
  - «Descendencia» se usa como colectivo singular para זרע, evitando «semilla» por sonar impropio en este contexto.
  - La puntuación y el orden de los miembros siguen un español bíblico moderno, sin depender de fórmulas tradicionales que oculten decisiones léxicas.
