base_translation:
  language: en
  yaml_path: translation/ot/leviticus/008/015.yaml
  text: And he slaughtered it[a], and Moses took the blood and put it on the horns of the altar all around with his finger, and he purified the altar[b], and he poured out the blood at the base of the altar and consecrated it to make atonement on it.
  footnotes:
  - marker: a
    text: Or 'he cleansed the altar.' The Hebrew verb in this ritual context means to purify from impurity, not to cause to sin.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make expiation for it' or 'to purge it.' The Hebrew verb carries sacrificial purification/atonement sense.
    reason: lexical_alternative
