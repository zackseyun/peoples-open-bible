  to: Pero si es pobre y sus medios no le alcanzan[a], entonces tomará un cordero macho como ofrenda por la culpa, para ser presentado como ofrenda mecida, para hacer expiación por él; y una décima de efa de flor de harina, mezclada con aceite, para ofrenda vegetal, y un log[b] de aceite.
