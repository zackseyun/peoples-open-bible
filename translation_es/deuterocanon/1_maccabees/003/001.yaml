translation:
  language: es
  text: Y se levantó Judas[a], llamado Macabeo, su hijo, en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Μακκαβαῖος; tradicionalmente españolizado como «Macabeo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἀνέστη
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - surgió
  - se puso en pie
  lexicon: LSJ / BDAG
  rationale: El aoristo de ἀνίστημι expresa aquí la emergencia o continuación de acción tras el padre. «Se levantó» conserva el impulso narrativo en español sin imponer una lectura técnica de entronización o sucesión formal.
- source_word: ὁ καλούμενος
  english_pob_choice: who was called
  chosen_spanish: llamado
  alternatives_spanish:
  - que era llamado
  - conocido como
  lexicon: BDAG
  rationale: En español, el participio se vierte con naturalidad como un epíteto identificador. «Llamado» mantiene la relación descriptiva del griego y evita añadir matices no presentes en el texto.
- source_word: Μακκαβαῖος
  english_pob_choice: Maccabeus
  chosen_spanish: Macabeo
  alternatives_spanish:
  - Maccabeo
  - Macabéo
  lexicon: LSJ
  rationale: El griego Μακκαβαῖος corresponde directamente al nombre/epíteto propio; «Macabeo» refleja la forma española asentada sin ocultar el trasfondo helénico del término.
- source_word: υἱὸς αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  - su propio hijo
  lexicon: BDAG
  rationale: La frase indica simplemente filiación. «Su hijo» es la forma más natural y fiel en español.
- source_word: ἀντʼ αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en vez de él
  - después de él
  lexicon: BDAG
  rationale: El valor de ἀντί con genitivo es el de reemplazo o sucesión. «En su lugar» expresa esa idea de manera idiomática y no fuerza una afirmación política más precisa de la que el griego da.
theological_decisions:
- issue: Naturaleza de la sucesión de Judas
  english_pob_reading: rose up in his place
  chosen_spanish_reading: se levantó ... en su lugar
  alternative_spanish_readings:
  - sucedió a su padre
  - se alzó en su lugar
  rationale: El texto narra el surgimiento de Judas tras la figura paterna, pero no usa un término técnico de investidura. La traducción preserva la tensión entre continuidad familiar y sucesión narrativa sin convertirla en una declaración formal de cargo.
  doctrine_reference: Prioridad del sentido del texto original; evitar resolver indebidamente una tensión histórica/narrativa.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en lo esencial; no se requieren cambios de fondo. La principal decisión es reflejar en español la sucesión narrativa con una formulación natural y fiel al valor de ἀνέστη y ἀντʼ αὐτοῦ.
  spanish_consistency_notes:
  - Se mantiene «Macabeo» para el epíteto propio, de acuerdo con la españolización habitual y sin borrar el origen griego del nombre.
  - «En su lugar» preserva la idea de reemplazo/sucesión sin añadir matices institucionales.
  - «Se levantó» conserva el movimiento narrativo del aoristo mejor que una simple glosa estática como «apareció».
