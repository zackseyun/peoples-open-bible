    rationale: La nota habla de «Yahvé» en lugar de «SEÑOR», pero en este proyecto español el texto principal ya debe usar «Yahvé» por defecto; además, la explicación «sigue el criterio del proyecto» no describe una alternativa textual real sino una política de traducción. Conviene reformularla como nota de terminología/traducción del nombre divino.
