revisions:
- from: Entonces los hombres se levantaron de allí y miraron hacia Sodoma[a], y Abraham iba con ellos para despedirlos[b].
  to: Entonces los hombres se levantaron de allí y miraron hacia abajo, hacia Sodoma[a], y Abraham iba con ellos para despedirlos en su camino[b].
  rationale: Se ajusta וַיַּשְׁקִפוּ para conservar en el texto principal el matiz de mirada desde arriba/hacia abajo, tal como documenta la auditoría POB. También se corrige la nota sobre לְשַׁלְּחָם para reflejar el sentido hospitalario de acompañar a los huéspedes al partir, en vez de simplemente verlos salir. El resto del versículo es sólido y solo requiere esta reparación menor.
