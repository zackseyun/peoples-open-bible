lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, בְּנֵי puede referirse no solo a hijos inmediatos, sino a un linaje o grupo familiar. 'Los hijos de' conserva la forma directa del hebreo y reproduce la decisión auditada del inglés POB, sin forzar una paráfrasis más interpretativa.
- source_word: עַזְמָוֶת
  english_pob_choice: Azmaveth
  chosen_spanish: Azmaveth
  alternatives_spanish:
  - Asmavet
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma estándar 'Azmaveth' para conservar la identificación del grupo en la lista.
- source_word: אַרְבָּעִים וּשְׁנָיִם
  english_pob_choice: forty-two
  chosen_spanish: cuarenta y dos
  alternatives_spanish:
  - cuarenta y dos
  lexicon: HALOT
  rationale: El numeral hebreo se expresa de manera natural en español moderno como 'cuarenta y dos'. No se usa una forma arcaizante como 'cuarenta y dos' con orden calco ni 'cuarenta y dos' con redacción artificial.
theological_decisions:
- issue: Valor de 'hijos de' en una lista de regreso/censo
  english_pob_reading: The sons of can denote a broader family line or clan, not only immediate male children.
  chosen_spanish_reading: '''Los hijos de'' puede abarcar un linaje, casa o clan, no solo hijos biológicos inmediatos.'
  alternative_spanish_readings:
