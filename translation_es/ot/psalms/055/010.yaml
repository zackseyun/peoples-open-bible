translation:
  language: es
  text: Confúndelos[a], Señor; divide su lenguaje[b], porque he visto violencia y contienda en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Trágalos, Señor' o 'Destrúyelos, Señor'. El verbo hebreo puede tener un sentido más literal y destructivo, aunque aquí también puede significar frustrar sus planes mediante confusión.
    reason: alternative_reading
  - marker: b
    text: Literalmente, 'divide su lengua'; es decir, interrumpe su capacidad de hablar juntos o de entenderse entre sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּלַּע
  english_pob_choice: Confuse them
  chosen_spanish: Confúndelos
  alternatives_spanish:
  - Trágalos
  - Destrúyelos
  lexicon: HALOT
  rationale: El verbo hebreo puede significar literalmente 'devorar' o 'tragar', pero en este paralelismo imprecatorio funciona mejor como petición de desorden, frustración o ruina de sus planes. 'Confúndelos' conserva la fuerza poética y la relación con 'divide su habla', mientras que las opciones más literales quedan documentadas en la nota.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor Yahvé
  lexicon: HALOT
  rationale: Aquí el hebreo usa el título divino אֲדֹנָי, no el nombre propio YHWH. Por eso se traduce con el título reverente 'Señor', no con 'Yahvé' ni con una sustitución tipográfica. En español, 'Señor' es el equivalente natural y fiel al título del texto.
- source_word: פַּלַּג
  english_pob_choice: divide
  chosen_spanish: divide
  alternatives_spanish:
  - separa
  - parte
  lexicon: HALOT
  rationale: El imperativo pide dividir o separar; 'divide' mantiene la fuerza verbal directa y conserva la alusión a la desunión del habla.
- source_word: לְשׁוֹנָם
  english_pob_choice: their speech
  chosen_spanish: su habla
  alternatives_spanish:
  - su lengua
  - su lenguaje
  lexicon: HALOT
  rationale: לָשׁוֹן literalmente es 'lengua', pero aquí designa el habla o la capacidad de comunicarse. 'Su habla' expresa bien la idea en español moderno sin perder el matiz de comunicación desarticulada. 'Lengua' y 'lenguaje' siguen siendo posibles, pero 'habla' suena más natural en este contexto poético.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la súplica. 'Porque' comunica con claridad la relación causal en español.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - he observado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una realidad contemplada que fundamenta la oración. 'He visto' conserva bien ese valor de experiencia constatada.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - agravio
  - injusticia violenta
  lexicon: HALOT
  rationale: חָמָס denota violencia, brutalidad o conducta violenta. 'Violencia' es la equivalencia más directa y fuerte en español.
- source_word: וְרִיב
  english_pob_choice: and strife
  chosen_spanish: y conflicto
  alternatives_spanish:
  - y contienda
  - y discordia
  lexicon: HALOT
  rationale: רִיב puede abarcar pleito, disputa o contienda. 'Conflicto' comunica bien el campo semántico en español contemporáneo y encaja con 'violencia' en el paralelismo poético.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en la urbe
  lexicon: HALOT
  rationale: La frase locativa es directa; 'en la ciudad' es la forma natural y fiel en español.
theological_decisions:
- issue: Sentido de בַּלַּע en relación con 'divide su habla'
  english_pob_reading: A plea for confusion and breakdown of communication rather than only a literal request to be swallowed up or destroyed.
  chosen_spanish_reading: Una súplica para que sus planes y su comunicación queden desbaratados, más que una petición únicamente de destrucción física.
  alternative_spanish_readings:
  - Trágalos, Señor
  - Destrúyelos, Señor
  rationale: El paralelismo inmediato con 'divide su habla' favorece una lectura de confusión/desarticulación semejante a Babel. Por eso el texto principal usa 'Confúndelos'. La alternativa más literal se conserva para no borrar la tensión semántica del verbo hebreo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y semántica sin resolverla de forma reductiva'
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail inglés y mantiene la decisión óptima-equivalente de leer בַּלַּע como confusión/desintegración comunicativa, preservando en nota las opciones más literales. No hay revisiones posteriores que alteren esta dirección.
  spanish_consistency_notes:
  - Se usa 'Señor' para אֲדֹנָי, conforme al título divino hebreo y al estilo reverente en español.
  - Se mantiene 'violencia' y 'conflicto' para conservar el paralelismo semántico con חָמָס y רִיב.
  - '''Su habla'' evita el calco rígido ''su lengua'' en el texto principal, pero la nota retiene el sentido literal.'
  - No se introduce 'Yahvé' porque el versículo no contiene el nombre propio YHWH, sino el título אֲדֹנָי.
