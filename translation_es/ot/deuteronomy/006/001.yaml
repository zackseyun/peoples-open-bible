translation:
  language: es
  text: 'Y este es el mandamiento: los estatutos y los juicios[a] que Yahvé, el Dios de ustedes, mandó enseñarles, para que los hagan en la tierra a la cual ustedes están cruzando[b], para tomar posesión de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Juicios» traduce מִשְׁפָּטִים; también puede entenderse como «ordenanzas» o «decisiones legales». Se conserva «juicios» para mantener la conexión léxica con la raíz משפט.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea combina el participio de «cruzar/pasar» con el destino «allá»; por eso también puede traducirse «a donde ustedes cruzan», «a donde ustedes están pasando» o «para heredarla / tomar posesión de ella» para el verbo final según el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: Now this is
  chosen_spanish: Y esto es
  alternatives_spanish:
  - Ahora bien, esto es
  - Y este es
  lexicon: HALOT
  rationale: La conjunción con el demostrativo introduce una nueva sección vinculada con lo anterior. «Y esto es» conserva el enlace y suena natural en español bíblico contemporáneo sin añadir información temporal que el hebreo no exige.
- source_word: הַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - el precepto
  lexicon: HALOT
  rationale: El singular funciona como encabezado colectivo para la instrucción del pacto. «Mandamiento» conserva mejor ese valor jurídico-covenantal que «mandato», y evita diluir la unidad retórica del verso.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las prescripciones
  lexicon: HALOT
  rationale: חֻקִּים designa disposiciones fijas o estatuidas. «Estatutos» es el equivalente legal más estable en español y conserva la categoría distinta frente a מִשְׁפָּטִים.
- source_word: וְהַמִּשְׁפָּטִים
  english_pob_choice: and the judgments
  chosen_spanish: y los juicios
  alternatives_spanish:
  - y las ordenanzas
  - y las decisiones judiciales
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a juicios, decisiones legales u ordenanzas. Se eligió «juicios» para mantener la relación léxica con משפט y respetar el registro jurídico, aunque en español puede sentirse menos idiomático que «ordenanzas».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se usa la forma normativa del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino sin sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: el Dios de ustedes
  alternatives_spanish:
  - su Dios
  - su Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona se rinde naturalmente como «de ustedes». En un registro neutral latinoamericano, esta forma evita ambigüedad de número más que «su Dios».
- source_word: לְלַמֵּד אֶתְכֶם
  english_pob_choice: to teach you
  chosen_spanish: enseñarles
  alternatives_spanish:
  - instruirlos
  - darles enseñanza
  lexicon: HALOT
  rationale: El infinitivo de finalidad expresa el propósito del mandato. «Enseñarles» transmite de forma directa y natural la relación entre el mandato y la formación del pueblo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: so that you may do them
  chosen_spanish: para que los hagan
  alternatives_spanish:
  - para hacerlos
  - a fin de que los hagan
  lexicon: HALOT
  rationale: La finalidad se explicita en español para conservar el sentido resultativo del hebreo. Se añade el objeto implícito («los») para referirlo a estatutos y juicios, sin introducir una paráfrasis más amplia.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: «Tierra» refleja el valor covenantal y geográfico del hebreo en Deuteronomio. «País» sería menos fiel al registro bíblico; «tierra prometida» añade información no presente en el verso.
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים שָׁמָּה
  english_pob_choice: into which you are crossing
  chosen_spanish: adonde ustedes van pasando
  alternatives_spanish:
  - adonde ustedes cruzan
  - adonde ustedes están entrando
  lexicon: HALOT
  rationale: La imagen combina movimiento y destino. «Van pasando» conserva el participio y la progresión hacia la tierra sin forzar una expresión demasiado literal o extraña en español; «cruzan» sería más directa pero menos fluida.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it
  chosen_spanish: para tomar posesión de ella
  alternatives_spanish:
  - para poseerla
  - para heredarla
  lexicon: HALOT
  rationale: ירשׁ en Deuteronomio suele implicar entrar y ocupar la tierra, no solo poseerla abstractamente. «Tomar posesión de ella» mantiene el matiz activo y evita reducirlo a «heredarla», que enfatizaría demasiado la recepción pasiva.
theological_decisions:
- issue: Rendición del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El hebreo presenta el Tetragrámaton directamente. La forma «Yahvé» mantiene el nombre propio divino, conforme a la terminología del proyecto, y evita la sustitución por un título como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre el singular «mandamiento» y los plurales «estatutos y juicios»
  english_pob_reading: 'Retain both, with singular as a collective heading: ''the commandment—the statutes and the judgments'''
  chosen_spanish_reading: 'Retener ambos, con el singular como encabezado colectivo: «el mandamiento: los estatutos y los juicios»'
  alternative_spanish_readings:
  - «los mandamientos, estatutos y juicios»
  - «el mandato y los estatutos y juicios»
  rationale: El hebreo usa un singular seguido de dos categorías plurales. Mantener esa distinción evita armonizar el texto y conserva la estructura de encabezado y expansión que parece intencional en la fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
- issue: Valor de מִשְׁפָּטִים
  english_pob_reading: judgments
  chosen_spanish_reading: juicios
  alternative_spanish_readings:
  - ordenanzas
  - decisiones judiciales
  rationale: «Juicios» conserva la relación formal con la raíz משפט y mantiene el campo legal-covenantal. Aunque «ordenanzas» suena más natural para algunos lectores, debilitaría la correspondencia léxica buscada por el proyecto.
  doctrine_reference: HALOT, משפט
- issue: Movimiento hacia la tierra
  english_pob_reading: into which you are crossing
  chosen_spanish_reading: adonde ustedes van pasando
  alternative_spanish_readings:
  - adonde ustedes cruzan
  - en cuya dirección ustedes van
  rationale: El hebreo combina participio de movimiento con dirección final. «Van pasando» intenta reproducir ese proceso sin perder fluidez en español y sin convertir el verbo en una simple entrada estática.
  doctrine_reference: HALOT, עבר
translation_notes:
  revision_awareness: El pasaje del inglés POB se mantuvo sin cambios sustantivos en la revisión más reciente; el presente borrador sigue ese mismo análisis textual y conserva la distinción singular/plural, el nombre divino Yahvé y la alternativa léxica para מִשְׁפָּטִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con la terminología del proyecto.
  - Se usa «mandamiento» en singular como encabezado colectivo, sin pluralizar indebidamente el hebreo.
  - «Estatutos» y «juicios» preservan el paralelismo legal del texto.
  - El objeto implícito de «hacer» se expresa con «los» para referirlo a la serie anterior sin añadir contenido ajeno.
  - Se evita «SEÑOR» para el nombre divino, conforme a la política del proyecto.
