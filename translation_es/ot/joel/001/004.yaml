review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura repetitiva de יֶתֶר ... אָכַל con 'Lo que dejó ... lo comió ...', y preserva la nota sobre la incertidumbre zoológica. Sin embargo, se aparta del enfoque léxico documentado de la POB inglesa al transliterar los cuatro términos hebreos en el texto principal. El original nombra cuatro tipos o etapas de langosta; la auditoría inglesa eligió equivalentes descriptivos legibles ('cutting/swarming/hopping/devouring locust') precisamente para distinguirlos sin fingir precisión zoológica. En español, usar transliteraciones como 'gázam', 'árbê', 'yélek' y 'jasil' no preserva adecuadamente el sentido fuente para lectores comunes.
  spanish_quality_summary: 'El español es comprensible en la sintaxis general, pero la legibilidad se ve afectada por transliteraciones ajenas al uso bíblico normal en español y por una colocación anómala de la marca de nota: ''el [a]gázam[a]''. Un texto eclesial legible debe expresar los insectos como ''langosta ...'' con adjetivos descriptivos. La repetición resulta natural como ''Lo que dejó la langosta cortadora...''.'
  glossary_alignment: 'No hay términos teológicos mayores en juego, pero sí una decisión léxica importante del proyecto: cuando la POB inglesa documenta una distinción descriptiva, el español debe preservarla con claridad. Aquí conviene seguir ''langosta cortadora / en enjambre / saltarina / devoradora'' en el texto principal, manteniendo en nota la incertidumbre de que podrían ser clases o etapas. Eso se ajusta mejor a la racionalidad léxica auditada que la transliteración.'
  issues:
