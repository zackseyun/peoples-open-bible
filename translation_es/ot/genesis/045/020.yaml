revisions:
- from: Y no tenga compasión vuestra[a] vista sobre vuestros enseres, porque lo mejor de toda la tierra de Egipto será vuestro.
  to: Y que sus ojos[a] no perdonen sus enseres, porque todo lo mejor de la tierra de Egipto es suyo.
  rationale: Se revisa para conservar la imagen hebrea de 'ojo' sin caer en una construcción española ininteligible. 'Que sus ojos no perdonen' refleja mejor עֵינְכֶם ... תָּחֹס que 'vuestra vista tenga compasión'. Se mantiene 'enseres' como opción válida y digna para כְּלֵיכֶם. Se cambia 'será vuestro' a 'es suyo' para reflejar la posesión enfática de לָכֶם הוּא. También se adapta el tratamiento a un registro más neutral latinoamericano.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:23:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador intenta conservar el modismo hebreo de 'ojo' como sujeto de חוס, pero la formulación española no refleja bien el sentido ni la sintaxis natural del hebreo. 'Vuestra vista' y 'tenga compasión ... sobre vuestros enseres' resultan poco idiomáticos y confusos. Además, לָכֶם הוּא se expresa mejor en presente posesivo ('es vuestro') que en futuro ('será vuestro'), ya que el hebreo afirma posesión/garantía, no un futuro verbal explícito.
  spanish_quality_summary: La redacción actual suena forzada y poco natural para un lector hispano general. 'Vuestra vista' es un sujeto impropio en este contexto; 'sobre vuestros enseres' es calco duro; y la combinación completa dificulta la comprensión. Conviene mantener la imagen de 'ojo' pero con una construcción española clara. También es preferible evitar el voseo/vosotros castellano si el objetivo es español neutral latinoamericano amplio.
  glossary_alignment: No hay términos teológicos mayores en juego. La revisión mejora la fidelidad léxica a וְעֵינְכֶם אַל תָּחֹס mediante 'no perdonen sus ojos', conserva 'enseres' como opción válida para כְּלֵיכֶם, y ajusta לָכֶם הוּא a 'es suyo' para reflejar mejor la posesión enfática del hebreo.
  issues:
  - severity: high
    issue: 'Construcción española antinatural: ''no tenga compasión vuestra vista sobre vuestros enseres'''
    rationale: Aunque busca preservar el modismo, la frase no es legible ni idiomática en español. 'Vista' no funciona bien aquí como equivalente de 'ojo', y 'tener compasión sobre' suena impropio.
  - severity: medium
    issue: Uso de 'vuestra/vuestros' fuera del objetivo de español neutral latinoamericano
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. 'Su/sus' o una forma impersonal encaja mejor que el paradigma peninsular 'vuestro'.
  - severity: medium
    issue: '''será vuestro'' debilita la posesión afirmada por לָכֶם הוּא'
    rationale: El hebreo no tiene verbo futuro aquí; expresa posesión enfática presente/asegurada. 'Es suyo' o 'les pertenece' es más fiel.
  - severity: low
    issue: La nota al pie explica el literal pero no ayuda a resolver la posible extrañeza en español
    rationale: Conviene una nota que aclare la alternativa de sentido ('no se preocupen por sus bienes') mientras se conserva la imagen del ojo en el texto principal.
  revised_spanish_text: Y que sus ojos[a] no perdonen sus enseres, porque todo lo mejor de la tierra de Egipto es suyo.
