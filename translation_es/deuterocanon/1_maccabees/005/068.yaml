  text: And Judas turned aside into Azotus[a], the land of foreigners, and he tore down their altars, and burned the carved images of their gods with fire, and plundered the spoil of the cities[b], and returned to Judea.
  footnotes:
  - marker: a
    text: Or, more specifically in historical context, 'the land of the Philistines.' The Greek reads more literally 'the land of foreigners.'
    reason: alternative_reading
  - marker: b
    text: The Greek verb here is plural ('they burned'), though the surrounding verbs are singular. This likely refers to Judas's forces rather than Judas alone.
    reason: textual_variant
