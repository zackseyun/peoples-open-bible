revisions:
- from: Aaron hará expiación sobre sus cuernos una vez al año[a]. Con la sangre de la ofrenda por el pecado de la expiación hará expiación por él una vez al año, por vuestras generaciones. Santísimo es para Yahvé.
  to: Aarón hará expiación sobre sus cuernos una vez al año[a]. Con la sangre de la ofrenda por el pecado de la expiación hará expiación por él una vez al año, a lo largo de sus generaciones. Es santísimo para Yahvé.
  rationale: Se corrige 'Aaron' a 'Aarón', se reemplaza 'por vuestras generaciones' por 'a lo largo de sus generaciones' para un español más natural y neutral sin perder el sentido de continuidad generacional, y se suaviza el orden final a 'Es santísimo para Yahvé'. Se conserva la nota léxica existente porque sigue siendo pertinente para el valor literal de la construcción hebrea.
  reviewer_model: gpt-5.4
