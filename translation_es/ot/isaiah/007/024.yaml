    issue: La frase 'será de zarzas y espinos' no es natural ni reproduce bien el matiz resultativo contextual.
    rationale: El hebreo usa 'será', pero la auditoría inglesa justificó 'will become' por el contexto de tierra cultivada que pasa a desolación. En español, 'será de' suena forzado; 'se convertirá en' transmite mejor el resultado y mantiene legibilidad.
  - severity: low
