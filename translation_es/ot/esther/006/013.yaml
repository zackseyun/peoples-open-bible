translation:
  language: es
  text: 'Entonces Amán contó a Zeres, su esposa, y a todos sus amigos todo lo que le había acontecido. Entonces sus sabios y Zeres, su esposa, le dijeron[a]: «Si Mardoqueo, delante de quien has comenzado a caer, es de la descendencia de los judíos, no prevalecerás sobre él, porque ciertamente caerás delante de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es de origen judío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - dijo
  lexicon: HALOT
  rationale: ספר en esta narración introduce un relato de hechos; «contó» conserva la idea de narrar algo ya ocurrido sin sonar forzado en español.
- source_word: אֹהֲבָיו
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus allegados
  - los que lo querían
  lexicon: HALOT
  rationale: En este contexto cortesano, el término designa a sus asociados o compañeros; «sus amigos» reproduce la función relacional que la POB inglesa documenta.
- source_word: כָּל אֲשֶׁר קָרָהוּ
  english_pob_choice: everything that had happened to him
  chosen_spanish: todo lo que le había acontecido
  alternatives_spanish:
  - todo lo que le había pasado
  - todo lo que le había sucedido
  lexicon: HALOT
  rationale: קרה indica lo que le sucedió a alguien; «le había acontecido» mantiene el registro narrativo y la secuencia temporal implícita.
- source_word: חֲכָמָיו
  english_pob_choice: his wise men
  chosen_spanish: sus sabios
  alternatives_spanish:
  - sus consejeros
  - sus hombres sabios
  lexicon: HALOT
  rationale: חכמים se traduce literalmente como «sabios»; en el entorno persa puede referirse a consejeros, pero se preserva el valor léxico básico.
- source_word: מִזֶּרַע הַיְּהוּדִים
  english_pob_choice: is from the seed of the Jews
  chosen_spanish: es de la descendencia de los judíos
  alternatives_spanish:
  - es de la simiente de los judíos
  - es de origen judío
  lexicon: HALOT
  rationale: זרע conserva la metáfora de linaje; en español «descendencia» expresa esa idea con naturalidad sin borrar el trasfondo genealógico.
- source_word: הַחִלּוֹתָ לִנְפֹּל לְפָנָיו
  english_pob_choice: before whom you have begun to fall
  chosen_spanish: delante de quien has comenzado a caer
  alternatives_spanish:
  - ante quien has empezado a caer
  - delante de quien has empezado a caer
  lexicon: HALOT
  rationale: החל + infinitivo señala inicio de una acción; se mantiene «comenzado a caer» para conservar la imagen de la caída y la progresión retórica.
- source_word: לֹא תוּכַל לוֹ
  english_pob_choice: you will not prevail against him
  chosen_spanish: no podrás prevalecer contra él
  alternatives_spanish:
  - no podrás vencerlo
  - no podrás resistirle
  lexicon: HALOT
  rationale: יכל + ל expresa capacidad/posibilidad frente a otro; «prevalecer contra» reproduce la fuerza adversativa sin perder naturalidad en español.
- source_word: נָפֹל תִּפּוֹל
  english_pob_choice: you will surely fall
  chosen_spanish: ciertamente caerás
  alternatives_spanish:
  - caerás sin falta
  - caerás de seguro
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo finito; «ciertamente caerás» conserva esa certeza enfática en un español digno y claro.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: La preposición marca posición/subordinación frente a Mardoqueo; «delante de él» sostiene la repetición del hebreo y funciona bien en español.
translation_notes:
  revision_awareness: La versión anterior falló porque el marcador de nota [a] no aparecía en el texto español. En esta corrección, el marcador se ha insertado junto a «dijeron» para anclar la alternativa léxica correspondiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la repetición de «delante de él» para reflejar el patrón hebreo de caída/subordinación.
  - «Sabios» traduce literalmente חֲכָמָיו y evita sustituirlo por una glosa interpretativa no necesaria en el texto base.
