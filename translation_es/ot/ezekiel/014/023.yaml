review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general: los sobrevivientes/ellos son el medio del consuelo; «cuando veáis sus caminos y sus obras» refleja adecuadamente כִּי תִרְאוּ אֶת־דַּרְכָּם וְאֶת־עֲלִילוֹתָם; y la cláusula final comunica correctamente que las acciones de Dios contra Jerusalén no fueron gratuitas. También conserva las notas alternativas relevantes.'
  spanish_quality_summary: La calidad es generalmente buena, pero requiere ajustes menores de estilo y alineación de proyecto. «Veáis» y «vuestro» en notas suenan peninsulares, no neutrales latinoamericanas. Además, «declara el Señor Yahvé» no sigue del todo la preferencia del proyecto por visibilizar Yahvé en el texto principal sin depender de «Señor» como forma principal; «declara el Señor Dios, Yahvé» sería demasiado pesado, por lo que la mejor solución es «declara el Señor Yahvé» o «declara el Señor, Yahvé». Sin embargo, el problema principal reparable es el registro dialectal; conviene pasar a «vean»/«ustedes».
  glossary_alignment: Cumple bien con «Yahvé» para יהוה y mantiene la distinción de אֲדֹנָי + יהוה mediante «Señor Yahvé». No hay otros términos del glosario en conflicto. La revisión propuesta no altera la terminología teológica central.
  issues:
  - severity: medium
    issue: Registro pronominal peninsular en el texto principal
    rationale: «veáis» no encaja con la meta declarada de español neutral latinoamericano / de amplia legibilidad eclesial. «vean» mantiene dignidad y mejora la naturalidad panhispánica.
  - severity: medium
    issue: Registro peninsular en la nota a
    rationale: La nota usa «vuestro consuelo», que desentona con el objetivo de neutralidad latinoamericana. Debe cambiarse a «su consuelo» o reformularse.
  - severity: low
    issue: Puntuación del título divino podría mejorarse
    rationale: «declara el Señor Yahvé» es comprensible y defendible, pero una coma aposicional («declara el Señor, Yahvé») puede sonar más natural en español para distinguir los dos elementos. Aun así, no es indispensable; el ajuste principal es dialectal.
  revised_spanish_text: Y los consolarán cuando vean sus caminos y sus obras[a]; y sabrán que no hice sin causa todo lo que hice en ella[b][c], declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «serán consolados por ellos» o «ellos les darán consuelo». La forma hebrea permite que los sobrevivientes sean el medio de su consuelo al ver su conducta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hice en ella todo lo que hice sin razón».'
    reason: alternative_reading
  - marker: c
    text: Esto es, en Jerusalén.
    reason: cross_reference
