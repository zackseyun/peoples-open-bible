review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la secuencia básica del hebreo: la triple orden de apartarse, el grito de impureza, la prohibición de tocar, la explicación causal, y la declaración final entre las naciones. Sin embargo, falta una nota para la rareza y ambigüedad de נָצוּ (''huyeron'' / ''fueron expulsados''), que el rastro auditado del POB inglés sí preserva. Además, ''aun anduvieron errantes'' suena algo forzado en español, y la cláusula final puede expresarse con mayor naturalidad sin perder el matiz de גור.'
  spanish_quality_summary: El español es mayormente claro y digno, pero requiere un ajuste menor de naturalidad y de aparato crítico. 'Aun anduvieron errantes' resulta poco idiomático; 'hasta vagaron' o 'también vagaron' comunica mejor el desarraigo. 'No seguirán residiendo' es comprensible, pero 'Ya no seguirán residiendo' mejora la fluidez. También conviene anclar correctamente las notas en el texto según la política del proyecto.
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Inmundos' refleja bien טָמֵא; 'Apártense' es una buena opción para סוּרוּ; 'no toquen' preserva literalmente נגע. La decisión sobre גור se mantiene adecuadamente con una nota alternativa sobre 'sojornar'. La única omisión relevante es la alternativa lexical documentada para נָצוּ.
  issues:
  - severity: medium
    issue: Falta la nota léxica para נָצוּ
    rationale: El POB inglés conserva explícitamente la alternativa 'they have been driven away' por la rareza y debate del verbo. El español adoptó 'huyeron' pero omitió esa nota, perdiendo una decisión auditada significativa.
  - severity: low
    issue: '''aun anduvieron errantes'' suena poco natural en español'
    rationale: Aunque es semánticamente defendible, la combinación es tiesa y menos legible. Una formulación como 'hasta vagaron' conserva el progreso enfático de גַּם y el sentido de desplazamiento.
  - severity: low
    issue: La nota existente debe anclarse de forma ordenada junto con la nueva nota
    rationale: Si se añade la nota para 'huyeron', los marcadores deben quedar únicos y en orden en el texto revisado.
