    text: 'Hebreo: «Yahvé». El texto principal sigue el estándar del proyecto de verter el nombre divino יהוה como «Yahvé».'
    reason: alternative_reading
  revision_rationale: Se ajusta «prometió» a «hizo voto» para reflejar con más fidelidad נָדַר y mantener el paralelismo solemne con «juró». Se mueve el marcador de la nota a «Yahvé», que es el término al que realmente se refiere la nota. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
