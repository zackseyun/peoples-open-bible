review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del verso y mantiene las alternativas principales, pero no preserva con suficiente fidelidad dos puntos clave del hebreo y del rastro POB: אָבוֹא se acerca más a «vendré/iré» que a «entraré», y el título compuesto אֲדֹנָי יְהוִה no debe reducirse simplemente a «Yahvé», porque se pierde אֲדֹנָי. También la nota b no coincide con el texto principal, ya que ofrece «anunciaré» como alternativa cuando el texto ya dice «proclamaré».'
  spanish_quality_summary: El español es claro y digno, pero «Entraré en las hazañas poderosas» suena algo forzado en español bíblico natural. «Vendré con/en los poderosos hechos del Señor Yahvé» o similar lee mejor. «Solo la tuya» es entendible, pero «la tuya sola» o «solo la tuya» ambas funcionan; no es el principal problema. Las notas necesitan alinearse mejor con el texto y evitar duplicar semánticamente el término principal.
  glossary_alignment: Hay buena alineación con «Yahvé» para יהוה, pero aquí el compuesto אֲדֹנָי יְהוִה exige conservar también el elemento «Señor». «Justicia» para צִדְקָתְךָ es válido. «Proclamaré» para אַזְכִּיר es adecuado. «Hazañas poderosas» transmite גבורות, aunque «hechos poderosos» o «actos poderosos» es más natural y menos heroizante.
  issues:
  - severity: high
    issue: Se omite אֲדֹנָי en el título divino compuesto
    rationale: El hebreo dice אֲדֹנָי יְהוִה; traducir solo «Yahvé» pierde un componente léxico explícito del texto fuente. La política del proyecto exige «Yahvé» para יהוה, pero no autoriza borrar אֲדֹנָי.
  - severity: medium
    issue: «Entraré» sobreinterpreta אָבוֹא
    rationale: בוא en este contexto se auditó como «I will come», con alternativas «go/enter». «Entraré» introduce un matiz de ingreso que el hebreo no exige y que suena menos natural con «en las hazañas poderosas».
  - severity: medium
    issue: La nota b no refleja una verdadera alternativa al texto principal
    rationale: Si el texto principal usa «proclamaré», la nota alternativa no debería dar «anunciaré», que es casi sinónimo, sino una opción más literal como «mencionaré» o «recordaré/relataré», conforme al rastro inglés.
  - severity: low
    issue: «Hazañas poderosas» puede sonar algo literario-heroizante
    rationale: Aunque semánticamente posible, «hechos poderosos» o «actos poderosos» representa mejor גבורות en un registro bíblico claro y menos marcado por connotaciones épicas.
  revised_spanish_text: Vendré en los poderosos hechos del Señor Yahvé[a]; proclamaré tu justicia[c][b], solo la tuya.
  revised_footnotes:
  - marker: a
    text: 'O: «con los poderosos hechos del Señor Yahvé». La preposición puede entenderse de manera instrumental o locativa.'
    reason: lexical_alternative
