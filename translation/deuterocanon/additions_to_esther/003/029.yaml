  - 784
  confidence: high
  validation: normalized_partition_extract
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Standalone ESG chapter 3 = Addition C, segmented from Swete pages 781-784 with First1KGreek used only as a verse-anchor map.
translation:
  text: O God[a], who are mighty over all, hear the voice of those who have lost hope, and rescue us from the hand of those who do evil, and rescue me from my fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'rescue me from the thing I fear.' The Greek can refer either to Esther's fear itself or to the danger she fears.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς
  chosen: O God
  alternatives:
  - God
  lexicon: LSJ
  rationale: The nominative with article functions as a vocative in prayer. English idiom naturally renders this direct address as 'O God,' preserving the prayerful tone.
- source_word: ὁ ἰσχύων
  chosen: who are mighty
  alternatives:
  - the one who is strong
  - who have power
  - who prevail
  lexicon: LSJ
  rationale: The participle describes God's power or strength. 'Who are mighty' is natural in direct address and preserves the attributive force without sounding wooden.
- source_word: ἐπὶ πάντας
  chosen: over all
  alternatives:
  - against all
  - over everyone
  - over all people
  lexicon: LSJ
  rationale: With ἰσχύων, ἐπὶ πάντας conveys supremacy or power extending over all. 'Over all' is concise and preserves the broad scope without unnecessarily restricting πάντας to persons only.
- source_word: εἰσάκουσον
  chosen: hear
  alternatives:
  - listen to
  - give ear to
  lexicon: LSJ
  rationale: An aorist imperative in prayer asking for attentive hearing. 'Hear' is the standard and suitably solemn English equivalent in prayer language.
- source_word: φωνὴν ἀπηλπισμένων
  chosen: the voice of those who have lost hope
  alternatives:
  - the cry of the despairing
  - the voice of the hopeless
  lexicon: LSJ
  rationale: ἀπηλπισμένων denotes people in despair or without hope. 'Those who have lost hope' communicates the state clearly in modern English while retaining the pathos of the Greek.
- source_word: ῥῦσαι ἡμᾶς
  chosen: rescue us
  alternatives:
  - deliver us
  - save us
  lexicon: LSJ
  rationale: ῥύομαι commonly means to rescue or deliver from danger. 'Rescue' is vivid, accessible modern English and fits the immediate peril in the context.
- source_word: ἐκ χειρὸς
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: LSJ
  rationale: The idiom 'from the hand of' is common biblical language for hostile power or control. It is transparent enough in English and preserves the metaphor of the source.
- source_word: τῶν πονηρευομένων
  chosen: those who do evil
  alternatives:
  - evildoers
  - those acting wickedly
  - those who are plotting evil
  lexicon: LSJ
  rationale: The middle/passive participial form here denotes people engaged in wicked action. 'Those who do evil' is clear and avoids over-specifying whether the evil is general or specifically conspiratorial.
- source_word: ῥῦσαί με
  chosen: rescue me
  alternatives:
  - deliver me
  - save me
  lexicon: LSJ
  rationale: Repeating 'rescue' preserves the rhetorical parallelism with the earlier petition and reflects the repeated Greek verb.
- source_word: ἐκ τοῦ φόβου μου
  chosen: from my fear
  alternatives:
  - from the thing I fear
  - from my dread
  lexicon: LSJ
  rationale: The Greek most directly reads 'from my fear.' This may mean either the internal state of fear or the feared danger, but the wording itself points first to the emotion. The translation preserves that ambiguity rather than resolving it.
