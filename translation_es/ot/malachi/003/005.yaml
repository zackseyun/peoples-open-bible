  yaml_path: translation/ot/malachi/003/005.yaml
  text: Then I will come near to you for judgment[a], and I will be a swift witness against sorcerers, against adulterers, against those who swear falsely, against those who oppress the wages of a hired worker, the widow and the fatherless, and those who turn aside the sojourner, and do not fear me[c][b], says Yahweh of Armies.
  footnotes:
