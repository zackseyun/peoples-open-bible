    reason: lexical_alternative
  revision_rationale: Se corrige la desalineación de notas para que el aparato crítico corresponda al texto auditado y al hebreo. También se mejora la naturalidad y fidelidad de קוֹל בִּכְיִי con 'el sonido de mi llanto', y se aligera el vocativo con 'todos los que hacen maldad', que conserva la imagen verbal de פֹּעֲלֵי אָוֶן sin la rigidez de 'hacedores'.
