    rationale: Es correcto y claro, pero 'dolores de parto' encaja mejor con el tono bíblico y la imagen de angustia intensa. No obstante, es una mejora estilística, no una corrección indispensable.
  revised_spanish_text: Queriot[a] ha sido capturada, y las fortalezas han sido tomadas; y el corazón de los guerreros de Moab será en aquel día como el corazón de una mujer con dolores de parto.
