base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/007/025.yaml
  text: You shall burn the carved images of their gods with fire[a]. You shall not covet the silver or gold that is on them and take it for yourself, lest you be ensnared by it[b], for it is an abomination to Yahweh your God.
  footnotes:
  - marker: a
    text: Or 'the silver and gold on them.' The Hebrew conjunction is 'and'; English 'or' in a prohibition can naturally express either item individually.
    reason: lexical_alternative
  - marker: b
    text: Or 'lest you be trapped by it.' The Hebrew verb carries the imagery of being caught in a snare.
    reason: lexical_alternative
