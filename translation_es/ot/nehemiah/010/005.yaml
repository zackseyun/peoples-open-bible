  verdict: revise
  source_alignment_summary: 'El hebreo contiene únicamente tres nombres propios en secuencia: חַטּוּשׁ, שְׁבַנְיָה, מַלּוּךְ. El borrador español conserva que son nombres propios, pero introduce adaptaciones innecesarias y además coloca una nota en el nombre equivocado. La nota léxica del inglés corresponde a מַלּוּךְ/Malluk ~ Malluch, no a חַטּוּשׁ.'
  spanish_quality_summary: La legibilidad en español es aceptable, pero las formas 'Hatús', 'Sebanías' y 'Maluc' son demasiado adaptadas y se alejan sin necesidad del patrón transliterado usado en el expediente inglés. En una lista de nombres, conviene máxima estabilidad formal. Además, el anclaje de la nota debe ir en 'Maluc/Malluk', no en 'Hatús'.
  glossary_alignment: No hay términos teológicos de glosario mayor aquí. Para nombres propios, el principio auditado es transliterar, no traducir ni hispanizar en exceso. 'Hattush', 'Shebaniah' y 'Malluk' preservan mejor la evidencia fuente y la trazabilidad con el POB inglés. La alternativa tradicional debe conservarse como nota sobre 'Malluk'.
  issues:
