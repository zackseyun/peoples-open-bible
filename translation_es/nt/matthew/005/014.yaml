review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego: la identificación metafórica directa (''Ustedes son la luz del mundo'') y la imposibilidad de ocultar una ciudad en alto. Sin embargo, la nota al pie no preserva con fidelidad la alternativa documentada en el audit trail inglés: el griego κειμένη significa literalmente ''yaciendo/situada'', no ''puesta''. La alternativa española debería reflejar más de cerca ''una ciudad situada sobre una montaña/monte'' o ''que yace sobre un monte'', no repetir esencialmente la misma formulación del texto principal.'
  spanish_quality_summary: El español es claro, natural y ampliamente legible. 'Ustedes' encaja bien con el objetivo neutral latinoamericano. 'Una ciudad puesta sobre un monte' es comprensible, pero 'situada' o 'asentada' suena un poco más idiomático para una ciudad. Aun así, el cambio principal necesario es en la nota, no obligatoriamente en el texto principal.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. 'la luz del mundo' y 'mundo' están bien. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión 'Ustedes' concuerda con el estilo meta.
  issues:
  - severity: medium
    issue: La nota al pie no refleja la alternativa léxica preservada por el POB inglés.
    rationale: 'La nota inglesa dice más literalmente: ''A city lying on a mountain cannot be hidden.'' La nota española propuesta dice ''Una ciudad puesta sobre una montaña no puede ocultarse'', que no representa la literalidad de κειμένη (''yaciendo/situada'') y además duplica casi el mismo giro del texto principal.'
  - severity: low
    issue: La formulación de la nota incluye comillas y prefijo poco natural.
    rationale: '"O: «...»." suena torpe en español editorial; conviene una nota más limpia y directa.'
  revised_spanish_text: Ustedes son la luz del mundo[a]. Una ciudad puesta sobre un monte no puede ocultarse.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Una ciudad situada sobre una montaña no puede ocultarse».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y legible. Se corrige la nota para que represente de verdad la alternativa más literal del griego, especialmente el participio κειμένη ('situada/yaciendo') y la opción 'montaña' documentada en el audit trail inglés.
