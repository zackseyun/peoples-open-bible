    reason: lexical_alternative
  - marker: b
    text: O «escudriñarla» o «investigarla» para «explorarla».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la casa de Micah», que puede referirse al complejo doméstico o propiedad de Mica.
    reason: cultural_note
