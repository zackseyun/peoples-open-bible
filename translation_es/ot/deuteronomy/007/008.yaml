translation:
  language: es
  text: pero porque Yahvé los ama y porque está cumpliendo el juramento que les juró a sus padres, Yahvé los sacó con mano poderosa[a] y los redimió de la casa de esclavos[b], de la mano de Faraón, rey de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «con mano fuerte»; es un modismo común para la poderosa liberación de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O, más tradicionalmente, «de la casa de esclavitud». El hebreo dice literalmente «de la casa de esclavos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: but because
  chosen_spanish: pero porque
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: En este contexto, כִּי retoma y contrasta con la negación de 7:7; en español conviene conservar el valor adversativo-explicativo con «pero porque», que une contraste y causa sin perder claridad.
- source_word: מֵאַהֲבַת
  english_pob_choice: because ... loves
  chosen_spanish: porque ... ama
  alternatives_spanish:
  - a causa del amor de
  - por el amor de
  lexicon: HALOT
  rationale: La construcción causal se expresa naturalmente en español con «porque ... ama», manteniendo la fuerza verbal del amor de Yahvé hacia Israel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se preserva el nombre propio divino según la pauta del proyecto: Yahvé, en lugar de sustituirlo por un título.'
- source_word: וּמִשָּׁמְרוֹ
  english_pob_choice: and because he is keeping
  chosen_spanish: y porque está guardando
  alternatives_spanish:
  - y porque guarda
  - y porque guardó
  - y por guardar
  lexicon: HALOT
  rationale: El participio verbal expresa fidelidad continuada al juramento; «está guardando» conserva esa idea de acción en curso y suena natural en español.
- source_word: הַשְּׁבֻעָה
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - el juramento solemne
  - el voto
  lexicon: HALOT
  rationale: Aunque «oath» puede ser «juramento» u «oath», en español bíblico «juramento» comunica mejor la solemnidad del compromiso pactal.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: El hebreo es literalmente «a sus padres»; como el texto habla al pueblo en conjunto, «sus padres» mantiene la referencia histórica a los patriarcas sin forzar un giro marcadamente masculino en español receptor.
- source_word: הוֹצִיא
  english_pob_choice: brought you out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los sacó de
  lexicon: HALOT
  rationale: «Sacar» reproduce bien el lenguaje del éxodo en español y conserva la direccionalidad del verbo hebreo de liberación.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a mighty hand
  chosen_spanish: con mano poderosa
  alternatives_spanish:
  - con mano fuerte
  - con mano portentosa
  lexicon: HALOT
  rationale: La expresión es un modismo de acción divina poderosa; «mano poderosa» mantiene el valor idiomático y resulta idiomática en español bíblico contemporáneo.
- source_word: וַיִּפְדְּךָ
  english_pob_choice: redeemed you
  chosen_spanish: los redimió
  alternatives_spanish:
  - los rescató
  - los libró
  lexicon: HALOT
  rationale: «Redimir» conserva el peso teológico del acto de liberación de la esclavitud, en paralelo con el uso del proyecto para פדה.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slaves
  chosen_spanish: de la casa de esclavos
  alternatives_spanish:
  - de la casa de esclavitud
  - de la casa de servidumbre
  lexicon: HALOT
  rationale: Se mantiene la literalidad de la imagen hebrea («casa de esclavos») tal como la opción inglesa audita el valor concreto del sustantivo, preservando la dureza del contexto de Egipto.
- source_word: מִיַּד פַּרְעֹה
  english_pob_choice: from the hand of Pharaoh
  chosen_spanish: de la mano de Faraón
  alternatives_spanish:
  - del poder de Faraón
  - de la mano de Pharaoh
  lexicon: HALOT
  rationale: La metáfora de la «mano» como poder/liberación se conserva literalmente en español.
- source_word: מֶלֶךְ מִצְרָיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - monarca de Egipto
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural en español; no requiere ajuste especial.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la directriz del proyecto de transliterar el Tetragrámaton como Yahvé, preservando el nombre del pacto en lugar de una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de parentesco pactal אֲבֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - vuestros padres
  rationale: La referencia histórica apunta a los patriarcas; en español, «sus padres» conserva la relación ancestral sin neutralizar innecesariamente el término ni romper la lectura en segunda persona plural del discurso.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Bondage language in עֲבָדִים
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - esclavitud
  - siervos
  rationale: El contexto del éxodo exige mantener el carácter de opresión concreta. «Casa de esclavos» preserva la fuerza del hebreo y evita suavizar el término con «siervos».
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος as analogous bonded-language principle
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión menor en בְיָד חֲזָקָה: de «strong hand» a «mighty hand». En español se optó por «mano poderosa», que conserva el modismo de poder divino sin sonar rígido ni depender de un calco poco natural. También se mantuvo la equivalencia literal de «house of slaves» con «casa de esclavos», por coherencia con la decisión inglesa documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se mantiene «redimió» para פדה, en línea con el valor teológico del éxodo.
  - «Casa de esclavos» conserva el concreto de bondage y armoniza con el estilo del POB.
  - El pronombre objeto plural «los» refleja el destinatario colectivo de Israel en español natural.
