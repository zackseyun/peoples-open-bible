translation:
  language: es
  text: 'Pues Job ha dicho[a]: «Tengo razón, y Dios ha quitado mi justicia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijo».
    reason: lexical_alternative
  - marker: b
    text: O «mi derecho» o «la justicia que me corresponde».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de Eliú sobre lo que Job ha dicho. En español, «Porque» conserva mejor el valor explicativo del hebreo que un «pues» más interpretativo o un «ya que» excesivamente causal.
- source_word: אָמַר
  english_pob_choice: has said
  chosen_spanish: ha dicho
  alternatives_spanish:
  - dijo
  - dice
  lexicon: HALOT
  rationale: El perfecto expresa una declaración previa relevante para el argumento presente. «Ha dicho» suena natural en español y mantiene ese valor discursivo.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Se conserva la forma tradicional del nombre propio en español.
- source_word: צָדַקְתִּי
  english_pob_choice: I am in the right
  chosen_spanish: Yo estoy en lo justo
  alternatives_spanish:
  - soy justo
  - tengo razón
  - estoy en lo correcto
  lexicon: HALOT
  rationale: La expresión hebrea en este contexto es forense y disputativa. «Estoy en lo justo» mantiene la idea de estar en lo correcto en la controversia sin convertirla en una afirmación absoluta de impecabilidad moral.
- source_word: וְאֵל
  english_pob_choice: and God
  chosen_spanish: y Dios
  alternatives_spanish:
  - y el Dios
  - pero Dios
  lexicon: HALOT
  rationale: אֵל se traduce por «Dios», el equivalente natural y reverente en español. Se conserva la conjunción aditiva del hebreo; no hay base suficiente para introducir contraste con «pero».
- source_word: הֵסִיר
  english_pob_choice: has taken away
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha removido
  - ha apartado
  - me ha quitado
  lexicon: HALOT
  rationale: El hiphil de סור puede expresar quitar o remover. «Ha quitado» es claro y suficientemente literal en español, y evita una paráfrasis más interpretativa.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi derecho
  alternatives_spanish:
  - mi justicia
  - la justicia que me corresponde
  - mi causa
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí sostiene una tensión entre justicia y derecho/legalidad. «Mi derecho» comunica bien la dimensión forense y preserva la alternativa de que se trate del derecho que le corresponde, sin volver la frase extraña en español.
theological_decisions:
- issue: Alcance de la autoafirmación de Job
  english_pob_reading: Render צָדַקְתִּי as 'I am in the right' rather than 'I am righteous.'
  chosen_spanish_reading: «Yo estoy en lo justo»
  alternative_spanish_readings:
  - «soy justo»
  - «estoy en lo correcto»
  rationale: La formulación evita presentar a Job como si reclamara perfección moral absoluta. Mantiene el sentido jurídico/disputativo de la réplica de Job dentro del debate del libro.
  doctrine_reference: Translation philosophy §3, §6
- issue: Tensión semántica de מִשְׁפָּטִי
  english_pob_reading: Use 'my justice' in the main text, with a footnote for 'my right' or 'the justice due me.'
  chosen_spanish_reading: «mi derecho»
  alternative_spanish_readings:
  - «mi justicia»
  - «la justicia que me corresponde»
  - «mi causa»
  rationale: En español, «derecho» retiene el matiz legal y resulta más idiomático que «mi justicia» en esta construcción. La decisión preserva la tensión entre justicia, derecho y caso judicial que está presente en el hebreo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés de POB para Job 34:5, pero adapta la última cláusula a un español más natural. Se mantuvo la estructura argumentativa («Porque…») y la afirmación forense de Job, con ajuste léxico en מִשְׁפָּטִי para conservar la tensión semántica entre justicia y derecho.
  spanish_consistency_notes:
  - Se usó «Dios» para אֵל conforme a la norma del proyecto.
  - Se prefirió «ha dicho» para reflejar el perfecto hebreo con valor discursivo.
  - Se optó por un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - La nota al pie preserva la alternativa léxica principal documentada en el audit trail inglés.
