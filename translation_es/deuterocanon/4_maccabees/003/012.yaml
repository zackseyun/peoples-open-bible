translation:
  language: es
  text: Por tanto[a], mientras los defensores estaban indignados por el deseo del rey, dos jóvenes soldados, hombres firmes, avergonzados del deseo del rey, se armaron con toda la armadura y tomaron una jarra[b], y cruzaron las empalizadas[c] enemigas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Por tanto» expresa la relación inferencial de ὅθεν con lo anterior; también podría entenderse como «por eso» o «así que».
    reason: lexical_alternative
  - marker: b
    text: κάλπις denota una jarra o cántaro, probablemente para agua.
    reason: cultural_note
  - marker: c
    text: El griego habla de χάρακας, es decir, estacadas o empalizadas militares; «empalizadas» conserva el sentido de una defensa hecha de estacas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: LSJ
  rationale: Marca una consecuencia o transición inferencial desde el relato anterior. «Por tanto» conserva la relación lógica con tono sobrio y bíblico, sin volverse demasiado arcaico.
- source_word: ὑπερασπιστῶν
  english_pob_choice: defenders
  chosen_spanish: defensores
  alternatives_spanish:
  - protectores
  - guardianes
  - campeones
  lexicon: LSJ
  rationale: El término nombra a quienes defienden o protegen. «Defensores» es directo y no introduce una función militar más específica de la que permite el griego.
- source_word: ἐπὶ τῇ τοῦ βασιλέως ἐπιθυμίᾳ
  english_pob_choice: at the king’s desire
  chosen_spanish: por el deseo del rey
  alternatives_spanish:
  - a causa del deseo del rey
  - por la ambición del rey
  - ante el deseo del rey
  lexicon: LSJ
  rationale: ἐπιθυμία puede expresar deseo, anhelo o codicia. «Por el deseo del rey» mantiene la referencia amplia y la relación causal/temática que sugiere el contexto, sin especificar más de lo que el griego exige.
- source_word: σχετλιάζόντων
  english_pob_choice: were indignant
  chosen_spanish: estaban indignados
  alternatives_spanish:
  - se indignaban
  - estaban enfurecidos
  - estaban resentidos
  lexicon: LSJ
  rationale: El participio comunica fuerte disgusto u ofensa moral. «Estaban indignados» reproduce bien ese matiz en español y mantiene el tono elevado.
- source_word: δύο νεανίσκοι
  english_pob_choice: two young soldiers
  chosen_spanish: dos jóvenes soldados
  alternatives_spanish:
  - dos jóvenes
  - dos muchachos soldados
  lexicon: LSJ
  rationale: Aunque νεανίσκοι significa literalmente «jóvenes», el contexto inmediato los identifica como soldados. La solución conserva ambos rasgos de manera natural en español.
- source_word: στρατιῶται καρτεροί
  english_pob_choice: steadfast men
  chosen_spanish: hombres firmes
  alternatives_spanish:
  - soldados firmes
  - soldados perseverantes
  - hombres valientes
  lexicon: LSJ
  rationale: καρτεροί enfatiza firmeza, resistencia y constancia. Traducirlo como «hombres firmes» evita redundar en «soldados» y conserva el elogio de su temple.
- source_word: καταιδεσθέντες
  english_pob_choice: ashamed of
  chosen_spanish: avergonzados de
  alternatives_spanish:
  - avergonzados por
  - movidos por vergüenza ante
  - cubiertos de vergüenza por
  lexicon: LSJ
  rationale: El participio aoristo expresa sentirse avergonzado o sufrir vergüenza frente a algo. «Avergonzados de» es la forma más natural y fiel en español, sin perder la relación con el objeto de la vergüenza.
- source_word: τὰς πανοπλίας καθωπλίσαντο
  english_pob_choice: armed themselves with full armor
  chosen_spanish: se armaron con toda la armadura
  alternatives_spanish:
  - se equiparon con armadura completa
  - se vistieron de toda la armadura
  - tomaron su armadura completa
  lexicon: LSJ
  rationale: πανοπλία designa la armadura completa o el equipo militar entero. La voz media sugiere que ellos mismos se equiparon; «se armaron con toda la armadura» preserva ambas ideas sin sonar forzado.
- source_word: κάλπιν
  english_pob_choice: a water jar
  chosen_spanish: una jarra
  alternatives_spanish:
  - una jarra de agua
  - un cántaro
  - un recipiente
  lexicon: LSJ
  rationale: κάλπις suele referirse a una jarra o cántaro, probablemente para agua. «Jarra» es comprensible en español y deja abierta la precisión cultural del objeto, que se aclara en nota.
- source_word: ὑπερέβησαν
  english_pob_choice: went over
  chosen_spanish: pasaron más allá
  alternatives_spanish:
  - cruzaron
  - se pasaron al otro lado
  - avanzaron más allá
  lexicon: LSJ
  rationale: El verbo significa ir más allá o cruzar. «Pasaron más allá» funciona bien con el obstáculo militar y mantiene el carácter de superación del límite.
- source_word: χάρακας
  english_pob_choice: stockades
  chosen_spanish: las empalizadas
  alternatives_spanish:
  - los estacados
  - las palizadas
  - las fortificaciones de estacas
  lexicon: LSJ
  rationale: χάραξ en plural puede designar estacadas o empalizadas. «Empalizadas» es el equivalente castellano más transparente para una defensa hecha de estacas.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete 1909 y toma en cuenta la auditoría inglesa: se conserva la conexión inferencial de ὅθεν, la compactación de νεανίσκοι στρατιῶται καρτεροί, y la frase final con ὑπερέβησαν y χάρακας. También se refleja la revisión inglesa que afinó la relación de καταιδεσθέντες con el objeto de vergüenza, aquí resuelta naturalmente como «avergonzados de».'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparecen en el texto.
  - Se usa «armadura» para πανοπλία, no «armas», porque el término griego apunta al equipo completo.
  - Se opta por «empalizadas» como plural militar concreto; en notas se reconoce que el griego permite «estacadas» o «fortificaciones de estacas».
  - La formulación intenta ser publicable y fiel, sin introducir explicaciones interpretativas en el cuerpo principal.
