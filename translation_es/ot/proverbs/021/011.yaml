translation:
  language: es
  text: Al castigar[a] al escarnecedor, el simple se vuelve sabio; y cuando se instruye al sabio[b], adquiere conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Cuando se castiga al escarnecedor". El hebreo puede expresarse más formalmente como "por" o "al" castigar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "cuando se instruye a una persona sabia, adquiere conocimiento". El hebreo dice "un sabio" en masculino singular como tipo representativo en el estilo proverbial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/עְנָשׁ
  english_pob_choice: When ... is punished
  chosen_spanish: Cuando se castiga
  alternatives_spanish:
  - Por el castigo de
  - En el castigo de
  lexicon: HALOT
  rationale: La construcción con ב y el infinitivo expresa ocasión o circunstancia. En español, “cuando se castiga” conserva el valor situacional sin hacer la frase pesada o poco natural.
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: el escarnecedor
  alternatives_spanish:
  - el burlador
  - el mofador
  lexicon: HALOT
  rationale: לץ designa a quien desprecia la corrección y se burla con hostilidad. “Escarnecedor” conserva mejor ese matiz moral y verbal que un término más general como “mofador”.
- source_word: יֶחְכַּם
  english_pob_choice: become wise
  chosen_spanish: se vuelve sabio
  alternatives_spanish:
  - llega a ser sabio
  - aprende sabiduría
  lexicon: HALOT
  rationale: El verbo aquí indica un proceso de llegar a la sabiduría, no solo poseerla. “Se vuelve sabio” expresa bien ese cambio en español actual.
- source_word: פֶּתִי
  english_pob_choice: the simple
  chosen_spanish: el simple
  alternatives_spanish:
  - el ingenuo
  - el inexperto
  lexicon: HALOT
  rationale: En Proverbios, פֶּתִי es la persona simple, no formada moral e intelectualmente. “El simple” mantiene el término sapiencial tradicional y su fuerza categorial.
- source_word: וּ/בְ/הַשְׂכִּ֥יל
  english_pob_choice: and when ... is instructed
  chosen_spanish: y cuando se instruye
  alternatives_spanish:
  - y cuando se le da entendimiento
  - y al darle instrucción
  lexicon: HALOT
  rationale: El Hiphil de שׂכל puede significar instruir, hacer prudente o dar discernimiento. Con el contexto de la línea, “se instruye” comunica bien la acción resultante sin forzar una perífrasis.
- source_word: לְ֝/חָכָ֗ם
  english_pob_choice: a wise man
  chosen_spanish: al sabio
  alternatives_spanish:
  - a un sabio
  - al hombre sabio
  lexicon: HALOT
  rationale: El hebreo usa singular masculino como tipo representativo. En español, “al sabio” conserva esa categoría proverbial sin recargar la frase; la masculinidad queda implícita en la forma del singular sustantivado.
- source_word: יִקַּח
  english_pob_choice: he gains
  chosen_spanish: adquiere
  alternatives_spanish:
  - obtiene
  - gana
  lexicon: HALOT
  rationale: לקח con דַּעַת expresa adquirir o ganar conocimiento. “Adquiere” conserva con claridad el sentido de recepción/obtención.
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - discernimiento
  lexicon: HALOT
  rationale: דעת en Proverbios es el término normal para “conocimiento”, distinto de חכמה. “Conocimiento” preserva esa distinción léxica.
theological_decisions:
- issue: Tipo proverbial masculino singular
  english_pob_reading: a wise man
  chosen_spanish_reading: al sabio
  alternative_spanish_readings:
  - al hombre sabio
  - a una persona sabia
  rationale: El hebreo presenta un singular masculino sustantivado como tipo representativo de proverbio. En español, “al sabio” mantiene la forma proverbial y evita neutralizar innecesariamente la referencia del texto base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene el paralelismo temporal (“when... when...”) y no requiere correcciones textuales. La española sigue esa estructura sin añadir interpretaciones ajenas al hebreo.
  spanish_consistency_notes:
  - 'Se conservó la terminología sapiencial: “escarnecedor”, “simple”, “sabio”, “conocimiento”.'
  - No se introdujo “Cristo”, “SEÑOR” ni otras equivalencias ajenas al pasaje.
  - La segunda cláusula se formula con “se instruye” para reflejar el valor del Hiphil sin alterar el paralelismo.
  - El sujeto proverbial masculino singular se mantuvo de forma natural en español con “al sabio”.
