  rationale: Se ajusta el pronombre para sonar natural en español con referente inanimado, y se reubica/corrige la nota [b] para que corresponda al segmento correcto del texto fuente y a la alternativa léxica preservada por el inglés POB. Se mantiene la distinción entre «rejilla» y «red», así como «bronce».
