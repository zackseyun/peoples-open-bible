translation:
  language: es
  text: El Señor ha tragado[a], sin compasión, todas las moradas de Jacob; en su ira ha derribado las fortalezas de la hija de Judá[b]; las ha abatido hasta el suelo; ha profanado el reino y a sus príncipes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha engullido» o «ha devorado». El verbo hebreo conserva una imagen vívida de tragar o consumir.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la hija de Judá», personificación poética de Judá.'
    reason: cultural_note
  - marker: c
    text: O «ha mancillado el reino y a sus príncipes». El verbo también puede traducirse «ha profanado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלַּע
  english_pob_choice: has swallowed up
  chosen_spanish: ha tragado
  alternatives_spanish:
  - ha engullido
  - ha devorado
  lexicon: HALOT
  rationale: El verbo hebreo conserva una imagen corporal y violenta de tragar/devorar. En español, «ha tragado» mantiene esa metáfora con fuerza poética y evita un genérico como «ha destruido».
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: Aquí el hebreo usa el título divino Adonai, no el Tetragrámaton. En español, «El Señor» comunica el título con naturalidad y conserva la mayúscula reverencial.
- source_word: לֹא חָמַל
  english_pob_choice: without pity
  chosen_spanish: sin compasión
  alternatives_spanish:
  - sin piedad
  - no tuvo compasión
  lexicon: HALOT
  rationale: La expresión idiomática comunica ausencia de misericordia o de compasión. «Sin compasión» es natural, breve y adecuado al tono de lamento.
- source_word: נְאוֹת יַעֲקֹב
  english_pob_choice: the habitations of Jacob
  chosen_spanish: todas las moradas de Jacob
  alternatives_spanish:
  - todas las habitaciones de Jacob
  - todos los lugares de morada de Jacob
  lexicon: HALOT
  rationale: El audit trail inglés revisó la primera opción «pastures» y prefirió «habitations» como referencia a asentamientos o viviendas. «Moradas» conserva esa amplitud semántica en español sin forzar la imagen pastoril.
- source_word: הָרַס
  english_pob_choice: has torn down
  chosen_spanish: derribó
  alternatives_spanish:
  - derrumbó
  - demolió
  lexicon: HALOT
  rationale: El verbo expresa desmantelar o echar abajo fortificaciones. «Derribó» es claro y conserva la fuerza concreta del derrumbe.
- source_word: בְּעֶבְרָתוֹ
  english_pob_choice: in his wrath
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su furor
  - en su enojo
  lexicon: HALOT
  rationale: עֶבְרָה denota ira intensa, furia o indignación. «Ira» mantiene el peso solemne del término en un registro bíblico natural.
- source_word: מִבְצְרֵי
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - las plazas fuertes
  lexicon: HALOT
  rationale: El sustantivo se refiere a lugares fortificados. «Fortalezas» es el equivalente español más directo y comprensible.
- source_word: בַת יְהוּדָה
  english_pob_choice: the daughter of Judah
  chosen_spanish: la hija de Judá
  alternatives_spanish:
  - hija de Judá
  - la hija de Judá
  lexicon: HALOT
  rationale: La frase es una personificación poética. «La hija de Judá» conserva esa forma hebrea y su valor retórico sin explicitarla en exceso.
- source_word: הִגִּיעַ לָאָרֶץ
  english_pob_choice: has brought them down to the ground
  chosen_spanish: las hizo llegar hasta la tierra
  alternatives_spanish:
  - las arrojó al suelo
  - las llevó hasta el suelo
  lexicon: HALOT
  rationale: El hebreo expresa que las fortificaciones fueron llevadas hasta el suelo/tierra. En español, «las hizo llegar hasta la tierra» mantiene el movimiento descendente, aunque suene más literal que una paráfrasis como «las arrojó al suelo».
- source_word: חִלֵּל
  english_pob_choice: has defiled
  chosen_spanish: profanó
  alternatives_spanish:
  - deshonró
  - contaminó
  lexicon: HALOT
  rationale: El verbo puede significar profanar o deshonrar, con matiz cultual y moral. «Profanó» preserva mejor esa tensión que un término más general.
- source_word: מַמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: HALOT
  rationale: En este contexto político, el sustantivo apunta al reino como entidad. «El reino» es la forma más directa y fiel.
- source_word: וְשָׂרֶיהָ
  english_pob_choice: and its princes
  chosen_spanish: y a sus príncipes
  alternatives_spanish:
  - y a sus gobernantes
  - y a sus oficiales
  lexicon: HALOT
  rationale: שׂרים puede designar príncipes, jefes o gobernantes. «Príncipes» conserva el registro elevado y la correspondencia con el paralelismo político del verso.
theological_decisions:
- issue: Distinción entre Adonai y YHWH
  english_pob_reading: The Lord translates Adonai; the special LORD convention is reserved for YHWH and is not used here.
  chosen_spanish_reading: El Señor traduce Adonai; no se usa una convención tipográfica para YHWH porque el texto hebreo aquí no contiene el Nombre divino.
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El verso contiene el título Adonai. Según la política del proyecto, los títulos se traducen; por eso se usa «El Señor» y no «Yahvé» ni una máscara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for YHWH vs. Lord'
translation_notes:
  revision_awareness: The English audit trail initially rendered נְאוֹת as 'pastures' but later revised it to 'habitations' because the context points to dwellings/settlements rather than grazing places. It also revised 'daughter Judah' to 'the daughter of Judah' for a more natural formal rendering. The Spanish draft follows the revised English decisions while preserving the poetic force of the Hebrew. The English footnote on 'defiled/profaned' is retained in Spanish as a lexical alternative.
  spanish_consistency_notes:
  - Se mantiene «El Señor» para Adonai, conforme a la política de traducir títulos divinos y no usar la convención reservada para YHWH.
  - 'Se conservan sustantivos concretos y políticos: «moradas», «fortalezas», «reino» y «príncipes», en paralelo con el hebreo.'
  - La personificación poética «la hija de Judá» se preserva sin explicación intrusiva en el texto principal, pero se aclara en nota.
  - Se usa «profanó» como opción principal para חִלֵּל, dejando abierta la alternativa «profanar» por el matiz cultual reconocido en el audit trail.
  - 'La frase final mantiene el orden de acciones del hebreo: devastación, derribo, descenso a tierra y profanación del reino.'
