  text: וְ/הָיָה֙ מִ/קֹּ֣ל זְנוּתָ֔/הּ וַ/תֶּחֱנַ֖ף אֶת הָ/אָ֑רֶץ וַ/תִּנְאַ֥ף אֶת הָ/אֶ֖בֶן וְ/אֶת הָ/עֵֽץ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/009.yaml
  text: And because of the lightness of her prostitution[b][a], she polluted the land and committed adultery with stone and wood.
  footnotes:
  - marker: a
    text: Or 'because of the noise/report of her prostitution.' The Hebrew idiom is difficult; the sense may be that her prostitution became so notorious—or so trivialized—that it led to the land's defilement.
    reason: lexical_alternative
  - marker: b
    text: '''Stone and wood'' refers to idols made from such materials.'
    reason: cultural_note
