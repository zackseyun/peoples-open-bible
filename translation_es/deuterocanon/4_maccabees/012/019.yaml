lexical_decisions:
- source_word: σὲ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Pronombre personal de segunda persona singular como objeto directo del verbo futuro; en español, el clítico 'te' es la forma natural y fiel para este contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con lo anterior; 'Pero' conserva mejor el valor adversativo que una simple continuidad.
- source_word: καὶ
  english_pob_choice: even ... and
  chosen_spanish: incluso ... y
  alternatives_spanish:
  - también ... y
  - hasta ... y
  lexicon: BDAG
  rationale: La primera aparición intensifica el alcance temporal ('incluso en la vida presente'); la segunda une las dos esferas temporales en español de forma natural.
- source_word: ἐν τῷ νῦν βίῳ
  english_pob_choice: in the present life
  chosen_spanish: en la vida presente
  alternatives_spanish:
  - en esta vida
  - en tu vida presente
  lexicon: BDAG
  rationale: '''νῦν βίῳ'' contrasta el tiempo actual con el estado posterior a la muerte; ''vida presente'' preserva ese contraste sin sonar forzado.'
- source_word: θανόντα
  english_pob_choice: after you die
  chosen_spanish: después de que mueras
  alternatives_spanish:
  - cuando hayas muerto
  - muerto
  lexicon: BDAG
  rationale: El participio aoristo tiene fuerza temporal; en español conviene expresar la sucesión temporal de manera explícita para mantener la referencia posterior a la muerte.
- source_word: τιμωρήσεται
  english_pob_choice: he will punish
  chosen_spanish: él te castigará
  alternatives_spanish:
  - él se vengará de ti
  - él te dará castigo
  lexicon: BDAG
  rationale: El futuro medio de τιμωρέω expresa acción punitiva; 'castigará' es natural en español y conserva la idea de sanción sin imponer una especificación vengativa no exigida por el contexto.
theological_decisions:
- issue: Sujeto implícito del verbo futuro
  english_pob_reading: he will punish you
  chosen_spanish_reading: él te castigará
  alternative_spanish_readings:
  - serás castigado
  - te castigará
  rationale: El griego presenta un verbo en tercera persona singular con sujeto implícito por el contexto. En español se explicita 'él' para mantener la agencia y evitar una pasiva que atenúe el agente.
  doctrine_reference: Primacía del idioma original y preservación de la agencia verbal.
- issue: Alcance temporal del castigo
  english_pob_reading: in the present life, and after you die
  chosen_spanish_reading: en la vida presente, y después de que mueras
  alternative_spanish_readings:
  - en esta vida y después de muerto
  - ahora y después de la muerte
  rationale: 'La cláusula griega afirma castigo en dos ámbitos temporales: la vida actual y el estado posterior a la muerte. La traducción los conserva ambos sin suavizar la implicación postmortem.'
  doctrine_reference: Tensión textual preservada; primacía del original frente a tradiciones de atenuación.
translation_notes:
  revision_awareness: El texto español sigue el sentido del griego de Swete 1909 y la solución óptima del POB inglés, manteniendo la doble referencia temporal y la agencia explícita del sujeto implícito, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene 'castigará' para τιμωρήσεται por fidelidad semántica y naturalidad en español.
  - Se evita 'Señor' o una pasiva impersonal, porque el versículo subraya la acción punitiva de un agente implícito.
  - La nota al pie conserva la alternativa temporal del audit trail inglés sin introducir una interpretación doctrinal nueva.
