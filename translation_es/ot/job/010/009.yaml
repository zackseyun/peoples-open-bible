translation:
  language: es
  text: Acuérdate, por favor, de que me hiciste como barro[a], ¿y me devolverás al polvo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como arcilla»; la expresión hebrea es comparativa, no dice explícitamente «del barro», aunque evoca con claridad la imagen de la creación.
    reason: lexical_alternative
  - marker: b
    text: O «y me devolverás al polvo». La forma hebrea misma puede leerse como una afirmación o, en contexto, como una pregunta retórica.
    reason: alternative_reading
lexical_decisions:
- source_word: זְכָר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: Es un imperativo directo dirigido a Dios. En español, «acuérdate» conserva el tono de súplica y resulta natural en una oración de lamento.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula expresa ruego o cortesía; «por favor» comunica bien la entreaty sin arcaísmo excesivo. «Ahora» introduciría una idea temporal que no es la principal.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que Job pide recordar. En español, «de que» encaja de forma natural con «acuérdate» y preserva la subordinación contentiva.
- source_word: כַחֹמֶר
  english_pob_choice: like clay
  chosen_spanish: como barro
  alternatives_spanish:
  - como arcilla
  - como el barro
  lexicon: HALOT
  rationale: El prefijo comparativo כ marca similitud, no procedencia. «Como barro» mantiene la comparación; «arcilla» sería posible pero suena más técnica, y «del barro» borraría la fuerza comparativa.
- source_word: עֲשִׂיתָנִי
  english_pob_choice: you made me
  chosen_spanish: me hiciste
  alternatives_spanish:
  - me formaste
  - me modelaste
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio de hacer/hacer de. «Hiciste» es fiel y sobrio; «formaste» o «modelaste» especifican más de lo que el verbo exige, aunque el contexto de creación corporal está presente.
- source_word: עָפָר
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - tierra
  - polvo de la tierra
  lexicon: HALOT
  rationale: En contextos de mortalidad y creación, עָפָר suele referirse al polvo. «Polvo» es la correspondencia más natural en español y conserva la resonancia con el lenguaje de creación y retorno.
- source_word: תְּשִׁיבֵנִי
  english_pob_choice: will you return me
  chosen_spanish: me devolverás
  alternatives_spanish:
  - ¿me harás volver?
  - ¿me traerás de vuelta?
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver/retornar. Dado el contexto, puede leerse como declaración o pregunta retórica; «¿me devolverás?» mantiene la fuerza de protesta y deja visible la ambigüedad funcional del hebreo.
theological_decisions:
- issue: Si la segunda cláusula debe sonar como afirmación o como pregunta retórica
  english_pob_reading: 'Rendered as a rhetorical question: ''and will you return me to dust?'''
  chosen_spanish_reading: ¿y me devolverás al polvo?
  alternative_spanish_readings:
  - y me devolverás al polvo
  - ¿y me harás volver al polvo?
  rationale: El hebreo no marca interrogación de modo explícito, pero el contexto de lamentación favorece una lectura retórica. En español, la pregunta conserva mejor el tono de apelación y protesta sin añadir contenido ajeno al texto.
  doctrine_reference: Job 10:9; lectura retórica del lamento en contexto poético
- issue: Cómo reflejar la comparación de כַחֹמֶר
  english_pob_reading: '''like clay'' rather than ''from clay'''
  chosen_spanish_reading: como barro
  alternative_spanish_readings:
  - del barro
  - hecho de barro
  rationale: La preposición כ es comparativa. Traducir «del barro» convertiría la imagen en procedencia explícita y borraría una tensión lexical importante que el inglés POB también preserva.
  doctrine_reference: Job 10:9; valor comparativo de כ
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alto acuerdo con el auditor inglés, con la única tensión relevante en la lectura comparativa de כַחֹמֶר y en la posible interrogación retórica de la segunda cláusula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en todo el proyecto, pero este versículo no lo contiene.
  - Se usa «polvo» para עָפָר en coherencia con el léxico de mortalidad y creación ya adoptado en el proyecto.
  - Se conserva una sintaxis natural en español sin perder el paralelismo de las dos cláusulas.
  - Se respeta la ambigüedad hebrea de la segunda mitad del verso mediante puntuación interrogativa y nota de alternativa.
