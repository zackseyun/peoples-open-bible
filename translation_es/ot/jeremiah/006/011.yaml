  to: Pero estoy lleno de la ira de Yahvé[a]; estoy cansado de contenerla. Derrámala sobre el niño en la calle, y sobre la compañía de los jóvenes juntos; porque también serán tomados el hombre con la mujer, el anciano junto con el de muchos días[b].
  rationale: Se corrigió la nota mal ubicada para que explique מְלֵא יָמִים, se reemplazó «serán apresados» por «serán tomados» para reflejar mejor יִלָּכֵדוּ en contexto de juicio general, y se suavizaron dos giros para un español más natural y fiel («estoy cansado»; «el de muchos días[b]» con nota idiomática).
