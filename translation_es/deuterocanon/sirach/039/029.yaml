translation:
  language: es
  text: 'Fuego y granizo[a], hambruna y pestilencia: estas también fueron creadas para juicio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «todo esto fue creado para venganza» o «para castigo». El hebreo dice «para juicio».'
    reason: alternative_reading
lexical_decisions:
- source_word: אש
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego πῦρ coinciden en el sentido básico de fuego; «fuego» es la equivalencia natural y directa en español.
- source_word: ברד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: HALOT
  rationale: Es el fenómeno meteorológico habitual; «granizo» es claro en español moderno y corresponde bien al griego χάλαζα.
- source_word: רעב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - famine
  lexicon: HALOT
  rationale: En hebreo el término puede significar hambre o hambre colectiva/desastre alimentario. Aquí, por el paralelo con calamidades, «hambre» conserva mejor la amplitud semántica del hebreo, aunque la tradición inglesa optó por «famine».
- source_word: דבר
  english_pob_choice: pestilence
  chosen_spanish: pestilencia
  alternatives_spanish:
  - plaga
  - peste
  lexicon: HALOT
  rationale: «Pestilencia» mantiene el valor de calamidad letal del hebreo en contexto de juicio y evita reducirlo solo a una enfermedad específica; además distingue mejor este término del griego θάνατος, que amplía la idea a «muerte».
- source_word: גם אלה
  english_pob_choice: these also
  chosen_spanish: todo esto
  alternatives_spanish:
  - éstas también
  - estas también
  lexicon: HALOT
  rationale: La expresión añade estos males al conjunto mencionado; en español, «todo esto» fluye con naturalidad y conserva el valor acumulativo.
- source_word: למשפט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para justicia
  - para castigo
  lexicon: HALOT
  rationale: «Juicio» reproduce el sentido judicial amplio de משפט y evita cerrar prematuramente la tensión entre el hebreo («juicio») y el griego («venganza/punición»).
- source_word: נוצרו
  english_pob_choice: were created
  chosen_spanish: fue creado
  alternatives_spanish:
  - fueron creados
  - fue formado
  lexicon: HALOT
  rationale: El pasivo indica acto creador divino. En español, «fue creado» mantiene el sentido de creación con tono bíblico sobrio; aunque el sujeto implícito plural requeriría «fueron creados», aquí se ha optado por una construcción impersonal resumida para mayor fluidez del hemistiquio final.
theological_decisions:
- issue: Hebreo «para juicio» frente a griego «para venganza/punición»
  english_pob_reading: The main text follows the Hebrew 'for judgment'; the footnote preserves the Greek possibility 'for vengeance' or 'for punishment.'
  chosen_spanish_reading: El texto principal dice «para juicio»; la nota conserva la alternativa griega «para venganza» o «para castigo».
  alternative_spanish_readings:
  - para venganza
  - para castigo
  rationale: Dado que el testimonio hebreo es el control principal en esta unidad y lee למשפט, el texto principal debe reflejar «juicio». La nota conserva la agudeza del griego εἰς ἐκδίκησιν sin borrar la tensión entre ambos testigos.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than flatten it.'
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente sin cambios sustantivos, y mantiene la decisión auditada de privilegiar el hebreo para el texto principal mientras la nota recoge la intensificación punitiva del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en otros contextos del proyecto; aquí no aparece ningún tetragrámaton.
  - «Juicio» conserva la amplitud de משפט y no se sustituye por «castigo» en el texto principal.
  - La nota al pie usa una alternativa griega explícita para preservar la tensión textual documentada.
  - Se evita traducir mecánicamente el inglés «famine» como «hambruna» porque el hebreo permite «hambre» y el contexto admite calamidad alimentaria sin exigir una especificación más técnica.
