translation:
  language: es
  text: 'Dijo[a]: «Si Esaú llega a uno de los campamentos y lo ataca, entonces el campamento que quede escapará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el campamento que quede será para escape», es decir, sobrevivirá o escapará de la destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y él dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se expresa de manera natural en español con pasado simple. Mantengo la conexión narrativa con «Y» sin sobrecargar el estilo.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La cláusula presenta una condición real en el razonamiento de Jacob; «Si» preserva mejor esa contingencia.
- source_word: יָבֹא
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - entra
  lexicon: HALOT
  rationale: «Venir» es literal, pero en español «llega» comunica de forma natural la aproximación al campamento sin añadir la idea de ataque, que corresponde al verbo siguiente.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: nombre propio
  rationale: 'Se translitera el nombre propio con acento gráfico usual en español bíblico moderno: Esaú.'
- source_word: אֶל הַמַּחֲנֶה הָאַחַת
  english_pob_choice: to the one camp
  chosen_spanish: a uno de los campamentos
  alternatives_spanish:
  - al campamento uno
  - al uno de los campamentos
  lexicon: HALOT
  rationale: El hebreo usa artículo + numeral para referirse a uno de los dos campamentos ya mencionados. En español, «uno de los campamentos» expresa con claridad esa relación partitiva y evita una calca poco natural de «el uno campamento».
- source_word: וְהִכָּהוּ
  english_pob_choice: and strikes it
  chosen_spanish: y lo ataca
  alternatives_spanish:
  - y lo golpea
  - y lo hiere
  lexicon: HALOT
  rationale: Aunque נכה suele ser «golpear/herir», en este contexto narrativo el resultado hostil se entiende como ataque contra el campamento. Opto por «ataca» para preservar la fuerza contextual en español; el pronombre «lo» retoma el campamento como entidad colectiva.
- source_word: וְהָיָה
  english_pob_choice: then ... will
  chosen_spanish: entonces
  alternatives_spanish:
  - y será
  - así será
  lexicon: HALOT
  rationale: En español, el valor consecutivo se expresa de forma idiomática con «entonces», evitando un calco pesado del verbo copulativo.
- source_word: הַמַּחֲנֶה הַנִּשְׁאָר
  english_pob_choice: the camp that remains
  chosen_spanish: el campamento que quede
  alternatives_spanish:
  - el campamento que permanece
  - el campamento restante
  lexicon: HALOT
  rationale: נשאר señala lo que queda en pie o permanece tras la acción previa. «Que quede» mantiene el sentido resultativo y el matiz de supervivencia en curso.
- source_word: לִפְלֵיטָה
  english_pob_choice: will escape
  chosen_spanish: escapará
  alternatives_spanish:
  - será salvo
  - quedará a salvo
  - escapará para salvación
  lexicon: HALOT
  rationale: פְלֵיטָה designa escape/salvación. «Escapará» verbaliza el sustantivo con naturalidad en español y conserva la idea de librarse de la destrucción sin explicitar más de lo que el hebreo dice.
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con la lectura auditada de la POB inglesa: condición real, dos campamentos, y resultado de supervivencia/escape. Se evita forzar «ataca» en el hebreo de בוא y se mantiene la ambigüedad útil de פְלֵיטָה en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Campamento» se usa de forma consistente para מַחֲנֶה.
  - Se conserva la relación colectiva con el pronombre singular «lo», referida al campamento como unidad.
