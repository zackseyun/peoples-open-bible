translation:
  language: es
  text: Pero Trifón actuaba con engaño con Antíoco, el rey joven[a], y lo mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el rey más joven». El griego νεωτέρου es comparativo («más joven»), pero aquí también puede expresarse de forma natural en español como una designación distintiva: «el rey joven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύετο
  english_pob_choice: was acting
  chosen_spanish: actuaba
  alternatives_spanish:
  - iba
  - procedía
  - se conducía
  lexicon: LSJ
  rationale: El imperfecto griego presenta una acción en curso en el pasado. En español, «actuaba» conserva esa continuidad y encaja con la frase adverbial de modo.
- source_word: δόλῳ
  english_pob_choice: deceitfully
  chosen_spanish: con engaño
  alternatives_spanish:
  - engañosamente
  - con dolo
  - traicioneramente
  lexicon: LSJ
  rationale: El dativo expresa modo o instrumento. «Con engaño» es natural en español y mantiene el sentido de dolo/astucia sin añadir una carga jurídica excesiva.
- source_word: μετὰ Ἀντιόχου
  english_pob_choice: with Antiochus
  chosen_spanish: junto con Antíoco
  alternatives_spanish:
  - con Antíoco
  - en compañía de Antíoco
  lexicon: LSJ
  rationale: μετά con genitivo normalmente significa compañía. «Junto con» refleja esa relación sin introducir una oposición que el griego no explicita.
- source_word: τοῦ βασιλέως τοῦ νεωτέρου
  english_pob_choice: the younger king
  chosen_spanish: el rey más joven
  alternatives_spanish:
  - el rey joven
  - el rey menor
  - el rey más nuevo
  lexicon: LSJ
  rationale: νεώτερος es comparativo, «más joven». «Rey más joven» conserva la distinción comparativa entre dos reyes llamados Antíoco y suena natural en español.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo asesinó
  - lo dio muerte
  - lo mató a espada
  lexicon: LSJ
  rationale: El verbo significa simplemente «matar». «Lo mató» evita añadir una calificación legal o moral que el griego no expresa por sí mismo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «was acting deceitfully» sobre «was proceeding deceitfully» por ser más natural; por eso se eligió «actuaba con engaño» en lugar de una construcción más literal pero menos idiomática en español.
  spanish_consistency_notes:
  - Se conserva el nombre propio «Trifón» y la forma «Antíoco» de uso biblíco común en español.
  - Se mantiene «rey más joven» para reflejar el comparativo griego νεωτέρου, evitando neutralizar la distinción entre los dos Antíocos.
  - La partícula inicial δέ se traduce con «Pero» para marcar el contraste narrativo del griego.
