translation:
  language: es
  text: Pues debe permanecer en su ciudad de refugio hasta la muerte del sumo sacerdote, y después de la muerte del sumo sacerdote el homicida[a] podrá volver a la tierra de su posesión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el matador» o «el que mató». Aquí el término hebreo es una categoría legal de las leyes de las ciudades de refugio y no debe leerse automáticamente como «asesino».
    reason: lexical_alternative
  - marker: b
    text: O «a su propia posesión territorial» o «a la tierra de su propiedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: HALOT
  rationale: Introduce la razón o fundamento legal de lo que precede. «Porque» comunica mejor la relación explicativa en español al inicio de una norma jurídica.
- source_word: בְעִיר מִקְלָטוֹ
  english_pob_choice: in his city of refuge
  chosen_spanish: en la ciudad de refugio
  alternatives_spanish:
  - dentro de su ciudad de refugio
  - en su ciudad de refugio
  lexicon: HALOT
  rationale: Mantiene el término legal fijo «ciudad de refugio» para מִקְלָט. Se omite el posesivo explícito porque en español el contexto ya identifica al homicida, y así la frase fluye con naturalidad sin perder el sentido.
- source_word: יֵשֵׁב
  english_pob_choice: he must remain
  chosen_spanish: permanecerá
  alternatives_spanish:
  - deberá permanecer
  - habitará
  - se quedará
  lexicon: HALOT
  rationale: El hebreo expresa aquí una permanencia obligada dentro del marco legal. En español, el futuro simple en este contexto normativo puede expresar deber sin forzar una perífrasis pesada; por eso se eligió «permanecerá». La obligación queda apoyada por el contexto legal de la ley.
- source_word: עַד מוֹת
  english_pob_choice: until the death of
  chosen_spanish: hasta la muerte de
  alternatives_spanish:
  - hasta que muera
  - hasta el fallecimiento de
  lexicon: HALOT
  rationale: Reproduce la construcción nominal del hebreo de manera natural en español y conserva el tono jurídico del texto.
- source_word: הַכֹּהֵן הַגָּדֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: «Sumo sacerdote» es la equivalencia española idiomática y precisa para el oficio. «Gran sacerdote» sería menos natural y menos estable en el uso bíblico español.
- source_word: וְאַחֲרֵי מוֹת
  english_pob_choice: and after the death of
  chosen_spanish: y después de la muerte de
  alternatives_spanish:
  - y luego de la muerte de
  - y tras la muerte de
  lexicon: HALOT
  rationale: Preserva la secuencia temporal y la formulación nominal del original, con español claro y directo.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  - el que mató
  lexicon: HALOT
  rationale: Se evita «asesino» o «asesino/homicida» con carga moral absoluta, porque el término hebreo funciona aquí como categoría legal en la legislación de las ciudades de refugio. «Homicida» conserva el alcance jurídico sin resolver la cuestión de intención que el contexto distingue.
- source_word: יָשׁוּב
  english_pob_choice: may return
  chosen_spanish: volverá
  alternatives_spanish:
  - podrá volver
  - puede volver
  - regresará
  lexicon: HALOT
  rationale: En español jurídico, el futuro puede expresar permiso o consecuencia legal. «Volverá» mantiene la concisión y evita sobreexplicar con una perífrasis modal, sin perder la idea de restauración del derecho a regresar.
- source_word: אֶל אֶרֶץ אֲחֻזָּתוֹ
  english_pob_choice: to the land of his possession
  chosen_spanish: a la tierra de su posesión
  alternatives_spanish:
  - a la tierra de su propiedad
  - a su tierra de posesión
  - a la tierra de su patrimonio
  lexicon: HALOT
  rationale: «Tierra de su posesión» refleja con fidelidad el sentido de propiedad/tenencia territorial de אֲחֻזָּה sin cargar el texto con el matiz teológico de «heredad». «Tierra» preserva la dimensión territorial del hebreo.
theological_decisions:
- issue: La categoría legal de הָרֹצֵחַ en la ley de las ciudades de refugio
  english_pob_reading: the manslayer
  chosen_spanish_reading: el homicida
  alternative_spanish_readings:
  - el asesino
  - el matador
  - el que mató
  rationale: La legislación distingue entre homicidio involuntario y asesinato. Traducir con «asesino» impondría una sentencia moral no establecida en este versículo. «Homicida» preserva la categoría legal y deja abierta la distinción del contexto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: El alcance de יֵשֵׁב como obligación legal
  english_pob_reading: he must remain
  chosen_spanish_reading: permanecerá
  alternative_spanish_readings:
  - deberá permanecer
  - habitará
  - se quedará
  rationale: Aunque el verbo literal es «habitar/quedarse», el contexto jurídico impone una obligación. En español, el futuro normativo transmite esa obligación de forma sobria y natural sin añadir una perífrasis interpretativa innecesaria.
  doctrine_reference: 'Translation philosophy: close attention to legal discourse and contextual obligation in Hebrew narrative-law.'
translation_notes:
  revision_awareness: El contexto inglés indica alta concordancia y sin cambios respecto de la última pasada revisada; la presente redacción sigue ese estado estable, ajustando solo la formulación española para naturalidad y precisión jurídica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton ni requiere decisión sobre κύριος.
  - «Sumo sacerdote» se usa de manera consistente con el español bíblico actual y con la equivalencia del inglés POB.
  - «Homicida» conserva la distinción legal de la perícopa sin importar una lectura más condenatoria.
