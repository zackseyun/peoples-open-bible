  - severity: low
    issue: Puntuación mejorable en la aposición
    rationale: La frase relativa explicativa «que estaba encargado de todo lo suyo» queda mejor entre comas después de «el eunuco[a]», lo que favorece la lectura sin alterar el sentido.
  - severity: low
