translation:
  language: es
  text: Nabucodonosor, rey de Babilonia, marchó contra él y lo ató con cadenas de bronce para llevarlo a Babilonia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con grilletes de bronce’ o ‘con ataduras de bronce’. El hebreo se refiere a restricciones de bronce puestas sobre él.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו עָלָה
  english_pob_choice: came up against him
  chosen_spanish: subió contra él
  alternatives_spanish:
  - subió sobre él
  - marchó contra él
  - atacó contra él
  lexicon: HALOT
  rationale: El hebreo usa la construcción idiomática de ‘subir contra’ en contexto militar. ‘Subió contra él’ conserva la imagen direccional y la hostilidad, sin convertirla innecesariamente en una explicación más amplia. ‘Contra él’ evita una lectura neutral de simple desplazamiento.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nebuchadrezzar
  lexicon: Convención onomástica española
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio. ‘Nabucodonosor’ es la adaptación más estable en español bíblico y no introduce diferencia de identidad respecto del nombre hebreo.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  - rey de Babel
  lexicon: Constructo nominal hebreo
  rationale: 'El sintagma de título y procedencia se expresa de forma natural en español como aposición: ‘rey de Babilonia’. Se evita añadir artículo sin necesidad, manteniendo la concisión del hebreo.'
- source_word: וַיַּאַסְרֵהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo apresó
  - lo encadenó
  lexicon: HALOT
  rationale: אָסַר significa ‘atar’ o ‘ligar’, especialmente respecto de cautivos. ‘Lo ató’ sigue de cerca el verbo base y deja que el instrumento de bronce especifique la clase de sujeción.
- source_word: בַּנְחֻשְׁתַּיִם
  english_pob_choice: with bronze chains
  chosen_spanish: con cadenas de bronce
  alternatives_spanish:
  - con grillos de bronce
  - con ataduras de bronce
  - con cadenas de cobre
  lexicon: HALOT
  rationale: La forma dual/plural alude a restricciones metálicas. ‘Cadenas de bronce’ comunica con claridad la imagen de sujeción física; ‘bronce’ preserva mejor el metal antiguo que ‘latón’ o ‘cobre’.
- source_word: לְהֹלִיכוֹ
  english_pob_choice: to take him
  chosen_spanish: para llevarlo
  alternatives_spanish:
  - para conducirlo
  - para traerlo
  - para hacerlo ir
  lexicon: HALOT
  rationale: El hifil de הלך expresa causar el traslado de alguien. ‘Para llevarlo’ transmite el movimiento forzado hacia un destino y resulta natural en español sin perder el sentido de deportación.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - hacia Babilonia
  - a la tierra de Babilonia
  lexicon: Forma direccional hebrea
  rationale: El sufijo direccional indica destino. ‘A Babilonia’ es la forma española directa y natural para expresar la meta del traslado.
translation_notes:
  revision_awareness: El pasaje concuerda plenamente con la lectura auditada en inglés. No hay revisiones aplicadas ni tensiones textuales relevantes en este versículo; la principal decisión fue cómo verter el idioma militar y el instrumento de sujeción en español.
  spanish_consistency_notes:
  - Se mantiene ‘Babilonia’ como destino geográfico estándar y ‘bronce’ para el metal, en consonancia con el uso del POB en inglés.
  - No se emplea ‘SEÑOR’ ni terminología teológica adicional, porque el versículo no contiene el nombre divino ni un título cristológico.
  - 'La puntuación sigue el orden narrativo del hebreo: sujeto nominal, verbo de avance hostil, cautiverio y destino.'
