translation:
  language: es
  text: Así pasaron y siguieron su camino[a], y se les puso el sol cerca de Gibeá, que pertenece a Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaba en Benjamín». El hebreo identifica a Gibeá por su asociación con la tribu o territorio de Benjamín.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: they passed on
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasaron adelante
  - siguieron pasando
  lexicon: HALOT
  rationale: עבר en esta secuencia narrativa expresa continuar el trayecto más allá de un punto previo. «Pasaron» conserva la idea de avance sin sobrecargar el español con un calco.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: went their way
  chosen_spanish: siguieron su camino
  alternatives_spanish:
  - fueron por su camino
  - siguieron andando
  lexicon: HALOT
  rationale: הלך añade un segundo verbo de movimiento. «Siguieron su camino» mantiene la duplicación narrativa del hebreo y sugiere continuación del viaje con naturalidad en español.
- source_word: וַתָּבֹא לָהֶם הַשֶּׁמֶשׁ
  english_pob_choice: the sun set on them
  chosen_spanish: el sol se puso sobre ellos
  alternatives_spanish:
  - les llegó el sol
  - los alcanzó la puesta del sol
  lexicon: HALOT
  rationale: La frase hebrea es idiomática para el anochecer. «Se puso sobre ellos» preserva la imagen de que la noche los alcanzó durante el viaje, sin perder la equivalencia natural en español.
- source_word: אֵצֶל
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - junto a
  - al lado de
  lexicon: HALOT
  rationale: La preposición indica proximidad. «Cerca de» es la opción más clara y sobria en español moderno.
- source_word: הַגִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Gibeá
  alternatives_spanish:
  - la colina
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de lugar. Se translitera como «Gibeá» para reflejar la topografía bíblica y mantener la identificación geográfica.
- source_word: אֲשֶׁר לְבִנְיָמִן
  english_pob_choice: which belongs to Benjamin
  chosen_spanish: que pertenece a Benjamín
  alternatives_spanish:
  - que era de Benjamín
  - que estaba en Benjamín
  lexicon: HALOT
  rationale: La construcción identifica la adscripción tribal/territorial de Gibeá. «Pertenece a Benjamín» comunica mejor la relación de pertenencia que una simple ubicación espacial.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio de la tribu; se adapta a la ortografía usual del español bíblico.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés de la POB. No se requerían revisiones textuales; se conservó la duplicación verbal narrativa y la ambigüedad controlada de la relación de Gibeá con Benjamín mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Benjamín» como nombre propio tribal en lugar de «Benjamín» sin tilde, por norma ortográfica del español.
  - Se eligió «Gibeá» como transliteración uniforme para el topónimo, coherente con el registro bíblico en español.
  - La nota al pie preserva la alternativa de pertenencia/ubicación documentada en el audit trail inglés.
