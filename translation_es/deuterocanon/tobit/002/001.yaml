translation:
  language: es
  text: Cuando bajé a mi casa, me fueron devueltos[a] Ana, mi esposa, y mi hijo Tobías; en la fiesta de Pentecostés, que es la santa fiesta de las siete semanas, se me preparó una buena comida[c], y me recosté[b] para comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fiesta de las Semanas». El griego dice «Pentecostés» y enseguida lo explica como «la santa fiesta de las siete semanas».
    reason: alternative_reading
  - marker: b
    text: El griego dice literalmente «me recosté», reflejando la costumbre antigua de comer reclinado.
    reason: cultural_note
  - marker: c
    text: La tradición semítica paralela de este versículo es más amplia y añade que Tobías fue enviado a invitar a un pariente pobre para comer con ellos; ese material no está presente en la redacción griega más breve traducida aquí.
    reason: textual_variant
lexical_decisions:
- source_word: κατῆλθον
  english_pob_choice: had come down
  chosen_spanish: bajé
  alternatives_spanish:
  - descendí
  - había bajado
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento hacia abajo. En español, 'bajé' comunica naturalmente la llegada al hogar sin sobrecargar la frase con un auxiliar pluscuamperfecto innecesario.
- source_word: οἶκόν μου
  english_pob_choice: house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa
  - mi hogar
  lexicon: BDAG
  rationale: Aunque οἶκος puede significar casa o hogar, 'mi casa' mantiene la referencia concreta del griego y suena natural en español.
- source_word: ἀπεδόθη μοι
  english_pob_choice: were restored to me
  chosen_spanish: me fueron devueltos
  alternatives_spanish:
  - me fueron restituidos
  - me los devolvieron
  lexicon: BDAG
  rationale: El pasivo de ἀποδίδωμι expresa que algo fue devuelto. En contexto se trata del retorno de la esposa y del hijo; 'me fueron devueltos' conserva la idea de recuperación/restitución sin forzar un sentido más interpretativo.
- source_word: Ἄννα ἡ γυνή μου
  english_pob_choice: Anna my wife
  chosen_spanish: Ana, mi esposa
  alternatives_spanish:
  - Ana, mi mujer
  - Ana, mi esposa
  lexicon: BDAG
  rationale: Se mantiene el nombre propio en forma española común 'Ana'. 'Esposa' traduce ἡ γυνή μου con un registro digno y claro; 'mujer' sería más literal pero menos preciso en español actual.
- source_word: Τωβίας ὁ υἱός μου
  english_pob_choice: Tobiah my son
  chosen_spanish: Tobías, mi hijo
  alternatives_spanish:
  - Tobías, mi hijo
  - Tobías, mi muchacho
  lexicon: BDAG
  rationale: El nombre se adapta a la forma española ampliamente reconocible 'Tobías'. 'Mi hijo' reproduce ὁ υἱός μου sin añadir matices.
- source_word: πεντηκοστῇ ἑορτῇ
  english_pob_choice: the feast of Pentecost
  chosen_spanish: la fiesta de Pentecostés
  alternatives_spanish:
  - la fiesta de Pentecostés
  - la fiesta de las Semanas
  lexicon: BDAG
  rationale: Se conserva 'Pentecostés' para reflejar el término griego usado por el texto. En español, el contexto inmediato ya aclara la equivalencia con la fiesta de siete semanas.
- source_word: ἁγία ἑπτὰ ἑβδομάδων
  english_pob_choice: the holy feast of seven weeks
  chosen_spanish: la santa fiesta de las siete semanas
  alternatives_spanish:
  - la santa fiesta de las siete semanas
  - la fiesta santa de siete semanas
  lexicon: LEH
  rationale: '''Santa fiesta de las siete semanas'' mantiene la estructura explicativa del griego y evita ocultar la identificación judía de la festividad.'
- source_word: ἐγενήθη ἄριστον καλὸν μοι
  english_pob_choice: a fine meal was prepared for me
  chosen_spanish: se me preparó un buen banquete
  alternatives_spanish:
  - se me preparó un buen banquete
  - se me preparó una buena comida
  lexicon: BDAG
  rationale: La frase griega indica que un buen alimento/banquete llegó a estar preparado. 'Banquete' aprovecha el tono festivo del contexto; 'se me preparó' respeta el sentido pasivo.
- source_word: ἀνέπεσα
  english_pob_choice: I reclined
  chosen_spanish: me recosté
  alternatives_spanish:
  - me recosté
  - me recliné
  lexicon: BDAG
  rationale: '''Me recosté'' es una forma natural en español para expresar la postura de mesa antigua sin sonar forzada. ''Me recliné'' conserva más literalmente la costumbre del banquete antiguo.'
- source_word: τοῦ φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - para comer
  - a comer
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad. 'Para comer' es la forma natural en español y mantiene la relación con el gesto de recostarse.
theological_decisions:
- issue: Equivalencia de la fiesta de Pentecostés con la fiesta judía de las siete semanas
  english_pob_reading: the feast of Pentecost ... the holy feast of seven weeks
  chosen_spanish_reading: la fiesta de Pentecostés ... la santa fiesta de las siete semanas
  alternative_spanish_readings:
  - la fiesta de Pentecostés ... la fiesta de las Semanas
  rationale: El griego conserva el término 'Pentecostés' y lo explica inmediatamente. La traducción española mantiene ese nombre y añade la explicación literal para evitar una lectura exclusivamente cristiana posterior y preservar el trasfondo judío del pasaje.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; claridad moderna sin borrar el trasfondo bíblico'
- issue: Forma del nombre Τωβίας en español
  english_pob_reading: Tobiah
  chosen_spanish_reading: Tobías
  alternative_spanish_readings:
  - Tobías
  - Tobia
  rationale: Aunque el contexto auditado favorece una transliteración más directa, en español bíblico 'Tobías' es plenamente inteligible y reconocible. Se conserva la identidad del nombre sin introducir una forma extraña para la lectura litúrgica o pública.
  doctrine_reference: 'DOCTRINE.md: transliterar nombres con inteligibilidad en la lengua meta'
translation_notes:
  revision_awareness: 'El texto griego base coincide sustancialmente con el audit trail inglés: se mantiene Pentecostés con su explicación inmediata, se preserva el matiz de retorno/restauración de la familia, y se refleja la costumbre antigua de comer reclinado. La tradición semítica paralela es más amplia, pero no añade contenido al texto griego traducido aquí.'
  spanish_consistency_notes:
  - Se usó 'Ana' y 'Tobías' por ser las formas españolas naturales y reconocibles, manteniendo el sentido del texto sin latinizar innecesariamente los nombres.
  - '''Santa fiesta de las siete semanas'' conserva la explicación del griego y evita sustituirla por una equivalencia doctrinalmente más cargada.'
  - '''Me recosté'' y no ''me senté'' preserva la costumbre antigua de la mesa reclinada.'
  - '''Me fueron devueltos'' mantiene el valor pasivo de ἀπεδόθη μοι y la idea de restitución familiar.'
