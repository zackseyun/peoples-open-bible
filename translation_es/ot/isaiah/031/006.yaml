translation:
  language: es
  text: Vuelvan al que tanto[a] se han rebelado los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuelvan a aquel contra quien los hijos de Israel se han rebelado profundamente». El hebreo usa una construcción relativa compacta que puede expresarse de más de una manera en español; el referente implícito es Dios por el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: שׁוּבוּ
  english_pob_choice: Return
  chosen_spanish: ¡Vuelvan!
  alternatives_spanish:
  - ¡Regresen!
  - ¡Volved!
  lexicon: HALOT
  rationale: El imperativo plural de שוב pide un llamado profético de retorno. «Vuelvan» comunica bien la exhortación de volver atrás/volver al pacto en un español natural y digno.
- source_word: לַאֲשֶׁר
  english_pob_choice: against whom
  chosen_spanish: a aquel contra quien
  alternatives_spanish:
  - al que
  - a quien
  lexicon: HALOT
  rationale: La construcción relativa hebrea es compacta y en contexto apunta al objeto de la rebelión. En español, «contra quien» conserva la relación de oposición expresada en la revisión inglesa más reciente.
- source_word: הֶעְמִיקוּ
  english_pob_choice: have deeply
  chosen_spanish: se han rebelado profundamente
  alternatives_spanish:
  - han profundizado su rebelión
  - se han apartado profundamente
  lexicon: HALOT
  rationale: El hiphil de עמק con סָרָה intensifica la idea de rebelión/apostasía. «Profundamente» preserva el intensificador sin volver la frase forzada en español.
- source_word: סָרָה
  english_pob_choice: rebelled
  chosen_spanish: se han rebelado
  alternatives_spanish:
  - se han apartado en rebeldía
  - han apostatado
  lexicon: HALOT
  rationale: סָרָה expresa desviación, rebelión o apostasía. «Rebelado» mantiene la fuerza covenantal y evita un tecnicismo como «apostatado», que sería menos inmediato.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el paralelismo más cercano al hebreo con «los hijos de Israel». Aunque tiene un matiz corporativo, es una forma bíblica reconocible y suficientemente literal.
theological_decisions:
- issue: Si explicitar el destinatario como Yahvé en el texto principal
  english_pob_reading: 'Keep the relative expression implicit: ''him against whom'''
  chosen_spanish_reading: 'Mantener la referencia implícita: «a aquel contra quien»'
  alternative_spanish_readings:
  - vuélvanse a Yahvé, contra quien...
  - vuélvanse al Señor, contra quien...
  rationale: El hebreo no nombra aquí a Yahvé, aunque el contexto lo identifica claramente. Para respetar la primacía del texto fuente, se conserva la construcción relativa sin insertar el nombre divino en el cuerpo del versículo.
  doctrine_reference: Principio POB de primacía del texto original y de preservar tensiones/implicaturas del hebreo
- issue: Cómo rendir la intensidad de la rebelión
  english_pob_reading: have deeply rebelled
  chosen_spanish_reading: se han rebelado profundamente
  alternative_spanish_readings:
  - han profundizado su rebelión
  - se han rebelado gravemente
  rationale: La combinación verbal hebrea intensifica la infidelidad del pueblo. «Profundamente» reproduce esa intensificación con sobriedad, sin suavizarla ni sobreexplicarla.
  doctrine_reference: Lexical force of עמק + סָרָה in HALOT; principio de no aplanar tensiones léxicas
translation_notes:
  revision_awareness: La versión inglesa final corrigió «from whom» a «against whom» y «revolted» a «rebelled». Esta versión española sigue esa revisión, reflejando oposición/rebelión con «contra quien» y «se han rebelado» en lugar de una lectura más débil de simple alejamiento.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para reflejar con mayor literalidad בְּנֵי יִשְׂרָאֵל, en línea con la política POB de conservar fuerza léxica cuando el español lo permite.
  - No se inserta «Yahvé» o «el Señor» en el texto principal para no resolver explícitamente una referencia que el hebreo deja implícita.
  - Se evita «apostatado» por ser demasiado técnico para esta línea profética y por no ser necesario para conservar el sentido.
