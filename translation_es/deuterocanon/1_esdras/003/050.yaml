translation:
  language: es
  text: Y muchos perecieron y fueron extraviados y pecaron a causa de las mujeres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de las esposas». El griego γυναῖκες puede significar «mujeres» o «esposas», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλοντο
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - se perdieron
  lexicon: BDAG
  rationale: El aoristo de ἀπόλλυμι expresa ruina o perdición. «Perecieron» reproduce con naturalidad en español la gravedad del verbo sin añadir una agencia que el griego no explicita.
- source_word: ἐσφάλησαν
  english_pob_choice: were led astray
  chosen_spanish: fueron extraviados
  alternatives_spanish:
  - tropezaron
  - se desviaron
  - fueron engañados
  lexicon: LSJ
  rationale: El pasivo de σφάλλω puede aludir a ser hecho caer o a quedar desviado. En esta cadena moral, «fueron extraviados» conserva la idea de desviación ética y evita reducirlo a un tropiezo físico.
- source_word: ἡμάρτοσαν
  english_pob_choice: sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - hicieron mal
  - fallaron
  lexicon: BDAG
  rationale: En contexto moral/religioso, ἁμαρτάνω se rinde de forma directa como «pecar». Es la opción más fiel y transparente para el lector en español.
- source_word: διὰ τὰς γυναῖκας
  english_pob_choice: because of women
  chosen_spanish: a causa de las mujeres
  alternatives_spanish:
  - por causa de las mujeres
  - a causa de las esposas
  - por las mujeres
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; «a causa de» refleja bien ese valor. γυναῖκες puede significar «mujeres» o «esposas» según el contexto, pero aquí el griego no restringe el referente, así que se mantiene el sentido más amplio.
theological_decisions:
- issue: 'Ambigüedad de γυναῖκες: «mujeres» o «esposas»'
  english_pob_reading: women
  chosen_spanish_reading: mujeres
  alternative_spanish_readings:
  - esposas
  rationale: La lectura inglesa retuvo «women» por transparencia léxica, y el griego plural no obliga a estrecharlo a «wives». En español, «mujeres» preserva la amplitud semántica y deja visible la tensión interpretativa sin resolverla artificialmente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; se mantiene la concordancia alta con el texto griego y con la decisión inglesa de conservar la ambigüedad de γυναῖκες en nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y directo, acorde con la cadena verbal breve del griego.
  - La nota conserva la alternativa léxica relevante sin diluir la fuerza moral de «pecaron».
