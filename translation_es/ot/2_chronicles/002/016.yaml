translation:
  language: es
  text: Entonces Salomón contó a todos los extranjeros residentes[a] que estaban en la tierra de Israel, después del censo que David su padre había hecho de ellos; y se halló que eran ciento cincuenta y tres mil seiscientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los forasteros residentes» o «los residentes extranjeros». El término hebreo se refiere a no israelitas que vivían dentro del territorio de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְפֹּר
  english_pob_choice: counted
  chosen_spanish: contó
  alternatives_spanish:
  - hizo un censo de
  - numeró
  lexicon: HALOT
  rationale: El verbo ספר aquí expresa contar/enumerar personas. «Contó» es natural en español y conserva la relación con el censo previo sin sobreespecificar el verbo como si fuera una fórmula técnica distinta.
- source_word: הָאֲנָשִׁים הַגֵּירִים
  english_pob_choice: the resident foreigners
  chosen_spanish: los hombres geritas
  alternatives_spanish:
  - los extranjeros residentes
  - los forasteros residentes
  - los sojourneres
  lexicon: HALOT
  rationale: גֵּר designa a personas no israelitas que residen dentro del territorio israelita. En español, «geritas» conserva la categoría léxica del término bíblico y evita perder la tensión social-jurídica del hebreo; se complementa con una nota para aclarar que se trata de residentes extranjeros.
- source_word: בְּאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: in the land of Israel
  chosen_spanish: en la tierra de Israel
  alternatives_spanish:
  - en Israel
  lexicon: HALOT
  rationale: «Tierra de Israel» mantiene el sentido territorial de אֶרֶץ y sigue de cerca la formulación hebrea, más plenamente que «en Israel».
- source_word: אַחֲרֵי הַסְּפָר
  english_pob_choice: after the census
  chosen_spanish: después del censo
  alternatives_spanish:
  - según el recuento
  - después del conteo
  lexicon: HALOT
  rationale: La frase remite a una enumeración previa. «Después del censo» es la opción más natural en español y comunica bien la referencia al registro anterior.
- source_word: אֲשֶׁר סְפָרָם דָּוִיד אָבִיו
  english_pob_choice: that David his father had taken of them
  chosen_spanish: que David su padre había hecho de ellos
  alternatives_spanish:
  - que David su padre había contado de ellos
  - que David su padre había numerado
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «hacer un censo» expresa con claridad el acto de contar personas. Se conserva «su padre» para reflejar la referencia genealógica inmediata a David.
- source_word: וַיִּמָּצְאוּ
  english_pob_choice: they were found to be
  chosen_spanish: se halló que eran
  alternatives_spanish:
  - se encontraron
  - se descubrió que eran
  lexicon: HALOT
  rationale: El nifal de מצא introduce el resultado del recuento. «Se halló que eran» preserva el matiz resultativo y evita una construcción demasiado moderna o interpretativa.
- source_word: מֵאָה וַחֲמִשִּׁים אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  english_pob_choice: one hundred fifty-three thousand six hundred
  chosen_spanish: ciento cincuenta y tres mil seiscientos
  alternatives_spanish:
  - '153.600'
  lexicon: HALOT
  rationale: Se expresa el total en palabras, como en el inglés POB, para mantener la fluidez de lectura y conservar el valor exacto del número.
translation_notes:
  revision_awareness: El texto inglés POB de referencia presenta acuerdo alto y no registra revisiones aplicadas; la versión española sigue de cerca esa lectura sin introducir cambios textuales ni decisiones doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «tierra de Israel» para conservar el valor territorial de אֶרֶץ.
  - Se prefirió «contó» en la línea principal porque armoniza con el contexto de un censo sin forzar un tecnicismo.
  - Se añadió una nota léxica para «geritas» porque el español necesita explicar la categoría social del término hebreo sin diluirla en una paraphrasis larga.
