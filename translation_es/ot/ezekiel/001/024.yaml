revisions:
- from: Y oí el sonido de sus alas[a], como el sonido de muchas aguas, como el sonido del Todopoderoso, cuando iban; un sonido de tumulto, como el sonido de un campamento[b]. Cuando se detenían, bajaban sus alas.
  to: Y oí el sonido de sus alas[a], como el sonido de muchas aguas, como el sonido del Todopoderoso, cuando iban; un sonido de tumulto, como el sonido de un campamento militar[b]. Cuando se detenían, bajaban sus alas.
  rationale: Se requiere una corrección menor para alinear el texto español con la decisión léxica documentada del POB sobre מַחֲנֶה. El resto del versículo es fiel y natural en español. También se ajusta la nota b para que preserve correctamente la alternativa frente a la lectura principal revisada.
