    rationale: 'La nota empieza con comilla inicial antes de «O:», lo que se ve tipográficamente extraño en español. Conviene normalizarla: «O bien, “trazar/delimitar...”».'
  - severity: low
    issue: Posible mejora léxica de «marcaréis»
    rationale: Aunque fiel, «delimitarán» encaja mejor con el contexto de frontera territorial y evita una resonancia demasiado genérica de «marcar».
