revisions:
- from: El yugo de mis rebeliones[a] está atado por su mano; se entrelazan[b], se han subido sobre mi cuello; ha hecho caer mi fuerza[c]. El Señor me ha entregado en manos de las cuales no podré levantarme.
  to: El yugo de mis transgresiones está atado por su mano[a]; se entrelazan[b], han subido sobre mi cuello; ha hecho desfallecer mi fuerza. El Señor me ha entregado en manos[c] de las que no puedo levantarme.
  rationale: Se revisa el texto para alinearlo más estrechamente con las decisiones documentadas del POB y con un español más natural. 'Transgresiones' restituye la elección principal para פְּשָׁעַי, dejando implícita la alternativa 'rebeliones' solo en el trasfondo lexical. Se corrige el sistema de notas para que [c] vuelva a explicar 'en manos' como en el audit trail inglés. También se mejora la fluidez y precisión idiomática con 'ha hecho desfallecer mi fuerza' y 'de las que no puedo levantarme'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y la imaginería del hebreo: yugo, entrelazamiento, subida al cuello, debilitamiento de la fuerza y entrega en manos indefinidas. También preserva la referencia a אֲדֹנָי como título divino. Sin embargo, hay dos desajustes importantes con el audit trail: (1) פְּשָׁעַי fue decidido en inglés como ''my transgressions'', y aunque ''rebeliones'' es semánticamente posible, aquí se aparta innecesariamente de la elección principal documentada; conviene usar ''transgresiones'' y dejar ''rebeliones'' como alternativa en nota. (2) La nota [c] está anclada en ''mi fuerza'', pero en el POB inglés la nota c corresponde a ''into hands'', no a הִכְשִׁיל כֹּחִי; además, la explicación de ''into hands'' se perdió. También conviene ajustar ''de las cuales no podré levantarme'' a una formulación más natural y más cercana al inglés auditado: ''de las que no puedo levantarme'' o ''de las que no puedo alzarme''.'
  spanish_quality_summary: El español es en general claro y digno, pero presenta algunos giros mejorables. 'Se han subido sobre mi cuello' suena algo coloquial; 'han subido sobre mi cuello' o mejor 'han venido sobre mi cuello' sería más sobrio, aunque la forma actual sigue siendo entendible. 'Ha hecho caer mi fuerza' es inteligible, pero 'ha hecho desfallecer mi fuerza' o 'ha hecho fallar mi fuerza' refleja mejor el sentido idiomático de הִכְשִׁיל כֹּחִי sin sonar torpe. 'En manos de las cuales' es correcto pero rígido; 'en manos de las que no puedo levantarme' fluye mejor en español bíblico contemporáneo.
  glossary_alignment: Alineación general buena con la terminología del proyecto salvo dos puntos. 'El Señor' para אֲדֹנָי es apropiado como excepción contextual al default de 'Yahvé'. No hay conflicto con otros términos clave. Pero la preferencia del audit trail por 'transgressions' favorece 'transgresiones' sobre 'rebeliones' en el texto principal, dejando la otra opción como nota. Las notas deben reordenarse para que [a] siga marcando la rareza de נִשְׂקַד, [b] el entrelazamiento de יִשְׂתָּרְגוּ, y [c] la indefinición de בִּידֵי.
  issues:
  - severity: high
    issue: La nota [c] está aplicada al segmento equivocado.
    rationale: En el audit trail inglés, [c] explica 'into hands' (בִּידֵי) y la indefinición de los opresores, no 'he has made my strength fail'. El borrador español reemplazó esa nota por una observación sobre 'ha hecho tropezar mi fuerza', alterando la documentación lexical preservada.
  - severity: medium
    issue: '''Mis rebeliones'' se aparta de la decisión principal documentada ''my transgressions''.'
    rationale: Aunque פשע puede significar rebelión, el POB inglés eligió 'transgressions' como forma principal por claridad y peso moral. En español, 'transgresiones' reproduce mejor esa decisión, y 'rebeliones' puede mantenerse como alternativa en nota.
  - severity: medium
    issue: La cláusula final suena algo rígida en español.
    rationale: '''En manos de las cuales no podré levantarme'' es menos natural que ''en manos de las que no puedo levantarme'' y además cambia el matiz del perfecto/resultativo inglés-hebreo a futuro sin necesidad.'
  - severity: low
    issue: '''Se han subido sobre mi cuello'' suena algo coloquial.'
    rationale: No es infiel, pero una formulación más sobria como 'han subido sobre mi cuello' mejora la dignidad estilística sin perder la imagen.
  revised_spanish_text: El yugo de mis transgresiones está atado por su mano[a]; se entrelazan[b], han subido sobre mi cuello; ha hecho desfallecer mi fuerza. El Señor me ha entregado en manos[c] de las que no puedo levantarme.
  revised_footnotes:
