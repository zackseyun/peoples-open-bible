translation:
  language: es
  text: Así que sabe que no es por tu justicia que Yahvé tu Dios te está dando esta buena tierra para poseerla[a], pues eres un pueblo de dura cerviz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredarla». El verbo hebreo puede denotar recibir una herencia, pero en Deuteronomio a menudo incluye el sentido de tomar posesión de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  english_pob_choice: So know
  chosen_spanish: Así que reconoce
  alternatives_spanish:
  - Y conoce
  - Reconoce
  lexicon: HALOT
  rationale: El verbo ידע en este contexto tiene fuerza exhortativa/inferencial. «Así que» conserva la conexión discursiva con lo anterior, y «reconoce» comunica con naturalidad la exigencia de asumir esta verdad sin sonar mecánico.
- source_word: בְצִדְקָתְךָ
  english_pob_choice: not because of your righteousness
  chosen_spanish: no es por tu justicia
  alternatives_spanish:
  - no es por tu rectitud
  - no es a causa de tu justicia
  lexicon: HALOT
  rationale: La preposición ב expresa aquí la base o motivo. En español, «no es por» refleja bien la idea causal. Se eligió «justicia» porque en este marco de pacto y obediencia la POB en inglés opta por «righteousness» como categoría moral, pero en español «justicia» comunica de forma más natural esa rectitud exigida sin perder el contraste teológico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé», manteniendo la transparencia del Tetragrámaton y evitando la sustitución por una convención de ocultamiento.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Construcción posesiva de segunda persona singular; «tu Dios» es la equivalencia directa y natural en español bíblico contemporáneo.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te está dando
  alternatives_spanish:
  - te da
  - está dándote
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. El progresivo español «te está dando» reproduce bien ese valor aspectual y mantiene la inmediatez del don.
- source_word: הָאָרֶץ הַטּוֹבָה הַזֹּאת
  english_pob_choice: this good land
  chosen_spanish: esta buena tierra
  alternatives_spanish:
  - esta tierra buena
  - esta tierra tan buena
  lexicon: HALOT
  rationale: «Tierra» es el término más natural en el discurso del pacto; «buena» conserva el matiz valorativo del adjetivo hebreo y «esta» mantiene el deíctico enfático.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para tomar posesión de ella
  alternatives_spanish:
  - para poseerla
  - para heredarla
  lexicon: HALOT
  rationale: ירש puede abarcar heredar y poseer la tierra, pero en Deuteronomio incluye con frecuencia la idea de entrar y ocuparla. «Tomar posesión de ella» preserva ese matiz activo que la POB documenta en inglés.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un pueblo colectivo
  lexicon: HALOT
  rationale: El hebreo trata a Israel como colectivo singular. «Un pueblo» mantiene el valor corporativo sin forzar pluralidad gramatical.
- source_word: קְשֵׁה עֹרֶף
  english_pob_choice: stiff-necked
  chosen_spanish: de dura cerviz
  alternatives_spanish:
  - terco
  - de cuello rígido
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea tradicional con una formulación española bíblica y digna. «Dura cerviz» preserva mejor la imagen y la carga de rebeldía que una simple paráfrasis como «terco».
theological_decisions:
- issue: Base del don de la tierra
  english_pob_reading: The verse denies that Israel's own righteousness is the basis for the LORD's gift of the land.
  chosen_spanish_reading: El versículo niega que la justicia de Israel sea la base del regalo de la tierra por parte de Yahvé.
  alternative_spanish_readings:
  - El versículo solo subraya humildad sin negar explícitamente una base moral.
  - El versículo podría leerse como una afirmación general sobre la gracia, sin insistir en la insuficiencia de Israel.
  rationale: El hebreo contrasta de manera explícita la falta de mérito de Israel con la acción dadora de Yahvé y remata con la caracterización de Israel como pueblo de dura cerviz. La traducción conserva esa tensión teológica sin suavizarla.
  doctrine_reference: Translation philosophy §3
- issue: Sujeto corporativo singular
  english_pob_reading: Translate singular pronouns as 'you' while keeping 'people' singular collective.
  chosen_spanish_reading: 'Se conserva el singular corporativo: «tu», «te» y «eres» para dirigirse a Israel como unidad.'
  alternative_spanish_readings:
  - 'Convertir a plural explícito: «ustedes»'
  - Reformular como una nación en tercera persona
  rationale: El hebreo usa singular para dirigirse a Israel colectivamente. El español puede reproducirlo con naturalidad mediante singular de segunda persona, evitando una expansión interpretativa no presente en el texto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios posteriores ni ajustes pendientes; la redacción sigue el acuerdo alto entre revisiones y la lectura estable del auditor.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» según la convención del proyecto.
  - Se preservó el singular corporativo en la segunda persona para reflejar el hebreo.
  - Se eligió «dura cerviz» para conservar la metáfora idiomática de קְשֵׁה עֹרֶף.
  - La nota textual sobre לְרִשְׁתָּהּ conserva la alternativa «heredar» sin desplazar el matiz de posesión activa.
  - «Tierra» se prefirió a «país» o «nación» por coherencia con el lenguaje de promesa del Deuteronomio.
