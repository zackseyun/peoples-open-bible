theological_decisions:
- issue: How to construe the predicate 'ναὸς αὐτῆς ἐστιν, καὶ τὸ ἀρνίον'
  chosen_reading: Both the Lord God, the Almighty, and the Lamb together are the temple of the city.
  alternative_readings:
  - The Lamb is an added appositional emphasis rather than a fully coordinate subject.
  rationale: 'The Greek most naturally reads with a compound subject/complement structure: ''the Lord God, the Almighty, is its temple, and the Lamb.'' This preserves the high Christology of the verse without importing later doctrinal formulation beyond the text. It also avoids weakening the coordinate force of καί before τὸ ἀρνίον.'
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon (451 AD); preserve theological tension rather than resolve it'
