translation:
  language: es
  text: No mires[a] a tu hermano en el día de su desgracia[b], y no te alegres por los hijos de Judá en el día de su destrucción; y no hagas grande tu boca[c] en el día de la angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘veas’ o ‘mires’; el hebreo es literalmente ‘ver’, pero aquí lleva la idea de mirar con satisfacción malévola; es decir, ‘regodearte’ o ‘regocijarte por ello’.
    reason: lexical_alternative
  - marker: b
    text: O ‘su calamidad’, o posiblemente ‘el día en que se hizo extraño/forastero’.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘hacer grande tu boca’; es decir, hablar con arrogancia o jactancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּרֶא
  english_pob_choice: look on
  chosen_spanish: mires
  alternatives_spanish:
  - miras
  - veas
  - mires con satisfacción
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘ver’, pero en este contexto prohibitivo con los paralelos ‘no te alegres’ y ‘no hagas grande tu boca’ la referencia es mirar de un modo hostil o complaciente. En español, ‘mirar’ mantiene la cercanía semántica al verbo hebreo y evita una paráfrasis excesiva como ‘alegrarte al verlo’.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu consanguíneo
  lexicon: HALOT
  rationale: Se conserva ‘hermano’ porque el texto apela a la fraternidad entre Edom e Israel/Judá. Esa relación familiar tiene fuerza retórica y teológica; no conviene neutralizarla en ‘pariente’ sin una razón textual explícita.
- source_word: נָכְרוֹ
  english_pob_choice: his misfortune
  chosen_spanish: su desgracia
  alternatives_spanish:
  - su calamidad
  - su extrañamiento
  - el día en que se hizo extraño
  lexicon: HALOT
  rationale: El término puede sugerir extranjería o extrañamiento, pero en el paralelismo inmediato con ‘destrucción’ y ‘angustia’ se refiere al día de su desastre. ‘Desgracia’ comunica bien esa carga de calamidad sin sobreespecificar.
- source_word: תִּשְׂמַח
  english_pob_choice: rejoice
  chosen_spanish: te alegres
  alternatives_spanish:
  - te regocijes
  - te gozes
  lexicon: HALOT
  rationale: ‘Alegrar(se)’ reproduce de forma natural el verbo שמח en español bíblico contemporáneo. ‘Te alegres’ encaja con el tono exhortativo y mantiene el paralelismo con la prohibición anterior.
- source_word: לִבְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - el pueblo de Judá
  - los hijos del pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la fórmula literal ‘hijos de Judá’ porque el hebreo usa deliberadamente un lenguaje filial/nacional. En español, ‘hijos’ comunica esa filiación corporativa mejor que una neutralización inmediata a ‘pueblo’.
- source_word: אָבְדָם
  english_pob_choice: their destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - su perecer
  lexicon: HALOT
  rationale: ‘Destrucción’ es el equivalente más directo y solemne para אבד en este contexto de catástrofe nacional. Mantiene el paralelismo con ‘desgracia’ y ‘angustia’.
- source_word: תַּגְדֵּל פִּיךָ
  english_pob_choice: make your mouth great
  chosen_spanish: hagas grande tu boca
  alternatives_spanish:
  - te jactes
  - hables con arrogancia
  - abras mucho la boca
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea literal para no perder la metáfora de hablar con soberbia. En español suena marcada, pero es transparente y auditable; además, el campo semántico de ‘boca grande’ puede entenderse como habla arrogante sin borrar la tensión idiomática.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: HALOT
  rationale: ‘Angustia’ es un término digno y natural en español bíblico para צָרָה. Evita repetir ‘desgracia’ y conserva el registro solemne del cierre del versículo.
theological_decisions:
- issue: Lenguaje fraternal entre Edom y Judá
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu pariente
  rationale: La traducción mantiene el vínculo de hermandad porque el reproche profético depende de la traición contra un hermano. Esa elección refuerza la dimensión ética del pasaje y coincide con la lectura inglesa auditada.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que prefirió ‘look on’ sobre ‘gloat over’ para ajustarse más de cerca al verbo hebreo sin perder el tono formal. En español se reflejó con ‘mirar’, manteniendo la literalidad controlada y el paralelismo del verso.
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ como forma normativa del nombre divino, pero en este versículo no aparece el Tetragrámaton en el texto hebreo.
  - Se conservó el lenguaje relacional ‘hermano/hijos de Judá’ por su peso retórico y teológico.
  - Se mantuvo la metáfora hebrea ‘hacer grande tu boca’ con nota explicativa, para no borrar la tensión idiomática documentada.
