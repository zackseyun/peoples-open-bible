    reason: lexical_alternative
lexical_decisions:
- source_word: אֲזַי
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese entonces
  - luego
  lexicon: HALOT
  rationale: Marca la consecuencia temporal en la secuencia contrafactual del salmo; «entonces» es natural, claro y fiel al valor discursivo del adverbio.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - vivo(s)
  - con vida
  lexicon: HALOT
  rationale: Es un acusativo adverbial de estado; «vivos» conserva la imagen vívida de ser devorados sin estar muertos.
- source_word: בְּלָעוּנוּ
  english_pob_choice: they would have swallowed us
  chosen_spanish: nos habrían tragado
  alternatives_spanish:
  - nos habrían devorado
  - nos habrían engullido
  lexicon: HALOT
  rationale: El perfecto qal funciona aquí en sentido contrafactual; el condicional perfecto español expresa mejor la situación hipotética. «Tragado» mantiene la metáfora concreta de ser consumidos.
- source_word: בַּחֲרוֹת
  english_pob_choice: when ... burned
  chosen_spanish: cuando ... se encendió
  alternatives_spanish:
  - cuando ... ardió
  - al encenderse
  lexicon: HALOT
  rationale: El infinitivo constructo con ב indica circunstancia temporal. En español, «se encendió» comunica con naturalidad la imagen del fuego/ira sin perder el dinamismo del hebreo.
- source_word: אַפָּם
  english_pob_choice: their anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  lexicon: HALOT
  rationale: אַף es un hebraísmo idiomático para ira; «ira» preserva mejor la intensidad formal que «enojo» y encaja con la imagen de fuego.
- source_word: בָּנוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - hacia nosotros
  lexicon: HALOT
  rationale: Con verbos de ira, la preposición expresa hostilidad dirigida. «Contra nosotros» reproduce la fuerza adversarial del hebreo con claridad.
translation_notes:
  revision_awareness: El texto base inglés fue afinado para quitar la coma tras «alive» y así leer de forma más fluida; la traducción española conserva esa fluidez sin añadir puntuación innecesaria y mantiene la lectura contrafactual apoyada por el contexto de los vv. 2–5.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce el hebraísmo de la ira con vocabulario natural en español («ira») sin borrar la metáfora del ardor, que queda indicada en la nota.
  - El condicional perfecto («habrían tragado») refleja la fuerza contrafactual documentada en el aparato inglés.
