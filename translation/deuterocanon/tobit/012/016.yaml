id: TOB.12.16
reference: Tobit 12:16
source:
  edition: lxx-swete-1909
  text: Καὶ ἐταράχθησαν οἱ δύο καὶ ἔπεσον ἐπὶ πρόσωπον, ὅτι ἐφοβήθησαν.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: And the two were shaken, and they fell facedown, because they were
    afraid.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐταράχθησαν
  chosen: were shaken
  alternatives:
  - were troubled
  - were startled
  - were terrified
  lexicon: BDAG
  rationale: Passive of ταράσσω, indicating being disturbed or agitated. 'Were shaken'
    preserves the sudden emotional upheaval without overtranslating to full terror,
    which is then explicitly stated by the following fear clause.
- source_word: οἱ δύο
  chosen: the two
  alternatives:
  - both of them
  lexicon: LSJ
  rationale: A straightforward rendering of the substantivized numeral. 'The two'
    keeps the Greek form and clearly refers to Tobit and Tobias together.
- source_word: ἔπεσον ἐπὶ πρόσωπον
  chosen: fell facedown
  alternatives:
  - fell on their faces
  - fell face down
  lexicon: BDAG
  rationale: This idiom denotes prostration with the face to the ground. 'Fell facedown'
    is natural modern English while preserving the physical posture.
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they became afraid
  - they feared
  lexicon: BDAG
  rationale: Aorist passive/deponent of φοβέομαι, expressing fear. 'They were afraid'
    is idiomatic and matches the explanatory force introduced by ὅτι.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for their falling facedown. 'Because' communicates
    the causal relation clearly in modern English.
