base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/006/008.yaml
  text: Then take the ark of Yahweh and place it on the cart[a], and put the gold objects that you are returning to him as a guilt offering in a box beside it. Then send it away[c][b], and let it go.
  footnotes:
  - marker: a
    text: Or 'the gold articles' or 'the golden objects.' The Hebrew term is broad and can refer to various items or vessels.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a chest' or 'in a coffer beside it.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally ''and it will go''; in context this functions as the final step of the instruction: ''send it off, and let it go.'''
    reason: lexical_alternative
