translation:
  language: es
  text: y Janim[a], y Bet-tapuaj[b], y Afecá[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Janim: nombre de lugar transliterado; algunas tradiciones lo escriben de forma ligeramente distinta.'
    reason: lexical_alternative
  - marker: b
    text: 'Bet-tapuaj: topónimo compuesto transliterado; también puede escribirse «Bet Tappuaj» o «Bet-tapuach».'
    reason: lexical_alternative
  - marker: c
    text: 'Afecá: alternativamente «Afeká»; algunas versiones inglesas abrevian el nombre como «Aphek», pero aquí se conserva la forma más completa del texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/ינים
  english_pob_choice: and Janim
  chosen_spanish: y Janim[a]
  alternatives_spanish:
  - y Janim
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración, no por traducción. El conector ו se rinde con «y», como en la lista de lugares.
- source_word: וּ/בֵית תַּפּוּחַ
  english_pob_choice: and Beth-tappuah
  chosen_spanish: y Bet-tapuaj[b]
  alternatives_spanish:
  - y Bet Tappuaj
  - y Bet-tapuach
  lexicon: HALOT
  rationale: En español, el elemento toponímico בית en nombres compuestos suele adaptarse como «Bet-» para mantener el valor de nombre propio, no como «casa de». תַּפּוּחַ se translitera de forma hispana como «tapuaj» para conservar la pronunciación aproximada y la identidad del topónimo.
- source_word: וַ/אֲפֵקָה
  english_pob_choice: and Aphekah
  chosen_spanish: y Apéca[c];
  alternatives_spanish:
  - y Apékah
  - y Aféca
  lexicon: HALOT
  rationale: Se preserva el nombre propio como topónimo transliterado. Se opta por «Apéca» para reflejar la vocalización final con una forma española legible; la alternativa «Apékah» mantiene más explícitamente la consonante final, mientras que «Aféca» sería una acomodación más castellana.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no introduce cambios sustantivos: se mantiene la lista de lugares con las mismas decisiones onomásticas y sin variantes textuales nuevas.'
  spanish_consistency_notes:
  - Se usa «y» repetido para reflejar la coordinación acumulativa de la lista hebrea.
  - Se prefieren adaptaciones toponímicas en español que conserven el carácter de nombre propio y no traduzcan los elementos de forma composicional.
  - No se introduce puntuación interpretativa adicional más allá de comas y punto y coma para lectura fluida.
