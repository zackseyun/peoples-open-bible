    rationale: La auditoría inglesa documenta alternativas significativas ('vexation', 'pursuit/preoccupation'); el español debe preservar esa información en nota, especialmente porque 'afán' selecciona solo una parte del campo semántico.
  - severity: medium
    issue: '''¿Qué ganancia tiene el hombre de...?'' suena menos natural en español que una formulación verbal como ''¿qué saca/obtiene el hombre de...?''.'
    rationale: Aunque comprensible, 'tener ganancia de' es menos idiomático y puede entorpecer la legibilidad. El hebreo pregunta por lo que le viene o resulta al hombre de su trabajo; 'saca' lo expresa de manera más natural.
