  rationale: Se ajusta «delante de ellos» a «ante ellos» para reflejar mejor ἐνώπιον αὐτῶν en un registro formal y narrativo. También se pule la nota léxica para usar alternativas más idiomáticas en español sin alterar la decisión principal «sala del consejo».
