  text: The watchman says[a], “Morning comes, and also night. If you would inquire, inquire; return[b], come.”
  footnotes:
  - marker: a
    text: Or “Morning has come, and also night”; the Hebrew can be heard either as a general statement of arrival or as a more immediate announcement.
    reason: lexical_alternative
  - marker: b
    text: The final commands may also be understood as “turn back, come again,” suggesting either repentance or simply returning later to ask again; the Hebrew leaves the nuance open.
    reason: alternative_reading
