translation:
  language: es
  text: Entonces el rey[a], cuando oyó la declaración, se angustió mucho y se propuso librar a Daniel; y hasta la puesta del sol siguió esforzándose por rescatarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estuvo muy disgustado consigo mismo»; el arameo es literalmente «estuvo muy angustiado/disgustado sobre sí mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la siguiente acción en secuencia. «Entonces» conserva el avance narrativo natural en español sin añadir matiz temporal extra.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Sustantivo definido por el contexto; en español el artículo expresa con naturalidad la referencia determinada.
- source_word: כְּדִי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en cuanto
  - al
  lexicon: HALOT
  rationale: Introduce una cláusula temporal con el verbo «oyó»; «cuando» refleja bien la relación sintáctica y resulta idiomático.
- source_word: מִלְּתָא
  english_pob_choice: the statement
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - el informe
  - la declaración
  lexicon: HALOT
  rationale: En este contexto de corte, el término puede referirse a lo dicho/ordenado. «La palabra» es más directa en español y deja abierta la referencia concreta al anuncio que acababa de oír el rey.
- source_word: שְׁמַע
  english_pob_choice: he heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: Perfecto narrativo simple. «Oyó» comunica recepción del mensaje sin implicar atención voluntaria extra, a diferencia de «escuchó».
- source_word: שַׂגִּיא בְּאֵשׁ עֲלֹוהִי
  english_pob_choice: was greatly distressed
  chosen_spanish: se angustió mucho
  alternatives_spanish:
  - estuvo muy disgustado consigo mismo
  - se sintió muy afligido
  - estaba muy trastornado
  lexicon: HALOT
  rationale: La expresión aramea es idiomática y, según la POB en inglés, puede entenderse también como disgusto dirigido a sí mismo. En español, «se angustió mucho» transmite con naturalidad la fuerte agitación interior sin borrar esa tensión; la alternativa reflexiva queda preservada en la nota.
- source_word: וְעַל דָּנִיֵּאל
  english_pob_choice: and ... Daniel
  chosen_spanish: y puso su corazón en librar a Daniel
  alternatives_spanish:
  - y respecto de Daniel
  - y por Daniel
  lexicon: HALOT
  rationale: La preposición introduce el objeto de la preocupación/acción del rey. En español se integra en el modismo semítico «poner el corazón en», que conserva el sentido de resolverse con intención firme.
- source_word: שָׂם בָּל
  english_pob_choice: he set his mind
  chosen_spanish: puso su corazón
  alternatives_spanish:
  - puso su mente
  - decidió
  - fijó su corazón
  lexicon: HALOT
  rationale: El arameo literalmente dice «puso corazón». «Puso su corazón» preserva el hebraísmo/arameísmo de intención deliberada; «mente» sería más interpretativo y menos acorde con la imagen del texto.
- source_word: לְשֵׁיזָבוּתֵהּ
  english_pob_choice: on delivering him
  chosen_spanish: en librar a Daniel
  alternatives_spanish:
  - en salvarlo
  - para rescatarlo
  - en entregarlo
  lexicon: HALOT
  rationale: Verbo de liberación/deliverance. «Librar» funciona bien en español bíblico contemporáneo para liberar de peligro o condena, manteniendo la fuerza del acto esperado.
- source_word: וְעַד מֶעָלֵי שִׁמְשָׁא
  english_pob_choice: and until the going down of the sun
  chosen_spanish: y hasta la puesta del sol
  alternatives_spanish:
  - y hasta el atardecer
  - y hasta que se pusiera el sol
  - y hasta la caída del sol
  lexicon: HALOT
  rationale: La imagen idiomática del ocaso se expresa de manera clara y natural. «Puesta del sol» conserva el valor figurado de la expresión aramea sin sonar arcaico.
- source_word: הֲוָא מִשְׁתַּדַּר
  english_pob_choice: he kept striving
  chosen_spanish: siguió esforzándose
  alternatives_spanish:
  - continuó haciendo todo lo posible
  - persistió
  - no cesó de esforzarse
  lexicon: HALOT
  rationale: La construcción perifrática expresa esfuerzo continuado. «Siguió esforzándose» reproduce bien la duratividad y el empeño perseverante.
- source_word: לְהַצָּלוּתֵהּ
  english_pob_choice: to rescue him
  chosen_spanish: por rescatarlo
  alternatives_spanish:
  - para salvarlo
  - para librarlo
  - para rescatarle
  lexicon: HALOT
  rationale: Segundo término de liberación. «Rescatar» mantiene el campo semántico de salvar de un peligro real y suena natural en español; el complemento final con «lo» refiere a Daniel.
theological_decisions:
- issue: 'Nuance of the king''s inward reaction: distress vs. self-directed displeasure'
  english_pob_reading: '''was greatly distressed'' with footnote: ''Or “was very displeased with himself”; the Aramaic idiom is literally “was very distressed/displeased upon himself.”'''
  chosen_spanish_reading: «se angustió mucho» con nota que preserva la posibilidad de que el giro implique disgusto consigo mismo
  alternative_spanish_readings:
  - «estuvo muy disgustado consigo mismo»
  - «se afligió profundamente»
  rationale: El arameo contiene una idiomática que la POB inglesa no aplana del todo. En español, la forma principal debe sonar natural, pero la nota conserva la tensión semántica entre angustia interna y posible auto-disgusto.
  doctrine_reference: No doctrinal; lexical/idiomatic note based on Aramaic usage and English POB footnote
- issue: Rendering of the resolve phrase as an embodied intention
  english_pob_reading: '''he set his mind on delivering Daniel'''
  chosen_spanish_reading: «puso su corazón en librar a Daniel»
  alternative_spanish_readings:
  - «decidió librar a Daniel»
  - «fijó su mente en rescatarlo»
  rationale: El arameo usa «corazón» como sede de intención, y la POB inglesa lo expresa con «mind» para claridad. En español, «corazón» mantiene mejor la imagen semítica sin perder el sentido de resolución.
  doctrine_reference: No doctrinal; lexical/syntactic decision preserving Semitic idiom
translation_notes:
  revision_awareness: La POB inglesa más reciente mantiene sin cambios esta lectura; la versión española sigue el mismo tramo interpretativo sin necesidad de revisión textual adicional. La única tensión relevante es la idiomática de b’esh ‘alohi, preservada con una nota.
  spanish_consistency_notes:
  - He mantenido «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - He usado «Daniel» sin transliteración, conforme al nombre propio estándar.
  - He preferido «librar» y «rescatar» para distinguir dos verbos de liberación presentes en el versículo, como hace la POB inglesa con «delivering» y «rescue».
  - He evitado «señor» o «S[eñor]» para מַלְכָּא porque el contexto exige «rey».
