translation:
  language: es
  text: Y había ventanas cerradas[a] y palmeras[b] de un lado y del otro, en los muros laterales del vestíbulo, y en las cámaras laterales del templo, y los umbrales[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ventanas cubiertas»; el hebreo describe ventanas que estaban cerradas o resguardadas de alguna manera.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «palmeras», probablemente refiriéndose a motivos decorativos de palmera en la arquitectura del templo.
    reason: cultural_note
  - marker: c
    text: El significado del término hebreo final es incierto; puede referirse a umbrales, salientes u otros elementos arquitectónicos sobresalientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלּוֹנִים
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - aberturas
  - claraboyas
  lexicon: HALOT
  rationale: El término arquitectónico básico se rinde naturalmente como «ventanas» en español. «Aberturas» es posible, pero menos preciso y más vago en este contexto de descripción del templo.
- source_word: אֲטֻמוֹת
  english_pob_choice: shuttered
  chosen_spanish: cerradas
  alternatives_spanish:
  - tapadas
  - selladas
  - entabladas
  lexicon: HALOT
  rationale: El participio pasivo indica ventanas no abiertas o cubiertas de algún modo. «Cerradas» preserva la idea sin forzar una precisión arquitectónica mayor que la que permite el hebreo.
- source_word: תִמֹרִים
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - palmas
  - árboles de palma
  - motivos de palmera
  lexicon: HALOT
  rationale: En la visión del templo el término apunta probablemente a motivos decorativos de palmeras. «Palmeras» es un equivalente claro y natural; el sentido ornamental queda aportado por el contexto arquitectónico.
- source_word: מִפּוֹ וּמִפּוֹ
  english_pob_choice: on this side and on that
  chosen_spanish: de este lado y de aquel
  alternatives_spanish:
  - a este lado y a aquel
  - de un lado y del otro
  - a ambos lados
  lexicon: HALOT
  rationale: La expresión distributiva se refleja bien con «de este lado y de aquel», que mantiene la simetría del hebreo y su tono descriptivo.
- source_word: אֶל כִּתְפוֹת הָאוּלָם
  english_pob_choice: on the sidewalls of the vestibule
  chosen_spanish: en los muros laterales del vestíbulo
  alternatives_spanish:
  - junto a los costados del vestíbulo
  - en las partes laterales del vestíbulo
  - contra los lados del vestíbulo
  lexicon: HALOT
  rationale: כָּתֵף puede referirse a lado, costado o sección lateral en arquitectura. «Muros laterales» expresa con claridad la función espacial en español. «Vestíbulo» conserva el valor arquitectónico de אוּלָם.
- source_word: צַלְעוֹת הַבַּיִת
  english_pob_choice: the side chambers of the temple
  chosen_spanish: las cámaras laterales del templo
  alternatives_spanish:
  - las habitaciones laterales del templo
  - los costados del templo
  - las dependencias laterales de la casa
  lexicon: HALOT
  rationale: En contexto del templo, צֵלָע puede designar cámaras o estructuras laterales. «Cámaras laterales» es una solución clara y fiel; «templo» aclara que הַבַּיִת se refiere al santuario.
- source_word: הָעֻבִּים
  english_pob_choice: the thresholds
  chosen_spanish: los umbrales
  alternatives_spanish:
  - los dinteles
  - los salientes
  - los aleros
  lexicon: HALOT
  rationale: El término final es difícil y su referente arquitectónico exacto es incierto. Siguiendo la revisión inglesa más reciente, «umbrales» ofrece una opción sobria y publicable, aunque sin resolver por completo la dificultad lexical.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, incorporando la revisión más reciente que prefirió «thresholds» para הָעֻבִּים en lugar de una solución más interpretativa como «canopies». También se mantuvo la estructura distributiva y la imaginería arquitectónica del pasaje.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros ocultamientos del nombre divino porque este versículo no contiene el Tetragrámaton.
  - 'Se mantuvo un registro arquitectónico sobrio y coherente: «ventanas», «vestíbulo», «muros laterales», «cámaras laterales» y «umbrales».'
  - Se prefirió un español natural pero cercano a la sintaxis hebrea, sin añadir elementos ausentes del texto fuente.
