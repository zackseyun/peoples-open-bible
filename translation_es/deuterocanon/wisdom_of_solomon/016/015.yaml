translation:
  language: es
  text: Pero escapar de tu mano es imposible[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''huir de tu mano''. El griego conserva la imagen concreta de la mano de Dios como figura de su poder y alcance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὴν ... σὴν χεῖρα
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu dominio
  - tu agarre
  lexicon: LSJ
  rationale: χείρ significa literalmente 'mano'. Sigo la imagen concreta del griego, porque el audito inglés la conserva como 'your hand' y la metáfora comunica de forma natural la acción eficaz e ineludible de Dios. 'Poder' o 'dominio' explicitan la idea, pero debilitan la imagen.
- source_word: φυγεῖν
  english_pob_choice: to escape
  chosen_spanish: escapar
  alternatives_spanish:
  - huir
  - huir de
  - salir huyendo
  lexicon: LSJ
  rationale: Con objeto directo o implícito de alejamiento, φυγεῖν puede significar 'huir' o 'escapar'; en español, 'escapar de tu mano' es idiomático y mantiene el sentido de evadir algo que persigue o alcanza.
- source_word: ἀδύνατόν ἐστιν
  english_pob_choice: it is impossible
  chosen_spanish: es imposible
  alternatives_spanish:
  - no es posible
  - no puede hacerse
  lexicon: LSJ
  rationale: La construcción impersonal se rinde de modo directo con 'es imposible', que expresa con claridad la imposibilidad absoluta del enunciado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: δὲ introduce contraste con lo anterior; 'Pero' reproduce mejor esa fuerza adversativa en español actual.
theological_decisions:
- issue: Imagen antropomórfica de la 'mano' divina
  english_pob_reading: Retain 'your hand' as the main text
  chosen_spanish_reading: Conservar 'tu mano' como imagen principal
  alternative_spanish_readings:
  - tu poder
  - tu dominio
  - tu control
  rationale: El griego presenta una imagen corporal de la acción eficaz de Dios. La mantengo en español para no aplanar la tensión teológica ni convertirla en paráfrasis abstracta; la inescapabilidad queda precisamente expresada por la mano como figura de alcance y poder divinos.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la imaginería sin resolverla en abstracción.'
translation_notes:
  revision_awareness: 'El texto griego es breve y coincide sustancialmente con el audit trail inglés: contraste con δὲ, infinitivo de escape con φυγεῖν y expresión impersonal de imposibilidad con ἀδύνατόν ἐστιν. No se detectaron revisiones aplicadas en el expediente inglés, así que la redacción española sigue de cerca la lectura estable y su tensión metafórica.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el texto fuente no usa κύριος ni un sustituto reverencial; aquí el poseedor se expresa directamente como 'tu'.
  - Se prefirió 'mano' sobre una abstracción como 'poder' para conservar la imagen bíblica y la correspondencia con el audit trail inglés.
  - '''Escapar'' funciona naturalmente en español con ''de tu mano'' y evita una construcción más rígida con ''huir'', sin perder el valor lexical del griego.'
