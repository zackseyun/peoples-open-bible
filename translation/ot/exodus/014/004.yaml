theological_decisions:
- issue: Divine action in Pharaoh's hardening
  chosen_reading: 'Render the verb directly as divine causation: ''I will harden Pharaoh’s heart'''
  alternative_readings:
  - I will strengthen Pharaoh’s heart
  - I will let Pharaoh’s heart be hardened
  rationale: The Hebrew first-person Hiphil form explicitly presents YHWH as the acting subject. To weaken this into mere permission would import a theological softening not warranted by the text. At the same time, the translation should not add explanatory doctrinal framing beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Meaning of כבד in judgment context
  chosen_reading: Use 'I will get glory over Pharaoh'
  alternative_readings:
  - I will be glorified through Pharaoh
  rationale: The text emphasizes YHWH's honor manifested in victory over Pharaoh and his forces. The chosen wording preserves the theological tension of divine self-glorification in judgment without overinterpreting mechanism.
  doctrine_reference: Translation philosophy §3
