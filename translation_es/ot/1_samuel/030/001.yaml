base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/030/001.yaml
  text: Now when David and his men came to Ziklag on the third day[a], the Amalekites had made a raid against the Negev and against Ziklag, and they had struck Ziklag and burned it with fire.
  footnotes:
