  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, justicia, gracia, etc. La elección de «carne» para שְׁאֵר concuerda con la rationale auditada del POB inglés y debe mantenerse aquí, con apoyo de nota alternativa más precisa.
