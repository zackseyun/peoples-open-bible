revisions:
- from: Ahora, porque comemos la sal del palacio[a], y no nos conviene ver[b] la deshonra del rey, por eso hemos enviado y dado aviso al rey.
  to: Ahora, porque comemos la sal del palacio[a], y no es apropiado para nosotros presenciar la deshonra del rey[b], por eso hemos enviado e informado al rey.
  rationale: Se corrige la nota literal para que coincida con la evidencia fuente y el rastro inglés; se reemplaza «no nos conviene» por «no es apropiado para nosotros» para reflejar mejor el matiz de propiedad; y se cambia «dado aviso» por «informado» para una correspondencia léxica más precisa y un registro más natural. También se usa «presenciar» para armonizar con la revisión inglesa auditada sin perder naturalidad en español.
