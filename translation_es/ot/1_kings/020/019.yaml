    changes_summary: Revised 'provincial commanders' to 'commanders of the provinces' to more directly reflect the Hebrew construction and preserve formal clarity. No other changes needed.
translation:
  language: es
  text: 'Estos salieron de la ciudad: los jóvenes de los comandantes de las provincias[a], y el ejército que iba detrás de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los siervos/acompañantes de los comandantes de las provincias'. El hebreo נַעֲרֵי puede referirse tanto a jóvenes como a asistentes personales, y el contexto puede incluir ambas ideas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Y estos
  - Ahora bien, estos
  lexicon: HALOT
  rationale: El demostrativo plural retoma al grupo mencionado en el versículo anterior. En español, 'Estos' conserva la referencia y evita añadir una conjunción que no es necesaria para la fluidez del segmento.
- source_word: יָצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - marcharon
  lexicon: HALOT
  rationale: El verbo básico indica salida o movimiento hacia afuera. 'Salieron' es natural en español y no agrega un matiz militar que el verbo por sí solo no exige.
- source_word: מִן הָעִיר
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - desde la ciudad
  - fuera de la ciudad
  lexicon: HALOT
  rationale: La preposición expresa el punto de partida. 'De la ciudad' es la formulación más directa y publicada en español.
- source_word: נַעֲרֵי
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los siervos
  - los asistentes
  lexicon: HALOT
  rationale: נַעַר puede referirse a joven, sirviente o asistente. Aquí se mantiene el valor léxico de 'jóvenes', dejando abierta la posibilidad de un matiz de acompañantes o servidores sin imponerlo en el texto principal.
- source_word: שָׂרֵי
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - jefes
  - príncipes
  - oficiales
  lexicon: HALOT
  rationale: En este contexto narrativo y militar, שַׂר apunta a dirigentes o mandos. 'Comandantes' comunica con claridad el rango funcional sin cargarlo con una connotación monárquica innecesaria.
- source_word: הַמְּדִינוֹת
  english_pob_choice: of the provinces
  chosen_spanish: de las provincias
  alternatives_spanish:
  - de los distritos
  - de las regiones
  lexicon: HALOT
  rationale: El sustantivo designa unidades administrativas. 'Provincias' refleja bien esa organización territorial y mantiene la relación genitiva del hebreo de forma transparente.
- source_word: וְהַחַיִל
  english_pob_choice: and the army
  chosen_spanish: y el ejército
  alternatives_spanish:
  - y la fuerza
  - y las tropas
  lexicon: HALOT
  rationale: En este pasaje, חַיִל se refiere al contingente militar que acompaña al grupo. 'Ejército' es la opción más clara y idiomática en español.
- source_word: אֲשֶׁר אַחֲרֵיהֶם
  english_pob_choice: that was behind them
  chosen_spanish: que iba detrás de ellos
  alternatives_spanish:
  - que venía detrás de ellos
  - que estaba detrás de ellos
  lexicon: HALOT
  rationale: La cláusula relativa describe la posición del contingente respecto del grupo principal. 'Iba detrás de ellos' conserva la relación espacial y el movimiento implícito de la escena.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y la decisión auditada en inglés de mantener el sentido de נַעֲרֵי con una ambigüedad preservada; la revisión inglesa reciente reforzó la construcción 'of the provinces', por lo que se vertió de forma más literal como 'de las provincias' en lugar de una paráfrasis adjetival.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Comandantes'' se usa aquí por el contexto militar; no se introduce ''príncipes'' porque sería menos preciso en español contemporáneo.'
  - '''Ejército'' traduce חַיִל por el valor colectivo militar del contexto, sin necesidad de explicar ''fuerza'' en el texto principal.'
