review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: כִּי como fundamento causal (''Porque''), עִנָּה como ''aflige'', מִלִּבּוֹ preservado literalmente, וַיַּגֶּה distinguido como causar tristeza, y בְנֵי אִישׁ mantenido con forma masculina representativa. Sin embargo, en español ''aflige de su corazón'' suena poco natural; la preposición más idiomática para conservar el antropomorfismo literal es ''desde su corazón'', que además ya figura entre las alternativas documentadas.'
  spanish_quality_summary: La redacción es clara y digna, pero 'de su corazón' después de 'aflige' resulta forzada en español contemporáneo y puede leerse como complemento instrumental extraño. 'Desde su corazón' conserva la imagen concreta y mejora notablemente la legibilidad. El resto del verso y las notas son adecuados.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé/Mesías/etc. La conservación de la expresión representativa 'los hijos de los hombres' concuerda con la política documentada, con nota explicativa apropiada.
  issues:
  - severity: medium
    issue: La frase 'no aflige de su corazón' es poco idiomática en español.
    rationale: Aunque refleja literalmente מִלִּבּוֹ, en español la construcción con 'de' suena trabada y menos inteligible. 'Desde su corazón' preserva mejor el antropomorfismo sin parafrasear a 'voluntariamente'.
  revised_spanish_text: Porque no aflige[a] desde su corazón, ni entristece a los hijos de los hombres[b].
