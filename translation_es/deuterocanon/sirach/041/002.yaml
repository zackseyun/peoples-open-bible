translation:
  language: es
  text: ¡Oh muerte[a], qué adecuado es tu decreto para un hombre necesitado y falto de fuerza, que tropieza en todo, obstinado[b][c], y que ha perdido la esperanza[d]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmite «tu decreto/estatuto es bueno»; el griego dice «tu juicio es bueno». «Decreto» recoge mejor el matiz de disposición fijada, mientras «sentencia/juicio» refleja el griego.
    reason: alternative_reading
  - marker: b
    text: El griego amplía la descripción con ideas como «muy viejo» y «agobiado por todo»; el hebreo conservado es más breve y algo difícil.
    reason: textual_variant
  - marker: c
    text: Masada preserva en este contexto una forma hebrea relacionada pero fragmentaria y difiere en varios puntos del texto de la Guenizá de El Cairo, lo que confirma la inestabilidad textual del versículo.
    reason: textual_variant
  - marker: d
    text: 'Hebreo: «ha perdido la esperanza»; griego: «ha perdido la constancia/paciencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: האח / ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - ¡Ah!
  - ¡Ay!
  lexicon: HALOT / LSJ
  rationale: La exclamación vocativa se conserva en español con «¡Oh!», que mantiene el tono elevado y la dirección directa a la Muerte sin añadir matiz no sustentado por el texto.
- source_word: למות / θάνατε
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - Muerte
  lexicon: HALOT / LSJ
  rationale: El texto se dirige a la Muerte personificada. En español, «muerte» en minúscula funciona naturalmente dentro de la invocación y conserva el valor vocativo.
- source_word: כי טוב חקיך / καλὸν σου τὸ κρίμα
  english_pob_choice: how fitting is your sentence
  chosen_spanish: qué adecuado es tu decreto
  alternatives_spanish:
  - qué bueno es tu juicio
  - qué adecuado es tu sentencia
  - qué bueno es tu decreto
  lexicon: HALOT / LSJ
  rationale: El hebreo sugiere un decreto/estatuto y el griego un juicio/sentencia. «Qué adecuado» evita atribuir bondad moral a la muerte y conserva la idea de conveniencia o ajuste al caso del afligido.
- source_word: לאיש אונים / ἀνθρώπῳ ἐπιδεομένῳ
  english_pob_choice: for a man who is needy
  chosen_spanish: para un hombre necesitado
  alternatives_spanish:
  - para un hombre en necesidad
  - para un hombre indigente
  lexicon: HALOT / LSJ
  rationale: Ambos testigos apuntan a carencia o necesidad. «Necesitado» es claro, solemne y acorde con el singular איש/ἀνθρώπῳ.
- source_word: וחסר עצמה / καὶ ἐλασσουμένῳ ἰσχύϊ
  english_pob_choice: and lacking strength
  chosen_spanish: y falto de fuerza
  alternatives_spanish:
  - y sin fuerzas
  - y debilitado
  lexicon: HALOT / LSJ
  rationale: La fuerza física o vital está en juego; «falto de fuerza» conserva la idea de disminución y suena natural en registro bíblico actual.
- source_word: איש כושל / περισπωμένῳ περὶ πάντων
  english_pob_choice: stumbling
  chosen_spanish: que tropieza en todo
  alternatives_spanish:
  - que tambalea en todo
  - que tropieza en todo momento
  lexicon: HALOT / LSJ
  rationale: El hebreo presenta la imagen de tropiezo y el griego amplía a alguien abrumado por todo. «Tropieza en todo» integra ambas perspectivas sin añadir excesos interpretativos.
- source_word: סורב / ἀπειθοῦντι
  english_pob_choice: stubborn
  chosen_spanish: obstinado
  alternatives_spanish:
  - rebelde
  - terco
  - desobediente
  lexicon: HALOT / LSJ
  rationale: La revisión inglesa prefirió «stubborn» por fidelidad al hebreo. «Obstinado» comunica resistencia persistente y mantiene un tono formal sin intensificar demasiado el juicio moral.
- source_word: ואובד תקוה / ἀπολωλεκότι ὑπομονήν
  english_pob_choice: and having lost hope
  chosen_spanish: y que ha perdido la esperanza
  alternatives_spanish:
  - y que ha perdido la paciencia
  - y sin esperanza
  lexicon: HALOT / LSJ
  rationale: El hebreo sostiene «esperanza», mientras el griego ofrece «aguante/paciencia». Se conserva la lectura base del hebreo y se deja la alternativa griega en nota.
theological_decisions:
- issue: La valoración de la muerte como «good/fitting»
  english_pob_reading: how fitting is your sentence
  chosen_spanish_reading: qué adecuado es tu decreto
  alternative_spanish_readings:
  - qué bueno es tu decreto
  - qué apropiado es tu juicio
  rationale: La formulación evita convertir el verso en una afirmación general de que la muerte sea moralmente buena. El punto es su conveniencia o ajuste respecto del hombre abatido, no una tesis ética sobre la muerte en sí.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Base hebrea con apoyo del griego en un pasaje textualmente inestable
  english_pob_reading: Main text follows the extant Hebrew structure and key terms, with Greek used to clarify obscure clauses and support the direct address to death.
  chosen_spanish_reading: La traducción principal sigue la línea hebrea conservada, pero deja que el griego ilumine la invocación y el sentido general del versículo.
  alternative_spanish_readings:
  - Una versión más griega incluiría descriptores adicionales como «muy viejo» o «ocupado en todo».
  - Una versión estrictamente hebrea sería más breve y menos explicativa.
  rationale: Sirácides presenta estabilidad desigual entre testigos. Aquí conviene conservar el núcleo hebreo y no perder la ayuda interpretativa del griego donde el hebreo es difícil.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach; use Greek parallel as input'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que sustituyó «defiant» por «stubborn» para reflejar mejor סורב. También conserva la preferencia por «having lost hope» del hebreo, dejando la alternativa griega en nota. El giro final se ajusta para sonar natural en español sin perder el paralelismo del original.
  spanish_consistency_notes:
  - Se usa «muerte» personificada en vocativo, no «Señor» ni una forma litúrgica sustituida.
  - «Decreto» se eligió para preservar el campo semántico de חק/κρίμα sin borrar la tensión entre estatuto y juicio.
  - «Obstinado» traduce סורב con un registro formal y evita una interpretación moralizante más fuerte que la del texto.
  - «Ha perdido la esperanza» mantiene el hebreo como línea principal y la alternativa griega queda explícita en nota.
  - 'La puntuación reproduce la acumulación del original: invocación, evaluación, descripción del hombre y cierre participial.'
