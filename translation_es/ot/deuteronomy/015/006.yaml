translation:
  language: es
  text: Porque Yahvé tu Dios te ha bendecido, tal como te prometió[a], y prestarás a muchas naciones, pero tú no pedirás prestado; gobernarás sobre muchas naciones, pero ellas no gobernarán sobre ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «te dijo» o «te habló». El hebreo dice literalmente «habló», pero en este contexto de pacto comunica la idea de promesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. En español, la forma propuesta por el proyecto es 'Yahvé', que preserva el nombre personal de Dios sin sustituirlo por un título.
- source_word: בֵּרַכְךָ
  english_pob_choice: has blessed you
  chosen_spanish: te ha bendecido
  alternatives_spanish:
  - te bendecirá
  - te bendijo
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una bendición ya concedida con efectos presentes. El presente perfecto en español comunica bien esa acción cumplida con परिणाम actual.
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  english_pob_choice: just as he promised you
  chosen_spanish: conforme a lo que te dijo
  alternatives_spanish:
  - tal como te prometió
  - así como te habló
  lexicon: HALOT
  rationale: '''Dijo'' conserva el sentido literal de דִּבֶּר. No se traduce aquí como ''prometió'' en el texto principal para no ocultar la forma verbal hebrea; la idea de promesa queda respaldada por el contexto y por la nota.'
- source_word: וְהַעֲבַטְתָּ
  english_pob_choice: you will lend
  chosen_spanish: prestarás
  alternatives_spanish:
  - harás préstamos a
  - darás en préstamo
  lexicon: HALOT
  rationale: El causativo de עבט aquí expresa la acción de prestar. 'Prestarás' es idiomático y conserva la fuerza económica de la cláusula.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  - muchas gentes
  lexicon: HALOT
  rationale: En este contexto político-económico, גּוֹיִם se refiere a entidades nacionales. 'Naciones' mantiene esa referencia mejor que 'pueblos'.
- source_word: לֹא תַעֲבֹט
  english_pob_choice: you will not borrow
  chosen_spanish: no pedirás prestado
  alternatives_spanish:
  - no tomarás prestado
  - no serás prestatario
  lexicon: HALOT
  rationale: Aunque el verbo puede traducirse de forma más literal como 'tomar prestado', 'pedir prestado' es natural en español y conserva la antítesis con 'prestarás'.
- source_word: וּמָשַׁלְתָּ
  english_pob_choice: you will rule over
  chosen_spanish: dominarás sobre
  alternatives_spanish:
  - gobernarás sobre
  - ejercerás dominio sobre
  lexicon: HALOT
  rationale: מָשַׁל implica gobierno/dominio. 'Dominarás sobre' refleja con claridad la relación de superioridad política sin suavizarla.
- source_word: וּבְךָ לֹא יִמְשֹׁלוּ
  english_pob_choice: they will not rule over you
  chosen_spanish: sobre ti no dominarán
  alternatives_spanish:
  - no reinarán sobre ti
  - no te gobernarán
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera mitad del versículo y la misma raíz verbal con un verbo español consistente. La inversión del orden mejora la fluidez en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre divino en transliteración, conforme al estándar del proyecto, en vez de enmascararlo con un título. Esto preserva la identidad del Dios del pacto en el versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de כַּאֲשֶׁר דִּבֶּר לָךְ
  english_pob_reading: just as he promised you
  chosen_spanish_reading: conforme a lo que te dijo
  alternative_spanish_readings:
  - tal como te prometió
  - como te habló
  rationale: La forma hebrea dice literalmente 'habló/dijo', pero el contexto de pacto le da el valor de promesa. El texto principal conserva la literalidad; la nota explica la implicación de promesa sin perder la tensión léxica.
  doctrine_reference: 'DOCTRINE.md: Lexical transparency in covenant promises'
translation_notes:
  revision_awareness: 'El contexto inglés del POB ya decidió ''has blessed you'' y leyó כַּאֲשֶׁר דִּבֶּר לָךְ como ''just as he promised you'', con nota de alternativa literal. El borrador español sigue esa lectura en forma transparente: conserva la literalidad de ''dijo'' en el cuerpo y explicita en nota que el sentido de promesa proviene del contexto pactual. No hay revisiones posteriores que alteren esa decisión.'
  spanish_consistency_notes:
  - 'Se mantiene la segunda persona singular en todo el versículo: ''te ha bendecido'', ''te dijo'', ''prestarás'', ''no pedirás prestado'', ''dominarás'', ''sobre ti''.'
  - Se conserva el paralelismo hebreo entre préstamo/dominio y su reverso con una cadencia natural en español.
  - '''Naciones'' se usa de forma consistente para גּוֹיִם, evitando ''pueblos'' para no diluir el matiz político del pasaje.'
