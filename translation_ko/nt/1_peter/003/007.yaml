id: 1PE.3.7
reference: 1 Peter 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἱ ἄνδρες ὁμοίως συνοικοῦντες κατὰ γνῶσιν, ὡς ἀσθενεστέρῳ σκεύει τῷ γυναικείῳ ἀπονέμοντες τιμήν, ὡς καὶ συγκληρονόμοις χάριτος ζωῆς, εἰς τὸ μὴ ἐγκόπτεσθαι τὰς προσευχὰς ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/007.yaml
  text: 'Likewise, husbands, living together with your wives according to knowledge, assigning honor to the woman as to a weaker vessel, as also fellow heirs of the grace of life, so that your prayers may not be hindered.'
translation:
  language: ko
  text: '남편 된 여러분도 마찬가지로 아는 바를 따라 아내와 함께 살되, 아내를 더 연약한 그릇[a]으로 여겨 존중을 돌리고, 또한 생명의 은혜의 공동 상속자로 여기십시오. 이는 여러분의 기도가 막히지 아니하게 하려는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「더 연약한 그릇」(ἀσθενέστερον σκεῦος)을 직역으로 보존한다. 해석은 다양하다: (1) 1세기 가내 환경에서 여성의 신체적·사회적 취약성을 가리킴; (2) 부서지기 쉬운 도자기의 비유로 모든 인간의 연약성을 가리키되 상대 비교; (3) 사회적 신분상 보호의 대상으로 여기라는 권면. 본문은 「존중」(τιμή)을 명령하고 곧바로 「공동 상속자」로 동등성을 천명하므로, 본문 자체가 이 어구를 단순한 열등 선언으로 읽지 않도록 균형 잡는다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνοικοῦντες κατὰ γνῶσιν
  english_pob_choice: living together with your wives according to knowledge
  chosen_korean: 아는 바를 따라 아내와 함께 살되
  alternatives_korean:
  - 분별 있게 함께 살며
  - 지혜로써 동거하며
  lexicon: BDAG
  rationale: κατὰ γνῶσιν의 「앎에 따라」를 「아는 바를 따라」로 옮기되, 막연한 「분별」보다 본문의 구체성을 살린다.
- source_word: ὡς ἀσθενεστέρῳ σκεύει τῷ γυναικείῳ
  english_pob_choice: as to a weaker vessel, to the woman
  chosen_korean: 아내를 더 연약한 그릇으로 여겨
  alternatives_korean:
  - 더 약한 그릇인 여자에게
  - 연약한 기물인 부인에게
  lexicon: BDAG
  rationale: 「더 연약한 그릇」을 직역으로 보존하고, 해석은 각주에 명시. 평이화하지 않는다.
- source_word: ἀπονέμοντες τιμήν
  english_pob_choice: assigning honor
  chosen_korean: 존중을 돌리고
  alternatives_korean:
  - 존경을 돌리며
  - 영광을 돌리며
  lexicon: BDAG
  rationale: 2:17과 어휘 일관성을 위해 τιμή를 「존중」으로 옮긴다.
- source_word: συγκληρονόμοις χάριτος ζωῆς
  english_pob_choice: fellow heirs of the grace of life
  chosen_korean: 생명의 은혜의 공동 상속자
  alternatives_korean:
  - 생명의 은혜를 함께 상속받는 자
  - 생명의 은총의 동료 상속인
  lexicon: BDAG
  rationale: σύν- 접두사의 「공동·함께」를 「공동 상속자」로 살린다. 일부 사본은 단수 συγκληρονόμοι(= 남편과 아내가 함께)로, 일부는 다른 격 변이를 보이나 의미는 동일.
theological_decisions:
- issue: 「더 연약한 그릇」 표현의 해석 부담
  chosen_reading: '직역으로 보존하되, 본문 자체의 균형(「존중」 + 「공동 상속자」)이 단순 열등 선언으로 읽히지 않게 함; 각주에 해석 옵션 명시'
  alternative_readings:
  - 「연약한」을 약화하거나 평이화
  - 「약한 자에게 더욱 존중을 돌리라」 식으로 풀어 해석을 박음
  rationale: 본문은 한편으로는 1세기 가내 환경의 여성의 상대적 취약성을 인정하면서, 동시에 「존중」을 명령하고 곧바로 「공동 상속자」로 동등성을 천명하는 이중 구조다. 어느 한쪽으로 기울이지 않고 본문 그대로 둔다. 해석 부담은 각주가 담당.
  doctrine_reference: 'DOCTRINE.md: 원어의 진실하고 강한 의미 보존; 미화·강화 회피; 신학적 긴장 보존'
- issue: 「생명의 은혜의 공동 상속자」가 단락 끝에서 동등성을 천명
  chosen_reading: '「공동」(σύν-)을 분명히 살려 동등 상속을 강조'
  alternative_readings:
  - 「함께」 정도로 약화
  rationale: σύν- 접두사는 본문의 핵심 신학을 담는다. 동등 상속을 분명히 한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선'
