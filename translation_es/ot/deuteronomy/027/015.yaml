base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/027/015.yaml
  text: Cursed is the man who makes a carved image or a cast image—an abomination to Yahweh[a], the work of the hands of a craftsman—and sets it up in secret. And all the people shall answer and say[b], “Amen.”
  footnotes:
  - marker: a
    text: Or 'a molten image.' The Hebrew term refers to an image made by casting, often in metal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the man'; the masculine singular here functions as a representative legal formula.
    reason: lexical_alternative
