translation:
  language: es
  text: Así que sus hermanos le tuvieron envidia, pero su padre guardó este asunto en mente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guardó la palabra» o «guardó el dicho», es decir, conservó el informe de José en su mente y siguió considerándolo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַנְאוּ
  english_pob_choice: were jealous
  chosen_spanish: le tuvieron envidia
  alternatives_spanish:
  - estuvieron celosos de él
  - lo envidiaron
  lexicon: HALOT
  rationale: קנא aquí expresa la reacción emocional de rivalidad/resentimiento provocada por José; en español, «tener envidia» comunica bien esa relación sin sonar arcaico ni demasiado interpretativo. Se evita «celosos» por posible ambigüedad afectiva y «lo envidiaron» por sonar menos natural en este contexto narrativo.
- source_word: בּוֹ
  english_pob_choice: of him
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - contra él
  lexicon: HALOT
  rationale: En español, el dativo de interés «le» reproduce de forma natural el objeto de la envidia sin forzar una preposición menos idiomática. La relación semántica sigue siendo la de envidia dirigida a José.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural y se refiere a los hermanos de José en la narración. «Sus hermanos» es claro y fiel; no se amplía a formulaciones inclusivas que el texto no respalda.
- source_word: וְאָבִיו
  english_pob_choice: but his father
  chosen_spanish: pero su padre
  alternatives_spanish:
  - y su padre
  lexicon: HALOT
  rationale: Aunque la conjunción hebrea es פשוט «y», el contraste discursivo con la primera cláusula se expresa mejor en español con «pero», como en la lectura auditada en inglés. Mantiene la oposición entre la reacción de los hermanos y la respuesta reflexiva del padre.
- source_word: שָׁמַר
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - conservó
  - mantuvo
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, conservar o vigilar. Aquí, con «el asunto», el verbo expresa retener atentamente el contenido; «guardó» conserva esa idea de custodia mental sin añadir explicaciones excesivas.
- source_word: אֶת הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la palabra
  - el dicho
  - la cosa
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «dicho», «asunto» o «cosa». En este contexto alude al contenido y peso de lo dicho/soñado por José; «el asunto» es una forma natural en español que abarca ese alcance sin estrecharlo demasiado.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto hebreo y el audit trail inglés; no se registran revisiones aplicadas en la última pasada, por lo que el borrador español mantiene la misma estructura de contraste y la misma ambigüedad léxica controlada de דָּבָר mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una alusión directa que requiera esa decisión.
  - Se evita «Cristo/Mesías» porque no aparece lenguaje mesiánico en este versículo.
  - La puntuación y el orden de cláusulas siguen la distribución narrativa del hebreo y de la traducción inglesa auditada, con contraste explícito en español.
