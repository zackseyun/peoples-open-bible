translation:
  language: es
  text: Yah[a] ciertamente me disciplinó, pero no me entregó a la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Yahvé”. El hebreo usa la forma poética breve del nombre divino, “Yah”, no la forma plena.'
