translation:
  language: es
  text: para que te teman y anden en tus caminos todos los días que vivan sobre la tierra que diste a nuestros padres[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘te reverencien’ o ‘estén en asombro reverente ante ti’. El hebreo ‘temer’ incluye reverencia expresada en obediencia.
    reason: lexical_alternative
  - marker: b
    text: O ‘mientras vivan sobre la tierra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor final/purposivo del hebreo sin añadir contenido ajeno.
- source_word: יִירָאוּךָ
  english_pob_choice: they may fear you
  chosen_spanish: te teman
  alternatives_spanish:
  - te reverencien
  - te tengan reverencia
  - te teman reverentemente
  lexicon: HALOT
  rationale: En español, 'temer' conserva mejor la fuerza bíblica del hebreo ירא que una paráfrasis más suave. El contexto del paralelismo con 'anden en tus caminos' aclara que se trata de temor reverente expresado en obediencia.
- source_word: לָלֶכֶת
  english_pob_choice: and walk
  chosen_spanish: y anden
  alternatives_spanish:
  - y caminen
  - y vayan
  lexicon: HALOT
  rationale: El infinitivo hebreo funciona aquí como continuación de la conducta debida; 'anden' mantiene la metáfora bíblica de conducta y suena natural en español.
- source_word: בִּדְרָכֶיךָ
  english_pob_choice: in your ways
  chosen_spanish: en tus caminos
  alternatives_spanish:
  - según tus caminos
  - por tus caminos
  lexicon: HALOT
  rationale: '''Caminos'' reproduce el modismo hebreo de conducta prescrita por Dios y evita una explicación excesiva.'
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - siempre
  - todos sus días
  lexicon: HALOT
  rationale: Conserva la expresión concreta del hebreo sin diluirla en un adverbio abstracto.
- source_word: אֲשֶׁר הֵם חַיִּים
  english_pob_choice: that they live
  chosen_spanish: que vivan
  alternatives_spanish:
  - mientras vivan
  - mientras estén vivos
  lexicon: HALOT
  rationale: El subjuntivo en la subordinada relativa expresa de forma natural la duración condicionada por la vida; mantiene el matiz temporal del hebreo.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the land
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la faz del suelo
  - en la tierra
  lexicon: HALOT
  rationale: La imagen hebrea de 'faz' se puede reproducir dignamente en español. 'Tierra' permite una formulación más idiomática que 'land' sin perder la referencia geográfica/covenantal.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En este contexto, el referente es la tierra dada a los antepasados; 'tierra' es más natural en español y suficientemente preciso sin sobreexplicar.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבֹתֵינוּ
  english_pob_choice: that you gave to our fathers
  chosen_spanish: que diste a nuestros padres
  alternatives_spanish:
  - que has dado a nuestros padres
  - que otorgaste a nuestros padres
  lexicon: HALOT
  rationale: '''Nuestros padres'' mantiene el lenguaje pactal y ancestral del texto; ''diste'' refleja el don ya concedido desde la perspectiva de la oración.'
theological_decisions:
- issue: Renderizado de ירא con su fuerza reverente y obediencial
  english_pob_reading: Retain 'fear you' in the main text, with the sense of reverent covenantal fear expressed through obedience.
  chosen_spanish_reading: te teman
  alternative_spanish_readings:
  - te reverencien
  - te tengan reverencia
  rationale: '''Temer'' conserva el peso teológico del verbo hebreo y no atenúa la dimensión de obediencia reverente. La coordinación con ''anden en tus caminos'' evita entenderlo como mero pánico.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de הָאֲדָמָה en el marco del pacto
  english_pob_reading: Translate as 'the land' rather than 'the earth.'
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra prometida
  rationale: El texto identifica la tierra como la que Dios dio a los padres; 'la tierra' comunica con naturalidad el ámbito pactal sin universalizar indebidamente el referente.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés al preferir una coordinación verbal natural ('y anden') frente a una construcción demasiado literal del infinitivo, pero conserva la imagen hebrea de conducta continua y el cierre pactal sobre la tierra dada a los padres.
  spanish_consistency_notes:
  - Se mantiene 'padres' como equivalente de 'fathers' en sentido pactal, coherente con el registro bíblico del texto.
  - '''Tierra'' se usa para הָאֲדָמָה por el contexto de heredad dada, evitando ''mundo'' o ''tierra'' con sentido genérico no requerido.'
  - La puntuación conserva una sola oración final de propósito, adecuada para lectura pública en español.
