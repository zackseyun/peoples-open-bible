    text: O «que entendían los tiempos», es decir, hombres expertos en discernir la ocasión o el procedimiento apropiados.
    reason: lexical_alternative
  - marker: b
    text: O «porque así era el asunto/costumbre del rey ante todos los que conocían la ley y el juicio». El hebreo es algo comprimido.
    reason: alternative_reading
  revision_rationale: Se ajusta 'juicio' a 'justicia' en el texto principal para seguir mejor la decisión auditada final del inglés y mejorar la naturalidad del español en esta pareja jurídica. Se conserva 'juicio' en la nota como alternativa más literal para דִּין, junto con la observación de que el hebreo es comprimido.
