review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés en la mayoría de los puntos: Amasá está en la sangre en medio de la calzada; la gente se detiene; el hombre lo aparta al campo y lo cubre. Sin embargo, hay dos desajustes importantes con el sentido documentado: «pasaban junto a él» debilita כָּל הַבָּא עָלָיו, que se refiere a los que llegaban al lugar y se topaban con él, no simplemente a transeúntes que ya iban junto a él; y «un vestido» para בֶּגֶד suena demasiado específico en español moderno, casi como una prenda femenina, mientras el hebreo es genérico.'
  spanish_quality_summary: El texto es generalmente claro y legible, con tono digno. «Yacía revolcándose» es comprensible, aunque algo pesado; aun así, conserva bien la imagen. «Calzada» funciona bien. Las mejoras necesarias son principalmente léxicas para evitar ambigüedad o especificidad impropia en español actual.
  glossary_alignment: No hay términos teológicos mayores en este versículo. Las decisiones léxicas principales son en general coherentes con el proyecto. Conviene ajustar בֶּגֶד a «una prenda» y כָּל הַבָּא עָלָיו a una formulación como «todo el que llegaba hasta él» o «todo el que se topaba con él», más alineada con la decisión inglesa documentada.
  issues:
  - severity: medium
    issue: «un vestido» para בֶּגֶד
    rationale: Aunque «vestido» puede aparecer en registro bíblico, en español actual suele entenderse como una prenda específica, normalmente femenina. El hebreo בֶּגֶד es genérico; «una prenda» o «una ropa» evita una especificación no presente en el texto.
  - severity: medium
    issue: «todos los que pasaban junto a él» para כָּל הַבָּא עָלָיו
    rationale: La expresión hebrea y la decisión inglesa apuntan a quienes llegaban a la escena y se topaban con Amasá, no meramente a quienes pasaban a su lado. «Pasaban junto a él» puede sugerir movimiento continuo, cuando el punto es que al encontrarlo se detenían.
  revised_spanish_text: Y Amasá yacía revolcándose en la sangre, en medio de la calzada. Cuando el hombre vio que todo el pueblo se detenía, apartó a Amasá de la calzada al campo, y echó sobre él una prenda, porque vio que todo el que llegaba hasta él se detenía.
  revision_rationale: 'Se ajustan dos puntos léxicos para mayor fidelidad y naturalidad en español actual: «una prenda» refleja mejor el sentido general de בֶּגֶד, y «todo el que llegaba hasta él» expresa mejor el encuentro con Amasá en el camino que el original hebreo describe. El resto del borrador se conserva por ser fiel, claro y estilísticamente adecuado.'
