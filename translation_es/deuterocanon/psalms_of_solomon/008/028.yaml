review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: sujeto coordinado, imagen de ''corderos'', sustantivo ''inocencia'' y la frase espacial ''en medio de ellos''. Sin embargo, no sigue del todo el rastro auditado del POB ni la decisión léxica más cercana para ὅσιοι. Dado el historial de revisión contradictorio, ''devotos'' es posible, pero se aparta del inglés POB vigente (''holy ones'') y de la nota de alternativa. En español, ''los santos de Dios'' preserva mejor la fuerza cultual/religiosa del griego sin perder legibilidad.'
  spanish_quality_summary: 'La frase es legible y natural en general. ''En inocencia en medio de ellos'' suena algo rígido, pero sigue siendo aceptable y bastante literal. El principal ajuste necesario es terminológico: ''devotos'' estrecha ὅσιοι hacia piedad subjetiva más que hacia condición consagrada/piadosa. ''Santos'' aquí es claro y digno en español eclesial general.'
  glossary_alignment: No hay conflicto con la glosa principal del proyecto salvo la elección de ὅσιοι. Aunque el expediente inglés muestra debate entre 'faithful ones' y 'holy ones', el texto POB auditado vigente usa 'holy ones'. Para corresponder fielmente, el español debe preferir 'santos', pudiendo reservar 'devotos' o 'piadosos' como alternativa en nota. Los demás términos ('Dios', 'corderos', 'inocencia') están alineados.
  issues:
  - severity: medium
    issue: ὅσιοι se tradujo como 'devotos' en vez de reflejar la elección auditada vigente 'holy ones'.
    rationale: '''Devotos'' expresa piedad, pero reduce el matiz de consagración/carácter santo presente en ὅσιοι y se aleja del texto inglés POB actualmente aprobado.'
  - severity: low
    issue: Faltan notas al pie para alternativas significativas preservadas en el expediente inglés.
    rationale: El POB inglés conserva alternativas léxicas relevantes para ὅσιοι y ἐν μέσῳ αὐτῶν. En español conviene mantener al menos la alternativa principal para ὅσιοι y la variante espacial, ya que ambas siguen siendo plausibles y útiles.
  revised_spanish_text: Y los santos[a] de Dios eran como corderos en inocencia en medio de ellos[b].
  revised_footnotes:
  - marker: a
    text: O 'los devotos de Dios' o 'los piadosos de Dios'.
    reason: lexical_alternative
  - marker: b
    text: O 'entre ellos'.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'devotos' por 'santos' para ajustarse a la elección auditada vigente del POB ('holy ones') y preservar mejor la fuerza religiosa de ὅσιοι. Se mantienen 'corderos', 'en inocencia' y 'en medio de ellos' por su fidelidad al griego y buena legibilidad. Se añaden notas mínimas para conservar alternativas significativas del expediente inglés sin sobrecargar el texto.
