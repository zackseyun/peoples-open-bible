    issue: 'Cláusula relativa antinatural: ''a las cuales yo los había expulsado allí'''
    rationale: El hebreo אֲשֶׁר הִדַּחְתִּים שָׁם significa 'donde/adonde yo los había expulsado'. La redacción actual duplica la idea locativa con 'a las cuales' + 'allí' y produce una construcción extraña en español.
  - severity: medium
    issue: Preposición final 'sobre su propio suelo'
    rationale: Aunque reproduce literalmente עַל, en español la restauración territorial suena más natural con 'en su propio suelo' sin perder el contraste con 'tierras'. 'Sobre' puede sonar físico o rígido.
  - severity: low
    issue: Signos de exclamación en la fórmula juramentaria
    rationale: '''¡Vive Yahvé!'' es entendible, pero dentro de la cita profética fluye mejor sin exclamación: ''Vive Yahvé'', manteniendo solemnidad sin dramatización añadida.'
