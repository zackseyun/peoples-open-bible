translation:
  language: es
  text: Traigan consejo[a]; tomen una decisión. Haz[b] tu sombra como la noche en medio del mediodía[c]; esconde a los desterrados; no reveles al fugitivo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hagan justicia», «dicten juicio» o «den arbitraje» para «tomen una decisión». El sustantivo hebreo tiene matiz legal/judicial.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa aquí a imperativos femeninos singulares, probablemente dirigidos a una entidad personificada.
    reason: grammatical_note
  - marker: c
    text: «Tu sombra» también puede traducirse «tu sombra protectora» o «tu sombra/tu resguardo».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «no reveles» o «no expongas» al fugitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הביאו
  english_pob_choice: Bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Lleven
  - Presenten
  lexicon: HALOT
  rationale: El imperativo causativo plural pide una acción de traer o presentar; «Traigan» conserva la fuerza exhortativa y funciona de modo natural en español.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - asesoría
  - plan
  lexicon: HALOT
  rationale: «Consejo» preserva el tono formal de deliberación política y el valor de orientación prudente del sustantivo.
- source_word: עֲשׂוּ
  english_pob_choice: make
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan una
  - realicen
  lexicon: HALOT
  rationale: El verbo básico de hacer con un sustantivo abstracto se vierte de forma natural como «hagan»; en español mantiene la relación con el sustantivo siguiente sin forzar un calco.
- source_word: פְלִילָה
  english_pob_choice: a decision
  chosen_spanish: una decisión
  alternatives_spanish:
  - justicia
  - juicio
  - arbitraje
  lexicon: HALOT
  rationale: El término tiene matiz judicial y de arbitraje. «Una decisión» es claro en español moderno y conserva el sentido jurídico sin eliminar las alternativas documentadas.
- source_word: שִׁיתִי
  english_pob_choice: Make
  chosen_spanish: Pongan
  alternatives_spanish:
  - Pongan allí
  - Coloquen
  lexicon: HALOT
  rationale: La forma femenina singular del hebreo se dirige a la figura personificada del interlocutor; en español se opta por una exhortación plural impersonalmente apropiada al sujeto colectivo implícito, manteniendo la imagen de colocar la sombra.
- source_word: כַ/לַּיִל
  english_pob_choice: like the night
  chosen_spanish: como la noche
  alternatives_spanish:
  - igual que la noche
  - cual noche
  lexicon: HALOT
  rationale: La comparación directa se expresa de manera simple y fiel con «como la noche».
- source_word: צִלֵּךְ
  english_pob_choice: your shadow
  chosen_spanish: su sombra
  alternatives_spanish:
  - su sombra
  - su sombra protectora
  lexicon: HALOT
  rationale: «Sombra» conserva la metáfora; el posesivo de cortesía/impersonal en español evita una redundancia pronominal y mantiene el referente implícito del hebreo.
- source_word: בְּתוֹךְ צָהֳרָיִם
  english_pob_choice: in the midst of noon
  chosen_spanish: en medio del mediodía
  alternatives_spanish:
  - al mediodía
  - en pleno mediodía
  lexicon: HALOT
  rationale: «En medio del mediodía» reproduce la intensidad de la imagen hebrea con registro natural y conserva la oposición noche/mediodía.
- source_word: סַתְּרִי
  english_pob_choice: hide
  chosen_spanish: oculten
  alternatives_spanish:
  - escondan
  - refügien
  lexicon: HALOT
  rationale: El imperativo de ocultar comunica la acción protectora requerida; «oculten» es claro y algo más formal que «escondan».
- source_word: נִדָּחִים
  english_pob_choice: the outcasts
  chosen_spanish: a los expulsados
  alternatives_spanish:
  - a los desterrados
  - a los dispersos
  lexicon: HALOT
  rationale: El participio pasivo sugiere personas echadas fuera o arrojadas. «Expulsados» conserva la fuerza del desplazamiento forzado sin añadir matices eclesiásticos a «desterrados».
- source_word: נֹדֵד
  english_pob_choice: the fugitive
  chosen_spanish: al fugitivo
  alternatives_spanish:
  - al que huye
  - al errante
  lexicon: HALOT
  rationale: En paralelo con el mandato de no revelar, «fugitivo» expresa a quien huye y necesita ocultamiento, tal como en la auditoría inglesa.
- source_word: אַל תְּגַלִּי
  english_pob_choice: do not reveal
  chosen_spanish: no revelen
  alternatives_spanish:
  - no descubran
  - no expongan
  lexicon: HALOT
  rationale: Se mantiene la equivalencia léxica directa con el hebreo y con la revisión inglesa más reciente, evitando cargar el sentido con «traicionar».
theological_decisions:
- issue: Imagen de refugio y ocultamiento protector en medio de la crisis
  english_pob_reading: Make your shadow like the night in the midst of noon; hide the outcasts; do not reveal the fugitive.
  chosen_spanish_reading: Pongan su sombra como la noche en medio del mediodía; oculten a los expulsados; no revelen al fugitivo.
  alternative_spanish_readings:
  - Pongan su sombra como la noche en plena luz del día; escondan a los desterrados; no descubran al fugitivo.
  - Hagan de su sombra como la noche al mediodía; refugien a los expulsados; no expongan al fugitivo.
  rationale: El pasaje usa imágenes de amparo y secreto para proteger a personas perseguidas. La redacción española conserva la tensión poética entre noche y mediodía sin suavizar el mandato de ocultar y no revelar.
  doctrine_reference: Ética de hospitalidad y protección del vulnerable; no se formula una doctrina explícita, sino una exhortación política y moral en el contexto profético.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «in the middle of noon» por «in the midst of noon» para un registro más formal y ajustó «do not betray» a «do not reveal» por mayor precisión léxica. La redacción española sigue esa revisión con «en medio del mediodía» y «no revelen», evitando sobreinterpretar el verbo final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se mantuvo «sombra» y no «sombra/abrigo» para conservar la imagen poética básica, dejando una nota de alternativa.
  - «Expulsados» traduce el valor pasivo de נִדָּחִים sin introducir terminología eclesiástica.
  - La coordinación verbal mantiene imperativos plurales en español para un mandato colectivo fluido y publicable.
