translation_notes:
  revision_awareness: El audit trail inglés mantiene la forma sintáctica 'Azel had six sons' y la revisión reciente solo ajustó la aposición de 'Azrikam his firstborn'. La versión española sigue esa estructura, conservando la aposición sin coma y sin introducir cambios semánticos adicionales.
  spanish_consistency_notes:
  - Se usa 'Azel' de manera uniforme para אָצֵל/אָצַל.
  - Se mantiene la estructura genealógica simple y directa del hebreo.
  - Se prefieren formas españolas reconocibles para nombres propios cuando existen usos tradicionales claros (Ismael, Obadías, Hanán).
  - La nota al pie preserva la alternativa literal documentada por el texto inglés auditado.
