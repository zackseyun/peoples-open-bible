translation:
  language: es
  text: De su cámara viene la tormenta[a], y de los vientos dispersores viene el frío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Del sur viene la tormenta»; el hebreo dice literalmente «de la cámara», lo que puede ser una referencia poética a un lugar oculto de donde sale la tormenta o a un sector meridional.'
    reason: alternative_reading
  - marker: b
    text: 'O: «del norte viene el frío», o «de los vientos dispersores viene el frío»; el término hebreo es raro y su sentido preciso es incierto.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִן הַחֶדֶר
  english_pob_choice: From its chamber
  chosen_spanish: Desde su cámara
  alternatives_spanish:
  - Desde la cámara
  - Desde la habitación interior
  - Desde el sur
  lexicon: HALOT
  rationale: חֶדֶר significa literalmente “cuarto, cámara, habitación interior”. En este contexto poético meteorológico, la imagen puede aludir al lugar oculto de donde sale la tormenta; por eso se conserva la metáfora con “su cámara”. Se evita fijar “sur” en el texto principal porque, aunque es una lectura interpretativa posible, no es el valor léxico directo de la forma hebrea.
- source_word: תָּבוֹא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - sale
  lexicon: HALOT
  rationale: El verbo בוא expresa venir, entrar o llegar. “Viene” reproduce con naturalidad el movimiento poético del hebreo y encaja bien con el sujeto “la tormenta”.
- source_word: סוּפָה
  english_pob_choice: the storm
  chosen_spanish: la tormenta
  alternatives_spanish:
  - el torbellino
  - la tempestad
  lexicon: HALOT
  rationale: סוּפָה designa una tormenta violenta, tempestad o torbellino. “Tormenta” es la opción más amplia y clara en español, y funciona bien en el paralelismo del versículo.
- source_word: וּמִמְּזָרִים
  english_pob_choice: from the scattering winds
  chosen_spanish: de los vientos dispersores
  alternatives_spanish:
  - del norte
  - de los vientos dispersos
  - de las constelaciones
  lexicon: HALOT
  rationale: מְזָרִים es una voz rara y debatida. La POB inglesa prefirió una lectura transparente ligada a “dispersar”. En español, “vientos dispersores” conserva esa relación léxica sin forzar la interpretación direccional; se deja abierta la alternativa “del norte” en nota.
- source_word: קָרָה
  english_pob_choice: cold
  chosen_spanish: el frío
  alternatives_spanish:
  - la helada
  - el frío intenso
  - el hielo
  lexicon: HALOT
  rationale: קָרָה puede referirse a frío, helada o tiempo gélido. “El frío” es natural en español, conciso y adecuado al paralelismo con “la tormenta”.
translation_notes:
  revision_awareness: La frase final repone explícitamente el verbo de movimiento con “viene” antes de “el frío”, siguiendo la revisión del texto inglés que añadió “comes” para completar el paralelismo hebreo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el nombre divino cuando aparezca; aquí no aparece.
  - Se evita “SEÑOR” como sustituto no presente en el hebreo.
  - Se conserva la imagen poética de procedencia (“desde su cámara”) sin convertirla en una paráfrasis explicativa en el cuerpo principal.
  - La rareza de מְזָרִים se refleja con una traducción transparente y con nota alternativa, en lugar de cerrar prematuramente el sentido.
