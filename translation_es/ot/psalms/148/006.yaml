translation:
  language: es
  text: Y los estableció para siempre y jamás; dio un decreto[a], y no pasará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dio un decreto, y no van más allá de él», o «nadie va más allá de él». El hebreo de la cláusula final es ambiguo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמִידֵם
  english_pob_choice: he established them
  chosen_spanish: los estableció
  alternatives_spanish:
  - los puso en su lugar
  - los hizo permanecer
  lexicon: HALOT
  rationale: El hifil de עמד expresa hacer que algo permanezca o quede firme. «Estableció» comunica bien la fijación y estabilidad cósmica sin volverse mecánico.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para perpetuidad
  lexicon: HALOT
  rationale: La expresión señala duración continua; «para siempre» es natural en español y conserva la idea de permanencia.
- source_word: לְעוֹלָם
  english_pob_choice: and ever
  chosen_spanish: y jamás
  alternatives_spanish:
  - y para siempre
  - y por los siglos
  lexicon: HALOT
  rationale: Junto con לָעַד, intensifica la duración. «Y jamás» reproduce esa intensificación de forma idiomática en español y evita una repetición plana.
- source_word: חָק
  english_pob_choice: a decree
  chosen_spanish: un decreto
  alternatives_spanish:
  - un estatuto
  - una ordenanza
  - un orden fijado
  lexicon: HALOT
  rationale: En este contexto de creación, «decreto» comunica una orden establecida por Dios. Mantiene el valor normativo sin forzar un tecnicismo jurídico.
- source_word: נָתַן
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - lo dio
  - lo estableció
  lexicon: HALOT
  rationale: El verbo común «dar» se conserva de manera directa. El pronombre se ajusta al español según el antecedente implícito de los cielos/astros mencionados en el contexto inmediato.
- source_word: וְלֹא יַעֲבֹר
  english_pob_choice: and it will not pass away
  chosen_spanish: y no pasará
  alternatives_spanish:
  - y no pasará de largo
  - y no será traspasado
  - y no lo quebrantarán
  lexicon: HALOT
  rationale: 'El hebreo permite ambigüedad sobre el sujeto: el decreto puede no «pasar», o las criaturas no pasar más allá de él. «Y no pasará» preserva la permanencia del decreto y deja abierta la tensión sintáctica.'
theological_decisions:
- issue: Ambigüedad del sujeto en la cláusula final
  english_pob_reading: 'The clause refers to the decree/order itself as enduring: ''it will not pass away.'''
  chosen_spanish_reading: 'La cláusula se lee principalmente como una afirmación de la permanencia del decreto: «y no pasará».'
  alternative_spanish_readings:
  - 'Las criaturas no traspasan el decreto: «y no pasan más allá de él».'
  - Nadie pasa más allá de él.
  rationale: El hebreo admite varias construcciones porque el verbo es singular y el objeto no se expresa. En el contexto del salmo, la idea central es la firmeza del orden establecido por Dios; la traducción española conserva esa tensión sin resolverla por completo.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica antes que cerrarla artificialmente.'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés; no se requieren revisiones adicionales. Se conservó la ambigüedad final del hebreo mediante una formulación española breve y una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera explícitamente; aquí no aparece el nombre divino.
  - «Estableció» mantiene el valor causativo del hifil de עמד sin añadir matices doctrinales.
  - La doble expresión temporal se reprodujo con un binomio español natural («para siempre y jamás») para reflejar la intensificación hebrea.
  - Se evitó «SEÑOR» como sustituto editorial, porque el versículo no contiene el tetragrámaton.
