    issue: La nota [b] está anclada al final de la oración en vez de junto a 'un millón'.
    rationale: La nota b explica el hebreo literal 'mil millares' para אֶלֶף אֲלָפִים, así que debe aparecer donde se traduce esa cantidad, no junto a la cláusula final sobre añadir.
  - severity: medium
    issue: '''porque era en abundancia'' es poco natural en español.'
    rationale: Aunque calca de cerca el inglés auditado, en español bíblico natural suena mejor 'porque había en abundancia' o 'porque era abundante'. La primera conserva mejor la explicación causal de una gran cantidad presente.
  - severity: medium
    issue: '''y tú puedes añadir a ellas'' es gramaticalmente torpe.'
    rationale: En español natural, el complemento pronominal se expresa mejor como 'añadirles' o con objeto explícito 'añadir más'. 'A ellas' suena forzado y no añade claridad.
  - severity: low
    issue: La nota [c] usa 'y tú añadirás a ellas', también poco idiomático.
    rationale: 'Si se conserva la alternativa más imperativa/futura, debe formularse naturalmente: ''y tú les añadirás'' o ''y tú añadirás a estas cosas''.'
