translation:
  language: es
  text: No buscarás su paz ni su prosperidad todos tus días para siempre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: תִדְרֹשׁ
  english_pob_choice: seek
  chosen_spanish: buscarás
  alternatives_spanish:
  - buscar
  - indagar
  - procurar
  lexicon: HALOT
  rationale: דרש puede significar 'buscar' o 'indagar'. En una prohibición con objetos abstractos como 'su paz' y 'su prosperidad', 'buscar' suena natural en español y conserva el valor de dirigir la intención hacia algo.
- source_word: שְׁלֹמָם
  english_pob_choice: their peace
  chosen_spanish: su paz
  alternatives_spanish:
  - su bienestar
  - su bienestar integral
  - su tranquilidad
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. 'Paz' preserva el término hebreo con claridad y mantiene la distinción frente al segundo sustantivo.
- source_word: טֹבָתָם
  english_pob_choice: their prosperity
  chosen_spanish: su prosperidad
  alternatives_spanish:
  - su bien
  - su bienestar
  - su beneficio
  lexicon: HALOT
  rationale: טוֹבָה aquí apunta a bien, provecho o condición favorable. 'Prosperidad' distingue bien este segundo miembro y refleja una condición de florecimiento, como en la opción inglesa de la POB.
- source_word: כָּל יָמֶיךָ
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - todos los días de tu vida
  - mientras vivas
  lexicon: HALOT
  rationale: Es una correspondencia directa y idiomática en español, manteniendo el segundo singular y el alcance de duración expresado en hebreo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: עוֹלָם intensifica la duración de la prohibición. 'Para siempre' es claro, solemne y conserva el énfasis durativo sin suavizarlo.
theological_decisions:
- issue: Posible redundancia entre 'todos tus días' y 'para siempre'
  english_pob_reading: Retain both expressions in translation
  chosen_spanish_reading: 'Conservar ambas expresiones: ''todos tus días, para siempre'''
  alternative_spanish_readings:
  - Reducir a 'mientras vivas'
  - Omitir una de las dos expresiones por estilo
  rationale: El hebreo acumula כָּל יָמֶיךָ y לְעוֹלָם para intensificar la duración. Mantener ambas frases evita suavizar el énfasis deliberado del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: The English audit trail retains both temporal expressions and revises punctuation to read smoothly ('all your days forever'). The Spanish draft likewise preserves both durations, using natural Spanish punctuation to reflect the uninterrupted force of the Hebrew sequence.
  spanish_consistency_notes:
  - Se usó 'paz' y 'prosperidad' para conservar la distinción entre שָׁלוֹם y טוֹבָה.
  - Se mantuvo el paralelismo de dos miembros abstractos sin diluirlos en una sola idea.
  - La puntuación evita una pausa fuerte antes de 'para siempre' para reflejar la continuidad del hebreo y del ajuste final en inglés.
