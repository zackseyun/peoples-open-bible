translation:
  language: es
  text: 'Por eso se retuvieron las lluvias[a], y no hubo lluvias de primavera[b]; pero tuviste la frente de una prostituta: te negaste a avergonzarte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los aguaceros» o «las lluvias abundantes». El hebreo se refiere a lluvias o chaparrones, probablemente las lluvias más fuertes en general.
    reason: lexical_alternative
  - marker: b
    text: O «la lluvia tardía». El término hebreo se refiere a la lluvia tardía de la estación agrícola, aquí expresada como «lluvias de primavera» para mayor claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּנְעוּ
  english_pob_choice: were withheld
  chosen_spanish: fueron retenidas
  alternatives_spanish:
  - fueron detenidas
  - fueron contenidas
  lexicon: HALOT
  rationale: 'El nifal de מנע expresa pasividad: la lluvia fue impedida o retenida. «Fueron retenidas» conserva la idea de acción ejercida sobre las lluvias y suena natural en español.'
- source_word: רְבִבִים
  english_pob_choice: showers
  chosen_spanish: las lluvias
  alternatives_spanish:
  - los chaparrones
  - las lluvias abundantes
  lexicon: HALOT
  rationale: El término alude a lluvias fuertes o abundantes. «Lluvias» en plural conserva el valor colectivo sin forzar una imagen demasiado técnica.
- source_word: מַלְקוֹשׁ
  english_pob_choice: spring rain
  chosen_spanish: lluvia tardía
  alternatives_spanish:
  - lluvia de primavera
  - lluvia postrera
  lexicon: HALOT
  rationale: El hebreo designa la lluvia tardía de la temporada agrícola. Se prefiere «lluvia tardía» porque refleja mejor el valor literal de la expresión y evita una posible restricción estacional demasiado moderna como «primavera».
- source_word: מֵצַח
  english_pob_choice: forehead
  chosen_spanish: la frente
  alternatives_spanish:
  - el entrecejo
  - la testa
  lexicon: HALOT
  rationale: El sustantivo denota literalmente la frente. Mantener «la frente» conserva la imagen metafórica de descaro o desvergüenza.
- source_word: אִשָּׁה זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una meretriz
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente «una mujer prostituta». «Una prostituta» es claro, sobrio y fiel; evita arcaísmos o vulgaridad innecesaria.
- source_word: הָיָה לָךְ
  english_pob_choice: you had
  chosen_spanish: tuviste
  alternatives_spanish:
  - tenías
  - era para ti
  lexicon: HALOT
  rationale: 'El giro expresa posesión o asignación de una cualidad: «tuviste la frente de una prostituta». «Tuviste» conserva el enlace idiomático sin volverlo demasiado explicativo.'
- source_word: מֵאַנְתְּ
  english_pob_choice: you refused
  chosen_spanish: te rehusaste
  alternatives_spanish:
  - te negaste
  - no quisiste
  lexicon: HALOT
  rationale: מאן comunica rechazo deliberado. «Te rehusaste» mantiene la fuerza volitiva y suena natural en un registro bíblico moderno.
- source_word: הִכָּלֵם
  english_pob_choice: to be ashamed
  chosen_spanish: a avergonzarte
  alternatives_spanish:
  - a sentir vergüenza
  - a humillarte
  lexicon: HALOT
  rationale: El infinitivo expresa experimentar vergüenza. En español, «avergonzarte» comunica bien el sentido reflexivo y mantiene la tensión moral del reproche.
theological_decisions:
- issue: Metáfora sexual de infidelidad del pacto
  english_pob_reading: Retain the sexualized metaphor directly ('forehead of a prostitute') rather than soften it into a generalized statement about stubbornness.
  chosen_spanish_reading: Conservar directamente la metáfora sexual («la frente de una prostituta») en vez de suavizarla a una idea general de terquedad o descaro.
  alternative_spanish_readings:
  - Eras descarada
  - Eras impúdica
  - Tenías un rostro insolente
  rationale: Jeremías usa intencionalmente el lenguaje de prostitución para describir la infidelidad de Judá. Mantener la imagen conserva la fuerza profética y la conexión teológica entre idolatría y adulterio espiritual.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica en vez de resolverla en una paráfrasis.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente y el audit trail en inglés. Se adopta «lluvia tardía» para מַלְקוֹשׁ, en lugar de una paráfrasis estacional más libre, y se conserva el carácter crudo de la metáfora sexual sin atenuarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar cuando aparezca el nombre divino en el contexto mayor; en este versículo no ocurre.
  - Se mantuvo un español bíblico moderno y claro, evitando arcaísmos como «ramera» o «deshonrarte» cuando no eran necesarios.
  - La imagen corporal «la frente» se preservó para sostener el paralelismo metafórico con la vergüenza.
