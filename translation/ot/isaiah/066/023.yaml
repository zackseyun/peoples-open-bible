theological_decisions:
- issue: Whether חֹדֶשׁ should be rendered as 'month' or 'new moon' in this eschatological worship context
  chosen_reading: new moon
  alternative_readings:
  - month
  rationale: Although חֹדֶשׁ can denote 'month,' the collocation with Sabbath and the idiom of recurring worship observances strongly favor 'new moon' as the cultic marker. This preserves the text's liturgical texture without deciding broader debates about the continuity of calendar observance beyond what the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Whether כָל בָּשָׂר should be interpreted narrowly as humanity or more broadly as all living creatures
  chosen_reading: all flesh
  alternative_readings:
  - all people
  - all humankind
  rationale: The Hebrew idiom is left intact in the main text because it carries broader theological resonance and avoids over-narrowing the referent. In this context it most naturally points to universal human worship, but the translation preserves the source expression rather than resolving the scope more tightly than necessary.
  doctrine_reference: Preserve theological tension rather than resolve it.
