review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: caída de los muertos en medio del pueblo y la fórmula de reconocimiento ''sabrán que yo soy Yahvé''. Sin embargo, חָלָל en este contexto de juicio se alinea mejor con ''los muertos'' o ''los caídos'' en valor colectivo que con el singular indefinido ''un muerto'', que estrecha innecesariamente el referente y debilita la fuerza genérica del hebreo.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero presenta un problema formal de marcación: ''[a]muerto[a]'' no sigue el formato requerido, y la nota léxica no es necesaria si se usa una solución española más natural. Además, ''Caerá un muerto'' suena algo rígido y menos idiomático/profético que ''Caerán muertos'' o ''Los muertos caerán''.'
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar 'Yahvé' para יְהוָה. No hay otros términos de glosario en disputa. La fórmula 'sabrán que yo soy Yahvé' está bien preservada.
  issues:
  - severity: medium
    issue: חָלָל se vertió como singular indefinido 'un muerto'
    rationale: El sustantivo hebreo tiene aquí valor colectivo/genérico en contexto de juicio. 'Un muerto' introduce un referente singular no exigido por el original y reduce la fuerza de la escena.
  - severity: medium
    issue: Marcación de nota mal formada en el texto español
    rationale: El proyecto exige anclas como '[a]' en el punto exacto del texto. La forma '[a]muerto[a]' es incorrecta y no debe mantenerse.
  - severity: low
    issue: La nota léxica sobre חָלָל no aporta una ambigüedad que deba preservarse
    rationale: Si el texto principal usa una solución natural y fiel como 'Los muertos', no hace falta una nota adicional; el inglés tampoco exige preservar esa nota aquí.
  revised_spanish_text: Los muertos caerán en medio de ustedes, y sabrán que yo soy Yahvé.
  revision_rationale: Se cambia 'Caerá un muerto' por 'Los muertos caerán' para reflejar mejor el valor colectivo/genérico de חָלָל en contexto de juicio y producir un español más natural y solemne. Se elimina la nota porque no preserva una alternativa necesaria y su anclaje estaba mal formado. Se mantiene 'Yahvé' conforme a la política terminológica del proyecto.
