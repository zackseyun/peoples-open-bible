  yaml_path: translation/ot/1_chronicles/009/033.yaml
  text: These were the singers[a], heads of fathers’ houses of the Levites, in the chambers, free from other duties, for they were occupied in the work day and night.
  footnotes:
  - marker: a
    text: Or 'exempt' or 'released'; the Hebrew term is rare and likely means they were freed from other duties because of their continual responsibility for the singing service.
