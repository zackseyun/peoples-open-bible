theological_decisions:
- issue: Meaning of cultic holiness transfer in the final clause
  chosen_reading: The verse warns against the priests transmitting consecrated holiness to the people by means of their sacred ministerial garments.
  alternative_readings:
  - The verse merely concerns ritual propriety without implying actual holiness transfer
  - The clause means the people must not be treated as holy by contact with priestly garments
  rationale: In Ezekiel's temple vision, holiness is spatially and materially regulated. The piel of קדש with direct object 'the people' and instrumental 'with their garments' most naturally refers to imparting consecrated status or holiness through contact with sacred vestments, not to moral sanctification. The English keeps the cultic sense without importing later doctrinal categories.
