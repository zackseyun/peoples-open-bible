revisions:
- from: También sus soldados mercenarios en medio de ella son como becerros engordados; porque también ellos se volvieron, huyeron juntos; no se sostuvieron[a], pues vino sobre ellos el día de su desgracia, el tiempo de su castigo.
  to: También sus mercenarios en medio de ella son como becerros engordados; porque también ellos se volvieron y huyeron juntos; no resistieron, pues vino sobre ellos el día de su desgracia, el tiempo de su castigo[a].
  rationale: Se corrige la ancla de la nota para que corresponda a עֵת פְּקֻדָּתָם, se mejora la naturalidad y fidelidad de לֹא עָמָדוּ con 'no resistieron', se simplifica 'soldados mercenarios' a 'mercenarios', y se reemplaza la alternativa poco idiomática 'su cuenta' por 'su ajuste de cuentas'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:26:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: tropas contratadas dentro de Egipto, comparación con becerros cebados, retirada y huida conjunta, y llegada del día de su desastre con un tiempo de castigo. Sin embargo, hay dos desajustes relevantes: 1) לֹא עָמָדוּ se acerca mejor a ''no resistieron'' o ''no se mantuvieron firmes'' que a ''no se sostuvieron'', que suena poco natural y algo reflexivo en español; 2) la nota al pie está mal anclada, porque [a] aparece en ''no se sostuvieron[a]'' pero la nota explica עֵת פְּקֻדָּתָם (''el tiempo de su castigo''), no לֹא עָמָדוּ.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''soldados mercenarios'' resulta algo redundante; ''mercenarios'' basta y es natural, aunque el texto actual no es infiel. La mayor mejora necesaria es idiomática: ''no se sostuvieron'' no suena bien en este contexto militar. Además, el marcador de nota debe moverse a ''castigo[a]'' para cumplir la disciplina de notas.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Las decisiones léxicas principales son aceptables. Conviene afinar שְׂכִרֶיהָ a 'mercenarios' por naturalidad española y לֹא עָמָדוּ a 'no resistieron' por fidelidad e inteligibilidad. La alternativa de nota 'el tiempo de su cuenta' no refleja bien 'reckoning'; 'el tiempo de su ajuste de cuentas' sería mejor.
  issues:
  - severity: high
    issue: Marcador de nota anclado en la frase equivocada
    rationale: La nota [a] trata de עֵת פְּקֻדָּתָם ('el tiempo de su castigo/visitación/reckoning'), pero en el borrador el marcador está colocado en 'no se sostuvieron[a]', que corresponde a לֹא עָמָדוּ.
  - severity: medium
    issue: '''No se sostuvieron'' es poco natural para לֹא עָמָדוּ'
    rationale: El hebreo dice sencillamente 'no permanecieron/estuvieron firmes'. 'No se sostuvieron' suena forzado y no expresa bien el colapso militar; 'no resistieron' o 'no se mantuvieron firmes' comunica mejor el sentido.
  - severity: low
    issue: '''Soldados mercenarios'' es redundante'
    rationale: Dado el contexto bélico, 'mercenarios' ya comunica el sentido de tropas contratadas. La forma doble no es incorrecta, pero es menos elegante en español.
  - severity: low
    issue: La alternativa de nota 'el tiempo de su cuenta' es poco idiomática
    rationale: Para reflejar 'reckoning', en español es más claro 'el tiempo de su ajuste de cuentas' o 'el tiempo de su rendición de cuentas', según el matiz buscado.
  revised_spanish_text: También sus mercenarios en medio de ella son como becerros engordados; porque también ellos se volvieron y huyeron juntos; no resistieron, pues vino sobre ellos el día de su desgracia, el tiempo de su castigo[a].
  revised_footnotes:
  - marker: a
    text: O 'el tiempo de su visitación' o 'el tiempo de su ajuste de cuentas'.
    reason: lexical_alternative
  revision_rationale: Se corrige la ancla de la nota para que corresponda a עֵת פְּקֻדָּתָם, se mejora la naturalidad y fidelidad de לֹא עָמָדוּ con 'no resistieron', se simplifica 'soldados mercenarios' a 'mercenarios', y se reemplaza la alternativa poco idiomática 'su cuenta' por 'su ajuste de cuentas'.
