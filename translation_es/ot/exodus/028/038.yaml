review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva elementos clave: ''frente'', la repetición de ''sobre su frente'', ''los hijos de Israel'', y ''Yahvé''. También mantiene la tensión cultual de נָשָׂא עָוֺן. Sin embargo, dos decisiones necesitan ajuste: (1) el texto principal cambió ''iniquity'' a ''culpa'', mientras la nota a su vez presupone ''llevar la iniquidad''; en español conviene preservar mejor el idiomático-formal del original con ''iniquidad'' en el texto y dejar ''cargar con la culpa'' como alternativa; (2) la colocación de notas [c][b] sobre ''frente'' es incorrecta, porque [c] corresponde a ''los hijos de Israel'' y [b] a la frase final de aceptación.'
  spanish_quality_summary: El español es claro y digno, pero 'para aceptación para ellos' suena algo forzado. Aun así, puede mantenerse para reflejar de cerca el hebreo y el inglés POB. 'Por todas las ofrendas de sus cosas santas' es torpe pero aceptablemente literal dada la dificultad sintáctica. El problema principal de legibilidad/edición es el anclaje erróneo de notas y la falta de coherencia entre texto y nota en 'iniquidad/culpa'.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה como ''Yahvé''; בְּנֵי יִשְׂרָאֵל como ''los hijos de Israel''; הַקֳּדָשִׁים como ''las cosas santas''; יַקְדִּישׁוּ como ''consagren''. Para נָשָׂא עָוֺן, la mejor alineación con la justificación auditada es ''llevar la iniquidad'' en el texto principal, con ''cargar con la culpa'' en nota alternativa.'
  issues:
  - severity: high
    issue: Las notas [c] y [b] están ancladas en 'sobre su frente' en vez de en las expresiones que realmente comentan.
    rationale: La nota [c] explica 'los hijos de Israel' y debe ir allí; la nota [b] explica 'para aceptación para ellos' y debe ir en esa frase final. El anclaje actual induce a error textual.
  - severity: medium
    issue: El texto principal usa 'llevará la culpa' en vez de una forma más fiel al idiomático formal 'llevará la iniquidad'.
    rationale: La auditoría inglesa escogió 'bear the iniquity' precisamente para conservar la tensión sacrificial/legal sin reducirla a una sola explicación. En español 'culpa' es posible, pero estrecha algo el campo semántico y además deja incoherente la nota alternativa, que menciona 'llevar la iniquidad'.
  - severity: low
    issue: La frase 'para aceptación para ellos' es poco natural en español.
    rationale: No obstante, puede retenerse por fidelidad formal al hebreo y a la decisión inglesa, siempre que la nota alternativa ofrezca una opción más idiomática.
  revised_spanish_text: Estará sobre la frente de Aarón, y Aarón llevará la iniquidad[a] de las cosas santas que los hijos de Israel[c] consagren, por todas las ofrendas de sus cosas santas. Estará siempre sobre su frente, para aceptación para ellos[b] delante de Yahvé.
