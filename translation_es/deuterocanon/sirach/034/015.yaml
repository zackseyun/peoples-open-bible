translation:
  language: es
  text: ¿No corre una lágrima por la mejilla[a], y un gemido por la causa de ella?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio hebreo (Kahana / Geniza del Cairo) notablemente distinto aquí: «¿No cae una lágrima por la mejilla, y un gemido sobre sus destructores/rebeldes?». La tradición textual de este versículo es incierta, por lo que el texto principal sigue el paralelo griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: νόει
  english_pob_choice: Judge
  chosen_spanish: considera
  alternatives_spanish:
  - juzga
  - entiende
  - reflexiona
  lexicon: BDAG
  rationale: El imperativo pide una aprehensión reflexiva basada en analogía; en español, «considera» comunica mejor esa atención deliberada sin añadir el matiz judicial fuerte de «juzga».
- source_word: τὰ τοῦ πλησίον
  english_pob_choice: your neighbor’s feelings
  chosen_spanish: lo del prójimo
  alternatives_spanish:
  - lo que pertenece al prójimo
  - la situación de tu prójimo
  - los asuntos del prójimo
  lexicon: BDAG
  rationale: La expresión griega es amplia y concreta a la vez; «lo del prójimo» mantiene esa amplitud sin cerrar el sentido en «sentimientos», que sería más interpretativo en español.
- source_word: ἐκ σεαυτοῦ
  english_pob_choice: by your own
  chosen_spanish: a partir de ti mismo
  alternatives_spanish:
  - desde ti mismo
  - por ti mismo
  - conforme a ti mismo
  lexicon: BDAG
  rationale: La preposición expresa comparación o punto de partida. «A partir de ti mismo» conserva la idea de razonar desde la propia experiencia para entender al otro.
- source_word: ἐπὶ παντὶ πράγματι
  english_pob_choice: about every matter
  chosen_spanish: en todo asunto
  alternatives_spanish:
  - en cada asunto
  - acerca de toda cosa
  - en cada materia
  lexicon: BDAG
  rationale: «πράγματι» tiene sentido concreto de asunto o situación; «en todo asunto» es natural en español y preserva el alcance general de la exhortación.
- source_word: διανοοῦ
  english_pob_choice: think carefully
  chosen_spanish: piensa con cuidado
  alternatives_spanish:
  - reflexiona
  - considera
  - piensa detenidamente
  lexicon: BDAG
  rationale: El imperativo subraya un ejercicio mental deliberado. «Piensa con cuidado» suena moderno y mantiene la fuerza exhortativa sin perder sobriedad.
theological_decisions:
- issue: Desajuste de testigos entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the Greek sense in the main text while preserving the Hebrew line in a footnote
  chosen_spanish_reading: Seguir el sentido del griego en el texto principal y preservar el hebreo como variante significativa en nota
  alternative_spanish_readings:
  - Traducir la línea hebrea en el texto principal
  - Fusionar ambos testigos en una sola redacción
  rationale: La tradición hebrea disponible presenta un contenido distinto y la ficha marca desajuste importante. Como el griego ofrece una exhortación sapiential coherente, el texto principal sigue ese testimonio, mientras la nota conserva la lectura hebrea sin ocultarla.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácides, traducir del hebreo donde se conserva y del griego donde no; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La revisión más reciente reemplazó un borrador previo que seguía indebidamente una línea ajena con una traducción del griego; en español, este borrador mantiene ese criterio al priorizar el paralelo griego en el texto principal y anotar la discrepancia hebrea.
  spanish_consistency_notes:
  - Se usa «prójimo» para πλησίον por ser el equivalente bíblico natural en español y conservar el registro sapiencial.
  - Se evita «SEÑOR» o sustituciones litúrgicas porque no aparecen en este versículo.
  - Se mantiene «lágrima» y «mejilla» para reflejar la imagen hebrea del testigo disponible, pero la sintaxis principal sigue la exhortación griega, dada la divergencia textual.
  - «Asunto» y no «cosa» traduce πράγματι para dar un español claro y concreto.
