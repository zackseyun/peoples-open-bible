id: JOS.3.4
reference: Joshua 3:4
source:
  edition: WLC
  text: אַ֣ךְ רָח֣וֹק יִהְיֶ֗ה בֵּֽינֵי/כֶם֙ ו/בינ/ו כְּ/אַלְפַּ֥יִם אַמָּ֖ה בַּ/מִּדָּ֑ה אַֽל תִּקְרְב֣וּ אֵלָ֗י/ו לְמַ֤עַן אֲשֶׁר תֵּֽדְעוּ֙ אֶת הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר תֵּֽלְכוּ בָ֔/הּ כִּ֣י לֹ֧א עֲבַרְתֶּ֛ם בַּ/דֶּ֖רֶךְ מִ/תְּמ֥וֹל שִׁלְשֽׁוֹם׀־־־־׃ס
translation:
  text: Yet there shall be a distance between you and it[a], about two thousand cubits by measure. Do not come near it, so that you may know the way by which you shall go[b], for you have not passed this way before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from yesterday and the day before yesterday,' an idiom meaning 'previously' or 'before now.'
    reason: lexical_alternative
  - marker: b
    text: A cubit was a standard ancient unit of length, roughly the length of a forearm.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Only
  - However
  lexicon: HALOT
  rationale: Introduces a limiting or contrastive qualification to the preceding instruction. 'Yet' captures the adversative nuance in natural English better than the more restrictive 'only' here.
- source_word: רָחוֹק יִהְיֶה
  chosen: there shall be a distance
  alternatives:
  - it shall be far
  - keep a distance
  lexicon: HALOT
  rationale: The Hebrew expresses existence of separation/distance rather than directly commanding distance in imperative form. 'There shall be a distance' preserves that structure while remaining idiomatic.
- source_word: בֵּינֵיכֶם וּבֵינוֹ
  chosen: between you and it
  alternatives:
  - between you and him
  lexicon: HALOT
  rationale: The pronoun refers to the ark of the covenant in context, a grammatically masculine noun in Hebrew but an inanimate object in English. 'It' is the natural English referent.
- source_word: כְּאַלְפַּיִם אַמָּה
  chosen: about two thousand cubits
  alternatives:
  - about two thousand cubits' length
  - about 3,000 feet
  lexicon: HALOT
  rationale: Retains the ancient unit rather than converting in the main text, preserving source-world specificity. 'About' reflects the prefixed כ comparative/approximate force.
- source_word: בַּמִּדָּה
  chosen: by measure
  alternatives:
  - in measure
  - measured off
  lexicon: HALOT
  rationale: This phrase specifies the quantified distance. 'By measure' is concise and preserves the formal sense without over-paraphrasing.
- source_word: אַל תִּקְרְבוּ אֵלָיו
  chosen: Do not come near it
  alternatives:
  - Do not approach it
  - Do not draw near to it
  lexicon: HALOT
  rationale: A straightforward prohibition. 'Come near' is clear modern English and fits the spatial context.
- source_word: לְמַעַן אֲשֶׁר תֵּדְעוּ
  chosen: so that you may know
  alternatives:
  - in order that you may know
  - so that you may recognize
  lexicon: HALOT
  rationale: Expresses purpose. 'So that you may know' is natural and sufficiently formal.
- source_word: אֶת־הַדֶּרֶךְ אֲשֶׁר תֵּלְכוּ בָהּ
  chosen: the way by which you must go
  alternatives:
  - the הדרך that you shall go in
  - the road on which you will walk
  lexicon: HALOT
  rationale: '''Way'' is the natural rendering of דֶּרֶךְ here. ''By which you must go'' brings out the practical guidance sense in context without excessive paraphrase.'
- source_word: כִּי לֹא עֲבַרְתֶּם בַּדֶּרֶךְ
  chosen: for you have not passed this way
  alternatives:
  - for you have not gone on this road
  - for you have not crossed by this way
  lexicon: HALOT
  rationale: עָבַר commonly means 'pass over/through.' In this travel context, 'passed this way' is idiomatic and preserves the metaphor of traversing a route.
- source_word: מִתְּמוֹל שִׁלְשׁוֹם
  chosen: before
  alternatives:
  - from yesterday or the day before
  - previously
  lexicon: HALOT
  rationale: The idiom literally means 'since yesterday and the day before yesterday,' i.e., formerly or before now. 'Before' is a concise idiomatic rendering in English main text; the more literal form is worth preserving in a footnote.
