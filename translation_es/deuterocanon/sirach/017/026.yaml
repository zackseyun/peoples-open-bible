translation:
  language: es
  text: Porque no todo puede estar entre los seres humanos[a], ya que un hijo de hombre no es inmortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un ser humano'. El griego dice literalmente 'un hijo de hombre'; aquí es una expresión genérica para un humano mortal, no un título.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For not
  chosen_spanish: Porque no
  alternatives_spanish:
  - Pues no
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce una razón explicativa; en español, 'Porque no' conserva bien esa conexión causal sin forzar un orden extraño.
- source_word: δύναται
  english_pob_choice: can be
  chosen_spanish: puede estar
  alternatives_spanish:
  - puede ser
  - es posible que esté
  lexicon: BDAG
  rationale: El verbo expresa capacidad o posibilidad. 'Puede estar' mantiene un sentido natural en español para la existencia o presencia de algo 'entre' personas.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: BDAG
  rationale: El neutro plural tiene alcance global; 'todo' es la forma más natural y abarcadora en español.
- source_word: ἐν ἀνθρώποις
  english_pob_choice: among human beings
  chosen_spanish: entre los seres humanos
  alternatives_spanish:
  - en los humanos
  - entre los hombres
  - en la humanidad
  lexicon: BDAG
  rationale: La preposición ἐν aquí se entiende relacionalmente como 'entre'. 'Seres humanos' conserva el valor genérico e inclusivo de ἀνθρώποις sin sonar masculino en español.
- source_word: ἀθάνατος
  english_pob_choice: immortal
  chosen_spanish: inmortal
  alternatives_spanish:
  - no sujeto a la muerte
  - imperecedero
  lexicon: BDAG
  rationale: El adjetivo significa 'inmortal'; 'inmortal' es la equivalencia directa y clara en español.
- source_word: υἱὸς ἀνθρώπου
  english_pob_choice: a son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - hombre
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el giro semítico literal, como en el audit trail inglés, porque aquí es una expresión genérica para humanidad mortal y no un título mesiánico. 'Hijo de hombre' mantiene la tensión idiomática sin interpretarla de más.
theological_decisions:
- issue: Si υἱὸς ἀνθρώπου debe leerse como título o como referencia genérica a la humanidad
  english_pob_reading: 'generic human reference: ''a son of man'''
  chosen_spanish_reading: 'referencia genérica: ''hijo de hombre'''
  alternative_spanish_readings:
  - ser humano
  - hombre
  - el Hijo del Hombre
  rationale: En este contexto sapiencial, la segunda cláusula explica la limitación humana frente a la inmortalidad. La ausencia de artículo y la lógica del dicho favorecen una lectura genérica, no mesiánica. Por eso se conserva el giro semítico literal.
  doctrine_reference: DOCTRINE.md §§3–4
- issue: Cómo reflejar el alcance universal de πάντα sin convertirlo en una afirmación absoluta ajena al contexto
  english_pob_reading: everything
  chosen_spanish_reading: todo
  alternative_spanish_readings:
  - todas las cosas
  - todo lo demás
  rationale: El texto expresa imposibilidad general dentro de la condición humana, no una especulación abstracta. 'Todo' mantiene el alcance amplio y proverbial de la sentencia.
  doctrine_reference: DOCTRINE.md §§1–2
translation_notes:
  revision_awareness: Seguí la revisión auditada que prefirió 'among human beings' para ἐν ἀνθρώποις; en español, 'entre los seres humanos' refleja esa misma decisión contextual. También respeté la nota inglesa sobre υἱὸς ἀνθρώπου como giro genérico y no título.
  spanish_consistency_notes:
  - Mantuve 'Dios', 'Yahvé', 'Mesías' y otros términos estándar del proyecto solo cuando el texto los requiere; aquí no aparecen.
  - Usé 'seres humanos' para evitar sesgo masculino donde el griego es genérico.
  - Conservé 'hijo de hombre' en el texto y ofrecí 'ser humano' en nota para preservar la tensión idiomática documentada.
