review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: conserva «labios / boca», «necio», la idea de entrar en conflicto, y la segunda cola como consecuencia de su habla que atrae castigo físico. Sin embargo, el anclaje de notas está invertido respecto al contenido preservado del inglés POB: la alternativa de la primera cola debe ir con «pleito/disputa», mientras que la de la segunda corresponde a «golpes / paliza».'
  spanish_quality_summary: El texto es claro y natural en español general. «Entran en pleito» es entendible, pero en singular con sujeto plural suena algo menos idiomático que una formulación singular distributiva. Además, «llama a los golpes» es comprensible pero menos natural que «pide golpes» o «atrae golpes»; aun así, por cercanía al original puede mantenerse. Conviene reparar sobre todo la colocación de las notas y pulir la primera cola para mejor fluidez.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Necio» para כְסִיל, «labios / boca» para la imaginería corporal, y «golpes» para מַהֲלֻמוֹת están bien alineados con el expediente léxico inglés.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas al segmento equivocado.
    rationale: En el inglés POB, la alternativa «his lips come into a quarrel» corresponde a la primera cola, y «his mouth invites a beating» a la segunda. El español coloca [a] tras «pleito» pero le asigna correctamente una alternativa de la primera cola; sin embargo [b] está en «golpes» y también correcto semánticamente, mientras que el inglés muestra el orden b/a por motivos editoriales. Para evitar confusión y cumplir la disciplina de anclaje, conviene normalizar el orden español de manera secuencial y clara.
  - severity: low
    issue: «Los labios del necio entran en pleito» suena algo rígido en español.
    rationale: Aunque es fiel, el español sapiencial fluye mejor con «Los labios del necio provocan pleito» o «entran en disputa». Dado que el inglés auditado conservó «enter into», la mejor reparación mínima es usar «entran en disputa», que suena más natural que «entran en pleito».
  revised_spanish_text: Los labios del necio entran en disputa[a], y su boca llama a los golpes[b].
  revised_footnotes:
  - marker: a
    text: 'O: «entran en pleito» o «vienen a una querella».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su boca invita a una paliza».'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor: se mejora la naturalidad de la primera cola con «disputa» y se presentan las notas de forma secuencial y claramente anclada al segmento correspondiente, preservando las alternativas léxicas documentadas por el POB inglés.'
