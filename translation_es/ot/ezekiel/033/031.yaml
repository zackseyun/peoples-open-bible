translation:
  language: es
  text: Y vienen a ti como suele venir la gente, y se sientan delante de ti como mi pueblo, y oyen tus palabras, pero no las hacen; porque con su boca hablan cosas sensuales[a], mientras su corazón va tras su ganancia injusta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cosas sensuales» traduce el raro hebreo עֲגָבִים según el contexto de lo que expresan con la boca. También puede entenderse como «deseos», «placeres sensuales» o quizá «cantos amorosos».
    reason: lexical_alternative
  - marker: b
    text: «Ganancia injusta» también puede traducirse «lucro», «provecho» o «ganancia codiciosa». Mantiene el matiz moral del hebreo בִצְעָם.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְבוֹא עָם
  english_pob_choice: as people come
  chosen_spanish: como viene la gente
  alternatives_spanish:
  - como llega la gente
  - como cuando viene la gente
  - como viene un pueblo
  lexicon: HALOT
  rationale: La comparación expresa el modo ordinario y público de acercarse; 'como viene la gente' conserva la fuerza de כ־ con מבוא y suena natural en español.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo mío
  lexicon: HALOT
  rationale: '''Pueblo'' mantiene el matiz pactal y el contraste irónico entre la autoidentificación del grupo y su desobediencia.'
- source_word: וְשָׁמְעוּ אֶת־דְּבָרֶיךָ
  english_pob_choice: and they hear your words
  chosen_spanish: y oyen tus palabras
  alternatives_spanish:
  - y escuchan tus palabras
  - y atienden tus palabras
  lexicon: HALOT
  rationale: '''Oír'' conserva el valor hebreo de שמע y deja clara la tensión con el hecho de no poner en práctica lo oído.'
- source_word: וְאוֹתָם לֹא יַעֲשׂוּ
  english_pob_choice: but they do not do them
  chosen_spanish: pero no las hacen
  alternatives_spanish:
  - pero no las cumplen
  - pero no las ponen por obra
  - pero no las practican
  lexicon: HALOT
  rationale: '''Hacer'' traduce de manera concreta el hebreo idiomático; ''las'' remite a ''tus palabras'' y evita una paráfrasis excesiva.'
- source_word: עֲגָבִים
  english_pob_choice: lustful things
  chosen_spanish: cosas de deseo
  alternatives_spanish:
  - cosas sensuales
  - cosas de pasión
  - cosas de lujuria
  - cantos amorosos
  lexicon: HALOT
  rationale: El término es raro y admite varias posibilidades. 'Cosas de deseo' mantiene la ambigüedad léxica sin decidir demasiado pronto por 'cantos' o por un sentido más específico de sensualidad; el contexto de la boca permite entender que se trata de lo que dicen.
- source_word: בְּפִיהֶם הֵמָּה עֹשִׂים
  english_pob_choice: with their mouth they speak lustful things
  chosen_spanish: con su boca hablan cosas de deseo
  alternatives_spanish:
  - con su boca dicen cosas de deseo
  - con su boca hacen cosas de deseo
  - con su boca pronuncian cosas de deseo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hacen' con la boca. En español, 'hablan' comunica mejor el vínculo con la boca sin perder el carácter performativo del discurso.
- source_word: בִצְעָם
  english_pob_choice: their unjust gain
  chosen_spanish: su ganancia injusta
  alternatives_spanish:
  - su lucro injusto
  - su provecho injusto
  - su ganancia codiciosa
  - su afán de ganancia
  lexicon: HALOT
  rationale: '''Ganancia injusta'' conserva el peso moral de בצע y su vínculo con provecho obtenido de manera torcida; el posesivo singular colectivo en español expresa bien el plural hebreo.'
- source_word: לִבָּם הֹלֵךְ אַחֲרֵי
  english_pob_choice: their heart goes after
  chosen_spanish: su corazón va tras
  alternatives_spanish:
  - su corazón sigue tras
  - su corazón persigue
  - su corazón anda tras
  lexicon: HALOT
  rationale: '''Va tras'' reproduce el modismo hebreo de inclinación y deseo interno con una imagen clara y sobria en español.'
theological_decisions:
- issue: Caracterización moral de la palabra de la boca y del deseo del corazón
  english_pob_reading: The verse depicts hypocritical hearers whose verbal expression is driven by sensual/self-serving desire while their inner loyalty is directed toward unjust gain.
  chosen_spanish_reading: 'El versículo describe oyentes hipócritas: oyen la palabra, pero su boca expresa deseo desordenado y su interior persigue ganancia injusta.'
  alternative_spanish_readings:
  - El versículo podría aludir a palabras halagadoras o devotas, no necesariamente a lenguaje sensual explícito.
  - También podría sugerir que tratan las palabras del profeta como entretenimiento amoroso o como canto.
  rationale: El contexto inmediato contrasta oír y no hacer, y opone boca y corazón. 'Cosas de deseo' preserva la tensión léxica de עֲגָבִים sin cerrar indebidamente la interpretación, pero sí dejando claro que no hay obediencia ni rectitud interior.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que desplazó una formulación más interpretativa de la primera cláusula para una expresión más natural y cercana al sentido léxico. En español se siguió esa línea, evitando 'actúan' o 'representan' y optando por 'hablan' como correspondencia más directa de la relación boca-palabra. También se preservó la tensión entre la rareza de עֲגָבִים y su función en el contexto, sin resolverla de manera excesivamente específica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece.
  - '''Palabras'' se usa para דְּבָרֶיךָ con el sentido de mensaje/profecía, coherente con otros pasajes.'
  - '''Corazón'' traduce לֵב en sentido de centro interior de voluntad y deseo, no solo emoción.'
  - La construcción 'ganancia injusta' sigue la terminología POB para בצע y evita 'provecho' como única opción, ya que aquí el matiz moral es central.
