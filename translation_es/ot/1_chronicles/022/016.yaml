translation:
  language: es
  text: Para el oro, la plata, el bronce[a] y el hierro, no hay número[b]. Levántate y trabaja, y que Yahvé esté contigo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'bronce'; 'cobre' también es posible para este término de metal en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''no se pueden contar'' / ''son innumerables''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''y Yahvé estará contigo'' o ''y sea Yahvé contigo''. La forma hebrea puede expresar un deseo o bendición.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַזָּהָב לַכֶּסֶף וְלַנְּחֹשֶׁת וְלַבַּרְזֶל
  english_pob_choice: For the gold, the silver, the bronze, and the iron
  chosen_spanish: Para el oro, la plata, el bronce y el hierro
  alternatives_spanish:
  - En cuanto al oro, la plata, el bronce y el hierro
  - Para el oro, la plata, el cobre y el hierro
  lexicon: HALOT
  rationale: El ל prefijado en cada sustantivo funciona aquí como marca de referencia temática. 'Para' conserva bien el arranque list-like y el encuadre de materiales; 'en cuanto a' también sería posible, pero suena más explicativo que el hebreo.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En listas de materiales de construcción y culto, el término suele equivaler a una aleación práctica, por lo que 'bronce' comunica mejor el referente habitual; 'cobre' sigue siendo una posibilidad lexical.
- source_word: אֵין מִסְפָּר
  english_pob_choice: there is no number
  chosen_spanish: no hay número
  alternatives_spanish:
  - no se puede contar
  - son innumerables
  lexicon: HALOT
  rationale: La expresión hebrea afirma innumerabilidad. 'No hay número' preserva de modo directo la idiomática del original sin desplazarla hacia una paráfrasis más interpretativa.
- source_word: קוּם
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Álzate
  - Arriésgate
  lexicon: HALOT
  rationale: Como imperativo exhortativo, 'Levántate' mantiene la fuerza de acción inmediata y es natural en español moderno.
- source_word: וַעֲשֵׂה
  english_pob_choice: and work
  chosen_spanish: y trabaja
  alternatives_spanish:
  - y hazlo
  - y actúa
  lexicon: HALOT
  rationale: En el contexto de preparación y construcción, 'trabaja' concreta el mandato con más precisión que un 'haz' demasiado general, manteniendo el valor exhortativo.
- source_word: וִיהִי יְהוָה עִמָּךְ
  english_pob_choice: and may Yahweh be with you
  chosen_spanish: y que Yahvé esté contigo
  alternatives_spanish:
  - y que Yahvé sea contigo
  - y Yahvé estará contigo
  lexicon: HALOT
  rationale: La forma hebrea expresa deseo/bendición, por eso se vierte con subjuntivo optativo. Se conserva 'Yahvé' por la decisión terminológica del proyecto sobre el Nombre divino.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Nombre divino. La línea terminológica del proyecto pide 'Yahvé' en el texto principal, evitando el reemplazo por un título encubridor.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor modal de וִיהִי יְהוָה עִמָּךְ
  english_pob_reading: may Yahweh be with you
  chosen_spanish_reading: que Yahvé esté contigo
  alternative_spanish_readings:
  - Yahvé estará contigo
  - Yahvé sea contigo
  rationale: La forma verbal puede leerse como deseo o bendición, no solo como futuro simple. El subjuntivo refleja mejor esa fuerza modal en español.
  doctrine_reference: Hebrew jussive/wish construction
translation_notes:
  revision_awareness: Se atendió la validación previa eliminando marcadores no anclados. Ahora solo se incluye un pie de nota, y su marcador [a] aparece explícitamente en el texto principal junto a «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo la secuencia de materiales con artículos definidos para reflejar la enumeración hebrea.
  - Se evitó 'SEÑOR' para el Nombre divino conforme a la terminología base del proyecto.
  - '''No hay número'' conserva la idiomática hebrea sin convertirla en explicación interpretativa.'
  - El imperativo final se expresó con subjuntivo optativo en español para reflejar el matiz de bendición.
