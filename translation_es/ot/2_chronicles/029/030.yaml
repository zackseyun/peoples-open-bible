base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/030.yaml
  text: Then Hezekiah the king and the officials told the Levites to praise Yahweh with the words of David and of Asaph the seer[a]. So they praised with gladness[b], and they bowed down and worshiped.
  footnotes:
  - marker: a
    text: Or 'according to the words of David and of Asaph the seer.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'until joy' or 'unto joy'; the sense is that their praise was marked by rejoicing.
    reason: lexical_alternative
