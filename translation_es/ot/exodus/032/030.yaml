translation:
  language: es
  text: 'Y aconteció al día siguiente que Moisés dijo al pueblo[a]: «Ustedes han pecado gravemente. Y ahora subiré a Yahvé; quizá pueda hacer expiación por el pecado de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Ustedes han pecado un gran pecado», una expresión cognada que intensifica la gravedad de la ofensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: El hebreo wayyiqtol introduce el siguiente evento narrativo. «Aconteció» conserva ese arranque discursivo con dignidad y sin arcaísmo excesivo.
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor temporal de «el día después» y suena más idiomático en español bíblico moderno.
- source_word: וַיֹּאמֶר ... אֶל הָעָם
  english_pob_choice: Moses said to the people
  chosen_spanish: Moisés dijo al pueblo
  alternatives_spanish:
  - Moisés habló al pueblo
  lexicon: HALOT
  rationale: אָמַר con אֶל es la fórmula regular de habla dirigida. «Dijo al pueblo» es directo y fiel.
- source_word: אַתֶּם
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Vosotros
  lexicon: HALOT
  rationale: El hebreo enfatiza el sujeto plural; en español latinoamericano neutral, «ustedes» conserva esa pluralidad y el énfasis sin sonar artificial.
- source_word: חֲטָאתֶם
  english_pob_choice: have sinned
  chosen_spanish: han cometido
  alternatives_spanish:
  - han pecado
  - han faltado
  lexicon: HALOT
  rationale: Aquí el verbo hebreo expresa pecado cometido; en español, el cognado «han pecado» sería posible, pero «han cometido un gran pecado» mantiene mejor el paralelismo intensificador con el sustantivo siguiente.
- source_word: חֲטָאָה גְדֹלָה
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un pecado grande
  - una gran falta
  - un pecado gravísimo
  lexicon: HALOT
  rationale: 'La construcción cognada intensifica la gravedad: no se debilita a «falta». «Gran pecado» conserva la repetición semántica y la fuerza moral del hebreo.'
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene la transición de la acusación a la acción prevista por Moisés, preservando el valor conectivo del waw.
- source_word: אֶעֱלֶה אֶל יְהוָה
  english_pob_choice: I will go up to Yahweh
  chosen_spanish: subiré a Yahvé
  alternatives_spanish:
  - iré a Yahvé
  - ascenderé a Yahvé
  lexicon: HALOT
  rationale: עלה es literalmente «subir/ascender». «Subiré» reproduce el movimiento hacia la presencia divina, y «Yahvé» sigue el estándar del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino propio y no se sustituye por un título, siguiendo la norma del proyecto y el testimonio del texto hebreo.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - puede que
  lexicon: HALOT
  rationale: Expresa una posibilidad incierta y reverente; «quizá» es sobrio y adecuado al tono de intercesión.
- source_word: אֲכַפְּרָה
  english_pob_choice: I can make atonement
  chosen_spanish: pueda hacer expiación
  alternatives_spanish:
  - pueda hacer atonamiento
  - pueda lograr expiación
  - pueda expiar
  lexicon: HALOT
  rationale: כפר en contexto cultual e intercesorio apunta a expiación. «Hacer expiación» es transparente y evita un giro demasiado técnico; el subjuntivo mantiene la posibilidad incierta expresada por אוּלַי.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  lexicon: HALOT
  rationale: La preposición expresa beneficio o representación. «Por» es breve y natural en español bíblico.
- source_word: חַטַּאתְכֶם
  english_pob_choice: your sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su pecado de ustedes
  - el pecado de ustedes
  lexicon: HALOT
  rationale: El hebreo retoma el pecado del pueblo; en español, la concordancia con «el pueblo» permite «su pecado» sin pérdida de referencia. Se preserva el singular colectivo del original.
theological_decisions:
- issue: Forma de renderizar יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Se preserva el nombre propio divino según la política del proyecto, en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la frase de atonación
  english_pob_reading: perhaps I can make atonement for your sin
  chosen_spanish_reading: quizá pueda hacer expiación por su pecado
  alternative_spanish_readings:
  - quizá pueda expiar su pecado
  - quizá pueda obtener expiación por su pecado
  rationale: Se conserva la incertidumbre esperanzada de אוּלַי y no se convierte en una garantía. «Hacer expiación» refleja כפר sin resolver la tensión teológica sobre la eficacia de Moisés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente marcada como sin cambios. Se mantuvo el acuerdo alto del cotejo, con ajuste mínimo de registro español: «aconteció», «al día siguiente», «subiré a Yahvé» y «hacer expiación» como equivalentes naturales y auditables.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «pecado» para חטא y «expiación» para כפר, manteniendo la distinción léxica.
  - La nota[a] recoge la intensificación cognada del hebreo sin duplicar marcadores.
  - El plural implícito hebreo se expresa con «ustedes» y luego «su pecado» como singular colectivo coherente con el antecedente «el pueblo».
