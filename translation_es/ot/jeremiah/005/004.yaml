translation:
  language: es
  text: 'Pero yo dije: «Ciertamente estos son solo los pobres; son insensatos, porque no conocen el camino de Yahvé, la justicia[a] de su Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio de su Dios» o «la ordenanza de su Dios». El término hebreo puede referirse a justicia, juicio o una exigencia legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  - Pero yo dije
  lexicon: HALOT
  rationale: La conjunción introduce un giro contrastivo respecto del contexto anterior; en español, «Pero yo» conserva bien la oposición y la primera persona enfática.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - hablé
  - pensé
  - yo dije
  lexicon: HALOT
  rationale: El verbo básico es «decir»; «dije» permite introducir discurso interior o reflexivo sin forzar una paráfrasis con «pensé».
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sólo
  - En verdad
  - Ciertamente sólo
  lexicon: HALOT
  rationale: La partícula aporta matiz asertivo y restrictivo. «Ciertamente» expresa la convicción del hablante; el valor restrictivo se completa en el contexto inmediato con «sólo los pobres».
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los débiles
  - los humildes
  - los necesitados
  lexicon: HALOT
  rationale: El término designa a personas pobres o socialmente insignificantes. «Los pobres» es la opción más natural y fiel en este contexto.
- source_word: הֵם
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - ellos son
  - son éstos
  lexicon: HALOT
  rationale: El pronombre es enfático y deíctico; «estos son» reproduce bien esa señalización directa en español.
- source_word: נוֹאֲלוּ
  english_pob_choice: they are foolish
  chosen_spanish: son insensatos
  alternatives_spanish:
  - son necios
  - han actuado neciamente
  - son faltos de juicio
  lexicon: HALOT
  rationale: El verbo en nifal expresa ser/mostrarse necio o insensato. «Insensatos» mantiene la evaluación del texto sin suavizarla demasiado.
- source_word: כִּי לֹא יָדְעוּ
  english_pob_choice: for they do not know
  chosen_spanish: porque no conocen
  alternatives_spanish:
  - pues no saben
  - ya que no conocen
  lexicon: HALOT
  rationale: La cláusula causal explica por qué se los califica así. «Porque no conocen» es una causal directa y clara en español.
- source_word: דֶּרֶךְ יְהוָה
  english_pob_choice: the way of Yahweh
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - la senda de Yahvé
  - el camino de Yahvé
  - la vía de Yahvé
  lexicon: HALOT
  rationale: Se conserva el idioma bíblico «camino» como forma de conducta, voluntad o manera divina. Se mantiene «Yahvé» según la terminología del proyecto para יְהוָה.
- source_word: מִשְׁפַּט אֱלֹהֵיהֶם
  english_pob_choice: the justice of their God
  chosen_spanish: el juicio de su Dios
  alternatives_spanish:
  - la justicia de su Dios
  - la sentencia de su Dios
  - el orden de su Dios
  lexicon: HALOT
  rationale: מִשְׁפָּט admite justicia, juicio u orden/mandato legal. Aquí el paralelismo con «el camino de Yahvé» permite retener la amplitud semántica con «juicio», sin fijarlo exclusivamente a «justicia».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la terminología del proyecto, se transcribe como «Yahvé» en el texto principal, preservando el nombre propio del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מִשְׁפָּט en el paralelismo final
  english_pob_reading: justice / judgment / ordinance
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - justicia
  - orden
  - mandato
  rationale: La POB inglesa preserva la tensión lexical anotando alternativas. En español, «juicio» mantiene la amplitud semántica entre decisión judicial, evaluación y norma, sin cerrar indebidamente el sentido.
  doctrine_reference: HALOT; audit trail of Jeremiah 5:4
- issue: Sentido de נוֹאֲלוּ
  english_pob_reading: they are foolish
  chosen_spanish_reading: son insensatos
  alternative_spanish_readings:
  - son necios
  - han obrado neciamente
  rationale: La lectura describe una cualidad o estado resultante, no solo un acto puntual. «Insensatos» conserva la fuerza evaluativa y la naturalidad en español.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo WLC y el audit trail inglés sin cambios sustantivos respecto de la última revisión; se conserva la amplitud de מִשְׁפָּט mediante una traducción principal más una nota alternativa, como en la POB inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene el tono bíblico de «camino» para דֶּרֶךְ.
  - «Insensatos» conserva el juicio moral de נוֹאֲלוּ sin suavizarlo.
  - La nota conserva la alternativa semántica de מִשְׁפָּט, evitando fijar un solo matiz.
