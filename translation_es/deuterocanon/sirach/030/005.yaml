translation:
  language: es
  text: En su vida vio y se alegró[a], y a su fin no se entristeció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al final de su vida» o «en sus últimos días». La frase griega se refiere al cierre de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ ζωῇ αὐτοῦ
  english_pob_choice: In his lifetime
  chosen_spanish: En su vida
  alternatives_spanish:
  - Durante su vida
  - Mientras vivió
  lexicon: LSJ
  rationale: La frase temporal griega se refiere al tiempo transcurrido dentro de la vida de alguien. «En su vida» conserva esa referencia de manera natural en español y evita una paráfrasis innecesaria.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - llegó a ver
  lexicon: LSJ
  rationale: El verbo griego es simplemente «vio». En español, «vio» mantiene la forma breve y no introduce un objeto interpretativo que el texto no expresa.
- source_word: εὐφράνθη
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - estuvo contento
  lexicon: LSJ
  rationale: «Se alegró» transmite bien la respuesta positiva fuerte sin sonar arcaica. En español conserva el matiz de júbilo o gozo propio del contexto sapiencial.
- source_word: ἐν τῇ τελευταῖ αὐτοῦ
  english_pob_choice: at his end
  chosen_spanish: al final de sus días
  alternatives_spanish:
  - al final de su vida
  - en sus últimos días
  lexicon: LSJ
  rationale: La expresión griega alude al cierre de la vida. «Al final de sus días» es una equivalencia natural y clara en español, manteniendo la referencia temporal sin dureza idiomática.
- source_word: οὐκ ἐλυπήθη
  english_pob_choice: he was not grieved
  chosen_spanish: no tuvo pesar
  alternatives_spanish:
  - no fue entristecido
  - no se entristeció
  lexicon: LSJ
  rationale: El griego está en pasivo y expresa ausencia de aflicción. «No tuvo pesar» comunica esa idea de manera idiomática en español, aunque las alternativas más literales también son posibles.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Sirácides 30:5 y el audit trail inglés. Se mantiene la ambigüedad temporal de ἐν τῇ τελευταῖ αὐτοῦ con una nota alternativa, sin añadir el objeto de «vio» ni especificar más de lo que el griego dice. No hubo cambios de revisión recientes en el contexto auditado.
  spanish_consistency_notes:
  - Se prefirió «Dios»/«Yahvé» según corresponda; este versículo no contiene ninguno de esos términos.
  - Se mantuvo un registro sobrio y bíblico, evitando calcos rígidos como «en su vida» en sentido posesivo-abstracto donde el español suena mejor con una formulación natural.
  - La nota al pie marca la ambigüedad de la frase final, tal como el inglés POB la preserva.
