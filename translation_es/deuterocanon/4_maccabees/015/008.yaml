    rationale: Aunque capta cierta fuerza valorativa, puede sugerir menosprecio activo hacia los hijos o su bienestar. El griego apunta más bien a desatender o pasar por alto frente a una lealtad superior.
  - severity: low
    issue: Pronombre explícito «ella»
    rationale: No es infiel, pero en español suena algo innecesario porque el verbo ya codifica el sujeto y el contexto lo identifica.
