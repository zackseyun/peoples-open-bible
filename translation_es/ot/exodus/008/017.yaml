translation:
  language: es
  text: Porque si no dejas ir a mi pueblo, he aquí, yo envío sobre ti, sobre tus siervos, sobre tu pueblo y en tus casas el enjambre[a]. Y las casas de Egipto se llenarán del enjambre[b], y también el suelo sobre el que están.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las moscas'. El hebreo עָרֹב probablemente denota un enjambre; tradicionalmente se entiende como moscas, y la traducción más amplia conserva la incertidumbre léxica.
    reason: lexical_alternative
  - marker: b
    text: O 'la tierra sobre la que están'. El hebreo אֲדָמָה puede significar 'suelo' o 'tierra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pero si
  - Ciertamente, si
  lexicon: HALOT
  rationale: La combinación introduce una advertencia condicional. 'Porque si' conserva el enlace discursivo con el contexto anterior y mantiene la fuerza enfática sin volver la frase artificial en español.
- source_word: אֵינְךָ מְשַׁלֵּחַ
  english_pob_choice: you do not let ... go
  chosen_spanish: no dejas ir
  alternatives_spanish:
  - no estás enviando
  - no sueltas
  - no liberas
  lexicon: HALOT
  rationale: El verbo שׁלח con 'mi pueblo' en Éxodo expresa liberación. 'No dejas ir' comunica bien esa idea en español y evita reducirlo a un simple acto de envío.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce el valor covenantal y nacional del hebreo en este contexto narrativo.'
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí, yo
  alternatives_spanish:
  - mira, yo
  - yo, aquí estoy
  lexicon: HALOT
  rationale: '''He aquí'' conserva la fórmula deíctica solemne del hebreo. Se mantiene ''yo'' para reflejar la autoproclamación enfática.'
- source_word: מַשְׁלִיחַ
  english_pob_choice: sending
  chosen_spanish: enviaré
  alternatives_spanish:
  - estoy enviando
  - voy a enviar
  lexicon: HALOT
  rationale: Aunque la forma es participial, con הִנְנִי expresa acción inminente y segura. El futuro español comunica con naturalidad esa inminencia.
- source_word: הֶעָרֹב
  english_pob_choice: the swarm
  chosen_spanish: el enjambre
  alternatives_spanish:
  - la plaga de moscas
  - la multitud de insectos
  - la mezcla de insectos
  lexicon: HALOT
  rationale: Se conserva la ambigüedad léxica del hebreo. 'Enjambre' es una traducción natural que no especifica 'moscas' en el texto principal, aunque esa interpretación tradicional queda abierta.
- source_word: בְּךָ ... וּבַעֲבָדֶיךָ וּבְעַמְּךָ
  english_pob_choice: upon you, upon your servants, upon your people
  chosen_spanish: sobre ti, sobre tus siervos, sobre tu pueblo
  alternatives_spanish:
  - contra ti, contra tus siervos, contra tu pueblo
  - en ti, en tus siervos, en tu pueblo
  lexicon: HALOT
  rationale: '''Sobre'' funciona bien en lenguaje de plaga y reproduce la acumulación retórica del hebreo. ''Siervos'' mantiene la referencia social sin añadir una lectura interpretativa.'
- source_word: וּבְבָתֶּיךָ
  english_pob_choice: and into your houses
  chosen_spanish: y sobre tus casas
  alternatives_spanish:
  - y en tus casas
  - y dentro de tus casas
  lexicon: HALOT
  rationale: El paralelismo con las demás frases afectadas favorece 'sobre tus casas' en esta cláusula; la idea de invasión se completa en la oración siguiente con 'se llenarán'.
- source_word: וּמָלְאוּ בָּתֵּי מִצְרַיִם
  english_pob_choice: The houses of Egypt will be filled
  chosen_spanish: las casas de Egipto se llenarán
  alternatives_spanish:
  - las casas de los egipcios se llenarán
  - las casas de Egipto estarán llenas
  lexicon: HALOT
  rationale: 'Se preserva la construcción hebrea en forma impersonal/pasiva resultativa: ''se llenarán''. ''Casas de Egipto'' reproduce de cerca el constructo y mantiene amplitud referencial.'
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: el suelo
  alternatives_spanish:
  - la tierra
  - el terreno
  - el campo
  lexicon: HALOT
  rationale: '''Suelo'' comunica el sentido físico inmediato del término en contraste con ''casas''. ''Tierra'' podría sonar demasiado amplio y ''terreno'' demasiado específico.'
- source_word: אֲשֶׁר הֵם עָלֶיהָ
  english_pob_choice: on which they are
  chosen_spanish: sobre el que están
  alternatives_spanish:
  - donde están
  - sobre la cual están
  lexicon: HALOT
  rationale: Se conserva la referencia al soporte físico ('sobre') y la relación con el plural implícito. 'Sobre el que están' resulta claro en español y sigue de cerca la imagen del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo WLC y el criterio auditado de la POB en inglés, especialmente en la preservación de la ambigüedad de עָרֹב y del rango semántico de אֲדָמָה. Se ajustó la sintaxis para que suene natural en español sin perder la estructura repetitiva de amenaza y alcance geográfico.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque el hebreo no usa el nombre divino aquí.
  - Se eligió 'mi pueblo' para עַמִּי conforme al uso pactal del corpus del Éxodo.
  - '''Enjambre'' se usa en el texto principal para preservar la ambigüedad; la nota recoge la lectura tradicional de ''moscas''.'
  - '''Siervos'' sigue la fuerza social de עֲבָדֶיךָ; no se sustituyó por ''criados'' ni ''esclavos'' porque el contexto narrativo permite el término más neutral y comprensible en español eclesial.'
