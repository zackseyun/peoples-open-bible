translation:
  language: es
  text: Y ahora[a], Israel, ¿qué te pide Yahvé tu Dios, sino temer[b] a Yahvé tu Dios, andar en todos sus caminos, amarlo, y servir a Yahvé tu Dios con todo tu corazón y con toda tu alma[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te requiere». El verbo hebreo puede expresar una petición que implica obligación.
    reason: lexical_alternative
  - marker: b
    text: «Temer» aquí incluye reverencia, asombro y obediencia devota hacia Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O «con toda tu vida»; נֶפֶשׁ puede significar alma, vida o ser según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva y el matiz conjuntivo del ו inicial; «Y ahora» suena natural en español y mantiene el impulso exhortativo del texto.
- source_word: מָה ... שֹׁאֵל מֵעִמָּךְ
  english_pob_choice: what does ... ask of you
  chosen_spanish: ¿qué te pide ...?
  alternatives_spanish:
  - ¿qué te pregunta ...?
  - ¿qué requiere de ti ...?
  lexicon: HALOT
  rationale: שׁאל con מֵעִם puede expresar pedir/solicitar con fuerza de exigencia. «Pide» conserva la forma interrogativa y el tono relacional; la nota recoge la posible lectura de «requerir».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton en una forma española estable y legible. No se sustituye por un título como «SEÑOR», para preservar el nombre personal revelado.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el pacto
  - tu Dios, tu Dios del pacto
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se vierte de manera directa y natural. En español, «tu Dios» conserva el sentido de relación de pacto sin sobrecargar la frase.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - solamente
  lexicon: HALOT
  rationale: 'En esta construcción retórica, «sino» reproduce con fluidez el valor limitativo de כִּי אִם: no tanto una excepción lógica fría, sino la substancia de lo que se pide.'
- source_word: לְיִרְאָה
  english_pob_choice: to fear
  chosen_spanish: temer
  alternatives_spanish:
  - reverenciar
  - sentir reverencia y temor
  lexicon: HALOT
  rationale: «Temer» mantiene la fuerza lexical de ירא y la tensión bíblica entre temor, reverencia y obediencia. «Reverenciar» suaviza demasiado el campo semántico.
- source_word: לָלֶכֶת בְּכָל דְּרָכָיו
  english_pob_choice: to walk in all his ways
  chosen_spanish: andar en todos sus caminos
  alternatives_spanish:
  - caminar en todos sus caminos
  - vivir según todos sus caminos
  lexicon: HALOT
  rationale: «Andar» conserva la metáfora ética de caminar/ir por un camino y es idiomático en español bíblico actual. «Sus» refleja el antecedente inmediato sin repetir el nombre divino en exceso.
- source_word: וּלְאַהֲבָה אֹתוֹ
  english_pob_choice: to love him
  chosen_spanish: amarlo
  alternatives_spanish:
  - amarle
  - quererlo
  lexicon: HALOT
  rationale: El infinitivo con objeto pronominal se vierte de forma directa y compacta. «Amarlo» preserva el amor de alianza y la referencia personal a Yahvé.
- source_word: וְלַעֲבֹד
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - adorar
  - rendir servicio
  lexicon: HALOT
  rationale: 'Se conserva el valor amplio de עבד aplicado a Dios: servicio obediente y devoción. «Servir» evita estrecharlo a culto formal o a la idea de adorar solamente.'
- source_word: בְּכָל לְבָבְךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo tu ser interior
  - con toda tu mente y voluntad
  lexicon: HALOT
  rationale: «Corazón» es el equivalente español asentado para לֵבָב y puede abarcar voluntad, pensamiento e ինտención; mantiene el paralelismo del texto.
- source_word: וּבְכָל נַפְשֶׁךָ
  english_pob_choice: with all your soul
  chosen_spanish: con toda tu alma
  alternatives_spanish:
  - con toda tu vida
  - con todo tu ser
  lexicon: HALOT
  rationale: «Alma» preserva la resonancia bíblica y la fórmula totalizante «corazón y alma». Las alternativas se conservan porque נֶפֶשׁ también puede significar vida o ser.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se traduce el Tetragrámaton con un nombre propio españolizado que preserve la referencia personal del texto. Se evita «SEÑOR» como sustituto de máscara porque borraría el nombre revelado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de ירא en exhortación de alianza
  english_pob_reading: fear
  chosen_spanish_reading: temer
  alternative_spanish_readings:
  - reverenciar
  - sentir reverencia
  rationale: «Temer» conserva la tensión teológica entre temor reverente, awe y obediencia. No se suaviza a «reverenciar» porque eso puede diluir la gravedad del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension)
- issue: Alcance de נֶפֶשׁ
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  rationale: «Alma» mantiene la forma tradicional y el paralelismo con «corazón»; además, deja abierta la amplitud semántica de נֶפֶשׁ sin imponer una sola interpretación reductiva.
  doctrine_reference: DOCTRINE.md preserve lexical range
translation_notes:
  revision_awareness: El borrador sigue de cerca la evaluación de alta concordancia del audit trail inglés y no introduce revisiones sustantivas respecto del sentido base; conserva las tensiones léxicas documentadas en «pedir/requerir», «temer/reverenciar» y «alma/vida/ser».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el paralelismo «con todo tu corazón» / «con toda tu alma» como fórmula bíblica natural en español.
  - La sintaxis refleja el hebreo exhortativo sin calco rígido, pero sin añadir contenido interpretativo extra.
  - Los pronombres posesivos se ajustan al español para evitar repeticiones innecesarias y conservar fluidez.
