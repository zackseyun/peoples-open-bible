base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/007.yaml
  text: How can I forgive you for this? Your children have forsaken me and have sworn by those that are not gods[a]. When I had fed them to the full[b], they committed adultery and crowded into a prostitute’s house.
  footnotes:
  - marker: a
    text: Or 'I fed them to the full.' The Hebrew verb can denote causing to be full or satisfied; some have also connected it with oath language, but 'satisfied' best fits the context of divine provision followed by unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'they thronged to a prostitute’s house' / 'they gathered in bands at a prostitute’s house.'
    reason: lexical_alternative
