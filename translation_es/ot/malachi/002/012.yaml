  text: יַכְרֵ֨ת יְהוָ֜ה לָ/אִ֨ישׁ אֲשֶׁ֤ר יַעֲשֶׂ֨/נָּה֙ עֵ֣ר וְ/עֹנֶ֔ה מֵ/אָהֳלֵ֖י יַֽעֲקֹ֑ב וּ/מַגִּ֣ישׁ מִנְחָ֔ה לַֽ/יהוָ֖ה צְבָאֽוֹת׃פ
