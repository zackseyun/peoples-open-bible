revisions:
- from: Atando a la vid su asno[a], y a la vid escogida el potro de su asna, lava en vino sus vestidos, y en la sangre de uvas su manto[b][c].
  to: Atando a la vid su asno[a], y a la vid escogida[b] el pollino de su asna, lava en vino sus vestidos, y en la sangre de uvas[c] su manto.
  rationale: Se corrige 'potro' a 'pollino' para mantener la referencia específica a la cría del asno y evitar una asociación equina impropia. También se reubican los marcadores de nota para que correspondan exactamente a las expresiones que explican, conforme a las pautas del proyecto.
