translation:
  language: es
  text: Y los pueblos llegarán a ser como cal quemada; como espinos cortados[a], serán quemados en el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «se encenderán» o «serán encendidos». El verbo hebreo puede destacar tanto el prenderse como el ser consumidos por el fuego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And ... will become
  chosen_spanish: vendrán a ser
  alternatives_spanish:
  - serán
  - llegarán a ser
  lexicon: HALOT
  rationale: El hebreo con היה + predicado expresa cambio de estado; en español, «vendrán a ser» conserva mejor la idea de transformación que un simple «serán».
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y naciones
  lexicon: HALOT
  rationale: El plural עַמִּים se refiere a colectividades humanas. «Los pueblos» mantiene el plural y el alcance corporativo sin cargarlo con una interpretación más específica.
- source_word: מִשְׂרְפוֹת
  english_pob_choice: burnings
  chosen_spanish: quemas
  alternatives_spanish:
  - quemaduras
  - combustiones
  lexicon: HALOT
  rationale: El sustantivo es compacto y poético; «quemas» conserva la imagen de algo reducido por el fuego sin expandirla excesivamente. «Quemaduras» suena más corporal y «combustiones» más técnico.
- source_word: שִׂיד
  english_pob_choice: lime
  chosen_spanish: cal
  alternatives_spanish:
  - cal viva
  - yeso
  lexicon: HALOT
  rationale: En este contexto el término apunta a la cal producida por ardor intenso. «Cal» es la forma natural en español y mantiene la imagen de destrucción por fuego; «cal viva» explicita más de lo que el hebreo exige.
- source_word: מִשְׂרְפוֹת שִׂיד
  english_pob_choice: burnings of lime
  chosen_spanish: quemas de cal
  alternatives_spanish:
  - quemas de cal viva
  - ardores de cal
  lexicon: HALOT
  rationale: La construcción en hebreo es breve y metafórica; «quemas de cal» conserva la concisión y la relación entre fuego y cal sin convertirla en una paráfrasis explicativa.
- source_word: קוֹצִים
  english_pob_choice: thornbushes
  chosen_spanish: espinos
  alternatives_spanish:
  - zarzas
  - arbustos espinosos
  lexicon: HALOT
  rationale: Aunque el inglés explicita la imagen vegetal como thornbushes, el sustantivo hebreo literalmente es «espinos». «Espinos» preserva mejor el valor lexical y la brevedad poética.
- source_word: כְּסוּחִים
  english_pob_choice: cut
  chosen_spanish: cortados
  alternatives_spanish:
  - segados
  - talados
  lexicon: HALOT
  rationale: El participio pasivo expresa algo ya cortado o derribado. «Cortados» es el equivalente más directo y claro en español.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - por el fuego
  - con fuego
  lexicon: HALOT
  rationale: La preposición con artículo se entiende de modo locativo. «En el fuego» reproduce naturalmente la imagen de ser arrojados o consumidos dentro de las llamas.
- source_word: יִצַּתּוּ
  english_pob_choice: they will be burned
  chosen_spanish: serán quemados
  alternatives_spanish:
  - se encenderán
  - arderán
  lexicon: HALOT
  rationale: El verbo puede enfatizar prenderse o ser consumidos por el fuego. En el contexto de juicio con espinos, «serán quemados» comunica con claridad el resultado, sin borrar la posibilidad verbal de ignición.
translation_notes:
  revision_awareness: Se siguió el estado más reciente sin cambios sustanciales; la versión inglesa auditada mantiene la lectura de resultado de juicio y conserva la alternativa verbal en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se preservó la concisión poética del hebreo con una estructura breve y paralela.
  - No se sustituyó el léxico de fuego por explicaciones doctrinales o interpretativas ajenas al texto.
