  text: 'I also will do this to you: I will appoint over you sudden terror[a], wasting disease and fever, consuming the eyes and draining the life; and you will sow your seed in vain[c][b], and your enemies will eat it.'
  footnotes:
  - marker: a
    text: Or 'I will bring upon you sudden terror.' The Hebrew verb can carry the sense of imposing or bringing a judgment upon someone.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''consumption.'' The exact disease term is uncertain; the Hebrew likely refers more generally to a wasting illness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'causing the eyes to fail and the life to waste away.'
    reason: lexical_alternative
