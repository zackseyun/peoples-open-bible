translation:
  language: es
  text: El comienzo de las palabras de su boca es necedad, y el final de su habla es locura perversa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el final de su habla es locura perjudicial». El hebreo repite literalmente «su boca», y רָעָה puede entenderse como «perversa» en sentido moral o más ampliamente como «perjudicial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחִלַּת
  english_pob_choice: the beginning of
  chosen_spanish: el comienzo de
  alternatives_spanish:
  - el principio de
  - el inicio de
  lexicon: HALOT
  rationale: La forma constructa expresa 'comienzo de'. 'El comienzo de' conserva la relación nominal de manera natural en español y mantiene el paralelismo con 'el final de'.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - las expresiones de
  lexicon: HALOT
  rationale: El plural constructo aquí se refiere a palabras habladas. 'Palabras' es directo y fiel al campo semántico de habla concreta.
- source_word: פִּיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca misma
  - su boca literal
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal del hebreo. En español 'boca' es más natural que 'su boca' repetido con 'habla', aunque el hebreo repite 'boca' de forma enfática.
- source_word: סִכְלוּת
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  lexicon: HALOT
  rationale: En español bíblico y actual 'necedad' comunica bien la insensatez moral e intelectual de Qohelet, sin recargar más de lo que exige el contexto.
- source_word: וְאַחֲרִית
  english_pob_choice: and the end of
  chosen_spanish: y el final de
  alternatives_spanish:
  - y el resultado de
  - y el desenlace de
  lexicon: HALOT
  rationale: '''Final'' mantiene el paralelismo con ''comienzo'' y puede abarcar tanto término temporal como resultado final.'
- source_word: פִּיהוּ
  english_pob_choice: his mouth / his speech
  chosen_spanish: su habla
  alternatives_spanish:
  - su boca
  - su discurso
  lexicon: HALOT
  rationale: Aunque el hebreo repite literalmente 'su boca', el audit trail permite suavizar a 'speech' por naturalidad. 'Habla' conserva el carácter oral y evita una repetición demasiado áspera en español.
- source_word: הוֹלֵלוּת
  english_pob_choice: evil madness
  chosen_spanish: locura
  alternatives_spanish:
  - demencia
  - desvarío
  lexicon: HALOT
  rationale: El término intensifica la idea de irracionalidad extrema. 'Locura' es la opción más comprensible y mantiene esa intensificación, sin añadir matices clínicos ajenos.
- source_word: רָעָה
  english_pob_choice: evil / harmful
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perjudicial
  lexicon: HALOT
  rationale: El adjetivo puede ser 'evil' o 'harmful'. En español, 'mala' preserva la ambigüedad entre daño y mal moral, como lo hace la nota inglesa.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió ''his mouth'' al final por ''his speech'' para mayor naturalidad, manteniendo el hebreo repetido de ''mouth'' como base idiomática. La propuesta española sigue esa misma decisión: conserva la imagen literal al inicio (''boca'') y usa un equivalente más natural al final (''habla'') sin perder el paralelismo ni la tensión léxica de רָעָה.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otros términos de enmascaramiento porque el versículo no contiene el nombre divino.
  - Se prefiere 'necedad' frente a 'foolishness' para un registro bíblico claro y moderno.
  - Se mantiene una sola nota textual/lexical porque la principal tensión del verso está en la repetición literal de 'boca' y en el alcance de רָעָה.
  - '''Habla'' traduce el segundo פִּיהוּ con flexibilidad controlada; no se intenta uniformar mecánicamente ambas ocurrencias para no oscurecer el paralelismo hebreo ni forzar una repetición antinatural en español.'
