  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: perturbación de los dos, caída en señal de postración física y causa explícita de miedo. Sin embargo, «cayeron rostro en tierra» omite el posesivo implícito en ἐπὶ πρόσωπον / inglés «on their faces» y suena algo calcado en español; una formulación más natural y fiel es «cayeron sobre sus rostros» o «cayeron con el rostro en tierra».'
  spanish_quality_summary: «Se turbaron los dos» y «porque tuvieron miedo» son claros y naturales. El punto principal a corregir es la locución «cayeron rostro en tierra», que resulta poco idiomática en español bíblico contemporáneo y menos precisa que la imagen griega. «Cayeron sobre sus rostros» mantiene dignidad y claridad sin introducir lenguaje de adoración.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. Las decisiones «se turbaron» para ἐταράχθησαν y «tuvieron miedo» para ἐφοβήθησαν son adecuadas. Conviene ajustar solo la expresión de ἔπεσον ἐπὶ πρόσωπον para mejor fidelidad e inteligibilidad.
