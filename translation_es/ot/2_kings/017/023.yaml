translation:
  language: es
  text: hasta que Yahvé apartó a Israel de delante de él[a], tal como había hablado por medio de todos sus siervos, los profetas[b], e Israel fue exiliado de su tierra a Asiria, hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: "de su presencia". El hebreo dice literalmente "de delante de su rostro", un modismo para ser quitado de delante de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "por la mano de". La expresión hebrea señala mediación o instrumento: Yahvé habló por medio de sus siervos, los profetas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino YHWH. En español, 'Yahvé' conserva la referencia propia del nombre sin sustituirlo por un título.
- source_word: הֵסִיר
  english_pob_choice: removed
  chosen_spanish: removió
  alternatives_spanish:
  - quitó
  - apartó
  - alejó
  lexicon: HALOT
  rationale: El hifil de סור expresa causar que algo se vaya o se aparte. 'Removió' comunica bien esa acción de desplazamiento sin añadir la idea específica de destierro en la primera cláusula.
- source_word: מֵעַל פָּנָיו
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - de delante de su rostro
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo espacial y judicial. 'De delante de él' refleja bien la relación personal y formal del hebreo, y evita una literalidad menos natural como 'de delante de su rostro'.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as he had spoken
  chosen_spanish: tal como había hablado
  alternatives_spanish:
  - como había dicho
  - según había hablado
  lexicon: HALOT
  rationale: Se conserva el sentido de cumplimiento profético. 'Había hablado' mantiene el valor verbal de דִּבֶּר y suena natural en español.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - por intermediación de
  lexicon: HALOT
  rationale: Aunque la imagen literal es 'por la mano de', en español 'por medio de' transmite la instrumentación profética de forma clara y digna, sin perder la agencia divina.
- source_word: עֲבָדָיו הַנְּבִיאִים
  english_pob_choice: his servants the prophets
  chosen_spanish: sus siervos, los profetas
  alternatives_spanish:
  - sus siervos, los profetas
  - sus siervos profetas
  lexicon: HALOT
  rationale: 'Se conserva la apposición: los profetas son llamados siervos de Yahvé. ''Siervos'' mantiene el valor relacional del hebreo y evita neutralizarlo con ''mensajeros''.'
- source_word: וַיִּגֶל
  english_pob_choice: was exiled
  chosen_spanish: fue exiliado
  alternatives_spanish:
  - fue llevado cautivo
  - salió al exilio
  lexicon: HALOT
  rationale: El verbo גלה en este contexto se refiere al traslado/deportación del pueblo. 'Fue exiliado' expresa el pasivo histórico con claridad y sin añadir un agente explícito que el hebreo no destaca aquí.
- source_word: אַדְמָתוֹ
  english_pob_choice: its land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su suelo
  - su territorio
  lexicon: HALOT
  rationale: Con Israel como sujeto colectivo, 'su tierra' es la manera más natural y fiel en español para el territorio nacional.
- source_word: אַשּׁוּרָה
  english_pob_choice: to Assyria
  chosen_spanish: a Asiria
  alternatives_spanish:
  - hacia Asiria
  - en dirección a Asiria
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Asiria. 'A Asiria' preserva la sencillez del hebreo y es idiomático en español.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la fórmula temporal hebrea habitual. 'Hasta el día de hoy' mantiene el tono bíblico sin sonar arcaico.
theological_decisions:
- issue: El sentido judicial de מֵעַל פָּנָיו aplicado a la remoción de Israel
  english_pob_reading: from before him
  chosen_spanish_reading: de delante de él
  alternative_spanish_readings:
  - de su presencia
  - de delante de su rostro
  rationale: La frase no solo indica ubicación, sino expulsión de la esfera relacional de Yahvé. 'De delante de él' conserva el peso relacional y judicial del hebreo sin forzar una interpretación doctrinal añadida.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La agencia divina mediante los profetas en בְּיַד כָּל עֲבָדָיו הַנְּבִיאִים
  english_pob_reading: by the hand of all his servants the prophets
  chosen_spanish_reading: por medio de todos sus siervos, los profetas
  alternative_spanish_readings:
  - por la mano de todos sus siervos, los profetas
  - mediante todos sus siervos, los profetas
  rationale: El hebreo usa una metáfora de instrumento/mediación. En español, 'por medio de' comunica la misma función sin perder claridad, mientras que una traducción literal con 'mano' podría sonar rígida.
  doctrine_reference: 'DOCTRINE.md: Prophetic mediation and divine speech'
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del audit trail, que prefirió una forma más natural para מֵעַל פָּנָיו. En español se optó por 'de delante de él', manteniendo la relación personal y judicial del hebreo. También se reflejó la equivalencia funcional de בְּיַד con 'por medio de' para una lectura publicable y clara.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - '''Siervos'' se conservó para עֲבָדָיו, siguiendo la fuerza relacional del hebreo.'
  - '''Exiliado'' traduce el pasivo histórico de וַיִּגֶל sin añadir matices no explícitos.'
  - La fórmula final 'hasta el día de hoy' reproduce el hebraísmo temporal de cierre.
