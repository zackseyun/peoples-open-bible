    text: Lit. «No será cortado para ti un hombre de delante de mí que se siente sobre el trono de Israel».
    reason: lexical_alternative
  revision_rationale: Se adopta como texto principal la formulación idiomática y fiel al sentido dinástico ya establecida en la auditoría inglesa («No te faltará un hombre...»), porque en español comunica claramente el hebraísmo לֹא יִכָּרֵת לְךָ אִישׁ. Se mantiene la literalidad hebrea relevante en una nota, ahora correctamente anclada en la cláusula correspondiente. También se elimina una nota innecesaria y se preservan las demás decisiones léxicas sólidas del borrador.
