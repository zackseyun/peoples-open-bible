translation:
  language: es
  text: Entonces Salomón se sentó en el trono de Yahvé como rey, en lugar de David su padre, y prosperó, y todo Israel le escuchó.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se asentó
  - fue entronizado
  lexicon: HALOT
  rationale: El verbo ישב es concretamente ‘sentarse’ y, en contexto real, puede implicar entronización. ‘Se sentó’ conserva la imagen verbal hebrea sin forzar una paráfrasis más interpretativa que el texto no exige.
- source_word: כִּסֵּא יְהוָה
  english_pob_choice: the throne of Yahweh
  chosen_spanish: el trono de Yahvé
  alternatives_spanish:
  - el trono de Yahvé
  - el trono de Yahvé mismo
  lexicon: HALOT
  rationale: Se conserva la construcción posesiva directa del hebreo. ‘Yahvé’ traduce el nombre divino según la convención del proyecto, y ‘trono de Yahvé’ mantiene la afirmación teológica del reinado bajo autoridad divina sin suavizarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa la forma española establecida por el proyecto para el Tetragrámaton, en lugar de un título sustitutivo.
- source_word: לְמֶלֶךְ
  english_pob_choice: as king
  chosen_spanish: como rey
  alternatives_spanish:
  - para rey
  - para ser rey
  lexicon: HALOT
  rationale: La preposición ל con este sustantivo marca función o cargo. ‘Como rey’ es natural en español y refleja la investidura real.
- source_word: תַּחַת דָּוִיד אָבִיו
  english_pob_choice: in place of David his father
  chosen_spanish: en lugar de David su padre
  alternatives_spanish:
  - después de David su padre
  - bajo David su padre
  lexicon: HALOT
  rationale: תחת en contextos de sucesión expresa reemplazo, no solo posterioridad temporal. ‘En lugar de’ conserva con claridad la idea dinástica de sustitución.
- source_word: וַיַּצְלַח
  english_pob_choice: he prospered
  chosen_spanish: prosperó
  alternatives_spanish:
  - tuvo éxito
  - le fue bien
  lexicon: HALOT
  rationale: El verbo צלח en este contexto comunica avance exitoso bajo favor divino. ‘Prosperó’ es breve y fiel, sin reducirlo a simple éxito humano.
- source_word: וַיִּשְׁמְעוּ אֵלָיו
  english_pob_choice: listened to him
  chosen_spanish: lo escuchó
  alternatives_spanish:
  - lo obedeció
  - lo atendió
  - le hizo caso
  lexicon: HALOT
  rationale: שמע אל puede abarcar escucha atenta y obediencia. Dado que el texto hebreo usa la forma de ‘escuchar’ y el inglés POB retuvo esa elección en la revisión final, ‘lo escuchó’ preserva la ambigüedad significativa sin decidir de modo excesivo por ‘obedecer’.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - toda Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión colectiva estándar del hebreo. ‘Todo Israel’ es la forma más natural y reconocible en español bíblico contemporáneo.
theological_decisions:
- issue: El significado de ‘el trono de Yahvé’ aplicado a la realeza de Salomón
  english_pob_reading: Retain the phrase as written, indicating that Solomon's royal throne is understood as the LORD's throne in a representative/theocratic sense.
  chosen_spanish_reading: Mantener ‘el trono de Yahvé’ tal cual, indicando que el trono real de Salomón se entiende en sentido representativo y teocrático.
  alternative_spanish_readings:
  - el trono que pertenecía a Yahvé
  - el trono real bajo Yahvé
  - un trono meramente político
  rationale: El cronista presenta el reinado davídico como ejercicio de la autoridad de Yahvé y bajo ella. La traducción debe conservar esa afirmación sin rebajarla a una fórmula política genérica ni reescribirla con una explicación interpretativa no presente en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6; Contested terms table for יְהוָה
- issue: El alcance de שׁמע אל en el cierre de la versículo
  english_pob_reading: ‘listened to him’ / ‘heeded him’; the Hebrew can denote hearing attentively, but in this royal context it carries the sense of obedience.
  chosen_spanish_reading: ‘lo escuchó’, preservando la posibilidad semántica de atención obediente en el contexto real.
  alternative_spanish_readings:
  - lo obedeció
  - le hizo caso
  - lo atendió
  rationale: En español, ‘escuchar’ conserva mejor la superficie del hebreo y deja abierta la fuerza contextual de sumisión. ‘Obedeció’ sería legítimo en sentido contextual, pero endurecería la frase más de lo que el hebreo exige en forma directa.
  doctrine_reference: Translation philosophy §§1, 4; lexical note on שׁמע אל
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de ‘obeyed him’ a ‘listened to him’ para reflejar con mayor cercanía שׁמע אל sin perder naturalidad. La redacción española sigue esa revisión y evita adelantar la interpretación a ‘obedeció’, aunque reconoce que el contexto real puede implicarla.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, de acuerdo con la terminología del proyecto.
  - Se conserva ‘el trono de Yahvé’ sin paráfrasis, por su carga teológica.
  - Se usa ‘lo escuchó’ para reproducir la formulación hebrea y la decisión final del POB inglés.
  - La estructura sintáctica sigue el orden narrativo del original sin hacerla artificial en español.
