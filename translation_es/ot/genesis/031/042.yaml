translation:
  language: es
  text: Si no hubiera estado conmigo el Dios de mi padre, el Dios de Abraham y el Temor de Isaac[a], ya me habrías enviado lejos con las manos vacías. Dios vio mi aflicción y el trabajo de mis manos, y dio su fallo anoche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que inspira temor a Isaac». El hebreo dice literalmente «el Temor de Isaac», un título distintivo para Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  english_pob_choice: If ... had not
  chosen_spanish: Si no hubiera estado
  alternatives_spanish:
  - De no haber estado
  - Si no hubiera sido
  lexicon: HALOT
  rationale: Expresa bien la condición contrafactual en español natural, manteniendo el sentido de una situación no realizada.
- source_word: אֱלֹהֵי אָבִי
  english_pob_choice: the God of my father
  chosen_spanish: el Dios de mi padre
  alternatives_spanish:
  - mi Dios paterno
  - el Dios de mi padre
  lexicon: HALOT
  rationale: La construcción posesiva se vuelve de forma transparente y natural en español, conservando la referencia al linaje y pacto familiar.
- source_word: אֱלֹהֵי אַבְרָהָם
  english_pob_choice: the God of Abraham
  chosen_spanish: el Dios de Abraham
  alternatives_spanish:
  - el Dios de Abrahán
  lexicon: HALOT
  rationale: Traducción directa y establecida del título, sin perder la relación covenantal con Abraham.
- source_word: וּפַחַד יִצְחָק
  english_pob_choice: the Fear of Isaac
  chosen_spanish: el Temor de Isaac
  alternatives_spanish:
  - el Miedo de Isaac
  - el que inspira temor a Isaac
  - el Dios temido por Isaac
  lexicon: HALOT
  rationale: Se conserva el giro hebreo distintivo como título divino. 'Temor' mantiene mejor la ambigüedad reverencial que 'miedo', y evita resolver prematuramente la expresión en una paráfrasis.
- source_word: הָיָה לִי
  english_pob_choice: had been with me
  chosen_spanish: hubiera estado conmigo
  alternatives_spanish:
  - hubiera sido para mí
  - hubiera estado de mi parte
  lexicon: HALOT
  rationale: En español, 'estar conmigo' comunica la presencia y apoyo divinos sin sobreexplicar la idiomática hebrea.
- source_word: כִּי עַתָּה
  english_pob_choice: surely by now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - ciertamente ahora
  lexicon: HALOT
  rationale: En el contexto contrafactual, el valor temporal de consecuencia se expresa con 'ahora', apoyado por el verbo en condicional perfecto; añadir más intensificación sería redundante.
- source_word: רֵיקָם
  english_pob_choice: empty-handed
  chosen_spanish: con las manos vacías
  alternatives_spanish:
  - sin nada
  - vacío
  lexicon: HALOT
  rationale: Equivalente idiomático natural en español que transmite despedida sin bienes ni compensación.
- source_word: שִׁלַּחְתָּנִי
  english_pob_choice: you would have sent me away
  chosen_spanish: me habrías despedido
  alternatives_spanish:
  - me habrías enviado lejos
  - me habrías echado
  lexicon: HALOT
  rationale: '''Despedir'' funciona bien en el contexto de dejar partir o expulsar, y evita una expresión demasiado literal y rígida.'
- source_word: עָנְיִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi miseria
  - mi penuria
  - mi sufrimiento
  lexicon: HALOT
  rationale: '''Aflicción'' conserva el peso de la experiencia adversa de Jacob sin reducirlo solo a pobreza económica.'
- source_word: יְגִיעַ כַּפַּי
  english_pob_choice: the labor of my hands
  chosen_spanish: el trabajo de mis manos
  alternatives_spanish:
  - el esfuerzo de mis manos
  - la labor de mis manos
  lexicon: HALOT
  rationale: Expresión idiomática clara y natural en español; mantiene la imagen del trabajo realizado personalmente.
- source_word: רָאָה אֱלֹהִים
  english_pob_choice: God saw
  chosen_spanish: Dios vio
  alternatives_spanish:
  - Dios ha visto
  lexicon: HALOT
  rationale: El pasado simple encaja con la secuencia narrativa y conserva la inmediatez del testimonio.
- source_word: וַיּוֹכַח
  english_pob_choice: and he judged
  chosen_spanish: y juzgó
  alternatives_spanish:
  - y reprochó
  - y reprendió
  - y resolvió
  lexicon: HALOT
  rationale: '''Juzgó'' preserva la ambigüedad jurídico-reivindicativa del verbo, tal como quedó en la revisión inglesa más literal. En este contexto sugiere que Dios intervino en favor de Jacob y contra la conducta de Labán.'
- source_word: אָמֶשׁ
  english_pob_choice: last night
  chosen_spanish: anoche
  alternatives_spanish:
  - la noche pasada
  - la noche anterior
  lexicon: HALOT
  rationale: Equivalente temporal natural y preciso en español moderno.
theological_decisions:
- issue: Título divino hebreo וּפַחַד יִצְחָק
  english_pob_reading: the Fear of Isaac
  chosen_spanish_reading: el Temor de Isaac
  alternative_spanish_readings:
  - el Dios temido por Isaac
  - el que inspira temor a Isaac
  - el Miedo de Isaac
  rationale: Se mantiene el título inusual sin convertirlo en explicación. 'Temor' conserva la tensión lexical y reverencial del hebreo; además, permite que el lector perciba que se trata de una designación singular de Dios vinculada a Isaac.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de וַיּוֹכַח al final del versículo
  english_pob_reading: he judged last night
  chosen_spanish_reading: y juzgó anoche
  alternative_spanish_readings:
  - y reprendió anoche
  - y reprochó anoche
  - y decidió anoche
  rationale: 'La revisión inglesa reciente prefirió ''judged'' por ser más literal y no añadir objeto explícito. En español, ''juzgó'' reproduce esa amplitud: puede implicar reprobación, vindicación o decisión en el conflicto, sin cerrar indebidamente el sentido.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB, que ajustó el final de 'rebuked you' a 'judged' para reflejar de modo más literal וַיּוֹכַח sin objeto explícito. También conservé la puntuación que separa con comas el sintagma 'el Dios de mi padre, el Dios de Abraham y el Temor de Isaac'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y no se introduce 'SEÑOR', conforme al texto fuente.
  - '''Temor de Isaac'' conserva el paralelismo y la rareza del hebreo; la nota aclara la alternativa interpretativa.'
  - '''Juzgó'' evita añadir un objeto implícito y conserva la amplitud semántica del verbo en el contexto narrativo.'
  - Se usa español moderno y eclesialmente legible sin recurrir a arcaísmos innecesarios.
