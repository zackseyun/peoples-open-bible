revisions:
- from: Entonces Barac convocó a Zabulón y a Neftalí a Quedes[a], y diez mil hombres subieron siguiendo[b] sus pasos, y Débora subió con él.
  to: Entonces Barac convocó a Zabulón y a Neftalí a Quedes, y diez mil hombres subieron tras él[a], y Débora subió con él.
  rationale: Se eliminó la nota innecesaria sobre el he direccional y se reemplazó 'siguiendo sus pasos' por 'tras él' para expresar de manera más sobria y exacta el modismo hebreo en contexto militar, preservando la alternativa literal en nota. El resto del versículo está bien logrado y no requiere cambios.
