translation:
  language: es
  text: 'Él dijo[a]: «Bien. Haré un pacto contigo. Solo una cosa te pido: no verás mi rostro[b] a menos que primero me traigas a Mical, hija de Saúl, cuando vengas a ver mi rostro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Muy bien».
    reason: lexical_alternative
  - marker: b
    text: 'O, «comparecerás ante mí». El hebreo literalmente dice: «ver mi rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Good
  chosen_spanish: Bien
  alternatives_spanish:
  - Bueno
  - De acuerdo
  lexicon: HALOT
  rationale: Como respuesta breve de asentimiento, «Bien» comunica aprobación inmediata con naturalidad en español y conserva la concisión del hebreo sin añadir matices ajenos.
- source_word: אֶכְרֹת ... בְּרִית
  english_pob_choice: I will make a covenant
  chosen_spanish: Haré un pacto
  alternatives_spanish:
  - Haré un convenio
  - Cortaré un pacto
  lexicon: HALOT
  rationale: El hebreo literalmente dice «cortaré un pacto», pero en español «haré un pacto» preserva el sentido formal y pactal sin sonar forzado. «Pacto» mantiene mejor la carga teológica que «convenio».
- source_word: אַךְ דָּבָר אֶחָד
  english_pob_choice: Only one thing
  chosen_spanish: Solo una cosa
  alternatives_spanish:
  - Pero una cosa
  - Sin embargo, una cosa
  lexicon: HALOT
  rationale: «אַךְ» introduce una restricción/exceptiva; «Solo una cosa» transmite de manera idiomática que hay una condición única, sin perder la fuerza limitadora.
- source_word: שֹׁאֵל מֵאִתְּךָ
  english_pob_choice: I ask of you
  chosen_spanish: te pido
  alternatives_spanish:
  - te solicito
  - te requiero
  lexicon: HALOT
  rationale: El participio expresa una petición presente. «Te pido» es la forma más natural y exacta en español; «requiero» sería demasiado fuerte para el contexto.
- source_word: לֹא תִרְאֶה אֶת פָּנַי
  english_pob_choice: You shall not see my face
  chosen_spanish: no verás mi rostro
  alternatives_spanish:
  - no me verás
  - no comparecerás ante mí
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «rostro» para mantener el matiz de acceso/presencia ante el rey. «No me verás» pierde esa textura; «no comparecerás ante mí» explicita demasiado la idiomática.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: hasta que
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: HALOT
  rationale: En este contexto, la secuencia temporal-condicional funciona de manera natural en español con «hasta que primero», que refleja la prioridad exigida antes del encuentro.
- source_word: מִיכַל בַּת שָׁאוּל
  english_pob_choice: Michal, Saul’s daughter
  chosen_spanish: Mical, hija de Saúl
  alternatives_spanish:
  - Mical, la hija de Saúl
  - Mical, la hija de Saúl
  lexicon: HALOT
  rationale: Se usa «Mical» por transliteración habitual en español bíblico, y «hija de Saúl» reproduce la identificación appositiva del hebreo de modo claro y fiel.
- source_word: בְּבֹאֲךָ לִרְאוֹת אֶת פָּנָי
  english_pob_choice: when you come to see my face
  chosen_spanish: cuando vengas a ver mi rostro
  alternatives_spanish:
  - cuando vengas a verme
  - cuando llegues para ver mi rostro
  lexicon: HALOT
  rationale: Se mantiene la repetición de «mi rostro» para conservar la cohesión del hebreo y la relación de audiencia/presencia. «Vengas a verme» sería más natural, pero borra la metáfora preservada por la POB inglesa.
theological_decisions:
- issue: Preservación de la metáfora de «ver mi rostro» como acceso/presencia ante el rey
  english_pob_reading: The Hebrew literally says, “see my face.”
  chosen_spanish_reading: «ver mi rostro»
  alternative_spanish_readings:
  - «comparecer ante mí»
  - «presentarte ante mí»
  rationale: La frase hebrea usa un modismo de presencia ante una autoridad. La POB inglesa retuvo «see my face»; en español se conserva «rostro» para no borrar la imagen ni suavizarla prematuramente. La alternativa interpretativa puede anotarse, pero no sustituye el texto principal.
  doctrine_reference: Uso bíblico de lenguaje real/cortesano; cf. la idiomaticidad de audiencia/presencia en la Escritura.
translation_notes:
  revision_awareness: La traducción inglesa pasó de «Only I ask one thing of you» a «Only one thing I ask of you» por naturalidad; en español se refleja esa misma fluidez con «Solo una cosa te pido», manteniendo el orden idiomático sin perder la restricción singular. También se preservó la decisión revisada de mantener la metáfora de «see my face».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no se presenta.
  - Se eligió «pacto» y no «alianza» por coherencia con la formulación lexical del pasaje y la tradición auditada de la POB.
  - «Rostro» se mantiene de forma consistente para la metáfora hebrea de presencia; la nota ofrece la alternativa interpretativa.
  - Se emplea «Mical» como forma española habitual del nombre propio bíblico.
