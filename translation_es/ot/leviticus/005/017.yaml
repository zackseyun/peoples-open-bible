  text: וְ/אִם נֶ֨פֶשׁ֙ כִּ֣י תֶֽחֱטָ֔א וְ/עָֽשְׂתָ֗ה אַחַת֙ מִ/כָּל מִצְוֺ֣ת יְהוָ֔ה אֲשֶׁ֖ר לֹ֣א תֵעָשֶׂ֑ינָה וְ/לֹֽא יָדַ֥ע וְ/אָשֵׁ֖ם וְ/נָשָׂ֥א עֲוֺנֽ/וֹ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/017.yaml
  text: And if a person sins and does any one of all the things that by Yahweh’s commandments must not be done[a], though he did not know it[b], then he is guilty and shall bear his iniquity.
  footnotes:
  - marker: a
    text: Or 'is guilty' / 'incurs guilt'; the Hebrew term can denote becoming liable for guilt as a result of the offense.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall bear his guilt.' The Hebrew idiom 'bear his iniquity' can refer to carrying the liability or consequence of wrongdoing.
    reason: lexical_alternative
