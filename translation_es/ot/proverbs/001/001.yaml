translation:
  language: es
  text: 'Los proverbios de Salomón[a], hijo de David, rey de Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichos» o «sentencias proverbiales». El hebreo מָשָׁל puede designar un proverbio, una máxima o una sentencia sapiencial; «proverbios» encaja mejor con el título del libro y con este encabezado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁלֵי
  english_pob_choice: proverbs
  chosen_spanish: proverbios
  alternatives_spanish:
  - dichos
  - sentencias
  - dichos proverbiales
  lexicon: HALOT
  rationale: El plural constructo de מָשָׁל introduce una colección sapiencial y funciona como encabezado del libro. «Proverbios» es el equivalente natural en español para el título y conserva mejor la función de rúbrica que opciones más descriptivas como «dichos» o «sentencias».
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: Convención estándar de nombres propios
  rationale: Nombre propio; en español bíblico estándar se usa «Salomón».
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La relación constructa expresa de manera directa filiación; «hijo de» reproduce con naturalidad la apposición genealógica del encabezado. «Descendiente de» sería posible, pero atenúa el sentido directo del hebreo.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Convención estándar de nombres propios
  rationale: Nombre propio; se conserva la forma castellana usual «David».
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Sustantivo común en aposición al linaje de Salomón; «rey de Israel» suena natural en español y mantiene el valor titular del hebreo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Convención estándar de nombres propios
  rationale: Nombre propio de la nación/reino; se mantiene «Israel».
translation_notes:
  revision_awareness: El texto inglés revisado añadió una coma tras Solomon para reflejar mejor la aposición natural («Solomon, son of David»). La versión española también la refleja con una coma tras «Salomón».
  spanish_consistency_notes:
  - Se conservó el orden nominal del encabezado bíblico para mantener el tono de título y superscripción.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes porque el versículo no contiene el tetragrámaton ni un equivalente divino.
  - La puntuación final con dos puntos reproduce el carácter de encabezado introductorio del hebreo y del inglés auditado.
