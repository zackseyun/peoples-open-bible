translation:
  language: es
  text: Levántate, Jerusalén, y ponte sobre la altura, y mira hacia el oriente, y ve a tus hijos e hijas reunidos desde la puesta del sol hasta su salida, a la palabra[a] del Santo, regocijándose en el recuerdo de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la palabra del Santo». El dativo τῷ ῥήματι puede entenderse instrumentalmente.
    reason: lexical_alternative
  - marker: b
    text: O «porque Dios los recordó» o «en memoria de Dios». La frase griega es compacta y puede aludir tanto al recuerdo de Dios de su pueblo como al recuerdo del pueblo de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνάστηθι
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántate y alzate
  - Levántate
  lexicon: LSJ
  rationale: El imperativo aoristo llama a Jerusalén a actuar. «Levántate» comunica el impulso y suena natural en español sin perder la fuerza exhortativa.
- source_word: στῆθι ἐπὶ τοῦ ὑψηλοῦ
  english_pob_choice: stand on the height
  chosen_spanish: ponte sobre la altura
  alternatives_spanish:
  - ponte en la altura
  - mantente sobre la altura
  lexicon: LSJ
  rationale: La frase griega es general y de punto de vista elevado. «La altura» conserva la idea de un lugar elevado sin añadir «monte» o «lugar alto» de manera innecesaria.
- source_word: περίβλεψαι πρὸς ἀνατολάς
  english_pob_choice: look toward the east
  chosen_spanish: mira hacia el oriente
  alternatives_spanish:
  - mira hacia el este
  - mira al oriente
  lexicon: LSJ
  rationale: «Oriente» es una equivalencia natural y digna para la dirección solar del griego. Evita una calca rígida y mantiene la imagen direccional.
- source_word: συνηγμένα τὰ τέκνα
  english_pob_choice: your children gathered
  chosen_spanish: tus hijos reunidos
  alternatives_spanish:
  - tus hijos congregados
  - tus hijos congregados y reunidos
  lexicon: LSJ
  rationale: El participio perfecto pasivo expresa un estado ya alcanzado. «Reunidos» comunica bien el resultado sin forzar matices adicionales; «hijos» refleja τέκνα en español bíblico amplio.
- source_word: ἀπὸ ἡλίου δυσμῶν ἕως ἀνατολῶν
  english_pob_choice: from the setting of the sun to its rising
  chosen_spanish: desde la puesta del sol hasta su salida
  alternatives_spanish:
  - desde el ocaso hasta la aurora
  - de la puesta del sol a su salida
  lexicon: LSJ
  rationale: Se conserva la imagen solar concreta del griego. «Puesta del sol» y «su salida» reproducen el arco completo sin reducirlo a puntos cardinales.
- source_word: τῷ ῥήματι
  english_pob_choice: at the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - por mandato
  - a la palabra
  lexicon: LSJ
  rationale: El dativo puede ser instrumental. «Por la palabra» mantiene el sentido de medio/causa y suena más natural que una construcción demasiado literal.
- source_word: τοῦ ἁγίου
  english_pob_choice: the Holy One
  chosen_spanish: del Santo
  alternatives_spanish:
  - del Santo Dios
  - del Santo Uno
  lexicon: LSJ
  rationale: «El Santo» preserva el título reverencial del griego sin añadir «Dios» donde el texto no lo dice explícitamente. En español, la forma sustantivada es clara y sobria.
- source_word: χαίροντες
  english_pob_choice: rejoicing
  chosen_spanish: gozándose
  alternatives_spanish:
  - regocijándose
  - alegrándose
  lexicon: LSJ
  rationale: El participio describe el estado de los hijos reunidos. «Gozándose» mantiene la acción en curso y el tono celebrativo.
- source_word: τῇ τοῦ θεοῦ μνείᾳ
  english_pob_choice: in the remembrance of God
  chosen_spanish: en el recuerdo de Dios
  alternatives_spanish:
  - porque Dios los recordó
  - en el recuerdo de Dios
  lexicon: LSJ
  rationale: 'La expresión es compacta y ambigua: puede leerse como el recuerdo de Dios o el recuerdo dirigido a Dios. «En el recuerdo de Dios» conserva esa tensión sin resolverla demasiado pronto.'
theological_decisions:
- issue: Ambigüedad de τῇ τοῦ θεοῦ μνείᾳ
  english_pob_reading: A deliberately ambiguous phrase rendered 'in the remembrance of God'
  chosen_spanish_reading: «en el recuerdo de Dios» mantiene la ambigüedad entre el recuerdo de Dios y el recuerdo de Dios por parte del pueblo
  alternative_spanish_readings:
  - porque Dios los recordó
  - en memoria de Dios
  - recordando a Dios
  rationale: El griego permite una lectura subjetiva u objetiva. Siguiendo el principio de preservar la tensión teológica, la versión española no cierra la frase en una sola interpretación.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del inglés POB: «look toward the east» en vez de una expresión más amplia de tipo «look around». En español se refleja con «mira hacia el oriente», manteniendo la dirección precisa y la imaginería solar del griego. También se conserva la ambigüedad de τῇ τοῦ θεοῦ μνείᾳ, como exige el audit trail.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en este proyecto, pero aquí el texto griego dice θεοῦ y ἁγίου; por eso se traduce «Dios» y «el Santo» sin introducir el nombre divino.
  - Se mantiene «hijos» para τέκνα, en línea con el valor inclusivo amplio del término y con el uso bíblico en español.
  - La elección de «oriente» responde al registro poético y litúrgico del pasaje, sin cambiar el sentido direccional del griego.
