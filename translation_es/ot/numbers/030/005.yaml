base_translation:
  language: en
  yaml_path: translation/ot/numbers/030/005.yaml
  text: And if her father hears her vow[a], or her binding obligation by which she has bound herself, and her father says nothing to her, then all her vows shall stand[b], and every binding obligation by which she has bound herself shall stand.
  footnotes:
  - marker: a
    text: Or 'bond' or 'binding pledge' for 'binding obligation' (Hebrew אִסָּר), a term distinct from 'vow' though closely related.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and her father is silent to her.' The silence signifies non-objection, so the vows remain valid.
    reason: lexical_alternative
