translation:
  language: es
  text: Mira, Rebeca está delante de ti. Tómala y vete, y que sea[a] la esposa del hijo de tu señor, tal como Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse «y que llegue a ser la esposa del hijo de tu señor». El jussivo hebreo puede expresarse en español como «sea» o «llegue a ser»; aquí se prefirió la forma más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata a la escena. «Mira» conserva la vivacidad del inglés POB «Look» en un español natural y reverente, sin caer en un calco arcaizante.
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebecca
  lexicon: Transliteración estándar del nombre hebreo
  rationale: Se mantiene el nombre propio en forma española usual y readable, equivalente funcional de la transliteración inglesa usada por el POB.
- source_word: לְפָנֶיךָ
  english_pob_choice: is before you
  chosen_spanish: está delante de ti
  alternatives_spanish:
  - está ante ti
  - está frente a ti
  - está delante de ti
  lexicon: HALOT
  rationale: La frase expresa presencia/disponibilidad inmediata. «Delante de ti» conserva el sentido formal de «before you» y su matiz de disponibilidad, mientras que «está» hace natural la sintaxis española.
- source_word: קַח וָלֵךְ
  english_pob_choice: Take her and go
  chosen_spanish: Tómala y vete
  alternatives_spanish:
  - Toma y ve
  - Tómala y anda
  - Toma y váyate
  lexicon: HALOT
  rationale: Son dos imperativos secuenciales. En español se explicita el objeto implícito con «-la» por claridad contextual, como hace el POB en inglés con «her».
- source_word: וּתְהִי אִשָּׁה
  english_pob_choice: and let her be the wife
  chosen_spanish: y que sea la esposa
  alternatives_spanish:
  - y que llegue a ser la esposa
  - y sea la esposa
  - y que sea esposa
  lexicon: HALOT
  rationale: 'El jussivo puede rendirse como permiso o deseo: «que sea». Se prefiere «la esposa» por la estructura nominal más natural en español, sin perder la designación matrimonial.'
- source_word: לְבֶן אֲדֹנֶיךָ
  english_pob_choice: of your master's son
  chosen_spanish: del hijo de tu señor
  alternatives_spanish:
  - del hijo de tu amo
  - para el hijo de tu señor
  - para el hijo de tu amo
  lexicon: HALOT
  rationale: En el contexto servil, אֲדֹנֶיךָ corresponde a «tu señor»; «amo» sería posible, pero «señor» mantiene el registro bíblico en español sin borrar la relación de autoridad. La relación genitiva se expresa naturalmente con «del hijo de».
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... has spoken
  chosen_spanish: tal como ... ha hablado
  alternatives_spanish:
  - como ... ha hablado
  - así como ... ha hablado
  - tal como ... dijo
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduce conformidad. «Tal como» reproduce bien el valor comparativo-conforme del hebreo y «ha hablado» conserva el resultado vigente de la palabra divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, adaptada al uso español como «Yahvé», evitando la sustitución por un título y preservando el nombre personal del pacto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. En una edición transparente y auditable, conviene conservar el nombre divino en vez de ocultarlo tras un título; en español, la forma establecida de esta convención es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz del jussivo en וּתְהִי אִשָּׁה
  english_pob_reading: and let her be the wife
  chosen_spanish_reading: y que sea la esposa
  alternative_spanish_readings:
  - y que llegue a ser la esposa
  - y sea la esposa
  rationale: El hebreo permite una lectura volitiva/permiso que el POB resolvió en inglés con «let her be». En español, «que sea» preserva mejor esa fuerza jussiva que una traducción más dinámica como «llegue a ser».
  doctrine_reference: 'Hebrew verbal nuance: jussive 3fs of היה'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que cambió «become the wife» por «be the wife» para ajustarse más de cerca al hebreo y sonar más formal/natural. La versión española adopta esa misma preferencia con «que sea la esposa».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la política del proyecto para el texto principal.
  - Se mantiene «señor» en el sentido de autoridad humana del contexto servil, no como sustituto del nombre divino.
  - El objeto directo se explicita en «Tómala» por claridad contextual, siguiendo el sentido del hebreo y del POB inglés.
  - Se conserva la relación de conformidad con «tal como», evitando una paráfrasis más interpretativa.
