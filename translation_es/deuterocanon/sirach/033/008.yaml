translation:
  language: es
  text: Aviva la ira y derrama el furor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego disponible para este versículo preserva solo esta cláusula imperativa. Otras ediciones pueden presentar una segmentación o un contexto inmediato diferente.
    reason: textual_variant
lexical_decisions:
- source_word: ἔγειρον
  english_pob_choice: Stir up
  chosen_spanish: Despierta
  alternatives_spanish:
  - Excita
  - Aviva
  - Arrebata
  lexicon: LSJ
  rationale: El imperativo de ἐγείρω aquí pide provocar o poner en actividad un afecto; en español, 'despertar' comunica bien la idea de hacer surgir una disposición interior sin volverlo mecánico ni demasiado coloquial. 'Despierta' conserva el tono imperativo breve del griego.
- source_word: θυμόν
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furia
  - pasión
  lexicon: LSJ
  rationale: Aunque la POB inglesa usa 'anger', en español 'ira' mantiene mejor el registro elevado y la fuerza afectiva del paralelo con ὀργή. 'Enojo' resultaría demasiado ligero; 'furia' sobreintensificaría el primer término y lo haría casi sinónimo de ὀργή.
- source_word: ἔκχεον
  english_pob_choice: pour out
  chosen_spanish: derrama
  alternatives_spanish:
  - vierte
  - vacía
  - derramar
  lexicon: LSJ
  rationale: ἐκχέω conserva una metáfora líquida de descarga; 'derramar' la expresa de manera natural en español y reproduce la imagen de algo que se vierte hacia afuera. El imperativo encaja bien en la cadencia de la línea.
- source_word: ὀργήν
  english_pob_choice: wrath
  chosen_spanish: la indignación
  alternatives_spanish:
  - la ira
  - el enojo
  - el furor
  lexicon: LSJ
  rationale: Para diferenciar ὀργή de θυμός, se eligió 'indignación', que en español puede expresar un enojo más asentado y de tono más formal. Esto preserva la distinción semántica observada en la audición inglesa, aunque el campo léxico se solapa parcialmente.
theological_decisions:
- issue: Conservación de la tensión léxica entre θυμός y ὀργή
  english_pob_reading: Stir up anger and pour out wrath
  chosen_spanish_reading: Despierta la ira y derrama la indignación
  alternative_spanish_readings:
  - Despierta el enojo y derrama la ira
  - Aviva la ira y derrama el furor
  rationale: 'La línea griega presenta dos términos distintos para la hostilidad/ira. La traducción española intenta no fusionarlos: ''ira'' para θυμός y ''indignación'' para ὀργή. Aunque no existe una separación perfecta en español, esta elección conserva la tensión del original y evita homogeneizar ambos sustantivos.'
  doctrine_reference: 'PHILOSOPHY.md: preserve lexical/theological tension; original-language primacy'
- issue: Alcance textual limitado del testimonio griego
  english_pob_reading: Translate the extant Greek clause as a standalone imperative line, without importing wording from surrounding verses.
  chosen_spanish_reading: Traducir la cláusula imperativa atestiguada como una línea independiente.
  alternative_spanish_readings:
  - Reconstruir el versículo completo según otra edición
  - Integrar la frase a un contexto ampliado
  rationale: El paquete de fuente disponible contiene solo esta cláusula. Por fidelidad auditada, el español se mantiene restringido al texto atestiguado y no intenta completar el versículo con material no presente en el testimonio dado.
  doctrine_reference: 'PHILOSOPHY.md: source integrity; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Coincide con el pasaje auditado de alta concordancia; no se aplicaron revisiones posteriores. La formulación española sigue de cerca la cláusula griega atestiguada y mantiene la advertencia textual del aparato inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - '''Ira'' y ''indignación'' se eligieron para diferenciar dos términos griegos cercanos sin neutralizar su contraste.'
  - La puntuación reproduce una línea breve e imperativa, acorde con el testimonio griego aislado.
