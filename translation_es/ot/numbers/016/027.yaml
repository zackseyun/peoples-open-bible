    reason: lexical_alternative
  - marker: b
    text: ‘Hijos varones’ traduce aquí בְּנֵיהֶם. El hebreo lo distingue de טַפָּם, que se refleja en ‘sus pequeños’.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige tres puntos: reemplaza ‘recinto’ por ‘morada’ para reflejar mejor מִשְׁכַּן en este contexto no cultual; cambia ‘quedándose de pie’ a ‘de pie’ para una lectura más natural y más cercana al participio hebreo; y ajusta ‘sus hijos’ a ‘sus hijos varones’ para preservar la distinción léxica entre בְּנֵיהֶם y טַפָּם, tal como la auditoría inglesa la consideró significativa. También se incorpora en la nota [a] la aclaración cultural de que no se trata del tabernáculo de Yahvé.'
