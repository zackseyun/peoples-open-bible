review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del hebreo: un arquero dispara sin apuntar específicamente, alcanza al rey de Israel en una abertura de la armadura, y este ordena al conductor que lo saque del campamento porque está herido. Sin embargo, hay dos desajustes importantes con la forma fuente y con el rastro auditado del POB: (1) «hirió» adelanta el resultado de la herida donde el hebreo וַיַּךְ y el POB inglés distinguen primero el golpe/impacto y después la declaración «estoy herido»; conviene «golpeó» o «alcanzó». (2) «sáquenme» cambia a plural una orden dirigida al conductor singular; el hebreo וְהוֹצֵאתַנִי es 2ms, por lo que debe ser «sácame».'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta una discordancia de persona/número en «sáquenme» frente al vocativo singular «del conductor del carro». También la nota c repite casi exactamente la redacción principal como si fuera alternativa, sin aportar la incertidumbre léxica real. «Vuelve tu mano» suena algo rígido pero es aceptable si se conserva por fidelidad idiomática y se explica en nota. «Conductor del carro» es comprensible y natural.
  glossary_alignment: No hay términos teológicos de alto riesgo aquí. El borrador sigue bien las decisiones léxicas principales del POB en לְתֻמּוֹ -> «al azar», לָרַכָּב -> «conductor del carro», y כִּי הָחֳלֵיתִי -> «porque estoy herido». Debe alinearse mejor con וַיַּךְ -> «golpeó/alcanzó» en vez de «hirió», y con el singular de וְהוֹצֵאתַנִי -> «sácame».
  issues:
  - severity: high
    issue: «hirió» traduce demasiado el resultado de וַיַּךְ
    rationale: El hebreo primero dice que el arquero golpeó/alzó al rey, y solo después el rey dice «porque estoy herido». Usar «hirió» en la primera cláusula reduce esa progresión semántica preservada también por el POB inglés con «struck».
  - severity: high
    issue: «sáquenme» cambia indebidamente el singular a plural
    rationale: La orden está dirigida «al conductor del carro» singular, y וְהוֹצֵאתַנִי es segunda persona masculina singular. En español debe ser «sácame» o equivalente singular.
  - severity: medium
    issue: La nota c no ofrece una alternativa real y repite el texto principal
    rationale: El POB inglés usa la nota para señalar incertidumbre en la terminología de la armadura y la idea de una abertura entre piezas. En español la nota actual repite «entre las junturas de la armadura y la coraza», de modo que no añade información útil.
  revised_spanish_text: 'Pero un hombre tensó su arco[a] al azar y golpeó al rey de Israel entre las junturas de la armadura y la coraza[c]. Entonces dijo al conductor del carro: «Vuelve tu mano[b] y sácame del campamento, porque estoy herido».'
  revised_footnotes:
  - marker: a
    text: 'O: «sin apuntar» / «en su inocencia». El hebreo לְתֻמּוֹ puede expresar simplicidad o inocencia, pero en este contexto de batalla probablemente significa que el arquero disparó sin un objetivo específico.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Vuelve tu mano». La expresión probablemente significa girar el carro o maniobrarlo fuera del combate.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «entre las junturas de la armadura y la coraza». La terminología exacta de la armadura es incierta, pero la idea es que la flecha entró por una abertura en la protección del rey.'
    reason: cultural_note
  revision_rationale: 'Se corrigen dos puntos necesarios para reflejar mejor el hebreo y el POB auditado: «golpeó» preserva la distinción entre el impacto inicial y la posterior afirmación «estoy herido», y «sácame» restaura el singular dirigido al conductor. También se mejora la nota c para que explique la incertidumbre real de la terminología de la armadura en vez de simplemente repetir la frase principal.'
