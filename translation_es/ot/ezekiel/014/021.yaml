base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/014/021.yaml
  text: 'For thus says the Lord GOD: How much more when I send my four severe judgments against Jerusalem—sword and famine and wild beasts and plague—to cut off from it man and beast![a][b]'
  footnotes:
