    rationale: Aunque 'ni' es idiomático, el hebreo tiene un paralelismo equilibrado con לֹא ... וְלֹא, y el English POB también lo refleja con repetición. En esta línea poética, 'y los caminos de ustedes no son mis caminos' conserva mejor la simetría.
