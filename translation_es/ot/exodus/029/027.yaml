base_translation:
  language: en
  yaml_path: translation/ot/exodus/029/027.yaml
  text: And you shall consecrate the breast of the wave offering and the thigh of the contribution[a], which was waved and which was raised, from the ram of ordination[b], from what was Aaron's and from what was his sons'.
