translation:
  language: es
  text: Y a los ancianos y al pueblo[a] de los judíos, saludos. Hemos recibido la corona de oro y la rama de palma[b] que ustedes enviaron, y estamos dispuestos a hacer con ustedes una gran paz y a escribir a los funcionarios encargados para concederles remisiones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la nación de los judíos». El griego ἔθνος puede referirse al colectivo como nación, pueblo o comunidad étnica en un contexto diplomático.
    reason: alternative_reading
  - marker: b
    text: La expresión griega βαΐν puede significar «rama de palma», «fronda de palma» o «rama» en sentido más general; se refiere a una rama de palma de uso ceremonial u honorífico.
    reason: lexical_alternative
  - marker: c
    text: La expresión «concederles remisiones» probablemente se refiere a exenciones o alivios administrativos o fiscales, aunque el griego aquí no especifica exactamente de qué clase.
    reason: cultural_note
lexical_decisions:
- source_word: πρεσβυτέροις
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: LSJ
  rationale: En este saludo diplomático, el término designa a los dirigentes reconocidos de la comunidad, no solo a personas de mayor edad. 'Ancianos' conserva la referencia funcional sin imponer una terminología eclesiástica posterior.
- source_word: ἔθνει Ἰουδαίων
  english_pob_choice: the nation of the Jews
  chosen_spanish: el pueblo de los judíos
  alternatives_spanish:
  - la nación de los judíos
  - el pueblo judío
  lexicon: LSJ
  rationale: ἔθνος aquí expresa al colectivo como entidad política y étnica. 'Pueblo de los judíos' suena natural en español y mantiene la amplitud del término sin forzar 'nación' si resulta demasiado técnico en este saludo.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - greetings
  lexicon: LSJ
  rationale: Es la fórmula epistolar estándar. 'Salud' reproduce el valor de saludo formal y breve; en español evita el calco literal 'alegraos', que sería engañoso.
- source_word: στέφανον τὸν χρυσοῦν
  english_pob_choice: the gold crown
  chosen_spanish: la corona de oro
  alternatives_spanish:
  - la corona dorada
  lexicon: LSJ
  rationale: La expresión griega nombra un objeto ceremonial de oro. 'Corona de oro' es directa y natural en español, manteniendo el sentido honorífico del regalo.
- source_word: βαΐν
  english_pob_choice: the palm branch
  chosen_spanish: la rama de palma
  alternatives_spanish:
  - el ramo de palma
  - la fronda de palma
  lexicon: LSJ
  rationale: El término denota una rama o fronda de palma usada ceremonially u honoríficamente. 'Rama de palma' conserva el objeto sin introducir un tecnicismo innecesario.
- source_word: κεκομίσμεθα
  english_pob_choice: we have received
  chosen_spanish: hemos recibido
  alternatives_spanish:
  - hemos obtenido
  - hemos recibido ya
  lexicon: LSJ
  rationale: El perfecto expresa recepción completada. 'Hemos recibido' es la equivalencia normal y adecuada en un contexto diplomático.
- source_word: ἕτοιμοί ἐσμεν
  english_pob_choice: we are ready
  chosen_spanish: estamos dispuestos
  alternatives_spanish:
  - estamos listos
  - estamos preparados
  lexicon: LSJ
  rationale: La frase comunica disponibilidad para actuar. 'Estamos dispuestos' preserva el matiz volitivo y suena natural en una negociación formal.
- source_word: ποιεῖν ὑμῖν εἰρήνην μεγάλην
  english_pob_choice: to make great peace with you
  chosen_spanish: hacer con ustedes una gran paz
  alternatives_spanish:
  - hacer una gran paz con ustedes
  - establecer una gran paz con ustedes
  lexicon: LSJ
  rationale: La construcción griega es semítica y literalmente 'hacer paz grande'. En español se mantiene la imagen, aunque suene algo marcada, para no diluir la formulación del original.
- source_word: τοῖς ἐπὶ τῶν χρειῶν
  english_pob_choice: the officials in charge
  chosen_spanish: los encargados de los asuntos
  alternatives_spanish:
  - los funcionarios a cargo
  - los administradores
  lexicon: LSJ
  rationale: La expresión alude a personas encargadas de la administración. 'Encargados de los asuntos' conserva la función sin especificar un cargo que el griego no nombra.
- source_word: ἀφεῖναι ὑμῖν ἀφέματα
  english_pob_choice: to grant you remissions
  chosen_spanish: concederles remisiones
  alternatives_spanish:
  - otorgarles exenciones
  - concederles dispensas
  lexicon: LSJ
  rationale: El sustantivo cognado sugiere remisiones o exenciones de cargas, probablemente administrativas o fiscales. 'Remisiones' preserva la amplitud semántica y la tensión terminológica del griego.
theological_decisions:
- issue: ἔθνος aplicado a los judíos en un contexto diplomático
  english_pob_reading: the nation of the Jews
  chosen_spanish_reading: el pueblo de los judíos
  alternative_spanish_readings:
  - la nación de los judíos
  - el pueblo judío
  rationale: No se trata de una definición doctrinal sino de un saludo político oficial. Elegir 'pueblo' mantiene el tono colectivo y evita sobrecargar el texto con una terminología estatal moderna cuando el griego es más amplio.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de Swete y el audit trail inglés sin depender mecánicamente de él. Se conservan las fórmulas epistolares, la imagen semítica de 'hacer paz grande' y el término administrativo amplio 'remisiones', evitando precisar más de lo que el griego permite.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefiere 'ancianos' para πρεσβυτέροις en un saludo político, sin convertirlo en un término eclesiástico.
  - '''Remisiones'' mantiene la amplitud administrativa/fiscal del griego y no se reduce a ''exenciones'' salvo contexto explícito.'
  - La puntuación separa claramente el saludo inicial del resto de la respuesta diplomática, como en el griego.
