translation:
  language: es
  text: y a los horeos en su región montañosa de Seír, hasta El-parán[a], que está junto al desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El Paran»; posiblemente «el roble», «la encina» o «el terebinto de Parán» si el nombre se entiende etimológicamente y no como un topónimo fijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and ...
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - y a
  lexicon: HALOT
  rationale: El hebreo continúa la serie de pueblos vencidos; en español basta con la conjunción para mantener la relación con el verbo implícito del contexto inmediato sin sobrecargar la frase.
- source_word: הַחֹרִי
  english_pob_choice: the Horites
  chosen_spanish: los horeos
  alternatives_spanish:
  - los horitas
  - el pueblo horeo
  lexicon: HALOT
  rationale: Se usa el etnónimo tradicional en español bíblico académico, conservando el nombre del pueblo sin paraphrasearlo.
- source_word: בְּהַרְרָם
  english_pob_choice: in their hill country
  chosen_spanish: en sus montes
  alternatives_spanish:
  - en su región montañosa
  - en su territorio montañoso
  lexicon: HALOT
  rationale: El plural con sufijo posesivo puede ser literal en español como 'sus montes'; no se necesita ampliar a 'región' salvo para mayor idiomaticidad, pero 'montes' mantiene mejor la imagen del hebreo.
- source_word: שֵׂעִיר
  english_pob_choice: of Seir
  chosen_spanish: de Seír
  alternatives_spanish:
  - en Seír
  lexicon: HALOT
  rationale: Seír es un nombre propio geográfico; la preposición 'de' refleja bien la relación genitiva/apposicional del hebreo en una construcción natural en español.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - así como hasta
  lexicon: HALOT
  rationale: Marca el límite geográfico de la campaña; 'hasta' comunica de forma clara y directa el alcance.
- source_word: אֵיל פָּארָן
  english_pob_choice: El-paran
  chosen_spanish: El-parán
  alternatives_spanish:
  - El Paran
  - el terebinto de Parán
  - la encina de Parán
  lexicon: HALOT
  rationale: Se conserva el nombre compuesto como topónimo transliterado. La forma con guion ayuda a que el lector perciba el compuesto sin decidir en el texto principal si el elemento אֵיל es un árbol o parte fija del nombre.
- source_word: אֲשֶׁר עַל הַמִּדְבָּר
  english_pob_choice: which is by the wilderness
  chosen_spanish: que está junto al desierto
  alternatives_spanish:
  - que está al borde del desierto
  - que está cerca del desierto
  - que está en la zona del desierto
  lexicon: HALOT
  rationale: La preposición עַל en este contexto expresa localización aproximada o adyacencia; 'junto al' comunica de manera natural la ubicación sin estrechar demasiado el sentido.
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece estable (''unchanged: true''); no hay revisiones aplicadas. La españolización sigue el mismo alcance semántico, preservando la tensión lexical de אֵיל פָּארָן como topónimo frente a posible referencia arbórea.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y cualquier sustitución teológica no presente en el verso.
  - '''Horeos'' se usa como etnónimo bíblico estándar y no como una paráfrasis étnica.'
  - La nota de pie mantiene la alternativa lexical documentada por el POB inglés sin imponerla en el cuerpo principal.
  - '''Desierto'' traduce el hebreo מִּדְבָּר en sentido de región deshabitada/semiárida, no necesariamente dunas arenosas.'
