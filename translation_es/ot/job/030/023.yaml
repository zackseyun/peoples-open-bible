review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: Job expresa certeza de que será llevado a la muerte y a la casa destinada para todos los vivos. Conserva adecuadamente la imagen metafórica sin imponer ''Seol'' en el texto principal. Sin embargo, la nota a sobretraduce un matiz verbal como si ''volver'' fuera la única alternativa marcada, cuando el rastro inglés ya había rebajado ese matiz en el texto principal; conviene formular la alternativa con más precisión y naturalidad en español.'
  spanish_quality_summary: 'El texto es claro, digno y natural en español. ''Porque sé que me llevarás a la muerte'' y ''la casa señalada para todo viviente'' son legibles y fieles. Aun así, la nota a necesita reparación estilística y de puntuación: actualmente empieza con una comilla innecesaria y suena algo rígida. También puede mejorarse levemente la nota b para mayor fluidez (''destino común de todos'').'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. 'Muerte', 'casa' y 'todo viviente' se alinean bien con las decisiones léxicas documentadas. 'Señalada' es aceptable para מוֹעֵד, aunque 'destinada' también sería posible; no requiere cambio.
  issues:
  - severity: medium
    issue: La nota [a] está mal formada y expresa de manera algo tosca la alternativa léxica.
    rationale: Empieza con una comilla sobrante antes de 'O:' y la redacción 'lleva la idea de hacer volver' es menos natural que una formulación más limpia. Además, debe reflejar que se trata de una alternativa posible, no de una exigencia del texto principal.
  - severity: low
    issue: La nota [b] puede pulirse estilísticamente.
    rationale: La frase 'destino común de toda persona' es válida, pero 'de todos' o 'de todos los seres humanos' suena más directa en español eclesial general; es un ajuste menor de estilo, no de sentido.
  revised_spanish_text: Porque sé que me llevarás a la muerte[a], y a la casa señalada para todo viviente[b].
  revised_footnotes:
  - marker: a
    text: 'O: «me harás volver a la muerte». El verbo puede expresar la idea de hacer volver o retornar a alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la casa señalada para todos los vivientes»; posible referencia poética al sepulcro o al Seol como destino común de todos.'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrigen las notas para mejorar precisión, puntuación y legibilidad en español sin alterar la decisión traductológica de fondo.
