translation:
  language: es
  text: Y edificó el atrio interior con tres hileras de piedra cortada y una hilera de maderos de cedro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tres cursos de piedra labrada y un curso de maderos de cedro»; también, «... y una hilera de vigas de cedro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: And he built
  chosen_spanish: Y edificó
  alternatives_spanish:
  - Y construyó
  - Luego edificó
  lexicon: HALOT
  rationale: El wayyiqtol mantiene la secuencia narrativa; «edificó» conserva el sentido constructivo formal y resulta natural en español bíblico contemporáneo.
- source_word: הֶחָצֵר הַפְּנִימִית
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - el patio interior del templo
  lexicon: HALOT
  rationale: חָצֵר puede ser «atrio» o «patio»; en contexto del templo, «atrio interior» preserva el término arquitectónico tradicional y la distinción espacial de פְּנִימִית.
- source_word: שְׁלֹשָׁה טוּרֵי
  english_pob_choice: three rows of
  chosen_spanish: tres hileras de
  alternatives_spanish:
  - tres filas de
  - tres cursos de
  lexicon: HALOT
  rationale: טוּר describe una disposición lineal en construcción; «hilera» comunica bien la idea de capas alineadas. «Cursos» es una alternativa técnica posible, preservada en nota.
- source_word: גָזִית
  english_pob_choice: cut stone
  chosen_spanish: piedra cortada
  alternatives_spanish:
  - piedra labrada
  - piedra hewn
  lexicon: HALOT
  rationale: El término alude a piedra trabajada para uso constructivo. «Piedra cortada» refleja la elección inglesa y mantiene la imagen material sin introducir un matiz más especializado que el hebreo no exige.
- source_word: וְטוּר
  english_pob_choice: and a row of
  chosen_spanish: y una hilera de
  alternatives_spanish:
  - y un curso de
  - y una fila de
  lexicon: HALOT
  rationale: El hebreo no explicita el numeral, pero el paralelismo exige una unidad adicional. En español, «una hilera de» es claro y fiel al patrón constructivo.
- source_word: כְּרֻתֹת אֲרָזִים
  english_pob_choice: cedar beams
  chosen_spanish: cedro
  alternatives_spanish:
  - vigas de cedro
  - maderos de cedro
  - cedro labrado
  lexicon: HALOT
  rationale: La secuencia hebrea apunta a piezas de cedro ya trabajadas para construcción. Para no sobreespecificar «vigas» sin apoyo explícito, se usa «cedro»; el contexto arquitectónico queda sostenido por el sintagma y la nota de alternativa.
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó «one row» por «a row» para ajustarse mejor al hebreo, que no expresa el numeral uno. La traducción española sigue esa misma cautela con «una hilera» como determinación idiomática, no como adición explícita del numeral.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se usa terminología arquitectónica sobria y consistente con un registro bíblico moderno.
  - No se introduce «Cristo/Mesías» ni otras equivalencias teológicas no pertinentes al texto.
  - La nota conserva la alternativa técnica «curso» porque el inglés auditado también la preservó.
