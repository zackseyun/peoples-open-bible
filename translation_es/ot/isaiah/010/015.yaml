translation:
  language: es
  text: ¿Se jactará el hacha contra el que corta con ella? ¿O se engrandecerá la sierra contra el que la maneja? Como si una vara manejara al que la alza[a], o como si un bastón levantara a uno que no es madera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «o como si un bastón levantara uno que no es madera». La frase final es elíptica y también puede entenderse como «lo que no es madera».'
    reason: alternative_reading
lexical_decisions:
- source_word: יִתְפָּאֵר
  english_pob_choice: boast
  chosen_spanish: se jactará
  alternatives_spanish:
  - se gloriará
  - se alabará a sí mismo
  lexicon: HALOT
  rationale: El hitpael expresa autoexaltación o jactancia. En español, ‘se jactará’ reproduce con naturalidad la idea de que el hacha pretende engrandecerse a sí misma sobre su usuario.
- source_word: הַגַּרְזֶן
  english_pob_choice: the axe
  chosen_spanish: el hacha
  alternatives_spanish:
  - el hacha de mano
  lexicon: HALOT
  rationale: Es el equivalente léxico directo para la herramienta de corte. ‘Hacha’ es claro, común y adecuado para el paralelismo poético.
- source_word: הַחֹצֵב בּוֹ
  english_pob_choice: the one who chops with it
  chosen_spanish: el que corta con ella
  alternatives_spanish:
  - el que la hachea
  - el que la labra
  lexicon: HALOT
  rationale: El participio con בּוֹ expresa la persona que realiza la acción por medio del instrumento. ‘El que corta con ella’ conserva el sentido instrumental y resulta natural en español.
- source_word: יִתְגַּדֵּל
  english_pob_choice: magnify itself
  chosen_spanish: se engrandecerá
  alternatives_spanish:
  - se hará grande
  - se exaltará
  lexicon: HALOT
  rationale: El valor reflexivo apunta a autoensalzamiento. ‘Se engrandecerá’ preserva la imagen de hacerse grande y mantiene el paralelismo con ‘se jactará’.
- source_word: הַמַּשּׂוֹר
  english_pob_choice: the saw
  chosen_spanish: la sierra
  alternatives_spanish:
  - el serrucho
  lexicon: HALOT
  rationale: Aunque la equivalencia básica es ‘saw’, en español bíblico y moderno ‘sierra’ suele ser la forma más natural y digna para este instrumento, y encaja con el paralelismo del verso.
- source_word: מְנִיפוֹ
  english_pob_choice: the one who wields it
  chosen_spanish: el que la maneja
  alternatives_spanish:
  - el que la blande
  - el que la agita
  lexicon: HALOT
  rationale: El verbo denota mover, blandir o manejar. ‘Maneja’ es la opción más idiomática en español para una herramienta, sin perder la idea de quien la usa.
- source_word: כְּהָנִיף שֵׁבֶט
  english_pob_choice: As if a rod were to wield
  chosen_spanish: Como si una vara manejara
  alternatives_spanish:
  - Como si una vara blandiera
  - Como si una vara alzara
  lexicon: HALOT
  rationale: 'La comparación invierte la agencia: la vara actúa sobre su portador. ‘Manejara’ transmite la absurdidad de manera clara y conserva el valor hipotético de כְּ.'
- source_word: שֵׁבֶט
  english_pob_choice: a rod
  chosen_spanish: una vara
  alternatives_spanish:
  - un cetro
  - un bastón
  lexicon: HALOT
  rationale: Aquí se trata de un implemento paralelo a מַטֶּה. ‘Vara’ conserva un campo semántico cercano a ‘rod’ sin introducir una connotación regia como ‘cetro’.
- source_word: מְרִימָיו
  english_pob_choice: the one who lifts it up
  chosen_spanish: al que la alza
  alternatives_spanish:
  - a quien la levanta
  - a su levantador
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el contexto apunta a un usuario singular genérico. ‘Al que la alza’ mantiene la imagen y evita una construcción pesada.
- source_word: כְּהָרִים מַטֶּה
  english_pob_choice: or as if a staff were to lift up
  chosen_spanish: o como si un bastón levantara
  alternatives_spanish:
  - o como si una vara levantara
  - o como si un bastón alzara
  lexicon: HALOT
  rationale: 'Se conserva la inversión de agencia: el bastón, en vez de ser levantado, levanta. ‘Bastón’ distingue mejor este término de שֵׁבֶט y suena natural en español.'
- source_word: מַטֶּה
  english_pob_choice: a staff
  chosen_spanish: un bastón
  alternatives_spanish:
  - una vara
  - un palo
  lexicon: HALOT
  rationale: Se eligió ‘bastón’ para diferenciarlo de שֵׁבֶט, aunque ambos estén en el campo de ‘vara/rod’, y para mantener una pareja más idiomática en español.
- source_word: לֹא עֵץ
  english_pob_choice: one who is not wood
  chosen_spanish: uno que no es madera
  alternatives_spanish:
  - algo que no es madera
  - uno que no es un trozo de madera
  lexicon: HALOT
  rationale: El hebreo es breve y elíptico. ‘Uno que no es madera’ conserva la rareza y la ironía del original, y deja abierta la referencia implícita a una persona, como en el audit trail inglés.
theological_decisions:
- issue: Lectura de la cláusula final elíptica לֹא עֵץ
  english_pob_reading: '''one who is not wood'' with the human referent made explicit by context'
  chosen_spanish_reading: ‘uno que no es madera’, manteniendo la referencia implícita a una persona por el contexto
  alternative_spanish_readings:
  - ‘lo que no es madera’
  - ‘uno que no es un trozo de madera’
  rationale: El verso plantea la absurda inversión entre instrumento y usuario. La redacción elegida conserva la tensión retórica y no resuelve demasiado la elipsis; el contexto permite entender el contraste humano sin añadir interpretación doctrinal extra.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y retórica; no normalizar la elipsis más de lo que el texto exige.'
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés de la POB y el hebreo masorético. No se aplicaron revisiones previas; se mantuvo la misma resolución de la elipsis final y el paralelismo de los dos miembros poéticos.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal: ‘se jactará / se engrandecerá’ para reflejar la progresión de autoexaltación.'
  - Se distinguieron ‘vara’ y ‘bastón’ para reproducir la diferenciación léxica entre שֵׁבֶט y מַטֶּה.
  - ‘madera’ se usó para la cláusula final porque el hebreo dice literalmente ‘no es árbol/madera’, conservando la dureza de la imagen.
