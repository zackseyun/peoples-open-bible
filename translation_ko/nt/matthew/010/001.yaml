source:
  edition: SBLGNT
  text: Καὶ προσκαλεσάμενος τοὺς δώδεκα μαθητὰς αὐτοῦ ἔδωκεν αὐτοῖς ἐξουσίαν πνευμάτων ἀκαθάρτων ὥστε ἐκβάλλειν αὐτὰ καὶ θεραπεύειν πᾶσαν νόσον καὶ πᾶσαν μαλακίαν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/001.yaml
  text: 'And calling his twelve disciples to himself[a], he gave them authority over unclean spirits[c][b], to cast them out and to heal every disease and every sickness.'
  footnotes:
  - marker: a
    text: Or 'having called his twelve disciples to himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'power over unclean spirits'; Greek exousia often carries the sense of delegated authority.
    reason: lexical_alternative
  - marker: c
    text: The pair 'every disease and every sickness' reflects two related Greek terms (nosos and malakia), also rendered 'every disease and every infirmity.'
    reason: lexical_alternative
translation:
  language: ko
  text: '예수님은 열두 제자를 부르시고, 그들에게 더러운 영들을 다스리는 권세를 주셔서, 그것들을 쫓아내고 모든 병과 모든 약한 것을 고치게 하셨습니다.'
  philosophy: optimal-equivalence
