  - marker: b
    text: «El pan de la ociosidad» es un modismo hebreo para vivir en la pereza o alimentarse de una comodidad improductiva.
    reason: cultural_note
  revision_rationale: Se reemplaza la calca poco idiomática «los caminos de su casa» por «los asuntos de su hogar» para comunicar claramente el sentido contextual de הֲלִיכוֹת בֵּיתָהּ en español natural, mientras se conserva la literalidad hebrea en una nota, siguiendo la lógica del audit trail inglés. El resto del versículo se mantiene porque refleja bien el original y su tono proverbial.
