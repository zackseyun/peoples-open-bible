  - severity: medium
    issue: «los hirió» estrecha demasiado el sentido de נכה
    rationale: En narrativa militar, נכה no se limita a herir; abarca golpear/derrotar. «Los golpeó» mantiene mejor la amplitud semántica sin sobreinterpretar como «derrotó» o «mató».
  - severity: low
    issue: La nota alternativa incluye «los desbarató», que desplaza la imagen de confusión hacia resultado militar
    rationale: No es erróneo como alternativa remota, pero las alternativas más cercanas al hebreo son «los puso en pánico» o «los sumió en confusión».
