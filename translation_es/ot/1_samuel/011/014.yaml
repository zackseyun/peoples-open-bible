    rationale: 'La nota dice «O “confirmar la realeza” o “renovar el reino”». Dado que el texto principal lleva futuro plural («renovaremos»), suena más pulido mantener alternativas paralelas: «confirmaremos el reinado» / «renovaremos el reino». No es un error grave, pero mejora coherencia editorial.'
  revised_spanish_text: 'Entonces Samuel dijo al pueblo[a]: «Vengan, vamos a Gilgal, y allí renovaremos el reinado».'
