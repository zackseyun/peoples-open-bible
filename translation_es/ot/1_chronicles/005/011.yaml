translation:
  language: es
  text: Y los hijos de Gad habitaron[a] frente a ellos en la tierra de Basán, hasta Salecá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'junto a ellos' o 'delante de ellos'; la expresión hebrea indica una ubicación relativa con respecto al grupo mencionado antes.
    reason: lexical_alternative
  - marker: b
    text: También puede transliterarse 'Salká'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Ahora los hijos de
  lexicon: HALOT
  rationale: בני es literalmente “hijos de”, y en avisos genealógicos o tribales conviene conservar esa forma base. En español, “los hijos de” mantiene la estructura hebrea y sigue siendo natural para identificar al grupo tribal de Gad.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gad
  lexicon: HALOT
  rationale: Nombre propio tribal; se translitera sin cambio.
- source_word: לְ/נֶגְדָּ/ם
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - junto a ellos
  - en oposición a ellos
  - mirando hacia ellos
  lexicon: HALOT
  rationale: La expresión indica ubicación relativa respecto del grupo mencionado antes. “Frente a ellos” conserva la relación espacial sin forzar una precisión geográfica que el hebreo no explicita.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  - moraron
  lexicon: HALOT
  rationale: En un contexto territorial, ישב expresa residencia o asentamiento. “Habitaron” es digno y fiel; evita el matiz de proceso que “se establecieron” podría insinuar.
- source_word: בְּ/אֶרֶץ
  english_pob_choice: in the land of
  chosen_spanish: en la tierra de
  alternatives_spanish:
  - en la región de
  - en el territorio de
  lexicon: HALOT
  rationale: ארץ aquí designa una región territorial. “Tierra de” corresponde bien al uso bíblico y conserva el registro del texto.
- source_word: הַ/בָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Bashán
  - Basan
  lexicon: HALOT
  rationale: Nombre geográfico tradicional en español bíblico. “Basán” es reconocible y fluido para lectores de español.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como
  - hasta llegar a
  lexicon: HALOT
  rationale: En lenguaje de frontera geográfica, עַד marca extensión. “Hasta” comunica ese límite de forma natural en español.
- source_word: סַלְכָה
  english_pob_choice: Salecah
  chosen_spanish: Salecá
  alternatives_spanish:
  - Salcá
  - Salká
  lexicon: HALOT
  rationale: El nombre propio se translitera de manera cercana al hebreo. “Salecá” mantiene una forma bíblica legible en español y refleja la tradición de transliteración usada en la POB inglesa con adaptación ortográfica española.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo consonante/vocalizado del WLC y el criterio óptimo-equivalente de la POB inglesa: mantiene el paralelismo tribal, conserva la relación espacial de לְנֶגְדָּם sin sobredeterminarla y refleja el topónimo con una transliteración española natural.'
  spanish_consistency_notes:
  - Se usa “Basán” como forma española consistente para Bashan.
  - Se conserva “Gad” como nombre tribal propio sin adaptación.
  - El marcador [a] se ancla en “habitaron” para señalar la lectura espacial alternativa del hebreo.
  - El marcador [b] se ancla en “Salecá” para notar la variante transliterada del topónimo.
