translation:
  language: es
  text: Sus wadis[a] serán convertidos en brea, y su polvo en azufre[b]; su tierra se convertirá en brea ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cauces» o «corrientes». El hebreo נְחָלִים puede referirse a wadis, cauces de torrente o torrentes estacionales.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: «brimstone» / «azufre ardiente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶהֶפְכ֤וּ / נֶהֶפְכוּ
  english_pob_choice: will be turned
  chosen_spanish: serán convertidos
  alternatives_spanish:
  - serán cambiados
  - serán transformados
  lexicon: HALOT
  rationale: El nifal de הפך expresa una inversión o transformación resultante; en español, "serán convertidos" comunica bien la pasiva resultativa sin perder la imagen de cambio radical.
- source_word: נְחָלֶ֨יָהּ
  english_pob_choice: her wadis
  chosen_spanish: sus wadis
  alternatives_spanish:
  - sus cauces
  - sus corrientes
  - sus torrentes
  lexicon: HALOT
  rationale: נחל puede referirse a un wadi, cauce de torrente o corriente estacional. Se conserva "wadis" para reflejar con precisión el trasfondo desértico, ya que en español no hay un equivalente breve igual de exacto; el posesivo se mantiene por la personificación femenina del hebreo.
- source_word: לְזֶפֶת
  english_pob_choice: pitch
  chosen_spanish: brea
  alternatives_spanish:
  - asfalto
  - pez
  lexicon: HALOT
  rationale: זפת designa una sustancia bituminosa. "Brea" es un equivalente español claro y tradicional, cercano al valor de "pitch"; "asfalto" sería demasiado moderno/técnico y "pez" resulta más ambiguo.
- source_word: וַעֲפָרָהּ
  english_pob_choice: her dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su tierra suelta
  - su polvo fino
  lexicon: HALOT
  rationale: עפר abarca polvo, tierra seca o suelo suelto. "Polvo" conserva la imagen austera y paralela del verso; el posesivo femenino sigue el hebreo.
- source_word: לְגָפְרִית
  english_pob_choice: sulfur
  chosen_spanish: azufre
  alternatives_spanish:
  - brimstone
  lexicon: HALOT
  rationale: גפרית se refiere a azufre/brimstone. "Azufre" es el término natural en español contemporáneo; se preserva la alternativa tradicional en nota si se desea recordar la resonancia bíblica.
- source_word: אַרְצָהּ
  english_pob_choice: her land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: ארץ aquí denota la tierra/territorio afectado por juicio. "Su tierra" es la forma más natural y precisa en español, manteniendo la personificación femenina.
- source_word: בֹּעֵרָה
  english_pob_choice: burning
  chosen_spanish: ardiente
  alternatives_spanish:
  - que arde
  - en llamas
  lexicon: HALOT
  rationale: El participio femenino singular modifica a זפת y describe la brea como algo ardiendo. "Ardiente" conserva el valor descriptivo y fluye mejor que una frase más explicativa.
theological_decisions:
- issue: Personificación femenina de la tierra/ciudad/nación
  english_pob_reading: Retain feminine possessive language as 'her' throughout
  chosen_spanish_reading: Mantener el posesivo femenino "su" en todo el versículo, reflejando la personificación del hebreo
  alternative_spanish_readings:
  - usar "su" impersonal sin eco de personificación
  - usar "la" para mayor literalidad sintáctica
  rationale: El hebreo repite sufijos de 3ª femenina singular. En español, "su" permite conservar la referencia femenina sin forzar un género explícito donde el sustantivo sea impersonal; así se preserva la fuerza poética y judicial del pasaje.
  doctrine_reference: Poética profética y consistencia de referencia gramatical
- issue: Valor semántico de נחל en contexto desértico
  english_pob_reading: Or 'streams.' Hebrew נְחָלִים can refer to wadis, streambeds, or torrents.
  chosen_spanish_reading: Mantener "wadis" con nota alternativa en español
  alternative_spanish_readings:
  - cauces
  - torrentes
  - corrientes
  rationale: En un contexto de desolación edomita, el término técnico "wadis" comunica mejor cauces estacionales secos que "ríos" o "corrientes" permanentes. La nota preserva la alternativa más familiar para lectores que no conozcan el arabismo.
  doctrine_reference: Precisión geográfica y transparencia lexical
- issue: גָפְרִית y tradición de 'brimstone'
  english_pob_reading: 'Traditional: ''brimstone.'''
  chosen_spanish_reading: Traducir con "azufre" y aludir a la alternativa tradicional en nota
  alternative_spanish_readings:
  - azufre y piedra ardiente
  - brimstone en transliteración explicativa
  rationale: '"Azufre" es el equivalente contemporáneo más claro para גפרית. La tradición bíblica de "brimstone" puede conservarse como nota, pero no reemplaza el sentido principal en español moderno.'
  doctrine_reference: Claridad semántica y recepción bíblica
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere revisiones adicionales. Se conservan la personificación femenina, el contraste desierto/brea/azufre y el valor participial de "ardiente" con un español idiomático y auditable.
  spanish_consistency_notes:
  - Se mantiene el posesivo femenino «su» para reflejar el hebreo 3fs y la personificación del territorio.
  - «Brea» se usa para זפת por claridad y equivalencia funcional en español; no se sustituye por «tar» ni por un tecnicismo innecesario.
  - «Azufre» se prefiere sobre «brimstone» en el texto principal, siguiendo el criterio de claridad moderna.
  - Se conserva el tono profético y la imaginería de transformación total sin añadir matices no presentes en el hebreo.
