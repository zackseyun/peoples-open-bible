  spanish_quality_summary: El español es generalmente claro y digno. 'Habían sido instruidos para obtener apoyo' y 'aborrecían a los que se apartaban de ellos' funcionan bien. La principal debilidad es 'la convivencia común y del servicio útil', que suena forzado e idiomáticamente débil en español. También conviene que la nota [b] explique la frase social-final, como hace el inglés auditado, no solo 'nación'.
