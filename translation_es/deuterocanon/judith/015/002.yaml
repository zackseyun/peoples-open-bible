    reason: lexical_alternative
  - marker: b
    text: El adverbio ὁμοθυμαδόν puede traducirse «con un solo ánimo» o «de común acuerdo», pero aquí probablemente indica que huyeron todos juntos o todos a la vez, no en unidad armoniosa.
    reason: lexical_alternative
  revision_rationale: Se corrige el texto para reflejar explícitamente ἔτι con «ya no», para hacer más natural κατὰ πρόσωπον τοῦ πλησίον con «frente a su prójimo», y para distinguir mejor ἐκχυθέντες («dispersándose») de ὁμοθυμαδόν («todos a una»), en línea con la auditoría inglesa y el sentido del griego.
