revisions:
- from: 'Entonces Isaac dijo a su hijo[a]: «¿Cómo es que hallaste tan pronto, hijo mío?» Y él dijo[b]: «Porque Yahvé tu Dios hizo que ocurriera delante de mí».'
  to: 'Entonces Isaac dijo a su hijo: «¿Cómo es que encontraste tan pronto, hijo mío?» Y él dijo[a]: «Porque Yahvé tu Dios hizo que ocurriera delante de mí».[b]'
  rationale: Se corrigen las notas para que coincidan con la evidencia fuente y el rastro auditado inglés, eliminando una nota errónea sobre «tu Dios» y restaurando alternativas pertinentes para הִקְרָה ... לְפָנַי. También se ajusta «hallaste» a «encontraste» por naturalidad en español neutral contemporáneo. Se deja sin nota «su hijo» porque no hay una alternativa española significativa que deba preservarse ahí en este registro.
  reviewer_model: gpt-5.4
