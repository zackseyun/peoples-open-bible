  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura proverbial del griego: pregunta retórica, mandato de guardar el asunto en secreto, exhortación y promesa final. «¿Has oído una palabra? Que muera contigo» corresponde fielmente a ἀκήκοας λόγον; συναποθανέτω σοι. Sin embargo, la cláusula final ῥήξει conserva una imagen corporal más fuerte que «no te romperá». El inglés auditado preserva explícitamente «burst you open»; en español conviene mantener esa viveza con «no te hará reventar» o similar.'
  spanish_quality_summary: El español es claro y natural. «Cobra ánimo» es legible, pero suena un poco menos idiomático y menos directo que «ten ánimo» o «ánimo». El problema principal es estilístico-semántico en «no te romperá», que resulta algo opaco en español y debilita la imagen. Una leve revisión mejora fidelidad y claridad sin perder dignidad.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están en línea con el POB. «Una palabra» para λόγον funciona bien con nota alternativa. La imagen de ῥήξει debe alinearse mejor con la decisión auditada de conservar la fuerza corporal.
  issues:
  - severity: medium
    issue: La frase «no te romperá» debilita y oscurece la imagen de ῥήξει.
    rationale: El griego y el inglés POB conservan una metáfora vívida de estallar o reventar; «romperá» en español suena menos corporal y puede leerse de forma demasiado abstracta.
  - severity: low
    issue: La nota b explica «no te romperá», pero esa formulación no transmite bien la imagen que la misma nota intenta aclarar.
    rationale: Si se mejora el texto principal a «no te hará reventar», la nota queda mejor alineada con la explicación cultural ya documentada.
