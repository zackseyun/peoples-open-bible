  language: en
  yaml_path: translation/ot/zechariah/011/003.yaml
  text: The sound of the shepherds’ wailing[a], for their splendor is ruined; the sound of the young lions’ roaring[b], for the pride of the Jordan is ruined.
  footnotes:
  - marker: a
    text: Or 'their splendor.' The Hebrew term can refer to magnificence and may allude concretely to what adorned them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pride of the Jordan'; the phrase may refer specifically to the luxuriant thickets along the Jordan’s banks.
    reason: lexical_alternative
