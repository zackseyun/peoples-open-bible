translation:
  language: es
  text: Dios lo honró, y lo fortaleció en las alturas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice más ampliamente: «Lo hizo semejante a la gloria de los santos, y lo engrandeció en los terrores de los enemigos». El testimonio hebreo, en cambio, lee: «Dios lo honró, y lo fortaleció en las alturas».'
    reason: textual_variant
lexical_decisions:
- source_word: ויכבדהו
  english_pob_choice: honored him
  chosen_spanish: lo honró
  alternatives_spanish:
  - lo glorificó
  - le dio honor
  - lo hizo importante
  lexicon: HALOT
  rationale: El hebreo קבד en forma causativa expresa dar honor o consideración. «Lo honró» reproduce bien ese valor sin pasar innecesariamente a «glorificó», que en español puede sonar más teológico o más intenso de lo que el hebreo exige aquí.
- source_word: אלהים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El sujeto es el referente divino singular del hebreo. En español, «Dios» es la forma natural y fiel para este contexto.
- source_word: ויאמצהו
  english_pob_choice: strengthened him
  chosen_spanish: lo fortaleció
  alternatives_spanish:
  - lo hizo fuerte
  - lo animó
  lexicon: HALOT
  rationale: אָמַץ tiene sentido causativo de hacer fuerte o fortalecer. «Lo fortaleció» conserva el valor verbal directo y suena natural en español.
- source_word: במרומים
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en los altos lugares
  - en lo alto
  - en las alturas celestiales
  lexicon: HALOT
  rationale: מְרוֹמִים alude literalmente a alturas o lugares elevados. «En las alturas» mantiene la imagen espacial y no resuelve de más si apunta a exaltación celestial o a elevación de rango.
theological_decisions:
- issue: Manejo de la divergencia entre el hebreo y el griego en la segunda cola
  english_pob_reading: 'The main text follows the extant Hebrew: ''God honored him, and strengthened him in the heights.'' The Greek is preserved in a footnote as an expanded alternative.'
  chosen_spanish_reading: 'Seguir el hebreo en el texto principal: «Dios lo honró, y lo fortaleció en las alturas».'
  alternative_spanish_readings:
  - «Lo hizo semejante a la gloria de los santos, y lo engrandeció en los terrores de los enemigos» (griego)
  rationale: La política del proyecto da primacía al hebreo donde se conserva con suficiente claridad. Sin embargo, el griego presenta una lectura sustancialmente distinta y no debe borrarse; por eso se preserva como variante en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el último pase indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para el sujeto divino, conforme al testimonio hebreo.
  - Se eligió «lo honró» y «lo fortaleció» para conservar el paralelismo causativo del hebreo sin sobrerrepresentar la ampliación del griego.
  - «En las alturas» preserva la ambigüedad de מרומים y evita fijar prematuramente una interpretación celestial o metafórica.
