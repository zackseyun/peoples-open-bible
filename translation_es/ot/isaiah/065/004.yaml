review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: participios sustantivados (''los que...''), asociación con los muertos, pernocta en lugares ocultos, consumo de carne de cerdo y presencia de un caldo de cosas ritualmente impuras en sus recipientes. También preserva correctamente las dos incertidumbres léxicas documentadas con notas. Sin embargo, ''vasos'' estrecha innecesariamente כְּלֵיהֶם, que en este contexto ritual/alimentario se expresa mejor como ''vasijas'' o ''recipientes''.'
  spanish_quality_summary: El español es claro y legible, pero 'los que se sientan entre las sepulturas' puede sonar algo demasiado puntual en español. Aun así, es defendible por su concreción y cercanía al participio. El problema principal de naturalidad y precisión es 'vasos', que en español moderno suele evocar vasos para beber y no refleja bien la amplitud de כְּלִי en este contexto. 'Vasijas' mejora la imagen y la fidelidad.
  glossary_alignment: No hay conflictos con los términos base del proyecto. Se mantiene bien el lenguaje concreto de impureza ritual. 'Carne de cerdo' y 'cosas impuras' concuerdan con la racionalidad documentada. La nota sobre 'lugares ocultos' preserva adecuadamente la dificultad de וּבַנְּצוּרִים. La nota sobre 'caldo' también es apropiada.
  issues:
  - severity: medium
    issue: '''vasos'' para כְּלֵיהֶם es demasiado estrecho y puede inducir una imagen inadecuada.'
    rationale: 'El hebreo כְּלִי es amplio: vasos, utensilios, recipientes, vasijas. En un contexto de ''caldo'' y alimentos impuros, ''vasijas'' o ''recipientes'' representan mejor contenedores de comida que ''vasos'', que en español suele asociarse a un vaso para beber.'
  revised_spanish_text: los que se sientan entre las sepulturas y pasan la noche en lugares ocultos[a], los que comen carne de cerdo y el caldo de cosas impuras está en sus vasijas[b];
  revised_footnotes:
  - marker: a
    text: O ‘en lugares escondidos’; el término hebreo es difícil y también se ha entendido como ‘en lugares guardados’ o, menos probablemente por el contexto, ‘en lugares sitiados’.
    reason: lexical_alternative
  - marker: b
    text: O ‘sopa’ o ‘estofado’ de cosas impuras.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la traducción general porque es fiel al hebreo y al audit trail inglés, pero se sustituye ''vasos'' por ''vasijas'' para reflejar mejor כְּלֵיהֶם en un contexto de recipientes que contienen caldo/alimentos impuros. No hace falta adjudicación adicional: es una mejora local de precisión y naturalidad en español.'
