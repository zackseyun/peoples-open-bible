    rationale: 'El English POB documenta una alternativa real: ''delivered him out of sin''. En español debe preservarse como una opción distinta, por ejemplo ''lo libró fuera del pecado'' o una formulación equivalente explicativa; de lo contrario, la nota no cumple función textual ni lexical.'
  revised_spanish_text: No abandonó al justo cuando fue vendido[a], sino que lo libró del pecado[b];
