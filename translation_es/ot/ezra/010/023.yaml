translation:
  language: es
  text: 'Y de entre los levitas: Jozabad, Simei, Kelías[a] (es decir, Kelita), Petahías, Judá y Eliezer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Kelías, él es Kelita», lo cual indica que Kelita es un nombre alterno o una forma alternativa del nombre de la misma persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַלְוִיִּם
  english_pob_choice: And from the Levites
  chosen_spanish: Y de entre los levitas
  alternatives_spanish:
  - Y de los levitas
  - Y entre los levitas
  lexicon: HALOT
  rationale: El hebreo usa una partícula partitiva que introduce un subgrupo dentro de la lista anterior. «De entre los levitas» conserva mejor esa fuerza partitiva que un simple «de los levitas», y suena natural en español.
- source_word: יוֹזָבָד
  english_pob_choice: Jozabad
  chosen_spanish: Jozabad
  alternatives_spanish:
  - Josabad
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio con transliteración cercana al uso bíblico habitual en español, sin añadir interpretación.
- source_word: וְשִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simi
  alternatives_spanish:
  - Simei
  - Shimei
  lexicon: Transliteración del nombre propio
  rationale: La forma hebrea corresponde al nombre אישי con vocalización שִׁמְעִי; en español se puede representar de modo más natural como «Simi», manteniendo la identidad del nombre sin forzar una forma inglesa.
- source_word: וְקֵלָיָה הוּא קְלִיטָא
  english_pob_choice: Keliah (that is, Kelita)
  chosen_spanish: Quelías (es decir, Kelita)
  alternatives_spanish:
  - Quelías, es decir, Kelita
  - Quelías, también llamado Kelita
  - Kelías (es decir, Kelita)
  lexicon: HALOT
  rationale: El hebreo presenta un nombre seguido de הוּא y otro nombre, lo cual el audit trail inglés entiende como identificación explicativa de una misma persona con nombre alterno. «Es decir» comunica esa relación sin borrar la tensión textual ni convertirlo en una paráfrasis más fuerte que el original.
- source_word: פְּתַחְיָה
  english_pob_choice: Pethahiah
  chosen_spanish: Petahías
  alternatives_spanish:
  - Petaías
  - Pethahías
  lexicon: Transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio en una forma ampliamente legible en español, preservando la secuencia consonántica y la pronunciación aproximada.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: Transliteración estándar del nombre propio
  rationale: Aquí el contexto indica un individuo, no la tribu. La forma española usual del nombre propio es «Judá».
- source_word: וֶאֱלִיעֶזֶר
  english_pob_choice: Eliezer
  chosen_spanish: Eliezer
  alternatives_spanish:
  - Eleazar
  lexicon: Transliteración estándar del nombre propio
  rationale: La vocalización del texto base apoya «Eliezer», no «Eleazar». Se mantiene la forma transparente y estándar del nombre.
theological_decisions:
