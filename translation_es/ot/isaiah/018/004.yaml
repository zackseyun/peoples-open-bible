    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como calor claro sobre la luz».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige un calco poco natural («ha dicho... a mí»), adopta una formulación idiomática española para עֲלֵי אוֹר en línea con la decisión principal del POB inglés, y conserva la literalidad inusual en nota. También suaviza la alternativa de la nota para que refleje mejor el campo semántico de נבט sin introducir un matiz más fuerte de lo necesario.
