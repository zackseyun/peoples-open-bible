  yaml_path: translation/nt/james/003/006.yaml
  text: 'And the tongue is a fire. The tongue is set among our members as a world of unrighteousness, staining the whole body and setting on fire the wheel of birth, and being set on fire by Gehenna.'
translation:
  language: ko
  text: '혀도 불입니다. 우리 지체 가운데 자리 잡은 혀는 불의의 세계가 되어, 온몸을 더럽히고 인생의 수레바퀴를 불태우며, 자신은 게헨나의 불에 의해 불타고 있습니다.'
  philosophy: optimal-equivalence
