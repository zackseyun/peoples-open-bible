id: 1CO.6.20
reference: '1 Corinthians 6:20'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἠγοράσθητε γὰρ τιμῆς· δοξάσατε δὴ τὸν θεὸν ἐν τῷ σώματι ⸀ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/020.yaml
  text: For you were bought with a price[b][a]; therefore glorify God in your body.
  footnotes:
  - marker: a
    text: 'Or ''For you were purchased for a price.'' The Greek keeps the imagery of a purchase cost paid.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''therefore'' may be rendered ''then'' or left untranslated; the particle adds urgency to the command.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분은 값으로 사신 바 되었습니다. 그러므로 여러분의 몸으로 하나님께 영광을 돌리십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγοράσθητε γὰρ τιμῆς
  english_pob_choice: For you were bought with a price
  chosen_korean: 값으로 사신 바 되었습니다
  alternatives_korean:
  - 값을 치러 사신 바 되었습니다
  lexicon: BDAG
  rationale: 'ἀγοράζω의 시장적 「사다」, 노예 매매의 함의를 보존. 7:23과 어휘 호응.'
- source_word: δοξάσατε … τὸν θεὸν ἐν τῷ σώματι
  english_pob_choice: glorify God in your body
  chosen_korean: 몸으로 하나님께 영광을 돌리십시오
  alternatives_korean:
  - 몸 안에서 하나님께 영광을 돌리십시오
  lexicon: BDAG
  rationale: ἐν + 여격을 도구적·정황적 「로」로.
theological_decisions:
- issue: '6:19–20 「값 주고 사신 바」(ἠγοράσθητε γὰρ τιμῆς) 노예 매매의 함의 보존'
  chosen_reading: ἀγοράζω의 시장적·노예적 의미를 살려 「값으로 사신 바 되었다」로 옮긴다. 신자의 몸은 자기 소유가 아니라 값을 치러 사신 주께 속한다
  alternative_readings:
  - 「대속함을 받았다」 등 추상적 구속론 표현으로 의역
  rationale: '바울은 6:12의 「자유」 격언과 6:20의 「사신 바 되었다」를 의도적으로 충돌시켜, 그리스도인의 자유가 매임에서 옴을 보여준다(7:21–23도 동일 구조). 한국어 번역이 「대속」 같은 추상화로 미끄러지면 매매·매임의 무게가 사라지므로, 본 POB는 「값으로 사신 바」를 채택해 7:23과 어휘 일관성을 유지한다.'
  doctrine_reference: 'DOCTRINE.md §1·§5: 매임 어휘의 무게 보존 (Php 1:1·고전 7:21–23도 동일)'
