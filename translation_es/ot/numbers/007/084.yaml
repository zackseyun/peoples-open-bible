  to: 'Esta fue la ofrenda de dedicación del altar el día en que fue ungido[a], de los líderes de Israel[b]: doce platos de plata, doce tazones de plata[c] y doce cucharas de oro.'
  rationale: Se corrige 'copas de oro' a 'cucharas de oro' para alinearlo con el campo semántico y la justificación del POB inglés para כַּפּוֹת זָהָב. Se simplifica 'por parte de' a 'de' para reflejar mejor מֵאֵת y mejorar la fluidez del español. Se reanclan las notas para que 'líderes de Israel' lleve su alternativa léxica y los utensilios mantengan una nota específica.
