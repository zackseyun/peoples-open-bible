translation:
  text: '“Listen, then,” he says, “foolish one, how sorrow wears down[a] the Holy Spirit and again saves. Whenever the double‑minded[b] person sets himself to some deed and fails in it because of his double‑mindedness, this sorrow enters into the person and grieves the Holy Spirit and wears it down. Then again, when quick temper[c] clings to a person about some matter and he becomes exceedingly embittered, again sorrow enters into the heart of the one who gave way to quick temper, and he is grieved over his deed that he did and repents, because he worked evil. This sorrow, then, seems to have salvation[f], because having done the evil he repented. Therefore both actions grieve the Spirit: double‑mindedness, because it did not succeed in its deed; and quick temper grieves the Spirit, because it did the evil. Both, then, are grievous to the Holy Spirit—double‑mindedness and quick temper. Remove, therefore, sorrow from yourself, and do not afflict the Holy Spirit that dwells in you, lest it plead[d] with God and depart from you. For the Spirit of God that has been given into this flesh does not endure sorrow or anguish[e].”'
