  text: And the ledge was fourteen cubits long by fourteen cubits wide at its four sides[a], and the border around it was half a cubit, and its base was a cubit all around[c][b]; and its steps faced east.
  footnotes:
  - marker: a
    text: Or 'the settle' or 'the platform' for 'the ledge' (הָעֲזָרָה), a technical term for a structural tier of the altar.
    reason: lexical_alternative
  - marker: b
    text: Or 'to its four quarters'; the Hebrew phrase indicates that the fourteen-by-fourteen measurement applied uniformly on all four sides.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'its gutter' for 'its base' (הַחֵיק), if the term is understood as a surrounding trench-like feature at the altar's bottom.
    reason: lexical_alternative
