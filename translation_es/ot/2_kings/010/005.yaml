revisions:
- from: 'Entonces el que estaba sobre el palacio[a], y el que estaba sobre la ciudad, junto con los ancianos y los guardianes, enviaron a Jehú y dijeron: «Nosotros somos tus siervos, y todo lo que nos digas haremos. No proclamaremos rey a ningún hombre. Haz lo que sea bueno a tus ojos».'
  to: 'Entonces el que estaba a cargo del palacio, y el que estaba a cargo de la ciudad, junto con los ancianos y los guardianes[a], enviaron este mensaje a Jehú: «Somos tus siervos, y haremos todo lo que nos digas. No haremos rey a ningún hombre. Haz lo que sea bueno a tus ojos».'
  rationale: Se corrige el error principal de anclaje de la nota al pie para que corresponda a «guardianes», el término realmente comentado por la evidencia léxica. Además, se mejora la naturalidad del español con «a cargo de» para las dos funciones administrativas, se refleja mejor לֵאמֹר con «enviaron este mensaje a Jehú», y se ajusta «No proclamaremos rey» a «No haremos rey» para conservar más directamente el valor causativo del hebreo.
