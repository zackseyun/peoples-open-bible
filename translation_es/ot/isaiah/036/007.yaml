    text: O, de manera más interpretativa, “adorarán ante este altar”. El verbo hebreo denota específicamente postrarse o inclinarse.
    reason: lexical_alternative
  revision_rationale: Se reordenó la cláusula para que Ezequías quede claramente como sujeto de “ha quitado”, se preservó el valor posesivo con una construcción natural en español (“cuyos... y cuyos...”), se mejoró la idiomaticidad de לפני con “ante”, y se normalizó la puntuación. Se mantuvo “se postrarán” por fidelidad léxica al gesto físico-cultual, con nota que conserva la alternativa interpretativa “adorarán”. No se requiere adjudicación adicional porque el ajuste es principalmente sintáctico y de claridad, no doctrinalmente incierto.
