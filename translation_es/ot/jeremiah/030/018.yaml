translation:
  language: es
  text: 'Así dice Yahvé: Miren[a], estoy restaurando las fortunas de las tiendas de Jacob, y tendré compasión de sus moradas. La ciudad será reedificada sobre su montículo, y el palacio estará en su lugar apropiado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy haciendo volver a los cautivos de las tiendas de Jacob», o «estoy restaurando a Jacob del cautiverio». El modismo hebreo puede referirse específicamente al regreso del cautiverio o, más ampliamente, a la restauración de las fortunas o de la condición de Jacob.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: uso consistente del nombre divino en el proyecto
  rationale: Se sigue el criterio del proyecto para el nombre propio divino, conservando la referencia al Tetragrámaton sin ocultarlo tras una sustitución de título.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Mira, yo
  - Aquí estoy yo
  lexicon: HALOT
  rationale: La fórmula profética exige un énfasis deíctico y solemne. «He aquí, yo» mantiene ese valor y suena natural en español bíblico moderno.
- source_word: שָׁב שְׁבוּת
  english_pob_choice: am restoring the fortunes
  chosen_spanish: restauro la fortuna
  alternatives_spanish:
  - restauro el cautiverio
  - hago volver a los cautivos
  - restauro la suerte
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede abarcar más que el regreso literal de cautivos. «Restauro la fortuna» conserva el sentido de reversión/restauración general que el contexto desarrolla.
- source_word: אָהֳלֵי יַעֲקֹב
  english_pob_choice: the tents of Jacob
  chosen_spanish: las tiendas de Jacob
  alternatives_spanish:
  - las tiendas de Israel
  - los campamentos de Jacob
  lexicon: HALOT
  rationale: «Tiendas» reproduce la imagen concreta del hebreo y preserva el matiz corporativo de la casa de Jacob sin volverla un término más abstracto.
- source_word: מִשְׁכְּנֹתָיו
  english_pob_choice: his dwellings
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus habitaciones
  - sus viviendas
  - sus habitáculos
  lexicon: HALOT
  rationale: «Moradas» suena natural, digno y suficientemente concreto para el paralelismo con «tiendas». Mantiene la imagen de habitación/restablecimiento doméstico.
- source_word: אֲרַחֵם
  english_pob_choice: I will have compassion
  chosen_spanish: tendré compasión
  alternatives_spanish:
  - mostraré misericordia
  - me apiadaré
  - tendré misericordia
  lexicon: HALOT
  rationale: La elección comunica bien la misericordia pactual con un español claro y sin forzar matices que «piedad» podría introducir.
- source_word: עִיר
  english_pob_choice: The city will be rebuilt
  chosen_spanish: la ciudad
  alternatives_spanish:
  - una ciudad
  - esa ciudad
  lexicon: uso contextual del sustantivo definido por el marco profético
  rationale: Aunque el hebreo carece de artículo, el contexto apunta a la ciudad restaurada de Jerusalén/Zion. En español, el artículo definido comunica mejor esa referencia contextual.
- source_word: וְנִבְנְתָה
  english_pob_choice: will be rebuilt
  chosen_spanish: será reedificada
  alternatives_spanish:
  - será reconstruida
  - será edificada de nuevo
  lexicon: HALOT
  rationale: «Reedificada» conserva tanto la reconstrucción como la idea de edificar de nuevo, y encaja mejor con el paralelismo de restauración del versículo.
- source_word: עַל תִּלָּהּ
  english_pob_choice: on its mound
  chosen_spanish: sobre su collado
  alternatives_spanish:
  - sobre su montículo
  - sobre su monte
  - sobre su ruina
  lexicon: HALOT
  rationale: El hebreo habla de un montículo/tell. «Collado» ofrece un equivalente natural en español bíblico y evita la tecnicidad de «tell» o la sobreespecificación de «ruina».},{
theological_decisions:
- issue: Alcance de שָׁב שְׁבוּת
  english_pob_reading: A broad restoration of Jacob's condition/fortunes, not restricted to literal release from captivity.
  chosen_spanish_reading: Una restauración amplia de la condición de Jacob, no limitada al regreso literal de cautivos.
  alternative_spanish_readings:
  - El regreso literal de los cautivos
  - La restauración desde el exilio con matiz principal de retorno físico
  rationale: 'La frase hebrea es idiomática y el contexto acumula imágenes de restauración total: tiendas, moradas, ciudad y palacio. La traducción principal evita estrechar el sentido y conserva la amplitud del oráculo.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica cuando el hebreo es idiomático'
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del expediente: no se registran cambios aplicados; el acuerdo de auditoría es alto y la solución inglesa se mantiene estable. La versión española sigue esa decisión, adaptando solo la formulación natural del español sin alterar el análisis lexical ni la amplitud del idiomismo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conservó el valor idiomático de שָׁב שְׁבוּת en la línea principal, con nota alternativa para la lectura de cautiverio.
  - Se tradujo מִשְׁכְּנֹתָיו como «sus moradas» para equilibrar concreción y naturalidad, en paralelo con «las tiendas de Jacob».
  - «Palacio» y «su lugar debido» reproducen el tono de restauración ordenada del final del versículo sin introducir un matiz militar innecesario.
