id: SNG.8.4
reference: Song of Songs 8:4
source:
  edition: WLC
  text: הִשְׁבַּ֥עְתִּי אֶתְ/כֶ֖ם בְּנ֣וֹת יְרוּשָׁלִָ֑ם מַה תָּעִ֧ירוּ וּֽ/מַה תְּעֹֽרְר֛וּ אֶת הָ/אַהֲבָ֖ה עַ֥ד שֶׁ/תֶּחְפָּֽץ־׀־־׃ס
translation:
  text: 'I adjure you[b][a], daughters of Jerusalem: why should you awaken or stir up love until it desires?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I charge you ... that you not awaken or stir up love until it pleases.' The Hebrew syntax has often been rendered as a prohibition in English, but the wording here more directly reflects the interrogative form of the source text.
    reason: alternative_reading
  - marker: b
    text: The feminine singular verb 'desires/pleases' matches the feminine noun 'love,' personifying love as something that should not be forced before its proper time.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  chosen: I adjure
  alternatives:
  - I charge
  - I put you under oath
  lexicon: HALOT
  rationale: Hiphil of שׁבע here means to place someone under oath / solemnly charge. 'Adjure' preserves the solemn force better than a flatter 'charge,' while remaining concise. First person singular is retained.
- source_word: בְּנוֹת יְרוּשָׁלִָם
  chosen: daughters of Jerusalem
  alternatives:
  - young women of Jerusalem
  lexicon: HALOT
  rationale: A conventional vocative in Song. 'Daughters' is the more literal rendering and preserves the poetic address; 'young women' is interpretive and therefore kept as an alternative only.
- source_word: מַה
  chosen: why should
  alternatives:
  - that you not
  - lest you
  lexicon: HALOT
  rationale: 'In this recurring refrain, מַה with the following imperfects is best taken as an interrogative/exclamatory prohibition-like appeal: ''why should you...?'' This follows the plain Hebrew here rather than importing the more traditional English ''that you not,'' which smooths the syntax into a prohibition not explicitly stated.'
- source_word: תָּעִירוּ
  chosen: awaken
  alternatives:
  - rouse
  - arouse
  lexicon: HALOT
  rationale: From עור in Hiphil, 'awaken' is a natural English equivalent and pairs well with the following verb while preserving the metaphor.
- source_word: תְּעֹרְרוּ
  chosen: stir up
  alternatives:
  - rouse
  - arouse
  lexicon: HALOT
  rationale: The second verb from the same root is rendered with a distinct but related English expression to reflect the Hebrew poetic doubling without collapsing both verbs into one identical gloss.
- source_word: הָאַהֲבָה
  chosen: love
  lexicon: HALOT
  rationale: The noun plainly means 'love.' In Song this may denote love as an experience or passion; the English keeps that breadth without over-specifying.
- source_word: עַד שֶׁתֶּחְפָּץ
  chosen: until it desires
  alternatives:
  - until it pleases
  - until she desires
  lexicon: HALOT
  rationale: חפץ means to desire, delight in, or please. The 3fs verb agrees grammatically with the feminine noun 'love.' 'Until it desires' preserves the personification of love and avoids the traditional but less transparent 'until it please.'
