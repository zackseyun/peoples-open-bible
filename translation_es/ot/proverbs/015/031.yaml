    reason: lexical_alternative
  - marker: b
    text: La expresión «reprensión que da vida» traduce un hebreo que también puede entenderse como «reprensión de vida» o «reprensión para la vida», es decir, corrección que conduce a la vida.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal para reflejar mejor el sentido fuente y la decisión documentada en el POB inglés: una reprensión que conduce a la vida. ''Reprensión'' preserva mejor la fuerza de תּוֹכַחַת, ''que da vida'' ofrece un español más claro y fiel que ''de la vida'', y ''permanecerá'' expresa naturalmente el uso figurado de תָּלִין. Las notas conservan las alternativas más literales y la imagen verbal hebrea.'
