translation:
  language: es
  text: Las bestias salvajes del desierto son alimento para el león[a][b]; así los pobres son pastura para los ricos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «¿Qué paz tiene la hiena con el perro? ¿Y qué paz tiene el rico con el pobre?» El paralelo griego conserva otro proverbio con el mismo punto social: la hostilidad entre ricos y pobres.'
    reason: alternative_reading
  - marker: b
    text: O posiblemente «los asnos salvajes del desierto», si el término hebreo se entiende de manera más estrecha y no como animales salvajes en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲכַל
  english_pob_choice: food for
  chosen_spanish: alimento para
  alternatives_spanish:
  - presa de
  - comida para
  lexicon: HALOT
  rationale: El sustantivo expresa lo que es comido. «Alimento para» conserva la imagen depredadora sin añadir precisión innecesaria sobre el modo de captura y suena natural en español.
- source_word: אֲרִי
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - lion
  lexicon: HALOT
  rationale: Es el equivalente directo y normal del término animal hebreo.
- source_word: פִּרְאֵי מִדְבָּר
  english_pob_choice: the wild beasts of the wilderness
  chosen_spanish: las bestias salvajes del desierto
  alternatives_spanish:
  - los animales salvajes del desierto
  - los asnos salvajes del desierto
  lexicon: HALOT
  rationale: La expresión se entiende de manera colectiva y general como animales salvajes de zona árida o desértica. «Bestias salvajes» comunica bien el sentido amplio; se preserva en nota la alternativa más específica si פרא se toma como asno salvaje.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - de la misma manera
  lexicon: HALOT
  rationale: Introduce la comparación proverbial con naturalidad en español.
- source_word: מַרְעִית
  english_pob_choice: the pasture of
  chosen_spanish: el pasto de
  alternatives_spanish:
  - el pastizal de
  - la presa de
  lexicon: HALOT
  rationale: «Pasto» conserva la imagen hebrea de pastoreo, aunque en contexto funciona metafóricamente para la explotación de los pobres por los ricos.
- source_word: עָשִׁיר
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - el rico
  - las personas ricas
  lexicon: HALOT
  rationale: En el proverbio funciona como categoría plural representativa; el plural español expresa mejor ese valor general.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los menesterosos
  lexicon: HALOT
  rationale: Es la correspondencia más directa para el grupo social vulnerable al que alude el hebreo y que coincide con el paralelo griego πένητα.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew proverb is primary, with the Greek preserved as an alternative reading in a footnote because it uses a different but related image of hostility between rich and poor.
  chosen_spanish_reading: El texto principal sigue el proverbio hebreo; la nota conserva la formulación griega alternativa sobre la enemistad entre ricos y pobres.
  alternative_spanish_readings:
  - ¿Qué paz tiene la hiena con el perro? ¿Y qué paz tiene el rico con el pobre?
  rationale: La política del proyecto da primacía al hebreo cuando está conservado. Aquí el hebreo y el griego no son simples variantes léxicas, sino imágenes proverbiales distintas con el mismo punto social; por eso se traduce el hebreo en el cuerpo y se preserva el griego en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve Greek parallel as meaningful alternative when it diverges.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; se mantuvo la decisión de traducir el hebreo como texto principal y reservar el griego para nota, ya que el contraste entre ambas tradiciones sigue siendo el principal punto textual del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Pobres» traduce de forma directa דַּלִּים y mantiene el contraste socioeconómico del proverbio.
  - Se conservó la imagen animal/metafórica sin reducirla a una mera paráfrasis social, para no borrar la tensión léxica del hebreo.
