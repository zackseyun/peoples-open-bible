  text: כִּֽי חִנָּ֣ם טָֽמְנוּ לִ֭/י שַׁ֣חַת רִשְׁתָּ֑/ם חִ֝נָּ֗ם חָפְר֥וּ לְ/נַפְשִֽׁ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/007.yaml
  text: For without cause they hid their net's pit for me[d][c][b][a]; without cause they dug it for my life.
  footnotes:
  - marker: a
    text: Or 'they hid a pit with their net for me'; the Hebrew construction joins 'pit' and 'their net' closely, and the exact relationship may be understood in more than one way.
    reason: lexical_alternative
  - marker: b
    text: '''For my life'' renders Hebrew ''for my nephesh,'' meaning the psalmist himself or his life, not necessarily ''soul'' in a narrow later theological sense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their net’s pit'.
    reason: previous_rendering
  - marker: d
    text: Or 'they hid the pit for their net for me'.
    reason: previous_rendering
