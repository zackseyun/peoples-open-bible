translation:
  language: es
  text: Pero muchos de los sacerdotes, los levitas y los jefes de las casas paternas[a], los ancianos que habían visto la primera casa, lloraban en alta voz cuando se puso el fundamento de esta casa delante de sus ojos[b], mientras muchos levantaban su voz con gritos de alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'linajes paternos' para 'casas paternas'. La expresión hebrea apunta a grupos familiares extensos o clanes dirigidos por un cabeza de familia.
    reason: cultural_note
  - marker: b
    text: O 'ante sus ojos'. El hebreo es una expresión idiomática que resalta que presenciaron personalmente la colocación del fundamento.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרַבִּים
  english_pob_choice: But many
  chosen_spanish: Pero muchos
  alternatives_spanish:
  - Y muchos
  - muchos
  lexicon: HALOT
  rationale: Se conserva el contraste que el POB inglés marcó con 'But' y el sentido cuantitativo de רַבִּים. 'Pero' funciona bien en español para introducir el contraste narrativo.
- source_word: מֵהַכֹּהֲנִים וְהַלְוִיִּם וְרָאשֵׁי הָאָבוֹת
  english_pob_choice: of the priests and Levites and heads of fathers’ houses
  chosen_spanish: de los sacerdotes, de los levitas y de los jefes de las casas paternas
  alternatives_spanish:
  - de los sacerdotes, de los levitas y de los jefes de los linajes
  - de los sacerdotes, de los levitas y de los jefes de las familias paternas
  lexicon: HALOT
  rationale: El partitivo queda natural en español con 'de los'. 'Casas paternas' conserva la estructura social hebrea de clan/linaje, siguiendo la decisión auditada de no aplanarla sin necesidad.
- source_word: הַזְּקֵנִים
  english_pob_choice: the old men
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los hombres de edad avanzada
  - los ancianos
  lexicon: HALOT
  rationale: Aquí el rasgo relevante es la edad de quienes habían visto el templo anterior, no una función oficial. 'Ancianos' es más idiomático en español y mantiene la referencia a edad respetuosa.
- source_word: אֲשֶׁר רָאוּ אֶת הַבַּיִת הָרִאשׁוֹן
  english_pob_choice: who had seen the first house
  chosen_spanish: que habían visto la primera casa
  alternatives_spanish:
  - que habían visto la casa primera
  - que habían visto la primera morada
  lexicon: HALOT
  rationale: Se conserva 'casa' para reflejar בַּיִת, el término habitual del libro para el templo. 'Primera' mantiene el eco de 'first house' sin forzar 'templo' en el texto principal.
- source_word: בְּיָסְדוֹ זֶה הַבַּיִת
  english_pob_choice: when the foundation of this house was laid
  chosen_spanish: cuando ... se echó el fundamento de esta casa
  alternatives_spanish:
  - cuando se puso el fundamento de esta casa
  - cuando se puso la base de esta casa
  - cuando se colocó el cimiento de esta casa
  lexicon: HALOT
  rationale: El sentido es claramente de fundación/puesta de cimiento. 'Se echó el fundamento' es una forma tradicional y precisa en español, compatible con el pasivo narrativo hebreo.
- source_word: בְּעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a sus ojos
  - en su presencia
  - ante sus ojos
  lexicon: HALOT
  rationale: La locución española transmite el carácter visual e inmediato del hebreo idiomático sin volverla demasiado literal.
- source_word: בֹּכִים בְּקוֹל גָּדוֹל
  english_pob_choice: were weeping with a loud voice
  chosen_spanish: lloraban con voz fuerte
  alternatives_spanish:
  - lloraban a voz en cuello
  - sollozaban en alta voz
  - lloraban con gran voz
  lexicon: HALOT
  rationale: '''Con voz fuerte'' conserva de manera clara la imagen hebrea de una voz audible y grande, sin sobreinterpretar el matiz emocional. Se evita reducirlo a un mero adverbio.'
- source_word: וְרַבִּים
  english_pob_choice: while many
  chosen_spanish: mientras muchos
  alternatives_spanish:
  - y muchos
  - pero muchos
  - al mismo tiempo muchos
  lexicon: HALOT
  rationale: '''Mientras'' expresa bien la simultaneidad contrastiva del segundo grupo en la escena.'
- source_word: בִּתְרוּעָה בְשִׂמְחָה
  english_pob_choice: with a shout of joy
  chosen_spanish: con gritos de alegría
  alternatives_spanish:
  - con un grito de alegría
  - con aclamación de gozo
  - con júbilo
  lexicon: HALOT
  rationale: תרועה es un clamor/grito jubiloso; 'gritos de alegría' reproduce de forma natural la pluralidad sonora implícita en la escena y conserva la especificación de gozo.
- source_word: לְהָרִים קוֹל
  english_pob_choice: were raising their voice
  chosen_spanish: levantaban su voz
  alternatives_spanish:
  - alzaban su voz
  - elevaban su voz
  - levantaban la voz
  lexicon: HALOT
  rationale: El idiomático 'levantar la voz' comunica fielmente לְהָרִים קוֹל. Se mantiene el movimiento expresivo sin hacerlo demasiado literal.
theological_decisions:
- issue: Referencia al templo anterior como 'la primera casa' / 'la primera casa' frente a 'templo'
  english_pob_reading: who had seen the first house
  chosen_spanish_reading: que habían visto la primera casa
  alternative_spanish_readings:
  - que habían visto el primer templo
  - que habían visto la antigua casa
  rationale: El hebreo dice literalmente 'casa', y Ezra usa ese término para el templo. Mantener 'casa' preserva el vínculo léxico y evita introducir un término explicativo que el texto no usa. La referencia cultual queda clara por el contexto.
  doctrine_reference: Eclesiología y lenguaje del santuario en Ezra-Nehemías
- issue: Jerarquía social de 'heads of fathers’ houses'
  english_pob_reading: heads of fathers’ houses
  chosen_spanish_reading: jefes de las casas paternas
  alternative_spanish_readings:
  - jefes de los linajes paternos
  - cabezas de las familias patriarcales
  rationale: Se conserva la organización tribal/clánica del hebreo sin traducirla a una noción moderna más general de 'familias'. 'Casas paternas' mantiene el dato histórico-social y evita perder la estructura de representación familiar.
  doctrine_reference: Historia social de Israel en el AT
- issue: El contraste entre llanto y alegría en la restauración del culto
  english_pob_reading: were weeping ... while many were raising their voice with a shout of joy
  chosen_spanish_reading: lloraban ... mientras muchos levantaban su voz con gritos de alegría
  alternative_spanish_readings:
  - lloraban ... y muchos levantaban su voz con alegría
  - lloraban ... mientras otros clamaban con gozo
  rationale: 'No se suaviza la tensión afectiva del pasaje: la restauración produce memoria dolorosa y celebración simultáneas. El español conserva ambas respuestas sin armonizarlas artificialmente.'
  doctrine_reference: Teología del retorno y restauración en el AT
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que precisó el valor temporal de 'when the foundation of this house was laid'. Por eso se traduce con un pasivo narrativo español equivalente ('se echó el fundamento') y no con una paráfrasis como 'cuando fue fundada esta casa'. También se preserva la triple enumeración social y el contraste simultáneo entre llanto y júbilo.
  spanish_consistency_notes:
  - Se mantiene 'casa' para el templo en coherencia con el uso de Ezra y con la elección inglesa auditada de 'house'.
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Casas paternas'' se usa de manera consistente para ''fathers’ houses'' en lugar de ''familias'' para no borrar la estructura clánica del texto.'
  - '''Levitas'' y ''sacerdotes'' se conservan como términos técnicos usuales y transparentes en español bíblico.'
  - 'La puntuación refleja la estructura contrastiva del hebreo: primer grupo en llanto, segundo grupo en júbilo simultáneo.'
