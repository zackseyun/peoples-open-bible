    issue: La frase 'más allá de mil' es poco natural en español en este contexto comparativo.
    rationale: Aunque intenta seguir el inglés revisado 'beyond a thousand', en español suena espacial más que comparativa. El sentido documentado es que su nombre supera al de mil otros; una forma como 'más que mil[a]' preserva la compacidad y permite explicarlo en nota.
  - severity: medium
    issue: La nota [a] actual no refleja el motivo principal de la dificultad textual/comparativa.
    rationale: La nota inglesa [a] comenta 'he will leave behind a name than a thousand' y explica la comparación, pero la nota española [a] se desplazó hacia ἐμμένῃ. Eso debilita la trazabilidad del audit trail.
  - severity: low
    issue: '''Todavía los realiza'' es menos idiomático y deja el referente de ''los'' algo áspero en español.'
    rationale: El griego αὐτά es indefinido y plural; en español conviene una solución que conserve esa indeterminación con mayor fluidez, como 'sigue produciéndolos'.
  revised_spanish_text: Si permanece firme, dejará un nombre más que mil[a]; y si llega a descansar[b], sigue produciéndolos.
