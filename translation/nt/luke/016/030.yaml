theological_decisions:
- issue: Meaning of repentance language
  chosen_reading: Render μετανοήσουσιν as 'they will repent'
  alternative_readings:
  - they will change their minds
  - they will turn
  rationale: In this Lukan context, the rich man is speaking of a response to divine warning leading to moral-spiritual reversal. 'Repent' best preserves that biblical sense and avoids reducing the term to mere intellectual reconsideration.
  doctrine_reference: Translation philosophy §1, §6
