lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - sucedió
  lexicon: HALOT
  rationale: En la fórmula profética, el sentido idiomático es que la palabra divina ‘vino’ al profeta; ‘vino’ conserva la fórmula sin el calco más áspero de ‘fue’.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: ‘Palabra’ reproduce el término clave del formulario profético y mantiene la conexión con el patrón recurrente ‘la palabra de Yahvé’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como ‘Yahvé’, conforme al criterio editorial del proyecto, en vez de sustituirlo por un título como ‘el Señor’.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona se expresa naturalmente en español como ‘a mí’, con claridad y sin arcaísmo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: En la introducción de discurso directo, ‘diciendo’ mantiene la cadencia formal del hebreo y señala que sigue la palabra pronunciada.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Nombre propio; por eso se vierte como ‘Yahvé’, preservando la referencia covenantal y evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de la nota: el marcador [a] aparece ahora en el texto español junto a la palabra a la que remite, preservando la nota sobre el Nombre divino.'
  spanish_consistency_notes:
  - Se mantiene el registro profético breve y solemne.
  - ‘Yahvé’ se usa de forma consistente para el Tetragrámaton.
  - La sintaxis conserva el orden natural del español sin perder la fórmula hebrea.
  - El gerundio ‘diciendo’ funciona como introductor de cita directa y no como acción independiente.
