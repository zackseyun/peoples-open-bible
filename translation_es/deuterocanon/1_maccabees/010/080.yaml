  text: Y Jonatán se dio cuenta de que había una emboscada detrás de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: realized
  chosen_spanish: se dio cuenta de
  alternatives_spanish:
  - entendió
  - reconoció
  - supo
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí marca una toma de conciencia puntual en la acción narrativa. En español, «se dio cuenta de» comunica bien ese descubrimiento súbito sin sonar forzado ni demasiado intelectual.
- source_word: ἔνεδρον
  english_pob_choice: an ambush
  chosen_spanish: una emboscada
  alternatives_spanish:
  - un grupo en emboscada
  - una trampa
  - una celada
  lexicon: LSJ
  rationale: ἔνεδρον designa una emboscada o gente apostada para atacar. «Emboscada» es el equivalente español natural y directo, y conserva el valor militar del sustantivo.
- source_word: κατόπισθεν αὐτοῦ
  english_pob_choice: behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - a sus espaldas
  - a su retaguardia
  lexicon: LSJ
  rationale: La frase indica posición a la parte posterior de Jonatán. «Detrás de él» es la opción más clara y neutral en español contemporáneo.
- source_word: ἐστιν
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - estaba
  - existía
  lexicon: BDAG
  rationale: 'Aunque el griego usa presente, el sentido narrativo en español pide un imperfecto de estado: «había una emboscada». Conserva la referencia a la presencia de la emboscada sin sobrecargar la frase.'
