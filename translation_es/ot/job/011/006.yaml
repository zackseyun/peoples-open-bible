revisions:
- from: y te haría saber los secretos de la sabiduría[a], porque la sabiduría es de dos aspectos[b]. Sabe, pues[c], que Dios ha olvidado parte de tu iniquidad.
  to: y te haría saber las cosas ocultas de la sabiduría[a], porque la sabiduría sólida es doble[b]. Sabe, pues, que Dios ha olvidado parte de tu iniquidad[c].
  rationale: 'Se corrige el texto para alinearlo mejor con la evidencia fuente y el audit trail inglés: ''las cosas ocultas de la sabiduría'' preserva la elección principal frente a ''secretos'' como alternativa; ''la sabiduría sólida es doble'' refleja mejor tanto תושיה como כִפְלַיִם que la expresión poco idiomática ''es de dos aspectos''; y la nota final ahora ofrece alternativas reales para el verbo difícil en vez de duplicar la lectura del texto principal.'
  reviewer_model: gpt-5.4
