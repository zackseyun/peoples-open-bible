translation:
  language: es
  text: 'El joven respondió de nuevo a Saúl y dijo[a]: «Mira, tengo en mi mano un cuarto de siclo de plata. Se lo daré al hombre de Dios, y él nos dirá nuestro camino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el camino que debemos tomar». El hebreo dice literalmente «nuestro camino», que puede referirse a la ruta que tienen por delante o al curso de acción que deben seguir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף ... לַעֲנוֹת
  english_pob_choice: answered ... again
  chosen_spanish: respondió de nuevo
  alternatives_spanish:
  - contestó otra vez
  - volvió a responder
  - respondió nuevamente
  lexicon: HALOT
  rationale: El hebreo expresa la idea iterativa de ‘responder otra vez’. ‘Respondió de nuevo’ conserva esa repetición sin sonar forzado en español moderno.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el siervo
  - el joven sirviente
  lexicon: HALOT
  rationale: ‘הַנַּעַר’ puede significar joven, muchacho o sirviente. Aquí se conserva la amplitud del término con ‘el joven’, sin imponer una relación social más específica que la que el hebreo del verso exige.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: Es una partícula deíctica de atención. ‘Mira’ es natural en español actual y reproduce la función discursiva del hebreo.
- source_word: נִמְצָא בְיָדִי
  english_pob_choice: I have in my hand
  chosen_spanish: tengo en mi mano
  alternatives_spanish:
  - lo tengo en mi mano
  - está en mi mano
  - se encuentra en mi mano
  lexicon: HALOT
  rationale: La expresión hebrea, pasiva en forma, comunica posesión. ‘Tengo en mi mano’ preserva el sentido idiomático sin traducir de manera rígida la construcción.
- source_word: רֶבַע שֶׁקֶל כָּסֶף
  english_pob_choice: a quarter shekel of silver
  chosen_spanish: una cuarta parte de un siclo de plata
  alternatives_spanish:
  - un cuarto de siclo de plata
  - una cuarta de siclo de plata
  lexicon: HALOT
  rationale: Se mantiene la medida y el material monetario con vocabulario transparente en español. ‘Una cuarta parte de un siclo de plata’ explicita la fracción sin perder precisión.
- source_word: וְנָתַתִּי
  english_pob_choice: I will give
  chosen_spanish: La daré
  alternatives_spanish:
  - y la daré
  - entonces la daré
  - la voy a dar
  lexicon: HALOT
  rationale: El contexto pide valor prospectivo. En español, ‘la daré’ suena natural y conserva la intención futura del hablante. El objeto retomado (‘la’) remite al dinero mencionado antes.
- source_word: לְאִישׁ הָאֱלֹהִים
  english_pob_choice: to the man of God
  chosen_spanish: al hombre de Dios
  alternatives_spanish:
  - al varón de Dios
  - al hombre que es de Dios
  lexicon: HALOT
  rationale: Se conserva el título hebreo tradicional de manera transparente. ‘Hombre de Dios’ es fiel al hebreo y claro en español.
- source_word: וְהִגִּיד לָנוּ
  english_pob_choice: and he will tell us
  chosen_spanish: y él nos dirá
  alternatives_spanish:
  - y nos hará saber
  - y nos declarará
  - y nos comunicará
  lexicon: HALOT
  rationale: ‘הִגִּיד’ puede significar decir, declarar o dar a conocer. ‘Nos dirá’ es la opción más natural en esta secuencia narrativa, manteniendo el sentido básico de comunicar.
- source_word: אֶת דַּרְכֵּנוּ
  english_pob_choice: our way
  chosen_spanish: nuestro camino
  alternatives_spanish:
  - nuestro rumbo
  - la manera en que debemos ir
  - el camino que debemos tomar
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘nuestro camino’. ‘Nuestro camino’ conserva la metáfora espacial y deja abierta la referencia tanto al trayecto como al curso a seguir, como en la nota inglesa.
theological_decisions:
- issue: Título para el personaje divinamente comisionado
  english_pob_reading: man of God
  chosen_spanish_reading: hombre de Dios
  alternative_spanish_readings:
  - varón de Dios
  - hombre que es de Dios
  rationale: No hay necesidad de reinterpretar el título. La forma ‘hombre de Dios’ preserva la designación bíblica directa para el mediador/profeta al que se refiere el texto.
  doctrine_reference: Uso bíblico del título profético; cf. 1 Samuel 2:27; 2 Reyes 4:7
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia del contexto inglés: no se requieren cambios de fondo respecto del sentido base. Se preservó la iteración de ‘responder de nuevo’, el valor idiomático de ‘tener en la mano’, la medida monetaria, el título ‘hombre de Dios’ y la ambigüedad deliberada de ‘nuestro camino’.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ en otros pasajes según la norma del proyecto, pero este versículo no contiene el nombre divino explícito; aquí aparece ‘Dios’ en el título hebreo ‘hombre de Dios’.
  - Se prefirió ‘el joven’ para mantener la amplitud de נער sin cerrar indebidamente la función social del personaje.
  - La nota de pie conserva la ambigüedad semántica de דַּרְכֵּנוּ en español con una alternativa interpretativa explícita.
