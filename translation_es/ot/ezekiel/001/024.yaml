translation:
  language: es
  text: Y oí el sonido de sus alas[a], como el sonido de muchas aguas, como el sonido del Todopoderoso, cuando iban; un sonido de tumulto, como el sonido de un campamento militar[b]. Cuando se detenían, bajaban sus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el sonido de Shaddai». El hebreo usa el título divino שַׁדַּי, tradicionalmente traducido «el Todopoderoso».
    reason: lexical_alternative
  - marker: b
    text: O «como el sonido de un campamento»; el hebreo מַחֲנֶה suele referirse a un campamento militar, de ahí «campamento militar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  english_pob_choice: And I heard
  chosen_spanish: Y oí
  alternatives_spanish:
  - Y escuché
  - Entonces oí
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo en la visión. En español, «Y oí» conserva la secuencia sin añadir un matiz temporal más fuerte que el del hebreo.
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: Aquí קוֹל se repite para comparar realidades audibles; «sonido» funciona naturalmente en español y evita restringir el término a «voz».
- source_word: כַּנְפֵיהֶם / כַנְפֵיהֶן
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - las alas de ellos
  - las alas de ellas
  lexicon: HALOT
  rationale: El hebreo alterna sufijos masculinos y femeninos por acuerdo gramatical con el sustantivo, no por cambio del referente. En español, «sus alas» preserva la referencia sin forzar el género.
- source_word: כְּקוֹל מַיִם רַבִּים
  english_pob_choice: like the sound of many waters
  chosen_spanish: como el sonido de muchas aguas
  alternatives_spanish:
  - como el sonido de grandes aguas
  - como el sonido de aguas caudalosas
  lexicon: HALOT
  rationale: «Muchas aguas» reproduce de cerca la imagen bíblica y mantiene la fuerza de la comparación sin convertirla en paráfrasis interpretativa.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Sigo la decisión del POB inglés de traducir el título divino. «Todopoderoso» es el equivalente español más natural y reconocido para שַׁדַּי en este contexto visionario.
- source_word: בְּלֶכְתָּם
  english_pob_choice: when they went
  chosen_spanish: cuando iban
  alternatives_spanish:
  - cuando caminaban
  - mientras iban
  lexicon: HALOT
  rationale: La preposición con infinitivo expresa circunstancia temporal. «Cuando iban» es breve, claro y fiel al movimiento continuo del pasaje.
- source_word: הֲמֻלָּה
  english_pob_choice: tumult
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - ruido
  - estruendo
  lexicon: HALOT
  rationale: «Tumulto» conserva el valor de ruido agitado y colectivo, con un registro suficientemente solemne para la visión.
- source_word: מַחֲנֶה
  english_pob_choice: army camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de ejército
  lexicon: HALOT
  rationale: El hebreo puede referirse a un campamento, frecuentemente militar. En español, «campamento» es el término base; el contexto de tumulto mantiene la connotación colectiva y bélica sin necesidad de explicitarla en el texto principal.
- source_word: בְּעָמְדָם
  english_pob_choice: When they stood still
  chosen_spanish: Cuando se detenían
  alternatives_spanish:
  - cuando se quedaban quietos
  - cuando estaban quietos
  lexicon: HALOT
  rationale: La forma temporal contrasta con «cuando iban». «Se detenían» comunica la cesación del movimiento con naturalidad en español.
- source_word: תְּרַפֶּינָה
  english_pob_choice: they lowered
  chosen_spanish: bajaban
  alternatives_spanish:
  - las dejaban caer
  - las abatían
  - las relajaban
  lexicon: HALOT
  rationale: El Hifil de רפה expresa dejar caer o aflojar. «Bajaban» es la opción más idiomática en español para alas que dejan de batir, sin perder el sentido básico de descenso.
theological_decisions:
- issue: Título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: La lectura del POB inglés traduce el título en lugar de transliterarlo. En español, «el Todopoderoso» preserva el contenido semántico del hebreo y mantiene la referencia a la majestad divina sin introducir un nombre propio nuevo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
translation_notes:
  revision_awareness: El POB inglés mantuvo una equivalencia óptima estable sin cambios recientes; la cruz de revisión indica acuerdo alto y solo cuestiones menores. La traducción española sigue esa línea, conservando la estructura comparativa repetida, la alusión al título divino y la ambigüedad controlada de מַחֲנֶה mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene יהוה explícito.
  - Se traduce שַׁדַּי con un título español equivalente y no como nombre propio.
  - «Sus alas» cubre la oscilación de género gramatical del hebreo sin alterar el referente.
  - Se conserva la progresión rítmica de comparaciones con «como» y la alternancia temporal con «cuando».
