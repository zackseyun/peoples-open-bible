translation:
  language: es
  text: Y la muerte será escogida en vez de la vida por todo el remanente que quede de esta familia perversa[a], en todos los lugares donde el remanente quede, adonde yo los he expulsado —declara Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «en todos los lugares restantes donde los he expulsado allí». La formulación subraya a los sobrevivientes dispersos en cada lugar de exilio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִבְחַר
  english_pob_choice: will be chosen
  chosen_spanish: será escogida
  alternatives_spanish:
  - será elegida
  - se elegirá
  lexicon: HALOT
  rationale: 'El nifal expresa una pasiva/impersonal: no se dice quién elige, sino que la muerte quedará preferida. «Será escogida» conserva esa fuerza sin añadir sujeto.'
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - morrer
  - el morir
  lexicon: HALOT
  rationale: Es el sustantivo directo del hebreo y mantiene el contraste retórico con «vida».
- source_word: מֵחַיִּים
  english_pob_choice: rather than life
  chosen_spanish: antes que vida
  alternatives_spanish:
  - en vez de vida
  - más que vida
  lexicon: HALOT
  rationale: La comparación/preferencia se expresa de forma natural en español con «antes que», preservando el sentido de elección preferencial.
- source_word: לְכֹל הַשְּׁאֵרִית הַנִּשְׁאָרִים
  english_pob_choice: by all the remnant who remain
  chosen_spanish: por todo el remanente que queda
  alternatives_spanish:
  - por todo el remanente que permanece
  - por todos los sobrevivientes que quedan
  lexicon: HALOT
  rationale: «Remanente» conserva la carga profética de שְׁאֵרִית; «que queda» refleja la repetición verbal del hebreo sin volver la frase pesada. El «por» responde bien a la construcción pasiva en español.
- source_word: מִן הַמִּשְׁפָּחָה הָרָעָה הַזֹּאת
  english_pob_choice: from this evil family
  chosen_spanish: de esta familia mala
  alternatives_spanish:
  - de esta familia malvada
  - de este clan perverso
  lexicon: HALOT
  rationale: «Familia» es el equivalente más natural de מִשְׁפָּחָה en este contexto. Se conserva «mala» como traducción directa y sobria de רָעָה, sin intensificar indebidamente a «malvada».
- source_word: בְּכָל הַמְּקֹמוֹת הַנִּשְׁאָרִים
  english_pob_choice: in all the places where the remnant remain
  chosen_spanish: en todos los lugares donde el remanente queda
  alternatives_spanish:
  - en todos los lugares que quedan
  - en todos los lugares restantes
  lexicon: HALOT
  rationale: El hebreo repite la idea de «quedar/remanecer» aplicada a los lugares; se mantiene esa repetición en español para no perder la estructura auditiva y semántica del texto. «Lugares» traduce de manera transparente מְקֹמוֹת.
- source_word: אֲשֶׁר הִדַּחְתִּי/ם שָׁם
  english_pob_choice: where I have driven them
  chosen_spanish: donde yo los he expulsado
  alternatives_spanish:
  - donde los he arrojado
  - donde yo los he dispersado
  lexicon: HALOT
  rationale: הִדַּחְתִּים comunica expulsar/arrojar lejos, con matiz de juicio. «He expulsado» preserva esa fuerza mejor que «he enviado» o «he llevado».
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - declara Yahvé de los ejércitos celestiales
  - dice Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto. «De los ejércitos» traduce צְבָאוֹת de manera directa y reconocible en español bíblico contemporáneo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama; el proyecto pide rendirlo como «Yahvé» en el texto principal. Se evita la sustitución litúrgica por «SEÑOR» para preservar la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de שְׁאֵרִית
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - resto
  - sobrevivientes
  rationale: «Remanente» mantiene la resonancia profética y teológica del término sin suavizarlo a una mera descripción demográfica. En este versículo el remanente está bajo juicio, por lo que conviene conservar la tensión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
- issue: Repetición de la idea de quedar/remanecer
  english_pob_reading: in all the places where the remnant remain
  chosen_spanish_reading: en todos los lugares donde el remanente queda
  alternative_spanish_readings:
  - en todos los lugares restantes
  - en todos los lugares donde quedan
  rationale: El hebreo insiste en la repetición de la raíz de «quedar/remanecer». Se conserva esa repetición para respetar la estructura y el énfasis del original, en lugar de simplificarlo demasiado.
  doctrine_reference: Jeremiah 8:3 source repetition and audit revision
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que restauró la repetición de «remain/remnant» en la segunda mitad del versículo y fijó el nombre divino como Yahweh. En español se reflejó esa repetición con «remanente que queda» y «donde el remanente queda», manteniendo además la pasiva y el tono judicial del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «remanente» para שְׁאֵרִית y se mantuvo la repetición de «quedar» para reflejar el paralelismo del hebreo.
  - «Familia» se mantuvo para מִשְׁפָּחָה, evitando «clan» por ser menos natural en español general.
  - «Expulsado» conserva el matiz de juicio de הִדַּחְתִּים sin volverlo demasiado interpretativo.
