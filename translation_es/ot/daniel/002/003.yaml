translation:
  language: es
  text: 'Y el rey les dijo: «He soñado un sueño[a], y mi espíritu[c] está turbado[b] por conocer el sueño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Soñé un sueño». El hebreo, más literalmente, dice: «un sueño soñé», una construcción cognada que añade énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi espíritu fue turbado» o «mi espíritu está agitado».'
    reason: lexical_alternative
  - marker: c
    text: «Mi espíritu» también puede entenderse de manera más idiomática como «yo» o «mi mente», pero la traducción conserva el término hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La conjunción narrativa mantiene el flujo hebreo sin añadir una relación temporal más fuerte de la que exige el texto.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El dativo pronominal español expresa naturalmente el destinatario de la palabra del rey.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Traducción directa y estándar del sustantivo definido en contexto narrativo.
- source_word: חֲלוֹם חָלָמְתִּי
  english_pob_choice: I have dreamed a dream
  chosen_spanish: He soñado un sueño
  alternatives_spanish:
  - Soñé un sueño
  - Tuve un sueño
  lexicon: HALOT
  rationale: Se conserva la construcción cognada hebrea mediante un verbo + sustantivo de la misma raíz, preservando el énfasis retórico sin volverla antinatural en español.
- source_word: וַתִּפָּעֶם
  english_pob_choice: is troubled
  chosen_spanish: está turbado
  alternatives_spanish:
  - está agitado
  - fue turbado
  - está perturbado
  lexicon: HALOT
  rationale: «Turbado» comunica la agitación interior del verbo y mantiene un registro digno; el presente encaja bien en el discurso directo del rey.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi mente
  - yo
  lexicon: HALOT
  rationale: Se preserva el término antropológico hebreo; no se reduce a «mente» ni se personaliza con «yo», para no perder la imagen del original.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para entender
  - para saber
  lexicon: HALOT
  rationale: «Conocer» conserva bien el valor amplio de ידע en infinitivo y suena natural en español con la finalidad expresada por ל־.
- source_word: אֶת הַחֲלוֹם
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño mismo
  lexicon: HALOT
  rationale: En español, «sueño» es el equivalente normal de חֲלוֹם. Repetir «el sueño» mantiene la insistencia del hebreo y evita sustituirlo por un pronombre que debilite el paralelismo.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado como sin cambios y con el resumen de alta concordancia; se conservan las tres tensiones léxicas documentadas: la construcción cognada de «soñé un sueño», la ambigüedad de רוּחַ y la fuerza de תִּפָּעֶם.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; no aplica en este versículo.
  - Se mantiene «espíritu» para רוּחַ conforme al criterio POB, con nota sobre la posible lectura idiomática.
  - Se evita «SEÑOR» y otras sustituciones devocionales que no están motivadas por el hebreo aquí.
  - El tono es sobrio y bíblico, pero con sintaxis española natural para lectura pública.
