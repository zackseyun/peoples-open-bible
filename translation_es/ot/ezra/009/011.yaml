translation:
  language: es
  text: 'el cual mandaste por medio de tus siervos, los profetas, diciendo: «La tierra en la que ustedes entran para poseerla es una tierra de impureza[b], por la impureza de los pueblos de las tierras, por sus abominaciones con las cuales la han llenado de extremo a extremo[a] con su inmundicia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «de boca a boca», un modismo que significa que la tierra estaba llena por completo, de un extremo al otro.
    reason: lexical_alternative
  - marker: b
    text: O «una tierra impura» para «una tierra de impureza». El término hebreo usa lenguaje de contaminación que puede incluir matices rituales y morales.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - por medio de la mano de
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo de agencia/mediación. En español, «por medio de» transmite esa mediación con naturalidad sin perder el matiz de instrumento.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: Aquí la referencia es a los profetas como agentes honoríficos de Yahvé. «Siervos» conserva el registro reverente mejor que «esclavos», que sería demasiado fuerte y menos idiomático en este contexto.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  lexicon: HALOT
  rationale: Es el equivalente directo y estándar de נביאים; no hay razón contextual para variar.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para heredarla
  - para tomar posesión de ella
  lexicon: HALOT
  rationale: El verbo ירשׁ en este contexto apunta a tomar posesión de la tierra prometida. «Poseerla» es conciso y conserva la fuerza del derecho sobre la tierra; el objeto pronominal mantiene la referencia a «la tierra».
- source_word: אֶרֶץ נִדָּה
  english_pob_choice: a land of impurity
  chosen_spanish: una tierra de impureza
  alternatives_spanish:
  - una tierra impura
  - una tierra de inmundicia
  lexicon: HALOT
  rationale: «Impureza» preserva el sustantivo abstracto del hebreo y evita reducir el término a una sola esfera ritual o moral. Se mantiene así la carga de contaminación/defilement del texto.
- source_word: בְּנִדַּת עַמֵּי הָאֲרָצוֹת
  english_pob_choice: because of the impurity of the peoples of the lands
  chosen_spanish: por la impureza de los pueblos de las tierras
  alternatives_spanish:
  - por la inmundicia de los pueblos de las tierras
  - a causa de la impureza de los pueblos de los países
  lexicon: HALOT
  rationale: El hebreo usa un complemento causal en contexto. «Pueblos de las tierras» conserva el plural y el sentido étnico-geográfico; «impureza» sigue el término anterior para mantener coherencia léxica.
- source_word: בְּתוֹעֲבֹתֵיהֶם
  english_pob_choice: because of their abominations
  chosen_spanish: por sus abominaciones
  alternatives_spanish:
  - por sus prácticas detestables
  - por sus cosas abominables
  lexicon: HALOT
  rationale: «Abominaciones» reproduce el registro bíblico fuerte de תועבות y enlaza con el lenguaje de juicio covenantal. El valor causal está integrado con la frase precedente.
- source_word: מִלְאוּהָ
  english_pob_choice: they have filled it
  chosen_spanish: la han llenado
  alternatives_spanish:
  - la llenaron
  - la han colmado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte en español con pretérito perfecto para una condición ya establecida y todavía vigente en la oración de confesión.
- source_word: מִפֶּה אֶל פֶּה
  english_pob_choice: from end to end
  chosen_spanish: de extremo a extremo
  alternatives_spanish:
  - de un extremo al otro
  - de boca a boca
  lexicon: HALOT
  rationale: La POB inglesa ya documenta el idiomatismo. En español, «de extremo a extremo» comunica el alcance total de modo natural y claro, sin perder el sentido espacial completo.
- source_word: בְּטֻמְאָתָם
  english_pob_choice: with their uncleanness
  chosen_spanish: con su inmundicia
  alternatives_spanish:
  - con su impureza
  - por su inmundicia
  lexicon: HALOT
  rationale: «Inmundicia» intensifica al final la imagen de contaminación total y refleja bien la fuerza concreta de טֻמְאָה. Se conserva el matiz de defilement sin limitarlo a lo ritual.
theological_decisions:
- issue: Lenguaje de impureza y contaminación
  english_pob_reading: Render the verse in terms of impurity/uncleanness without narrowing it to merely ritual or merely moral categories.
  chosen_spanish_reading: Traducir con «impureza» e «inmundicia» sin reducir el campo semántico a lo solo ritual o solo moral.
  alternative_spanish_readings:
  - traducir solo como impuridad ritual
  - traducir solo como corrupción moral
  rationale: Los términos hebreos נִדָּה, תּוֹעֵבָה y טֻמְאָה pueden cargar simultáneamente resonancias rituales, morales y de pacto. La versión española conserva esa tensión teológica en vez de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que eliminó puntuación innecesaria sin cambiar el sentido. Se mantuvo la estructura principal y se adaptó al español con puntuación natural, preservando el paralelismo causal y la clausula final de llenura total.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología POB por defecto para el nombre divino, pero este versículo no lo contiene explícitamente.
  - Se mantuvo «impureza» como término base y «inmundicia» al final para reflejar la variación retórica del hebreo y del audit trail en inglés.
  - «Pueblos de las tierras» conserva el plural hebreo y evita singularizar indebidamente el alcance geográfico-étnico.
  - La nota [a] se ancla en «de extremo a extremo», que corresponde al modismo hebreo מִפֶּה אֶל־פֶּה; la nota [b] se ancla en «impureza» para señalar la alternativa de traducción documentada.
