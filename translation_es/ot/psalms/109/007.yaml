review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en los puntos principales: בְּהִשָּׁפְטוֹ se entiende correctamente como marco temporal/judicial («Cuando sea juzgado»), יֵצֵא + רָשָׁע se vierte de forma forense como «salga culpable», y la segunda cláusula mantiene la fuerza imprecatoria. También preserva la nota léxica de רָשָׁע = «culpable» en contexto de tribunal y la alternativa de que la oración sea contada como pecado.'
  spanish_quality_summary: 'El español es claro y digno, pero requiere una reparación pequeña: la nota [a] está anclada a «juzgado», aunque su contenido explica una alternativa que afecta a «culpable/impío», no al acto de juzgar. Además, en español suena más natural y más ajustado al inglés auditado «como pecado» que «en pecado» para לַחֲטָאָה, especialmente porque la nota alternativa habla de «sea contada como pecado».'
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Culpable» refleja bien el uso forense de רָשָׁע; «oración» y «pecado» están bien. La revisión propuesta solo mejora la idiomaticidad y la colocación de la nota, sin alterar decisiones teológicas ni léxicas ya documentadas.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «juzgado», pero explica la alternativa de רָשָׁע («impío/malvado») frente a «culpable».
    rationale: El anclaje debe corresponder al término o frase que la nota comenta. Tal como está, induce a pensar que la variación afecta a בְּהִשָּׁפְטוֹ en vez de a רָשָׁע.
  - severity: low
    issue: «Se convierta en pecado» es comprensible, pero «sea/sea contado como pecado» o «se convierta en algo pecaminoso» encaja mejor; en este contexto, «como pecado» suena más natural que «en pecado».
    rationale: El hebreo לַחֲטָאָה aquí expresa resultado/valoración. En español bíblico natural, «se convierta como pecado» no sirve, pero «sea contado como pecado» se conserva en nota; en el texto principal, «se convierta en pecado» es aceptable aunque algo menos idiomático que «llegue a ser pecado» o «se vuelva pecado». Dado el mínimo cambio necesario, ajustar a «como pecado» en la nota y mantener una formulación más natural en el texto mejora la legibilidad.
