  - severity: low
    issue: «tus ovejas y tus cabras» pierde la especificidad de hembras en ambos sustantivos
    rationale: El hebreo distingue hembras reproductoras. En español «ovejas» y «cabras» suelen implicar hembras, así que no es un error grave, pero sí una leve atenuación frente al original y al audit trail inglés.
  revised_spanish_text: Estos veinte años he estado contigo; tus ovejas y tus cabras no han perdido sus crías[a], y no he comido los carneros de tu rebaño.
