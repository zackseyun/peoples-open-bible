translation:
  language: es
  text: Yahvé nuestro Dios hizo un pacto con nosotros en Horeb[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cortó un pacto con nosotros en Horeb».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la política POB de no sustituirlo por un título. En español, la forma establecida y readable para esta transliteración es «Yahvé».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - nuestro Señor
  lexicon: HALOT
  rationale: 'La construcción con sufijo de primera persona plural expresa posesión relacional: «nuestro Dios». Se mantiene el vínculo pactal sin añadir matices ajenos al hebreo.'
- source_word: כָּרַת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - estableció
  lexicon: HALOT
  rationale: En español, «hizo un pacto» comunica de forma natural el sentido idiomático de כרת ברית. La literalidad «cortó un pacto» se reserva para nota, porque en el texto principal sonaría extraña aunque sea etimológicamente transparente.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - acuerdo
  lexicon: HALOT
  rationale: En este contexto narrativo del Sinaí/Horeb, «pacto» transmite bien la relación formal y vinculante entre Yahvé e Israel. Se evita «acuerdo» por ser demasiado débil; «covenant» puede renderizarse también como «pacto» en español bíblico y sigue siendo fiel al valor jurídico-relacional.
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal se vierte directamente como «con nosotros», preservando la fórmula relacional del texto.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - al Horeb
  lexicon: HALOT
  rationale: El topónimo se translitera como «Horeb». En español, la preposición locativa «en» es natural y suficientemente precisa en este contexto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios revelado a Israel, en continuidad con la decisión POB de no ocultarlo detrás de una sustitución honorífica. «Yahvé» es la forma española más extendida y clara para este uso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza de בְּרִית en el contexto del Sinaí/Horeb
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - acuerdo
  rationale: «Pacto» conserva la fuerza teológica y jurídica del término, especialmente en el marco de la relación de Yahvé con Israel. «Alianza» puede sonar más diplomática en español moderno; «acuerdo» reduce indebidamente la solemnidad del término.
  doctrine_reference: 'DOCTRINE.md: covenant language in the Pentateuch'
- issue: Idiomática de כרת ברית
  english_pob_reading: Literally, 'cut a covenant with us at Horeb.'
  chosen_spanish_reading: hizo un pacto con nosotros en Horeb
  alternative_spanish_readings:
  - cortó un pacto con nosotros en Horeb
  - cortó con nosotros un pacto en Horeb
  rationale: La expresión hebrea literalmente dice «cortar un pacto», pero el español común requiere una formulación idiomática. Se mantiene el sentido y se documenta la literalidad en nota para no perder la huella semítica.
  doctrine_reference: 'DOCTRINE.md: idiomatic covenant formula'
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente sin cambios sustantivos: se conserva el nombre divino, la relación pactal y la nota sobre la idiomática hebrea de כרת ברית, en línea con el control cruzado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה y «Dios» para אֱלֹהֵינוּ, conforme a la terminología base del proyecto.
  - Se prefiere «pacto» sobre «alianza» o «acuerdo» para evitar atenuar la densidad teológica del término בְּרִית.
  - La nota al pie conserva la literalidad hebrea sin introducir una segunda interpretación no atestiguada.
  - El topónimo «Horeb» se translitera de forma consistente y no se traduce.
