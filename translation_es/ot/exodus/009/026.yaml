translation:
  language: es
  text: Solo en la tierra de Gosén, donde estaban los hijos de Israel[a], no hubo granizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los descendientes de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solo en
  lexicon: HALOT
  rationale: רַק expresa restricción exclusiva. «Solo» conserva esa limitación inicial de manera natural en español, sin añadir matices ajenos.
- source_word: בְּאֶרֶץ
  english_pob_choice: in the land of
  chosen_spanish: en la tierra de
  alternatives_spanish:
  - en el país de
  - en la región de
  lexicon: HALOT
  rationale: Con un topónimo como Gosén, «tierra» refleja bien el valor territorial de אֶרֶץ y mantiene un registro bíblico claro en español.
- source_word: גֹּשֶׁן
  english_pob_choice: Goshen
  chosen_spanish: Gosén
  alternatives_spanish:
  - Goshen
  lexicon: transliteración tradicional castellana
  rationale: Se usa la forma habitual en español bíblico, «Gosén», que comunica el nombre propio con naturalidad y reconocimiento.
- source_word: אֲשֶׁר שָׁם
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - en la cual
  lexicon: HALOT
  rationale: La construcción relativa locativa se vierte con «donde», que es la opción más clara y fiel al sentido de lugar sin sobrecarga literal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la imagen familiar masculina del hebreo, pero en español «hijos de Israel» es una fórmula bíblica entendible y menos áspera que una calca más técnica.
- source_word: לֹא הָיָה
  english_pob_choice: was there no
  chosen_spanish: no hubo
  alternatives_spanish:
  - no había
  - no existió
  lexicon: HALOT
  rationale: El hebreo expresa ausencia existencial. En español, «no hubo» comunica con naturalidad que en esa zona no se produjo granizo.
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - granizada
  lexicon: HALOT
  rationale: «Granizo» es el equivalente normal en español para el fenómeno meteorológico del pasaje.
theological_decisions:
- issue: Preservación del hebreo masculino colectivo בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel / los descendientes de Israel
  rationale: Se mantiene la referencia masculina concreta del hebreo, evitando neutralizarla sin necesidad. En este versículo no hay ambigüedad doctrinal, pero sí una preferencia de fidelidad formal al modo de designación original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto sobre precisión de género y forma
- issue: Ausencia de granizo como juicio localizado
  english_pob_reading: was there no hail
  chosen_spanish_reading: no hubo granizo
  alternative_spanish_readings:
  - no había granizo
  - no cayó granizo
  rationale: La lectura deja claro que la excepción al juicio afectó solo a Gosén. «No hubo granizo» preserva la ausencia factual sin añadir interpretaciones sobre duración o intensidad.
  doctrine_reference: Contexto narrativo de Éxodo 9:25–26
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés que ajustó el orden a una forma más natural («was there no hail»). En español, el equivalente más natural y fiel es «no hubo granizo», que conserva la negación existencial sin forzar un orden marcado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, pero este versículo no lo contiene.
  - Se evita «israelitas» para conservar la forma hebrea explícita del texto fuente.
  - «Tierra de Gosén» funciona mejor que «país» o «territorio» en este contexto narrativo bíblico.
