translation:
  language: es
  text: Hizo lo que era malo a los ojos de Yahvé, conforme a las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Hacía
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa pasada; en español, el simple perfecto «hizo» comunica de forma natural la secuencia narrativa sin añadir un enlace innecesario.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo con artículo funciona de manera sustantiva después de עשה. «Lo malo» preserva la valoración moral y suena natural en español sin debilitar el juicio ético.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo evaluativo. «Ante los ojos de Yahvé» conserva la imagen metafórica y el carácter de valoración divina; se mantiene «Yahvé» según el criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, no una sustitución reverencial, para reflejar el valor del Tetragrámaton en el texto fuente y la terminología fija del proyecto.
- source_word: כְּתוֹעֲבוֹת
  english_pob_choice: according to the abominations
  chosen_spanish: conforme a las abominaciones
  alternatives_spanish:
  - según las abominaciones
  - a la manera de las abominaciones
  lexicon: HALOT
  rationale: כְּ expresa conformidad/comparación. «Conforme a» mantiene la relación estrecha con las prácticas descritas y evita suavizar el fuerte sentido moral-cultual de תועבות.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico, גוים designa a los pueblos no israelitas de la tierra. «Las naciones» es la opción más natural y precisa en español.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: que
  alternatives_spanish:
  - a quienes
  - los cuales
  lexicon: HALOT
  rationale: El relativo introduce una cláusula restrictiva sobre personas; en español, «que» resulta natural y suficiente aquí, sin perder claridad.
- source_word: הוֹרִישׁ
  english_pob_choice: had driven out
  chosen_spanish: había expulsado
  alternatives_spanish:
  - había desposeído
  - había arrojado fuera
  lexicon: HALOT
  rationale: El hiphil de ירשׁ en este contexto alude a la expulsión/desposesión de habitantes previos de la tierra. «Había expulsado» comunica bien la idea en español y encaja con la construcción «de delante de».
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - antes de
  lexicon: HALOT
  rationale: La locución idiomática hebrea con un verbo de expulsión se expresa de forma más transparente en español con «de delante de», manteniendo la imagen espacial original.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma literal «hijos de Israel» por fidelidad al hebreo y por coherencia con la política de mantener la expresión masculina y familiar del original, tal como refleja el audit trail inglés.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva su valor como nombre propio divino en español con «Yahvé», siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión masculina/familiar בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  rationale: Se preserva la forma masculina y familiar del hebreo, en lugar de neutralizarla, para mantener la trazabilidad semántica del original y la política de precisión de género del proyecto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El contexto inglés y la revisión más reciente coinciden en no requerir cambios; la lectura aprobada se mantiene. No se detectaron revisiones aplicadas ni objeciones textuales, y la traducción sigue de cerca el hebreo con la terminología del proyecto para el nombre divino y la frase «hijos de Israel».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se conservó la estructura evaluativa del hebreo con «ante los ojos de Yahvé».
  - La cláusula relativa y el complemento de expulsión se expresaron en español natural sin perder el paralelismo con el original.
  - Se preservó la forma masculina «hijos de Israel» conforme a la política del proyecto.
