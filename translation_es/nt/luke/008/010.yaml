translation:
  language: es
  text: 'Y él dijo: «A ustedes se les ha concedido conocer[a] los misterios del reino de Dios, pero a los demás en parábolas[c], para que viendo no vean[b], y oyendo no entiendan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secretos». El griego «misterios» se refiere a verdades del reino de Dios ocultas para algunos y reveladas a otros.
    reason: lexical_alternative
  - marker: b
    text: La cláusula «para que viendo no vean, y oyendo no entiendan» evoca Isaías 6:9–10 y puede entenderse como propósito divino, resultado judicial o ambas cosas.
    reason: cross_reference
  - marker: c
    text: O «pero para los demás es en parábolas». El griego es elíptico y no expresa el verbo de manera explícita.
    reason: previous_rendering
lexical_decisions:
- source_word: δέδοται
  english_pob_choice: it has been given
  chosen_spanish: se les ha concedido
  alternatives_spanish:
  - se les ha dado
  - les ha sido dado
  lexicon: BDAG
  rationale: El perfecto pasivo expresa una acción concedida con efecto presente. En español, «se les ha concedido» comunica bien el estado resultante y mantiene implícito al dador, como en el griego.
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - entender
  lexicon: BDAG
  rationale: Aquí el infinitivo expresa el privilegio de conocer. «Conocer» preserva mejor esa fuerza y evita confundirlo con συνιῶσιν, que después pide «entender».
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  lexicon: BDAG
  rationale: «Misterios» conserva el uso bíblico de verdades divinas antes ocultas y ahora reveladas. «Secretos» sería posible, pero rebaja el peso teológico del término.
- source_word: βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: Se mantiene la expresión bíblica establecida «reino de Dios», que en español puede abarcar tanto esfera como gobierno. «Reinado de Dios» aclara la dinámica, pero es menos idiomática aquí.
- source_word: τοῖς δὲ λοιποῖς
  english_pob_choice: but to the rest
  chosen_spanish: pero a los demás
  alternatives_spanish:
  - pero al resto
  - pero a los otros
  lexicon: BDAG
  rationale: λοιποί designa a los restantes. «Los demás» es natural en español y conserva la referencia a los que quedan fuera del grupo destinatario inmediato.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - por parábolas
  - mediante parábolas
  lexicon: BDAG
  rationale: Se conserva «en parábolas» para respetar la construcción breve y algo elíptica del griego. Otras opciones aclaran más de la cuenta el modo de enseñanza.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - con el fin de que
  lexicon: BDAG
  rationale: «Para que» preserva la fuerza de propósito/resultado sin decidir entre ambos. Es la forma más natural en español para mantener la tensión teológica del texto.
- source_word: βλέποντες μὴ βλέπωσιν
  english_pob_choice: though seeing they may not see
  chosen_spanish: viendo no vean
  alternatives_spanish:
  - aunque ven no vean
  - viendo, no vean
  lexicon: BDAG
  rationale: Se conserva la repetición de βλέπω con «vean» y «viendo». El español puede expresar la idea sin añadir explícitamente «aunque», dejando la ambigüedad de propósito o juicio en el texto.
- source_word: ἀκούοντες μὴ συνιῶσιν
  english_pob_choice: though hearing they may not understand
  chosen_spanish: y oyendo no entiendan
  alternatives_spanish:
  - y oyendo no comprendan
  - oyendo no entiendan
  lexicon: BDAG
  rationale: «Entiendan» corresponde bien a συνίημι y mantiene contraste con «ver». «Comprendan» también es posible, pero «entiendan» resulta más natural y directo.
theological_decisions:
- issue: Fuerza de la cláusula ἵνα en la cita/allusión de Isaías 6
  english_pob_reading: Rendered as 'so that' and left textually tense, preserving the possibility of both divine judicial purpose and stated result without softening the wording.
  chosen_spanish_reading: Se traduce con «para que», manteniendo abierta la posibilidad de propósito divino y de resultado judicial, sin resolver la tensión del pasaje.
  alternative_spanish_readings:
  - de modo que
  - con el fin de que
  rationale: 'La tradición interpretativa de Isaías 6 en los evangelios admite más de una lectura: propósito, resultado o ambos. «Para que» conserva esa ambigüedad sin diluirla.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que prefirió una redacción más literal y concisa para «but to the rest in parables» y eliminó «though» antes de «seeing/hearing». La versión española conserva esa concisión y refleja la elipsis del griego sin expandirla innecesariamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en general, pero aquí el texto dice θεοῦ, por lo que corresponde «Dios».
  - Se mantiene la terminología bíblica establecida «reino de Dios» y «misterios» por coherencia con el uso del POB.
  - Se evita «entender» para γνῶναι y se reserva para συνιῶσιν, preservando la distinción semántica entre conocer y comprender.
