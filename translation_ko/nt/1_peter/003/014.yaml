  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλ’ εἰ καὶ πάσχοιτε διὰ δικαιοσύνην, μακάριοι. τὸν δὲ φόβον αὐτῶν μὴ φοβηθῆτε μηδὲ ταραχθῆτε,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/014.yaml
  text: 'But even if you should suffer for righteousness, you are blessed. And do not fear their fear, nor be troubled,'
translation:
  language: ko
  text: '그러나 의를 위하여 고난을 받게 될지라도 여러분은 복이 있는 자들입니다. 그들이 두려워하는 것을 두려워하지 말고 동요하지도 마십시오.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 8:12-13의 인유. 3:15도 같은 흐름이다.
    reason: cross_reference
lexical_decisions:
- source_word: εἰ καὶ πάσχοιτε διὰ δικαιοσύνην
  english_pob_choice: even if you should suffer for righteousness
  chosen_korean: 의를 위하여 고난을 받게 될지라도
  alternatives_korean:
  - 의 때문에 고통받더라도
  - 의로 인하여 고난당할지라도
  lexicon: BDAG
  rationale: 희구법(optative)의 가정·가능 의미를 「~게 될지라도」로 살린다. 마 5:10과 평행.
- source_word: μακάριοι
  english_pob_choice: you are blessed
  chosen_korean: 복이 있는 자들입니다
  alternatives_korean:
  - 행복한 자들입니다
  - 복됩니다
  lexicon: BDAG
  rationale: 산상수훈의 μακάριος를 한국 성서 전통의 「복이 있는」으로 옮긴다.
- source_word: τὸν φόβον αὐτῶν μὴ φοβηθῆτε
  english_pob_choice: do not fear their fear
  chosen_korean: 그들이 두려워하는 것을 두려워하지 말고
  alternatives_korean:
  - 그들의 두려움을 두려워하지 말고
  lexicon: BDAG
  rationale: 사 8:12 LXX 인유. 셈어식 동족 목적어를 「두려워하는 것을 두려워하다」로 풀어 옮긴다.
