translation:
  language: es
  text: 'Y cuando sus corazones estaban alegres[a], dijeron: «Llamen a Sansón, para que nos entretenga». Entonces llamaron a Sansón de la casa de la prisión[b], y él los entretuvo delante de ellos. Y lo hicieron ponerse de pie entre las columnas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que actúe para nosotros» o «para que haga espectáculo para nosotros». El verbo hebreo puede denotar diversión, burla o una presentación pública.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la casa de los prisioneros», es decir, de la casa de la prisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי טוֹב לִבָּם
  english_pob_choice: when their hearts were merry
  chosen_spanish: cuando el corazón de ellos estaba alegre
  alternatives_spanish:
  - cuando estaban de buen ánimo
  - cuando sus corazones estaban alegres
  lexicon: HALOT
  rationale: El hebreo usa el modismo “el corazón es bueno”, es decir, alegre o complacido. ‘Estaba alegre’ conserva la imagen del corazón sin sonar forzado en español.
- source_word: קִרְאוּ לְשִׁמְשׁוֹן
  english_pob_choice: Call for Samson
  chosen_spanish: Llamen a Sansón
  alternatives_spanish:
  - Llamen por Sansón
  - Sumen a Sansón
  lexicon: HALOT
  rationale: El verbo con ל indica convocar o llamar a alguien para que comparezca. ‘Llamen a Sansón’ es natural en español y conserva el valor de citación pública.
- source_word: וִישַׂחֶק לָנוּ
  english_pob_choice: so that he may entertain us
  chosen_spanish: para que nos entretenga
  alternatives_spanish:
  - para que nos divierta
  - para que haga espectáculo para nosotros
  - para que haga burla para nosotros
  lexicon: HALOT
  rationale: El verbo puede abarcar entretener, hacer espectáculo o ser objeto de burla. ‘Nos entretenga’ sigue la decisión inglesa de captar el sentido funcional sin forzar una sola connotación negativa.
- source_word: מִבֵּית הָאֲסִירִים
  english_pob_choice: from the prison house
  chosen_spanish: desde la casa de los presos
  alternatives_spanish:
  - desde la cárcel
  - desde la casa de los prisioneros
  lexicon: HALOT
  rationale: Se conserva la expresión concreta del hebreo ‘casa de los presos/prisioneros’. ‘Casa de los presos’ mantiene mejor la textura original que el más genérico ‘cárcel’.
- source_word: וַיְצַחֵק לִפְנֵיהֶם
  english_pob_choice: and he entertained them
  chosen_spanish: y él los entretuvo
  alternatives_spanish:
  - y él actuó delante de ellos
  - y él hizo de diversión delante de ellos
  - y él los divirtió
  lexicon: HALOT
  rationale: Aquí el contexto muestra una actuación pública ante los filisteos. ‘Los entretuvo’ enlaza con la petición anterior y comunica la escena sin perder el matiz de espectáculo ante ellos.
- source_word: וַיַּעֲמִידוּ אוֹתוֹ בֵּין הָעַמּוּדִים
  english_pob_choice: And they made him stand between the pillars
  chosen_spanish: Entonces lo pusieron entre las columnas
  alternatives_spanish:
  - Entonces lo hicieron ponerse entre las columnas
  - Y lo colocaron entre las columnas
  - Y lo hicieron estar entre las columnas
  lexicon: HALOT
  rationale: El causativo hebreo expresa que otros lo colocaron en posición. ‘Lo pusieron’ es idiomático en español y preserva la idea de control y humillación. ‘Columnas’ refleja el término arquitectónico natural en español.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en el valor de entretenimiento/actuación pública de שׂחק/צחק y en el giro concreto ‘house of the prisoners’; no se introdujeron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantuvo ‘Sansón’ como forma española estándar del nombre propio.
  - Se evitó ‘SEÑOR’ u otras sustituciones teológicas, porque el verso no contiene el Tetragrámaton ni un título divino directo.
  - ‘Columnas’ se prefirió a ‘pilares’ por ser más natural en español contemporáneo sin alterar el sentido arquitectónico.
