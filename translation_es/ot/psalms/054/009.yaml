translation:
  language: es
  text: Porque me ha librado de toda aflicción, y mi ojo ha mirado[a] a mis enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «mi ojo ha visto a mis enemigos», con posible implicación de su caída o de la vindicación del salmista sobre ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «Porque» conserva mejor la función explicativa que «For» en inglés y suena natural al inicio de la cláusula.
- source_word: מִכָּל
  english_pob_choice: from every
  chosen_spanish: de toda
  alternatives_spanish:
  - de cada
  - de toda clase de
  - de todo
  lexicon: HALOT
  rationale: La combinación de מִן con כָּל expresa totalidad distributiva. «De toda» comunica que no quedó excluida ninguna angustia y mantiene el valor global sin sobrecargar la frase.
- source_word: צָרָה
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: HALOT
  rationale: El campo semántico incluye distress/trouble/affliction. «Angustia» es idiomática en español bíblico moderno y conserva el matiz de presión o aflicción personal sin reducirlo a un problema menor.
- source_word: הִצִּילָנִי
  english_pob_choice: he has delivered me
  chosen_spanish: me ha librado
  alternatives_spanish:
  - me ha rescatado
  - me ha salvado
  - me ha liberado
  lexicon: HALOT
  rationale: El Hifil de נצל expresa librar o rescatar. «Me ha librado» mantiene la fuerza de intervención efectiva y funciona bien con el tono confesional del salmo.
- source_word: וּבְאֹיְבַי
  english_pob_choice: and ... on my enemies
  chosen_spanish: y a mis enemigos
  alternatives_spanish:
  - y contra mis enemigos
  - y sobre mis enemigos
  - y en mis enemigos
  lexicon: HALOT
  rationale: Con ראה, el complemento con ב puede señalar aquello sobre lo cual recae la visión. En español, «a mis enemigos» es la forma más natural para conservar la referencia sin forzar una construcción poco idiomática.
- source_word: רָאֲתָה עֵינִי
  english_pob_choice: my eye has looked
  chosen_spanish: mi ojo ha mirado
  alternatives_spanish:
  - mis ojos han visto
  - he visto
  - mi ojo ha visto
  lexicon: HALOT
  rationale: La imagen hebrea conserva el sujeto literal «mi ojo». «Ha mirado» reproduce la vividez del idiomático hebreo y permite la misma ambigüedad que el inglés POB entre ver y contemplar, sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Implicación de la visión de los enemigos
  english_pob_reading: Render the clause as a statement of seeing/looking on enemies without explicitly adding 'defeat,' 'vengeance,' or 'triumph.'
  chosen_spanish_reading: Traducir la cláusula como una afirmación de haber visto/mirado a los enemigos, sin añadir explícitamente «derrota», «venganza» o «triunfo».
  alternative_spanish_readings:
  - mi ojo ha visto la caída de mis enemigos
  - mi ojo los ha mirado con triunfo
  rationale: El hebreo solo dice que el ojo del salmista ha visto/mirado a sus enemigos. El contexto puede sugerir vindicación, pero no la nombra. La traducción conserva esa tensión y evita resolverla con una inferencia interpretativa no explícita en el texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hubo cambios aplicados en la última revisión; el contexto de auditoría muestra acuerdo moderado y solo observaciones menores, sin necesidad de alterar la decisión principal. La traducción española sigue de cerca el hebreo y preserva la ambigüedad de la segunda cola, como en el texto auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «mi ojo» en singular para conservar la imagen hebrea, aunque en español sea más común pluralizar en algunos contextos.
  - «Librado» conserva el valor de rescate/liberación de הִצִּילָנִי sin introducir una lectura doctrinal adicional.
