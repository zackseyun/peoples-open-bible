translation:
  language: es
  text: Porque al final hallarás su descanso[a], y se convertirá en deleite para ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo ''después/atrás''; el paralelo griego ''al final'' confirma un matiz temporal: perseverar en la sabiduría conduce finalmente al descanso y al gozo.'
    reason: lexical_alternative
  - marker: b
    text: 'Los sufijos femeninos remiten a la sabiduría personificada en el contexto. El hebreo expresa un giro de resultado: aquello que ahora pesa en su disciplina termina por convertirse en deleite para ti.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאָחוֹר / ἐπ᾽ ἐσχάτων
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - después
  - más tarde
  - al fin
  lexicon: HALOT; paralelo griego ἐπ᾽ ἐσχάτων
  rationale: La expresión hebrea apunta a lo que viene después, y el paralelo griego confirma un sentido temporal de desenlace. 'Al final' suena natural en español y conserva la idea de resultado eventual sin perder el matiz sapiencial.
- source_word: תִּמְצָא / εὑρήσεις
  english_pob_choice: you will find
  chosen_spanish: hallarás
  alternatives_spanish:
  - encontrarás
  - vas a encontrar
  lexicon: HALOT; LXX εὑρήσεις
  rationale: El verbo hebreo y el griego expresan hallazgo real y futuro. 'Hallarás' mantiene dignidad literaria y sigue siendo claro en español; 'encontrarás' habría sido igualmente posible, pero menos sobrio en este contexto.
- source_word: מְנוּחָתָהּ / τὴν ἀνάπαυσιν αὐτῆς
  english_pob_choice: its rest
  chosen_spanish: su descanso
  alternatives_spanish:
  - su reposo
  - el descanso de ella
  lexicon: HALOT; LXX ἀνάπαυσις
  rationale: El sustantivo designa descanso/reposo. 'Descanso' es la opción más directa y transparente en español. Se conserva el posesivo 'su' para reflejar el sufijo femenino, cuyo referente es la sabiduría personificada en el pasaje.
- source_word: וְתֵהָפֵךְ / στραφήσεταί
  english_pob_choice: it will become
  chosen_spanish: se te volverá
  alternatives_spanish:
  - se transformará para ti
  - se convertirá en
  - te resultará
  lexicon: HALOT; LXX στραφήσεταί
  rationale: El hebreo y el griego presentan una transformación o giro de resultado. 'Se te volverá' reproduce bien el valor resultativo y personal ('para ti') sin aplanar la imagen verbal.
- source_word: לְךָ
  english_pob_choice: to you / for you
  chosen_spanish: se te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: La construcción española 'se te volverá' expresa beneficio/resultado para el destinatario y evita una repetición pesada de 'para ti'.
- source_word: לְתַעֲנוּג / εἰς εὐφροσύνην
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - placer
  - gozo
  - regocijo
  lexicon: HALOT; LXX εὐφροσύνη
  rationale: El término designa placer gozoso, no mero entretenimiento. 'Deleite' conserva el tono elevado de la literatura sapiencial y el valor positivo de la transformación final.
theological_decisions:
- issue: Referente femenino de los sufijos en 'su descanso' y 'se te volverá'
  english_pob_reading: The feminine suffixes refer to wisdom personified in the surrounding passage.
  chosen_spanish_reading: Los sufijos femeninos se entienden como referencia a la sabiduría personificada en el contexto inmediato.
  alternative_spanish_readings:
  - Pueden leerse de modo más general como la disciplina o búsqueda de la sabiduría
  - Podrían reflejar simplemente el sustantivo femenino sin enfatizar personificación
  rationale: El hebreo y la LXX mantienen referencia femenina, y el contexto de Sirácida 6 personifica la sabiduría. El español conserva el posesivo 'su' sin forzar una explicación explícita en el texto principal, pero la decisión queda documentada.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave y excepciones documentadas)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde 'it will turn for you into delight' a 'it will become delight to you' para ganar naturalidad. La versión española sigue esa línea, pero conserva con 'se te volverá' la imagen verbal del hebreo y del griego, que resulta más transparente que un mero 'se convertirá en'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa 'deleite' para εὐφροσύνη / תַעֲנוּג por coherencia con el registro sapiencial y la equivalencia de gozo placentero.
  - Se conserva la referencia femenina implícita con 'su', siguiendo el audit trail y sin introducir 'ella' innecesariamente en el texto principal.
