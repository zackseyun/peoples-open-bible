translation:
  language: es
  text: el que pone las vigas de sus aposentos superiores sobre las aguas[a], el que hace de las nubes su carro, el que anda sobre las alas del viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el que anda sobre las alas del Espíritu’, si רוּחַ se toma como ‘espíritu’; aquí se prefiere ‘viento’ porque la imaginería circundante es meteorológica.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְקָרֶה
  english_pob_choice: who lays the beams
  chosen_spanish: el que pone las vigas
  alternatives_spanish:
  - el que coloca las vigas
  - el que cubre con vigas
  lexicon: HALOT
  rationale: La idea verbal es la de tender/poner vigas al construir. En español, 'pone las vigas' conserva la imagen arquitectónica concreta con naturalidad; 'cubre con vigas' suena menos directo.
- source_word: בַּמַּיִם
  english_pob_choice: on the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - en las aguas
  - con las aguas
  lexicon: HALOT
  rationale: '''Sobre'' reproduce bien la relación espacial poética elegida en el inglés POB y evita la lectura de interioridad que ''en'' podría sugerir.'
- source_word: עֲלִיּוֹתָיו
  english_pob_choice: his upper chambers
  chosen_spanish: sus aposentos altos
  alternatives_spanish:
  - sus cámaras altas
  - sus habitaciones altas
  - sus aposentos superiores
  lexicon: HALOT
  rationale: עֲלִיּוֹת designa estancias superiores o altas. 'Aposentos altos' mantiene el sentido arquitectónico y la elevación sin sonar excesivamente técnico o arcaico.
- source_word: הַשָּׂם
  english_pob_choice: who makes
  chosen_spanish: el que hace
  alternatives_spanish:
  - el que pone
  - el que convierte
  lexicon: HALOT
  rationale: Con un predicado nominal ('las nubes su carro'), 'hace' expresa mejor la acción de disponer o convertir en función del objeto, como en el inglés POB.
- source_word: עָבִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - nubes espesas
  - los nubarrones
  lexicon: HALOT
  rationale: '''Nubes'' es la forma clara y suficiente en español; el matiz de espesor no es necesario en el texto principal.'
- source_word: רְכוּבוֹ
  english_pob_choice: his chariot
  chosen_spanish: su carro
  alternatives_spanish:
  - su carro de guerra
  - su carruaje
  lexicon: HALOT
  rationale: '''Carro'' es el equivalente español más directo y tradicional para la imagen de רְכוּב. ''Carruaje'' debilita la imaginería bíblica; ''carro de guerra'' añade un matiz no presente.'
- source_word: הַמְהַלֵּךְ
  english_pob_choice: who walks
  chosen_spanish: el que anda
  alternatives_spanish:
  - el que camina
  - el que marcha
  lexicon: HALOT
  rationale: '''Anda'' preserva el movimiento continuo y la cadencia poética en español, sin forzar una lectura demasiado literal del verbo hebreo.'
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - por encima de
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' es natural y mantiene la relación espacial de la imagen de elevación.'
- source_word: כַּנְפֵי
  english_pob_choice: the wings of
  chosen_spanish: las alas de
  alternatives_spanish:
  - las alas del
  - las extremidades de
  lexicon: HALOT
  rationale: '''Alas'' conserva la metáfora poética y la correspondencia directa con la imagen del viento.'
- source_word: רוּחַ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el espíritu
  - el aliento
  lexicon: HALOT
  rationale: En este contexto la secuencia de imágenes cósmicas favorece 'viento'. 'Espíritu' introduciría una referencia teológica que el verso no exige en su lectura primaria.
theological_decisions:
- issue: Sentido de רוּחַ al final del versículo
  english_pob_reading: wind, with an alternative footnote for spirit
  chosen_spanish_reading: viento, con nota alternativa para espíritu
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El hebreo permite varias acepciones, pero el contexto inmediato de nubes, carro y alas es meteorológico. Mantener 'viento' respeta la lectura principal del POB y preserva la tensión semántica con una nota alternativa para 'espíritu'.
  doctrine_reference: Primacía del contexto poético y del hebreo original; no resolver innecesariamente una ambigüedad léxica que el texto permite.
translation_notes:
  revision_awareness: 'Se mantiene la lectura y la decisión lexical del POB inglés sin cambios sustantivos: imaginería arquitectónica para הַמְקָרֶה, carro para רְכוּבוֹ y viento para רוּחַ. No se observan revisiones aplicadas en el expediente fuente.'
  spanish_consistency_notes:
  - Se conserva el paralelismo poético con tres cláusulas coordinadas introducidas por 'el que'.
  - Se mantiene 'Yahvé' implícito en el contexto más amplio, pero este versículo no lo contiene explícitamente; no se introduce en el texto.
  - '''Aposentos altos'' y ''carro'' siguen el registro bíblico sin recurrir a terminología eclesiástica moderna.'
  - La nota de 'Espíritu' se deja como alternativa lexical, no como lectura principal, para no borrar la tensión semántica documentada.
