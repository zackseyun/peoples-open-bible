  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Sacerdotes», «lugares altos» y «becerros» están bien. La decisión teológica de traducir שְׂעִירִים como referente demoníaco debe mantenerse, pero con una formulación española más natural. La nota alternativa debe conservar «sátiros» y «cabras».
