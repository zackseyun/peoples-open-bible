translation:
  language: es
  text: Y el tejón de las rocas[a], porque rumia pero no divide la pezuña, es impuro para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «damán» o «hyrax». El hebreo se refiere al pequeño mamífero roquero comúnmente identificado como el hyrax.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁפָן
  english_pob_choice: the rock badger
  chosen_spanish: el damán
  alternatives_spanish:
  - el hyrax
  - el conejo de monte
  - la marmota
  lexicon: HALOT
  rationale: שָׁפָן designa al pequeño mamífero roquero comúnmente identificado como hyrax; en español, «damán» es un equivalente zoológicamente preciso y transparente para lectores informados. Evita el anacronismo de «coney/conejo» y mantiene la referencia a un animal concreto sin imponer una identificación más interpretativa que la del texto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la clasificación dietética. «Porque» reproduce de forma natural la causalidad explicativa del hebreo en español moderno.
- source_word: מַעֲלֵה גֵרָה
  english_pob_choice: chews the cud
  chosen_spanish: rumia
  alternatives_spanish:
  - mastica el cud
  - vuelve a subir el alimento
  - es de los que rumian
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, «rumia» transmite la acción habitual con claridad y sin calco extraño. Se conserva la categoría alimentaria ritual sin añadir explicación más allá de la necesaria.
- source_word: וּפַרְסָה לֹא יַפְרִיס
  english_pob_choice: does not divide the hoof
  chosen_spanish: no tiene pezuña dividida
  alternatives_spanish:
  - no divide la pezuña
  - no tiene la pezuña partida
  - no parte la pezuña
  lexicon: HALOT
  rationale: El hebreo describe la ausencia de pezuña hendida. «No tiene pezuña dividida» es natural en español bíblico contemporáneo y conserva la imagen legal sin forzar un giro más idiomático que pudiera perder precisión.
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: inmundo
  alternatives_spanish:
  - impuro
  - inmundo ritualmente
  - ritualmente impuro
  lexicon: HALOT
  rationale: En Levítico 11, טָמֵא es un estado cultual/ritual. «Inmundo» mantiene la tradición léxica bíblica en español y comunica la categoría legal sin convertirla en un juicio moral. Se evita «SEÑOR» o formulaciones doctrinales ajenas al texto.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - a ustedes
  lexicon: HALOT
  rationale: Marca la aplicación comunitaria a los destinatarios. «Para ustedes» es el equivalente natural y de registro amplio en español latinoamericano.
theological_decisions:
- issue: Naturaleza de טָמֵא en la legislación alimentaria levítica
  english_pob_reading: ritually unclean, not a statement of intrinsic moral evil
  chosen_spanish_reading: estado ritual de inmundicia, no acusación moral
  alternative_spanish_readings:
  - impureza moral
  - sucio en sentido ético
  rationale: El contexto de Levítico 11 es legal-cultual. «Inmundo» puede sonar fuerte en español, por eso se aclara en la decisión teológica que no implica maldad moral del animal; simplemente lo clasifica fuera de la pureza ritual requerida.
  doctrine_reference: Levítico 11; categoría de pureza ritual en la ley mosaica
- issue: Identificación zoológica de הַשָּׁפָן
  english_pob_reading: rock badger / hyrax
  chosen_spanish_reading: damán
  alternative_spanish_readings:
  - hyrax
  - conejo de monte
  rationale: La evidencia léxica apunta al hyrax/rock badger. «Damán» ofrece una identificación más precisa que un equivalente tradicional ambiguo como «conejo»; por eso se adopta como término principal en español.
  doctrine_reference: HALOT; zoología bíblica
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: la lectura causal de כִּי, la idiomaticidad de מַעֲלֵה גֵרָה, la negación de la pezuña hendida y la categoría ritual de טָמֵא se mantuvieron intactas. La principal decisión de traducción fue elegir «damán» como equivalente zoológico transparente en español, manteniendo la nota alternativa para reflejar la variación lexical documentada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se preservó el valor ritual de «inmundo» sin moralizarlo.
  - Se evitó «Cristo» y otras terminologías no pertinentes al pasaje.
  - La puntuación y el registro buscan ser bíblicos pero modernos, adecuados para lectura pública.
