lexical_decisions:
- source_word: וַיִּפְשַׁע
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se revolvió
  - se sublevó
  lexicon: HALOT
  rationale: En contexto político-militar, פשע expresa rebelión contra una autoridad; en español, «se rebeló» comunica con naturalidad esa relación de vasallaje sin suavizar el sentido.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio de la nación conforme al criterio de transliteración.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  - en Israel
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, con פשע la relación es idiomática de oposición o rebelión; «contra Israel» reproduce ese valor y evita una lectura espacial o asociativa.
- source_word: אַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Tras
  lexicon: HALOT
  rationale: Marca temporal directa y natural en español.
- source_word: מוֹת
  english_pob_choice: the death of
  chosen_spanish: la muerte de
  alternatives_spanish:
  - el morir de
  lexicon: HALOT
  rationale: En construcción nominal, «la muerte de» es la forma idiomática y preserva el valor sustantivo del hebreo.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Ahab
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio como forma reconocible en la tradición bíblica y en la transliteración del original.
