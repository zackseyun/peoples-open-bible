translation:
  language: es
  text: Todos ellos son claros[a] para el que entiende, y rectos para los que hallan conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «directos» o «derechos» para «claros». El hebreo subraya que las palabras de la sabiduría son directas y no torcidas para el que discierne.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Ellos todos
  lexicon: HALOT
  rationale: El hebreo retoma implícitamente los dichos de la sabiduría del contexto inmediato; «todos ellos» hace explícito ese referente plural sin perder la totalidad del כֹּל.
- source_word: נְכֹחִים
  english_pob_choice: straightforward
  chosen_spanish: rectos
  alternatives_spanish:
  - directos
  - claros
  - francos
  - sencillos
  lexicon: HALOT
  rationale: En este contexto sapiencial, el campo semántico apunta a lo recto, no torcido, y también a lo transparente o directo. «Rectos» mantiene la imagen de rectitud y evita una paráfrasis excesiva; el matiz de claridad queda indicado en la nota textual.
- source_word: לַמֵּבִין
  english_pob_choice: to the one who understands
  chosen_spanish: para el que entiende
  alternatives_spanish:
  - al que entiende
  - para el entendido
  - al discerniente
  lexicon: HALOT
  rationale: La preposición ל aquí expresa relación/referencia; en español «para el que entiende» conserva el valor receptivo y suena natural. «Que entiende» refleja el participio de בין sin introducir especificidad masculina innecesaria en sentido.
- source_word: וִישָׁרִים
  english_pob_choice: and upright
  chosen_spanish: y rectos
  alternatives_spanish:
  - y justos
  - y derechos
  - y honestos
  lexicon: HALOT
  rationale: יִשָׁרִים denota lo recto/upright/right. Se repite «rectos» para mantener el paralelismo formal del hebreo; aunque reduce la variación estilística, conserva la fuerza semántica del texto fuente.
- source_word: לְמֹצְאֵי
  english_pob_choice: to those who find
  chosen_spanish: para los que hallan
  alternatives_spanish:
  - para los que encuentran
  - a los que hallan
  - para quienes hallan
  lexicon: HALOT
  rationale: El participio plural sustantivado expresa a los que encuentran/descubren. «Hallan» es un equivalente natural y bíblicamente inteligible en español; «para» preserva la relación marcada por ל.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocer
  - ciencia
  - saber
  lexicon: HALOT
  rationale: דַּעַת aquí se distingue de בִּינָה/entendimiento en el paralelismo. «Conocimiento» mantiene esa distinción en español y es suficientemente amplio para el uso sapiencial.
translation_notes:
  revision_awareness: 'Coincide con el paquete fuente y el audit trail inglés: se preserva el paralelismo hebreo, la relación de ל con dos destinatarios distintos, y la distinción entre comprensión (בין) y conocimiento (דעת). No se introducen cambios textuales ni variantes de manuscritos en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió vocabulario sapiencial sobrio y directo, evitando tecnicismos innecesarios.
  - La repetición de «rectos» refleja el paralelismo del hebreo y no intenta suavizar la redundancia.
  - «Para» en ambos cola conserva el matiz relacional de ל sin forzar una literalidad rígida.
