translation:
  language: es
  text: En el reinado de Demetrio[a], en el año ciento sesenta y nueve, nosotros, los judíos, les escribimos en la angustia y en la crisis[b] que vino sobre nosotros en estos años, desde que Jasón y los que estaban con él se apartaron[c] de la tierra santa y del reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estando reinando»; el genitivo absoluto griego funciona como fórmula cronológica.
    reason: lexical_alternative
  - marker: b
    text: O «en el momento culminante de la aflicción»; el griego sugiere un punto agudo o culminante de la calamidad.
    reason: lexical_alternative
  - marker: c
    text: O «apostataron» o «desertaron»; el griego puede llevar matices tanto políticos como religiosos.
    reason: alternative_reading
lexical_decisions:
- source_word: βασιλεύοντος
  english_pob_choice: In the reign of
  chosen_spanish: En el reinado de
  alternatives_spanish:
  - Cuando reinaba
  - Mientras reinaba
  lexicon: LSJ
  rationale: La forma de genitivo absoluto funciona como marcador cronológico; en español, «en el reinado de» reproduce con naturalidad la referencia datativa al período de gobierno sin perder la función temporal.
- source_word: ἔτους ἑκατοστοῦ ἑξηκοστοῦ ἐνάτου
  english_pob_choice: in the one hundred sixty-ninth year
  chosen_spanish: en el año ciento sesenta y nueve
  alternatives_spanish:
  - en el año 169
  - en el año centésimo sexagésimo noveno
  lexicon: LSJ
  rationale: Conserva la forma de datación histórica en registro claro y publicable; se prefiere el número escrito para mantener el tono literario.
- source_word: ἡμεῖς οἱ Ἰουδαῖοι
  english_pob_choice: we Jews
  chosen_spanish: nosotros los judíos
  alternatives_spanish:
  - nosotros, los judíos
  - nosotros los judeanos
  lexicon: LSJ
  rationale: La apposición se refleja de modo directo en español. «Judíos» comunica la autoidentificación étnico-religiosa con el valor más natural para el lector hispano.
- source_word: γεγράφαμεν
  english_pob_choice: wrote
  chosen_spanish: hemos escrito
  alternatives_spanish:
  - escribimos
  - escribimos en carta
  lexicon: LSJ
  rationale: El perfecto griego puede ser epistolar; en español, el perfecto compuesto conserva mejor la relevancia del acto de escribir hacia el presente del destinatario, sin forzar un pasado simple donde el contexto es de carta.
- source_word: ἐν τῇ θλίψει
  english_pob_choice: in the distress
  chosen_spanish: en la angustia
  alternatives_spanish:
  - en la aflicción
  - en la tribulación
  lexicon: LSJ
  rationale: «Angustia» comunica la idea de presión y sufrimiento intenso de manera comprensible en español actual, sin cargar el término con un tecnicismo doctrinal.
- source_word: ἐν τῇ ἀκμῇ
  english_pob_choice: in the crisis
  chosen_spanish: en la crisis
  alternatives_spanish:
  - en la cima
  - en el momento culminante
  - en la extremidad
  lexicon: LSJ
  rationale: Se mantiene la decisión inglesa por su sentido de punto agudo o culminante de la dificultad. En español «crisis» es idiomático y conserva la idea de un momento crítico.
- source_word: τῇ ἐπελθούσῃ ἡμῖν
  english_pob_choice: that came upon us
  chosen_spanish: que vino sobre nosotros
  alternatives_spanish:
  - que nos sobrevino
  - que cayó sobre nosotros
  lexicon: LSJ
  rationale: Expresa con naturalidad el matiz de una calamidad que irrumpe desde fuera. «Vino sobre nosotros» mantiene la fuerza de acontecimiento sobrevenido.
- source_word: ἐν τοῖς ἔτεσιν τούτοις
  english_pob_choice: in those years
  chosen_spanish: en estos años
  alternatives_spanish:
  - durante estos años
  - en aquellos años
  lexicon: LSJ
  rationale: Se conserva la deixis del texto griego («τούτοις») con «estos años», aunque el castellano retrospectivo podría admitir «aquellos». Aquí se prioriza la proximidad textual al original.
- source_word: ἀφʼ οὗ
  english_pob_choice: after
  chosen_spanish: desde que
  alternatives_spanish:
  - después de que
  - a partir de cuando
  lexicon: LSJ
  rationale: La secuencia temporal del griego marca el punto de inicio desde el cual se desarrolla el período de calamidad. «Desde que» expresa mejor el valor de punto de partida que un simple «después de».
- source_word: ἀπέστη
  english_pob_choice: departed
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se retiraron
  - se separaron
  - se rebelaron
  lexicon: LSJ
  rationale: La revisión inglesa evitó «revolted» por ser demasiado interpretativo. En español, «se apartaron» conserva la neutralidad relativa de ἀπέστη y permite el trasfondo político y religioso sin resolverlo de antemano.
- source_word: Ἰάσων καὶ οἱ μετʼ αὐτοῦ
  english_pob_choice: Jason and those with him
  chosen_spanish: Jasón y los que estaban con él
  alternatives_spanish:
  - Jasón y sus compañeros
  - Jasón y los que le acompañaban
  lexicon: LSJ
  rationale: Se mantiene la estructura sencilla del grupo asociado a Jasón, sin añadir relaciones no explícitas. «Los que estaban con él» refleja con transparencia el griego.
- source_word: ἀπὸ τῆς ἁγίας γῆς
  english_pob_choice: from the holy land
  chosen_spanish: de la tierra santa
  alternatives_spanish:
  - de la tierra sagrada
  - de la tierra consagrada
  lexicon: LSJ
  rationale: «Tierra santa» es la forma más directa y fiel para preservar la santidad atribuida al territorio. Mantiene la carga reverencial del original.
- source_word: καὶ τῆς βασιλείας
  english_pob_choice: and the kingdom
  chosen_spanish: y del reino
  alternatives_spanish:
  - y de la realeza
  - y del gobierno real
  lexicon: LSJ
  rationale: «Reino» es la traducción más natural y menos interpretativa de βασιλεία en este contexto. Se conserva la coordinación con la tierra santa y el ámbito político legítimo.
theological_decisions:
- issue: Sentido de ἀπέστη respecto de Jasón y su grupo
  english_pob_reading: The English audit trail ultimately chose the neutral 'departed' rather than 'revolted,' to avoid importing an interpretive sense not explicit in the Greek.
  chosen_spanish_reading: se apartaron
  alternative_spanish_readings:
  - se rebelaron
  - apostataron
  - se separaron
  rationale: El griego puede incluir matiz político, religioso o ambos, pero el versículo solo afirma un apartarse de la tierra santa y del reino. «Se apartaron» conserva esa tensión sin decidirla de más.
  doctrine_reference: Preservar la tensión lexical y teológica; no resolver la ambigüedad más allá del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: el inglés pasó de ''revolted from'' a ''departed from'' para ἀπέστη, por considerar que la forma griega no exige una traducción abiertamente interpretativa. La versión española refleja esa neutralización con ''se apartaron''.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige; en este versículo no aparece el tetragrámaton.
  - Se usa «Jasón» con grafía española estándar para el nombre propio.
  - «Tierra santa» y «reino» conservan el paralelismo geográfico-político del griego sin ampliar el sentido.
  - No se emplea puntuación arcaizante; el estilo busca ser bíblico y contemporáneo a la vez.
