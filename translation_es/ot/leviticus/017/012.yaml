translation:
  language: es
  text: 'Por eso dije a los hijos de Israel[a]: «Ninguna persona de entre ustedes comerá sangre, y el extranjero[b] que reside entre ustedes no comerá sangre.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los hijos de Israel» o «a los israelitas». El hebreo dice literalmente «a los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: «Extranjero» aquí traduce גֵּר, un no israelita que reside entre Israel bajo sus leyes comunitarias; también puede entenderse como «forastero residente» o «residente extranjero».
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  - Por eso
  lexicon: HALOT
  rationale: La expresión introduce una conclusión basada en la razón dada en el contexto previo. “Por eso” conserva la fuerza inferencial con naturalidad en español y evita un tono excesivamente escolástico.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - he dicho
  - les dije
  lexicon: HALOT
  rationale: El perfecto simple transmite bien el habla directa en estilo legal/narrativo. “Les dije” sería más explícito pero añade un complemento no presente en el hebreo.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los hijos de Israelita
  - a los israelitas
  lexicon: HALOT
  rationale: Se preserva el paralelismo del hebreo con “hijos de Israel”, que refleja el masculino representativo del original. “Israelitas” sería una neutralización menos literal y pierde el eco formal de la expresión hebrea.
- source_word: כָּל נֶפֶשׁ מִכֶּם
  english_pob_choice: No person among you
  chosen_spanish: Ninguna persona de entre ustedes
  alternatives_spanish:
  - Ningún alma de entre ustedes
  - Nadie de entre ustedes
  - Ninguna persona entre ustedes
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona como individuo/persona. “Ninguna persona” comunica el valor distributivo legal sin la carga idiomática engañosa de “alma”. Se conserva “de entre ustedes” para reflejar מִכֶּם.
- source_word: לֹא תֹאכַל דָּם
  english_pob_choice: shall eat blood
  chosen_spanish: comerá sangre
  alternatives_spanish:
  - deberá comer sangre
  - ha de comer sangre
  - comerá sangre
  lexicon: HALOT
  rationale: 'Con la negación, el futuro simple funciona en español como prohibición normativa: “no comerá”. Se mantiene la imagen literal “comer sangre” sin paráfrasis.'
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el residente extranjero
  - el extranjero residente
  lexicon: HALOT
  rationale: En este verso, גֵּר designa a un no israelita que vive dentro de la comunidad. “Extranjero” es más claro y natural en español; el matiz jurídico-comunitario se explica en la nota.
- source_word: הַגָּר בְּתוֹכְכֶם
  english_pob_choice: who sojourns among you
  chosen_spanish: que reside entre ustedes
  alternatives_spanish:
  - que habita entre ustedes
  - que vive entre ustedes
  - que mora entre ustedes
  lexicon: HALOT
  rationale: El participio verbal se vierte con una oración relativa natural en español. “Reside entre ustedes” conserva el carácter estable de la permanencia sin sonar arcaico.
- source_word: לֹא יֹאכַל דָּם
  english_pob_choice: shall not eat blood
  chosen_spanish: no comerá sangre
  alternatives_spanish:
  - no deberá comer sangre
  - no ha de comer sangre
  - no comerá sangre
  lexicon: HALOT
  rationale: Se repite la prohibición para el residente extranjero con la misma forma verbal normativa, manteniendo la simetría del hebreo.
theological_decisions:
- issue: Valor de לִבְנֵי יִשְׂרָאֵל como designación del destinatario del pacto
  english_pob_reading: to the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - a los israelitas
  - a los hijos de Israel
  rationale: Se conserva la forma masculina representativa del hebreo sin neutralizarla. No se adopta “israelitas” porque suaviza una decisión lexical con implicaciones de fidelidad formal al texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Matiz de גֵּר en una legislación de pureza/covenio
  english_pob_reading: sojourner
  chosen_spanish_reading: extranjero
  alternative_spanish_readings:
  - forastero
  - residente extranjero
  - foráneo
  rationale: Aunque “extranjero” puede sonar amplio, en esta ley funciona bien como categoría de no israelita residente. La nota aclara que se trata de alguien que vive bajo las leyes comunitarias de Israel, evitando perder el sentido jurídico del término.
  doctrine_reference: DOCTRINE.md §Lexical transparency and covenant context
- issue: Prohibición legal expresada por futuro negativo
  english_pob_reading: shall not eat blood
  chosen_spanish_reading: no comerá sangre
  alternative_spanish_readings:
  - no debe comer sangre
  - no ha de comer sangre
  rationale: En español bíblico-jurídico, el futuro negativo comunica obligación/prohibición de forma natural y sobria. Se evita convertirlo en exhortación moral genérica para preservar el tono legal del mandato.
  doctrine_reference: DOCTRINE.md §Legal discourse rendering
translation_notes:
  revision_awareness: El texto inglés reciente se mantuvo estable sin revisiones sustantivas; esta versión española sigue la misma lectura óptima, con ajuste principal en la naturalidad de ‘Por eso’ y en la explicitación cultural de גֵּר mediante nota.
  spanish_consistency_notes:
  - Se mantiene ‘hijos de Israel’ para reflejar el masculino representativo del hebreo y la política terminológica del proyecto.
  - Se traduce נֶפֶשׁ como ‘persona’, no ‘alma’, para evitar una lectura incorrectamente interiorizada del término.
  - Se conserva la repetición de la prohibición de comer sangre en ambas cláusulas para respetar el paralelismo del hebreo.
  - Se usa ‘extranjero’ en el texto principal y se aclara en nota el matiz técnico de גֵּר, evitando introducir una frase demasiado técnica en la línea principal.
