review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: la condición inicial con הִתְרַפִּיתָ se comunica bien con «te debilitas», בְּיוֹם צָרָה con «en el día de la angustia», y la evaluación final צַר כֹּחֶךָ con «tu fuerza es poca». La nota alternativa también preserva adecuadamente la opción léxica documentada en el audit trail inglés.'
  spanish_quality_summary: El español es claro, natural y de tono proverbial digno. «Si te debilitas… tu fuerza es poca» suena idiomático y comprensible en español bíblico contemporáneo. Aunque «flaqueas» sería una alternativa muy buena y más compacta, «te debilitas» no distorsiona el sentido ni afecta la legibilidad.
  glossary_alignment: 'No hay términos del glosario de proyecto en juego que entren en conflicto. Las decisiones léxicas principales están alineadas con el rationale inglés: הִתְרַפִּיתָ como pérdida de firmeza, צָרָה como «angustia», y כֹּחֶךָ como «tu fuerza».'
  issues:
  - severity: low
    issue: «Te debilitas» es ligeramente menos incisivo que «flaqueas» o «flaqueas/cedes» para הִתְרַפִּיתָ.
    rationale: El hebreo sugiere aflojarse, perder resolución o mostrarse débil. «Te debilitas» sigue siendo fiel y natural, pero enfatiza más el estado que el vacilar. No requiere corrección obligatoria.
  - severity: low
    issue: La formulación de la nota al pie incluye comillas y «O:» de manera algo pesada.
    rationale: Es una cuestión menor de estilo editorial; el contenido de la alternativa es correcto y entendible.
