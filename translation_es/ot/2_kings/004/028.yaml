translation:
  language: es
  text: 'Ella dijo[a]: «¿Pedí yo a mi señor un hijo? ¿No dije: “No me engañes”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «No me des falsas esperanzas». El hebreo puede implicar engaño mediante una expectativa que luego resulte vacía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: She said
  chosen_spanish: Ella dijo
  alternatives_spanish:
  - Y ella dijo
  lexicon: HALOT
  rationale: La forma narrativa introduce el discurso de manera directa; en español puede omitirse la conjunción para mayor naturalidad sin perder el valor narrativo.
- source_word: הֲשָׁאַלְתִּי
  english_pob_choice: Did I ask
  chosen_spanish: ¿Pedí yo
  alternatives_spanish:
  - ¿He pedido yo?
  - ¿Solicité yo?
  lexicon: HALOT
  rationale: שאל aquí expresa la idea de pedir o solicitar; en este contexto retórico, «pedí yo» suena natural y conserva el contraste con el hijo recibido.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un niño
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijo», en español «un hijo» comunica de forma natural la petición de descendencia masculina en el contexto narrativo, sin añadir una especificación no requerida por la sintaxis española.
- source_word: מֵאֵת אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - de mi señor
  - a mi amo
  lexicon: HALOT
  rationale: La expresión es un pedido dirigido al profeta con respeto. «Mi señor» conserva el tratamiento honorífico y evita la ambigüedad de una lectura divina.
- source_word: הֲלֹא אָמַרְתִּי
  english_pob_choice: Did I not say
  chosen_spanish: ¿No dije
  alternatives_spanish:
  - ¿No he dicho?
  - ¿No te dije?
  lexicon: HALOT
  rationale: El pasado simple funciona bien para recordar una advertencia previa en el relato y mantiene la fuerza retórica del hebreo.
- source_word: לֹא תַשְׁלֶה אֹתִי
  english_pob_choice: Do not deceive me
  chosen_spanish: No me engañes
  alternatives_spanish:
  - No me decepciones
  - No me des falsas esperanzas
  lexicon: HALOT
  rationale: El verbo causativo puede abarcar engañar o dar una esperanza falsa. «No me engañes» es la opción más directa y suficientemente amplia; preserva la tensión del texto sin convertirla en una paráfrasis excesiva.
translation_notes:
  revision_awareness: 'La versión española corrige el problema anterior de anclaje de nota: el marcador [a] ahora aparece en el texto principal y corresponde exactamente a la nota. También se ha ajustado la redacción para mantener una equivalencia óptima con el hebreo y con la decisión inglesa revisada de «do not deceive me».'
  spanish_consistency_notes:
  - Se conserva el tratamiento respetuoso «mi señor» para אֲדֹנִי, no «Señor», porque no se trata de un título divino en este contexto.
  - Se eligió «No me engañes» para reflejar el valor verbal de תַשְׁלֶה sin diluir la advertencia en una explicación excesiva.
  - La puntuación con comillas angulares y signos de interrogación españoles sigue el estilo editorial en español latinoamericano.
