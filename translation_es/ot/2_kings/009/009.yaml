    rationale: La nota léxica explica «casa» como «dinastía», así que conviene anclarla en «casa» o en la primera ocurrencia relevante, no específicamente en el nombre propio.
  revised_spanish_text: Y haré la casa[a] de Acab como la casa de Jeroboam hijo de Nabat, y como la casa de Baasa hijo de Ahías.
