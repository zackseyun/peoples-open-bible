  timestamp: '2026-05-07T23:05:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: las injusticias no estaban ocultas a Dios y cada pecado estaba ante el Señor. Sin embargo, presenta dos ajustes de fidelidad/estilo: la construcción española más natural es «ocultas para él» o una reformulación equivalente, no «ocultas de él»; además, «todo pecado de ellos» suena poco idiomático frente a «cada pecado de ellos» o «cada uno de sus pecados», que representa mejor el distributivo singular πᾶσα ἁμαρτία.'
  spanish_quality_summary: El texto es comprensible y bastante digno, pero «ocultas de él» es poco natural en español general y parece calco. «Todo pecado de ellos» también suena rígido. Una leve revisión mejora mucho la legibilidad sin perder literalidad.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Señor» para Κυρίου está bien justificado aquí, y «injusticias», «pecado» y la imagen de exposición ante Dios se preservan adecuadamente.
  issues:
  - severity: medium
    issue: «ocultas de él» es una construcción poco idiomática en español
    rationale: Aunque intenta reproducir literalmente ἀπ᾿ αὐτοῦ, en español amplio «oculto de alguien» suena forzado. «Ocultas para él» mantiene el sentido de ocultamiento respecto de su conocimiento sin sacrificar naturalidad.
  - severity: low
    issue: «todo pecado de ellos» suena rígido y poco natural
    rationale: El griego πᾶσα ἁμαρτία es distributivo singular. En español, «cada pecado de ellos» expresa mejor ese valor que «todo pecado de ellos», que resulta más calcado.
  revised_spanish_text: Sus injusticias no estuvieron ocultas para él[a], y cada pecado de ellos estuvo delante del Señor.
  revised_footnotes:
  - marker: a
    text: 'O: «no escaparon a su atención». El griego dice más literalmente: «no estuvieron ocultas para él».'
    reason: lexical_alternative
  revision_rationale: Se hicieron reparaciones menores para mejorar la naturalidad del español sin apartarse del griego ni del razonamiento documentado por el POB. «Para él» evita un calco extraño; «cada pecado de ellos» representa mejor el distributivo singular.
