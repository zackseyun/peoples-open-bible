  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Vino», «vida», «creado» y «alegría humana» son adecuados. La elección de «un hombre» para ἀνθρώπῳ y «humana» para ἀνθρώποις concuerda con el expediente inglés. La nota alternativa sobre οἴνῳ debe conservarse, pero con un solo marcador correctamente anclado en la cláusula ambigua.
