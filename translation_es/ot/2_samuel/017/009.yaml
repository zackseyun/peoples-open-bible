translation:
  language: es
  text: 'Mira[a], ahora mismo está escondido en una de las fosas o en uno de los otros lugares. Y cuando algunos de ellos caigan al primer ataque, quien lo oiga dirá[b]: «Ha habido una matanza entre la gente que sigue a Absalón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una de las hondonadas»; el hebreo puede referirse a fosas, depresiones o escondites semejantes del terreno.
    reason: lexical_alternative
  - marker: b
    text: «Ha habido una matanza» también podría traducirse «Ha habido una derrota» o «un golpe» entre los seguidores de Absalón; aquí el hebreo se refiere a un derribo militar severo, no a una plaga de enfermedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - Fíjate
  lexicon: HALOT
  rationale: El hebreo introduce una llamada de atención inmediata. «Mira» transmite esa vivacidad en español actual sin la solemnidad más arcaica de «He aquí» o «Hele aquí».
- source_word: עַתָּה
  english_pob_choice: right now
  chosen_spanish: ahora mismo
  alternatives_spanish:
  - ahora
  - en este momento
  lexicon: HALOT
  rationale: La forma enfatiza la inmediatez de la situación. «Ahora mismo» conserva mejor esa urgencia que un simple «ahora».
- source_word: נֶחְבָּא
  english_pob_choice: is hidden
  chosen_spanish: está escondido
  alternatives_spanish:
  - está oculto
  - se ha escondido
  lexicon: HALOT
  rationale: El participio niphal expresa estado de ocultamiento sin precisar agente. «Está escondido» comunica bien esa pasividad relativa en español, sin añadir que él mismo se ocultó.
- source_word: בְּאַחַת הַפְּחָתִים
  english_pob_choice: in one of the pits
  chosen_spanish: en una de las fosas
  alternatives_spanish:
  - en una de las hondonadas
  - en uno de los pozos
  - en uno de los hoyos
  lexicon: HALOT
  rationale: פְּחָתִים puede referirse a fosas, hondonadas o cavidades del terreno. «Fosas» es una equivalencia natural y clara en español; se conserva la alternativa semántica en nota.
- source_word: בְּאַחַד הַמְּקוֹמֹת
  english_pob_choice: in one of the other places
  chosen_spanish: en uno de los otros lugares
  alternatives_spanish:
  - en uno de los lugares
  - en algún otro lugar
  lexicon: HALOT
  rationale: La construcción es indefinida y contrasta con la primera opción mediante אוֹ. «Los otros lugares» refleja bien ese contraste sin sobreexplicar.
- source_word: כִּנְפֹל בָּהֶם
  english_pob_choice: when some of them fall
  chosen_spanish: cuando algunos de ellos caigan
  alternatives_spanish:
  - cuando caigan entre ellos
  - cuando algunos caigan en medio de ellos
  lexicon: HALOT
  rationale: En contexto militar, la idea es que haya bajas entre el grupo. «Caigan» conserva el valor verbal del hebreo y permite entender la caída como muerte o derrota sin forzar el sentido.
- source_word: בַּתְּחִלָּה
  english_pob_choice: at the first attack
  chosen_spanish: al primer ataque
  alternatives_spanish:
  - al principio
  - en el primer choque
  - en la primera acometida
  lexicon: HALOT
  rationale: El contexto bélico sugiere el comienzo del enfrentamiento. «Al primer ataque» reproduce esa fuerza situacional sin añadir una explicación ajena al texto.
- source_word: הַשֹּׁמֵעַ
  english_pob_choice: whoever hears it
  chosen_spanish: quien lo oiga
  alternatives_spanish:
  - el que oiga
  - quien lo escuche
  - el oyente
  lexicon: HALOT
  rationale: El participio con artículo funciona como un indefinido general. «Quien lo oiga» es natural y conserva ese valor representativo.
- source_word: מַגֵּפָה
  english_pob_choice: a slaughter
  chosen_spanish: una matanza
  alternatives_spanish:
  - una derrota
  - un golpe
  - una gran mortandad
  lexicon: HALOT
  rationale: En este marco de guerra, el término designa un fuerte derribo o desastre militar, no una epidemia. «Matanza» comunica la violencia y severidad del término, manteniendo la tensión semántica frente a «derrota».
- source_word: הָעָם אֲשֶׁר אַחֲרֵי אַבְשָׁלֹם
  english_pob_choice: the people who follow Absalom
  chosen_spanish: la gente que sigue a Absalón
  alternatives_spanish:
  - el pueblo que sigue a Absalón
  - la gente detrás de Absalón
  - los seguidores de Absalón
  lexicon: HALOT
  rationale: אַחֲרֵי aquí expresa adhesión o seguimiento, no mera posición espacial. «Que sigue a Absalón» mantiene ese matiz relacional de lealtad.
theological_decisions:
- issue: maggēfāh en contexto bélico no como plaga de enfermedad
  english_pob_reading: '''There has been a slaughter'' ... not to a disease-plague.'
  chosen_spanish_reading: «Ha habido una matanza»
  alternative_spanish_readings:
  - «Ha habido una derrota»
  - «Ha habido un golpe»
  - «Ha habido una plaga»
  rationale: La POB inglesa documenta que el sustantivo aquí significa una devastación militar, no una plaga sanitaria. En español se evita «plaga» para no falsear el sentido y se conserva la gravedad del informe con «matanza».
  doctrine_reference: Uso semántico contextual del término hebreo; no afecta una doctrina, sino la precisión exegética.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el análisis auditado en inglés; no se requirieron revisiones textuales mayores. Se mantuvo la decisión de traducir מַגֵּפָה con un término de violencia militar y no con lenguaje de plaga, y se conservó la apertura retórica de הִנֵּה con un imperativo breve y natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «Absalón» por la forma española estable del nombre propio.
  - «Fosas» conserva el campo semántico de terreno oculto; la nota ofrece la alternativa más literal «hondonadas».
  - No se usó «Cristo», «Señor» ni terminología doctrinal ajena al texto.
  - El registro busca ser bíblico y claro para lectura pública, sin depender de giros arcaizantes.
