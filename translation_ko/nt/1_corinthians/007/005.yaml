  yaml_path: translation/nt/1_corinthians/007/005.yaml
  text: Do not deprive one another[a], except perhaps by mutual agreement for a time, so that you may devote yourselves to prayer, and then come together again[b], so that Satan may not tempt you because of your lack of self-control.
  footnotes:
  - marker: a
    text: 'Or ''unless perhaps by consent.'''
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''be together again''; the phrase refers to resuming life together as husband and wife.'
    reason: lexical_alternative
translation:
