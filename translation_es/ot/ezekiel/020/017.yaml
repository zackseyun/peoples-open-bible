translation:
  language: es
  text: Pero mi ojo tuvo compasión de ellos[a] y no los destruí por completo en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi ojo tuvo compasión de ellos», una expresión idiomática que comunica compasión y contención misericordiosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּחָס
  english_pob_choice: spared
  chosen_spanish: los perdonó
  alternatives_spanish:
  - los sparó
  - tuvo compasión de ellos
  - los salvó de
  lexicon: HALOT
  rationale: חוס expresa la idea de perdonar o ahorrar de una acción destructiva. En español, «perdonó» comunica la restricción compasiva sin volver la frase artificial; «los sparó» sería menos natural, y «tuvo compasión de ellos» desplaza el foco del acto de evitar destruir.
- source_word: עֵינִי
  english_pob_choice: my eye
  chosen_spanish: mi ojo
  alternatives_spanish:
  - yo
  - mis ojos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo para mantener el antropomorfismo. «Mi ojo» reproduce el valor idiomático con mayor fidelidad que reducirlo a «yo».
- source_word: עֲלֵיהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - sobre ellos
  - para con ellos
  lexicon: HALOT
  rationale: Con חוס, la construcción señala el objeto hacia el cual se ejerce el perdón o la compasión. En español, el pronombre directo «los» expresa mejor la relación que un calco preposicional.
- source_word: מִשַּׁחֲתָם
  english_pob_choice: from destroying them
  chosen_spanish: de destruirlos
  alternatives_spanish:
  - de su destrucción
  - de arruinarlos
  - de llevarlos a la ruina
  lexicon: HALOT
  rationale: El מן con infinitivo constructo de שׁחת expresa la acción de destruir o arruinar. «De destruirlos» conserva el valor verbal de manera clara y sin añadir matices no explicitados.
- source_word: וְלֹא עָשִׂיתִי אוֹתָם כָּלָה
  english_pob_choice: I did not make a complete end of them
  chosen_spanish: no hice de ellos un fin completo
  alternatives_spanish:
  - no los destruí por completo
  - no los consumí del todo
  - no hice de ellos una destrucción total
  lexicon: HALOT
  rationale: Se preserva la idiomática עשה כלה con una estructura que refleja el hebreo y la idea de terminación total. Aunque «no hice de ellos un fin completo» suena menos idiomático que otras opciones, mantiene la tensión del original entre destrucción total y restricción misericordiosa.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en el páramo
  - en la estepa
  lexicon: HALOT
  rationale: El contexto del éxodo permite «desierto» en español para transmitir el lugar de peregrinación y prueba. «Wilderness» se traduce aquí con el término más natural y comprensible en español bíblico contemporáneo.
theological_decisions:
- issue: Antropomorfismo divino de «mi ojo»
  english_pob_reading: Retain 'my eye spared them' rather than abstracting to 'I spared them.'
  chosen_spanish_reading: Conservar «mi ojo» y no abstraerlo a «yo»
  alternative_spanish_readings:
  - yo los perdoné
  - los perdoné
  rationale: El hebreo usa deliberadamente una imagen corporal para expresar compasión y restricción. Mantenerla en español conserva la fuerza retórica y el tono del texto sin negar la trascendencia divina.
  doctrine_reference: Translation philosophy §1, §3
- issue: Grado de literalidad en עשה כלה
  english_pob_reading: I did not make a complete end of them
  chosen_spanish_reading: no hice de ellos un fin completo
  alternative_spanish_readings:
  - no los destruí por completo
  - no los consumí del todo
  rationale: La traducción conserva la idea de terminación total sin sustituirla por una formulación más explicativa. Así se respeta la tensión entre juicio y misericordia presente en el pasaje.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: No se detectaron revisiones posteriores que alteren el sentido del pasaje; la lectura actual coincide ampliamente con el audit trail inglés y el chequeo cruzado de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma de Tetragrámaton cuando aparezca en el contexto del libro, conforme a la política del proyecto.
  - «Desierto» se usa aquí por naturalidad bíblica en español; no implica una pérdida de la referencia histórico-salvífica del מִדְבָּר.
  - La imagen antropomórfica se conserva en «mi ojo» para alinearse con el valor idiomático señalado en el material de auditoría.
