  to: Señor Todopoderoso, Dios de Israel, escucha, te ruego, la oración de los muertos de Israel y de los hijos que pecan contra ti, los cuales no escucharon tu voz, la voz de su Dios, y los males[a] se nos han pegado.
  rationale: La revisión restituye «Todopoderoso» al texto principal para reflejar Παντοκράτωρ, cambia «Yahvé» por «Señor» porque la fuente inmediata tiene κύριε y no el nombre divino explícito, y mejora la naturalidad española de θεοῦ αὐτῶν con «la voz de su Dios». Se conserva la literalidad importante de «los muertos de Israel», «hijos» y la imagen de que «los males se nos han pegado».
