base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/012/015.yaml
  text: Now the acts of Rehoboam[a], the first and the last, are they not written in the records of Shemaiah the prophet and of Iddo the seer, according to genealogical enrollment? And there were wars between Rehoboam and Jeroboam all their days.
  footnotes:
  - marker: a
    text: Or 'in the genealogical records,' or 'for genealogical enrollment.' The Hebrew phrase is difficult and may describe the form or purpose of the source material associated with Iddo.
    reason: lexical_alternative
