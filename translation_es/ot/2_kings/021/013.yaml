  yaml_path: translation/ot/2_kings/021/013.yaml
  text: And I will stretch over Jerusalem the measuring line of Samaria and the plumb line of the house of Ahab[a], and I will wipe Jerusalem as one wipes a dish[b], wiping it and turning it upside down.
