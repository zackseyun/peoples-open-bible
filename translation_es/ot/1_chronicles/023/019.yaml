  rationale: Aunque ראשׁ puede significar «cabeza» o «jefe», aquí funciona ordinalmente en paralelo con «el segundo», «el tercero» y «el cuarto». «El primero» preserva la secuencia genealógica sin introducir la idea de cargo.
- source_word: אֲמַרְיָה
