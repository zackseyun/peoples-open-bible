id: COL.2.6
reference: Colossians 2:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὡς οὖν παρελάβετε τὸν Χριστὸν Ἰησοῦν τὸν κύριον, ἐν αὐτῷ περιπατεῖτε,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/006.yaml
  text: Therefore, just as you received Messiah Jesus the Lord, walk in him,
translation:
  language: ko
  text: 그러므로 여러분이 메시아 예수, 곧 주를 영접한 그대로[a] 그분 안에서 행하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도 예수」. Χριστός의 칭호성을 보존하기 위해 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς οὖν
  english_pob_choice: Therefore, just as
  chosen_korean: 그러므로 ... 그대로
  alternatives_korean:
  - 따라서 ... 같이
  lexicon: BDAG
  rationale: 추론적 οὖν와 비교적 ὡς를 「그러므로 ~ 그대로」 구조로 결합한다.
- source_word: παρελάβετε
  english_pob_choice: you received
  chosen_korean: 영접한
  alternatives_korean:
  - 받은
  - 받아들인
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「영접하다」를 사용하여 메시아 예수께 대한 인격적·교리적 수용을 함께 담는다.
- source_word: τὸν Χριστὸν Ἰησοῦν τὸν κύριον
  english_pob_choice: Messiah Jesus the Lord
  chosen_korean: 메시아 예수, 곧 주
  alternatives_korean:
  - 그리스도 예수 곧 주
  - 주 되신 메시아 예수
  lexicon: BDAG
  rationale: 동격 관계 「메시아 예수 — 주」를 한국어에서 「곧」으로 명시한다. Χριστός는 칭호 「메시아」.
- source_word: ἐν αὐτῷ περιπατεῖτε
  english_pob_choice: walk in him
  chosen_korean: 그분 안에서 행하십시오
  alternatives_korean:
  - 그분 안에 거하며 살아가십시오
  - 그분 안에 걸어가십시오
  lexicon: BDAG
  rationale: 현재 명령. 한국 교회의 정립된 「행하다」로 περιπατέω의 「삶의 방식」 비유를 살린다.
