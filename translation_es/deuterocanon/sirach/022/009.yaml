    issue: La nota [a] está anclada en «muerto» aunque comenta la expresión «la luz».
    rationale: No impide la comprensión ni exige corrección obligatoria, pero idealmente la marca estaría junto a «la luz» o la cláusula correspondiente, ya que la nota explica la metáfora de φῶς.
