translation:
  language: es
  text: 'Entonces vienen y se ponen delante de mí en esta casa[a], que lleva mi nombre, y dicen[b]: «¡Somos librados!»; para que hagan todas estas abominaciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «este templo». Hebreo: «esta casa».'
    reason: lexical_alternative
  - marker: b
    text: O, «¡Somos salvados!» o «¡Estamos a salvo!»
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתֶם
  english_pob_choice: Then you come
  chosen_spanish: Entonces vienes
  alternatives_spanish:
  - Y vienes
  - Entonces llegas
  lexicon: HALOT
  rationale: La secuencia profética presenta la acción de modo vívido e inmediato; «entonces» conserva el valor consecutivo, y el presente «vienes» mantiene la acusación directa, sin forzar un pasado narrativo.
- source_word: וַעֲמַדְתֶּם לְפָנַי
  english_pob_choice: and stand before me
  chosen_spanish: y te pones delante de mí
  alternatives_spanish:
  - y te presentas delante de mí
  - y te mantienes en mi presencia
  lexicon: HALOT
  rationale: עמד + לפני expresa comparecer o colocarse en presencia de alguien. «Ponerse delante de mí» suena natural en español y conserva la imagen de presentarse ante Yahvé.
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: in this house
  chosen_spanish: en esta casa[a]
  alternatives_spanish:
  - en este templo
  - en esta casa aquí
  lexicon: HALOT
  rationale: Se conserva «casa» porque el hebreo dice literalmente בַּיִת. En el contexto del templo, «casa» mantiene el vínculo con la casa de Yahvé sin sustituir el término fuente por una explicación interpretativa.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  english_pob_choice: which is called by my name
  chosen_spanish: que lleva mi nombre
  alternatives_spanish:
  - sobre la cual es invocado mi nombre
  - que es llamada por mi nombre
  lexicon: HALOT
  rationale: El modismo hebreo indica pertenencia e identificación por nombre. «Lleva mi nombre» es una solución española idiomática que conserva esa relación sin sonar demasiado literal o arcaica.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: and say
  chosen_spanish: y dices[b]
  alternatives_spanish:
  - y dices entonces
  - y decís
  lexicon: HALOT
  rationale: La acusación reproduce el habla de los oyentes en discurso directo; en español, el presente singular en la cita («dices») sigue la vivacidad profética. Se deja la opción plural como alternativa natural del español, aunque el texto base la integra en una secuencia estilizada.
- source_word: נִצַּלְנוּ
  english_pob_choice: We are delivered!
  chosen_spanish: ¡Somos librados!
  alternatives_spanish:
  - ¡Estamos salvados!
  - ¡Hemos sido rescatados!
  - ¡Estamos a salvo!
  lexicon: HALOT
  rationale: נצל en nifal expresa ser librado/rescatado. «Librados» conserva el sentido de liberación o rescate y evita cargar el texto con matices soteriológicos que «salvados» puede introducir en español.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - con el fin de que
  - a fin de que
  lexicon: HALOT
  rationale: 'La cláusula expresa propósito irónico: afirman estar librados para seguir pecando. «Para que» comunica bien esa finalidad en español moderno.'
- source_word: עֲשׂוֹת
  english_pob_choice: you may do
  chosen_spanish: hagas
  alternatives_spanish:
  - hagas tú
  - sigas haciendo
  lexicon: HALOT
  rationale: El infinitivo con לְמַעַן se traduce con una subordinada final natural en español. «Hagas» evita añadir aspecto no explicitado, manteniendo la relación de propósito con el resto de la frase.
- source_word: כָּל הַתּוֹעֵבוֹת הָאֵלֶּה
  english_pob_choice: all these abominations
  chosen_spanish: todas estas abominaciones
  alternatives_spanish:
  - todas estas cosas abominables
  - todos estos actos abominables
  lexicon: HALOT
  rationale: «Abominaciones» reproduce la fuerza cultual y moral del hebreo תּוֹעֵבוֹת, un término bíblico fuerte que POB conserva para no debilitar la acusación profética.
theological_decisions:
- issue: Terminología para בַּיִת en contexto del templo
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: Aunque el referente es el templo de Jerusalén, el hebreo dice «casa». En español, «casa» conserva la terminología del texto y su resonancia teológica como la casa de Yahvé; «templo» explicaría el referente pero perdería la literalidad documentada.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de נִצַּלְנוּ
  english_pob_reading: We are delivered!
  chosen_spanish_reading: ¡Somos librados!
  alternative_spanish_readings:
  - ¡Estamos salvados!
  - ¡Hemos sido rescatados!
  - ¡Estamos a salvo!
  rationale: La ironía del pasaje está en que los hablantes se consideran liberados por el simple hecho de acudir al santuario. «Librados» mantiene el sentido de rescate/liberación sin introducir una formulación más doctrinal como «salvados», que podría sugerir una lectura posterior al contexto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «may go on doing» por «may do» para adherirse más de cerca al hebreo y evitar añadir aspecto no explícito. En español se reflejó esa decisión con «para que hagas», sin insertar una noción de continuidad que el texto fuente no exige.
  spanish_consistency_notes:
  - Se mantuvo «casa» para בַּיִת y «abominaciones» para תּוֹעֵבוֹת, en línea con la terminología POB y su fuerza lexical.
  - Se evitó «SEÑOR» para יהוה; en este versículo no aparece el Tetragrámaton de forma explícita en el texto base, pero se conservó «mí»/«mi nombre» conforme al discurso divino.
  - El español conserva la estructura acusatoria y la ironía del hebreo sin amplificar el aspecto verbal más allá de lo documentado en el audit trail.
