    rationale: El griego usa una construcción enfática cognada; en español, 'mostrar celo con celo' resulta torpe. 'Ardió de celo' o 'mostró celo' son opciones más naturales; la primera conserva mejor la intensidad.
  - severity: high
    issue: La nota al pie usa 'celozar', que no es una forma española aceptable.
    rationale: La nota debe aclarar el original, no introducir una pseudoforma inexistente que confunde al lector y debilita la credibilidad del aparato.
  - severity: medium
    issue: '''Pacto'' para διαθήκην es menos adecuado que ''alianza'' en este contexto intertextual.'
    rationale: En lenguaje bíblico en español, la alianza de Fineés se reconoce mejor como 'alianza', que preserva mejor la conexión teológica con la tradición veterotestamentaria.
  revised_spanish_text: Finés, nuestro padre[a], porque ardió de celo, recibió una alianza de sacerdocio santo.
