translation:
  language: es
  text: Jóvenes varones y también doncellas[a], ancianos junto con muchachos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vírgenes». El hebreo בְּתוּלוֹת puede referirse con más precisión a muchachas vírgenes, pero aquí el contexto poético favorece una clasificación por edad y sexo.
    reason: lexical_alternative
  - marker: b
    text: O «jóvenes». El hebreo נְעָרִים es un término amplio para varones más jóvenes y puede solaparse con «muchachos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּרִים
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jóvenes varones
  - hombres jóvenes
  lexicon: HALOT
  rationale: El hebreo designa a varones jóvenes en edad adulta temprana. En español, «jóvenes» funciona de forma natural en la serie poética y puede abarcar el matiz de juventud masculina sin recargar el verso; la nota puede mantener la referencia masculina si se desea mayor precisión.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - y
  - también
  lexicon: HALOT
  rationale: La construcción añade un matiz enfático de suma. «Y también» conserva la coordinación y la énfasis aditivo mejor que un simple «y».
- source_word: בְּתוּלוֹת
  english_pob_choice: young women
  chosen_spanish: doncellas
  alternatives_spanish:
  - jóvenes mujeres
  - vírgenes
  - muchachas
  lexicon: HALOT
  rationale: El término puede significar «vírgenes», pero en este catálogo poético de grupos por edad y sexo, «doncellas» comunica una referencia femenina joven sin imponer de entrada un énfasis sexual que el contexto no exige. La alternativa literal queda preservada en la nota.
- source_word: זְקֵנִים
  english_pob_choice: old men
  chosen_spanish: ancianos
  alternatives_spanish:
  - hombres ancianos
  - los viejos
  - viejos
  lexicon: HALOT
  rationale: En esta lista de grupos etarios, el sustantivo apunta naturalmente a varones de edad avanzada. «Ancianos» es breve, idiomático y mantiene el sentido de edad; no se usa aquí como término de oficio eclesial.
- source_word: עִם
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - acompañado de
  lexicon: HALOT
  rationale: La preposición marca compañía o asociación. «Junto con» reproduce bien la relación de acompañamiento y suena natural en español poético.
- source_word: נְעָרִים
  english_pob_choice: youths
  chosen_spanish: muchachos
  alternatives_spanish:
  - jóvenes
  - niños
  - adolescentes
  lexicon: HALOT
  rationale: El término hebreo puede abarcar muchachos o jóvenes. Dado que la línea anterior ya cubre a los jóvenes adultos, «muchachos» distingue mejor este grupo más joven y conserva la serie etaria.
translation_notes:
  revision_awareness: Se siguió el pasaje tal como está en el expediente, sin cambios posteriores reportados; la solución española busca preservar la lista paralela de grupos etarios y de sexo, con notas para las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece en el verso.
  - Se mantiene un registro poético claro y moderno, sin introducir tecnicismos eclesiásticos.
  - La serie nominal queda paralela y breve para respetar el ritmo del hebreo.
