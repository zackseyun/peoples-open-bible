review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo y la prohibición normativa: reparto de la herencia, no preferir al hijo de la esposa amada por encima del verdadero primogénito. Sin embargo, omite en español la referencia contextual a ''esposa'' presente en el inglés auditado y necesaria para evitar ambigüedad; además, ''dar la primacía'' no expresa tan directamente como el hebreo בכר el trato jurídico ''como primogénito''.'
  spanish_quality_summary: El español es claro, pero 'Y sucederá que' suena más formular y menos natural de lo necesario para una ley casuística. 'El hijo de la amada / de la aborrecida' resulta ambiguo en español, porque puede referirse a mujeres no identificadas como esposas; en este contexto conviene explicitar 'esposa'. También 'dar la primacía' es entendible, pero 'tratar como el primogénito' o equivalente refleja mejor el estatus legal específico.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. La decisión de mantener el contraste fuerte amada/aborrecida concuerda con el POB, pero la nota debe conservar también la alternativa 'no amada' o 'menos amada' según el expediente inglés. Añadir 'esposa' es una aclaración contextual legítima, ya documentada en el audit trail inglés.
  issues:
  - severity: medium
    issue: Falta 'esposa' en 'el hijo de la amada / de la aborrecida'.
    rationale: Aunque el sustantivo no se repite en el hebreo inmediato, el contexto legal de los versículos anteriores lo exige y el POB inglés lo añadió expresamente para evitar ambigüedad. En español, sin 'esposa', la frase suena incompleta o poco precisa.
  - severity: medium
    issue: '''Dar la primacía'' no reproduce con suficiente precisión el valor jurídico de לְבַכֵּר.'
    rationale: El verbo apunta a tratar o reconocer a alguien como primogénito, no solo a darle preferencia general. Una formulación con 'tratar ... como el primogénito' preserva mejor el sentido legal.
  - severity: low
    issue: '''Y sucederá que'' es algo rígido para el registro legal español.'
    rationale: Una apertura como 'Y el día que' o 'Y cuando' mantiene la fuerza legal-temporal sin sonar tan formular ni artificial.
  revised_spanish_text: Y el día que reparta su herencia a sus hijos, no podrá tratar al hijo de la esposa amada[a] como el primogénito sobre el hijo de la esposa aborrecida, que es el primogénito.
  revised_footnotes:
  - marker: a
    text: 'O: ''el hijo de la esposa no amada'' o ''el hijo de la esposa menos amada''. En este contexto legal, el contraste hebreo entre ''amada'' y ''aborrecida'' puede expresar preferencia relativa más que odio activo.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar con mayor precisión el sentido jurídico de בכר ('tratar ... como el primogénito') y para eliminar la ambigüedad española añadiendo 'esposa', conforme al contexto y al audit trail inglés. También se suaviza la fórmula inicial a una construcción más natural en español legal-narrativo. La nota se alinea mejor con las alternativas documentadas en inglés.
