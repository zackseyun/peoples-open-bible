revisions:
- from: ¡Levantad, puertas, vuestras cabezas![a] ¡Alzaos, puertas eternas, y entrará el Rey de gloria!
  to: ¡Puertas, levanten sus cabezas! Y sean alzadas, puertas antiguas[a], para que entre el Rey de gloria.
  rationale: 'Se corrigen dos problemas de fidelidad principales: el marcador de nota se mueve a «puertas antiguas[a]», que es donde realmente aplica la alternativa léxica, y «y entrará» se reemplaza por «para que entre» para preservar el valor final/resultativo auditado en inglés. También se alinea la elección principal con «ancient doors» mediante «puertas antiguas», manteniendo «puertas eternas» en nota como alternativa documentada. La redacción se suaviza para un español más natural sin perder la personificación poética del hebreo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:17:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la personificación de las puertas y el título «el Rey de gloria», pero se aparta del sentido y de la auditoría inglesa en dos puntos importantes: (1) la nota [a] está anclada en «cabezas» cuando en realidad documenta la alternativa de פִּתְחֵי עוֹלָם; (2) «y entrará» debilita el valor final/resultativo de וְיָבֹא que el POB auditó como «that ... may come in».'
  spanish_quality_summary: 'El español es poético y legible, pero «Levantad, puertas, vuestras cabezas» suena algo forzado; «¡Puertas, levanten sus cabezas!» o una estructura similar fluye mejor en español moderno y conserva la imagen. Además, conviene alinear la segunda cláusula con una formulación natural que preserve la finalidad: «para que entre».'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Rey de gloria» está bien alineado con la decisión auditada. La elección «puertas eternas» es defendible solo si la nota preserva claramente la alternativa «puertas antiguas / eternas», pero el inglés POB prefirió «ancient doors», por lo que en español conviene usar «puertas antiguas» en el texto principal y mantener «puertas eternas» como alternativa en nota.
  issues:
  - severity: high
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica פִּתְחֵי עוֹלָם («puertas antiguas/eternas»), pero el marcador aparece tras «cabezas», creando una correspondencia falsa entre nota y texto.
  - severity: high
    issue: «y entrará» no refleja bien el valor final/resultativo de וְיָבֹא
    rationale: El expediente inglés justificó «that the King of glory may come in». En español, «para que entre» o «y entre» preserva mejor la finalidad tras los imperativos que un futuro simple.
  - severity: medium
    issue: «puertas eternas» en el texto principal invierte la preferencia auditada
    rationale: El POB inglés eligió «ancient doors» como lectura principal y dejó «everlasting doors» en nota. El español debería reflejar esa priorización salvo razón fuerte; aquí no la hay.
  - severity: low
    issue: Imperativo inicial algo rígido en español
    rationale: «¡Levantad, puertas, vuestras cabezas!» es inteligible pero menos natural en español eclesial latinoamericano amplio que «¡Puertas, levanten sus cabezas!».
  revised_spanish_text: ¡Puertas, levanten sus cabezas! Y sean alzadas, puertas antiguas[a], para que entre el Rey de gloria.
  revised_footnotes:
  - marker: a
    text: O «puertas eternas». La expresión hebrea puede denotar puertas de antigua existencia o de duración perpetua.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos problemas de fidelidad principales: el marcador de nota se mueve a «puertas antiguas[a]», que es donde realmente aplica la alternativa léxica, y «y entrará» se reemplaza por «para que entre» para preservar el valor final/resultativo auditado en inglés. También se alinea la elección principal con «ancient doors» mediante «puertas antiguas», manteniendo «puertas eternas» en nota como alternativa documentada. La redacción se suaviza para un español más natural sin perder la personificación poética del hebreo.'
