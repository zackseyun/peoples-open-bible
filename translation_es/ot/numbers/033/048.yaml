  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo: salida desde los montes de Abarim, campamento en las llanuras/estepas de Moab, y ubicación junto al Jordán en la zona de Jericó. También preserva correctamente las alternativas léxicas documentadas en las notas.'
  spanish_quality_summary: El español es claro y natural, pero «en Jericó» suena demasiado preciso y puede sugerir dentro de la ciudad, mientras que el hebreo y la auditoría inglesa apuntan a una ubicación por el Jordán en el área de Jericó. Conviene ajustar a «junto al Jordán, a la altura de Jericó» para evitar una inferencia geográfica indebida y mantener legibilidad.
  glossary_alignment: No hay términos teológicos sensibles aquí. Los nombres propios «Abarim», «Moab», «Jordán» y «Jericó» están bien. «Llanuras» concuerda con la decisión principal, con «estepas» preservada en nota.
  issues:
  - severity: medium
    issue: «en Jericó» sobreespecifica la ubicación
    rationale: El hebreo עַל יַרְדֵּן יְרֵחוֹ no exige que el campamento estuviera dentro de Jericó. La auditoría inglesa eligió «by the Jordan at Jericho» y reservó «opposite Jericho» como alternativa. En español, «en Jericó» puede sonar como ubicación urbana, no simplemente en la zona de Jericó junto al Jordán.
  - severity: low
    issue: La nota b ya señala «frente a Jericó», pero el texto principal debería evitar una lectura más estrecha que la nota
    rationale: Si el texto principal dice «en Jericó», la nota alternativa queda desalineada, porque el principal ya se ha movido a una interpretación más específica distinta de «at Jericho».
  revised_spanish_text: Partieron de los montes de Abarim y acamparon en las llanuras de Moab, junto al Jordán, a la altura de Jericó[a][b].
