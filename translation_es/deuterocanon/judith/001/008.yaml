lexical_decisions:
- source_word: τοὺς ἐν τοῖς ἔθνεσι
  english_pob_choice: those among the nations
  chosen_spanish: a los que estaban entre las naciones
  alternatives_spanish:
  - a los que estaban en las naciones
  - a los que estaban entre los gentiles
  lexicon: BDAG
  rationale: Conservo el valor personal de τοὺς con una construcción relativa natural en español. 'Entre las naciones' mantiene el sentido amplio de ἔθνεσι como pueblos/territorios sin imponer el matiz teológico más cargado de 'gentiles'.
- source_word: Καρμήλου
  english_pob_choice: Carmel
  chosen_spanish: Carmelo
  alternatives_spanish:
  - Carmel
  - Monte Carmelo
  lexicon: LSJ
  rationale: Uso la forma castellana bíblica y geográfica 'Carmelo', que funciona de manera natural en español y conserva la referencia del lugar sin añadir 'Monte', que el griego no explicita.
- source_word: Γαλαὰδ
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: LSJ
  rationale: '''Galaad'' es la forma tradicional y reconocible en español bíblico para este topónimo.'
- source_word: τὴν ἄνω Γαλιλαίαν
  english_pob_choice: Upper Galilee
  chosen_spanish: la Alta Galilea
  alternatives_spanish:
  - la Galilea superior
  - la parte alta de Galilea
  lexicon: LSJ
  rationale: '''Alta Galilea'' reproduce el valor geográfico de ἄνω y suena natural como designación regional en español.'
- source_word: τὸ μέγα πεδίον
  english_pob_choice: the great plain
  chosen_spanish: la gran llanura
  alternatives_spanish:
  - la gran llanura
  - el gran llano
  - la gran planicie
  lexicon: LSJ
  rationale: '''πεδίον'' denota una extensión llana; ''llanura'' comunica bien el sentido geográfico en español y ''gran'' conserva μέγα sin sobreinterpretar.'
- source_word: Ἐσδρήμ
  english_pob_choice: Esdraelon
  chosen_spanish: Esdraelón
  alternatives_spanish:
  - Esdrelón
  - Esdraelón
  lexicon: LSJ
  rationale: Sigo la identificación tradicional del topónimo con la llanura de Esdraelón/Jezreel. 'Esdraelón' es la forma española establecida y más transparente para el lector.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un pasaje puramente geográfico, con alta concordancia y sin revisiones aplicadas; por eso la traducción española sigue de cerca la enumeración de lugares y conserva la identificación tradicional de Ἐσδρήμ como Esdraelón.
  spanish_consistency_notes:
  - He usado formas bíblicas españolas estables para los topónimos (Carmelo, Galaad, Galilea, Esdraelón) para mantener legibilidad e पहचान geográfica.
  - He evitado 'gentiles' porque el griego habla de naciones/pueblos en un marco geográfico, no de una oposición teológica.
  - La nota al pie preserva la equivalencia identificatoria entre Esdraelón y la llanura de Jezreel sin introducir una corrección especulativa en el cuerpo del texto.
