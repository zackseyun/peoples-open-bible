lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: פַּר designa un toro o toro joven apto para sacrificio. En español, "toro" comunica con naturalidad la clase animal sin introducir la edad de manera innecesaria.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: de la manada
  alternatives_spanish:
  - de ganado vacuno
  - de la res
  lexicon: HALOT
  rationale: La expresión hebrea especifica el origen bovino. "De la manada" conserva esa referencia de pertenencia al ganado en un español claro y no forzado, y evita duplicar la idea ya contenida en "toro".
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - borrego
  lexicon: HALOT
  rationale: אַיִל es el macho adulto de la oveja; "carnero" es el equivalente natural y reconocido en español bíblico.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego
  lexicon: HALOT
  rationale: כֶּבֶשׂ aquí se refiere a un cordero en contexto sacrificial. "Cordero macho" hace explícito el sexo que el inglés POB también explicitó para preservar la precisión del inventario sacrificial.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: El idiomático hebreo indica edad. "De un año" es la forma natural en español y mantiene la concisión de la lista ritual.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para una ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda totalmente quemada. En español bíblico, "holocausto" es el término tradicional más preciso y vigente para esta categoría sacrificial; se conserva como nombre técnico, no como calco del inglés.
theological_decisions:
- issue: Nombre técnico del sacrificio עֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - para una ofrenda quemada
  - como ofrenda totalmente quemada
  rationale: 'No hay tensión doctrinal, pero sí una decisión terminológica: el hebreo nombra una categoría sacrificial técnica. "Holocausto" preserva ese valor ritual y evita perder el carácter técnico de la ofrenda.'
  doctrine_reference: Levítico 1; Números 28–29
translation_notes:
  revision_awareness: El texto inglés POB y el cotejo de revisión muestran acuerdo alto y sin cambios necesarios; la versión española sigue directamente el hebreo con la misma contabilidad sacrificial y sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene el estilo de inventario ritual, con paralelismo y numerales explícitos.
  - '"Holocausto" se usa como término técnico sacrificial, no con el sentido moderno extrabíblico.'
  - No se introducen notas porque el versículo no presenta variantes textuales ni ambigüedades semánticas que requieran comentario en este registro.
