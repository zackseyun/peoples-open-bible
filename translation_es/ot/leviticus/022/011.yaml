    text: Literalmente, «una persona, una adquisición de su dinero»; es decir, alguien comprado con su dinero.
    reason: lexical_alternative
  - marker: b
    text: O «de su pan»; aquí «pan» probablemente se refiere en sentido más amplio al alimento sacerdotal que le corresponde.
    reason: lexical_alternative
  revision_rationale: Se revisa la frase de propiedad para conservar con más claridad la dimensión legal de קִנְיַן כַּסְפּוֹ en un español más natural. Se reemplaza «él puede comer de ella» por «esta puede comer de ello» para evitar la falsa referencia a la persona comprada y reflejar que el objeto de comer es el alimento sagrado implícito. Se usa «alimento» en el texto principal y se conserva «pan» en nota, siguiendo mejor la justificación contextual de la auditoría inglesa y mejorando la legibilidad en español.
