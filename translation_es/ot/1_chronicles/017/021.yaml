translation:
  language: es
  text: ¿Y quién como tu pueblo Israel, una sola nación en la tierra, por la cual Dios fue a redimir para sí un pueblo, para hacerte un nombre por grandes y temibles obras[a], expulsando naciones de delante de tu pueblo[b], al que redimiste de Egipto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grandes y asombrosas obras».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «expulsando naciones de delante de tu pueblo»; algunos entienden de otro modo el orden final de las palabras, porque el paralelo en 2 Samuel 7:23 es textualmente difícil.'
    reason: textual_variant
lexical_decisions:
- source_word: וּמִי
  english_pob_choice: And who
  chosen_spanish: ¿Y quién
  alternatives_spanish:
  - ¿Y qué nación
  - ¿Y quién hay
  lexicon: HALOT
  rationale: La pregunta retórica en español fluye mejor con «¿Y quién…?» y conserva la comparación personal del hebreo sin endurecerla en una formulación más abstracta.
- source_word: כְעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: like your people Israel
  chosen_spanish: como tu pueblo Israel
  alternatives_spanish:
  - como Israel, tu pueblo
  - igual a tu pueblo Israel
  lexicon: HALOT
  rationale: Mantiene la relación de pacto y el poseedor «tu pueblo»; el orden es natural en español y sigue de cerca la estructura del original.
- source_word: גּוֹי אֶחָד בָּאָרֶץ
  english_pob_choice: one nation on the earth
  chosen_spanish: una sola nación en la tierra
  alternatives_spanish:
  - una nación en la tierra
  - una nación única en la tierra
  lexicon: HALOT
  rationale: «Una sola nación» preserva la unicidad del hebreo sin sobreinterpretarla como «única» en sentido evaluativo; «en la tierra» traduce de forma natural בָּאָרֶץ.
- source_word: אֲשֶׁר הָלַךְ הָאֱלֹהִים
  english_pob_choice: whom God went
  chosen_spanish: a la cual fue Dios
  alternatives_spanish:
  - por la cual fue Dios
  - a quien Dios fue
  lexicon: HALOT
  rationale: En español conviene explicitar la idea con «fue Dios» para conservar el movimiento antropomórfico del hebreo; «a la cual» se ajusta a «nación» y evita perder la referencia al pueblo como colectivo.
- source_word: לִפְדּוֹת לוֹ עָם
  english_pob_choice: to redeem for himself as a people
  chosen_spanish: a redimir para sí un pueblo
  alternatives_spanish:
  - para rescatar para sí un pueblo
  - a redimir para sí como pueblo
  lexicon: HALOT
  rationale: «Redimir» conserva el término pactal, y «para sí un pueblo» refleja el propósito/resultante del original sin añadir explicaciones ajenas al texto.
- source_word: לָשׂוּם לְךָ שֵׁם
  english_pob_choice: to make for yourself a name
  chosen_spanish: para darte un nombre
  alternatives_spanish:
  - para ponerte un nombre
  - para hacerte un nombre
  lexicon: HALOT
  rationale: En español, «darte un nombre» comunica la idea idiomática de establecer renombre con menos aspereza que una calca literal, pero conserva la referencia a la fama divina producida por las obras salvadoras.
- source_word: גְּדֻלּוֹת וְנֹרָאוֹת
  english_pob_choice: great and fearsome deeds
  chosen_spanish: por grandes y temibles obras
  alternatives_spanish:
  - por grandes y asombrosas obras
  - por grandes y terribles obras
  lexicon: HALOT
  rationale: «Temibles» conserva el peso de נֹרָאוֹת y evita suavizarlo a «asombrosas», que puede perder la dimensión de temor reverente; «obras» es natural en español para las acciones poderosas de Dios.
- source_word: לְגָרֵשׁ
  english_pob_choice: driving out
  chosen_spanish: al expulsar
  alternatives_spanish:
  - expulsando
  - para expulsar
  lexicon: HALOT
  rationale: El gerundio español expresa bien la acción concomitante; «expulsar» corresponde a גרש sin debilitar la fuerza de desalojo del término.
- source_word: מִפְּנֵי עַמְּךָ
  english_pob_choice: from before your people
  chosen_spanish: de delante de tu pueblo
  alternatives_spanish:
  - de la presencia de tu pueblo
  - de ante tu pueblo
  lexicon: HALOT
  rationale: «De delante de» conserva el idiomatismo espacial hebreo que señala desplazamiento y desposesión, sin convertirlo en una expresión más interpretativa.
- source_word: אֲשֶׁר פָּדִיתָ מִמִּצְרַיִם
  english_pob_choice: whom you redeemed from Egypt
  chosen_spanish: al que rescataste de Egipto
  alternatives_spanish:
  - al que redimiste de Egipto
  - que rescataste de Egipto
  lexicon: HALOT
  rationale: Aquí «rescataste» expresa bien la liberación histórica de Egipto en español; aunque «redimiste» también es posible, «rescataste» evita una repetición excesiva de «redimir» en la misma cláusula y sigue siendo fiel al sentido.
theological_decisions:
- issue: Nombre divino implícito en הָאֱלֹהִים y el movimiento de Dios
  english_pob_reading: whom God went
  chosen_spanish_reading: a la cual fue Dios
  alternative_spanish_readings:
  - a la cual fue Dios para redimirla
  - a quien fue Dios
  rationale: No se introduce «Yahvé» aquí porque el hebreo dice explícitamente «Dios» (הָאֱלֹהִים). La traducción conserva el antropomorfismo del ir divino y no lo sustituye por una formulación más abstracta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Preservación del lenguaje de redención y elección del pueblo
  english_pob_reading: to redeem for himself as a people
  chosen_spanish_reading: a redimir para sí un pueblo
  alternative_spanish_readings:
  - a rescatar para sí un pueblo
  - a comprar para sí un pueblo
  rationale: «Redimir» mantiene la carga bíblica de liberación pactal y elección. No se reduce a un simple acto político o nacional, ni se sustituye por términos ajenos al campo semántico del texto.
  doctrine_reference: Translation philosophy §6
- issue: Fuerza de נֹרָאוֹת
  english_pob_reading: fearsome
  chosen_spanish_reading: temibles
  alternative_spanish_readings:
  - asombrosas
  - terribles
  rationale: «Temibles» conserva la mezcla de asombro y temor que el hebreo comunica. «Asombrosas» puede sonar débil en español contemporáneo; «terribles» podría sobrerrecrear el efecto.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo (WLC) y el audit trail inglés de POB. La redacción española mantiene la pregunta retórica, el lenguaje de redención y la tensión textual final sobre el orden de palabras, sin suavizar la fuerza de נֹרָאוֹת ni sustituir la referencia a «Dios» del hebreo por una máscara litúrgica.
  spanish_consistency_notes:
  - Se mantuvo «Dios» porque el hebreo usa הָאֱלֹהִים; no corresponde introducir «Yahvé» en este versículo.
  - Se prefirió «redimir» en el núcleo de la cláusula y «rescataste» en la recapitulación final para evitar una repetición pesada sin perder el campo semántico de liberación.
  - «Temibles» conserva la tensión reverente/dreadful de נֹרָאוֹת, alineada con la decisión inglesa de «fearsome».
  - «De delante de» reproduce la imagen espacial de מִפְּנֵי, importante para la idea de expulsión y desposesión.
