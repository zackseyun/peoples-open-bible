  text: νομίζω οὖν τοῦτο καλὸν ὑπάρχειν διὰ τὴν ἐνεστῶσαν ἀνάγκην, ὅτι καλὸν ἀνθρώπῳ τὸ οὕτως εἶναι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/026.yaml
  text: 'Therefore I think this is good because of the present distress: that it is good for a man to remain as he is[a][b][c].'
  footnotes:
  - marker: a
    text: 'Or ''because of the present necessity'' or ''because of the impending crisis.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''for a person''; Greek ''for a man'' may function generically, but the translation preserves the masculine form of the source.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally, ''to be thus.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 나는 현재의 곤경 때문에 이것이 좋다고 생각합니다. 곧 사람이 지금 그대로 있는 것이 좋다는 것입니다.
  philosophy: optimal-equivalence
