base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/021.yaml
  text: But Moses said[a], “The people among whom I am are six hundred thousand on foot, and yet you have said, ‘I will give them meat[b], and they will eat for a month of days.’”
  footnotes:
