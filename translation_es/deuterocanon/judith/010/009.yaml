translation:
  language: es
  text: 'Y les dijo: «Ordenen que se me abra la puerta de la ciudad, y saldré para el cumplimiento de las palabras que hablaron conmigo». Entonces dieron instrucciones a los jóvenes para que se la abrieran, tal como ella había dicho[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «tal como hablaron». La formulación es menos explícita que el español y puede referirse ya sea a lo que Judith dijo o a lo que habían tratado con ella.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπιτάξατε
  english_pob_choice: Order
  chosen_spanish: Ordenen
  alternatives_spanish:
  - Manden
  - Den la orden
  lexicon: BDAG
  rationale: El imperativo aoristo tiene fuerza directiva clara; «Ordenen» conserva la autoridad sin volver el español demasiado rígido.
- source_word: ἀνοῖξαί μοι τὴν πύλην τῆς πόλεως
  english_pob_choice: the gate of the city to be opened for me
  chosen_spanish: que se me abra la puerta de la ciudad
  alternatives_spanish:
  - que abran para mí la puerta de la ciudad
  - abrir la puerta de la ciudad para mí
  lexicon: BDAG
  rationale: La pasiva infinitiva en el mandato se vierte naturalmente en español con «se me abra», manteniendo el orden y la fuerza de la petición.
- source_word: ἐξελεύσομαι
  english_pob_choice: I will go out
  chosen_spanish: saldré
  alternatives_spanish:
  - iré fuera
  - saldré de allí
  lexicon: BDAG
  rationale: «Saldré» es la forma más directa y natural para el futuro de salida desde la ciudad.
- source_word: εἰς τελείωσιν τῶν λόγων
  english_pob_choice: for the fulfillment of the words
  chosen_spanish: para el cumplimiento de las palabras
  alternatives_spanish:
  - para la consumación de las palabras
  - para cumplir las palabras
  lexicon: BDAG
  rationale: «τελείωσις» expresa cumplimiento/completación; «cumplimiento» conserva esa idea sin perder claridad en español. «Palabras» mantiene la correspondencia con λόγοι, aun si en contexto remite a lo tratado.
- source_word: ὧν ἐλαλήσατε μετʼ ἐμοῦ
  english_pob_choice: that you spoke with me
  chosen_spanish: que hablaron conmigo
  alternatives_spanish:
  - que hablaron conmigo acerca de esto
  - que trataron conmigo
  lexicon: BDAG
  rationale: «Hablaron conmigo» refleja la interacción recíproca de μετʼ ἐμοῦ mejor que un simple «me dijeron».
- source_word: συνέταξαν
  english_pob_choice: they instructed
  chosen_spanish: ordenaron
  alternatives_spanish:
  - instruyeron
  - dieron instrucciones
  lexicon: BDAG
  rationale: Aquí se describe la acción de mandar a subordinados; «ordenaron» conserva la correspondencia con el mandato previo y el tono de autoridad.
- source_word: τοῖς νεανίσκοις
  english_pob_choice: the young men
  chosen_spanish: a los jóvenes
  alternatives_spanish:
  - a los muchachos
  - a los servidores jóvenes
  lexicon: BDAG
  rationale: νεανίσκοι son jóvenes varones; «jóvenes» es natural en español y suficientemente preciso en el contexto narrativo.
- source_word: ἀνοῖξαι αὐτῇ
  english_pob_choice: to open it for her
  chosen_spanish: que se la abrieran
  alternatives_spanish:
  - que le abrieran la puerta
  - que la abrieran para ella
  lexicon: BDAG
  rationale: El pronombre enclítico «la» remite a la puerta ya mencionada y evita repetición innecesaria, conservando el referente implícito del griego.
- source_word: καθὼς ἐλάλησαν
  english_pob_choice: just as she had said
  chosen_spanish: tal como ella había dicho
  alternatives_spanish:
  - como habían hablado
  - tal como dijeron
  lexicon: BDAG
  rationale: El griego es menos explícito sobre el referente; el contexto favorece la referencia a lo que Judith acababa de decir. Se conserva la ambigüedad histórica en nota.
theological_decisions:
- issue: Referente menos explícito en καθὼς ἐλάλησαν
  english_pob_reading: just as she had said, with a note that the Greek could also refer to what they had spoken with her
  chosen_spanish_reading: tal como ella había dicho, con nota sobre la posibilidad literal «tal como hablaron»
  alternative_spanish_readings:
  - tal como hablaron
  - tal como habían hablado con ella
  rationale: La narración inmediata apunta a la solicitud de Judith; sin embargo, el griego permite la lectura más literal y menos explícita. Mantener la nota preserva esa tensión documentada.
  doctrine_reference: N/A (cuestión narrativa y textual, no doctrinal)
translation_notes:
  revision_awareness: 'Se siguió el cierre revisado del audit trail inglés: «for the fulfillment of» como reflejo más directo de εἰς τελείωσιν. La versión española conserva esa decisión con «para el cumplimiento de». También se mantuvo la nota sobre la ambigüedad de καθὼς ἐλάλησαν, ya que el griego es menos explícito que el sentido narrativo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología del proyecto no aparece aquí porque el versículo no contiene el nombre divino.
  - Se prefirió «Ordenen»/«ordenaron» para mantener el campo semántico de mandato del original.
  - «Puerta de la ciudad» conserva la estructura genitiva del griego y evita una paráfrasis excesiva.
  - Se mantuvo «cumplimiento» para τελείωσις, en línea con el audit trail inglés y con un registro bíblico natural.
  - La nota [a] se ancla solo en la frase con ambigüedad real del griego; no se añadieron notas innecesarias.
