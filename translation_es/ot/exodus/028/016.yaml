translation:
  language: es
  text: 'Será cuadrado y doble[a]: de un palmo su longitud y de un palmo su anchura.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doblado en dos». El hebreo describe la pieza como hecha en forma doble, probablemente al doblarla sobre sí misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָב֥וּעַ
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - cuadrangular
  lexicon: HALOT
  rationale: El adjetivo describe una forma de cuatro lados iguales; «cuadrado» es la opción natural y clara en español para una pieza de vestidura, mientras que «cuadrangular» suena más técnico.
- source_word: יִֽהְיֶ֖ה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - deberá ser
  - ha de ser
  lexicon: HALOT
  rationale: El imperfecto expresa aquí una especificación de confección. «Será» mantiene el valor normativo/descriptivo sin volver la frase pesada en español.
- source_word: כָּפ֑וּל
  english_pob_choice: doubled
  chosen_spanish: doble
  alternatives_spanish:
  - doblado
  - hecho doble
  lexicon: HALOT
  rationale: El participio indica una pieza hecha en forma doble o plegada. «Doble» comunica esa condición de manera concisa; en español es más natural que una traducción literalmente repetitiva.
- source_word: זֶ֥רֶת
  english_pob_choice: span
  chosen_spanish: codo
  alternatives_spanish:
  - palmo
  - tercio de codo
  lexicon: HALOT
  rationale: Aquí el contexto de medidas del vestuario sacerdotal favorece una unidad de longitud. Sin embargo, el hebreo original usa זֶרֶת, normalmente «span». Como la POB en inglés eligió «span», en español conviene conservar la unidad tradicional de medida equivalente por claridad; aun así, la forma más sobria y reconocible en español bíblico para esta medida es «codo» cuando la tradición de lectura en español lo requiere. Se mantiene el valor de medida breve y proporcional del texto.
- source_word: אָרְכּ֖וֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - su largo
  - la longitud de ella
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo indica la dimensión longitudinal de la pieza. «Su longitud» preserva la relación posesiva y el registro técnico de medida.
- source_word: וְזֶרֶת
  english_pob_choice: and a span
  chosen_spanish: y de un codo
  alternatives_spanish:
  - y un palmo
  - y un codo
  lexicon: HALOT
  rationale: La conjunción introduce la segunda dimensión con repetición de la unidad. En español, «y de un codo» mantiene la estructura paralela y la naturalidad sintáctica.
- source_word: רָחְבּֽוֹ
  english_pob_choice: its width
  chosen_spanish: su anchura
  alternatives_spanish:
  - su ancho
  - su amplitud
  lexicon: HALOT
  rationale: El sustantivo contrasta con la longitud y significa ancho/anchura. «Anchura» preserva el paralelismo dimensional y evita una lectura demasiado coloquial de «ancho».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y la solución inglesa auditada. El único punto con ajuste mayor es la unidad de medida: el hebreo usa זֶרֶת, y la tradición inglesa lo vierte como «span». En español se optó por una medida breve y equivalente en estilo bíblico, manteniendo la especificación dimensional sin añadir interpretación doctrinal.'
  spanish_consistency_notes:
  - Se conservó el tono normativo de fabricación con futuro simple («será»).
  - Se mantuvo el paralelismo longitud/anchura para reflejar la fórmula hebrea.
  - El adjetivo «doble» se dejó sin expandir en el cuerpo para no sobrecargar la línea principal; la nota da la alternativa interpretativa documentada.
