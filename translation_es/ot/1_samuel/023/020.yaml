translation:
  language: es
  text: Ahora pues[a], oh rey, según todo el deseo de tu alma, a descender[b], desciende; y a nosotros nos toca entregarlo en la mano del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el deseo de tu alma», un modismo que expresa un deseo profundo o un fuerte anhelo.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite el verbo «descender» (infinitivo + imperativo) para dar énfasis: «a descender, desciende».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La partícula abre un giro discursivo inmediato y una apelación. «Ahora pues» conserva la transición y el matiz exhortativo de forma natural en español.
- source_word: לְכָל אַוַּת נַפְשְׁךָ
  english_pob_choice: according to all the desire of your soul
  chosen_spanish: según todo el deseo de tu alma
  alternatives_spanish:
  - con todo el deseo de tu alma
  - conforme a todo el deseo de tu alma
  - según todo lo que desea tu alma
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea del «deseo de tu alma» y reproduce el valor de conformidad del segmento preposicional sin suavizarlo en exceso.
- source_word: הַמֶּלֶךְ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: HALOT
  rationale: En vocativo español, «oh rey» es una manera clara y digna de conservar el valor de llamada directa que en hebreo lleva el artículo.
- source_word: לָרֶדֶת רֵד
  english_pob_choice: come down ... to come down
  chosen_spanish: desciende ... desciende
  alternatives_spanish:
  - baja ... baja
  - desciende ... a descender
  lexicon: HALOT
  rationale: La repetición del verbo expresa énfasis. «Desciende» conserva mejor el registro narrativo y la fuerza del paralelismo que una simplificación a un solo imperativo.
- source_word: וְלָנוּ
  english_pob_choice: and it is for us
  chosen_spanish: y a nosotros nos toca
  alternatives_spanish:
  - y para nosotros es
  - y nos corresponde
  lexicon: HALOT
  rationale: El prefijo con pronombre señala responsabilidad o tarea asignada. «Nos toca» comunica esa idea en español con naturalidad, sin perder el sentido de incumbencia.
- source_word: הַסְגִּירוֹ
  english_pob_choice: to hand him over
  chosen_spanish: entregarlo
  alternatives_spanish:
  - ponerlo en manos de
  - someterlo
  lexicon: HALOT
  rationale: El hifil de סגר aquí significa poner a alguien en poder de otro. «Entregarlo» es la opción más directa y fiel para este contexto hostil.
- source_word: בְּיַד הַמֶּלֶךְ
  english_pob_choice: into the king’s hand
  chosen_spanish: en mano del rey
  alternatives_spanish:
  - en la mano del rey
  - en manos del rey
  - al poder del rey
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de «mano» como idiomático para poder/posesión, evitando sustituirlo por una paráfrasis que borre la imagen bíblica.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios relevantes en la revisión más reciente; la versión permanece estable. Se mantuvo la repetición verbal y la imagen de «alma» y «mano» por fidelidad al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se conserva el hebraísmo «mano del rey» porque el español lo entiende y preserva la metáfora de poder.
  - «Desciende» se mantiene en ambos lugares para reflejar la repetición enfática del original.
