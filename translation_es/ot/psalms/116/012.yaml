translation:
  language: es
  text: ¿Qué devolveré a Yahvé por todos sus beneficios para mí?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué devolveré a Yahvé por todos sus tratos conmigo?». El hebreo puede llevar el sentido de retribución o de trato bondadoso; la redacción principal usa «beneficios» porque el contexto es de acción de gracias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cómo?
  lexicon: HALOT
  rationale: La partícula interrogativa introduce una pregunta directa; en español, «¿Qué» reproduce con naturalidad la forma y la función del hebreo. «¿Cómo?» sería posible en algunos contextos, pero aquí no refleja tan bien el objeto de la devolución implícita.
- source_word: אָשִׁיב
  english_pob_choice: shall I return
  chosen_spanish: devolveré
  alternatives_spanish:
  - repagaré
  - retornaré
  lexicon: HALOT
  rationale: El hiphil de שוב puede expresar «hacer volver» o «devolver». En este contexto de respuesta agradecida, «devolveré» conserva la idea concreta de correspondencia sin cargar el verbo con un matiz mercantil excesivo. «Repagaré» queda como alternativa, pero suena más transaccional que el hebreo en este versículo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: «Yahvé». La preposición ל se vierte con «a» en español, que expresa mejor el destinatario de la acción que «para» en una pregunta verbal como esta.'
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: El cuantificador modifica la expresión siguiente y en español concordar en plural con «beneficios» da una frase fluida y fiel al énfasis de totalidad.
- source_word: תַּגְמוּלֹהִי
  english_pob_choice: his benefits
  chosen_spanish: sus beneficios
  alternatives_spanish:
  - sus recompensas
  - sus tratos
  lexicon: HALOT
  rationale: El sustantivo puede abarcar compensación, retribución o beneficio; en este contexto de acción de gracias, «beneficios» comunica adecuadamente el sentido positivo que la POB inglesa eligió para el texto principal. «Recompensas» o «tratos» quedan como alternativas, pero pueden sonar más rígidas o ambiguas en español.
- source_word: עָלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - sobre mí
  - para mí
  lexicon: HALOT
  rationale: La preposición על aquí expresa la dirección de lo que Yahvé ha hecho respecto del salmista. «Hacia mí» preserva esa orientación relacional sin perder naturalidad en español; «sobre mí» sería más literal, pero menos idiomático en este contexto.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La tradición POB documenta la restitución del nombre divino en lugar del sustituto litúrgico. En español, «Yahvé» mantiene esa decisión y es la forma preferida para la publicación del texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תַּגְמוּלֹהִי en un salmo de acción de gracias
  english_pob_reading: his benefits to me
  chosen_spanish_reading: sus beneficios hacia mí
  alternative_spanish_readings:
  - sus recompensas hacia mí
  - sus tratos hacia mí
  rationale: La POB inglesa eligió «benefits» porque el contexto es de gratitud; en español, «beneficios» conserva esa lectura positiva y evita un matiz demasiado comercial que tendría «recompensas». La preposición «hacia» refleja mejor la relación dinámica del hebreo que una formulación puramente estática.
  doctrine_reference: Lexical decision documented from source context and English audit trail
translation_notes:
  revision_awareness: 'El pasaje concuerda con la revisión final del contexto inglés: no se requieren cambios adicionales; se mantiene la preferencia por un término positivo en el sustantivo principal y por la restitución del nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - «Beneficios» mantiene el tono de gratitud del salmo y evita un matiz de intercambio contractual.
  - La pregunta se formula en primera persona singular con futuro simple, que en español suena natural y corresponde al valor volitivo/predictivo del hebreo.
