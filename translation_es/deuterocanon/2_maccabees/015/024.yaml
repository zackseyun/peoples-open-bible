translation:
  language: es
  text: Que por la grandeza de tu brazo queden aterrados[a][b] los que vienen contra tu pueblo santo con blasfemia. Y así terminó en estos términos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean sobrecogidos de terror» o «queden consternados»; el verbo griego expresa quedar heridos de miedo o consternación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la grandeza de tu brazo», imagen bíblica del poder de Dios en acción.
    reason: cultural_note
  - marker: c
    text: O «Y así concluyó de esta manera»; el griego remite a las palabras que acaba de pronunciar.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγέθει
  english_pob_choice: by the greatness
  chosen_spanish: por la grandeza
  alternatives_spanish:
  - con la grandeza
  - a causa de la grandeza
  lexicon: LSJ
  rationale: El dativo expresa medio o referencia causal; «por la grandeza» transmite de modo natural en español la fuerza instrumental/causal sin perder la imagen.
- source_word: βραχίονός
  english_pob_choice: of your arm
  chosen_spanish: tu brazo
  alternatives_spanish:
  - tu brazo poderoso
  - tu brazo fuerte
  lexicon: LSJ
  rationale: Se conserva la imagen corporal literal de βραχίων como «brazo», que en la Biblia funciona como metáfora de poder divino; no se amplía interpretativamente en el texto principal.
- source_word: καταπλαγήτωσαν
  english_pob_choice: be struck with terror
  chosen_spanish: sean llenos de terror
  alternatives_spanish:
  - sean aterrados
  - queden aterrados
  - sean consternados
  lexicon: LSJ
  rationale: El verbo pasivo imperativo pide que sean sobrecogidos por miedo o consternación. «Sean llenos de terror» preserva el efecto intenso y el matiz pasivo en español con naturalidad litúrgica.
- source_word: οἱ μετὰ βλασφημίας παραγινόμενοι
  english_pob_choice: those who come against ... with blasphemy
  chosen_spanish: los que vienen contra ... con blasfemia
  alternatives_spanish:
  - los que se acercan con blasfemia
  - los que avanzan en blasfemia
  lexicon: LSJ
  rationale: παραγίνομαι aquí indica venir/aproximarse con intención hostil. «Vienen contra» mantiene el movimiento hostil y «con blasfemia» conserva el adverbial de modo.
- source_word: ἐπὶ τὸν ἅγιον σου λαόν
  english_pob_choice: against your holy people
  chosen_spanish: contra tu pueblo santo
  alternatives_spanish:
  - sobre tu pueblo santo
  - a tu pueblo santo
  lexicon: LSJ
  rationale: Con ἐπί + acusativo en contexto hostil, «contra» es la equivalencia más natural y precisa. «Pueblo santo» preserva ἅγιον ... λαόν sin añadir terminología ajena al griego.
- source_word: καὶ οὕτως μὲν ἐν τούτοις ἔληξεν
  english_pob_choice: And thus he ended in these words
  chosen_spanish: Y así terminó con estas palabras
  alternatives_spanish:
  - Y así concluyó en estas palabras
  - Y de ese modo terminó en estas palabras
  lexicon: LSJ
  rationale: ἔληξεν significa terminar/concluir; ἐν τούτοις remite a lo dicho. «Con estas palabras» es una formulación española natural que conserva la referencia discursiva, aunque la preposición difiere levemente del griego.
theological_decisions:
- issue: La imagen bíblica del brazo de Dios
  english_pob_reading: Retain the concrete metaphor 'your arm' rather than interpret it as 'power' in the main text.
  chosen_spanish_reading: Conservar «tu brazo» en vez de explicitar «tu poder».
  alternative_spanish_readings:
  - tu poder
  - tu brazo poderoso
  - tu brazo fuerte
  rationale: La imagen del brazo es una metáfora bíblica reconocible del actuar poderoso de Dios. Mantenerla en español preserva la resonancia intertextual y evita aplanar el lenguaje del original.
  doctrine_reference: Principio de primacía del idioma original y conservación de metáforas bíblicas auditablemente trazables.
- issue: Alcance de ἐπί con acusativo en un contexto de hostilidad
  english_pob_reading: those who come against your holy people
  chosen_spanish_reading: los que vienen contra tu pueblo santo
  alternative_spanish_readings:
  - los que vienen sobre tu pueblo santo
  - los que se acercan a tu pueblo santo
  rationale: El contexto muestra aproximación hostil, no mera dirección espacial. «Contra» hace explícita esa hostilidad que el griego sugiere por el uso de ἐπί con acusativo.
  doctrine_reference: Lectura contextual del griego koiné en contexto de conflicto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que corrigió la clausula final para reflejar más de cerca ἐν τούτοις; en español se optó por una formulación natural («con estas palabras») que conserva la referencia a lo dicho sin introducir calco innecesario. También se preservó la metáfora concreta de «brazo» en lugar de reemplazarla por una abstracción como «poder».
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento reverente de segunda persona singular para Dios: «tu».'
  - «Pueblo santo» conserva la estructura del griego sin sustituirla por terminología eclesiástica más técnica.
  - Se evita «SEÑOR» porque el texto griego no contiene κύριος en esta línea; el referente es Dios por el contexto de la oración.
  - La frase final se formula de modo idiomático en español, pero las notas preservan la alternativa más literal vinculada al griego.
