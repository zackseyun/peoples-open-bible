translation:
  language: es
  text: 'Así que Abraham escuchó a Efrón, y Abraham pesó para Efrón la plata que había dicho en presencia de los hijos de Het[a]: cuatrocientos siclos de plata, de curso comercial[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hititas»; literalmente, «los hijos de Het».
    reason: lexical_alternative
  - marker: b
    text: O «aceptable para el comerciante» o «según el peso corriente del comerciante».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע אֶל
  english_pob_choice: listened to
  chosen_spanish: escuchó a
  alternatives_spanish:
  - oyó a
  - atendió a
  lexicon: HALOT
  rationale: El hebreo שׁמע con אֶל en este contexto transaccional expresa prestar atención/aceptar lo dicho. «Escuchó a» conserva la relación personal y la idea de atender lo propuesto sin añadir explícitamente la noción de acuerdo.
- source_word: וַיִּשְׁקֹל
  english_pob_choice: weighed out
  chosen_spanish: pesó para
  alternatives_spanish:
  - pesó
  - pagó
  lexicon: HALOT
  rationale: El verbo denota pesar materialmente el pago. «Pesó para» conserva el gesto concreto de la transacción y el destinatario, más fielmente que «pagó».
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata (como dinero)
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente «plata»; aquí se trata de plata usada como pago. Mantener «plata» conserva la especificidad material e histórica.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que había dicho
  - que había expresado
  lexicon: HALOT
  rationale: El verbo es literalmente «hablar». En el contexto de negociación, la frase se refiere a la suma que Ephrón había fijado verbalmente; «había hablado» sigue de cerca el hebreo sin convertirlo en interpretación excesiva.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a oídos de
  - en el oído de
  lexicon: HALOT
  rationale: La expresión hebrea literal es «en los oídos de». En español, «en presencia de» comunica con naturalidad el carácter público y con testigos del anuncio; se prefiere como equivalente idiomático sobrio.
- source_word: בְנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Heth
  alternatives_spanish:
  - los hititas
  - los descendientes de Heth
  lexicon: HALOT
  rationale: Se conserva la forma literal genealógica del hebreo, tal como hace el POB inglés. «Los hititas» queda como alternativa interpretativa conocida, pero no se impone en el texto principal.
- source_word: אַרְבַּע מֵאוֹת שֶׁקֶל כֶּסֶף
  english_pob_choice: four hundred shekels of silver
  chosen_spanish: cuatrocientos siclos de plata
  alternatives_spanish:
  - cuatrocientos siclos de dinero
  - cuatrocientos shekels de plata
  lexicon: HALOT
  rationale: La construcción de peso y material se traduce de manera directa y clara. «Siclos» conserva la unidad monetaria antigua, y «plata» preserva el material del pago.
- source_word: עֹבֵר לַסֹּחֵר
  english_pob_choice: current with the merchant
  chosen_spanish: corriente con el comerciante
  alternatives_spanish:
  - aceptable para el comerciante
  - según el peso corriente del comerciante
  - de curso comercial
  lexicon: HALOT
  rationale: La frase es idiomática y probablemente alude a plata de peso/curso estándar en el comercio. «Corriente con el comerciante» mantiene el giro tradicional del inglés POB y deja abierta la posibilidad de estándar mercantil sin resolverla excesivamente.
translation_notes:
  revision_awareness: La versión inglesa revisó «named» por «spoken» para ajustar con mayor cercanía el verbo hebreo דִּבֶּר. La redacción española refleja esa precisión con «había hablado», sin perder naturalidad. También se mantuvo la expresión comercial idiomática de עֹבֵר לַסֹּחֵר mediante una forma clara y publicable, y se anclaron las notas al texto para evitar footnotes huérfanas.
  spanish_consistency_notes:
  - Se preserva la fórmula genealógica «los hijos de Heth» en el texto principal, siguiendo la literalidad del hebreo y la línea auditada del POB inglés.
  - «Plata» se mantiene como traducción de כֶּסֶף para conservar el matiz material del pago, en vez de generalizar a «dinero».
  - La expresión final se deja idiomática pero sobria, reconociendo su ambigüedad comercial sin sobreinterpretarla.
