translation:
  language: es
  text: Serán exaltados por poco tiempo, y luego ya no estarán[a]; serán abatidos; como todos, serán recogidos[b], y como la cabeza de una espiga[c], serán cortados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no son más». El hebreo idiomático puede traducirse más literalmente de esta manera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán llevados». El verbo hebreo aquí es raro y su matiz exacto es debatido.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «como la cabeza de una espiga de grano».'
    reason: cultural_note
lexical_decisions:
- source_word: רֹמּוּ
  english_pob_choice: are exalted
  chosen_spanish: serán exaltados
  alternatives_spanish:
  - serán alzados
  - serán levantados
  lexicon: HALOT
  rationale: La idea de רום aquí es de ser elevado a una posición alta. «Serán exaltados» conserva ese matiz de elevación/encumbramiento y funciona bien en español bíblico sin perder naturalidad.
- source_word: מְּעַט
  english_pob_choice: a little while
  chosen_spanish: por un poco
  alternatives_spanish:
  - por breve tiempo
  - por un momento
  lexicon: HALOT
  rationale: Aunque literalmente significa «un poco», en el contexto del contraste con la desaparición inmediata funciona temporalmente. «Por un poco» preserva la brevedad sin forzar una explicación interpretativa.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and then they are gone
  chosen_spanish: y luego ya no estarán
  alternatives_spanish:
  - y luego no serán más
  - y luego no están
  lexicon: HALOT
  rationale: El hebreo expresa ausencia o desaparición. En español, la formulación plural «ya no estarán» comunica de manera natural el sentido idiomático sin ocultar la fuerza de cesación.
- source_word: וְהֻמְּכ֗וּ
  english_pob_choice: they are brought low
  chosen_spanish: serán abatidos
  alternatives_spanish:
  - serán humillados
  - serán humillados y rebajados
  lexicon: HALOT
  rationale: La raíz indica ser rebajado o reducido desde una altura. «Abatidos» reproduce bien el movimiento descendente y la inversión de estado tras la exaltación.
- source_word: כַּכֹּל
  english_pob_choice: like all others
  chosen_spanish: como todos
  alternatives_spanish:
  - como todos los demás
  - como cualquiera
  lexicon: HALOT
  rationale: La comparación indica que comparten el destino común de la humanidad. En español, «como todos» mantiene la generalidad sin añadir una palabra innecesaria.
- source_word: יִקָּפְצוּן
  english_pob_choice: are gathered up
  chosen_spanish: serán recogidos
  alternatives_spanish:
  - serán reunidos
  - serán llevados
  lexicon: HALOT
  rationale: El verbo niphal es raro y su matiz es debatido. «Serán recogidos» conserva la imagen de ser juntados o retirados sin decidir demasiado entre las posibles lecturas.
- source_word: וּכְרֹאשׁ שִׁבֹּלֶת
  english_pob_choice: like the head of a stalk of grain
  chosen_spanish: como la cabeza de una espiga
  alternatives_spanish:
  - como la punta de una espiga
  - como la cabeza de un tallo de grano
  lexicon: HALOT
  rationale: שִׁבֹּלֶת alude a una espiga/entrenudo de grano; רֹאשׁ señala su cabeza o punta. «Cabeza de una espiga» conserva el símil agrícola de modo claro y fiel.
- source_word: יִמָּלוּ
  english_pob_choice: are cut off
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán segados
  - serán cortados de raíz
  lexicon: HALOT
  rationale: En el contexto de cosecha, el verbo apunta a cortar la parte superior de la espiga. «Serán cortados» mantiene la fuerza del final súbito y el trasfondo agrícola.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene la secuencia exaltación breve → desaparición/abatimiento → reunión/retirada → metáfora agrícola de corte. La principal decisión española es conservar el valor idiomático de וְאֵינֶנּוּ con una construcción natural («ya no estarán») y mantener la ambigüedad del verbo raro יִקָּפְצוּן con «serán recogidos».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el Tetragrámaton.
  - Se conserva el paralelismo poético con verbos en futuro pasivo perifrástico, adecuado para el tono sapiencial.
  - «Espiga» comunica mejor que un calco literal de «oreja» en español bíblico moderno, sin perder la imagen agrícola.
