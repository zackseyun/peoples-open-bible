revisions:
- from: Entonces el rey de Sodoma salió a recibirlo después de su regreso de haber derrotado a Kedorlaomer y a los reyes que estaban con él, al valle de Shaveh[a] (es decir[b], el valle del rey).
  to: Entonces el rey de Sodoma salió a recibirlo después de regresar de derrotar a Kedorlaomer[a] y a los reyes que estaban con él, al valle de Shaveh[b] (es decir, el valle del rey).
  rationale: 'Se mejoró la naturalidad del español con una reformulación mínima de la frase temporal y se ajustaron las notas para alinearlas con el expediente del POB en inglés: se recuperó la nota léxica sobre «Kedorlaomer» y se eliminó la nota innecesaria sobre «es decir».'
