translation:
  language: es
  text: Habla a los hijos de Israel[a], para que se vuelvan y acampen frente a Pi-hahirot, entre Migdol y el mar. Delante de Baal-Zefón, frente a ese lugar[c][b], acamparán junto al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Pi-hahirot, Migdol y Baal-Zefón son nombres de lugar y por eso se transliteran.
    reason: cultural_note
  - marker: c
    text: O «opuesto a ese lugar». El pronombre probablemente se refiere a Baal-Zefón.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Conservo la expresión hebrea familiar y transparente. «Los hijos de Israel» sigue de cerca el original sin imponer una equivalencia más interpretativa como «los israelitas».
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Diles
  lexicon: HALOT
  rationale: Es un imperativo directo dirigido a Moisés. «Habla» reproduce bien la orden breve y natural en español.
- source_word: וְיָשֻׁבוּ
  english_pob_choice: that they turn back
  chosen_spanish: para que se vuelvan
  alternatives_spanish:
  - y se volverán
  - y vuelvan atrás
  - para que regresen
  lexicon: HALOT
  rationale: La construcción expresa una instrucción subordinada al mandato principal. «Para que se vuelvan» conserva el valor de retorno/cambio de dirección sin perder naturalidad.
- source_word: וְיַחֲנוּ
  english_pob_choice: and camp
  chosen_spanish: y acampen
  alternatives_spanish:
  - y acampen en tienda
  - y hagan campamento
  - y acampen allí
  lexicon: HALOT
  rationale: El verbo חנה aquí designa establecer campamento. «Acampen» es fiel y claro en español bíblico moderno.
- source_word: פִּי הַחִירֹת
  english_pob_choice: Pi-hahiroth
  chosen_spanish: Pi-hahirot
  alternatives_spanish:
  - Pi-hahiroth
  - Pí-hajirot
  lexicon: HALOT
  rationale: Es un topónimo que debe transliterarse. Uso una forma española consistente y legible, sin traducir etimológicamente el nombre.
- source_word: מִגְדֹּל
  english_pob_choice: Migdol
  chosen_spanish: Migdol
  alternatives_spanish:
  - Migdal
  - Migdól
  lexicon: HALOT
  rationale: Se preserva el nombre propio como topónimo transliterado. No se traduce por «torre» para no perder la forma fijada del lugar.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - la mar
  lexicon: HALOT
  rationale: Aquí el referente natural en español es «el mar». Mantiene la relación espacial y evita una mayúscula interpretativa innecesaria.
- source_word: בַּעַל צְפֹן
  english_pob_choice: Baal-zephon
  chosen_spanish: Baal-Zefón
  alternatives_spanish:
  - Baal-zephon
  - Baal-Sefón
  lexicon: HALOT
  rationale: Topónimo transliterado. «Zefón» refleja la adaptación española del nombre sin alterar su identidad propia.
- source_word: נִכְחוֹ
  english_pob_choice: opposite it
  chosen_spanish: enfrente de él
  alternatives_spanish:
  - frente a él
  - opuesto a él
  - mirando hacia él
  lexicon: HALOT
  rationale: La partícula indica posición opuesta o frente a. Opto por «enfrente de él» para conservar la relación espacial; el antecedente más probable es Baal-Zefón, tratado gramaticalmente como masculino en español por ser nombre propio.
- source_word: תַחֲנוּ
  english_pob_choice: you shall camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - acamparán ustedes
  - deberán acampar
  - acamparán junto a
  lexicon: HALOT
  rationale: El hebreo es una forma directiva en segunda persona plural. En español, el futuro con valor de mandato reproduce bien la fuerza instructiva en un registro bíblico sobrio.
- source_word: עַל הַיָּם
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - al lado del mar
  - cerca del mar
  - junto a la orilla del mar
  lexicon: HALOT
  rationale: עַל en este contexto locativo se expresa mejor como proximidad. «Junto al mar» conserva la idea de ubicación sin sobretraducirla.
translation_notes:
  revision_awareness: 'El texto inglés revisado sustituyó «so that» por «that» para reflejar de manera más directa la construcción imperativa hebrea. En español, esa directividad se refleja con «para que» sin añadir una paráfrasis más fuerte que la que el hebreo permite. También se mantuvo la secuencia espacial doble del versículo: primero el mandato de volver y acampar frente a Pi-hahirot, y luego la precisión de ubicarse frente a Baal-Zefón, junto al mar.'
  spanish_consistency_notes:
  - Se mantiene «Pi-hahirot» y «Baal-Zefón» como transliteraciones consistentes de topónimos.
  - Se usa «el mar» para הַיָּם en la primera cláusula y «junto al mar» al final, preservando el mismo referente espacial.
  - La forma de mandato se expresa con imperativo y subjuntivo exhortativo/futuro de valor directivo, acorde con el hebreo y con el tono de instrucción divina.
