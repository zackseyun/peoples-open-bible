translation:
  language: es
  text: Los bueyes salvajes[a] caerán con ellos, y los toros jóvenes con los poderosos[b]; su tierra será empapada con sangre, y su polvo será enriquecido con grasa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «órixes» para «bueyes salvajes»; el hebreo רְאֵמִים se refiere a un bovino silvestre poderoso, aunque la especie exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: «Los poderosos» puede referirse a guerreros poderosos o, en la imaginería poética, a toros fuertes; el hebreo permite una u otra matización, o ambas.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָרְדוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - descenderán
  - bajarán
  lexicon: HALOT
  rationale: En este contexto de juicio violento, 'caerán' comunica en español el sentido idiomático de ser derribados o abatidos, conservando la fuerza del hebreo sin volverlo mecánico.
- source_word: רְאֵמִים
  english_pob_choice: wild oxen
  chosen_spanish: animales salvajes
  alternatives_spanish:
  - bueyes salvajes
  - órix
  lexicon: HALOT
  rationale: La identidad exacta de רְאֵם es incierta. 'Animales salvajes' mantiene la referencia a una bestia poderosa sin imponer una especie específica que el hebreo no garantiza; en nota se preserva la alternativa zoológica.
- source_word: וּפָרִים
  english_pob_choice: young bulls
  chosen_spanish: los becerros
  alternatives_spanish:
  - toros jóvenes
  - toros
  lexicon: HALOT
  rationale: El hebreo puede referirse a toros jóvenes. 'Becerros' ofrece una imagen natural en español para un animal joven, aunque es algo más general; se conserva la idea de animales domésticos/gañanes en paralelo con la otra mitad del verso.
- source_word: אַבִּירִים
  english_pob_choice: the mighty ones
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los valientes
  - los hombres poderosos
  lexicon: HALOT
  rationale: '''Los poderosos'' mantiene la ambigüedad del hebreo, que puede aludir a personas de poder o, poéticamente, a animales fuertes. No se fuerza una lectura exclusivamente humana.'
- source_word: וְרִוְּתָה
  english_pob_choice: will be drenched
  chosen_spanish: será empapada
  alternatives_spanish:
  - será saturada
  - se inundará
  lexicon: HALOT
  rationale: El verbo expresa saturación. En español, 'será empapada' reproduce con naturalidad la imagen del terreno mojado por sangre, sin perder el carácter vívido del hebreo.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su suelo
  lexicon: HALOT
  rationale: '''Tierra'' es el equivalente más natural y directo de ארץ en este contexto territorial de juicio.'
- source_word: מִדָּם
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - de sangre
  lexicon: HALOT
  rationale: Aunque la preposición hebrea literalmente es 'de/desde', el español idiomático con un verbo de saturación usa 'con sangre'.
- source_word: וַעֲפָרָם
  english_pob_choice: their dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su tierra
  - su barro
  lexicon: HALOT
  rationale: '''Polvo'' preserva la imagen concreta y la resonancia bíblica de mortalidad y humillación.'
- source_word: מֵחֵלֶב
  english_pob_choice: with fat
  chosen_spanish: con sebo
  alternatives_spanish:
  - con grasa
  - con gordura
  lexicon: HALOT
  rationale: '''Sebo'' es una forma española más precisa y elevada para el fat sacrificial o de víctimas, manteniendo la connotación cultual y material del hebreo.'
- source_word: יְדֻשָּׁן
  english_pob_choice: made rich
  chosen_spanish: será enriquecido
  alternatives_spanish:
  - será robustecido
  - será saturado
  lexicon: HALOT
  rationale: Aplicado al polvo, el verbo sugiere que queda 'enriquecido' o cargado por el sebo; 'será enriquecido' conserva esa idea sin negar la metáfora agrícola/poética.
theological_decisions:
- issue: Tensión entre imágenes animales y humanas en el juicio
  english_pob_reading: Retain the animal terms in the main text while allowing them to function as imagery for the downfall of the powerful in divine judgment.
  chosen_spanish_reading: Conservar la imaginería animal en la línea principal, pero dejando abierta su posible referencia a los poderosos humanos.
  alternative_spanish_readings:
  - Interpretar todos los términos animales sólo como animales literales
  - Interpretar todos los términos animales sólo como metáfora de gobernantes humanos
  rationale: Isaías 34 mezcla lenguaje de sacrificio y de batalla. La traducción española conserva esa tensión en vez de resolverla de antemano, para no borrar la doble posibilidad que permite el hebreo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del paquete fuente y del audit trail inglés. No hubo revisiones aplicadas en la última pasada; la propuesta actual mantiene la alta concordancia con la revisión aprobada y conserva la tensión interpretativa documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato; en este versículo no aparece explícitamente.
  - Se mantiene un registro poético y sobrio, evitando equivalencias tradicionales que oculten la fuerza de las imágenes.
  - Se preserva la ambigüedad de אַבִּירִים con «los poderosos», sin decidir entre lectura humana o animal.
  - Se opta por vocabulario natural en español («caerán», «empapada», «polvo») para que el verso sea publicable y fiel al hebreo.
  - La marca [r] en el texto indica una nota de estilo/identidad zoológica para la primera imagen animal.
