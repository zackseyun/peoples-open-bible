translation:
  language: es
  text: Cuando los hombres de la ciudad se levantaron de madrugada, he aquí que el altar de Baal había sido derribado, y la Asherá[a] que estaba sobre él había sido cortada, y el segundo toro había sido ofrecido sobre el altar que había sido construido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el poste de Asherá"; hebreo, "la Asherá".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  english_pob_choice: rose early
  chosen_spanish: se levantaron de madrugada
  alternatives_spanish:
  - se levantaron temprano
  - se levantaron muy temprano
  lexicon: HALOT
  rationale: La forma verbal expresa levantarse muy temprano; en español, 'de madrugada' conserva mejor la fuerza temporal y narratividad que un simple 'temprano'.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - la gente de la ciudad
  - los ciudadanos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hombres de la ciudad'; se mantiene el matiz masculino explícito, conforme al valor léxico del original.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: Aunque la frase básica es temporal, el contexto de levantarse temprano hace natural concentrar el sentido en 'de madrugada'.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: '''He aquí que'' preserva la sorpresa narrativa y el énfasis de descubrimiento del hebreo.'
- source_word: נֻתַּץ
  english_pob_choice: had been torn down
  chosen_spanish: había sido derribado
  alternatives_spanish:
  - había sido destruido
  - había sido demolido
  lexicon: HALOT
  rationale: Aplicado a un altar, 'derribado' comunica bien el acto de desmantelar o abatir la estructura sin exagerar más allá del verbo.
- source_word: מִזְבַּח הַבַּעַל
  english_pob_choice: the altar of Baal
  chosen_spanish: el altar de Baal
  alternatives_spanish:
  - el altar de Baal
  - el altar perteneciente a Baal
  lexicon: HALOT
  rationale: La relación constructa se rinde de forma directa y natural en español con 'de Baal'.
- source_word: הָאֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Asherá
  alternatives_spanish:
  - la Aserá
  - el poste sagrado
  lexicon: HALOT
  rationale: Se conserva el término técnico 'Asherá' para no imponer una glosa interpretativa como 'poste' en el texto principal, siguiendo la decisión de mantener el nombre cultual del hebreo.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that was on it
  chosen_spanish: que estaba sobre él
  alternatives_spanish:
  - que estaba encima de él
  - que estaba sobre eso
  lexicon: HALOT
  rationale: La revisión inglesa volvió a 'on it'; en español se refleja literalmente con 'sobre él', preservando la relación espacial más estrecha del hebreo.
- source_word: כֹּרָתָה
  english_pob_choice: had been cut down
  chosen_spanish: había sido cortada
  alternatives_spanish:
  - había sido talada
  - había sido abatida
  lexicon: HALOT
  rationale: El objeto cultual probablemente era de madera; 'cortada' mantiene la pasiva y la imagen de un objeto cortado hacia abajo sin añadir más especificación de la necesaria.
- source_word: הַפָּר הַשֵּׁנִי
  english_pob_choice: the second bull
  chosen_spanish: el segundo toro
  alternatives_spanish:
  - el segundo novillo
  - el segundo becerro
  lexicon: HALOT
  rationale: פָּר designa un toro; 'toro' es el equivalente directo y suficiente en español para el animal sacrificial.
- source_word: הֹעֲלָה
  english_pob_choice: had been offered up
  chosen_spanish: había sido ofrecido
  alternatives_spanish:
  - había sido presentado como ofrenda
  - había sido sacrificado
  lexicon: HALOT
  rationale: La pasiva hophal conserva la idea de haber sido llevado como ofrenda; en español, 'ofrecido' expresa el acto sacrificial sin añadir una interpretación más específica que el verbo por sí solo.
- source_word: הַמִּזְבֵּחַ הַבָּנוּי
  english_pob_choice: the altar that had been built
  chosen_spanish: el altar que había sido construido
  alternatives_spanish:
  - el altar construido
  - el altar ya construido
  lexicon: HALOT
  rationale: El participio pasivo se expresa naturalmente con una relativa en español; 'construido' es el equivalente sobrio y preciso.
theological_decisions:
- issue: Nombre cultual אֲשֵׁרָה
  english_pob_reading: the Asherah
  chosen_spanish_reading: la Asherá
  alternative_spanish_readings:
  - el poste sagrado
  - la Aserá
  rationale: La POB inglesa retiene 'Asherah' en el texto principal por la ambigüedad del término y para no cerrar prematuramente su referente. En español, 'Asherá' mantiene esa apertura; una glosa como 'poste sagrado' se deja como alternativa, no como sustituto del texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación espacial de אֲשֶׁר עָלָיו
  english_pob_reading: that was on it
  chosen_spanish_reading: que estaba sobre él
  alternative_spanish_readings:
  - que estaba encima de él
  - que estaba sobre eso
  rationale: La revisión del texto inglés prefirió la lectura más literal 'on it'. La traducción española sigue ese ajuste para no suavizar la preposición y conservar la tensión textual, aunque el objeto pueda ser cultual y su apoyo exacto no esté descrito.
  doctrine_reference: 'Translation philosophy: preserve source sense without wooden literalism'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que cambió 'beside it' a 'on it' para reflejar mejor אֲשֶׁר עָלָיו. Por eso la traducción española usa 'sobre él' y no una equivalencia interpretativa como 'junto a él'. También se mantuvo la decisión de conservar 'Asherá' en el texto principal, con nota alternativa para la glosa 'poste sagrado'.
  spanish_consistency_notes:
  - Se usa 'Asherá' con acento para adaptar la transliteración al español y distinguirla de formas sin acento.
  - 'Se mantiene el paralelismo verbal en pluscuamperfecto para reflejar la secuencia narrativa: había sido derribado / había sido cortada / había sido ofrecido.'
  - '''Toro'' traduce פָּר de manera directa y no se suaviza a ''novillo'', porque el término hebreo señala un animal vacuno masculino adulto.'
