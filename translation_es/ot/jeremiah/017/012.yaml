translation:
  language: es
  text: Un trono de gloria[a], exaltado desde el principio, es el lugar de nuestro santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un trono de gloria en lo alto, desde el principio, es el lugar de nuestro santuario», o quizá: «Oh trono de gloria, exaltado desde el principio, lugar de nuestro santuario». El hebreo es muy comprimido y permite más de una lectura sintáctica.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  lexicon: HALOT
  rationale: «Trono» preserva el valor real y teológico del sustantivo hebreo mejor que el más general «asiento».
- source_word: כָב֔וֹד
  english_pob_choice: of glory / glorious
  chosen_spanish: de gloria
  alternatives_spanish:
  - glorioso
  - de honor
  lexicon: HALOT
  rationale: La construcción nominal hebrea se refleja mejor con «de gloria», manteniendo el peso doxológico sin convertirla solo en adjetivo.
- source_word: מָר֖וֹם
  english_pob_choice: exalted
  chosen_spanish: exaltado
  alternatives_spanish:
  - alto
  - elevado
  lexicon: HALOT
  rationale: Aunque el término se relaciona con altura, aquí funciona predicativamente; «exaltado» comunica altura y majestad en español natural.
- source_word: מֵרִאשׁוֹן
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el primero
  - desde antiguo
  lexicon: HALOT
  rationale: Expresa bien la prioridad primordial o antigüedad indicada por el hebreo, con una fórmula idiomática y clara en español.
- source_word: מְקוֹם
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - morada
  lexicon: HALOT
  rationale: «Lugar» es la correspondencia más directa y natural para el sustantivo básico hebreo sin añadir interpretación.
- source_word: מִקְדָּשֵׁנוּ
  english_pob_choice: our sanctuary
  chosen_spanish: nuestro santuario
  alternatives_spanish:
  - nuestro lugar santo
  - nuestro santuario santo
  lexicon: HALOT
  rationale: «Santuario» preserva el sentido cultual del término y el posesivo de primera persona plural.
theological_decisions:
- issue: Relación sintáctica de las cláusulas sin verbo explícito
  english_pob_reading: The verse is rendered as a nominal statement identifying the glorious, exalted throne with 'the place of our sanctuary.'
  chosen_spanish_reading: 'Se presenta como una afirmación nominal: «Un trono de gloria, exaltado desde el principio, es el lugar de nuestro santuario».'
  alternative_spanish_readings:
  - 'Un trono de gloria, exaltado desde el principio: el lugar de nuestro santuario.'
  - Oh trono de gloria, exaltado desde el principio, lugar de nuestro santuario.
  rationale: El hebreo es muy comprimido y permite varias relaciones sintácticas. La versión elegida sigue una lectura comprensible y fiel, sin borrar la tensión de que el texto admite más de una constricción.
  doctrine_reference: Preservar la tensión teológica y sintáctica en vez de resolverla excesivamente
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «A glorious throne» en lugar de «A throne of glory» por naturalidad, sin perder el sentido del hebreo. En español se conservó la estructura nominal y la ambigüedad sintáctica documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otras entradas cuando aparezca el nombre divino; aquí no interviene.
  - «Santuario» se usa como término cultual directo, coherente con la terminología POB.
  - La puntuación refleja una cláusula nominal principal con una proposición copulativa explícita en español, necesaria para la legibilidad.
