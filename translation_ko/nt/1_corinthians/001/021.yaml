  text: ἐπειδὴ γὰρ ἐν τῇ σοφίᾳ τοῦ θεοῦ οὐκ ἔγνω ὁ κόσμος διὰ τῆς σοφίας τὸν θεόν, εὐδόκησεν ὁ θεὸς διὰ τῆς μωρίας τοῦ κηρύγματος σῶσαι τοὺς πιστεύοντας.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/021.yaml
  text: For since[a], in the wisdom of God, the world did not know God through wisdom[b], God was pleased through the foolishness of the proclamation to save those who believe.
  footnotes:
  - marker: a
    text: Or, “through the foolishness of preaching.”
    reason: alternative_reading
  - marker: b
    text: That is, what the world regards as foolish in the proclaimed message.
    reason: cultural_note
translation:
  language: ko
  text: 세상이 하나님의 지혜 안에서 자기 지혜로 하나님을 알지 못하였으므로, 하나님께서는 선포의 어리석음으로 믿는 자들을 구원하시기를 기뻐하셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
