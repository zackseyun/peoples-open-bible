review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del audit trail inglés: mantiene la dificultad de צַר מָעוֹן, conserva el sujeto implícito de ''hará bien a Israel'' y refleja el juicio sobre la casa de Elí. Sin embargo, dos puntos necesitan ajuste para mayor fidelidad y claridad: ''anciano'' puede sugerir oficio o estatus más que edad, y ''todos los días'' en español suena adverbial/repetitivo en vez de reproducir bien el hebraísmo final.'
  spanish_quality_summary: El texto es legible y de registro digno, pero 'no habrá anciano en tu casa todos los días' suena poco natural y ambiguo en español. 'Hombre viejo' tampoco sería ideal; 'ningún hombre llegará a viejo' o 'no habrá hombre viejo' comunica mejor la idea de edad. También conviene ajustar el cierre a 'jamás' o una formulación equivalente. Dado que el inglés POB evitó 'never', la mejor reparación española es una construcción natural que preserve el valor durativo sin sonar mecánica.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''Morada'' es aceptable para מָעוֹן, y la nota alternativa preserva la ambigüedad documentada. El punto léxico principal es זָקֵן: en este contexto es edad, no ''anciano'' como cargo; por ello conviene ''viejo'' dentro de una frase idiomática más natural en español.'
  issues:
  - severity: medium
    issue: '''anciano'' para זָקֵן puede sugerir oficio o dignidad más que edad'
    rationale: El audit trail inglés especifica que aquí se refiere a un hombre de edad avanzada, no a un elder. En español bíblico-eclesial, 'anciano' puede leerse como cargo o estatus.
  - severity: medium
    issue: La frase final 'no habrá anciano en tu casa todos los días' es poco natural y ambigua
    rationale: '''Todos los días'' en español normalmente modifica una acción repetida diaria, no un estado durativo de una línea familiar. Necesita una formulación española más idiomática que exprese que nadie en su casa llegará a la vejez.'
  revised_spanish_text: Y mirarás la aflicción[a] de la morada, en todo el bien que él hará a Israel, y en tu casa no habrá ningún hombre que llegue a viejo.
  revised_footnotes:
  - marker: a
    text: 'O: «un adversario en la morada», «aflicción en el santuario» o similar; la expresión hebrea es difícil.'
    reason: alternative_reading
  revision_rationale: 'Se mantiene la ambigüedad difícil de צַר מָעוֹן y el sujeto implícito de la cláusula sobre Israel. Se revisa la última cláusula para expresar con español natural el sentido de juicio durativo de זָקֵן + בְּבֵיתְךָ + כָּל הַיָּמִים, evitando que ''anciano'' suene a cargo y que ''todos los días'' produzca una lectura torpe o equívoca. La nueva redacción preserva el significado: nadie de tu casa llegará a la vejez.'
