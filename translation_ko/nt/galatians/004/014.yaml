  text: καὶ τὸν πειρασμὸν ⸀ὑμῶν ἐν τῇ σαρκί μου οὐκ ἐξουθενήσατε οὐδὲ ἐξεπτύσατε, ἀλλὰ ὡς ἄγγελον θεοῦ ἐδέξασθέ με, ὡς Χριστὸν Ἰησοῦν.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/014.yaml
  text: And though my bodily condition was a trial to you[a], you did not treat me with contempt or disgust; rather, you welcomed me as an angel of God[c][b], as Messiah Jesus.
  footnotes:
  - marker: a
    text: 'Or ''your trial in my flesh,'' reflecting the textual and syntactical difficulty of the phrase.'
    reason: alternative_reading
  - marker: b
    text: 'Literally ''you did not spit out''—an expression of revulsion or rejection.'
    reason: lexical_alternative
  - marker: c
    text: 'Greek ''Christ Jesus''; rendered ''Messiah Jesus'' here because Χριστός functions as a title.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내 육체에 있던 시험에도 불구하고[a], 여러분은 나를 멸시하지 않았고 침 뱉지도 않았습니다[b]. 도리어 하나님의 천사처럼, 메시아 예수처럼 나를 영접했습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내 육체에 있던 여러분의 시험」. 본문의 구문이 압축되어 두 풀이가 가능하다.
    reason: alternative_reading
  - marker: b
    text: 직역하면 「뱉어내지 않았다」. 혐오·거부의 표현.
    reason: lexical_alternative
