    issue: «Se encogen delante de ti» no refleja bien el matiz léxico de יְכַחֲשׁוּ לְךָ.
    rationale: El verbo hebreo en piel con ל sugiere sumisión forzada, fingida o renuente. «Se encogen» puede indicar solo temor o retraimiento corporal, y pierde el componente de sometimiento que el expediente inglés considera central.
  - severity: low
    issue: La nota [a] sobre «a Dios» es innecesaria.
    rationale: No preserva una alternativa significativa ni resuelve una ambigüedad; solo dice que el hebreo literalmente dice «a Dios», que ya está en el texto principal.
  - severity: low
    issue: La preposición en la nota [b] puede mejorarse en español.
    rationale: «Ceden de mala gana a ti» suena menos natural que «ceden de mala gana ante ti» o «se someten de mala gana ante ti».
