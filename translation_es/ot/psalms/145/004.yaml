translation:
  language: es
  text: Una generación alabará tus obras a otra[a], y declararán tus hechos poderosos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Generación tras generación alabará tus obras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus hechos de poder» o «tus actos poderosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר לְדוֹר
  english_pob_choice: Generation to generation
  chosen_spanish: De generación en generación
  alternatives_spanish:
  - Generación tras generación
  - De una generación a otra
  lexicon: HALOT
  rationale: La repetición idiomática de «generación» se conserva en español con la preposición «de... a...», que transmite el movimiento iterativo del hebreo sin expandir el texto.
- source_word: יְשַׁבַּח
  english_pob_choice: will praise
  chosen_spanish: proclamará
  alternatives_spanish:
  - alabará
  - pregonará
  lexicon: HALOT
  rationale: El verbo piel de שׁבח expresa alabanza laudatoria. En español, «proclamará» mantiene el tono elevado y el paralelismo con «anunciará», aunque «alabará» sigue siendo una alternativa posible más literal.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - lo que has hecho
  lexicon: HALOT
  rationale: «Obras» es natural en español bíblico contemporáneo y conserva el sustantivo plural para las acciones de Dios, igual que «works» en la tradición auditada inglesa.
- source_word: וּגְבוּרֹתֶיךָ
  english_pob_choice: your mighty acts
  chosen_spanish: tus poderosos hechos
  alternatives_spanish:
  - tus hechos poderosos
  - tus actos de poder
  - tus poderosas obras
  lexicon: HALOT
  rationale: גְּבוּרוֹת comunica fuerza, poder y hazañas. «Poderosos hechos» preserva el matiz de acción poderosa sin forzar una frase más técnica; «actos de poder» también sería posible.
- source_word: יַגִּידוּ
  english_pob_choice: they will declare
  chosen_spanish: anunciará
  alternatives_spanish:
  - anunciarán
  - declarará
  - proclamará
  lexicon: HALOT
  rationale: 'El hebreo es plural («ellos»), y el sujeto implícito es la sucesión de generaciones. En español, la forma natural del verso es singular distributivo: «proclamará/anunciará» con el sujeto colectivo implícito, manteniendo el sentido de transmisión continua.'
translation_notes:
  revision_awareness: La versión inglesa revisada quitó la repetición de «they» para mayor naturalidad formal. En español se preserva la misma economía sintáctica con un sujeto colectivo implícito, evitando añadir pronombres innecesarios y manteniendo el paralelismo poético del hebreo.
  spanish_consistency_notes:
  - 'Se tradujo el binomio poético con dos verbos coordinados: «proclamará» / «anunciará».'
  - Se mantuvo el orden hebreo general de acción de generación en generación, seguido de los objetos de la alabanza.
  - No se empleó «SEÑOR» ni «Cristo» porque el verso no contiene esos términos.
  - La puntuación y el registro buscan ser aptos para lectura pública e iglesia, sin arcaísmos innecesarios.
