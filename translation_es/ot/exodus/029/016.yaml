translation:
  language: es
  text: Y sacrificarás el carnero, y tomarás su sangre y la salpicarás contra el altar, todo alrededor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la rociarás sobre el altar, todo alrededor». El verbo hebreo puede denotar una aplicación ritual más enérgica que el español ordinario «rociar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַטְתָּ
  english_pob_choice: shall slaughter
  chosen_spanish: sacrificarás
  alternatives_spanish:
  - degollarás
  - matarás
  - sacrificarás como ofrenda
  lexicon: HALOT
  rationale: En contexto sacrificial, שָׁחַט no es matar en general, sino dar muerte ritual al animal para el sacrificio. En español, «sacrificarás» comunica mejor el acto cultual que «matarás», y evita la aspereza de «degollarás» en una instrucción litúrgica.
- source_word: הָאָיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  - el macho cabrío
  lexicon: HALOT
  rationale: אָיִל designa específicamente un carnero. «Carnero» es el equivalente natural y preciso en español.
- source_word: לָקַחְתָּ
  english_pob_choice: take
  chosen_spanish: tomarás
  alternatives_spanish:
  - recogerás
  - llevarás
  - tomarás para
  lexicon: HALOT
  rationale: El verbo hebreo es el común «tomar»; en el marco ritual, indica que se toma la sangre para su uso litúrgico. «Tomarás» mantiene esa sencillez y cercanía al original.
- source_word: דָּמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - la sangre de eso
  lexicon: HALOT
  rationale: El sufijo remite al carnero, pero en español resulta natural usar «su sangre». El contexto sacrificial hace innecesario forzar el pronombre posesivo «de él».
- source_word: זָרַקְתָּ
  english_pob_choice: splash it
  chosen_spanish: la rociarás
  alternatives_spanish:
  - la asperjarás
  - la esparcirás
  - la salpicarás
  - la derramarás
  lexicon: HALOT
  rationale: En este contexto sacerdotal, זָרַק describe la aplicación ritual de la sangre con un gesto más fuerte que «rociar» en sentido cotidiano. Sin embargo, en español «rociar» sigue siendo una forma litúrgica clara y ampliamente inteligible; se evita «sprinklear»/calco y se preserva la acción ritual. La nota mantiene abierta la alternativa más enérgica que el hebreo puede sugerir.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - contra el altar
  - en el altar
  - sobre el altar, contra sus lados
  lexicon: HALOT
  rationale: El inglés POB opta por «against» para reflejar la aplicación de la sangre al altar. En español, «sobre el altar» es la formulación más natural y puede abarcar esa aplicación ritual sin sonar forzada; el matiz de contacto/impacto queda preservado por el verbo «rociar».
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: סָבִיב indica la circunferencia completa. «Todo alrededor» expresa con claridad que la aplicación ocurre en toda la periferia del altar.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura final del POB inglés, pero adapta el verbo de aplicación de la sangre a un español natural y litúrgicamente claro. Se mantuvo la tensión léxica del hebreo זָרַק entre una acción de aspersión y una aplicación más vigorosa, reflejada en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió «carnero» para אָיִל por precisión zoológica y claridad pública.
  - «Rociar» se emplea como equivalente funcional de la acción ritual, con nota que preserva la alternativa más fuerte.
  - La puntuación y el orden sintáctico siguen el español bíblico moderno, sin calcos innecesarios.
