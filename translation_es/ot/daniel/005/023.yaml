revisions:
- from: Pero te has exaltado contra el Señor del cielo, y los vasos de su casa fueron traídos delante de ti; y tú y tus nobles, tus esposas y tus concubinas bebisteis vino con ellos. Y has alabado a los dioses de plata y de oro, de bronce, de hierro, de madera y de piedra, que no ven ni oyen ni saben; pero al Dios en cuya mano está tu aliento, y cuyos son todos tus caminos, no has honrado.
  to: Pero te has exaltado contra el Señor del cielo, y los vasos de su casa fueron traídos delante de ti; y tú y tus nobles, tus esposas y tus concubinas han bebido vino de ellos. Y has alabado a los dioses de plata y de oro, de bronce, de hierro, de madera y de piedra, que no ven ni oyen ni saben; pero al Dios en cuya mano está tu aliento, y cuyos son todos tus caminos, no has honrado.
  rationale: Se corrigió 'bebisteis' a 'han bebido' para mantener la concordancia con el sujeto compuesto 'tú y tus nobles...' sin romper el tratamiento singular dominante del versículo, y se cambió 'con ellos' por 'de ellos' para reflejar con mayor fidelidad que bebieron usando los vasos del templo. No se requieren notas adicionales porque no se introduce nueva ambigüedad relevante en español.
