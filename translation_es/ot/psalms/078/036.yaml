    rationale: La evidencia fuente y la auditoría inglesa favorecen el sentido de adulación/manipulación verbal insincera. «Lo engañaron» sobreafirma un resultado que el rationale explícitamente evita y no preserva la decisión léxica principal del POB.
  - severity: medium
    issue: La nota al pie pone «lo halagaron» solo como alternativa, aunque es la mejor opción contextual en español.
    rationale: La nota debe reflejar alternativas reales al texto principal, no invertir la decisión documentada. Si el texto principal se corrige a «lo halagaron», la nota puede conservar «lo engañaron» y «lo sedujeron» como posibilidades léxicas.
  - severity: low
    issue: La combinación «lo engañaron ... le mintieron» suena algo redundante.
    rationale: No es incorrecta, pero debilita la progresión poética del paralelismo. «Lo halagaron ... le mintieron» distingue mejor adulación externa y falsedad interna/verbal.
