- from: Porque si no dejas ir a mi pueblo, yo, he aquí, enviaré sobre ti, sobre tus siervos, sobre tu pueblo y sobre tus casas el enjambre[a]. Y las casas de Egipto se llenarán del enjambre[b], y también el suelo sobre el que están.
  to: Porque si no dejas ir a mi pueblo, he aquí, yo envío sobre ti, sobre tus siervos, sobre tu pueblo y en tus casas el enjambre[a]. Y las casas de Egipto se llenarán del enjambre[b], y también el suelo sobre el que están.
  rationale: Se ajusta la sintaxis de הִנְנִי מַשְׁלִיחַ para un español más natural y fiel ('he aquí, yo envío') y se corrige וּבְבָתֶּיךָ a 'en tus casas', ya que el contexto describe una invasión interior corroborada por 'las casas... se llenarán'. Se conservan 'enjambre' y la nota sobre 'moscas', así como la alternativa 'suelo/tierra' para אֲדָמָה.
