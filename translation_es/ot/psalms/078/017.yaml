translation:
  language: es
  text: Sin embargo, siguieron pecando contra él[a], rebelándose contra el Altísimo en tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el desierto» o «en la tierra árida». El hebreo usa un término que señala un lugar seco y árido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסִפוּ
  english_pob_choice: they continued
  chosen_spanish: siguieron
  alternatives_spanish:
  - continuaron
  - volvieron a
  lexicon: HALOT
  rationale: El valor de יסף con infinitivo expresa continuación o repetición. En español, «siguieron» conserva la idea de persistencia con naturalidad y evita un calco rígido.
- source_word: עוֹד
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - aún
  - todavía
  - además
  lexicon: HALOT
  rationale: El adverbio introduce progresión adversativa en el contexto; «Sin embargo» comunica bien ese giro inicial en español y mantiene el énfasis de continuidad que también aporta el verbo.
- source_word: לַחֲטֹא לוֹ
  english_pob_choice: to sin against him
  chosen_spanish: pecando contra él
  alternatives_spanish:
  - pecar contra él
  - seguir pecando contra él
  - pecar a él
  lexicon: HALOT
  rationale: חטא con ל puede expresar pecar contra alguien. En español, «pecar contra él» es la forma idiomática y conserva la referencia al objeto personal, aquí Dios en el contexto.
- source_word: לַמְרוֹת
  english_pob_choice: rebelling
  chosen_spanish: rebelándose
  alternatives_spanish:
  - rebelarse contra
  - siendo rebeldes
  - provocando
  lexicon: HALOT
  rationale: El sustantivo/infinitivo de מרה denota rebeldía o desafío. «Rebelándose» preserva el matiz de oposición activa y la relación con el siguiente complemento.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Altísimo Dios
  lexicon: HALOT
  rationale: «Altísimo» es el equivalente español natural del título divino עֶלְיוֹן. Mantiene la dignidad del apelativo sin diluirlo en una paráfrasis.
- source_word: בַּצִּיָּה
  english_pob_choice: in the dry land
  chosen_spanish: en tierra seca
  alternatives_spanish:
  - en el desierto
  - en la tierra árida
  - en la tierra reseca
  lexicon: HALOT
  rationale: צִיָּה nombra un lugar seco, árido, reseco; no usa el término más común para «desierto». «Tierra seca» sigue de cerca la elección léxica del hebreo y conserva la precisión que el POB inglés resaltó.
theological_decisions:
- issue: Título divino עֶלְיוֹן
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - Altísimo
  rationale: Se trata de un título divino estándar, no de una disputa cristológica o denominacional en este versículo. «El Altísimo» mantiene el peso teológico y la naturalidad en español.
  doctrine_reference: Preservación del título divino sin suavizar su fuerza ni reemplazarlo por una formulación eclesiástica tradicional.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés: continuidad + adversatividad en וַיּוֹסִפוּ עוֹד, objeto personal de חטא con ל, rebeldía de מרה, título divino עֶלְיוֹן y el matiz léxico específico de בַּצִּיָּה frente a «desierto». No hubo revisiones pendientes en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y publicable, evitando calcos como «añadieron todavía».
  - Se usó «el Altísimo» por consistencia con el título divino עֶלְיוֹן en español.
  - La nota textual/lexical conserva la tensión entre «tierra seca», «desierto» y «tierra árida» sin resolverla por simplificación.
