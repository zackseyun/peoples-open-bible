    issue: «adondequiera que salía» es poco natural y demasiado literal para el modismo hebreo
    rationale: El hebreo יֵצֵא puede conservar imagen de ‘salir’, pero el audit trail inglés ya resolvió correctamente que en contexto idiomático conviene una forma más natural (‘wherever he went’). En español, «adondequiera que iba» preserva el sentido sin rigidez innecesaria; la nota ya retiene las alternativas de empresa/éxito/sabiduría.
