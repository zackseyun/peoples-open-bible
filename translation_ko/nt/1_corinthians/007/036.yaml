  text: 그러나 만일 누가 자기의 처녀에 대하여 합당하지 않게 행하고 있다고 생각하고, 또 그녀의 한창때가 지나가고 있어서 마땅히 그렇게 되어야 한다면, 그가 원하는 대로 하십시오. 그것은 죄가 아닙니다. 그들로 결혼하게 하십시오.
  philosophy: optimal-equivalence
