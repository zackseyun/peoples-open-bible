    rationale: El pie de nota marcado como alternativa léxica dice exactamente «para ser hostiles contra Israel», igual que el cuerpo del texto. Debe registrar una opción distinta, como «para actuar hostilmente contra Israel».
  revised_spanish_text: Y pusieron una guarnición en ellos para hostilizar a Israel[a].
