translation:
  language: es
  text: Entonces ella fue e hizo conforme a la palabra de Elías[a], y comió ella, él y su familia por muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "y comió, él y ella y su casa, días". El hebreo usa un verbo singular seguido de una lista explícita de quienes comieron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  english_pob_choice: So she went
  chosen_spanish: Así que ella fue
  alternatives_spanish:
  - Y ella fue
  - Entonces fue ella
  lexicon: HALOT
  rationale: La forma wayyiqtol en hebreo avanza la narración; en español, "Así que" comunica continuidad lógica y narrativa sin forzar un calco. "Fue" conserva el movimiento verbal básico de הלך.
- source_word: וַתַּעֲשֶׂה
  english_pob_choice: and did
  chosen_spanish: e hizo
  alternatives_spanish:
  - y hizo
  - y actuó
  lexicon: HALOT
  rationale: עָשָׂה aquí significa ejecutar o cumplir lo dicho por Elías. "Hizo" es la equivalencia natural y fiel al valor general del verbo en este contexto.
- source_word: כִּדְבַר אֵלִיָּהוּ
  english_pob_choice: according to the word of Elijah
  chosen_spanish: conforme a la palabra de Elías
  alternatives_spanish:
  - según la palabra de Elías
  - como había dicho Elías
  lexicon: HALOT
  rationale: דָּבָר en esta construcción expresa palabra dada, instrucción o mandato. "Conforme a la palabra" mantiene la cercanía formal y el matiz de obediencia al dicho de Elías.
- source_word: וַתֹּאכַל
  english_pob_choice: and she ate
  chosen_spanish: y comieron
  alternatives_spanish:
  - y ella comió
  - y ella y él comieron
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular femenino, el contexto inmediato explicita a los participantes que comen. Siguiendo el audit trail inglés, se prioriza la claridad del conjunto de los comensales en español, sin perder el sentido narrativo.
- source_word: הוּא וְהִיא וּבֵיתָהּ
  english_pob_choice: he and she and her household
  chosen_spanish: ella, él y su casa
  alternatives_spanish:
  - él y ella y su casa
  - él, ella y su familia
  lexicon: HALOT
  rationale: El hebreo enumera explícitamente a los participantes. "Su casa" conserva בַּיִת como unidad doméstica/household; en español suena más natural que "su hogar" en un contexto de alimentación y provisión.
- source_word: בֵּיתָהּ
  english_pob_choice: her household
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: En hebreo, בַּיִת puede referirse a la casa física o al grupo doméstico. Aquí el contexto apunta al conjunto de personas sostenidas; "su casa" preserva esa ambigüedad útil y es idiomático en español bíblico contemporáneo.
- source_word: יָמִים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - por días
  lexicon: HALOT
  rationale: El plural de "días" funciona adverbialmente para expresar una duración prolongada. "Por muchos días" reproduce esa fuerza temporal de manera clara y natural en español.
translation_notes:
  revision_awareness: 'El texto español sigue el auditorio crítico del POB inglés: se mantiene la secuencia narrativa del wayyiqtol, la obediencia a la palabra de Elías y la observación sintáctica importante de que el hebreo emplea un verbo singular seguido de la enumeración de los participantes. Se eligió una formulación española publicable que conserva la relación entre la acción, la obediencia y la duración temporal sin sobreexplicar.'
  spanish_consistency_notes:
  - Se usa "Elías" como forma estable del nombre propio.
  - Se conserva "palabra" para דָּבָר según la decisión inglesa, evitando reemplazarla por "orden" sin necesidad textual.
  - '"Su casa" se emplea como equivalente de household con posible referencia colectiva, coherente con el hebreo בַּיִת.'
  - La nota al pie marca la tensión sintáctica entre el verbo singular hebreo y la lista explícita de participantes.
