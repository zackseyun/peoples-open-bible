revisions:
- from: Pero los hijos de Israel no los hirieron[a], porque los líderes de la congregación habían jurado a ellos[b] por Yahvé, el Dios de Israel. Y toda la congregación murmuró[c] contra los líderes.
  to: Pero los hijos de Israel no los hirieron[a], porque los líderes de la congregación les habían jurado[b] por Yahvé, el Dios de Israel. Y toda la congregación murmuró[c] contra los líderes.
  rationale: Se corrigen calcos no idiomáticos ('a ellos') para un español natural sin perder el valor dativo de לָהֶם. También se ajustan las notas para que sus alternativas sean español genuino y no formulaciones forzadas. El resto del verso se mantiene por su buena fidelidad al hebreo y a las decisiones léxicas del POB.
