translation:
  language: es
  text: 'Y Adoni-bezec dijo[a]: «Setenta reyes, con los pulgares de las manos y los dedos gordos de los pies cortados, solían recoger migajas bajo mi mesa. Como yo hice, así Dios me ha pagado[b]». Y lo llevaron a Jerusalén, y murió allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «con los pulgares y los dedos gordos de los pies cortados».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo אֱלֹהִים es morfológicamente plural, pero aquí lleva un verbo singular; por eso se traduce «Dios» y no «los dioses».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי בֶזֶק
  english_pob_choice: Adoni-bezek
  chosen_spanish: Adoni-bezec
  alternatives_spanish:
  - Señor de Bezec
  lexicon: HALOT
  rationale: Se trata como nombre propio en la línea del audito inglés, por lo que se translitera en español en vez de traducirse como título descriptivo.
- source_word: שִׁבְעִים מְלָכִים
  english_pob_choice: Seventy kings
  chosen_spanish: Setenta reyes
  alternatives_spanish:
  - setenta monarcas
  lexicon: HALOT
  rationale: La construcción numérica es directa; «reyes» conserva la forma y el alcance del original sin añadir matiz.
- source_word: בְּהֹנוֹת יְדֵיהֶם וְרַגְלֵיהֶם
  english_pob_choice: the thumbs of their hands and their feet
  chosen_spanish: los pulgares de sus manos y de sus pies
  alternatives_spanish:
  - los pulgares y los dedos gordos de los pies
  - los pulgares de las manos y los pies
  lexicon: HALOT
  rationale: «בֹּהֶן» puede referirse al pulgar o al dedo gordo del pie según el miembro nombrado. En español, «pulgares de sus manos y de sus pies» mantiene la distinción anatómica explícita del hebreo sin forzar una paráfrasis excesiva. La alternativa idiomática se preserva como posibilidad léxica.
- source_word: מְקֻצָּצִים
  english_pob_choice: cut off
  chosen_spanish: cortados
  alternatives_spanish:
  - seccionados
  - amputados
  lexicon: HALOT
  rationale: Participio pasivo de קצץ; «cortados» es el equivalente más natural y fiel, y conserva la dureza del acto.
- source_word: הָיוּ מְלַקְּטִים
  english_pob_choice: used to gather scraps
  chosen_spanish: solían recoger migajas
  alternatives_spanish:
  - andaban recogiendo migajas
  - solían recoger restos
  lexicon: HALOT
  rationale: La forma perifrástica expresa acción habitual en el pasado. «Recoger migajas» comunica bien la humillación implícita en el contexto de estar bajo la mesa, sin añadir un detalle que el hebreo no exige.
- source_word: תַּחַת שֻׁלְחָנִי
  english_pob_choice: under my table
  chosen_spanish: bajo mi mesa
  alternatives_spanish:
  - debajo de mi mesa
  lexicon: HALOT
  rationale: Expresión espacial directa; «bajo mi mesa» es natural en español y conserva la relación de lugar.
- source_word: כַּאֲשֶׁר עָשִׂיתִי כֵּן
  english_pob_choice: As I have done, so
  chosen_spanish: Como yo hice, así
  alternatives_spanish:
  - Así como yo hice, así
  - Como hice, así
  lexicon: HALOT
  rationale: Mantiene la fórmula de correspondencia retributiva del hebreo y del inglés POB, con español claro y sobrio.
- source_word: שִׁלַּם לִי אֱלֹהִים
  english_pob_choice: God has repaid me
  chosen_spanish: me ha pagado Dios
  alternatives_spanish:
  - Dios me ha pagado
  - Dios me ha recompensado
  lexicon: HALOT
  rationale: Se conserva «Dios» por la fuerza del verbo singular hebreo, evitando traducir por «los dioses». «Pagar» expresa la idea de retribución; el orden invertido («me ha pagado Dios») preserva mejor la focalización del original y el paralelismo con la frase anterior.
- source_word: וַיְבִיאֻהוּ יְרוּשָׁלִַם
  english_pob_choice: And they brought him to Jerusalem
  chosen_spanish: Y lo llevaron a Jerusalén
  alternatives_spanish:
  - Y lo trajeron a Jerusalén
  - Entonces lo llevaron a Jerusalén
  lexicon: HALOT
  rationale: El verbo de movimiento se vierte con naturalidad en español y el objeto pronominal se antepone para fluidez narrativa.
- source_word: וַיָּמָת שָׁם
  english_pob_choice: and he died there
  chosen_spanish: y murió allí
  alternatives_spanish:
  - y murió allí mismo
  lexicon: HALOT
  rationale: Fórmula narrativa simple y fiel; «allí» reproduce el valor locativo sin sobrecargar el estilo.
theological_decisions:
- issue: Referencia de אֱלֹהִים en la afirmación de Adoni-bezec
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: Aunque אֱלֹהִים es formalmente plural, el verbo singular שִׁלַּם apunta a un referente singular. En español se conserva «Dios», sin explicar de más la teología del personaje ni suavizar la tensión gramatical del hebreo.
  doctrine_reference: Primacía del dato original; no resolver artificialmente la ambigüedad léxica.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la línea auditada en inglés y conserva las dos decisiones clave del registro: la posible equivalencia más idiomática para בֹּהֶן y la lectura singular de אֱלֹהִים. No se introdujeron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantiene «Adoni-bezec» como transliteración estable del nombre propio, acorde con el tratamiento POB de nombres semíticos.
  - «Dios» se usa con mayúscula por tratarse del referente singular entendido en el pasaje, aunque la morfología hebrea sea plural.
  - El estilo procura equilibrio entre literalidad y fluidez, evitando el calco excesivo en la expresión corporal y en la fórmula retributiva.
