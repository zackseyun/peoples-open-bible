source:
  edition: WLC
  text: כִּ֠י בְּ/טֶ֨רֶם יֵדַ֥ע הַ/נַּ֛עַר מָאֹ֥ס בָּ/רָ֖ע וּ/בָחֹ֣ר בַּ/טּ֑וֹב תֵּעָזֵ֤ב הָ/אֲדָמָה֙ אֲשֶׁ֣ר אַתָּ֣ה קָ֔ץ מִ/פְּנֵ֖י שְׁנֵ֥י מְלָכֶֽי/הָ׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/007/016.yaml
  text: For before the boy knows to refuse the evil and choose the good[b][a], the land before whose two kings you dread will be forsaken.
  footnotes:
  - marker: a
    text: Or 'will be abandoned' or 'will be deserted.' The Hebrew passive can denote the land being left empty or forsaken.
    reason: lexical_alternative
  - marker: b
    text: Or 'whose two kings you loathe because of fear' / 'before whose two kings you are filled with dread.' The Hebrew verb carries a sense of revulsion that in this context likely reflects dread of the two kings.
    reason: lexical_alternative
