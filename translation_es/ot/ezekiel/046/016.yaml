translation:
  language: es
  text: 'Así dice el Señor Yahvé: Si el príncipe da un regalo a uno de sus hijos[a], es su herencia[b]; pertenecerá a sus hijos como su posesión por herencia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a un hombre de entre sus hijos», un giro que significa «a cualquiera de sus hijos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como su posesión en herencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética funciona naturalmente en español con presente enunciativo. «Así dice» mantiene el tono solemne y directo del original sin volverlo arcaico.
- source_word: אֲדֹנָי יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto, y «Señor» traduce אֲדֹנָי. Se evita la máscara «SEÑOR» y también la repetición artificial «Señor Yahvé Dios».
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Porque
  lexicon: HALOT
  rationale: Aquí introduce un caso condicional dentro de la disposición legal; «Si» expresa mejor esa fuerza que una causalidad.
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el soberano
  - el líder
  lexicon: HALOT
  rationale: En Ezequiel 46, נָשִׂיא es un título técnico del gobernante. «Príncipe» conserva la equivalencia tradicional y el valor institucional.
- source_word: מַתָּנָה
  english_pob_choice: a gift
  chosen_spanish: un regalo
  alternatives_spanish:
  - un obsequio
  - un don
  lexicon: HALOT
  rationale: En español, «regalo» comunica con claridad la idea de algo dado; aquí no hay necesidad de elevarlo a «don», que podría sonar más teológico de lo requerido.
- source_word: לְאִישׁ מִבָּנָיו
  english_pob_choice: to one of his sons
  chosen_spanish: a uno de sus hijos
  alternatives_spanish:
  - a un hombre de entre sus hijos
  - a cualquiera de sus hijos
  lexicon: HALOT
  rationale: Se traduce el hebraísmo distributivo con una construcción natural en español. «Hijos» recoge el sentido idiomático de «sons» y evita la literalidad extraña de «un hombre de entre sus hijos».
- source_word: נַחֲלָתוֹ הִיא
  english_pob_choice: it is his inheritance
  chosen_spanish: será su herencia
  alternatives_spanish:
  - es su herencia
  - le pertenece como herencia
  lexicon: HALOT
  rationale: El hebreo identifica el regalo como heredad vinculada al hijo receptor; en español, el futuro encaja bien con el desarrollo legal de la cláusula y evita una repetición innecesaria del posesivo.
- source_word: לְבָנָיו תִּהְיֶה
  english_pob_choice: it shall belong to his sons
  chosen_spanish: pertenecerá a sus hijos
  alternatives_spanish:
  - será para sus hijos
  - pasará a sus hijos
  lexicon: HALOT
  rationale: «Pertenecerá» expresa con claridad la continuidad de la posesión familiar sin perder el matiz jurídico de permanencia.
- source_word: אֲחֻזָּתָם
  english_pob_choice: as their possession
  chosen_spanish: como su posesión
  alternatives_spanish:
  - como su propiedad
  - como su tenencia
  lexicon: HALOT
  rationale: אֲחֻזָּה señala una posesión/tenencia hereditaria. «Posesión» mantiene el paralelismo con el campo semántico sin imponer una lectura más moderna como «propiedad».
- source_word: בְּנַחֲלָה
  english_pob_choice: by inheritance
  chosen_spanish: por herencia
  alternatives_spanish:
  - en herencia
  - como herencia
  lexicon: HALOT
  rationale: La preposición expresa la base jurídica de la posesión. «Por herencia» es idiomático y conserva el valor de transmisión hereditaria.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהֹוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé Dios
  rationale: El texto hebreo contiene el Tetragrama directamente. Conforme al criterio del proyecto, se lo vierte como «Yahvé»; אֲדֹנָי se traduce «Señor», formando una combinación reverente y auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor legal de la posesión hereditaria
  english_pob_reading: as their possession by inheritance
  chosen_spanish_reading: como su posesión por herencia
  alternative_spanish_readings:
  - como su propiedad por herencia
  - como su posesión en herencia
  rationale: Se mantiene la fuerza jurídica de אֲחֻזָּה y נַחֲלָה sin diluirla en una generalidad devocional. «Posesión por herencia» conserva la relación entre tenencia familiar y transmisión legal.
  doctrine_reference: 'DOCTRINE.md: Property and inheritance language in covenant land texts'
translation_notes:
  revision_awareness: 'Se incorporó la corrección revisada del audit trail: el distributivo natural se expresa como «uno de sus hijos»/«a uno de sus hijos», y el campo de אֲחֻזָּה se refleja con «posesión»/«por herencia» en vez de una formulación más genérica. También se ajustó el nombre divino al estándar español del proyecto con Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y legible para lectura eclesial, sin caer en calco rígido.
  - Se preservó la distinción entre herencia (נַחֲלָה) y posesión hereditaria (אֲחֻזָּה).
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, como exige la validación.
  - Se evitó la traducción en mayúsculas tipo «SEÑOR» para el Tetragrama, conforme a la política del proyecto.
