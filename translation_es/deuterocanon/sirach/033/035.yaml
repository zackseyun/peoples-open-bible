  glossary_alignment: 'No hay conflictos con la terminología proyectual principal. Las decisiones léxicas son razonables: «extraño» para ἀλλότριον y «de lo tuyo» para τῶν ἰδίων σου preservan la amplitud contextual. El cambio propuesto se centra en naturalidad y mejor correspondencia con el griego, no en terminología doctrinal.'
