translation:
  language: es
  text: Este es el libro de los mandamientos de Dios[a], y la ley que permanece para siempre; todos los que se aferran a esta vivirán, pero los que la abandonan morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que se aferran a esta, para vida». El griego dice literalmente «todos los que se aferran a esta, para vida», una expresión elíptica en contraste con «los que la abandonan morirán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: βίβλος
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - rollo
  lexicon: LSJ
  rationale: βίβλος designa un escrito o libro; «libro» es el equivalente natural en español y conserva la imagen de un documento escrito.
- source_word: προσταγμάτων
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - órdenes
  - preceptos
  - mandatos
  lexicon: LSJ
  rationale: πρόσταγμα expresa un mandato con autoridad. «Mandamientos» transmite bien el peso normativo y encaja con el marco religioso-jurídico de Dios y su ley.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - enseñanza
  lexicon: LSJ
  rationale: Aquí νόμος se refiere a la ley divina vigente, no sólo a instrucción general. «Ley» preserva la fuerza jurídica y de alianza del término.
- source_word: ὁ ὑπάρχων εἰς τὸν αἰῶνα
  english_pob_choice: that endures forever
  chosen_spanish: que permanece para siempre
  alternatives_spanish:
  - que existe para siempre
  - que perdura para siempre
  lexicon: LSJ
  rationale: La expresión comunica permanencia continua. «Permanece para siempre» es natural en español y mantiene el sentido de duración sin añadir matices no presentes.
- source_word: κρατοῦντες
  english_pob_choice: hold fast to
  chosen_spanish: se aferran a
  alternatives_spanish:
  - se mantienen firmes en
  - se adhieren a
  - se sujetan a
  lexicon: LSJ
  rationale: κρατέω aquí tiene el sentido de adherirse firmemente. «Se aferran a» conserva la fuerza de apego decidido y fiel.
- source_word: εἰς ζωὴν
  english_pob_choice: are for life
  chosen_spanish: para vida
  alternatives_spanish:
  - para vida están
  - están para vida
  - son para vida
  lexicon: LSJ
  rationale: La frase griega es elíptica y contrapone «para vida» con «morirán». El español conserva esa brevedad, aunque suene ligeramente abreviado, para no resolver de más la construcción.
- source_word: καταλείποντες
  english_pob_choice: forsake
  chosen_spanish: abandonan
  alternatives_spanish:
  - dejan
  - desertan
  - forsitan
  lexicon: LSJ
  rationale: El verbo indica dejar atrás o abandonar. «Abandonan» expresa bien la ruptura deliberada con la ley, sin introducir un tono más arcaico.
- source_word: ἀποθανοῦνται
  english_pob_choice: will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - perecerán
  lexicon: LSJ
  rationale: Es el futuro simple de morir. «Morirán» conserva con claridad la antítesis vida/muerte del texto griego.
theological_decisions:
- issue: Cómo reflejar la polaridad vida/muerte del versículo sin suavizarla
  english_pob_reading: Preserved the explicit contrast 'are for life ... will die.'
  chosen_spanish_reading: Se conserva el contraste explícito «para vida ... morirán».
  alternative_spanish_readings:
  - viven por ello ... perecerán
  - tienen vida ... morirán
  rationale: El griego nombra ζωή y ἀποθανοῦνται de manera directa. El español mantiene esa polaridad sin reemplazarla por un equivalente más interpretativo como «perecerán» o «tendrán vida».
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Si νόμος debe atenuarse como «instrucción» para evitar una carga legal excesiva
  english_pob_reading: Rendered νόμος as 'law.'
  chosen_spanish_reading: Se traduce νόμος como «ley».
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: La mención previa de «mandamientos de Dios» orienta el sentido hacia una norma vinculante. «Ley» preserva mejor el valor normativo y pactal del pasaje.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de Swete y el criterio óptimo del POB en inglés. Se mantuvo la elipsis de εἰς ζωὴν con una construcción breve en español, y no se atenuó el contraste vida/muerte. No se detectaron revisiones posteriores que exijan cambios.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ conforme al criterio base del proyecto.
  - Se evitó «SEÑOR» porque el texto griego no usa κύριος aquí.
  - «Ley» y «mandamientos» se mantienen diferenciados para conservar la relación entre πρόσταγματα y νόμος.
  - La puntuación con punto y coma refleja bien la estructura contrastiva del original.
