revisions:
- from: Celebrarás para ti la Fiesta de las Semanas[a], las primicias de la cosecha del trigo, y la Fiesta de la Recolección al turno del año.
  to: Celebrarás la Fiesta de las Semanas, las primicias de la cosecha del trigo, y la Fiesta de la Recolección al giro del año[a].
  rationale: Se elimina 'para ti' por sonar poco natural en español en este modismo festivo, sin pérdida sustancial de sentido. Se sustituye 'al turno del año' por 'al giro del año', que refleja mejor תְּקוּפַת הַשָּׁנָה y es más claro para lectores hispanohablantes. También se mueve la nota [a] para anclarla directamente en la frase a la que explica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:04:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la Fiesta de las Semanas, las primicias de la cosecha del trigo, y la Fiesta de la Recolección en relación con el ciclo anual. También conserva correctamente la nota alternativa sobre תְּקוּפַת הַשָּׁנָה. Sin embargo, dos elecciones españolas no son las más fieles ni naturales: ''para ti'' suena demasiado literal para לְךָ en este contexto idiomático, y ''al turno del año'' no comunica bien en español el sentido de ''giro/ciclo/viraje'' del año.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero ''Celebrarás para ti'' suena poco idiomático en español bíblico natural, y ''al turno del año'' resulta extraño y poco legible. Una reparación menor puede conservar la precisión del hebreo y mejorar notablemente la fluidez: ''Celebrarás la Fiesta...'' y ''al giro del año''.'
  glossary_alignment: Está alineado con la política del proyecto al usar 'Fiesta de las Semanas' y evitar 'Pentecostés'. 'Primicias' también está bien. No hay términos teológicos mayores en conflicto. La única desviación relevante es estilístico-lexical en la representación de לְךָ y תְּקוּפַת הַשָּׁנָה.
  issues:
  - severity: medium
    issue: '''Celebrarás para ti'' es una reproducción demasiado literal y poco idiomática de תַּעֲשֶׂה לְךָ.'
    rationale: Aunque לְךָ está presente en el hebreo y el inglés lo refleja con 'for yourself', en español 'para ti' aquí suena forzado y no añade claridad. En contexto festivo-cultual, 'celebrarás' o 'guardarás' ya expresan adecuadamente la obligación de observancia.
  - severity: medium
    issue: '''al turno del año'' no es una expresión natural ni suficientemente clara en español.'
    rationale: תְּקוּפַת הַשָּׁנָה apunta al giro/ciclo/viraje del año. 'Turno' en español moderno sugiere más bien un turno de trabajo o de rotación y no transmite bien la imagen temporal. 'Al giro del año' preserva mejor la metáfora y la nota puede mantener 'al final del año' como alternativa.
  revised_spanish_text: Celebrarás la Fiesta de las Semanas, las primicias de la cosecha del trigo, y la Fiesta de la Recolección al giro del año[a].
  revised_footnotes:
  - marker: a
    text: O, 'al final del año'. La frase hebrea se refiere literalmente al giro o ciclo del año.
    reason: lexical_alternative
  revision_rationale: Se elimina 'para ti' por sonar poco natural en español en este modismo festivo, sin pérdida sustancial de sentido. Se sustituye 'al turno del año' por 'al giro del año', que refleja mejor תְּקוּפַת הַשָּׁנָה y es más claro para lectores hispanohablantes. También se mueve la nota [a] para anclarla directamente en la frase a la que explica.
