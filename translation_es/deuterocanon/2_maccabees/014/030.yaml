translation:
  language: es
  text: Pero Macabeo[a], al percibir por el trato de Nicanor hacia él que había adoptado una manera más áspera de lo habitual, y al entender que esta severidad no era para lo mejor, reunió a no pocos de los suyos y se mantuvo oculto de Nicanor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más literal: «al entender que esta severidad no procedía de lo mejor». La frase griega οὐκ ἀπὸ τοῦ βελτίστου es idiomática y puede referirse tanto al motivo como al curso de acción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰσθητήριον διεξαγαγόντος
  english_pob_choice: from Nicanor’s actions toward him
  chosen_spanish: por las acciones de Nicanor hacia él
  alternatives_spanish:
  - por su conducta hacia él
  - por el trato de Nicanor hacia él
  - por su manera de proceder hacia él
  lexicon: LSJ
  rationale: La construcción griega es idiomática y apunta a conducta observable más que a una facultad interna de percepción. En español, «por las acciones ... hacia él» conserva la base inferencial sin volverla abstracta ni excesivamente interpretativa.
- source_word: συνιδὼν
  english_pob_choice: perceiving
  chosen_spanish: al percibir
  alternatives_spanish:
  - al notar
  - al entender
  - al darse cuenta de
  lexicon: BDAG
  rationale: El participio expresa reconocimiento perceptivo e inferencia. «Al percibir» mantiene la secuencia narrativa y el matiz de observación razonada.
- source_word: τὰ πρὸς αὐτόν
  english_pob_choice: toward him
  chosen_spanish: hacia él
  alternatives_spanish:
  - en relación con él
  - respecto de él
  lexicon: LSJ
  rationale: La expresión idiomática señala el trato o las acciones dirigidas a Macabeo. «Hacia él» es breve, natural y fiel al valor relacional.
- source_word: τὴν ἠθισμένην ἀπάντησιν
  english_pob_choice: usual manner of meeting
  chosen_spanish: una manera más áspera de lo habitual
  alternatives_spanish:
  - un trato más áspero de lo habitual
  - una recepción más áspera de lo habitual
  - una forma acostumbrada pero más áspera de encontrarse
  lexicon: LSJ
  rationale: ἀπάντησις puede implicar encuentro, recepción o trato. En español, la frase evita una rigidez literal de «encuentro» y comunica que Nicanor había cambiado su modo de proceder al acercarse o tratarlo.
- source_word: ἀγριωτέρως ἐσχηκότα
  english_pob_choice: had assumed a harsher than usual manner
  chosen_spanish: había asumido una manera más áspera de lo habitual
  alternatives_spanish:
  - había adoptado un trato más áspero que de costumbre
  - se había mostrado más severo de lo habitual
  - había tomado un porte más áspero de lo acostumbrado
  lexicon: LSJ
  rationale: El comparativo pide una intensificación del modo de actuar. «Más áspera de lo habitual» conserva el contraste de grado sin imponer una interpretación demasiado específica como «savagely».
- source_word: νοήσας
  english_pob_choice: understanding
  chosen_spanish: al entender
  alternatives_spanish:
  - al comprender
  - al concluir
  - al darse cuenta de
  lexicon: BDAG
  rationale: El verbo marca una inferencia discernida. «Al entender» refleja juicio formado a partir de lo observado.
- source_word: οὐκ ἀπὸ τοῦ βελτίστου
  english_pob_choice: did not come from the better course
  chosen_spanish: no procedía del mejor camino
  alternatives_spanish:
  - no procedía de la mejor intención
  - no era para lo mejor
  - no nacía de un propósito bueno
  lexicon: LSJ
  rationale: La frase es idiomática y puede aludir a motivo o a política. «No procedía del mejor camino» conserva la ambigüedad entre intención y línea de acción, sin volverla puramente moralizante.
- source_word: τὴν αὐστηρίαν
  english_pob_choice: this severity
  chosen_spanish: esta severidad
  alternatives_spanish:
  - esta dureza
  - esta aspereza
  - esta rigurosidad
  lexicon: LSJ
  rationale: El sustantivo designa un trato severo o estricto. «Severidad» es el equivalente más directo y mantiene el registro sobrio del relato.
- source_word: συστρέψας οὐκ ὀλίγους τῶν περὶ αὐτὸν
  english_pob_choice: gathered not a few of his men
  chosen_spanish: reunió no a pocos de los que estaban con él
  alternatives_spanish:
  - reunió a no pocos de los suyos
  - agrupó a no pocos de sus hombres
  - reunió a bastante gente de su alrededor
  lexicon: LSJ
  rationale: La litote οὐκ ὀλίγους indica cantidad considerable. «No a pocos» conserva la forma semítica/grecolatina de la expresión y «de los que estaban con él» evita añadir una especificación militar que el griego no exige de manera explícita.
- source_word: συνεκρύπτετο
  english_pob_choice: kept himself hidden
  chosen_spanish: se mantuvo oculto
  alternatives_spanish:
  - se ocultó
  - permaneció escondido
  - siguió ocultándose
  lexicon: LSJ
  rationale: El imperfecto medio expresa acción continuada. «Se mantuvo oculto» comunica duratividad mejor que un pretérito puntual.
- source_word: τὸν Νικάνορα
  english_pob_choice: from Nicanor
  chosen_spanish: de Nicanor
  alternatives_spanish:
  - ante Nicanor
  - frente a Nicanor
  lexicon: LSJ
  rationale: El verbo de ocultarse pide la relación de separación respecto de Nicanor. En español, «de Nicanor» es la forma más natural y sobria.
theological_decisions:
- issue: Matiz idiomático de οὐκ ἀπὸ τοῦ βελτίστου
  english_pob_reading: this severity did not come from the better course
  chosen_spanish_reading: esta severidad no procedía del mejor camino
  alternative_spanish_readings:
  - esta severidad no era para lo mejor
  - esta severidad no procedía de la mejor intención
  rationale: El griego puede referirse a motivo o a política/curso de acción. La redacción española mantiene esa tensión sin resolverla unilateralmente, conforme al audit trail en inglés.
  doctrine_reference: N/A
- issue: Tensión entre observación y discernimiento en συνιδών / νοήσας
  english_pob_reading: perceiving ... and understanding
  chosen_spanish_reading: al percibir ... y al entender
  alternative_spanish_readings:
  - al notar ... y al comprender
  - al darse cuenta ... y al concluir
  rationale: El texto presenta una inferencia basada en hechos observables, no una revelación. La traducción conserva ambos momentos cognitivos para respetar el proceso narrativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa más reciente simplificó expresiones como 'conduct toward him' a 'actions toward him' y ajustó la frase sobre el mejor curso para mantener legibilidad. La redacción española sigue esa revisión, pero conserva la ambigüedad idiomática de οὐκ ἀπὸ τοῦ βελτίστου mediante 'no procedía del mejor camino', evitando una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Macabeo' como forma del nombre propia del libro, coherente con el audit trail.
  - Se usa 'Nicanor' sin artículo, en estilo narrativo bíblico natural en español.
  - Se evita 'Cristo', 'Señor' o terminología no pertinente; el verso no contiene léxico teológico directo de ese tipo.
  - La nota al pie marca la única alternativa idiomática relevante preservada por el texto inglés.
