    issue: La frase 'que se levanta en la mano' debilita la imagen verbal de עָלָה.
    rationale: El hebreo y la revisión inglesa destacaron 'goes up into the hand', no solo un levantarse genérico. En español conviene una formulación más cercana al movimiento ascendente concreto.
  - severity: medium
