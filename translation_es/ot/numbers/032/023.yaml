translation:
  language: es
  text: Pero si no hacen así[a], ciertamente han pecado contra Yahvé, y sepan que su pecado los hallará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su pecado los descubrirá», «su pecado los hallará» o «su culpa los alcanzará». El modismo hebreo expresa exposición inevitable y sus consecuencias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: El hebreo introduce una condición con contraste; en español, «Pero si» conserva el valor adversativo del contexto y suena natural y solemne.
- source_word: לֹא תַעֲשׂוּן כֵּן
  english_pob_choice: you do not do so
  chosen_spanish: no hacen así
  alternatives_spanish:
  - no hacen esto
  - no actúan así
  lexicon: HALOT
  rationale: «Hacer así» reproduce el referente anafórico al mandato previo sin forzar una paráfrasis; en español, la forma plural presente condicional funciona bien en una advertencia.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - ciertamente
  - vean
  lexicon: HALOT
  rationale: El interjección hebrea añade urgencia y énfasis. «Miren» conserva la fuerza exhortativa en español moderno sin sonar artificial como «he aquí».
- source_word: חֲטָאתֶם
  english_pob_choice: you have sinned
  chosen_spanish: habrán pecado
  alternatives_spanish:
  - han pecado
  - han cometido pecado
  lexicon: HALOT
  rationale: El perfecto hebreo aquí funciona como consecuencia cierta en un aviso condicional. En español, el futuro perfecto comunica bien la resultante advertida sin perder la fuerza de culpa consumada.
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahweh
  - frente a Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue la directriz del proyecto para el nombre divino: «Yahvé». Con חטא, el sentido relacional es contra la persona ofendida, por eso se usa «contra».'
- source_word: וּדְעוּ
  english_pob_choice: and know
  chosen_spanish: y sepan
  alternatives_spanish:
  - y conozcan
  - y entiendan
  lexicon: HALOT
  rationale: El imperativo plural pide certeza y reconocimiento de la advertencia. «Sepan» es idiomático y mantiene la apelación directa.
- source_word: חַטַּאתְכֶם
  english_pob_choice: your sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su culpa
  - su pecado
  lexicon: HALOT
  rationale: En este contexto el sustantivo puede referirse tanto al pecado como a la culpa. Se prefiere «pecado» por ser la lectura más directa del aviso, aunque la tensión semántica se conserva en la nota.
- source_word: אֲשֶׁר תִּמְצָא אֶתְכֶם
  english_pob_choice: will find you out
  chosen_spanish: los hallará
  alternatives_spanish:
  - los descubrirá
  - los encontrará
  - los alcanzará
  lexicon: HALOT
  rationale: El hebreo expresa que el pecado los descubrirá o alcanzará. «Los hallará» conserva la imagen de hallazgo/descubrimiento y permite expresar la inevitabilidad del desenlace sin exagerar el matiz idiomático en el cuerpo del texto.
theological_decisions:
- issue: Nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete auditable del proyecto indica la preferencia por transliterar el Tetragrámaton como «Yahvé» en el texto principal. Se evita la sustitución por «SEÑOR» porque el mandato del proyecto pide no enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חטא / חַטַּאתְכֶם en una advertencia condicional
  english_pob_reading: your sin will find you out
  chosen_spanish_reading: su pecado los hallará
  alternative_spanish_readings:
  - su culpa los alcanzará
  - su pecado los descubrirá
  rationale: El inglés POB conserva la idiomática de exposición/consecuencia. En español, «los hallará» mantiene la imagen verbal sin convertirla en una explicación interpretativa excesiva; la nota preserva las alternativas posibles de culpa, descubrimiento y alcance.
  doctrine_reference: 'HALOT: חטא / חַטָּאת como pecado, culpa, consecuencia'
- issue: Valor del perfecto hebreo en la advertencia
  english_pob_reading: you have sinned
  chosen_spanish_reading: habrán pecado
  alternative_spanish_readings:
  - han pecado
  - habrán incurrido en pecado
  rationale: Aunque el inglés POB usa un perfecto resultativo, en español la estructura condicional con futuro perfecto comunica mejor una consecuencia cierta en el marco de la advertencia, sin atenuar la responsabilidad moral.
  doctrine_reference: 'Gramática hebrea: perfecto en apódosis/amenaza resultativa'
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y no registra revisiones aplicadas. La versión española sigue el texto hebreo directamente, con el nombre divino «Yahvé» según la terminología del proyecto y con una nota para el idioma figurado final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la directriz del proyecto para יהוה.
  - Se eligió «pecado» en el cuerpo principal y se dejó constancia de la posible lectura semántica de «culpa» en la nota.
  - Se evitó «SEÑOR» como sustituto editorial del nombre divino.
  - El cierre «los hallará» conserva la imagen bíblica de exposición/consecuencia sin añadir explicación al texto principal.
