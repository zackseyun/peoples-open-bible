translation:
  language: es
  text: Y se reunió la asamblea[a][b] para prepararse para la guerra, y para orar y pedir misericordia y compasión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue reunida»; el verbo griego tiene forma pasiva y puede expresarse más formalmente de ese modo.
    reason: lexical_alternative
  - marker: b
    text: O «la congregación». El griego συναγωγή aquí se refiere a la comunidad reunida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠθροίσθη
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - fue reunida
  lexicon: BDAG
  rationale: El aoristo pasivo expresa que el grupo llegó a reunirse como cuerpo. «Se reunió» suena natural en español y conserva la idea colectiva sin forzar una forma excesivamente técnica.
- source_word: ἡ συναγωγή
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el congregado
  lexicon: BDAG
  rationale: Aquí no se trata de la institución posterior llamada «sinagoga», sino del pueblo reunido. «Asamblea» comunica bien el carácter comunitario del grupo y evita un anacronismo.
- source_word: τοῦ εἶναι ἑτοίμους
  english_pob_choice: to be ready
  chosen_spanish: para estar preparada
  alternatives_spanish:
  - para estar lista
  - para hallarse lista
  lexicon: BDAG
  rationale: La construcción articular infinitiva expresa propósito. En español, «para estar preparada» transmite esa finalidad de manera clara y fluida; se eligió el femenino por concordar con «la asamblea».
- source_word: εἰς πόλεμον
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - para el combate
  lexicon: BDAG
  rationale: «πόλεμος» designa guerra en sentido amplio. «Guerra» mantiene mejor el término griego que «batalla», aunque esta última también sería posible según el contexto.
- source_word: τοῦ προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: para orar
  alternatives_spanish:
  - para orar a Dios
  - para hacer oración
  lexicon: BDAG
  rationale: El segundo infinitivo de propósito se vierte de forma directa. «Orar» es idiomático en español bíblico contemporáneo y conserva el sentido de la petición comunitaria.
- source_word: αἰτῆσαι
  english_pob_choice: ask
  chosen_spanish: pedir
  alternatives_spanish:
  - solicitar
  - pedirle
  lexicon: BDAG
  rationale: En este contexto la petición va dirigida a Dios; «pedir» refleja con naturalidad el valor de «ask for/request» sin añadir matices ajenos al griego.
- source_word: ἔλεον
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia divina
  - piedad
  lexicon: BDAG
  rationale: «ἔλεος» en un marco de oración tiene el peso religioso de misericordia. «Misericordia» es la equivalencia más directa y estable en español.
- source_word: οἰκτειρμούς
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordias
  - enternecimiento
  lexicon: BDAG
  rationale: El plural intensifica el ruego de piedad. «Compasión» conserva bien el sentido y permite distinguirlo de «misericordia» sin sonar arcaico.
theological_decisions:
- issue: Traducción de συναγωγή en un contexto histórico deuterocanónico
  english_pob_reading: the assembly
  chosen_spanish_reading: la asamblea
  alternative_spanish_readings:
  - la congregación
  - la sinagoga
  rationale: La escena describe a la comunidad reunida como cuerpo para la guerra y para la oración. «La asamblea» evita sugerir un edificio o institución fija y conserva el sentido comunitario del término griego.
  doctrine_reference: Translation philosophy §1, §6
- issue: 'Doble finalidad de la reunión: preparación militar y oración'
  english_pob_reading: to be ready for war, and to pray and ask for mercy and compassion
  chosen_spanish_reading: para estar preparada para la guerra, y para orar y pedir misericordia y compasión
  alternative_spanish_readings:
  - para prepararse para la guerra y orar por misericordia y compasión
  - para estar listas para la guerra y orar y pedir piedad
  rationale: El texto une sin conflicto la preparación militar con la dependencia devocional. La traducción mantiene ambas finalidades sin suavizarlas ni espiritualizarlas en exceso.
  doctrine_reference: Translation philosophy §2, §7
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego de Swete 1909 y conserva la lectura auditada del POB en inglés, sin cambios de sentido respecto del paso revisado más reciente; se mantuvo la distinción entre la reunión comunitaria y sus dos propósitos: prepararse para la guerra y orar pidiendo misericordia y compasión.'
  spanish_consistency_notes:
  - Se evitó «sinagoga» en el texto principal para no introducir un anacronismo institucional.
  - Se eligió «misericordia» y «compasión» como par paralelo para reproducir la diferencia entre ἔλεον y οἰκτειρμούς.
  - Se usó «asamblea» en lugar de «congregación» como opción principal por ser más neutral y cercana al audit trail inglés.
  - Se mantuvo el orden de las dos finalidades del griego con repetición de «para» para preservar la estructura de propósito.
