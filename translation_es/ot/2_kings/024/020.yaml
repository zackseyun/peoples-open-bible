revisions:
- from: Porque a causa del enojo de Yahvé ocurrió en Jerusalén y en Judá, hasta que los arrojó de su presencia[a]. Y Sedequías se rebeló contra el rey de Babilonia.
  to: Pues por el enojo de Yahvé esto sucedió en Jerusalén y en Judá, hasta que los arrojó de su presencia[a]. Y Sedequías se rebeló contra el rey de Babilonia.
  rationale: Se elimina la redundancia de «Porque a causa de» y se reemplaza por «Pues por», que conserva la función explicativa-causal de manera natural en español. Se añade «esto» para que «sucedió» tenga un sujeto idiomático, reflejando el hebreo comprimido sin sobreinterpretarlo. Se mantiene «Yahvé», «de su presencia» y la segunda cláusula, que ya eran fieles al texto fuente. La nota se actualiza para ofrecer la alternativa más formal documentada en el audit trail y en el hebreo.
