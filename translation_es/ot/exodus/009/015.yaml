translation:
  language: es
  text: Porque ya podría haber extendido mi mano y golpearte[a] a ti y a tu pueblo con pestilencia, y habrías sido exterminado de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Porque ahora he extendido mi mano y te he herido a ti y a tu pueblo con pestilencia, y fuiste exterminado de la tierra». Las formas verbales hebreas son formalmente pasadas, pero el contexto favorece fuertemente un sentido contrafactual.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la explicación de lo que precede. «Porque» expresa bien la relación causal/explanatoria en español sin añadir matiz extra.
- source_word: עַתָּה
  english_pob_choice: by now
  chosen_spanish: ahora mismo
  alternatives_spanish:
  - ya
  - para este momento
  lexicon: HALOT
  rationale: En este contexto contrafactual, la idea no es solo «ahora» sino que algo ya podría haber sucedido; «ahora mismo» conserva esa inmediatez temporal.
- source_word: שָׁלַחְתִּי אֶת־יָדִי
  english_pob_choice: I could have stretched out my hand
  chosen_spanish: habría extendido mi mano
  alternatives_spanish:
  - habría alargado mi mano
  - había extendido mi mano
  - extendí mi mano
  lexicon: HALOT
  rationale: La imagen hebrea de extender la mano para juicio se conserva. En español, el pluscuamperfecto de subjuntivo en una perífrasis contrafactual expresa mejor el sentido potencial que un pretérito simple.
- source_word: וָאַךְ
  english_pob_choice: and struck
  chosen_spanish: y herido
  alternatives_spanish:
  - y golpeado
  - y herido de muerte
  - y castigado
  lexicon: HALOT
  rationale: «Herido» comunica el golpe judicial sin volverse demasiado coloquial; evita el arcaísmo de «herido» como mero daño físico y mantiene la fuerza del juicio divino.
- source_word: אֹתְךָ וְאֶת־עַמְּךָ
  english_pob_choice: you and your people
  chosen_spanish: a ti y a tu pueblo
  alternatives_spanish:
  - a usted y a su pueblo
  - a ti y a tus gentes
  lexicon: HALOT
  rationale: Reproduce de forma directa los objetos del juicio. «A ti y a tu pueblo» es natural y fiel al paralelismo hebreo.
- source_word: בַּדָּבֶר
  english_pob_choice: with pestilence
  chosen_spanish: con pestilencia
  alternatives_spanish:
  - con peste
  - con plaga
  - con enfermedad
  lexicon: HALOT
  rationale: «Pestilencia» reproduce con precisión el término de juicio; se distingue de «plaga» en sentido más amplio y de «enfermedad» por ser demasiado general.
- source_word: וַתִּכָּחֵד
  english_pob_choice: you would have been cut off
  chosen_spanish: habrías sido cortado
  alternatives_spanish:
  - habrías sido exterminado
  - habrías sido borrado
  - habrías perecido
  lexicon: HALOT
  rationale: El verbo refleja la idea de quedar eliminado/arrasado. En español, «ser cortado» conserva la metáfora y la severidad; el complemento «de la tierra» completa el sentido.
- source_word: מִן־הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la faz de la tierra
  - de la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce la amplitud del hebreo אָרֶץ. En este contexto, no conviene restringirlo solo a Egipto.
theological_decisions:
- issue: Lectura contrafactual de los perfectos hebreos
  english_pob_reading: Render the clause as a counterfactual statement ('I could have... and you would have been...')
  chosen_spanish_reading: Usar una formulación contrafactual en español («habría extendido... habrías sido...»).
  alternative_spanish_readings:
  - «Ahora he extendido mi mano y te he herido... y has sido cortado...»
  - «Porque ahora extiendo mi mano y hiero... y eres cortado...»
  rationale: El contexto exige una acción no realizada, no un simple pasado narrativo. El condicional compuesto y el pluscuamperfecto de subjuntivo preservan esa tensión discursiva sin alterar el contenido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de 'la tierra'
  english_pob_reading: from the earth
  chosen_spanish_reading: «de la tierra» sin limitarlo a la tierra de Egipto.
  alternative_spanish_readings:
  - «de la tierra de Egipto»
  - «de este país»
  rationale: El hebreo usa אָרֶץ con alcance amplio; la formulación española debe mantener esa amplitud y no reducirla artificialmente al territorio egipcio.
  doctrine_reference: HALOT, אָרֶץ
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada del POB en inglés: el versículo se entiende de manera contrafactual, no como un pasado simple. No se detectaron cambios en la última pasada; la traducción española refleja esa misma decisión auditada.'
  spanish_consistency_notes:
  - Se mantiene «pestilencia» para בַּדָּבֶר, en coherencia con la elección inglesa.
  - Se conserva «tierra» para אָרֶץ, evitando la restricción a Egipto que no exige el hebreo.
  - La nota [a] ofrece la lectura más formal paralela al recurso del inglés POB, adaptada a la gramática española.
