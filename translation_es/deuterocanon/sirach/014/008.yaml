translation:
  language: es
  text: Malo es el hombre de mirada envidiosa[a], que aparta el rostro y desprecia vidas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de ojo malo». La expresión griega puede aludir a una disposición envidiosa o mezquina.
    reason: lexical_alternative
  - marker: b
    text: O, «almas» o «personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηρὸς
  english_pob_choice: evil
  chosen_spanish: Malo
  alternatives_spanish:
  - Malvado
  - Perverso
  lexicon: BDAG
  rationale: El adjetivo griego caracteriza el estado moral de la persona. En español, "malo" conserva la acusación ética sin sobreactuar; "malvado" o "perverso" sonarían más intensos de lo que exige el proverbio sapiencial.
- source_word: ὁ βασκαίνων ὀφθαλμῷ
  english_pob_choice: the man with an envious eye
  chosen_spanish: el hombre de mirada envidiosa
  alternatives_spanish:
  - el hombre de ojo envidioso
  - el de ojo malo
  - el hombre con un ojo envidioso
  lexicon: BDAG
  rationale: La imagen idiomática se conserva con "mirada envidiosa", que comunica tanto el gesto visual como la disposición de envidia o mezquindad. "Ojo malo" es posible, pero en español puede sonar más opaco o supersticioso sin nota explicativa.
- source_word: ἀποστρέφων πρόσωπον
  english_pob_choice: turning away his face
  chosen_spanish: que aparta el rostro
  alternatives_spanish:
  - que vuelve el rostro
  - que desvía su rostro
  - apartando el rostro
  lexicon: BDAG
  rationale: La frase conserva el gesto concreto de rechazo o reserva. "Aparta el rostro" es natural en español y mantiene la construcción participial del griego sin añadir matices no presentes.
- source_word: ὑπερορῶν
  english_pob_choice: despising
  chosen_spanish: desprecia
  alternatives_spanish:
  - desatiende
  - mira con desdén
  - menosprecia
  lexicon: BDAG
  rationale: El verbo expresa desprecio o mirada despectiva. "Desprecia" reproduce directamente ese valor y corresponde al ajuste revisado en el audit trail inglés, con un registro claro y formal.
- source_word: ψυχάς
  english_pob_choice: lives
  chosen_spanish: vidas
  alternatives_spanish:
  - almas
  - personas
  lexicon: BDAG
  rationale: Siguiendo la decisión auditada de no imponer un sentido técnico de "alma", "vidas" mantiene la referencia concreta a personas vivas o a la vida humana en general. En español, el plural encaja de forma natural con el desprecio hacia los demás.
theological_decisions:
- issue: Idiom of βασκαίνων ὀφθαλμῷ
  english_pob_reading: with an envious eye
  chosen_spanish_reading: de mirada envidiosa
  alternative_spanish_readings:
  - de ojo envidioso
  - con el llamado "mal de ojo"
  rationale: Se preserva el sentido ético de envidia y mezquindad que el audit trail considera central, sin perder del todo la metáfora visual. Se evita cargar el texto principal con una interpretación folclórica o demasiado oscura sin apoyo inmediato del contexto sapiencial.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of ψυχάς
  english_pob_reading: lives
  chosen_spanish_reading: vidas
  alternative_spanish_readings:
  - almas
  - personas
  rationale: La decisión evita trasladar una antropología más técnica de "alma" donde el griego puede referirse simplemente a seres humanos. "Vidas" conserva la amplitud semántica y la concreción del proverbio.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El inglés revisado pasó de 'looking down on lives' a 'despising lives' para reflejar más directamente ὑπερορῶν. En español se adoptó 'desprecia vidas' para conservar esa fuerza despectiva y el paralelismo breve del verso.
  spanish_consistency_notes:
  - Se mantiene "vidas" en el texto principal para seguir la decisión auditada contra una lectura demasiado técnica de ψυχάς.
  - '"Desprecia" fue preferido sobre una formulación más débil como "desatiende" para reflejar la revisión más reciente del audit trail inglés.'
  - Las notas conservan la alternativa idiomática tradicional "ojo malo" sin desplazar la traducción principal, acorde con el tratamiento POB del idiomático básico con nota de opción.
