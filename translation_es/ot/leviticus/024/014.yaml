- from: Saca al que maldijo[a] fuera del campamento, y pongan sus manos sobre su cabeza todos los que oyeron; y toda la congregación lo apedreará.
  to: Saca al que maldijo[a] fuera del campamento, y pongan todos los que oyeron sus manos sobre su cabeza[b], y toda la congregación lo apedree.
  rationale: 'Se corrige la forma verbal final para reflejar mejor la secuencia exhortativa del hebreo y sonar natural en español: «lo apedree» coordina con «pongan» y evita la discordancia de «lo apedreará». También se añade la nota cultural ya preservada en la auditoría inglesa sobre la imposición de manos. El resto del borrador es fiel y claro, por lo que la revisión es menor.'
