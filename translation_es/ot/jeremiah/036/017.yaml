revisions:
- from: 'Y preguntaron a Baruc[a], diciendo: «Por favor, dinos, ¿cómo escribiste todas estas palabras de su boca?»'
  to: 'Y le preguntaron a Baruc[a]: «Por favor, dinos, ¿cómo escribiste todas estas palabras según lo que él dictaba?»'
  rationale: Se ajusta la sintaxis a un español más natural («le preguntaron a Baruc») y se reemplaza la expresión excesivamente literal «de su boca» por una formulación idiomática que expresa claramente el sentido de dictado oral. La literalidad hebrea se conserva en nota, en línea con la auditoría inglesa.
