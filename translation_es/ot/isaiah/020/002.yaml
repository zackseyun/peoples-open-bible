  to: 'En aquel tiempo Yahvé habló por medio de Isaías hijo de Amoz, diciendo: «Ve, quítate el cilicio de la cintura y quítate las sandalias de los pies». Y lo hizo así, caminando desnudo[a] y descalzo.'
