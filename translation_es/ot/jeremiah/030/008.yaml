translation:
  language: es
  text: Y sucederá en aquel día, declara Yahvé de los Ejércitos[b], que romperé su yugo de tu cuello, y arrancaré tus ataduras, y los extranjeros ya no lo harán su esclavo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los extranjeros ya no lo esclavizarán». La cláusula final hebrea está sintácticamente condensada; el sentido es que Israel/Jacob ya no estará sometido a servidumbre extranjera.'
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente, «Yahvé de las huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y ocurrirá
  - Y acontecerá
  lexicon: HALOT
  rationale: Expresa la fórmula profética de futuro de modo natural en español y conserva el tono solemne sin caer en un calco rígido.
- source_word: בַיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Mantiene la fórmula profética fija y su resonancia escatológica, con una preposición natural en español.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: declara Yahvé de los Ejércitos
  alternatives_spanish:
  - oráculo de Yahvé de los Ejércitos
  - declara Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el nombre divino como Yahvé según la norma del proyecto, y צְבָאוֹת se vierte con un término transparente en español que conserva la imagen de poder militar/cósmico.
- source_word: אֶשְׁבֹּר
  english_pob_choice: I will break
  chosen_spanish: romperé
  alternatives_spanish:
  - quebraré
  - partiré
  lexicon: HALOT
  rationale: ‘Romper’ es el equivalente más natural para el quebrantamiento del yugo y transmite bien la acción futura del hebreo.
- source_word: עֻלּוֹ
  english_pob_choice: his yoke
  chosen_spanish: su yugo
  alternatives_spanish:
  - su yugo
  - el yugo de él
  lexicon: HALOT
  rationale: Se mantiene el sentido posesivo del hebreo. En español, ‘su yugo’ resulta natural y deja abierta la referencia al opresor implicado por el contexto.
- source_word: מֵעַל צַוָּארֶךָ
  english_pob_choice: from off your neck
  chosen_spanish: de sobre tu cuello
  alternatives_spanish:
  - de tu cuello
  - de encima de tu cuello
  lexicon: HALOT
  rationale: ‘De sobre’ conserva la imagen física de retirada del yugo y evita suavizar la locución hebrea.
- source_word: וּמוֹסְרוֹתֶיךָ
  english_pob_choice: your bonds
  chosen_spanish: tus ataduras
  alternatives_spanish:
  - tus vínculos
  - tus ligaduras
  - tus cadenas
  lexicon: HALOT
  rationale: ‘Ataduras’ mantiene la imagen de restricción y funciona bien junto a ‘yugo’ en español, sin imponer un matiz más específico que el hebreo no exige.
- source_word: אֲנַתֵּק
  english_pob_choice: I will tear off
  chosen_spanish: arrancaré
  alternatives_spanish:
  - desgarraré
  - separaré
  lexicon: HALOT
  rationale: La idea es desprender con fuerza; ‘arrancaré’ expresa bien la remoción violenta de las ataduras en un castellano claro y digno.
- source_word: וְלֹא יַעַבְדוּ ב֥וֹ עוֹד זָרִים
  english_pob_choice: and foreigners shall no longer make him their slave
  chosen_spanish: y los extranjeros ya no lo someterán a esclavitud
  alternatives_spanish:
  - y los extranjeros ya no lo esclavizarán
  - y los extranjeros ya no le servirán como esclavo
  - y los extranjeros ya no lo harán esclavo
  lexicon: HALOT
  rationale: El hebreo final es sintácticamente comprimido; en contexto de yugo y ataduras, el sentido es liberación de servidumbre. ‘Someterán a esclavitud’ expresa la fuerza del verbo עבד sin forzar una sola imagen literal cuando el objeto del pronombre es semánticamente complejo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La pauta del proyecto exige transliterar el Tetragrámaton como Yahvé en el texto principal para preservar el nombre del pacto y evitar la sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título divino צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Hosts
  - de las huestes
  rationale: ‘Ejércitos’ comunica de modo claro el campo semántico de poder militar/cósmico de צְבָאוֹת y es plenamente inteligible en español bíblico contemporáneo.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Fuerza del verbo עבד en la clausula final
  english_pob_reading: make him their slave
  chosen_spanish_reading: someterán a esclavitud
  alternative_spanish_readings:
  - esclavizarán
  - lo harán su esclavo
  - lo mantendrán en servidumbre
  rationale: En el contexto de yugo, cuello y ataduras, la idea es opresión servil. ‘Someterán a esclavitud’ conserva esa carga sin reducirla a un simple ‘servir’.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés concuerdan ampliamente; se ha preservado la imagen doble de yugo/ataduras y la cláusula final comprimida se ha resuelto en español con una lectura contextual de liberación de esclavitud, sin borrar la tensión sintáctica del original.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como «de los Ejércitos» por transparencia y consistencia con el tono profético.
  - Se conserva la metáfora de yugo y ataduras con vocabulario físicamente vívido y natural en español.
  - La cláusula final se vierte con sentido de esclavitud/liberación, reflejando la sintaxis comprimida del hebreo y la decisión auditada del POB inglés.
