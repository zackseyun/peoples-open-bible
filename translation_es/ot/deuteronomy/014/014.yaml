translation:
  language: es
  text: y todo cuervo[a] según su especie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «raven». El hebreo puede referirse de manera amplia a la familia del cuervo; se opta por «cuervo» como equivalente español natural en esta lista legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - también
  lexicon: HALOT
  rationale: La conjunción hebrea conecta este elemento con la lista anterior de aves prohibidas. En español, 'y' expresa de forma natural esa continuidad sin añadir matiz innecesario.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todos
  lexicon: HALOT
  rationale: Con un sustantivo singular en una lista legal, כָּל tiene valor distributivo. 'Todo cuervo' comunica que la prohibición abarca a la clase completa.
- source_word: עֹרֵב
  english_pob_choice: raven
  chosen_spanish: cuervo
  alternatives_spanish:
  - corneja
  - raven
  lexicon: HALOT
  rationale: El término hebreo puede abarcar el grupo cuervo/cuervo grande. En español, 'cuervo' es el equivalente natural y amplio; evita un tecnicismo zoológico innecesario y conserva la posibilidad de referencia general al género de aves.
- source_word: לְמִינוֹ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su clase
  - de acuerdo con su especie
  lexicon: HALOT
  rationale: La expresión clasifica por tipo o categoría. 'Según su especie' preserva el sentido formal de clasificación y es idiomático en español moderno sin perder precisión.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo base y con el audit trail inglés: la única decisión relevante es léxica, especialmente la amplitud semántica de עֹרֵב y la clasificación por לְמִינוֹ. No se requieren revisiones textuales.'
  spanish_consistency_notes:
  - Se mantiene un español breve y sobrio, acorde con una lista legal.
  - Se evita 'según su género' por posible ambigüedad y se prefiere 'según su especie' para reflejar la clasificación hebrea.
  - La nota al pie conserva la alternativa semántica documentada sin introducir terminología eclesiástica.
