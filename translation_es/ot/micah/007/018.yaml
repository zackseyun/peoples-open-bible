translation:
  language: es
  text: ¿Quién es un Dios[a] como tú, que lleva la iniquidad[b] y pasa por alto la transgresión para el remanente de su heredad? No retiene su enojo para siempre, porque se deleita en el amor fiel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘¿Quién es Dios como tú?’; el hebreo formula una pregunta retórica de incomparabilidad.
    reason: alternative_reading
  - marker: b
    text: O ‘que perdona la iniquidad’. El hebreo más literalmente dice ‘que lleva la iniquidad’.
    reason: lexical_alternative
  - marker: c
    text: ‘Amor fiel’ traduce el hebreo חֶסֶד, un término pactual que también puede traducirse ‘misericordia’ o ‘amor de pacto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי אֵל כָּמוֹךָ
  english_pob_choice: Who is a God like you
  chosen_spanish: ¿Quién es un Dios como tú?
  alternatives_spanish:
  - ¿Quién es Dios como tú?
  - ¿Quién es un dios como tú?
  lexicon: HALOT
  rationale: La pregunta es retórica y expresa incomparabilidad. En español, ‘¿Quién es un Dios como tú?’ conserva el sentido predicativo y la referencia al Dios de Israel en el contexto. ‘Un dios’ sería posible gramaticalmente, pero en este contexto atenúa indebidamente la referencia teológica.
- source_word: נֹשֵׂא עָוֹן
  english_pob_choice: bearing iniquity
  chosen_spanish: que perdona la iniquidad
  alternatives_spanish:
  - que lleva la iniquidad
  - que carga con la iniquidad
  - que soporta la iniquidad
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘llevar/cargar iniquidad’, pero en este giro idiomático el sentido es remover el pecado culpable mediante perdón. En español, ‘que perdona la iniquidad’ comunica mejor la fuerza del modismo sin borrar que la imagen literal está detrás del texto.
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: ‘Iniquidad’ conserva el peso moral del término hebreo y mantiene su distinción frente a פֶּשַׁע. ‘Culpa’ o ‘pecado’ nivelarían demasiado el matiz.
- source_word: וְעֹבֵר עַל פֶּשַׁע
  english_pob_choice: and passing over transgression
  chosen_spanish: y pasa por alto la transgresión
  alternatives_spanish:
  - y pasa sobre la transgresión
  - y perdona la transgresión
  - y deja pasar la rebelión
  lexicon: HALOT
  rationale: ‘Pasar por alto’ es un equivalente natural en español para el valor de עָבַר עַל aquí. Conserva la imagen verbal de ‘pasar sobre/por encima’ y distingue este miembro del precedente. ‘Perdona’ sería interpretativo y menos transparente.
- source_word: פֶּשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebelión
  - ofensa
  lexicon: HALOT
  rationale: ‘Transgresión’ reproduce bien el matiz de ruptura o rebeldía deliberada. Se mantiene la distinción con עָוֹן, que en el texto no es mero repetido de ‘pecado’.
- source_word: לִשְׁאֵרִית נַחֲלָתוֹ
  english_pob_choice: for the remnant of his inheritance
  chosen_spanish: para el remanente de su heredad
  alternatives_spanish:
  - para el remanente de su herencia
  - para el resto de su posesión
  lexicon: HALOT
  rationale: ‘Remanente’ conserva el término profético clave, y ‘heredad’ refleja con naturalidad el campo semántico de נַחֲלָה en lenguaje de pacto. ‘Herencia’ es posible, pero ‘heredad’ suena más sobria y bíblicamente precisa en español.
- source_word: לֹא הֶחֱזִיק לָעַד אַפּוֹ
  english_pob_choice: He does not retain his anger forever
  chosen_spanish: No retiene su enojo para siempre
  alternatives_spanish:
  - No guarda su ira para siempre
  - No mantiene su ira para siempre
  - No conserva su enojo para siempre
  lexicon: HALOT
  rationale: הֶחֱזִיק expresa retener o mantener. ‘Retiene’ es formal y fiel, como en la revisión inglesa. ‘Enojo’ comunica el modismo de אַף con más naturalidad actual que ‘ira’, aunque ‘ira’ también sería posible.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su enojo
  alternatives_spanish:
  - su ira
  - su furor
  lexicon: HALOT
  rationale: Aunque literalmente el hebreo dice ‘su nariz’, el modismo refiere a la ira. ‘Enojo’ resulta claro y sobrio en español contemporáneo; ‘ira’ sería más fuerte, pero menos natural en este contexto.
- source_word: כִּי חָפֵץ חֶסֶד הוּא
  english_pob_choice: because he delights in steadfast love
  chosen_spanish: porque se deleita en la misericordia
  alternatives_spanish:
  - porque se deleita en el amor constante
  - porque se complace en la fidelidad amorosa
  - porque ama la misericordia
  lexicon: HALOT
  rationale: חָפֵץ indica deleite o complacencia. Para חֶסֶד, ‘misericordia’ es una opción legítima y muy comprensible en español; aunque ‘amor constante’ o ‘amor leal’ podrían reflejar mejor la dimensión pactal, aquí ‘misericordia’ preserva la amplitud semántica y la resonancia bíblica sin volver la frase forzada.
theological_decisions:
- issue: Cómo renderizar חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor constante
  - amor leal
  - misericordia constante
  rationale: La POB inglesa eligió ‘steadfast love’ para conservar la densidad pactal de חֶסֶד sin reducirla a una sola dimensión. En español, ‘misericordia’ es la forma más estable y reconocible para lectores eclesiales, y sigue siendo compatible con el marco de fidelidad pactual del versículo. No se usa como si fuera solo emoción, sino como atributo relacional de Yahvé.
  doctrine_reference: Translation philosophy §5; readable modern Spanish §6
- issue: Mantener la distinción entre עָוֹן y פֶּשַׁע
  english_pob_reading: iniquity ... transgression
  chosen_spanish_reading: iniquidad ... transgresión
  alternative_spanish_readings:
  - pecado ... pecado
  - culpa ... rebelión
  - iniquidad ... rebelión
  rationale: El hebreo usa dos términos distintos para el mal humano. En español, ‘iniquidad’ y ‘transgresión’ preservan esa diferencia sin forzar una distinción doctrinal excesiva. Así se evita aplanar el paralelismo y se conserva la textura del texto fuente.
  doctrine_reference: Translation philosophy §1 y §5
- issue: Relación entre la imagen literal de ‘llevar’ y el sentido de perdonar
  english_pob_reading: bearing iniquity
  chosen_spanish_reading: que perdona la iniquidad
  alternative_spanish_readings:
  - que lleva la iniquidad
  - que carga con la iniquidad
  - que borra la iniquidad
  rationale: La tensión del hebreo entre imagen corporal y sentido redentor debe mantenerse en el análisis, aunque la línea principal en español privilegia la claridad comunicativa. ‘Perdona’ expresa el valor resultante del modismo y evita que el lector español entienda solo una metáfora física aislada.
  doctrine_reference: Translation philosophy §1; readable modern Spanish §6
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de Miqueas 7:18 y toma en cuenta la revisión inglesa más reciente, que prefirió ‘retain’ sobre una forma menos formal. En español se ha reflejado con ‘retiene’. También se mantuvo la distinción léxica del paralelismo y se tradujo חֶסֶד de manera natural para lectores hispanohablantes, sin ocultar en notas su alcance pactal.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en el proyecto, pero en este versículo el hebreo aparece como ‘Dios’ en la pregunta retórica; por eso no se introdujo ‘Yahvé’ en el texto principal.
  - Se mantiene ‘remanente’ para שְׁאֵרִית y ‘heredad’ para נַחֲלָה, en coherencia con el lenguaje profético y de pacto.
  - ‘Retiene’ para הֶחֱזִיק sigue la revisión inglesa más reciente y conserva un tono formal.
  - Se conservó la dicotomía ‘iniquidad / transgresión’ para no aplanar el paralelismo hebreo.
