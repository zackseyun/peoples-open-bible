translation:
  language: es
  text: Y el incienso que hagas según su composición[a], no lo harán para ustedes[b]; será santo para ti, dedicado a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘según su fórmula’ o ‘según sus proporciones’.
    reason: lexical_alternative
  - marker: b
    text: Es decir, esta mezcla sagrada de incienso no debía reproducirse para uso personal u ordinario.
    reason: cultural_note
lexical_decisions:
- source_word: הַקְּטֹרֶת
  english_pob_choice: the incense
  chosen_spanish: el incienso
  alternatives_spanish:
  - el incienso aromático
  lexicon: HALOT
  rationale: ‘Incienso’ es el equivalente natural y suficiente para la mezcla sagrada del contexto. Añadir ‘aromático’ introduciría un rasgo no expresado explícitamente en este verso.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: that you make
  chosen_spanish: que hagas
  alternatives_spanish:
  - que harás
  - que tú hagas
  lexicon: HALOT
  rationale: El relativo con el verbo עשה se vierte de manera directa y natural en español con ‘que hagas’, preservando el sentido de fabricación/elaboración.
- source_word: בְּמַתְכֻּנְתָּהּ
  english_pob_choice: according to its composition
  chosen_spanish: según su composición
  alternatives_spanish:
  - según su fórmula
  - según sus proporciones
  lexicon: HALOT
  rationale: ‘Composición’ comunica bien la idea de la mezcla o manera prescrita de preparar el incienso, sin cargar el texto con un tecnicismo innecesario. ‘Fórmula’ y ‘proporciones’ siguen siendo alternativas posibles, pero ‘composición’ conserva mejor el tono bíblico y claro.
- source_word: לֹא תַעֲשׂוּ לָכֶם
  english_pob_choice: you shall not make for yourselves
  chosen_spanish: no lo haréis para ustedes
  alternatives_spanish:
  - no lo harán para sí mismos
  - no harán de él para su uso
  lexicon: HALOT
  rationale: Se mantiene la prohibición plural con el matiz reflexivo/dativo. ‘Para ustedes’ conserva la forma cercana al hebreo y deja claro que no debía producirse para uso personal u ordinario sin explicitar de más.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: En español, ‘santo’ suena natural y fuerte como predicado de estado sagrado. ‘Sagrado’ o ‘consagrado’ son posibles, pero ‘santo’ preserva mejor la densidad religiosa del término en este contexto.
- source_word: תִּהְיֶה לְךָ
  english_pob_choice: it shall be holy to you
  chosen_spanish: santo será para ti
  alternatives_spanish:
  - será santo para ti
  - será para ti como cosa santa
  lexicon: HALOT
  rationale: La construcción se refiere al estatus de la mezcla para el receptor singular/representativo. ‘Santo será para ti’ mantiene la relación y la valoración cultual sin sobreexplicar.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ‘Yahvé’. ‘Para’ expresa adecuadamente dedicación o pertenencia cultual en este contexto.'
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto pide ‘Yahvé’ en el cuerpo principal. Se evita el reemplazo por ‘SEÑOR’ para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor cultual de קֹדֶשׁ aplicado al incienso
  english_pob_reading: it shall be holy to you for Yahweh
  chosen_spanish_reading: santo será para ti para Yahvé
  alternative_spanish_readings:
  - será santo para ti para Yahvé
  - será cosa santa para ti para Yahvé
  rationale: ‘Santo’ conserva la categoría cultual del objeto y evita diluirla en una paráfrasis. La formulación mantiene la tensión entre uso exclusivo y pertenencia a Yahvé.
  doctrine_reference: 'Lexical-theological consistency: sacred set-apart status'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el trazado auditado en inglés, pero ajusta la sintaxis para un español natural. Se conservan las dos notas del POB inglés: la ambigüedad de בְּמַתְכֻּנְתָּהּ y la restricción de uso personal del incienso.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ consistentemente para יהוה, conforme a la política del proyecto.
  - ‘incienso’ se mantiene sin adjetivos añadidos para no ampliar el sentido del hebreo.
  - ‘santo’ traduce קֹדֶשׁ de manera cultual y no moralizante.
  - 'La cláusula final conserva el matiz de dedicación: ‘para Yahvé’.'
