  to: Por eso, yo entregaré sus esposas a otros, sus campos a los que los poseerán[a]; porque desde el menor hasta el mayor, cada uno codicia ganancias injustas[b]; desde el profeta hasta el sacerdote, cada uno practica la falsedad[c].
  rationale: 'Se corrigen tres puntos: (1) se reancla la nota [a] al segmento que realmente comenta, ''a los que los poseerán''; (2) se cambia ''sus mujeres'' por ''sus esposas'' para reflejar claramente el sentido contextual de נְשֵׁיהֶם; y (3) se ajusta ''todos ellos'' a ''cada uno'' para preservar la fuerza distributiva de כֻּלֹּה, con una redacción más natural en español. No se requiere adjudicación adicional porque las correcciones son directas y bien respaldadas por la evidencia fuente y el audit trail.'
