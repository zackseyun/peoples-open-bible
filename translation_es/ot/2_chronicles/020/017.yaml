base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/017.yaml
  text: You will not need to fight in this battle[a]. Take your positions, stand still, and see the salvation of Yahweh with you, O Judah and Jerusalem. Do not fear or be dismayed. Tomorrow go out before them[b], and Yahweh is with you.
  footnotes:
  - marker: a
    text: Or 'the deliverance of the LORD.' The Hebrew term can refer to rescue in battle as well as salvation more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD will be with you.' The Hebrew clause has no explicit verb, and English may express the assurance as present or future.
    reason: lexical_alternative
