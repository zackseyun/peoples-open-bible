id: PHP.2.9
reference: Philippians 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὸ καὶ ὁ θεὸς αὐτὸν ὑπερύψωσεν, καὶ ἐχαρίσατο αὐτῷ ⸀τὸ ὄνομα τὸ ὑπὲρ πᾶν ὄνομα,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/009.yaml
  text: 'Therefore God also highly exalted him and graciously gave him the name that is above every name,'
translation:
  language: ko
  text: 그러므로 하나님께서도 그분을 지극히 높이시고[a], 모든 이름 위에 있는 그 이름[b]을 은혜로 그분께 주셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「가장 높은 자리에 올리시고」. 헬라어 ὑπερύψωσεν은 복합 동사로 강조된 「높이심」을 뜻한다.
    reason: lexical_alternative
  - marker: b
    text: 「그 이름」은 단순히 발음되는 이름만이 아니라 신분·지위·칭호를 함의한다. 본 절 자체는 그 이름이 무엇인지 아직 명시하지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ καὶ
  english_pob_choice: Therefore ... also
  chosen_korean: 그러므로 ~도
  alternatives_korean:
  - 그러므로 또한
  - 이런 까닭에 ~도
  lexicon: BDAG
  rationale: 추론의 διό와 추가의 καί를 자연스러운 한국어 어순으로 보존한다. 메시아의 자기 낮춤(8절)에 대한 하나님의 응답을 「~도」로 표시한다.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_korean: 하나님
  lexicon: BDAG
  rationale: 글로사리 기본형. 한국 개신교 전통의 「하나님」을 유지한다.
- source_word: ὑπερύψωσεν
  english_pob_choice: highly exalted
  chosen_korean: 지극히 높이시다
  alternatives_korean:
  - 가장 높이 올리시다
  - 극도로 높이시다
  lexicon: BDAG
  rationale: 글로사리에 따라 ὑψόω는 「높이다」로 옮기며, ὑπερ-의 강조를 「지극히」로 살린다. 8절의 「자기를 낮추셔서」(ἐταπείνωσεν)와의 신학적 대조를 한국어에서도 분명히 드러낸다.
- source_word: ἐχαρίσατο
  english_pob_choice: graciously gave
  chosen_korean: 은혜로 주시다
  alternatives_korean:
  - 베푸시다
  - 하사하시다
  lexicon: BDAG
  rationale: 동사가 χάρις(은혜)와 어원적으로 연결되어 있다. 「은혜로 주시다」가 그 함의를 자연스럽게 드러낸다.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_korean: 그 이름
  alternatives_korean:
  - 그 칭호
  - 그 이름 자체
  lexicon: BDAG
  rationale: 본문은 단순히 「이름」을 말하므로, 「칭호」로 미리 해석하지 않고 「그 이름」으로 보존한다.
- source_word: τὸ ὑπὲρ πᾶν ὄνομα
  english_pob_choice: that is above every name
  chosen_korean: 모든 이름 위에 있는
  alternatives_korean:
  - 모든 이름보다 높은
  - 만유의 이름 위의
  lexicon: BDAG
  rationale: 비교 구조를 그대로 보존하면서 한국어로 자연스럽게 옮긴다.
theological_decisions:
- issue: '「그 이름」의 정체'
  chosen_reading: 본문에서 「그 이름」을 명시적으로 규정하지 않고 보존
  alternative_readings:
  - 「예수」라는 이름으로 명시
  - 「주(主)」라는 칭호로 명시 (이어지는 절들로부터의 추론)
  rationale: 본 절 자체는 그 이름이 무엇인지 밝히지 않으므로, 번역도 본문의 열려 있음을 보존하고 10·11절의 해석적 결론을 9절에 미리 끌어오지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
