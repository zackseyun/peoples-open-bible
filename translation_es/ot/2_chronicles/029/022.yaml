translation:
  language: es
  text: Entonces degollaron el ganado[a], y los sacerdotes recibieron la sangre y la salpicaron contra el altar[b]. Degollaron los carneros y salpicaron la sangre contra el altar. Degollaron los corderos y salpicaron la sangre contra el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Ganado’ traduce un término hebreo colectivo para animales bovinos; algunas versiones especifican ‘toros’ por el contexto sacrificial.
    reason: lexical_alternative
  - marker: b
    text: O ‘salpicaron la sangre sobre el altar’ o ‘arrojaron la sangre contra el altar’. El verbo hebreo denota una aplicación ritual vigorosa de la sangre, no una aspersión ligera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: they slaughtered
  chosen_spanish: degollaron
  alternatives_spanish:
  - sacrificaron
  - sacrificaron mediante degüello
  - mataron ritualmente
  lexicon: HALOT
  rationale: En contexto sacrificial, שׁחט no es simplemente 'matar', sino efectuar un degüello ritual. 'Degollaron' conserva la acción concreta y el sentido cultual sin volver la frase pesada.
- source_word: הַבָּקָר
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - los bovinos
  - los becerros
  - los toros
  lexicon: HALOT
  rationale: בקר es un colectivo de animales bovinos. 'El ganado' refleja mejor el valor colectivo del hebreo sin especificar sexo o edad. 'Toros' o 'becerros' serían más restrictivos de lo que el hebreo exige.
- source_word: וַיְקַבְּלוּ
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - recogieron
  - tomaron
  - captaron
  lexicon: HALOT
  rationale: קבל significa primariamente 'recibir'. Aunque el contexto ritual implica una recepción para uso litúrgico, 'recibieron' mantiene la fidelidad directa y deja que el contexto aclare la función.
- source_word: וַיִּזְרְקוּ
  english_pob_choice: splashed it against / splashed the blood against
  chosen_spanish: la rociaron
  alternatives_spanish:
  - la asperjaron
  - la lanzaron contra
  - la echaron contra
  lexicon: HALOT
  rationale: זרק en ritos sacrificiales describe la aplicación ritual de la sangre al altar. 'Rociaron' comunica la acción ritual de manera natural en español, sin debilitar innecesariamente su fuerza; se evita 'asperjaron' por sonar más técnico eclesiástico que el hebreo.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: against the altar
  chosen_spanish: contra el altar
  alternatives_spanish:
  - sobre el altar
  - al altar
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia el altar y, en este rito, la sangre se aplica sobre su superficie o lado. 'Contra el altar' conserva la dirección y la fuerza del gesto, en línea con la elección inglesa.
- source_word: הָאֵלִים
  english_pob_choice: the rams
  chosen_spanish: los carneros
  alternatives_spanish:
  - los machos de carnero
  - los borregos
  lexicon: HALOT
  rationale: אילים corresponde a 'rams'; en español bíblico 'carneros' es claro y preciso. 'Borregos' sería menos exacto porque puede sugerir animales más jóvenes.
- source_word: הַכְּבָשִׂים
  english_pob_choice: the lambs
  chosen_spanish: los corderos
  alternatives_spanish:
  - las ovejas
  - los borregos
  lexicon: HALOT
  rationale: כבשים en listas sacrificiales suele referirse a corderos o ovejas jóvenes. 'Corderos' es la opción más natural y cultualmente precisa en español.
theological_decisions:
- issue: Rito sacrificial y verbo de aplicación de la sangre
  english_pob_reading: The blood is ritually applied to the altar; 'splashed' reflects forceful sacrificial action, not a light sprinkling.
  chosen_spanish_reading: La sangre fue aplicada ritualmente al altar; 'rociaron' intenta expresar una acción ritual enérgica sin suavizarla a una simple aspersión débil.
  alternative_spanish_readings:
  - la asperjaron contra el altar
  - la lanzaron contra el altar
  - la esparcieron sobre el altar
  rationale: El hebreo זרק en este contexto exige una acción cultual de aplicación de sangre con fuerza. 'Rociaron' es el mejor equilibrio entre fidelidad semántica y legibilidad en español; mantiene el carácter ritual sin convertir la frase en tecnicismo innecesario.
  doctrine_reference: Levítico 1–7; Hebreos 9:19–22
- issue: Término colectivo bovino
  english_pob_reading: '''Cattle'' renders a collective Hebrew term for bovine animals; some translations specify ''bulls'' from the sacrificial context.'
  chosen_spanish_reading: '''El ganado'' conserva el valor colectivo de בקר sin imponer una especificación más estrecha.'
  alternative_spanish_readings:
  - los toros
  - los becerros
  - el ganado bovino
  rationale: El hebreo permite una referencia colectiva amplia. En español, 'ganado' evita forzar la imagen a toros adultos o becerros jóvenes, preservando la amplitud del original.
  doctrine_reference: HALOT, בקר
- issue: Secuencia tripartita de animales sacrificados
  english_pob_reading: Cattle, rams, and lambs are listed in order.
  chosen_spanish_reading: Ganado, carneros y corderos conserva el orden y la progresión del texto hebreo.
  alternative_spanish_readings:
  - toros, carneros y corderos
  - ganado, machos carneros y corderos
  rationale: La enumeración refleja una progresión sacrificial clara. Mantenerla en español ayuda a respetar la forma del versículo sin añadir interpretación.
  doctrine_reference: 2 Crónicas 29:22
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que cambió 'threw' por 'splashed' para reflejar mejor el verbo ritual de aplicación de sangre. En español, se evitó una traducción demasiado técnica y se eligió 'rociaron' para conservar el carácter cultual y la naturalidad. También se respetó la decisión de traducir el término bovino de forma colectiva, sin forzarlo a 'toros'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando el texto lo requiera en esta línea editorial, pero este versículo no contiene el nombre divino.
  - Se usa 'altar' de forma constante para מִזְבֵּחַ, evitando variantes como 'sacrificio' o 'mesa del altar'.
  - Se conserva el paralelismo verbal de tres acciones consecutivas para reflejar la cadencia del hebreo.
  - La nota al pie se ancla en 'ganado' porque allí aparece la posible ambigüedad colectiva del hebreo.
