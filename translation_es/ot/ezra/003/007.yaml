base_translation:
  language: en
  yaml_path: translation/ot/ezra/003/007.yaml
  text: So they gave money to the stonecutters and to the craftsmen[a], and food and drink and oil to the Sidonians and the Tyrians, to bring cedar logs from Lebanon to the sea at Joppa[c][b], according to the authorization of Cyrus king of Persia for them.
  footnotes:
  - marker: a
    text: Or 'silver' instead of 'money.' The Hebrew term can denote the metal itself or money in a payment context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the port of Joppa.' Literally, 'to the sea of Joppa.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the permission/grant of Cyrus king of Persia to them.'
    reason: lexical_alternative
