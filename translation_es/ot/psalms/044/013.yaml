translation:
  language: es
  text: Tú vendes a tu pueblo sin ganancia[a], y no has obtenido ganancia con su precio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú vendiste a tu pueblo por nada, y no obtuviste ganancia de su precio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְכֹּר
  english_pob_choice: you sell
  chosen_spanish: tú vendes
  alternatives_spanish:
  - tú vendiste
  - vendes
  lexicon: HALOT
  rationale: El imperfecto hebreo en poesía puede expresar una acción presente o vivida; en español, el presente mantiene la inmediatez del lamento y sigue de cerca la decisión auditada del POB inglés.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: HALOT
  rationale: ‘Pueblo’ preserva la relación de pacto y pertenencia entre Dios e Israel mejor que ‘nación’, que suena más político. ‘Tu gente’ sería posible, pero menos preciso en este contexto.
- source_word: בְּלֹא הוֹן
  english_pob_choice: for no gain
  chosen_spanish: por nada
  alternatives_spanish:
  - sin ganancia
  - por ningún provecho
  - sin riqueza
  lexicon: HALOT
  rationale: El sustantivo הוֹן expresa riqueza o valor material, pero la revisión inglesa prefirió ‘no gain’ por naturalidad y precisión contextual. En español, ‘por nada’ comunica bien la falta de beneficio y conserva la fuerza negativa sin sonar rígido.
- source_word: וְלֹא
  english_pob_choice: and ... not
  chosen_spanish: y no
  alternatives_spanish:
  - ni
  - y tampoco
  lexicon: HALOT
  rationale: La coordinación simple con negación refleja la estructura hebrea del paralelismo sin introducir una expansión innecesaria.
- source_word: רִבִּיתָ
  english_pob_choice: you have not increased
  chosen_spanish: has aumentado
  alternatives_spanish:
  - no has aumentado
  - no has obtenido ganancia
  - no has acrecentado
  lexicon: HALOT
  rationale: El verbo רבה en piel conserva la idea de aumentar o hacer crecer. ‘Has aumentado’ mantiene la imagen verbal; el contexto de la frase da la idea de no haber obtenido beneficio.
- source_word: בִּמְחִירֵיהֶם
  english_pob_choice: by their price
  chosen_spanish: por su precio
  alternatives_spanish:
  - con su precio
  - a causa de su precio
  - de su precio
  lexicon: HALOT
  rationale: מְחִיר significa precio de compra/venta. La preposición ב permite un valor instrumental o de medio; ‘por su precio’ es natural en español y conserva la relación causal/instrumental de la expresión hebrea.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió ‘for no wealth’ a ‘for no gain’; por eso el español evita una traducción demasiado literal de הוֹן como ‘riqueza’ en el texto principal, aunque esa idea queda implícita en la nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo ‘tú’ y el verbo en segunda persona singular para reflejar el адресo directo a Dios del hebreo.
  - ‘Precio’ se conservó para מְחִירֵיהֶם, evitando ‘pago’ o ‘venta’ para no borrar la imagen económica del original.
  - No se introdujo ‘SEÑOR’ ni ‘Cristo’; el verso no contiene esos términos ni requerimientos contextuales especiales.
