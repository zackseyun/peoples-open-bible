translation:
  language: es
  text: Y muchos del pueblo se unieron a ellos, todos los que abandonaban la ley; e hicieron el mal en la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνηθροίσθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: LSJ
  rationale: El aoristo pasivo/medio en contexto describe la incorporación de muchos a un grupo ya formado. «Se reunieron» conserva la idea de convergencia colectiva sin forzar una voz más interpretativa.
- source_word: ἀπὸ τοῦ λαοῦ
  english_pob_choice: from the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de entre el pueblo
  - entre el pueblo
  lexicon: LSJ
  rationale: La frase señala que procedían de dentro del pueblo judío. «Del pueblo» es natural en español y mantiene el origen interno sin añadir matiz no explicitado.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: con ellos
  alternatives_spanish:
  - hacia ellos
  - a ellos
  lexicon: LSJ
  rationale: Aunque πρός con acusativo puede expresar movimiento hacia, aquí el sentido global es adhesión/alineación al grupo. «Con ellos» comunica la unión resultante de modo fluido en español, sin perder la referencia al movimiento hacia ese bando.
- source_word: πᾶς ὁ ἐγκαταλείπων τὸν νόμον
  english_pob_choice: everyone who abandoned the law
  chosen_spanish: todos los que abandonaban la ley
  alternatives_spanish:
  - todos los que abandonaron la ley
  - cada uno que abandonaba la ley
  lexicon: LSJ
  rationale: El participio presente articular caracteriza al grupo por una acción de abandono que los define. «Abandonaban» preserva ese valor aspectual mejor que un pasado puntual, y «la ley» conserva el referente covenantal de la Torá en contexto.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: En 1 Macabeos el término remite a la ley judía/torá. «La ley» es claro y sobrio en español; se evita capitalizar sin necesidad porque el contexto ya delimita el referente.
- source_word: ἐποίησαν κακὰ
  english_pob_choice: did evil
  chosen_spanish: hicieron males
  alternatives_spanish:
  - hicieron el mal
  - cometieron males
  lexicon: LSJ
  rationale: El giro griego es un idiomatismo de conducta perversa. «Hicieron males» reproduce de forma cercana la pluralidad moral del griego (κακὰ) y mantiene el paralelo con la construcción simple del original.
- source_word: ἐν τῇ γῇ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra del país
  lexicon: LSJ
  rationale: γῆ aquí alude a la tierra de Judea/Israel, no a la tierra en sentido abstracto o cósmico. «En la tierra» conserva el sentido geográfico-bíblico amplio y corresponde bien a la formulación del texto fuente.
theological_decisions:
- issue: Referencia de 'la ley' (τὸν νόμον) como objeto de abandono
  english_pob_reading: the Jewish covenantal law/Torah
  chosen_spanish_reading: la ley como la Torá/ley del pacto de Israel
  alternative_spanish_readings:
  - la ley en sentido genérico
  - la Ley (con mayúscula)
  rationale: En 1 Macabeos, abandonar «la ley» no es una mera infracción legal, sino una marca de apostasía frente a la tradición del pacto bajo presión helenizante. El español mantiene «la ley» y la nota doctrinal precisa su referencia sin introducir una glosa intrusiva en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y armoniza con la revisión inglesa reciente que prefirió un pasado simple más natural para la acción de abandonar la ley. En español se optó por un imperfecto («abandonaban») para preservar el valor descriptivo del participio presente griego y la caracterización continua del grupo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa del tetragrámaton.
  - Se mantuvo «la ley» en minúscula para conservar el estilo sobrio y el referente contextual a la Torá sin sobredeterminarlo tipográficamente.
  - «Hicieron males» refleja el plural griego κακὰ y conserva una resonancia bíblica natural en español.
  - «En la tierra» mantiene el marco geográfico del texto y no lo universaliza a 'el mundo'.
