translation:
  language: es
  text: Yahvé, libra mi alma[a] de labios mentirosos[b], de una lengua engañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi alma» también puede entenderse como «mí», «mi vida» o «mi persona».
    reason: lexical_alternative
  - marker: b
    text: 'También: «de labios de falsedad»; «de una lengua de engaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según el criterio del proyecto. «Yahvé» mantiene la referencia personal del Tetragrama sin sustituirlo por un título.
- source_word: הַצִּילָה
  english_pob_choice: deliver
  chosen_spanish: libra
  alternatives_spanish:
  - delibra
  - rescata
  - sálvame
  lexicon: HALOT
  rationale: El imperativo de נצל en una súplica pide liberación o rescate. «Libra» es natural en español bíblico y conserva el tono de oración.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mí
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o persona. «Mi alma» preserva el paralelismo poético y el registro del salmo, sin cerrar la posible referencia al yo entero.
- source_word: מִשְּׂפַת שֶׁקֶר
  english_pob_choice: from lying lips
  chosen_spanish: de labios mentirosos
  alternatives_spanish:
  - de labios de mentira
  - de labios de falsedad
  - de labios falsos
  lexicon: HALOT
  rationale: שׂפה significa literalmente «labio/lips» y funciona metonímicamente por habla. En español, «labios mentirosos» expresa con naturalidad la falsedad de la խոսa sin perder la imagen poética.
- source_word: מִלָּשׁוֹן רְמִיָּה
  english_pob_choice: from a deceitful tongue
  chosen_spanish: de una lengua engañosa
  alternatives_spanish:
  - de una lengua de engaño
  - de una lengua mentirosa
  - de una lengua fraudulenta
  lexicon: HALOT
  rationale: לשון se conserva como «lengua» para mantener el paralelo con «labios». רמיה denota engaño o astucia fraudulenta; «engañosa» transmite bien esa cualidad en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue el principio del proyecto de transliterar el nombre divino en vez de ocultarlo tras un título. «Yahvé» es la forma estándar en español para esa decisión editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh'
translation_notes:
  revision_awareness: El paso de revisión final indicó alta concordancia y ningún cambio necesario; la versión española conserva la misma estructura poética y las mismas alternativas léxicas principales del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene el paralelismo «labios / lengua» para reflejar la poesía hebrea.
  - Se preserva el tono de súplica directa con vocativo inicial.
  - Se evita sustituir el nombre divino por una sigla o título.
  - La formulación es de registro bíblico moderno, no arcaizante.
