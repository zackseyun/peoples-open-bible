revisions:
- from: 'Él dijo[a]: «El que mostró misericordia con él». Entonces Jesús le dijo: «Ve, y haz tú también lo mismo».'
  to: 'Él dijo[a]: «El que tuvo misericordia de él». Entonces Jesús le dijo: «Ve, y haz lo mismo».'
  rationale: Se ajusta el español para expresar con fidelidad y naturalidad el sentido idiomático de ποιήσας τὸ ἔλεος μετ’ αὐτοῦ. «Tuvo misericordia de él» suena más natural y exacto en español que «mostró misericordia con él». También se simplifica el mandato final a «haz lo mismo», que preserva el sentido de ὁμοίως sin redundancia innecesaria.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:57:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: La traducción refleja fielmente el griego. ὁ ποιήσας τὸ ἔλεος μετ’ αὐτοῦ → «El que tuvo misericordia de él» (idiomático y fiel). Πορεύου καὶ σὺ ποίει ὁμοίως → «Ve, y tú haz lo mismo». El pronombre σὺ (καὶ σὺ) está ahora presente en español como «tú» para reflejar el énfasis del griego y espejarse con el EN POB «Go, and you do likewise». La circunlocución intencional «El que…» preserva la reticencia del letrado a nombrar al samaritano.
  spanish_quality_summary: El español es claro, natural y digno. «Tuvo misericordia de él» es idiomático y correcto. «Ve, y tú haz lo mismo» expresa el énfasis de σὺ con naturalidad española sin ser redundante. La nota [a] documenta correctamente el giro idiomático del griego.
  glossary_alignment: ἔλεος → «misericordia» (peso moral y relacional preservado). ὁμοίως → «lo mismo» (adverbio comparativo natural). No hay conflictos terminológicos.
  issues:
  - severity: low
    issue: La versión previa omitía el pronombre σὺ (καὶ σὺ) del mandato final.
    rationale: El griego dice explícitamente καὶ σὺ ποίει, y el EN POB restauró «and you do likewise». Se añade «tú» en la cláusula final para reflejar ese énfasis sin sobrecargar el español.
  revised_spanish_text: ‘Él dijo[a]: «El que tuvo misericordia de él». Entonces Jesús le dijo: «Ve, y tú haz lo mismo».’
  revised_footnotes:
  - marker: a
    text: Literalmente, «el que hizo la misericordia con él», un giro idiomático que significa «el que tuvo misericordia de él».
    reason: lexical_alternative
  revision_rationale: Se añade el pronombre «tú» en «Ve, y tú haz lo mismo» para reflejar el καὶ σὺ del griego y el «and you» del EN POB (doctrine-realignment).
