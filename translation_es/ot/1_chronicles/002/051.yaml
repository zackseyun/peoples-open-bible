translation:
  language: es
  text: Salma[a], el padre de Belén; Haref[b], el padre de Bet-gader.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fundador de» o «antepasado de» para «padre de»; en listas genealógicas este término puede designar el fundador de un clan o de una ciudad, no solo al padre biológico inmediato.
    reason: lexical_alternative
  - marker: b
    text: «Haref» refleja la forma consonántica aquí; en algunas tradiciones de nombres aparece la variante «Harif».
    reason: alternative_reading
lexical_decisions:
- source_word: שַׂלְמָא
  english_pob_choice: Salma
  chosen_spanish: Salma
  alternatives_spanish:
  - Salmah
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera, no se traduce. «Salma» conserva la forma breve y reconocible del hebreo, y funciona bien en español bíblico.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - fundador de
  - ancestro de
  lexicon: HALOT
  rationale: En listas genealógicas y de asentamiento, אָב puede expresar padre literal, antepasado o fundador. En español, «el padre de» mantiene la transparencia formal del hebreo y deja abierta la amplitud genealógica documentada por la POB inglesa.
- source_word: בֵֽית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Beth-lehem
  lexicon: HALOT
  rationale: Es el nombre de lugar establecido en español bíblico. «Belén» es la forma natural y transparente para lectores en español; «Beth-lehem» resultaría más áspera sin aportar claridad adicional.
- source_word: חָרֵף
  english_pob_choice: Hareph
  chosen_spanish: Jaref
  alternatives_spanish:
  - Haref
  - Harif
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se adapta la grafía para una pronunciación natural en español, sin introducir una traducción que no está sustentada por el texto.
- source_word: בֵית גָּדֵר
  english_pob_choice: Beth-gader
  chosen_spanish: Bet-gader
  alternatives_spanish:
  - Bet Gader
  - casa de Gader
  lexicon: HALOT
  rationale: Se conserva el valor toponímico de בֵית + nombre. «Bet-gader» mantiene la estructura del hebreo y la forma del topónimo; «casa de Gader» sería demasiado literal y menos natural en una genealogía.
translation_notes:
  revision_awareness: El texto base en inglés no requiere revisiones; se conserva el sentido genealógico transparente del hebreo sin cambios interpretativos. La única adaptación es ortográfica y fonética al español para nombres propios y topónimos.
  spanish_consistency_notes:
  - Se mantiene «Belén» para el topónimo tradicional en español, no una transliteración hebraizante, porque la referencia geográfica ya está establecida en el uso bíblico hispanohablante.
  - Se usa «Bet-gader» con guion para reflejar la estructura toponímica hebrea y su paralelismo con la solución inglesa «Beth-gader».
  - Se evita «siervo» o lecturas devocionales porque el término אָב aquí pertenece al ámbito genealógico/toponímico, no al de servicio religioso.
