translation:
  language: es
  text: Y los hijos de Jacob llegaron del campo cuando lo oyeron[a], y los hombres se entristecieron y se indignaron mucho, porque había hecho una cosa vergonzosa[b] en Israel[c], al acostarse con la hija de Jacob, y tal cosa no debería hacerse[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al oírlo». El contexto ya ha introducido la noticia que habían escuchado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «una cosa deshonrosa» o «una vileza». El hebreo נְבָלָה denota un acto moralmente vergonzoso y socialmente escandaloso.'
    reason: lexical_alternative
  - marker: c
    text: Aquí «Israel» probablemente se refiere a la familia de Jacob/Israel o a su comunidad pactual, no todavía a la nación posterior en su sentido histórico pleno.
    reason: cultural_note
  - marker: d
    text: 'O: «y una cosa así no debe hacerse». El hebreo expresa una norma general sobre lo que es inaceptable.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי יַעֲקֹב
  english_pob_choice: And Jacob’s sons
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los hijos de Jacob
  - los hijos de Yaacob
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como «los hijos de Jacob». Mantiene la referencia familiar sin introducir un giro más interpretativo.
- source_word: בָּאוּ מִן הַשָּׂדֶה
  english_pob_choice: came in from the field
  chosen_spanish: llegaron del campo
  alternatives_spanish:
  - vinieron del campo
  - volvieron del campo
  - llegaron del campo
  lexicon: HALOT
  rationale: El hebreo indica llegada desde el campo; «llegaron del campo» conserva el movimiento de regreso y suena natural en español. No se añadió «adentro» porque el contexto narrativo ya implica el retorno.
- source_word: כְּשָׁמְעָם
  english_pob_choice: when they heard it
  chosen_spanish: cuando lo oyeron
  alternatives_spanish:
  - al oírlo
  - cuando escucharon eso
  lexicon: HALOT
  rationale: El valor temporal se conserva con una subordinada directa. «Lo oyeron» mantiene el objeto implícito de la noticia sin especificarlo más allá de lo que el contexto exige.
- source_word: וַיִּתְעַצְּבוּ הָאֲנָשִׁים
  english_pob_choice: the men were grieved
  chosen_spanish: los hombres se entristecieron
  alternatives_spanish:
  - los hombres se dolieron
  - los hombres se afligieron
  lexicon: HALOT
  rationale: El hitpael expresa dolor emocional; «se entristecieron» comunica el matiz de aflicción de manera clara y digna. «Los hombres» refleja a los varones mencionados en el contexto inmediato.
- source_word: וַיִּחַר לָהֶם מְאֹד
  english_pob_choice: and very angry
  chosen_spanish: y se indignaron mucho
  alternatives_spanish:
  - y se enojaron mucho
  - y ardieron de ira
  lexicon: HALOT
  rationale: חרה expresa ira intensa; «se indignaron mucho» conserva el peso moral y emocional sin sonar coloquial. La formulación evita debilitar el énfasis de מְאֹד.
- source_word: נְבָלָה
  english_pob_choice: a disgraceful thing
  chosen_spanish: una cosa vergonzosa
  alternatives_spanish:
  - una cosa infame
  - una cosa deshonrosa
  - una vileza
  lexicon: HALOT
  rationale: En este contexto social y moral, נְבָלָה refiere a un acto gravemente vergonzoso o deshonroso. «Vergonzosa» mantiene la fuerza moral de la palabra sin cargarla con un registro excesivamente arcaico.
- source_word: בְיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - en la familia de Israel
  lexicon: HALOT
  rationale: Se conserva el sintagma literalmente, siguiendo la lectura auditada del POB de que «Israel» apunta aquí al entorno pactual de Jacob/Israel, sin forzar una paráfrasis explicativa en el texto principal.
- source_word: לִשְׁכַּב אֶת בַּת יַעֲקֹב
  english_pob_choice: by lying with Jacob’s daughter
  chosen_spanish: al acostarse con la hija de Jacob
  alternatives_spanish:
  - al yacer con la hija de Jacob
  - al dormir con la hija de Jacob
  lexicon: HALOT
  rationale: שׁכב funciona como eufemismo sexual; «acostarse con» es un equivalente idiomático adecuado en español y preserva el registro bíblico sin volverlo crudo ni clínico.
- source_word: וְכֵן לֹא יֵעָשֶׂה
  english_pob_choice: and such a thing should not be done
  chosen_spanish: y no se hace así
  alternatives_spanish:
  - y una cosa así no debe hacerse
  - y tal cosa no debe hacerse
  lexicon: HALOT
  rationale: La construcción impersonal del hebreo expresa una norma general de conducta. «No se hace así» reproduce ese juicio normativo en español de forma breve y natural, sin perder el sentido de desaprobación.
theological_decisions:
- issue: Sentido de «Israel» en una etapa patriarcal temprana
  english_pob_reading: in Israel likely refers here to Jacob/Israel’s family or covenant community, not yet the later nation in its full historical sense.
  chosen_spanish_reading: «en Israel» se mantiene literalmente, entendiendo la referencia como la comunidad pactual vinculada con Jacob/Israel, no como una nación posterior plenamente desarrollada.
  alternative_spanish_readings:
  - entre la familia de Jacob
  - en el clan de Israel
  - dentro de la comunidad de Israel
  rationale: La traducción conserva la forma del texto hebreo y a la vez evita imponer un anacronismo histórico. El matiz se deja para la nota, siguiendo el criterio auditado del POB.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza normativa del cierre final
  english_pob_reading: The Niphal imperfect here functions as an impersonal statement of what is unacceptable.
  chosen_spanish_reading: «y no se hace así» funciona como una prohibición/generalización normativa sobre lo que no corresponde hacer.
  alternative_spanish_readings:
  - y una cosa así no debe hacerse
  - y tal cosa no debe hacerse
  - y no debe hacerse esto
  rationale: El hebreo presenta una observación normativa general. La formulación elegida es breve y natural, y conserva la desaprobación social y moral sin añadir contenido legal externo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB: se prefirió una equivalencia más cercana para נְבָלָה («una cosa vergonzosa») y una formulación más natural para el cierre normativo («y no se hace así»), manteniendo el valor moral del pasaje y su tono de desaprobación pública.'
  spanish_consistency_notes:
  - Se conserva «Jacob» y no se introduce «Israel» como sustituto del patriarca.
  - Se mantiene el registro bíblico con un eufemismo sexual idiomático («acostarse con»).
  - La traducción evita arcaísmos innecesarios y sigue un español bíblico contemporáneo, claro y solemne.
  - Las notas distinguen entre alternativas léxicas reales y el texto principal, sin sobreexplicar en el cuerpo del verso.
