    changes_summary: Replaced 'look' with the more formal 'behold'; changed 'repay his anger in fury' to 'render his anger with fury' to better reflect the sense of bringing back/executing anger rather than repaying anger itself; kept the parallel structure with 'his rebuke with flames of fire.'
translation:
  language: es
  text: Porque he aquí[a], Yahvé vendrá en fuego, y sus carros como el torbellino[b], para descargar[c] su ira con furia y su reprensión con llamas de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con fuego'; la preposición hebrea puede expresar acompañamiento además de esfera.
    reason: lexical_alternative
  - marker: b
    text: O 'como una tempestad' o 'como el vendaval'.
    reason: lexical_alternative
  - marker: c
    text: O 'para hacer volver' o 'para retribuir'; el verbo hebreo puede significar 'volver' o 'devolver/retribuir' en sentido judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación de fundamento o explicación del anuncio anterior; en español, 'Porque' mantiene esa función discursiva con naturalidad.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: HALOT
  rationale: La deixis enfática se conserva mejor con la fórmula reverente y bíblica 'he aquí', que es clara en español y corresponde al valor de atención del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el Nombre divino, usando la forma española 'Yahvé' en lugar de una sustitución por 'Señor'.
- source_word: בָּאֵשׁ
  english_pob_choice: in fire
  chosen_spanish: en fuego
  alternatives_spanish:
  - con fuego
  - por fuego
  lexicon: HALOT
  rationale: La preposición permite acompañamiento o esfera; 'en fuego' conserva la imagen sin decidir más de lo que el hebreo exige.
- source_word: יָבוֹא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá
  - viene
  lexicon: HALOT
  rationale: El imperfecto profético se vierte con futuro para expresar el venir anunciado en contexto de juicio.
- source_word: וְכַסּוּפָה
  english_pob_choice: like the whirlwind
  chosen_spanish: como el torbellino
  alternatives_spanish:
  - como la tempestad
  - como el vendaval
  lexicon: HALOT
  rationale: '''סוּפָה'' nombra una tormenta violenta o torbellino; ''torbellino'' transmite mejor la fuerza visual y dinámica del juicio.'
- source_word: מַרְכְּבֹתָיו
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carros de guerra
  - su carro de combate
  lexicon: HALOT
  rationale: El plural con sufijo se traduce de manera directa; 'carros' mantiene la imagen bélica sin añadir especificaciones no presentes en el hebreo.
- source_word: לְהָשִׁיב
  english_pob_choice: to render / to repay
  chosen_spanish: para retribuir
  alternatives_spanish:
  - para devolver
  - para hacer volver
  lexicon: HALOT
  rationale: El valor causativo/judicial de השׁיב aquí apunta a devolver o hacer recaer lo debido; 'retribuir' preserva el matiz de retribución sin forzar una formulación impropia en español.
- source_word: בְּחֵמָה
  english_pob_choice: with fury
  chosen_spanish: con furia
  alternatives_spanish:
  - en furia
  - con ira
  lexicon: HALOT
  rationale: חֵמָה expresa ardor de ira; 'con furia' enlaza bien con el verbo de acción y conserva la intensidad.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su indignación
  lexicon: HALOT
  rationale: Aunque literalmente alude a 'nariz', el modismo significa ira; 'su ira' es el equivalente más transparente y solemne.
- source_word: וְגַעֲרָתוֹ
  english_pob_choice: and his rebuke
  chosen_spanish: y su reprensión
  alternatives_spanish:
  - y su reprendido
  - y su amonestación
  lexicon: HALOT
  rationale: גְּעָרָה denota reprensión o reprender con autoridad; 'reprensión' conserva el tono judicial y verbal del término.
- source_word: בְּלַהֲבֵי אֵשׁ
  english_pob_choice: in flames of fire
  chosen_spanish: con llamas de fuego
  alternatives_spanish:
  - en llamas de fuego
  - en ardientes llamas
  lexicon: HALOT
  rationale: La expresión poética se mantiene con 'llamas de fuego'; aquí 'con' comunica bien el instrumento/medio sin perder el paralelismo con el miembro anterior.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama; el proyecto pide no ocultarlo mediante 'Señor'. 'Yahvé' es la forma española estándar del nombre divino en este trabajo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Función de la escena de juicio
  english_pob_reading: to render his anger with fury and his rebuke with flames of fire
  chosen_spanish_reading: para retribuir su ira con furia y su reprensión con llamas de fuego
  alternative_spanish_readings:
  - para devolver su ira con furia y su reprensión con llamas de fuego
  - para ejecutar su ira con furia y su reprensión con llamas de fuego
  rationale: Se preserva la tensión entre el movimiento de 'hacer volver/retribuir' y el acto judicial de ejecución del juicio. 'Retribuir' mantiene la idea retributiva sin diluirla en una paráfrasis más libre.
  doctrine_reference: ISA.66.15 lexical-theological note
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'behold' por 'look' y 'render' por 'repay' en לְהָשִׁיב. En español se resolvió con 'he aquí' para la deixis enfática y 'retribuir' para conservar el sentido judicial de devolver/ejecutar lo debido sin decir que se 'paga' la ira misma.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del Nombre divino en coherencia con el criterio del proyecto.
  - Se usa 'ira' para אַף/אַפּוֹ y 'furia' para חֵמָה, distinguiendo ambos matices sin nivelarlos.
  - '''Reprensión'' traduce גְּעָרָה con tono judicial y verbal, coherente con un contexto de juicio.'
  - La puntuación y el orden siguen la cadencia poética del hebreo y del audit trail inglés sin copiar mecánicamente su sintaxis.
