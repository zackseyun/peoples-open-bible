translation:
  language: es
  text: 'Los hijos de Zabulón, por sus clanes: de Sered[a], el clan de los sereditas; de Elón, el clan de los elonitas; de Jahleel[b], el clan de los jahleelitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según sus clanes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Zabulón»; en este contexto censal, la expresión se refiere a los descendientes tribales de Zabulón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En este contexto censal y genealógico, la fórmula literal «hijos de» conserva el giro hebreo y funciona de modo natural en español bíblico. «Descendientes de» explicaría la referencia tribal, pero es más interpretativo.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible del nombre tribal/personal. Mantiene la identificación del linaje sin necesidad de transliteración cruda.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: «מִשְׁפָּחָה» aquí designa unidades de clan en el censo, no solo familia nuclear. «Por sus clanes» refleja bien el valor distributivo de לְ; «según sus clanes» es posible, pero menos directo.
- source_word: לְסֶרֶד
  english_pob_choice: of Sered
  chosen_spanish: de Sered
  alternatives_spanish:
  - de Sered
  lexicon: HALOT
  rationale: La preposición de origen/derivación en esta fórmula se expresa naturalmente en español con «de». Se conserva el nombre propio en transliteración estándar.
- source_word: מִשְׁפַּחַת הַסַּרְדִּי
  english_pob_choice: the clan of the Sardites
  chosen_spanish: el clan de los sareditas
  alternatives_spanish:
  - el clan de los sarditas
  - la familia del saredita
  lexicon: HALOT
  rationale: Se mantiene la referencia al clan derivado de Sered mediante un gentilicio plural natural en español. «Sareditas» sigue más de cerca la base hebrea y evita la posible confusión con otros nombres, aunque «sarditas» es una forma tradicional posible.
- source_word: לְאֵלֹן
  english_pob_choice: of Elon
  chosen_spanish: de Elón
  alternatives_spanish:
  - de Elon
  lexicon: HALOT
  rationale: Se conserva el nombre propio con acento según el uso español, manteniendo la serie genealógica del texto.
- source_word: מִשְׁפַּחַת הָאֵלֹנִי
  english_pob_choice: the clan of the Elonites
  chosen_spanish: el clan de los elonitas
  alternatives_spanish:
  - el clan del elonita
  - la familia de Elón
  lexicon: HALOT
  rationale: El hebreo presenta un gentilicio de clan; el plural español «elonitas» refleja mejor la colectividad censal que un singular colectivo. Se conserva la correspondencia con el nombre Elón.
- source_word: לְיַחְלְאֵל
  english_pob_choice: of Jahleel
  chosen_spanish: de Jahleel
  alternatives_spanish:
  - de Yajleel
  lexicon: HALOT
  rationale: Se sigue la transliteración más extendida del nombre propio en castellano bíblico. No se intenta naturalizar el nombre, para mantener la trazabilidad al hebreo.
- source_word: מִשְׁפַּחַת הַיַּחְלְאֵלִי
  english_pob_choice: the clan of the Jahleelites
  chosen_spanish: el clan de los jahleelitas
  alternatives_spanish:
  - el clan del jahleelita
  - la familia de Jahleel
  lexicon: HALOT
  rationale: El gentilicio plural español comunica el patrón repetido de la lista censal. «Jahleelitas» sigue el nombre propio y mantiene el paralelismo con los otros clanes.
theological_decisions:
- issue: Referencia tribal de «hijos de Zabulón» en un contexto censal
  english_pob_reading: Hebrew 'sons of Zebulun'; in this census context, this refers to Zebulun's tribal descendants.
  chosen_spanish_reading: «Los hijos de Zabulón» se entiende aquí como los descendientes tribales de Zabulón.
  alternative_spanish_readings:
  - «Los descendientes de Zabulón»
  - «La tribu de Zabulón»
  rationale: La observación del POB en inglés aclara que la expresión no debe leerse solo biológicamente, sino como descendencia tribal dentro del censo. En español, se conserva la forma literal y se deja implícita la referencia tribal por el contexto sin reemplazarla por una paráfrasis más fuerte.
  doctrine_reference: Numerología/censo tribal en Números 26; uso genealógico-censal de fórmulas de filiación.
translation_notes:
  revision_awareness: Se siguió el estado revisado del texto fuente sin cambios sustanciales respecto del auditor inglés; la redacción española conserva la fórmula censal repetitiva y el paralelismo entre los tres clanes, con terminología consistente para nombres propios y gentilicios.
  spanish_consistency_notes:
  - Se mantuvo «clan» para מִשְׁפָּחָה en armonía con el criterio del POB inglés y con el contexto censal.
  - Se usó «Zabulón» como forma española establecida, mientras que los nombres menores se transliteraron de manera consistente.
  - Se preservó la repetición sintáctica de la lista genealógica para reflejar la estructura del hebreo.
