review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB en casi toda la línea: exclusión del honor funerario, destrucción de la tierra, muerte del propio pueblo y borrado duradero del linaje de malhechores. Sin embargo, hay dos desajustes principales: (1) el español usa "sepultura", que en español suele sonar más a lugar de entierro que al acto/estado abstracto de "burial"; "entierro" preserva mejor la decisión léxica auditada. (2) La nota al pie no conserva la alternativa significativa del POB para זֶרַע מְרֵעִים ("seed/descendants of the wicked/evildoers"). Además, "No serás unido" suena poco natural; una forma más idiomática y fiel es "No te unirás con ellos en el entierro", que además evita el innecesario marcador inclusivo "[a]" incrustado en "unido[a]".'
  spanish_quality_summary: El texto es legible y digno, pero "No serás unido[a] con ellos en sepultura" resulta forzado en español bíblico contemporáneo. "Has matado" es claro, aunque menos elevado que "has dado muerte"; no obstante, no es incorrecto. "La descendencia de los malhechores nunca será nombrada" es buena y natural. La revisión propuesta mejora naturalidad, conserva el tono profético y alinea mejor el texto con las notas requeridas.
  glossary_alignment: No hay términos de glosario mayor comprometidos en este versículo. Las decisiones sobre "tierra", "pueblo" y "descendencia" son adecuadas. El punto terminológico principal es mantener la fuerza de קְבוּרָה como "entierro" y preservar en nota la alternativa para זֶרַע como "simiente/descendientes".
  issues:
  - severity: medium
    issue: '"sepultura" no refleja tan bien la decisión auditada "burial"'
    rationale: El inglés POB eligió el sustantivo abstracto "burial" para evitar sobreespecificar un lugar físico. En español, "sepultura" con frecuencia sugiere tumba o lugar de entierro más que el acto/honor funerario. "Entierro" comunica mejor la exclusión del honor de ser enterrado con ellos.
  - severity: medium
    issue: '"No serás unido[a]" suena poco natural y el marcador inclusivo dentro de la palabra no corresponde al estilo del proyecto'
    rationale: La construcción pasiva es posible pero tosca en español. "No te unirás con ellos" o "no serás reunido con ellos" son más naturales. Además, "unido[a]" introduce una convención ajena al texto bíblico y crea ruido innecesario.
  - severity: medium
    issue: Falta la nota léxica equivalente a la del POB para זֶרַע מְרֵעִים
    rationale: El inglés preserva explícitamente las alternativas "seed of evildoers" / "descendants of the wicked". La revisión española debe conservar esa alternativa significativa, especialmente porque "descendencia" es una elección interpretativa natural pero no exhaustiva.
  - severity: low
    issue: La nota actual explica יחד pero no aporta una alternativa textual especialmente necesaria en español
    rationale: La nota presente repite el matiz de unión/juntura, pero no resguarda una variante clave del audit trail. Es mejor usar la nota para la alternativa de זֶרַע מְרֵעִים, que sí tiene valor léxico-documental claro.
  revised_spanish_text: No te unirás con ellos en el entierro, porque destruiste tu tierra; has matado a tu pueblo. La descendencia[a] de los malhechores nunca será nombrada.
  revised_footnotes:
  - marker: a
    text: 'O: “la simiente de los malhechores” o “los descendientes de los malvados”.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó "No serás unido[a] con ellos en sepultura" por "No te unirás con ellos en el entierro" para lograr un español más natural y alinear mejor קְבוּרָה con la decisión auditada "burial". Se eliminó la nota sobre יחד, ya que la redacción revisada ya expresa bien ese sentido sin necesidad de aclaración. Se añadió en cambio la nota léxica requerida para זֶרַע מְרֵעִים, preservando las alternativas importantes del POB auditado.
