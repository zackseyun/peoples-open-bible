translation:
  language: es
  text: He aquí[a], mi siervo actuará con sabiduría; será levantado, alzado y muy exaltado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prosperará». El verbo hebreo puede denotar actuar con sabiduría y, por ello, tener éxito.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. En español, «¡Mira!» comunica esa fuerza de llamada de manera natural y solemne, sin sonar tan arcaico como «He aquí».
- source_word: יַשְׂכִּיל
  english_pob_choice: will act wisely
  chosen_spanish: actuará con sabiduría
  alternatives_spanish:
  - prosperará
  - tendrá éxito
  - obrará sabiamente
  lexicon: HALOT
  rationale: El verbo hiphil de שׂכל puede implicar actuar con discernimiento y, por extensión, prosperar. «Actuará con sabiduría» conserva el núcleo léxico de prudencia/inteligencia, dejando abierta la resonancia de éxito que el inglés POB anotó con su alternativa.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: En este contexto isaiano, la referencia es al siervo de Yahvé. «Siervo» reproduce el término tradicional y adecuado en español para esta figura, mientras que «esclavo» sería demasiado fuerte para la recepción habitual aquí y «servidor» debilitaría la carga bíblica del término.
- source_word: יָרוּם
  english_pob_choice: will be raised
  chosen_spanish: será enaltecido
  alternatives_spanish:
  - será levantado
  - será elevado
  - subirá
  lexicon: HALOT
  rationale: La raíz רום expresa elevación/exaltación. «Será enaltecido» captura bien el sentido de elevación honorífica y prepara la serie de pasivos de exaltación del verso.
- source_word: וְנִשָּׂא
  english_pob_choice: and lifted up
  chosen_spanish: levantado
  alternatives_spanish:
  - y levantado
  - y alzado
  - y exaltado
  lexicon: HALOT
  rationale: La forma de נשׂא aquí participa del mismo campo de elevación. En español, «levantado» funciona de manera natural en la serie junto con «enaltecido» y «muy exaltado», preservando la progresión del hebreo.
- source_word: וְגָבַהּ מְאֹד
  english_pob_choice: and highly exalted
  chosen_spanish: muy exaltado
  alternatives_spanish:
  - sumamente exaltado
  - exaltado en gran manera
  - muy elevado
  lexicon: HALOT
  rationale: גבהּ con מְאֹד intensifica el clímax de exaltación. «Muy exaltado» comunica la superlación con claridad y mantiene la cadencia del verso en español.
theological_decisions:
- issue: Identificación del Siervo
  english_pob_reading: Translate neutrally as 'my servant' without importing explicit messianic identification into the wording.
  chosen_spanish_reading: Traducir de forma neutral como «mi siervo», sin insertar «Mesías» ni «Cristo» en el texto.
  alternative_spanish_readings:
  - mi Mesías
  - mi Cristo
  - el Mesías, mi siervo
  rationale: El hebreo dice literalmente «mi siervo». La traducción conserva esa formulación y deja la identificación cristológica para la interpretación, la enseñanza y los pasajes paralelos, en lugar de resolverla dentro del versículo.
  doctrine_reference: Preservar la tensión teológica y la primacía del texto original; cristología por interpretación, no por glosa intrusiva.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y el acuerdo de control cruzado fue alto. Se mantiene la lectura neutral de «mi siervo» y la alternativa lexical de יַשְׂכִּיל como posible «prosperará».'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en lineamientos generales del proyecto, pero este versículo no contiene el nombre divino; no aplica aquí.
  - Se mantuvo «siervo» por coherencia con el lenguaje isaiano del Siervo y para no sustituirlo por un término eclesiástico más débil.
  - La secuencia de tres verbos de exaltación se reflejó con tres miembros españoles para conservar el paralelismo y el crescendo del hebreo.
