translation:
  language: es
  text: Y esta es la ley del sacrificio de las ofrendas de paz[a], que uno presentará a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas de bienestar»; tradicionalmente, «ofrendas de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  english_pob_choice: Now this
  chosen_spanish: Ahora esta
  alternatives_spanish:
  - Y esta
  - Y ahora esta
  lexicon: HALOT
  rationale: El demostrativo con la conjunción introduce una nueva sección legal. «Ahora esta» conserva el avance discursivo de «Now this» en un español natural, sin perder la transición textual.
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la regulación de
  lexicon: HALOT
  rationale: En contexto sacerdotal, תּוֹרָה designa una norma ritual establecida. «Ley» mantiene el sentido formal-jurídico que el contexto requiere.
- source_word: זֶבַח
  english_pob_choice: the sacrifice of
  chosen_spanish: el sacrificio de
  alternatives_spanish:
  - la ofrenda de
  - la víctima de
  lexicon: HALOT
  rationale: זֶבַח se refiere al acto/ofrenda sacrificial. «Sacrificio» es claro y fiel al campo cultual, y funciona bien en español con el genitivo introducido por «de».
- source_word: הַ/שְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de bienestar
  - las ofrendas de comunión
  lexicon: HALOT
  rationale: Se mantiene el término tradicional «ofrendas de paz», pero en una forma natural en español. La nota preserva la alternativa semántica de «ofrendas de bienestar», reflejando la riqueza de שְׁלָמִים sin borrar la terminología cultual establecida.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: El relativo introduce una cláusula modificadora de modo directo. «Que» es la opción más natural y exacta en español.
- source_word: יַקְרִיב
  english_pob_choice: one shall present
  chosen_spanish: se ha de presentar
  alternatives_spanish:
  - se presentará
  - se ofrecerá
  lexicon: HALOT
  rationale: La forma verbal hiphil funciona aquí de manera genérica y normativa. «Se ha de presentar» conserva el valor prescriptivo sin masculinizar el sujeto y mantiene el matiz técnico de acercar/presentar la ofrenda a Dios.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la terminología POB para el Tetragrámaton: «Yahvé». La preposición ל se vierte con «a» para expresar dirección/dedicación en español culto y bíblico.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el nombre del pacto directamente. La línea terminológica del proyecto en español pide «Yahvé», preservando el nombre propio en lugar de ocultarlo tras una mayúscula funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de bienestar
  - ofrendas de comunión
  rationale: 'No se elimina la tensión semántica del término técnico: «ofrendas de paz» conserva la tradición, mientras la nota explicita la alternativa de sentido hacia bienestar/wholeness. Así se mantiene auditable la decisión léxica.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que ajustó el valor modal de 'may present' a 'shall present'. Por eso el español usa una perífrasis normativa ('se ha de presentar') y no una posibilidad. También se preservó la decisión auditada de traducir שְׁלָמִים con un término tradicional, dejando en nota la alternativa semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política española del proyecto.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Se ha de presentar» conserva el tono legal y prescriptivo del texto sacerdotal.
  - La puntuación reproduce la pausa final de cláusula relativa propia del hebreo y del registro bíblico en español.
