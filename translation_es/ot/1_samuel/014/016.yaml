translation:
  language: es
  text: Y los vigías[a] de Saúl en Guibeá de Benjamín vieron, y he aquí, la multitud se iba deshaciendo yendo aquí y allá.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''centinelas''. El hebreo describe observadores apostados; ''vigías'' expresa con más precisión su función de vigilancia visual, aunque ''centinelas'' también es posible en contexto militar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''la multitud se iba deshaciendo, y se iba de aquí para allá''. El hebreo es conciso y presenta confusión visible entre los filisteos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפִים
  english_pob_choice: watchmen
  chosen_spanish: centinelas
  alternatives_spanish:
  - vigías
  - atalayas
  lexicon: HALOT
  rationale: El participio de צפה designa a quienes están puestos a observar; en contexto militar, 'centinelas' comunica bien la función de guardia observadora. 'Vigías' también es posible, pero 'centinelas' suena más natural y preciso en español bíblico moderno.
- source_word: לְשָׁאוּל
  english_pob_choice: Saul’s
  chosen_spanish: de Saúl
  alternatives_spanish:
  - pertenecientes a Saúl
  - al servicio de Saúl
  lexicon: HALOT
  rationale: La preposición ל aquí expresa asociación/pertenencia. En español, 'de Saúl' conserva de manera directa esa relación sin forzar una paráfrasis.
- source_word: בְּגִבְעַת בִּנְיָמִן
  english_pob_choice: in Gibeah of Benjamin
  chosen_spanish: en Guibeá de Benjamín
  alternatives_spanish:
  - en Gueba de Benjamín
  - en la colina de Benjamín
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tradicionalizado 'Guibeá' para el topónimo, con la identificación 'de Benjamín' como en el hebreo. 'En' refleja con naturalidad la localización narrativa.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: '''He aquí'' preserva el giro deíctico e inesperado del hebreo, equivalente solemne y claro en español bíblico.'
- source_word: הֶהָמוֹן
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - el gentío
  lexicon: HALOT
  rationale: En este contexto bélico, 'la multitud' conserva el sentido colectivo amplio sin especificar más de lo que permite el hebreo.
- source_word: נָמוֹג
  english_pob_choice: was melting away
  chosen_spanish: se iba deshaciendo
  alternatives_spanish:
  - se derretía
  - se desmoronaba
  lexicon: HALOT
  rationale: El verbo מוג tiene imagen literal de 'derretirse' y uso figurado de perder cohesión o ánimo. 'Se iba deshaciendo' mantiene la metáfora de disolución y sugiere el colapso visible del conjunto.
- source_word: וַיֵּלֶךְ
  english_pob_choice: it went
  chosen_spanish: se movía
  alternatives_spanish:
  - iba
  - se iba
  lexicon: HALOT
  rationale: El sujeto singular colectivo resulta duro en español si se calca con 'iba'. 'Se movía' expresa el desplazamiento confuso del conjunto y conserva la idea de movimiento continuo.
- source_word: וַהֲלֹם
  english_pob_choice: here and there
  chosen_spanish: de un lado a otro
  alternatives_spanish:
  - aquí y allá
  - de aquí para allá
  lexicon: HALOT
  rationale: La combinación con el verbo de movimiento sugiere dispersión desordenada. 'De un lado a otro' transmite bien ese ir y venir en español actual sin añadir interpretaciones ajenas.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'saw' por 'looked' para reflejar mejor el verbo narrativo de observación. En español se optó por 'miraron', que conserva ese matiz de observación atenta sin volverlo demasiado interpretativo. También se mantuvo la imagen de descomposición progresiva del hebreo en 'se iba deshaciendo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se evita 'SEÑOR' como máscara del nombre divino, conforme a la política del proyecto.
  - '''Guibeá'' se conserva como topónimo bíblico habitual para mantener consistencia interna con otros pasajes.'
  - '''Centinelas'' se eligió por fuerza militar y claridad; si en el contexto inmediato se requiriera un término más general, ''vigías'' sería la alternativa principal.'
