translation:
  language: es
  text: 'Entonces Jeremías dijo a todo el pueblo— a los hombres, a las mujeres y a todo el pueblo que le respondían[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que le contestaban». El hebreo es compacto; «respondían» mantiene bien el participio y el sentido de réplica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... hablaba
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» comunica bien la secuencia en español sin sonar tan calcado como «Y» en inicio de relato. «Dijo» mantiene el verbo de habla directo del hebreo.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremía
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio del profeta en forma usual en español bíblico.
- source_word: אֶל כָּל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a todo el pueblo
  lexicon: HALOT
  rationale: עָם designa al colectivo del pueblo; «pueblo» es la forma natural y fiel en español para un grupo nacional/corporativo.
- source_word: עַל הַגְּבָרִים וְעַל הַנָּשִׁים
  english_pob_choice: to the men, to the women
  chosen_spanish: a los hombres[a], a las mujeres
  alternatives_spanish:
  - sobre los hombres y sobre las mujeres
  - respecto de los hombres y de las mujeres
  lexicon: HALOT
  rationale: Aunque עַל suele ser «sobre/con respecto a», aquí funciona como enumeración apposicional del auditorio. Repetir «a» conserva la distribución del hebreo y la lectura del POB inglés. Se elige «hombres» y «mujeres» como equivalentes directos de los términos de género del texto.
- source_word: וְעַל כָּל הָעָם
  english_pob_choice: and to all the people
  chosen_spanish: y a todo el pueblo
  alternatives_spanish:
  - y a toda la gente
  - y a todo el resto del pueblo
  lexicon: HALOT
  rationale: La repetición intensifica y amplía la lista de destinatarios. En español, mantener «y a todo el pueblo» preserva el énfasis sin sobrecargar la sintaxis.
- source_word: הָעֹנִים אֹתוֹ
  english_pob_choice: who were answering him
  chosen_spanish: que le respondían
  alternatives_spanish:
  - que le estaban respondiendo
  - que le contestaban
  lexicon: HALOT
  rationale: El participio indica un estado/acción en curso; «le respondían» conserva ese valor sin sonar artificial. Se evita añadir un objeto explícito como «una palabra», porque el propio texto y la revisión inglesa muestran que esa expansión no es necesaria en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: Fórmula introductoria estándar de discurso directo, necesaria porque la cita continúa en el versículo siguiente.
translation_notes:
  revision_awareness: La revisión inglesa reciente retiró «with a word» por innecesario y lo dejó en «who were answering him, saying». La versión española sigue esa misma decisión, evitando sobretraducir דָּבָר y manteniendo la frase breve y natural.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene la repetición del destinatario («a todo el pueblo ... y a todo el pueblo») para reflejar el énfasis hebreo.
  - «Respondían» conserva el valor participial de הָעֹנִים sin convertirlo en pasado puntual.
