  to: Ahora bien, el resto de los hechos de Manasés[a], y su oración a su Dios, y las palabras de los videntes que le hablaron en el nombre de Yahvé, el Dios de Israel—he aquí, están escritos entre los registros de los reyes de Israel.
  rationale: Se conserva sustancialmente la traducción, pero se ajusta la puntuación para reflejar mejor la pausa enfática del original y se corrige la nota al pie para alinearla con la alternativa léxica documentada en el audit trail inglés.
