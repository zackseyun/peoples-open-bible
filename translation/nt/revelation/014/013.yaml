theological_decisions:
- issue: Meaning of 'in the Lord' in relation to the dead
  chosen_reading: 'Rendered as covenantal/union language without expanding it interpretively: ''the dead who die in the Lord.'''
  alternative_readings:
  - the dead who die faithful to the Lord
  - the dead who die belonging to the Lord
  rationale: 'The phrase ἐν κυρίῳ is left relatively literal to preserve theological breadth: union with, belonging to, and faithful relation to the Lord may all be implicated, and the verse itself does not force a narrower paraphrase.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἵνα ἀναπαήσονται
  chosen_reading: Purpose/result nuance retained with 'so that they will rest.'
  alternative_readings:
  - epexegetical 'that is, they will rest'
  - imperatival/volitive 'that they may rest'
  rationale: The construction can be understood as expressing divine purpose or result. The chosen rendering preserves that sense without over-specifying the syntax beyond what the Greek warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relation of works to the blessed dead
  chosen_reading: Their works accompany them as consequent testimony, not as an explicit statement of meritorious salvation.
  alternative_readings:
  - their deeds earn their blessedness
  - their deeds are merely remembered after death
  rationale: The text states that their works follow with them; it does not explicitly define the mechanism. The translation stays close to the wording and avoids importing a doctrinal claim about merit or denying the significance of works.
  doctrine_reference: Do not import doctrinal claims the text does not make.
