review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo: marco temporal, nombre divino, doble imperativo, topónimo transliterado, recuperación del objeto y referencia a esconderlo allí. Sin embargo, la colocación de las notas no preserva fielmente el rastro de auditoría inglés: la nota sobre Perat/Éufrates debe anclarse en el topónimo, no en «me dijo», y falta una nota para la alternativa de «esconder/enterrar».'
  spanish_quality_summary: El español es claro y legible, con registro bíblico moderno y digno. «Levántate, ve», «al cabo de muchos días» y «Yahvé» funcionan bien. «Cinto» es aceptable, aunque algo más tradicional que «banda de cintura»; no requiere cambio. La principal reparación necesaria es técnica y de fidelidad documental en el sistema de notas.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; el topónimo se translitera; no hay conflictos doctrinales. La decisión «cinto» para אֵזוֹר es defendible dentro de las alternativas documentadas. Debe conservarse también en español la alternativa léxica de טמן como «enterrar».'
  issues:
  - severity: medium
    issue: Marcador de nota mal anclado en «me dijo[a]»
    rationale: La nota [a] explica «Perat puede referirse al Éufrates», por lo que debe anclarse en «Perat», no en «me dijo». Tal como está, la nota resulta confusa y no sigue la disciplina requerida de anclar cada nota en la palabra o frase pertinente.
  - severity: medium
    issue: Falta nota para la alternativa de לְטָמְנוֹ como «enterrar»
    rationale: El rastro inglés preserva explícitamente la alternativa «to bury there». El borrador español no incluye una nota correspondiente para «esconder allí», perdiendo una alternativa léxica significativa del hebreo.
  - severity: low
    issue: Distribución de notas sobre Perat puede simplificarse y aclararse
    rationale: 'En el inglés hay dos notas distintas relacionadas con Perath: una sobre la posible identificación con el Éufrates y otra sobre el verbo «hide/bury». En español conviene mantener dos notas, pero ambas correctamente ancladas: una en «Perat» para la identificación geográfica y otra en «esconder allí» para la alternativa verbal. La nota sobre «cinto» puede mantenerse como nota léxica separada.'
  revised_spanish_text: 'Y aconteció que, al cabo de muchos días, Yahvé me dijo: «Levántate, ve a Perat[a], y toma de allí el cinto[b] que te mandé esconder allí[c]».'
