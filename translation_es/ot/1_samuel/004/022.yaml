revisions:
- from: 'Y dijo[a]: «La gloria ha salido de Israel[b], porque fue tomada el arca de Dios».'
  to: 'Y dijo[a]: «La gloria se ha apartado de Israel, porque ha sido tomada el arca de Dios[b]».'
  rationale: Se reemplaza «ha salido» por «se ha apartado» para reflejar mejor el matiz de retirada/remoción de גָּלָה en contexto teológico. Se ajusta el pasivo a «ha sido tomada» para mejorar la naturalidad y mantener el sentido resultativo. La nota b se corrige para que sea una alternativa genuina y no mera repetición del texto principal.
