review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del hebreo: הַחֹנִים = «Los que acampan», מַטֵּה = «tribu», y el encabezado con el líder tribal y patronímico está bien conservado. Sin embargo, עָלָיו en este contexto campamental se refiere al lado del campamento/estandarte correspondiente, no a una referencia personal masculina. Por eso «junto a él» y la nota «al lado de él» no preservan bien la referencia impersonal del original ni la solución del POB inglés («next to it / beside it»).'
  spanish_quality_summary: El español es claro y digno, pero «junto a él» suena demasiado personal y puede confundir al lector sobre el referente. «Junto a eso» sería torpe; la mejor solución natural es «junto a este» o «a su lado», con nota alternativa mejor anclada. También conviene preferir «líder» frente a «jefe» para alinearse mejor con el registro del proyecto y evitar un tono algo más coloquial o jerárquico.
  glossary_alignment: No hay términos teológicos sensibles aquí. «tribu», «hijos de Asher», «Pagiel hijo de Ocrán» están bien. «Asher» sigue el audit trail inglés. La principal desalineación léxica es el pronombre de עָלָיו; secundaria, «jefe» frente al valor más neutral de נָשִׂיא como «líder».
  issues:
  - severity: high
    issue: «junto a él» para עָלָיו introduce un referente personal masculino
    rationale: En el contexto de distribución del campamento, el hebreo indica posición adyacente respecto a una unidad/campamento, no ‘junto a él’ como persona. El inglés auditado usa «next to it». En español, el masculino personal puede inducir una lectura equivocada.
  - severity: medium
    issue: 'La nota al pie repite la referencia personal: «al lado de él»'
    rationale: La alternativa documentada debe conservar la referencia impersonal/espacial. Tal como está, refuerza la ambigüedad errónea del texto principal.
  - severity: low
    issue: «jefe» es posible, pero «líder» se alinea mejor con el POB inglés y con un registro más neutral
    rationale: נָשִׂיא aquí es cabeza tribal reconocido. «Líder» evita matices de autoridad coloquial o áspera que «jefe» puede tener en español contemporáneo.
  revised_spanish_text: 'Los que acampan junto a este[a]: la tribu de Asher, y el líder de los hijos de Asher, Pagiel hijo de Ocrán.'
