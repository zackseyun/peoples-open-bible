    rationale: El borrador dice «¡Alabado sea el Señor, que juzga toda la tierra con su justicia[a].» y carece del cierre correcto de la exclamación antes del punto final estructural; además la apertura de exclamación no se corresponde con un cierre. Debe normalizarse la puntuación española.
