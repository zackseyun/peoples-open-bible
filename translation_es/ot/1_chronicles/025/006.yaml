base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/025/006.yaml
  text: 'All these were under the direction of their father in the music of the house of Yahweh[a], with cymbals, harps, and lyres, for the service of the house of God, under the direction of the king: Asaph, Jeduthun[c][b], and Heman.'
  footnotes:
  - marker: a
    text: 'Hebrew: ''under the hand of''; the idiom denotes direction, supervision, or agency.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in song' or 'in singing.'
    reason: lexical_alternative
  - marker: c
    text: The exact distinction between the instruments rendered 'harps' and 'lyres' is uncertain.
    reason: cultural_note
