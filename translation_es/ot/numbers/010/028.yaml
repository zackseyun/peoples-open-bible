translation:
  language: es
  text: Estas eran las etapas[a] de los hijos de Israel[b], por sus divisiones[c], y partieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las jornadas» o «las partidas» para «las etapas».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas»; literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «según sus huestes» o «por sus compañías». El hebreo sugiere agrupaciones organizadas para el viaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: El hebreo introduce una afirmación retrospectiva sin cópula explícita; en español, «Estos eran» mantiene el valor resumptivo del enunciado y suena natural en contexto narrativo.
- source_word: מַסְעֵי
  english_pob_choice: the stages
  chosen_spanish: los estadios
  alternatives_spanish:
  - los viajes
  - las jornadas
  - las partidas
  lexicon: HALOT
  rationale: Se conserva la idea de una serie ordenada de movimientos en el desierto. «Estadios» refleja el valor de etapas sucesivas sin reducirlo solo a «viajes» ni cargarlo de matiz militar.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión genealógica literal del hebreo. «Hijos de Israel» es natural en español bíblico y conserva la forma de parentesco del original.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus escuadrones
  - por sus compañías
  - según sus huestes
  lexicon: HALOT
  rationale: «Divisiones» comunica la organización ordenada del desplazamiento sin forzar un sentido bélico excesivo. Mantiene la ambigüedad controlada del hebreo entre agrupación militar y orden de marcha.
- source_word: וַיִּסָּעוּ
  english_pob_choice: and they set out
  chosen_spanish: y partieron
  alternatives_spanish:
  - y se pusieron en marcha
  - y emprendieron el camino
  - y viajaron
  lexicon: HALOT
  rationale: «Partieron» es una solución breve y digna para el valor narrativo de נסע. Conserva el inicio del movimiento desde un campamento hacia el siguiente punto.
translation_notes:
  revision_awareness: El pasaje hebreo es breve y de cierre resumitivo; la versión española sigue de cerca la estructura del original y conserva las principales alternativas léxicas documentadas en el auditable inglés.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para respetar la formulación genealógica del hebreo.
  - Se evita «SEÑOR» u այլ sustitutos porque no aparece el tetragrámaton en este versículo.
  - 'La tríada de notas cubre las tres decisiones léxicas principales: מסע, בני ישראל y לצבאותם.'
