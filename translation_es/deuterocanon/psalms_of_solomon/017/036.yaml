translation:
  language: es
  text: Y no habrá injusticia en sus días entre ellos, porque todos son santos, y su rey es el Mesías del Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «su rey es el Mesías, el Señor» o «su rey es el Mesías del Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀδικία
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - maldad
  - injusticia social
  lexicon: BDAG
  rationale: «Injusticia» es la correspondencia directa y conserva el alcance moral y comunitario del término griego. «Maldad» sería más general y «injusticia social» añade un matiz que el texto no explicita.
- source_word: ἡμέραις αὐτοῦ
  english_pob_choice: in his days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante su reinado
  - en los días de él
  lexicon: BDAG
  rationale: La expresión mantiene el giro temporal del griego sin convertirlo en una paráfrasis más interpretativa. «En sus días» es natural en español bíblico y preserva el tiempo del reinado mesiánico.
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: BDAG
  rationale: «Entre ellos» comunica de forma clara la convivencia dentro del pueblo. «En medio de ellos» también sería posible, pero suena un poco más marcado y menos fluido en español actual.
- source_word: ἅγιοι
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  - santos y consagrados
  lexicon: BDAG
  rationale: Dado que el contexto describe al pueblo en su condición ante Dios, «santos» conserva bien la fuerza de ἅγιοι. Evita la ambigüedad de «sagrados» y no introduce un tecnicismo eclesiástico ajeno al pasaje.
- source_word: χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Como título real y no como nombre fijo, «Mesías» es la opción preferida por el proyecto y preserva el trasfondo judío del pasaje. «Cristo» sería posible solo como forma litúrgica tradicional, pero aquí atenuaría ese trasfondo.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Dueño
  lexicon: BDAG
  rationale: «Señor» es el equivalente normal de κύριος en este tipo de fórmula titulativa. En la combinación final se conserva para reflejar la secuencia titular sin forzar una explicación adicional.
theological_decisions:
- issue: Cómo reflejar la secuencia titulativa χριστὸς κύριος
  english_pob_reading: their king is the Lord's Messiah / the Messiah, the Lord / the Lord Messiah
  chosen_spanish_reading: su rey es el Mesías del Señor
  alternative_spanish_readings:
  - su rey es el Señor Mesías
  - su rey es el Mesías, el Señor
  - su rey es el Mesías del Señor
  rationale: El griego presenta una construcción breve y ambigua en la relación entre χριστός y κύριος. En español, «Mesías del Señor» conserva la dependencia genitiva que la revisión inglesa finalmente prefirió («the Lord's Messiah») y evita resolver demasiado la relación entre los dos títulos. Se mantiene así la tensión interpretativa sin sobreexplicar el original.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa pasó de una formulación presente («there is no injustice») a una futura («there will be no injustice») por el marco profético del pasaje. El español adopta de forma coherente un futuro («no habrá»). También se tuvo en cuenta la revisión final que favorece una relación genitiva en la frase titulativa final, reflejada aquí como «Mesías del Señor».
  spanish_consistency_notes:
  - Se evitó «Cristo» para χριστός, siguiendo la preferencia terminológica del proyecto por «Mesías» cuando funciona como título.
  - Se eligió «Señor» para κύριος, pero sin usar mayúsculas de máscara en el cuerpo del texto.
  - Se mantuvo un registro bíblico claro y moderno, con sintaxis natural en español.
  - La nota al pie preserva la ambigüedad del sintagma final sin introducir interpretaciones ajenas al griego.
