translation:
  language: es
  text: Cuando uno llegaba a un montón de veinte medidas, había solo diez; cuando uno llegaba al lagar de vino para sacar cincuenta medidas[a], había solo veinte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''cincuenta purah'', una medida o recipiente líquido de tamaño exacto incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִהְיוֹתָם
  english_pob_choice: When one came / prior state of affairs implied by the context
  chosen_spanish: Cuando uno llegaba
  alternatives_spanish:
  - Cuando se llegaba
  - Cuando alguien llegaba
  lexicon: HALOT
  rationale: El hebreo introduce retrospectivamente la situación de aquel tiempo; en español, la forma temporal narrativa ‘cuando uno llegaba’ comunica el marco habitual sin forzar una pregunta idiomática que no aparece en este verso aislado.
- source_word: בָּא
  english_pob_choice: when one came
  chosen_spanish: uno llegaba
  alternatives_spanish:
  - uno venía
  - alguien llegaba
  lexicon: HALOT
  rationale: El participio/forma verbal singular funciona genéricamente. ‘Uno llegaba’ conserva el valor indefinido y evita especificar un sujeto particular.
- source_word: עֲרֵמַת עֶשְׂרִים
  english_pob_choice: a heap of twenty measures
  chosen_spanish: un montón de veinte medidas
  alternatives_spanish:
  - un montón de veinte
  - un montón de veinte costales
  lexicon: HALOT
  rationale: עֲרֵמָה es ‘montón’ o ‘montículo’ de cosecha; el numeral carece de unidad explícita, por lo que ‘medidas’ reproduce la interpretación del POB inglés para hacer inteligible la cantidad sin añadir precisión no garantizada por el hebreo.
- source_word: וְהָיְתָה עֲשָׂרָה
  english_pob_choice: there were only ten
  chosen_spanish: había solo diez
  alternatives_spanish:
  - resultaban ser solo diez
  - eran solo diez
  lexicon: HALOT
  rationale: La forma femenina concuerda con la cantidad implícita. ‘Había solo diez’ expresa claramente la merma y mantiene el sentido de decepción de la cláusula.
- source_word: הַיֶּקֶב
  english_pob_choice: the wine vat
  chosen_spanish: el lagar
  alternatives_spanish:
  - el lagar de vino
  - la tina del vino
  lexicon: HALOT
  rationale: יַקֶב es el recipiente o instalación asociada con el vino. ‘Lagar’ es un término bíblico y natural en español; se prefiere aquí porque comunica la unidad productiva sin añadir ‘vat’ como calco técnico inglés.
- source_word: לַחְשֹׂף
  english_pob_choice: to draw
  chosen_spanish: sacar
  alternatives_spanish:
  - extraer
  - sacar con un recipiente
  lexicon: HALOT
  rationale: El infinitivo describe sacar líquido del recipiente. ‘Sacar’ es la opción más clara y natural en español; ‘extraer’ es más abstracto y ‘sacar con un recipiente’ añade detalle no explicitado.
- source_word: חֲמִשִּׁים פּוּרָה
  english_pob_choice: fifty measures
  chosen_spanish: cincuenta
  alternatives_spanish:
  - cincuenta medidas
  - cincuenta purás
  lexicon: HALOT
  rationale: פּוּרָה es una medida o recipiente líquido de equivalencia incierta. En el texto principal se mantiene solo el numeral, porque el hebreo no fija una unidad precisa; la ambigüedad queda preservada y la nota explica el término.
- source_word: וְהָיְתָה עֶשְׂרִים
  english_pob_choice: there were only twenty
  chosen_spanish: había solo veinte
  alternatives_spanish:
  - eran solo veinte
  - resultaban ser solo veinte
  lexicon: HALOT
  rationale: Igual que en la primera mitad del versículo, la idea es el rendimiento reducido. ‘Había solo veinte’ conserva el tono de insuficiencia sin sobreinterpretar.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó una frase introductoria añadida que no estaba en el hebreo de este versículo. La redacción española sigue solo el contenido del texto fuente: dos escenas paralelas de cosecha y lagar con rendimiento reducido.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque este versículo no contiene el nombre divino.
  - Se conserva un estilo sobrio y bíblico, pero con español natural.
  - Se deja la ambigüedad de פּוּרָה en nota, en línea con el POB inglés.
