translation:
  language: es
  text: Y estas serán para ustedes un estatuto de juicio[a] por todas sus generaciones, en todos los lugares donde ustedes habiten[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un estatuto legal». La expresión hebrea combina un estatuto establecido con una decisión o procedimiento judicial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en todos sus asentamientos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  - vendrán a ser
  lexicon: HALOT
  rationale: En texto legal, el hebreo con וְ + perfecto expresa aquí una disposición normativa futura; en español, el futuro simple transmite bien ese valor prescriptivo sin volver la frase pesada.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas cosas
  - estos
  lexicon: HALOT
  rationale: El demostrativo femenino plural concuerda con la idea implícita de disposiciones/ordenanzas; 'estas' es breve y natural en español legal.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: HALOT
  rationale: '''Para ustedes'' conserva el destinatario plural con registro neutral latinoamericano y expresa la finalidad/aplicación de la norma.'
- source_word: לְחֻקַּת
  english_pob_choice: a statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - estatuto fijo
  - ordenanza
  lexicon: HALOT
  rationale: '''חֻקָּה'' designa una disposición establecida; ''estatuto'' mantiene el peso jurídico. No se optó por ''ordenanza'' porque en español puede sonar demasiado eclesiástico o administrativo según el contexto.'
- source_word: מִשְׁפָּט
  english_pob_choice: of judgment
  chosen_spanish: de juicio
  alternatives_spanish:
  - de juicio legal
  - de sentencia
  - de justicia
  lexicon: HALOT
  rationale: La combinación חֻקַּת מִשְׁפָּט une estatuto con noción judicial. 'Juicio' retiene el campo semántico de decisión/procedimiento legal sin convertirlo en una abstracción teológica ajena al contexto.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de todas sus generaciones
  - para sus generaciones
  lexicon: HALOT
  rationale: La idiomática hebrea indica vigencia continua a lo largo de las generaciones; 'por todas sus generaciones' comunica duración normativa en español claro.
- source_word: בְּכֹל
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - en cada
  - a lo largo de
  lexicon: HALOT
  rationale: El sintagma introduce el alcance espacial de la norma. 'En todos' enlaza naturalmente con el sustantivo siguiente.
- source_word: מוֹשְׁבֹתֵיכֶם
  english_pob_choice: your dwelling places
  chosen_spanish: lugares de habitación
  alternatives_spanish:
  - lugares donde habitan
  - asentamientos
  - moradas
  lexicon: HALOT
  rationale: '''מוֹשָׁב'' puede referirse a residencia/asentamiento. ''Lugares de habitación'' preserva la amplitud del hebreo sin restringirlo solo a ''asentamientos'' ni volverlo demasiado doméstico.'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'justice' por 'judgment' para reflejar más directamente מִשְׁפָּט en este contexto legal. La redacción española sigue esa decisión con 'juicio', manteniendo también la nota alternativa que deja abierta la traducción jurídico-normativa del sintagma.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - '''Juicio'' se usa aquí en sentido jurídico, no como condena final ni como mera opinión.'
  - Se eligió un español formal pero fluido, sin recurrir a calcos innecesarios de la estructura hebrea.
