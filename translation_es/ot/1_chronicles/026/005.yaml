translation:
  language: es
  text: Ammiel el sexto[a], Issachar el séptimo, Peullethai el octavo; porque Dios lo había bendecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque Dios lo bendijo'. El hebreo permite una forma más directa sin el pluscuamperfecto en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּיאֵל
  english_pob_choice: Ammiel
  chosen_spanish: Ammiel
  alternatives_spanish:
  - Ammiel
  lexicon: nombre propio
  rationale: Nombre propio; se translitera para conservar la forma identificable del hebreo, como en el audit trail inglés.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - el sexto
  lexicon: ordinal
  rationale: El ordinal con artículo se vierte naturalmente al español como parte de la lista genealógica de orden de nacimiento.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Issachar
  alternatives_spanish:
  - Isacar
  lexicon: nombre propio
  rationale: Aquí funciona como nombre propio de persona; se conserva la transliteración usada por la POB inglesa para evitar perder la referencia nominal.
- source_word: הַשְּׁבִיעִי
  english_pob_choice: the seventh
  chosen_spanish: el séptimo
  alternatives_spanish:
  - el séptimo
  lexicon: ordinal
  rationale: Mantiene el paralelismo ordinal de la enumeración.
- source_word: פְּעֻלְּתַי
  english_pob_choice: Peullethai
  chosen_spanish: Peullethai
  alternatives_spanish:
  - Peulthai
  lexicon: nombre propio
  rationale: Nombre propio; se conserva una transliteración cercana a la forma vocalizada, siguiendo la decisión auditada en inglés.
- source_word: הַשְּׁמִינִי
  english_pob_choice: the eighth
  chosen_spanish: el octavo
  alternatives_spanish:
  - el octavo
  lexicon: ordinal
  rationale: Cierra la secuencia numérica de los hijos enumerados.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: conjunction
  rationale: En español, 'porque' expresa con claridad la relación causal explicativa del hebreo כִּי en este contexto genealógico.
- source_word: בֵרֲכֹו
  english_pob_choice: had blessed him
  chosen_spanish: lo había bendecido
  alternatives_spanish:
  - lo bendijo
  lexicon: verb tense/aspect
  rationale: El pluscuamperfecto reproduce la anterioridad explicativa en relación con la lista de hijos; mantiene el matiz contextual destacado en la auditoría inglesa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: divine title
  rationale: Título divino singular, acorde con el contexto y con la decisión estándar del proyecto.
theological_decisions:
- issue: Referente del pronombre objeto en 'lo había bendecido'
  english_pob_reading: The pronoun refers to Obed-edom, the father in the immediate context.
  chosen_spanish_reading: El pronombre se entiende como referencia a Obed-edom, el padre en el contexto inmediato.
  alternative_spanish_readings:
  - Podría referirse más ampliamente a su casa o linaje.
  rationale: La cláusula causal explica la gran cantidad de hijos enumerados a partir de la bendición recibida por el padre; el contexto inmediato favorece esta referencia sin introducir una doctrina adicional.
  doctrine_reference: 1 Crónicas 26:4–8
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente y coincide con la última revisión inglesa sin cambios; no se registran revisiones textuales adicionales para este versículo.
  spanish_consistency_notes:
  - Se conserva Yahvé solo cuando aparezca el Tetragrámaton explícito; aquí el hebreo usa אֱלֹהִים, por eso se traduce 'Dios'.
  - Se mantienen transliteraciones de nombres propios para preservar la correspondencia con la genealogía y con la auditoría inglesa.
  - Se usa puntuación genealógica española con punto y coma antes de la cláusula causal, reflejando la división lógica del hebreo.
