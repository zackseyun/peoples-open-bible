id: 2CO.3.18
reference: 2 Corinthians 3:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ πάντες ἀνακεκαλυμμένῳ προσώπῳ τὴν δόξαν κυρίου κατοπτριζόμενοι τὴν αὐτὴν εἰκόνα μεταμορφούμεθα ἀπὸ δόξης εἰς δόξαν, καθάπερ ἀπὸ κυρίου πνεύματος.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/018.yaml
  text: And we all, with unveiled face, beholding the glory of the Lord as in a mirror, are being transformed into the same image from glory to glory, just as from the Lord, the Spirit.
  footnotes:
  - marker: a
    text: Or 'reflecting the glory of the Lord like a mirror.'
    reason: alternative_reading
  - marker: b
    text: Or 'from the Lord who is the Spirit'; alternatively, 'from the Spirit of the Lord.'
    reason: alternative_reading
translation:
  language: ko
  text: 우리 모두는 베일을 벗은 얼굴로 주의 영광을 거울처럼 비추어, 영광에서 영광에 이르도록 그 같은 형상으로 변화되어 갑니다. 이는 영이신 주께로부터 오는 일입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνακεκαλυμμένῳ
  english_pob_choice: unveiled
  chosen_korean: 베일을 벗은
  alternatives_korean:
  - 가리지 않은
  lexicon: BDAG
  rationale: 3:14의 ἀνακαλύπτω와 동근.
- source_word: κατοπτριζόμενοι
  english_pob_choice: beholding as in a mirror
  chosen_korean: 거울처럼 비추다
  alternatives_korean:
  - 거울로 보다
  - 반사하다
  lexicon: BDAG
  rationale: κατοπτρίζομαι는 (a) 거울로 보다 (b) 거울처럼 비추다 — 두 의미 가능. 본 문맥의 변모(μεταμορφούμεθα)와의 인과적 연결을 위해 「비추다」 의미를 채택.
- source_word: μεταμορφούμεθα
  english_pob_choice: are being transformed
  chosen_korean: 변화되어 가다
  alternatives_korean:
  - 모양이 바뀌다
  - 변모하다
  lexicon: BDAG
  rationale: 현재시제 수동태. 진행 중인 신적 변화. 「변화되어 가다」로 진행성을 살린다.
- source_word: ἀπὸ κυρίου πνεύματος
  english_pob_choice: from the Lord, the Spirit
  chosen_korean: 영이신 주께로부터
  alternatives_korean:
  - 주의 영으로부터
  - 주께로부터 — 영으로부터
  lexicon: BDAG
  rationale: 동격적 소유격 (「주, 곧 영」)으로 읽는다. 3:17의 동일시와 일관.
