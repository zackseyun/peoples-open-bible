revisions:
- from: Y salió el nombre de David por todas las tierras[a], y Yahvé puso el temor de él sobre todas las naciones[b].
  to: Y salió el nombre de David por todas las tierras[a], y Yahvé puso el temor a él sobre todas las naciones[b].
  rationale: Se mantiene la fidelidad al hebreo y al audit trail inglés, pero se corrige «el temor de él» a «el temor a él» para lograr un español natural sin perder el referente del sufijo. También se conserva la nota explicativa sobre que las naciones temían a David, con una razón más precisa.
