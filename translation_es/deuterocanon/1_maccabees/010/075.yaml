translation:
  language: es
  text: Y acampó contra Joppe[a], y los de la ciudad le cerraron el paso[b], porque había una guarnición de Apolonio en Joppe; y pelearon contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acampó junto a Joppe». El griego puede expresar simplemente la posición del campamento frente al lugar, sin matizar tanto la hostilidad como «contra».
    reason: alternative_reading
  - marker: b
    text: Lit. «lo dejaron fuera». El griego también puede expresarse como «los de la ciudad lo excluyeron»; la frase literal indica que no le permitieron entrar.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν ἐπὶ Ἰόππην
  english_pob_choice: encamped against Joppa
  chosen_spanish: acampó contra Joppe
  alternatives_spanish:
  - acamparon contra Joppe
  - marchó contra Joppe
  lexicon: LSJ
  rationale: El verbo militar griego expresa la acción de establecer el campamento en actitud hostil frente a un lugar. «Acampó contra» conserva mejor ese matiz que un simple «marchó contra», y «Joppe» es la forma española usual del topónimo bíblico, aunque el POB inglés usa Joppa.
- source_word: ἀπέκλεισαν αὐτόν
  english_pob_choice: shut him out
  chosen_spanish: lo cerraron fuera
  alternatives_spanish:
  - lo excluyeron
  - cerraron las puertas contra él
  lexicon: LSJ
  rationale: ἀποκλείω significa cerrar fuera, excluir o impedir el acceso. «Lo cerraron fuera» refleja de manera directa la exclusión de la ciudad y mantiene el valor narrativo militar sin añadir detalles no explícitos.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: those from the city
  chosen_spanish: los de la ciudad
  alternatives_spanish:
  - los hombres de la ciudad
  - los que eran de la ciudad
  lexicon: LSJ
  rationale: La frase griega significa literalmente «los de la ciudad». En español, «los de la ciudad» reproduce esa literalidad con naturalidad y evita masculinizar innecesariamente como «los hombres», dado que el griego aquí funciona como designación colectiva.
- source_word: φρουρὰ Ἀπολλωνίου
  english_pob_choice: a garrison of Apollonius
  chosen_spanish: una guarnición de Apolonio
  alternatives_spanish:
  - la guarnición de Apolonio
  - una fuerza de guardia de Apolonio
  lexicon: LSJ
  rationale: φρουρά en contexto militar denota una guarnición. «Guarnición de Apolonio» conserva la relación posesiva o de pertenencia implícita en el genitivo sin sobreinterpretarla, y sigue de cerca la decisión inglesa.
- source_word: ἐπολέμησαν αὐτήν
  english_pob_choice: they fought against it
  chosen_spanish: pelearon contra ella
  alternatives_spanish:
  - lucharon contra ella
  - hicieron guerra contra ella
  lexicon: LSJ
  rationale: πολεμέω puede significar pelear o hacer la guerra contra algo. «Pelearon contra ella» reproduce el sentido militar y mantiene el referente femenino singular del pronombre, que apunta a la ciudad de Joppe.
translation_notes:
  revision_awareness: La redacción sigue la coordinación repetida del griego con tres miembros unidos por καὶ, como reflejó la última revisión inglesa al sustituir los contrastes por «and». También conserva el referente femenino de αὐτήν para el final, entendido como Joppe/la ciudad, sin desplazarlo a un objeto más interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Joppe» como topónimo bíblico tradicional en español, aunque el audit trail inglés usa Joppa.
  - Se preserva la secuencia verbal simple y coordinada del griego, evitando nexos adversativos o consecutivos no presentes en el texto fuente.
  - El pronombre final «ella» conserva la referencia femenina al topónimo/ciudad, como en el inglés auditado.
