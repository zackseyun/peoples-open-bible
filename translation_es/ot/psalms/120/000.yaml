translation:
  language: es
  text: Cántico de subidas.[a] A Yahvé, en mi angustia, llamé, y él me respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Cántico de ascensos», un encabezamiento tradicional para los Salmos 120–134; también puede entenderse como «cántico de subidas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents.
  chosen_spanish: Cántico de ascensos.
  alternatives_spanish:
  - Cántico de subidas.
  - Canción de ascensos.
  lexicon: שִׁיר; מַעֲלוֹת
  rationale: El hebreo expresa el título tradicional de la colección. «Cántico de ascensos» conserva la forma breve y litúrgica sin añadir una explicación interpretativa al texto principal; «ascensos» mantiene la relación con el título tradicional documentado en la nota inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: יהוה
  rationale: La pauta del proyecto pide «Yahvé» para el nombre divino. Se evita «SEÑOR» por ser una convención de sustitución, no una traducción directa, y se mantiene la transparencia con el hebreo.
- source_word: בַּצָּרָה לִּי
  english_pob_choice: in my distress
  chosen_spanish: en mi angustia
  alternatives_spanish:
  - en mi aflicción
  - en mi tribulación
  lexicon: צָרָה
  rationale: «Angustia» comunica bien la presión o aflicción personal del hebreo sin volver el español artificial. Otras opciones son posibles, pero «angustia» es natural y fiel al campo semántico.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: clamé
  alternatives_spanish:
  - llamé
  - grité
  lexicon: קרא
  rationale: En este contexto, el verbo no es mera mención de voz, sino invocación dirigida a Yahvé; «clamé» preserva ese sentido orante y la intensidad del acto.
- source_word: וַיַּעֲנֵנִי
  english_pob_choice: and he answered me
  chosen_spanish: y él me respondió
  alternatives_spanish:
  - y me respondió
  - y él contestó
  lexicon: ענה
  rationale: Se mantiene la relación directa sujeto-verbo-objeto sin sobrecargar el español. «Respondió» es la forma más natural y fiel para la respuesta divina.
theological_decisions:
- issue: Tratamiento del nombre divino en un título y en la cláusula principal
  english_pob_reading: The revision pass rendered יְהוָה as 'Yahweh' and completed the verse beyond the superscription.
  chosen_spanish_reading: Se conserva «Yahvé» en la cláusula principal y se mantiene el título como encabezamiento del salmo.
  alternative_spanish_readings:
  - Cántico de ascensos. A Yahvé, en mi angustia, clamé, y él me respondió.
  - Cántico de subidas. A Yahvé, en mi angustia, clamé, y él me respondió.
  rationale: No hay necesidad de ocultar el nombre divino en la traducción española; la forma «Yahvé» sigue la política del proyecto. El título se traduce de manera breve y funcional, sin convertirlo en una paráfrasis explicativa.
  doctrine_reference: Éxodo 3:15; Salmo 120 encabezamiento
translation_notes:
  revision_awareness: 'La base inglesa revisada amplió el registro desde solo el título hasta incluir la cláusula principal completa: «To Yahweh in my distress I called, and he answered me». Esta versión española sigue esa revisión y refleja el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la terminología del proyecto.
  - «Angustia» traduce el campo semántico de צָרָה sin importar una lectura más técnica de 'aflicción' si el contexto no lo exige.
  - El título se conserva como encabezamiento separado por punto, siguiendo la práctica de la POB para superscripciones.
  - La nota a pie de página ofrece la alternativa tradicional documentada por el audit trail inglés sin desplazar el texto principal.
