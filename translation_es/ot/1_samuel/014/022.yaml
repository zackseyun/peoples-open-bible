translation:
  language: es
  text: Y todos los hombres de Israel que se habían escondido en la región montañosa[a] de Efraín oyeron que los filisteos habían huido, y ellos también los persiguieron de cerca en la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «en el monte de Efraín»; aquí se entiende como la región montañosa de Efraín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אִישׁ יִשְׂרָאֵל
  english_pob_choice: And all the men of Israel
  chosen_spanish: Y todos los hombres de Israel
  alternatives_spanish:
  - Y todo hombre de Israel
  - Y todos los israelitas
  lexicon: HALOT
  rationale: כֹל con אִישׁ funciona de manera colectiva y distributiva; en español, «todos los hombres de Israel» conserva el valor colectivo y la referencia explícita a אִישׁ sin suavizarla a un genérico más interpretativo como «israelitas».
- source_word: הַמִּתְחַבְּאִים
  english_pob_choice: who had hidden themselves
  chosen_spanish: que se habían escondido
  alternatives_spanish:
  - que se escondían
  - que habían estado escondidos
  lexicon: HALOT
  rationale: El participio expresa a los israelitas como un grupo en estado resultante de haberse ocultado; «se habían escondido» refleja bien esa situación retrospectiva en español natural.
- source_word: בְּהַר אֶפְרַיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la sierra de Efraín
  - en el monte de Efraín
  lexicon: HALOT
  rationale: הַר aquí se refiere al terreno alto de la zona, no a una sola montaña. «Región montañosa» comunica ese sentido geográfico de forma clara en español.
- source_word: שָׁמְעוּ כִּי נָסוּ פְּלִשְׁתִּים
  english_pob_choice: heard that the Philistines had fled
  chosen_spanish: oyeron que los filisteos habían huido
  alternatives_spanish:
  - oyeron que los filisteos huían
  - oyeron que los filisteos huyeron
  lexicon: HALOT
  rationale: El pluscuamperfecto español («habían huido») expresa bien que la huida ya había ocurrido cuando ellos la supieron; sigue la secuencia narrativa del hebreo y del POB en inglés.
- source_word: וַיַּדְבְּקוּ ... אַחֲרֵיהֶם
  english_pob_choice: closely pursued them
  chosen_spanish: los persiguieron de cerca
  alternatives_spanish:
  - los siguieron de cerca
  - se les pegaron detrás
  lexicon: HALOT
  rationale: דבק con אַחֲרֵי es idiomático en contexto militar y significa persecución estrecha. «Los persiguieron de cerca» conserva el valor dinámico sin perder la fuerza del hebreo; evita una traducción demasiado literal como «se pegaron tras ellos».
- source_word: גַם הֵמָּה
  english_pob_choice: they too
  chosen_spanish: y ellos también
  alternatives_spanish:
  - también ellos
  - ellos asimismo
  lexicon: HALOT
  rationale: La partícula inclusiva marca que estos israelitas se sumaron a otros. «Ellos también» es la forma más natural y clara en español.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en el combate
  - en la guerra
  lexicon: HALOT
  rationale: El sustantivo designa aquí el enfrentamiento concreto. «Batalla» preserva el escenario militar inmediato mejor que una abstracción como «guerra».
translation_notes:
  revision_awareness: El texto español sigue la revisión final del POB inglés que ajustó el sujeto a plural («all the men») y reforzó la idea de persecución estrecha («closely pursued them») en vez de una lectura más idiomática pero menos directa. La versión española refleja esa misma preferencia por claridad narrativa y correspondencia semántica con el hebreo.
  spanish_consistency_notes:
  - Se usa «Efraín» como topónimo bíblico estándar en español.
  - Se mantiene «filisteos» como etnónimo tradicional y claro.
  - «Los persiguieron de cerca» preserva el matiz del verbo hebreo דבק en contexto bélico, acorde con el audit trail en inglés.
