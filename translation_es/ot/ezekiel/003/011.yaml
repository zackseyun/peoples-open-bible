translation:
  language: es
  text: 'Y ve, ve a los desterrados, a los hijos[a] de tu pueblo, y háblales y diles: «Así dice el Señor Yahvé: “Ya sea que escuchen o que se nieguen”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos varones de tu pueblo»; el hebreo dice literalmente «hijos», una expresión representativa de parentesco.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֵךְ
  english_pob_choice: And go
  chosen_spanish: Y ve
  alternatives_spanish:
  - Ve
  lexicon: HALOT
  rationale: El hebreo une la comisión con una conjunción y un imperativo breve. «Y ve» conserva la secuencia y el tono urgente sin añadir material.
- source_word: בֹּא
  english_pob_choice: come
  chosen_spanish: entra
  alternatives_spanish:
  - ve
  - ven
  lexicon: HALOT
  rationale: En este contexto, בוא indica movimiento hacia el lugar del destinatario. «Entra» comunica la llegada al ámbito de los desterrados sin perder el sentido direccional.
- source_word: הַגּוֹלָה
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - la comunidad desterrada
  lexicon: HALOT
  rationale: El sustantivo se refiere al grupo deportado. «Desterrados» es natural en español y mantiene el carácter colectivo de personas trasladadas al exilio.
- source_word: בְּנֵי עַמֶּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - los hijos varones de tu pueblo
  - tu pueblo
  lexicon: HALOT
  rationale: Se conserva la expresión filial masculina del hebreo, pero en español «hijos» suena más natural y sigue siendo fiel a la forma representativa/corporativa.
- source_word: וְדִבַּרְתָּ אֲלֵיהֶם
  english_pob_choice: and speak to them
  chosen_spanish: y háblales
  alternatives_spanish:
  - y habla con ellos
  - y les hablarás
  lexicon: HALOT
  rationale: La forma verbal continúa la serie de mandatos. «Háblales» conserva la dirección del objeto pronominal y la fuerza imperativa.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y les dirás
  lexicon: HALOT
  rationale: Se mantiene la repetición del doble verbo hebreo sin fusionarlo. «Diles» preserva el valor de mandato y el enlace con el discurso directo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética estándar en español bíblico se expresa con claridad como «Así dice», que conserva el registro solemne y performativo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Nombre divino se translitera como «Yahvé» en el texto principal. Se mantiene el título «Señor» para אֲדֹנָי y se evita la sustitución por una mayúscula de ocultamiento.
- source_word: אִם יִשְׁמְעוּ
  english_pob_choice: whether they hear
  chosen_spanish: si escuchan
  alternatives_spanish:
  - si oyen
  - si hacen caso
  lexicon: HALOT
  rationale: Aunque el inglés usa «whether», el hebreo presenta una alternativa con אִם...וְאִם. En español, «si» funciona de modo natural en la estructura correlativa y «escuchan» preserva la dimensión de atender/obedecer.
- source_word: וְאִם יֶחְדָּלוּ
  english_pob_choice: or whether they refuse
  chosen_spanish: o si dejan de hacerlo
  alternatives_spanish:
  - o si se abstienen
  - o si dejan de escuchar
  lexicon: HALOT
  rationale: חדל significa cesar o dejar de actuar; el contexto lo contrapone a escuchar. «Dejan de hacerlo» conserva la literalidad básica y deja abierta la tensión entre cesar y rehusar atender.
theological_decisions:
- issue: Tratamiento del Nombre divino יהוה junto con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: El texto hebreo distingue el título אֲדֹנָי del Nombre propio יהוה. En español se conserva esa distinción con «Señor» + «Yahvé», siguiendo el estándar del proyecto para el Nombre divino y evitando el reemplazo por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Expresión kinship/corporativa בְּנֵי עַמֶּךָ
  english_pob_reading: the sons of your people
  chosen_spanish_reading: los hijos de tu pueblo
  alternative_spanish_readings:
  - los hijos varones de tu pueblo
  - tu pueblo
  rationale: Se mantiene la forma masculina plural del hebreo, que el audit trail considera una expresión representativa y no una referencia restringida a varones. «Hijos» es idiomático y conserva el vínculo familiar/corporativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Valor de אִם ... וְאִם en la cláusula final
  english_pob_reading: whether they hear or whether they refuse
  chosen_spanish_reading: si escuchan, o si dejan de hacerlo
  alternative_spanish_readings:
  - si escuchan o si se niegan
  - si escuchan o si no escuchan
  rationale: La estructura hebrea no presenta una condición simple, sino alternativas correlativas. La redacción española conserva esa disyuntiva sin perder la oposición entre escuchar y cesar/retraerse.
  doctrine_reference: Ezekiel prophetic commission formula / HALOT חדל
- issue: Traducción de חדל en este contexto profético
  english_pob_reading: refuse / forbear
  chosen_spanish_reading: dejan de hacerlo
  alternative_spanish_readings:
  - se abstienen
  - dejan de escuchar
  rationale: El audit trail indica que el verbo literalmente significa cesar/refrain, pero en la fórmula de Ezequiel funciona como contraste de oír obedientemente. En español se preserva la literalidad básica sin ocultar la tensión semántica.
  doctrine_reference: HALOT חדל
translation_notes:
  revision_awareness: Se consultó el paquete canónico y el audit trail en inglés. No hubo revisiones aplicadas en el registro fuente y el estado de concordancia más reciente es de alta conformidad; la redacción española sigue esa lectura sin introducir cambios interpretativos no atestiguados.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme a la norma del proyecto.
  - Se conserva la fórmula profética con «Así dice».
  - Se mantiene la repetición verbal de «háblales y diles» para reflejar el doble mandato hebreo.
  - «Desterrados» se emplea para הַגּוֹלָה en sentido colectivo.
  - La nota al pie marca la alternativa representativa de «hijos» sin imponer lenguaje neutral.
