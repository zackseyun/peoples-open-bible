translation:
  language: es
  text: 'Pero ustedes lo profanan[a] al decir[b]: «La mesa del Señor está profanada, y su fruto, su comida[c], es despreciado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo profanan a él», si el pronombre se entiende como referencia directa al Señor en vez de a su nombre.'
    reason: alternative_reading
  - marker: b
    text: 'O: «cuando dicen». La construcción expresa el medio por el que cometen la profanación.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «su fruto, su comida». La frase probablemente se refiere a las ofrendas de alimento asociadas con la mesa o altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחַלְּלִים
  english_pob_choice: are profaning
  chosen_spanish: lo profanan
  alternatives_spanish:
  - lo contaminan
  - lo profanan y profanan
  lexicon: HALOT
  rationale: En este contexto cultual, חלל comunica tratar lo santo como común o irreverente; «profanar» conserva mejor esa fuerza que un verbo más general como «contaminar».
- source_word: אוֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - al Señor
  - lo mismo
  lexicon: HALOT
  rationale: El objeto directo puede referirse al antecedente inmediato de 1:11, el nombre del Señor; en español, «lo» mantiene la referencia impersonal más probable sin forzar «a él».
- source_word: בֶּאֱמָרְכֶם
  english_pob_choice: by saying
  chosen_spanish: al decir
  alternatives_spanish:
  - cuando dicen
  - en decir
  lexicon: HALOT
  rationale: La construcción expresa el medio por el cual profanan; «al decir» comunica bien el valor instrumental/mediante-speech del hebreo.
- source_word: שֻׁלְחַן אֲדֹנָי
  english_pob_choice: the table of the Lord
  chosen_spanish: la mesa del Señor
  alternatives_spanish:
  - la mesa del Señor Dios
  - la mesa del Señor
  lexicon: HALOT
  rationale: «Mesa» conserva la imagen cultual y sacrificial. «Señor» sigue la guía para אֲדֹנָי como título divino, no como sustituto de YHWH.
- source_word: מְגֹאָ֣ל
  english_pob_choice: defiled
  chosen_spanish: contaminada
  alternatives_spanish:
  - defendida
  - manchada
  - contaminada
  lexicon: HALOT
  rationale: El participio pasivo comunica suciedad ritual/profana. En español, «contaminada» o «manchada» son naturales; aquí se eligió «contaminada» para dar el matiz de impureza cultual, aunque el registro de «profanar» ya sostiene la tensión sagrada.
- source_word: נִיבוֹ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - su producto
  lexicon: HALOT
  rationale: El sustantivo puede significar fruto/produce. «Fruto» es la equivalencia más directa y mantiene la textura metafórica de la frase.
- source_word: אָכְלוֹ
  english_pob_choice: its food
  chosen_spanish: su comida
  alternatives_spanish:
  - lo que se come de él
  - su alimento
  lexicon: HALOT
  rationale: El hebreo es literalmente «su comida/alimento». «Su comida» conserva la aposición breve y la relación con el término anterior sin sobreexplicar.
theological_decisions:
- issue: Referent of the object pronoun in the accusation
  english_pob_reading: The pronoun refers to the Lord's name from the preceding context, rendered as 'it.'
  chosen_spanish_reading: El pronombre se mantiene impersonal («lo») y apunta al antecedente de 1:11, el nombre del Señor, sin convertirlo en objeto personal explícito.
  alternative_spanish_readings:
  - «al Señor» si se toma el pronombre como referencia directa a Dios
  - «su nombre» si se explicitara el antecedente
  rationale: La lectura inmediata de Mal 1:11-12 favorece el nombre del Señor como antecedente. El español puede conservar esa referencia con «lo», evitando introducir una expansión no requerida por el texto.
  doctrine_reference: Mal. 1:11-12; principios de continuidad discursiva y nombre divino
- issue: Rendering of the cultic apposition 'its fruit, its food'
  english_pob_reading: ‘its fruit, its food’ likely refers to the food offerings associated with the altar/table.
  chosen_spanish_reading: «su fruto, su comida» conserva la apposición hebrea y deja ver que se trata del alimento/oblación vinculada con la mesa-altar.
  alternative_spanish_readings:
  - «su fruto, su alimento»
  - «su producto, su comida»
  rationale: El hebreo acumula dos sustantivos breves; la versión española debe mantener esa compactación y no resolverla demasiado. «Comida» deja abierta la referencia cultual, como en el auditable inglés POB.
  doctrine_reference: Mal. 1:12; nota léxica sobre נִיב/אָכַל y contexto sacrificial
- issue: Rendering of אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - el Dueño
  rationale: La forma hebrea es el título אֲדֹנָי; conforme al criterio del proyecto, se traduce como «Señor», no como «Yahvé».
  doctrine_reference: 'Contested terms: YHWH / אֲדֹנָי'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que conservó la apposición breve «its fruit, its food» y eliminó el guion largo por puntuación más fluida. En español se preservó esa apposición sin expandirla, y se mantuvo la estructura causal/instrumental con una formulación natural.
  spanish_consistency_notes:
  - Se usó «Señor» para אֲדֹנָי conforme al criterio del proyecto, no «Yahvé».
  - Se mantuvo el valor cultual de חלל con «profanan» para no suavizar la acusación.
  - La pareja «su fruto, su comida» reproduce la compactación hebrea y el paralelo del inglés auditado.
  - El pronombre objeto quedó deliberadamente no explicitado como nombre, para respetar la ambigüedad documentada.
