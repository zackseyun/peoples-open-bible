revisions:
- from: Y todo varón de Israel[a], y las mujeres y los niños, los que habitaban en Jerusalén, cayeron rostro en tierra delante del templo, y se echaron ceniza sobre sus cabezas, y extendieron sus sacos delante del Señor.
  to: Y todo varón de Israel[a], y las mujeres y los niños, los que habitaban en Jerusalén, cayeron sobre sus rostros delante del templo, y se echaron ceniza sobre sus cabezas, y extendieron sus vestiduras de saco[b] delante de Yahvé.
  rationale: Se revisa para ajustar el texto a la terminología obligatoria del proyecto («Yahvé»), evitar la ambigüedad moderna de «sacos» para σάκκους y mejorar la naturalidad de la postración sin perder literalidad. Se conserva la enumeración explícita del griego y la nota léxica sobre la expresión distributiva.
  reviewer_model: gpt-5.4
