review_pass:
  verdict: revise
  source_alignment_summary: 'La primera mitad del versículo está bien alineada con el hebreo y con el rastro POB: וישב פניו se refleja adecuadamente en «volverá su rostro», לאיים en «las costas» con nota alternativa válida, y ולכד רבים conserva la tersura del objeto implícito. El problema principal está en las cláusulas finales: el borrador español sigue la revisión inglesa, pero la nota b simplifica en exceso y no preserva suficientemente la dificultad sintáctica ni la relación pronominal documentada en el expediente inglés. Además, «devuelto sobre él» suena menos natural que «vuelto contra él» o «hecho volver sobre él».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad en la cláusula final. «Sin que su oprobio sea devuelto sobre él» es comprensible, aunque algo calcado; «sin que su propio oprobio vuelva contra él» fluye mejor en español e intensifica la referencia reflexiva implícita en la revisión inglesa («his own reproach»). También conviene hacer la nota b más precisa y más honesta respecto de la dificultad del hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Comandante» para קצין y «oprobio» para חרפה son defendibles. La revisión propuesta no altera ninguna decisión terminológica mayor, solo mejora la naturalidad española y la fidelidad al matiz de la cláusula difícil.
  issues:
  - severity: medium
    issue: La cláusula final «sin que su oprobio sea devuelto sobre él» suena calcada y algo torpe en español.
    rationale: Aunque formalmente cercana al inglés, la expresión no es la formulación más natural en español bíblico contemporáneo. «Vuelva contra él» comunica mejor la idea de reversión/retribución.
  - severity: medium
    issue: La nota b no preserva suficientemente la dificultad sintáctica documentada en el expediente inglés.
    rationale: El expediente inglés destaca que el hebreo de las cláusulas finales es difícil y que existe una lectura alternativa donde el comandante pone fin al oprobio «contra él» y/o el oprobio se vuelve sobre el agresor. La nota española actual resume demasiado y reduce la ambigüedad.
  revised_spanish_text: Entonces volverá su rostro hacia las costas[a] y capturará a muchos. Pero un comandante pondrá fin a su oprobio, sin que su propio oprobio[b] vuelva contra él.
  revised_footnotes:
  - marker: a
    text: O «a las islas». El término hebreo puede referirse a islas o, de manera más amplia, a regiones costeras o marítimas.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de las cláusulas finales es difícil. También puede significar que un comandante «pondrá fin a su oprobio contra él» y que ese oprobio le será devuelto; es decir, que la afrenta recaerá de vuelta sobre quien la causó.
    reason: alternative_reading
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español y reflejar mejor el matiz de la revisión inglesa con «su propio oprobio». También se amplió la nota b para conservar la dificultad del hebreo y la lectura alternativa documentada en el rastro POB.
