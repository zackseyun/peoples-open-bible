translation:
  language: es
  text: No vacilen en alabarlo abiertamente[a]. Es bueno ocultar un secreto de rey, pero dar a conocer las obras de Dios gloriosamente[b]. Hagan lo que es bueno, y el mal no los encontrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘reconocerlo’, ‘confesar ante él’ o ‘darle gracias’. El verbo griego puede abarcar estos sentidos de reconocimiento público según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘honorablemente’ o ‘con debido honor’. El adverbio griego puede describir la manera adecuada de hablar de las obras de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀκνεῖτε
  english_pob_choice: Do not hesitate
  chosen_spanish: No vacilen
  alternatives_spanish:
  - No tarden
  - No sean reacios
  lexicon: LSJ
  rationale: ὀκνεῖτε expresa vacilación, retraimiento o demora. ‘No vacilen’ conserva la fuerza exhortativa natural en español y evita una calca pesada.
- source_word: ἐξομολογεῖσθαι αὐτῷ
  english_pob_choice: to acknowledge
  chosen_spanish: reconocerlo
  alternatives_spanish:
  - confesarlo
  - darle gracias
  - alabarlo abiertamente
  lexicon: LSJ
  rationale: El verbo puede abarcar reconocer, confesar, dar gracias o alabar públicamente según el contexto. Aquí, como exhortación a hablar bien de Dios frente al contraste con ocultar secretos, ‘reconocerlo’ mantiene amplitud sin restringirlo a confesión de pecado.
- source_word: μυστήριον βασιλέως
  english_pob_choice: a king’s secret
  chosen_spanish: un secreto de rey
  alternatives_spanish:
  - el secreto de un rey
  - un secreto real
  lexicon: LSJ
  rationale: Aquí μυστήριον no tiene sentido técnico de ‘misterio’, sino de asunto confidencial. ‘Un secreto de rey’ conserva el proverbio y la brevedad del griego.
- source_word: καλὸν κρύψαι
  english_pob_choice: It is good to conceal
  chosen_spanish: Es bueno ocultar
  alternatives_spanish:
  - Es noble esconder
  - Es correcto mantener oculto
  lexicon: LSJ
  rationale: La construcción infinitiva expresa una máxima general. ‘Es bueno ocultar’ reproduce la valoración moral en español de forma clara y proverbial.
- source_word: τὰ δὲ ἔργα τοῦ θεοῦ
  english_pob_choice: the works of God
  chosen_spanish: las obras de Dios
  alternatives_spanish:
  - los hechos de Dios
  - las acciones de Dios
  lexicon: LSJ
  rationale: ἔργα puede traducirse por ‘obras’ o ‘hechos’. ‘Las obras de Dios’ es la fórmula más transparente y mantiene el contraste con el secreto del rey.
- source_word: ἀνακαλύπτειν
  english_pob_choice: to reveal
  chosen_spanish: revelar
  alternatives_spanish:
  - descubrir
  - desvelar
  - dar a conocer
  lexicon: LSJ
  rationale: El verbo significa literalmente descubrir o desvelar. ‘Revelar’ es conciso y reproduce bien el paralelismo con ‘ocultar’.
- source_word: ἐνδόξως
  english_pob_choice: gloriously
  chosen_spanish: gloriosamente
  alternatives_spanish:
  - con honor
  - honorablemente
  - de manera gloriosa
  lexicon: LSJ
  rationale: El adverbio puede expresar un modo digno u honorífico, pero en relación con las obras de Dios también admite un matiz doxológico. ‘Gloriosamente’ conserva ese peso teológico, mientras que la alternativa ética queda registrada en nota.
- source_word: ἀγαθὸν ποιήσατε
  english_pob_choice: Do what is good
  chosen_spanish: Hagan lo que es bueno
  alternatives_spanish:
  - Hagan el bien
  - Practiquen lo bueno
  lexicon: LSJ
  rationale: La frase es una exhortación ética directa. ‘Hagan lo que es bueno’ refleja con fidelidad el objeto del verbo y suena natural en español.
- source_word: κακὸν οὐχ εὑρήσει ὑμᾶς
  english_pob_choice: evil will not find you
  chosen_spanish: el mal no los encontrará
  alternatives_spanish:
  - el mal no los hallará
  - la desgracia no los alcanzará
  - el mal no se les acercará
  lexicon: LSJ
  rationale: El griego dice literalmente que ‘el mal no los encontrará’. Se conserva la imagen directa; ‘mal’ puede incluir daño o calamidad, pero no se diluye el paralelo verbal.
theological_decisions:
- issue: Sentido de ἐξομολογεῖσθαι αὐτῷ
  english_pob_reading: openly acknowledge God
  chosen_spanish_reading: reconocerlo públicamente
  alternative_spanish_readings:
  - confesarlo
  - darle gracias
  - alabarlo abiertamente
  rationale: El contexto contrapone ocultar secretos reales con manifestar las obras de Dios, por lo que el verbo no se limita a confesión de pecado. ‘Reconocerlo’ preserva amplitud devocional y pública.
  doctrine_reference: Translation philosophy §1, §3
- issue: Matiz de ἐνδόξως
  english_pob_reading: gloriously
  chosen_spanish_reading: gloriosamente
  alternative_spanish_readings:
  - honorablemente
  - con debido honor
  rationale: El adverbio probablemente añade un matiz doxológico al hablar de las obras de Dios. ‘Gloriosamente’ conserva ese tono; la nota mantiene la posible lectura ética de honor debido.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Sin cambios respecto al pase más reciente: el borrador mantiene el acuerdo alto con la fuente griega y con el audit trail en inglés. Se conserva la amplitud semántica de ἐξομολογεῖσθαι y el posible matiz doble de ἐνδόξως.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para τοῦ θεοῦ y no se introduce una sustitución litúrgica.
  - ‘Obras de Dios’ conserva la fórmula tradicional sin perder el contraste proverbial con ‘secreto de rey’.
  - ‘Mal’ traduce κακόν de forma literal y se deja la posible amplitud de daño/calamidad implícita.
  - El texto evita calcos innecesarios, pero no amplía el sentido más allá del griego ni borra tensiones léxicas documentadas.
