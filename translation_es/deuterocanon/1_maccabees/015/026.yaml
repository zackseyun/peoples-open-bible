translation:
  language: es
  text: Y Simón le envió dos mil hombres escogidos para combatir junto a él[a], y plata, oro y suficientes pertrechos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «para ser su aliado» o «para asistirle». El verbo griego puede denotar apoyo aliado más amplio; aquí el contexto favorece ayuda militar concreta.'
    reason: alternative_reading
  - marker: b
    text: 'También: «suficientes suministros». σκεύη es un término amplio que puede abarcar equipo, utensilios o provisiones según el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ ἀπέστειλεν αὐτῷ Σίμων
  english_pob_choice: And Simon sent him
  chosen_spanish: Y Simón le envió
  alternatives_spanish:
  - Y Simón le mandó
  - Y Simón le despachó
  lexicon: LSJ
  rationale: ἀπέστειλεν expresa la acción narrativa de enviar; «envió» es natural y formal en español. Se mantiene el dativo pronominal «le» para reflejar αὐτῷ.
- source_word: διαχιλίους ἄνδρας
  english_pob_choice: two thousand men
  chosen_spanish: dos mil hombres
  alternatives_spanish:
  - dos mil soldados
  - dos mil varones
  lexicon: LSJ
  rationale: El numeral compuesto con ἄνδρας señala simplemente «dos mil hombres». «Soldados» sería interpretativo, y «varones» suena más arcaico.
- source_word: ἐκλεκτοὺς
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - selectos
  lexicon: LSJ
  rationale: «Escogidos» conserva la idea de selección sin añadir connotación técnica militar que el griego no explicita.
- source_word: συμμαχῆσαι αὐτῷ
  english_pob_choice: to fight alongside him
  chosen_spanish: para que combatieran junto a él
  alternatives_spanish:
  - para ayudarle en guerra
  - para ser su aliado
  - para auxiliarle
  lexicon: LSJ
  rationale: El verbo puede abarcar apoyo aliado más amplio, pero aquí el contexto militar favorece la asistencia armada. «Combatieran junto a él» comunica el sentido práctico sin reducirlo solo a una alianza formal.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - plata acuñada
  lexicon: LSJ
  rationale: Aunque puede significar dinero, en la lista junto con oro la referencia más concreta y natural es «plata».
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: LSJ
  rationale: Equivalente directo de χρυσίον.
- source_word: σκεύη ἱκανά
  english_pob_choice: sufficient equipment
  chosen_spanish: suficientes pertrechos
  alternatives_spanish:
  - suficiente equipo
  - bastantes provisiones
  - suficientes equipos
  lexicon: LSJ
  rationale: σκεύη es un término amplio que puede abarcar equipo, útiles o provisiones; en contexto militar, «pertrechos» comunica bien el apoyo material. «Suficientes» preserva ἱκανά con un registro formal.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete y la pista auditada de la POB inglesa, conservando la tensión lexical de συμμαχῆσαι αὐτῷ y de σκεύη ἱκανά. Se adoptó un registro más formal que el castellano coloquial, sin sobretraducir a ‘aliado’ ni restringir indebidamente ‘pertrechos’.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «escogidos» para ἐκλεκτούς por coherencia con el valor electivo del adjetivo sin militarizarlo.
  - «Pertrechos» mantiene la amplitud de σκεύη en un contexto de apoyo bélico y evita reducirlo solo a «suministros».
