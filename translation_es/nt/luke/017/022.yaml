translation:
  language: es
  text: 'Entonces dijo a los discípulos[a]: «Vienen días en que desearán ver uno de los días del Hijo del Hombre[b], y no lo verán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los días vendrán cuando desearán ver uno de los días del Hijo del Hombre, y no lo verán».

      '
    reason: lexical_alternative
  - marker: b
    text: «Los días del Hijo del Hombre» puede referirse al tiempo de su presencia y obra, o más específicamente a su revelación futura; la expresión griega deja abierto el alcance.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἶπεν δὲ
  english_pob_choice: Then he said
  chosen_spanish: Entonces les dijo
  alternatives_spanish:
  - Y les dijo
  - Luego les dijo
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector narrativo suave. «Entonces» comunica avance del relato con fluidez natural en español sin añadir contraste fuerte.
- source_word: πρὸς τοὺς μαθητάς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  - para los discípulos
  lexicon: BDAG
  rationale: El griego tiene el artículo, pero no un posesivo explícito. «A los discípulos» sigue con precisión el texto sin añadir matiz posesivo no presente.
- source_word: Ἐλεύσονται ἡμέραι
  english_pob_choice: Days are coming
  chosen_spanish: Vienen días
  alternatives_spanish:
  - Vendrán días
  - Llegarán días
  lexicon: BDAG
  rationale: La expresión es idiomática y profética. «Vienen días» suena natural en español y mantiene la fuerza de anuncio futuro.
- source_word: ἐπιθυμήσετε
  english_pob_choice: you will long
  chosen_spanish: desearán
  alternatives_spanish:
  - anhelarán
  - tendrán deseo de
  lexicon: BDAG
  rationale: En español, «desearán» conserva el sentido de fuerte anhelo sin introducir una imagen más intensa o más afectiva de la que exige el griego.
- source_word: μίαν τῶν ἡμερῶν
  english_pob_choice: one of the days
  chosen_spanish: uno de los días
  alternatives_spanish:
  - un solo día entre los días
  - uno cualquiera de los días
  lexicon: BDAG
  rationale: La construcción partitiva se refleja de forma directa y clara con «uno de los días».
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: of the Son of Man
  chosen_spanish: del Hijo del Hombre
  alternatives_spanish:
  - del Hijo del Hombre
  - del Hijo del ser humano
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional y literal, porque el español lo entiende bien y mantiene la resonancia daniélica y teológica del original.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - contemplar
  - mirar
  lexicon: BDAG
  rationale: El infinitivo de propósito se traduce con el verbo simple «ver», claro y natural en español.
- source_word: καὶ οὐκ ὄψεσθε
  english_pob_choice: and you will not see it
  chosen_spanish: y no lo verán
  alternatives_spanish:
  - pero no lo verán
  - y no verán aquello
  lexicon: BDAG
  rationale: En español, el pronombre objeto directo «lo» ayuda a referir con naturalidad al día anhelado. Se conserva el simple enlace con «y», sin intensificar la relación con un adversativo que el griego no exige.
theological_decisions:
- issue: Sentido de «los días del Hijo del Hombre»
  english_pob_reading: An eschatologically charged reference to the time of the Son of Man, left somewhat open rather than narrowed to only Jesus' earthly ministry or only the future revelation.
  chosen_spanish_reading: Una referencia cargada escatológicamente al tiempo del Hijo del Hombre, mantenida abierta sin reducirla solo al ministerio terrenal de Jesús ni solo a su revelación futura.
  alternative_spanish_readings:
  - los días de la presencia terrenal de Jesús con los discípulos
  - los días de la manifestación futura del Hijo del Hombre
  rationale: La redacción española conserva la misma apertura interpretativa que el texto griego y la POB inglesa, evitando resolver una tensión que el propio dicho deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la revisión inglesa más reciente; no se requieren ajustes textuales adicionales. La traducción española sigue la misma decisión de mantener la ambigüedad de «los días del Hijo del Hombre» y de no cargar el conector δέ con un contraste más fuerte del que el griego expresa.
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título estable y reconocido, en línea con la terminología POB.
  - «Días» conserva el valor idiomático profético del griego y evita una paráfrasis explicativa.
  - Se usa «lo» para retomar de forma natural el objeto implícito de «ver», sin añadir contenido nuevo.
