translation:
  language: es
  text: Dios mío[a], clamo de día, pero tú no respondes; y de noche[b], no tengo reposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Clamo a ti». El verbo hebreo puede traducirse más literalmente como «llamo», pero en este lamento el sentido es una súplica intensa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hay silencio para mí». El hebreo puede conservar la imagen de una ausencia de silencio o quietud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Oh Dios mío
  - Mi Dios
  lexicon: HALOT
  rationale: El sufijo de 1.ª persona indica posesión/vocativo directo; en español, «Dios mío» expresa naturalmente la apelación íntima sin añadir una interjección no explícita en el hebreo. Se evita «Señor» porque el texto usa אֱלֹהִים y no el tetragrámaton.
- source_word: אֶקְרָא
  english_pob_choice: I cry out
  chosen_spanish: clamo
  alternatives_spanish:
  - grito
  - llamo
  - clamo a
  lexicon: HALOT
  rationale: En un contexto de lamento, קרא comunica una súplica intensa, no una simple llamada. «Clamo» mantiene la fuerza apelativa y suena natural en español bíblico contemporáneo.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en el día
  lexicon: HALOT
  rationale: Es un adverbio temporal que funciona bien con el paralelismo de «de noche». «De día» es idiomático y breve.
- source_word: וְלֹא תַעֲנֶה
  english_pob_choice: but you do not answer
  chosen_spanish: pero tú no respondes
  alternatives_spanish:
  - y tú no respondes
  - sin que tú respondas
  lexicon: HALOT
  rationale: El hebreo presenta una negación coordinada que, en español, en tono de queja/lamento, adquiere bien la fuerza adversativa de «pero». «Responder» traduce adecuadamente ענה en este contexto de oración no atendida.
- source_word: וְלַיְלָה
  english_pob_choice: and by night
  chosen_spanish: y de noche
  alternatives_spanish:
  - y por la noche
  - de noche
  lexicon: HALOT
  rationale: Conserva la coordinación paralela con «de día». «Y de noche» reproduce el ritmo del hebreo sin calco pesado.
- source_word: דֻמִיָּה לִי
  english_pob_choice: there is no silence for me / I have no rest
  chosen_spanish: no tengo reposo
  alternatives_spanish:
  - no hay silencio para mí
  - no encuentro quietud
  lexicon: HALOT
  rationale: El sustantivo דומיה señala silencio/quietud/reposo. La auditoría inglesa reconoció la tensión entre la imagen literal de «silencio» y la lectura natural de «reposo». En español, «no tengo reposo» comunica con fidelidad esa falta de quietud sin perder la idea poética de ausencia de silencio interior.
theological_decisions:
- issue: Valor de דֻמִיָּה לִי en la línea final
  english_pob_reading: The psalmist experiences no silence/quietness/rest despite crying out at night.
  chosen_spanish_reading: El salmista declara que no tiene reposo en la noche, preservando la queja de ausencia de quietud.
  alternative_spanish_readings:
  - no hay silencio para mí
  - no tengo silencio
  rationale: La POB inglesa mantuvo la tensión entre la literalidad de «silence» y la inteligibilidad de «rest». En español, «reposo» expresa de modo natural la misma falta de quietud existencial, sin imponer la interpretación de «respuesta» ni diluir el paralelo poético con el clamor de día.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue el paquete fuente hebreo y la auditoría inglesa, pero adopta la revisión posterior que prefiere una clausula final más natural que exprese la falta de reposo/quietud. Se evita traducir mecánicamente desde el inglés cuando el hebreo y el español piden un giro idiomático diferente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se sustituye por «Señor».
  - Se conserva el paralelismo temporal «de día / de noche».
  - Se evita una paráfrasis excesiva y se preserva la tensión semántica entre silencio, quietud y reposo en la línea final.
  - La puntuación con punto y coma ayuda a reflejar la estructura poética del hebreo.
