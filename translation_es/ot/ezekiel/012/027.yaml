- from: 'Hijo de hombre[a], mira, la casa de Israel está diciendo: «La visión que él ve es para muchos días por venir, y profetiza para tiempos lejanos».'
  to: '«Hijo de hombre[a], mira, la casa de Israel dice: “La visión que él ve es para muchos días por venir, y profetiza para tiempos lejanos”»'
  rationale: Se ajusta el vocativo a una forma española más natural y reconocible dentro del registro bíblico ('hijo de hombre') y se reemplaza el progresivo 'está diciendo' por el presente simple 'dice', más idiomático para caracterizar lo que el pueblo afirma. Se conserva el sentido temporal remoto y la nota léxica del expediente inglés.
