    reason: alternative_reading
  - marker: b
    text: O 'cuando la ley fue abierta' o 'desenrollada'. El verbo griego literalmente significa 'soltar', pero en este contexto se refiere a abrir la ley para su lectura pública.
    reason: lexical_alternative
  - marker: c
    text: '''Ejércitos'' traduce el griego sabaōth, un título divino tradicional que a veces se deja transliterado como ''Sabaot'' o ''Sabaoth''.'
    reason: alternative_reading
  revision_rationale: 'Se corrige una expansión interpretativa no explícita (''con reverencia''), se restituye la nota léxica clave sobre λῦσαι, y se reordenan/anclan las notas para que coincidan con las decisiones auditadas del POB: variante del nombre en Azarías, alternativa de ''abrir/desenrollar'' para la ley, y explicación de σαβαώθ en ''ejércitos''.'
