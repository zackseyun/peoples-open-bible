revisions:
- from: 'Ellos le dijeron[a]: «No, sino que de cierto te ataremos y te entregaremos en su mano[b]; pero de ningún modo te mataremos». Entonces lo ataron con dos cuerdas nuevas y lo hicieron subir desde la peña.'
  to: 'Ellos le dijeron: «No, sino que ciertamente te ataremos y te entregaremos en sus manos[a]; pero de ningún modo te mataremos». Entonces lo ataron con dos cuerdas nuevas y lo subieron desde la peña[b].'
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las expresiones explicadas. Además, se mejoró la naturalidad del español con «ciertamente» y «en sus manos», sin perder el énfasis ni la imagen hebrea, y se simplificó «lo hicieron subir» a «lo subieron» para una lectura más fluida.
