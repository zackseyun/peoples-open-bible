translation:
  language: es
  text: los que traman hacer que mi pueblo olvide mi nombre por sus sueños[a] que cuentan, cada hombre a su prójimo, así como sus padres olvidaron mi nombre a causa de Baal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante sus sueños». La preposición hebrea puede marcar medio o esfera.
    reason: lexical_alternative
  - marker: b
    text: O «por Baal» o «en Baal». Probablemente significa que la devoción a Baal los llevó a olvidar el nombre de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹשְׁבִים
  english_pob_choice: who plan
  chosen_spanish: los que traman
  alternatives_spanish:
  - los que planean
  - los que piensan
  lexicon: HALOT
  rationale: El participio aquí expresa intención deliberada y maquinación, no mera cognición; «traman» conserva bien el matiz de acción calculada en el contexto de falsos profetas.
- source_word: לְהַשְׁכִּיחַ
  english_pob_choice: to make ... forget
  chosen_spanish: hacer que ... olvide
  alternatives_spanish:
  - causar que ... olvide
  - hacer olvidar
  lexicon: HALOT
  rationale: 'El hiphil es causativo. En español, «hacer que» comunica de forma natural esa causación y mantiene el sujeto afectado: «mi pueblo».},{'
theological_decisions:
- issue: Lenguaje del ‘nombre’ del pacto
  english_pob_reading: my name / my name
  chosen_spanish_reading: mi nombre / mi nombre
  alternative_spanish_readings:
  - mi fama
  - quién soy
  rationale: Se conserva literalmente «nombre» porque el texto profético usa ese término para la identidad revelada y el vínculo de pacto de Yahvé; traducirlo de manera explicativa debilitaría esa carga bíblica.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Expresión distributiva masculina אִישׁ לְרֵעֵהוּ
  english_pob_reading: each man to his neighbor
  chosen_spanish_reading: cada hombre a su prójimo
  alternative_spanish_readings:
  - cada uno a su compañero
  - uno a otro
  rationale: El hebreo usa singular masculino con valor representativo. «Cada hombre a su prójimo» mantiene esa forma y sigue siendo natural en español, sin neutralizar indebidamente la construcción.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora ambos marcadores de nota aparecen exactamente en el texto español. La redacción sigue de cerca el hebreo y el audit trail inglés, con adaptación idiomática mínima para español natural.'
  spanish_consistency_notes:
  - «Yahvé» se reserva para el nombre divino en el texto principal cuando aparece la referencia explícita al nombre olvidado.
  - Se mantuvo «mi nombre» en ambas ocurrencias para conservar la teología del nombre del pacto.
  - «prójimo» funciona aquí como equivalente natural de רֵעַ en un intercambio interpersonal, sin perder el valor distributivo.
  - La nota [a] está anclada en «cuentan[a]» y la nota [b] en «prójimo[b]», evitando marcadores huérfanos.
