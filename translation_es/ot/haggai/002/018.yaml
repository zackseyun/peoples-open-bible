translation:
  language: es
  text: Consideren bien desde este día en adelante, desde el día veinticuatro del mes noveno, desde el día en que fue fundado[a] el templo de Yahvé; considérenlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el día en que se puso el cimiento del templo de Yahvé»'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂימוּ נָא לְבַבְכֶם
  english_pob_choice: consider / set your heart
  chosen_spanish: Presten atención
  alternatives_spanish:
  - Consideren
  - Pongan su corazón
  - Reflexionen con cuidado
  lexicon: HALOT
  rationale: El hebreo es un modismo exhortativo que pide atención reflexiva. En español, «presten atención» comunica bien la idea de enfocar la mente sin sonar forzado, y evita una calca como «pongan su corazón», que sería menos natural para lectores modernos.
- source_word: מִן הַיּוֹם הַזֶּה וָמָעְלָה
  english_pob_choice: from this day onward
  chosen_spanish: desde este día en adelante
  alternatives_spanish:
  - desde hoy en adelante
  - desde este día y hacia arriba
  - desde este día
  lexicon: HALOT
  rationale: La expresión marca un punto de partida temporal con orientación hacia el futuro. «Desde este día en adelante» es natural en español y conserva el valor de avance de וָמָעְלָה.
- source_word: מִיּוֹם עֶשְׂרִים וְאַרְבָּעָה לַתְּשִׁיעִי
  english_pob_choice: from the twenty-fourth day of the ninth month
  chosen_spanish: desde el día veinticuatro del noveno mes
  alternatives_spanish:
  - desde el veinticuatro del noveno mes
  - desde el día veinticuatro del mes noveno
  - desde el día veinticuatro del noveno
  lexicon: HALOT
  rationale: El hebreo da una fecha precisa. En español, explicitar «día» y «mes» vuelve la fecha clara y formal, manteniendo el orden natural de la frase.
- source_word: אֲשֶׁר יֻסַּד
  english_pob_choice: when ... was founded
  chosen_spanish: en que fue fundada
  alternatives_spanish:
  - cuando fue fundada
  - en que se fundó
  - cuando se estableció
  lexicon: HALOT
  rationale: El pasivo de יסד expresa el acto de fundar o poner el cimiento. «En que fue fundada» conserva esa pasividad y suena adecuado con «la casa de Yahvé».
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - el santuario de Yahvé
  - la casa de YHWH
  lexicon: HALOT
  rationale: Aunque הֵיכַל suele referirse al templo, en este contexto la imagen de «casa» mantiene la concordancia con el lenguaje bíblico de la construcción sagrada y permite una formulación natural en español. Se conserva «Yahvé» por la norma del proyecto para יהוה.
- source_word: שִׂימוּ לְבַבְכֶם
  english_pob_choice: consider it / set your heart on it
  chosen_spanish: presten atención
  alternatives_spanish:
  - consideren esto
  - reflexionen sobre ello
  - pongan su corazón en ello
  lexicon: HALOT
  rationale: La repetición final retoma la exhortación inicial. En español, repetir «presten atención» preserva el énfasis sin introducir un objeto explícito que el hebreo no formula aquí de manera independiente.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se rinde con «Yahvé» y no con una sustitución litúrgica como «SEÑOR», para preservar la transparencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor exhortativo del modismo hebreo שִׂימוּ לְבַבְכֶם
  english_pob_reading: consider / set your heart
  chosen_spanish_reading: presten atención
  alternative_spanish_readings:
  - consideren
  - piensen bien
  - reflexionen
  rationale: No hay aquí un mandato emocional sino una llamada a evaluar cuidadosamente la situación. «Presten atención» mantiene la fuerza exhortativa y evita neutralizar el giro idiomático en un simple «miren» o una paráfrasis demasiado libre.
  doctrine_reference: HALOT, entrada לבב / שׂים
- issue: Construcción temporal con repetición
  english_pob_reading: from this day onward ... from the day when ...
  chosen_spanish_reading: desde este día en adelante ... desde el día en que ...
  alternative_spanish_readings:
  - a partir de este día ... desde el día en que ...
  - desde hoy ... desde el día en que ...
  rationale: La repetición temporal es parte del énfasis retórico del versículo. Mantener ambas frases con «desde» ayuda a reproducir la cadencia y la progresión cronológica del hebreo.
  doctrine_reference: Estructura retórica del texto masorético
translation_notes:
  revision_awareness: 'La base inglesa revisó ''set your heart on this'' hacia ''consider'' por mayor naturalidad y precisión idiomática. Esta versión española sigue esa misma línea semántica, pero opta por una equivalencia natural distinta: «presten atención», que conserva el llamado a la evaluación cuidadosa y la repetición enfática del hebreo. También se mantiene la referencia directa al nombre divino como «Yahvé», conforme al criterio editorial del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, sin máscara litúrgica.
  - Se evita «Cristo» o terminología cristológica ajena al versículo.
  - «Casa de Yahvé» se mantiene por claridad contextual y naturalidad en español, sin perder el referente al templo.
  - La repetición exhortativa final se conserva para reflejar el énfasis del original.
