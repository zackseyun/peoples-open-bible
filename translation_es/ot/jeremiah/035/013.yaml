translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, el Dios de Israel: «Ve y di a los hombres de Judá y a los habitantes de Jerusalén: “¿No aceptarán instrucción[a] y escucharán mis palabras?, declara Yahvé”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «disciplina» o «corrección»; o «recibir instrucción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - De esta manera dice
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una equivalencia natural en español; ‘Así dice’ mantiene el tono solemne sin volverse arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como ‘Yahvé’, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: ‘Ejércitos’ expresa con claridad el rango de fuerzas bajo el mandato divino y es una forma transparente en español; evita el anglicismo litúrgico de ‘hosts’.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La cadena constructa se refleja de manera directa y sobria con ‘el Dios de Israel’.
- source_word: הָלֹךְ וְאָמַרְתָּ
  english_pob_choice: Go and say
  chosen_spanish: Vayan y digan
  alternatives_spanish:
  - Vayan y hablen
  - Vayan, y digan
  lexicon: HALOT
  rationale: En el contexto español, el mandato se formula con plural por el destinatario colectivo implícito; el infinitivo absoluto con verbo finito se traduce con un imperativo coordinado natural.
- source_word: לְאִישׁ יְהוּדָה
  english_pob_choice: to the men of Judah
  chosen_spanish: a los hombres de Judá
  alternatives_spanish:
  - a cada hombre de Judá
  - al pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la referencia masculina/colectiva de אִישׁ con ‘hombres de Judá’, sin diluirla en una paráfrasis más genérica.
- source_word: וּלְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and to the inhabitants of Jerusalem
  chosen_spanish: y a los habitantes de Jerusalén
  alternatives_spanish:
  - y a los que habitan en Jerusalén
  lexicon: HALOT
  rationale: ‘Habitantes’ es la forma moderna y exacta para el participio sustantivado, preservando el sentido locativo y colectivo.
- source_word: הֲלוֹא
  english_pob_choice: Will you not
  chosen_spanish: ¿No...
  alternatives_spanish:
  - ¿Acaso no...
  - ¿No será que...
  lexicon: HALOT
  rationale: La pregunta retórica en español se inicia con ‘¿No...?’ para mantener su fuerza exhortativa y su expectativa de respuesta afirmativa.
- source_word: תִקְחוּ מוּסָר
  english_pob_choice: accept instruction
  chosen_spanish: aceptarán instrucción[a]
  alternatives_spanish:
  - recibirán instrucción
  - aceptarán disciplina
  lexicon: HALOT
  rationale: ‘Aceptar instrucción’ sigue la revisión final del POB inglés y conserva la amplitud semántica de מוּסָר; la nota recoge la tensión con ‘disciplina/corrección’.
- source_word: לִשְׁמֹעַ אֶל דְּבָרַי
  english_pob_choice: and listen to my words
  chosen_spanish: y escucharán mis palabras
  alternatives_spanish:
  - y oirán mis palabras
  - y prestarán atención a mis palabras
  lexicon: HALOT
  rationale: Se elige ‘escucharán’ para expresar el oír obediente implícito en לִשְׁמֹעַ אֶל, sin forzar una perífrasis demasiado técnica.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé—
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: La fórmula profética final se mantiene como cláusula de cierre solemne; ‘declara’ refleja bien נְאֻם en español bíblico moderno.
theological_decisions:
- issue: Renderización del Tetragrámaton en un contexto profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente יְהוָה; el proyecto pide rendirlo como nombre propio. ‘Yahvé’ preserva el nombre del pacto sin la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מוּסָר en la exhortación
  english_pob_reading: accept instruction
  chosen_spanish_reading: aceptarán instrucción
  alternative_spanish_readings:
  - recibirán instrucción
  - aceptarán disciplina
  - tomarán corrección
  rationale: El contexto inmediato vincula מוּסָר con escuchar las palabras de Yahvé; por eso ‘instrucción’ es el núcleo más claro, sin borrar la posibilidad de disciplina/corrección que el término también porta.
  doctrine_reference: HALOT; English POB lexical note on מוּסָר
- issue: Fórmula profética final נְאֻם יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: —declara Yahvé—
  alternative_spanish_readings:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  rationale: ‘Declara’ conserva el tono formal y la marca profética de cierre; ‘oráculo’ sería posible pero menos directo para una publicación de lectura corriente.
  doctrine_reference: Jeremiah prophetic formula; English POB closing formula
translation_notes:
  revision_awareness: 'La versión inglesa POB pasó de ‘receive instruction by listening to my words’ a ‘accept instruction and listen to my words’ para reflejar con más naturalidad la sintaxis hebrea. La redacción española sigue esa decisión final: separa la acción de ‘aceptar instrucción’ de la de ‘escuchar mis palabras’, sin fusionarlas en una sola perífrasis.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ en todo el registro para יְהוָה, de acuerdo con la norma del proyecto.
  - Se optó por ‘de los ejércitos’ para צְבָאוֹת por claridad y reverencia en español.
  - Se preservó el paralelismo entre ‘aceptarán instrucción’ y ‘escucharán mis palabras’ para no diluir la exhortación.
  - La cita directa se cerró con raya larga para reflejar la fórmula profética final y facilitar lectura pública.
  - No se tradujo ‘מוּסָר’ con un único equivalente rígido; se señaló la alternativa en nota para conservar la tensión semántica.
