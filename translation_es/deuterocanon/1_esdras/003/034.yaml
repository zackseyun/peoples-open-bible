review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: vigilancia alrededor del rey, imposibilidad distributiva de apartarse para atender asuntos propios, y obediencia al rey. Sin embargo, la coordinación final cambia el sentido verbal al convertir «nor do they disobey him» en un infinitivo dependiente de «no puede», como si «cada uno» individualmente no pudiera desobedecerle, en vez de la afirmación independiente griega «ni tampoco le desobedecen».'
  spanish_quality_summary: El español es claro y natural en general, pero la secuencia «cada uno no puede irse y hacer su trabajo, ni desobedecerle» suena sintácticamente arrastrada y semánticamente ambigua. Requiere separar la última cláusula para mantener la lógica y fluidez del español.
  glossary_alignment: 'No hay términos teológicos o glosario de proyecto especialmente implicados en este versículo. «Velan», «alrededor de él», «cada uno», «irse», y «hacer su trabajo» son compatibles con las decisiones auditadas. La corrección necesaria afecta la sintaxis de «παρακούουσιν», mejor como cláusula finita: «ni le desobedecen».'
  issues:
  - severity: medium
    issue: La última cláusula está mal subordinada en español.
    rationale: 'El griego tiene dos predicados coordinados: «no pueden... irse y hacer su trabajo» y «ni desobedecen». El borrador «ni desobedecerle» hace que el segundo dependa de «no puede», alterando la estructura y el énfasis.'
  - severity: low
    issue: La colocación de «cada uno no puede» es menos natural que «ninguno puede» o «cada uno no puede».
    rationale: Aunque gramaticalmente posible por el valor distributivo de ἕκαστος, en español fluido conviene mantener el distributivo sin producir una lectura torpe. Se puede conservar «cada uno» si se reajusta la coordinación.
  revised_spanish_text: Pero ellos velan alrededor de él, y cada uno no puede irse y hacer su trabajo, ni le desobedecen.
  revision_rationale: Se corrige la cláusula final para que «παρακούουσιν αὐτοῦ» se traduzca como un verbo finito coordinado independiente, en conformidad con el griego y con la auditoría inglesa. No se requieren notas.
