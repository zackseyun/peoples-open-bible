translation:
  language: es
  text: Si el gran Yahvé quiere, será lleno de un espíritu de entendimiento; él mismo hará llover[a] palabras de sabiduría, y en oración dará gracias a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «derramará palabras de sabiduría como lluvia». El griego usa una imagen de lluvia.
    reason: lexical_alternative
  - marker: b
    text: O «confesará / reconocerá a Yahvé». El verbo griego también puede tener esos sentidos, aunque aquí el contexto de oración favorece «dará gracias».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν ... θελήσῃ
  english_pob_choice: If ... wills
  chosen_spanish: Si ... quiere
  alternatives_spanish:
  - Si ... desea
  - Si ... llegara a querer
  lexicon: LSJ
  rationale: La condición expresa una voluntad real, no una simple posibilidad hipotética. En español, «si ... quiere» conserva bien el sentido volitivo y suena natural sin perder la fuerza del subjuntivo griego.
- source_word: Κύριος ὁ μέγας
  english_pob_choice: the great Lord
  chosen_spanish: el gran Yahvé
  alternatives_spanish:
  - el gran Señor
  - el gran Dueño
  lexicon: LSJ
  rationale: El contexto griego usa Κύριος para el nombre divino; conforme al criterio del proyecto, se vierte como «Yahvé» en el texto principal. «El gran» reproduce ὁ μέγας de manera directa y digna.
- source_word: πνεύματι συνέσεως
  english_pob_choice: a spirit of understanding
  chosen_spanish: un espíritu de entendimiento
  alternatives_spanish:
  - un espíritu de comprensión
  - un espíritu de insight
  lexicon: LSJ
  rationale: «Entendimiento» es la opción más clara y fiel para συνέσις en español bíblico contemporáneo. Se conserva el matiz de una disposición o dotación interior, no meramente intelectual.
- source_word: ἐμπλησθήσεται
  english_pob_choice: he will be filled
  chosen_spanish: será llenado
  alternatives_spanish:
  - será colmado
  - será lleno
  lexicon: LSJ
  rationale: El futuro pasivo exige una formulación pasiva en español. «Será llenado» mantiene la forma y el sentido de ser colmado por ese espíritu.
- source_word: ἀνομβρήσει
  english_pob_choice: he himself will pour forth ... like rain
  chosen_spanish: hará llover
  alternatives_spanish:
  - derramará como lluvia
  - verterá como lluvia
  - lloverá
  lexicon: LSJ
  rationale: El verbo griego tiene imaginería de lluvia. «Haré llover» no se usa aquí en sentido literal, sino metafórico; en español reproduce mejor la imagen verbal que una simple equivalencia plana como «derramará».
- source_word: ῥήματα σοφίας
  english_pob_choice: words of wisdom
  chosen_spanish: palabras de sabiduría
  alternatives_spanish:
  - dichos de sabiduría
  - palabras sabias
  lexicon: LSJ
  rationale: «Palabras de sabiduría» es una correspondencia directa y natural para ῥήματα σοφίας, preservando el sustantivo y el genitivo sin exagerar el tono.
- source_word: αὐτός
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - por su parte, él
  lexicon: LSJ
  rationale: El pronombre es enfático. «Él mismo» conserva esa prominencia en español sin sonar forzado.
- source_word: ἐν προσευχῇ
  english_pob_choice: in prayer
  chosen_spanish: en oración
  alternatives_spanish:
  - durante la oración
  - orando
  lexicon: LSJ
  rationale: La frase preposicional señala el ámbito de la acción. «En oración» es una expresión idiomática y sobria en español.
- source_word: ἐξομολογήσεται
  english_pob_choice: will give thanks
  chosen_spanish: dará gracias
  alternatives_spanish:
  - confesará
  - reconocerá
  - alabará
  lexicon: LSJ
  rationale: En este contexto de oración dirigida a Yahvé, el verbo se entiende mejor como agradecimiento o alabanza agradecida. «Dará gracias» refleja bien la lectura devocional sostenida por el audit trail inglés.
theological_decisions:
- issue: Cómo verter Κύριος cuando parece referirse al nombre divino
  english_pob_reading: the great Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El griego usa Κύριος en un contexto que alude al nombre divino. Dado el criterio del proyecto de no enmascarar el nombre, se usa «Yahvé» en el texto principal, manteniendo la referencia teológica con mayor transparencia.
  doctrine_reference: Transparencia del nombre divino; criterio POB de fuente original.
- issue: Sentido de ἐξομολογήσεται al final del verso
  english_pob_reading: devotional thanksgiving/praise to the Lord
  chosen_spanish_reading: dará gracias al Señor
  alternative_spanish_readings:
  - confesará al Señor
  - reconocerá al Señor
  - alabará al Señor
  rationale: Aunque el verbo puede significar confesar o reconocer, el contexto inmediato de sabiduría y oración favorece la gratitud devocional. Se evita introducir un matiz penitencial que el verso no exige.
  doctrine_reference: Primacía del contexto inmediato; evitar importar doctrinas no explícitas.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se preservó la condición volitiva, la imagen de lluvia y la lectura devocional de ἐξομολογήσεται. No hubo revisiones posteriores relevantes; el estado final del inglés fue marcado como sin cambios tras la última pasada.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para Κύριος cuando alude al nombre divino, conforme al estándar del proyecto.
  - Se eligió «dará gracias» para ἐξομολογήσεται, coherente con el uso devocional del contexto y con la decisión inglesa auditada.
  - Se conservó la metáfora de lluvia mediante «hará llover», que en español comunica la imagen verbal del griego sin sobreexplicar.
