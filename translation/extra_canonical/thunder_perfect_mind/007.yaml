translation:
  text: 'Do not be ignorant of me.

    For I am the first and the last;

    I am the honored and the scorned[a];

    I am the whore and the holy one[d];

    I am the wife[b] and the virgin[c][e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: OCR reads ϣⲏϣ (“great/many”), which would not oppose “honored.” Many editors
      emend or read a form meaning “despised/scorned.” Rendering follows the expected
      paradox; reading remains tentative.
    reason: alignment_note
  - marker: b
    text: Coptic ⲥϩⲓⲙⲉ = “woman.” In contrast with παρθένος, many translators choose
      “wife” to make the antithesis starker; base sense is noted here.
    reason: lexical_alternative
  - marker: c
    text: ⲡⲁⲣ is a Nag Hammadi-style abbreviation for Greek παρθένος (“virgin”).
    reason: cultural_note
  - marker: d
    text: ⲥⲉⲙⲛⲏ can mean “holy, pure, chaste.” “Holy one” keeps the religious resonance
      without ecclesiastical overtones.
    reason: lexical_alternative
  - marker: e
    text: Or 'I am the honored one and the scorned'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ
  chosen: do not be ignorant
  alternatives:
  - do not ignore
  - do not be unknowing
  lexicon: Crum, Coptic Dictionary
  rationale: Standard negative imperative formula in Thunder; preserves the cognitive
    force of the verb without softening the warning.
- source_word: ⲙⲙⲟⲉⲓ (likely ⲙⲙⲟⲓ)
  chosen: of me
  alternatives:
  - about me
  - concerning me
  lexicon: Crum, Coptic Dictionary
  rationale: Coptic construction with ⲙⲙⲟ- marks the object of the cognition verb;
    English “of me” is idiomatic in this set phrase.
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Crum, Coptic Dictionary
  rationale: Thunder’s voice uses repeated “I am”; retaining the copula foregrounds
    the oracular cadence.
- source_word: ⲅⲁⲣ
  chosen: for
  alternatives:
  - because
  lexicon: Crum, Coptic Dictionary (particles)
  rationale: Simple causal connector matching the discourse flow from injunction to
    identity claim.
- source_word: ⲧϣⲟⲣⲡ
  chosen: the first
  alternatives:
  - the beginning
  lexicon: Crum, Coptic Dictionary
  rationale: Common epithet pairing with “the last”; “first” preserves the paradox
    with “last.”
- source_word: ⲑⲁⲉ
  chosen: the last
  alternatives:
  - the end
  lexicon: Crum, Coptic Dictionary
  rationale: Balances ⲧϣⲟⲣⲡ; “last” is the direct, antithetical counterpart to “first.”
- source_word: (ⲧ)ⲧⲁⲉⲓⲏⲩ
  chosen: the honored one
  alternatives:
  - the honored
  - the glorious one
  lexicon: Crum, Coptic Dictionary
  rationale: ⲧⲁⲉⲓⲏⲩ = honor/glory; substantival rendering preserves the parallelism
    with the following epithet.
- source_word: (ⲧ)ϣⲏϣ (OCR as printed)
  chosen: the scorned
  alternatives:
  - the despised
  - the many
  lexicon: Crum (sense uncertain here)
  rationale: The OCR reading ϣⲏϣ normally means “great/many,” which breaks the paradox;
    most editors read a form meaning “despised/scorned.” Rendering “scorned” preserves
    the expected antithesis while flagging uncertainty.
- source_word: ⲡⲟⲣⲛⲏ
  chosen: whore
  alternatives:
  - prostitute
  lexicon: LSJ (Greek loanword) / Crum
  rationale: Blunt register matches the poem’s shock-paradox; “whore” retains the
    sting more than the clinical “prostitute.”
- source_word: ⲥⲉⲙⲛⲏ
  chosen: holy one
  alternatives:
  - chaste one
  - revered one
  - saint
  lexicon: Crum, Coptic Dictionary
  rationale: Base sense “holy/pure.” Substantival “holy one” pairs cleanly with “whore”
    while avoiding ecclesiastical jargon like “saint.”
- source_word: ⲥϩⲓⲙⲉ
  chosen: wife
  alternatives:
  - woman
  lexicon: Crum, Coptic Dictionary
  rationale: Lexically “woman”; in antithesis with parthenos (“virgin”), “wife” sharpens
    the paradox. Footnoted the base sense.
- source_word: ⲡⲁⲣ (abbr. for παρθένος)
  chosen: virgin
  alternatives: []
  lexicon: LSJ (παρθένος) / Nag Hammadi scribal conventions
  rationale: Standard NH abbreviation; “virgin” is the established gloss of parthenos
    and forms the intended paradox with “wife/woman.”
parallelism_check: 'All four predicate pairs are explicit contradictions: first/last;
  honored/scorned; whore/holy; wife/virgin. Repetition of “I am” is preserved to maintain
  the poem’s antiphonal cadence, with an initial imperative leading into the identity
  series via “for.”'
voice_check: The first-person, authoritative, paradox-speaking voice is intact. The
  diction remains direct and unsmoothed, preserving the shock value (e.g., “whore,”
  “holy one”) and the solemn epithets (“the first and the last”).
alignment_risk_note: 'Alignment confidence is medium, and the OCR string “ⲧⲉⲧϣⲏϣ”
  is problematic: ϣⲏϣ typically means “great/many,” not “scorned.” The consult tradition
  expects “honored/despised.” I render “scorned” to preserve the paradox but flag
  this as OCR/reading-uncertain. Minor orthographic noise also appears in ⲙⲙⲟⲉⲓ (likely
  ⲙⲙⲟⲓ). The abbreviation ⲡⲁⲣ is taken as παρθένος, standard in NH manuscripts. Overall
  sequence matches the well-known Thunder cluster following “I am the first and the
  last.”'
