review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: habla a toda la comunidad de Israel, mantiene «la tierra», expresa el paso por ella y su gran bondad. Sin embargo, hay dos desajustes menores con la evidencia y la huella POB: (1) la nota [a] introduce «reconocer el territorio», que desplaza el referente directo «la tierra/ella» del hebreo; (2) la nota [b] con «campo/territorio» no está sustentada por el contexto inmediato ni por la auditoría inglesa, que trata הָאָרֶץ sencillamente como «land».'
  spanish_quality_summary: El español es claro, natural y digno. «Toda la congregación de los hijos de Israel» es inteligible y fiel. «Por la que pasamos para reconocerla» suena bien, aunque «para explorarla» se alinea algo mejor con el campo semántico de תור. «Sumamente buena» es buen español, pero la revisión inglesa de POB prefirió una intensificación unitaria por naturalidad; en español funciona mejor «extraordinariamente buena» o «sumamente buena». No obstante, el problema principal no está en la frase principal sino en las notas.
  glossary_alignment: No aparecen términos del glosario principal como Yahvé, Mesías, Espíritu, etc. «Congregación» para עֲדָה y «hijos de Israel» para בְּנֵי יִשְׂרָאֵל están alineados con la racionalidad documentada. «Tierra» para הָאָרֶץ también está bien. La única fricción terminológica es que la nota alternativa de «campo/territorio» debilita una decisión léxica ya establecida.
  issues:
  - severity: medium
    issue: La nota [b] ofrece «campo/territorio» como alternativa para הָאָרֶץ.
    rationale: La evidencia fuente y la auditoría inglesa respaldan «tierra/land» como la opción estándar y contextual para Canaán. «Campo» es engañoso aquí, y «territorio» no es necesario como alternativa principal.
  - severity: medium
    issue: La nota [a] incluye «para reconocer el territorio».
    rationale: El hebreo לָתוּר אֹתָהּ conserva como objeto a «la tierra/ella». La alternativa propuesta cambia la estructura y reintroduce «territorio», que no es la decisión léxica base del registro.
  - severity: low
    issue: La traducción principal usa «reconocerla», mientras la alternativa mejor sustentada por la auditoría es «explorarla».
    rationale: «Reconocerla» puede pasar, pero «explorarla» reproduce mejor el valor de reconocimiento exploratorio de תור sin el matiz moderno fuerte de «espiar».
  revised_spanish_text: 'Y dijeron a toda la congregación de los hijos de Israel: «La tierra por la que pasamos para explorarla[a] es una tierra sumamente buena.»'
  revised_footnotes:
  - marker: a
    text: O «para reconocerla» o «para espiarla».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal de reconocimiento a «explorarla» por mejor correspondencia con תור en este contexto, manteniendo alternativas cercanas y legítimas en nota. Se elimina la nota sobre «tierra» porque las alternativas propuestas no están bien sustentadas por la fuente ni por la auditoría inglesa y pueden introducir ambigüedad innecesaria.
