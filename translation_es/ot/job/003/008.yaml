translation:
  language: es
  text: Que lo maldigan[a] los que maldicen el día, los que están listos para despertar a Leviatán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los que maldicen día / el día»; el sentido puede ser genérico o colectivo/profesional, aludiendo a quienes se consideraban capaces de pronunciar maldiciones sobre tiempos ominosos.'
    reason: lexical_alternative
  - marker: b
    text: O «hacer que se alce Leviatán». La imagen puede evocar una criatura mítica del caos más que un animal ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְּבֻהוּ
  english_pob_choice: Let ... curse it
  chosen_spanish: maldíganlo
  alternatives_spanish:
  - que lo maldigan
  - que lo maldigan con imprecaciones
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto, expresa maldecir con fuerza imprecatoria. En español, «maldíganlo» conserva el imperativo/jusivo poético y el objeto pronominal referido al día.
- source_word: אֹרְרֵי
  english_pob_choice: those who curse
  chosen_spanish: los que maldicen
  alternatives_spanish:
  - los maldictores de
  - los que pronuncian maldiciones sobre
  lexicon: HALOT
  rationale: El participio activo denota personas caracterizadas por maldecir. «Los que maldicen» es natural en español y mantiene el valor agentivo.
- source_word: יוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - día
  - los días
  lexicon: HALOT
  rationale: Aunque el inglés auditado tuvo una oscilación previa, la revisión final fijó el singular. En español, «el día» reproduce con precisión el sustantivo singular y evita ampliar indebidamente el referente.
- source_word: הָעֲתִידִים
  english_pob_choice: those ready to
  chosen_spanish: los que están listos para
  alternatives_spanish:
  - los que están preparados para
  - los dispuestos a
  lexicon: HALOT
  rationale: El participio/adjetivo implica disposición o preparación inmediata. «Están listos para» expresa bien esa prontitud sin cargar el texto de explicación.
- source_word: עֹרֵר
  english_pob_choice: rouse
  chosen_spanish: despertar
  alternatives_spanish:
  - espabilar
  - incitar
  lexicon: HALOT
  rationale: El verbo significa arrebatar del reposo, despertar o agitar. «Despertar» comunica con claridad la acción de provocar la aparición/movimiento de Leviatán, sin perder la imagen poética.
- source_word: לִוְיָתָן
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - el monstruo marino
  - el monstruo del mar
  lexicon: HALOT
  rationale: Se conserva el nombre propio/transliterado para mantener la fuerza poética y la tensión interpretativa del texto, en vez de reducirlo a una criatura genérica.
theological_decisions:
- issue: Imagen de Leviatán y su alcance interpretativo
  english_pob_reading: Retain 'Leviathan' as the poetic/mythic creature invoked in Job's curse language without resolving whether the text intends a literal animal, mythic chaos monster, or symbolic figure.
  chosen_spanish_reading: Conservar «Leviatán» como figura poética/mítica sin resolver si se trata de un animal literal, un monstruo del caos o un símbolo.
  alternative_spanish_readings:
  - el cocodrilo
  - el monstruo marino
  - símbolo del caos
  rationale: La poesía de Job usa una imagen antigua y deliberadamente abierta. Traducir el nombre mantiene la tensión del texto y evita imponer una interpretación cerrada que el hebreo no exige.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica); §2 (transliterar nombres propios)
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del inglés auditado, que corrigió el referente de יוֹם al singular «the day» y mantuvo la estructura poética con Leviatán sin resolver su identidad. Se preservó esa tensión interpretativa en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió el imperativo/jusivo español «maldíganlo» para reflejar la fuerza exhortativa del hebreo.
  - «Leviatán» se translitera de manera consistente con el criterio del proyecto para nombres/figuras míticas.
  - Se evitó «señor» u otras sustituciones que suavicen el valor imprecatorio del pasaje.
