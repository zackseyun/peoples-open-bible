translation:
  language: es
  text: Yo soy el Dios de Betel[b], donde ungiste un pilar y donde me hiciste un voto[a]. Ahora levántate, sal de esta tierra y vuelve a la tierra de tu nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde me hiciste un voto». El hebreo usa verbo + sustantivo para énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Betel» significa «casa de Dios», pero aquí es un nombre de lugar.
    reason: cultural_note
lexical_decisions:
- source_word: הָאֵל / הָאֵל בֵּית אֵל
  english_pob_choice: the God of Bethel
  chosen_spanish: el Dios de Betel
  alternatives_spanish:
  - Dios de Betel
  - el Dios en Betel
  lexicon: HALOT
  rationale: La construcción identifica al hablante como el Dios que Jacob conoció en Betel (Gn 28), no como una deidad local. En español, 'el Dios de Betel' conserva el artículo y la referencia monoteísta; se mantiene 'Betel' como nombre propio, no como traducción compositiva.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  - Casa de Dios
  lexicon: HALOT
  rationale: Se conserva el topónimo en forma usual en español bíblico. No se traduce como 'Casa de Dios' en el texto principal porque aquí funciona como nombre de lugar, aunque el sentido etimológico sea transparente.
- source_word: מָשַׁחְתָּ ... מַצֵּבָה
  english_pob_choice: you anointed a pillar
  chosen_spanish: ungiste una piedra con aceite
  alternatives_spanish:
  - ungiste un pilar
  - consagraste una piedra
  - ungiste una piedra
  lexicon: HALOT
  rationale: '''Ungir'' reproduce bien מָשַׁח y evita una lectura demasiado eclesiástica de ''consagrar''. ''Piedra con aceite'' explicita en español el objeto material que el hebreo presupone; ''piedra'' puede ser más natural que ''pilar'' para la מַצֵּבָה de Génesis 28, aunque se conserva la concreción del memorial erigido.'
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: piedra
  alternatives_spanish:
  - pilar
  - piedra erigida
  - piedra memorial
  lexicon: HALOT
  rationale: El término hebreo puede abarcar una piedra levantada como memorial. En español, 'piedra' evita una asociación excesivamente arquitectónica de 'pilar' y sigue siendo fiel al objeto recordado en el relato de Génesis 28.
- source_word: נָדַרְתָּ ... נֶדֶר
  english_pob_choice: you vowed a vow to me
  chosen_spanish: me hiciste un voto
  alternatives_spanish:
  - me prometiste un voto
  - votaste un voto a mí
  - me hiciste un voto solemne
  lexicon: HALOT
  rationale: El hebreo usa verbo + sustantivo para énfasis. En español, 'hacer un voto' comunica de forma natural el acto sin recargarlo con una calca como 'votaste un voto'. Se preserva el destinatario con 'me'.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca el giro de recuerdo a mandato; 'Ahora' es breve, claro y formal.
- source_word: קוּם
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - arise
  - ponte en pie
  lexicon: HALOT
  rationale: En español, el imperativo natural para este contexto es 'levántate'. 'Arise' sería demasiado calco y menos idiomático.
- source_word: צֵא
  english_pob_choice: go out
  chosen_spanish: sal
  alternatives_spanish:
  - sal de
  - vete de
  - abandona
  lexicon: HALOT
  rationale: '''Sal'' reproduce el movimiento de salida. Unido a ''de esta tierra'' mantiene la dirección y evita una paráfrasis más larga.'
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra
  - esta región
  - este país
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa el territorio donde Jacob está viviendo. 'Tierra' es el equivalente español más fiel y sobrio.
- source_word: וְשׁוּב
  english_pob_choice: and return
  chosen_spanish: y vuelve
  alternatives_spanish:
  - y regresa
  - y retorna
  lexicon: HALOT
  rationale: '''Vuelve'' comunica la acción de regresar en un registro natural y bíblicamente digno. ''Regresa'' sería igualmente posible, pero ''vuelve'' enlaza bien con el mandato breve del hebreo.'
- source_word: אֶרֶץ מוֹלַדְתֶּךָ
  english_pob_choice: the land of your birth
  chosen_spanish: la tierra de tu nacimiento
  alternatives_spanish:
  - la tierra de tu nacimiento
  - tu tierra natal
  - la tierra de tus parientes
  lexicon: HALOT
  rationale: מולדת puede referir al lugar de origen, natal o al grupo familiar según contexto. Aquí, con אֶרֶץ, 'tierra de tu nacimiento' preserva el enlace con el origen personal sin reducirlo solo a parentesco.
theological_decisions:
- issue: Identidad del hablante como 'el Dios de Betel'
  english_pob_reading: Render as 'I am the God of Bethel'
  chosen_spanish_reading: Yo soy el Dios de Betel
  alternative_spanish_readings:
  - Yo soy Dios en Betel
  - Yo soy el dios de Betel
  rationale: La frase identifica al Dios de Jacob en continuidad con la revelación anterior, no a un dios local. 'Yo soy el Dios de Betel' conserva esa referencia sin expandir el texto con una glosa interpretativa.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Conservación de la fuerza del juramento/voto
  english_pob_reading: where you vowed a vow to me
  chosen_spanish_reading: donde me hiciste un voto
  alternative_spanish_readings:
  - donde me prometiste un voto
  - donde me juraste un voto
  rationale: El hebreo subraya el voto mediante repetición léxica. En español, 'hacer un voto' transmite adecuadamente la obligación solemne sin perder el destinatario divino ni introducir una formulación legalista ajena al contexto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de ''made a vow'' a ''vowed a vow'', y de ''rise/leave'' a ''arise/go out''. La redacción española procura reflejar esa mayor cercanía léxica sin perder naturalidad: se usa ''me hiciste un voto'' con nota de alternativa para la repetición hebrea, y se opta por imperativos breves (''levántate'', ''sal'').'
  spanish_consistency_notes:
  - Se mantiene 'Dios' con mayúscula para la referencia al Dios de Israel, conforme al valor monoteísta del contexto.
  - '''Betel'' se conserva como topónimo; la nota aclara su significado etimológico.'
  - '''Tierra'' traduce אֶרֶץ de modo coherente para el territorio concreto de la narración.'
  - El texto evita 'SEÑOR' porque el hebreo aquí no usa el tetragrama sino una autoidentificación divina distinta, aunque relacionada con la revelación de Jacob.
