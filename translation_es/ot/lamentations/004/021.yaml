  glossary_alignment: No hay conflicto con la terminología base del proyecto. «hija de Edom», «tierra de Uz», «copa» y «te embriagarás» están bien. La decisión para וְתִתְעָרִי como «te desnudarás» es defendible si se conserva la nota sobre exposición vergonzosa.
