translation:
  language: es
  text: 'Y la tomaron y le preguntaron: «¿Quién eres[a], y de dónde vienes, y adónde vas?». Y ella dijo: «Soy hija de los hebreos[b], y huyo de delante de ellos[c], porque están por ser entregados a ustedes para ser consumidos[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿De quién eres?». El griego literalmente pregunta: «¿De quién eres?», y puede referirse a identidad étnica o lealtad política.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Soy una hebrea». El griego dice literalmente: «Soy hija de los hebreos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de su presencia». El griego literalmente dice: «de delante de ellos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «como alimento». El término griego es vívido: «para devorar» o «para ser consumidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: la tomaron
  alternatives_spanish:
  - la apresaron
  - la sujetaron
  lexicon: BDAG
  rationale: El griego indica una acción física e inmediata. En español, «la tomaron» comunica la captura o sujeción sin introducir un matiz más técnico o más violento de lo que exige el contexto, manteniendo la escena narrativa.
- source_word: Τίνων εἶ
  english_pob_choice: Who are you
  chosen_spanish: ¿De quién eres?
  alternatives_spanish:
  - ¿Quién eres?
  - ¿A quién perteneces?
  lexicon: LSJ
  rationale: La pregunta griega es literalmente posesiva («¿de quién eres?»), y el inglés POB observó esa tensión aunque luego optó por una formulación más natural. En español, «¿De quién eres?» preserva mejor la fuerza del genitivo y deja abierta la referencia étnica o de lealtad.
- source_word: πόθεν ἔρχῃ
  english_pob_choice: where are you coming from
  chosen_spanish: ¿de dónde vienes?
  alternatives_spanish:
  - ¿de dónde vienes ahora?
  - ¿de qué lugar vienes?
  lexicon: BDAG
  rationale: Es la manera natural y fiel de expresar el origen direccional del griego en una pregunta directa.
- source_word: ποῦ πορεύῃ
  english_pob_choice: where are you going
  chosen_spanish: ¿adónde vas?
  alternatives_spanish:
  - ¿hacia dónde vas?
  - ¿a dónde te diriges?
  lexicon: BDAG
  rationale: «¿Adónde vas?» reproduce bien el sentido de movimiento y conserva un registro sobrio y claro.
- source_word: Θυγάτηρ εἰμὶ τῶν Ἑβραίων
  english_pob_choice: I am a daughter of the Hebrews
  chosen_spanish: Soy hija de los hebreos
  alternatives_spanish:
  - Soy una hebrea
  - Soy una de las mujeres hebreas
  lexicon: LSJ
  rationale: Se conserva el giro semítico-familiar del original («hija de») en vez de nivelarlo a una identificación étnica plana. La forma en plural genitivo se mantiene como «de los hebreos» para reflejar la estructura del griego.
- source_word: ἀποδιδράσκω
  english_pob_choice: I am fleeing
  chosen_spanish: huyo
  alternatives_spanish:
  - estoy huyendo
  - me estoy escapando
  lexicon: LSJ
  rationale: El verbo expresa huida o escape. «Huyo» es breve, actual y adecuado en boca del personaje; evita añadir un aspecto progresivo innecesario.
- source_word: ἀπὸ προσώπου αὐτῶν
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - de ante ellos
  lexicon: LSJ
  rationale: La expresión reproduce el hebraísmo de «rostro/presencia» con una frase española natural. «De delante de ellos» conserva el valor espacial y no borra la imagen idiomática.
- source_word: μέλλουσιν δόσθαι
  english_pob_choice: they are about to be given over
  chosen_spanish: están por ser entregados
  alternatives_spanish:
  - van a ser entregados
  - están a punto de ser entregados
  lexicon: BDAG
  rationale: El giro μέλλουσιν + infinitivo expresa inminencia. «Están por ser entregados» mantiene esa cercanía temporal y el pasivo, en un español formal y claro.
- source_word: εἰς κατάβρωμα
  english_pob_choice: for consumption
  chosen_spanish: para consumo
  alternatives_spanish:
  - para ser consumidos
  - como alimento
  lexicon: LSJ
  rationale: El sustantivo κατάβρωμα apunta a lo que es devorado o consumido. «Para consumo» conserva el registro más formal que el inglés POB revisó, aunque deja visible la imaginería de ser comidos.
theological_decisions:
- issue: Autorreferencia étnica y genérica de Judith
  english_pob_reading: I am a daughter of the Hebrews
  chosen_spanish_reading: Soy hija de los hebreos
  alternative_spanish_readings:
  - Soy una hebrea
  - Soy una de las mujeres hebreas
  rationale: El griego usa θυγάτηρ con genitivo de pueblo, una fórmula identitaria que conviene no aplanar. La traducción retiene el parentesco metafórico y la pertenencia étnica sin convertirla en una simple etiqueta social.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve source intent'
- issue: La imagen de ser entregados para alimento/consumo
  english_pob_reading: for consumption
  chosen_spanish_reading: para consumo
  alternative_spanish_readings:
  - para devoración
  - para ser consumidos
  - como alimento
  rationale: La frase mantiene la violencia anticipada del griego κατάβρωμα sin suavizarla a una mera entrega militar. «Para consumo» es más sobrio y más cercano al registro formal que el texto inglés revisado buscó conservar.
  doctrine_reference: 'DOCTRINE.md: Preserve vivid source imagery unless Spanish requires clarification'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del audit trail inglés: se mantuvo la naturalidad lograda al evitar una pregunta posesiva demasiado extraña en inglés, pero en español se preserva mejor la literalidad de Τίνων εἶ mediante «¿De quién eres?», porque la construcción es idiomática y conserva la tensión de pertenencia/allegiance sin perder inteligibilidad. También se reflejó la revisión de κατάβρωμα con una solución formal («para consumo») que respeta el registro elevado del sustantivo y su imagen de devorar.'
  spanish_consistency_notes:
  - Se usa «hebreos» en minúscula por tratarse de un gentilicio/nombre de pueblo en español corriente.
  - Se mantiene «Yahvé» fuera de este versículo porque el texto no contiene el nombre divino.
  - Se evita «Cristo» y «SEÑOR» por no aparecer en la unidad textual.
  - Se conserva el paralelismo interrogativo de tres preguntas para reflejar la secuencia del griego.
  - La voz pasiva se mantiene en «están por ser entregados» para no convertir la acción en una afirmación activa ni borrar la inminencia.
