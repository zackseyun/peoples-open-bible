translation:
  language: es
  text: Hoy[a] has declarado que Yahvé es tu Dios[b], y que andarás en sus caminos, guardarás sus estatutos, sus mandamientos y sus juicios, y obedecerás su voz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'este día'.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo aquí es inusual y puede traducirse más formalmente como 'has afirmado' o 'has reconocido solemnemente'; en versiones más antiguas se expresa con un giro arcaizante.
    reason: lexical_alternative
  - marker: c
    text: O 'y escucharás su voz'; el hebreo dice literalmente 'y escuchar su voz', con matiz de obediencia en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del tetragrama en forma auditable y no se lo sustituye por un título. 'Yahvé' es la forma proyectada por la política terminológica del proyecto para el español.
- source_word: הֶאֱמַרְתָּ
  english_pob_choice: have declared
  chosen_spanish: has declarado
  alternatives_spanish:
  - has afirmado
  - has reconocido solemnemente
  - has avivado
  lexicon: HALOT
  rationale: El verbo hifil de אמר es inusual y tiene fuerza declarativa/covenantal. 'Has declarado' conserva esa solemnidad en español moderno sin volverlo arcaico.
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: HALOT
  rationale: '''Hoy'' expresa la referencia temporal inmediata de forma natural y conserva el énfasis del hebreo.'
- source_word: לִהְיוֹת לְךָ לֵאלֹהִים
  english_pob_choice: to be your God
  chosen_spanish: como tu Dios
  alternatives_spanish:
  - para ser tu Dios
  - para ser Dios para ti
  lexicon: HALOT
  rationale: En español, con 'declarar a Yahvé...' la relación de pacto se expresa con naturalidad mediante 'como tu Dios'. Mantiene la relación de pertenencia/covenio sin forzar una perífrasis menos idiomática.
- source_word: וְלָלֶכֶת בִּדְרָכָיו
  english_pob_choice: that you will walk in his ways
  chosen_spanish: para andar en sus caminos
  alternatives_spanish:
  - y andar en sus caminos
  - para vivir conforme a sus caminos
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico 'andar en sus caminos', bien asentado en español bíblico, con 'para' para reflejar la serie de compromisos del versículo.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente legal-covenantal tradicional y claro para חֻקִּים.'
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus preceptos
  - sus órdenes
  lexicon: HALOT
  rationale: '''Mandamientos'' preserva el registro jurídico-religioso y la correspondencia habitual de מצוות en español bíblico.'
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordenanzas
  - sus sentencias
  lexicon: HALOT
  rationale: Se conserva la raíz judicial de מִשְׁפָּטִים. 'Juicios' mantiene la conexión lexical, aunque en español puede sonar más amplio que 'ordenanzas'; por eso se deja auditable en la nota.
- source_word: וְלִשְׁמֹעַ בְּקֹלוֹ
  english_pob_choice: and obey his voice
  chosen_spanish: y obedecer su voz
  alternatives_spanish:
  - y escuchar su voz
  - y oír su voz
  lexicon: HALOT
  rationale: Siguiendo el sentido obediencial reconocido por el POB inglés, 'obedecer su voz' refleja mejor la fuerza contextual de שׁמע בְּקולוֹ que un mero 'escuchar'.
theological_decisions:
- issue: Fórmula de pacto y agencia humana
  english_pob_reading: The verse is rendered as Israel's formal declaration of covenant allegiance to the LORD, followed by the obligations embraced in that declaration.
  chosen_spanish_reading: El versículo se vierte como una declaración formal de lealtad de pacto a Yahvé, seguida por las obligaciones asumidas en esa declaración.
  alternative_spanish_readings:
  - Una secuencia más literal de infinitivos sin explicitar el valor declarativo.
  - Un giro más interpretativo que convierta la frase en voto o promesa autónoma.
  rationale: El hebreo combina un verbo declarativo formal con infinitivos que expresan compromiso. El español mantiene esa estructura sin resolver la tensión entre declaración y obligaciones; se hace explícita la relación de pacto solo en la medida en que el hebreo la exige.
  doctrine_reference: Principio de equivalencia óptima; preservar la tensión teológica y retórica del texto fuente.
- issue: שׁמע בְּקוֹל como obediencia auditiva
  english_pob_reading: and obey his voice
  chosen_spanish_reading: y obedecer su voz
  alternative_spanish_readings:
  - y escuchar su voz
  - y atender a su voz
  rationale: En contexto de pacto, 'escuchar' sería demasiado débil en español moderno. 'Obedecer su voz' conserva la obediencia implícita sin borrar el componente de audición presente en el hebreo.
  doctrine_reference: Hermenéutica léxica del mandato/covenio; mantener la fuerza obediencial del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el expediente inglés auditado: la decisión revisada de traducir שׁמע בְּקולוֹ como ''obey his voice'' se reflejó en español con ''obedecer su voz''. También se preservó la elección terminológica de Yahvé para el tetragrama y la lectura covenantal del versículo. No se adoptó una traducción mecánica del inglés; se volvió a la sintaxis y semántica hebreas para justificar ''como tu Dios'', ''para andar en sus caminos'' y la serie legal de estatutos/mandamientos/juicios.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el registro jurídico-covenantal con 'estatutos', 'mandamientos' y 'juicios'.
  - '''Obedecer su voz'' mantiene la decisión lexical ya auditada en el inglés POB.'
  - Los corchetes de nota se colocan solo donde hay alternativa lexical real en el texto español.
