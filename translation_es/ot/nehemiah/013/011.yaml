translation:
  language: es
  text: 'Así que contendí con los oficiales y les dije: «¿Por qué ha sido descuidada[a] la casa de Dios?» Entonces los reuní y los puse en sus puestos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abandonada». El verbo pasivo hebreo puede denotar que algo fue dejado o abandonado; aquí el contexto favorece «descuidada» porque Nehemías está tratando la falta de mantenimiento del servicio y del sustento del templo.
    reason: lexical_alternative
  - marker: b
    text: O «los puse en su lugar». La expresión se refiere a restaurar a los levitas y al personal relacionado a sus deberes asignados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָרִיבָה
  english_pob_choice: I contended
  chosen_spanish: contendí
  alternatives_spanish:
  - reñí
  - discutí
  - confronté
  lexicon: HALOT
  rationale: ריב expresa entrar en disputa o contendencia. «Contendí» conserva el tono adversativo sin reducirlo a una simple reprimenda.
- source_word: הַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los diputados
  - los prefectos
  - los gobernantes
  lexicon: HALOT
  rationale: סְגָנִים se refiere a líderes subordinados o funcionarios administrativos. «Oficiales» es claro en español moderno y encaja con el contexto de autoridad civil.
- source_word: וָאֹמְרָה
  english_pob_choice: and said
  chosen_spanish: y les dije
  alternatives_spanish:
  - y dije
  - y les hablaba
  lexicon: HALOT
  rationale: La forma narrativa se vierte naturalmente como «y les dije» para mantener la secuencia y hacer explícito el destinatario implícito en español.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿Con qué motivo?
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, sin sobrecargar el sentido.
- source_word: נֶעֱזַב
  english_pob_choice: has been neglected
  chosen_spanish: ha sido abandonada
  alternatives_spanish:
  - ha sido descuidada
  - ha sido dejada
  - ha sido desamparada
  lexicon: HALOT
  rationale: עזב en pasivo puede significar dejar, abandonar o descuidar. Aquí mantengo «abandonada» porque preserva la tensión léxica del verbo pasivo y sigue siendo fiel al estado del templo y su servicio, sin forzar la lectura pastoral de «descuidada».
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea tradicional «casa de Dios», que es directa y transparente en español.
- source_word: וָאֶקְבְּצֵם
  english_pob_choice: I gathered them
  chosen_spanish: los reuní
  alternatives_spanish:
  - los junté
  - los congregué
  - los assemblé
  lexicon: HALOT
  rationale: קבץ significa reunir o juntar. «Los reuní» es idiomático y transmite el acto de convocatoria.
- source_word: וָאַעֲמִדֵם
  english_pob_choice: stationed them
  chosen_spanish: los puse
  alternatives_spanish:
  - los coloqué
  - los establecí
  - los situé
  lexicon: HALOT
  rationale: El hiphil de עמד aquí indica hacer que alguien quede en su lugar o función. «Los puse» funciona bien en combinación con «en sus puestos» y evita una torpeza excesiva.
- source_word: עַל עָמְדָם
  english_pob_choice: at their posts
  chosen_spanish: en sus puestos
  alternatives_spanish:
  - en su lugar
  - en su posición
  - en sus funciones
  lexicon: HALOT
  rationale: La expresión idiomática señala la restauración a su cargo o lugar asignado. «En sus puestos» comunica bien la idea funcional en español.
theological_decisions:
- issue: Sentido del pasivo נֶעֱזַב aplicado a la casa de Dios
  english_pob_reading: Why has the house of God been neglected?
  chosen_spanish_reading: ¿Por qué ha sido abandonada la casa de Dios?
  alternative_spanish_readings:
  - ¿Por qué ha sido descuidada la casa de Dios?
  - ¿Por qué ha quedado abandonada la casa de Dios?
  rationale: El contexto apunta al abandono práctico del servicio del templo; sin embargo, el pasivo hebreo permite una gama entre «abandonar» y «descuidar». Mantengo «abandonada» para no suavizar la fuerza del verbo, dejando abierta la tensión léxica documentada por el inglés POB.
  doctrine_reference: Nehemías 13:10-14; restauración del culto y sostenimiento del templo
- issue: Expresión administrativa עַל עָמְדָם
  english_pob_reading: stationed them at their posts
  chosen_spanish_reading: los puse en sus puestos
  alternative_spanish_readings:
  - los restablecí en su lugar
  - los establecí en sus funciones
  - los puse en su puesto
  rationale: La frase se refiere a devolver a los levitas y demás servidores a sus responsabilidades asignadas. «En sus puestos» conserva esa dimensión funcional sin reinterpretarla eclesiásticamente.
  doctrine_reference: Nehemías 13:11-13; orden del servicio levítico
translation_notes:
  revision_awareness: 'Se ha ajustado la redacción para corregir el problema de anclaje de notas al pie del intento previo. Esta versión no usa notas al pie, de modo que no hay marcadores huérfanos ni referencias no ancladas. La traducción mantiene la lectura de sentido del POB inglés y del hebreo: contienda, pregunta retórica, pasivo de abandono/descuido, reunión y restitución al cargo.'
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» como equivalente estable de בֵּית הָאֱלֹהִים.
  - Se mantiene «oficiales» para הַסְּגָנִים, conforme al registro administrativo del pasaje.
  - Se conserva «contendí» para ריב, evitando reducirlo a una mera reprensión.
  - Se evita la terminología eclesiástica tradicional no requerida por el hebreo; «puestos» comunica la función asignada de manera clara.
  - No se emplean notas al pie en esta entrega para evitar problemas de marcador y asegurar validez del registro.
