- from: 'Habla a los hijos de Israel y diles: Cuando algún hombre tenga una emisión[a] de su cuerpo[b], su emisión es inmunda.'
  to: 'Hablen a los hijos de Israel y díganles: Cuando algún hombre tenga un flujo[a] de su cuerpo[b], su flujo es inmundo.'
  rationale: Se corrige el imperativo al plural para reflejar fielmente las formas hebreas y se sustituye 'emisión' por 'flujo' para una expresión más natural y precisa del término legal-ritual זָב/זוֹבוֹ en español. Se mantienen 'los hijos de Israel', 'Cuando' y 'de su cuerpo' conforme al expediente inglés y al sentido del hebreo.
