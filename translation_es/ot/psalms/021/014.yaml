    rationale: Aunque no es incorrecto, la construcción es más rígida en español actual y menos directa para un imperativo poético dirigido a Dios. «Sé exaltado» preserva mejor la fuerza cultual y la naturalidad.
  - severity: medium
    issue: «haremos música acerca de tu poderío» es poco idiomático
    rationale: «Acerca de» introduce un tono explicativo/prosaico que debilita el paralelismo poético. El hebreo expresa alabanza celebrativa, no una explicación temática. Conviene una formulación más cantable y natural.
  - severity: low
