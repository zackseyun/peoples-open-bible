translation:
  language: es
  text: Mientras era estirado sobre él[a], aquel noble joven iba quedando dislocado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «iba quedando descoyuntado». El griego subraya la dislocación corporal gradual causada por la tortura.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ ὃν
  english_pob_choice: over it
  chosen_spanish: sobre ello
  alternatives_spanish:
  - encima de ello
  - sobre él
  lexicon: LSJ
  rationale: El griego sitúa al joven en relación espacial con el instrumento de tortura. «Sobre ello» conserva esa relación sin añadir un antecedente explícito que el texto griego no da en esta frase breve.
- source_word: κατατεινόμενος
  english_pob_choice: was stretched
  chosen_spanish: era estirado
  alternatives_spanish:
  - era tensado
  - era extendido
  lexicon: LSJ
  rationale: El participio pasivo describe una tensión corporal continua. «Era estirado» mantiene la pasividad y la acción en curso; en español suena natural en un contexto de suplicio.
- source_word: εὐγενὴς
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - bien nacido
  - de noble linaje
  lexicon: LSJ
  rationale: «Noble» conserva tanto la dignidad social como la moral que el término puede sugerir en 4 Macabeos, sin reducirlo solo a linaje.
- source_word: νεανίας
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - joven varón
  - muchacho
  lexicon: LSJ
  rationale: El término indica edad juvenil. «Joven» es claro y suficientemente amplio; el sintagma completo «el noble joven» reproduce la concisión del griego.
- source_word: ἔξαρθρος
  english_pob_choice: disjointed
  chosen_spanish: dislocado
  alternatives_spanish:
  - desencajado
  - sacado de quicio
  lexicon: LSJ
  rationale: La imagen literal es «fuera de las articulaciones». «Dislocado» comunica con precisión el daño corporal progresivo sin exagerar a desmembramiento.
- source_word: ἐγίνετο
  english_pob_choice: was being
  chosen_spanish: iba quedando
  alternatives_spanish:
  - se iba dislocando
  - estaba siendo dislocado
  lexicon: LSJ
  rationale: El imperfecto marca proceso continuo. «Iba quedando dislocado» expresa progresión y evita una simple acción puntual; también mantiene el carácter pasivo del griego.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y el audit trail inglés: conserva la relación espacial de περὶ ὃν, el participio pasivo continuo de κατατεινόμενος y el imperfecto progresivo de ἐγίνετο, evitando añadir nexos no presentes en el texto fuente.'
  spanish_consistency_notes:
  - Se mantiene «noble» para εὐγενής, en línea con la amplitud semántica reconocida en el POB inglés.
  - Se eligió «dislocado»/«fuera de las articulaciones» para ἔξαρθρος, preservando la tensión lexical entre una traducción natural y la imagen más literal.
  - «Sobre ello» evita resolver de manera prematura el antecedente del objeto de tortura, respetando la brevedad sintáctica del original.
