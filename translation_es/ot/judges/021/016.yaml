translation:
  language: es
  text: 'Entonces los ancianos de la congregación dijeron[a]: «¿Qué haremos para conseguirles esposas a los que han quedado, puesto que las mujeres de Benjamín han sido destruidas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «puesto que de Benjamín ha sido destruida una mujer», con el singular «mujer» usado de manera colectiva para las mujeres de Benjamín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי הָעֵדָה
  english_pob_choice: the elders of the congregation
  chosen_spanish: los ancianos de la congregación
  alternatives_spanish:
  - los ancianos de la asamblea
  - los ancianos de la comunidad
  lexicon: HALOT
  rationale: זִקְנֵי es el plural en constructo de «ancianos de», y הָעֵדָה nombra al cuerpo reunido del pueblo. «Congregación» conserva el sentido corporativo de la reunión sin desplazarse a un matiz institucional moderno.
- source_word: מַה נַּעֲשֶׂה
  english_pob_choice: What shall we do
  chosen_spanish: ¿Qué haremos
  alternatives_spanish:
  - ¿Qué debemos hacer?
  - ¿Qué vamos a hacer?
  lexicon: HALOT
  rationale: La pregunta con 1cp imperfecto expresa deliberación sobre una acción futura. «¿Qué haremos?» mantiene naturalidad en español y la fuerza de consulta comunitaria.
- source_word: לַנּוֹתָרִים
  english_pob_choice: for those who remain
  chosen_spanish: para los que han quedado
  alternatives_spanish:
  - para los sobrevivientes
  - para los que quedan
  lexicon: HALOT
  rationale: La forma participial indica a los que quedaron después de la destrucción. «Los que han quedado» es claro en español y conserva la idea de resto remanente sin añadir más interpretación que «sobrevivientes».
- source_word: לְנָשִׁים
  english_pob_choice: for wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres como esposas
  lexicon: HALOT
  rationale: En este contexto la preposición más נָשִׁים apunta a mujeres dadas en matrimonio para los benjaminitas restantes. En español se puede expresar de forma más natural con «dar mujeres», evitando forzar una perífrasis que oscurezca el pasaje.
- source_word: כִּי
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la pregunta. «Puesto que» comunica bien el valor causal y mantiene un tono digno en español.
- source_word: נִשְׁמְדָה
  english_pob_choice: have been destroyed
  chosen_spanish: ha sido destruida
  alternatives_spanish:
  - han sido destruidas
  - ha sido exterminada
  lexicon: HALOT
  rationale: El nifal de שׁמד expresa destrucción o exterminio. Como el hebreo usa un singular colectivo («una mujer»), el español puede mantener el singular verbal; esto conserva la tensión literaria entre el singular gramatical y el sentido colectivo.
- source_word: מִבִּנְיָמִן אִשָּׁה
  english_pob_choice: the women of Benjamin
  chosen_spanish: de Benjamín una mujer
  alternatives_spanish:
  - las mujeres de Benjamín
  - una mujer de Benjamín
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de Benjamín una mujer», con אִשָּׁה en singular usada colectivamente. Se conserva esa rareza en español para no borrar la tensión textual; el lector entiende por el contexto que se trata del remanente femenino de Benjamín.
theological_decisions:
- issue: El valor colectivo del singular «una mujer» frente a «las mujeres de Benjamín»
  english_pob_reading: Hebrew literally, 'since from Benjamin a woman has been destroyed,' using the singular 'woman' collectively for the women of Benjamin.
  chosen_spanish_reading: Se conserva el singular «una mujer» con sentido colectivo, pero se aclara por el contexto que el referente son las mujeres de Benjamín.
  alternative_spanish_readings:
  - las mujeres de Benjamín han sido destruidas
  - ha sido destruida la mujer de Benjamín
  rationale: El texto hebreo presenta una forma singular con valor colectivo. Mantenerlo en español preserva la tensión documental señalada por la nota inglesa y evita nivelar el detalle literario.
  doctrine_reference: Principio de correspondencia formal con preservación de ambigüedad relevante
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del acuerdo alto del control cruzado; se mantiene la solución óptima que conserva la rareza del singular colectivo y la deliberación comunitaria.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «congregación» para הָעֵדָה conforme al criterio POB auditado.
  - Se conserva el singular colectivo «una mujer» para no borrar la tensión textual documentada.
  - El tono es bíblico contemporáneo, sin arcaísmos innecesarios.
