review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la macroestructura y las decisiones léxicas principales del POB inglés: «palabra de consuelo», «el Altísimo», «el Poderoso», «misericordias / gracia», «visiones», «consumación». Sin embargo, hay varios puntos de fidelidad y naturalidad que conviene reparar: el imperativo inicial debe ser singular («escucha») según el inglés y el marco epistolar; la nota [a] no preserva una alternativa real sino que repite el texto; «pedirá venganza de» suena poco idiomático en español para vindicación judicial y debe ajustarse; y varias frases finales requieren pulido para sonar naturales sin perder las imágenes apocalípticas («ser tenida por saliva», «solo tomamos en cuenta», «será guardada»).'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene calcos poco naturales: «escuchen» en plural, «pedirá venganza de», «contamos solo con la confianza en la que confían», «será depositada». También hay una nota al pie innecesaria y mal formulada. Con ajustes menores, el texto queda más natural y eclesialmente legible sin apartarse del sentido fuente.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no aparece YHWH; «el Altísimo» y «el Poderoso» distinguen correctamente ܡܪܝܡܐ / ܚܝܠܬܐ; «gracia», «misericordias», «visiones», «mandamientos» y «Dios» están bien. No hay conflictos con defaults mayores. La única observación es que la nota [a] no refleja ninguna alternativa léxica significativa y debe eliminarse.'
  issues:
  - severity: medium
    issue: 'Imperativo inicial en plural: «escuchen»'
    rationale: El POB inglés tiene «hear» dirigido en singular epistolar/rhetórico; «escucha» encaja mejor con la voz del pasaje. El plural introduce un cambio no motivado.
  - severity: high
    issue: Nota [a] duplicada e inútil
    rationale: 'La nota dice «También puede leerse: “para que sean consolados”», que repite exactamente la lectura del texto y no conserva una alternativa real. Debe eliminarse.'
  - severity: medium
    issue: «pedirá venganza de todos nuestros enemigos» poco idiomático
    rationale: Aunque intenta seguir «require vengeance from», en español suena forzado. «pedirá cuentas a todos nuestros enemigos» preserva el tono judicial mejor; también podría usarse «reclamará venganza». El borrador actual compromete la legibilidad.
  - severity: medium
    issue: Calcos en la serie de comparaciones finales
    rationale: Expresiones como «será estimada como saliva», «contamos solo con la confianza en la que confían» y «será depositada» son comprensibles pero poco naturales. Deben reformularse manteniendo las imágenes degradantes y la sintaxis argumentativa.
  revised_spanish_text: 'Pero también escucha una palabra de consuelo. Porque yo estaba de duelo por Sion, y busqué misericordia del Altísimo, y dije: «¿Permanecerán estas cosas para nosotros hasta el fin? ¿Y vendrán estas aflicciones sobre nosotros en todo tiempo?» Y el Poderoso obró conforme a la abundancia de sus misericordias, y perdonó conforme a la grandeza de su gracia. Y me reveló una palabra para que yo fuera fortalecido, y me dio visiones para que no volviera a ser sacudido; y me dio a conocer los misterios de los tiempos, y me mostró la venida de las edades.


    Por eso, hermanos míos, les he escrito para que sean consolados a causa de la multitud de sus tribulaciones. Porque sepan que nuestro Hacedor pedirá cuentas a todos nuestros enemigos por todas las cosas malas que han hecho contra nosotros, y que la consumación que el Altísimo ha preparado está cerca, y su misericordia viene, y la consumación de su juicio no está lejos.


    Porque ahora vemos la abundancia de la prosperidad de las naciones mientras obran mal, pero serán contadas como una gota. Y miramos la fuerza de su poder, pero será tenida por saliva. Pensamos en la gloria de su grandeza, mientras no guardan los mandamientos del Poderoso, sino que los han tratado con desprecio. Y pensamos en la hermosura que se ve, aunque es sacudida en las aflicciones, y será buscada como carne en dolor. Y solo tomamos en cuenta la confianza en la que ellos confían, aunque es sacudida ante nuestros ojos; pero será aplastada como una ola. Y buscamos solo la esperanza de su fuerza, cuando florece en los bienes que Dios les dio; pero será guardada, y el lamento la alcanzará.'
  revision_rationale: 'Se corrigen problemas menores pero importantes de fidelidad y legibilidad: singular epistolar al inicio, eliminación de una nota espuria, mejora del giro judicial «pedirá cuentas», uniformidad de «consumación» para el lenguaje de compleción, y pulido de varios calcos en la cadena de comparaciones sin alterar el sentido apocalíptico del original ni las decisiones léxicas documentadas.'
