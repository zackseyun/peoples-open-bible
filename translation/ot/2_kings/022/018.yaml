id: 2KI.22.18
reference: 2 Kings 22:18
source:
  edition: WLC
  text: וְ/אֶל מֶ֣לֶךְ יְהוּדָ֗ה הַ/שֹּׁלֵ֤חַ אֶתְ/כֶם֙ לִ/דְרֹ֣שׁ אֶת יְהוָ֔ה כֹּ֥ה תֹאמְר֖וּ אֵלָ֑י/ו כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הַ/דְּבָרִ֖ים אֲשֶׁ֥ר שָׁמָֽעְתָּ־־־׃
translation:
  text: 'But to the king of Judah[a], who sent you to inquire of Yahweh, thus you shall say to him: Thus says Yahweh, the God of Israel: As for the words that you have heard—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As for the words that you heard—' The Hebrew clause is left hanging here and is completed in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  chosen: But to
  alternatives:
  - And to
  - Now to
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a contrastive/additional shift from the prior addressee to the king of Judah. 'But to' captures the discourse turn naturally in English while preserving the directional sense.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: the king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English.
- source_word: הַשֹּׁלֵחַ אֶתְכֶם
  chosen: who sent you
  alternatives:
  - the one sending you
  - who is sending you
  lexicon: HALOT
  rationale: The participle functions attributively, identifying the king by his action. English relative clause is the most natural equivalent.
- source_word: לִדְרֹשׁ אֶת יְהוָה
  chosen: to inquire of the LORD
  alternatives:
  - to seek the LORD
  - to consult the LORD
  lexicon: HALOT
  rationale: דרשׁ with God in this context refers to seeking divine guidance or inquiry. 'Inquire of' best fits the immediate prophetic-consultation setting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּה תֹאמְרוּ אֵלָיו
  chosen: you shall say this to him
  alternatives:
  - thus you shall say to him
  - this is what you shall say to him
  lexicon: HALOT
  rationale: כֹּה introduces the message formula. 'You shall say this to him' is idiomatic modern English while preserving the directive force.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is conventional and reflects the formulaic force in English Bible style.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; preserves covenantal identification.
- source_word: הַדְּבָרִים אֲשֶׁר שָׁמָעְתָּ
  chosen: Regarding the words that you have heard—
  alternatives:
  - 'The words that you have heard:'
  - As for the words that you heard—
  lexicon: HALOT
  rationale: This clause is syntactically suspended and completed in the next verse. 'Regarding' preserves the anticipatory, resumptive feel without forcing an unnatural sentence in English. Perfect 'have heard' works naturally in direct address.
