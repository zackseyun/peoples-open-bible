    rationale: El inglés conserva una nota explicando que es un modismo de provisión continua y comunión de mesa. Esa información sigue siendo útil en español y no debe perderse.
  - severity: low
    issue: Anclaje de la nota [a] mejorable
    rationale: La nota de hesed debe anclarse claramente a «bondad» o al sintagma verbal que lo expresa. El actual anclaje en «bondad[a]» es aceptable, pero conviene coordinarlo con las demás notas para mantener orden y cobertura completa.
