base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/026/019.yaml
  text: Did Hezekiah king of Judah and all Judah put him to death? Did he not fear Yahweh and entreat the favor of Yahweh[c][b][a], and Yahweh relented concerning the disaster that he had spoken against them? But we are doing great evil against ourselves.
  footnotes:
  - marker: a
    text: 'Hebrew: ''softened/entreated the face of the LORD,'' an idiom for seeking his favor or pleading with him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD changed his mind concerning the disaster.'
    reason: alternative_reading
  - marker: c
    text: Earlier 'disaster' translates Hebrew ra'ah in the sense of calamity/judgment; later 'evil' translates the same Hebrew word in the sense of moral evil.
    reason: lexical_alternative
