translation:
  language: es
  text: Adán vivió ciento treinta años y engendró un hijo a su semejanza[a], conforme a su imagen[b], y lo llamó Set[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'fue padre de un hijo'; el hebreo usa un verbo de paternidad con sujeto masculino.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'a su semejanza, conforme a su imagen' hace eco de Génesis 1:26-27.
    reason: cross_reference
  - marker: c
    text: O, más literalmente, 'y llamó su nombre Set'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió por
  - siguió viviendo
  lexicon: HALOT
  rationale: En las fórmulas genealógicas, חיה en wayyiqtol indica el tiempo de vida hasta el nacimiento siguiente; en español, 'vivió' reproduce con naturalidad ese valor idiomático.
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio del primer hombre en la genealogía; por eso se translitera como nombre, no como sustantivo genérico.
- source_word: שְׁלֹשִׁים וּמְאַת שָׁנָה
  english_pob_choice: one hundred thirty years
  chosen_spanish: ciento treinta años
  alternatives_spanish:
  - cien y treinta años
  - ciento treinta años de edad
  lexicon: HALOT
  rationale: La frase numérica se expresa de forma estándar y natural en español, conservando explícitamente 'años' porque está presente en hebreo.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered a son
  chosen_spanish: engendró un hijo
  alternatives_spanish:
  - engendró
  - fue padre de un hijo
  lexicon: HALOT
  rationale: El verbo ילד en esta forma masculina expresa engendrar/fathering. 'Engendró un hijo' preserva el valor lexical con un español digno y bíblicamente transparente.
- source_word: בִּדְמוּתוֹ
  english_pob_choice: in his likeness
  chosen_spanish: a su semejanza
  alternatives_spanish:
  - en su semejanza
  - en su parecido
  lexicon: HALOT
  rationale: דְּמוּת expresa semejanza o similitud; 'a su semejanza' comunica con claridad la relación de semejanza sin forzar un calco rígido.
- source_word: כְּצַלְמוֹ
  english_pob_choice: according to his image
  chosen_spanish: conforme a su imagen
  alternatives_spanish:
  - según su imagen
  - a su imagen
  lexicon: HALOT
  rationale: צֶלֶם significa 'imagen', y el prefijo כ puede expresarse bien con 'conforme a' para mantener la referencia deliberada a Génesis 1:26-27 sin borrar la distinción entre los dos sustantivos.
- source_word: וַיִּקְרָא אֶת שְׁמֹו שֵׁת
  english_pob_choice: and called his name Seth
  chosen_spanish: llamó su nombre Set
  alternatives_spanish:
  - y nombró a su hijo Set
  - y le puso por nombre Set
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea 'llamar el nombre de' de manera legible en español, sin añadir elementos no presentes en el texto.
- source_word: שֵׁת
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Set
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente asentado en español bíblico como Set.
theological_decisions:
- issue: Eco de Génesis 1:26-27 en 'semejanza / imagen'
  english_pob_reading: Render the phrase straightforwardly as resemblance to Adam, without importing doctrinal conclusions about the image of God being lost or altered.
  chosen_spanish_reading: Traducir la frase de modo transparente como semejanza respecto de Adán, sin concluir en la traducción si la imagen de Dios se perdió, disminuyó o permaneció intacta.
  alternative_spanish_readings:
  - Leerla como indicio de una imagen divina deteriorada tras la caída
  - Reducirla a repetición estilística sin peso teológico
  rationale: El hebreo retoma deliberadamente el lenguaje de Génesis 1:26-27, pero el versículo no desarrolla por sí mismo sus implicaciones doctrinales. La traducción debe conservar ese eco y no resolver la tensión.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés, que eliminó el pronombre explícito antes de 'called' por fluidez, manteniendo el sentido hebreo. La versión española hace lo mismo con 'llamó su nombre Set', sin añadir pronombre innecesario.
  spanish_consistency_notes:
  - Se usa 'Adán' como nombre propio, no 'hombre', en coherencia con el valor contextual del hebreo.
  - Se traduce וַיּוֹלֶד con 'engendró' para preservar el valor lexical de begetting; la nota ofrece la alternativa más literal.
  - '''Semejanza'' e ''imagen'' se mantienen como pares distintos para respetar el eco de Génesis 1:26-27.'
  - Se prefiere 'Set' como forma española estándar del nombre propio.
  - La construcción 'llamó su nombre' conserva el giro semítico sin sonar excesivamente arcaica en español.
