translation:
  language: es
  text: Si estás dispuesto a enviar a nuestro hermano con nosotros[a], bajaremos y compraremos alimento para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si envías a nuestro hermano con nosotros». El modismo hebreo con יֵשׁ + participio puede expresar disposición además de la acción misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si en verdad
  - Si solamente
  lexicon: HALOT
  rationale: La partícula condicional se expresa de forma directa con «si»; no añade énfasis que el hebreo no explicita.
- source_word: יֶשְׁךָ + מְשַׁלֵּחַ
  english_pob_choice: you will send
  chosen_spanish: envías
  alternatives_spanish:
  - estás dispuesto a enviar
  - mandarás
  lexicon: HALOT
  rationale: El hebreo combina יֵשׁ con participio para una condición de disposición o de acción efectiva. En español, «si envías» mantiene naturalidad y deja abierta esa tensión entre disposición y acto, sin forzar una paráfrasis.
- source_word: אֶת אָחִינוּ
  english_pob_choice: our brother
  chosen_spanish: a nuestro hermano
  alternatives_spanish:
  - nuestro hermano
  lexicon: HALOT
  rationale: Se conserva el objeto directo con la preposición personal «a», y el vínculo familiar se mantiene con «nuestro hermano».
- source_word: אִתָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: HALOT
  rationale: Equivale de manera natural a la idea de acompañamiento requerida por el contexto narrativo.
- source_word: נֵרְדָה
  english_pob_choice: we will go down
  chosen_spanish: descenderemos
  alternatives_spanish:
  - iremos hacia abajo
  - bajaremos
  lexicon: HALOT
  rationale: El verbo hebreo expresa movimiento de descenso; «descenderemos» preserva ese matiz y funciona bien en español bíblico sin perder claridad.
- source_word: וְנִשְׁבְּרָה
  english_pob_choice: and buy
  chosen_spanish: y compraremos
  alternatives_spanish:
  - y adquiriremos
  - y obtendremos
  lexicon: HALOT
  rationale: En este contexto de aprovisionamiento, el verbo hebreo tiene el sentido de comprar alimento/grano. «Compraremos» es fiel y comprensible en español actual.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para usted
  - en tu favor
  lexicon: HALOT
  rationale: La relación de beneficio se expresa con naturalidad en español con «para ti»; conserva la referencia personal al padre sin introducir mayor formalidad de la necesaria.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - víveres
  lexicon: HALOT
  rationale: «Alimento» conserva el valor amplio del sustantivo hebreo sin restringirlo innecesariamente a «grano», aunque el contexto narrativo apunta a provisiones.
translation_notes:
  revision_awareness: 'Se siguió el paquete fuente hebreo y el auditable inglés POB: se mantuvo la ambigüedad del giro יֵשׁ + participio mediante una construcción española que puede leerse como condición de acción o de disposición, sin sobreinterpretar el texto. También se preservó el movimiento de descenso y el sentido de compra en el contexto de aprovisionamiento.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió un español sobrio y publicable, evitando «siervo» u otras opciones no pertinentes al léxico del versículo.
  - «Alimento» deja abierta la referencia contextual a provisiones/grano sin imponer un término más específico que el hebreo no usa aquí.
