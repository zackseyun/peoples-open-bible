review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva la personificación de la tierra y la imagen de la sangre recibida de la mano de Caín. Sin embargo, «lejos de la tierra» no preserva la ambigüedad de מִן הָאֲדָמָה; la resuelve hacia separación/alejamiento más de lo que permiten el hebreo y el audit trail inglés, cuyo punto central es mantener la tensión entre ‘de/desde la tierra’ y ‘alejado de la tierra’.
  spanish_quality_summary: El español es claro y digno en general, pero «eres maldito lejos de la tierra» suena algo interpretativo y menos natural como formulación judicial que «eres maldito de la tierra» o «estás bajo maldición de la tierra». Además, si se mantiene la ambigüedad, conviene una nota completa que también preserve la alternativa inglesa ‘away from the ground’. El resto del versículo fluye bien; «que abrió su boca» suena más natural que «la cual abrió su boca».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión principal es semántica: מִן הָאֲדָמָה debe reflejarse de modo más neutro. «Tierra» funciona bien para אֲדָמָה en este contexto.'
  issues:
  - severity: high
    issue: «lejos de la tierra» sobreinterpreta מִן הָאֲדָמָה
    rationale: El hebreo y el audit trail inglés buscan conservar la ambigüedad entre procedencia/ámbito y separación. «Lejos de» inclina decididamente hacia expulsión o distancia física.
  - severity: medium
    issue: La nota al pie no refleja del todo el valor del texto principal
    rationale: Si el texto principal dice «lejos de la tierra», la nota «O ‘de la tierra’» invierte la relación entre lectura principal y alternativa documentada; es mejor que el texto principal sea la forma ambigua y la nota preserve la lectura de alejamiento.
  - severity: low
    issue: «la cual abrió su boca» es menos natural que «que abrió su boca»
    rationale: Ambas son correctas, pero «que» es más fluido en español contemporáneo sin pérdida de dignidad ni precisión.
  revised_spanish_text: Y ahora eres maldito[a] de la tierra, que abrió su boca para recibir la sangre de tu hermano de tu mano.
  revised_footnotes:
  - marker: a
    text: O «lejos de la tierra»; el hebreo puede sugerir tanto que la tierra es el ámbito o la fuente de la maldición como que Caín es alejado de ella.
    reason: alternative_reading
  revision_rationale: Se cambia «lejos de la tierra» por «de la tierra» para preservar mejor la ambigüedad de מִן, en línea con el texto inglés auditado y la decisión teológica de no resolver el sentido hacia mera separación. También se ajusta la cláusula relativa a «que abrió su boca» por mayor naturalidad en español. La nota mantiene la alternativa de alejamiento documentada en el audit trail.
