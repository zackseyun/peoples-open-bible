translation:
  language: es
  text: 'Todos estos estaban bajo la dirección de su padre en la música[a] de la casa de Yahvé, con címbalos, arpas y liras, para el servicio de la casa de Dios, bajo la dirección del rey: Asaf, Jedutún y Hemán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el canto»; o «en cantar». El término también puede referirse más ampliamente a la música.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל יְדֵי אֲבִיהֶם
  english_pob_choice: under the direction of their father
  chosen_spanish: bajo la dirección de su padre
  alternatives_spanish:
  - bajo la mano de su padre
  - por su padre
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'bajo la mano de', pero en este contexto de organización musical y cultual expresa supervisión o autoridad. 'Bajo la dirección de' conserva el valor idiomático sin sonar mecánico en español.
- source_word: בַּשִּׁיר
  english_pob_choice: in the music
  chosen_spanish: en el canto
  alternatives_spanish:
  - en la música
  - en el canto o la música
  lexicon: HALOT
  rationale: Aquí el término puede referirse a 'canto' o 'cantar'. Dado que el texto enumera instrumentos y servicio levítico, 'canto' mantiene la referencia al desempeño musical sin forzar una abstracción demasiado moderna. Se deja abierta la cercanía semántica con 'música'.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre divino en forma 'Yahvé', según la política del proyecto, y se conserva 'casa' para mantener la imagen hebrea concreta sin sustituirla por 'templo'.
- source_word: בִּמְצִלְתַּיִם
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con platillos
  - con címbalos musicales
  lexicon: HALOT
  rationale: 'El instrumento es suficientemente claro en español como ''címbalos''. La preposición es instrumental: forman parte del acompañamiento musical.'
- source_word: נְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - liras
  - instrumentos de cuerda
  lexicon: HALOT
  rationale: El instrumento exacto es discutido, pero en español 'arpa' es una equivalencia tradicional e inteligible. Como el texto distingue dos instrumentos de cuerda, esta opción funciona bien en pareja con 'liras'.
- source_word: וְכִנֹּרוֹת
  english_pob_choice: and lyres
  chosen_spanish: y liras
  alternatives_spanish:
  - y arpas
  - y instrumentos de cuerda
  lexicon: HALOT
  rationale: Se preserva la distinción entre נְבָלִים y כִנּוֹרוֹת. 'Liras' es una forma distinta y natural en español para evitar colapsar ambos términos en un solo instrumento.
- source_word: לַעֲבֹדַת בֵּית הָאֱלֹהִים
  english_pob_choice: for the service of the house of God
  chosen_spanish: para el servicio de la casa de Dios
  alternatives_spanish:
  - para la obra de la casa de Dios
  - para el ministerio de la casa de Dios
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto cultual se refiere a servicio o labor sagrada. 'Servicio' es la opción más natural y fiel, evitando términos eclesiásticos posteriores que podrían obscurecer el marco del templo.
- source_word: עַל יְדֵי הַמֶּלֶךְ
  english_pob_choice: under the direction of the king
  chosen_spanish: bajo la dirección del rey
  alternatives_spanish:
  - por orden del rey
  - bajo la mano del rey
  lexicon: HALOT
  rationale: La misma locución idiomática reaparece y nuevamente comunica supervisión/autoridad. En español conviene mantener la simetría con la primera ocurrencia.
- source_word: אָסָף וִידוּתוּן וְהֵימָן
  english_pob_choice: Asaph, Jeduthun, and Heman
  chosen_spanish: Asaf, Jedutún y Hemán
  alternatives_spanish:
  - Asaf, Jedutún, y Hemán
  lexicon: N/A (nombres propios)
  rationale: Se transliteran los nombres propios en forma sobria y estándar en español bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto hebreo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En español del POB se mantiene la forma 'Yahvé' para no ocultar el nombre propio divino con una sustitución genérica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El antecedente inglés ya había resuelto la idiomática עַל יְדֵי como dirección/supervisión y distinguido entre los dos instrumentos de cuerda. Esta versión sigue esa línea, pero ajusta el nombre divino a la política española del proyecto ('Yahvé') y hace explícita en español la ambigüedad de בַּשִּׁיר mediante una nota breve. No se detectan revisiones textuales que obliguen a cambiar el sentido base.
  spanish_consistency_notes:
  - Se mantiene la repetición de 'bajo la dirección' para reflejar el paralelismo hebreo.
  - Se usa 'casa de Yahvé' y 'casa de Dios' de forma diferenciada según el hebreo.
  - '''Arpas'' y ''liras'' conservan la distinción instrumental del audit trail inglés.'
  - 'Los nombres propios se transliteran de forma uniforme: Asaf, Jedutún, Hemán.'
