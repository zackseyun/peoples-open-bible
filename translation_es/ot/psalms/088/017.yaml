translation:
  language: es
  text: Los ardores de tu ira pasaron sobre mí[a][b]; tus terrores me destruyeron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasaron sobre mí». El verbo hebreo es literalmente «pasaron», pero el contexto sugiere una fuerza abrumadora.
    reason: lexical_alternative
  - marker: b
    text: «Los ardores de tu ira» refleja una expresión hebrea relacionada con el ardor; versiones tradicionales suelen decir «tu ira» o «tu furor».
    reason: lexical_alternative
  - marker: c
    text: O «me cortaron de raíz». El verbo hebreo también puede expresar la idea de destruir o eliminar por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלַי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición con sufijo de 1ª persona indica algo que recae o avanza hacia el salmista. «Sobre mí» conserva la imagen de cobertura/avance y funciona de modo natural en español poético.
- source_word: עָבְרוּ
  english_pob_choice: swept over
  chosen_spanish: pasó
  alternatives_spanish:
  - pasaron sobre mí
  - me sobrepasó
  - me envolvió
  lexicon: HALOT
  rationale: El verbo בסיס es literalmente «pasar/cross over». En español, «pasó sobre mí» mantiene la metáfora del movimiento sin introducir una imagen demasiado interpretativa como «envolvió».
- source_word: חֲרוֹנֶיךָ
  english_pob_choice: your burning anger
  chosen_spanish: tu ira ardiente
  alternatives_spanish:
  - tu furor ardiente
  - tu cólera ardiente
  - tu ira
  lexicon: HALOT
  rationale: חרון expresa ira con imagen de ardor/calor. «Ira ardiente» preserva el componente léxico de fuego que la POB inglesa destacó, sin depender de «ira/enojo» más genérico o de «furor» más marcado.
- source_word: בִּעוּתֶיךָ
  english_pob_choice: your terrors
  chosen_spanish: tus terrores
  alternatives_spanish:
  - tus espantos
  - tus cosas terribles
  - tus actos aterradores
  lexicon: HALOT
  rationale: El sustantivo refiere a terrores o aquello que causa pavor. «Terrores» es directo y mantiene la fuerza poética y la pluralidad del hebreo.
- source_word: צִמְּתוּתֻנִי
  english_pob_choice: destroyed me
  chosen_spanish: me destruyeron
  alternatives_spanish:
  - me aniquilaron
  - me eliminaron
  - me cortaron
  lexicon: HALOT
  rationale: La raíz צמת puede significar destruir, exterminar o cortar off. «Me destruyeron» conserva la intensidad del lamento y evita debilitar la frase a un mero «me apartaron».
theological_decisions:
- issue: Cómo renderizar el lenguaje de la ira divina sin suavizarlo
  english_pob_reading: Your burning anger swept over me; your terrors destroyed me.
  chosen_spanish_reading: Tu ira ardiente pasó sobre mí; tus terrores me destruyeron.
  alternative_spanish_readings:
  - Tu furia pasó sobre mí; tus terrores me consumieron.
  - Tu ira ardiente se abatió sobre mí; tus terrores me acabaron.
  rationale: El hebreo atribuye a Dios una ira intensa y terrorífica en el marco de una lamentación. La traducción conserva el lenguaje fuerte sin reemplazarlo por términos más eclesiásticos o atenuados.
  doctrine_reference: Salmos de lamentación; antropopatismo bíblico
translation_notes:
  revision_awareness: Coincido con el audit trail inglés en mantener la metáfora de movimiento para עָבְרוּ, la imaginería de ardor en חֲרוֹנֶיךָ y la intensidad extrema de צִמְּתוּתֻנִי. No se aplicaron revisiones posteriores; el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el pronombre posesivo de segunda persona («tu»), manteniendo la referencia divina sin añadir un sujeto inexistente.
  - «Terrores» preserva el plural intensivo del hebreo y armoniza con el tono poético del salmo.
  - La puntuación separa las dos mitades del verso con punto y coma para reflejar el paralelismo hebreo.
