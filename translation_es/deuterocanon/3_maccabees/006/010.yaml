translation:
  language: es
  text: Pero si nuestra manera de vivir en el exilio[a] ha sido marcada por la impiedad, entonces, después de librarnos de la mano de nuestros enemigos, destrúyenos con la muerte que tú elijas, Maestro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nuestra colonia/asentamiento»; ἀποικία puede designar una colonia o asentamiento, pero aquí probablemente se refiere a la vida de la comunidad en el exilio.
    reason: lexical_alternative
  - marker: b
    text: O «Soberano» o «Señor» para δέσποτα; el griego usa un vocativo de autoridad absoluta distinto de κύριος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - maldad
  - irreligiosidad
  lexicon: LSJ
  rationale: ἀσέβεια expresa falta de reverencia o piedad hacia Dios. En español, «impiedad» conserva mejor ese matiz religioso y moral que «maldad», que sería más amplio y menos preciso.
- source_word: κατὰ τὴν ἀποικίαν
  english_pob_choice: in exile
  chosen_spanish: en el exilio
  alternatives_spanish:
  - en la colonia
  - en el asentamiento
  - durante nuestra dispersión
  lexicon: LSJ
  rationale: Aunque ἀποικία puede significar «colonia» o «asentamiento», el contexto de esta oración es la vida del pueblo lejos de su tierra. «En el exilio» comunica de manera natural esa situación sin imponer una imagen política moderna engañosa.
- source_word: ὁ βίος ἡμῶν
  english_pob_choice: our way of life
  chosen_spanish: nuestra manera de vivir
  alternatives_spanish:
  - nuestra vida
  - nuestra conducta
  lexicon: LSJ
  rationale: βίος aquí no señala solo existencia biológica, sino el modo de vida. «Nuestra manera de vivir» preserva ese sentido ético y resulta idiomático en español.
- source_word: ἐνέσχηκται
  english_pob_choice: has been marked by
  chosen_spanish: ha sido marcada por
  alternatives_spanish:
  - ha sido envuelta en
  - ha estado implicada en
  - ha quedado atrapada en
  lexicon: LSJ
  rationale: El perfecto sugiere un estado ya establecido. «Ha sido marcada por» refleja bien esa condición persistente sin forzar la imagen de atrapamiento más de lo que el griego exige.
- source_word: ῥυσάμενος
  english_pob_choice: after rescuing
  chosen_spanish: después de librarnos
  alternatives_spanish:
  - después de rescatarnos
  - habiéndonos librado
  lexicon: LSJ
  rationale: El participio aoristo antecede al imperativo principal. «Después de librarnos» expresa la secuencia temporal de manera natural y mantiene el sentido de liberación.
- source_word: ἀπὸ ἐχθρῶν χειρός
  english_pob_choice: from the hand of our enemies
  chosen_spanish: de la mano de nuestros enemigos
  alternatives_spanish:
  - del poder de nuestros enemigos
  - de manos de nuestros enemigos
  lexicon: LSJ
  rationale: La expresión conserva el giro idiomático bíblico de liberación del poder de otros. «De la mano de nuestros enemigos» es transparente y mantiene la imagen del original.
- source_word: ᾧ προαιρῇ
  english_pob_choice: by whatever death you choose
  chosen_spanish: por la muerte que tú elijas
  alternatives_spanish:
  - de la manera que tú prefieras
  - según la muerte que tú decidas
  lexicon: LSJ
  rationale: La construcción relativa con προαιρέω modifica a μόρῳ y expresa elección sobre el modo de morir. «Por la muerte que tú elijas» integra ese sentido de forma clara y fiel.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Soberano
  alternatives_spanish:
  - Maestro
  - Señor
  lexicon: LSJ
  rationale: δέσποτα no es κύριος. «Soberano» comunica autoridad absoluta en un registro digno y evita confundir este vocativo con el uso tradicional de «Señor» para κύριος.
- source_word: ἀπόλεσον ἡμᾶς μόρῳ
  english_pob_choice: destroy us by whatever death you choose
  chosen_spanish: destrúyenos por la muerte que tú elijas
  alternatives_spanish:
  - dános la muerte que tú elijas
  - haz perecer a nosotros por la muerte que tú elijas
  lexicon: LSJ
  rationale: ἀπόλεσον aquí es una petición para que Dios ponga fin a su vida, no para una ruina abstracta. «Destrúyenos» conserva la fuerza del imperativo, y la frase completa deja claro que se trata del modo de morir.
theological_decisions:
- issue: Vocativo δέσποτα y su relación con los títulos divinos habituales
  english_pob_reading: Master
  chosen_spanish_reading: Soberano
  alternative_spanish_readings:
  - Maestro
  - Señor
  rationale: El griego usa δέσποτα, no κύριος. Para mantener transparencia lexical y no importar de manera automática la carga teológica de «Señor», se eligió «Soberano», que expresa autoridad sin borrar la diferencia del vocativo original.
  doctrine_reference: 'DOCTRINE.md: traducir títulos con primacía del idioma fuente; preservar distinciones léxicas documentadas.'
- issue: Sentido de ἀποικία en una oración judía de exilio
  english_pob_reading: in exile
  chosen_spanish_reading: en el exilio
  alternative_spanish_readings:
  - en la colonia
  - en el asentamiento
  - en la dispersión
  rationale: «Colonia» podría inducir a una lectura política moderna ajena al contexto. «En el exilio» comunica el trasfondo comunitario y teológico del pasaje y coincide con la revisión más reciente del texto inglés.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; primacía del original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del tramo inglés que pasó de «in the place of our exile» a «in exile» y de «has been caught up in ungodliness» a «has been marked by ungodliness». Por eso el español usa «en el exilio» y «ha sido marcada por la impiedad», evitando tanto la literalidad pesada como una paráfrasis excesiva. También se preservó la distinción entre δέσποτα y el vocativo habitual traducido como «Señor».
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el vocativo sin introducir términos no presentes; el original dirige la súplica a una autoridad soberana.
  - Se prefirió «impiedad» sobre «maldad» para conservar la carga religiosa de ἀσέβεια.
  - Se usó un registro digno y bíblico sin arcaísmos innecesarios.
  - «En el exilio» sigue la lectura revisada del inglés POB y evita la falsa concreción de «colonia».
