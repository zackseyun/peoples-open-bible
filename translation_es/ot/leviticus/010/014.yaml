base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/014.yaml
  text: And you[a], and your sons and your daughters with you, shall eat the breast of the wave offering and the thigh of the contribution in a clean place[c][b], because they have been given as your portion and your sons’ portion from the sacrifices of the peace offerings of the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'the breast of the presentation offering.' The Hebrew term refers to the portion ritually waved before the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'the thigh of the raised offering.' The Hebrew term for 'contribution' is literally something lifted up or set apart as a priestly due.
    reason: lexical_alternative
  - marker: c
    text: '''Peace offerings'' may also be rendered ''fellowship offerings,'' though the Hebrew term can suggest a wider sense of peace, wholeness, or well-being.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
