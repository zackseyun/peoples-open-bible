base_translation:
  language: en
  yaml_path: translation/ot/ruth/003/007.yaml
  text: And Boaz ate and drank[a], and his heart was merry, and he went to lie down at the end of the grain heap. Then she came quietly, uncovered his feet[b], and lay down.
  footnotes:
  - marker: a
    text: Or "his heart was glad" or "he was in good spirits." The Hebrew idiom indicates cheerfulness, but does not by itself require drunkenness.
    reason: lexical_alternative
  - marker: b
    text: Literally, "uncovered his feet." Some interpreters understand this as a simple literal action; others see possible suggestive overtones. The Hebrew wording itself remains restrained and does not explicitly describe sexual activity.
    reason: alternative_reading
