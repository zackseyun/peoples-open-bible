id: RUT.2.9
reference: Ruth 2:9
source:
  edition: WLC
  text: עֵינַ֜יִ/ךְ בַּ/שָּׂדֶ֤ה אֲשֶׁר יִקְצֹרוּ/ן֙ וְ/הָלַ֣כְתִּ אַחֲרֵי/הֶ֔ן הֲ/ל֥וֹא צִוִּ֛יתִי אֶת הַ/נְּעָרִ֖ים לְ/בִלְתִּ֣י נָגְעֵ֑/ךְ וְ/צָמִ֗ת וְ/הָלַכְתְּ֙ אֶל הַ/כֵּלִ֔ים וְ/שָׁתִ֕ית מֵ/אֲשֶׁ֥ר יִשְׁאֲב֖וּ/ן הַ/נְּעָרִֽים־־־׃
translation:
  text: Keep your eyes on the field where they are harvesting[a], and follow behind them. Have I not commanded the young men not to touch you? When you are thirsty, go to the jars and drink from what the young men have drawn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more contextually, 'not to lay a hand on you.' The Hebrew literally says 'not to touch you,' which may include protection from harassment or assault.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַיִךְ
  chosen: Keep your eyes on
  alternatives:
  - Your eyes are to be on
  - Let your eyes be on
  lexicon: HALOT
  rationale: Literally 'your eyes' with an implied directive. English idiom requires a verbal expression; 'Keep your eyes on' preserves the imperative force and attentiveness without over-paraphrase.
- source_word: בַּשָּׂדֶה
  chosen: the field
  alternatives:
  - the farmland
  lexicon: HALOT
  rationale: Standard rendering of שָׂדֶה as cultivated field; singular is retained.
- source_word: אֲשֶׁר יִקְצֹרוּן
  chosen: where they are harvesting
  alternatives:
  - which they reap
  - that they are reaping
  lexicon: HALOT
  rationale: The relative clause identifies the field by the workers' action. Progressive English fits the ongoing scene. 'Harvesting' is more natural than 'reaping' in contemporary English while preserving sense.
- source_word: וְהָלַכְתִּ אַחֲרֵיהֶן
  chosen: and follow behind them
  alternatives:
  - and walk after them
  lexicon: HALOT
  rationale: Sequential instruction to Ruth to go after the female reapers/gatherers. 'Follow behind them' is natural English and preserves spatial relation.
- source_word: אַחֲרֵיהֶן
  chosen: them
  alternatives:
  - the women
  - the female workers
  lexicon: HALOT
  rationale: The Hebrew suffix is feminine plural, referring to the women in the harvesting party. English third-person plural does not mark gender, so 'them' is acceptable in the main text; the feminine reference is preserved in this documentation rather than expanded in translation.
- source_word: הֲלוֹא
  chosen: Have I not
  alternatives:
  - Surely I have
  - Did I not
  lexicon: HALOT
  rationale: Rhetorical particle introducing reassurance. 'Have I not' preserves the rhetorical question form.
- source_word: צִוִּיתִי
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The verb denotes giving a charge or command. 'Commanded' best reflects the authority Boaz exercises.
- source_word: הַנְּעָרִים
  chosen: the young men
  alternatives:
  - the servants
  - the workers
  lexicon: HALOT
  rationale: נערים here refers specifically to Boaz's male workers. 'Young men' is gender-accurate and avoids flattening the distinction from the feminine group earlier in the verse.
- source_word: לְבִלְתִּי נָגְעֵךְ
  chosen: not to touch you
  alternatives:
  - not to lay a hand on you
  - not to molest you
  lexicon: HALOT
  rationale: נגע literally means 'touch,' but in this context likely implies harmful or harassing contact. The main text keeps the literal 'touch you'; a stronger contextual alternative is worth preserving in a footnote.
- source_word: וְצָמִת
  chosen: When you are thirsty
  alternatives:
  - And if you are thirsty
  - and you become thirsty
  lexicon: HALOT
  rationale: The clause introduces a situational condition. 'When you are thirsty' is idiomatic and fits the expected circumstance.
- source_word: הַכֵּלִים
  chosen: the jars
  alternatives:
  - the vessels
  - the containers
  lexicon: HALOT
  rationale: כֵּלִים is broad ('vessels/containers'), but in this context of drinking water, 'jars' gives the likely concrete sense in readable English.
- source_word: וְשָׁתִית מֵאֲשֶׁר יִשְׁאֲבוּן
  chosen: and drink from what the young men have drawn
  alternatives:
  - and drink from what the young men draw
  - and drink from what has been drawn
  lexicon: HALOT
  rationale: The sense is to drink water that the young men have drawn. English perfect 'have drawn' naturally conveys the prior action relative to drinking.
- source_word: יִשְׁאֲבוּן
  chosen: have drawn
  alternatives:
  - draw
  lexicon: HALOT
  rationale: The verb means to draw water. The perfect-like English rendering fits the sequence of action in context.
