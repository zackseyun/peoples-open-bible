translation:
  language: es
  text: Tú eras intachable en tus caminos desde el día en que fuiste creado[a], hasta que se halló en ti injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perfecto en tus caminos». El término hebreo puede denotar plenitud o integridad; aquí se eligió «intachable» para ajustarlo al contexto moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - sin culpa
  - perfecto
  - íntegro
  lexicon: HALOT
  rationale: En este contexto moral y evaluativo, תמים expresa integridad de conducta más que perfección absoluta. «Intachable» comunica bien esa idea en español y evita sobreinterpretar el término.
- source_word: בִּדְרָכֶיךָ
  english_pob_choice: in your ways
  chosen_spanish: en tus caminos
  alternatives_spanish:
  - en tu conducta
  - en tus sendas
  lexicon: HALOT
  rationale: «Caminos» conserva la imagen hebrea de manera natural en español y puede referirse a la manera de vivir o conducta.
- source_word: מִיּוֹם הִבָּרְאָךְ
  english_pob_choice: from the day you were created
  chosen_spanish: desde el día en que fuiste creado
  alternatives_spanish:
  - desde el día de tu creación
  - desde el día que fuiste creado
  lexicon: HALOT
  rationale: La frase temporal se vierte de forma idiomática en español y conserva el sentido pasivo de ser creado.
- source_word: נִמְצָא
  english_pob_choice: was found
  chosen_spanish: se halló
  alternatives_spanish:
  - fue hallada
  - se encontró
  lexicon: HALOT
  rationale: El pasivo hebreo se mantiene con una construcción impersonal natural en español. «Se halló» preserva la idea de descubrimiento/exposición sin precisar más de lo que dice el texto.
- source_word: עַוְלָתָה
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidad
  - perversidad
  lexicon: HALOT
  rationale: El sustantivo puede abarcar lo moralmente torcido o injusto. «Injusticia» expresa bien la falta ética en español moderno; «iniquidad» es más tradicional pero menos transparente.
- source_word: בָּךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  lexicon: HALOT
  rationale: Reproduce de forma directa la localización interna del defecto hallado.
theological_decisions:
- issue: 'Alcance de תמים: perfección absoluta vs. integridad moral'
  english_pob_reading: blameless
  chosen_spanish_reading: intachable
  alternative_spanish_readings:
  - perfecto
  - íntegro
  rationale: La opción evita imponer una afirmación ontológica más fuerte que la que requiere el hebreo. El versículo describe una condición moral en los caminos del personaje hasta que apareció el mal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; la versión inglesa más reciente indica que no hubo cambios necesarios y el cotejo final mostró alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el nombre divino aparezca; aquí no ocurre.
  - Se conserva un registro sobrio y bíblico en español, evitando calcos excesivamente literales donde el idioma pide una formulación más natural.
  - La nota de pie conserva la tensión lexical de תמים sin forzar una traducción única y absoluta.
