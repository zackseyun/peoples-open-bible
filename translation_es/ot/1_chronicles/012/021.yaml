  to: 'Cuando iba a Ziclag, algunos de Manasés se pasaron a su lado[a]: Adná, Jozabad, Jediael, Micael, otro Jozabad, Elihú y Ziletai[c][b], jefes de los millares que pertenecían a Manasés.'
  rationale: Se corrige la expresión no idiomática ‘desertaron a él’ por ‘se pasaron a su lado’, que comunica naturalmente el cambio de lealtad implícito en el hebreo. También se reubica y reescribe la nota [a] para que documente el modismo נָפְלוּ עָלָיו, en conformidad con la auditoría inglesa, mientras se conservan las demás notas pertinentes.
