lexical_decisions:
- source_word: סֹבּוּ
  english_pob_choice: Walk around
  chosen_spanish: Rodeen
  alternatives_spanish:
  - Vayan alrededor
  - Den la vuelta
  lexicon: HALOT
  rationale: El imperativo plural expresa un movimiento concreto alrededor de la ciudad. «Rodeen» conserva la idea espacial de circundar con un español natural y digno.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  - Monte Sion
  lexicon: HALOT
  rationale: Es nombre propio; en español bíblico y eclesial es usual «Sion». El hebreo aquí dice simplemente Sion, no «Monte Sion».
- source_word: וְהַקִּיפוּהָ
  english_pob_choice: and go around her
  chosen_spanish: y den la vuelta a su alrededor
  alternatives_spanish:
  - y rodéenla
  - y circúndenla
  lexicon: HALOT
  rationale: La forma imperativa con sufijo femenino apunta a la ciudad personificada. «Dar la vuelta a su alrededor» refleja el segundo mandato sin sugerir hostilidad, y mantiene la referencia femenina mediante «su».
- source_word: סִפְרוּ
  english_pob_choice: count
  chosen_spanish: cuenten
  alternatives_spanish:
  - numeren
  - contabilicen
  lexicon: HALOT
  rationale: El verbo pide enumerar las torres. «Cuenten» es la opción más natural y fiel al acto de contar.
- source_word: מִגְדָּלֶיהָ
  english_pob_choice: her towers
  chosen_spanish: sus torres
  alternatives_spanish:
  - las torres de ella
  - sus fortalezas
  lexicon: HALOT
  rationale: El sufijo femenino se conserva con «sus», que en español evita torpeza sintáctica y sigue apuntando a Sion como ciudad personificada.
translation_notes:
  revision_awareness: 'El texto hebreo presenta dos imperativos espaciales sucesivos: סֹבּוּ y וְהַקִּיפוּהָ. La versión española distingue ambos con «Rodeen» y «den la vuelta a su alrededor», evitando fusionarlos en una sola idea. Se corrigió la falta de anclaje del marcador de nota insertándolo en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Sion» como nombre propio bíblico normalizado en español.
  - Se conservó la imagen concreta de recorrer/circundar la ciudad antes de contar sus torres.
  - La posesión femenina del hebreo se reflejó con «sus» y «su alrededor», sin volver impersonal el referente.
