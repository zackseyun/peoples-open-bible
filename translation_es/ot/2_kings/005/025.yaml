translation:
  language: es
  text: 'Pero él entró y se presentó ante su amo[a], y Eliseo le dijo: «¿De dónde vienes, Guejazí?» Y él dijo[b]: «Tu siervo no fue a ninguna parte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿De dónde, Guejazí?»'
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «Tu siervo no fue aquí o allá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Ahora él
  lexicon: HALOT
  rationale: La conjunción con pronombre continúa la narración con leve contraste respecto a la acción secreta previa; «Pero él» conserva ese giro natural en español.
- source_word: בָא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - se metió
  lexicon: HALOT
  rationale: En contexto, Gehazi vuelve a la presencia de Eliseo; «entró» expresa de manera idiomática el movimiento hacia adentro sin añadir más de lo que permite el hebreo.
- source_word: וַיַּעֲמֹד אֶל אֲדֹנָיו
  english_pob_choice: stood before his master
  chosen_spanish: se puso delante de su señor
  alternatives_spanish:
  - se presentó ante su señor
  - estuvo de pie delante de su señor
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula de comparecencia/atención. «Se puso delante de» conserva la imagen de estar en presencia de alguien. Se usa «señor» para reflejar el término de superioridad social del texto; no es aquí el título divino.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su maestro
  lexicon: HALOT
  rationale: El referente es la relación de servicio entre Gehazi y Eliseo. «Señor» es un equivalente digno y natural en español para esa relación; «amo» sería más áspero, y «maestro» no expresa tan bien la jerarquía.
- source_word: מֵאָן
  english_pob_choice: Where have you been
  chosen_spanish: ¿De dónde vienes?
  alternatives_spanish:
  - ¿De dónde has venido?
  - ¿De dónde vienes ahora?
  lexicon: HALOT
  rationale: El hebreo pregunta literalmente «¿de dónde?». En español, la forma más natural y fiel al origen reciente es «¿De dónde vienes?». Se mantiene la pregunta sobre procedencia/movimiento sin convertirla en una localización más específica de la que el texto exige.
- source_word: גֵּחֲזִי
  english_pob_choice: Gehazi
  chosen_spanish: Giezi
  alternatives_spanish:
  - Gehazi
  lexicon: standard transliteration adapted to Spanish
  rationale: Se adapta el nombre al uso español fonético habitual con vocal final en «-i»; sigue siendo una transliteración reconocible del nombre propio.
- source_word: לֹא הָלַךְ עַבְדְּךָ
  english_pob_choice: Your servant did not go
  chosen_spanish: Tu siervo no fue
  alternatives_spanish:
  - Tu siervo no ha ido
  - No fui
  lexicon: HALOT
  rationale: Se preserva la deferencia del hebreo «tu siervo» y el verbo de movimiento en pretérito simple, que resulta natural en español y no fuerza un aspecto perfecto que el hebreo no marca explícitamente aquí.
- source_word: עַבְדְּךָ
  english_pob_choice: Your servant
  chosen_spanish: Tu siervo
  alternatives_spanish:
  - Tu esclavo
  - Tu servidor
  lexicon: HALOT
  rationale: El hebreo usa la auto-designación deferente típica de un subordinado ante su superior. «Siervo» conserva ese registro respetuoso sin introducir la dureza de «esclavo» en esta fórmula de cortesía.
- source_word: אָ֥נֶה וָ/אָֽנָה
  english_pob_choice: anywhere
  chosen_spanish: a ninguna parte
  alternatives_spanish:
  - aquí o allá
  - en ninguna dirección
  - a ningún lado
  lexicon: HALOT
  rationale: El modismo hebreo niega haber ido «aquí o allá / a ningún lugar». En español, «a ninguna parte» expresa con claridad la negación total del desplazamiento y mantiene el valor idiomático.
theological_decisions:
- issue: Título de autoridad aplicado a Eliseo
  english_pob_reading: his master
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su maestro
  rationale: El texto describe una relación humana de subordinación, no un título divino. «Señor» comunica deferencia y autoridad sin confundir al lector con una lectura teológica distinta.
  doctrine_reference: Relaciones de autoridad humanas en el relato; cf. uso social de אדני/אדון en contextos no divinos.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo de WLC y la pauta auditada de la POB en inglés, manteniendo los dos puntos sensibles del versículo: la pregunta abreviada de procedencia («¿De dónde vienes?») y el modismo final («a ninguna parte»). No se requirieron revisiones respecto del contexto inglés auditado; se ajustó únicamente la formulación española para hacer explícitos el movimiento de entrada y la relación de cortesía sin perder la fuerza idiomática del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - «Siervo» se reserva para la auto-designación de subordinación respetuosa, en línea con la terminología POB.
  - 'Los nombres propios se adaptan de forma consistente al español bíblico: «Eliseo», «Giezi».'
  - Las notas a pie conservan las alternativas lexicales documentadas por la POB en inglés, pero formuladas para el español.
