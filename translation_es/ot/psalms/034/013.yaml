translation:
  language: es
  text: ¿Quién es el hombre que se deleita en la vida, que ama los días para ver el bien[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para experimentar el bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who is
  chosen_spanish: ¿Quién es
  alternatives_spanish:
  - ¿Quién
  lexicon: HALOT
  rationale: La forma interrogativa hebrea introduce una pregunta retórica. En español, «¿Quién es» da una sintaxis natural y explícita, equivalente al arranque inglés auditable.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino con fuerza genérica o representativa. Se conserva «el hombre» para mantener esa marca de género y el valor proverbial sin neutralizarla innecesariamente.
- source_word: הֶחָפֵץ
  english_pob_choice: who delights in
  chosen_spanish: que se complace en
  alternatives_spanish:
  - que desea
  - que se deleita en
  lexicon: HALOT
  rationale: חפץ expresa deseo/inclinación positiva; «se complace en» preserva el matiz de inclinación gozosa mejor que un simple «desea».
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vivir
  - la vida
  lexicon: HALOT
  rationale: Aunque el hebreo es plural morfológico, el uso idiomático apunta a «vida» en español. Se conserva el sentido abierto y proverbial del término.
- source_word: אֹהֵב
  english_pob_choice: loving
  chosen_spanish: que ama
  alternatives_spanish:
  - amando
  - amante de
  lexicon: HALOT
  rationale: El participio enlazado mantiene la cadena descriptiva. En español, «que ama» suena natural y reproduce la relación coordinada con el miembro anterior.
- source_word: יָמִים
  english_pob_choice: days
  chosen_spanish: los días
  alternatives_spanish:
  - días
  lexicon: HALOT
  rationale: Se mantiene el plural literal para conservar el paralelismo hebreo entre «vida» y «días».
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para experimentar
  - para contemplar
  lexicon: HALOT
  rationale: El infinitivo de ראה admite el sentido directo de «ver». En español, «para ver» preserva la metáfora abierta sin interpretarla de más.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien
  - cosas buenas
  lexicon: HALOT
  rationale: En esta construcción, טוֹב funciona de modo sustantivado. «El bien» comunica la amplitud semántica y mantiene la resonancia sapiencial sin restringirlo a prosperidad material.
theological_decisions:
- issue: Valor genérico del masculino singular
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - uno
  rationale: Se conserva el singular masculino como forma genérica del hebreo, siguiendo la decisión auditada de no neutralizar automáticamente el género gramatical cuando el texto lo usa representativamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pase más reciente indicó que no se requerían cambios; esta propuesta mantiene la lectura auditada y solo ajusta la formulación española para fluidez natural, conservando el paralelismo y las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se conserva el masculino singular genérico como en el hebreo y en el audit trail inglés.
  - «El bien» traduce el טוב sustantivado sin cerrarlo a prosperidad material.
  - Se mantiene el paralelismo entre «vida» y «días» con una estructura interrogativa clara y publicable.
