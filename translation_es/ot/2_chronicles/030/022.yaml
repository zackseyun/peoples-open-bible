base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/022.yaml
  text: And Hezekiah spoke encouragingly to all the Levites who had good understanding in the service of Yahweh[a]. And they ate throughout the appointed feast for seven days, sacrificing peace offerings and giving thanks to Yahweh[d][c][b], the God of their fathers.
  footnotes:
  - marker: a
    text: Or, more literally, 'spoke to the heart of all the Levites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who had good insight for the LORD' or 'who were skillful in regard to the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'peace offerings'; alternatively 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
  - marker: d
    text: The verb can also mean 'confessing' or 'praising'; here it likely carries the sense of giving thanks in worship.
    reason: lexical_alternative
