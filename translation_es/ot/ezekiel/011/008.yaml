  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: temor a la espada, anuncio de que Yahvé traerá la espada sobre ellos, y fórmula profética final. También preserva la repetición de חֶרֶב y las dos notas del rastro inglés. Sin embargo, en la fórmula אֲדֹנָי יְהוִה, la solución «el Señor Yahvé» no es la mejor opción en español para este proyecto, porque mezcla el título con el nombre de manera algo rígida y menos natural que una formulación que preserve ambos elementos con mejor legibilidad.'
  spanish_quality_summary: El español es claro y digno, pero «—declara el Señor Yahvé» suena algo forzado. Además, la puntuación mejora con espacio antes de la raya de inciso. El resto del verso es natural y fiel. «Han temido» y «traeré la espada sobre ustedes» son aceptables; la repetición de «la espada» funciona bien.
  glossary_alignment: 'Buen alineamiento general con el glosario: יהוה no se enmascara como «SEÑOR» y se mantiene «Yahvé». La principal excepción es la combinación אֲדֹנָי יְהוִה, donde conviene usar «el Señor Dios, Yahvé» para reflejar ambos componentes con claridad en español y evitar la aspereza de «el Señor Yahvé».'
  issues:
  - severity: medium
    issue: Renderizado de אֲדֹנָי יְהוִה como «el Señor Yahvé»
    rationale: Aunque conserva ambos elementos, en español suena menos natural y puede percibirse como yuxtaposición abrupta. «El Señor Dios, Yahvé» comunica mejor el título compuesto y sigue honrando la política del proyecto de usar «Yahvé» para el Tetragrama.
  - severity: low
    issue: Puntuación del inciso final
    rationale: Conviene escribir « —declara ...» con espacio antes de la raya, siguiendo convención tipográfica española más cuidada.
