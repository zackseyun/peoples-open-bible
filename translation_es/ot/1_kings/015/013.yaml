base_translation:
  language: en
  yaml_path: translation/ot/1_kings/015/013.yaml
  text: He also removed Maacah his mother from being queen mother[a], because she had made an abominable image for Asherah[c][b]. Asa cut down her image and burned it in the Kidron Valley.
  footnotes:
  - marker: a
    text: Hebrew 'his mother'; in royal usage this can sometimes refer to a grandmother or female ancestor.
    reason: lexical_alternative
  - marker: b
    text: Or 'an abominable image' / 'a horrid thing.' The exact nature of the cult object is uncertain.
    reason: lexical_alternative
  - marker: c
    text: '''Asherah'' may refer to the goddess Asherah or to her cult symbol, often rendered ''Asherah pole.'''
    reason: alternative_reading
