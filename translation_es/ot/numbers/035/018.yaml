revisions:
- from: O si lo hirió con un objeto de madera en la mano[a], por el cual se podría morir, y murió, es un homicida; el homicida ciertamente morirá.
  to: O si lo golpeó con un objeto de madera en la mano[a], con el que se puede causar la muerte, y murió, es un homicida; el homicida ciertamente deberá ser condenado a muerte.
  rationale: Se ajusta el verbo de acción a 'lo golpeó' para reflejar mejor נכה sin adelantar el resultado; se mejora la naturalidad de la cláusula de capacidad letal; y se corrige la pena para expresar claramente la sentencia de muerte implícita en מוֹת יוּמַת según la auditoría inglesa y el contexto legal.
