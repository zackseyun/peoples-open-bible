revisions:
- from: Tú conoces mi angustia[a], porque detesto la señal[b] de mi orgullo, que está sobre mi cabeza en los días de mi aparición[c]; la detesto como un paño menstrual[d], y no lo llevo en los días de mi descanso[e].
  to: Tú conoces mi angustia[a], porque detesto la señal[b] de mi orgullo, que está sobre mi cabeza en los días en que me presento[c]; la detesto como un paño de menstruación[d], y no lo uso en los días de mi descanso[e].
  rationale: La revisión es menor pero necesaria para mejorar la fidelidad funcional al griego y la naturalidad del español. Se reemplaza «aparición» por «en los días en que me presento» porque en español la forma literal puede malentenderse, mientras que el expediente léxico deja claro que se refiere a comparecencias públicas. Se cambia «lo llevo» por «lo uso» para un español más idiomático con un adorno de cabeza. Se ajusta «paño menstrual» a «paño de menstruación» para conservar la explicitud gráfica sin ambigüedad moderna. También se corrige la nota a para reflejar mejor las alternativas léxicas documentadas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:56Z'
