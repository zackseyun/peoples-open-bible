revisions:
- from: Nacor vivió ciento diecinueve años después de haber engendrado a Téraj, y engendró hijos e hijas.
  to: Nacor vivió ciento diecinueve años después que engendró a Térah, y engendró hijos e hijas.
  rationale: Se ajusta la forma del nombre propio a 'Térah' por mayor naturalidad y reconocimiento en español bíblico, y se simplifica la construcción temporal a 'después que engendró a' para una lectura más fluida manteniendo intacto el sentido del hebreo y la consistencia genealógica.
