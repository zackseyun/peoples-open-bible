translation:
  language: es
  text: Y haré que coman[a] la carne de sus hijos y la carne de sus hijas, y cada uno comerá la carne de su prójimo, en el asedio[b] y en la angustia con que sus enemigos y los que buscan su vida los afligirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y les haré comer». El hebreo usa una forma causativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «durante el asedio y en la angustia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַאֲכַלְתִּים
  english_pob_choice: And I will make them eat
  chosen_spanish: Y haré que coman
  alternatives_spanish:
  - Y les haré comer
  - Y les haré que coman
  lexicon: HALOT
  rationale: El hebreo es causativo (Hiphil) y expresa acción directa de Yahvé en juicio. En español, «haré que coman» conserva esa causación sin suavizarla ni convertirla en mera permisión.
- source_word: בְּשַׂר
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne humana
  - la carne
  - la carne de
  lexicon: HALOT
  rationale: «Carne» reproduce el valor literal y el impacto del hebreo. Se evita «comida» o «carne humana» por añadir o explicar más de lo que el texto dice.
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de sus hijos varones
  - de sus hijos
  lexicon: HALOT
  rationale: El hebreo especifica hijos varones. En español, «hijos» puede ser genérico o masculino específico; aquí se mantiene la referencia sin forzar una perífrasis más pesada.
- source_word: בְּנֹתֵיהֶם
  english_pob_choice: their daughters
  chosen_spanish: de sus hijas
  alternatives_spanish:
  - de sus hijas
  lexicon: HALOT
  rationale: Se conserva el paralelo deliberado del hebreo entre hijos e hijas, sin nivelarlo en un término genérico.
- source_word: וְאִישׁ
  english_pob_choice: and each
  chosen_spanish: y cada uno
  alternatives_spanish:
  - y cada hombre
  - y cada persona
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en sentido distributivo. «Cada uno» preserva ese valor sin introducir una marca masculina innecesaria en español.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  - su amigo
  lexicon: HALOT
  rationale: «Prójimo» es el equivalente más natural y bíblicamente reconocible para un miembro cercano de la comunidad. «Vecino» suena demasiado local; «amigo» sería demasiado afectivo.
- source_word: בְּמָצוֹר
  english_pob_choice: in the siege
  chosen_spanish: en el sitio
  alternatives_spanish:
  - durante el sitio
  - en la asediación
  - en el asedio
  lexicon: HALOT
  rationale: מָצוֹר describe la condición de asedio. «Sitio» mantiene la imagen bélica y es natural en español; «asedio» también es posible, pero «sitio» conserva bien el paralelismo con la siguiente expresión.
- source_word: וּבְמָצוֹק
  english_pob_choice: and in the distress
  chosen_spanish: y en la angustia
  alternatives_spanish:
  - y en la aflicción
  - y en la estrechez
  - y en la angustia
  lexicon: HALOT
  rationale: מָצוֹק expresa presión extrema, angustia o estrechez. «Angustia» comunica bien la intensidad y armoniza con la formulación tradicional del pasaje sin perder claridad moderna.
- source_word: אֲשֶׁר יָצִיקוּ לָהֶם
  english_pob_choice: with which their enemies and those who seek their life will afflict them
  chosen_spanish: con que sus enemigos y los que buscan su vida los afligirán
  alternatives_spanish:
  - con que sus enemigos y los que buscan su vida los oprimirán
  - con que sus enemigos y los que buscan matarlos los afligirán
  lexicon: HALOT
  rationale: El relativo hebreo presenta el medio o la circunstancia de la aflicción. «Afligirán» sigue de cerca el inglés POB y mantiene el tono severo; «los que buscan su vida» conserva el modismo bíblico sin explicitarlo de forma interpretativa.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus enemigos
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo con sufijo posesivo.
- source_word: וּמְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: and those who seek their life
  chosen_spanish: y los que buscan su vida
  alternatives_spanish:
  - y los que buscan su alma
  - y los que buscan matarlos
  - y los que buscan su vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí significa «vida», no una noción abstracta de «alma». Se mantiene el modismo hebreo para no perder la tensión léxica y teológica documentada por el POB inglés.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: I will make them eat
  chosen_spanish_reading: haré que coman
  alternative_spanish_readings:
  - les permitiré comer
  - haré que coman
  rationale: 'Se conserva el causativo fuerte del verbo hebreo: Yahvé aparece como el que ejecuta activamente el juicio anunciado. No se suaviza hacia una mera permisión.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Modismo de נֶפֶשׁ como vida
  english_pob_reading: those who seek their life
  chosen_spanish_reading: los que buscan su vida
  alternative_spanish_readings:
  - los que buscan su alma
  - los que buscan matarlos
  rationale: «Vida» comunica el sentido idiomático del hebreo sin imponer una antropología más estrecha ni espiritualizar el término.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el testimonio hebreo masorético y el criterio del POB inglés, que preserva la causación divina, la literalidad de «carne» y el modismo de «buscar la vida»; se ajustó el español para que suene natural sin perder el paralelismo ni la dureza del juicio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en español POB.
  - Se conserva «carne» frente a alternativas suavizadas para retener la fuerza imagética del texto.
  - «Los que buscan su vida» sigue el modismo bíblico y evita reinterpretarlo como simple agresión física explícita.
  - «Sitio» y «angustia» reproducen el binomio de presión militar y aflicción extrema del hebreo.
