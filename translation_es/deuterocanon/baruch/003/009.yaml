translation:
  language: es
  text: ¡Escucha, oh Israel, los mandamientos de vida[a]! Presta oído para conocer la prudencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los mandamientos vivificadores' o 'los mandamientos para la vida'. El griego dice literalmente 'los mandamientos de vida'.
    reason: alternative_reading
  - marker: b
    text: O 'discernimiento' o 'comprensión'.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄκουε
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oye atentamente
  - Escucha, oh
  lexicon: BDAG
  rationale: El imperativo dirigido a Israel pide una exhortación solemne y directa. 'Escucha' conserva el llamado bíblico sin sonar tan arcaico como 'oye' en este contexto, y funciona bien con el vocativo formal introducido por 'oh'.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Nombre propio bíblico estándar
  rationale: Se mantiene el nombre propio transliterado, conforme al uso del proyecto y al texto fuente.
- source_word: ἐντολὰς
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: BDAG
  rationale: '''Mandamientos'' conserva el peso normativo y el tono escritural de ἐντολή, más fiel que opciones más suaves como ''preceptos''.'
- source_word: ζωῆς
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - que dan vida
  - para la vida
  - vivificadores
  lexicon: BDAG
  rationale: Se preserva la construcción compacta del genitivo sin decidir de forma interpretativa entre origen, resultado o cualidad. 'De la vida' deja abierta la tensión semántica que el inglés POB también retuvo.
- source_word: ἐνωτίσασθε
  english_pob_choice: give ear
  chosen_spanish: presta oído
  alternatives_spanish:
  - escucha con atención
  - inclina el oído
  - da oído
  lexicon: LSJ
  rationale: La imagen idiomática de 'dar o prestar oído' refleja mejor el verbo que un simple 'escucha'. 'Presta oído' suena natural en español y mantiene el matiz exhortativo.
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  - a fin de conocer
  - para aprender
  lexicon: BDAG
  rationale: El infinitivo de propósito se vierte naturalmente con 'para conocer'. 'Saber' o 'aprender' estrecharían o desplazarían el matiz verbal del original.
- source_word: φρόνησιν
  english_pob_choice: prudence
  chosen_spanish: la prudencia
  alternatives_spanish:
  - el discernimiento
  - la comprensión
  - la sabiduría práctica
  lexicon: BDAG
  rationale: Se sigue la revisión inglesa que prefirió 'prudence' frente a 'understanding'. 'Prudencia' expresa mejor la dimensión práctica y reflexiva de φρόνησις en español sin reducirla a mero conocimiento intelectual.
theological_decisions:
- issue: Ambigüedad de ἐντολὰς ζωῆς
  english_pob_reading: '''the commandments of life'''
  chosen_spanish_reading: '''los mandamientos de la vida'''
  alternative_spanish_readings:
  - '''los mandamientos vivificadores'''
  - '''los mandamientos para la vida'''
  rationale: Se conserva la ambigüedad del genitivo como en el inglés POB. La forma principal no resuelve si la vida es fuente, resultado o cualidad de los mandamientos, evitando una paráfrasis más interpretativa de lo que el griego exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Tono vocativo solemne en la exhortación
  english_pob_reading: '''Hear, O Israel'''
  chosen_spanish_reading: '''¡Escucha, oh Israel!'''
  alternative_spanish_readings:
  - '''Escucha, Israel'''
  - '''¡Oye, Israel!'''
  rationale: El 'oh' vocativo ayuda a reproducir la solemnidad del llamado directo al pueblo. En español, sin embargo, se conserva 'Escucha' para equilibrar dignidad y naturalidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió el vocativo formal 'O' y cambió 'understanding' por 'prudence'. La versión española refleja ambos ajustes con 'oh' e 'la prudencia', manteniendo además la ambigüedad formal de 'ἐντολὰς ζωῆς'.
  spanish_consistency_notes:
  - Se mantiene 'Israel' como nombre propio transliterado.
  - Se usa 'mandamientos' para ἐντολαὶ, coherente con la elección inglesa y con el registro bíblico.
  - Se evita 'SEÑOR' u otras convenciones de sustitución, ya que el verso no contiene el nombre divino.
  - '''Prudencia'' se prefiere aquí por la revisión auditada; no se traduce como ''sabiduría'' para no ampliar indebidamente φρόνησις.'
  - La puntuación reproduce la cesura del griego con punto y coma entre las dos exhortaciones.
