review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: una súplica continua al κύριος para preservar seguros los bienes depositados por sus dueños. Sin embargo, hay dos desajustes importantes con las directrices del proyecto y con la claridad semántica del pasaje: κύριον debe verterse como «Señor» en español por la política del proyecto, pero además el glosario general exige explicar que יהוה/YHWH se traduce «Yahvé» cuando corresponda; aquí no corresponde porque el término fuente es κύριος, así que «Señor» está bien. El problema real es que el resumen/glosario del propio borrador afirma erróneamente que «Señor» sigue una convención doctrinal del proyecto para κύριος; eso sí coincide con el English POB, no con la regla de Yahvé para el tetragrámaton. Más importante en el texto, «con toda seguridad intacto» suena poco natural y ambiguo en español; el griego μετὰ πάσης ἀσφαλείας modifica la preservación entera, y σῶα se expresa mejor como «a salvo»
    o integrado en el verbo de custodia.'
  spanish_quality_summary: El español es mayormente claro, pero la secuencia «guardara con toda seguridad intacto» es torpe y de lectura dura. «Invocaban» es adecuado; «todopoderoso» es bueno; «lo que había sido confiado» también. «A quienes lo habían encomendado» funciona, aunque «confiado» armoniza mejor con el campo semántico del depósito y evita un leve matiz devocional de «encomendar». Conviene reordenar la frase para que suene natural y conserve la relación entre los dos participios.
  glossary_alignment: Alineación parcial. «Todopoderoso» para παγκρατῆ y «Señor» para κύριον son aceptables en este contexto griego. No hay motivo para usar «Yahvé» porque no aparece el tetragrámaton hebreo sino κύριος. La principal mejora léxica es preferir «confiado» también para τοῖς πεπιστευκόσιν, en vez de «encomendado», para mantener la correspondencia interna del griego de depósito/custodia. Asimismo, «a salvo» encaja mejor que «intacto» en la frase principal.
  issues:
  - severity: medium
    issue: 'Frase española poco natural: «guardara con toda seguridad intacto»'
    rationale: Aunque cada elemento refleja algo del griego, la combinación resulta pesada y ambigua en español. Es mejor expresar el conjunto como «guardara a salvo y con toda seguridad» o similar.
  - severity: medium
    issue: «Encomendado» debilita la cohesión léxica con «lo que había sido confiado»
    rationale: El griego usa participios del mismo verbo/concepto de confiar/depositar. En español, repetir «confiado» aquí preserva mejor la relación semántica de bienes depositados en custodia.
  - severity: low
    issue: La nota léxica sobre σῶα ya no sería necesaria si se adopta una redacción más natural en el texto
    rationale: Si el texto principal usa «a salvo», se elimina la rareza que motivaba la nota sobre «intacto/sin daño».
  revised_spanish_text: Así pues, invocaban al Señor todopoderoso para que guardara a salvo y con toda seguridad lo que había sido confiado a quienes lo habían confiado[a].
  revised_footnotes:
  - marker: a
    text: O «a quienes lo habían depositado»; el griego se refiere a las personas que habían puesto sus bienes en custodia para resguardo.
    reason: lexical_alternative
  revision_rationale: Se suaviza una construcción española dura («con toda seguridad intacto») y se refuerza la coherencia léxica del campo semántico de depósito/custodia usando «confiado» en ambos participios. Se conserva el sentido del English POB y del griego, añadiendo una nota para la alternativa más explícita sobre los depositantes.
