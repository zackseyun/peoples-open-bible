translation:
  language: es
  text: Porque ha abatido a los que habitan en lo alto[a], la ciudad encumbrada; la humilla, la humilla hasta la tierra; la hace bajar hasta el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad exaltada» o «la ciudad puesta en alto». El hebreo no identifica la ciudad por nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del canto anterior. En español, «Porque» conserva bien el valor explicativo sin sonar forzado.
- source_word: הֵשַׁח
  english_pob_choice: has brought down
  chosen_spanish: ha abatido
  alternatives_spanish:
  - ha humillado
  - ha derribado
  lexicon: HALOT
  rationale: El causativo comunica la idea de hacer caer o bajar. «Ha abatido» conserva el golpe poético y la noción de humillación/derribo sin suavizar el efecto.
- source_word: יֹשְׁבֵי מָרוֹם
  english_pob_choice: those who dwell on high
  chosen_spanish: los que habitan en lo alto
  alternatives_spanish:
  - los habitantes de la altura
  - los que moran en las alturas
  lexicon: HALOT
  rationale: Mantiene la imagen espacial y el participio sustantivado, sin identificar de antemano a un poder histórico concreto.
- source_word: קִרְיָה נִשְׂגָּבָה
  english_pob_choice: the lofty city
  chosen_spanish: la ciudad encumbrada
  alternatives_spanish:
  - la ciudad exaltada
  - la ciudad elevada
  lexicon: HALOT
  rationale: «Encumbrada» conserva la idea de altura/exaltación y suena natural en español literario. Mantiene la aposición poética con la frase anterior.
- source_word: יַשְׁפִּילֶנָּה / יַשְׁפִּילָהּ
  english_pob_choice: he lays it low
  chosen_spanish: la humilla
  alternatives_spanish:
  - la abaja
  - la derriba
  lexicon: HALOT
  rationale: El hebreo repite el verbo de abajar para énfasis. «La humilla» conserva el sentido de hacerla baja, con resonancia de juicio y degradación.
- source_word: עַד אֶרֶץ
  english_pob_choice: to the earth
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - hasta el suelo
  - hasta la tierra
  lexicon: HALOT
  rationale: «Eretz» puede ser tierra, suelo o tierra como ámbito. En esta imagen poética, «hasta la tierra» conserva mejor la correspondencia léxica que una paráfrasis demasiado concreta.
- source_word: יַגִּיעֶנָּה
  english_pob_choice: he brings it down
  chosen_spanish: la hace llegar
  alternatives_spanish:
  - la lleva
  - la hace tocar
  lexicon: HALOT
  rationale: El causativo de נגע expresa hacer alcanzar/tocar. «La hace llegar» retiene esa idea causal sin perder la naturalidad del español.
- source_word: עַד עָפָר
  english_pob_choice: to the dust
  chosen_spanish: hasta el polvo
  alternatives_spanish:
  - hasta el polvo de la tierra
  - hasta el polvo
  lexicon: HALOT
  rationale: «Polvo» reproduce la imagen bíblica de abatimiento total y corresponde directamente a עָפָר.
theological_decisions:
- issue: Si la «ciudad encumbrada» debe identificarse con una ciudad histórica específica
  english_pob_reading: Keep the reference generic as 'the lofty city'
  chosen_spanish_reading: Mantener la referencia genérica como «la ciudad encumbrada»
  alternative_spanish_readings:
  - Babilonia
  - la ciudad soberbia
  - cualquier ciudad enemiga exaltada
  rationale: El hebreo no nombra la ciudad. La traducción debe conservar la ambigüedad poética y no resolver interpretativamente lo que el texto no especifica.
  doctrine_reference: Primacía del texto original; mantener la tensión interpretativa sin imponer una identificación histórica.
- issue: Cómo reproducir la repetición verbal enfática del hebreo
  english_pob_reading: he lays it low, he lays it low
  chosen_spanish_reading: la humilla, la humilla
  alternative_spanish_readings:
  - la abaja, la abaja
  - la derriba, la derriba
  rationale: La repetición es parte del énfasis poético y del juicio anunciado. Mantenerla en español conserva la intensidad retórica del original.
  doctrine_reference: Poética bíblica; fidelidad a la repetición enfática del texto fuente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste más reciente del audit trail en inglés, que prefirió una referencia espacial literal para אֶרֶץ. En español se mantuvo esa correspondencia con «hasta la tierra», y se preservó la repetición enfática del verbo para reflejar la estructura poética del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiere; este versículo no lo contiene.
  - «Polvo» se mantuvo para עָפָר por coherencia con el valor bíblico de abatimiento total.
  - No se introdujo un nombre propio para la ciudad, en línea con el audit trail inglés.
  - El tono busca ser bíblico y publicable sin depender de fórmulas tradicionales que oculten el sentido del hebreo.
