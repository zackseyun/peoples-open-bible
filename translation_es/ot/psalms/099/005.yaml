translation:
  language: es
  text: Exalten a Yahvé nuestro Dios, y póstrense ante su escabel[a]; santo es él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de su escabel». La preposición hebrea puede expresar la postura de reverencia de distintas maneras en este contexto de adoración.
    reason: lexical_alternative
  - marker: b
    text: «Su escabel» puede aludir al lugar de entronización de Dios en la tierra, como el arca o el santuario, pero el verso deja la imagen implícita.
    reason: cultural_note
lexical_decisions:
- source_word: רֽוֹמְמ֡וּ
  english_pob_choice: Exalt
  chosen_spanish: Exalten
  alternatives_spanish:
  - Enalten
  - Levanten en alto
  - Exalten en honor a
  lexicon: HALOT
  rationale: El imperativo plural pide una acción de elevar o engrandecer a Dios en adoración. «Exalten» conserva el tono cultual y es natural en español moderno para este registro.
- source_word: יְהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Según la política del proyecto, el Nombre divino se vierte como «Yahvé» en el texto principal, sin máscara reverencial. Mantiene transparencia respecto del hebreo.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: 'La forma constructa con sufijo de primera persona plural expresa posesión/comunidad: «nuestro Dios» conserva la referencia pactal y comunitaria.'
- source_word: וְהִשְׁתַּחֲווּ
  english_pob_choice: and bow down
  chosen_spanish: y póstrense
  alternatives_spanish:
  - y adórenle
  - y inclínense
  - y hagan reverencia
  lexicon: HALOT
  rationale: El verbo implica inclinación/prostración física. En español, «póstrense» retiene mejor la acción corporal que «adoren», que sería más interpretativo.
- source_word: לַהֲדֹם
  english_pob_choice: at his footstool
  chosen_spanish: ante su estrado
  alternatives_spanish:
  - ante su escabel
  - a su estrado
  - ante su pie de apoyo
  lexicon: HALOT
  rationale: «Estrado» comunica el objeto de apoyo o trono asociado al pie de manera digna y comprensible. Se evita «pie de apoyo» por sonar artificial y se conserva la imagen metafórica sin precisar más allá del texto.
- source_word: רַגְלָיו
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona masculina singular queda naturalmente incorporado en «su estrado», manteniendo la referencia sin sobrecargar la frase.
- source_word: קָדוֹשׁ הוּא
  english_pob_choice: he is holy
  chosen_spanish: santo es él
  alternatives_spanish:
  - él es santo
  - él es el Santo
  lexicon: HALOT
  rationale: Se preserva la predicación enfática del hebreo. «Santo es él» mantiene el orden marcado y el tono litúrgico, cercano al original sin caer en arcaismo excesivo.
theological_decisions:
- issue: Sentido de la preposición en «ante su estrado / footstool»
  english_pob_reading: Render literally as 'his footstool' without specifying temple, ark, or Zion in the main text.
  chosen_spanish_reading: Mantener la imagen como «su estrado» sin identificarlo con arca, templo o Sion en el texto principal.
  alternative_spanish_readings:
  - ante su pie de apoyo
  - ante el estrado de su trono
  - ante su escabel (identificado con el arca o el santuario)
  rationale: 'El hebreo deja la imagen implícita. En español conviene conservar esa tensión: el lector ve el símbolo de humillación/reverencia, pero no se fuerza una identificación interpretativa no expresada por el verso.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla implícitamente.
- issue: Traducción del Nombre divino
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige transparencia con יהוה. Esto evita ocultar el Nombre mediante una convención tipográfica y mantiene coherencia con el texto fuente.
  doctrine_reference: Política textual del proyecto sobre el Nombre divino.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail en inglés y no requiere revisiones previas. Se mantiene la imagen de reverencia sin identificar el «estrado» con un referente concreto, y se adopta «Yahvé» conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino en todo el texto.
  - Se conserva el imperativo plural y el paralelismo poético del hebreo.
  - «Póstrense» y «santo es él» sostienen un registro litúrgico moderno, claro y fiel.
  - Se evita introducir «adoren» en el cuerpo principal para no perder la fuerza corporal del verbo hebreo.
