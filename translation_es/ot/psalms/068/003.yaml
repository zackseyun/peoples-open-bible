base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/003.yaml
  text: As smoke is driven away[a], so you drive them away; as wax melts before fire[c][b], so the wicked perish before God.
  footnotes:
  - marker: a
    text: Or 'you scatter it' for 'you drive it away'; the Hebrew verb can denote being driven off, scattered, or blown away.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before fire' and 'from before God,' an idiom meaning because of or in the presence of.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew imperfects may also be understood as future ('will drive away ... will perish') or as wish-like in context.
    reason: alternative_reading
