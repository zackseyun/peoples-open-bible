translation:
  text: With their offspring their good endures faithfully[a], and their inheritance is for their children's children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Their offspring stood in the covenants, and their children because of them.'' The older Masada Hebrew witness also reflects a covenant-focused reading rather than Cairo Geniza''s ''their good ... and their inheritance.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עם
  chosen: with
  alternatives:
  - along with
  - among
  lexicon: HALOT
  rationale: The preposition links the ancestors' continuing good with their descendants. 'With' is the most natural English equivalent and preserves the compact Hebrew construction.
- source_word: זרעם
  chosen: their offspring
  alternatives:
  - their seed
  - their descendants
  lexicon: HALOT
  rationale: Hebrew זרע can mean literal seed or figurative descendants. 'Offspring' is natural modern English and keeps the familial sense without the awkwardness of 'seed.' The Greek σπέρμα confirms a descendant sense.
- source_word: נאמן
  chosen: endures faithfully
  alternatives:
  - is secure
  - remains sure
  - stands firm
  lexicon: HALOT
  rationale: The adjective/participle conveys firmness, reliability, or enduring stability. Because the Hebrew line is terse and somewhat elliptical, rendering it verbally in English communicates the sense that their good remains established. This also fits the Greek parallel's idea of standing/being established, though the Greek reflects a different wording.
- source_word: טובם
  lemma: טוב
  chosen: their good
  alternatives:
  - their prosperity
  - their goodness
  - their welfare
  lexicon: HALOT
  rationale: The noun טוב can denote goodness or well-being/prosperity. In this context of honorable ancestors and enduring legacy, 'their good' preserves the breadth of the Hebrew without over-specifying either moral quality or material prosperity.
- source_word: ונחלתם
  chosen: and their inheritance
  alternatives:
  - and their heritage
  - and their possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inheritance or heritage. 'Inheritance' best preserves the familial and intergenerational sense in parallel with descendants.
- source_word: לבני בניהם
  chosen: for their children's children
  alternatives:
  - to their grandchildren
  - for the sons of their sons
  lexicon: HALOT
  rationale: Literally 'for the sons of their sons.' 'Children's children' is idiomatic English that preserves the multigenerational emphasis without narrowing to males only where the Hebrew idiom functions generically.
