translation:
  language: es
  text: 'Porque mi casa no es así con Dios[a]; sin embargo, él ha hecho conmigo un pacto eterno, ordenado en todo y bien guardado[b]. Porque eso es toda mi salvación y todo mi deseo: ¿acaso no lo hará crecer?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No es así mi casa con Dios?». Muchos entienden el inicio como una pregunta retórica positiva, no como una afirmación negativa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «porque sin duda lo hará brotar / florecer». El final del versículo es difícil en hebreo y puede leerse como pregunta retórica o como afirmación enfática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Aquí introduce la explicación o continuación del dicho, y en español «Porque» conserva bien esa función discursiva sin forzar una causalidad demasiado fuerte.
- source_word: לֹא כֵן
  english_pob_choice: is not so
  chosen_spanish: no es así
  alternatives_spanish:
  - no es de ese modo
  - no es de esa manera
  lexicon: HALOT
  rationale: Mantiene la forma idiomática y la tensión del hebreo sin resolver el sentido con una paráfrasis interpretativa.
- source_word: בֵּיתִי
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa
  - mi familia
  - mi casa real
  lexicon: HALOT
  rationale: «Casa» preserva el término literal y permite en español la misma amplitud entre hogar, linaje y casa dinástica que el hebreo permite en contexto.
- source_word: עִם אֵל
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - ante Dios
  - en relación con Dios
  lexicon: HALOT
  rationale: «Con Dios» reproduce de forma directa la relación expresada por עִם sin añadir interpretación. Se evita convertirlo en una fórmula más explicativa que el hebreo no exige.
- source_word: בְרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - un pacto perpetuo
  - un pacto para siempre
  lexicon: HALOT
  rationale: «Pacto» es el equivalente bíblico natural de בְרִית y «eterno» conserva la fuerza durativa de עוֹלָם de manera clara y digna.
- source_word: שָׂם לִי
  english_pob_choice: he has made with me
  chosen_spanish: ha hecho conmigo
  alternatives_spanish:
  - ha puesto para mí
  - ha establecido para mí
  - ha hecho para mí
  lexicon: HALOT
  rationale: La idea es la de establecer un pacto. En español, «ha hecho conmigo» comunica la acción pactal de manera idiomática y conserva la relación personal del dativo.
- source_word: עֲרוּכָה
  english_pob_choice: ordered
  chosen_spanish: ordenado
  alternatives_spanish:
  - dispuesto
  - arreglado
  - puesto en orden
  lexicon: HALOT
  rationale: «Ordenado» reproduce el valor de algo bien dispuesto o arreglado y funciona naturalmente en la serie descriptiva del pacto.
- source_word: בַּכֹּל
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo sentido
  - en cada aspecto
  - de todas maneras
  lexicon: HALOT
  rationale: La expresión totalizante se conserva con una forma breve y natural en español. «En todo» mantiene la amplitud sin recargar el verso.
- source_word: וּשְׁמֻרָה
  english_pob_choice: kept secure
  chosen_spanish: guardado con seguridad
  alternatives_spanish:
  - preservado
  - custodiado
  - protegido
  lexicon: HALOT
  rationale: El pasivo/resultativo de שמר se refleja con una expresión que conserva la idea de protección y resguardo del pacto, sin perder legibilidad.
- source_word: כָּל יִשְׁעִי
  english_pob_choice: all my salvation
  chosen_spanish: toda mi salvación
  alternatives_spanish:
  - toda mi liberación
  - toda mi salvación y rescate
  lexicon: HALOT
  rationale: «Salvación» es la opción más amplia y teológicamente fiel para יֵשַׁע aquí, y el posesivo pluraliza el énfasis del hebreo sin añadir contenido.
- source_word: וְכָל חֵפֶץ
  english_pob_choice: all my desire
  chosen_spanish: todo mi deseo
  alternatives_spanish:
  - todo mi deleite
  - todo mi anhelo
  - todo lo que deseo
  lexicon: HALOT
  rationale: «Deseo» conserva el paralelismo con «salvación» y evita desplazar el matiz hacia la pura emoción o el placer, que también podrían ser posibles pero menos directos.
- source_word: כִּי לֹא יַצְמִיחַ
  english_pob_choice: will he not indeed make it grow?
  chosen_spanish: ¿no lo hará crecer, en verdad?
  alternatives_spanish:
  - ¿no lo hará brotar, en verdad?
  - ¿no lo hará florecer, en verdad?
  - porque ciertamente lo hará crecer
  lexicon: HALOT
  rationale: Se conserva la dificultad del hebreo con una pregunta retórica y se traduce el causativo de צמח con «hacer crecer», que es natural en español y suficientemente cercano a la imagen vegetal implícita.
theological_decisions:
- issue: Sentido de la cláusula inicial כִּי לֹא כֵן בֵּיתִי עִם אֵל
  english_pob_reading: Rendered straightforwardly as 'For my house is not so with God,' while preserving the alternative positive rhetorical question in a note.
  chosen_spanish_reading: Se traduce de manera directa como «Porque mi casa no es así con Dios», sin suavizar la dificultad.
  alternative_spanish_readings:
  - ¿No es así mi casa con Dios?
  - Ciertamente mi casa es así con Dios
  rationale: El hebreo es discutido, pero el texto consonántico y la puntuación tradicional sostienen una lectura negativa. La traducción principal preserva esa tensión; la alternativa positiva se mantiene en nota para no perder una interpretación antigua y extendida.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Interpretación del final יַצְמִיחַ
  english_pob_reading: Understood as God causing David's salvation/desire, embodied in the covenant, to grow or come to fruition.
  chosen_spanish_reading: 'Se entiende como una pregunta retórica: Dios hará crecer lo que el pacto promete, es decir, la salvación y el deseo de David.'
  alternative_spanish_readings:
  - Dios no lo hará crecer
  - ciertamente lo hará brotar
  - hará florecer todo esto
  rationale: El hebreo final es compacto y difícil. La forma interrogativa permite conservar la fuerza retórica positiva que encaja con el pacto eterno, sin eliminar la ambigüedad del objeto implícito.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincido con el estado de revisión más reciente: no hay cambios aplicados y el pasaje se mantiene en alta concordancia con el audit trail inglés.'
  spanish_consistency_notes:
  - Se conserva «Dios» para אֵל en coherencia con la convención del proyecto.
  - Se usa «pacto» para בְרִית y no «alianza» para respetar la terminología bíblica y pactal habitual del POB.
  - Se mantiene «salvación» para יִשְׁעִי como término amplio y teológicamente estable.
  - Se evita sustituir la dificultad hebrea por una armonización interpretativa en el texto principal.
  - Las notas usan marcadores únicos y aparecen ancladas donde corresponde en el texto principal.
