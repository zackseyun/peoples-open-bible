translation:
  language: es
  text: Pero cuando entró en Judea y se acercó a Bet-sur, un lugar fortificado, a unos cinco esquenos[a] de Jerusalén, lo estaba presionando con fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva la medida antigua “esquenos” en vez de convertirla a una equivalencia moderna, porque su valor exacto variaba y una cifra precisa sería engañosa.
    reason: cultural_note
  - marker: b
    text: 'O: “lo estaba sitiando”. El griego dice literalmente “lo estaba presionando”, una expresión que puede describir presión militar sobre una plaza fortificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν δὲ εἰς τὴν Ἰουδαίαν
  english_pob_choice: when he entered Judea
  chosen_spanish: cuando entró en Judea
  alternatives_spanish:
  - después de entrar en Judea
  - habiendo entrado en Judea
  lexicon: LSJ
  rationale: El participio aoristo se entiende mejor en español como una acción temporal de entrada dentro del hilo narrativo. 'Judea' conserva el nombre geográfico sin añadir matices no presentes en el griego.
- source_word: συνεγγίσας Βεθσουρῶν
  english_pob_choice: came near Bethsura
  chosen_spanish: se acercó a Bet-sur
  alternatives_spanish:
  - llegó cerca de Bet-sur
  - se aproximó a Bet-sur
  lexicon: LSJ
  rationale: συνεγγίζω expresa cercanía o aproximación. 'Se acercó' reproduce bien ese valor. 'Bet-sur' es una transliteración castellana natural de Βεθσουρῶν y mantiene la referencia toponímica.
- source_word: ὄντι μὲν ἐρυμνῷ χωρίῳ
  english_pob_choice: a fortified place
  chosen_spanish: un lugar fortificado
  alternatives_spanish:
  - una plaza fortificada
  - un sitio fortificado
  - un fuerte
  lexicon: LSJ
  rationale: ἐρυμνός comunica fortaleza o defensa; χωρίον aquí designa un lugar o sitio. 'Lugar fortificado' conserva ambos elementos sin forzar una terminología militar más técnica que la del griego.
- source_word: Ἱεροσολύμων δὲ ἀπέχοντι ὡσεὶ σχοίνους πέντε
  english_pob_choice: about five schoeni from Jerusalem
  chosen_spanish: a unos cinco esquenos de Jerusalén
  alternatives_spanish:
  - a unos cinco schoenoi de Jerusalén
  - a unos treinta kilómetros de Jerusalén
  lexicon: LSJ
  rationale: σχοῖνος es una medida antigua de distancia cuyo equivalente moderno varía. Se mantiene el término transliterado 'esquenos' para evitar una precisión falsa y respetar la decisión auditada de retener la unidad.
- source_word: τοῦτο ἔθλιβε
  english_pob_choice: he was pressing it hard
  chosen_spanish: lo estaba presionando con fuerza
  alternatives_spanish:
  - lo estaba acosando
  - lo estaba sitiando
  - lo estaba oprimiendo
  lexicon: LSJ
  rationale: θλίβω significa literalmente presionar, apretar u oprimir. En este contexto militar, 'lo estaba presionando con fuerza' conserva la imagen verbal sin convertirla de forma automática en el tecnicismo 'sitiando'.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: la traducción mantiene la medida antigua con nota y conserva el matiz de θλίβω como presión militar, no como un tecnicismo más fuerte que el griego exige.'
  spanish_consistency_notes:
  - Se usa 'Bet-sur' para el topónimo de forma consistente con una transliteración castellana sobria y legible.
  - Se mantiene 'esquenos' como unidad antigua, conforme al principio de no falsear precisión.
  - '''Lugar fortificado'' equilibra fidelidad léxica y naturalidad en español.'
  - '''Presionando con fuerza'' preserva la ambigüedad entre presión y asedio sin imponer una lectura exclusiva.'
