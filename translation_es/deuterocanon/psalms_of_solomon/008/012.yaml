translation:
  language: es
  text: Las cosas santas[a] de Dios eran saqueadas, como si no hubiera heredero que las redimiera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Las cosas santas» puede entenderse también como «las cosas sagradas» o, menos probablemente aquí, «el santuario».
    reason: lexical_alternative
  - marker: b
    text: 'O: «como si no hubiera heredero redimiéndolas»; el participio griego puede reflejarse más directamente.'
    reason: alternative_reading
lexical_decisions:
- source_word: τὰ ἅγια
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - el santuario
  lexicon: BDAG
  rationale: 'El plural neutro admite un sentido concreto y amplio: bienes u objetos consagrados a Dios. «Las cosas santas» conserva esa amplitud sin forzar el sentido espacial de «el santuario».'
- source_word: διηρπάζοντο
  english_pob_choice: were being plundered
  chosen_spanish: eran despojadas
  alternatives_spanish:
  - eran saqueadas
  - eran pilladas
  lexicon: LSJ
  rationale: El imperfecto pasivo expresa una acción continua de expolio. «Eran despojadas» transmite la violencia y el carácter de abuso sacrílego con un español natural y solemne.
- source_word: ὡς μὴ ὄντος
  english_pob_choice: as though there were no
  chosen_spanish: como si no hubiera
  alternatives_spanish:
  - como si no existiera
  - como si no hubiese
  lexicon: BDAG
  rationale: La comparación introduce una situación fingida o aparente. «Como si no hubiera» reproduce bien el giro idiomático y es idiomático en español.
- source_word: κληρονόμου
  english_pob_choice: heir
  chosen_spanish: heredero
  alternatives_spanish:
  - sucesor
  - inherente
  lexicon: BDAG
  rationale: «Heredero» es el equivalente directo y transparente en español para el sustantivo, sin añadir interpretaciones que el griego no expresa explícitamente.
- source_word: λυτρουμένου
  english_pob_choice: to redeem them
  chosen_spanish: que las redimiera
  alternatives_spanish:
  - que las redimiese
  - que las rescatara
  - que las reclamara
  lexicon: BDAG
  rationale: 'El participio presenta una función redentora ligada al heredero. En español, una subordinada de relativo con subjuntivo imperfecto expresa con naturalidad esa relación: «heredero que las redimiera».'
theological_decisions:
- issue: Relación entre «heredero» y la acción de redimir
  english_pob_reading: The heir is understood as one who would redeem them; the English keeps 'heir' explicit and renders the participle in a way that preserves the redemptive force.
  chosen_spanish_reading: Se mantiene explícito «heredero» y se une con una relativa verbal «que las redimiera», sin convertirlo en un título distinto ni borrar la fuerza de rescate.
  alternative_spanish_readings:
  - como si no hubiera un redentor que las reclamara
  - como si no hubiera heredero redentor
  rationale: El griego nombra un «heredero» y luego un participio de redención. La traducción debe conservar esa tensión entre categoría jurídica y función liberadora, sin resolverla demasiado pronto.
  doctrine_reference: BDAG; lectura auditada del POB en inglés
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta versión sigue de cerca el texto griego y el andamiaje auditado del POB en inglés, manteniendo la ambigüedad lexical relevante sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ según la norma del proyecto.
  - Se mantiene «redimiera» para preservar la fuerza de λυτρόομαι sin sustituirla por un mero 'rescatar'.
  - Se evita «SEÑOR» porque el texto griego aquí no contiene κύριος ni un equivalente directo del nombre divino.
