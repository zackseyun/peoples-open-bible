review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: rango secundario respecto de Darío, causa expresada por διά, y título/denominación de parentesco. Sin embargo, «junto a Darío» en el texto principal y en la nota [a] desplaza el sentido de δεύτερος + genitivo desde rango relativo (''segundo a/después de Darío'') hacia mera proximidad espacial. Eso debilita una decisión léxica central del original y del rastro inglés.'
  spanish_quality_summary: El español es claro y digno, pero «en segundo lugar junto a Darío» suena algo redundante y ambiguo. Una formulación como «será sentado segundo después de Darío» o «ocupará el segundo lugar después de Darío» comunica mejor el rango cortesano. «Pariente de Darío» es natural y legible.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. «Pariente» para συγγενής está bien justificado en español. El ajuste necesario afecta la representación de δεύτερος/καθιεῖται, no la terminología teológica del proyecto.
  issues:
  - severity: high
    issue: «junto a Darío» introduce una idea espacial no presente como sentido principal del griego.
    rationale: 'El griego δεύτερος Δαρείου expresa rango relativo: segundo respecto de Darío. La traducción actual puede entenderse como sentado al lado de Darío, no como segundo en jerarquía.'
  - severity: medium
    issue: La nota [a] repite y refuerza la misma desviación semántica.
    rationale: La alternativa «se sentará junto a Darío» no preserva la opción auditada en inglés ('sit second to Darius') y por tanto no sirve como alternativa fiel.
  - severity: low
    issue: «se sentará» por sí solo puede sonar más voluntario que investidura/instalación.
    rationale: Aunque es defendible, el inglés auditado quiso conservar la imagen de ser sentado/instalado en rango. En español puede mejorarse con «será sentado» o con una construcción que mantenga el matiz cortesano.
  revised_spanish_text: Y será sentado segundo después de Darío[a], a causa de su sabiduría, y será llamado pariente de Darío[b].
  revised_footnotes:
  - marker: a
    text: 'O: «se sentará segundo después de Darío». El verbo griego puede indicar sentarse o ser instalado en un puesto de rango.'
    reason: lexical_alternative
  - marker: b
    text: «Pariente» puede referirse a un verdadero familiar o a un título honorífico de cercanía y favor cortesano.
    reason: lexical_alternative
  revision_rationale: Se corrige el núcleo semántico de δεύτερος Δαρείου para expresar rango relativo («segundo después de Darío») en vez de proximidad espacial («junto a Darío»). También se ajusta la nota [a] para que preserve la alternativa documentada en el POB inglés. Se mantiene «pariente» para συγγενής, que es natural y fiel en español.
