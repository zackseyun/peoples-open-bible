    rationale: El expediente inglés documenta esa alternativa para יְפָרֵדוּ ('go apart / consort'), no para תִזְנֶינָה. Tal como está, la nota altera el sentido léxico y confunde dos verbos hebreos distintos.
  - severity: medium
    issue: La redacción 'se hunde' para יִלָּבֵט no armoniza del todo con la nota [c].
    rationale: La nota habla de 'ser derribado', 'ser confundido' o 'caer en ruina'. 'Se hunde' es posible como imagen de colapso, pero 'cae en ruina' o 'llega a la ruina' refleja mejor la justificación léxica ya documentada.
