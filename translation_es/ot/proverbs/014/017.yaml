translation:
  language: es
  text: El hombre de mal genio[a] comete insensatez, y el hombre de maquinaciones[b] es odiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de genio corto' o 'pronto para enojarse'.
    reason: lexical_alternative
  - marker: b
    text: O 'un hombre de planes'; el hebreo 'planes/maquinaciones' puede tener un sentido negativo en la literatura sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְצַר אַפַּיִם
  english_pob_choice: short-tempered
  chosen_spanish: de corto ánimo
  alternatives_spanish:
  - irritable
  - apresurado para enojarse
  - de pronto enojo
  lexicon: HALOT
  rationale: La imagen hebrea de "corto de narices" funciona como modismo para enojo rápido. "De corto ánimo" conserva la idea idiomática sin volverla demasiado explicativa; es natural en español bíblico contemporáneo.
- source_word: יַעֲשֶׂה
  english_pob_choice: acts
  chosen_spanish: comete
  alternatives_spanish:
  - hace
  - obra
  - actúa
  lexicon: HALOT
  rationale: En esta construcción sapiencial, el verbo apunta a realizar una acción reprobable. "Comete" transmite con claridad el carácter de culpa que el contexto da a la "insensatez".
- source_word: אִוֶּלֶת
  english_pob_choice: foolishness
  chosen_spanish: insensatez
  alternatives_spanish:
  - necedad
  - locura
  - foolishness
  lexicon: HALOT
  rationale: '"Insensatez" preserva el sustantivo abstracto del hebreo y evita adverbializar en exceso el sentido. En español mantiene fuerza sapiencial y se adapta bien al objeto de "comete".'
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y proverbial; "un hombre" conserva la forma tipológica del dicho sin neutralizar indebidamente el rasgo gramatical.
- source_word: מְזִמּוֹת
  english_pob_choice: schemes
  chosen_spanish: maquinaciones
  alternatives_spanish:
  - planes
  - intrigas
  - designios
  lexicon: HALOT
  rationale: '"Maquinaciones" mantiene la posible carga negativa que el inglés POB documenta para el hebreo en literatura sapiencial, sin fijar explícitamente "malas" donde el texto no lo añade.'
- source_word: יִשָּׂנֵא
  english_pob_choice: is hated
  chosen_spanish: es aborrecido
  alternatives_spanish:
  - es odiado
  - será aborrecido
  - es detestado
  lexicon: HALOT
  rationale: El pasivo niphal se traduce de manera directa con un pasivo en español. "Es aborrecido" conserva la fuerza del rechazo sin sonar más débil que "es odiado".
translation_notes:
  revision_awareness: La validación anterior falló porque los marcadores de nota no estaban anclados en el texto. Para esta entrega se eliminan notas no ancladas y se ajusta el verso a una sola línea publicable sin ambigüedad de marcadores.
  spanish_consistency_notes:
  - Se mantiene un registro sapiencial sobrio y contemporáneo.
  - Se evita introducir explicaciones interpretativas que no estén exigidas por el hebreo.
  - Se conserva el paralelismo con dos hemistiquios coordinados.
