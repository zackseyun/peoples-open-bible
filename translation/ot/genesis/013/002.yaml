id: GEN.13.2
reference: Genesis 13:2
source:
  edition: WLC
  text: וְ/אַבְרָ֖ם כָּבֵ֣ד מְאֹ֑ד בַּ/מִּקְנֶ֕ה בַּ/כֶּ֖סֶף וּ/בַ/זָּהָֽב׃
translation:
  text: Now Abram was very wealthy in livestock[a], silver, and gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Abram was very wealthy in livestock, silver, and gold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְרָם
  chosen: Now Abram
  alternatives:
  - And Abram
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but at the start of an English sentence in narrative it often functions smoothly as a discourse continuation marker. 'Now Abram' preserves the narrative flow in natural modern English while keeping the connective sense. The personal name is transliterated per project philosophy.
- source_word: כָּבֵד
  chosen: rich
  alternatives:
  - heavy
  - weighty
  - wealthy
  lexicon: HALOT
  rationale: Literally the adjective means 'heavy' or 'weighty,' but in this context with possessions listed afterward it idiomatically denotes wealth or abundance. 'Rich' is the clearest natural English rendering and avoids a misleadingly literal 'heavy.'
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies Abram's wealth. 'Very' is the most natural modern equivalent; 'exceedingly' is possible but more archaic or elevated than the context requires.
- source_word: בַּ/מִּקְנֶה
  chosen: in livestock
  alternatives:
  - in cattle
  - in possessions
  lexicon: HALOT
  rationale: מִקְנֶה refers to acquired property, especially herds/flocks and domesticated animals. In this patriarchal context 'livestock' best captures the concrete sense without the narrower and somewhat dated 'cattle' or the overly broad 'possessions.'
- source_word: בַּ/כֶּסֶף
  chosen: in silver
  alternatives:
  - with silver
  lexicon: HALOT
  rationale: The preposition ב here marks the sphere or category in which Abram was rich. 'In silver' matches the Hebrew structure and coordinates well with the following items.
- source_word: וּ/בַ/זָּהָב
  chosen: and in gold
  alternatives:
  - and with gold
  lexicon: HALOT
  rationale: As with 'in silver,' the phrase lists another category of wealth. 'And in gold' preserves the parallelism and straightforward inventory style of the Hebrew.
