    reason: cultural_note
  - marker: c
    text: O «el tiempo de mi visitación sobre él».
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula final para reflejar explícitamente el sujeto divino de פְּקַדְתִּיו («lo castigo»), en línea con el hebreo y con el POB inglés. También se elimina una nota no sustentada por el rastro auditado y se reordena «he traído sobre él la calamidad de Esaú» para un español más natural sin perder fidelidad.
