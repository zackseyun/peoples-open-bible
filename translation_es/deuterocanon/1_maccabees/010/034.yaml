translation:
  language: es
  text: Y que todas las fiestas, los sábados, las lunas nuevas y los días señalados, y los tres días antes de una fiesta y los tres días después de una fiesta, sean días de exención de tributo y de remisión[a] para todos los judíos que están en todo mi reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación» o «perdón»; el término griego puede denotar liberación de obligaciones, y aquí probablemente se refiere a un alivio administrativo concedido en esos días.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑορταὶ
  english_pob_choice: festivals
  chosen_spanish: fiestas
  alternatives_spanish:
  - festivales
  - fiestas solemnes
  lexicon: LSJ
  rationale: ἑορτή designa celebraciones festivas; «fiestas» es natural en español y conserva el carácter calendárico-culto del listado sin endurecerlo con un tecnicismo innecesario.
- source_word: σάββατα
  english_pob_choice: Sabbaths
  chosen_spanish: sábados
  alternatives_spanish:
  - sábados sagrados
  - sábados
  lexicon: LSJ
  rationale: En plural, el término remite a los sábados o días de reposo judíos. «Sábados» mantiene la referencia calendárica de forma clara en español, como equivalente funcional del plural griego.
- source_word: νουμηνίαι
  english_pob_choice: new moons
  chosen_spanish: lunas nuevas
  alternatives_spanish:
  - lunas nuevas
  - celebraciones de luna nueva
  lexicon: LSJ
  rationale: El término apunta a observancias de luna nueva. «Lunas nuevas» es una traducción breve y comprensible en español, conservando el valor calendárico y ritual.
- source_word: ἡμέραι ἀποδεδειγμέναι
  english_pob_choice: appointed days
  chosen_spanish: días señalados
  alternatives_spanish:
  - días designados
  - días fijados
  lexicon: LSJ
  rationale: El participio expresa días establecidos o designados. «Días señalados» comunica bien la idea de días oficialmente determinados sin sonar rígidamente administrativo.
- source_word: ἔστωσαν
  english_pob_choice: let ... be
  chosen_spanish: sean
  alternatives_spanish:
  - que sean
  - queden
  lexicon: LSJ
  rationale: La forma imperativa de decreto se puede reproducir en español con un subjuntivo exhortativo. «Sean» mantiene la solemnidad legal y la fluidez en español.
- source_word: ἀτελείας
  english_pob_choice: tax exemption
  chosen_spanish: exención de tributo
  alternatives_spanish:
  - exención de impuestos
  - libre de tributo
  lexicon: LSJ
  rationale: ἀτέλεια se refiere a exención de cargas fiscales o tributarias. «Exención de tributo» conserva el tono antiguo-administrativo y evita modernizar indebidamente el régimen fiscal.
- source_word: ἀφέσεως
  english_pob_choice: release
  chosen_spanish: liberación
  alternatives_spanish:
  - remisión
  - liberación de obligaciones
  lexicon: LSJ
  rationale: En este contexto civil, ἀφεσις expresa alivio o liberación de cargas, no perdón de pecados. «Liberación» mantiene el valor amplio de exención/descargo administrativo señalado por el POB inglés.
- source_word: πᾶσι τοῖς Ἰουδαίοις
  english_pob_choice: for all the Jews
  chosen_spanish: para todos los judíos
  alternatives_spanish:
  - para todos los judíos
  - a todos los judíos
  lexicon: LSJ
  rationale: El dativo marca a los beneficiarios del decreto. «Para todos los judíos» es natural en español y preserva la universalidad del privilegio.
- source_word: τοῖς οὖσιν ἐν πάσῃ τῇ βασιλείᾳ μου
  english_pob_choice: who are in all my kingdom
  chosen_spanish: que están en todo mi reino
  alternatives_spanish:
  - que se encuentran en todo mi reino
  - que viven en todo mi reino
  lexicon: LSJ
  rationale: La frase identifica a los judíos ubicados en el territorio real. «Que están en todo mi reino» sigue de cerca el griego y suena idiomático en español.
theological_decisions:
- issue: Sentido de ἀφέσεως en un decreto real
  english_pob_reading: release
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - remisión
  - perdón
  rationale: El pasaje trata de privilegios administrativos concedidos en días sagrados, no de perdón de pecados. Por eso se evita un lenguaje explícitamente soteriológico y se usa un término civil amplio.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source-context meaning'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y la decisión auditada del POB inglés: mantiene la serie calendárica, conserva el matiz administrativo de ἀτέλεια/ἄφεσις y evita convertir la cláusula en lenguaje teológico de perdón. No se detectan revisiones previas aplicadas en el paquete inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto la exija; este versículo no contiene el nombre divino.
  - Se conserva la distinción entre exención tributaria y liberación administrativa, sin fusionar ambas nociones.
  - «Fiestas», «sábados» y «lunas nuevas» reflejan una lista ritual-calendárica, no una generalización devocional.
