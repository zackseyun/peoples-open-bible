theological_decisions:
- issue: Gendered expression in πᾶς ἀνὴρ Ἰσραήλ
  chosen_reading: every man of Israel
  alternative_readings:
  - every Israelite
  - all the men of Israel
  rationale: The source uses ἀνήρ, not a generic people-term. Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing, especially where the Greek form is explicit. The distributive singular is also preserved.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Idiomatic force of τὰς ψυχὰς αὐτῶν
  chosen_reading: their souls
  alternative_readings:
  - themselves
  rationale: The text does not merely say that they humbled themselves in a generic sense; it uses ψυχή-language. Retaining 'souls' preserves the text's spiritual and anthropological wording without importing later doctrinal claims.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
