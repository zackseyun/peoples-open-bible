translation:
  language: es
  text: 'Ahora el hombre conoció a Eva, su esposa; ella concibió y dio a luz a Caín[a], y dijo: «He adquirido un hombre con Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Caín suena al verbo hebreo para «adquirir» (qaniti). La relación sonora no puede reproducirse plenamente en español, por lo que se explica en nota.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «He adquirido un hombre con Yahvé». La frase también puede entenderse como «de Yahvé» o, menos probablemente, «He adquirido un hombre: Yahvé». El texto principal la toma como reconocimiento de la participación de Yahvé en el nacimiento de Caín.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָאָדָם
  english_pob_choice: Now the man
  chosen_spanish: Ahora el hombre
  alternatives_spanish:
  - Y el hombre
  - El hombre
  lexicon: HALOT
  rationale: אָדָם aquí se refiere al varón ya introducido, no a la humanidad en general. En español, «Ahora» funciona como marcador discursivo natural en narrativa, equivalente al valor de transición de «Now» sin añadir contenido ajeno.
- source_word: יָדַע
  english_pob_choice: knew
  chosen_spanish: conoció
  alternatives_spanish:
  - tuvo relaciones con
  - se unió a
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. «Conoció» conserva el giro idiomático y permite mantener un registro sobrio; «tuvo relaciones con» explicita más de lo que el texto dice y suaviza menos la forma original.
- source_word: אֶת חַוָּה אִשְׁתּוֹ
  english_pob_choice: Eve his wife
  chosen_spanish: a Eva, su esposa
  alternatives_spanish:
  - a Eva, su mujer
  - a Eva, su esposa
  lexicon: HALOT
  rationale: Se conserva la relación posesiva y el nombre propio. El orden español más natural requiere «a Eva, su esposa»; la coma refleja la aposición implícita del hebreo.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: HALOT
  rationale: Es el equivalente narrativo estándar de הָרָה en relatos de nacimiento. «Concibió» es sobrio, preciso y acorde con el estilo bíblico.
- source_word: וַתֵּלֶד אֶת קַיִן
  english_pob_choice: and bore Cain
  chosen_spanish: dio a luz a Caín
  alternatives_spanish:
  - parió a Caín
  - engendró a Caín
  lexicon: HALOT
  rationale: «Dar a luz» es el paralelo natural de «bore» en español moderno y mantiene el registro narrativo. Se conserva el nombre propio Caín sin adaptar el juego de palabras en el cuerpo principal.
- source_word: קָנִיתִי
  english_pob_choice: I have acquired
  chosen_spanish: He adquirido
  alternatives_spanish:
  - He obtenido
  - He conseguido
  lexicon: HALOT
  rationale: La raíz קנה se refleja con «adquirir», que conserva la conexión léxica con Caín mejor que «obtener» o «conseguir». El perfecto español transmite bien el valor culminativo del hebreo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hombre». Aunque el referente es un recién nacido, la traducción debe preservar la palabra empleada por el texto; «un hijo» borraría esa tensión léxica.
- source_word: אֶת יְהוָה
  english_pob_choice: with Yahweh
  chosen_spanish: con Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahvé
  - con la ayuda de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la decisión POB de rendir el Tetragrámaton como «Yahvé». La preposición «con» sigue la lectura de acompañamiento/asociación adoptada en el audit trail, sin expandirla a «la ayuda de», que fue retirada en la revisión por ir más allá del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La forma española normalizada del nombre divino en este proyecto es «Yahvé», transliteración del Tetragrámaton, en lugar de la sustitución por un título.
theological_decisions:
- issue: Sentido de אֶת יְהוָה en la declaración de Eva
  english_pob_reading: with Yahweh / with the help of the LORD
  chosen_spanish_reading: con Yahvé
  alternative_spanish_readings:
  - de Yahvé
  - de parte de Yahvé
  - con la ayuda de Yahvé
  - Yahvé
  rationale: La construcción es ambigua. La redacción española conserva la ambigüedad sin imponer una glosa interpretativa más amplia. «Con Yahvé» refleja la lectura de acompañamiento aceptada en el audit trail, mientras que el uso de «con la ayuda de Yahvé» se evita porque la revisión inglesa la retiró por exceder el hebreo inmediato.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa fue revisada para eliminar «the help of» y dejar solo la relación más directa «with Yahweh». La redacción española sigue esa revisión y evita toda expansión interpretativa adicional, manteniendo la ambigüedad razonable del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el tono narrativo sobrio con verbos en pretérito perfecto simple/pretérito perfecto compuesto según naturalidad del español bíblico.
  - Se mantiene la distinción entre «hombre» y «esposa» para no suavizar la tensión léxica de אִישׁ y אִשְׁתּוֹ.
