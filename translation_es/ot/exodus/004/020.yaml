translation:
  language: es
  text: Entonces Moisés tomó a su esposa y a sus hijos[a], los montó sobre el asno y volvió a la tierra de Egipto. Y Moisés tomó la vara[b] de Dios en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo que montaran sobre el asno».
    reason: lexical_alternative
  - marker: b
    text: O «el bastón de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then Moses took
  chosen_spanish: Entonces Moisés tomó
  alternatives_spanish:
  - Y Moisés tomó
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» da fluidez narrativa en español y conserva la secuencia temporal, mientras «tomó» refleja el sentido básico de לקח.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina singular se vierte de forma directa. «Esposa» es claro y digno en español contemporáneo; «mujer» sería posible pero menos específico aquí.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus muchachos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos/varones», en español «hijos» comunica naturalmente el plural masculino dependiente del contexto familiar. Mantiene el referente sin sonar forzado; se evita «niños» porque no está exigido por el texto.
- source_word: וַיַּרְכִּבֵם
  english_pob_choice: set them on
  chosen_spanish: los montó sobre
  alternatives_spanish:
  - hizo que montaran
  - los hizo montar sobre
  lexicon: HALOT
  rationale: El hiphil de רכב es causativo («hacer montar / montar sobre»). En español, «los montó sobre» conserva la acción causal de manera natural. Se mantiene abierta la alternativa «hacer montar» que el inglés POB documentó como matiz posible.
- source_word: הַחֲמֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el mulo
  lexicon: HALOT
  rationale: Para este animal, «asno» es tradicional y plenamente inteligible en español bíblico; corresponde al artículo definido del hebreo. «Burro» es más coloquial y «mulo» no corresponde.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  lexicon: HALOT
  rationale: שוב en este contexto expresa retorno. «Volvió» es natural en español narrativo y preserva el movimiento de regreso.
- source_word: אַרְצָה מִצְרָיִם
  english_pob_choice: to the land of Egypt
  chosen_spanish: a la tierra de Egipto
  alternatives_spanish:
  - a Egipto
  - hacia Egipto
  lexicon: HALOT
  rationale: El sufijo direccional en אֶרֶץ justifica reproducir «a la tierra de Egipto» para conservar la imagen de territorio/destino. «Egipto» a secas perdería parte de la formulación hebrea.
- source_word: מַטֵּה הָאֱלֹהִים
  english_pob_choice: the staff of God
  chosen_spanish: la vara de Dios
  alternatives_spanish:
  - el bastón de Dios
  - el cetro de Dios
  lexicon: HALOT
  rationale: מַטֶּה puede ser «vara» o «bastón». Se eligió «vara» porque en español bíblico comunica bien un objeto portátil y distintivo ligado a señales; conserva el tono concreto sin introducir una imagen más litúrgica que la del hebreo. «Bastón» también es posible, pero aquí «vara» queda más cercana al uso narrativo.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con su mano
  lexicon: HALOT
  rationale: La preposición בְ con יד conserva la imagen concreta de posesión/carrying. «En su mano» es la correspondencia directa y natural en español.
theological_decisions:
- issue: Renderización de הָאֱלֹהִים en מַטֵּה הָאֱלֹהִים
  english_pob_reading: the staff of God
  chosen_spanish_reading: la vara de Dios
  alternative_spanish_readings:
  - la vara divina
  - la vara de Dios mismo
  rationale: Aquí אֱלֹהִים se refiere de forma simple y directa a Dios, no a un atributo abstracto. «De Dios» conserva la relación genitiva sin diluirla en una paráfrasis. Se evita «divina» porque suaviza la referencia personal explícita del hebreo.
  doctrine_reference: Éxodo 4:17, 4:20; el objeto está asociado con la comisión y autoridad de Yahvé.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el audit trail inglés: mantiene la secuencia narrativa, conserva la alternativa causativa de וַיַּרְכִּבֵם en nota, y refleja la elección léxica de מַטֵּה como un objeto concreto de autoridad. No se requieren revisiones respecto del sentido base del pasaje.'
  spanish_consistency_notes:
  - Se usó «Moisés» como forma estándar del nombre propio.
  - Se prefirió «asno» por registro bíblico claro y neutral; no se introdujo un término más coloquial.
  - «Tierra de Egipto» conserva el valor direccional de la construcción hebrea.
  - La alternancia entre «vara» y «bastón» se dejó abierta, pero el texto principal adoptó la opción más natural en español bíblico moderno.
