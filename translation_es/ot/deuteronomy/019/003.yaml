translation:
  language: es
  text: Prepararás el camino para ti, y dividirás en tres partes el territorio de tu tierra que Yahvé tu Dios te está dando como herencia[a], para que todo homicida[b] pueda huir allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y será para huir allí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el que ha matado»; el término hebreo aquí es más amplio que «asesino» en este contexto de ciudades de refugio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּכִין
  english_pob_choice: you shall prepare
  chosen_spanish: prepara
  alternatives_spanish:
  - has de preparar
  - deberás preparar
  - pondrás en orden
  lexicon: HALOT
  rationale: El hiphil de כון aquí expresa hacer algo listo o dispuesto. En español, el imperativo/valor exhortativo 'prepara' comunica con naturalidad la instrucción práctica sobre el acceso a las ciudades de refugio, sin añadir más contenido del que da el hebreo.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the road
  chosen_spanish: el camino
  alternatives_spanish:
  - la ruta
  - la vía
  - el sendero
  lexicon: HALOT
  rationale: El hebreo puede significar camino, ruta o sendero. Aunque el inglés POB optó por 'road' para concretar el trayecto, en español 'camino' resulta más natural y mantiene el sentido de una vía de acceso preparada para huir, sin forzar una imagen demasiado moderna.
- source_word: וְשִׁלַּשְׁתָּ
  english_pob_choice: you shall divide into three parts
  chosen_spanish: divide en tres partes
  alternatives_spanish:
  - harás tripartito
  - dividirás en tres
  - partirás en tres
  lexicon: HALOT
  rationale: El verbo en piel de שלש indica una división tripartita. La frase 'divide en tres partes' expresa de modo directo y preciso la acción requerida en el contexto de la distribución del territorio para facilitar el refugio.
- source_word: גְּבוּל אַרְצְךָ
  english_pob_choice: the territory of your land
  chosen_spanish: el territorio de tu tierra
  alternatives_spanish:
  - el límite de tu tierra
  - la frontera de tu tierra
  - la región de tu tierra
  lexicon: HALOT
  rationale: גְּבוּל puede referirse a frontera o límite, pero aquí el contexto pide una división espacial amplia para el acceso a las ciudades de refugio. 'Territorio' conserva esa amplitud; 'tierra' mantiene el vínculo con la heredad del pacto.
- source_word: יַנְחִילְךָ
  english_pob_choice: is giving you as an inheritance
  chosen_spanish: te está dando como herencia
  alternatives_spanish:
  - te da en herencia
  - te está haciendo heredar
  - te está asignando como heredad
  lexicon: HALOT
  rationale: El hiphil de נחל expresa dar como heredad o hacer heredar. En español, 'te está dando como herencia' preserva tanto el acto divino de donación como el valor de heredad, con una fluidez que evita una fórmula demasiado pesada.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God / Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - el SEÑOR tu Dios
  - Yahvé, tu Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino revelado en el texto hebreo como 'Yahvé', en línea con el criterio del proyecto. La forma breve 'Yahvé tu Dios' es idiomática y mantiene el vínculo de pacto sin ocultar el Tetragrámaton.
- source_word: וְהָיָה לָנוּס שָׁמָּה
  english_pob_choice: so that ... may flee there
  chosen_spanish: para que ... pueda huir allí
  alternatives_spanish:
  - y será para huir allí
  - y servirá para huir allí
  - para que pueda refugiarse allí
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y literalmente significa 'y será para huir allí'. En español, 'para que ... pueda huir allí' expresa con claridad el propósito sin añadir elementos ajenos al texto.
- source_word: כָּל רֹצֵחַ
  english_pob_choice: every manslayer
  chosen_spanish: todo homicida
  alternatives_spanish:
  - todo manslayer
  - todo asesino
  - todo matador
  lexicon: HALOT
  rationale: En este contexto legal, רֹצֵחַ puede abarcar al que ha quitado una vida sin resolver aquí su grado de culpa; no conviene estrecharlo prematuramente a 'asesino'. 'Homicida' conserva la amplitud legal que el inglés POB quiso proteger con 'manslayer'.
theological_decisions:
- issue: Cómo renderizar יְהוָה sin la convención de ocultamiento litúrgico
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre del pacto. La decisión del proyecto es preservarlo en español como 'Yahvé', evitando la sustitución por una fórmula funcional que borre la evidencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance legal de רֹצֵחַ en la legislación de ciudades de refugio
  english_pob_reading: manslayer
  chosen_spanish_reading: homicida
  alternative_spanish_readings:
  - asesino
  - asesino o homicida
  - quien mata
  rationale: El contexto inmediato trata de una vía de escape para quien ha dado muerte a alguien; la categoría todavía no se restringe aquí a un culpable de asesinato intencional. 'Homicida' preserva la amplitud jurídica y deja abiertas las precisiones del contexto siguiente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios; este borrador sigue esa línea de alta concordancia y conserva las mismas decisiones semánticas básicas, ajustando solo la formulación española para mayor naturalidad y fidelidad al hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al criterio general del proyecto.
  - '''Camino'' se usa aquí por naturalidad española; no altera la imagen concreta de una vía de acceso preparada.'
  - '''Homicida'' conserva la amplitud legal del hebreo רֹצֵחַ y evita una restricción moral prematura.'
  - '''Herencia'' preserva el matiz de don pactal además de posesión territorial.'
