lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Al director del coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, la expresión señala al responsable musical. «Director del coro» comunica bien la función litúrgica en español actual y conserva la orientación de destino que expresa לַ.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Por los hijos de
  lexicon: HALOT
  rationale: La preposición hebrea en encabezados permite asociación, pertenencia o dedicación. «De los hijos de» preserva esa ambigüedad sin decidir indebidamente autoría, destino o desempeño.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: convención bíblica española
  rationale: En español bíblico tradicional y readable, el nombre propio se adapta como «Coré». Mantiene reconocimiento y naturalidad sin alterar la identidad del referente.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo de instrucción
  - Un cántico contemplativo
  lexicon: HALOT
  rationale: El término es oscuro y probablemente funcional o genérico en el encabezado. Siguiendo el audit trail inglés, se translitera para no resolver prematuramente su sentido; se conserva el artículo indefinido para reflejar el valor del encabezado.
translation_notes:
  revision_awareness: Se siguió la revisión del audit trail que coloca la nota de Maskil junto al término final del versículo, no junto a Coré. También se mantuvo la estructura breve del encabezado conforme al texto fuente y al POB inglés revisado.
  spanish_consistency_notes:
  - Se usó «Coré» como forma española estándar del nombre propio.
  - Se evitó «SEÑOR» porque el texto fuente no contiene el Tetragrámaton ni una cita explícita de Yahvé en este encabezado.
  - «Maskil» se conserva transliterado para respetar la indeterminación léxica documentada.
  - La puntuación reproduce un encabezado poético breve, con separación clara de sus tres miembros.
