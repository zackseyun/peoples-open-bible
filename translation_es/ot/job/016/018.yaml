review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: vocativo a la tierra, prohibición negativa con «no cubras», conservación de «mi sangre», y segunda petición para que no haya lugar para el clamor. Sin embargo, falta un cierre de puntuación y conviene alinear mejor las notas con el expediente inglés: la nota anclada en «tierra» no aporta una alternativa léxica significativa, mientras que falta la nota de alusión a la sangre que clama desde la tierra. También es preferible marcar simultáneamente «mi sangre» con las dos notas pertinentes, como hace el POB inglés.'
  spanish_quality_summary: 'El español es claro y digno, con buena legibilidad e idiomaticidad. «Mi clamor» funciona bien para זעקה. «Y no haya lugar» es aceptable y natural en poesía bíblica. Los problemas son menores pero reales: ausencia del punto final/cierre tipográfico, distribución mejorable de notas, y una nota vocativa innecesaria.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé, Mesías, Cristo, δοῦλος, etc. Las decisiones «tierra», «mi sangre» y «clamor» son consistentes con la filosofía documentada de preservar la imaginería y la tensión teológica.
  issues:
  - severity: medium
    issue: Falta puntuación de cierre en el texto español.
    rationale: El borrador termina en «clamor[c].» pero carece de cierre consistente del enunciado tal como está escrito en el YAML mostrado; debe quedar plenamente puntuado en español.
  - severity: medium
    issue: La nota [a] sobre «tierra» no preserva una alternativa relevante del expediente inglés.
    rationale: El inglés documenta para אֶרֶץ la alternativa «land», no una explicación del vocativo. En español, la nota más útil es «O «tierra» o «tierra/país» según contexto», pero aquí ni siquiera hace falta nota. Mantener una nota solo para explicar que hay vocativo no añade valor traductológico.
  - severity: medium
    issue: Falta la nota de referencia cruzada sobre la sangre que clama por justicia.
    rationale: El expediente inglés conserva explícitamente esa alusión (cf. Génesis 4:10). Dado que la traducción española también mantiene «mi sangre», debe preservarse esa nota o equivalente.
  - severity: low
    issue: La anclación de notas puede alinearse mejor con el modelo POB.
    rationale: Las dos notas relacionadas con «mi sangre» en inglés (alternativa léxica y alusión intertextual) conviene anclarlas en la misma frase española para no perder información auditada.
  revised_spanish_text: ¡Oh tierra, no cubras mi sangre[a][b], y no haya lugar para mi clamor[c]!
  revised_footnotes:
  - marker: a
    text: O «mi sangre derramada». El hebreo dice literalmente «mi sangre», pero en contexto puede implicar sangre injustamente derramada.
    reason: lexical_alternative
  - marker: b
    text: La imagen recuerda la sangre que clama desde la tierra pidiendo justicia; compárese con Génesis 4:10.
    reason: cross_reference
  - marker: c
    text: O «grito de auxilio»; el término puede referirse a un clamor de angustia que también funciona como apelación por justicia.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la presentación del texto con puntuación plena y se revisó el sistema de notas para ajustarlo al expediente POB: se eliminó una nota poco útil sobre el vocativo «tierra», se restauró la referencia cruzada teológicamente relevante sobre la sangre que clama por justicia, y se anclaron en «mi sangre» las notas pertinentes, conservando además la alternativa léxica para «clamor». El texto principal sigue siendo fiel al hebreo y natural en español.'
