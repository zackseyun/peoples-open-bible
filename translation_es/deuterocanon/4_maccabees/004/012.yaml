translation:
  language: es
  text: Porque decía que había pecado[a], de modo que era digno incluso de morir, y que, si fuera salvado, alabaría la bienaventuranza del lugar santo a todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entonaría alabanzas». El verbo griego puede referirse a alabanza de tipo himnódico en general, no solo a canto literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: decía
  alternatives_spanish:
  - dijo
  - andaba diciendo
  lexicon: LSJ
  rationale: El imperfecto griego sugiere acción verbal en curso o repetida. En español, «decía» conserva ese matiz sin volver la frase pesada; «dijo» sería más puntual de lo que el tiempo verbal permite.
- source_word: ἡμαρτηκώς
  english_pob_choice: he had sinned
  chosen_spanish: había pecado
  alternatives_spanish:
  - habiendo pecado
  - era culpable de pecado
  lexicon: LSJ
  rationale: El participio perfecto expresa una falta ya cometida con relevancia presente. «Había pecado» reproduce bien esa anterioridad y su efecto en el razonamiento.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - con el resultado de que
  - por tanto
  lexicon: LSJ
  rationale: La locución conserva la relación consecutiva entre el pecado confesado y la conclusión sobre la muerte, sin cargarla de una inferencia más fuerte que el griego.
- source_word: καὶ ἀποθανεῖν ἄξιος ὑπάρχειν
  english_pob_choice: he was worthy even to die
  chosen_spanish: era digno incluso de morir
  alternatives_spanish:
  - merecía incluso morir
  - era merecedor incluso de la muerte
  lexicon: LSJ
  rationale: «ἄξιος» con infinitivo expresa merecimiento o dignidad para algo. «Digno» mantiene la fuerza semántica; «incluso» refleja el valor intensivo de καί.
- source_word: πᾶσίν τε ἀνθρώποις
  english_pob_choice: to all people
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - ante todas las personas
  - a todas las personas
  lexicon: LSJ
  rationale: El dativo con ὑμνήσειεν indica el ámbito de destinatarios. «A todos los pueblos» conserva un alcance colectivo y público; «personas» sería posible, pero atenúa el carácter general del plural griego.
- source_word: ὑμνήσειεν
  english_pob_choice: he would praise
  chosen_spanish: alabaría
  alternatives_spanish:
  - cantaría alabanzas
  - himnaría
  lexicon: LSJ
  rationale: El verbo puede abarcar alabanza de tipo himnódico, no necesariamente canto literal. «Alabaría» es natural en español y mantiene la nota de homenaje; la nota conserva la alternativa más literal del campo semántico.
- source_word: σωθεὶς
  english_pob_choice: if he were saved
  chosen_spanish: si fuera salvado
  alternatives_spanish:
  - si fuera rescatado
  - si recibiera salvación
  lexicon: LSJ
  rationale: En este contexto narrativo se trata de ser librado del peligro/muerte, no de imponer una lectura doctrinal. «Salvado» deja abierta la tensión entre rescate temporal y resonancias religiosas, como en el inglés POB.
- source_word: τὴν τοῦ ἱεροῦ τόπου μακαριότητα
  english_pob_choice: the blessedness of the holy place
  chosen_spanish: la bienaventuranza del lugar santo
  alternatives_spanish:
  - la dicha del lugar santo
  - la bienaventuranza del sitio sagrado
  lexicon: LSJ
  rationale: «μακαριότης» puede ser ‘bienaventuranza’, ‘felicidad’ o ‘bendición’; «bienaventuranza» conserva la densidad del sustantivo abstracto. «Lugar santo» refleja ἱεροῦ τόπου de manera transparente sin sustituirlo por un término eclesiástico no presente en el texto.
theological_decisions:
- issue: Sentido de σωθεὶς
  english_pob_reading: temporal deliverance/rescue rather than explicit spiritual salvation
  chosen_spanish_reading: librado o salvado del peligro, sin cerrar la posibilidad de resonancia religiosa
  alternative_spanish_readings:
  - salvación espiritual explícita
  - rescate puramente físico
  rationale: El contexto inmediato habla de una situación en la que alguien sería preservado de morir; por eso conviene no imponer una teología posterior sobre el término. «Salvado» en español conserva la ambigüedad productiva que el griego permite.
  doctrine_reference: Preservar la tensión lexical y contextual sin resolverla dogmáticamente; primacía del texto fuente.
- issue: Valor de ὑμνήσειεν
  english_pob_reading: praise, with a footnoted hymn-like alternative
  chosen_spanish_reading: alabaría, con posibilidad de alabanza himníca
  alternative_spanish_readings:
  - cantaría
  - entonaría himnos
  rationale: El español «alabaría» comunica el sentido principal sin perder la referencia a un posible registro de himno. La nota preserva la alternativa léxica sin forzar una traducción demasiado litúrgica.
  doctrine_reference: Mantener la amplitud semántica del verbo griego y su posible tono cultual.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió «praise» frente a «sing» para ὑμνήσειεν por naturalidad y ajuste léxico. La versión española adopta esa misma decisión con «alabaría», manteniendo la posibilidad himnódica en nota. También conserva la lectura condicional de σωθεὶς como rescate temporal, sin convertirla en formulación doctrinal explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no se presenta.
  - «Bienaventuranza» se usa para μακαριότης por consistencia con un sustantivo abstracto de felicidad/bendición, evitando reducirlo a un adjetivo.
  - «Lugar santo» reproduce el genitivo del griego de forma transparente y evita introducir «santuario» como glosa interpretativa fuerte.
  - La puntuación y el orden responden a un español natural, pero conservan la estructura causal y condicional del original.
