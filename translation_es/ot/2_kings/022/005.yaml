base_translation:
  language: en
  yaml_path: translation/ot/2_kings/022/005.yaml
  text: and let him put it into the hands of the workmen who are appointed in the house of Yahweh[b][a], and let them give it to the workmen who are in the house of Yahweh to repair the damage to the house.
  footnotes:
