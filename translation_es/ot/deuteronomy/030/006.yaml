revisions:
- from: Yahvé tu Dios circuncidará tu corazón y el corazón de tu descendencia[a], para que ames a Yahvé tu Dios con todo tu corazón y con toda tu alma[b], para que vivas.
  to: Yahvé tu Dios circuncidará tu corazón[a] y el corazón de tu descendencia[b], para que ames a Yahvé tu Dios con todo tu corazón y con toda tu alma[c], para que vivas.
  rationale: Se aprueba el núcleo de la traducción, pero se requiere una revisión menor para completar el aparato de notas conforme al expediente del POB inglés. La revisión añade la nota cultural en el lugar más relevante ('circuncidará tu corazón'), conserva la alternativa de 'descendencia', y agrega la alternativa semántica necesaria para 'alma'. También se mejora la puntuación y claridad de las notas en español.
