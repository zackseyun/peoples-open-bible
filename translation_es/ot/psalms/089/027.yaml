  to: 'Él clamará a mí[a]: «Tú eres mi Padre, mi Dios y la roca de mi salvación».'
  rationale: Se ajusta el verbo principal para reflejar mejor el valor invocativo/direccional de קרא en este contexto, en consonancia con la decisión léxica del English POB. «Clamará a mí» suena algo más literal, pero comunica mejor que el rey dirige su clamor a Dios. Se corrige también la nota para que ofrezca alternativas reales y naturales en español.
