translation:
  language: es
  text: Un hombre pobre que oprime a los de baja condición es como lluvia arrasadora que no deja alimento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y no hay pan». Aquí «pan» probablemente representa alimento o provisión en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: HALOT
  rationale: גֶּבֶר designa a un varón o hombre, y en el proverbio introduce a un sujeto representativo. "Hombre" conserva el valor masculino del hebreo sin volver la frase forzada en español.
- source_word: רָשׁ
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - indigente
  lexicon: HALOT
  rationale: El adjetivo señala carencia material o recursos limitados. "Pobre" es la equivalencia más natural y directa en español para este contexto sapiencial.
- source_word: עֹשֵׁק
  english_pob_choice: who oppresses
  chosen_spanish: que oprime
  alternatives_spanish:
  - que explota
  - que extorsiona
  - que defrauda
  lexicon: HALOT
  rationale: El participio expresa una acción activa y continua de abuso o explotación. "Oprime" conserva bien esa fuerza y encaja con el sujeto previo sin añadir matices no requeridos.
- source_word: דַּלִּים
  english_pob_choice: the lowly
  chosen_spanish: los humildes
  alternatives_spanish:
  - los pobres
  - los débiles
  lexicon: HALOT
  rationale: דַּלִּים puede referirse a personas de baja condición, vulnerables o pobres. Dado que el verso ya usa "pobre" para רָשׁ, "los humildes" ayuda a mantener la distinción léxica en español sin perder el sentido de vulnerabilidad social.
- source_word: מָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  - chaparrón
  lexicon: HALOT
  rationale: El sustantivo significa simplemente "lluvia". En español, "lluvia torrencial" transmite el efecto dañino del participio siguiente sin apartarse del sustantivo básico.
- source_word: סֹחֵף
  english_pob_choice: sweeping
  chosen_spanish: torrencial
  alternatives_spanish:
  - arrasadora
  - que arrastra
  lexicon: HALOT
  rationale: El participio describe una lluvia que barre o arrastra. "Torrencial" en español comunica la intensidad destructiva de manera natural; se acompaña de "lluvia" para reflejar el cuadro imagético de fuerza dañina.
- source_word: וְאֵין לָחֶם
  english_pob_choice: that leaves no food
  chosen_spanish: que no deja pan
  alternatives_spanish:
  - y no hay pan
  - que no deja alimento
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente "y no hay pan". Se mantiene "pan" como metonimia concreta de alimento/provisión, tal como lo reconoce la nota inglesa, y se integra en una construcción fluida en español.
translation_notes:
  revision_awareness: El inglés POB presenta una lectura de equivalencia óptima sin cambios en la revisión más reciente; el versículo quedó estable y no hubo revisiones aplicadas. La versión española mantiene ese mismo equilibrio entre literalidad y naturalidad, conservando la imagen proverbial y la metonimia de "pan".
  spanish_consistency_notes:
  - Se mantuvo "hombre" para גֶּבֶר, coherente con la preferencia lexical documentada en el audit trail.
  - '"Humildes" se usa para דַּלִּים con el fin de distinguirlo de "pobre" sin perder la referencia a personas socialmente vulnerables.'
  - '"Pan" se conserva en la nota para reflejar con transparencia la metonimia hebrea de alimento o provisión.'
