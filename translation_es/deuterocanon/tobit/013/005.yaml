translation:
  language: es
  text: Y nos azotará por nuestras injusticias[a], y de nuevo tendrá misericordia y nos reunirá de entre todas las naciones, entre las cuales ustedes fueron dispersados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego pasa de «nos/nuestras» a «ustedes fueron dispersados» en la cláusula final; algunas versiones lo armonizan a «fuimos dispersados», pero aquí se conserva el cambio de persona del texto fuente.
    reason: alternative_reading
lexical_decisions:
- source_word: μαστιγώσει
  english_pob_choice: will scourge
  chosen_spanish: nos azotará
  alternatives_spanish:
  - nos castigará
  - nos flagelará
  - nos castigará con azotes
  lexicon: BDAG
  rationale: El griego expresa una acción fuerte de castigo físico/metafórico. En español, «azotará» conserva la imagen de golpear con azote y comunica mejor la fuerza del verbo que un genérico «castigará».
- source_word: ἐν ταῖς ἀδικίαις ἡμῶν
  english_pob_choice: for our injustices
  chosen_spanish: por nuestras injusticias
  alternatives_spanish:
  - a causa de nuestras injusticias
  - por nuestros pecados
  - por nuestras maldades
  lexicon: BDAG
  rationale: ἀδικίαις es plural y apunta a injusticias, agravios o maldades. «Por nuestras injusticias» mantiene el valor causal y el plural sin reducir el término a un equivalente más general como «pecados».
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: La partícula marca retorno tras el castigo. «Otra vez» suena natural en español y conserva la idea de reanudación misericordiosa.
- source_word: ἐλεήσει
  english_pob_choice: will show mercy
  chosen_spanish: tendrá misericordia
  alternatives_spanish:
  - mostrará misericordia
  - será misericordioso
  lexicon: BDAG
  rationale: «Tendrá misericordia» es una fórmula española clara y fiel al verbo, sin perder el sentido de acción misericordiosa.
- source_word: συνάξει
  english_pob_choice: will gather
  chosen_spanish: nos reunirá
  alternatives_spanish:
  - nos juntará
  - nos congregará
  lexicon: BDAG
  rationale: El verbo implica reunir a los dispersos. «Nos reunirá» comunica bien la restauración nacional y resulta natural en español.
- source_word: ἐξ πάντων τῶν ἐθνῶν
  english_pob_choice: from all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - de todas las naciones
  - de entre todas las gentes
  lexicon: BDAG
  rationale: «De entre» ayuda a expresar la procedencia desde el interior de los pueblos entre los que estaban dispersos, manteniendo el matiz de extracción/restauración.
- source_word: οὗ ἐὰν σκορπισθῆτε ἐν αὐτοῖς
  english_pob_choice: among which you were scattered
  chosen_spanish: entre las cuales fuisteis dispersados
  alternatives_spanish:
  - entre las cuales fuisteis esparcidos
  - dondequiera que fuisteis dispersados entre ellas
  - entre las cuales habéis sido dispersados
  lexicon: BDAG
  rationale: 'Se preserva el cambio de persona señalado por el auditor inglés: de «nos/nuestras» a «fuisteis». «Dispersados» refleja bien σκορπισθῆτε y el pasivo de dispersión en contexto de exilio.'
theological_decisions:
- issue: Cambio de persona del plural inclusivo a segunda persona plural en la cláusula final
  english_pob_reading: 'Retain the Greek''s rhetorical shift: ''he will scourge us ... gather us ... among which you were scattered.'''
  chosen_spanish_reading: 'Mantener el giro retórico: «nos azotará ... nos reunirá ... entre las cuales fuisteis dispersados».'
  alternative_spanish_readings:
  - 'suavizar a primera persona: «entre las cuales fuimos dispersados»'
  - armonizar en una sola persona a lo largo del verso
  rationale: El texto griego cambia deliberadamente de «nos/nuestro» a «fuisteis». No se corrige esa tensión en la traducción para respetar la primacía del original y la dirección exhortativa al pueblo disperso.
  doctrine_reference: Preservar la tensión textual en vez de resolverla por armonización; prioridad del texto original sobre la nivelación estilística.
translation_notes:
  revision_awareness: El audit trail inglés marca acuerdo alto y sin revisiones aplicadas; se siguió la lectura óptima existente, preservando el cambio de persona final y el matiz castigador de μαστιγώσει sin suavizarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el nombre divino explícito en el griego recibido.
  - Se conserva el registro bíblico y sobrio, evitando un castellano demasiado literal que sonaría ajeno.
  - «Injusticias» traduce el plural ἀδικίαις sin reducirlo automáticamente a «pecados».
