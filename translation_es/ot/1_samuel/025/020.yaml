translation:
  language: es
  text: Y mientras ella iba montada en el asno y descendía por el lado oculto de la montaña[a], he aquí, David y sus hombres venían descendiendo hacia ella, y se encontró con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la parte resguardada del monte». La expresión hebrea se refiere a una zona oculta o protegida de la montaña.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה הִיא
  english_pob_choice: And as she was
  chosen_spanish: Y sucedió que ella iba
  alternatives_spanish:
  - Y aconteció que ella iba
  - Y mientras ella iba
  lexicon: HALOT
  rationale: La construcción narrativa con waw + היה introduce una escena en curso. En español, «Y sucedió que» conserva el arranque narrativo sin volverlo artificial; «iba» refleja la acción progresiva.
- source_word: רֹכֶבֶת עַל הַחֲמוֹר
  english_pob_choice: riding on the donkey
  chosen_spanish: iba montada en el burro
  alternatives_spanish:
  - montada sobre el burro
  - cabalgaba en el burro
  lexicon: HALOT
  rationale: רכב expresa montar/ir montado. «Iba montada» comunica bien el estado resultante y el movimiento; «burro» es el equivalente natural y claro en español moderno para חמור.
- source_word: וְיֹרֶדֶת
  english_pob_choice: and going down
  chosen_spanish: y descendía
  alternatives_spanish:
  - y bajaba
  - y iba descendiendo
  lexicon: HALOT
  rationale: El participio indica acción continua. «Descendía» mantiene la dirección del movimiento con un registro digno y natural.
- source_word: בְּסֵתֶר הָהָר
  english_pob_choice: by the hidden side of the mountain
  chosen_spanish: por el lado oculto de la montaña
  alternatives_spanish:
  - por el lado escondido de la montaña
  - por la parte resguardada de la montaña
  lexicon: HALOT
  rationale: סתר aquí apunta al lado oculto/resguardado del monte. «Lado oculto» preserva el matiz de ocultamiento sin imponer más topografía de la que el hebreo da.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - de pronto
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza de atención/vividness de הנה en un estilo bíblico claro en español.
- source_word: יֹרְדִים לִקְרָאתָהּ
  english_pob_choice: were coming down toward her
  chosen_spanish: venían descendiendo hacia ella
  alternatives_spanish:
  - bajaban hacia ella
  - venían bajando a su encuentro
  lexicon: HALOT
  rationale: ירד + לקראת expresa movimiento descendente orientado hacia ella. «Venían descendiendo hacia ella» evita sugerir finalidad explícita de encuentro y sigue de cerca el sentido del hebreo.
- source_word: וַתִּפְגֹּשׁ אֹתָם
  english_pob_choice: and she met them
  chosen_spanish: y los encontró
  alternatives_spanish:
  - y se encontró con ellos
  - y los halló
  lexicon: HALOT
  rationale: פגש significa encontrarse con/encounter. «Los encontró» es idiomático y mantiene la acción simple del relato; «se encontró con ellos» podría sonar más recíproco de lo que requiere el texto.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y también toma en cuenta la revisión inglesa más reciente, que prefirió «by the hidden side of the mountain» y evitó expresar con demasiada fuerza la idea de propósito en «toward her». Por eso se eligió una formulación topográfica neutral y se conservó el movimiento orientado hacia ella sin añadir intención.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Burro» traduce חמור con naturalidad moderna; no se usa «asno» por preferencia estilística, aunque sería posible.
  - Se preserva el valor discursivo de וְהִנֵּה con «y he aquí», en vez de omitirlo.
  - El verbo final «los encontró» evita una paráfrasis interpretativa y refleja el encuentro narrativo de פגש.
