translation:
  language: es
  text: Y aconteció que, en el sexto año, en el sexto mes, a los cinco días del mes, mientras yo estaba sentado en mi casa y los ancianos de Judá estaban sentados delante de mí, la mano del Señor Yahvé[b] cayó sobre mí allí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Allí» conserva el valor locativo de שָׁם; algunas traducciones lo vierten como «entonces», pero el hebreo dice literalmente «allí».
    reason: lexical_alternative
  - marker: b
    text: O «el Señor Yavé»; hebreo אֲדֹנָי יְהוִה, una combinación de título más nombre divino.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol introduce una nueva escena; «aconteció» conserva ese valor discursivo en español sin volverse arcaica.
- source_word: בַּשָּׁנָה הַשִּׁשִּׁית
  english_pob_choice: in the sixth year
  chosen_spanish: en el sexto año
  alternatives_spanish:
  - en el año sexto
  - en el sexto año [del exilio]
  lexicon: HALOT
  rationale: El hebreo da la fecha de manera breve; «año» se mantiene sin expansión, porque «del exilio» no está explicitado en este versículo.
- source_word: בַּשִּׁשִּׁי בַּחֲמִשָּׁה לַחֹדֶשׁ
  english_pob_choice: in the sixth month, on the fifth day of the month
  chosen_spanish: en el mes sexto, a los cinco días del mes
  alternatives_spanish:
  - en el sexto mes, el quinto día del mes
  - en el mes sexto, el día cinco del mes
  lexicon: HALOT
  rationale: Se conserva la fórmula de fecha completa con una redacción natural en español y fiel al orden del original.
- source_word: אֲנִי יוֹשֵׁב בְּבֵיתִי
  english_pob_choice: as I was sitting in my house
  chosen_spanish: mientras yo estaba sentado en mi casa
  alternatives_spanish:
  - mientras estaba sentado en mi casa
  - yo estaba sentado en mi casa
  lexicon: HALOT
  rationale: El participio expresa trasfondo/estado en curso; «mientras yo estaba sentado» transmite bien la circunstancia continua.
- source_word: וְזִקְנֵי יְהוּדָה
  english_pob_choice: and the elders of Judah
  chosen_spanish: y los ancianos de Judá
  alternatives_spanish:
  - y los líderes de Judá
  - y los ancianos de Judea
  lexicon: HALOT
  rationale: «Ancianos» refleja זִקְנֵי como líderes reconocidos; «de Judá» preserva el constructo sin sustituirlo por una equivalencia interpretativa.
- source_word: יוֹשְׁבִים לְפָנַי
  english_pob_choice: were sitting before me
  chosen_spanish: estaban sentados delante de mí
  alternatives_spanish:
  - estaban sentados ante mí
  - se hallaban sentados delante de mí
  lexicon: HALOT
  rationale: El participio marca circunstancia continua; «delante de mí» reproduce el sentido de presencia ante un profeta sin forzar una formalidad excesiva.
- source_word: וַתִּפֹּל עָלַי
  english_pob_choice: fell upon me
  chosen_spanish: cayó sobre mí
  alternatives_spanish:
  - vino sobre mí
  - se abatió sobre mí
  lexicon: HALOT
  rationale: En español, «cayó sobre mí» comunica el impacto repentino del giro idiomático hebreo y conserva la fuerza del acto divino.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - entonces
  lexicon: HALOT
  rationale: Se mantiene el valor locativo del adverbio hebreo; aunque otras versiones lo suavizan temporalmente, aquí «allí» refleja mejor el original.
- source_word: יַד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - el poder
  lexicon: HALOT
  rationale: Se conserva la imagen corporal idiomática «mano» en lugar de interpretarla como «poder», para no diluir la expresión profética.
- source_word: יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Conforme a la convención del proyecto, el nombre divino se rinde como «Yahvé» en el texto principal, sin la convención de máscara «SEÑOR».
theological_decisions:
- issue: Renderización del nombre divino en la combinación אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé Dios
  rationale: El hebreo contiene el Tetragrámaton, y la norma del proyecto pide traducirlo como «Yahvé»; no se enmascara con «SEÑOR». En la secuencia con אֲדֹנָי, la traducción española mantiene el nombre divino según esa convención.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se incorporó la revisión del audit trail que movió «there» al final de la cláusula en inglés. En español se reflejó esa colocación con «allí» al final: «cayó sobre mí la mano de Yahvé allí». También se ajustó la nota para anclarla en el texto con [a].'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme a la convención del proyecto.
  - Se conserva «mano» para la expresión idiomática divina.
  - «Ancianos de Judá» mantiene el constructo hebreo sin ampliaciones interpretativas.
  - La puntuación reproduce una sola oración larga, como el original hebreo, con comas para delimitar las cláusulas.
