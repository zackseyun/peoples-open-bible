id: JOS.10.19
reference: Joshua 10:19
source:
  edition: WLC
  text: וְ/אַתֶּם֙ אַֽל תַּעֲמֹ֔דוּ רִדְפוּ֙ אַחֲרֵ֣י אֹֽיְבֵי/כֶ֔ם וְ/זִנַּבְתֶּ֖ם אוֹתָ֑/ם אַֽל תִּתְּנ֗וּ/ם לָ/בוֹא֙ אֶל עָ֣רֵי/הֶ֔ם כִּ֧י נְתָנָ֛/ם יְהוָ֥ה אֱלֹהֵי/כֶ֖ם בְּ/יֶדְ/כֶֽם־־־׃
translation:
  text: But as for you[a], do not stand still; pursue your enemies and strike their rear guard. Do not let them enter their cities, for Yahweh your God has given them into your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strike their rear' / 'attack their stragglers'; the Hebrew verb refers to hitting the tail end of a fleeing force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrastive emphasis after the preceding action. 'But as for you' brings out the emphatic shift better than a bare 'and you.'
- source_word: אַל תַּעֲמֹדוּ
  chosen: do not stand still
  alternatives:
  - do not stand
  - do not stop
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in this military context the prohibition is against halting the pursuit. 'Stand still' preserves the image while conveying the intended force.
- source_word: רִדְפוּ אַחֲרֵי אֹיְבֵיכֶם
  chosen: pursue your enemies
  alternatives:
  - chase after your enemies
  lexicon: HALOT
  rationale: רדף אחרי is the standard idiom for pursuit. 'Pursue' is concise, natural English and suitably military.
- source_word: וְזִנַּבְתֶּם אוֹתָם
  chosen: cut off their rear guard
  alternatives:
  - strike their rear
  - attack their stragglers
  - smite the hindmost of them
  lexicon: HALOT
  rationale: זנב literally relates to 'tail' and in military usage means striking the rear or hindmost part of a force. 'Cut off their rear guard' communicates the tactical sense in readable English better than a wooden 'tail them.'
- source_word: אַל תִּתְּנוּם לָבוֹא
  chosen: Do not let them enter
  alternatives:
  - Do not allow them to come in
  - Do not give them to enter
  lexicon: HALOT
  rationale: נתן with infinitive here is an idiom meaning to permit. 'Do not let them enter' is the natural English equivalent.
- source_word: אֶל עָרֵיהֶם
  chosen: their cities
  alternatives:
  - their towns
  lexicon: HALOT
  rationale: עיר commonly means city/town. In this conquest narrative, 'cities' fits the fortified-urban setting.
- source_word: כִּי נְתָנָם
  chosen: for ... has given them
  alternatives:
  - for ... has delivered them
  - because ... gave them
  lexicon: HALOT
  rationale: The perfect verb presents the victory as effectively accomplished by divine action. 'Has given them' preserves the Hebrew idiom and aspect better than a simple past.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second person plural suffix; no expansion needed.
- source_word: בְּיֶדְכֶם
  chosen: into your hand
  alternatives:
  - into your power
  - into your hands
  lexicon: HALOT
  rationale: The singular 'hand' is the Hebrew idiom for power/control. Retaining 'into your hand' preserves the biblical expression while remaining intelligible.
