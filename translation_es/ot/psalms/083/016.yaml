translation:
  language: es
  text: Persíguelos con tu tormenta,[a] y aterrorízalos con tu tempestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así persíguelos con tu tormenta, y con tu torbellino aterrorízalos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: כֵּן introduce la consecuencia o el modo deseado. «Así» conserva la relación lógica y suena natural en español poético sin añadir interpretación extra.
- source_word: תִּרְדְּפֵם
  english_pob_choice: pursue them
  chosen_spanish: persíguelos
  alternatives_spanish:
  - síguelos de cerca
  - acéchalos
  lexicon: HALOT
  rationale: רדף en este contexto expresa persecución intensa, incluso hostil. «Persíguelos» mantiene la fuerza verbal y el tono de juicio sin volverse demasiado técnico.
- source_word: בְּסַעֲרֶךָ
  english_pob_choice: with your storm
  chosen_spanish: con tu tormenta
  alternatives_spanish:
  - con tu tempestad
  - con tu vendaval
  lexicon: HALOT
  rationale: סַעַר alude a una tempestad violenta o tormenta agitada. «Tormenta» comunica bien el sentido en español y distingue este término del siguiente, sin perder la imagen instrumental del prefijo בְּ.
- source_word: וּבְסוּפָתְךָ
  english_pob_choice: with your tempest
  chosen_spanish: con tu tempestad
  alternatives_spanish:
  - con tu tormenta
  - con tu huracán
  lexicon: HALOT
  rationale: סוּפָה intensifica la imagen meteorológica y suele ser una tempestad violenta. «Tempestad» preserva la elevación poética y diferencia el segundo término del primero.
- source_word: תְבַהֲלֵם
  english_pob_choice: terrify them
  chosen_spanish: aterrorízalos
  alternatives_spanish:
  - espántalos
  - confúndelos
  - desconcertarlos
  lexicon: HALOT
  rationale: בהל en piel comunica causar pánico, alarma o terror. «Aterrorízalos» reproduce mejor la intensidad causativa del hebreo y el tono imprecatorio del verso.
theological_decisions:
- issue: Peticiones imprecatorias dirigidas a Dios
  english_pob_reading: Retain the direct petition for God to pursue and terrify the enemies.
  chosen_spanish_reading: Mantener la súplica directa para que Dios persiga y aterrorice a los enemigos.
  alternative_spanish_readings:
  - Así, que los persigas con tu tormenta y los aterrorices con tu tempestad.
  - Persíguelos con tu tormenta y aterrorízalos con tu tempestad.
  rationale: El hebreo funciona como una petición poética en contexto de juicio. El español debe conservar ese carácter implorativo sin convertirlo en mera descripción futura ni suavizar la dureza del texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: El audio de revisión indica alta concordancia con el inglés POB y ningún cambio necesario; esta versión sigue de cerca esa lectura, ajustando únicamente el español para naturalidad y distinción poética entre סַעַר y סוּפָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto cuando el texto refiere la acción directa de Dios.
  - Se conservan dos términos meteorológicos distintos para reflejar la duplicación poética del hebreo.
  - «Aterrorízalos» mantiene el valor causativo e imprecatorio de piel en בהל.
