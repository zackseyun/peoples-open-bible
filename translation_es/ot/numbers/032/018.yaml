review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: negación futura, no regresar a las casas, límite temporal hasta la toma de posesión, y conservación de «los hijos de Israel» con nota alternativa. Sin embargo, omite explícitamente el distributivo de אִישׁ («cada uno»), que en la fuente modifica «su heredad» y no debe quedar solo implícito.'
  spanish_quality_summary: El español es claro y digno. «Tomado posesión» y «heredad» son adecuados al contexto territorial. No obstante, «su heredad» sin «cada uno» puede sonar ambiguo en español, como si se refiriera colectivamente a una sola heredad, y pierde precisión distributiva. La reparación necesaria es pequeña y mejora tanto fidelidad como claridad.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «los hijos de Israel» preserva בְּנֵי יִשְׂרָאֵל, con nota alternativa «los israelitas»; no hay términos de glosario mayor en conflicto. «Heredad» concuerda con la rationale documentada para נַחֲלָה en contexto de reparto territorial.'
  issues:
