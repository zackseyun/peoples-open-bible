  text: υγιας B*A (υγειας Bab) ΙΧ Τωβιας BᵃA (item 6) ὅτι ἐν Ῥάγοις τῆς Μηδείας παρὰ Γαβαήλ, καὶ κόμισαί μοι τὸ ἀργύριον καὶ αὐτὸν ἄγε μοι εἰς τὸν γάμον. διότι ὠμόμοκεν ὁ Ῥαγουὴλ μὴ ἐξελθεῖν με· καὶ ὁ πατήρ μου ἀριθμεῖ τὰς ἡμέρας, καὶ ἐὰν χρονίσω μέγα, ὀδυνηθήσεται λίαν. καὶ ἐπορεύθη Ῥαφαὴλ, καὶ ηὐλίσθη παρὰ Γαβαήλ, καὶ ἔδωκεν αὐτῷ τὸ χειρόγραφον· ὃς δὲ προήνεγκεν τὰ θυλάκια ἐν ταῖς σφραγῖσιν καὶ ἔδωκεν αὐτῷ. καὶ ὤρθρευσαν κοινῶς καὶ ἦλθοσαν εἰς τὸν γάμον, εἰς τὸν γάμον, καὶ εὐλόγησεν Τωβείας τὴν γυναῖκα αὐτοῦ. ἸΚαὶ Τωβεὶθ ὁ πατὴρ αὐτοῦ ἐλογίζετο ἑκάστης ἡμέρας· καὶ ὡς ἐπληρώθησαν αἱ ἡμέραι τῆς πορείας καὶ οὐκ ἤρχοντο, εἶπεν Μή ποτε κατῄσχυνται; ἢ μὴ ποτε ἀπέθανεν Γαβαήλ, καὶ οὐδεὶς δίδωσιν αὐτῷ τὸ ἀργύριον; καὶ ἐλυπεῖτο λίαν. εἶπεν δὲ αὐτῷ ἡ γυνὴ Ἀπώλετο τὸ παιδίον, διότι κεχρόνικεν· καὶ ἤρξατο θρηνεῖν αὐτὸν αὐτὸν καὶ εἶπεν Οὐ μέλει μοι, τέκνον, ὅτι ἀφῆκά σε τὸ φῶς τῶν Ἐκάστην δὲ ἡμέραν ἐξ ἡμέρας ἐλογίζετο Τωβεὶθ τὰς ἡμέρας ἐν πόσαις πορεύσεται καὶ ἐν πόσαις ἐπιστρέψει· καὶ ὅτε συνετελέσθησαν
    αἱ ἡμέραι καὶ ὁ υἱὸς αὐτοῦ οὐ παρῆν, εἶπεν Μή ποτε κατεσχέθη ἐκεῖ; ἢ μὴ ποτε ἀπέθανεν ὁ Γαβαήλ, καὶ οὐδεὶς αὐτῷ δίδωσιν τὸ ἀργύριον; καὶ ἤρξατο λυπεῖσθαι. καὶ Ἄννα ἡ γυνὴ αὐτοῦ λέγει Ἀπώλετο τὸ παιδίον μου καὶ οὐκέτι ὑπάρχει ἐν τοῖς ζῶσιν· καὶ ἤρξατο κλαίειν καὶ θρηνεῖν περὶ τοῦ υἱοῦ αὐτῆς καὶ εἶπεν Οὐαί μοι, τέκνον, ὅτι ἀφῆκά σε πορευθῆναι, τὸ φῶς τῶν ὀφθαλμῶν μου. ὀφθαλμῶν μου; καὶ Τωβείτ λέγει αὐτῇ Σίγα, μὴ λόγον ἔχε, ὑγίαινε. καὶ εἶπεν αὐτῷ Σίγα, μὴ πλάνα με· ἀπώλετο τὸ παιδίον μου. καὶ ἐπορεύετο καθʼ ἡμέραν εἰς τὴν ὁδὸν ἔξω ᾗς ἀπῆλθεν, ἡμέρας τε ἄρτον οὐκ ἤσθιεν, τὰς δὲ νύκτας οὐ διέλιμπανεν θρηνοῦσα Τωβείαν τὸν υἱὸν αὐτῆς, ἕως οὗ συνετελέσθησαν αἱ δέκα τέσσαρες ἡμέραι τοῦ γάμου ἃς ὤμοσεν Ῥαγουὴλ ποιῆσαι αὐτὸν ἐκεῖ. Εἶπεν δὲ Τωβείας τῷ Ῥαγουὴλ Ἐξαπόστειλόν με, ὅτι ὁ πατήρ μου καὶ ἡ μήτηρ μου οὐκέτι ἐλπίζουσιν ὄψεσθαί με. εἶπεν δὲ αὐτῷ ὁ πενθερός Μείνον παρʼ ἐμοί, κἀγὼ ἐξαποστελῶ πρὸς τὸν πατέρα σου καὶ δηλώσουσιν αὐτῷ τὰ κατὰ σέ. καὶ Τωβείας λέγει Ἐξαπόστειλόν με πρὸς τὸν πατέρα
    μου. ἀναστὰς δὲ Ῥαγουὴλ ἔδωκεν αὐτῷ Σάρραν τὴν γυναῖκα αὐτοῦ καὶ τὰ ἥμισυ τῶν ὑπαρχόντων, σώματα καὶ κτήνη, ἀργύριον, καὶ εὐλόγησας αὐτοὺς ἐξαπέστειλεν λέγων Εὐοδώσει ὑμᾶς, τέκνα, ὁ θεὸς τοῦ οὐρανοῦ πρὸ τοῦ μὲ ἀποθανεῖν. καὶ εἶπεν τῇ θυγατρὶ αὐτοῦ Τίμα τοὺς πενθερούς σου, αὐτοὶ νῦν γονεῖς σού εἰσιν· ἀκούσαιμί σου ἀκοὴν καλήν. καὶ ἐφίλησεν αὐτήν. καὶ Ἔδνα εἶπεν πρὸς Τωβείαν Ἀδελφὲ ἀγαπητέ, ἀποκαταστήσει σε ὁ κύριος τοῦ οὐρανοῦ, καὶ δῴη μοι ἰδεῖν σου παιδία ἐκ Σάρρας τῆς θυγατρός μου, ἵνα εὐφρανθῶ ἐνώπιον τοῦ κυρίου· καὶ ἰδοὺ παρατίθεμαί σοι τὴν θυγατέρα μου ἐν παρακαταθήκῃ, μὴ λυπήσῃς αὐτήν.
