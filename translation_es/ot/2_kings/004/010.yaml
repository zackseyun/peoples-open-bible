translation:
  language: es
  text: Por favor, hagamos un pequeño aposento alto en el muro[a], y pongamos allí para él una cama, una mesa, una silla y un lamparero; y cuando venga a visitarnos[b], podrá hospedarse allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pequeño aposento alto con muro» o simplemente «un pequeño aposento alto». La frase hebrea es compacta, y «en el muro» preserva su formulación concreta.
    reason: lexical_alternative
  - marker: b
    text: O «podrá desviarse allí». El verbo hebreo suele significar «desviarse» o «volverse aparte» y aquí se refiere a detenerse allí para hospedarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲשֶׂה נָּא
  english_pob_choice: Please let us make
  chosen_spanish: Por favor, hagamos
  alternatives_spanish:
  - Hagamos, por favor
  - Por favor, hagamos
  lexicon: HALOT
  rationale: La forma cohortativa de primera persona plural con נָא expresa una propuesta cortés. En español, «Por favor, hagamos» conserva el matiz de petición sin sonar forzado.
- source_word: עֲלִיַּת קִיר קְטַנָּה
  english_pob_choice: a small upper room on the wall
  chosen_spanish: una pequeña habitación superior en el muro
  alternatives_spanish:
  - una pequeña habitación alta en el muro
  - una pequeña estancia superior adosada al muro
  - una pequeña habitación superior
  lexicon: HALOT
  rationale: עֲלִיָּה indica una habitación superior; קִיר añade la imagen concreta del muro. «En el muro» mantiene la concreción del hebreo que el POB inglés preserva con «on the wall».
- source_word: וְנָשִׂים לֹו שָׁם
  english_pob_choice: and let us put there for him
  chosen_spanish: y pongamos allí para él
  alternatives_spanish:
  - y coloquemos allí para él
  - y pongamos allí para él
  lexicon: HALOT
  rationale: שׂים significa poner/colocar. La secuencia cohortativa sigue siendo una propuesta compartida, por eso «pongamos» refleja mejor el valor volitivo que un futuro simple.
- source_word: מִטָּה
  english_pob_choice: a bed
  chosen_spanish: una cama
  alternatives_spanish:
  - una cama
  - un lecho
  lexicon: HALOT
  rationale: En este contexto de hospedaje, el sentido natural es una cama o lugar para dormir. «Cama» es la equivalencia moderna más clara.
- source_word: שֻׁלְחָן
  english_pob_choice: a table
  chosen_spanish: una mesa
  alternatives_spanish:
  - una mesa
  lexicon: HALOT
  rationale: Término doméstico estándar; «mesa» comunica directamente el objeto sin perder fidelidad.
- source_word: כִסֵּא
  english_pob_choice: a chair
  chosen_spanish: una silla
  alternatives_spanish:
  - una silla
  - un asiento
  lexicon: HALOT
  rationale: En el inventario doméstico, «silla» es la traducción más natural y concreta para el uso del término.
- source_word: מְנוֹרָה
  english_pob_choice: a lampstand
  chosen_spanish: un candelabro
  alternatives_spanish:
  - un candelabro
  - un portalampar
  - una lámpara
  lexicon: HALOT
  rationale: מְנוֹרָה designa más específicamente un candelabro o soporte para luz que una simple lámpara. «Candelabro» conserva esa especificidad en español.
- source_word: וְהָיָה בְּבֹאוֹ אֵלֵינוּ
  english_pob_choice: and whenever he comes to us
  chosen_spanish: y cuando venga a nosotros
  alternatives_spanish:
  - y cuando venga a nosotros
  - y cuando él venga a nosotros
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia futura/habitual. «Cuando venga a nosotros» reproduce bien el valor prospectivo sin añadir elementos ajenos.
- source_word: יָסוּר שָׁמָּה
  english_pob_choice: he can turn in there
  chosen_spanish: se apartará allí
  alternatives_spanish:
  - se apartará allí
  - podrá pasar allí
  - se detendrá allí
  lexicon: HALOT
  rationale: סוּר significa apartarse/retirarse de un trayecto; en contexto de hospedaje, el POB inglés opta por «turn in». «Se apartará allí» mantiene el movimiento de desviarse para alojarse sin sobreinterpretar duración.
theological_decisions:
- issue: La designación de la habitación construida para Eliseo y el matiz del refugio temporal
  english_pob_reading: a small upper room on the wall ... he can turn in there
  chosen_spanish_reading: una pequeña habitación superior en el muro ... se apartará allí
  alternative_spanish_readings:
  - una pequeña habitación superior en el muro ... podrá quedarse allí
  - una pequeña habitación superior adosada al muro ... se apartará allí
  rationale: No hay una cuestión doctrinal fuerte, pero sí una tensión lexical entre describir la estructura y expresar su función. La redacción conserva la imagen concreta del muro y el sentido de alojamiento ocasional sin convertirlo en una habitación permanente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto español sigue la última revisión del POB inglés, que sustituyó «then whenever» por «and whenever» para reflejar la simple conjunción de manera más natural. También conserva la decisión auditable de traducir la frase compacta עֲלִיַּת קִיר como una habitación superior vinculada al muro, y de renderizar יָסוּר en un sentido de hospedaje temporal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton.
  - Se usa vocabulario doméstico común y claro («cama», «mesa», «silla», «candelabro») para que el inventario sea inmediatamente inteligible.
  - «Muro» se eligió para reflejar la concreción física del hebreo, en paralelo al inglés POB «on the wall».
