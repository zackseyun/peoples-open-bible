revisions:
- from: Temían a Yahvé[a], y se nombraron para sí sacerdotes de los lugares altos[b], que les servían en las casas de los lugares altos.
  to: Temían a Yahvé, y nombraron para sí, de entre todo su pueblo[a], sacerdotes de los lugares altos[b], que les servían en las casas de los lugares altos.
  rationale: Se añadió el complemento ‘de entre todo su pueblo’ para reflejar מִקְצוֹתָם según la decisión auditada, se reformuló el verbo para evitar la ambigüedad de ‘se nombraron’, y se reubicó la nota léxica al lugar donde realmente corresponde la alternativa preservada por el POB inglés.
