source:
  edition: WLC
  text: שִׁ֥יר הַֽ/מַּֽעֲל֗וֹת לִ/שְׁלֹ֫מֹ֥ה אִם יְהוָ֤ה לֹא יִבְנֶ֬ה בַ֗יִת שָׁ֤וְא עָמְל֣וּ בוֹנָ֣י/ו בּ֑/וֹ אִם יְהוָ֥ה לֹֽא יִשְׁמָר עִ֝֗יר שָׁ֤וְא שָׁקַ֬ד שׁוֹמֵֽר־׀־׀־־־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/127/000.yaml
  text: A Song of Ascents[a]. Of Solomon. Unless Yahweh builds the house, its builders labor over it in vain. Unless Yahweh guards the city[c][b], the watchman stays awake in vain.
  footnotes:
  - marker: a
    text: Or 'For Solomon' or 'Belonging to Solomon'; the Hebrew superscription can indicate authorship, dedication, or association.
    reason: alternative_reading
  - marker: b
    text: '''House'' may also carry the broader sense of ''household'' or ''dynasty'' in Hebrew usage.'
    reason: lexical_alternative
  - marker: c
    text: Or 'its builders labor in vain in it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:38Z'
    unchanged: false
    changes_summary: Completed the verse by translating the full Hebrew text after the superscription; rendered יְהוָה as 'Yahweh' and preserved the parallel structure with natural formal English.
translation:
  language: es
  text: Cántico de las Subidas. De Salomón[a]. Si Yahvé no edifica la casa[b], en vano trabajan sus edificadores[c]; si Yahvé no guarda la ciudad, en vano vela el centinela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para Salomón» o «Perteneciente a Salomón»; el encabezamiento hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: «Casa» también puede abarcar en hebreo el sentido más amplio de «hogar» o «dinastía».
    reason: lexical_alternative
  - marker: c
    text: O «sus edificadores trabajan en vano en ella».
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de las Subidas
  alternatives_spanish:
  - Canto de ascenso
  - Cántico de ascensiones
  lexicon: שִׁיר
  rationale: «Cántico» comunica bien el género poético-litúrgico. «Subidas» conserva la imagen tradicional del hebreo y evita una paráfrasis interpretativa excesiva; «ascensiones» suena menos natural en español.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Of Solomon
  chosen_spanish: De Salomón
  alternatives_spanish:
  - Para Salomón
  - Perteneciente a Salomón
  lexicon: ל
  rationale: La preposición puede indicar autoría, dedicación o asociación. «De Salomón» mantiene esa ambigüedad, en línea con el nota del inglés POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: יהוה
  rationale: 'Se sigue el criterio editorial del POB en español: usar «Yahvé» como forma explícita del Nombre divino, sin mascarlo como título.'
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  - linaje
  - dinastía
  lexicon: בית
  rationale: «Casa» es la correspondencia directa y mantiene la metáfora concreta del texto. La nota del POB inglés advierte que puede extenderse a «familia» o «dinastía» según contexto, pero aquí la imagen primaria es arquitectónica.
- source_word: בּוֹנָיו
  english_pob_choice: its builders
  chosen_spanish: sus edificadores
  alternatives_spanish:
  - los que la edifican
  - sus constructores
  lexicon: בנה
  rationale: «Edificadores» conserva el vínculo verbal con «edifica» y la fuerza formal del participio. «Constructores» es posible, pero menos bíblico; «los que la edifican» es más explicativo.
- source_word: שָׁוְא
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin provecho
  - inútilmente
  lexicon: שׁוא
  rationale: «En vano» es la equivalencia estable y reproduce la evaluación de inutilidad/frustración presente en el hebreo y en la tradición de la POB.
- source_word: עָמְלוּ
  english_pob_choice: labor
  chosen_spanish: trabajan
  alternatives_spanish:
  - se afanan
  - se esfuerzan
  - fatigan
  lexicon: עמל
  rationale: El verbo comunica esfuerzo fatigoso. «Trabajan» suena más natural en español y preserva el sentido general; las alternativas intensifican el matiz de fatiga, pero podrían sonar más interpretativas en esta línea breve.
- source_word: יִשְׁמָר
  english_pob_choice: guards
  chosen_spanish: guarda
  alternatives_spanish:
  - vigila
  - custodia
  lexicon: שמר
  rationale: «Guarda» es directo, formal y bíblico; mantiene la acción protectora del vigilante sobre la ciudad.
- source_word: שׁוֹמֵר
  english_pob_choice: watchman
  chosen_spanish: centinela
  alternatives_spanish:
  - vigía
  - guarda
  lexicon: שמר
  rationale: «Centinela» comunica la función de vigilancia con dignidad y claridad. «Vigía» también es posible, pero «centinela» encaja mejor con el paralelismo de guardar/velar.
theological_decisions:
- issue: Tetragrámaton como Nombre divino explícito
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto contrapone la acción divina con el trabajo humano. Mantener el Nombre propio evita la ocultación del referente y sigue la política del proyecto de traducir directamente el Nombre divino.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Sentido posible de בַּיִת como casa material o casa = hogar/linaje
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - hogar
  - familia
  - linaje
  - dinastía
  rationale: En este versículo la imagen inmediata es la edificación de una casa; sin embargo, se reconoce que el sustantivo hebreo puede ampliarse a hogar, familia o dinastía. La nota preserva esa tensión sin resolverla unilateralmente.
  doctrine_reference: Semántica bíblica del sustantivo בית
- issue: Paralelismo de labor humana frustrada frente a acción soberana de Yahvé
  english_pob_reading: Unless Yahweh builds/guards ... in vain
  chosen_spanish_reading: Si Yahvé no edifica/guarda ... en vano
  alternative_spanish_readings:
  - A menos que Yahvé edifique/guarde ...
  - Salvo que Yahvé edifique/guarde ...
  rationale: «Si ... no» refleja de manera natural la condición negativa y mantiene el paralelismo del hebreo sin introducir una explicación excesiva. La idea central es la inutilidad del esfuerzo humano sin la acción de Yahvé.
  doctrine_reference: Providencia divina y dependencia humana
translation_notes:
  revision_awareness: El inglés POB completó el versículo entero a partir del hebreo y adoptó «Yahweh» en el texto principal. También suavizó una frase final que sonaba redundante en inglés, sin cambiar el sentido. En español se conserva la plenitud del paralelismo hebreo y se mantiene la ambigüedad auditada de בַּיִת mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Nombre divino, consistente con el estándar del proyecto.
  - Se usa «Cántico de las Subidas» para armonizar género y registro bíblico sin latinizar innecesariamente.
  - «Edificadores» y «centinela» sostienen un registro bíblico claro y evitan modernizaciones excesivas.
  - La nota sobre «casa» preserva la tensión semántica documentada en el inglés POB, en vez de fijar unilateralmente un solo sentido.
