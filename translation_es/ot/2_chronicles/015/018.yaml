translation:
  language: es
  text: 'Llevó a la casa de Dios las cosas santas[a] de su padre y sus propias cosas santas[b]: plata, oro y utensilios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «las cosas que su padre había dedicado».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «las cosas que él mismo había dedicado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: He brought
  chosen_spanish: Lo introdujo
  alternatives_spanish:
  - Lo trajo
  - Lo llevó dentro
  lexicon: HALOT
  rationale: El hitpael/hiphil narrativo de בוא expresa hacer entrar algo; en español, "introdujo" conserva la idea de entrada en un lugar sagrado con tono natural y fiel al movimiento hacia el interior.
- source_word: קָדְשֵׁי אָבִיו
  english_pob_choice: his father's holy things
  chosen_spanish: las cosas santas de su padre
  alternatives_spanish:
  - las cosas dedicadas de su padre
  - las cosas consagradas de su padre
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto "cosas" porque el hebreo no dice "dones" sino objetos apartados para uso sagrado. "Santas" preserva el valor cultual del término sin forzar una paráfrasis.
- source_word: וְקָדָשָׁיו
  english_pob_choice: and his own holy things
  chosen_spanish: sus cosas santas
  alternatives_spanish:
  - las cosas dedicadas por él
  - sus cosas consagradas
  lexicon: HALOT
  rationale: La frase paralela requiere reflejar que se trata de objetos apartados por Asa mismo. "Sus" deja claro el contraste con "de su padre" y conserva la simetría del hebreo.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: '"Casa de Dios" es la correspondencia directa y transparente de בית האלהים. En español bíblico actual, "casa de Dios" sigue siendo claro y fiel al giro hebreo.'
- source_word: כֶּסֶף וְזָהָב וְכֵלִים
  english_pob_choice: silver, gold, and vessels
  chosen_spanish: la plata, el oro y los utensilios
  alternatives_spanish:
  - la plata, el oro y los vasos
  - la plata, el oro y los objetos
  lexicon: HALOT
  rationale: '"Utensilios" conserva el rango amplio de כלים como implementos o artículos del santuario. Se evita "vasos" por ser más estrecho en español contemporáneo, aunque sigue siendo posible en contexto litúrgico.'
theological_decisions:
- issue: Interpretación de קָדְשִׁים como objetos dedicados o consagrados, no como santidad abstracta
  english_pob_reading: holy things / things dedicated for sacred use
  chosen_spanish_reading: cosas santas
  alternative_spanish_readings:
  - cosas dedicadas
  - cosas consagradas
  rationale: El texto enumera objetos trasladados a la casa de Dios, así que la carga es cultual y material. "Cosas santas" conserva la tensión entre lo santo como cualidad y lo apartado para uso sagrado, sin resolverla artificialmente hacia "dones".
  doctrine_reference: Santificación/culto en el AT; dedicación de bienes al servicio de Yahvé
- issue: Referencia a la "casa de Dios" como espacio de culto
  english_pob_reading: house of God
  chosen_spanish_reading: casa de Dios
  alternative_spanish_readings:
  - templo de Dios
  rationale: Se preserva la fórmula hebrea tradicional sin sustituirla por una interpretación más explícita. Esto mantiene el vínculo con el vocabulario del texto fuente y con el entorno narrativo del culto.
  doctrine_reference: Lugar santo / santuario en la narrativa deuteronomista y cronística
translation_notes:
  revision_awareness: El audit trail inglés revisó 'holy gifts' a 'holy things' para ajustarse más al hebreo, que no explicita 'dones'. La versión española sigue ese ajuste y evita añadir una noción de regalo. También conserva la lista final de metales y utensilios como apposición de los objetos dedicados.
  spanish_consistency_notes:
  - Se usó "casa de Dios" de forma consistente con el hebreo בית האלהים.
  - Se evitó "SEÑOR" porque aquí el hebreo dice "Dios", no el nombre divino.
  - '"Utensilios" se eligió para abarcar la amplitud de כֵלִים en contexto del templo.'
  - Las notas [a] y [b] están ancladas en el texto para reflejar las alternativas léxicas documentadas.
