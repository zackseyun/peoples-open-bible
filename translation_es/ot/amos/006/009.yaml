translation:
  language: es
  text: Y sucederá que, si diez hombres quedan[a] en una sola casa, morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «quedan» en lugar de «quedan». El verbo hebreo denota ser dejado o quedar después de que otros se han ido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: La forma hebrea introduce una situación futura; "sucederá" conserva bien ese valor discursivo en español actual sin recurrir a un arcaísmo.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula expresa una condición; "si" evita convertir la cláusula en una certeza temporal más fuerte de la que marca el hebreo.
- source_word: יִוָּתְרוּ
  english_pob_choice: remain
  chosen_spanish: quedan
  alternatives_spanish:
  - son dejados
  - quedan como restantes
  - sobreviven
  lexicon: HALOT
  rationale: El nifal de יתר expresa ser dejado/ quedar. "Quedan" es natural en español y conserva la idea de remanente sin añadir explícitamente la noción interpretativa de supervivencia.
- source_word: עֲשָׂרָה אֲנָשִׁים
  english_pob_choice: ten men
  chosen_spanish: diez hombres
  alternatives_spanish:
  - diez personas
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino explícito; "hombres" mantiene ese rasgo gramatical y evita neutralizar indebidamente el término.
- source_word: בְּבַיִת אֶחָד
  english_pob_choice: in one house
  chosen_spanish: en una sola casa
  alternatives_spanish:
  - en una casa
  - en una única casa
  lexicon: HALOT
  rationale: '"Casa" reproduce el referente concreto del hebreo, y "una sola" refuerza la unicidad del espacio sin desplazar el sentido hacia una unidad familiar.'
- source_word: וָמֵתוּ
  english_pob_choice: they will die
  chosen_spanish: morirán
  alternatives_spanish:
  - y morirán
  - entonces morirán
  lexicon: HALOT
  rationale: El verbo continúa el resultado futuro de la cláusula; "morirán" fluye con naturalidad en español y mantiene el contenido directo del hebreo.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; la puntuación y el sentido global son estables. La versión española sigue de cerca el valor futuro-condicional del hebreo y conserva la alternativa léxica principal en nota.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - '"Hombres" reproduce el masculino plural del hebreo; no se neutraliza a "personas" porque no hay indicio textual para ello.'
  - La nota reproduce la alternativa léxica documentada para יִוָּתְרוּ sin ampliar indebidamente el alcance semántico a "sobrevivir".
