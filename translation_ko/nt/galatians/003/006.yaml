id: GAL.3.6
reference: Galatians 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καθὼς Ἀβραὰμ ἐπίστευσεν τῷ θεῷ, καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/006.yaml
  text: Just as Abraham believed God[a], and it was counted to him as righteousness,
  footnotes:
  - marker: a
    text: 'Or "justice."'
    reason: lexical_alternative
translation:
  language: ko
  text: 이는 「아브라함이 하나님을 믿었고, 그것이 그에게 의로 여겨졌다」고 한 것과 같습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπίστευσεν τῷ θεῷ
  english_pob_choice: believed God
  chosen_korean: 하나님을 믿다
  alternatives_korean:
  - 하나님을 신뢰하다
  lexicon: BDAG
  rationale: 여격은 신뢰의 대상을 가리킨다. 「하나님을 믿다」가 표준.
- source_word: ἐλογίσθη … εἰς δικαιοσύνην
  english_pob_choice: was counted to him as righteousness
  chosen_korean: 그에게 의로 여겨졌다
  alternatives_korean:
  - 그에게 의로 인정되었다
  - 그에게 의로 계산되었다
  lexicon: BDAG
  rationale: λογίζομαι의 「계산하다·여기다」 의미를 「여기다」로 옮긴다. 창 15:6 인용의 정립된 한국어 표현.
theological_decisions:
- issue: 창세기 15:6 인용에서 칭의 언어 일관성
  chosen_reading: 그에게 의로 여겨졌다 (수동형)
  alternative_readings:
  - 하나님이 그를 의롭게 여기셨다 (능동 풀이)
  rationale: 헬라어는 수동형이며, 신적 수동의 의미를 보존하기 위해 한국어도 수동을 유지한다. 「의」는 글로사리에 따라 「의」(義)를 일관되게 사용한다.
  doctrine_reference: 'DOCTRINE.md: Pauline justification language'
