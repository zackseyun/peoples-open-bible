    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad al pasivo hebreo y a la decisión de traducir חַטָּאת como «pecado» en ambas ocurrencias. Se revisa únicamente la formulación de la descripción del animal para que el español sea más natural sin omitir la especificación explícita de sexo del hebreo, y se mejora la puntuación.
