base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/012.yaml
  text: For I will pass through the land of Egypt on this night[a], and I will strike every firstborn in the land of Egypt, from man to beast; and against all the gods of Egypt I will execute judgments[c][b]. I am Yahweh.
  footnotes:
  - marker: a
    text: Or 'I will go through.' The verb here means passing through the land, not 'passing over' in the sense of sparing.
    reason: lexical_alternative
