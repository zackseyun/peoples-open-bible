translation:
  language: es
  text: 'diciendo[a]: «Una fuerza se ha reunido contra ellos de Ptolemaida y Tiro y Sidón y toda Galilea de los extranjeros, para exterminarnos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda Galilea de los gentiles». El griego dice literalmente «toda Galilea de los extranjeros», usando un término para gente de otra nación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπισυνήχθη
  english_pob_choice: A force has gathered
  chosen_spanish: Una fuerza se ha reunido
  alternatives_spanish:
  - Se ha congregado una fuerza
  - Un grupo se ha reunido
  - Se ha juntado una fuerza
  lexicon: LSJ
  rationale: El griego pasivo de ἐπισυνάγω conserva la idea de una reunión o concentración. «Se ha reunido» mantiene el pasivo y suena natural en español; «fuerza» expresa el sujeto colectivo implícito sin introducir el término más específico «ejército».
- source_word: ἐπʼ αὐτούς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - para atacarles
  - en su contra
  lexicon: LSJ
  rationale: En contexto militar, ἐπί con acusativo indica dirección hostil. «Contra ellos» es la equivalencia más directa y clara en español.
- source_word: ἐκ Πτολεμαΐδος καὶ Τύρου καὶ Σιδῶνος καὶ πάσης Γαλιλαίας ἀλλοφύλων
  english_pob_choice: from Ptolemais and Tyre and Sidon and all Galilee of the Gentiles
  chosen_spanish: desde Ptolemaida y Tiro y Sidón y toda Galilea de los extranjeros
  alternatives_spanish:
  - desde Ptolemaida, Tiro y Sidón, y toda Galilea de los gentiles
  - desde Ptolemaida y Tiro y Sidón y toda la Galilea extranjera
  lexicon: LSJ
  rationale: Se conservan los topónimos como nombres propios y se traduce ἀλλοφύλων de manera literal-contextual como «extranjeros». La frase griega asocia esa cualidad con Galilea; «de los extranjeros» mantiene esa relación sin cargar el texto con una categoría teológica posterior.
- source_word: ἀλλοφύλων
  english_pob_choice: the Gentiles / foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los gentiles
  - los de otro pueblo
  - los forasteros
  lexicon: LSJ
  rationale: El término significa personas de otro pueblo o nación. «Extranjeros» es comprensible en español actual y preserva el matiz etnopolítico del pasaje; «gentiles» se reserva como alternativa tradicional posible, pero puede sonar más técnica que el contexto inmediato.
- source_word: τοῦ ἐξαναλῶσαι
  english_pob_choice: to wipe us out
  chosen_spanish: para exterminarnos
  alternatives_spanish:
  - para destruirnos
  - para acabar con nosotros
  - para aniquilarnos
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. ἐξαναλίσκω apunta a destrucción total; «exterminarnos» transmite con fuerza ese sentido de aniquilación completa en español.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - nuestro pueblo
  lexicon: LSJ
  rationale: El griego cambia a primera persona plural en el discurso citado; conviene conservarlo de modo directo en español con el pronombre enclítico «nos».
theological_decisions:
- issue: ἀλλόφυλοι en un relato histórico-militar de 1 Macabeos
  english_pob_reading: Gentiles / foreigners
  chosen_spanish_reading: los extranjeros
  alternative_spanish_readings:
  - los gentiles
  - los forasteros
  rationale: Aquí el término funciona principalmente como descriptor étnico-político, no como categoría doctrinal desarrollada. «Los extranjeros» evita imponer un tecnicismo eclesiástico y mantiene la tensión del texto entre identidad propia y alteridad nacional.
  doctrine_reference: 'Principio POB: prioridad del sentido del original y de la inteligibilidad contemporánea sin suavizar distinciones léxicas documentadas.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «A force has gathered» y «Gentiles» por mayor idiomaticidad formal. En español, «una fuerza se ha reunido» mantiene esa naturalidad sin perder el pasivo griego, y «los extranjeros» conserva mejor la fuerza etnolingüística documentada por el audit trail, dejando «gentiles» en nota como alternativa válida.
  spanish_consistency_notes:
  - Se mantiene «Ptolemaida» como transliteración española habitual del topónimo.
  - Se conserva la secuencia de nombres propios sin comas internas para reflejar el polisíndeton del griego.
  - El cambio de referente de «ellos» a «nosotros» queda preservado en el final del versículo, sin armonizarlo.
  - «Extranjeros» se usa en el texto principal como equivalente de ἀλλόφυλοι; «gentiles» queda atestiguado en nota para respetar la tensión lexical del original y del audit trail inglés.
