review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: vergüenza/humillación, levantar el rostro a Dios, multiplicación de las iniquidades y crecimiento de la culpa hasta los cielos. Sin embargo, «para levantar mi rostro» suena menos natural y menos preciso que «de levantar mi rostro» después de «estoy avergonzado y humillado», y la nota al pie contradice el propio texto al ofrecer como alternativa exactamente la misma frase ya usada en el cuerpo.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos reparaciones menores: 1) ajustar la construcción verbal a «avergonzado y humillado de levantar» para una sintaxis más natural y fiel al infinitivo dependiente; 2) corregir la nota [a], que actualmente repite el texto principal en vez de preservar la alternativa singular documentada en la auditoría inglesa.'
  glossary_alignment: 'La terminología está bien alineada: «Dios mío», «iniquidades», «culpa» y «cielos» preservan las distinciones léxicas relevantes. No hay conflicto con los términos project-level. La repetición de «Dios mío» está bien conservada.'
  issues:
  - severity: medium
    issue: Construcción «estoy avergonzado y humillado para levantar mi rostro»
    rationale: En español, tras «estar avergonzado/humillado», la construcción con infinitivo se expresa más naturalmente con «de». «Para levantar» puede sonar final («con el fin de levantar») en vez de expresar aquello que le da vergüenza hacer.
  - severity: medium
    issue: La nota [a] no preserva una alternativa real
    rationale: El texto principal ya dice «sobre nuestras cabezas», y la nota ofrece «O ‘sobre nuestras cabezas’», lo cual es redundante e incorrecto. La alternativa documentada por la auditoría es el singular idiomático «sobre nuestra cabeza».
  revised_spanish_text: 'Y dije[a]: «Dios mío, estoy avergonzado y humillado de levantar mi rostro hacia ti, Dios mío, porque nuestras iniquidades se han multiplicado sobre nuestras cabezas, y nuestra culpa ha crecido hasta los cielos».'
  revised_footnotes:
