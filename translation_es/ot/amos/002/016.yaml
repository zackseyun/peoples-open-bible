revisions:
- from: Hasta el más valiente entre los guerreros huirá desnudo en aquel día —declara Yahvé[a].
  to: Aun el valiente de corazón entre los guerreros huirá desnudo en aquel día, declara Yahvé[a].
  rationale: Se reemplaza 'Hasta el más valiente' por 'Aun el valiente de corazón' para conservar mejor el idiomatismo hebreo אַמִּיץ לִבּוֹ sin añadir un superlativo. Se mantiene 'entre los guerreros', 'desnudo', 'en aquel día' y 'Yahvé' por su fidelidad y naturalidad. La nota se ajusta para reflejar mejor la alternativa léxica documentada en el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido básico del hebreo: el más valiente entre los combatientes huirá desnudo en el día del juicio, y conserva adecuadamente el nombre divino como Yahvé. Sin embargo, la redacción principal no preserva del todo la fuerza idiomática de אַמִּיץ לִבּוֹ, porque ''Hasta el más valiente'' intensifica con ''más'' algo que el hebreo no dice y desplaza al texto principal una interpretación superlativa que en realidad no está en la fuente.'
  spanish_quality_summary: El español es claro y natural, con buen tono bíblico moderno. No obstante, 'Hasta el más valiente' suena algo interpretativo; 'aun el valiente de corazón' o 'aun el de corazón valiente' refleja mejor la estructura y el énfasis del original. También conviene alinear mejor la nota con la alternativa documentada en inglés ('entre los hombres poderosos / los guerreros').
  glossary_alignment: 'Buen cumplimiento general del glosario: יְהוָה se vierte correctamente como ''Yahvé''; גִּבּוֹרִים como ''guerreros'' es apropiado en contexto militar; עָרוֹם como ''desnudo'' y יָנוּס como ''huirá'' son fieles. La única desalineación relevante está en אַמִּיץ לִבּוֹ, donde el borrador explica bien el idiomatismo en las decisiones léxicas, pero el texto principal lo reduce a una formulación superlativa no presente en la fuente.'
  issues:
  - severity: medium
    issue: '''Hasta el más valiente'' introduce un superlativo no explícito en אַמִּיץ לִבּוֹ'
    rationale: El hebreo describe al 'fuerte/valiente de corazón' entre los guerreros, no necesariamente 'al más valiente'. 'Hasta/aun el valiente de corazón' preserva mejor el giro idiomático y el efecto retórico.
  - severity: low
    issue: La nota alternativa no refleja de manera óptima la alternativa inglesa 'among the mighty men'
    rationale: Ya que el inglés preserva una alternativa léxica con 'mighty men', en español conviene ofrecer una nota como 'entre los hombres poderosos' o similar, no simplemente repetir casi la misma redacción principal.
  revised_spanish_text: Aun el valiente de corazón entre los guerreros huirá desnudo en aquel día, declara Yahvé[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Aun el de corazón valiente entre los hombres poderosos huirá desnudo en aquel día»'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'Hasta el más valiente' por 'Aun el valiente de corazón' para conservar mejor el idiomatismo hebreo אַמִּיץ לִבּוֹ sin añadir un superlativo. Se mantiene 'entre los guerreros', 'desnudo', 'en aquel día' y 'Yahvé' por su fidelidad y naturalidad. La nota se ajusta para reflejar mejor la alternativa léxica documentada en el audit trail inglés.
