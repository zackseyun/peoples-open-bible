translation:
  language: es
  text: Y sus hermanos, los levitas, estaban asignados para todo el servicio del tabernáculo de la casa de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron dados»; el participio hebreo dice literalmente «dados», aquí en el sentido de haber sido asignados o puestos a cargo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y los hermanos de ellos
  lexicon: HALOT
  rationale: El hebreo usa el término de parentesco אֲחֵי con sufijo plural de tercera persona. En español, «hermanos» conserva la transparencia del vínculo familiar y, como en el audit trail inglés, puede abarcar a los miembros del mismo linaje o clan.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas (del linaje de Leví)
  lexicon: HALOT
  rationale: «Levitas» es el equivalente estándar y preciso del designativo tribal. Mantiene el valor gentilicio sin añadir glosa innecesaria.
- source_word: נְתוּנִים
  english_pob_choice: were appointed
  chosen_spanish: estaban asignados
  alternatives_spanish:
  - fueron puestos
  - estaban dados
  lexicon: HALOT
  rationale: El participio pasivo de נתן significa literalmente «dados», pero en este contexto administrativo-cultual expresa asignación a una función. «Estaban asignados» conserva la idea de designación y evita una literalidad poco natural; al mismo tiempo no borra la tensión léxica documentada.
- source_word: לְכָל
  english_pob_choice: for all
  chosen_spanish: para todo
  alternatives_spanish:
  - para cada
  - para todo el
  lexicon: HALOT
  rationale: La preposición ל con כָּל marca ámbito total de la tarea. «Para todo» comunica la totalidad de la asignación de manera natural en español.
- source_word: עֲבוֹדַת
  english_pob_choice: the service
  chosen_spanish: el servicio
  alternatives_spanish:
  - la obra
  - el trabajo
  lexicon: HALOT
  rationale: En contexto cultual, עֲבוֹדָה es el servicio realizado en el santuario. «Servicio» evita tanto un calco rígido como la terminología eclesiástica de «ministerio», que aquí sería menos precisa.
- source_word: מִשְׁכַּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es la equivalencia estable y más reconocible para מִשְׁכָּן en registro cultual. Conserva el referente del santuario portátil sin desplazarlo a un término más interpretativo.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de Dios». En español, «casa de Dios» preserva la forma constructa y evita sustituirla por «templo», lo cual podría borrar el contraste documental entre «tabernáculo» y «casa» presente en el hebreo.
theological_decisions:
- issue: Relación entre «tabernáculo» y «casa de Dios»
  english_pob_reading: Rendered both terms distinctly as "the tabernacle of the house of God" rather than collapsing them into a single term like "temple."
  chosen_spanish_reading: 'Se mantuvieron distinguidos «el tabernáculo» y «la casa de Dios» como una sola expresión coordinada por genitivo: «el tabernáculo de la casa de Dios».'
  alternative_spanish_readings:
  - «el servicio de la casa de Dios»
  - «el tabernáculo de Dios»
  - «el templo de Dios»
  rationale: El hebreo contiene ambos sustantivos, מִשְׁכַּן y בֵּית הָאֱלֹהִים. La traducción española conserva los dos para no aplanar la formulación del Cronista ni resolver de antemano la tensión entre lenguaje de tabernáculo y lenguaje de casa/templo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El hebreo y el audit trail inglés concuerdan en un valor literal de «dados» para נְתוּנִים, con una lectura contextual de asignación. La redacción española adopta «estaban asignados» para naturalidad, sin perder la alternativa literal documentada en la nota.
  spanish_consistency_notes:
  - Se preserva el lenguaje cultual con «tabernáculo» y «casa de Dios» sin sustituirlo por «templo».
  - «Levitas» mantiene el término tribal estándar y no introduce glosa teológica adicional.
  - La nota usa corchete anclado al sintagma final, como exige el registro POB.
