translation:
  language: es
  text: No estuve en paz[a], ni estuve tranquilo; no tuve reposo, y vino la agitación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no estaba a gusto ... no estaba calmado ... no descansé». El hebreo usa tres verbos casi paralelos para intensificar la falta de alivio de Job.
    reason: lexical_alternative
  - marker: b
    text: O «vino el trastorno» o «vino la turbación». El sustantivo puede expresar perturbación, desasosiego o agitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַוְתִּי
  english_pob_choice: I was at ease
  chosen_spanish: No tuve paz
  alternatives_spanish:
  - No estuve a gusto
  - No estuve tranquilo
  - No viví en calma
  lexicon: HALOT
  rationale: El verbo expresa ausencia de sosiego, tranquilidad o seguridad interior. En español, «no tuve paz» comunica bien esa falta de descanso del ánimo sin sonar forzado, y mantiene el valor experiencial del hebreo.
- source_word: שָׁקַטְתִּי
  english_pob_choice: I was quiet
  chosen_spanish: no estuve tranquilo
  alternatives_spanish:
  - no estuve en silencio
  - no estuve calmado
  - no estuve sosegado
  lexicon: HALOT
  rationale: שׁקט señala quietud o ausencia de perturbación. «Tranquilo» conserva la distinción con el primer miembro y suena natural en español, sin borrar la intensificación poética.
- source_word: נָחְתִּי
  english_pob_choice: I was at rest
  chosen_spanish: no tuve reposo
  alternatives_spanish:
  - no descansé
  - no hallé descanso
  - no me aquieté
  lexicon: HALOT
  rationale: נוח apunta a reposo o descanso. «Tuve reposo» reproduce la idea de estado, y en negación mantiene el paralelo con las otras dos cláusulas.
- source_word: רֹגֶז
  english_pob_choice: turmoil
  chosen_spanish: tumulto
  alternatives_spanish:
  - turbación
  - agitación
  - trastorno
  - tormento
  lexicon: HALOT
  rationale: רֹגֶז puede abarcar agitación, disturbio o turbulencia. «Tumulto» es una opción española amplia y vigorosa que conserva la irrupción de desorden sin limitarla a ira o a simple dificultad.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - sobrevino
  - se presentó
  lexicon: HALOT
  rationale: El verbo marca la llegada del sustantivo final. «Vino» es breve y fiel; «sobrevino» sería más interpretativo al añadir matiz de irrupción.
- source_word: לֹא ... וְלֹא ... וְלֹא
  english_pob_choice: I was not ... and I was not ...; I was not ...
  chosen_spanish: No ... no ... no ...
  alternatives_spanish:
  - Ni ... ni ... ni ...
  - No tuve ...; no estuve ...; no tuve ...
  lexicon: Hebrew syntax
  rationale: La triple negación consecutiva reproduce la cadencia enfática del hebreo. En español, repetir «no» mantiene el ritmo de lamento y la intensificación progresiva mejor que compactar en una sola estructura.
translation_notes:
  revision_awareness: El inglés POB se mantuvo muy cerca del hebreo y ya había señalado la intensificación de tres verbos casi paralelos. La versión española conserva esa triple serie con negación repetida, y ajusta el cierre a una palabra de amplio campo semántico («tumulto») para reflejar רֹגֶז sin estrecharlo indebidamente.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y poético propio de Job.
  - Se evitó introducir un sujeto explícito innecesario, porque el español lo recupera por la flexión verbal.
  - Se conservó la diferencia entre paz, tranquilidad y reposo para reflejar las tres verbos hebreos cercanos pero no idénticos.
