base_translation:
  language: en
  yaml_path: translation/ot/isaiah/003/016.yaml
  text: 'And Yahweh said: Because the daughters of Zion are haughty[a], and walk with outstretched necks, glancing with their eyes, walking and mincing as they go, and making a jingling with their feet[b],'
  footnotes:
  - marker: a
    text: Or 'making their anklets jingle with their feet.' The Hebrew verb likely refers to producing a tinkling or jingling sound, probably from ankle ornaments, though 'anklets' is not stated explicitly in this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'casting seductive glances with their eyes.' The Hebrew expression is rare and may refer to flirtatious or deceptive eye movements.
    reason: lexical_alternative
