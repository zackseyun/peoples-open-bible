translation:
  language: es
  text: 'En cuanto al que tiene la enfermedad de la piel, en quien está la infección, sus vestidos serán rasgados, llevará el cabello desarreglado, cubrirá su bigote[a], y clamará: «¡Impuro, impuro!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubrirá su labio superior». La expresión hebrea se refiere a cubrir el área del labio o del bigote como señal de luto y advertencia pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצָּרוּעַ
  english_pob_choice: the one with the skin disease
  chosen_spanish: el que tiene la enfermedad de la piel
  alternatives_spanish:
  - el leproso
  - la persona afligida por una enfermedad de la piel
  - el enfermo de la piel
  lexicon: HALOT
  rationale: La forma hebrea describe a una persona marcada por una afección cutánea ritual; en español, «el que tiene la enfermedad de la piel» evita el término tradicional «leproso», que puede sugerir indebidamente una enfermedad moderna específica, y conserva el sentido categorial del hebreo.
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la infección
  alternatives_spanish:
  - la enfermedad
  - la aflicción
  - la plaga
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de usar un término natural y concreto. «Infección» funciona como equivalente contextual para el estado aflictivo señalado por el texto, sin imponer necesariamente una idea médica moderna ajena al pasaje.
- source_word: בְּגָדָיו יִהְיוּ פְרֻמִים
  english_pob_choice: his clothes shall be torn
  chosen_spanish: sus vestidos serán rasgados
  alternatives_spanish:
  - sus ropas serán rasgadas
  - sus vestidos serán rotos
  - sus prendas serán rasgadas
  lexicon: HALOT
  rationale: פְרֻמִים indica vestiduras rasgadas o rotas como señal visible de luto y humillación. «Vestidos» conserva un registro digno y bíblico, mientras «rasgados» transmite bien el gesto ritual/publico.
- source_word: וְרֹאשׁוֹ יִהְיֶה פָרוּעַ
  english_pob_choice: his head shall be left unkempt
  chosen_spanish: su cabeza quedará despeinada
  alternatives_spanish:
  - su cabeza quedará desgreñada
  - su cabello quedará suelto
  - llevará el cabello desordenado
  lexicon: HALOT
  rationale: פָרוּעַ expresa un aspecto de desorden, desarreglo o cabello suelto/no arreglado. «Despeinada» comunica de manera natural en español el estado visible de desaliño sin forzar una descripción técnica del peinado.
- source_word: וְעַל שָׂפָם יַעְטֶה
  english_pob_choice: he shall cover his mustache
  chosen_spanish: cubrirá su bigote
  alternatives_spanish:
  - cubrirá su labio superior
  - cubrirá la parte superior de su boca
  - se cubrirá el bigote
  lexicon: HALOT
  rationale: 'Sigo la equivalencia de la POB inglesa: el término hebreo puede referirse al área del labio superior o del bigote. «Bigote» ofrece una versión idiomática breve, y el sentido alternativo queda preservado en la nota.'
- source_word: וְטָמֵא טָמֵא יִקְרָא
  english_pob_choice: he shall cry out, ‘Unclean, unclean!’
  chosen_spanish: 'clamará: «¡Impuro, impuro!»'
  alternatives_spanish:
  - 'proclamará: «¡Impuro, impuro!»'
  - 'gritará: «¡Impuro, impuro!»'
  - 'dirá: «¡Impuro, impuro!»'
  lexicon: HALOT
  rationale: «Impuro» conserva el valor ritual de טָמֵא sin cargar de inmediato con culpa moral o con categorías médicas modernas. «Clamará» mantiene el carácter público y alertante del verbo hebreo, equivalente al English POB «cry out».
theological_decisions:
- issue: Sentido ritual de טָמֵא
  english_pob_reading: Render טָמֵא as 'unclean' in its ritual/public-status sense without importing moral guilt or modern medical categories.
  chosen_spanish_reading: Traducirlo como «impuro» en sentido ritual y de estatus público, sin introducir culpa moral ni categorías médicas modernas.
  alternative_spanish_readings:
  - inmundo
  - contaminado
  - manchado
  rationale: En Levítico 13, טָמֵא marca una condición de impureza ritual y exclusión pública. «Impuro» es claro en español y conserva la tensión teológica del texto sin resolverla hacia moralidad personal o medicina contemporánea.
  doctrine_reference: Principio de primacía del original; preservar la tensión teológica de la pureza ritual
- issue: Cobertura del labio superior / bigote
  english_pob_reading: The Hebrew expression refers to covering the area of the lip/mustache as a sign of mourning and public warning.
  chosen_spanish_reading: El hebreo se refiere a cubrir el área del labio superior o del bigote como signo de duelo y advertencia pública.
  alternative_spanish_readings:
  - cubrirse el labio superior
  - cubrirse la boca
  - tapar el rostro
  rationale: La imagen no debe reducirse a un detalle de arreglo personal; es una señal pública de aflicción y advertencia. La nota preserva la alternativa literal, coherente con la auditoría inglesa.
  doctrine_reference: Lexical tension preserved; no smoothing of culturally marked gesture
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió «the man» por «the one» para reflejar mejor la ausencia de un término de género explícito en el hebreo. La redacción española evita también especificar género donde el hebreo no lo exige, y mantiene la secuencia de acciones rituales y la advertencia pública del texto.
  spanish_consistency_notes:
  - Se usa «impuro» de manera ritual, coherente con el tratamiento POB de טָמֵא en este contexto.
  - Se prefiere «enfermedad de la piel» sobre «lepra» para evitar una identificación médica moderna no sustentada por el pasaje.
  - «Clamará» reproduce el carácter público y sonoro del anuncio final.
  - La nota al pie preserva la alternativa literal del hebreo sin sobrecargar el texto principal.
