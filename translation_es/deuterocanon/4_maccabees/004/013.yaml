translation:
  language: es
  text: Afligido por estas palabras, Onias, el sumo sacerdote, aunque por otra parte cuidándose de que el rey Seleuco no llegara a pensar que Apolonio había sido eliminado[a] por una trama humana y no por justicia divina, ofreció alguna oración acerca de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había sido matado por un complot humano y no por juicio divino». El griego puede expresarse de forma más directa así, aunque aquí se conserva un giro más formal y abstracto.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente que Onias «oró algo acerca de él», dejando algo abierto si la oración fue por Apolonio o acerca del asunto que lo involucraba.
    reason: alternative_reading
lexical_decisions:
- source_word: τούτοις ἐπαχθεὶς τοῖς λόγοις
  english_pob_choice: Distressed by these words
  chosen_spanish: Afligido por estas palabras
  alternatives_spanish:
  - afligido por estas palabras
  - apresado por estas palabras
  - agobiado por estas palabras
  lexicon: LSJ
  rationale: ἐπαχθεὶς expresa estar cargado o pesado por lo dicho; «afligido» comunica bien el impacto emocional en español sin volverlo interpretativo de más. «Por estas palabras» conserva el valor causal del dativo con el demostrativo implícito en el contexto.
- source_word: Ὀνίας ὁ ἀρχιερεύς
  english_pob_choice: Onias the high priest
  chosen_spanish: Onias, el sumo sacerdote
  alternatives_spanish:
  - Onias, el sumo sacerdote
  - Onias, el pontífice
  lexicon: LSJ
  rationale: «Sumo sacerdote» es la equivalencia clara y eclesialmente inteligible para ὁ ἀρχιερεύς. Se evita «pontífice» por ser menos natural en español contemporáneo.
- source_word: εὐλαβηθεὶς
  english_pob_choice: being careful
  chosen_spanish: estaba prevenido
  alternatives_spanish:
  - estaba cuidadoso
  - estaba cauteloso
  - estaba prevenido
  lexicon: LSJ
  rationale: Aquí el verbo apunta a cautela respecto de cómo el rey podría interpretar los hechos, no principalmente a reverencia religiosa. «Estaba prevenido» transmite esa prudencia vigilante en español natural.
- source_word: μὴ ποτε νομίσειεν
  english_pob_choice: lest King Seleucus might ever think
  chosen_spanish: no fuera a pensar alguna vez el rey Seleuco
  alternatives_spanish:
  - no fuera a pensar el rey Seleuco
  - no pensara alguna vez el rey Seleuco
  - no llegara a pensar el rey Seleuco
  lexicon: LSJ
  rationale: La construcción expresa temor ante una posible conclusión futura. «No fuera a pensar alguna vez» conserva la fuerza de prevención y el matiz de ποτε («alguna vez/ever»).
- source_word: ἐξ ἀνθρωπίνης ἐπιβουλῆς
  english_pob_choice: by human plotting
  chosen_spanish: por una trama humana
  alternatives_spanish:
  - por una trama humana
  - por una conspiración humana
  - por intriga humana
  lexicon: LSJ
  rationale: ἐπιβουλή puede denotar un plan hostil o conspiración. «Trama humana» es idiomática y mantiene el contraste con la causa divina sin sobreespecificar.
- source_word: θείας δίκης
  english_pob_choice: divine justice
  chosen_spanish: justicia divina
  alternatives_spanish:
  - justicia divina
  - juicio divino
  - vindicacion divina
  lexicon: LSJ
  rationale: «Justicia divina» preserva δίκη como justicia/rectitud y evita definir más de lo que dice el griego. Mantiene la tensión teológica entre agencia humana y acción divina.
- source_word: ἀνηρῆσθαι τὸν Ἀπολλώνιον
  english_pob_choice: had been done away with
  chosen_spanish: había sido eliminado
  alternatives_spanish:
  - había sido eliminado
  - había sido muerto
  - había sido destruido
  lexicon: LSJ
  rationale: El infinitivo perfecto de ἀναιρέω puede significar «quitar de en medio», «matar» o «hacer desaparecer». «Había sido eliminado» conserva el registro formal del griego y evita estrechar prematuramente el sentido a «muerto».
- source_word: ηὔξατό τι περὶ αὐτοῦ
  english_pob_choice: offered some prayer concerning him
  chosen_spanish: ofreció alguna oración acerca de él
  alternatives_spanish:
  - ofreció alguna oración acerca de él
  - hizo alguna oración por él
  - oró algo respecto de él
  lexicon: LSJ
  rationale: La expresión es deliberadamente indefinida por el τι. «Acerca de él» mantiene la apertura del griego sobre si la oración fue por Apolonio o en torno al asunto que lo involucraba.
theological_decisions:
- issue: Relación entre θείας δίκης y la causa de la muerte de Apolonio
  english_pob_reading: Rendered as 'divine justice' without specifying 'God' explicitly
  chosen_spanish_reading: «justicia divina» sin explicitar «Dios»
  alternative_spanish_readings:
  - justicia de Dios
  - juicio divino
  - vindicacion divina
  rationale: El griego usa θείας, un adjetivo que permite una formulación más general. «Justicia divina» conserva la afirmación teológica sin introducir un sujeto explícito que el texto no nombra en esta cláusula.
  doctrine_reference: Preservar la tensión del texto fuente sin resolverla por tradición de traducción.
- issue: Ambigüedad de περὶ αὐτοῦ después de ηὔξατό τι
  english_pob_reading: Rendered neutrally as 'offered some prayer concerning him'
  chosen_spanish_reading: «ofreció alguna oración acerca de él»
  alternative_spanish_readings:
  - oró por él
  - oró acerca del asunto
  - hizo una oración por él
  rationale: El griego deja abierto si la oración era a favor de Apolonio o sobre el asunto relativo a él. La versión neutra preserva esa ambigüedad en vez de decidirla.
  doctrine_reference: Preservar la tensión semántica y no imponer una lectura devocional más precisa que el original.
translation_notes:
  revision_awareness: Se revisó la coherencia con el audit trail inglés y no se detectaron cambios posteriores que obliguen a desviar el sentido del griego. La redacción española conserva la ambigüedad de περὶ αὐτοῦ y el valor formal de ἀνηρῆσθαι, sin mecanizar el texto inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponde; este versículo no contiene el nombre divino explícito.
  - Se usó «sumo sacerdote» como término estable y claro para ὁ ἀρχιερεύς.
  - Se evitó «SEÑOR» o formulaciones litúrgicas no presentes en el griego.
  - La oración conserva un registro bíblico sobrio y publicable, sin arcaísmos innecesarios.
