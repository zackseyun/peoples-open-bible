- from: 'Y él me dijo[a]: «Ven y mira las abominaciones malvadas que están haciendo aquí».'
  to: 'Y me dijo[a]: «Ven y ve las abominaciones perversas que están haciendo aquí».'
  rationale: Se elimina «él» por naturalidad española, se ajusta «mira» a «ve» para reflejar más directamente ראה en esta secuencia imperativa, y se reemplaza «malvadas» por «perversas» para una combinación más idiomática y digna en español sin perder la fuerza moral de הָרָעוֹת.
