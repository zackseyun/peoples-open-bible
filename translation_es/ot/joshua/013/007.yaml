translation:
  language: es
  text: Ahora[a], reparte esta tierra como herencia para las nueve tribus y la media tribu de Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Y ahora, reparte esta tierra para herencia a las nueve tribus y media tribu de Manasés".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Captura la transición discursiva y el tono imperativo inmediato. 'Ahora' es natural en español moderno; 'Y ahora' también es posible, pero añade una coordinación menos necesaria en esta frase.
- source_word: חַלֵּק
  english_pob_choice: divide
  chosen_spanish: reparte
  alternatives_spanish:
  - divide
  - distribuye
  lexicon: HALOT
  rationale: En contexto de asignación territorial, 'reparte' comunica con claridad la acción de distribuir la tierra entre los grupos. 'Divide' es más literal, pero en español puede sonar menos natural aquí; 'distribuye' es posible, aunque un poco más administrativo.
- source_word: אֶת הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra
  - esta región
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien el campo semántico de אֶרֶץ en Josué y suena natural en español bíblico actual. ''Región'' sería más interpretativo y estrecho.'
- source_word: בְּנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - en heredad
  lexicon: HALOT
  rationale: '''Herencia'' mantiene el valor de asignación recibida y la resonancia pactal del término. ''En heredad'' sería más tradicional, pero menos natural; ''posesión'' pierde el matiz de reparto por asignación.'
- source_word: לְתִשְׁעַת הַשְּׁבָטִים
  english_pob_choice: to the nine tribes
  chosen_spanish: para las nueve tribus
  alternatives_spanish:
  - a las nueve tribus
  lexicon: HALOT
  rationale: '''Para'' expresa bien el destinatario de la repartición en español. ''A'' también es posible, pero ''para'' suena más natural con ''repartir'' en este contexto.'
- source_word: וַחֲצִי הַשֵּׁבֶט הַמְנַשֶּׁה
  english_pob_choice: and the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la semitribu de Manasés
  - la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: '''Media tribu'' es la forma más clara y común en español para esta subdivisión tribal. Se conserva el nombre propio ''Manasés'' según la pauta del proyecto.'
theological_decisions:
- issue: Valor de נַחֲלָה en el reparto de la tierra
  english_pob_reading: as an inheritance
  chosen_spanish_reading: como herencia
  alternative_spanish_readings:
  - como posesión
  - en heredad
  rationale: Se preserva la idea de asignación recibida, no solo de propiedad material. En Josué, la tierra funciona como don y reparto ordenado dentro del marco del pacto; 'herencia' conserva mejor ese trasfondo que 'posesión'.
  doctrine_reference: Reparto de la tierra prometida / herencia tribal en Josué
- issue: Presentación de la media tribu de Manasés
  english_pob_reading: and the half-tribe of Manasseh
  chosen_spanish_reading: la media tribu de Manasés
  alternative_spanish_readings:
  - la semitribu de Manasés
  - la mitad de la tribu de Manasés
  rationale: Se evita una traducción técnica poco natural ('semitribu') y se conserva la realidad histórica/administrativa del grupo. 'Media tribu' es inteligible y fiel al reparto narrado.
  doctrine_reference: Organización tribal de Israel en la conquista y reparto de la tierra
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el hebreo y con la auditoría inglesa. La única zona de decisión relevante en español es el verbo de reparto ('reparte' frente a 'divide') y la preposición de finalidad/beneficiario ('para' frente a 'a'), manteniendo intacto el sentido de asignación territorial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - '''Manasés'' conserva el nombre propio bíblico estándar en español.'
  - '''Herencia'' se eligió para reflejar el sentido legal y pactal de נַחֲלָה sin introducir tecnicismos innecesarios.'
  - La puntuación y la sintaxis siguen el orden natural del español sin alterar las relaciones semánticas del hebreo.
