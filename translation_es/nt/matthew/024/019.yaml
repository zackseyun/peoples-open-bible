translation:
  language: es
  text: ¡Ay de las que están encinta y de las que amamantan en aquellos días[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘O: «las mujeres embarazadas y las mujeres que amamantan a sus lactantes».’
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de...!
  - ¡Ay!
  - ¡Desdicha!
  lexicon: BDAG
  rationale: ‘Ay’ reproduce el tono profético de lamento y alarma de οὐαί mejor que una formulación más explicativa; en español bíblico introduce con naturalidad la exclamación de pesar.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - Pero
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aunque δὲ puede marcar transición, en este dicho la fuerza primaria está en la exclamación; en español queda absorbida en la construcción exclamativa sin perder el avance discursivo respecto del versículo anterior.
- source_word: ταῖς ἐν γαστρὶ ἐχούσαις
  english_pob_choice: those who are pregnant
  chosen_spanish: las que están encinta
  alternatives_spanish:
  - las que están embarazadas
  - las que están preñadas
  - las mujeres encintas
  lexicon: BDAG
  rationale: El modismo griego ἐν γαστρὶ ἔχω expresa embarazo. ‘Están encinta’ es una forma natural, digna y fiel, y evita explicar de más el sujeto femenino que ya está claro por la forma participial.
- source_word: γαστρί
  english_pob_choice: pregnant
  chosen_spanish: encinta
  alternatives_spanish:
  - embarazadas
  - con hijo en el vientre
  lexicon: BDAG
  rationale: Dentro del modismo, no conviene traducir literalmente ‘vientre’ porque sonaría extrañamente corporal en español; ‘encinta’ conserva el sentido de embarazo con concisión y registro bíblico moderado.
- source_word: ταῖς θηλαζούσαις
  english_pob_choice: those who are nursing infants
  chosen_spanish: las que amamantan
  alternatives_spanish:
  - las que dan de mamar
  - las que crían a sus niños
  - las que están amamantando
  lexicon: BDAG
  rationale: θηλάζω significa amamantar o dar pecho. En español, ‘las que amamantan’ es claro y directo; no se añade ‘infantes’ porque el verbo ya implica a un niño lactante y el griego no lo explicita con un sustantivo.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: BDAG
  rationale: ‘Aquellos días’ reproduce bien la deixis temporal remota de ἐκείναις y mantiene el tono bíblico sin arcaísmo innecesario.
theological_decisions:
- issue: Referencia femenina implícita en los participios
  english_pob_reading: Render generically as 'those who are pregnant' and 'those who are nursing infants' rather than explicitly 'women.'
  chosen_spanish_reading: 'Traducir con formas femeninas implícitas: ‘las que están encinta’ y ‘las que amamantan’.'
  alternative_spanish_readings:
  - las mujeres que están encinta
  - las mujeres que amamantan
  rationale: El griego usa participios femeninos dativos, por lo que la referencia femenina está presente sin necesidad de añadir explícitamente ‘mujeres’. El español puede mantener esa precisión con el artículo femenino plural, conservando el enfoque en la condición vulnerable sin sobreexpansión.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Tono de lamento/juicio en οὐαί
  english_pob_reading: woe
  chosen_spanish_reading: ¡Ay de...!
  alternative_spanish_readings:
  - ¡desdicha a...!
  - ¡pena a...!
  rationale: La exclamación ‘¡Ay de...!’ conserva el valor profético de lamentación y advertencia de juicio. No se suaviza a un mero ‘desdichadas’ porque eso perdería el peso oracular del término.
  doctrine_reference: BDAG; traducción profética de lamentación
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones posteriores; el texto español sigue la misma lectura estable, preservando la exclamación profética, el modismo de embarazo y el paralelo entre dos condiciones de especial vulnerabilidad.
  spanish_consistency_notes:
  - Se prefirió ‘encinta’ frente a ‘embarazada’ para mantener un registro bíblico natural y fiel al modismo griego.
  - Se evitó añadir ‘infantes’ o ‘niños’ en el texto principal porque el participio θηλαζούσαις ya comunica la idea de lactancia.
  - Se conservó la deixis remota con ‘aquellos días’, equivalente habitual de ἐκείναις ταῖς ἡμέραις.
