base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/016/016.yaml
  text: 'Three times a year all your males shall appear before Yahweh your God in the place that he will choose: at the Feast of Unleavened Bread[a], at the Feast of Weeks, and at the Feast of Booths[c][b]. No one shall appear before Yahweh empty-handed.'
  footnotes:
  - marker: a
    text: Or 'shall be seen before the LORD'; the Hebrew verb is literally passive/reflexive, but in this context it functions as the idiom for presenting oneself before God.
    reason: lexical_alternative
  - marker: b
    text: '''The Feast of Booths'' is traditionally rendered ''the Feast of Tabernacles.'''
    reason: alternative_reading
  - marker: c
    text: '''Empty-handed'' means coming without the required gift or offering.'
    reason: cultural_note
