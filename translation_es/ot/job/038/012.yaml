- from: ¿Has[a] mandado, en tus días, a la mañana, y hecho que el alba conozca su lugar?
  to: ¿Has dado órdenes a la mañana, en tus días[a], y has hecho saber al alba su lugar?
  rationale: Se ajustó la sintaxis para un español más natural y fiel al tono poético, manteniendo la personificación y el valor causativo del hebreo. También se movió la nota al lugar exacto que explica.
