review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y preserva correctamente «Dios de mi justicia» y la imagen espacial de רחב. Sin embargo, «Cuando te llamo» introduce un objeto explícito («te») que no está en בְּקָרְאִי y puede desviar el foco; mejor «Cuando llamo» o «Cuando clamo». Además, חָנֵּנִי queda atenuado en «Sé bondadoso conmigo»; una formulación con «ten gracia de mí» o «sé propicio conmigo» sería más cercana, pero en español eclesial contemporáneo «ten misericordia de mí» suena natural aunque interpreta un poco. La mejor solución fiel y legible es «tenme gracia», que no es natural; por tanto conviene «sé propicio conmigo» o «muéstrame tu favor».
  spanish_quality_summary: El español es claro y digno en general. «Me has dado espacio» funciona, aunque suena algo coloquial; aun así preserva bien la metáfora y es aceptable con nota. El principal problema de legibilidad/fidelidad es «Cuando te llamo», porque el añadido pronominal no es necesario. «Sé bondadoso conmigo» suena natural, pero pierde la terminología de gracia/favor que el POB quiere conservar cuando es posible.
  glossary_alignment: No hay conflictos con los términos de proyecto mayores. «Dios» está bien. «Dios de mi justicia» sigue la decisión teológica documentada. Conviene alinear mejor חנן con «gracia/favor» en vez de «bondadoso».
  issues:
  - severity: medium
    issue: «Cuando te llamo» añade un complemento no expreso en el hebreo.
    rationale: בְּקָרְאִי significa literalmente «cuando llamo» / «cuando clamo». En el contexto de oración se sobreentiende que llama a Dios, pero el POB inglés retuvo la formulación no expandida. El español puede hacer lo mismo sin perder claridad.
  - severity: medium
    issue: «Sé bondadoso conmigo» debilita la fuerza léxica de חָנֵּנִי.
    rationale: חנן apunta a gracia/favor concedido por Dios. «Bondadoso» comunica amabilidad general más que favor inmerecido. Es mejor una opción que conserve la idea de favor divino, como «muéstrame tu favor».
  revised_spanish_text: Cuando llamo[a], respóndeme, oh Dios de mi justicia. En la angustia me has dado espacio[b]. Muéstrame tu favor y oye mi oración.
  revised_footnotes:
