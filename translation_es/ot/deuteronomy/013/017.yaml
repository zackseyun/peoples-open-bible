translation:
  language: es
  text: Reunirás todo su botín en medio de su plaza abierta, y quemarás con fuego la ciudad y todo su botín como ofrenda completa[a] a Yahvé tu Dios. Quedará como un montón perpetuo de ruinas[b]; no se volverá a edificar jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «por completo para Yahvé tu Dios». El hebreo כָּלִיל puede entenderse como adverbio («totalmente») o con fuerza sacrificial, indicando algo enteramente consumido para Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un montículo para siempre» o «un montón eterno», es decir, una ruina permanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלָלָהּ
  english_pob_choice: its spoil
  chosen_spanish: su botín
  alternatives_spanish:
  - su despojo
  - su presa
  lexicon: HALOT
  rationale: שָׁלָל designa bienes tomados en guerra como botín/despojo. 'Botín' es natural en español jurídico-narrativo y conserva el sentido de bienes capturados sin introducir matices ajenos.
- source_word: תִּקְבֹּץ
  english_pob_choice: you shall gather
  chosen_spanish: Reunirás
  alternatives_spanish:
  - Juntarás
  - Recogerás
  lexicon: HALOT
  rationale: El perfecto/imperfecto exhortativo hebreo en contexto legal se expresa bien con futuro de mandato. 'Reunirás' mantiene la directividad y suena más digno que un calco rígido.
- source_word: אֶל תּוֹךְ רְחֹבָהּ
  english_pob_choice: into the middle of its open square
  chosen_spanish: en medio de su plaza abierta
  alternatives_spanish:
  - en medio de su plaza
  - en el centro de su explanada
  lexicon: HALOT
  rationale: רְחוֹב indica un espacio público amplio, no una calle estrecha. 'Plaza abierta' comunica la imagen urbana y el lugar de reunión del botín mejor que 'calle'.
- source_word: וְשָׂרַפְתָּ בָאֵשׁ
  english_pob_choice: and you shall burn ... with fire
  chosen_spanish: prenderás fuego ...
  alternatives_spanish:
  - quemarás ... con fuego
  - incendiarás ...
  lexicon: HALOT
  rationale: La expresión hebrea describe destrucción por fuego; en español, 'prenderás fuego' es idiomático y preserva la fuerza activa del mandato.
- source_word: כָּלִיל
  english_pob_choice: as a whole offering
  chosen_spanish: como ofrenda completa
  alternatives_spanish:
  - por entero
  - como ofrenda totalmente consumida
  - como ofrenda íntegra
  lexicon: HALOT
  rationale: כָּלִיל puede entenderse adverbialmente ('por completo') o con fuerza sacrificial. Se traduce 'ofrenda completa' para conservar la resonancia cultual sin forzar el tecnicismo de 'holocausto'.
- source_word: לַ/יהוָ֖ה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para el Dios Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del proyecto, 'Yahvé', en vez de enmascararlo como 'SEÑOR'. La preposición 'a' expresa dedicación/ofrecimiento de manera natural en español.
- source_word: תֵּל עוֹלָם
  english_pob_choice: a perpetual ruin mound
  chosen_spanish: un montículo ruinoso perpetuo
  alternatives_spanish:
  - un montón eterno de ruinas
  - un montículo para siempre
  lexicon: HALOT
  rationale: תֵּל es literalmente un montículo/colina de ruinas; עוֹלָם añade duración indefinida. 'Montículo ruinoso perpetuo' conserva la imagen física y el carácter duradero de desolación.
- source_word: לֹא תִבָּנֶה עוֹד
  english_pob_choice: it shall not be rebuilt again
  chosen_spanish: no se volverá a edificar jamás
  alternatives_spanish:
  - no será reconstruida nunca más
  - no se edificará de nuevo
  lexicon: HALOT
  rationale: El nifal con עוֹד expresa prohibición o resultado permanente. 'No se volverá a edificar jamás' transmite bien la irreversibilidad del mandato en español natural.
theological_decisions:
- issue: Fuerza cultual de כָּלִיל en la quema de la ciudad
  english_pob_reading: '''as a whole offering to Yahweh your God'' preserves sacrificial nuance without importing ''burnt offering'' too strongly.'
  chosen_spanish_reading: '''como ofrenda completa a Yahvé tu Dios'' conserva la idea de consagración total sin imponer un término sacrificial más técnico de lo que el contexto exige.'
  alternative_spanish_readings:
  - '''por completo para Yahvé tu Dios'''
  - '''como holocausto a Yahvé tu Dios'''
  rationale: El contexto une destrucción total y dedicación a Dios. 'Ofrenda completa' mantiene la tensión entre consumición total y carácter devocional, evitando a la vez borrar la dimensión cultual o reemplazarla por una simple idea de destrucción.
  doctrine_reference: Translation philosophy §1, §3, §6; Contested terms table for YHWH
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: la traducción inglesa quedó estable (high_agreement, sin cambios). La redacción española sigue esa decisión auditada y solo adapta el sintagma de destino a una forma más natural en español, sin perder la tensión léxica de כָּלִיל ni la imagen de תֵּל עוֹלָם.'
  spanish_consistency_notes:
  - Se mantiene Yahvé en el texto principal, coherente con la política del proyecto para יהוה.
  - '''Botín'' conserva el valor de שָׁלָל sin suavizarlo a ''despojo'' o ''presa''.'
  - '''Plaza abierta'' traduce רְחוֹב con un término urbano comprensible en español latinoamericano.'
  - La nota de כָּלִיל preserva la alternativa cultual/adverbial que el audit trail documenta.
  - '''Montículo ruinoso'' mantiene la imagen de una ruina visible y permanente, no una mera abstracción.'
