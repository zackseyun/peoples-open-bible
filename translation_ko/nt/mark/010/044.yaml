id: MRK.10.44
reference: Mark 10:44
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὃς ⸀ἂν θέλῃ ⸂ἐν ὑμῖν εἶναι⸃ πρῶτος, ἔσται πάντων δοῦλος·
base_translation:
  language: en
  yaml_path: translation/nt/mark/010/044.yaml
  text: And whoever wants to be first among you will be the slave of all[a].
  footnotes:
  - marker: a
    text: Or "servant of all." The Greek word is doulos, a stronger term than the word for "servant" in the previous verse, so "slave" is used here to preserve the contrast.
    reason: alternative_reading
translation:
  language: ko
  text: 그리고 누구든지 여러분 가운데서 첫째가 되고자 하면, 모든 사람의 노예가 되어야 합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 하인
  lexicon: BDAG
  rationale: DOCTRINE.md는 δοῦλος의 매임(bonded status)을 신학적으로 드러내야 한다고 명시한다. 한국 전통의 「종」은 그 무게를 약화시키므로, 본문의 충격적 강도를 보존하기 위해 「노예」로 옮긴다. 9:35과 10:43의 διάκονος(섬기는 자)와 의도적으로 구별한다.
theological_decisions:
- issue: 10:44의 δοῦλος를 매임의 무게를 살린 강한 어휘로 번역
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 섬기는 자
  - 하인
  rationale: 마가의 점층 구조(διάκονος → διάκονος → δοῦλος)는 섬김의 자세에서 매임의 정체성으로의 강화이다. 한국 전통의 「종」은 두 단어 모두를 평탄화하여 이 점층을 가린다. 「노예」는 사회적으로 충격적이지만 본문의 충격을 그대로 전달한다. 본문은 메시아의 길이 자발적 자기-매임임을 선포한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος'
