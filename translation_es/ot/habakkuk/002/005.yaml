translation:
  language: es
  text: Además[a], el vino traiciona; un hombre arrogante no permanece en reposo[b]. Él amplía su apetito como el Seol[c], y es como la muerte y nunca se sacia. Reúne para sí a todas las naciones y junta para sí a todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el vino es traicionero» o «el vino engaña». El hebreo es conciso y algo difícil; algunos intérpretes conectan la línea de manera más amplia con la arrogancia embriagada del conquistador.
    reason: lexical_alternative
  - marker: b
    text: O «no se queda en casa» o «no permanece» / «no habita». El verbo hebreo es difícil; el texto principal refleja la idea de inestabilidad inquieta en este contexto.
    reason: lexical_alternative
  - marker: c
    text: Seol es el ámbito de los muertos; también puede verterse «la tumba».
    reason: cultural_note
lexical_decisions:
- source_word: וְאַף כִּי
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Y además
  - Asimismo
  - Por otra parte
  lexicon: HALOT
  rationale: La combinación inicial es una transición enfática y aditiva. «Además» transmite bien ese avance argumental sin forzar una causalidad que el hebreo no expresa de modo directo.
- source_word: הַיַּיִן
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  - la bebida fermentada
  lexicon: HALOT
  rationale: El sustantivo es directo y no exige paráfrasis. Se conserva «vino» porque el texto hebreo lo nombra explícitamente y la formulación española resulta natural.
- source_word: בּוֹגֵד
  english_pob_choice: betrays
  chosen_spanish: traiciona
  alternatives_spanish:
  - es traicionero
  - engaña
  - obra con perfidia
  lexicon: HALOT
  rationale: El participio comunica conducta infiel o pérfida. «Traiciona» reproduce esa fuerza moral con un verbo natural en español y mantiene la personificación del vino.
- source_word: גֶּבֶר
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombre fuerte
  - un guerrero
  lexicon: HALOT
  rationale: Aquí el término funciona de modo genérico para el individuo orgulloso bajo juicio. «Un hombre» es la opción más clara y sobria en español.
- source_word: יָהִיר
  english_pob_choice: arrogant
  chosen_spanish: arrogante
  alternatives_spanish:
  - soberbio
  - orgulloso
  - haughty
  lexicon: HALOT
  rationale: El adjetivo señala insolencia y presunción. «Arrogante» conserva bien el tono moral negativo que requiere el contexto.
- source_word: וְלֹא יִנְוֶה
  english_pob_choice: does not remain at rest
  chosen_spanish: no permanece en reposo
  alternatives_spanish:
  - no se queda en casa
  - no habita
  - no descansa
  lexicon: HALOT
  rationale: El verbo es difícil y admite varias lecturas relacionadas con morar, permanecer o reposar. «No permanece en reposo» comunica la inestabilidad inquieta que el contexto exige, sin fijar más de lo que el hebreo permite.
- source_word: אֲשֶׁר
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - que
  - el que
  lexicon: HALOT
  rationale: La relativa hebrea se vierte con una retomada pronominal para evitar aspereza. «Él» conserva la referencia al hombre soberbio y mantiene la fluidez en español.
- source_word: הִרְחִיב
  english_pob_choice: enlarges
  chosen_spanish: Amplía
  alternatives_spanish:
  - ensancha
  - agranda
  - hace ancho
  lexicon: HALOT
  rationale: El hiphil expresa hacer ancho o ensanchar. «Amplía» preserva la metáfora de expansión y suena idiomático con «apetito».
- source_word: כִּשְׁאוֹל
  english_pob_choice: like Sheol
  chosen_spanish: como el Seol
  alternatives_spanish:
  - como la tumba
  - como el abismo
  - como el mundo de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico «Seol» para no reducirlo a «tumba» o «sepulcro». En español puede explicarse como el ámbito de los muertos, pero el texto principal mantiene el referente cultural bíblico.
- source_word: נַפְשׁוֹ
  english_pob_choice: his appetite
  chosen_spanish: su apetito
  alternatives_spanish:
  - su alma
  - su deseo
  - su vida
  lexicon: HALOT
  rationale: Aunque נֶפֶשׁ puede significar «alma» o «vida», aquí la imagen es de voracidad insaciable. «Apetito» expresa mejor esa fuerza metafórica en español y evita una lectura demasiado abstracta.
- source_word: וְהוּא כַמָּוֶת
  english_pob_choice: and he is like death
  chosen_spanish: y es como la muerte
  alternatives_spanish:
  - y es como la muerte misma
  - y es cual muerte
  lexicon: HALOT
  rationale: Se mantiene la comparación directa con «la muerte», conservando el paralelismo y la personificación de una realidad insaciable.
- source_word: וְלֹא יִשְׂבָּע
  english_pob_choice: and is never satisfied
  chosen_spanish: y nunca se sacia
  alternatives_spanish:
  - y no se satisface
  - y no queda satisfecho
  - y jamás se sacia
  lexicon: HALOT
  rationale: La forma imperfecta expresa una condición persistente. «Nunca se sacia» es idiomático y comunica con fuerza la insaciabilidad continua.
- source_word: וַיֶּאֱסֹף אֵלָיו
  english_pob_choice: He gathers to himself
  chosen_spanish: Reúne a sí mismo
  alternatives_spanish:
  - junta a sí mismo
  - recoge para sí
  - reúne para sí
  lexicon: HALOT
  rationale: El verbo implica reunir/recoger con dirección hacia sí. «Reúne a sí mismo» conserva la fuerza reflexiva-acumulativa del hebreo, aunque suena algo más explícito que la forma breve inglesa.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a todas las naciones de la tierra
  lexicon: HALOT
  rationale: Se conserva «naciones» para distinguirlo de עַמִּים en la línea siguiente y mantener el paralelismo hebreo.
- source_word: וַיִּקְבֹּץ אֵלָיו
  english_pob_choice: and collects to himself
  chosen_spanish: y junta a sí mismo
  alternatives_spanish:
  - y reúne a sí mismo
  - y acumula para sí
  lexicon: HALOT
  rationale: El segundo verbo repite la idea de reunir, pero con matiz de amontonar/convocar. «Junta» mantiene el paralelismo sin sonar demasiado repetitivo frente a «reúne».
- source_word: כָּל הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - a todas las gentes
  - a todos los pueblos de la tierra
  lexicon: HALOT
  rationale: Se traduce distinto de גוֹיִם para preservar la pareja hebrea «naciones/pueblos» en lugar de colapsarla en una sola palabra española.
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol is the realm of the dead; alternatively, 'the grave.'
  chosen_spanish_reading: Seol se conserva como el ámbito de los muertos, no reducido a una tumba individual.
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el mundo de los muertos
  rationale: El hebreo usa un término culturalmente cargado que no equivale sin más a una tumba física. Mantener «Seol» preserva el imaginario bíblico y evita una reducción interpretativa.
  doctrine_reference: Concepto bíblico del Seol / estado de los muertos
- issue: Personificación del vino y del hombre arrogante
  english_pob_reading: wine betrays; an arrogant man does not remain at rest
  chosen_spanish_reading: 'El verso conserva la doble referencia: el vino es presentado como traicionero y el hombre arrogante como inquieto e insaciable.'
  alternative_spanish_readings:
  - el vino es engañoso
  - el hombre soberbio no se queda en casa
  rationale: El hebreo permite leer el vino como agente figurado y, en el contexto, al soberbio conquistador como sujeto principal de la denuncia. La traducción no elimina esa tensión; la mantiene con una sintaxis que deja ver ambas capas.
  doctrine_reference: Lectura contextual del juicio profético y del lenguaje figurado
- issue: Insaciabilidad como juicio
  english_pob_reading: like death and is never satisfied
  chosen_spanish_reading: La comparación con la muerte y la falta de saciedad se mantienen como rasgos de voracidad destructiva.
  alternative_spanish_readings:
  - como la muerte no se sacia
  - y jamás queda satisfecho
  rationale: El paralelismo hebreo subraya una hambre que no se llena. «Nunca se sacia» conserva esa idea sin suavizar el juicio profético.
  doctrine_reference: Imágenes proféticas de insaciabilidad y destrucción
translation_notes:
  revision_awareness: 'Se ha seguido el estado de revisión más reciente del contexto inglés, que indica que no hubo cambios adicionales: el texto base permanece estable. La versión española mantiene las mismas decisiones clave auditadas: el inicio aditivo, la conservación de Seol, la lectura de la insaciabilidad y la distinción entre «naciones» y «pueblos».'
  spanish_consistency_notes:
  - Se conserva «Seol» en el texto principal para mantener el término técnico bíblico.
  - Se distingue «naciones» de «pueblos» para reflejar el paralelismo hebreo.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - La sintaxis española sigue de cerca el flujo del hebreo sin forzar una paráfrasis explicativa.
  - Los marcadores de nota se colocan solo donde el texto principal presenta una decisión lexicográfica o cultural relevante.
