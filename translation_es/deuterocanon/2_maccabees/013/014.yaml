    issue: Construcción española algo poco natural con infinitivos coordinados
    rationale: «Y después de encomendar..., y exhortar...» suena menos idiomático en español bíblico fluido. Una reformulación como «y de exhortar» o mejor «después de encomendar..., exhortó...»/«tras encomendar..., exhortando...» preserva el sentido y mejora la legibilidad.
  - severity: low
    issue: Registro algo técnico en «comunidad política»
