theological_decisions:
- issue: Referent of the pronouns in the accusation against idolatry
  chosen_reading: The Chaldeans are said to dishonor the idols by exposing their impotence through appeals to Bel on behalf of a mute person.
  alternative_readings:
  - The Chaldeans dishonor their own gods generally
  - The line may imply contemptuous treatment of the images themselves rather than a broader theological judgment
  rationale: The immediate context is a sustained polemic against idols' inability to act. The syntax and following example support reading the dishonor as practical exposure of the idols' helplessness.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity where present.
