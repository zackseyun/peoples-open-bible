id: MAT.8.20
reference: Matthew 8:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ ὁ Ἰησοῦς· Αἱ ἀλώπεκες φωλεοὺς ἔχουσιν καὶ τὰ πετεινὰ τοῦ οὐρανοῦ κατασκηνώσεις, ὁ δὲ υἱὸς τοῦ ἀνθρώπου οὐκ ἔχει ποῦ τὴν κεφαλὴν κλίνῃ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/020.yaml
  text: 'And Jesus says to him[a], “Foxes have dens, and the birds of the sky have nests[d][c][b], but the Son of Man has nowhere to lay his head.”'
  footnotes:
  - marker: a
    text: Or “holes” for “dens.”
    reason: lexical_alternative
  - marker: b
    text: Or “the birds of heaven” or traditionally “the birds of the air.”
    reason: lexical_alternative
  - marker: c
    text: Or “roosting places” for “nests.”
    reason: lexical_alternative
  - marker: d
    text: “The Son of Man” is Jesus’ self-designation; alternatively, some render it “the Human One.”
    reason: alternative_reading
translation:
  language: ko
  text: '예수님이 그에게 말씀하셨습니다. 「여우들에게는 굴이 있고 하늘의 새들에게는 보금자리가 있으나, 인자는 머리를 둘 곳이 없다.」'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 인자(ὁ υἱὸς τοῦ ἀνθρώπου) 호칭 보존
  chosen_reading: 인자
  alternative_readings:
  - 사람의 아들
  rationale: 복음서 전반의 자칭 칭호로서 다니엘 7:13의 종말론적 인물을 환기한다. 「사람의 아들」은 풀어쓰면 칭호성이 약해지므로 한국 전통 번역의 「인자」를 유지한다.
