- from: 'Y Abimelec dijo a Abraham: «¿Qué son estas siete corderas[a] que has puesto aparte, por sí mismas?»'
  to: 'Y Abimelec dijo a Abraham: «¿Qué son estas siete corderas[a] que has puesto aparte?»'
  rationale: Se elimina la redundancia de «aparte, por sí mismas» para lograr un español más natural sin perder el matiz de separación presente en הִצַּבְתָּ לְבַדָּנָה. La nota conserva la alternativa más literal y explica la decisión contextual.
