  to: 'El Señor Yahvé ha jurado por sí mismo—oráculo de Yahvé, el Dios de los ejércitos[a]: Aborrezco la soberbia[b] de Jacob, y odio sus palacios[c]; y entregaré la ciudad y todo lo que la llena.'
  rationale: 'Se corrigieron las notas para que coincidan con el sentido y el anclaje del texto fuente y del audit trail inglés: la nota sobre צְבָאוֹת se colocó junto a «el Dios de los ejércitos» y se reformuló en español; se añadió la alternativa «majestad» para גְּאוֹן; y se añadió la nota faltante para אַרְמְנֹתָיו. El texto principal se mantuvo muy cercano al borrador, con un ajuste menor de estilo («Aborrezco» sin «Yo»).'
