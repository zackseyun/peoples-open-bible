review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien la ironía exclamativa de מֶה con «¡Cómo…!» y preserva el paralelismo entre «has ayudado» y «has salvado». También mantiene correctamente la imagen poética de «el brazo». Sin embargo, «a uno sin poder» suena menos natural y algo ambiguo en español bíblico general; «sin fuerzas» refleja mejor לְלֹא כֹחַ en este contexto humano. La nota al pie actual también desfigura el hebreo al introducir preguntas fragmentadas («¿Qué has ayudado?») que no representan bien la alternativa literal documentada.
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste menor para sonar más idiomático y fiel al matiz del verso. «Sin poder» en español puede sugerir autoridad o potestad más que falta de fuerza. «Sin fuerzas» y «sin fuerza» conservan el paralelismo y resultan más claros. La nota debe reformularse para ofrecer la alternativa literal sin crear un español artificial o incorrecto.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal o del glosario del proyecto. Las decisiones léxicas principales son adecuadas: «salvado» para הוֹשַׁעְתָּ y «brazo» para זְרוֹעַ. La única mejora recomendada es ajustar «poder» a «fuerzas» en la primera línea por claridad contextual.'
  issues:
  - severity: medium
    issue: «a uno sin poder» es menos natural y puede sugerir falta de autoridad más que falta de fuerza
    rationale: Aunque reproduce de cerca el inglés auditado, en español de lectura eclesial «sin poder» suele ser más ambiguo. El hebreo apunta a carencia de fuerza/capacidad, y «a uno sin fuerzas» comunica mejor ese sentido.
  - severity: medium
    issue: La nota al pie alternativa está mal formulada y no refleja con precisión la alternativa literal documentada
    rationale: La redacción «¿Qué has ayudado? A uno sin fuerza. ¿Qué has salvado? Un brazo sin vigor» rompe la sintaxis y no corresponde bien al valor exclamativo/interrogativo irónico del hebreo ni a la nota inglesa auditada.
  revised_spanish_text: ¡Cómo has ayudado al que no tiene fuerzas! ¡Cómo has salvado el brazo sin fuerza![a]
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué has ayudado al que no tiene fuerza? ¿Qué has salvado: un brazo sin vigor?». El hebreo es agudamente irónico.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «a uno sin poder» a «al que no tiene fuerzas» para expresar con más naturalidad y precisión la falta de fuerza implicada por לְלֹא כֹחַ. Se conserva «el brazo» como metáfora poética. La nota al pie se rehace para reflejar de manera fiel y comprensible la alternativa más literal documentada en el rastro de auditoría inglés.
