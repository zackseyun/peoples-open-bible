revisions:
- from: Y toda tu valoración[a] será según el siclo del santuario; el siclo será de veinte geras.
  to: Y toda tu tasación[a] será según el siclo del santuario; el siclo será de veinte geras.
  rationale: Se cambia 'valoración' por 'tasación' para una expresión más idiomática y técnica en el contexto legal de Levítico 27. Se corrige la nota al pie para reflejar con mayor precisión la explicación del rastro inglés sobre el 'siclo del santuario' como estándar oficial de medida, evitando una posible ambigüedad.
