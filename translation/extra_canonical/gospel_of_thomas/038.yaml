translation:
  text: Jesus said[a], “Many times you have desired to hear these words that I am
    saying to you, and you have no other from whom to hear them. There will be days
    when you will seek me[d][c][b], and you will not find me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic reads literally ‘this saying’ (singular) before shifting to ‘them/these’
      in the next clause; ‘these words’ harmonizes number for English flow while reflecting
      the plurality of what is being said.
    reason: lexical_alternative
  - marker: b
    text: The phrase ‘no other from whom to hear [them]’ reflects the Coptic construction
      with ⲕⲉⲟⲩⲁ (‘another one’) and ⲛ̄ⲧⲟϥ (‘from him’), which functions here as a
      relative ‘from whom’.
    reason: dialect_note
  - marker: c
    text: Literally, ‘There exist some days to come-to-be,’ a Coptic future-existential
      idiom.
    reason: cultural_note
  - marker: d
    text: Cf. John 7:34; 8:21; 13:33 for a similar motif; Thomas’s wording stands
      on its own and is not conformed to the canonical phrasing.
    reason: cross_reference
lexical_decisions:
- source_word: ϩⲁϩ ⲛⲥⲟⲡ
  chosen: many times
  alternatives:
  - often
  lexicon: Crum; Layton
  rationale: Idiomatic Sahidic expression meaning ‘many times’; retaining the literal
    phrasing preserves Thomas’s blunt cadence.
- source_word: ⲣⲉⲡⲓⲑⲩⲙⲉⲓ
  chosen: desire
  alternatives:
  - long for
  lexicon: Lambdin; Crum
  rationale: Greek loan (ἐπιθυμεῖν) commonly means ‘desire/long for’; ‘desired’ keeps
    the straightforward tone.
- source_word: ⲉⲥⲱⲧⲙ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: Lambdin; Crum
  rationale: Base sense is auditory perception; ‘hear’ avoids interpretive ‘obey’
    or ‘heed’ nuances.
- source_word: ⲡⲉⲓϣⲁϫⲉ ⲡⲁⲓ (with subsequent ⲛⲛⲧⲟⲟⲩ)
  chosen: these words
  alternatives:
  - this saying
  lexicon: Crum; Layton
  rationale: Coptic first has singular ‘this saying’ then shifts to plural pronominal
    ‘them’; ‘these words’ balances number in English while reflecting the content
    spoken.
- source_word: ⲉⲧⲉⲣⲉ … ϫⲱ ⲛⲛⲧⲟⲟⲩ ⲛⲁⲛⲧⲱⲧⲛ
  chosen: that I am saying to you
  alternatives:
  - which I say to you
  lexicon: Layton (syntax)
  rationale: ⲉⲧⲉⲣⲉ with durative sense here fits ‘am saying’; preserves immediacy
    of the discourse.
- source_word: ⲙⲛⲧⲁⲛⲧⲱⲧⲛ ⲕⲉⲟⲩⲁ
  chosen: you have no other
  alternatives:
  - there is no other for you
  lexicon: Crum; Layton
  rationale: The ⲙⲛⲧ- construct with ‘other one’ yields the idiom ‘no other (one)’
    in context; confirmed by the Greek witness.
- source_word: ⲛ̄ⲧⲟϥ (after ⲕⲉⲟⲩⲁ)
  chosen: from whom
  alternatives:
  - from him
  lexicon: Lambdin; Layton
  rationale: Pronominal object supplies a relative sense (‘from whom’) after an indefinite
    antecedent (‘another one’). Rendering as ‘from whom’ is idiomatic English.
- source_word: ⲟⲩⲛ ϩⲉⲛ ϩⲟⲟⲩ ⲛⲁϣⲱⲡⲉ
  chosen: There will be days
  alternatives:
  - Days will come to be
  lexicon: Crum
  rationale: Existential ⲟⲩⲛ with ‘days’ and ⲛⲁϣⲱⲡⲉ (‘come to be’) forms a future-existential
    statement; concise English preserves sense.
- source_word: ⲛⲧⲉ … ϣⲓⲛⲉ
  chosen: when you will seek
  alternatives:
  - in which you seek
  lexicon: Layton (clause structure)
  rationale: ⲛⲧⲉ introduces a temporal clause; future sense is marked by ⲛⲁ- later
    in the verb phrase.
- source_word: ⲛⲁϩⲉ ⲁⲛ ⲉ ⲁⲛⲟⲕ
  chosen: you will not find me
  alternatives:
  - you will not come upon me
  lexicon: Crum; Lambdin
  rationale: ⲛⲁϩⲉ means ‘find’; negative ⲁⲛ with object introduced by ⲉ + pronoun
    ‘me’. Plain ‘find’ fits Thomas’s terse style.
textual_note: 'Dialect: Sahidic with some orthographic variation. The printed line
  shows ⲉⲥⲟⲧⲙⲟⲩ ⲛ̄ⲧⲟⲟⲧϥ, while Dilley normalizes to ⲉⲥⲱⲧⲙ ⲛⲧⲟⲟⲩ ⲛ̄ⲧⲟϥ (‘to hear them
  from him’), smoothing number and vowels. The sequence ⲡⲉⲓϣⲁϫⲉ ⲡⲁⲓ (singular ‘this
  saying’) followed by ⲛⲛⲧⲟⲟⲩ (‘these [things]/them’) yields a number shift typical
  in Coptic; translation aligns number for English readability. No lacunae or conjectural
  restorations are present in this saying in NHC II. The construction ⲙⲛⲧⲁⲛⲧⲱⲧⲛ ⲕⲉⲟⲩⲁ
  … ⲛ̄ⲧⲟϥ is elliptical for ‘there is no other (one) for you from whom [to hear them]’;
  the relative sense is supplied by the pronominal object ⲛ̄ⲧⲟϥ (‘from him’ = ‘from
  whom’). Final ⲛⲁϩⲉ ⲁⲛ ⲉ ⲁⲛⲟⲕ expresses ‘you will not find me,’ with the object marked
  by ⲉ plus pronoun, a known pattern in Sahidic.'
