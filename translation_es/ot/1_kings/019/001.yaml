revisions:
- from: Acab llevó a Jezabel todo lo que Elías había hecho[a], y todo lo que había matado a todos los profetas con la espada.
  to: Acab le contó a Jezabel todo lo que Elías había hecho[a], y todo lo referente a que había matado a todos los profetas con la espada.
  rationale: Se corrige 'llevó' por 'le contó' para reflejar fielmente וַיַּגֵּד. También se repara la segunda cláusula para que el español sea gramatical y conserve, en la medida de lo posible, la repetición del hebreo ('y todo lo...') sin introducir la interpretación 'cómo'. La nota contextual se mantiene porque aclara la referencia de 'los profetas' sin añadirla al cuerpo del texto.
