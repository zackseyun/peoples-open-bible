  text: כִּ֣י יָדַ֗עְתִּי אַחֲרֵ֤י מוֹתִ/י֙ כִּֽי הַשְׁחֵ֣ת תַּשְׁחִת֔וּ/ן וְ/סַרְתֶּ֣ם מִן הַ/דֶּ֔רֶךְ אֲשֶׁ֥ר צִוִּ֖יתִי אֶתְ/כֶ֑ם וְ/קָרָ֨את אֶתְ/כֶ֤ם הָֽ/רָעָה֙ בְּ/אַחֲרִ֣ית הַ/יָּמִ֔ים כִּֽי תַעֲשׂ֤וּ אֶת הָ/רַע֙ בְּ/עֵינֵ֣י יְהוָ֔ה לְ/הַכְעִיס֖/וֹ בְּ/מַעֲשֵׂ֥ה יְדֵי/כֶֽם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/031/029.yaml
  text: For I know that after my death you will surely act corruptly and turn aside from the way that I commanded you[a], and evil will befall you in the latter days, because you will do what is evil in the eyes of Yahweh[c][b], provoking him to anger by the work of your hands.
  footnotes:
  - marker: a
    text: Or 'you will surely corrupt yourselves' / 'you will surely become corrupt.' The Hebrew intensifies the verb 'corrupt' and may be understood reflexively or intransitively here.
    reason: lexical_alternative
  - marker: b
    text: Or 'disaster' or 'calamity' instead of 'the evil'; the Hebrew רָעָה can denote harmful trouble as well as evil in a broader sense.
    reason: lexical_alternative
  - marker: c
    text: '''In the latter days'' can also mean ''in days to come''; the phrase is future-oriented and can carry eschatological weight depending on context.'
    reason: lexical_alternative
