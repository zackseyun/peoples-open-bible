- from: Mientras era estirado sobre ello[a], el noble joven iba quedando dislocado.
  to: Mientras era estirado sobre él[a], aquel noble joven iba quedando dislocado.
  rationale: Se ajusta «sobre ello» a «sobre él» para lograr un español natural con referencia anafórica al instrumento de tortura; se mejora «el noble joven» a «aquel noble joven» para una sintaxis más idiomática sin perder concisión; y se pule la nota lexical con una alternativa española más natural que preserve el sentido de ἔξαρθρος.
