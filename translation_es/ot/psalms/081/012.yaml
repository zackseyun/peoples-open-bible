translation:
  language: es
  text: Pero mi pueblo no escuchó mi voz[a], e Israel no quiso obedecerme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi pueblo no quiso escuchar mi voz, e Israel no consintió conmigo». El segundo hemistiquio usa un verbo hebreo de voluntad o consentimiento, que también puede traducirse «me rehusó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Sin embargo ... no
  lexicon: HALOT
  rationale: La conjunción con negación introduce contraste con el llamado y la promesa previos. «Pero» reproduce con naturalidad ese valor adversativo en español sin perder la negación.
- source_word: שָׁמַע
  english_pob_choice: listen
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - obedecer
  lexicon: HALOT
  rationale: Con «mi voz», שׁמע expresa aquí la idea de prestar atención/heeder. «Escuchar» conserva ese matiz mejor que «oír», y evita mezclar este primer hemistiquio con la idea de obediencia del segundo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Es un posesivo de pacto y pertenencia; «mi pueblo» es la forma más directa y natural en español para mantener ese vínculo.
- source_word: לְקוֹלִי
  english_pob_choice: to my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi sonido
  - a mi voz
  lexicon: HALOT
  rationale: En español, «escuchó mi voz» conserva la fuerza personal de קוֹל sin sonar forzado. Se omite la preposición por la fluidez idiomática del verbo «escuchar» con objeto directo.
- source_word: לֹא אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se rehusó
  lexicon: HALOT
  rationale: אָבָה denota voluntad/consentimiento. «No quiso» expresa de forma natural la falta de disposición, mientras preserva la tensión léxica entre voluntad y rechazo.
- source_word: לִי
  english_pob_choice: to obey me
  chosen_spanish: obedecerme
  alternatives_spanish:
  - ante mí
  - para mí
  lexicon: HALOT
  rationale: El hebreo es elíptico, y el contexto exige el sentido de someterse/ceder. «Obedecerme» hace explícita esa relación sin sobretraducir más allá del sentido contextual.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  - e incluso Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelo entre «mi pueblo» e «Israel». La forma «e» evita la cacofonía antes de «Israel» y preserva la coordinación.
theological_decisions:
- issue: Paralelismo entre «mi pueblo» e «Israel»
  english_pob_reading: Retain both 'my people' and 'Israel' in parallel without collapsing them into one phrase.
  chosen_spanish_reading: Mantener «mi pueblo» e «Israel» en paralelo sin fusionarlos en una sola expresión.
  alternative_spanish_readings:
  - Mi pueblo, Israel, no escuchó mi voz...
  rationale: El hebreo presenta dos designaciones paralelas que refuerzan la identidad del pueblo del pacto. La traducción conserva ambas para respetar la estructura poética y el énfasis relacional.
  doctrine_reference: Poética hebrea y teología del pacto; equivalencia óptima con preservación de paralelismo.
- issue: Valor semántico de אָבָה
  english_pob_reading: The Hebrew second line uses a verb of willingness/consent, which can also be rendered 'refused me.'
  chosen_spanish_reading: Conservar la noción de voluntad/rechazo mediante «no quiso obedecerme».
  alternative_spanish_readings:
  - no estuvo dispuesto a obedecerme
  - me rechazó
  rationale: El verbo hebreo puede expresar disposición, consentimiento o negativa a aceptar. «No quiso obedecerme» preserva esa tensión entre voluntad y desobediencia sin borrar la alternativa de «rehusó/rechazó», que queda implícita.
  doctrine_reference: Léxico hebreo de voluntad/consentimiento; fidelidad al matiz semántico sin pérdida de claridad.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto hebreo masorético y el audit trail en inglés. Se mantuvo el contraste adversativo inicial, el paralelismo entre «mi pueblo» e «Israel», y la distinción entre escuchar/heeder en la primera cola y voluntad/obediencia en la segunda. No se detectaron revisiones textuales recientes que exijan ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «mi pueblo» para עַמִּי y «Israel» como nombre propio sin glosa añadida.
  - Se evita traducir ambos hemistiquios con el mismo verbo para conservar la distinción semántica del hebreo.
  - «Obedecerme» se usa como explicitación contextual de לִי, manteniendo el sentido relacional y no meramente direccional.
