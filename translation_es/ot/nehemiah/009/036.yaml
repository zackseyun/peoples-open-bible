base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/036.yaml
  text: Look[a], today we are slaves; and in the land that you gave to our fathers to eat its fruit and its good things, look[c][b], we are slaves on it.
  footnotes:
  - marker: a
    text: Or 'servants' instead of 'slaves'; the Hebrew term denotes people in subjection, and here likely emphasizes Judah's bondage under imperial rule.
    reason: lexical_alternative
  - marker: b
    text: Or 'its bounty' for 'its good things.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally 'slaves on it,' that is, on the very land God gave to their fathers.
    reason: cultural_note
