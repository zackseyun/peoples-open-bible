translation:
  language: es
  text: Sacó la Asera[a] de la casa de Yahvé, fuera de Jerusalén, al valle de Cedrón; la quemó en el valle de Cedrón, la redujo a polvo y arrojó su polvo sobre las tumbas de la gente común.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el poste de Asera» o «la imagen de Asera». El término hebreo puede referirse a la diosa cananea Asera o al objeto de culto asociado con su adoración; aquí designa el objeto retirado y destruido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Asera
  alternatives_spanish:
  - el poste de Asera
  - la imagen de Asera
  lexicon: HALOT
  rationale: Conservo el término transliterado/adaptado para no reducir el hebreo a una forma física específica que el texto no precisa. En español, 'Asera' mantiene el referente cultual y permite la misma tensión entre deidad y objeto de culto que preserva el inglés POB.
- source_word: מִבֵּית יְהוָה
  english_pob_choice: from the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - del templo de Yahvé
  lexicon: HALOT
  rationale: '''Casa de Yahvé'' sigue de cerca la expresión hebrea y conserva el nombre divino según la norma del proyecto. ''Templo'' es posible, pero suaviza la metáfora institucional del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa 'Yahvé' como forma española del nombre divino, evitando la sustitución por un título. Esto refleja la decisión auditable del POB de no ocultar el Tetragrámaton.
- source_word: מִחוּץ לִירוּשָׁלַם
  english_pob_choice: outside Jerusalem
  chosen_spanish: fuera de Jerusalén
  alternatives_spanish:
  - al exterior de Jerusalén
  lexicon: HALOT
  rationale: '''Fuera de Jerusalén'' reproduce con naturalidad el valor espacial de la frase hebrea sin sobrecargarla.'
- source_word: נַחַל קִדְרוֹן
  english_pob_choice: the Kidron Valley
  chosen_spanish: el valle de Cedrón
  alternatives_spanish:
  - el torrente de Cedrón
  - el wadi de Cedrón
  lexicon: HALOT
  rationale: '''Valle de Cedrón'' es la forma más clara y natural en español bíblico contemporáneo para este topónimo. Mantiene el sentido geográfico del נחל en este contexto histórico.'
- source_word: וַיִּשְׂרֹף אֹתָהּ
  english_pob_choice: and burned it
  chosen_spanish: la quemó
  alternatives_spanish:
  - la incendió
  lexicon: HALOT
  rationale: '''La quemó'' comunica directamente el acto de destrucción cultual. Evita personificar el objeto, aunque el sufijo hebreo sea femenino.'
- source_word: וַיָּדֶק לְעָפָר
  english_pob_choice: and beat it to dust
  chosen_spanish: la hizo polvo
  alternatives_spanish:
  - la machacó hasta volverla polvo
  - la redujo a polvo
  lexicon: HALOT
  rationale: '''La hizo polvo'' expresa bien la acción de pulverizar sin sonar mecánica. Conserva la fuerza idiomática de destrucción total del verbo hebreo.'
- source_word: עֲפָרָהּ
  english_pob_choice: its dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su polvo fino
  - su polvo/arena
  lexicon: HALOT
  rationale: '''Su polvo'' mantiene la referencia al residuo resultante del objeto destruido. ''Polvo'' es más fiel que ''cenizas'', porque עפר no exige un residuo puramente de combustión.'
- source_word: עַל קֶבֶר בְּנֵי הָעָם
  english_pob_choice: on the graves of the common people
  chosen_spanish: sobre las tumbas de los hijos del pueblo
  alternatives_spanish:
  - sobre las tumbas de la gente común
  - sobre las tumbas de los comunes
  lexicon: HALOT
  rationale: Conservo la literalidad relativa de 'hijos del pueblo' porque el hebreo no dice simplemente 'pueblo' en abstracto. 'Tumbas' es una adaptación natural en español para קבר en este contexto.
theological_decisions:
- issue: Naturaleza de la Asera / objeto cultual
  english_pob_reading: the Asherah; the term can refer either to the goddess Asherah or to the cult object associated with her worship; here it denotes the object removed and destroyed
  chosen_spanish_reading: la Asera; el término puede aludir a la diosa Asera o al objeto de culto asociado con su adoración; aquí designa el objeto retirado y destruido
  alternative_spanish_readings:
  - el poste de Asera
  - la imagen de Asera
  rationale: Mantengo la ambigüedad documentada porque el hebreo y el POB no fijan con total certeza la forma material exacta. Traducirlo de manera demasiado específica cerraría una tensión textual que el original conserva.
  doctrine_reference: Lexical/theological note on cult object terminology; anti-idolatry context in Deuteronomistic history
translation_notes:
  revision_awareness: La base inglesa revisó 'crushed it to dust' a 'beat it to dust' para ajustarse mejor al verbo hebreo; en español se optó por 'la hizo polvo', que conserva el resultado del golpe/pulverización sin introducir una imagen distinta. También se preservó la decisión del POB de no precisar la forma exacta de la Asera más allá de la ambigüedad del término.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה.
  - Se conserva 'Asera' como transliteración funcional, con nota alternativa, para mantener la ambigüedad del hebreo.
  - '''Valle de Cedrón'' se adopta como topónimo natural y eclesialmente comprensible en español.'
  - '''Hijos del pueblo'' mantiene la estructura del hebreo, aunque en español suene menos idiomático que ''gente común''; se conserva por fidelidad al matiz social del original.'
