translation:
  language: es
  text: 'Y los hijos de Jeconías: Asir[a], Salatiel su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los hijos de Jeconías el cautivo: Salatiel su hijo». El hebreo אַסִּר puede leerse como el nombre propio «Asir» o como el sustantivo común «cautivo» o «prisionero».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: En una genealogía, בְנֵי se expresa naturalmente como «hijos de». Conservé la conjunción inicial «Y» para mantener la secuencia genealógica del hebreo.
- source_word: יְכָנְיָה
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Jechonías
  - Conías
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma española más reconocible y eclesialmente legible, equivalente a la convención inglesa «Jeconiah».
- source_word: אַסִּר
  english_pob_choice: Assir
  chosen_spanish: Assir
  alternatives_spanish:
  - cautivo
  - prisionero
  lexicon: HALOT
  rationale: El hebreo permite leerlo como nombre propio o como sustantivo común. En la línea genealógica, la lectura como nombre propio encaja mejor con la sintaxis transmitida, por eso se conserva en el texto principal.
- source_word: שְׁאַלְתִּיאֵל
  english_pob_choice: Shealtiel
  chosen_spanish: Salatiel
  alternatives_spanish:
  - Saaltiel
  - Shealtiel
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y ampliamente inteligible del nombre propio, equivalente a la transliteración inglesa «Shealtiel».
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: El sufijo posesivo se vierte de forma natural en español como «su hijo», manteniendo la referencia genealógica directa.
theological_decisions:
- issue: 'Lectura de אַסִּר: nombre propio o descripción sustantiva'
  english_pob_reading: Retain as the proper name 'Assir' in the main text, with the alternative 'the captive/prisoner' in a footnote.
  chosen_spanish_reading: Conservar «Assir» en el texto principal y explicar en nota la posibilidad de leer «el cautivo/el prisionero».
  alternative_spanish_readings:
  - '«Y los hijos de Jeconías, el cautivo: Salatiel, su hijo.»'
  - '«Y los hijos de Jeconías: el cautivo, Salatiel, su hijo.»'
  rationale: 'La forma consonántica admite ambas lecturas, pero el contexto de lista genealógica favorece el nombre propio. Como la alternativa tiene peso interpretativo e histórico, no se elimina: se conserva en nota para mantener la tensión textual.'
  doctrine_reference: 'Translation philosophy §3: preservar tensiones reales y ambigüedades significativas en nota.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del análisis de la tradición textual; se mantiene la ambigüedad de אַסִּר en nota sin resolverla silenciosamente.'
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para reflejar la conexión genealógica del hebreo.
  - Se evitó «SEÑOR» u այլ masking terminology porque no aparece ningún tetragrama aquí.
  - La forma «Salatiel» sigue el uso español tradicional y no altera el valor del nombre propio.
  - La nota a pie conserva la alternativa semántica documentada por el aparato inglés POB.
