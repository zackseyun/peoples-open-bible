translation:
  language: es
  text: Y también Salomón ha sentado[a] en el trono del reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se ha sentado».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «el trono de la monarquía».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  english_pob_choice: And ... also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y asimismo
  - También
  lexicon: HALOT
  rationale: La combinación del enlace coordinante y la partícula aditiva se refleja naturalmente con 'Y también', manteniendo la conexión con el contexto previo y el valor enfático sin sonar artificial.
- source_word: יָשַׁב
  english_pob_choice: has sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - ha sentado
  - tomó asiento
  - está sentado
  lexicon: HALOT
  rationale: El qatal expresa una acción concluida con relevancia actual en el contexto del entronizamiento. En español, 'se sentó' comunica el hecho realizado sin forzar un perfecto compuesto que aquí sonaría menos natural.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomon
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española estándar del nombre propio bíblico.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición espacial se conserva con 'sobre', que es natural en español y reproduce el valor relacional del hebreo.
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - silla
  lexicon: HALOT
  rationale: En contexto real, el sustantivo denota el trono como símbolo del poder regio, no un simple asiento físico.
- source_word: הַמְּלוּכָה
  english_pob_choice: the throne of the kingdom
  chosen_spanish: del reino
  alternatives_spanish:
  - de la realeza
  - de la monarquía
  - del gobierno real
  lexicon: HALOT
  rationale: El sustantivo designa la realeza o el ejercicio de la realeza. En español, el complemento 'del reino' mantiene la construcción nominal y conserva la referencia regia que la revisión inglesa quiso acercar al hebreo, evitando una paráfrasis excesiva.
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'royal throne' a 'the throne of the kingdom' para acercarse más a כִּסֵּא הַמְּלוּכָה. Por eso el español evita una paráfrasis interpretativa y mantiene una construcción transparente con 'trono del reino'.
  spanish_consistency_notes:
  - 'Se conserva el nombre propio bíblico en su forma española estándar: Salomón.'
  - Se mantiene una sintaxis breve y formal, acorde con un registro bíblico público en español.
  - La nota al pie marca la alternativa más literal del sintagma hebreo, sin ocultar la tensión entre 'reino' y 'realeza'.
