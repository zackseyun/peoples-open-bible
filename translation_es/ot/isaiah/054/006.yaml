translation:
  language: es
  text: Porque Yahvé te ha llamado como a una esposa abandonada y entristecida en espíritu[a], como a una esposa de juventud cuando es rechazada[b], dice tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como a una mujer abandonada y entristecida en espíritu». El hebreo אִשָּׁה puede significar «mujer» o «esposa»; el contexto matrimonial favorece «esposa».
    reason: lexical_alternative
  - marker: b
    text: O «como a la esposa de la juventud cuando es rechazada»; también puede entenderse «cuando es despreciada». La cláusula hebrea es compacta y admite matices cercanos.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de lo dicho antes; en español, «Porque» conserva bien la relación causal/discursiva sin forzar el tono.
- source_word: כְאִשָּׁה
  english_pob_choice: like a wife
  chosen_spanish: como a una esposa
  alternatives_spanish:
  - como a una mujer
  lexicon: HALOT
  rationale: El contexto matrimonial del pasaje favorece «esposa» frente a «mujer», y la preposición comparativa se expresa con naturalidad en español con «como a».
- source_word: עֲזוּבָה
  english_pob_choice: forsaken
  chosen_spanish: abandonada
  alternatives_spanish:
  - desamparada
  - dejada
  lexicon: HALOT
  rationale: «Abandonada» comunica con claridad el valor relacional de haber sido dejada. «Forsaken» en inglés tiene un tono fuerte; en español, «abandonada» es la opción más natural y fiel.
- source_word: וַעֲצוּבַת רוּחַ
  english_pob_choice: and grieved in spirit
  chosen_spanish: y entristecida en espíritu
  alternatives_spanish:
  - y afligida en espíritu
  - y apesadumbrada en espíritu
  lexicon: HALOT
  rationale: La expresión apunta a dolor interior; «entristecida en espíritu» conserva el carácter afectivo e interior de רוּחַ sin reducirlo a un mero estado físico.
- source_word: קְרָאָךְ
  english_pob_choice: has called you
  chosen_spanish: te ha llamado
  alternatives_spanish:
  - te llamó
  - te ha convocado
  lexicon: HALOT
  rationale: El perfecto hebreo se entiende como acción cumplida con relevancia presente; «te ha llamado» preserva bien esa relación entre acto y efecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
- source_word: וְאֵשֶׁת נְעוּרִים
  english_pob_choice: like a wife of youth
  chosen_spanish: como a la esposa de la juventud
  alternatives_spanish:
  - como a la esposa de tus primeros años
  - como a la esposa de la mocedad
  lexicon: HALOT
  rationale: La construcción hebrea es compacta; «esposa de la juventud» mantiene la imagen sin expandirla excesivamente. «De la juventud» suena más natural que un calco rígido en español.
- source_word: כִּי תִמָּאֵס
  english_pob_choice: when she is rejected
  chosen_spanish: cuando es rechazada
  alternatives_spanish:
  - aunque sea rechazada
  - si es rechazada
  - cuando es despreciada
  lexicon: HALOT
  rationale: La pasiva expresa la condición de desecho o rechazo dentro de la metáfora marital. «Rechazada» comunica esa fuerza con una palabra clara y amplia en español.
- source_word: אָמַר אֱלֹהָיִךְ
  english_pob_choice: says your God
  chosen_spanish: dice tu Dios
  alternatives_spanish:
  - dice tu Diosa
  lexicon: HALOT
  rationale: La fórmula profética se vierte naturalmente en presente con «dice». «Tu Dios» mantiene la relación de pacto y corresponde a אֱלֹהָיִךְ.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; la política del proyecto exige preservar el nombre divino en español. «Yahvé» es la forma elegida para el texto principal, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora marital aplicada a Sion
  english_pob_reading: Retain the wife/marriage imagery directly
  chosen_spanish_reading: Conservar la imagen de esposa y matrimonio
  alternative_spanish_readings:
  - generalizar a «mujer»
  - parafrasear como «pueblo» o «ciudad»
  rationale: El versículo explota una metáfora matrimonial explícita. Mantenerla en español preserva la tensión profética y evita suavizar un rasgo teológico central del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Sentido de רוּחַ en la expresión עֲצוּבַת רוּחַ
  english_pob_reading: grieved in spirit
  chosen_spanish_reading: entristecida en espíritu
  alternative_spanish_readings:
  - afligida en espíritu
  - triste de corazón
  rationale: Aquí רוּחַ apunta a la vida interior, no al viento. «En espíritu» conserva esa dimensión antropológica sin convertirla en una paráfrasis psicológica más amplia.
  doctrine_reference: DOCTRINE.md lexical guidance on רוּחַ / spirit
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; se conserva el acuerdo alto del control cruzado y la lectura estable del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se prefirió «esposa» por el contexto matrimonial explícito de la profecía.
  - «Entristecida en espíritu» conserva el valor interior de רוּחַ sin borrar la metáfora emocional.
  - La fórmula profética final se normalizó como «dice tu Dios», en presente, como en el audit trail inglés.
