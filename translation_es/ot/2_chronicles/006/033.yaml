  text: וְ/אַתָּ֞ה תִּשְׁמַ֤ע מִן הַ/שָּׁמַ֨יִם֙ מִ/מְּכ֣וֹן שִׁבְתֶּ֔/ךָ וְ/עָשִׂ֕יתָ כְּ/כֹ֛ל אֲשֶׁר יִקְרָ֥א אֵלֶ֖י/ךָ הַ/נָּכְרִ֑י לְמַ֣עַן יֵדְעוּ֩ כָל עַמֵּ֨י הָ/אָ֜רֶץ אֶת שְׁמֶ֗/ךָ וּ/לְ/יִרְאָ֤ה אֹֽתְ/ךָ֙ כְּ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל וְ/לָ/דַ֕עַת כִּֽי שִׁמְ/ךָ֣ נִקְרָ֔א עַל הַ/בַּ֥יִת הַ/זֶּ֖ה אֲשֶׁ֥ר בָּנִֽיתִי־־־־־־׃
