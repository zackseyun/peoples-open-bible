review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido global del hebreo: llamado a volver, vocativo filial desleal, fórmula profética con Yahvé, reclamación de autoridad con nota marital, reunión selectiva y conducción a Sion. Sin embargo, hay ajustes necesarios para alinearlo mejor con el expediente POB y con el hebreo: שׁוּבוּ se refleja mejor como «Vuelvan»/«Regresen» que «Volved» para el registro meta pedido; נְאֻם יְהוָה queda mejor como «declara Yahvé» que «dice Yahvé» por la fuerza formular; מִשְׁפָּחָה en este contexto debe mantenerse como «clan» según la justificación auditada, no «familia»; y la nota de [a] introduce «volved de nuevo», que sobretraduce שוב.'
  spanish_quality_summary: El español es claro y digno, pero mezcla voseo peninsular («Volved», «vuestro», «os») con una meta declarada de español neutral latinoamericano. También «señor» puede sonar menos preciso que «amo» para preservar la fuerza de master sin confundirlo con un simple título reverencial. Una revisión menor puede mejorar naturalidad, consistencia dialectal y precisión semántica.
  glossary_alignment: Acierta con «Yahvé», «Sion» y con mantener la alternativa marital en nota. Pero se aparta de la decisión léxica documentada al usar «familia» donde el expediente privilegia «clan». También conviene evitar el registro peninsular y usar formas ampliamente legibles en América Latina.
  issues:
  - severity: medium
    issue: Registro pronominal y verbal no neutral
    rationale: «Volved», «vuestro», «os» son correctos pero marcadamente peninsulares; la guía pide español neutral latinoamericano / ampliamente eclesial.
  - severity: medium
    issue: «familia» por מִשְׁפָּחָה
    rationale: El expediente inglés documenta «clan» como mejor unidad social que «familia» en Jeremías; el borrador debilita esa decisión sin necesidad.
  - severity: low
