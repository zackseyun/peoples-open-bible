translation:
  language: es
  text: 'Entonces le dijo al rey de Israel: «Pon tu mano sobre el arco». Y él puso su mano en él, y Eliseo puso sus manos sobre las manos del rey.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיֹּאמֶר לְמֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Then he said to the king of Israel
  chosen_spanish: Entonces le dijo al rey de Israel
  alternatives_spanish:
  - Y le dijo al rey de Israel
  - Luego le dijo al rey de Israel
  lexicon: WLC / HALOT
  rationale: Conserva el avance narrativo del waw consecutivo con un conector natural en español. «Entonces» comunica secuencia sin sonar mecánico.
- source_word: הַרְכֵּב יָדְךָ עַל הַקֶּשֶׁת
  english_pob_choice: Put your hand on the bow
  chosen_spanish: Pon tu mano sobre el arco
  alternatives_spanish:
  - Coloca tu mano sobre el arco
  - Pon tu mano en el arco
  lexicon: HALOT
  rationale: El imperativo hiphil de רכב aquí pide causar que la mano quede apoyada sobre el arco. «Pon» es natural y directo; «sobre» mantiene la relación espacial sin la arcaicidad de «sobre / encima de» más pesada.
- source_word: וַיַּרְכֵּב יָדוֹ
  english_pob_choice: So he put his hand on it
  chosen_spanish: Y él puso su mano sobre él
  alternatives_spanish:
  - Y puso su mano sobre él
  - Entonces puso su mano sobre él
  lexicon: HALOT
  rationale: El hebreo no repite «arco», pero el pronombre lo retoma de manera clara en español. Se conserva la referencia explícita al objeto sin añadir interpretación.
- source_word: וַיָּשֶׂם אֱלִישָׁע יָדָיו עַל יְדֵי הַמֶּלֶךְ
  english_pob_choice: Elisha laid his hands on the king’s hands
  chosen_spanish: Eliseo puso sus manos sobre las manos del rey
  alternatives_spanish:
  - Eliseo colocó sus manos sobre las manos del rey
  - Eliseo apoyó sus manos sobre las manos del rey
  lexicon: HALOT
  rationale: Se conserva la imagen corporal explícita del plural «manos» en ambos miembros. «Puso» es sencillo y fiel; evita introducir una lectura simbólica no expresada en el versículo.
theological_decisions:
- issue: Significado del gesto de Eliseo al colocar sus manos sobre las manos del rey
  english_pob_reading: Render the action plainly without importing symbolic interpretation into the main text.
  chosen_spanish_reading: Traducir el gesto de manera literal y sobria, sin convertirlo en paráfrasis interpretativa.
  alternative_spanish_readings:
  - Presentarlo como una imposición profética de manos
  - Explicarlo como guía divina para la batalla
  rationale: El contexto ampliará el sentido del gesto, pero este versículo por sí solo narra la acción. La versión española debe preservar esa tensión y no encerrar el significado en una glosa interpretativa.
  doctrine_reference: 'Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente indicada como sin cambios; no se incorporan variantes de revisión adicionales.
  spanish_consistency_notes:
  - Se usa «arco» para קשת, siguiendo el valor básico del término en este contexto bélico.
  - Se mantiene «mano/manos» en singular y plural para reflejar la imagen física del hebreo sin simplificarla.
  - Se evita «Cristo», «SEÑOR» y otros sustitutos no presentes en el texto fuente.
  - La nota al pie se ancla solo en la frase donde existe una alternativa literal reconocida por el audit trail inglés.
