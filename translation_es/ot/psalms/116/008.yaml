    text: O «mi vida» para נֶפֶשׁ; el hebreo nephesh puede denotar el alma, la vida o la persona misma.
    reason: lexical_alternative
  - marker: b
    text: O «mi pie de caer»; el hebreo singular puede funcionar de manera colectiva, y el sustantivo puede sugerir tropiezo o caída.
    reason: lexical_alternative
  revision_rationale: Se ajusta el segundo miembro a un español más natural y poético («del llanto») sin alterar el sentido. Se corrige la nota b para que refleje mejor la evidencia hebrea y la rationale del POB inglés sobre el singular colectivo y el matiz de tropiezo/caída.
