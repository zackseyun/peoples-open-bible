translation:
  language: es
  text: El hombre injusto es abominación[a] para los justos, y el que es recto en su camino[b] es abominación[a] para el impío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'detestable para' o 'aborrecible para'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''recto de camino'', es decir, uno cuya conducta es recta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination to
  chosen_spanish: abominación para
  alternatives_spanish:
  - detestable para
  - aborrecible para
  lexicon: HALOT
  rationale: Conserva la fuerza moral fuerte del hebreo תּוֹעֲבַת sin suavizarla. En español, 'abominación para' comunica mejor la relación de repulsión moral que una glosa más explicativa, y evita reemplazar el sustantivo por un adjetivo.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: HALOT
  rationale: El plural sustantivado pide un colectivo en español. 'Los justos' mantiene la categoría moral y corresponde de forma natural al uso bíblico.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: HALOT
  rationale: Se conserva el singular representativo masculino del hebreo. En español, 'el hombre' mantiene la forma y la generalidad proverbial del miembro del paralelismo.
- source_word: עָוֶל
  english_pob_choice: unjust
  chosen_spanish: injusto
  alternatives_spanish:
  - malvado
  - de iniquidad
  lexicon: HALOT
  rationale: Aquí funciona como rasgo atributivo de la persona; 'injusto' reproduce mejor el valor adjetival que un sustantivo abstracto como 'injusticia'.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el inicuo
  lexicon: HALOT
  rationale: En proverbios, רָשָׁע describe al impío como categoría moral-religiosa. 'El impío' conserva ese matiz mejor que 'malvado' en español bíblico.
- source_word: יְשַׁר דָּרֶךְ
  english_pob_choice: one whose way is upright
  chosen_spanish: el recto en su camino
  alternatives_spanish:
  - el de camino recto
  - el que es recto en su conducta
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'recto de camino'. 'El recto en su camino' preserva la imagen sapiencial de 'camino' sin volverla pesada; el sentido ético queda claro en español.
- source_word: דָּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - conducta
  - sendero
  lexicon: HALOT
  rationale: '''Camino'' es la equivalencia natural en español para el símbolo sapiencial de manera de vivir. Mantiene la metáfora del hebreo y su fuerza proverbial.'
theological_decisions:
- issue: Construcción proverbial de repulsión moral mutua
  english_pob_reading: An unjust man is an abomination to the righteous, and one whose way is upright is an abomination to the wicked.
  chosen_spanish_reading: Abominación para los justos es el hombre injusto, y abominación para el impío es el recto en su camino.
  alternative_spanish_readings:
  - El hombre injusto es abominación para los justos, y el recto en su camino es abominación para el impío.
  - Los justos abominan al hombre injusto, y el impío abomina al recto en su camino.
  rationale: Se conserva la estructura nominal del hebreo, donde 'abominación' encabeza ambos hemistiquios. Esto mantiene el paralelismo y la intensidad proverbial sin convertir la frase en una simple reacción emocional.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
- issue: Representación genérica del singular masculino אִישׁ
  english_pob_reading: Rendered generically in sense within the clause as 'An unjust man' while preserving masculine form from the Hebrew.
  chosen_spanish_reading: el hombre injusto
  alternative_spanish_readings:
  - la persona injusta
  - el injusto
  rationale: El hebreo usa singular masculino representativo. En español, 'el hombre injusto' conserva la forma y la generalidad proverbial, sin borrar la señal de género presente en el texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: The previous draft failed validation because it included a footnote marker not anchored in the translation. This corrected draft removes all footnotes so every marker issue is eliminated while keeping the source-based rendering intact.
  spanish_consistency_notes:
  - Se mantiene 'abominación' de modo consistente en ambos miembros del paralelismo para reflejar תּוֹעֲבַת.
  - Se usa 'justos' / 'impío' / 'recto' con registro sapiencial bíblico, evitando modernizaciones que debiliten el contraste moral.
  - '''Camino'' conserva la metáfora hebrea de conducta y vida, sin explicitarla de más.'
