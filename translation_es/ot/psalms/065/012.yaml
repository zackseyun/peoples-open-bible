translation:
  language: es
  text: Tú coronas el año con tu bondad, y tus sendas[a] destilan abundancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «tus huellas destilan riqueza»; el hebreo puede evocar el paso de Dios dejando fertilidad detrás de sí.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «gordura»; imagen hebrea de fertilidad rica y provisión abundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִטַּרְתָּ
  english_pob_choice: You crown
  chosen_spanish: Tú coronas
  alternatives_spanish:
  - Tú has coronado
  - Tú ciñes
  - Tú adornas
  lexicon: HALOT
  rationale: עטר expresa la idea de coronar, rodear u honrar con un adorno real. «Coronas» conserva la metáfora directa del acto divino y suena natural en español poético dirigido a Dios.
- source_word: שְׁנַת
  english_pob_choice: the year
  chosen_spanish: el año
  alternatives_spanish:
  - un año
  - el año de
  lexicon: HALOT
  rationale: El sustantivo en construcción con el siguiente complemento se entiende como «el año». En español, «el año» reproduce con claridad el objeto de la acción verbal.
- source_word: טוֹבָתֶךָ
  english_pob_choice: your goodness
  chosen_spanish: tu bondad
  alternatives_spanish:
  - tu benevolencia
  - tu prosperidad
  - tu favor
  lexicon: HALOT
  rationale: טוֹבָה abarca bondad, bienestar y provisión favorable. «Bondad» mantiene el alcance teológico más amplio y encaja con el tono de bendición agrícola sin reducirlo a mera prosperidad material.
- source_word: וּמַעְגָּלֶיךָ
  english_pob_choice: and your paths
  chosen_spanish: y tus sendas
  alternatives_spanish:
  - y tus caminos
  - y tus huellas
  - y tus rutas
  lexicon: HALOT
  rationale: מַעְגָּל puede referirse a senda, trayecto o huella de paso. «Sendas» conserva el plural poético y permite la imagen de un recorrido divino por la tierra.
- source_word: יִרְעֲפוּן
  english_pob_choice: drip with
  chosen_spanish: destilan
  alternatives_spanish:
  - gotean
  - rebosan
  - manan
  lexicon: HALOT
  rationale: El verbo expresa la imagen concreta de gotear o destilar. «Destilan» mantiene esa figuración poética en español sin explicarla en exceso.
- source_word: דָּשֶׁן
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - riqueza
  - fertilidad
  - grasa
  lexicon: HALOT
  rationale: דָּשֶׁן literalmente remite a gordura/riqueza y por extensión a provisión fértil y abundante. «Abundancia» transmite el sentido para lectores modernos; «grasa» resultaría demasiado literal y menos idiomática en este contexto.
theological_decisions:
- issue: Conservar la metáfora agrícola sin convertirla en paráfrasis explicativa
  english_pob_reading: Retain the metaphor of God crowning the year and his paths dripping with abundance
  chosen_spanish_reading: Conservar que Dios corona el año y que sus sendas destilan abundancia
  alternative_spanish_readings:
  - 'Explicar más libremente: Dios bendice abundantemente la temporada de cosecha'
  - Reformular como imagen de provisión y prosperidad
  rationale: El hebreo presenta una imagen poética compacta. Mantener la metáfora respeta el texto fuente y evita sustituirla por una explicación que borre su fuerza visual y teológica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el sentido llano del texto sin paráfrasis innecesaria.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto hebreo y con la lectura auditada en inglés; no se detectaron revisiones textuales que obliguen a alterar la solución principal.
  spanish_consistency_notes:
  - Se mantiene el trato directo con Dios en segunda persona singular.
  - «Bondad» se usa para טוֹבָה conforme al valor amplio observado en el audit trail.
  - «Sendas» y «destilan» conservan la metáfora de movimiento y fertilidad sin volverla prosa explicativa.
  - Se evita «SEÑOR» y se traduce el pronombre implícito de la raíz verbal sin añadir sujeto innecesario.
