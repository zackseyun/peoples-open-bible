translation:
  language: es
  text: Lo puso de inmediato en su propio lugar[a]. Entonces el rey vino el séptimo día para hacer duelo por Daniel, y llegó al foso[b], miró dentro, y he aquí que Daniel estaba sentado allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su propio lugar». La expresión griega puede entenderse con «en» después de «puso», o de manera más idiomática con «a».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «guarida». El griego dice «foso» (λάκκος), término más amplio que una palabra especializada para una guarida de leones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέστησεν
  english_pob_choice: set ... down
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo dejó
  lexicon: BDAG
  rationale: El verbo expresa que el ángel hizo que Habacuc quedara en un lugar. En español, "lo puso" conserva la acción concreta sin volverla demasiado formal ni añadir interpretación.
- source_word: παραχρῆμα
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: BDAG
  rationale: La idea central es la inmediatez. "De inmediato" es natural en español y mantiene ese valor temporal.
- source_word: εἰς τὸν τόπον αὐτοῦ
  english_pob_choice: in his own place
  chosen_spanish: en su propio lugar
  alternatives_spanish:
  - a su lugar
  - en su lugar
  lexicon: BDAG
  rationale: El giro indica el lugar propio o correspondiente de Habacuc. "En su propio lugar" sigue de cerca la relación posesiva y funciona bien con "lo puso".
- source_word: πενθῆσαι
  english_pob_choice: to mourn for
  chosen_spanish: para hacer duelo por
  alternatives_spanish:
  - para lamentar a
  - para llorar por
  lexicon: BDAG
  rationale: El infinitivo expresa el propósito de la venida del rey. "Hacer duelo por" transmite el matiz de lamento por muerte esperada con un registro digno y natural.
- source_word: λάκκον
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - foso
  - hoyo
  lexicon: LSJ
  rationale: El término griego es amplio y no nombra específicamente una "guarida" de leones. "Pozo" conserva la amplitud semántica de λάκκος y permite que el contexto narrativo aporte el resto.
- source_word: ἐνέβλεψεν
  english_pob_choice: looked in
  chosen_spanish: miró dentro
  alternatives_spanish:
  - echó un vistazo dentro
  - se asomó
  lexicon: BDAG
  rationale: Con la preposición hacia el pozo, el sentido es mirar al interior. "Miró dentro" es claro y no sobretraduce.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: BDAG
  rationale: La partícula introduce un hallazgo repentino. "He aquí" conserva ese efecto narrativo en español sin desbordar el tono del pasaje.
- source_word: καθήμενος
  english_pob_choice: was sitting there
  chosen_spanish: estaba sentado allí
  alternatives_spanish:
  - estaba allí sentado
  - se hallaba sentado allí
  lexicon: BDAG
  rationale: El participio describe la postura de Daniel al ser visto. "Estaba sentado allí" es natural en español y mantiene la escena visible.
theological_decisions:
- issue: Término para el lugar donde está Daniel
  english_pob_reading: pit
  chosen_spanish_reading: pozo
  alternative_spanish_readings:
  - foso
  - hoyo
  rationale: La POB inglesa eligió "pit" para no fijar prematuramente el sentido como "den". En español, "pozo" conserva esa amplitud y evita resolver el detalle narrativo más allá del término griego λάκκος.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión lexical cuando el original es más amplio que una designación tradicional.'
- issue: Expresión del duelo del rey
  english_pob_reading: to mourn for Daniel
  chosen_spanish_reading: para hacer duelo por Daniel
  alternative_spanish_readings:
  - para lamentar a Daniel
  - para llorar por Daniel
  rationale: El texto presenta al rey como viniendo en expectativa de muerte y luto. "Hacer duelo" transmite ese peso funerario sin añadir interpretación doctrinal o emocional ajena al relato.
  doctrine_reference: 'DOCTRINE.md: mantener el impulso narrativo y el matiz emocional del original.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego de Swete (Theodotion en la secuencia de Bel y el Dragón) y el audit trail inglés: κατέστησεν se mantuvo como una acción concreta de poner/colocar; παραχρῆμα como inmediatez; εἰς τὸν τόπον αὐτοῦ se conservó con valor posesivo; πενθῆσαι se tradujo con lenguaje funerario natural; λάκκος se dejó amplio con ''pozo'' y nota alternativa; ἐνέβλεψεν se expresó como visión hacia dentro; ἰδοὺ conservó el giro exclamativo; καθήμενος se mantuvo descriptivo de la postura. No hubo revisiones adicionales en el pasaje base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evita «SEÑOR» como sustituto no pertinente, y no hay términos cristológicos en este verso.
  - «Daniel» y «Habacuc» siguen las formas españolas habituales; el nombre del rey se mantiene como «el rey» porque el griego no lo nombra aquí.
  - El registro es digno y moderno, con sintaxis clara para lectura litúrgica o pública.
