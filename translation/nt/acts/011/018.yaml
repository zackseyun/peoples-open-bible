id: ACT.11.18
reference: Acts 11:18
source:
  edition: SBLGNT
  text: ἀκούσαντες δὲ ταῦτα ἡσύχασαν καὶ ⸀ἐδόξασαν τὸν θεὸν λέγοντες· ⸀Ἄρα καὶ τοῖς ἔθνεσιν ὁ θεὸς τὴν μετάνοιαν ⸂εἰς ζωὴν ἔδωκεν⸃.
translation:
  text: When they heard these things[a], they became quiet and glorified God, saying[b], “Then God has also granted to the Gentiles the change of mind that leads to life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations.' Here ἔθνεσιν refers to non-Jews, so 'Gentiles' best fits the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'repentance unto life' or 'repentance for life.' The Greek phrase εἰς ζωήν expresses movement toward or result in life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: When they heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verbs; 'When they heard' is natural English and preserves the temporal force without awkwardness.
- source_word: δὲ
  chosen: —
  alternatives:
  - but
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective. It is not naturally represented by a separate English word in this sentence, so it is absorbed into the flow.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: Plural demonstrative referring to Peter's preceding report; 'these things' is a standard and sufficiently transparent rendering.
- source_word: ἡσύχασαν
  chosen: they became quiet
  alternatives:
  - they fell silent
  - they quieted down
  lexicon: BDAG
  rationale: The verb denotes ceasing objection or becoming silent. 'Became quiet' preserves the transition from dispute to silence; 'fell silent' is possible but slightly more idiomatic than the Greek requires.
- source_word: ἐδόξασαν τὸν θεόν
  chosen: glorified God
  alternatives:
  - praised God
  - gave glory to God
  lexicon: BDAG
  rationale: δοξάζω commonly means 'glorify' in Luke-Acts. This preserves the theological weight and verbal consistency better than the lighter 'praised.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of their response. 'Saying' is a straightforward participial rendering in English.
- source_word: Ἄρα
  chosen: Then
  alternatives:
  - So then
  - Therefore
  - It follows that
  lexicon: BDAG
  rationale: Inferential particle marking the conclusion they draw from Peter's report. 'Then' is concise and natural in direct speech.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: The adverbial force highlights extension of God's action beyond Jews to Gentiles. 'Also' best captures the inclusive emphasis.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts this term commonly refers to non-Jews rather than nations in a geopolitical sense. 'Gentiles' is the clearest contextual rendering.
- source_word: μετάνοιαν
  chosen: the change of mind
  alternatives:
  - repentance
  lexicon: BDAG
  rationale: The article is present in Greek. In English, 'the repentance' can sound marked, but here it works because the phrase specifies a particular gift God grants. It also preserves the concreteness of the Greek construction.
- source_word: εἰς ζωὴν
  chosen: that leads to life
  alternatives:
  - unto life
  - for life
  - resulting in life
  lexicon: BDAG
  rationale: The prepositional phrase expresses result or goal. 'That leads to life' is idiomatic modern English while preserving the directional/resultative sense of εἰς.
- source_word: ἔδωκεν
  chosen: has also granted
  alternatives:
  - gave
  - granted
  lexicon: BDAG
  rationale: Although the Greek is aorist ('gave'), English present perfect fits the speakers' conclusion about a completed action with present significance. 'Granted' suits God as subject and the gift-like nature of repentance.
