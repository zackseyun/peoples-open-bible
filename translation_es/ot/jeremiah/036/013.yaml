revisions:
- from: Y Micaías les contó[a] todas las palabras que había oído cuando Baruc leía el rollo en presencia del pueblo.
  to: Y Micaías les contó todas las palabras que había oído cuando Baruc leía[a] el rollo a oídos del pueblo.
  rationale: Se ajusta el modismo final para reflejar mejor el sentido auditivo público de בְּאָזְנֵי הָעָם, y se reubica/simplifica la nota para que corresponda a la verdadera alternativa de aspecto temporal y formulación pública documentada en el expediente inglés.
