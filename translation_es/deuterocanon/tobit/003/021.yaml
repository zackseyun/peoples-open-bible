review_pass:
  verdict: revise
  source_alignment_summary: 'La frase española corresponde sustancialmente al segmento griego pertinente y al English POB revisado: imperativo negativo, vocativo afectuoso, pobreza sobrevenida, promesa condicionada por temer a Dios, apartarse del pecado y hacer lo agradable ante él. Sin embargo, ''tendrás mucho'' desplaza ligeramente el matiz de ὑπάρχει σοι πολλὰ / ''you have much'', que afirma posesión o recurso presente más que mera posesión futura.'
  spanish_quality_summary: El borrador es claro y digno, pero requiere un ajuste menor para mayor naturalidad y precisión. 'hemos empobrecido' es comprensible, aunque 'hemos llegado a ser pobres' o 'nos hemos quedado pobres' sería más idiomático; no obstante, no es un error. El punto principal es evitar el futuro 'tendrás' y preferir una formulación presente como 'tienes mucho' o 'aún te queda mucho'.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεόν se traduce correctamente como ''Dios''. No aparecen Yahvé, Mesías, Espíritu, δοῦλος u otros términos sensibles. El lenguaje de ''temer a Dios'' se preserva adecuadamente.'
  issues:
  - severity: medium
    issue: Tiempo/aspecto de 'ὑπάρχει σοι πολλὰ'
    rationale: El borrador dice 'tendrás mucho', pero el griego y el English POB dicen 'you have much'. La idea es de recurso o riqueza real disponible bajo la condición expresada, no una simple promesa futura.
  - severity: low
    issue: Matiz idiomático de 'hemos empobrecido'
    rationale: Es aceptable y fiel a ἐπτωχεύσαμεν, pero suena algo menos natural que alternativas como 'hemos llegado a ser pobres' o 'nos hemos quedado pobres' en español general.
  revised_spanish_text: No temas[a], muchacho, porque hemos llegado a ser pobres; tienes mucho, si temes a Dios y te apartas de todo pecado y haces lo que le agrada delante de él.
