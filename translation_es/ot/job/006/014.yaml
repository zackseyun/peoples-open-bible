revisions:
- from: A quien se derrite le corresponde la lealtad de su amigo[a][b], aun si abandona el temor del Todopoderoso.
  to: Al que desfallece le corresponde la bondad[a][b] de su amigo, aun si abandona el temor del Todopoderoso.
  rationale: Se reemplazó «a quien se derrite» por «al que desfallece» para expresar de manera natural en español el sentido contextual de colapso interior/desesperación de לַמָּס sin caer en un calco extraño. Se cambió «lealtad» por «bondad» para reflejar mejor el valor principal que el POB inglés asigna a חֶסֶד en este contexto humano, preservando en nota los matices de amor leal, misericordia y fidelidad. Se ajustó la nota alternativa para mantener coherencia léxica y buena legibilidad.
