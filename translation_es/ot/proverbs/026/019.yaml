base_translation:
  language: en
  yaml_path: translation/ot/proverbs/026/019.yaml
  text: So is the man who deceives his neighbor and says[b][a], “Am I not only joking?”
  footnotes:
  - marker: a
    text: Or “his friend” or “his companion.” The Hebrew רֵעַ can refer to a neighbor, friend, or associate depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “Am I not playing?” / “Am I not jesting?” The Hebrew participle can denote play or jest; here it functions as a dismissive excuse for harmful deception.
    reason: lexical_alternative
