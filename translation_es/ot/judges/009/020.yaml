base_translation:
  language: en
  yaml_path: translation/ot/judges/009/020.yaml
  text: But if not[a], let fire come out from Abimelech and consume the leaders of Shechem and Beth-millo[b]; and let fire come out from the leaders of Shechem and from Beth-millo and consume Abimelech.
