theological_decisions:
- issue: Rendering of גָּרִים in relation to covenant-land identity
  chosen_reading: residing
  alternative_readings:
  - sojourning
  - living as temporary residents
  rationale: The verse concerns the Rechabites' non-settled existence in the land. 'Residing' is readable in the main text, but the more specific nuance of temporary residence should be preserved in a footnote because it contributes to the social and theological texture of the passage without requiring a less natural main-text rendering.
