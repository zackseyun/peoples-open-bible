translation:
  language: es
  text: No añadas a sus palabras[a], no sea que te reprenda y seas hallado mentiroso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y seas hallado falso»; «y seas mostrado falso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תּוֹסְףְּ
  english_pob_choice: Do not add
  chosen_spanish: No añadas
  alternatives_spanish:
  - No agregues
  - No sumes
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición con אַל + imperfecto. «No añadas» reproduce de forma natural y fiel la advertencia de no incorporar algo adicional al contenido dicho.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: 'Con el verbo de añadir, la preposición se vuelve idiomática en español como «a»: «añadir a sus palabras». «Sobre» sería más literal pero menos natural aquí.'
- source_word: דְּבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - su խոսa
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «habla». En el contexto inmediato de 30:5, el referente es la palabra de Dios; «sus palabras» mantiene el vínculo y suena natural en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - no fuera que
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «para que no» comunica bien la consecuencia evitada. También mantiene el matiz de prevención de פֶּן sin sonar arcaico.
- source_word: יוֹכִיחַ
  english_pob_choice: he rebuke
  chosen_spanish: te reprenda
  alternatives_spanish:
  - te reproche
  - te corrija
  lexicon: HALOT
  rationale: יָכַח en hifil puede significar «reprender», «reprochar» o «corregir». «Reprenda» conserva la fuerza confrontativa de la advertencia en un español claro y sobrio.
- source_word: בְּךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - contra ti
  - a ti
  lexicon: HALOT
  rationale: Aunque la preposición puede insinuar dirección hostil o implicación del destinatario, en español la construcción más natural con «reprender» es «te reprenda».
- source_word: וְנִכְזָבְתָּ
  english_pob_choice: you be proved a liar
  chosen_spanish: seas hallado mentiroso
  alternatives_spanish:
  - seas probado falso
  - quedes demostrado como mentiroso
  - seas mostrado falso
  lexicon: HALOT
  rationale: El nifal de כזב expresa quedar demostrado falso o mentiroso. «Seas hallado mentiroso» preserva el matiz pasivo/resultativo y evita endurecer innecesariamente la formulación.
theological_decisions:
- issue: Referente de «sus palabras»
  english_pob_reading: The pronoun refers to God, continuing the thought of v.5.
  chosen_spanish_reading: «Sus palabras» deja el referente implícito, pero el contexto inmediato lo identifica con Dios.
  alternative_spanish_readings:
  - «las palabras de Dios»
  - «sus palabras» con nota explícita del referente
  rationale: La versión inglesa conserva el pronombre para reflejar el hebreo, sin sustituirlo por «Dios». En español conviene mantener esa referencia contextual para no perder la continuidad literaria con 30:5, donde el hablante es Yahvé/Dios.
  doctrine_reference: Contexto inmediato de Proverbios 30:5-6; inspiración y suficiencia de la palabra divina.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente, que indica alta coincidencia y ningún cambio necesario; la redacción española mantiene la economía y fuerza del original, sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija explícitamente; aquí el versículo retoma el pronombre del contexto inmediato, por lo que se mantuvo «sus» para reflejar el hebreo.
  - Se eligió «mentiroso» para el valor final de כזב, en línea con la nota inglesa «be proved a liar / be found a liar», sin suavizar la acusación.
  - 'La puntuación sigue el flujo exhortativo-causal del hebreo: prohibición, consecuencia, resultado.'
