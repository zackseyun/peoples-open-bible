translation:
  language: es
  text: Entonces Aarón regresó a Moisés, a la entrada de la tienda de reunión, y la plaga se detuvo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue detenida», «fue contenida» o «fue frenada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Then Aaron returned
  chosen_spanish: Entonces Aarón regresó
  alternatives_spanish:
  - Y Aarón regresó
  - Así Aarón regresó
  lexicon: HALOT
  rationale: El verbo hebreo שׁוּב expresa un regreso literal o espacial. «Regresó» transmite bien el movimiento de vuelta; «Entonces» conserva el avance narrativo del waw-consecutivo de modo natural en español.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - hacia Moisés
  - de vuelta a Moisés
  lexicon: HALOT
  rationale: La preposición אֶל marca movimiento hacia Moisés. En español, «a Moisés» es la forma más directa y natural; el matiz de retorno ya queda cubierto por «regresó».
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - en la entrada de la tienda de reunión
  - a la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: פֶּתַח significa «entrada» u «apertura». «Tienda de reunión» conserva la traducción transparente de אֹהֶל מוֹעֵד. Elegí «a la entrada» para reflejar el valor direccional del hebreo y mantener fluidez en español.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - el azote
  - la epidemia
  lexicon: HALOT
  rationale: En contextos de juicio, מַגֵּפָה denota una plaga o golpe mortal. «Plaga» es el equivalente más claro y fiel aquí.
- source_word: נֶעֱצָרָה
  english_pob_choice: was stopped
  chosen_spanish: se detuvo
  alternatives_spanish:
  - fue detenida
  - quedó detenida
  - se restringió
  lexicon: HALOT
  rationale: El nifal de עצר indica que la plaga fue puesta en pausa o frenada. «Se detuvo» reproduce bien la pasividad/resultativo sin añadir un sujeto explícito que el hebreo no expresa en esta cláusula.
theological_decisions:
- issue: Agencia divina implícita en la detención de la plaga
  english_pob_reading: Retain the passive 'was stopped' without making God the explicit subject in the translation.
  chosen_spanish_reading: Mantener una formulación pasiva o media («se detuvo») sin explicitar al agente.
  alternative_spanish_readings:
  - y Yahvé detuvo la plaga
  - y la plaga fue detenida
  rationale: El hebreo no nombra al agente en esta cláusula; aunque el contexto deja clara la acción divina, la traducción debe respetar esa reserva y no resolverla añadiendo un sujeto que el texto no expresa.
  doctrine_reference: Principio de primacía del texto original y de preservación de la tensión teológica implícita.
translation_notes:
  revision_awareness: La base inglesa revisó la última formulación de «had been stopped» a «was stopped» para reflejar más directamente la forma hebrea. En español, «se detuvo» conserva ese valor verbal sin introducir perfectividad ajena al contexto.
  spanish_consistency_notes:
  - «Yahvé» se reserva para el Tetragrámaton; aquí no aparece explícitamente, por lo que no se lo añade.
  - «Tienda de reunión» sigue el término POB transparente para אֹהֶל מוֹעֵד.
  - Se evita «se había detenido» para no volver más temporal de lo que pide el hebreo y para mantener la lectura narrativa inmediata.
