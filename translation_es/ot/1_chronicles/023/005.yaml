translation:
  language: es
  text: y cuatro mil porteros, y cuatro mil que alababan a Yahvé con los instrumentos[a] que yo hice para alabarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con los instrumentos que yo hice para alabar»; la frase también puede entenderse como «con los instrumentos que hice para dar alabanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁעֲרִים
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de las puertas
  - encargados de las puertas
  lexicon: HALOT
  rationale: El término nombra a quienes están asignados a las puertas. En español, «porteros» comunica bien esa función administrativa/templearia sin sonar demasiado técnico; «guardianes de las puertas» es más explícito pero más pesado.
- source_word: מְהַֽלְלִים
  english_pob_choice: praising
  chosen_spanish: los que alaban
  alternatives_spanish:
  - alabando
  - los alabadores
  lexicon: HALOT
  rationale: El participio hebreo señala una función continua. «Los que alaban» conserva ese valor de grupo/rol mejor que una simple forma verbal suelta, y suena natural en español.
- source_word: לַ/יהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo tiene el nombre divino YHWH directamente. Según el criterio del proyecto, se vierte como «Yahvé» para preservar el nombre de pacto, no como un título de sustitución.
- source_word: בַּ/כֵּלִים
  english_pob_choice: with the instruments
  chosen_spanish: con los instrumentos
  alternatives_spanish:
  - con los utensilios
  - con los implementos
  lexicon: HALOT
  rationale: En este contexto de alabanza, el sustantivo amplio «instrumentos» es la mejor opción contextual en español; el sentido musical queda claro por la frase y no requiere añadir «musicales».
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I made
  chosen_spanish: que yo hice
  alternatives_spanish:
  - que hice
  - que fabriqué
  lexicon: HALOT
  rationale: La cláusula relativa se conserva de forma directa. «Hice» reproduce con sobriedad el verbo hebreo sin forzar una especificación artesanal que el texto no exige.
- source_word: לְ/הַלֵּל
  english_pob_choice: to praise him
  chosen_spanish: para alabarlo
  alternatives_spanish:
  - para alabar
  - a fin de alabarlo
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para alabarlo» es la forma más natural en español y refleja la finalidad de los instrumentos; el pronombre enclítico mantiene la referencia a Yahvé.
- source_word: וְ/אַרְבַּ֤עַת אֲלָפִים֙ ... וְ/אַרְבַּ֥עַת אֲלָפִ֖ים
  english_pob_choice: and four thousand ... and four thousand
  chosen_spanish: y cuatro mil ... y cuatro mil
  alternatives_spanish:
  - y cuatro millares ... y cuatro millares
  lexicon: HALOT
  rationale: Se conserva la repetición numérica y la estructura paralela del hebreo, sin comprimir los dos grupos distintos mencionados en el versículo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: the LORD / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo presenta explícitamente el tetragrámaton. La política del proyecto para español es usar «Yahvé», preservando el nombre divino en lugar de ocultarlo tras un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Función de los levitas que alaban
  english_pob_reading: praising
  chosen_spanish_reading: los que alaban
  alternative_spanish_readings:
  - alabando
  - alabadores
  rationale: El participio no se reduce a una acción momentánea, sino a un oficio o función estable. En español, la forma sustantivada «los que alaban» conserva mejor ese valor funcional.
  doctrine_reference: HALOT participial nuance
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado de «for praise» a «to praise him» para reflejar con más naturalidad el infinitivo לְהַלֵּל. La versión española sigue esa misma decisión de finalidad, expresándola como «para alabarlo» y manteniendo el pronombre referido a Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con la terminología del proyecto para el Tetragrámaton.
  - «Instrumentos» se conserva sin adjetivación adicional porque el contexto litúrgico ya especifica su uso.
  - La estructura repetida «y cuatro mil ... y cuatro mil» reproduce el paralelismo hebreo sin condensación.
  - La nota textual conserva la ambigüedad lexical del final del versículo sin resolverla de forma interpretativa excesiva.
