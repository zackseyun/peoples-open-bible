translation:
  language: es
  text: 'Y cuando anuncies a este pueblo todas estas palabras[a], y ellos te digan: «¿Por qué Yahvé ha hablado contra nosotros todo este gran desastre? ¿Y cuál es nuestra iniquidad, y cuál es nuestro pecado que hemos cometido contra Yahvé nuestro Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda esta gran calamidad». La palabra hebrea también puede traducirse «mal», pero aquí se refiere al desastre o juicio que viene sobre el pueblo, no al mal moral en Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y acontecerá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La construcción introductoria marca una contingencia temporal futura; «Y cuando» conserva la relación sintáctica sin volver el español innecesariamente arcaico.
- source_word: תַגִּיד
  english_pob_choice: you tell
  chosen_spanish: tú anuncies
  alternatives_spanish:
  - tú digas
  - tú declares
  lexicon: HALOT
  rationale: En el contexto profético, «anunciar» comunica bien la idea de hacer saber el mensaje divino. Mantiene la fuerza pública del acto de comunicar sin forzar un calco.
- source_word: לָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a este pueblo
  - a estas personas
  lexicon: HALOT
  rationale: Se conserva el singular colectivo עָם como «pueblo», que suena natural en español y preserva la forma del hebreo.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todos estos dichos
  - todos estos mensajes
  lexicon: HALOT
  rationale: «Palabras» refleja el valor de דְּבָרִים como contenido verbal del mensaje profético. Se evita «cosas» porque debilitaría el carácter de discurso.
- source_word: עַל מֶה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por cuál razón?
  lexicon: HALOT
  rationale: La pregunta idiomática en español es «¿Por qué?», que reproduce con naturalidad el sentido causal.
- source_word: דִבֶּר יְהוָה עָלֵינוּ
  english_pob_choice: has Yahweh spoken against us
  chosen_spanish: Yahvé ha hablado contra nosotros
  alternatives_spanish:
  - Yahvé ha declarado contra nosotros
  - Yahvé ha pronunciado contra nosotros
  lexicon: HALOT
  rationale: El valor adversativo de עַל con דִּבֵּר se expresa bien con «contra nosotros». Se mantiene «Yahvé» conforme a la política del proyecto para el Nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se adopta la forma española establecida por el proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: כָּל הָרָעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: all this great disaster
  chosen_spanish: todo este gran desastre
  alternatives_spanish:
  - toda esta gran calamidad
  - todo este gran mal
  lexicon: HALOT
  rationale: En un contexto de juicio, רָעָה se entiende como calamidad/desastre, no como mal moral. «Desastre» comunica la catástrofe anunciada sin atribuir maldad a Dios.
- source_word: עֲוֺנֵנוּ
  english_pob_choice: our iniquity
  chosen_spanish: nuestra iniquidad
  alternatives_spanish:
  - nuestra culpa
  - nuestro pecado
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral y jurídico de עָוֹן y distingue este término del siguiente «pecado».
- source_word: חַטָּאתֵנוּ
  english_pob_choice: our sin
  chosen_spanish: nuestro pecado
  alternatives_spanish:
  - nuestro delito
  - nuestra transgresión
  lexicon: HALOT
  rationale: חַטָּאת se traduce de forma directa como «pecado», manteniendo la distinción terminológica con עָוֹן.
- source_word: אֲשֶׁר חָטָאנוּ
  english_pob_choice: that we have sinned
  chosen_spanish: con el que hemos pecado
  alternatives_spanish:
  - que hemos cometido
  - porque hemos pecado
  lexicon: HALOT
  rationale: La cláusula explicativa se integra en español con una forma relativa natural. «Hemos pecado» refleja el perfecto y el vínculo causal con la culpa mencionada.
- source_word: לַיהוָה אֱלֹהֵינוּ
  english_pob_choice: against Yahweh our God
  chosen_spanish: contra Yahvé nuestro Dios
  alternatives_spanish:
  - a Yahvé nuestro Dios
  - frente a Yahvé nuestro Dios
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es לְ, con חטא el sentido idiomático en español es «pecar contra». Se conserva «nuestro Dios» para reflejar el vínculo de pacto.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la política del POB en español, se vierte como «Yahvé» para preservar el Nombre propio y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הָרָעָה en contexto judicial
  english_pob_reading: great disaster
  chosen_spanish_reading: gran desastre
  alternative_spanish_readings:
  - gran calamidad
  - gran mal
  rationale: Aquí רָעָה describe la desgracia del juicio que viene sobre el pueblo. «Desastre» evita sugerir mal moral en Yahvé y mantiene la idea de calamidad anunciada.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source''s plain sense'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] exactamente en el texto principal junto al segmento correspondiente. No se introdujeron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva la distinción entre «iniquidad» y «pecado» para עָוֹן / חַטָּאת.
  - «Contra nosotros» reproduce el sentido adversativo de דִּבֵּר עָלֵינוּ.
  - «Desastre» sigue la decisión auditada para רָעָה en contexto de juicio.
