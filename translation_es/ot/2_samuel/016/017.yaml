translation:
  language: es
  text: 'Absalón dijo a Husai[a]: «¿Es esta tu lealtad para con tu amigo? ¿Por qué no fuiste con tu amigo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bondad» o «amor leal» para חֶסֶד.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַסְדְּךָ
  english_pob_choice: your loyalty
  chosen_spanish: tu lealtad
  alternatives_spanish:
  - tu bondad
  - tu amor leal
  lexicon: HALOT
  rationale: חֶסֶד puede expresar bondad, amor leal o lealtad del pacto. En este reproche de Absalón a Husai, el punto es la fidelidad relacional y política hacia David, por lo que «lealtad» comunica mejor la fuerza del término sin convertirlo en un tecnicismo teológico.
- source_word: רֵעֶךָ
  english_pob_choice: your friend
  chosen_spanish: tu amigo
  alternatives_spanish:
  - tu compañero
  - tu allegado
  lexicon: HALOT
  rationale: רֵעַ suele significar amigo, compañero o asociado. Aquí Absalón habla de David desde su perspectiva; «amigo» es natural en español y conserva la acusación repetida.
- source_word: לָמָּה לֹא הָלַכְתָּ אֶת רֵעֶךָ
  english_pob_choice: Why did you not go with your friend?
  chosen_spanish: ¿Por qué no fuiste con tu amigo?
  alternatives_spanish:
  - ¿Por qué no acompañaste a tu amigo?
  - ¿Por qué no te fuiste con tu amigo?
  lexicon: HALOT
  rationale: הָלַךְ con אֶת expresa acompañar a alguien. «Fuiste con» mantiene la simplicidad verbal del hebreo y suena más directo en español que el más interpretativo «acompañaste», aunque ambas opciones son posibles.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  lexicon: HALOT
  rationale: El verbo narrativo estándar es «decir». En español, «dijo» conserva el valor introductorio del discurso y deja que la pregunta se exprese dentro de la cita.
- source_word: זֶה חַסְדְּךָ אֶת רֵעֶךָ
  english_pob_choice: Is this your loyalty to your friend?
  chosen_spanish: ¿Es esta tu lealtad para con tu amigo?
  alternatives_spanish:
  - ¿Esta es tu lealtad para con tu amigo?
  - ¿Es esta tu bondad para con tu amigo?
  lexicon: HALOT
  rationale: El hebreo es una pregunta retórica sin verbo explícito. El español requiere una cópula para sonar natural. «Para con» refleja la relación dirigida hacia alguien y evita endurecer el hebreo a una mera propiedad abstracta.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y la auditoría inglesa: mantiene la pregunta retórica, conserva la sencillez verbal de הָלַךְ con אֶת y traduce חֶסֶד con una opción relacional («lealtad») adecuada al contexto político inmediato de la acusación de Absalón.'
  spanish_consistency_notes:
  - Se usa «Husai» como forma española estable del nombre propio.
  - Se prefiere «amigo» de manera consistente para רֵעַ, en paralelo con la auditoría inglesa.
  - La puntuación reproduce el discurso directo con pregunta retórica doble, como en el hebreo.
