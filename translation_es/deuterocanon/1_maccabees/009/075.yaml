translation:
  language: es
  text: Y acampó contra Joppe[a], y los de la ciudad le cerraron el paso, porque había una guarnición de Apolonio en Joppe; y combatieron contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y combatieron contra ella». El sujeto cambia al plural en el texto fuente después de los verbos singulares anteriores; el pronombre probablemente se refiere a Jonatán y sus fuerzas, por un lado, y a Joppe, por otro. Se conserva la redacción en vez de suavizarla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν ἐπὶ
  english_pob_choice: encamped against
  chosen_spanish: acampó contra
  alternatives_spanish:
  - acamparon contra
  - marchó contra
  lexicon: LSJ
  rationale: El verbo denota formar campamento o desplegar fuerzas, y con ἐπί + acusativo de una ciudad conserva el matiz militar hostil. En español, «acampó contra» mantiene esa imagen sin perder naturalidad.
- source_word: Ἰόππην
  english_pob_choice: Joppa
  chosen_spanish: Joppe
  alternatives_spanish:
  - Joppa
  lexicon: transliteración tradicional en español
  rationale: «Joppe» es una forma estable y reconocible en español bíblico; conserva la referencia geográfica sin depender de la transliteración inglesa.
- source_word: ἀπέκλεισαν αὐτὸν
  english_pob_choice: shut him out
  chosen_spanish: le cerraron la entrada
  alternatives_spanish:
  - lo cerraron fuera
  - lo excluyeron
  - le cerraron el paso
  lexicon: LSJ
  rationale: El verbo expresa impedir el acceso. En español, «le cerraron la entrada» comunica con claridad que no lo dejaron entrar, sin forzar una fórmula poco idiomática.
- source_word: οἱ ἐκ τῆς πόλεως
  english_pob_choice: those from the city
  chosen_spanish: los de la ciudad
  alternatives_spanish:
  - los habitantes de la ciudad
  - la gente de la ciudad
  - los hombres de la ciudad
  lexicon: LSJ
  rationale: La construcción griega señala a los procedentes de la ciudad como sujeto agente. «Los de la ciudad» es breve, natural y suficientemente cercano al original, sin añadir especificación de género.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, dado que
  lexicon: LSJ
  rationale: Introduce la causa de que le cerraran la entrada. «Porque» es la equivalencia directa y clara en español.
- source_word: φρουρὰ Ἀπολλωνίου
  english_pob_choice: a garrison of Apollonius
  chosen_spanish: una guarnición de Apolonio
  alternatives_spanish:
  - la guarnición de Apolonio
  - una tropa de Apolonio
  lexicon: LSJ
  rationale: La frase indica una guarnición asociada a Apolonio; «guarnición» preserva el sentido militar y «de Apolonio» refleja la relación posesiva o de pertenencia implícita.
- source_word: ἐπολέμησαν αὐτήν
  english_pob_choice: they fought against it
  chosen_spanish: combatieron contra ella
  alternatives_spanish:
  - lucharon contra ella
  - pelearon contra ella
  - la atacaron
  lexicon: LSJ
  rationale: El plural del verbo debe mantenerse sin armonizarse con el sujeto singular anterior. «Ella» conserva el referente femenino de la ciudad en español y reproduce la relación pronominal del griego.
translation_notes:
  revision_awareness: El texto griego presenta un cambio abrupto de singular a plural al final; la versión española lo conserva para no armonizar ni borrar la tensión observada en el texto fuente. El audit trail inglés indica que no hubo revisiones aplicadas y que el estado final mantiene alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Joppe» como topónimo español tradicional, coherente con el uso bíblico en español.
  - Se evitó «SEÑOR» o terminología teológica no pertinente, pues el versículo no contiene referencias al nombre divino ni a títulos cristológicos.
  - «Le cerraron la entrada» traduce el bloqueo de acceso sin perder el valor hostil del verbo griego.
  - El pronombre femenino «ella» respeta el referente implícito de la ciudad y conserva el cambio de número observado en el griego.
