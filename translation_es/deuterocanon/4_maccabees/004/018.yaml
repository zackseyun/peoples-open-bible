translation:
  language: es
  text: Él también buscó a la nación y la condujo[a] a toda clase de transgresión de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llevó a toda clase de transgresión de la ley». El verbo griego puede sugerir modelar un modo de vida o conducta pública, no solo forzar actos aislados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεζήτησεν
  english_pob_choice: sought out
  chosen_spanish: buscó a
  alternatives_spanish:
  - buscó
  - buscó y persiguió
  - anduvo buscando a
  lexicon: BDAG
  rationale: El verbo compuesto expresa una búsqueda activa y deliberada. En español, «buscó a» conserva la acción intencional sin volverla demasiado interpretativa.
- source_word: τὸ ἔθνος
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la nación judía
  lexicon: BDAG
  rationale: «Nación» reproduce el singular colectivo del griego y mantiene el matiz político-étnico. «El pueblo» sería posible, pero suaviza el valor de ἔθνος; «nación judía» añade un identificador no explícito en el texto griego.
- source_word: ἐξεπολίτευσεν
  english_pob_choice: led it into
  chosen_spanish: la condujo
  alternatives_spanish:
  - la llevó
  - la indujo a
  - la encaminó a
  lexicon: LSJ
  rationale: El verbo puede sugerir moldear la conducta o el modo de vida. En español, «condujo» conserva el sentido causativo/resultativo y permite continuar con la meta moral del sintagma siguiente sin forzar una glosa demasiado técnica.
- source_word: ἐπὶ πᾶσαν παρανομίαν
  english_pob_choice: into every kind of lawlessness
  chosen_spanish: a toda clase de ilegalidad
  alternatives_spanish:
  - a toda clase de lawlessness
  - hacia toda clase de ilegalidad
  - a toda clase de injusticia
  lexicon: BDAG
  rationale: «Paranomía» designa conducta contraria a la ley; en este contexto, «ilegalidad» comunica esa oposición al orden debido. «Toda clase de» transmite el valor distributivo/intensivo de πᾶσαν.
theological_decisions:
- issue: Caracterización moral de παρανομία en contexto de la ley ancestral
  english_pob_reading: lawlessness
  chosen_spanish_reading: ilegalidad
  alternative_spanish_readings:
  - desorden
  - iniquidad
  - transgresión
  rationale: La idea central es la conducta contraria a la ley. «Ilegalidad» preserva el vínculo con la ley sin introducir un término más moralizante que pudiera estrechar el matiz del griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; lexical consistency with documented contextual flexibility.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «led it» sobre «drove it» para ἐξεπολίτευσεν. Se mantuvo el valor coercitivo/resultativo del verbo, pero en español se optó por «condujo» para evitar una dureza innecesaria y conservar fluidez. También se retuvo la amplitud de «every kind of lawlessness» mediante «toda clase de ilegalidad».
  spanish_consistency_notes:
  - Se preservó el referente colectivo singular con «la nación».
  - Se evitó traducir mecánicamente desde el inglés cuando el español permitía una relación verbal más natural («condujo a»).
  - Se mantuvo la tensión lexical de ἐξεπολίτευσεν como acción que afecta conducta/forma de vida, indicada en nota.
  - No se usó «Señor» ni terminología eclesiástica ajena al pasaje.
