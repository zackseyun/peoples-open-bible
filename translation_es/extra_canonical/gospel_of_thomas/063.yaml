base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/063.yaml
  text: Jesus said[a], “There was a rich man who had a lot of money. He said, ‘I will use my money, so that I will sow and I will reap and I will plant, and I will fill my storehouses with produce, so that I will lack nothing.’ These were the things he was thinking in his heart. And in that night, he died. Whoever has ears[i][h][g][f][e][d][c][b], let that one hear.”
  footnotes:
  - marker: a
    text: Coptic ⲭⲣⲏⲙⲁ can mean money, wealth, or property (Greek χρῆμα). ‘Money’ is chosen for concreteness; ‘wealth’ would also be possible.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲱⲱϭⲉ is rendered ‘plant’ (Crum s.v.). Some may hear an echo of Luke’s ‘build,’ but the Coptic verb here is agricultural, not architectural.
    reason: lexical_alternative
  - marker: c
    text: ⲁϩⲟ denotes storehouses/barns/granaries. ‘Storehouses’ is chosen to avoid over-specificity.
    reason: lexical_alternative
  - marker: d
    text: ‘So that I will lack nothing’ renders ⲣϭⲣⲱϩ with the negative ⲛⲗⲁⲁⲩ, literally ‘be in need of nothing.’
    reason: cultural_note
  - marker: e
    text: In ⲱϩⲥ (‘reap’), the letter ϩ is a restoration in Dilley’s edition due to manuscript damage.
    reason: lacuna_or_restoration
  - marker: f
    text: For context, compare Luke 12:16–21 (the rich man and barns), noting the significant differences in wording and emphasis.
    reason: cross_reference
  - marker: g
    text: Or 'for I will sow'.
    reason: previous_rendering
  - marker: h
    text: Or 'Whoever has ears to hear,'.
    reason: previous_rendering
  - marker: i
    text: Or 'This was what he was thinking'.
    reason: previous_rendering
