translation:
  language: es
  text: Si no escuchan mi voz[a], ciertamente esta gran y numerosa multitud[b] será reducida a unos pocos entre las naciones, donde yo los dispersaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἀκούω puede significar ‘oír’ o ‘escuchar con obediencia’. Aquí se eligió ‘escuchar’ por el contexto de advertencia del pacto.
    reason: lexical_alternative
  - marker: b
    text: Aunque ἡ βόμβησις puede significar literalmente ‘ruido’, ‘zumbido’ o ‘tumulto’, aquí se entiende como una multitud o pueblo numeroso, porque la frase siguiente habla de ser reducida a unos pocos entre las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν μὴ ἀκούσητε
  english_pob_choice: If you do not listen
  chosen_spanish: Si no escuchan
  alternatives_spanish:
  - Si no oyen
  - Si no prestan atención
  lexicon: BDAG
  rationale: ἀκούω puede significar oír o escuchar con atención/obediencia según el contexto. En una advertencia del pacto, ‘escuchar’ comunica mejor la idea de atender y obedecer, no solo percibir sonidos.
- source_word: τῆς φωνῆς μου
  english_pob_choice: to my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - a mi voz
  - lo que digo
  lexicon: LEH
  rationale: Mantiene el giro bíblico directo de la voz divina. En español, ‘escuchar mi voz’ suena natural y conserva el matiz de obediencia implícita en el hebraísmo/idioma bíblico.
- source_word: εἰ μὴν
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - en verdad
  lexicon: LSJ
  rationale: La partícula refuerza con énfasis solemne la consecuencia. ‘Ciertamente’ expresa esa seguridad sin sobrecargar el tono.
- source_word: ἡ βόμβησις
  english_pob_choice: multitude
  chosen_spanish: multitud
  alternatives_spanish:
  - ruido
  - tumulto
  - rumor
  lexicon: LSJ
  rationale: Aunque el término puede denotar ruido, zumbido o tumulto, el contexto inmediato habla de que será ‘reducida a unos pocos entre las naciones’; por eso el sentido metonímico de un pueblo numeroso encaja mejor. ‘Multitud’ preserva esa tensión sin volver el texto extraño en español.
- source_word: ἡ μεγάλη ἡ πολλὴ αὕτη
  english_pob_choice: this great and numerous
  chosen_spanish: esta gran multitud
  alternatives_spanish:
  - esta gran y numerosa multitud
  - esta multitud grande y numerosa
  lexicon: LEH
  rationale: Los adjetivos intensifican el tamaño del grupo. En español, ‘gran multitud’ comunica de forma natural la doble idea de grandeza y número, sin repetir de manera torpe.
- source_word: ἀποστρέψει εἰς μικρὰν
  english_pob_choice: will be reduced to a few
  chosen_spanish: será reducida a unos pocos
  alternatives_spanish:
  - se volverá pequeña
  - quedará en pocos
  lexicon: LEH
  rationale: El griego expresa un paso de gran número a pequeño número. ‘Será reducida a unos pocos’ reproduce con claridad ese resultado cuantitativo.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: LEH
  rationale: ‘Naciones’ conserva el vocabulario bíblico del exilio y de la dispersión. ‘Entre’ refleja bien la ubicación dispersa sin añadir interpretación.
- source_word: οὗ διασπερῶ αὐτοὺς ἐκεῖ
  english_pob_choice: where I will scatter them
  chosen_spanish: donde yo los dispersaré
  alternatives_spanish:
  - adonde yo los dispersaré
  - en el lugar donde yo los dispersaré
  lexicon: LEH
  rationale: El griego repite el valor locativo con énfasis, pero el español no necesita conservar una redundancia literal. ‘Donde yo los dispersaré’ expresa el sentido con naturalidad y fidelidad.
theological_decisions:
- issue: La ‘voz’ divina como demanda de obediencia
  english_pob_reading: Render the statement as a solemn divine threat of numerical reduction in exile without importing additional interpretive language about judgment beyond the text.
  chosen_spanish_reading: 'Presentar la frase como una advertencia solemne: si no escuchan la voz de Dios, el pueblo será disminuido y dispersado.'
  alternative_spanish_readings:
  - Si no oyen mi voz, este gran ruido se reducirá...
  - Si no obedecen mi palabra...
  rationale: El texto vincula la falta de escucha con una consecuencia histórica concreta. Traducir ‘escuchar mi voz’ preserva la relación bíblica entre oír y obedecer sin añadir explicaciones doctrinales no presentes en la línea.
  doctrine_reference: Mantener la advertencia del pacto tal como aparece en el texto; no expandir el juicio más allá de la formulación original.
- issue: βόμβησις como población o como ruido
  english_pob_reading: The noun is rendered 'multitude' because the following phrase 'to a few among the nations' points to the people as a large population being diminished.
  chosen_spanish_reading: Entender ‘βόμβησις’ aquí como la masa del pueblo, no como un simple sonido.
  alternative_spanish_readings:
  - Entenderlo literalmente como ‘ruido’ o ‘tumulto’
  - Tomarlo como ‘muchedumbre’
  rationale: 'La segunda mitad del versículo exige un referente humano: algo grande que puede volverse ‘pocos’ entre las naciones. Traducir ‘multitud’ conserva esa referencia colectiva y evita perder la fuerza del pasaje.'
  doctrine_reference: Primacía del contexto inmediato y de la coherencia semántica sobre una literalidad aislada.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que prefirió ‘numerous’ para ἡ πολλή y eliminó el ‘there’ final por redundancia. La versión española sigue esa línea: usa ‘gran multitud’ para reflejar el énfasis de tamaño sin repetir innecesariamente un locativo final. También evita una traducción mecánica de ἡ βόμβησις como ‘ruido’, porque el contexto exige un referente colectivo.'
  spanish_consistency_notes:
  - Se usa ‘escuchar’ para ἀκούω en contexto de advertencia, consistente con el valor de obediencia implícita.
  - Se usa ‘multitud’ para βόμβησις por el contexto de disminución numérica.
  - Se conserva ‘naciones’ como traducción de ἔθνη, evitando ‘gentiles’ por carga teológica innecesaria en este contexto.
  - Se mantiene un español natural y publicable, sin introducir una redundancia locativa final que el propio proceso de revisión en inglés descartó.
