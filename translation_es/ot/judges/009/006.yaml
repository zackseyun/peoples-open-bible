translation:
  language: es
  text: Entonces se reunieron todos los jefes[a] de Siquem y toda Bet-miló[b], y fueron e hicieron rey a Abimélec junto al roble del pilar[c] que estaba en Siquem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los señores»; el hebreo בַּעֲלֵי aquí designa a los que tenían poder o autoridad en Siquem, no necesariamente a todos sus habitantes.
    reason: lexical_alternative
  - marker: b
    text: Bet-miló probablemente funciona aquí como nombre de lugar o de grupo. El hebreo puede leerse literalmente como «casa de Miló», pero el referente exacto no es seguro.
    reason: cultural_note
  - marker: c
    text: O «junto al roble de la piedra erigida» o «al lado del roble pilar»; la frase hebrea es difícil, y el sentido exacto de מֻצָּב es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los dueños de Siquem
  alternatives_spanish:
  - los líderes de Siquem
  - los jefes de Siquem
  - los señores de Siquem
  lexicon: HALOT
  rationale: בעלים expresa literalmente posesión/autoridad; en este contexto político puede apuntar a quienes controlan la ciudad. 'Dueños' conserva esa fuerza de dominio sin importar una jerarquía feudal explícita como 'señores', y evita reducirlo sin base a un término demasiado general como 'líderes'.
- source_word: בֵּית מִלּוֹא
  english_pob_choice: Beth-millo
  chosen_spanish: Bet-miló
  alternatives_spanish:
  - la casa de Miló
  - Bet-millo
  lexicon: HALOT
  rationale: La POB inglesa lo trata como designación propia de lugar o grupo, manteniendo la incertidumbre. En español conviene transliterar de forma natural como nombre propio, sin interpretarlo prematuramente como una casa literal.
- source_word: וַיַּמְלִיכוּ ... לְמֶלֶךְ
  english_pob_choice: made Abimelech king
  chosen_spanish: proclamaron rey a Abimélec
  alternatives_spanish:
  - hicieron rey a Abimélec
  - coronaron rey a Abimélec
  lexicon: HALOT
  rationale: El hifil de מלך significa hacer/reconocer como rey. 'Proclamaron rey' expresa el acto de entronización sin añadir un rito de coronación no explicitado por el hebreo.
- source_word: עִם
  english_pob_choice: beside
  chosen_spanish: junto al
  alternatives_spanish:
  - al lado del
  - junto a
  lexicon: HALOT
  rationale: La frase marca ubicación espacial relativa al árbol/monumento. 'Junto al' es una forma natural en español que conserva la proximidad indicada por la revisión inglesa más reciente.
- source_word: אֵלוֹן
  english_pob_choice: oak
  chosen_spanish: roble
  alternatives_spanish:
  - encina
  - terebinto
  - gran árbol
  lexicon: HALOT
  rationale: אֵלוֹן puede referirse a un gran árbol, a menudo rendido como 'oak'. 'Roble' es una equivalencia natural y digna en español; 'encina' o 'terebinto' introducen especificidad botánica no segura.
- source_word: מֻצָּב
  english_pob_choice: pillar / monument
  chosen_spanish: erigido
  alternatives_spanish:
  - levantado
  - puesto en pie
  - pilar
  lexicon: HALOT
  rationale: La forma denota algo puesto de pie o establecido. Dado que el inglés auditable vacila entre 'pillar' y 'monument', el participio 'erigido' deja visible la tensión sin forzar una identificación más precisa que la que el hebreo garantiza.
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El verbo indica reunión/convocatoria colectiva. 'Se reunieron' es idiomático y suficientemente formal para un relato histórico.
theological_decisions:
- issue: Terminología para la entronización de Abimélec
  english_pob_reading: made Abimelech king
  chosen_spanish_reading: proclamaron rey a Abimélec
  alternative_spanish_readings:
  - hicieron rey a Abimélec
  - lo hicieron rey
  rationale: No hay una implicación teológica adicional más allá del acto político de establecer realeza. 'Proclamaron' mantiene el valor causativo del hebreo sin sugerir una unción o ceremonia que el texto no menciona.
  doctrine_reference: Ninguna doctrinal explícita; decisión de sentido verbal y político.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado en la POB inglesa: ''beside'' para עִם y ''oak pillar/standing stone'' para la frase final. En español se preservó esa proximidad espacial con ''junto al'' y la ambigüedad de מֻצָּב con ''erigido'', sin decidir demasiado entre ''pilar'' y ''monumento''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino por norma del proyecto, pero este versículo no lo contiene.
  - Se translitera 'Siquem' y 'Abimélec' con acentuación española usual.
  - Se evita 'SEÑOR' y 'coro­naron' para no introducir lecturas no atestiguadas por el hebreo.
  - '''Bet-miló'' se mantiene como nombre propio en la línea principal y se explica en nota para no perder la incertidumbre del original.'
