translation:
  language: es
  text: Cuando llegues allá, busca allí a Jehú, hijo de Joásafat, hijo de Nimsi. Entra, hazlo levantarse de entre sus hermanos, y llévalo a un cuarto interior[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un cuarto dentro de un cuarto», es decir, una cámara interior privada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ שָׁמָּה
  english_pob_choice: When you arrive there
  chosen_spanish: Cuando llegues allá
  alternatives_spanish:
  - Cuando vayas allá
  - Cuando entres allí
  lexicon: HALOT
  rationale: בוא puede significar venir, ir o llegar según el punto de vista. En español, «llegues allá» reproduce naturalmente la idea de alcanzar el lugar antes de la siguiente orden.
- source_word: וּרְאֵה שָׁם
  english_pob_choice: look there for
  chosen_spanish: mira allá por
  alternatives_spanish:
  - mira allá
  - busca allí
  lexicon: HALOT
  rationale: ראה aquí tiene sentido de localizar o identificar a alguien. «Mira allá por» conserva la dirección espacial repetida del hebreo y expresa la búsqueda de manera natural.
- source_word: יֵהוּא בֶן יְהוֹשָׁפָט בֶּן נִמְשִׁי
  english_pob_choice: Jehu son of Jehoshaphat, son of Nimshi
  chosen_spanish: Jehú, hijo de Joásafat, hijo de Nimsi
  alternatives_spanish:
  - Jehú, hijo de Jehosafat, hijo de Nimsi
  - Jehú, hijo de Josafat, hijo de Nimsi
  lexicon: Nombres propios / transliteración
  rationale: Se transliteran los nombres propios al español con formas usuales y legibles. Se mantiene la cadena genealógica con «hijo de» porque בן en serie genealógica lo pide directamente.
- source_word: וּבָאתָ
  english_pob_choice: Go in
  chosen_spanish: Entra
  alternatives_spanish:
  - Ve adentro
  - Pasa
  lexicon: HALOT
  rationale: El segundo בוא introduce el movimiento hacia el interior del grupo o espacio donde está Jehú. «Entra» es conciso y natural en español.
- source_word: וַהֲקֵמֹתוֹ
  english_pob_choice: get him up
  chosen_spanish: hazlo levantarse
  alternatives_spanish:
  - levántalo
  - haz que se ponga de pie
  lexicon: HALOT
  rationale: Hifil de קום expresa causar que alguien se ponga en pie. «Hazlo levantarse» conserva la fuerza causativa sin sonar rígido.
- source_word: מִתּוֹךְ אֶחָיו
  english_pob_choice: from among his brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de entre sus compañeros
  - de entre sus parientes
  lexicon: HALOT
  rationale: אחים se traduce de forma literal como «hermanos». La expresión española «de entre» refleja היטב el matiz de separación de un grupo.
- source_word: וְהֵבֵיאתָ אֹתוֹ
  english_pob_choice: and bring him
  chosen_spanish: y llévalo
  alternatives_spanish:
  - y tráelo
  - y condúcelo
  lexicon: HALOT
  rationale: El hifil de בוא puede ser traer/llevar. Aquí «llévalo» funciona bien en la secuencia de acciones y mantiene el movimiento hacia un lugar interior.
- source_word: חֶדֶר בְּחָדֶר
  english_pob_choice: into an inner room
  chosen_spanish: a un cuarto interior
  alternatives_spanish:
  - a una cámara interior
  - a un cuarto dentro de un cuarto
  lexicon: HALOT
  rationale: La expresión hebrea literalmente intensifica la interioridad y privacidad. «Cuarto interior» comunica el sentido idiomático con claridad; el literal «cuarto dentro de un cuarto» queda como alternativa posible.
theological_decisions:
- issue: Nada doctrinalmente disputado; el versículo es una instrucción narrativa con matiz espacial y genealógico.
  english_pob_reading: No theological decisions recorded.
  chosen_spanish_reading: No se introduce lenguaje doctrinal; se conserva el tono directivo y narrativo del hebreo.
  alternative_spanish_readings:
  - —
  rationale: La traducción no requiere armonización doctrinal. La prioridad es conservar el orden de instrucciones y la precisión léxica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que añadió explícitamente «there» para reflejar la repetición de שם; por eso se conservó en español la repetición espacial con «allá» y se mantuvo la secuencia imperativa sin omitir el segundo deíctico.
  spanish_consistency_notes:
  - Se usa «Jehú» para יֵהוּא y «Joásafat» / «Nimsi» según formas españolas legibles y consistentes.
  - Se mantiene la distinción entre «llegues allá» y «mira allá» para reflejar la duplicación de שם.
  - «Cuarto interior» evita una calca demasiado pesada, pero la nota conserva la literalidad idiomática hebrea.
  - El tono es directivo, conciso y compatible con una traducción bíblica de equivalencia óptima.
