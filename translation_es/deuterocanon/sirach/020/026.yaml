translation:
  language: es
  text: El carácter de un hombre mentiroso es deshonra[a], y su vergüenza está continuamente con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La disposición de un hombre falso es deshonra, y su vergüenza está constantemente con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦθος
  english_pob_choice: character
  chosen_spanish: carácter
  alternatives_spanish:
  - disposición
  - modo de ser
  - costumbre
  lexicon: LSJ
  rationale: ἦθος aquí designa la disposición moral estable o el modo de ser de una persona. «Carácter» comunica bien esa idea en español natural y mantiene el sentido ético del texto sin reducirlo a un hábito aislado ni a una costumbre social.
- source_word: ἀνθρώπου ψευδοῦς
  english_pob_choice: of a lying man
  chosen_spanish: de un hombre mentiroso
  alternatives_spanish:
  - de un hombre falso
  - de una persona mentirosa
  - de una persona falsa
  lexicon: LSJ
  rationale: 'La frase genitiva describe al tipo de persona en vista: alguien caracterizado por la mentira. «Mentiroso» preserva esa caracterización habitual y sigue de cerca la lectura inglesa auditada sin volverla más abstracta de lo necesario.'
- source_word: ἀτιμία
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - desgracia
  - ignominia
  - deshonor
  lexicon: LSJ
  rationale: ἀτιμία expresa la pérdida de honor o una condición vergonzosa. «Deshonra» mantiene bien ese valor en español y conserva la fuerza social/moral del término; «deshonor» también sería posible, pero «deshonra» suena más idiomático aquí.
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - vergüenza
  - deshonra
  - desgracia
  lexicon: LSJ
  rationale: αἰσχύνη nombra la vergüenza que acompaña al mentiroso. «Vergüenza» distingue este término del anterior ἀτιμία y permite mantener dos matices relacionados pero no idénticos.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - le acompaña
  - permanece con él
  lexicon: LSJ
  rationale: La expresión es directa y se traduce de manera literal y natural como «con él». Evita sobreinterpretar el movimiento o la personificación del sustantivo.
- source_word: ἐνδελεχῶς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - constantemente
  - sin cesar
  - sin interrupción
  lexicon: LSJ
  rationale: ἐνδελεχῶς comunica continuidad o persistencia. «Continuamente» refleja bien esa permanencia de la vergüenza y suena natural en español contemporáneo.
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; por ello el borrador español sigue de cerca la lectura base y preserva la distinción entre ἀτιμία y αἰσχύνη.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» fuera de este versículo, sin necesidad de terminología teológica especial.
  - Se conserva la distinción léxica entre «deshonra» (ἀτιμία) y «vergüenza» (αἰσχύνη).
  - El orden de las cláusulas sigue el griego y el inglés auditado sin forzar un giro idiomático innecesario.
