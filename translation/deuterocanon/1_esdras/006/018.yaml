translation:
  text: And he was commanded to bring back all these vessels[a], to put them in the temple in Jerusalem, and that the temple of the Lord should be built on its site.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carry back all these vessels ... and rebuild the temple of the Lord in its place.' The Greek wording allows slightly different English choices for the restoration command and the final location phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετάγη
  chosen: it was commanded
  alternatives:
  - he was commanded
  - an order was given
  lexicon: BDAG
  rationale: A passive impersonal rendering best reflects the Greek without over-specifying the unnamed commander. English supplies 'it was commanded' naturally while preserving the formal sense of an official decree.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: The dative marks the recipient of the command. 'To him' keeps the syntax clear in English.
- source_word: ἀπήνεγκεν
  chosen: should bring back
  alternatives:
  - carry back
  - take back
  - bring
  lexicon: BDAG
  rationale: In context of temple vessels being restored to Jerusalem, 'bring back' captures both movement and restoration. The broader Ezra tradition supports a return of previously removed vessels.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - objects
  lexicon: BDAG
  rationale: For temple implements, 'vessels' is the most natural and established English term without becoming archaic.
- source_word: ἀποθεῖναι
  chosen: to be placed
  alternatives:
  - to put down
  - to deposit
  - to set
  lexicon: BDAG
  rationale: The infinitive here refers to depositing/restoring the vessels in the temple. 'To be placed' is idiomatic and fits the cultic context.
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: '''Temple'' is the clearest modern English rendering here. Although ναός can more narrowly mean sanctuary, the context concerns the Jerusalem temple complex as the place for the vessels and rebuilding.'
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per project doctrine, κύριος is rendered 'Lord.' The article is retained in English because the phrase refers to the God of Israel in a known cultic setting.
- source_word: οἰκοδομηθῆναι
  chosen: should be built
  alternatives:
  - be rebuilt
  - be built up
  lexicon: BDAG
  rationale: The passive infinitive denotes the temple's construction by decree. 'Should be built' follows the Greek directly; 'rebuilt' is contextually plausible but not explicit in this wording, so it is left to implication.
- source_word: ἐπὶ τοῦ τόπου
  chosen: on its site
  alternatives:
  - in its place
  - upon the place
  - on the spot
  lexicon: BDAG
  rationale: This phrase indicates rebuilding at the proper/original location. 'On its site' is concise, natural English and preserves the locative force.
