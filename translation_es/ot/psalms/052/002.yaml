translation:
  language: es
  text: 'cuando vino Doeg el edomita y se lo contó a Saúl[a], diciéndole: «David ha llegado a la casa de Ahimelec»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David vino a la casa de Ahimelec». El perfecto hebreo en discurso referido admite en español tanto un pasado simple como un presente perfecto con relevancia actual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֹוא
  english_pob_choice: when ... came
  chosen_spanish: cuando entró
  alternatives_spanish:
  - al venir
  - cuando vino
  - en la llegada de
  lexicon: HALOT
  rationale: La construcción preposicional con infinitivo introduce una circunstancia temporal; en español, «cuando entró» comunica de forma natural el valor temporal y el movimiento implícito hacia la escena narrada.
- source_word: דּוֹאֵג
  english_pob_choice: Doeg
  chosen_spanish: Doeg
  alternatives_spanish:
  - Doegue
  lexicon: transliteración propia
  rationale: Nombre propio; se mantiene la forma breve y reconocible sin añadir una adaptación no atestiguada por el contexto auditado.
- source_word: הָאֲדֹמִי
  english_pob_choice: the Edomite
  chosen_spanish: el edomita
  alternatives_spanish:
  - el de Edom
  - el hombre de Edom
  lexicon: HALOT
  rationale: El gentilicio se expresa de manera concisa y natural en español con «edomita», conservando la identificación étnica o de origen de Doeg.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: avisó
  alternatives_spanish:
  - dijo
  - informó
  - reportó
  lexicon: HALOT
  rationale: En este contexto narrativo de denuncia o comunicación a Saúl, «avisó» preserva el acto de comunicar la noticia sin forzar un matiz técnico mayor que el hebreo no exige aquí.
- source_word: לְשָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - a Saúl,
  - para Saúl
  lexicon: HALOT
  rationale: Se conserva el complemento indirecto con la preposición explícita, que en español ayuda a transparentar el destinatario del mensaje.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: saying to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - diciéndole
  - y dijo a él
  lexicon: HALOT
  rationale: La secuencia verbal se vuelve fluida en español con «y le dijo», manteniendo la referencia pronominal y el encadenamiento narrativo.
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - vino
  - ha entrado
  lexicon: HALOT
  rationale: El perfecto reportado se puede verter con perfecto compuesto para conservar la relevancia presente desde el punto de vista del mensajero; «ha llegado» reproduce bien el valor de evento completado con referencia al destino.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: nombre propio
  rationale: Nombre propio estándar; no requiere adaptación.
- source_word: אֶל בֵּית
  english_pob_choice: to the house of
  chosen_spanish: a la casa de
  alternatives_spanish:
  - a la casa de
  - a la vivienda de
  - a la casa/linaje de
  lexicon: HALOT
  rationale: La combinación אֶל + בֵּית se expresa de forma directa como destino físico; «casa de» mantiene el valor locativo que el contexto narrativo favorece.
- source_word: אֲחִימֶלֶךְ
  english_pob_choice: Ahimelech
  chosen_spanish: Ahimelec
  alternatives_spanish:
  - Ahimelec
  - Ajimelec
  lexicon: transliteración propia
  rationale: Se adopta la forma española usual del nombre propio, «Ahimelec», sin alterar la identificación del personaje.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece en el texto español junto al término correspondiente, y la nota de alternativa queda anclada correctamente.'
  spanish_consistency_notes:
  - Se mantiene el gentilicio «edomita» para הָאֲדֹמִי por claridad y naturalidad.
  - Se usa «casa de» para בֵּית, conservando el valor locativo del hebreo.
  - Se emplea el perfecto compuesto «ha llegado» para reflejar la opción auditada de presente relevante en discurso referido.
  - El flujo verbal «avisó a Saúl y le dijo» conserva la secuencia narrativa sin perder el destinatario del informe.
