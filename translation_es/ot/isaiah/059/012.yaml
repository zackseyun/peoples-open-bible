review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene la estructura causal, conserva la triple serie de culpa («transgresiones / pecados / iniquidades»), y refleja adecuadamente el valor forense de עָנְתָה בָּנוּ. La principal falla está en la nota al pie: invierte el objeto de la acusación y dice «contra ti» donde tanto la fuente como el POB inglés exigen «contra nosotros».'
  spanish_quality_summary: El español es claro, digno y legible. «Delante de ti» funciona, aunque «ante ti» también sería posible. «Testifican contra nosotros» es entendible, pero «dan testimonio contra nosotros» suena un poco más natural en español general; aun así, no exige cambio obligatorio. Sí requiere corrección la nota al pie para evitar un error semántico importante.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: se distinguen «transgresiones», «pecados» e «iniquidades» conforme al hebreo y al rastro auditado. No hay conflictos con términos doctrinales clave del glosario global.'
  issues:
  - severity: high
    issue: La nota al pie dice «dan testimonio contra ti» y «responden contra ti».
    rationale: El hebreo בָּנוּ y el POB inglés «against us» se refieren a «nosotros», no a Dios. La nota actual altera el sentido y contradice el texto principal.
  - severity: low
    issue: «Testifican contra nosotros» es algo menos idiomático que «dan testimonio contra nosotros».
    rationale: No es incorrecto, pero en español eclesial amplio «dar testimonio» suena más natural. Se puede dejar el texto principal como está por fidelidad al rastro, pero conviene reflejar la alternativa correcta en la nota.
