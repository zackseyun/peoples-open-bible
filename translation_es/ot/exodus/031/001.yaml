lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva esa secuencia de manera natural en español. «Habló» refleja mejor el matiz de דבר como acto de hablar dirigido a alguien que un simple «dijo», aunque ambos son posibles.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del POB de transliterar el Nombre divino como «Yahvé», preservando el Tetragrámaton en vez de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - con
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso; en español el complemento directo/indirecto de persona con verbo de habla se expresa de forma natural con «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio establecido en español bíblico; mantiene la forma convencional inteligible para lectores de iglesia.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria hebrea se mantiene con un gerundio que enlaza de modo formal con la cita siguiente, sin añadir contenido ajeno al texto.
theological_decisions:
- issue: Cómo rendir el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La base hebrea usa directamente el Tetragrámaton. Conforme a la política del POB, se conserva el nombre propio divino en transliteración, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto en inglés fue revisado y confirmado como estable (high_agreement; sin cambios aplicados). La versión española sigue esa lectura sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - «Moisés» conserva la forma española tradicional del nombre propio.
  - La fórmula «habló ... diciendo» reproduce la secuencia hebrea con naturalidad y sin sobretraducción.
