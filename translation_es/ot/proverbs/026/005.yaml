translation:
  language: es
  text: Responde a un necio según su necedad[a][b], no sea que sea sabio a sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Contesta a un necio como su necedad lo merece». El hebreo expresa correspondencia: se le responde de una manera acorde con su necedad, no imitando su insensatez.'
    reason: lexical_alternative
  - marker: b
    text: Este dicho mantiene una tensión intencional con Proverbios 26:4; la sabiduría discierne cuándo el silencio y cuándo la refutación son apropiados.
    reason: cross_reference
lexical_decisions:
- source_word: עֲנֵה
  english_pob_choice: Answer
  chosen_spanish: Responde
  alternatives_spanish:
  - Contesta
  - Responde al
  lexicon: HALOT
  rationale: El imperativo pide dar una respuesta; "responde" es natural, claro y mantiene el tono proverbial sin añadir explicación.
- source_word: כְסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  lexicon: HALOT
  rationale: '"Necio" comunica la categoría sapiencial del hebreo כְסִיל con un registro bíblico y digno, sin suavizarla a un mero rasgo de inteligencia.'
- source_word: כְאִוַּלְתּוֹ
  english_pob_choice: according to his folly
  chosen_spanish: según su necedad
  alternatives_spanish:
  - conforme a su necedad
  - de acuerdo con su necedad
  - como merece su necedad
  lexicon: HALOT
  rationale: 'El כ comparativo expresa correspondencia: la respuesta debe estar medida por la necedad del necio. "Según su necedad" conserva esa relación sin insinuar imitación de su conducta.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o no vaya a ser que
  lexicon: HALOT
  rationale: La cláusula preventiva se expresa de forma natural en español con "no sea que", que conserva el valor de prevención de פֶּן.
- source_word: יִהְיֶה חָכָם
  english_pob_choice: he be wise
  chosen_spanish: se vuelva sabio
  alternatives_spanish:
  - sea sabio
  - llegue a verse sabio
  lexicon: HALOT
  rationale: El hebreo no afirma sabiduría real sino una autopercepción. "Se vuelva sabio" comunica el cambio de estado aparente sin resolver la ironía.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: ante sus propios ojos
  alternatives_spanish:
  - a sus propios ojos
  - en su propia estimación
  lexicon: HALOT
  rationale: El modismo hebreo se conserva con una imagen comprensible en español. "Ante sus propios ojos" reproduce la metáfora de autoevaluación; "a sus propios ojos" es una alternativa más literal.
theological_decisions:
- issue: Tensión sapiencial con Proverbios 26:4
  english_pob_reading: Retain the literal phrasing 'according to his folly' without resolving the apparent paradox in translation.
  chosen_spanish_reading: Mantener "según su necedad" sin armonizarlo con una explicación interpretativa dentro del versículo.
  alternative_spanish_readings:
  - Responde a un necio como su necedad lo merece
  - Responde a un necio de una manera acorde con su necedad
  rationale: El par de proverbios conserva una tensión deliberada entre cuándo callar y cuándo responder. La traducción debe preservar esa tensión, no eliminarla con una paráfrasis que la resuelva de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión más reciente y no requiere cambios sustantivos. La elección española conserva el paralelismo, el valor preventivo de פֶּן y la ironía de «sabio en sus propios ojos» sin diluir la tensión con Proverbios 26:4.
  spanish_consistency_notes:
  - Se mantiene el término sapiencial «necio» para כְסִיל, coherente con la terminología bíblica clásica y con el registro del proverbio.
  - «No sea que» preserva el matiz preventivo de פֶּן en español natural.
  - «Según su necedad» respeta la correspondencia semántica del comparativo hebreo y evita una lectura de imitación.
  - La imagen de «sus propios ojos» se conserva para el modismo de autoevaluación.
  - El orden del versículo busca fluidez en español sin alterar la secuencia argumental del hebreo.
