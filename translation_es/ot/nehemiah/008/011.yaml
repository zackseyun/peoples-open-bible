    rationale: Aunque el contenido de la nota a es pertinente a מַחְשִׁים, el marcador debería colocarse sobre la frase verbal traducida, no sobre el auxiliar solo, para mayor precisión editorial.
  revised_spanish_text: 'Y los levitas estaban calmando[a] a todo el pueblo, diciendo: «Guarden silencio, porque el día es santo; no se entristezcan[b]».'
