    text: Or 'Forty more days' or 'In forty days.' The Hebrew expression marks the remaining time before the announced event.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be overthrown.' The Hebrew verb can mean 'be overturned/overthrown,' allowing both the sense of judgment and the broader idea of reversal.
