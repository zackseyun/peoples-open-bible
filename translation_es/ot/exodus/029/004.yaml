translation:
  language: es
  text: Harás que Aarón y sus hijos se acerquen[a] a la entrada de la tienda de reunión, y los lavarás con agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «presentarás a Aarón y a sus hijos». El verbo hebreo puede tener un sentido cultual formal de presentar a alguien para una acción ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּקְרִיב
  english_pob_choice: bring ... near
  chosen_spanish: harás que ... se acerquen
  alternatives_spanish:
  - presentarás
  - llevarás cerca
  - harás acercar
  lexicon: HALOT
  rationale: El hebreo en hifil de קרב tiene un sentido causal de ‘hacer acercar’ o ‘presentar’ en contexto cultual. En español, ‘harás que se acerquen’ conserva mejor esa fuerza causativa y el matiz ritual de acercamiento que un simple ‘traerás’.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición marca destino o dirección. ‘A’ es la solución más natural en español y mantiene la relación espacial del hebreo.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - umbral
  - puerta
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura o entrada. ‘Entrada’ evita sugerir una puerta física específica y funciona bien en el contexto del tabernáculo.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de la cita
  lexicon: HALOT
  rationale: Se conserva la designación cultual tradicional del santuario como ‘tienda de reunión’. ‘Reunión’ expresa adecuadamente מוֹעֵד en este contexto y suena natural en español bíblico contemporáneo.
- source_word: וְרָחַצְתָּ
  english_pob_choice: you shall wash
  chosen_spanish: los lavarás
  alternatives_spanish:
  - y los lavarás
  - entonces los lavarás
  lexicon: HALOT
  rationale: רָחַץ significa lavar. En español, la forma futura simple comunica bien la instrucción procedimental del texto. El objeto directo plural ‘los’ retoma a Aarón y sus hijos.
- source_word: בַּמָּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: HALOT
  rationale: Aunque el hebreo permite una lectura más literal ‘en agua’, el español natural en este contexto usa ‘con agua’ para expresar el medio del lavado sin perder el sentido original.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Convención bíblica española
  rationale: Se usa la forma española establecida del nombre propio, de uso común y plenamente reconocible en registros bíblicos en español.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: HALOT
  rationale: El hebreo denota aquí a los descendientes masculinos de Aarón, pero en español ‘hijos’ es la forma más natural y suficientemente precisa en este marco familiar y sacerdotal. La mención posterior al rito sacerdotal preserva la referencia masculina sin sobrecargar el texto.
theological_decisions:
- issue: Matiz cultual de קרב en la ordenación sacerdotal
  english_pob_reading: bring Aaron and his sons near
  chosen_spanish_reading: harás que Aarón y a sus hijos se acerquen
  alternative_spanish_readings:
  - presentarás a Aarón y a sus hijos
  - harás acercar a Aarón y a sus hijos
  rationale: La frase conserva el sentido ritual de acercamiento al lugar sagrado sin reducirlo a un mero traslado físico. ‘Presentar’ es posible, pero ‘harás que se acerquen’ mantiene mejor la dimensión cultual de la acción ordenada por Yahvé.
  doctrine_reference: Principio de equivalencia óptima; preservar el valor ritual del verbo hebreo sin imponer una interpretación más allá del texto.
translation_notes:
  revision_awareness: El inglés POB fue revisado y quedó sin cambios; esta versión española sigue esa lectura estable, especialmente en el verbo cultual de קרב, manteniendo la misma ambigüedad significativa entre ‘presentar’ y ‘hacer acercar’ sin borrar el matiz ritual.
  spanish_consistency_notes:
  - Se mantuvo ‘tienda de reunión’ para אֹהֶל מוֹעֵד, alineado con la terminología bíblica y con el valor cultual del lugar.
  - Se eligió ‘con agua’ por naturalidad española, aunque el hebreo admite una lectura más literal ‘en agua’.
  - Se preservó el nombre propio ‘Aarón’ en forma española estándar.
  - Se evitó ‘SEÑOR’ o ‘YHWH’ porque este versículo no contiene el tetragrámaton en forma directa.
