translation:
  language: es
  text: Entonces descendió y levantó sus manos sobre toda la asamblea de Israel, con la bendición de Yahvé en sus labios[a], y se glorió[b] en el nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y la bendición de Yahvé en/con sus labios»; el paralelo griego hace explícito el sentido: «para dar bendición ... desde sus labios». El español sigue ese sentido más pleno sin perder la forma nominal del hebreo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «se jactó en el nombre de Yahvé». El verbo también puede expresar exultación o tomar orgullo, y el paralelo griego apoya ese matiz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַד / καταβὰς
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT; BDAG
  rationale: El verbo expresa movimiento hacia abajo. «Descendió» conserva el valor formal y funciona bien en español bíblico sin perder naturalidad.
- source_word: וְנָשָׂא יָדָיו / ἐπῆρεν χεῖρας αὐτοῦ
  english_pob_choice: lifted up his hands
  chosen_spanish: levantó sus manos
  alternatives_spanish:
  - alzó sus manos
  - levantó las manos
  lexicon: HALOT; BDAG
  rationale: La imagen corporal se mantiene. «Levantó sus manos» es clara y fiel; evita una paráfrasis y conserva el gesto litúrgico de bendición.
- source_word: כָּל קְהַל יִשְׂרָאֵל / πᾶσαν ἐκκλησίαν υἱῶν Ἰσραήλ
  english_pob_choice: the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el conjunto de Israel
  lexicon: HALOT; LSJ/BDAG
  rationale: «Asamblea» reproduce el sentido de קהל/ἐκκλησία como cuerpo reunido, sin imponer un matiz eclesiástico más fuerte que el del texto.
- source_word: וּבִרְכַּת יְהֹוָה בִּשְׂפָתָיו / δοῦναι εὐλογίαν Κυρίῳ ἐκ χειλέων αὐτοῦ
  english_pob_choice: with the blessing of Yahweh on his lips
  chosen_spanish: con la bendición de Yahvé en sus labios
  alternatives_spanish:
  - con la bendición de Yahvé sobre sus labios
  - para dar la bendición de Yahvé con sus labios
  lexicon: HALOT; LSJ
  rationale: El hebreo nominal y el paralelo griego convergen en la idea de una bendición pronunciada por sus labios. «En sus labios» / «con sus labios» expresa bien el matiz instrumental o locativo sin forzar el texto.
- source_word: וּבְשֵׁם יְהֹוָה הִתְפָּאֵר / καὶ ἐν ὀνόματι αὐτοῦ καυχᾶσθαι
  english_pob_choice: he gloried in the name of Yahweh
  chosen_spanish: se gloriaba en el nombre de Yahvé
  alternatives_spanish:
  - se jactaba en el nombre de Yahvé
  - se ufanaba en el nombre de Yahvé
  - se glorificaba en el nombre de Yahvé
  lexicon: HALOT; LSJ; BDAG
  rationale: El hitpael de פאר y el griego καυχᾶσθαι abarcan gloriarse/boast/exult. «Se gloriaba» preserva el tono elevado y evita la connotación negativa fuerte de «jactarse».
theological_decisions:
- issue: Renderización del nombre divino יְהֹוָה / Κυρίῳ
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente, y el proyecto fija «Yahvé» para mantener visible el nombre pactal. En el segmento griego, Κυρίῳ se entiende como equivalente reverencial del mismo nombre divino, no como una instancia distinta del título «señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la bendición y el acto de hablar
  english_pob_reading: with the blessing of Yahweh on his lips
  chosen_spanish_reading: con la bendición de Yahvé en sus labios
  alternative_spanish_readings:
  - y la bendición de Yahvé estaba en sus labios
  - para bendecir a Yahvé con sus labios
  rationale: La combinación hebrea y griega apunta a una bendición pronunciada desde los labios, no solo a una actitud interior. La formulación española conserva esa tensión entre contenido de bendición y acto vocal.
  doctrine_reference: 'DOCTRINE.md: translation grounded in parallel sources'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de Kahana y se deja guiar por el paralelo griego cuando este aclara el sentido nominal del hebreo («bendición de Yahvé» / «bendecir al Señor desde sus labios»). También incorpora la revisión del audit trail que favorece una forma nominal con «bendición ... en sus labios» y conserva «gloriarse» como opción elevada y no peyorativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Asamblea» se usa en lugar de «congregación» para conservar el registro público/litúrgico sin connotación eclesial posterior.
  - «Se gloriaba» evita la carga negativa de «jactarse» y mantiene la ambivalencia semántica documentada por el griego.
  - 'La sintaxis española sigue la secuencia narrativa del original: descenso, gesto de manos, bendición, glorificación en el nombre divino.'
