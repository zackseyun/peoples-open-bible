    issue: «jóvenes» no explicita el valor masculino de בַּחוּרִים
    rationale: El hebreo se refiere a varones jóvenes, y el contraste con «vírgenes» pide una contraposición sexuada más clara. «Jóvenes» en español puede ser mixto o ambiguo.
  - severity: low
    issue: 'La nota [a] usa una alternativa poco idiomática: «ponte en vergüenza»'
    rationale: Aunque intenta reflejar el imperativo, en español general suena forzado. Una alternativa como «sé avergonzada» o «queda avergonzada» comunica mejor la opción sin dureza antinatural.
