revisions:
- from: Y el gran atrio, alrededor, tenía tres hileras de piedra labrada y una hilera de vigas de cedro, como[a] el atrio interior de la casa de Yahvé y el vestíbulo de la casa.
  to: Y el gran atrio alrededor, tres hileras de piedra labrada y una hilera de vigas de cedro[c][b][a], como el atrio interior de la casa de Yahvé y el vestíbulo de la casa.
  rationale: Se elimina «tenía» para ceñirse mejor a la descripción elíptica del hebreo y se suaviza la puntuación para mayor naturalidad. Además, se restituyen las notas léxica y cultural presentes en la auditoría inglesa, manteniendo la trazabilidad del POB en español.
