translation:
  language: es
  text: Después, también vieron una nueva aparición de aves[a], cuando, impulsados por el ansia, pidieron manjares de lujo[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una nueva especie de aves». La expresión griega νέαν γένεσιν ὀρνέων puede destacar una aparición o producción nueva, o, menos probablemente, una clase nueva de ave.
    reason: lexical_alternative
  - marker: b
    text: Es decir, buscaron alimentos selectos para el placer, no mera nutrición; compárese la tradición del deseo en el desierto en Éxodo 16 y Números 11.
    reason: cross_reference
lexical_decisions:
- source_word: ἐφʼ ὑστέρῳ
  english_pob_choice: Later on
  chosen_spanish: Después
  alternatives_spanish:
  - Más tarde
  - Posteriormente
  - Luego
  lexicon: LSJ
  rationale: La frase señala una etapa posterior en la secuencia narrativa. «Después» comunica ese avance temporal de forma natural en español y evita una construcción pesada.
- source_word: εἶδον
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaron
  - presenciaron
  lexicon: LSJ
  rationale: El aoristo de ὁράω se traduce de manera directa con «vieron», que conserva el carácter narrativo simple del texto.
- source_word: νέαν γένεσιν ὀρνέων
  english_pob_choice: a new generation of birds
  chosen_spanish: una nueva generación de aves
  alternatives_spanish:
  - una nueva especie de aves
  - una nueva producción de aves
  - un nuevo surgimiento de aves
  lexicon: LSJ
  rationale: «γένεσις» sugiere origen, surgimiento o producción. «Generación» conserva esa idea de aparición nueva mejor que «especie», y «aves» mantiene el referente amplio de ὀρνέων sin restringirlo innecesariamente.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en el momento en que
  lexicon: LSJ
  rationale: Conector temporal directo y natural en español, adecuado para introducir la circunstancia de la aparición.
- source_word: ἐπιθυμίᾳ
  english_pob_choice: by craving
  chosen_spanish: impulsados por el deseo vehemente
  alternatives_spanish:
  - impulsados por el anhelo
  - movidos por la apetencia
  - llevados por el deseo
  lexicon: LSJ
  rationale: En este contexto de comida en el desierto, ἐπιθυμία expresa una apetencia intensa o desordenada. «Deseo vehemente» preserva esa fuerza sin introducir connotaciones sexuales que no pertenecen aquí.
- source_word: προαχθέντες
  english_pob_choice: driven
  chosen_spanish: impulsados
  alternatives_spanish:
  - arrastrados
  - llevados
  - empujados
  lexicon: LSJ
  rationale: El participio indica que fueron movidos o llevados hacia una acción por esa inclinación. «Impulsados» reproduce bien la idea de fuerza interna que los arrastra.
- source_word: ᾐτήσαντο
  english_pob_choice: they asked for
  chosen_spanish: pidieron
  alternatives_spanish:
  - solicitaron
  - reclamaron
  - pidieron a
  lexicon: LSJ
  rationale: Verbo medio de petición; «pidieron» es el equivalente más natural y no exagera el matiz hasta «exigieron».
- source_word: ἐδέσματα
  english_pob_choice: delicacies
  chosen_spanish: manjares
  alternatives_spanish:
  - alimentos delicados
  - viandas
  - golosinas
  lexicon: LSJ
  rationale: Se refiere a alimentos preparados o selectos, no a simple sustento. «Manjares» conserva el matiz de comida escogida o refinada.
- source_word: τρυφῆς
  english_pob_choice: of luxury
  chosen_spanish: de lujo
  alternatives_spanish:
  - de deleite
  - de indulgencia
  - de placer
  lexicon: LSJ
  rationale: τρυφή denota lujo, refinamiento o vida indulgente. «De lujo» sigue de cerca la decisión inglesa y mantiene la idea de búsqueda de placer, no de necesidad.
theological_decisions:
- issue: Tensión moral en la petición de comida en el desierto
  english_pob_reading: The verse is rendered to emphasize excessive desire and indulgence without overstating the Greek into explicit condemnation beyond the lexical force of ἐπιθυμίᾳ and τρυφῆς.
  chosen_spanish_reading: El texto español mantiene la crítica implícita en la fuerza de «deseo vehemente» y «de lujo», sin convertirla en una condena más fuerte de la que exige el griego.
  alternative_spanish_readings:
  - Una versión más neutra que suavice la crítica moral
  - Una versión más dura con «codicia» o «lujuria»
  rationale: El contexto alude al episodio del desierto y la petición de alimentos por apetito desordenado. La traducción conserva ese matiz evaluativo, pero evita ampliar el juicio moral más allá del léxico griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «delicacies of luxury» frente a una formulación interpretativamente más amplia. En español, «manjares de lujo» reproduce esa precisión sin añadir glosa excesiva al cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «aves» para ὀρνέων, evitando «pájaros» por ser más coloquial y menos amplio.
  - «Deseo vehemente» conserva la intensidad de ἐπιθυμίᾳ sin sexualizar el contexto.
  - «De lujo» refleja τρυφῆς con una expresión natural en español y coherente con la auditoría inglesa.
  - Las notas a y b se colocan solo donde añaden una alternativa léxica real o una aclaración de sentido apoyada por el paralelo del desierto.
