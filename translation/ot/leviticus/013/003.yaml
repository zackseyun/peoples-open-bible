id: LEV.13.3
reference: Leviticus 13:3
source:
  edition: WLC
  text: וְ/רָאָ֣ה הַ/כֹּהֵ֣ן אֶת הַ/נֶּ֣גַע בְּ/עֽוֹר הַ֠/בָּשָׂר וְ/שֵׂעָ֨ר בַּ/נֶּ֜גַע הָפַ֣ךְ לָבָ֗ן וּ/מַרְאֵ֤ה הַ/נֶּ֨גַע֙ עָמֹק֙ מֵ/ע֣וֹר בְּשָׂר֔/וֹ נֶ֥גַע צָרַ֖עַת ה֑וּא וְ/רָאָ֥/הוּ הַ/כֹּהֵ֖ן וְ/טִמֵּ֥א אֹתֽ/וֹ־־׀׃
translation:
  text: And the priest shall examine the diseased spot on the skin of the body[a], and if the hair in the spot has turned white and the appearance of the spot is deeper than the skin of his body, it is a diseased spot of skin disease; when the priest has examined him, he shall pronounce him unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'a spot of leprosy' / 'a leprous infection.' The Hebrew צָרַעַת refers to a broader category than modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  chosen: diseased spot
  alternatives:
  - affliction
  - infection
  - plague
  - mark
  lexicon: HALOT
  rationale: In Leviticus 13 the term refers to a visible skin lesion or affected area examined by the priest. 'Diseased spot' is more precise and natural in modern English than the traditional but misleading 'plague' or the overly broad 'affliction.' Consistency is maintained within the diagnostic context.
- source_word: בְּעוֹר הַבָּשָׂר
  chosen: on the skin of the body
  alternatives:
  - in the skin of the flesh
  - on the skin of the flesh
  lexicon: HALOT
  rationale: עוֹר is 'skin/hide' and בָּשָׂר is 'flesh/body.' 'Skin of the body' is idiomatic modern English while preserving the anatomical sense. 'Flesh' here would sound archaic or overly literal in English.
- source_word: שֵׂעָר
  chosen: hair
  lexicon: HALOT
  rationale: Straightforward lexical equivalent in this diagnostic description.
- source_word: הָפַךְ לָבָן
  chosen: has turned white
  alternatives:
  - has become white
  - turned white
  lexicon: HALOT
  rationale: The perfect verb indicates a resulting state observable at inspection. 'Has turned white' communicates the change of color naturally in English.
- source_word: מַרְאֵה
  chosen: appearance
  alternatives:
  - look
  - sight
  lexicon: HALOT
  rationale: Standard rendering for visible appearance in an inspection context.
- source_word: עָמֹק מֵעוֹר בְּשָׂרוֹ
  chosen: deeper than the skin of his body
  alternatives:
  - deeper than his skin
  - deeper than the skin of his flesh
  lexicon: HALOT
  rationale: The phrase describes the lesion as appearing depressed below the surrounding skin level. 'Deeper than the skin of his body' preserves the comparative wording while remaining readable.
- source_word: נֶגַע צָרַעַת
  chosen: a diseased spot of skin disease
  alternatives:
  - an eruption of leprosy
  - a leprous disease spot
  - a spot of defiling skin disease
  lexicon: HALOT
  rationale: צָרַעַת in the Torah does not map neatly onto modern Hansen's disease, so 'leprosy' is potentially misleading. 'Skin disease' preserves the broader ritual-diagnostic category. The construct with נֶגַע is represented as 'a diseased spot of skin disease' to keep both nouns visible.
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling skin disease
  lexicon: HALOT
  rationale: Avoids importing a specific modern medical diagnosis into an ancient ritual category. 'Skin disease' is accurate and accessible; 'leprosy' is preserved as an alternative because of translation tradition.
- source_word: וְרָאָהוּ
  chosen: when the priest has examined him
  alternatives:
  - and the priest shall examine him
  - and the priest has seen it/him
  lexicon: HALOT
  rationale: 'The suffix refers to the person under examination in context. Rendering the clause temporally in English avoids awkward repetition while preserving the sequence: inspection followed by priestly ruling.'
- source_word: וְטִמֵּא אֹתוֹ
  chosen: he shall pronounce him unclean
  alternatives:
  - he shall declare him unclean
  - he shall make him unclean
  lexicon: HALOT
  rationale: In priestly legal context the priest does not cause impurity but renders an authoritative verdict about ritual status. 'Pronounce' captures the declarative force better than a causative-sounding 'make.'
