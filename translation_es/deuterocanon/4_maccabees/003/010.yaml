    issue: Doble concesión poco natural en español
    rationale: El griego usa una participial intensiva seguida de καίπερ; en español, «aunque tenía mucha sed, y aun teniendo…» resulta redundante y trabado. Una formulación como «aunque tenía mucha sed, aun teniendo abundantes manantiales…» o mejor «aunque tenía mucha sed, a pesar de tener abundantes manantiales…» preserva el sentido con mejor fluidez.
  - severity: medium
    issue: Marcador de nota colocado en un elemento no relacionado
    rationale: La nota trata del verbo «aliviar/apagar/sanar la sed», no de «el rey». Según la disciplina del proyecto, el marcador debe aparecer en la palabra o frase pertinente.
  - severity: low
    issue: Instrumental demasiado pesado
    rationale: «Por medio de ellos» es correcto, pero suena algo mecánico con «manantiales». Una leve reestructuración mejora la naturalidad sin perder el valor instrumental de διʼ αὐτῶν.
  revised_spanish_text: Pero el rey, aunque tenía mucha sed, a pesar de tener abundantes manantiales, no podía aliviar su sed[a] con ellos.
