translation:
  language: es
  text: Así fueron terminados[a] los cielos y la tierra, y todas sus huestes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron completados».
    reason: lexical_alternative
  - marker: b
    text: «Huestes» aquí señala el conjunto ordenado de todo lo que llena los cielos y la tierra; no necesariamente una imagen bélica.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְכֻלּוּ
  english_pob_choice: were finished
  chosen_spanish: fueron terminados
  alternatives_spanish:
  - fueron completados
  - quedaron terminados
  - fueron acabados
  lexicon: HALOT
  rationale: El verbo expresa que la creación llegó a su estado de completitud. «Fueron terminados» conserva la voz pasiva/resultativa del hebreo y suena natural en español bíblico sin convertirlo en una paráfrasis.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos y las alturas
  - el cielo
  lexicon: HALOT
  rationale: En este contexto de creación, el plural hebreo apunta al ámbito cósmico creado, no solo al cielo visible. «Los cielos» mantiene ese alcance y es plenamente inteligible en español.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y el mundo
  - y la tierra firme
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa la tierra como esfera creada. «La tierra» conserva el paralelo fijo con «los cielos» y evita limitar indebidamente el sentido a una región.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todo
  alternatives_spanish:
  - y toda
  - y todo lo
  lexicon: HALOT
  rationale: La coordinación simple del hebreo queda bien reflejada con «y todo», que introduce el complemento totalizador sin añadir matices ajenos al texto.
- source_word: צְבָאָם
  english_pob_choice: their hosts
  chosen_spanish: su ejército
  alternatives_spanish:
  - sus huestes
  - su multitud
  - todo lo que los llena
  lexicon: HALOT
  rationale: צָבָא puede referirse a un ejército, una hueste o un conjunto organizado. En este versículo, la imagen es la totalidad ordenada que pertenece a los cielos y a la tierra. «Su ejército» conserva la fuerza colectiva y el orden del término, aunque en español también admite la lectura ampliada de los contenidos creados.
theological_decisions:
- issue: Alcance de «su ejército» en el cierre de la creación
  english_pob_reading: A comprehensive reference to everything that populates or belongs to the heavens and the earth.
  chosen_spanish_reading: Una referencia comprensiva a todo lo que pertenece a los cielos y a la tierra, no solo a los astros.
  alternative_spanish_readings:
  - Referencia principal a los astros o cuerpos celestes
  - Imagen militar estricta de formaciones celestiales
  rationale: La construcción finaliza el resumen de la creación. Mantener «su ejército» preserva la imagen original sin estrecharla a los cuerpos celestes ni vaciarla en una mera paráfrasis de «todo lo creado».
  doctrine_reference: Génesis 2:1; Génesis 1:31; doctrina de la creación completa y ordenada
translation_notes:
  revision_awareness: El inglés POB pasó de singular a plural en el cierre interpretativo («host» > «hosts») para reflejar mejor el hebreo צְבָאָם. La versión española sigue esa lectura colectiva con «su ejército», manteniendo el plural conceptual sin forzar un plural en español que sonaría menos natural en la fórmula fija.
  spanish_consistency_notes:
  - Se usa «cielos» para הַשָּׁמַיִם conforme al registro bíblico y al paralelismo con «la tierra».
  - Se evita «SEÑOR» u otras sustituciones, ya que no hay Tetragrámaton en este versículo.
  - «Terminados» conserva el resultado consumado del verbo sin añadir un sujeto explícito que el hebreo no presenta.
