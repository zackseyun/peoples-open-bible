review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo en la secuencia narrativa, el título militar y la pregunta sobre la filiación de David. Sin embargo, la fórmula de juramento חֵי נַפְשְׁךָ está mejor tratada con una nota léxica como en el rastro inglés, y «que no lo sé» suena menos natural y menos directo que «no lo sé» para אִם יָדָעְתִּי en español bíblico claro.
  spanish_quality_summary: 'El texto es generalmente claro y legible, pero tiene detalles de estilo mejorables: la nota sobre «saliendo» no es necesaria porque no preserva una alternativa significativa; la puntuación española mejora sin punto fuera de comillas angulares; y la fórmula «¡Vive tu alma!» resulta entendible pero algo forzada. «Tan cierto como que vives» con nota preserva mejor la dignidad y naturalidad.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Los nombres propios y términos comunes están bien. La principal cuestión es de formulación idiomática y de preservación de la nota lexical del juramento hebreo.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «saliendo», pero el rastro inglés conserva la alternativa léxica en la fórmula de juramento, no en el participio.
    rationale: El participio יֹצֵא ya queda bien representado en el cuerpo del texto; la ambigüedad o valor especial que conviene documentar aquí es חֵי נַפְשְׁךָ, donde el inglés POB preservó explícitamente una alternativa idiomática.
  - severity: medium
    issue: «¡Vive tu alma, oh rey, que no lo sé» suena rígido y poco idiomático en español actual.
    rationale: Aunque refleja elementos hebreos, la combinación completa no fluye bien en español neutral. Una formulación como «Tan cierto como que vives[a], oh rey, no lo sé» comunica la fuerza del juramento y mantiene una nota para la literalidad hebrea.
  - severity: low
    issue: Puntuación de cita mejorable.
    rationale: En español, tras comillas angulares de cierre normalmente no se añade punto si ya cierra el enunciado completo; el borrador usa «?». de manera menos natural.
  revised_spanish_text: 'Cuando Saúl vio a David saliendo al encuentro del filisteo, dijo a Abner, el comandante del ejército: «¿Hijo de quién es este joven, Abner?». Y Abner respondió: «Tan cierto como que vives[a], oh rey, no lo sé»'
  revised_footnotes:
