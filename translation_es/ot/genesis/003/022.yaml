  to: 'Entonces Yahvé Dios dijo[a]: «He aquí, el hombre ha llegado a ser como uno de nosotros, conociendo el bien y el mal. Y ahora, no sea que extienda su mano y también tome del árbol de la vida, y coma, y viva para siempre—»'
  rationale: 'Se propone una reparación menor para elevar la fidelidad estilística al hebreo y a la auditoría inglesa: ''He aquí'' comunica mejor הֵן que ''Mira'' en este contexto solemne. También se suaviza la coordinación final con ''y coma'' para un ritmo español más natural y más cercano a la cadena hebrea.'
