    rationale: En español, 'guardar mi vida' suena a proteger o preservar la vida del hablante. El hebreo en este contexto hostil significa vigilar para atrapar, dañar o quitar la vida; la auditoría inglesa lo documenta explícitamente.
  - severity: medium
    issue: Anclaje de nota [a] en lugar incorrecto
    rationale: La nota [a] explica alternativas de וְשֹׁמְרֵי נַפְשִׁי, pero está colocada tras 'contra mí', donde parece modificar el verbo de hablar en vez de la frase sobre quienes acechan la vida.
  - severity: low
    issue: '''consultan juntos'' es algo rígido en español'
    rationale: Es comprensible y fiel al sentido básico de deliberar, pero suena menos natural que otras opciones. Aun así, no exige cambio obligatorio si se conserva la nota sobre el matiz de conspiración.
