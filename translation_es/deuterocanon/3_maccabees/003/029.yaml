revisions:
- from: Pero todo lugar donde se descubra a un judío[a] escondido, sea hecho inaccesible y consumido por el fuego, y será mostrado como completamente inútil para toda naturaleza mortal por todo el tiempo.
  to: Pero todo lugar donde se descubra a un judío[a] escondido, sea hecho inaccesible e incendiado, y quede demostrado como completamente inútil para toda criatura mortal para siempre.
  rationale: 'Se revisó el texto para mejorar fidelidad idiomática y tono decretal en español: «incendiado» refleja mejor πυριφλεγής que «consumido por el fuego»; «toda criatura mortal» comunica mejor πάσῃ θνητῇ φύσει que el calco «toda naturaleza mortal»; «quede demostrado» evita el español rígido de «será mostrado»; y «para siempre» expresa naturalmente εἰς τὸν ἀεὶ χρόνον. Se mantuvo la nota lexical porque la dificultad de τὸ σύνολον σκεπαζόμενος sigue siendo relevante y la nota está bien formulada para español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:37:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del decreto y conserva los elementos principales del griego: alcance universal («todo lugar»), descubrimiento de un judío oculto, desolación por fuego e inutilidad permanente. Sin embargo, varias elecciones no reflejan de la manera más fiel ni más natural el sentido auditado: «consumido por el fuego» suaviza la idea decretal de prender fuego/ser incendiado; «toda naturaleza mortal» suena demasiado calcado para πάσῃ θνητῇ φύσει, donde «toda criatura mortal» o «todo ser mortal» comunica mejor el alcance amplio; «será mostrado» es torpe en español para φανήσεται; y «por todo el tiempo» no es idiomático para εἰς τὸν ἀεὶ χρόνον.'
  spanish_quality_summary: 'El texto es comprensible pero presenta varias formulaciones poco naturales o demasiado literales para un español bíblico moderno y digno: «será mostrado como», «toda naturaleza mortal» y «por todo el tiempo». También conviene ajustar la secuencia verbal para que el tono decretal sea coherente: «sea hecho... y quede...» funciona mejor que mezclar subjuntivo con futuro. El resultado revisado mejora fluidez, solemnidad y legibilidad sin apartarse del griego ni del audit trail inglés.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en nombres divinos o títulos. «un judío» está bien y sigue la decisión contextual sobre Ἰουδαῖος. La principal cuestión léxica es estilística y semántica: preferir «incendiado»/«puesto en llamas» para πυριφλεγής, «criatura mortal» para φύσις en este contexto amplio, y una expresión idiomática como «para siempre» para εἰς τὸν ἀεὶ χρόνον.'
  issues:
  - severity: medium
    issue: «consumido por el fuego» no refleja tan bien el matiz decretal de πυριφλεγής
    rationale: El audit trail inglés revisado prefirió «set on fire». En español, «consumido por el fuego» describe más el resultado final que la acción/juicio decretado sobre el lugar. «Incendiado» o «puesto en llamas» preserva mejor la fuerza del mandato.
  - severity: medium
    issue: «toda naturaleza mortal» suena calcado y poco natural
    rationale: Aunque φύσις puede traducirse literalmente como «naturaleza», aquí la expresión funciona de modo amplio para seres mortales. En español bíblico legible, «toda criatura mortal» comunica mejor el alcance sin restringirlo a humanos.
  - severity: medium
    issue: «será mostrado como» es poco idiomático para φανήσεται
    rationale: La traducción literal pasiva resulta dura en español. «Quede demostrado como» o «se mostrará» expresan mejor el valor resultativo sin perder formalidad.
  - severity: medium
    issue: «por todo el tiempo» no es una expresión natural para εἰς τὸν ἀεὶ χρόνον
    rationale: La frase griega indica permanencia indefinida. En español, «para siempre» o «por siempre» es más idiomático y mantiene la solemnidad.
  - severity: low
    issue: Mezcla de modos verbales en la oración principal
    rationale: '«sea hecho... y será mostrado» rompe la simetría del decreto. Conviene usar una secuencia coherente de subjuntivo exhortativo/resultativo: «sea hecho... y quede demostrado...».'
  revised_spanish_text: Pero todo lugar donde se descubra a un judío[a] escondido, sea hecho inaccesible e incendiado, y quede demostrado como completamente inútil para toda criatura mortal para siempre.
  revised_footnotes:
  - marker: a
    text: 'O: «donde se detecte a un judío mientras está oculto». El griego en torno a τὸ σύνολον σκεπαζόμενος es difícil; el sentido probable es que cualquier lugar que albergue a un judío escondido sea tratado como maldito y destruido.'
    reason: lexical_alternative
  revision_rationale: 'Se revisó el texto para mejorar fidelidad idiomática y tono decretal en español: «incendiado» refleja mejor πυριφλεγής que «consumido por el fuego»; «toda criatura mortal» comunica mejor πάσῃ θνητῇ φύσει que el calco «toda naturaleza mortal»; «quede demostrado» evita el español rígido de «será mostrado»; y «para siempre» expresa naturalmente εἰς τὸν ἀεὶ χρόνον. Se mantuvo la nota lexical porque la dificultad de τὸ σύνολον σκεπαζόμενος sigue siendo relevante y la nota está bien formulada para español.'
