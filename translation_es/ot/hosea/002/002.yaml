base_translation:
  language: en
  yaml_path: translation/ot/hosea/002/002.yaml
  text: Then the sons of Judah and the sons of Israel will be gathered together[a], and they will appoint for themselves one head, and they will go up from the land[c][b], for great will be the day of Jezreel.
  footnotes:
  - marker: a
    text: Or 'appoint for themselves one leader.' The Hebrew literally says 'one head.'
    reason: lexical_alternative
  - marker: b
    text: '''From the land'' may refer to coming up out of exile or to a restored ascent into the land; the Hebrew leaves the exact nuance open.'
    reason: alternative_reading
  - marker: c
    text: Jezreel is both a place name and a theologically charged name in Hosea, echoing themes of scattering and sowing.
    reason: cultural_note
