translation:
  language: es
  text: Para el maestro de coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «por David» o «para David»; el superscrito hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Para el director
  - Para el líder
  - Para el músico principal
  lexicon: HALOT
  rationale: La forma hebrea de encabezado apunta al encargado de la ejecución musical. En español, «maestro de coro» comunica de manera natural esa función litúrgico-musical sin volver explícita una relación que el hebreo no precisa más allá del encabezado dedicatorio/funcional.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: «מִזְמוֹר» es el término técnico usual de encabezamiento. «Salmo» conserva el género y la convención bíblica en español mejor que un equivalente más general como «cántico» o «canción».
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en estos superscritos puede marcar autoría, asociación o dedicación. «De David» preserva esa ambigüedad textual sin decidir prematuramente entre «por» o «para».
theological_decisions:
- issue: Ambigüedad del superscrito davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a una sola relación precisa entre David y el salmo. Mantener «de David» conserva la tensión/ambigüedad documentada por el texto y evita sobreinterpretar la superscripción.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión textual y teológica cuando el original no la resuelve)
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto fuente y el audit trail inglés; no se identificaron revisiones necesarias. La redacción española sigue de cerca las decisiones léxicas del POB en inglés y mantiene la ambigüedad de לְדָוִד.
  spanish_consistency_notes:
  - Se eligió «maestro de coro» para reflejar la función musical del encabezado sin introducir una denominación eclesiástica más cargada.
  - Se conservó «salmo» como término técnico estándar.
  - «de David» mantiene la misma ambigüedad que el inglés «of David» y el hebreo לְדָוִד.
  - La nota al pie se ancla en «David» para documentar las alternativas tradicionales sin alterar el texto principal.
