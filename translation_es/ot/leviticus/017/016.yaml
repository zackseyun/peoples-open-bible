translation:
  language: es
  text: Pero si no lava su ropa y no se lava[b] el cuerpo[a], entonces llevará su culpa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su carne». Aquí se refiere al lavado del cuerpo.
    reason: lexical_alternative
  - marker: b
    text: O «lava». El hebreo distingue este lavado corporal del lavado de la ropa.
    reason: lexical_alternative
  - marker: c
    text: O «su iniquidad» o «el castigo por su iniquidad». La expresión legal hebrea puede incluir tanto la culpa como su consecuencia.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: El hebreo introduce aquí el caso negativo en contraste con el procedimiento previo; "Pero si" conserva el matiz adversativo del contexto sin perder la estructura condicional.
- source_word: יְכַבֵּס
  english_pob_choice: wash
  chosen_spanish: lava
  alternatives_spanish:
  - lava su ropa
  - lave
  lexicon: HALOT
  rationale: כבס se usa normalmente para lavar ropa; en español conviene explicitar el complemento implícito del contexto anterior, por eso se traduce de manera natural como lavar la ropa.
- source_word: וּבְשָׂרוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  - su cuerpo
  lexicon: HALOT
  rationale: Aunque literalmente es "su carne", en este contexto ritual se refiere al cuerpo de la persona. "Su cuerpo" mantiene la referencia concreta y evita una expresión menos natural en español.
- source_word: יִרְחָץ
  english_pob_choice: bathe
  chosen_spanish: baña
  alternatives_spanish:
  - lava
  - se lava
  lexicon: HALOT
  rationale: רחץ aquí refiere el lavado corporal, distinto del lavado de la ropa; "baña" distingue mejor ambas acciones y refleja el acto ritual.
- source_word: וְנָשָׂא
  english_pob_choice: then he shall bear
  chosen_spanish: entonces llevará
  alternatives_spanish:
  - y llevará
  - cargará
  lexicon: HALOT
  rationale: La forma verbal expresa consecuencia legal por no cumplir lo mandado; "entonces llevará" conserva ese valor resultativo en español.
- source_word: עֲוֹנוֹ
  english_pob_choice: his guilt
  chosen_spanish: su culpa
  alternatives_spanish:
  - su iniquidad
  - el castigo por su iniquidad
  lexicon: HALOT
  rationale: עון puede abarcar culpa e iniquidad, así como la responsabilidad derivada. "Su culpa" mantiene esa amplitud sin cerrar el sentido solo a la pena o solo al acto moral.
theological_decisions:
- issue: Fórmula legal de "bear his עון"
  english_pob_reading: The phrase is rendered 'bear his guilt' without specifying the exact punishment.
  chosen_spanish_reading: Se traduce "llevará su culpa" sin precisar cuál será exactamente la consecuencia penal.
  alternative_spanish_readings:
  - llevará su iniquidad
  - llevará el castigo por su iniquidad
  rationale: El hebreo legal conserva una tensión entre culpabilidad y consecuencia. La traducción española mantiene esa ambigüedad productiva en vez de resolverla de forma explicativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje no requirió cambios respecto del último pase de revisión; el resultado previo fue confirmado como de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando aparece el nombre divino; en este versículo no aparece.
  - '"Culpa" preserva mejor la carga jurídico-ritual de עון en este contexto que una paráfrasis más explicativa.'
  - Se evita "siervo" o vocabulario eclesiástico no indicado por el hebreo; el lenguaje permanece jurídico y concreto.
