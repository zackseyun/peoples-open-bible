translation:
  language: es
  text: Y Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''YHWH''; tradicionalmente se traduce ''el SEÑOR''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - entonces habló
  - y dijo
  lexicon: HALOT
  rationale: El wayyiqtol de דבר en esta fórmula narrativa se reproduce naturalmente en español con un verbo en pasado simple. 'Habló' conserva mejor que 'dijo' la estructura hebrea 'habló ... diciendo', donde לֵאמֹר introduce la cita directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino del pacto, no un título. La política del proyecto pide 'Yahvé' en el texto principal para reflejar el Tetragrámaton sin sustituirlo por una convención tradicional.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español 'a' es la correspondencia natural y más transparente.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y moderno, plenamente transparente para el lector.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como introducción de discurso; 'diciendo' preserva la fórmula hebrea de manera clara y sobria.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión confesional y filológica de no enmascarar el nombre divino con un título. 'Yahvé' comunica el nombre del pacto de forma legible en español y sigue la línea del POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula narrativa de discurso
  english_pob_reading: And Yahweh spoke to Moses, saying,
  chosen_spanish_reading: Yahvé habló a Moisés, diciendo,
  alternative_spanish_readings:
  - Entonces Yahvé dijo a Moisés,
  - Yahvé le habló a Moisés, diciendo,
  rationale: La secuencia verbal hebrea conserva una introducción solemne a la palabra divina. 'Habló ... diciendo' mantiene la relación entre el verbo principal y la fórmula לֵאמֹר sin añadir elementos no presentes en el hebreo.
  doctrine_reference: Hebreo narrativo estándar de introducción de revelación
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en acuerdo alto: la versión inglesa ya mantenía la fórmula narrativa y la decisión doctrinal de traducir el Nombre divino. No se documentaron revisiones posteriores que alteraran la lectura; la adaptación al español conserva esa misma estructura con equivalentes naturales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal para יְהוָה, conforme al estándar del proyecto.
  - Se evita 'el SEÑOR' en el cuerpo del texto para no ocultar el nombre divino.
  - '''Moisés'' y la fórmula ''habló ... diciendo'' siguen el patrón bíblico natural en español.'
  - La nota al pie aclara la lectura alternativa tradicional sin desplazar el texto principal.
