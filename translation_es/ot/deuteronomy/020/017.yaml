  to: En cambio[a], deberás destruirlos por completo[b]—los hititas, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos— como Yahvé tu Dios te ha mandado.
  rationale: Se corrige la nota sobre כִּי para reflejar la fuerza contrastiva documentada en la evidencia y se simplifica la puntuación del inciso para un español más natural, manteniendo intacto el sentido principal y la nota de חרם.
