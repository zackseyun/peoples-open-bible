translation:
  language: es
  text: Y después de eso, los levitas vinieron a hacer su servicio en la tienda de reunión delante de Aarón y delante de sus hijos. Tal como Yahvé había mandado a Moisés acerca de los levitas, así hicieron con ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'así hicieron con respecto a ellos'. El hebreo es conciso y puede referirse a que se llevaron a cabo los ritos prescritos respecto de los levitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: And after that
  chosen_spanish: Y después de eso
  alternatives_spanish:
  - Y luego
  - Después de eso
  lexicon: HALOT
  rationale: Mantiene la secuencia temporal y el conector inicial del hebreo con un español natural y sobrio.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - entraron
  lexicon: HALOT
  rationale: ‘Vinieron’ reproduce el movimiento general sin sobreespecificar entrada al recinto; ‘entraron’ sería demasiado interpretativo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los Levitas
  lexicon: HALOT
  rationale: Tribu/cuerpo sacerdotal designado por nombre propio colectivo; en español bíblico moderno ‘levitas’ es claro y estándar.
- source_word: לַעֲבֹד אֶת עֲבֹדָתָם
  english_pob_choice: to do their service
  chosen_spanish: a hacer su servicio
  alternatives_spanish:
  - a cumplir su servicio
  - a servir en su ministerio
  lexicon: HALOT
  rationale: Se conserva la cercanía del hebreo entre verbo y sustantivo de la misma raíz. ‘Hacer su servicio’ refleja la decisión inglesa de no sustituir con ‘ministerio’ eclesiástico.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: ‘Tienda de reunión’ es una equivalencia fiel y comprensible del término cultual, evitando modernizarlo como una iglesia o templo.
- source_word: לִפְנֵי אַהֲרֹן וְלִפְנֵי בָנָיו
  english_pob_choice: before Aaron and before his sons
  chosen_spanish: delante de Aarón y delante de sus hijos
  alternatives_spanish:
  - en presencia de Aarón y de sus hijos
  - bajo la supervisión de Aarón y de sus hijos
  lexicon: HALOT
  rationale: ‘Delante de’ conserva el valor literal de לִפְנֵי sin convertirlo en una explicación de supervisión que el hebreo no expresa explícitamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ‘Yahvé’ como forma española estable y reverente del nombre divino.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: Just as Yahweh had commanded Moses
  chosen_spanish: Tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - Como Yahvé había mandado a Moisés
  - Según Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: ‘Tal como’ reproduce la comparación/mode de כַּאֲשֶׁר con naturalidad. ‘Había mandado’ refleja la relación anterior respecto de la acción de los levitas.
- source_word: עַל הַלְוִיִּם
  english_pob_choice: concerning the Levites
  chosen_spanish: acerca de los levitas
  alternatives_spanish:
  - con respecto a los levitas
  - sobre los levitas
  lexicon: HALOT
  rationale: ‘Acerca de’ expresa bien el objeto del mandato sin forzar un matiz legal distinto del hebreo.
- source_word: כֵּן עָשׂוּ לָהֶם
  english_pob_choice: so they did to them
  chosen_spanish: así hicieron a ellos
  alternatives_spanish:
  - así lo hicieron con ellos
  - así hicieron para ellos
  lexicon: HALOT
  rationale: Se mantiene la concisión del hebreo y la traducción revisada ‘to them’. ‘A ellos’ suena algo más literal en español, aunque menos idiomático que ‘con ellos’.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio divino en español conforme al criterio del proyecto, evitando la sustitución por un título que borra el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto inglés: ''do their service'' y ''to them''. En español se refleja con ''hacer su servicio'' y ''a ellos'', manteniendo la brevedad y la relación directa del hebreo sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para יְהוָה.
  - Se usa 'tienda de reunión' como equivalente estable de אֹהֶל מוֹעֵד.
  - No se introduce 'ministerio' ni 'siervo' para preservar el registro cultual del pasaje.
  - La frase final conserva la ambigüedad mínima del hebreo, sin convertirla en una explicación interpretativa.
