    issue: Falta el verbo de la primera cláusula en el texto principal
    rationale: 'הוֹחָלְתִּי («he esperado / he aguardado / espero con esperanza») está documentado en las decisiones léxicas, pero no aparece en el borrador: «Porque para ti[a], Yahvé; ...». Esto deja la oración truncada y no fiel al hebreo.'
  - severity: medium
    issue: «Para ti» es posible como calco semántico, pero suena menos natural que «en ti» o «te he esperado» en español
    rationale: La auditoría inglesa eligió «for you» para preservar la direccionalidad de לְךָ, pero en español «he esperado para ti» resulta extraño. «En ti he esperado» expresa bien la confianza esperanzada de יחל y mejora la legibilidad sin añadir contenido.
  - severity: low
    issue: La nota b no aporta una alternativa real
    rationale: Dice «O «responderás»», que repite la lectura principal. Debe ofrecer una alternativa auténtica como «contestarás» o «me responderás», o aclarar «responderás» frente a «contestarás».
  - severity: low
    issue: «mi Dios» es correcto, pero «Dios mío» es más natural en vocativo litúrgico español
    rationale: Ambas opciones son fieles a אֱלֹהָי. En esta línea de apelación directa, «oh Señor, Dios mío» fluye mejor y mantiene el tono reverente.
