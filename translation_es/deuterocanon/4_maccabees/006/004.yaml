translation:
  language: es
  text: «Obedece las órdenes del rey», clamó[a] otro heraldo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «desde otro lado un heraldo que clamaba». El griego destaca que el llamado venía de otra parte, probablemente de otro heraldo.'
