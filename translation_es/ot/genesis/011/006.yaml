revisions:
- from: 'Yahvé dijo[a]: «Miren, un solo pueblo son, y una sola lengua para todos ellos; y esto es lo que han comenzado a hacer. Ahora no les será imposible nada de lo que se propongan hacer».'
  to: 'Yahvé dijo: «He aquí, son un solo pueblo, y todos tienen una sola lengua, y esto es lo que han comenzado a hacer. Y ahora nada de lo que se propongan hacer les será vedado[a]».'
  rationale: Se ajusta la cláusula final a la decisión final auditada del English POB sobre לֹא יִבָּצֵר מֵהֶם, usando una formulación española más literal ('les será vedado') y trasladando la alternativa idiomática ('no les será imposible') a la nota. También se corrige el anclaje de la nota para que recaiga sobre la frase pertinente y se eleva ligeramente el registro con 'He aquí' y 'todos tienen una sola lengua', manteniendo plena naturalidad en español.
