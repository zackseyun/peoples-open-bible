  language: en
  yaml_path: translation/ot/jeremiah/043/010.yaml
  text: 'And say to them[a], ‘Thus says Yahweh of hosts, the God of Israel: Behold, I am sending and will take Nebuchadnezzar king of Babylon, my servant, and I will set his throne above these stones that I have hidden, and he will spread his canopy over them.’'
