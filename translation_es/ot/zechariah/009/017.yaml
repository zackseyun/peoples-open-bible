translation:
  language: es
  text: Porque, ¡cuán grande es su bondad[a], y cuán grande su hermosura! El grano hará florecer a los jóvenes[c], y el vino nuevo a las jóvenes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡cuán bueno es él, y cuán hermoso es él!». El hebreo usa sustantivos abstractos: «su bondad» y «su hermosura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vírgenes» para «jóvenes». El hebreo בְּתֻלוֹת puede designar más específicamente a vírgenes no casadas, aunque aquí probablemente funciona como contraparte femenina de «jóvenes».'
    reason: lexical_alternative
  - marker: c
    text: El «su» en «su bondad» y «su hermosura» probablemente se refiere a Yahvé en el contexto, aunque algunos lo entienden del estado restaurado de Israel o del rey.
    reason: theological_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce una explicación exclamativa ligada al contexto anterior. «Porque» conserva la fuerza conectiva sin perder el tono de afirmación enfática.
- source_word: מַה טּוּבוֹ
  english_pob_choice: how great is his goodness
  chosen_spanish: ¡cuán grande es su bondad!
  alternatives_spanish:
  - ¡qué bueno es él!
  - ¡cuánta bondad es la suya!
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo abstracto con sufijo de 3 ms. «Bondad» preserva el sustantivo; «cuán grande es» reproduce el valor exclamativo y evita convertirlo en un adjetivo más libre.
- source_word: וּמַה יָפְיוֹ
  english_pob_choice: and how great his beauty
  chosen_spanish: y cuán grande su hermosura
  alternatives_spanish:
  - y cuán hermoso es
  - y cuánta belleza tiene
  lexicon: HALOT
  rationale: «Hermosura» mantiene el sustantivo paralelo a «bondad» y refleja bien יֹפִי/יָפְי como belleza/esplendor. Se evita una paráfrasis verbal para conservar el paralelismo hebreo.
- source_word: דָּגָן
  english_pob_choice: Grain
  chosen_spanish: El grano
  alternatives_spanish:
  - El cereal
  - La cosecha de grano
  lexicon: HALOT
  rationale: El término designa grano/cereal de manera amplia. «Grano» es el equivalente moderno y claro en español, sin estrecharlo indebidamente a una especie concreta.
- source_word: בַּחוּרִים
  english_pob_choice: the young men
  chosen_spanish: a los jóvenes
  alternatives_spanish:
  - a los muchachos
  - a los varones jóvenes
  lexicon: HALOT
  rationale: En el paralelismo poético con בְּתֻלוֹת, el sentido social de jóvenes varones es el más natural. «A los jóvenes» suena idiomático en español y preserva el referente humano sin forzar una formulación demasiado marcada.
- source_word: יְנוֹבֵב
  english_pob_choice: will make ... flourish
  chosen_spanish: hará florecer
  alternatives_spanish:
  - hará prosperar
  - hará brotar
  - hará crecer
  lexicon: HALOT
  rationale: El verbo raro comunica provocar crecimiento vigoroso/abundancia. «Hará florecer» conserva la idea de fructificación y la imagen agrícola con un español fluido.
- source_word: וְתִירוֹשׁ
  english_pob_choice: and new wine
  chosen_spanish: y el mosto
  alternatives_spanish:
  - y el vino nuevo
  - y el vino fresco
  lexicon: HALOT
  rationale: תִירוֹשׁ es el vino nuevo o mosto. «Mosto» es preciso y natural en español bíblico; mantiene la pareja cereal/vino del texto.
- source_word: בְּתֻלוֹת
  english_pob_choice: the young women
  chosen_spanish: a las jóvenes
  alternatives_spanish:
  - a las vírgenes
  - a las muchachas
  lexicon: HALOT
  rationale: Aunque el lexema puede significar «vírgenes», aquí funciona como paralelo femenino de בַּחוּרִים. «Jóvenes» comunica el grupo etario/social sin imponer una especificación sexual que el contexto poético no exige de forma exclusiva.
theological_decisions:
- issue: Referente del sufijo de 3 ms en «su bondad» y «su hermosura»
  english_pob_reading: The suffixes refer to the LORD, whose saving kingship and blessing are in view in the surrounding context.
  chosen_spanish_reading: Los sufijos se entienden como referidos a Yahvé, cuya acción salvadora y bendición están en el contexto inmediato.
  alternative_spanish_readings:
  - Pueden referirse a la tierra o al estado restaurado de Israel/Sion.
  - Pueden referirse al rey mencionado antes en el capítulo.
  rationale: El contexto cercano exalta la intervención salvadora de Yahvé, y luego pasa a imágenes de abundancia agrícola. En español se conserva el sufijo posesivo sin resolver dogmáticamente el antecedente, de modo que la tensión interpretativa quede disponible.
  doctrine_reference: Preservar la tensión exegética sin cerrarla indebidamente.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios pendientes y que la versión revisada mantiene alto acuerdo con el control cruzado. No se introdujeron enmiendas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según el criterio del proyecto.
  - Se conservó el paralelismo poético con sustantivos abstractos («bondad», «hermosura») en lugar de convertirlos en adjetivos.
  - «Mosto» se eligió por precisión léxica en español para תירוש.
  - La puntuación exclamativa refleja el valor enfático de la construcción hebrea.
