base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/027.yaml
  text: Then Hezekiah commanded that the burnt offering be offered on the altar[a]. And at the time the burnt offering began, the song of Yahweh began also[b], with the trumpets and by means of the instruments of David king of Israel.
  footnotes:
  - marker: a
    text: Or, “the song to the LORD.” The Hebrew literally reads “the song of the LORD.”
    reason: alternative_reading
  - marker: b
    text: Or 'said to offer up'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
