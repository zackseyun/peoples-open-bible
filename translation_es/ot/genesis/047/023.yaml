translation:
  language: es
  text: 'Entonces José dijo al pueblo[a]: «Miren, hoy los he comprado a ustedes y a su tierra para Faraón. Aquí tienen semilla, y sembrarán la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hoy los he adquirido a ustedes y a su tierra para Faraón». El verbo hebreo puede denotar comprar o adquirir de manera más general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La conjunción narrativa waw avanza la secuencia del relato; «entonces» conserva ese avance en español con naturalidad y sin perder el valor consecutivo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: En este contexto colectivo, «el pueblo» es natural en español y mantiene el referente público del grupo egipcio al que José se dirige.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una declaración enfática; «Miren» transmite mejor en español contemporáneo la fuerza deíctica e inmediata que un calco más arcaico.
- source_word: קָנִיתִי
  english_pob_choice: I have bought
  chosen_spanish: los he comprado
  alternatives_spanish:
  - los he adquirido
  - los he comprado
  lexicon: HALOT
  rationale: Se conserva «comprar» como la opción más directa y lexicalmente precisa según la revisión inglesa; el objeto implícito se explicita con «los» por el estilo natural del español.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - los
  - a vosotros
  lexicon: HALOT
  rationale: El hebreo trata a las personas como objeto directo; en español, «a ustedes» mantiene la referencia personal y el registro neutral, evitando una literalidad torpe.
- source_word: אַדְמַתְכֶם
  english_pob_choice: your land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su terreno
  - sus tierras
  lexicon: HALOT
  rationale: «Tierra» es la forma más clara y amplia para la propiedad agrícola en este contexto administrativo. «Su» mantiene el plural respetuoso del discurso a un grupo.
- source_word: לְפַרְעֹה
  english_pob_choice: for Pharaoh
  chosen_spanish: para Faraón
  alternatives_spanish:
  - a Faraón
  - en favor de Faraón
  lexicon: HALOT
  rationale: El lamed expresa transferencia/posesión en la operación; «para Faraón» reproduce de forma concisa la dirección del traspaso, como en la auditoría inglesa.
- source_word: הֵא
  english_pob_choice: Here is
  chosen_spanish: Aquí tienen
  alternatives_spanish:
  - Aquí está
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica presenta lo que José entrega; «Aquí tienen» hace explícita la relación con los oyentes y mantiene la inmediatez del anuncio.
- source_word: זֶרַע
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - semilla para sembrar
  - grano para sembrar
  lexicon: HALOT
  rationale: Aunque «seed» puede traducirse por «semilla», en español «semilla» resulta más natural para el material de siembra entregado en este contexto; la función agrícola queda clara por el verbo siguiente.
- source_word: וּזְרַעְתֶּם
  english_pob_choice: and you shall sow
  chosen_spanish: y sembrarán
  alternatives_spanish:
  - y ustedes sembrarán
  - y ustedes siembren
  lexicon: HALOT
  rationale: La forma verbal en contexto exhortativo/instructivo se vierte con futuro de mandato en español («sembrarán»), que comunica la instrucción sin forzar un imperativo directo.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el terreno
  - el suelo
  lexicon: HALOT
  rationale: Se mantiene la misma imagen de «tierra» para cohesión léxica con la primera mitad del versículo; en español suena más natural que alternar con «suelo» en este entorno agrícola.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «bought» sobre «acquired» y conservó el valor injuntivo del cierre; en español se reflejó esa decisión con «los he comprado» y «sembrarán la tierra», ajustando la sintaxis para que suene natural y pública sin perder la fuerza jurídica y agrícola del hebreo.
  spanish_consistency_notes:
  - Se conservó «Faraón» como transliteración histórica estándar, coherente con el pasaje.
  - Se mantuvo la distinción entre el acto de transferencia de propiedad y la instrucción agrícola final.
  - No se usó «SEÑOR» ni lenguaje de sustitución para el nombre divino, porque este versículo no contiene el Tetragrámaton.
