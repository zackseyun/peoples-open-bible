translation:
  language: es
  text: Después de estas cosas, Tobías también siguió su camino, bendiciendo a Dios porque había hecho prosperar su viaje[a], y seguía bendiciendo a Ragüel y a Edna, su mujer[b]. Y siguió su camino hasta que se acercaron a Nínive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «porque prosperó su camino»; es un modismo que significa que Dios dio éxito al viaje.'
    reason: lexical_alternative
  - marker: b
    text: La última cláusula es ardua en griego. Probablemente significa «hasta que se acercaron a Nínive»; algunos podrían entenderla como «hasta que él se acercó a Nínive».
    reason: textual_variant
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Más tarde
  lexicon: LSJ
  rationale: La expresión temporal plural se conserva de forma natural en español con «Después de estas cosas», que refleja el matiz de transición narrativa sin añadir interpretación.
- source_word: ἐπορεύετο
  english_pob_choice: went on his way / went on
  chosen_spanish: siguió su camino / siguió andando
  alternatives_spanish:
  - iba
  - viajaba
  lexicon: LSJ
  rationale: El imperfecto indica acción շարունակada; «siguió su camino» y «siguió andando» reproducen ese aspecto continuo de manera fluida en español.
- source_word: εὐλογῶν τὸν θεόν
  english_pob_choice: blessing God
  chosen_spanish: bendiciendo a Dios
  alternatives_spanish:
  - alabando a Dios
  - dando bendición a Dios
  lexicon: LSJ
  rationale: Se mantiene el verbo «bendecir» para conservar la formulación fuente y el registro bíblico, sin sustituirlo por una paráfrasis más libre.
- source_word: ὅτι εὐώδωσεν τὴν ὁδὸν αὐτοῦ
  english_pob_choice: because he had made his journey successful
  chosen_spanish: porque había hecho prosperar su viaje
  alternatives_spanish:
  - porque había prosperado su camino
  - porque había dado éxito a su viaje
  lexicon: LSJ
  rationale: Se traduce el modismo de «hacer prosperar el camino» con una forma natural en español que conserva la idea de éxito concedido por Dios.
- source_word: κατευλόγει
  english_pob_choice: he kept blessing
  chosen_spanish: seguía bendiciendo
  alternatives_spanish:
  - bendecía repetidamente
  - continuaba bendiciendo
  lexicon: LSJ
  rationale: El imperfecto compuesto sugiere acción reiterada o continua; «seguía bendiciendo» expresa bien ese valor sin perder claridad.
- source_word: Ῥαγουὴλ καὶ Ἔδναν τὴν γυναῖκα αὐτοῦ
  english_pob_choice: Raguel and Edna his wife
  chosen_spanish: a Ragüel y a Edna, su mujer
  alternatives_spanish:
  - a Ragüel y a Edna, su esposa
  - a Ragüel y a Edna, la esposa de él
  lexicon: LSJ
  rationale: La sintaxis griega identifica a Edna como esposa de Ragüel; el español lo hace explícito con una aposición natural y fiel al vínculo expresado.
- source_word: μέχρις οὗ ἤγγισαν αὐτὸν εἰς Νινευή
  english_pob_choice: until they came near to Nineveh
  chosen_spanish: hasta que se acercaron a Nínive
  alternatives_spanish:
  - hasta que él se acercó a Nínive
  - hasta que llegaron cerca de Nínive
  lexicon: LSJ
  rationale: 'La clausula final es sintácticamente difícil en griego; se preserva el sentido narrativo adoptado por la POB inglesa: el avance hacia Nínive, con el plural del verbo reflejado en español.'
theological_decisions:
- issue: Referencia a Dios en la bendición de Tobías
  english_pob_reading: blessing God because he had made his journey successful
  chosen_spanish_reading: bendiciendo a Dios porque había hecho prosperar su viaje
  alternative_spanish_readings:
  - alabando a Dios porque había hecho prosperar su viaje
  - bendiciendo a Dios porque había dado éxito a su viaje
  rationale: Se mantiene a Dios como sujeto implícito de la prosperidad del viaje, sin neutralizar la causación divina presente en el texto.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve source causation'
- issue: Cláusula final difícil sobre la llegada a Nínive
  english_pob_reading: And he went on until they came near to Nineveh.
  chosen_spanish_reading: Y siguió andando hasta que se acercaron a Nínive.
  alternative_spanish_readings:
  - Y siguió andando hasta que se acercó a Nínive.
  - Y continuaron hasta acercarse a Nínive.
  rationale: Se conserva honestamente la ambigüedad sintáctica del griego sin forzar una reconstrucción innecesaria; el contexto de viaje favorece la cercanía a Nínive, no a una persona.
  doctrine_reference: 'DOCTRINE.md: preserve source uncertainty honestly'
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del contexto inglés: mantuve la idea de movimiento continuo con sujeto singular en la primera mitad, y conservé la lectura narrativa de acercamiento a Nínive en la cláusula final, reflejando la dificultad sintáctica del griego sin ocultarla. También integré las notas de la POB inglesa en anclajes visibles dentro del texto para que cada pie de nota corresponda exactamente con su marcador.'
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto fuente lo exija explícitamente; aquí aparece θεός, por eso traduje «Dios».
  - Conservo «bendiciendo» para εὐλογῶν / κατευλόγει, en continuidad con la elección léxica documentada de la POB inglesa.
  - Mantengo «Nínive» con acento español estándar.
  - He usado «su mujer» como equivalente neutral y bíblico de τὴν γυναῖκα αὐτοῦ, sin forzar «esposa» donde el español puede sonar más técnico de lo necesario.
