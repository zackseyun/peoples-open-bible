review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la imagen central de בלע como ''tragar'' y mantiene la distinción entre ''pueblos'' y ''naciones''. Sin embargo, invierte innecesariamente los dos sustantivos paralelos del hebreo/POB inglés: donde el inglés auditado tiene primero ''the covering'' y luego ''the veil'', el español pone primero ''el velo'' y luego ''la cubierta''. Además, ''cubre a todos los pueblos'' debilita la imagen espacial de algo puesto ''sobre'' ellos. Falta también la nota de cruce contextual sobre la relación con la muerte en el versículo siguiente, preservada en el POB inglés.'
  spanish_quality_summary: 'El español es legible y digno, pero puede sonar más natural y más fiel con ''se tragará'' en vez de ''él tragará'', y con una secuencia más paralela: ''la cubierta ... y el velo ...''. ''Cubierta'' funciona, aunque ''cobertura'' o ''cubierta'' deben manejarse consistentemente. Conviene evitar la nota redundante sobre ''tragará'' y reemplazarla por las dos notas relevantes del audit trail.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí importa preservar la decisión léxica del POB: בלע = ''tragarse/tragar por completo''; הַלּוֹט = ''cubierta/cobertura'' antes que un término más interpretativo; וְהַמַּסֵּכָה = ''velo'' en paralelo; עַמִּים = ''pueblos'' y גּוֹיִם = ''naciones''. La revisión propuesta alinea mejor el español con esas decisiones documentadas.'
  issues:
  - severity: medium
    issue: Se invierten los dos elementos paralelos principales
    rationale: El hebreo y el POB inglés presentan primero 'the covering' (הַלּוֹט) y luego 'the veil' (הַמַּסֵּכָה). El borrador español pone primero 'el velo' y luego 'la cubierta', alterando la secuencia y la racionalidad léxica auditada.
  - severity: medium
    issue: La preposición 'a' en 'cubre a todos los pueblos' atenúa la imagen de cobertura sobre los pueblos
    rationale: El hebreo עַל y la decisión inglesa destacan algo extendido/puesto sobre los pueblos. En español, 'que cubre a todos los pueblos' es comprensible, pero 'sobre todos los pueblos' preserva mejor la metáfora espacial del original.
  - severity: low
    issue: La nota a no corresponde al tipo de alternativa preservada en el POB inglés
    rationale: 'La nota actual sobre ''tragará'' repite la idea principal pero no refleja la alternativa importante documentada: ''la mortaja que amortaja a todos los pueblos''/''el sudario...''. Es mejor usar las notas auditadas relevantes.'
  - severity: low
    issue: Falta la nota contextual sobre la posible anticipación de la muerte en el versículo siguiente
    rationale: El POB inglés conservó una nota interpretativa moderada sobre la cobertura/velo y su relación con v. 8. Incluirla ayuda a preservar la justificación teológica documentada sin sobreinterpretar el texto.
