translation:
  language: es
  text: ¿Hasta cuándo arremeterán contra un hombre? ¿Lo derribarán[a] todos ustedes, como un muro inclinado[c][b], una cerca tambaleante?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Lo quebrantarán?». El verbo puede entenderse metafóricamente en el contexto, especialmente por la imagen siguiente de un muro y una cerca al borde del derrumbe.'
    reason: lexical_alternative
  - marker: b
    text: La comparación puede describir al hombre atacado como frágil y a punto de ceder; aunque algunos la entienden como que los atacantes se amontonan contra él como un muro abultado.
    reason: alternative_reading
  - marker: c
    text: 'O: «¿Lo asesinarán?».'
    reason: previous_rendering
lexical_decisions:
- source_word: תְּהֽוֹתְת֣וּ
  english_pob_choice: assail
  chosen_spanish: arremeterán contra
  alternatives_spanish:
  - atacarán
  - asaltarán
  - golpearán
  lexicon: HALOT
  rationale: El verbo es raro y expresa un asalto violento y repetido. «Arremeter contra» conserva el impulso agresivo y la idea de embestida sin volver el español artificial.
- source_word: עַל אִישׁ
  english_pob_choice: a man
  chosen_spanish: contra un hombre
  alternatives_spanish:
  - contra una persona
  - a un hombre
  - sobre un hombre
  lexicon: HALOT
  rationale: El hebreo presenta un objetivo singular e אישי. En español, «contra un hombre» refleja mejor la dirección hostil de עַל en este contexto que una simple repetición de «a un hombre».
- source_word: תְּרָצְּח֪וּ
  english_pob_choice: break him down
  chosen_spanish: lo quebrantarán
  alternatives_spanish:
  - lo destruirán
  - lo aplastarán
  - lo matarán
  lexicon: HALOT
  rationale: Aunque רצח normalmente puede significar «matar» o «asesinar», el contexto inmediato de la muralla inclinada y la cerca tambaleante favorece una lectura metafórica de derribar/quebrantar. «Quebrantarán» preserva la fuerza violenta y la coherencia de la imagen.
- source_word: כֻלְּכֶם
  english_pob_choice: you all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - ustedes todos
  - todos ustedes mismos
  - todos
  lexicon: HALOT
  rationale: El plural es enfático. «Todos ustedes» transmite con naturalidad la presión colectiva del ataque.
- source_word: כְּקִיר נָטוּי
  english_pob_choice: like a leaning wall
  chosen_spanish: como un muro inclinado
  alternatives_spanish:
  - como un muro ladeado
  - como una pared a punto de caer
  - como un muro que se inclina
  lexicon: HALOT
  rationale: «Muro inclinado» es una forma clara y fiel para la imagen de inestabilidad y posible derrumbe. «Muro» es más natural que «pared» en este paralelismo poético.
- source_word: גָּדֵר הַדְּחוּיָה
  english_pob_choice: a tottering fence
  chosen_spanish: como una cerca tambaleante
  alternatives_spanish:
  - como una cerca derribada
  - como una cerca vencida
  - como una cerca a punto de caer
  lexicon: HALOT
  rationale: El participio sugiere algo empujado o desviado y al borde del colapso. «Cerca tambaleante» comunica esa precariedad de forma idiomática y mantiene la imagen paralela del versículo.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que prefirió un sentido metafórico coherente con la imagen de derrumbe («break him down») en lugar de la lectura más directa «murder him». También conserva la nota de alternativa para la ambigüedad verbal y la posibilidad interpretativa de la comparación con muro/cerca.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el texto.
  - Se prefirió «muro» sobre «pared» por la fuerza poética del paralelismo.
  - Se usó un español neutro y formal, apto para lectura pública.
  - Se conservó la tensión entre traducción literal y lectura metafórica mediante notas, sin resolverla de forma simplificadora.
