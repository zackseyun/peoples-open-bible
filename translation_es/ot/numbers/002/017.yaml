base_translation:
  language: en
  yaml_path: translation/ot/numbers/002/017.yaml
  text: Then the tent of meeting shall set out[a], with the camp of the Levites in the midst of the camps. Just as they camp, so they shall set out[b], each in his place by their banners.
  footnotes:
