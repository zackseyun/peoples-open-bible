  to: Entonces se acercaron los jefes de las casas paternas[a] del clan de los hijos de Galaad, hijo de Maquir, hijo de Manasés, de entre los clanes de los hijos de José, y hablaron delante de Moisés y delante de los jefes, jefes de las casas paternas de los hijos de Israel[b].
