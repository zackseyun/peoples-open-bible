  glossary_alignment: No hay conflictos con términos del glosario principal como Yahvé, Mesías, etc. El punto clave es la alineación con la decisión teológica/lexical documentada para הַתָּמִיד, que debe mantenerse como 'ofrenda regular' en vez de 'holocausto regular', dejando 'sacrificio diario' como alternativa tradicional en nota.
