    text: Or 'concerned himself with nothing' or 'saw nothing' that was in Joseph's charge.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in his hand,' an idiom for what was entrusted to his control.
    reason: cultural_note
  - marker: c
    text: Or 'the LORD caused to succeed' whatever he did.
    reason: lexical_alternative
