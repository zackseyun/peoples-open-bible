translation:
  language: es
  text: Y todo el que toque[a], en campo abierto, a uno muerto por la espada, o un cadáver[b], o un hueso humano[c], o una sepultura, quedará impuro siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «sobre la faz del campo», un modismo que significa estar en campo abierto.
    reason: lexical_alternative
  - marker: b
    text: O «un muerto»; aquí el sentido es un cuerpo muerto, es decir, un cadáver.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «un hueso de hombre/persona»; aquí el sentido es genérico, no específicamente masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And everyone
  chosen_spanish: Y cualquiera
  alternatives_spanish:
  - Y todo aquel
  - Y quienquiera
  lexicon: HALOT
  rationale: כֹל con una cláusula relativa tiene fuerza distributiva. En español, «cualquiera» expresa bien la generalidad de la norma legal sin perder el alcance universal.
- source_word: אֲשֶׁר יִגַּע
  english_pob_choice: who touches
  chosen_spanish: que toque
  alternatives_spanish:
  - que toca
  - que toque cualquiera
  lexicon: HALOT
  rationale: La cláusula relativa con imperfecto expresa un caso general. El subjuntivo en español es natural en este tipo de legislación condicional y conserva el valor general.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: in the open field
  chosen_spanish: sobre la faz del campo
  alternatives_spanish:
  - en campo abierto
  - en la superficie del campo
  lexicon: HALOT
  rationale: La expresión es literalmente «sobre la faz del campo». Se conserva la imagen hebrea en el texto principal, con una formulación española digna y comprensible. La nota aclara el valor idiomático.
- source_word: בַּחֲלַל חֶרֶב
  english_pob_choice: one slain by the sword
  chosen_spanish: un herido por la espada
  alternatives_spanish:
  - uno muerto a espada
  - uno caído por la espada
  lexicon: HALOT
  rationale: חָלָל puede denotar a un muerto o herido de muerte por arma; «herido por la espada» mantiene la relación instrumental sin forzar una especificación no explicitada por el hebreo. La nota puede señalar la alternativa de «muerto a espada» si se desea mayor dureza léxica.
- source_word: בְמֵת
  english_pob_choice: a dead body
  chosen_spanish: un cadáver
  alternatives_spanish:
  - un muerto
  - un cuerpo muerto
  lexicon: HALOT
  rationale: En contexto de impureza ritual, מֵת designa el cuerpo muerto. «Cadáver» es el equivalente español más preciso y natural; la nota puede conservar la alternativa «un muerto» si se busca mayor cercanía formal.
- source_word: בְעֶצֶם אָדָם
  english_pob_choice: a human bone
  chosen_spanish: un hueso humano
  alternatives_spanish:
  - un hueso de hombre
  - un hueso de una persona
  lexicon: HALOT
  rationale: אָדָם aquí es genérico, no masculino específico. «Humano» mantiene el sentido general y evita una lectura varonil indebida.
- source_word: בְקָבֶר
  english_pob_choice: a grave
  chosen_spanish: una sepultura
  alternatives_spanish:
  - una tumba
  - un sepulcro
  lexicon: HALOT
  rationale: קֶבֶר puede ser «tumba», «sepulcro» o «sepultura». En español bíblico contemporáneo, «sepultura» comunica bien el lugar de enterramiento y mantiene un registro reverente.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - se contaminará ritualmente
  lexicon: HALOT
  rationale: El verbo expresa impureza ritual legal. «Quedará impuro» suena natural en español y conserva el estado resultante, sin explicar de más el tecnicismo ceremonial.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  lexicon: HALOT
  rationale: Expresión cardinal directa; no requiere expansión.
theological_decisions:
- issue: Impureza ritual en lenguaje legal
  english_pob_reading: shall be unclean
  chosen_spanish_reading: quedará impuro
  alternative_spanish_readings:
  - será impuro
  - se contaminará ritualmente
  rationale: La ley no describe pecado moral sino estado de impureza ceremonial. «Quedará impuro» preserva el efecto legal y evita moralizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy; pureza/impureza ritual en la Torá
- issue: אָדָם como referencia genérica a restos humanos
  english_pob_reading: a human bone
  chosen_spanish_reading: un hueso humano
  alternative_spanish_readings:
  - un hueso de hombre
  - un hueso de una persona
  rationale: La referencia es a restos humanos en general, no a un varón específico. Se evita una traducción masculinizante innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Frase idiomática «sobre la faz del campo»
  english_pob_reading: in the open field
  chosen_spanish_reading: sobre la faz del campo
  alternative_spanish_readings:
  - en campo abierto
  - en la superficie del campo
  rationale: Se conserva el hebraísmo porque el español lo puede soportar y porque la imagen espacial es parte del énfasis del texto. La nota aclara el sentido idiomático.
  doctrine_reference: DOCTRINE.md §Translation philosophy; idioms and auditable reasoning
translation_notes:
  revision_awareness: El inglés auditado revisó «someone slain by the sword» a «one slain by the sword» para mayor concisión. En español se optó por «un herido por la espada» para conservar el valor léxico de חָלַל como víctima alcanzada por la espada y mantener fluidez; se documenta la alternativa «muerto a espada» en la decisión léxica.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la tradición POB cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro legal-sacerdotal, con «impuro» para טמא y sin suavizar la sanción ritual.
  - Se evita «siervo» o vocabulario eclesiástico ajeno al pasaje.
  - La puntuación separa con comas la serie de impurezas para reflejar la enumeración hebrea.
