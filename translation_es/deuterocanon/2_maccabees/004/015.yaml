translation:
  language: es
  text: y no dando ningún valor a los honores de sus padres[a], y considerando las distinciones griegas[b] las mejores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ancestrales» o «de sus antepasados».
    reason: lexical_alternative
  - marker: b
    text: La palabra griega δόξας también puede traducirse «glorias» u «honores»; aquí se refiere a signos estimados de prestigio cultural griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: πατρῴας
  english_pob_choice: of their fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - ancestrales
  - de sus antepasados
  lexicon: LSJ
  rationale: El adjetivo expresa la pertenencia heredada de los mayores o del linaje familiar. «De sus padres» conserva la referencia familiar y natural en español, sin perder el sentido de tradición recibida.
- source_word: τιμὰς
  english_pob_choice: honors
  chosen_spanish: honores
  alternatives_spanish:
  - privilegios
  - distinciones
  lexicon: LSJ
  rationale: Aquí τιμή denota valores o prerrogativas apreciadas por la tradición heredada. «Honores» mantiene bien el contraste con δόξας y suena claro en español.
- source_word: ἐν οὐδενὶ τεθειμένοι
  english_pob_choice: placing no value at all on
  chosen_spanish: no dando ningún valor a
  alternatives_spanish:
  - considerando como nada
  - teniendo en nada
  lexicon: LSJ
  rationale: La locución idiomática expresa tratar algo como irrelevante o sin importancia. «No dando ningún valor a» reproduce esa desestimación en español natural.
- source_word: Ἑλληνικὰς
  english_pob_choice: Greek
  chosen_spanish: griegas
  alternatives_spanish:
  - helenas
  lexicon: LSJ
  rationale: En este contexto cultural, «griegas» es el equivalente moderno y directo de Ἑλληνικός.
- source_word: δόξας
  english_pob_choice: distinctions
  chosen_spanish: distinciones
  alternatives_spanish:
  - glorias
  - honores
  - reputaciones
  lexicon: LSJ
  rationale: Aunque δόξα puede significar «gloria», aquí el plural contrasta con τιμαί y apunta a signos de prestigio cultural. «Distinciones» comunica bien ese valor social sin sobredimensionarlo.
- source_word: καλλίστας
  english_pob_choice: the finest
  chosen_spanish: como las más excelentes
  alternatives_spanish:
  - como las mejores
  - como las más bellas
  lexicon: LSJ
  rationale: El superlativo de καλός puede traducirse por «las más excelentes» para expresar la valoración comparativa de prestigio. En español evita una literalidad estética («más bellas») menos adecuada al contexto social.
- source_word: ἡγούμενοι
  english_pob_choice: considering
  chosen_spanish: considerando
  alternatives_spanish:
  - pensando
  - estimando
  lexicon: LSJ
  rationale: El participio indica juicio o evaluación. «Considerando» es preciso y fluido en español.
theological_decisions:
- issue: Contraste valorativo entre la herencia ancestral judía y el prestigio cultural griego
  english_pob_reading: Render the contrast descriptively without importing later polemical language.
  chosen_spanish_reading: Mantener el contraste como una evaluación de valores, sin intensificarlo a un lenguaje polémico ajeno al texto.
  alternative_spanish_readings:
  - y despreciando los honores de sus padres
  - y teniendo por mejores las glorias griegas
  rationale: El griego presenta una oposición fuerte, pero no usa un verbo explícito de «despreciar». La versión española conserva la desestimación mediante «no dando ningún valor» y el juicio positivo sobre lo griego sin añadir carga interpretativa extra.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete y la decisión inglesa de conservar el contraste axiológico sin añadir un verbo explícito de desprecio. No hay revisiones aplicadas en el registro inglés más reciente.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» y otros términos teológicos por norma del proyecto, pero este versículo no los contiene.
  - Se mantiene un registro sobrio y bíblico en español, evitando arcaísmos innecesarios.
  - Las notas al pie preservan las alternativas léxicas documentadas en el audit trail inglés y añaden solo la aclaración necesaria para el español.
