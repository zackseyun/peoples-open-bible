translation:
  language: es
  text: Moisés vio toda la obra, y he aquí que la habían realizado tal como Yahvé había mandado; así la habían hecho. Y Moisés los bendijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - examinó
  lexicon: HALOT
  rationale: El hebreo básico ראה significa 'ver'. En este contexto introduce la inspección de la obra concluida, pero en español 'vio' conserva la naturalidad sin añadir una interpretación más técnica que el texto no exige.
- source_word: כָּל הַמְּלָאכָה
  english_pob_choice: all the work
  chosen_spanish: toda la obra
  alternatives_spanish:
  - todo el trabajo
  - toda la labor
  lexicon: HALOT
  rationale: מְלָאכָה puede significar 'trabajo' o 'obra'. En el contexto de la construcción del tabernáculo, 'obra' comunica mejor el conjunto realizado y evita una reducción demasiado genérica.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y en verdad
  lexicon: HALOT
  rationale: '''He aquí'' preserva en español la fuerza discursiva de atención y énfasis de הִנֵּה con un registro digno y reconocible en texto bíblico.'
- source_word: עָשׂוּ אֹתָהּ
  english_pob_choice: they had done it
  chosen_spanish: la habían hecho
  alternatives_spanish:
  - la habían hecho
  - la habían realizado
  - la habían completado
  lexicon: HALOT
  rationale: עָשָׂה es amplio ('hacer', 'hacer/realizar'). Como se refiere a la obra completa, 'la habían hecho' conserva el paralelo con la repetición posterior y no estrecha innecesariamente el sentido.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: just as Yahweh had commanded
  chosen_spanish: como Yahvé había mandado
  alternatives_spanish:
  - tal como Yahvé había mandado
  - según Yahvé había mandado
  lexicon: HALOT
  rationale: כַּאֲשֶׁר expresa correspondencia exacta; 'como' es la opción española más natural aquí. יְהוָה se traduce 'Yahvé' conforme al estándar del proyecto para el nombre divino, no como un sustituto titular.
- source_word: כֵּן עָשׂוּ
  english_pob_choice: so they had done it
  chosen_spanish: así la habían hecho
  alternatives_spanish:
  - así lo habían hecho
  - de ese modo la habían hecho
  lexicon: HALOT
  rationale: La repetición de עָשָׂה refuerza la obediencia exacta. 'Así la habían hecho' mantiene esa repetición y el vínculo con 'la obra' en español.
- source_word: וַיְבָרֶךְ אֹתָם
  english_pob_choice: And Moses blessed them
  chosen_spanish: Y Moisés los bendijo
  alternatives_spanish:
  - Y Moisés pronunció una bendición sobre ellos
  - Y Moisés les bendijo
  lexicon: HALOT
  rationale: ברך en piel significa 'bendecir'. La forma directa 'los bendijo' es idiomática en español y conserva el acto verbal sin expandirlo innecesariamente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Para el español del POB se adopta 'Yahvé', que mantiene el nombre propio divino sin sustituirlo por un título y sigue la convención del proyecto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El versículo se alinea estrechamente con el texto hebreo: se conserva la repetición de עָשָׂה, el énfasis de וְהִנֵּה y la relación exacta de conformidad con el mandato divino. No se detectaron variantes textuales ni decisiones de revisión que requirieran nota aparte.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - Se usa 'obra' para מְלָאכָה en este contexto narrativo de construcción, coherente con el registro bíblico en español.
  - Se preserva la doble mención de 'hacer' para reflejar la repetición enfática del hebreo.
