translation:
  language: es
  text: ¿Resistirá tu corazón[a], o seguirán fuertes tus manos, en los días cuando yo tome medidas contra ti? Yo, Yahvé, he hablado, y lo haré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Se mantendrá firme tu corazón, o tus manos serán fuertes, en los días cuando yo actúe contra ti?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיַעֲמֹד
  english_pob_choice: endure
  chosen_spanish: se mantendrá firme
  alternatives_spanish:
  - permanecerá en pie
  - perseverará
  lexicon: HALOT
  rationale: El hebreo pregunta literalmente si algo «se pondrá de pie»; en este contexto retórico de juicio, la idea es si podrá resistir la presión. «Se mantendrá firme» conserva la imagen de firmeza sin sonar forzado en español.
- source_word: לִבֵּךְ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu ánimo
  lexicon: HALOT
  rationale: «Corazón» preserva la imagen antropológica hebrea del centro de la persona, y funciona bien en paralelo con «tus manos».
- source_word: תֶּחֱזַקְנָה יָדַיִךְ
  english_pob_choice: your hands remain strong
  chosen_spanish: se fortalecerán tus manos
  alternatives_spanish:
  - tus manos permanecerán fuertes
  - tus manos se afirmarán
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para capacidad o fuerza de actuar. «Se fortalecerán» comunica la idea de quedar con fuerzas para sostenerse, manteniendo la metáfora corporal y el plural verbal.
- source_word: לַיָּמִים
  english_pob_choice: in the days
  chosen_spanish: en los días
  alternatives_spanish:
  - para los días
  - cuando lleguen los días
  lexicon: HALOT
  rationale: La preposición tiene valor temporal; «en los días» es una equivalencia natural y fiel.
- source_word: אֲשֶׁר אֲנִי עֹשֶׂה אוֹתָךְ
  english_pob_choice: when I deal with you
  chosen_spanish: en que yo te trato
  alternatives_spanish:
  - en que yo actúo contra ti
  - en que yo te juzgo
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: literalmente, «que yo hago contigo/a ti». En el contexto de juicio, «te trato» conserva la amplitud del verbo sin introducir una precisión más estrecha que el hebreo no exige.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, siguiendo el criterio del proyecto para no sustituirlo por un título.
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - he dicho
  lexicon: HALOT
  rationale: El perfecto enfatiza la solidez de la declaración divina ya emitida; «he hablado» reproduce bien ese valor de certeza.
- source_word: וְעָשִׂיתִי
  english_pob_choice: I will do it
  chosen_spanish: y lo haré
  alternatives_spanish:
  - y lo cumpliré
  - y actuaré
  lexicon: HALOT
  rationale: En el discurso profético, el perfecto con waw expresa certeza de cumplimiento. «Y lo haré» comunica la promesa infalible de ejecución con naturalidad en español.
theological_decisions:
- issue: Alcance de la acción divina en אֲשֶׁר אֲנִי עֹשֶׂה אוֹתָךְ
  english_pob_reading: when I deal with you
  chosen_spanish_reading: en que yo te trato
  alternative_spanish_readings:
  - en que yo actúo contra ti
  - en que yo te juzgo
  rationale: El contexto es de advertencia judicial, pero el verbo hebreo por sí solo no especifica únicamente «juzgar». La opción elegida mantiene la severidad contextual sin estrechar indebidamente el alcance semántico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor del cierre profético וְעָשִׂיתִי
  english_pob_reading: I will do it
  chosen_spanish_reading: y lo haré
  alternative_spanish_readings:
  - y lo cumpliré
  - y actuaré
  rationale: 'El cierre funciona como fórmula solemne de certeza: lo dicho por Yahvé se realizará. «Y lo haré» expresa cumplimiento futuro seguro, coherente con el uso profético del perfecto.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Base revisada conforme al estado de alta concordancia del audit trail; no se introdujeron cambios de revisión adicionales ni tensiones textuales nuevas.
