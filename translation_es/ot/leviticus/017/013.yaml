    text: O, «del forastero residente entre ellos». El hebreo גֵּר designa a un no israelita que vive dentro de la comunidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y lo cubrirá con tierra»; el referente más natural del pronombre es la sangre recién mencionada, no el animal.
    reason: lexical_alternative
  revision_rationale: Se reubica y reescribe la nota [b] para que explique correctamente el pronombre de «la cubrirá», que es donde está la verdadera ambigüedad señalada por el POB inglés. Además, se suaviza «cace presa» a «cace alguna pieza» para un español más natural sin apartarse del sentido hebreo.
