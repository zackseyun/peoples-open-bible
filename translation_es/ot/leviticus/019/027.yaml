revisions:
- from: No se afeitarán en redondo el cabello de los lados de la cabeza[a][b], ni dañarán el borde de su barba[c].
  to: No redondearán el cabello de los lados de la cabeza[a][b], ni dañarán los bordes de la barba[c].
  rationale: Se ajusta la primera cláusula para reflejar mejor el sentido de תַקִּפוּ como cortar o dejar en forma redondeada, sin limitarlo a «afeitar». Se reemplaza la construcción «No se afeitarán» por una prohibición directa más natural en español jurídico-bíblico. Además, se cambia «el borde de su barba» por «los bordes de la barba» para alinearse mejor con la decisión auditada del POB y con el valor idiomático de פְּאַת en la segunda cláusula.
