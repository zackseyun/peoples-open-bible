translation:
  language: es
  text: Pero no se humilló delante de Yahvé[a], como se humilló Manasés su padre, pues él, Amón, aumentó la culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: נִכְנַע
  english_pob_choice: did not humble himself
  chosen_spanish: no se humilló
  alternatives_spanish:
  - no se sometió
  - no fue humillado
  lexicon: HALOT
  rationale: El nifal de כנע aquí expresa una acción reflexiva o de abajarse ante Dios. En español, 'no se humilló' conserva la idea de rebajarse voluntariamente y mantiene el vínculo verbal con la comparación con Manasés.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La construcción idiomática מִלִּפְנֵי expresa estar delante de alguien o en su presencia. 'Delante de Yahvé' suena natural en español bíblico actual y conserva la relación espacial/relacional del hebreo.
- source_word: כְּהִכָּנַע
  english_pob_choice: as ... humbled himself
  chosen_spanish: como se había humillado
  alternatives_spanish:
  - como se había sometido
  - tal como se había humillado
  lexicon: HALOT
  rationale: El כ comparativo + infinitivo de כנע establece a Manasés como modelo de comparación. Repetir 'humilló' preserva la conexión léxica y el contraste retórico con Amon.
- source_word: מְנַשֶּׁה אָבִיו
  english_pob_choice: his father Manasseh
  chosen_spanish: Manasés, su padre
  alternatives_spanish:
  - su padre Manasés
  - Manasés, el padre de él
  lexicon: HALOT
  rationale: El español más natural coloca el nombre propio seguido de la aposición posesiva. Así se mantiene clara la identificación de Manasés como padre de Amon sin forzar el orden del hebreo.
- source_word: הוּא אָמוֹן
  english_pob_choice: he, Amon,
  chosen_spanish: él, Amón,
  alternatives_spanish:
  - Amón mismo
  - él era Amón
  lexicon: HALOT
  rationale: La combinación de pronombre y nombre propio es enfática. La aposición 'él, Amón,' conserva ese énfasis y subraya la identificación directa del rey culpable.
- source_word: הִרְבָּה
  english_pob_choice: increased
  chosen_spanish: aumentó
  alternatives_spanish:
  - multiplicó
  - incrementó
  lexicon: HALOT
  rationale: El hifil de רבה significa hacer grande o aumentar. 'Aumentó' transmite con naturalidad la idea de que la culpa no solo existía, sino que fue agravada.
- source_word: אַשְׁמָה
  english_pob_choice: guilt
  chosen_spanish: la culpa
  alternatives_spanish:
  - culpabilidad
  - culpa moral
  lexicon: HALOT
  rationale: En este contexto el sustantivo denota culpabilidad moral, no una ofrenda por la culpa. 'La culpa' es la equivalencia más clara y sobria en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el criterio del proyecto, se traduce por 'Yahvé' y no por una máscara litúrgica como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La base inglesa fue revisada de 'multiplied guilt' a 'increased guilt'; por eso se eligió 'aumentó la culpa' para reflejar la lectura final más natural sin perder el valor intensivo del hifil hebreo. Se mantuvo la alternancia posible de 'delante de Yahvé' / 'ante Yahvé' reconocida por el auditorio inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal para יְהוָה, conforme a la terminología del proyecto.
  - Se preservó el paralelismo verbal con 'humilló' en ambas mitades del verso.
  - '''Culpa'' se usa en sentido moral/jurídico, no sacrificial.'
  - La aposición 'él, Amón,' reproduce el énfasis del hebreo sin sobrecargar la sintaxis española.
