translation:
  language: es
  text: Pero los hijos de Manasés no pudieron desposeer[a] a los habitantes de estas ciudades, y el cananeo[b] estaba resuelto a habitar en esta tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desalojar». El hebreo usa un verbo de quitar la posesión de la tierra; aquí se ha preferido «desposeer» porque expresa con más claridad la fuerza legal-territorial.
    reason: lexical_alternative
  - marker: b
    text: O «los cananeos». El hebreo usa un singular colectivo; el español puede reflejarlo en singular o resolverlo en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  english_pob_choice: were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no lograron
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad; en español, «no pudieron» comunica de manera natural esa incapacidad sin añadir matices de esfuerzo no atestiguados.
- source_word: בְּנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Manasseh
  chosen_spanish: los hijos de Manasés
  alternatives_spanish:
  - los descendientes de Manasés
  - la tribu de Manasés
  lexicon: HALOT
  rationale: Conserva la expresión familiar del hebreo y sigue funcionando como designación del grupo tribal. «Hijos» reproduce la forma del original mejor que una equivalencia más explicativa.
- source_word: לְהוֹרִישׁ
  english_pob_choice: to dispossess
  chosen_spanish: despojar
  alternatives_spanish:
  - expulsar
  - hacer salir
  - desposeer
  lexicon: HALOT
  rationale: En este contexto de conquista y herencia, el sentido es quitar a otros de su posesión territorial. «Despojar» mantiene esa fuerza legal-territorial en español de forma más directa que «expulsar».
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas poblaciones
  - estas urbes
  lexicon: HALOT
  rationale: «Ciudades» es la correspondencia normal de עָרִים y preserva el referente geográfico concreto del pasaje.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: el cananeo
  alternatives_spanish:
  - los cananeos
  - el pueblo cananeo
  lexicon: HALOT
  rationale: Se preserva el singular colectivo del hebreo, que el inglés POB también señaló como posible. En español, «el cananeo» refleja mejor esa forma singular colectiva que un plural interpretativo.
- source_word: וַיּוֹאֶל
  english_pob_choice: were determined
  chosen_spanish: se mostró resuelto
  alternatives_spanish:
  - quiso
  - consintió
  - se determinó
  lexicon: HALOT
  rationale: El verbo puede implicar voluntad o resolución. «Se mostró resuelto» comunica esa disposición firme sin forzar una lectura repetitiva de permanencia; además evita perder la tensión registrada en el audit trail entre voluntad y resolución.
- source_word: לָשֶׁבֶת
  english_pob_choice: to dwell
  chosen_spanish: a habitar
  alternatives_spanish:
  - a vivir
  - a morar
  - para habitar
  lexicon: HALOT
  rationale: «Habitar» conserva el registro bíblico y el sentido de residencia estable. La preposición «a» acompaña de modo natural el infinitivo final en español.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en esta tierra misma
  - en este territorio
  lexicon: HALOT
  rationale: «Tierra» refleja היטב el valor territorial-covenantal de אֶרֶץ y suena más bíblico en español que «territorio», sin perder claridad.
theological_decisions:
- issue: Colectivo singular de הַכְּנַעֲנִי
  english_pob_reading: the Canaanites / the Canaanite
  chosen_spanish_reading: el cananeo
  alternative_spanish_readings:
  - los cananeos
  rationale: El hebreo usa un sustantivo singular con valor colectivo. Mantenerlo en singular en español conserva la tensión morfológica documentada por el texto y por la nota inglesa, en lugar de resolverla automáticamente en plural.
  doctrine_reference: Consistencia formal con el texto hebreo; sin implicación doctrinal adicional.
- issue: Matiz de וַיּוֹאֶל
  english_pob_reading: were determined to dwell
  chosen_spanish_reading: se mostró resuelto a habitar
  alternative_spanish_readings:
  - quiso habitar
  - consintió en habitar
  rationale: La forma verbal hebrea puede expresar disposición, voluntad o resolución. La redacción elegida conserva ese margen semántico sin convertirlo en mera continuación de una acción, evitando borrar la ambigüedad señalada en el audit trail.
  doctrine_reference: Respeto a la polisemia verbal del hebreo; no afecta doctrina.
translation_notes:
  revision_awareness: El inglés POB revisó su primera solución de «persisted in dwelling» a «were determined to dwell» para acercarse más a וַיּוֹאֶל, entendiendo el verbo como voluntad/resolución más que como mera permanencia. La versión española sigue esa revisión y evita una idea de repetición continua.
  spanish_consistency_notes:
  - Se mantuvo «Manasés» como forma habitual en español bíblico para el nombre propio.
  - Se eligió «tierra» para אֶרֶץ por coherencia con el vocabulario territorial-covenantal del libro de Josué.
  - Se evitó traducir el colectivo singular del hebreo con un plural por defecto, para preservar la observación auditada en la nota inglesa.
