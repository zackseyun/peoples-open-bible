base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/029.yaml
  text: At the sound of the horseman and the archer[a], every city flees; they go into the thickets and climb up among the rocks. Every city is abandoned[d][c][b], and no man dwells in them.
  footnotes:
  - marker: a
    text: Or 'Because of the sound of the horseman and the archer.' The Hebrew preposition can express either occasion or cause.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every city flees' may also be understood collectively as 'the whole city flees.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'thickets' is uncertain; some take it as 'clouds,' but the context of hiding places favors dense cover.
    reason: lexical_alternative
  - marker: d
    text: Or 'no one dwells in them.' Hebrew literally says 'no man dwells in them.'
    reason: lexical_alternative
