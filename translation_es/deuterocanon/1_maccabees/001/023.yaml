translation:
  language: es
  text: Y tomó la plata y el oro, y los vasos preciosos[a]; y tomó los tesoros ocultos[b] que halló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego literal dice 'lo deseable' o 'lo deseado'; el contexto de botín sagrado permite traducirlo con naturalidad como 'preciosos'.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'tesoros escondidos' o 'depósitos secretos de tesoro'; ἀπόκρυφος admite la idea de oculto o reservado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - arrebató
  lexicon: LSJ
  rationale: Tomó reproduce de manera directa y neutral el aoristo de λαμβάνω. 'Se llevó' o 'arrebató' añaden matiz de movimiento o violencia que el griego aquí no explicita por sí mismo.
- source_word: τὸ ἀργύριον
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata de valor
  lexicon: LSJ
  rationale: Con artículo, el griego apunta a plata concreta como botín o riqueza identificable. 'La plata' conserva esa concreción y la correspondencia más natural en español.
- source_word: τὸ χρυσίον
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el oro fino
  - el metal de oro
  lexicon: LSJ
  rationale: '''El oro'' mantiene el valor concreto y la simetría con ''la plata'' sin añadir interpretación.'
- source_word: τὰ σκεύη τὰ ἐπιθυμητά
  english_pob_choice: the precious vessels
  chosen_spanish: los vasos preciosos
  alternatives_spanish:
  - los vasos deseables
  - los utensilios preciosos
  - los objetos preciosos
  lexicon: LSJ
  rationale: σχεύη en contexto de templo/plunder se entiende bien como 'vasos' o artículos sagrados. Aunque el adjetivo literalmente significa 'deseados/deseables', en español 'preciosos' comunica de forma natural el valor apreciado del conjunto y sigue la revisión inglesa que optó por una formulación más idiomática.
- source_word: τοὺς θησαυροὺς τοὺς ἀποκρύφους
  english_pob_choice: the hidden treasures
  chosen_spanish: los tesoros ocultos
  alternatives_spanish:
  - los tesoros escondidos
  - los tesoros secretos
  - los depósitos ocultos de tesoro
  lexicon: LSJ
  rationale: '''Ocultos'' conserva el sentido básico de ἀπόκρυφος y sugiere tanto tesoros escondidos como reservas no visibles. ''Escondidos'' es posible, pero ''ocultos'' es más sobrio y formal.'
- source_word: οὓς εὗρεν
  english_pob_choice: that he found
  chosen_spanish: que halló
  alternatives_spanish:
  - que encontró
  - que descubrió
  lexicon: LSJ
  rationale: '''Halló'' es una alternativa natural y digna en español bíblico, cercana a ''found''. Mantiene la idea de descubrimiento sin expandirla a ''descubrió''.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y refleja la misma secuencia verbal y nominal del registro inglés auditado. Se conserva la distinción entre plata, oro, vasos/objetos valiosos y tesoros ocultos, sin intensificar indebidamente la violencia del verbo ni borrar la ambigüedad léxica de ἐπιθυμητά y ἀπόκρυφοι.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otro término teológico no pertinente; el pasaje no contiene nombre divino.
  - Se prefiere 'tomó' por neutralidad y fidelidad al aoristo.
  - '''Vasos'' conserva la posibilidad cultual del griego sin forzar ''utensilios'' o ''implementos''.'
  - Las notas mantienen las alternativas léxicas relevantes sin duplicar el sentido principal en el cuerpo del texto.
