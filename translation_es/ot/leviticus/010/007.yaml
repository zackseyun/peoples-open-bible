translation:
  language: es
  text: Y no salgan de la entrada de la tienda de reunión, no sea que mueran, porque el aceite de la unción de Yahvé está sobre ustedes». Y ellos hicieron conforme a la palabra de Moisés.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וּ/מִ/פֶּתַח
  english_pob_choice: And ... from the entrance
  chosen_spanish: Y no saldrán de la entrada
  alternatives_spanish:
  - Y no saldrán del acceso
  - Y no saldrán de la puerta
  lexicon: HALOT
  rationale: El hebreo combina la conjunción con la preposición desde/desde dentro de. En español, la prohibición queda natural y fiel con 'no saldrán de la entrada'; 'puerta' sería más estrecho que פֶּתַח y 'acceso' es menos concreto.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de cita
  lexicon: HALOT
  rationale: Es el nombre cultual fijo del santuario portátil. 'Tienda de reunión' conserva el valor técnico y es comprensible en español; 'tienda del encuentro' sería más interpretativo.
- source_word: לֹא תֵצְאוּ
  english_pob_choice: you shall not go out
  chosen_spanish: no saldrán
  alternatives_spanish:
  - no deben salir
  - no irán afuera
  lexicon: HALOT
  rationale: 'En una instrucción legal, el perfecto negativo se vierte bien como prohibición directa en futuro de mandato: ''no saldrán''. Mantiene la fuerza normativa sin sonar arcaico.'
- source_word: פֶּן תָּמֻתוּ
  english_pob_choice: lest you die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - no sea que mueran
  - para no morir
  lexicon: HALOT
  rationale: פֶּן expresa advertencia de consecuencia. 'Para que no mueran' transmite el propósito preventivo y resulta natural en español; 'no sea que' es también posible, pero menos fluido aquí.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición. 'Porque' es la equivalencia más clara y directa en español contemporáneo.
- source_word: שֶׁמֶן מִשְׁחַת יְהוָה
  english_pob_choice: the anointing oil of Yahweh
  chosen_spanish: el aceite de la unción de Yahvé
  alternatives_spanish:
  - el aceite de consagración de Yahvé
  - el aceite ungente de Yahvé
  lexicon: HALOT
  rationale: La cadena constructa nombra el aceite sagrado asociado con la consagración. 'Aceite de la unción' conserva la relación nominal sin sustituirla por una paráfrasis; 'consagración' explica el sentido pero pierde el eco léxico de משחה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino como ''Yahvé'', no la sustitución litúrgica por ''Señor''.'
- source_word: עֲלֵיכֶם
  english_pob_choice: is on you
  chosen_spanish: está sobre ustedes
  alternatives_spanish:
  - está en ustedes
  - reposa sobre ustedes
  lexicon: HALOT
  rationale: El valor espacial de על con sufijo se expresa con 'está sobre ustedes', que conserva la imagen de algo colocado encima de ellos en señal de consagración.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: And they did
  chosen_spanish: Y ellos hicieron
  alternatives_spanish:
  - Y lo hicieron
  - Así que hicieron
  lexicon: HALOT
  rationale: La forma narrativa consecutiva avanza el relato. 'Y ellos hicieron' sigue de cerca el hebreo y mantiene la conexión con el mandato de Moisés.
- source_word: כִּדְבַר מֹשֶׁה
  english_pob_choice: according to the word of Moses
  chosen_spanish: conforme a la palabra de Moisés
  alternatives_spanish:
  - según la palabra de Moisés
  - como Moisés había dicho
  lexicon: HALOT
  rationale: דבר aquí es lo dicho/mandado por Moisés. 'Conforme a la palabra de Moisés' es formal y transparente, y conserva la resonancia de palabra como mandato.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la pauta del proyecto, se translitera como 'Yahvé' para preservar el nombre propio divino en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español al que remite.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה según la terminología del proyecto.
  - Se eligió 'tienda de reunión' para אֹהֶל מוֹעֵד como término cultual fijo y reconocido.
  - Se conservó la fuerza prohibitiva del hebreo con una construcción natural en español.
  - Se evitó 'Señor' como sustituto del nombre divino para no borrar la distinción textual.
