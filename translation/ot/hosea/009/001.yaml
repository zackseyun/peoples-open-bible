id: HOS.9.1
reference: Hosea 9:1
source:
  edition: WLC
  text: אַל תִּשְׂמַ֨ח יִשְׂרָאֵ֤ל אֶל גִּיל֙ כָּֽ/עַמִּ֔ים כִּ֥י זָנִ֖יתָ מֵ/עַ֣ל אֱלֹהֶ֑י/ךָ אָהַ֣בְתָּ אֶתְנָ֔ן עַ֖ל כָּל גָּרְנ֥וֹת דָּגָֽן־׀־־׃
translation:
  text: Do not rejoice[a], Israel, with exultation like the peoples, for you have played the prostitute away from your God[b]; you have loved a prostitute’s payment on every threshing floor of grain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to exult like the nations.' The Hebrew phrase is compressed and may be rendered in more than one natural English way.
    reason: lexical_alternative
  - marker: b
    text: '''A prostitute’s payment'' refers to the wages or hire associated with prostitution, here used metaphorically for Israel’s idolatrous gain.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּשְׂמַח
  chosen: Do not rejoice
  alternatives:
  - Do not be glad
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. שׂמח commonly denotes rejoicing/gladness; 'rejoice' fits the elevated prophetic tone.
- source_word: אֶל גִּיל כָּעַמִּים
  chosen: with exultation like the peoples
  alternatives:
  - to exult like the nations
  - with joy like the peoples
  lexicon: HALOT
  rationale: 'The phrase is difficult literally (''to exultation like the peoples''). Rendering it adverbially after the prohibition best captures the sense: Israel must not celebrate in the manner of surrounding nations. ''Peoples'' is closer to עמים than ''nations,'' though the latter is a viable contextual alternative.'
- source_word: זָנִיתָ
  chosen: have played the prostitute
  alternatives:
  - have committed prostitution
  - have been unfaithful
  - have whored
  lexicon: HALOT
  rationale: Hosea uses sexual infidelity imagery for covenant unfaithfulness. 'Played the prostitute' preserves the metaphor clearly in contemporary English without flattening it to the abstract 'been unfaithful.'
- source_word: מֵעַל אֱלֹהֶיךָ
  chosen: turning away from your God
  alternatives:
  - from following your God
  - away from your God
  lexicon: HALOT
  rationale: מֵעַל after זנה expresses apostasy away from allegiance to God. 'Turning away from your God' makes the relational/covenantal force explicit while remaining faithful to the Hebrew.
- source_word: אֶתְנָן
  chosen: a prostitute’s payment
  alternatives:
  - wages of prostitution
  - harlot's hire
  lexicon: HALOT
  rationale: אֶתְנָן denotes payment given to a prostitute. 'A prostitute’s payment' is idiomatic and preserves the concrete image; 'harlot's hire' is traditional but archaic.
- source_word: עַל כָּל גָּרְנוֹת דָּגָן
  chosen: on every threshing floor of grain
  alternatives:
  - at every grain threshing floor
  - on all threshing floors
  lexicon: HALOT
  rationale: גֹּרֶן is a threshing floor, often associated in Hosea with fertility-cult activity. Retaining 'grain' reflects דגן explicitly rather than leaving the agricultural object implicit.
