base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/023.yaml
  text: 'Thus says Yahweh of hosts[a], the God of Israel: They will yet say this word in the land of Judah and in its cities, when I restore their fortunes: “May Yahweh bless you, O habitation of righteousness[b], O holy mountain.”'
  footnotes:
  - marker: a
    text: Or “when I bring back their captives” / “when I restore them from captivity.” The Hebrew idiom can refer specifically to return from exile or more broadly to restoration.
    reason: lexical_alternative
  - marker: b
    text: Or “abode of righteousness” or “pasture of righteousness.”
    reason: lexical_alternative
