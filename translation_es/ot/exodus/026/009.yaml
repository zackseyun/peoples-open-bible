revisions:
- from: Y unirás las cinco cortinas separadamente[a], y las seis cortinas separadamente; y doblarás la sexta cortina doble al frente de la tienda.
  to: Y unirás las cinco cortinas por separado, y las seis cortinas por separado; y doblarás la sexta cortina en dos[a] al frente de la tienda.
  rationale: 'Se ajusta el español para mayor naturalidad y claridad sin alterar el sentido fuente: «por separado» por לְבָד y «en dos» para expresar que la sexta cortina debe quedar doblada en doble. También se reubica la nota al pie al segmento correcto, porque la alternativa documentada corresponde a la cláusula de doblar/ubicar la sexta cortina. Aunque la alternativa inglesa es algo literal, se conserva su función de reflejar la opción léxica/espacial del hebreo.'
