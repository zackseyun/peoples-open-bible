translation:
  language: es
  text: Y ahora, tan cierto como que Yahvé vive, que me ha establecido y me ha sentado en el trono de David mi padre, y que me ha hecho una casa[a] como lo prometió, ciertamente Adonías será ejecutado hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha hecho una casa», es decir, una casa en sentido dinástico: un linaje o dinastía real, no solo un edificio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: as Yahweh lives
  chosen_spanish: vive Yahvé
  alternatives_spanish:
  - tan cierto como vive Yahvé
  - por la vida de Yahvé
  lexicon: HALOT
  rationale: Es la fórmula de juramento hebrea estándar. En español, 'vive Yahvé' conserva el valor idiomático y la apelación directa a la realidad viva de Dios, sin sustituir el nombre divino por un título genérico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente lleva el nombre propio del pacto; por la convención del proyecto, se mantiene 'Yahvé' en el texto principal para no enmascarar el tetragrámaton.
- source_word: הֱכִינַנִי
  english_pob_choice: has established me
  chosen_spanish: me ha establecido
  alternatives_spanish:
  - me ha confirmado
  - me ha hecho firme
  lexicon: HALOT
  rationale: כון en Hifil expresa establecer, afirmar o dejar firme. 'Me ha establecido' es natural en español y conserva la idea de colocación/afirmación real.
- source_word: וַיּוֹשִׁיבֵנִי עַל כִּסֵּא
  english_pob_choice: and seated me on the throne
  chosen_spanish: me ha hecho sentar en el trono
  alternatives_spanish:
  - me ha sentado en el trono
  - me ha colocado en el trono
  lexicon: HALOT
  rationale: La causativa de ישׁב se refleja con 'me ha hecho sentar', que conserva el valor factitivo y suena natural en español; 'sentó' sería posible, pero la forma compuesta mantiene la secuencia verbal del juramento.
- source_word: כִּסֵּא דָּוִד אָבִי
  english_pob_choice: the throne of David my father
  chosen_spanish: el trono de David mi padre
  alternatives_spanish:
  - el trono de David, mi padre
  - el trono de David, mi padre
  lexicon: HALOT
  rationale: Se conserva la cadena de posesión hebrea con una construcción española natural y clara.
- source_word: עָשָׂה לִי בַּיִת
  english_pob_choice: has made for me a house
  chosen_spanish: me ha hecho una casa
  alternatives_spanish:
  - me ha establecido una casa
  - me ha hecho una dinastía
  lexicon: HALOT
  rationale: Se mantiene 'casa' para respetar la metáfora/terminología del texto; el sentido dinástico permanece implícito, como en el audit trail inglés.
- source_word: כַּאֲשֶׁר דִּבֵּר
  english_pob_choice: as he promised
  chosen_spanish: como lo prometió
  alternatives_spanish:
  - como dijo
  - tal como habló
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente 'habló', en este contexto de cumplimiento de palabra divina la traducción española más transparente es 'prometió', sin perder la base textual.
- source_word: כִּי
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - porque
  - en verdad
  lexicon: HALOT
  rationale: כִּי introduce aquí la fuerza enfática del anuncio. 'Ciertamente' reproduce esa aseveración con naturalidad en español.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Equivalencia directa y natural.
- source_word: יוּמַת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será ejecutado
  - morirá
  lexicon: HALOT
  rationale: 'El Hophal de מות indica causación pasiva: ''será muerto'' conserva la pasiva sin suavizar la sentencia. Aunque ''será ejecutado'' sería más explícito, ''será muerto'' mantiene la forma semítica y la gravedad jurídica.'
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonijah
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso bíblico hispano común y legible.
theological_decisions:
- issue: Sentido de בַּיִת en contexto real davídico
  english_pob_reading: The Hebrew 'house' likely carries the royal sense of a lasting family line, not merely a physical building.
  chosen_spanish_reading: '''Casa'' mantiene la metáfora y deja implícito el sentido dinástico de linaje real.'
  alternative_spanish_readings:
  - '''dinastía'''
  - '''casa real'''
  rationale: El español 'casa' conserva la textura lexical del hebreo y permite que el lector perciba el eco del pacto davídico. Traducir directamente como 'dinastía' aclararía el sentido, pero iría más allá de la palabra empleada por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fórmula de juramento con el nombre divino
  english_pob_reading: as Yahweh lives
  chosen_spanish_reading: vive Yahvé
  alternative_spanish_readings:
  - tan cierto como vive Yahvé
  - por la vida de Yahvé
  rationale: La fórmula no se suaviza a un mero 'Dios es vivo'; se conserva como juramento solemne dirigido al nombre personal del Dios de Israel.
  doctrine_reference: Terminología POB sobre יְהוָה
- issue: Valor de כִּי al final de la declaración
  english_pob_reading: surely
  chosen_spanish_reading: ciertamente
  alternative_spanish_readings:
  - en verdad
  - sin duda
  rationale: Se preserva el matiz enfático de la cláusula conclusiva, evitando que 'porque' tergiverse la lógica del pasaje en español.
  doctrine_reference: HALOT, uso asseverativo de כִּי
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no se requieren cambios (high_agreement, concordancia plena). Por eso el borrador español sigue de cerca las decisiones auditadas del POB en inglés, manteniendo la tensión de 'casa' y la fórmula juramentaria sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en concordancia con la terminología POB.
  - '''Casa'' se conserva en el texto principal para reproducir el paralelismo textual con el hebreo y permitir la lectura dinástica en nota.'
  - '''Adonías'' sigue la forma castellana usual para el nombre propio.'
  - La pasiva 'será muerto' refleja el valor causativo-pasivo del hebreo, aun cuando en español contemporáneo 'será ejecutado' podría sonar más natural.
