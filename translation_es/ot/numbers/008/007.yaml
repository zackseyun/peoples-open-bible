revisions:
- from: 'Y así harás con ellos para purificarlos: rocía sobre ellos el agua de purificación[a], y hagan pasar una navaja sobre toda su carne, y laven sus vestidos[b], y así quedarán purificados.'
  to: 'Y así harás con ellos para purificarlos: rocía sobre ellos el agua para purificación del pecado[a], y hagan pasar una navaja sobre toda su carne[b], y laven sus ropas, y así se purificarán.'
  rationale: La revisión restaura el matiz de חַטָּאת según la justificación del POB inglés («para purificación del pecado») sin imponer una lectura sacrificial técnica, y corrige la clausula final para reflejar el valor reflexivo/resultativo de וְהִטֶּהָרוּ con «se purificarán». También se mejora la naturalidad de «vestidos» a «ropas».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual del hebreo y la mayoría de las decisiones del POB inglés: instrucción procedimental, aspersión, rasurado, lavado de la ropa y resultado de purificación. Sin embargo, hay dos desviaciones significativas: (1) מֵי חַטָּאת se redujo a «agua de purificación», omitiendo el matiz «del pecado / para purificación del pecado» que el POB inglés preserva explícitamente; (2) וְהִטֶּהָרוּ, con matiz reflexivo, quedó como «quedarán purificados», que desplaza el sentido hacia un resultado pasivo en vez de «se purificarán / se limpiarán ritualmente».'
  spanish_quality_summary: El español es claro y digno, pero conviene ajustar algunos giros para mayor naturalidad y fidelidad. «Rocía sobre ellos» suena menos natural que «rocía sobre ellos» dentro de la cláusula completa, pero es aceptable; el problema principal no es estilístico sino semántico. «Vestidos» es comprensible, aunque «ropas» suena más natural en español general. La frase final mejora con «y así se purificarán», que lee con fluidez y refleja mejor el verbo hebreo.
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto (no aparecen Yahvé, Mesías, etc.). Sí hay que alinear mejor el tratamiento de חַטָּאת con la decisión auditada del POB: no neutralizarlo simplemente como «purificación», sino expresar la relación con el pecado/impureza. También conviene mantener el matiz reflexivo de טהר en la clausula final.'
  issues:
  - severity: high
    issue: «el agua de purificación» omite el componente de חַטָּאת
    rationale: El POB inglés eligió «the water for purification from sin» precisamente para no borrar el literal «water of sin» ni sobreinterpretarlo como sacrificio. El español borró esa relación y quedó demasiado general.
  - severity: medium
    issue: «y así quedarán purificados» debilita el matiz reflexivo de וְהִטֶּהָרוּ
    rationale: Aunque comunica el resultado, la forma hebrea se acerca mejor a «y así se purificarán» o «y se limpiarán ritualmente». La versión actual suena más pasiva que el original y que la decisión inglesa «cleanse themselves».
  - severity: low
    issue: «vestidos» es menos natural que «ropas» en español general
    rationale: No es incorrecto, pero «laven sus ropas» es más idiomático y suficientemente digno para una Biblia eclesial legible.
  revised_spanish_text: 'Y así harás con ellos para purificarlos: rocía sobre ellos el agua para purificación del pecado[a], y hagan pasar una navaja sobre toda su carne[b], y laven sus ropas, y así se purificarán.'
  revised_footnotes:
  - marker: a
    text: O «el agua de purificación»; literalmente, «agua de pecado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hagan pasar una navaja sobre toda su carne», es decir, afeiten todo su cuerpo.
    reason: lexical_alternative
  revision_rationale: La revisión restaura el matiz de חַטָּאת según la justificación del POB inglés («para purificación del pecado») sin imponer una lectura sacrificial técnica, y corrige la clausula final para reflejar el valor reflexivo/resultativo de וְהִטֶּהָרוּ con «se purificarán». También se mejora la naturalidad de «vestidos» a «ropas».
