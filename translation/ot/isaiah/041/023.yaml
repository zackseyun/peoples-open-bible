theological_decisions:
- issue: Rendering אֱלֹהִים in a polemic against idols
  chosen_reading: gods
  alternative_readings:
  - divine beings
  - God
  rationale: The verse mocks idols by challenging them to prove themselves. The plural predicate with second person plural address strongly favors 'gods.' This avoids importing monotheistic singular language into a context where false deities are being exposed.
