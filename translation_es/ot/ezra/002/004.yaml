lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de la casa de
  lexicon: HALOT
  rationale: En un registro genealógico o de listas, בְּנֵי puede señalar pertenencia a un linaje o clan. «Los hijos de» preserva la estructura formal del hebreo y corresponde de manera natural al español bíblico sin introducir una paráfrasis más amplia como «descendientes».
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Sefatías
  alternatives_spanish:
  - Shefatías
  - Sefatya
  lexicon: HALOT
  rationale: Es un nombre propio hebreo transliterado al español con una forma reconocible y usable en lectura eclesial. «Sefatías» mantiene la identidad del nombre sin depender de la ortografía inglesa.
- source_word: שְׁלֹשׁ מֵאוֹת שִׁבְעִים וּשְׁנָיִם
  english_pob_choice: three hundred seventy-two
  chosen_spanish: trescientos setenta y dos
  alternatives_spanish:
  - trescientos y setenta y dos
  lexicon: HALOT
  rationale: El hebreo expresa claramente el número 372; en español, la forma estándar y más fluida es «trescientos setenta y dos». No se añade «y» porque no aporta diferencia semántica.
