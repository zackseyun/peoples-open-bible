translation:
  language: es
  text: 'Y dijo[a]: «Saldré y seré un espíritu de mentira en la boca de todos sus profetas». Y dijo: «Tú lo inducirás[b], y además prevalecerás. Sal y hazlo así».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu de falsedad».
    reason: lexical_alternative
  - marker: b
    text: O «lo engañarás» o «lo persuadirás». El verbo hebreo puede abarcar inducir, persuadir o engañar según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵצֵא
  english_pob_choice: I will go out
  chosen_spanish: saldré
  alternatives_spanish:
  - iré
  - saldré afuera
  lexicon: HALOT
  rationale: El imperfecto de יצא expresa acción futura/intencional. «Saldré» conserva el movimiento de salida de manera natural en español y evita una paráfrasis innecesaria.
- source_word: וְהָיִיתִי
  english_pob_choice: and be
  chosen_spanish: y seré
  alternatives_spanish:
  - y llegaré a ser
  - y me convertiré en
  lexicon: HALOT
  rationale: En contexto, el espíritu asume un papel; «seré» comunica esa función de forma directa y natural, sin añadir una evolución semántica que el hebreo no exige.
- source_word: רוּחַ שֶׁקֶר
  english_pob_choice: a lying spirit
  chosen_spanish: un espíritu de mentira
  alternatives_spanish:
  - un espíritu mentiroso
  - un espíritu de falsedad
  lexicon: HALOT
  rationale: El hebreo expresa una cualidad caracterizadora. «Espíritu de mentira» preserva la relación constructa y evita que «mentiroso» suene demasiado a rasgo personal en español.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en labios de
  lexicon: HALOT
  rationale: La imagen idiomática hebrea se conserva literalmente. «En la boca de» es natural en español bíblico y mantiene la idea de habla transmitida por los profetas.
- source_word: כָּל נְבִיאָיו
  english_pob_choice: all his prophets
  chosen_spanish: todos sus profetas
  alternatives_spanish:
  - todos los profetas de él
  lexicon: HALOT
  rationale: El sentido inclusivo de כָּל con sufijo posesivo se refleja con «todos sus profetas», que es claro y fiel al alcance total del grupo.
- source_word: תְּפַתֶּה
  english_pob_choice: you will entice him
  chosen_spanish: tú lo inducirás
  alternatives_spanish:
  - tú lo engañarás
  - tú lo persuadirás
  - tú lo tentarás
  lexicon: HALOT
  rationale: פתה puede abarcar inducir, persuadir o engañar según el contexto. «Inducirás» conserva la fuerza de mover a otro hacia una acción sin fijar de antemano solo el matiz de engaño o solo el de persuasión.
- source_word: וְגַם תּוּכָל
  english_pob_choice: and you will also prevail
  chosen_spanish: y además prevalecerás
  alternatives_spanish:
  - y también podrás
  - y también tendrás éxito
  lexicon: HALOT
  rationale: יכל expresa capacidad, eficacia o prevalencia. «Prevalecerás» sigue de cerca la revisión inglesa más exacta y mantiene el matiz de logro efectivo en el encargo.
- source_word: צֵא
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Ve
  - Sal fuera
  lexicon: HALOT
  rationale: El imperativo de יצא retoma el verbo anterior y debe conservarse. «Sal» es breve, natural y coherente con «saldré».
- source_word: וַעֲשֵׂה כֵן
  english_pob_choice: and do so
  chosen_spanish: y haz así
  alternatives_spanish:
  - y hazlo así
  - y haz de ese modo
  lexicon: HALOT
  rationale: La fórmula idiomática se mantiene con una expresión breve y formal. «Haz así» reproduce el mandato sin sobreexplicar su alcance.
theological_decisions:
- issue: Permisión divina y agencia engañosa en la escena celestial
  english_pob_reading: The verse is translated straightforwardly as a heavenly dialogue in which the spirit proposes to become 'a lying spirit' and is told it will entice and prevail.
  chosen_spanish_reading: El versículo se traduce de forma directa como un diálogo celestial en el que el espíritu propone ser un espíritu de mentira y recibe la comisión de inducir y prevalecer.
  alternative_spanish_readings:
  - Una versión más interpretativa que suavice el lenguaje como mera permisión
  - Una versión que sustituya la comisión por un lenguaje preventivo o mitigado
  rationale: El hebreo presenta verbos directos y el POB inglés decide no diluir la tensión teológica. La traducción española conserva esa tensión entre soberanía divina, agencia secundaria y engaño sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al usar «prevalecerás» para תוּכָל, en lugar de una equivalencia más genérica como «tendrás éxito». También conserva la tensión teológica documentada en el audit trail, sin suavizar la escena ni convertirla en mera permisividad implícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Espíritu de mentira» se eligió para reflejar la construcción hebrea y evitar una banalización psicológica del término.
  - La fórmula «saldré / sal / haz así» conserva la repetición verbal del hebreo.
  - Se evita «Cristo», «Señor» o terminología eclesiástica no presente en el versículo.
