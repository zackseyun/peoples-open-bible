review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: marchar alrededor de la ciudad, todos los hombres de guerra, una vez, durante seis días, y preserva correctamente el cambio de plural a singular. Sin embargo, la forma verbal inicial «Marcharán» cambia indebidamente el mandato directo de segunda persona a una tercera persona futura, lo que debilita la alineación con וְסַבֹּתֶם (2mp).'
  spanish_quality_summary: El español es claro y legible, pero «Marcharán alrededor» suena menos natural como instrucción directa a Josué y al grupo que «Ustedes marcharán alrededor» o una formulación imperativa. Además, en español bíblico claro conviene evitar la ambigüedad de un futuro de tercera persona cuando el original es segunda plural. El resto del verso fluye bien.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Hombres de guerra» sigue adecuadamente la decisión del POB de preservar el masculino léxico. La nota con alternativas es apropiada.
  issues:
  - severity: medium
    issue: Cambio de persona gramatical en el primer verbo
    rationale: El hebreo וְסַבֹּתֶם es segunda persona plural, pero «Marcharán» se entiende normalmente como tercera persona plural en español. Esto pierde la instrucción directa del original y la distinción posterior con el singular «harás».
  - severity: low
    issue: Ambigüedad estilística del futuro inicial
    rationale: Aunque en algunos contextos bíblicos el futuro puede funcionar como mandato, aquí sin pronombre explícito «Marcharán» puede leerse como simple predicción sobre 'ellos'. Añadir «Ustedes» corrige esto sin afectar fidelidad ni estilo.
  revised_spanish_text: Ustedes marcharán alrededor de la ciudad[a], todos los hombres de guerra, rodeando la ciudad una vez. Así harás durante seis días.
  revised_footnotes:
  - marker: a
    text: O «todos los guerreros» o «todos los combatientes». El hebreo dice literalmente «todos los hombres de guerra».
    reason: lexical_alternative
  revision_rationale: Se corrige el primer verbo para reflejar explícitamente la segunda persona plural del hebreo y preservar con claridad el cambio posterior al singular «harás». El resto del borrador ya era fiel, claro y consistente con las decisiones léxicas documentadas.
