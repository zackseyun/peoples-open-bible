translation:
  language: es
  text: Pero aun así, cuando también vieron el auxilio del cielo que antes les había llegado, todos a una se echaron rostro en tierra, y separaron a los lactantes de los pechos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «separaron a los lactantes de los pechos», es decir, dejaron de amamantarlos al apartarlos del pecho de sus madres.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴν δὲ ἀλλὰ καὶ
  english_pob_choice: Yet nevertheless, when they also
  chosen_spanish: Pero, sin embargo, cuando también
  alternatives_spanish:
  - Y, sin embargo, cuando también
  - No obstante, cuando también
  lexicon: LSJ
  rationale: La serie enfática de conectores pide en español un giro fuerte y no mecánico. «Pero, sin embargo» conserva el contraste y la intensificación retórica, mientras «cuando también» refleja el participio con valor temporal y la adición de καί.
- source_word: τὰς ἔμπροσθεν αὐτῶν γεγενημένας ἀντιλήψεις
  english_pob_choice: the help ... that had come to them before
  chosen_spanish: las ayudas ... que les habían ocurrido antes
  alternatives_spanish:
  - los auxilios previos que habían recibido
  - las anteriores intervenciones de ayuda en su favor
  lexicon: LSJ
  rationale: ἀντιλήψεις puede ser «ayudas», «auxilios» o «socorros»; «ayudas» mantiene la amplitud semántica sin imponer una lectura técnica demasiado específica. El giro con γεγενημένας y ἔμπροσθεν se refleja con «que les habían ocurrido antes», siguiendo la decisión inglesa de mantener la referencia retrospectiva a acciones previas experimentadas.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: provenientes del cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo
  lexicon: LSJ
  rationale: En este contexto judío-griego, la expresión apunta a ayuda celestial/divina. «Provenientes del cielo» conserva la referencia literal sin añadir explícitamente «de Dios», que el griego no dice en la frase.
- source_word: συνιδόντες
  english_pob_choice: when they also saw
  chosen_spanish: cuando también vieron
  alternatives_spanish:
  - al advertir también
  - reconociendo también
  lexicon: LSJ
  rationale: El participio de percepción se traduce naturalmente como una subordinada temporal en español. «Vieron» mantiene la percepción concreta, y «también» conserva el valor aditivo de καί.
- source_word: πρηνεῖς
  english_pob_choice: face-first
  chosen_spanish: rostro en tierra
  alternatives_spanish:
  - boca abajo
  - pronos
  lexicon: LSJ
  rationale: «Rostro en tierra» es una expresión bíblica y clara en español para la postura de postración. Evita el calco abrupto de «face-first» y mantiene la imagen física de caer postrados.
- source_word: ὁμοθυμαδόν
  english_pob_choice: all together
  chosen_spanish: todos a una
  alternatives_spanish:
  - unánimemente
  - con un mismo ánimo
  lexicon: LSJ
  rationale: La idea es acción unida y simultánea. «Todos a una» es idiomático en español y transmite mejor la unanimidad colectiva que una fórmula más técnica o arcaica.
- source_word: ῥίψαντες ἑαυτούς
  english_pob_choice: threw themselves down
  chosen_spanish: se echaron
  alternatives_spanish:
  - se arrojaron
  - se dejaron caer
  lexicon: LSJ
  rationale: El griego expresa un gesto enérgico de lanzarse al suelo. «Se echaron» con el complemento «rostro en tierra» comunica la acción sin perder naturalidad; «se arrojaron» sería más duro, pero menos fluido en español de lectura pública.
- source_word: τὰ νήπια
  english_pob_choice: the infants
  chosen_spanish: los lactantes
  alternatives_spanish:
  - los niños pequeños
  - los bebés
  lexicon: LSJ
  rationale: Dado el contexto inmediato de amamantamiento, «lactantes» precisa mejor la edad y la relación con la lactancia. Conserva la fuerza de νήπια sin diluirla en una expresión más general.
- source_word: χωρίσαντες τῶν μαστῶν
  english_pob_choice: separated the infants from the breasts
  chosen_spanish: separaron ... de los pechos
  alternatives_spanish:
  - apartaron ... de los pechos
  - separaron ... del pecho materno
  lexicon: LSJ
  rationale: La frase griega dice literalmente «separando de los pechos». En español se mantiene esa literalidad sin añadir «maternos», porque el griego no lo expresa de forma explícita en este versículo. «Los pechos» conserva el referente de lactancia.
theological_decisions:
- issue: Si la ayuda celestial debe hacerse explícitamente divina o mantenerse como idiomática referencia al cielo
  english_pob_reading: from heaven
  chosen_spanish_reading: provenientes del cielo
  alternative_spanish_readings:
  - de Dios
  - desde el cielo
  rationale: El griego solo dice «desde el cielo». Aunque el sentido implica intervención divina, la traducción debe conservar la formulación del texto fuente sin insertar un sujeto teológico no expresado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en dos puntos: mantiene la referencia retrospectiva de las ayudas como experiencias previas recibidas, y evita añadir «madres» o intensificar el verbo más allá de «separar» en la cláusula final. También conserva el giro enfático inicial con una solución natural en español.'
  spanish_consistency_notes:
  - Se mantiene «cielo» para ἐξ οὐρανοῦ, evitando sustituirlo por una paráfrasis teológica más explícita.
  - Se evita «Cristo», «SEÑOR» o formulaciones doctrinales no presentes en el griego.
  - La imagen de postración se expresa con un giro bíblico natural en español («rostro en tierra») para preservar el valor físico de πρηνεῖς.
  - El sustantivo «lactantes» se eligió por la cercanía inmediata con μαστοῖς/pechos; se explica en nota la referencia al amamantamiento.
