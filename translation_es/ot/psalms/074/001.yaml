translation:
  language: es
  text: Un Maskil[a] de Asaf. ¿Por qué, oh Dios, nos has rechazado para siempre? ¿Por qué humea tu ira contra las ovejas de tu pasto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Maskil” es un encabezado técnico de salmo; puede indicar una composición contemplativa o instructiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo contemplativo
  - Una composición instructiva
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado porque el encabezado tiene fuerza de etiqueta literaria y su sentido preciso es incierto. Así se evita sobreinterpretar el género en el texto principal.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: En el superscrito, la preposición puede indicar autoría, asociación o dedicación. 'De Asaf' es la opción española más natural y mantiene esa ambigüedad.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Con qué motivo?
  lexicon: HALOT
  rationale: La interrogativa directa conserva el tono de lamento y funciona de manera natural en español.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El contexto es de خطاب directo a Dios; en español, 'oh Dios' refleja mejor el vocativo que una simple nominación.
- source_word: זָנַחְתָּ
  english_pob_choice: have you rejected us
  chosen_spanish: nos has rechazado
  alternatives_spanish:
  - nos has desechado
  - nos has echado fuera
  lexicon: HALOT
  rationale: '''Rechazar'' comunica bien la fuerza de abandono o expulsión propia del verbo en un lamento pactual, sin caer en arcaísmo.'
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - de continuo
  lexicon: HALOT
  rationale: '''Para siempre'' reproduce con claridad el valor de duración continua o aparentemente interminable.'
- source_word: יֶעְשַׁן
  english_pob_choice: does ... smoke
  chosen_spanish: humea
  alternatives_spanish:
  - echa humo
  - se alza como humo
  lexicon: HALOT
  rationale: El verbo conserva la imagen de humo asociada a la ira; 'humea' suena natural en español y mantiene la metáfora sin explicarla.
- source_word: אַפְּךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu furor
  lexicon: HALOT
  rationale: Aunque literalmente es 'tu nariz/rostro', el modismo hebreo significa ira. 'Ira' preserva la carga emocional y el paralelismo poético.
- source_word: בְּצֹאן
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del rebaño
  lexicon: HALOT
  rationale: Se mantiene la metáfora pastoral concreta. En plural, 'ovejas' sigue de cerca el hebreo y encaja con el sujeto colectivo implícito.
- source_word: מַרְעִיתֶךָ
  english_pob_choice: your pasture
  chosen_spanish: de tu prado
  alternatives_spanish:
  - de tu pastura
  - de tu pastizal
  lexicon: HALOT
  rationale: '''Prado'' comunica bien el lugar de pasto en español bíblico contemporáneo y permite la construcción ''las ovejas de tu prado''. ''Pastura'' o ''pastizal'' serían posibles, pero menos fluidas aquí.'
theological_decisions:
- issue: El hebreo y el contexto requieren un objeto plural de primera persona en el verbo, aunque no aparezca explícito como palabra independiente en la línea morfológica.
  english_pob_reading: have you rejected us
  chosen_spanish_reading: nos has rechazado
  alternative_spanish_readings:
  - has rechazado a tu pueblo
  - nos has desechado
  rationale: La lamentación es comunitaria; traducir con 'nos' hace explícito el objeto implícito en la forma verbal y coincide con la lectura estándar del versículo en contexto.
  doctrine_reference: Principio de primacía del texto original y coherencia sintáctica en traducción bíblica.
translation_notes:
  revision_awareness: Se siguió la lectura estable del texto hebreo y del audit trail inglés; no se introdujeron revisiones textuales ni cambios de sentido respecto de la línea base. La principal decisión de español fue conservar el tecnicismo 'Maskil' en el encabezado y expresar el vocativo con 'oh Dios' para naturalidad reverente.
  spanish_consistency_notes:
  - Se mantuvo el tono de lamentación comunitaria con segunda persona directa a Dios.
  - Se preservó la imagen pastoral 'ovejas de tu prado' sin convertirla en una paráfrasis abstracta.
  - Se evitó 'SEÑOR' para יהוה porque este versículo no contiene el tetragrámaton.
  - '''Ira'' se eligió para אַפְּךָ por equivalencia idiomática, sin perder la imagen de humo del verbo siguiente.'
