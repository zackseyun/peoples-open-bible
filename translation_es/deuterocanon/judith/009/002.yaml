translation:
  language: es
  text: 'Y dijo[a]: «Oh Señor, Dios de mi padre Simeón, a quien diste una espada en su mano para venganza contra extranjeros, que soltaron el vientre de una virgen para contaminación y descubrieron su muslo para vergüenza y profanaron su vientre para oprobio; aunque dijiste: “No será así”[c][b], ellos lo hicieron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «que violaron el vientre de una virgen». El griego usa un eufemismo, pero el sentido de violencia sexual es claro por el conjunto de la frase.'
    reason: lexical_alternative
  - marker: b
    text: «Descubrieron el muslo» es un giro de vergüenza sexual; compárese con usos bíblicos afines de descubrir la desnudez o del muslo como imagen de humillación y violación.
    reason: cultural_note
  - marker: c
    text: La oración alude al episodio de Simeón y Dina en Génesis 34, interpretando la violencia de Simeón como venganza por el ultraje cometido.
    reason: cross_reference
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Señor
  - Oh Señor
  lexicon: LSJ
  rationale: En este contexto de oración directa, el vocativo requiere una apelación reverente. Se usa «Yahvé» según la convención del proyecto para Κύριος cuando remite al nombre divino, y el «Oh» conserva la fuerza vocativa natural del griego y del auditorio español.
- source_word: ὁ θεὸς τοῦ πατρὸς μου Συμεών
  english_pob_choice: God of my father Simeon
  chosen_spanish: Dios de mi padre Simeón
  alternatives_spanish:
  - Dios de Simeón, mi padre
  - Dios de mi padre, Simeón
  lexicon: LSJ
  rationale: Se mantiene la relación familiar y el nombre propio sin desplazar el orden natural del español. «Padre» aquí conserva el valor de ascendencia/linaje del griego.
- source_word: ᾧ ἔδωκας ἐν χειρὶ ῥομφαίαν
  english_pob_choice: to whom you gave a sword in his hand
  chosen_spanish: a quien diste una espada en su mano
  alternatives_spanish:
  - en cuya mano diste una espada
  - a quien entregaste una espada
  lexicon: LSJ
  rationale: Se preserva la imagen concreta de «en su mano» sin suavizarla a una formulación más abstracta. «Espada» traduce ῥομφαία con el término español común y digno.
- source_word: εἰς ἐκδίκησιν ἀλλογενῶν
  english_pob_choice: for vengeance against foreigners
  chosen_spanish: para venganza contra extranjeros
  alternatives_spanish:
  - para vengarse de extranjeros
  - para justicia retributiva contra extranjeros
  lexicon: LSJ
  rationale: «Venganza» conserva ἐκδίκησις como retribución/represalia, y «contra extranjeros» sigue la opción del audit trail frente a «gentiles», que puede sonar más técnico o confesar una capa posterior. «Extranjeros» refleja el valor básico de ἀλλογενῶν.
- source_word: οἳ ἔλυσαν μήτραν παρθένου
  english_pob_choice: who loosened the virgin’s womb
  chosen_spanish: que soltaron el vientre de una virgen
  alternatives_spanish:
  - que violaron el vientre de una virgen
  - que abrieron el vientre de una virgen
  lexicon: LSJ
  rationale: Se conserva el giro eufemístico y violento del griego sin convertirlo de inmediato en un solo resumen interpretativo. «Vientre» comunica μήτρα de modo natural en español y permite mantener la carga corporal y sexual del pasaje.
- source_word: εἰς μίασμα
  english_pob_choice: for defilement
  chosen_spanish: para mancha
  alternatives_spanish:
  - para impureza
  - para contaminación
  lexicon: LSJ
  rationale: «Mancha» es breve y comprensible en español bíblico moderno, y puede abarcar la suciedad ritual/moral de μίασμα. Se evita sobrecargar con tecnicismo donde el contexto ya deja clara la dimensión de profanación.
- source_word: ἐγύμνωσαν μηρὸν
  english_pob_choice: bared her thigh
  chosen_spanish: descubrieron su muslo
  alternatives_spanish:
  - desnudaron su muslo
  - alzaron su muslo
  lexicon: LSJ
  rationale: «Descubrir» reproduce mejor el eufemismo sexual y de vergüenza que un desnudar más crudo, y mantiene el paralelismo con el griego. «Muslo» traduce μηρός con un término claro y estable.
- source_word: εἰς αἰσχύνην
  english_pob_choice: for shame
  chosen_spanish: para vergüenza
  alternatives_spanish:
  - para deshonra
  - para oprobio
  lexicon: LSJ
  rationale: «Vergüenza» es la equivalencia más directa y natural en español. Conserva el valor de humillación pública sin introducir una abstracción más fuerte de la necesaria.
- source_word: ἐβεβήλωσαν μήτραν
  english_pob_choice: profaned the womb
  chosen_spanish: profanaron el vientre
  alternatives_spanish:
  - contaminaron el vientre
  - deshonraron el vientre
  lexicon: LSJ
  rationale: «Profanaron» retiene el peso de βεβηλόω y sugiere trato sacrílego o impuro, mientras «vientre» mantiene la misma imagen corporal usada antes para μήτρα. Se evita «útero» por sonar demasiado técnico en español de lectura pública.
- source_word: εἰς ὄνειδος
  english_pob_choice: for disgrace
  chosen_spanish: para oprobio
  alternatives_spanish:
  - para reproche
  - para afrenta
  lexicon: LSJ
  rationale: «Oprobio» preserva la idea de vergüenza/reproche público y encaja bien con el tono solemne del pasaje. Mantiene una elevación verbal acorde con un texto litúrgico-bíblico.
- source_word: εἶπας γὰρ Οὐχ οὕτως ἔσται
  english_pob_choice: though you said, ‘It shall not be so’
  chosen_spanish: 'porque dijiste: “No será así”'
  alternatives_spanish:
  - 'pues dijiste: “No será así”'
  - 'porque dijiste: “Así no será”'
  lexicon: LSJ
  rationale: «No será así» reproduce con claridad la declaración divina del griego y del audit trail inglés. Se usa «porque» para introducir la cita dentro de la oración en español, sin perder el contraste con lo que siguió.
- source_word: καὶ ἐποίησαν
  english_pob_choice: yet they did it
  chosen_spanish: y lo hicieron
  alternatives_spanish:
  - pero lo hicieron
  - y así lo hicieron
  lexicon: LSJ
  rationale: Se mantiene el verbo explícito con el complemento implícito recuperable del contexto. El contraste adversativo queda apoyado por la enumeración previa y por la cita divina anterior.
theological_decisions:
- issue: Cómo traducir el nombre divino Κύριε en una oración dirigida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Oh Señor
  rationale: El proyecto establece «Yahvé» para יהוה / YHWH y pide no ocultar el nombre divino con una convención de máscara. Aunque el griego dice Κύριε, aquí funciona como invocación a Dios en un contexto que remite al nombre divino; por eso se conserva «Yahvé» con vocativo explícito.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Cómo reflejar la violencia sexual de la secuencia μήτραν παρθένου / μηρὸν / μήτραν sin reducirla a una sola paráfrasis
  english_pob_reading: Retain the Greek's euphemistic but forceful imagery rather than replacing it with a single interpretive term like 'raped.'
  chosen_spanish_reading: 'Conservar la secuencia eufemística y contundente: «soltaron el vientre de una virgen», «descubrieron su muslo» y «profanaron el vientre»'
  alternative_spanish_readings:
  - «violaron a la virgen»
  - «deshonraron su cuerpo»
  - «la ultrajaron»
  rationale: El griego acumula varias expresiones con matices distintos de violencia, vergüenza y profanación. Un solo verbo interpretativo borraría esa tensión; por eso se mantiene el relieve corporal y ritual de cada imagen, de modo inteligible para el español.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo entender ἀλλογενῶν en este contexto judío deuterocanónico
  english_pob_reading: foreigners
  chosen_spanish_reading: extranjeros
  alternative_spanish_readings:
  - gentiles
  - forasteros
  rationale: «Extranjeros» sigue la lectura amplia y evita imponer un tecnicismo confesional. En este pasaje el término marca a quienes son de fuera del pueblo, y el español puede conservar esa fuerza sin volverlo una etiqueta eclesial posterior.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la versión inglesa revisada del audit trail: conserva el vocativo, mantiene la secuencia triple de violencia/vergüenza/profanación, y evita resolver el eufemismo en una sola paráfrasis. Se prefirió una solución española que preserve el relieve del griego y sea publicable en registro bíblico contemporáneo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el vocativo divino según la terminología del proyecto, aun cuando el griego lee Κύριε, porque aquí la oración se dirige al Dios de Israel.
  - Se eligió «vientre» para μήτρα a fin de mantener consistencia interna entre las dos ocurrencias y conservar el lenguaje corporal del pasaje.
  - «Extranjeros» se mantiene estable para ἀλλογενῶν, en línea con el audit trail inglés.
  - El orden de los tres miembros («vientre», «muslo», «vientre») reproduce la progresión del griego y evita aplanar la retórica.
  - Los marcadores de nota se colocaron solo donde el texto principal puede beneficiarse de una alternativa o una nota cultural, sin duplicar explicaciones dentro de la línea principal.
