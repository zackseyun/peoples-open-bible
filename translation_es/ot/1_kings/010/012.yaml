base_translation:
  language: en
  yaml_path: translation/ot/1_kings/010/012.yaml
  text: The king made the almug wood into supports for the house of Yahweh and for the king’s house[a], and lyres and harps for the singers. Never before had such almug wood come[b], nor has any been seen to this day.
  footnotes:
