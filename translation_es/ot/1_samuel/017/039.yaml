base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/039.yaml
  text: And David strapped his sword over his armor and tried to go[a], for he had not tested them. But David said to Saul, “I cannot go with these[b], for I have not tested them.” So David removed them from himself.
  footnotes:
  - marker: a
    text: Or “for he had not tried them”; the Hebrew verb can denote testing by use or experience.
    reason: lexical_alternative
  - marker: b
    text: “Armor” renders a term that can more broadly mean garments or attire, but here the military context favors armor.
    reason: lexical_alternative
