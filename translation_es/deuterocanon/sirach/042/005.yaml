translation:
  language: es
  text: acerca de ganado[a], si es mucho o poco, y acerca del precio de mercancías en venta;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego difiere de manera notable: habla de tratos comerciales y de comerciantes. Se sigue como texto principal el testimonio hebreo, usando el griego solo como control del sentido comercial general.'
    reason: textual_variant
lexical_decisions:
- source_word: על
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: La preposición introduce los temas de los que se habla; «acerca de» conserva el valor tópico sin forzar un calco rígido.
- source_word: מקנה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - ganado menor y mayor
  - bienes
  - rebaños
  lexicon: HALOT
  rationale: En este contexto comercial y cuantitativo, el sentido más natural y amplio en español es «ganado»; mantiene la referencia a animales poseídos sin restringirla innecesariamente.
- source_word: בין רב למעט
  english_pob_choice: whether much or little
  chosen_spanish: si es mucho o poco
  alternatives_spanish:
  - ya sea mucho o poco
  - sea mucho o poco
  - entre mucho y poco
  lexicon: HALOT
  rationale: La expresión idiomática contrasta cantidad o escala. «Si es mucho o poco» expresa bien la distribución en español actual y evita una estructura menos natural.
- source_word: ממחיר
  english_pob_choice: the price of
  chosen_spanish: el precio de
  alternatives_spanish:
  - el valor de
  - la tasación de
  lexicon: HALOT
  rationale: La construcción hebrea apunta al costo o valoración comercial; «el precio de» transmite con claridad esa relación.
- source_word: ממכר
  english_pob_choice: sale
  chosen_spanish: mercancía en venta
  alternatives_spanish:
  - lo vendido
  - venta
  - mercadería
  lexicon: HALOT
  rationale: El sustantivo remite a lo que se vende o al acto de vender. En español, «mercancía en venta» preserva el campo comercial y suena natural.
- source_word: תגר
  english_pob_choice: merchant’s
  chosen_spanish: mercancía en venta
  alternatives_spanish:
  - mercader
  - comerciante
  - tráfico
  lexicon: HALOT
  rationale: El hebreo designa al comerciante; sin embargo, en esta frase la serie nominal funciona de modo compacto y el español fluye mejor entendiendo la última parte como parte del sintagma comercial global, no como posesivo explícito. La traducción mantiene la referencia mercantil sin añadir una forma posesiva artificial.
- source_word: περὶ ἀδιαφόρου πράσεως καὶ ἐμπόρων
  english_pob_choice: about ... the price of merchandise for sale
  chosen_spanish: acerca de ... mercancía en venta
  alternatives_spanish:
  - acerca de tratos comerciales y comerciantes
  - acerca de compraventa indiferente y comerciantes
  lexicon: LSJ
  rationale: El paralelo griego sugiere un ámbito comercial amplio y confirma el sentido general de transacciones/mercaderes, aunque no coincide plenamente con el hebreo. La versión española conserva el tema comercial sin sobrecargar el verso con una reconstrucción del griego.
translation_notes:
  revision_awareness: Se tomó como base el testimonio hebreo de Kahana, con el paralelo griego como control de coherencia semántica. La redacción evita un calco del inglés y también evita una posesión artificiosa para תגר, manteniendo el foco en el campo comercial del versículo. Se incorporó una nota textual por la divergencia entre el hebreo y el griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo un registro sobrio y bíblico, con sintaxis clara para lectura pública.
  - Se prefirió «ganado» por ser el equivalente español más natural para מקנה en este contexto cuantitativo.
  - La nota [a] corresponde a la variante textual hebreo/griega y debe conservarse junto al tramo inicial del verso.
