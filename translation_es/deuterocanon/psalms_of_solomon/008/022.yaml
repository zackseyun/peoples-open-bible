translation:
  language: es
  text: Porque Dios lo condujo con seguridad a través de su extravío.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su error» o «en su engaño».'
    reason: lexical_alternative
  - marker: b
