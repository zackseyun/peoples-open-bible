revisions:
- from: Pero yo te planté como vid escogida[a], toda ella simiente verdadera[b]. ¿Cómo, pues, te has vuelto para mí en sarmientos degenerados[c] de una vid extraña?
  to: Pero yo te planté como vid escogida[a], toda ella de semilla genuina[b]. ¿Cómo, pues, te has convertido para mí en sarmientos degenerados[c] de una vid extranjera?
  rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad y precisión del español: «de semilla genuina» comunica mejor la autenticidad del plantío que «simiente verdadera»; «te has convertido para mí en» expresa con más claridad el cambio de estado de נֶהְפַּכְתְּ לִי; y «vid extranjera» evita la posible ambigüedad de «vid extraña» manteniendo el sentido de alteridad.'
