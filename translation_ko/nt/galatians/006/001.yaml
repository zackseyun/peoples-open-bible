id: GAL.6.1
reference: Galatians 6:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀδελφοί, ἐὰν καὶ προλημφθῇ ἄνθρωπος ἔν τινι παραπτώματι, ὑμεῖς οἱ πνευματικοὶ καταρτίζετε τὸν τοιοῦτον ἐν πνεύματι πραΰτητος, σκοπῶν σεαυτόν, μὴ καὶ σὺ πειρασθῇς.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/006/001.yaml
  text: Brothers[a], even if a man is caught in some trespass, you who are spiritual should restore such a one in a spirit of gentleness, watching yourself[c][b], lest you also be tempted.
  footnotes:
  - marker: a
    text: '''Brothers'' translates a masculine plural form that can address a mixed group of fellow believers; compare ''brothers and sisters.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''is overtaken'' or ''is caught by surprise'' in some trespass.'
    reason: alternative_reading
  - marker: c
    text: '''A man'' renders a singular generic term for a human being; alternatively, ''someone'' or ''a person.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 어떤 사람이 어떤 잘못에 사로잡혔다 할지라도, 영적인 여러분은 그를 온유한 영으로 바로잡아 주십시오. 그리고 여러분 자신도 살피십시오. 여러분도 시험을 받지 않도록 말입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προλημφθῇ
  english_pob_choice: is caught
  chosen_korean: 사로잡히다
  alternatives_korean:
