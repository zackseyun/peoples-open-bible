translation:
  language: es
  text: Hombres[a], ¿no prevalece el vino, ya que obliga a uno a obrar así? Y guardó silencio después de hablar de esta manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Varones»; el vocativo griego ἄνδρες puede traducirse de forma más literal o más natural según el registro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Varones
  - Hombres, ustedes
  lexicon: LSJ
  rationale: Es un vocativo plural directo. «Hombres» conserva el valor masculino explícito del griego y su tono de llamado directo, sin introducir un matiz más interpretativo como «varones» o un añadido explicativo.
- source_word: οὐχ ὑπερισχύει
  english_pob_choice: does not ... prevail
  chosen_spanish: ¿no prevalece?
  alternatives_spanish:
  - ¿no es más fuerte?
  - ¿no domina?
  - ¿no se impone?
  lexicon: LSJ
  rationale: ὑπερισχύω puede expresar ser más fuerte o prevalecer sobre otro. «Prevalece» mantiene la fuerza comparativa y encaja bien en una pregunta retórica en español.
- source_word: ὁ οἶνος
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: LSJ
  rationale: Equivalente léxico directo y natural en español.
- source_word: ὅτι οὕτως ἀναγκάζει ποιεῖν
  english_pob_choice: since it compels one to act thus
  chosen_spanish: ya que obliga a uno a obrar así
  alternatives_spanish:
  - porque fuerza a uno a hacer así
  - puesto que constriñe a uno a actuar de ese modo
  - ya que hace que uno obre así
  lexicon: LSJ
  rationale: ἀναγκάζει expresa compulsión o fuerza; «obliga» transmite bien esa coerción. Se conserva el sentido genérico de ποιεῖν con «obrar», y «así» refleja οὕτως de manera sobria y fiel.
- source_word: καὶ ἐσίγησεν
  english_pob_choice: And he fell silent
  chosen_spanish: Y calló
  alternatives_spanish:
  - Y quedó en silencio
  - Y enmudeció
  - Y se silenció
  lexicon: LSJ
  rationale: El aoristo de σιγάω marca el cierre de la intervención. «Calló» es natural en español y preserva la transición narrativa sin sobreexplicar.
- source_word: οὕτως εἴπας
  english_pob_choice: after speaking in this way
  chosen_spanish: así, después de hablar de esta manera
  alternatives_spanish:
  - habiendo dicho esto
  - después de decir estas cosas
  - después de hablar así
  lexicon: LSJ
  rationale: La construcción participial indica modo y secuencia respecto del discurso previo. La formulación conserva esa relación sin alejarse del griego.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de Swete LXX 1909 y el auditoría inglesa, pero ajusta el orden y la idiomaticidad para que la pregunta retórica suene natural en español. Se conservó la secuencia final de silencio como cierre narrativo.
  spanish_consistency_notes:
  - Se mantuvo «vino» para οἶνος, en coherencia con el sentido literal del pasaje.
  - Se prefirió «obliga» para ἀναγκάζει por su fuerza coercitiva, alineada con la lectura inglesa auditada.
  - Se usó «calló» como equivalente narrativo breve de ἐσίγησεν, sin añadir matices inexistentes en el griego.
