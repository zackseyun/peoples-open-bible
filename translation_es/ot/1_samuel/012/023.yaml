translation:
  language: es
  text: En cuanto a mí, lejos esté de mí[a] pecar contra Yahvé[c] al dejar de orar por ustedes; y los instruiré[b] en el camino bueno y recto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por dejar de orar por ustedes». El hebreo presenta el pecado como cesar la intercesión en favor de ustedes.
    reason: lexical_alternative
  - marker: b
    text: O «enseñarles». El verbo hebreo puede abarcar tanto instruir como guiar.
    reason: lexical_alternative
  - marker: c
    text: «Yahvé» corresponde al nombre divino YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם אָנֹכִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Y yo también
  - Por mi parte
  lexicon: HALOT
  rationale: La expresión hebrea marca énfasis y contraste personal. «En cuanto a mí» transmite esa focalización de manera natural en español, mejor que un simple «yo también».
- source_word: חָלִילָה לִּי
  english_pob_choice: far be it from me
  chosen_spanish: ¡lejos esté de mí!
  alternatives_spanish:
  - ¡Dios me libre!
  - ¡Nunca haré tal cosa!
  lexicon: HALOT
  rationale: El modismo expresa repudio fuerte ante una acción impensable. «Lejos esté de mí» preserva bien la fuerza idiomática sin volverse pesado o arcaico.
- source_word: מֵחֲטֹא לַיהוָה
  english_pob_choice: that I should sin against the LORD
  chosen_spanish: pecar contra Yahvé
  alternatives_spanish:
  - pecar contra el Señor
  - cometer pecado contra Yahvé
  lexicon: HALOT
  rationale: El hebreo formula la acción repudiada como pecado directo contra YHWH. «Pecar contra Yahvé» conserva ese peso teológico y sigue el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene la transliteración doctrinal del nombre del pacto como «Yahvé», no una sustitución por título.
- source_word: מֵחֲדֹל לְהִתְפַּלֵּל בַּעַדְכֶם
  english_pob_choice: by ceasing to pray for you
  chosen_spanish: dejando de orar por ustedes
  alternatives_spanish:
  - cesando de orar por ustedes
  - dejando de interceder por ustedes
  lexicon: HALOT
  rationale: 'El infinitivo con מן señala el medio o la manera en que se concreta el pecado: cesar la oración/intercesión por ellos. «Dejando de orar por ustedes» es claro y natural; «interceder» se conserva como alternativa válida, pero «orar» cubre bien el sentido aquí.'
- source_word: וְהוֹרֵיתִי אֶתְכֶם
  english_pob_choice: and I will instruct you
  chosen_spanish: Y los instruiré
  alternatives_spanish:
  - Y los enseñaré
  - Y los dirigiré
  lexicon: HALOT
  rationale: El verbo puede abarcar enseñar y guiar. «Instruir» preserva ambos matices mejor que un solo «enseñar», y suena más formal que «dirigir» en este contexto.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la vía
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de ‘camino’ para conducta o modo de vida. «Camino» es la equivalencia más transparente y bíblicamente reconocible en español.
- source_word: הַטּוֹבָה
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - buena
  - beneficiosa
  lexicon: HALOT
  rationale: Concuerda con «camino» en español y conserva el valor moral general del término sin cargarlo de interpretación.
- source_word: וְהַיְשָׁרָה
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - recta
  - uprieta
  lexicon: HALOT
  rationale: El término apunta a rectitud ética y ‘enderezamiento’ moral. «Recto» funciona bien en la expresión fija «camino recto» y conserva la idea de integridad.
theological_decisions:
- issue: Cómo expresar el nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton directamente; el proyecto pide conservarlo como nombre propio. «Yahvé» es la forma española establecida en este registro y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Si la acción de Samuel se presenta como simple deber omitido o como pecado delante de Dios
  english_pob_reading: Explicitly as sin against the LORD
  chosen_spanish_reading: pecar contra Yahvé
  alternative_spanish_readings:
  - dejar de orar por ustedes como una omisión de deber
  rationale: 'El hebreo no suaviza la afirmación: cesar la intercesión es presentado como pecado contra Yahvé. La redacción española conserva esa carga teológica sin diluirla en mera negligencia administrativa.'
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso del auditorial inglés: mantiene el énfasis de גַּם אָנֹכִי, conserva el modismo de repudio חָלִילָה לִּי, explicita que el cese de la oración es el acto considerado pecado contra Yahvé, y refleja el matiz doble de וְהוֹרֵיתִי como instrucción/guía. No se introdujeron revisiones posteriores ni cambios respecto del pasaje auditado; solo se adaptó la formulación al español de manera natural y consistente con la terminología del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «orar» para לְהִתְפַּלֵּל y no se sustituye por «interceder» en el texto principal, aunque se reconoce esa alternativa en nota.
  - «Camino bueno y recto» conserva la metáfora del hebreo y la coordinación adjetival.
  - La puntuación reproduce el contraste enfático y la secuencia causal del original sin añadir elementos interpretativos.
