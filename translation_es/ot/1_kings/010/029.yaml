    text: 'Hebreo: ''por seiscientos plata''; se suple ''siclos'' por claridad idiomática como unidad monetaria.'
    reason: lexical_alternative
  - marker: b
    text: O 'fue traído de Egipto ... los sacaban'. El hebreo usa verbos de movimiento que, en este contexto comercial, se refieren a importación y exportación.
    reason: lexical_alternative
  - marker: c
    text: Es decir, los reyes de los arameos; tradicionalmente, 'Siria'.
    reason: alternative_reading
  - marker: d
    text: 'Hebreo: ''por su mano'', esto es, por medio de ellos o mediante sus agentes.'
    reason: lexical_alternative
  revision_rationale: Se ajustó el verbo principal para reflejar la decisión lexical auditada del POB ('importado') en vez de la mera salida geográfica; se aclaró el precio con 'siclos de plata' siguiendo la racionalidad documentada de suplir la unidad monetaria por claridad; y se mantuvieron Aram y la nota de agencia idiomática.
