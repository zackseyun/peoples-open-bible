translation:
  language: es
  text: 'Entonces el rey Roboam consultó a los ancianos que habían estado ante Salomón, su padre,[a] mientras Salomón aún vivía, diciendo: «¿Cómo me aconsejan responder a este pueblo[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que habían estado de pie ante Salomón». El giro expresa servicio o asistencia en la corte; no se trata solo de una postura física.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¿Cómo aconsejan responder a este pueblo una palabra?». La expresión significa darles una respuesta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  english_pob_choice: consulted
  chosen_spanish: consultó
  alternatives_spanish:
  - tomó consejo con
  - conferenció con
  lexicon: HALOT
  rationale: El nifal de יעץ expresa buscar consejo de otros. «Consultó» es natural en español actual y conserva la idea de pedir consejo, no solo deliberar internamente.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  english_pob_choice: King Rehoboam
  chosen_spanish: el rey Roboam
  alternatives_spanish:
  - Roboam, el rey
  lexicon: HALOT
  rationale: En español resulta más natural anteponer el título real al nombre. Se mantiene el artículo definido por el hebreo.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los ancianos consejeros
  lexicon: HALOT
  rationale: En este contexto de corte, זקנים no significa simplemente personas de edad avanzada, sino consejeros veteranos. «Ancianos» conserva ese matiz institucional en español bíblico y es claro para el lector.
- source_word: אֲשֶׁר הָיוּ עֹמְדִים אֶת־פְּנֵי שְׁלֹמֹה
  english_pob_choice: who had stood before Solomon
  chosen_spanish: que habían estado en presencia de Salomón
  alternatives_spanish:
  - que habían servido en presencia de Salomón
  - que habían estado ante Salomón
  lexicon: HALOT
  rationale: La expresión hebrea «estar de pie delante de» es un modismo de servicio o asistencia en la corte. «En presencia de» comunica la relación cortesana sin sonar forzado; se conserva la referencia a Salomón como figura de autoridad.
- source_word: בִּהְיֹתוֹ חַי
  english_pob_choice: while he was still alive
  chosen_spanish: mientras él vivía
  alternatives_spanish:
  - cuando aún estaba vivo
  - durante su vida
  lexicon: HALOT
  rationale: La cláusula temporal indica que estos ancianos servían antes de la muerte de Salomón. «Mientras él vivía» refleja bien esa relación temporal en español natural.
- source_word: אֵיךְ אַתֶּם נוֹעָצִים
  english_pob_choice: How do you advise me
  chosen_spanish: ¿Cómo aconsejan ustedes
  alternatives_spanish:
  - ¿Qué aconsejan ustedes?
  - ¿Cómo me aconsejan?
  lexicon: HALOT
  rationale: El hebreo formula una pregunta por el consejo que deben dar. En español, el objeto puede quedar implícito por el contexto; «aconsejan ustedes» preserva el valor exhortativo/interrogativo sin añadir un pronombre que el hebreo no expresa explícitamente.
- source_word: לְהָשִׁיב
  english_pob_choice: to answer
  chosen_spanish: responder
  alternatives_spanish:
  - dar respuesta
  - contestar
  lexicon: HALOT
  rationale: En este contexto, שוב en hifil significa dar una respuesta. «Responder» es el equivalente más directo y natural en español, manteniendo la idea de devolver una contestación.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a este pueblo de aquí
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo עם como «pueblo». La preposición «a» corresponde al régimen verbal de «responder» en español y refleja el destinatario de la respuesta.
- source_word: דָּבָר
  english_pob_choice: answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - palabra
  - contestación
  lexicon: HALOT
  rationale: Aunque literalmente significa «palabra», aquí designa el contenido de lo que se debe devolver. «Respuesta» evita una traducción áspera y preserva el sentido pragmático del hebreo.
translation_notes:
  revision_awareness: El inglés POB entendió el hebreo como una consulta de consejo a los ancianos de la corte, y dejó en nota el modismo «estar de pie delante de» y la construcción literal «responder a este pueblo una palabra». La presente versión sigue esa lectura y traslada el mismo valor idiomático al español sin perder la tensión lexical entre «palabra» y «respuesta».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evitó «Cristo»/«Mesías» porque no hay título cristológico en el texto.
  - «Ancianos» se escogió como término de corte y consejo, no como simple referencia a edad.
  - La pregunta final conserva el carácter de petición de consejo, no una simple consulta informativa.
