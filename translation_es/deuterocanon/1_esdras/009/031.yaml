translation:
  language: es
  text: 'Y de entre los hijos de Addin: Lathos[a] y Mooseías, Lakkounos y Naidos, y Beskaspasmos y Sesthel y Balnous y Manasés.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego aquí es una lista de nombres personales, varios de ellos textualmente inciertos o diferentes del paralelo hebreo aproximado. La traducción sigue de cerca las formas griegas en lugar de armonizarlas con la tradición masorética.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν Ἀδδείν
  english_pob_choice: And from the sons of Addin
  chosen_spanish: Y de entre los hijos de Addin
  alternatives_spanish:
  - Y de los hijos de Addin
  - Y de entre los descendientes de Addin
  lexicon: LSJ
  rationale: Ἐκ con genitivo expresa procedencia dentro de un grupo listado; 'de entre' conserva mejor esa idea de extracción o pertenencia que un simple 'de'. 'Hijos' mantiene la fórmula genealógica del pasaje.
- source_word: υἱῶν
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - descendientes
  lexicon: LSJ
  rationale: En listas genealógicas, υἱοί/υἱῶν puede abarcar miembros varones de una línea familiar. 'Hijos' es la forma más directa y cercana al griego; 'descendientes' suaviza demasiado la formulación.
- source_word: Ἀδδείν
  english_pob_choice: Addin
  chosen_spanish: Addin
  alternatives_spanish:
  - Addén
  - Adín
  lexicon: transliteration
  rationale: Nombre propio transliterado desde el griego. Se conserva 'Addin' para mantener la forma del testimonio griego y la coherencia con la tradición paralela aproximada.
- source_word: Λάθος
  english_pob_choice: Lathos
  chosen_spanish: Latos
  alternatives_spanish:
  - Lathos
  lexicon: transliteration
  rationale: Nombre propio transliterado; en español se prefiere una forma más fluida, sin alterar el valor identificatorio del nombre. La adaptación mínima conserva la secuencia sonora principal del griego.
- source_word: Μοοσσείας
  english_pob_choice: Moosseias
  chosen_spanish: Mooseías
  alternatives_spanish:
  - Moosseías
  - Moseías
  lexicon: transliteration
  rationale: Se preserva el nombre como transliteración y se mantiene la doble vocal inicial con una forma legible en español. El acento gráfico ayuda a la lectura sin intentar normalizar un nombre textualmente incierto.
- source_word: Λακκοῦνος
  english_pob_choice: Lakkounos
  chosen_spanish: Lakkounos
  alternatives_spanish:
  - Lacounos
  - Lakunos
  lexicon: transliteration
  rationale: Se conserva muy de cerca la forma griega, incluyendo la duplicación consonántica, porque es un nombre propio textual y no tiene equivalencia española establecida.
- source_word: Νάιδος
  english_pob_choice: Naidos
  chosen_spanish: Naidos
  alternatives_spanish:
  - Náidos
  lexicon: transliteration
  rationale: Transliteración directa del griego; no hay motivo para introducir una normalización más interpretativa.
- source_word: Βεσκασπασμὸς
  english_pob_choice: Beskaspasmos
  chosen_spanish: Beskaspasmos
  alternatives_spanish:
  - Bescaspasmos
  - Beskasmas
  lexicon: transliteration
  rationale: Nombre difícil y textualmente incierto; se conserva la forma griega lo más de cerca posible, evitando armonizarlo con tradiciones paralelas no seguras.
- source_word: Σεσθὴλ
  english_pob_choice: Sesthel
  chosen_spanish: Sestel
  alternatives_spanish:
  - Sesthel
  - Sesel
  lexicon: transliteration
  rationale: Se translitera el nombre propio de manera simple y legible en español. La aspiración implícita del griego no exige una grafía 'th' en español si eso dificulta la lectura.
- source_word: Βαλνοῦς
  english_pob_choice: Balnous
  chosen_spanish: Balnous
  alternatives_spanish:
  - Balnus
  - Belnus
  lexicon: transliteration
  rationale: Nombre propio sin traducción; se mantiene la forma más cercana al griego y ya suficientemente inteligible en español.
- source_word: Μανασσῆς
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  - Manasés
  lexicon: transliteration
  rationale: Se usa la forma española asentada 'Manasés', que sigue siendo fiel al nombre bíblico y es más natural para el lector hispanohablante que una transliteración más mecánica.
translation_notes:
  revision_awareness: 'El texto base en inglés fue revisado sin cambios sustantivos (latest_revision_pass: unchanged=true; cross_check: high_agreement). En español se mantiene esa misma línea: seguir el griego de Swete con transliteración cercana de los nombres y sin armonizar automáticamente con el paralelo hebreo aproximado.'
  spanish_consistency_notes:
  - Se usa 'Y de entre los hijos de Addin' para reflejar tanto la conectividad de καὶ ἐκ como el valor genealógico de υἱῶν.
  - Se conserva una nota textual porque el propio expediente inglés documenta incertidumbre y un paralelo hebreo aproximado.
  - Se evita 'SEÑOR' y toda terminología teológica no pertinente, ya que el versículo es una lista de nombres propios.
