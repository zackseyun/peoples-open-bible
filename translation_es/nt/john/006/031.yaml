review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: «nuestros padres», «comieron el maná», la fórmula citacional «tal como está escrito» y «les dio pan del cielo para comer» son fieles al texto fuente y al audit trail inglés. La única desalineación notable está en las notas: la nota [b] no preserva la alternativa documentada para ἐν τῇ ἐρήμῳ, porque repite exactamente «en el desierto» en vez de ofrecer una alternativa real como «en la región desierta» o similar. También conviene ajustar la puntuación de la nota [a] a la convención española.'
  spanish_quality_summary: El español es claro, natural y digno. «En el desierto» funciona bien en español bíblico general. La redacción principal no necesita cambios. Sí hace falta reparar las notas para que sean útiles, no redundantes, y se lean con español más pulido.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé, Mesías/Cristo, Espíritu, etc. «Maná», «pan», «cielo» y «padres» están bien escogidos. La decisión de usar «desierto» en el texto principal es defendible en español, siempre que la nota preserve la alternativa contextual frente a «wilderness».
  issues:
  - severity: medium
    issue: La nota [b] es redundante e incorrecta como alternativa léxica.
    rationale: El texto principal ya dice «en el desierto», y la nota [b] vuelve a decir «O “en el desierto”». Eso no preserva la alternativa documentada en inglés («in the wilderness» / «in the desert») ni aporta información real al lector.
  - severity: low
    issue: La nota [a] puede mejorarse estilísticamente en español.
    rationale: «O “nuestros antepasados”.» es comprensible, pero en notas españolas suena más natural «También puede traducirse…» o mantener la fórmula actual con puntuación más cuidada. No afecta la fidelidad, pero mejora la legibilidad editorial.
  revised_spanish_text: 'Nuestros padres comieron el maná[a] en el desierto[b], tal como está escrito: «Les dio pan del cielo para comer».'
  revised_footnotes:
  - marker: a
    text: O «nuestros antepasados». El griego dice literalmente «nuestros padres».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «en la región desierta».
    reason: lexical_alternative
  revision_rationale: 'Se conserva intacto el texto principal porque es fiel, natural y teológicamente sobrio. Solo se corrigen las notas: [a] se pule levemente en estilo, y [b] se reemplaza por una alternativa real para ἐν τῇ ἐρήμῳ en lugar de repetir el mismo texto del cuerpo.'
