translation:
  language: es
  text: 'Entonces Moisés habló al pueblo, diciendo: «Armen hombres de entre ustedes para el ejército, y que estén contra Madián, para ejecutar la venganza de Yahvé sobre Madián».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En un marco narrativo introductorio, דִּבֵּר introduce el discurso directo; en español, 'habló' preserva el valor verbal de introducción sin sonar tan rígido como una repetición mecánica de 'dijo'.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí עָם designa la comunidad israelita reunida ante Moisés. 'El pueblo' es natural en español y conserva el referente colectivo sin expandirlo a 'nación'.
- source_word: הֵחָלְצוּ
  english_pob_choice: Arm
  chosen_spanish: Armen
  alternatives_spanish:
  - Prepárense
  - Equipen
  - Alístense
  lexicon: HALOT
  rationale: En contexto militar, חלץ comunica alistarse/equiparse para la guerra. 'Armen' mantiene la fuerza imperativa y la concreción bélica del inglés POB 'Arm'.
- source_word: מֵאִתְּכֶם
  english_pob_choice: from among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de ustedes
  - de en medio de ustedes
  lexicon: HALOT
  rationale: La preposición señala selección desde el grupo mismo, no solo procedencia general. 'De entre ustedes' reproduce esa distinción de manera idiomática en español.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - combatientes
  lexicon: HALOT
  rationale: El hebreo es masculino plural y, en este contexto, designa combatientes varones. 'Hombres' conserva la fuerza lexical y la concordancia semántica.
- source_word: לַצָּבָא
  english_pob_choice: for the army
  chosen_spanish: para el ejército
  alternatives_spanish:
  - para la guerra
  - para la campaña militar
  - para el servicio militar
  lexicon: HALOT
  rationale: צָבָא puede referirse al ejército o al servicio bélico. 'Para el ejército' es claro en español y refleja la movilización militar concreta del pasaje.
- source_word: וְיִהְיוּ עַל מִדְיָן
  english_pob_choice: and let them be against Midian
  chosen_spanish: y que estén contra Madián
  alternatives_spanish:
  - y que sean contra Madián
  - y que se pongan contra Madián
  lexicon: HALOT
  rationale: La construcción היה על expresa hostilidad y posición frente a un enemigo. 'Estén contra Madián' sigue de cerca el hebreo sin añadir movimiento no explicitado.
- source_word: לָתֵת
  english_pob_choice: to execute
  chosen_spanish: para ejecutar
  alternatives_spanish:
  - para infligir
  - para dar
  lexicon: HALOT
  rationale: Con נִקְמָה, el infinitivo tiene valor idiomático de llevar a cabo/ejecutar la venganza. 'Para ejecutar' preserva esa función sin suavizarla.
- source_word: נִקְמַת
  english_pob_choice: vengeance
  chosen_spanish: la venganza
  alternatives_spanish:
  - el desquite
  - el castigo vengador
  - la reivindicación
  lexicon: HALOT
  rationale: נִקְמָה denota venganza/avengamiento. 'La venganza' es la equivalencia más directa y mantiene la tensión moral del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Conforme al criterio del proyecto, el Tetragrámaton se vierte como 'Yahvé' para preservar el nombre divino personal, en vez de sustituirlo por un título.
- source_word: בְּמִדְיָן
  english_pob_choice: on Midian
  chosen_spanish: sobre Madián
  alternatives_spanish:
  - contra Madián
  - en Madián
  lexicon: HALOT
  rationale: La preposición puede señalar el objetivo de la venganza. 'Sobre Madián' permite conservar la imagen de acción dirigida contra el destino del juicio sin añadir una interpretación demasiado específica.
theological_decisions:
- issue: La venganza atribuida a Yahvé en contexto de guerra santa
  english_pob_reading: the LORD’s vengeance
  chosen_spanish_reading: la venganza de Yahvé
  alternative_spanish_readings:
  - la venganza para Yahvé
  - la venganza de Yahvé sobre Madián
  rationale: El constructo נִקְמַת יְהוָה puede expresar venganza que pertenece a Yahvé o que se ejerce en su nombre. 'La venganza de Yahvé' conserva esa atribución sin resolver la tensión teológica; el complemento final 'sobre Madián' deja claro el objetivo del juicio.
  doctrine_reference: Preservar la ambigüedad constructa y la tensión teológica del texto base.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se evita añadir un verbo de movimiento como ''ir'', y se conserva la relación hostil expresada por ''estar contra'' en lugar de expandirla interpretativamente. También se mantiene la nota sobre la ambigüedad de נִקְמַת יְהוָה, trasladándola a español con una formulación que no resuelve indebidamente la tensión.'
  spanish_consistency_notes:
  - Se usa 'Moisés' para מֹשֶׁה y 'Madián' para מִדְיָן de forma consistente con el castellano bíblico moderno.
  - Se usa 'Yahvé' en lugar de 'SEÑOR' para reflejar el nombre divino revelado, conforme al criterio del proyecto.
  - '''Hombres'' y ''ejército'' conservan el matiz militar masculino del hebreo sin introducir jerga moderna.'
  - La cita directa se abre con comillas angulares para conformarse con la puntuación española y mantener legibilidad editorial.
