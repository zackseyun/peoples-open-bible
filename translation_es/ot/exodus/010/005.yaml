review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: cobertura de la superficie de la tierra, imposibilidad impersonal de verla, consumo del resto que escapó del granizo y consumo de todo árbol del campo. Sin embargo, hay pequeños desajustes: ''después del granizo'' debilita el sentido más preciso de ''del granizo'' / ''que les quedó del granizo'', y ''en el campo'' suaviza el מן (''del campo'' / ''que brota del campo'').'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para mayor fidelidad y mejor idiomaticidad bíblica. 'Lo que haya escapado' introduce un matiz subjuntivo innecesario; 'lo que escapó' o 'lo que ha escapado' refleja mejor el valor. La nota b actual está mal formulada y poco natural en español ('quedó escapando').
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas clave son en general adecuadas: ''cubrirá'', ''la superficie de la tierra'', ''no se podrá ver'', ''comerá''. Conviene alinear mejor הַנִּשְׁאֶרֶת לָכֶם מִן הַבָּרָד como ''que les quedó del granizo'' y הַצֹּמֵחַ... מִן הַשָּׂדֶה como ''que crece... del campo'' o ''que brota del campo''.'
  issues:
  - severity: medium
    issue: La frase 'después del granizo' reemplaza el sentido de procedencia en מִן הַבָּרָד.
    rationale: El hebreo expresa lo que les quedó 'del granizo' o 'a causa del granizo', no meramente una secuencia temporal posterior.
  - severity: medium
    issue: 'La nota b es infiel y poco idiomática: ''lo que quedó escapando''.'
    rationale: No refleja correctamente la alternativa inglesa documentada ('the remnant that escaped...') y produce español defectuoso.
  - severity: low
    issue: '''Lo que haya escapado'' introduce un subjuntivo no necesario.'
    rationale: El hebreo y el POB inglés describen un resto concreto que escapó; el indicativo suena más directo y fiel.
  - severity: low
    issue: '''En el campo'' atenúa el matiz de origen de מִן הַשָּׂדֶה.'
    rationale: Aunque natural, 'del campo' o 'que brota del campo' conserva mejor la imagen hebrea de lo que sale/crece desde el campo.
  revised_spanish_text: Y cubrirá la superficie de la tierra[a], de modo que no se podrá ver la tierra; y comerá el resto de lo que escapó, lo que les quedó del granizo[b], y comerá todo árbol que crece para ustedes del campo.
  revised_footnotes:
