translation:
  language: es
  text: 'Los hijos de Quiriat-arim[a], Quefirá y Beerot: 743.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Chefirá»; el hebreo apunta al mismo nombre de lugar, y la tradición de transliteración en español varía.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - La gente de
  lexicon: HALOT
  rationale: En las listas de retornados de Esdras, בְּנֵי introduce con frecuencia un grupo/clan asociado a un lugar. 'Los hijos de' conserva la estructura formal del hebreo y sigue siendo natural en español; 'descendientes' aclara el sentido grupal, pero pierde un poco de la forma literal.
- source_word: קִרְיַת עָרִים
  english_pob_choice: Kiriath-arim
  chosen_spanish: Quiriat-arim
  alternatives_spanish:
  - Kiriat-arim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y debe transliterarse, no traducirse. 'Quiriat-arim' refleja una transliteración española más natural y transparente que conservar la forma inglesa.
- source_word: כְּפִירָה
  english_pob_choice: Kephirah
  chosen_spanish: Quefirá
  alternatives_spanish:
  - Quefirá
  - Chefirá
  lexicon: HALOT
  rationale: También es un topónimo. La forma 'Quefirá' acerca la transliteración al español moderno, preservando la referencia al mismo lugar; 'Chefirá' es una variante posible por tradición transliterada.
- source_word: וּבְאֵרוֹת
  english_pob_choice: and Beeroth
  chosen_spanish: Beerot
  alternatives_spanish:
  - y Beerot
  - Bérot
  lexicon: HALOT
  rationale: El hebreo lleva la conjunción, pero en español la coordinación ya queda implícita por la serie nominal del versículo. Se mantiene el topónimo en forma transliterada; 'Beerot' es la adaptación española más directa de Beeroth.
- source_word: שְׁבַע מֵאוֹת וְאַרְבָּעִים וּשְׁלֹשָׁה
  english_pob_choice: '''743'''
  chosen_spanish: '743'
  alternatives_spanish:
  - setecientos cuarenta y tres
  lexicon: HALOT
  rationale: En una lista censal, el número en cifras es claro y exacto, y preserva bien la función registral del hebreo sin agregar aspereza estilística.
translation_notes:
  revision_awareness: 'Se sigue el acuerdo de alta concordancia del contexto en inglés: no hay revisiones aplicadas y la forma del versículo permanece estable; la principal adaptación es la transliteración al español de los topónimos y la presentación del número en cifras.'
  spanish_consistency_notes:
  - Se ha mantenido un registro sobrio y bíblico, adecuado para una lista genealógica/censal.
  - Se prefirió 'hijos' por su paralelismo formal con el hebreo y con el patrón de Esdras.
  - Los nombres propios se transliteran al español en una forma legible y consistente.
  - La cifra se conserva en numerales para respetar el carácter de lista administrativa del texto.
