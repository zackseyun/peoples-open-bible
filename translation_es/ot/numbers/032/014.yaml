revisions:
- from: Y he aquí[a], ustedes se han levantado en lugar de sus padres, una prole de hombres pecadores[b], para añadir todavía más al ardor de la ira de Yahvé contra Israel.
  to: Y he aquí, ustedes se han levantado en lugar de sus padres, una prole[a] de hombres pecadores, para añadir todavía más al ardor de la ira[b] de Yahvé contra Israel.
