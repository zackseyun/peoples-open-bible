translation:
  language: es
  text: 'Y ella dio a luz un hijo[a], y le puso por nombre Gershom, porque dijo[b]: «He sido un forastero en tierra extraña».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gershom suena como la expresión hebrea detrás de «forastero allí», reflejando la explicación de Moisés para el nombre.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Fui un forastero en tierra extraña».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: She gave birth
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El verbo de nacimiento en qal wayyiqtol se expresa de manera natural y fiel con «dio a luz», que conserva el sentido de alumbramiento sin sonar arcaico en español.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un niño
  lexicon: HALOT
  rationale: בֵּן aquí denota un hijo varón recién nacido; «un hijo» es la forma más natural y suficiente en español en este contexto narrativo.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: and he called his name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - y llamó su nombre
  - y lo llamó
  lexicon: HALOT
  rationale: La fórmula hebrea de nombramiento se vuelve en español con una construcción idiomática equivalente. «Le puso por nombre» mantiene la relación entre el acto de nombrar y el nombre explicado después, sin sonar forzado.
- source_word: גֵּרְשֹׁם
  english_pob_choice: Gershom
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gersom
  - Gershom
  lexicon: standard transliteration / Spanish conventional form
  rationale: Se adopta la forma española tradicional «Gersón», que es la adaptación más reconocible en lecturas bíblicas en español. La terminación refleja la transliteración usual del nombre hebreo, sin perder su identificación inequívoca.
- source_word: כִּי אָמַר
  english_pob_choice: for he said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - ya que dijo
  lexicon: HALOT
  rationale: כִּי introduce la explicación del nombre; «porque» transmite con claridad la relación causal/explanatoria en español.
- source_word: גֵּר
  english_pob_choice: I have been a sojourner
  chosen_spanish: he sido un forastero
  alternatives_spanish:
  - he sido un extranjero
  - he sido un residente forastero
  lexicon: HALOT
  rationale: El sustantivo גֵּר apunta a una persona no nativa que vive entre otros. Aquí se elige «forastero» porque en español comunica la condición de alguien fuera de su tierra propia y preserva mejor el juego de palabras con el nombre que «extranjero», sin imponer un registro técnico innecesario.
- source_word: הָיִיתִי
  english_pob_choice: I have been
  chosen_spanish: he sido
  alternatives_spanish:
  - fui
  - era
  lexicon: HALOT
  rationale: El perfecto hebreo permite una lectura de estado prolongado; «he sido» mantiene esa continuidad hasta el momento de hablar, tal como refleja la tradición auditada en inglés.
- source_word: בְּאֶרֶץ נָכְרִיָּה
  english_pob_choice: in a foreign land
  chosen_spanish: en tierra extraña
  alternatives_spanish:
  - en una tierra extranjera
  - en una tierra no mía
  lexicon: HALOT
  rationale: נָכְרִיָּה puede ser «extraña/foránea/extranjera». «Tierra extraña» suena natural en español y conserva la cualidad de ajenidad que sostiene el juego de palabras con גֵּר/forastero.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje de revisión del inglés, que cambió «foreigner» por «sojourner» para reflejar mejor גֵּר y preservar el juego de palabras. En español, se eligió «forastero» como solución natural y auditable que mantiene esa relación semántica sin caer en un tecnicismo arcaizante.
  spanish_consistency_notes:
  - Se mantiene una fórmula narrativa breve y solemne, adecuada a la prosa bíblica.
  - «Dio a luz» y «le puso por nombre» conservan el tono bíblico sin calco rígido.
  - Se usa «forastero» para sostener el vínculo con גֵּר y evitar la ambigüedad de «extranjero» en ciertos contextos hispanos.
  - La nota del nombre explica la tensión entre transliteración convencional y juego etimológico, sin forzar una etimología inexistente en el texto español.
