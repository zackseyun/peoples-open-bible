translation:
  language: es
  text: Entonces degolló el buey y el carnero, el sacrificio de las ofrendas de paz[a], que era para el pueblo. Los hijos de Aarón le trajeron la sangre, y la roció sobre el altar por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sacrificio de las ofrendas de comunión» o «el sacrificio de las ofrendas de bienestar». El hebreo שְׁלָמִים lleva asociaciones de paz, integridad y comunión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט
  english_pob_choice: Then he slaughtered
  chosen_spanish: Entonces degolló
  alternatives_spanish:
  - Entonces sacrificó
  - Entonces mató
  lexicon: HALOT
  rationale: En contexto sacrificial, שׁחט no es un simple 'matar', sino el acto ritual de degollar una víctima. 'Degolló' conserva ese valor preciso y es natural en español bíblico actual.
- source_word: הַשּׁוֹר
  english_pob_choice: the ox
  chosen_spanish: el toro
  alternatives_spanish:
  - el buey
  - el novillo
  lexicon: HALOT
  rationale: שור puede referirse a un bovino en general. 'Toro' funciona bien en español como equivalente natural y evita una precisión de sexo o edad que el hebreo aquí no exige explícitamente.
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho carnero
  lexicon: HALOT
  rationale: אַיִל designa específicamente un carnero. 'Carnero' es el equivalente directo y claro en español.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de las ofrendas de paz[a]
  alternatives_spanish:
  - el sacrificio de las ofrendas de comunión
  - el sacrificio de las ofrendas de bienestar
  lexicon: HALOT
  rationale: Se mantiene la relación tradicional con 'paz' para reflejar el vínculo con שׁלום, pero se conserva la posibilidad de otras resonancias semánticas mediante nota. 'Ofrendas de paz' es natural y transparente en español, aunque no agota el campo de sentido del hebreo.
- source_word: אֲשֶׁר לָעָם
  english_pob_choice: that was for the people
  chosen_spanish: que era para el pueblo
  alternatives_spanish:
  - que pertenecía al pueblo
  - para el pueblo
  lexicon: HALOT
  rationale: La cláusula relativa señala que el sacrificio estaba destinado al pueblo. 'Que era para el pueblo' reproduce bien la relación sin sobrecargarla con una lectura posesiva que el hebreo no explicita aquí.
- source_word: וַיַּמְצִאוּ
  english_pob_choice: brought
  chosen_spanish: le trajeron
  alternatives_spanish:
  - le presentaron
  - se la llevaron
  lexicon: HALOT
  rationale: En el rito, el verbo expresa llevar/presentar algo al oficiante. 'Le trajeron' es natural y conserva la dirección hacia Aarón implícita en el contexto y en el pronombre del hebreo.
- source_word: אֶת הַדָּם אֵלָיו
  english_pob_choice: the blood to him
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre a él
  - la sangre a Aarón
  lexicon: HALOT
  rationale: El hebreo usa un pronombre oblicuo para Aarón. En español, el contexto ya identifica al destinatario en la frase anterior, por lo que 'le trajeron la sangre' evita una repetición forzada sin perder claridad.
- source_word: וַיִּזְרְקֵהוּ
  english_pob_choice: he splashed it
  chosen_spanish: la roció
  alternatives_spanish:
  - la esparció
  - la salpicó
  lexicon: HALOT
  rationale: Para la aplicación ritual de sangre, 'roció' es la forma más reconocible en español bíblico y litúrgico, y conserva el gesto de dispersión sobre el altar. Aunque 'salpicó' puede acercarse más al matiz físico, suena menos adecuado en registro sagrado.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: on the altar all around
  chosen_spanish: sobre el altar, alrededor
  alternatives_spanish:
  - alrededor del altar
  - por todo alrededor del altar
  lexicon: HALOT
  rationale: La frase describe la aplicación de la sangre alrededor del altar. 'Sobre el altar, alrededor' mantiene la dirección de עַל y el sentido distributivo de סָבִיב con una construcción española natural.
translation_notes:
  revision_awareness: 'El texto base en inglés fue revisado para ajustar el final a una formulación más cercana al hebreo: ''on the altar all around''. La versión española sigue esa decisión con ''sobre el altar, alrededor'', manteniendo el registro sacrificial y la distribución סביב sin exagerar la imagen física.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se eligió un registro sacrificial claro y bíblico: ''degolló'', ''ofrendas de paz'', ''roció''.'
  - No se usó 'Cristo' ni terminología eclesiástica ajena al texto.
  - La referencia pronominal de 'le' se deja implícita por el contexto inmediato, como en el hebreo.
