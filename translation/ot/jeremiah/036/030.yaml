id: JER.36.30
reference: Jeremiah 36:30
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה עַל יְהֽוֹיָקִים֙ מֶ֣לֶךְ יְהוּדָ֔ה לֹא יִֽהְיֶה לּ֥/וֹ יוֹשֵׁ֖ב עַל כִּסֵּ֣א דָוִ֑ד וְ/נִבְלָת/וֹ֙ תִּֽהְיֶ֣ה מֻשְׁלֶ֔כֶת לַ/חֹ֥רֶב בַּ/יּ֖וֹם וְ/לַ/קֶּ֥רַח בַּ/לָּֽיְלָה־־־־־׃
translation:
  text: 'Therefore this is what Yahweh says concerning Jehoiakim king of Judah: He will have no one to sit on the throne of David[a], and his dead body will be thrown out to the heat by day and to the frost by night.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his corpse will be cast out to the drought by day and to the frost by night.' The Hebrew word for 'heat' can also carry the sense of dryness or drought.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential judgment flowing from the preceding context; 'Therefore' preserves the formal inferential force in natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'This is what the LORD says' is slightly more natural modern English while preserving the formulaic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: In this prophetic judgment formula, עַל introduces the person addressed by the oracle. 'Concerning' is broad enough to include hostile judgment without overtranslating the preposition itself.
- source_word: יְהוֹיָקִים מֶלֶךְ יְהוּדָה
  chosen: Jehoiakim king of Judah
  alternatives:
  - Jehoiakim, the king of Judah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name, with the royal title retained straightforwardly.
- source_word: לֹא יִהְיֶה לּוֹ יוֹשֵׁב עַל כִּסֵּא דָוִד
  chosen: He will have no one sitting on the throne of David
  alternatives:
  - He will have no descendant to sit on the throne of David
  - No one belonging to him will sit on David's throne
  lexicon: HALOT
  rationale: The Hebrew literally says 'there will not be to him one sitting on the throne of David.' The chosen rendering preserves the idiom's sense without adding 'descendant,' which is interpretive though contextually plausible.
- source_word: כִּסֵּא דָוִד
  chosen: the throne of David
  alternatives:
  - David's throne
  lexicon: HALOT
  rationale: Retains the dynastic and covenantal phrasing of the Hebrew.
- source_word: נִבְלָתוֹ
  chosen: his dead body
  alternatives:
  - his corpse
  - his carcass
  lexicon: HALOT
  rationale: '''Dead body'' is clear modern English and carries the indignity of the term without sounding either overly clinical or excessively harsh. ''Corpse'' is possible but slightly less natural for the target register.'
- source_word: מֻשְׁלֶכֶת
  chosen: will be thrown out
  alternatives:
  - will be cast out
  - will be flung out
  lexicon: HALOT
  rationale: The passive participial/adjectival form conveys being cast away or discarded. 'Thrown out' communicates the disgrace vividly in accessible English.
- source_word: לַחֹרֶב בַּיּוֹם
  chosen: to the heat by day
  alternatives:
  - to the drought by day
  - to the scorching heat by day
  lexicon: HALOT
  rationale: חֹרֶב can denote heat, dryness, or drought. In parallel with 'frost by night' and in the context of exposure of an unburied body, 'heat by day' best captures the environmental extremity.
- source_word: לַקֶּרַח בַּלָּיְלָה
  chosen: to the frost by night
  alternatives:
  - to the cold by night
  - to the freezing cold by night
  lexicon: HALOT
  rationale: קֶרַח denotes frost/ice. 'Frost by night' preserves the concrete image and the day-night parallelism.
