translation:
  language: es
  text: No muestres tu belleza a ningún varón[a], ni frecuentes la casa de las mujeres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: ''a todo varón no des belleza/apariencia''. El paralelo griego se entiende de otro modo: ''No mires en belleza a toda persona/hombre''.'
    reason: alternative_reading
  - marker: b
    text: El verbo final hebreo es incierto en la tradición de la Geniza. El paralelo griego apoya el sentido de 'no sentarse' o 'no mantenerse en compañía' entre mujeres; por eso aquí se traduce con un verbo de frecuencia/visita.
    reason: textual_variant
lexical_decisions:
- source_word: לכל זכר / παντὶ ἀνθρώπῳ
  english_pob_choice: to any male / every person-man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - ningún varón
  - cualquier varón
  - cualquier hombre
  lexicon: HALOT; LXX παντὶ ἀνθρώπῳ
  rationale: El hebreo es explícitamente masculino (זכר), y la LXX amplía el matiz hacia ἀνθρώπῳ. En español, 'ningún hombre' conserva la referencia masculina y fluye con naturalidad; 'varón' sería más formal, pero menos idiomático en una advertencia sapiencial.
- source_word: אל תתן תאר
  english_pob_choice: do not show your beauty
  chosen_spanish: No mires la belleza
  alternatives_spanish:
  - No muestres tu belleza
  - No exhibas tu belleza
  - No hagas ver tu belleza
  lexicon: HALOT
  rationale: La clave hebrea admite el sentido de forma/apariencia/belleza. Dado que la audit trail inglesa opta por 'show your beauty' y la LXX tiene ἐν κάλλει ('en belleza'), 'No mires la belleza' preserva la advertencia contra la atracción visual sin atribuir al sujeto una acción más interpretativa como 'exhibir'.
- source_word: ובית נשים / καὶ ἐν μέσῳ γυναικῶν
  english_pob_choice: the house of women / among women
  chosen_spanish: la casa de las mujeres
  alternatives_spanish:
  - entre mujeres
  - la casa de mujeres
  - en medio de mujeres
  lexicon: HALOT; LXX
  rationale: El hebreo y la LXX presentan una construcción difícil pero claramente locativa/social. 'La casa de las mujeres' mantiene el eco del hebreo y permite leer la frase como un espacio de asociación, sin borrar la tensión textual entre el hebreo y el griego.
- source_word: אל תסתויד / μὴ συνέδρευε
  english_pob_choice: do not frequent / do not sit among
  chosen_spanish: ni frecuentes
  alternatives_spanish:
  - ni te sientes entre
  - ni te juntes con
  - ni te demores entre
  lexicon: HALOT; LXX συνέδρευε
  rationale: La LXX apunta a una convivencia o permanencia en compañía; el hebreo de Geniza es incierto. 'Frecuentes' recoge la idea de acudir habitualmente a un lugar y funciona bien con 'la casa de las mujeres', sin convertir la instrucción en un detalle demasiado específico que el texto no asegura.
theological_decisions:
- issue: Alcance del mandato sapiencial sobre trato con mujeres
  english_pob_reading: Retain the explicit male/female distinction in the admonition
  chosen_spanish_reading: Mantener la distinción masculina/femenina explícita
  alternative_spanish_readings:
  - Neutralizar hacia 'personas'
  - Reformular como una cautela general sobre compañía
  rationale: El texto fuente está marcado por género y el consejo se formula en esa clave. El español conserva esa especificidad sin suavizarla hacia un universal abstracto que el hebreo no expresa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre hebreo difícil y paralelo griego
  english_pob_reading: Translate primarily from the Hebrew while allowing the Greek to clarify the obscure final verb
  chosen_spanish_reading: Traducir principalmente desde el hebreo, dejando que la LXX oriente el cierre oscuro
  alternative_spanish_readings:
  - Seguir solo la LXX
  - Traducir literalmente el hebreo oscuro
  rationale: En español conviene sostener la imagen hebrea de la 'casa de las mujeres', pero sin forzar una reconstrucción que el testimonio no garantiza. La opción 'frecuentes' refleja la orientación social del griego sin borrar la dificultad textual.
  doctrine_reference: PHILOSOPHY.md 'Original-language primacy' y política textual de Sirácides
translation_notes:
  revision_awareness: 'La redacción sigue la primacía del hebreo conservado, pero incorpora la LXX como control real de sentido para el tramo final oscuro. Frente al audit trail inglés, se evitó un calco directo de ''beauty'' y de ''house of women'' sin aclaración: en español la primera cláusula se volvió más natural (''No mires la belleza'') y la segunda retuvo la imagen locativa con ''la casa de las mujeres'', acompañada de nota para la variante textual.'
  spanish_consistency_notes:
  - Se mantiene 'mujeres' para γυναῖκες/נשים y no se neutraliza el género.
  - '''Frecuentes'' conserva la dimensión de hábito o asistencia reiterada sugerida por el griego.'
  - '''Belleza'' se usa para κάλλος/תאר, evitando ''forma'' porque en español sería menos claro en este contexto sapiencial.'
  - El texto es breve y apto para publicación, con puntuación española estándar y sin arcaismos innecesarios.
