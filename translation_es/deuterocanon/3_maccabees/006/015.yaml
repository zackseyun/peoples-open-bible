translation:
  language: es
  text: 'Que se muestre a todas las naciones que tú estás con nosotros[a], Señor, y que no has apartado tu rostro de nosotros; pero, así como dijiste: «Ni siquiera cuando estaban en la tierra de sus enemigos los desatendí», así llévalo a cabo[b], Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión refleja lenguaje de pacto: la petición pide que las naciones vean que Dios permanece presente con su pueblo. El griego también puede entenderse como «entre nosotros».'
    reason: cross_reference
  - marker: b
    text: 'O: «complétalo». El verbo griego pide que Dios lleve a cabo lo que ha dicho, sin añadir más contenido que el explícito en la frase.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δειχθήτω
  english_pob_choice: Let it be shown
  chosen_spanish: Que se muestre
  alternatives_spanish:
  - Que sea mostrado
  - Que se dé a conocer
  lexicon: LSJ
  rationale: El aoristo pasivo imperativo pide una formulación exhortativa/peticionaria en español. «Que se muestre» conserva la fuerza pasiva sin volver la frase pesada o artificial.
- source_word: πᾶσιν ἔθνεσιν
  english_pob_choice: to all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a todos los gentiles
  lexicon: LSJ
  rationale: «Naciones» es la correspondencia más directa y mantiene el alcance amplio del texto; «gentiles» introduciría un contraste más específico de lo que la frase exige.
- source_word: μεθʼ ἡμῶν εἶ
  english_pob_choice: you are with us
  chosen_spanish: tú estás con nosotros
  alternatives_spanish:
  - tú estás entre nosotros
  lexicon: LSJ
  rationale: La presencia divina se expresa de manera natural en español con «estar con nosotros», preservando el sentido de cercanía pactal.
- source_word: οὐκ ἀπέστρεψας τὸ πρόσωπόν σου ἀφʼ ἡμῶν
  english_pob_choice: you have not turned your face away from us
  chosen_spanish: no has apartado tu rostro de nosotros
  alternatives_spanish:
  - no te has apartado de nosotros
  - no has escondido tu rostro de nosotros
  lexicon: LSJ
  rationale: Conservo «rostro» para mantener la metáfora bíblica explícita del griego y su resonancia de favor/desfavor.
- source_word: ὑπεριδον
  english_pob_choice: did I disregard
  chosen_spanish: los pasé por alto
  alternatives_spanish:
  - los desprecié
  - los ignoré
  - los desatendí
  lexicon: LSJ
  rationale: En la cita divina, el verbo expresa no tratar al pueblo como descartado u omitido; «pasar por alto» conserva esa idea sin cargarlo con una dureza que el contexto no exige.
- source_word: καθὼς εἶπας
  english_pob_choice: just as you said
  chosen_spanish: así como dijiste
  alternatives_spanish:
  - tal como dijiste
  - como dijiste
  lexicon: LSJ
  rationale: La comparación queda clara y natural en español; la fórmula mantiene el enlace con una palabra previa de Dios.
- source_word: ἐπίτελεσον
  english_pob_choice: accomplish it
  chosen_spanish: hazlo
  alternatives_spanish:
  - complétalo
  - llévalo a cabo
  - acompása?
  lexicon: LSJ
  rationale: El imperativo pide que Dios lleve a término lo dicho. «Hazlo» es breve, natural y no agrega un objeto explícito que el griego no marca en esta forma.
theological_decisions:
- issue: Tratamiento de κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En este contexto de oración, κύριε funciona como título divino; «Señor» es la forma española establecida y más reverente, sin debilitar la referencia teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Cita divina sobre la tierra de los enemigos
  english_pob_reading: ‘Not even when they were in the land of their enemies did I disregard them,’
  chosen_spanish_reading: «Ni aun estando en la tierra de sus enemigos los pasé por alto»
  alternative_spanish_readings:
  - «Ni aun estando en la tierra de sus enemigos los ignoré»
  - «Ni aun estando en la tierra de sus enemigos los desatendí»
  rationale: Mantengo la cita directa para respetar el carácter apelativo de la oración y la tensión del verbo griego, que puede oscilar entre no ignorar, no pasar por alto o no descuidar.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail: la conclusión preferida para οὕτως ἐπίτελεσον evita añadir un objeto explícito y prefiere una fórmula directa de ejecución/realización. También se conservó la cita en estilo directo, como en el inglés auditado.'
  spanish_consistency_notes:
  - Se mantuvo «rostro» para preservar la imagen bíblica del original.
  - Se usó «Señor» para κύριε por tratarse de una invocación divina.
  - Se eligió una estructura exhortativa natural («Que se muestre») para reflejar el pasivo imperativo griego.
  - La cita interna quedó entre comillas españolas para distinguirla como discurso directo.
  - No se introdujo lenguaje eclesiástico tradicional que no estuviera apoyado por el texto fuente.
