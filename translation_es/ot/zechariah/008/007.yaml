translation:
  language: es
  text: 'Así dice Yahvé de las huestes: He aquí, yo salvaré[a] a mi pueblo de la tierra del oriente y de la tierra de la puesta del sol[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «estoy por salvar» o «voy a salvar». El participio hebreo en discurso profético puede expresar acción futura cierta o inminente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de la tierra del oriente y de la tierra de la puesta del sol», un merismo para lugares lejanos al este y al oeste.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - De esta manera dice
  lexicon: HALOT
  rationale: La fórmula profética en español suena natural y solemne con «Así dice». Conserva el carácter oracular y la fuerza de declaración autoritativa sin volverla mecánica.
- source_word: יְהוָה צְבָאֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los hosts
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según el criterio del proyecto para el Nombre divino. «de los ejércitos» traduce צְבָאוֹת de forma clara y bíblica en español, preservando el sentido de fuerzas bajo su mando.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La interjección enfática se vierte con la forma bíblica y comprensible «He aquí», que mantiene el tono solemne de auto-presentación divina.
- source_word: מוֹשִׁיעַ
  english_pob_choice: I will save
  chosen_spanish: salvaré
  alternatives_spanish:
  - estoy por salvar
  - voy a salvar
  lexicon: HALOT
  rationale: El participio en anuncio profético expresa acción cierta e inminente. En español, el futuro simple comunica bien la promesa divina sin perder la fuerza declarativa ni añadir matices no seguros.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi gente
  lexicon: HALOT
  rationale: «Mi pueblo» reproduce el vínculo de pacto y la pertenencia implícita en el hebreo. Se conserva el objeto directo con «a» por fluidez del español.
- source_word: מֵאֶרֶץ מִזְרָח
  english_pob_choice: from the land of the east
  chosen_spanish: de la tierra del oriente
  alternatives_spanish:
  - de la tierra del este
  - desde la tierra oriental
  lexicon: HALOT
  rationale: «Oriente» es una opción digna y natural para la dirección cardinal. «Tierra» conserva el sustantivo הארץ, y no se especifica un territorio concreto que el hebreo no nombra.
- source_word: וּמֵאֶרֶץ מְבוֹא הַשָּׁמֶשׁ
  english_pob_choice: and from the land of the setting of the sun
  chosen_spanish: de la tierra de la puesta del sol
  alternatives_spanish:
  - de la tierra del ocaso
  - de la tierra donde se pone el sol
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea del ocaso sin reducirla a una mera referencia geográfica. «Puesta del sol» conserva el paralelismo poético con el oriente.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrammaton. Conforme al criterio del proyecto, se translitera con «Yahvé» para preservar el Nombre de pacto y evitar la sustitución por una convención de máscara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Valor del participio מוֹשִׁיעַ en promesa profética
  english_pob_reading: I will save
  chosen_spanish_reading: salvaré
  alternative_spanish_readings:
  - estoy salvando
  - estoy por salvar
  rationale: La revisión inglesa prefirió el futuro simple para reflejar mejor la construcción profética. En español, el futuro simple también expresa con naturalidad una acción prometida y segura; evita sonar demasiado perifrástico o aspectual.
  doctrine_reference: 'DOCTRINE.md: prophetic participle as certain future'
translation_notes:
  revision_awareness: La base inglesa pasó de «I am saving» a «I will save» para reflejar mejor el participio profético con valor de futuro cierto. En español se adoptó directamente el futuro simple («salvaré»), manteniendo la decisión revisada y evitando una perífrasis menos natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera coherente con el estándar del proyecto para יהוה.
  - Se mantiene el paralelismo poético este/oeste con «oriente» y «puesta del sol».
  - «Mi pueblo» conserva el matiz de pertenencia de pacto sin añadir explicaciones al texto principal.
