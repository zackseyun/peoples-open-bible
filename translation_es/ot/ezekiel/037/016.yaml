translation:
  language: es
  text: 'Y tú, hijo de hombre, toma para ti un palo[c] y escribe sobre él: «Para Judá y para los hijos[a] de Israel, sus compañeros[b]». Luego toma un palo y escribe sobre él: «Para José, el palo[c] de Efraín, y toda la casa de Israel, sus compañeros[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los hijos de Israel" podría entenderse tradicionalmente como "los hijos" o "los descendientes de Israel"; el hebreo es literalmente "los hijos de Israel".
    reason: lexical_alternative
  - marker: b
    text: O "sus asociados", "los que están unidos a él" o "sus aliados".
    reason: lexical_alternative
  - marker: c
    text: '"Palo" también podría traducirse "pieza de madera" o, de manera más interpretativa, "tablilla de madera".'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el giro profético fijo de Ezequiel y mantiene la forma idiomática masculina del hebreo, en lugar de suavizarlo a una paráfrasis genérica.
- source_word: קַח לְךָ
  english_pob_choice: take for yourself
  chosen_spanish: toma para ti
  alternatives_spanish:
  - toma
  - consigue para ti
  lexicon: HALOT
  rationale: El pronombre añadido לְךָ aporta un matiz personal/reflexivo que se preserva de forma natural en español con 'para ti'.
- source_word: עֵץ
  english_pob_choice: stick
  chosen_spanish: palo
  alternatives_spanish:
  - vara
  - pedazo de madera
  - tablilla de madera
  lexicon: HALOT
  rationale: En este acto simbólico el objeto debe ser manipulable y escribible; 'palo' comunica la materialidad sin introducir una interpretación excesiva como 'tablilla de madera'.
- source_word: וּכְתֹב עָלָיו
  english_pob_choice: write on it
  chosen_spanish: escribe sobre él
  alternatives_spanish:
  - inscribe sobre él
  - escribe en él
  lexicon: HALOT
  rationale: '''Sobre él'' reproduce el referente del objeto físico y evita una formulación más técnica de lo que exige el texto.'
- source_word: לִיהוּדָה
  english_pob_choice: For Judah
  chosen_spanish: Para Judá
  alternatives_spanish:
  - De Judá
  - Perteneciente a Judá
  lexicon: HALOT
  rationale: La ל prefijada funciona aquí como el contenido de la inscripción; 'Para Judá' refleja mejor la etiqueta escrita que un simple nombre desnudo.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma explícita 'hijos' para respetar el valor léxico del hebreo y la decisión de no neutralizarla en 'pueblo'.
- source_word: חבר/ו
  english_pob_choice: his companions
  chosen_spanish: sus compañeros
  alternatives_spanish:
  - sus asociados
  - los que están unidos a él
  - sus aliados
  lexicon: HALOT
  rationale: '''Compañeros'' es una opción breve y natural que conserva la relación de asociación/unión señalada por el hebreo y la lectura auditada de la POB inglesa.'
- source_word: לְיוֹסֵף
  english_pob_choice: For Joseph
  chosen_spanish: Para José
  alternatives_spanish:
  - De José
  - Perteneciente a José
  lexicon: HALOT
  rationale: Igual que con Judá, se conserva el valor de rótulo inscrito.
- source_word: עֵץ אֶפְרַיִם
  english_pob_choice: the stick of Ephraim
  chosen_spanish: el palo de Efraín
  alternatives_spanish:
  - la vara de Efraín
  - la pieza de madera de Efraín
  lexicon: HALOT
  rationale: Se mantiene la relación constructa de manera directa; 'palo' evita sobreinterpretar el objeto como una tablilla, pero sigue siendo lo bastante concreto para el acto simbólico.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - toda la familia de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: '''Casa de Israel'' es una expresión profética estable y se preserva en español; ''toda'' mantiene el alcance total del hebreo.'
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y toda
  alternatives_spanish:
  - y todo
  lexicon: HALOT
  rationale: Ajuste de concordancia y fluidez en español para acompañar 'la casa de Israel' sin perder la extensión total del sintagma.
theological_decisions:
- issue: Distinción entre Judá y José/Efraín en el acto simbólico
  english_pob_reading: The verse distinguishes Judah and Joseph/Ephraim as two covenantal groupings to be symbolically reunited, without importing later doctrinal claims beyond the immediate prophetic sign-act.
  chosen_spanish_reading: El versículo distingue a Judá y a José/Efraín como dos agrupaciones del pueblo que serán unidas simbólicamente, sin añadir desarrollos doctrinales ajenos al signo profético inmediato.
  alternative_spanish_readings:
  - Tratar a José y Efraín como simples redundancias sin fuerza propia
  - fundir todas las menciones en un genérico 'israelitas'
  rationale: La traducción conserva los dos rótulos y la reiteración de sus respectivos compañeros para respetar la estructura del signo y la tensión histórica de los dos reinos.
  doctrine_reference: Ezequiel 37:16–17; unidad restaurada del pueblo de Dios en el signo profético
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el rastro de auditoría en inglés. Se mantuvo la duplicación retórica de 'toma... y escribe' y la distinción entre 'Judá' y 'José / el palo de Efraín'. No se introdujeron ampliaciones interpretativas; solo se eligieron equivalentes españoles naturales para el acto simbólico y los rótulos inscritos.
  spanish_consistency_notes:
  - Se prefirió 'hijo de hombre' por consistencia con el lenguaje profético de Ezequiel.
  - Se usó 'hijos de Israel' para conservar la explicitud del hebreo y la política de precisión de género del proyecto.
  - '''Casa de Israel'' se mantuvo como expresión técnica profética.'
  - 'Los nombres propios siguen la forma española habitual: Judá, José, Efraín, Israel, Yahvé cuando corresponda; en este versículo no aparece el nombre divino.'
