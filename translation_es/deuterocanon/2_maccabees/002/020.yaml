translation:
  language: es
  text: Planta a tu pueblo en tu lugar santo[b][a], tal como dijo Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego suministrado para este versículo parece no corresponder al contexto esperado de 2 Macabeos 2:20; por eso la traducción sigue directamente la redacción disponible, sin reconstruir una lectura alternativa.
