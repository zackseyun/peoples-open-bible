id: GEN.31.36
reference: Genesis 31:36
source:
  edition: WLC
  text: וַ/יִּ֥חַר לְ/יַעֲקֹ֖ב וַ/יָּ֣רֶב בְּ/לָבָ֑ן וַ/יַּ֤עַן יַעֲקֹב֙ וַ/יֹּ֣אמֶר לְ/לָבָ֔ן מַה פִּשְׁעִ/י֙ מַ֣ה חַטָּאתִ֔/י כִּ֥י דָלַ֖קְתָּ אַחֲרָֽ/י־׃
translation:
  text: Then Jacob became angry and contended with Laban. Jacob answered and said to Laban[a], “What is my transgression? What is my sin, that you have pursued me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you have pursued me.” The Hebrew verb carries an image of burning or ardent pursuit, hence “hotly pursued.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְיַעֲקֹב
  chosen: Then Jacob became angry
  alternatives:
  - Then Jacob was angry
  - Then Jacob burned with anger
  lexicon: HALOT
  rationale: The idiom חרה + ל expresses anger kindled in or toward a person. 'Became angry' is natural modern English and preserves the ingressive sense of the wayyiqtol sequence.
- source_word: וַיָּרֶב בְּלָבָן
  chosen: and contended with Laban
  alternatives:
  - and quarreled with Laban
  - and rebuked Laban
  lexicon: HALOT
  rationale: ריב in this stem commonly denotes contending or disputing with someone. 'Contended with' keeps the adversarial force without over-specifying the tone.
- source_word: וַיַּעַן ... וַיֹּאמֶר
  chosen: Jacob answered and said
  alternatives:
  - Jacob responded and said
  - Jacob answered
  lexicon: HALOT
  rationale: The Hebrew uses the common narrative pair 'answered and said.' Retaining both verbs reflects the source text while remaining readable in English.
- source_word: מַה פִּשְׁעִי
  chosen: What is my transgression?
  alternatives:
  - What is my offense?
  - What is my rebellion?
  lexicon: HALOT
  rationale: פשע often denotes transgression or rebellion, a willful breach. 'Transgression' best preserves the moral-legal nuance in Jacob's self-defense.
- source_word: מַה חַטָּאתִי
  chosen: What is my sin?
  alternatives:
  - What wrong have I done?
  - What is my offense?
  lexicon: HALOT
  rationale: חטאת refers broadly to sin or offense. 'Sin' is the most direct and consistent rendering, and the pairing with 'transgression' preserves the rhetorical parallelism.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result or grounds implied by the preceding questions: ''What is my transgression... that you have pursued me?'' ''That'' fits idiomatic English after the interrogatives.'
- source_word: דָלַקְתָּ אַחֲרַי
  chosen: you have hotly pursued me
  alternatives:
  - you have pursued me
  - you have chased after me eagerly
  lexicon: HALOT
  rationale: דלק literally carries the sense of burning and by extension ardently pursuing. 'Hotly pursued' preserves the vivid metaphor better than a flat 'pursued' while remaining natural English.
