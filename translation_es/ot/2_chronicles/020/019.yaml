translation:
  language: es
  text: Entonces se levantaron los levitas, de los hijos de los coatitas y de los hijos de los coreítas, para alabar a Yahvé, el Dios de Israel, con una voz muy fuerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una voz fuerte en gran manera»; el hebreo usa un modismo que intensifica el volumen de su alabanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: El verbo Qal wayyiqtol de קום describe una acción física y pública de ponerse en pie. En español, 'se levantaron' comunica bien ese movimiento inicial sin sonar tan calcado como 'estuvieron de pie'.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas de la tribu de Leví
  lexicon: HALOT
  rationale: Es el nombre común del grupo cultual; el artículo definido se conserva naturalmente en español.
- source_word: מִן בְּנֵי הַקְּהָתִים
  english_pob_choice: from the sons of the Kohathites
  chosen_spanish: de los hijos de los coatitas
  alternatives_spanish:
  - de entre los coatitas
  - de los descendientes de Coat
  lexicon: HALOT
  rationale: Se mantiene la construcción hebrea 'hijos de' para reflejar la expresión de parentesco/clan. 'Coatitas' es el equivalente convencional en español para la familia de Coat.
- source_word: וּמִן בְּנֵי הַקָּרְחִים
  english_pob_choice: and from the sons of the Korahites
  chosen_spanish: y de los hijos de los coreítas
  alternatives_spanish:
  - y de entre los coreítas
  - y de los descendientes de Coré
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior. 'Coreítas' corresponde al clan de Coré y respeta la forma genealógica del hebreo.
- source_word: לְהַלֵּל
  english_pob_choice: to praise
  chosen_spanish: para alabar
  alternatives_spanish:
  - para dar alabanza
  - para cantar alabanzas
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. 'Alabar' es el equivalente directo y natural en español para הלל, sin añadir explícitamente la idea de 'cantar' que el hebreo no formula aquí.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvéh
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto de traducir יהוה como 'Yahvé' en el texto principal, preservando el nombre del pacto en lugar de la sustitución tradicional.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en estado constructo se vierte de forma directa y transparente. 'Dios de Israel' mantiene la referencia de alianza y pertenencia nacional/covenantal.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a very loud voice
  chosen_spanish: con voz muy fuerte
  alternatives_spanish:
  - con voz muy alta
  - con gran voz
  lexicon: HALOT
  rationale: '''Voz muy fuerte'' transmite adecuadamente el volumen e intensidad del hebreo. ''Fuerte'' en español conserva la fuerza física del sonido, no solo la emoción.'
- source_word: לְמָעְלָה
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - excesivamente
  - sumamente
  lexicon: HALOT
  rationale: Aquí funciona como intensificador idiomático de la expresión de volumen, no con sentido espacial. 'Muy' reproduce la fuerza sin volver la frase extraña en español.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la norma del proyecto, se lo vierte como 'Yahvé' para preservar el nombre propio del Dios del pacto y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al paquete fuente hebreo y el audit trail inglés. El inglés ya había resuelto la tensión de לְמָעְלָה como intensificador de volumen y no como dirección espacial; la versión española mantiene esa lectura y la expresa de modo natural. No se detectaron cambios pendientes en la última revisión.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de los dos grupos levíticos con 'de los hijos de...'.
  - Se usó 'Yahvé' en el texto principal, conforme a la terminología del proyecto.
  - La nota a pie de página conserva la alternativa semántica sin sobrecargar el texto principal.
  - La puntuación sigue las convenciones del español y preserva el tono bíblico formal sin arcaísmos innecesarios.
