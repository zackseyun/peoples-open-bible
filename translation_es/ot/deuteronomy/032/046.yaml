translation:
  language: es
  text: 'Y él les dijo[a]: «Pongan su corazón en todas las palabras que yo doy testimonio a ustedes hoy, que ustedes mandarán a sus hijos[b] que guarden y pongan por obra todas las palabras de esta ley».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo los advierto hoy» o «yo doy testimonio contra ustedes hoy». El verbo hebreo puede abarcar tanto testimonio como advertencia o denuncia en un contexto de pacto.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «sus hijos», un giro que puede representar de manera más amplia a la siguiente generación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂימוּ לְבַבְכֶם
  english_pob_choice: Set your heart on
  chosen_spanish: Pongan su corazón en
  alternatives_spanish:
  - Pongan atención a
  - Tomen a pecho
  - Pongan su mente en
  lexicon: HALOT
  rationale: El hebreo es un modismo concreto que involucra el corazón como centro de atención, voluntad y resolución. «Pongan su corazón en» conserva la imagen corporal y su fuerza exhortativa, sin volverla meramente emocional ni diluirla en una paráfrasis.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - estas palabras
  - las cosas
  lexicon: HALOT
  rationale: דָּבָר aquí se refiere a palabras/instrucciones del pacto. «Las palabras» es el equivalente más directo y mantiene el paralelismo con la frase final del versículo.
- source_word: מֵעִיד בָּכֶם הַיּוֹם
  english_pob_choice: I am testifying to you today
  chosen_spanish: yo testifico a ustedes hoy
  alternatives_spanish:
  - yo doy testimonio contra ustedes hoy
  - yo los advierto hoy
  - yo doy testimonio entre ustedes hoy
  lexicon: HALOT
  rationale: El verbo עוּד puede abarcar testificar y advertir en contexto forense/pactual. La forma principal mantiene el sentido de testimonio solemne sin resolver demasiado pronto la posible fuerza de advertencia. En español, «testifico a ustedes hoy» suena algo más natural que una construcción más cargada con «contra ustedes», que se reserva como alternativa.
- source_word: בָּכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - contra ustedes
  - entre ustedes
  lexicon: HALOT
  rationale: Aunque la preposición puede matizarse de varias maneras, el contexto inmediato favorece un destinatario directo. «A ustedes» conserva la referencia personal sin sobreexplicitar la dirección forense.
- source_word: אֲשֶׁר תְּצַוֻּם
  english_pob_choice: which you shall command
  chosen_spanish: las cuales ustedes mandarán
  alternatives_spanish:
  - que ustedes mandarán
  - las cuales ustedes encargarán
  - las cuales ustedes ordenarán
  lexicon: HALOT
  rationale: La cláusula relativa expresa el encargo de transmitir autoritativamente estas palabras a la siguiente generación. «Las cuales ustedes mandarán» reproduce la relación sintáctica del hebreo de forma natural en español.
- source_word: בְּנֵיכֶם
  english_pob_choice: your sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: HALOT
  rationale: El hebreo es literalmente «sus hijos/varones». En español, «hijos» conserva el referente filial y puede abarcar la continuidad generacional; se evita neutralizar sin necesidad y, al mismo tiempo, se mantiene una formulación publicable y natural.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  english_pob_choice: to keep and to do
  chosen_spanish: guardar, para hacer
  alternatives_spanish:
  - guardar y hacer
  - observar y hacer
  - guardar y cumplir
  lexicon: HALOT
  rationale: 'Los dos infinitivos forman un par enfático: conservar obedientemente y ejecutar en la práctica. «Guardar, para hacer» mantiene ambos elementos con buena fluidez en español y deja visible la relación entre obediencia interior y acción.'
- source_word: דִּבְרֵי הַתּוֹרָה הַזֹּאת
  english_pob_choice: the words of this law
  chosen_spanish: las palabras de esta ley
  alternatives_spanish:
  - las palabras de esta instrucción
  - todas las palabras de esta ley
  lexicon: HALOT
  rationale: En Deuteronomio, תּוֹרָה funciona claramente como «ley» en sentido de instrucción pactal normativa. «Las palabras de esta ley» sigue de cerca el hebreo y conserva el valor jurídico-pactual del término.
theological_decisions:
- issue: 'Fuerza de מֵעִיד בָּכֶם: testimonio vs. advertencia/jurisprudencia de pacto'
  english_pob_reading: I am testifying to you today
  chosen_spanish_reading: yo testifico a ustedes hoy
  alternative_spanish_readings:
  - yo los advierto hoy
  - doy testimonio contra ustedes hoy
  rationale: El texto hebreo permite tanto el matiz de testimonio solemne como el de advertencia pactual. La redacción principal mantiene esa tensión con «testifico», sin fijar demasiado rápido la relación como puramente adversarial. Las opciones más fuertes quedan preservadas como alternativas para no perder la carga jurídica del verbo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referencia de בְּנֵיכֶם y alcance generacional
  english_pob_reading: your sons
  chosen_spanish_reading: a sus hijos
  alternative_spanish_readings:
  - a sus hijos varones
  - a sus descendientes
  rationale: El hebreo es masculino plural y, por fidelidad al original, no se neutraliza completamente en la forma base. En español, «hijos» comunica el traspaso generacional de modo claro y natural, sin borrar el vínculo familiar masculino explícito del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del inglés POB, que afinó la cláusula final para reflejar mejor la estructura hebrea y aclaró que el destinatario directo es «a ustedes» en vez de una lectura más ambigua. Por eso el español mantiene el orden sintáctico cercano al hebreo, conserva la exhortación solemne y evita expandir innecesariamente el sentido del verbo de testimonio.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene «ley» para תּוֹרָה en armonía con el uso de Deuteronomio y con el audit trail inglés.
  - Se preserva la tensión de עוּד con una nota, en lugar de resolverla solo como advertencia o solo como testimonio.
  - La formulación «a sus hijos» evita una neutralización excesiva y sigue siendo natural en español bíblico contemporáneo.
