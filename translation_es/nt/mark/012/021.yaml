translation:
  language: es
  text: Y el segundo la tomó por esposa, y murió, sin dejar descendencia, y el tercero igualmente.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hermano
  - el segundo hombre
  lexicon: BDAG
  rationale: El artículo con el ordinal funciona sustantivamente. En español, «el segundo» reproduce esa concisión y deja implícito el referente por el contexto del relato, sin añadir «hermano» que aquí no está expresado en la cláusula.
- source_word: ἔλαβεν αὐτήν
  english_pob_choice: took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - se casó con ella
  - la recibió
  lexicon: BDAG
  rationale: λαμβάνω tiene el sentido básico de «tomar/recibir». En este contexto matrimonial, la frase se entiende como tomarla por esposa; sin embargo, «la tomó» conserva mejor la forma verbal griega que una explicitación interpretativa como «se casó con ella».
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω pide una equivalencia directa y sobria. «Murió» es la forma más natural y fiel en español; las otras opciones suavizan o alteran el tono narrativo.
- source_word: μὴ καταλιπὼν
  english_pob_choice: leaving no
  chosen_spanish: sin dejar
  alternatives_spanish:
  - no dejando
  - sin haber dejado
  lexicon: BDAG
  rationale: La participación aorística con μή expresa la circunstancia concomitante/resultante de la muerte. «Sin dejar» es la construcción más idiomática en español y preserva la relación entre la muerte y la ausencia de descendencia.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - hijos
  - semilla
  lexicon: BDAG
  rationale: En el contexto del matrimonio levirático, σπέρμα denota prole/descendencia, no «semilla» en sentido literal. «Descendencia» mantiene el sentido genealógico y evita restringir indebidamente el referente a un solo hijo.
- source_word: ὁ τρίτος ὡσαύτως
  english_pob_choice: and the third likewise
  chosen_spanish: y el tercero igualmente
  alternatives_spanish:
  - y el tercero de la misma manera
  - y el tercero lo mismo
  lexicon: BDAG
  rationale: ὡσαύτως significa «igualmente / de la misma manera». «Igualmente» reproduce bien la brevedad del griego y mantiene la elipsis de la acción repetida que el contexto ya provee.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés coinciden de forma alta; no se registran revisiones aplicadas. La versión española sigue esa lectura estable, manteniendo la brevedad narrativa y la ambigüedad contextual de λαμβάνω sin sobreexplicarla en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «la tomó» en coherencia con el valor léxico básico de λαμβάνω y con la decisión inglesa de conservar la forma menos interpretativa.
  - Se usa «descendencia» para σπέρμα por claridad natural en español y por corresponder al contexto de sucesión familiar.
  - «Igualmente» conserva el adverbio ὡσαύτως sin añadir un paralelismo inexistente en el griego.
