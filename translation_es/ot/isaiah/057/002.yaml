translation:
  language: es
  text: Él entra en paz[a]; ellos reposan sobre sus lechos[b], cada uno que anda en rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Él viene a la paz". El verbo hebreo puede verterse de ambas maneras en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo alterna entre singular y plural: "él entra... ellos reposan... cada uno... en su rectitud".'
    reason: alternative_reading
  - marker: c
    text: 'O: "que anda rectamente" o "que anduvo en su rectitud".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָב֣וֹא
  english_pob_choice: enters
  chosen_spanish: entra
  alternatives_spanish:
  - viene
  - entrará
  lexicon: HALOT
  rationale: El verbo hebreo בוא puede verterse como 'venir' o 'entrar'. En este contexto poético, la idea es la transición del justo hacia un estado de paz; 'entra' suena natural en español y conserva esa llegada a la paz sin sobrecargar el tiempo verbal.
- source_word: שָׁל֔וֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. 'Paz' es la opción más concisa y pública en español; mantiene el valor general del término sin explicarlo en exceso.
- source_word: יָנ֖וּחוּ
  english_pob_choice: they rest
  chosen_spanish: reposan
  alternatives_spanish:
  - descansan
  - tienen descanso
  lexicon: HALOT
  rationale: נוח expresa reposo/descanso. 'Reposan' conserva la imagen de quietud, funciona bien con el registro poético y permite oír también el trasfondo de descanso en muerte sin decir más de lo que el texto dice.
- source_word: עַל מִשְׁכְּבוֹתָ֑ם
  english_pob_choice: on their beds
  chosen_spanish: sobre sus lechos
  alternatives_spanish:
  - en sus camas
  - sobre sus lugares de reposo
  lexicon: HALOT
  rationale: מִשְׁכָּב/מִשְׁכְּבוֹת puede ser 'lecho/cama' y aquí funciona como imagen de reposo. 'Lechos' preserva el tono poético y la metáfora; 'sus lechos' respeta el plural del sufijo.
- source_word: הֹלֵ֖ךְ
  english_pob_choice: who walks
  chosen_spanish: que anda
  alternatives_spanish:
  - que camina
  - andando
  lexicon: HALOT
  rationale: El participio הולך describe una conducta continua. 'Que anda' es idiomático en español y refleja la idea de una manera de vivir, sin convertirlo en un pasado cerrado ni perder el matiz participial.
- source_word: נְכֹחֽוֹ
  english_pob_choice: in his uprightness
  chosen_spanish: en su rectitud
  alternatives_spanish:
  - en su integridad
  - derechamente
  lexicon: HALOT
  rationale: נכח comunica lo recto, derecho u upright. 'Rectitud' expresa bien el sentido ético en español y mantiene la relación con el justo del contexto. El posesivo se conserva para reflejar el sufijo hebreo.
theological_decisions:
- issue: Cambio de número dentro del versículo
  english_pob_reading: Singular at the first clause, plural at the second, then distributive final clause.
  chosen_spanish_reading: Singular en 'Él entra en paz' y plural en 'reposan sobre sus lechos', con cierre distributivo 'cada uno que anda en su rectitud'.
  alternative_spanish_readings:
  - 'Regularizar todo en singular: ''Él entra... reposa...''.'
  - 'Regularizar todo en plural: ''Ellos entran... reposan...''.'
  - Hacer explícito el distributivo con 'cada uno de los que andan...'.
  - Usar una sola referencia personal en todo el verso.
  rationale: El hebreo pasa de singular a plural y luego a una frase participial distributiva. Conviene conservar esa tensión en español en vez de nivelarla, porque forma parte de la textura del verso y de su enfoque sobre el justo/los justos.
  doctrine_reference: Translation philosophy §3; preservar tensiones interpretativas del texto
- issue: Imagen de reposo y muerte
  english_pob_reading: Retain the metaphor of resting on beds without explicit doctrinal claim about the intermediate state.
  chosen_spanish_reading: Conservar la imagen de reposo en lechos, sin definir si se trata de tumba, sueño o estado intermedio.
  alternative_spanish_readings:
  - '''Descansan en sus sepulcros'''
  - '''Duermen en paz'''
  - '''Reposan en el cielo'''
  rationale: El texto comunica paz y reposo para el justo, pero no especifica más. La traducción debe preservar el consuelo y la imagen poética sin añadir una doctrina que el verso no formula.
  doctrine_reference: Translation philosophy §1 y §3; prudencia doctrinal al traducir
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del inglés al reflejar el participio con valor durativo mediante 'que anda', y conserva la alternancia de número del hebreo en lugar de normalizarla. También evita añadir una interpretación doctrinal sobre el estado de los muertos, manteniendo la metáfora de reposo en lechos.
  spanish_consistency_notes:
  - Se usa 'paz' para שָׁלוֹם y 'rectitud' para נְכֹחַ, en coherencia con el registro bíblico y sin reemplazarlo por formulaciones eclesiásticas más tradicionales.
  - '''Lechos'' conserva la imagen poética de ''beds'' mejor que ''camas'' en un texto de tono elevado.'
  - Se mantiene el sujeto singular implícito en la primera cláusula y el distributivo final para no borrar la oscilación numérica del hebreo.
  - No se usa 'SEÑOR' ni otros sustitutos para el nombre divino, pues este versículo no contiene el Tetragrámaton.
