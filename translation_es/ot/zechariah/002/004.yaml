translation:
  language: es
  text: 'Entonces dije: «¿Qué vienen estos a hacer?». Y él dijo: «Estos son los cuernos[a] que dispersaron a Judá, de modo que nadie levantó la cabeza; y estos han venido para aterrorizarlos, para derribar[b] los cuernos de las naciones que alzaron un cuerno contra la tierra de Judá para dispersarla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «cuernos»; se conserva la imagen simbólica de poder agresivo en lugar de interpretarla en el texto principal.
    reason: cultural_note
  - marker: b
    text: 'O: «echar abajo» los cuernos de las naciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר / וַיֹּאמֶר
  english_pob_choice: Then I said / And he said
  chosen_spanish: Entonces dije / Y él dijo
  alternatives_spanish:
  - Luego dije / Y él dijo
  - Entonces yo dije / Y respondió
  lexicon: WLC + POB audit trail
  rationale: Se conserva la secuencia narrativa del relato de visión con una introducción temporal natural en español, sin añadir contenido no presente en el hebreo.
- source_word: מָה אֵלֶּה בָאִים לַעֲשׂוֹת
  english_pob_choice: What are these coming to do?
  chosen_spanish: ¿Qué vienen a hacer?
  alternatives_spanish:
  - ¿Qué es lo que vienen a hacer?
  - ¿Para qué vienen estos?
  lexicon: WLC + HALOT
  rationale: La pregunta se mantiene directa y idiomática. El participio con infinitivo se vierte de manera natural en español sin perder la inmediatez de la escena visionaria.
- source_word: הַקְּרָנוֹת / קֶרֶן
  english_pob_choice: horns / a horn
  chosen_spanish: cuernos
  alternatives_spanish:
  - astas
  - poderes
  lexicon: HALOT
  rationale: Se conserva la imagen profética literal de los cuernos para mantener el simbolismo de poder agresivo. Se evita interpretar el símbolo en el texto principal.
- source_word: זֵרוּ
  english_pob_choice: scattered
  chosen_spanish: dispersaron
  alternatives_spanish:
  - esparcieron
  - desparramaron
  lexicon: HALOT
  rationale: «Dispersaron» expresa con naturalidad la acción de dispersión/judgment en español y preserva la imagen del texto fuente. «Esparcieron» sería posible, pero aquí suena menos preciso en el registro profético.
- source_word: כְּפִי אִישׁ לֹא נָשָׂא רֹאשׁוֹ
  english_pob_choice: so that no one lifted up his head
  chosen_spanish: de modo que nadie levantó su cabeza
  alternatives_spanish:
  - de modo que ningún hombre alzó su cabeza
  - de manera que nadie alzó la cabeza
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español se vierte de forma natural como humillación o abatimiento. Se mantiene el sentido de no poder erguirse, sin sobrecargar el texto con una glosa.
- source_word: לְהַחֲרִיד
  english_pob_choice: to terrify
  chosen_spanish: para aterrorizarlos
  alternatives_spanish:
  - para espantarlos
  - para hacerlos temblar
  lexicon: HALOT
  rationale: «Aterrorizarlos» reproduce bien la fuerza del verbo en este contexto de juicio. Se conserva el referente pronominal plural implícito del contexto inmediato.
- source_word: לְיַדּוֹת
  english_pob_choice: to cast down
  chosen_spanish: para derribar
  alternatives_spanish:
  - para abatir
  - para tirar abajo
  lexicon: HALOT
  rationale: El verbo es raro y de sentido discutido; «derribar» expresa de manera clara y natural la idea contextual de hacer caer los cuernos hostiles. «Abatir» también sería posible, pero aquí «derribar» mantiene mejor la concreción visual.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: En el contexto profético, se refiere a poderes extranjeros hostiles. «Las naciones» es la equivalencia más precisa y natural en español.
- source_word: הַנֹּשְׂאִים קֶרֶן
  english_pob_choice: that lifted up a horn
  chosen_spanish: que alzaron un cuerno
  alternatives_spanish:
  - que levantaron un cuerno
  - que exaltaron su poder
  lexicon: HALOT
  rationale: Se mantiene la metáfora del cuerno y el gesto de elevarlo como señal de poder o arrogancia. No se sustituye por un abstracto que borre la imagen.
- source_word: אֶרֶץ יְהוּדָה
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el país de Judá
  - la tierra de Judá
  lexicon: HALOT
  rationale: «Tierra» corresponde bien al hebreo אֶרֶץ y preserva el tono bíblico sin volverse arcaizante.
theological_decisions:
- issue: Conservación de la imagen de los cuernos como símbolo de poder hostil
  english_pob_reading: Keep the metaphor literal in the main text ('horns') rather than interpret it as 'powers' or 'kingdoms.'
  chosen_spanish_reading: Mantener la imagen literal de los cuernos en el texto principal, sin traducirla como 'poderes'.
  alternative_spanish_readings:
  - Estas son las potencias que dispersaron a Judá
  - Estas son los reinos que dispersaron a Judá
  rationale: La visión depende del contraste entre cuernos y artesanos/forjadores. Mantener la imagen literal conserva la coherencia literaria y evita interpretar el símbolo en la traducción principal.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Tratamiento de la cláusula idiomática sobre la humillación
  english_pob_reading: Or, 'so that no one lifted up his head.' The Hebrew reads literally, 'according to the mouth of a man, he did not lift up his head,' an idiom expressing humiliation or helplessness.
  chosen_spanish_reading: 'Traducir la cláusula como humillación/abatimiento: ''de modo que nadie levantó su cabeza''.'
  alternative_spanish_readings:
  - de modo que ningún hombre alzó su cabeza
  - de manera que no pudo levantar la cabeza
  rationale: El hebreo es idiomático y el sentido principal es el abatimiento extremo. El español moderno puede expresarlo sin necesidad de glosa extensa en el texto principal.
  doctrine_reference: Translation philosophy §4
- issue: Elección de un equivalente español para el verbo de irrupción/activación de temor
  english_pob_reading: These have come to terrify them
  chosen_spanish_reading: Estas han venido para aterrorizarlos
  alternative_spanish_readings:
  - Estas han venido para hacerlos temblar
  - Estas han venido para espantarlos
  rationale: La finalidad del verbo es causar temor intenso; 'aterrorizarlos' transmite adecuadamente la fuerza del contexto de juicio.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador inglés más reciente corrigió 'no man' a 'no one' por naturalidad contemporánea, sin alterar el sentido. En español, 'nadie' cumple esa misma función natural sin perder la referencia idiomática al abatimiento. Se mantuvo además la imagen literal de 'horns' y la solución contextual para לְיַדּוֹת como 'derribar', conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Judá' en todo el versículo para la entidad histórica/geográfica.
  - Se conserva la metáfora de 'cuernos' de forma uniforme en la frase principal.
  - '''Tierra de Judá'' traduce consistentemente אֶרֶץ יְהוּדָה sin expansión interpretativa.'
  - La cláusula idiomática se resuelve con 'nadie levantó su cabeza', manteniendo el tono bíblico pero en español natural.
  - Se usó 'aterrorizarlos' y 'derribar' para reflejar dos verbos distintos del hebreo sin colapsarlos en una sola idea.
