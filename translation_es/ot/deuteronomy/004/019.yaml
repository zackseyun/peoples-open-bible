revisions:
- from: Y cuídate de alzar tus ojos al cielo[a], y al ver el sol, la luna y las estrellas, todo el ejército de los cielos, te desvíes y te inclines ante ellos y les sirvas[b], a los cuales Yahvé tu Dios ha repartido entre todos los pueblos debajo de todos los cielos.
  to: Y cuídate de alzar tus ojos al cielo, y al ver el sol, la luna y las estrellas, todo el ejército del cielo, te desvíes y te inclines ante ellos y les sirvas, los cuales Yahvé tu Dios ha repartido[a] a todos los pueblos debajo de todos los cielos[b].
  rationale: La revisión corrige la ubicación de las notas para que coincidan con las decisiones léxicas auditadas, ajusta «entre» a «a» para reflejar mejor el hebreo distributivo, y mejora la naturalidad de «ejército del cielo» sin alterar el sentido. No se requiere rehacer la traducción, solo un ajuste preciso.
