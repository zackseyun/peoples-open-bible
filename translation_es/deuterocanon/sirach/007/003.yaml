translation:
  language: es
  text: No busques autoridad de Dios[a], ni del rey un asiento de honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo griego aquí lee una sentencia distinta: «Hijo, no siembres en surcos de injusticia, y no los segarás siete veces». El texto principal sigue el testigo hebreo conservado para este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תְּבַקֵּשׁ
  english_pob_choice: Do not seek
  chosen_spanish: No busques
  alternatives_spanish:
  - No pidas
  - No procuras
  lexicon: HALOT
  rationale: בקש puede expresar buscar, pedir o desear. «Busques» conserva el valor volitivo y amplio de la advertencia sin volverla demasiado técnica o limitada a una solicitud verbal.
- source_word: מֵאֵל
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - de parte de Dios Todopoderoso
  lexicon: HALOT
  rationale: En español, «de parte de Dios» hace explícita la idea de procedencia o favor solicitado sin forzar un matiz que no está en el hebreo. Mantiene la referencia directa a אֵל como Dios.
- source_word: מֶמְשֶׁלַת
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - dominio
  - gobierno
  - poder
  lexicon: HALOT
  rationale: ממשלה denota gobierno, dominio o autoridad gobernante. «Autoridad» funciona bien en español moderno y conserva el sentido de poder o cargo sin restringirlo solo a territorio o reinado.
- source_word: וְכֵן
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y tampoco
  - ni siquiera
  lexicon: HALOT
  rationale: Aunque literalmente significa «y asimismo / y así también», en una prohibición coordinada el español natural usa «ni» para reproducir la fuerza negativa paralela del segundo miembro.
- source_word: מִמֶּלֶךְ
  english_pob_choice: from the king
  chosen_spanish: del rey
  alternatives_spanish:
  - de un rey
  lexicon: HALOT
  rationale: El hebreo usa una forma singular genérica; «del rey» suena natural y mantiene la referencia a la fuente de honor o autoridad sin añadir indefinición innecesaria.
- source_word: מוֹשַׁב כָּבוֹד
  english_pob_choice: a seat of honor
  chosen_spanish: un asiento de honor
  alternatives_spanish:
  - un sitial de honor
  - un puesto de honor
  - un lugar de honor
  lexicon: HALOT
  rationale: מוֹשב es literalmente un asiento o lugar de sentarse, y כבוד añade honor. «Asiento de honor» conserva la imagen concreta y evita sustituirla por un término más abstracto como «puesto».
theological_decisions:
- issue: 'Base textual: hebreo extante frente al paralelo griego diferente'
  english_pob_reading: Translate the extant Hebrew as the primary text, while noting that the Greek parallel reads a different saying.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal, y señalar en nota que el testigo griego ofrece otra sentencia distinta.
  alternative_spanish_readings:
  - Son, no siembres en surcos de injusticia, y no los segarás siete veces.
  rationale: Para Sirácida, el proyecto traduce del hebreo donde se conserva. Aquí el hebreo presenta una admonición sobre no buscar autoridad ni un asiento de honor, mientras que el griego paralelo transmite otra sentencia. Como la divergencia es material, no se armoniza en el texto principal; se preserva en nota como testimonio alterno.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobrevive; preservar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantuvo la decisión de traducir el hebreo extante como texto principal y dejar el paralelo griego en nota textual.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֵל conforme al criterio del proyecto.
  - Se usó «ni» para reproducir la coordinación negativa natural del hebreo en español.
  - «Asiento de honor» conserva la imagen concreta de מוֹשַׁב כָּבוֹד sin sobreinterpretarla.
