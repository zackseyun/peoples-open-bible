translation:
  language: es
  text: 'Y ella miró, y he aquí que el rey estaba de pie junto a la columna[a], conforme a la costumbre, y los oficiales y los trompeteros junto al rey; y todo el pueblo del país se alegraba y tocaba las trompetas. Entonces Atalía rasgó sus vestidos y gritó: «¡Conspiración! ¡Conspiración!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al lado de la columna». El hebreo permite más de una lectura locativa de la preposición aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: And she looked
  chosen_spanish: Y ella miró
  alternatives_spanish:
  - Y ella vio
  lexicon: HALOT
  rationale: En español, «miró» conserva mejor la idea narrativa de reparar de pronto en la escena, en paralelo con el golpe de efecto de «he aquí». «Vio» también es posible, pero es menos vívido aquí.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: «He aquí» comunica en español el valor deíctico y dramático de la partícula hebrea, sin volverla una paráfrasis excesiva.
- source_word: הַמֶּלֶךְ עֹמֵד
  english_pob_choice: the king was standing
  chosen_spanish: el rey estaba de pie
  alternatives_spanish:
  - el rey estaba parado
  - el rey se hallaba de pie
  lexicon: HALOT
  rationale: El participio presenta una acción/estado en curso; «estaba de pie» conserva ese valor durativo con español natural.
- source_word: עַל הָעַמּוּד
  english_pob_choice: by the pillar
  chosen_spanish: junto a la columna
  alternatives_spanish:
  - al lado de la columna
  - en la columna
  - sobre la columna
  lexicon: HALOT
  rationale: El hebreo puede entenderse locativamente de varias maneras; aquí «junto a la columna» refleja el valor contextual de proximidad sin decidir indebidamente por una lectura más específica.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the custom
  chosen_spanish: conforme a la costumbre
  alternatives_spanish:
  - según la costumbre
  - como era la norma
  - según el rito
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí no es «juicio» sino práctica establecida. «Costumbre» expresa bien el procedimiento ceremonial aludido.
- source_word: וְהַשָּׂרִים
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los jefes
  - los comandantes
  - los príncipes
  lexicon: HALOT
  rationale: «Oficiales» funciona como término amplio y neutral para los líderes presentes en el contexto cortesano-militar.
- source_word: וְהַחֲצֹצְרוֹת
  english_pob_choice: the trumpeters
  chosen_spanish: los trompeteros
  alternatives_spanish:
  - los que tocaban las trompetas
  - los trompetistas
  lexicon: HALOT
  rationale: Sigo la revisión del POB inglés que entendió aquí personas, no instrumentos. «Trompeteros» es claro y corresponde al hebreo en este contexto ceremonial.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: beside the king
  chosen_spanish: junto al rey
  alternatives_spanish:
  - al rey
  - cerca del rey
  - delante del rey
  lexicon: HALOT
  rationale: La preposición puede indicar cercanía o presencia en torno al rey; «junto al rey» mantiene esa proximidad sin sobredeterminar la orientación.
- source_word: וְכָל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - todo el pueblo del país
  - toda la gente del país
  lexicon: HALOT
  rationale: La expresión hebrea es fija y se conserva de manera bastante literal. «De la tierra» sigue el hebreo, aunque en español puede sonar formal; se mantiene por su valor técnico.
- source_word: שָׂמֵחַ
  english_pob_choice: were rejoicing
  chosen_spanish: se alegraba
  alternatives_spanish:
  - estaba alegre
  - estaba celebrando
  - se regocijaba
  lexicon: HALOT
  rationale: El adjetivo denota gozo manifiesto en la escena; «se alegraba» evita un calco demasiado rígido y transmite bien la actitud colectiva.
- source_word: וְתֹקֵעַ בַּחֲצֹצְרוֹת
  english_pob_choice: and blowing trumpets
  chosen_spanish: y tocaba las trompetas
  alternatives_spanish:
  - y hacía sonar las trompetas
  - y soplaba las trompetas
  lexicon: HALOT
  rationale: «Tocar las trompetas» es la forma natural en español para el acto instrumental. La revisión inglesa aclaró que aquí no se trata de los instrumentos sino de quienes los tocan; el español lo expresa con el verbo y el objeto.
- source_word: וַתִּקְרַע ... אֶת בְּגָדֶיהָ
  english_pob_choice: Athaliah tore her clothes
  chosen_spanish: Atalía rasgó sus vestidos
  alternatives_spanish:
  - Atalía desgarró sus vestidos
  - Atalía rasgó sus ropas
  lexicon: HALOT
  rationale: «Rasgó» preserva el gesto de duelo/indignación; «vestidos» es más idiomático y digno en este contexto que «ropa».
- source_word: קֶשֶׁר קָשֶׁר
  english_pob_choice: Conspiracy! Conspiracy!
  chosen_spanish: ¡Conspiración! ¡Conspiración!
  alternatives_spanish:
  - ¡Traición! ¡Traición!
  - ¡Complot! ¡Complot!
  lexicon: HALOT
  rationale: Se mantiene el valor léxico directo de קֶשֶׁר como «conspiración». «Traición» sería interpretivo y más fuerte de lo que el hebreo exige.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'the trumpets' por 'the trumpeters', reconociendo que el hebreo se refiere a personas en el sintagma correspondiente. La redacción española refleja esa corrección con «los trompeteros» y conserva el resto de la escena con equivalencia óptima y registro bíblico claro.
  spanish_consistency_notes:
  - Se usa «Atalía» para el nombre propio, de acuerdo con la forma española habitual.
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton.
  - «Conspiración» traduce de forma directa קֶשֶׁר sin intensificarlo a «traición».
  - La expresión fija «todo el pueblo de la tierra» se conserva por su valor técnico en el hebreo.
  - «Trompeteros» se eligió para respetar la revisión auditada que identifica personas, no instrumentos.
