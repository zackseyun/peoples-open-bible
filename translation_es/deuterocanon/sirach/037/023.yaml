translation:
  language: es
  text: 'La raíz de los planes del corazón[a][b]: cuatro ramas florecerán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado aquí es difícil y difiere marcadamente del griego. La variante griega más clara dice: «Un hombre sabio instruye a su propio pueblo, y los frutos de su entendimiento son dignos de confianza».'
    reason: textual_variant
  - marker: b
    text: 'El testimonio hebreo preserva literalmente una frase oscura, aproximadamente: «el arrancamiento/la corona de las intrigas del corazón; cuatro hombros(?) florecerán», pero la redacción es incierta y probablemente está corrompida o mal conservada.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνὴρ σοφός
  english_pob_choice: a wise man
  chosen_spanish: Un hombre sabio
  alternatives_spanish:
  - Una persona sabia
  - Un sabio
  lexicon: BDAG
  rationale: El griego usa ἀνὴρ, masculino singular. En español, «hombre sabio» conserva ese valor sin volver la frase pesada ni rebajar la cualidad sapiencial.
- source_word: τὸν ἑαυτοῦ λαόν
  english_pob_choice: his own people
  chosen_spanish: a su propio pueblo
  alternatives_spanish:
  - a su pueblo
  - a su propia gente
  lexicon: BDAG
  rationale: «Pueblo» refleja λαός de manera natural en español y «propio» conserva el énfasis de ἑαυτοῦ.
- source_word: παιδεύσει
  english_pob_choice: instructs
  chosen_spanish: instruye
  alternatives_spanish:
  - educa
  - disciplina
  - forma
  lexicon: BDAG
  rationale: En un dicho sapiencial, el futuro griego puede expresarse como presente gnómico en español. «Instruye» mantiene el sentido pedagógico de παιδεύω sin endurecerlo como «disciplina».
- source_word: οἱ καρποὶ
  english_pob_choice: the fruits
  chosen_spanish: los frutos
  alternatives_spanish:
  - el fruto
  - los resultados
  lexicon: BDAG
  rationale: El plural del griego se conserva con «los frutos», manteniendo la metáfora agrícola sin abstractizarla.
- source_word: τῆς συνέσεως αὐτοῦ
  english_pob_choice: of his understanding
  chosen_spanish: de su entendimiento
  alternatives_spanish:
  - de su comprensión
  - de su discernimiento
  lexicon: BDAG
  rationale: «Entendimiento» traduce σύνεσις con amplitud y fluidez en español, preservando el sentido de capacidad comprensiva en literatura sapiencial.
- source_word: πιστοί
  english_pob_choice: trustworthy
  chosen_spanish: dignos de confianza
  alternatives_spanish:
  - fiables
  - fieles
  - seguros
  lexicon: BDAG
  rationale: En español, «dignos de confianza» comunica mejor la cualidad de fiabilidad del predicado que «fieles», que podría sonar más relacional o religioso.
theological_decisions:
- issue: Relación entre la tradición griega clara y el hebreo difícil/oscuro
  english_pob_reading: 'The main text follows the clearer Greek witness: ''A wise man instructs his own people, and the fruits of his understanding are trustworthy.'''
  chosen_spanish_reading: 'Se sigue el testimonio griego claro: «Un hombre sabio instruye a su propio pueblo, y los frutos de su entendimiento son dignos de confianza.»'
  alternative_spanish_readings:
  - El hebreo oscuro podría aludirse de modo aproximado como «la raíz de los planes del corazón; cuatro ramas florecerán»
  - Una traducción literal tentativa del hebreo, pero incierta, no se adopta como texto principal
  rationale: El expediente muestra que el hebreo conservado es difícil y que la revisión aprobó abandonar el borrador ajeno al texto. Por eso el texto español principal sigue el griego, que aquí ofrece un sentido claro y auditado.
  doctrine_reference: Sirach 37:23 textual witness / canon-critical translation decision
translation_notes:
  revision_awareness: 'Este borrador corrige el problema detectado en la validación anterior: no incluye notas al pie sin anclaje en el texto. También refleja la revisión que sustituyó el borrador no relacionado por una traducción basada en el testimonio griego claro, con el hebreo reconocido como oscuro e incierto.'
  spanish_consistency_notes:
  - Se mantiene «pueblo» para λαός en lugar de «nación», porque el contexto no exige una carga política más fuerte.
  - Se usa presente gnómico en español para un futuro griego sapiencial, como es natural en proverbios.
  - No se introduce «Cristo», «SEÑOR» ni otra terminología no presente en este versículo.
  - «Entendimiento» y «dignos de confianza» preservan el tono sapiencial sin endurecer el dicho.
