base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/025.yaml
  text: Among the slain they made a bed for her with all her multitude[a]; her graves are all around her. All of them are uncircumcised, slain by the sword, because their terror was set in the land of the living. So they bore their disgrace with those who go down to the pit[c][b]; she was placed among the slain.
  footnotes:
  - marker: a
    text: Hebrew shifts from feminine ('her') to masculine ('him/his') in the middle of the verse, likely moving between the nation personified and its representative figure. The translation preserves this shift.
    reason: alternative_reading
  - marker: b
    text: Or 'because they spread their terror in the land of the living.' The Hebrew literally says 'because their terror was set in the land of the living.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he was placed among the slain,' if the final singular is taken to refer to a masculine representative rather than the nation personified as feminine.
    reason: alternative_reading
