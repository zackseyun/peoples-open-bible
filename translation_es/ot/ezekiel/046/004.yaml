review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: la ofrenda es un holocausto presentado por el príncipe a Yahvé en el día de sábado, compuesto de seis corderos y un carnero sin defecto. También mantiene correctamente «Yahvé» para יהוה y «príncipe» para הַנָּשִׂיא. Sin embargo, hay dos ajustes necesarios: (1) «en el día de sábado» suena poco natural en español y no refleja bien la forma idiomática más fiel; «en el día de reposo» o «en el día de sábado» además introduce una formulación extraña. «En el día de descanso» sería una glosa; lo más directo y fiel es «en el día de reposo» o «en el sábado». Dado el registro bíblico y la estructura hebrea, «en el día de reposo» funciona mejor. (2) La nota al pie está mal formulada: dice «O “presenta”», repitiendo la lectura principal, cuando la alternativa documentada en inglés es «ofrece»; además «literalmente significa “acerca”» necesita forma verbal natural en español.'
  spanish_quality_summary: El texto es claro, pero «en el día de sábado» suena forzado en español neutro eclesial. El resto es legible y digno. «Holocausto», «corderos», «carnero» y «sin defecto» son buenas elecciones. La nota al pie necesita reparación para ser comprensible y útil.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה → «Yahvé» correctamente; עֹלָה → «holocausto» aceptable y estable en contexto sacrificial; הַנָּשִׂיא → «el príncipe» correcto; תמים → «sin defecto» correcto. No hay conflicto doctrinal. La única desviación relevante es estilística/idiomática en la expresión del sábado y un error en la nota léxica.'
  issues:
  - severity: medium
    issue: 'Expresión temporal poco natural: «en el día de sábado»'
    rationale: Aunque intenta reflejar בְּיוֹם הַשַּׁבָּת, en español suena rígido y poco idiomático. Una forma bíblica y clara es «en el día de reposo», que preserva la explicitud temporal sin calco torpe.
  - severity: medium
    issue: 'Nota al pie incorrecta: «O “presenta”» repite la lectura principal'
    rationale: La alternativa documentada por el POB inglés es «ofrece», no «presenta». La nota también debe explicar que el verbo literalmente significa «acerca» o «trae cerca» en uso sacrificial, con redacción natural en español.
  revised_spanish_text: Y el holocausto que el príncipe presenta a Yahvé en el día de reposo será de seis corderos sin defecto y un carnero sin defecto[a].
  revised_footnotes:
  - marker: a
    text: O «ofrece»; el verbo hebreo literalmente significa «acerca» o «trae cerca» en uso sacrificial.
    reason: lexical_alternative
  revision_rationale: Se corrige una formulación española poco natural («en el día de sábado») por una expresión bíblica clara y ampliamente inteligible («en el día de reposo»). También se repara la nota al pie para que preserve la alternativa léxica real documentada por el POB inglés y explique mejor el sentido literal del verbo sacrificial. No se requieren cambios doctrinales ni estructurales mayores.
