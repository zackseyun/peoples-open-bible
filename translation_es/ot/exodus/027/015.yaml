translation:
  language: es
  text: Y para el segundo lado, quince codos de cortinajes[a][b], con tres pilares y sus tres bases.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, una longitud de quince codos, no quince piezas separadas; la unidad de medida se sobreentiende por el contexto inmediato.
    reason: source_note
  - marker: b
    text: O 'cortinas' o 'lienzos' para los paños colgantes que formaban el cerramiento.
    reason: lexical_alternative
  - marker: c
    text: O 'zócalos'. El término se refiere a las piezas de base en que se asentaban los pilares.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/כָּתֵף
  english_pob_choice: And for the ... side
  chosen_spanish: Y para el segundo lado
  alternatives_spanish:
  - Y en el segundo lado
  - Y para el otro lado
  - Y para el flanco segundo
  lexicon: HALOT
  rationale: כָּתֵף en este contexto arquitectónico designa un costado o flanco del recinto, no una ‘hombro’ literal. En español, ‘lado’ comunica con naturalidad la función espacial sin perder el sentido estructural.
- source_word: הַ/שֵּׁנִית
  english_pob_choice: second
  chosen_spanish: segundo
  alternatives_spanish:
  - otro
  - segundo correspondiente
  lexicon: HALOT
  rationale: El ordinal hebreo indica claramente el lado opuesto o correspondiente. ‘Segundo’ mantiene la relación directa con el hebreo y con el paralelismo del pasaje.
- source_word: חְמֵשׁ עֶשְׂרֵה
  english_pob_choice: fifteen cubits of hangings
  chosen_spanish: quince codos de cortinas
  alternatives_spanish:
  - quince codos de cortinajes
  - quince codos de hangings
  - quince codos de lienzos
  lexicon: HALOT
  rationale: 'La revisión inglesa corrigió que el número cuantifica una longitud, no quince piezas. En español se expresa la medida implícita por el contexto inmediato: ‘codos’. ‘Cortinas’ comunica el tejido colgante del cierre del atrio; ‘lienzos’ o ‘cortinajes’ serían posibles, pero ‘cortinas’ es suficientemente claro y natural.'
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos
  - cortinajes
  - hangings
  lexicon: HALOT
  rationale: El término se refiere a los paños colgantes de lino que forman la cerca del atrio. ‘Cortinas’ es una equivalencia comprensible y reverente en español, aunque ‘lienzos’ también podría reflejar el material tejido.
- source_word: עַמֻּדֵי/הֶם
  english_pob_choice: their three pillars
  chosen_spanish: tres columnas
  alternatives_spanish:
  - tres pilares
  - tres postes
  - sus tres columnas
  lexicon: HALOT
  rationale: עַמּוּד puede rendirse como ‘pilar’, ‘columna’ o ‘poste’. En español bíblico contemporáneo, ‘columnas’ suena más natural para soportes arquitectónicos y evita un tono demasiado técnico. El posesivo se omite por economía natural del español, ya que el contexto lo recupera.
- source_word: וְ/אַדְנֵי/הֶם
  english_pob_choice: and their three bases
  chosen_spanish: sus tres bases
  alternatives_spanish:
  - y sus tres bases
  - y sus tres zócalos
  - y sus tres sockets
  lexicon: HALOT
  rationale: אֶדֶן designa la pieza de apoyo o encaje de los pilares. ‘Bases’ es la opción más clara y fiel para español general; ‘zócalos’ sería más interpretativo, y ‘sockets’ demasiado técnico o anglicado.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para corregir un problema de traducción en la cuantificación: el hebreo no indica quince objetos, sino una extensión de quince codos, implícita por el paralelismo con el versículo anterior. También se simplificó en inglés la frase posesiva con las columnas y bases. La presente versión española sigue esa corrección y conserva el detalle técnico del mobiliario del atrio.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se traduce כָּתֵף como ‘lado’, en línea con el contexto de construcción del tabernáculo.
  - Se conserva la medida implícita ‘codos’ por el contexto inmediato y la revisión auditada.
  - Se emplea ‘bases’ para אֶדֶן como término técnico coherente con el mobiliario del tabernáculo.
  - Se evita una transliteración innecesaria como ‘hangings’ o ‘sockets’ en el texto principal, reservando alternativas en nota.
