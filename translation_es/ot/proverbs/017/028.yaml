translation:
  language: es
  text: Hasta el necio, callado, pasa por sabio; el que cierra sus labios[a], por prudente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es tenido por sabio ... prudente». El hebreo subraya que el silencio puede hacer que hasta un necio parezca sabio y prudente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Hasta
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: 'En este proverbio introduce una sorpresa concesiva: aun el necio puede parecer sabio. ''Hasta'' reproduce bien ese valor enfático en español natural.'
- source_word: אֱוִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  lexicon: HALOT
  rationale: 'En literatura sapiencial, el término describe más que falta de inteligencia: una necedad moral y práctica. ''Necio'' conserva ese registro bíblico sin caer en tono demasiado coloquial.'
- source_word: מַחֲרִישׁ
  english_pob_choice: who keeps silent
  chosen_spanish: callado
  alternatives_spanish:
  - que guarda silencio
  - silencioso
  lexicon: HALOT
  rationale: El participio indica la condición de no hablar. 'Callado' es breve y natural en español, y mantiene la idea de silencio sin añadir matices ajenos.
- source_word: חָכָם יֵחָשֵׁב
  english_pob_choice: is considered wise
  chosen_spanish: pasa por sabio
  alternatives_spanish:
  - es considerado sabio
  - es tenido por sabio
  lexicon: HALOT
  rationale: El nifal de חשב expresa ser estimado o reputado como algo. 'Pasa por sabio' conserva el valor de reputación percibida, no una sabiduría real.
- source_word: אֹטֵם
  english_pob_choice: one who closes
  chosen_spanish: el que cierra
  alternatives_spanish:
  - quien cierra
  - el que sella
  lexicon: HALOT
  rationale: 'El verbo es literal: cerrar. Aquí se aplica a los labios; ''el que cierra'' mantiene la imagen corporal del hebreo.'
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su boca
  - sus palabras
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus labios'. Se conserva la imagen concreta porque el proverbio depende de esa metáfora física.
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: prudente
  alternatives_spanish:
  - discreto
  - entendido
  - perspicaz
  lexicon: HALOT
  rationale: En contexto sapiencial, נבון señala comprensión práctica y discernimiento. 'Prudente' funciona bien en español y empareja naturalmente con 'sabio' sin sobrecargar el verso.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo el marcador [a] exactamente en el texto de traducción, anclado en la frase correspondiente. No se introdujeron notas sueltas sin ancla.
  spanish_consistency_notes:
  - 'Se mantuvo la distinción sapiencial entre apariencia y realidad: el necio no llega a ser sabio, sino que ''pasa por sabio''.'
  - Se preservó la concreción de 'labios' para reflejar el hebreo y la imagen poética.
  - Se eligió 'prudente' para el segundo hemistiquio por su cercanía funcional a נבון en contexto de sabiduría práctica.
