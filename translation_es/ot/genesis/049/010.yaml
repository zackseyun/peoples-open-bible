    text: O ‘hasta que venga el que tiene el derecho’; el hebreo שילה es difícil y también se ha entendido como un título, un nombre de lugar o una referencia al tributo.
    reason: alternative_reading
  - marker: b
    text: O ‘y a él le pertenecerá la reunión de los pueblos’, o ‘la sumisión de los pueblos’.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota textual para que recaiga sobre ‘Shiloh’, que es el término explicado por la nota. También se mejora la naturalidad del español en la cláusula final con ‘a él le pertenecerá…’, preservando la misma fuerza semántica y la decisión léxica del POB. Se mantienen las decisiones principales auditadas y no hace falta una relectura doctrinal de fondo.
