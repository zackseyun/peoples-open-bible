  to: Pero comisiona a Josué[a], y fortalécelo[b] y anímalo[c], porque él cruzará delante de este pueblo, y él hará que hereden[d] la tierra que tú verás.
  rationale: Se corrige la disciplina de marcadores de notas usando anclas únicas y se mejora la naturalidad de la cláusula causativa final sin perder el sentido del hebreo ni la decisión léxica auditada en inglés.
