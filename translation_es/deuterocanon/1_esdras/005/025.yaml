translation:
  language: es
  text: los hijos de Fasor[a], 1.247.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo en Nehemías 7:37 dice en cambio: «los hijos de Lod, Hadid y Ono, 725». Aquí 1 Esdras refleja una posición y un contenido distintos de la lista en la tradición griega.'
