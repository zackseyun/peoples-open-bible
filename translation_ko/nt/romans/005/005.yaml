id: ROM.5.5
reference: Romans 5:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ δὲ ἐλπὶς οὐ καταισχύνει· ὅτι ἡ ἀγάπη τοῦ θεοῦ ἐκκέχυται ἐν ταῖς καρδίαις ἡμῶν διὰ πνεύματος ἁγίου τοῦ δοθέντος ἡμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/005.yaml
  text: And hope does not put to shame[a], because the love of God has been poured out in our hearts through the Holy Spirit[b], who was given to us.
  footnotes:
  - marker: a
    text: Or, less likely, “our love for God.”
    reason: alternative_reading
  - marker: b
    text: Or “does not disappoint.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 이 소망은 부끄럽게 하지 않습니다. 우리에게 주어진 성령을 통해 하나님의 사랑이 우리 마음에 부어졌기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καταισχύνει
  english_pob_choice: does not put to shame
  chosen_korean: 부끄럽게 하지 않습니다
  alternatives_korean:
  - 실망시키지 않습니다
  lexicon: BDAG
  rationale: 수치/명예 관념을 보존. 단순 「실망」으로 약화하지 않는다.
- source_word: ἀγάπη τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_korean: 하나님의 사랑
  alternatives_korean:
  - 하나님을 향한 우리의 사랑
  lexicon: BDAG
  rationale: '주어적 속격: 성령을 통해 우리에게 부어진 하나님의 사랑.'
- source_word: ἐκκέχυται
  english_pob_choice: has been poured out
  chosen_korean: 부어졌기 때문입니다
  lexicon: BDAG
  rationale: 완료 수동의 지속적 결과를 「부어졌다」로 옮김.
- source_word: πνεύματος ἁγίου
  english_pob_choice: Holy Spirit
  chosen_korean: 성령
  lexicon: BDAG
  rationale: 명백한 신적 영의 지시. 「성령」으로 옮긴다.
theological_decisions:
- issue: ἡ ἀγάπη τοῦ θεοῦ의 속격 해석
  chosen_reading: 주격적 속격(하나님께서 우리를 향해 가지신 사랑)
  alternative_readings:
  - 우리가 하나님을 향한 사랑
  rationale: 성령을 통해 우리 마음에 부어졌다는 후속 절이 주격적 속격을 강하게 지지한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension where ambiguity is genuine'
