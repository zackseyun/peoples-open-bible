base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/008.yaml
  text: Then the Rabshakeh returned and found the king of Assyria fighting against Libnah[b][a], for he had heard that he had departed from Lachish.
  footnotes:
  - marker: a
    text: Or 'the chief cupbearer.' The Hebrew/Assyrian title Rabshakeh is traditionally transliterated here because it functions as a court title and as the designation of this official in the narrative.
    reason: lexical_alternative
  - marker: b
    text: Or 'fighting at Libnah.' The Hebrew expression can be rendered more locatively, but the sense is that the king of Assyria was engaged in battle against the city.
    reason: lexical_alternative
