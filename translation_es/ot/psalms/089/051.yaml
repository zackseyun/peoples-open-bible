base_translation:
  language: en
  yaml_path: translation/ot/psalms/089/051.yaml
  text: Remember[a], Lord, the reproach of your servants[b], which I bear in my bosom from many peoples.
  footnotes:
  - marker: a
    text: Or 'I bear in my bosom the reproach of all the many peoples.' The Hebrew syntax after 'in my bosom' is compressed and may be taken either as the source of the reproach ('from many peoples') or as the content/extent of what is borne ('of all the many peoples').
    reason: alternative_reading
  - marker: b
    text: '''In my bosom'' is a Hebrew idiom for carrying something personally and intimately, not merely physically.'
    reason: cultural_note
