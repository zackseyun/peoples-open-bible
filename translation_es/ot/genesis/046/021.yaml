  yaml_path: translation/ot/genesis/046/021.yaml
  text: 'And the sons of Benjamin: Bela[a], Beker, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim[d][c][b], and Ard.'
  footnotes:
  - marker: a
    text: Traditional English versions often spell בֶּכֶר as “Becher.”
    reason: lexical_alternative
  - marker: b
    text: In Numbers 26:38, a parallel Benjaminite genealogy has “Ahiram” where this verse reads “Ehi.”
