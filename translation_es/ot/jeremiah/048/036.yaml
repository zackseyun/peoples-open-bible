  rationale: Se propone una revisión menor para alinear el topónimo principal con la decisión lexical auditada del POB (‘Kir-heres’), mejorar la naturalidad editorial de la nota sobre el nombre de lugar y pulir la formulación de la alternativa léxica final. El contenido principal y el sentido del verso se conservan.
