review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido retributivo del hebreo: יָשׁוּב / יֵרֵד se conservan como retorno/descenso, y חֲמָסוֹ como «su violencia». Sin embargo, עֲמָלוֹ en este contexto, según el expediente inglés, apunta más a «trouble/mischief» como mal o perjuicio que vuelve sobre el malvado, no tanto al daño que él sufre. «Su daño» en español puede sonar ambiguo hacia daño padecido; «su mal» conserva mejor el carácter de perjuicio/maldad que recae sobre él. También conviene alinear la nota alternativa con las opciones auditadas en inglés.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un pequeño ajuste de naturalidad y precisión semántica. «Sobre su propia cabeza» y «su violencia descenderá» funcionan bien. «Cráneo» es aceptable por la viveza concreta, aunque algo menos idiomático; la nota con «coronilla» resuelve bien la alternativa. La nota a necesita corrección de estilo y contenido: actualmente repite «daño» y no refleja bien las alternativas documentadas.'
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «Violencia» para חָמָס está bien. La decisión clave es léxica-contextual para עָמָל: mejor «mal» en español principal, con nota que preserve «maldad» o «daño/perjuicio» como alternativas, en línea con el razonamiento del POB.'
  issues:
