  yaml_path: translation/deuterocanon/4_maccabees/008/002.yaml
  text: Then[a], becoming deeply agitated, he ordered that others from among the Hebrews of that age be brought in; and if they would eat meat from the thigh, to release those who were brought in, but if they objected[c][b], to torture them more severely.
  footnotes:
