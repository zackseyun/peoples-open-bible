translation:
  language: es
  text: Quien me escucha juzgará rectamente[a], y quien me presta oído se alojará en mis aposentos interiores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «El que le obedece juzgará naciones, y el que se acerca a ella acampará con confianza». El testimonio hebreo difiere notablemente en ambas cláusulas; el texto principal sigue el hebreo conservado, mientras que el griego ayuda a aclarar la frase final difícil.'
    reason: alternative_reading
  - marker: b
    text: «Mis aposentos interiores» continúa la personificación de la Sabiduría como una mujer que recibe a quienes la escuchan en el espacio interior de su casa.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוֹמֵעַ לִי
  english_pob_choice: whoever listens to me
  chosen_spanish: quien me escucha
  alternatives_spanish:
  - quien me oye
  - quien me obedece
  lexicon: HALOT
  rationale: שמע puede significar oír, escuchar u obedecer. En español, «me escucha» conserva la imagen auditiva y deja implícita la respuesta obediente que el paralelo griego también sugiere.
- source_word: יִשׁפֹּט אֱמֶת
  english_pob_choice: will judge rightly
  chosen_spanish: juzgará rectamente
  alternatives_spanish:
  - juzgará con verdad
  - juzgará justamente
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «juzgará verdad». En español, «rectamente» transmite con naturalidad el valor adverbial sin introducir el objeto «naciones» del griego.
- source_word: וּמַאֲזִין לִי
  english_pob_choice: and whoever gives ear to me
  chosen_spanish: y quien me presta oído
  alternatives_spanish:
  - y quien me escucha
  - y el que me atiende
  lexicon: HALOT
  rationale: מאזין resalta atención receptiva. «Presta oído» mantiene el paralelismo con «escucha» sin volverlas idénticas.
- source_word: יִיחַן
  english_pob_choice: will lodge
  chosen_spanish: morará
  alternatives_spanish:
  - acampará
  - se alojará
  - habitará
  lexicon: HALOT
  rationale: La forma es difícil y el paralelo griego apunta a una idea de alojamiento o asentamiento. «Morará» suena natural en español bíblico y conserva la imagen de permanencia.
- source_word: בַּחֲדָרַי
  english_pob_choice: in my inner chambers
  chosen_spanish: en mis aposentos interiores
  alternatives_spanish:
  - en mis cámaras interiores
  - en mis habitaciones interiores
  lexicon: HALOT
  rationale: חדרים son cuartos o cámaras interiores. «Aposentos interiores» comunica bien el espacio doméstico íntimo de la personificación de la Sabiduría.
- source_word: מִבָּיִת
  english_pob_choice: in my inner chambers
  chosen_spanish: en mis aposentos interiores
  alternatives_spanish:
  - seguramente
  - dentro de la casa
  lexicon: HALOT
  rationale: El hebreo final es oscuro y el testimonio griego ayuda a entender la idea de morada segura. Sin añadir una adverbialidad explícita, la frase española conserva el sentido de habitar en el espacio interior de la Sabiduría.
theological_decisions:
- issue: Divergencia entre hebreo y griego en la primera cola
  english_pob_reading: Follow the Hebrew 'will judge rightly' in the main text; Greek says 'will judge nations.'
  chosen_spanish_reading: 'Seguir el hebreo: «juzgará rectamente».'
  alternative_spanish_readings:
  - «juzgará naciones»
  - «juzgará a las naciones»
  rationale: La política editorial prioriza el hebreo conservado en Sirácida. El griego se usa como control y para iluminar el final difícil, pero no reemplaza la lectura principal del hebreo.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input while keeping Hebrew primary.'
- issue: Frase final difícil מִבָּיִת
  english_pob_reading: Render the line as secure dwelling rather than a literal 'from the house'.
  chosen_spanish_reading: Entender la línea como morada interior de la Sabiduría, sin forzar una literalidad oscura.
  alternative_spanish_readings:
  - «dentro de la casa»
  - «seguramente»
  - «acampará con confianza»
  rationale: El final hebreo es textualmente difícil. La versión española mantiene la imagen doméstica de Sabiduría personificada, evitando tanto una traducción opaca como una paráfrasis excesiva.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del expediente: se prefirió una formulación natural para יִשׁפֹּט אֱמֶת y se evitó añadir un adverbio de seguridad explícito al final. A la vez, la presente versión conserva la guía del griego para el sentido de morada/alojamiento y mantiene visible la divergencia textual mediante nota.'
  spanish_consistency_notes:
  - Se usa «rectamente» para יִשׁפֹּט אֱמֶת, evitando «verdad» como sustantivo en español por ser menos idiomático aquí.
  - Se usa lenguaje de morada («morará», «aposentos interiores») para reflejar el campo semántico de יִיחַן y חדרים.
  - Se mantiene la personificación de la Sabiduría en primera persona para concordar con el hebreo.
  - No se usa «Cristo» ni terminología eclesiástica tradicional; el texto es sapiencial y no requiere esa sustitución.
