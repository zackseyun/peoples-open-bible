base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/004.yaml
  text: Then Absalom would say[a], “If only I were appointed judge in the land! Then every man who has a dispute or a case could come to me[c][b], and I would give him justice.”
  footnotes:
  - marker: a
    text: Or, more literally, “Who will appoint me judge in the land?” The Hebrew wording is a rhetorical wish, not merely a request for information.
    reason: lexical_alternative
  - marker: b
    text: “Every man” renders a grammatically masculine singular expression used generically for any person with a legal matter.
    reason: lexical_alternative
  - marker: c
    text: Or “I would vindicate him” / “I would declare him right.”
    reason: lexical_alternative
