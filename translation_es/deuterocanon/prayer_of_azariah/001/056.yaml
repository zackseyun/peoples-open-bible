translation:
  language: es
  text: Bendigan al Señor[a], criaturas marinas y todo lo que se mueve en las aguas; cántenle alabanzas y exáltenlo en gran manera por siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grandes criaturas marinas», «ballenas» o «monstruos marinos». El griego κήτη es un término amplio para grandes criaturas del agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural exhorta a dirigirse al Señor con una fórmula de bendición. «Bendigan» conserva el tono litúrgico del estribillo y funciona con un español actual y reverente.
- source_word: κήτη
  english_pob_choice: sea creatures
  chosen_spanish: criaturas marinas
  alternatives_spanish:
  - grandes criaturas marinas
  - ballenas
  - monstruos marinos
  lexicon: LSJ
  rationale: El término griego es amplio y puede referirse a grandes animales del mar o a criaturas marinas en general. «Criaturas marinas» mantiene esa amplitud sin imponer una lectura más estrecha o cargada de matices míticos.
- source_word: πάντα τὰ κινούμενα
  english_pob_choice: all that move
  chosen_spanish: todos los que se mueven
  alternatives_spanish:
  - todas las cosas que se mueven
  - todo lo que se mueve
  lexicon: BDAG
  rationale: La frase participial abarca seres en movimiento. «Todos los que se mueven» suena natural en español y conserva el alcance inclusivo del griego.
- source_word: ἐν τοῖς ὕδασι
  english_pob_choice: in the waters
  chosen_spanish: en las aguas
  alternatives_spanish:
  - en el agua
  lexicon: BDAG
  rationale: El plural griego se refleja mejor con «las aguas», expresión bíblica natural que preserva el matiz del ámbito acuático.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino en un himno judío; «el Señor» es la equivalencia española estable y fiel al contexto. No se usa «Yahvé» porque el texto griego no escribe el nombre divino sino κύριον.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - entonen himnos
  - alaben cantando
  lexicon: BDAG
  rationale: El verbo expresa alabanza cantada. «Canten alabanzas» transmite mejor la dimensión musical que un simple «alaben».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exáltenlo mucho
  alternatives_spanish:
  - enáltenlo grandemente
  - exáltenlo en gran manera
  lexicon: BDAG
  rationale: La forma intensiva pide un equivalente enfático. «Exáltenlo mucho» conserva el impulso de exaltación y mantiene un registro claro en español, aunque la fuerza total podría también expresarse con otras redundancias reverentes.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: La idea idiomática es de duración perpetua. «Por siempre» es natural en español actual y conserva el valor temporal indefinido del giro griego.
theological_decisions:
- issue: Tratamiento de κύριος en un cántico de alabanza deuterocanónico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: La evidencia griega muestra κύριον y no el Tetragrama. Por eso se conserva el título «el Señor» como equivalente de κύριος, sin sustituirlo por «Yahvé».
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord/Señor; יְהוָה → Yahvé'
translation_notes:
  revision_awareness: El audit trail en inglés indica acuerdo alto y sin revisiones aplicadas. La redacción española sigue de cerca las decisiones léxicas y teológicas ya adjudicadas, manteniendo la amplitud de κήτη y el valor litúrgico del imperativo plural sin añadir interpretaciones no respaldadas.
  spanish_consistency_notes:
  - Se emplea «Señor» para κύριος, en coherencia con el contexto griego y con la política del proyecto para κύριος.
  - «Criaturas marinas» conserva la amplitud de κήτη sin forzar «ballenas» ni «monstruos marinos» en el texto principal.
  - La línea final usa «por siempre» para reflejar la duración perpetua de εἰς τοὺς αἰῶνας con español natural.
  - El verbo plural «Bendigan» respeta la exhortación dirigida a seres plurales del pasaje.
