base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/016.yaml
  text: When Aram saw that they had been defeated before Israel[a], they sent messengers and brought out the Arameans who were from beyond the River[b], with Shophach the commander of Hadadezer’s army before them.
  footnotes:
