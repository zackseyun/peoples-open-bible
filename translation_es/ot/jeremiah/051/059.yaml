translation:
  language: es
  text: Esta es la palabra que Jeremías el profeta mandó a Seraías hijo de Nerías, hijo de Maasías, cuando acompañó a Sedequías, rey de Judá, a Babilonia, en el cuarto año de su reinado. Y Seraías era el oficial encargado del alojamiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Seraías era el chambelán’. El título hebreo שַׂר מְנוּחָה es raro y puede referirse a un funcionario responsable del alojamiento, de los lugares de descanso o de los arreglos de viaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: This is the word
  chosen_spanish: Esta es la palabra
  alternatives_spanish:
  - Este es el mensaje
  - La palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘mensaje’. En la fórmula profética de introducción, ‘palabra’ conserva mejor el vínculo técnico con el habla profética. En español, ‘Esta es’ funciona con naturalidad y evita un calco rígido.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: צוה expresa dar una orden o comisión. ‘Mandó’ comunica con claridad la fuerza directiva del verbo sin suavizarla ni volverla demasiado formal en español.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - Jeremías, el profeta
  - el profeta Jeremías
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el título profético de manera directa. ‘El profeta’ mantiene la apposición del hebreo sin añadir información.
- source_word: בֶּן נֵרִיָּה / בֶּן מַחְסֵיָה
  english_pob_choice: son of Neriah, son of Mahseiah
  chosen_spanish: hijo de Nerías, hijo de Maasías
  alternatives_spanish:
  - descendiente de Nerías, descendiente de Maasías
  lexicon: HALOT
  rationale: La relación genealógica בן se vierte como ‘hijo de’ en ambas ocurrencias. Se transliteran los nombres propios en forma española usual, sin sustituirlos por equivalentes eclesiásticos.
- source_word: בְּלֶכְתּוֹ
  english_pob_choice: when he went
  chosen_spanish: cuando fue
  alternatives_spanish:
  - cuando iba
  - al ir
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal expresa circunstancia de tiempo. ‘Cuando fue’ es idiomático en español y preserva el valor temporal narrativo.
- source_word: אֶת צִדְקִיָּהוּ מֶלֶךְ יְהוּדָה
  english_pob_choice: with Zedekiah king of Judah
  chosen_spanish: con Sedequías, rey de Judá
  alternatives_spanish:
  - junto con Sedequías, rey de Judá
  lexicon: HALOT
  rationale: Aquí אֶת es comitativo, no marca objeto directo. ‘Con’ refleja la relación de acompañamiento y evita una traducción más mecánica.
- source_word: בָּבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  lexicon: HALOT
  rationale: El contexto de movimiento exige la idea direccional. En español, ‘a Babilonia’ expresa naturalmente el destino sin añadir interpretación indebida.
- source_word: בִּשְׁנַת הָרְבִעִית לְמָלְכ֑וֹ
  english_pob_choice: in the fourth year of his reign
  chosen_spanish: en el cuarto año de su reinado
  alternatives_spanish:
  - en el cuarto año de su realeza
  lexicon: HALOT
  rationale: Es la fórmula cronológica estándar de reinar. ‘Reinado’ es la equivalencia natural y clara para el español bíblico contemporáneo.
- source_word: וּשְׂרָיָה שַׂר מְנוּחָה
  english_pob_choice: Now Seraiah was the quartermaster
  chosen_spanish: Y Seraías era el oficial de alojamiento[a]
  alternatives_spanish:
  - Y Seraías era el chambelán[a]
  - Y Seraías era el oficial de los alojamientos[a]
  - Y Seraías era el intendente[a]
  lexicon: HALOT
  rationale: La expresión hebrea es rara y puede aludir a una función relacionada con alojamientos, paradas o arreglos de viaje. ‘Oficial de alojamiento’ comunica el sentido administrativo sin adoptar sin explicación un título tradicional opaco como ‘chambelán’. Se conserva la ambigüedad funcional documentada por el POB inglés.
theological_decisions:
- issue: Título profético y función narrativa del encargo
  english_pob_reading: This is the word that Jeremiah the prophet commanded...
  chosen_spanish_reading: Esta es la palabra que Jeremías el profeta mandó...
  alternative_spanish_readings:
  - Este es el mensaje que Jeremías el profeta mandó...
  - La palabra que Jeremías el profeta mandó...
  rationale: 'No hay un problema doctrinal polémico, pero sí una decisión teológica-literaria: ‘palabra’ mantiene el enlace técnico con la palabra profética de Yahvé sin diluirlo en ‘mensaje’. El versículo presenta una comisión profética real, no solo una comunicación informal.'
  doctrine_reference: Profecía y comisión en Jeremías; cf. lenguaje formular de la palabra de Yahvé en el libro
- issue: Rareza del cargo de Seraías
  english_pob_reading: Now Seraiah was the quartermaster.
  chosen_spanish_reading: Y Seraías era el oficial de alojamiento[a].
  alternative_spanish_readings:
  - Y Seraías era el chambelán[a].
  - Y Seraías era el intendente[a].
  rationale: 'El hebreo שַׂר מְנוּחָה no tiene equivalente único seguro. La traducción evita una normalización doctrinal o eclesiástica y preserva la tensión semántica: un cargo oficial relacionado con descanso, hospedaje o arreglos de viaje.'
  doctrine_reference: Principio de transparencia lexical y preservación de la incertidumbre del original
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés concuerdan ampliamente y no muestran revisiones sustantivas pendientes. La traducción española sigue la lectura estable del POB: fórmula profética inicial, relación comitiva de אֶת, destino direccional hacia Babilonia y una última cláusula con equivalente funcional prudente para el cargo raro de שַׂר מְנוּחָה.'
  spanish_consistency_notes:
  - 'Se unificó la transliteración de nombres propios en forma española usual: Jeremías, Seraías, Nerías, Maasías, Sedequías.'
  - Se prefirió ‘Babilonia’ por norma española y ‘reinado’ por claridad regnal.
  - Se mantuvo ‘palabra’ en la fórmula profética para conservar el eco técnico del original.
  - El marcador de nota [a] aparece solo en el sintagma del cargo raro, donde la ambigüedad lexical exige explicación.
