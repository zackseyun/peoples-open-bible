- from: Él hirió a los filisteos hasta Gaza y su territorio[a][b], desde la torre de vigías hasta la ciudad fortificada.
  to: Él derrotó a los filisteos hasta Gaza y su territorio[a], desde la torre de vigías hasta la ciudad fortificada[b].
  rationale: Se cambia 'hirió' por 'derrotó' para reflejar mejor el valor militar de הִכָּה en español natural y se reordenan los marcadores de notas para que la nota léxica quede anclada al término inmediatamente relevante y la nota cultural al modismo final.
