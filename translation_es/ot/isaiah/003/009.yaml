revisions:
- from: La mirada de sus rostros testifica contra ellos[a], y proclaman su pecado como Sodoma; no lo ocultan. ¡Ay de sí mismos[c][b], porque se han causado mal a sí mismos!
  to: La expresión de sus rostros testifica contra ellos[a], y proclaman su pecado como Sodoma; no lo ocultan. ¡Ay de ellos mismos[c][b], porque han traído mal sobre sí mismos!
  rationale: Se ajusta el inicio para un español más natural y más fiel al valor de semblante/expresión visible del hebreo. Se suaviza la rigidez de «sí mismos» tras «Ay de» con «ellos mismos», manteniendo la lectura reflexiva documentada. En la cláusula final, se reemplaza «se han causado mal» por «han traído mal sobre sí mismos» para reflejar mejor la decisión auditada de conservar el peso moral de רָעָה y la idea de consecuencia auto-incurrida.
  reviewer_model: gpt-5.4
