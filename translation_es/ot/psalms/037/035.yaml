translation:
  language: es
  text: He visto a un malvado[a], un hombre implacable, extendiéndose como un árbol frondoso en su propio suelo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «impío». El hebreo רָשָׁע designa a una persona moralmente malvada; se eligió «malvado» por ser claro y natural en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como un árbol nativo» o «como un árbol arraigado en su suelo». El hebreo es difícil; probablemente alude a un árbol que prospera en el lugar donde es propio, por eso se explicita la imagen del árbol en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte naturalmente con perfecto compuesto en español para expresar una observación con vigencia reflexiva, sin perder la posibilidad del pasado simple.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - impío
  - perverso
  lexicon: HALOT
  rationale: En español, 'malvado' comunica con claridad la carga moral de רָשָׁע en un registro bíblico comprensible. 'Impío' desplaza el matiz hacia irreligiosidad; 'perverso' puede sonar más psicológico que moral.
- source_word: עָרִיץ
  english_pob_choice: ruthless
  chosen_spanish: implacable
  alternatives_spanish:
  - cruel
  - tiránico
  - violento
  lexicon: HALOT
  rationale: '''Implacable'' conserva la fuerza de opresión o dureza sin especificar demasiado la forma de violencia; en español transmite bien la idea de alguien duro, despiadado y difícil de contener.'
- source_word: וּמִתְעָרֶה
  english_pob_choice: spreading himself out
  chosen_spanish: extendiéndose
  alternatives_spanish:
  - expandiéndose
  - desplegándose
  - creciendo con vigor
  lexicon: HALOT
  rationale: El hitpael sugiere una acción reflexiva de expansión/florecimiento. 'Extendiéndose' mantiene la imagen sin introducir una paráfrasis excesiva; el matiz de prosperidad queda reforzado por el contexto poético.
- source_word: כְּאֶזְרָח
  english_pob_choice: like a native tree
  chosen_spanish: como un árbol nativo
  alternatives_spanish:
  - como un árbol nativo de la tierra
  - como un árbol arraigado en su suelo
  lexicon: HALOT
  rationale: Se conserva la imagen difícil del hebreo. 'Árbol nativo' reproduce la decisión del POB inglés de explicitar el sustantivo implícito para que el símil sea inteligible en español, sin borrar la rareza poética del giro.
- source_word: רַעֲנָן
  english_pob_choice: flourishing
  chosen_spanish: floreciente
  alternatives_spanish:
  - lozano
  - vigoroso
  - frondoso
  lexicon: HALOT
  rationale: '''Floreciente'' expresa vitalidad y prosperidad con un tono digno. ''Lozano'' o ''frondoso'' son opciones posibles, pero ''floreciente'' encaja mejor con la imagen general de crecimiento exitoso.'
translation_notes:
  revision_awareness: El texto coincide con la evaluación auditada de alta concordancia y no requiere revisión adicional respecto del inglés POB; la única decisión relevante en español fue cómo hacer natural la imagen poética sin suavizar su rareza.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo moral-poético de la línea: un hombre malvado e implacable, seguido del símil vegetal.'
  - Se evitó 'SEÑOR' o terminología teológica ajena porque el versículo no contiene el Tetragrámaton ni referencias explícitas a Yahvé.
  - El símil 'árbol nativo' conserva la decisión inglesa de explicitar el sustantivo implícito para claridad en español.
