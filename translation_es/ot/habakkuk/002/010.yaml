review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: יָעַצְתָּ = «has ideado», בֹּשֶׁת = «vergüenza», לְבֵיתֶךָ = «para tu casa», עַמִּים רַבִּים = «muchos pueblos», y נַפְשֶׁךָ = «tu propia vida». También preserva correctamente la lectura contextual de נֶפֶשׁ como «vida» y la acusación resultante de וְחוֹטֵא. La principal debilidad está en «al acabar con», que suaviza un poco la fuerza más concreta de קְצוֹת / «cutting off».'
  spanish_quality_summary: El español es claro y natural, de registro bíblico moderno y digno. Sin embargo, «al acabar con» es algo más coloquial y menos preciso que una formulación como «al exterminar» o «al eliminar». Además, la nota al pie actual es innecesariamente explicativa sobre la expresión española elegida y no preserva la alternativa contextual más relevante del expediente inglés para נַפְשֶׁךָ.
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. La elección «vida» para נֶפֶשׁ está bien alineada con la decisión teológica auditada. «Casa» conserva adecuadamente la amplitud de בַּיִת. Conviene ajustar קְצוֹת a una expresión española de mayor fuerza léxica y, dado que el inglés conservó alternativas para נַפְשֶׁךָ, trasladar esa alternativa a una nota en español.
  issues:
  - severity: medium
    issue: «al acabar con» debilita la fuerza léxica de קְצוֹת
    rationale: El hebreo y el expediente inglés apuntan a «cutting off», con sentido de exterminar/eliminar. «Acabar con» es posible, pero en español suena algo más amplio y coloquial, y puede perder parte de la fuerza de destrucción/corte definitivo.
  - severity: medium
    issue: La nota al pie está anclada al verbo equivocado
    rationale: El expediente inglés conserva una nota léxica para נַפְשֶׁךָ («life / soul / yourself»), no para קְצוֹת. En español conviene preservar esa alternativa donde realmente existe la ambigüedad léxica significativa.
  revised_spanish_text: Has ideado vergüenza para tu casa al exterminar muchos pueblos, y has pecado contra tu propia vida[a].
  revised_footnotes:
  - marker: a
    text: O «tu alma» o «tú mismo».
    reason: lexical_alternative
  revision_rationale: Se ajusta «al acabar con» a «al exterminar» para reflejar mejor la fuerza de קְצוֹת en este contexto de juicio. Se elimina la nota sobre el verbo y se traslada la nota léxica a «tu propia vida», preservando las alternativas documentadas para נַפְשֶׁךָ. El resto del texto ya era fiel, claro y natural.
