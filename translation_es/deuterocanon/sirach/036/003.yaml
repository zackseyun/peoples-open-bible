  source_alignment_summary: 'El borrador español sigue bien el sentido básico del griego: un sujeto proverbial confía en la ley, y la ley resulta digna de confianza para él. También preserva la alternativa léxica de ἐρώτημα en nota. Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: «será confiable» suena menos idiomático que «es digna de confianza» o «le es digna de confianza», y «consulta» puede sonar algo burocrático en español bíblico; «pregunta» preserva mejor la ambigüedad entre lo preguntado y la respuesta, con la nota manteniendo la alternativa.'
  spanish_quality_summary: El texto es claro, pero «El hombre entendido» suena algo rígido y «confiable» es comprensible aunque menos digno/literario que «digna de confianza». La frase final «como una consulta de los justos» es inteligible, pero poco natural en registro sapiencial. Una leve revisión mejora fluidez y tono sin alejarse del original.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «La ley» está bien para νόμος. «Justos» corresponde adecuadamente a δικαίων. No aparecen términos sensibles del glosario mayor. La principal decisión léxica pendiente es estilística y semántica fina: preferir una formulación más natural para πιστός y una opción menos administrativa para ἐρώτημα.'
  issues:
  - severity: medium
    issue: «será confiable para él» es poco natural en español bíblico
    rationale: Aunque refleja el futuro griego de forma formal, en español suena forzado. «le es digna de confianza» expresa mejor πιστός y conserva la reciprocidad con «confiará».
  - severity: medium
    issue: «consulta» para ἐρώτημα suena administrativa/burocrática
    rationale: En contexto sapiencial, «pregunta» o «consulta» podrían funcionar, pero «pregunta» encaja mejor en español general y deja abierta la ambigüedad que la nota explica con «respuesta».
  - severity: low
    issue: «entendido» es aceptable, pero menos idiomático que «prudente» o «discernidor» en algunos registros
    rationale: No exige cambio por fidelidad estricta, pero en combinación con el resto de la frase el registro puede afinarse. Se puede mantener si se prefiere cercanía al audit trail.
  revised_spanish_text: El hombre entendido confiará en la ley[a], y la ley le es digna de confianza como una pregunta de los justos.
