    text: 'O: «que está opuesto a Jerusalén, al oriente».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «será partido» o «será hendido»; el hebreo describe al monte dividiéndose de modo que sus dos mitades se apartan.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «se afirmarán» por «estarán» para reflejar con más precisión y naturalidad el valor de וְעָמְדוּ sin añadir matiz de afianzamiento. Se capitalizó «Monte de los Olivos» como topónimo establecido. Se ajustó la nota [b] para apegarse mejor a la descripción hebrea de la partición del monte y el apartamiento de sus mitades.
