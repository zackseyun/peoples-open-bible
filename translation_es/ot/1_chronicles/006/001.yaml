translation:
  language: es
  text: 'Los hijos[a] de Leví: Gershom[b], Cohat y Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo genealógico puede usar «hijos» para hijos directos o, en otros contextos, descendientes más amplios; aquí el contexto indica los hijos inmediatos de Leví.
    reason: cultural_note
  - marker: b
    text: La forma hebrea del nombre en este versículo es Gershom; en pasajes afines aparece la variante tradicional Gersón/Gershon.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En contextos genealógicos, בְּנֵי puede referirse a hijos directos o a descendientes; aquí la lista inmediata nombra a los tres hijos de Leví. En español, «hijos de» comunica con naturalidad esa relación genealógica y conserva la precisión del parentesco sin sonar forzado.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Nombre propio hebreo. Se mantiene la transliteración habitual en español bíblico con acento gráfico para ajustar la prosodia del español.
- source_word: גֵּרְשֹׁם
  english_pob_choice: Gershom
  chosen_spanish: Gershom
  alternatives_spanish:
  - Gersón
  lexicon: HALOT
  rationale: El texto hebreo de este versículo apoya la forma Gershom. Se conserva esa forma en español para respetar la evidencia textual, aunque existe una variante tradicional relacionada en otros pasajes.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Cohat
  lexicon: HALOT
  rationale: Se opta por la forma española tradicional y reconocible «Coat», que corresponde al nombre hebreo קְהָת. Aunque la audición inglesa usa Kohath, en español «Coat» evita una transliteración innecesariamente anglicada y mantiene la identificación del personaje.
- source_word: וּ/מְרָרִי
  english_pob_choice: and Merari
  chosen_spanish: y Merari
  alternatives_spanish:
  - y Merarí
  lexicon: HALOT
  rationale: La conjunción hebrea ו se vierte con «y». El nombre propio se conserva como Merari, forma clara y estándar en español bíblico.
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto entre el texto fuente y la auditoría inglesa; no se detectaron revisiones sustantivas ni problemas textuales en el pasaje base.
  spanish_consistency_notes:
  - Se mantuvo un estilo genealógico sobrio y directo, acorde con una lista nominal breve.
  - Se prefirió la forma española tradicional Coat para קְהָת, mientras que Gershom se preservó por la forma consonántica específica de este versículo.
  - No se introdujeron términos teológicos ajenos al texto; el versículo es puramente genealógico.
