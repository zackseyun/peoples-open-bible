translation:
  language: es
  text: ¿Los juzgarás? ¿Los juzgarás, hijo de hombre[a]? Dales a conocer las abominaciones de sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijo de hombre» es la forma regular de tratamiento en Ezequiel; alternativamente, «ser humano» o «mortal».
    reason: lexical_alternative
  - marker: b
    text: O «sus antepasados» por «sus padres». El hebreo dice literalmente «sus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִשְׁפֹּט
  english_pob_choice: Will you judge
  chosen_spanish: ¿Los juzgarás?
  alternatives_spanish:
  - ¿Los vas a juzgar?
  - ¿Harás juicio sobre ellos?
  lexicon: HALOT
  rationale: שׁפט en este contexto profético es claramente forense/judicial. El futuro interrogativo en español conserva la fuerza retórica de la pregunta hebrea sin volverla explicativa.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: Pronombre de objeto directo
  rationale: El pronombre directo plural masculino es la forma natural y concisa en español para el objeto directo referido a los ancianos en contexto.
- source_word: הֲתִשְׁפּוֹט
  english_pob_choice: Will you judge
  chosen_spanish: ¿Los juzgarás?
  alternatives_spanish:
  - ¿Los condenarás?
  - ¿Pronunciarás juicio sobre ellos?
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo. En español repite la misma estructura para no suavizar el énfasis deliberado.
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se mantiene el giro profético tradicional de Ezequiel y su forma masculina. 'Hijo de hombre' es la equivalencia más directa y auditable del hebreo en este contexto de vocativo.
- source_word: תּוֹעֲבוֹת
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas abominables
  - prácticas detestables
  lexicon: HALOT
  rationale: '''Abominaciones'' conserva el peso moral y de pacto del término en Ezequiel, especialmente en referencia a actos idólatras o contaminantes.'
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: La forma hebrea es literalmente 'sus padres'. En español, 'padres' mantiene la literalidad y el matiz genealógico; 'antepasados' es posible pero menos preciso.
- source_word: הוֹדִיעֵם
  english_pob_choice: Make known to them
  chosen_spanish: Hazles conocer
  alternatives_spanish:
  - Dales a conocer
  - Declárales
  lexicon: HALOT
  rationale: El hiphil de ידע expresa causar a conocer. 'Hazles conocer' transmite la fuerza causativa de forma natural en español y preserva el mandato profético.
theological_decisions:
- issue: Vocativo בֶּן אָדָם en Ezequiel
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: No se traslada aquí un título mesiánico posterior; se conserva el vocativo profético propio de Ezequiel. La forma masculina se mantiene por fidelidad al hebreo y por coherencia con la tradición del libro.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4 (Gender-accurate over gender-neutral)
- issue: אֲבוֹתָם como término genealógico
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: '''Padres'' reproduce la literalidad del hebreo y mantiene la dureza retórica de la acusación transmitida por línea familiar. ''Antepasados'' puede aclarar el sentido, pero atenúa esa formulación.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. No hubo revisiones pendientes en el inglés POB; se preservó la repetición retórica de ‘¿Los juzgarás?’ y la literalidad de ‘sus padres’ como opciones principales, con una nota para la alternativa interpretativa de 'hijo de hombre'.
  spanish_consistency_notes:
  - Se mantuvo el tono profético directo y la repetición enfática del hebreo.
  - Se evitó sustituir 'abominaciones' por un eufemismo más débil.
  - Se conservó la literalidad genealógica de 'sus padres' en vez de 'antepasados' en el texto principal.
  - La puntuación interrogativa doble refleja la duplicación retórica del original.
