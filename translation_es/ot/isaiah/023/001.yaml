translation:
  language: es
  text: 'Oráculo sobre Tiro: Lamenten[a], naves de Tarsis, porque ha sido destruida, sin casa ni puerto[b]. Desde la tierra de Quitim[c] se les da a conocer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse “Aúllen” o “Giman”; el hebreo expresa un lamento fuerte y público.
    reason: alternative_reading
  - marker: b
    text: O “sin casa ni entrada”. El hebreo probablemente indica que Tiro ha quedado tan devastada que ya no tiene casa ni puerto/acceso.
    reason: lexical_alternative
  - marker: c
    text: Quitim probablemente se refiere a Chipre o a costas occidentales cercanas.
    reason: cultural_note
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: Oráculo
  alternatives_spanish:
  - Carga
  - Pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, el término introduce una sentencia o mensaje profético; “Oráculo” conserva ese valor técnico sin la ambigüedad negativa de “Carga”.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - Tir
  lexicon: HALOT
  rationale: Nombre propio geográfico; “Tiro” es la forma española establecida y natural.
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: Lamenten
  alternatives_spanish:
  - Giman
  - Aúllen
  lexicon: HALOT
  rationale: Es un imperativo plural de duelo intenso. “Lamenten” comunica el llamado profético al lamento en un español digno y claro; “Aúllen” sería más áspero y menos natural aquí.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  english_pob_choice: ships of Tarshish
  chosen_spanish: naves de Tarsis
  alternatives_spanish:
  - barcos de Tarsis
  - naves para Tarsis
  lexicon: HALOT
  rationale: La construcción hebrea se preserva como asociación nominal. “Naves” es un equivalente natural de “ships”, y “Tarsis” mantiene la referencia tradicional sin sobreespecificar destino u origen.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del lamento en español de forma directa y fluida.
- source_word: שֻׁדַּד
  english_pob_choice: is destroyed
  chosen_spanish: ha sido destruida
  alternatives_spanish:
  - ha sido devastada
  - ha sido arrasada
  lexicon: HALOT
  rationale: El pasivo indica ruina por devastación/saqueo. “Ha sido destruida” es claro y fiel; “devastada” o “arrasada” son posibles matices, pero no necesarios en el texto principal.
- source_word: מִבַּיִת
  english_pob_choice: without house
  chosen_spanish: sin casa
  alternatives_spanish:
  - sin hogar
  - sin casa alguna
  - sin edificio
  lexicon: HALOT
  rationale: 'Se entiende privativamente: no queda casa, vivienda o morada. “Sin casa” conserva la concisión del hebreo y permite al pie aclarar la amplitud semántica.'
- source_word: מִבּוֹא
  english_pob_choice: or harbor
  chosen_spanish: ni entrada
  alternatives_spanish:
  - ni acceso
  - ni puerto
  - ni entrada o acceso
  lexicon: HALOT
  rationale: En paralelo con “sin casa”, la preposición privativa sugiere que no queda posibilidad de entrada/acceso. “Ni entrada” es breve y refleja la tensión textual; la nota preserva la alternativa “puerto/acceso” que el contexto marítimo permite.
- source_word: מֵאֶרֶץ כִּתִּים
  english_pob_choice: From the land of Kittim
  chosen_spanish: Desde la tierra de Quitim
  alternatives_spanish:
  - Desde Quitim
  - Desde la tierra de Chipre
  lexicon: HALOT
  rationale: “Quitim” translitera el etnónimo/topónimo hebreo y evita reducirlo prematuramente a “Chipre”, aunque esa sea una probable referencia histórica. “Desde” reproduce el valor del hebreo para el punto de origen o procedencia.
- source_word: נִגְלָה לָמוֹ
  english_pob_choice: it is revealed to them
  chosen_spanish: se les da a conocer
  alternatives_spanish:
  - se les revela
  - se les hace saber
  lexicon: HALOT
  rationale: El pasivo comunica que la noticia llega a su conocimiento. “Se les da a conocer” suena natural en español y mantiene el matiz de revelación sin hacerlo excesivamente técnico.
translation_notes:
  revision_awareness: 'Seguí la revisión auditada que eliminó la repetición innecesaria de “Tiro” después de “porque”, manteniendo el hebreo פשוטו קרוב: “porque ha sido destruida”. También preservé la tensión léxica de מִבַּיִת / מִבּוֹא como privativos, reflejándola en español con “sin casa ni entrada” y una nota que conserva la alternativa marítima “puerto/acceso”.'
  spanish_consistency_notes:
  - Usé “Yahvé” solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - 'Mantuve nombres propios bíblicos en formas españolas estándar: Tiro, Tarsis, Quitim.'
  - Opté por un registro profético digno y contemporáneo, evitando calcos rígidos.
  - No introduje vocabulario eclesiástico tradicional donde el hebreo no lo exige.
