translation:
  language: es
  text: Por mandato de Yahvé, los hijos de Israel parten[a], y por mandato de Yahvé acampan. Todos los días que la nube permanece sobre el tabernáculo, permanecen acampados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sobre la boca de Yahvé», un modismo que significa «por mandato de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: según la orden de Yahvé
  alternatives_spanish:
  - por la orden de Yahvé
  - a la orden de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: El hebreo idiomático עַל פִּי, lit. 'sobre la boca de', expresa dirección o mandato autorizado. En español, 'según la orden de' conserva la idea de conformidad con una instrucción dada y suena natural sin perder la fuerza directiva del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino conforme al criterio doctrinal del proyecto. 'Yahvé' es la forma española habitual para el Tetragrámaton y evita la sustitución por un título.
- source_word: יִסְעוּ
  english_pob_choice: set out
  chosen_spanish: partían
  alternatives_spanish:
  - salían
  - se ponían en marcha
  - levantaban el campamento
  lexicon: HALOT
  rationale: נסע en contexto de viaje y campamento implica partir o ponerse en camino. 'Partían' expresa bien el movimiento narrativo y permite mantener la referencia al desplazamiento sin añadir especificación excesiva.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión familiar del hebreo בני ישראל. 'Los hijos de Israel' es transparente al texto fuente y mantiene la forma tradicional bíblica sin neutralizar la estructura nominal.
- source_word: יַחֲנוּ
  english_pob_choice: they camped / they remained camped
  chosen_spanish: acampaban / permanecían acampados
  alternatives_spanish:
  - acamparon
  - se quedaban en el campamento
  - permanecían acampados
  lexicon: HALOT
  rationale: חנה significa acampar. La primera forma, 'acampaban', corresponde al paralelo narrativo; la segunda, 'permanecían acampados', refleja la duración indicada por 'todos los días que...' y conserva el mismo lexema básico en español.
- source_word: כָּל יְמֵי אֲשֶׁר
  english_pob_choice: All the days that
  chosen_spanish: Todos los días en que
  alternatives_spanish:
  - Mientras
  - Durante todos los días en que
  - Todo el tiempo que
  lexicon: HALOT
  rationale: La frase marca duración. 'Todos los días en que' es cercana al hebreo y resulta natural en español, manteniendo la relación temporal del período completo.
- source_word: יִשְׁכֹּן
  english_pob_choice: remained
  chosen_spanish: permanecía
  alternatives_spanish:
  - moraba
  - se asentaba
  - se quedaba
  lexicon: HALOT
  rationale: שכן puede significar residir o permanecer. Con 'la nube' como sujeto, 'permanecía' transmite continuidad sin forzar una imagen de habitación literal que en español sonaría menos natural.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube
  - la nube visible
  lexicon: HALOT
  rationale: Se traduce de forma directa el referente visible de guía divina. 'La nube' es suficiente y fiel al hebreo.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del encuentro
  lexicon: HALOT
  rationale: מִשְׁכָּן designa el santuario portátil. 'Tabernáculo' es el equivalente español estándar y preciso; 'tienda del encuentro' correspondería más propiamente a אֹהֶל מוֹעֵד.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, 'Yahvé' mantiene el nombre personal de Dios conforme a la decisión doctrinal del proyecto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lectura del paralelismo entre partir y acampar bajo dirección divina
  english_pob_reading: At the command of Yahweh ... at the command of Yahweh
  chosen_spanish_reading: Según la orden de Yahvé ... según la orden de Yahvé
  alternative_spanish_readings:
  - Por la orden de Yahvé ... por la orden de Yahvé
  - A la orden de Yahvé ... a la orden de Yahvé
  rationale: Se conserva la repetición enfática del hebreo y la idea de obediencia concreta a una instrucción divina. 'Según la orden de' comunica subordinación normativa sin debilitar el paralelismo.
  doctrine_reference: 'Fuente hebrea: עַל פִּי יְהוָה'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el acuerdo general con la auditoría inglesa es alto. Se mantuvo la decisión de preservar el nombre divino como 'Yahvé' y de traducir el modismo עַל פִּי con una equivalencia idiomática natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton en coherencia con el criterio del proyecto.
  - Se conserva 'tabernáculo' para מִשְׁכָּן y no 'tienda del encuentro'.
  - Se evita 'los israelitas' para conservar la forma fuente 'los hijos de Israel'.
  - Se usa 'acampaban/permanecían acampados' para reflejar el paralelismo verbal y la duración del cierre del verso.
