translation:
  language: es
  text: Y pertenecerá a Aarón y a sus hijos como estatuto perpetuo de los israelitas, porque es una contribución; será una contribución de los israelitas, de los sacrificios de sus ofrendas de paz[a], su contribución a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrendas de comunión» u «ofrendas de bienestar» para «ofrendas de paz». El término hebreo incluye la idea de plenitud y relación restaurada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: It shall belong
  chosen_spanish: Y pertenecerá
  alternatives_spanish:
  - Y será
  - Y quedará
  lexicon: HALOT
  rationale: El hebreo en este contexto expresa asignación legal de una porción sacerdotal. «Pertenecerá» comunica esa idea de pertenencia/beneficio sin perder el valor jurídico del verbo.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - para Aarón y para sus hijos
  - de Aarón y de sus hijos
  lexicon: HALOT
  rationale: La preposición introduce destinatario y asignación; en español, «a» es la forma más natural para una entrega o pertenencia legal.
- source_word: לְחָק עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - como decreto perpetuo
  lexicon: HALOT
  rationale: «חָק» es un estatuto prescrito, y «עוֹלָם» aquí tiene fuerza duradera en marco legal-cultual. «Estatuto perpetuo» conserva esa combinación de norma y permanencia.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the Israelites
  chosen_spanish: de parte de los israelitas
  alternatives_spanish:
  - de los israelitas
  - procedente de los israelitas
  lexicon: HALOT
  rationale: La expresión marca el origen/donación de la porción. «De parte de» añade la relación de procedencia y entrega implícita en מֵאֵת sin sonar forzado.
- source_word: תְרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - ofrenda
  - aporte
  lexicon: HALOT
  rationale: Se mantiene la elección léxica del POB para conservar el valor técnico de una porción apartada y presentada. «Contribución» es más precisa que «ofrenda» para el término repetido en el versículo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón explicativa de la cláusula anterior; «porque» es la equivalencia más directa y clara en español.
- source_word: מִזִּבְחֵי שַׁלְמֵיהֶם
  english_pob_choice: from the sacrifices of their peace offerings
  chosen_spanish: de los sacrificios de sus ofrendas de paz
  alternatives_spanish:
  - de los sacrificios de sus ofrendas de bienestar
  - de los sacrificios de sus ofrendas de comunión
  lexicon: HALOT
  rationale: Se conserva la etiqueta cultual tradicional «ofrendas de paz», que el POB documenta como término establecido. «Sacrificios de» refleja la cadena constructa hebrea.
- source_word: תְּרוּמָתָם
  english_pob_choice: their contribution
  chosen_spanish: su contribución
  alternatives_spanish:
  - su ofrenda
  - la contribución de ellos
  lexicon: HALOT
  rationale: El sufijo posesivo remite a la porción apartada por los israelitas. «Su contribución» mantiene la repetición léxica y la referencia posesiva sin redundancia pesada.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. «Para Yahvé» expresa bien el destino de la contribución y evita la sustitución por una máscara reverencial.
theological_decisions:
- issue: Nombre divino יהוה (YHWH)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La pauta del proyecto pide «Yahvé» en el texto principal para reflejar el nombre divino sin ocultarlo. Se conserva el referente del original hebreo y la dirección cultual de la ofrenda.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
- issue: Término cultual שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: «Ofrendas de paz» es el equivalente cultual tradicional que el POB documenta; las alternativas reflejan mejor la amplitud semántica de שְׁלָמִים, pero se mantienen en segundo plano para no perder reconocimiento terminológico.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El contexto auditado indica alta concordancia y no requiere cambios sustantivos respecto de la revisión más reciente; se preserva la repetición de תְרוּמָה con «contribución» para mantener la cohesión léxica y la lectura jurídica del versículo.
  spanish_consistency_notes:
  - Se mantiene «contribución» de manera consistente para תְרוּמָה en ambas ocurrencias.
  - «Estatuto perpetuo» conserva el tono legal-cultual de חָק עוֹלָם sin recurrir a una paráfrasis más explicativa.
  - Se usa «Yahvé» conforme al estándar del proyecto para לַיהוָה, y no una máscara reverencial.
  - «Ofrendas de paz» sigue la terminología cultual establecida, con nota alternativa para la amplitud del hebreo.
