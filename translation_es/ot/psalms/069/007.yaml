  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: dos peticiones paralelas para que los que esperan/buscan a Dios no sufran vergüenza o humillación por causa del salmista. También mantiene correctamente «Yahvé» para יהוה y preserva la distinción entre בוש y כלם con «avergonzados / humillados».'
  spanish_quality_summary: El texto es claro y digno, pero necesita una reparación menor en las notas. La nota [b] está anclada a «por causa de mí», pero su contenido comenta «los que te buscan», lo cual no corresponde ni al audit trail inglés ni al lugar del anclaje. Además, la alternativa de [a] suena algo menos natural en español con «esperan por ti»; «los que esperan en ti» puede mantenerse en el texto, y la nota debe expresar mejor la alternativa «los que te esperan» o explicar el matiz de espera confiada.
  glossary_alignment: 'Alineado en general con la terminología del proyecto: יהוה → «Yahvé»; אֲדֹנָי → «Señor»; צְבָאוֹת → «de los ejércitos»; אֱלֹהֵי יִשְׂרָאֵל → «Dios de Israel». No hay conflicto doctrinal importante. La única desalineación real está en el contenido de la nota [b], que debe reflejar la nota inglesa sobre el título divino compuesto, no sobre «los que te buscan».'
  issues:
  - severity: medium
    issue: La nota [b] no corresponde al texto anclado ni al audit trail inglés.
    rationale: En el inglés, [b] comenta «Lord Yahweh of hosts» como lectura alternativa de אֲדֹנָי יְהוָה צְבָאוֹת. En el borrador español, [b] está colocada tras «por causa de mí» pero habla de «los que te buscan», lo que crea confusión y no preserva la documentación lexical/teológica.
  - severity: low
    issue: La nota [a] puede formularse con una alternativa más natural en español.
    rationale: «Los que esperan por ti» es comprensible, pero en español bíblico actual suele sonar mejor «los que te esperan» o una explicación del matiz de espera esperanzada. Es un ajuste menor de legibilidad.
  revised_spanish_text: No sean avergonzados por causa de mí los que esperan en ti[a], Señor Yahvé de los ejércitos[b]; no sean humillados por causa de mí los que te buscan, Dios de Israel.
  revised_footnotes:
