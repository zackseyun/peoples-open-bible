    reason: lexical_alternative
  - marker: b
    text: O «encina» o «roble»; la palabra hebrea probablemente se refiere más específicamente a un terebinto.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes puntuales para reflejar con más fidelidad las decisiones ya documentadas en el expediente POB: se restaura la imagen concreta «en sus manos», se adopta «terebinto» como término principal para הָאֵלָה, y se reubican las notas al pie en «anillos» y «terebinto», que son los verdaderos lugares de variación léxica significativa. El resto del texto ya era fiel y legible.'
