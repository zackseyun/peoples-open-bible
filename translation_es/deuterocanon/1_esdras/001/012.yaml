review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: «Después de esto» para μετὰ δὲ ταῦτα, «prepararon» para ἡτοίμασαν, «para sí mismos» para ἑαυτοῖς, y mantiene la secuencia apositiva «los sacerdotes, sus hermanos, los hijos de Aarón». También conserva correctamente la nota de alternativa léxica y la observación sobre el paralelo hebreo divergente.'
  spanish_quality_summary: 'La redacción es mayormente natural y fiel, pero «prepararon para sí mismos» en español suena algo incompleto si no se sobreentiende el objeto; en contexto bíblico «prepararon para sí» es posible, aunque menos fluido. El ajuste más claro y natural es «prepararon para ellos mismos», pero «para sí mismos» sigue siendo aceptable. La mejora necesaria está en la nota b: conviene reflejar mejor el matiz del inglés, que habla de preparar porciones/provisiones para ellos mismos y para los sacerdotes, no simplemente «preparar para».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Sacerdotes», «hermanos» y «los hijos de Aarón» respetan bien las decisiones léxicas y teológicas auditadas. No intervienen términos sensibles del glosario mayor.
  issues:
  - severity: medium
    issue: La nota b pierde parte del sentido de recipient/destinatario al decir solo «preparar para sí mismos y para los sacerdotes».
    rationale: El inglés auditado explica que la formulación griega se centra en preparar porciones o provisiones para ellos mismos y para los sacerdotes. En español, la redacción actual queda algo elíptica y menos precisa sobre qué se prepara.
  - severity: low
    issue: La frase principal es fiel, pero puede ganar naturalidad mínima con «para ellos mismos».
    rationale: «Para sí mismos» no es incorrecto, pero en español corriente suena un poco más rígido en esta construcción. Aun así, no es un error grave; la revisión puede limitarse a la nota para evitar cambios innecesarios al texto.
  revised_spanish_text: Después de esto, prepararon para sí mismos y para los sacerdotes[a], sus hermanos[b], los hijos de Aarón.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más explícita: «para sí mismos y también para los sacerdotes, sus hermanos, los hijos de Aarón».'
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo de 2 Crónicas 35:11 difiere considerablemente aquí; 1 Esdras conserva una formulación griega centrada en preparar porciones para sí mismos y para los sacerdotes.
    reason: cross_reference
  revision_rationale: 'El texto principal puede mantenerse porque es fiel al griego y conserva la estructura apositiva importante. Se corrige la nota b para reflejar con más precisión el sentido documentado en el rastro de auditoría inglés: no solo una acción general de «preparar», sino preparar porciones/provisiones para los destinatarios mencionados.'
