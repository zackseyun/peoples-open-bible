base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/005/023.yaml
  text: And the sons of the half-tribe of Manasseh lived in the land from Bashan as far as Baal-hermon[a], Senir, and Mount Hermon[b]; they became numerous.
  footnotes:
  - marker: a
    text: Or 'they increased' or 'they multiplied.' The Hebrew verb emphasizes growth in number.
    reason: lexical_alternative
  - marker: b
    text: Baal-hermon, Senir, and Mount Hermon are place names marking the northern extent of the territory.
    reason: cultural_note
