translation:
  language: es
  text: Por tanto, mis palabras son para ustedes[a], oh tiranos[b], para que aprendan sabiduría y no se desvíen[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a ustedes». El griego πρὸς ὑμᾶς puede expresar dirección hacia los destinatarios; «para ustedes» capta esa orientación con naturalidad en español.
    reason: lexical_alternative
  - marker: b
    text: O «gobernantes». τύραννοι puede designar soberanos o gobernantes en general, pero aquí conserva una fuerza crítica y negativa; por eso se traduce «tiranos».
    reason: lexical_alternative
  - marker: c
    text: O «y no caigan» o «y no se extravíen». El griego puede referirse de manera amplia a fallar o desviarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: LSJ
  rationale: La expresión griega marca dirección/relación con los destinatarios del discurso. En español, «para ustedes» comunica de forma natural esa orientación del mensaje sin perder el matiz de destinatarios directos. «A ustedes» también es posible, pero suena más puramente dativo y menos final; «para vosotros» no es preferible en español latinoamericano neutral.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: οὖν introduce una conclusión o consecuencia lógica. «Por tanto» preserva esa relación inferencial con gravedad y claridad en español bíblico contemporáneo.
- source_word: ὦ τύραννοι
  english_pob_choice: O tyrants
  chosen_spanish: oh tiranos
  alternatives_spanish:
  - oh gobernantes
  - oh déspotas
  lexicon: LSJ
  rationale: τύραννοι puede significar «gobernantes» o «soberanos», pero en este contexto exhortativo lleva una carga negativa y crítica. «Tiranos» conserva mejor esa fuerza retórica que «gobernantes». Se usa «oh» para reproducir la interpelación vocativa del griego.
- source_word: οἱ λόγοι μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - lo que digo
  lexicon: BDAG
  rationale: El plural griego λόγοι se rinde de manera directa con «palabras», manteniendo el número y el tono formal. «Dichos» sería posible, pero menos natural; «lo que digo» pierde la forma nominal plural.
- source_word: ἵνα μάθητε
  english_pob_choice: so that you may learn
  chosen_spanish: para que aprendan
  alternatives_spanish:
  - para que conozcan
  - a fin de que aprendan
  lexicon: BDAG
  rationale: ἵνα + subjuntivo expresa finalidad. «Para que aprendan» conserva el propósito y suena natural en español. El verbo «aprender» refleja bien μάθητε, con la idea de llegar a conocer por instrucción.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - sensatez
  lexicon: BDAG
  rationale: En el libro de la Sabiduría, σοφία es un término teológico central. «Sabiduría» es la equivalencia estable y adecuada; «entendimiento» o «sensatez» debilitan el peso del término.
- source_word: μὴ παραπέσητε
  english_pob_choice: and not fall away
  chosen_spanish: y no se desvíen
  alternatives_spanish:
  - y no caigan
  - y no se aparten
  - y no se extravíen
  lexicon: LSJ
  rationale: παραπίπτω puede expresar caer, fallar o desviarse del camino correcto. En este contexto exhortativo, «no se desvíen» comunica bien el sentido de error moral o de apartarse del rumbo sin imponer demasiado la idea de apostasía. «No se aparten» también sería posible; «no caigan» es demasiado general.
theological_decisions:
- issue: Fuerza negativa de τύραννοι en el discurso
  english_pob_reading: Rendered as 'tyrants' rather than the softer 'rulers.'
  chosen_spanish_reading: Se mantiene «tiranos» en vez de suavizarlo con «gobernantes» o «rulers».
  alternative_spanish_readings:
  - gobernantes
  - soberanos
  - déspotas
  rationale: El contexto acusa y advierte a autoridades opresivas; el griego no es neutral. «Tiranos» preserva la fuerza evaluativa y el filo admonitorio sin añadir contenido ajeno al texto.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readable modern Spanish.'
- issue: Alcance de παραπέσητε
  english_pob_reading: and not fall away / not fall / not go astray
  chosen_spanish_reading: «y no se desvíen» conserva una lectura moral y direccional amplia.
  alternative_spanish_readings:
  - y no caigan
  - y no se aparten
  - y no se extravíen
  rationale: 'El verbo griego admite varios matices: caer, fallar, desviarse. En español, «se desvíen» mantiene el sentido de apartarse del camino correcto sin cerrar indebidamente la ambigüedad semántica del original.'
  doctrine_reference: LSJ; exhortación sapiencial y ética dentro del libro de la Sabiduría.
translation_notes:
  revision_awareness: 'Se ha seguido el texto griego de Swete (1909) y la capa de traducción adjudicada indicada en el paquete fuente. La solución española refleja la misma estructura retórica: inferencia con οὖν, vocativo enfático, propósito con ἵνα y una advertencia final con παραπέσητε. No se detectan revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «sabiduría» para σοφία conforme al uso central del libro.
  - Se traduce el vocativo con «oh»/«oh» de manera consistente para reproducir el tono del griego.
  - Se evita la convención de ocultar el nombre divino porque este versículo no lo contiene.
  - Se conserva una equivalencia formal-optimal sin introducir terminología eclesiástica no presente en el fuente.
