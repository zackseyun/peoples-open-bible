id: SIR.27.15
reference: Sirach 27:15
source:
  edition: lxx-swete-1909
  text: ἔκχυσις αἵματος μάχη ὑπερηφάνων, καὶ ἡ διαλοιδόρησις αὐτῶν ἀκοὴ μοχθηρά·
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: The quarrel of the proud is bloodshed[a], and their reviling is grievous to hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The battle of the proud is bloodshed, and their reviling is an evil report.' The Greek terms can be rendered more formally, but the main text reflects the likely sense in this wisdom context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκχυσις
  chosen: bloodshed
  alternatives:
  - shedding
  - outpouring
  lexicon: LSJ
  rationale: Literally 'pouring out' or 'shedding'; with αἵματος it forms the idiom 'shedding of blood.' 'Bloodshed' is natural modern English and preserves the violent sense without awkwardness.
- source_word: αἵματος
  chosen: blood
  lexicon: LSJ
  rationale: Genitive dependent on ἔκχυσις, yielding 'shedding of blood'/'bloodshed.'
- source_word: μάχη
  chosen: fighting
  alternatives:
  - battle
  - quarrel
  - conflict
  lexicon: LSJ
  rationale: The term can denote battle or fight. In this wisdom context about interpersonal conduct, 'fighting' best captures violent contention without implying formal warfare.
- source_word: ὑπερηφάνων
  chosen: of the proud
  alternatives:
  - of arrogant people
  - of the haughty
  lexicon: LSJ
  rationale: Genitive describing the people characterized by pride/arrogance. 'The proud' is concise, idiomatic, and preserves the moral characterization.
- source_word: διαλοιδόρησις
  chosen: abusive speech
  alternatives:
  - reviling
  - exchange of insults
  - slanderous abuse
  lexicon: LSJ
  rationale: The noun denotes abusive or insulting speech. 'Abusive speech' is clear modern English and broad enough to cover verbal abuse without over-specifying a back-and-forth exchange.
- source_word: ἀκοὴ
  chosen: to hear
  alternatives:
  - hearing
  - report
  lexicon: LSJ
  rationale: Although ἀκοή can mean 'hearing' or 'report,' here with μοχθηρά it most naturally means something bad or painful for the hearing. Rendering the clause as 'is grievous to hear' communicates the idiom in readable English.
- source_word: μοχθηρά
  chosen: grievous
  alternatives:
  - evil
  - troublesome
  - painful
  - offensive
  lexicon: LSJ
  rationale: The adjective can mean bad, troublesome, or morally base. In relation to hearing abusive speech, 'grievous' conveys both unpleasantness and moral ugliness.
