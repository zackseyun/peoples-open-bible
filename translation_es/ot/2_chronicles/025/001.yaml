translation:
  language: es
  text: Amasías tenía veinticinco años cuando comenzó a reinar[a], y reinó veintinueve años en Jerusalén. Su madre se llamaba Jehoaddán, de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, “un hijo de veinticinco años”. O “llegó a ser rey” por “comenzó a reinar”.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: twenty-five years old
  chosen_spanish: veinticinco años
  alternatives_spanish:
  - hijo de veinticinco años
  - de veinticinco años de edad
  lexicon: HALOT
  rationale: El hebreo usa un modismo de edad literal, pero en español la forma natural y fiel es expresar simplemente la edad con 'veinticinco años'. Se conserva el dato cronológico sin añadir interpretación.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - llegó a ser rey
  - fue hecho rey
  lexicon: HALOT
  rationale: En la primera ocurrencia, el verbo marca la subida al trono al introducir la edad del rey. 'Comenzó a reinar' comunica la idea de entronización sin perder el valor verbal del hebreo ni forzar una fórmula más pesada.
- source_word: וְעֶשְׂרִים וָתֵשַׁע שָׁנָה
  english_pob_choice: twenty-nine years
  chosen_spanish: veintinueve años
  alternatives_spanish:
  - por veintinueve años
  lexicon: HALOT
  rationale: La expresión numérica indica duración de reinado; en español se expresa de forma directa como 'veintinueve años'.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: En la segunda ocurrencia, el verbo señala la duración del gobierno. 'Reinó' es el equivalente más natural y preciso en español para cronología real.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa con el nombre de la ciudad se traduce de forma estándar y transparente.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: Su madre se llamaba
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre tenía por nombre
  lexicon: HALOT
  rationale: La construcción hebrea se vuelve una frase natural en español sin perder el contenido genealógico. 'Se llamaba' preserva el dato nominal con buena legibilidad.
- source_word: יְהוֹעַדָּן
  english_pob_choice: Jehoaddan
  chosen_spanish: Jehoadán
  alternatives_spanish:
  - Jehoaddán
  - Yehoadán
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio por transliteración habitual en español bíblico, adaptando la ortografía a una forma legible y consistente.
- source_word: מִירוּשָׁלָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - procedente de Jerusalén
  - originaria de Jerusalén
  lexicon: HALOT
  rationale: El מן indica procedencia/origen. En este contexto genealógico, 'de Jerusalén' comunica adecuadamente la procedencia de la madre sin añadir explicación innecesaria.
theological_decisions:
- issue: 'Accession formula: מָלַךְ in the age statement'
  english_pob_reading: became king
  chosen_spanish_reading: comenzó a reinar
  alternative_spanish_readings:
  - llegó a ser rey
  - fue hecho rey
  rationale: 'No hay una afirmación doctrinal en disputa, pero sí una decisión de matiz: el primer מָלַךְ funciona como fórmula de acceso al trono. ''Comenzó a reinar'' mantiene ese valor sin convertirlo en un mero título estático.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la solución auditada en inglés: edad, duración del reinado, ubicación y nombre materno. La única adaptación principal es la naturalización de la fórmula verbal de acceso al trono en español. No se reportan revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa 'Amasías' para אֲמַצְיָהוּ, la forma tradicional y ampliamente inteligible en español bíblico.
  - Se usa 'Jerusalén' consistentemente para el topónimo en ambas ocurrencias.
  - Se mantiene 'Jehoadán' como transliteración uniforme del nombre materno.
  - La nota a explica el modismo hebreo de edad; la nota b señala una alternativa verbal, aunque el sentido principal ya queda claro en el texto principal.
