    text: 'O: “Ya han subido bastante a Jerusalén.”'
    reason: lexical_alternative
  - marker: b
    text: 'O: “tu Dios, Israel”. La forma hebrea puede funcionar a veces como un título singular, y la redacción evoca Éxodo 32:4; aquí, sin embargo, los dos becerros y el verbo plural favorecen “tus dioses”.'
    reason: alternative_reading
  revision_rationale: 'Se reubicó la nota [a] en la cláusula correspondiente y se ajustó su contenido para reflejar la alternativa documentada por el POB. Se reemplazó “Aquí están” por “Miren: estos son” para representar mejor הִנֵּה en español moderno y digno, sin añadir un tono arcaico innecesario. Se mantuvo el plural “tus dioses” y la fórmula “te hicieron subir de la tierra de Egipto” por fidelidad al hebreo y al razonamiento teológico auditado.'
