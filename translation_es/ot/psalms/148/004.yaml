revisions:
- from: ¡Alábenlo[a] los cielos de los cielos[b], y las aguas[c] que están sobre los cielos.
  to: ¡Alábenlo, los cielos más altos[a], y las aguas[b] sobre los cielos!
  rationale: Se corrige el anclaje de notas para que cada marca corresponda al segmento explicado. Se adopta 'los cielos más altos' como equivalente principal más natural del superlativo hebreo שְׁמֵי הַשָּׁמַיִם, dejando la forma literal en nota. Se simplifica 'que están sobre' a 'sobre' para reflejar mejor la concisión poética del hebreo y del POB inglés, mientras la variante explícita queda en nota. También se corrige la puntuación española con exclamación de cierre.
