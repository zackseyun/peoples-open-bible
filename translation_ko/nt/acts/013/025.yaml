  text: ὡς δὲ ἐπλήρου ⸀Ἰωάννης τὸν δρόμον, ἔλεγεν· ⸂Τί ἐμὲ⸃ ὑπονοεῖτε εἶναι; οὐκ εἰμὶ ἐγώ· ἀλλ’ ἰδοὺ ἔρχεται μετ’ ἐμὲ οὗ οὐκ εἰμὶ ἄξιος τὸ ὑπόδημα τῶν ποδῶν λῦσαι.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/025.yaml
  text: And as John was completing his course[a], he kept saying, ‘What do you suppose me to be? I am not he. But look, one is coming after me[b], the sandals of whose feet I am not worthy to untie.’
  footnotes:
  - marker: a
    text: Or, more explicitly, “What do you suppose me to be? I am not the Messiah.” The Greek leaves the denied identity implicit, though the context points to the Messiah.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts and translations render this more specifically as “to untie the strap of his sandals,” but the printed Greek text here reads simply “the sandal(s) of his feet ... to untie.”
    reason: textual_variant
translation:
  language: ko
  text: 요한은 자기의 달려갈 길을 마치면서 거듭 말하였습니다. 「여러분은 나를 누구로 생각합니까? 나는 그 사람이 아닙니다. 그러나 보십시오, 내 뒤에 오시는 분이 있는데, 나는 그분의 발에 신을 신긴 끈을 풀 자격도 없습니다.」
  philosophy: optimal-equivalence
