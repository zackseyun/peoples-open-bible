translation:
  language: es
  text: Pues la palabra que él clamó por la palabra de Yahvé contra el altar que está en Betel, y contra todas las casas de los lugares altos que están en las ciudades de Samaria[b], ciertamente se cumplirá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se cumplirá con certeza». El hebreo usa un infinitivo absoluto con un verbo imperfecto para intensificar la certeza.
    reason: lexical_alternative
  - marker: b
    text: O «todos los santuarios de los lugares altos». Literalmente, «todas las casas de los lugares altos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior; «Porque» conserva el valor causal/explanatorio natural en español.
- source_word: הָיֹה יִהְיֶה
  english_pob_choice: will surely come to pass
  chosen_spanish: ciertamente se cumplirá
  alternatives_spanish:
  - sin duda sucederá
  - ciertamente llegará a cumplirse
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la certeza. «Ciertamente se cumplirá» preserva esa fuerza sin sonar forzado en español.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En contexto profético, דָּבָר se refiere al mensaje pronunciado; «palabra» mantiene el vínculo con la revelación y con la cláusula siguiente.
- source_word: אֲשֶׁר קָרָא
  english_pob_choice: that he cried out
  chosen_spanish: que él proclamó
  alternatives_spanish:
  - que él clamó
  - que él exclamó
  lexicon: HALOT
  rationale: קרא describe una denuncia pública; «proclamó» transmite la dimensión oral y pública con buen español. Se conserva «él» por claridad referencial.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por la palabra de Yahweh
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: La preposición expresa medio/autoridad. «Por la palabra de Yahvé» sigue de cerca el hebreo y preserva el nombre divino según la terminología POB en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino en forma transliterada, conforme al estándar español del proyecto, en lugar de una sustitución por título.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En un oráculo de juicio, עַל marca el objeto de la denuncia; «contra» reproduce bien la fuerza polémica.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: Correspondencia directa y suficiente en español.
- source_word: בְּבֵית אֵל
  english_pob_choice: in Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Bethel
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español bíblico; «Betel» es la forma natural y ampliamente inteligible.
- source_word: כָּל בָּתֵּי הַבָּמוֹת
  english_pob_choice: all the houses of the high places
  chosen_spanish: todas las casas de los lugares altos
  alternatives_spanish:
  - todos los santuarios de los lugares altos
  - todas las casas de los altos
  lexicon: HALOT
  rationale: «Casas» preserva el sustantivo hebreo בָּתֵּי, mientras que «lugares altos» conserva el término cultual בָּמוֹת sin simplificarlo a «santuarios».
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - las alturas
  - los santuarios de altura
  lexicon: HALOT
  rationale: «Lugares altos» es la equivalencia bíblica usual y mantiene la referencia cultual sin introducir una interpretación excesiva.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  english_pob_choice: in the cities of Samaria
  chosen_spanish: que están en las ciudades de Samaria
  alternatives_spanish:
  - en las ciudades de Samaria
  lexicon: HALOT
  rationale: Se conserva la relación locativa del hebreo y la repetición relativa presente en la fuente. «Samaria» se mantiene como topónimo convencional.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. El proyecto español conserva el nombre propio divino como «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Prophetic certainty in הָיֹה יִהְיֶה
  english_pob_reading: will surely come to pass
  chosen_spanish_reading: ciertamente se cumplirá
  alternative_spanish_readings:
  - sin duda se cumplirá
  - se cumplirá con certeza
  rationale: La construcción intensiva hebrea expresa certeza de cumplimiento. «Ciertamente se cumplirá» preserva esa fuerza sin añadir matiz doctrinal ajeno.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source plain sense'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió «will surely come to pass» por encima de una formulación más genérica, y refleja esa certeza con «ciertamente se cumplirá». Se mantiene la transparencia del original hebreo en la doble referencia a «palabra» y en la estructura locativa final.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - «Betel» sigue la forma española común del topónimo.
  - Se conserva «lugares altos» para בָּמוֹת, evitando sustituirlo por un término eclesiástico más interpretativo.
  - La relación entre «la palabra» y «por la palabra de Yahvé» queda visible, como en el hebreo.
