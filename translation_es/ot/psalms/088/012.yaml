translation:
  language: es
  text: ¿Se declarará en el sepulcro tu amor constante, y tu fidelidad en Abadón[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en destrucción» o «en el lugar de destrucción». «Abadón» es un término poético para el ámbito de la ruina y la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיְסֻפַּר
  english_pob_choice: Is ... declared
  chosen_spanish: ¿Se proclamará... ?
  alternatives_spanish:
  - ¿Se contará... ?
  - ¿Se declarará... ?
  - ¿Se anunciará... ?
  lexicon: HALOT
  rationale: El verbo ספר en esta forma pasiva/interrogativa expresa una pregunta retórica sobre si algo llega a ser proclamado o relatado. «Se proclamará» preserva el valor pasivo y funciona con naturalidad en español sin suavizar la fuerza retórica.
- source_word: בַּקֶּבֶר
  english_pob_choice: in the grave
  chosen_spanish: en el sepulcro
  alternatives_spanish:
  - en la tumba
  - en la sepultura
  - en el sepulcro
  lexicon: HALOT
  rationale: קבר designa un lugar de entierro o tumba. «Sepulcro» conserva el campo semántico funerario con dignidad literaria y es plenamente comprensible en español bíblico, sin restringirlo a una imagen demasiado técnica.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu amor constante
  - tu fidelidad amorosa
  - tu lealtad amorosa
  lexicon: HALOT
  rationale: חסד combina lealtad pactual, benevolencia y amor duradero. Aunque el POB inglés usa «steadfast love», en español «misericordia» comunica una cualidad relacional divina reconocible y natural; se mantiene la tensión porque ninguna sola palabra cubre todo el rango, pero aquí el paralelismo poético favorece una versión sobria y directa. Se preserva en decisiones teológicas la conexión con fidelidad.
- source_word: אֱמוּנָתְךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu fe firme
  - tu confiabilidad
  - tu lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה aquí apunta a la confiabilidad/fiabilidad de Dios. «Fidelidad» es el equivalente más natural y exacto en español para este paralelo con חסד, y mantiene la relación de atributos divinos.
- source_word: בָּאֲבַדּוֹן
  english_pob_choice: in Abaddon
  chosen_spanish: en Abadón
  alternatives_spanish:
  - en destrucción
  - en el lugar de destrucción
  lexicon: HALOT
  rationale: El POB retiene el término poético «Abaddon» para no aplanar la imagen del reino de la ruina/muerte. En español se conserva como «Abadón», transliteración estable y reconocible, para mantener la resonancia literaria del término.
theological_decisions:
- issue: Cómo rendir חֶסֶד/חַסְדֶּךָ en un paralelo poético con אֱמוּנָה/אֱמוּנָתְךָ
  english_pob_reading: your steadfast love ... your faithfulness
  chosen_spanish_reading: tu misericordia ... tu fidelidad
  alternative_spanish_readings:
  - tu amor constante ... tu fidelidad
  - tu misericordia constante ... tu confiabilidad
  rationale: 'El hebreo empareja dos atributos del carácter de Dios: חסד y אֱמוּנָה. En esta línea poética, «misericordia» comunica la benevolencia divina de forma idiomática en español, mientras que «fidelidad» conserva la idea de confiabilidad. Se mantiene el contraste de ambos términos sin ocultar su tensión semántica.'
  doctrine_reference: Salmo 89:1-2; Éxodo 34:6-7
- issue: Si retener o no el término poético אבדון como nombre propio/semicultismo
  english_pob_reading: Abaddon
  chosen_spanish_reading: Abadón
  alternative_spanish_readings:
  - destrucción
  - lugar de destrucción
  rationale: Siguiendo la decisión del POB, se conserva el término como designación poética del ámbito de la ruina y la muerte. Esto evita reducirlo a una abstracción y preserva el paralelismo con «el sepulcro».
  doctrine_reference: Job 26:6; Proverbios 15:11; Apocalipsis 9:11
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión, con alto grado de acuerdo entre revisores; por ello no se introducen ajustes textuales adicionales y se conservan las decisiones principales del POB, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Abadón» para la transliteración consistente del término hebreo retenido por el POB.
  - «Misericordia» se usa aquí como equivalente funcional de חסד; en notas y decisiones se explicita su trasfondo de amor leal/covenantal para no perder la carga teológica.
  - «Fidelidad» traduce אֱמוּנָה de forma estable y coherente con el paralelismo del verso.
  - El registro es bíblico y sobrio, evitando calcos ingleses innecesarios mientras se conserva la estructura interrogativa del hebreo.
