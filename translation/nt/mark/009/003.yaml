id: MRK.9.3
reference: Mark 9:3
source:
  edition: SBLGNT
  text: καὶ τὰ ἱμάτια αὐτοῦ ⸀ἐγένετο στίλβοντα λευκὰ ⸀λίαν οἷα γναφεὺς ἐπὶ τῆς γῆς οὐ δύναται ⸀οὕτως λευκᾶναι.
translation:
  text: And his clothes became gleaming[a], very white, such as no launderer on earth is able to whiten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fuller,' a traditional term for one who cleans and whitens cloth.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱμάτια
  chosen: clothes
  alternatives:
  - garments
  - robes
  lexicon: BDAG
  rationale: A general term for clothing. 'Clothes' is natural modern English and fits the narrative context better than the more formal 'garments,' while avoiding the over-specific 'robes'.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - were made
  - turned
  lexicon: BDAG
  rationale: The verb γίνομαι here marks a change of state during the transfiguration scene. 'Became' preserves that transition clearly and naturally.
- source_word: στίλβοντα
  chosen: gleaming
  alternatives:
  - shining
  - radiant
  - glittering
  lexicon: BDAG
  rationale: The participle denotes a bright, flashing, gleaming quality. 'Gleaming' preserves the visual brilliance without importing extra theological interpretation. 'Shining' is possible but slightly flatter; 'radiant' may suggest an interpretive extension.
- source_word: λευκὰ
  chosen: white
  alternatives:
  - bright white
  lexicon: BDAG
  rationale: The basic color term should be rendered simply as 'white.' The following λίαν supplies the intensification, so the adjective itself need not be expanded.
- source_word: λίαν
  chosen: intensely
  alternatives:
  - very
  - exceedingly
  lexicon: BDAG
  rationale: This adverb strongly intensifies the whiteness. 'Intensely' conveys the force in idiomatic modern English better than the weaker 'very' and less archaically than 'exceedingly.'
- source_word: οἷα
  chosen: such as
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: Introduces a comparison of degree or kind. 'Such as' clearly sets up the following comparison in natural English.
- source_word: γναφεύς
  chosen: launderer
  alternatives:
  - fuller
  - bleacher
  lexicon: BDAG
  rationale: The term refers to one who cleans/processes cloth. 'Fuller' is traditional but obscure to modern readers; 'launderer' communicates the function accessibly. 'Bleacher' is too narrow and potentially anachronistic in tone.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - in the world
  - upon the earth
  lexicon: BDAG
  rationale: This idiom locates the comparison within earthly human capability. 'On earth' is concise and idiomatic.
- source_word: οὐ δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: The present middle/passive deponent expresses capability. 'Is able' slightly better preserves the sense of ability than the more colloquial 'can,' though both are valid.
- source_word: οὕτως
  chosen: such
  alternatives:
  - so
  - thus
  lexicon: BDAG
  rationale: 'In context οὕτως modifies the degree of whitening: ''to whiten [them] like this / so.'' In the English sentence this force is carried by ''such as ... is able to whiten them,'' yielding idiomatic comparison without awkward repetition.'
- source_word: λευκᾶναι
  chosen: to whiten them
  alternatives:
  - to make them white
  - to bleach them
  lexicon: BDAG
  rationale: The infinitive means to make white. 'To whiten them' is direct and preserves the verbal idea. The object 'them' is supplied in English from the context of the clothes.
