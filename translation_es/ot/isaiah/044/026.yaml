translation:
  language: es
  text: 'el que confirma la palabra de su siervo y cumple el consejo de sus mensajeros[a], el que dice de Jerusalén: “Será habitada”, y de las ciudades de Judá: “Serán reconstruidas”, y “yo levantaré sus ruinas”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus ángeles”; el término hebreo puede significar mensajeros humanos o seres celestiales, pero aquí probablemente se refiere a agentes proféticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵקִים
  english_pob_choice: confirms
  chosen_spanish: confirma
  alternatives_spanish:
  - establece
  - levanta
  lexicon: HALOT
  rationale: El hiphil de קום aquí expresa hacer que una palabra se mantenga y se cumpla. En español, “confirma” comunica bien la idea de validar y llevar a efecto la palabra profética sin perder naturalidad.
- source_word: דְּבַר עַבְדּוֹ
  english_pob_choice: the word of his servant
  chosen_spanish: la palabra de su siervo
  alternatives_spanish:
  - el mensaje de su siervo
  - la palabra de su esclavo
  lexicon: HALOT
  rationale: דבר se conserva con “palabra” por su fuerza formal y profética. “Siervo” sigue la decisión del inglés POB para עבד, evitando “esclavo” porque aquí el contexto profético favorece el sentido de servidor/leal portavoz, no la fuerza léxica de esclavitud.
- source_word: וַעֲצַת
  english_pob_choice: and the counsel
  chosen_spanish: y cumple el consejo
  alternatives_spanish:
  - y el plan
  - y el propósito
  lexicon: HALOT
  rationale: עצה puede ser consejo, plan o propósito. “Consejo” mantiene el matiz deliberativo y enlaza de manera natural con el verbo “cumple”.
- source_word: מַלְאָכָיו
  english_pob_choice: his messengers
  chosen_spanish: sus mensajeros
  alternatives_spanish:
  - sus ángeles
  lexicon: HALOT
  rationale: מלאך puede referirse a mensajeros humanos o a ángeles. En este contexto profético, la referencia más probable son agentes proféticos; por eso “mensajeros” preserva la ambigüedad sin imponer “ángeles”.
- source_word: יַשְׁלִים
  english_pob_choice: fulfills
  chosen_spanish: cumple
  alternatives_spanish:
  - lleva a término
  - completa
  lexicon: HALOT
  rationale: El hiphil de שלם expresa completar o llevar a cabo. “Cumple” es idiomático en español y encaja bien con “consejo”.
- source_word: הָאֹמֵר
  english_pob_choice: who says
  chosen_spanish: el que dice
  alternatives_spanish:
  - quien dice
  - el que declara
  lexicon: HALOT
  rationale: El participio sustantivado se vierte de forma relativa. “El que dice” mantiene el flujo descriptivo y es claro en español.
- source_word: לִירוּשָׁלִַם
  english_pob_choice: of Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente “a”, en español la introducción del contenido declarado suele expresarse mejor con “de”. Así se evita una construcción rígida y se conserva el sentido referencial.
- source_word: תּוּשָׁב
  english_pob_choice: She will be inhabited
  chosen_spanish: Será habitada
  alternatives_spanish:
  - Será poblada
  - Será ocupada
  lexicon: HALOT
  rationale: El pasivo/resultativo de ישב aplicado a Jerusalén pide una forma femenina singular. “Será habitada” conserva la personificación de la ciudad y la idea de restauración.
- source_word: וּלְעָרֵי יְהוּדָה
  english_pob_choice: and of the cities of Judah
  chosen_spanish: y de las ciudades de Judá
  alternatives_spanish:
  - y a las ciudades de Judá
  lexicon: HALOT
  rationale: Se mantiene el mismo giro idiomático que con Jerusalén para introducir el contenido declarado sobre las ciudades.
- source_word: תִּבָּנֶינָה
  english_pob_choice: They will be rebuilt
  chosen_spanish: serán reconstruidas
  alternatives_spanish:
  - serán edificadas
  - serán edificadas de nuevo
  lexicon: HALOT
  rationale: El niphal de בנה significa ser construido/built. En un oráculo de restauración tras devastación, “reconstruidas” explicita adecuadamente la fuerza restauradora del contexto.
- source_word: וְחָרְבוֹתֶיהָ
  english_pob_choice: her ruins
  chosen_spanish: sus ruinas
  alternatives_spanish:
  - sus lugares desolados
  - sus desechos
  lexicon: HALOT
  rationale: חרבות denota ruinas o lugares devastados. “Sus ruinas” es breve, natural y conserva la referencia femenina de la ciudad.
- source_word: אֲקוֹמֵם
  english_pob_choice: I will raise up
  chosen_spanish: yo levantaré
  alternatives_spanish:
  - yo restauraré
  - yo reedificaré
  lexicon: HALOT
  rationale: La primera persona de קום retoma el motivo de restauración. “Levantaré” conserva la imaginería literal y funciona bien con “ruinas”.
theological_decisions:
- issue: Referente de “su siervo” y “sus mensajeros”
  english_pob_reading: Generic prophetic agents through whom God announces restoration
  chosen_spanish_reading: Agentes proféticos genéricos por medio de los cuales Dios anuncia la restauración
  alternative_spanish_readings:
  - Un siervo específico, como Isaías
  - Un colectivo más amplio de voceros proféticos
  rationale: El verso no identifica por nombre al siervo. La traducción conserva el singular y el plural sin especificar identidad, para no resolver indebidamente una tensión que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla
- issue: Restauración de Jerusalén y Judá
  english_pob_reading: Restoration oracle after devastation
  chosen_spanish_reading: Oráculo de restauración después de la devastación
  alternative_spanish_readings:
  - Promesa de reconstrucción futura
  - Anuncio de repoblación
  rationale: La secuencia de habitada/reconstruidas/ruinas levantadas muestra que el énfasis es restaurativo y no meramente constructivo. La traducción mantiene ese marco sin añadir interpretación doctrinal.
  doctrine_reference: Contexto profético de restauración
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada del POB en inglés. No se introdujeron cambios de sentido sustanciales; se conservó la ambigüedad de מלאך con una nota, y se mantuvo el paralelismo restaurativo entre Jerusalén, las ciudades de Judá y sus ruinas.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando aparece el nombre divino explícito; aquí no es necesario.
  - Se mantiene “siervo” para עבד por coherencia con la decisión inglesa auditada y el contexto profético.
  - Se evita “SEÑOR” como sustituto del nombre divino, siguiendo la política del proyecto.
  - “Reconstruidas” refleja mejor el valor restaurativo que un simple “edificadas” en este contexto.
