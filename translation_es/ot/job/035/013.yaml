translation:
  language: es
  text: Ciertamente Dios no oye lo vacío[a], y el Todopoderoso no lo considera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vanidad», «falsedad» o «inutilidad». El término hebreo puede describir lo que es vacío, vano o engañoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - De veras
  - Ciertamente
  lexicon: HALOT
  rationale: אַךְ funciona aquí como partícula enfática; «Ciertamente» comunica bien la fuerza asertiva sin volver la frase rígidamente literal.
- source_word: שָׁוְא
  english_pob_choice: emptiness
  chosen_spanish: vaciedad
  alternatives_spanish:
  - vanidad
  - falsedad
  - inutilidad
  - vacío
  lexicon: HALOT
  rationale: El término hebreo puede significar lo vacío, vano o engañoso. «Vaciedad» preserva el sentido abstracto de lo carente de sustancia y deja abierta la gama semántica documentada por la nota inglesa.
- source_word: יִשְׁמַע
  english_pob_choice: does not hear
  chosen_spanish: no oye
  alternatives_spanish:
  - no escucha
  - no atenderá
  - no oye
  lexicon: HALOT
  rationale: El imperfecto expresa una verdad general; «no oye» es un equivalente natural y directo para שׁמע en español.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  - el Dios poderoso
  lexicon: HALOT
  rationale: אֵל es un título divino común. «Dios» es la equivalencia natural en español y no añade énfasis ajeno al contexto.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - Shaddai
  lexicon: HALOT
  rationale: «Todopoderoso» es la equivalencia establecida y plenamente inteligible en español para שַׁדַּי, especialmente adecuada en Job.
- source_word: יְשׁוּרֶנָּה
  english_pob_choice: does not regard it
  chosen_spanish: no la considera
  alternatives_spanish:
  - no la mira
  - no le presta atención
  - no la contempla
  lexicon: HALOT
  rationale: El verbo שׁור significa mirar, observar, considerar. «No la considera» comunica una atención deliberada, en paralelo con «no oye».
theological_decisions:
- issue: Sentido de שָׁוְא y el tipo de cosa que Dios no recibe
  english_pob_reading: An empty, futile, or insincere plea is not heard by God
  chosen_spanish_reading: Dios no oye una vaciedad, es decir, algo vacío o sin sustancia delante de él
  alternative_spanish_readings:
  - Dios no oye la falsedad
  - Dios no oye la vanidad
  - Dios no oye un clamor vacío
  rationale: 'La traducción mantiene la tensión del hebreo: no se define en exceso si se trata de falsedad, vanidad o vacío, sino que se preserva la idea de una petición vacía o insustancial que no recibe respuesta en este proverbio de Eliú.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el registro inglés; el texto inglés más reciente quedó sin cambios, y la versión española sigue de cerca esa lectura estable.
  spanish_consistency_notes:
  - Se preserva la distinción entre «Dios» y «el Todopoderoso» como dos títulos divinos paralelos.
  - Se evita sustituir el valor semántico de שָׁוְא por una paráfrasis explicativa demasiado estrecha.
  - La nota mantiene las alternativas léxicas documentadas sin introducir glosas doctrinales adicionales.
  - El verbo final se vierte con una forma natural en español que conserva el paralelismo con «no oye».
