translation:
  language: es
  text: Cuando hayas terminado de hacer la purificación[a], presentarás un novillo[b] sin defecto[c] y un carnero sin defecto[c], del rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando hayas terminado de hacer expiación» o «cuando hayas terminado de limpiar del pecado». El verbo hebreo puede abarcar purificación ritual o remoción de pecado en contextos sacrificiales.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «un toro, un hijo de la vacada».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sin mancha» o «sin tacha».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכַלּוֹתְךָ
  english_pob_choice: When you have finished
  chosen_spanish: Cuando hayas terminado
  alternatives_spanish:
  - Cuando termines
  - Al terminar
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo constructo comunica acción completada antes de la siguiente. En español, el pluscuamperfecto de subjuntivo naturaliza bien la anterioridad sin perder el valor temporal.
- source_word: מֵחַטֵּא
  english_pob_choice: making purification
  chosen_spanish: hacer la purificación
  alternatives_spanish:
  - hacer expiación
  - purificar
  - hacer purificación por el pecado
  lexicon: HALOT
  rationale: En contexto ritual, el verbo expresa la acción de remover la contaminación o el pecado mediante un rito. 'Hacer la purificación' conserva el valor cultual y evita cerrar la tensión entre purificación y expiación que el inglés POB documenta.
- source_word: תַּקְרִיב
  english_pob_choice: you shall present
  chosen_spanish: presentarás
  alternatives_spanish:
  - ofrecerás
  - acercarás
  lexicon: HALOT
  rationale: El hifil de קרב en contexto sacrificial suele significar presentar u ofrecer. 'Presentarás' mantiene formalidad y claridad ritual en español.
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: a flawless young bull
  chosen_spanish: un novillo
  alternatives_spanish:
  - un toro joven
  - un becerro
  - un novillo de la vacada
  lexicon: HALOT
  rationale: La expresión denota un toro joven de la manada. 'Novillo' comunica bien la idea de un bovino joven en español bíblico sin forzar una descripción más larga; el hebreo literal puede explicarse en nota.
- source_word: תָּמִים
  english_pob_choice: flawless
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - perfecto
  lexicon: HALOT
  rationale: En lenguaje sacrificial, תמים indica ausencia de defecto físico. 'Sin defecto' es la fórmula española más clara y fiel para esta exigencia cultual.
- source_word: וְאַיִל
  english_pob_choice: and a ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho de oveja
  - y un macho cabrío
  lexicon: HALOT
  rationale: אַיִל es 'carnero' en español; esta opción conserva precisión zoológica y evita ambigüedad.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: de entre el rebaño
  alternatives_spanish:
  - del rebaño
  - de la greña
  - de entre las ovejas y las cabras
  lexicon: HALOT
  rationale: צאן es un colectivo para ganado menor, especialmente ovejas y cabras. 'De entre el rebaño' suena natural y conserva la selección de un animal de ese conjunto.
theological_decisions:
- issue: חטא en contexto de consagración del altar/templo
  english_pob_reading: making purification
  chosen_spanish_reading: hacer la purificación
  alternative_spanish_readings:
  - hacer expiación
  - purificar
  - limpiar del pecado
  rationale: El contexto es ritual y no meramente moral. 'Hacer la purificación' mantiene abierta la tensión semántica entre purificación, expiación y limpieza de pecado que el audit trail documenta, sin imponer una sola categoría teológica.
  doctrine_reference: Preservar el sentido cultual del texto; evitar importar una formulación doctrinal más estrecha que el hebreo no exige.
- issue: תמים aplicado a los animales de sacrificio
  english_pob_reading: flawless
  chosen_spanish_reading: sin defecto
  alternative_spanish_readings:
  - sin mancha
  - sin tacha
  - sin imperfección
  rationale: La exigencia se refiere a un animal apto para sacrificio, libre de defecto. 'Sin defecto' expresa la norma cultual de forma sobria y ampliamente comprensible.
  doctrine_reference: Legislación sacrificial del Pentateuco y su continuidad cultual en Ezequiel.
translation_notes:
  revision_awareness: El inglés POB fue revisado de 'purifying' a 'making purification' para acercarse más al valor purgativo del verbo hebreo. En español, se optó por 'hacer la purificación' para reflejar esa revisión y conservar la ambigüedad cultual documentada sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece.
  - '''Sin defecto'' se usa de modo consistente para תמים en animales sacrificiales.'
  - '''Rebaño'' se emplea como equivalente natural de צאן, sin especificar innecesariamente ovejas o cabras.'
