id: GAL.5.21
reference: Galatians 5:21
source:
  edition: SBLGNT
  text: ⸀φθόνοι, μέθαι, κῶμοι, καὶ τὰ ὅμοια τούτοις, ἃ προλέγω ὑμῖν ⸀καθὼς προεῖπον ὅτι οἱ τὰ τοιαῦτα πράσσοντες βασιλείαν θεοῦ οὐ κληρονομήσουσιν.
translation:
  text: envy[a], drunkenness, carousing, and things like these, about which I warn you, just as I warned before, that those who practice such things will not inherit the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revelries' or 'carousing.' The Greek term refers to riotous festivity and excess, often associated with drinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: φθόνοι
  chosen: envy
  alternatives:
  - jealousies
  - envying
  lexicon: BDAG
  rationale: Plural noun denoting resentful desire at another's good. 'Envy' is the most natural modern English category term in this vice list; 'jealousies' is possible but overlaps too much with the preceding term in v. 20 in many English renderings.
- source_word: μέθαι
  chosen: drunkenness
  alternatives:
  - drinking bouts
  - carousing in drink
  lexicon: BDAG
  rationale: Refers to intoxication/drunken episodes. 'Drunkenness' is the standard and clear English rendering for the vice named here.
- source_word: κῶμοι
  chosen: wild parties
  alternatives:
  - carousing
  - revelries
  - orgies
  lexicon: BDAG
  rationale: Denotes festive excess, revelry, and riotous partying, often associated with drinking. 'Wild parties' communicates the social and moral sense in accessible modern English. 'Orgies' is too narrow and misleading in contemporary English because it suggests specifically sexual activity, which the Greek term does not require.
- source_word: τὰ ὅμοια τούτοις
  chosen: things like these
  alternatives:
  - the like of these
  - similar things
  lexicon: BDAG
  rationale: Idiomatic summary phrase extending the vice list beyond the named items. 'Things like these' is natural English and preserves the open-ended force.
- source_word: ἃ προλέγω ὑμῖν
  chosen: which I warn you about
  alternatives:
  - which I tell you beforehand
  - which I say in advance to you
  lexicon: BDAG
  rationale: προλέγω can mean 'say beforehand' or 'warn in advance.' In this moral context, 'warn' best captures the admonitory force while remaining faithful to the verb.
- source_word: καθὼς προεῖπον
  chosen: just as I warned before
  alternatives:
  - just as I said before
  - as I previously told you
  lexicon: BDAG
  rationale: Aorist of the same verb points to a prior warning. Rendering consistently with 'warned' preserves the rhetorical emphasis of repeated admonition.
- source_word: οἱ τὰ τοιαῦτα πράσσοντες
  chosen: those who practice such things
  alternatives:
  - those doing such things
  - those who keep doing such things
  lexicon: BDAG
  rationale: The present participle with πράσσω conveys characteristic or ongoing conduct rather than a single isolated act. 'Practice' expresses habitual behavior without overtranslating.
- source_word: βασιλείαν θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Standard rendering that preserves the theological phrase used throughout the New Testament.
- source_word: οὐ κληρονομήσουσιν
  chosen: will not inherit
  alternatives:
  - will not receive as an inheritance
  - will have no share in
  lexicon: BDAG
  rationale: Future verb of inheritance language; 'will not inherit' is both direct and idiomatic, preserving the eschatological force.
