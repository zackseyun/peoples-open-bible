translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: «Este pueblo[a] dice[n]: “No ha llegado el tiempo[b], el tiempo para que la casa de Yahvé sea reconstruida”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «este pueblo dice». La expresión hebrea puede llevar un matiz de distancia o reprensión.
    reason: lexical_alternative
  - marker: b
    text: 'O: «sea construida». El infinitivo hebreo no incluye explícitamente el prefijo re-, pero el contexto posexílico indica reconstrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética introductoria se expresa de manera natural y solemne en español con «Así dice», manteniendo el tono performativo del hebreo sin volverlo arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración estándar del Tetragrámaton, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «צבאות» alude a huestes/ejércitos; en español, «de los ejércitos» comunica con claridad la expresión titular sin perder el sentido amplio de poder militar y celestial.
- source_word: הָעָם הַזֶּה
  english_pob_choice: These people
  chosen_spanish: Este pueblo
  alternatives_spanish:
  - Ese pueblo
  - Estas personas
  lexicon: HALOT
  rationale: El demostrativo puede tener matiz de distancia o reprensión. «Este pueblo» conserva el señalamiento del hebreo y resulta más natural que «estas personas» en este registro profético.
- source_word: אָמְרוּ
  english_pob_choice: say
  chosen_spanish: dice
  alternatives_spanish:
  - dicen
  - han dicho
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural y perfecta, la cita funciona como una observación actual sobre la actitud del pueblo; «dice» reproduce con naturalidad ese valor reportativo en español, mientras la nota conserva la tensión del plural.
- source_word: לֹא עֶת בֹּא עֶת
  english_pob_choice: The time has not come, the time
  chosen_spanish: No ha llegado el tiempo, el tiempo
  alternatives_spanish:
  - No es tiempo, el tiempo
  - Todavía no ha llegado el tiempo
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática de «עֶת» para reflejar el énfasis retórico del hebreo. «No ha llegado» expresa bien el sentido de בֹּא en este contexto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del SEÑOR
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen de «casa» en vez de sustituirla por «templo», siguiendo de cerca el hebreo y la elección auditada en inglés.
- source_word: לְהִבָּנוֹת
  english_pob_choice: to be rebuilt
  chosen_spanish: sea reconstruida
  alternatives_spanish:
  - sea edificada
  - sea construida
  lexicon: HALOT
  rationale: 'El infinitivo nifal es pasivo: «ser construida». En el contexto posexílico, el sentido histórico es de restauración; «reconstruida» expresa ese trasfondo sin añadir más de lo que permite el texto.'
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La traducción preserva el nombre del pacto en lugar de sustituirlo por un título, alineándose con la política del proyecto y con el valor directo del Tetragrámaton en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Matiz de distancia en הָעָם הַזֶּה
  english_pob_reading: These people
  chosen_spanish_reading: Este pueblo
  alternative_spanish_readings:
  - Ese pueblo
  - Este pueblo, esa gente
  rationale: La expresión puede implicar reproche o distancia por parte de Yahvé. «Este pueblo» conserva ese matiz sin caer en una locución antinatural.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Alcance histórico de לְהִבָּנוֹת
  english_pob_reading: to be rebuilt
  chosen_spanish_reading: sea reconstruida
  alternative_spanish_readings:
  - sea edificada
  - sea construida
  rationale: En el contexto posexílico, la referencia es la restauración del templo. «Reconstruida» hace explícito ese sentido histórico sin alterar la voz pasiva del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: Sin cambios respecto del último pase de revisión; el borrador coincide con el contexto auditado y mantiene la solución aprobada para la fórmula profética, el nombre divino, la repetición enfática de «tiempo» y el matiz posexílico de «reconstruida».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se preservó «casa» en vez de «templo» para בית, siguiendo el hebreo y el audit trail.
  - La repetición de «el tiempo» refleja la duplicación enfática de עֶת en el original.
  - La nota a recoge la tensión entre singular reportativo en español y plural morfológico en hebreo.
  - La nota b explicita la lectura posexílica de «reconstruida» sin exceder el texto fuente.
