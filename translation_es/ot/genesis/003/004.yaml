translation:
  language: es
  text: 'Pero la serpiente le dijo a la mujer: «Ustedes[a] ciertamente no morirán[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma 'ustedes' refleja el hebreo en segunda persona plural.
    reason: source_note
  - marker: b
    text: 'Hebreo: ''no morir morirán''—construcción enfática que expresa una negación tajante: ''ciertamente no morirán''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... le dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración, pero aquí la intervención de la serpiente contradice de forma directa la advertencia previa; por eso 'Pero' conserva mejor la fuerza adversativa en español. 'Le dijo' es el equivalente natural del verbo de habla con objeto indirecto.
- source_word: הַנָּחָשׁ
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - la víbora
  lexicon: HALOT
  rationale: נָחָשׁ puede referirse a serpiente o culebra, pero 'serpiente' es la forma más estándar y adecuada al peso literario y teológico del relato.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - contra
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla; en español 'a' expresa de forma natural esa relación.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: En Génesis 2–3 el texto habla repetidamente de 'la mujer' antes de su nombramiento posterior; 'mujer' preserva ese patrón narrativo sin estrechar innecesariamente el sentido a 'esposa'.
- source_word: לֹא מוֹת תְּמֻתוּן
  english_pob_choice: You will not surely die.
  chosen_spanish: No morirán ciertamente ustedes.
  alternatives_spanish:
  - No morirán seguramente ustedes.
  - No, ustedes no morirán.
  lexicon: HALOT
  rationale: La construcción hebrea con infinitivo absoluto + verbo finito expresa énfasis; en español se conserva ese valor con 'ciertamente'. Se mantiene además el plural del hebreo ('ustedes'). El orden 'No morirán ciertamente ustedes' permite que la negación recaiga con claridad sobre la afirmación absoluta del serpiente, sin suavizarla.
theological_decisions:
- issue: Fuerza de la negación del serpiente
  english_pob_reading: 'A direct contradiction of the prior warning: ''You will not surely die.'''
  chosen_spanish_reading: 'Una contradicción directa de la advertencia previa: «No morirán ciertamente ustedes».'
  alternative_spanish_readings:
  - «No morirán ustedes»
  - «Ustedes no morirán seguramente»
  rationale: El hebreo no expresa una negación simple sino una negación enfática; traducirla con 'ciertamente' conserva la intensidad de la contradicción frente a la advertencia divina sin resolver la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: Relación entre el plural hebreo y el español
  english_pob_reading: The 2nd person plural is retained as 'you' in English, since contemporary English lacks a distinct plural form.
  chosen_spanish_reading: Se conserva el plural explícito con 'ustedes'.
  alternative_spanish_readings:
  - «tú»
  - «vosotros»
  rationale: El hebreo usa segunda persona plural; el español puede reflejarlo directamente con 'ustedes', evitando nivelar la forma a singular.
  doctrine_reference: Translation philosophy §2 (correspondencia morfosintáctica cuando es posible)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó el orden para reflejar mejor la negación hebrea: ''You will not surely die.'' El español sigue esa decisión semántica y mantiene el énfasis del hebreo con una formulación natural y publicación-readable.'
  spanish_consistency_notes:
  - Se usa 'la serpiente' en vez de 'la culebra' para mantener la terminología literaria habitual del relato.
  - Se mantiene 'la mujer' porque el contexto narrativo de Génesis 2–3 aún no introduce un nombre propio para ella.
  - Se conserva el plural 'ustedes' para reflejar la segunda persona plural hebrea.
  - La puntuación con dos puntos introduce directamente el discurso citado, acorde al estilo español moderno y al tono solemne del texto.
