translation:
  language: es
  text: 'Entonces clamaron a Yahvé y dijeron: «Hemos pecado, pues hemos abandonado a Yahvé y hemos servido a los Baales y a las Astartes[a]. Pero ahora, líbranos de la mano de nuestros enemigos, y te serviremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las Astoretas»; el nombre hebreo se refiere a la diosa o a las diosas asociadas con el culto cananeo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron su clamor
  lexicon: HALOT
  rationale: זעק expresa un clamor urgente de auxilio. En español, «clamaron» comunica mejor la súplica intensa que un simple «llamaron» y suena más natural y digno que una traducción demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino en forma transliterada. «Yahvé» preserva el nombre personal de Dios en lugar de sustituirlo por un título.'
- source_word: חָטָאנוּ
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Hemos errado
  - Pecamos
  lexicon: HALOT
  rationale: El perfecto hebreo expresa culpa reconocida y completa. «Hemos pecado» es la forma confesional natural en español y conserva la admisión explícita.
- source_word: עָזַבְנוּ אֶת יְהוָה
  english_pob_choice: we have forsaken Yahweh
  chosen_spanish: hemos abandonado a Yahvé
  alternatives_spanish:
  - hemos dejado a Yahvé
  - hemos desamparado a Yahvé
  lexicon: HALOT
  rationale: עָזַב en contextos de pacto implica abandonar o dejar de lado con carga moral. «Abandonado» comunica bien la ruptura de lealtad; se usa sin perder la referencia directa al nombre divino.
- source_word: וַנַּעֲבֹד
  english_pob_choice: have served
  chosen_spanish: hemos servido
  alternatives_spanish:
  - servimos
  - hemos adorado
  lexicon: HALOT
  rationale: עבד con objetos divinos puede significar servir/adorar. Se conserva «servido» para mantener la repetición verbal con el final del versículo y la idea de lealtad transferida.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - los baales
  - los ídolos de Baal
  lexicon: HALOT
  rationale: El plural hebreo apunta a las deidades/manifestaciones de Baal. «Los Baales» es transparente en español y conserva el plural del original.
- source_word: הָעַשְׁתָּרֹת
  english_pob_choice: the Ashtaroths
  chosen_spanish: las Astartes
  alternatives_spanish:
  - las Astoret
  - las Ashtarot
  lexicon: HALOT
  rationale: Se opta por una transliteración/normalización que suena natural en español y mantiene el vínculo con el nombre de la diosa y sus cultos. Evita una forma inglesa innecesaria y conserva el referente idolátrico.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora, pues
  lexicon: HALOT
  rationale: Marca el giro retórico de confesión a petición. «Pero ahora» reproduce bien el contraste implícito del hebreo.
- source_word: הַצִּילֵנוּ
  english_pob_choice: deliver us
  chosen_spanish: líbranos
  alternatives_spanish:
  - sálvanos
  - rescátanos
  lexicon: HALOT
  rationale: נצל aquí denota liberar de un poder hostil. «Líbranos» funciona de manera natural en una súplica y conserva la idea de liberación de peligro.
- source_word: מִיַּד אֹיְבֵינוּ
  english_pob_choice: from the hand of our enemies
  chosen_spanish: de la mano de nuestros enemigos
  alternatives_spanish:
  - del poder de nuestros enemigos
  - de las manos de nuestros enemigos
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «mano» como poder o control. «De la mano de» es comprensible en español y conserva el valor idiomático.
- source_word: וְנַעַבְדֶךָּ
  english_pob_choice: and we will serve you
  chosen_spanish: y te serviremos
  alternatives_spanish:
  - y te serviremos nosotros
  - y que te sirvamos
  lexicon: HALOT
  rationale: El imperfecto/cohortativo expresa promesa o resolución tras la liberación. «Te serviremos» es la forma más natural en español y mantiene la correspondencia con el verbo anterior.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre divino propio, conforme al criterio del proyecto, evitando la sustitución por un título y manteniendo la audibilidad teológica del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עבד con deidades y con Yahvé
  english_pob_reading: serve
  chosen_spanish_reading: servir
  alternative_spanish_readings:
  - adorar
  - rendir culto
  rationale: '«Servir» conserva la línea de lealtad y obediencia que el verso contrasta: antes sirvieron a falsos dioses, ahora prometen servir a Yahvé. «Adorar» estrecharía demasiado el sentido y perdería la repetición lexical.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión inglesa cambió «because» por «for» para un registro más formal en la confesión; en español se optó por «pues», que transmite una relación causal formal y natural sin forzar un calco. También se respetó la consistencia de «serve» para עבד en ambos extremos del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma consistente del Tetragrámaton.
  - Se preservó «servir» para עבד en la confesión y en la promesa final.
  - Se evitó «adorar» para no borrar la tensión entre lealtad/culto y servicio.
  - La nota textual sobre las Astartes queda anclada en el término correspondiente mediante [a].
