translation:
  text: Jesus says[a], "If those who lead you say to you, 'Look, the kingdom is in
    the sky,' then the birds of the sky will precede you. If they say to you, 'It
    is in the sea,' then the fish will precede you. Rather, the kingdom is inside
    you and it is outside you. When you come to know yourselves, then you will be
    known, and you will realize that you are the children of the living Father. But
    if you do not know yourselves[b], you are in poverty[i][h][g][f][e][d][c], and
    you are poverty."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Those who lead you'': Coptic ⲥⲱⲕ means ''draw/lead''; it need not imply
      ''astray''. Some versions supply ''astray'', which is not explicit here.'
    reason: lexical_alternative
  - marker: b
    text: '''Sky'' translates ⲡⲉ; ''heaven'' is an alternative. The phrase ''birds
      of the sky'' signals a concrete image rather than a technical term.'
    reason: lexical_alternative
  - marker: c
    text: '''You will be known'' renders an impersonal 3rd plural (''they will know
      you''), a common Sahidic way to express a passive without naming an agent.'
    reason: dialect_note
  - marker: d
    text: Coptic has the singular 'the child (ⲡϣⲏⲣⲉ) of the living Father' addressed
      to a plural 'you'. The Greek fragment is often reconstructed with 'sons' (plural).
      This draft preserves the Coptic singular.
    reason: textual_variant
  - marker: e
    text: Where some reconstruct the Greek as 'the kingdom of God is within you…',
      the Coptic simply reads 'the kingdom'. No 'of God' appears in the Coptic text.
    reason: textual_variant
  - marker: f
    text: POxy 654 is commonly restored with an additional line, 'Whoever knows himself
      will find it,' which is not present in the Coptic manuscript here.
    reason: textual_variant
  - marker: g
    text: All second-person forms in this saying are plural (addressed to 'you' plural),
      which English does not mark.
    reason: dialect_note
  - marker: h
    text: Or 'the child'.
    reason: previous_rendering
  - marker: i
    text: Or "If they say, 'It is in the sea,'".
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - kingship
  - royal power
  - reign
  lexicon: Crum; Layton
  rationale: In Thomas this abstract noun regularly denotes the basileia-sphere; "kingdom"
    is idiomatic while retaining the domain/power sense.
- source_word: ⲥⲱⲕ ϩⲏⲧⲛⲧⲱⲧⲛ
  chosen: lead you
  alternatives:
  - draw you
  - pull you along
  - lead you astray
  lexicon: Crum
  rationale: ⲥⲱⲕ = 'draw, pull, lead'. Chose neutral 'lead' without presuming 'astray'
    (not overt in context).
- source_word: ⲡⲉ (with ⲛⲧⲉⲡⲡⲉ)
  chosen: sky
  alternatives:
  - heaven
  lexicon: Crum; Layton
  rationale: Concrete 'sky' fits the parallel with birds and avoids importing later
    theological nuance; genitive ⲛⲧⲉⲡⲡⲉ = 'of the sky'.
- source_word: ⲡϩⲁⲗⲏⲧ
  chosen: the birds
  alternatives:
  - the fowl
  lexicon: Crum
  rationale: Collective plural sense in context; standard rendering 'birds'.
- source_word: ⲑⲁⲗⲁⲥⲥⲁ
  chosen: sea
  lexicon: Greek loan in Coptic
  rationale: Common Hellenism; unproblematic.
- source_word: ⲧⲃⲧ
  chosen: fish
  alternatives:
  - fishes
  lexicon: Crum
  rationale: Collective sense; English 'fish' as plural mass noun is natural here.
- source_word: ⲛⲡⲉⲧⲛϩⲟⲩⲛ
  chosen: inside you
  alternatives:
  - within you
  lexicon: Crum; Layton
  rationale: '''Inside'' preserves spatial force and avoids churchy register; locative
    construction with possessive ''your''.'
- source_word: ⲛⲡⲉⲧⲛⲃⲟⲗ
  chosen: outside you
  alternatives:
  - outside of you
  - without you
  lexicon: Crum
  rationale: Simple spatial counterpart to 'inside you'.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - come to know
  - recognize
  lexicon: Crum; Layton
  rationale: Base sense 'know'; with future-conditional ⲉⲣϣⲁⲛ- nuance is inceptive
    ('come to know'), reflected in English by 'come to' in the first instance.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ ⲥⲟⲟⲩⲛ ⲛⲧⲱⲧⲛ
  chosen: you will be known
  alternatives:
  - they will know you
  lexicon: Layton (impersonal 3pl usage)
  rationale: Sahidic often uses 3pl indefinite for a passive sense; rendering as passive
    is idiomatic without adding a specific agent.
- source_word: ⲉⲓⲙⲉ
  chosen: realize
  alternatives:
  - understand
  - come to know
  lexicon: Crum
  rationale: Cognitive recognition fits the clause 'that you are…' better than 'find'
    or 'know'.
- source_word: ⲡϣⲏⲣⲉ
  chosen: the child
  alternatives:
  - the son
  lexicon: Crum
  rationale: Coptic has singular with article; 'child' keeps gender-neutral nuance
    and preserves the striking singular against plural 'you'.
- source_word: ⲛⲡⲉⲓⲱⲧ ⲉⲧⲉⲣⲉⲱⲛϩ ⲉϣⲱⲡⲉ
  chosen: the living Father
  alternatives:
  - the Father who lives
  lexicon: Crum
  rationale: Set phrase; 'living Father' is concise and idiomatic.
- source_word: ⲙⲛⲧϩⲏⲕⲉ
  chosen: poverty
  alternatives:
  - destitution
  lexicon: Crum
  rationale: Abstract noun for the state of being poor; 'poverty' straightforward.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  chosen: Look
  alternatives:
  - Behold
  lexicon: Crum
  rationale: Direct deictic; 'Look' matches Thomasine terseness.
- source_word: ϣⲟⲣⲡ
  chosen: precede
  alternatives:
  - go before
  - get there before
  lexicon: Crum
  rationale: Literal 'precede' keeps the aphoristic edge; alternatives are paraphrastic.
- source_word: ⲁⲗⲗⲁ
  chosen: Rather
  alternatives:
  - but rather
  lexicon: Greek loan in Coptic
  rationale: Corrective adversative introducing the counterclaim about the kingdom's
    locus.
textual_note: 'Sahidic with Lycopolitan coloring. No lacunae or conjectural restorations
  in Dilley''s Coptic for this saying. Notable grammar: repeated conditional future
  ⲉⲣϣⲁⲛ-ⲛⲧⲟⲟⲩ ϫⲱⲛⲧⲟⲥ (''if they should say''); impersonal 3pl ⲛⲧⲟⲟⲩ (''they'') used
  with passive sense (''you will be known''); predicative pronoun ⲛⲧⲟⲥ (''it is'')
  in ''it is in the sea''; locative possessive phrases ⲛⲡⲉⲧⲛϩⲟⲩⲛ / ⲛⲡⲉⲧⲛⲃⲟⲗ (''inside/outside
  you''). Singular predicate ⲡϣⲏⲣⲉ (''the child'') with 2pl subject ''you'' is retained
  as-is, reflecting Thomasine strangeness.'
