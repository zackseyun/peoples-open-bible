base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/005/008.yaml
  text: And David said on that day[a], “Whoever strikes the Jebusites and reaches the water shaft, and the lame and the blind, whom David’s soul hates.” Therefore they say[c][b], “The blind and the lame shall not come into the house.”
  footnotes:
  - marker: a
    text: Or 'the conduit,' 'the gutter,' or 'the tunnel'; the Hebrew term likely refers to a water system or shaft, but its precise sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew syntax in this clause is difficult. Some understand the words 'the lame and the blind' as part of the Jebusites' taunt from the previous verse, rather than as the direct object of David's challenge.
    reason: alternative_reading
  - marker: c
    text: Or 'shall not enter the palace'; 'house' may refer to the royal residence in context.
    reason: lexical_alternative
