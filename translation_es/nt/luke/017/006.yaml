translation:
  language: es
  text: 'Y el Señor dijo: «Si tuvieran fe como un grano de mostaza, le dirían a esta morera[a]: “Sé desarraigada y sé plantada en el mar”, y les obedecería».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «árbol de sicámine», una forma tradicional de traducir el término griego para una morera.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: En el relato de Lucas, κύριος funciona como título; en español, «Señor» mantiene el valor titular y la resonancia narrativa. Aunque la política general favorece «Yahvé» para יהוה, aquí el griego κύριος no cita directamente el nombre divino sino que sigue la formulación lucana del título de Jesús.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: «Fe» es el equivalente natural y más fiel al uso de πίστις en este dicho de posibilidad milagrosa. «Confianza» o «fidelidad» pueden existir en otros contextos, pero aquí la frase apunta a una fe capaz de confiar en lo imposible.
- source_word: ὡς κόκκον σινάπεως
  english_pob_choice: like a mustard seed
  chosen_spanish: como un grano de mostaza
  alternatives_spanish:
  - como una semilla de mostaza
  - tan pequeña como un grano de mostaza
  lexicon: BDAG
  rationale: La comparación se conserva con una equivalencia idiomática natural en español. «Grano de mostaza» reproduce la imagen sin sobrerinterpretar la comparación como mera pequeñez, aunque esa idea está implícita.
- source_word: συκαμίνῳ
  english_pob_choice: mulberry tree
  chosen_spanish: árbol de morera
  alternatives_spanish:
  - morera
  - árbol de sicómoro
  lexicon: BDAG
  rationale: συκάμινος designa una morera, no el árbol que en español suele llamarse «sicómoro». «Árbol de morera» evita confusión y conserva claridad; la opción tradicional transliterada no se adopta en el texto principal porque el proyecto privilegia transparencia semántica.
- source_word: ἐλέγετε ἂν
  english_pob_choice: you would say
  chosen_spanish: podrían decirle
  alternatives_spanish:
  - dirían
  - podrían decir
  lexicon: BDAG
  rationale: El imperfecto con ἄν expresa una acción potencial en una condición hipotética. En español, «podrían decirle» comunica mejor esa posibilidad que un simple futuro o un condicional aislado; además, el dativo permite mantener el complemento indirecto «le».
- source_word: Ἐκριζώθητι
  english_pob_choice: Be uprooted
  chosen_spanish: Arráncate
  alternatives_spanish:
  - Desarraígate
  - Sé arrancado de raíz
  lexicon: BDAG
  rationale: El imperativo pasivo de ἐκριζόω implica ser sacado de raíz. «Arráncate» es una forma breve, imperativa y comprensible en español bíblico contemporáneo; «desarraígate» o «sé arrancado de raíz» serían más explícitas pero menos naturales.
- source_word: φυτεύθητι ἐν τῇ θαλάσσῃ
  english_pob_choice: be planted in the sea
  chosen_spanish: plántate en el mar
  alternatives_spanish:
  - sé plantado en el mar
  - trasplántate al mar
  lexicon: BDAG
  rationale: «Plántate en el mar» conserva el paralelismo verbal y la imagen paradójica del original. Aunque «sé plantado» refleja más directamente la pasiva, suena menos natural en español; «plántate» mantiene fuerza e inmediatez.
- source_word: ὑπήκουσεν ἂν ὑμῖν
  english_pob_choice: it would obey you
  chosen_spanish: les obedecería
  alternatives_spanish:
  - les haría caso
  - les escucharía
  lexicon: BDAG
  rationale: ὑπακούω se traduce con «obedecer» por su fuerza de sumisión a una orden. Se usa «les» por concordancia con el plural ὑμῖν; «obedecería» preserva el condicional potencial del griego.
theological_decisions:
- issue: Tono del título κύριος en contexto lucano
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  - Yahvé
  rationale: La escena presenta a Jesús hablando dentro del relato; por eso «el Señor» funciona como título cristológico/narrativo. No se sustituye por «Yahvé», porque el texto griego usa κύριος como título de Jesús y no como cita explícita del nombre divino en este versículo.
  doctrine_reference: Luke narrative christology; POB default rendering for κύριος as title
translation_notes:
  revision_awareness: Se incorporó la revisión del POB en inglés que ajustó la construcción condicional de «have faith» a «had faith». En español se reflejó con «Si tuvieran fe», manteniendo la condicional hipotética del griego con ἂν. No se introdujeron cambios doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo la puntuación de cita directa en estilo editorial moderno y claro.
  - Se evitó «SEÑOR» en versales porque aquí κύριος funciona como título narrativo de Jesús, no como sustitución del nombre divino.
  - «Morera» se usa como término transparente; la nota conserva la alternativa tradicional «sicámine» para auditabilidad.
  - La coordinación de imperativos («Arráncate y plántate») preserva el paralelismo del griego.
  - Se usó «les» para el dativo plural ὑμῖν, coherente con el discurso a varios oyentes.
