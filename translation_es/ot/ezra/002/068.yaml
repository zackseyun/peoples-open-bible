translation:
  language: es
  text: Y algunos de los jefes de las casas paternas[a], cuando llegaron a la casa de Yahvé que está en Jerusalén, hicieron ofrendas voluntarias para la casa de Dios[b], para restablecerla sobre su fundamento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «jefes de familia». El hebreo dice literalmente «los jefes de las casas paternas», una unidad social de clan en Israel.
    reason: lexical_alternative
  - marker: b
    text: O, «ofrecieron voluntariamente». El verbo subraya el carácter libre y espontáneo de la entrega.
    reason: lexical_alternative
  - marker: c
    text: O, «establecerla en su lugar» o «sobre su base». El hebreo puede referirse tanto al fundamento físico como al lugar fijo del templo.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמֵרָאשֵׁי הָאָבוֹת
  english_pob_choice: And some of the heads of the fathers’ houses
  chosen_spanish: Y algunos de los jefes de las casas paternas[a]
  alternatives_spanish:
  - Y algunos de los jefes de los padres
  - Y algunos de los jefes de familia
  lexicon: HALOT
  rationale: El hebreo usa un plural partitivo con מן, por lo que conviene expresar 'algunos de'. רָאשֵׁי הָאָבוֹת designa unidades de linaje/clan; 'casas paternas' conserva mejor la estructura social del original que una neutralización por 'familia', aunque se mantiene inteligible en español.
- source_word: בְּבוֹאָם
  english_pob_choice: when they came
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - al llegar
  - cuando vinieron
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo con sufijo funciona aquí como circunstancia temporal. 'Cuando llegaron' expresa de manera natural y fiel ese valor.
- source_word: לְבֵית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - al templo de Yahvé
  - a la casa del SEÑOR
  lexicon: HALOT
  rationale: בַּיִת se traduce literalmente como 'casa'. En esta obra se conserva 'Yahvé' para el nombre divino, conforme al criterio del proyecto, y 'casa' mantiene la resonancia cultual del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el equivalente establecido por el proyecto para el Tetragrámaton, manteniendo el nombre divino visible en el texto español.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que está en la ciudad de Jerusalén
  - la cual está en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación de la casa de Yahvé. 'Que está en Jerusalén' es natural y preserva la localización sin añadir matices innecesarios.
- source_word: הִתְנַדְּבוּ
  english_pob_choice: gave freewill offerings
  chosen_spanish: hicieron ofrendas voluntarias
  alternatives_spanish:
  - ofrecieron voluntariamente
  - dieron ofrendas de buena voluntad
  lexicon: HALOT
  rationale: El hitpael de נדב enfatiza la voluntariedad. 'Hicieron ofrendas voluntarias' comunica claramente el acto de donar y conserva la idea de entrega libre; evita reducirlo solo a un adverbio.
- source_word: לְבֵית הָאֱלֹהִים
  english_pob_choice: for the house of God
  chosen_spanish: para la casa de Dios[b]
  alternatives_spanish:
  - para el templo de Dios
  - para la casa de Dios
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'casa de Yahvé' mediante 'casa de Dios'. La preposición ל indica finalidad/beneficio, por lo que 'para' es adecuado.
- source_word: לְהַעֲמִידוֹ
  english_pob_choice: to set it up
  chosen_spanish: para ponerla
  alternatives_spanish:
  - para establecerla
  - para levantarla
  lexicon: HALOT
  rationale: El hiphil de עמד puede significar 'hacer estar en pie', 'establecer' o 'poner'. En este contexto de reconstrucción, 'ponerla' prepara bien la frase hacia el complemento locativo; se complementa con el siguiente término para conservar la idea completa.
- source_word: עַל מְכוֹנוֹ
  english_pob_choice: on its foundation
  chosen_spanish: sobre su fundamento[c]
  alternatives_spanish:
  - sobre su base
  - en su sitio
  lexicon: HALOT
  rationale: מָכוֹן puede apuntar a 'fundamento', 'base' o 'sitio fijo'. 'Fundamento' es una opción clara en español y mantiene la tensión documentada entre base física y lugar establecido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se preserva el nombre divino en español como 'Yahvé', conforme al criterio del proyecto, en vez de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Phrasis social הָאָבוֹת
  english_pob_reading: fathers’ houses
  chosen_spanish_reading: casas paternas
  alternative_spanish_readings:
  - casas de los padres
  - familias
  rationale: La expresión refiere a unidades de parentesco/clan en Israel. 'Casas paternas' conserva esa estructura social y evita neutralizarla indebidamente; además, corresponde al valor literal del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios sustantivos; esta propuesta conserva las decisiones principales del audit trail inglés y las expresa en español con la terminología del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene 'casa de Dios' para לְבֵית הָאֱלֹהִים, paralela a 'casa de Yahvé'.
  - '''Casas paternas'' conserva la referencia a la organización clánica del texto hebreo.'
  - La ambigüedad de מְכוֹן se preserva con nota, sin fijarla de manera excesiva.
