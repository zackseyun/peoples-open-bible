translation:
  language: es
  text: Echamos suertes acerca de la ofrenda de madera[a]—los sacerdotes, los levitas y el pueblo—para llevar madera a la casa de nuestro Dios, según las casas de nuestros padres, en tiempos señalados, año tras año, para quemarla sobre el altar de Yahvé nuestro Dios, como está escrito en la Ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la ofrenda de madera». El hebreo de עַל puede entenderse como el asunto sobre el cual se echaban las suertes; el sentido es que se asignaba por sorteo la responsabilidad de proveer la madera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַגּוֹרָלוֹת הִפַּלְנוּ
  english_pob_choice: We cast lots
  chosen_spanish: Echamos suertes
  alternatives_spanish:
  - echamos lotes
  - hicimos caer las suertes
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de ‘hacer caer’ las suertes; en español, ‘echar suertes’ comunica de forma natural la acción de sortear sin perder el sentido idiomático.
- source_word: עַל קֻרְבַּן הָעֵצִים
  english_pob_choice: concerning the wood offering
  chosen_spanish: acerca de la ofrenda de madera
  alternatives_spanish:
  - para la ofrenda de madera
  - sobre la ofrenda de madera
  lexicon: HALOT
  rationale: ‘עַל’ introduce el asunto sobre el cual se sortea. ‘Acerca de’ preserva ese valor administrativo y evita sugerir que las suertes mismas eran la ofrenda. ‘Madera’ expresa הָעֵצִים de modo directo; ‘ofrenda de madera’ conserva la forma nominal de קֻרְבָּן.
- source_word: הַכֹּהֲנִים הַלְוִיִּם וְהָעָם
  english_pob_choice: the priests, the Levites, and the people
  chosen_spanish: los sacerdotes, los levitas y el pueblo
  alternatives_spanish:
  - los sacerdotes, los levitas y la gente
  lexicon: HALOT
  rationale: Se mantiene la lista explícita de los tres grupos. ‘Sacerdotes’ y ‘levitas’ son equivalentes directos; ‘el pueblo’ reproduce mejor el tono colectivo de וְהָעָם que ‘la gente’.
- source_word: לְהָבִיא
  english_pob_choice: to bring it
  chosen_spanish: para traerla
  alternatives_spanish:
  - para traerlo
  - para llevarla
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. En español, ‘traerla’ concuerda con ‘la ofrenda de madera’ implícita y suena más natural que repetir el sustantivo.
- source_word: לְבֵית אֱלֹהֵינוּ
  english_pob_choice: to the house of our God
  chosen_spanish: a la casa de nuestro Dios
  alternatives_spanish:
  - al templo de nuestro Dios
  lexicon: HALOT
  rationale: ‘Casa de nuestro Dios’ preserva la expresión hebrea y el matiz cultual sin sustituirla por un término más interpretativo como ‘templo’.
- source_word: לְבֵית אֲבֹתֵינוּ
  english_pob_choice: according to our fathers’ houses
  chosen_spanish: según las casas de nuestros padres
  alternatives_spanish:
  - según nuestras casas paternas
  - por nuestras casas paternas
  lexicon: HALOT
  rationale: La frase hebrea alude a divisiones familiares o clánicas. ‘Casas de nuestros padres’ conserva la imagen original y ‘según’ refleja el valor distributivo/organizativo del pasaje.
- source_word: לְעִתִּים מְזֻמָּנִים
  english_pob_choice: at appointed times
  chosen_spanish: en tiempos señalados
  alternatives_spanish:
  - en tiempos determinados
  - en ocasiones fijadas
  lexicon: HALOT
  rationale: ‘Tiempos señalados’ comunica la programación regular y cultual de la obligación. Evita una traducción demasiado rígida y mantiene el sentido administrativo.
- source_word: שָׁנָה בְשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - año por año
  - cada año
  lexicon: HALOT
  rationale: La expresión distributiva hebrea pide una fórmula española igualmente recurrente. ‘Año tras año’ conserva la repetición anual de manera fluida.
- source_word: לְבַעֵר עַל מִזְבַּח
  english_pob_choice: to burn on the altar
  chosen_spanish: para quemarla sobre el altar
  alternatives_spanish:
  - para arder sobre el altar
  - para consumirla sobre el altar
  lexicon: HALOT
  rationale: בער aquí se refiere al acto de quemar la leña en el altar. ‘Quemarla’ enlaza con la ofrenda de madera y respeta el valor causal/final del infinitivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’, que preserva el nombre divino en español y evita la sustitución por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: ‘Nuestro Dios’ mantiene el valor relacional del posesivo y la referencia singular adecuada al contexto.
- source_word: כַּכָּתוּב בַּתּוֹרָה
  english_pob_choice: as it is written in the Law
  chosen_spanish: como está escrito en la Ley
  alternatives_spanish:
  - como está escrito en la Ley de Moisés
  - según está escrito en la Ley
  lexicon: HALOT
  rationale: La fórmula apela a una prescripción escrita. ‘Ley’ capitalizada en español corresponde a la Torah como cuerpo reconocido de instrucción, en línea con el audit trail inglés.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se preserva como nombre propio divino en español, conforme al criterio del proyecto y sin recurrir a una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַל קֻרְבַּן הָעֵצִים
  english_pob_reading: concerning the wood offering
  chosen_spanish_reading: acerca de la ofrenda de madera
  alternative_spanish_readings:
  - para la ofrenda de madera
  - sobre la ofrenda de madera
  rationale: 'Se conserva la tensión semántica de עַל: no indica que las suertes sean la ofrenda, sino el asunto sobre el que se sortea. La traducción evita borrar ese matiz administrativo.'
  doctrine_reference: Lexical/contextual decision on Hebrew preposition עַל
translation_notes:
  revision_awareness: 'Sin cambios relevantes respecto del audit trail inglés: se conserva la equivalencia óptima, la lista de grupos, el sentido administrativo de עַל, la referencia anual y el nombre divino como Yahvé. No se introdujeron reinterpretaciones doctrinales ni ampliaciones no apoyadas por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «casa de nuestro Dios» como expresión cultual literal y transparente.
  - «Casas de nuestros padres» conserva la estructura social de familias/clanes sin explicarla en exceso dentro del texto.
  - «Ley» se usa con mayúscula para reflejar la Torah como corpus normativo.
  - Se evita «SEÑOR» para יְהוָה conforme al estándar del proyecto.
  - La puntuación con raya mantiene la aposición de los grupos sin alterar la sintaxis hebrea.
