translation:
  language: es
  text: Porque así como se alegró por tu caída y se regocijó por tu ruina[a][b], así se entristecerá por su propia desolación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ‘ruina’ traduce el matiz posible de πτῶματί; el término aquí apunta a calamidad o derrumbe, no a un cadáver literal.
    reason: lexical_alternative
  - marker: b
    text: La mujer implícita probablemente se refiere a la ciudad o nación hostil del contexto, tradicionalmente entendida como Babilonia.
    reason: cross_reference
lexical_decisions:
- source_word: ὥσπερ ... οὕτως
  english_pob_choice: For just as ... so
  chosen_spanish: Porque así como ... así
  alternatives_spanish:
  - Así como ... así
  - Porque como ... así
  lexicon: LSJ
  rationale: Mantiene la correlación comparativa explícita y conserva el matiz explicativo de γάρ al inicio del verso.
- source_word: ἐχάρη
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se alegró grandemente
  lexicon: BDAG
  rationale: Expresa bien la alegría del sujeto en español sin forzar un tono excesivamente solemne en la primera cláusula.
- source_word: πτώσει
  english_pob_choice: fall
  chosen_spanish: caída
  alternatives_spanish:
  - caída
  - derrumbe
  - ruina
  lexicon: LSJ
  rationale: ‘Caída’ conserva la metáfora básica del original y funciona naturalmente en español junto con el paralelismo inmediato con πτῶμα.
- source_word: εὐφράνθη
  english_pob_choice: was glad
  chosen_spanish: se regocijó
  alternatives_spanish:
  - se alegró
  - se llenó de júbilo
  lexicon: BDAG
  rationale: Distingue este segundo verbo del primero y reproduce la intensificación de gozo maligno en el paralelismo griego.
- source_word: πτώματί
  english_pob_choice: downfall
  chosen_spanish: ruina
  alternatives_spanish:
  - caída
  - derrumbe
  - desastre
  lexicon: LSJ
  rationale: Aquí se evita una posible repetición mecánica de ‘caída’ y se conserva el sentido de calamidad o desastre, no de cadáver literal.
- source_word: λυπηθήσεται
  english_pob_choice: will grieve
  chosen_spanish: se entristecerá
  alternatives_spanish:
  - sentirá dolor
  - se afligirá
  lexicon: BDAG
  rationale: ‘Se entristecerá’ comunica el futuro de dolor de forma natural en español y mantiene el contraste con su anterior regocijo.
- source_word: ἐρημίᾳ
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - desierto
  - devastación
  - ruina
  lexicon: LSJ
  rationale: En lenguaje profético, ‘desolación’ preserva el valor de devastación y abandono sin convertir el término en un lugar geográfico literal.
- source_word: ἑαυτῆς
  english_pob_choice: her own
  chosen_spanish: su propia
  alternatives_spanish:
  - de ella misma
  - la propia
  lexicon: BDAG
  rationale: El reflexivo queda expresado con ‘su propia’, que en español marca pertenencia y reversión respecto de la alegría causada por la desgracia ajena.
theological_decisions:
- issue: Referente femenino de los pronombres del versículo
  english_pob_reading: Render with feminine pronouns ('she,' 'her') without specifying the nation in the main text.
  chosen_spanish_reading: Conservar pronombres femeninos implícitos y explícitos (‘se’, ‘su’) sin identificar en el cuerpo del verso a Babilonia o a otra entidad.
  alternative_spanish_readings:
  - Nombrar a Babilonia en el texto principal
  - Sustituir por un nombre explicativo en nota
  rationale: El griego usa formas femeninas singulares; mantenerlas respeta la primacía del texto fuente y deja la identificación contextual para el lector o una nota, sin resolver artificialmente la referencia.
  doctrine_reference: Primacía del texto original; preservar la tensión contextual sin sobreinterpretación.
translation_notes:
  revision_awareness: El texto griego de Swete 1909 y el audit trail inglés coinciden en alto grado; no se requieren revisiones sustantivas. Se mantuvo el paralelismo comparativo, la distinción entre ‘caída’ y ‘ruina’, y el referente femenino implícito.
  spanish_consistency_notes:
  - Se prefirió ‘desolación’ para ἐρημίᾳ conforme al uso profético del término.
  - Se evitó ‘Cristo/mesías’ u otras equivalencias no pertinentes al verso.
  - Se preservó el contraste verbal entre alegría pasada y tristeza futura.
  - Se usó puntuación española con comas para reflejar el ritmo del original.
