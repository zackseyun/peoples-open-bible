base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/027.yaml
  text: Behold[a], I am watching over them for harm and not for good, and every man of Judah who is in the land of Egypt will come to an end by the sword and by famine[c][b], until they are consumed.
  footnotes:
  - marker: a
    text: Or 'for disaster' or 'for calamity'; the Hebrew term denotes harmful judgment, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every man of Judah,' a masculine singular expression used distributively.
    reason: lexical_alternative
  - marker: c
    text: Or 'until they are consumed.'
    reason: lexical_alternative
