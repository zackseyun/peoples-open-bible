id: TOB.14.10
reference: Tobit 14:10
source:
  edition: lxx-swete-1909
  text: καὶ θάψον με καλῶς, καὶ τὴν μητέρα σου μετ᾽ ἐμοῦ, καὶ μηκέτι αὐλισθῆτε εἰς Νινευή. τέκνον, ἴδε τί ἐποίησεν Ἀδὰμ Ἀχιαχάρῳ τῷ θρέψαντι αὐτόν, ὡς ἐκ τοῦ φωτὸς ἤγαγεν αὐτὸν εἰς τὸ σκότος καὶ ὅσα ἀνταπέδωκεν αὐτῷ· καὶ Ἀχιάχαρον μὲν ἔσωσεν, ἐκείνῳ δὲ τὸ ἀνταπόδομα ἀπεδόθη, καὶ αὐτὸς κατέβη εἰς τὸ σκότος. Μανασσῆς ἐποίησεν ἐλεημοσύνην, καὶ ἐσώθη ἐκ παγίδος θανάτου ἧς ἔπηξεν αὐτῷ, Ἀδὰμ δὲ ἐνέπεσεν εἰς τὴν παγίδα καὶ ἀπώλετο.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And bury me properly[a], and your mother with me, and do not stay any longer in Nineveh. Child, see what Nadab did to Ahikar, who had reared him—how he brought him from the light into the darkness, and all that he repaid him. But Ahikar was saved, while that man received the repayment, and he himself went down into the darkness. Manasseh did acts of mercy, and he was saved from the deadly snare that Nadab had set for him[b]; but Nadab fell into the trap and perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Ἀδὰμ here is the personal name of the treacherous courtier in the Ahikar story, not the first man Adam. The name is rendered 'Nadab' to avoid confusion; 'Adam' is a more literal transliteration of the Greek form.
    reason: alternative_reading
  - marker: b
    text: Or 'almsgiving' for 'acts of mercy'; the Greek term ἐλεημοσύνη often refers specifically to charitable giving in Tobit.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάψον
  chosen: bury
  alternatives:
  - inter
  - lay to rest
  lexicon: LSJ
  rationale: The aorist imperative of θάπτω straightforwardly means 'bury.' 'Inter' is too formal/archaic for the project's style, and 'lay to rest' is more interpretive.
- source_word: καλῶς
  chosen: properly
  alternatives:
  - well
  - honorably
  lexicon: LSJ
  rationale: καλῶς modifies the burial command. 'Properly' conveys doing it fittingly and adequately in natural modern English; 'well' is too vague, and 'honorably' adds a nuance not explicit in the adverb alone.
- source_word: μηκέτι αὐλισθῆτε
  chosen: do not stay any longer
  alternatives:
  - do not lodge any longer
  - do not encamp any longer
  lexicon: LSJ
  rationale: The passive/deponent form from αὐλίζομαι can mean to lodge or spend the night, and by extension remain. In this context of residence in Nineveh, 'do not stay any longer' best communicates the practical sense without wooden literalism.
- source_word: τέκνον
  chosen: Child
  alternatives:
  - Son
  - My child
  lexicon: LSJ
  rationale: τέκνον is a tender direct address. 'Child' preserves the familial address without over-specifying gender from the noun itself; 'my' is not explicit in Greek, though implied by context.
- source_word: ἴδε
  chosen: see
  alternatives:
  - look
  - consider
  lexicon: LSJ
  rationale: ἴδε is an imperative calling attention. 'See' is concise and natural; the following clause explains what is to be observed.
- source_word: Ἀδὰμ
  chosen: Nadab
  alternatives:
  - Adam
  lexicon: LSJ
  rationale: In Tobit this proper name refers to the villain known elsewhere in the Ahikar tradition as Nadab/Nadan, not the primeval Adam. Rendering it as 'Adam' would mislead English readers into a false identification. A transliterated form aligned to the narrative referent is preferable.
- source_word: Ἀχιαχάρῳ
  chosen: Ahikar
  alternatives:
  - Achiachar
  - Ahiqar
  lexicon: LSJ
  rationale: This is the well-known proper name from the Ahikar/Ahiqar tradition. 'Ahikar' is a standard English transliteration that is readable and recognizable, while remaining anchored to the Greek form.
- source_word: τῷ θρέψαντι αὐτόν
  chosen: who had reared him
  alternatives:
  - who had nourished him
  - who had brought him up
  lexicon: LSJ
  rationale: The participle from τρέφω here refers to upbringing rather than mere feeding. 'Who had reared him' captures the adoptive/guardian sense in idiomatic English.
- source_word: ἐκ τοῦ φωτὸς ... εἰς τὸ σκότος
  chosen: from the light into the darkness
  alternatives:
  - from light into darkness
  lexicon: LSJ
  rationale: The phrase is metaphorical and vivid. Retaining the articles in English with 'the light' and 'the darkness' preserves the rhetorical contrast naturally.
- source_word: ἀνταπέδωκεν / ἀνταπόδομα ἀπεδόθη
  chosen: repaid / received the repayment
  alternatives:
  - paid back / was paid back
  - requited / received requital
  lexicon: LSJ
  rationale: The repeated ἀνταποδ- wordgroup emphasizes recompense. 'Repaid' and 'received the repayment' preserve the lexical connection in readable English.
- source_word: ἔσωσεν / ἐσώθη
  chosen: was saved
  alternatives:
  - was delivered
  - was rescued
  lexicon: LSJ
  rationale: The passive forms here denote deliverance from mortal danger. 'Was saved' is the most direct rendering, though in this narrative context it means temporal rescue rather than necessarily spiritual salvation.
- source_word: ἐλεημοσύνην
  chosen: acts of mercy
  alternatives:
  - almsgiving
  - mercy
  lexicon: LSJ
  rationale: ἐλεημοσύνη in Tobit often carries the sense of charitable deeds/almsgiving. Here the singular is used generically. 'Acts of mercy' communicates the ethical action clearly in modern English without narrowing it only to monetary alms.
- source_word: παγίδος θανάτου
  chosen: deadly snare
  alternatives:
  - snare of death
  - death-trap
  lexicon: LSJ
  rationale: The genitive can be rendered literally, but 'deadly snare' is natural English that preserves the mortal danger. 'Death-trap' is more colloquial than desired.
- source_word: ἔπηξεν
  chosen: had set
  alternatives:
  - fixed
  - laid
  lexicon: LSJ
  rationale: For a trap, English idiom prefers 'set' or 'laid.' 'Had set' fits the relative clause and the completed prior action.
- source_word: ἀπώλετο
  chosen: perished
  alternatives:
  - was destroyed
  - died
  lexicon: LSJ
  rationale: ἀπόλλυμι in the middle here indicates ruin/death. 'Perished' preserves the gravity and suits the narrative judgment context better than the flatter 'died'.
