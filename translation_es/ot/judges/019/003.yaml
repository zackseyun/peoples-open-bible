    text: 'La expresión hebrea ‘hablarle al corazón’ es un modismo: hablar con ternura, insistencia o persuasión.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo es textualmente difícil en la frase traducida como ‘hacerla volver’; el contexto muestra que la intención era hacer que la mujer regresara con él.
    reason: textual_variant
