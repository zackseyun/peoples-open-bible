review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: la imposición de la mano sobre la cabeza de la ofrenda, su aceptación, y la expiación a favor del oferente. Conserva correctamente la nota sobre la lectura alternativa de וְנִרְצָה. Sin embargo, dos giros españoles reducen la fidelidad idiomática y la claridad del referente: «apoyará su mano» suena menos natural que «pondrá su mano» en contexto ritual, y «será aceptado para él» es torpe en español y no expresa bien el valor benefactivo de לוֹ.'
  spanish_quality_summary: El texto es comprensible, pero «apoyará su mano» y especialmente «será aceptado para él» suenan poco naturales en español bíblico actual. Una leve revisión mejora mucho la legibilidad sin perder la ambigüedad teológica preservada por el inglés POB. «Holocausto» y «hacer expiación por él» son aceptables y de registro eclesial claro.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Holocausto» para עֹלָה es una opción tradicional válida en español. «Expiación» para כפר está dentro del campo semántico esperado. No aparece ninguna de las entradas terminológicas sensibles del proyecto que requieran corrección.
  issues:
  - severity: medium
    issue: «Apoyará su mano» es poco idiomático para סמך en este rito
    rationale: Aunque no es incorrecto, en español bíblico y ritual «pondrá su mano» o «impondrá su mano» comunica mejor la acción prescrita. «Apoyar» puede sonar casual o físico sin suficiente fuerza cultual.
  - severity: medium
    issue: «Será aceptado para él» es un giro poco natural y semánticamente débil para וְנִרְצָה לוֹ
    rationale: El hebreo expresa aceptación en beneficio del oferente. En español, «será aceptado a su favor» conserva el pasivo, expresa el valor benefactivo y suena claramente más natural que «para él».
  - severity: low
    issue: La nota al pie empieza con comilla y fórmula poco natural
    rationale: 'La redacción actual funciona, pero «O también: “y él será aceptado”» suena más limpia y natural que la formulación con comilla inicial suelta.'
  revised_spanish_text: Y pondrá su mano sobre la cabeza del holocausto[a], y será aceptado a su favor, para hacer expiación por él.
  revised_footnotes:
