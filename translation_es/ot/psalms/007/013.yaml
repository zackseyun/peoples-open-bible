revisions:
- from: Si no se vuelve atrás[a], afilará su espada[b]; ha doblado su arco y lo ha dejado listo[c].
  to: Si no se vuelve[a], afilará su espada[b]; ha tensado su arco y lo ha preparado[c].
  rationale: Se corrige una nota incorrecta que no estaba respaldada por el hebreo («arma» por «espada»), se añade la nota teológica documentada sobre la ambigüedad del sujeto pronominal, y se mejora la naturalidad del español con «se vuelve» y «ha tensado su arco». También se alinea la nota final con el tipo de alternativa realmente atestiguada en la auditoría inglesa para «made it ready».
