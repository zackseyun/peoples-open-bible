id: LUK.20.37
reference: Luke 20:37
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι δὲ ἐγείρονται οἱ νεκροὶ καὶ Μωϋσῆς ἐμήνυσεν ἐπὶ τῆς βάτου, ὡς λέγει κύριον τὸν θεὸν Ἀβραὰμ ⸀καὶ θεὸν Ἰσαὰκ ⸁καὶ θεὸν Ἰακώβ·
base_translation:
  language: en
  yaml_path: translation/nt/luke/020/037.yaml
  text: But that the dead are raised[a], even Moses made known in the passage about the bush[b], where he calls the Lord the God of Abraham and the God of Isaac and the God of Jacob.
  footnotes:
  - marker: a
    text: Or, 'at the bush'—the Greek expression can refer either to the scene itself or, idiomatically, to the Scripture passage about the burning bush (Exod 3).
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Lord'; this reflects the Septuagint's customary rendering of the divine name in Exodus 3.
    reason: cross_reference
translation:
  language: ko
  text: 그러나 죽은 자들이 일으켜진다는 것은 모세도 가시덤불 단락에서 알려 주었습니다. 거기서 그는 주를 「아브라함의 하나님이요 이삭의 하나님이요 야곱의 하나님」이라고 부르기 때문입니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 여기서 κύριον은 출 3:6의 YHWH 인용
  chosen_reading: 주를
  alternative_readings:
  - 야훼를
  rationale: 예수께서 출 3:6을 인용하시며 κύριον τὸν θεὸν Ἀβραὰμ로 압축하신다. 헬라어 본문은 κύριος로 매개되어 있고 인용의 원형은 YHWH(אדני 대신 קוראים)이지만, 본문 흐름과 한국어 자연성을 위해 「주」를 채택하고 야훼 함의는 신학적 결정에 명시.
