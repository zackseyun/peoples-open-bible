lexical_decisions:
- source_word: ηὔχετο
  english_pob_choice: kept praying
  chosen_spanish: seguía orando
  alternatives_spanish:
  - oraba
  - seguía suplicando
  - continuaba orando
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua o reiterada; «seguía orando» conserva esa duración con naturalidad en español.
- source_word: μιερὸς
  english_pob_choice: polluted man
  chosen_spanish: el hombre contaminado
  alternatives_spanish:
  - el hombre impuro
  - el hombre defiled
  lexicon: LSJ
  rationale: El adjetivo griego tiene un peso moral y también cultual. «Contaminado» preserva esa carga de impureza sin suavizarla; «hombre» reproduce el uso substantivado del artículo.
- source_word: δεσπότην
  english_pob_choice: Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Dueño
  - el Soberano
  - el Señor
  lexicon: LSJ
  rationale: Se evita «Señor» para no borrar la diferencia entre δεσπότης y κύριος. «Maestro» es la opción más transparente y relativamente cercana al sentido de autoridad absoluta o dueño.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  lexicon: LSJ
  rationale: Expresa negación temporal de manera natural y directa en español.
- source_word: ἐλεήσοντα
  english_pob_choice: would ... have mercy
  chosen_spanish: tendría misericordia
  alternatives_spanish:
  - compadecería
  - mostraría misericordia
  - tendría compasión
  lexicon: LSJ
  rationale: El participio futuro apunta a una acción esperada desde la perspectiva del hablante; «tendría misericordia» conserva bien el valor prospectivo e idiomático.
- source_word: οὕτως λέγων
  english_pob_choice: saying this
  chosen_spanish: diciendo así
  alternatives_spanish:
  - diciendo esto
  - hablando así
  - diciendo de este modo
  lexicon: LSJ
  rationale: Introduce de forma natural el discurso directo que sigue, manteniendo la transición explícita del griego.
