  text: 1 Ἄκουε οὖν, φησίν, ἀνόητε, πῶς ἡ λύπη ἐκτρίβει τὸ πνεῦμα τὸ ἅγιον καὶ πάλιν
    σώζει· 2 ὅταν ὁ δίψυχος ἐπιβάληται πρᾶξίν τινα καὶ ταύτης ἀποτύχῃ διὰ τὴν διψυχίαν
    αὐτοῦ, ἡ λύπη αὕτη εἰσπορεύεται εἰς τὸν ἄνθρωπον καὶ λυπεῖ τὸ πνεῦμα τὸ ἅγιον
    καὶ ἐκτρίβει αὐτό. 3 εἶτα πάλιν ἡ ὀξυχολία ὅταν κολληθῇ τῷ ἀνθρώπῳ περὶ πράγματός
    τινος, καὶ λίαν πικρανθῇ, πάλιν ἡ λύπη εἰσπορεύεται εἰς τὴν καρδίαν τοῦ ἀνθρώπου
    τοῦ ὀξυχολήσαντος, καὶ λυπεῖται ἐπὶ τῇ πράξει αὐτοῦ ᾗ ἔπραξε καὶ μετανοεῖ, ὅτι
    τὸ πονηρὸν εἰργάσατο. 4 αὕτη οὖν ἡ λύπη δοκεῖ σωτηρίαν ἔχειν, ὅτι τὸ πονηρὸν πράξας
    μετενόησεν. ἀμφότεραι οὖν αἱ πράξεις λυποῦσι τὸ πνεῦμα· ἡ μὲν διψυχία, ὅτι οὐκ
    ἐπέτυχε τῆς πράξεως αὐτῆς, ἡ δὲ ὀξυχολία λυπεῖ τὸ πνεῦμα, ὅτι ἔπραξε τὸ πονηρόν.
    ἀμφότερα οὖν λυπηρά ἐστι τῷ πνεύματι τῷ ἁγίῳ, ἡ διψυχία καὶ ἡ ὀξυχολία. 5 ἆρον
    οὖν ἀπὸ σεαυτοῦ τὴν λύπην καὶ μὴ θλῖβε τὸ πνεῦμα τὸ ἅγιον τὸ ἐν σοί κατοικοῦν,
    μήποτε ἐντεύξηται τῷ θεῷ καὶ ἀποστῇ ἀπὸ σου. 6 τὸ γὰρ πνεῦμα τοῦ θεοῦ τὸ δοθὲν
    εἰς τὴν σάρκα ταύτην λύπην οὐχ ὑποφέρει οὐδὲ στενοχωρίαν.
