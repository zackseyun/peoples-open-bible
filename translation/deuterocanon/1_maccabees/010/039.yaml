theological_decisions:
- issue: Referent of ἅγιοι / final τοῖς ἁγίοις in a temple-administrative context
  chosen_reading: The first occurrence refers to the holy ones in Jerusalem; the final phrase is rendered in relation to the holy place/sanctuary because the context is financial support for sacred operations.
  alternative_readings:
  - Both occurrences refer to holy persons
  - The final phrase means 'for the holy things'
  rationale: This is not a major doctrinal dispute, but it affects whether the grant is heard as support for persons or for temple service. The immediate context of expenses favors a sanctuary-oriented sense in the final phrase, while the first phrase naturally identifies the Jerusalem sacred community.
  doctrine_reference: Translation philosophy §1, §5
