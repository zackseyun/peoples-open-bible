base_translation:
  language: en
  yaml_path: translation/ot/joshua/023/014.yaml
  text: And behold[a], today I am going the way of all the earth, and you know with all your heart and with all your soul that not one thing has failed of all the good things that Yahweh your God spoke concerning you. All of them have come to you[b]; not one thing of them has failed.
  footnotes:
