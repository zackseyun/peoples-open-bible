lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Siempre que
  lexicon: BDAG
  rationale: Introduce una cláusula condicional de manera natural en español sin añadir iteración o frecuencia que el griego no exige.
- source_word: ὑπερπλεονάσῃ
  english_pob_choice: has an abundance
  chosen_spanish: tiene abundancia
  alternatives_spanish:
  - tiene demasiado
  - tiene un exceso
  - abunda excesivamente
  lexicon: LSJ
  rationale: La forma griega expresa sobreabundancia o tener más de lo debido. «Tiene abundancia» conserva la idea de superávit con español claro, sin convertirla en una interpretación moral específica como avaricia.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el hombre
  lexicon: BDAG
  rationale: En el género proverbial del enunciado, el singular indefinido transmite bien el valor general de ἄνθρωπος. Se conserva «hombre» como equivalente directo del término griego, siguiendo la política de precisión de género del proyecto.
- source_word: ἐξαμαρτάνει
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - comete pecado
  - yerra
  lexicon: BDAG
  rationale: El verbo expresa el acto de pecar de forma directa. «Peca» es la forma más natural y fiel en español para el sentido moral básico, sin suavizarlo ni amplificarlo.
theological_decisions:
- issue: Si la abundancia debe interpretarse como avaricia o codicia
  english_pob_reading: 'Retain the broader statement about excess: "If a man has an abundance, he sins."'
  chosen_spanish_reading: 'Conservar la afirmación amplia sobre la abundancia: «Si un hombre tiene abundancia, peca».'
  alternative_spanish_readings:
  - Si un hombre tiene demasiado, peca.
  - Si un hombre abunda demasiado, peca.
  - Si un hombre es avaro, peca.
  rationale: El griego habla de sobreabundancia y pecado, pero no nombra explícitamente la motivación interna de avaricia. La traducción mantiene esa tensión sin cerrarla interpretativamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El inglés POB fue revisado de «has an excess» a «has an abundance» para mayor naturalidad y mejor ajuste léxico a ὑπερπλεονάσῃ. La redacción española sigue esa decisión revisada con «tiene abundancia», manteniendo la brevedad proverbial del original griego.
  spanish_consistency_notes:
  - Se mantiene un tono proverbial y conciso.
  - «Abundancia» conserva la ambigüedad de sobreabundancia sin introducir una causa moral no explicitada.
  - «Peca» refleja con claridad el valor verbal de ἐξαμαρτάνει.
  - Se preserva «hombre» para ἄνθρωπος como equivalente singular general, coherente con la política de género del proyecto.
