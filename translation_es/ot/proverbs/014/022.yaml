translation:
  language: es
  text: ¿No se extravían los que planean el mal? Pero el amor leal[a] y la fidelidad pertenecen a los que planean el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bondad y verdad», o «misericordia y fidelidad». La pareja hebrea חֶסֶד וֶאֱמֶת a menudo denota amor leal junto con fiabilidad o verdad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Will not
  chosen_spanish: ¿No... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No...?» conserva de forma natural ese impulso interrogativo sin añadir contenido nuevo.
- source_word: יִתְעוּ
  english_pob_choice: go astray
  chosen_spanish: se extravían
  alternatives_spanish:
  - se desvían
  - andan errantes
  lexicon: HALOT
  rationale: El verbo expresa apartarse del camino recto. «Se extravían» comunica bien la idea moral de desviarse y suena natural en un proverbio sapiencial.
- source_word: חֹרְשֵׁי רָע
  english_pob_choice: those who devise evil
  chosen_spanish: los que maquinan el mal
  alternatives_spanish:
  - los que traman el mal
  - los que planean el mal
  lexicon: HALOT
  rationale: El participio de חרשׁ implica trabajar o forjar con intención; en este contexto describe una intención deliberada. «Maquinar» conserva el matiz de planificación oculta y funciona bien con el sustantivo moral «mal».
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  lexicon: HALOT
  rationale: En el contraste antitético con טוֹב, el término es moral. «El mal» preserva la oposición ética con «el bien».
- source_word: וְחֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: la misericordia
  alternatives_spanish:
  - el amor leal
  - la bondad fiel
  lexicon: HALOT
  rationale: חֶסֶד puede expresar amor leal de pacto, misericordia o bondad. Aquí, para español bíblico natural, «misericordia» es una opción válida, aunque la nota mantiene la alternativa de «amor leal» para no borrar la amplitud del término.
- source_word: וֶאֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la confiabilidad
  lexicon: HALOT
  rationale: En la pareja חֶסֶד וֶאֱמֶת, אֱמֶת frecuentemente comunica verdad, fidelidad o confiabilidad. «La verdad» conserva la amplitud semántica y permite la lectura relacional subyacente sin forzar una sola acepción.
- source_word: חֹרְשֵׁי טוֹב
  english_pob_choice: those who devise good
  chosen_spanish: los que maquinan el bien
  alternatives_spanish:
  - los que planean el bien
  - los que traman el bien
  lexicon: HALOT
  rationale: Se repite el mismo participio para mantener el paralelismo del proverbio. «Maquinar» reproduce la correspondencia con el hemistiquio anterior y conserva la fuerza deliberada del verbo.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - la bondad
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado en contraste con רָע. «El bien» mantiene la simetría ética del verso.
theological_decisions:
- issue: Valor de חֶסֶד וֶאֱמֶת como pareja tradicional
  english_pob_reading: steadfast love and faithfulness
  chosen_spanish_reading: misericordia y verdad
  alternative_spanish_readings:
  - amor leal y fidelidad
  - bondad fiel y confiabilidad
  rationale: La POB inglesa conserva la tensión entre un término de lealtad pactal y otro de fiabilidad/verdad. En español, «misericordia y verdad» es una pareja bíblica reconocible y compatible con el hebreo, aunque la nota deja abierta la lectura de «amor leal y fidelidad» para reflejar mejor la dimensión relacional si se desea explicitarla.
  doctrine_reference: Sabiduría bíblica y semántica de חֶסֶד/אֱמֶת; mantener la riqueza del paralelismo hebreo sin reducirlo a una sola glosa.
- issue: Predicado implícito en la segunda cola
  english_pob_reading: belong to those who devise good
  chosen_spanish_reading: pertenecen a los que maquinan el bien
  alternative_spanish_readings:
  - están con los que maquinan el bien
  - son para los que maquinan el bien
  rationale: El hebreo omite un verbo explícito; en español se necesita suplirlo. «Pertenecen a» conserva la compactación proverbial y evita precisar indebidamente si la misericordia y la verdad acompañan, caracterizan o se otorgan a esas personas.
  doctrine_reference: 'Principio de equivalencia óptima: suplir lo implícito sin eliminar la ambigüedad funcional del hebreo.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador mantiene la alta concordancia con el texto fuente y con el audit trail inglés, mientras adapta las elecciones léxicas al español bíblico natural.
  spanish_consistency_notes:
  - Se mantiene la repetición del participio «los que maquinan...» en ambos miembros para reflejar el paralelismo del hebreo.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino ni un caso de cita de κύριος.
  - Se prefirió «el bien / el mal» para conservar el contraste ético directo del proverbio.
  - La nota explica la pareja חֶסֶד/אֱמֶת para no perder su posible sentido de lealtad y fidelidad.
