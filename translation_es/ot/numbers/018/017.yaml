translation:
  language: es
  text: Pero no redimirás el primogénito de un buey, ni el primogénito de una oveja, ni el primogénito de una cabra; son santos. Rociarás su sangre sobre el altar, y quemarás su grasa como ofrenda por fuego, aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Solo
  - Sin embargo
  lexicon: HALOT
  rationale: Introduce la restricción legal con una adversativa natural en español, manteniendo el matiz de contraste con lo anterior sin cargar la frase.
- source_word: בְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primer nacido
  - primera cría
  lexicon: HALOT
  rationale: En un contexto sacrificial y legal, 'primogénito' transmite el sentido técnico de la primera cría macho o hembra según el caso, y es el equivalente natural en español bíblico moderno.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - bovino
  - toro
  lexicon: HALOT
  rationale: '''Buey'' es un término culto y claro para el animal bovino en lenguaje sacrificial; evita la especificidad sexual de ''toro'' y suena más natural que ''ox'' traducido literalmente como ''buey''.'
- source_word: כֶּשֶׂב
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - res
  lexicon: HALOT
  rationale: El término hebreo puede abarcar oveja/cordero, pero aquí funciona como categoría genérica junto a buey y cabra; 'oveja' conserva esa categoría sin forzar 'cordero'.
- source_word: עֵז
  english_pob_choice: goat
  chosen_spanish: cabra
  alternatives_spanish:
  - chivo
  - cabrito
  lexicon: HALOT
  rationale: '''Cabra'' es el equivalente estándar y de género común para el animal listado; ''chivo'' o ''cabrito'' serían más marcados en sexo/edad.'
- source_word: לֹא תִפְדֶּה
  english_pob_choice: you shall not redeem
  chosen_spanish: no redimirás
  alternatives_spanish:
  - no rescatarás
  - no pagarás rescate por
  lexicon: HALOT
  rationale: En contexto sacerdotal/legal, פדה exige 'redimir', que en español conserva la idea de rescate/sustitución con el registro técnico adecuado.
- source_word: קֹדֶשׁ הֵם
  english_pob_choice: they are holy
  chosen_spanish: son santos
  alternatives_spanish:
  - son sagrados
  - son consagrados
  lexicon: HALOT
  rationale: '''Santos'' mantiene el predicado cultual de pertenencia a Dios; ''consagrados'' explicita la condición pero desplaza el énfasis del texto. Se evita ''sagrados'' por ser menos preciso en este registro.'
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: HALOT
  rationale: Término literal del rito sacrificial.
- source_word: תִּזְרֹק
  english_pob_choice: you shall sprinkle
  chosen_spanish: Rociarás
  alternatives_spanish:
  - esparcirás
  - salpicarás
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'sprinkle' por naturalidad litúrgica. En español, 'rociar' transmite mejor el gesto ritual de aplicar sangre al altar sin sonar demasiado tosco; 'salpicar' sería más fuerte pero menos idiomático.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Término cultual estándar.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - gordura
  lexicon: HALOT
  rationale: En español bíblico, 'grasa' comunica bien la porción sacrificial reservada para quemarse; 'sebo' puede sonar más técnico o restringido.
- source_word: תַּקְטִיר
  english_pob_choice: you shall burn
  chosen_spanish: quemarás
  alternatives_spanish:
  - harás humear
  - ofrecerás por fuego
  lexicon: HALOT
  rationale: En contexto ritual, קטר se refiere a quemar la porción sobre el altar; 'quemarás' es claro y fiel. Se añade la nota para la forma más formal de 'ofrenda encendida'.
- source_word: אִשֶּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda ígnea
  lexicon: HALOT
  rationale: El término técnico describe una ofrenda hecha por fuego; 'ofrenda encendida' suena natural en español y conserva el valor sacrificial. Se documenta la alternativa más formal en la nota.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - olor grato
  lexicon: HALOT
  rationale: Conserva el idiomático hebreo de aceptación divina mediante imagen olfativa. 'Aroma agradable' es natural y suficientemente cercano al valor cultual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: Se sigue el estándar POB en español de renderizar el Tetragrámaton como 'Yahvé', no como una sustitución reverencial genérica.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo emplea explícitamente el nombre del pacto; el español POB usa 'Yahvé' para mantener la transparencia del nombre divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de אִשֶּׁה en contexto sacrificial
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda ígnea
  rationale: El hebreo señala una ofrenda presentada mediante fuego. En español, 'ofrenda encendida' preserva el sentido técnico sin imponer una formulación arcaica; la nota preserva la alternativa más formal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish, directly auditable'
- issue: Predicado cultual קֹדֶשׁ הֵם
  english_pob_reading: they are holy
  chosen_spanish_reading: son santos
  alternative_spanish_readings:
  - son sagrados
  - son consagrados
  rationale: '''Santos'' mantiene el valor de separación cultual y pertenencia a Dios. ''Consagrados'' explicita la idea, pero el hebreo afirma su estado como algo santo, no solo dedicado.'
  doctrine_reference: Levítico/Números priestly holiness terminology in canonical context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'sprinkle' sobre 'splash' para el rito de la sangre. Por eso el español usa 'rociarás', que refleja un gesto ritual más natural y sobrio que una versión más brusca, sin perder la acción cultual sobre el altar.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה conforme al estándar del proyecto en español.
  - Se conservó el registro cultual con 'primogénito', 'redimir', 'santos', 'altar' y 'ofrenda encendida'.
  - '''Rociarás'' se eligió para armonizar con la revisión inglesa y con el uso ritual español más natural, sin reducir la literalidad del verbo hebreo.'
  - 'No se introdujeron glosas doctrinales ajenas al verso; la formulación sigue la secuencia hebrea: prohibición de redimir, estado santo, sangre sobre el altar, grasa quemada para Yahvé.'
