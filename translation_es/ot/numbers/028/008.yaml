revisions:
- from: Y ofrecerás el segundo cordero entre las tardes[a]; como la ofrenda vegetal de la mañana y su ofrenda de libación, lo ofrecerás como ofrenda consumida por fuego[b], aroma agradable a Yahvé.
  to: Y ofrecerás el segundo cordero entre los atardeceres[a]; como la ofrenda de grano de la mañana y su libación, así lo ofrecerás como ofrenda por fuego[b], aroma agradable a Yahvé.
  rationale: Se ajusta בֵּין הָעַרְבָּיִם a 'entre los atardeceres' para preservar mejor la expresión hebrea debatida en un español más inteligible. Se cambia אִשֵּׁה a 'ofrenda por fuego' como equivalente principal más fiel al valor léxico, dejando una alternativa contextual en nota. También se suaviza la frase media para mayor claridad litúrgica y legibilidad.
  reviewer_model: gpt-5.4
