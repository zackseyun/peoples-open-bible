- from: Sin embargo[a], no habrá entre ustedes ningún pobre, porque Yahvé ciertamente los bendecirá en la tierra que Yahvé su Dios les da en heredad para poseerla.
  to: Sin embargo[a], no habrá entre ti ningún pobre, porque Yahvé ciertamente te bendecirá en la tierra que Yahvé tu Dios te da como herencia para poseerla.
  rationale: Se corrige la concordancia pronominal al singular para reflejar fielmente el hebreo y el patrón exhortativo de Deuteronomio. Se ajusta «en heredad» a «como herencia» por mayor naturalidad en español sin perder la resonancia pactal. La nota se afina para describir mejor la función discursiva de אֶפֶס.
