revisions:
- from: 'Y sucedió en el séptimo día que el niño murió. Y los siervos de David temieron decírselo, que el niño había muerto[a], pues dijeron: «He aquí, mientras el niño aún vivía, le hablamos, y no escuchó nuestra voz. ¿Cómo, pues, le diremos: “El niño ha muerto”? Podría hacer daño».'
  to: 'Y al séptimo día el niño murió. Y los siervos de David temieron decirle que el niño había muerto, pues dijeron: «He aquí, mientras el niño aún vivía, le hablamos, y no escuchó nuestra voz. ¿Cómo, pues, le diremos: “El niño ha muerto”? Podría hacer daño[a]».'
  rationale: Se corrige la sintaxis para un español natural y fiel («Y al séptimo día...», «temieron decirle...»), y se reubica la nota al segmento que realmente comenta, preservando la ambigüedad deliberada de וְעָשָׂה רָעָה.
