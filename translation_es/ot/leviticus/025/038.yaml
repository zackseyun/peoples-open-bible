translation:
  language: es
  text: Yo soy Yahvé, el Dios de ustedes[a], que los saqué de la tierra de Egipto para darles la tierra de Canaán, para ser el Dios de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente contiene el Tetragrama directamente. Siguiendo la política del proyecto, en español se vierte como «Yahvé» para preservar el nombre propio divino y no sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - sus dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, en este contexto de pacto refiere al Dios único de Israel. En español, «su Dios» conserva la relación de pertenencia/pacto sin introducir un plural engañoso.
- source_word: הוֹצֵאתִי
  english_pob_choice: brought ... out
  chosen_spanish: saqué
  alternatives_spanish:
  - los saqué
  - los hice salir
  - los conduje fuera
  lexicon: HALOT
  rationale: El verbo causativo en contexto de éxodo se expresa con naturalidad en español como «saqué». Mantiene la acción de liberación desde Egipto sin sobrecargar la frase.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva «tierra» porque el hebreo incluye explícitamente אֶרֶץ. «De la tierra de Egipto» sigue de cerca la referencia territorial del original.
- source_word: לָתֵת לָכֶם אֶת אֶרֶץ כְּנַעַן
  english_pob_choice: to give you the land of Canaan
  chosen_spanish: para darles la tierra de Canaán
  alternatives_spanish:
  - para darles la tierra de Canaán a ustedes
  - para concederles la tierra de Canaán
  lexicon: HALOT
  rationale: 'El infinitivo final expresa propósito: la salida de Egipto fue con miras a la concesión de la tierra. «Para darles» preserva la relación propósito-don en español natural.'
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  english_pob_choice: to be your God
  chosen_spanish: para ser su Dios
  alternatives_spanish:
  - para estar con ustedes como Dios
  - para ser Dios de ustedes
  lexicon: HALOT
  rationale: Se mantiene la fórmula de pacto de manera idiomática. «Para ser su Dios» conserva la relación covenantal sin añadir interpretación que el hebreo no exige.
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  lexicon: HALOT
  rationale: El hebreo usa pronombre independiente de énfasis. En español, «Yo soy» transmite la autoidentificación enfática con fluidez y solemnidad.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto fuente es el Nombre propio divino, no un título. «Yahvé» preserva esa referencia y sigue el principio doctrinal del proyecto para el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de pacto לִהְיוֹת לָכֶם לֵאלֹהִים
  english_pob_reading: to be your God
  chosen_spanish_reading: para ser su Dios
  alternative_spanish_readings:
  - para ser Dios para ustedes
  - para estar como Dios con ustedes
  rationale: La frase expresa relación pactual y pertenencia, no un cambio en el ser divino. La traducción elegida conserva la fuerza teológica del pacto con naturalidad en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: la decisión principal fue conservar el Nombre divino como «Yahvé» y la fórmula pactual como una relación de pertenencia. No se requirieron revisiones respecto del pasaje fuente; la versión española sigue de cerca la estructura hebrea sin calco innecesario.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y consistente del Nombre divino como «Yahvé».
  - Se conserva «tierra de Egipto» porque el hebreo incluye explícitamente אֶרֶץ.
  - La fórmula final «para ser su Dios» refleja el paralelismo del pacto sin añadir explicaciones.
  - El pronombre de segunda persona plural se expresa en español con el posesivo «su» por concordancia de respeto y lectura bíblica común en registros neutros.
