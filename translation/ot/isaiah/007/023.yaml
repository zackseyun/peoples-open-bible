id: ISA.7.23
reference: Isaiah 7:23
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא יִֽהְיֶ֣ה כָל מָק֗וֹם אֲשֶׁ֧ר יִֽהְיֶה שָּׁ֛ם אֶ֥לֶף גֶּ֖פֶן בְּ/אֶ֣לֶף כָּ֑סֶף לַ/שָּׁמִ֥יר וְ/לַ/שַּׁ֖יִת יִֽהְיֶֽה־־׃
translation:
  text: And in that day[b][a], every place where there were a thousand vines worth a thousand pieces of silver will become briars and thorns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'where there will be a thousand vines worth a thousand pieces of silver.' The Hebrew imperfect can be rendered more literally this way, but the context favors a contrast between formerly valuable vineyard land and its future desolation.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'a thousand vines for a thousand silver.' The exact monetary unit is not stated explicitly in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will become
  alternatives:
  - And it shall happen
  - And it will be
  lexicon: HALOT
  rationale: Introduces the prophetic circumstance with a future/resultative sense. In English, the clause is best carried forward into the final predicate rather than rendered woodenly as a separate 'and it shall be.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula; 'in that day' is idiomatic and preserves the eschatological/judgment register.
- source_word: כָל מָקוֹם
  chosen: every place
  alternatives:
  - every location
  - each place
  lexicon: HALOT
  rationale: Straightforward rendering of the distributive phrase.
- source_word: אֲשֶׁר יִהְיֶה שָׁם
  chosen: where there used to be
  alternatives:
  - where there will be
  - in which there are
  lexicon: HALOT
  rationale: Although the verb is formally imperfect, the context contrasts formerly valuable cultivated land with its future desolation. English naturally expresses this as prior state relative to the coming judgment.
- source_word: אֶלֶף גֶּפֶן
  chosen: a thousand vines
  alternatives:
  - a thousand grapevines
  lexicon: HALOT
  rationale: גפן denotes vine/grapevine. 'Vines' is concise and natural in context.
- source_word: בְּאֶלֶף כָּסֶף
  chosen: worth a thousand pieces of silver
  alternatives:
  - for a thousand silver shekels
  - at a thousand silver
  lexicon: HALOT
  rationale: The phrase indicates valuation/price. Since 'shekels' is not explicit in the Hebrew, 'pieces of silver' preserves the monetary sense without over-specifying the unit.
- source_word: לַשָּׁמִיר וְלַשַּׁיִת
  chosen: briars and thorns
  alternatives:
  - briers and thorns
  - thornbush and scrub
  lexicon: HALOT
  rationale: A conventional pair for uncultivated overgrowth. 'Briars and thorns' is clear modern English and fits the judgment imagery. The exact botanical distinction is uncertain, so a broad rendering is preferable.
- source_word: יִהְיֶה
  chosen: will become
  alternatives:
  - will be
  - shall be for
  lexicon: HALOT
  rationale: Given the contrast between former vineyard value and future overgrowth, 'will become' makes explicit the change-of-state implied by the context while remaining faithful to the Hebrew predicate construction.
