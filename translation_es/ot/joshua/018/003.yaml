review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: Josué habla a los hijos de Israel, formula una reprensión temporal («¿Hasta cuándo...?»), los acusa de falta de diligencia para entrar y tomar posesión de la tierra, y afirma que Yahvé ya se la ha dado. También preserva correctamente «Yahvé» para יהוה y la nota sobre «hijos de Israel».'
  spanish_quality_summary: El texto es claro y digno, pero «van a ser remisos» suena menos natural en esta pregunta de reprensión que una formulación dinámica como «seguirán siendo remisos» o «se quedarán remisos». Además, el uso de «sus padres» para dirigirse a «ustedes» puede sonar algo distante; «sus antepasados» sería más natural, pero la fórmula pactal «sus padres» es aceptable y más literal. El ajuste principal es estilístico-sintáctico para mejorar la fluidez sin perder precisión.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> «Yahvé»; בְּנֵי יִשְׂרָאֵל -> «los hijos de Israel» con nota alternativa; הָאָרֶץ -> «la tierra». No hay conflicto doctrinal ni léxico mayor.'
  issues:
  - severity: medium
    issue: «van a ser remisos» es poco idiomático en esta construcción interrogativa
    rationale: Aunque comunica el sentido, en español suena más forzado que una expresión aspectualmente más natural para una reprensión continua, como «seguirán siendo remisos». Esto refleja mejor la fuerza de עַד אָ֨נָה ... מִתְרַפִּים.
  revised_spanish_text: 'Y Josué dijo a los hijos de Israel[a]: «¿Hasta cuándo seguirán siendo remisos en entrar a tomar posesión de la tierra que Yahvé, el Dios de sus padres, les ha dado?»'
  revised_footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y reflejar mejor el matiz de reprensión prolongada del hebreo. Se conserva todo lo demás: el nombre divino «Yahvé», la transparencia de «hijos de Israel», y la fórmula pactal «el Dios de sus padres».'
