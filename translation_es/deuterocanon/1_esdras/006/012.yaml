    issue: Posible preferencia estilística por «les respondieron» en vez de «nos respondieron» si se siguiera otro patrón narrativo
    rationale: 'No es un error: el griego tiene ἡμῖν, y «nos respondieron» es exactamente fiel e idiomático. Solo se señala que algunas tradiciones castellanas prefieren otras construcciones, pero aquí no hace falta cambiar nada.'
