translation:
  language: es
  text: que había sido llevado al exilio de Jerusalén con los exiliados, que habían sido llevados al exilio con Jeconías[a], rey de Judá, a quien Nabucodonosor rey de Babilonia había llevado al exilio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘que’ puede referirse a Quis, antepasado de Mardoqueo, y no al mismo Mardoqueo, pues el exilio de Jeconías ocurrió generaciones antes.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who / whom
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: HALOT
  rationale: El relativo introduce la cadena de cláusulas sobre la persona mencionada en el contexto inmediato. En español, 'que' resulta natural y neutral, sin añadir una distinción de caso que el español no expresa aquí.
- source_word: הָגְלָה
  english_pob_choice: had been taken into exile
  chosen_spanish: había sido llevado al exilio
  alternatives_spanish:
  - había sido deportado
  - había sido exiliado
  lexicon: HALOT
  rationale: El verbo causativo-passivo de גלה expresa una acción forzada de traslado al exilio. 'Llevado al exilio' conserva esa fuerza y se lee con naturalidad en español bíblico moderno.
- source_word: מִירוּשָׁלַיִם
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  lexicon: HALOT
  rationale: '''Desde'' comunica mejor el punto de partida del traslado forzado, sin cambiar el sentido del hebreo.'
- source_word: עִם הַגֹּלָה
  english_pob_choice: with the exiles
  chosen_spanish: con los exiliados
  alternatives_spanish:
  - con la deportación
  - con el grupo de los exiliados
  lexicon: HALOT
  rationale: הַגֹּלָה nombra al colectivo de los deportados/exiliados. 'Los exiliados' preserva el referente personal y concreto del grupo.
- source_word: אֲשֶׁר הָגְלְתָה
  english_pob_choice: who had been taken into exile
  chosen_spanish: que habían sido llevados al exilio
  alternatives_spanish:
  - que había sido llevado al exilio
  - que habían sido deportados
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en singular femenino por concordancia colectiva con הַגֹּלָה, en español el plural resulta más claro porque el referente es el grupo de exiliados. Se mantiene la idea colectiva sin oscurecerla con una construcción singular abstracta.
- source_word: יְכָנְיָה
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconiah
  - Joaquín
  lexicon: HALOT
  rationale: Se usa la forma hispana tradicionalmente reconocible para el nombre, sin sustituirlo por una armonización con otro nombre real. Esto mantiene la transparencia del dato hebreo y la legibilidad en español.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Construcción posesiva directa y estándar en español bíblico.
- source_word: אֲשֶׁר הֶגְלָה
  english_pob_choice: whom ... had taken into exile
  chosen_spanish: a quien ... había llevado al exilio
  alternatives_spanish:
  - a quien ... había deportado
  - a quien ... había exiliado
  lexicon: HALOT
  rationale: El verbo se repite con Nabucodonosor como agente. 'Llevar al exilio' mantiene la coherencia léxica con el resto del versículo y conserva el sentido de deportación forzada.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodonosor
  lexicon: HALOT
  rationale: Forma hispana ampliamente reconocible del nombre del rey babilonio. Se prefiere la transliteración tradicional española por claridad y recepción eclesial.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babel
  lexicon: HALOT
  rationale: Traducción directa del constructo, estándar y transparente.
theological_decisions:
- issue: Antecedente del relativo en la cláusula inicial
  english_pob_reading: The main English text reads the clause as modifying Mordecai, while the note preserves the possibility that it refers to Kish.
  chosen_spanish_reading: El texto principal queda lo suficientemente abierto para admitir que la cláusula describa a Mardoqueo en la superficie, sin cerrar la posibilidad alternativa de que se refiera a Quis.
  alternative_spanish_readings:
  - que había sido llevado al exilio ... (tomado estrictamente como Mardoqueo)
  - que había sido llevado al exilio ... (tomado como Quis, su antepasado)
  rationale: El hebreo presenta una tensión cronológica y sintáctica real. En lugar de resolverla de forma silenciosa, el español conserva la ambigüedad mediante nota, siguiendo la política de no borrar tensiones documentadas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Concordancia singular/plural en 'הַגֹּלָה'
  english_pob_reading: '''the exiles'' as a collective group, with singular Hebrew agreement reflected in English as plural.'
  chosen_spanish_reading: '''los exiliados'' con verbos en plural para la claridad del colectivo.'
  alternative_spanish_readings:
  - la deportación
  - el exilio
  rationale: El hebreo usa una forma singular colectiva. En español, el plural personal comunica mejor el referente y evita una abstracción innecesaria.
  doctrine_reference: Source-oriented clarity without flattening collective force.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que unificó la traducción del verbo גלה como 'taken into exile' en todo el versículo. Por eso el español mantiene 'llevado al exilio' de manera consistente en las tres ocurrencias. También se preservó la nota de ambigüedad sobre el antecedente del relativo, porque la revisión inglesa no elimina la tensión histórica/sintáctica del texto.
  spanish_consistency_notes:
  - Se mantiene 'exilio'/'exiliados' para reflejar el campo semántico de גלה y הַגֹּלָה sin alternar innecesariamente con 'cautiverio'.
  - Los nombres propios se adaptan a formas hispanas usuales donde ello ayuda a la recepción ('Jeconías', 'Nabucodonosor'), sin perder la referencia al hebreo subyacente.
  - La nota al pie se ancla en 'Jeconías[a]' para señalar que la alternativa interpretativa afecta al antecedente de la cláusula relativa, no solo al nombre propio.
