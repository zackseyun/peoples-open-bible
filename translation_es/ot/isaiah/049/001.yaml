translation:
  language: es
  text: 'Escúchenme, costas lejanas[a], y presten atención, pueblos desde lejos: Yahvé me llamó desde el vientre[b]; desde el cuerpo de mi madre mencionó mi nombre[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «islas». El término hebreo puede referirse más ampliamente a tierras marítimas lejanas o regiones costeras.
    reason: lexical_alternative
  - marker: b
    text: O «desde el vientre de mi madre mencionó mi nombre». El modismo hebreo puede denotar nombrar, designar o llamar a alguien por nombre.
    reason: lexical_alternative
  - marker: c
    text: El hebreo también puede entenderse como «nombró» o «designó» mi nombre, no solo «mencionó mi nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Escúchenme bien
  lexicon: HALOT
  rationale: El imperativo plural pide una convocatoria directa. «Escúchenme» es natural en español moderno y conserva el llamado a prestar oído mejor que una forma más arcaica como «Oíd». En la puntuación del verso, se mantiene la fuerza de apelación inmediata.
- source_word: אִיִּים
  english_pob_choice: coastlands
  chosen_spanish: costas
  alternatives_spanish:
  - islas
  - tierras costeras
  - regiones marítimas
  lexicon: HALOT
  rationale: En Isaías, el término puede abarcar territorios marítimos distantes, no solo islas literales. «Costas» comunica bien esa idea para lectores de español y conserva el matiz geográfico de lejanía; se incluye nota de alternativa por la ambigüedad léxica.
- source_word: וְהַקְשִׁיבוּ
  english_pob_choice: pay attention
  chosen_spanish: presten atención
  alternatives_spanish:
  - escuchen con atención
  - atiendan
  lexicon: HALOT
  rationale: El hifil intensifica el mandato de escuchar. «Presten atención» refleja esa intensificación de manera idiomática y clara en español, sin perder el paralelo con el primer imperativo.
- source_word: לְאֻמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: «Pueblos» preserva el sentido colectivo amplio y evita restringir innecesariamente a entidades políticas modernas. También mantiene el paralelismo con «costas» como destinatarios lejanos del oráculo.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: lejanos
  alternatives_spanish:
  - desde lejos
  - de lejos
  lexicon: HALOT
  rationale: La idea es de distancia geográfica. En el español del verso, «pueblos lejanos» suena más natural que una repetición adverbial, pero conserva el valor espacial del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: usar el nombre divino «Yahvé» en el texto principal, en vez de sustituirlo por un título. Esto preserva la referencia personal y pactual del nombre.'
- source_word: מִבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno
  - desde el útero
  lexicon: HALOT
  rationale: «Vientre» es el equivalente español natural para el hebreo en este contexto de llamado prenatal. Mantiene el paralelismo con la siguiente cláusula y la carga de elección anterior al nacimiento.
- source_word: קְרָאָנִי
  english_pob_choice: called me
  chosen_spanish: me llamó
  alternatives_spanish:
  - me convocó
  - me llamó por nombre
  lexicon: HALOT
  rationale: El verbo פשוט de קרא en este contexto expresa llamado vocacional y personal. «Me llamó» conserva la sencillez del hebreo y la lectura auditada en inglés.
- source_word: מִמְּעֵי אִמִּי
  english_pob_choice: from my mother’s body
  chosen_spanish: desde el cuerpo de mi madre
  alternatives_spanish:
  - desde las entrañas de mi madre
  - desde el vientre de mi madre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «desde el interior/las entrañas de mi madre». En español, «cuerpo de mi madre» mantiene el contraste poético con «vientre» sin duplicar exactamente la misma imagen, y evita sonar forzado.
- source_word: הִזְכִּיר שְׁמִי
  english_pob_choice: he mentioned my name
  chosen_spanish: hizo recordar mi nombre
  alternatives_spanish:
  - mencionó mi nombre
  - hizo mención de mi nombre
  - llamó mi nombre
  lexicon: HALOT
  rationale: La forma causativa de זכר indica hacer recordar/traer a la memoria, y el audit trail en inglés ya decidió evitar una mera equivalencia literal como «nombró». «Hizo recordar mi nombre» conserva la fuerza idiomática sin perder la tensión entre mencionar, recordar y nombrar. En español suena más natural que «mencionó mi nombre» dentro de esta cláusula poética.
theological_decisions:
- issue: El nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene el nombre propio divino en transliteración adaptada al español, conforme a la línea doctrinal del proyecto. Esto evita ocultar el Tetragrámaton bajo un título y conserva la continuidad con el texto fuente hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Función de הִזְכִּיר שְׁמִי en contexto de llamado prenatal
  english_pob_reading: he mentioned my name
  chosen_spanish_reading: hizo recordar mi nombre
  alternative_spanish_readings:
  - mencionó mi nombre
  - llamó mi nombre
  - hizo mención de mi nombre
  rationale: El hebreo admite el matiz de «hacer recordar/traer a la memoria», además de nombrar o designar. La elección española mantiene esa ambigüedad productiva sin cerrarla prematuramente a un solo sentido. Así se respeta la tensión léxica documentada por el audit trail.
  doctrine_reference: HALOT on זכר in causative usage; POB lexical audit for Isaiah 49:1
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada del inglés POB que ajustó la última cláusula de una lectura más literal de «named my name» a «mentioned my name». En español se preserva esa tensión semántica con «hizo recordar mi nombre», evitando una traducción mecánica y manteniendo el matiz causativo de זכר. También se conserva la decisión doctrinal del nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, en lugar de «SEÑOR».
  - Se mantiene «pueblos» para לְאֻמִּים, coherente con el plural colectivo del hebreo.
  - Se evita duplicar la misma imagen corporal con «vientre» y se opta por «cuerpo de mi madre» para la segunda cláusula, siguiendo la distinción poética del original.
  - Las notas al pie se anclan solo donde hay verdadera ambigüedad léxica o decisión teológica documentada.
