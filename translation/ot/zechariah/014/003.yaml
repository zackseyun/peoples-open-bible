id: ZEC.14.3
reference: Zechariah 14:3
source:
  edition: WLC
  text: וְ/יָצָ֣א יְהוָ֔ה וְ/נִלְחַ֖ם בַּ/גּוֹיִ֣ם הָ/הֵ֑ם כְּ/י֥וֹם הִֽלָּחֲמ֖/ו בְּ/י֥וֹם קְרָֽב׃
translation:
  text: Then Yahweh will go out and fight against those nations[a], as when he fights in a day of battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as on the day when he fought in a day of battle.' The Hebrew comparison can be rendered more formally with 'day' repeated, but the main text expresses the sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: Then ... will go out
  alternatives:
  - And ... will go out
  lexicon: HALOT
  rationale: The waw-consecutive with qatal in prophetic discourse is naturally rendered as a future sequence in English. 'Then' captures the progression from the prior context more idiomatically than a bare 'and' while preserving the sense of ensuing action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנִלְחַם
  chosen: and fight
  alternatives:
  - and wage war
  - and do battle
  lexicon: HALOT
  rationale: The Niphal of לחם here denotes engaging in battle. 'Fight' is clear, natural English and fits the martial context without sounding overly technical.
- source_word: בַּגּוֹיִם הָהֵם
  chosen: against those nations
  alternatives:
  - against the nations, those ones
  - with those nations
  lexicon: HALOT
  rationale: With לחם, the preposition ב can mark the opponent in battle, so 'against' is the natural English sense. גוים is best rendered 'nations' in this prophetic international context, and ההם is preserved by 'those.'
- source_word: כְּיוֹם
  chosen: as when
  alternatives:
  - like the day when
  - as on the day when
  lexicon: HALOT
  rationale: The comparative כ plus 'day' introduces a simile. 'As when' communicates the idiomatic force in smooth English while retaining the temporal-comparative sense.
- source_word: הִלָּחֲמוֹ
  chosen: he fights
  alternatives:
  - he fought
  - his fighting
  lexicon: HALOT
  rationale: 'The infinitive construct with pronominal suffix after כְּיוֹם functions idiomatically: ''as when he fights/fought.'' Given the prophetic future framework and the generic comparison, present-tense English ''he fights'' best conveys a customary or characteristic divine battle action. A past rendering is possible but less natural in this construction.'
- source_word: בְּיוֹם קְרָב
  chosen: on a day of battle
  alternatives:
  - in the day of battle
  - on the day of battle
  lexicon: HALOT
  rationale: קרב denotes battle/combat. The phrase lacks a clear English article requirement; 'on a day of battle' preserves the Hebrew idiom without over-specifying a particular historical battle. 'The day of battle' is possible but may imply a specific known event not explicit in the Hebrew.
