translation:
  language: es
  text: El que oprime al pobre para aumentar su propia riqueza[a], o da al rico, terminará solo en pobreza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que oprime al pobre para enriquecerse y da al rico, solo en pobreza». El hebreo puede leerse como dos acciones comparables o como un solo patrón de conducta.'
    reason: alternative_reading
  - marker: b
    text: «En pobreza» también puede traducirse «en falta», «en necesidad» o «en carencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׁק
  english_pob_choice: One who oppresses
  chosen_spanish: El que oprime
  alternatives_spanish:
  - El opresor de
  - Quien oprime
  lexicon: HALOT
  rationale: El participio qal se usa de manera sustantiva para describir a una persona caracterizada por oprimir o extorsionar. «El que oprime» conserva ese valor genérico y resulta natural en español.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al pobre necesitado
  - al débil
  lexicon: HALOT
  rationale: En este proverbio domina el matiz socioeconómico de דָּל. «Al pobre» mantiene el referente humano y el alcance general del dicho.
- source_word: לְהַרְבּוֹת לוֹ
  english_pob_choice: to increase his own wealth
  chosen_spanish: para aumentar su propia riqueza
  alternatives_spanish:
  - para enriquecerse
  - para aumentar para sí
  lexicon: HALOT
  rationale: El infinitivo con ל y sufijo pronominal expresa finalidad o provecho para el sujeto. En español, «para aumentar su propia riqueza» explicita el beneficio económico implícito sin añadir más contenido del que sugiere el hebreo.
- source_word: נֹתֵן
  english_pob_choice: or gives
  chosen_spanish: o da
  alternatives_spanish:
  - y da
  - el que da
  lexicon: HALOT
  rationale: El participio segundo queda en paralelo comprimido con el primero. «O da» conserva la relación alternativa/comparable que la POB inglesa tomó como lectura más abierta, sin forzar una coordinación más fuerte de la que permite el hebreo.
- source_word: לְעָשִׁיר
  english_pob_choice: to the rich
  chosen_spanish: al rico
  alternatives_spanish:
  - al rico hombre
  - al adinerado
  lexicon: HALOT
  rationale: עָשִׁיר designa a una persona rica. «Al rico» es la forma idiomática y breve que conserva la clase social indicada.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  - pero solo
  lexicon: HALOT
  rationale: 'אַךְ marca restricción y resultado con fuerza enfática. «Solo» preserva esa exclusividad: el desenlace no es más que pobreza.'
- source_word: לְמַחְסוֹר
  english_pob_choice: to poverty
  chosen_spanish: en pobreza
  alternatives_spanish:
  - a la pobreza
  - a la necesidad
  - a la carencia
  lexicon: HALOT
  rationale: מַחְסוֹר puede significar falta, necesidad o pobreza. En este contexto proverbial, «pobreza» es la equivalencia más clara; la preposición «en» expresa el resultado final con fluidez natural en español.
theological_decisions:
- issue: Relación sintáctica de las dos acciones participiales
  english_pob_reading: The verse states two self-defeating practices—oppressing the poor for self-enrichment, or giving to the rich—both leading to poverty.
  chosen_spanish_reading: 'El proverbio presenta dos prácticas autodestructivas: oprimir al pobre para aumentar la propia riqueza, o dar al rico; ambas terminan en pobreza.'
  alternative_spanish_readings:
  - Describe a una sola persona que oprime al pobre y da al rico, terminando en pobreza.
  rationale: El hebreo es comprimido y permite una lectura disyuntiva o acumulativa. La conjunción «o» mantiene abierta la alternativa interpretativa que la POB inglesa documenta y evita cerrar indebidamente la sintaxis.
  doctrine_reference: No aplica; es una decisión sintáctico-interpretativa, no doctrinal.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada del testigo inglés: no hubo cambios pendientes y el consenso cruzado fue de alta concordancia. La redacción española conserva la misma decisión interpretativa básica y no introduce revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino cuando aparezca; aquí no hay mención.
  - Se tradujo דָּל con «pobre», no con «débil», por el claro contexto económico del proverbio.
  - Se preservó la ambigüedad sintáctica documentada mediante nota de alternativa, sin resolverla de modo excesivo.
  - Se evitó «SEÑOR» como sustituto del nombre divino; no aplica en este versículo.
