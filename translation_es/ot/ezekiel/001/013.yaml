revisions:
- from: Y en cuanto a la semejanza de los seres vivientes[a], su apariencia era como brasas de fuego que ardían, como la apariencia de antorchas; ella se movía entre los seres vivientes, y el fuego tenía resplandor[b], y del fuego salía relámpago.
  to: Y en cuanto a la semejanza de los seres vivientes, su apariencia era como brasas de fuego que ardían[a], como la apariencia de antorchas; esto se movía entre los seres vivientes[b], y el fuego tenía resplandor[c], y del fuego salían relámpagos.
  rationale: 'Se corrigió la ubicación y el contenido de las notas para alinearlas con el English POB auditado: [a] ahora refleja las alternativas de «burning coals of fire», [b] preserva la alternativa de movimiento repetido de מִתְהַלֶּכֶת, y [c] mantiene la explicación literal de וְנֹגַהּ לָאֵשׁ. En el texto principal, «esto se movía» conserva la ambigüedad del pronombre הִיא sin la personificación poco natural de «ella», y «salían relámpagos» mejora la naturalidad del español manteniendo la viveza de la escena.'
