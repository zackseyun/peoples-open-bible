translation:
  language: es
  text: Y, animándolos basándose en la Ley y los Profetas, y además recordándoles los combates[a] que ya habían soportado, los hizo más dispuestos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Combates» refleja aquí el contexto bélico de ἀγῶνας; también puede entenderse en sentido más amplio como «luchas» o «contiendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραμυθούμενος
  english_pob_choice: encouraging
  chosen_spanish: animándolos
  alternatives_spanish:
  - animándolos
  - alentándolos
  - confortándolos
  lexicon: BDAG
  rationale: En este contexto militar, el verbo comunica reforzar el ánimo y la resolución; «animarlos» mantiene ese impulso sin añadir una connotación excesivamente emocional de «consolar».
- source_word: ἐκ τοῦ νόμου καὶ τῶν προφητῶν
  english_pob_choice: from the Law and the Prophets
  chosen_spanish: con la Ley y los Profetas
  alternatives_spanish:
  - desde la Ley y los Profetas
  - por medio de la Ley y los Profetas
  - a partir de la Ley y los Profetas
  lexicon: LSJ
  rationale: El griego expresa la base o fuente de la exhortación. En español, «con» conserva de forma natural que los animó apoyándose en esas Escrituras, sin perder la referencia reconocible al conjunto bíblico judío.
- source_word: προσαμνήσας
  english_pob_choice: reminding
  chosen_spanish: recordándoles
  alternatives_spanish:
  - recordándoles
  - trayéndoles a la memoria
  - haciéndoles recordar
  lexicon: LSJ
  rationale: El participio aoristo indica hacer memoria de algo para alguien. «Recordándoles» es idiomático y refleja bien la acción de traer al presente lo ya vivido.
- source_word: ἀγῶνας
  english_pob_choice: struggles
  chosen_spanish: combates
  alternatives_spanish:
  - luchas
  - combates
  - conflictos
  lexicon: LSJ
  rationale: Aunque ἀγών puede abarcar lucha, contienda o combate, aquí el contexto es marcadamente bélico. «Combates» preserva mejor esa fuerza concreta que una traducción más general como «luchas».
- source_word: οὓς ἦσαν ἐκτετελεκότες
  english_pob_choice: they had already endured
  chosen_spanish: que ya habían soportado
  alternatives_spanish:
  - que ya habían soportado
  - que ya habían llevado a cabo
  - que ya habían completado
  lexicon: BDAG
  rationale: La forma perifrástica y el sustantivo ἀγῶνας apuntan a experiencias sufridas, no solo a tareas concluidas. «Soportado» capta la idea de resistencia frente a pruebas y armoniza con la revisión inglesa que privilegia «endured».
- source_word: προθυμοτέρους
  english_pob_choice: more eager
  chosen_spanish: más entusiastas
  alternatives_spanish:
  - más dispuestos
  - más dispuestos de ánimo
  - más fervorosos
  lexicon: BDAG
  rationale: El comparativo expresa mayor disposición y ardor para actuar. «Más entusiastas» comunica el incremento de ánimo y prontitud con un español claro y natural.
- source_word: κατέστησεν
  english_pob_choice: he made
  chosen_spanish: los hizo
  alternatives_spanish:
  - los hizo
  - los volvió
  - los dejó
  lexicon: BDAG
  rationale: 'El verbo es causativo: provocó que se volvieran más dispuestos. «Los hizo» conserva esa causalidad de manera sobria y directa.'
theological_decisions:
- issue: La expresión scriptural «νόμος καὶ προφῆται» como designación de las Escrituras de Israel
  english_pob_reading: the Law and the Prophets
  chosen_spanish_reading: la Ley y los Profetas
  alternative_spanish_readings:
  - la ley y los profetas
  rationale: Se mantiene la mayúscula para señalar que no son categorías genéricas, sino una fórmula reconocible para el corpus sagrado judío. Esto respeta la lectura del POB en inglés y la resonancia bíblica del griego sin introducir contenido doctrinal ajeno.
  doctrine_reference: 'DOCTRINE.md: traducir con fidelidad la forma y el sentido reconocible del texto fuente, preservando los términos teológicos recibidos cuando el original los presenta como designación estable.'
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió «completed» por «endured» para ajustar mejor ἀγῶνας al sentido de pruebas o combates sufridos. La redacción española sigue esa revisión al optar por «soportado», manteniendo la estructura del versículo y el énfasis en experiencias ya atravesadas.
  spanish_consistency_notes:
  - Se mantiene «Ley y Profetas» como fórmula bíblica estable, con mayúsculas.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - «Animándolos» y «recordándoles» preservan la secuencia participial del griego sin volverla pesada en español.
  - La causalidad de κατέστησεν se expresa con «los hizo», sin añadir un sujeto explícito ausente en el griego.
