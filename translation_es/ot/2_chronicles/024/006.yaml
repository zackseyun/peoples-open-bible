translation:
  language: es
  text: 'Entonces el rey llamó a Jehoyadá, el jefe, y le dijo: «¿Por qué no has requerido a los levitas que traigan de Judá y de Jerusalén el tributo[a] de Moisés, siervo de Yahvé, y de la asamblea de Israel, para la tienda del testimonio[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la leva» o «la contribución». El hebreo se refiere a un pago impuesto para fines del santuario.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el santuario; literalmente, «la tienda del testimonio».
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el cabeza
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El término básico significa ‘cabeza’ o ‘jefe’. En este contexto Jehoyadá funciona como la figura dirigente sacerdotal, pero el hebreo usa solo ‘el jefe’, sin explicitar ‘sumo sacerdote’; por eso se conserva esa sobriedad en español.
- source_word: דָרַשְׁתָּ עַל
  english_pob_choice: have you not required
  chosen_spanish: no has pedido
  alternatives_spanish:
  - no has exigido
  - no has requerido
  - no has inquirido acerca de
  lexicon: HALOT
  rationale: Con עַל y el infinitivo de resultado, el verbo tiene fuerza administrativa de requerir o procurar que algo se haga. ‘No has pedido’ mantiene la acusación de omisión en un español natural sin perder el matiz de responsabilidad.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  lexicon: HALOT
  rationale: Correspondencia directa del grupo levítico ministerial.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: que traigan
  alternatives_spanish:
  - para traer
  lexicon: HALOT
  rationale: El infinitivo indica el acto de llevar/traer las contribuciones al destino señalado. En español, dentro de la construcción con ‘pedir que’, ‘que traigan’ reproduce con naturalidad la finalidad del hebreo.
- source_word: מִיהוּדָה וּמִירוּשָׁלִַם
  english_pob_choice: from Judah and from Jerusalem
  chosen_spanish: de Judá y de Jerusalén
  alternatives_spanish:
  - desde Judá y desde Jerusalén
  lexicon: HALOT
  rationale: Se preserva la doble procedencia con preposición repetida sin forzar un calco pesado. ‘De’ es suficiente en español para expresar el origen de la recaudación.
- source_word: מַשְׂאַת
  english_pob_choice: the levy
  chosen_spanish: la contribución
  alternatives_spanish:
  - la derrama
  - el tributo
  - la leva
  lexicon: HALOT
  rationale: El término puede referirse a una carga impuesta para fines del santuario. En español, ‘contribución’ comunica una entrega obligatoria sin sonar tan fiscal como ‘impuesto’, y mantiene abierta la tensión léxica entre aporte y carga exigida.
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  english_pob_choice: Moses the servant of Yahweh
  chosen_spanish: de Moisés, siervo de Yahvé
  alternatives_spanish:
  - de Moisés, el siervo de Yahvé
  - de Moisés, servidor de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula titular y el nombre divino según la norma del proyecto. ‘Siervo’ reproduce la fuerza lexical de עֶבֶד sin suavizarla a ‘servidor’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrámaton como ‘Yahvé’, manteniendo el nombre propio divino y evitando la sustitución por un título.
- source_word: וְהַקָּהָל לְיִשְׂרָאֵל
  english_pob_choice: and of the assembly of Israel
  chosen_spanish: y de la asamblea de Israel
  alternatives_spanish:
  - y la asamblea de Israel
  - e incluso la asamblea para Israel
  lexicon: HALOT
  rationale: La relación sintáctica es compacta y algo difícil. ‘Y de la asamblea de Israel’ preserva la conexión con la contribución mencionada sin añadir una paráfrasis interpretativa excesiva.
- source_word: לְאֹהֶל הָעֵדוּת
  english_pob_choice: for the tent of the testimony
  chosen_spanish: para el tabernáculo del testimonio[b]
  alternatives_spanish:
  - para el tabernáculo del testimonio
  - para la tienda del testimonio
  lexicon: HALOT
  rationale: ‘Tabernáculo del testimonio’ es la forma más reconocible en español bíblico y expresa con claridad la función cultual. La nota explica que el hebreo dice literalmente ‘tienda del testimonio’, preservando la transparencia del término.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el nombre propio divino como ‘Yahvé’ para reflejar la designación covenantal sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md — contested terms: יְהוָה / YHWH'
- issue: Meaning of מַשְׂאַת in a sanctuary context
  english_pob_reading: the levy / the contribution
  chosen_spanish_reading: la contribución
  alternative_spanish_readings:
  - la levadura
  - el tributo
  - la derrama
  rationale: El sustantivo denota una imposición o entrega obligatoria para fines del santuario. ‘Contribución’ conserva la idea de pago debido sin reducirlo a un impuesto secular; la nota mantiene visible la alternativa léxica.
  doctrine_reference: Lexical-theological consistency for sanctuary dues in the Chronicler
- issue: Sanctuary referent of לְאֹהֶל הָעֵדוּת
  english_pob_reading: the tent of the testimony
  chosen_spanish_reading: el tabernáculo del testimonio
  alternative_spanish_readings:
  - la tienda del testimonio
  - el tabernáculo del testimonio
  rationale: La expresión alude al santuario de reunión asociado al testimonio. ‘Tabernáculo’ es una equivalencia tradicional y comprensible; la nota conserva la literalidad hebrea para no ocultar la metáfora de ‘tienda’.
  doctrine_reference: Pentateuchal sanctuary terminology
translation_notes:
  revision_awareness: El borrador sigue el último estado revisado del POB en inglés, que prefirió ‘levy’ sobre ‘tax’ para מַשְׂאַת. En español se evitó ‘impuesto’ por sonar demasiado civil/fiscal, y se eligió ‘contribución’ con nota léxica para mantener la fuerza obligatoria sin borrar la amplitud semántica. También se respetó el nombre divino ‘Yahvé’ y la forma sobria ‘el jefe’ para הָרֹאשׁ.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, coherente con el estándar del proyecto.
  - Se usa ‘siervo’ para עֶבֶד, no ‘siervo’ como suavización devocional de ‘esclavo’, porque el inglés POB ya fijó el valor lexical en esta frase titular.
  - ‘Contribución’ intenta equilibrar la tensión entre ofrenda y carga obligatoria en מַשְׂאַת.
  - Se conserva la estructura ‘de Judá y de Jerusalén’ para reproducir el doble origen sin expansión interpretativa.
  - ‘Tabernáculo del testimonio’ es una adaptación idiomática; la nota preserva la literalidad hebrea para auditar la decisión.
