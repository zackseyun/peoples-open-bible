translation:
  language: es
  text: ¡Alaben a Yah![a] ¡Alaben a Yahvé[b] desde los cielos; alábenlo en las alturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Hallelu-Yah, literalmente «Alaben a Yah».
    reason: lexical_alternative
  - marker: b
