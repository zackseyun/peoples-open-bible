translation:
  language: es
  text: Vomitarás el bocado que has comido, y desperdiciarás tus palabras agradables[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «palabras dulces» o «palabras gratas».
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְּךָ
  english_pob_choice: the morsel you have eaten
  chosen_spanish: la migaja que has comido
  alternatives_spanish:
  - tu migaja
  - el bocado que has comido
  - la porción que has comido
  lexicon: HALOT
  rationale: פַּת designa una pieza pequeña de pan o alimento; en español, «migaja» mantiene la imagen breve y proverbial sin precisar de más. El posesivo de segunda persona se expresa naturalmente como «has comido» para evitar una repetición torpe de «tu» con un sustantivo ya definido por el contexto.
- source_word: אָכַ֥לְתָּ
  english_pob_choice: you have eaten
  chosen_spanish: has comido
  alternatives_spanish:
  - comiste
  - has comido
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como ya cumplida; el pretérito perfecto compuesto en español conserva bien esa anterioridad respecto al vómito posterior.
- source_word: תְקִיאֶ֑נָּה
  english_pob_choice: you will vomit up
  chosen_spanish: vomitarás
  alternatives_spanish:
  - vomitarás lo
  - lo escupirás
  - vomitarás eso
  lexicon: HALOT
  rationale: El verbo causativo de קיא significa vomitar; «vomitarás» reproduce la fuerza directa del hebreo. El complemento objeto se sobreentiende por el sustantivo antecedente femenino («migaja»), de modo que no hace falta añadirlo de forma pesada.
- source_word: וְשִׁחַ֗תָּ
  english_pob_choice: you will waste
  chosen_spanish: desperdiciarás
  alternatives_spanish:
  - arruinarás
  - perderás
  - habrás malgastado
  lexicon: HALOT
  rationale: En este paralelismo, שׁחת expresa el resultado inútil o arruinado de la speech. «Desperdiciarás» comunica bien la idea de gastar sin provecho lo dicho, en un español natural para palabras o discurso.
- source_word: דְּבָרֶ֥י/ךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu խոսa
  - tu discurso
  - lo que dijiste
  lexicon: HALOT
  rationale: El plural constructo con sufijo de segunda persona es simplemente «tus palabras», que conserva la tersura proverbial y el valor léxico del hebreo.
- source_word: הַנְּעִימִים
  english_pob_choice: pleasant
  chosen_spanish: agradables
  alternatives_spanish:
  - dulces
  - suaves
  - graciosas
  lexicon: HALOT
  rationale: נעים denota lo agradable, amable o grato. «Agradables» es la opción más natural en español contemporáneo; «dulces» o «graciosas» podrían reflejar matices posibles, pero suenan más marcadas o ambiguas.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: la acción de comer se refleja como anterior al vómito mediante el perfecto compuesto, y se mantuvo la imagen proverbial de ingerir una porción pequeña que luego se devuelve. No hay conflicto textual relevante en el hebreo base; la principal decisión es léxica en הַנְּעִימִים, donde el español admite «agradables», «dulces» o «gratas».'
  spanish_consistency_notes:
  - 'Se preservó el paralelismo verbal con dos futuros en español: «vomitarás» / «desperdiciarás».'
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, porque el versículo no contiene el nombre divino.
  - Se eligió un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
