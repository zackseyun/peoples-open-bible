translation:
  language: es
  text: Mi oído[c] oyó angustia y el sonido de la guerra[a], el sonido de una trompeta que sonaba matanza[b] y destrucción;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aflicción» para Θλίψιν.
    reason: lexical_alternative
  - marker: b
    text: O «resonando» o «sonando» para ἠχούσης; el griego conserva una imagen auditiva intensa.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «mi oído oyó», preservando la imagen corporal de oír.
    reason: source_note
lexical_decisions:
- source_word: Θλίψιν
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: BDAG
  rationale: Θλίψις denota presión o aflicción intensa. En español, «angustia» comunica bien la carga sufriente e inmediata del verso sin introducir un matiz doctrinal posterior que «tribulación» podría sugerir.
- source_word: φωνὴν
  english_pob_choice: the sound of
  chosen_spanish: el sonido de
  alternatives_spanish:
  - la voz de
  - el ruido de
  lexicon: BDAG
  rationale: Aquí φωνή funciona como fenómeno audible, no como «voz» personal. «El sonido de» preserva el paralelo con guerra y trompeta en un español natural.
- source_word: πολέμου
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la batalla
  lexicon: BDAG
  rationale: πόλεμος es el término general para conflicto armado. «La guerra» es la correspondencia más directa y mantiene el aumento de intensidad del pasaje.
- source_word: τὸ οὖς μου
  english_pob_choice: my ear
  chosen_spanish: Mi oído
  alternatives_spanish:
  - yo
  - mi oído
  lexicon: BDAG
  rationale: Se conserva la imagen corporal concreta del griego. En español, «mi oído oyó» suena redundante; por eso se opta por una construcción más natural que aún mantiene la metáfora sensorial.
- source_word: σάλπιγγος
  english_pob_choice: trumpet
  chosen_spanish: trompeta
  alternatives_spanish:
  - clarín
  - cuerno
  lexicon: BDAG
  rationale: «Trompeta» es el equivalente más amplio y estándar para el instrumento militar o ceremonial indicado por σάλπιγξ.
- source_word: ἠχούσης
  english_pob_choice: sounding
  chosen_spanish: resonando
  alternatives_spanish:
  - sonando
  - retumbando
  lexicon: BDAG
  rationale: El participio expresa un sonido que repercute o se prolonga. «Resonando» comunica bien la acción sonora sin forzar una interpretación adicional.
- source_word: σφαγὴν
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - degüello
  - muerte violenta
  lexicon: BDAG
  rationale: El término señala matanza violenta. «Matanza» preserva la severidad del sustantivo griego y suena natural en español.
- source_word: ὄλεθρον
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: BDAG
  rationale: ὄλεθρος expresa destrucción catastrófica. «Destrucción» es la equivalencia directa y mantiene el paralelismo con «matanza».
translation_notes:
  revision_awareness: 'La redacción toma en cuenta el audit trail en inglés y la revisión reciente que corrigió la tendencia a unir demasiado de cerca φωνήν y ἠχούσης. En español, se evita repetir «sonido» de manera torpe y se conserva la progresión auditiva: angustia/guerra/trompeta, con el participio traducido por «resonando» para reflejar el valor de ἠχούσης sin expandirlo a «anunciando».'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparece en el texto.
  - Se prefiere «trompeta» por consistencia con el léxico POB habitual para σάλπιγξ.
  - La secuencia nominal se mantiene compacta para conservar el ritmo de los sonidos sucesivos.
