base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/032.yaml
  text: If[a], speaking in merely human terms, I fought with wild beasts in Ephesus, what does it profit me? If the dead are not raised[b], “Let us eat and drink[c], for tomorrow we die.”
  footnotes:
  - marker: a
    text: Or possibly, 'If, from a merely human point of view, I fought with wild beasts in Ephesus…' The phrase may qualify Paul's manner of speaking or perspective.
    reason: lexical_alternative
  - marker: b
    text: '''I fought with wild beasts'' may be understood literally or as a metaphor for brutal human opposition; the Greek wording itself is left intact in the main text.'
    reason: alternative_reading
  - marker: c
    text: Quotation/allusion to Isaiah 22:13.
    reason: cross_reference
translation:
  language: ko
  text: 만일 내가 사람의 방식대로 에베소에서 들짐승들과 싸웠다면, 그것이 내게 무슨 유익이 되겠습니까? 만일 죽은 자들이 일으킴을 받지 않는다면, 「먹고 마시자, 내일이면 우리가 죽을 것이다」 하는 말이 옳습니다.
  philosophy: optimal-equivalence
  footnotes:
