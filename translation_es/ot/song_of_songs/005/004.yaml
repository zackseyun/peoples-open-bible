translation:
  language: es
  text: Mi amado metió su mano por la abertura[a], y mis entrañas[b] se conmovieron por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el agujero». El hebreo es literalmente «desde el agujero», probablemente refiriéndose a una abertura en la puerta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis adentros se conmovieron por él» o «mi corazón se conmovió por él». El hebreo expresa una emoción interior profunda en términos corporales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi amante
  lexicon: HALOT
  rationale: En el Cantar, דּוֹדִי designa al amado de la voz femenina. «Mi amado» conserva la relación poética sin introducir el matiz más sexual de «mi amante».
- source_word: שָׁלַח יָדוֹ
  english_pob_choice: put his hand
  chosen_spanish: metió su mano
  alternatives_spanish:
  - extendió su mano
  - puso su mano
  lexicon: HALOT
  rationale: El verbo שָׁלַח con «mano» expresa aquí introducir o alargar la mano hacia adentro. «Metió su mano» comunica bien el movimiento concreto por una abertura y evita un calco forzado.
- source_word: מִן הַחֹר
  english_pob_choice: through the opening
  chosen_spanish: por la abertura
  alternatives_spanish:
  - por el agujero
  - a través del agujero
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «desde el hoyo/agujero», el contexto sugiere una abertura de la puerta. «Por la abertura» mantiene la imagen física con español natural; la alternativa más literal se reserva en nota.
- source_word: וּמֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis partes internas
  - mis insides
  - mi corazón
  lexicon: HALOT
  rationale: El hebreo nombra las vísceras como sede de la emoción intensa. «Mis entrañas» conserva esa corporeidad mejor que «mi corazón», que ya interpreta el órgano emocional de forma más abstracta.
- source_word: הָמוּ
  english_pob_choice: trembled
  chosen_spanish: se conmovieron
  alternatives_spanish:
  - temblaron
  - se agitaron
  - se estremecieron
  lexicon: HALOT
  rationale: הָמוּ indica agitación, tumulto o conmoción interior. «Se conmovieron» comunica el movimiento emocional profundo sin reducirlo solo a temblor físico.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - a causa de él
  - hacia él
  lexicon: HALOT
  rationale: Con este verbo y en este contexto afectivo, la preposición marca la dirección del movimiento interior hacia el amado. «Por él» es idiomático en español y preserva la relación emocional.
translation_notes:
  revision_awareness: 'El pasaje se mantiene en alta concordancia con el audit trail inglés: se conserva la imagen concreta de la mano entrando por una abertura y la respuesta visceral interior, evitando tanto el literalismo duro como la paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se prefirió «mi amado» para seguir el uso estable del Cantar y evitar un tono más explícito no exigido por el hebreo.
  - «Entrañas» mantiene la corporalidad semítica de וּמֵעַי; no se suavizó a «corazón» en el texto principal.
  - La preposición «por» en «por él» reproduce bien el valor relacional que el inglés resolvió con «for him».
