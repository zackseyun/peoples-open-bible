translation:
  language: es
  text: La tierra tuvo reposo durante cuarenta años. Entonces murió Otoniel hijo de Quenaz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּשְׁקֹט
  english_pob_choice: had rest
  chosen_spanish: descansó
  alternatives_spanish:
  - estuvo en reposo
  - tuvo reposo
  - quedó en paz
  lexicon: HALOT
  rationale: El hebreo שׁקט expresa estar quieto, sin perturbación o en reposo. En Jueces, el contexto histórico sugiere un período de alivio de la opresión; en español, «descansó» comunica esa idea de modo natural sin convertirla en una paráfrasis más amplia.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  - la tierra de Israel
  lexicon: HALOT
  rationale: En este contexto, אֶרֶץ se refiere al ámbito territorial del relato, no a la tierra en sentido cósmico. «La tierra» es natural en español y mantiene la referencia geográfica amplia del pasaje.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: for forty years
  chosen_spanish: durante cuarenta años
  alternatives_spanish:
  - por cuarenta años
  - cuarenta años
  lexicon: HALOT
  rationale: La expresión marca duración. «Durante cuarenta años» hace explícito el valor temporal en español y conserva la fuerza aspectual del hebreo sin sobretraducirlo.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - entonces murió
  - y murió
  lexicon: HALOT
  rationale: El verbo simplemente afirma la muerte de Otoniel. «Murió» es la forma más directa y fiel; el matiz narrativo del waw consecutivo queda bien reflejado por la secuencia de oraciones.
- source_word: עָתְנִיאֵל
  english_pob_choice: Othniel
  chosen_spanish: Otoniel
  alternatives_spanish:
  - Otniel
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma castellana establecida del nombre propio, que es reconocible para lectores bíblicos en español y mantiene la identificación del personaje.
- source_word: בֶּן קְנַז
  english_pob_choice: son of Kenaz
  chosen_spanish: hijo de Quenaz
  alternatives_spanish:
  - el hijo de Quenaz
  lexicon: HALOT
  rationale: La construcción de parentesco se vierte de manera directa con «hijo de». Se usa «Quenaz» como transliteración habitual en español para el nombre propio קְנַז.
theological_decisions:
- issue: Sentido de «descansó» en el período de paz
  english_pob_reading: had rest
  chosen_spanish_reading: descansó
  alternative_spanish_readings:
  - estuvo en reposo
  - tuvo reposo
  rationale: El texto no describe prosperidad general, sino cese de hostilidad y estabilidad para la tierra. «Descansó» conserva esa lectura histórico-narrativa sin introducir un concepto más técnico que el hebreo no exige aquí.
  doctrine_reference: Jueces 3:11; uso narrativo de שׁקט en Jueces
translation_notes:
  revision_awareness: 'Se sigue de cerca el juicio auditado del texto inglés: período de reposo para la tierra y muerte de Otoniel, sin añadir matices no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera del versículo porque no aparece en el hebreo.
  - Se conserva un registro bíblico claro y sobrio, apto para lectura pública.
  - La formulación evita el calco «tuvo descanso» y opta por una construcción natural en español que preserve la idea de reposo.
