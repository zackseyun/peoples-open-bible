translation:
  language: es
  text: 'Y me dijo[a]: «Hijo de hombre, yo te envío a los hijos de Israel, a las naciones rebeldes que se han rebelado contra mí; ellos y sus padres han transgredido contra mí hasta este mismo día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mortal» o «ser humano» para «Hijo de hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hombre mortal
  - ser humano
  lexicon: HALOT
  rationale: Mantiene la fórmula profética tradicional y transparente. «Hijo de hombre» conserva el paralelismo formal con el hebreo y la resonancia intertextual; las alternativas suavizan el giro, pero pierden esa marca idiomática.
- source_word: שׁוֹלֵחַ אֲנִי אֽוֹתְךָ
  english_pob_choice: I am sending you
  chosen_spanish: yo te envío
  alternatives_spanish:
  - yo te estoy enviando
  - yo te voy a enviar
  lexicon: HALOT
  rationale: El participio con pronombre explícito expresa una acción de envío en curso o inminente. «Yo te envío» es natural en español y conserva la inmediatez de la comisión sin añadir matices no presentes.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la forma transparente y el criterio de precisión formal. «Hijos de Israel» refleja de cerca el hebreo y la decisión POB de no neutralizar automáticamente la referencia filial/tribal.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: El término básico es «naciones/pueblos». Aquí se aplica a Israel en tono de juicio, y «naciones» conserva ese choque retórico sin introducir el sentido técnico de «gentiles».
- source_word: הַמּוֹרְדִים
  english_pob_choice: the rebellious
  chosen_spanish: rebeldes
  alternatives_spanish:
  - los que se rebelan
  - los revoltosos
  lexicon: HALOT
  rationale: Como participio atributivo, «rebeldes» funciona con naturalidad y mantiene el valor caracterizador continuo del hebreo.
- source_word: מָרְדוּ בִי
  english_pob_choice: have rebelled against me
  chosen_spanish: se han rebelado contra mí
  alternatives_spanish:
  - se rebelaron contra mí
  - se alzaron contra mí
  lexicon: HALOT
  rationale: Conserva la repetición verbal con el adjetivo «rebeldes» y expresa adecuadamente la relación adversativa de בְּ en español con «contra mí».
- source_word: פָּשְׁעוּ בִי
  english_pob_choice: have transgressed against me
  chosen_spanish: han transgredido contra mí
  alternatives_spanish:
  - han pecado contra mí
  - han faltado contra mí
  lexicon: HALOT
  rationale: Se distingue de מרד para no borrar la doblez léxica del hebreo. «Transgredido» mantiene la idea de violación del pacto/ley con fuerza jurídica; aunque suena algo más formal, preserva mejor la tensión del original que repetir «rebelado».
- source_word: עַד עֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: to this very day
  chosen_spanish: hasta este mismo día
  alternatives_spanish:
  - hasta hoy mismo
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La expresión intensifica el límite temporal. «Hasta este mismo día» reproduce bien el énfasis idiomático sin literalidad extraña.
theological_decisions:
- issue: Si atenuar o no la denuncia al conservar גּוֹיִם para Israel
  english_pob_reading: Retain 'nations' even though the referent is Israel
  chosen_spanish_reading: Conservar «naciones» aunque el referente sea Israel
  alternative_spanish_readings:
  - pueblos
  - los israelitas
  rationale: El hebreo usa deliberadamente un término asociado con las naciones para increpar a Israel. Mantener «naciones» conserva la aspereza retórica y evita domesticar el reproche.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Cómo rendir בֶּן אָדָם en la dirección profética
  english_pob_reading: Use 'Son of man' in the main text
  chosen_spanish_reading: Usar «Hijo de hombre» en el texto principal
  alternative_spanish_readings:
  - hombre mortal
  - ser humano
  rationale: No se trata aquí de un título cristológico, sino del apelativo recurrente a Ezequiel. La forma tradicional y formal preserva el patrón literario y la continuidad canónica.
  doctrine_reference: 'Contested terms: אָדָם; Translation philosophy §4'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB: se mantuvo la articulación «las naciones rebeldes» en español como «las naciones rebeldes» implícita en la estructura, y se preservó el énfasis final de «to this very day» con una expresión idiomática equivalente. No se detectaron cambios doctrinales adicionales necesarios respecto del audit trail.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto no porque aparezca explícitamente en este versículo, sino por consistencia general cuando corresponda en contextos cercanos.
  - Se evitó «SEÑOR» como sustituto del nombre divino, ya que aquí no hay una cita directa del Tetragrámaton.
  - Se mantuvo la repetición léxica entre «rebeldes» y «se han rebelado» para reflejar el paralelismo del hebreo.
  - «Contra mí» traduce la fuerza adversativa de בִי sin sobreexplicar.
  - «Hasta este mismo día» preserva el énfasis temporal de עֶצֶם הַיּוֹם הַזֶּה sin calco duro.
