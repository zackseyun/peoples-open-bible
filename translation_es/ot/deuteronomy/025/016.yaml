translation:
  language: es
  text: Pues todo el que hace estas cosas, todo el que hace injusticia[a], es abominación para Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “todo el que hace lo que está mal” / “todo el que comete injusticia”. El hebreo עָוֶל puede significar mal, injusticia o maldad; aquí se refiere especialmente al trato deshonesto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición anterior; en español, 'Porque' conserva con naturalidad la fuerza explicativa y causal del hebreo.
- source_word: תוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - detestación
  - cosa detestable
  lexicon: HALOT
  rationale: '''Abominación'' reproduce el fuerte valor moral y covenantal del término en Deuteronomio, de modo cercano al audit trail inglés.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton en español: ''Yahvé'', preservando el nombre divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el que te pertenece por pacto
  - tu Dios, tu Dios
  lexicon: HALOT
  rationale: La forma posesiva de segunda persona singular se vierte de manera directa e idiomática como 'tu Dios', manteniendo la fórmula pactual sin recargarla.
- source_word: כָּל עֹשֵׂה אֵלֶּה
  english_pob_choice: everyone who does these things
  chosen_spanish: todo el que hace estas cosas
  alternatives_spanish:
  - todo el que practica estas cosas
  - quienquiera que haga estas cosas
  lexicon: HALOT
  rationale: El participio distributivo se expresa bien con 'todo el que hace', conservando el paralelismo y la generalidad del hebreo sin volverlo más interpretativo.
- source_word: כֹּל עֹשֵׂה עָוֶל
  english_pob_choice: everyone who does injustice
  chosen_spanish: todo el que hace injusticia
  alternatives_spanish:
  - todo el que hace mal
  - todo el que comete injusticia
  lexicon: HALOT
  rationale: Se mantiene la repetición formal de 'todo el que hace' y se traduce עָוֶל como 'injusticia', como en la revisión inglesa, para conservar el peso ético y la referencia a trato deshonesto.
theological_decisions:
- issue: Rendering the divine name יְהוָה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino; por la política del proyecto, en español se preserva como 'Yahvé' y no se enmascara con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Semantic force of עָוֶל in a context of dishonest dealing
  english_pob_reading: does injustice
  chosen_spanish_reading: hace injusticia
  alternative_spanish_readings:
  - hace mal
  - comete injusticia
  rationale: La repetición del verbo 'hacer' en hebreo favorece 'hace injusticia' frente a una formulación más libre; así se preserva la paralela forma verbal y el matiz de conducta social deshonesta.
  doctrine_reference: English audit trail lexical note on עָוֶל as wrong/injustice/unrighteousness
translation_notes:
  revision_awareness: La redacción sigue la versión inglesa revisada que reemplazó una formulación más interpretativa por otra más cercana a la repetición hebrea ('does these things' / 'does injustice'). La versión española conserva ese paralelismo con 'todo el que hace... todo el que hace...'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustitución convencional para no ocultar el Tetragrámaton.
  - '''Abominación'' conserva el tono fuerte deuteronómico y no se suaviza a ''detestable''.'
  - La nota de pie marca la ambigüedad de עָוֶל sin borrar el sentido de 'injusticia' adoptado en el texto principal.
