translation:
  language: es
  text: 'Entonces todo el pueblo que estaba en la puerta y los ancianos dijeron: «Somos testigos. Que Yahvé haga a la mujer que entra en tu casa como Raquel y Lea, que juntas edificaron la casa de Israel. Y que prosperes[a] en Efrata, y te hagas un nombre en Belén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hagas proezas», «seas valiente» o «muestres tu valía»; el hebreo חַיִל puede denotar valor, fuerza, riqueza o éxito próspero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעָם אֲשֶׁר בַּשַּׁעַר
  english_pob_choice: Then all the people who were at the gate
  chosen_spanish: Entonces todo el pueblo que estaba en la puerta
  alternatives_spanish:
  - Entonces toda la gente que estaba en la puerta
  - Entonces todo el pueblo que se hallaba en la puerta
  lexicon: HALOT
  rationale: Mantiene el sujeto colectivo y la localización literal en la puerta, que aquí funciona como lugar público de reunión y testimonio judicial/comunitario.
- source_word: עֵדִים
  english_pob_choice: We are witnesses
  chosen_spanish: Somos testigos
  alternatives_spanish:
  - Estamos como testigos
  - Testigos somos
  lexicon: HALOT
  rationale: El hebreo es nominal; en español conviene explicitar la copula implícita en discurso directo. «Testigos» conserva el valor legal del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino propio, conforme al criterio del proyecto, en lugar de sustituirlo por un título genérico.
- source_word: הָאִשָּׁה הַבָּאָה אֶל בֵּיתֶךָ
  english_pob_choice: the woman who is coming into your house
  chosen_spanish: la mujer que entra en tu casa
  alternatives_spanish:
  - la mujer que viene a tu casa
  - la mujer que está entrando en tu casa
  lexicon: HALOT
  rationale: Se conserva el participio con sentido de entrada inminente o en curso, y se mantiene «casa» por su fuerza concreta y familiar.
- source_word: כְּרָחֵל וּכְלֵאָה
  english_pob_choice: like Rachel and Leah
  chosen_spanish: como Raquel y Lea
  alternatives_spanish:
  - al igual que Raquel y Lea
  - tal como Raquel y Lea
  lexicon: HALOT
  rationale: Comparación directa y nombres transliterados de modo estándar en español.
- source_word: אֲשֶׁר בָּנוּ שְׁתֵּיהֶם אֶת בֵּית יִשְׂרָאֵל
  english_pob_choice: who together built up the house of Israel
  chosen_spanish: las cuales juntas edificaron la casa de Israel
  alternatives_spanish:
  - que entre ambas edificaron la casa de Israel
  - que juntas construyeron la casa de Israel
  lexicon: HALOT
  rationale: «Edificaron» preserva la metáfora de בנה para linaje/nación, y «juntas» traduce el matiz de שְׁתֵּיהֶם. «Casa de Israel» mantiene la imagen colectiva sin suavizarla.
- source_word: וַעֲשֵׂה חַיִל
  english_pob_choice: may you prosper
  chosen_spanish: Y prospera
  alternatives_spanish:
  - Y haz proezas
  - Y sé valiente
  - Y demuestra tu valía
  lexicon: HALOT
  rationale: חיל tiene un rango amplio; en este contexto de bendición matrimonial y prosperidad social, «prospera» comunica bien el sentido global sin borrar posibles matices de fuerza o valía, que se preservan en la nota textual.
- source_word: בְּאֶפְרָתָה
  english_pob_choice: in Ephrathah
  chosen_spanish: en Efrata
  alternatives_spanish:
  - en Efrat
  - en Efratá
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma natural en español y se conserva la referencia geográfica/literaria.
- source_word: וּקְרָא שֵׁם
  english_pob_choice: proclaim a name
  chosen_spanish: proclama un nombre
  alternatives_spanish:
  - da a conocer un nombre
  - hazte un nombre
  lexicon: HALOT
  rationale: «Proclama» refleja mejor קרא que «hacer» o «ganar»; «nombre» mantiene el giro semítico de renombre o reputación.
- source_word: בְּבֵית לָחֶם
  english_pob_choice: in Bethlehem
  chosen_spanish: en Belén
  alternatives_spanish:
  - en la casa de pan
  - en Bethlehem
  lexicon: HALOT
  rationale: Se usa el topónimo habitual en español, manteniendo la referencia local del texto.
theological_decisions:
- issue: Nombre divino tetragramático en la bendición
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo presenta יְהוָה de manera directa, por lo que se conserva el nombre propio de Dios según la política del proyecto y la pauta auditada del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de חַיִל en la bendición
  english_pob_reading: may you prosper
  chosen_spanish_reading: Y prospera
  alternative_spanish_readings:
  - Y haz proezas
  - Y sé valiente
  - Y muestra tu valía
  rationale: Se opta por una forma breve y bendicional que deja abierto el campo semántico de fuerza, valor y éxito. En español, «prospera» comunica el resultado favorable sin eliminar la amplitud del hebreo.
  doctrine_reference: HALOT semantic range for חַיִל; English POB footnote a
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del POB en inglés, que ajustó el verbo de וּקְרָא para reflejar más directamente קרא como «proclamar» en lugar de una fórmula más interpretativa. También conserva el tratamiento del nombre divino como Yahvé y mantiene la ambigüedad semántica de חַיִל mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para יְהוָה.
  - 'Se conservan nombres propios bíblicos en transliteración española estable: Raquel, Lea, Efrata y Belén.'
  - «Casa de Israel» se conserva como imagen colectiva, sin reemplazarla por un equivalente explicativo más amplio.
  - La puntuación en diálogo sigue el estilo español moderno con comillas angulares.
  - Los marcadores de nota coinciden con las palabras o frases ancladas en el texto.
