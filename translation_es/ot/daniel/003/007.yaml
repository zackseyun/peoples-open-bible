  glossary_alignment: No hay términos del glosario mayor especialmente implicados aquí. La elección «adoraron» concuerda con la decisión teológica inglesa. «Imagen de oro» es fiel y natural. Los nombres de instrumentos pueden mantenerse en forma tradicional, pero la nota debe reflejar la incertidumbre léxica documentada, especialmente para «trígono» y «salterio».
