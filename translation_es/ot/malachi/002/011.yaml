translation:
  language: es
  text: Judá ha obrado con traición, y se ha cometido una abominación en Israel y en Jerusalén, porque Judá ha profanado el santuario[a] de Yahvé, que él ama, y ha tomado por esposa a la hija de un dios extranjero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''la santidad de Yahvé'' o ''el pueblo santo de Yahvé''; el hebreo קֹדֶשׁ יְהוָה es ambiguo.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּגְדָה
  english_pob_choice: has acted treacherously
  chosen_spanish: ha actuado con traición
  alternatives_spanish:
  - ha sido infiel
  - ha traicionado
  - ha obrado con deslealtad
  lexicon: HALOT
  rationale: בגד expresa traición o infidelidad de pacto; en español, 'ha actuado con traición' conserva el peso moral y relacional sin volverse demasiado interpretativo.
- source_word: תוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo abominable
  - una cosa detestable
  lexicon: HALOT
  rationale: '''Abominación'' reproduce el valor cultual y moral fuerte de תועבה en el lenguaje profético.'
- source_word: נֶעֶשְׂתָה
  english_pob_choice: has been committed
  chosen_spanish: se ha cometido
  alternatives_spanish:
  - se ha hecho
  - ha ocurrido
  lexicon: HALOT
  rationale: 'El pasivo/medio importa: el mal ha sido perpetrado. ''Se ha cometido'' funciona naturalmente con ''abominación''.'
- source_word: חִלֵּל
  english_pob_choice: has profaned
  chosen_spanish: ha profanado
  alternatives_spanish:
  - ha contaminado
  - ha desacralizado
  - ha deshonrado
  lexicon: HALOT
  rationale: En relación con lo santo, חלל pide 'profanar'. 'Ha profanado' mantiene el registro cultual del hebreo.
- source_word: קֹדֶשׁ יְהוָה
  english_pob_choice: the sanctuary of Yahweh
  chosen_spanish: el santuario de Yahvé
  alternatives_spanish:
  - la santidad de Yahvé
  - lo santo de Yahvé
  - la cosa santa de Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo es sintácticamente ambiguo, la revisión final del POB inglés favoreció 'sanctuary'. En español, 'santuario de Yahvé' es la forma más natural y mantiene una lectura cultual sin resolver en exceso la ambigüedad.
- source_word: אֲשֶׁר אָהֵב
  english_pob_choice: which he loves
  chosen_spanish: el cual ama
  alternatives_spanish:
  - que ama
  - que él ama
  - al cual ama
  lexicon: HALOT
  rationale: '''El cual ama'' conserva la referencia al santuario y la acción presente de amar, sin añadir tiempo pasado.'
- source_word: וּבָעַל
  english_pob_choice: has married
  chosen_spanish: ha tomado por esposa
  alternatives_spanish:
  - se ha casado con
  - ha desposado
  - ha tomado como mujer
  lexicon: HALOT
  rationale: Con un complemento femenino, בעל puede expresar matrimonio. 'Ha tomado por esposa' suena natural en español y conserva la fuerza relacional del verbo.
- source_word: בַּת אֵל נֵכָר
  english_pob_choice: the daughter of a foreign god
  chosen_spanish: la hija de un dios extranjero
  alternatives_spanish:
  - la hija de un dios ajeno
  - la hija de una deidad extranjera
  - una hija de un dios extranjero
  lexicon: HALOT
  rationale: La traducción literal preserva la carga religiosa del hebreo. No se suaviza a 'mujer extranjera' para no borrar la alusión a culto ajeno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' como transliteración del nombre divino.'
theological_decisions:
- issue: Referencia de קֹדֶשׁ יְהוָה
  english_pob_reading: the sanctuary of Yahweh
  chosen_spanish_reading: el santuario de Yahvé
  alternative_spanish_readings:
  - la santidad de Yahvé
  - lo santo de Yahvé
  - el pueblo santo de Yahvé
  rationale: La línea inglesa revisada del POB eligió una lectura cultual concreta. En español se conserva esa decisión, sin cerrar por completo la amplitud del hebreo subyacente.
  doctrine_reference: 'Translation philosophy §3: preservar tensión donde la forma hebrea es amplia, pero respetar la revisión auditada del POB.'
- issue: Sentido de בַּת אֵל נֵכָר
  english_pob_reading: the daughter of a foreign god
  chosen_spanish_reading: la hija de un dios extranjero
  alternative_spanish_readings:
  - mujer extranjera
  - mujer dedicada a un dios extranjero
  - hija de una deidad extranjera
  rationale: La expresión se mantiene literalmente para conservar la dimensión teológica del matrimonio con culto ajeno, no solo la referencia étnica.
  doctrine_reference: 'Translation philosophy §1 y §3: primacía del original y preservación de la tensión teológica.'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, que cambió 'the holiness of the LORD' por 'the sanctuary of the LORD' por considerarla más natural y contextualmente adecuada. En español, esa decisión se refleja como 'el santuario de Yahvé', mientras que se mantiene la literalidad religiosa de 'la hija de un dios extranjero'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al criterio del proyecto.
  - '''Santuario'' responde a la revisión auditada del inglés, pero se reconoce en nota la lectura alternativa ''santidad'' por la ambigüedad del hebreo.'
  - '''Tomado por esposa'' evita un calco rígido y conserva el sentido matrimonial de בעל en este contexto.'
  - No se suaviza 'dios extranjero' a 'mujer extranjera' para no perder la carga idolátrica del texto.
