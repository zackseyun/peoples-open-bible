translation:
  language: es
  text: 'Y estos son los jefes de la provincia que vivían en Jerusalén[a]. Pero en las ciudades de Judá, cada hombre vivía en su propia heredad, en sus ciudades: Israel, los sacerdotes, los levitas, los sirvientes del templo[b] y los descendientes de los siervos de Salomón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. El hebreo simplemente dice 'Israel', probablemente como designación colectiva dentro de la lista.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'los nethinim', una clase asignada al servicio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי הַמְּדִינָה
  english_pob_choice: the heads of the province
  chosen_spanish: los jefes de la provincia
  alternatives_spanish:
  - los líderes de la provincia
  - los principales de la provincia
  lexicon: HALOT
  rationale: רָאשֵׁי es un idiomatismo de 'cabezas/jefes' para personas con autoridad. 'Jefes de la provincia' conserva el tono administrativo persa de הַמְּדִינָה y evita modernizar indebidamente el cargo.
- source_word: אֲשֶׁר יָשְׁבוּ בִּירוּשָׁלִָם
  english_pob_choice: who lived in Jerusalem
  chosen_spanish: que vivían en Jerusalén
  alternatives_spanish:
  - que habitaban en Jerusalén
  - que moraban en Jerusalén
  lexicon: HALOT
  rationale: יָשַׁב expresa residir, vivir, habitar. 'Vivían' es natural en español moderno y mantiene el sentido de residencia estable sin añadir matices devocionales.
- source_word: וּבְעָרֵי יְהוּדָה יָשְׁבוּ
  english_pob_choice: But in the cities of Judah, each man lived
  chosen_spanish: Pero en las ciudades de Judá, cada hombre vivía
  alternatives_spanish:
  - Y en las ciudades de Judá, cada hombre vivía
  - Ahora bien, en las ciudades de Judá, cada hombre vivía
  lexicon: HALOT
  rationale: La partícula ו introduce transición contrastiva desde Jerusalén al resto de Judá. 'Pero' refleja bien ese cambio de foco. Se conserva 'ciudades' por continuidad con עָרִים.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente como 'cada hombre'. Se conserva la forma masculina representativa, coherente con la decisión auditada de no neutralizar indebidamente el singular hebreo.
- source_word: בַּאֲחֻזָּתוֹ
  english_pob_choice: in his own possession
  chosen_spanish: en su propia posesión
  alternatives_spanish:
  - en su heredad
  - en su propiedad
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una posesión de tierra o un bien heredado. 'Posesión' reproduce con más cercanía el valor léxico señalado por el POB en inglés, mientras 'propiedad' o 'heredad' desplazan el matiz.
- source_word: בְּעָרֵיהֶם
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus pueblos
  - en sus villas
  lexicon: HALOT
  rationale: La frase localiza a cada grupo dentro de sus asentamientos respectivos. 'Ciudades' mantiene la correspondencia directa con עָרִים y la continuidad del versículo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: El sustantivo desnudo parece funcionar como designación colectiva o encabezado de lista. Se conserva 'Israel' de forma formal, tal como el POB en inglés, sin explicitar 'los israelitas' en el texto principal.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del culto
  lexicon: HALOT
  rationale: Término estándar para כֹּהֲנִים. 'Sacerdotes' es la equivalencia natural y precisa en español.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas del templo
  lexicon: HALOT
  rationale: Término estándar para לְוִיִּם. Se mantiene el nombre tribal/institucional tradicional en español.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los sirvientes del templo
  alternatives_spanish:
  - los netineos
  - los servidores del templo
  lexicon: HALOT
  rationale: נְתִינִים alude a un grupo asignado al servicio del templo. 'Sirvientes del templo' comunica la función con claridad en español; se evita transliterar sin necesidad textual en el cuerpo principal.
- source_word: בְּנֵי עַבְדֵי שְׁלֹמֹה
  english_pob_choice: the descendants of Solomon’s servants
  chosen_spanish: los descendientes de los siervos de Salomón
  alternatives_spanish:
  - los hijos de los siervos de Salomón
  lexicon: HALOT
  rationale: בְּנֵי puede abarcar descendencia más amplia que hijos literales. 'Descendientes' preserva esa amplitud genealógica. 'Siervos' refleja el valor de עַבְדֵי, aunque el español también podría decir 'esclavos' si el contexto exigiera mayor fuerza léxica.
theological_decisions:
- issue: Uso del nombre divino en un versículo donde no aparece explícitamente YHWH
  english_pob_reading: No theological term requiring a doctrinal gloss; the verse is a settlement list.
  chosen_spanish_reading: No se introduce ninguna referencia divina en el texto porque el hebreo no la contiene en este versículo.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay decisión teológica sustantiva aquí más allá de mantener la estructura de lista y las categorías comunitarias del hebreo. Se evita añadir interpretaciones devocionales.
  doctrine_reference: N/A
- issue: Traducción de נְתִינִים
  english_pob_reading: the temple servants; footnote identifies them as a class assigned to temple service.
  chosen_spanish_reading: los sirvientes del templo, con nota explicativa sobre el término hebreo.
  alternative_spanish_readings:
  - los netineos
  - los servidores del templo
  rationale: La opción principal comunica la función histórica al lector moderno; la nota conserva el término técnico y su identificación como clase cultual, evitando perder el referente institucional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que ajustó 'on his own property' a 'in his own possession' para acercarse más a אֲחֻזָּה. Por eso el español usa 'en su propia posesión' en lugar de 'en su propiedad' o 'en su heredad'. También se conservó la estructura de lista y el tratamiento colectivo de 'Israel' con nota, tal como el audit trail inglés lo documenta.
  spanish_consistency_notes:
  - Se mantiene 'ciudades' para עָרִים de manera uniforme.
  - Se usa 'posesión' para אֲחֻזָּה, siguiendo la revisión auditada del inglés.
  - Se evita alternar entre 'siervos' y 'sirvientes' en el texto principal salvo donde la función cultual pide claridad.
  - Los nombres étnicos/institucionales ('Israel', 'sacerdotes', 'levitas') se conservan de forma directa y sin expansión interpretativa.
