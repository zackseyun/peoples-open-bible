translation:
  language: es
  text: 'Y ahora[a], huye a tu lugar. Yo dije[b]: «Sin duda[c] te honraría», pero he aquí[d], Yahvé te ha privado de honor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así que ahora» o «Ahora pues». La expresión hebrea introduce la conclusión con transición discursiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Había dicho: “Sin duda te honraría”». El hebreo puede entenderse como referencia a la promesa previa; la construcción es enfática.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ciertamente». La construcción hebrea intensifica la promesa.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Yahvé te ha retenido del honor», «te ha privado de honor» o «te ha impedido recibir honor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Conserva la transición discursiva y el sentido temporal con un giro natural en español.
- source_word: בְּרַח
  english_pob_choice: flee
  chosen_spanish: huye
  alternatives_spanish:
  - escapa
  - vete rápidamente
  lexicon: HALOT
  rationale: El imperativo transmite urgencia y tono abrupto; 'huye' preserva mejor esa fuerza que una versión más suave.
- source_word: מְקוֹמֶךָ
  english_pob_choice: your place
  chosen_spanish: tu lugar
  alternatives_spanish:
  - tu sitio
  - tu propio lugar
  lexicon: HALOT
  rationale: '''Lugar'' reproduce el valor básico de מָקוֹם sin sobreespecificar.'
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Te dije
  - Había dicho
  lexicon: HALOT
  rationale: El pasado simple funciona bien en español; el contexto ya deja claro que remite a una promesa previa.
- source_word: כַּבֵּד אֲכַבֶּדְךָ
  english_pob_choice: I would surely honor you
  chosen_spanish: Sin duda te honraría
  alternatives_spanish:
  - Ciertamente te honraría
  - Te honraría sin falta
  lexicon: HALOT
  rationale: La construcción intensiva se expresa con una afirmación enfática natural en español, sin perder la fuerza del compromiso prometido.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - pero mira
  lexicon: HALOT
  rationale: Marca contraste e inmediatez; 'mira' suena natural en español y conserva el giro de sorpresa del hebreo.
- source_word: מְנָעֲךָ
  english_pob_choice: has kept you back
  chosen_spanish: te ha retenido
  alternatives_spanish:
  - te ha impedido
  - te ha detenido
  lexicon: HALOT
  rationale: '''Retener'' capta la idea de impedir el acceso al honor sin añadir matices no presentes en el hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino tal como lo exige el proyecto, en lugar de sustituirlo por un título.
- source_word: מִכָּבוֹד
  english_pob_choice: from honor
  chosen_spanish: del honor
  alternatives_spanish:
  - de honor
  - de la honra
  lexicon: HALOT
  rationale: '''Honor'' corresponde al contexto de la promesa real; la preposición ''de'' expresa la privación resultante en español idiomático.'
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre propio del Dios de Israel en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de כָּבוֹד en el contexto
  english_pob_reading: honor
  chosen_spanish_reading: honor
  alternative_spanish_readings:
  - gloria
  - honra
  rationale: Aquí el sustantivo alude al honor o prestigio prometido por Balac, no a la gloria divina en sentido abstracto.
  doctrine_reference: HALOT / contexto inmediato de Números 24:11
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del contexto inglés, que prefirió un marcador más formal para וְהִנֵּה. En español se optó por 'mira' para mantener naturalidad y contraste discursivo, sin perder la inmediatez de la escena. También se conservó el nombre divino como Yahvé, de acuerdo con la norma del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico-formal sin calcos excesivos.
  - '''Honor'' se usó consistentemente para כָּבוֹד en este contexto específico.'
  - El nombre divino aparece como Yahvé, conforme a la terminología del proyecto.
  - Las notas a y b están ancladas en el texto con [a] y [b].
