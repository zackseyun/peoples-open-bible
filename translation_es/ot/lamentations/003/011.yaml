translation:
  language: es
  text: Desvió mis caminos y me desgarró[a]; me dejó desolado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘me atacó brutalmente’. El verbo raro probablemente comunica un desgarramiento violento, posiblemente con imaginería animal tomada del contexto circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכַי
  english_pob_choice: my paths
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis senderos
  - mi camino
  - mis vías
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de 1cs conserva la imagen concreta de trayectorias o curso de vida. En español, 'mis caminos' es natural y preserva mejor el plural que 'mi camino'.
- source_word: סוֹרֵר
  english_pob_choice: turned ... aside
  chosen_spanish: volvió
  alternatives_spanish:
  - desvió
  - apartó
  - torció
  lexicon: HALOT
  rationale: El verbo expresa la acción de hacer que el camino se desvíe. 'Volvió' funciona aquí como giro verbal conciso que, con 'mis caminos', comunica el cambio de dirección; 'desvió' se mantiene como alternativa más explícita.
- source_word: וַיְפַשְּׁחֵנִי
  english_pob_choice: tore me apart
  chosen_spanish: me desgarró
  alternatives_spanish:
  - me destrozó
  - me maltrató
  - me arrancó
  lexicon: HALOT
  rationale: El verbo es raro y transmite violencia de rasgado o desgarramiento. 'Me desgarró' mantiene esa fuerza sin añadir una imagen demasiado específica; 'me destrozó' sería más libre y 'me maltrató' perdería la imagen corporal.
- source_word: שָׂמַנִי
  english_pob_choice: he made me
  chosen_spanish: me dejó
  alternatives_spanish:
  - me puso
  - me hizo
  lexicon: HALOT
  rationale: Con el complemento resultativo 'desolado', 'me dejó' expresa bien el resultado del acto en español natural. 'Me hizo' también sería posible, pero 'me dejó desolado' suena más idiomático y conserva el estado resultante.
- source_word: שֹׁמֵם
  english_pob_choice: desolate
  chosen_spanish: desolado
  alternatives_spanish:
  - devastado
  - arrasado
  - asolado
  lexicon: HALOT
  rationale: El participio/adjetivo denota ruina o estado de desolación. 'Desolado' mantiene el valor de estado y encaja bien con la estructura resultativa del versículo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene alta concordancia con la revisión más reciente y no requiere cambios de sentido. La propuesta española sigue el mismo equilibrio: conservar la imagen violenta del verbo raro y la estructura resultativa final, sin suavizarla ni amplificarla.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y moderno, evitando calcos innecesarios.
  - '''Desolado'' traduce el estado final sin añadir interpretación psicológica.'
  - La nota textual/lexical sobre el verbo raro se mantiene porque la ambigüedad semántica sigue presente en español.
