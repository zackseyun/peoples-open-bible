    rationale: Aunque intenta conservar literalmente וַיָּשֶׂם אֶת־פָּנָיו, en español esta formulación suena extraña y menos inteligible. «Dirigió su rostro hacia» mantiene el sabor idiomático y la intencionalidad del hebreo con mejor legibilidad.
  revised_spanish_text: Así que él huyó con todo lo que era suyo[a], y se levantó, cruzó el Río, y dirigió su rostro hacia la región montañosa de Galaad.
