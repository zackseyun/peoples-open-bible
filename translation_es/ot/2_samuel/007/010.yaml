revisions:
- from: Y pondré un lugar para mi pueblo Israel y lo plantaré[a], para que habite en su propio lugar y no sea perturbado más. Los hijos de maldad no volverán a afligirlo, como antes.
  to: Y pondré un lugar para mi pueblo Israel, y lo plantaré, para que habite en su propio lugar y ya no sea perturbado. Los hijos de maldad[a] no volverán a afligirlo, como antes.
  rationale: Se restauró el paralelismo verbal explícito del hebreo y del ajuste auditado en inglés ('y lo plantaré'), se mejoró la naturalidad de la negación temporal con 'ya no', y se reubicó la nota al pie para reflejar la decisión léxica significativa documentada por el POB sobre 'hijos de maldad'. Se mantuvo el singular colectivo en español, que es defendible y legible.
  reviewer_model: gpt-5.4
