    issue: '''lo hirió de muerte'' sobreinterpreta וַיִּפְגַּע בּוֹ'
    rationale: 'El hebreo expresa primero la acción violenta y luego el resultado: ''lo golpeó/derribó'' + ''y murió''. ''Hirió de muerte'' ya incorpora el desenlace mortal y hace redundante la cláusula siguiente, debilitando la secuencia narrativa que el POB inglés preservó con ''struck him down, and he died''.'
  revised_spanish_text: Entonces el rey mandó a Benaía hijo de Joyadá, y él salió y lo derribó, y murió. Así, el reino quedó establecido en la mano de Salomón[a].
