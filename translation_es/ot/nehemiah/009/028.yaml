translation:
  language: es
  text: Pero tan pronto como tenían descanso[a], volvían a hacer lo malo delante de ti; y los abandonaste en manos[b] de sus enemigos, que dominaban sobre ellos. Entonces volvían y clamaban a ti, y tú oías desde los cielos y los librabas muchas veces conforme a tus abundantes misericordias[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando tenían descanso». La cláusula temporal hebrea puede verterse más literalmente así; «tan pronto como» destaca mejor la recaída inmediata que sugiere el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «en la mano de sus enemigos», un hebraísmo para quedar entregados al poder de otros.'
    reason: cultural_note
  - marker: c
    text: 'O: «según tu gran compasión». El hebreo usa un sustantivo plural, «misericordias/compasiones», por eso se traduce en plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְנוֹחַ
  english_pob_choice: But as soon as they had rest
  chosen_spanish: Pero tan pronto como tenían descanso[a]
  alternatives_spanish:
  - y cuando tenían descanso
  - pero cuando estaban en reposo
  lexicon: HALOT
  rationale: La cláusula temporal con כְּ más infinitivo de נוח expresa que, al llegar el descanso, seguía de inmediato la recaída. «Tan pronto como» conserva mejor esa rapidez narrativa que un simple «cuando».
- source_word: יָשׁוּבוּ
  english_pob_choice: they turned back
  chosen_spanish: volvían a hacer lo malo
  alternatives_spanish:
  - volvían
  - regresaban
  lexicon: HALOT
  rationale: שׁוּב aquí describe una vuelta repetida al mal; en español, «volvían a hacer lo malo» comunica tanto la recurrencia como el contenido moral del giro, evitando una repetición demasiado seca.
- source_word: לַעֲשׂוֹת רַע
  english_pob_choice: to do evil
  chosen_spanish: a hacer lo malo
  alternatives_spanish:
  - a hacer el mal
  - a actuar mal
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo moral directo. «Lo malo»/«el mal» son equivalentes naturales en español; se eligió «lo malo» para mantener un tono bíblico claro y comprensible.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: «Delante de ti» conserva la relación de presencia sin cargar el sentido con una formulación más interpretativa como «en tu presencia».
- source_word: וַתַּעַזְבֵם
  english_pob_choice: you abandoned them
  chosen_spanish: los abandonaste
  alternatives_spanish:
  - los dejaste
  - los forsast[e]
  lexicon: HALOT
  rationale: En este contexto, עזב es un abandono judicial, es decir, retirar protección. «Abandonaste» mantiene la fuerza del juicio sin suavizarla.
- source_word: בְּיַד אֹיְבֵיהֶם
  english_pob_choice: into the hand of their enemies
  chosen_spanish: en mano de sus enemigos[b]
  alternatives_spanish:
  - en poder de sus enemigos
  - en manos de sus enemigos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «en mano de» porque el POB inglés también retuvo la idiomática «into the hand». En español, esta forma es comprensible y auditables a la vez.
- source_word: וַיִּרְדּוּ בָהֶם
  english_pob_choice: who ruled over them
  chosen_spanish: que dominaban sobre ellos
  alternatives_spanish:
  - que gobernaban sobre ellos
  - que los subyugaban
  lexicon: HALOT
  rationale: El verbo expresa dominio efectivo; «dominaban sobre ellos» mantiene el matiz de señorío ejercido, sin forzar una lectura más dura que el verbo base por sí solo.
- source_word: וַיִּזְעָקוּךָ
  english_pob_choice: cried out to you
  chosen_spanish: clamaban a ti
  alternatives_spanish:
  - clamaron a ti
  - te gritaban
  lexicon: HALOT
  rationale: זעק implica un clamor urgente de auxilio. «Clamaban a ti» es una solución natural en español bíblico contemporáneo y preserva la intensidad.
- source_word: מִשָּׁמַיִם תִּשְׁמַע
  english_pob_choice: you heard from heaven
  chosen_spanish: tú oías desde los cielos
  alternatives_spanish:
  - tú oías desde el cielo
  - escuchabas desde los cielos
  lexicon: HALOT
  rationale: El plural «los cielos» reproduce mejor el hebreo que un singular genérico, y el imperfecto narrativo se refleja con «oías» para indicar acción repetida en la historia resumida.
- source_word: וְתַצִּילֵם
  english_pob_choice: and delivered them
  chosen_spanish: y los librabas
  alternatives_spanish:
  - y los rescatabas
  - y los salvabas
  lexicon: HALOT
  rationale: נצל aquí es liberación de enemigos. «Librabas» mantiene el sentido de rescate histórico y evita añadir resonancias soteriológicas más amplias que «salvabas» podría sugerir.
- source_word: כְּרַחֲמֶיךָ רַבּוֹת
  english_pob_choice: according to your abundant mercies
  chosen_spanish: conforme a tus abundantes misericordias[c]
  alternatives_spanish:
  - según tus abundantes misericordias
  - conforme a tus muchas misericordias
  lexicon: HALOT
  rationale: El plural y רַבּוֹת justifican «abundantes misericordias». «Conforme a» conserva la relación proporcional de כְּ mejor que un equivalente más libre.
- source_word: עִתִּים
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - repetidas veces
  - en muchas ocasiones
  lexicon: HALOT
  rationale: La idea es iterativa y resumida; «muchas veces» es la forma más natural y fiel en español.
theological_decisions:
- issue: Retirada divina de protección, no abandono absoluto
  english_pob_reading: you abandoned them into the hand of their enemies
  chosen_spanish_reading: los abandonaste en mano de sus enemigos
  alternative_spanish_readings:
  - los dejaste en poder de sus enemigos
  - los entregaste al poder de sus enemigos
  rationale: La frase describe juicio pactual mediante retiro de protección. «Abandonaste» conserva la severidad del acto, pero el contexto evita entenderlo como rechazo absoluto o final.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Iteración verbal en la clausula final
  english_pob_reading: you heard from heaven and delivered them many times
  chosen_spanish_reading: tú oías desde los cielos y los librabas muchas veces
  alternative_spanish_readings:
  - tú oíste desde los cielos y los libraste muchas veces
  - tú seguías oyendo desde los cielos y los librabas
  rationale: Los imperfectos hebreos resumen acciones repetidas. En español, los imperfectos «oías» y «librabas» comunican esa repetición histórica mejor que un pretérito puntual.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que reforzó «abundant mercies». Por eso se eligió «abundantes misericordias» y se mantuvo la iteración verbal del cierre con imperfectos españoles para reflejar la repetición histórica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma preferente para el nombre divino en el proyecto; en este versículo el hebreo usa formas pronominales dirigidas a Dios, así que no aparece el nombre explícito.
  - Se prefirió «librabas» frente a «salvabas» para conservar el valor histórico de liberación de enemigos.
  - Se conservaron los imperfectos en la última cláusula para reflejar la acción repetida del relato.
  - 'Se mantuvo el hebraísmo «en mano de» en una nota, pero el texto principal usa una forma levemente más natural: «en mano de sus enemigos».'
