translation:
  language: es
  text: para que no sea derramada sangre inocente en medio de tu tierra que Yahvé tu Dios te da como herencia[a], y haya sobre ti culpa de sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sangre estaría sobre ti»; el hebreo usa un modismo de responsabilidad por derramamiento de sangre inocente, es decir, culpa de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּפֵךְ
  english_pob_choice: may not be shed
  chosen_spanish: no sea derramada
  alternatives_spanish:
  - no sea vertida
  - no sea derramado
  lexicon: HALOT
  rationale: El nifal de שׁפך en este contexto legal pide una pasiva natural en español. «Derramada» conserva el valor idiomático de sangre derramada sin volverlo mecánico.
- source_word: דָּם נָקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre de un inocente
  - sangre sin culpa
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula jurídico-moral compacta; «sangre inocente» preserva esa concisión y el peso legal del sintagma.
- source_word: בְּקֶרֶב אַרְצְךָ
  english_pob_choice: in the midst of your land
  chosen_spanish: en medio de tu tierra
  alternatives_spanish:
  - dentro de tu tierra
  - en tu tierra
  lexicon: HALOT
  rationale: «En medio de» reproduce bien קֶרֶב como centro/ámbito interno y mantiene el tono solemne sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política española del proyecto usa «Yahvé» para el Tetragrámaton, conservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: נֹתֵן לְךָ נַחֲלָה
  english_pob_choice: is giving you as an inheritance
  chosen_spanish: te da como herencia
  alternatives_spanish:
  - te está dando como herencia
  - te da en herencia
  lexicon: HALOT
  rationale: En español, el presente simple expresa adecuadamente la acción divina de concesión; «herencia» conserva la idea de posesión heredada sin ampliar el sentido.
- source_word: וְהָיָה עָלֶיךָ דָּמִים
  english_pob_choice: and bloodguilt would be upon you
  chosen_spanish: y haya sobre ti sangre culpable
  alternatives_spanish:
  - y sangre culpable recaiga sobre ti
  - y tengas culpa de sangre
  lexicon: HALOT
  rationale: El hebreo usa un modismo de responsabilidad/litigio de sangre. «Sangre culpable» mantiene la conexión literal con דָּמִים y deja visible la tensión idiomática que el inglés POB explicó como bloodguilt.
theological_decisions:
- issue: Nombre divino en el texto legal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre revelado de Dios en el pacto sin reemplazarlo por una sustitución tradicional; esto sigue la decisión auditada del POB inglés y la terminología española del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de דָּמִים al final del versículo
  english_pob_reading: bloodguilt
  chosen_spanish_reading: sangre culpable
  alternative_spanish_readings:
  - culpa de sangre
  - sangre sobre ti
  rationale: El hebreo no describe sangre física sobre la persona, sino responsabilidad por derramamiento de sangre inocente. «Sangre culpable» conserva la tensión entre imagen e implicación legal sin diluirla en una explicación completa dentro del texto.
  doctrine_reference: HALOT; legal idiom of bloodguilt in covenant law
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés indicó que no eran necesarios cambios sustanciales. He seguido su lectura de sangre inocente / bloodguilt, pero he ajustado la última cláusula al español para conservar la fuerza idiomática sin perder la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Sangre inocente» y «sangre culpable» conservan la simetría léxica del verso y la distinción entre víctima y responsabilidad.
  - He evitado «SEÑOR» y «Cristo», ya que no corresponden al texto hebreo ni a la política terminológica del proyecto.
  - La sintaxis busca ser pública y litúrgicamente legible, sin abandonar el tono legal del pasaje.
