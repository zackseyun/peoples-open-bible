review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: universalidad de «toda la tierra», postración/adoración, repetición de זמר, «tu nombre» y retención de «Selah». Sin embargo, hay dos ajustes necesarios para alinearse mejor con la evidencia fuente y la POB inglesa: (1) el hebreo usa verbos en plural con sujeto colectivo, por lo que en español suena más fiel y natural «se postrarán / cantarán» que el singular «se postrará / cantará»; (2) la segunda nota está anclada correctamente en «Selah», pero la primera cláusula «cantará alabanzas a ti» es poco idiomática y conviene «te cantarán alabanzas» o mejor «cantarán alabanzas para ti».'
  spanish_quality_summary: El texto es comprensible, pero «cantará alabanzas a ti» suena forzado en español. También el cambio a plural mejora la concordancia con «toda la tierra» entendida distributivamente/colectivamente y evita una lectura demasiado singularizada. La nota a sobre «adorará ante ti» no es la alternativa más natural al texto principal; mejor contrastar «se postrarán ante ti» con «te adorarán».
  glossary_alignment: No hay conflictos con la glosaría principal del proyecto. «Selah» se conserva correctamente. «Nombre» mantiene bien la carga bíblica. La elección de «se postrarán» respeta la decisión POB de no sobreinterpretar יִשְׁתַּחֲווּ como un abstracto «adorar», aunque la alternativa puede mencionarse en nota.
  issues:
  - severity: medium
    issue: Concordancia verbal en singular con sujeto colectivo
    rationale: 'Aunque «toda la tierra» puede llevar singular en español, aquí el hebreo presenta verbos plurales repetidos y la POB inglesa también refleja esa fuerza distributiva. El plural español suena más natural en esta línea poética: «se postrarán... te cantarán... cantarán...».'
  - severity: medium
    issue: «cantará alabanzas a ti» es poco natural
    rationale: La construcción con «a ti» después de «cantar alabanzas» resulta rígida. En español bíblico legible, «te cantarán alabanzas» expresa mejor el dativo hebreo sin calco torpe.
  - severity: low
    issue: La nota alternativa usa «adorará ante ti»
    rationale: Como alternativa léxica a «se postrarán ante ti», «te adorarán» es más natural y directa. «Adorará ante ti» mezcla una alternativa abstracta con la preposición del texto principal de forma menos idiomática.
  revised_spanish_text: Toda la tierra se postrará[a] ante ti y te cantará alabanzas; cantarán alabanzas a tu nombre. Selah[b]
  revised_footnotes:
  - marker: a
    text: O «te adorará»; el hebreo puede referirse a la postración como acto de adoración.
    reason: lexical_alternative
  - marker: b
    text: «Selah» probablemente es una notación musical o litúrgica; su significado preciso es incierto.
    reason: cultural_note
  revision_rationale: 'Se ajusta la redacción para mejorar la naturalidad del español y la fidelidad al matiz fuente sin cambiar el sentido: se mantiene «postrarse» como imagen corporal principal, se hace más idiomática la construcción con el destinatario («te cantará alabanzas»), y se conserva «Selah» con su nota cultural. No se requiere adjudicación adicional.'
