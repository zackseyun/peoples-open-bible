translation:
  language: es
  text: Y subieron a Jerusalén algunos de entre los hijos de Israel[a], los sacerdotes, los levitas, los cantores del templo, los porteros y los esclavos del templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algunos de los israelitas». El griego dice más literalmente «algunos de entre los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «siervos del templo». El término griego puede referirse a personas vinculadas al servicio sagrado y también puede llevar matiz de servidumbre.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνανέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron juntos
  - ascendieron
  lexicon: LSJ
  rationale: El verbo compuesto expresa movimiento ascendente conjunto; en español, «subieron» conserva el idiomatismo bíblico de ir hacia Jerusalén sin volver la frase rígida. «Subieron juntos» explicita el matiz de συν-, pero no es necesario en el flujo natural del español.
- source_word: ἐκ τῶν υἱῶν Ἰσραήλ
  english_pob_choice: some of the sons of Israel
  chosen_spanish: algunos de los hijos de Israel
  alternatives_spanish:
  - algunos de los israelitas
  - de entre los hijos de Israel
  lexicon: LSJ
  rationale: Se mantiene la formulación filial del griego y el matiz partitivo de ἐκ con «algunos de». «Israelitas» sería más fluido, pero suaviza la forma del original; por eso queda como alternativa, no como texto principal.
- source_word: ἱερέων
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: LSJ
  rationale: «Sacerdotes» es el equivalente estándar y natural para el grupo cultual.
- source_word: Λευειτῶν
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - los levitas
  lexicon: LSJ
  rationale: Transliteración estable en español para el grupo levítico.
- source_word: ἱεροψαλτῶν
  english_pob_choice: temple singers
  chosen_spanish: cantores del templo
  alternatives_spanish:
  - cantores sagrados
  - cantores del santuario
  lexicon: LSJ
  rationale: La expresión griega indica cantores vinculados al servicio sagrado. «Cantores del templo» hace explícito el ámbito cultual y suena natural en español, sin perder la referencia institucional.
- source_word: θυρωρῶν
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de las puertas
  - guardianes
  lexicon: LSJ
  rationale: «Porteros» es una equivalencia tradicional y clara para quienes atienden o guardan las puertas del templo. Aunque «guardianes de las puertas» es más descriptivo, resulta más pesado.
- source_word: ἱεροδούλων
  english_pob_choice: temple servants
  chosen_spanish: siervos del templo
  alternatives_spanish:
  - esclavos del templo
  - sirvientes del templo
  lexicon: LSJ
  rationale: La decisión en español busca conservar la tensión del término ligado al servicio sagrado sin imponer de entrada una lectura jurídica demasiado fuerte. «Siervos del templo» mantiene la referencia cultual y deja abierta la posible carga de sujeción; «esclavos del templo» queda como alternativa semántica más fuerte, en línea con el auditor inglés.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - hacia Jerusalén
  lexicon: LSJ
  rationale: Preposición de destino normal en español; evita sobredeterminar la dirección con matices innecesarios.
theological_decisions:
- issue: Lista de retornados y género del colectivo «hijos de Israel»
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  rationale: Se conserva la forma familiar masculina del original porque el griego la usa explícitamente y funciona corporativamente en la lista de grupos que suben a Jerusalén. «Israelitas» es una paráfrasis válida, pero atenúa la huella léxica del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: ἱεροδούλων y su posible fuerza de servidumbre vinculada al templo
  english_pob_reading: temple servants
  chosen_spanish_reading: siervos del templo
  alternative_spanish_readings:
  - esclavos del templo
  - sirvientes del templo
  rationale: En esta enumeración de personal del templo, «siervos del templo» conserva la función cultual y no elimina la posible connotación de dependencia. «Esclavos del templo» preserva la fuerza más dura del término, pero podría sobrecargar una lista de cargos si se toma como lectura principal; por eso se deja como alternativa auditable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms table on δοῦλος
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla principal, con la lista de paralelos usada solo como control de nombres y orden. La revisión más reciente no indicó cambios; por eso se mantiene una formulación estable y auditable en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponda al nombre divino; aquí no aparece.
  - 'Se mantiene la distinción entre títulos y cargos cultuales: sacerdotes, levitas, cantores del templo, porteros y siervos del templo.'
  - «Subieron» conserva el idiomatismo bíblico sin perder el sentido de ascenso hacia Jerusalén.
  - La nota de pie de página sobre ἱεροδούλων preserva la alternativa más fuerte sin imponerla en el cuerpo del texto.
