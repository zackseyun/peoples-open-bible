id: WIS.10.14
reference: Wisdom of Solomon 10:14
source:
  edition: lxx-swete-1909
  text: συγκατέβη αὐτῷ εἰς λάκκον, καὶ ἐν δεσμοῖς οὐκ ἀφῆκεν αὐτόν, Ε ἕως ἤνεγκεν αὐτῷ σκῆπτρα βασιλείας καὶ ἐξουσίαν τυραννούντων αὐτοῦ· ψευδεῖς τε ἔδειξεν τοὺς μωμησαμένους αὐτόν, καὶ ἔδωκεν αὐτῷ δόξαν αἰώνιον.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Translation-ready override derived from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond Wisdom 19:22.
translation:
  text: She went down with him into the pit[a], and in chains she did not abandon him, until she brought him the scepter of a kingdom and authority over those who had ruled him; she showed those who had slandered him to be false[b], and gave him everlasting glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the dungeon'; the Greek literally says 'into the pit,' which can refer to an imprisonment pit or cistern.
    reason: lexical_alternative
  - marker: b
    text: Or 'proved those who had accused him false.'
    reason: alternative_reading
lexical_decisions:
- source_word: συγκατέβη
  chosen: went down with
  alternatives:
  - descended with
  - came down with
  lexicon: LSJ
  rationale: Compound verb with σύν + καταβαίνω indicates accompanying descent. 'Went down with' is natural English and preserves the sense that Wisdom accompanied him.
- source_word: εἰς λάκκον
  chosen: into the pit
  alternatives:
  - into a pit
  - into the dungeon
  lexicon: LSJ
  rationale: λάκκος literally means 'pit' and can denote a cistern, dungeon, or prison-pit. 'Pit' preserves the concrete image while fitting the Joseph narrative background; 'dungeon' is interpretive and therefore left as an alternative.
- source_word: ἐν δεσμοῖς
  chosen: in chains
  alternatives:
  - in bonds
  - in fetters
  lexicon: LSJ
  rationale: δεσμοί denotes bonds or restraints. 'In chains' is idiomatic modern English and conveys imprisonment clearly.
- source_word: οὐκ ἀφῆκεν αὐτόν
  chosen: did not abandon him
  alternatives:
  - did not leave him
  - did not forsake him
  lexicon: LSJ
  rationale: ἀφίημι here carries the sense of leaving behind or abandoning. 'Did not abandon him' best expresses Wisdom's faithful presence.
- source_word: ἕως ἤνεγκεν αὐτῷ
  chosen: until she brought him
  alternatives:
  - until she brought to him
  - until she bestowed on him
  lexicon: LSJ
  rationale: φέρω with dative can mean bring or confer. 'Brought him' works smoothly with the following objects while preserving the concrete verbal force.
- source_word: σκῆπτρα βασιλείας
  chosen: the scepter of a kingdom
  alternatives:
  - royal scepter
  - scepters of kingship
  lexicon: LSJ
  rationale: The Greek has plural σκῆπτρα with singular βασιλείας. The plural may be idiomatic or intensive, but in English a singular collective expression reads best. 'Scepter of a kingdom' preserves the regal symbol without overinterpreting the plural.
- source_word: ἐξουσίαν τυραννούντων αὐτοῦ
  chosen: authority over those who had ruled him
  alternatives:
  - power over his oppressors
  - authority over those tyrannizing him
  lexicon: LSJ
  rationale: τυραννέω can mean rule as a tyrant, dominate, or oppress. 'Those who had ruled him' stays close to the Greek while allowing the reversal-of-status theme to emerge. 'Oppressors' is possible but slightly more interpretive.
- source_word: ψευδεῖς ... ἔδειξεν
  chosen: showed ... to be false
  alternatives:
  - proved ... liars
  - exposed ... as false
  lexicon: LSJ
  rationale: The construction means to demonstrate someone false. 'Showed ... to be false' is transparent and avoids adding the more specific noun 'liars' where the Greek uses an adjective.
- source_word: τοὺς μωμησαμένους αὐτόν
  chosen: those who had slandered him
  alternatives:
  - those who had reproached him
  - his detractors
  lexicon: LSJ
  rationale: μωμάομαι means blame, censure, or find fault with. In the Joseph context, false accusation is in view, so 'slandered' captures the hostile and unjust speech more precisely than the weaker 'reproached.'
- source_word: δόξαν αἰώνιον
  chosen: everlasting glory
  alternatives:
  - eternal glory
  - glory for the age
  lexicon: LSJ
  rationale: Standard rendering of the phrase in elevated but accessible English. 'Everlasting' fits Wisdom literature style well.
