  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es léxica: para שָׁלָל, «botín» encaja mejor que «despojo» como equivalente de ‘spoil/plunder’ en español general, mientras la nota puede conservar «despojo» como alternativa.'
