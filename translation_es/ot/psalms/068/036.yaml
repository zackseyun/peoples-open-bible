translation:
  language: es
  text: Impresionante es Dios desde tu santuario[a]; el Dios de Israel, él da fuerza y poder al pueblo. ¡Bendito sea Dios!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde tu santuario» o «en tu santuario». La forma hebrea puede leerse como plural («desde tus santuarios»), con un matiz colectivo o majestuoso; el texto principal sigue la lectura singular probable.
    reason: alternative_reading
lexical_decisions:
- source_word: נ֤וֹרָ֥א
  english_pob_choice: Awesome
  chosen_spanish: Impresionante
  alternatives_spanish:
  - Temible
  - Imponente
  - Digno de reverente temor
  lexicon: HALOT
  rationale: El hebreo expresa que Dios inspira asombro y temor reverente. «Impresionante» comunica bien esa majestad en español moderno sin caer en «terrible», que puede sonar negativo, ni en una paráfrasis explicativa excesiva.
- source_word: אֱלֹהִ֗ים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el plural hebreo designa al único Dios de Israel; en español la forma natural y fiel es «Dios».
- source_word: מִֽ/מִּקְדָּ֫שֶׁ֥י/ךָ
  english_pob_choice: from your sanctuary
  chosen_spanish: desde tu santuario
  alternatives_spanish:
  - desde tus santuarios
  - en tu santuario
  - desde tus lugares santos
  lexicon: HALOT
  rationale: El inglés POB revisado prefirió el singular probable, y en español «desde tu santuario» es natural y conserva el valor de מִן. Aunque la forma hebrea es plural, la lectura singular es una opción interpretativa bien atestiguada y más idiomática en este contexto.
- source_word: אֵ֤ל יִשְׂרָאֵ֗ל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - Oh Dios de Israel
  lexicon: HALOT
  rationale: La construcción es una aposición nominal que identifica al mismo Dios mencionado antes. En español, «el Dios de Israel» refleja con claridad esa relación sin añadir un vocativo que el hebreo no marca aquí.
- source_word: ה֤וּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre está explícito para énfasis. «Él» reproduce ese énfasis de manera natural en español.
- source_word: נֹתֵ֨ן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - concede
  lexicon: HALOT
  rationale: El participio expresa una acción característica. «Da» comunica bien el valor habitual o continuo sin sobrecargar el verso.
- source_word: עֹ֖ז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  - vigor
  lexicon: HALOT
  rationale: «Fuerza» funciona bien junto con el segundo sustantivo y mantiene un registro claro y bíblico en español.
- source_word: וְ/תַעֲצֻמ֥וֹת
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - mucha fuerza
  - gran poder
  - poderío
  lexicon: HALOT
  rationale: El hebreo añade intensificación o plenitud de fuerza. Tras «fuerza», «poder» conserva la distinción sin inventar un adjetivo innecesario; en español, la pareja «fuerza y poder» es comprensible y fiel.
- source_word: לָ/עָ֗ם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: El hebreo no añade posesivo explícito. «Al pueblo» sigue el texto sin introducir «su»; en este contexto, el destinatario se entiende por la mención previa de Israel.
- source_word: בָּר֥וּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  - Que sea bendito
  lexicon: HALOT
  rationale: La fórmula doxológica se vierte de manera litúrgica y natural con «Bendito sea», preservando el tono de bendición exclamativa.
theological_decisions:
- issue: Singular o plural de מִקְדָּשֶׁיךָ
  english_pob_reading: from your sanctuary
  chosen_spanish_reading: desde tu santuario
  alternative_spanish_readings:
  - desde tus santuarios
  - en tu santuario
  rationale: La forma hebrea es plural con sufijo de segunda persona, pero el contexto permite una referencia colectiva o majestuosa al lugar santo de Dios. Siguiendo la revisión más reciente del POB en inglés, se adopta el singular probable en el texto principal y se evita forzar la pluralidad en una línea de lectura pública.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor de עֹז y וְתַעֲצֻמוֹת
  english_pob_reading: strength and power
  chosen_spanish_reading: fuerza y poder
  alternative_spanish_readings:
  - fuerza y poderío
  - fortaleza y gran poder
  - fuerza y mucha fuerza
  rationale: Los dos sustantivos hebreos se solapan semánticamente y expresan intensificación. En español conviene distinguirlos con una pareja natural («fuerza y poder») sin reducirlos a una sola idea ni añadir una explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió el singular probable en la referencia al santuario y simplificó la segunda expresión de fuerza/poder. La propuesta española sigue esa línea revisada y adapta la dicción para que suene natural en español sin perder el valor morfológico y semántico del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, no «Señor», conforme a la convención del proyecto.
  - Se usó «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el Tetragrámaton.
  - «fuerza y poder» conserva la duplicación hebrea sin volverla redundante en español.
  - El marcador [a] aparece exactamente en el punto al que se refiere la nota, para que la nota quede anclada al texto.
