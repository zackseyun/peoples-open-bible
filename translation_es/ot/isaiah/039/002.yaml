  - severity: medium
    issue: Falta la nota para אֹצְרֹתָיו
    rationale: El inglés conserva la alternativa 'treasuries'. En español conviene anclar una nota en 'almacenes' o equivalente para preservar 'tesoros/depósitos'.
  - severity: medium
