translation:
  language: es
  text: Y haré tus pináculos[a] de rubí[b], tus puertas de piedra resplandeciente[c], y todas tus murallas fronterizas[d] de piedras preciosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo שִׁמְשֹׁתַיִךְ es raro y puede entenderse también como «almenas», «baluartes» o incluso «ventanas». Se mantiene «pináculos» para conservar la imagen arquitectónica elevada adoptada en la tradición de esta línea.
    reason: lexical_alternative
  - marker: b
    text: כַּדְכֹד probablemente nombra una gema roja o brillante; posibles equivalentes incluyen «granate» o «jaspe rojo».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea alude a una piedra de brillo intenso o aspecto ígneo; traducciones antiguas la vertieron como «carbunclo».
    reason: lexical_alternative
  - marker: d
    text: También puede leerse «todo tu borde», «todos tus límites» o «todo tu territorio», aunque el contexto arquitectónico favorece aquí el sentido de murallas o límites construidos de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y colocaré
  lexicon: HALOT
  rationale: El verbo שׂוּם admite la idea de poner, colocar o hacer. En este contexto de reconstrucción ornamental de una ciudad, «haré» comunica con naturalidad el sentido causativo de formar o disponer las partes arquitectónicas, sin perder la base del hebreo.
- source_word: כַּדְכֹד
  english_pob_choice: ruby
  chosen_spanish: rubí
  alternatives_spanish:
  - granate
  - jaspe rojo
  lexicon: HALOT
  rationale: La identificación exacta de כַּדְכֹד es incierta. «Rubí» conserva la idea de una gema roja y brillante, en línea con la decisión inglesa, sin afirmar con excesiva certeza una identificación mineral precisa.
- source_word: שִׁמְשֹׁתַיִךְ
  english_pob_choice: your pinnacles
  chosen_spanish: tus pináculos
  alternatives_spanish:
  - tus almenas
  - tus ventanas
  lexicon: HALOT
  rationale: El sustantivo es raro y su referente exacto es debatido. «Pináculos» mantiene la imagen arquitectónica elevada que el contexto sugiere, y evita cerrar indebidamente la ambigüedad léxica.
- source_word: וּשְׁעָרַיִךְ
  english_pob_choice: your gates
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus portones
  lexicon: HALOT
  rationale: En español, «puertas» comunica de manera clara y digna el elemento urbano de שַׁעַר; «portones» sería posible, pero menos directo y más marcado.
- source_word: לְאַבְנֵי אֶקְדָּח
  english_pob_choice: of sparkling stone
  chosen_spanish: de piedra resplandeciente
  alternatives_spanish:
  - de piedra llameante
  - de carbunclo
  lexicon: HALOT
  rationale: El hebreo apunta a una piedra preciosa o brillante, pero su identificación exacta es incierta. «Piedra resplandeciente» preserva la cualidad visual de brillo y evita una especificación mineral no asegurada por el texto.
- source_word: וְכָל גְּבוּלֵךְ
  english_pob_choice: and all your boundary walls
  chosen_spanish: y todo tu perímetro
  alternatives_spanish:
  - y todos tus límites
  - y todo tu territorio
  lexicon: HALOT
  rationale: גְּבוּל puede significar límite, borde, frontera o territorio. En un cuadro de ciudad adornada, «perímetro» conserva la idea de contorno/borde sin forzar una lectura exclusivamente territorial o militar.
- source_word: לְאַבְנֵי חֵפֶץ
  english_pob_choice: of precious stones
  chosen_spanish: de piedras preciosas
  alternatives_spanish:
  - de piedras deseables
  - de piedras deleitables
  lexicon: HALOT
  rationale: חֵפֶץ denota lo deseable, precioso o deleitoso. «Piedras preciosas» expresa de forma idiomática y fiel el valor ornamental que el contexto demanda.
translation_notes:
  revision_awareness: Se ha seguido el estado de revisión más reciente marcado como unchanged, con acuerdo alto y solo observaciones menores. La redacción española conserva la imagen poética de ciudad restaurada y ornamentada, sin imponer identificaciones mineralógicas o arquitectónicas más seguras de lo que permite el hebreo.
  spanish_consistency_notes:
  - Se preservó la distinción entre la imagen arquitectónica y la posible lectura territorial de גְּבוּל mediante «perímetro» y nota.
  - Se evitó convertir la piedra de אֶקְדָּח en un nombre mineral demasiado definido.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se usó «Yahvé» solo cuando el texto fuente lo requiere; este versículo no lo contiene.
