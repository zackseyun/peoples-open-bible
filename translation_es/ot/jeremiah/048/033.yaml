translation:
  language: es
  text: El gozo y la alegría han sido quitados de la tierra fértil[a] y de la tierra de Moab; he hecho cesar el vino de los lagares. Nadie pisará entre gritos[b][c]; el grito no es grito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘campo fértil’. El hebreo karmel aquí se refiere a tierra fértil o cultivada, no al nombre propio Carmelo.
    reason: lexical_alternative
  - marker: b
    text: El grito hebreo es el clamor asociado al pisado de la uva o a la celebración de la cosecha.
    reason: cultural_note
  - marker: c
    text: 'La cláusula final es elíptica en hebreo: literalmente, ‘grito, grito—no grito’, es decir, ha cesado el grito jubiloso esperado de la vendimia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֶסְפָה
  english_pob_choice: have been taken away
  chosen_spanish: han sido quitados
  alternatives_spanish:
  - han sido retirados
  - han sido apartados
  lexicon: HALOT
  rationale: El nifal de אסף puede expresar tanto ‘ser recogido’ como ‘ser quitado/retirado’. En este contexto de desaparición del gozo, ‘han sido quitados’ comunica bien la idea de remoción sin perder la metáfora subyacente.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: Es un término común de alegría/rejozo. ‘Gozo’ funciona de manera natural en español bíblico y permite distinguirlo de la segunda palabra paralela.
- source_word: וָגִיל
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - regocijo
  - júbilo
  lexicon: HALOT
  rationale: Como par cercano de שִׂמְחָה, se traduce con un matiz distinto para conservar la duplicación poética. ‘Alegría’ es claro y natural en español.
- source_word: כַּרְמֶל
  english_pob_choice: fruitful field
  chosen_spanish: tierra fértil
  alternatives_spanish:
  - campo fértil
  - tierra cultivada
  lexicon: HALOT
  rationale: Aquí no es el monte Carmelo propio, sino el sustantivo común que designa tierra fértil o cultivada. ‘Tierra fértil’ refleja bien el sentido agrícola y evita una lectura toponímica indebida.
- source_word: אֶרֶץ מוֹאָב
  english_pob_choice: the land of Moab
  chosen_spanish: la tierra de Moab
  alternatives_spanish:
  - Moab
  lexicon: HALOT
  rationale: La construcción explícitamente incluye ‘tierra’; mantenerla preserva el alcance geográfico del juicio.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: Traducción estándar y transparente.
- source_word: יְקָבִים
  english_pob_choice: winepresses
  chosen_spanish: lagares
  alternatives_spanish:
  - prensas de vino
  - lagares de uva
  lexicon: HALOT
  rationale: Se refiere a las instalaciones donde se pisa/exprime la uva. ‘Lagares’ es idiomático en español bíblico y conserva la imagen concreta del proceso.
- source_word: הִשְׁבַּתִּי
  english_pob_choice: I have made ... cease
  chosen_spanish: he hecho cesar
  alternatives_spanish:
  - he detenido
  - he puesto fin a
  lexicon: HALOT
  rationale: El hifil de שבת significa causar que algo cese. ‘He hecho cesar’ reproduce con fidelidad la voz en primera persona del oráculo y mantiene buen español.
- source_word: יִדְרֹךְ
  english_pob_choice: will tread
  chosen_spanish: pisará
  alternatives_spanish:
  - pisará la uva
  - prensará
  lexicon: HALOT
  rationale: En este contexto se trata de pisar las uvas. ‘Pisará’ conserva la tersura del hebreo; el complemento ‘con grito’ deja claro el marco de vendimia.
- source_word: הֵידָד
  english_pob_choice: shouting
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - viva
  lexicon: HALOT
  rationale: El término designa el clamor asociado al pisado de la uva o a la celebración de la cosecha. ‘Grito’ es breve y deja espacio para la nota que explicita la asociación vendimial.
- source_word: הֵידָד הֵידָד לֹא הֵידָד
  english_pob_choice: the shouting is not shouting
  chosen_spanish: el grito no es grito
  alternatives_spanish:
  - el grito no es un grito de vendimia
  - el clamor no es clamor
  lexicon: HALOT
  rationale: La cláusula final es elíptica y retórica. Se conserva la repetición enfática para reflejar que el grito esperado de vendimia ha cesado.
theological_decisions:
- issue: Hablante implícito en la primera persona singular de הִשְׁבַּתִּי
  english_pob_reading: The 'I' is the LORD speaking through the prophetic oracle.
  chosen_spanish_reading: El ‘yo’ es Yahvé hablando en el oráculo profético.
  alternative_spanish_readings:
  - un ‘yo’ profético no especificado
  rationale: En el contexto del juicio contra Moab, la primera persona singular se entiende mejor como voz divina. Traducir en primera persona conserva esa identificación discursiva sin añadir interpretación doctrinal extra.
  doctrine_reference: Primacía del original; lectura discursiva del oráculo profético.
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió ‘have been taken away’ sobre ‘have been gathered’ para expresar remoción, y ‘fruitful field’ sobre ‘orchard land’ para karmel. La presente redacción sigue esa revisión, pero en español usa ‘tierra fértil’ para mantener naturalidad y la referencia agrícola del término hebreo. También conserva la estructura final breve y enfática del hebreo, con una nota para explicitar la elipsis.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el hablante divino conforme a las normas del proyecto, aunque en este versículo la identificación proviene del discurso profético y no de una forma explícita del texto hebreo.
  - ‘Gozo’ y ‘alegría’ preservan el paralelismo de שִׂמְחָה / גִיל sin colapsar ambos términos en un solo equivalente.
  - ‘Lagares’ es consistente con el ámbito vendimial y evita una perífrasis más larga que debilitaría la concisión del verso.
  - La repetición final ‘el grito no es grito’ se deja deliberadamente abrupta para respetar la tensión poética y la elipsis hebrea.
