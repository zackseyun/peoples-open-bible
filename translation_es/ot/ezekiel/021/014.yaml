    rationale: El texto fuente proporcionado para EZK 21:14 tiene אֲדֹנָי, y la auditoría inglesa lo explica como título divino en la fórmula profética. Añadir ‘Yahvé’ introduce un elemento no presente en la evidencia fuente de este registro y contradice la propia rationale inglesa que evita introducir el tetragrámaton donde no está explícito en la forma dada.
  - severity: low
