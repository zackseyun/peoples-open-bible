translation:
  language: es
  text: Daba mi pan a los hambrientos y ropa a los desnudos; y, si veía a alguno de los míos muerto y arrojado detrás del muro[a] de Nínive, lo sepultaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuera del muro de Nínive». El griego dice literalmente «detrás del muro de Nínive», lo que puede describir cuerpos arrojados más allá del muro de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς ἄρτους μου
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mis panes
  - el pan que tenía
  lexicon: LSJ
  rationale: ἄρτους es plural, pero en español 'pan' funciona naturalmente como sustantivo de masa en este contexto de limosna. 'Mi pan' conserva el posesivo y evita una literalidad forzada como 'mis panes'.
- source_word: ἐδίδουν
  english_pob_choice: I gave
  chosen_spanish: daba
  alternatives_spanish:
  - daba continuamente
  - solía dar
  - daba yo
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción repetida o habitual. En español, el imperfecto 'daba' conserva mejor ese valor que un pretérito puntual.
- source_word: τοῖς πεινῶσιν
  english_pob_choice: to the hungry
  chosen_spanish: a los hambrientos
  alternatives_spanish:
  - a los que tenían hambre
  - a los que estaban hambrientos
  lexicon: LSJ
  rationale: El participio sustantivado se vierte de forma natural como 'los hambrientos', manteniendo la fuerza general y el paralelismo con el siguiente miembro.
- source_word: ἱμάτια
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidos
  - vestimenta
  - ropas
  lexicon: LSJ
  rationale: '''Ropa'' es claro y digno en español moderno. ''Vestimenta'' suena más abstracto, y ''vestidos'' sería demasiado específico.'
- source_word: τοῖς γυμνοῖς
  english_pob_choice: to the naked
  chosen_spanish: a los desnudos
  alternatives_spanish:
  - a los que no tenían ropa
  - a los desvestidos
  lexicon: LSJ
  rationale: '''Los desnudos'' reproduce con sencillez la forma directa del griego. Aunque en contexto puede implicar falta de abrigo, el término conserva la imagen sin suavizarla.'
- source_word: ἐκ τοῦ γένους μου
  english_pob_choice: of my kin
  chosen_spanish: de mi linaje
  alternatives_spanish:
  - de mi familia
  - de mi parentela
  - de mi pueblo
  lexicon: LSJ
  rationale: γένος puede abarcar descendencia, familia extensa o grupo de parentesco. 'Linaje' mantiene esa amplitud genealógica y evita estrecharlo solo a 'familia'.
- source_word: ἐθεώρουν
  english_pob_choice: I saw
  chosen_spanish: veía
  alternatives_spanish:
  - observaba
  - notaba
  lexicon: LSJ
  rationale: El imperfecto de θεωρέω sugiere experiencia repetida. 'Veía' conserva esa habitualidad mejor que un pretérito simple.
- source_word: τεθνηκότα
  english_pob_choice: dead
  chosen_spanish: muerto
  alternatives_spanish:
  - fallecido
  - sin vida
  lexicon: LSJ
  rationale: '''Muerto'' es la correspondencia más directa y natural para el estado resultante expresado por el participio perfecto.'
- source_word: ἐρριμμένον
  english_pob_choice: thrown
  chosen_spanish: arrojado
  alternatives_spanish:
  - echado
  - lanzado
  - tirado
  lexicon: LSJ
  rationale: '''Arrojado'' conserva la violencia e indignidad del cuerpo dejado fuera; es más elevado que ''tirado'' y más fiel al matiz del participio perfecto pasivo.'
- source_word: ὀπίσω τοῦ τείχους Νινευή
  english_pob_choice: behind the wall of Nineveh
  chosen_spanish: detrás del muro de Nínive
  alternatives_spanish:
  - fuera del muro de Nínive
  - tras el muro de Nínive
  - detrás de la muralla de Nínive
  lexicon: LSJ
  rationale: Se preserva la imagen literal 'detrás del muro' sin resolverla del todo como 'fuera de', tal como la traducción inglesa auditada retiene la tensión del griego.
- source_word: ἔθαπτον αὐτόν
  english_pob_choice: I buried him
  chosen_spanish: lo sepultaba
  alternatives_spanish:
  - lo enterraba
  - lo sepulté
  lexicon: LSJ
  rationale: El imperfecto griego vuelve a indicar práctica habitual. 'Lo sepultaba' preserva ese valor iterativo y mantiene un registro más solemne que 'lo enterraba'.
theological_decisions:
- issue: Alcance de γένος μου
  english_pob_reading: Rendered broadly as 'my kin' rather than narrowly 'my family.'
  chosen_spanish_reading: Traducido como 'mi linaje' para mantener una amplitud genealógica y de parentesco.
  alternative_spanish_readings:
  - mi familia
  - mi parentela
  - mi pueblo
  rationale: El griego puede referirse a la descendencia, al grupo de parentesco o al conjunto del pueblo propio. 'Mi linaje' conserva esa amplitud sin decidir indebidamente entre lo familiar y lo étnico.
  doctrine_reference: Preservar la ambigüedad textual cuando el griego la permite; no estrechar el alcance social del término sin base suficiente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene el imperfecto iterativo (''daba'', ''veía'', ''sepultaba''), conserva la imagen literal de ''detrás del muro de Nínive'' y refleja la amplitud semántica de γένος con ''linaje''. No se introdujeron cambios textuales respecto del sentido base de la versión inglesa auditada.'
  spanish_consistency_notes:
  - Se usa 'Nínive' con tilde conforme al español.
  - Se mantiene un registro sobrio y bíblico sin recurrir a 'SEÑOR' u otras sustituciones no requeridas.
  - '''Los desnudos'' conserva la paralela concisión del griego, en línea con la preferencia POB por no suavizar la imagen.'
