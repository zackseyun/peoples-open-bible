base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/018.yaml
  text: The disciples said to Jesus[a], “Tell us how our end will be.” He said, “Have you found the beginning, then, that you are seeking the end? For in the place where the beginning is, there the end will be. Blessed is the one who will stand in the beginning; he will know the end[d][c][b], and he will not taste death.”
  footnotes:
  - marker: a
    text: “Have you found the beginning, then … ?” The particle sequence ⲁⲛⲧⲱⲧⲛ … ⲅⲁⲣ functions rhetorically; ‘then’ captures the tone without over‑translating ‘for/indeed.’
    reason: lexical_alternative
  - marker: b
    text: “In the place where the beginning is, there the end will be.” The Coptic explicitly uses ϩⲛ ⲡⲙⲁ ‘in the place’ with a relative clause; the translation keeps that structure.
    reason: cultural_note
  - marker: c
    text: '“Blessed is the one who will stand in the beginning”: literally “who will stand before it/in his presence in the beginning” (ⲉⲣⲁⲧϥ ϩⲛ ⲡⲁⲣⲭⲏ). The 3ms suffix may refer to ‘the beginning’ or to an implied ‘First/Origin.’'
    reason: dialect_note
  - marker: d
    text: “Will not taste death” renders the idiom ϫⲓϯⲡⲉ ⲛⲙⲟⲩ, a set Coptic expression for experiencing death.
    reason: cultural_note
