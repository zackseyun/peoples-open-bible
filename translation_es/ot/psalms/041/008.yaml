translation:
  language: es
  text: Juntos, todos los que me odian susurran[b][a] contra mí; contra mí planean el mal para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de mí» para las dos apariciones de «contra mí»; la preposición hebrea puede marcar tanto dirección hostil como tema del habla/pensamiento, pero el sentido adversativo encaja mejor en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «maquinan daño para mí» / «planean el mal contra mí». El hebreo combina un verbo de pensamiento/planificación con «mal», expresando intención hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַ֗חַד
  english_pob_choice: Together
  chosen_spanish: Juntos
  alternatives_spanish:
  - Todos juntos
  - En conjunto
  - Unánimemente
  lexicon: HALOT
  rationale: יַחַד expresa acción colectiva. «Juntos» es natural en español y conserva la idea de coordinación entre los adversarios.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  - con respecto a mí
  lexicon: HALOT
  rationale: En este contexto hostil, עַל tiene fuerza adversativa. «Contra mí» reproduce mejor la intención de oposición que una mera referencia temática.
- source_word: יִתְלַחֲשׁוּ
  english_pob_choice: whisper
  chosen_spanish: susurran
  alternatives_spanish:
  - susurran entre ellos
  - murmuran
  - conspiran en susurros
  lexicon: HALOT
  rationale: El hitpael de לחשׁ sugiere hablar en voz baja, susurrar. «Susurran» mantiene la imagen sin añadir explícitamente una conspiración que el verbo por sí solo no obliga a expresar.
- source_word: כָּל שֹׂנְאָי
  english_pob_choice: all who hate me
  chosen_spanish: todos los que me odian
  alternatives_spanish:
  - todos mis enemigos
  - todos mis odiadores
  lexicon: HALOT
  rationale: El participio comunica a «los que odian» como acción verbal continua. «Todos los que me odian» conserva esa fuerza mejor que un sustantivo generalizado como «enemigos».
- source_word: יַחְשְׁבוּ
  english_pob_choice: devise
  chosen_spanish: planean
  alternatives_spanish:
  - maquinan
  - proyectan
  - traman
  lexicon: HALOT
  rationale: חשב puede significar pensar, planear o idear. En paralelo con el susurro hostil, «planean» expresa intención sin endurecerse demasiado ni volver el verso demasiado idiomático.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - mal
  - daño
  - perjuicio
  - maldad
  lexicon: HALOT
  rationale: «El mal» conserva el alcance moral y hostil del sustantivo hebreo. «Daño» sería más estrecho y pragmático.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: HALOT
  rationale: La preposición permite «para/a mí». Dado el paralelo con עָלַי, «para mí» conserva la formulación hebrea y sugiere el objetivo del daño sin fusionar los dos complementos preposicionales.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el auditorial inglés POB y mantiene la distinción entre los dos complementos preposicionales hebreos: עָלַי como oposición hostil y לִי como objetivo del daño. Se conservó la imagen de «susurrar» sin convertirla en una paráfrasis más interpretativa como «conspirar».'
  spanish_consistency_notes:
  - Se prefirió «contra mí» en ambas apariciones de עָלַי por coherencia con el sentido adversativo documentado.
  - «Todos los que me odian» preserva el valor participial de שֹׂנְאָי mejor que «mis enemigos».
  - Se mantuvo «el mal» para רָעָה, siguiendo la amplitud semántica del término hebreo.
