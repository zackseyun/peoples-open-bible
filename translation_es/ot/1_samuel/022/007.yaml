  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Siervos' es aceptable por el contexto cortesano; no se exige 'esclavos' aquí. 'Benjaminitas' en texto con nota literal 'hijos de Benjamín' respeta la decisión auditada. No hay asuntos de nombres divinos o títulos mesiánicos.
