    rationale: Aunque «Ve» es posible, el inglés auditado justificó una forma con matiz continuativo o de despedida («Go your way»). En español, «Sigue tu camino» o «Vete» preservan mejor ese valor contextual; «Ve» resulta más plano.
  - severity: low
