translation:
  language: es
  text: 'Pero el hombre contaminado[a] seguía orando al Soberano[b], que ya no tendría misericordia de él, diciendo esto:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Contaminado» procura conservar la fuerza moral y cultual de μιερὸς; también podría traducirse «impuro» o «manchado» según el matiz.
