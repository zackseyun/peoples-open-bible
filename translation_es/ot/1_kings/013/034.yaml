  rationale: Se reemplaza 'apartarla' por 'cortarla' para reflejar fielmente להכחיד y mantener la distinción con 'destruirla'. Se cambia 'esta cosa' por 'este asunto' por naturalidad y dignidad en español sin perder amplitud semántica. Se ajusta la frase final a 'de la faz de la tierra' como español más natural, conservando en nota el matiz literal del hebreo, ya que la nota inglesa sobre el modismo no estaba preservada y en español ayuda a evitar pérdida de significado.
