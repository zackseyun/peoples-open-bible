  text: ἕκαστον δὲ αὐτῶν καθοπλίσας οὐ τὴν ἀσπίδων καὶ λογχῶν ἀσφάλειαν, ὡς τὴν ἐν τοῖς ἀγαθοῖς λόγοις παράκλησιν, καὶ προσηγησάμενος ὄνειρον ἀξιόπιστον ὑπὲρ τὰ πάντα ηὔφραινεν.
