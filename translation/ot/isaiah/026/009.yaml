id: ISA.26.9
reference: Isaiah 26:9
source:
  edition: WLC
  text: נַפְשִׁ֤/י אִוִּיתִ֨י/ךָ֙ בַּ/לַּ֔יְלָה אַף רוּחִ֥/י בְ/קִרְבִּ֖/י אֲשַֽׁחֲרֶ֑/ךָּ כִּ֞י כַּ/אֲשֶׁ֤ר מִשְׁפָּטֶ֨י/ךָ֙ לָ/אָ֔רֶץ צֶ֥דֶק לָמְד֖וּ יֹשְׁבֵ֥י תֵבֵֽל־׃
translation:
  text: My soul has desired you in the night[a]; indeed, my spirit within me seeks you early. For when your judgments are in the earth[c][b], the inhabitants of the world learn righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earnestly seeks you' or 'seeks you at dawn'; the Hebrew verb evokes early-morning seeking and, by extension, eager pursuit.
    reason: lexical_alternative
  - marker: b
    text: Literally 'when your judgments are in the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'learn justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשִׁי
  chosen: My soul
  alternatives:
  - I
  - my inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes the speaker's inner self/appetite rather than mere physical life. 'My soul' preserves the poetic and anthropological force better than flattening to 'I'.
- source_word: אִוִּיתִיךָ
  chosen: has desired you
  alternatives:
  - have longed for you
  - have yearned for you
  lexicon: HALOT
  rationale: The verb אוה/אוהה in this form conveys strong desire or longing. 'Has desired you' keeps the perfect aspect's settled state in context, while remaining natural English. 'Longed for' is possible but slightly more interpretive.
- source_word: בַּלַּיְלָה
  chosen: in the night
  alternatives:
  - at night
  lexicon: HALOT
  rationale: The prepositional phrase is straightforward. 'In the night' preserves the poetic register and matches the Hebrew article.
- source_word: אַף
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: אַף here intensifies and advances the parallel line. 'Indeed' captures the emphatic/additive force without sounding wooden.
- source_word: רוּחִי בְקִרְבִּי
  chosen: my spirit within me
  alternatives:
  - my spirit in me
  - the spirit within me
  lexicon: HALOT
  rationale: רוּחַ parallels נֶפֶשׁ as the speaker's inward being. 'Within me' is the most idiomatic rendering of בְקִרְבִּי and preserves the internal, personal sense.
- source_word: אֲשַׁחֲרֶךָּ
  chosen: seeks you early
  alternatives:
  - earnestly seeks you
  - seeks you at dawn
  lexicon: HALOT
  rationale: The verb שׁחר literally evokes seeking at dawn/early. In context it carries both temporal and idiomatic senses of eager seeking. 'Seeks you early' preserves the dawn imagery; 'earnestly seeks' is a common interpretive rendering worth preserving in a footnote.
- source_word: כִּי כַּאֲשֶׁר
  chosen: For when
  alternatives:
  - For as
  - Because when
  lexicon: HALOT
  rationale: 'The combination introduces the reason and temporal circumstance for the preceding desire. ''For when'' gives clear English sense: the inhabitants learn righteousness when God''s judgments are in the earth.'
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your justice
  - your acts of judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט commonly denotes judgments, judicial decisions, or acts of justice. 'Your judgments' is the most direct and preserves the covenantal/judicial nuance.
- source_word: לָאָרֶץ
  chosen: come upon the earth
  alternatives:
  - are in the earth
  - are on the earth
  - reach the earth
  lexicon: HALOT
  rationale: The Hebrew is terse ('to/in the earth') and depends on the clause for sense. In English, 'come upon the earth' makes explicit the implied arrival or manifestation of the judgments without over-paraphrasing. A more literal 'are in the earth' is possible and preserved in a footnote.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צֶדֶק can denote righteousness or justice. Here the object of learning is the moral order/right conduct taught by divine judgments. 'Righteousness' best preserves the ethical-theological sense, while 'justice' remains a viable lexical alternative.
- source_word: לָמְדוּ
  chosen: learn
  alternatives:
  - have learned
  - come to learn
  lexicon: HALOT
  rationale: The qatal here expresses the result in a general truth-like statement. Present 'learn' communicates the gnomic force naturally in English.
- source_word: יֹשְׁבֵי תֵבֵל
  chosen: the inhabitants of the world
  alternatives:
  - those who dwell in the world
  - the dwellers of the world
  lexicon: HALOT
  rationale: This construct phrase refers to the people living throughout the inhabited world. 'The inhabitants of the world' is idiomatic and preserves the universal scope of תֵבֵל.
