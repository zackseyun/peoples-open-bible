revisions:
- from: 'Así que David subió allí[a], y también sus dos esposas: Ahinoam la jezreelita y Abigail, la esposa de Nabal el carmelita.'
  to: 'David subió allí[a], y también sus dos esposas: Ahinoam la jezreelita y Abigail, la esposa de Nabal de Carmel.'
  rationale: Se elimina «Así que» para no añadir un matiz consecutivo no explícito en el hebreo narrativo, y se cambia «el carmelita» por «de Carmel» para evitar una ambigüedad fuerte en español contemporáneo mientras se preserva la identificación gentilicia de Nabal. La nota se mantiene, ajustada al texto revisado.
