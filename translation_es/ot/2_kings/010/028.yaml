  rationale: 'Se aplica una corrección mínima pero necesaria: «Jehú» sustituye a la transliteración inglesa «Jehu» para ajustarse al uso bíblico español. Se conservan «Así», «destruyó», «Baal» y «de Israel» porque siguen razonablemente el sentido fuente y el rastro léxico del POB inglés. También se limpia la nota b para que tenga formato y español naturales.'
