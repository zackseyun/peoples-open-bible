translation:
  language: es
  text: Pues o bien, mientras festejan[a], enloquecen; o profetizan mentiras; o viven injustamente; o juran en falso[b] rápidamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mientras hacen fiesta'. El participio griego puede expresar el estado de regocijo o festejo mientras sobreviene la locura.
    reason: lexical_alternative
  - marker: b
    text: O 'perjuran rápidamente' o 'sin vacilar se perjuran'. El griego ἐπιορκοῦσιν se refiere a jurar falsamente o cometer perjurio.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐφραινόμενοι
  english_pob_choice: while reveling
  chosen_spanish: mientras hacen fiesta
  alternatives_spanish:
  - mientras se regocijan
  - mientras festejan
  lexicon: LSJ
  rationale: El participio expresa un estado de festejo o regocijo; en este contexto, 'mientras hacen fiesta' comunica esa acción concomitante en español sin sonar rígido ni arcaico. Evita suavizar el matiz de desenfreno que la revisión inglesa destacó con 'reveling'.
- source_word: μεμήνασιν
  english_pob_choice: they go mad
  chosen_spanish: enloquecen
  alternatives_spanish:
  - están locos
  - enfurecen
  lexicon: LSJ
  rationale: El perfecto de μαίνομαι denota un estado presente de locura o frenesí. 'Enloquecen' conserva fuerza verbal y resulta idiomático en español, manteniendo la tensión entre estado y acción.
- source_word: προφητεύουσιν ψευδῆ
  english_pob_choice: they prophesy lies
  chosen_spanish: profetizan mentiras
  alternatives_spanish:
  - profetizan falsedades
  - pronuncian falsas profecías
  lexicon: LSJ
  rationale: La construcción verbo + objeto se mantiene de manera directa. 'Mentiras' reproduce con claridad el objeto ψευδῆ y preserva la aspereza de la acusación sin convertirla en una mera modificación adverbial.
- source_word: ζῶσιν ἀδίκως
  english_pob_choice: they live unjustly
  chosen_spanish: viven injustamente
  alternatives_spanish:
  - viven sin justicia
  - viven mal
  lexicon: LSJ
  rationale: ἀδίκως puede significar 'injustamente' o 'mal'. 'Injustamente' mantiene el alcance ético-social de la sabiduría bíblica y coincide con la opción auditada en inglés, sin cargar el término con un matiz doctrinal ajeno al contexto.
- source_word: ἐπιορκοῦσιν
  english_pob_choice: they quickly swear false oaths
  chosen_spanish: juran falsos juramentos
  alternatives_spanish:
  - cometen perjurio
  - juran en falso
  lexicon: LSJ
  rationale: El verbo se refiere a jurar falsamente o perjurar. 'Juran falsos juramentos' conserva explícita la dimensión de juramento que el griego exige; en español, 'perjurio' sería más jurídico pero menos transparente para lectores generales.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - sin demora
  lexicon: LSJ
  rationale: El adverbio modifica la prontitud con que realizan el juramento falso. 'Rápidamente' es el equivalente más directo y mantiene el valor de prontitud/repidez señalado en el texto fuente.
theological_decisions:
- issue: ἀδίκως en un contexto sapiencial de conducta
  english_pob_reading: they live unjustly
  chosen_spanish_reading: viven injustamente
  alternative_spanish_readings:
  - viven en injusticia
  - viven malvadamente
  rationale: Se conserva 'injustamente' porque refleja tanto la dimensión ética como la relacional/social de ἀδίκως. No se reemplaza por 'malvadamente' para evitar endurecer el término más allá de la evidencia léxica, y no se usa 'injusticia' como sustantivo porque el griego es adverbial.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη / ἀδικία overlap legal-ethical force'
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Sabiduría 14:28 y la auditoría inglesa, incluyendo la revisión que prefirió 'reveling' para εὐφραινόμενοι. Se integró esa decisión en español con 'mientras hacen fiesta' para conservar el matiz de festejo desenfrenado sin añadir una nota innecesaria. También se mantuvo el paralelismo de cuatro acusaciones y se evitó depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se conserva el paralelismo de cuatro miembros con '; o' para reflejar la estructura griega.
  - '''Yahvé'' no aplica aquí porque el versículo no contiene el nombre divino ni κύριος.'
  - Se evita 'Cristo'/'Mesías' porque no hay léxico mesiánico en el pasaje.
  - '''Juran falsos juramentos'' mantiene el lenguaje de juramento explícito del griego, en vez de reducirlo a ''mienten''.'
