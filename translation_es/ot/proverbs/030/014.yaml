- from: a generación cuyos dientes son espadas[a], y cuyas fauces son cuchillos[b], para devorar a los pobres desde la tierra y a los necesitados de entre los hombres.
  to: Una generación cuyos dientes son espadas, y cuyas fauces son cuchillos, para devorar a los pobres de la tierra[a] y a los necesitados de entre la humanidad[b].
  rationale: Se corrige el error gramatical inicial, se mejora la naturalidad de מֵאֶרֶץ con «de la tierra», y se ajusta מֵאָדָם a «de entre la humanidad» para reflejar mejor el sentido genérico humano documentado por la POB inglesa. También se reubican las notas a los lugares pertinentes del texto.
