  text: כְּ/כֹ֨ל אֲשֶׁר שָׁאַ֜לְתָּ מֵ/עִ֨ם יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בְּ/חֹרֵ֔ב בְּ/י֥וֹם הַ/קָּהָ֖ל לֵ/אמֹ֑ר לֹ֣א אֹסֵ֗ף לִ/שְׁמֹ֨עַ֙ אֶת קוֹל֙ יְהוָ֣ה אֱלֹהָ֔/י וְ/אֶת הָ/אֵ֨שׁ הַ/גְּדֹלָ֥ה הַ/זֹּ֛את לֹֽא אֶרְאֶ֥ה ע֖וֹד וְ/לֹ֥א אָמֽוּת־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/018/016.yaml
  text: just as you asked of Yahweh your God at Horeb on the day of the assembly[a], saying, ‘Let me not continue to hear the voice of Yahweh my God, and let me not see this great fire anymore[b], lest I die.’
  footnotes:
  - marker: a
    text: Or 'I will not continue to hear' / 'I will hear no more.' The Hebrew idiom literally involves 'adding/continuing' to hear.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that I may not die.' The final clause expresses the speaker's fear of death from direct exposure to the divine presence.
    reason: lexical_alternative
