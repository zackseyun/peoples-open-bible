revisions:
- from: aun si esos tres hombres estuvieran en medio de ella—Noé[a], Daniel y Job—, ellos librarían solo a sí mismos por su justicia, declara el Señor Yahvé.
  to: aun si estos tres hombres estuvieran en medio de ella—Noé, Daniel[a] y Job—, ellos librarían solo a sí mismos por su justicia, declara el Señor Dios, Yahvé.
  rationale: Se ajusta «esos» a «estos» para reflejar mejor הָאֵלֶּה y el audit trail inglés; se reubica la nota al nombre discutido «Daniel[a]» en vez de «Noé[a]»; se mejora la legibilidad y fidelidad del título final con «el Señor Dios, Yahvé», conservando explícitamente el nombre divino; y se corrige la puntuación del inciso para un español más natural.
