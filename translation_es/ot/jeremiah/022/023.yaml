    text: 'O: «cómo serás compadecida cuando te sobrevengan dolores». El verbo hebreo traducido aquí como «gemirás» es difícil, y algunos lo entienden en el sentido de recibir compasión en lugar de emitir gemidos.'
    reason: lexical_alternative
  - marker: b
    text: El Líbano y los cedros probablemente evocan el palacio real construido con cedro del Líbano, presentando a los gobernantes de Judá como si moraran en una seguridad elevada.
    reason: cultural_note
  revision_rationale: 'Se corrigió la correspondencia y el anclaje de las notas para alinearlos con la auditoría inglesa: la alternativa léxica ahora acompaña ‘gemirás’ y la nota cultural acompaña la referencia a los dolores mediante el segundo marcador, preservando el orden documentado. También se mejoró la naturalidad del español reemplazando ‘te lleguen’ por ‘te sobrevengan’ y evitando la repetición ‘dolores, dolor’ con ‘dolores, sufrimiento’, sin alterar el sentido del hebreo ni la decisión principal del POB.'
