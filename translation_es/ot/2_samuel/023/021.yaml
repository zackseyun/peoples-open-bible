  language: en
  yaml_path: translation/ot/2_samuel/023/021.yaml
  text: He also struck down an Egyptian[a], a man of impressive appearance. The Egyptian had a spear in his hand, and he went down to him with a staff, snatched the spear from the Egyptian’s hand[b], and killed him with his own spear.
  footnotes:
  - marker: a
    text: Or 'a handsome man' or 'a man of notable appearance.' The Hebrew phrase refers broadly to the Egyptian's appearance; some interpreters, influenced by the parallel in 1 Chronicles 11:23, understand it to imply unusual stature.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a club' or 'with a rod.' The Hebrew שֵׁבֶט can denote a staff, rod, scepter, or club depending on context.
    reason: lexical_alternative
