translation:
  language: es
  text: Un jardín cerrado[a] es mi hermana, mi esposa; un manantial cerrado[b], una fuente sellada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse ‘cerrado con llave’; el hebreo usa el mismo término en ambos casos.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido ‘manantial’ también puede significar ‘montón’ en otros contextos, pero aquí el paralelismo con ‘fuente’ favorece el sentido de una fuente de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּן
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  - jardín cercado
  lexicon: HALOT
  rationale: El sentido básico es ‘garden’. En español, ‘jardín’ comunica naturalmente la imagen poética sin añadir de entrada una idea distinta de la que ya aporta el participio siguiente.
- source_word: נָע֖וּל
  english_pob_choice: locked
  chosen_spanish: cerrado
  alternatives_spanish:
  - cerrado con llave
  - bloqueado
  - sellado
  lexicon: HALOT
  rationale: El participio pasivo expresa algo cerrado o asegurado. ‘Cerrado’ funciona con naturalidad en español y mantiene la imagen de acceso restringido; se repite en ambos miembros para reflejar la repetición hebrea.
- source_word: אֲחֹתִי
  english_pob_choice: my sister
  chosen_spanish: mi hermana
  alternatives_spanish:
  - mi hermana de sangre
  - mi pariente
  lexicon: HALOT
  rationale: Se conserva el término literal de parentesco, como en el texto inglés, porque en Cantar de los Cantares funciona como vocativo íntimo y poético, no como explicación literalista.
- source_word: כַלָּה
  english_pob_choice: my bride
  chosen_spanish: mi novia
  alternatives_spanish:
  - mi esposa
  - mi prometida
  lexicon: HALOT
  rationale: Aunque el término puede traducirse ‘novia’ o ‘esposa joven / desposada’, en español ‘mi novia’ suena natural en el paralelismo vocativo y preserva la cercanía relacional del hebreo poético.
- source_word: גַּל
  english_pob_choice: spring
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - poza
  - acúmulo
  lexicon: HALOT
  rationale: En este paralelismo con ‘fuente’ y junto a ‘sellada’, el valor de curso/origen de agua es el más probable. ‘Manantial’ evita la posible ambigüedad de ‘montón/oleaje’ en otros contextos.
- source_word: מַעְיָן
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - pozo
  lexicon: HALOT
  rationale: Designa una fuente de agua. ‘Fuente’ mantiene bien el paralelismo poético con ‘manantial’ y es una opción clara y digna en español.
- source_word: חָתוּם
  english_pob_choice: sealed
  chosen_spanish: sellada
  alternatives_spanish:
  - cerrada
  - sellado
  lexicon: HALOT
  rationale: El participio pasivo significa ‘sellado’. ‘Sellada’ conserva la imagen de una reserva asegurada y complementa ‘cerrado’ sin repetir exactamente el mismo matiz.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: el inglés POB mantuvo la lectura óptima-equivalente sin cambios; la versión española sigue esa decisión y conserva la repetición poética de los dos participios con matices distintos (‘cerrado’ / ‘sellada’) para no aplanar el paralelismo.'
  spanish_consistency_notes:
  - Se mantiene un registro poético claro y publicable, evitando calcos excesivamente rígidos.
  - Se conserva la repetición de נָעוּל en ambos miembros mediante ‘cerrado’ en el texto y una nota alternativa que refleja la variación posible.
  - Se usa ‘mi hermana, mi novia’ como vocativos en aposición, siguiendo la estructura del hebreo y del POB inglés.
  - Se eligió ‘manantial’ para גַּל y ‘fuente’ para מַעְיָן para preservar el paralelismo sin perder el valor acuático del primer término.
