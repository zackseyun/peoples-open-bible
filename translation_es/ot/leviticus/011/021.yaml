review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la excepción legal y la anatomía básica de los insectos permitidos, pero hay varios desajustes con el sentido fuente y con el rastro POB: «esto» suena demasiado singular donde el hebreo introduce una clase; «comerán» expresa mandato/futuro más que permiso; y la nota textual está anclada en «insecto alado» cuando corresponde a la frase sobre «patas».'
  spanish_quality_summary: El español es generalmente claro, pero puede sonar más natural y preciso con «estos podrán comer» y «de todos los insectos alados que andan sobre cuatro patas». «Arriba de sus pies» es entendible, pero «por encima de sus pies» refleja mejor la relación espacial. La nota actual también necesita mejor redacción en español.
  glossary_alignment: No hay términos teológicos mayores en juego. La elección «insectos alados» es aceptable para שֶׁרֶץ הָעוֹף en este contexto. «Patas articuladas» preserva bien la decisión léxica POB sobre כְרָעַיִם. Debe mantenerse la nota textual sobre el ketiv/qere y, si se conserva una sola nota, anclarla en «patas articuladas[a]», no en «alados[a]».
  issues:
  - severity: medium
    issue: «esto» para אֶת זֶה
    rationale: Aunque el hebreo es formalmente singular, en contexto introduce una categoría plural de animales permitidos; en español bíblico-natural «estos» o «estos sí» comunica mejor la clase.
  - severity: medium
    issue: «comerán» no expresa bien permiso
    rationale: תֹּאכְלוּ en este material legal aquí funciona como permisión/allowance, en contraste con la prohibición previa. «Podrán comer» o «pueden comer» preserva mejor ese valor.
  - severity: high
    issue: La nota textual está anclada en la palabra equivocada
    rationale: La variante textual afecta אֲשֶׁר לֹא/לוֹ כְרָעַיִם, es decir, la cláusula sobre las patas, no «insecto alado». El marcador debe moverse al sintagma correspondiente.
  - severity: low
    issue: «arriba de sus pies» puede mejorarse
    rationale: Es comprensible, pero «por encima de sus pies» refleja con más precisión מִמַּעַל y suena más digno en registro bíblico.
  - severity: low
    issue: Redacción de la nota textual
    rationale: «La tradición hebrea literaliza» suena torpe. Conviene decir que la tradición textual hebrea lee literalmente «que no patas», pero que la lectura tradicional entendida por contexto y versiones antiguas es «que tienen patas».
  revised_spanish_text: 'Sin embargo, estos podrán comer de todos los insectos alados que andan sobre cuatro patas: los que tienen patas articuladas[a] por encima de sus pies para saltar con ellas sobre la tierra.'
  revised_footnotes:
  - marker: a
    text: La tradición textual hebrea lee literalmente «que no patas»; la lectura tradicional entendida por el contexto y las versiones antiguas es «que tienen patas».
    reason: textual_variant
  revision_rationale: Se ajusta el español para reflejar mejor la clase plural introducida por el hebreo, el valor permisivo del verbo legal, y el lugar correcto de la variante textual. También se mejora ligeramente la precisión espacial y la naturalidad del español sin apartarse del sentido fuente.
