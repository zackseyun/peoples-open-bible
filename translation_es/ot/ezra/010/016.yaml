translation:
  language: es
  text: Así hicieron los hijos del exilio[a]. Y Esdras, el sacerdote, seleccionó hombres, jefes de casas paternas[c], según sus casas paternas, todos ellos por nombre; y se reunieron el primer día del mes décimo para investigar el asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los exiliados hicieron así'. El hebreo dice literalmente 'los hijos del exilio', una designación corporativa de la comunidad que regresó.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''jefes de casas paternas'', es decir, líderes de clanes o grupos familiares.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי הַגּוֹלָה
  english_pob_choice: the sons of the exile
  chosen_spanish: los hijos del exilio
  alternatives_spanish:
  - los exiliados
  - los hijos de la cautividad
  - la comunidad del exilio
  lexicon: HALOT
  rationale: Se conserva la designación corporativa hebrea y su fuerza formal. 'Hijos' refleja mejor el paralelo con el inglés POB y evita neutralizar innecesariamente el giro del texto.
- source_word: וַיִּבָּדְלוּ
  english_pob_choice: selected
  chosen_spanish: seleccionó
  alternatives_spanish:
  - se separaron
  - fueron apartados
  - eligió
  lexicon: HALOT
  rationale: El hebreo permite la idea de separación/apartamiento, pero en contexto administrativo la acción es la de escoger o designar representantes. 'Seleccionó' sigue la revisión inglesa y comunica bien la función del verbo en español.
- source_word: עֶזְרָא הַכֹּהֵן
  english_pob_choice: Ezra the priest
  chosen_spanish: Esdras, el sacerdote
  alternatives_spanish:
  - Esdras el sacerdote
  - Esdras, el sacerdote-sacerdote
  lexicon: HB/PROPN
  rationale: Se traduce el nombre de forma usual en español bíblico como 'Esdras' y se conserva solo el título explícito del hebreo, sin importar otros oficios de contextos vecinos.
- source_word: אֲנָשִׁים רָאשֵׁי הָאָבוֹת
  english_pob_choice: men, heads of fathers’ houses
  chosen_spanish: hombres, jefes de casas paternas
  alternatives_spanish:
  - hombres, cabezas de casas paternas
  - hombres, jefes de familias
  - varones, jefes de linajes
  lexicon: HALOT
  rationale: '''Hombres'' mantiene el sustantivo explícito; ''casas paternas'' preserva la unidad social hebrea sin reemplazarla por un término más general como ''familias''. ''Jefes'' refleja el papel de liderazgo.'
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - conforme a sus casas paternas
  - según sus casas ancestrales
  - por sus grupos familiares
  lexicon: HALOT
  rationale: Se conserva la repetición de 'casa paterna' para reflejar la estructura hebrea בית/אבות. 'Según' expresa adecuadamente la clasificación o adscripción por linaje.
- source_word: וְכֻלָּם בְּשֵׁמוֹת
  english_pob_choice: all of them by name
  chosen_spanish: todos ellos por nombre
  alternatives_spanish:
  - todos ellos nombrados individualmente
  - cada uno por nombre
  - todos ellos nominalmente
  lexicon: HALOT
  rationale: La frase indica identificación individual o registro nominal. 'Por nombre' es literal y natural en español, y conserva la posible nota de enumeración.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they sat down
  chosen_spanish: se sentaron
  alternatives_spanish:
  - se reunieron
  - tomaron asiento
  - se sentaron a deliberar
  lexicon: HALOT
  rationale: El verbo básico es 'sentarse'; en el contexto de una reunión para examen del caso, 'se sentaron' mantiene la imagen literal sin perder inteligibilidad.
- source_word: בְּיוֹם אֶחָד לַחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: on the first day of the tenth month
  chosen_spanish: el primer día del mes décimo
  alternatives_spanish:
  - el día primero del décimo mes
  - el primer día del décimo mes
  lexicon: HALOT
  rationale: Se conserva el valor idiomático del hebreo, con una forma natural en español. 'Mes décimo' sigue de cerca el orden hebreo y evita sobreinterpretación.
- source_word: לְדַרְיוֹשׁ הַדָּבָר
  english_pob_choice: to investigate the matter
  chosen_spanish: para investigar el asunto
  alternatives_spanish:
  - para examinar el asunto
  - para inquirir sobre el asunto
  - para averiguar el asunto
  lexicon: HALOT
  rationale: El verbo hebreo transmite inquirir/indagar. 'Investigar' comunica adecuadamente el procedimiento administrativo/judicial; 'asunto' es la equivalente natural de 'matter' en español bíblico moderno.
theological_decisions:
- issue: Alcance de בְּנֵי הַגּוֹלָה como designación del pueblo restaurado
  english_pob_reading: the sons of the exile ... a corporate designation for the returned community
  chosen_spanish_reading: los hijos del exilio ... como designación corporativa de la comunidad retornada
  alternative_spanish_readings:
  - los exiliados
  - la comunidad retornada
  - los hijos de la cautividad
  rationale: Se mantiene la imagen corporativa literal sin reducirla a una paráfrasis sociológica. Esto conserva la tensión entre expresión filial y referencia comunitaria.
  doctrine_reference: Ninguna doctrina específica; nota de identidad comunitaria en el exilio y retorno.
- issue: Sentido de וַיִּבָּדְלוּ en contexto administrativo
  english_pob_reading: selected / separated themselves
  chosen_spanish_reading: seleccionó
  alternative_spanish_readings:
  - se separaron
  - fueron apartados
  - designó
  rationale: El contexto exige una acción de nombramiento o designación para la investigación. 'Seleccionó' recoge la función pragmática sin borrar la posible lectura de apartamiento que el verbo sugiere lexicalmente.
  doctrine_reference: Ninguna doctrina específica; decisión de procedimiento y semántica verbal.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que cambió 'set apart' por 'selected' por mayor naturalidad y precisión contextual. La redacción española adopta ese ajuste y conserva el resto de la solución inglesa, incluyendo la idea de identificación nominal y la fecha exacta.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene 'Mesías'/'Cristo' fuera de este pasaje; no aplica aquí.
  - '''Hijos del exilio'' conserva el paralelismo con la solución inglesa POB y la designación corporativa hebrea.'
  - '''Casas paternas'' se mantiene de forma consistente para בית אבות y רָאשֵׁי הָאָבוֹת.'
  - '''Asunto'' traduce de modo natural הַדָּבָר en este contexto administrativo.'
  - La puntuación sigue el español estándar con punto y coma para separar la cláusula principal de la finalidad.
