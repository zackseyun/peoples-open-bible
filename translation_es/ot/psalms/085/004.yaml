    text: 'O: «Apartaste toda tu ira; te volviste del ardor de tu enojo»'
    reason: lexical_alternative
  revision_rationale: Se mantiene «Retiraste» por fidelidad a la revisión inglesa auditada y por buena naturalidad en español. Se cambia «te volviste atrás del» por «te apartaste del» para expresar con claridad y buen español la idea de volverse de / apartarse de, sin introducir arrepentimiento emocional. La nota alternativa se ajusta para preservar una opción más cercana a la imaginería verbal de «volverse», pero en una forma española aceptable.
