translation:
  language: es
  text: Así David subió[a] conforme a la palabra de Gad, que había hablado en nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según la palabra de Gad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba o subir; en este contexto narra el desplazamiento de David. «Subió» conserva la imagen espacial sin sonar forzado en español.
- source_word: בִּדְבַר
  english_pob_choice: at the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - por la palabra de
  - a la palabra de
  lexicon: HALOT
  rationale: La preposición ב con דָּבָר indica base o acuerdo con una palabra/comando. «Conforme a la palabra de» comunica obediencia y adecuación, y suena natural en español bíblico moderno.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: which he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que había dicho
  lexicon: HALOT
  rationale: El relativo retoma la palabra de Gad. El pluscuamperfecto en español refleja que la palabra fue pronunciada antes de la acción de David.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - en el nombre de Yahvé
  - por el nombre de Yahvé
  lexicon: HALOT
  rationale: שֵׁם con ב expresa hablar o actuar bajo la autoridad de alguien. Se mantiene el nombre divino «Yahvé» según la norma del proyecto.
theological_decisions:
- issue: Renderizado de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrama. La política del proyecto pide transliterarlo como «Yahvé» en el texto principal para preservar el nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la palabra de Gad y la autoridad divina
  english_pob_reading: in the name of Yahweh
  chosen_spanish_reading: en nombre de Yahvé
  alternative_spanish_readings:
  - con la autoridad de Yahvé
  - por mandato de Yahvé
  rationale: La frase indica que la declaración de Gad estaba respaldada por la autoridad de Yahvé; «en nombre de Yahvé» preserva esa fuerza sin añadir una explicación interpretativa excesiva.
  doctrine_reference: HALOT s.v. שֵׁם; uso profético de la fórmula
translation_notes:
  revision_awareness: Corregido para anclar cada nota al texto mediante marcadores presentes en la traducción. Se mantiene la lectura fuente de 1 Crónicas 21:19 y se evita el traslado mecánico desde el inglés, usando el hebreo como base para las decisiones de «subió», «conforme a la palabra de» y «en nombre de Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Palabra de Gad» se conserva sin convertirla en paráfrasis interpretativa.
  - El orden español se ajusta para fluidez sin alterar la relación causal/obediencial del hebreo.
