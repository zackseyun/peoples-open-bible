  glossary_alignment: No hay conflictos con terminología teológica principal del proyecto. Las decisiones clave deben alinearse mejor con la amplitud semántica de נֵכָר y con la nota léxica sobre מִשְׁמָרוֹת. «Purifiqué» es aceptable para טהר en este contexto, aunque «limpié» o «purifiqué» ambos servirían.
