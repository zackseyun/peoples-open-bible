review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura y la imagen principal del hebreo: aguas que suben del norte, se convierten en torrente y desbordan la tierra, la ciudad y sus habitantes. También mantiene correctamente Yahvé para יְהוָה. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con la auditoría inglesa: falta la nota léxica sobre הָאָדָם como colectivo humano, y ''todo habitante de la tierra'' cambia הָאָרֶץ de ''la tierra/la tierra local'' a una formulación más global y menos alineada con la decisión auditada, que prefería ''la tierra'' en sentido local/oracular.'
  spanish_quality_summary: El español es en general claro y digno, pero requiere ajustes menores para mayor naturalidad y fidelidad. 'He aquí' funciona, aunque la nota [a] está mal anclada porque corresponde a 'la tierra y su plenitud', no a 'He aquí'. 'Aguas suben' es comprensible pero algo áspero; 'las aguas suben' suena más natural. 'Todo habitante de la tierra' conviene revisarse a 'todo habitante de la tierra' con nota contextual o mejor 'de la tierra' conservando la decisión, pero el problema principal es semántico, no estilístico.
  glossary_alignment: Alinea bien con los términos del proyecto en 'Yahvé'. No hay términos doctrinales conflictivos adicionales. Falta reflejar en nota la alternativa/colectivo de הָאָדָם, preservada en la POB inglesa. También conviene mantener la distinción contextual de אֶרֶץ como 'tierra'/'tierra local' según la decisión auditada.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'He aquí' pero su contenido corresponde a 'la tierra y su plenitud'.
    rationale: La instrucción exige que cada nota aparezca en el lugar relevante del texto. La nota léxica 'O la tierra y todo lo que la llena' explica אֶרֶץ וּמְלוֹאָהּ, no הִנֵּה.
  - severity: high
    issue: Falta la nota léxica sobre הָאָדָם como colectivo humano.
    rationale: La POB inglesa conserva esta información con una nota específica ('Hebrew man/mankind, used here collectively for humanity'). En español debe preservarse, porque 'los hombres' puede leerse de forma exclusivamente masculina sin aclaración.
  - severity: medium
    issue: '''todo habitante de la tierra'' no refleja suficientemente la decisión auditada de entender הָאָרֶץ como ''la tierra'' en sentido local/oracular, no ''toda la tierra/el mundo''.'
    rationale: Aunque 'tierra' puede funcionar, la formulación actual en español puede sonar más universal de lo que el inglés auditado quiso preservar. Conviene mantener la redacción pero ajustar la nota cultural o la formulación para no empujar hacia 'earth' global.
  - severity: low
    issue: '''aguas suben desde el norte'' suena algo poco natural en español.'
    rationale: El sentido es correcto, pero 'las aguas suben desde el norte' o 'aguas están subiendo desde el norte' fluye mejor sin perder literalidad.
  revised_spanish_text: 'Así dice Yahvé: He aquí, las aguas suben desde el norte, y llegarán a ser un torrente desbordado; inundarán la tierra y su plenitud[a], la ciudad y los que habitan en ella. Entonces los hombres[c] clamarán[b], y todo habitante de la tierra se lamentará.'
  revised_footnotes:
  - marker: a
    text: O 'la tierra y todo lo que la llena'.
    reason: lexical_alternative
  - marker: b
    text: La imagen es la de aguas de inundación procedentes del norte, probablemente símbolo de una fuerza invasora que viene de esa dirección.
    reason: cultural_note
  - marker: c
    text: Hebreo 'hombre' / 'humanidad', usado aquí colectivamente para la humanidad.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota léxica para que explique 'la tierra y su plenitud', se añadió la nota requerida sobre הָאָדָם como colectivo humano, y se suavizó ligeramente la sintaxis con 'las aguas suben'. Se mantuvo 'Yahvé', la metáfora de inundación y la estructura del versículo, sin expandir interpretativamente el texto principal.
