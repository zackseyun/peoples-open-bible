translation:
  language: es
  text: Y para los hijos de Aarón[a], los sacerdotes, en los pastizales[b] de sus ciudades, en cada ciudad[c], había hombres designados por sus nombres[d] para dar porciones a todo varón entre los sacerdotes y a todo el que estaba inscrito por genealogía entre los levitas[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''descendientes de Aarón''. El hebreo dice literalmente ''hijos de Aarón'', una expresión genealógica que puede abarcar a los descendientes posteriores.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''tierras comunes'' o ''terrenos abiertos'' de sus ciudades. El término se refiere al área que rodea las ciudades, a menudo usada como pasto.'
    reason: cultural_note
  - marker: c
    text: 'Hebreo: ''ciudad y ciudad'', un giro distributivo que significa ''cada una de las ciudades''.'
    reason: lexical_alternative
  - marker: d
    text: 'O: ''identificados por nombre'' o ''listados por nombre''. El hebreo indica hombres señalados de manera oficial.'
    reason: lexical_alternative
  - marker: e
    text: Es decir, los inscritos en los registros genealógicos entre los levitas.
    reason: cultural_note
lexical_decisions:
- source_word: וְלִבְנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: And for the sons of Aaron, the priests
  chosen_spanish: Y para los hijos de Aarón[a], los sacerdotes
  alternatives_spanish:
  - Y para los descendientes de Aarón, los sacerdotes
  - Y para los sacerdotes aarónicos
  lexicon: HALOT
  rationale: בני literalmente es 'hijos', pero en contextos genealógicos también puede significar 'descendientes'. 'Hijos de Aarón' conserva la forma hebrea y la apposición 'los sacerdotes' mantiene la identificación funcional del grupo.
- source_word: בִּשְׂדֵי מִגְרַשׁ עָרֵיהֶם
  english_pob_choice: in the pasture lands of their cities
  chosen_spanish: en los campos de pastoreo[b] de sus ciudades
  alternatives_spanish:
  - en los campos abiertos de sus ciudades
  - en las tierras de pasto de sus ciudades
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto o común alrededor de las ciudades levíticas, normalmente usado como pastizal. 'Campos de pastoreo' comunica bien ese uso sin perder la referencia al terreno contiguo a las ciudades.
- source_word: בְּכָל עִיר וָעִיר
  english_pob_choice: in every city
  chosen_spanish: en cada ciudad[c]
  alternatives_spanish:
  - en toda ciudad
  - en cada una de las ciudades
  lexicon: HALOT
  rationale: La repetición distributiva 'ciudad y ciudad' enfatiza totalidad. 'En cada ciudad' refleja esa distribución en español con naturalidad y sin exceder el matiz del hebreo.
- source_word: אֲנָשִׁים אֲשֶׁר נִקְּבוּ בְּשֵׁמוֹת
  english_pob_choice: there were men designated by name
  chosen_spanish: había hombres designados por nombre[d]
  alternatives_spanish:
  - había hombres señalados por nombre
  - había hombres nombrados explícitamente
  lexicon: HALOT
  rationale: נִקְּבוּ בְּשֵׁמוֹת expresa identificación oficial o registro nominativo. 'Designados por nombre' preserva el sentido administrativo sin reducirlo a mero listado.
- source_word: לָתֵת מָנוֹת
  english_pob_choice: to give portions
  chosen_spanish: para dar porciones
  alternatives_spanish:
  - para distribuir porciones
  - para dar raciones
  lexicon: HALOT
  rationale: מָנוֹת son porciones o repartos de provisiones. 'Dar porciones' sigue de cerca el valor del sustantivo y funciona con claridad en español.
- source_word: לְכָל זָכָר בַּכֹּהֲנִים
  english_pob_choice: to every male among the priests
  chosen_spanish: a todo varón entre los sacerdotes
  alternatives_spanish:
  - a todo macho entre los sacerdotes
  - a todo hombre entre los sacerdotes
  lexicon: HALOT
  rationale: זָכָר es específicamente 'varón' en sentido de sexo masculino. 'Varón' evita la ambigüedad de 'hombre' y mantiene el contraste de género del hebreo.
- source_word: וּלְכָל הִתְיַחֵשׂ בַּלְוִיִּם
  english_pob_choice: and to everyone enrolled by genealogy among the Levites
  chosen_spanish: y a todo el que estaba registrado por genealogía entre los levitas[e]
  alternatives_spanish:
  - y a todo el que figuraba por genealogía entre los levitas
  - y a todo el que estaba inscrito por genealogía entre los levitas
  lexicon: HALOT
  rationale: הִתְיַחֵשׂ alude a pertenencia establecida por registro genealógico. 'Registrado por genealogía' conserva la fuerza administrativa y genealógica del término sin forzar una equivalencia moderna demasiado específica.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó 'single' de 'every single city' para mantener un registro más formal y natural; la formulación española sigue esa línea con 'en cada ciudad', conservando el valor distributivo del hebreo sin intensificarlo innecesariamente. No se detectaron otras revisiones relevantes en el pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Hijos de Aarón'' se conserva por fidelidad genealógica, con aclaración en nota para la lectura descendencial.'
  - '''Varón'' traduce זָכָר para conservar la especificidad sexual del término hebreo.'
  - '''Porciones'' se usa de manera consistente para מָנוֹת en contexto de distribución de provisiones.'
  - '''Registrado por genealogía'' preserva el matiz administrativo-genealógico de הִתְיַחֵשׂ sin sustituirlo por un término eclesiástico moderno.'
