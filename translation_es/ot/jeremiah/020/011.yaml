translation:
  language: es
  text: Pero Yahvé está conmigo como un guerrero poderoso[a]; por tanto, mis perseguidores[b] tropezarán y no prevalecerán. Quedarán muy avergonzados, porque no han actuado sabiamente[c]; su vergüenza perpetua no será olvidada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como un guerrero poderoso, formidable».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que me persiguen».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque no han comprendido» / «porque no han actuado con discernimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: But Yahweh
  chosen_spanish: Pero Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: El waw inicial expresa contraste con el lamento previo, por eso «Pero» refleja bien la transición discursiva. El Tetragrámaton se conserva como «Yahvé» según el criterio del proyecto, evitando el reemplazo por un título genérico.
- source_word: אוֹתִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - me
  - está a mi lado
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente un objeto pronominal, el sentido en la cláusula es de presencia y apoyo divino; «está conmigo» / «conmigo» expresa esa relación de manera natural en español.
- source_word: כְגִבּוֹר עָרִיץ
  english_pob_choice: like a mighty warrior
  chosen_spanish: como un guerrero poderoso[a]
  alternatives_spanish:
  - como un guerrero formidable
  - como un guerrero terrible
  lexicon: HALOT
  rationale: גִּבּוֹר y עָרִיץ combinan fuerza y carácter imponente. «Guerrero poderoso» mantiene la imagen marcial con español claro; la nota [a] preserva la tensión léxica de «formidable/terrible» que el inglés audita.
- source_word: רֹדְפַי
  english_pob_choice: my persecutors
  chosen_spanish: mis perseguidores
  alternatives_spanish:
  - los que me persiguen
  - mis perseguidores/hostigadores
  lexicon: HALOT
  rationale: El hebreo puede ser «perseguidores» o «los que persiguen». En español, «perseguidores» conserva el doble valor de persecución hostil y seguimiento agresivo, sin perder la fuerza adversarial del contexto.
- source_word: יִכָּשְׁלוּ
  english_pob_choice: will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - vacilarán
  - caerán
  lexicon: HALOT
  rationale: El verbo comunica tropiezo/falla. «Tropezarán» conserva la metáfora corporal y funciona de forma natural en español bíblico contemporáneo.
- source_word: וְלֹא יֻכָלוּ
  english_pob_choice: and will not prevail
  chosen_spanish: y no prevalecerán
  alternatives_spanish:
  - y no podrán
  - y no tendrán éxito
  lexicon: HALOT
  rationale: Aunque la raíz significa «poder/ser capaces», el contexto de conflicto hace que el sentido sea de derrota. «Prevalecer» reproduce bien esa victoria/fracaso sin diluir la imagen.
- source_word: בֹּשׁוּ מְאֹד
  english_pob_choice: They will be utterly ashamed
  chosen_spanish: Serán avergonzados en gran manera
  alternatives_spanish:
  - Serán profundamente avergonzados
  - Quedarán muy avergonzados
  lexicon: HALOT
  rationale: בוש expresa vergüenza y humillación; מְאֹד intensifica. «En gran manera» conserva el énfasis semítico sin sonar artificial, y evita convertir la idea en una mera emoción privada.
- source_word: כִּי לֹא הִשְׂכִּילוּ
  english_pob_choice: because they have not acted wisely
  chosen_spanish: porque no han obrado con entendimiento[c][b]
  alternatives_spanish:
  - porque no han actuado con sabiduría
  - porque no han comprendido
  lexicon: HALOT
  rationale: El Hiphil de שׂכל puede expresar actuar con prudencia, inteligencia o entendimiento. «Obrar con entendimiento» conserva el matiz de discernimiento práctico y respeta la ambigüedad entre actuar y comprender.
- source_word: כְּלִמַּת עוֹלָם
  english_pob_choice: their everlasting disgrace
  chosen_spanish: su vergüenza perpetua
  alternatives_spanish:
  - su deshonra eterna
  - su oprobio perpetuo
  lexicon: HALOT
  rationale: כְּלִמָּה es vergüenza/deshonra y עוֹלָם indica duración permanente. «Vergüenza perpetua» suena idiomática y mantiene el peso duradero del hebreo.
- source_word: לֹא תִשָּׁכֵחַ
  english_pob_choice: will not be forgotten
  chosen_spanish: no será olvidada
  alternatives_spanish:
  - no quedará olvidada
  - no se olvidará
  lexicon: HALOT
  rationale: La forma pasiva/femenina se refiere a la vergüenza perpetua. «No será olvidada» respeta la referencia y la pasiva sin forzar un sujeto explícito innecesario.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton de forma directa; en el español del POB se conserva el nombre propio del pacto como «Yahvé», siguiendo la política del proyecto y evitando el ocultamiento litúrgico del nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de הִשְׂכִּילוּ en el motivo de la vergüenza
  english_pob_reading: because they have not acted wisely / because they have not understood
  chosen_spanish_reading: porque no han obrado con entendimiento
  alternative_spanish_readings:
  - porque no han actuado con sabiduría
  - porque no han comprendido
  rationale: La forma hebrea admite un campo semántico entre sabiduría práctica, comprensión e insight. Se eligió una formulación que no aplana la tensión entre conocer y actuar, y que permite conservar la ambigüedad documentada por el audit trail.
  doctrine_reference: HALOT שׂכל
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado sin cambios del pasaje en inglés (latest_revision_pass: unchanged=true), pero ajusta la formulación española para mantener el nombre divino como Yahvé y preservar las ambigüedades léxicas auditadas en el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, coherente con la terminología del proyecto en español.
  - Se evitó «SEÑOR» para no ocultar el nombre propio divino en este versículo.
  - «Perseguidores» conserva el posible matiz alternativo de «pursuers» señalado por la nota [b].
  - «Obrado con entendimiento» intenta reflejar tanto sabiduría práctica como comprensión, sin cerrar indebidamente el campo semántico de שׂכל.
  - La frase final se refiere a «su vergüenza perpetua» como antecedente de «no será olvidada», conforme a la gramática hebrea.
