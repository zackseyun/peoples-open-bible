  text: And it pleased the people to receive the men with honor[a], and to place a copy of their words in the public records of the people, so that the people of the Spartans might have a memorial of them[b]; and they wrote a copy of these things to Simon the high priest.
  footnotes:
  - marker: a
    text: Or 'the Spartan people.' The Greek literally reads 'the people of the Spartans.'
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'public records' is literally 'the books designated for the people,' referring to official civic archives or registers.
    reason: cultural_note
