  yaml_path: translation/deuterocanon/1_maccabees/007/033.yaml
  text: And after these words Nikanor went up to Mount Zion[a], and some of the priests came out from the holy place, and some of the elders of the people[b], to greet him peaceably and to show him the burnt offering that was being offered for the king.
  footnotes:
