revisions:
- from: Entonces el hombre que se acostó con ella dará a su padre[a] cincuenta siclos de plata, y ella será su esposa[b], por cuanto la humilló[c]. No podrá despedirla en todos sus días.
  to: Entonces el hombre que se acostó con ella dará al padre de la joven cincuenta siclos de plata, y ella será su esposa, porque la violó[a]. No podrá despedirla[b] todos sus días.
  rationale: Se revisa 'la humilló' a 'la violó[a]' para preservar mejor la gravedad sexual contextual que el audit trail inglés quiso comunicar con 'has violated her', dejando la alternativa más literal en nota. Se explicita 'al padre de la joven' por mayor precisión legal. Se cambia 'por cuanto' a 'porque' por claridad moderna sin pérdida causal. Se ajusta 'en todos sus días' a 'todos sus días' por mejor español. Se añade nota a 'despedirla[b]' para conservar la alternativa interpretativa documentada por el inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:28:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la estructura del hebreo y el rastro inglés: obligación de pago al padre de la joven, resultado matrimonial y prohibición de despedirla de por vida. Sin embargo, no preserva bien la decisión léxica principal sobre עִנָּהּ, donde el inglés auditado eligió ''has violated her'' para expresar la gravedad sexual del acto sin sobreespecificar. El español ''la humilló'' debilita demasiado el sentido contextual. También ''en todos sus días'' suena poco idiomático para כָּל יָמָיו.'
  spanish_quality_summary: 'El texto es legible, pero tiene algunos giros menos naturales o menos claros para español bíblico moderno: ''a su padre'' evita una repetición pero pierde precisión inmediata frente a ''al padre de la joven''; ''por cuanto'' es aceptable pero algo más arcaizante que necesario; ''en todos sus días'' suena forzado. ''Despedirla'' funciona, aunque ''echarla'' sería menos preciso y ''repudiarla'' más interpretativo; por tanto puede mantenerse.'
  glossary_alignment: 'No hay conflictos con los términos globales del proyecto. La principal desalineación es metodológica: el audit trail inglés documenta que עִנָּהּ aquí debe reflejar violación/agravio sexual con suficiente fuerza; por ello conviene ''la violó[a]'' o una formulación equivalente con nota. También conviene alinear la nota sobre ''send her away'' con el inglés mediante una nota para ''despedirla[b]'' = despedir/divorciar.'
  issues:
  - severity: high
    issue: עִנָּהּ se vierte como 'la humilló'
    rationale: Aunque es una opción más literal/tradicional, en español moderno minimiza la fuerza sexual del contexto y no sigue la rationale inglesa, que escogió 'has violated her' precisamente para evitar opacidad.
  - severity: medium
    issue: '''a su padre'' omite ''de la joven'' en el texto principal'
    rationale: El sentido puede inferirse, pero el hebreo expresa explícitamente 'al padre de la joven'. En un texto legal, la precisión inmediata es preferible a la elipsis.
  - severity: medium
    issue: '''en todos sus días'' es poco idiomático'
    rationale: Para כָּל יָמָיו, español natural y fiel sería 'todos sus días' o 'todos los días de su vida'.
  - severity: low
    issue: Falta nota sobre 'despedirla'
    rationale: El inglés preserva la alternativa interpretativa 'dismissing or divorcing her'. En español, una nota ayuda a evitar ambigüedad nueva.
  revised_spanish_text: Entonces el hombre que se acostó con ella dará al padre de la joven cincuenta siclos de plata, y ella será su esposa, porque la violó[a]. No podrá despedirla[b] todos sus días.
  revised_footnotes:
