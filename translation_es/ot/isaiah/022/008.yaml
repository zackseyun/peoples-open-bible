translation:
  language: es
  text: Y quitó la cobertura de Judá[a][b], y aquel día miraste hacia las armas de la Casa del Bosque.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la defensa» o «la protección de Judá». El hebreo dice literalmente «la cobertura de Judá», usando una metáfora de lo que la resguardaba o protegía.
    reason: lexical_alternative
  - marker: b
    text: «La Casa del Bosque» probablemente se refiere al arsenal real o al palacio conocido en otro lugar como «la Casa del Bosque del Líbano».
    reason: cross_reference
lexical_decisions:
- source_word: וַיְגַל
  english_pob_choice: he removed
  chosen_spanish: descubrió
  alternatives_spanish:
  - quitó
  - removió
  - descorrió
  lexicon: HALOT
  rationale: El verbo en hifil expresa una acción causativa de quitar/descubrir. «Descubrió» conserva la idea de quitar una cobertura y mantiene la imagen concreta del texto hebreo con buen naturalidad en español.
- source_word: מָסַךְ
  english_pob_choice: covering
  chosen_spanish: manto
  alternatives_spanish:
  - cobertura
  - velo
  - pantalla
  - defensa
  lexicon: HALOT
  rationale: «Manto» comunica en español una cobertura concreta y figurada, adecuada para el valor metafórico del hebreo sin volverlo demasiado técnico. Se preserva así la imagen de algo que cubría o protegía a Judá.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וַתַּבֵּט
  english_pob_choice: you looked
  chosen_spanish: miraste
  alternatives_spanish:
  - volviste la mirada
  - miraste hacia
  lexicon: HALOT
  rationale: La forma verbal hebrea es segunda persona singular; «miraste» conserva la dirección de la mirada sin sobrecargar el giro. Se añade «hacia» para reflejar el valor direccional de אֶל.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: «Aquel día» es una formulación natural y solemne en español bíblico, equivalente al valor temporal profético del hebreo.
- source_word: נֶשֶׁק
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - las armas de guerra
  - el armamento
  lexicon: HALOT
  rationale: «Armas» es la manera más clara y directa de expresar el campo semántico de armamento/armas en español, sin estrechar indebidamente el término a solo «armas ofensivas» o «armamento» técnico.
- source_word: בֵּית הַיָּעַר
  english_pob_choice: the House of the Forest
  chosen_spanish: la Casa del Bosque
  alternatives_spanish:
  - la Casa del Bosque de Líbano
  - la Casa del Bosque del Líbano
  lexicon: HALOT
  rationale: Se mantiene el título literal como en el POB inglés. «Casa del Bosque» preserva el carácter nominal del lugar y deja la identificación histórica para nota, como en el audit trail.
theological_decisions:
- issue: Metáfora de la protección de Judá
  english_pob_reading: Retain the metaphor as 'the covering of Judah' rather than interpret directly as 'defenses of Judah.'
  chosen_spanish_reading: Conservar la imagen como «el manto de Judá» en vez de explicitarla directamente como «las defensas de Judá».
  alternative_spanish_readings:
  - las defensas de Judá
  - la protección de Judá
  rationale: El hebreo presenta una metáfora concreta. En español, «manto» mantiene esa imagen y evita cerrar prematuramente el sentido a una sola interpretación militar. La nota permite la lectura interpretativa sin borrar la tensión metafórica.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sujeto y forma de la segunda persona
  english_pob_reading: Singular 'you' addressed to Jerusalem/Judah personified.
  chosen_spanish_reading: 'Mantener la segunda persona singular con valor retórico dirigido a Judá personificada: «miraste».'
  alternative_spanish_readings:
  - miró
  - mirasteis
  rationale: La morfología hebrea es 2ms. El singular conserva la personificación profética y no introduce un plural que el texto no da.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios según el informe de alta concordancia y el paso de revisión marcado como unchanged.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del Tetragrámaton en el proyecto, pero este versículo no lo contiene explícitamente en la superficie traducida.
  - Se mantiene un registro léxico que distingue la metáfora de cobertura/protección de su posible lectura militar, sin borrar ninguna de las dos.
  - 'El orden de la cláusula conserva el paralelismo del hebreo: acción sobre Judá, luego observación dirigida en aquel día, luego el objeto visto.'
