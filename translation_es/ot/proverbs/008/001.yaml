review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la pregunta retórica de הֲלֹא y los pares léxicos principales «sabiduría / entendimiento». Sin embargo, en תִּתֵּן קוֹלָהּ el español principal «da su voz» conserva demasiado la literalidad hebrea y no preserva bien el sentido idiomático que el propio rastro POB inglés resolvió como «raise her voice». Además, el orden «y da su voz el entendimiento» suena forzado en español y debilita la personificación poética.
  spanish_quality_summary: «¿No clama la sabiduría…?» es legible y digno, aunque «llama» también habría sido posible. El principal problema de calidad es «da su voz», que en español moderno suena poco natural y opaco. «Y el entendimiento alza su voz» comunica mejor el sentido, mantiene el paralelismo y sigue siendo claro y literario.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sabiduría» y «entendimiento» son adecuados. Conviene mantener la personificación femenina implícita mediante «su voz», sin capitalizar ni introducir una identificación teológica más fuerte.
  issues:
  - severity: medium
    issue: «da su voz» es un calco poco natural del hebreo
    rationale: Aunque refleja literalmente תִּתֵּן קוֹלָהּ, el propio análisis auditado indica que el modismo significa «alzar/levantar su voz» o «hablar en voz alta». En español bíblico legible, «da su voz» resulta extraño y menos fiel al sentido.
  - severity: low
    issue: Orden sintáctico forzado en la segunda cola
    rationale: «Y da su voz el entendimiento» suena invertido y menos natural en español contemporáneo. Reordenar a «y el entendimiento alza su voz» mejora fluidez sin perder paralelismo ni énfasis.
  - severity: low
    issue: La nota a sobrecarga la elección principal «clama»
    rationale: Si se conserva «clama», la nota puede mantenerse, pero la alternativa inglesa principal era «call». En español, «clama» es aceptable por el tono poético, así que no exige cambio, solo una redacción de nota natural.
  revised_spanish_text: ¿No clama la sabiduría[a], y el entendimiento alza su voz[b]?
  revised_footnotes:
  - marker: a
    text: O «llama», «grita» o «proclama» para «clama».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «da su voz»; el modismo hebreo significa «alza su voz» o «habla en voz alta».
    reason: lexical_alternative
  revision_rationale: Se mantiene «clama» como opción poética aceptable para תִקְרָא, pero se corrige «da su voz» a «alza su voz» para reflejar fielmente el sentido idiomático de תִּתֵּן קוֹלָהּ en un español natural y digno. También se ajusta el orden sintáctico para mejor legibilidad.
