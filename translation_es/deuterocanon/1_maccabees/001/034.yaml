translation:
  language: es
  text: Y pusieron allí a un pueblo pecador, hombres[a] sin ley; y se fortalecieron en ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'hombres' reproduce el masculino plural ἄνδρας; no se ha neutralizado a 'personas'.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: ''se hicieron fuertes en ella'' o ''se fortificaron en ella''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκαν
  english_pob_choice: stationed
  chosen_spanish: pusieron
  alternatives_spanish:
  - instalaron
  - establecieron
  - apostaron
  lexicon: LSJ
  rationale: El verbo griego básico es 'poner/colocar'. En español, 'pusieron' conserva ese valor sin introducir una imagen militar más específica de la que el griego exige. Dado que el audit trail inglés osciló entre 'stationed' y 'placed', el español mantiene la neutralidad semántica compatible con ambos.
- source_word: ἔθνος
  english_pob_choice: people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un grupo étnico
  - un pueblo extranjero
  lexicon: LSJ
  rationale: El contexto sugiere un cuerpo colectivo instalado allí. 'Pueblo' es la opción más natural en español y refleja el ajuste final del inglés hacia 'people', sin perder la referencia a un colectivo concreto. 'Nación' suena demasiado abstracto o moderno aquí.
- source_word: ἁμαρτωλὸν
  english_pob_choice: sinful
  chosen_spanish: pecador
  alternatives_spanish:
  - impío
  - malvado
  - lleno de pecado
  lexicon: LSJ
  rationale: Como adjetivo atributivo de ἔθνος, 'pecador' reproduce el valor moral básico de ἁμαρτωλός con un castellano claro. 'Impío' o 'malvado' desplazan el matiz; 'lleno de pecado' añade explicación no presente en el griego.
- source_word: ἄνδρας παρανόμους
  english_pob_choice: lawless men
  chosen_spanish: hombres sin ley
  alternatives_spanish:
  - hombres malvados
  - hombres contrarios a la ley
  - hombres ilegales
  lexicon: LSJ
  rationale: ἄνδρας exige el marcado masculino, y παρανόμους expresa oposición a la ley. 'Sin ley' mantiene la fuerza legal-moral y suena natural en español, evitando suavizarlo a 'personas' o expandirlo a una explicación interpretativa.
- source_word: ἐνίσχυσαν
  english_pob_choice: strengthened themselves
  chosen_spanish: se fortalecieron
  alternatives_spanish:
  - se hicieron fuertes
  - se fortificaron
  - ganaron fuerza
  lexicon: LSJ
  rationale: La forma verbal admite la idea de fortalecerse o consolidarse. 'Se fortalecieron' es la expresión española más directa y idiomática, manteniendo la reflexividad implícita del griego sin sobrecargar el verso con una lectura militar adicional.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - allí
  - en él
  - en esa ciudad
  lexicon: LSJ
  rationale: El pronombre femenino singular remite al referente femenino del contexto inmediato. 'En ella' conserva la referencia pronominal y evita especificar 'ciudad' o 'fortaleza' sin apoyo explícito del verso.
theological_decisions:
- issue: Mantener la doble caracterización moral y legal del grupo instalado
  english_pob_reading: Retain both as 'sinful' and 'lawless' without softening or expanding them.
  chosen_spanish_reading: Conservar 'pecador' y 'sin ley' sin atenuarlos ni convertirlos en un comentario explicativo.
  alternative_spanish_readings:
  - pueblo impío
  - hombres perversos
  - hombres hostiles a la ley
  rationale: El griego presenta una calificación moral ('pecador') y una legal ('sin ley') que conviene dejar visibles. El español mantiene esa tensión en lugar de resolverla en una sola etiqueta más general.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension rather than resolve it.'
- issue: Valor de ἄνδρας en español
  english_pob_reading: Translate as 'men' rather than a gender-neutral term.
  chosen_spanish_reading: Traducir como 'hombres' para reflejar el masculino explícito del griego.
  alternative_spanish_readings:
  - gente
  - personas
  rationale: ἄνδρας es masculino plural; mantener 'hombres' conserva la forma marcada del original y evita neutralizar un dato gramatical relevante.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: El texto griego base de Swete coincide de manera alta con el audit trail inglés. El inglés pasó de 'nation' a 'people' para ἔθνος; en español se eligió 'pueblo', que conserva el valor colectivo sin sonar demasiado técnico. Se mantuvieron las calificaciones morales y legales sin suavizarlas, y se evitó introducir un término militar más fuerte que el griego no exige explícitamente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se conserva la distinción entre el colectivo ('pueblo') y los 'hombres' masculinos del segundo miembro.
  - '''Sin ley'' mantiene el force jurídico-moral de παρανόμους sin convertirlo en una explicación doctrinal.'
  - La referencia pronominal 'en ella' preserva la ambigüedad contextual del antecedente femenino sin sobreespecificarlo.
