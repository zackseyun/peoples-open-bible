    rationale: En este contexto profético y de pacto, el hebreo «oír la voz» implica obedecer. La auditoría inglesa eligió deliberadamente «you have not obeyed my voice». En español, «no has obedecido mi voz» preserva mejor esa fuerza.
  - severity: low
