translation:
  language: es
  text: Lamento[a] haber hecho rey a Saúl, porque ha dejado de seguirme[b] y no ha cumplido[c] mis palabras. Y Samuel ardió de ira[d], y clamó a Yahvé toda la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «me arrepiento» o «me pesa»; el hebreo expresa pesar o duelo por la coronación de Saúl.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «se ha vuelto de detrás de mí», un modismo para apartarse de seguir a Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O, «no ha obedecido mis palabras» o «no las ha puesto en práctica».
    reason: lexical_alternative
  - marker: d
    text: 'Modismo hebreo: «Samuel ardió de ira». En el contexto también puede entenderse como dolor o profunda desaprobación.'
    reason: alternative_reading
lexical_decisions:
- source_word: נִחַמְתִּי
  english_pob_choice: I regret
  chosen_spanish: Lamento
  alternatives_spanish:
  - Me arrepiento
  - Me duele
  - Me pesa
  lexicon: HALOT
  rationale: El perfecto nifal de נחם aquí expresa duelo, pesar o arrepentimiento divino. En español, «lamento» comunica bien esa carga afectiva sin sugerir pecado en Dios; «me arrepiento» puede sonar más moral o humano, y «me pesa» suena menos natural en este contexto.
- source_word: הִמְלַכְתִּי אֶת־שָׁאוּל לְמֶלֶךְ
  english_pob_choice: I made Saul king
  chosen_spanish: haber hecho rey a Saúl
  alternatives_spanish:
  - haber nombrado rey a Saúl
  - haber puesto a Saúl como rey
  - haber establecido a Saúl como rey
  lexicon: HALOT
  rationale: El causativo de מלך con לְמֶלֶךְ indica instalar a alguien como rey. «Hacer rey» conserva la fuerza del verbo y suena natural en español; «nombrado rey» sería más explícito pero algo más interpretativo.
- source_word: שָׁב מֵאַחֲרַי
  english_pob_choice: he has turned back from following me
  chosen_spanish: se ha vuelto de seguirme
  alternatives_spanish:
  - se ha apartado de seguirme
  - se ha vuelto atrás de mí
  - ha dejado de seguirme
  lexicon: HALOT
  rationale: La expresión idiomática hebrea sugiere apartarse del seguimiento leal. «Se ha vuelto de seguirme» mantiene la imagen verbal y la idea de deslealtad; «ha dejado de seguirme» es más llano, pero suaviza el giro idiomático.
- source_word: וְאֶת־דְּבָרַי לֹא הֵקִים
  english_pob_choice: and has not carried out my words
  chosen_spanish: y no ha cumplido mis palabras
  alternatives_spanish:
  - y no ha puesto en práctica mis palabras
  - y no ha obedecido mis palabras
  - y no ha realizado mis palabras
  lexicon: HALOT
  rationale: הקים con «palabras» significa darles efecto, confirmarlas mediante la acción. «Cumplido» transmite bien la idea de ejecutar lo mandado sin perder la relación entre palabra y acción; «obedecido» es posible, pero convierte el énfasis en una formulación más general.
- source_word: וַיִּחַר לִשְׁמוּאֵל
  english_pob_choice: Samuel burned with anger
  chosen_spanish: Samuel ardió de ira
  alternatives_spanish:
  - Samuel se enfureció
  - Samuel se indignó
  - Samuel ardió de enojo
  lexicon: HALOT
  rationale: La locución חרה ל expresa literalmente encenderse/arder de ira. «Ardió de ira» conserva el hebraísmo y la intensidad; «se indignó» o «se enfureció» son más idiomáticos, pero menos cercanos a la imagen original.
- source_word: וַיִּזְעַק אֶל־יְהוָה
  english_pob_choice: he cried out to Yahweh
  chosen_spanish: clamó a Yahvé
  alternatives_spanish:
  - gritó a Yahvé
  - invocó a Yahvé
  - clamó ante Yahvé
  lexicon: HALOT
  rationale: זעק denota un clamor fuerte y urgente. «Clamó» es la opción española más digna y fiel a ese tono; «invocó» es posible, pero no comunica tan bien la urgencia emocional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino tal como exige la política terminológica del proyecto. «Yahvé» mantiene la transliteración del Tetragrámaton y evita la sustitución por un título.
- source_word: כָּל הַלַּיְלָה
  english_pob_choice: all night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - la noche entera
  - durante toda la noche
  lexicon: HALOT
  rationale: La locución temporal es idiomática y se expresa naturalmente en español con «toda la noche».
theological_decisions:
- issue: La expresión divina נִחַמְתִּי aplicada a Yahvé
  english_pob_reading: I regret
  chosen_spanish_reading: Lamento
  alternative_spanish_readings:
  - Me arrepiento
  - Me pesa
  - Siento pesar
  rationale: 'La traducción conserva la tensión antropopática del texto: Yahvé expresa dolor o pesar por la coronación de Saúl, sin sugerir cambio moral ni error en Dios. «Lamento» comunica esa respuesta afectiva de manera sobria y clara.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: El matiz de וַיִּחַר לִשְׁמוּאֵל
  english_pob_reading: Samuel burned with anger
  chosen_spanish_reading: Samuel ardió de ira
  alternative_spanish_readings:
  - Samuel se entristeció
  - Samuel se indignó
  - Samuel sintió profundo disgusto
  rationale: El hebreo favorece el sentido de ira encendida, aunque el contexto narrativo también deja ver dolor o disgusto profundo. Se mantiene la imagen lexical fuerte en el texto principal y se deja abierta la tensión contextual.
  doctrine_reference: Translation philosophy §1 y §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que no introdujo cambios adicionales y confirmó el alto grado de acuerdo con el texto base. También se mantuvo la decisión del POB inglés de preservar el valor idiomático y la tensión teológica del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se prefirió «clamó» para conservar el tono fuerte de זעק.
  - Se mantuvo una sintaxis fluida y bíblica sin calcar de manera rígida el orden hebreo.
  - Se conservaron notas donde el español podría suavizar o desdibujar el hebraísmo original.
