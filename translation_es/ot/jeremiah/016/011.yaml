translation:
  language: es
  text: 'Entonces les dirás: «Porque sus padres[a] me abandonaron, declara Yahvé, y fueron tras otros dioses, y les sirvieron, y se postraron ante ellos; pero a mí me abandonaron, y no guardaron mi ley[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus antepasados». El hebreo dice literalmente «sus padres».
    reason: lexical_alternative
  - marker: b
    text: O «mi instrucción». El hebreo torá puede significar «ley» o «instrucción», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: Then you shall say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Y dirás
  - Luego dirás
  lexicon: HALOT
  rationale: La forma con waw consecutiva en contexto profético funciona como instrucción secuencial. «Entonces dirás» conserva el valor discursivo y suena natural en español.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición simple de dirección/comunicación se expresa de manera directa con «a ellos».
- source_word: עַל אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Por cuanto
  lexicon: HALOT
  rationale: La construcción introduce la causa del reproche/juicio. «Porque» es la equivalencia causal más natural en español y conserva la relación explicativa.
- source_word: עָזְבוּ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  - desertaron
  lexicon: HALOT
  rationale: El verbo tiene fuerza de ruptura de alianza. «Abandonaron» comunica esa carga sin arcaísmo.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus progenitores
  lexicon: HALOT
  rationale: El hebreo es literalmente «sus padres»; en español puede leerse como antepasados, pero la forma básica mantiene la correspondencia léxica. Se mantiene la referencia masculina/plural del texto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» y la fórmula profética solemne con «declara», que reproduce bien la fuerza de נְאֻם.
- source_word: וַיֵּלְכוּ אַחֲרֵי
  english_pob_choice: went after
  chosen_spanish: fueron tras
  alternatives_spanish:
  - siguieron tras
  - anduvieron detrás de
  lexicon: HALOT
  rationale: El hebreo expresa persecución/alineación en lealtad. «Fueron tras» mantiene el giro idiomático sin volverlo demasiado literal.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros ídolos
  lexicon: HALOT
  rationale: La expresión es directa y estándar; «otros dioses» preserva la oposición teológica al Dios de Israel.
- source_word: וַיַּעַבְדוּם
  english_pob_choice: served them
  chosen_spanish: les sirvieron
  alternatives_spanish:
  - los sirvieron
  - los adoraron
  lexicon: HALOT
  rationale: Se mantiene la distinción entre servir y postrarse. En español, el dativo «les» suena natural y conserva el matiz de servicio cultual/político.
- source_word: וַיִּשְׁתַּחֲוּוּ לָהֶם
  english_pob_choice: bowed down to them
  chosen_spanish: se inclinaron ante ellos
  alternatives_spanish:
  - se postraron ante ellos
  - los adoraron
  lexicon: HALOT
  rationale: El verbo denota postración física/cultual. «Se inclinaron ante ellos» preserva la imagen corporal sin confundirla con el verbo anterior «servir».
- source_word: וְאֹתִי
  english_pob_choice: But me
  chosen_spanish: pero a mí
  alternatives_spanish:
  - y a mí
  - sin embargo, a mí
  lexicon: HALOT
  rationale: El objeto frontalizado es enfático. El contraste se expresa de forma clara con «pero a mí».
- source_word: תּוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi enseñanza
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «instrucción», en contexto pactual profético «ley» es el equivalente más reconocido y fiel. Se evita borrar la fuerza normativa del término.
- source_word: לֹא שָׁמָרוּ
  english_pob_choice: they did not keep
  chosen_spanish: no guardaron
  alternatives_spanish:
  - no observaron
  - no cumplieron
  lexicon: HALOT
  rationale: שׁמר con תורה suele significar guardar/observar. «No guardaron» conserva la imagen de custodia y obediencia pactal.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - dice Yahvé
  rationale: Se sigue la convención del proyecto de transliterar el nombre divino como «Yahvé», en lugar de sustituirlo por un título. La fórmula profética se mantiene con «declara», que transmite la solemnidad de נְאֻם.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Matiz de תּוֹרָה
  english_pob_reading: my law / my instruction
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  - mi enseñanza
  rationale: En este contexto de rebeldía pactal, «ley» conserva mejor el peso normativo y la relación de obediencia/infidelidad. No se elimina la posible amplitud de «instrucción», pero la lectura principal debe reflejar el carácter vinculante del término.
  doctrine_reference: HALOT; contexto profético-pactual de Jeremías
- issue: Distinción entre servir y postrarse
  english_pob_reading: served them, and bowed down to them
  chosen_spanish_reading: les sirvieron, y se inclinaron ante ellos
  alternative_spanish_readings:
  - los adoraron y se postraron ante ellos
  - les rindieron culto y se postraron
  rationale: 'Se conserva la distinción semántica entre עבד y השתחוה: primero servicio/lealtad, luego postración cultual. Esto evita fusionar dos acciones distintas del texto hebreo.'
  doctrine_reference: HALOT; sintaxis y paralelismo hebreos
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail en cuanto a la estructura continua de una sola oración y la puntuación interna: se conserva el flujo único del hebreo con una pausa fuerte tras «ante ellos» mediante punto y coma, sin introducir ruptura innecesaria. También se mantiene la distinción semántica entre «servir» y «inclinarse», y la forma reverente del nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «Cristo» y «SEÑOR» porque el versículo no contiene ni exige esos sustitutos.
  - Se preservó la diferencia entre «servir» y «inclinarse» para no borrar un paralelismo importante del hebreo.
  - «Ley» se eligió como traducción principal de תּוֹרָה por el contexto pactual; la nota mantiene la alternativa «instrucción».
  - El español mantiene un tono bíblico sobrio y moderno, sin arcaísmos innecesarios.
