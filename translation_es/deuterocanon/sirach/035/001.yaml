translation:
  language: es
  text: Si te nombran líder, no te exaltes; sé entre ellos como uno de ellos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo suministrado para esta referencia dice: «Sálvanos, Dios de todos, y pon tu temor sobre todas las naciones». Como esa lectura no coincide con el griego asociado con Sirácides 35:1, la traducción principal sigue aquí el griego y deja constancia abierta de la discrepancia.'
    reason: textual_variant
lexical_decisions:
- source_word: Ἡγούμενόν
  english_pob_choice: leader
  chosen_spanish: Líder
  alternatives_spanish:
  - gobernante
  - jefe
  - guía
  lexicon: BDAG
  rationale: ἡγούμενος designa a quien conduce o está al frente. «Líder» comunica bien la idea de dirección sin cargar el texto con una oficina política más específica de lo que exige el griego.
- source_word: κατέστησαν
  english_pob_choice: they made
  chosen_spanish: te hicieron
  alternatives_spanish:
  - te nombraron
  - te establecieron
  - te pusieron
  lexicon: BDAG
  rationale: El verbo expresa establecimiento o nombramiento en una función. En español, «te hicieron» mantiene el sujeto plural implícito y suena natural, mientras conserva la idea de que otros te colocaron en esa posición.
- source_word: μὴ ἐπαίρου
  english_pob_choice: do not exalt yourself
  chosen_spanish: no te engrías
  alternatives_spanish:
  - no te enaltezcas
  - no te exaltes
  - no te pongas orgulloso
  lexicon: BDAG
  rationale: El imperativo apunta a la autoexaltación. «No te engrías» preserva la fuerza moral y evita reducirlo solo a un sentimiento interno de orgullo.
- source_word: γίνου
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - hazte
  - llega a ser
  lexicon: BDAG
  rationale: En este mandato exhortativo, «sé» es la forma más directa y natural en español.
- source_word: ὡς εἷς ἐξ αὐτῶν
  english_pob_choice: as one of them
  chosen_spanish: como uno de ellos
  alternatives_spanish:
  - como uno entre ellos
  - como uno más de ellos
  lexicon: BDAG
  rationale: La expresión subraya humildad e identificación con el grupo. «Como uno de ellos» es idiomático y conserva la comparación sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Selección de la base textual ante el desajuste hebreo-griego
  english_pob_reading: The Greek parallel text is translated as the main verse, while the supplied Hebrew is documented as a mismatch.
  chosen_spanish_reading: Se traduce el griego paralelo como base principal, y la discrepancia textual se anota abiertamente.
  alternative_spanish_readings:
  - «Sálvanos, Dios de todos, y pon tu temor sobre todas las naciones.»
  rationale: El hebreo suministrado no corresponde al griego de Sirácides 35:1. Para mantener fidelidad al versículo referenciado, el texto principal sigue el griego; la variante hebrea se reconoce como problema de fuente en la nota.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original con documentación honesta de variantes y discrepancias'
translation_notes:
  revision_awareness: La versión previa fue corregida para evitar seguir una línea hebrea no coincidente con el griego asociado a Sirácides 35:1. El texto español actual refleja el paralelo griego y documenta la variante hebrea sin ocultarla.
  spanish_consistency_notes:
  - Se mantiene «Líder» para Ἡγούμενόν, en continuidad con la decisión inglesa de no sobrerrepresentar un cargo político formal.
  - «No te engrías» conserva el sentido reflexivo de autoexaltación.
  - «Como uno de ellos» preserva la llamada a la solidaridad y la humildad.
  - La nota a pie de página está anclada en la palabra «Líder[a]» para cumplir la trazabilidad textual.
