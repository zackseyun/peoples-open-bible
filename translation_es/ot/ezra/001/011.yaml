    text: O «vasijas» o «utensilios» para «artículos». El término hebreo puede referirse ampliamente a objetos, vasijas o utensilios, especialmente objetos del templo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa «subir / hacer subir» dos veces en este versículo, reflejando la expresión habitual de subir a Jerusalén.
    reason: cultural_note
  - marker: c
    text: O «la comunidad del exilio» o «los deportados» para «los exiliados».
    reason: lexical_alternative
  revision_rationale: La revisión conserva mejor la evidencia hebrea y la decisión auditada del POB inglés al mantener 'subió / fueron subidos' en el texto principal, en vez de aplanarlo a 'trajo'. También mejora la naturalidad del español con 'sumaron ... en total' y reorganiza las notas para que cada marcador esté anclado en la palabra o frase pertinente. Se preservan las alternativas léxicas documentadas para כֵּלִים y הַגּוֹלָה.
