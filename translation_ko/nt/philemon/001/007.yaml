id: PHM.1.7
reference: Philemon 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀χαρὰν γὰρ ⸂πολλὴν ἔσχον⸃ καὶ παράκλησιν ἐπὶ τῇ ἀγάπῃ σου, ὅτι τὰ σπλάγχνα τῶν ἁγίων ἀναπέπαυται διὰ σοῦ, ἀδελφέ.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/007.yaml
  text: For I had much joy and encouragement because of your love[a], because the hearts of the saints have been refreshed through you, brother.
  footnotes:
  - marker: a
    text: Or more literally, 'the inner affections' of the saints.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제여, 그대의 사랑으로 인해 내가 큰 기쁨과 위로를 얻었습니다. 성도들의 마음[a]이 그대로 말미암아 새 힘을 얻었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 더 직역하면 「성도들의 내장(內臟)」, 곧 깊은 정과 속사람을 가리키는 관용어. 한국어에서는 「마음」이 그 정서적 무게를 가장 자연스럽게 담아낸다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαρὰν
  english_pob_choice: joy
  chosen_korean: 기쁨
  alternatives_korean:
  - 즐거움
  lexicon: BDAG
  rationale: χαρά의 표준 한국어 등가어.
- source_word: πολλὴν ἔσχον
  english_pob_choice: I had much
  chosen_korean: 큰 ... 얻었습니다
  alternatives_korean:
  - 많은 ... 가졌습니다
  - 큰 ... 누렸습니다
  lexicon: BDAG
  rationale: πολλήν + ἔσχον의 부정과거를 합쇼체 종결로 옮기되, 「기쁨과 위로를 얻었다」는 한국어의 자연스러운 정서적 동사 결합을 살린다. πολλήν은 「큰」이 「많은」보다 정서 명사와 자연스럽게 어울린다.
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_korean: 위로
  alternatives_korean:
  - 격려
  - 위안
  lexicon: BDAG
  rationale: παράκλησις는 격려·위로·위안을 함께 담는다. 본 문맥에서 빌레몬의 사랑이 바울에게 가져다준 감정은 단순한 「격려」 이상의 따뜻한 「위로」가 잘 맞는다.
- source_word: ἐπὶ τῇ ἀγάπῃ σου
  english_pob_choice: because of your love
  chosen_korean: 그대의 사랑으로 인해
  alternatives_korean:
  - 그대의 사랑 때문에
  - 그대의 사랑에 대해
  lexicon: BDAG
  rationale: ἐπί + 여격은 여기서 인과적 근거를 가리킨다. 「~으로 인해」가 자연스럽다.
- source_word: σπλάγχνα
  english_pob_choice: hearts
  chosen_korean: 마음
  alternatives_korean:
  - 속사람
  - 깊은 정
  - 내장
  lexicon: BDAG
  rationale: σπλάγχνα는 문자적으로 내장(內臟)이지만 관용적으로 깊은 정·속사람을 가리킨다. 한국어 「마음」이 그 정서적 무게를 자연스럽게 담아내며, 직역은 각주에 둔다.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_korean: 성도들의
  lexicon: BDAG
  rationale: 바울 정형의 기본값.
- source_word: ἀναπέπαυται
  english_pob_choice: have been refreshed
  chosen_korean: 새 힘을 얻었기 때문입니다
  alternatives_korean:
  - 안식을 얻었다
  - 쉼을 얻었다
  lexicon: BDAG
  rationale: 현재완료. 빌레몬의 행위로 성도들이 지속적인 상태에 이른 것을 가리킨다. 「새 힘을 얻었다」가 정서적 회복·재충전의 느낌을 자연스럽게 살리며, 단순한 「쉼」보다 빌레몬서 후반의 ἀνάπαυσον(1:20) 호응과도 맞아떨어진다.
- source_word: διὰ σοῦ
  english_pob_choice: through you
  chosen_korean: 그대로 말미암아
  alternatives_korean:
  - 그대를 통해
  - 그대 덕분에
  lexicon: BDAG
  rationale: διά + 속격의 도구·매개 의미. 「~로 말미암아」가 무게 있는 합쇼체 산문에 잘 맞는다.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_korean: 형제여
  alternatives_korean:
  - 형제님
  lexicon: BDAG
  rationale: 호격 ἀδελφέ. 한국어 호격은 「~여」가 합쇼체의 격식 있는 정서적 호명에 맞다. 「형제님」은 다소 사무적으로 들린다.
theological_decisions:
- issue: σπλάγχνα를 「마음」으로 옮김
  chosen_reading: 마음
  alternative_readings:
  - 속사람
  - 깊은 정
  rationale: 헬라어 관용어는 깊은 정·속사람을 가리키며, 한국어 「마음」이 가장 자연스러운 등가어이다. 직역은 각주에 둔다.
  doctrine_reference: 'Translation philosophy #6: 현대 한국어로 읽기 쉽되 정중하게'
