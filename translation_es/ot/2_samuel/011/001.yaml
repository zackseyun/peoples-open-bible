translation:
  language: es
  text: Al volver el año[a], al tiempo en que los reyes salen a la guerra, David envió a Joab, a sus siervos con él y a todo Israel. Devastaron a los amonitas y sitiaron a Rabá[b], pero David permaneció en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘al giro/retorno del año’, probablemente una referencia a la temporada primaveral de campañas militares.'
    reason: cultural_note
  - marker: b
    text: 'O: ‘al tiempo en que salen los mensajeros’. El contexto favorece con fuerza la lectura ‘los reyes salen a la guerra’.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִתְשׁוּבַת הַשָּׁנָה
  english_pob_choice: at the turn of the year
  chosen_spanish: al dar la vuelta del año
  alternatives_spanish:
  - en la vuelta del año
  - al retorno del año
  - en la primavera del año
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude al ‘giro/retorno’ del año. ‘Al dar la vuelta del año’ conserva el valor temporal figurado sin imponer de entrada una estación específica. ‘En la primavera del año’ es posible por contexto, pero es más interpretativa que el hebreo mismo.
- source_word: לְעֵת צֵאת הַמְּלָאכִים
  english_pob_choice: at the time when kings go out to battle
  chosen_spanish: al tiempo en que los reyes salen a la guerra
  alternatives_spanish:
  - al tiempo en que salen los reyes
  - al tiempo en que salen los mensajeros
  - al tiempo de la salida de los reyes
  lexicon: HALOT
  rationale: La lectura contextual favorece ‘reyes’ frente a ‘mensajeros’, por el marco militar y la costumbre estacional de las campañas. En español, ‘salen a la guerra’ explicita la fuerza militar implícita en el contexto, manteniendo el sentido del audit trail inglés sin depender de una traducción mecánica.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo שלח en narrativa se traduce naturalmente como ‘enviar’. ‘Envió’ es la forma más directa y sobria en español.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus servidores reales
  - a sus hombres
  lexicon: HALOT
  rationale: POB conserva la fuerza léxica de עבד con ‘servants’. En español, ‘siervos’ mantiene esa relación de dependencia y evita suavizar el término hacia ‘hombres’ o ‘oficiales’. Aunque ‘siervo’ puede sonar más religioso en algunos contextos, aquí sigue siendo el equivalente más fiel al valor servil/administrativo del hebreo.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a todo el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘todo Israel’. ‘A todo Israel’ conserva la amplitud nacional del sujeto sin restringirlo a un cuerpo militar específico, aunque el contexto lo entienda así.
- source_word: וַיַּשְׁחִתוּ
  english_pob_choice: devastated
  chosen_spanish: devastaron
  alternatives_spanish:
  - destruyeron
  - asolaron
  - arrasaron
  lexicon: HALOT
  rationale: El verbo de שׁחת en causativo comunica acción destructiva en contexto bélico. ‘Devastaron’ reproduce bien la intensidad sin sugerir necesariamente aniquilación total, algo coherente con que luego continúa el asedio.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: a los amonitas
  alternatives_spanish:
  - a los hijos de Amón
  - a los descendientes de Amón
  lexicon: HALOT
  rationale: ‘Amonitas’ es la forma idiomática natural en español para el etnónimo. ‘Hijos de Amón’ sería más literal, pero menos fluida y menos reconocible para lectores actuales.
- source_word: וַיָּצֻרוּ עַל רַבָּה
  english_pob_choice: besieged Rabbah
  chosen_spanish: sitiaron a Rabá
  alternatives_spanish:
  - asediaron a Rabá
  - pusieron sitio a Rabá
  lexicon: HALOT
  rationale: צור con על expresa el sitio de una ciudad. ‘Sitiaron’ es preciso, conciso y plenamente natural en español bíblico contemporáneo.
- source_word: יוֹשֵׁב
  english_pob_choice: remained
  chosen_spanish: permanecía
  alternatives_spanish:
  - estaba quedándose
  - estaba en permanencia
  - se quedó
  lexicon: HALOT
  rationale: 'El participio literalmente significa ‘sentado/dwelling’, pero aquí tiene valor narrativo contrastivo: David no salió con el ejército. ‘Permanecía’ conserva ese estado continuo y sugiere la permanencia en Jerusalén sin exagerar el matiz.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar y transparente en español.
theological_decisions:
- issue: Lectura de לְעֵת צֵאת הַמְּלָאכִים
  english_pob_reading: when kings go out to battle
  chosen_spanish_reading: al tiempo en que los reyes salen a la guerra
  alternative_spanish_readings:
  - al tiempo en que salen los mensajeros
  rationale: 'No es una cuestión doctrinal central, pero sí una decisión interpretativa relevante. La sintaxis y el contexto militar favorecen ‘reyes’ frente a ‘mensajeros’. La formulación elegida también conserva la ironía narrativa: David no hizo lo que normalmente hacen los reyes en esa estación.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente sin cambios sustantivos respecto al audit trail inglés; se mantiene la preferencia por una equivalencia óptima que preserve el giro temporal idiomático, la lectura militar de ‘reyes’ y la fuerza narrativa de ‘devastaron/sitiaron’, sin suavizar el contraste final entre el rey y su ejército.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene ‘amonitas’ para el etnónimo y ‘Rabá’ como topónimo, siguiendo el uso bíblico habitual en español.
  - ‘Siervos’ se conserva por fidelidad léxica a עבד, evitando una domesticación a ‘oficiales’ o ‘hombres’.
  - ‘Permanecía’ conserva el valor aspectual del participio hebreo mejor que un simple pasado puntual.
