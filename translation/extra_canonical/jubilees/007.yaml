translation:
  text: '1[a]. And in the seventh week, in its first year, in this jubilee, Noah planted a vine on the mountain on which the ark had come to rest, whose name was Lubar, one of the mountains of Ararat; and in the fourth year it produced fruit.

    2. And he guarded its fruit, and gathered it in that year, in the seventh month. And he made wine from it, and put it into a vessel, and kept it until the fifth year, until the first day, on the first month.

    3. And on that day he made a feast with rejoicing, and he made a burnt offering to the LORD: one young ox, one ram, seven sheep, and one kid of the goats[b], so that he might make atonement for himself and for his sons.

    4. And he prepared the kid first, and placed some of its blood on the flesh that was on the altar which he had made; and all the fat he caused to ascend on the altar where he made the burnt offering, and the ox and the ram and the sheep.

    5. And he caused all their flesh to ascend on the altar, and he placed all their offering mixed with oil upon it, and afterward he poured wine into the fire that was on the altar, and put frankincense on the altar, and caused a pleasing fragrance to ascend, acceptable before the LORD his God.

    6. And he rejoiced and drank some of this wine, he and his sons with joy. And it became evening, and he went into his tent, and being drunk he lay down and slept, and he was uncovered inside his tent while he slept.

    7. And Ham saw Noah his father naked, and he went out and told his two brothers outside.

    8. And Shem took a garment, and he and Japheth took it and laid the garment on their shoulders, and going backward they covered the shame of their father, and their faces were turned backward.

    9. And Noah awoke from his wine and knew everything that his youngest son had done to him, and he cursed his son and said, “Cursed be Canaan; a lowly slave shall he be to his brothers.”

    10. And he blessed Shem and said, “Blessed be the LORD, the God of Shem; and let Canaan be his slave.

    11. May the LORD enlarge Japheth, and may the LORD dwell in the dwellings of Shem; and let Canaan be his slave.”

    12. And Ham knew that his father had cursed his youngest son, and it displeased him that he had cursed his son; and he separated from his father, he and his sons with him: Cush and Mizraim and Put and Canaan.

    13. And he built for himself a city and called its name after the name of his wife, Ne''elatama''uk.

    14. And Japheth saw it and became jealous of his brother, and he too built for himself a city and called its name after the name of his wife, Adataneses.

    15. But Shem remained with his father Noah, and he built a city near his father, by the mountain, and he called its name after the name of his wife, Sedeqetelebab.

    16. And behold, these three cities are near Mount Lubar: Sedeqetelebab in front of the mountain toward its east, Ne''elatama''uk toward the north, and Adataneses toward the sea.

    17. And these are the sons of Shem: Elam and Asshur and Arpachshad—this generation was born two years after the flood—and Lud and Aram.

    18. The sons of Japheth were Gomer and Magog and Madai and Javan, Tubal and Meshech and Tiras.

    19. These are the sons of Noah. And in the twenty-eighth jubilee Noah began to command the ordinances and the commandments to his sons'' sons, and all the judgments that he knew; and he testified to his sons that they should do righteousness, and that they should cover the shame of their flesh, and that they should bless their Creator, and honor father and mother, and each one love his neighbor, and guard themselves from fornication and uncleanness and all injustice.

    20. For because of these three the flood came upon the earth: because of the fornication by which the Watchers acted against the command of their ordinances, after the daughters of men, and took for themselves wives from all whom they chose, and they made the beginning of uncleanness.

    21. And they bore the Naphidim, and they were all unlike one another, and they devoured one another; and the giant killed the Naphil, and the Naphil killed the Elyo, and the Elyo mankind, and a man his neighbor.

    22. And everyone sold himself to work injustice and to pour out much blood.

    23. And the earth was filled with injustice. And after this they sinned against the beasts and the birds and everything that moves and everything that walks on the earth, and much blood was poured out on the earth.

    24. And every imagination and desire of man imagined vanity and evil continually. And the LORD destroyed everything from the face of the earth because of the wickedness of their deeds and because of the blood that they had poured out in the midst of the earth; he destroyed everything.

    25. And only I and you, my sons, and everything that entered with us into the ark were left. And behold, I see your works before me, that you do not walk in righteousness; for in the path of destruction you have begun to walk, and you are separating one from another, and are jealous one against another, and so you are not united, my sons, each with his brother.

    26. For I see, and behold, the demons have begun to lead you and your children astray; and now I fear for you, lest after my death you shed the blood of men on the earth, and you also be destroyed from the face of the earth.

    27. For everyone who sheds the blood of man, and everyone who eats the blood of any flesh, will all be destroyed from the earth. And no man who eats blood, or who sheds the blood of man on the earth, will be left; neither seed nor descendants will remain to him under heaven. For into Sheol they will go, and into the place of judgment they will descend, and into the darkness of the deep they will all enter by a violent death. Let no blood appear upon you from all the blood there is in all the days in which you slaughter any beast or cattle or whatever creeps on the earth; and do a good work for your souls by covering with earth that which has been poured out on the face of the earth. And do not be like one who eats with the blood, but be strong not to eat blood before you; cover the blood, for thus I have been commanded to testify to you and to your children, together with all flesh. And do not eat the life with the flesh, so that your blood, which is your life, may not be required from the hand of any flesh that sheds it on the earth. For the earth will not be cleansed from the blood that has been poured out upon it, except by the blood of the one who poured it out will the earth be cleansed throughout all its generations. And now, my children, listen: do justice and righteousness, so that you may be planted in righteousness over the face of the whole earth, and your glory may be lifted up before my God, who saved me from the waters of the flood. And behold, go and build for yourselves cities, and plant in them every plant that is on the earth, and every fruit-bearing tree.

    28. For three years its fruit shall not be gathered from anything that is eaten; and in the fourth year its fruit shall be gathered, and the firstfruits acceptable before the LORD Most High, who created heaven and earth and everything, shall be offered up. Let them offer in abundance the first wine and oil as firstfruits on the altar of the LORD, who receives it; and what is left over let the servants of the house of the LORD eat before the altar that receives it.

    29. And in the fifth year make the release, so that you may release it in righteousness and uprightness, and all your planting will be righteous and prosperous.

    30. For thus Enoch, the father of your father Methuselah, commanded his son, and Methuselah commanded his son Lamech, and Lamech commanded me everything that his fathers commanded him.

    31. And I also command you, my sons, according to the command that Enoch gave to his son in the first jubilees[c][d][e][f][g][h][i], while he was still alive in the seventh generation: he commanded and testified to his son and to his sons'' sons until the day of his death.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The source rows are segmented unusually here: the action of Shem and Japheth begins in the row labeled verse 8, while the backward covering continues in the row labeled 18. The translation regularizes this into consecutive narrative verses.'
    reason: segmentation_note
    anchor_ref: '7:8'
  - marker: b
    text: The Ethiopic has a phrase literally like 'slave of lowness/servitude' rather than the more familiar Genesis wording 'servant of servants.'
    reason: lexical_alternative
    anchor_ref: '7:9'
  - marker: i
    text: The city name is transliterated from a difficult Ethiopic form, Ne'elatama'uk; the exact vocalization is uncertain.
    reason: segmentation_note
    anchor_ref: '7:13'
  - marker: h
    text: Adataneses is a transliteration of the Ethiopic form; the name is uncertain in detail.
    reason: segmentation_note
    anchor_ref: '7:14'
  - marker: g
    text: Sedeqetelebab is transliterated from the Ethiopic; the name may preserve an underlying meaning related to righteousness, but the form is left as a name in the main text.
    reason: lexical_alternative
    anchor_ref: '7:15'
  - marker: f
    text: '''Watchers'' reflects the Enochic angelic tradition behind the passage; compare the broader Watchers narrative known from 1 Enoch.'
    reason: cross_reference
    anchor_ref: '7:20'
  - marker: e
    text: The sequence Naphidim / Naphil / Elyo reflects difficult giant-group terminology in the Ethiopic text. Some scholars compare these with forms like Nephilim and Elioud, but the exact relationships are debated.
    reason: textual_variant
    anchor_ref: '7:21'
  - marker: d
    text: The long instruction on blood, homicide, and agricultural firstfruits is compressed into a single extended verse in the surviving row data, though it likely reflects multiple verse units in fuller editions.
    reason: segmentation_note
    anchor_ref: '7:27'
  - marker: c
    text: The command about the fifth year is difficult. 'Make the release' renders a term of letting go or leaving off, likely an agricultural practice tied to the preceding firstfruits legislation.
    reason: alternative_reading
    anchor_ref: '7:29'
lexical_decisions:
- source_word: ሱባዔ ሳብዕ
  chosen: seventh week
  alternatives:
  - seventh heptad
  - seventh sabbatical cycle
  rationale: Jubilees uses structured chronological language; 'week' here preserves the technical scheme of weeks of years rather than flattening to a generic period.
- source_word: አቆቤጼዉ
  chosen: jubilee
  alternatives:
  - cycle
  - jubilean period
  rationale: The term denotes the jubilee framework central to the book's chronology and must be preserved explicitly.
- source_word: ጽንሓሐ
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  rationale: Cultic context and accompanying altar language indicate an עולה-like offering wholly turned into smoke.
- source_word: ማሕስአ
  chosen: kid of the goats
  alternatives:
  - goat
  - young goat
  rationale: The sacrificial sequence distinguishes this animal from the ox, ram, and sheep; 'kid of the goats' preserves the specificity.
- source_word: ያስተስሪ
  chosen: make atonement
  alternatives:
  - purge
  - expiate
  rationale: Cultic sacrificial purpose is explicit; 'make atonement' is the clearest accessible rendering.
- source_word: መዐዛ ሠናየ
  chosen: a pleasing fragrance
  alternatives:
  - sweet savor
  - pleasant aroma
  rationale: Preserves sacrificial idiom without archaic phrasing.
- source_word: ኀፍረተ አቡሆሙ
  chosen: the shame of their father
  alternatives:
  - their father's nakedness
  - their father's shame
  rationale: The Ge'ez uses shame language in the covering scene; this keeps the moral dimension while still implying nakedness.
- source_word: ቅኑየ ገብር
  chosen: a lowly slave
  alternatives:
  - servant of servants
  - lowest slave
  rationale: The phrase intensifies servitude. In line with project philosophy, 'slave' better preserves bonded status than 'servant'.
