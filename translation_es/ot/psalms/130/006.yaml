    text: 'O: «Mi alma es para el Señor más que los centinelas por la mañana». El hebreo omite un verbo explícito aquí; «espera» se suministra por el contexto del salmo.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente la referencia divina para ajustarla al hebreo אֲדֹנָי y al rastro POB en inglés: aquí debe decir «el Señor», no «Yahvé». Se mantiene el resto de la redacción porque transmite bien la elipsis, la comparación y la repetición poética del original.'
