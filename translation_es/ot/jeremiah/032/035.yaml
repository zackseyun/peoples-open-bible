translation:
  language: es
  text: Construyeron los lugares altos de Baal, que están en el Valle de Ben-hinom[a], para hacer pasar a sus hijos y a sus hijas por el fuego a Molec[b]—algo que yo no les había mandado, ni había entrado en mi corazón[c] que hicieran esta abominación, haciendo pecar a Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el valle del hijo de Hinom».'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «hacer pasar a sus hijos y a sus hijas» alude aquí al sacrificio infantil, asociado con el fuego y el culto a Molec.
    reason: cultural_note
  - marker: c
    text: 'O: «ni surgió en mi mente»; hebreo: «ni subió a mi corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּמ֨וֹת
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - santuarios
  - altos
  lexicon: HALOT
  rationale: '"Lugares altos" es el equivalente bíblico usual en español para בָּמוֹת y conserva el matiz cultual del término. "Santuarios" sería más general y "altos" sonaría demasiado incompleto en español.'
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de la deidad, no como un título genérico; por eso se mantiene "Baal" sin artículo.
- source_word: בְּגֵיא בֶן־הִנֹּם
  english_pob_choice: in the Valley of Ben-hinnom
  chosen_spanish: en el Valle de Ben-hinom
  alternatives_spanish:
  - en el valle del hijo de Hinom
  - en Gehena
  lexicon: HALOT
  rationale: Se conserva el topónimo hebreo transliterado, como en el auditorio inglés de POB. "Gehena" sería anacrónico en este contexto del AT, y la forma plenamente literal queda como alternativa.
- source_word: לְהַעֲבִיר
  english_pob_choice: to make ... pass through the fire
  chosen_spanish: hacer pasar ... por el fuego
  alternatives_spanish:
  - ofrecer
  - sacrificar
  lexicon: HALOT
  rationale: El hebreo significa literalmente causar que pasen por/atravesando algo; en este contexto ritual alude al sacrificio infantil. En español, "hacer pasar ... por el fuego" preserva el giro idiomático y deja claro el marco cultual.
- source_word: לַמֹּלֶךְ
  english_pob_choice: to Molech
  chosen_spanish: para Molec
  alternatives_spanish:
  - a Moloc
  - para el rey
  lexicon: HALOT
  rationale: Se entiende como referencia a la deidad Molec/Moloc, no como "rey" común. "Para" expresa bien la dirección sacrificial en español y evita introducir una lectura menos precisa.
- source_word: אֲשֶׁר לֹא צִוִּיתִים
  english_pob_choice: something I had not commanded them
  chosen_spanish: algo que yo no les había mandado
  alternatives_spanish:
  - lo cual yo no les había mandado
  - algo que no les mandé
  lexicon: HALOT
  rationale: 'La formulación española refleja la cláusula relativa con sufijo objeto y conserva la disociación divina: Dios desautoriza explícitamente la práctica.'
- source_word: וְלֹא עָלְתָה עַל לִבִּי
  english_pob_choice: nor had it entered my heart
  chosen_spanish: ni había subido a mi corazón
  alternatives_spanish:
  - ni había entrado en mi corazón
  - ni se me había ocurrido
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea del corazón como sede de pensamiento/voluntad. "Subido a mi corazón" mantiene la tensión antropomórfica del original; "entrado" o "se me había ocurrido" la suavizan más de lo que el texto exige.
- source_word: הַתּוֹעֵבָה הַזֹּאת
  english_pob_choice: this abomination
  chosen_spanish: esta abominación
  alternatives_spanish:
  - esta cosa detestable
  - esta detestable práctica
  lexicon: HALOT
  rationale: '"Abominación" reproduce el peso teológico del término en contextos idolátricos y moralmente perversos. Otras opciones diluyen ese valor técnico.'
- source_word: לְמַעַן הַחֲטִיא
  english_pob_choice: causing Judah to sin
  chosen_spanish: causando que Judá pecara
  alternatives_spanish:
  - para hacer pecar a Judá
  - llevando a Judá a pecar
  lexicon: HALOT
  rationale: El causativo de חטא se expresa naturalmente en español con "causando que ... pecara", conservando la fuerza resultativa del hebreo.
theological_decisions:
- issue: Sacrificio infantil en el giro "hacer pasar por el fuego"
  english_pob_reading: Render the idiom explicitly as 'make their sons and their daughters pass through the fire to Molech.'
  chosen_spanish_reading: Traducirlo como "hacer pasar a sus hijos y a sus hijas por el fuego para Molec".
  alternative_spanish_readings:
  - hacer pasar a sus hijos y a sus hijas a Molec
  - ofrecer a sus hijos y a sus hijas a Molec
  rationale: La expresión hebrea alude al sacrificio infantil; el español mantiene la forma idiomática y añade "por el fuego" para hacer explícito el contexto ritual sin reemplazarlo por una paráfrasis más interpretativa.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense without unnecessary paraphrase.'
- issue: Lenguaje antropomórfico sobre la voluntad divina
  english_pob_reading: Retain the anthropomorphic expression as 'nor had it entered my heart.'
  chosen_spanish_reading: Retener la imagen como "ni había subido a mi corazón".
  alternative_spanish_readings:
  - ni había entrado en mi corazón
  - ni se me había ocurrido
  rationale: La frase conserva la fuerza retórica del hebreo y evita resolver la tensión teológica. No sugiere ignorancia en Dios, sino que subraya que tal acción era totalmente ajena a su voluntad.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión española sigue el último pase de revisión del texto base: no hubo cambios aplicados en el registro inglés, y la presente redacción mantiene de forma auditable sus decisiones léxicas y teológicas principales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; en este versículo el sujeto divino aparece en primera persona, por lo que no se introduce un título adicional.
  - «Baal» y «Molec» se mantienen como nombres propios cultuales, coherentes con la lectura del POB inglés.
  - Se conserva «corazón» para לֵב por su valor semítico de sede de pensamiento y voluntad.
  - Se emplea «pecara» para el causativo final, en línea con el forcejo del hebreo sin exagerar la paráfrasis.
  - Las notas a, b y c cubren las mismas ambigüedades que el aparato inglés, adaptadas al español.
