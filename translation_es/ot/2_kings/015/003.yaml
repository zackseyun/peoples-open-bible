translation:
  language: es
  text: Él hizo lo recto a los ojos de Yahvé, conforme a todo lo que había hecho Amasías su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Y hizo
  - Hizo
  lexicon: HALOT
  rationale: El verbo עשה en esta fórmula narrativa se expresa naturalmente en español con «hizo». Conservé el sujeto explícito para claridad y fluidez publicable, sin añadir un matiz no presente en el hebreo.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo derecho
  - lo correcto
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado indica «lo recto/upright». En español, «lo recto» conserva la evaluación moral del hebreo sin volverla más abstracta de lo necesario.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La imagen idiomática se mantiene con «ante los ojos de», que suena natural en español y conserva la metáfora evaluativa del hebreo. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se traslada como el nombre propio divino «Yahvé», siguiendo la terminología del proyecto y evitando la sustitución por un título.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La relación de conformidad se expresa bien con «conforme a todo lo que», que mantiene el sentido comparativo sin sobrecargar la frase.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había obrado
  lexicon: HALOT
  rationale: El pluscuamperfecto español ayuda a mostrar que la acción de Amasías precede y sirve de patrón a la del rey actual, tal como en el contexto comparativo del hebreo y de la traducción inglesa auditada.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: HALOT
  rationale: Se adopta la forma española usual de nombre propio bíblico «Amasías», transparente para lectores hispanohablantes y fiel a la transliteración tradicional del nombre.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  - su antecesor
  lexicon: HALOT
  rationale: El contexto inmediato apunta al padre biológico o dinástico inmediato, por lo que «su padre» es la opción directa y suficientemente precisa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el nombre del pacto. En español se conserva como «Yahvé» para no ocultar el nombre divino tras una sustitución titulativa, en coherencia con la doctrina y la práctica editorial del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y quedó sin cambios, con acuerdo alto en la evaluación cruzada. La presente propuesta respeta ese estado estable y traslada sus decisiones léxicas al español sin introducir alternativas no sustentadas por el hebreo.
  spanish_consistency_notes:
  - 'Se mantiene la evaluación moral con una fórmula breve y natural: «hizo lo recto».'
  - Se conserva la metáfora idiomática de evaluación divina con «ante los ojos de Yahvé».
  - Se usa el pluscuamperfecto en la segunda cláusula para reflejar adecuadamente la anterioridad de la acción de Amasías dentro de una comparación.
  - Se emplea el nombre divino «Yahvé» de forma consistente con el proyecto.
  - El nombre propio del rey se adapta a la forma española establecida «Amasías».
