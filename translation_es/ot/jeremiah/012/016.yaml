translation:
  language: es
  text: Y sucederá que, si realmente aprenden[a] los caminos de mi pueblo, para jurar por mi nombre, «¡Vive Yahvé!», así como enseñaron a mi pueblo a jurar por Baal[b], entonces serán edificados[c] en medio de mi pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente aprendan» o «aprendan de veras»; el hebreo usa un infinitivo absoluto con verbo finito para intensificar la acción.'
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula juratoria hebrea: «Vive Yahvé». También puede rendirse «Yahvé vive».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «serán establecidos». El hebreo dice literalmente «serán edificados en medio de mi pueblo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y ocurrirá
  - Y acontecerá
  lexicon: HALOT
  rationale: Reproduce la fórmula de transición futura con un español natural y solemne, sin volverla arcaica.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  lexicon: HALOT
  rationale: La partícula condicional se vierte de forma directa y normal en español.
- source_word: לָמֹד יִלְמְדוּ
  english_pob_choice: indeed learn
  chosen_spanish: de verdad aprenden
  alternatives_spanish:
  - ciertamente aprendan
  - aprendan de veras
  - aprendan realmente
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito intensifica la acción; 'de verdad' comunica la fuerza enfática sin añadir una interpretación de diligencia que el texto no exige de forma explícita.
- source_word: דַּרְכֵי עַמִּי
  english_pob_choice: the ways of my people
  chosen_spanish: los caminos de mi pueblo
  alternatives_spanish:
  - las conductas de mi pueblo
  - las costumbres de mi pueblo
  lexicon: HALOT
  rationale: '''Caminos'' conserva la metáfora bíblica de conducta y práctica religiosa que el inglés POB también mantiene.'
- source_word: לְהִשָּׁבֵעַ בִּשְׁמִי
  english_pob_choice: to swear by my name
  chosen_spanish: para jurar por mi nombre
  alternatives_spanish:
  - para hacer juramento por mi nombre
  - para jurar en mi nombre
  lexicon: HALOT
  rationale: '''Jurar por mi nombre'' sigue de cerca el hebreo y expresa adecuadamente el lenguaje de juramento del pacto.'
- source_word: חַי יְהוָה
  english_pob_choice: ‘As Yahweh lives,’
  chosen_spanish: «¡Vive Yahvé!»
  alternatives_spanish:
  - «Vive Yahvé»
  - «¡Yahvé vive!»
  lexicon: HALOT
  rationale: Se conserva la fórmula juratoria breve y performativa; 'Vive Yahvé' refleja mejor el hebreo que una expansión tipo 'como vive Yahvé'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el equivalente de nombre divino establecido para español en el proyecto.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: HALOT
  rationale: Marca con claridad la comparación entre el aprendizaje deseado y la enseñanza idólatra previa.
- source_word: לִמְּדוּ אֶת עַמִּי
  english_pob_choice: they taught my people
  chosen_spanish: enseñaron a mi pueblo
  alternatives_spanish:
  - instruyeron a mi pueblo
  - formaron a mi pueblo
  lexicon: HALOT
  rationale: '''Enseñaron'' es la opción más directa y neutral para el verbo causal de instrucción.'
- source_word: לְהִשָּׁבֵעַ בַּבָּעַל
  english_pob_choice: to swear by Baal
  chosen_spanish: a jurar por Baal
  alternatives_spanish:
  - a jurar en Baal
  - a jurar por el baal
  lexicon: HALOT
  rationale: Mantiene el paralelo formal con 'jurar por mi nombre' y conserva la referencia idólatra a Baal.
- source_word: וְנִבְנוּ
  english_pob_choice: then they will be built up
  chosen_spanish: entonces serán edificados
  alternatives_spanish:
  - entonces serán establecidos
  - entonces serán reconstruidos
  lexicon: HALOT
  rationale: '''Edificados'' preserva la metáfora de construcción y permite la resonancia comunitaria del pasivo hebreo.'
- source_word: בְּתוֹךְ עַמִּי
  english_pob_choice: in the midst of my people
  chosen_spanish: en medio de mi pueblo
  alternatives_spanish:
  - en medio de mi gente
  - dentro de mi pueblo
  lexicon: HALOT
  rationale: '''En medio de'' expresa naturalmente בתוך en español y conserva la idea de incorporación en la comunidad.'
theological_decisions:
- issue: Fórmula de juramento con el nombre divino
  english_pob_reading: ‘As Yahweh lives,’
  chosen_spanish_reading: «¡Vive Yahvé!»
  alternative_spanish_readings:
  - «Como vive Yahvé»
  - «Vive Yahvé»
  rationale: El hebreo usa una fórmula juratoria fija. En español, la exclamación breve conserva mejor la fuerza performativa del juramento que una paráfrasis más explicativa.
  doctrine_reference: 'DOCTRINE.md: Render the divine name as Yahweh; preserve oath formulas where possible'
- issue: Sentido de וְנִבְנוּ בְּתוֹךְ עַמִּי
  english_pob_reading: then they will be built up in the midst of my people
  chosen_spanish_reading: entonces serán edificados en medio de mi pueblo
  alternative_spanish_readings:
  - entonces serán establecidos en medio de mi pueblo
  - entonces serán reconstruidos en medio de mi pueblo
  rationale: Se mantiene la metáfora de edificación sin resolver demasiado el alcance teológico. El texto puede implicar incorporación, establecimiento o restauración dentro del pueblo; la traducción conserva esa tensión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La versión española sigue el estado final del audit trail inglés: se evita una intensificación como ''diligentemente'' y se prefiere un equivalente más neutral para la construcción enfática del hebreo; también se conserva la fórmula juratoria y la metáfora de edificación en el cierre.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el tetragrámaton, en coherencia con el estándar del proyecto.
  - '''Baal'' se mantiene como nombre propio idolátrico sin adaptación.'
  - '''Los caminos de mi pueblo'' conserva la imagen semítica de conducta y práctica.'
  - El registro es bíblico-formal pero en español moderno, sin arcaísmos innecesarios.
