translation:
  language: es
  text: 'Por tanto[a], así dice Yahvé: Si te vuelves, yo te restauraré, y estarás delante de mí. Si sacas lo precioso de lo vil, serás como mi boca[c][b]. Ellos se volverán a ti, pero tú no debes volverte a ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Si te arrepientes, yo te restauraré" o "Si vuelves, yo te haré volver". El hebreo repite el verbo "volver/retornar" para la respuesta de Jeremías y para la acción restauradora de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: '"Sacar lo precioso de lo vil" probablemente alude a separar una palabra digna de una indigna; compárese la frase siguiente, "serás como mi boca".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "serás mi portavoz". Literalmente: "serás como mi boca".'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva el valor inferencial que enlaza con la respuesta de Yahvé al lamento previo de Jeremías, manteniendo tono profético y conexión lógica.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - esto dice Yahvé
  - así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte en un español natural y solemne. Se conserva el nombre divino Yahvé, conforme al criterio del proyecto, sin sustituirlo por un título.
- source_word: אִם תָּשׁוּב
  english_pob_choice: If you return
  chosen_spanish: Si te vuelves
  alternatives_spanish:
  - Si regresas
  - Si te vuelves atrás
  - Si te arrepientes
  lexicon: HALOT
  rationale: שׁוּב abarca volverse/retornar. 'Te vuelves' mantiene la metáfora y deja abierta la resonancia de arrepentimiento sin imponerla como única lectura.
- source_word: וַאֲשִׁיבְךָ
  english_pob_choice: I will restore you
  chosen_spanish: yo te restauraré
  alternatives_spanish:
  - yo te haré volver
  - yo te traeré de vuelta
  - yo te restableceré
  lexicon: HALOT
  rationale: El causativo de שׁוּב expresa restauración producida por Dios. 'Restauraré' comunica bien el sentido relacional y vocacional que el contexto exige.
- source_word: לְפָנַי תַּעֲמֹד
  english_pob_choice: you will stand before me
  chosen_spanish: te pondrás delante de mí
  alternatives_spanish:
  - estarás delante de mí
  - permanecerás en mi presencia
  - estarás en pie delante de mí
  lexicon: HALOT
  rationale: La imagen concreta de estar de pie delante de Yahvé se conserva con una formulación española idiomática. 'Ponerte delante de mí' mantiene el matiz de comparecencia/servicio.
- source_word: וְאִם תּוֹצִיא
  english_pob_choice: If you bring out
  chosen_spanish: Si sacas
  alternatives_spanish:
  - Si sacas fuera
  - Si extraes
  - Si haces salir
  lexicon: HALOT
  rationale: '''Sacar'' es la opción más natural en español para la idea de hacer salir o poner aparte, sin perder la imagen de separación implícita en el contexto.'
- source_word: יָקָר
  english_pob_choice: the precious
  chosen_spanish: lo precioso
  alternatives_spanish:
  - lo valioso
  - lo caro
  - lo precioso de verdad
  lexicon: HALOT
  rationale: Se conserva el uso sustantivado del adjetivo para reflejar el contraste concentrado del hebreo con el término siguiente.
- source_word: מִזּוֹלֵל
  english_pob_choice: from the worthless
  chosen_spanish: de lo vil
  alternatives_spanish:
  - de lo indigno
  - de lo inútil
  - de lo despreciable
  lexicon: HALOT
  rationale: '''Vil'' reproduce la carga de base, despreciable o sin valor, y mantiene un contraste elevado con ''lo precioso''. No se reduce a una sola nota moral ni económica.'
- source_word: כְּפִי תִהְיֶה
  english_pob_choice: you will be as my mouth
  chosen_spanish: serás como mi boca
  alternatives_spanish:
  - serás mi portavoz
  - serás como mi boca hablante
  - serás mi boca
  lexicon: HALOT
  rationale: Se mantiene la metáfora directa, que en contexto señala autoridad profética para hablar en nombre de Yahvé. No se sustituye por una paráfrasis interpretativa en el texto principal.
- source_word: יָשֻׁבוּ הֵמָּה אֵלֶיךָ
  english_pob_choice: They will turn to you
  chosen_spanish: Ellos se volverán a ti
  alternatives_spanish:
  - Ellos volverán a ti
  - Volverán a ti
  - Se volverán hacia ti
  lexicon: HALOT
  rationale: El verbo repetido de 'volver' conserva el paralelismo con la primera mitad del versículo y la dirección relacional que el hebreo presenta.
- source_word: וְאַתָּה לֹא תָשׁוּב אֲלֵיהֶם
  english_pob_choice: but you must not turn to them
  chosen_spanish: pero tú no te volverás a ellos
  alternatives_spanish:
  - pero tú no volverás a ellos
  - pero tú no te dirigirás a ellos
  - pero tú no regresarás a ellos
  lexicon: HALOT
  rationale: La prohibición mantiene el mismo verbo para preservar el contraste textual y la advertencia de no adoptar la postura del pueblo.
theological_decisions:
- issue: Sentido de 'volver' y 'restaurar' en la llamada a Jeremías
  english_pob_reading: The verse addresses Jeremiah with a call to return/turn back in disposition and speech, with restoration to prophetic standing before the LORD.
  chosen_spanish_reading: El versículo llama a Jeremías a volverse, con la promesa de que Yahvé lo restaurará y lo colocará de nuevo en su presencia para su servicio profético.
  alternative_spanish_readings:
  - El versículo se refiere principalmente al arrepentimiento de Jeremías después de su queja
  - El versículo expresa solo una nueva comisión profética sin implicar arrepentimiento
  rationale: El hebreo usa שׁוּב dos veces y enlaza esa acción con estar delante de Yahvé y ser su boca. La redacción española conserva esa tensión sin decidir en exceso entre arrepentimiento, retorno o reanudación de la comisión.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Interpretación de 'lo precioso de lo vil'
  english_pob_reading: The main text preserves the metaphor of separating what is precious from what is worthless, likely referring to Jeremiah's speech/discernment, without collapsing it into a single interpretive paraphrase.
  chosen_spanish_reading: El texto principal conserva la imagen de separar lo precioso de lo vil, probablemente con referencia al discernimiento y la palabra profética, sin reducirla a una sola paráfrasis.
  alternative_spanish_readings:
  - Si anuncias lo que vale y no lo que no vale
  - Si separas a los justos de los injustos
  - Si extraes lo bueno de lo malo
  rationale: El contexto inmediato de la palabra profética y la frase 'serás como mi boca' favorecen una lectura relacionada con el habla. Aun así, la imagen hebrea es más amplia y por eso se mantiene abierta en la traducción principal.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La comparación con el último pasaje revisado indica acuerdo alto y sin cambios necesarios. La versión española adopta la misma lectura de 'volver/restaurar' y de la metáfora 'mi boca', manteniendo las tensiones léxicas documentadas en el audit trail.
  spanish_consistency_notes:
  - Se conserva Yahvé como nombre divino principal, conforme al estándar del proyecto.
  - Se mantiene 'volver/restaurar' para שׁוּב sin colapsarlo únicamente en 'arrepentirse'.
  - '''Lo precioso'' y ''lo vil'' reproducen el contraste del hebreo con un registro digno y comprensible.'
  - La metáfora 'serás como mi boca' permanece en el texto principal y la nota ofrece la lectura funcional de 'portavoz'.
  - La prohibición final repite el mismo verbo para preservar el paralelismo con la primera cláusula.
