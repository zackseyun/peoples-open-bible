  yaml_path: translation/ot/psalms/091/007.yaml
  text: A thousand may fall at your side[a], and ten thousand at your right hand[b], but it will not come near you.
  footnotes:
  - marker: a
    text: Or 'A thousand will fall at your side, and ten thousand at your right hand.' The Hebrew imperfects can be read as future or modal in this poetic context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it will not approach you.' The implied subject is not stated in Hebrew; context suggests the threatened calamity.
    reason: lexical_alternative
