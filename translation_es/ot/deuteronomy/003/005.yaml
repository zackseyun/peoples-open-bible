    rationale: בריח en contexto de fortificación se refiere mejor a barras/trancas de puerta o portón; 'cerrojos' sugiere un mecanismo pequeño y doméstico, menos fiel a la imaginería militar.
  - severity: high
    issue: '"muy muchas ciudades abiertas" para מֵעָרֵי הַפְּרָזִי הַרְבֵּה מְאֹד'
    rationale: La expresión es poco natural en español y puede oscurecer el contraste del hebreo. 'Ciudades abiertas' es ambigua, y 'muy muchas' resulta torpe. Se necesita una formulación idiomática que mantenga la oposición con las ciudades fortificadas.
  - severity: low
