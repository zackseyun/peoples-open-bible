translation:
  language: es
  text: Así que todo el pueblo fue a Gilgal, y allí hicieron rey a Saúl delante de Yahvé en Gilgal. Allí sacrificaron ofrendas de paz[a] delante de Yahvé, y allí Saúl y todos los hombres de Israel se alegraron mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también 'ofrendas de comunión' u 'ofrendas de bienestar'. El término hebreo designa una categoría de ofrendas sacrificiales comunitarias asociadas con paz, integridad y celebración compartida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכ֨וּ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fueron
  - fueron
  lexicon: HALOT 3212
  rationale: הלך en narración se expresa naturalmente con un verbo simple de movimiento. En español, con sujeto colectivo singular ('todo el pueblo'), 'fue' comunica el desplazamiento sin recargar la frase.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  lexicon: HALOT 5971
  rationale: עָם aquí designa al conjunto del pueblo reunido, no solo soldados. 'Todo el pueblo' preserva el valor corporativo y es idiomático en español.
- source_word: הַגִּלְגָּל / בַּגִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  lexicon: HALOT 1537
  rationale: Es un nombre propio de lugar; se translitera sin adaptar.
- source_word: וַיַּמְלִכוּ ... אֶת שָׁאוּל
  english_pob_choice: they made Saul king
  chosen_spanish: hicieron rey a Saúl
  alternatives_spanish:
  - proclamaron rey a Saúl
  - pusieron a Saúl como rey
  lexicon: HALOT 4427
  rationale: El verbo causativo de מלך indica 'hacer rey' o 'establecer como rey'. 'Hicieron rey a Saúl' es fiel y evita añadir 'ungieron', que el hebreo no dice aquí.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT 6440; HALOT 3068
  rationale: לִפְנֵי expresa estar delante/en presencia de. Siguiendo la norma del proyecto, יְהוָה se vierte 'Yahvé' y no se oculta como 'SEÑOR'.
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: they sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron sacrificios
  - inmolaron
  lexicon: HALOT 2076
  rationale: En contexto ritual, זבח se traduce naturalmente 'sacrificaron'. Mantiene la acción cultual sin sobreexplicar.
- source_word: זְבָחִים שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - sacrificios de comunión
  - ofrendas de bienestar
  lexicon: HALOT 2077; HALOT 8002
  rationale: El término tiene un rango semántico de paz/wholeness/comunión. 'Ofrendas de paz' conserva la tradición bíblica y permite una nota con las alternativas sin perder inteligibilidad.
- source_word: וַיִּשְׂמַח
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se gozaron
  - regocijaron
  lexicon: HALOT 8055
  rationale: 'Con el sujeto compuesto siguiente en español, conviene pluralizar el verbo para concordancia natural: Saúl y todos los hombres de Israel. ''Se alegraron'' conserva el sentido festivo.'
- source_word: וְכָל אַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: and all the men of Israel
  chosen_spanish: y todos los hombres de Israel
  alternatives_spanish:
  - y todos los israelitas
  - y toda la gente de Israel
  lexicon: HALOT 376; HALOT 3478
  rationale: אַנְשֵׁי es específicamente masculino plural ('hombres de'). Se preserva el matiz de género del hebreo, conforme a la política de precisión gramatical.
- source_word: עַד מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sobremanera
  lexicon: HALOT 3966
  rationale: El intensificador idiomático puede expresarse con 'mucho' en español para una frase más natural y directa; mantiene la intensidad sin forzar arcaísmos.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El hebreo usa explícitamente el Tetragrámaton. Siguiendo el criterio del proyecto, se preserva el nombre propio divino en español como 'Yahvé', en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gender-accurate rendering of אַנְשֵׁי יִשְׂרָאֵל
  english_pob_reading: all the men of Israel
  chosen_spanish_reading: todos los hombres de Israel
  alternative_spanish_readings:
  - todos los israelitas
  - todo el pueblo de Israel
  rationale: El sustantivo אַנְשֵׁי es masculino y específico. Se conserva el género del original para no neutralizar una distinción léxica presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
- issue: Nature of זְבָחִים שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - sacrificios de comunión
  - ofrendas de bienestar
  rationale: El término designa una categoría sacrificial de comunión, paz y plenitud. 'Ofrendas de paz' conserva la raíz semántica y no fuerza una sola dimensión teológica.
  doctrine_reference: Lexical note on שְׁלָמִים / sacrificial offerings
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no había cambios necesarios y que el acuerdo con el control cruzado era alto. Este borrador conserva esa línea: mantiene la estructura del hebreo, el nombre divino como Yahvé, el matiz masculino de ''אַנְשֵׁי'', y la categoría sacrificial con nota alternativa, sin introducir lecturas ajenas al texto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Gilgal'' se mantiene como topónimo transliterado sin adaptación.'
  - Se preserva el plural masculino 'hombres de Israel' por fidelidad al hebreo.
  - La frase final usa 'se alegraron mucho' para reflejar עַד מְאֹד con español natural.
  - La nota al pie se ancla en 'ofrendas de paz' porque allí surge la principal tensión léxica del término שְׁלָמִים.
