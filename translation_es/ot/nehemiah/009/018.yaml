    issue: La apertura «Hasta se hicieron...» no expresa de la manera más natural la concesión de אַף כִּי.
    rationale: Aunque «hasta» puede sugerir énfasis, aquí la sintaxis española queda forzada. El hebreo introduce una concesión del tipo «aun cuando / aunque», y la auditoría inglesa eligió «Even when». «Aun cuando» preserva mejor esa relación lógica y mejora la legibilidad sin perder fuerza.
