review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: mandato de pasar la noche, condición sobre el redentor más cercano, compromiso personal de Booz y mandato final de acostarse hasta la mañana. Conserva correctamente ''redimir'' para גאל y ''Yahvé'' para יְהוָה. Sin embargo, hay dos fallas de fidelidad/forma: la nota [a] está anclada en ''aquí'' cuando en realidad explica ''redimir'', y la fórmula de juramento ''vive Yahvé'' suena incompleta/menos idiomática para חַי יְהוָה, que en español bíblico natural se expresa mejor como ''tan cierto como vive Yahvé'' o ''vive Yahvé'' con mejor puntuación; además conviene evitar el punto y coma tras ''esta noche'' para una fluidez más natural.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Quédate aquí esta noche' y 'Acuéstate hasta la mañana' son naturales. 'Bien, que te redima' funciona, aunque con raya o dos puntos podría leerse mejor; no es necesario forzar cambio. La mayor reparación necesaria es mover la nota al término pertinente y ajustar la fórmula de juramento a un español más idiomático y solemne.
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה -> ''Yahvé''; גאל -> ''redimir''. No hay conflicto con Mesías/Cristo ni otros términos sensibles. La nota léxica sobre el redentor familiar es apropiada, pero debe anclarse a ''redime/redimir'' y no a ''aquí''.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre 'aquí' en vez de sobre 'redime/redimir'.
    rationale: La nota explica el valor léxico de גאל ('redimir' en sentido de redentor familiar), no el adverbio locativo. El anclaje actual induce a confusión y no sigue la disciplina requerida de notas.
  - severity: medium
    issue: La fórmula 'vive Yahvé' es menos idiomática para un juramento solemne.
    rationale: חַי יְהוָה es una fórmula estable de juramento. En español eclesial natural, 'tan cierto como vive Yahvé' comunica mejor el valor juramentario sin perder fidelidad.
  - severity: low
    issue: La puntuación inicial con punto y coma tras 'esta noche' suena algo trabada.
    rationale: El hebreo coordina de manera fluida. Una coma después de 'esta noche' mejora la lectura en español moderno sin alterar el sentido.
  revised_spanish_text: Quédate aquí esta noche, y por la mañana, si él te redime[a], bien, que te redima. Pero si no quiere redimirte, entonces yo mismo te redimiré, tan cierto como vive Yahvé. Acuéstate hasta la mañana.
  revised_footnotes:
  - marker: a
    text: Hebreo 'redimir' aquí se refiere al papel de un pariente redentor; a menudo se llama 'pariente redentor' o 'redentor familiar'.
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido esencial del borrador, pero se corrige el anclaje de la nota para que explique el término correcto ('redime') y se mejora la fórmula de juramento para reflejar mejor חַי יְהוָה en español idiomático y solemne. También se alisa la puntuación inicial para mayor naturalidad.
