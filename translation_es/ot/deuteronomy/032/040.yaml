translation:
  language: es
  text: 'Porque alzo mi mano hacia el cielo y digo[a]: «¡Vivo yo para siempre!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Alzo mi mano hacia el cielo y digo: “Vivo yo para siempre.”» La redacción principal usa la exclamación para expresar con naturalidad en español el valor solemne de juramento de la fórmula hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la base o fundamento solemne de lo dicho antes. En español, «Porque» comunica bien esa relación discursiva sin volver la frase rígida.
- source_word: אֶשָּׂא
  english_pob_choice: I lift up
  chosen_spanish: alzo
  alternatives_spanish:
  - levanto
  - alzo mi mano
  lexicon: HALOT
  rationale: El verbo expresa el gesto concreto de elevar la mano en contexto de juramento. «Alzo» es natural y conserva la imagen corporal sin añadir interpretación.
- source_word: אֶל שָׁמַיִם
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - hacia los cielos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a los cielos», pero en español «hacia el cielo» mantiene la dirección ascendente y suena más idiomático para el gesto solemne.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi mano alzada
  lexicon: HALOT
  rationale: Se conserva el singular y la referencia directa al gesto de juramento.
- source_word: וְאָמַרְתִּי
  english_pob_choice: and say
  chosen_spanish: y digo
  alternatives_spanish:
  - y diré
  - y declaro
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta con valor performativo, en español presente «digo» transmite con naturalidad la continuidad solemne de la acción de jurar.
- source_word: חַי אָנֹכִי לְעֹלָם
  english_pob_choice: As I live forever
  chosen_spanish: Como vivo para siempre
  alternatives_spanish:
  - Vivo para siempre
  - Tan cierto como que vivo para siempre
  lexicon: HALOT
  rationale: La fórmula es un juramento divino. «Como vivo para siempre» conserva el valor idiomático de juramento y la duración eterna sin sobreexplicar ni introducir elementos ajenos.
theological_decisions:
- issue: Mantener la fuerza de juramento divino sin debilitarla a mera afirmación existencial
  english_pob_reading: As I live forever
  chosen_spanish_reading: Como vivo para siempre
  alternative_spanish_readings:
  - Vivo para siempre
  - Como ciertamente vivo para siempre
  rationale: El hebreo funciona como fórmula de juramento. La traducción elegida preserva la solemnidad y el sentido performativo sin agregar una intensificación no explícita en el texto fuente.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «surely» por no estar explícito en el hebreo. La versión española evita cualquier equivalente intensificador añadido y conserva solamente la fórmula de juramento «Como vivo para siempre».
  spanish_consistency_notes:
  - Se usa «cielo» para שָׁמַיִם conforme al registro solemne de juramento, sin introducir «SEÑOR».
  - Se mantiene la frase verbal en primera persona singular y el adverbio de duración «para siempre» para reflejar לְעֹלָם.
  - El estilo es digno y publicable, con puntuación de cita directa en español.
  - No se emplea «Cristo», «Señor» ni terminología litúrgica que no pertenezca al versículo.
