translation:
  language: es
  text: Toda bestia[a], todo animal que se arrastra, y toda ave —todo lo que se mueve sobre la tierra—, según sus familias, salieron del arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por sus familias'. La expresión hebrea preserva la idea de grupos de descendencia o divisiones entre los animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַחַיָּה
  english_pob_choice: Every beast
  chosen_spanish: Toda bestia
  alternatives_spanish:
  - Todo animal
  - Todo ser viviente
  - Todas las fieras
  lexicon: HALOT
  rationale: חַיָּה aquí designa a los animales terrestres distinguidos en la lista junto con los reptiles y las aves. 'Bestia' conserva el valor categorial y la distribución de כָּל con un sustantivo natural en español bíblico; 'animal' sería más amplio y menos marcado, y 'fieras' introduciría una connotación no presente.
- source_word: כָּל הָרֶמֶשׂ
  english_pob_choice: every creeping thing
  chosen_spanish: todo animal que se arrastra
  alternatives_spanish:
  - todo ser que se arrastra
  - toda criatura que se arrastra
  - todo reptil
  lexicon: HALOT
  rationale: רֶמֶשׂ se refiere a criaturas pequeñas o de movimiento rastrero. 'Animal que se arrastra' comunica ese campo semántico de forma clara y sin forzar una etiqueta taxonómica moderna como 'reptil'. Se evita repetir mecánicamente 'que se arrastra' en la cláusula siguiente, aunque se mantiene la idea de movimiento terrestre.
- source_word: וְכָל הָעוֹף
  english_pob_choice: and every bird
  chosen_spanish: y toda ave
  alternatives_spanish:
  - y toda criatura voladora
  - y todo pájaro
  - y toda ave del cielo
  lexicon: HALOT
  rationale: עוֹף abarca aves o criaturas voladoras, pero en esta tríada 'ave' es el equivalente más natural y digno en español. Preserva la categoría del texto sin reducirla innecesariamente a una especie concreta como 'pájaro'.
- source_word: כֹּל רוֹמֵשׂ עַל הָאָרֶץ
  english_pob_choice: everything that moves on the earth
  chosen_spanish: todo lo que se mueve sobre la tierra
  alternatives_spanish:
  - todo lo que se arrastra sobre la tierra
  - todo lo que anda sobre la tierra
  - todo ser que se mueve sobre la tierra
  lexicon: HALOT
  rationale: רוֹמֵשׂ comparte el campo semántico de movimiento bajo o rastrero, pero la POB inglesa eligió 'moves' para evitar una repetición pesada. En español, 'todo lo que se mueve sobre la tierra' conserva la amplitud semántica y la fluidez, sin estrechar el sentido solo a 'arrastrarse'.
- source_word: לְמִשְׁפְּחֹתֵיהֶם
  english_pob_choice: by their families
  chosen_spanish: según sus familias
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  - por grupos familiares
  lexicon: HALOT
  rationale: מִשְׁפָּחָה normalmente significa 'familia/clan', y en contexto animal expresa agrupación o descendencia organizada. 'Según sus familias' mantiene la imagen hebrea y la relación clasificatoria; 'por grupos familiares' sería más explícito pero menos pegado al término original.
- source_word: יָצְאוּ מִן הַתֵּבָה
  english_pob_choice: went out from the ark
  chosen_spanish: salió del arca
  alternatives_spanish:
  - salieron del arca
  - salieron de la arca
  - vinieron fuera del arca
  lexicon: HALOT
  rationale: יָצְאוּ es 'salir'. Aunque el hebreo es plural, en español la secuencia previa ya acumula sujetos distributivos con 'toda/todo'; por fluidez narrativa se puede condensar el cierre en un singular colectivo en estilo corriente, pero la forma más estricta y auditable sería plural. Para mantener concordancia transparente con el hebreo, se prefiere la lectura plural en la línea publicada; sin embargo, el texto final ha optado por una formulación más natural en español. (Ver nota de revisión en español_consistency_notes.)
theological_decisions:
- issue: Traducción de לְמִשְׁפְּחֹתֵיהֶם en un contexto zoológico y de creación/noé
  english_pob_reading: The Hebrew expression preserves the idea of grouped descent or divisions among the animals.
  chosen_spanish_reading: La expresión hebrea preserva la idea de grupos o divisiones entre los animales.
  alternative_spanish_readings:
  - según sus familias
  - por sus especies
  - por grupos
  rationale: 'No hay una decisión doctrinal controvertida, pero sí una tensión lexical importante: מִשְׁפָּחָה no significa ''especies'' de manera estricta. Se mantiene ''según sus familias'' en el texto, y se explicita en la nota que esto apunta a grupos/descendencia organizada, no a una taxonomía moderna.'
  doctrine_reference: Génesis 8:19; vocabulario de familias/clanes en el Pentateuco
- issue: Número verbal en יָצְאוּ frente al castellano final
  english_pob_reading: went out from the ark
  chosen_spanish_reading: salieron del arca
  alternative_spanish_readings:
  - salió del arca
  - fueron saliendo del arca
  rationale: El hebreo es plural. Para una traducción fuente-mente fiel, el castellano debe preservar el plural verbal, aunque el sujeto esté distribuido en una serie. Esto evita borrar una señal gramatical del original.
  doctrine_reference: Concordancia gramatical del hebreo bíblico
translation_notes:
  revision_awareness: El paquete de auditoría inglés sigue la edición más reciente con estatus de alta concordancia y sin cambios propuestos. No hay revisiones aplicadas al inglés; la versión española sigue sus decisiones léxicas principales, pero ajusta el castellano para mantener la concordancia plural de יָצְאוּ y la naturalidad sintáctica. La única tensión relevante es לְמִשְׁפְּחֹתֵיהֶם, que se conserva literalmente en el texto y se explica en nota.
  spanish_consistency_notes:
  - Se mantiene 'arca' para תֵּבָה, en continuidad con la narrativa de Noé.
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se conserva la tríada semántica: bestia / animal que se arrastra / ave.'
  - La nota [a] está anclada en 'familias' para reflejar la alternativa léxica sin romper el flujo del verso.
  - Se preserva el plural verbal del hebreo en 'salieron' para reflejar יָצְאוּ con transparencia.
