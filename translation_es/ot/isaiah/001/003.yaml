translation:
  language: es
  text: Un buey conoce[a] a su dueño, y un asno el pesebre de su amo; Israel no conoce[b]; mi pueblo no entiende.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manger» para «pesebre».
    reason: lexical_alternative
  - marker: b
    text: El sentido implícito es que Israel no conoce a Yahvé, aunque el hebreo deja el objeto sin expresar.
    reason: alternative_reading
lexical_decisions:
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - reconoce
  lexicon: HALOT
  rationale: Conservar 'conoce' mantiene el paralelismo con el segundo יָדַע y expresa bien la relación reconocida entre el animal y quien lo cuida. 'Sabe' suena menos relacional en español; 'reconoce' perdería la fuerza cognitiva general.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - toro
  - ganado
  lexicon: HALOT
  rationale: En español, 'buey' comunica de forma natural el bovino domesticado y trabajado, equivalente funcional de 'ox'. 'Toro' introduce sexo y matiz incorrectos; 'ganado' es demasiado genérico.
- source_word: קֹנֵהוּ
  english_pob_choice: its owner
  chosen_spanish: su dueño
  alternatives_spanish:
  - su propietario
  - el que lo adquirió
  lexicon: HALOT
  rationale: '''Dueño'' es la forma más natural y transparente para este contexto doméstico. ''Propietario'' es correcto pero más jurídico; ''el que lo adquirió'' explicita demasiado el participio.'
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - pollino
  lexicon: HALOT
  rationale: Se eligió 'asno' para mantener una correspondencia sobria y bíblica con el contraste proverbial. 'Burro' es más coloquial; 'pollino' no corresponde aquí.
- source_word: אֵבוּס
  english_pob_choice: feeding trough
  chosen_spanish: pesebre
  alternatives_spanish:
  - comedero
  - establo
  lexicon: HALOT
  rationale: Se optó por 'pesebre' porque en español bíblico designa el lugar o recipiente de alimento del animal y es el equivalente más reconocido de 'feeding trough'. 'Comedero' es posible pero menos tradicional; 'establo' no es exacto.
- source_word: בְּעָלָיו
  english_pob_choice: its master's
  chosen_spanish: de su amo
  alternatives_spanish:
  - de su dueño
  - de su señor
  lexicon: HALOT
  rationale: '''Amo'' refleja bien la relación de autoridad y posesión que el hebreo בעל puede expresar en este proverbio. ''Dueño'' repetiría demasiado; ''señor'' podría sonar honorífico o eclesiástico en español.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre del pueblo del pacto tal como aparece en el original y en la POB inglesa.
- source_word: לֹא יָדַע
  english_pob_choice: does not know
  chosen_spanish: no conoce
  alternatives_spanish:
  - no sabe
  - no reconoce
  lexicon: HALOT
  rationale: Se conserva la repetición con el primer miembro, reproduciendo el contraste retórico. 'No sabe' es menos relacional; 'no reconoce' debilita la reiteración verbal.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Es la equivalencia más directa y solemne para la expresión de pacto en boca divina.
- source_word: הִתְבּוֹנָן
  english_pob_choice: do not understand
  chosen_spanish: no entiende
  alternatives_spanish:
  - no considera
  - no discierne
  lexicon: HALOT
  rationale: '''No entiende'' expresa de manera clara el sentido de comprensión reflexiva del hitpolel de בין y conserva el paralelismo con ''no conoce''. ''No considera'' o ''no discierne'' son posibles pero más interpretativos.'
theological_decisions:
- issue: Objeto implícito del 'no conoce' aplicado a Israel
  english_pob_reading: Leave the object unstated in the main text
  chosen_spanish_reading: Dejar el objeto sin explicitar en el texto principal
  alternative_spanish_readings:
  - Israel no me conoce
  - Israel no conoce a Yahvé
  rationale: El hebreo no expresa el objeto directo y el POB inglés preserva esa tersura. El español puede aclararlo, pero hacerlo resolvería anticipadamente la tensión retórica del versículo; por eso se mantiene la ambigüedad en la línea principal.
  doctrine_reference: Preservar la tensión textual y el énfasis profético sin añadir elementos no escritos.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente y con el dictamen de alta concordancia; no se observan cambios necesarios respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma estándar del proyecto para el nombre divino; aquí no aparece en el texto principal porque el hebreo lo deja implícito y el español sigue la tersura del original.
  - Se mantuvo la repetición de 'conoce' / 'no conoce' para conservar la fuerza retórica del contraste.
  - '''Pesebre'' se eligió por claridad bíblica en español y se anotó la alternativa ''comedero'' implícita en el inglés.'
  - No se introdujo 'Cristo' ni terminología eclesiástica ajena al versículo.
