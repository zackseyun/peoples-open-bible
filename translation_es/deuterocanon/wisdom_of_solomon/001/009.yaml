revisions:
- from: Pues en los planes del impío[a] habrá investigación, y el informe de sus palabras[b] llegará al Señor[c] para la reprobación[d] de sus hechos sin ley.
  to: Pues en los planes del impío[a] habrá investigación, y el informe de sus palabras[b] llegará al Señor para la exposición[c] de sus hechos sin ley[d].
  rationale: Se ajusta ἔλεγχον a 'exposición' para seguir la decisión léxica y teológica documentada en el POB ('the exposing'), que encaja mejor con el matiz evidencial/forense del contexto. Se corrigen los marcadores de notas para que cada nota ancle exactamente en la palabra pertinente, se arregla la ortografía de 'consejos', y se mejora la nota sobre ἀκοὴ para un español más natural.
