  secure, but the occurrence of ⲙⲡⲣⲡⲟⲩϩⲧ ⲉⲃⲟⲗ ⲛⲛϣⲟⲣⲡ and ⲙⲉⲗⲉⲧⲁ suggests neighboring
  imperatives (“do not fear… do not ponder…”) that may belong to an adjacent sub-block.
  I have limited the main line to the shame/shamelessness–limbs complex to avoid false
  precision.'
