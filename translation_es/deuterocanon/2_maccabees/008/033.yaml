translation:
  language: es
  text: Y mientras celebraban la victoria en su patria, quemaron a los que habían incendiado las puertas sagradas, incluso a Calístenes, que había huido a una casa[a] para refugiarse; y recibió la recompensa merecida por su impiedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que había huido a una vivienda para refugiarse». La expresión griega εἰς ἐνοίκιον es inusual, y el matiz exacto del lugar es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπινίκια ... ἄγοντες
  english_pob_choice: while they were celebrating the victory
  chosen_spanish: mientras celebraban la victoria
  alternatives_spanish:
  - mientras llevaban a cabo la celebración de la victoria
  - mientras celebraban el triunfo
  lexicon: LSJ
  rationale: El giro griego describe la celebración posterior a la batalla; en español, «celebraban la victoria» conserva el sentido festivo sin sonar forzado.
- source_word: ἐν τῇ πατρίδι
  english_pob_choice: in their homeland
  chosen_spanish: en su patria
  alternatives_spanish:
  - en su tierra natal
  - en su país
  lexicon: LSJ
  rationale: πατρίς alude a la tierra propia o patria. «Patria» es natural en español y mantiene la referencia colectiva del sujeto.
- source_word: τοὺς ἐμπρήσαντας τοὺς ἱεροὺς πυλῶνας
  english_pob_choice: those who had set fire to the sacred gates
  chosen_spanish: a los que habían incendiado las puertas sagradas
  alternatives_spanish:
  - a los que habían quemado las puertas santas
  - a los que habían prendido fuego a las puertas del santuario
  lexicon: LSJ
  rationale: ἐμπρήσαντας implica quemar/incendiar. «Puertas sagradas» conserva el valor cultual de ἱερούς sin precisar más de lo que dice el griego.
- source_word: Καλλισθένην
  english_pob_choice: Kallisthenes
  chosen_spanish: Kallisthenes
  alternatives_spanish:
  - Calístenes
  lexicon: transliteration
  rationale: Se conserva la transliteración directa del nombre griego según la forma usada en el texto base.
- source_word: ὑφήψαν
  english_pob_choice: they burned
  chosen_spanish: quemaron
  alternatives_spanish:
  - incendiaron
  - prendieron fuego
  lexicon: LSJ
  rationale: El verbo expresa prender fuego o quemar. «Quemaron» es sobrio y fiel; no añade un matiz intensivo que el español no exige aquí.
- source_word: εἰς ἐνοίκιον πεφευγότα
  english_pob_choice: who had fled into a certain house for shelter
  chosen_spanish: que había huido a un cierto alojamiento para refugiarse
  alternatives_spanish:
  - que había huido a una vivienda para refugiarse
  - que había huido a un cierto lugar de alojamiento
  lexicon: LSJ
  rationale: La expresión es inusual y el sustantivo ἐνοίκιον es oscuro en este contexto. «Un cierto alojamiento» preserva la vaguedad y la idea de refugio, sin cerrar indebidamente el sentido.
- source_word: τὸν ἄξιον τῆς δυσσεβείας μισθόν
  english_pob_choice: the reward worthy of his ungodliness
  chosen_spanish: el salario digno de su impiedad
  alternatives_spanish:
  - la recompensa digna de su impiedad
  - el pago merecido de su impiedad
  lexicon: LSJ
  rationale: μισθός puede ser salario, paga o recompensa. Aquí «salario» mantiene la idea de retribución debida; «impiedad» reproduce bien δυσσέβεια como juicio religioso-moral.
theological_decisions:
- issue: Valor cultual de las «puertas sagradas»
  english_pob_reading: sacred gates
  chosen_spanish_reading: puertas sagradas
  alternative_spanish_readings:
  - puertas santas
  - puertas del templo
  rationale: El adjetivo ἱερούς marca pertenencia al ámbito sagrado. «Sagradas» conserva esa fuerza sin introducir una identificación arquitectónica más precisa de la que ofrece el griego.
  doctrine_reference: Principio de primacía del texto fuente; claridad moderna sin sobreespecificar.
- issue: Juicio moral-religioso de δυσσέβεια
  english_pob_reading: ungodliness
  chosen_spanish_reading: impiedad
  alternative_spanish_readings:
  - irreverencia
  - maldad impía
  rationale: El término expresa falta de piedad o reverencia ante lo sagrado. «Impiedad» es un equivalente directo y digno en español, manteniendo el juicio religioso del pasaje.
  doctrine_reference: Traducción semántica de categorías ético-religiosas del griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que suavizó «burned up» a «burned» por naturalidad formal, y mantuvo la vaguedad de εἰς ἐνοίκιον. Por eso el español usa «quemaron» y conserva «un cierto alojamiento» sin precisar el tipo de lugar.
  spanish_consistency_notes:
  - Se mantuvo un español neutral y litúrgicamente sobrio, evitando calcos innecesarios.
  - «Impiedad» se conserva de forma consistente para δυσσέβεια, en lugar de sustituirlo por un término moral más genérico.
  - Se preservó la ambigüedad del lugar de refugio con una nota, como exige el testimonio griego y el audit trail inglés.
