translation:
  language: es
  text: Y tomaron su posición en medio de la parcela y la libraron[a], y derrotaron a los filisteos, y Yahvé dio una gran victoria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la rescataron' o 'la salvaron'; el objeto es la parcela defendida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְיַצְּבוּ
  english_pob_choice: they took their stand
  chosen_spanish: se pusieron en medio del terreno
  alternatives_spanish:
  - tomaron su puesto
  - se afirmaron
  - se colocaron firmemente
  lexicon: HALOT
  rationale: El hitpael de יצב expresa tomar una posición firme. En español, "se pusieron" con el matiz contextual de firmeza conserva la decisión militar sin sonar forzado; la idea de posición se completa con el contexto de defensa del terreno.
- source_word: בְּתוֹךְ הַחֶלְקָה
  english_pob_choice: in the middle of the plot
  chosen_spanish: en medio del terreno
  alternatives_spanish:
  - en medio de la parcela
  - en el centro del campo
  - en medio del lote
  lexicon: HALOT
  rationale: בְּתוֹךְ es "en medio de" y חֶלְקָה designa una parcela o porción de terreno. "Terreno" comunica el espacio disputado con naturalidad en español; "parcela" sería más preciso pero algo más técnico.
- source_word: וַיַּצִּילוּהָ
  english_pob_choice: delivered it
  chosen_spanish: lo libraron
  alternatives_spanish:
  - lo rescataron
  - lo salvaron
  - lo defendieron
  lexicon: HALOT
  rationale: נצל aquí tiene sentido de librar/deliverar algo del enemigo. Como el objeto es el terreno, "lo libraron" conserva la protección efectiva sin introducir una personificación innecesaria. El pronombre neutro español funciona bien para un sustantivo masculino como "terreno".
- source_word: וַיַּכּוּ אֶת־פְּלִשְׁתִּים
  english_pob_choice: they struck down the Philistines
  chosen_spanish: hirieron a los filisteos
  alternatives_spanish:
  - derribaron a los filisteos
  - golpearon a los filisteos
  - vencieron a los filisteos
  lexicon: HALOT
  rationale: נכה puede significar herir, golpear o abatir en combate. "Hirieron" preserva la fuerza bélica sin añadir explícitamente una matanza que el hebreo aquí no expresa de manera directa. También mantiene el paralelismo narrativo con la acción previa de defensa.
- source_word: וַיּוֹשַׁע יְהוָה
  english_pob_choice: the LORD saved by a great victory
  chosen_spanish: Yahvé otorgó una gran salvación
  alternatives_spanish:
  - Yahvé dio una gran victoria
  - Yahvé salvó con una gran salvación
  - Yahvé concedió una gran liberación
  lexicon: HALOT
  rationale: El verbo ישׁע y el sustantivo תשועה forman un juego léxico que conviene preservar. "Otorgó una gran salvación" conserva la raíz salvación/ salvar y evita forzar un objeto explícito que no está en hebreo. "Otorgó" refleja la intervención divina eficaz y solemne.
- source_word: תְּשׁוּעָה גְדוֹלָה
  english_pob_choice: a great victory
  chosen_spanish: una gran salvación
  alternatives_spanish:
  - una gran victoria
  - una gran liberación
  - un gran rescate
  lexicon: HALOT
  rationale: תשועה puede ser salvación, liberación o victoria. Dado el enlace verbal inmediato con ישׁע, "salvación" preserva mejor la red léxica que elige el texto fuente; "victoria" sería interpretativa y más contextual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política del proyecto para יְהוָה es "Yahvé" en el texto principal. Se evita "SEÑOR" como sustituto para mantener el nombre divino revelado y auditable.
theological_decisions:
- issue: Relación entre ישׁע / תשועה y la intervención divina
  english_pob_reading: the LORD saved by a great victory
  chosen_spanish_reading: Yahvé otorgó una gran salvación
  alternative_spanish_readings:
  - Yahvé dio una gran victoria
  - Yahvé concedió una gran liberación
  rationale: El hebreo une el verbo de salvar con el sustantivo de salvación, de modo que la traducción debe conservar esa tensión semántica. "Salvación" en español mantiene el vínculo teológico con la acción salvadora de Yahvé sin reducirlo solo a éxito militar.
  doctrine_reference: 'DOCTRINE.md Contested terms: ישׁע / תשועה'
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre propio divino en forma castellana usual del proyecto. Esto evita el reemplazo por un título y mantiene la referencia covenantal al Dios de Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó el objeto explícito después de "saved" por no estar en el hebreo. En español se siguió esa cautela: "otorgó una gran salvación" no añade un objeto no expresado. También se mantuvo la lógica léxica de salvación/victoria del audit trail, pero sin sobretraducirla.'
  spanish_consistency_notes:
  - Se usa "Yahvé" para יְהוָה conforme al estándar del proyecto.
  - Se conserva la relación léxica entre "salvar/salvación" para reflejar ישׁע / תשועה.
  - '"Filisteos" se mantiene como etnónimo tradicional y claro en español.'
  - El registro es sobrio y narrativo, apto para publicación eclesial sin arcaísmos excesivos.
