translation:
  language: es
  text: No, sino que mañana, a esta hora, enviaré a mis siervos a ti, y ellos registrarán tu casa y las casas de tus siervos; y todo lo que es deseable ante tus ojos[a], lo pondrán en sus manos y se lo llevarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo precioso a tus ojos», es decir, todo lo que valoras mucho.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo pondrán en sus manos y lo tomarán»; la expresión significa apoderarse de ello y llevárselo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - No, pero
  - Más bien
  lexicon: HALOT
  rationale: La combinación hebrea funciona aquí de modo adversativo y correctivo, rechazando la limitación previa y pasando a la amenaza. «No, sino que» expresa esa corrección con naturalidad en español y conserva la fuerza de contraste.
- source_word: כָּעֵת מָחָר
  english_pob_choice: about this time tomorrow
  chosen_spanish: mañana, a esta hora
  alternatives_spanish:
  - a esta hora mañana
  - más o menos a esta misma hora mañana
  lexicon: HALOT
  rationale: La expresión hebrea señala aproximadamente la misma hora del día siguiente. «Mañana, a esta hora» es idiomático en español y preserva la referencia temporal sin añadir precisión excesiva.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis esclavos
  alternatives_spanish:
  - mis servidores
  - mis sirvientes
  - mis funcionarios
  lexicon: HALOT
  rationale: Aquí el término hebreo es עֲבָדִים, y la política POB normalmente mantiene la fuerza léxica de «esclavos» cuando esa es la opción lexical auditada; no se atenúa a «sirvientes» sin razón contextual suficiente. En el contexto real del envío real, la relación de sujeción sigue siendo parte del valor del término.
- source_word: וְחִפְּשׂוּ
  english_pob_choice: they will search
  chosen_spanish: buscarán
  alternatives_spanish:
  - examinarán
  - registrarán
  - buscarán minuciosamente
  lexicon: HALOT
  rationale: El verbo indica una búsqueda cuidadosa o minuciosa. «Buscarán» es el equivalente más natural y conserva la idea de registrar sin introducir una carga interpretativa mayor de la que exige el hebreo.
- source_word: בֵּיתְךָ ... בָּתֵּי עֲבָדֶיךָ
  english_pob_choice: your house and the houses of your servants
  chosen_spanish: tu casa y las casas de tus esclavos
  alternatives_spanish:
  - tu casa y las casas de tus servidores
  - tu palacio y las casas de tus esclavos
  - tu casa y las casas de tus sirvientes
  lexicon: HALOT
  rationale: בַּיִת puede ser «casa» o «palacio», pero aquí conviene conservar el paralelismo visible con «las casas de tus esclavos». «Casa» mantiene la imagen hebrea y no fuerza una lectura palaciega que el texto no necesita explicitar.
- source_word: כָּל מַחְמַד עֵינֶיךָ
  english_pob_choice: whatever is desirable in your eyes
  chosen_spanish: todo lo que es deseable a tus ojos
  alternatives_spanish:
  - todo lo que tus ojos desean
  - todo lo precioso a tus ojos
  - todo lo que estimas valioso
  lexicon: HALOT
  rationale: La frase hebrea nombra lo que es precioso o deseable para alguien. «Todo lo que es deseable a tus ojos» conserva el giro semítico y la tensión idiomática, permitiendo a la vez la lectura de valor estimado o apetecido.
- source_word: יָשִׂימוּ בְיָדָם
  english_pob_choice: they will put into their hands
  chosen_spanish: lo pondrán en sus manos
  alternatives_spanish:
  - lo tomarán en sus manos
  - se apoderarán de ello
  - lo meterán en sus manos
  lexicon: HALOT
  rationale: La expresión es literalmente «poner en la mano», pero en contexto significa apoderarse o confiscar. «Lo pondrán en sus manos» mantiene la secuencia verbal del hebreo antes de completar el sentido con el verbo siguiente.
- source_word: וְלָקָחוּ
  english_pob_choice: and take away
  chosen_spanish: y se lo llevarán
  alternatives_spanish:
  - y lo tomarán
  - y lo quitarán
  - y lo arrebatarán
  lexicon: HALOT
  rationale: El verbo final completa la idea de confiscación y traslado. «Se lo llevarán» expresa bien la remoción resultante sin sobrecargar el pasaje con una traducción más violenta de la que el contexto exige.
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido del versículo; se mantiene el mismo sentido auditado. La presente redacción conserva la estructura adversativa, el temporal idiomático, la fuerza de עֲבָדִים y la locución final de confiscación sin suavizar el registro.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva «esclavos» para עֲבָדִים conforme al valor léxico auditado y al estilo POB, evitando la atenuación a «sirvientes» sin necesidad contextual.
  - La frase idiomática final conserva el paralelismo de manos/toma para no perder la tensión semítica del hebreo.
