translation:
  language: es
  text: 'La reconoció y dijo: «Es la túnica de mi hijo. Un animal salvaje lo ha devorado. Yosef[a] ciertamente ha sido despedazado.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Forma hebrea del nombre; la forma tradicional en español es «José».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכִּירָהּ
  english_pob_choice: He recognized it
  chosen_spanish: Lo reconoció
  alternatives_spanish:
  - La reconoció
  - Lo identificó
  lexicon: HALOT
  rationale: El verbo נכר en hifil expresa reconocer o identificar. En español, «lo» funciona de manera natural para referirse a la túnica, cuyo sustantivo es femenino, pero el clítico neutro evita una construcción pesada. «Reconoció» conserva el valor narrativo y evita una paráfrasis excesiva.
- source_word: כְּתֹנֶת בְּנִי
  english_pob_choice: my son’s tunic
  chosen_spanish: la túnica de mi hijo
  alternatives_spanish:
  - la túnica de mi hijo
  - el manto de mi hijo
  - la prenda de mi hijo
  lexicon: HALOT
  rationale: כְּתֹנֶת designa una túnica o prenda larga; «túnica» es más exacto que «manto» y más source-near que «ropa». Se evita «coat» tradicional por no corresponder bien al hebreo. El posesivo se expresa de forma natural con «de mi hijo».
- source_word: חַיָּה רָעָה
  english_pob_choice: a wild animal has devoured him
  chosen_spanish: Un animal salvaje
  alternatives_spanish:
  - una fiera
  - una bestia salvaje
  - un animal salvaje
  lexicon: HALOT
  rationale: חַיָּה puede significar animal salvaje o bestia; רָעָה aquí califica como dañino, feroz o peligroso, no necesariamente moralmente «malo». «Animal salvaje» comunica el sentido predatorio sin sobrerinterpretar el adjetivo. En la nota se conserva la alternativa «fiera» como posibilidad idiomática.
- source_word: אֲכָלָתְהוּ
  english_pob_choice: has devoured him
  chosen_spanish: lo ha devorado
  alternatives_spanish:
  - lo ha comido
  - lo ha consumido
  lexicon: HALOT
  rationale: El perfecto verbal expresa la conclusión de Jacob; «ha devorado» transmite mejor la acción depredadora que «ha comido». Se mantiene el objeto pronominal directo «lo» para referirse a José.
- source_word: טָרֹף טֹרַף
  english_pob_choice: has surely been torn to pieces
  chosen_spanish: ha sido despedazado
  alternatives_spanish:
  - ha sido hecho pedazos
  - ha sido desgarrado
  - ha sido destrozado
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto intensifica la acción; el español publica la fuerza con «sin duda» y «despedazado». «Despedazado» comunica con claridad el resultado violento y permite evitar un calco torpe de la repetición hebrea.
- source_word: יוֹסֵף
  english_pob_choice: Yosef
  chosen_spanish: José
  alternatives_spanish:
  - Yosef
  lexicon: HALOT
  rationale: En español bíblico la forma asentada y reconocible es «José». Aunque el POB inglés translitera «Yosef» por principio, en español la forma tradicional mantiene inteligibilidad litúrgica y no altera el referente.
theological_decisions:
- issue: Nombre propio de Yosef/José
  english_pob_reading: 'Hebrew: “Yosef.” Traditional English: “Joseph.”'
  chosen_spanish_reading: José
  alternative_spanish_readings:
  - Yosef
  rationale: No hay tensión doctrinal, sino una decisión de forma onomástica. En español, «José» es la forma histórica y ampliamente inteligible; no requiere nota de variante salvo que el proyecto decidiera uniformar transliteraciones propias, lo que aquí no conviene por legibilidad.
  doctrine_reference: Onomástica bíblica / convención de traducción
- issue: Valor de חַיָּה רָעָה
  english_pob_reading: a wild animal has devoured him
  chosen_spanish_reading: un animal salvaje lo ha devorado
  alternative_spanish_readings:
  - una bestia salvaje lo ha devorado
  - una fiera lo ha devorado
  rationale: Se evita cargar el adjetivo con una valoración moral que el contexto no exige. El foco narrativo es el supuesto ataque depredador, no una cualidad ética del animal.
  doctrine_reference: Lexema hebreo y contexto narrativo
- issue: Intensificación de טָרֹף טֹרַף
  english_pob_reading: has surely been torn to pieces
  chosen_spanish_reading: sin duda ha sido despedazado
  alternative_spanish_readings:
  - ha sido despedazado, sí, despedazado
  - ha sido hecho pedazos
  rationale: La repetición hebrea intensifica la certeza y la violencia del daño. En español, «sin duda» junto con «despedazado» preserva la fuerza sin forzar una duplicación antinatural.
  doctrine_reference: Aspecto retórico hebreo / intensificación
translation_notes:
  revision_awareness: El inglés auditable pasó por una revisión que quitó «vicious» y dejó «a wild animal»; el español sigue esa línea con «animal salvaje» y evita añadir dureza interpretativa no requerida. También se mantuvo la transliteración auditada del nombre en el contexto fuente, pero en español se eligió la forma tradicional «José» por legibilidad y convención bíblica.
  spanish_consistency_notes:
  - Se preserva el tiempo perfecto compuesto para reflejar el estado resultante en el discurso directo.
  - Se evita «SEÑOR» y otros reemplazos no pertinentes; no hay términos divinos en este versículo.
  - La repetición intensiva hebrea se compensa con una nota y con «sin duda» para no perder la fuerza retórica.
  - La traducción usa español neutro, público y bíblicamente reconocible, sin calco excesivo.
