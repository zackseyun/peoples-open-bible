- from: Así pues[a], cuando el tirano Antíoco se hubo sentado con su consejo en un lugar elevado, y sus tropas, completamente armadas, estaban de pie alrededor por todos lados,
  to: Así pues[a], cuando el tirano Antíoco había tomado asiento con su consejo en cierto lugar elevado, y sus tropas, completamente armadas, estaban de pie a su alrededor, por todos lados,
