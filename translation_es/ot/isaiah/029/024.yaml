    rationale: El rastro inglés documenta la alternativa 'teaching' para לֶקַח ('instrucción/enseñanza'), no una alternativa para בִּינָה ni para 'llegarán a entender'. 'Llegarán a la enseñanza' no corresponde al hebreo.
  - severity: medium
    issue: '''En el espíritu'' introduce una determinación que puede sonar menos natural y más pneumatológica en español.'
    rationale: El hebreo תֹעֵי רוּחַ no exige artículo definido en español. 'En espíritu' conserva mejor la ambigüedad antropológica ('ánimo/disposición interior') sin sugerir necesariamente al Espíritu Santo.
  - severity: low
    issue: La redacción de la nota [a] necesita normalización estilística.
    rationale: 'La formulación actual con comillas anidadas es torpe. Conviene presentarla de forma limpia: ''O: «los que yerran en espíritu».'''
  revised_spanish_text: Y los que se extravían en espíritu[a] llegarán a entender, y los que murmuran aprenderán instrucción[b].
