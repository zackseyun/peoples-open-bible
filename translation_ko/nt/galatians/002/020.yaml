  - 하나님의 아들의 신실하심
  rationale: 갈 2:16과 동일한 πίστις + 속격 구문이므로 같은 정책을 일관되게 적용한다.
  doctrine_reference: 'DOCTRINE.md: preserve genitive ambiguities'
