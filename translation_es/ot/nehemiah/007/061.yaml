base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/007/061.yaml
  text: And these were the ones who came up from Tel-melah[a], Tel-harsha, Kerub, Addon, and Immer, but they were not able to declare their fathers’ houses or their offspring[c][b], whether they were from Israel.
  footnotes:
