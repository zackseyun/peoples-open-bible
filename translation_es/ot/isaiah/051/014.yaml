translation:
  language: es
  text: El que está encorvado[a] pronto será liberado; no morirá en el hoyo[b], y no le faltará pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el cautivo pronto será liberado». La expresión hebrea es difícil; puede evocar a alguien encorvado bajo opresión y luego liberado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el calabozo». El hebreo para «hoyo» puede referirse literalmente a un hoyo, a un calabozo o, en sentido figurado, a destrucción o sepultura.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִהַר
  english_pob_choice: will soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - en seguida
  lexicon: HALOT
  rationale: El hebreo expresa prisa o inminencia; en español, "pronto" comunica mejor la cercanía de la acción futura que una forma más mecánica como "rápidamente".
- source_word: צֹעֶה
  english_pob_choice: the one bent low
  chosen_spanish: el que estaba humillado
  alternatives_spanish:
  - el que estaba doblado
  - el cautivo
  - el que estaba inclinado
  lexicon: HALOT
  rationale: La forma es difícil y puede sugerir a alguien encorvado o abatido bajo opresión. "Humillado" conserva la idea de abatimiento sin forzar un sentido demasiado específico como "cautivo".
- source_word: לְהִפָּתֵחַ
  english_pob_choice: be set free
  chosen_spanish: ser liberado
  alternatives_spanish:
  - ser abierto
  - ser soltado
  lexicon: HALOT
  rationale: Aunque literalmente significa "ser abierto", en este contexto el hebreo funciona idiomáticamente como liberación de confinamiento. "Ser liberado" comunica la fuerza del pasaje de manera natural en español.
- source_word: לַשַּׁחַת
  english_pob_choice: in the pit
  chosen_spanish: en el hoyo
  alternatives_spanish:
  - en la fosa
  - en el pozo
  - en el calabozo
  lexicon: HALOT
  rationale: שחת puede referirse a un hoyo, fosa, sepulcro o lugar de destrucción. "Hoyo" mantiene la imagen concreta y abierta, sin decidir prematuramente entre cárcel, sepultura o ruina.
- source_word: לַחְמוֹ
  english_pob_choice: his bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su comida
  lexicon: HALOT
  rationale: '"Pan" conserva la imagen concreta del hebreo y su uso por extensión para alimento básico. En español es idiomático y mantiene el tono sobrio del texto.'
theological_decisions:
- issue: Identidad del sujeto singular
  english_pob_reading: A singular oppressed person used representatively for the exiled people of God
  chosen_spanish_reading: Un singular representativo que encarna al pueblo oprimido/exiliado
  alternative_spanish_readings:
  - Un preso concreto
  - Un sufriente genérico
  rationale: Se conserva el singular porque el hebreo lo exige, pero la frase española queda amplia para permitir la lectura representativa del conjunto del pueblo en el contexto de liberación.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Valor de שחת
  english_pob_reading: '''pit'' can refer literally to a pit, dungeon, or figuratively to destruction/grave'
  chosen_spanish_reading: '"Hoyo" como imagen concreta, sin cerrar la posibilidad de fosa, calabozo o ruina'
  alternative_spanish_readings:
  - '"fosa"'
  - '"calabozo"'
  - '"sepulcro"'
  rationale: La polisemia del término hebreo se preserva mejor con una palabra española amplia. Así no se elimina la tensión documentada entre imagen física y sentido de destrucción o encierro.
  doctrine_reference: HALOT, שַׁחַת
- issue: Paralelismo de provisión
  english_pob_reading: his bread will not be lacking
  chosen_spanish_reading: no le faltará su pan
  alternative_spanish_readings:
  - su pan no faltará
  - no carecerá de pan
  rationale: La construcción mantiene el paralelismo breve del hebreo y conserva el matiz de provisión básica, sin volverla más abstracta de lo necesario.
  doctrine_reference: DOCTRINE.md §Translation philosophy
translation_notes:
  revision_awareness: El último repaso indicó que no se necesitaban cambios y que hubo alto acuerdo con la evaluación comparativa; esta versión conserva ese enfoque, manteniendo las ambigüedades documentadas sin sobreinterpretarlas.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece un término divino.
  - '"Pan" se mantiene como imagen concreta y no se generaliza a "alimento" para no perder la correspondencia léxica con el hebreo.'
  - Se preserva el singular verbal y pronominal para respetar la gramática del hebreo y la lectura representativa del sujeto.
