review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: los magos no podían comparecer ante Moisés por la aflicción, y la plaga afectaba tanto a ellos como al resto de Egipto. Sin embargo, no sigue la decisión auditada del POB inglés en el último sintagma: el inglés hizo explícito el referente personal implícito en וּבְכָל מִצְרַיִם (''y sobre todos los egipcios''), mientras que el español principal volvió a la literalidad ''en todo Egipto''. Además, ''mantenerse en pie'' añade un matiz de duración no necesario; ''estar de pie'' o ''presentarse'' refleja mejor לַעֲמֹד לִפְנֵי en este contexto.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para ajustarse mejor al sentido narrativo y al estilo natural. 'Forúnculos' es comprensible, aunque algo clínico; no es un error. El problema principal es 'en todo Egipto' en el texto principal, porque suena locativo donde el contexto exige afectación personal. También 'en los magos' resulta menos idiomático que 'sobre los magos' o mejor aún una reestructuración paralela con 'sobre'.
  glossary_alignment: 'No hay conflictos con los términos teológicos de proyecto. ''Los magos'' para חַרְטֻמִּים es aceptable. La desviación importante es frente a la rationale léxica documentada para וּבְכָל מִצְרַיִם: el español debe preservar la explicitación personal que el POB inglés ya adoptó, dejando la literalidad para nota.'
  issues:
  - severity: high
    issue: El texto principal dice 'y en todo Egipto' en lugar de explicitar el referente personal implícito.
    rationale: El POB inglés decidió conscientemente traducir וּבְכָל מִצְרַיִם como 'and on all the Egyptians', dejando 'in all Egypt' en nota. El borrador no preserva esa decisión documentada y produce una lectura más locativa que personal.
  - severity: medium
    issue: '''Mantenerse en pie delante de Moisés'' añade un matiz aspectual no exigido por el hebreo.'
    rationale: לַעֲמֹד לִפְנֵי aquí expresa estar/presentarse ante Moisés. 'Estar de pie delante de Moisés' conserva mejor la forma y evita la idea adicional de perseverar en pie.
  - severity: medium
    issue: '''Estaban en los magos'' suena menos natural para una afección corporal.'
    rationale: Aunque ב puede reflejarse de forma amplia, en español una plaga cutánea se expresa mejor como algo 'sobre' una persona o mediante una formulación equivalente. Esto además ayuda al paralelismo con 'sobre todos los egipcios'.
  revised_spanish_text: Y los magos no pudieron estar de pie delante de Moisés a causa de los forúnculos,[a] porque los forúnculos estaban sobre los magos y sobre todos los egipcios.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente, «en todo Egipto». La traducción expresa el sentido personal implícito en el contexto: los forúnculos estaban sobre la gente por todo Egipto.'
    reason: lexical_alternative
  revision_rationale: La revisión alinea el español con la decisión auditada del POB inglés al hacer explícito el referente personal de וּבְכָל מִצְרַיִם en el texto principal y reservar la literalidad para la nota. También suaviza 'mantenerse en pie' a 'estar de pie', más cercano al hebreo idiomático, y mejora la naturalidad corporal con 'sobre los magos'.
