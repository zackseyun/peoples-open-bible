translation:
  language: es
  text: ¿Cómo puede hacerse sabio el que sostiene el arado[a], y el que se gloría en el asta del aguijón[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo preservado de esta línea es difícil. El paralelo griego transmite un sentido distinto, referido al escriba y al ocio; aquí el texto principal sigue la revisión reciente que conserva la imagen agrícola del hebreo.
    reason: textual_variant
  - marker: b
    text: El hebreo de esta expresión es oscuro. Se conserva la imagen de manera bastante literal como referencia agrícola, aunque la formulación exacta sigue siendo incierta.
    reason: textual_variant
lexical_decisions:
- source_word: תומך מלמד / γραμματέως
  english_pob_choice: a scribe
  chosen_spanish: el que sostiene el arado
  alternatives_spanish:
  - el escriba
  - el copista
  - el hombre instruido
  lexicon: HALOT; BDAG
  rationale: El hebreo preservado en esta forma apunta a una lectura agrícola difícil, y la revisión reciente del texto en el expediente favorece seguir esa tradición en lugar de sustituirla por el griego γραμματέως. En español, "el que sostiene el arado" mantiene la imagen concreta sin forzar una normalización a "escriba" que no está respaldada por el hebreo recibido.
- source_word: יתחכם / σοφισθήσεται
  english_pob_choice: will become wise
  chosen_spanish: hacerse sabio
  alternatives_spanish:
  - volverse sabio
  - llegar a ser sabio
  - ser sabio
  lexicon: HALOT; BDAG
  rationale: La forma hebrea y el verbo griego expresan el surgir de sabiduría o destreza. "Hacerse sabio" conserva el matiz de adquisición o cambio de estado y resulta natural en español, sin reducir la fuerza sapiencial del dicho.
- source_word: ומתפאר
  english_pob_choice: boasts
  chosen_spanish: se gloría
  alternatives_spanish:
  - se jacta
  - se envanece
  - se glorifica
  lexicon: HALOT
  rationale: '"Se gloría" comunica bien la autocomplacencia o autoexaltación del verbo en un registro bíblico comprensible. Evita tanto la aspereza excesiva de "se jacta" como una intensificación doctrinal no requerida.'
- source_word: בחתנית מסעיר
  english_pob_choice: in the shaft of the goad
  chosen_spanish: en el vástago del aguijón
  alternatives_spanish:
  - en el mango del aguijón
  - en la vara del aguijón
  - en el asta del aguijón
  lexicon: HALOT
  rationale: El sintagma hebreo es oscuro, y la tradición inglesa lo vierte con una imagen concreta del implemento agrícola. "Vástago" permite conservar la idea de la pieza de madera del aguijón sin sobreespecificar una forma que el hebreo no garantiza; "aguijón" mantiene el objeto, aunque la construcción sigue siendo deliberadamente extraña por fidelidad al original.
theological_decisions:
- issue: Tensión textual entre el hebreo preservado y el paralelo griego
  english_pob_reading: The translation follows the clearer Greek sense here, especially 'scribe' and the idea that wisdom comes through leisure.
  chosen_spanish_reading: Seguir el hebreo difícil en la imagen agrícola, sin armonizarlo al griego en el texto principal.
  alternative_spanish_readings:
  - Seguir el griego y decir 'el escriba... con el tiempo libre'
  - Ofrecer una paráfrasis que combine ambas tradiciones
  rationale: 'El expediente señala una revisión que devuelve la línea al hebreo recibido, aunque el griego ofrece un proverbio más transparente. Para una POB en español, la transparencia exige no borrar esa tensión: el texto principal conserva la lectura hebrea difícil, mientras el aparato de decisiones deja constancia del paralelo griego como apoyo textual.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using Greek parallel as actual input for Sirach'
translation_notes:
  revision_awareness: 'El expediente contiene una revisión reciente que sustituyó una versión basada en el griego por otra que sigue el hebreo: "holds the plow" para תומך מלמד, "become wise" para יתחכם, y "boasts in the shaft of the goad" para ומתפאר בחתנית מסעיר. La presente propuesta toma esa revisión como guía principal y evita reintroducir la lectura griega en el cuerpo del verso.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el nombre divino aparezca; este versículo no lo contiene.
  - Se evita "Cristo" o terminología cristológica porque no corresponde al texto.
  - El registro es bíblico pero moderno, sin depender de fórmulas Reina-Valera si no son necesarias.
  - Las imágenes agrícolas se preservan aunque suenen extrañas, porque el expediente las trata como texto difícil y no como metáfora a suavizar.
