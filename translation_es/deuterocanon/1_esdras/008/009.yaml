translation:
  language: es
  text: Rey Artajerjes, a Ezra el sacerdote y lector de la ley del Señor[a], saludos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice “lector de la ley del Señor”; el paralelo hebreo de Esdras 7:12 tiene “escriba de la ley del Dios del cielo”.
    reason: alternative_reading
lexical_decisions:
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: El rey
  alternatives_spanish:
  - Rey
  - El rey Artajerjes
  lexicon: LSJ
  rationale: La fórmula epistolar en español suena natural con el título antes del nombre. Se conserva el valor titular de βασιλεύς sin añadir artículos innecesarios al estilo castellano bíblico contemporáneo.
- source_word: Ἀρταξέρξης
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artaxerxes
  lexicon: Transliteración histórica española / uso bíblico
  rationale: En español bíblico tradicional y moderno es muy común 'Artajerjes'; comunica el mismo nombre propio sin perder identificabilidad.
- source_word: Ἔσρᾳ
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Esra
  - Ezra
  lexicon: Transliteración bíblica española
  rationale: El griego Ἔσρᾳ corresponde al nombre conocido en español como 'Esdras'. Aunque la POB inglesa usa 'Ezra', en español 'Esdras' es la forma establecida y plenamente inteligible.
- source_word: τῷ ἱερεῖ
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote consagrado
  - el presbítero
  lexicon: LSJ / uso bíblico
  rationale: ἱερεύς designa al oficio cultual de sacerdote. 'Sacerdote' es el equivalente natural y exacto en español; 'presbítero' desplazaría el sentido hacia un término eclesial posterior.
- source_word: ἀναγνώστῃ
  english_pob_choice: reader
  chosen_spanish: lector
  alternatives_spanish:
  - lector público
  - el que lee
  lexicon: LSJ
  rationale: El sustantivo significa 'lector' o 'recitador'. 'Lector' refleja el oficio sin armonizarlo con el hebreo paralelo que dice 'escriba'; así se preserva la tensión documental del testimonio griego.
- source_word: τοῦ νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la Ley
  lexicon: LSJ
  rationale: La construcción genitiva se vierte de manera directa y natural. Se usa minúscula porque aquí la frase funciona descriptivamente, aunque alude a la ley divina.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: LSJ / política del proyecto para κύριος
  rationale: Aunque el proyecto suele rendir el nombre divino como 'Yahvé' cuando el texto lo exige, aquí la cadena griega dice expresamente 'του Κυρίου' en una fórmula fija; 'del Señor' conserva la lectura epistolar y coincide con el audit trail inglés. En la nota se preserva la alternativa del paralelo hebreo con 'Dios'.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - que te vaya bien
  - salutación
  lexicon: LSJ
  rationale: En aperturas de carta, χαίρειν funciona como saludo convencional. 'Saludos' es la solución idiomática en español y mantiene el tono formal del encabezado.
theological_decisions:
- issue: Relación entre el griego 'lector de la ley del Señor' y el paralelo hebreo/masorético 'escriba de la ley del Dios del cielo'
  english_pob_reading: reader
  chosen_spanish_reading: lector
  alternative_spanish_readings:
  - escriba
  rationale: Se mantiene el griego como texto primario de 1 Esdras. El paralelo hebreo sirve de control, pero no reemplaza la terminología explícita de ἀναγνώστῃ. La alternativa 'escriba' se deja implícita en la nota para lectores que conocen la tradición de Esdras 7:12.
  doctrine_reference: Primacía del testimonio original griego en 1 Esdras; paralelos del hebreo como apoyo secundario, no como normalización obligatoria.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de Swete como fuente primaria y conserva la tensión documentada con el paralelo hebreo, sin armonizarla. Se adoptó la forma española establecida 'Artajerjes' y 'Esdras' por naturalidad y reconocimiento eclesial, manteniendo el oficio explícito de 'lector'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' en versales; se usa 'Señor' en lectura normal, conforme al mandato del proyecto para renderizar κύριος cuando no se está citando explícitamente el tetragrámaton.
  - '''Sacerdote'' se usa para ἱερεύς; no se sustituye por ''presbítero'', que sería anacrónico.'
  - '''Lector'' conserva el sentido griego sin armonizar con el hebreo ''escriba''.'
  - El saludo final 'saludos' reproduce la función epistolar de χαίρειν sin sobretraducción.
