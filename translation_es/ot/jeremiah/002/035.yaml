translation:
  language: es
  text: 'Pero tú dijiste: «Soy inocente; sin duda su ira se ha apartado de mí». He aquí, entro en juicio contigo[a] porque dices: «No he pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entro en juicio contigo»; el hebreo usa lenguaje de tribunal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמְרִי
  english_pob_choice: Yet you said
  chosen_spanish: Todavía dijiste
  alternatives_spanish:
  - Y dijiste
  - Pero dijiste
  lexicon: HALOT
  rationale: La forma con waw consecutiva mantiene la acusación en continuidad con el contexto previo y, a la vez, marca contraste. «Todavía» conserva mejor ese matiz adversativo/retador que un simple «y».
- source_word: נִקֵּיתִי
  english_pob_choice: I am innocent
  chosen_spanish: Soy inocente
  alternatives_spanish:
  - Soy limpio
  - Soy libre de culpa
  - He sido absuelta
  lexicon: HALOT
  rationale: En este contexto judicial-moral, el participio/estado de נקה se expresa con naturalidad como inocencia. «Soy inocente» comunica de forma clara la afirmación de no culpabilidad sin sobrecargar el castellano.
- source_word: אַךְ
  english_pob_choice: surely
  chosen_spanish: sin duda
  alternatives_spanish:
  - ciertamente
  - solo
  - verdaderamente
  lexicon: HALOT
  rationale: Aquí אַךְ intensifica la aseveración falsa de la hablante. «Sin duda» preserva la fuerza enfática sin introducir exclusividad.
- source_word: שָׁב אַפּוֹ מִמֶּנִּי
  english_pob_choice: his anger has turned away from me
  chosen_spanish: se apartó de mí su ira
  alternatives_spanish:
  - su ira se volvió de mí
  - su ira se retiró de mí
  - su furor se apartó de mí
  lexicon: HALOT
  rationale: El giro con שׁוב + אַף es idiomático para la retirada de la ira. «Se apartó de mí su ira» suena natural en español y conserva la imagen verbal de alejamiento.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La partícula deíctica introduce una respuesta solemne y llamativa. «¡Mira!» mantiene la irrupción retórica en un español actual; se conserva la solemnidad con puntuación enfática.
- source_word: נִשְׁפָּט אֹתָךְ
  english_pob_choice: I am entering into judgment with you
  chosen_spanish: entro en juicio contigo
  alternatives_spanish:
  - entro a contender contigo en juicio
  - me presento en juicio contigo
  - te hago comparecer en juicio
  lexicon: HALOT
  rationale: El hebreo usa lenguaje forense; en español, «entro en juicio contigo» conserva la idea de proceso/controversia judicial sin borrar la ambigüedad entre ‘contender’ y ‘juzgar’ que el audit trail preserva.
- source_word: עַל אָמְרֵךְ
  english_pob_choice: because you say
  chosen_spanish: porque dices
  alternatives_spanish:
  - por decir
  - a causa de que dices
  - debido a que dices
  lexicon: HALOT
  rationale: עַל introduce la base causal de la acción divina. «Porque dices» es la manera más directa y idiomática de expresar esa causalidad en castellano.
- source_word: לֹא חָטָאתִי
  english_pob_choice: I have not sinned
  chosen_spanish: No he pecado
  alternatives_spanish:
  - No pequé
  - No he cometido pecado
  lexicon: HALOT
  rationale: El perfecto de חטא en el discurso citado se refleja bien con el presente perfecto español. «No he pecado» mantiene la negación de culpabilidad con sencillez y fidelidad.
theological_decisions:
- issue: Nuance judicial de נִשְׁפָּט אֹתָךְ
  english_pob_reading: I am entering into judgment with you
  chosen_spanish_reading: entro en juicio contigo
  alternative_spanish_readings:
  - te juzgo
  - entro a disputar contigo en juicio
  - presento juicio contra ti
  rationale: Se preserva el lenguaje de tribunal sin cerrar la lectura a una sola formulación doctrinal. «Entro en juicio contigo» refleja la escena forense y mantiene la tensión documentada entre ‘juzgar’ y ‘contender en juicio’.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Autocomprensión falsa de inocencia
  english_pob_reading: I am innocent; surely his anger has turned away from me
  chosen_spanish_reading: Soy inocente; sin duda se apartó de mí su ira
  alternative_spanish_readings:
  - Soy inocente; de seguro su ira se alejó de mí
  - Estoy limpia; ciertamente su furor se apartó de mí
  rationale: 'La traducción conserva la ironía profética: la afirmación humana de inocencia es citada como autoengaño, no validada por el texto. «Ira» reproduce el valor moral-relacional del juicio divino sin suavizarlo.'
  doctrine_reference: Jeremías 2–3; doctrina profética del juicio del pacto
translation_notes:
  revision_awareness: El borrador sigue la última revisión auditada del inglés POB al preferir una fórmula más formal para הִנְנִי y una expresión más explícitamente forense para נִשְׁפָּט אֹתָךְ, pero en español opta por un equivalente natural y reverente («¡Mira!, entro en juicio contigo») que conserva la fuerza retórica y judicial del hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en todo el proyecto, pero este versículo no lo contiene explícitamente.
  - Se usa «ira» para אַף en paralelo con el inglés auditado «anger», evitando el calco pesado «furor» salvo como alternativa.
  - Se conserva el tono acusatorio profético con segunda persona singular femenina, coherente con el destinatario colectivo personificado en Judá/Sión.
  - El vocabulario forense («juicio») se mantiene visible para no diluir el matiz legal del hebreo.
