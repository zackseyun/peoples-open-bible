translation:
  language: es
  text: 'Y esta es la contribución que tomarán de ellos: oro[a], plata y bronce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobre»; el hebreo נְחֹשֶׁת puede referirse de manera amplia al cobre o al bronce, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Y esto es
  - Ahora bien, esta es
  lexicon: HALOT
  rationale: La frase introductoria presenta la especificación de la ofrenda/contribución. «Y esta es» conserva la fuerza presentativa del hebreo y resulta natural en español.
- source_word: הַ/תְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la aportación
  - la ofrenda contribución
  lexicon: HALOT
  rationale: תרומה designa algo apartado o aportado para un uso sagrado. «Contribución» sigue la decisión inglesa y encaja con la recolección de materiales para el tabernáculo sin cargar el término con un matiz ritual más específico del que exige el contexto.
- source_word: תִּקְח֖וּ
  english_pob_choice: you shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - tomarán de
  - deberán tomar
  - recibirán
  lexicon: HALOT
  rationale: El hebreo usa un imperfecto con valor directivo. En español, «tomarán» comunica bien la instrucción; el complemento «de ellos» queda expresado por «de ellos» en el contexto sintáctico, manteniendo la relación de procedencia.
- source_word: מֵ/אִתָּ֑/ם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - de su parte
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal expresa procedencia directa. «De ellos» es la forma más simple y fiel en español.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Término estándar para el metal precioso. «Oro» es directo y plenamente transparente en español.
- source_word: וָ/כֶסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata fina
  lexicon: HALOT
  rationale: Término estándar de metal. «Plata» preserva la lista de materiales con naturalidad en español.
- source_word: וּ/נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En listas de materiales del tabernáculo, el sentido más probable es «bronce». Se mantiene la alternativa «cobre» porque el hebreo puede abarcar el campo semántico cobre/bronce según el contexto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la solución auditada en inglés; no se detectaron revisiones posteriores que exigieran ajuste.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ sustitutos porque aquí no aparece el tetragrámaton.
  - «Contribución» conserva el término técnico decidido en la auditoría inglesa.
  - La lista de metales se mantiene en estilo nominal simple, adecuado para un inventario de materiales.
