  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ταῦτα μελέτα, ἐν τούτοις ἴσθι, ἵνα σου ἡ προκοπὴ φανερὰ ⸀ᾖ πᾶσιν·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/015.yaml
  text: Practice these things; be in them[a], so that your progress may be evident to all.
  footnotes:
  - marker: a
    text: Or 'be absorbed in them.' The Greek literally says 'be in these things,' expressing deep involvement.
    reason: lexical_alternative
translation:
  language: ko
  text: 이것들을 힘써 행하고, 이것들에 몰두하십시오[a]. 그리하면 그대의 진보가 모든 사람에게 분명해질 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이것들에 머물러 있으십시오」. 헬라어 직역은 「이것들 안에 있으라」로, 깊이 헌신함을 표현한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα μελέτα
  english_pob_choice: Practice these things
  chosen_korean: 이것들을 힘써 행하고
  alternatives_korean:
  - 이것들을 묵상하고
  - 이것들을 실행하고
  lexicon: BDAG
  rationale: μελετάω는 「숙고하다·실천하다·연마하다」. 본 문맥(가르침·권면 영역)에서 「힘써 행하다」가 자연스럽다.
- source_word: ἐν τούτοις ἴσθι
  english_pob_choice: be in them
  chosen_korean: 이것들에 몰두하십시오
  alternatives_korean:
  - 이것들 안에 거하십시오
  - 이것들에 잠겨 있으십시오
  lexicon: BDAG
  rationale: 직역 「이것들 안에 있으라」의 깊은 헌신을 「몰두」로 옮긴다.
- source_word: ἡ προκοπὴ φανερὰ ᾖ πᾶσιν
  english_pob_choice: your progress may be evident to all
  chosen_korean: 그대의 진보가 모든 사람에게 분명해질
  alternatives_korean:
  - 그대의 자라남이 모든 사람에게 드러나는
  lexicon: BDAG
  rationale: προκοπή의 「전진·진보」를 「진보」로.
