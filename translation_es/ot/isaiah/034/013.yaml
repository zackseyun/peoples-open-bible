  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Chacales» para תַנִּים y «avestruces» para לִבְנוֹת יַעֲנָה concuerdan con el audit trail. La distinción entre «espinos / ortigas / zarzas» es aceptable, aunque el verbo con «espinos» debe ajustarse para reflejar crecimiento invasor.
  issues:
  - severity: medium
    issue: «subirán» no representa de la forma más fiel y natural el sentido de vegetación que crece sobre las ruinas
    rationale: וְעָלְתָה con vegetación en este contexto expresa brotar/crecer sobre. «Subirán» conserva movimiento ascendente, pero en español suena menos idiomático y puede sugerir desplazamiento más que sobrecrecimiento.
  - severity: high
