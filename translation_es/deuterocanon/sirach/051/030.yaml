translation:
  language: es
  text: Hagan su trabajo con rectitud, y él les dará su recompensa en su tiempo[a]. Bendito sea Yahvé para siempre, y alabado sea su nombre de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'a su debido tiempo' o 'en el momento oportuno'; el hebreo בְּעִתּוֹ y el griego ἐν καιρῷ αὐτοῦ pueden referirse al tiempo propio de la recompensa, y algunos entienden el pronombre como referido a Dios más que a la recompensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂיכֶם עֲשׂוּ / ἐργάξεσθε τὸ ἔργον ὑμῶν
  english_pob_choice: Do your work
  chosen_spanish: Hagan su trabajo
  alternatives_spanish:
  - Hagan sus obras
  - Cumplan su tarea
  - Trabajen en su labor
  lexicon: HALOT; LXX ἐργάξεσθε / ἔργον
  rationale: El hebreo une el sustantivo 'sus acciones/trabajo' con el imperativo 'hagan', y el griego refuerza la idea de 'trabajar su trabajo'. 'Hagan su trabajo' conserva el tono idiomático y la fuerza práctica sin volverlo demasiado literal o redundante en español.
- source_word: בִצְדָקָה
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  - justamente
  lexicon: HALOT
  rationale: צְדָקָה admite una gama entre justicia y rectitud. En español, 'en justicia' mantiene visible el término bíblico clave y puede leerse como modo de obrar delante de Dios. Se preserva la tensión entre una cualidad ética y una fidelidad justa al pacto.
- source_word: נוֹתֵן לָכֶם שְׂכַרְכֶם / δώσει τὸν μισθὸν ὑμῶν
  english_pob_choice: will give you your reward
  chosen_spanish: les dará su recompensa
  alternatives_spanish:
  - les dará su salario
  - les pagará su recompensa
  - les dará su paga
  lexicon: HALOT; BDAG μισθός
  rationale: שכר / μισθός puede significar salario, paga, recompensa o retribución. 'Recompensa' sigue la línea sapiencial y evita limitarlo a una transacción laboral estricta. El cambio a tercera persona posesiva ('su') sigue el hebreo/greigo, donde el pronombre puede referirse al mismo sujeto implícito de la acción o al momento establecido.
- source_word: בְּעִתּוֹ / ἐν καιρῷ αὐτοῦ
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su debido tiempo
  - en el tiempo señalado
  - en el momento oportuno
  lexicon: HALOT; LSJ καιρός
  rationale: La expresión admite el matiz de tiempo debido, señalado u oportuno. 'En su tiempo' es breve, natural y deja abierta la ambigüedad del pronombre, que puede oírse como referido a la recompensa o a Dios, tal como lo nota el audit trail en inglés.
- source_word: בָּרוּךְ יְהֹוָה לְעוֹלָם
  english_pob_choice: Blessed is Yahweh forever
  chosen_spanish: Bendito sea Yahvé para siempre
  alternatives_spanish:
  - Bendito es Yahvé para siempre
  - Alabado sea Yahvé para siempre
  lexicon: HALOT
  rationale: La doxología hebrea funciona bien en español como fórmula de bendición. 'Bendito sea Yahvé para siempre' mantiene el valor performativo del hebreo y el nombre divino según el criterio del proyecto, sin sustituirlo por un título genérico.
- source_word: וּמְשֻׁבָּח שְׁמוֹ לְדֹר וָדֹר
  english_pob_choice: and praised is his name from generation to generation
  chosen_spanish: y alabado su nombre de generación en generación
  alternatives_spanish:
  - y su nombre es alabado de generación en generación
  - y digno de alabanza es su nombre de generación en generación
  lexicon: HALOT
  rationale: מְשֻׁבָּח expresa ser alabado/preservar el elogio. 'Alabado su nombre' conserva la paralelismo doxológico y suena natural en español bíblico contemporáneo. 'De generación en generación' reproduce el idiomatismo durativo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo tiene explícitamente el Tetragrámaton יְהֹוָה. En español se sigue el criterio del proyecto de verterlo como 'Yahvé', preservando el nombre de pacto y evitando el ocultamiento litúrgico por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de צְדָקָה como virtud ética ante Dios
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia delante de Dios
  - obrar rectamente
  rationale: '''Justicia'' conserva el campo semántico de צְדָקָה y mantiene la posible resonancia legal-covenantal que el español puede percibir mejor que ''rectitud''. No se reduce a una moralidad genérica.'
  doctrine_reference: DOCTRINE.md Contested terms principle on preserving key terms
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó confirmado como de alta concordancia con la fuente hebrea y el paralelo griego.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto para יְהֹוָה.
  - '''Justicia'' se usa aquí como equivalente principal de צְדָקָה, en continuidad con la lectura sapiencial y sin perder su color moral-covenantal.'
  - '''Recompensa'' conserva el valor amplio de שכר/μισθός, evitando un sesgo exclusivamente comercial.'
  - La nota [a] preserva la ambigüedad temporal documentada por el audit trail en inglés y por el griego/hebreo.
