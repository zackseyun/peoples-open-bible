revisions:
- from: 'Entonces el rey me dijo[a]: «¿Qué estás solicitando?». Y oré al Dios de los cielos.'
  to: 'Entonces el rey me dijo[a]: «¿Qué estás solicitando?» Entonces oré al Dios del cielo.'
  rationale: Se corrige la puntuación de la cita según la convención española, se cambia «Y oré» por «Entonces oré» para reflejar mejor la secuencia/respuesta inmediata del hebreo y del audit trail inglés, y se ajusta «el Dios de los cielos» a «el Dios del cielo» por mayor naturalidad idiomática y mejor alineación con el título tal como fue fijado en inglés. No se requiere adjudicación adicional porque los cambios son menores y no doctrinalmente controvertidos.
