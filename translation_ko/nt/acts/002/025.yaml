  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Δαυὶδ γὰρ λέγει εἰς αὐτόν· Προορώμην τὸν κύριον ἐνώπιόν μου διὰ παντός, ὅτι ἐκ δεξιῶν μού ἐστιν ἵνα μὴ σαλευθῶ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/025.yaml
  text: For David says concerning him, ‘I kept seeing the Lord before me continually, because he is at my right hand, so that I may not be shaken.’
  footnotes:
  - marker: a
    text: Or 'I foresaw the Lord before me always.' The Greek verb can, in some contexts, carry the sense 'foresee,' but here the surrounding phrases favor the sense of continually keeping the Lord before oneself.
    reason: lexical_alternative
  - marker: b
    text: Peter is quoting Psalm 16:8. In its Hebrew form, the underlying title is the divine name rendered in English translations as 'the LORD.'
    reason: cross_reference
translation:
  language: ko
  text: 다윗이 그분에 관하여 이렇게 말하기 때문입니다. 『내가 야훼를[a] 항상 내 앞에 모셨으니, 그분이 내 오른편에 계시므로 내가 흔들리지 않을 것이다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 16:8 인용. 히브리어 원문의 YHWH를 70인역이 κύριος로 옮긴 부분이므로 「야훼」로 옮긴다.
    reason: cross_reference
theological_decisions:
- issue: 시편 16편 인용 안의 κύριος(=YHWH) 처리
  chosen_reading: 야훼
  alternative_readings:
  - 주
  rationale: 시편 16:8의 히브리어 본문은 신명 YHWH이며, 70인역이 이를 κύριος로 옮겼다. 인용 본문 자체의 신명 정체를 보존한다.
  doctrine_reference: 'KOREAN_PIPELINE.md: κύριος(=YHWH) → 야훼'
