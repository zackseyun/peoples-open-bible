  text: וַ/יַּ֡עַן יוֹנָדָ֣ב בֶּן שִׁמְעָ֨ה אֲחִֽי דָוִ֜ד וַ/יֹּ֗אמֶר אַל יֹאמַ֤ר אֲדֹנִ/י֙ אֵ֣ת כָּל הַ/נְּעָרִ֤ים בְּנֵֽי הַ/מֶּ֨לֶךְ֙ הֵמִ֔יתוּ כִּֽי אַמְנ֥וֹן לְ/בַדּ֖/וֹ מֵ֑ת כִּֽי עַל פִּ֤י אַבְשָׁלוֹם֙ הָיְתָ֣ה שׂוּמָ֔ה מִ/יּוֹם֙ עַנֹּת֔/וֹ אֵ֖ת תָּמָ֥ר אֲחֹתֽ/וֹ׀־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/032.yaml
  text: Then Jonadab son of Shimeah[a], David’s brother, answered and said, “Let not my lord say, ‘They have killed all the young men, the king’s sons,’ for Amnon alone is dead[b]. For by the command of Absalom this had been determined from the day he violated Tamar his sister.”
  footnotes:
  - marker: a
    text: Or 'had been set on Absalom’s word/command,' that is, had been fixed in accordance with Absalom’s settled intention.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be rendered 'humiliated' or, in context, more explicitly 'raped.'
    reason: lexical_alternative
