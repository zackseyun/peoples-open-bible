translation:
  language: es
  text: Estaban armados con arcos, usando tanto la mano derecha como la izquierda con piedras y con flechas con el arco; eran de entre los parientes[a] de Saúl, de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de los hermanos de Saúl' o 'de los familiares de Saúl'. El hebreo 'hermanos' puede extenderse más allá de hermanos literales a miembros de la misma familia amplia o tribu.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשְׁקֵי קֶשֶׁת
  english_pob_choice: armed with bows
  chosen_spanish: armados con arcos
  alternatives_spanish:
  - arqueros
  - armados con el arco
  lexicon: HALOT
  rationale: El participio señala a quienes iban equipados/armados con el arco. En español, 'armados con arcos' conserva con claridad el valor funcional y evita reducirlos a una profesión no explícita en el hebreo.
- source_word: מַיְמִינִים וּמַשְׂמִאלִים
  english_pob_choice: using both the right hand and the left
  chosen_spanish: usando tanto la mano derecha como la izquierda
  alternatives_spanish:
  - diestros y zurdos
  - capaces de usar la derecha y la izquierda
  lexicon: HALOT
  rationale: Los participios describen habilidad para usar cualquiera de las dos manos, no solo una lateralidad natural. La formulación española hace explícita esa destreza funcional sin sobreinterpretar.
- source_word: בָּאֲבָנִים
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - lanzando piedras
  - en el manejo de piedras
  lexicon: HALOT
  rationale: El hebreo usa la preposición instrumental con 'piedras'. En español, 'con piedras' mantiene la referencia mínima exigida por el texto; el contexto militar sugiere el uso ofensivo sin añadir un verbo que el hebreo no expresa de forma directa.
- source_word: וּבַחִצִּים בַּקָּשֶׁת
  english_pob_choice: with arrows from the bow
  chosen_spanish: con flechas del arco
  alternatives_spanish:
  - con flechas desde el arco
  - disparando flechas con el arco
  lexicon: HALOT
  rationale: La frase coordina el segundo medio bélico junto con las piedras. 'Con flechas del arco' conserva la relación estrecha entre flechas y arco y sigue de cerca la estructura del hebreo sin forzar una perífrasis innecesaria.
- source_word: מֵאֲחֵי שָׁאוּל
  english_pob_choice: from Saul’s kinsmen
  chosen_spanish: de los parientes de Saúl
  alternatives_spanish:
  - de los hermanos de Saúl
  - de los allegados de Saúl
  lexicon: HALOT
  rationale: '''Hermanos'' en hebreo puede extenderse a parentesco o grupo tribal; el audit trail inglés ya optó por el sentido amplio. ''Parientes'' comunica esa amplitud mejor que ''hermanos'' en español, sin cerrar la posible referencia tribal o clánica.'
- source_word: מִבִּנְיָמִן
  english_pob_choice: from Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - benjaminitas
  - de la tribu de Benjamín
  lexicon: HALOT
  rationale: La expresión identifica procedencia tribal. 'De Benjamín' es fiel y natural en español, y mantiene la relación con la mención anterior de Saúl.
theological_decisions:
- issue: Alcance semántico de מֵאֲחֵי שָׁאוּל
  english_pob_reading: '''Saul’s kinsmen'' with a note that ''brothers'' can extend beyond literal siblings to wider family or tribe.'
  chosen_spanish_reading: '''los parientes de Saúl'' con nota sobre el sentido amplio de ''hermanos'''
  alternative_spanish_readings:
  - '''los hermanos de Saúl'''
  - '''los familiares de Saúl'''
  rationale: El hebreo admite un uso amplio del término, y el propio registro inglés lo documenta. 'Parientes' preserva esa amplitud y evita una lectura demasiado estrecha de hermanos literales.
  doctrine_reference: Nota lexical, no doctrinal
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió una formulación más literal en 'armed with bows', mantuvo la coordinación instrumental 'with stones and with arrows from the bow', y amplió 'brothers' a un sentido de parentesco/clan. La versión española refleja esas decisiones con un registro natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo 'Benjamín' como identificación tribal, coherente con el hebreo y con el vínculo narrativo con Saúl.
  - No se introdujo 'arqueros' para evitar convertir una descripción de equipamiento en un título ocupacional no requerido por el texto.
  - La nota usa 'hermanos' como alternativa porque el hebreo lo permite, pero el texto principal opta por 'parientes' para hacer explícito el sentido amplio ya reconocido en el audit trail.
