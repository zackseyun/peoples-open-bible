translation:
  language: es
  text: Y sucedió al tercer día, cuando llegó la mañana, que hubo truenos[a] y relámpagos, y una nube pesada sobre el monte, y el sonido de una trompeta[b] muy fuerte[c]; y todo el pueblo que estaba en el campamento tembló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sonidos» o «voces»; el hebreo קֹלֹת puede significar «sonidos» o «voces», pero aquí, junto con los relámpagos, probablemente se refiere a truenos.
    reason: lexical_alternative
  - marker: b
    text: O «el sonido de un cuerno de carnero»; el hebreo shofar es una trompeta de cuerno, tradicionalmente hecha de cuerno de animal.
    reason: lexical_alternative
  - marker: c
    text: Lit. «muy fuerte»; en este contexto describe la intensidad del sonido de la trompeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio; «Y sucedió» conserva ese avance discursivo en español moderno sin arcaizar demasiado.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - al tercer día
  - el tercer día
  lexicon: HALOT
  rationale: La preposición temporal expresa con naturalidad el hebreo y mantiene la referencia directa al día señalado.
- source_word: בִּהְיֹת הַבֹּקֶר
  english_pob_choice: when morning came
  chosen_spanish: cuando llegó la mañana
  alternatives_spanish:
  - cuando era la mañana
  - al llegar la mañana
  lexicon: HALOT
  rationale: El infinitivo con valor temporal pide una solución idiomática; «cuando llegó la mañana» preserva el sentido temporal sin sonar literalista.
- source_word: קֹלֹת
  english_pob_choice: thunders
  chosen_spanish: truenos
  alternatives_spanish:
  - voces
  - sonidos
  lexicon: HALOT
  rationale: En este contexto de teofanía junto con relámpagos, el sentido más probable es «truenos»; se mantiene la ambigüedad semántica del hebreo en la nota de pie sin forzar «voces» en el texto principal.
- source_word: בְרָקִים
  english_pob_choice: lightnings
  chosen_spanish: relámpagos
  alternatives_spanish:
  - rayos
  - destellos de relámpago
  lexicon: HALOT
  rationale: «Relámpagos» comunica bien el fenómeno luminoso y es natural en español; conserva el plural intenso del hebreo.
- source_word: עָנָן כָּבֵד
  english_pob_choice: a heavy cloud
  chosen_spanish: una nube pesada
  alternatives_spanish:
  - una nube densa
  - una nube espesa
  lexicon: HALOT
  rationale: Se conserva el adjetivo «pesada», que refleja literalmente כָּבֵד, sin suavizarlo a una paráfrasis; «nube» es la imagen directa del texto.
- source_word: עַל הָהָר
  english_pob_choice: on the mountain
  chosen_spanish: sobre el monte
  alternatives_spanish:
  - sobre la montaña
  - en el monte
  lexicon: HALOT
  rationale: «Sobre el monte» reproduce de manera natural la ubicación sobre el monte Sinaí y mantiene el registro bíblico español.
- source_word: קֹל שֹׁפָר
  english_pob_choice: the sound of a trumpet
  chosen_spanish: el sonido de un shofar
  alternatives_spanish:
  - el sonido de un cuerno
  - el sonido de una trompeta
  lexicon: HALOT
  rationale: Se conserva «shofar» para no perder la especificidad del instrumento hebreo; el contexto y la nota aclaran su función sonora. Esto sigue la preferencia del POB por conservar términos con carga cultural cuando el original lo exige.
- source_word: חָזָק מְאֹד
  english_pob_choice: very loud
  chosen_spanish: muy fuerte
  alternatives_spanish:
  - muy sonoro
  - muy estruendoso
  lexicon: HALOT
  rationale: Para sonido, «fuerte» conserva el valor literal de חָזָק y funciona naturalmente en español; la intensidad del adverbio «muy» refleja מְאֹד.
- source_word: וַיֶּחֱרַד
  english_pob_choice: trembled
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se sobrecogió
  lexicon: HALOT
  rationale: El verbo expresa temblor por temor o conmoción; «tembló» es la forma más directa y fiel en español.
- source_word: כָּל הָעָם אֲשֶׁר בַּמַּחֲנֶה
  english_pob_choice: all the people who were in the camp
  chosen_spanish: todo el pueblo que estaba en el campamento
  alternatives_spanish:
  - todo el pueblo que estaba en el campamento
  - todo el pueblo en el campamento
  lexicon: HALOT
  rationale: Se mantiene la cláusula relativa explícita del hebreo y se usa «pueblo» para un referente colectivo natural en español bíblico contemporáneo.
theological_decisions:
- issue: Fenómenos de teofanía en Sinaí
  english_pob_reading: Render the phenomena descriptively without importing later theological interpretation.
  chosen_spanish_reading: Describir los fenómenos de manera directa, sin añadir interpretaciones posteriores.
  alternative_spanish_readings:
  - Interpretar los truenos como voces celestiales
  - Explicitar una lectura litúrgica o devocional
  rationale: El versículo presenta señales sensoriales que acompañan la manifestación divina; la traducción debe conservar el asombro del evento sin convertirlo en explicación teológica adicional.
  doctrine_reference: Principios de traducción POB §§1, 3
- issue: Capacitación semántica de קֹלֹת
  english_pob_reading: Although broader than thunder, the context most likely refers to thunder.
  chosen_spanish_reading: «Truenos» como sentido principal, con posible matiz alternativo preservado en la nota.
  alternative_spanish_readings:
  - voces
  - sonidos
  rationale: La combinación con relámpagos hace que «truenos» sea la lectura más probable; sin embargo, la nota mantiene la amplitud semántica del hebreo para no borrar la tensión lexical.
  doctrine_reference: HALOT; nota lexical de POB
- issue: Identidad del shofar
  english_pob_reading: The sound of a trumpet / ram's horn.
  chosen_spanish_reading: Conservar «shofar» en el texto principal.
  alternative_spanish_readings:
  - trompeta
  - cuerno de carnero
  rationale: «Shofar» preserva la especificidad cultural y ritual del término hebreo; la traducción no debe sustituirlo por un equivalente genérico sin necesidad.
  doctrine_reference: HALOT; terminología POB sobre términos culturales
- issue: Intensidad de la voz sonora
  english_pob_reading: very loud
  chosen_spanish_reading: muy fuerte
  alternative_spanish_readings:
  - muy sonoro
  - estruendoso
  rationale: «Fuerte» reproduce la fuerza lexical de חָזָק y es comprensible para el sonido del shofar; evita una paráfrasis que desplace el valor semántico base.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés que cambió «very strong» por «very loud» para el sonido del shofar. En español se optó por «muy fuerte», que conserva mejor la base lexical de חָזָק y sigue siendo natural para describir un sonido intenso, mientras que la nota aclara el valor contextual de intensidad sonora.
  spanish_consistency_notes:
  - 'Se conservó el orden narrativo del hebreo con una apertura equivalente a wayyiqtol: «Y sucedió».'
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Shofar» se deja sin traducir en el texto principal por consistencia con la especificidad cultural del término; la nota ofrece la equivalencia funcional.
  - No se introdujeron puntuaciones o explicaciones devocionales ajenas al hebreo; el versículo sigue siendo descriptivo y teofánico.
