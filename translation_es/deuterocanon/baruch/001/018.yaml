translation:
  language: es
  text: y le desobedecimos[a], y no escuchamos la voz del Señor nuestro Dios, para andar en los mandamientos del Señor que él puso delante de nosotros[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuimos desobedientes a él». El griego usa un verbo de desobediencia activa; la traducción principal lo expresa de manera más directa y natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «preceptos» o «estatutos» para προστάγματα. El término griego designa lo que ha sido prescrito u ordenado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠπειθήσαμεν
  english_pob_choice: we disobeyed
  chosen_spanish: fuimos desobedientes
  alternatives_spanish:
  - desobedecimos
  - nos rebelamos
  lexicon: BDAG
  rationale: El verbo griego expresa desobediencia activa. «Fuimos desobedientes» conserva ese valor sin forzar una forma demasiado abrupta en español; «desobedecimos» también sería posible, pero la elección mantiene el tono confesional del contexto.
- source_word: ἠκούσαμεν τῆς φωνῆς
  english_pob_choice: did not listen to the voice
  chosen_spanish: no escuchamos la voz
  alternatives_spanish:
  - no oímos la voz
  - no obedecimos a la voz
  lexicon: BDAG
  rationale: La imagen griega es auditiva, con implicación de obediencia. «No escuchamos la voz» preserva la metáfora y deja visible la tensión entre oír y obedecer; no la resuelve sustituyéndola por una glosa interpretativa.
- source_word: Κυρίου θεοῦ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: el Señor nuestro Dios
  alternatives_spanish:
  - el Señor, nuestro Dios
  lexicon: LEH
  rationale: En este contexto griego de Baruc, κύριος se traduce como «Señor» por fidelidad al texto fuente y al uso reverente en español bíblico. No se usa «Yahvé» aquí porque el versículo griego no presenta el Tetragrama en la línea fuente.
- source_word: πορεύεσθαι
  english_pob_choice: to walk
  chosen_spanish: andar
  alternatives_spanish:
  - caminar
  - vivir
  lexicon: BDAG
  rationale: El verbo bíblico de conducta puede verterse como «andar» en español, que suena natural y conserva la metáfora ética de la conducta continua. «Caminar» es válido, pero «andar» funciona mejor en este registro.
- source_word: τοῖς προστάγμασιν
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los estatutos
  - las ordenanzas
  lexicon: LEH
  rationale: Aunque el audit trail inglés fluctuó entre «ordinances» y «commandments», el griego προστάγματα apunta a lo prescrito u ordenado. «Mandamientos» es la forma española más clara y fiel en este contexto de obediencia pactal.
- source_word: ἔδωκεν κατὰ πρόσωπον ἡμῶν
  english_pob_choice: he set before us
  chosen_spanish: él puso delante de nosotros
  alternatives_spanish:
  - él estableció ante nosotros
  - él nos presentó
  lexicon: LEH
  rationale: La expresión idiomática griega se entiende naturalmente como colocar algo ante alguien para que lo tenga por norma. «Puso delante de nosotros» conserva la imagen y es plenamente idiomática en español bíblico.
theological_decisions:
- issue: Tensión entre «oír/escuchar» y «obedecer» en τῆς φωνῆς
  english_pob_reading: did not listen to the voice
  chosen_spanish_reading: no escuchamos la voz
  alternative_spanish_readings:
  - no obedecimos a la voz
  - no oímos la voz
  rationale: 'Se conserva la metáfora auditiva del griego sin convertirla en una paráfrasis moral. Así permanece visible la tensión bíblica: la falta de escucha implica desobediencia, pero el texto dice literalmente «no escuchamos».'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy'
- issue: Tratamiento de κύριος en un contexto griego deuterocanónico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: En esta línea griega, la fuente inmediata es κύριος; por eso el español sigue «Señor». Usar «Yahvé» sería apropiado si el texto fuente hebreo visible exigiera señalar el Nombre divino, pero aquí el registro griego del LXX guía la traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
translation_notes:
  revision_awareness: He seguido el texto griego de Swete LXX 1909 y el audit trail inglés, pero he ajustado el español para que suene natural sin perder las imágenes bíblicas de desobediencia, escucha y caminar en mandamientos. También mantengo la preferencia de la serie por no ocultar el κύριος griego bajo una convención de mayúsculas.
  spanish_consistency_notes:
  - Conservo «Señor» para κύριος en consonancia con el contexto griego del LXX.
  - Uso «mandamientos» para προστάγματα, en línea con la revisión final inglesa y con un registro bíblico claro.
  - Mantengo la metáfora de «escuchar la voz» para no colapsar el matiz auditivo en una glosa explícita de obediencia.
  - «Andar» preserva el hebraísmo/grecismo de conducta continua sin sonar demasiado arcaico.
