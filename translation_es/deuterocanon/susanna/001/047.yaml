translation:
  language: es
  text: 'Entonces todo el pueblo se volvió hacia él y le dijeron[a]: «¿Qué es esta palabra que has hablado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué es esta declaración que has pronunciado?» El griego λόγος puede significar «palabra», «declaración» o «asunto».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se volvió atrás
  - regresó
  lexicon: BDAG; LEH
  rationale: ἐπιστρέφω aquí expresa un giro de atención o de orientación hacia Daniel; «se volvió» comunica ese movimiento de manera natural en español sin añadir con demasiada fuerza la idea de un regreso físico completo.
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - la gente toda
  lexicon: LEH
  rationale: La expresión abarca a la asamblea colectiva. «Todo el pueblo» conserva el valor totalizador de πᾶς y suena natural y solemne en español.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - contra él
  lexicon: BDAG
  rationale: Con un verbo de volver o girarse, πρὸς marca dirección. «Hacia él» refleja bien el movimiento orientado a Daniel y evita una literalidad menos idiomática.
- source_word: Τίς ὁ λόγος οὗτος
  english_pob_choice: What is this word
  chosen_spanish: ¿Qué es esta palabra?
  alternatives_spanish:
  - ¿Qué es esta declaración?
  - ¿Qué es este asunto?
  lexicon: BDAG
  rationale: λόγος puede ser «palabra», «declaración» o «asunto». Aquí, por la réplica inmediata al dicho de Daniel, «palabra» mantiene la cercanía con el griego y la opción principal del POB inglés.
- source_word: λελάληκας
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - has dicho
  - hablaste
  lexicon: BDAG
  rationale: El perfecto griego mira al dicho recién pronunciado. En español, el presente perfecto «has hablado» transmite bien esa relevancia actual y sigue de cerca el verbo λαλέω.
translation_notes:
  revision_awareness: El texto coincide con el sentido del pasaje en el griego de Swete y con la lectura auditada del POB en inglés; no se registran revisiones posteriores que obliguen a modificar la decisión principal.
  spanish_consistency_notes:
  - Se mantiene «pueblo» para πᾶς ὁ λαός, evitando alternar con «gente» para conservar el registro bíblico y colectivo.
  - Se usa «palabra» como equivalente principal de λόγος, con nota para las alternativas semánticas documentadas.
  - Se preserva el perfecto «has hablado» para reflejar el matiz de relevancia actual del griego λελάληκας.
