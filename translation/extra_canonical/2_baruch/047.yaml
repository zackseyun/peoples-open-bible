  text: |-
    1 And when I had gone out and dismissed them, I went away from there and said to them, “Look, I am going to my dwelling in Hebron.”[a]
    
    2 And afterward my companions left me, and I came to the cedar where he had spoken with me; and I sat there and fasted seven days.[b]
