translation:
  language: es
  text: Ahora la tierra estaba corrupta delante de Dios[a], y la tierra estaba llena de violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante Dios»; también: «a la vista de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׁחֵת
  english_pob_choice: was corrupt
  chosen_spanish: estaba corrompida
  alternatives_spanish:
  - estaba corrupta
  - se había corrompido
  - estaba arruinada
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante en nifal; en español, "estaba corrompida" preserva la idea de deterioro moral/relacional sin volverla transitiva ni introducir una acción no explícita. "Corrupta" es posible, pero "corrompida" mantiene mejor el matiz verbal del resultado.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: Aunque "earth" puede ser "la tierra", en español "la tierra" comunica bien el alcance global del relato sin sonar técnico. Se evita "el mundo" porque añade una capa más interpretativa que el hebreo no exige.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  - a la vista de Dios
  lexicon: HALOT
  rationale: '"Delante de Dios" conserva la idea espacial-relacional de לִפְנֵי y resulta natural en español bíblico contemporáneo. "Ante Dios" también sería válido, pero "delante de" mantiene con claridad la evaluación divina implicada en el texto.'
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios único; por eso se traduce simplemente "Dios" en singular, como en el contexto auditado.
- source_word: וַתִּמָּלֵא
  english_pob_choice: was filled
  chosen_spanish: estaba llena
  alternatives_spanish:
  - se llenó
  - llegó a estar llena
  - quedó llena
  lexicon: HALOT
  rationale: 'El hebreo presenta otro estado resultante: la tierra llegó a estar llena de violencia. "Estaba llena" reproduce con naturalidad el estado continuo sin hacer más explícito de lo que el texto dice el proceso de llenarse.'
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - violencia
  - violencia y maldad
  - opresión
  lexicon: HALOT
  rationale: '"Violencia" es la correspondencia más directa y establecida para חָמָס en este pasaje. Se evita expandir a "maldad" u "opresión" para no diluir el término específico ni borrar su fuerza ética.'
theological_decisions:
- issue: Alcance de la corrupción de la tierra
  english_pob_reading: Moral corruption of the earth/human society under God's observation
  chosen_spanish_reading: Corrupción moral de la tierra bajo la mirada evaluadora de Dios
  alternative_spanish_readings:
  - Ruina física de la tierra
  - Corrupción meramente material del mundo
  rationale: El contexto inmediato del diluvio subraya la violencia y la maldad humanas; por eso, la traducción debe dejar abierta la dimensión moral y no reducir el versículo a daño físico. "Delante de Dios" conserva la idea de juicio o evaluación divina sin forzar una explicación doctrinal adicional.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: He seguido el ajuste auditado del inglés POB que pasó de "corrupted" a "corrupt" para el valor estativo del hebreo; en español se reflejó con "estaba corrompida" / "estaba llena", manteniendo el estado resultante sin introducir una narración más dinámica de la que el texto exige.
  spanish_consistency_notes:
  - Se mantiene "Dios" en singular para אֱלֹהִים según el contexto.
  - Se conserva "la tierra" para הָאָרֶץ por el alcance universal del relato.
  - '"Violencia" se usa de forma consistente para חָמָס, sin expandir el término en el cuerpo del texto.'
