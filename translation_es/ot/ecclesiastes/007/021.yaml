review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: valor aditivo de גַּם, la imagen de «corazón», el carácter impersonal de lo dicho y la advertencia de oír a un subordinado maldiciendo al destinatario. Sin embargo, dos decisiones no siguen del todo la evidencia ni la pista auditada de la POB inglesa: (1) «para que no oigas» suena más a propósito deseado que a advertencia/resultante; «no sea que oigas» o «para que no llegues a oír» representa mejor אֲשֶׁר לֹא תִשְׁמַע = ‘lest you hear’. (2) El inglés auditado eligió «your servant» con nota alternativa «your slave» precisamente porque aquí la servidumbre doméstica, no la condición jurídica, es el foco. El español principal «tu esclavo» invierte esa decisión documentada sin una razón contextual suficientemente fuerte.'
  spanish_quality_summary: El español es claro y legible, pero «pongas tu corazón en» no suena tan natural ni tan cercano al modismo hebreo como «des tu corazón a» o la nota «tomes a pecho». Además, «para que no oigas» puede leerse teleológicamente. Una leve revisión mejora naturalidad y fidelidad sin perder dignidad bíblica.
  glossary_alignment: 'No hay conflictos con terminología teológica mayor. La principal desalineación de glosario/proyecto está en עֶבֶד: aquí conviene seguir la decisión documentada de la POB y usar «siervo» en el texto principal, con nota que preserve «esclavo» como alternativa contextual. El resto del léxico («corazón», «maldiciéndote») está bien encaminado.'
  issues:
  - severity: medium
    issue: La cláusula final «para que no oigas» no comunica con precisión el matiz de advertencia de ‘lest you hear’.
    rationale: En español, «para que no» suele expresar finalidad. El hebreo aquí advierte sobre un resultado indeseable; «no sea que oigas» lo representa con mayor exactitud y naturalidad.
  - severity: medium
    issue: «Tu esclavo» no sigue la decisión léxica documentada por la POB inglesa para עַבְדְּךָ.
    rationale: La auditoría inglesa prefirió ‘your servant’ y dejó ‘your slave’ como alternativa, porque el contexto sapiencial enfatiza subordinación doméstica más que estatus jurídico. El español debe reflejar esa priorización, manteniendo «esclavo» en nota.
  - severity: low
    issue: «No pongas tu corazón en» es comprensible, pero menos fiel al giro literal que la formulación alternativa.
    rationale: El hebreo dice literalmente «no des tu corazón». En español, «no des tu corazón a» conserva mejor la imagen y sigue siendo entendible; la nota ya ofrece el modismo más idiomático «no tomes a pecho».
