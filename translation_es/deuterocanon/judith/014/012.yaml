- from: Pero cuando los hijos de Asur los vieron, enviaron aviso a sus líderes; y vinieron a los generales y a los comandantes de mil[a] y a cada uno de sus gobernantes.
  to: Pero cuando los hijos de Asur los vieron, enviaron aviso a sus jefes; y estos fueron a los generales, a los comandantes de mil[a] y a cada uno de sus gobernantes.
  rationale: Se hace una reparación menor para evitar una ambigüedad de sujeto en español y mejorar la fluidez narrativa, sin apartarse del sentido del griego ni del audit trail inglés. También se ajusta «líderes» a «jefes» por naturalidad contextual.
