revisions:
- from: Y en Roma[a], y aun hasta Esparta, oyeron que Jonatán había muerto, y se entristecieron muchísimo.
  to: Y en Roma[a], e incluso hasta Esparta, oyeron que Jonatán había muerto, y se entristecieron profundamente.
  rationale: 'Se ajusta el estilo para un español más natural y digno: «e incluso hasta Esparta» conserva el matiz enfático de extensión geográfica reflejado por ἕως y por el «even» del inglés auditado, y «se entristecieron profundamente» mantiene mejor la intensidad de ἐλυπήθησαν σφόδρα sin tono coloquial. La nota textual se conserva, con redacción armonizada al texto revisado.'
