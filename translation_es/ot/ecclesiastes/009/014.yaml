  glossary_alignment: 'No hay términos del glosario teológico mayor implicados. Las decisiones léxicas principales están bien alineadas con el audit trail: ''ciudad pequeña'', ''pocos hombres'', ''vino contra ella'', ''la rodeó'', y ''grandes obras de asedio''. Se mantiene adecuadamente la amplitud de מְצוֹדִים con nota al pie.'
