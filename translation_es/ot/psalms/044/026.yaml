  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca las decisiones de la POB inglesa: causalidad de כִּי, imagen de abatimiento hacia el polvo, mantenimiento de «alma» para נַפְשֵׁנוּ, y realismo corporal de «vientre». Sin embargo, «en el polvo» se aleja del valor direccional de לֶעָפָר, que la auditoría inglesa preserva mejor con «to the dust»; en español conviene «hasta el polvo» o «al polvo».'
  spanish_quality_summary: El texto es legible y digno, pero «nuestro vientre se pega a la tierra» suena algo coloquial; «se aferra» o «se adhiere» sería más natural en registro bíblico moderno. Además, las notas usan la fórmula poco natural «Oración alternativa»; deberían decir simplemente «O».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Alma» para נֶפֶשׁ y «vientre» para בֶּטֶן están bien justificados. La revisión propuesta ajusta mejor el matiz de dirección en לֶעָפָר y mejora el registro de דָּבְקָה sin apartarse de la POB inglesa.
  issues:
  - severity: medium
    issue: «en el polvo» debilita el matiz de dirección de לֶעָפָר
    rationale: El hebreo y la POB inglesa apuntan a movimiento/descenso hacia el polvo, no solo a ubicación estática. «Hasta el polvo» preserva mejor la imagen poética y la fuerza del original.
  - severity: low
    issue: «se pega» resulta algo coloquial para דָּבְקָה
    rationale: Aunque es semánticamente posible, «se aferra» suena más natural y digno en español e igualmente conserva la imagen de adhesión estrecha al suelo.
  - severity: low
    issue: Redacción de notas poco idiomática
    rationale: La fórmula «Oración alternativa» no corresponde al estilo habitual de notas textuales; «O ...» es más clara y consistente con notas léxicas breves.
  revised_spanish_text: Porque nuestra alma[a] se ha hundido hasta el polvo[b]; nuestro vientre se aferra a la tierra.
  revised_footnotes:
