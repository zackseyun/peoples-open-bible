    issue: La nota [a] está incompleta frente a la evidencia hebrea y la auditoría inglesa.
    rationale: 'La nota inglesa explicita: ''the nation and the kingdom ... and the nations''; el borrador español solo cita ''la nación y el reino...'', por lo que no documenta adecuadamente el paso del singular al plural que la nota pretende explicar.'
  revised_spanish_text: Porque la nación y el reino que no te servirán perecerán[a], y esas naciones[b] serán asoladas por completo.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «la nación y el reino ... y las naciones»; el versículo pasa del singular al plural por efecto retórico.'
