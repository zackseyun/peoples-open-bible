translation:
  language: es
  text: Y él prenderá fuego a los templos de los dioses de Egipto[a]; los quemará y se los llevará[b]. Se envolverá en la tierra de Egipto, como un pastor se envuelve en su manto, y saldrá de allí en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y prenderé fuego a los templos de los dioses de Egipto». El texto principal sigue el contexto circundante, donde el rey de Babilonia es el sujeto agente.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los llevará cautivos». El hebreo puede referirse a llevarse los dioses, sus imágenes o los tesoros del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּ֣תִּי
  english_pob_choice: And he will set fire
  chosen_spanish: Y prenderé fuego
  alternatives_spanish:
  - Y él prenderá fuego
  - Y encenderé fuego
  lexicon: HALOT
  rationale: El hebreo tiene forma de primera persona singular, y en español la forma natural equivalente es «prender fuego». Mantengo la posibilidad formal de primera persona en nota, pero la frase principal conserva la fluidez y la fuerza causativa del verbo.
- source_word: בְּבָתֵּי אֱלֹהֵי מִצְרַיִם
  english_pob_choice: to the temples of the gods of Egypt
  chosen_spanish: a los templos de los dioses de Egipto
  alternatives_spanish:
  - en las casas de los dioses de Egipto
  - en los templos de los dioses de Egipto
  lexicon: HALOT
  rationale: «Casas» es literal, pero en este contexto de deidades alude a recintos de culto; «templos» comunica mejor el referente en español sin perder la base semántica.
- source_word: וּשְׂרָפָם
  english_pob_choice: and he will burn them
  chosen_spanish: los quemará
  alternatives_spanish:
  - y los quemará
  - y los incendiará
  lexicon: HALOT
  rationale: El sufijo retoma naturalmente los templos o sus elementos asociados. «Los quemará» preserva la acción destructiva de forma directa y clara.
- source_word: וְשָׁבָם
  english_pob_choice: and carry them away
  chosen_spanish: los llevará cautivos
  alternatives_spanish:
  - y los llevará
  - y los arrancará
  lexicon: HALOT
  rationale: El verbo puede significar llevarse cautivo o arrancar/transportar. En este contexto de juicio sobre Egipto, «los llevará cautivos» refleja bien la idea de despojo y traslado forzado, sin obligar a especificar si se trata de ídolos, imágenes o tesoros.
- source_word: וְעָטָה אֶת אֶרֶץ מִצְרַיִם
  english_pob_choice: He will wrap himself in the land of Egypt
  chosen_spanish: Se envolverá en la tierra de Egipto
  alternatives_spanish:
  - Cubrirá la tierra de Egipto
  - Se vestirá de la tierra de Egipto
  lexicon: HALOT
  rationale: 'Conservo la imagen corporal del hebreo: Egipto se compara con un manto o prenda que se envuelve. «Se envolverá» mantiene la metáfora sin volverla explicativa en exceso.'
- source_word: כַּאֲשֶׁר יַעְטֶה הָרֹעֶה אֶת בִּגְדוֹ
  english_pob_choice: as a shepherd wraps himself in his garment
  chosen_spanish: como un pastor se envuelve en su vestido
  alternatives_spanish:
  - como un pastor se pone su capa
  - como un pastor se envuelve en su manto
  lexicon: HALOT
  rationale: «Vestido» conserva el sentido general de בגד como prenda, y el paralelismo con «se envuelve» reproduce el mismo verbo hebreo para sostener la comparación.
- source_word: וְיָצָא מִשָּׁם בְּשָׁלוֹם
  english_pob_choice: and he will go out from there in peace
  chosen_spanish: y saldrá de allí en paz
  alternatives_spanish:
  - y saldrá de allí seguro
  - y partirá de allí en paz
  lexicon: HALOT
  rationale: «En paz» es la forma más literal y también bíblicamente reconocible para בְּשָׁלוֹם; en español mantiene bien la idea de salida sin daño.
theological_decisions:
- issue: 'Sujeto del verbo inicial: primera persona en hebreo frente al sujeto contextual de la secuencia'
  english_pob_reading: 'Render the clause with Nebuchadnezzar as the continuing subject: ''And he will set fire...,'''' while preserving the first-person alternative in a footnote.'
  chosen_spanish_reading: Conservar en el texto principal el sujeto implícito del contexto («él»/Nabucodonosor), y documentar la posibilidad formal de primera persona en nota.
  alternative_spanish_readings:
  - Y prenderé fuego...
  - Y él prenderá fuego...
  rationale: La forma consonántica/vocalizada hebrea es primera persona singular, pero el flujo inmediato de verbos en tercera persona apunta al rey de Babilonia como agente contextual. El texto principal prioriza esa coherencia discursiva, sin borrar la lectura más formal del hebreo.
  doctrine_reference: 'Philosophy #1, #3, #5'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene conforme al pase auditado anterior, con acuerdo sustancial aunque el informe marcó la cuestión mayor del sujeto inicial. Se preserva esa tensión en nota sin alterar la lectura contextual del cuerpo principal.
  spanish_consistency_notes:
  - Usé «Dioses de Egipto» en plural, acorde con אֱלֹהֵי מִצְרַיִם y con la decisión inglesa de no homogeneizarlo a un singular teológico.
  - Mantuve «templos» para בָּתֵּי, siguiendo la función cultual del término en contexto.
  - Elegí «en paz» para בְּשָׁלוֹם, coherente con el valor bíblico de salida segura o sin daño.
  - Conservé la metáfora de vestirse/envolver para עָטָה, evitando explicitarla como simple conquista territorial.
  - No sustituí «llevará cautivos» por un equivalente más neutro, para no perder la fuerza de despojo implícita en שבה.
