translation:
  language: es
  text: Sé para mí una roca de refugio[a], al cual pueda acudir siempre; has mandado salvación para mí[b], porque tú eres mi peñasco y mi fortaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una roca, una morada» en lugar de «una roca de refugio».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «has mandado salvarme»; alternativamente, «has ordenado salvarme».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱיֵה
  english_pob_choice: Be
  chosen_spanish: Sé
  alternatives_spanish:
  - Hazte
  - Llega a ser
  lexicon: HALOT
  rationale: El imperativo de היה en una súplica directa se vierte naturalmente como «sé»; conserva la fuerza peticional sin introducir un matiz procesual que «hazte» o «llega a ser» sugerirían.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: HALOT
  rationale: La preposición expresa beneficio o relación en una oración; «para mí» suena natural en español y mantiene el valor relacional de la petición.
- source_word: לְצוּר
  english_pob_choice: a rock
  chosen_spanish: una peña
  alternatives_spanish:
  - una roca
  - un peñasco
  - una roca fuerte
  lexicon: HALOT
  rationale: Para distinguirlo de סלע sin perder la imagen de solidez, «peña» funciona bien en español bíblico y conserva el sentido de masa rocosa protectora.
- source_word: מָעוֹן
  english_pob_choice: of refuge
  chosen_spanish: de refugio
  alternatives_spanish:
  - de morada
  - de habitación
  - de vivienda
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «morada» o «habitación», el contexto de protección hace que «refugio» exprese mejor la función del sintagma en castellano. Se preserva la alternativa literal en la nota.
- source_word: לָבוֹא
  english_pob_choice: to which I may come
  chosen_spanish: a la cual pueda venir
  alternatives_spanish:
  - para entrar
  - a la que pueda llegar
  lexicon: HALOT
  rationale: El infinitivo constructo con בוא expresa movimiento hacia ese lugar; «venir» mantiene la imagen de acceso continuo y es idiomático en español con el relativo explícito que exige la sintaxis.
- source_word: תָּמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  lexicon: HALOT
  rationale: «Siempre» es la equivalencia más natural y transmite continuidad permanente sin sobrecargar el verso.
- source_word: צִוִּיתָ
  english_pob_choice: you have commanded
  chosen_spanish: has mandado
  alternatives_spanish:
  - has ordenado
  - has decretado
  - has dado mandato
  lexicon: HALOT
  rationale: El verbo transmite la fuerza de un mandato efectivo de Dios. «Has mandado» conserva esa fuerza verbal en español; «ordenado» o «decretado» son posibles, pero menos directos.
- source_word: לְהוֹשִׁיעֵנִי
  english_pob_choice: salvation for me
  chosen_spanish: salvación para mí
  alternatives_spanish:
  - para salvarme
  - salvarme
  - mi salvación
  lexicon: HALOT
  rationale: La frase es literalmente «para salvarme». Siguiendo el ajuste de la revisión inglesa, «salvación para mí» refleja la relación personal sin añadir una posesión que el hebreo no explicita.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque eres
  lexicon: HALOT
  rationale: Introduce el fundamento de la súplica; «porque» es claro y formal, y expresa bien la relación causal del hebreo.
- source_word: סַלְעִי
  english_pob_choice: my crag
  chosen_spanish: mi peña
  alternatives_spanish:
  - mi roca
  - mi peñasco
  lexicon: HALOT
  rationale: סלע puede designar un risco o peñasco; «peña» en español mantiene la diferenciación con צוּר y conserva la imagen de firmeza protectora.
- source_word: וּמְצוּדָתִי
  english_pob_choice: and my fortress
  chosen_spanish: y mi fortaleza
  alternatives_spanish:
  - y mi fortín
  - y mi plaza fuerte
  lexicon: HALOT
  rationale: מְצוּדָה corresponde a una fortaleza o plaza fuerte. «Fortaleza» es la forma más natural y bíblicamente reconocible en español sin perder el sentido defensivo.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: eres tú
  alternatives_spanish:
  - tú eres
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza el sujeto. «Eres tú» reproduce bien ese énfasis final en español con un orden enfático natural.
theological_decisions:
- issue: Cómo rendir צִוִּיתָ לְהוֹשִׁיעֵנִי sin suavizar la idea de mandato divino
  english_pob_reading: you have commanded salvation for me
  chosen_spanish_reading: has mandado salvación para mí
  alternative_spanish_readings:
  - has ordenado salvarme
  - has decretado salvarme
  - has dado mandato de salvarme
  rationale: El hebreo usa un verbo de mandato, y la traducción debe conservar esa afirmación de acción soberana de Dios. «Has mandado salvación para mí» evita una lectura excesivamente posesiva y mantiene la eficacia del mandato sin introducir formulaciones doctrinalmente más específicas que el texto no exige.
  doctrine_reference: Salmo 71:3; principio de preservar la fuerza verbal del mandato divino
- issue: Cómo distinguir צוּר, סֶלַע y מְצוּדָה en español sin borrar el paralelismo poético
  english_pob_reading: rock of refuge ... my crag and my fortress
  chosen_spanish_reading: peña de refugio ... mi peña y mi fortaleza
  alternative_spanish_readings:
  - roca de refugio ... mi roca y mi fortaleza
  - peñón de refugio ... mi peñasco y mi fortaleza
  rationale: El hebreo acumula imágenes rocosas con matices distintos. «Peña» y «fortaleza» permiten conservar el campo semántico de protección sin colapsar todos los términos en un solo equivalente idéntico; la nota preserva la alternativa más literal de «morada» para מָעוֹן.
  doctrine_reference: Salmo 71:3; preservación del paralelismo y de la imaginería protectora
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la frase de salvación desde una forma posesiva a «salvation for me» para reflejar más de cerca el hebreo. En español se siguió ese mismo criterio con «salvación para mí». También se mantuvo la coma tras «refugio» para mejorar la legibilidad, y se preservó la distinción entre las tres imágenes de roca/fortaleza.
  spanish_consistency_notes:
  - Se usó «Yahvé» sólo cuando el texto lo requiera explícitamente; en este versículo no aparece el Tetragrámaton, así que no se introdujo.
  - Se evitó «Señor» porque no corresponde a ninguna forma subyacente en este verso.
  - «Peña» se emplea para diferenciar צוּר y סלע sin perder el valor protector.
  - «Fortaleza» traduce מְצוּדָה de manera consistente con el campo defensivo bíblico.
  - La estructura verbal en perfecto («has mandado») conserva el valor de acción ya realizada que tiene el hebreo.
