translation:
  language: es
  text: E invocando a Dios[a], el juez justo, fue contra los asesinos de sus hermanos; de noche incendió el puerto y quemó los barcos, y atravesó a los que habían huido allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que se habían refugiado allí». El participio griego puede subrayar que huyeron a un lugar de refugio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσάμενος
  english_pob_choice: calling on
  chosen_spanish: llamando a
  alternatives_spanish:
  - invocando a
  - apelando a
  lexicon: BDAG
  rationale: El participio expresa una apelación dirigida a Dios antes de la acción. En español, «llamando a» conserva el sentido religioso de invocación sin sonar demasiado rígido.
- source_word: τὸν δίκαιον κριτὴν θεόν
  english_pob_choice: God, the righteous judge
  chosen_spanish: Dios, el juez justo
  alternatives_spanish:
  - Dios, el juez recto
  - Dios, el justo juez
  lexicon: BDAG
  rationale: La aposición se vierte de forma natural en español como «Dios, el juez justo». «Justo» preserva bien el valor judicial y moral de δίκαιον.
- source_word: παραγενόμενος ἐπὶ
  english_pob_choice: he came against
  chosen_spanish: se presentó contra
  alternatives_spanish:
  - avanzó contra
  - se acercó contra
  lexicon: BDAG
  rationale: En este contexto militar, la construcción indica movimiento hostil contra un objetivo. «Se presentó contra» mantiene la idea de llegar sobre el enemigo con tono narrativo fluido en español.
- source_word: τοὺς μιαιφόνους τῶν ἀδελφῶν
  english_pob_choice: the murderers of his brothers
  chosen_spanish: los asesinos de sus hermanos
  alternatives_spanish:
  - los homicidas de sus hermanos
  - los manchados de sangre de sus hermanos
  lexicon: LSJ
  rationale: μιαιφόνος tiene una fuerza fuerte de asesinato con mancha de sangre. «Asesinos» comunica con claridad el acto ilícito y violento; la nota de contaminación ritual queda implícita en el término griego, sin sobrecargar el español.
- source_word: τὸν μὲν λιμένα
  english_pob_choice: the harbor
  chosen_spanish: el puerto
  alternatives_spanish:
  - el fondeadero
  - el puerto marítimo
  lexicon: LSJ
  rationale: λιμήν puede significar «puerto» o «bahía/abrigo». «Puerto» es la opción más natural en español para el escenario narrativo.
- source_word: νύκτωρ
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: LSJ
  rationale: La marca temporal se expresa de manera directa y idiomática con «de noche».
- source_word: ἐνέπρησεν
  english_pob_choice: he set ... on fire
  chosen_spanish: incendió
  alternatives_spanish:
  - prendió fuego a
  - quemó
  lexicon: LSJ
  rationale: El verbo indica prender fuego intencionalmente. «Incendió» conserva mejor la causatividad que un simple «quemó».
- source_word: τὰ σκάφη κατέφλεξεν
  english_pob_choice: and burned the ships
  chosen_spanish: y quemó los barcos
  alternatives_spanish:
  - y consumió las naves
  - y abrasó las embarcaciones
  lexicon: LSJ
  rationale: σκάφη puede referirse a barcos o embarcaciones. «Barcos» es claro y natural; el refuerzo verbal ya está dado por el contexto de incendiar.
- source_word: τοὺς δὲ ἐκεῖ συμφυγόντας
  english_pob_choice: those who had fled there
  chosen_spanish: a los que habían huido allí
  alternatives_spanish:
  - a los que se habían refugiado allí
  - a los que habían escapado allí
  lexicon: LSJ
  rationale: La participial expresa gente que huyó a ese lugar. «Habían huido allí» sigue de cerca el griego y mantiene abierta la posible matización de refugio.
- source_word: ἐξεκέντησεν
  english_pob_choice: he stabbed
  chosen_spanish: acuchilló
  alternatives_spanish:
  - ensartó
  - hirió con la espada
  lexicon: LSJ
  rationale: El verbo significa herir atravesando con arma punzante. «Acuchilló» comunica de forma viva la violencia del acto; «hirió» sería demasiado general.
theological_decisions:
- issue: Título judicial aplicado a Dios en un contexto de venganza bélica
  english_pob_reading: God, the righteous judge
  chosen_spanish_reading: Dios, el juez justo
  alternative_spanish_readings:
  - Dios, el juez recto
  - Dios, el justo juez
  rationale: La traducción conserva el título judicial sin añadir desarrollo doctrinal. «Justo» mantiene la fuerza de δικαιος y permite que el lector perciba el vínculo entre justicia divina y la acción militar del relato sin resolver la tensión moral del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish.'
translation_notes:
  revision_awareness: El cotejo inglés indica alta concordancia y sin cambios necesarios en la última revisión; esta versión española sigue esa lectura, manteniendo la tensión del texto y una equivalencia óptima sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «juez justo» para preservar la terminología judicial sin sustituirla por fórmulas eclesiásticas.
  - Se eligió «acuchilló» para conservar la violencia concreta de ἐξεκέντησεν, en vez de neutralizarla con un verbo más general.
  - Se usó «puerto» y «barcos» por claridad narrativa en español, sin forzar tecnicismos marítimos que no añade el griego.
  - La nota [a] conserva la alternativa de refugio que el inglés POB documenta para συμφυγόντας.
