base_translation:
  language: en
  yaml_path: translation/ot/2_kings/001/009.yaml
  text: Then he sent to him a captain of fifty with his fifty men[a]. He went up to him, and behold, he was sitting on the top of the hill. He spoke to him, “Man of God, the king says[b], ‘Come down.’”
  footnotes:
  - marker: a
    text: Or “on the top of the mountain.” The Hebrew הַר can refer to a hill or a mountain depending on context.
    reason: lexical_alternative
  - marker: b
    text: 'Literally, “the king has spoken: ‘Come down.’” The Hebrew messenger formula uses “has spoken,” which is rendered idiomatically here as “says.”'
    reason: lexical_alternative
