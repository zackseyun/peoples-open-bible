translation:
  language: es
  text: Yah es mi fuerza y mi cántico[a]; y ha llegado a ser mi salvación. Este es mi Dios, y lo alabaré; el Dios de mi padre, y lo enalteceré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le prepararé una morada». El verbo hebreo aquí es difícil y puede tener la idea de hacerle una habitación, o de adornarlo/glorificarlo.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָזִּי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi poder
  - mi fortaleza
  lexicon: HALOT
  rationale: עֹז/עָז denota fuerza, vigor o poder. «Mi fuerza» es natural en español y conserva el paralelo poético con «cántico» sin sobrecargar el verso con una abstracción demasiado técnica.
- source_word: וְזִמְרָת יָהּ
  english_pob_choice: and song
  chosen_spanish: y mi cántico
  alternatives_spanish:
  - y canción
  - y alabanza
  - y melodía
  lexicon: HALOT
  rationale: זִמְרָה puede referirse a canto o a expresión musical de alabanza. «Cántico» funciona bien en español bíblico y mantiene el tono poético. El posesivo implícito en la construcción se expresa naturalmente como «mi cántico» para reflejar la relación con la primera cola del verso.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - el SEÑOR
  - Yahvé
  lexicon: HALOT
  rationale: La forma קצרה divina יָהּ no es el tetragrámaton completo, por lo que se conserva como «Yah» en lugar de normalizarla a la forma usual del nombre divino. Esto preserva la forma poética y la distinción lexical del hebreo.
- source_word: וַיְהִי לִי לִישׁוּעָה
  english_pob_choice: and he has become my salvation
  chosen_spanish: y ha sido para mí salvación
  alternatives_spanish:
  - y se ha vuelto mi salvación
  - y me ha sido salvación
  lexicon: HALOT
  rationale: 'La construcción hebrea expresa un estado/resultante: algo llegó a ser o quedó como salvación para alguien. «Ha sido para mí salvación» suena natural en español y preserva la idea de resultado sin añadir más explicación de la que el texto requiere.'
- source_word: זֶה אֵלִי
  english_pob_choice: This is my God
  chosen_spanish: Este es mi Dios
  alternatives_spanish:
  - Este es el Dios mío
  - Este es mi Dios
  lexicon: HALOT
  rationale: El demostrativo más el sustantivo se vierte con una identificación directa y natural. «Este es mi Dios» conserva el énfasis del hebreo y evita una paráfrasis innecesaria.
- source_word: וְאַנְוֵהוּ
  english_pob_choice: and I will praise him
  chosen_spanish: y lo alabaré
  alternatives_spanish:
  - y lo glorificaré
  - y le haré morada
  - y lo embelleceré
  lexicon: HALOT
  rationale: El verbo es difícil y admite sentidos como alabar, glorificar, adornar o preparar morada. En el contexto de este cántico, «alabaré» recoge bien el valor doxológico principal que la POB inglesa adoptó en el texto, sin cerrar por completo la ambigüedad del hebreo.
- source_word: אֱלֹהֵי אָבִי
  english_pob_choice: my father's God
  chosen_spanish: el Dios de mi padre
  alternatives_spanish:
  - mi padre es Dios
  - el Dios de mi padre
  lexicon: HALOT
  rationale: La construcción posesiva hebrea se expresa de manera idiomática en español como «el Dios de mi padre». Mantiene el matiz de referencia ancestral/covenantal y suena más natural que una repetición posesiva literal.
- source_word: וַאֲרֹמְמֶנְהוּ
  english_pob_choice: and I will exalt him
  chosen_spanish: y lo enalteceré
  alternatives_spanish:
  - y lo exaltaré
  - y lo levantaré en alto
  lexicon: HALOT
  rationale: De רום/רומם, «enaltecer» conserva el registro elevado del lenguaje de adoración y comunica bien la idea de exaltar sin depender de un calco excesivamente literal.
theological_decisions:
- issue: Forma del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La POB inglesa distingue la forma abreviada יָהּ del tetragrámaton completo. La versión española conserva esa distinción con «Yah» para honrar la forma del original y evitar una normalización que borre la señal poética del texto.
  doctrine_reference: Translation philosophy §1; Contested terms table on YHWH / divine-name renderings
- issue: Sentido de וְאַנְוֵהוּ
  english_pob_reading: I will praise him
  chosen_spanish_reading: lo alabaré
  alternative_spanish_readings:
  - le haré morada
  - lo glorificaré
  - lo embelleceré
  rationale: El verbo es semánticamente disputado. La lectura principal adopta la opción doxológica que mejor encaja con el paralelismo inmediato y con el contexto del cántico, sin perder de vista la alternativa de «preparar morada» que la POB preserva en nota.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés: conserva la distinción entre יָהּ y el tetragrámaton, adopta la lectura principal doxológica para וְאַנְוֵהוּ y preserva en nota la alternativa de «preparar una morada». No se registraron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se usó «Yah» de forma consistente para יָהּ, no «Yahvé», porque el hebreo no presenta aquí יהוה.
  - «Mi fuerza» y «mi cántico» mantienen el paralelismo poético sin introducir términos ajenos al campo semántico del verso.
  - «Lo alabaré» y «lo enalteceré» conservan el registro de adoración elevado del original.
  - La nota al pie está anclada en «cántico» mediante [a], porque la alternativa interpretativa afecta al tramo poético completo del hemistiquio.
