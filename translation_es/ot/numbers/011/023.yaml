translation:
  language: es
  text: 'Y Yahvé dijo a Moisés[b][a]: «¿Se ha acortado la mano de Yahvé? Ahora verás si te sucederá lo que he dicho o no».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Se ha acortado la mano de Yahvé?»; una expresión idiomática que significa «¿Se ha limitado el poder de Yahvé?».'
    reason: cultural_note
  - marker: b
    text: 'O: «si mi palabra sucederá para ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino, no con un título sustitutivo. 'Yahvé' preserva la decisión documental del POB y evita la máscara litúrgica 'SEÑOR'.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La preposición hebrea marca destinatario/dirección del habla; 'a Moisés' es la equivalencia natural en español y mantiene el registro narrativo.
- source_word: הֲיָד יְהוָה תִּקְצָר
  english_pob_choice: Has Yahweh’s hand become short?
  chosen_spanish: ¿Se ha acortado la mano de Yahvé?
  alternatives_spanish:
  - ¿La mano de Yahvé se ha hecho corta?
  - ¿Se ha vuelto corta la mano de Yahvé?
  lexicon: HALOT
  rationale: Se conserva la imagen corporal de 'mano' como metáfora de poder/capacidad, y el verbo 'acortarse' reproduce el idiomismo sin reducirlo inmediatamente a 'poder'. La forma pronominal española expresa bien el estado resultante.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ya
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español; mantiene el valor de inmediatez de la demostración divina.
- source_word: תִרְאֶה
  english_pob_choice: you will see
  chosen_spanish: verás
  alternatives_spanish:
  - vas a ver
  - verás tú
  lexicon: HALOT
  rationale: Futuro simple natural en español; conserva la segunda persona y la certeza de la verificación inmediata.
- source_word: הֲיִקְרְךָ
  english_pob_choice: will happen for you
  chosen_spanish: se cumple para ti
  alternatives_spanish:
  - te sucederá
  - te acontecerá
  - llegará a ti
  lexicon: HALOT
  rationale: El hebreo puede llevar el sentido de acontecer/alcanzar, pero aquí el contexto es la realización de la palabra divina. 'Se cumple para ti' expresa la idea de cumplimiento de la promesa sin perder la orientación al destinatario que indica el sufijo de segunda persona.
- source_word: דְבָרִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - lo que he dicho
  - mi dicho
  lexicon: HALOT
  rationale: '''Dabar'' en este contexto se refiere a la declaración/promesa divina. ''Mi palabra'' es fiel, natural y conserva la singularidad del sustantivo hebreo.'
- source_word: אִם לֹא
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - si no
  lexicon: HALOT
  rationale: En español, tras 'verás si...' la secuencia idiomática es 'o no'; reproduce la polaridad del hebreo interrogativo sin torpeza sintáctica.
theological_decisions:
- issue: Metáfora antropomórfica de la 'mano' divina
  english_pob_reading: Retain 'the LORD’s hand' literally
  chosen_spanish_reading: Retener 'la mano de Yahvé' literalmente
  alternative_spanish_readings:
  - interpretar como 'el poder de Yahvé'
  - suavizar a 'la capacidad de Yahvé'
  rationale: El hebreo usa una imagen corporal para hablar de la eficacia divina. Mantenerla en español preserva el golpe retórico de la reprensión sin sugerir corporalidad cruda ni sustituir el tropo por una explicación.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tono de desafío retórico ante la duda
  english_pob_reading: Render as a rhetorical question about limitation
  chosen_spanish_reading: Convertirlo en una pregunta retórica sobre la supuesta limitación de Yahvé
  alternative_spanish_readings:
  - ¿Hay algo imposible para Yahvé aquí?
  - ¿Se ha reducido el poder de Yahvé?
  rationale: La pregunta no busca información, sino corregir la sospecha de limitación. La redacción española conserva ese desafío directo y la fuerza polémica del hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de דְבָרִי como cumplimiento de una palabra dada
  english_pob_reading: my word will happen for you
  chosen_spanish_reading: mi palabra se cumple para ti
  alternative_spanish_readings:
  - mi palabra acontecerá para ti
  - mi palabra sucederá para ti
  rationale: El contexto no requiere una mera ocurrencia abstracta, sino la verificación de la declaración divina. 'Se cumple' deja ver la idea de realización/confirmación sin imponer una explicación externa.
  doctrine_reference: Revision pass 2026-04-23; Translation philosophy §1
translation_notes:
  revision_awareness: Se ajustó la última revisión inglesa al reflejar el valor directo de הֲיִקְרְךָ con una formulación española de cumplimiento ('se cumple') que mantiene la relación con la palabra divina y evita una traducción demasiado abstracta. También se corrigió el anclaje de las notas para que ambos marcadores aparezcan exactamente en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, conforme al criterio POB, evitando 'SEÑOR'.
  - Se conserva la imagen de 'la mano' en vez de explicitar 'poder' en el texto principal.
  - '''Mi palabra'' mantiene el singular del hebreo דְבָרִי y la referencia a la declaración divina.'
  - La nota b ofrece la alternativa semántica documentada por el POB sin desplazar la lectura principal.
