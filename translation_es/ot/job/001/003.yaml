  text: וַ/יְהִ֣י מִ֠קְנֵ/הוּ שִֽׁבְעַ֨ת אַלְפֵי צֹ֜אן וּ/שְׁלֹ֧שֶׁת אַלְפֵ֣י גְמַלִּ֗ים וַ/חֲמֵ֨שׁ מֵא֤וֹת צֶֽמֶד בָּקָר֙ וַ/חֲמֵ֣שׁ מֵא֣וֹת אֲתוֹנ֔וֹת וַ/עֲבֻדָּ֖ה רַבָּ֣ה מְאֹ֑ד וַ/יְהִי֙ הָ/אִ֣ישׁ הַ/ה֔וּא גָּד֖וֹל מִ/כָּל בְּנֵי קֶֽדֶם־־־־׃
