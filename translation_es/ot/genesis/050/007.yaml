revisions:
- from: Así que José subió[a] para enterrar a su padre, y con él subieron todos los siervos de Faraón, los ancianos de su casa, y todos los ancianos de la tierra de Egipto.
  to: José subió[a] para enterrar a su padre, y con él subieron todos los siervos de Faraón, los ancianos de su casa real, y todos los ancianos de la tierra de Egipto.
  rationale: Se elimina ‘Así que’ por añadir una relación inferencial no explícita en el hebreo, y se ajusta ‘su casa’ a ‘su casa real’ para expresar con mayor claridad el sentido cortesano de בֵיתוֹ en referencia a Faraón. Se conserva ‘subió’ con nota, la repetición verbal, ‘siervos’, ‘ancianos’ y ‘tierra de Egipto’ por su fidelidad al texto fuente y a la auditoría inglesa.
