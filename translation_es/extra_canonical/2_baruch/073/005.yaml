lexical_decisions:
- source_word: “this world”
  english_pob_choice: this world
  chosen_spanish: este mundo
  alternatives_spanish:
  - el mundo
  lexicon: deíctico
  rationale: Conservo el valor de cercanía de «this» con «este», como en el inglés POB, sin añadir una connotación doctrinal que el pasaje no exige.
- source_word: “evils”
  english_pob_choice: evils
  chosen_spanish: males
  alternatives_spanish:
  - maldades
  - malos
  lexicon: malo
  rationale: «Males» mantiene el sustantivo abstracto y amplio del original, sin reducirlo solo a acciones morales específicas.
- source_word: “the life of mankind”
  english_pob_choice: the life of mankind
  chosen_spanish: la vida de la humanidad
  alternatives_spanish:
  - la vida de los seres humanos
  - la vida del género humano
  lexicon: humanidad
  rationale: «La humanidad» reproduce el alcance colectivo y general de «mankind» en un español natural y digno.
- source_word: “was greatly troubled”
  english_pob_choice: was greatly troubled
  chosen_spanish: fue grandemente perturbada
  alternatives_spanish:
  - fue muy afligida
  - fue profundamente turbada
  lexicon: perturbar
  rationale: «Perturbada» conserva el sentido de alteración intensa sin exagerar hacia una interpretación más emocional que la que permite el texto.
theological_decisions:
- issue: Relación causal entre «estas cosas» y la corrupción del mundo
  english_pob_reading: For these are the things that filled this world with evils, and because of these the life of mankind was greatly troubled.
  chosen_spanish_reading: Porque estas son las cosas que llenaron este mundo de males, y por causa de ellas la vida de la humanidad fue grandemente perturbada.
  alternative_spanish_readings:
  - Porque estas son las cosas que colmaron este mundo de males, y por ellas la vida de la humanidad fue muy trastornada.
  rationale: Mantengo la causalidad explícita de «for» y «because of these», sin suavizar la afirmación ni convertirla en mera descripción general.
  doctrine_reference: Theodicy / consecuencia del mal en el mundo
- issue: Intensidad de la aflicción humana
  english_pob_reading: was greatly troubled
  chosen_spanish_reading: fue grandemente perturbada
  alternative_spanish_readings:
  - fue muy afligida
  - fue profundamente trastornada
  rationale: «Grandemente perturbada» conserva la intensidad del adverbio inglés y evita una paráfrasis que cambie el foco de desorden a dolor emocional exclusivamente.
  doctrine_reference: Suffering / human distress
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios tras el último pase; por eso la redacción española sigue de cerca ese estado estable, sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún nombre divino.
  - Se mantiene «humanidad» como equivalente inclusivo y natural de «mankind».
  - No se añade puntuación o glosa interpretativa fuera de la relación causal explícita del verso.
