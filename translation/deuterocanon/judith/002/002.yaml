id: JDT.2.2
reference: Judith 2:2
source:
  edition: lxx-swete-1909
  text: καὶ συνεκάλεσεν πάντας τοὺς θεράποντας αὐτοῦ καὶ πάντας τοὺς μεγιστᾶνας αὐτοῦ, καὶ ἔθετο μετʼ αὐτῶν τὸ μυστήριον τῆς βουλῆς αὐτοῦ, καὶ συνετέλεσεν πᾶσαν τὴν κακίαν τῆς γῆς ἐκ τοῦ στόματος αὐτοῦ·
  language: Greek
  pages:
  - 798
  - 799
  - 800
  - 801
  - 802
  - 803
  confidence: high
  validation: agree
translation:
  text: And he summoned all his attendants and all his nobles[a], and he set before them the secret of his plan[b], and from his own mouth he declared all the evil of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he disclosed to them the mystery of his counsel.' Here μυστήριον likely means a secret matter or confidential plan, not a technical theological 'mystery.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'he declared all the wickedness of the land' is difficult. The Greek may mean that he fully set forth the evil concerning the land, rather than that the land itself was wicked.
    reason: alternative_reading
lexical_decisions:
- source_word: συνεκάλεσεν
  chosen: summoned
  alternatives:
  - called together
  - assembled
  lexicon: LSJ
  rationale: The compound verb indicates calling people together into an assembly. 'Summoned' is concise, natural English and preserves the authoritative nuance better than the flatter 'called.'
- source_word: θεράποντας
  chosen: attendants
  alternatives:
  - servants
  - retainers
  lexicon: LSJ
  rationale: θεράπων often denotes one in personal service, especially a court attendant rather than a slave in the stronger δοῦλος sense. 'Attendants' fits the royal setting and avoids overstating bonded status.
- source_word: μεγιστᾶνας
  chosen: nobles
  alternatives:
  - great men
  - magnates
  - officials
  lexicon: LSJ
  rationale: The term refers to high-ranking persons in the court or realm. 'Nobles' is idiomatic and suitably elevated; 'magnates' is less accessible, and 'officials' is too bureaucratic.
- source_word: ἔθετο μετʼ αὐτῶν τὸ μυστήριον
  chosen: he laid before them the secret plan
  alternatives:
  - he disclosed to them the mystery
  - he set with them the secret
  lexicon: LSJ
  rationale: The idiom ἔθετο μετʼ αὐτῶν means he set the matter before them or shared it with them. μυστήριον here is not a later technical theological 'mystery' but a secret matter. 'Secret plan' communicates the court-political sense clearly.
- source_word: βουλῆς
  chosen: counsel
  alternatives:
  - plan
  - purpose
  - decision
  lexicon: LSJ
  rationale: βουλή can mean counsel, plan, or purpose. Retaining 'counsel' preserves the deliberative sense, while 'secret plan of his counsel' reflects the genitival relationship without flattening it to a single abstract noun.
- source_word: συνετέλεσεν
  chosen: declared
  alternatives:
  - completed
  - brought to an end
  - set forth fully
  lexicon: LSJ
  rationale: Although the verb often means 'complete,' in this context with ἐκ τοῦ στόματος αὐτοῦ it most naturally means he brought the matter fully out in speech, i.e., stated it completely. 'Declared' captures the verbal force in idiomatic English.
- source_word: πᾶσαν τὴν κακίαν τῆς γῆς
  chosen: all the wickedness of the land
  alternatives:
  - all the evil of the earth
  - the whole harm to the land
  lexicon: LSJ
  rationale: κακία commonly means evil or wickedness. Given the political-military context, the phrase likely refers to the evil to be inflicted on the land or concerning the land, but the Greek wording itself is broad. 'Wickedness of the land' stays close to the text while remaining intelligible.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  chosen: from his own mouth
  alternatives:
  - with his own mouth
  - out of his mouth
  lexicon: LSJ
  rationale: This phrase emphasizes direct personal utterance. 'From his own mouth' preserves that emphasis naturally in English.
