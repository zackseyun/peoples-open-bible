translation:
  language: es
  text: Porque yo soy Yahvé[a]; la palabra que yo digo será hecha. Ya no se dilatará más[b], porque en sus días, oh casa rebelde, hablaré una palabra y la haré, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra que yo hable». La expresión hebrea es enfática y puede traducirse de una manera más formal.
    reason: lexical_alternative
  - marker: b
    text: O «Ya no se prolongará más» o «no se alargará más».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio y auditable, siguiendo el principio del proyecto de no sustituir el Tetragrámaton por un título. En español, «Yahvé» es la forma transparente y más reconocible para lectores eclesiales amplios.
- source_word: אֲדַבֵּר
  english_pob_choice: I will speak
  chosen_spanish: hable / hablaré
  alternatives_spanish:
  - hablo
  - estoy hablando
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa aquí acción segura y futura en contexto profético. En la primera cláusula, «la palabra que yo hable» mantiene la relación con el sustantivo «palabra»; en la segunda, «hablaré» expresa la certeza del acto venidero.
- source_word: אֵת אֲשֶׁר אֲדַבֵּר דָּבָר
  english_pob_choice: the word that I speak
  chosen_spanish: la palabra que yo hable
  alternatives_spanish:
  - la palabra que yo diré
  - lo que yo hable
  lexicon: HALOT
  rationale: Se conserva el sustantivo explícito «palabra», como en la lectura inglesa final, porque el contexto enfatiza el dicho divino como palabra eficaz. «La palabra que yo hable» resulta natural en español y preserva el valor enfático del hebreo.
- source_word: וְיֵעָשֶׂה
  english_pob_choice: and it will be done
  chosen_spanish: será hecha
  alternatives_spanish:
  - será cumplida
  - se hará
  lexicon: HALOT
  rationale: Se mantiene el pasivo verbal para reflejar el enlace entre palabra divina y cumplimiento. «Será hecha» puede sonar más literal que «se hará», pero conserva mejor la referencia a la palabra/decisión que recibe ejecución.
- source_word: לֹא תִמָּשֵׁךְ עוֹד
  english_pob_choice: It will no longer be delayed
  chosen_spanish: No se dilatará más
  alternatives_spanish:
  - No será prolongada más
  - No se alargará más
  lexicon: HALOT
  rationale: «Dilatarse» expresa bien la idea de ser prolongado o postergado en español contemporáneo y mantiene la fuerza de la negación temporal. Evita una paráfrasis excesiva y conserva la tensión de cumplimiento inmediato.
- source_word: בֵּית הַמֶּרִי
  english_pob_choice: O rebellious house
  chosen_spanish: oh casa rebelde
  alternatives_spanish:
  - casa de rebelión
  - pueblo rebelde
  lexicon: HALOT
  rationale: Se conserva el vocativo y la metáfora corporativa «casa», con el adjetivo «rebelde» para una formulación natural y directa en español. Esto preserva el tono de reprensión profética.
- source_word: דָּבָר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - cosa
  - asunto
  lexicon: HALOT
  rationale: En este contexto profético, «palabra» refleja mejor la unidad entre declaración y cumplimiento que opciones más generales como «cosa» o «asunto».
- source_word: וַעֲשִׂיתִיו
  english_pob_choice: and do it
  chosen_spanish: la haré
  alternatives_spanish:
  - la cumpliré
  - la haré acontecer
  lexicon: HALOT
  rationale: El sufijo pronominal remite a la «palabra» mencionada, por eso «la haré» mantiene la referencia pronominal y la brevedad del hebreo. «Cumpliré» sería interpretativo pero posible; se prefirió una forma más cercana al paralelismo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con un verbo natural en español. Se mantiene la distinción entre YHWH y la expresión compuesta אֲדֹנָי יְהוִה, aunque en español la combinación se vierte de forma fluida como «el Señor Yahvé».
theological_decisions:
- issue: Tratamiento del nombre divino frente al título compuesto final
  english_pob_reading: Initial יְהוָה rendered 'Yahweh'; closing אֲדֹנָי יְהוָה rendered 'the Lord GOD'
  chosen_spanish_reading: Inicialmente «Yahvé»; al final «el Señor Yahvé»
  alternative_spanish_readings:
  - Yahvé ... el Señor Dios
  - Yahvé ... el Señor SEÑOR
  rationale: Se evita la sustitución por un título genérico y se conserva la diferencia entre el nombre propio divino y la fórmula solemne final. «El Señor Yahvé» comunica el peso reverencial sin ocultar el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, especialmente la simplificación de la cláusula inicial a una formulación más natural («the word that I speak»), manteniendo la estructura profética, la referencia al cumplimiento inmediato y la fórmula final de declaración.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo «palabra» en dos lugares para conservar la cohesión semántica del versículo.
  - La elección de «No se dilatará más» preserva el matiz de retraso/prolongación sin introducir una interpretación más amplia.
  - «Casa rebelde» reproduce la metáfora corporativa sin suavizarla.
  - Se mantuvo la fórmula profética «declara» para נְאֻם, en lugar de un equivalente demasiado libre.
