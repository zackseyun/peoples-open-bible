translation:
  language: es
  text: Y no saldrán de la entrada de la tienda de reunión durante siete días, hasta el día en que se cumplan los días de su ordenación; porque él los ordenará[a] durante siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «llenará su mano», un modismo hebreo para ordenar o instalar a alguien en el servicio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפֶּתַח
  english_pob_choice: from the entrance
  chosen_spanish: de la entrada
  alternatives_spanish:
  - desde la entrada
  - de la puerta
  lexicon: HALOT
  rationale: פֶּתַח designa una entrada o acceso. «De la entrada» conserva la relación espacial sin sonar forzado en español.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo
  lexicon: HALOT
  rationale: En español, «tienda de reunión» refleja de manera transparente la designación técnica del santuario y sigue de cerca el hebreo, evitando sustituirla por un término más interpretativo como «tabernáculo».
- source_word: לֹא תֵצְאוּ
  english_pob_choice: you shall not go out
  chosen_spanish: no saldrán
  alternatives_spanish:
  - no deberán salir
  - no deben salir
  lexicon: HALOT
  rationale: 'El mandato legal se expresa naturalmente en español con futuro de prohibición: «no saldrán». Mantiene la fuerza directiva del hebreo sin sonar coloquial.'
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: «Por siete días» reproduce de forma natural la duración impuesta por la restricción.
- source_word: יְמֵי מִלֻּאֵיכֶם
  english_pob_choice: the days of your ordination
  chosen_spanish: los días de su consagración
  alternatives_spanish:
  - los días de su ordenación
  - los días de su investidura
  lexicon: HALOT
  rationale: מִלֻּאִים en contexto sacerdotal señala la instalación/consagración ritual. «Consagración» comunica bien el sentido ceremonial en español; «ordenación» también es posible, pero puede sonar más eclesiástico que sacerdotal en este contexto.
- source_word: יְמַלֵּא אֶת יֶדְכֶם
  english_pob_choice: he will ordain you
  chosen_spanish: él los consagrará
  alternatives_spanish:
  - él los ordenará
  - él llenará su mano
  lexicon: HALOT
  rationale: El hebreo contiene el idiomático «llenar la mano» como expresión técnica de instalación sacerdotal. En español, el sentido se hace explícito con «consagrará», preservando el valor ritual sin una literalidad opaca.
theological_decisions:
- issue: Cómo verter el idiomático מלא את־יד en un contexto sacerdotal
  english_pob_reading: The English POB keeps the idiom transparent in a footnote and reads the line as ordination/installing into priestly service.
  chosen_spanish_reading: 'La cláusula final se traduce con el sentido ritual explícito: «él los consagrará».'
  alternative_spanish_readings:
  - él los ordenará
  - él llenará su mano
  rationale: El hebreo conserva un tecnicismo sacerdotal. En español, la traducción principal debe ser inteligible y fiel al rito; por eso se explicita el valor de consagración/instalación en vez de dejar la metáfora sin aclaración en el cuerpo del texto.
  doctrine_reference: Levítico 8:33; cf. la fórmula sacerdotal de investidura en el Pentateuco
- issue: Si traducir מִלֻּאִים como «ordenación» o «consagración»
  english_pob_reading: The English POB uses 'ordination' for priestly installation and keeps the connection to the idiom in a note.
  chosen_spanish_reading: Se eligió «consagración» como término principal.
  alternative_spanish_readings:
  - ordenación
  - investidura
  rationale: «Consagración» es amplio, reverente y claro para lectores hispanohablantes, y evita una posible lectura demasiado confesional de «ordenación». Aun así, la alternativa «ordenación» se reconoce como cercana al valor técnico del rito.
  doctrine_reference: Éxodo 29; Levítico 8
translation_notes:
  revision_awareness: El audit trail en inglés revisó una redacción demasiado literal de la cláusula idiomática final y la llevó a un sentido explícito de ordenación/instalación. En español se decidió no conservar una metáfora oscura en el texto principal; en su lugar, se tradujo el valor ritual con «consagrará» y se dejó la nota para transparentar el modismo hebreo.
  spanish_consistency_notes:
  - Se mantuvo «tienda de reunión» para אֹהֶל מוֹעֵד, siguiendo una terminología transparente y consistente con el hebreo.
  - Se usó «consagración» para מִלֻּאִים por claridad ritual, evitando una equivalencia eclesiástica demasiado específica.
  - La prohibición se expresó con futuro de mandato negativo («no saldrán»), natural en español jurídico y ceremonial.
