translation:
  language: es
  text: No pelees con un hombre de lengua[a], ni añadas leña al fuego.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombre de lengua» es un modismo hebreo para una persona caracterizada por un habla dañina o conflictiva.
    reason: lexical_alternative
  - marker: b
    text: 'Testimonio griego: «No reprendas a un hombre que se aparta del pecado; recuerda que todos estamos sujetos a reprensiones». El hebreo conservado aquí, en cambio, advierte contra pelear con una persona marcada por la palabra dañina y contra alimentar el conflicto.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּינָץ
  english_pob_choice: Do not quarrel
  chosen_spanish: No pelees
  alternatives_spanish:
  - No riñas
  - No discutas
  - No contendás
  lexicon: HALOT
  rationale: El hebreo expresa entrar en contienda o pelea; en español, «pelear» comunica con claridad la idea proverbial de una disputa activa sin sonar excesivamente técnico.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: La preposición marca la relación de conflicto o enfrentamiento; «con» reproduce la construcción directa del dicho.
- source_word: אִישׁ לָשׁוֹן
  english_pob_choice: a man of tongue
  chosen_spanish: un hombre de lengua
  alternatives_spanish:
  - un hombre lenguaraz
  - un hombre de lengua dañina
  - un hombre pendenciero
  lexicon: HALOT
  rationale: Se conserva el giro literal del hebreo para mantener su fuerza proverbial y su transparencia textual; en español también se entiende como persona marcada por la palabra dañina o conflictiva.
- source_word: וְאַל תִּתֵּן
  english_pob_choice: do not put
  chosen_spanish: ni añadas
  alternatives_spanish:
  - ni pongas
  - ni eches
  - ni agregues
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto significa añadir o poner combustible. «Añadas» conserva la imagen de sumar algo que intensifica el conflicto.
- source_word: עַל אֵשׁ עֵץ
  english_pob_choice: wood on the fire
  chosen_spanish: leña al fuego
  alternatives_spanish:
  - madera al fuego
  - combustible al fuego
  - leña sobre el fuego
  lexicon: HALOT
  rationale: «Leña al fuego» es la forma proverbial natural en español y preserva la metáfora concreta de intensificar un incendio, equivalente al hebreo.
theological_decisions:
- issue: 'Base textual principal: hebreo frente al paralelo griego'
  english_pob_reading: Translate the extant Hebrew as the primary text, while preserving the Greek witness in a footnote because it gives a materially different admonition.
  chosen_spanish_reading: Traducir el hebreo como texto principal y señalar en nota la lectura griega, que advierte no reprochar al que se aparta del pecado y recordar que todos estamos bajo reprensiones.
  alternative_spanish_readings:
  - «No reprendas a un hombre que se aparta del pecado; recuerda que todos estamos sujetos a reprensiones»
  - «No censures al que vuelve del pecado; acuérdate de que todos merecemos reprensión»
  rationale: Para Sirácida, el proyecto da primacía al hebreo cuando está disponible. Aquí el griego no es una equivalencia verbal cercana, sino una forma textual materialmente distinta; por eso se mantiene el proverbio hebreo en el texto y se documenta la variante griega como lectura alternativa significativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el paralelo griego como input real sin desplazar la primacía hebrea.'
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido. Se conserva la decisión de traducir el hebreo como base principal y anotar el testimonio griego por su divergencia sustancial.
  spanish_consistency_notes:
  - Se mantiene «leña al fuego» como equivalencia proverbial natural del hebreo.
  - «Hombre de lengua» se conserva de forma literal para reflejar el hebraísmo documentado, sin sustituirlo por un término más interpretativo en el cuerpo principal.
  - El marcador de nota [a] aparece solo en la frase correspondiente y se usa para la variante textual griega.
