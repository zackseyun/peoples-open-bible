translation:
  language: es
  text: Y le entregó la mitad de las fuerzas y los elefantes[a], y le dio órdenes acerca de todo lo que deseaba[b], y acerca de todos los que habitaban en Judea y Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le confió la mitad de las fuerzas». El verbo griego puede destacar la entrega de algo puesto bajo la responsabilidad de otro.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «acerca de todo lo que deseaba». El objeto del deseo del rey queda implícito en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκεν
  english_pob_choice: handed over
  chosen_spanish: le entregó
  alternatives_spanish:
  - le pasó
  - le confió
  - le entregó en custodia
  lexicon: BDAG
  rationale: El verbo griego expresa transferencia de control o de autoridad. «Le entregó» conserva ese sentido concreto en español y evita añadir una carga demasiado hostil que no está en el texto.
- source_word: τὰς ἡμίσεις
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - una mitad
  - la mitad de
  lexicon: LSJ
  rationale: En español, «la mitad de las fuerzas» suena natural y refleja bien el valor distributivo del plural griego en este contexto militar.
- source_word: δυνάμεων
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - ejército
  lexicon: LSJ
  rationale: «Fuerzas» mantiene el alcance amplio del término militar griego y conserva el plural mejor que «ejército».
- source_word: ἐλέφαντας
  english_pob_choice: elephants
  chosen_spanish: los elefantes
  alternatives_spanish:
  - los elefantes de guerra
  lexicon: LSJ
  rationale: El griego dice simplemente «elefantes». Añadir «de guerra» sería explicativo, pero no explícito en la frase.
- source_word: ἐνετείλατο
  english_pob_choice: gave him orders
  chosen_spanish: le dio órdenes
  alternatives_spanish:
  - le mandó
  - le ordenó
  lexicon: BDAG
  rationale: La forma media expresa la emisión de instrucciones o mandatos. «Le dio órdenes» encaja con el contexto militar y es natural en español moderno.
- source_word: περὶ πάντων ὧν ἐβούλετο
  english_pob_choice: concerning everything he desired
  chosen_spanish: acerca de todo lo que deseaba
  alternatives_spanish:
  - acerca de todo lo que quería
  - respecto de todo lo que deseaba
  lexicon: BDAG
  rationale: «Deseaba» reproduce mejor el matiz formal de ἐβούλετο que «quería». La frase mantiene la ambigüedad del objeto implícito, tal como en griego.
- source_word: τῶν κατοικούντων
  english_pob_choice: those dwelling
  chosen_spanish: los que habitaban
  alternatives_spanish:
  - los habitantes
  - los que vivían
  lexicon: BDAG
  rationale: El participio funciona como sustantivo. «Los que habitaban» conserva esa fuerza verbal sin sobrecargar la frase.
- source_word: τὴν Ἰουδαίαν καὶ Ἰερουσαλήμ
  english_pob_choice: in Judea and Jerusalem
  chosen_spanish: en Judea y Jerusalén
  alternatives_spanish:
  - de Judea y Jerusalén
  lexicon: LSJ
  rationale: Aunque el griego usa acusativo con κατοικούντων, el sentido es locativo; en español corresponde «en». Se conserva la referencia geográfica de forma clara y directa.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete y refleja el mismo ajuste de registro observado en el repaso final inglés: «deseaba» reproduce mejor ἐβούλετο que una opción más coloquial. No se introdujeron ampliaciones interpretativas, y se preservó la ambigüedad del complemento implícito en περὶ πάντων ὧν ἐβούλετο.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene «elefantes» sin glosa interpretativa, siguiendo el cauteloso minimalismo del inglés POB.
  - Se evita «siervo» o vocabulario devocional ajeno al contexto militar del pasaje.
  - La construcción «los que habitaban» conserva el participio sustantivado del griego y resulta natural en español bíblico actual.
