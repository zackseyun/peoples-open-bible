- from: Los que amaban las asambleas de los santos huyeron de ellas[a][b]; como gorriones, volaron lejos de su lugar de descanso[c][d].
  to: Los que amaban las asambleas[a] de los santos[b] huyeron de ellas; como gorriones, se fueron volando de su lugar de descanso[c][d].
  rationale: Se corrige solo el segmento verbal final para evitar la sobretraducción de «lejos» y ajustarlo mejor al griego ἐξεπετάσθησαν y a la auditoría inglesa («flew away»). Se mantienen «asambleas», «santos», «gorriones» y «lugar de descanso» por ser fieles, naturales y coherentes con las decisiones documentadas. También se pulen las notas para reflejar mejor las alternativas léxicas relevantes.
