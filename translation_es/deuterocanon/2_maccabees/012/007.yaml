translation:
  language: es
  text: Pero cuando el lugar[a] quedó cerrado, se retiró, con intención de volver y arrancar de raíz a todo el cuerpo ciudadano[b] del pueblo de Joppe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el paraje», «la zona» o «el distrito». El griego χωρίον puede referirse a un lugar, territorio o localidad.
    reason: lexical_alternative
  - marker: b
    text: O «toda la comunidad cívica del pueblo de Joppe». El término griego πολίτευμα designa un colectivo cívico-político, no solo a individuos aislados.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δὲ χωρίου
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - la zona
  - el distrito
  - la región
  lexicon: LSJ
  rationale: χώριον puede designar un lugar, paraje o localidad. En español, «el lugar» conserva la neutralidad del término y evita precisar indebidamente si se trata de un área, distrito o posición fortificada.
- source_word: συγκλεισθέντος
  english_pob_choice: had been closed up
  chosen_spanish: quedó cerrado
  alternatives_spanish:
  - había sido cerrado
  - quedó cercado
  - quedó bloqueado
  lexicon: LSJ
  rationale: El participio aoristo pasivo expresa que el lugar fue cerrado o encerrado. «Quedó cerrado» mantiene la voz pasiva y suena natural en español sin introducir un mecanismo militar específico que el griego no explicita.
- source_word: ἀνέλυσεν
  english_pob_choice: he withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - partió
  - se alejó
  - levantó el campamento
  lexicon: LSJ
  rationale: ἀναλύω puede significar partir o retirarse; en un contexto narrativo-militar, «se retiró» preserva el sentido de dejar el lugar y encaja con la intención de regresar.
- source_word: πάλιν ἥξων
  english_pob_choice: intending to come again
  chosen_spanish: con intención de volver
  alternatives_spanish:
  - para volver otra vez
  - con el propósito de regresar
  - pensando volver
  lexicon: LSJ
  rationale: El participio futuro expresa propósito o intención. «Con intención de volver» comunica esa orientación futura de manera clara y sobria en español.
- source_word: τὸ σύμπαν ... πολίτευμα
  english_pob_choice: the entire citizen body
  chosen_spanish: todo el cuerpo ciudadano
  alternatives_spanish:
  - toda la comunidad cívica
  - el conjunto entero de los ciudadanos
  - toda la ciudadanía
  lexicon: LSJ
  rationale: πολίτευμα puede denotar cuerpo cívico, comunidad política o ciudadanía organizada. «Cuerpo ciudadano» conserva el valor colectivo-político sin reducirlo solo al gobierno ni diluirlo en una mera suma de individuos. «Todo» refleja σύμπαν.
- source_word: τῶν Ἰοππιτῶν
  english_pob_choice: of the people of Joppa
  chosen_spanish: de los habitantes de Joppe
  alternatives_spanish:
  - de los joppitas
  - de Joppe
  - del pueblo de Joppe
  lexicon: LSJ
  rationale: Ἰοππῖται nombra a los habitantes de Joppa/Jope. «Habitantes de Joppe» es claro para lectores modernos y mantiene el valor étnico-cívico del sustantivo.
- source_word: ἐκριζῶσαι
  english_pob_choice: to root out
  chosen_spanish: arrancar de raíz
  alternatives_spanish:
  - desarraigar
  - extirpar
  - arrancar
  lexicon: LSJ
  rationale: ἐκριζόω es literalmente «arrancar de raíz»; la imagen conserva la fuerza metafórica de eliminación total mejor que un verbo abstracto.
theological_decisions:
- issue: Alcance del castigo/intención contra Joppe
  english_pob_reading: Render the phrase corporately as 'root out the entire citizen body of the people of Joppa'
  chosen_spanish_reading: Traducirlo corporativamente como «todo el cuerpo ciudadano de los habitantes de Joppe»
  alternative_spanish_readings:
  - destruir a todos los habitantes de Joppe
  - arrasar toda la ciudad de Joppe
  - extirpar a toda la población de Joppe
  rationale: El griego centra la acción en πολίτευμα, un colectivo cívico-político, modificado por τὸ σύμπαν. La redacción española debe conservar ese alcance corporativo sin restringirlo solo a un gobierno ni diluirlo en una referencia genérica a toda la población. El texto reporta una intención severa en términos militares y políticos, sin suavizarla ni ampliarla indebidamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que prefirió «citizen body» para πολίτευμα y mantuvo una solución neutral para χωρίον. En español se optó por «cuerpo ciudadano» para conservar el matiz colectivo-político, y por «quedó cerrado» / «se retiró» por naturalidad formal sin perder el valor pasivo y narrativo del griego.
  spanish_consistency_notes:
  - Se mantiene «Joppe» como forma hispana tradicional del topónimo, coherente con un registro bíblico en español.
  - Se evita «SEÑOR» o equivalentes no aplicables; no hay nombres divinos en este versículo.
  - «Arrancar de raíz» conserva la metáfora agrícola del verbo griego y el tono severo del pasaje.
