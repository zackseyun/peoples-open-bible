revisions:
- from: No habrá más allí un[a] infante de días, ni un anciano que no complete sus días; porque el joven morirá a los cien años[b], y el pecador, a los cien años, será maldito[c].
  to: No habrá más de allí un[a] infante de días, ni un anciano[b] que no complete sus días; porque el joven morirá a los cien años, y el pecador, a los cien años, será maldito[c].
  rationale: 'Se ajusta ''allí'' a ''de allí'' para conservar la preposición explícita del hebreo מִשָּׁם, siguiendo la decisión auditada del POB inglés. Se corrigen las notas al pie para que cada marcador corresponda a la cláusula pertinente: [a] para ''infante de días'', [b] para la cláusula del anciano, y [c] para ''será maldito''. No se altera la tensión teológica ni el sentido básico del versículo.'
