  text: הֶ֣רֶף מֵ֭/אַף וַ/עֲזֹ֣ב חֵמָ֑ה אַל תִּ֝תְחַ֗ר אַךְ לְ/הָרֵֽעַ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/008.yaml
  text: Let go of anger[a], and abandon wrath[b]; do not be provoked—it only leads to evil.
