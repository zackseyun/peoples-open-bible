translation:
  language: es
  text: los que se divierten con las aves del cielo[a], y atesoran plata y oro, en los cuales la gente confiaba, y no hay fin de sus posesiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'juegan entre las aves del cielo'; el participio griego puede sugerir una actividad de juego en general, no necesariamente burla verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπαίζοντες
  english_pob_choice: make sport with
  chosen_spanish: hacen burla de
  alternatives_spanish:
  - se divierten con
  - se burlan de
  - juegan con
  lexicon: LSJ
  rationale: El griego puede abarcar una actividad de burla o de juego/entretenimiento. En español, 'hacen burla de' conserva esa amplitud mejor que una opción más específica como 'cazan' o 'se burlan' exclusivamente, y evita fijar indebidamente el sentido.
- source_word: ὀρνέοις τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  - los pájaros del cielo
  lexicon: LSJ
  rationale: '''Aves del cielo'' reproduce bien la imagen del griego y su sabor de LXX. ''Aves'' es más digno y más natural en un registro bíblico que ''pájaros'', sin perder claridad.'
- source_word: θησαυρίζοντες
  english_pob_choice: store up
  chosen_spanish: atesoran
  alternatives_spanish:
  - acumulan
  - almacenan
  - guardan
  lexicon: BDAG
  rationale: El verbo griego implica acumular como tesoro. 'Atesoran' conserva esa fuerza y el matiz de riqueza acumulada mejor que un verbo más neutral como 'guardan'.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - plata fina
  - riquezas
  lexicon: LSJ
  rationale: La pareja con 'oro' favorece el sentido literal de metal precioso. 'Plata' mantiene la correspondencia directa con el griego y con el paralelismo del verso.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro refinado
  - oro fino
  lexicon: LSJ
  rationale: Equivalente directo y transparente del griego.
- source_word: ᾧ ἐπεποίθεισαν ἄνθρωποι
  english_pob_choice: in which people trusted
  chosen_spanish: en los cuales han confiado las personas
  alternatives_spanish:
  - en los cuales confiaron las personas
  - en el cual las personas han confiado
  - en los que confiaron los hombres
  lexicon: BDAG
  rationale: El relativo singular griego se refiere colectivamente al conjunto de plata y oro; en español, el plural 'los cuales' evita una pesadez sintáctica. 'Han confiado' suena más natural en español bíblico y no contradice el hecho de que el griego usa un aoristo con valor general. 'Las personas' neutraliza el masculino representativo cuando no aporta precisión doctrinal.
- source_word: οὐκ ἔστιν τέλος
  english_pob_choice: there is no end
  chosen_spanish: no hay fin
  alternatives_spanish:
  - no tiene fin
  - no hay límite
  - es interminable
  lexicon: LSJ
  rationale: Renderización directa y idiomática de la cláusula existencial griega.
- source_word: κτήσεως
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  - riquezas
  lexicon: LSJ
  rationale: '''Posesiones'' traduce con naturalidad el sustantivo y conserva la amplitud de bienes adquiridos u obtenidos por acumulación.'
theological_decisions:
- issue: Tratamiento del sustantivo griego ἄνθρωποι
  english_pob_reading: people
  chosen_spanish_reading: las personas
  alternative_spanish_readings:
  - los hombres
  - la gente
  - los seres humanos
  rationale: El contexto no exige marcar género masculino; 'las personas' comunica el valor representativo y evita una lectura innecesariamente masculina en español, manteniendo la referencia general a seres humanos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La traducción española sigue la lectura auditada del POB inglés y conserva la ambigüedad de ἐμπαίζοντες sin convertirla en un sentido más específico como 'cazar'. También refleja el ajuste de la revisión inglesa que generalizó ἄνθρωποι como 'people'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'plata y oro' por la pareja metálica explícita del griego, no 'dinero'.
  - '''Posesiones'' conserva la amplitud de κτήσεως y evita reducir el término a propiedad jurídica estricta.'
  - La sintaxis española usa una relativa más fluida ('en los cuales han confiado las personas') para reflejar el referente colectivo del singular griego sin perder claridad.
