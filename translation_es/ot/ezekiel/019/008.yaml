revisions:
- from: Entonces naciones de las provincias se pusieron contra él[a] todo alrededor, y extendieron sobre él su red[b]; en su fosa fue atrapado.
  to: Entonces naciones de las provincias se pusieron contra él[a] por todos lados, y extendieron sobre él su red; en su fosa[b] fue atrapado.
  rationale: Se reubica la nota [b] en 'fosa', que es el término explicado por la nota cultural. Se cambia 'todo alrededor' por 'por todos lados' para mejorar la naturalidad del español sin perder el sentido de cerco. Se ajusta la nota [a] para reflejar mejor la relación entre la traducción principal y la alternativa documentada en la auditoría inglesa.
