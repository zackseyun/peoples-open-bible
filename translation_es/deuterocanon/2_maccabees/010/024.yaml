translation:
  language: es
  text: habiendo oído que los judíos no aprobaban el cambio de su padre hacia las costumbres griegas[a], sino que escogían su propia manera de vivir y pedían que se les permitieran sus propias leyes[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el cambio de su padre al helenismo'' / ''el cambio de su padre a las costumbres griegas''. La expresión griega es compacta y se refiere a un giro hacia la práctica cultural griega.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''que se les permitieran sus leyes ancestrales'' / ''que se les permitieran sus costumbres ancestrales''. El griego puede referirse a leyes o costumbres normativas establecidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκηκοότες
  english_pob_choice: having heard
  chosen_spanish: habiendo oído
  alternatives_spanish:
  - cuando oyeron
  - después de oír
  lexicon: BDAG
  rationale: El participio perfecto se vierte como participio circunstancial en español para conservar la relación temporal previa sin añadir una subordinación más fuerte de la que exige el griego.
- source_word: μὴ συνεὐδοκοῦντας
  english_pob_choice: did not approve
  chosen_spanish: no aprobaban
  alternatives_spanish:
  - no estaban de acuerdo con
  - no consentían en
  - no se complacían en
  lexicon: BDAG
  rationale: El verbo compuesto expresa desacuerdo/consentimiento negativo; 'no aprobaban' es natural en español y mantiene la fuerza evaluativa del original.
- source_word: τῇ τοῦ πατρὸς εἰς τὰ Ἑλληνικὰ μεταθέσει
  english_pob_choice: their father's change to Greek ways
  chosen_spanish: la transformación de su padre hacia las costumbres griegas
  alternatives_spanish:
  - el cambio de su padre hacia las costumbres griegas
  - el traslado de su padre al helenismo
  - la transición de su padre a lo griego
  lexicon: BDAG
  rationale: μετάθεσις indica cambio/traslado, y τὰ Ἑλληνικά apunta a prácticas culturales griegas más que solo idioma. 'Transformación' comunica el giro de orientación; 'costumbres griegas' preserva el matiz cultural y religioso.
- source_word: τὴν ἑαυτῶν ἀγωγὴν αἱρετίζοντας
  english_pob_choice: were choosing their own way of life
  chosen_spanish: escogían su propia manera de vivir
  alternatives_spanish:
  - preferían su propio modo de conducta
  - escogían su propia conducta
  lexicon: BDAG
  rationale: ἀγωγή puede ser conducta, modo de vida o educación; 'manera de vivir' es idiomática y suficientemente amplia. αἱρετίζω expresa elegir/preferir, por eso 'escogían' conserva el valor volitivo.
- source_word: ἀξιοῦν
  english_pob_choice: requesting
  chosen_spanish: pedían
  alternatives_spanish:
  - solicitaban
  - requerían
  - pedían respetuosamente
  lexicon: BDAG
  rationale: En contexto de petición formal, 'pedían' es directo y claro en español; evita sobrerrepresentar solemnidad que no está explicitada por el griego.
- source_word: συγχωρηθῆναι αὐτοῖς τὰ νόμιμα
  english_pob_choice: that their own laws be permitted to them
  chosen_spanish: que se les permitieran sus propias leyes
  alternatives_spanish:
  - que se les concedieran sus leyes ancestrales
  - que se les toleraran sus costumbres legales
  - que se les permitieran sus costumbres legítimas
  lexicon: BDAG
  rationale: συγχωρηθῆναι expresa permitir/conceder; τὰ νόμιμα remite a lo legal/establecido por costumbre. 'Sus propias leyes' sigue de cerca la revisión inglesa y mantiene el tono jurídico, aunque en español puede abarcar también sus normas y prácticas legítimas.
theological_decisions:
- issue: Ἑλληνικά como cambio cultural-religioso, no mero cambio lingüístico
  english_pob_reading: Greek ways
  chosen_spanish_reading: costumbres griegas
  alternative_spanish_readings:
  - helenismo
  - cultura griega
  - modos griegos
  rationale: El contexto contrasta la vida judía ancestral con la adopción de prácticas griegas. 'Costumbres griegas' expresa el alcance cultural sin imponer un tecnicismo ajeno al lector general; además evita reducir el término al idioma.
  doctrine_reference: Práctica histórica y cultural en el contexto helenístico.
- issue: τὰ νόμιμα como leyes/costumbres autorizadas para un pueblo judío
  english_pob_reading: their own laws be permitted to them
  chosen_spanish_reading: se les permitieran sus propias leyes
  alternative_spanish_readings:
  - se les permitieran sus costumbres ancestrales
  - se les concedieran sus leyes legales
  - se les autorizaran sus normas
  rationale: '''τὰ νόμιμα'' puede abarcar lo legalmente establecido y las costumbres normativas. La formulación elegida preserva el matiz de derecho reconocido sin cerrar el sentido solo a un código escrito.'
  doctrine_reference: Relación entre ley, costumbre y vida pactual en textos judíos del período helenístico.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del expediente inglés: ''change'' en vez de ''changeover'', y ''requesting'' con mayor registro formal. En español se reflejó ese tono con una construcción participial sobria (''habiendo oído'') y un verbo de petición simple (''pedían''), manteniendo el valor legal de τὰ νόμιμα sin inflarlo.'
  spanish_consistency_notes:
  - Se mantuvo 'judíos' para τοὺς Ἰουδαίους, sin añadir sujeto explícito adicional.
  - '''Costumbres griegas'' conserva la carga cultural de Ἑλληνικά sin recurrir a ''helenismo'' en el texto principal.'
  - '''Sus propias leyes'' sigue la revisión inglesa reciente y conserva la tensión entre ley y costumbre normativa.'
  - No se usó 'SEÑOR' ni terminología cristiana ajena al contexto; el versículo no contiene el Tetragrámaton.
  - El tono es formal y publicable, pero no arcaizante.
