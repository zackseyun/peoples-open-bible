translation:
  language: es
  text: Con afanes se ha fatigado[a], pero no sale de ella su abundante herrumbre; en el fuego[b] queda su herrumbre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con fatigas» o «con trabajos». El hebreo usa un plural que expresa esfuerzos intensos; la frase española busca sonar natural y conservar la idea de labor agotadora.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es elíptico al final: literalmente, «en el fuego su herrumbre». La traducción suple «queda» para dar claridad en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּאֻנִים
  english_pob_choice: With toil
  chosen_spanish: Con afanes
  alternatives_spanish:
  - Con fatiga
  - Con trabajos
  - Con esfuerzo
  lexicon: HALOT
  rationale: El plural hebreo indica esfuerzos o fatigas intensas. «Con afanes» comunica bien la idea adverbial de labor agotadora sin sonar mecánico en español.
- source_word: הֶלְאָת
  english_pob_choice: she has wearied herself
  chosen_spanish: te has fatigado
  alternatives_spanish:
  - te has agotado
  - te has cansado
  - te has fatigado a ti misma
  lexicon: HALOT
  rationale: La forma 3fs concuerda con el sujeto femenino personificado; en español, el giro reflexivo queda natural como «te has fatigado». Mantiene la idea de esfuerzo que termina en desgaste.
- source_word: וְלֹא תֵצֵא מִמֶּנָּה
  english_pob_choice: yet ... does not go out from her
  chosen_spanish: pero no se te sale de ella
  alternatives_spanish:
  - pero no sale de ella
  - pero no puede quitarse de ella
  - pero no se aparta de ella
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no sale de ella». Se conserva la imagen de salida/expulsión, con un español natural que conserva la fuerza de la metáfora de la impureza adherida.
- source_word: רַבַּת
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - grande
  - mucha
  - copiosa
  lexicon: HALOT
  rationale: «Abundante» transmite mejor la magnitud de la impureza/encrustación que «grande», y mantiene la cualidad cuantitativa del adjetivo.
- source_word: חֶלְאָתָהּ
  english_pob_choice: corrosion
  chosen_spanish: herrumbre
  alternatives_spanish:
  - corrosión
  - óxido
  - escoria
  lexicon: HALOT
  rationale: El término hebreo describe la impureza incrustada del recipiente en la metáfora. «Herrumbre» es una opción más concreta y visual en español; conserva el campo semántico del metal corroído sin cerrar del todo el sentido a un solo tipo de residuo.
- source_word: בְּאֵשׁ חֶלְאָתָהּ
  english_pob_choice: her corrosion remains in the fire
  chosen_spanish: en el fuego queda su herrumbre
  alternatives_spanish:
  - en el fuego permanece su herrumbre
  - su herrumbre queda en el fuego
  - en el fuego sigue su herrumbre
  lexicon: HALOT
  rationale: El hebreo es elíptico al final; el inglés POB suplió un verbo para claridad. En español, «queda» mantiene esa suplencia mínima y preserva la imagen de que el fuego no elimina la suciedad incrustada.
theological_decisions:
- issue: Imagen de impureza no purgada por el fuego
  english_pob_reading: her corrosion remains in the fire
  chosen_spanish_reading: en el fuego queda su herrumbre
  alternative_spanish_readings:
  - en el fuego permanece su herrumbre
  - el fuego no la elimina
  rationale: 'La decisión mantiene la tensión metafórica del pasaje: aun bajo fuego, la impureza persiste. No se diluye en una explicación moralizante; se conserva la imagen concreta del recipiente contaminado.'
  doctrine_reference: Metáfora profética de juicio e impureza persistente en Ezequiel 24.
translation_notes:
  revision_awareness: Se revisó el contexto del hebreo y el audit trail inglés. La versión inglesa entiende תְּאֻנִים como esfuerzo/tajo de labor, הֶלְאָת como cansancio reflexivo, חֶלְאָתָהּ como una corrosión/encrustación del recipiente y la clausula final como elíptica. La propuesta española sigue esas decisiones y evita reinterpretar la imagen como simple suciedad abstracta.
  spanish_consistency_notes:
  - Se mantiene el campo léxico del recipiente metálico con «herrumbre» para conservar la imagen física.
  - Se conservó la secuencia adverbial al inicio («Con afanes») para reflejar el valor de esfuerzo intenso.
  - Se evitó sustituir la metáfora por un lenguaje moral directo; el versículo sigue hablando de una impureza concreta que permanece.
