review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: origen (''de/desde sus moradas''), mandato de traer, dos panes, medida sacerdotal, harina fina, condición con levadura, carácter de primicias y dedicación a Yahvé. Sin embargo, hay un desajuste sintáctico importante en ''cocidos con levadura'': el hebreo תֵאָפֶינָה se refiere específicamente a horneado de panes, y en español ''cocidos'' suena impreciso y menos natural para pan. También conviene ajustar ''desde'' a ''de'' para una formulación más idiomática en instrucción cultual.'
  spanish_quality_summary: La redacción es en general clara y digna. 'Moradas', 'ofrenda mecida', 'flor de harina', 'primicias' y 'Yahvé' encajan bien con el registro bíblico del proyecto. La principal debilidad es 'cocidos con levadura', que resulta culinaria y semánticamente menos exacta que 'horneados con levadura'. Además, 'Desde sus moradas traeréis' es entendible, pero 'De sus moradas traerán' o 'Traerán de sus moradas' fluye mejor en español neutro y evita el voseo peninsular implícito de 'traeréis'.
  glossary_alignment: 'Alineación sólida con el glosario del proyecto: יהוה -> ''Yahvé'' correctamente; בִּכּוּרִים -> ''primicias'' bien; תְּנוּפָה -> ''ofrenda mecida'' es una decisión consistente y comprensible. ''Flor de harina'' es aceptable como equivalente tradicional de סֹלֶת. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: '''cocidos con levadura'' no refleja con precisión el verbo de hornear'
    rationale: תֵאָפֶינָה proviene de אפה 'hornear'. Para panes, 'horneados con levadura' preserva mejor el sentido y suena más natural en español bíblico moderno.
  - severity: low
    issue: '''Desde sus moradas traeréis'' suena menos idiomático y más peninsular'
    rationale: Aunque fiel, 'desde' es menos natural aquí que 'de', y 'traeréis' introduce un registro peninsular. Una formulación como 'De sus moradas traerán' mantiene el tono legal sin regionalismo marcado.
  - severity: low
    issue: La nota [a] está anclada en 'ofrenda mecida' pero explica 'dos décimas'
    rationale: El marcador debería aparecer junto a la expresión de medida, no junto al término cultual, para corresponder exactamente con el contenido de la nota.
  revised_spanish_text: De sus moradas traerán dos panes para ofrenda mecida; serán de dos décimas[a] de efa de flor de harina, horneados con levadura[b], como primicias para Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ''dos décimas''; en la medida sacerdotal, esto equivale a dos décimas de efa.'
    reason: cultural_note
  - marker: b
    text: 'O: ''horneados como pan leudado''. El hebreo indica explícitamente que estos panes de primicias llevan levadura.'
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión verbal de horneado para reflejar con mayor precisión el hebreo y mejorar la naturalidad del español. También se ajusta el inicio a un español más neutro y se reubica la nota de medida en el lugar correspondiente.
