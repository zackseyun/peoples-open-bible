revisions:
- from: Miren[a], porque Yahvé les ha dado el sábado; por eso, en el sexto día les da pan para dos días. Que cada hombre se quede en su lugar; que ningún hombre salga de su lugar en el séptimo día.
  to: Miren, pues, que Yahvé les ha dado el sábado; por eso, el sexto día les da pan para dos días. Que cada hombre[a] se quede en su lugar; que ningún hombre salga de su lugar el séptimo día.
  rationale: Se ajusta כִּי a 'pues' para reflejar mejor el matiz exhortativo-explicativo del original y la auditoría inglesa; se reemplaza 'en el sexto/séptimo día' por 'el sexto/séptimo día' para un español más natural sin pérdida de sentido; y se preserva en nota la decisión lexical importante sobre el masculino distributivo de אִישׁ, conforme al rastro inglés auditado.
