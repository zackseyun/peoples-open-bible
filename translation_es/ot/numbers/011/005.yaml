translation:
  language: es
  text: Nos acordamos del pescado que comíamos en Egipto de balde[a], los pepinos, los melones, los puerros, las cebollas y los ajos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘gratis’, ‘sin costo’ o ‘libremente’. Los hablantes recuerdan Egipto desde la perspectiva de su queja, aunque en realidad allí eran esclavos.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכַרְנוּ
  english_pob_choice: We remember
  chosen_spanish: Recordamos
  alternatives_spanish:
  - Recordamos ahora
  - Nos acordamos
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso directo expresa una memoria presente desde la que se habla del pasado; en español, el pretérito 'recordamos' comunica esa rememoración sin forzar una perífrasis.
- source_word: הַדָּגָה
  english_pob_choice: the fish
  chosen_spanish: el pescado
  alternatives_spanish:
  - el pez
  - los peces
  - el pescado
  lexicon: HALOT
  rationale: El sustantivo colectivo se refiere al alimento. 'Pescado' funciona naturalmente en español como comida, preservando el valor colectivo mejor que 'pez'.
- source_word: אֲשֶׁר נֹאכַל
  english_pob_choice: that we ate
  chosen_spanish: que comíamos
  alternatives_spanish:
  - que comimos
  - que solíamos comer
  lexicon: HALOT
  rationale: El contexto sugiere hábito pasado, no un hecho puntual. 'Comíamos' refleja mejor esa duración/habitualidad que un perfecto simple.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Correspondencia locativa directa y natural en español.
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: de balde
  alternatives_spanish:
  - gratis
  - sin costo
  - de gratis
  lexicon: HALOT
  rationale: '''De balde'' preserva la idea de gratuidad sin sonar excesivamente coloquial, y mantiene la ironía del reclamo. No corrige la perspectiva de los hablantes respecto de su esclavitud.'
- source_word: הַקִּשֻּׁאִים
  english_pob_choice: the cucumbers
  chosen_spanish: los pepinos
  alternatives_spanish:
  - los pepinos de ensalada
  lexicon: HALOT
  rationale: Equivalente léxico estándar y claro en español.
- source_word: הָאֲבַטִּחִים
  english_pob_choice: the melons
  chosen_spanish: los melones
  alternatives_spanish:
  - las sandías
  - los melones de agua
  lexicon: HALOT
  rationale: '''Melones'' conserva la referencia genérica sin sobreespecificar la especie, como en la POB inglesa.'
- source_word: הֶחָצִיר
  english_pob_choice: the leeks
  chosen_spanish: los puerros
  alternatives_spanish:
  - las hierbas
  - los ajos porros
  lexicon: HALOT
  rationale: En esta lista de alimentos, el término se entiende como una hortaliza. 'Puerros' es una opción clara y moderna en español; preserva la decisión léxica de un vegetal cultivado, no de 'hierba' o 'heno'.
- source_word: הַבְּצָלִים
  english_pob_choice: the onions
  chosen_spanish: las cebollas
  alternatives_spanish:
  - los cebollinos
  lexicon: HALOT
  rationale: Renderización estándar y precisa.
- source_word: הַשּׁוּמִים
  english_pob_choice: the garlic
  chosen_spanish: los ajos
  alternatives_spanish:
  - el ajo
  lexicon: HALOT
  rationale: En plural, el hebreo enumera elementos del alimento; el plural español 'ajos' conserva esa forma enumerativa.
theological_decisions:
- issue: Sentido de חִנָּם frente a la esclavitud egipcia
  english_pob_reading: for nothing; the speakers are recalling Egypt from the perspective of their complaint, despite their actual slavery there.
  chosen_spanish_reading: de balde; los hablantes recuerdan Egipto desde la perspectiva de su queja, aunque en realidad allí eran esclavos.
  alternative_spanish_readings:
  - gratis
  - sin costo
  - libremente
  rationale: La traducción mantiene la palabra de queja sin suavizarla teológicamente ni corregirla en el cuerpo del versículo. La nota explica la ironía histórica sin cambiar la voz del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto español sigue el acuerdo alto del control final y conserva la decisión del POB inglés de traducir חִנָּם con una expresión idiomática de gratuidad, sin atenuar la ironía del reclamo. No se registraron revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se usa ‘Egipto’ sin artículo, conforme al uso normal en español bíblico contemporáneo.
  - Se mantiene un registro sobrio y publicable, evitando arcaísmos innecesarios.
  - La lista de alimentos conserva el paralelismo enumerativo del hebreo con artículos definidos.
  - No se introduce ‘Mesías’/‘Cristo’ ni terminología teológica ajena al versículo.
