translation:
  language: es
  text: 'Los hijos de Amram[a]: Aarón, Moisés y Miriam; y los hijos de Aarón: Nadab y Abiú, Eleazar e Itamar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijos de». En este contexto genealógico el término denota descendientes directos en una lista de línea familiar; aquí la lista de Amram incluye también a Miriam, además de Aarón y Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of / and the sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En un contexto genealógico, בְּנֵי se refiere a descendientes/miembros de la línea familiar. En español, «los hijos de» comunica de forma natural esa relación, y el artículo plural funciona como encabezado genealógico sin forzar la conjunción inicial.
- source_word: עַמְרָם
  english_pob_choice: Amram
  chosen_spanish: Amram
  alternatives_spanish:
  - Amrán
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio conforme al uso bíblico estándar en español. «Amram» mantiene cercanía al hebreo y coherencia con otras transliteraciones del proyecto.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Convención onomástica bíblica
  rationale: Se prefiere la forma española establecida «Aarón», más reconocible y natural en español bíblico que la transliteración inglesa.
- source_word: וּמֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio con forma española tradicional y plenamente inteligible.
- source_word: וּמִרְיָם
  english_pob_choice: and Miriam
  chosen_spanish: y Miriam
  alternatives_spanish:
  - e Miriam
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio y la conjunción coordinante; «y» es la forma normal en esta enumeración y no requiere ajuste fonético aquí.
- source_word: וּבְנֵי אַהֲרֹן
  english_pob_choice: and the sons of Aaron
  chosen_spanish: y los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: La segunda cláusula genealógica se mantiene como sublista coordinada. Se conserva la relación con la primera mediante «y», reflejando el hebreo sin perder naturalidad en español.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Nadáb
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio transliterado de manera estable.
- source_word: וַאֲבִיהוּא
  english_pob_choice: and Abihu
  chosen_spanish: y Abiú
  alternatives_spanish:
  - y Abihú
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española bíblica más difundida, «Abiú», en lugar de una transliteración más literal. El valor coordinante del prefijo se expresa con «y».
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Elazar
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio mantenido en la forma española establecida.
- source_word: וְאִיתָמָר
  english_pob_choice: and Ithamar
  chosen_spanish: e Itamar
  alternatives_spanish:
  - y Itamar
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio en forma española establecida. Se elige «e» por eufonía ante la vocal inicial de «Itamar».
theological_decisions:
- issue: Alcance de בְּנֵי en una lista genealógica incluye a Miriam
  english_pob_reading: Hebrew 'sons of.' In this genealogical context the term denotes direct descendants/children in a male-line listing; here the list under Amram includes Miriam as well as Aaron and Moses.
  chosen_spanish_reading: «Los hijos de» se entiende como descendientes directos en una lista genealógica, y el versículo incluye a Miriam junto con Aarón y Moisés.
  alternative_spanish_readings:
  - «Los hijos varones de» Amram
  - «La descendencia de» Amram
  rationale: El hebreo usa בְּנֵי en fórmula genealógica, pero el propio contenido de la lista demuestra que no se restringe a varones biológicos en sentido estricto, porque incluye a Miriam. Por eso se preserva la tensión semántica en una nota, evitando una traducción que la borre.
  doctrine_reference: Género y semántica de parentesco en listas genealógicas bíblicas; fidelidad léxica sin falsear el dato textual.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el texto base y con el audit trail inglés. No se introdujeron revisiones textuales; solo se ajustó la presentación al español bíblico natural, preservando la nota lexical sobre בְּנֵי.
  spanish_consistency_notes:
  - Se mantuvo «Aarón» como forma española establecida, consistente con el resto de la traducción.
  - Se prefirió «Moisés» y «Eleazar» por consistencia bíblica en español.
  - Se usó «e» ante «Itamar» por eufonía, sin cambiar el valor conjuntivo.
  - La nota [a] se ancla en «hijos de» para preservar la observación léxica sobre el hebreo בְּנֵי.
