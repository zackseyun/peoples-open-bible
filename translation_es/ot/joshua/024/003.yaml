review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en la secuencia principal: «Entonces tomé… de más allá del Río… lo llevé por toda la tierra de Canaán… multipliqué su descendencia». Mantiene correctamente «padre» para Abraham y conserva «el Río» en el texto con nota explicativa. Sin embargo, la cláusula final «y le di a Isaac» no preserva bien la sintaxis ni el sentido de וָאֶתֶּן לוֹ אֶת יִצְחָק, que significa «y le di Isaac» / «y le di a Isaac» solo si Isaac fuese el receptor, lo cual no es el caso. En español natural y fiel debe expresarse «y le di Isaac» o «y le di a Isaac como hijo», pero la opción más directa y alineada con el POB es «y le di Isaac».'
  spanish_quality_summary: El español es claro y digno en general. «Entonces», «de más allá del Río», «por toda la tierra de Canaán» y «su descendencia» leen bien en español eclesial contemporáneo. La única falla importante de legibilidad y exactitud es «le di a Isaac», que en español estándar sugiere un complemento directo personal marcado y puede sonar incompleto o ambiguo; además no comunica con naturalidad que Isaac fue dado a Abraham. Conviene reparar solo esa parte.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. No aparecen Yahvé, Mesías, espíritu, carne, etc. Las decisiones «padre», «Río» y «descendencia» son coherentes con la auditoría. La nota sobre «descendencia/simiente» preserva adecuadamente la alternativa léxica del singular colectivo.
  issues:
  - severity: high
    issue: La frase «y le di a Isaac» es semántica y sintácticamente defectuosa.
    rationale: El hebreo נתן + ל + objeto directo significa que Dios dio a Isaac a Abraham. En español, «le di a Isaac» se interpreta fácilmente como que Isaac es un objeto directo personal sin complemento explícito de qué se le dio, o resulta anómalo. La traducción fiel y natural es «y le di Isaac».
  - severity: low
    issue: La nota b podría formular con un poco más de precisión la alternativa colectiva.
    rationale: 'La nota actual es aceptable, pero puede expresarse de manera más fluida en español moderno: «O: “su simiente”; el hebreo usa un singular colectivo». No es necesario ampliar más.'
  revised_spanish_text: Entonces tomé a su padre Abraham de más allá del Río[a], y lo llevé por toda la tierra de Canaán, y multipliqué su descendencia[b] y le di Isaac.
  revised_footnotes:
  - marker: a
    text: «El Río» probablemente se refiere al Éufrates.
    reason: cultural_note
  - marker: b
    text: 'O: «su simiente»; el hebreo usa un singular colectivo que puede entenderse como descendencia.'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la cláusula final para reflejar con fidelidad el hebreo וָאֶתֶּן לוֹ אֶת יִצְחָק y para producir un español natural y no ambiguo. El resto del versículo y las notas pueden mantenerse.
