  yaml_path: translation/deuterocanon/1_maccabees/011/062.yaml
  text: And the men from Gaza asked terms of Jonathan[a], and he gave them pledges; and he took the sons of their rulers as hostages and sent them to Jerusalem[b]. And he passed through the country as far as Damascus.
  footnotes:
