translation:
  language: es
  text: Por este motivo les hablo en parábolas[a], porque viendo no ven, y oyendo no oyen, ni entienden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «viendo, no ven; y oyendo, no oyen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por este motivo
  alternatives_spanish:
  - Por eso
  - Por esta razón
  lexicon: BDAG
  rationale: La frase causal introduce la explicación de Jesús; "Por este motivo" conserva la relación causal de manera natural en español y mantiene el tono explicativo sin exagerar la inferencia.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  - por medio de parábolas
  lexicon: BDAG
  rationale: La preposición con dativo se expresa de forma directa y transparente como "en parábolas", que es idiomático en español y refleja el modo de enseñanza indicado por el griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo pronominal se naturaliza como complemento indirecto en español. "Les" es breve, claro y suficiente en el contexto.
- source_word: λαλῶ
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - les hablo
  - estoy hablando
  lexicon: BDAG
  rationale: El presente indicativo se vierte con "hablo", que preserva el aspecto simple y suena natural en español sin volverlo coloquial.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la razón de la acción de Jesús, no solo el contenido. "Porque" comunica con claridad la relación causal.
- source_word: βλέποντες οὐ βλέπουσιν
  english_pob_choice: seeing they do not see
  chosen_spanish: viendo no ven
  alternatives_spanish:
  - aunque ven no ven
  - viendo, no ven
  lexicon: BDAG
  rationale: Se conserva la yuxtaposición verbal del griego sin añadir una concesiva explícita que el texto no marca de forma obligatoria. "Viendo no ven" mantiene la tensión retórica y la ironía judicial.
- source_word: ἀκούοντες οὐκ ἀκούουσιν
  english_pob_choice: hearing they do not hear
  chosen_spanish: oyendo no oyen
  alternatives_spanish:
  - aunque oyen no oyen
  - oyendo, no oyen
  lexicon: BDAG
  rationale: Se sigue el paralelismo con la primera cláusula. "Oyendo no oyen" conserva la forma semítica de repetición y el contraste entre percepción externa y comprensión interna.
- source_word: συνίουσιν
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - comprenden
  - perciben
  lexicon: BDAG
  rationale: El verbo apunta a captar el sentido de lo visto y oído. "Entienden" es la equivalencia más clara y natural en español, sin intensificar más allá del texto.
theological_decisions:
- issue: Relación entre ver/oír y comprender
  english_pob_reading: 'Rendered without the English concessive ''though'' in the revised POB text: ''seeing they do not see, and hearing they do not hear'''
  chosen_spanish_reading: 'Mantener la repetición literal-rítmica: "viendo no ven, y oyendo no oyen"'
  alternative_spanish_readings:
  - '"aunque ven no ven, y aunque oyen no oyen"'
  - '"viendo, no ven, y oyendo, no oyen"'
  rationale: El griego presenta la paradoja mediante participio + verbo finito; en español, la repetición breve conserva mejor el efecto retórico y evita resolver la tensión con una concesiva que no está explícita en la revisión final inglesa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance de συνίουσιν
  english_pob_reading: '''understand'' as failure of spiritual/intellectual grasp'
  chosen_spanish_reading: '"entienden" como falta de captación del sentido'
  alternative_spanish_readings:
  - '"comprenden"'
  - '"perciben"'
  rationale: '"Entienden" comunica con precisión la falta de aprehensión del significado, sin añadir una tesis doctrinal extra sobre culpabilidad o capacidad más allá de la ironía del versículo.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del texto inglés POB, que retiró 'though' para no forzar una concesión explícita. Por eso el español evita "aunque" y conserva la estructura paralela directa del griego y del inglés revisado.
  spanish_consistency_notes:
  - Se mantuvo "parábolas" como término técnico estable.
  - Se prefirió el presente simple "hablo" para reflejar el valor del verbo griego.
  - Se usó "entienden" en lugar de un tecnicismo más fuerte para conservar la claridad del contexto.
  - La puntuación con coma final evita introducir una pausa interpretativa adicional.
