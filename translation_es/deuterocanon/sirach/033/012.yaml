revisions:
- from: '¡Rompe las cabezas de los gobernantes enemigos[a], de los que dicen[b]: «No hay nadie fuera de nosotros»!'
  to: '¡Aplasta las cabezas de los gobernantes de los enemigos[a], que dicen[b]: «No hay nadie excepto nosotros»!'
  rationale: Se revisa para ajustar mejor el genitivo griego («de los enemigos»), reforzar la fuerza de σύντριψον con «Aplasta», simplificar la relativa participial a «que dicen» y expresar la exclusión de modo más claro y natural con «excepto nosotros».
