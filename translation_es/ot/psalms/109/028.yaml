translation:
  language: es
  text: Ellos maldigan[a], pero tú bendecirás. Se levantan[b] y son avergonzados, pero tu siervo se alegrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que ellos maldigan, pero tú bendice», tomando los imperfectos iniciales con una fuerza más jussiva o permisiva.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo dice literalmente: «Se levantan»; el verbo puede implicar acción hostil, pero el texto solo afirma que «se levantan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקַֽלְלוּ
  english_pob_choice: They may curse
  chosen_spanish: Ellos maldigan
  alternatives_spanish:
  - Ellos maldicen
  - Que ellos maldigan
  lexicon: HALOT
  rationale: El verbo piel imperfecto 3mp de קלל puede expresar acción abierta o matiz concesivo/jusivo en este contexto. En español, el subjuntivo exhortativo «maldigan» conserva mejor esa fuerza potencial o permisiva que un indicativo plano, y evita endurecer el sentido más allá de lo que el hebreo garantiza.
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - ellos mismos
  - los mismos
  lexicon: HALOT
  rationale: El pronombre independiente añade contraste enfático. «Ellos» reproduce esa oposición sin recargarla con una redundancia que el español no exige.
- source_word: וְ/אַתָּה
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  lexicon: HALOT
  rationale: Aunque la conjunción hebrea es formalmente copulativa, el paralelismo es claramente adversativo. «Pero tú» expresa mejor el contraste en español natural.
- source_word: תְבָ֫רֵ֥ךְ
  english_pob_choice: will bless
  chosen_spanish: bendecirás
  alternatives_spanish:
  - bendices
  - bendice
  lexicon: HALOT
  rationale: El imperfecto 2ms de ברך en este contraste funciona naturalmente en futuro. «Bendecirás» mantiene la oposición con la maldición y suena fluido en español.
- source_word: קָ֤מוּ
  english_pob_choice: They rise up
  chosen_spanish: Se levantan
  alternatives_spanish:
  - se han levantado
  - se alzan
  lexicon: HALOT
  rationale: El qal perfecto 3cp de קום significa literalmente ‘levantarse’ o ‘ponerse en pie’. «Se levantan» conserva la literalidad sin introducir de manera explícita la idea de ataque, que el texto no dice.
- source_word: וַ/יֵּבֹ֗שׁוּ
  english_pob_choice: are put to shame
  chosen_spanish: son puestos en vergüenza
  alternatives_spanish:
  - quedan avergonzados
  - son avergonzados
  lexicon: HALOT
  rationale: בוש expresa vergüenza o deshonra pública. «Son puestos en vergüenza» reproduce el matiz de deshonra resultante que la POB inglesa destacó, evitando reducirlo solo a un sentimiento interno.
- source_word: וְֽ/עַבְדְּ/ךָ֥
  english_pob_choice: but your servant
  chosen_spanish: pero tu siervo
  alternatives_spanish:
  - y tu siervo
  - pero tu esclavo
  lexicon: HALOT
  rationale: עבד con sufijo de 2ms es ‘tu siervo’. Aquí el vínculo de servicio es el rasgo pragmático más claro; «siervo» mantiene la fórmula reverente y es la opción idiomática más inteligible en español, sin forzar ‘esclavo’ donde el contexto oracional no lo exige.
- source_word: יִשְׂמָֽח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - alegra
  lexicon: HALOT
  rationale: El qal imperfecto 3ms de שמח denota alegría o gozo. «Se alegrará» conserva el valor futuro/resultativo y es más natural que un calco solemne en este cierre poético.
theological_decisions:
- issue: Referencia de ‘tu siervo’
  english_pob_reading: The speaker refers to himself humbly before God as 'your servant.'
  chosen_spanish_reading: El hablante se presenta humildemente ante Dios como ‘tu siervo’.
  alternative_spanish_readings:
  - una figura justa más general
  - una referencia mesiánica directa
  rationale: En el contexto inmediato del salmo, la expresión funciona como autodesignación del orante. La traducción preserva ese sentido directo sin introducir una lectura cristológica que el versículo no exige por sí mismo.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'El audit trail en inglés no requiere cambios de fondo: mantiene la misma lectura concesiva para el primer verbo, el contraste adversativo ‘but you’, la literalidad de ‘rise up’, y la vergüenza pública de בוש. La versión española sigue esas decisiones con equivalentes naturales y sin añadir interpretación no sustentada.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ según la terminología general del proyecto, pero este versículo no contiene יהוה explícito.
  - ‘Siervo’ conserva la fórmula reverente y evita una carga semántica innecesaria de ‘esclavo’ en este contexto.
  - Se conserva el contraste poético maldición/bendición y vergüenza/alegría sin explicitar más de lo que el hebreo dice.
