review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: persistencia del agresor, logro de dispersar, imagen vívida de ὀρφανία, y devastación de una casa por deseo ilícito. Sin embargo, dos decisiones españolas no preservan bien la legibilidad ni el matiz léxico documentado: «prevalecer en dispersarlos» suena poco idiomático en español para ἐνίκησεν σκορπίσαι, y «deseo sin ley» es demasiado calcado y poco natural para ἐπιθυμίας παρανόμου.'
  spanish_quality_summary: El texto es mayormente claro, pero necesita una reparación menor para sonar natural y digno en español eclesial moderno. «No se detuvo hasta lograr dispersarlos» comunica mejor la construcción griega con infinitivo. «Deseo ilícito» o «deseo fuera de la ley» serían más naturales; «ilícito» conserva bien el matiz moral/legal sin el calco rígido «sin ley». También debe corregirse la nota «bereavimiento», que no es español natural.
  glossary_alignment: No hay términos del glosario mayor directamente implicados salvo la necesidad general de evitar calcos innecesarios. «Casa» se mantiene correctamente frente a «hogar/familia» en el texto principal, con nota explicativa. La imagen «orfandad» también está bien preservada. La excepción propuesta es reemplazar «deseo sin ley» por «deseo ilícito» por fidelidad semántica y mejor español.
  issues:
  - severity: medium
    issue: «hasta prevalecer en dispersarlos» es poco idiomático
    rationale: Aunque ἐνίκησεν puede reflejarse con «prevalecer», la secuencia española con «en» + infinitivo suena forzada. El sentido documentado es lograr/salir adelante en su propósito de dispersarlos.
  - severity: medium
    issue: «deseo sin ley» es un calco rígido y poco natural
    rationale: Para ἐπιθυμίας παρανόμου, el borrador quiere conservar el matiz moral/legal, pero «sin ley» aplicado a «deseo» no suena natural en español. «Ilícito» comunica mejor la infracción moral/legal.
  - severity: low
    issue: La nota a usa «bereavimiento», forma no natural en español
    rationale: Debe reemplazarse por una alternativa idiomática como «duelo» o «desamparo por pérdida», manteniendo la observación léxica del inglés.
  revised_spanish_text: No se detuvo hasta lograr dispersarlos, como en orfandad[c][b][a], y asoló una casa por causa de deseo ilícito.
  revised_footnotes:
  - marker: a
    text: O «como en duelo» / «como entre los huérfanos» para ὡς ἐν ὀρφανίᾳ.
    reason: lexical_alternative
  - marker: b
    text: «Casa» probablemente tiene aquí el sentido más amplio de «hogar» o «familia», dado el contexto de destrucción de familias.
    reason: cultural_note
  - marker: c
    text: O «dispersándolos como a una casa en orfandad»; el griego no expresa un objeto directo explícito en esta cola.
    reason: alternative_reading
  revision_rationale: Se ajusta «prevalecer en dispersarlos» a «lograr dispersarlos» para un español más natural sin perder el sentido de ἐνίκησεν σκορπίσαι; se cambia «deseo sin ley» por «deseo ilícito» para expresar con claridad el matiz moral/legal de παρανόμου; y se corrige la nota léxica con una alternativa española idiomática en lugar de «bereavimiento».
