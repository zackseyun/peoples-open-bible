translation:
  language: es
  text: Se indignaban y se afligían profundamente por el injusto asesinato del hombre. Pero cuando el rey volvió de las regiones de Cilicia, los judíos de la ciudad le presentaron sus peticiones, y también los griegos[a], compartiendo su odio por la malvada acción,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los griegos también, uniéndose en odio contra la malvada acción». El raro participio griego συμμισοπονηρούντων admite formulaciones muy cercanas entre sí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδείναζον
  english_pob_choice: were indignant
  chosen_spanish: se indignaban
  alternatives_spanish:
  - se resentían
  - se dolían
  - se indignaban profundamente
  lexicon: LSJ
  rationale: El verbo expresa una reacción intensa de vexación o dolor moral. En español, «se indignaban» conserva la fuerza ética y encaja con el contexto de rechazo ante una muerte injusta.
- source_word: ἐδυσφόρουν
  english_pob_choice: were deeply grieved
  chosen_spanish: se angustiaban profundamente
  alternatives_spanish:
  - se afligían profundamente
  - estaban muy turbados
  - se resentían
  lexicon: LSJ
  rationale: El término añade una segunda matización emocional distinta de la indignación. «Se angustiaban profundamente» comunica el peso afectivo sin repetir exactamente la idea ya dada por «se indignaban».
- source_word: ἐπὶ τῷ ... ἀδίκῳ φόνῳ
  english_pob_choice: over ... unjust murder
  chosen_spanish: por el injusto asesinato
  alternatives_spanish:
  - por el injusto homicidio
  - a causa del injusto asesinato
  - por el homicidio injusto
  lexicon: LSJ
  rationale: φόνος implica muerte violenta con tono de asesinato, y ἄδικος señala su carácter injusto. «Injusto asesinato» preserva ese juicio moral; «por» reproduce bien la relación causal/afectiva del griego.
- source_word: τοῦ ἀνδρός
  english_pob_choice: the man's
  chosen_spanish: de aquel hombre
  alternatives_spanish:
  - del hombre
  - de ese hombre
  - del varón
  lexicon: LSJ
  rationale: El referente ya está presente en el contexto. «Aquel hombre» evita ambigüedad y mantiene el valor anafórico del artículo sin sonar artificial en español.
- source_word: ἐπανελθόντος
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió a venir
  - retornó
  lexicon: LSJ
  rationale: El participio aoristo se adapta naturalmente como acción temporal pasada. «Volvió» es claro y fluido en español, sin perder la idea de regreso.
- source_word: τῶν κατὰ Κιλικίαν τόπων
  english_pob_choice: the regions of Cilicia
  chosen_spanish: de las regiones de Cilicia
  alternatives_spanish:
  - de los lugares de Cilicia
  - de las partes de Cilicia
  - de las comarcas de Cilicia
  lexicon: LSJ
  rationale: La expresión abarca localidades o zonas de Cilicia. «Regiones» conserva amplitud geográfica y suena natural en español bíblico moderno.
- source_word: ἐνετύγχανον
  english_pob_choice: appealed to him
  chosen_spanish: le presentaban sus peticiones
  alternatives_spanish:
  - le rogaban
  - le suplicaban
  - le apelaban
  lexicon: LSJ
  rationale: El verbo puede significar acercarse a un superior para pedir o suplicar. En contexto político, «le presentaban sus peticiones» explicita con claridad el acto de solicitar audiencia o reparación.
- source_word: οἱ κατὰ πόλιν Ἰουδαῖοι
  english_pob_choice: the Jews in the city
  chosen_spanish: los judíos de la ciudad
  alternatives_spanish:
  - los judíos que estaban en la ciudad
  - los judíos citadinos
  lexicon: LSJ
  rationale: La frase designa a los judíos residentes en la ciudad. «De la ciudad» es la forma más natural y directa en español.
- source_word: συμμισοπονηρούντων
  english_pob_choice: sharing in their hatred of the wicked deed
  chosen_spanish: compartiendo su odio por la malvada acción
  alternatives_spanish:
  - uniéndose en su odio por la maldad
  - compartiendo su aversión por la acción malvada
  - sumándose a su odio por el malvado acto
  lexicon: LSJ
  rationale: El compuesto raro expresa una participación conjunta en el aborrecimiento del acto perverso. «Compartiendo su odio» conserva la idea de participación; «malvada acción» evita suavizar la valoración moral del original.
- source_word: καὶ τῶν Ἑλλήνων
  english_pob_choice: and the Greeks as well
  chosen_spanish: y también los griegos
  alternatives_spanish:
  - y los griegos también
  - así como los griegos
  lexicon: LSJ
  rationale: El griego une a los helenos con la reacción descrita. «Y también los griegos» mantiene su inclusión sin añadir más que lo exigido por el texto.
theological_decisions:
- issue: El sentido del raro participio συμμισοπονηρούντων y si debe traducirse como simple ‘odio’ compartido o como una alianza moral más precisa.
  english_pob_reading: sharing in their hatred of the wicked deed
  chosen_spanish_reading: compartiendo su odio por la malvada acción
  alternative_spanish_readings:
  - uniéndose en su odio por la maldad
  - compartiendo su aversión por la acción malvada
  rationale: La frase griega no solo indica emoción semejante, sino participación conjunta en la repulsión hacia el acto. La redacción elegida mantiene la cooperación moral entre judíos y griegos sin sobreexplicar ni diluir el carácter del hecho.
  doctrine_reference: Ética bíblica sobre la reacción común ante la injusticia; no implica una doctrina técnica, sino una lectura moral del episodio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó el final desde ‘crime’ a ‘wicked deed’ para reflejar mejor συμμισοπονηρούντων como aborrecimiento compartido del acto perverso, no solo del delito en abstracto.
  spanish_consistency_notes:
  - Se conservó un tono bíblico moderno y digno, evitando arcaísmos innecesarios.
  - 'Se tradujo φόνος con un término fuerte de homicidio intencional: ‘asesinato’.'
  - Se mantuvo la distinción entre la reacción emocional de los judíos y la participación de los griegos en la condena del acto.
  - La nota al pie se colocó solo donde el griego raro crea una verdadera alternativa de lectura.
