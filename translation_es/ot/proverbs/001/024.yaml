translation:
  language: es
  text: Porque llamé, y ustedes rehusaron[a]; extendí mi mano, y nadie prestó atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'escuchó' o 'estaba escuchando'. El participio hebreo subraya una escucha atenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del reproche. 'Porque' es la opción más natural en español y conserva el valor causal inmediato del hebreo.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: llamé
  alternatives_spanish:
  - clamé
  - proclamé
  lexicon: HALOT
  rationale: El verbo קרא aquí expresa una invitación o llamado de advertencia. 'Llamé' comunica bien esa acción sin sobrecargarla con una intensidad no explicitada por el contexto.
- source_word: וַתְּמָאֵנוּ
  english_pob_choice: you refused
  chosen_spanish: se negaron
  alternatives_spanish:
  - rehusaron
  - se negaron a escuchar
  - no quisieron
  lexicon: HALOT
  rationale: מאן significa 'rechazar / rehusar'. En español, 'se negaron' mantiene la fuerza volitiva del verbo sin añadir una obediencia explícita que no está en el hebreo de este hemistiquio.
- source_word: נָטִיתִי
  english_pob_choice: I stretched out
  chosen_spanish: extendí
  alternatives_spanish:
  - estiré
  - tendí
  lexicon: HALOT
  rationale: נטה describe el gesto corporal de extender la mano. 'Extendí' es idiomático en español y preserva la imagen concreta del ofrecimiento o advertencia.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  lexicon: HALOT
  rationale: Traducción literal del objeto del gesto; mantener 'mano' conserva la imaginería corporal del texto.
- source_word: מַקְשִׁיב
  english_pob_choice: paid attention
  chosen_spanish: prestó atención
  alternatives_spanish:
  - escuchó
  - estuvo escuchando
  - hizo caso
  lexicon: HALOT
  rationale: קשב en piel/hifil expresa atención auditiva activa. 'Prestó atención' reproduce la idea de escuchar con atención sin introducir todavía la obediencia implícita de 'hacer caso'.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo del paralelismo: llamado rechazado y mano extendida sin respuesta. Se prefirió un español natural que conserve la imagen concreta y la secuencia causal del texto, sin intensificar indebidamente el valor de ''escuchar'' más allá de la atención auditiva del participio.'
  spanish_consistency_notes:
  - Se usó 'Porque' para יַעַן como causal simple.
  - Se mantuvo la imagen corporal de 'mano' para יָדִי.
  - '''Prestó atención'' deja abierta la alternativa más literal ''escuchó'' indicada en la nota.'
  - No se introdujo lenguaje doctrinal adicional; el versículo funciona como reproche sapiencial directivo.
