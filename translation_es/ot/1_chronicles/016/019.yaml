- from: cuando ustedes eran pocos en número[a], muy pocos, y forasteros en ella.
  to: cuando eran pocos en número[a], muy pocos, y residentes temporales en ella.
  rationale: Se ajusta «forasteros» a «residentes temporales» para reflejar mejor el valor de וְגָרִים y la decisión inglesa «sojourners». Se corrige la nota al pie para conservar alternativas aplicables a personas y alineadas con el audit trail. Se omite «ustedes» por mayor naturalidad en español sin pérdida de sentido.
