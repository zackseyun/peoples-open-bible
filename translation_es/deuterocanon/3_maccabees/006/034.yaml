base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/006/034.yaml
  text: And those who had previously consigned them to destruction and to be devoured by birds[a], and had registered them with joy, groaned deeply, clothing themselves with shame[b], and their fire-breathing boldness was utterly quenched.
  footnotes:
  - marker: a
    text: The Greek participle translated 'been reckoning them' is textually and syntactically difficult in Swete's witness. The broader clause clearly conveys that these people had earlier regarded the Jews as destined for destruction and exposure to birds.
    reason: textual_variant
  - marker: b
    text: Or 'fiery audacity' for 'fire-breathing boldness.' The Greek image is metaphorical and strongly negative in context.
    reason: lexical_alternative
