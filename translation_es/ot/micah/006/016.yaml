  language: en
  yaml_path: translation/ot/micah/006/016.yaml
  text: The statutes of Omri are kept[a], and all the works of the house of Ahab; and you walk in their counsels, so that I may make you a desolation, and her inhabitants an object of hissing[c][b], and you will bear the reproach of my people.
  footnotes:
