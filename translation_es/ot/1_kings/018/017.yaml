review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: marco temporal («cuando vio»), repetición de Ahab como sujeto del habla, y acusación directa contra Elías. Sin embargo, la representación de עֹכֵר como «el que perturba» es algo débil frente al sentido de causar desgracia/trastorno sobre Israel, y las alternativas documentadas en notas introducen inglés no traducido («trouble»), lo cual no preserva fielmente el rastro léxico auditado.'
  spanish_quality_summary: El español es claro y legible, pero necesita una corrección menor para naturalidad y fidelidad léxica. «Ahab» debería normalizarse como «Acab» en español bíblico corriente. La nota al pie contiene una mezcla impropia de idiomas y debe corregirse. «El que acarrea desgracia sobre Israel» expresa mejor la acusación que «el que perturba a Israel», manteniendo un tono digno y natural.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. El nombre propio conviene en su forma española habitual: «Acab», y «Elías» ya está bien. No hay incidencia de Yahvé/Mesías/etc. La decisión léxica para עֹכֵר debe alinearse mejor con el audit trail inglés: «el que acarrea desgracia» o similar, con nota que preserve «el que trae problemas» / «el que trae desastre».'
  issues:
  - severity: medium
    issue: Forma del nombre «Ahab» en vez de «Acab»
    rationale: En una Biblia española de lectura eclesial amplia, «Acab» es la forma establecida y más natural. Mantener «Ahab» suena anglicado sin razón contextual.
  - severity: medium
    issue: «el que perturba a Israel» debilita el valor de עֹכֵר
    rationale: El participio expresa causar trastorno/desgracia sobre Israel, no meramente inquietar. «Perturba» puede sonar psicológico o leve; «acarrea desgracia» o «trae problemas» conserva mejor la fuerza acusatoria.
  - severity: high
    issue: 'La nota al pie contiene inglés no traducido: «trouble»'
    rationale: Esto es un error claro de calidad y rompe la legibilidad del español. La nota debe estar íntegramente en español y reflejar las alternativas auditadas.
  revised_spanish_text: 'Y cuando Acab vio a Elías[a], Acab le dijo: «¿Eres tú el que acarrea desgracia sobre Israel?»'
  revised_footnotes:
  - marker: a
    text: O «el que trae problemas sobre Israel» o «el que trae desastre sobre Israel».
    reason: lexical_alternative
  revision_rationale: Se corrige «Ahab» a «Acab» por uso bíblico español estándar; se fortalece עֹכֵר de «el que perturba» a «el que acarrea desgracia», más acorde con la acusación de causar calamidad sobre Israel; y se repara la nota al pie para eliminar el anglicismo accidental y preservar en español las alternativas léxicas documentadas.
