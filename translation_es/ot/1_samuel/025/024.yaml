review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: caída suplicante a los pies, autoasunción compacta de culpa, petición cortés para hablar y llamado a escuchar. Sin embargo, «a tus oídos» en el texto principal resulta demasiado literal y poco natural en español, mientras que el inglés POB llevó el idiomatismo al sentido («in your hearing»). Además, la nota b actual ya reconoce que es un hebraísmo, lo que confirma que conviene resolverlo en el texto principal y reservar la literalidad para nota.'
  spanish_quality_summary: 'El texto es claro y digno en general, con buen registro narrativo y tratamiento respetuoso. La principal dificultad es la frase «hable a tus oídos», que suena forzada en español moderno. «Hable en tu presencia» sería demasiado débil, pero «hable para que me oigas» o «hable de modo que me oigas» expresa bien el sentido. También conviene quitar la coma en «Sobre mí, señor mío, sea la culpa» para una cadencia más natural: «Sobre mí sea la culpa, señor mío».'
  glossary_alignment: No hay conflictos con la terminología proyectual mayor. «Señor mío» para אֲדֹנִי es adecuado en este contexto humano. «Sierva» refleja correctamente el femenino de אֲמָתְךָ/אֲמָתֶךָ y preserva la humillación formal. «Culpa» es una buena elección para הֶעָוֹן en este contexto narrativo.
  issues:
  - severity: medium
    issue: 'Hebraísmo excesivamente literal en el texto principal: «a tus oídos»'
    rationale: בְּאָזְנֶיךָ es idiomático; el inglés auditado lo traduce por sentido («in your hearing»). En español, «a tus oídos» suena antinatural y distrae del sentido.
  - severity: low
    issue: Orden y puntuación algo rígidos en «Sobre mí, señor mío, sea la culpa»
    rationale: La formulación es fiel, pero «Sobre mí sea la culpa, señor mío» suena más natural en español sin perder la compacidad ni la deferencia del hebreo.
  revised_spanish_text: 'Ella cayó a sus pies y dijo[a]: «Sobre mí sea la culpa, señor mío. Te ruego que tu sierva hable para que la oigas[b], y oye las palabras de tu sierva».'
  revised_footnotes:
