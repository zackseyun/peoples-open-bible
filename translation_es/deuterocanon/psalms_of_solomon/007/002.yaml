translation:
  language: es
  text: Porque tú los has rechazado, oh Dios[a]; que su pie no pisotee la herencia de tu santuario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo griego en Swete es inusual y también podría entenderse como «los harás retroceder, oh Dios»; por el contexto de oración, el texto principal sigue la lectura indicativa aprobada: «los has rechazado».'
    reason: alternative_reading
  - marker: b
    text: O posiblemente, «tu herencia santa», si la frase final se toma de manera más atributiva que como «la herencia de tu santuario».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώσω
  english_pob_choice: have rejected
  chosen_spanish: has rechazado
  alternatives_spanish:
  - has apartado
  - has rechazado y expulsado
  - has rechazado de ti
  lexicon: BDAG / LSJ
  rationale: El griego, según la revisión del POB, se lee como un aoristo indicativo con valor de acción realizada, no como imperativo. En español, «has rechazado» refleja mejor ese valor y conserva la fuerza de repulsa divina en el contexto de la oración.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: BDAG / LSJ
  rationale: El vocativo se expresa naturalmente con «oh Dios», manteniendo la apelación directa del texto griego sin añadir formulaciones litúrgicas ajenas.
- source_word: ὁ ποὺς αὐτῶν
  english_pob_choice: their foot
  chosen_spanish: su pie
  alternatives_spanish:
  - su pie
  - sus pies
  lexicon: BDAG / LSJ
  rationale: Aunque el español suele preferir plural, aquí se conserva el singular griego ὁ πούς como rasgo textual relevante, tal como la revisión inglesa lo corrigió. El singular puede funcionar de manera colectiva en español bíblico.
- source_word: πατήσαι
  english_pob_choice: trample
  chosen_spanish: pisotear
  alternatives_spanish:
  - hollar
  - pisar
  - aplastar con el pie
  lexicon: BDAG / LSJ
  rationale: «Pisotear» comunica la acción hostil y profanadora que el contexto exige, con una intensidad equivalente a «trample» en inglés y mejor naturalidad que un calco más rígido.
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_spanish: heredad
  alternatives_spanish:
  - herencia
  - posesión
  - patrimonio
  lexicon: BDAG / LSJ
  rationale: «Heredad» conserva mejor el peso bíblico-covenantal de κληρονομίαν que «herencia», y en español eclesial es una forma natural para aquello que pertenece a Dios y a su pueblo.
- source_word: ἁγιάσματός σου
  english_pob_choice: the inheritance of your sanctuary
  chosen_spanish: la heredad de tu santuario
  alternatives_spanish:
  - la heredad de tu lugar santo
  - la herencia de tu santuario
  - tu heredad santa
  lexicon: BDAG / LSJ
  rationale: 'La lectura del POB entiende ἁγιάσματός como genitivo objetivo/cultual: el ámbito sagrado de Dios. «Santuario» comunica mejor ese espacio sagrado que «cosa santa», y la construcción española conserva la ambigüedad controlada entre lo que pertenece al santuario y lo que está definido por él.'
theological_decisions:
- issue: 'Valor verbal de ἀπώσω: rechazo consumado vs. mandato'
  english_pob_reading: For you have rejected them
  chosen_spanish_reading: Porque tú los has rechazado
  alternative_spanish_readings:
  - Porque recházalos
  - Porque tú los rechazas
  - Porque tú los has echado atrás
  rationale: Sigo la revisión que corrigió el valor del verbo como indicativo aoristo y no como imperativo. Teológicamente, la oración presupone que Dios ya ha actuado contra los enemigos, lo cual encaja con una súplica que pide preservar el santuario.
  doctrine_reference: Sal 43:10; 59:3 (uso afín del aoristo de ἀπωθέω/ἀπώσω en la LXX)
- issue: 'Sentido de ἁγιάσματός σου: santuario como espacio sagrado'
  english_pob_reading: the inheritance of your sanctuary
  chosen_spanish_reading: la heredad de tu santuario
  alternative_spanish_readings:
  - tu heredad santa
  - la herencia de tu santuario
  - la heredad de tu lugar santo
  rationale: Mantengo la lectura cultual preferida por el POB. En español, «santuario» preserva la dimensión de espacio santo amenazado por profanación, sin reducir el término a una abstracción moral.
  doctrine_reference: Éx 15:17; Sal 74:7
- issue: Singular colectivo en ὁ πούς
  english_pob_reading: their foot
  chosen_spanish_reading: su pie
  alternative_spanish_readings:
  - sus pies
  rationale: Conservo el singular para reflejar el dato griego y la revisión auditada. En español, el singular puede seguir funcionando colectivamente en una imagen de invasión ritual o militar.
  doctrine_reference: Uso semítico del singular colectivo
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada que corrigió el valor de ἀπώσω como indicativo aoristo («has rechazado») y ajustó el sujeto singular de ὁ πούς a «su pie». También se resolvió la cláusula final como una petición independiente: «no permita su pie pisotear», evitando el valor de finalidad incorrecto que aparecía en un borrador anterior.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en vocativo, no «Señor», porque el griego tiene ὁ θεός y no κύριος.
  - Se prefirió «heredad» para κληρονομίαν, por su resonancia bíblica y de posesión recibida.
  - Se evitó paraphrasear la cláusula final; el español conserva la relación entre el pie del enemigo y la profanación del santuario.
  - Se respetó el singular griego «su pie» para reflejar la revisión textual más reciente.
