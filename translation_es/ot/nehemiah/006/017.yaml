translation:
  language: es
  text: También[a], en aquellos días los nobles de Judá enviaban muchas cartas a Tobías, y las de Tobías les llegaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «sus cartas iban a Tobías, y las que eran de Tobías venían a ellos». La segunda cláusula probablemente presupone «cartas» por paralelismo con la primera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Asimismo
  lexicon: HALOT
  rationale: Conserva el valor aditivo del hebreo de forma natural en español y encaja con el arranque de una observación adicional en la narración.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en ese tiempo
  - por aquellos días
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática en español que reproduce el marco narrativo sin volverlo más libre de lo que permite el texto.
- source_word: מַרְבִּים
  english_pob_choice: were sending many
  chosen_spanish: estaban enviando muchas
  alternatives_spanish:
  - enviaban muchas
  - mandaban muchas
  lexicon: HALOT
  rationale: El participio hebreo expresa acción reiterada o continua; en español, 'estaban enviando' mantiene esa duratividad, y 'muchas' refleja el cuantificador ligado a las cartas.
- source_word: חֹרֵי יְהוּדָה
  english_pob_choice: the nobles of Judah
  chosen_spanish: los nobles de Judá
  alternatives_spanish:
  - los oficiales de Judá
  - los principales de Judá
  lexicon: HALOT
  rationale: '''Nobles'' conserva el valor sociopolítico del término en Nehemías y coincide bien con el contexto de élites judías.'
- source_word: אִגְּרֹתֵיהֶם
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - sus cartas
  - correspondencia
  lexicon: HALOT
  rationale: El sustantivo denota correspondencia escrita; en español, 'cartas' es claro y natural. El posesivo puede inferirse por el contexto y la frase siguiente.
- source_word: הוֹלְכ֖וֹת עַל טוֹבִיָּה
  english_pob_choice: to Tobiah
  chosen_spanish: a Tobías
  alternatives_spanish:
  - hacia Tobías
  - para Tobías
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente que las cartas 'iban sobre/a Tobías', el sentido idiomático es destino de correspondencia. 'A Tobías' mantiene la dirección sin forzar una calca.
- source_word: וַאֲשֶׁ֥ר לְטוֹבִיָּ֖ה
  english_pob_choice: those from Tobiah
  chosen_spanish: las de Tobías
  alternatives_spanish:
  - las pertenecientes a Tobías
  - las cartas de Tobías
  lexicon: HALOT
  rationale: La construcción relativa es elíptica; en español, 'las de Tobías' recupera de manera natural el antecedente implícito ('cartas') y preserva el paralelismo del versículo.
- source_word: בָּא֥וֹת אֲלֵי/הֶם
  english_pob_choice: were coming to them
  chosen_spanish: estaban llegando a ellos
  alternatives_spanish:
  - venían a ellos
  - les llegaban
  lexicon: HALOT
  rationale: El participio plural femenino continúa la idea de movimiento/circulación de la correspondencia. 'Estaban llegando' conserva la acción repetida o continua en un español fluido.
translation_notes:
  revision_awareness: Se siguió el texto hebreo de WLC y el rastro de auditoría en inglés; se mantuvo la equivalencia óptima del POB para una construcción idiomática de correspondencia, sin ocultar la literalidad subyacente del hebreo mediante la nota.
  spanish_consistency_notes:
  - Se emplea 'Tobías' para el nombre propio según uso bíblico en español.
  - Se mantiene 'Judá' como topónimo/entidad política.
  - Se conserva el paralelismo de la correspondencia con una nota que explicita la elipsis del hebreo.
  - No se introducen términos eclesiásticos ni lecturas interpretativas ajenas al versículo.
