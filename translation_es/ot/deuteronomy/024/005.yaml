base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/024/005.yaml
  text: When a man takes a new wife[a], he shall not go out with the army, nor shall any duty be imposed on him. He shall be free for his household for one year[d][c][b], and he shall make his wife whom he has taken rejoice.
  footnotes:
  - marker: a
    text: Or, 'he shall not go out to war'; the Hebrew literally says 'go out with the army,' which may include broader military service, not only direct combat.
    reason: lexical_alternative
  - marker: b
    text: Or, 'nor shall he be assigned any task' or 'nor shall any obligation be laid on him.' The Hebrew is broader than military duty alone.
    reason: alternative_reading
  - marker: c
    text: Or, 'He shall be exempt at home for one year.' The Hebrew phrase may emphasize either his freedom for domestic life or his remaining with his household.
    reason: lexical_alternative
  - marker: d
    text: Or, 'and he shall make glad his wife whom he has married.'
    reason: lexical_alternative
