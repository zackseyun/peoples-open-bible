translation:
  language: es
  text: Entonces toda la congregación de los hijos de Israel salieron del desierto de Sin por etapas, conforme al mandato de Yahvé[a], y acamparon en Refidim[b]; pero no había agua para que el pueblo bebiera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la boca de Yahvé», un modismo que significa conforme a su mandato o dirección.'
    reason: lexical_alternative
  - marker: b
    text: O «toda la congregación de los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se puso en marcha
  - emprendió camino
  lexicon: HALOT
  rationale: En un contexto de travesía en el desierto, נסע expresa dejar el campamento y avanzar. En español, «salió» funciona de manera natural en narrativa y conserva el movimiento de salida; «partió» o «se puso en marcha» también son posibles, pero «salió» evita un tono demasiado literario o mecánico.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the whole congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la congregación de los israelitas
  - toda la comunidad de los hijos de Israel
  lexicon: HALOT
  rationale: «Congregación» conserva el sentido de asamblea/cuerpo reunido de עֵדָה. «Hijos de Israel» refleja de forma directa la expresión hebrea בני ישראל, manteniendo la forma formal del original sin sustituirla por una simplificación interpretativa.
- source_word: מִמִּדְבַּר סִין
  english_pob_choice: from the wilderness of Sin
  chosen_spanish: del desierto de Sin
  alternatives_spanish:
  - del desierto de Sin
  - desde el desierto de Sin
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «despoblado»; aquí «desierto» es claro y natural en español bíblico. «Sin» se translitera como nombre propio, sin intentar traducirlo.
- source_word: לְמַסְעֵיהֶם
  english_pob_choice: by stages
  chosen_spanish: por etapas
  alternatives_spanish:
  - según sus etapas
  - en sus jornadas sucesivas
  - de etapa en etapa
  lexicon: HALOT
  rationale: La idea adverbial de לְמַסְעֵיהֶם es que viajaron en sucesivas etapas de ruta. «Por etapas» transmite bien el valor distributivo y resulta más idiomático en español que una calca como «según sus jornadas».
- source_word: עַל פִּי יְהוָה
  english_pob_choice: according to the command of Yahweh
  chosen_spanish: conforme al mandato de Yahvé
  alternatives_spanish:
  - según el mandato de Yahvé
  - de acuerdo con la orden de Yahvé
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: El hebreo literalmente dice «sobre la boca de Yahvé», un modismo de autoridad/ निर्देश. El español debe explicitar el valor idiomático sin ocultarlo; «conforme al mandato de Yahvé» preserva el sentido de dirección ordenada. Se mantiene «Yahvé» según el criterio POB para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar español del proyecto para el Tetragrámaton. «Yahvé» es la forma establecida en la traducción base para preservar el nombre divino y evitar la sustitución por un título.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparon
  - establecieron campamento
  - se acamparon
  lexicon: HALOT
  rationale: חנה en este contexto narra la instalación de campamento en travesía. «Acampó» es preciso, claro y de registro bíblico-natural en español.
- source_word: בִּרְפִידִים
  english_pob_choice: at Rephidim
  chosen_spanish: en Refidim
  alternatives_spanish:
  - en Rephidim
  - en Refidim
  lexicon: HALOT
  rationale: Se translitera el topónimo con ortografía española simple. «En» comunica adecuadamente la localización del campamento.
- source_word: וְאֵין מַיִם
  english_pob_choice: but there was no water
  chosen_spanish: pero no había agua
  alternatives_spanish:
  - y no había agua
  - no había agua
  lexicon: HALOT
  rationale: El hebreo introduce un giro de problema tras la llegada. «Pero» reproduce bien la fuerza adversativa que el POB inglés también señaló. «No había agua» es la forma natural y directa en español.
- source_word: לִשְׁתֹּת הָעָם
  english_pob_choice: for the people to drink
  chosen_spanish: para que el pueblo bebiera
  alternatives_spanish:
  - para beber el pueblo
  - para que el pueblo pudiera beber
  - para el pueblo beber
  lexicon: HALOT
  rationale: 'El infinitivo con ל expresa finalidad: no había agua destinada al consumo del pueblo. «Para que el pueblo bebiera» expresa con naturalidad el propósito y evita una construcción áspera en español.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. En la línea doctrinal del proyecto en español, se conserva el nombre divino como «Yahvé», evitando la sustitución tradicional por «SEÑOR» y manteniendo la transparencia respecto al texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: עַל פִּי יְהוָה como idiom of command/direction
  english_pob_reading: according to the command of Yahweh
  chosen_spanish_reading: conforme al mandato de Yahvé
  alternative_spanish_readings:
  - según la orden de Yahvé
  - de acuerdo con el mandato de Yahvé
  - según la palabra de Yahvé
  rationale: La literalidad del modismo («sobre la boca de Yahvé») no resulta natural en español. «Conforme al mandato de Yahvé» deja explícita la idea de instrucción autorizada sin borrar la tensión lexical del hebreo, y coincide con la nota de equivalencia óptima del POB inglés.
  doctrine_reference: POB lexical note on עַל פִּי as an idiom of command or direction
translation_notes:
  revision_awareness: El borrador sigue el pasaje tal como quedó en el último pase revisado, sin cambios detectados en la auditoría de revisión más reciente; la versión inglesa final fue marcada como de alta concordancia y sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto en español.
  - «Congregación» conserva el valor colectivo de עֵדָה y no se reduce a un simple «pueblo».
  - Se transliteran los topónimos Sin y Refidim con ortografía española estable y sin interpretación adicional.
  - «Por etapas» refleja el valor adverbial de לְמַסְעֵיהֶם sin añadir información extrabíblica.
  - La puntuación y el orden de la cláusula siguen la sintaxis española natural sin perder la progresión narrativa del hebreo.
