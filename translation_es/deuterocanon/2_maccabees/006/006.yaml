translation:
  language: es
  text: Y no se permitía ni guardar el sábado, ni observar las fiestas ancestrales, ni siquiera reconocer simplemente que uno era judío[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'judeano', si se entiende en un sentido más geográfico-étnico; aquí el contexto de la prohibición de guardar el sábado y de observar las fiestas favorece 'judío'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  english_pob_choice: it was
  chosen_spanish: no se permitía
  alternatives_spanish:
  - era permitido
  - estaba permitido
  lexicon: LSJ
  rationale: El griego impersonal con infinitivos expresa una condición o estado de permisión/prohibición. En español, 'no se permitía' comunica con naturalidad esa situación impersonal y conserva el valor de restricción legal/social del contexto.
- source_word: οὔτε ... οὔτε ... οὔτε
  english_pob_choice: neither ... nor ... nor
  chosen_spanish: ni ... ni ... ni siquiera
  alternatives_spanish:
  - ni ... ni ... ni
  - ni ... ni ... tampoco
  lexicon: LSJ
  rationale: La serie negativa triple debe conservarse en español. 'Ni ... ni ... ni siquiera' refleja la progresión del griego y mantiene el refuerzo final de ἁπλῶς mediante 'ni siquiera'.
- source_word: σαββατίζειν
  english_pob_choice: to keep the Sabbath
  chosen_spanish: guardar el sábado
  alternatives_spanish:
  - observar el sábado
  - sabatizar
  lexicon: LSJ
  rationale: El verbo significa observar/guardar el sábado. 'Guardar el sábado' es una expresión española clara y fiel, suficientemente tradicional sin volverse arcaica.
- source_word: πατρίους
  english_pob_choice: ancestral
  chosen_spanish: ancestrales
  alternatives_spanish:
  - tradicionales
  - de los antepasados
  - patrias
  lexicon: LSJ
  rationale: '''Ancestrales'' reproduce el vínculo con los padres/antepasados y preserva el matiz histórico heredado de la expresión sin sobrecargarla.'
- source_word: ἑορτὰς
  english_pob_choice: festivals
  chosen_spanish: fiestas
  alternatives_spanish:
  - festividades
  - festivales
  - fiestas solemnes
  lexicon: LSJ
  rationale: En contexto religioso judío, 'fiestas' es natural en español y no pierde el valor de días festivos sagrados. Se evita 'festivales' por sonar moderno-secular y menos bíblico.
- source_word: διαφυλάττειν
  english_pob_choice: to observe
  chosen_spanish: observar
  alternatives_spanish:
  - guardar
  - mantener
  - cumplir
  lexicon: LSJ
  rationale: Aquí el verbo indica observar o celebrar correctamente las fiestas. 'Observar' corresponde bien al uso litúrgico y mantiene la simetría con el inglés auditado.
- source_word: ἁπλῶς
  english_pob_choice: simply
  chosen_spanish: simplemente
  alternatives_spanish:
  - claramente
  - abiertamente
  - sin más
  lexicon: LSJ
  rationale: '''Simplemente'' conserva el valor enfático de la partícula, marcando que ni siquiera la identificación básica y abierta estaba permitida.'
- source_word: Ἰουδαῖον
  english_pob_choice: a Jew
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  - de Judea
  lexicon: LSJ
  rationale: En este contexto de persecución religiosa, 'judío' expresa mejor la identidad etnorreligiosa prohibida. 'Judeano' sería más geográfico y menos natural para el sentido del pasaje.
- source_word: ὁμολογεῖν
  english_pob_choice: to acknowledge
  chosen_spanish: reconocerse
  alternatives_spanish:
  - confesarse
  - declararse
  - admitir ser
  lexicon: LSJ
  rationale: '''Reconocerse'' transmite la identificación pública con esa identidad sin introducir connotaciones confesionales posteriores. Refleja adecuadamente el acto de admitir o reconocer la propia condición.'
- source_word: εἶναι
  english_pob_choice: being
  chosen_spanish: ser
  alternatives_spanish:
  - estar
  - haber
  lexicon: LSJ
  rationale: El infinitivo complementa a ὁμολογεῖν y el español requiere una expresión natural. 'Reconocerse simplemente como judío' resume bien el valor del griego sin perder la idea de 'ser'.
theological_decisions:
- issue: Identidad de Ἰουδαῖον en contexto de persecución
  english_pob_reading: a Jew
  chosen_spanish_reading: judío
  alternative_spanish_readings:
  - judeano
  - de Judea
  rationale: El pasaje describe la supresión de la identidad religiosa y comunitaria judía, no solo una procedencia regional. 'Judío' preserva ese alcance etnorreligioso de forma clara para el lector español.
  doctrine_reference: Trasfondo histórico y cultural del texto; primacía del sentido original.
translation_notes:
  revision_awareness: El texto griego presenta una estructura negativa correlativa con tres infinitivos. La versión española conserva esa triple prohibición y refleja el énfasis final de ἁπλῶς con 'ni siquiera' para evitar suavizar el alcance del mandato prohibitivo. Se tuvo en cuenta el ajuste del inglés auditado de 'not permitted' a 'permitted neither' como indicio de la estructura negativa más cercana al griego.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se usa 'judío' por el peso etnorreligioso del contexto, consistente con el audit trail inglés.
  - Se eligió 'guardar el sábado' como equivalente idiomático de σαββατίζειν, manteniendo un registro bíblico claro y comprensible.
