translation:
  language: es
  text: Porque ¿quién confiará en un salteador bien armado[a], tambaleándose de ciudad en ciudad? Así es con un hombre que no tiene nido[b] y se hospeda dondequiera que la noche lo sorprenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien ceñido»; el adjetivo griego puede referirse literalmente a estar bien ceñido o equipado para la acción.
    reason: lexical_alternative
  - marker: b
    text: «Nido» conserva la metáfora griega de un lugar fijo de reposo; el sentido es el de una persona sin hogar seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ πιστεύσει
  english_pob_choice: For who will trust
  chosen_spanish: ¿Pues quién confiará
  alternatives_spanish:
  - ¿Porque quién confiará
  - ¿Quién confiará pues
  lexicon: LSJ
  rationale: πιστεύω aquí significa poner confianza en una persona, no simplemente creer una afirmación. «Pues» conserva la fuerza explicativa de γάρ al conectar el proverbio con la idea previa.
- source_word: εὐζώνῳ
  english_pob_choice: well-armed
  chosen_spanish: bien armado
  alternatives_spanish:
  - bien ceñido
  - bien equipado para la acción
  lexicon: LSJ
  rationale: El adjetivo remite literalmente a estar bien ceñido o equipado. En combinación con λῃστῇ, la idea es de un bandido preparado para actuar con violencia; «bien armado» comunica esa fuerza de manera natural en español.
- source_word: λῃστῇ
  english_pob_choice: robber
  chosen_spanish: ladrón
  alternatives_spanish:
  - bandido
  - salteador
  lexicon: LSJ
  rationale: λῃστής puede abarcar ladrón/atracador/bandido. En español, «ladrón» es comprensible y directo; se mantiene la imagen proverbial sin introducir un matiz histórico innecesario.
- source_word: σφαλλομένῳ ἐκ πόλεως εἰς πόλιν
  english_pob_choice: staggering from city to city
  chosen_spanish: tambaleándose de ciudad en ciudad
  alternatives_spanish:
  - yendo de ciudad en ciudad
  - reelando de ciudad en ciudad
  lexicon: LSJ
  rationale: El participio sugiere tropiezo, vacilación o pérdida de firmeza. «Tambaleándose» preserva la precariedad del movimiento mejor que un simple «vagando».
- source_word: οὕτως
  english_pob_choice: So it is with
  chosen_spanish: Así es con
  alternatives_spanish:
  - Así también es con
  - Del mismo modo es con
  lexicon: LSJ
  rationale: Introduce la comparación en español de forma idiomática, sin perder el carácter proverbial del paralelo.
- source_word: ἀνθρώπῳ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: LSJ
  rationale: El griego usa un singular genérico masculino. Se conserva «un hombre» como equivalente natural en el estilo proverbial, siguiendo la fuerza genérica del original.
- source_word: μὴ ἔχοντι νοσσιὰν
  english_pob_choice: who has no nest
  chosen_spanish: que no tiene nido
  alternatives_spanish:
  - que no tiene hogar
  - que no tiene lugar donde anidar
  lexicon: LSJ
  rationale: νοσσιά es literalmente nido o lugar de anidar. Se preserva la metáfora aviar con «nido», tal como hace la POB en inglés, porque expresa mejor la imagen de ausencia de residencia estable.
- source_word: καταλύοντι
  english_pob_choice: lodges
  chosen_spanish: se hospeda
  alternatives_spanish:
  - se aloja
  - permanece
  lexicon: LSJ
  rationale: Aquí καταλύω indica detenerse o pasar la noche. «Se hospeda» transmite ese sentido de estancia temporal y concreta en español contemporáneo.
- source_word: οὗ ἐὰν ὀψίσῃ
  english_pob_choice: wherever night finds him
  chosen_spanish: dondequiera que la noche lo sorprenda
  alternatives_spanish:
  - dondequiera que anochezca
  - dondequiera que la tarde lo alcance
  lexicon: LSJ
  rationale: La idiomática griega alude al momento en que llega la noche o se hace tarde. «La noche lo sorprenda» conserva el matiz de imprevisibilidad y de falta de morada fija.
translation_notes:
  revision_awareness: 'El pasaje presenta acuerdo general alto con el inglés auditado y sin cambios de revisión en la etapa más reciente. La redacción española sigue de cerca la imagen proverbial, manteniendo las dos metáforas principales: el ladrón preparado para actuar y la persona sin nido que pasa la noche donde la alcanza.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la imaginería concreta («nido», «tambaleándose», «se hospeda») en vez de abstraerla, para respetar el paralelismo proverbial del griego.
  - «Ladrón» se eligió como equivalente natural de λῃστής en este contexto, sin añadir color histórico o legal que el verso no requiere.
