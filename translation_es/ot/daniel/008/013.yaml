translation:
  language: es
  text: 'Entonces oí a un santo que hablaba[a], y otro santo dijo al que hablaba: «¿Hasta cuándo la visión acerca del holocausto regular[b], y de la transgresión desoladora[c], y de la entrega tanto del santuario como de la hueste[d] al pisoteo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «a Palmoni, el que hablaba», si לַפַּלְמוֹנִי se toma como nombre propio o título y no como una expresión indefinida.'
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente, «el sacrificio diario». El hebreo תָּמִיד se refiere a la ofrenda continua o regular del servicio del templo.
    reason: lexical_alternative
  - marker: c
    text: O «la transgresión que desola».
    reason: lexical_alternative
  - marker: d
    text: «Hueste» puede referirse al pueblo asociado con el santuario, a un ejército, o a otro colectivo; el hebreo no especifica plenamente aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָדוֹשׁ
  english_pob_choice: holy one
  chosen_spanish: ser santo
  alternatives_spanish:
  - santo
  - ser celestial santo
  lexicon: HALOT
  rationale: En el contexto visionario de Daniel, el adjetivo sustantivado designa a un ser celestial santo. «Ser santo» conserva la referencia personal sin importar la connotación eclesiástica de «santo» como creyente canonizado.
- source_word: לַפַּלְמוֹנִי
  english_pob_choice: to the one
  chosen_spanish: al que
  alternatives_spanish:
  - a un cierto
  - a aquel
  - a Palmoni
  lexicon: HALOT
  rationale: La forma es oscura; la versión inglesa opta por mantenerla genérica. «Al que» preserva la indeterminación sin forzar un nombre propio en el texto principal.
- source_word: הַמְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - el que hablaba
  - el hablante
  lexicon: HALOT
  rationale: El participio señala al que está en acto de hablar. «Hablaba» suena natural en español y mantiene la referencia al interlocutor en curso.
- source_word: הֶחָזוֹן
  english_pob_choice: the vision concerning
  chosen_spanish: la visión acerca de
  alternatives_spanish:
  - la visión de
  lexicon: HALOT
  rationale: «Acerca de» expresa la relación de contenido entre la visión y los elementos que siguen, de modo cercano al valor del hebreo y al audit trail inglés.
- source_word: הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el sacrificio regular
  - el holocausto continuo
  - el sacrificio diario
  lexicon: HALOT
  rationale: En este contexto cultual, «תָּמִיד» apunta a la ofrenda continua o regular del templo. «Holocausto regular» conserva el sentido sacrificial concreto y evita la frase más tradicional pero menos precisa «sacrificio diario».
- source_word: הַפֶּשַׁע שֹׁמֵם
  english_pob_choice: the desolating transgression
  chosen_spanish: la transgresión desoladora
  alternatives_spanish:
  - la transgresión que desola
  - el acto rebelde que desola
  lexicon: HALOT
  rationale: La construcción une rebelión/transgresión con un efecto de desolación. La forma adjetival mantiene la compactación hebrea y la tensión semántica que el inglés también preserva.
- source_word: תֵּת
  english_pob_choice: the giving over
  chosen_spanish: la entrega
  alternatives_spanish:
  - el entregar
  - la entrega de
  lexicon: HALOT
  rationale: El infinitivo funciona como sustantivo dentro de la pregunta. «La entrega» reproduce su fuerza nominal y enlaza bien con los objetos que siguen.
- source_word: קֹדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - la santidad
  lexicon: HALOT
  rationale: En este marco de templo, el referente es concreto y cultual; «santuario» es la equivalencia más directa y clara en español.
- source_word: צָבָא
  english_pob_choice: the host
  chosen_spanish: el ejército
  alternatives_spanish:
  - la hostia
  - el host
  - el ejército celestial
  lexicon: HALOT
  rationale: El término puede denotar ejército o host. Aquí la lectura inglesa mantiene amplitud; en español, «ejército» comunica mejor la idea de un colectivo sometido al pisoteo sin introducir un tecnicismo poco natural como «host».
- source_word: מִרְמָס
  english_pob_choice: to be trampled
  chosen_spanish: para ser pisoteados
  alternatives_spanish:
  - para ser hollados
  - como pisoteo
  lexicon: HALOT
  rationale: El sustantivo expresa el acto de pisotear. La construcción verbal en español da una pregunta fluida y conserva la idea de profanación por pisoteo.
theological_decisions:
- issue: Identidad de los seres santos que hablan
  english_pob_reading: heavenly holy beings/angelic figures
  chosen_spanish_reading: seres santos celestiales
  alternative_spanish_readings:
  - santos humanos
  - ángeles
  rationale: En la escena de Daniel, los hablantes son mejor entendidos como seres celestiales. El texto principal evita precisar «ángeles» para no añadir una especificación que el hebreo no da explícitamente.
  doctrine_reference: Daniel 8:13; Translation philosophy §3
- issue: Referencia de צָבָא
  english_pob_reading: left as 'host' without interpretive narrowing
  chosen_spanish_reading: ejército, sin estrechar más el referente
  alternative_spanish_readings:
  - el pueblo de Dios
  - el ejército celestial
  - la hueste
  rationale: La palabra admite varias posibilidades contextuales. «Ejército» comunica el campo semántico sin resolver una ambigüedad que el texto deja abierta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que añadió la coordinación explícita antes de «the giving over». En español se reflejó con la repetición de «y» antes de «de la entrega», manteniendo la coordinación hebrea y la fluidez sintáctica.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando corresponda al nombre divino, pero este versículo no contiene el Tetragrámaton.
  - Se evita «SEÑOR» como máscara donde no hay base en el texto fuente.
  - «Santuario» se reserva para el referente cultual concreto; no se sustituye por «lugar santo» salvo necesidad contextual.
  - Se conserva la ambigüedad de צָבָא mediante una nota, sin resolverla en exceso en el cuerpo del texto.
  - La puntuación española conserva la pregunta final abierta con comillas angulares.
  - La secuencia de cláusulas sigue la coordinación del hebreo y la revisión inglesa reciente.
