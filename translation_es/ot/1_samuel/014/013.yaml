  to: Entonces Jonatán subió apoyándose en sus manos y sus pies[a], y su escudero iba detrás de él. Cayeron delante de Jonatán, y su escudero los mataba detrás de él.
  rationale: Se ajustó la postura corporal para evitar un calco poco idiomático en español, y se aclaró la acción final del escudero con una formulación más natural que sigue siendo fiel al hebreo y a la nota de aspecto iterativo/continuo preservada en el expediente inglés. También se eliminó el pronombre explícito «Ellos» por estilo narrativo español.
