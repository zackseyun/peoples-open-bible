  yaml_path: translation/ot/genesis/040/004.yaml
  text: So the captain of the guard appointed Joseph to attend them[a], and he served them[b]; and they were in custody for some time.
  footnotes:
  - marker: a
    text: Or 'appointed Joseph over them' or 'put Joseph in charge of them.' The Hebrew verb can denote appointment to responsibility, and the relation between Joseph and the prisoners may be understood as either attendance or oversight.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and they were days in custody,' a Hebrew idiom meaning they remained there for a period of time.
    reason: lexical_alternative
