translation:
  language: es
  text: En aquel día[a] el Señor quitará la belleza de las tobilleras, de las cintas para la cabeza[b], y de los adornos de media luna[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aquel día».'
    reason: lexical_alternative
  - marker: b
    text: El sentido preciso de este término es incierto; puede referirse a tocados o redes para el cabello.
    reason: lexical_alternative
  - marker: c
    text: 'O: «collares de media luna»; el hebreo alude a adornos en forma de creciente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: Es el giro profético habitual y en español suena natural y solemne. Conserva el valor temporal introductorio sin volverlo más explicativo de lo que permite el hebreo.
- source_word: יָסִיר
  english_pob_choice: will take away
  chosen_spanish: quitará
  alternatives_spanish:
  - retirará
  - removerá
  lexicon: HALOT
  rationale: El verbo expresa causar la remoción de adornos en contexto de juicio. 'Quitar' comunica bien la acción y evita una literalidad rígida.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aunque el hebreo aquí usa el título Adonai, el texto fuente es la forma divina referida al Dios de Israel; en el proyecto POB, el nombre divino se vierte como 'Yahvé'. Esto preserva la identificación del sujeto divino sin la convención de ocultarlo tras 'Señor'.
- source_word: תִּפְאֶרֶת
  english_pob_choice: the beauty of
  chosen_spanish: el adorno de
  alternatives_spanish:
  - la belleza de
  - la gala de
  - el esplendor de
  lexicon: HALOT
  rationale: En este contexto la palabra funciona como valor colectivo de finura/ornamento de los artículos enumerados. 'Adorno' suena más natural en español que 'belleza' cuando se refiere a objetos de tocador y joyería, aunque conserva la idea de lo vistoso o embellecedor.
- source_word: הָעֲכָסִים
  english_pob_choice: the anklets
  chosen_spanish: las tobilleras
  alternatives_spanish:
  - los adornos de tobillo
  - los anillos de tobillo
  lexicon: HALOT
  rationale: El término designa ornamentos para los tobillos o pies. 'Tobilleras' es el equivalente español más claro y directo.
- source_word: הַשְּׁבִיסִים
  english_pob_choice: the headbands
  chosen_spanish: las cintas para la cabeza
  alternatives_spanish:
  - los tocados
  - las coifas
  - las redes para el cabello
  lexicon: HALOT
  rationale: El objeto exacto es incierto. La expresión 'cintas para la cabeza' comunica con cautela un adorno de cabeza sin cerrar indebidamente el sentido a un artículo moderno específico.
- source_word: הַשַּׂהֲרֹנִים
  english_pob_choice: the crescent ornaments
  chosen_spanish: los collares con lunas crecientes
  alternatives_spanish:
  - los adornos en forma de luna
  - los collares lunares
  lexicon: HALOT
  rationale: El término alude a ornamentos en forma de media luna o creciente. 'Collares con lunas crecientes' conserva la imaginería y hace explícito el objeto probable sin exceder la evidencia del hebreo.
theological_decisions:
- issue: Sujeto divino en אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el hebreo usa Adonai, el nombre divino subyacente es el referente de pacto de Isaías; el estándar del proyecto pide 'Yahvé' para el nombre divino. Esto evita la convención de reemplazarlo por una máscara reverencial en español.
  doctrine_reference: Nombre divino y traducción directa del Tetragrámaton / referente del pacto
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el pase de control mostró alto acuerdo; por eso no se incorporan ajustes textuales adicionales. La versión española sigue de cerca el análisis lexical auditable del paquete fuente y mantiene las mismas incertidumbres léxicas donde el hebreo no permite mayor precisión.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se evita 'belleza' porque en español sonaría abstracto en una lista de objetos; 'adorno' preserva mejor el valor colectivo del constructo.
  - Se conserva la cautela en 'cintas para la cabeza' y 'collares con lunas crecientes' para no cerrar indebidamente términos hebreos inciertos.
  - La puntuación y el registro son formales y aptos para lectura eclesial.
