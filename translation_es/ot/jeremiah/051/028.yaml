    reason: lexical_alternative
  - marker: c
    text: El hebreo pasa de sufijos femeninos con los cargos administrativos a un sufijo masculino singular en «su dominio»; la traducción mantiene ese cambio sin armonizarlo.
    reason: alternative_reading
  revision_rationale: Se corrige el imperativo al plural para ajustarlo al hebreo, se reanclan las notas a las palabras pertinentes, y se reemplaza «toda la tierra de su dominio» por «cada tierra bajo su dominio» para conservar mejor el sentido distributivo de כָּל אֶרֶץ y la decisión auditada en inglés.
