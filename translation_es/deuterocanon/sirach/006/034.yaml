review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo extante como texto principal y conserva en nota la fuerte divergencia del griego paralelo, en línea con el expediente POB. Los elementos semánticos clave están presentes: exhortación volitiva, oír/escuchar toda clase de habla instructiva, y no dejar escapar un proverbio caracterizado por entendimiento.'
  spanish_quality_summary: El español es claro y natural, pero «Desea escuchar» suena algo débil como imperativo exhortativo en este contexto sapiencial. «Procura escuchar» o «Sé diligente para escuchar» refleja mejor el matiz de disposición activa de חֲפוֹץ sin sonar forzado. También conviene anclar la nota al sintagma completo inicial, no solo a «escuchar», porque la variante griega reemplaza toda la primera exhortación y más.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Discurso» y «proverbio» son defendibles; «de entendimiento» preserva la construcción genitiva. No aparecen términos sensibles del glosario mayor. La decisión hebreo-sobre-griego está bien aplicada.
  issues:
  - severity: medium
    issue: Imperativo español algo débil en «Desea escuchar»
    rationale: Aunque transmite voluntad, «desea» puede sonar a simple sentimiento interno más que a exhortación activa. El hebreo חֲפוֹץ, según el expediente inglés, busca una disposición pronta/eager. «Procura escuchar» comunica mejor ese impulso en español eclesial natural.
  - severity: low
    issue: Ubicación del ancla de nota puede ser más precisa
    rationale: La nota trata de una lectura griega alternativa para el versículo, no solo para el verbo «escuchar». Colocarla tras el primer sintagma o cláusula representa mejor el alcance de la variante.
  revised_spanish_text: Procura escuchar todo discurso[a], y no dejes que un proverbio de entendimiento se te escape.
