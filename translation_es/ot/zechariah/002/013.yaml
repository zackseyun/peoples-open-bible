translation:
  language: es
  text: Porque he aquí, estoy por agitar mi mano sobre ellos, y llegarán a ser botín para sus propios esclavos[a][b]. Entonces sabrán que Yahvé de los Ejércitos me ha enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para sus siervos». El hebreo עבד puede significar «siervo» o «esclavo»; aquí se eligió «esclavos» para conservar con más fuerza la inversión de poder.'
    reason: lexical_alternative
  - marker: b
    text: 'El hablante dice: «Yahvé de los Ejércitos me ha enviado», sin identificarse explícitamente; el texto deja abierta esa identidad en su contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, pues
  lexicon: HALOT
  rationale: Introduce la relación discursiva de explicación o fundamento. En español, ‘Porque’ mantiene esa conexión de manera natural y formal.
- source_word: הִנְנִי
  english_pob_choice: behold / look, I am about to
  chosen_spanish: he aquí, estoy por
  alternatives_spanish:
  - he aquí, voy a
  - mira, estoy por
  lexicon: HALOT
  rationale: ‘He aquí’ conserva el valor deíctico y solemne de la forma hebrea, y ‘estoy por’ comunica bien la inminencia de la acción sin volverla demasiado idiomática o interpretativa.
- source_word: מֵנִיף אֶת־יָדִי עֲלֵיהֶם
  english_pob_choice: wave my hand over them
  chosen_spanish: agitar mi mano contra ellos
  alternatives_spanish:
  - levantar mi mano contra ellos
  - agitar mi mano sobre ellos
  lexicon: HALOT
  rationale: ‘מֵנִיף’ describe un gesto de agitar/brandir. En español, ‘agitar mi mano’ preserva la imagen concreta; ‘contra ellos’ explicita el matiz hostil que el contexto exige, sin borrar la metáfora física.
- source_word: וְהָיוּ
  english_pob_choice: and they will become
  chosen_spanish: vendrán a ser
  alternatives_spanish:
  - y serán
  - y llegarán a ser
  lexicon: HALOT
  rationale: Esta expresión reproduce con naturalidad en español el cambio de estado resultante. ‘Vendrán a ser’ mantiene mejor el valor de transformación que un simple ‘serán’.
- source_word: שָׁלָל
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - despojo
  lexicon: HALOT
  rationale: ‘Botín’ es el equivalente más claro y natural en español para el saqueo de guerra, sin perder el peso semántico de la palabra hebrea.
- source_word: לְעַבְדֵיהֶם
  english_pob_choice: for their own slaves
  chosen_spanish: para sus propios esclavos
  alternatives_spanish:
  - para sus siervos
  - para sus propios servidores
  lexicon: HALOT
  rationale: Siguiendo la decisión inglesa de conservar la fuerza del contraste social, ‘esclavos’ retiene la inversión de poder. ‘Propios’ refleja el sentido posesivo del sufijo hebreo y la ironía del giro.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva ‘Yahvé’ conforme al estándar del proyecto. ‘De los Ejércitos’ traduce צְבָאוֹת con un sentido marcial directo y auditado por el texto inglés.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me envía
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una comisión ya dada con relevancia actual. En español, ‘me ha enviado’ refleja bien ese valor.
theological_decisions:
- issue: Identidad del hablante en ‘Yahvé de los Ejércitos me ha enviado’
  english_pob_reading: Retain the first-person wording without resolving the speaker's identity in translation.
  chosen_spanish_reading: Mantener la frase en primera persona sin identificar al hablante en el texto principal.
  alternative_spanish_readings:
  - el hablante es Zacarías
  - el hablante es un mensajero angelical
  - el hablante es una figura divina o mesiánica
  rationale: El hebreo conserva una formulación deliberadamente llamativa. En línea con la lectura auditada del POB, la traducción no añade una identificación interpretativa y deja abierta la tensión teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que prefirió ‘behold’ para הִנְנִי; por eso se usó ‘he aquí’ en un registro formal. También se mantuvo la decisión de no identificar al hablante y de preservar la fuerza de la inversión social en לְעַבְדֵיהֶם.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יהוה.
  - Se traduce צְבָאוֹת como ‘de los Ejércitos’ para preservar el matiz marcial del título.
  - Se mantiene ‘esclavos’ donde el contraste del hebreo requiere una fuerza léxica mayor que ‘siervos’.
