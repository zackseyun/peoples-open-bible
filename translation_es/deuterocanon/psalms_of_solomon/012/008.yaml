    rationale: El POB inglés conserva alternativas para ἅπαξ ('una vez' / finalidad) y ὅσιοι ('los santos' / 'los fieles'). Dado que también son relevantes en español, deben mantenerse con marcadores en el texto.
  revised_spanish_text: Que los pecadores perezcan de delante de Yahvé una vez por todas[a], y que los devotos[b] de Yahvé hereden las promesas.
