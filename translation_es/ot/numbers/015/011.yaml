translation:
  language: es
  text: Así se hará para un toro, o para un carnero, o para el cordero[a] entre las ovejas o entre las cabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה puede referirse de forma más amplia a una cabeza de ganado menor, no solo a un cordero; la frase siguiente especifica uno entre las ovejas o entre las cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּכָה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Así pues
  lexicon: HALOT
  rationale: El adverbio introduce una instrucción normativa. «Así» comunica de manera natural la correspondencia de procedimiento sin añadir explicaciones no presentes en el hebreo.
- source_word: יֵעָשֶׂה
  english_pob_choice: it shall be done
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecho
  - se debe hacer
  lexicon: HALOT
  rationale: El nifal impersonal pide una pasiva o impersonal en español. «Se hará» conserva el valor prescriptivo y suena más natural que un calco rígido.
- source_word: לַשּׁוֹר הָאֶחָד
  english_pob_choice: for the one bull
  chosen_spanish: para el toro uno
  alternatives_spanish:
  - para el toro único
  - para el toro uno de ellos
  lexicon: HALOT
  rationale: שור es un bovino macho adulto; en español «toro» es más preciso que «buey» o «novillo» aquí. Mantengo la repetición de «uno» para reflejar la insistencia del hebreo en la singularidad de cada caso.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ram
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, «carnero» expresa bien el macho de la oveja. Evito «ram» por no ser español y «macho de oveja» por ser más explicativo que el texto.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  - único
  lexicon: HALOT
  rationale: La segunda ocurrencia intensifica la especificidad individual. En español, repetir solo «uno» conserva el paralelismo sin sonar artificial.
- source_word: שֶּׂה
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - cría del rebaño
  - animal menor
  lexicon: HALOT
  rationale: Aunque שֶׂה puede ser más amplio que «cordero», el contexto inmediato y la aclaración siguiente permiten una traducción natural. «Cordero» es la opción más inteligible para el lector español, mientras la nota preserva la amplitud léxica.
- source_word: בַכְּבָשִׂים
  english_pob_choice: among the sheep
  chosen_spanish: entre las ovejas
  alternatives_spanish:
  - de entre las ovejas
  - de las ovejas
  lexicon: HALOT
  rationale: El ב categorial se expresa mejor con «entre» para indicar pertenencia al grupo, no procedencia espacial. «Ovejas» mantiene la categoría zoológica del texto.
- source_word: בָעִזִּים
  english_pob_choice: among the goats
  chosen_spanish: o entre las cabras
  alternatives_spanish:
  - o de entre las cabras
  - o de las cabras
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior. «Cabras» es el equivalente español natural para la categoría de los caprinos en este contexto.
- source_word: אוֹ ... אוֹ ... אוֹ ... אוֹ
  english_pob_choice: or ... or ... or ... or
  chosen_spanish: o ... o ... o ... o
  alternatives_spanish:
  - o ... o ... o ...
  lexicon: HALOT
  rationale: La serie disyuntiva repetida debe mantenerse para reflejar las opciones rituales alternativas sin fusionarlas en una sola enumeración.
theological_decisions:
- issue: Valor de שֶׂה en el contexto sacrificial
  english_pob_reading: lamb, with a note that the Hebrew can more broadly mean a head of small livestock
  chosen_spanish_reading: cordero, con nota sobre su amplitud semántica
  alternative_spanish_readings:
  - animal menor
  - cría del rebaño
  rationale: El texto hebreo se restringe por las frases siguientes a ovejas o cabras, pero la raíz sigue siendo más amplia que «cordero». Por eso el texto principal usa una forma clara y la nota preserva la tensión lexical.
  doctrine_reference: Lexical semantics; sacrificial terminology
- issue: Forma de referencia a Yahvé en una ley cultual
  english_pob_reading: implicit through the prescription, no divine-name masking issue in English verse
  chosen_spanish_reading: sin mención explícita del nombre divino en este versículo
  alternative_spanish_readings:
  - introducir Yahvé en una nota explicativa
  - usar el nombre divino en el texto
  rationale: Este versículo no contiene el tetragrámaton; por tanto, no corresponde introducirlo. Mantengo la referencia normativa impersonal del hebreo.
  doctrine_reference: Textual fidelity; divine-name usage
translation_notes:
  revision_awareness: El texto base en inglés ya había resuelto correctamente la estructura legal y la amplitud de שֶׂה con una nota léxica. En español, ajusté la sintaxis para que suene natural sin perder la forma normativa ni la serie disyuntiva. No se introdujeron cambios de sentido respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se usó «toro» para שׁוֹר y «carnero» para אַיִל, manteniendo distinciones zoológicas naturales en español.
  - Se conservó la repetición de «uno» para reflejar la insistencia singular del hebreo.
  - Se prefirió «entre» para ב categorial, porque expresa pertenencia al grupo mejor que una preposición de origen.
  - La nota del cordero preserva la tensión entre la amplitud semántica de שֶׂה y la concreción impuesta por el contexto.
