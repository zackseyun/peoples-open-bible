translation:
  language: es
  text: 'Habla a los hijos de Israel y diles: Los tiempos señalados[a] de Yahvé, que proclamaréis como convocaciones santas[b]—estos son mis tiempos señalados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fiestas señaladas» o «festividades»; el término hebreo puede referirse a ocasiones sagradas fijas en general, no solo a comidas festivas.
    reason: lexical_alternative
  - marker: b
    text: O «asambleas santas».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige la palabra
  lexicon: HALOT
  rationale: El imperativo piel de דבר es un mandato directo de dirigirse al pueblo. En español, «Habla» conserva la instrucción formal sin sonar artificiosamente pesada.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se preserva la expresión masculina convencional del hebreo, manteniendo la forma corporativa del pacto sin neutralizarla a «israelitas».
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y les dirás
  lexicon: HALOT
  rationale: En español, la combinación «habla... y diles» reproduce con naturalidad la secuencia imperativa del hebreo.
- source_word: מוֹעֲדֵי
  english_pob_choice: appointed times
  chosen_spanish: fiestas señaladas
  alternatives_spanish:
  - tiempos señalados
  - tiempos designados
  - fiestas designadas
  lexicon: HALOT
  rationale: Aquí se opta por una equivalencia natural que sigue siendo amplia, pero el sentido básico de mo‘ed como ocasión fija y determinada. Se evita «fiestas» a secas, porque el capítulo incluye también el sábado; «señaladas» conserva la idea de designación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Nombre divino: transliterarlo como «Yahvé» en lugar de sustituirlo por un título.'
- source_word: אֲשֶׁר תִּקְרְאוּ אֹתָם
  english_pob_choice: which you shall proclaim
  chosen_spanish: las cuales proclamaréis
  alternatives_spanish:
  - las cuales llamaréis
  - las cuales anunciaréis
  lexicon: HALOT
  rationale: קרא en este contexto implica proclamar o declarar públicamente. «Proclamaréis» comunica mejor la función pública y cultual que un simple «llamaréis».
- source_word: מִקְרָאֵי קֹדֶשׁ
  english_pob_choice: holy convocations
  chosen_spanish: convocaciones santas
  alternatives_spanish:
  - asambleas santas
  - asambleas sagradas
  - convocaciones sagradas
  lexicon: HALOT
  rationale: «Convocaciones santas» conserva la idea de un llamado/asamblea formal y el adjetivo de consagración. Se mantiene la relación con el término hebreo más que con una paráfrasis más libre.
- source_word: אֵלֶּה הֵם
  english_pob_choice: These are
  chosen_spanish: estas son
  alternatives_spanish:
  - son estas
  - estos son
  lexicon: HALOT
  rationale: Se refleja el pronombre demostrativo y la cópula de manera natural en español, manteniendo la fuerza identificadora de la cláusula final.
- source_word: מוֹעֲדָי
  english_pob_choice: my appointed times
  chosen_spanish: mis fiestas señaladas
  alternatives_spanish:
  - mis tiempos señalados
  - mis tiempos designados
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona se conserva explícitamente. Se repite la misma opción léxica que al inicio para mantener coherencia, aunque «tiempos» seguiría siendo la alternativa más literal.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto atribuye estas ocasiones al Dios de pacto por su Nombre propio. La traducción sigue el estándar del proyecto y evita la sustitución litúrgica por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de מוֹעֵד
  english_pob_reading: appointed times
  chosen_spanish_reading: fiestas señaladas
  alternative_spanish_readings:
  - tiempos señalados
  - tiempos designados
  - fiestas/festividades
  rationale: Aunque la POB inglesa opta por la amplitud de «appointed times», en español «fiestas señaladas» es idiomático y sigue pudiendo abarcar las citas sagradas del capítulo. Se conserva la nota interpretativa de que no se limita solo a comidas festivas.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Forma masculina de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel y de las tribus de Israel
  rationale: Se mantiene la forma masculina convencional del hebreo. La frase funciona como expresión pactal para todo el pueblo, sin necesidad de neutralización.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió el orden inicial para comenzar con «The appointed times of the LORD» y reservó «these are my appointed times» para la cláusula final; el español sigue ese mismo arreglo, colocando primero el sintagma nominal y dejando la demostración final para אֵלֶּה הֵם מוֹעֲדָי. También se respetó la tensión lexical entre una traducción amplia de מוֹעֵד y una opción más idiomática en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma habitual del Nombre divino en este proyecto.
  - Se conserva la pareja verbal «Habla... y diles» para reproducir la secuencia imperativa hebrea.
  - «Convocaciones santas» se usa de manera consistente con la noción cultual de מִקְרָאֵי קֹדֶשׁ.
  - La expresión final «estas son mis fiestas señaladas» refleja la posesión divina del calendario sagrado.
