translation:
  language: es
  text: Pero yo sé tu sentarte[a], tu salida, tu entrada y tu furor contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu morada ... tu partida ... tu entrada». El hebreo usa una secuencia convencional para la vida asentada y los movimientos de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁבְתְּךָ
  english_pob_choice: your sitting down
  chosen_spanish: tu sentarte
  alternatives_spanish:
  - tu morada
  - tu permanecer
  - tu asiento
  lexicon: HALOT
  rationale: La forma hebrea funciona como un sustantivo verbal dentro de una tríada idiomática. En español, «tu sentarte» conserva la imagen concreta y la amplitud de sentido de una vida asentada, sin convertirla de inmediato en una interpretación más abstracta como «tu morada».
- source_word: וְצֵאתְךָ
  english_pob_choice: your going out
  chosen_spanish: tu salir
  alternatives_spanish:
  - tu salida
  - tu partida
  lexicon: HALOT
  rationale: El sustantivo verbal de יצא se mantiene con una expresión directa y natural en español. «Tu salir» preserva el paralelismo con la frase siguiente y la secuencia de movimientos cotidiana del hebreo.
- source_word: וּבוֹאֲךָ
  english_pob_choice: your coming in
  chosen_spanish: tu entrar
  alternatives_spanish:
  - tu entrada
  - tu llegada
  lexicon: HALOT
  rationale: La contraparte de «salir» se expresa con un infinitivo sustantivado breve y claro. «Tu entrar» conserva el paralelismo idiomático sin perder legibilidad en español.
- source_word: יָדָעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo conozco
  alternatives_spanish:
  - yo sé
  - yo he conocido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento pleno y cierto. «Yo conozco» comunica una conciencia continua y exhaustiva en un español natural; además, el contraste con las acciones del rey queda bien marcado por la declaración divina.
- source_word: הִתְרַגֶּזְךָ
  english_pob_choice: your raging
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu ira
  - tu agitación
  - tu enfurecimiento
  lexicon: HALOT
  rationale: El hitpael de רגז puede indicar agitación intensa o furor hostil. «Tu furor» conserva la fuerza emotiva y agresiva del término, sin reducirlo a simple inquietud interior.
- source_word: אֵלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - hacia mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque la preposición básica es «a/toward», el contexto hostil exige en español una relación adversativa. «Contra mí» expresa con precisión el sentido del ataque o desafío implícito.
- source_word: וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - además
  lexicon: Gramática hebrea
  rationale: El marcador de objeto no se vierte como palabra independiente; su enlace al último miembro de la serie se refleja con la coordinación normal en español.
theological_decisions:
- issue: Conocimiento divino exhaustivo expresado por el perfecto
  english_pob_reading: Render as present 'I know' to express ongoing, exhaustive divine awareness.
  chosen_spanish_reading: «yo conozco» como presente de conocimiento pleno y continuo
  alternative_spanish_readings:
  - «yo sé»
  - «he sabido»
  rationale: El hablante es Yahvé, que declara conocimiento total de las acciones y hostilidad del rey. El presente español transmite esa certidumbre permanente sin introducir una lectura temporal indebida.
  doctrine_reference: 'Atributos divinos: omnisciencia'
- issue: Tríada idiomática de vida y movimientos cotidianos
  english_pob_reading: The Hebrew uses a conventional sequence for a person's settled life and movements.
  chosen_spanish_reading: 'mantener la secuencia concreta: sentarte, salir y entrar'
  alternative_spanish_readings:
  - morada, partida y entrada
  - estar, ir y venir
  rationale: La frase hebrea es una fórmula convencional que abarca la vida estable y los desplazamientos habituales. Se conserva esa textura idiomática para no borrar la amplitud semántica del original.
  doctrine_reference: Ninguna doctrina específica; observación semántica del hebreo
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paralelo hebreo confirmado por el audit trail inglés: preserva la tríada idiomática con sustantivos verbales en español, mantiene el valor hostil de רגז con «furor», y refleja el perfecto ידע con un presente de conocimiento continuo. No se detectaron revisiones aplicadas en el expediente inglés, por lo que la propuesta mantiene la lectura estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el sujeto divino implícito del contexto de Isaías, conforme al estándar del proyecto.
  - Se eligieron formas verbales sustantivadas breves («sentarte», «salir», «entrar») para conservar el paralelismo hebreo sin forzar una paráfrasis.
  - «Contra mí» mantiene la fuerza adversativa requerida por el contexto de hostilidad.
  - La nota al pie conserva la alternativa interpretativa documentada en el inglés POB, adaptada al español.
