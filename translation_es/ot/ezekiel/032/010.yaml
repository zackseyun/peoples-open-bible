review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y la mayoría de las decisiones léxicas del hebreo y del POB en inglés: ''muchos pueblos'', ''ante ellos'', ''temblarán'', ''a cada momento'' y ''cada hombre por su propia vida'' son sustancialmente fieles. Sin embargo, hay varios problemas de fidelidad y español natural que requieren corrección: ''cuando blandiré'' usa un futuro impropio después de ''cuando'' donde el hebreo tiene infinitivo constructo con sentido temporal; ''sobre ti'' en ''se estremecerán sobre ti'' es un calco poco natural en español para עָלֶיךָ y oscurece el sentido; además la nota [a] está mal anclada y su contenido no corresponde al lugar donde el hebreo usa el verbo con cognado intensivo.'
  spanish_quality_summary: 'El texto es comprensible, pero contiene giros poco naturales o incorrectos para español bíblico claro: ''queden [a] sobrecogidos'' separa torpemente el marcador; ''cuando blandiré'' es gramaticalmente deficiente en este contexto; ''se estremecerán sobre ti'' suena antinatural. Una revisión menor puede mantener cercanía al hebreo y mejorar notablemente la legibilidad.'
  glossary_alignment: No hay conflictos con los términos globales del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. Las decisiones principales ('pueblos', 'vida') concuerdan con el expediente inglés. La mejor excepción contextual es usar 'por ti' en vez de 'sobre ti' para עָלֶיךָ en la segunda cola, porque en español 'sobre ti' con 'estremecerse' no comunica bien el valor relacional del hebreo.
  issues:
  - severity: high
    issue: '''cuando blandiré mi espada'''
    rationale: Después de 'cuando', el futuro simple es impropio aquí; además no refleja bien el infinitivo constructo temporal בְּעוֹפְפִי. Debe ser 'cuando blanda mi espada' o una forma equivalente.
  - severity: medium
    issue: '''se estremecerán sobre ti'''
    rationale: Aunque intenta seguir el inglés revisado 'over you' y el hebreo עָלֶיךָ, en español este giro resulta opaco y poco idiomático. 'Por ti' o 'a causa de ti' preserva el sentido relacional sin añadir contenido excesivo.
  - severity: medium
    issue: Nota [a] mal ubicada y mal formulada
    rationale: La nota sobre el verbo y sustantivo cognados corresponde a la expresión de horror de los reyes, no a 'queden sobrecogidos' de la primera cola. Además dice 'quede aturdidos', error gramatical.
  - severity: low
    issue: Marcador insertado dentro de la locución 'queden [a] sobrecogidos'
    rationale: El anclaje interrumpe innecesariamente la lectura. Debe colocarse tras la frase relevante.
