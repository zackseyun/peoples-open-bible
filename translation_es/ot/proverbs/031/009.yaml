review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: imperativos sucesivos (''abre tu boca'', ''juzga'', ''defiende/aboga'') y mantiene la distinción entre עָנִי y אֶבְיוֹן como ''pobre'' y ''necesitado''. ''Juzga con justicia'' representa adecuadamente שְׁפָט צֶדֶק. Sin embargo, el inglés POB auditado revisó explícitamente וְדִין a ''plead the cause of'', y en español ''defiende la causa de'' es aceptable pero menos cercano al matiz de abogar/alegar una causa. Conviene ajustar a una formulación más forense y natural en español.'
  spanish_quality_summary: El español es claro y digno, pero la coma antes de 'y' es innecesaria en español estándar. 'Abre tu boca' suena bien y conserva la imagen hebrea. La nota alternativa con 'Habla' pierde algo de la fuerza idiomática; 'Habla en favor de ellos' no está en el original, así que una alternativa mejor es 'Habla' o 'Habla, juzga justamente...' pero con verbo principal más alineado al texto. La mejor mejora es cambiar 'defiende la causa' por 'aboga por la causa' o 'aboga por'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones para ''pobre'' y ''necesitado'' están bien. El único ajuste importante es alinear mejor דין con el rastro léxico inglés auditado: en español ''aboga por la causa del pobre y del necesitado'' o ''aboga por el pobre y el necesitado'' transmite mejor el marco jurídico que ''defiende la causa''.'
  issues:
  - severity: medium
    issue: וְדִין quedó como 'defiende la causa de' en lugar de una expresión más cercana a 'plead the cause'.
    rationale: Aunque 'defender la causa' no es incorrecto, el historial auditado inglés cambió deliberadamente a 'plead the cause' para reflejar mejor דין. En español 'aboga por la causa de' conserva mejor el matiz forense sin sonar forzado.
  - severity: low
    issue: Coma innecesaria antes de 'y'.
    rationale: La puntuación española normalmente no lleva coma antes de la conjunción copulativa en esta serie verbal.
  - severity: low
    issue: La nota alternativa reproduce 'defiende la causa', que hereda el mismo desajuste léxico principal.
    rationale: Si se revisa el verbo principal, la nota debe armonizarse con esa decisión y seguir siendo natural en español.
  revised_spanish_text: Abre tu boca[a], juzga con justicia y aboga por la causa del pobre y del necesitado.
  revised_footnotes:
  - marker: a
    text: 'O: «Habla, juzga justamente y aboga por la causa del pobre y del necesitado».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la imagen hebrea 'Abre tu boca' y el marco judicial de 'juzga con justicia', pero se cambia 'defiende la causa' por 'aboga por la causa' para reflejar mejor el valor forense de וְדִין y alinearse con la revisión auditada del inglés POB ('plead the cause'). También se corrige la puntuación al español estándar y se ajusta la nota alternativa para concordar con la decisión léxica principal.
