revisions:
- from: Cuando Joab vio que la batalla se había puesto contra él por delante y por detrás, escogió de entre todos los hombres escogidos de Israel y los dispuso para enfrentar a Aram.
  to: Cuando Joab vio que el frente de batalla estaba dispuesto contra él por delante y por detrás, escogió de entre todos los combatientes selectos de Israel y los dispuso para enfrentar a Aram.
  rationale: Se reemplazó «la batalla se había puesto contra él» por «el frente de batalla estaba dispuesto contra él» para expresar con claridad el modismo hebreo פני המלחמה y la situación táctica. También se cambió «hombres escogidos» por «combatientes selectos» para conservar el sentido de tropas de élite con mejor naturalidad en español.
