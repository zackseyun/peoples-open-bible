review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa básica del hebreo: fueron a Ofir, tomaron oro de allí y lo llevaron al rey Salomón. También conserva correctamente la alternativa potencial de וַיָּבֹאוּ como ''vinieron/llegaron'' frente a ''fueron''. Sin embargo, falla en un punto léxico importante: כִּכָּר significa la unidad antigua ''talento'', no ''tonelada''. Cambiar la unidad por una medida moderna aproximada altera el referente histórico y la exactitud semántica del texto fuente.'
  spanish_quality_summary: El español es generalmente natural y legible. No obstante, 'cuatrocientas veinte toneladas de oro' suena fluido a primera vista pero introduce una equivalencia interpretativa inexacta. Además, el espaciado del marcador '[a]' en el texto debe ajustarse para anclarse correctamente al término pertinente. La redacción mejora usando 'talentos de oro' en el texto principal y dejando cualquier aclaración de unidad antigua en nota.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El principal desajuste con la filosofía léxica del proyecto es la sustitución de una unidad antigua del original por una medida moderna ('toneladas'). La decisión inglesa auditada preserva 'talents'; el español debe corresponder con 'talentos', con nota aclaratoria si se desea. 'Ofir', 'oro', y 'rey Salomón' están bien alineados.
  issues:
  - severity: high
    issue: '''toneladas'' traduce incorrectamente כִּכָּר'
    rationale: כִּכָּר es una unidad antigua de peso normalmente traducida 'talento'. 'Tonelada' no es equivalente semántica ni históricamente exacta; convierte una unidad específica del mundo antiguo en una medida moderna aproximada, alterando el significado fuente.
  - severity: medium
    issue: La nota presenta 'talentos' como alternativa secundaria en vez de la traducción principal
    rationale: Dado que el original nombra explícitamente una unidad antigua concreta, el texto principal debe preservarla. La nota puede explicar que se trata de una medida de peso antigua, pero no reemplazarla en favor de claridad moderna.
  - severity: low
    issue: Ubicación/espaciado del marcador de nota en el texto
    rationale: 'El marcador aparece separado: ''veinte [a] toneladas''. Debe anclarse limpiamente al término o frase pertinente, por ejemplo ''talentos[a] de oro'' o ''oro[a]'' según el contenido de la nota.'
  revised_spanish_text: Fueron a Ofir y tomaron de allí cuatrocientos veinte talentos[a] de oro, y lo llevaron al rey Salomón.
  revised_footnotes:
  - marker: a
    text: El hebreo nombra una unidad antigua de peso, el 'talento'.
    reason: lexical_alternative
  revision_rationale: Se corrige la unidad de peso para preservar con exactitud el significado de כִּכָּר y alinearse con la decisión léxica auditada del POB. También se ajusta el número a la concordancia masculina con 'talentos' y se simplifica la nota para explicar la unidad sin sustituirla por una medida moderna inexacta.
