  text: וְ/נָתַתִּ֣י אֶת הָ/אֲנָשִׁ֗ים הָ/עֹֽבְרִים֙ אֶת בְּרִתִ֔/י אֲשֶׁ֤ר לֹֽא הֵקִ֨ימוּ֙ אֶת דִּבְרֵ֣י הַ/בְּרִ֔ית אֲשֶׁ֥ר כָּרְת֖וּ לְ/פָנָ֑/י הָ/עֵ֨גֶל֙ אֲשֶׁ֣ר כָּרְת֣וּ לִ/שְׁנַ֔יִם וַ/יַּעַבְר֖וּ בֵּ֥ין בְּתָרָֽי/ו־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/034/018.yaml
  text: And I will hand over the men who transgressed my covenant[a], who did not uphold the words of the covenant that they made before me[c][b], the calf that they cut in two and passed between its pieces.
  footnotes:
  - marker: a
    text: Or 'who violated my covenant.' The Hebrew verb literally means 'passed over/transgressed,' and it intentionally echoes the later phrase 'passed between its pieces.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the words of the covenant'; that is, the covenant's stipulations or terms.
    reason: lexical_alternative
  - marker: c
    text: The ritual of cutting an animal and passing between its pieces was a covenant-making act that invoked judgment on the one who broke the covenant; compare Genesis 15:9–17.
    reason: cultural_note
