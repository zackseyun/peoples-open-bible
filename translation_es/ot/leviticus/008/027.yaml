translation:
  language: es
  text: Puso todo sobre las palmas de Aarón y sobre las palmas de sus hijos[a], y los meció como ofrenda mecida delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre las palmas de Aarón y sobre las palmas de sus hijos». El hebreo usa literalmente la preposición «sobre/upon»; en español, la idea es que las porciones fueron colocadas sobre las manos ahuecadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He put
  chosen_spanish: Puso
  alternatives_spanish:
  - Colocó
  - Puso allí
  lexicon: HALOT
  rationale: נתן en este contexto ritual describe la acción física de colocar los elementos sobre las manos; «puso» es natural en español y conserva la idea de colocación sin añadir la noción de entrega como rasgo principal.
- source_word: אֶת־הַכֹּל
  english_pob_choice: all of it
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - la totalidad
  lexicon: HALOT
  rationale: La referencia abarca las porciones reunidas en el versículo anterior. «Todo» conserva la totalidad del conjunto sin recargar la frase.
- source_word: עַל כַּפֵּי
  english_pob_choice: on the palms of
  chosen_spanish: sobre las palmas de
  alternatives_spanish:
  - en las palmas de
  - encima de las palmas de
  lexicon: HALOT
  rationale: El hebreo usa עַל, literalmente «sobre/upon», y כַּף para la palma de la mano. «Sobre las palmas de» mantiene la relación lexical más cercana y evita suavizarla a una preposición más interpretativa.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos varones
  lexicon: HALOT
  rationale: En español, «hijos» comunica de manera natural el referente masculino filial de בָנָיו. Se evita neutralizar a «hijos» como genérico; aquí el contexto levítico apunta a los descendientes varones de Aarón en el rito sacerdotal.
- source_word: וַיָּנֶף
  english_pob_choice: and he waved
  chosen_spanish: y los meció
  alternatives_spanish:
  - y los agitó
  - y los levantó
  lexicon: HALOT
  rationale: El verbo en contexto sacrificial designa la acción ritual de mecer/presentar. «Meció» comunica mejor el gesto técnico de la ofrenda mecida en español que un simple «agitó».
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda de mecimiento
  - como ofrenda mecida en presentación
  lexicon: HALOT
  rationale: תְּנוּפָה es el término técnico para la ofrenda presentada mediante mecimiento. «Ofrenda mecida» conserva la relación con el verbo וַיָּנֶף y es inteligible en español litúrgico-bíblico.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragramatón: «Yahvé». «Delante de» reproduce la fórmula cultual de presencia ritual y evita sustituir el nombre divino por una convención de ocultamiento.'
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se adopta la forma transparentada del nombre divino exigida por el proyecto. «Yahvé» conserva la referencia al Tetragrámaton sin enmascararlo con un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor ritual de תְּנוּפָה
  english_pob_reading: wave offering
  chosen_spanish_reading: ofrenda mecida
  alternative_spanish_readings:
  - ofrenda elevada
  - ofrenda presentada mediante mecimiento
  rationale: No se neutraliza el tecnicismo cultual. «Ofrenda mecida» preserva el nexo con el gesto ritual y el carácter sacrificial del término.
  doctrine_reference: Lexical consistency for sacrificial terminology
- issue: Referencia de אֹתָם
  english_pob_reading: them
  chosen_spanish_reading: los
  alternative_spanish_readings:
  - las
  - lo
  rationale: El pronombre retoma las porciones/elementos puestos sobre las manos, no a Aarón y sus hijos. En español, «los» mantiene ese antecedente plural masculino no personal o mixto según el referente inmediato.
  doctrine_reference: Pronoun antecedent clarity in ritual contexts
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «into the palms» a «on the palms» para ajustarse mejor a עַל. La redacción española sigue ese ajuste con «sobre las palmas» y conserva la terminología técnica de la ofrenda mecida. No se introdujeron variantes textuales; el acuerdo general del control cruzado fue alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrámaton en el texto principal.
  - Se conserva «ofrenda mecida» para תְּנוּפָה de manera coherente con otros pasajes sacrificiales.
  - «Sobre las palmas» refleja la preposición hebrea עַל con mayor fidelidad que una solución interpretativa como «en las manos».
