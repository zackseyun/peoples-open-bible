review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: fórmula profética, nombre divino como «Yahvé», opresión compartida de Israel y Judá, retención firme por sus captores y negativa a liberarlos. Sin embargo, la nota [b] introduce una alternativa («los mantienen cautivos») que desplaza el foco de הֶחֱזִיקוּ בָם desde ‘retener/sujetar firmemente’ hacia un sentido más general ya cubierto por el contexto. Además, la nota [a] no preserva la alternativa documentada en el rastro inglés sobre la posible resegmentación/sintaxis de la primera cláusula.'
  spanish_quality_summary: La redacción principal es clara, natural y digna para español eclesial amplio. «Así dice Yahvé de los ejércitos» y «por igual» funcionan bien. «Los que los llevaron cautivos» es más explicativo que «sus captores», pero sigue siendo fiel y legible. El ajuste necesario es menor y se concentra en las notas, no en la línea principal.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé»; צְבָאוֹת → «de los ejércitos»; בְּנֵי preservado como «hijos». No hay conflictos teológicos mayores. Conviene alinear mejor las notas españolas con las alternativas auditadas en inglés.'
  issues:
  - severity: medium
    issue: La nota [a] no conserva la alternativa auditada relevante de la cláusula inicial.
    rationale: 'El inglés preserva una alternativa significativa: «The Israelites and the people of Judah alike are oppressed» y también registra el antecedente de lectura sintáctica. La nota española actual solo ofrece «están oprimidos», que es una variante menor de aspecto/copulativo, no la alternativa interpretativa/documental importante.'
  - severity: low
    issue: La nota [b] incluye una paráfrasis menos precisa para הֶחֱזִיקוּ בָם.
    rationale: «Los mantienen cautivos» comunica el contexto general, pero no reproduce tan bien el valor de retención firme de הֶחֱזִיקוּ בָם como «los retienen con firmeza» o «los tienen sujetos con firmeza».
  revised_spanish_text: 'Así dice Yahvé de los ejércitos: los hijos de Israel y los hijos de Judá son oprimidos[a] por igual; todos los que los llevaron cautivos los retienen con firmeza[b]; se niegan a soltarlos.'
  revised_footnotes:
  - marker: a
    text: 'O: «los israelitas y el pueblo de Judá son oprimidos por igual»; otra posible presentación sintáctica: «los hijos de Israel son oprimidos, y los hijos de Judá juntamente con ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los tienen sujetos con firmeza».'
    reason: lexical_alternative
  revision_rationale: La traducción principal puede mantenerse. Se revisan las notas para reflejar mejor las alternativas significativas preservadas en el expediente inglés y para evitar en [b] una paráfrasis que diluye el matiz de retención firme del hebreo.
