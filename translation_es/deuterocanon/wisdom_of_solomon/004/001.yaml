review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego y la línea del POB inglés: contraste proverbial, «virtud», «inmortalidad», y el referente principal de los pronombres como «virtud». Sin embargo, «esterilidad» no preserva bien ἀτεκνία, porque desplaza el sentido de ‘no tener hijos’ hacia incapacidad biológica; además, la nota [b] no corresponde al texto español, ya que comenta «por los hombres» mientras el texto dice «junto a los hombres».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos problemas de calidad: 1) «la [a]esterilidad» coloca mal la nota y usa un término demasiado estrecho; 2) «tanto junto a Dios como junto a los hombres» suena poco natural en español bíblico y no armoniza con «es conocida». «ante Dios y ante los hombres» o «por Dios y por los hombres» sería más idiomático. Dado que el POB inglés justificó ‘by God and by men’, la mejor reparación en español es «por Dios y por los hombres», con nota aclarando el valor genérico de «hombres».'
  glossary_alignment: No hay conflicto con la glosa principal del proyecto. «Virtud», «inmortalidad» y «Dios» están bien. La decisión problemática es ἀτεκνία -> «esterilidad», que no sigue bien la justificación inglesa de ‘childlessness’ como más amplia que ‘barrenness’. También conviene alinear παρά + dativo con la decisión auditada ‘by God and by men’, mejor reflejada en español por «por Dios y por los hombres» en este contexto.
  issues:
  - severity: high
    issue: «Esterilidad» para ἀτεκνία
    rationale: El griego denota la condición de no tener hijos, no necesariamente infertilidad biológica. El propio POB inglés evitó ‘barrenness’ por ser demasiado estrecho. En español, «esterilidad» introduce precisamente esa restricción.
  - severity: medium
    issue: La nota [b] no coincide con la redacción principal
    rationale: El texto español dice «junto a los hombres», pero la nota afirma «El griego dice ‘por los hombres’». La nota debe corresponder exactamente a la frase anclada en el texto revisado.
  - severity: medium
    issue: «Junto a Dios ... junto a los hombres» suena forzado con «es conocida»
    rationale: Aunque intenta reflejar παρά con dativo, en español esta combinación es menos natural y menos precisa que «por Dios y por los hombres» o «ante Dios y ante los hombres». Dado el audit trail inglés, «por» encaja mejor aquí.
  - severity: low
    issue: Ubicación del marcador [a]
    rationale: '«la [a]esterilidad» es tipográficamente torpe. Debe anclarse después del término o frase relevante: «falta de hijos[a]».'
