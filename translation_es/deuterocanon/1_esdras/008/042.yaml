translation:
  language: es
  text: Y después de reunirlos al río llamado el Río[a], acampamos allí por tres días[b], y los examiné.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «al río llamado el Río». Probablemente se conserva aquí una designación toponímica, no una descripción genérica.'
    reason: lexical_alternative
  - marker: b
    text: El texto griego pasa de «acampamos» a «yo los examiné». Algunas versiones suavizan el cambio de persona, pero aquí se conserva la distinción del original.
    reason: alternative_reading
lexical_decisions:
- source_word: συναγαγών
  english_pob_choice: after gathering
  chosen_spanish: Y reuniéndolos
  alternatives_spanish:
  - Después de reunirlos
  - Habiéndolos reunido
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa a los verbos principales. En español, el gerundio mantiene la secuencia narrativa natural sin añadir interpretación innecesaria.
- source_word: ἐπὶ τὸν λεγόμενον Ποταμόν
  english_pob_choice: to the river called the River
  chosen_spanish: junto al río llamado el Río
  alternatives_spanish:
  - al río llamado el Río
  - al lugar llamado el Río
  - al río llamado Potamo
  lexicon: LSJ
  rationale: λεγόμενον requiere 'llamado'. Ποταμός se conserva con su fuerza literal como nombre propio/topónimo, por eso se mantiene 'el Río' en lugar de normalizarlo a un nombre explicativo.
- source_word: παρενεβάλομεν
  english_pob_choice: we camped
  chosen_spanish: acampamos
  alternatives_spanish:
  - acamparamos
  - hicimos campamento
  lexicon: LSJ
  rationale: El verbo significa acampar/encampar. 'Acampamos' es la forma más clara y digna en español contemporáneo.
- source_word: αὐτόθι
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: LSJ
  rationale: Adverbio locativo simple; 'allí' es el equivalente más natural y sobrio.
- source_word: ἡμέρας τρεῖς
  english_pob_choice: for three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - durante tres días
  - tres días
  lexicon: LSJ
  rationale: El acusativo de duración se expresa bien con 'por tres días', que conserva la duración sin forzar un giro más interpretativo.
- source_word: κατέμαθον αὐτούς
  english_pob_choice: I examined them
  chosen_spanish: los examiné
  alternatives_spanish:
  - los examiné cuidadosamente
  - los revisé
  - los inspeccioné
  lexicon: LSJ
  rationale: El sentido contextual es revisar/examinar al grupo reunido. 'Examiné' es formal, claro y suficientemente amplio para no reducir el matiz a una simple observación.
theological_decisions:
- issue: Cambio de persona dentro del versículo
  english_pob_reading: Retain the Greek's shift from 'we camped' to 'I examined them.'
  chosen_spanish_reading: Conservar el paso de 'acampamos' a 'los examiné'.
  alternative_spanish_readings:
  - Regularizar a 'los examinamos' para suavizar el estilo
  - Unificar toda la frase en primera persona plural
  rationale: El griego cambia de primera persona plural a singular, y la traducción debe preservar esa tensión narrativa en vez de armonizarla. Eso mantiene visible la forma del testimonio transmitido.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el último pase revisado del contexto inglés, que prefirió 'examined' sobre 'inspected' por naturalidad formal; en español se reflejó con 'los examiné'.
  spanish_consistency_notes:
  - Se mantuvo 'Río' con mayúscula para reflejar el valor de nombre propio/topónimo del griego Ποταμός.
  - Se evitó 'SEÑOR' y cualquier terminología teológica no pertinente al versículo.
  - La alternancia de primera persona plural a singular se preservó explícitamente en español.
