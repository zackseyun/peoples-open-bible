translation:
  language: es
  text: La lengua mentirosa aborrece a los que aplasta[a], y la boca lisonjera[b] produce ruina[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que hiere» o «sus aplastados». El hebreo apunta a víctimas que han sido aplastadas u oprimidas.
    reason: lexical_alternative
  - marker: b
    text: Lit. «boca lisa» o «boca suave»; es decir, habla marcada por lisonja o por una suavidad engañosa.
    reason: lexical_alternative
  - marker: c
    text: O «caída».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשׁוֹן שֶׁקֶר
  english_pob_choice: a lying tongue
  chosen_spanish: la lengua mentirosa
  alternatives_spanish:
  - una lengua falsa
  - la lengua de mentira
  lexicon: HALOT
  rationale: El hebreo literalmente dice «lengua de mentira/falsehood». «Lengua mentirosa» conserva la personificación de la lengua como agente moral y suena natural en español bíblico actual.
- source_word: יִשְׂנָא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - tiene odio contra
  lexicon: HALOT
  rationale: El yiqtol expresa una verdad proverbial; en español, «aborrece» conserva el valor presente general y el tono proverbial con más peso que un simple «odia».
- source_word: דַכָּיו
  english_pob_choice: those it crushes
  chosen_spanish: a los que aplasta
  alternatives_spanish:
  - a los oprimidos por ella
  - a los que ha herido
  - a los que aplasta y oprime
  lexicon: HALOT
  rationale: La forma apunta a víctimas aplastadas u oprimidas. «A los que aplasta» hace explícita la relación implícita con la lengua mentirosa y mantiene la violencia del verbo hebreo.
- source_word: וּפֶה חָלָק
  english_pob_choice: and a flattering mouth
  chosen_spanish: y la boca lisonjera
  alternatives_spanish:
  - y la boca suave
  - y la boca lisa
  - y una boca halagadora
  lexicon: HALOT
  rationale: La imagen literal es «boca suave/lisa», pero en español bíblico «lisonjera» comunica con precisión la idea idiomática de habla seductora o engañosamente suave.
- source_word: יַעֲשֶׂה
  english_pob_choice: causes
  chosen_spanish: produce
  alternatives_spanish:
  - causa
  - hace
  - trae
  lexicon: HALOT
  rationale: El verbo «hacer» con este objeto se traduce naturalmente como «producir» o «causar» en español. «Produce» mantiene la idea de resultado sin sonar mecánico.
- source_word: מִדְחֶה
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - derribo
  - caída
  - destrucción
  - descalabro
  lexicon: HALOT
  rationale: El sustantivo indica caída, derribo o ruina. «Ruina» encaja bien con el contexto sapiencial y conserva la fuerza del desenlace negativo.
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del expediente inglés y conserva la tensión léxica principal: la lengua mentirosa no solo engaña, sino que aplasta a víctimas concretas; la boca lisonjera no es neutral, sino productora de ruina. No se introdujeron cambios textuales respecto del sentido auditado.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - «Lengua» y «boca» mantienen el paralelismo antropomórfico del hebreo.
  - «Lisonjera» se eligió para reflejar la suavidad engañosa de חָלָק sin perder naturalidad en español.
  - La puntuación conserva el paralelismo proverbial de dos hemistiquios.
