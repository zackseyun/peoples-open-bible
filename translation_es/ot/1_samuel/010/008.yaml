translation:
  language: es
  text: Y descenderás delante de mí a Gilgal. Y he aquí, yo desciendo a ti para ofrecer holocaustos y sacrificar sacrificios de paz[a]. Esperarás siete días, hasta que yo venga a ti y te haga saber lo que habrás de hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sacrificios de comunión' u 'ofrendas de bienestar'. El término hebreo se refiere a sacrificios asociados con paz, integridad y comunión compartida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַדְתָּ
  english_pob_choice: you shall go down
  chosen_spanish: descenderás
  alternatives_spanish:
  - irás hacia abajo
  - bajarás
  lexicon: HALOT
  rationale: El hebreo usa ירד, con sentido espacial de bajar/descender. 'Descenderás' conserva la imagen y suena más natural y solemne que un calco rígido.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - antes de mí
  - en frente de mí
  lexicon: HALOT
  rationale: '''Delante de mí'' expresa bien la ubicación en avance o en presencia de quien habla, manteniendo la fuerza espacial del hebreo sin sonar forzado.'
- source_word: הַגִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  alternatives_spanish:
  - el Gilgal
  lexicon: HALOT
  rationale: Nombre propio transliterado; no se traduce como título.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ve
  lexicon: HALOT
  rationale: La fórmula bíblica de atención y solemnidad se conserva bien con 'he aquí', que comunica la deixis enfática del hebreo.
- source_word: יֹרֵד
  english_pob_choice: I am coming down
  chosen_spanish: yo desciendo
  alternatives_spanish:
  - estoy descendiendo
  - vengo bajando
  lexicon: HALOT
  rationale: El participio expresa acción inminente/intencional; en español, el presente verbal 'desciendo' comunica esa cercanía con tono natural. Se evita 'voy a bajar' por ser menos solemne.
- source_word: לְהַעֲלוֹת עֹלוֹת
  english_pob_choice: to offer burnt offerings
  chosen_spanish: ofrecer holocaustos
  alternatives_spanish:
  - presentar holocaustos
  - subir holocaustos
  lexicon: HALOT
  rationale: Para עֹלוֹת, 'holocaustos' es el término sacrificial tradicional y preciso en español bíblico; mantiene la idea de ofrenda totalmente quemada. 'Ofrecer' conserva la función verbal de להעלות.
- source_word: לִזְבֹּחַ זִבְחֵי שְׁלָמִים
  english_pob_choice: to sacrifice peace offerings
  chosen_spanish: sacrificar sacrificios de paz
  alternatives_spanish:
  - sacrificar sacrificios de comunión
  - sacrificar ofrendas de bienestar
  lexicon: HALOT
  rationale: Se mantiene la forma semítica cognada del hebreo con 'sacrificar sacrificios' para no aplanar la construcción. 'De paz' refleja la elección POB de 'peace offerings' y conserva la raíz de שְׁלָמִים; se preserva la tensión semántica con posibles matices de comunión/bienestar en nota.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - durante siete días
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sintagma numeral + sustantivo.
- source_word: תּוֹחֵל
  english_pob_choice: You shall wait
  chosen_spanish: esperarás
  alternatives_spanish:
  - aguardarás
  - has de esperar
  lexicon: HALOT
  rationale: יָחַל puede implicar esperar o aguardar/esperar con expectativa. En este contexto procedimental, 'esperarás' transmite con claridad la instrucción temporal.
- source_word: עַד בּוֹאִי אֵלֶיךָ
  english_pob_choice: until I come to you
  chosen_spanish: hasta que yo venga a ti
  alternatives_spanish:
  - hasta mi venida a ti
  lexicon: HALOT
  rationale: La cláusula infinitiva se vuelve naturalmente finita en español. 'Venga a ti' conserva la relación directa entre hablante y destinatario.
- source_word: וְהוֹדַעְתִּי לְךָ
  english_pob_choice: and make known to you
  chosen_spanish: y te haga saber
  alternatives_spanish:
  - y te dé a conocer
  - y te informaré
  lexicon: HALOT
  rationale: El hiphil de ידע tiene valor causativo ('hacer saber'). 'Te haga saber' preserva mejor esa fuerza que un simple 'decirte'.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: what you shall do
  chosen_spanish: lo que habrás de hacer
  alternatives_spanish:
  - lo que harás
  - lo que debes hacer
  lexicon: HALOT
  rationale: La forma profética/directiva se expresa bien con 'habrás de hacer', que mantiene el matiz de instrucción futura sin volverlo meramente descriptivo.
theological_decisions:
- issue: Traducción de זִבְחֵי שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - sacrificios de comunión
  - ofrendas de bienestar
  rationale: '''Paz'' conserva el término más extendido en la tradición bíblica española y refleja la lectura POB. No se borra el matiz relacional/compartido, que se preserva en nota para evitar reducir el sentido a mera ausencia de conflicto.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor de la fórmula profética/directiva final
  english_pob_reading: what you shall do
  chosen_spanish_reading: lo que habrás de hacer
  alternative_spanish_readings:
  - lo que debes hacer
  - lo que harás
  rationale: El hebreo no solo informa, sino que delimita una acción futura bajo autoridad profética. 'Habrás de hacer' conserva mejor esa combinación de mandato y expectativa que una simple futura indicativa.
  doctrine_reference: Translation philosophy §4 (discourse force and aspect)
- issue: Conservación de la imagen espacial 'go down / come down'
  english_pob_reading: you shall go down / I am coming down
  chosen_spanish_reading: descenderás / yo desciendo
  alternative_spanish_readings:
  - bajarás / estoy bajando
  - irás hacia abajo / vendré hacia ti
  rationale: Se mantiene la verticalidad del relato en ambos sujetos. Esto evita neutralizar el movimiento ritual hacia Gilgal y conserva la correspondencia verbal del hebreo.
  doctrine_reference: Translation philosophy §3 (lexical transparency with natural Spanish)
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registraron cambios necesarios y el acuerdo de revisión fue alto. La redacción española se ajusta al mismo contenido semántico del texto fuente y a la decisión léxica sobre שְׁלָמִים, preservando la tensión entre ''paz'', ''comunión'' y ''bienestar''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece el tetragrámaton.
  - Se conserva la deixis solemne con 'Y he aquí' para corresponder a וְהִנֵּה.
  - '''Holocaustos'' se emplea como término sacrificial técnico, no en su sentido moderno extrabíblico.'
  - La construcción final 'lo que habrás de hacer' mantiene tono profético sin introducir obligación moral ajena al contexto.
