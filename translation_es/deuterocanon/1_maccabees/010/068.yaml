translation:
  language: es
  text: Y el rey Alejandro oyó, y se entristeció mucho, y volvió a Antioquía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó esto
  alternatives_spanish:
  - escuchó
  - se enteró de esto
  lexicon: BDAG
  rationale: El verbo ἀκούω en esta secuencia narrativa puede expresar simplemente oír, y el contexto ya suministra el contenido implícito. En español, «oyó esto» conserva la inmediatez narrativa sin añadir información que el griego no explicita.
- source_word: Ἀλέξανδρος ὁ βασιλεύς
  english_pob_choice: King Alexander
  chosen_spanish: el rey Alejandro
  alternatives_spanish:
  - Rey Alejandro
  - Alejandro el rey
  lexicon: BDAG
  rationale: La construcción appositiva griega se vuelve en español de manera natural como «el rey Alejandro». Mantiene la relación entre título y nombre sin sonar forzada.
- source_word: ἐλυπήθη σφόδρα
  english_pob_choice: was greatly grieved
  chosen_spanish: se entristeció mucho
  alternatives_spanish:
  - se afligió grandemente
  - quedó muy triste
  lexicon: BDAG
  rationale: λυπέω en pasiva expresa ser afligido o entristecido; «se entristeció mucho» transmite bien el peso emocional de σφόδρα con un español claro y digno.
- source_word: ἀπέστρεψεν εἰς Ἀντιόχειαν
  english_pob_choice: returned to Antioch
  chosen_spanish: volvió a Antioquía
  alternatives_spanish:
  - regresó a Antioquía
  - se volvió a Antioquía
  lexicon: BDAG
  rationale: En este uso intransitivo, ἀποστρέφω indica volver o regresar. «Volvió a Antioquía» es idiomático en español y conserva el sentido de retorno al lugar previo.
translation_notes:
  revision_awareness: 'El texto griego y la auditoría inglesa coinciden estrechamente; solo se ajustó el orden y la naturalidad del español, manteniendo el contenido narrativo mínimo: oír, entristecerse y volver a Antioquía.'
  spanish_consistency_notes:
  - Se usó «rey» en minúscula por estilo normal del español bíblico moderno cuando acompaña al nombre propio.
  - «Antioquía» se conservó como topónimo tradicional en español.
  - No se añadieron notas porque el versículo no presenta una tensión lexical o textual que requiera alternativa auditable en este caso.
