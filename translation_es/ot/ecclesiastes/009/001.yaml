translation:
  language: es
  text: 'Porque he puesto todo esto en mi corazón, y para escudriñar todo esto: que los justos y los sabios, y sus obras[a], están en la mano de Dios. Sea amor u odio, el hombre no lo sabe[b]; todo está delante de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus siervos». La forma hebrea también puede leerse así, pero en este contexto muchos la entienden como «sus obras» o «sus trabajos».
    reason: alternative_reading
  - marker: b
    text: El hebreo de la cláusula final es difícil. Puede significar que una persona no sabe de antemano si le esperan amor u odio, o que las circunstancias presentes no revelan si uno es amado u odiado.
    reason: alternative_reading
lexical_decisions:
- source_word: נָתַתִּי אֶל לִבִּי
  english_pob_choice: I laid ... to my heart
  chosen_spanish: he puesto ... en mi corazón
  alternatives_spanish:
  - lo he tomado a pecho
  - lo he considerado profundamente
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala reflexión interior seria. «Poner en el corazón» conserva la metáfora bíblica de meditar y considerar con peso interior, sin sonar forzada en español.
- source_word: וְלָבוּר
  english_pob_choice: even to examine
  chosen_spanish: y para escudriñar
  alternatives_spanish:
  - y para examinar
  - y para investigar
  lexicon: HALOT
  rationale: El verbo apunta a una indagación cuidadosa. «Escudriñar» comunica bien la búsqueda reflexiva de Qohelet y mantiene un registro bíblico natural en español.
- source_word: הַצַּדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  lexicon: HALOT
  rationale: «Justos» reproduce el campo moral y relacional del hebreo sin reducirlo a una mera justicia forense o cívica.
- source_word: הַחֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los prudentes
  - los entendidos
  lexicon: HALOT
  rationale: «Sabios» es el equivalente natural en literatura sapiencial y mantiene el paralelismo con «justos».
- source_word: וַעֲבָדֵיהֶם
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus trabajos
  - sus hechos
  lexicon: HALOT
  rationale: 'Sigo la decisión auditada de entender la forma como «obras» en este contexto, no como «siervos». En español «sus obras» preserva la correspondencia léxica y la coherencia del sentido: tanto las personas justas y sabias como aquello que hacen están en la mano de Dios.'
- source_word: בְּיַד הָאֱלֹהִים
  english_pob_choice: in the hand of God
  chosen_spanish: en la mano de Dios
  alternatives_spanish:
  - bajo el poder de Dios
  - bajo el control de Dios
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de soberanía y dominio providencial, sin explicitar más de lo que el hebreo dice.
- source_word: גַּם אַהֲבָה גַם שִׂנְאָה
  english_pob_choice: Whether love or hate
  chosen_spanish: Tanto el amor como el odio
  alternatives_spanish:
  - sea amor o sea odio
  - ya sea amor o odio
  lexicon: HALOT
  rationale: La construcción hebrea introduce una alternativa o contraste no resuelto. «Tanto ... como ...» conserva ese paralelismo; en la nota se mantiene la ambigüedad contextual sobre lo que se desconoce.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: Conserva el singular genérico del hebreo y el tono proverbial del pasaje. Aquí la forma tradicional es clara y fiel; no se introduce una perífrasis que atenúe el carácter gnómico.
- source_word: הַכֹּל לִפְנֵיהֶם
  english_pob_choice: everything is before them
  chosen_spanish: todo está delante de ellos
  alternatives_spanish:
  - todo queda delante de ellos
  - todo está ante ellos
  lexicon: HALOT
  rationale: La cláusula es difícil y algo comprimida. «Delante de ellos» preserva la imagen espacial del hebreo y permite el sentido de que el conjunto de las posibilidades permanece por delante, no plenamente discernido de antemano.
theological_decisions:
- issue: Sentido de וַעֲבָדֵיהֶם
  english_pob_reading: their works
  chosen_spanish_reading: sus obras
  alternative_spanish_readings:
  - sus siervos
  rationale: El contexto inmediato habla del estado de los justos y sabios bajo la providencia divina. Traducir «obras» evita introducir una clase social nueva sin apoyo contextual y sigue la lectura auditada del POB inglés. La alternativa literal «siervos» queda implícitamente descartada por el flujo del argumento.
  doctrine_reference: Translation philosophy §3, §5
- issue: Alcance de «amor» y «odio»
  english_pob_reading: human beings do not know in advance whether love or hate awaits them
  chosen_spanish_reading: el hombre no lo sabe
  alternative_spanish_readings:
  - la persona no lo sabe
  - el ser humano no lo discierne
  rationale: 'La frase hebrea es comprimida y ambigua. La traducción mantiene la indeterminación: el ser humano no puede saber de antemano si le esperan amor u odio, o si las circunstancias presentes revelan amor u odio. La ambigüedad se preserva sin resolverla dogmáticamente.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «deeds» a «works» para acercarse más al léxico del hebreo, manteniendo el registro formal. La propuesta española sigue esa revisión con «obras» y conserva la ambigüedad textual del final mediante nota.
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים conforme al criterio del proyecto.
  - Se evita «SEÑOR» porque el texto hebreo nombra explícitamente a Dios de forma genérica.
  - Se conserva el paralelismo sapiencial con «justos», «sabios» y «obras» en un orden natural para el español.
  - «En la mano de Dios» mantiene la metáfora de soberanía sin explicación interpretativa añadida.
  - 'La puntuación refleja la estructura del hebreo y la partición del enunciado en dos movimientos: reflexión del hablante y conclusión sobre la condición humana.'
