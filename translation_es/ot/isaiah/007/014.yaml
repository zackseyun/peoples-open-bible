translation:
  language: es
  text: 'Por tanto, el Señor mismo les dará una señal: miren[a], la joven está encinta y va a dar a luz un hijo[d][b], y ella le pondrá por nombre Immanuel[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la virgen’. El hebreo usa עַלְמָה (‘joven’); la Septuaginta griega lo vierte con un término que a menudo se entiende como ‘virgen’, y Mateo 1:23 cita el versículo en esa forma.
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: ‘concebirá y dará a luz un hijo’. El hebreo, de manera más literal, describe a la mujer como ya encinta y en proceso de dar a luz.'
    reason: lexical_alternative
  - marker: c
    text: O ‘tú le pondrás por nombre’, reflejado en algunas tradiciones antiguas; Mateo 1:23 tiene ‘le llamarán por nombre’.
    reason: textual_variant
  - marker: d
    text: Immanuel significa ‘Dios con nosotros’.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conexión discursiva de consecuencia con un registro natural y digno en español, sin debilitar el valor inferencial del marcador hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor soberano
  - el Amo
  lexicon: HALOT
  rationale: Aquí el hebreo es אֲדֹנָי, no el Tetragrámaton. En español, 'el Señor' reproduce la convención reverente y la sintaxis natural, manteniendo la distinción con Yahvé cuando el texto lo requiera.
- source_word: הוּא
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - personalmente
  lexicon: HALOT
  rationale: La partícula enfática se refleja en 'mismo', que comunica que el Señor da la señal personalmente sin sobrecargar la frase.
- source_word: לָכֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: El hebreo es plural. En español, 'les' conserva el plural indirecto y evita una forma demasiado pesada; la pluralidad se mantiene en el contexto y en el verbo dativo 'les dará'.
- source_word: אוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una muestra
  - un signo
  lexicon: HALOT
  rationale: '''Señal'' es el equivalente más natural y bíblico en español para un portento confirmatorio dado por Dios.'
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: HALOT
  rationale: '''Miren'' conserva la fuerza deíctica e imperativa suave de ''he aquí''/''behold'' en un español más claro y menos arcaizante, sin perder solemnidad profética.'
- source_word: הָעַלְמָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la doncella
  - la virgen
  lexicon: HALOT
  rationale: עַלְמָה designa primariamente a una mujer joven en edad de casarse; 'la joven' preserva ese sentido sin importar la lectura cristológica posterior en el texto principal. La alternativa 'virgen' queda documentada en nota por la tradición griega y la cita de Mateo 1:23.
- source_word: הָרָה
  english_pob_choice: is pregnant
  chosen_spanish: está encinta
  alternatives_spanish:
  - está embarazada
  - está preñada
  lexicon: HALOT
  rationale: El adjetivo predicativo describe un estado actual. 'Está encinta' es el equivalente español sobrio y bíblicamente reconocible para embarazo presente.
- source_word: וְיֹלֶדֶת
  english_pob_choice: is bearing
  chosen_spanish: está dando a luz
  alternatives_spanish:
  - está por dar a luz
  - está alumbrando
  - dará a luz
  lexicon: HALOT
  rationale: La forma participial con הָרָה expresa el proceso de parto/gestación en curso o inminente. 'Está dando a luz' conserva esa progresividad; aunque en español puede sonar muy inmediato, refleja mejor el aspecto que un futuro simple interpretativo.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  - un hijo varón
  lexicon: HALOT
  rationale: '''בן'' puede traducirse como ''hijo'' o ''varón/niño'' según el contexto; aquí ''un hijo'' es natural y respeta el paralelismo con el nombre dado al niño.'
- source_word: וְקָרָאת
  english_pob_choice: she will call
  chosen_spanish: le pondrá por nombre
  alternatives_spanish:
  - lo llamará
  - le llamará
  - se llamará
  lexicon: HALOT
  rationale: Aunque el hebreo apunta a una forma femenina singular, en español 'le pondrá por nombre' evita una ambigüedad de sujeto excesiva y traduce idiomáticamente la fórmula nominal 'call his name'. Se preserva la variante textual/interpretiva en nota, pues la tradición antigua y Mateo 1:23 reflejan otra lectura.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: por nombre
  alternatives_spanish:
  - su nombre
  - nombre
  lexicon: HALOT
  rationale: La construcción española 'poner por nombre' reproduce con naturalidad el hebraísmo 'llamar el nombre de'. Evita una duplicación forzada ('su nombre') dentro de la fórmula fija.
- source_word: עִמָּנוּ אֵל
  english_pob_choice: Immanuel
  chosen_spanish: Immanuel
  alternatives_spanish:
  - Emanuel
  - Dios con nosotros
  - Dios-con-nosotros
  lexicon: HALOT
  rationale: Se translitera el nombre propio según la forma ya asentada. El sentido del nombre se reserva para la nota, preservando la forma textual principal.
theological_decisions:
- issue: Sentido de הָעַלְמָה en una profecía con recepción cristológica
  english_pob_reading: the young woman
  chosen_spanish_reading: la joven
  alternative_spanish_readings:
  - la virgen
  - la muchacha
  rationale: El hebreo עַלְמָה describe con mayor precisión a una joven en edad de casarse, no exige lexicalmente virginidad. Mantener 'la joven' en el texto principal preserva la prioridad del hebreo; la lectura 'la virgen' se conserva como alternativa por la Septuaginta y la cita de Mateo 1:23, sin borrar la tensión interpretativa.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor aspectual de הָרָה וְיֹלֶדֶת
  english_pob_reading: is pregnant and is bearing
  chosen_spanish_reading: está encinta y está dando a luz
  alternative_spanish_readings:
  - está embarazada y está pariendo
  - ha concebido y dará a luz
  rationale: La combinación hebrea describe un estado presente e inmediato, no la fórmula tradicional de 'concebirá y dará a luz'. 'Está encinta y está dando a luz' intenta respetar esa estructura sin introducir una proyección futura que el hebreo no exige.
  doctrine_reference: Translation philosophy §1
- issue: Sujeto de וְקָרָאת y relación con la tradición textual
  english_pob_reading: she will call his name
  chosen_spanish_reading: le pondrá por nombre
  alternative_spanish_readings:
  - ella le pondrá por nombre
  - tú le pondrás por nombre
  - será llamado
  rationale: La forma masorética apunta a una tercera femenina singular, pero la tradición antigua y Mateo 1:23 reflejan otra lectura. En español, una fórmula idiomática como 'le pondrá por nombre' permite conservar la claridad del acto de nombrar sin decidir de forma excesiva el sujeto en el cuerpo del versículo; la nota documenta la variante.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se ha seguido de cerca el pasaje hebreo masorético y el expediente inglés auditado. No se aplicaron revisiones posteriores; el pasaje se mantiene en alta concordancia con el estado más reciente del proyecto, preservando las tensiones documentadas entre el hebreo, la Septuaginta y Mateo 1:23.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para אֲדֹנָי y no 'Yahvé', porque el texto fuente no usa el Tetragrámaton en este versículo.
  - '''La joven'' preserva el sentido léxico de עַלְמָה sin borrar la alternativa cristológica documentada en la nota.'
  - Se evita la fórmula tradicional 'concebirá' para no imponer una futurización que el hebreo no exige.
  - El nombre propio se translitera como 'Immanuel' conforme al expediente inglés y para conservar la forma reconocible en la tradición bíblica.
  - Se usa 'les' para conservar el plural de לָכֶם en un español fluido.
