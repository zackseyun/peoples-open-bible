translation:
  language: es
  text: 'No cobrarás interés a tu hermano[a]: interés por dinero[c], interés por alimentos[b], ni interés por cualquier cosa que se preste con interés.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tu compatriota» o «tu pariente»; literalmente, «tu hermano».'
    reason: lexical_alternative
  - marker: b
    text: En versiones antiguas suele aparecer «usura», pero el hebreo se refiere más generalmente al cobro de interés sobre un préstamo.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «plata»; en contexto económico, el sentido es «dinero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשִּׁיךְ
  english_pob_choice: charge ... interest
  chosen_spanish: imponer interés
  alternatives_spanish:
  - cobrar interés
  - hacer pagar interés
  - exigir interés
  lexicon: HALOT
  rationale: El hebreo hiphil de נשׁך expresa causar o imponer interés en un préstamo. «Imponer interés» conserva la fuerza legal del mandamiento negativo y evita la ambigüedad de «prestar» sin más.
- source_word: לְאָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compatriota
  - tu correligionario
  - tu pariente
  lexicon: HALOT
  rationale: La expresión es literalmente fraternal y mantiene el marco pactual-familiar del hebreo. En español, «tu hermano» comunica mejor esa cercanía que una equivalencia explicativa más interpretativa.
- source_word: נֶשֶׁךְ
  english_pob_choice: interest
  chosen_spanish: interés
  alternatives_spanish:
  - usura
  lexicon: HALOT
  rationale: נֶשֶׁךְ designa interés sobre un préstamo. «Interés» es el término español más exacto y evita la restricción histórica de «usura», que suele implicar interés excesivo.
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: Aunque literalmente significa «plata», en contexto económico-legal se refiere al medio de pago. «Dinero» expresa con naturalidad el sentido jurídico del texto.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimentos
  - provisiones
  lexicon: HALOT
  rationale: El sustantivo denota alimento/comida en general. «Comida» es claro, natural y suficientemente amplio para la lista de bienes sujetos a préstamo.
- source_word: כָּל דָּבָר
  english_pob_choice: anything
  chosen_spanish: cosa alguna
  alternatives_spanish:
  - cualquier cosa
  - todo bien
  - cualquier objeto
  lexicon: HALOT
  rationale: La frase amplía la prohibición a cualquier clase de bien. «Cosa alguna» mantiene el alcance inclusivo con registro jurídico y evita la redundancia excesiva.
- source_word: אֲשֶׁר יִשָּׁךְ
  english_pob_choice: that is lent at interest
  chosen_spanish: que se preste con interés
  alternatives_spanish:
  - sobre la que se cobre interés
  - que lleve interés
  lexicon: HALOT
  rationale: La cláusula relativa califica la cosa prestada como objeto de interés. «Que se preste con interés» conserva la relación con el acto de prestar y la condición de interés sin añadir interpretación ajena al hebreo.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético de Deuteronomio 23:20 con el mismo alcance legal que refleja la auditoría inglesa: prohibición de cobrar interés al hermano en cualquier clase de préstamo. No se introdujeron cambios textuales ni variantes críticas; la única tensión léxica relevante es כֶּסֶף («plata»), resuelta por contexto como «dinero».'
  spanish_consistency_notes:
  - Se mantuvo la repetición de «interés» para reflejar la reiteración enfática del hebreo.
  - «Hermano» conserva el lenguaje pactual literal sin convertirlo en una glosa etnográfica.
  - La cláusula final se formuló de manera compacta para reproducir la amplitud de כָּל דָּבָר sin perder naturalidad en español.
