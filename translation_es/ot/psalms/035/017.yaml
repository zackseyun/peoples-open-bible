translation:
  language: es
  text: Señor, ¿hasta cuándo mirarás? Restaura mi alma de sus devastaciones[a], mi única vida[b] de los leones jóvenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus ruinas», «de sus estragos» o «de los que la devastan». La expresión hebrea es difícil y alude a ataques destructivos de los enemigos.
    reason: lexical_alternative
  - marker: b
    text: O «mi vida preciosa». El hebreo sugiere algo único y de gran valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Mi Señor
  - Señor Dios
  lexicon: HALOT
  rationale: אֲדֹנָי es un título de dirección a Dios. En español, «Señor» conserva la forma breve, reverente y litúrgicamente reconocible sin introducir el nombre divino donde el hebreo no lo da explícitamente.
- source_word: כַּמָּה
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿cuánto?
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: En un lamento con verbo imperfecto de ver, la pregunta expresa duración y queja por demora. «¿Hasta cuándo?» es la equivalencia natural en español para ese valor idiomático.
- source_word: תִּרְאֶה
  english_pob_choice: will you look on
  chosen_spanish: mirarás
  alternatives_spanish:
  - verás
  - observarás
  lexicon: HALOT
  rationale: El matiz no es sólo percepción visual, sino la idea de permanecer mirando sin intervenir. «Mirarás» conserva la tensión del lamento mejor que un simple «verás».
- source_word: הָשִׁיבָה
  english_pob_choice: restore
  chosen_spanish: restituye
  alternatives_spanish:
  - restaura
  - devuelve
  - haz volver
  lexicon: HALOT
  rationale: El hiphil de שוב aquí pide que Dios haga volver la vida/alma del peligro. «Restituye» suena elevado y mantiene la fuerza de retorno/recuperación sin reducirlo a una mera sanidad interior.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi yo
  lexicon: HALOT
  rationale: Aunque en muchos contextos נֶפֶשׁ puede significar «vida» o «ser», el auditorio español entiende bien «alma» en un salmo de súplica y mantiene la correspondencia más cercana con la decisión inglesa revisada.
- source_word: מִשֹּׁאֵיהֶם
  english_pob_choice: from their ravages
  chosen_spanish: de sus devastaciones
  alternatives_spanish:
  - de sus ruinas
  - de los que lo devastan
  - de sus estragos
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y apunta a actos destructivos de los enemigos. «Devastaciones» conserva el campo semántico de ruina/arrasamiento y permite una frase natural en español.
- source_word: מִכְּפִירִים
  english_pob_choice: from the young lions
  chosen_spanish: de los leoncillos
  alternatives_spanish:
  - de los cachorros de león
  - de los jóvenes leones
  lexicon: HALOT
  rationale: כְּפִירִים son leones jóvenes; «leoncillos» mantiene la imagen concreta y suena más poético en español que una construcción más explicativa.
- source_word: יְחִידָתִי
  english_pob_choice: my only one
  chosen_spanish: mi única
  alternatives_spanish:
  - mi única vida
  - mi vida preciosa
  - mi único ser
  lexicon: HALOT
  rationale: El hebreo expresa singularidad y valor precioso. «Mi única» conserva la concisión del original; el sentido de «mi vida preciosa» queda implícito sin borrar la tensión poética.
theological_decisions:
- issue: Cómo expresar נַפְשִׁי en una oración de rescate
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - mi ser
  rationale: Aunque el hebreo puede referirse a vida o self, la tradición de traducción española entiende bien «alma» en el registro orante del salmo. Se mantiene así la referencia personal sin convertirla en una explicación antropológica más amplia de la necesaria.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo preservar la tensión de יְחִידָתִי
  english_pob_reading: my only one
  chosen_spanish_reading: mi única
  alternative_spanish_readings:
  - mi única vida
  - mi vida preciosa
  rationale: La frase es deliberadamente compacta y poética. Mantener «mi única» deja abierta la tensión entre unicidad, preciosidad y vida amenazada, en lugar de resolverla demasiado pronto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa reciente pasó de 'my life' a 'my soul' para acercarse más a נַפְשִׁי. En español se siguió esa actualización con «mi alma», pero se conservó la tensión poética de יְחִידָתִי mediante «mi única» en vez de explicitarla del todo.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para אֲדֹנָי, coherente con el tratamiento reverente del título divino en español.
  - Se eligió un registro formal y orante, adecuado para un salmo de lamentación.
  - «Devastaciones» conserva el carácter oscuro de מִשֹּׁאֵיהֶם sin convertir la frase en una paráfrasis interpretativa.
  - La construcción «mi única» es intencionalmente compacta para reflejar la brevedad del hebreo y su ambigüedad poética.
