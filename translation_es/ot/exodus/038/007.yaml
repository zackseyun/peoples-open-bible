translation:
  language: es
  text: Puso las varas en los anillos, en los lados del altar[a], para cargarlo con ellas. Lo hizo hueco[b], con tablas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «trajo las varas a los anillos». El verbo hebreo puede traducirse más literalmente como «trajo», pero aquí, en contexto, se refiere a colocarlas en posición.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «hueco, tablas». La frase probablemente indica que el altar fue hecho como una estructura hueca de tablas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: He put
  chosen_spanish: puso
  alternatives_spanish:
  - metió
  - introdujo
  - llevó
  lexicon: HALOT
  rationale: El hifil de בוא aquí expresa la colocación de las varas en posición, no solo el acercamiento. «Puso» comunica esa acción de manera natural en español y sigue la decisión inglesa de evitar una traducción meramente literal por «brought».
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: las varas
  alternatives_spanish:
  - los postes
  - los bastones
  - las pértigas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, בַּדִּים son las piezas para transportar objetos sagrados. «Varas» es claro, bíblicamente reconocible y menos arcaico que «bastones» o «astiles».
- source_word: בַּטַּבָּעֹת
  english_pob_choice: into the rings
  chosen_spanish: en los anillos
  alternatives_spanish:
  - dentro de los anillos
  - en las argollas
  lexicon: HALOT
  rationale: El texto indica la ubicación de inserción. En español, «en los anillos» es natural; el matiz de movimiento ya queda sugerido por «puso».
- source_word: עַל צַלְעֹת הַמִּזְבֵּחַ
  english_pob_choice: on the sides of the altar
  chosen_spanish: sobre los lados del altar
  alternatives_spanish:
  - en los lados del altar
  - junto a los lados del altar
  lexicon: HALOT
  rationale: צַלְעֹת significa «lados» o «costados». «Sobre los lados» conserva el valor espacial del hebreo sin forzar una expresión demasiado técnica.
- source_word: לָשֵׂאת אֹתוֹ בָּהֶם
  english_pob_choice: to carry it with them
  chosen_spanish: para cargarlo con ellas
  alternatives_spanish:
  - para llevarlo con ellas
  - para transportarlo con ellas
  lexicon: HALOT
  rationale: El propósito es portar el altar mediante esas varas. «Cargarlo» mantiene la función de נשׂא, y «con ellas» se refiere claramente a las varas, concordando con el femenino plural español.
- source_word: נְבוּב
  english_pob_choice: hollow
  chosen_spanish: hueco
  alternatives_spanish:
  - vacío por dentro
  - ahuecado
  lexicon: HALOT
  rationale: Describe la estructura interna del altar. «Hueco» es una equivalencia directa, breve y comprensible en español contemporáneo.
- source_word: לֻחֹת
  english_pob_choice: with boards
  chosen_spanish: con tablas
  alternatives_spanish:
  - de tablas
  - hecho de tablas
  lexicon: HALOT
  rationale: La frase elíptica sugiere una estructura hecha de tablas. «Con tablas» conserva la formulación sucinta del inglés y deja abierta la misma ambigüedad constructiva documentada por la POB.
- source_word: עָשָׂה אֹתוֹ
  english_pob_choice: He made it
  chosen_spanish: Lo hizo
  alternatives_spanish:
  - Lo fabricó
  - Lo construyó
  lexicon: HALOT
  rationale: La repetición de עשה se traduce de forma sencilla para mantener la estructura del hebreo. «Lo hizo» es fiel y no sobreinterpreta el tipo exacto de fabricación.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo los marcadores [a] y [b] directamente en el texto español en los lugares correspondientes, manteniendo la misma decisión léxica y la misma nota de alternativa para cada una.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento consistente de las piezas del tabernáculo con vocabulario claro y no arcaizante.
  - Se evitó traducir mecánicamente «brought» por «trajo» en el cuerpo principal, siguiendo la decisión auditada de priorizar la colocación efectiva de las varas.
  - «Con ellas» concuerda naturalmente con «las varas» en español y conserva la referencia instrumental del hebreo.
  - Se preservó la ambigüedad documental de נְבוּב לֻחֹת mediante una nota, sin expandir el texto principal más allá de lo necesario.
