translation:
  language: es
  text: 'También dijo a los hombres[a] de Penuel[b]: «Cuando yo vuelva en paz[c], derribaré esta torre[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los hombres de Penuel» probablemente designa a los dirigentes o representantes de la ciudad, no necesariamente a todos sus habitantes.
    reason: cultural_note
  - marker: b
    text: Penuel también puede transliterarse «Peniel».
    reason: lexical_alternative
  - marker: c
    text: O «con seguridad», «sin salir herido» o «con éxito»; el hebreo dice literalmente «en paz».
    reason: lexical_alternative
  - marker: d
    text: «Torre» puede referirse a una torre defensiva o a una fortificación dentro de Penuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: La partícula añade una acción más a la advertencia previa de Gedeón; «También» conserva esa relación aditiva de forma natural en español.
- source_word: לְאַנְשֵׁי פְנוּאֵל
  english_pob_choice: to the men of Penuel
  chosen_spanish: a los hombres de Penuel
  alternatives_spanish:
  - al pueblo de Penuel
  - a los varones de Penuel
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente «hombres de». Mantener «hombres» preserva la precisión lexical y el posible matiz de representantes o dirigentes civiles.
- source_word: בְּשׁוּבִי
  english_pob_choice: when I return
  chosen_spanish: cuando yo vuelva
  alternatives_spanish:
  - cuando regrese
  - al volver yo
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa una referencia temporal; «cuando yo vuelva» es idiomático y reproduce la relación temporal sin perder la primera persona.
- source_word: בְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - seguro
  - sin daño
  lexicon: HALOT
  rationale: La elección mantiene la frase hebrea de manera transparente. En contexto puede implicar regreso seguro y sin daño, pero «en paz» conserva el vínculo léxico con שָׁלוֹם.
- source_word: אֶתֹּץ
  english_pob_choice: I will tear down
  chosen_spanish: derribaré
  alternatives_spanish:
  - destruiré
  - demoleré
  lexicon: HALOT
  rationale: נתץ se usa para echar abajo una estructura. «Derribaré» comunica bien la acción de tumbar una construcción y es más natural que una traducción demasiado literal.
- source_word: הַמִּגְדָּל הַזֶּה
  english_pob_choice: this tower
  chosen_spanish: esta torre
  alternatives_spanish:
  - esta fortaleza
  - este baluarte
  lexicon: HALOT
  rationale: מִגְדָּל normalmente significa «torre». Aunque puede tener función defensiva, «torre» debe permanecer en el texto principal para no sobreinterpretar.
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente coinciden sin cambios sustanciales; se conserva la lectura óptimo-equivalente y las mismas decisiones de fondo, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene «Penuel» como topónimo transliterado, sin adaptar el nombre.
  - Se conserva la distinción entre la advertencia a un grupo concreto y una formulación general para la ciudad.
  - «En paz» se deja explícito en el texto, y la nota aclara su posible matiz de seguridad/éxito.
  - El tono es sobrio y publicable, sin arcaísmos innecesarios.
