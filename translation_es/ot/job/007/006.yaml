translation:
  language: es
  text: Mis días son más veloces que la lanzadera del tejedor[a]; llegan a su fin sin esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Lanzadera" traduce aquí el instrumento de tejido con valor imagístico de movimiento rápido; otras posibilidades serían "herramienta del tejedor" o "telar", pero estas son menos precisas para el contraste poético del versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  english_pob_choice: My days
  chosen_spanish: Mis días
  alternatives_spanish:
  - Mi vida
  - Mi tiempo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo concreto 'días' con sufijo de primera persona, y en el contexto Job expresa la rapidez con que se le van los días de su vida. Mantener 'Mis días' conserva la imagen concreta sin abstraerla indebidamente.
- source_word: קַלּוּ
  english_pob_choice: are swifter
  chosen_spanish: son más veloces
  alternatives_spanish:
  - son más rápidos
  - pasan más deprisa
  lexicon: HALOT
  rationale: El verbo comunica ligereza/rapidez en forma comparativa. 'Son más veloces' preserva la comparación de manera natural en español y evita introducir una paráfrasis demasiado libre.
- source_word: מִנִּי אָרֶג
  english_pob_choice: than a weaver’s shuttle
  chosen_spanish: que la lanzadera del tejedor
  alternatives_spanish:
  - que la herramienta del tejedor
  - que el telar del tejedor
  lexicon: HALOT
  rationale: El inglés POB decide por 'shuttle' por la imagen de movimiento rápido. En español, 'lanzadera' transmite mejor ese objeto móvil del tejido que 'telar' o una generalización como 'herramienta', y mantiene el sentido imagístico del hebreo.
- source_word: וַיִּכְלוּ
  english_pob_choice: they come to an end
  chosen_spanish: se consumen
  alternatives_spanish:
  - llegan a su fin
  - se terminan
  lexicon: HALOT
  rationale: כלה expresa llegar al fin, consumirse. 'Se consumen' conserva la idea de agotamiento progresivo y encaja con el paralelismo poético del versículo.
- source_word: בְּאֶפֶס תִּקְוָה
  english_pob_choice: without hope
  chosen_spanish: sin esperanza
  alternatives_spanish:
  - sin expectativa
  - en desesperanza
  lexicon: HALOT
  rationale: La expresión preposicional indica ausencia de esperanza. 'Sin esperanza' es la forma más directa y fiel en español, sin añadir matices ajenos al hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'pass more swiftly' a 'are swifter' para reflejar más directamente la comparación hebrea; la traducción española sigue esa comparación explícita con 'son más veloces' y conserva el final de resultado 'se consumen sin esperanza'.
  spanish_consistency_notes:
  - Se mantiene el plural concreto 'días' en vez de abstraer a 'vida' para respetar el sustantivo hebreo y el énfasis experiencial de Job.
  - '''Esperanza'' traduce תִּקְוָה de manera estándar y clara; no se requiere una glosa teológica adicional en este versículo.'
  - El paralelismo se ha conservado en dos miembros poéticos breves, con una cadencia natural en español.
