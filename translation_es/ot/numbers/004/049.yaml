translation:
  language: es
  text: Por mandato de Yahvé fueron designados por mano de Moisés[a], cada hombre para su servicio y para su carga; así fueron registrados[c][b], como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de Moisés». La expresión hebrea «por mano de Moisés» es un modismo de mediación o agencia.
    reason: lexical_alternative
  - marker: b
    text: O «por mano de Moisés», si se entiende la frase final «fueron registrados ... por mano de Moisés» con el mismo alcance instrumental en toda la oración.
    reason: lexical_alternative
  - marker: c
    text: O «fueron pasados revista», «fueron designados» o «fueron contados». El término hebreo puede abarcar registro oficial, designación, supervisión o revista administrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי יְהוָה
  english_pob_choice: At the command of Yahweh
  chosen_spanish: A la orden de Yahvé
  alternatives_spanish:
  - Por mandato de Yahvé
  - Según la orden de Yahvé
  - Por la boca de Yahvé
  lexicon: HALOT
  rationale: El hebreo es un modismo literal (“sobre la boca de”) que, en contexto, expresa orden o mandato. En español, “a la orden de” comunica bien la idea sin perder el carácter de dependencia directa de la palabra divina.
- source_word: פָּקַד
  english_pob_choice: they were appointed
  chosen_spanish: fueron designados
  alternatives_spanish:
  - fueron alistados
  - fueron contados
  - fueron encomendados
  lexicon: HALOT
  rationale: En este pasaje פקד se mueve entre las ideas de contar, asignar y pasar revista. Dado el contexto inmediato de la organización levítica, “designados” conserva la fuerza administrativa/funcional sin reducirlo solo a un censo.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - bajo la mano de Moisés
  - por la mano de Moisés
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de mediación o agencia. “Por mano de Moisés” preserva la imagen semítica, y “por” evita un calco demasiado duro en español.
- source_word: אִישׁ אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - hombre por hombre
  - cada varón
  lexicon: HALOT
  rationale: La duplicación intensiva es distributiva. “Cada hombre” mantiene el singular distributivo y refleja el matiz masculino explícito del hebreo.
- source_word: עַל עֲבֹדָתוֹ
  english_pob_choice: to his service
  chosen_spanish: para su servicio
  alternatives_spanish:
  - según su servicio
  - para su labor
  - a su servicio
  lexicon: HALOT
  rationale: עֲבֹדָה aquí se refiere al trabajo asignado, en contexto cultual. “Para su servicio” comunica finalidad y asignación, sin sobrecargar con tecnicismos.
- source_word: וְעַל מַשָּׂאוֹ
  english_pob_choice: and to his burden
  chosen_spanish: y para su carga
  alternatives_spanish:
  - y para lo que había de llevar
  - y para su peso
  - y para su acarreo
  lexicon: HALOT
  rationale: מַשָּׂא alude a la carga transportada. “Carga” es natural en español y conserva la concreción del objeto que cada levita debía llevar.
- source_word: וּפְקֻדָיו
  english_pob_choice: thus they were mustered
  chosen_spanish: así fueron alistados
  alternatives_spanish:
  - así fueron pasados revista
  - así fueron registrados
  - así fue hecha su designación
  lexicon: HALOT
  rationale: La forma es difícil y deriva de פקד. En este contexto, el sentido global apunta a una puesta en orden/registro oficial; “alistados” recoge la idea de incorporación organizada y mantiene la relación con el ámbito militar-administrativo del verbo.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: as Yahweh had commanded Moses
  chosen_spanish: como Yahvé había mandado a Moisés
  alternatives_spanish:
  - tal como Yahvé había mandado a Moisés
  - según había mandado Yahvé a Moisés
  - como Yahvé le había ordenado a Moisés
  lexicon: HALOT
  rationale: La cláusula final confirma conformidad con el mandato divino. “Había mandado” es fiel y natural; se conserva el destinatario con la preposición “a” por claridad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como “Yahvé”, no ocultarlo con una sustitución litúrgica.'
theological_decisions:
- issue: El valor de פקד en el marco levítico
  english_pob_reading: appointed / mustered
  chosen_spanish_reading: designados / alistados
  alternative_spanish_readings:
  - contados
  - nombrados
  - registrados
  rationale: La POB inglesa dejó abierta la tensión entre nombramiento y revista militar/administrativa. En español, “designados” y “alistados” preservan esa ambigüedad funcional sin reducir el verbo a un simple conteo.
  doctrine_reference: Números 4:49; uso contextual de פקד en organización del servicio levítico
- issue: Forma de expresar el nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto, conforme al marco doctrinal del proyecto. Esto evita la sustitución por un título y conserva la transparencia textual.
  doctrine_reference: DOCTRINE.md — Tetragrámaton YHWH
- issue: Cierre de conformidad con el mandato
  english_pob_reading: as Yahweh had commanded Moses
  chosen_spanish_reading: como Yahvé había mandado a Moisés
  alternative_spanish_readings:
  - tal como Yahvé había mandado a Moisés
  - según Yahvé había mandado a Moisés
  rationale: 'La frase final funciona como clausula de validación: lo narrado se ajusta al mandato recibido por Moisés. “Como” conserva la relación de conformidad sin añadir matices interpretativos.'
  doctrine_reference: Énfasis narrativo de obediencia en el Pentateuco
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail: se evita traducir פקד solo como “contar” y se prefiere una solución que refleje su uso administrativo/organizativo en el contexto levítico. También se conserva la clausula final como validación de obediencia, y el nombre divino se renderiza como Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” conforme al estándar del proyecto para יְהוָה.
  - Se evitó “SEÑOR” como sustituto litúrgico.
  - Se eligieron verbos y sustantivos de registro administrativo para respetar el campo semántico de פקד en este contexto.
  - Se usó puntuación española moderna y un tono bíblico digno, sin arcaísmo innecesario.
