translation:
  language: es
  text: Espera en Yahvé[a]; sé fuerte, y que tu corazón cobre ánimo; sí[c][b], espera en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y él fortalecerá tu corazón». El verbo hebreo también puede leerse con fuerza predictiva, no solo exhortativa.'
    reason: alternative_reading
  - marker: b
    text: «Espera en» también puede expresarse como «pon tu esperanza en», destacando la confianza expectante además de la espera paciente.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y que tu corazón sea valiente / cobre valor».'
    reason: alternative_reading
lexical_decisions:
- source_word: קַוֵּה
  english_pob_choice: Wait for
  chosen_spanish: Espera en
  alternatives_spanish:
  - Espera por
  - Pon tu esperanza en
  - Confía en
  lexicon: HALOT
  rationale: El piel imperativo de קוה expresa espera confiada y expectante. En español, «espera en» comunica bien tanto la espera como la orientación de confianza hacia Yahvé sin volverlo demasiado abstracto.
- source_word: אֶל
  english_pob_choice: for
  chosen_spanish: en
  alternatives_spanish:
  - hacia
  - por
  lexicon: HALOT
  rationale: Con קוה, la preposición marca al destinatario de la espera. En español bíblico-natural, «esperar en» es la forma más clara y fiel para esa orientación relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración reverente y directa. «Yahvé» es la forma establecida en este proyecto para evitar la sustitución por un título y mantener visible el nombre pactal.
- source_word: חֲזַק
  english_pob_choice: be strong
  chosen_spanish: es fuerte
  alternatives_spanish:
  - sé fuerte
  - mantente firme
  lexicon: HALOT
  rationale: El imperativo exhorta a fortaleza. «Es fuerte» mantiene el tono directo del mandato, aunque «sé fuerte» también sería posible; se privilegia la fluidez bíblica en español sin perder la fuerza exhortativa.
- source_word: וְיַאֲמֵץ
  english_pob_choice: and let your heart take courage
  chosen_spanish: que tu corazón cobre ánimo
  alternatives_spanish:
  - y que tu corazón tome valor
  - y que tu corazón se fortalezca
  lexicon: HALOT
  rationale: La forma verbal admite lectura exhortativa en cadena con los imperativos. «Que tu corazón cobre ánimo» conserva el sujeto explícito («tu corazón») y refleja bien el valor de «tomar/cobrar ánimo» en español.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  lexicon: HALOT
  rationale: «Corazón» conserva el centro interior de voluntad, valor y resolución presente en hebreo. No se sustituye por «mente» porque eso reduciría el campo semántico del término.
- source_word: וְקַוֵּה
  english_pob_choice: yes, wait for
  chosen_spanish: sí, espera en
  alternatives_spanish:
  - y espera en
  - ciertamente, espera en
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del mandato final. «Sí» refleja bien el valor reforzador del enlace poético y preserva el paralelismo culminante del verso.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se traduce como «Yahvé» para preservar el nombre propio divino y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of וְיַאֲמֵץ in context
  english_pob_reading: jussive/exhortational sense within a chain of imperatives
  chosen_spanish_reading: 'exhortación continua: «que tu corazón cobre ánimo»'
  alternative_spanish_readings:
  - 'sentido predictivo: «y tu corazón cobrará ánimo»'
  - «y él fortalecerá tu corazón»
  rationale: La cadena del verso es exhortativa; por eso se mantiene como mandato implícito. Aun así, el hebreo permite una lectura predictiva, y esa tensión se conserva en la documentación en vez de resolverla de forma absoluta.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que prefería una formulación más natural para la exhortación final. En español, se adoptó una equivalencia idiomática fluida («cobre ánimo») sin perder el paralelismo ni la tensión sintáctica del hebreo entre exhortación y posible lectura predictiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se conserva «corazón» como centro interior, no como simple emoción.
  - Se mantiene la repetición enfática del verbo «espera» al inicio y al final del verso.
  - La puntuación reproduce la cadencia poética con dos miembros exhortativos y una clausula final reforzada.
