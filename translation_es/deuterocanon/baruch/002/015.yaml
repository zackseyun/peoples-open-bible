translation:
  language: es
  text: para que toda la tierra sepa que tú, Yahvé, eres nuestro Dios, porque tu nombre ha sido llamado sobre Israel y sobre su linaje[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu nombre ha sido invocado sobre Israel», o más interpretativamente, «Israel es llamado por tu nombre». Este modismo expresa pertenencia e identificación con Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα γνῷ
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... conozca
  alternatives_spanish:
  - para que ... llegue a conocer
  - a fin de que ... conozca
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito; en español, «para que» comunica con naturalidad ese valor final sin perder el matiz de finalidad/resulto.
- source_word: πᾶσα ἡ γῆ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el mundo
  lexicon: BDAG
  rationale: «γῆ» puede ser «tierra» o «país/territorio»; aquí el contexto de reconocimiento universal favorece «toda la tierra», que mantiene amplitud sin sonar forzado.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: BDAG
  rationale: Aunque el griego dice Κύριος, este texto refleja la referencia al nombre divino; conforme al criterio del proyecto, se explicita «Yahvé» en lugar de ocultarlo tras «Señor».
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - el Dios de nosotros
  lexicon: BDAG
  rationale: La posesión covenantal se expresa de forma natural y precisa con «nuestro Dios».
- source_word: τὸ ὄνομά σου ἐπεκλήθη ἐπὶ
  english_pob_choice: your name has been called upon
  chosen_spanish: tu nombre ha sido llamado sobre
  alternatives_spanish:
  - tu nombre ha sido invocado sobre
  - Israel lleva tu nombre
  lexicon: BDAG
  rationale: Se conserva el giro idiomático del griego, que indica pertenencia e identificación. «Ha sido llamado sobre» mantiene la forma verbal sin resolver interpretativamente la frase.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: BDAG
  rationale: Nombre propio estándar.
- source_word: τὸ γένος αὐτοῦ
  english_pob_choice: his offspring
  chosen_spanish: su linaje
  alternatives_spanish:
  - su descendencia
  - su estirpe
  lexicon: BDAG
  rationale: «γένος» aquí expresa línea de descendencia. «Linaje» es breve, digno y suficientemente cercano al valor genealógico del término; se evita suavizarlo en exceso.
theological_decisions:
- issue: Nombre divino en un texto griego que usa Κύριος
  english_pob_reading: Per doctrine, κύριος defaults to 'Lord.' The Greek text has Κύριος, not the Hebrew divine name directly.
  chosen_spanish_reading: Se traduce explícitamente como «Yahvé» para no ocultar el nombre divino detrás de una sustitución reverencial.
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El proyecto prioriza la transparencia respecto del tetragrámaton y su referencia cuando el trasfondo textual lo exige. Aquí la lectura teológica del contexto es de identificación con el Dios de Israel, por lo que «Yahvé» es el equivalente funcional del criterio editorial dado.
  doctrine_reference: 'DOCTRINE.md: Transparencia del nombre divino; preservar la tensión documental y no masking convention.'
- issue: Idiomática de pertenencia por el nombre divino
  english_pob_reading: The Greek idiom expresses belonging to and identification with God.
  chosen_spanish_reading: «Tu nombre ha sido llamado sobre» conserva el idiomismo de pertenencia e identificación.
  alternative_spanish_readings:
  - Israel lleva tu nombre
  - Israel es llamado por tu nombre
  rationale: No se resuelve la imagen demasiado pronto en el texto principal; se preserva la tensión semítica para que la nota pueda explicarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete 1909 y la decisión inglesa de conservar el giro idiomático, pero ajusta el tratamiento del nombre divino al criterio español del proyecto («Yahvé»). No hay cambios de revisión adicionales respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «tierra» para γῆ en un sentido universal.
  - Se evita introducir «Cristo» o vocabulario eclesiástico no presente en el original.
  - La nota a pie de página marca la alternativa interpretativa sin sustituir la traducción principal.
