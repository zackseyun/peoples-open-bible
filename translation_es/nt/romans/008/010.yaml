translation:
  language: es
  text: Pero si el Mesías está en ustedes[a], el cuerpo está muerto[b] por causa del pecado, pero el espíritu es vida por causa de la justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el Espíritu es vida’. El término griego puede leerse como referencia al espíritu humano vivificado por Dios o al Espíritu Santo.
    reason: alternative_reading
  - marker: b
    text: O ‘está sujeto a muerte’ o ‘es mortal’.
    reason: lexical_alternative
  - marker: c
    text: O ‘por causa de la rectitud’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como ‘Mesías’, en línea con la decisión del POB en inglés; en español ‘Mesías’ mantiene mejor el matiz de título que ‘Cristo’ cuando no funciona todavía como nombre fijo.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - carne
  lexicon: BDAG
  rationale: σῶμα designa el cuerpo concreto, no σάρξ. ‘Cuerpo’ preserva el contraste con πνεῦμα sin introducir el campo semántico de ‘carne’.
- source_word: νεκρὸν
  english_pob_choice: dead
  chosen_spanish: está muerto
  alternatives_spanish:
  - es mortal
  - está sujeto a la muerte
  lexicon: BDAG
  rationale: ‘Muerto’ refleja de manera directa el adjetivo νεκρόν. Se deja abierta la posibilidad interpretativa de mortalidad o sujeción a la muerte en la nota.
- source_word: διὰ ἁμαρτίαν
  english_pob_choice: because of sin
  chosen_spanish: por causa del pecado
  alternatives_spanish:
  - a causa del pecado
  - por el pecado
  lexicon: BDAG
  rationale: διά con acusativo expresa causalidad; ‘por causa de’ es natural en español y preserva la relación causal de Pablo.
- source_word: πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el Espíritu
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad del griego con minúscula, porque el contexto permite tanto el espíritu humano vivificado por Dios como una referencia al Espíritu Santo. La mayúscula resolvería prematuramente la tensión textual.
- source_word: ζωὴ
  english_pob_choice: is life
  chosen_spanish: es vida
  alternatives_spanish:
  - vive
  - da vida
  lexicon: BDAG
  rationale: ζωή es sustantivo, no adjetivo; ‘es vida’ conserva la formulación nominal comprimida del griego.
- source_word: διὰ δικαιοσύνην
  english_pob_choice: because of righteousness
  chosen_spanish: por causa de la justicia
  alternatives_spanish:
  - por causa de la rectitud
  - a causa de la justicia
  lexicon: BDAG
  rationale: Se traduce δικαιοσύνη con ‘justicia’, que es la equivalencia más directa y usual; se respeta la fuerza causal de διά con ‘por causa de’.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: the spirit
  chosen_spanish_reading: el espíritu
  alternative_spanish_readings:
  - el Espíritu
  rationale: 'Se conserva la tensión interpretativa: Pablo puede hablar del espíritu humano vivificado por Dios, sin excluir la referencia al Espíritu Santo en el trasfondo. La minúscula evita cerrar el sentido.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Fuerza de νεκρόν con σῶμα
  english_pob_reading: the body is dead
  chosen_spanish_reading: el cuerpo está muerto
  alternative_spanish_readings:
  - el cuerpo es mortal
  - el cuerpo está sujeto a muerte
  rationale: La lectura principal sigue de cerca el adjetivo griego ‘muerto’. Las alternativas se mantienen como matiz interpretativo, no como sustitución del texto base.
  doctrine_reference: Primacía del original sobre una suavización doctrinal o tradicional.
translation_notes:
  revision_awareness: El último repaso no introdujo cambios y el informe de revisión indicó acuerdo alto; por ello esta versión sigue de cerca el texto griego y la traza auditada inglesa, sin revisar decisiones ya asentadas.
  spanish_consistency_notes:
  - Se usa ‘Mesías’ como título, no ‘Cristo’, para conservar la política léxica del proyecto.
  - Se mantiene ‘cuerpo’ frente a ‘carne’ para σῶμα y ‘espíritu’ en minúscula para πνεῦμα, preservando la ambigüedad contextual.
  - ‘Justicia’ se conserva como opción principal para δικαιοσύνη; ‘rectitud’ queda solo como alternativa anotada.
  - Las notas se anclan en el texto con marcas únicas y en orden.
