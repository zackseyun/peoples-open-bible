translation:
  language: es
  text: Porque han contristado el corazón del justo con falsedad[a], aunque yo no lo había contristado, y han fortalecido las manos del impío, para que no se vuelva de su mal camino, para preservar su vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con mentiras’. El sustantivo hebreo puede entenderse de forma abstracta como ‘falsedad’ o de manera más concreta como ‘mentiras’.
    reason: lexical_alternative
  - marker: b
    text: O ‘para que viva’ / ‘y viva’. El hebreo también puede leerse de forma más literal así.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del juicio con una conjunción natural en español, manteniendo el valor explicativo del hebreo sin volverlo rígido.
- source_word: הַכְאֹות לֵב
  english_pob_choice: grieved the heart
  chosen_spanish: han contristado el corazón
  alternatives_spanish:
  - han apenado el corazón
  - han causado dolor al corazón
  lexicon: HALOT
  rationale: El hebreo expresa causar dolor o aflicción al corazón; 'contristar' conserva el efecto emocional y suena natural en español bíblico moderno.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: HALOT
  rationale: '''Justo'' reproduce el sustantivo/adjetivo substantivado con claridad en español y mantiene la categoría ética del hebreo.'
- source_word: שֶׁקֶר
  english_pob_choice: with falsehood
  chosen_spanish: con falsedad
  alternatives_spanish:
  - con mentira
  - con engaño
  lexicon: HALOT
  rationale: La forma nominal hebrea puede entenderse como 'falsedad' o, más concretamente, 'mentira'; 'falsedad' preserva el abstracto y la amplitud del término.
- source_word: וַאֲנִי לֹא הִכְאַבְתִּיו
  english_pob_choice: though I had not grieved him
  chosen_spanish: aunque yo no lo había contristado
  alternatives_spanish:
  - aunque yo no le había causado dolor
  - aunque yo no lo había afligido
  lexicon: HALOT
  rationale: La contraposición con la obra humana injusta se mantiene; 'contristar' enlaza con el verbo anterior y evita una traducción excesivamente explicativa.
- source_word: וּלְחַזֵּק יְדֵי רָשָׁע
  english_pob_choice: and have strengthened the hands of the wicked
  chosen_spanish: y han fortalecido las manos del impío
  alternatives_spanish:
  - y han animado al impío
  - y han encorajinado al malvado
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de 'fortalecer las manos', que en español comunica bien el sentido de animar o dar valor.
- source_word: לְבִלְתִּי שׁוּב מִדַּרְכּוֹ הָרָע
  english_pob_choice: so that he does not turn from his evil way
  chosen_spanish: para que no se vuelva de su mal camino
  alternatives_spanish:
  - para no volverse de su mal camino
  - de modo que no abandone su mal camino
  lexicon: HALOT
  rationale: '''Volverse'' expresa el giro moral de שוב; ''mal camino'' conserva la metáfora profética habitual sin añadir interpretaciones ajenas al texto.'
- source_word: לְהַחֲיֹתוֹ
  english_pob_choice: to preserve his life
  chosen_spanish: para preservarle la vida
  alternatives_spanish:
  - para que viva
  - para salvarle la vida
  lexicon: HALOT
  rationale: La forma infinitiva final puede expresar propósito o resultado orientado a la vida; 'preservarle la vida' mantiene esa amplitud sin decidir entre vida temporal o definitiva.
theological_decisions:
- issue: Alcance de לְהַחֲיֹתוֹ (vida temporal o vida en sentido más amplio)
  english_pob_reading: to preserve his life
  chosen_spanish_reading: para preservarle la vida
  alternative_spanish_readings:
  - para que viva
  - para salvarle la vida
  rationale: 'Se conserva la tensión del hebreo y de la lectura POB: el texto apunta a la vida como resultado del apartarse del mal, sin especificar más de lo que el pasaje exige. No se estrecha a una lectura exclusivamente temporal ni se impone una lectura técnica de salvación.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió ''grieved'' sobre ''disheartened'', se eliminó la segunda ocurrencia de ''because'' y se mantuvo el valor idiomático de ''strengthened the hands''. En español se reflejó esa misma progresión, evitando duplicar la conjunción causal y usando un verbo emocional consistente en ambos miembros paralelos.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando no aparece en este versículo; aquí el texto no incluye el nombre divino explícito.
  - '''Justo'' e ''impío'' conservan el contraste ético del hebreo sin sustituirlo por términos eclesiásticos.'
  - Se preservó la metáfora de 'fortalecer las manos' en vez de reemplazarla por una paráfrasis completamente explicativa.
  - '''Mal camino'' traduce la metáfora de דרך en sentido moral, coherente con el lenguaje profético habitual.'
