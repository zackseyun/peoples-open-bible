translation:
  language: es
  text: Y ya algunos vecinos, amigos y socios de negocios, apartando discretamente a ciertas personas, daban seguridades de que se unirían a protegerlos[a] y de que ofrecerían todo empeño posible en su apoyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se unirían a defenderlos y que contribuirían con todo lo posible para ayudarlos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γείτονές
  english_pob_choice: neighbors
  chosen_spanish: vecinos
  alternatives_spanish:
  - personas cercanas
  - próximos
  lexicon: LSJ
  rationale: El término designa a quienes viven cerca; «vecinos» es el equivalente natural y fiel en español.
- source_word: φίλοι
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - aliados
  lexicon: LSJ
  rationale: En esta lista relacional, el sentido ordinario de amistad o cercanía personal es el más probable, por eso se traduce «amigos».
- source_word: συνπραγματευόμενοι
  english_pob_choice: business associates
  chosen_spanish: socios de negocios
  alternatives_spanish:
  - compañeros en asuntos
  - socios en tratos
  - colegas comerciales
  lexicon: LSJ
  rationale: El participio apunta a personas que actúan conjuntamente en negocios o gestiones; «socios de negocios» comunica esa cooperación práctica sin añadir más de lo que el griego dice.
- source_word: μυστικῶς
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - privadamente
  lexicon: LSJ
  rationale: Indica una acción encubierta; «en secreto» es claro, natural y conserva el matiz de clandestinidad.
- source_word: τινας ἐπισπώμενοι
  english_pob_choice: drawing certain people aside
  chosen_spanish: atrayendo a ciertas personas
  alternatives_spanish:
  - apartando a ciertas personas
  - ganando a ciertas personas
  lexicon: LSJ
  rationale: ἐπισπάω puede sugerir atraer hacia sí o apartar; «atrayendo a ciertas personas» preserva la idea de moverlas discretamente hacia su lado sin forzar un sentido psicológico más fuerte que el texto no exige.
- source_word: πίστεις ἐδίδουν
  english_pob_choice: were giving assurances
  chosen_spanish: daban seguridades
  alternatives_spanish:
  - daban garantías
  - daban promesas
  lexicon: LSJ
  rationale: La expresión idiomática equivale a ofrecer garantías o promesas fiables; «daban seguridades» mantiene el valor de compromiso y resulta idiomático en español.
- source_word: συνασπίζειν
  english_pob_choice: protecting
  chosen_spanish: proteger
  alternatives_spanish:
  - defender
  - amparar
  lexicon: LSJ
  rationale: El verbo, relacionado con el escudo, expresa acción protectora y solidaria. «Proteger» es formal, natural y acorde con la revisión inglesa que prefirió este matiz.
- source_word: πᾶν ἐκτενὲς
  english_pob_choice: every earnest effort
  chosen_spanish: todo esfuerzo diligente
  alternatives_spanish:
  - todo empeño
  - todo esfuerzo ferviente
  lexicon: LSJ
  rationale: La frase expresa intensidad plena o máxima extensión del esfuerzo; «todo esfuerzo diligente» conserva la totalidad y el empeño serio sin exagerar devocionalmente el matiz.
- source_word: προσιοίσεσθαι
  english_pob_choice: would offer
  chosen_spanish: ofrecerían
  alternatives_spanish:
  - traerían
  - contribuirían
  lexicon: LSJ
  rationale: El futuro medio infinitivo comunica lo que se comprometían a aportar; «ofrecerían» encaja bien con «esfuerzo» y con el valor de compromiso.
- source_word: πρὸς ἀντίλημψιν
  english_pob_choice: toward their support
  chosen_spanish: en su apoyo
  alternatives_spanish:
  - para ayudarles
  - para su auxilio
  - en su ayuda
  lexicon: LSJ
  rationale: ἀντίλημψις significa ayuda, apoyo o asistencia. «En su apoyo» conserva el sentido de sostén práctico y protege la relación con la construcción preposicional.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «shielding» por «protecting» para sonar más natural; la versión española sigue ese ajuste con «proteger» y conserva el resto del contenido sin suavizar la dimensión clandestina ni la promesa de apoyo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - 'Se conserva el tono de lista social del griego: vecinos, amigos y socios de negocios.'
  - «En secreto» refleja la clandestinidad exigida por μυστικῶς sin añadir dramatización.
  - La nota al pie está anclada explícitamente en «negocios[a]» para cumplir la validación.
