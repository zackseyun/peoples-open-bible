translation:
  language: es
  text: Porque en mi monte santo[a], en el monte alto de Israel —declara el Señor Yahvé— allí me servirá toda la casa de Israel, todos ellos en la tierra. Allí los aceptaré, y allí requeriré[d] sus contribuciones y las primicias de sus ofrendas[b], junto con todas sus cosas sagradas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre mi monte santo»; el hebreo usa una expresión locativa que también puede entenderse como ubicación sobre la altura.
    reason: lexical_alternative
  - marker: b
    text: O «las primeras de sus ofrendas»; el hebreo permite entender רֵאשִׁית como «lo primero» o «primicias».
    reason: lexical_alternative
  - marker: c
    text: O «con todas sus cosas consagradas» / «con todas sus ofrendas sagradas»; קָדְשֵׁיכֶם es más amplio que un solo tipo de ofrenda.
    reason: lexical_alternative
  - marker: d
    text: «Requeriré» intenta mantener el valor de דרש aquí como requerir o reclamar lo debido, sin endurecerlo tanto como «exigiré».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְהַר קָדְשִׁי
  english_pob_choice: on my holy mountain
  chosen_spanish: en mi monte santo
  alternatives_spanish:
  - en mi montaña santa
  - sobre mi monte santo
  lexicon: HALOT
  rationale: El hebreo usa un complemento locativo con הַר; en español, 'en mi monte santo' conserva el valor de ubicación sin volverlo artificial. 'Santo' mantiene el carácter cultual del lugar sin desplazar el matiz de pertenencia ('mi').
- source_word: בְהַר מְרוֹם יִשְׂרָאֵל
  english_pob_choice: on the high mountain of Israel
  chosen_spanish: en el monte alto de Israel
  alternatives_spanish:
  - en el monte elevado de Israel
  - en la altura del monte de Israel
  lexicon: HALOT
  rationale: מְרוֹם expresa altura/elevación; 'monte alto' conserva el paralelismo con 'mi monte santo' y evita una paráfrasis más libre. 'De Israel' mantiene la relación geográfica/covenantal del sintagma.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula profética de proclamación; 'declara' la expresa de modo natural. Siguiendo la norma del proyecto para יְהוָה, se usa 'Yahvé'. Al aparecer אֲדֹנָי antes del Nombre, 'Señor Yahvé' evita la repetición 'Señor Señor' y preserva ambos elementos del hebreo.
- source_word: יַעַבְדֻנִי
  english_pob_choice: will serve me
  chosen_spanish: me servirá
  alternatives_spanish:
  - me adorará
  - me ministrará
  lexicon: HALOT
  rationale: עבד en contexto de pacto y culto puede significar servir o rendir servicio religioso. 'Servirá' mantiene la amplitud semántica que el inglés POB también preserva con 'serve me'.
- source_word: כָּל בֵּית יִשְׂרָאֵל כֻּלֹּה
  english_pob_choice: all the house of Israel, all of them
  chosen_spanish: toda la casa de Israel, todos ellos
  alternatives_spanish:
  - toda la casa de Israel, toda ella
  - todo el pueblo de Israel, todos ellos
  lexicon: HALOT
  rationale: La duplicación enfática se conserva con 'toda... todos ellos'. 'Casa de Israel' reproduce el sujeto colectivo del hebreo y el énfasis totalizador sin neutralizarlo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: En Ezequiel, הָאָרֶץ suele tener fuerza de tierra/covenant land. 'La tierra' es la forma natural en español bíblico contemporáneo y conserva esa densidad sin especificar más de lo que el texto da.
- source_word: אֶרְצֵם
  english_pob_choice: I will accept them
  chosen_spanish: los aceptaré
  alternatives_spanish:
  - los recibiré favorablemente
  - me agradarán
  lexicon: HALOT
  rationale: רצה en este tipo de contexto implica aceptación favorable. 'Los aceptaré' es breve, transparente y fiel a la lectura del POB sin añadir interpretaciones devocionales.
- source_word: אֶדְרוֹשׁ
  english_pob_choice: I will require
  chosen_spanish: pediré
  alternatives_spanish:
  - exigiré
  - requeriré
  lexicon: HALOT
  rationale: דרש puede significar buscar, inquirir o requerir. En el marco de ofrendas debidas a Dios, 'pediré' comunica demanda/solicitud sin la dureza de 'exigiré'; además permite mantener un tono bíblico natural en español. Se conserva la relación con lo que Dios espera recibir.
- source_word: תְּרוּמֹתֵיכֶם
  english_pob_choice: your contributions
  chosen_spanish: sus contribuciones
  alternatives_spanish:
  - sus ofrendas
  - sus ofrendas elevadas
  lexicon: HALOT
  rationale: תְּרוּמָה nombra una porción apartada para Dios. 'Contribuciones' refleja bien esa idea de porción dedicada, y conserva el matiz administrativo/cultual que el POB documenta.
- source_word: רֵאשִׁית מַשְׂאוֹתֵיכֶם
  english_pob_choice: the firstfruits of your offerings
  chosen_spanish: las primicias de sus ofrendas
  alternatives_spanish:
  - la primera parte de sus ofrendas
  - lo primero de sus ofrendas
  lexicon: HALOT
  rationale: רֵאשִׁית tiene el valor de 'primicias/primero'; מַשְׂאוֹתֵיכֶם se entiende aquí como ofrendas presentadas/llevadas. 'Primicias de sus ofrendas' conserva el paralelismo y la relación con el lenguaje sacrificial sin sobredeterminar el sustantivo.
- source_word: בְּכָל קָדְשֵׁיכֶם
  english_pob_choice: with all your holy things
  chosen_spanish: junto con todas sus cosas santas
  alternatives_spanish:
  - con todas sus cosas sagradas
  - con todas sus ofrendas sagradas
  lexicon: HALOT
  rationale: 'קָדְשֵׁיכֶם es amplio: cosas santas/dedicadas. ''Cosas santas'' mantiene esa amplitud y evita restringirlo a un tipo único de ofrenda. ''Junto con'' expresa bien la fuerza aditiva de וְאֶת.'
theological_decisions:
- issue: Rendering of the divine name in the prophetic formula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / updated doctrine notes Yahweh for YHWH
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El proyecto pide Yahvé para יְהוָה. Al mismo tiempo, la combinación con אֲדֹנָי exige evitar una repetición confusa. 'Señor Yahvé' preserva la fórmula profética y el Nombre propio, sin ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB fue revisado desde 'your gifts' a 'your offerings' para מַשְׂאוֹתֵיכֶם; la redacción española sigue esa corrección con 'ofrendas'. También se mantuvo la decisión del POB de traducir תְּרוּמֹתֵיכֶם como una porción ofrecida a Dios, aquí 'contribuciones'.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - 'Se conserva el paralelismo y la duplicación enfática: ''toda... todos ellos''.'
  - '''Cosas santas'' evita restringir קָדְשֵׁיכֶם a un término técnico demasiado estrecho.'
  - No se usa 'Cristo' ni terminología eclesiástica ajena al hebreo del pasaje.
