translation:
  language: es
  text: Todos los vasos para beber del rey Salomón eran de oro, y todos los utensilios de la Casa del Bosque del Líbano eran de oro puro[a]. La plata no se consideraba nada[b] en los días de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oro refinado».
    reason: lexical_alternative
  - marker: b
    text: O «La plata no se consideraba de ningún valor en los días de Salomón».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי מַשְׁקֵה
  english_pob_choice: drinking vessels
  chosen_spanish: vasos para beber
  alternatives_spanish:
  - vasos de beber
  - recipientes para beber
  - utensilios para beber
  lexicon: HALOT
  rationale: כְּלֵי es un término amplio para objetos/utensilios, y מַשְׁקֵה especifica la función de beber. «Vasos para beber» comunica el sentido de uso sin restringirlo indebidamente a copas o tazas.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro
  - de oro
  lexicon: HALOT
  rationale: El sustantivo de material se mantiene con el valor normal de «oro»; en español, el giro adjetival «eran de oro» suena natural y conserva la repetición enfática del hebreo.
- source_word: בֵּית יַעַר הַלְּבָנוֹן
  english_pob_choice: the House of the Forest of Lebanon
  chosen_spanish: la Casa del Bosque del Líbano
  alternatives_spanish:
  - el palacio del Bosque del Líbano
  - la Casa del Bosque del Líbano
  lexicon: HALOT
  rationale: Se conserva la estructura nominal casi como nombre propio del edificio real. «Casa» preserva mejor la forma del hebreo que «palacio», que sería una interpretación contextual pero menos directa.
- source_word: זָהָב סָגוּר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro fino
  - oro macizo
  lexicon: HALOT
  rationale: סָגוּר aplicado al oro expresa calidad depurada/refinada. «Oro puro» es la opción española más clara y fiel al valor de excelencia material que documenta el audit trail inglés.
- source_word: אֵין כֶּסֶף לֹא נֶחְשָׁב
  english_pob_choice: Silver was not considered anything
  chosen_spanish: La plata no se consideraba nada
  alternatives_spanish:
  - La plata no se consideraba de ningún valor
  - La plata no era tenida en cuenta
  - La plata no se estimaba en nada
  lexicon: HALOT
  rationale: El hebreo no solo niega existencia, sino que niega valor/estimación. «No se consideraba nada» mantiene esa fuerza idiomática con una formulación natural en español.
- source_word: בִּימֵי שְׁלֹמֹה
  english_pob_choice: in the days of Solomon
  chosen_spanish: en los días de Salomón
  alternatives_spanish:
  - durante los días de Salomón
  - en tiempos de Salomón
  lexicon: HALOT
  rationale: Es una expresión temporal narrativa directa. «En los días de Salomón» conserva el tono bíblico sin caer en un calco difícil.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético y el audit trail inglés vigente, sin cambios respecto al último pase revisado. Se conserva la doble mención de oro y la cláusula final sobre la plata como juicio de valor, no como mera inexistencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se prefirió «oro puro» en la línea principal y se dejó la alternativa «oro refinado» en nota, siguiendo la tensión lexical documentada por el inglés.
  - «La plata no se consideraba nada» conserva el juicio de desprecio/insignificancia, en lugar de suavizarlo a simple ausencia de plata.
