revisions:
- from: Sin embargo, habrá una distancia entre ustedes y ella[a], como de dos mil codos por medida. No se acerquen a ella, para que sepan el camino por el cual han de ir[b], porque no han pasado por este camino antes.
  to: Sin embargo, habrá una distancia entre ustedes y el arca, como de dos mil codos[a] según la medida. No se acerquen a ella, para que sepan el camino por el cual irán, porque no han pasado por este camino antes[b].
  rationale: 'La revisión corrige el principal problema de fidelidad editorial: las notas deben corresponder a los mismos elementos preservados en la auditoría inglesa. También mejora la legibilidad española al explicitar «el arca» en lugar de un pronombre femenino aislado y al ajustar «por medida» a «según la medida». Se mantiene el sentido del hebreo y el tono formal del POB.'
