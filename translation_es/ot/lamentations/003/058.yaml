    rationale: «Has contendido por la causa de mi vida» es comprensible, pero menos natural que «has defendido/pleiteado mi causa» o «has contendido por mi vida». Conviene una nota que preserve las alternativas del inglés con español más idiomático.
  revised_spanish_text: Tú has defendido la causa de mi alma[a], oh Señor; has redimido mi vida.
