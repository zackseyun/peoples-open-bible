review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: la mayoría resistió con ánimo noble, no abandonó la piedad y procuró librarse del proceso oficial mediante sus bienes. Sin embargo, hay desajustes importantes de número y de referencia: el sujeto griego es plural en toda la oración, pero el español pasa indebidamente a singular (''no se apartó'', ''buscó''). Además, ''inscripción'' suena demasiado estrecho para ἀπογραφαί/registro oficial y conviene usar ''registro'' o ''empadronamiento'' en este contexto. También falta anclar correctamente la nota textual al verbo problemático dentro del texto revisado.'
  spanish_quality_summary: El español es legible y digno, pero la concordancia singular con 'la mayoría' debilita la naturalidad y la fidelidad al referente plural implícito ('ellos'). En español bíblico natural, aquí funciona mejor mantener el núcleo colectivo con verbo plural por cercanía al grupo referido o reformular con 'la mayor parte de ellos ... no se apartaron ... buscaron'. 'Con valentía' es correcto, pero 'audazmente' o 'con valentía' ambos sirven; el problema principal es la concordancia y 'inscripción', que resulta menos idiomático que 'registro'.
  glossary_alignment: No hay choques con la terminología principal del proyecto. 'Piedad' para εὐσέβεια está bien. 'Ánimo noble' es adecuado para γενναίᾳ ψυχῇ. Para ἀπογραφῶν, 'registro oficial' o 'registros' alinea mejor con la nota cultural que 'inscripción'.
  issues:
  - severity: high
    issue: Concordancia verbal en singular con sujeto de referencia plural
    rationale: El griego tiene plural en ἐνίσχυσαν, διέστησαν y, según el sentido adoptado, la acción final también recae sobre 'most of them'. En español, 'la mayoría de ellos ... no se apartaron ... buscaron' preserva mejor el referente real. El singular actual suena forzado y reduce la fidelidad formal.
  - severity: medium
    issue: '''Inscripción'' no refleja bien ἀπογραφῶν en este contexto narrativo'
    rationale: ἀπογραφή aquí es el proceso oficial de registro/enrolamiento impuesto, no una simple 'inscripción' en sentido general. 'Registro' o 'registros' comunica mejor el matiz administrativo y concuerda con la nota cultural.
  - severity: low
    issue: La nota a sobreexplica un matiz no equivalente al anclaje principal
    rationale: La nota actual en [a] combina 'tomó valor' con una explicación de γενναίᾳ ψυχῇ, pero el anclaje está sobre 'la mayoría de ellos'. Conviene mover la alternativa al segmento verbal relevante o simplificar la nota para que corresponda mejor al texto marcado.
  revised_spanish_text: Pero la mayoría de ellos, fortaleciéndose con ánimo noble, no se apartaron de la piedad[a], sino que, cambiando sus posesiones por sus vidas, buscaron[b] con valentía salvarse del registro[c].
