translation:
  language: es
  text: 'Dios habló a Moisés y le dijo[a]: «Yo soy Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; alternativamente, «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - le habló
  - se dirigió a
  lexicon: HALOT
  rationale: El verbo narrativo de habla en hebreo se vierte de forma natural como «habló» en español; conserva el acto de comunicación divina sin añadir matices no presentes en el texto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Todopoderoso
  lexicon: HALOT
  rationale: Aunque el sustantivo es morfológicamente plural, aquí rige con verbo singular y designa al Dios de Israel. «Dios» mantiene la referencia singular y el tono bíblico estándar en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - con
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la realización más natural con verbos de decir.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshe
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española consagrada del nombre propio, que es clara y reconocible para lectores de habla hispana.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: HALOT
  rationale: El hebreo repite el verbo de habla; en español, «le dijo» evita la repetición seca y preserva el valor de discurso directo sin alterar el contenido.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal retoma a Moisés. En español, el dativo átono «le» es la forma más natural con «dijo» y mantiene la referencia personal.
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo estoy
  - Yo
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal de autoidentificación. En español, «Yo soy» reproduce de manera natural e inequívoca esa afirmación enfática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal de no sustituir el nombre divino por un título. «Yahvé» es la forma española del Tetragrámaton adoptada por el proyecto, preservando el nombre personal revelado.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La tradición de la POB en inglés lo vierte como «Yahweh»; en español, la forma correspondiente y asentada en el proyecto es «Yahvé», para preservar el nombre del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; se mantiene la estructura del hebreo con dos verbos de habla y la autoidentificación divina final, ajustada a un español natural y publication-readable.
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלֹהִים en singular contextual.
  - Se mantiene «Moisés» como forma española estándar del nombre propio.
  - Se evita la sustitución del nombre divino por «SEÑOR» conforme a la política del proyecto.
  - La comilla final introduce discurso directo breve y fiel al orden del hebreo.
