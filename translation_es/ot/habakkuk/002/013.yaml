translation:
  language: es
  text: ¿No es acaso de parte de Yahvé de los Ejércitos que los pueblos se afanen para el fuego[a], y las naciones se agoten para el vacío[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el fuego», es decir, para aquello que será consumido por el fuego.
    reason: lexical_alternative
  - marker: b
    text: O «para nada» o «para la vanidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No es acaso
  alternatives_spanish:
  - ¿No es
  - ¿No es ciertamente
  lexicon: HALOT
  rationale: Conserva el valor de pregunta retórica que espera afirmación, sin volverse duro ni arcaico en español.
- source_word: הִנֵּה
  english_pob_choice: indeed
  chosen_spanish: acaso
  alternatives_spanish:
  - en verdad
  - he aquí
  lexicon: HALOT
  rationale: El hebreo añade énfasis; en español, 'acaso' dentro de la pregunta ayuda a mantener ese matiz enfático sin cargar el estilo.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - de parte de
  lexicon: HALOT
  rationale: Marca origen o procedencia. 'De Yahvé' comunica bien la fuente del hecho/jucio en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: Se sigue el criterio del proyecto para el Nombre divino, preservándolo en forma no sustitutiva.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica de manera clara y reverente la idea de ''hosts'' en español contemporáneo, manteniendo el título divino.'
- source_word: וְיִיגְעוּ
  english_pob_choice: labor
  chosen_spanish: se fatiguen
  alternatives_spanish:
  - trabajen arduamente
  - se afanen
  lexicon: HALOT
  rationale: El verbo hebreo expresa esfuerzo penoso; 'se fatiguen' conserva la idea de trabajo extenuante y el matiz de resultado negativo.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - los pueblos
  lexicon: HALOT
  rationale: Se usa 'pueblos' para reflejar el plural colectivo y distinguirlo de 'naciones' en el paralelismo.
- source_word: בְּדֵי אֵשׁ
  english_pob_choice: for fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - para el fuego
  - para ser consumidos por el fuego
  lexicon: HALOT
  rationale: La expresión hebrea apunta al resultado de ser consumido por fuego; 'por el fuego' conserva la imagen y deja espacio para la alternativa textual/interpretativa.
- source_word: לְאֻמִּים
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las etnias
  lexicon: HALOT
  rationale: Mantiene el paralelismo natural con 'pueblos' y la distinción léxica entre ambos sustantivos hebreos.
- source_word: בְּדֵי רִיק
  english_pob_choice: for emptiness
  chosen_spanish: para la vaciedad
  alternatives_spanish:
  - para nada
  - para la vanidad
  - en vano
  lexicon: HALOT
  rationale: '''Vaciedad'' conserva el campo semántico de vacío/futilidad mejor que una traducción más interpretativa; también deja visible la tensión poética del hebreo.'
- source_word: יִעָפוּ
  english_pob_choice: weary themselves
  chosen_spanish: se cansen
  alternatives_spanish:
  - se fatiguen
  - se agoten
  lexicon: HALOT
  rationale: 'Refleja el valor reflexivo/resultativo del verbo en contexto: el esfuerzo termina en agotamiento.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el Nombre propio del pacto en lugar de una máscara litúrgica, conforme al marco del proyecto y al hebreo directo del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación causal y tensión teológica del verso
  english_pob_reading: the verse states that this reality is from Yahweh of hosts, namely that the nations' oppressive building projects end in destruction and futility
  chosen_spanish_reading: 'el versículo afirma que esto procede de Yahvé de los ejércitos: que los pueblos y las naciones se agotarán en una obra destinada al fuego y a la vaciedad'
  alternative_spanish_readings:
  - una lectura más débil que solo pregunta si Yahvé lo sabe
  - una lectura determinista que atribuya el mal deseo directamente a Yahvé
  rationale: La preposición de origen y la pregunta retórica deben conservar la atribución del desenlace bajo juicio divino, sin convertir el texto en una afirmación de autoría moral del mal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo de WLC y el audit trail inglés. La versión española conserva la pregunta retórica, el origen en Yahvé, el paralelismo entre 'pueblos' y 'naciones', y la ambigüedad productiva de 'fuego' y 'rיק' sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Nombre divino.
  - Se distingue 'pueblos' / 'naciones' para reflejar el paralelismo hebreo.
  - '''Fuego'' y ''vaciedad'' mantienen el campo de destrucción y futilidad con notas alternativas.'
  - El tono es bíblico contemporáneo, no arcaizante, y evita calcos innecesarios.
