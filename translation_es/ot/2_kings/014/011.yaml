translation:
  language: es
  text: Pero Amazías no quiso escuchar[a]; entonces Joás, rey de Israel, subió, y él y Amazías, rey de Judá, se encontraron cara a cara en Bet-semes[b], que pertenecía a Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hizo caso» / «no obedeció». El verbo hebreo puede implicar escuchar con respuesta, no solo oír.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vieron rostros»; es un modismo para un encuentro directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: would not listen
  chosen_spanish: no quiso escuchar
  alternatives_spanish:
  - no escuchó
  - no obedeció
  lexicon: HALOT
  rationale: El hebreo aquí no indica mera audición, sino rechazo a atender la advertencia. «No quiso escuchar» conserva esa negativa voluntaria sin convertirla en una obediencia formal que el contexto no exige.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió en campaña
  - marchó hacia arriba
  lexicon: HALOT
  rationale: עלה se mantiene en su valor básico de «subir». En contexto militar, el movimiento está implícito; «subió» preserva el giro hebreo sin añadir información no explicitada.
- source_word: וַיִּתְרָאוּ פָנִים
  english_pob_choice: met face to face
  chosen_spanish: se enfrentaron cara a cara
  alternatives_spanish:
  - se vieron las caras
  - se encontraron cara a cara
  lexicon: HALOT
  rationale: El hebreo dice literalmente «vieron rostros», un modismo para encuentro directo. «Se enfrentaron cara a cara» comunica la confrontación real del contexto bélico y mantiene el valor idiomático.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Beth-shemesh
  - Casa del Sol
  lexicon: HALOT
  rationale: Se translitera el topónimo al español como «Bet-semes», forma clara y publicable en español bíblico, sin traducir el nombre ni reemplazarlo por un equivalente interpretativo.
- source_word: אֲשֶׁר לִיהוּדָה
  english_pob_choice: which belongs to Judah
  chosen_spanish: que pertenecía a Judá
  alternatives_spanish:
  - que estaba en Judá
  - que era de Judá
  lexicon: HALOT
  rationale: La frase expresa pertenencia territorial/jurisdiccional. «Pertenecía a Judá» recoge mejor esa relación que un simple «estaba en Judá».
- source_word: וְלֹא
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: Aunque el waw es coordinante, aquí introduce contraste con la negativa de Amazías a escuchar. «Pero» refleja bien esa función discursiva en español.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, conservando la tensión lexical de שׁמע como escuchar con respuesta y del modismo literal de «ver rostros», sin añadir explicaciones interpretativas fuera del texto.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo, sin necesidad de normalización adicional.
  - 'Los nombres propios se transliteran con una grafía española estable: Joás, Amazías, Judá, Bet-semes.'
  - El tono narrativo es sobrio y bíblico contemporáneo, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
