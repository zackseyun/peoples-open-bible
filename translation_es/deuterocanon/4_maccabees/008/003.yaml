revisions:
- from: Cuando el tirano había dado estas órdenes[a], fueron traídos siete hermanos con su anciana madre[b], hermosos, modestos, nobles y agradables en todo.
  to: Después de que el tirano hubo dado estas órdenes[a], fueron traídos siete hermanos con su anciana madre, hermosos, modestos, nobles y encantadores en todo aspecto[b].
  rationale: La revisión conserva plenamente el sentido del original y del expediente inglés, pero mejora la naturalidad del español y la precisión semántica. Se sustituye la subordinación temporal rígida por una forma narrativa más idiomática que mantiene la anterioridad del genitivo absoluto, y se refuerza χαρίεντες con una expresión española más fiel al matiz de encanto o gracia personal.
