id: GEN.31.42
reference: Genesis 31:42
source:
  edition: WLC
  text: לוּלֵ֡י אֱלֹהֵ֣י אָבִ/י֩ אֱלֹהֵ֨י אַבְרָהָ֜ם וּ/פַ֤חַד יִצְחָק֙ הָ֣יָה לִ֔/י כִּ֥י עַתָּ֖ה רֵיקָ֣ם שִׁלַּחְתָּ֑/נִי אֶת עָנְיִ֞/י וְ/אֶת יְגִ֧יעַ כַּפַּ֛/י רָאָ֥ה אֱלֹהִ֖ים וַ/יּ֥וֹכַח אָֽמֶשׁ־־׃
translation:
  text: If the God of my father[a], the God of Abraham, and the Fear of Isaac, had not been with me, surely by now you would have sent me away empty-handed. God saw my affliction and the labor of my hands, and he judged last night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the One whom Isaac fears.' The Hebrew literally reads 'the Fear of Isaac,' a distinctive title for God.
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  chosen: If ... had not
  alternatives:
  - unless
  - were it not that
  lexicon: HALOT
  rationale: Introduces a contrary-to-fact condition. In English, 'If ... had not' best captures the syntax naturally in this sentence.
- source_word: אֱלֹהֵי אָבִי
  chosen: the God of my father
  alternatives:
  - my father's God
  lexicon: HALOT
  rationale: Construct chain rendered transparently and naturally; preserves Jacob's appeal to ancestral covenant identity.
- source_word: אֱלֹהֵי אַבְרָהָם
  chosen: the God of Abraham
  lexicon: HALOT
  rationale: Standard literal rendering of the construct phrase.
- source_word: וּפַחַד יִצְחָק
  chosen: and the Fear of Isaac
  alternatives:
  - and the One whom Isaac fears
  - and the Dread of Isaac
  lexicon: HALOT
  rationale: פַחַד literally denotes fear/dread. Here it functions as a reverential title for God in relation to Isaac. 'Fear of Isaac' preserves the Hebrew idiom and theological texture better than smoothing it away; the more explicit interpretive alternative is preserved in a footnote.
- source_word: הָיָה לִי
  chosen: had been with me
  alternatives:
  - had been mine
  - had been for me
  lexicon: HALOT
  rationale: The idiom 'be to/for me' in context expresses divine support or presence. 'Had been with me' communicates the sense idiomatically in English without overparaphrasing.
- source_word: כִּי עַתָּה
  chosen: surely by now
  alternatives:
  - for now
  - indeed now
  lexicon: HALOT
  rationale: In this context the phrase marks the consequence that would already have occurred. 'Surely by now' captures both emphasis and temporal force.
- source_word: רֵיקָם
  chosen: empty-handed
  alternatives:
  - empty
  - with nothing
  lexicon: HALOT
  rationale: Idiomatic English equivalent in a context of being dismissed without wages or possessions.
- source_word: שִׁלַּחְתָּנִי
  chosen: you would have sent me away
  alternatives:
  - you sent me away
  - you would have dismissed me
  lexicon: HALOT
  rationale: Within the contrary-to-fact condition, English requires the modal perfect-like 'would have sent.' 'Sent me away' fits the context of dismissal.
- source_word: עָנְיִי
  chosen: my affliction
  alternatives:
  - my misery
  - my hardship
  lexicon: HALOT
  rationale: Conveys Jacob's suffering and mistreatment broadly, not merely economic poverty.
- source_word: יְגִיעַ כַּפַּי
  chosen: the labor of my hands
  alternatives:
  - the toil of my hands
  - what my hands have worked for
  lexicon: HALOT
  rationale: A common Hebrew expression for one's hard work. 'Labor of my hands' is clear and fairly literal.
- source_word: רָאָה אֱלֹהִים
  chosen: God saw
  alternatives:
  - God has seen
  lexicon: HALOT
  rationale: Simple past fits the narrative sequence in English.
- source_word: וַיּוֹכַח
  chosen: and he rebuked you
  alternatives:
  - and he judged
  - and he decided
  - and he reproved
  lexicon: HALOT
  rationale: The verb יכח can denote deciding, reproving, or vindicating in dispute. Given the immediate context of God's intervention in Laban's dream (31:24), 'rebuked you' best captures the concrete sense of divine warning/reproof.
- source_word: אָמֶשׁ
  chosen: last night
  alternatives:
  - yesternight
  lexicon: HALOT
  rationale: Natural modern English equivalent; avoids archaic diction.
