id: GEN.29.21
reference: Genesis 29:21
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יַעֲקֹ֤ב אֶל לָבָן֙ הָבָ֣/ה אֶת אִשְׁתִּ֔/י כִּ֥י מָלְא֖וּ יָמָ֑/י וְ/אָב֖וֹאָה אֵלֶֽי/הָ־־׃
translation:
  text: Then Jacob said to Laban[a], “Give me my wife, for my days are fulfilled, that I may go in to her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'go in to her,' a customary euphemism for consummating the marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  chosen: Give me
  alternatives:
  - Give
  - Bring
  lexicon: HALOT
  rationale: Imperative/request formula directed to Laban. 'Give me' makes the implied indirect object explicit in natural English and fits the marriage-transfer context.
- source_word: אֶת אִשְׁתִּי
  chosen: my wife
  alternatives:
  - my woman
  - my bride
  lexicon: HALOT
  rationale: אִשָּׁה commonly means 'woman/wife'; here Rachel is already designated as Jacob's intended marriage partner after the agreed service, so 'my wife' best reflects the covenantal-marital sense in context.
- source_word: כִּי מָלְאוּ יָמָי
  chosen: for my days are fulfilled
  alternatives:
  - for my time is completed
  - for my days are complete
  lexicon: HALOT
  rationale: Literally 'for my days have been filled/completed,' referring to the completion of the agreed period of service. 'Are fulfilled' preserves the idiomatic force while remaining readable.
- source_word: וְאָבוֹאָה אֵלֶיהָ
  chosen: so that I may go in to her
  alternatives:
  - and I will go in to her
  - that I may have relations with her
  lexicon: HALOT
  rationale: בוא אל is a standard Hebrew euphemism for sexual consummation. 'Go in to her' preserves the idiom and its modesty better than an explicit paraphrase. 'So that I may' reflects the cohortative nuance.
