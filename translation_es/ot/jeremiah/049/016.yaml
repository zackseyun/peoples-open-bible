review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca la línea auditada del English POB: engaño producido por la fama temible/terror, soberbia interna, seguridad geográfica de Edom, concesión en «Aunque», y caída impuesta por Yahvé. También preserva correctamente el nombre divino como «Yahvé». Sin embargo, hay un desajuste menor pero significativo en la cláusula del nido: «pongas tu nido tan alto como el águila» suena incompleto/ambiguo en español porque compara con el ave, no con la altura característica del ave o con su modo de anidar. Conviene ajustar la expresión para conservar mejor la imagen hebrea y la naturalidad española.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. «Hendiduras de la peña», «la arrogancia de tu corazón» y «declara Yahvé» funcionan bien. La puntuación también es sólida. La principal mejora necesaria es estilístico-semántica: «tan alto como el águila» no es la formulación más natural en español para esta comparación; «como el águila» o «tan alto como el nido del águila» evita tropiezo idiomático. Además, puede pulirse levemente la nota teológica que afirma que la opción elegida «mantiene abierta esa tensión», porque «el terror que inspiras» en realidad favorece una de las posibilidades, aunque correctamente preserve la alternativa en nota.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales principales. El tratamiento de זְדוֹן como «arrogancia» y de תפשׂ como «ocupas» concuerda con la auditoría inglesa. La nota alternativa para «la soberbia de tu corazón» está bien. Se mantiene el enfoque histórico de Edom sin sobreinterpretación.'
  issues:
  - severity: medium
    issue: Comparación poco natural en «Aunque pongas tu nido tan alto como el águila»
    rationale: El hebreo compara la elevación del nido con el águila; en español, «tan alto como el águila» puede sonar truncado o semánticamente impreciso. «Aunque pongas tu nido en lo alto, como el águila» preserva la imagen y mejora la fluidez sin alejarse del original.
  - severity: low
    issue: La nota teológica sobre «El terror que inspiras» exagera la ambigüedad preservada por la elección principal
    rationale: La formulación elegida favorece claramente la lectura relacional, aunque la nota al pie sí conserva las alternativas. No exige adjudicación mayor, pero conviene reconocerlo en la rationale editorial futura.
  revised_spanish_text: El terror que inspiras[a] te ha engañado, la arrogancia de tu corazón[b]— tú que habitas en las hendiduras de la peña[c], que ocupas la altura de la colina. Aunque pongas tu nido en lo alto, como el águila, desde allí te haré bajar, declara Yahvé.
  revised_footnotes:
