translation:
  language: es
  text: y los Arvaditas[a], y los Zemaritas, y los Hamatitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los gentilicios hebreos aquí son singulares en la forma, pero funcionan de manera colectiva, refiriéndose a pueblos o clanes: Arvadita, Zemarita, Hamatita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: En esta lista genealógica, la secuencia coordinada introduce otro grupo étnico. En español, 'y' transmite de forma natural la fuerza conjuntiva sin añadir elementos que el hebreo no exige aquí.
- source_word: הָאַרְוָדִי
  english_pob_choice: the Arvadites
  chosen_spanish: los arvaditas
  alternatives_spanish:
  - el arvadita
  - el pueblo de Arvad
  lexicon: HALOT
  rationale: Aunque el hebreo es singular en la forma, funciona colectivamente como gentilicio de un pueblo o clan. En español, el plural gentilicio conserva ese valor colectivo, igual que la decisión inglesa, y resulta idiomático en una lista de pueblos.
- source_word: הַצְּמָרִי
  english_pob_choice: the Zemarites
  chosen_spanish: los zemeritas
  alternatives_spanish:
  - el zemerita
  - el pueblo de Zemar
  lexicon: HALOT
  rationale: Se mantiene el valor colectivo del gentilicio y una transliteración estable al español. 'Zemeritas' comunica mejor el grupo étnico que un singular literal, que sonaría menos natural en español.
- source_word: הַחֲמָתִי
  english_pob_choice: the Hamathites
  chosen_spanish: los hamatitas
  alternatives_spanish:
  - el hamatita
  - el pueblo de Hamat
  lexicon: HALOT
  rationale: Como en los otros gentilicios, la forma singular hebrea designa colectivamente a un pueblo. 'Hamatitas' preserva ese sentido colectivo y la terminación plural española adecuada para etnónimos.
translation_notes:
  revision_awareness: El texto inglés POB permanece sin cambios en la última revisión; el presente borrador español sigue esa lectura alta de acuerdo y mantiene la misma solución colectiva para los gentilicios, adaptándola al uso natural del español.
  spanish_consistency_notes:
  - Se mantiene la coordinación simple con 'y' para reflejar la sucesión genealógica.
  - Se usan gentilicios en plural para respetar el valor colectivo documentado en el audit trail inglés.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes, ya que el versículo no contiene el nombre divino.
