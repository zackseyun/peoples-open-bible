translation:
  language: es
  text: 'Y David dijo a los hombres que estaban con él: «¿Qué se hará por el hombre que derribe a este filisteo y quite la afrenta de Israel[a]? Porque ¿quién es este filisteo incircunciso, para desafiar las filas[b] del Dios vivo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quite el oprobio de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las líneas de batalla» o «los ejércitos del Dios vivo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹמְדִים עִמּוֹ
  english_pob_choice: standing with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban de pie con él
  - que permanecían con él
  lexicon: HALOT
  rationale: El participio describe a los hombres en compañía de David; en español, la cláusula relativa fluye con naturalidad y conserva la relación de acompañamiento sin añadir matices no explícitos.
- source_word: מַה יֵּעָשֶׂה לָאִישׁ
  english_pob_choice: What will be done for the man
  chosen_spanish: ¿Qué se hará por el hombre?
  alternatives_spanish:
  - ¿Qué se le hará al hombre?
  - ¿Qué se hará para el hombre?
  lexicon: HALOT
  rationale: El nifal de עשה aquí pregunta por lo que se hará en favor del hombre, con sentido de recompensa implícita pero no dicho. ‘Se hará por’ mantiene esa apertura sin introducir ‘dará’.
- source_word: יַכֶּה
  english_pob_choice: strikes down
  chosen_spanish: hiera
  alternatives_spanish:
  - golpee
  - derrote
  lexicon: HALOT
  rationale: En contexto bélico, נכה puede implicar muerte o derrota. ‘Hiera’ conserva el golpe/ataque martial sin especificar más de lo que el verbo exige.
- source_word: הַפְּלִשְׁתִּי הַלָּז
  english_pob_choice: this Philistine
  chosen_spanish: a este filisteo
  alternatives_spanish:
  - a ese filisteo
  - a este filisteo aquí
  lexicon: HALOT
  rationale: El demostrativo הַלָּז tiene un valor vívido o despectivo. ‘Este filisteo’ reproduce el deíctico con naturalidad en español y sin endurecer el estilo.
- source_word: וְהֵסִיר חֶרְפָּה מֵעַל יִשְׂרָאֵל
  english_pob_choice: and removes disgrace from Israel
  chosen_spanish: y quite la afrenta de sobre Israel
  alternatives_spanish:
  - y quite el oprobio de Israel
  - y aparte la deshonra de Israel
  lexicon: HALOT
  rationale: חרפה puede ser afrenta, oprobio o vergüenza pública. ‘Afrenta’ conserva el peso honorífero y la relación idiomática ‘de sobre’ refleja מֵעַל de modo bastante literal y legible.
- source_word: הֶעָרֵל
  english_pob_choice: uncircumcised
  chosen_spanish: incircunciso
  alternatives_spanish:
  - sin circuncidar
  - no circuncidado
  lexicon: HALOT
  rationale: Se preserva el término literal y su carga pactual. ‘Incircunciso’ es claro en español bíblico y no suaviza el sentido identitario del insulto.
- source_word: חֵרֵף
  english_pob_choice: has defied
  chosen_spanish: ha desafiado
  alternatives_spanish:
  - ha insultado
  - ha ultrajado
  lexicon: HALOT
  rationale: En este marco militar y teológico, חרף apunta a una provocación/afrenta contra el orden de batalla y contra Dios. ‘Desafiado’ expresa bien esa hostilidad pública sin reducirla a mera burla.
- source_word: מַעַרְכֹת
  english_pob_choice: the battle lines
  chosen_spanish: las filas
  alternatives_spanish:
  - las líneas de batalla
  - los escuadrones
  lexicon: HALOT
  rationale: El término refiere a formaciones dispuestas para la batalla. ‘Filas’ es breve y natural en español; mantiene la idea de orden militar sin forzar una equivalencia técnica excesiva.
- source_word: אֱלֹהִים חַיִּים
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios viviente
  - el Dios que vive
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים es morfológicamente plural, aquí designa al Dios único de Israel. ‘Dios vivo’ conserva la forma confesional y la antítesis implícita con los dioses inertes.
theological_decisions:
- issue: ‘Incircunciso’ como marcador de pacto
  english_pob_reading: Retained the literal term 'uncircumcised' rather than softening it to a generic insult.
  chosen_spanish_reading: Se mantiene ‘incircunciso’ como marcador pactual y no se sustituye por un insulto genérico.
  alternative_spanish_readings:
  - ‘impío filisteo’
  - ‘pagano filisteo’
  rationale: El término no solo insulta; señala la condición de alguien fuera de la señal del pacto de Israel. Traducirlo literalmente preserva esa tensión teológica.
  doctrine_reference: Translation philosophy §1, §5
- issue: אֱלֹהִים חַיִּים como singular
  english_pob_reading: the living God
  chosen_spanish_reading: el Dios vivo
  alternative_spanish_readings:
  - los dioses vivos
  - Dios que vive
  rationale: El hebreo tiene forma plural, pero el contexto identifica al Dios de Israel en singular. El singular en español evita una lectura politeísta y respeta el uso idiomático.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último paso de revisión del inglés auditado: mantiene la estructura interrogativa, la cláusula final con ‘para que haya desafiado’, y evita añadir ‘dado’ o ‘castigado’ donde el hebreo solo pregunta qué se hará. También conserva la carga pactual de ‘incircunciso’ y la imagen militar de מַעַרְכֹת sin expandirla innecesariamente.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto solo cuando el texto lo requiera; aquí el hebreo tiene אֱלֹהִים y se traduce ‘Dios’.
  - ‘Filisteo’ se mantiene en minúscula como etnónimo común en español.
  - ‘Afrenta’ conserva el paralelo con ‘reproach/disgrace’ y el matiz de deshonra pública.
  - La construcción ‘de sobre Israel’ refleja el hebreo מֵעַל y mantiene la imagen espacial del original.
  - El tiempo verbal ‘haya desafiado’ reproduce el valor subordinado de כִּי + verbo en la última cláusula sin volverlo una simple afirmación independiente.
