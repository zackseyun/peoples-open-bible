translation:
  language: es
  text: 'Y cantores y danzantes juntos dicen[a]: «Todas mis fuentes están en ti[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «flautistas» para «danzantes»; el término hebreo se entiende tradicionalmente como referencia a danza o giro, aunque también se ha propuesto un sentido relacionado con un instrumento musical.
    reason: lexical_alternative
  - marker: b
    text: «Todas mis fuentes están en ti» es una metáfora poética que puede significar «todos mis manantiales» o «todas mis fuentes de vida están en ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁרִים
  english_pob_choice: Singers
  chosen_spanish: cantores
  alternatives_spanish:
  - y cantores
  - cantantes
  - singers
  lexicon: HALOT
  rationale: El participio y el paralelo poético apuntan a personas que cantan; «cantores» conserva el valor nominal y el tono poético sin volverlo demasiado moderno. Se evita «príncipes», que no se ajusta bien al contexto musical del hemistiquio.
- source_word: כְּחֹלְלִים
  english_pob_choice: dancers alike
  chosen_spanish: danzantes a una
  alternatives_spanish:
  - como danzantes
  - los que danzan
  - flautistas
  lexicon: HALOT
  rationale: La raíz se entiende aquí con valor de danza o giro; en español, «danzantes» mantiene esa imagen. «A una» traduce con naturalidad el valor asociativo/comparativo del כ en la línea poética compacta. Se preserva la alternativa de flautistas en nota por la ambigüedad léxica documentada.
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todo
  - Todas
  lexicon: HALOT
  rationale: «Todas» concuerda con el sustantivo femenino implícito en «fuentes» y reproduce el totalizador hebreo dentro de un sintagma natural en español.
- source_word: מַעְיָנַי
  english_pob_choice: my springs
  chosen_spanish: mis fuentes
  alternatives_spanish:
  - mis manantiales
  - mis nacientes
  - mis fuentes de vida
  lexicon: HALOT
  rationale: מַעְיָן denota una fuente/manantial. «Fuentes» es claro, poético y apto para el español bíblico contemporáneo; mantiene el campo semántico sin resolver prematuramente la metáfora. Se prefiere «fuentes» sobre una paráfrasis interpretativa como «fuentes de vida».
- source_word: בָּךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - están en ti
  - de ti
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con valor locativo/metafórico. «En ti» respeta la forma y, en español, el verbo copulativo puede sobreentenderse en poesía; se mantiene la relación de localización/sustento sin añadir interpretación.
theological_decisions:
- issue: Metáfora de las fuentes en relación con Sión/Zión personificada
  english_pob_reading: Retain the metaphor without resolving it into a doctrinal paraphrase such as 'all my blessings' or 'all my life-source.'
  chosen_spanish_reading: Conservar la metáfora sin convertirla en una paráfrasis doctrinal como «todas mis bendiciones» o «toda mi fuente de vida».
  alternative_spanish_readings:
  - Todas mis bendiciones están en ti.
  - Toda mi fuente de vida está en ti.
  - Todos mis recursos están en ti.
  rationale: 'El hebreo presenta una imagen poética condensada y teológicamente rica: las fuentes del salmista están en Sión. Traducirla literalmente permite que el lector perciba la tensión entre imagen y sentido, en vez de aplastarla en una explicación interpretativa.'
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene el texto de trabajo estable, con acuerdo alto entre los controles de revisión y sin observaciones pendientes que alteren la traducción base.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evita «Cristo»/«Mesías» porque no hay léxico correspondiente en el versículo.
  - Se mantiene la metáfora de las fuentes sin sustituirla por una glosa explicativa en el cuerpo principal.
  - La puntuación y el orden siguen la cadencia poética española natural, sin perder el paralelismo hebreo.
