id: GEN.37.32
reference: Genesis 37:32
source:
  edition: WLC
  text: וַֽ/יְשַׁלְּח֞וּ אֶת כְּתֹ֣נֶת הַ/פַּסִּ֗ים וַ/יָּבִ֨יאוּ֙ אֶל אֲבִי/הֶ֔ם וַ/יֹּאמְר֖וּ זֹ֣את מָצָ֑אנוּ הַכֶּר נָ֗א הַ/כְּתֹ֧נֶת בִּנְ/ךָ֛ הִ֖וא אִם לֹֽא־־־־׃
translation:
  text: Then they sent the robe with long sleeves and brought it to their father[a], and said, “We found this[b]. Please identify whether it is your son's robe or not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the ornate robe,” “the richly ornamented tunic”; traditionally, “the robe of many colors.” The Hebrew expression is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or “Please recognize.” The wording is significant in the larger narrative, where recognition and misrecognition recur.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלְּחוּ
  chosen: Then they sent
  alternatives:
  - Then they dispatched
  - Then they sent along
  lexicon: HALOT
  rationale: The verb שלח in the piel/waw-consecutive here naturally means 'send.' 'Then' reflects the narrative waw sequence. 'Sent' is preferable to 'dispatched' for readable modern English.
- source_word: כְּתֹנֶת הַפַּסִּים
  chosen: the long-sleeved robe
  alternatives:
  - the ornate robe
  - the richly ornamented tunic
  - the robe of many colors
  lexicon: HALOT
  rationale: כְּתֹנֶת is a tunic/robe-like garment. פַּסִּים is lexically uncertain; likely refers to a garment reaching to the palms/soles, hence a long or full-length, possibly long-sleeved robe, rather than specifically 'many colors.' To avoid importing traditional but uncertain wording, 'long-sleeved robe' best reflects the likely sense while remaining readable.
- source_word: וַיָּבִיאוּ אֶל אֲבִיהֶם
  chosen: and brought it to their father
  alternatives:
  - and brought it to their father Jacob
  lexicon: HALOT
  rationale: The object is the robe just mentioned, so English idiom supplies 'it.' 'Their father' is the explicit Hebrew wording and should not be expanded to the proper name in the main text.
- source_word: זֹאת מָצָאנוּ
  chosen: We found this
  alternatives:
  - This we found
  - We have found this
  lexicon: HALOT
  rationale: This preserves the deceptive simplicity of the brothers' statement. English fronting 'This we found' is possible but less natural; 'We found this' communicates the same sense in modern English.
- source_word: הַכֶּר נָא
  chosen: Please identify
  alternatives:
  - Please recognize
  - Recognize, please
  - Examine, please
  lexicon: HALOT
  rationale: נכר in the hiphil means to recognize/identify. 'Please identify' is natural modern English and fits the manipulative request directed to Jacob. 'Recognize' is more formal/literal and worth preserving in a footnote because it echoes the narrative irony.
- source_word: הַכְּתֹנֶת בִּנְךָ הִוא אִם לֹא
  chosen: whether it is your son's robe or not
  alternatives:
  - Is it your son's robe or not?
  - whether this is your son's robe or not
  lexicon: HALOT
  rationale: The Hebrew clause is an indirect question introduced by אם לא, literally 'whether ... or not.' Rendering it as an indirect question after 'Please identify' is smooth and faithful. 'Your son' preserves the brothers' distancing language toward Joseph.
