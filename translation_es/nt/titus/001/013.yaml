review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en «Este testimonio es verdadero» y en el mandato «repréndelos». Sin embargo, no preserva del todo la decisión auditada del POB en ἐν τῇ πίστει: el inglés eligió «the faith» como lectura principal y dejó «faith» como alternativa en nota. En español, «en la fe» puede funcionar, pero la nota actual repite la misma frase del texto y no refleja con claridad la alternativa entre «la fe» como cuerpo doctrinal y «su fe» como fe subjetiva.'
  spanish_quality_summary: 'El español es claro y natural, pero «severamente» suena un poco más punitivo que ἀποτόμως y que el inglés «sharply». «Con firmeza» o «duramente» serían opciones, pero «severamente» sigue siendo aceptable. El problema principal de legibilidad está en la nota: «O “sanos en la fe”» no ofrece una alternativa real al texto ya que el texto mismo dice «sanos en la fe».'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La cuestión clave es πίστις: dado que el rastro auditado del POB privilegia «the faith», el español debe mantener esa lectura principal y reservar en nota la alternativa más subjetiva («su fe»).'
  issues:
  - severity: medium
    issue: La nota al pie no preserva correctamente la alternativa documentada para ἐν τῇ πίστει.
    rationale: El POB inglés traduce principal «the faith» y anota la alternativa «faith». La nota española actual dice «O “sanos en la fe”», que duplica el texto principal y no comunica la distinción semántica entre la fe cristiana como cuerpo de creencias y la fe de ellos.
  - severity: low
    issue: «Severamente» puede sonar ligeramente más fuerte que «sharply/ἀποτόμως».
    rationale: No es una desviación grave, pero «con firmeza» o «duramente» reflejarían mejor la idea de reprensión aguda sin acento tan punitivo. Aun así, no hace falta forzar ese cambio si se mantiene el resto.
  revised_spanish_text: Este testimonio es verdadero. Por esta razón[a], repréndelos severamente, para que sean sanos en la fe,
  revised_footnotes:
  - marker: a
    text: O «sanos en su fe». La expresión griega puede referirse tanto a estar sanos en su propia fe como a estar sanos en la fe cristiana como conjunto de creencias.
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal, porque es fiel y natural, pero se corrige la nota para que represente de verdad la alternativa documentada del POB: la lectura principal «en la fe» como cuerpo doctrinal, frente a la alternativa «en su fe» como fe subjetiva. No se requiere cambiar el cuerpo del versículo.'
