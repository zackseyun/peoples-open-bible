review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: secuencia narrativa con «Cuando… vieron», preserva «los hombres de Asdod», mantiene «el arca del Dios de Israel», y conserva la perspectiva filistea en «Dagón, nuestro dios». Sin embargo, en la cláusula idiomática קָשְׁתָה יָדוֹ עָלֵינוּ, el español «su mano pesa duramente contra nosotros» añade una intensificación interpretativa («duramente») que no está en el hebreo ni en el rastro auditado en inglés. Además, las notas al pie están desalineadas: [a] en el inglés auditado corresponde al verbo «remain/stay», no a כִּי כֵן; y falta una nota para explicar el modismo «su mano es pesada».'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. No obstante, «pesa duramente contra» suena algo forzado en español bíblico moderno; «su mano es pesada contra» o «su mano pesa contra» preserva mejor la metáfora sin sobreinterpretar. También conviene reubicar las notas para que expliquen exactamente los puntos léxicos significativos del texto.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» y «nuestro dios» están bien. No aparece YHWH ni Mesías/Cristo. La preservación de la metáfora de la «mano» divina concuerda con la filosofía POB, pero debe hacerse sin añadir matiz no documentado.
  issues:
  - severity: medium
    issue: «su mano pesa duramente contra nosotros» añade intensificación no presente en el hebreo
    rationale: קָשְׁתָה יָדוֹ significa literalmente que «su mano es pesada / se ha hecho pesada». El adverbio «duramente» interpreta y amplifica el modismo en vez de preservarlo con mayor cercanía.
  - severity: medium
    issue: Las notas al pie no siguen la distribución y función del audit trail inglés
    rationale: La nota [a] en el borrador comenta כִּי כֵן, pero en el inglés auditado la primera nota documenta la alternativa de יֵשֵׁב («remain/stay»). Además, falta una nota para el modismo «his hand is heavy against us», que el audit trail sí conserva.
  - severity: low
    issue: La nota [a] propuesta para «que así era» es innecesaria y poco respaldada por el rastro auditado
    rationale: El inglés final no conserva nota para «it was so». Crear una nota allí introduce complejidad sin necesidad, mientras omite una nota donde sí hay motivación auditada.
