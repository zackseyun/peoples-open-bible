id: PHP.3.5
reference: Philippians 3:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: περιτομῇ ὀκταήμερος, ἐκ γένους Ἰσραήλ, φυλῆς Βενιαμίν, Ἑβραῖος ἐξ Ἑβραίων, κατὰ νόμον Φαρισαῖος,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/005.yaml
  text: circumcised on the eighth day, from the people of Israel, of the tribe of Benjamin, a Hebrew from Hebrews; according to the law, a Pharisee,
  footnotes:
  - marker: a
    text: Or 'a Hebrew born of Hebrews,' emphasizing Paul's Hebrew parentage and identity.
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 난 지 팔 일 만에 할례를 받았고, 이스라엘 백성에 속하며, 베냐민 지파요, 히브리인에게서 난 히브리인이며[a], 율법으로 말하면 바리새인이요,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「히브리인 부모에게서 난 히브리인」. 바울의 히브리적 혈통과 정체성을 강조한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτομῇ ὀκταήμερος
  english_pob_choice: circumcised on the eighth day
  chosen_korean: 난 지 팔 일 만에 할례를 받았고
  alternatives_korean:
  - 팔일에 할례를 받은 자
  - 제 팔일에 할례를 받았으며
  lexicon: BDAG
  rationale: 압축된 헬라어 구문을 자연스러운 한국어 시간 구문으로 풀어 옮긴다. 한국 전통 번역(개역개정 「난 지 팔일 만에」)과도 일치하며 유대 언약 표지를 분명히 살린다.
- source_word: ἐκ γένους Ἰσραήλ
  english_pob_choice: from the people of Israel
  chosen_korean: 이스라엘 백성에 속하며
  alternatives_korean:
  - 이스라엘 족속에서 났으며
  - 이스라엘 민족 출신이며
  lexicon: BDAG
  rationale: γένους가 종족적 유래를 가리키므로 「이스라엘 백성에 속하며」가 자연스럽다. 「족속」도 가능하나 다소 옛 어감이 있다.
- source_word: φυλῆς Βενιαμίν
  english_pob_choice: of the tribe of Benjamin
  chosen_korean: 베냐민 지파요
  alternatives_korean:
  - 베냐민 지파에 속하며
  lexicon: BDAG
  rationale: 「지파」는 한국 성경 전통의 정착된 어휘이며, 열거 구조에서 「~요」로 자연스럽게 이어진다. 베냐민은 표준 한국 성서 음역.
- source_word: Ἑβραῖος ἐξ Ἑβραίων
  english_pob_choice: a Hebrew from Hebrews
  chosen_korean: 히브리인에게서 난 히브리인
  alternatives_korean:
  - 히브리인 중의 히브리인
  - 히브리인 부모에게서 난 히브리인
  lexicon: BDAG
  rationale: 헬라어의 강조적 압축 표현(ἐξ + 같은 명사 복수)을 한국어 자연 구문 「~에게서 난 ~」으로 옮긴다. 「히브리인 중의 히브리인」은 잘 알려진 대안이나 ἐκ의 출생·기원 함의를 약하게 한다.
- source_word: κατὰ νόμον
  english_pob_choice: according to the law
  chosen_korean: 율법으로 말하면
  alternatives_korean:
  - 율법에 따라
  - 율법에 관하여는
  lexicon: BDAG
  rationale: κατά + 명사가 평가 기준을 가리킬 때 한국어 「~으로 말하면」이 가장 자연스러우며, 뒤따르는 절의 평가 어조와 잘 어울린다. 글로사리 기본형 「율법」 유지.
- source_word: Φαρισαῖος
  english_pob_choice: a Pharisee
  chosen_korean: 바리새인
  alternatives_korean: []
  lexicon: BDAG
  rationale: 「바리새인」은 한국 성서 전통의 정착된 음역이다.
