translation:
  language: es
  text: 'Pero Juan seguía tratando de impedírselo[a], diciendo: «Yo necesito ser bautizado por ti, ¿y tú vienes a mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Juan trató de impedirlo». El imperfecto griego puede sugerir una acción repetida o continuada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca contraste suave con la acción anterior; «Pero» reproduce bien el giro en español sin sobrecargarlo.
- source_word: διεκώλυεν
  english_pob_choice: kept trying to prevent
  chosen_spanish: seguía tratando de impedírselo
  alternatives_spanish:
  - impedía
  - trataba de impedirlo
  - seguía impidiéndoselo
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o reiterada. «Seguía tratando de» conserva ese matiz mejor que un pretérito simple como «impedía».
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: se lo
  alternatives_spanish:
  - a él
  - lo
  lexicon: BDAG
  rationale: En español, el complemento directo y el referente de la acción se expresan con clíticos naturales; «se lo» evita ambigüedad y mantiene la referencia a Jesús.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio se vierte naturalmente como gerundio para unir la negativa de Juan con su explicación hablada.
- source_word: χρείαν ἔχω
  english_pob_choice: I need
  chosen_spanish: yo necesito
  alternatives_spanish:
  - tengo necesidad
  - me hace falta
  - es necesario que yo
  lexicon: BDAG
  rationale: La expresión idiomática se entiende con un verbo directo en español. «Yo necesito» es claro y fiel sin sonar arcaico.
- source_word: ὑπὸ σοῦ
  english_pob_choice: by you
  chosen_spanish: por ti
  alternatives_spanish:
  - de ti
  lexicon: BDAG
  rationale: Con el infinitivo pasivo, ὑπό + genitivo expresa agente; «por ti» conserva esa función con naturalidad en español.
- source_word: βαπτισθῆναι
  english_pob_choice: to be baptized
  chosen_spanish: ser bautizado
  alternatives_spanish:
  - ser sumergido
  lexicon: BDAG
  rationale: «Bautizar» es el equivalente establecido y preciso en español eclesial; «ser bautizado» refleja bien el pasivo del infinitivo.
- source_word: καὶ σὺ ἔρχῃ πρός με;
  english_pob_choice: and do you come to me?
  chosen_spanish: ¿y tú vienes a mí?
  alternatives_spanish:
  - ¿y tú vienes hacia mí?
  - ¿y tú llegas a mí?
  lexicon: BDAG
  rationale: La pregunta retórica se expresa de forma natural con presente simple en español. «Vienes a mí» conserva la fuerza del griego sin añadir interpretación.
theological_decisions:
- issue: Objection de Juan ante el bautismo de Jesús
  english_pob_reading: Render the statement plainly as John's recognition of Jesus' superiority and his own need to receive baptism from Jesus, without importing later doctrinal explanation into the translation.
  chosen_spanish_reading: Presentar la frase como la objeción de Juan y su reconocimiento de que él mismo necesita recibir bautismo de Jesús, sin resolver en la traducción si el énfasis es moral, de rango o ambos.
  alternative_spanish_readings:
  - Interpretar la frase principalmente como confesión de pecado personal
  - Interpretar la frase principalmente como reconocimiento de autoridad/superioridad
  rationale: El verso expresa la tensión teológica pero no la explica. La redacción española debe conservar esa tensión y no imponer una explicación que el texto no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Coincide con la última pasada de revisión, sin cambios necesarios; se mantiene el valor aspectual del imperfecto y la sencillez retórica de la pregunta final.
  spanish_consistency_notes:
  - Se mantiene «bautizado» para βαπτισθῆναι, en continuidad con la terminología POB y el uso eclesial claro en español.
  - Se usa «por ti» para ὑπὸ σοῦ por su valor de agente con la pasiva.
  - Se conserva el contraste suave de δὲ con «Pero», sin añadir matices interpretativos como «sin embargo» o «no obstante».
