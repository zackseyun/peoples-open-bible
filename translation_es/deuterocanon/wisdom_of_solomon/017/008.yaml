translation:
  language: es
  text: Porque los que prometían ahuyentar los temores y las perturbaciones de un alma enferma, ellos mismos padecían un temor ridículo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un temor risible». El griego εὐλάβεια puede significar en otros contextos «cautela» o incluso «reverencia», pero aquí el contexto exige un sentido negativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπισχνούμενοι
  english_pob_choice: promised
  chosen_spanish: prometían
  alternatives_spanish:
  - se comprometían a
  - prometieron
  lexicon: LSJ
  rationale: El participio expresa asumir o hacer una promesa; en español, el imperfecto 'prometían' conserva el valor durativo/descriptivo del participio en contexto narrativo.
- source_word: δείματα
  english_pob_choice: fears
  chosen_spanish: temores
  alternatives_spanish:
  - miedos
  - terrores
  lexicon: LSJ
  rationale: '''Temores'' transmite el campo semántico general de cosas temidas sin elevar indebidamente la intensidad; encaja bien con el paralelo con ''perturbaciones''.'
- source_word: ταραχὰς
  english_pob_choice: disturbances
  chosen_spanish: perturbaciones
  alternatives_spanish:
  - alborotos
  - trastornos
  lexicon: LSJ
  rationale: La palabra sugiere agitación o desorden interior; 'perturbaciones' conserva el sentido de intranquilidad mental sin convertirlo en un término técnico.
- source_word: ἀπελαύνειν
  english_pob_choice: to drive away
  chosen_spanish: ahuyentar
  alternatives_spanish:
  - expulsar
  - alejar
  lexicon: LSJ
  rationale: '''Ahuyentar'' es una equivalencia natural en español para expulsar o hacer huir, y mantiene la imagen vívida de apartar algo temible.'
- source_word: ψυχῆς νοσούσης
  english_pob_choice: from a sick soul
  chosen_spanish: de un alma enferma
  alternatives_spanish:
  - de un alma enferma de enfermedad
  - de un alma doliente
  - de una mente enferma
  lexicon: LSJ
  rationale: '''Alma'' preserva ψυχή como vida interior o persona interior, y ''enferma'' mantiene la metáfora sin reducirla a ''mente''.'
- source_word: καταγέλαστον
  english_pob_choice: ridiculous
  chosen_spanish: ridículo
  alternatives_spanish:
  - risible
  - mofoso
  lexicon: LSJ
  rationale: '''Ridículo'' reproduce el tono de desprecio o burla de la construcción griega de forma natural en español.'
- source_word: εὐλάβειαν
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - temor reverente
  - cautela
  - timidez
  lexicon: LSJ
  rationale: La revisión inglesa optó por 'fear' para una lectura más directa y natural; en español, 'temor' mantiene esa negatividad irónica sin introducir el sentido positivo de 'reverencia' que εὐλάβεια puede tener en otros contextos.
- source_word: ἐνόσουν
  english_pob_choice: were sick with
  chosen_spanish: padecían
  alternatives_spanish:
  - estaban enfermos de
  - sufrían de
  lexicon: LSJ
  rationale: El verbo repite la imagen de enfermedad. 'Padecían' es una forma idiomática de conservar la idea de estar aquejados por algo, sin perder la resonancia metafórica.
theological_decisions:
- issue: Sentido de εὐλάβεια en un contexto irónico y negativo
  english_pob_reading: fear
  chosen_spanish_reading: temor
  alternative_spanish_readings:
  - reverencia
  - cautela
  - timidez
  rationale: 'El contexto inmediato habla de temores, perturbaciones y enfermedad interior; por eso εὐλάβεια no debe leerse como ''reverencia'' aquí. ''Temor'' conserva la ironía y el contraste: quienes se presentaban como liberadores de temores estaban ellos mismos dominados por un temor ridículo.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: εὐλάβεια se traduce aquí con un sustantivo negativo y directo (''temor''), evitando ''temor reverente'' o ''reverencia'' por la ironía del pasaje. También se mantiene la metáfora de enfermedad con un verbo español natural (''padecían'') y se conserva la relación retórica entre el mal que prometían expulsar y el mal que efectivamente los dominaba.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la terminología POB, pero este verso no contiene el nombre divino.
  - '''Alma'' se conserva para ψυχή en línea con el valor antropológico/metafórico del texto.'
  - '''Temor'' se emplea como equivalente negativo de εὐλάβεια; no se introdujo ''reverencia'' porque el contexto la contradice.'
  - La puntuación reproduce una sola proposición explicativa con contraste final, acorde con la sintaxis del griego.
