translation:
  language: es
  text: 'Yahvé me dijo: «Proclama todas estas palabras en las ciudades de Judá y en las calles[a] de Jerusalén, diciendo: “Oigan[b] las palabras de este pacto y háganlas”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «en las plazas de Jerusalén»; el hebreo se refiere a lugares públicos abiertos dentro de la ciudad.'
    reason: lexical_alternative
  - marker: b
    text: '«Oigan» también puede traducirse «escuchen». Algunas traducciones lo interpretan como «obedezcan», pero la cláusula siguiente ya expresa explícitamente el llamado a la acción: «y háganlas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton según el criterio del proyecto, en forma natural y reconocible en español. Se evita la sustitución por un título en mayúsculas, porque el texto fuente presenta el nombre personal de Dios.
- source_word: קְרָא
  english_pob_choice: Proclaim
  chosen_spanish: Proclama
  alternatives_spanish:
  - Clama
  - Anuncia
  - Declara públicamente
  lexicon: HALOT
  rationale: El mandato exige una proclamación pública y autorizada. 'Proclama' transmite mejor ese valor formal que un 'llama' más literal pero menos preciso en español.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos asuntos
  lexicon: HALOT
  rationale: '''Palabras'' conserva la referencia verbal y profética del hebreo דְּבָרִים y mantiene la relación con la cita que sigue.'
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - por las ciudades de Judá
  - en los pueblos de Judá
  lexicon: HALOT
  rationale: La traducción directa mantiene la especificidad geográfica y el sentido locativo del hebreo.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִַם
  english_pob_choice: and in the streets of Jerusalem
  chosen_spanish: y en las calles de Jerusalén
  alternatives_spanish:
  - y en las plazas de Jerusalén
  - y en los espacios abiertos de Jerusalén
  lexicon: HALOT
  rationale: '''Calles'' funciona de manera natural en español moderno y conserva la idea de espacios públicos urbanos donde la proclamación puede oírse ampliamente. La alternativa ''plazas'' queda implícita en la nota textual.'
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan/escuchen
  lexicon: HALOT
  rationale: Se conserva el valor básico de oír/prestar atención sin convertirlo en 'obedezcan', porque la obediencia se expresa en el verbo siguiente.
- source_word: דִּבְרֵי הַבְּרִית הַזֹּאת
  english_pob_choice: the words of this covenant
  chosen_spanish: las palabras de este pacto
  alternatives_spanish:
  - las palabras de esta alianza
  - los términos de este pacto
  lexicon: HALOT
  rationale: '''Pacto'' es una opción muy estable en español bíblico para בְּרִית y evita una lectura demasiado eclesiástica. ''Palabras'' conserva el enlace con ''estas palabras'' del inicio del versículo.'
- source_word: וַעֲשִׂיתֶם אוֹתָם
  english_pob_choice: and do them
  chosen_spanish: y háganlas
  alternatives_spanish:
  - y pónganlas por obra
  - y cúmplanlas
  lexicon: HALOT
  rationale: '''Hacerlas'' en español se expresa mejor con ''háganlas'' para conservar el paralelismo y el peso práctico del hebreo עשה aplicado a las palabras del pacto.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la convención del proyecto de conservar el nombre propio de Dios en lugar de sustituirlo por un título. 'Yahvé' es la forma española estable y auditable que preserva la identidad del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si שִׁמְעוּ debe interpretarse como 'obedecer'
  english_pob_reading: Hear ... and do them
  chosen_spanish_reading: Oigan ... y háganlas
  alternative_spanish_readings:
  - Obedezcan ... y háganlas
  - Escuchen ... y obedézcanlas
  rationale: El hebreo distingue el acto de oír del acto de hacer; mantener ambos verbos evita borrar la tensión retórica y teológica. La obediencia queda explícita en el segundo verbo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador sigue de cerca el consenso alto entre la fuente hebrea, el audit trail inglés y la evaluación cruzada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conserva 'pacto' para בְּרִית por coherencia con el lenguaje bíblico y con el audit trail inglés.
  - Se evita convertir 'oigan' en 'obedezcan' para no fusionar dos verbos distintos del hebreo.
  - '''Calles'' se eligió como equivalente principal por naturalidad en español; la nota preserva la alternativa ''plazas''.'
