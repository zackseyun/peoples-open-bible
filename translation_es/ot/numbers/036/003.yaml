  text: וְ֠/הָיוּ לְ/אֶחָ֞ד מִ/בְּנֵ֨י שִׁבְטֵ֥י בְנֵֽי יִשְׂרָאֵל֮ לְ/נָשִׁים֒ וְ/נִגְרְעָ֤ה נַחֲלָתָ/ן֙ מִ/נַּחֲלַ֣ת אֲבֹתֵ֔י/נוּ וְ/נוֹסַ֕ף עַ֚ל נַחֲלַ֣ת הַ/מַּטֶּ֔ה אֲשֶׁ֥ר תִּהְיֶ֖ינָה לָ/הֶ֑ם וּ/מִ/גֹּרַ֥ל נַחֲלָתֵ֖/נוּ יִגָּרֵֽעַ־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/036/003.yaml
  text: And if they become wives to one of the sons of the tribes of the sons of Israel[a], then their inheritance will be taken away from the inheritance of our fathers and added to the inheritance of the tribe to which they belong, and it will be taken away from the allotted portion of our inheritance.
  footnotes:
  - marker: a
    text: Or 'from the lot of our inheritance.' The Hebrew literally says 'from the lot,' referring to the portion assigned by lot.
    reason: lexical_alternative
