review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia y el sentido general del griego: Ragüel habla de manera vinculante, antes de completarse los días de la boda, y prohíbe la salida hasta cumplirse los catorce días. Sin embargo, la construcción verbal y temporal puede ajustarse para reflejar con más naturalidad y precisión el valor de ἐὰν μὴ πληρωθῶσιν sin introducir una formulación algo pesada.'
  spanish_quality_summary: 'El texto es mayormente claro y fiel, pero ''antes de que los días de la boda se hubieran cumplido'' suena algo forzado en español bíblico natural, y ''que no saliera sino hasta que...'' es comprensible pero menos directo que una formulación con ''no debía irse ... hasta que''. También conviene quitar la nota al ancla equivocada: la nota léxica corresponde a ''bajo juramento'', no a ''boda''.'
  glossary_alignment: No hay términos del glosario principal en conflicto. 'Bajo juramento' refleja bien ἐνόρκως, aunque la alternativa documentada 'con juramento' debe seguir en nota. 'Boda' funciona bien para γάμος en este contexto festivo.
  issues:
  - severity: medium
    issue: Marcador de nota colocado en 'boda' en vez de en 'bajo juramento'
    rationale: La nota explica la alternativa léxica de ἐνόρκως ('con juramento'), no de γάμου. El anclaje actual puede confundir al lector y no sigue la disciplina de notas del proyecto.
  - severity: low
    issue: Construcción 'se hubieran cumplido' suena poco natural en este contexto
    rationale: Aunque es semánticamente defendible, en español resulta más idiomático 'se completaran' o 'terminaran' para los días de la boda, manteniendo el valor pasivo/completivo de συντελεσθῆναι.
  - severity: low
    issue: '''que no saliera sino hasta que'' es menos claro que una formulación más natural'
    rationale: El griego expresa la instrucción de no partir hasta cumplirse el plazo. 'Que no debía irse hasta que...' o 'que no saliera hasta que...' fluye mejor en español y evita la rigidez de 'sino hasta que'.
  revised_spanish_text: Y Ragüel le dijo, bajo juramento[a], antes de que se completaran los días de la boda, que no debía irse hasta que se cumplieran los catorce días de la boda.
  revised_footnotes:
  - marker: a
    text: 'O: «con juramento». El adverbio griego indica que Ragüel vinculó la instrucción mediante juramento.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota en la expresión correcta ('bajo juramento'), se mejora la naturalidad de 'antes de que se completaran los días de la boda' para reflejar συντελεσθῆναι, y se ajusta la cláusula de mandato a un español más claro ('no debía irse hasta que...') sin perder el sentido vinculante ni el límite temporal del original.
