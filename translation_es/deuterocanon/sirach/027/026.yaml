translation:
  language: es
  text: El que cava un foso caerá en él, y el que tiende un lazo[a] será atrapado en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una trampa». «Lazo» conserva mejor la imagen de παγίδα como artefacto para atrapar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀρύσσων
  english_pob_choice: the one who digs
  chosen_spanish: el que cava
  alternatives_spanish:
  - quien cava
  - el que excava
  lexicon: LSJ
  rationale: El participio con artículo funciona de manera sustantiva y proverbial; «el que cava» mantiene la generalidad impersonal y suena natural en español sin perder el valor de sentencia.
- source_word: βόθρον
  english_pob_choice: a pit
  chosen_spanish: un hoyo
  alternatives_spanish:
  - un pozo
  - un foso
  lexicon: LSJ
  rationale: En español, «hoyo» comunica con claridad la imagen de una cavidad abierta y preparada para hacer caer a alguien. «Pozo» puede sugerir otra función; «foso» es más técnico o militar.
- source_word: ἐμπεσεῖται
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - caerá dentro
  - se precipitará
  lexicon: BDAG
  rationale: El futuro de ἐμπίπτω se expresa de modo natural con «caerá»; el complemento «en él» conserva la dirección del movimiento sin forzar la sintaxis.
- source_word: ὁ ἱστῶν
  english_pob_choice: the one who sets
  chosen_spanish: el que pone
  alternatives_spanish:
  - el que coloca
  - el que tiende
  lexicon: LSJ
  rationale: Para una «trampa», «poner» es la colocación más idiomática en español y preserva la idea de instalar el artificio sin añadir especificaciones no presentes en el griego.
- source_word: παγίδα
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - una red
  - un lazo
  lexicon: BDAG
  rationale: Aunque «snare» puede traducirse como «lazo» o «red» según contexto, aquí «trampa» es el equivalente más transparente para el lector moderno y mantiene la fuerza proverbial de la imagen.
- source_word: ἁλώσεται
  english_pob_choice: will be caught
  chosen_spanish: será atrapado
  alternatives_spanish:
  - será prendido
  - será capturado
  lexicon: BDAG
  rationale: El pasivo futuro de ἁλίσκομαι expresa quedar preso por la trampa; «será atrapado» comunica esa pasividad de manera clara en español y conserva el paralelismo con «caerá».
theological_decisions:
- issue: Lectura proverbial de retribución implícita
  english_pob_reading: The one who digs a pit will fall into it, and the one who sets a snare will be caught in it.
  chosen_spanish_reading: El que cava un hoyo caerá en él, y el que pone una trampa será atrapado en ella.
  alternative_spanish_readings:
  - Quien cava un hoyo caerá en él, y quien pone una trampa será atrapado en ella.
  - El que cava una fosa caerá en ella, y el que tiende una trampa será prendido en ella.
  rationale: El versículo presenta una sentencia sapiencial sobre la consecuencia del mal planeado, no una enseñanza doctrinal específica. La traducción debe conservar ese tono proverbial sin explicitar más de lo que dice el texto.
  doctrine_reference: Sabiduría proverbial; retribución moral implícita
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo y no muestran cambios de revisión; por ello, la versión española sigue de cerca la imagen proverbial básica sin introducir variantes textuales ni notas de corrección.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de dos miembros con futuro en español: «caerá» / «será atrapado».'
  - «Hoyo» se eligió para βόθρον por ser natural y visual en español, sin añadir connotaciones ajenas al contexto.
  - Se evitó «SEÑOR» o terminología teológica no presente, porque el versículo no contiene vocabulario divino explícito.
