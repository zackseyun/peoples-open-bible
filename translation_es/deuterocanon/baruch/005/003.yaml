    rationale: τῇ ὑπʼ οὐρανὸν πάσῃ significa «a todos bajo el cielo» / «a todo lo que está bajo el cielo» como expresión de universalidad. Añadir «los que están» no es necesario y hace la línea más pesada.
  - severity: low
