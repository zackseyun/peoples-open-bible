translation:
  language: es
  text: 'Y su hermano Asaf estaba de pie a su derecha[a]: Asaf, hijo de Berequías, hijo de Simea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a su lado derecho”. La expresión hebrea indica posición al lado derecho de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָחִיו
  english_pob_choice: And his brother
  chosen_spanish: Y su hermano
  alternatives_spanish:
  - Y su pariente
  - Ahora su hermano
  lexicon: HALOT
  rationale: La forma básica אָח con sufijo de tercera persona masculina singular se entiende de modo natural como “hermano”. En este contexto genealógico/organizativo, “pariente” sería posible en abstracto, pero “hermano” conserva mejor la relación explícita del texto fuente y coincide con la decisión auditada en inglés.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaph
  lexicon: Transliteración estándar
  rationale: Nombre propio; en español bíblico es más natural la forma “Asaf”, que respeta la transliteración sin añadir interpretación.
- source_word: הָעֹמֵד
  english_pob_choice: stood
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba de pie
  - se hallaba
  lexicon: HALOT
  rationale: El participio de עמד expresa posición/estado de estar de pie. En español, “estaba” con el complemento local transmite la postura de manera fluida y suficientemente fiel en una fórmula genealógica. “Estaba de pie” sería más explícito, pero algo más pesado.
- source_word: עַל יְמִינוֹ
  english_pob_choice: at his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su lado derecho
  - a su diestra
  lexicon: HALOT
  rationale: La construcción hebrea denota ubicación en el lado derecho de alguien. “A su derecha” conserva la relación espacial de forma natural en español; “a su diestra” sería más tradicional, pero menos neutral y más cargado estilísticamente.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Fórmula genealógica estándar. En español, “hijo de” reproduce con claridad la relación filial y preserva la estructura repetida del hebreo.
- source_word: בֶּרֶכְיָהוּ
  english_pob_choice: Berechiah
  chosen_spanish: Berequías
  alternatives_spanish:
  - Berecías
  - Berequiah
  lexicon: Transliteración estándar
  rationale: Se adopta la forma española bíblica “Berequías”, que es más reconocible y fonéticamente adecuada en español que la transliteración inglesa.
- source_word: שִׁמְעָא
  english_pob_choice: Shimea
  chosen_spanish: Sima
  alternatives_spanish:
  - Simea
  - Shimea
  lexicon: Transliteración estándar
  rationale: La forma hebrea שִׁמְעָא admite varias representaciones. Se elige “Sima” como adaptación española breve y publicable; mantiene la referencia al nombre propio sin forzar una grafía inglesa.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético proporcionado y el audit trail inglés. No hubo revisiones textuales aplicadas; la única variación relevante es la naturalización al español de los nombres propios y de la locución espacial.
  spanish_consistency_notes:
  - 'Se mantuvo la estructura genealógica repetida: “hijo de ... hijo de ...”.'
  - Se preservó la relación espacial del hebreo con una construcción idiomática en español.
  - Los nombres propios se normalizaron a formas españolas publicables cuando existían equivalentes establecidos.
