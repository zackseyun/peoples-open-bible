revisions:
- from: Y así también este otro pasó[a] en pureza, habiendo puesto su plena confianza en el Señor[b].
  to: Y así también este otro murió en pureza[a], habiendo puesto su plena confianza en el Señor[b].
  rationale: Se reemplaza «pasó» por «murió» porque μετήλλαξεν, aunque eufemístico en griego, debe seguir siendo claro y natural en español. «Murió en pureza» conserva la carga moral de καθαρῶς y evita una expresión española incompleta o ambigua. Se mantienen las notas existentes, ya que siguen reflejando bien las alternativas léxicas documentadas.
