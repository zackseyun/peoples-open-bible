translation:
  language: es
  text: Cada uno[a] se sentará debajo de su vid y debajo de su higuera, y no habrá quien los atemorice, porque la boca de Yahvé de los Ejércitos[b] ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno se sentará debajo de su vid y debajo de su higuera». El hebreo tiene «cada hombre», una forma singular masculina usada distributivamente.'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Yahvé de los ejércitos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָשְׁבוּ
  english_pob_choice: And ... will sit
  chosen_spanish: se sentará
  alternatives_spanish:
  - habitará
  - vivirá
  - se establecerá
  lexicon: HALOT
  rationale: El hebreo יָשַׁב en este contexto profético conserva la imagen concreta de sentarse o vivir en seguridad. En español, «se sentará» mantiene la escena sin volverla demasiado abstracta, y el futuro refleja el valor profético.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: Cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  - todos
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente después del verbo plural. «Cada uno» comunica bien el valor distributivo en español sin forzar un masculino explícito que el texto revisado en inglés ya suavizó.
- source_word: תַּ֧חַת גַּפְנ֛וֹ
  english_pob_choice: under his vine
  chosen_spanish: debajo de su vid
  alternatives_spanish:
  - bajo su vid
  - bajo la vid de él
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de prosperidad y seguridad. «Debajo de su vid» es natural en español y mantiene la concreción del hebreo.
- source_word: וְתַ֥חַת תְּאֵנָת֖וֹ
  english_pob_choice: and under his fig tree
  chosen_spanish: y debajo de su higuera
  alternatives_spanish:
  - y bajo su higuera
  - y bajo la higuera de él
  lexicon: HALOT
  rationale: La pareja «vid / higuera» es una imagen fija de paz y abundancia. «Higuera» reproduce de forma transparente תְּאֵנָה y conserva el paralelismo.
- source_word: וְאֵ֣ין מַחֲרִ֑יד
  english_pob_choice: and there will be no one to make them afraid
  chosen_spanish: y no habrá quien los haga temer
  alternatives_spanish:
  - y nadie los atemorizará
  - y no habrá quien los amedrente
  lexicon: HALOT
  rationale: מַחֲרִיד expresa al que hace estremecer o teme. «Quien los haga temer» preserva la idea de un agente causante del miedo y suena natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o motivo de la afirmación anterior. «Porque» es la equivalencia más clara y directa en español.
- source_word: פִּי יְהוָה צְבָאוֹת
  english_pob_choice: the mouth of Yahweh of Armies
  chosen_spanish: la boca de Yahvé de los Ejércitos
  alternatives_spanish:
  - la boca de Yahvé de los ejércitos
  - la boca del Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «la boca de» para mantener la fuerza de palabra declarada con certeza. «Yahvé» sigue el término del proyecto para יְהוָה, y «de los Ejércitos» traduce צְבָאוֹת de modo transparente en español.
- source_word: דִּבֵּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - habló
  lexicon: HALOT
  rationale: El perfecto enfatiza la solidez y vigencia de la declaración divina. «Ha hablado» es solemne, natural y conserva el peso profético del enunciado.
theological_decisions:
- issue: Renderización de יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El paquete fuente y la política del proyecto piden reflejar el Nombre divino con una forma audible en español. «Yahvé» mantiene la referencia al Tetragrama sin la convención de ocultarlo tras «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor distributivo de אִישׁ
  english_pob_reading: each
  chosen_spanish_reading: Cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: El hebreo usa un singular masculino distributivo, pero la revisión inglesa ya optó por evitar una formulación innecesariamente marcada. «Cada uno» conserva el distributivo sin añadir una lectura sexista que el propio flujo del verso no exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Imagen de seguridad doméstica bajo vid e higuera
  english_pob_reading: under his vine and under his fig tree
  chosen_spanish_reading: debajo de su vid y debajo de su higuera
  alternative_spanish_readings:
  - bajo su vid y bajo su higuera
  - debajo de su parra y debajo de su higuera
  rationale: La imagen es una fórmula bíblica de paz, estabilidad y prosperidad. Se conserva literalmente para no diluir su valor simbólico, pero con sintaxis española natural.
  doctrine_reference: 'DOCTRINE.md: Figurative idiom preservation'
translation_notes:
  revision_awareness: La revisión más reciente del POB en inglés redujo «each man» a «each» para reflejar con mayor naturalidad el distributivo de אִישׁ. Esta versión española sigue esa línea con «Cada uno», manteniendo además la imagen verbal y las decisiones auditadas sobre la paz, el temor y el Nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Nombre divino, coherente con las instrucciones del proyecto.
  - «Cada uno» evita un masculino innecesario y sigue la revisión inglesa reciente.
  - La pareja «vid / higuera» se conserva literal por su valor idiomático profético.
  - La cláusula negativa se formula con agente («quien los haga temer») para reflejar מַחֲרִיד sin perder fluidez en español.
  - «La boca de Yahvé» preserva el hebraísmo y la solemnidad de la fórmula profética.
