revisions:
- from: Se ha acercado el fin[a]; ha llegado el fin. Ha despertado contra ti; mira[b], está viniendo.
  to: Ha llegado el fin; ha llegado el fin. Ha despertado[a] contra ti; he aquí[b], ya viene.
  rationale: Se corrigió בָּא a «ha llegado» para seguir más de cerca el hebreo y el POB auditado; se movió la nota [a] al verbo «Ha despertado», que es donde realmente pertenece; se ajustó הִנֵּה a «he aquí» para un registro más solemne y alineado con «behold»; y se reemplazó «está viniendo» por «ya viene» para mayor naturalidad sin perder inminencia.
