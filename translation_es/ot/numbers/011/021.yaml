revisions:
- from: 'Pero Moisés dijo: «El pueblo entre el cual estoy es de seiscientos mil hombres[a] de a pie, y tú has dicho: “Yo les daré carne, y comerán por un mes de días[b]”».'
  to: 'Pero Moisés dijo: «El pueblo entre el cual estoy cuenta con seiscientos mil[a] que van a pie, y tú has dicho: “Yo les daré carne, y comerán por un mes de días[b]”».'
  rationale: La revisión corrige la sobreespecificación de «hombres» en el texto principal, mantiene como sujeto a «el pueblo» conforme al hebreo y al razonamiento documentado del POB inglés, y mejora la naturalidad del español. Se conserva «entre el cual estoy» como opción aceptable y se mantiene el giro literal «un mes de días» con su nota explicativa.
