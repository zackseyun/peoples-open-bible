  glossary_alignment: No hay conflicto con la terminología del proyecto. «Impíos» es aceptable para רְשָׁעִים, aunque «malvados» también sería posible. «Justicia» para מִשְׁפָּט está bien. La nota léxica debe pulirse levemente en español para sonar más natural, pero conserva correctamente las alternativas documentadas.
