theological_decisions:
- issue: Meaning of 'sanctify' in relation to old covenant rites
  chosen_reading: Refers to ritual/cultic sanctification, not inward moral transformation
  alternative_readings:
  - Refers broadly to making a person holy in a spiritual sense
  rationale: The immediate context contrasts external purification ('of the flesh') with the cleansing of the conscience in v. 14. The translation therefore preserves the cultic sense without importing a fuller doctrine of inward sanctification into this verse.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: σάρξ'
- issue: Sense of σάρξ in this verse
  chosen_reading: Literal/external 'flesh' referring to bodily or outward ritual purity
  alternative_readings:
  - Metaphorical 'sinful nature'
  rationale: The verse concerns Levitical purification rites and explicitly contrasts external cleansing with inner conscience cleansing in the next verse. Therefore the literal/external sense is required here.
  doctrine_reference: 'Contested terms: σάρξ'
