translation:
  language: es
  text: Y tú[a], torre del rebaño, colina de la hija de Sion[b]—a ti llegará; sí, llegará el dominio anterior[c], el reino de la hija de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Migdal-Éder’, nombre de lugar; también posiblemente ‘torre de vigilancia del rebaño’.
    reason: alternative_reading
  - marker: b
    text: O ‘Ófel de la hija de Sion’, si ‘Ófel’ se toma como nombre de lugar más que como sustantivo común.
    reason: alternative_reading
  - marker: c
    text: ‘El dominio anterior’ probablemente se refiere a la restauración del antiguo gobierno real de Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: מִגְדַּל עֵדֶר
  english_pob_choice: tower of the flock
  chosen_spanish: torre del rebaño
  alternatives_spanish:
  - Migdal-Éder
  - torre de las ovejas
  lexicon: HALOT
  rationale: El hebreo es un sintagma transparente de sustantivos comunes; por eso se mantiene el sentido imagético en la traducción principal. ‘Rebaño’ comunica mejor el colectivo en español y conserva la fuerza pastoral. La forma transliterada se reserva como alternativa por la posible lectura como nombre propio.
- source_word: עֹפֶל
  english_pob_choice: hill
  chosen_spanish: colina
  alternatives_spanish:
  - Opel
  - fortaleza
  - cerro
  lexicon: HALOT
  rationale: En este contexto, el término funciona topográficamente y la equivalencia natural en español es ‘colina’. Se evita forzar un nombre propio en el texto principal, pero se preserva la posible lectura toponímica en nota.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: la hija de Sion
  alternatives_spanish:
  - Hija de Sion
  - Sion
  lexicon: HALOT
  rationale: Se conserva la personificación profética y la imagen filial del hebreo. ‘La hija de Sion’ es claro en español y mantiene la metáfora sin diluirla en un simple ‘Sion’.
- source_word: עָדֶיךָ
  english_pob_choice: to you
  chosen_spanish: hasta ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: La preposición puede tener sentido direccional de ‘hasta / a’. Dado el movimiento de llegada en la frase, ‘hasta ti’ expresa mejor la dirección y el alcance del venir.
- source_word: תֵּאתֶה
  english_pob_choice: it will come
  chosen_spanish: llegará
  alternatives_spanish:
  - vendrá
  - ella llegará
  lexicon: HALOT
  rationale: El verbo femenino singular apunta al dominio o reinado implícito. En español, ‘llegará’ suena natural y conserva el movimiento hacia la destinataria; se evita explicitar un sujeto que el hebreo deja implícito.
- source_word: וּבָאָה
  english_pob_choice: yes, ... will come
  chosen_spanish: sí, volverá
  alternatives_spanish:
  - sí, vendrá
  - y vendrá
  lexicon: HALOT
  rationale: La partícula enfática y la repetición verbal refuerzan la certeza del retorno. ‘Sí’ reproduce esa intensificación, y ‘volverá’ capta bien el valor restaurador que la POB documenta para el dominio anterior.
- source_word: הַמֶּמְשָׁלָה הָרִאשֹׁנָה
  english_pob_choice: the former dominion
  chosen_spanish: el dominio primero
  alternatives_spanish:
  - el dominio anterior
  - el primer dominio
  - el antiguo gobierno
  lexicon: HALOT
  rationale: ‘ממשלה’ denota dominio/gobierno. ‘Primero’ mantiene la ambigüedad temporal del hebreo y evita fijar demasiado pronto una interpretación histórica más específica que el texto no explicita.
- source_word: מַמְלֶכֶת
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: HALOT
  rationale: En español, ‘reino’ es la equivalencia más natural y conserva el contenido político de ‘kingdom’. Además, funciona bien en aposición con ‘el dominio primero’.
- source_word: לְבַת יְרוּשָׁלִָם
  english_pob_choice: of the daughter of Jerusalem
  chosen_spanish: de la hija de Jerusalén
  alternatives_spanish:
  - para la hija de Jerusalén
  - a la hija de Jerusalén
  lexicon: HALOT
  rationale: Se sigue la revisión del POB en inglés que ajusta la construcción a una relación más directa con ‘the kingdom’. En español, ‘de la hija de Jerusalén’ refleja mejor la dependencia sintáctica y preserva la personificación.
theological_decisions:
- issue: Cómo tratar los posibles nombres propios frente a sustantivos descriptivos en el inicio del versículo
  english_pob_reading: Literal/topographical renderings in the main text ('tower of the flock,' 'hill of daughter Zion')
  chosen_spanish_reading: ‘torre del rebaño’ y ‘colina de la hija de Sion’ en el texto principal
  alternative_spanish_readings:
  - ‘Migdal-Éder’ y/o ‘Opel de la hija de Sion’
  - ‘torre del rebaño’ como nombre propio implícito
  rationale: El hebreo presenta nombres descriptivos que pueden leerse también como topónimos. La traducción principal conserva el valor semántico visible del texto y deja la opción onomástica en nota, sin borrar la tensión entre lectura descriptiva y lectura de lugar tradicional.
  doctrine_reference: Principios de traducción POB §1, §3
- issue: Si ‘el dominio primero’ debe explicitar la restauración davídica
  english_pob_reading: Translate the political-restorative language without making the Davidic identification explicit in the main text
  chosen_spanish_reading: ‘el dominio primero’ sin añadir ‘davídico’
  alternative_spanish_readings:
  - ‘el antiguo dominio davídico’
  - ‘el reinado de David’
  rationale: El texto sí apunta a restauración política y real, pero no nombra a David aquí. Para no importar una conclusión interpretativa mayor que el alcance explícito del versículo, la formulación principal permanece sobria y abierta.
  doctrine_reference: Principios de traducción POB §3
translation_notes:
  revision_awareness: 'La redacción sigue el pass más reciente del audit trail en inglés: conserva el paralelismo enfático (‘sí’) y refleja la revisión que prefirió una construcción más directa para ‘of the daughter of Jerusalem’. También respeta la decisión revisada de no explicitar la identificación davídica en el cuerpo del versículo.'
  spanish_consistency_notes:
  - Se mantiene ‘Sion’ con transliteración asentada en español, no ‘Zión’.
  - Se usa ‘reino’ para kingdom y ‘dominio’ para ממשלה, preservando la diferencia léxica.
  - ‘Hija de Jerusalén’ conserva la personificación profética sin convertirla en un nombre fijo.
  - La puntuación con raya reproduce la pausa enfática del hebreo y del POB inglés.
