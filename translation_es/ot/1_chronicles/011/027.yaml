lexical_decisions:
- source_word: שַׁמּוֹת
  english_pob_choice: Shammoth
  chosen_spanish: Sammot
  alternatives_spanish:
  - Shammot
  lexicon: nombre propio
  rationale: Es un nombre propio masculino; se translitera en español para conservar la forma nominal del texto fuente. Se adapta la grafía al uso español sin añadir vocales o significados no presentes.
- source_word: הֲרוֹרִי
  english_pob_choice: the Harorite
  chosen_spanish: el harorita
  alternatives_spanish:
  - el harodita
  lexicon: gentilicio/clan
  rationale: El hebreo presenta un gentilicio con artículo. En español conviene mantener la terminación de pertenencia con 'harorita', que sigue la lectura de Crónicas y evita armonizar con el paralelo de Samuel sin base en este verso.
- source_word: חֶלֶץ
  english_pob_choice: Helez
  chosen_spanish: Helez
  alternatives_spanish:
  - Jelez
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se conserva la forma más cercana al hebreo y al uso bíblico habitual en español, sin traducirlo.
- source_word: פְּלוֹנִי
  english_pob_choice: the Pelonite
  chosen_spanish: el pelonita
  alternatives_spanish:
  - el paltita
  lexicon: gentilicio/clan
  rationale: Se mantiene el valor de gentilicio con artículo. 'Pelonita' refleja la forma masorética de Crónicas y evita sustituirla por la variante del paralelo de Samuel, que se documenta aparte.
translation_notes:
  revision_awareness: El texto hebreo de base y el audit trail inglés coinciden en mantener las formas de Crónicas y en documentar las variantes del paralelo de 2 Samuel mediante notas.
  spanish_consistency_notes:
  - Se conserva la estructura breve de una lista nominal, adecuada al hebreo del versículo.
  - Se usan gentilicios en minúscula por función descriptiva, no como nombres propios.
  - No se armoniza el texto con 2 Samuel 23:26 en el cuerpo principal; las variantes quedan en notas.
  - Se prefirió 'el' en español para reflejar el artículo definido del hebreo ante gentilicios.
