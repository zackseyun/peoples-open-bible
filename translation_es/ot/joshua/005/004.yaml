    reason: lexical_alternative
  - marker: b
    text: «Hombres de guerra» también puede verterse «hombres de combate» o «guerreros».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de estilo para mejorar la naturalidad del español sin cambiar el sentido del hebreo ni las decisiones auditadas del POB: se regularizó la enumeración con «todos los varones» y se sustituyó «en el camino» por «por el camino», que suena más idiomático en este contexto de trayecto.'
