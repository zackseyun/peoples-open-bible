review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido básico del hebreo: lengua/flecha, habla engañosa, paz al prójimo y acecho interior. También mantiene adecuadamente las notas sobre alternativas léxicas y la ambigüedad del objeto de la emboscada. Sin embargo, «flecha de matanza» suena poco natural en español y no expresa con suficiente claridad el valor participial letal de שוחט; una formulación como «flecha mortífera» comunica mejor la fuerza semántica sin perder la imagen. Además, «habla paz a su prójimo» es demasiado calcado; en español bíblico legible conviene «habla de paz con su prójimo», conservando la nota explicativa del hebraísmo.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos giros algo forzados: «flecha de matanza» y «habla paz a su prójimo». «Con su boca cada hombre habla de paz con su prójimo» lee mejor en español neutral y mantiene el contraste con «dentro de sí pone su emboscada». Las notas están bien formuladas; solo conviene ajustar la nota b para corresponder exactamente al texto revisado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave («prójimo», «engaño», «emboscada») son compatibles con el expediente inglés y con el hebreo. La única corrección léxica importante es reemplazar «de matanza» por una expresión española más idiomática que aún preserve la letalidad de שוחט.
  issues:
