id: JHN.8.35
reference: John 8:35
source:
  edition: SBLGNT
  text: ὁ δὲ δοῦλος οὐ μένει ἐν τῇ οἰκίᾳ εἰς τὸν αἰῶνα· ⸀ὁ υἱὸς μένει εἰς τὸν αἰῶνα.
translation:
  text: Now the slave does not remain in the household forever[b][a]; the son remains forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant'; Greek doulos can mean either, but 'slave' best preserves the contrast in status within the household here.
    reason: lexical_alternative
  - marker: b
    text: '''The son'' may also carry an implicit reference to Jesus in the surrounding context, though the wording here is also proverb-like.'
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Rendered 'slave' rather than 'servant' because the contrast with the son and the issue of permanent status in the household make the bonded, non-permanent status salient. This follows the doctrine guidance that doulos should be translated 'slave' where bonded status is theologically or contextually important.
- source_word: μένει
  chosen: remain
  alternatives:
  - stay
  - abide
  lexicon: BDAG
  rationale: Chose 'remain' for both occurrences to preserve the repetition of μένει and to communicate continuing status without the archaic feel of 'abide.'
- source_word: οἰκία
  chosen: household
  alternatives:
  - house
  - home
  lexicon: BDAG
  rationale: Rendered 'household' rather than merely 'house' because the saying concerns membership and standing within a family domain, not only a physical structure.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - into the age
  lexicon: BDAG
  rationale: Used idiomatic modern English 'forever' for the phrase in both clauses. 'Into the age' is overly literal here, while 'forever' clearly conveys enduring permanence.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: Rendered 'son' because the Greek is specifically masculine singular and the contrast is with 'slave' in a household inheritance/status setting. This also preserves the likely resonance with Jesus' identity in the immediate context.
- source_word: δὲ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Rendered δέ as 'Now' to mark discourse progression naturally in English without overstating adversative force. The main contrast is carried by the paired clauses themselves.
