translation:
  language: es
  text: Y antiguamente vivieron como extranjeros[a] en Mesopotamia, porque no quisieron seguir a los dioses de sus padres[b], que estaban en la tierra de los Caldeos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «residieron en Mesopotamia». El verbo griego sugiere vivir allí como extranjeros o residentes temporales.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula relativa también puede entenderse como «que procedían de la tierra de los Caldeos» o «que habían surgido en la tierra de los Caldeos».
    reason: alternative_reading
lexical_decisions:
- source_word: παρῴκησαν
  english_pob_choice: lived as sojourners
  chosen_spanish: vivieron como forasteros
  alternatives_spanish:
  - sojornaron
  - vivieron como residentes temporales
  - habitaron como extranjeros
  lexicon: BDAG
  rationale: El verbo griego expresa residencia en un lugar con condición de extranjero o residente no permanente. En español, «vivieron como forasteros» comunica tanto la permanencia como la condición de extrañeza sin sonar forzado. «Sojornaron» es posible, pero menos natural para una lectura pública contemporánea.
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: antiguamente
  alternatives_spanish:
  - antes
  - anteriormente
  - primeramente
  lexicon: LSJ
  rationale: La expresión marca tiempo anterior en la narración. «Antiguamente» es natural en español y conserva el valor temporal sin introducir matices ajenos.
- source_word: Μεσοποταμίᾳ
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - la Mesopotamia
  lexicon: N/A
  rationale: Nombre geográfico estándar; no requiere adaptación.
- source_word: οὐκ ἐβουλήθησαν
  english_pob_choice: they were not willing
  chosen_spanish: no quisieron
  alternatives_spanish:
  - no estuvieron dispuestos a
  - no tuvieron voluntad de
  - se negaron a
  lexicon: BDAG
  rationale: El griego enfatiza la voluntad. «No quisieron» preserva la decisión deliberada de manera natural en español. «Se negaron a» sería más fuerte y podría exceder el matiz del verbo en este contexto.
- source_word: ἀκολουθῆσαι
  english_pob_choice: to follow
  chosen_spanish: seguir
  alternatives_spanish:
  - ir tras
  - seguir a
  - adherirse a
  lexicon: BDAG
  rationale: «Seguir» mantiene la relación de lealtad o adhesión implícita en el contexto religioso. Es la opción más clara y directa en español.
- source_word: τοῖς θεοῖς τῶν πατέρων αὐτῶν
  english_pob_choice: the gods of their fathers
  chosen_spanish: a los dioses de sus padres
  alternatives_spanish:
  - a los dioses de sus antepasados
  - a los dioses ancestrales
  - a los dioses de sus ancestros
  lexicon: LSJ
  rationale: Se conserva el vínculo familiar exacto del griego («padres») en lugar de suavizarlo a «antepasados». El dativo se expresa naturalmente con la preposición «a» en español por el verbo «seguir».
- source_word: οἳ ἐγένοντο ἐν γῇ Χαλδαίων
  english_pob_choice: who were in the land of the Chaldeans
  chosen_spanish: que estaban en la tierra de los caldeos
  alternatives_spanish:
  - que eran de la tierra de los caldeos
  - que habían estado en la tierra de los caldeos
  - que procedían de la tierra de los caldeos
  lexicon: BDAG
  rationale: La revisión inglesa opta por «were» para mayor naturalidad y precisión contextual. En español, «que estaban» reproduce bien ese sentido sin forzar la idea de origen o procedencia, que sigue siendo una posible lectura pero no la principal aquí.
theological_decisions:
- issue: La relación con los dioses ancestrales sin añadir un verbo de adoración
  english_pob_reading: they were not willing to follow the gods of their fathers
  chosen_spanish_reading: no quisieron seguir a los dioses de sus padres
  alternative_spanish_readings:
  - no quisieron adorar a los dioses de sus padres
  - rehusaron seguir a los dioses de sus padres
  - no quisieron rendir culto a los dioses de sus padres
  rationale: El griego no dice explícitamente «adorar» o «rendir culto», sino no estar dispuestos a seguir. La redacción española conserva esa precisión y evita intensificar el contraste teológico más allá del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
- issue: La frase relativa sobre la ubicación de los dioses o de los padres
  english_pob_reading: who were in the land of the Chaldeans
  chosen_spanish_reading: que estaban en la tierra de los caldeos
  alternative_spanish_readings:
  - que eran de la tierra de los caldeos
  - que habían surgido en la tierra de los caldeos
  - que procedían de la tierra de los caldeos
  rationale: La auditoría inglesa reconoce una ambigüedad en la cláusula relativa. En español se adopta la lectura más directa y sobria («que estaban»), preservando la tensión interpretativa sin resolverla de forma especulativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó «had come to be» por «were» en la cláusula final para reflejar mejor ἐγένοντο en contexto. Esta versión española sigue esa revisión al usar «estaban», evitando una formulación de origen más fuerte de la que el pasaje exige.
  spanish_consistency_notes:
  - Se mantiene «Mesopotamia» sin artículo para concordar con el uso geográfico habitual.
  - Se usa «dioses» en minúscula por referirse a deidades no verdaderas dentro del relato.
  - «Padres» conserva el paralelismo del griego y evita una neutralización innecesaria hacia «antepasados».
  - La puntuación divide naturalmente la causa («porque») de la cláusula relativa final, como en el griego y en la tradición del POB.
