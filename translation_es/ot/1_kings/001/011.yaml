translation:
  language: es
  text: 'Entonces Natán dijo a Betsabé, madre de Salomón: «¿No has oído que Adonías, hijo de Haguit, ha llegado a ser rey[a], y nuestro señor David no lo sabe?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha hecho rey». El hebreo dice literalmente «ha llegado a ser rey / ha reinado»; el contexto puede implicar autoexaltación, pero aquí la redacción no lo expresa de manera explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia y suena natural en español bíblico moderno.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: HALOT
  rationale: Nombre propio hebreo usualmente adaptado al español con acento gráfico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición direccional natural en español para introducir al destinatario del habla.
- source_word: בַּת שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bathsheba
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente establecido en español, conservando la identificación referida por el texto.
- source_word: אֵם שְׁלֹמֹה
  english_pob_choice: Solomon’s mother
  chosen_spanish: madre de Salomón
  alternatives_spanish:
  - la madre de Salomón
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de modo claro y natural en español, manteniendo la relación de filiación sin añadir información.
- source_word: הֲלוֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No has oído... ?
  alternatives_spanish:
  - ¿Acaso no has oído... ?
  - ¿No es verdad que has oído... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que presupone respuesta afirmativa; el español reproduce esa fuerza con una pregunta directa negativa.
- source_word: שָׁמַעַתְּ
  english_pob_choice: heard
  chosen_spanish: has oído
  alternatives_spanish:
  - oíste
  - has escuchado
  lexicon: HALOT
  rationale: En este contexto significa recibir una noticia; el perfecto compuesto español transmite bien la relevancia presente del rumor/noticia.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  lexicon: HALOT
  rationale: Introduce el contenido de lo oído; «que» es la subordinación más natural en español.
- source_word: מָלַךְ
  english_pob_choice: has become king
  chosen_spanish: ha llegado a reinar
  alternatives_spanish:
  - ha reinado
  - se ha hecho rey
  lexicon: HALOT
  rationale: El verbo expresa reinar/llegar a ser rey. «Ha llegado a reinar» mantiene el valor eventivo sin afirmar explícitamente la autoexaltación que el hebreo aquí no formula de modo directo.
- source_word: אֲדֹנִיָּהוּ בֶן חַגִּית
  english_pob_choice: Adonijah son of Haggith
  chosen_spanish: Adonías, hijo de Haguit
  alternatives_spanish:
  - Adonías, hijo de Haggit
  lexicon: HALOT
  rationale: Se transliteran los nombres con la forma española usual de Adonías; se conserva la relación filiativa exacta del hebreo.
- source_word: וַאֲדֹנֵינוּ דָוִד
  english_pob_choice: and our lord David
  chosen_spanish: nuestro señor David
  alternatives_spanish:
  - nuestro señor, David
  - David, nuestro señor
  lexicon: HALOT
  rationale: אדון con sufijo posesivo funciona como título humano de respeto en el ámbito real. «Señor» comunica el honorífico sin confundirlo con el nombre divino; «nuestro» conserva el sufijo de primera persona plural.
- source_word: לֹא יָדָע
  english_pob_choice: does not know it
  chosen_spanish: no lo sabe
  alternatives_spanish:
  - no lo conoce
  - no está enterado
  lexicon: HALOT
  rationale: El verbo ידע aquí se refiere a estar informado de un hecho. «No lo sabe» es breve, idiomático y respeta el objeto implícito del hebreo.
theological_decisions:
- issue: Título honorífico aplicado a David
  english_pob_reading: our lord David
  chosen_spanish_reading: nuestro señor David
  alternative_spanish_readings:
  - nuestro maestro David
  rationale: Se mantiene el valor cortesano del título para un rey humano, sin elevarlo a un uso divino. En español, «señor» es la forma más natural y reconocible para este registro, con minúscula implícita por tratarse de un referente humano.
  doctrine_reference: Distinción entre título humano honorífico y el nombre/título divino; coherencia con el uso de κύριος para humanos frente a Dios.
- issue: Valor de מָלַךְ en el contexto de la intriga sucesoria
  english_pob_reading: has become king
  chosen_spanish_reading: ha llegado a reinar
  alternative_spanish_readings:
  - se ha hecho rey
  - ha reinado
  rationale: El hebreo admite el sentido de acceder al trono o reinar. Se evita intensificarlo a una auto-coronación explícita, porque el texto no lo dice de manera directa, aunque el contexto pueda sugerirlo.
  doctrine_reference: Principio de no sobretraducir una implicación contextual cuando la forma verbal no la expresa abiertamente.
translation_notes:
  revision_awareness: Se siguió el expediente inglés con acuerdo alto y sin revisiones aplicadas; la única tensión lexical relevante es מָלַךְ, donde se conserva el matiz eventivo sin introducir la autoexaltación explícita como lectura obligatoria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se usa «señor» en minúscula para el rey David como título humano, no como referencia divina.
  - 'Los nombres propios se adaptan al español bíblico estándar: Natán, Betsabé, Salomón, Adonías, Haguit.'
