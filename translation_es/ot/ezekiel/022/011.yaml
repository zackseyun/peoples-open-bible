translation:
  language: es
  text: Un hombre comete una abominación con la esposa de su prójimo[a]; otro contamina a su nuera con depravación sexual[b]; y otro viola a su hermana, la hija de su padre[c], dentro de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'comete un acto detestable con'. El hebreo dice literalmente 'hace una abominación'.
    reason: lexical_alternative
  - marker: b
    text: O 'con depravación'. זִמָּה destaca la perversidad sexual vergonzosa.
    reason: lexical_alternative
  - marker: c
    text: O 'humilla' o 'abusa de'. El verbo hebreo puede implicar violación con sentido de humillación o abuso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: one man ... another ... another
  chosen_spanish: Un hombre ... otro ... y otro
  alternatives_spanish:
  - Y un hombre ... y otro ... y otro
  - Cada hombre ... otro ... y otro
  lexicon: HALOT
  rationale: El hebreo repite אִישׁ para enumerar ofensas individuales. En español, la secuencia 'Un hombre ... otro ... y otro' conserva la estructura enumerativa sin sonar artificial.
- source_word: אֵשֶׁת רֵעֵהוּ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: la esposa de su prójimo
  alternatives_spanish:
  - la mujer de su prójimo
  - la esposa de su vecino
  lexicon: HALOT
  rationale: רֵעַ puede significar prójimo, compañero o amigo. 'Prójimo' mantiene el sentido relacional y es idiomático en español bíblico contemporáneo; 'esposa' evita ambigüedad en este contexto sexual.
- source_word: עָשָׂה תּוֹעֵבָה
  english_pob_choice: commits an abomination with
  chosen_spanish: comete una abominación con
  alternatives_spanish:
  - hace una abominación con
  - comete un acto detestable con
  lexicon: HALOT
  rationale: El hebreo usa un giro literal 'hacer una abominación'. 'Comete una abominación con' mantiene la fuerza moral del término sin introducir una paráfrasis excesiva.
- source_word: כַּלָּתוֹ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su hija política
  - la esposa de su hijo
  lexicon: HALOT
  rationale: Es el término de parentesco directo y preciso en español.
- source_word: טִמֵּא
  english_pob_choice: defiles
  chosen_spanish: contamina
  alternatives_spanish:
  - profanó
  - hace impura
  lexicon: HALOT
  rationale: En contextos sexuales, טמא comunica contaminación moral y ritual. 'Contamina' conserva esa doble resonancia en un español claro; 'profanó' enfatizaría más lo cultual que el texto completo.
- source_word: בְּזִמָּה
  english_pob_choice: with lewdness
  chosen_spanish: con depravación
  alternatives_spanish:
  - con lujuria
  - con perversidad sexual
  - con inmoralidad
  lexicon: HALOT
  rationale: זִמָּה señala conducta sexual vergonzosa y corrompida. 'Depravación' transmite bien la idea de corrupción moral grave; se evita suavizarla o volverla demasiado eufemística.
- source_word: אֲחֹתוֹ בַת אָבִיו
  english_pob_choice: his sister, his father’s daughter
  chosen_spanish: su hermana, hija de su padre
  alternatives_spanish:
  - su hermana, la hija de su padre
  - su medio hermana por parte de padre
  lexicon: HALOT
  rationale: La aposición hebrea precisa la relación incestuosa. Se conserva la forma legal y descriptiva 'hija de su padre' para no imponer una reconstrucción genealógica que el texto no explicita.
- source_word: עִנָּה
  english_pob_choice: violates
  chosen_spanish: viola
  alternatives_spanish:
  - humilla
  - arrebata
  - abusa sexualmente de
  lexicon: HALOT
  rationale: En contextos sexuales, ענה puede implicar violación, humillación o abuso. 'Viola' recoge mejor la violencia y la degradación sugeridas por el término en este contexto.
- source_word: בָּךְ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en ti
  - entre ustedes
  lexicon: HALOT
  rationale: El pronombre femenino singular personifica a Jerusalén. 'Dentro de ti' suena natural y conserva la imagen de pecados cometidos en el interior de la ciudad.
theological_decisions:
- issue: Fuerza moral de las descripciones sexuales
  english_pob_reading: Retain strong ethical language ('abomination,' 'defiles,' 'violates') rather than soften to neutral descriptions of illicit sex.
  chosen_spanish_reading: Mantener lenguaje ético fuerte ('abominación', 'contamina', 'viola') en vez de suavizarlo con expresiones neutrales.
  alternative_spanish_readings:
  - '''relaciones ilícitas'''
  - '''actos inmorales'''
  - '''tiene relaciones con'''
  rationale: El verso es una acusación profética de corrupción grave. El español debe reflejar la condena moral intensa del hebreo, incluyendo la posible dimensión ritual de contaminación y la violencia de ענה.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura aprobada en inglés y no introduce cambios de sentido respecto del último pase, que fue marcado como unchanged. Se ajustó la expresión para un español natural, preservando la enumeración, la carga moral y la ambigüedad/violencia de los términos sexuales clave.
  spanish_consistency_notes:
  - Se mantiene 'abominación' para תּוֹעֵבָה, en línea con la terminología POB.
  - Se usa 'prójimo' para רֵעַ por su valor relacional y su claridad en español.
  - 'Se conserva la tríada verbal fuerte: ''comete'', ''contamina'', ''viola''.'
  - '''Dentro de ti'' refleja el destino de Jerusalén como ciudad-persona en femenino singular.'
