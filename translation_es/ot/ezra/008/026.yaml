translation:
  language: es
  text: Y pesé en sus manos seiscientos cincuenta talentos de plata, y vasijas de plata[a] por valor de cien talentos, y cien talentos de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cien vasijas de plata valoradas en cien talentos'. El hebreo es elíptico en este punto; el sentido es que las vasijas de plata en conjunto tenían un valor de cien talentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁקֲלָה
  english_pob_choice: I weighed out
  chosen_spanish: pesé
  alternatives_spanish:
  - pesé y entregué
  - pesé y di
  lexicon: HALOT
  rationale: En este contexto de inventario y transferencia de tesoros, el verbo hebreo expresa pesar metales preciosos para su entrega. En español, 'pesé' conserva la acción central sin volverla innecesariamente perifrástica; el complemento 'en sus manos' deja clara la entrega.
- source_word: עַל יָדָם
  english_pob_choice: into their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - a sus manos
  - bajo su custodia
  lexicon: HALOT
  rationale: La imagen hebrea del 'hand' como esfera de recepción o custodia se puede reproducir naturalmente con 'en sus manos'. Mantiene el valor concreto de la expresión sin introducir una abstracción como 'custodia' que suavizaría el idiomatismo.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata en metal
  - dinero
  lexicon: HALOT
  rationale: Aquí se trata de metal precioso pesado, no de moneda. 'Plata' es la equivalencia más natural y precisa en español para el sustantivo material.
- source_word: כִּכָּרִים
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - unidades de peso
  - talentos de peso
  lexicon: HALOT
  rationale: '''Talento'' es el equivalente tradicional y claro para la unidad de peso antigua. Se conserva por su precisión histórica y porque en una lista de tesoro resulta inteligible para el lector bíblico.'
- source_word: וּכְלֵי כֶסֶף
  english_pob_choice: and silver vessels
  chosen_spanish: y cien talentos de utensilios de plata
  alternatives_spanish:
  - y utensilios de plata
  - y vasijas de plata
  lexicon: HALOT
  rationale: La secuencia hebrea es elíptica y admite una lectura de valoración, no necesariamente de cantidad de piezas. Siguiendo la revisión inglesa, el español expresa 'cien talentos de utensilios de plata' para no convertir la frase en un inventario de cien objetos ni perder la idea de tasación.
- source_word: מֵאָה לְכִכָּרִים
  english_pob_choice: one hundred talents worth of silver vessels
  chosen_spanish: cien talentos de utensilios de plata
  alternatives_spanish:
  - utensilios de plata por valor de cien talentos
  - utensilios de plata valuados en cien talentos
  lexicon: HALOT
  rationale: La preposición ל aquí se entiende como valoración/estimación. El español 'de utensilios de plata' junto con el contexto de 'cien talentos' comunica el valor total sin sobreespecificar el número de piezas, preservando la tensión del hebreo elíptico.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro puro
  - metal de oro
  lexicon: HALOT
  rationale: Se trata del metal precioso en contraste con la plata. 'Oro' es la forma más directa y natural en español.
- source_word: מֵאָה כִכָּר
  english_pob_choice: one hundred talents
  chosen_spanish: cien talentos
  alternatives_spanish:
  - cien talentos de peso
  - cien unidades de talento
  lexicon: HALOT
  rationale: La cifra y la unidad de peso se trasladan directamente. En español, 'cien talentos' es claro y fiel al inventario cuantitativo del verso.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético y toma en cuenta la observación revisada del audit trail inglés: la cláusula de los utensilios de plata es elíptica y debe leerse como una tasación, no como una simple cantidad de piezas. Por eso el español evita una traducción mecánica que convertiría la frase en un inventario de objetos contados uno por uno.'
  spanish_consistency_notes:
  - Se mantiene 'plata' y 'oro' para los metales, evitando términos más vagos como 'dinero'.
  - '''Talentos'' se usa como unidad de peso histórica, en continuidad con la decisión inglesa auditada.'
  - El orden y la sintaxis conservan la secuencia de listado del hebreo, con una sola nota para la cláusula elíptica.
