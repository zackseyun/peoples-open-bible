base_translation:
  language: en
  yaml_path: translation/ot/joel/002/020.yaml
  text: And I will remove the northerner far from you[a], and I will drive him into a dry and desolate land, his front into the eastern sea and his rear into the western sea; his stench will rise, and his foul smell will rise[c][b], because he has done great things.
  footnotes:
  - marker: a
    text: 'Or, ''the northern army.'' Hebrew: ''the northerner,'' a singular, personified expression.'
    reason: lexical_alternative
  - marker: b
    text: '''The eastern sea'' likely refers to the Dead Sea, and ''the western sea'' to the Mediterranean Sea.'
    reason: cultural_note
  - marker: c
    text: Or, 'because he has acted arrogantly.' The Hebrew idiom is literally 'because he has done great things,' which here likely carries a negative sense from the context.
    reason: alternative_reading
