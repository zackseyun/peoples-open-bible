review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia histórica, el hifil de «saqué», la segunda persona representativa («ustedes llegaron») y el sujeto plural «los egipcios». También refleja adecuadamente «con carros y jinetes». Sin embargo, se aparta del rastro auditado de la POB en la cláusula final: el inglés aprobado usa «the Red Sea» en el texto principal con nota para la alternativa más literal, mientras que el español pone «mar de Suf», que no corresponde ni al sentido más natural en español ni a la decisión documentada.'
  spanish_quality_summary: El español es claro y legible en general. «Entonces saqué…», «ustedes llegaron al mar» y «los egipcios persiguieron…» suenan naturales. El principal problema de calidad es «el mar de Suf», que en español general resulta opaco y poco eclesialmente reconocible; «mar Rojo» es la forma natural y ampliamente inteligible. También conviene capitalizarlo como nombre propio geográfico.
  glossary_alignment: 'No hay conflicto con los términos project-level principales como Yahvé, Mesías, etc. La decisión problemática es específica de יַם סוּף: el expediente inglés documenta «Red Sea» en el texto principal y la alternativa literal en nota. En español debe alinearse con esa misma lógica: «mar Rojo» en el texto y una nota con «mar de los Juncos»/«yam suf».'
  issues:
  - severity: high
    issue: «el mar de Suf» en el texto principal no sigue la decisión auditada de la POB para יַם סוּף
    rationale: La evidencia inglesa y sus decisiones léxicas/theológicas establecen «the Red Sea» en el texto principal, con una nota para la alternativa más literal «Sea of Reeds». La transliteración «Suf» introduce una estrategia distinta no autorizada por este registro y reduce la claridad en español.
  - severity: medium
    issue: Falta de capitalización en el nombre propio geográfico
    rationale: En español bíblico natural, cuando se trata del nombre específico del cuerpo de agua, corresponde «mar Rojo» más que «mar rojo» o «mar de Suf». Esto mejora legibilidad y convención ortográfica.
  - severity: low
    issue: La nota actual está bien orientada, pero debe anclarse al término revisado
    rationale: Si el texto principal se corrige a «mar Rojo», la nota léxica alternativa debe permanecer y anclarse allí para preservar la auditabilidad del hebreo «yam suf».
  revised_spanish_text: Entonces saqué a sus padres de Egipto, y ustedes llegaron al mar; y los egipcios persiguieron a sus padres con carros y jinetes hasta el mar Rojo[a].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente, «el mar de los Juncos». Hebreo: yam suf.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige únicamente la cláusula final para alinearla con la decisión léxica y teológica ya auditada en la POB inglesa: usar «mar Rojo» en el texto principal por reconocimiento canónico y claridad en español, conservando en nota la alternativa más literal «mar de los Juncos» con referencia a «yam suf». El resto del versículo refleja bien el hebreo y su fuerza discursiva.'
