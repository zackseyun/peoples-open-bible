translation:
  language: es
  text: Cuando los cielos se cierren y no haya lluvia, porque han pecado contra ti, y oren hacia este lugar y confiesen tu nombre y se aparten de su pecado porque tú les respondes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque tú los afliges» o «porque tú los humillas». El verbo hebreo puede llevar cualquiera de esos sentidos según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהֵעָצֵר הַשָּׁמַיִם
  english_pob_choice: when the heavens are shut up
  chosen_spanish: cuando los cielos sean cerrados
  alternatives_spanish:
  - cuando los cielos sean restringidos
  - cuando los cielos se cierren
  lexicon: HALOT
  rationale: El hebreo marca una cláusula temporal con infinitivo constructo pasivo/medio de עצר. En español, 'sean cerrados' conserva la imagen concreta de la lluvia retenida y mantiene el registro bíblico sin sonar arcaico.
- source_word: וְלֹא יִהְיֶה מָטָר
  english_pob_choice: and there is no rain
  chosen_spanish: y no haya lluvia
  alternatives_spanish:
  - y no caiga lluvia
  - y no habrá lluvia
  lexicon: HALOT
  rationale: La construcción expresa ausencia de lluvia como resultado. 'No haya lluvia' es natural en español y conserva el valor existencial sin sobretraducir el verbo 'ser/haber'.
- source_word: כִּי יֶחֶטְאוּ לָךְ
  english_pob_choice: because they have sinned against you
  chosen_spanish: porque han pecado contra ti
  alternatives_spanish:
  - porque pecan contra ti
  - porque te han ofendido con su pecado
  lexicon: HALOT
  rationale: El hebreo usa el lenguaje ético de pecado dirigido a Dios. 'Pecado contra ti' mantiene la fuerza relacional de לָךְ y evita debilitar el verbo a una mera falta genérica.
- source_word: וְהִתְפַּלְלוּ אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: and they pray toward this place
  chosen_spanish: y oren hacia este lugar
  alternatives_spanish:
  - y oren en dirección a este lugar
  - y oren a este lugar
  lexicon: HALOT
  rationale: אֶל con 'orar' en este contexto indica orientación, no que el lugar sea el destinatario de la oración. 'Hacia este lugar' expresa bien la dirección del gesto cultual.
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  english_pob_choice: and confess your name
  chosen_spanish: y confiesen tu nombre
  alternatives_spanish:
  - y den gracias a tu nombre
  - y alaben tu nombre
  lexicon: HALOT
  rationale: La revisión inglesa corrigió la equivalencia a 'confess'. En contexto de arrepentimiento y oración, 'confiesen tu nombre' conserva la ambigüedad entre reconocer, declarar y confesar, sin imponer solo la idea de gratitud.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  lexicon: HALOT
  rationale: Se mantiene literalmente. En hebreo, 'nombre' implica identidad, reputación y carácter revelado de Dios; el español admite esa carga sin explicitarla en el versículo.
- source_word: מֵחַטָּאתָם יְשׁוּבוּן
  english_pob_choice: and turn from their sin
  chosen_spanish: y se vuelvan de su pecado
  alternatives_spanish:
  - y se aparten de su pecado
  - y se arrepientan de su pecado
  lexicon: HALOT
  rationale: שוב + מן expresa volverse/alejarse de algo. 'Se vuelvan de su pecado' preserva la imagen de giro o retorno, evitando resolverla demasiado pronto en una paráfrasis teológica.
- source_word: כִּי תַעֲנֵם
  english_pob_choice: because you answer them
  chosen_spanish: porque tú les respondes
  alternatives_spanish:
  - porque tú les contestas
  - porque tú los atiendes
  lexicon: HALOT
  rationale: En este contexto de oración, ענה funciona mejor como 'responder'. 'Les respondes' preserva la relación petición-respuesta y sigue la decisión inglesa revisada frente a las lecturas alternativas de afligir/humillar.
theological_decisions:
- issue: Sentido de ענה en la cláusula final
  english_pob_reading: because you answer them
  chosen_spanish_reading: porque tú les respondes
  alternative_spanish_readings:
  - porque tú los afliges
  - porque tú los humillas
  rationale: La secuencia inmediata es de petición, orientación al templo, confesión del nombre y giro del pecado. En ese marco, 'respondes' mantiene la lógica oracional. Las lecturas 'afliges' o 'humillas' siguen siendo lexicalmente posibles, pero resolverían la tensión hacia una explicación causal distinta que el contexto no exige.
  doctrine_reference: Translation philosophy §3 (preservar la tensión léxica sin resolverla prematuramente)
- issue: Alcance de 'confiesen tu nombre'
  english_pob_reading: confess your name
  chosen_spanish_reading: confiesen tu nombre
  alternative_spanish_readings:
  - den gracias a tu nombre
  - proclamen tu nombre
  rationale: El verbo hebreo admite matices de confesar, reconocer y dar gracias. Dado el contexto de pecado y retorno, 'confiesen' conserva el acto de reconocer públicamente a Yahvé sin borrar la posibilidad de alabanza implícita.
  doctrine_reference: HALOT; revisión auditada POB del 2026-04-23
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde 'give thanks to your name' a 'confess your name' para mayor precisión léxica. El español sigue esa revisión y también conserva la ambigüedad final de ענה mediante una nota, siguiendo el criterio de no resolver una tensión documentada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el texto principal solo cuando el hebreo lo exige explícitamente; en este versículo aparece 'tu nombre', así que no corresponde introducir el nombre divino.
  - '''Cielos'' conserva el plural hebreo הַשָּׁמַיִם y su registro bíblico.'
  - '''Pecado'' y ''se vuelvan'' mantienen el vocabulario de arrepentimiento sin sustituirlo por un lenguaje más interpretativo.'
  - '''Responder'' se emplea para ענה en coherencia con el contexto de oración y con la decisión inglesa revisada.'
