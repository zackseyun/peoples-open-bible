translation:
  language: es
  text: Invoco a Yahvé,[a] quien es digno de alabanza, y soy salvo de mis enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seré salvo de mis enemigos». El verbo hebreo también puede entenderse con sentido futuro en este contexto poético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהֻלָּל
  english_pob_choice: worthy to be praised
  chosen_spanish: digno de alabanza
  alternatives_spanish:
  - alabado
  - digno de ser alabado
  - loable
  lexicon: HALOT
  rationale: El participio pasivo de הלל funciona predicativamente respecto de Yahvé. En español, «digno de alabanza» comunica mejor la valoración que el mero «alabado», conservando el sentido de merecer alabanza sin alejarse del hebreo.
- source_word: אֶקְרָא
  english_pob_choice: I call on
  chosen_spanish: llamaré
  alternatives_spanish:
  - invocaré
  - clamaré
  - llamo
  lexicon: HALOT
  rationale: קרא con el nombre divino suele implicar llamar/invocar. Dado el contexto poético y confesional, «llamaré» mantiene la apelación a Dios; el contexto de oración queda claro por el complemento con Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino revelado, no una sustitución titulada. «Yahvé» es la forma establecida por la política terminológica del proyecto en español.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - mis foes
  lexicon: HALOT
  rationale: אויב con sufijo de primera persona se traduce de forma directa y transparente como «mis enemigos», que conserva el paralelismo y la fuerza del término.
- source_word: אִוָּשֵׁעַ
  english_pob_choice: I am saved
  chosen_spanish: seré librado
  alternatives_spanish:
  - soy salvado
  - seré salvo
  - seré rescatado
  lexicon: HALOT
  rationale: El imperfecto nifal de ישׁע puede expresar resultado/perspectiva futura en poesía. En español, «seré librado» mantiene la posibilidad futura implícita y suena natural en un registro bíblico sin perder el sentido de salvación/liberación.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa el Tetragrama directamente. Se conserva como nombre propio divino, siguiendo la convención del proyecto, en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor aspectual de אִוָּשֵׁעַ
  english_pob_reading: present/resultative English ('I am saved')
  chosen_spanish_reading: futuro/resultativo ('seré librado')
  alternative_spanish_readings:
  - soy librado
  - seré salvado
  - estoy salvado
  rationale: La forma verbal permite una lectura no estrictamente futura; en español, la forma futura perifrástica o simple aquí es más idiomática y refleja la confianza poética en la acción liberadora de Dios.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
- issue: Relación entre llamar a Yahvé y la liberación
  english_pob_reading: I call on Yahweh ... and I am saved from my enemies
  chosen_spanish_reading: Llamaré a Yahvé ... y seré librado de mis enemigos
  alternative_spanish_readings:
  - Alamaré a Yahvé ... y soy librado de mis enemigos
  - Invocaré a Yahvé ... y seré salvo de mis enemigos
  rationale: Se conserva la coordinación del hebreo sin forzar causalidad adicional. El español mantiene la conexión entre invocación y liberación con un estilo natural y reverente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense with transparent syntax'
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en su última revisión y la evaluación cruzada reportó alta concordancia; no hay revisiones aplicadas que requieran reflejo especial en español. Se conserva la decisión central de rendir el Nombre divino como Yahvé y de mantener la ambigüedad temporal de la forma verbal final mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología base del proyecto.
  - Se evita «SEÑOR» como sustitución del Tetragrama.
  - «Digno de alabanza» mantiene el valor predicativo del participio sin volverlo una paráfrasis expansiva.
  - La nota [c] preserva la alternativa verbal futura/resultativa que el audit trail inglés documenta.
