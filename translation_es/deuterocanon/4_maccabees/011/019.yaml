    rationale: La nota b dice que se conserva la referencia pronominal literal, pero la frase española «le quemaban las entrañas» no expresa ningún «de él / desde él / a partir de él». Eso debilita la fidelidad al griego y al audit trail inglés revisado.
  - severity: low
