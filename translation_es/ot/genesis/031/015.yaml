review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la pregunta retórica, la idea de ser tratadas como ajenas, la venta de las hijas y el consumo total de sus recursos. Sin embargo, «ha devorado por completo nuestro dinero» suena innecesariamente fuerte y poco natural en español para un objeto como «dinero», y no reproduce tan bien la decisión auditada del POB de mantener el modismo de comer sin volverlo tosco; «ha consumido por completo» o «se ha comido» serían mejores opciones. También conviene usar «pues» en vez de «porque» para enlazar con mayor naturalidad la explicación en registro bíblico legible.
  spanish_quality_summary: La frase es clara, pero «considerados por él como extranjeras» puede simplificarse levemente a «tenidas por extranjeras por él» o mantenerse; no es un problema serio. El problema principal de legibilidad es «de hecho ha devorado por completo nuestro dinero», que suena pesado y algo calcado. Una revisión menor mejora naturalidad y dignidad sin perder el énfasis del hebreo.
  glossary_alignment: No hay términos de glosario mayor en disputa. «Extranjeras» encaja bien para נָכְרִיּוֹת. «Dinero» como texto principal con nota «plata» sigue la decisión documentada del POB. No hay cuestiones teológicas sensibles.
  issues:
  - severity: medium
    issue: «ha devorado por completo nuestro dinero» es demasiado tosco y poco idiomático
    rationale: El hebreo usa un modismo de ‘comer’ intensificado, pero el propio audit trail inglés eligió ‘consumed’ para mantener sentido y naturalidad con un objeto económico. En español, «devorar dinero» suena menos natural y más gráfico de lo necesario.
  - severity: low
    issue: «Porque» después de pregunta retórica puede sonar menos fluido que «Pues»
    rationale: Ambas opciones son posibles para כִּי, pero «Pues» enlaza mejor en español bíblico moderno una pregunta retórica con su explicación inmediata.
  revised_spanish_text: ¿No somos consideradas por él como extranjeras? Pues nos ha vendido y de hecho ha consumido por completo nuestro dinero[a].
  revised_footnotes:
  - marker: a
    text: O «ha consumido por completo nuestra plata». El hebreo usa un modismo de «comer» con infinitivo absoluto enfático para expresar consumo total; literalmente, «ha comido, sí, nuestra plata».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la expresión del modismo hebreo para que el español sea más natural y fiel a la rationale auditada del POB: se conserva la idea de consumo total sin la aspereza de «devorado». También se cambia «Porque» por «Pues» para una conexión explicativa más fluida.'
