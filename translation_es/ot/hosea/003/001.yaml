    rationale: El hebreo describe conducta adulterina en curso. Aunque «adúltera» no es imposible, el audit trail inglés justificó explícitamente una formulación verbal. «y que comete adulterio» o «y cometiendo adulterio» preserva mejor el valor activo y continuo.
  - severity: medium
    issue: La nota [a] incluye «otro esposo», que sobreinterpreta רֵעַ
    rationale: El hebreo no especifica «esposo», y la decisión teológica/lexical del POB fue precisamente no resolver esa relación en el texto principal. La nota puede mencionar «compañero», «amigo», «asociado» o, según el contexto, posiblemente «marido/esposo», pero no debería presentar «otro esposo» como alternativa directa principal.
  - severity: low
