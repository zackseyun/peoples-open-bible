  - Se preservó la transliteración de los nombres propios para concordar con el enfoque auditado de la POB inglesa.
  - Se evitó usar «Simeón» en el texto principal para no normalizar la forma al nombre tradicional cuando el texto auditado distingue «Shimeon».
