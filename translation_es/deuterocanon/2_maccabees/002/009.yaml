  text: Since we are about to celebrate the purification of the temple on the twenty-fifth of Chislev[a], we thought it necessary to make this clear to you, so that you also may celebrate the festival of booths and of the fire, when Nehemiah, who built the temple and the altar[c][b], offered sacrifices.
  footnotes:
