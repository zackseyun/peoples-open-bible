translation:
  language: es
  text: Y a Semaías, el nehelamita[a], dirás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «el soñador». La designación hebrea nehelamita es incierta; quizá funcione como epíteto y no como un sustantivo común transparente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: And to
  chosen_spanish: Y a
  alternatives_spanish:
  - Ahora a
  - Y acerca de
  lexicon: HALOT
  rationale: La construcción introduce al destinatario de un nuevo encargo profético; en español, «y a» comunica de forma natural la secuencia y el cambio de interlocutor sin añadir un matiz ajeno.
- source_word: שְׁמַעְיָהוּ
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  - Semaiah
  lexicon: Convención onomástica bíblica española
  rationale: Se usa la forma española corriente del nombre propio para lectura eclesial en español, manteniendo la identificación del personaje.
- source_word: הַ/נֶּחֱלָמִי
  english_pob_choice: the Nehelamite
  chosen_spanish: el nejelamita
  alternatives_spanish:
  - el soñador
  - el hombre de Nehelam
  lexicon: HALOT
  rationale: Se preserva la designación tradicional como epíteto/gentilicium transliterado-adaptado, porque el hebreo es incierto y puede funcionar como identificador más que como sustantivo transparente. Se evita «soñador» en el texto principal porque esa etimología es posible pero no segura.
- source_word: תֹּאמַר
  english_pob_choice: you shall say
  chosen_spanish: dirás
  alternatives_spanish:
  - deberás decir
  - di
  lexicon: HALOT
  rationale: El imperfecto funciona como mandato dirigido a Jeremías; «dirás» conserva el tono de instrucción profética de forma natural en español.
theological_decisions:
- issue: Tratamiento del epíteto/identificador "el nejelamita"
  english_pob_reading: the Nehelamite; possibly “the dreamer”
  chosen_spanish_reading: el nejelamita, con la alternativa “el soñador” reservada en nota
  alternative_spanish_readings:
  - el soñador
  - el hombre de Nehelam
  rationale: 'La evidencia favorece mantener la tensión: el término es oscuro y el inglés POB conserva la forma designativa principal con una nota alternativa. La traducción española hace lo mismo para no cerrar indebidamente el sentido.'
  doctrine_reference: Principio de transparencia textual y cautela exegética; no hay doctrina afectada, pero sí una decisión de no resolver una ambigüedad léxica sin base suficiente.
translation_notes:
  revision_awareness: 'El inglés POB revisó la fórmula final para eliminar el redundante “saying,”; por eso el español no añade un equivalente literal de לֵאמֹר al final y deja la frase como instrucción directa: «dirás».'
  spanish_consistency_notes:
  - 'Se mantiene la transliteración/adaptación de nombres propios en forma eclesial española habitual: Semaías.'
  - Se conserva «nejelamita» como término oscuro, siguiendo la prudencia del POB inglés.
  - La puntuación con coma antes de la nota refleja una lectura fluida de mandato introductorio.
  - No se traduce לֵאמֹר con un calco innecesario; en español queda absorbido por «dirás».
