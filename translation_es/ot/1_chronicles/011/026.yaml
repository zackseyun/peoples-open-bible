translation:
  language: es
  text: 'Y los guerreros valientes eran: Asael, el hermano de Joab[a]; Elhanán, hijo de Dodo, de Belén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el betlemita". El hebreo dice literalmente "de Belén".'
