  glossary_alignment: 'La terminología concuerda con las directrices del proyecto: יְהוָה = «Yahvé», שְׁאוֹל = «Seol», y el masculino explícito הָאֲנָשִׁים הָאֵלֶּה = «estos hombres». La nota [a] conserva la alternativa documentada para el cognado בְּרִיאָה / יִבְרָא, y la nota [b] explica adecuadamente «Seol» sin reducirlo en el texto principal.'
