translation:
  language: es
  text: Si ladrones vinieran a ti, si saqueadores de noche —¡qué destruido has quedado![a]—, ¿no robarían solo lo suficiente para ellos mismos?[b] Si te vinieran vendimiadores, ¿no dejarían rebuscos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo has sido cortado» / «cómo has sido arruinado». El verbo hebreo admite varias traducciones cercanas en este contexto de devastación.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿no robarían su suficiencia?», es decir, solo cuanto les bastara a ellos mismos.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּנָּבִים
  english_pob_choice: thieves
  chosen_spanish: ladrones
  alternatives_spanish:
  - robadores
  - hurtadores
  lexicon: HALOT
  rationale: El hebreo designa a quienes roban de manera general. En español, «ladrones» es el equivalente natural y claro; «robadores» resulta menos idiomático y «hurtadores» no corresponde al uso actual.
- source_word: שׁוֹדְדֵי לַיְלָה
  english_pob_choice: robbers by night
  chosen_spanish: saqueadores de noche
  alternatives_spanish:
  - ladrones de noche
  - asaltantes nocturnos
  lexicon: HALOT
  rationale: שֹׁדְדֵי comunica saqueo violento, no solo robo simple. «Saqueadores de noche» conserva esa fuerza y la referencia temporal sin volver la frase artificial.
- source_word: אֵיךְ נִדְמֵיתָה
  english_pob_choice: how you have been destroyed
  chosen_spanish: ¡qué destruido has quedado!
  alternatives_spanish:
  - ¡cómo has sido cortado!
  - ¡qué arruinado has quedado!
  lexicon: HALOT
  rationale: La forma niphal aquí expresa ruina/destrucción en contexto de devastación. «Qué destruido has quedado» mantiene el tono exclamativo de lamento y la idea de estado resultante; «cortado» es más literal pero menos transparente en español.
- source_word: הֲלֹא יִגְנְבוּ דַּיָּם
  english_pob_choice: would they not steal only enough for themselves?
  chosen_spanish: ¿No robarían solo lo suficiente para ellos mismos?
  alternatives_spanish:
  - ¿No robarían su suficiencia?
  - ¿No tomarían solo lo necesario para sí?
  lexicon: HALOT
  rationale: דַּיָּם expresa suficiencia. En español, «lo suficiente para ellos mismos» transmite la idea idiomática con claridad; «su suficiencia» suena demasiado técnico y opaco.
- source_word: בֹּצְרִים
  english_pob_choice: grape gatherers
  chosen_spanish: vendimiadores
  alternatives_spanish:
  - recolectores de uvas
  - pisadores de uvas
  lexicon: HALOT
  rationale: El término se refiere específicamente a quienes recogen uvas en la vendimia. «Vendimiadores» es el equivalente preciso y relativamente natural en español bíblico contemporáneo.
- source_word: יַשְׁאִירוּ עֹלֵלוֹת
  english_pob_choice: would they not leave gleanings?
  chosen_spanish: ¿no dejarían rebuscos?
  alternatives_spanish:
  - ¿no dejarían espigas sobrantes?
  - ¿no dejarían algunas uvas?
  lexicon: HALOT
  rationale: עֹלֵלוֹת son los racimos o uvas remanentes que quedan para rebuscar. «Rebuscos» conserva la imagen agrícola de lo que queda después de la vendimia; es más preciso que una paráfrasis general.
- source_word: לְךָ / לָךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - contra ti
  - para ti
  lexicon: HALOT
  rationale: El valor básico del prefijo aquí es direccional, «a ti». En contexto implica hostilidad, pero el español conserva esa implicación sin imponerla en la preposición.
theological_decisions:
- issue: Tono profético de lamentación y ruina total en la pregunta exclamativa
  english_pob_reading: how you have been destroyed
  chosen_spanish_reading: ¡qué destruido has quedado!
  alternative_spanish_readings:
  - ¡cómo has sido cortado!
  - ¡qué arruinado has quedado!
  rationale: No se atenúa la ruina de Edom ni se sustituye por un lenguaje más suave. La exclamación en español conserva el golpe retórico del hebreo y la lectura auditada del POB en inglés.
  doctrine_reference: Juicio profético / oráculo contra Edom
- issue: Suficiencia limitada frente a devastación total
  english_pob_reading: would they not steal only enough for themselves?
  chosen_spanish_reading: ¿No robarían solo lo suficiente para ellos mismos?
  alternative_spanish_readings:
  - ¿No robarían su suficiencia?
  - ¿No tomarían solo lo necesario para sí?
  rationale: La comparación presupone que ladrones ordinarios no arrasan por completo, mientras que Edom sí será devastado. La traducción mantiene esa tensión sin reinterpretarla moralmente.
  doctrine_reference: Figura retórica de contraste / juicio proporcional
translation_notes:
  revision_awareness: 'Se mantuvo el acuerdo alto del POB en inglés sin cambios sustantivos. La versión española sigue la misma estructura retórica: dos preguntas condicionales, una exclamación de devastación y la imagen final de la vendimia con rebuscos. Se ajustó el segundo miembro de la comparación para que suene natural en español sin perder la fuerza del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo donde corresponda a nombres divinos; este versículo no lo contiene.
  - Se evitó «SEÑOR» como máscara y no aparece terminología cristiana innecesaria.
  - «Ladrones» y «saqueadores» preservan la distinción entre robo simple y saqueo violento.
  - «Vendimiadores» y «rebuscos» mantienen la imagen agrícola específica del texto.
