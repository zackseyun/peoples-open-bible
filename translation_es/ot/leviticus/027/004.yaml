review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional y la tasación de treinta siclos, pero no preserva con suficiente precisión נְקֵבָה. En este contexto legal de clasificación por sexo, «una mujer» estrecha indebidamente el término frente a «una hembra» o una formulación equivalente más taxonómica. La nota alternativa también falla al proponer «femenina», que en español suena adjetival y poco natural como sustantivo.
  spanish_quality_summary: El español es claro, pero «si es una mujer» introduce una lectura más personal/específica que el hebreo no exige. Para un registro bíblico-jurídico legible y fiel, «si es hembra» funciona mejor aquí. «Tu tasación» y «treinta siclos» son adecuados y naturales en el marco legal del capítulo.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. La decisión clave es נְקֵבָה: el proyecto pide preservar el sentido del original y evitar paráfrasis; por ello conviene una expresión española que denote sexo femenino en general, no «mujer». «Siclos» está bien alineado para שָׁקֶל.'
