translation:
  language: es
  text: ¿Crece el papiro donde no hay pantano? ¿Prospera el junco sin agua?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junco» para el segundo término; el hebreo nombra dos plantas de pantano en paralelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יִגְאֶה
  english_pob_choice: Does ... grow
  chosen_spanish: ¿Crece...
  alternatives_spanish:
  - ¿Brota...
  - ¿Se levanta...
  lexicon: HALOT
  rationale: El interrogativo הֲ introduce una pregunta retórica. En este contexto vegetal, גאה se entiende mejor como crecimiento de planta; «crece» mantiene naturalidad en español y conserva el valor botánico del verbo.
- source_word: גֹּמֶא
  english_pob_choice: papyrus
  chosen_spanish: papiro
  alternatives_spanish:
  - junco
  - ciperáceo
  lexicon: HALOT
  rationale: El término hebreo designa una planta de pantano. «Papiro» es la opción más específica y coincide con la decisión inglesa de evitar un término demasiado general como «rush».
- source_word: בְּלֹא בִצָּה
  english_pob_choice: where there is no marsh
  chosen_spanish: donde no hay pantano
  alternatives_spanish:
  - sin pantano
  - en ausencia de pantano
  lexicon: HALOT
  rationale: La construcción privativa expresa ausencia en un lugar. «Donde no hay pantano» reproduce de manera idiomática el valor locativo y la fuerza retórica del hebreo.
- source_word: יִשְׂגֶּה
  english_pob_choice: Does ... flourish
  chosen_spanish: ¿Prospera...?
  alternatives_spanish:
  - ¿Crece con vigor...?
  - ¿Florece...?
  lexicon: HALOT
  rationale: El verbo implica crecimiento abundante o prosperidad. «Prospera» comunica bien la idea de desarrollo vigoroso y mantiene el paralelismo con el primer hemistiquio.
- source_word: אָחוּ
  english_pob_choice: reed grass
  chosen_spanish: junco
  alternatives_spanish:
  - carrizo
  - hierba de pantano
  lexicon: HALOT
  rationale: El sustantivo nombra otra planta de humedal en paralelo con גֹּמֶא. «Junco» es breve, reconocido y suficientemente preciso para la imagen poética, sin forzar una identificación botánica demasiado técnica.
- source_word: בְלִי מָיִם
  english_pob_choice: without water
  chosen_spanish: sin agua
  alternatives_spanish:
  - sin agua alguna
  - careciendo de agua
  lexicon: HALOT
  rationale: La expresión privativa es directa. «Sin agua» es la forma más natural y fiel en español, preservando la dependencia vital de la planta.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no cambió el sentido del versículo; se mantiene la lectura botánica paralela y la formulación idiomática del contraste entre plantas de pantano y la falta de agua.
  spanish_consistency_notes:
  - Se conserva «papiro» para גֹּמֶא, en línea con la preferencia del POB en inglés por un término más específico.
  - Se usa «junco» para אָחוּ como equivalente comprensible de la planta de humedal, sin duplicar el mismo vocablo para ambas palabras hebreas.
  - La puntuación conserva la doble pregunta retórica del hebreo y la cadencia paralela del verso.
