translation:
  language: es
  text: Y delante de ellos había un pasaje[a], como la apariencia de las cámaras que daban al norte; así como era su longitud, así era su anchura; y todas sus salidas, sus disposiciones[b] y sus entradas eran iguales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «frente a ellos había un pasaje correspondiente a la apariencia de las cámaras del lado norte».'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido aquí «disposiciones» también puede significar «ordenanzas», «regulaciones» o «modo prescrito»; en este contexto probablemente alude al diseño o arreglo estructural de las cámaras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדֶרֶךְ
  english_pob_choice: a passage
  chosen_spanish: un pasaje
  alternatives_spanish:
  - un camino
  - un acceso
  - un corredor
  lexicon: HALOT
  rationale: En este contexto arquitectónico de templo, דֶּרֶךְ no describe un camino genérico sino un acceso construido. «Pasaje» conserva la idea de vía de paso sin forzar una palabra demasiado técnica o demasiado moderna.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en frente de ellos
  - ante ellos
  lexicon: HALOT
  rationale: La expresión indica ubicación espacial respecto de las cámaras. «Delante de ellos» es natural en español y refleja bien la relación espacial.
- source_word: כְּמַרְאֵה
  english_pob_choice: like the appearance of
  chosen_spanish: semejante a la apariencia de
  alternatives_spanish:
  - como la apariencia de
  - parecido al aspecto de
  lexicon: HALOT
  rationale: מַרְאֶה tiene el sentido de apariencia o forma visible. «Semejante a la apariencia de» mantiene el valor comparativo sin añadir interpretación excesiva.
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - las habitaciones
  - los aposentos
  lexicon: HALOT
  rationale: En contextos del templo, לְשָׁכָה se refiere a una cámara o sala arquitectónica. «Cámaras» conserva ese registro técnico y coincide con el uso de la tradición de traducción bíblica cuando el contexto es edilicio.
- source_word: אֲשֶׁר דֶּרֶךְ הַצָּפוֹן
  english_pob_choice: that faced north
  chosen_spanish: que daban al norte
  alternatives_spanish:
  - que estaban hacia el norte
  - que miraban al norte
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente direccional y espacial. «Daban al norte» comunica de forma idiomática la orientación sin perder el sentido arquitectónico.
- source_word: כְּאָרְכָּן כֵּן רָחְבָּן
  english_pob_choice: as was their length, so was their width
  chosen_spanish: así como era su longitud, así era su anchura
  alternatives_spanish:
  - como era su longitud, así era su anchura
  - tal como era su largo, así era su ancho
  lexicon: HALOT
  rationale: La construcción correlativa compara dimensiones. Se preserva el paralelismo hebreo y se usa «longitud/anchura» por precisión y registro bíblico-formal.
- source_word: וְכֹל מוֹצָאֵיהֶן
  english_pob_choice: all their exits
  chosen_spanish: todas sus salidas
  alternatives_spanish:
  - todos sus accesos
  - todas sus salidas al exterior
  lexicon: HALOT
  rationale: מוֹצָא designa salida, punto de salida o eflujo. En una descripción de edificio, «salidas» es la forma más directa y fiel al valor espacial.
- source_word: וּכְמִשְׁפְּטֵיהֶן
  english_pob_choice: their arrangements
  chosen_spanish: sus disposiciones[b]
  alternatives_spanish:
  - sus arreglos
  - sus reglamentos
  - su disposición
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí no es una ordenanza legal en sentido primario, sino el modo prescrito o la disposición establecida. «Disposiciones» deja abierta esa tensión entre plan, orden y norma arquitectónica.
- source_word: וּכְפִתְחֵיהֶן
  english_pob_choice: their entrances
  chosen_spanish: sus entradas
  alternatives_spanish:
  - sus puertas
  - sus accesos
  lexicon: HALOT
  rationale: פֶּתַח se refiere a abertura o entrada. «Entradas» es claro en español y mantiene el sentido edilicio.
theological_decisions:
- issue: Sentido de מִשְׁפָּטֵיהֶן en un contexto arquitectónico
  english_pob_reading: their arrangements; the term can also mean ordinances, regulations, or prescribed manner, but here it likely refers to structural layout or prescribed design.
  chosen_spanish_reading: sus disposiciones
  alternative_spanish_readings:
  - sus reglamentos
  - sus ordenanzas
  - su disposición prescrita
  rationale: 'No se debe reducir el término a un sentido legal estricto ni borrar su posible matiz normativo. «Disposiciones» conserva la ambigüedad controlada: puede aludir al arreglo estructural y también al orden prescrito del diseño.'
  doctrine_reference: Principio de equivalencia semántica en términos polisémicos; cf. uso contextual de מִשְׁפָּט en descripciones cultuales/arquitectónicas.
translation_notes:
  revision_awareness: La redacción sigue la revisión reciente del inglés POB que prefirió «passage» sobre «walkway» por mayor formalidad y adecuación contextual. En español se reflejó con «pasaje», manteniendo el resto de la estructura comparativa y la enumeración final sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca; este versículo no contiene el Tetragrámaton.
  - Se usó «cámaras» para לְשָׁכוֹת por coherencia con el registro arquitectónico del templo.
  - Se preservó el paralelismo de medidas con «longitud/anchura» en lugar de simplificarlo a «largo/ancho», para mayor fidelidad formal.
  - Se mantuvo «entradas» y «salidas» como términos distintos para reflejar la doble referencia espacial del hebreo.
