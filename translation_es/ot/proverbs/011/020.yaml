translation:
  language: es
  text: Los de corazón torcido[a] son una abominación para Yahvé, pero los íntegros en su camino[b] son su deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los perversos de corazón».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los íntegros de camino», es decir, los que tienen una conducta íntegra o recta.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa detestable
  lexicon: HALOT
  rationale: El sustantivo expresa fuerte repulsión moral o de pacto. «Abominación» conserva la intensidad proverbial y la concisión del hebreo mejor que una versión suavizada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte como transliteración del Tetragrámaton. En español, «Yahvé» mantiene el nombre personal revelado y evita la sustitución por un título.
- source_word: עִקְּשֵׁי לֵב
  english_pob_choice: the crooked in heart
  chosen_spanish: los de corazón torcido
  alternatives_spanish:
  - los perversos de corazón
  - los de corazón retorcido
  lexicon: HALOT
  rationale: La expresión describe deformación moral interior. «Corazón torcido» conserva la metáfora hebrea y resulta natural en español; «de corazón» refleja que se trata del ser interior, no solo de emociones.
- source_word: וּרְצוֹנוֹ
  english_pob_choice: are his delight
  chosen_spanish: son su deleite
  alternatives_spanish:
  - son su agrado
  - son su favor
  lexicon: HALOT
  rationale: El sustantivo puede significar placer, favor o deleite. «Su deleite» mantiene el contraste con «abominación» y reproduce bien la relación posesiva del sufijo.
- source_word: תְּמִימֵי דָרֶךְ
  english_pob_choice: those blameless in their way
  chosen_spanish: los íntegros en su camino
  alternatives_spanish:
  - los blameless en su camino
  - los de conducta íntegra
  - los rectos en su andar
  lexicon: HALOT
  rationale: תָּמִים comunica integridad, plenitud o irreprensibilidad; דֶּרֶךְ en sabiduría suele referirse al curso de vida o conducta. «Íntegros en su camino» preserva el idiomatismo hebreo y es claro en español.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la decisión del proyecto, se preserva el nombre divino en español como «Yahvé», evitando el reemplazo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido antropológico de «corazón»
  english_pob_reading: Retain 'heart' literally
  chosen_spanish_reading: Retener «corazón» literalmente
  alternative_spanish_readings:
  - mente
  - interior
  - ser interior
  rationale: En la sabiduría hebrea, el «corazón» es el centro moral e intelectual de la persona. Mantener la imagen evita reducirla a una sola facultad moderna.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; la redacción española sigue de cerca el hebreo y el audit trail inglés, sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se conserva la oposición proverbial entre «abominación» y «deleite».
  - «Yahvé» se usa de manera consistente con la política del proyecto para יהוה.
  - «Corazón» y «camino» mantienen la antropología y la metáfora sapiencial del hebreo.
  - Se evitó «Cristo», «SEÑOR» y otros sustitutos no presentes en el texto fuente.
