lexical_decisions:
- source_word: מִי
  english_pob_choice: What
  chosen_spanish: ¿Qué hombre... ?
  alternatives_spanish:
  - ¿Quién... ?
  - ¿Qué varón... ?
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica y de asombro. En español, "¿Qué hombre... ?" conserva bien ese tono interrogativo y la fuerza idiomática que el audit trail explica para el inglés "What man"; "¿Quién...?" sería posible, pero atenúa la construcción con גֶבֶר.
- source_word: גֶבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - hombre fuerte
  - guerrero
  lexicon: HALOT
  rationale: גבר aquí designa al hombre en sentido básico dentro de la comparación retórica. "Hombre" es natural y fiel; no se explicita la posible connotación de fuerza porque el contexto no la desarrolla de manera suficiente.
- source_word: כְּאִיּוֹב
  english_pob_choice: like Job
  chosen_spanish: como Job
  alternatives_spanish:
  - igual que Job
  - al modo de Job
  lexicon: HALOT
  rationale: El prefijo comparativo כ se expresa de manera directa con "como". "Como Job" mantiene la similitudo sin añadir interpretaciones.
- source_word: יִשְׁתֶּה
  english_pob_choice: drinks
  chosen_spanish: bebe
  alternatives_spanish:
  - está bebiendo
  - bebería
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como caracterización habitual o proverbial. "Bebe" transmite de forma natural en español esa acción característica, sin forzar un valor aspectual demasiado técnico.
- source_word: לַּעַג
  english_pob_choice: mockery
  chosen_spanish: la burla
  alternatives_spanish:
  - el escarnio
  - la mofa
  - el desprecio
  lexicon: HALOT
  rationale: לַּעַג se refiere a la ridiculización o habla burlona. "La burla" es claro en español y mantiene el sentido verbal de la imagen; "escarnio" o "mofa" serían alternativas válidas pero más marcadas.
- source_word: כַּמָּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - igual que el agua
  - cual agua
  lexicon: HALOT
  rationale: La comparación fija con agua debe sonar fluida y proverbial en español. "Como agua" preserva la imagen de consumir algo libre y abundantemente.
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y el hebreo masorético; no se requieren revisiones respecto del consenso de alta concordancia, y se preserva la ambigüedad léxica documentada entre "mockery" y "scorn" mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se mantiene "Job" como nombre propio sin adaptación.
  - Se evita lenguaje eclesiástico no presente en el hebreo.
  - La pregunta retórica se formula con sintaxis natural en español sin perder la comparación intensificada.
  - '"Burla" reproduce el campo semántico de לַּעַג de forma idiomática y comprensible para lectura pública.'
