translation:
  language: es
  text: Vean pues, hijos míos, el final del hombre bueno. Imiten [en bondad] por su compasión, para que también ustedes lleven coronas de gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἴδετε
  english_pob_choice: See then
  chosen_spanish: Ved, pues
  alternatives_spanish:
  - Mirad, pues
  - Considerad
  lexicon: BDAG
  rationale: Imperativo aoristo plural; 'ved' es la traducción directa con resonancia bíblica.
- source_word: τὸ τέλος
  english_pob_choice: the end
  chosen_spanish: el final
  alternatives_spanish:
  - el desenlace
  - el fin
  lexicon: LSJ
  rationale: Sigue la revisión POB que ajustó 'outcome' a 'end'. 'Final' aquí preserva el sentido de cierre vital del hombre bueno (José).
- source_word: μιμήσασθε ... ἐν ἀγαθῇ
  english_pob_choice: Imitate his goodness
  chosen_spanish: Imitad su bondad
  alternatives_spanish:
  - Imitad lo bueno
  - Imitad la virtud
  lexicon: BDAG
  rationale: Sigue la revisión POB que rindió 'Imitate his goodness' para naturalidad.
- source_word: εὐσπλαγχνίαν
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - entrañable misericordia
  lexicon: BDAG
  rationale: Transmite piedad profunda con calidez teológica.
- source_word: στεφάνους δόξης
  english_pob_choice: crowns of glory
  chosen_spanish: coronas de gloria
  alternatives_spanish:
  - guirnaldas de gloria
  lexicon: BDAG
  rationale: Imagen escatológica estándar; 'coronas de gloria' es la traducción tradicional bíblica.
- source_word: φορέσητε
  english_pob_choice: may wear
  chosen_spanish: llevéis
  alternatives_spanish:
  - lucáis
  - uséis
  lexicon: BDAG
  rationale: φορέω denota llevar habitualmente; 'llevéis' encaja con coronas en sentido escatológico.
translation_notes:
  revision_awareness: El POB inglés fue revisado de 'outcome' a 'end' (correspondencia léxica con τέλος) y 'Imitate the good' a 'Imitate his goodness' (objeto natural). La versión española sigue 'el final' e 'imitad su bondad'.
  spanish_consistency_notes:
  - τέλος → 'final'
  - εὐσπλαγχνία → 'compasión'
  - στέφανος → 'corona'
  - δόξα → 'gloria'
