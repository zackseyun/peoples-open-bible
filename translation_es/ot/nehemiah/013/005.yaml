  yaml_path: translation/ot/nehemiah/013/005.yaml
  text: He made for him a large chamber[a], where formerly they had put the grain offering, the frankincense, the vessels, and the tithe of grain, new wine, and oil—the portion commanded for the Levites, the singers[d][c][b], and the gatekeepers—and the contribution for the priests.
  footnotes:
  - marker: a
    text: Or 'a large storeroom.' The Hebrew term can denote a chamber used for storage within the temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'there they used to put formerly,' expressing customary past practice.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the commandment of the Levites, the singers, and the gatekeepers'; the sense is the portions prescribed for them.
    reason: lexical_alternative
  - marker: d
    text: Or 'the heave offering for the priests.'
    reason: lexical_alternative
