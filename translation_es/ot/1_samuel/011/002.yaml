translation:
  language: es
  text: 'Nahás el amonita les dijo: «Con esta condición haré un pacto con ustedes[a]: al sacarles el ojo derecho a cada uno de ustedes[b], lo convertiré en una afrenta sobre todo Israel»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «cortaré un pacto con ustedes».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al perforar/horadar». Se expresa en español de forma natural como una acción de sacar o vaciar el ojo, conservando la violencia del gesto.
    reason: lexical_alternative
  - marker: c
    text: O «en un reproche sobre todo Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחָשׁ הָעַמּוֹנִי
  english_pob_choice: Nahash the Ammonite
  chosen_spanish: Nahás el amonita
  alternatives_spanish:
  - Nahás, el amonita
  - Nahash el amonita
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración y el gentilicio en español. 'Amonita' mantiene la referencia étnica sin forzar una forma litúrgica.
- source_word: בְּזֹאת
  english_pob_choice: On this condition
  chosen_spanish: En esta condición
  alternatives_spanish:
  - Con esto
  - Por esto
  lexicon: HALOT
  rationale: La preposición con el demostrativo introduce la condición o término bajo el cual Nahás propone el pacto. 'En esta condición' preserva mejor el valor condicional que una traducción meramente instrumental.
- source_word: אֶכְרֹת לָכֶם
  english_pob_choice: I will make a treaty with you
  chosen_spanish: haré un pacto con ustedes
  alternatives_spanish:
  - cortaré un pacto con ustedes
  - haré una alianza con ustedes
  lexicon: HALOT
  rationale: כרת con lenguaje de pacto se vierte de forma idiomática en español como 'hacer un pacto'. Se evita 'alianza' por ser más genérico y 'cortar' por sonar excesivamente literal sin aportar claridad.
- source_word: בִּנְקֹר
  english_pob_choice: by gouging out
  chosen_spanish: al sacarles
  alternatives_spanish:
  - al arrancarles
  - mediante el vaciado de
  lexicon: HALOT
  rationale: El infinitivo constructo expresa el medio o condición de la propuesta. 'Al sacarles' comunica la acción violenta de manera natural en español, sin perder la relación instrumental de la frase. Se evita suavizar demasiado el verbo, aunque el español no exige repetir el matiz anatómico del inglés para ser fiel aquí.
- source_word: כָּל עֵין יָמִין
  english_pob_choice: every right eye
  chosen_spanish: a todos el ojo derecho
  alternatives_spanish:
  - el ojo derecho de cada uno
  - cada ojo derecho
  lexicon: HALOT
  rationale: 'La construcción es distributiva: el ojo derecho de cada persona. ''A todos el ojo derecho'' mantiene la idea distributiva en un castellano fluido, aunque no copie palabra por palabra la sintaxis hebrea.'
- source_word: וְשַׂמְתִּיהָ
  english_pob_choice: I will make it
  chosen_spanish: pondré esto
  alternatives_spanish:
  - lo haré
  - lo pondré
  lexicon: HALOT
  rationale: שׂים con חֶרְפָּה עַל expresa causar o convertir algo en afrenta. 'Pondré esto' conserva la idea de poner/establecer y deja explícita la referencia al acto descrito antes.
- source_word: חֶרְפָּה
  english_pob_choice: a disgrace
  chosen_spanish: afrenta
  alternatives_spanish:
  - deshonra
  - vergüenza
  - reproche
  lexicon: HALOT
  rationale: En contexto de honor nacional, חֶרְפָּה es una vergüenza pública o reproche. 'Afrenta' recoge bien la carga de humillación pública y es más fuerte que 'deshonra' en español contemporáneo.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: upon all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - contra todo Israel
  - para todo Israel
  lexicon: HALOT
  rationale: עַל marca la afrenta como puesta sobre el pueblo. 'Sobre todo Israel' conserva la imagen espacial/metafórica de una carga de vergüenza que recae sobre la nación.
theological_decisions:
- issue: El verbo de pacto כרת (cut/make a covenant)
  english_pob_reading: I will make a treaty with you
  chosen_spanish_reading: haré un pacto con ustedes
  alternative_spanish_readings:
  - cortaré un pacto con ustedes
  - haré una alianza con ustedes
  rationale: No hay necesidad de introducir una fórmula eclesiástica fija. 'Pacto' conserva el lenguaje bíblico; 'haré' naturaliza el idiomático כרת sin perder la noción de convenio solemne.
  doctrine_reference: Pacto bíblico / lenguaje de alianza
- issue: La intensidad de la humillación nacional
  english_pob_reading: I will make it a disgrace upon all Israel
  chosen_spanish_reading: pondré esto como afrenta sobre todo Israel
  alternative_spanish_readings:
  - lo convertiré en deshonra sobre todo Israel
  - lo haré una vergüenza para todo Israel
  rationale: Se mantiene la fuerza de humillación pública y colectiva. 'Afrenta' preserva el carácter honor-shame del texto sin suavizarlo demasiado ni introducir una interpretación moral no explícita.
  doctrine_reference: Honor y vergüenza en el texto narrativo
- issue: El acto corporal extremo como condición del tratado
  english_pob_reading: by gouging out every right eye of yours
  chosen_spanish_reading: al sacarles a todos el ojo derecho
  alternative_spanish_readings:
  - al arrancarles a todos el ojo derecho
  - mediante la extirpación de su ojo derecho
  rationale: El texto describe una violencia física concreta como condición de sometimiento. El español elegido evita atenuarla y conserva la función instrumental/condicional de la cláusula.
  doctrine_reference: Fidelidad narrativa al acto descrito
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que recastó la cláusula de condición para reflejar mejor el instrumental hebreo ('by gouging out...'). La versión española refleja esa lectura con una cláusula introducida por 'al + infinitivo' ('al sacarles...'), manteniendo el valor de medio/condición y la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene 'Nahás' para el nombre propio y 'amonita' para el gentilicio, en consonancia con transliteración estándar.
  - '''Pacto'' se usa para כרת ל־כֶם en vez de ''alianza'' para conservar el lenguaje bíblico sin sobrecargar el texto.'
  - '''Afrenta'' se elige por su valor de humillación pública; si en otros contextos del proyecto aparece ''reproche'', aquí se preserva la cohesión semántica con el honor nacional.'
  - La cláusula final queda con metáfora espacial ('sobre todo Israel') para respetar עַל sin convertirla en simple dativo de destinatario.
