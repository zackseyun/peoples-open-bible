translation:
  language: es
  text: Él es como la luz de la mañana cuando sale el sol[a], una mañana sin nubes; de resplandor, de lluvia[b], la hierba de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y como la luz de la mañana». El hebreo es elíptico y continúa la descripción del gobernante del versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de resplandor, de lluvia, hierba de la tierra»; una imagen poética comprimida de vegetación nueva que brota después de la lluvia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְאוֹר
  english_pob_choice: he is like the light
  chosen_spanish: Él es como la luz
  alternatives_spanish:
  - Y como la luz
  - como la luz
  lexicon: HALOT
  rationale: El hebreo es elíptico y depende del contexto inmediato; en español conviene explicitar el sujeto para que la comparación quede natural y clara, sin añadir contenido nuevo.
- source_word: בֹּקֶר
  english_pob_choice: morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - el amanecer
  - el alba
  lexicon: HALOT
  rationale: '"Mañana" reproduce bien el campo semántico de בֹּקֶר y mantiene el paralelismo con la segunda ocurrencia del término.'
- source_word: יִזְרַח שָׁמֶשׁ
  english_pob_choice: when the sun rises
  chosen_spanish: cuando sale el sol
  alternatives_spanish:
  - cuando el sol se levanta
  - cuando el sol resplandece
  lexicon: HALOT
  rationale: יִזְרַח combina la idea de salir y brillar; "sale el sol" es una equivalencia idiomática natural en español que conserva el valor temporal-poético.
- source_word: בֹּקֶר לֹא עָבוֹת
  english_pob_choice: a morning without clouds
  chosen_spanish: una mañana sin nubes
  alternatives_spanish:
  - una mañana despejada
  - una mañana sin nublado
  lexicon: HALOT
  rationale: עָבוֹת alude a nubes densas; "sin nubes" comunica de manera clara la imagen de un cielo despejado sin forzar tecnicismos.
- source_word: מִנֹּגַהּ
  english_pob_choice: from brightness
  chosen_spanish: de resplandor
  alternatives_spanish:
  - de claridad
  - de brillo
  lexicon: HALOT
  rationale: Conservo la preposición de origen/emanación que refleja מִן y traduzco נֹגַהּ con un sustantivo de luz. "Resplandor" mantiene la densidad poética.
- source_word: מִמָּטָר
  english_pob_choice: from rain
  chosen_spanish: de lluvia
  alternatives_spanish:
  - tras la lluvia
  - por la lluvia
  lexicon: HALOT
  rationale: La revisión inglesa volvió a una estructura más literal; "de lluvia" preserva la preposición מקור/emanación del hebreo sin convertirla en una relación temporal explícita.
- source_word: דֶּשֶׁא
  english_pob_choice: fresh grass
  chosen_spanish: hierba
  alternatives_spanish:
  - hierba fresca
  - pasto
  - verdor
  lexicon: HALOT
  rationale: דֶּשֶׁא puede referirse a vegetación tierna que brota. "Hierba" es un equivalente sobrio y comprensible; el contexto de lluvia y tierra sugiere el brote nuevo sin necesidad de añadir "fresca" en el texto principal.
- source_word: מֵאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - del suelo
  lexicon: HALOT
  rationale: '"Tierra" conserva el paralelismo poético con el hebreo אָרֶץ y sugiere el lugar del que brota la vegetación.'
theological_decisions:
- issue: Sujeto implícito de la comparación
  english_pob_reading: The verse continues the description of the ruler from v. 3, rendered with an explicit English subject 'he is.'
  chosen_spanish_reading: La comparación continúa la descripción del gobernante del versículo anterior, con sujeto explícito "Él es".
  alternative_spanish_readings:
  - Y como la luz de la mañana...
  - Como la luz de la mañana...
  rationale: La poesía hebrea es elíptica, pero en español una cláusula completa con sujeto explícito facilita la lectura pública y mantiene la conexión con el contexto sin introducir una interpretación distinta.
  doctrine_reference: Poética hebrea y principio de claridad contextual
- issue: Relación de la cláusula final
  english_pob_reading: 'The line depicts the effect of brightness after rain: fresh grass springing from the earth.'
  chosen_spanish_reading: 'La cláusula final mantiene la imagen comprimida: de resplandor, de lluvia, hierba de la tierra.'
  alternative_spanish_readings:
  - después de la lluvia, hierba nueva de la tierra
  - de brillo tras la lluvia, hierba de la tierra
  rationale: El hebreo presenta preposiciones breves y una imagen condensada; la redacción española conserva esa tensión sin forzar una paráfrasis explicativa en el texto principal.
  doctrine_reference: Poética hebrea y fidelidad semántica
translation_notes:
  revision_awareness: 'La versión inglesa más reciente volvió a una formulación más literal en la última cláusula (''from brightness, from rain, grass from the earth'') después de una redacción más interpretativa (''after rain, fresh grass''). La presente propuesta española sigue esa revisión: conserva la preposición de origen con ''de resplandor, de lluvia, hierba de la tierra'', sin convertirla en una explicación temporal. También mantiene la simetría entre las dos menciones de ''mañana'' y la comparación implícita del hebreo, explicitando solo el sujeto necesario para la lectura natural en español.'
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' fuera del versículo porque no aparecen en el texto.
  - No se introduce 'Cristo' ni 'Mesías' porque el pasaje no contiene esas formas léxicas.
  - Se conserva un registro poético pero publicable, evitando calcos como 'a morning without clouds' y evitando una paráfrasis excesiva en la imagen final.
