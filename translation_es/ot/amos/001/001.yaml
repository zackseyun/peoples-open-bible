translation:
  language: es
  text: Palabras de Amós[a], que era de entre los pastores de Tecoa, lo que vio acerca de Israel[b] en los días de Uzías, rey de Judá, y en los días de Jeroboam, hijo de Joás, rey de Israel, dos años antes del terremoto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de entre los criadores de ovejas”. El hebreo puede referirse de manera más específica a la cría de ovejas que al pastoreo en general.
    reason: lexical_alternative
  - marker: b
    text: O “contra Israel”. La preposición hebrea en contextos proféticos puede tener cualquiera de los dos sentidos; aquí se elige la formulación más amplia de la superscripción.
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Palabras de
  alternatives_spanish:
  - Las palabras de
  - Los dichos de
  - Los asuntos de
  lexicon: HALOT
  rationale: En una superscripción profética, דִּבְרֵי introduce el encabezado del libro. 'Palabras de' conserva la estructura breve y natural del hebreo y corresponde bien al valor estándar de la fórmula sin convertirla en paráfrasis.
- source_word: עָמוֹס
  english_pob_choice: Amos
  chosen_spanish: Amós
  alternatives_spanish:
  - Amos
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio al español como 'Amós', forma habitual y comprensible en la tradición bíblica en español.
- source_word: בַּנֹּקְדִים
  english_pob_choice: among the shepherds
  chosen_spanish: entre los pastores
  alternatives_spanish:
  - entre los criadores de ovejas
  - entre los cuidadores de ovejas
  lexicon: HALOT
  rationale: El inglés POB pasó de la acepción más específica a 'shepherds' por fluidez. En español, 'pastores' reproduce de modo natural el oficio sin perder el sentido ocupacional general del término, y evita una frase pesada en el encabezado.
- source_word: מִתְּקוֹעַ
  english_pob_choice: from Tekoa
  chosen_spanish: de Tecoa
  alternatives_spanish:
  - desde Tecoa
  lexicon: Nombre de lugar
  rationale: La preposición hebrea de procedencia se rinde con 'de' en español para un sintagma nominal más natural en una procedencia geográfica.
- source_word: חָזָה
  english_pob_choice: which he saw
  chosen_spanish: lo que vio
  alternatives_spanish:
  - lo que contempló
  - la visión que tuvo
  lexicon: HALOT
  rationale: Se mantiene el verbo 'ver' para reflejar la forma hebrea y la convención profética de recibir revelación mediante visión. 'Lo que vio' conserva la relación formal con el encabezado sin sobreexplicarla.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: concerning Israel
  chosen_spanish: acerca de Israel
  alternatives_spanish:
  - contra Israel
  - sobre Israel
  lexicon: HALOT
  rationale: El valor de עַל en contextos proféticos admite 'acerca de' o 'contra'. El POB inglés eligió el sentido más amplio ('concerning'); en español, 'acerca de' preserva esa neutralidad superinscripcional.
- source_word: בִּימֵי ... וּבִימֵי
  english_pob_choice: in the days of ... and in the days of
  chosen_spanish: en los días de ... y en los días de
  alternatives_spanish:
  - durante el reinado de ... y durante el reinado de
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea tradicional de datación, que en español es clara y reconocible en registros bíblicos.
- source_word: שְׁנָתַיִם לִפְנֵי הָרָעַשׁ
  english_pob_choice: two years before the earthquake
  chosen_spanish: dos años antes del terremoto
  alternatives_spanish:
  - dos años antes del sismo
  lexicon: HALOT
  rationale: '''Terremoto'' es el equivalente más natural y preciso para רָעַשׁ en este contexto, manteniendo la referencia a un evento sísmico conocido.'
theological_decisions:
- issue: Relación entre 'palabras' y 'vio' en la superscripción profética
  english_pob_reading: Retains 'which he saw' with 'the words,' preserving the Hebrew formal linkage between spoken prophetic words and visionary reception.
  chosen_spanish_reading: Conserva 'lo que vio' unido a 'palabras', manteniendo la misma relación formal entre el mensaje profético y la visión.
  alternative_spanish_readings:
  - Las visiones que vio acerca de Israel
  - Las palabras de Amós... y la visión que vio acerca de Israel
  rationale: El hebreo presenta una construcción compacta donde el 'ver' caracteriza al bloque introductorio. La traducción española mantiene esa tensión formal sin resolverla por reestructuración interpretativa.
  doctrine_reference: 'Principios de traducción POB: fidelidad formal y preservación de tensiones textuales'
- issue: Sentido de עַל יִשְׂרָאֵל en una fórmula profética
  english_pob_reading: Chooses 'concerning Israel' as broader superscriptional wording, leaving the possible adversative sense open.
  chosen_spanish_reading: Escoge 'acerca de Israel' como formulación amplia de la superscripción, dejando abierta la posible lectura adversativa.
  alternative_spanish_readings:
  - contra Israel
  - sobre Israel
  rationale: El contexto profético permite tanto un sentido general como uno de juicio. 'Acerca de' preserva la amplitud del hebreo y evita decidir prematuramente por una lectura polémica.
  doctrine_reference: Exégesis profética y preservación de ambigüedad legítima
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'shepherds' frente a la opción más específica 'sheep breeders', por considerarla más natural en el contexto del encabezado. La versión española sigue esa decisión con 'pastores', sin perder el trasfondo ocupacional del término hebreo. También se respetó la preferencia del POB por una formulación amplia de עַל יִשְׂרָאֵל ('concerning Israel'), reflejada en 'acerca de Israel'.
  spanish_consistency_notes:
  - Se usa 'Amós' con tilde, 'Uzías', 'Jeroboam', 'Joás' y 'Tecoa' como formas españolas coherentes de nombres propios bíblicos.
  - Se conservó la fórmula de datación 'en los días de' por su correspondencia directa con el hebreo y su uso estable en español bíblico.
  - '''Terremoto'' mantiene la referencia a un evento definido, sin añadir detalles no presentes en el texto.'
