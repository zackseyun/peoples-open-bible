translation:
  language: es
  text: Y es justo reconocer que la razón es soberana[a], puesto que incluso prevalece sobre los dolores externos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la razón tiene la supremacía» o «el poder pertenece a la razón». La frase griega subraya la fuerza gobernante de la razón.
    reason: lexical_alternative
  - marker: b
    text: O «los dolores exteriores». La expresión se refiere a dolores que vienen de fuera, probablemente incluyendo sufrimientos corporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιόν
  english_pob_choice: it is right
  chosen_spanish: es justo
  alternatives_spanish:
  - es correcto
  - es adecuado
  - es justo y apropiado
  lexicon: LSJ
  rationale: δίκαιόν ἐστιν expresa una valoración moral o de conveniencia; «es justo» reproduce bien ese matiz en español y conserva la fuerza evaluativa del original.
- source_word: ὁμολογεῖν
  english_pob_choice: to acknowledge
  chosen_spanish: reconocer
  alternatives_spanish:
  - confesar
  - admitir
  - afirmar
  lexicon: LSJ
  rationale: En este argumento no se trata de confesar pecado, sino de admitir abiertamente una conclusión. «Reconocer» es natural en español y mantiene el valor de asentimiento público.
- source_word: τὸ κράτος
  english_pob_choice: is sovereign
  chosen_spanish: tiene el dominio
  alternatives_spanish:
  - es soberana
  - tiene el poder
  - tiene la supremacía
  lexicon: LSJ
  rationale: κράτος señala fuerza gobernante o poder efectivo. «Tiene el dominio» comunica esa idea de autoridad y gobierno sin introducir una formulación excesivamente abstracta o ajena al contexto.
- source_word: τοῦ λογισμοῦ
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  - la facultad racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός funciona como la facultad racional dirigente. «La razón» es la forma más clara y fiel en español para este término filosófico-antrópologico.
- source_word: ὅπου γε καὶ
  english_pob_choice: since it even
  chosen_spanish: puesto que incluso
  alternatives_spanish:
  - ya que incluso
  - pues incluso
  - porque incluso
  lexicon: LSJ
  rationale: La frase introduce la prueba o base de la afirmación con énfasis. «Puesto que incluso» conserva el valor causal y el matiz enfático de καὶ/γε.
- source_word: τῶν ἔξωθεν ἀλγηδόνων
  english_pob_choice: outward pains
  chosen_spanish: los dolores exteriores
  alternatives_spanish:
  - los dolores externos
  - los dolores de fuera
  - los sufrimientos externos
  lexicon: LSJ
  rationale: ἔξωθεν indica lo que viene de fuera; ἀλγηδόνες son dolores. «Dolores exteriores» es una forma fiel y comprensible, y mantiene el contraste con la firmeza interior de la razón.
- source_word: ἐπικρατεῖ
  english_pob_choice: prevails over
  chosen_spanish: prevalece sobre
  alternatives_spanish:
  - domina sobre
  - vence a
  - tiene superioridad sobre
  lexicon: LSJ
  rationale: ἐπικρατέω significa prevalecer o imponerse sobre algo. «Prevalece sobre» preserva la relación de superioridad sin exagerar el lenguaje.
theological_decisions:
- issue: Fuerza antropológico-filosófica de λογισμός en 4 Macabeos
  english_pob_reading: reason is sovereign
  chosen_spanish_reading: la razón tiene el dominio
  alternative_spanish_readings:
  - la razón es soberana
  - la razón tiene la supremacía
  - el juicio racional domina
  rationale: El versículo afirma la capacidad gobernante de la razón frente al dolor. «Tiene el dominio» expresa esa soberanía funcional en español sin desplazar el sentido filosófico del texto hacia categorías teológicas ajenas.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning over tradition'
translation_notes:
  revision_awareness: 'Alineado con la revisión inglesa más reciente, que permaneció sin cambios tras la última pasada y mantiene la misma lectura: la razón posee poder gobernante y prevalece aun sobre dolores externos.'
  spanish_consistency_notes:
  - Se mantiene «razón» para λογισμός, en coherencia con el uso filosófico del libro.
  - «Dolores exteriores» conserva la idea de pains coming from outside, sin añadir específicamente «corporales» al texto principal.
  - El verbo «prevalece» reproduce la relación de superioridad de ἐπικρατεῖ sin convertirla en una victoria más enfática que la del griego.
  - Se evita «SEÑOR» y otras convenciones no pertinentes, pues el pasaje no contiene lenguaje del nombre divino ni cristológico.
