translation:
  language: es
  text: 'Cuando Jesús oyó esto, le dijo: «Todavía te falta una cosa[a]: vende todo lo que tienes y repártelo entre los pobres, y tendrás un tesoro en el cielo[b]; y ven, sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Una cosa todavía te falta». El griego dice más literalmente: «Todavía una cosa te falta».'
    reason: lexical_alternative
  - marker: b
    text: O «un tesoro en los cielos». El griego tiene el plural «cielos», aunque en español suele decirse «cielo» en singular en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας δὲ
  english_pob_choice: When Jesus heard this
  chosen_spanish: Cuando Jesús oyó esto
  alternatives_spanish:
  - Y al oír esto Jesús
  - Pero cuando Jesús oyó esto
  lexicon: BDAG
  rationale: El participio aoristo con δέ se entiende naturalmente como una cláusula temporal. «Oyó esto» conserva el antecedente implícito del diálogo sin introducir una paráfrasis excesiva. «Esto» reproduce el referente contextual que el griego omite explícitamente.
- source_word: Ἔτι ἕν σοι λείπει
  english_pob_choice: One thing still is lacking for you
  chosen_spanish: Todavía te falta una cosa
  alternatives_spanish:
  - Aún te falta una cosa
  - Una cosa todavía te falta
  - Todavía una cosa te falta
  lexicon: BDAG
  rationale: λeípei expresa carencia; en español, «te falta» comunica con naturalidad el sentido de «is lacking for you» sin perder la tensión de que queda una sola cosa pendiente. Se mantiene la idea de unicidad con «una cosa» y el adverbio «todavía» para ἔτι.
- source_word: πάντα ὅσα ἔχεις
  english_pob_choice: all that you have
  chosen_spanish: todo lo que tienes
  alternatives_spanish:
  - todo cuanto tienes
  - todas las cosas que tienes
  lexicon: BDAG
  rationale: La expresión es abarcadora e idiomática. «Todo lo que tienes» comunica la totalidad sin sonar forzado en español y preserva el valor comprehensivo de πάντα ὅσα.
- source_word: πώλησον
  english_pob_choice: sell
  chosen_spanish: vende
  alternatives_spanish:
  - vende todo
  - pon en venta
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva. «Vende» es directo, claro y fiel; el contexto completa el alcance con «todo lo que tienes».
- source_word: διάδος πτωχοῖς
  english_pob_choice: distribute it to the poor
  chosen_spanish: repártelo entre los pobres
  alternatives_spanish:
  - dáselo a los pobres
  - distribúyelo entre los pobres
  lexicon: BDAG
  rationale: διαδίδωμι tiene un matiz de repartir o distribuir, más preciso que un simple «dar». «Repártelo entre los pobres» conserva ese matiz y suena natural en español bíblico moderno.
- source_word: πτωχοῖς
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - a los pobres
  - la gente pobre
  lexicon: BDAG
  rationale: La forma sustantivada del adjetivo se vierte de manera estándar como «los pobres», manteniendo la referencia a personas necesitadas sin añadir explicaciones.
- source_word: ἕξεις θησαυρὸν ἐν οὐρανοῖς
  english_pob_choice: you will have treasure in heaven
  chosen_spanish: tendrás un tesoro en los cielos
  alternatives_spanish:
  - tendrás tesoro en el cielo
  - tendrás un tesoro en el cielo
  lexicon: BDAG
  rationale: Se conserva el plural «cielos» porque el griego tiene οὐρανοῖς, y la POB inglesa documenta esa tensión frente al uso idiomático singular. «Tesoro» traduce θησαυρός de forma estándar y «tendrás» mantiene el futuro del verbo griego.
- source_word: δεῦρο
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  - acércate
  lexicon: BDAG
  rationale: δεῦρο funciona aquí como una invitación imperativa de movimiento hacia Jesús. «Ven» es breve, natural y conserva la urgencia del llamado.
- source_word: ἀκολούθει μοι
  english_pob_choice: follow me
  chosen_spanish: sígueme
  alternatives_spanish:
  - ven siguiéndome
  - continúa siguiéndome
  lexicon: BDAG
  rationale: El presente imperativo puede sugerir seguimiento continuo, pero en español «sígueme» expresa con naturalidad la llamada discipular sin sobrecargar el texto.
theological_decisions:
- issue: Mandato concreto a un individuo versus principio universal de renuncia
  english_pob_reading: The verse is rendered as a direct call to radical surrender and discipleship without importing a universal command for all believers beyond what the immediate context states.
  chosen_spanish_reading: El verso se presenta como un llamado directo y concreto a este hombre, a una renuncia radical y al discipulado, sin convertirlo en una regla universal explícita para todos los creyentes.
  alternative_spanish_readings:
  - Un mandamiento universal de despojo total para todo discípulo
  - Un gesto meramente simbólico sin exigencia material concreta
  rationale: El griego dirige el mandato a un interlocutor específico y culmina en «sígueme». La redacción española conserva esa fuerza concreta y evita resolver una tensión doctrinal que el texto no resuelve por sí mismo.
  doctrine_reference: Preservar la tensión teológica, no uniformarla.
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada en una revisión reciente para pasar de «One thing still lacks for you» a «One thing still is lacking for you», buscando una formulación inglesa más natural sin perder λείπει. La presente redacción española refleja ese sentido de carencia de manera estable con «te falta una cosa» y mantiene la decisión auditada sobre οὐρανοῖς con nota, preservando el plural griego frente al singular idiomático español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, «pobres» para πτωχοῖς, y la forma imperativa breve «sígueme» para ἀκολούθει μοι.
  - Se evita «SEÑOR» u otros reemplazos reverenciales porque el versículo no contiene θεός/κύριος como designación divina directa.
  - «Cielos» se conserva en el texto por fidelidad al plural griego; la nota permite la alternativa idiomática singular sin borrar la tensión textual.
