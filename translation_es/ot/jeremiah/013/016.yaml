translation:
  language: es
  text: Den gloria a Yahvé su Dios antes de que él traiga oscuridad[a], y antes de que sus pies tropiecen en los montes al anochecer. Entonces ustedes esperarán luz, pero él la convertirá en profunda oscuridad; la convertirá en tinieblas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «la convertirá en sombra de muerte». El término hebreo puede designar tanto una oscuridad mortal como una oscuridad muy profunda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  english_pob_choice: Give
  chosen_spanish: Den
  alternatives_spanish:
  - Dediquen
  - Rindan
  lexicon: HALOT
  rationale: El imperativo plural de נתן con כָּבוֹד funciona idiomáticamente como 'dar gloria'. 'Den' conserva la fuerza imperativa y suena natural en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahveh
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, יהוה se vierte 'Yahvé' en el texto principal para evitar el enmascaramiento con un título y reflejar el nombre divino.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se expresa de modo natural como 'su' en español reverencial/neutro cuando el contexto ya fija el destinatario plural.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: HALOT
  rationale: En la locución 'dar gloria', 'gloria' preserva mejor el peso lexical y teológico del hebreo que 'honor'.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes
  - previo a que
  lexicon: HALOT
  rationale: Marca temporal de anterioridad; 'antes de que' permite introducir una proposición verbal natural en español.
- source_word: יַחְשִׁךְ
  english_pob_choice: he brings darkness
  chosen_spanish: él traiga oscuridad
  alternatives_spanish:
  - él oscurezca
  - se haga oscuro
  lexicon: HALOT
  rationale: El hifil es causativo; se conserva la agencia divina explícita. 'Oscuridad' comunica el sentido con claridad y evita una literalidad extraña.
- source_word: יִתְנַגְּפוּ
  english_pob_choice: stumble
  chosen_spanish: tropiecen
  alternatives_spanish:
  - choquen
  - se golpeen
  lexicon: HALOT
  rationale: El hitpael alude a chocar o tropezar con los pies; 'tropiecen' es el equivalente más natural en español y mantiene la imagen de peligro.
- source_word: הָרֵי נָשֶׁף
  english_pob_choice: the mountains at twilight
  chosen_spanish: en los montes al anochecer
  alternatives_spanish:
  - en los montes del crepúsculo
  - en los montes al atardecer
  lexicon: HALOT
  rationale: נָשֶׁף remite a crepúsculo/anochecer. 'Al anochecer' comunica el momento peligroso de luz menguante sin forzar una expresión nominal poco natural.
- source_word: וְקִוִּיתֶם לְאוֹר
  english_pob_choice: Then you will hope for light
  chosen_spanish: Entonces ustedes esperarán luz
  alternatives_spanish:
  - Entonces ustedes aguardarán luz
  - Entonces ustedes anhelarán luz
  lexicon: HALOT
  rationale: קוה puede significar esperar/aguardar con esperanza. Se opta por 'esperarán' para una lectura pública clara, manteniendo la expectativa de alivio.
- source_word: וְשָׂמָהּ לְצַלְמָוֶת
  english_pob_choice: he will make it deep darkness
  chosen_spanish: la convertirá en profunda oscuridad
  alternatives_spanish:
  - la hará sombra de muerte
  - la volverá en profunda oscuridad
  lexicon: HALOT
  rationale: Se preserva la referencia a la luz implícita ('la') y el sentido probable de צַלְמָוֶת como oscuridad muy profunda. 'Profunda oscuridad' es más natural que una calca como 'sombra de muerte'.
- source_word: ישית לַעֲרָפֶל
  english_pob_choice: he will turn it into gloom
  chosen_spanish: la volverá en tinieblas
  alternatives_spanish:
  - la pondrá en densa oscuridad
  - la hará niebla oscura
  lexicon: HALOT
  rationale: עֲרָפֶל designa niebla espesa/tinieblas densas. 'Tinieblas' es un equivalente bíblico claro y digno; evita redundar con 'oscuridad' y conserva el matiz de opresión visual.
theological_decisions:
- issue: Agencia divina en la oscuridad anunciada
  english_pob_reading: The verse speaks of the LORD actively bringing darkness as judgment.
  chosen_spanish_reading: El verso presenta a Yahvé como quien trae la oscuridad y convierte la luz en tinieblas como acto de juicio.
  alternative_spanish_readings:
  - La oscuridad llega de manera impersonal o natural.
  - Yahvé solo permite la oscuridad sin causarla directamente.
  rationale: Los verbos causativos y la secuencia verbal del hebreo favorecen una lectura activa de juicio divino. La traducción conserva esa agencia explícita para no suavizar el anuncio profético.
  doctrine_reference: Jeremías 13:16; cf. la lógica profética del juicio divino en el libro de Jeremías.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la resolución del audit trail inglés: mantiene la agencia causativa de Yahvé, conserva la referencia pronominal a la luz en la segunda mitad del versículo y registra en nota la alternativa tradicional de צַלְמָוֶת. No hubo revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יהוה.
  - '''Oscuridad'', ''profunda oscuridad'' y ''tinieblas'' distinguen los dos campos léxicos relacionados sin colapsarlos por completo.'
  - Se mantiene el plural de destinatarios con 'ustedes' y formas verbales de segunda persona plural.
  - La nota [a] preserva la tensión lexical entre la lectura tradicional 'sombra de muerte' y la lectura contextual de 'oscuridad muy profunda'.
