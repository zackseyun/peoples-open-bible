translation:
  language: es
  text: 'Cántico de las subidas.


    A ti he levantado mis ojos,


    [tú que habitas en los cielos][a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tú que te sientas en los cielos»; el verbo hebreo literalmente significa «sentarse/habitar» y puede sugerir también un matiz regio, como «entronizado». Hebreo «en los cielos»; algunas versiones simplifican a «en el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Canto de ascensos
  - Cántico de subidas
  lexicon: שִׁיר
  rationale: Se conserva el sentido de encabezado litúrgico con una forma natural en español. 'Ascensos' mantiene la imagen tradicional de 'subidas' sin volverlo coloquial, y evita añadir interpretaciones no explicitadas por el hebreo.
- source_word: נָשָׂאתִי אֶת עֵינַי
  english_pob_choice: To you I have lifted up my eyes
  chosen_spanish: A ti he levantado mis ojos
  alternatives_spanish:
  - Hacia ti he alzado mis ojos
  - A ti he alzado mis ojos
  lexicon: נשא + עינים
  rationale: '''Levantar los ojos'' es una imagen idiomática natural en español y reproduce bien la dirección de dependencia/espera expresada por el hebreo. ''He levantado'' conserva el perfecto con valor de acción ya realizada y mantiene el énfasis del original.'
- source_word: הַיֹּשְׁבִי בַּשָּׁמָיִם
  english_pob_choice: you who sit in the heavens
  chosen_spanish: tú que estás en los cielos
  alternatives_spanish:
  - tú que habitas en los cielos
  - tú que te sientas en los cielos
  lexicon: ישב
  rationale: El POB inglés preserva la idea de 'sit/dwell' y anota la posibilidad de matiz regio. En español, 'estás en los cielos' es más natural y suficientemente amplio para abarcar permanencia; evita una formulación demasiado corporal ('te sientas') que sería rara en este contexto. 'Cielos' conserva el plural hebreo.
theological_decisions:
- issue: Cómo reflejar el encabezado litúrgico del salmo
  english_pob_reading: A Song of Ascents.
  chosen_spanish_reading: Cántico de ascensos.
  alternative_spanish_readings:
  - Canto de ascensos
  - Cántico de subidas
  rationale: Se mantiene el carácter de título/categoría litúrgica sin introducir una glosa interpretativa. 'Ascensos' es suficientemente transparente y permite reconocer el término técnico del salterio.
  doctrine_reference: Salterio / encabezados litúrgicos
- issue: Imagen de Dios 'en los cielos' y posible matiz de entronización
  english_pob_reading: you who sit in the heavens
  chosen_spanish_reading: tú que estás en los cielos
  alternative_spanish_readings:
  - tú que habitas en los cielos
  - tú que te sientas en los cielos
  rationale: El inglés POB deja abierta la alternativa 'enthroned' en la nota, pero el texto principal se mantiene más directo. En español, 'estás en los cielos' conserva la trascendencia divina sin imponer una lectura regia explícita que no está desarrollada en el texto base.
  doctrine_reference: Transcendencia divina / lenguaje metafórico
translation_notes:
  revision_awareness: 'El pasaje inglés revisado completó el texto del versículo añadiendo la cláusula principal después del encabezado. La versión española sigue esa misma resolución: conserva el título litúrgico y traduce el verso completo con una dicción formal y natural.'
  spanish_consistency_notes:
  - Se mantiene el plural «cielos» para reflejar el hebreo.
  - Se evita sustituir el encabezado por una paráfrasis devocional.
  - La puntuación separa el título del cuerpo del verso para corresponder a la estructura del audit trail inglés.
