translation:
  language: es
  text: 'Entonces Jesús respondió[a]: «¿No quedaron limpios los diez? ¿Y los nueve, dónde están?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No quedaron limpios todos los diez?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El participio aoristo funciona como fórmula narrativa de introducción al discurso. En español, «respondió» expresa de forma natural esa entrada a la réplica sin endurecerla en un calco participial.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ marca continuidad narrativa. «Entonces» conserva ese avance de la escena en un español fluido y digno.
- source_word: εἶπεν
  english_pob_choice: Jesus answered
  chosen_spanish: Jesús respondió
  alternatives_spanish:
  - Jesús dijo
  lexicon: BDAG
  rationale: Con ἀποκριθείς, εἶπεν integra la fórmula «respondió...». «Jesús respondió» evita redundancia y refleja la función discursiva de la cláusula.
- source_word: Οὐχὶ
  english_pob_choice: Were not
  chosen_spanish: ¿No fueron...?
  alternatives_spanish:
  - ¿Acaso no fueron...?
  lexicon: BDAG
  rationale: οὐχί introduce una pregunta con respuesta esperada afirmativa. En español, «¿No fueron...?» preserva ese valor retórico de manera natural.
- source_word: οἱ δέκα
  english_pob_choice: the ten
  chosen_spanish: los diez
  alternatives_spanish:
  - los diez todos
  lexicon: BDAG
  rationale: El artículo con numeral remite al grupo ya conocido en el contexto. «Los diez» es directo y no añade énfasis interpretativo.
- source_word: ἐκαθαρίσθησαν
  english_pob_choice: were cleansed
  chosen_spanish: fueron limpiados
  alternatives_spanish:
  - fueron purificados
  - fueron limpiados ritualmente
  - fueron hechos limpios
  lexicon: BDAG
  rationale: καθαρίζω en este contexto de lepra incluye la idea de quedar limpio. «Fueron limpiados» conserva el enlace léxico con la acción de limpieza/purificación sin reducirlo a mera curación física.
- source_word: οἱ δὲ ἐννέα ποῦ;
  english_pob_choice: But where are the nine?
  chosen_spanish: ¿Y los nueve, dónde están?
  alternatives_spanish:
  - ¿Pero los nueve, dónde están?
  - ¿Y dónde están los nueve?
  lexicon: BDAG
  rationale: La secuencia final contrapone al que volvió con los restantes. «¿Y los nueve, dónde están?» mantiene la oposición suave de δέ y la pregunta retórica de ποῦ en un orden natural para el español.
theological_decisions:
- issue: Sentido de καθαρίζω en el relato de los leprosos
  english_pob_reading: Rendered as 'cleansed' rather than 'healed'
  chosen_spanish_reading: «fueron limpiados» en vez de «fueron sanados»
  alternative_spanish_readings:
  - fueron sanados
  - fueron purificados
  - fueron hechos limpios
  rationale: El griego usa καθαρίζω, que aquí abarca tanto la restauración como la pureza ritual. «Fueron limpiados» preserva esa amplitud teológica y lexical que el texto requiere.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando el marcador [a] exactamente en el lugar correspondiente de la traducción.
  spanish_consistency_notes:
  - Se conservó un estilo bíblico sobrio y readable para español general.
  - Se evitó «SEÑOR» porque el versículo nombra explícitamente a Jesús, no al tetragrámaton.
  - «Limpiados» preserva la carga de καθαρίζω sin convertirla en una paráfrasis interpretativa.
