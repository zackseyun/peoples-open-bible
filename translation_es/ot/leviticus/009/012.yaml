revisions:
- from: Entonces él degolló el holocausto[a], y los hijos de Aarón le trajeron la sangre, y la lanzó contra el altar, por todos sus lados.
  to: Entonces degolló el holocausto, y los hijos de Aarón le trajeron la sangre, y la arrojó[a] contra el altar, por todo alrededor.
  rationale: Se movió la nota al verbo relevante para ajustarla al punto léxico real de וַיִּזְרְקֵהוּ. Se simplificó «Entonces él» a «Entonces» para mejor fluidez narrativa en español. Se cambió «la lanzó» por «la arrojó» y «por todos sus lados» por «por todo alrededor» para una formulación más natural y precisa, manteniendo la fuerza ritual del hebreo y la intención del POB inglés.
