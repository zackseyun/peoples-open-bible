  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» está bien capitalizado; no aparecen términos sensibles como Yahvé, Mesías o esclavo. La decisión de «pan» frente a «alimento» está bien alineada con la filosofía léxica documentada.
