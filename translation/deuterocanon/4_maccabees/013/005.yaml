translation:
  text: How then can one fail to acknowledge in these men the mastery over suffering that comes from blessedness[a], since they were not turned aside even by the pains of fire?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the mastery over the passions belonging to blessedness/piety.' The Greek phrase is rare and difficult, but it clearly praises the brothers' virtuous self-mastery.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς οὖν οὐκ ἔστιν ... ὁμολογεῖν
  chosen: How then can one fail to acknowledge
  alternatives:
  - How then is it not possible to acknowledge
  - How then can it not be admitted
  lexicon: LSJ
  rationale: The Greek uses an idiomatic rhetorical question with οὐκ ἔστιν + infinitive, expressing practical impossibility or inevitability. English idiom is best captured by 'How then can one fail to acknowledge,' preserving the force of compelled admission.
- source_word: τούτοις
  chosen: in these men
  alternatives:
  - for these men
  - among these men
  lexicon: LSJ
  rationale: The dative after ὁμολογεῖν here points to recognizing a quality in or with respect to these persons. 'In these men' naturally conveys acknowledgment of a trait manifested in them.
- source_word: τὴν τῆς εὐλογιστίας παθοκρατίαν
  chosen: the mastery of reason guided by blessedness
  alternatives:
  - the sovereignty over passions belonging to piety
  - the dominion over suffering produced by blessedness
  - the control of the passions that comes from blessedness
  lexicon: LSJ
  rationale: παθοκρατία in 4 Maccabees denotes rule/mastery over passions or sufferings; 'mastery' is concise and readable. εὐλογιστία is a rare term; in this context it denotes a blessed or noble disposition associated with godly virtue rather than mere verbal blessing. Because the compound phrase is unusual and philosophically loaded, the rendering expands slightly to make sense in English while preserving the idea of a virtuous rational mastery.
- source_word: οἱ ... οὐκ ἐπεστράφησαν
  chosen: since they were not turned aside
  alternatives:
  - who were not turned back
  - who did not turn away
  lexicon: LSJ
  rationale: ἐπεστράφησαν here conveys being turned from one's course or resolve under pressure. 'Were not turned aside' preserves the passive form and the sense of steadfastness under torture.
- source_word: τῶν μὲν διὰ πυρὸς ἀλγηδόνων
  chosen: even by the pains inflicted through fire
  alternatives:
  - by the pains of fire
  - by agonies through fire
  - by fiery pains
  lexicon: LSJ
  rationale: ἀλγηδόνες are pains/torments; διὰ πυρός indicates the means or instrumentality of fire. 'Pains inflicted through fire' is slightly fuller English that preserves the causal force without becoming paraphrastic.
