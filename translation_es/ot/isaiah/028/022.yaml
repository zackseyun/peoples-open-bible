review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura de advertencia del hebreo: transición exhortativa, prohibición de burlarse, consecuencia de que las ataduras se hagan más fuertes, y fundamento en un decreto de destrucción oído de parte de Dios. Sin embargo, no preserva bien la decisión contextual documentada para עַל כָּל הָאָרֶץ, que en el POB debe ir en el texto principal como ''toda la tierra/país/land'' localmente entendido, con la lectura más amplia en nota. Además, la nota b está mal anclada: ''O «de los Ejércitos»'' no es alternativa de ''ataduras'' sino de ''of Armies/of Hosts'' y debe ir junto al título divino.'
  spanish_quality_summary: 'El español es legible y digno, pero hay dos problemas de calidad editorial: la nota [a] está colocada en ''ahora'' aunque explica ''tierra/país'', y la nota [b] está colocada en ''ataduras'' aunque explica el título divino. También ''contra toda la tierra'' debilita la preferencia contextual por un alcance local; en español suena más natural y fiel ''contra toda la tierra[a]'' si la nota ofrece ''o contra todo el país'', o mejor aún el texto principal ''contra toda la tierra[a]'' solo si se quisiera preservar ambigüedad, pero aquí la auditoría favorece ''land'' principal. Conviene además usar minúscula en ''ejércitos'' en el título.'
  glossary_alignment: 'Acierta en ''Yahvé'' para יְהוִה y en preservar ambos elementos de אֲדֹנָי יְהוִה como ''el Señor Yahvé''. ''Se burlen'', ''ataduras'', ''destrucción completa'' y ''decretada'' son compatibles con la evidencia. El desajuste principal es no seguir la racionalidad documentada para הָאָרֶץ: el texto principal debe reflejar el sentido contextual de ''land/país/tierra'' local, mientras la alternativa ''earth'' va en nota. La alternativa ''de las huestes'' es adecuada para la nota del título.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'ahora' pero explica 'tierra/país'.
    rationale: Los marcadores deben aparecer en la palabra o frase relevante. Tal como está, el lector recibirá una nota semánticamente desconectada del lugar del texto que comenta.
  - severity: medium
    issue: La nota [b] está anclada en 'ataduras' pero su contenido ('O «de los Ejércitos»') corresponde a צְבָאוֹת.
    rationale: 'Esto es un error editorial claro: la alternativa léxica pertenece al título divino, no a ''ataduras''.'
  - severity: medium
    issue: El texto principal dice 'contra toda la tierra' en vez de reflejar la preferencia contextual local para הָאָרֶץ.
    rationale: La auditoría inglesa documenta que, en este contexto de Isaías, la lectura principal debe ser 'the whole land', con la opción 'earth' en nota. En español conviene 'contra toda la tierra' solo si se optara por ambigüedad; pero aquí la racionalidad registrada favorece una referencia local como 'toda la tierra' entendida territorialmente o mejor 'todo el país' en la nota. La mejor alineación es texto principal local y alternativa amplia en nota.
  - severity: low
    issue: Mayúscula innecesaria en 'Ejércitos'.
    rationale: En español bíblico moderno suele preferirse 'de los ejércitos' o una alternativa tradicional en nota como 'de las huestes'; la mayúscula no es necesaria para fidelidad ni legibilidad.
  revised_spanish_text: Así que ahora, no se burlen, no sea que se fortalezcan sus ataduras; porque he oído de parte del Señor Yahvé de los ejércitos[b] una destrucción completa y decretada contra toda la tierra[a].
  revised_footnotes:
  - marker: a
    text: O «contra todo el país». La palabra hebrea puede significar «tierra» o «país».
    reason: alternative_reading
  - marker: b
    text: O «de las huestes».
    reason: lexical_alternative
  revision_rationale: Se reubicaron las notas en las expresiones que realmente comentan. La nota sobre הָאָרֶץ ahora va con 'tierra' y ofrece la alternativa contextual 'país', que alinea mejor con la auditoría. La nota léxica sobre צְבָאוֹת ahora va junto al título divino y da la alternativa española natural 'de las huestes'. Se mantuvo 'el Señor Yahvé' para preservar אֲדֹנָי + יְהוִה conforme a la política del proyecto, y el resto del texto se conservó por ser fiel y claro.
