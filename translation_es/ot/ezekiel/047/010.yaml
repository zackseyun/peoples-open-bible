translation:
  language: es
  text: Y acontecerá que los pescadores estarán junto a ella; desde En-gadi hasta En-eglaim habrá un lugar para tender las redes. Sus peces serán de muchas clases[a], como los peces del Mar Grande[b], muy numerosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «sus peces serán según su especie», expresando una gran variedad de clases.'
    reason: lexical_alternative
  - marker: b
    text: «Mar Grande» es la designación bíblica tradicional del mar Mediterráneo.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y sucederá
  - Y será que
  lexicon: HALOT
  rationale: La fórmula profética introduce un resultado futuro; «acontecerá» conserva el valor discursivo de apertura sin sonar arcaico.
- source_word: יַעַמְדוּ
  english_pob_choice: will stand
  chosen_spanish: se pondrán
  alternatives_spanish:
  - estarán de pie
  - se mantendrán
  lexicon: HALOT
  rationale: En español, «se pondrán» transmite la idea de colocarse/ubicarse en un lugar para pescar, que es la intención contextual de עמד aquí.
- source_word: עָלָיו
  english_pob_choice: beside it
  chosen_spanish: junto a ella
  alternatives_spanish:
  - al lado de ella
  - junto a él
  - sobre ella
  lexicon: HALOT
  rationale: El referente inmediato es el agua/río, femenino en español; «junto a ella» conserva la proximidad espacial y evita una calca extraña como «sobre ella».
- source_word: דַּוָּגִים
  english_pob_choice: fishermen
  chosen_spanish: los pescadores
  alternatives_spanish:
  - los pescadores de peces
  - los pescadores
  lexicon: HALOT
  rationale: «Pescadores» es el equivalente natural y directo para quienes pescan; no se requiere un tecnicismo adicional.
- source_word: מֵעֵין גֶּדִי
  english_pob_choice: from En-gedi
  chosen_spanish: desde En-gadi
  alternatives_spanish:
  - desde En-gedi
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma común en español bíblico; se prefiere «En-gadi» para una lectura más natural y reconocible.
- source_word: וְעַד עֵין עֶגְלַיִם
  english_pob_choice: even to En-eglaim
  chosen_spanish: hasta En-eglaim
  alternatives_spanish:
  - y hasta En-eglaim
  lexicon: HALOT
  rationale: «Hasta» comunica el límite extenso del recorrido; la partícula intensiva inglesa «even to» no necesita una ampliación adicional en español.
- source_word: מִשְׁטוֹחַ לַחֲרָמִים
  english_pob_choice: there will be a place for spreading nets
  chosen_spanish: habrá un lugar para tender las redes
  alternatives_spanish:
  - habrá lugar para extender las redes
  - será un lugar para tender redes
  lexicon: HALOT
  rationale: «Tender las redes» expresa bien la imagen de extenderlas para pescar y evita una construcción demasiado literal o pesada.
- source_word: לְמִינָה
  english_pob_choice: of many kinds
  chosen_spanish: de muchos géneros
  alternatives_spanish:
  - de muchas clases
  - según sus especies
  - según su género
  lexicon: HALOT
  rationale: La raíz puede comunicar variedad de especies; «géneros» mantiene el matiz de diversidad taxonómica sin forzar una sola clasificación moderna.
- source_word: דְגָתָם
  english_pob_choice: Their fish
  chosen_spanish: sus peces
  alternatives_spanish:
  - su pesca
  - sus peces
  lexicon: HALOT
  rationale: El sufijo pronominal se vierte de manera natural como posesivo plural en español. «Sus peces» conserva la referencia colectiva al conjunto de aguas/área descrita.
- source_word: כִּדְגַת הַיָּם הַגָּדוֹל
  english_pob_choice: like the fish of the Great Sea
  chosen_spanish: como los peces del Mar Grande
  alternatives_spanish:
  - como los peces del Gran Mar
  - como los peces del Mar Mediterráneo
  lexicon: HALOT
  rationale: Se mantiene la denominación bíblica tradicional del gran mar occidental sin explicitar la identificación geográfica en el texto principal.
- source_word: רַבָּה מְאֹד
  english_pob_choice: very many
  chosen_spanish: muy numerosos
  alternatives_spanish:
  - en gran abundancia
  - excesivamente muchos
  - muchísimos
  lexicon: HALOT
  rationale: «Muy numerosos» comunica la abundancia intensiva con dignidad y evita una repetición menos elegante de «muy muchos».
theological_decisions:
- issue: Tratamiento del topónimo divino ausente y de la imaginería profética del pasaje
  english_pob_reading: No theological issue flagged in the English audit beyond lexical clarity.
  chosen_spanish_reading: No se introduce glosa doctrinal; se conserva el carácter descriptivo de la visión.
  alternative_spanish_readings:
  - Añadir una nota tipológica sobre restauración escatológica
  - Explicitar una lectura simbólica en el cuerpo del texto
  rationale: El versículo describe la fertilidad de las aguas; el español debe permanecer fiel al cuadro profético sin añadir interpretaciones que el fuente no exige.
  doctrine_reference: Ezequiel 47:10; principio de sobriedad exegética
- issue: Renderización de לְמִינָה como diversidad de peces
  english_pob_reading: Or, more literally, 'their fish will be according to its kind,' expressing a great variety of species.
  chosen_spanish_reading: «de muchos géneros» comunica la variedad sin ocultar la tensión entre literalidad y naturalidad.
  alternative_spanish_readings:
  - «según su especie»
  - «según sus especies»
  rationale: El hebreo admite una lectura más literal («según su especie»), pero el contexto enfatiza variedad abundante; la opción elegida preserva ambas ideas en un español publicable.
  doctrine_reference: Génesis 1:11-12; Ezequiel 47:9-10
translation_notes:
  revision_awareness: 'Se revisó la lectura inglesa del POB junto con el hebreo WLC: el resultado mantiene la escena profética, la extensión geográfica y la idea de abundancia, sin suavizar la variedad de especies ni sustituir la denominación bíblica del mar por una glosa interpretativa en el texto principal.'
  spanish_consistency_notes:
  - Se usó «En-gadi» y «En-eglaim» con guion para uniformidad toponímica.
  - Se evitó «SEÑOR» y no aparece ningún nombre divino en este versículo.
  - «Redes» traduce coherentemente חֲרָמִים como redes de pesca, no como redes de caza.
  - «Mar Grande» preserva el término bíblico y se aclara solo en nota.
  - La concordancia pronominal femenina en «junto a ella» sigue el referente implícito acuático en español.
