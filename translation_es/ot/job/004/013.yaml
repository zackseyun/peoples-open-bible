translation:
  language: es
  text: En medio de pensamientos disquietantes procedentes de visiones de la noche, cuando cae un sueño profundo sobre los hombres[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hombres»; aquí se usa en sentido genérico de seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשְׂעִפִּים
  english_pob_choice: Amid disquieting thoughts
  chosen_spanish: Entre pensamientos disquietantes
  alternatives_spanish:
  - En pensamientos disquietantes
  - En medio de pensamientos angustiantes
  - Entre pensamientos inquietantes
  lexicon: HALOT
  rationale: שְׂעִפִּים expresa pensamientos divididos, perturbadores o inquietantes. «Disquieting» fue revisado en inglés para dar un tono más formal; en español, «disquietantes» conserva ese matiz de perturbación mental sin volver el verso rígido.
- source_word: מֵחֶזְיֹנוֹת לָיְלָה
  english_pob_choice: from visions of the night
  chosen_spanish: de visiones de la noche
  alternatives_spanish:
  - de visiones nocturnas
  - a partir de visiones de la noche
  - por visiones de la noche
  lexicon: HALOT
  rationale: חֶזְיוֹנוֹת son visiones, y לָיְלָה define el ámbito nocturno. El español natural es «visiones de la noche», manteniendo la relación de origen o procedencia expresada por מִן sin forzar una preposición literal.
- source_word: בִּנְפֹל
  english_pob_choice: when ... falls
  chosen_spanish: cuando cae
  alternatives_spanish:
  - al caer
  - en el caer
  - cuando se abate
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ introduce una cláusula temporal. «Cuando cae» comunica con claridad la temporalidad del hebreo y encaja con el ritmo poético del verso.
- source_word: תַּרְדֵּמָה
  english_pob_choice: deep sleep
  chosen_spanish: un profundo sueño
  alternatives_spanish:
  - un sueño profundo
  - un sueño letárgico
  - un sopor profundo
  lexicon: HALOT
  rationale: תַּרְדֵּמָה designa un sueño pesado o profundo, no simplemente dormir. «Un profundo sueño» conserva el valor semántico y resulta idiomático en español. Se evita «letargo» por sonar más técnico que el poema requiere.
- source_word: עַל אֲנָשִׁים
  english_pob_choice: on men
  chosen_spanish: sobre los hombres[a]
  alternatives_spanish:
  - sobre las personas
  - sobre los seres humanos
  - sobre la gente
  lexicon: HALOT
  rationale: אֲנָשִׁים es plural masculino con valor genérico. Se mantiene «los hombres» para reflejar esa forma gramatical, y se preserva el alcance inclusivo mediante la nota.
theological_decisions:
- issue: Valor genérico de אֲנָשִׁים
  english_pob_reading: men; here used generically for human beings
  chosen_spanish_reading: los hombres, con sentido genérico de seres humanos
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: El hebreo usa un plural masculino con fuerza genérica. Para no borrar la forma del texto fuente, la redacción principal conserva «los hombres», mientras la nota aclara que el referente es humano en general.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «troubling thoughts» por «disquieting thoughts» para elevar el registro. La redacción española adopta «disquietantes» para reflejar ese ajuste formal, manteniendo el paralelismo entre pensamientos perturbadores, visiones nocturnas y el sueño profundo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto en el proyecto, pero este versículo no lo contiene.
  - «Hombres» se mantiene por fidelidad al plural masculino hebreo, con aclaración en nota para el uso genérico.
  - El verso conserva un orden poético natural en español sin añadir elementos interpretativos ajenos al hebreo.
