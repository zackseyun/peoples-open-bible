translation:
  language: es
  text: Pero el Rey de reyes encendió la ira de Antíoco contra el malvado[a], y, cuando Lisias lo señaló como responsable de los males y de todo, ordenó que lo mataran, llevándolo a Berea[b], como es la costumbre en aquel lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra el criminal' o 'contra el villano' para ἀλιτήριον, un término fuerte de condena moral.
    reason: lexical_alternative
  - marker: b
    text: Berea aquí se refiere al lugar de ejecución según la costumbre local.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς τῶν βασιλέων
  english_pob_choice: the King of kings
  chosen_spanish: el Rey de reyes
  alternatives_spanish:
  - el rey de reyes
  lexicon: LSJ
  rationale: Conservo el título soberano en español y la mayúscula reverencial, porque el contexto presenta a Dios como soberano sobre los reyes humanos. 'Rey de reyes' es la equivalencia natural y mantiene la fuerza titulativa del griego.
- source_word: ἐξήγειρεν
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - suscitó
  - excitó
  lexicon: LSJ
  rationale: '''Despertó'' comunica bien la idea causativa de hacer surgir una emoción, sin sonar tan forzado como una traslación más literal. Mantiene el movimiento interno de la ira.'
- source_word: τὸν θυμὸν
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la indignación
  lexicon: LSJ
  rationale: '''Ira'' conserva mejor la intensidad del término que un simple ''enojo''. En español bíblico resulta digno y natural en contexto narrativo solemne.'
- source_word: ἐπὶ τὸν ἀλιτήριον
  english_pob_choice: against the wretch
  chosen_spanish: contra el malvado
  alternatives_spanish:
  - contra el criminal
  - contra el villano
  - contra el perverso
  lexicon: LSJ
  rationale: ἀλιτήριον es un reproche moral fuerte. 'Malvado' preserva la condena sin caer en un arcaísmo innecesario; el matiz insultante queda suficientemente reflejado en español.
- source_word: ὑποδείξαντος
  english_pob_choice: pointed him out
  chosen_spanish: lo señaló
  alternatives_spanish:
  - lo indicó
  - lo mostró
  lexicon: LSJ
  rationale: En el contexto judicial/narrativo, 'lo señaló' expresa la identificación de la persona de modo natural en español y conserva la función de la construcción de genitivo absoluto.
- source_word: αἴτιον τῶν κακῶν εἶναι καὶ πάντων
  english_pob_choice: as being responsible for the evils and for all of them
  chosen_spanish: como responsable de los males y de todos ellos
  alternatives_spanish:
  - como causante de los males y de todos ellos
  - como culpable de los males y de todo ello
  lexicon: LSJ
  rationale: '''Responsable'' sigue de cerca αἴτιος y suena más preciso que ''culpable'' en un marco de acusación. ''Los males y de todos ellos'' conserva la ampliación de πάντων sin volverlo un absoluto extraño al español.'
- source_word: προσέταξεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio orden de
  lexicon: LSJ
  rationale: Verbo directo y fiel para una orden oficial. No requiere mayor matiz en español.
- source_word: προσαπολέσαι
  english_pob_choice: to put him to death
  chosen_spanish: que lo mataran
  alternatives_spanish:
  - que lo ejecutaran
  - para darle muerte
  lexicon: LSJ
  rationale: El compuesto intensifica la destrucción y aquí se refiere al ajuste de ejecución. 'Que lo mataran' mantiene el sentido sin añadir tecnicismo jurídico que el griego no exige.
- source_word: ἀγαγόντας εἰς Βέροιαν
  english_pob_choice: taking him to Beroea
  chosen_spanish: llevándolo a Berea
  alternatives_spanish:
  - trayéndolo a Berea
  - conduciéndolo a Berea
  lexicon: LSJ
  rationale: El participio expresa la circunstancia de la ejecución. 'Llevándolo a Berea' es natural en español y conserva el orden narrativo del griego.
- source_word: ὡς ἔθος ἐστὶν ἐν τῷ τόπῳ
  english_pob_choice: as is the custom in that place
  chosen_spanish: como es la costumbre en aquel lugar
  alternatives_spanish:
  - según la costumbre local
  - como es costumbre allí
  lexicon: LSJ
  rationale: La frase explica la práctica local de ejecución. 'Aquel lugar' sigue de cerca el griego y suena plenamente idiomático en español bíblico moderno.
theological_decisions:
- issue: Referencia de 'el Rey de reyes'
  english_pob_reading: A divine title referring to God, who providentially moves events against the wicked man.
  chosen_spanish_reading: Título divino referido a Dios, que mueve providencialmente los acontecimientos contra el malvado.
  alternative_spanish_readings:
  - Un título real meramente enfático para un soberano humano
  - Una expresión hiperbólica sin referencia explícita a Dios
  rationale: En el marco narrativo de 2 Macabeos, la expresión funciona como una atribución de soberanía suprema a Dios. La mayúscula en 'Rey de reyes' preserva esa lectura reverente sin añadir una glosa interpretativa en el texto principal.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; conservar el peso teológico sin importar afirmaciones extra.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del inglés auditado, especialmente la preferencia por reflejar πάντων con una expresión de totalidad relativa ('todos ellos') en vez de un absoluto más duro. También conserva la nota cultural sobre Berea como lugar de ejecución y la intensidad moral de ἀλιτήριον.
  spanish_consistency_notes:
  - Se mantiene 'Rey de reyes' con mayúsculas reverenciales para seguir la lectura teológica del POB en inglés.
  - Se usa 'males' para τῶν κακῶν y 'todos ellos' para πάντων, evitando una equivalencia excesivamente abstracta.
  - '''Berea'' se translitera de forma estándar en español bíblico; la nota aclara su función local.'
  - Se evita 'Señor' o 'SEÑOR' porque el original aquí no usa κύριος ni un sustituto del nombre divino.
