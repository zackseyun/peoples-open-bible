translation:
  language: es
  text: 'Pero Abisai hijo de Seruiá respondió y dijo[a]: «¿No debe ser ejecutado Simei por esto, porque maldijo al ungido de Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a causa de esto» / «en pago por esto». El modismo hebreo pregunta si este acto debe acarrear la ejecución de Simei.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: HALOT
  rationale: ענה en narrativa introduce una réplica; en español, «respondió» comunica de manera natural el avance del diálogo sin perder el valor de contestación.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה
  english_pob_choice: Abishai son of Zeruiah
  chosen_spanish: Abisai hijo de Seruiá
  alternatives_spanish:
  - Abisai, hijo de Seruiá
  lexicon: Transliteración propia del proyecto
  rationale: Se conservan los nombres propios en transliteración. «hijo de Seruiá» mantiene el patronímico de forma clara y legible en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אמר es el verbo narrativo normal de habla; «dijo» es la equivalencia más directa y natural en español.
- source_word: הֲתַחַת זֹאת
  english_pob_choice: for this
  chosen_spanish: por esto
  alternatives_spanish:
  - a causa de esto
  - en retorno por esto
  lexicon: HALOT
  rationale: La expresión idiomática pregunta si este hecho debe acarrear muerte. «Por esto» preserva la fuerza causal sin explicitar más de lo que el hebreo exige.
- source_word: לֹא יוּמַת
  english_pob_choice: should ... not be put to death
  chosen_spanish: No debe morir
  alternatives_spanish:
  - No debe ser ejecutado
  - No debe ser puesto a muerte
  lexicon: HALOT
  rationale: El hofal de מות indica muerte infligida/judicial. En español, «debe morir» suena más natural que una perífrasis demasiado técnica, y el contexto deja claro el sentido judicial.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simei
  alternatives_spanish:
  - Shimei
  lexicon: Transliteración propia del proyecto
  rationale: Se usa la transliteración habitual en español bíblico del nombre propio, manteniendo consistencia interna.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón de la propuesta de Abisai; «porque» expresa de forma clara la relación causal.
- source_word: קִלֵּל
  english_pob_choice: cursed
  chosen_spanish: maldijo
  alternatives_spanish:
  - insultó gravemente
  - vituperó
  lexicon: HALOT
  rationale: קלל en este contexto implica una maldición verbal contra la persona de David. «Maldijo» conserva la fuerza religiosa y verbal del término.
- source_word: מְשִׁיחַ יְהוָה
  english_pob_choice: the LORD’s anointed
  chosen_spanish: el ungido de Yahvé
  alternatives_spanish:
  - el Mesías de Yahvé
  - el consagrado de Yahvé
  lexicon: HALOT
  rationale: מָשִׁיחַ designa al rey ungido por Dios. Se traduce como «ungido» para preservar el título funcional; «Yahvé» se mantiene para el nombre divino, conforme a la terminología del proyecto.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo nombra directamente a YHWH; en español del proyecto se usa «Yahvé» como forma principal, evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido judicial de יוּמַת
  english_pob_reading: should ... be put to death
  chosen_spanish_reading: No debe morir, en sentido de ejecución judicial
  alternative_spanish_readings:
  - No debe ser ejecutado
  - No debe ser puesto a muerte
  rationale: La forma verbal no se limita a morir de manera general, sino que apunta a una muerte impuesta como castigo. La redacción española conserva la naturalidad y deja ese valor en el contexto.
  doctrine_reference: HALOT / contexto narrativo de 2 Samuel 19
- issue: Título מְשִׁיחַ יְהוָה
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el consagrado de Yahvé
  rationale: El texto habla del rey investido por unción. «Ungido» conserva la relación directa con la unción y la carga honorífica del título sin desplazarlo a un uso litúrgico posterior.
  doctrine_reference: 2 Samuel 16–19; uso del título regio
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se preservó el valor idiomático de הֲתַחַת זֹאת, el sentido judicial de יוּמַת y la fórmula de título regio מְשִׁיחַ יְהוָה, con la decisión terminológica española coherente con el proyecto (Yahvé, ungido). No hubo revisiones posteriores que alteraran el contenido de referencia.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה y «ungido» para מְשִׁיחַ en coherencia con el conjunto del proyecto.
  - «Simei» y «Abisai» siguen la transliteración habitual en español, evitando una mezcla innecesaria con formas inglesas.
  - La nota [a] se ancla en «por esto» para reflejar la ambigüedad idiomática del hebreo sin sobreexplicar dentro del texto principal.
