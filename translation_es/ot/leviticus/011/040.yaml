translation:
  language: es
  text: Y el que coma de su animal muerto[a] lavará sus vestidos y quedará impuro hasta el atardecer[b], y el que cargue su animal muerto lavará sus vestidos y quedará impuro hasta el atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parte de su animal muerto» o «algo de su animal muerto»; la expresión hebrea es partitiva.
    reason: lexical_alternative
  - marker: b
    text: Es decir, impuro en el sentido de las leyes rituales de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: הָאֹכֵל
  english_pob_choice: the one who eats
  chosen_spanish: el que coma
  alternatives_spanish:
  - quien coma
  - el que come
  lexicon: HALOT
  rationale: El participio sustantivado en una norma legal se expresa con un relativo genérico en español. 'El que coma' conserva el tono prescriptivo y evita una forma demasiado literal o mecánica.
- source_word: מִנִּבְלָתָהּ
  english_pob_choice: any of its carcass
  chosen_spanish: de su cadáver
  alternatives_spanish:
  - de su carcasa
  - de su carroña
  - de su cadáver o de parte de él
  lexicon: HALOT
  rationale: En este contexto, נְבֵלָה se refiere al cadáver de un animal. 'Cadáver' es natural en español y mantiene la referencia concreta. Se omite 'any/some' en el texto principal porque el español puede sonar forzado; la partitividad se conserva mediante la construcción 'de su cadáver' y se documenta la alternativa interpretativa en la nota.
- source_word: נְבֵלָה / נִבְלָתָהּ
  english_pob_choice: carcass
  chosen_spanish: cadáver
  alternatives_spanish:
  - carcasa
  - carroña
  lexicon: HALOT
  rationale: '''Cadáver'' es el equivalente más claro y digno en español para un animal muerto en un marco legal de pureza. ''Carroña'' insinuaría descomposición y ''carcasa'' no es idiomático aquí.'
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - deberá lavar sus vestidos
  - lavará su ropa
  lexicon: HALOT
  rationale: El futuro simple transmite el valor normativo del hebreo legal. 'Vestidos' mantiene el plural concreto del hebreo y suena más cercano al registro bíblico que 'ropa', aunque ambas son posibles.
- source_word: וְטָמֵא
  english_pob_choice: and be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará inmundo
  lexicon: HALOT
  rationale: '''Quedará impuro'' comunica el estado resultante de la acción en un español claro y natural. ''Impuro'' conserva el campo semántico ritual sin añadir explicaciones interpretativas al cuerpo principal.'
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: '''La tarde'' es la correspondencia más natural y ampliamente inteligible para el hebreo con artículo. En español bíblico moderno, evita la rigidez de ''hasta el anochecer'' y mantiene la fórmula temporal.'
- source_word: הַנֹּשֵׂא
  english_pob_choice: the one who carries
  chosen_spanish: el que cargue
  alternatives_spanish:
  - quien cargue
  - el que lleve
  lexicon: HALOT
  rationale: Se conserva la paralelía con 'el que coma' y el valor genérico del participio sustantivado. 'Cargue' expresa el acto de portar un cadáver de forma directa en español.
- source_word: אֶת נִבְלָתָהּ
  english_pob_choice: its carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - el cadáver de ella
  - su carroña
  lexicon: HALOT
  rationale: El sufijo posesivo vuelve al mismo animal mencionado en el contexto. 'Su cadáver' es conciso y natural en español, y evita la literalidad pesada de 'el cadáver de ella'.
theological_decisions:
- issue: Lenguaje de impureza ritual
  english_pob_reading: Translate טָמֵא as 'unclean' without adding 'ritually' in the main text.
  chosen_spanish_reading: Traducir טָמֵא como 'impuro' sin añadir 'ritualmente' en el texto principal.
  alternative_spanish_readings:
  - ritualmente impuro
  - inmundo
  rationale: El contexto de Levítico deja claro que se trata de pureza ceremonial, pero el hebreo solo dice 'impuro'. 'Impuro' preserva esa tensión sin expandir el texto; la dimensión ritual se puede explicitar en nota si es necesario.
  doctrine_reference: Translation philosophy §1, §6
- issue: Formulación legal con sujeto genérico singular
  english_pob_reading: Use singular masculine 'his clothes' to reflect the Hebrew singular legal formulation.
  chosen_spanish_reading: Mantener el singular legal con 'sus vestidos'.
  alternative_spanish_readings:
  - sus ropas
  - sus prendas
  rationale: El hebreo usa formas singulares representativas. En español, el posesivo singular 'sus' permite conservar esa formulación sin perder naturalidad; 'vestidos' mantiene el paralelismo verbal del texto.
  doctrine_reference: Translation philosophy §4
- issue: Partitividad de מִן en מִנִּבְלָתָהּ
  english_pob_reading: '''any of its carcass'' with a footnote noting the partitive sense.'
  chosen_spanish_reading: '''de su cadáver'' con nota sobre la posible partitividad (''de parte de su cadáver'' / ''algún fragmento de su cadáver'').'
  alternative_spanish_readings:
  - de parte de su cadáver
  - algún fragmento de su cadáver
  rationale: La preposición מִן puede expresar una relación partitiva. El español principal fluye mejor con 'de su cadáver', mientras que la nota preserva la tensión exegética documentada por el POB en inglés.
  doctrine_reference: HALOT; audited English footnote a
translation_notes:
  revision_awareness: La revisión más reciente (gpt-5.4, 2026-04-23T11:10:04Z) indica que no hubo cambios y que el pasaje mantiene alto acuerdo con el control cruzado; por ello se conserva la estructura legal y la decisión partitiva documentada en la nota.
  spanish_consistency_notes:
  - Se mantuvo la paralelía entre 'el que coma' y 'el que cargue' para reflejar los dos participios sustantivados del hebreo.
  - Se eligió 'cadáver' como término coherente en ambas menciones de נְבֵלָה dentro del versículo.
  - '''Impuro'' se usa de forma consistente para טָמֵא, con la aclaración ritual en nota.'
  - '''Hasta la tarde'' sigue la fórmula temporal del hebreo con tono bíblico natural en español.'
