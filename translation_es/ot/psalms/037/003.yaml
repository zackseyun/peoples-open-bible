translation:
  language: es
  text: Confía en Yahvé y haz el bien[a]; habita en el país y cultiva la fidelidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aliméntate de fidelidad»; alternativamente, «goza de seguridad». La expresión hebrea es difícil y puede evocar la imagen de pastar o ser alimentado por la fidelidad o la fiabilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטַח
  english_pob_choice: Trust
  chosen_spanish: Confía
  alternatives_spanish:
  - Ten confianza
  - Pon tu confianza
  lexicon: HALOT
  rationale: El imperativo de בטח expresa poner confianza o depender de alguien. «Confía» es natural en español, directo y mantiene la fuerza exhortativa del hebreo.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el valor del nombre del pacto y la pauta del proyecto para יהוה: «Yahvé». La preposición ב introduce el objeto de la confianza.'
- source_word: וַעֲשֵׂה טוֹב
  english_pob_choice: and do good
  chosen_spanish: y haz el bien
  alternatives_spanish:
  - y haz lo bueno
  - y haz el bien que es bueno
  lexicon: HALOT
  rationale: La forma verbal con טוב funciona de modo ético y exhortativo. «Haz el bien» es idiomático en español y conserva la concisión del hebreo.
- source_word: שְׁכָן אֶרֶץ
  english_pob_choice: dwell in the land
  chosen_spanish: habita en la tierra
  alternatives_spanish:
  - establece tu morada en la tierra
  - vive en la tierra
  lexicon: HALOT
  rationale: שכן significa habitar o residir. «Habita» conserva la forma imperativa y «la tierra» refleja el sustantivo ארץ; aunque puede aludir a la tierra prometida, el español mantiene aquí la amplitud del término.
- source_word: וּרְעֵה אֱמוּנָה
  english_pob_choice: cultivate faithfulness
  chosen_spanish: cultiva la fidelidad
  alternatives_spanish:
  - apacienta la fidelidad
  - aliméntate de fidelidad
  - vive de fidelidad
  lexicon: HALOT
  rationale: רעה puede significar apacentar, pastorear o alimentar. Dado que el objeto es abstracto, «cultiva» reproduce bien la idea de promover o practicar activamente una cualidad moral. אֱמוּנָה puede ser fidelidad, firmeza o seguridad; aquí «fidelidad» encaja mejor con la serie de imperativos éticos.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se preserva el nombre del pacto según la convención del proyecto en español, evitando ocultarlo con un título genérico y manteniendo la transparencia con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Interpretación de וּרְעֵה אֱמוּנָה
  english_pob_reading: cultivate faithfulness
  chosen_spanish_reading: cultiva la fidelidad
  alternative_spanish_readings:
  - apacienta la fidelidad
  - aliméntate de fidelidad
  - disfruta seguridad
  rationale: La expresión hebrea es idiomática y admite varias lecturas. Se conserva la ambigüedad básica del verbo pastoral, pero en un español claro y ético. La nota preserva la lectura alternativa de «alimentarse/apacentarse» y la posibilidad de entender el sustantivo como «seguridad».
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto coincide con la última pasada revisada del original inglés: no se registran revisiones pendientes y la solución auditada para וּרְעֵה אֱמוּנָה se mantiene como lectura principal con nota alternativa preservada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יהוה, en línea con la política del proyecto.
  - «Fidelidad» traduce אֱמוּנָה de manera coherente con el marco ético del versículo y con la decisión inglesa de «faithfulness».
  - 'La secuencia verbal conserva el paralelismo exhortativo: confiar / hacer el bien / habitar / cultivar.'
  - No se usa «SEÑOR» como máscara del nombre divino, para preservar transparencia textual.
