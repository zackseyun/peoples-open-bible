translation:
  language: es
  text: 'Entonces los líderes de Sucot dijeron[a]: «¿Están ahora las manos de Zebá y Zalmuná en tu mano, como para que demos pan a tu ejército?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «¿Están ahora las manos de Zebá y Zalmuná en tu mano...?»; es un modismo que significa: «¿Ya los has capturado?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - autoridades
  - príncipes
  lexicon: HALOT
  rationale: El constructo plural de שַׂר designa hombres con autoridad o dirección. «Líderes» comunica bien esa función en español actual y evita un tono demasiado arcaico.
- source_word: סֻכּוֹת
  english_pob_choice: Succoth
  chosen_spanish: Sucot
  alternatives_spanish:
  - Succot
  - Sucoth
  lexicon: nombre propio
  rationale: Nombre de lugar transliterado al español de forma habitual y legible.
- source_word: הֲכַף ... בְּיָדֶךָ
  english_pob_choice: Are the hands ... in your hand
  chosen_spanish: ¿Están ... las manos ... en tu mano?
  alternatives_spanish:
  - ¿Tienen ... la mano ... en tu mano?
  - ¿Ya los tienes en tu poder?
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano/manos» porque el texto repite deliberadamente ese lenguaje. En español, el plural «las manos» y la frase «en tu mano» reflejan el juego idiomático sin borrarlo.
- source_word: זֶבַח וְצַלְמֻנָּע
  english_pob_choice: Zebah and Zalmunna
  chosen_spanish: Zebá y Zalmuná
  alternatives_spanish:
  - Zebah y Zalmunna
  - Zebac y Zalmunna
  lexicon: nombres propios
  rationale: Se translitera para lectura española y se ajusta la acentuación gráfica natural del español sin alterar la identidad de los nombres.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: HALOT
  rationale: «Ahora» transmite de manera directa el valor temporal y retórico de עַתָּה en la pregunta desafiante.
- source_word: נִתֵּן
  english_pob_choice: we should give
  chosen_spanish: nosotros demos
  alternatives_spanish:
  - debamos dar
  - tenemos que dar
  lexicon: HALOT
  rationale: El hebreo expresa una acción volitiva dentro de la pregunta retórica. «Nosotros demos» preserva ese matiz deliberativo y evita imponer una obligación más fuerte de la que el texto exige.
- source_word: לִצְבָאֲךָ
  english_pob_choice: to your army
  chosen_spanish: a tu ejército
  alternatives_spanish:
  - para tu ejército
  - a tus tropas
  lexicon: HALOT
  rationale: «Ejército» es el equivalente natural y conciso para צָבָא en este contexto militar.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - comida
  - alimento
  - bread
  lexicon: HALOT
  rationale: En español bíblico, «pan» conserva la concreción del hebreo literal y funciona como metonimia de alimento sin perder el término base.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y la solución final inglesa revisada, manteniendo el lenguaje de «mano/manos» y el valor inmediato de עַתָּה como «ahora». Se evitó suavizar el desafío retórico con una paráfrasis como «¿ya los tienes en tu poder?» para no perder la imaginería explícita del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton aquí.
  - Se prefirió «Sucot» y nombres propios transliterados de forma consistente con lectura española.
  - Se conservó «pan» en lugar de «alimento» para reflejar la concreción del hebreo לָחֶם.
  - La nota al pie explica el modismo de la mano sin reemplazarlo en el texto principal.
