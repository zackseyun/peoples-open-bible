revisions:
- from: Y todos, por una sola forma de muerte, tenían incontables muertos; porque los vivos ni siquiera eran suficientes para sepultarlos, puesto que en un instante fue destruida su descendencia más honrada[a].
  to: Y todos por igual, por una misma clase de muerte, tenían incontables muertos; porque los vivos ni siquiera bastaban para sepultarlos, puesto que en un instante fue destruida su descendencia más estimada[a].
  rationale: Se ajusta ὁμοθυμαδόν a «todos por igual» para conservar el matiz colectivo/comparativo; se reemplaza «eran suficientes» por «bastaban» para un español más natural; se cambia «forma de muerte» por «clase de muerte» para evitar un calco rígido; y «más honrada» por «más estimada» para mejor fluidez y adecuación contextual, manteniendo la cautela frente a la lectura interpretativa «primogénitos».
  reviewer_model: gpt-5.4
