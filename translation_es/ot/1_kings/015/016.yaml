    issue: La frase principal 'todos sus días' es algo rígida en español narrativo.
    rationale: Aunque es literalmente fiel, en español bíblico natural suele leerse mejor 'durante todos sus días' o 'todo el tiempo de sus vidas/reinados'. Dado que la nota ya preserva la literalidad, la línea principal puede ganar claridad con una formulación más idiomática sin sobreinterpretar.
  - severity: medium
    issue: 'La nota al pie cambia indebidamente el plural a singular: ''todos los días de su vida''.'
    rationale: 'El hebreo dice ''todos sus días'' refiriéndose a ambos. La nota inglesa también mantiene el plural: ''all the days of their lives.'' En español debe decir ''de sus vidas'' si se ofrece esa alternativa.'
  revised_spanish_text: Y hubo guerra entre Asa y Baasa, rey de Israel, durante todos sus días[a].
