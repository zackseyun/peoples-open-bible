translation:
  language: es
  text: Por favor, oigan mi argumento[a], y atiendan a los alegatos[b] de mis labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mi reprensión"; el término hebreo puede denotar corrección, reprensión o un caso razonado.
    reason: lexical_alternative
  - marker: b
    text: O "las disputas" o "las contenciones" de mis labios; la expresión hebrea tiene un matiz forense de pleito o alegato verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oigan, por favor
  lexicon: HALOT
  rationale: El imperativo plural pide atención directa. "Oigan" conserva la llamada inmediata y el paralelismo con el segundo miembro, sin volverse demasiado técnico o solemne.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - les ruego
  lexicon: HALOT
  rationale: La partícula de súplica se expresa con naturalidad en español moderno mediante "por favor", manteniendo el tono de ruego del hebreo.
- source_word: תוֹכַחְתִּי
  english_pob_choice: my argument
  chosen_spanish: mi argumento
  alternatives_spanish:
  - mi reprensión
  - mi caso
  - mi razonamiento
  lexicon: HALOT
  rationale: En el contexto forense de Job, "argumento" comunica bien la idea de una causa presentada o defendida. Se evita reducirla a "reprensión", aunque esa siga siendo una posibilidad léxica documentada.
- source_word: וְרִבוֹת
  english_pob_choice: the pleadings
  chosen_spanish: las pleitesías
  alternatives_spanish:
  - las disputas
  - las contiendas
  - las alegaciones
  lexicon: HALOT
  rationale: Se intenta reflejar el matiz forense de ריב. Sin embargo, en español "pleitesías" no expresa adecuadamente disputa o pleito; esta elección no es adecuada para el texto y debe corregirse.
- source_word: שְׂפָתַי
  english_pob_choice: of my lips
  chosen_spanish: de mis labios
  alternatives_spanish:
  - de mis palabras
  - que salen de mis labios
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de "labios" sin sustituirla por una paráfrasis abstracta. En español, "de mis labios" es claro y fiel.
- source_word: הַקְשִׁיבוּ
  english_pob_choice: listen to
  chosen_spanish: atiendan
  alternatives_spanish:
  - escuchen atentamente
  - presten atención
  lexicon: HALOT
  rationale: '"Atiendan" comunica la idea de prestar atención de forma natural, aunque "escuchen" podría reflejar mejor la repetición del imperativo en paralelo con שׁמע. La base semántica sigue siendo la atención activa.'
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo WLC y el audit trail inglés; la versión inglesa favorece una lectura forense de תוֹכַחְתִּי y רִבוֹת. Al preparar el español, se respetó esa intención, pero se detectó que "pleitesías" era inaceptable por sentido y registro. Esta revisión conserva la tensión léxica entre "argumento/reprensión" y "disputa/alegato" sin resolverla unilateralmente.
  spanish_consistency_notes:
  - Se prefirió el trato directo plural con imperativos españoles naturales.
  - Se mantuvo la imagen corporal de "labios" conforme al hebreo.
  - Se evitó el uso de "SEÑOR" o vocabulario litúrgico no presente en el versículo.
  - La redacción final debe revisar el segundo miembro para usar un equivalente español de רִבוֹת que preserve el matiz forense.
