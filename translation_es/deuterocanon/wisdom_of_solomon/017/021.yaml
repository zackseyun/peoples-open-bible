translation:
  language: es
  text: Pero solo sobre aquellos se impuso una noche pesada[a], imagen de la oscuridad que estaba a punto de recibirlos[b]; sin embargo, eran más opresivos para sí mismos que la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «eran más gravosos para sí mismos que la oscuridad». El griego conserva la misma imagen de «pesadez» en ambas cláusulas.'
    reason: lexical_alternative
  - marker: b
    text: La «oscuridad que estaba a punto de recibirlos» probablemente apunta más allá del castigo inmediato hacia un juicio mayor, aunque el texto no lo define con precisión.
    reason: alternative_reading
lexical_decisions:
- source_word: μόνοις δὲ ἐκείνοις
  english_pob_choice: upon those alone
  chosen_spanish: sobre aquellos solos
  alternatives_spanish:
  - para aquellos solos
  - sobre ellos solos
  lexicon: LSJ
  rationale: La exclusividad de μόνοις ἐκείνοις se conserva con «aquellos solos». «Sobre» refleja bien la idea de algo que recae o se impone sobre ellos, sin suavizar la imagen.
- source_word: ἐπέτατο
  english_pob_choice: was imposed
  chosen_spanish: se impuso
  alternatives_spanish:
  - fue puesta
  - se extendió sobre ellos
  lexicon: LSJ
  rationale: El verbo sugiere algo que se coloca o recae sobre ellos. «Se impuso» conserva la pasividad y la fuerza de imposición, en línea con la revisión inglesa más reciente.
- source_word: βαρεῖα νύξ
  english_pob_choice: heavy night
  chosen_spanish: una noche pesada
  alternatives_spanish:
  - una noche grave
  - una noche opresiva
  lexicon: LSJ
  rationale: «Pesada» mantiene el campo léxico de βαρεῖα y permite eco con el comparativo posterior βαρύτεροι. «Opresiva» explicita el efecto, pero atenúa la repetición buscada.
- source_word: εἰκὼν
  english_pob_choice: an image
  chosen_spanish: imagen
  alternatives_spanish:
  - señal
  - figura
  - representación
  lexicon: LSJ
  rationale: «Imagen» es el equivalente directo y conserva el vínculo figurativo entre la noche presente y la oscuridad futura.
- source_word: τοῦ μέλλοντος αὐτοὺς διαδέχεσθαι σκότους
  english_pob_choice: of the darkness that was about to receive them
  chosen_spanish: de la oscuridad que estaba a punto de recibirlos
  alternatives_spanish:
  - de la oscuridad que estaba a punto de sucederlos
  - de la oscuridad que estaba a punto de tomarlos
  lexicon: LSJ
  rationale: «Estaba a punto de» expresa la inminencia de μέλλοντος. «Recibirlos» preserva el matiz de διαδέχεσθαι que la POB inglesa opta por mantener como recepción/sucesión, sin definir más de lo que el texto exige.
- source_word: ἑαυτοῖς δὲ ἦσαν βαρύτεροι σκότους
  english_pob_choice: yet they were heavier to themselves than darkness
  chosen_spanish: sin embargo, para sí mismos eran más pesados que la oscuridad
  alternatives_spanish:
  - pero para sí mismos eran más gravosos que la oscuridad
  - sin embargo, ellos mismos eran más pesados que la oscuridad
  lexicon: LSJ
  rationale: Se conserva el paralelismo léxico entre βαρεῖα y βαρύτεροι con «pesada/pesados». «Para sí mismos» refleja ἑαυτοῖς y sugiere el peso interior o autoexperimentado que el griego pone de relieve.
theological_decisions:
- issue: Sentido de la «oscuridad» futura
  english_pob_reading: The verse alludes to a coming judgment symbolized by the present darkness, without specifying a developed doctrine beyond the text.
  chosen_spanish_reading: La frase alude a una oscuridad futura que funciona como juicio o amenaza mayor, sin precisar más su alcance.
  alternative_spanish_readings:
  - una oscuridad puramente psicológica de miedo
  - una oscuridad escatológica o de castigo postmortem
  rationale: La traducción mantiene la fuerza tipológica de la expresión sin resolver si el autor piensa en un juicio histórico, escatológico o postmortem. Así se preserva la tensión doctrinal del pasaje.
  doctrine_reference: Preservar la tensión teológica sin cerrarla.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que ajustó ἐπέτατο de «was laid» a «was imposed» por mayor precisión. La versión española adopta «se impuso» para reflejar ese cambio y conserva el enlace léxico entre «pesada/pesados» en ambas cláusulas. También se mantuvo el matiz de recepción/sucesión en «recibirlos», según la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en este proyecto, pero este versículo no lo contiene.
  - «Oscuridad» se mantiene como sustantivo abstracto y no se expande a una explicación interpretativa.
  - Se preserva el paralelismo semántico entre «pesada» y «más pesados» para reflejar βαρεῖα / βαρύτεροι.
  - La puntuación en español respeta la división tripartita del versículo y el contraste con «sin embargo» para ἑαυτοῖς δέ.
