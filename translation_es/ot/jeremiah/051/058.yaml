revisions:
- from: 'Así dice Yahvé de los ejércitos: los muros anchos de Babilonia[a] serán derribados por completo, y sus puertas altas serán quemadas con fuego. Los pueblos se fatigan por lo vacío, y las naciones por el fuego, y se cansan.'
  to: 'Así dice Yahvé de los ejércitos: la ancha muralla de Babilonia[a] será derribada por completo[b], y sus puertas altas serán quemadas con fuego. Los pueblos trabajan para el vacío, y las naciones para el fuego, y se cansan.'
  rationale: Se corrige el verbo principal del segundo hemistiquio para distinguir entre labor inútil (וְיִגְעוּ) y cansancio resultante (וְיָעֵפוּ). También se adopta el singular colectivo documentado por el POB para la muralla de Babilonia y se añaden notas que preservan explícitamente la alternativa plural y el matiz léxico de עַרְעֵר תִּתְעַרְעָר. Se ajusta 'por lo vacío' a 'para el vacío' para reflejar mejor la finalidad inútil del hebreo y mantener el paralelismo con 'para el fuego'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:27:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: Yahvé de los ejércitos anuncia la destrucción total de las fortificaciones de Babilonia, el incendio de sus puertas y la futilidad del trabajo de pueblos y naciones. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro POB: (1) el inglés POB decidió un singular colectivo para חֹמוֹת בָּבֶל הָרְחָבָה (''Babylon’s broad wall''), mientras el borrador volvió al plural sin conservar la alternativa como nota plenamente equivalente; (2) וְיִגְעוּ significa ''trabajan/se afanan/laboran'', no ''se fatigan'', de modo que el borrador borra el paralelismo con וְיָעֵפוּ (''se cansan/se fatigan'').'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'los muros anchos de Babilonia' suena menos natural y menos alineado con la decisión colectiva documentada que 'la ancha muralla de Babilonia'. Además, 'Los pueblos se fatigan... y se cansan' repite dos ideas de cansancio donde el hebreo distingue labor y agotamiento. 'Por lo vacío' es comprensible, pero 'para el vacío' o 'para la nada' refleja mejor la finalidad/futilidad del hebreo en este contexto. La frase revisada mejora precisión y fluidez.
  glossary_alignment: '''Yahvé'' está correctamente alineado con la política del proyecto para יְהוָה. ''De los ejércitos'' es aceptable para צְבָאוֹת. No hay conflicto doctrinal. La principal corrección terminológica es mantener la decisión POB de singular colectivo para la muralla y distinguir lexicalmente וְיִגְעוּ (''trabajan'') de וְיָעֵפוּ (''se cansan'').'
  issues:
  - severity: high
    issue: וְיִגְעוּ fue traducido como 'se fatigan' en vez de 'trabajan/se afanan/laboran'.
    rationale: El hebreo describe primero el esfuerzo laboral inútil y luego el cansancio resultante con וְיָעֵפוּ. El borrador colapsa ambos verbos en fatiga/cansancio y pierde la progresión semántica del verso.
  - severity: medium
    issue: חֹמוֹת בָּבֶל הָרְחָבָה se vertió como plural ('los muros anchos') en vez del singular colectivo documentado por el POB.
    rationale: La decisión auditada del POB usa singular colectivo por naturalidad y por la probable referencia a la gran línea fortificada de Babilonia. En español, 'la ancha muralla de Babilonia' reproduce mejor esa lectura, mientras la nota puede preservar la alternativa plural.
  - severity: medium
    issue: La nota [a] no preserva explícitamente la alternativa de traducción plural.
    rationale: La nota actual explica la morfología plural, pero conviene formular claramente la alternativa española, p. ej. 'O “las anchas murallas de Babilonia”', para reflejar mejor la práctica del POB de conservar alternativas significativas.
  - severity: low
    issue: '''por lo vacío'' es menos idiomático que otras opciones para בְּדֵי רִיק.'
    rationale: Aunque comprensible, suena algo abstracto y rígido. 'para el vacío' mantiene el paralelismo con 'para el fuego' y conserva la idea de finalidad inútil.
  revised_spanish_text: 'Así dice Yahvé de los ejércitos: la ancha muralla de Babilonia[a] será derribada por completo[b], y sus puertas altas serán quemadas con fuego. Los pueblos trabajan para el vacío, y las naciones para el fuego, y se cansan.'
  revised_footnotes:
  - marker: a
    text: O «las anchas murallas de Babilonia»; el hebreo usa una forma plural, probablemente como colectivo para las fortificaciones de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «será totalmente desnudada»; «será derribada por completo» expresa el sentido en el contexto de una muralla de ciudad.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal del segundo hemistiquio para distinguir entre labor inútil (וְיִגְעוּ) y cansancio resultante (וְיָעֵפוּ). También se adopta el singular colectivo documentado por el POB para la muralla de Babilonia y se añaden notas que preservan explícitamente la alternativa plural y el matiz léxico de עַרְעֵר תִּתְעַרְעָר. Se ajusta 'por lo vacío' a 'para el vacío' para reflejar mejor la finalidad inútil del hebreo y mantener el paralelismo con 'para el fuego'.
