    text: Hebrew 'the whole fat tail'; this refers to the fatty tail of a sheep offered in sacrifice.
    reason: cultural_note
  - marker: c
    text: Or 'opposite the backbone' or 'at the base of the spine.'
    reason: lexical_alternative
