translation:
  language: es
  text: Amnón tenía un amigo[a], cuyo nombre era Jonadab, hijo de Simea, hermano de David; y Jonadab era un hombre muy sagaz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amigo cercano» o «compañero». El hebreo רֵעַ puede abarcar amistad, compañerismo o asociación; aquí se opta por «amigo» por ser la opción más natural en la escena.
    reason: lexical_alternative
  - marker: b
    text: O «muy sabio» o «muy astuto». El hebreo puede denotar sabiduría en sentido amplio; «sagaz» se elige porque el relato presenta la inteligencia de Jonadab en un marco moralmente ambiguo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵעַ
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  - asociado
  lexicon: HALOT
  rationale: En este contexto narrativo, רֵעַ designa una relación personal cercana. «Amigo» es la equivalencia natural en español y conserva el valor relacional que prepara el papel de Jonadab en la escena.
- source_word: וּלְאַמְנוֹן
  english_pob_choice: Now Amnon had
  chosen_spanish: Ahora Amnón tenía
  alternatives_spanish:
  - Y Amnón tenía
  - Amnón tenía
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión/circunstancia de manera idiomática. «Ahora» reproduce el enlace discursivo narrativo con naturalidad en español, y «tenía» expresa la relación posesiva de forma fluida.
- source_word: וּשְׁמוֹ
  english_pob_choice: whose name was
  chosen_spanish: cuyo nombre era
  alternatives_spanish:
  - y su nombre era
  - el cual se llamaba
  lexicon: HALOT
  rationale: «Cuyo nombre era» sigue el sentido del giro de identificación hebreo y corresponde al ajuste natural que ya se observó en el audit trail inglés para mantener la estructura sin rigidez.
- source_word: בֶּן שִׁמְעָה
  english_pob_choice: son of Shimeah
  chosen_spanish: hijo de Simea
  alternatives_spanish:
  - hijo de Shimea
  lexicon: HALOT
  rationale: Es una expresión genealógica directa. Se translitera el nombre al uso español bíblico habitual como «Simea», sin alterar la relación de filiación.
- source_word: אֲחִי דָוִד
  english_pob_choice: David’s brother
  chosen_spanish: hermano de David
  alternatives_spanish:
  - el hermano de David
  lexicon: HALOT
  rationale: El constructo identifica a Simea como hermano de David. «Hermano de David» es claro y conserva la relación sin sobrecargar la frase.
- source_word: אִישׁ חָכָם מְאֹד
  english_pob_choice: a very shrewd man
  chosen_spanish: un hombre muy sagaz
  alternatives_spanish:
  - un hombre muy sabio
  - un hombre muy astuto
  lexicon: HALOT
  rationale: La palabra חָכָם puede abarcar sabiduría amplia, pero en este contexto la valoración es ambigua y la inteligencia de Jonadab se manifiesta de manera moralmente dudosa. «Sagaz» conserva la idea de agudeza/astucia sin aprobarlo como «sabio» de forma demasiado positiva. Se mantiene «hombre» para reflejar el género del hebreo אִישׁ.
theological_decisions:
- issue: Valoración moral implícita en חָכָם
  english_pob_reading: a very shrewd man
  chosen_spanish_reading: un hombre muy sagaz
  alternative_spanish_readings:
  - un hombre muy sabio
  - un hombre muy astuto
  rationale: El texto no declara explícitamente si la cualidad es positiva o negativa, pero el desarrollo narrativo sugiere una inteligencia usada de modo cuestionable. «Sagaz» preserva esa tensión mejor que «sabio», que en español suele sonar moralmente aprobatoria.
  doctrine_reference: Sabiduría práctica y discernimiento moral en la narrativa bíblica; cf. Proverbios 1:2-7 como trasfondo general del uso de חָכָם.
translation_notes:
  revision_awareness: El audit trail inglés cambió de una formulación más literal ('and his name was') a una más natural ('whose name was') sin alterar el sentido. La traducción española sigue esa misma línea de naturalidad controlada, manteniendo la estructura genealógica y la ambigüedad valorativa de חָכָם.
  spanish_consistency_notes:
  - Se usa «Amnón» para el nombre propio según la forma española habitual.
  - Se usa «Yahvé» como norma general del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se evitó «Cristo»/«Mesías» porque no aplica a este versículo.
  - Se mantuvo una sintaxis narrativa sobria, cercana al hebreo, pero idiomática en español.
