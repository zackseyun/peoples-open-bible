    issue: La nota [b] está anclada al término equivocado en el texto.
    rationale: La nota [b] explica כָּל הָעֵדָה («toda la congregación» / «toda la comunidad» / «toda la asamblea»), pero en el borrador aparece tras «Cades». Esto desalinearía la nota con la unidad léxica que comenta.
  - severity: low
    issue: Una alternativa léxica interna dice «los hijos de Jacob».
    rationale: El hebreo dice בְנֵי יִשְׂרָאֵל, no «hijos de Jacob». Aunque está solo en metadatos y no en el texto o notas, conviene corregirlo en el expediente editorial.
  revised_spanish_text: Entonces llegaron los hijos de Israel[a], toda la congregación[b], al desierto de Zin, en el primer mes; y el pueblo se quedó en Cades. Allí murió Miriam, y allí fue sepultada.
  revised_footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «toda la comunidad» o «toda la asamblea».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto sustancialmente igual, pero se reubica la nota [b] al sintagma «toda la congregación», que es el elemento léxico al que realmente corresponde según el hebreo y la auditoría inglesa.
