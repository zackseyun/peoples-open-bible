  rationale: 6장 δοῦλος 정책 일관 — 의에게도 「노예가 되다」로 옮겨 충격적 양극 대칭을 보존.
theological_decisions:
- issue: 의에 대한 ἐδουλώθητε의 강한 번역
  chosen_reading: 「의에게 노예가 되었습니다」
  alternative_readings:
  - 「의의 종이 되었습니다」
  rationale: 바울은 죄와 의의 노예 신분을 의도적 평행으로 제시한다. 한쪽만 「노예」, 다른 쪽은 「종」으로 약화시키면 6장의 충격이 사라진다. 양쪽 모두 「노예」로 강하게 보존.
  doctrine_reference: 'DOCTRINE.md §1: Contested terms — δοῦλος'
