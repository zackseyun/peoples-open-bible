- from: No lo comerás[a]; lo derramarás sobre la tierra como agua.
  to: No lo comerás[a]; lo derramarás en el suelo como agua.
  rationale: Se conserva la estructura pronominal del hebreo y la nota aclaratoria del POB inglés, pero se ajusta עַל הָאָרֶץ a ‘en el suelo’ para reflejar mejor el sentido contextual concreto y la lectura auditada ‘on the ground’. No se requiere adjudicación compleja.
