base_translation:
  language: en
  yaml_path: translation/ot/1_kings/006/005.yaml
  text: He built against the wall of the house a structure all around[a], against the walls of the house all around, around both the nave and the inner sanctuary[c][b]; and he made side chambers all around.
  footnotes:
  - marker: a
    text: Or “a surrounding annex” for the rare Hebrew word יצוע, referring to the structure built around the temple walls.
    reason: lexical_alternative
  - marker: b
    text: Hebrew הֵיכָל refers to the main hall of the temple, distinct from the inner sanctuary (דְּבִיר).
    reason: cultural_note
  - marker: c
    text: Or “Most Holy Place” for “inner sanctuary.”
    reason: lexical_alternative
