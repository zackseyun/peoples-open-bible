theological_decisions:
- issue: Referent of 'my mountains' and the inheritance promise
  chosen_reading: Retain the concrete territorial language 'my mountains' without reducing it to a purely symbolic promise.
  alternative_readings:
  - Interpret as the land generally
  - Interpret spiritually as eschatological blessing only
  rationale: The Hebrew explicitly speaks of inheriting 'my mountains.' The translation preserves the geographical image and covenant-land dimension while leaving broader theological fulfillment questions to interpretation rather than resolving them in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
