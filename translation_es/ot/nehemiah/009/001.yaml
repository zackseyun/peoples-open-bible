translation:
  language: es
  text: El día veinticuatro de este mes, los hijos[a] de Israel se reunieron con ayuno, con cilicio y con tierra[b] sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o, tradicionalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, una señal externa de duelo y arrepentimiento: se echaban tierra o polvo sobre sí mismos.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְיוֹם
  english_pob_choice: Now on the ... day
  chosen_spanish: Ahora, en el día...
  alternatives_spanish:
  - Y en el día...
  - En el día...
  lexicon: HALOT
  rationale: La construcción hebrea marca continuidad temporal. «Ahora» funciona como enlace narrativo natural en español sin perder el valor de avance del relato; «en el día» conserva la referencia temporal literal.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  english_pob_choice: twenty-fourth
  chosen_spanish: veinticuatro
  alternatives_spanish:
  - veinticuatroavo
  - dos y veinte y cuatro
  lexicon: HALOT
  rationale: 'En fechas en español, la forma natural es cardinal tras «día»: «día veinticuatro». El hebreo usa una construcción cardinal, y el español la refleja con normalidad idiomática.'
- source_word: לַחֹדֶשׁ הַזֶּה
  english_pob_choice: of this month
  chosen_spanish: de este mes
  alternatives_spanish:
  - en este mes
  - para este mes
  lexicon: HALOT
  rationale: En una fórmula de datación, «de este mes» expresa de manera clara y natural el mes en curso. «Mes» es la equivalencia idiomática más común en español para el contexto calendario.
- source_word: נֶאֶסְפוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El nifal expresa reunión de la comunidad. «Se reunieron» transmite bien la acción colectiva sin sugerir una pasividad innecesaria; mantiene el tono sobrio del relato.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión de parentesco que está en el hebreo. «Los hijos de Israel» es transparente y fiel, y evita el borrado del matiz familiar del constructo.
- source_word: בְּצוֹם
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - en ayuno
  - ayunando
  lexicon: HALOT
  rationale: La preposición indica circunstancia acompañante. «Con ayuno» comunica de forma natural la práctica penitencial sin añadir elementos no presentes en el texto.
- source_word: וּבְשַׂקִּים
  english_pob_choice: in sackcloth
  chosen_spanish: con cilicio
  alternatives_spanish:
  - en cilicio
  - vestidos de cilicio
  - con ropa de cilicio
  lexicon: HALOT
  rationale: «Sackcloth» corresponde al término bíblico de tela áspera usada en duelo; en español, «cilicio» es el equivalente tradicional y preciso en este contexto. «Con» mantiene la misma relación circunstancial que el hebreo.
- source_word: וַאֲדָמָה עֲלֵיהֶם
  english_pob_choice: with dirt on them
  chosen_spanish: con tierra sobre ellos
  alternatives_spanish:
  - con polvo sobre ellos
  - con tierra encima de ellos
  - con suelo sobre ellos
  lexicon: HALOT
  rationale: אֲדָמָה significa «tierra/ suelo». «Con tierra sobre ellos» conserva el dato material sin especificar la parte del cuerpo; así se mantiene la imagen de duelo y arrepentimiento documentada en el contexto y en la nota inglesa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el cierre revisado del auditorio inglés, que favorece una formulación activa y natural para la reunión del pueblo. Se evitó una pasiva en español porque el hebreo nifal aquí describe la reunión comunitaria como acontecimiento, no como simple recepción externa de la acción.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; en este versículo no se presenta.
  - Se eligió «hijos de Israel» para respetar el constructo hebreo, coherente con la política del proyecto de no neutralizar automáticamente el masculino plural.
  - «Cilicio» se usa como término bíblico establecido en español para la prenda de luto, equivalente funcional de sackcloth.
  - No se añadieron notas al pie porque no hay una ambigüedad residual que requiera marcador en el texto español.
