translation:
  text: So now I have ordered that those men be stopped from building the city[a], and that care be taken that nothing further be done beyond this[c][b], and that the evil matter may not advance any more to the harm of kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that nothing be done contrary to this.' The Greek phrase can point either to action beyond the king's order or action against it.
    reason: lexical_alternative
  - marker: b
    text: Or 'to trouble kings.' The phrase refers to causing disturbance or injury to royal authority.
    reason: lexical_alternative
  - marker: c
    text: Contextually, 'building the city' likely refers to rebuilding, but the Greek text itself says simply 'build the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέταξα
  chosen: I have ordered
  alternatives:
  - I ordered
  - I commanded
  lexicon: BDAG
  rationale: Aorist in epistolary/reporting context can be rendered as English present perfect for natural official-letter style while preserving completed royal action.
- source_word: ἀποκωλῦσαι
  chosen: be stopped from
  alternatives:
  - be prevented from
  - be hindered from
  lexicon: BDAG
  rationale: 'The infinitive expresses the content of the order: the men are to be restrained from continuing construction. ''Be stopped from'' is idiomatic and clear.'
- source_word: τοὺς ἀνθρώπους ἐκείνους
  chosen: those men
  alternatives:
  - those people
  - those persons
  lexicon: BDAG
  rationale: Though ἄνθρωποι can be generic, in this administrative context it refers to the specific male opponents/builders addressed by the decree. 'Those men' is gender-accurate and natural.
- source_word: τοῦ οἰκοδομῆσαι τὴν πόλιν
  chosen: from building the city
  alternatives:
  - from rebuilding the city
  - from constructing the city
  lexicon: BDAG
  rationale: The Greek says 'build the city' without an explicit prefix for 'rebuild.' Since the context is restoration, 'rebuilding' is possible, but the main text stays closer to the Greek wording.
- source_word: προνοηθῆναι
  chosen: that care be taken
  alternatives:
  - that provision be made
  - that it be seen to it
  lexicon: BDAG
  rationale: This passive infinitive calls for official precaution or foresight. 'That care be taken' captures the administrative tone better than a more colloquial paraphrase.
- source_word: ὅπως μηθὲν παρὰ ταῦτα γένηται
  chosen: that nothing further be done beyond this
  alternatives:
  - that nothing be done contrary to this
  - that nothing else happen in addition to this
  lexicon: BDAG
  rationale: παρὰ ταῦτα can mean 'beyond this' or 'contrary to this.' In context of a royal prohibition, the sense is that no further action be taken past the king's order; the alternative nuance is preserved in a footnote.
- source_word: τὰ τῆς κακίας
  chosen: the evil matter
  alternatives:
  - the mischief
  - the wrongdoing
  - the evil
  lexicon: LSJ
  rationale: The genitival phrase is somewhat idiomatic. It refers not merely to abstract evil but to the harmful affair or mischief under discussion. 'The evil matter' keeps the concrete sense without sounding archaic like 'mischief'.
- source_word: προβῇ ἐπὶ πλεῖον
  chosen: may not advance any more
  alternatives:
  - may not increase further
  - may not go farther
  lexicon: BDAG
  rationale: The phrase denotes further progress or escalation. 'Advance any more' fits the image of a growing problem in official prose.
- source_word: εἰς τὸ βασιλεῖς ἐνοχλῆσαι
  chosen: to the harm of kings
  alternatives:
  - to trouble kings
  - so as to annoy kings
  lexicon: BDAG
  rationale: ἐνοχλέω can mean trouble, disturb, or harass. In royal-administrative context the concern is political harm or disturbance to imperial authority, so 'to the harm of kings' brings out the practical force.
