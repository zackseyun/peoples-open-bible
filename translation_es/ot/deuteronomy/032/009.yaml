translation:
  language: es
  text: Porque la porción de Yahvé es su pueblo[a], Jacob la porción de su herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Jacob la línea de medida de su herencia' o 'Jacob la suerte de su herencia'. El hebreo חֶבֶל puede referirse literalmente a una línea de medida y, por extensión, a una porción asignada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o explicación de lo anterior; en español, 'Porque' conserva bien esa relación causal/explicativa con un registro natural y bíblico.
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  lexicon: HALOT
  rationale: חֵלֶק denota una porción o parte asignada. 'Porción' mantiene la imagen distributiva y encaja con la paralela 'parte de su herencia'.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención POB para el nombre divino directo: ''Yahvé'', preservando el Tetragrámaton sin sustitución reverencial.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  lexicon: HALOT
  rationale: En contexto de pacto, עַם se entiende mejor como 'pueblo' que como 'nación', porque subraya la pertenencia relacional a Yahvé.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'Jacob'. Mantener el nombre propio conserva el paralelismo poético y no introduce una glosa interpretativa.
- source_word: חֶבֶל
  english_pob_choice: share
  chosen_spanish: parte
  alternatives_spanish:
  - medida
  - cordel
  - porción
  - suerte
  lexicon: HALOT
  rationale: חֶבֶל puede referirse literalmente a una cuerda o línea de medida, y por extensión a una porción asignada. Dado el paralelismo con 'porción' y 'herencia', 'parte' ofrece una equivalencia clara y natural en español, sin perder la idea de reparto.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión
  - su patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה designa una herencia o posesión heredada. 'Herencia' conserva el valor covenantal y de posesión transmitida del término.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene יְהֹוָה directamente. La línea POB actual privilegia la forma del nombre divino, por lo que en español se mantiene 'Yahvé' en vez de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor corporativo de 'Jacob'
  english_pob_reading: Jacob
  chosen_spanish_reading: Jacob
  alternative_spanish_readings:
  - Israel
  rationale: Aunque 'Jacob' representa al pueblo del pacto, el hebreo conserva el nombre patriarcal. Traducirlo como 'Israel' sería interpretativo y suavizaría el paralelismo del verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; preserve the source text''s plain sense'
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado del inglés, donde 'allotment' fue ajustado a 'share' para reflejar con más naturalidad חֶבֶל. En español, 'parte' conserva ese ajuste semántico y mantiene el paralelismo con 'porción' y 'herencia'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma uniforme del nombre divino según la pauta del proyecto.
  - Se evita 'SEÑOR' porque el objetivo del POB es hacer visible el nombre divino del hebreo.
  - '''Pueblo'' se mantiene por la fuerza relacional/covenantal de עַם.'
  - '''Herencia'' se conserva de manera consistente para נַחֲלָה en este contexto.'
  - La nota al pie marca únicamente la ambigüedad lexical de חֶבֶל, sin sobreinterpretar el verso.
