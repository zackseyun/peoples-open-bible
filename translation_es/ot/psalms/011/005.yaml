translation:
  language: es
  text: Yahvé prueba a los justos[a], pero su alma aborrece al impío y al que ama la violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más fluidamente: «Yahvé prueba a los justos, pero aborrece al impío y al que ama la violencia». El hebreo dice más literalmente: «su alma aborrece», un hebraísmo que expresa un rechazo personal intenso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma usual del proyecto en español, en vez de sustituirlo por un título. 'Yahvé' mantiene la referencia personal del nombre revelado.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - el justo
  - los rectos
  lexicon: HALOT
  rationale: El sustantivo colectivo en plural funciona bien en español para el grupo caracterizado por justicia. 'Los justos' preserva el valor genérico y resulta natural.
- source_word: יִבְחָן
  english_pob_choice: tests
  chosen_spanish: prueba
  alternatives_spanish:
  - examina
  - somete a prueba
  - ensaya
  lexicon: HALOT
  rationale: '''Prueba'' expresa el sentido evaluativo de בחן de manera breve y clara. Evita matices demasiado técnicos o forenses que el hebreo no exige aquí.'
- source_word: וְרָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: al impío
  alternatives_spanish:
  - al malvado
  - al perverso
  - al culpable
  lexicon: HALOT
  rationale: Se eligió el singular sustantivado 'el impío' para reflejar la categoría moral paralela a 'los justos'. 'Impío' es bíblico y mantiene el contraste sin suavizarlo.
- source_word: וְאֹהֵב חָמָס
  english_pob_choice: the one who loves violence
  chosen_spanish: al que ama la violencia
  alternatives_spanish:
  - al amante de la violencia
  - al que ama el violento proceder
  - al que ama la violencia y la injusticia
  lexicon: HALOT
  rationale: La construcción participial se vierte con una relativa natural en español. 'La violencia' reproduce el valor directo de חָמָס sin expandir el término a más de lo que el contexto exige.
- source_word: שָׂנְאָה נַפְשׁוֹ
  english_pob_choice: his soul hates
  chosen_spanish: su alma aborrece
  alternatives_spanish:
  - lo aborrece
  - lo detesta profundamente
  - su alma odia
  lexicon: HALOT
  rationale: Se retiene 'su alma' para preservar el hebraísmo y la intensidad personal del giro. 'Aborrece' comunica rechazo intenso con registro digno y evita una simplificación excesiva a 'lo odia'.
theological_decisions:
- issue: Giro hebreo 'su alma aborrece' aplicado a Yahvé
  english_pob_reading: The Hebrew is more literally 'his soul hates,' an idiom expressing deep personal abhorrence.
  chosen_spanish_reading: Se mantiene 'su alma aborrece' como hebraísmo que expresa repulsión personal intensa.
  alternative_spanish_readings:
  - '''lo aborrece'' para mayor fluidez'
  - '''lo detesta profundamente'' para explicitar la intensidad'
  rationale: La POB en inglés preserva la tensión del hebraísmo y no la resuelve en una paráfrasis plana. El español puede conservar esa fuerza con una expresión comprensible, sin borrar el detalle lexical de נֶפֶשׁ/נַפְשׁוֹ.
  doctrine_reference: Preservar tensión lexical y teológica; no suavizar antropomorfismos ni omitir rasgos significativos del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el auditorio inglés de la POB y su nota sobre el hebraísmo final, manteniendo la decisión de no eliminar 'su alma' aunque el español más fluido permitiría omitirlo. No hay revisiones previas aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se conserva la oposición moral 'los justos' / 'al impío y al que ama la violencia' sin intensificarla más allá del hebreo.
  - '''Aborrece'' se eligió por su fuerza semántica y registro bíblico natural en español.'
  - La nota al pie marca la alternativa más fluida sin perder la observación del hebraísmo.
