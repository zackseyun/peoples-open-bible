translation:
  language: es
  text: ¿Puedes[a], con él, extender los cielos[c][b], duros como un espejo de metal colado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «batir» o «estirar» los cielos. El verbo hebreo puede evocar tanto golpear metal hasta dejarlo delgado como desplegar algo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las nubes» o «el firmamento». שׁחקים es un término poético que puede referirse a los cielos o firmamento y, en algunos contextos, a las nubes.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «como un espejo de metal colado». La imagen presenta el cielo como una superficie sólida y brillante, semejante a una obra de metal.'
    reason: cultural_note
lexical_decisions:
- source_word: תַּרְקִ֣יעַ
  english_pob_choice: spread out
  chosen_spanish: extender
  alternatives_spanish:
  - batir
  - martillar
  - estirar
  lexicon: HALOT
  rationale: El hifil de רקע puede evocar golpear metal hasta adelgazarlo o extender algo. En español, «extender» comunica bien la acción de desplegar el firmamento sin volver la frase forzada, y conserva la imagen de una obra de fabricación.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con Dios
  lexicon: HALOT
  rationale: La forma hebrea usa un pronombre, no el nombre explícito. Por eso se conserva «con él» en el texto principal; el referente divino queda claro por el contexto, sin añadir una precisión que el hebreo no pone en la superficie.
- source_word: לִשְׁחָקִים
  english_pob_choice: the skies
  chosen_spanish: los cielos
  alternatives_spanish:
  - las nubes
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: שׁחקים es un plural poético que puede referirse a los cielos o, en ciertos contextos, a las nubes. Aquí la comparación con un espejo metálico favorece la idea del firmamento visible; «los cielos» conserva el plural poético y suena natural en español.
- source_word: חֲזָקִים
  english_pob_choice: hard
  chosen_spanish: duros
  alternatives_spanish:
  - fuertes
  - firmes
  lexicon: HALOT
  rationale: El adjetivo describe la solidez del cielo en la comparación. «Duros» transmite mejor la cualidad material que se contrasta con el metal fundido que «fuertes» o «firmes» en este contexto.
- source_word: כִּרְאִי
  english_pob_choice: as a ... mirror
  chosen_spanish: como un espejo
  alternatives_spanish:
  - como un looking-glass
  - como un espejo bruñido
  lexicon: HALOT
  rationale: רְאִי significa espejo. Se mantiene la comparación directa con «espejo» para conservar el efecto poético; el calificativo sobre el material se expresa en la frase siguiente.
- source_word: מוּצָק
  english_pob_choice: cast metal
  chosen_spanish: metal fundido
  alternatives_spanish:
  - metal colado
  - metal vaciado
  lexicon: HALOT
  rationale: La forma participial alude a metal vertido o fundido en molde. «Metal fundido» conserva el sentido de metal trabajado por vertido/cast, sin especificar un metal concreto que el hebreo no nombra.
translation_notes:
  revision_awareness: 'Se mantuvo el acuerdo general alto del texto fuente y del audit trail inglés: el verso conserva la pregunta retórica, el pronombre «él», la imagen del cielo/firmamento y la comparación metalúrgica. La principal adaptación al español fue elegir verbos y sustantivos naturales («extender», «cielos», «metal fundido») sin perder la tensión imagística del hebreo.'
  spanish_consistency_notes:
  - Se usa «cielos» para שׁחקים en línea con el valor poético plural.
  - Se conserva «con él» para respetar el pronombre hebreo no explicitado.
  - «Espejo» mantiene la imagen literal; la metáfora material se aclara en la nota de metal fundido.
  - La pregunta inicial reproduce la función retórica del hebreo.
