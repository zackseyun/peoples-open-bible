  to: La boca del necio es su ruina[a], y sus labios son un lazo[b] para su vida.
  rationale: Se hace una reparación menor para ajustar mejor מוֹקֵשׁ al registro poético-sapiencial del hebreo y del POB inglés. «Lazo» es más fiel que «trampa» al sentido de ‘snare’. Se mantiene la nota [b] anclada en «lazo» porque el texto inglés coloca ambas notas en la primera cláusula; pero en español, para cumplir con el requisito de anclaje y evitar una nota sin marca, se conserva una única nota [b] asociada en el segundo hemistiquio, donde aparece «su vida», el verdadero foco de la aclaración sobre נַפְשׁוֹ.
