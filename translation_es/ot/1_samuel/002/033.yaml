  text: וְ/אִ֗ישׁ לֹֽא אַכְרִ֤ית לְ/ךָ֙ מֵ/עִ֣ם מִזְבְּחִ֔/י לְ/כַלּ֥וֹת אֶת עֵינֶ֖י/ךָ וְ/לַ/אֲדִ֣יב אֶת נַפְשֶׁ֑/ךָ וְ/כָל מַרְבִּ֥ית בֵּיתְ/ךָ֖ יָמ֥וּתוּ אֲנָשִֽׁים־־־־׃
