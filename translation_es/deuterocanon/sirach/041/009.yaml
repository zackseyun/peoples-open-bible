base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/041/009.yaml
  text: If you prosper[a], it will be through disaster; and if you beget children, it will be for groaning. If you stumble, it will be for everlasting rejoicing; and if you die, it will be for a curse.
  footnotes:
  - marker: a
    text: The extant Hebrew for this verse is somewhat difficult and differs in detail from the Greek. The Greek parallel reads, 'if you are born, you will be born for a curse, and if you die, you will be allotted to a curse,' which guides the sense here.
