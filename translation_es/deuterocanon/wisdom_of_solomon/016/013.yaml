review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: «autoridad sobre la vida y la muerte» corresponde adecuadamente a ἐξουσίαν ζωῆς καὶ θανάτου, y la pareja verbal «haces bajar / haces subir» conserva la antítesis de κατάγεις / ἀνάγεις sin sobredeterminar resurrección. «Las puertas del Hades» también preserva correctamente πύλας ᾅδου.'
  spanish_quality_summary: 'El español es claro y fiel, pero la nota [b] introduce un problema: «resucitas» va más allá de la cautela léxica y teológica documentada en el expediente inglés, que precisamente evita una formulación técnica de resurrección. Además, como alternativa española, «levantas» es menos natural aquí que «haces subir» o «subes». Conviene ajustar solo la nota, no el texto principal.'
  glossary_alignment: 'Está alineado con la terminología del proyecto: «Hades» conserva ᾅδης; no hay conflicto con Yahvé/Mesías u otros términos sensibles. «Autoridad» para ἐξουσίαν y «haces subir» para ἀνάγεις siguen bien las decisiones auditadas. La excepción necesaria es eliminar «resucitas» de las alternativas en nota por desalinearse con la racionalidad teológica documentada.'
  issues:
  - severity: medium
    issue: La nota [b] ofrece «resucitas» como alternativa para ἀνάγεις.
    rationale: El expediente inglés explica explícitamente que «raise up» podría sugerir una afirmación técnica de resurrección más específica de lo que exige el griego. Incluir «resucitas» en español intensifica aún más ese problema y contradice la decisión teológica auditada.
  - severity: low
    issue: La nota [b] usa «levantas» como alternativa, que en español puede sonar menos precisa en este contexto de movimiento vertical desde el Hades.
    rationale: No es incorrecto, pero «haces subir»/«subes» o «haces ascender» reflejan mejor el paralelismo con «haces bajar» sin sugerir automáticamente resurrección corporal.
  revised_spanish_text: Porque tú tienes autoridad sobre la vida y la muerte, y haces bajar hasta las puertas del Hades[a] y haces subir[b].
  revised_footnotes:
  - marker: a
    text: O «las puertas del sepulcro» o «las puertas del mundo de los muertos». El griego dice «Hades», el ámbito de los muertos.
    reason: lexical_alternative
  - marker: b
    text: O «subes» o «levantas». El griego simplemente dice «haces subir», en paralelo con «haces bajar» en la cláusula anterior.
    reason: alternative_reading
  revision_rationale: El texto principal ya es fiel y natural. Solo se corrige la nota [b] para quitar «resucitas», que sobreinterpreta ἀνάγεις y contradice la cautela teológica documentada en el POB inglés.
