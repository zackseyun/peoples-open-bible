    issue: Construcción coordinada poco natural en español
    rationale: «Porque la vejez es honorable, no por ser longeva, ni se mide por el número de años» introduce una coma que corta la oración y deja «ni se mide» con un sujeto implícito menos claro. El griego coordina dos negaciones paralelas; en español conviene expresar ese paralelismo con «no porque... ni porque...».
