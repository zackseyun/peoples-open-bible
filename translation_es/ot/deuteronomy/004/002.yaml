revisions:
- from: No añadirán a la palabra que yo les mando[a], ni le quitarán nada, para que guarden los mandamientos de Yahvé su Dios que yo les mando.
  to: No añadan a la palabra que yo les mando, ni le quiten, para que guarden los mandamientos de Yahvé su Dios[a] que yo les mando.
  rationale: Se ajusta la prohibición a un español exhortativo más natural y fiel («No añadan ... ni le quiten»), se evita añadir «nada», y se reubica correctamente la nota al lugar donde aparece «Yahvé», ya que la nota trata del nombre divino, no del verbo «mando».
