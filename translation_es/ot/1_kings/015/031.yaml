translation:
  language: es
  text: Y el resto de los hechos de Nadab[a], y todo lo que hizo, ¿no están escritos en el libro de los anales de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las crónicas de los reyes de Israel». La expresión hebrea alude a una fuente real de anales o registros; no necesariamente al libro bíblico de Crónicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: En cuanto al resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora bien, el resto de
  lexicon: HALOT
  rationale: יֶתֶר expresa la idea de resto o lo que queda. En español, la fórmula de transición histórica se expresa con naturalidad como «En cuanto al resto de», conservando el giro introductorio sin endurecerlo en calco.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - palabras
  - asuntos
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «palabras» o «asuntos», en esta fórmula regnal se refiere al conjunto de acciones registradas del rey. «Hechos» comunica bien ese valor historiográfico en español.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  lexicon: N/A
  rationale: Nombre propio transliterado de manera estándar.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que él hizo
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de manera directa y natural en español. «Todo lo que hizo» conserva la amplitud total del hebreo sin añadir énfasis innecesario.
- source_word: הֲלֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es cierto que
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿no…?» reproduce adecuadamente esa fuerza interrogativa.
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: está escrito
  alternatives_spanish:
  - están escritos
  - están registrados
  lexicon: HALOT
  rationale: El antecedente en español es colectivo y la referencia funciona como una cita archivística fija. Se opta por la pasiva impersonal natural «está escrito» para la fórmula, sin perder el sentido de registro.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: En español, la referencia documental se expresa mejor con «en el libro». Mantiene la naturalidad y la función de fuente escrita del original.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: de los anales
  alternatives_spanish:
  - de las crónicas
  - de los registros
  lexicon: HALOT
  rationale: La expresión hebrea designa una fuente real de registros, no necesariamente el libro canónico de Crónicas. «Anales» preserva mejor el carácter archivístico del título fuente en español.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  lexicon: HALOT
  rationale: La relación marcada por לְ es aquí posesiva o titular. «De los reyes de Israel» reproduce con fidelidad y claridad la fórmula del encabezado documental.
translation_notes:
  revision_awareness: El texto español sigue de cerca la fórmula regnal del hebreo y mantiene la referencia a una fuente documental real, conforme al audit trail inglés. No se requiere cambio doctrinal ni ajuste textual adicional.
  spanish_consistency_notes:
  - Se usó «anales» para la fuente documental, en coherencia con la nota alternativa preservada por el POB en inglés.
  - Se mantuvo «Nadab» como nombre propio transliterado.
  - La estructura interrogativa conserva el tono retórico del hebreo sin ampliar el sentido.
