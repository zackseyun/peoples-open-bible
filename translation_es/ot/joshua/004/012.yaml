  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se conserva 'los hijos de Rubén/Gad/Israel' de forma transparente, y 'Manasés' es correcto. La única desalineación relevante es la omisión de la nota léxica sobre 'armados'.
