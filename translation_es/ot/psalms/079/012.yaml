review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del hebreo: petición imprecatoria dirigida a Dios, destinatario ''a nuestros vecinos'', intensificación ''siete veces'', imagen idiomática corporal, y el cierre vocativo con אֲדֹנָי. Sin embargo, hay dos pérdidas relevantes de matiz: (1) «te han deshonrado» se aleja demasiado del campo léxico de חרפה/חרף y rompe el vínculo cognado que el inglés POB procuró conservar; (2) «en su seno» es comprensible, pero en español moderno eclesial puede sonar menos natural o ambiguo que «en su regazo», y conviene mantener la nota alternativa de forma invertida.'
  spanish_quality_summary: 'El texto es legible y digno, pero la coma tras «seno[a]» entorpece el flujo. «Oh Señor» funciona, pero el proyecto exige sensibilidad terminológica: aquí corresponde «Señor» porque la fuente es אֲדֹנָי, no YHWH. Para una mejor fidelidad y naturalidad, «Devuelve a nuestros vecinos, siete veces, en su regazo[a], el oprobio con que te afrentaron, oh Señor» suena más claro y preserva mejor el paralelismo semántico.'
  glossary_alignment: No hay conflicto con Yahvé, porque el hebreo tiene אֲדֹנָי. «Oprobio» es aceptable para חֶרְפָּתָם. La principal desalineación léxica es traducir חֵרְפוּךָ como «te han deshonrado» en vez de algo del campo de «afrentar/reprochar/ultrajar», que preserve mejor la relación con «oprobio».
  issues:
  - severity: medium
    issue: El verbo «te han deshonrado» debilita el vínculo léxico con «oprobio».
    rationale: El hebreo usa חרפה/חרף en relación cognada, y el inglés auditado intentó preservarla con reproach/reproached. «Deshonrar» comunica agravio, pero pierde la conexión verbal con «oprobio» y desplaza el matiz hacia honor social más que afrenta verbal.
  - severity: low
    issue: «En su seno» resulta menos natural y potencialmente ambiguo en español actual.
    rationale: Aunque «seno» puede reflejar חֵיק, en español general contemporáneo «regazo» expresa con más claridad la imagen idiomática de recibir algo de vuelta sobre uno mismo. Además, el borrador ya reconoce «regazo» como alternativa valiosa.
  - severity: low
    issue: La puntuación con coma después de la frase idiomática es torpe.
    rationale: La pausa en «en su seno[a], el oprobio» corta innecesariamente la unidad verbal. Una puntuación más fluida mejora la legibilidad poética sin alterar el sentido.
  revised_spanish_text: Y devuelve a nuestros vecinos, siete veces, en su regazo[a], el oprobio con que te afrentaron, oh Señor.
  revised_footnotes:
  - marker: a
    text: 'O: «en su seno». El hebreo usa una imagen corporal para decir que la afrenta vuelva sobre ellos.'
    reason: lexical_alternative
  revision_rationale: Se revisa para preservar mejor el campo léxico de חרפה/חרף mediante «oprobio ... afrentaron», mantener una imagen idiomática más natural en español con «regazo», y pulir la puntuación. El cambio es menor y no requiere adjudicación adicional.
