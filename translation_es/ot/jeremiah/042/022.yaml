revisions:
- from: Ahora, sepan con certeza que morirán[a] a espada, de hambre y de peste en el lugar al que quisieron ir para residir allí.
  to: Ahora, pues, sepan con certeza que morirán a espada, de hambre y de peste[a] en el lugar adonde desearon ir para residir allí.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «peste», que es la palabra explicada. También se mejora la fidelidad y la naturalidad de la cláusula final con «adonde desearon ir», que refleja mejor el hebreo אֲשֶׁר חֲפַצְתֶּם לָבוֹא. Se añade «pues» para conservar mejor la fuerza consecuente de וְעַתָּה sin hacer el español pesado. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:30:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: transición exhortativa, énfasis de certeza, tríada de juicio y destino elegido para residir. Sin embargo, omite parte de la fuerza inferencial de וְעַתָּה (''Ahora, por tanto'' / ''Ahora, pues'') y, más importante, la cláusula אֲשֶׁר חֲפַצְתֶּם לָבוֹא לָגוּר שָׁם queda algo desplazada en ''al que quisieron ir'', que suena menos natural y no expresa tan claramente ''donde desearon ir para residir''.'
  spanish_quality_summary: El español es en general claro y digno, pero 'morirán[a] a espada' ancla la nota en el verbo en vez de en 'peste', donde corresponde la alternativa léxica. Además, 'al que quisieron ir' resulta poco idiomático; 'adonde/donde desearon ir' fluye mejor y preserva mejor el matiz volitivo de חפץ. 'Residir' es aceptable, aunque 'vivir como forasteros' sería más explícito; no es indispensable en el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La tríada 'espada... hambre... peste' es adecuada y mantiene el registro profético. La nota léxica sobre דֶּבֶר debe mantenerse, pero anclada a 'peste[a]' en el texto.
  issues:
  - severity: medium
    issue: El marcador de nota [a] está colocado en 'morirán' en lugar de en 'peste'.
    rationale: La nota explica una alternativa léxica para וּבַדֶּבֶר ('peste/plaga'), no para el verbo 'morirán'. La disciplina de notas exige anclar el marcador en la palabra pertinente.
  - severity: medium
    issue: La frase 'al que quisieron ir' es poco natural y desdibuja la relación relativa-locativa del hebreo.
    rationale: בַּמָּקוֹם אֲשֶׁר... se expresa mejor en español como 'en el lugar adonde/donde desearon ir'. La formulación actual suena forzada y menos fiel al matiz de 'desear'.
  - severity: low
    issue: '''Ahora'' por sí solo atenúa el matiz consecuente de וְעַתָּה.'
    rationale: El inglés auditado justificó 'Now therefore'. En español, 'Ahora, pues,' o 'Ahora, por tanto,' recupera mejor esa conexión inferencial sin volver el texto torpe.
  revised_spanish_text: Ahora, pues, sepan con certeza que morirán a espada, de hambre y de peste[a] en el lugar adonde desearon ir para residir allí.
  revised_footnotes:
  - marker: a
    text: O «y de plaga». El término hebreo puede denotar enfermedad epidémica en sentido más amplio.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «peste», que es la palabra explicada. También se mejora la fidelidad y la naturalidad de la cláusula final con «adonde desearon ir», que refleja mejor el hebreo אֲשֶׁר חֲפַצְתֶּם לָבוֹא. Se añade «pues» para conservar mejor la fuerza consecuente de וְעַתָּה sin hacer el español pesado. No se requiere adjudicación adicional.
