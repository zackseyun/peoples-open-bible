translation:
  language: es
  text: Hicimos una incursión en el Neguev de los cereteos[a], y en lo que pertenece a Judá, y en el Neguev de Caleb; y quemamos Siclag con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cereteos» refleja el nombre del pueblo; la tradición inglesa también conoce la forma «Cherethites».
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּשַׁטְנוּ
  english_pob_choice: made a raid on
  chosen_spanish: hicimos una incursión en
  alternatives_spanish:
  - asaltamos
  - hicimos una razzia en
  lexicon: HALOT
  rationale: En este contexto militar el verbo expresa una incursión hostil, no solo “extenderse” o “desplegarse”. «Hicimos una incursión en» conserva la acción de ataque con un español natural y sin perder la estructura verbal del hebreo.
- source_word: נֶגֶב
  english_pob_choice: Negev
  chosen_spanish: Neguev
  alternatives_spanish:
  - el Neguev
  - el sur
  lexicon: HALOT
  rationale: Aquí nֶגֶב funciona como zona geográfica del desierto/sur de Israel. Se conserva como topónimo transliterado «Neguev» para mantener la referencia territorial repetida.
- source_word: הַכְּרֵתִי
  english_pob_choice: the Cherethites
  chosen_spanish: los cereteos
  alternatives_spanish:
  - los quereteos
  - los cereteos/quereteos
  lexicon: HALOT
  rationale: Se trata de un nombre de pueblo. «Cereteos» refleja la transliteración habitual al español y evita imponer una equivalencia interpretativa. Se mantiene la nota para la variante tradicional inglesa.
- source_word: וְעַל אֲשֶׁר לִיהוּדָה
  english_pob_choice: and on that which belongs to Judah
  chosen_spanish: y en lo que pertenecía a Judá
  alternatives_spanish:
  - y contra lo que pertenecía a Judá
  - y en la región que pertenecía a Judá
  lexicon: HALOT
  rationale: El giro relativo señala posesión/pertenencia, no solo ubicación. «Lo que pertenecía a Judá» conserva esa relación posesiva sin sonar forzado en español. Se mantiene «y en» para reflejar la repetición preposicional del hebreo, como en el texto auditado en inglés.
- source_word: נֶגֶב כָּלֵב
  english_pob_choice: the Negev of Caleb
  chosen_spanish: el Neguev de Caleb
  alternatives_spanish:
  - el sur de Caleb
  - la región meridional de Caleb
  lexicon: HALOT
  rationale: La construcción parece designar una región asociada con Caleb. Se preserva el paralelismo con «Neguev» para no diluir la estructura geográfica del hebreo.
- source_word: שָׂרַפְנוּ בָאֵשׁ
  english_pob_choice: we burned Ziklag with fire
  chosen_spanish: prendimos fuego a Siclag
  alternatives_spanish:
  - quemamos Siclag con fuego
  - incendiamos Siclag
  lexicon: HALOT
  rationale: El hebreo usa «quemar con fuego», pero en español «prendimos fuego a» comunica con claridad la acción y evita una redundancia dura. «Incendiamos» es posible, pero «prendimos fuego a» conserva el matiz narrativo sin exceder el alcance del texto.
- source_word: צִקְלַג
  english_pob_choice: Ziklag
  chosen_spanish: Siclag
  alternatives_spanish:
  - Ziclag
  - Ziklag
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional «Siclag», ampliamente reconocible en la recepción bíblica en español, manteniendo el nombre de lugar.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés: conserva la secuencia de incursión repetida con «en/y en», mantiene la distinción entre dos zonas del Neguev y refleja la clausula posesiva de Judá sin convertirla en una explicación interpretativa. También incorpora la revisión auditada que prefiere una formulación más cercana al verbo hebreo que un simple «raided».'
  spanish_consistency_notes:
  - Se usa «Neguev» como topónimo geográfico, no como simple «sur».
  - Se mantiene la terminología de pueblo en «cereteos» con nota para la variante tradicional inglesa.
  - «Siclag» se prefiere por consistencia con el uso español bíblico tradicional, mientras que el audit trail inglés usa «Ziklag».
  - No se introduce una nota teológica porque el versículo es principalmente narrativo y no presenta una decisión doctrinal explícita.
