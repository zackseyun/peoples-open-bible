  yaml_path: translation/ot/joshua/001/006.yaml
  text: Be strong and courageous[b][a], for you shall cause this people to inherit the land that I swore to their fathers to give to them.
  footnotes:
  - marker: a
    text: Or 'you shall give this people the land as an inheritance.' The Hebrew verb is causative ('cause to inherit'), which may also be expressed more idiomatically in English as giving or apportioning an inheritance.
    reason: lexical_alternative
  - marker: b
    text: '''Their fathers'' refers to Israel''s forefathers, especially the patriarchs; alternatively, ''their ancestors.'''
    reason: lexical_alternative
