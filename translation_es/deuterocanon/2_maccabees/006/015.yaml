translation:
  language: es
  text: para que[a], cuando nuestros pecados hayan llegado a su plena medida, no tome venganza de nosotros después[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «cuando nuestros pecados hayan llegado al fin». La frase probablemente significa que los pecados han alcanzado su límite o plena medida.'
    reason: lexical_alternative
  - marker: b
    text: El sujeto es implícito en el griego y se toma del contexto inmediato, refiriéndose al Señor.
    reason: cross_reference
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce la cláusula de propósito de manera natural en español y conserva la fuerza final del griego.
- source_word: μὴ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no vaya a
  - que no
  lexicon: BDAG
  rationale: Niega la acción dentro de la cláusula de propósito sin cargar el texto con un giro arcaico.
- source_word: πρὸς τέλος
  english_pob_choice: to their full measure
  chosen_spanish: a su plena medida
  alternatives_spanish:
  - hasta el fin
  - completamente
  - hasta el límite
  lexicon: LSJ
  rationale: La expresión idiomática apunta a llegar a un límite o plenitud; 'plena medida' comunica bien esa culminación cuantitativa sin hacerla sonar meramente temporal.
- source_word: ἀφικομένων
  english_pob_choice: have reached
  chosen_spanish: hayan llegado
  alternatives_spanish:
  - hayan arribado
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio en genitivo absoluto expresa alcanzamiento de un límite; en español, 'hayan llegado' reproduce de forma idiomática ese sentido perfectivo.
- source_word: ἡμῶν τῶν ἁμαρτιῶν
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestros delitos
  - nuestras culpas
  lexicon: BDAG
  rationale: '''ἁμαρτίαι'' se vierte normalmente como ''pecados''; mantiene la referencia moral y teológica más directa del texto.'
- source_word: ὕστερον
  english_pob_choice: afterward
  chosen_spanish: luego
  alternatives_spanish:
  - después
  - más tarde
  lexicon: BDAG
  rationale: Marca el retraso de la acción vengadora en contraste con la paciencia previa; 'luego' es claro y natural en español.
- source_word: ἐκδικά
  english_pob_choice: take vengeance on
  chosen_spanish: nos tome venganza
  alternatives_spanish:
  - nos castigue
  - haga justicia sobre nosotros
  - ejerza venganza contra nosotros
  lexicon: LSJ
  rationale: El verbo tiene un matiz judicial-retributivo fuerte; 'tomar venganza' preserva mejor esa fuerza que un 'castigar' más general.
theological_decisions:
- issue: Sujeto divino implícito en el griego
  english_pob_reading: he may not afterward take vengeance on us
  chosen_spanish_reading: no nos tome luego venganza
  alternative_spanish_readings:
  - el Señor no nos tome luego venganza
  - no nos tome luego venganza el Señor
  rationale: El griego omite el sujeto, pero el contexto inmediato lo suministra. En español puede mantenerse la omisión para reflejar la economía del original, sin perder la referencia divina implícita.
  doctrine_reference: Mantener la tensión textual y la referencia contextual sin añadir más de lo que el verso dice explícitamente.
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego de Swete 1909 y con el audit trail inglés: la cláusula final expresa propósito, πρὸς τέλος conserva la idea de límite/plenitud, y ἐκδικά mantiene su sentido retributivo-jurídico. No se detectan revisiones posteriores que requieran ajuste.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' en el cuerpo principal porque el griego aquí no lo expresa; la referencia divina queda implícita por contexto.
  - '''pecados'' conserva la correspondencia más directa con ἁμαρτίαι y mantiene el registro bíblico sin introducir matices ajenos.'
  - '''tomar venganza'' preserva la fuerza retributiva del verbo mejor que un simple ''castigar''.'
