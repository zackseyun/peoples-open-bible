id: PHM.1.19
reference: Philemon 1:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐγὼ Παῦλος ἔγραψα τῇ ἐμῇ χειρί, ἐγὼ ἀποτίσω· ἵνα μὴ λέγω σοι ὅτι καὶ σεαυτόν μοι προσοφείλεις.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/019.yaml
  text: 'I[a], Paul, write this with my own hand: I will repay it—not to mention to you that you owe me even your very self.'
  footnotes:
  - marker: a
    text: Or, more formally, 'I, Paul, wrote this with my own hand; I will repay it; not to say to you that you owe me even yourself.'
    reason: lexical_alternative
translation:
  language: ko
  text: '나 바울이 내 손으로 직접 씁니다[a]—내가 갚겠습니다. 그대 자신마저 내게 빚지고 있다는 말은 굳이 하지 않겠습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 더 격식 있게 「나 바울이 내 손으로 썼다; 내가 갚겠다; 그대 자신마저 내게 빚지고 있다고 말하지 않더라도」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  english_pob_choice: write
  chosen_korean: 씁니다
  alternatives_korean:
  - 썼습니다
  - 적었습니다
  lexicon: BDAG
  rationale: 부정과거(epistolary aorist). 편지가 도착하는 시점의 수신자 관점을 살려 한국어 현재형 「씁니다」가 자연스러우며, 자필 보증의 무게를 살린다.
- source_word: τῇ ἐμῇ χειρί
  english_pob_choice: with my own hand
  chosen_korean: 내 손으로 직접
  alternatives_korean:
  - 내 손으로
  - 친필로
  lexicon: BDAG
  rationale: 자필 보증의 관용 표현. 「직접」을 더해 강조의 무게를 살린다.
- source_word: ἀποτίσω
  english_pob_choice: I will repay it
  chosen_korean: 내가 갚겠습니다
  alternatives_korean:
  - 내가 보상하겠습니다
  - 내가 변제하겠습니다
  lexicon: BDAG
  rationale: 미래 약속. 「내가 갚겠습니다」가 18절의 회계 문맥과 자연스럽게 이어진다.
- source_word: ἵνα μὴ λέγω σοι
  english_pob_choice: not to mention to you
  chosen_korean: ~다는 말은 굳이 하지 않겠습니다
  alternatives_korean:
  - 말하지 않더라도
  - 굳이 말하지는 않겠지만
  lexicon: BDAG
  rationale: 본 절은 엄밀한 목적이라기보다 수사적 반어. 「~다는 말은 굳이 하지 않겠습니다」가 바울의 재치 있는 부드러운 압박을 한국어로 자연스럽게 살린다.
- source_word: σεαυτόν
  english_pob_choice: your very self
  chosen_korean: 그대 자신마저
  alternatives_korean:
  - 그대 자신을
  - 그대 자신까지도
  lexicon: BDAG
  rationale: 재귀대명사 + καί 강조. 「그대 자신마저」가 강조의 무게를 살리며 한국어로 자연스럽다.
- source_word: προσοφείλεις
  english_pob_choice: you owe me
  chosen_korean: 내게 빚지고 있다
  alternatives_korean:
  - 나에게 빚이 있다
  - 내게 더 빚지고 있다
  lexicon: BDAG
  rationale: προσ- 접두어는 「게다가, 추가로」의 의미를 더한다. 「빚지고 있다」가 한국어로 자연스러우며, 「그대 자신마저」의 강조에서 추가의 함의가 충분히 살아난다.
theological_decisions:
- issue: 「그대 자신마저 내게 빚지고 있다」의 채무의 성격
  chosen_reading: 비유적·인격적 채무를 보존하되 회심, 구원, 생명-빚 등을 본문에 명시하지 않음
  alternative_readings:
  - 빌레몬이 바울에게 자신의 회심을 빚지고 있음
  - 빌레몬이 바울에게 자신의 육신적 생명을 빚지고 있음
  - 일반적 인격적 빚
  rationale: 헬라어는 빚의 강도를 분명히 표현하지만 그 정확한 근거는 명시하지 않는다. 본문이 말하지 않는 교리적·역사적 주장을 더하지 않기 위해 본 번역은 표현 자체를 보존하고 정확한 지시 대상은 함축으로 둔다.
  doctrine_reference: 'Preserve theological tension rather than resolve it'
