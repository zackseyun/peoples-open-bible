revisions:
- from: 'Por eso Daniel fue[a] ante Arioc, a quien el rey había nombrado para destruir a los sabios de Babilonia. Fue y le dijo así: «No destruyas a los sabios de Babilonia. Hazme entrar[b] ante el rey, y yo le mostraré la interpretación al rey».'
  to: 'Por eso Daniel fue a ver a Arioc[a], a quien el rey había nombrado para destruir a los sabios de Babilonia. Fue y le dijo así: «No destruyas a los sabios de Babilonia. Hazme entrar ante el rey, y yo mostraré al rey la interpretación[b]».'
  rationale: 'La revisión corrige dos detalles de auditoría: reubica y reformula la nota del movimiento hacia Arioc para que corresponda al segmento léxico correcto, y añade la alternativa exigida para אֲחַוֵּא. También mejora levemente la naturalidad del español con «fue a ver a Arioc» y una clausula final más fluida, sin apartarse del sentido fuente ni de las decisiones del POB.'
