    rationale: El griego expresa extrañeza o ajenidad relacional, no solo distancia. «Alejado» puede sonar meramente espacial o moralmente genérico; «siendo ajeno a Dios» corresponde mejor al ajuste del POB inglés a «being alien to God».
  - severity: low
