translation:
  language: es
  text: Además de sus esclavos[a] y sus esclavas, estos sumaban siete mil trescientos treinta y siete; y tenían doscientos cantores y cantoras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siervos' / 'siervas'. Los términos hebreos pueden designar sirvientes domésticos en sentido más amplio, pero en este contexto censal 'esclavos' refleja mejor su condición dependiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: Además de
  alternatives_spanish:
  - aparte de
  - sin contar
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la idea de inclusión adicional o excepción contable en un registro censal, sin perder el matiz de suma respecto del total anterior.
- source_word: עַבְדֵיהֶם
  english_pob_choice: their male slaves
  chosen_spanish: sus esclavos varones
  alternatives_spanish:
  - sus siervos varones
  - sus servidores varones
  lexicon: HALOT
  rationale: En este contexto censal y social, 'esclavos' refleja mejor la dependencia personal que 'siervos'. 'Varones' mantiene la distinción explícita del paralelo femenino.
- source_word: וְאַמְהֹתֵיהֶם
  english_pob_choice: female slaves
  chosen_spanish: sus esclavas
  alternatives_spanish:
  - sus siervas
  - sus criadas
  lexicon: HALOT
  rationale: אָמָה designa una mujer esclavizada o sirvienta dependiente; en paralelo con עבד, 'esclavas' conserva la fuerza social del término.
- source_word: אֵלֶּה
  english_pob_choice: these were
  chosen_spanish: estos eran
  alternatives_spanish:
  - eran estos
  - estos sumaban
  lexicon: HALOT
  rationale: El español requiere una cópula explícita en esta fórmula numérica; 'estos eran' conserva la lectura de suma total sin sobreexplicar.
- source_word: שִׁבְעַת אֲלָפִים שְׁלֹשׁ מֵאוֹת שְׁלֹשִׁים וְשִׁבְעָה
  english_pob_choice: 7,337
  chosen_spanish: siete mil trescientos treinta y siete
  alternatives_spanish:
  - '7.337'
  - 7,337
  lexicon: HALOT
  rationale: En español, en un texto bíblico publicado, la cifra escrita con palabras evita ambigüedad tipográfica y se integra mejor al registro narrativo/censal.
- source_word: וְלָהֶם
  english_pob_choice: and they had
  chosen_spanish: y tenían
  alternatives_spanish:
  - y había para ellos
  - y contaban con
  lexicon: HALOT
  rationale: La construcción posesiva/existencial se naturaliza en español como 'tenían', manteniendo el sentido de posesión o pertenencia dentro del grupo.
- source_word: מְשֹׁרְרִים וּמְשֹׁרְרוֹת
  english_pob_choice: male and female singers
  chosen_spanish: cantores varones y mujeres
  alternatives_spanish:
  - cantores y cantoras
  - cantores y cantoras varones y mujeres
  lexicon: HALOT
  rationale: El hebreo distingue masculinos y femeninos por participios; 'cantores varones y mujeres' conserva esa distinción sin usar un calco poco natural. 'Cantores' puede funcionar como término general y el complemento explicita el sexo.
- source_word: מָאתָיִם
  english_pob_choice: '200'
  chosen_spanish: doscientos
  alternatives_spanish:
  - '200'
  lexicon: HALOT
  rationale: Se escribe con palabras para mantener el estilo bíblico en español y coherencia con el resto de la cifra principal.
