translation:
  language: es
  text: Cuando mis enemigos retrocedan[a], tropezarán y perecerán delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu presencia», literalmente, «de delante de tu rostro/presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּב
  english_pob_choice: When ... turn back
  chosen_spanish: Cuando ... se vuelvan atrás
  alternatives_spanish:
  - Al volverse atrás
  - Cuando ... retrocedan
  lexicon: HALOT
  rationale: El ב con infinitivo constructo de שוב introduce una cláusula temporal. «Cuando ... se vuelvan atrás» conserva el valor temporal y el matiz de retroceso con un español natural.
- source_word: אוֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - los que me son hostiles
  lexicon: HALOT
  rationale: אויב con sufijo de primera persona singular significa directamente «mis enemigos»; es la equivalencia más clara e idiomática.
- source_word: אָחוֹר
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - al retroceder
  lexicon: HALOT
  rationale: Aquí funciona adverbialmente con שוב, expresando movimiento de retirada. «Atrás» preserva la imagen sin sonar forzado en español.
- source_word: יִכָּשְׁלוּ
  english_pob_choice: they stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - vacilarán
  - se tambalearán
  lexicon: HALOT
  rationale: El nifal de כשל comunica tropiezo o caída en falso. «Tropezarán» reproduce la imagen verbal de manera natural y mantiene la progresión hacia la ruina final.
- source_word: וְיֹאבְדוּ
  english_pob_choice: and perish
  chosen_spanish: y perecerán
  alternatives_spanish:
  - y serán destruidos
  - y desaparecerán
  lexicon: HALOT
  rationale: אבד puede expresar perecer o ser destruido. «Perecerán» sigue el paralelismo poético y no especifica más de lo que el hebreo permite.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión literalmente dice «de delante de tu rostro/presencia». «Delante de ti» conserva la fuerza espacial y relacional, en línea con la decisión inglesa de no sobreinterpretar el mecanismo del juicio.
theological_decisions:
- issue: La caída de los enemigos en la presencia divina
  english_pob_reading: The verse describes the enemies stumbling and perishing in God's presence without expanding the mechanism beyond the Hebrew wording.
  chosen_spanish_reading: El versículo presenta a los enemigos tropezando y pereciendo delante de Dios, sin precisar el modo exacto de esa caída.
  alternative_spanish_readings:
  - Los enemigos son destruidos directamente por Dios
  - Los enemigos caen solo al percibir su presencia
  rationale: 'La traducción conserva la tensión teológica del hebreo: la ruina ocurre ante la presencia de Yahvé, pero el texto no define si la causa es una intervención directa o el mero estar ante él. Por eso se evita añadir una explicación que el original no da.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'El pasaje está en alto acuerdo con la revisión más reciente: no se requirieron cambios sustanciales respecto del sentido auditado del inglés POB.'
  spanish_consistency_notes:
  - Se mantiene «tropezarán» para כשל y «perecerán» para אבד, conservando el paralelismo semántico y poético.
  - «Delante de ti» traduce la preposición con matiz espacial-relacional sin reemplazarla por una fórmula eclesiástica más interpretativa.
  - La nota al pie preserva la alternativa semántica de la presencia, útil para lectura comparada con el inglés POB.
