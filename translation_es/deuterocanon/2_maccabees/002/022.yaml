translation:
  language: es
  text: Y cuando se consumieron[a] las cosas para el sacrificio[b], Nehemías ordenó que vertieran el agua restante sobre las piedras mayores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia griega es algo abrupta y compacta; la traducción sigue el orden y el sentido del texto transmitido sin suavizarlo en exceso.
    reason: textual_variant
  - marker: b
    text: 'El griego es elíptico: literalmente, «las cosas del sacrificio». La traducción española conserva esa amplitud semántica sin especificar más de lo que el texto permite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηλώθη
  english_pob_choice: had been consumed
  chosen_spanish: se consumieron
  alternatives_spanish:
  - se agotaron
  - fueron consumidas
  lexicon: LSJ
  rationale: El griego pasivo indica que los elementos destinados al sacrificio quedaron agotados o consumidos. «Se consumieron» preserva ese valor sin añadir un agente explícito ni concretar el modo de consumo.
- source_word: τὰ τῆς θυσίας
  english_pob_choice: the things for the sacrifice
  chosen_spanish: las cosas para el sacrificio
  alternatives_spanish:
  - los elementos del sacrificio
  - los materiales para el sacrificio
  lexicon: LSJ
  rationale: La expresión griega es elíptica y literalmente habla de «las cosas del sacrificio». En español, «las cosas para el sacrificio» conserva la amplitud y la rareza del giro sin convertirlo en una paráfrasis excesiva.
- source_word: τὸ περιλειπόμενον ὕδωρ
  english_pob_choice: the remaining water
  chosen_spanish: el agua restante
  alternatives_spanish:
  - el agua que quedaba
  - el agua sobrante
  lexicon: LSJ
  rationale: Es una frase directa; «agua restante» suena natural y mantiene la idea de lo que queda después de la acción anterior.
- source_word: ὁ Νεεμίας
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  alternatives_spanish:
  - Neemías
  lexicon: nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre propio bíblico, transparente para el lector.
- source_word: ἐκέλευσεν
  english_pob_choice: ordered them
  chosen_spanish: mandó que
  alternatives_spanish:
  - ordenó que
  - les dio orden de
  lexicon: LSJ
  rationale: El verbo expresa una orden con autoridad. «Mandó que» refleja bien la fuerza imperativa en un español natural y permite introducir la subordinada siguiente con fluidez.
- source_word: λίθους μείζονας
  english_pob_choice: the larger stones
  chosen_spanish: las piedras más grandes
  alternatives_spanish:
  - las piedras mayores
  - las piedras grandes
  lexicon: LSJ
  rationale: El comparativo μείζονας requiere un comparativo explícito en español. «Más grandes» conserva la comparación y encaja mejor que «mayores» en este contexto concreto.
- source_word: καταχεῖν
  english_pob_choice: to pour ... on
  chosen_spanish: derramaran ... sobre
  alternatives_spanish:
  - vertieran ... sobre
  - echaran ... sobre
  lexicon: LSJ
  rationale: El compuesto verbal indica verter encima o sobre algo. En español, «derramaran ... sobre» mantiene la imagen física y la relación con las piedras sin sonar forzado.
translation_notes:
  revision_awareness: Esta redacción toma en cuenta el cierre auditado en inglés, pero vuelve al griego para conservar su elipsis («τὰ τῆς θυσίας») y su sintaxis comprimida. Se evita introducir «materiales» por no estar explícito en el original y se mantiene el artículo definido en «las piedras más grandes» conforme a la forma griega transmitida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva el registro bíblico sobrio y moderno, evitando calcos innecesarios.
  - No se fuerza una interpretación causal del consumo de los elementos del sacrificio; se deja abierta la forma pasiva del griego.
