translation:
  language: es
  text: Para siempre guardaré para él mi amor leal,[a] y mi alianza le será fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alianza le permanecerá fiel» o «mi alianza le será segura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעוֹלָם
  english_pob_choice: Forever
  chosen_spanish: Para siempre
  alternatives_spanish:
  - Siempre
  - Por toda la eternidad
  lexicon: HALOT
  rationale: לְעוֹלָם expresa duración continua y permanente; «para siempre» es natural en español y conserva el valor de permanencia del compromiso divino.
- source_word: אֶשְׁמֹר
  english_pob_choice: I will keep
  chosen_spanish: "guardar\0e9"
  alternatives_spanish:
  - "preservar\0e9"
  - "mantendr\0e9"
  - "velar\0e9 por"
  lexicon: HALOT
  rationale: שׁמר en contexto de pacto implica custodiar o mantener algo con fidelidad. «Guardaré» es fiel al verbo hebreo y funciona bien con «amor leal».
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - en favor de él
  lexicon: HALOT
  rationale: El ל objetivo/relacional aquí señala dirección o beneficio respecto de la persona del pacto. «Para él» mantiene esa relación de beneficio de manera natural en español.
- source_word: חַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor leal
  alternatives_spanish:
  - mi amor firme
  - mi misericordia
  - mi lealtad amorosa
  lexicon: HALOT
  rationale: חסד es un término de alianza con una mezcla de afecto, lealtad y compromiso. «Amor leal» conserva ese peso relacional sin reducirlo a «misericordia» ni volverlo una frase demasiado técnica.
- source_word: וּבְרִיתִי
  english_pob_choice: and my covenant
  chosen_spanish: y mi pacto
  alternatives_spanish:
  - y mi alianza
  - y mi convenio
  lexicon: HALOT
  rationale: בְּרִית es el término estándar de pacto/alianza. «Pacto» es claro, bíblico y directo en español.
- source_word: נֶאֱמֶנֶת
  english_pob_choice: will remain faithful to him
  chosen_spanish: "le permanecer\0e1 fiel"
  alternatives_spanish:
  - "ser\0e1 fiel para él"
  - "le ser\0e1 fiel"
  - "permanecer\0e1 firme para él"
  lexicon: HALOT
  rationale: נֶאֱמֶנֶת comunica firmeza, fiabilidad y fidelidad. La forma verbal «le permanecerá fiel» intenta conservar el matiz de constancia del pacto y, a la vez, evitar una traducción demasiado abstracta o impersonal.
theological_decisions:
- issue: Cómo verter חסד sin borrar su densidad de alianza
  english_pob_reading: my steadfast love
  chosen_spanish_reading: mi amor leal
  alternative_spanish_readings:
  - mi misericordia
  - mi bondad constante
  - mi amor inquebrantable
  rationale: En este versículo חסד no es solo afecto ni solo misericordia; está ligado a la fidelidad del pacto. «Amor leal» comunica esa unión de amor y compromiso sin perder la tensión del término hebreo.
  doctrine_reference: Covenant theology; Davidic promise context in Psalm 89
- issue: Cómo reflejar נֶאֱמֶנֶת sin forzar el sentido hacia una sola idea
  english_pob_reading: will remain faithful to him
  chosen_spanish_reading: le permanecerá fiel
  alternative_spanish_readings:
  - le será fiel
  - permanecerá firme para él
  - será segura para él
  rationale: El hebreo puede expresar fidelidad, firmeza o certeza. La redacción elegida mantiene la lectura relacional y de confiabilidad que el contexto del pacto requiere, sin borrar la posible tensión entre «fiel» y «segura».
  doctrine_reference: Covenant reliability; divine promise to David
translation_notes:
  revision_awareness: La base inglesa revisó la segunda cláusula desde una imagen más interpretativa de «stand firm» hacia «remain faithful» para reflejar más directamente נֶאֱמֶנֶת. La versión española sigue esa revisión y opta por una formulación relacional («le permanecerá fiel») que conserva la fidelidad del pacto sin sustituirla por un equivalente más abstracto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino explícito.
  - «Pacto» se usa de forma consistente para בְּרִית.
  - «Amor leal» se adopta como solución estable para חסד en este contexto, evitando «misericordia» por estrechar demasiado el sentido.
