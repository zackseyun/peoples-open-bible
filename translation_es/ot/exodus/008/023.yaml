translation:
  language: es
  text: Iremos camino de tres días al desierto, y sacrificaremos a Yahvé nuestro Dios[a], tal como él nos diga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una jornada de tres días».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como él nos dirá»; o «como él nos dice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: a three days' journey
  chosen_spanish: un viaje de tres días
  alternatives_spanish:
  - una jornada de tres días
  - un viaje de tres jornadas
  lexicon: HALOT
  rationale: La expresión hebrea indica una distancia o recorrido de duración determinada. En español, «un viaje de tres días» comunica con naturalidad ese valor idiomático sin añadir precisión no explicitada en el hebreo.
- source_word: נֵלֵךְ
  english_pob_choice: We will go
  chosen_spanish: Iremos
  alternatives_spanish:
  - Vamos a ir
  - Nosotros iremos
  lexicon: HALOT
  rationale: El imperfecto 1cp expresa aquí un desplazamiento futuro dentro de la petición de Moisés. «Iremos» conserva el valor verbal sin convertirlo en mandato o ruego explícito.
- source_word: בַּמִּדְבָּר
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto abierto
  - al páramo
  lexicon: HALOT
  rationale: El término מִדְבָּר puede abarcar desierto o región despoblada. «Al desierto» es natural en español y refleja bien el movimiento hacia ese lugar.
- source_word: וְזָבַחְנוּ
  english_pob_choice: and sacrifice
  chosen_spanish: y sacrificaremos
  alternatives_spanish:
  - y ofreceremos sacrificios
  - y haremos sacrificio
  lexicon: HALOT
  rationale: El verbo זבח remite al acto sacrificial. «Sacrificaremos» mantiene el paralelismo verbal y el sentido cultual con suficiente precisión en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el nombre divino por «Yahvé» en el texto principal, preservando el nombre de pacto y evitando la sustitución reverencial por «SEÑOR».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona plural se vierte directamente como «nuestro Dios», conservando la relación de pertenencia y alianza.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - según
  lexicon: HALOT
  rationale: La comparación/conformidad del hebreo se expresa bien con «tal como», que en español comunica obediencia a la medida o forma indicada.
- source_word: יֹאמַר אֵלֵינוּ
  english_pob_choice: he tells us
  chosen_spanish: él nos diga
  alternatives_spanish:
  - él nos diga a nosotros
  - él nos dirá
  lexicon: HALOT
  rationale: El imperfecto hebreo puede leerse como instrucción futura esperada. «Nos diga» preserva esa apertura a la palabra todavía por recibir, tal como refleja la nota inglesa sobre la posibilidad de leerlo en sentido futuro o declarativo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme al criterio doctrinal del proyecto, se conserva el nombre propio de Dios en español como «Yahvé», en lugar de ocultarlo tras una mayúscula reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
- issue: Valor temporal de יֹאמַר אֵלֵינוּ
  english_pob_reading: he tells us
  chosen_spanish_reading: él nos diga
  alternative_spanish_readings:
  - él nos dirá
  - él nos diga a nosotros
  rationale: La forma verbal puede expresar la instrucción que aún va a darse; por eso se eligió un subjuntivo dependiente de «tal como», que mantiene la relación de conformidad con lo que Dios ordene. La alternativa futura sigue siendo viable, pero la elección actual resalta la dependencia del mandato divino.
  doctrine_reference: 'DOCTRINE.md: Verb tense and modality — preserve documented ambiguity when source permits'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que prefirió una formulación más natural para la duración del viaje sin alterar el sentido. Se mantuvo la equivalencia óptima y se conservaron las alternativas relevantes en notas para reflejar la ambigüedad léxica y temporal del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino en el texto principal.
  - «Desierto» se emplea para מִדְבָּר en un contexto de movimiento, evitando calcos como «en el desierto» cuando el sentido direccional es claro.
  - Se conserva la posibilidad de leer el último verbo como futuro o como instrucción pendiente mediante nota.
  - El registro es sobrio y publicable, con puntuación española estándar y sin arcaísmos innecesarios.
