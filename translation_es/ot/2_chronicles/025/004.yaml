  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה se traduce correctamente como «Yahvé»; תּוֹרָה como «Ley» es aceptable en este contexto; no hay conflictos mayores de glosario. La principal divergencia es de fuerza léxica-jurídica para מות en Hifil y en la cita legal, donde conviene reflejar «poner a muerte» en vez de simplemente «morir».'
