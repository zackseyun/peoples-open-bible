    text: Or 'the Mighty One' or 'the Ruler' for the divine title.
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase rendered 'with judgments' contains an unusual form in the transmitted text; the sense is that God shatters the enemies through acts of judgment.
    reason: textual_variant
  - marker: c
    text: Or 'captured the city'; literally, 'took the city under hand.'
    reason: lexical_alternative
