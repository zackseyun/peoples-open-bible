translation:
  language: es
  text: Me enojé mucho cuando escuché su clamor y estas palabras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "asuntos" o "cuestiones". El hebreo דברים puede referirse tanto a palabras dichas como a los asuntos o hechos que se están relatando.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לִי
  english_pob_choice: I became angry
  chosen_spanish: Me enojé
  alternatives_spanish:
  - Me airé
  - Se encendió mi ira
  - Me llené de enojo
  lexicon: HALOT
  rationale: La expresión hebrea comunica que la ira se encendió en la persona. En español, "me enojé" reproduce de forma natural ese inicio de enojo sin sobrerrepresentarlo. "Se encendió mi ira" es más literal, pero menos idiomático en el versículo.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  - sobremanera
  lexicon: HALOT
  rationale: מְאֹד intensifica el enojo. "Mucho" es claro y natural en español contemporáneo, y conserva bien la intensidad.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - mientras
  - tan pronto como
  lexicon: HALOT
  rationale: Aquí la conjunción introduce el momento en que Nehemías oyó el clamor. "Cuando" expresa con naturalidad la relación temporal.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I heard
  chosen_spanish: escuché
  alternatives_spanish:
  - oí
  - oyó
  - atendí
  lexicon: HALOT
  rationale: El verbo señala que recibió el reporte del clamor. "Escuché" funciona bien en español moderno y conserva la idea de percibir lo dicho; "oí" sería más literal, pero menos expresivo en este contexto.
- source_word: זַעֲקָתָם
  english_pob_choice: their outcry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su alarido
  - su protesta
  lexicon: HALOT
  rationale: זעקה denota un clamor o grito de angustia/reclamo. "Su clamor" mantiene el peso emotivo y el alcance público del término mejor que opciones más estrechas como "protesta".
- source_word: וְאֵת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: and these words
  chosen_spanish: y estas palabras[a]
  alternatives_spanish:
  - y estos asuntos
  - y estas cosas
  - y estos hechos
  lexicon: HALOT
  rationale: דברים puede referirse tanto a "palabras" como a "asuntos". Dado que el contexto inmediato destaca lo que el pueblo dijo, "palabras" es una traducción directa y adecuada; sin embargo, se mantiene la ambigüedad semántica con una nota porque también puede significar "asuntos" o "cuestiones".
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de WLC y el audit trail inglés. Se conserva la ambigüedad de דברים con una nota, como hizo la POB inglesa, y se evita una paráfrasis que borre la secuencia emocional: enojo al oír el clamor y las palabras reportadas.'
  spanish_consistency_notes:
  - Se usa "Yahvé" según la convención del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió "clamor" para זעקה por su fuerza emotiva y su amplitud semántica.
  - '"Palabras" mantiene la posible referencia a discurso reportado, mientras la nota preserva la alternativa "asuntos".'
