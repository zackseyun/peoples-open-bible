translation:
  language: es
  text: Se levantaron muy de mañana, y el sol resplandeció sobre el agua; y Moab[a] vio el agua frente a ellos, roja como sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los moabitas vieron el agua frente a ellos». El hebreo usa «Moab» de manera colectiva para el pueblo de Moab, y la expresión espacial también puede traducirse «al otro lado de ellos» o «frente a ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  english_pob_choice: They rose early
  chosen_spanish: Se levantaron muy de mañana
  alternatives_spanish:
  - Se levantaron temprano
  - Se alzaron de madrugada
  lexicon: HALOT
  rationale: El verbo hebreo expresa levantarse o ponerse en pie temprano. «Muy de mañana» conserva el énfasis temporal con un tono natural y digno en español, sin cargar el texto con una construcción demasiado literal.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de mañana
  alternatives_spanish:
  - en la mañana
  - por la mañana
  lexicon: HALOT
  rationale: La frase temporal se integra mejor en español con «de mañana» dentro de la expresión completa «muy de mañana», manteniendo la referencia al inicio del día.
- source_word: וְהַשֶּׁמֶשׁ זָרְחָה
  english_pob_choice: and the sun shone
  chosen_spanish: y el sol resplandeció
  alternatives_spanish:
  - y el sol brilló
  - y el sol salió
  lexicon: HALOT
  rationale: זָרַח puede significar salir o brillar; aquí el contexto destaca el efecto visual de la luz sobre el agua. «Resplandeció» comunica bien ese brillo visible sin reducirlo solo a un dato horario.
- source_word: עַל הַמָּיִם
  english_pob_choice: on the water
  chosen_spanish: sobre el agua
  alternatives_spanish:
  - encima del agua
  - sobre las aguas
  lexicon: HALOT
  rationale: «Sobre el agua» expresa con claridad el rayo del sol cayendo sobre la superficie. En español, el singular colectivo «agua» es más natural que «las aguas» en este contexto.
- source_word: וַיִּרְאוּ מוֹאָב
  english_pob_choice: and Moab saw
  chosen_spanish: y Moab vio
  alternatives_spanish:
  - y los moabitas vieron
  - y la gente de Moab vio
  lexicon: HALOT
  rationale: El nombre nacional singular puede funcionar colectivamente en hebreo. Se conserva «Moab» para mantener ese rasgo; la lectura colectiva queda explicada en la nota.
- source_word: מִנֶּגֶד
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - enfrente de ellos
  - del otro lado
  lexicon: HALOT
  rationale: La preposición indica una posición enfrente o de frente. «Frente a ellos» es claro en español y conserva la relación espacial sin introducir una distancia no explícita.
- source_word: אֶת הַמַּיִם אֲדֻמִּים
  english_pob_choice: the water, red
  chosen_spanish: el agua, roja
  alternatives_spanish:
  - el agua, enrojecida
  - el agua, de color rojo
  lexicon: HALOT
  rationale: El hebreo describe el agua como roja. El adjetivo predicativo «roja» transmite la observación inmediata con sencillez y fidelidad.
- source_word: כַּדָּם
  english_pob_choice: like blood
  chosen_spanish: como sangre
  alternatives_spanish:
  - igual que sangre
  - cual sangre
  lexicon: HALOT
  rationale: La partícula comparativa כ introduce una comparación directa. «Como sangre» es la equivalencia natural en español y preserva la imagen vívida del texto.
theological_decisions:
- issue: Uso colectivo de «Moab» como sujeto
  english_pob_reading: The Hebrew uses 'Moab' collectively for the people of Moab.
  chosen_spanish_reading: «Moab» se mantiene como nombre colectivo del pueblo moabita, con una nota que lo explicita.
  alternative_spanish_readings:
  - los moabitas vieron
  - la gente de Moab vio
  rationale: El hebreo usa el topónimo singular con valor colectivo. Mantener «Moab» respeta la forma del original y conserva el estilo nacional del texto; la nota evita ambigüedad para el lector español.
  doctrine_reference: Ninguna; decisión estilística y semántica del texto narrativo.
- issue: Comparación del agua con sangre
  english_pob_reading: red like blood
  chosen_spanish_reading: «roja como sangre» conserva la comparación sin suavizarla.
  alternative_spanish_readings:
  - roja como la sangre
  - de color rojo como sangre
  rationale: El pasaje presenta una comparación intensa y visual. La formulación elegida mantiene la fuerza imagística del hebreo y del POB inglés.
  doctrine_reference: Ninguna; imagen narrativa literal.
translation_notes:
  revision_awareness: 'Se siguió el estado de alta concordancia del audit trail inglés sin necesidad de cambios de revisión; la versión española conserva las decisiones léxicas centrales: sujeto colectivo nacional, verbo de percepción en contexto y comparación visual final. No se registraron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como estándar del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo el nombre colectivo «Moab» para reflejar el hebreo y el audit trail inglés.
  - Se eligió «agua» en singular por naturalidad en español y por corresponder al referente colectivo del texto.
  - 'El orden y la puntuación siguen de cerca la progresión narrativa del hebreo: amanecer, sol, percepción, color, comparación.'
