translation:
  language: es
  text: Danos ayuda contra el adversario[a], porque vana es la salvación del hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la angustia» o «del peligro», si צַר se entiende de manera impersonal como aflicción o angustia, y no personalmente como «adversario» o «enemigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de la humanidad». El hebreo אָדָם aquí tiene sentido genérico y se refiere a la ayuda humana en general.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Give
  chosen_spanish: Danos
  alternatives_spanish:
  - Da
  - Concédenos
  - Otórganos
  lexicon: HALOT
  rationale: En una súplica dirigida a Dios, el imperativo idiomático en español natural es 'danos' / 'concédenos'. 'Danos' conserva la petición directa de la forma hebrea sin sonar artificial.
- source_word: לָּנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: HALOT
  rationale: 'Es el objeto indirecto del ruego; en español se expresa naturalmente con pronombre enclítico: ''danos''.'
- source_word: עֶזְרַת
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - socorro
  lexicon: HALOT
  rationale: '''Ayuda'' comunica bien el valor de עֶזְרָה/עֶזְרַת en lenguaje de oración y mantiene la sencillez poética del paralelismo.'
- source_word: מִצָּר
  english_pob_choice: against the adversary
  chosen_spanish: contra el adversario
  alternatives_spanish:
  - del adversario
  - de la angustia
  - de la aflicción
  - del enemigo
  lexicon: HALOT
  rationale: La raíz צַר puede ser personal ('adversario') o impersonal ('angustia, aflicción'). El contexto militar del salmo favorece la lectura personal; en español 'contra' expresa naturalmente la orientación del pedido de ayuda.
- source_word: וְשָׁוְא
  english_pob_choice: for ... is vain
  chosen_spanish: porque vano es
  alternatives_spanish:
  - y vano es
  - porque es vano
  - y es vano
  lexicon: HALOT
  rationale: שָׁוְא expresa vaciedad, inutilidad o vanidad. 'Porque vano es' mantiene el valor causal implícito del hebreo y su tono solemne.
- source_word: תְּשׁוּעַת
  english_pob_choice: the salvation
  chosen_spanish: el rescate
  alternatives_spanish:
  - la salvación
  - la liberación
  - la victoria
  lexicon: HALOT
  rationale: En este contexto de batalla, 'rescate' comunica el sentido de liberación/auxilio eficaz sin imponer un matiz doctrinal ajeno; conserva la idea de intervención salvadora.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de la humanidad
  - de la gente
  - de los humanos
  lexicon: HALOT
  rationale: אָדָם funciona aquí de manera genérica para la ayuda meramente humana. 'Del hombre' preserva la brevedad poética y la tensión lexical; la nota aclara el alcance genérico.
theological_decisions:
- issue: Lectura de צַר como adversario personal o como angustia/distress
  english_pob_reading: against the adversary
  chosen_spanish_reading: contra el adversario
  alternative_spanish_readings:
  - de la angustia
  - de la aflicción
  - del enemigo
  rationale: La pauta del salmo y el paralelo en el contexto favorecen entender צַר como un oponente personal. La traducción principal conserva esa decisión, mientras la nota mantiene la alternativa impersonal.
  doctrine_reference: POB lexical policy on context-sensitive terms; Psalms parallel usage
- issue: Sentido genérico de אָדָם en una afirmación sobre la insuficiencia de la ayuda humana
  english_pob_reading: man
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de la humanidad
  - de la gente
  - de los humanos
  rationale: Se mantiene el genérico masculino por fidelidad al hebreo y a la concisión poética, sin ocultar en la nota que el sentido incluye la ayuda humana en general.
  doctrine_reference: DOCTRINE.md §Translation philosophy; contested term אָדָם
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene la ambigüedad de צַר con nota léxica y conserva אָדָם en sentido genérico con nota teológica. Esta versión española sigue esas mismas decisiones: mantiene la lectura personal de צַר en el texto principal, pero documenta la alternativa impersonal; conserva el genérico masculino de אָדָם en la línea principal y explica su valor inclusivo en nota.'
  spanish_consistency_notes:
  - Se usó 'ayuda' en lugar de 'auxilio' para un registro bíblico claro y natural.
  - Se evitó 'SEÑOR' porque el hebreo aquí no contiene el tetragrámaton.
  - El orden poético español sigue de cerca el paralelismo hebreo sin forzar calcos innecesarios.
  - Los marcadores de nota se aplican solo donde existe ambigüedad lexical explícita en el audit trail.
