translation:
  language: es
  text: Yo, Yahvé, escruto el corazón y examino los riñones[a], para dar a cada hombre[b] según su camino, según el fruto de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘riñones’, un modismo para lo más profundo de los pensamientos y afectos.'
    reason: cultural_note
  - marker: b
    text: O ‘a cada persona’; el hebreo usa una forma masculina singular con fuerza representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, no como título. ‘Yahvé’ sigue el principio del proyecto de traducir YHWH directamente desde el original.
- source_word: חֹקֵר
  english_pob_choice: search
  chosen_spanish: escruto
  alternatives_spanish:
  - examino
  - investigo
  - sondeo
  lexicon: HALOT
  rationale: El participio expresa una acción continua y penetrante. ‘Escruto’ comunica mejor la inspección minuciosa e interior que ‘examino’ sin perder naturalidad en español.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: ‘Corazón’ es el equivalente bíblico más natural en español para el centro de pensamientos, voluntad y afectos; mantiene la imagen antropológica sin reducirla a un término psicológico moderno.
- source_word: בֹּחֵן
  english_pob_choice: testing
  chosen_spanish: examino
  alternatives_spanish:
  - pruebo
  - verifico
  - sondeo
  lexicon: HALOT
  rationale: Aunque el inglés distingue ‘search’ y ‘testing’, en español un segundo verbo coordinado debe sonar natural y conservar la idea de evaluación. ‘Examino’ transmite la revisión evaluativa de forma clara.
- source_word: כְּלָיוֹת
  english_pob_choice: kidneys
  chosen_spanish: entrañas
  alternatives_spanish:
  - riñones
  - lo más íntimo
  - interior
  lexicon: HALOT
  rationale: El hebreo es literal ‘riñones’, pero en español ‘entrañas’ conserva mejor la función idiomática de sede profunda de la vida interior y afectiva. Se preserva la tensión entre literalidad e inteligibilidad mediante nota.
- source_word: לְאִישׁ
  english_pob_choice: to each man
  chosen_spanish: a cada hombre
  alternatives_spanish:
  - a cada persona
  - a cada uno
  lexicon: HALOT
  rationale: Se mantiene el singular masculino representativo del hebreo, como en el audit trail inglés. ‘A cada hombre’ refleja la forma gramatical y la distribución individual del sentido.
- source_word: כִּדְרָכוֹ
  english_pob_choice: according to his way
  chosen_spanish: según su camino
  alternatives_spanish:
  - conforme a su conducta
  - según sus caminos
  lexicon: HALOT
  rationale: ‘Camino’ reproduce el modismo hebreo de conducta o curso de vida sin explicitarlo en exceso. ‘Según’ mantiene la relación normativa de correspondencia.
- source_word: כִּפְרִי
  english_pob_choice: according to the fruit of
  chosen_spanish: según el fruto de
  alternatives_spanish:
  - conforme al fruto de
  - según los frutos de
  lexicon: HALOT
  rationale: Se conserva la metáfora de ‘fruto’, importante para la relación entre actos y resultado moral. El español admite la frase de modo natural.
- source_word: מַעֲלָלָיו
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus acciones
  - sus hechos
  - sus actos
  lexicon: HALOT
  rationale: ‘Obras’ es idiomático en español bíblico y conserva el peso moral/evaluativo de ‘deeds’. Se evita ‘hechos’ por su menor carga ética en este contexto.
theological_decisions:
- issue: Imagen antropológica del juicio divino
  english_pob_reading: Retain the concrete body-part language 'heart' and 'kidneys' rather than interpret both abstractly.
  chosen_spanish_reading: Mantener ‘corazón’ y ‘entrañas’ como imágenes del interior humano, con nota aclaratoria.
  alternative_spanish_readings:
  - ‘corazón’ y ‘riñones’
  - ‘interior’ y ‘afectos’
  rationale: El verso presenta a Yahvé como el que conoce exhaustivamente la vida interior. ‘Entrañas’ evita una reducción psicológica, pero conserva en español la función idiomática que en hebreo cumple ‘kidneys’.
  doctrine_reference: Poética bíblica y antropología semítica; principio de primacía del idioma original con inteligibilidad en español.
- issue: Forma masculina singular de לְאִישׁ
  english_pob_reading: Use 'each man' in the main text.
  chosen_spanish_reading: Usar ‘a cada hombre’ en el texto principal.
  alternative_spanish_readings:
  - ‘a cada persona’
  - ‘a cada uno’
  rationale: El hebreo usa una forma masculina singular con fuerza representativa; se conserva esa estructura en español y se aclara el sentido distributivo con ‘cada’.
  doctrine_reference: Criterio de exactitud gramatical y auditabilidad del original, sin neutralizar indebidamente el número/género.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado inglés auditado, pero ajusta la dicción para español natural: ‘escruto/examino’ reproduce la pareja verbal, ‘corazón’ conserva la antropología bíblica, y ‘entrañas’ traslada el valor idiomático de כְּלָיוֹת sin borrar la imagen semítica. No se detectan revisiones previas que obliguen a cambios textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se evita ‘Señor’ como sustituto del nombre divino.
  - ‘Corazón’ se usa en sentido bíblico antropológico, no meramente emocional.
  - ‘Obras’ se elige por su carga moral y bíblica en español.
  - La nota sobre ‘entrañas’ conserva la tensión entre literalidad e idiomatización, evitando una traducción mecánica de ‘riñones’.
