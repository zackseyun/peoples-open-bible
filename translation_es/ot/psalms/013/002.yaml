  glossary_alignment: Está alineado con la terminología del proyecto en «Yahvé» y en la conservación de «rostro» en vez de resolverlo dinámicamente como «presencia» en el texto principal. No hay conflicto doctrinal; solo hace falta reparar la ubicación de la nota y suavizar la expresión española final.
