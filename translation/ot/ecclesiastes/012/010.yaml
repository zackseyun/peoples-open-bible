id: ECC.12.10
reference: Ecclesiastes 12:10
source:
  edition: WLC
  text: בִּקֵּ֣שׁ קֹהֶ֔לֶת לִ/מְצֹ֖א דִּבְרֵי חֵ֑פֶץ וְ/כָת֥וּב יֹ֖שֶׁר דִּבְרֵ֥י אֱמֶֽת־׃
translation:
  text: Qoheleth sought to find delightful words[b][a], and to write uprightly words of truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pleasing words.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he wrote uprightly, words of truth.' The Hebrew syntax is compact and allows a slightly different construal.
    reason: alternative_reading
lexical_decisions:
- source_word: בִּקֵּשׁ
  chosen: sought
  alternatives:
  - tried
  - searched
  lexicon: HALOT
  rationale: The verb denotes intentional seeking. 'Sought' preserves the purposeful literary effort of Qoheleth better than the weaker 'tried.'
- source_word: קֹהֶלֶת
  chosen: Qoheleth
  alternatives:
  - the Teacher
  - the Preacher
  lexicon: HALOT
  rationale: Following the philosophy to transliterate names/titles when functioning as a distinctive personal designation, 'Qoheleth' preserves the Hebrew form and avoids prematurely narrowing the term to one interpretive gloss such as 'Teacher' or 'Preacher.'
- source_word: לִמְצֹא
  chosen: to find
  alternatives:
  - to discover
  lexicon: HALOT
  rationale: The infinitive is straightforward; 'to find' is the most direct and natural rendering.
- source_word: דִּבְרֵי חֵפֶץ
  chosen: words of delight
  alternatives:
  - pleasing words
  - delightful sayings
  lexicon: HALOT
  rationale: חֵפֶץ can denote delight, pleasure, or desirability. 'Words of delight' stays close to the Hebrew construct while remaining idiomatic enough in English. 'Pleasing words' is possible but slightly more interpretive.
- source_word: וְכָתוּב
  chosen: and what was written
  alternatives:
  - and written
  - and he wrote
  lexicon: HALOT
  rationale: As a passive participial/adjectival form, it is best rendered impersonally as 'what was written.' This avoids forcing an explicit subject ('he wrote') not present in the form.
- source_word: יֹשֶׁר
  chosen: uprightly
  alternatives:
  - with uprightness
  - correctly
  - plainly
  lexicon: HALOT
  rationale: The noun conveys straightness/uprightness. Rendered adverbially in English, 'uprightly' best modifies the manner of what was written while preserving the ethical and formal sense of rectitude.
- source_word: דִּבְרֵי אֱמֶת
  chosen: words of truth
  alternatives:
  - true words
  - truthful words
  lexicon: HALOT
  rationale: The construct phrase is preserved closely as 'words of truth.' This keeps the Hebrew texture and allows both objective truth-content and truthful character to remain in view.
