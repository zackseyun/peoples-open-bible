id: PSA.104.16
reference: Psalms 104:16
source:
  edition: WLC
  text: יִ֭שְׂבְּעוּ עֲצֵ֣י יְהוָ֑ה אַֽרְזֵ֥י לְ֝בָנ֗וֹן אֲשֶׁ֣ר נָטָֽע׃
translation:
  text: The trees of Yahweh are satisfied[a], the cedars of Lebanon that he planted,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are satisfied' or 'have their fill.' The Hebrew verb conveys being fully supplied or satiated.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂבְּעוּ
  chosen: are filled
  alternatives:
  - are satisfied
  - have their fill
  lexicon: HALOT
  rationale: From שבע in the Qal, here expressing being fully supplied or satiated. In context of God's provision in creation, 'are filled' is natural modern English and conveys abundance without implying conscious satisfaction too strongly.
- source_word: עֲצֵי
  chosen: trees of
  alternatives:
  - woods of
  - trees
  lexicon: HALOT
  rationale: Construct plural of עֵץ, best rendered 'trees of' with the following divine name in construct relationship.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַרְזֵי
  chosen: the cedars of
  alternatives:
  - cedars
  lexicon: HALOT
  rationale: Construct plural of אֶרֶז, referring specifically to cedars; retained explicitly because the second colon appositionally specifies the 'trees of the LORD' as the cedars of Lebanon.
- source_word: לְבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'cedars of Lebanon'; 'that' is idiomatic modern English.
- source_word: נָטָע
  chosen: he planted
  alternatives:
  - he has planted
  lexicon: HALOT
  rationale: Qal perfect 3ms of נטע. The subject is understood from context as God/the LORD. English requires the pronoun for clarity. Simple past fits the poetic description of God's ordering of creation.
