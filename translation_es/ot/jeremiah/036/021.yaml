translation:
  language: es
  text: Entonces el rey envió a Jehudí para tomar el rollo[a], y él lo tomó de la cámara de Elisama[b], el escriba[c]. Y Jehudí lo leyó a oídos[d] del rey y a oídos[d] de todos los oficiales que estaban junto al rey[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ir a buscar el rollo».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «Elishama».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el secretario», en un contexto administrativo real.'
    reason: lexical_alternative
  - marker: d
    text: 'Literalmente: «en los oídos de».'
    reason: lexical_alternative
  - marker: e
    text: 'Literalmente: «que estaban sobre el rey»; es decir, sus asistentes o cortesanos cercanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol de שׁלח en narración se rinde naturalmente como «envió». Es fiel, claro y conserva el movimiento de comisión del rey.
- source_word: יְהוּדִי
  english_pob_choice: Jehudi
  chosen_spanish: Jehudí
  alternatives_spanish:
  - Yehudí
  lexicon: nombre propio
  rationale: Es nombre propio; se translitera al español como «Jehudí» para mantener cercanía formal con el hebreo y coherencia con la práctica de transliteración.
- source_word: לָקַחַת
  english_pob_choice: to get
  chosen_spanish: para tomar
  alternatives_spanish:
  - para traer
  - para ir a buscar
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa la comisión de ir por el rollo. «Tomar» conserva el valor léxico de לקח sin forzar una paráfrasis.
- source_word: הַמְּגִלָּה
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el pergamino
  - el libro
  lexicon: HALOT
  rationale: «מְגִלָּה» designa un escrito enrollado; «rollo» es el equivalente español más directo y transparente. No se eligió «libro» porque suaviza la imagen material del texto.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: he took it
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo fue a buscar
  - lo recogió
  lexicon: HALOT
  rationale: La forma verbal continúa la acción pedida y el sufijo pronominal refiere al rollo. En español, «lo tomó» es natural y mantiene la concreción del acto.
- source_word: מִלִּשְׁכַּת
  english_pob_choice: from the chamber of
  chosen_spanish: de la cámara de
  alternatives_spanish:
  - de la sala de
  - de la oficina de
  lexicon: HALOT
  rationale: «לִשְׁכָּה» en contexto cortesano puede ser un cuarto o cámara administrativa. «Cámara» preserva el tono formal del entorno palaciego sin perder claridad.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  lexicon: nombre propio
  rationale: Nombre propio hebreo transliterado al español. «Elisama» refleja la adaptación habitual hispana y sigue siendo plenamente identificable.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: «סֹפֵר» puede designar a un escriba o secretario real. Aquí se mantiene «escriba» para conservar la forma léxica más transparente; «secretario» queda como alternativa de función administrativa.
- source_word: וַיִּקְרָאֶהָ
  english_pob_choice: read it
  chosen_spanish: lo leyó
  alternatives_spanish:
  - lo proclamó
  - lo leyó en voz alta
  lexicon: HALOT
  rationale: קרא con objeto escrito significa «leer». El contexto público ya implica una lectura audible; en español no es necesario añadir «en voz alta» para no sobredeterminar el original.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a oídos de
  - en el oído de
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «en los oídos de». En español, «en presencia de» comunica adecuadamente el acto de lectura ante oyentes sin sonar artificial.'
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: todos los oficiales
  alternatives_spanish:
  - todos los príncipes
  - todos los ministros
  lexicon: HALOT
  rationale: En este contexto de corte, שָׂרִים son altos funcionarios. «Oficiales» es claro y evita la ambigüedad de «príncipes», que podría sugerir descendencia real.
- source_word: הָעֹמְדִים מֵעַל הַמֶּלֶךְ
  english_pob_choice: standing beside the king
  chosen_spanish: que estaban junto al rey
  alternatives_spanish:
  - que estaban de pie junto al rey
  - que asistían al rey
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los que estaban sobre/junto al rey», una expresión de servicio de corte. «Que estaban junto al rey» transmite la cercanía funcional sin introducir una imagen jerárquica extraña en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide en sustancia con el auditor inglés; se han ajustado las elecciones al español natural, preservando el doble valor de לקח, la imaginería de מְגִלָּה, el sentido cortesano de לִשְׁכָּה y la expresión idiomática de בְּאָזְנֵי / מֵעַל.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto para el Tetragrámaton, pero en este versículo no aparece.
  - Se mantiene la transliteración de nombres propios y títulos de corte conforme al estándar del proyecto.
  - «Escriba» se conserva por transparencia léxica; «secretario» queda anotado como alternativa contextual.
  - «En presencia de» se adopta para una expresión auditiva hebrea que en español sería más literal pero menos natural.
