translation:
  language: es
  text: Ha llegado el tiempo; ha llegado el día. No se alegre el comprador, y no llore el vendedor, porque la ira es contra toda su multitud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su riqueza», si הֲמוֹנָהּ se entiende como abundancia o posesiones en vez de población. El hebreo dice «su multitud», conservando una personificación femenina, probablemente de la ciudad, la tierra o la comunidad bajo juicio.
    reason: combines lexical_alternative and cultural_note at the correct anchor
lexical_decisions:
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - vino
  - ha venido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa que el momento ya ha arribado. En español, «ha llegado» comunica con naturalidad esa presencia inminente ya efectiva, sin perder la fuerza profética.
- source_word: הָעֵת
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - el tiempo señalado
  lexicon: HALOT
  rationale: עֵת puede ser «tiempo» o «momento determinado». «El tiempo» es breve y fiel; en este contexto sugiere el instante decisivo del juicio.
- source_word: הִגִּיעַ
  english_pob_choice: has arrived
  chosen_spanish: ha arribado
  alternatives_spanish:
  - ha llegado
  - ha alcanzado
  lexicon: HALOT
  rationale: Se conserva la idea de haber llegado al punto decisivo. «Ha arribado» refuerza el paralelismo con el verbo anterior sin volverse mecánico.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - la jornada
  lexicon: HALOT
  rationale: Traducción directa y natural; en el contexto se refiere al día del juicio anunciado.
- source_word: הַקּוֹנֶה
  english_pob_choice: the buyer
  chosen_spanish: el comprador
  alternatives_spanish:
  - el que compra
  - el adquirente
  lexicon: HALOT
  rationale: El participio sustantivado se traduce con el sustantivo moderno «comprador», claro y paralelo a «vendedor».
- source_word: אַ ל יִשְׂמָח
  english_pob_choice: let not ... rejoice
  chosen_spanish: No se alegre
  alternatives_spanish:
  - No debe alegrarse
  - No se regocije
  lexicon: HALOT
  rationale: 'La partícula prohibitiva con imperfecto se expresa de forma solemne y natural con una prohibición en tercera persona: «No se alegre».'
- source_word: וְהַמּוֹכֵר
  english_pob_choice: the seller
  chosen_spanish: el vendedor
  alternatives_spanish:
  - el que vende
  - el expendedor
  lexicon: HALOT
  rationale: Simétrico con «el comprador»; «vendedor» es el equivalente idiomático más claro.
- source_word: אַ ל יִתְאַבָּל
  english_pob_choice: let not ... mourn
  chosen_spanish: no llore
  alternatives_spanish:
  - no se lamente
  - no haga duelo
  lexicon: HALOT
  rationale: El verbo puede abarcar lamentación o duelo. En este contexto de pérdida comercial, «llore» mantiene la carga emocional de la pena sin añadir más de lo que el hebreo exige.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición; «porque» es la conexión causal más natural en español.
- source_word: חָרוֹן
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el furor
  - la furia
  lexicon: HALOT
  rationale: El sustantivo designa ira ardiente. «Ira» es la opción más sobria y fiel en español bíblico contemporáneo.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: HALOT
  rationale: En un contexto de juicio, la dirección hostil se comunica mejor con «contra» que con una preposición neutra de movimiento.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: Concuerda con «multitud» en femenino singular y preserva el alcance total del término.
- source_word: הֲמוֹנָהּ
  english_pob_choice: her multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su gente
  - su muchedumbre
  - su riqueza
  lexicon: HALOT
  rationale: Se conserva el sentido colectivo básico de הָמוֹן. En español, «su multitud» deja abierta la personificación femenina sin forzar el antecedente; el posesivo retiene el matiz del sufijo hebreo.
theological_decisions:
- issue: Sufijo femenino en הֲמוֹנָהּ y personificación del sujeto colectivo
  english_pob_reading: Retain the feminine pronoun as 'her multitude' without specifying the antecedent in the main text.
  chosen_spanish_reading: Conservar el posesivo femenino implícito como «su multitud», sin resolver explícitamente si se refiere a ciudad, tierra o comunidad.
  alternative_spanish_readings:
  - su gente
  - la multitud de ella
  - su riqueza
  rationale: El hebreo preserva una personificación femenina. En español, «su multitud» mantiene la referencia colectiva y la ambigüedad respetuosa del original, evitando neutralizar o explicar de más la imagen profética.
  doctrine_reference: Mantener la tensión textual y la personificación del juicio profético; no sobreespecificar el referente.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo final mostró alto grado de acuerdo; por eso se mantiene una solución estable, ajustando solo la formulación española para que suene natural sin perder la personificación y la ambigüedad lexical del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «comprador / vendedor» para preservar el paralelismo léxico.
  - «Ira» se eligió para חָרוֹן por sobriedad y coherencia con el registro profético.
  - Se conservó la referencia femenina implícita en la nota, aunque en el texto principal el posesivo se expresa de forma natural en español.
  - No se usó «SEÑOR» ni terminología eclesiástica que no esté justificada por el hebreo de este versículo.
