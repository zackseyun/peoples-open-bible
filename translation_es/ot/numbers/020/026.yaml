translation:
  language: es
  text: Despoja a Aarón de sus vestiduras[a] y ponlas sobre Eleazar su hijo. Luego Aarón será reunido[b] y morirá allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente en este contexto, «sus vestiduras sacerdotales». El hebreo dice simplemente «sus vestiduras».
    reason: lexical_alternative
  - marker: b
    text: «Será reunido» reproduce un modismo hebreo usado para la muerte; compárese la expresión más completa «reunido con su pueblo» en otros pasajes.
    reason: cross_reference
lexical_decisions:
- source_word: וְהַפְשֵׁט
  english_pob_choice: Strip
  chosen_spanish: Despoja
  alternatives_spanish:
  - Quita
  - Saca
  lexicon: HALOT
  rationale: El hifil imperativo pide retirar la vestidura de Aarón de manera directa. «Despoja» conserva esa fuerza verbal y el tono solemne del mandato mejor que un calco más débil.
- source_word: בְּגָדָיו
  english_pob_choice: his garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestiduras» es adecuado al contexto sacerdotal y mantiene un registro formal. El texto hebreo dice simplemente «sus prendas/vestidos», por lo que la precisión contextual se explica en nota y no se expande en el cuerpo.
- source_word: וְהִלְבַּשְׁתָּם
  english_pob_choice: put them on
  chosen_spanish: vístelas
  alternatives_spanish:
  - ponlas sobre él
  - colócaselas
  lexicon: HALOT
  rationale: El verbo causativo expresa hacer que las prendas sean llevadas por Eleazar. «Vístelas» comunica la transferencia de las vestiduras con naturalidad en español y conserva el objeto pronominal «las».
- source_word: אֶת אֶלְעָזָר בְּנוֹ
  english_pob_choice: Eleazar his son
  chosen_spanish: Eleazar, su hijo
  alternatives_spanish:
  - Eleazar su hijo
  - a Eleazar, su hijo
  lexicon: HALOT
  rationale: Se preserva la relación filial sin alterar el sentido. La coma en español hace clara la aposición y mantiene el orden natural.
- source_word: יֵאָסֵף
  english_pob_choice: will be gathered
  chosen_spanish: será reunido
  alternatives_spanish:
  - será recogido
  - será congregado
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo de muerte sin reemplazarlo por una interpretación explicativa. «Será reunido» mantiene la ambigüedad teológica/literaria que el POB inglés decidió preservar.
- source_word: וּמֵת
  english_pob_choice: and die
  chosen_spanish: y morirá
  alternatives_spanish:
  - y morirá allí
  - y perecerá
  lexicon: HALOT
  rationale: El perfecto con waw continúa la secuencia de futuro/resultativo. «Morirá» es la equivalencia directa y clara en español.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» es natural y formal en español bíblico contemporáneo.
theological_decisions:
- issue: Idiom of death in יֵאָסֵף
  english_pob_reading: Retain 'will be gathered' rather than expand or flatten the idiom.
  chosen_spanish_reading: «Será reunido» se mantiene como giro idiomático, con nota que explicita la relación con la muerte.
  alternative_spanish_readings:
  - será reunido con sus padres
  - será llevado
  - morirá
  rationale: El hebreo usa un idiomático de muerte que no debe resolverse prematuramente. El español conserva la imagen verbal y la nota aclara el sentido sin borrar la tensión del original.
  doctrine_reference: Preservar la tensión lexical y teológica del idiomático bíblico.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó el idiomático para hacer explícita la idea de pertenencia/pueblo («gathered to his people»), pero el hebreo de este versículo solo dice «será reunido»; por eso la traducción española conserva el giro breve y aclara su fuerza en nota, sin añadir palabras que no están en este verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma divina de referencia cuando aparezca, pero en este versículo no está presente.
  - Se emplea «vestiduras» en un contexto sacerdotal, coherente con el registro formal del pasaje.
  - Se conserva «será reunido» para reflejar el idiomático hebreo y evitar una paráfrasis más interpretativa.
