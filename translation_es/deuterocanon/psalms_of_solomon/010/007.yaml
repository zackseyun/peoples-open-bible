translation:
  language: es
  text: Y los piadosos[a][b] darán gracias en la asamblea del pueblo[c], y Dios tendrá misericordia de los pobres en la alegría de Israel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los fieles».
    reason: lexical_alternative
  - marker: b
    text: O «los santos».
    reason: previous_rendering
  - marker: c
    text: O «la congregación del pueblo».
    reason: lexical_alternative
  - marker: d
    text: O «en el regocijo de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσιοι
  english_pob_choice: the pious
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los fieles
  - los santos
  lexicon: LSJ
  rationale: ὅσιοι en este contexto designa al grupo piadoso o leal del pacto, no simplemente «santos» en sentido genérico. «Piadosos» conserva mejor ese matiz sociocomunitario, en línea con la revisión del POB en inglés.
- source_word: ἐξομολογήσονται
  english_pob_choice: will give thanks
  chosen_spanish: darán gracias
  alternatives_spanish:
  - alabarán
  - confesarán
  lexicon: LSJ
  rationale: En uso religioso de la LXX, el verbo expresa con frecuencia acción pública de agradecimiento o alabanza. «Darán gracias» es natural en español y mantiene el sentido litúrgico.
- source_word: ἐκκλησίᾳ λαοῦ
  english_pob_choice: the assembly of the people
  chosen_spanish: la asamblea del pueblo
  alternatives_spanish:
  - la congregación del pueblo
  - la asamblea del pueblo
  lexicon: LSJ
  rationale: La expresión nombra una reunión pública y corporativa. «Asamblea» comunica bien el carácter reunido del pueblo sin introducir vocabulario eclesiástico posterior.
- source_word: πτωχοὺς
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  lexicon: LSJ
  rationale: «Los pobres» es la traducción más directa y conserva la referencia social y material del griego.
- source_word: ἐλεήσει
  english_pob_choice: will have mercy on
  chosen_spanish: tendrá misericordia de
  alternatives_spanish:
  - mostrará compasión a
  - se compadecerá de
  lexicon: LSJ
  rationale: La forma verbal expresa acción misericordiosa de Dios. «Tendrá misericordia de» es una fórmula clara y fiel al peso teológico del verbo.
- source_word: ἐν εὐφροσύνῃ Ἰσραήλ
  english_pob_choice: in the gladness of Israel
  chosen_spanish: en la alegría de Israel
  alternatives_spanish:
  - en el regocijo de Israel
  - en la alegría de Israel
  lexicon: LSJ
  rationale: «εὐφροσύνη» denota alegría, gozo o regocijo. «Alegría» funciona con naturalidad en español y conserva el ambiente festivo comunitario; se evita añadir una paráfrasis más interpretativa.
theological_decisions:
- issue: ὅσιοι como grupo de identidad piadosa del pacto
  english_pob_reading: the pious
  chosen_spanish_reading: los piadosos
  alternative_spanish_readings:
  - los fieles
  - los santos
  rationale: La decisión sigue la revisión del POB que corrige «holy ones» a «pious», porque ὅσιοι aquí describe una colectividad fiel y piadosa, no la santidad en sentido técnico de ἅγιοι. «Piadosos» evita borrar esa tensión sociológica.
  doctrine_reference: Uso semántico de ὅσιοι en el contexto de Psalms of Solomon; distinción léxica frente a ἅγιοι.
- issue: ἐν εὐφροσύνῃ Ἰσραήλ como marco de la misericordia divina
  english_pob_reading: in the gladness of Israel
  chosen_spanish_reading: en la alegría de Israel
  alternative_spanish_readings:
  - en el regocijo de Israel
  - en medio del regocijo de Israel
  rationale: Se mantiene la idea de un marco de gozo comunitario para la acción misericordiosa de Dios, sin convertir la frase en una paráfrasis. La lectura conserva la ambigüedad de si es circunstancia o ambiente celebrativo.
  doctrine_reference: El texto presenta la misericordia divina en un contexto de gozo nacional/comunitario; no requiere armonización doctrinal adicional.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB en inglés: ὅσιοι se rindió como «the pious» tras una corrección desde «the holy ones», y εὐφροσύνῃ se mantuvo como un sustantivo de gozo («gladness») en lugar de una paráfrasis más libre. También se corrigió la duplicación accidental de una cláusula en un pase previo; la forma española se presenta ya limpia y única.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» para θεός/ὁ θεός; aquí corresponde «Dios».
  - Se conserva «piadosos» como término de grupo, coherente con la revisión del POB para ὅσιοι.
  - «Dar gracias» se usa en sentido cultual y público, no como simple cortesía.
  - La puntuación refleja una sola cláusula coordinada con coma antes de la segunda coordinación, conforme al griego.
