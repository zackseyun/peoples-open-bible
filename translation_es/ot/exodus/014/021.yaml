translation:
  language: es
  text: Entonces Moisés extendió su mano sobre el mar, y Yahvé hizo retroceder el mar[a] con un fuerte viento del este[b] toda la noche, e hizo del mar tierra seca[c], y las aguas fueron divididas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo que el mar se retirara»; el verbo hebreo es causativo y puede expresarse más literalmente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con un poderoso viento del este».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «convirtió el mar en tierra seca» o «hizo del mar un suelo seco».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «las aguas fueron separadas» o «las aguas se dividieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  lexicon: HALOT
  rationale: נטה con ‘mano’ expresa el gesto de extenderla o tenderla. ‘Extendió’ es natural en español y conserva la acción física sin añadir matices ajenos al hebreo.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: La construcción posesiva es directa y debe mantenerse en singular.
- source_word: עַל הַיָּם
  english_pob_choice: over the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - hacia el mar
  - encima del mar
  lexicon: HALOT
  rationale: עַל admite ‘sobre/en contra de’. Con el gesto de la mano, ‘sobre el mar’ transmite bien la escena y es idiomático en español.
- source_word: וַיּוֹלֶךְ יְהוָה אֶת הַיָּם
  english_pob_choice: the LORD drove the sea back
  chosen_spanish: hizo retroceder el mar
  alternatives_spanish:
  - causó que el mar se retirara
  - puso en movimiento el mar
  lexicon: HALOT
  rationale: El hifil de הלך es causativo. En español, ‘hizo retroceder’ comunica el efecto de manera fiel y natural, sin describir indebidamente el mecanismo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio proyectual para el Tetragrámaton: ‘Yahvé’ como transliteración española del nombre divino, preservando el nombre personal del pacto y evitando la sustitución por un título.'
- source_word: בְּרוּחַ קָדִים עַזָּה
  english_pob_choice: by a strong east wind
  chosen_spanish: con un fuerte viento del este
  alternatives_spanish:
  - por un fuerte viento del este
  - con un poderoso viento oriental
  lexicon: HALOT
  rationale: Aquí רוּחַ significa viento, no espíritu, por el modificador direccional y la función causal. ‘Del este’ comunica el valor de קָדִים en español moderno; ‘fuerte’ rinde עַזָּה.
- source_word: כָּל הַלַּיְלָה
  english_pob_choice: all night
  chosen_spanish: durante toda la noche
  alternatives_spanish:
  - toda la noche
  - a lo largo de toda la noche
  lexicon: HALOT
  rationale: La frase temporal expresa duración continua; ‘durante toda la noche’ es claro y fiel.
- source_word: וַיָּשֶׂם אֶת הַיָּם לֶחָרָבָה
  english_pob_choice: made the sea dry land
  chosen_spanish: puso el mar en tierra seca
  alternatives_spanish:
  - hizo del mar tierra seca
  - convirtió el mar en tierra seca
  lexicon: HALOT
  rationale: חָרָבָה denota tierra seca. ‘Puso el mar en tierra seca’ conserva el paralelismo y la tensión del hebreo; se mantiene el objeto ‘el mar’ para no suavizar el giro verbal.
- source_word: וַיִּבָּקְעוּ הַמָּיִם
  english_pob_choice: the waters were split
  chosen_spanish: las aguas fueron divididas
  alternatives_spanish:
  - las aguas se partieron
  - las aguas fueron partidas
  lexicon: HALOT
  rationale: בקע en nifal indica separación/escisión de las aguas. ‘Fueron divididas’ preserva el sentido y el tono bíblico, aunque ‘se partieron’ también sería posible en español.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en forma española ‘Yahvé’, conforme al criterio editorial de traducir directamente el Tetragrámaton y no sustituirlo por un título. Esto mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: רוּחַ en contexto de Exodo 14:21
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto sintáctico y narrativo muestra que se trata de viento físico, no de ‘espíritu’ ni de ‘aliento’. La traducción evita la ambigüedad y conserva el medio de la acción divina.
  doctrine_reference: 'Hebreo bíblico: רוּחַ según contexto; HALOT'
- issue: causalidad del verbo הוֹלִיךְ / הלך en hifil
  english_pob_reading: drove the sea back
  chosen_spanish_reading: hizo retroceder el mar
  alternative_spanish_readings:
  - condujo el mar
  - llevó el mar
  rationale: El hifil es causativo. En español, ‘hizo retroceder’ expresa el efecto resultante sin sugerir que el mar actuó autónomamente ni introducir una explicación mecánica extra.
  doctrine_reference: HALOT; sintaxis verbal hebrea
translation_notes:
  revision_awareness: 'La versión española sigue el pasaje con alta concordancia con el texto hebreo y con la auditoría inglesa: mantiene la secuencia narrativa, el valor causativo del hifil en יְהוָה/הוֹלִיךְ, el sentido físico de רוּחַ como viento, la duración de כָּל הַלַּיְלָה y la imagen final de las aguas partidas. No se detectaron revisiones pendientes en el audit trail inglés; por ello no se introducen variantes adicionales más allá de las alternativas lexicográficas normales.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en coherencia con el criterio del proyecto para יְהוָה.
  - Se conserva ‘mar’ para הַיָּם a lo largo del versículo para mantener la repetición enfática del hebreo.
  - Se prefiere ‘fuerte’ para עַזָּה y ‘del este’ para קָדִים por claridad en español latinoamericano.
  - Se evita ‘Espíritu’ porque el contexto exige ‘viento’.
