  anchors ⲡⲉⲧⲕⲉⲗⲉⲩⲉ (“the one who commands”), ⲡⲕⲁⲣⲱϥ (“head”), and ⲙⲛⲧϣⲏⲣⲉ (“offspring”),
  with ‘before’ as a plausible value for ⲉⲗⲗⲱ. The verb ‘brought forth’ represents
  a contextual choice for ⲉⲓⲛⲉ to maintain the birth paradox; if the underlying text
  instead implies mere prior existence, this clause may need revision.
