review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura tripartita del hebreo y preserva los contrastes clave entre hambre, espada enemiga y espada de Yahvé. También mantiene correctamente Yahvé para יְהוָה y el ángel de Yahvé para מַלְאַךְ יְהוָה. Sin embargo, hay varios puntos donde la fidelidad semántica y el español natural pueden mejorarse: ''hambre'' debilita el valor específico de רָעָב en contexto de juicio nacional, ''mira'' no refleja tan bien la fuerza deliberativa de רְאֵה, y la construcción final ''y el ángel de Yahvé destruyendo'' suena fragmentaria en español frente al sentido instrumental/acompañante del hebreo.'
  spanish_quality_summary: 'El texto es comprensible, pero presenta giros poco naturales o menos precisos para un registro bíblico claro: ''ser arrasado delante de tus enemigos'' suena algo duro pero aceptable; ''es decir'' es más explicativo que appositivo-literario; y ''y el ángel de Yahvé destruyendo'' necesita ajuste sintáctico. También la nota al pie a introduce innecesariamente el anglicismo ''famine'' como alternativa española.'
  glossary_alignment: Buena alineación con el glosario del proyecto en 'Yahvé', 'ángel', 'pestilencia' y 'territorio'. Conviene ajustar רָעָב a 'hambre devastadora' o preferiblemente 'hambruna' para reflejar mejor 'famine' en español natural. 'Considera' encaja mejor que 'mira' con la decisión lexical auditada para רְאֵה.
  issues:
  - severity: medium
    issue: '''hambre'' para רָעָב'
    rationale: Aunque no es imposible, 'hambre' en español suele sonar más amplia o subjetiva. En este contexto de juicio nacional, 'hambruna' refleja mejor 'famine' y evita pérdida de especificidad.
  - severity: medium
    issue: Nota a con alternativa 'famine'
    rationale: '''Famine'' no es español y no debe aparecer como alternativa léxica en una nota española. Debe reemplazarse por alternativas españolas reales.'
  - severity: medium
    issue: '''mira'' para רְאֵה'
    rationale: El contexto pide reflexión/decisión, no percepción visual. 'Considera' preserva mejor la fuerza pragmática documentada en el English POB.
  - severity: high
    issue: '''y el ángel de Yahvé destruyendo por todo el territorio de Israel'''
    rationale: La frase resulta sintácticamente incompleta y poco idiomática en español. El hebreo describe la pestilencia en la tierra con el ángel de Yahvé destruyendo por todo Israel; conviene expresarlo con 'con el ángel de Yahvé destruyendo en todo el territorio de Israel'.
  - severity: low
    issue: '''es decir'' para la aposición de דֶבֶר'
    rationale: '''Es decir'' suena más a glosa explicativa. ''esto es'' o una aposición con coma mantiene mejor el tono bíblico-formal y la relación appositiva del original.'
