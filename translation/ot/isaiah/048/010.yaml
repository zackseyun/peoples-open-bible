theological_decisions:
- issue: Meaning of בחרתיך in the refining context
  chosen_reading: rendered as 'I have tested you' rather than 'I have chosen you'
  alternative_readings:
  - I have chosen you
  rationale: The immediate context is metallurgical and disciplinary, not primarily elective. Rendering the verb as 'tested' preserves the verse's imagery and avoids importing a doctrinal emphasis on election that is not foregrounded here. The alternative is lexically possible and worth preserving in a footnote because the consonantal form is commonly associated with 'choose.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
