translation:
  language: es
  text: Pero muchas aflicciones y muchas guerras nos han rodeado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: “muchas aflicciones y muchas guerras nos rodearon”. El presente perfecto español (“han rodeado”) se elige para reflejar la situación continua sugerida por el contexto de la carta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - nosotros
  lexicon: BDAG
  rationale: Pronombre de objeto directo en primera persona del plural; en español la forma átona 'nos' es la más natural y directa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Conserva el valor adversativo del griego y encaja con la transición del contexto anterior.
- source_word: ἐκύκλωσαν
  english_pob_choice: have surrounded
  chosen_spanish: han rodeado
  alternatives_spanish:
  - rodearon
  - han cercado
  - nos han cercado
  lexicon: BDAG
  rationale: El verbo griego significa literalmente 'rodear/cercar'. 'Han rodeado' preserva la idea de acción pasada con resultado vigente en el contexto epistolar, como reflejaba el inglés POB.
- source_word: πολλαὶ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: BDAG
  rationale: Adjetivo cuantificador común; 'muchas' reproduce con naturalidad el énfasis del griego.
- source_word: θλίψεις
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  - tribulaciones y angustias
  lexicon: BDAG
  rationale: θλῖψις expresa presión, aflicción o angustia. 'Aflicciones' mantiene la gravedad sin imponer un matiz técnico posterior que 'tribulaciones' podría sugerir.
- source_word: πόλεμοι πολλοί
  english_pob_choice: many wars
  chosen_spanish: muchas guerras
  alternatives_spanish:
  - numerosas guerras
  - muchos conflictos armados
  lexicon: BDAG
  rationale: πόλεμοι designa guerras o conflictos armados en sentido amplio. 'Guerras' conserva ese alcance y el paralelismo con 'muchas aflicciones'.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada del inglés POB: el griego usa aoristo, pero el contexto epistolar justifica en español un perfecto compuesto que exprese una situación todavía vigente.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre 'muchas aflicciones' y 'muchas guerras' para conservar el ritmo del griego.
  - No se introduce terminología doctrinal ajena; el verso es descriptivo e histórico.
  - Se usa 'Pero' para el valor adversativo de δὲ, siguiendo el audit trail inglés.
