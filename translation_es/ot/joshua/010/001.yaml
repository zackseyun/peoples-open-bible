    text: 'O: «había ocurrido». La fórmula hebrea introduce una nueva escena narrativa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «habían pactado paz con Israel».'
    reason: alternative_reading
  revision_rationale: Se corrigen giros poco idiomáticos sin apartarse del hebreo ni del rastro POB. 'Había capturado' refleja mejor לָכַד en contexto militar; 'habían hecho la paz con Israel' expresa de forma natural הִשְׁלִימוּ; la nota alternativa se rehace en español más claro. Se conserva 'consagrada a la destrucción' por su buen ajuste al valor técnico-teológico de חרם.
