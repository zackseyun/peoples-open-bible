review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo y sigue de cerca las decisiones auditadas del POB en inglés: exclusión arrogante, pretensión de superioridad en santidad y respuesta divina de irritación continua. La nota al pie sobre כִּי קְדַשְׁתִּיךָ preserva adecuadamente las alternativas significativas. La única desalineación notable es la imagen concreta de עָשָׁן בְּאַפִּי, donde el inglés auditado eligió explícitamente ‘nostrils’ y el español principal dice ‘nariz’, que es comprensible pero menos vívido y menos preciso para el plural/concreto implicado por la imagen idiomática.'
  spanish_quality_summary: El texto es claro y natural en español eclesial contemporáneo. Sin embargo, ‘humo en mi nariz’ suena algo menos idiomático y menos gráfico que ‘humo en mis narices’, que además conserva mejor la fuerza de la imagen hebrea y del inglés POB. El resto del versículo está bien formulado y no requiere reparación.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos de glosario especial. ‘santo’ y ‘fuego’ se manejan de forma consistente con la racionalidad teológica documentada.
  issues:
  - severity: medium
    issue: La frase ‘humo en mi nariz’ debilita la imagen concreta escogida por el POB para עָשָׁן בְּאַפִּי.
    rationale: El audit trail inglés justificó preservar la imagen física de ‘smoke in my nostrils’. En español, ‘en mis narices’ comunica mejor esa concreción e irritación continua que ‘en mi nariz’, que suena más plana y singularizada.
  revised_spanish_text: 'los que dicen[a]: «Apártate; no te acerques a mí, porque soy más santo que tú». Estos son humo en mis narices, un fuego que arde todo el día.'
  revised_footnotes:
