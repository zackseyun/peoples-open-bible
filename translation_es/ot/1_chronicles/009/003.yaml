translation:
  language: es
  text: Y en Jerusalén habitaban allí algunos de los hijos de Judá[a], y algunos de los hijos de Benjamín, y algunos de los hijos de Efraín y Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «de los hijos de Judá ... de los hijos de Benjamín ... de los hijos de Efraín y Manasés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִירוּשָׁלִַם
  english_pob_choice: And in Jerusalem
  chosen_spanish: Y en Jerusalén
  alternatives_spanish:
  - Ahora en Jerusalén
  - En Jerusalén
  lexicon: HALOT
  rationale: La conjunción con preposición se conserva de manera natural como enlace narrativo en español. Se mantiene el sentido locativo sin añadir información no presente en el hebreo.
- source_word: יָשְׁבוּ
  english_pob_choice: lived there
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - se establecieron
  - moraban
  lexicon: HALOT
  rationale: ישב expresa residencia o habitación. «Habitaban» comunica de forma digna y natural la idea de vivir/residir, sin forzar un matiz de establecimiento permanente que el verbo por sí solo no exige.
- source_word: מִן
  english_pob_choice: some from
  chosen_spanish: algunos de
  alternatives_spanish:
  - algunos procedentes de
  - algunos entre
  lexicon: HALOT
  rationale: El hebreo repite מִן antes de cada grupo tribal para indicar procedencia parcial. En español, «algunos de» transmite mejor esa pertenencia parcial que un simple «de» en una frase fluida.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los descendientes de Judá
  - los de Judá
  lexicon: HALOT
  rationale: Se conserva el idiomático genealógico/tribal de Chronicles. «Hijos de» refleja de cerca בני sin reemplazarlo por un término más interpretativo.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los descendientes de Benjamín
  - los benjaminitas
  lexicon: HALOT
  rationale: Se mantiene la misma construcción para la coherencia del paralelismo tribal del verso.
- source_word: בְּנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los descendientes de Efraín
  - los efraimitas
  lexicon: HALOT
  rationale: La misma razón de preservación del idiomático tribal y del paralelismo hebreo.
- source_word: וּמְנַשֶּׁה
  english_pob_choice: and Manasseh
  chosen_spanish: y de Manasés
  alternatives_spanish:
  - y Manasés
  - y los hijos de Manasés
  lexicon: HALOT
  rationale: En hebreo se omite repetir בני antes de Manasés. En español, la preposición «de» ayuda a sostener la coordinación con «los hijos de Efraín» y evita que suene abrupta la elipsis, sin inventar una repetición explícita no presente en el texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que suavizó «from the sons of» a «of the sons of» por naturalidad, manteniendo la idea de grupos parciales residentes en Jerusalén. La traducción española conserva ese mismo valor distributivo con «algunos de» y mantiene la estructura tribal repetida del hebreo.
  spanish_consistency_notes:
  - Se usa «hijos de» para בני de manera consistente con el registro genealógico de Crónicas.
  - Se traduce יהודה, בנימין, אפרים y מנשה con las formas españolas usuales Judá, Benjamín, Efraín y Manasés.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - No se añadió un equivalente explícito de «there»; «habitaban» ya sitúa la acción en Jerusalén.
