translation:
  language: es
  text: Y en aquel tiempo les mandé todo lo que debían hacer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todas las palabras' o 'todos los asuntos'; el hebreo דְּבָרִים puede referirse tanto a instrucciones dichas como a asuntos o acciones por cumplir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲצַוֶּה
  english_pob_choice: I commanded
  chosen_spanish: les mandé
  alternatives_spanish:
  - les ordené
  - les di instrucciones
  lexicon: HALOT
  rationale: צוה expresa dar mandatos con autoridad. En español, 'mandé' conserva esa fuerza de mando de forma natural y directa. 'Ordené' también es posible, pero 'mandé' encaja bien con el registro narrativo sin sonar excesivamente militar; 'di instrucciones' suaviza más de lo que permite el hebreo.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - os
  lexicon: Pronombre plural de 2.ª persona
  rationale: El sufijo de segunda persona plural se refleja naturalmente con 'les' dentro de la construcción con objeto indirecto en español. 'A ustedes' sería más explícito, pero menos fluido en esta frase.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal narrativa se vierte mejor como 'en aquel tiempo', que mantiene el valor deíctico y suena idiomático en español bíblico contemporáneo.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todas las palabras
  - todos los asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar 'palabras', 'asuntos' o 'cosas'. Dado que aquí se refiere a instrucciones concretas que debían cumplir, 'todas las cosas' comunica bien el sentido práctico que el inglés POB también privilegió. No se impone 'palabras' en el texto principal porque en español sonaría más abstracto o meramente verbal.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - las cuales
  lexicon: Conjunción relativa
  rationale: '''Que'' es la forma más natural y fiel para introducir la cláusula relativa en español.'
- source_word: תַּעֲשׂוּן
  english_pob_choice: you should do
  chosen_spanish: debían hacer
  alternatives_spanish:
  - habían de hacer
  - deberían hacer
  - tenían que hacer
  lexicon: HALOT
  rationale: El imperfecto en cláusula relativa expresa obligación/expectativa derivada del mandato previo. 'Debían hacer' preserva esa fuerza normativa sin exagerarla. 'Tenían que hacer' puede sonar demasiado coloquial; 'deberían hacer' puede sugerir solo recomendación.
theological_decisions:
- issue: 'El alcance de דְּבָרִים: ''palabras'' versus ''cosas/asuntos'''
  english_pob_reading: all the things / all the words or all the matters
  chosen_spanish_reading: todas las cosas
  alternative_spanish_readings:
  - todas las palabras
  - todos los asuntos
  rationale: El hebreo permite más de una lectura. El contexto apunta a contenidos dados para cumplimiento, no solo a palabras pronunciadas; por eso el texto principal usa 'cosas'. La nota conserva la alternativa 'palabras' para no borrar la tensión lexical.
  doctrine_reference: Lexical semantics; Deuteronomy 1:18
- issue: Fuerza obligatoria del verbo en la cláusula final
  english_pob_reading: that you should do
  chosen_spanish_reading: que debían hacer
  alternative_spanish_readings:
  - que deberían hacer
  - que tenían que hacer
  rationale: El hebreo imperfecto tras un verbo de mandato expresa obligación esperada. 'Debían' transmite mejor esa fuerza en español formal y evita debilitarlo a simple consejo.
  doctrine_reference: Grammar of directive modality; Deuteronomy 1:18
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que pasó de 'were to do' a 'should do' para conservar la obligación en un registro más natural. En español, 'debían hacer' realiza esa misma función modal de forma idiomática. La decisión de 'todas las cosas' mantiene la ambigüedad auditada de דְּבָרִים, que el texto inglés ya señalaba con nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de segunda persona conforme al hebreo.
  - Se preserva el tono narrativo y administrativo del mandato sin añadir intensidad no respaldada por el fuente.
  - La nota al pie usa un solo ancla para la ambigüedad lexical de דְּבָרִים, siguiendo la práctica del POB de conservar alternativas significativas.
