translation:
  language: es
  text: Cuando yo lo desee[a], los disciplinaré[c], y los pueblos se reunirán contra ellos, cuando sean atados por sus dos transgresiones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando así lo desee». La expresión hebrea puede entenderse de modo volitivo o temporal.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «por sus dos iniquidades»; posiblemente, «por su doble culpa». La forma consonántica también ha dado lugar a la lectura alternativa «por sus dos ojos», pero ese sentido encaja menos con el contexto.
    reason: alternative_reading
  - marker: c
    text: 'O: «los corregiré». El verbo puede denotar disciplina correctiva, no solo castigo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאַוָּתִי
  english_pob_choice: When I desire
  chosen_spanish: Cuando yo lo desee
  alternatives_spanish:
  - Al desearlo yo
  - Según mi deseo
  - Cuando sea mi deseo
  lexicon: HALOT
  rationale: La preposición con אַוָּה/אַוָה y sufijo de primera persona expresa la voluntad o deseo divino como circunstancia de la acción. En español, 'Cuando yo lo desee' conserva el matiz volitivo y temporal sin sonar forzado.
- source_word: וְאֶסֳּרֵם
  english_pob_choice: I will discipline them
  chosen_spanish: los disciplinaré
  alternatives_spanish:
  - los castigaré
  - los corregiré
  - los amonestaré
  lexicon: HALOT
  rationale: El verbo יסר suele comunicar disciplina correctiva más que simple castigo. 'Disciplinaré' mantiene esa fuerza y sigue de cerca la opción inglesa documentada.
- source_word: וְאֻסְּפוּ עֲלֵיהֶם עַמִּים
  english_pob_choice: and peoples will be gathered against them
  chosen_spanish: se reunirán contra ellos los pueblos
  alternatives_spanish:
  - se juntarán contra ellos las naciones
  - serán reunidos contra ellos los pueblos
  - los pueblos se congregarán contra ellos
  lexicon: HALOT
  rationale: El pasivo con עמים indica la reunión de pueblos en sentido hostil. 'Se reunirán contra ellos los pueblos' conserva el plural colectivo y la dirección adversarial de עֲלֵיהֶם.
- source_word: בְּאָסְרָם
  english_pob_choice: when they are bound
  chosen_spanish: cuando sean atados
  alternatives_spanish:
  - al ser atados
  - cuando los aten
  - en su ser atados
  lexicon: HALOT
  rationale: Aunque la forma es compacta, el sentido contextual apunta a la acción de ser atados. En español, 'cuando sean atados' expresa con naturalidad el valor temporal y la pasividad implícita.
- source_word: לִשְׁתֵּי עינתם
  english_pob_choice: for their two transgressions
  chosen_spanish: por causa de sus dos transgresiones
  alternatives_spanish:
  - por sus dos iniquidades
  - por su doble culpa
  - a causa de sus dos faltas
  lexicon: HALOT
  rationale: La revisión inglesa reciente prefirió 'transgressions' para hacer más directa la lectura del término final, pero sin borrar la referencia numérica. En español, 'por causa de sus dos transgresiones' preserva el número 'dos' y comunica culpabilidad de manera idiomática.
theological_decisions:
- issue: Sentido del final לִשְׁתֵּי עינתם
  english_pob_reading: for their two transgressions
  chosen_spanish_reading: por causa de sus dos transgresiones
  alternative_spanish_readings:
  - por sus dos iniquidades
  - por su doble culpa
  - por sus dos ojos
  rationale: La forma consonántica admite tensiones interpretativas, pero el contexto de juicio favorece una lectura relacionada con culpa o transgresión. La traducción conserva el número 'dos' y evita resolver en exceso la ambigüedad, manteniendo la primacía del hebreo sobre una armonización doctrinal.
  doctrine_reference: Preservar la tensión lexical del original; no convertir la ambigüedad textual en una explicación doctrinal cerrada.
translation_notes:
  revision_awareness: 'La traducción sigue la lectura inglesa más reciente en el final del versículo (''two transgressions'') en lugar de ''two iniquities'', pero mantiene la estructura, el sentido judicial y la advertencia de ambigüedad del texto hebreo. Se evitó traducir mecánicamente desde el inglés: el valor de בְּאַוָּתִי se leyó como circunstancia volitiva (''Cuando yo lo desee'') y el pasivo con עמים se reprodujo con un orden natural en español.'
  spanish_consistency_notes:
  - Se usa 'disciplinaré' para יסר, conforme al valor correctivo señalado por la POB.
  - Se evita 'SEÑOR' y se mantiene un lenguaje que no requiere ocultar el nombre divino porque este versículo no lo contiene.
  - Se conserva 'pueblos' para עַמִּים, manteniendo el plural colectivo.
  - Se mantiene la referencia numérica 'dos' en el final del verso para no borrar la tensión interpretativa del hebreo.
