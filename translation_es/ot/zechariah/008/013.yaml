translation:
  language: es
  text: Y sucederá que, así como ustedes fueron una maldición entre las naciones[a], casa de Judá y casa de Israel, así yo los salvaré[b], y ustedes serán bendición. No teman; que se fortalezcan sus manos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un objeto de maldición»; es decir, un pueblo cuyo nombre se usaba en fórmulas de maldición entre las naciones.
    reason: lexical_alternative
  - marker: b
    text: O «los libraré». El verbo hebreo puede denotar rescate o salvación en sentido amplio.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «que se fortalezcan sus manos», un modismo hebreo para denotar valentía y acción resuelta.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula introduce un resultado futuro profético. «Sucederá» conserva el valor prospectivo con español natural y digno, sin caer en calco rígido.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: HALOT
  rationale: Expresa la comparación estrecha entre la condición pasada y la reversión prometida.
- source_word: הֱיִיתֶם
  english_pob_choice: you were
  chosen_spanish: ustedes fueron
  alternatives_spanish:
  - ustedes eran
  - ustedes llegaron a ser
  lexicon: HALOT
  rationale: Aquí el perfecto describe un estado previo real; «fueron» comunica bien ese estado sin añadir un matiz inceptivo no exigido por el hebreo.
- source_word: קְלָלָה
  english_pob_choice: a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - un objeto de maldición
  - una fórmula de maldición
  lexicon: HALOT
  rationale: La palabra puede abarcar la idea de ser objeto de imprecación, pero «maldición» es la equivalencia directa y publicable; el matiz alternativo queda sugerido por el contexto y la nota.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en medio de las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: «Entre las naciones» reproduce de forma natural el marco de reputación pública entre los pueblos circundantes.
- source_word: בֵּית יְהוּדָה וּבֵית יִשְׂרָאֵל
  english_pob_choice: O house of Judah and house of Israel
  chosen_spanish: casa de Judá y casa de Israel
  alternatives_spanish:
  - casa de Judá y de Israel
  - Judá e Israel
  lexicon: HALOT
  rationale: Se conserva el lenguaje corporativo de «casa de» como en el original; en español suena bien sin necesidad de una invocación añadida que no esté explícita en el hebreo.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: HALOT
  rationale: Correspondencia directa con la estructura comparativa del verso.
- source_word: אוֹשִׁיעַ
  english_pob_choice: I will save you
  chosen_spanish: yo los salvaré
  alternatives_spanish:
  - yo los libraré
  - yo los rescataré
  lexicon: HALOT
  rationale: «Salvar» conserva el alcance amplio de ישׁע en contexto de restauración de pacto, sin reducirlo a mera liberación política.
- source_word: וִהְיִיתֶם בְּרָכָה
  english_pob_choice: and you shall be a blessing
  chosen_spanish: y ustedes serán bendición
  alternatives_spanish:
  - y serán una bendición
  - y llegarán a ser bendición
  lexicon: HALOT
  rationale: Se mantiene el idioma bíblico de identidad transformada en fuente de bien. En español, «serán bendición» es natural y conserva el eco conceptual de una condición convertida en beneficio para otros.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No os asusten
  lexicon: HALOT
  rationale: Prohibición breve y directa, en registro bíblico claro y contemporáneo.
- source_word: תֶּחֱזַ֥קְנָה יְדֵי/כֶם
  english_pob_choice: let your hands be strong
  chosen_spanish: que se fortalezcan sus manos
  alternatives_spanish:
  - fortalezcan sus manos
  - que sus manos sean fuertes
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de las «manos» como símbolo de valor y acción resuelta. El español permite una construcción natural que no aplana la metáfora.
theological_decisions:
- issue: Alcance de אוֹשִׁיעַ / salvar
  english_pob_reading: I will save you
  chosen_spanish_reading: yo los salvaré
  alternative_spanish_readings:
  - yo los libraré
  rationale: El contexto es restauración del pueblo tras haber sido objeto de maldición entre las naciones. «Salvar» conserva el sentido amplio de rescate y restauración sin forzar una lectura más estrecha de liberación política ni introducir matices soteriológicos ajenos al pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad corporativa de Judá e Israel
  english_pob_reading: O house of Judah and house of Israel
  chosen_spanish_reading: casa de Judá y casa de Israel
  alternative_spanish_readings:
  - Judá e Israel
  rationale: Mantener «casa de» preserva la designación pactal y comunitaria del destinatario. No se reduce a nombres geográficos ni se pierde la resonancia de pertenencia nacional y covenantal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Idioma corporal de «manos fuertes»
  english_pob_reading: let your hands be strong
  chosen_spanish_reading: que se fortalezcan sus manos
  alternative_spanish_readings:
  - que sus manos sean fuertes
  - tomen valor
  rationale: La frase refleja una idiomática hebrea de valentía y acción decidida. La traducción conserva la metáfora corporal en lugar de sustituirla por una equivalencia puramente interpretativa.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El último pase de revisión indicó que no eran necesarios cambios y el cotejo crítico mostró acuerdo alto (1.0). Esta versión sigue ese estado estable, manteniendo las decisiones léxicas y la estructura comparativa del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; aquí no aparece en la superficie del versículo, por lo que no se introduce.
  - «Casa de Judá» y «casa de Israel» conservan el paralelismo del hebreo.
  - Se mantiene el orden comparativo «así como... así...» para reflejar la correspondencia retórica del texto.
  - «Bendición» se deja sin artículo en la segunda cola para reproducir el sustantivo predicativo del hebreo de forma natural en español.
