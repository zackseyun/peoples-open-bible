  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Dios», «roca» y «redentor» están bien. No aparece el nombre divino Yahvé en este versículo. La decisión de traducir אֵל como «Dios» en vez de transliterar «El» está bien alineada con la filosofía POB.'
