    text: O «su familia»; el término hebreo puede denotar un grupo de parentesco más amplio o un clan.
    reason: lexical_alternative
  - marker: b
    text: O «la posesión de sus padres» o «su propiedad ancestral».
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia verbal para reflejar el singular del hebreo, y se restauran las notas léxicas con anclaje correcto. Se mantiene el resto de la redacción porque conserva bien la secuencia y el énfasis restaurativo del texto fuente.
