revisions:
- from: 'Y de la tribu de Isacar: Quisién[a] con sus tierras de pasto[c], y Daberat[b] con sus tierras de pasto[c].'
  to: 'Y de la tribu de Isacar: Kisión[a] con sus tierras de pasto[c], y Daberat[b] con sus tierras de pasto.'
  rationale: Se corrige principalmente la transliteración de קִשְׁיוֹן a 'Kisión', que representa mejor el topónimo hebreo y evita una forma española poco defendible ('Quisién'). Se mantiene 'Daberat' como forma española sobria cercana al hebreo, con nota que documenta la variante 'Daberath' alineada con el rastro auditado. Se conserva 'tierras de pasto' por claridad y naturalidad, afinando su nota léxica.
