translation:
  language: es
  text: Ahora la copa de Faraón estaba en mi mano, y tomé las uvas y las exprimí[a] en la copa de Faraón, y puse la copa en la mano de Faraón[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las prensé en la copa de Faraón». El verbo hebreo se refiere a exprimir o prensar para sacar el líquido.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre la palma/mano de Faraón».
    reason: lexical_alternative
  - marker: c
    text: 'O: «puse la copa en la mano de Faraón».'
    reason: previous_rendering
lexical_decisions:
- source_word: כּוֹס
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - vaso
  - cáliz
  lexicon: HALOT
  rationale: כּוֹס designa un recipiente para beber. En español, «copa» es natural y adecuado para el contexto de corte; «cáliz» sería más litúrgico y menos fiel al registro narrativo.
- source_word: בְּיָדִי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi posesión
  - en mi poder
  lexicon: HALOT
  rationale: La imagen corporal se conserva de forma directa y natural en español. «En mi mano» refleja la vividness del relato onírico sin introducir una abstracción interpretativa.
- source_word: וָאֶקַּח
  english_pob_choice: I took
  chosen_spanish: tomé
  alternatives_spanish:
  - agarré
  - recogí
  lexicon: HALOT
  rationale: לקח en secuencia narrativa se rinde de manera simple como «tomé». Es la opción más directa y equivalente en español.
- source_word: הָעֲנָבִים
  english_pob_choice: the grapes
  chosen_spanish: las uvas
  alternatives_spanish:
  - los racimos
  - las uvas de la vid
  lexicon: HALOT
  rationale: עֲנָבִים se refiere a uvas; el artículo se conserva con naturalidad en español.
- source_word: וָאֶשְׂחַט אֹתָם אֶל כּוֹס פַּרְעֹה
  english_pob_choice: squeezed them into Pharaoh’s cup
  chosen_spanish: las exprimí en la copa de Faraón
  alternatives_spanish:
  - las prensé en la copa de Faraón
  - las estrujé en la copa de Faraón
  lexicon: HALOT
  rationale: שׂחט expresa la acción de exprimir o prensar para sacar líquido. «Exprimí» comunica claramente el sentido con uvas y evita un calco rígido.
- source_word: וָאֶתֵּן
  english_pob_choice: I placed
  chosen_spanish: puse
  alternatives_spanish:
  - coloqué
  - di
  lexicon: HALOT
  rationale: Aunque נתן puede ser «dar», aquí la acción concreta es poner físicamente la copa ante Faraón. «Puse» es la opción más natural y precisa en español.
- source_word: עַל כַּף פַּרְעֹה
  english_pob_choice: into Pharaoh’s hand
  chosen_spanish: en la mano de Faraón
  alternatives_spanish:
  - sobre la palma de Faraón
  - en la palma de Faraón
  lexicon: HALOT
  rationale: כַּף es literalmente «palma». En español, «en la mano de Faraón» transmite el acto de entregar la copa de manera idiomática; la nota preserva la literalidad de «palma/mano».
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene el movimiento secuencial del hebreo y distingue entre «into Pharaoh’s cup» y la colocación final de la copa respecto de Faraón. La versión española conserva esa secuencia: «exprimí en la copa de Faraón» y «puse la copa en la mano de Faraón», sin suavizar la imagen ni perder la tensión idiomática de כַּף.'
  spanish_consistency_notes:
  - Se usa «Faraón» consistentemente para פַּרְעֹה.
  - Se evita «SEÑOR» u otra convención de ocultamiento porque el versículo no contiene el nombre divino.
  - «copa» se mantiene para כּוֹס en lugar de «cáliz», por registro narrativo no litúrgico.
  - La literalidad de כַּף se conserva en nota como «palma/mano», mientras el cuerpo del texto usa una equivalencia idiomática natural.
