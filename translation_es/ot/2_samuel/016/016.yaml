revisions:
- from: 'Y cuando Hushai el arquita[a], amigo de David, llegó a Absalón, Hushai dijo a Absalón: «¡Viva el rey! ¡Viva el rey!»'
  to: 'Y cuando Husai el arquita llegó a Absalón, Husai dijo a Absalón: «¡Viva[a] el rey! ¡Viva el rey!»'
