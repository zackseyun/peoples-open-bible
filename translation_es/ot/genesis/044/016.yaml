translation:
  language: es
  text: 'Y Judá dijo[a]: «¿Qué diremos a mi señor? ¿Qué hablaremos? ¿O cómo nos justificaremos? Dios ha hallado la culpa[b] de tus siervos[c]. Aquí estamos, esclavos de mi señor, tanto nosotros como aquel en cuya mano fue hallada la copa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo podemos justificarnos?» El verbo hebreo puede significar mostrar que uno está en lo justo o justificarse.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha descubierto la iniquidad». El hebreo también puede expresar que Dios ha sacado a la luz la falta.'
    reason: lexical_alternative
  - marker: c
    text: La primera designación es una autodenominación deferencial ante un superior; «esclavos» después en el versículo expresa el estado de servidumbre que los hermanos se ofrecen a aceptar.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi amo
  - a mi maestro
  lexicon: HALOT
  rationale: אָדוֹן aquí se refiere a José en posición de autoridad, no al título divino. «Mi señor» conserva el tono respetuoso y cortesano mejor que «señor» a secas; «amo» es posible pero más duro y menos natural en este diálogo.
- source_word: נֹּאמַר
  english_pob_choice: What shall we say
  chosen_spanish: ¿Qué diremos?
  alternatives_spanish:
  - ¿Qué podremos decir?
  - ¿Qué hemos de decir?
  lexicon: HALOT
  rationale: El imperfecto en esta secuencia retórica expresa la imposibilidad de responder. «¿Qué diremos?» mantiene la pregunta directa sin sobrerrepresentar modales que el español no exige.
- source_word: נְּדַבֵּר
  english_pob_choice: What shall we speak
  chosen_spanish: ¿Qué hablaremos?
  alternatives_spanish:
  - ¿Qué diremos?
  - ¿Qué podremos hablar?
  lexicon: HALOT
  rationale: דִּבֵּר añade la idea de hablar o presentar un caso. En español, «hablar» conserva la distinción con el verbo anterior y reproduce la escalada retórica sin recargar el verso.
- source_word: נִּצְטַדָּק
  english_pob_choice: justify ourselves
  chosen_spanish: nos justificaremos
  alternatives_spanish:
  - nos pondremos en claro
  - nos declararemos justos
  lexicon: HALOT
  rationale: El hitpael de צדק significa mostrarse en lo justo o justificarse. «Nos justificaremos» es la correspondencia más directa; «ponernos en claro» es más interpretativo y «declararnos justos» suena más jurídico de lo que el contexto exige.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - los dioses
  lexicon: HALOT
  rationale: En boca de Judá, el referente es claramente el Dios único. «Dios» es natural y fiel; no hace falta «el Dios» en español.
- source_word: מָצָא אֶת עֲוֺן
  english_pob_choice: has found out the guilt
  chosen_spanish: ha hallado la culpa
  alternatives_spanish:
  - ha descubierto la culpa
  - ha sacado a la luz la iniquidad
  - ha hallado la iniquidad
  lexicon: HALOT
  rationale: El hebreo expresa tanto hallazgo como exposición de una falta antes oculta. «Ha hallado la culpa» conserva la brevedad del original y el reconocimiento de culpabilidad; «descubierto» o «sacado a la luz» explicitan más la idea de revelación.
- source_word: עֲוֺן
  english_pob_choice: guilt
  chosen_spanish: culpa
  alternatives_spanish:
  - iniquidad
  - maldad
  - pecado
  lexicon: HALOT
  rationale: עָוֹן puede referirse a culpa, iniquidad o consecuencia de la culpa. Aquí Judá confiesa responsabilidad; «culpa» comunica bien ese peso sin introducir un matiz más técnico que el contexto no requiere.
- source_word: עֲבָדֶיךָ / עֲבָדִים
  english_pob_choice: your servants / slaves
  chosen_spanish: tus esclavos / esclavos
  alternatives_spanish:
  - tus siervos / siervos
  - tus servidores / esclavos
  lexicon: HALOT
  rationale: La primera ocurrencia es una autodenominación reverente, pero la segunda declara un estado de sujeción. En español, mantener «esclavos» en ambas posiciones preserva la fuerza lexical documentada por la POB y evita diluir el contraste entre deferencia y entrega a servidumbre.
- source_word: הִנֶּנּוּ
  english_pob_choice: Here we are
  chosen_spanish: Aquí estamos
  alternatives_spanish:
  - He aquí que estamos
  - Míranos aquí
  lexicon: HALOT
  rationale: La partícula presentacional introduce su rendición y disponibilidad. «Aquí estamos» suena natural en español y conserva la fuerza de presentarse ante la autoridad.
- source_word: גַּם אֲנַחְנוּ גַּם אֲשֶׁר נִמְצָא הַגָּבִיעַ בְּיָדוֹ
  english_pob_choice: both we and the one in whose hand the cup was found
  chosen_spanish: tanto nosotros como aquel en cuya mano fue hallada la copa
  alternatives_spanish:
  - nosotros también, y también aquel en cuya mano se halló la copa
  - tanto nosotros como el que tenía la copa en su mano
  lexicon: HALOT
  rationale: La doble partícula גַּם incluye al grupo y al individuo afectado. «Tanto nosotros como aquel en cuya mano fue hallada la copa» mantiene la estructura inclusiva y la construcción forense de «en cuya mano»; «hallada» conserva el pasivo del hebreo.
- source_word: הַגָּבִיעַ
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  - la copa de bebida
  lexicon: HALOT
  rationale: «Copa» es el equivalente moderno más natural; «cáliz» suena demasiado litúrgico y «copa de bebida» recarga innecesariamente el texto.
theological_decisions:
- issue: Referencia de אֱלֹהִים en la confesión de Judá
  english_pob_reading: Judah attributes the exposure of their guilt to God himself.
  chosen_spanish_reading: Judá atribuye a Dios mismo el haber sacado a luz su culpa.
  alternative_spanish_readings:
  - Judá atribuye a una fuerza divina genérica la exposición de su culpa.
  - Judá usa «Dios» solo como exclamación religiosa sin referencia concreta.
  rationale: En Génesis, la confesión de Judá presupone al Dios único actuando en juicio y revelación. No conviene rebajar la referencia a una divinidad indeterminada ni vaciarla de contenido teológico.
  doctrine_reference: Monoteísmo bíblico en Génesis; providencia y revelación moral.
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo y el audit trail inglés con alta concordancia: conserva la triple serie retórica («qué diremos / qué hablaremos / cómo nos justificaremos»), el contraste entre deferencia y esclavitud, y la confesión de que Dios ha expuesto la culpa. Se evita suavizar δοῦλος/‘esclavos’ o convertir el pasivo final en una formulación más libre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí el texto usa אֱלֹהִים y por eso corresponde «Dios».
  - Se preserva «esclavos» por la fuerza lexical del hebreo y por coherencia con el audit trail inglés.
  - Se mantiene «copa» y no «cáliz» para evitar una tonalidad litúrgica ajena al contexto narrativo.
  - Las preguntas retóricas se mantienen en paralelo para reflejar el ritmo del hebreo.
