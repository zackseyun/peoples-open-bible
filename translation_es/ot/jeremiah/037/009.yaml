translation:
  language: es
  text: 'Así dice Yahvé: No se engañen[a], diciendo[c]: «Los caldeos seguramente se irán[b] de entre nosotros», porque no se irán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No se hagan ilusiones» o «No se engañen a sí mismos». El hebreo usa un giro idiomático con «alma/vida» que aquí advierte contra el autoengaño o la falsa seguridad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ciertamente se irán». El hebreo usa un infinitivo absoluto con el verbo finito para intensificar la afirmación.'
    reason: lexical_alternative
  - marker: c
    text: «Caldeos» es el término del hebreo; se refiere a las fuerzas babilónicas.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Señor
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética estándar se conserva de modo natural en español con «Así dice». Se mantiene «Yahvé» como equivalente doctrinal del Tetragrámaton, siguiendo el criterio del proyecto de no ocultar el nombre divino.
- source_word: אַל תַּשִּׁיאוּ נַפְשֹׁתֵיכֶם
  english_pob_choice: Do not deceive yourselves
  chosen_spanish: No se engañen a ustedes mismos
  alternatives_spanish:
  - No se engañen
  - No se ilusionen a ustedes mismos
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático con «alma/vida» que en este contexto expresa autoengaño o falsa seguridad. En español, «engañarse a sí mismos» comunica esa fuerza sin volverlo literal de manera opaca.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: Introduce el contenido de la advertencia. «Diciendo» reproduce de forma directa y natural la relación sintáctica con la prohibición.
- source_word: הָלֹךְ יֵלְכ֥וּ
  english_pob_choice: will surely go away
  chosen_spanish: se irán seguramente
  alternatives_spanish:
  - ciertamente se irán
  - se irán de veras
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. «Se irán seguramente» conserva esa énfasis sin perder naturalidad en español.
- source_word: מֵעָלֵינוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de encima de nosotros
  - se apartarán de nosotros
  lexicon: HALOT
  rationale: En este contexto militar, la idea es retirada o alejamiento. «De nosotros» mantiene brevedad y corresponde al valor idiomático que el audit trail inglés resolvió como «from us».
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo histórico del hebreo. «Caldeos» sigue de cerca la designación original y mantiene la terminología usada en Jeremías.
- source_word: כִּי לֹא יֵלֵכוּ
  english_pob_choice: for they will not go away
  chosen_spanish: porque no se irán
  alternatives_spanish:
  - porque no se irán de aquí
  - pues no se irán
  lexicon: HALOT
  rationale: «Porque» expresa la razón de la prohibición. Se repite «irán/se irán» para reflejar la respuesta enfática al verbo anterior, como hace el inglés.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto de transliterar el Nombre divino en vez de sustituirlo por un título. «Yahvé» es la forma española establecida para ese uso dentro de este trabajo.
  doctrine_reference: Tetragrammaton / nombre divino
- issue: 'Valor de la advertencia: autoengaño o falsa confianza'
  english_pob_reading: Do not deceive yourselves
  chosen_spanish_reading: No se engañen a ustedes mismos
  alternative_spanish_readings:
  - No se deludan a sí mismos
  - No se hagan ilusiones
  rationale: El texto denuncia una falsa seguridad respecto al desenlace político-militar. «Engañarse a sí mismos» preserva la fuerza moral de la advertencia sin reducirla a una simple falta de información.
  doctrine_reference: Lectura contextual del hebreo idiomático
- issue: Identificación histórica de הַכַּשְׂדִּים
  english_pob_reading: the Chaldeans
  chosen_spanish_reading: los caldeos
  alternative_spanish_readings:
  - los babilonios
  rationale: No se suaviza el término histórico del hebreo. «Caldeos» mantiene la referencia a la fuerza imperial presente en el relato, tal como el audit trail inglés decidió conservarla.
  doctrine_reference: Contexto histórico de Jeremías
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y conserva las decisiones auditadas del inglés POB: fórmula profética, imperativo de no autoengaño, intensificación verbal y etnónimo histórico. Se ajustó el orden y la preposición para que el español resulte natural sin perder la fuerza del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se usa «caldeos» y no «babilonios» en el texto principal, con aclaración cultural en nota.
  - La intensificación del hebreo se refleja con «seguramente».
  - La advertencia se expresa como autoengaño, no como lectura literal de «alma».
