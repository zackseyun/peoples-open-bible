  to: Y antes de que pasaran cincuenta días[a], sus dos hijos lo mataron y huyeron a los montes de Ararat. Y Sacherdonos, su hijo, reinó en su lugar, y nombró a Achiacharos, hijo de Anael, sobrino mío[b], sobre todas las cuentas de su reino y sobre toda la administración.
