translation:
  language: es
  text: Pero tú, Belén Efrata, demasiado pequeña para estar entre los clanes de Judá[a], de ti saldrá para mí uno que será gobernante en Israel, cuyos orígenes son desde antiguo[b], desde los días de la eternidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "pequeña entre los millares de Judá"; literalmente, "pequeña entre los millares de Judá".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "cuyos orígenes son de tiempos antiguos, de días de antaño". El hebreo también puede entenderse en un sentido más fuerte, como existencia "desde la eternidad".'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּית לֶחֶם אֶפְרָתָה
  english_pob_choice: Bethlehem Ephrathah
  chosen_spanish: Belén Efrata
  alternatives_spanish:
  - Belén de Efrata
  - Belén Efratá
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico con el identificador Efrata para distinguir esta Belén de otras posibles referencias. 'Efrata' es una forma española natural y transparente del epíteto hebreo, sin perder la especificidad profética.
- source_word: צָעִיר לִהְיוֹת בְּאַלְפֵי יְהוּדָה
  english_pob_choice: too small to be among the clans of Judah
  chosen_spanish: demasiado pequeña para estar entre los clanes de Judá
  alternatives_spanish:
  - muy pequeña para estar entre los clanes de Judá
  - pequeña entre los millares de Judá
  lexicon: HALOT
  rationale: '''צָעִיר'' expresa pequeñez o insignificancia; ''demasiado pequeña para estar entre'' refleja bien la construcción infinitiva de ''לִהְיוֹת'' y el sentido relacional. ''Clanes'' comunica el valor sociopolítico de ''אַלְפֵי'' en este contexto mejor que un calco con ''millares''.'
- source_word: מִמְּךָ לִי יֵצֵא
  english_pob_choice: from you one will come out for me
  chosen_spanish: de ti saldrá para mí uno
  alternatives_spanish:
  - de ti saldrá para mí alguien
  - de ti saldrá para mí uno que vendrá
  lexicon: HALOT
  rationale: '''Yatza'' se expresa con ''saldrá'', un verbo natural en español que mantiene la imagen de procedencia. ''Para mí'' conserva ''לִי'' como comisión o relación con Yahvé sin añadir interpretaciones ajenas al texto.'
- source_word: לִהְיֹות מוֹשֵׁל בְּיִשְׂרָאֵל
  english_pob_choice: to be ruler in Israel
  chosen_spanish: que será gobernante en Israel
  alternatives_spanish:
  - para ser gobernante en Israel
  - que gobernará en Israel
  lexicon: HALOT
  rationale: '''מוֹשֵׁל'' es un término de gobierno/régimen; ''gobernante'' conserva el matiz de autoridad más directamente que opciones más litúrgicas. Se mantiene ''en Israel'' siguiendo el hebreo con naturalidad española.'
- source_word: מוֹצָאֹתָיו
  english_pob_choice: whose origins are from of old
  chosen_spanish: sus orígenes
  alternatives_spanish:
  - sus salidas
  - sus procedencias
  - sus orígenes
  lexicon: HALOT
  rationale: El sustantivo puede aludir a 'salidas', 'procedencia' u 'origen'. En español, 'orígenes' comunica el campo semántico de manera clara y reconocible, mientras se preserva la tensión interpretativa del hebreo con la nota correspondiente.
- source_word: מִקֶּדֶם
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde antaño
  - desde tiempos antiguos
  lexicon: HALOT
  rationale: En contextos temporales, 'קדם' apunta a antigüedad o anterioridad. 'Desde antiguo' es una fórmula sobria y bíblica en español, cercana a la del inglés POB sin empujar todavía a una afirmación metafísica explícita.
- source_word: מִימֵי עוֹלָם
  english_pob_choice: from the days of eternity
  chosen_spanish: desde los días de la eternidad
  alternatives_spanish:
  - desde días de eternidad
  - desde los días eternos
  - desde la eternidad
  lexicon: HALOT
  rationale: '''עוֹלָם'' puede abarcar antigüedad prolongada o eternidad. ''De la eternidad'' preserva la fuerza teológica del hebreo y la tensión del pasaje, sin cerrar el debate entre antigüedad extrema y preexistencia eterna.'
theological_decisions:
- issue: Si la cláusula final debe afirmar preexistencia eterna o solo un origen antiguo
  english_pob_reading: whose origins are from of old, from the days of eternity
  chosen_spanish_reading: sus orígenes son desde antiguo, desde los días de la eternidad
  alternative_spanish_readings:
  - sus orígenes son de tiempos antiguos, de días de antaño
  - su origen es desde antiguo, desde la eternidad
  rationale: El hebreo permite tanto un sentido de origen antiguo como una lectura más fuerte en dirección a la eternidad. La redacción española preserva esa tensión sin resolverla artificialmente, manteniendo auditable la posibilidad de una lectura cristológica tradicional y, al mismo tiempo, sin exceder con certeza lo que el hebreo expresa de forma explícita.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó la idea de ''small among'' a ''too small to be among'' y prefirió ''origins'' para מוֹצָאֹתָיו. Esta traducción española refleja ambos cambios: expresa la insuficiencia con ''demasiado pequeña para estar entre'' y usa ''orígenes'' para conservar la naturalidad sin perder la ambigüedad interpretativa del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo en la función semántica de 'para mí' sin sustituir el texto hebreo por una forma reverencial distinta.
  - '''Judá'' se conserva como nombre propio bíblico estándar.'
  - Se evita 'Cristo' porque el texto hebreo habla de un gobernante/más bien 'gobernante' y la identificación mesiánica queda para el contexto interpretativo.
  - '''Días de la eternidad'' preserva la tensión semántica y no se colapsa a una sola solución doctrinal.'
