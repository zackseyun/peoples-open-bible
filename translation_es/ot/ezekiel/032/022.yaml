translation:
  language: es
  text: Allí está Asiria y toda su asamblea[a], sus tumbas alrededor de ella; todos ellos, muertos, caídos por la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo cambia de género/personificación: «Asiria» y «toda su asamblea» llevan forma femenina, pero las expresiones correspondientes a «sus tumbas» y «alrededor de ella/él» aparecen con sufijos masculinos. El español principal no marca ese cambio porque sonaría forzado, pero la nota lo conserva como dato del texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There is
  chosen_spanish: Allí está
  alternatives_spanish:
  - Allí hay
  - Allí se halla
  lexicon: HALOT
  rationale: El adverbio locativo introduce una escena ya situada; «Allí está» transmite presencia y ubicación sin endurecer el español.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assur
  lexicon: HALOT
  rationale: Se trata del nombre nacional/personificado del imperio; «Asiria» es la forma española estándar y clara.
- source_word: וְכָל־קְהָלָהּ
  english_pob_choice: and all her assembly
  chosen_spanish: y toda su asamblea
  alternatives_spanish:
  - y toda su congregación
  - y toda su multitud
  lexicon: HALOT
  rationale: קהל denota un grupo reunido; «asamblea» conserva el sentido colectivo. El sufijo femenino se mantiene con «su» porque Asiria está personificada como femenina.
- source_word: סְבִיבוֹתָיו
  english_pob_choice: all around him
  chosen_spanish: alrededor de ella
  alternatives_spanish:
  - en torno a ella
  - todo alrededor de ella
  lexicon: HALOT
  rationale: La forma plural funciona locativamente. Sigo la lectura revisada del POB en cuanto a la coherencia del referente femenino en esta cláusula, expresándolo en español con «de ella».
- source_word: קִבְרֹתָיו
  english_pob_choice: his graves
  chosen_spanish: sus tumbas
  alternatives_spanish:
  - sus sepulcros
  - sus sepulturas
  lexicon: HALOT
  rationale: «Tumbas» es un equivalente natural y directo de קברים. Se usa «sus» sin forzar el género de la posesión, porque el español puede conservar la referencia personificada sin marcar el cambio morfológico del hebreo de forma artificial.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: HALOT
  rationale: Pronombre resumptive que abarca el conjunto entero; «todos ellos» es explícito y fluido en español.
- source_word: חֲלָלִים
  english_pob_choice: slain
  chosen_spanish: muertos
  alternatives_spanish:
  - caídos
  - asesinados
  lexicon: HALOT
  rationale: En el contexto bélico, el término se refiere a los caídos por violencia; «muertos» es más amplio, pero aquí queda especificado por la cláusula final «por la espada».
- source_word: הַנֹּפְלִים
  english_pob_choice: fallen
  chosen_spanish: caídos
  alternatives_spanish:
  - los que caen
  - los caídos
  lexicon: HALOT
  rationale: El participio retiene el matiz de quienes han caído en combate. «Caídos» preserva el registro profético y la paralela con «muertos».
- source_word: בֶּחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a espada
  - a causa de la espada
  lexicon: HALOT
  rationale: La preposición hebrea expresa medio o instrumento. «Por la espada» es la forma española más natural y fiel para muerte en guerra.
theological_decisions:
- issue: Persona gramatical y personificación de Asiria
  english_pob_reading: The English POB preserves the feminine personification of Assyria in 'her assembly' and 'her graves all around her,' while noting the Hebrew gender/person shifts.
  chosen_spanish_reading: 'La traducción mantiene a Asiria como entidad personificada femenina: «su asamblea», «alrededor de ella», «sus tumbas».'
  alternative_spanish_readings:
  - «su asamblea, sus tumbas alrededor de él»
  - «su asamblea, sus tumbas a su alrededor»
  rationale: El hebreo presenta una mezcla de formas femeninas y masculinas por personificación; en español, forzar el cambio a masculino oscurecería la referencia principal y la revisión del POB. Se preserva la coherencia femenina en la línea principal.
  doctrine_reference: No doctrinal issue; literary/personification consistency in prophetic judgment oracle.
translation_notes:
  revision_awareness: La versión inglesa fue revisada para uniformar los pronombres con el referente femenino «Assyria»; esta propuesta sigue esa revisión, pero adapta la posesión y la ubicación con una solución natural en español, sin intentar reproducir artificialmente la oscilación morfológica del hebreo en cada palabra.
  spanish_consistency_notes:
  - Se usa «Asiria» para el nombre propio nacional, no «Assur», por claridad y uso español habitual.
  - Se mantiene «espada» como instrumento de muerte bélica, coherente con el registro profético.
  - La asamblea/grupo reunido se traduce como «asamblea» para conservar el valor colectivo.
  - Se evita «SEÑOR» u otra sustitución teológica porque el verso no contiene el Tetragrámaton.
  - «Caídos por la espada» queda implícito dentro de la clausula final; no se añade glosa interpretativa adicional.
