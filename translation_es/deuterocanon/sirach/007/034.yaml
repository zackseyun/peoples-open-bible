translation:
  language: es
  text: Da un regalo delante de toda persona viva[a], y no retengas la bondad ni aun de los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «No faltes a los que lloran, y llora con los que lloran». Esto refleja una tradición textual sustancialmente distinta para este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: μὴ ὑστέρει ἀπὸ κλαιόντων
  english_pob_choice: Do not fail those who weep
  chosen_spanish: No seas indiferente ante los que lloran
  alternatives_spanish:
  - No faltes a los que lloran
  - No te retrases respecto de los que lloran
  lexicon: LSJ; contexto sapiencial de imperativo negativo
  rationale: El griego pide no quedar atrás ni fallar frente a los que lloran. En español, ‘no seas indiferente ante’ comunica mejor la falta de respuesta solidaria que un calco rígido de ‘no faltes’, que podría sonar vago o demasiado coloquial.
- source_word: πενθούντων / πένθησον
  english_pob_choice: mourn with those who mourn
  chosen_spanish: con los que están de duelo, duele también
  alternatives_spanish:
  - llora con los que lloran
  - guarda duelo con los que están de duelo
  lexicon: LSJ; paralelismo poético griego
  rationale: 'El verbo griego expresa el acto de lamentar/guardar duelo. Se eligió una formulación natural que preserve el paralelo: estar de duelo y acompañar ese duelo. ‘Duele también’ refleja la exhortación a compartir el luto, sin convertirlo en una paráfrasis libre del sentido.'
theological_decisions:
- issue: Prioridad textual entre el hebreo conservado y el paralelo griego divergente
  english_pob_reading: 'Translate the extant Hebrew as the primary text for this verse; the Greek reads: ''Do not fail those who weep, and mourn with those who mourn.'''
  chosen_spanish_reading: Se traduce el hebreo conservado como texto principal, pero se señala el testimonio griego divergente en nota.
  alternative_spanish_readings:
  - Da un regalo delante de todo ser viviente, y no niegues bondad ni a los muertos.
  - No seas indiferente ante los que lloran, y con los que están de duelo, duele también.
  rationale: La política del proyecto para Sirácides da primacía al hebreo cuando está disponible. Aquí el griego no es una simple variante léxica, sino una tradición textual sustancialmente distinta; por eso se consigna como nota textual sin reemplazar el texto hebreo de base.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo cuando se conserva; el griego paralelo informa la historia textual.'
translation_notes:
  revision_awareness: La redacción española sigue el testimonio griego de Sir 7:34, mientras que el expediente auditado conserva también una lectura hebrea completamente distinta (‘Da un regalo delante de todo ser viviente, y no niegues bondad ni a los muertos’). Dado que el paquete fuente presenta un desajuste textual mayor, la nota mantiene visible esa tensión en vez de armonizarla artificialmente.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ y no hay mención del tetragrámaton en este versículo.
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - La nota al pie preserva la divergencia textual relevante y no la reduce a una mera equivalencia léxica.
