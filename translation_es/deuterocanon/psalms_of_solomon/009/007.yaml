revisions:
- from: Nuestros hechos están dentro de la elección y el poder de nuestra alma[a], para hacer justicia[b] y maldad, con las obras de nuestras manos[c].
  to: Nuestras obras están dentro de la elección y el poder de nuestra alma[a], de hacer justicia[b] e injusticia, con las obras de nuestras manos[c].
  rationale: Se cambió 'hechos' por 'obras' para una correspondencia más natural con ἔργα; 'maldad' por 'injusticia' para preservar el contraste directo con 'justicia' que exige δικαιοσύνην / ἀδικίαν y seguir la trayectoria auditada; y 'para hacer' por 'de hacer' para evitar un matiz de propósito demasiado fuerte y mantener una relación más neutral con el infinitivo griego.
