base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/026/017.yaml
  text: Today you have declared Yahweh to be your God[a], and that you will walk in his ways, keep his statutes, his commandments, and his judgments[c][b], and obey his voice.
  footnotes:
  - marker: a
    text: Or 'this day.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here is unusual and can be rendered more formally as 'have affirmed' or archaically 'have avouched.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and obey his voice'; the Hebrew literally says 'and listen to his voice,' with an obedience nuance in context.
    reason: lexical_alternative
