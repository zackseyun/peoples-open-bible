translation:
  language: es
  text: Cuando llegaron allí, a la colina[a], he aquí que un grupo de profetas vino a su encuentro, y el Espíritu de Dios irrumpió sobre él, y profetizó entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Guibeá». La forma hebrea puede leerse como nombre de lugar o como «a la colina».
    reason: alternative_reading
lexical_decisions:
- source_word: הַגִּבְעָתָה
  english_pob_choice: to the hill
  chosen_spanish: a la colina
  alternatives_spanish:
  - a Gueba
  - a la colina/Gueba
  - a la altura
  lexicon: HALOT
  rationale: La forma hebrea admite lectura como nombre de lugar o como sustantivo común con valor direccional. En español, 'colina' conserva el sentido común de גבעה y suena natural; la nota mantiene abierta la alternativa toponímica sin forzarla.
- source_word: חֶבֶל נְבִאִים
  english_pob_choice: a band of prophets
  chosen_spanish: un grupo de profetas
  alternatives_spanish:
  - una banda de profetas
  - una compañía de profetas
  lexicon: HALOT
  rationale: חבל aquí designa una agrupación, no una cuerda. 'Grupo' comunica bien la idea en español contemporáneo; 'banda' sería posible, pero puede sonar menos natural o sugerir matiz distinto.
- source_word: לִקְרָאתוֹ
  english_pob_choice: came to meet him
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - fue hacia él para encontrarlo
  - vino a encontrarlo
  lexicon: HALOT
  rationale: La construcción expresa movimiento orientado al encuentro. 'Salió a su encuentro' es idiomático en español y conserva el valor de reunión intencional con él.
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - el espíritu de Dios
  lexicon: HALOT
  rationale: En este contexto narrativo de investidura/poder, la referencia es al Espíritu divino actuando sobre Saúl. La mayúscula en 'Espíritu' sigue la referencia personal/divina que el contexto sugiere, sin resolver más de lo que el hebreo exige.
- source_word: וַתִּצְלַח עָלָיו
  english_pob_choice: rushed upon him
  chosen_spanish: vino con poder sobre él
  alternatives_spanish:
  - irrumpió sobre él
  - descendió poderosamente sobre él
  - lo invadió con poder
  lexicon: HALOT
  rationale: צלח con רוח en Samuel expresa una irrupción enérgica y eficaz. 'Vino con poder sobre él' comunica esa fuerza en español sin usar un giro demasiado literal o extrañamente físico; se conserva la tensión de una acción repentina y poderosa.
- source_word: וַיִּתְנַבֵּא
  english_pob_choice: he prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - se puso a profetizar
  - habló proféticamente
  - actuó como profeta
  lexicon: HALOT
  rationale: El hitpael de נבא en este contexto refiere actividad profética real. 'Profetizó' es la traducción más directa y adecuada; evita explicitar la forma de expresión más de lo que el texto permite.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: HALOT
  rationale: La frase señala su participación dentro del grupo profético. 'Entre ellos' es claro y natural en español, y preserva la idea de estar dentro del conjunto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  - fíjate
  lexicon: HALOT
  rationale: '''He aquí'' mantiene el valor discursivo de sorpresa y atención sin modernizar demasiado el registro bíblico.'
theological_decisions:
- issue: Cómo leer רוּחַ אֱלֹהִים en una escena de investidura profética
  english_pob_reading: the Spirit of God
  chosen_spanish_reading: el Espíritu de Dios
  alternative_spanish_readings:
  - un espíritu de Dios
  - el espíritu de Dios
  rationale: El contexto presenta una acción divina que capacita a Saúl para profetizar; por eso, la lectura como Espíritu divino es la más coherente con la escena. Se conserva la fuerza teológica del pasaje sin añadir precisión doctrinal posterior que el hebreo no explicita.
  doctrine_reference: Mantener la tensión del texto narrativo sobre la acción del Espíritu; equivalencia óptima
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail inglés sin introducir cambios sustantivos: la lectura de הַגִּבְעָתָה como «la colina»/topónimo queda abierta, חֶבֶל נְבִאִים se entiende como grupo organizado de profetas, רוּחַ אֱלֹהִים se traduce en clave de Espíritu divino, וַתִּצְלַח conserva la idea de irrupción poderosa, y בְּתוֹכָם se mantiene como participación dentro del grupo.'
  spanish_consistency_notes:
  - Se usó 'Espíritu' con mayúscula por referir al sujeto divino en este contexto narrativo.
  - Se prefirió 'profetizó' sobre una paráfrasis explicativa para no diluir el verbo hebreo.
  - Se mantuvo un registro bíblico claro y moderno, evitando una traducción mecánica que sonara poco natural en español.
