translation:
  language: es
  text: Porque los ídolos domésticos[a] hablan maldad, y los adivinos ven mentiras; hablan sueños vacíos y dan consuelo vano. Por eso vagan como ovejas[b]; están afligidos, porque no hay pastor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “terafines”, término hebreo para objetos cultuales domésticos o ídolos.
    reason: lexical_alternative
  - marker: b
    text: O “son oprimidos” para “están afligidos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרָפִים
  english_pob_choice: the household idols
  chosen_spanish: los ídolos domésticos
  alternatives_spanish:
  - los terafines
  - los ídolos del hogar
  lexicon: HALOT
  rationale: תְּרָפִים alude a objetos cultuales domésticos, no solo a 'ídolos' en abstracto. 'Ídolos domésticos' conserva la referencia concreta y hace transparente el sentido para el español actual; 'terafines' es posible pero menos claro.
- source_word: דִּבְּרוּ אָוֶן
  english_pob_choice: speak wickedness
  chosen_spanish: hablan maldad
  alternatives_spanish:
  - hablan iniquidad
  - hablan engaño
  - pronuncian maldad
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, falsedad o inutilidad. 'Maldad' mantiene la carga ética del término y encaja con el paralelo de mentiras y sueños vacíos sin forzar un matiz más específico que el hebreo no exige.
- source_word: וְהַקּוֹסְמִים
  english_pob_choice: the diviners
  chosen_spanish: los adivinos
  alternatives_spanish:
  - los adivinadores
  - los agoreros
  - los sortílegos
  lexicon: HALOT
  rationale: El término designa practicantes de adivinación. 'Adivinos' es el equivalente español más natural y preciso en contexto bíblico.
- source_word: חָזוּ שֶׁקֶר
  english_pob_choice: see lies
  chosen_spanish: ven mentiras
  alternatives_spanish:
  - ven falsedad
  - ven engaño
  - tienen visiones de mentira
  lexicon: HALOT
  rationale: 'La imagen es visionaria y profética: ''ver mentiras'' conserva el paralelismo y la fuerza del hebreo sin explicar de más el mecanismo de la falsa revelación.'
- source_word: חֲלֹמוֹת הַשָּׁוְא
  english_pob_choice: empty dreams
  chosen_spanish: sueños vacíos
  alternatives_spanish:
  - sueños vanos
  - sueños falsos
  lexicon: HALOT
  rationale: הַשָּׁוְא señala vaciedad, nulidad o vanidad. 'Sueños vacíos' reproduce esa idea con naturalidad en español y mantiene el paralelismo con 'mentiras'.
- source_word: הֶבֶל יְנַחֵמוּן
  english_pob_choice: give vain comfort
  chosen_spanish: dan consuelo vano
  alternatives_spanish:
  - dan consuelo vacío
  - consuelan en vano
  - dan un consuelo efímero
  lexicon: HALOT
  rationale: הֶבֶל expresa vanidad, vaciedad o carácter pasajero. 'Consuelo vano' preserva la correspondencia léxica con el inglés POB revisado y su tono sobrio.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - De modo que
  lexicon: HALOT
  rationale: '''Por eso'' comunica bien la consecuencia causal en un español actual y fluido; ''por tanto'' sería más formal, pero no necesariamente más natural aquí.'
- source_word: נָסְעוּ כְמוֹ צֹאן
  english_pob_choice: they wander like sheep
  chosen_spanish: andan errantes como ovejas
  alternatives_spanish:
  - vagan como ovejas
  - se desplazan como ovejas
  - van como ovejas
  lexicon: HALOT
  rationale: נָסְעוּ puede sugerir partir, moverse o levantarse de un lugar, pero en este contexto pastoral el sentido resultante es el de desorientación y movimiento sin guía. 'Andan errantes' expresa bien esa idea sin perder el matiz de desplazamiento.
- source_word: יַעֲנוּ
  english_pob_choice: they are afflicted
  chosen_spanish: están afligidos
  alternatives_spanish:
  - son oprimidos
  - sufren aflicción
  - son abatidos
  lexicon: HALOT
  rationale: עָנָה aquí comunica ser afligido u oprimido. 'Están afligidos' mantiene la amplitud semántica del inglés POB y funciona con naturalidad después de la imagen de las ovejas sin guía.
- source_word: אֵין רֹעֶה
  english_pob_choice: there is no shepherd
  chosen_spanish: no hay pastor
  alternatives_spanish:
  - no tienen pastor
  - no hay un pastor
  - carecen de pastor
  lexicon: HALOT
  rationale: El sustantivo רֹעֶה remite al líder/pastor. 'No hay pastor' conserva la estructura breve del hebreo y la imagen gobernante que culmina la sección.
theological_decisions:
- issue: Naturaleza de los mediadores falsos y su consuelo
  english_pob_reading: The verse condemns illegitimate sources of guidance—household idols, diviners, and deceptive dreams—without importing later doctrinal categories.
  chosen_spanish_reading: El verso condena fuentes ilegítimas de guía —ídolos domésticos, adivinos y sueños engañosos— sin añadir categorías doctrinales posteriores.
  alternative_spanish_readings:
  - Reducirlo solo a crítica política
  - Tratar los terafines como objetos neutrales
  rationale: La sección une idolatría doméstica, adivinación y sueños vacíos como un solo cuadro de falsa orientación. La traducción conserva esos elementos concretos y deja que la imagen del pastor explique la consecuencia comunitaria.
  doctrine_reference: Zacarías 10:2; POB translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que afinó הֶבֶל de “worthless comfort” a “vain comfort”. En español se optó por “consuelo vano”, que preserva mejor la correspondencia léxica con הֶבֶל y mantiene el registro formal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo donde el texto no lo requiere explícitamente; este versículo no contiene el nombre divino.
  - '''Adivinos'' se usa de manera consistente para קוֹסְמִים, evitando un término más folklórico o impreciso.'
  - '''Consuelo vano'' conserva la idea de vaciedad sin introducir ''inútil'' o ''efímero'', que desplazarían el matiz.'
  - '''Pastor'' traduce רֹעֶה con el valor metafórico de guía/líder, coherente con el contexto de ovejas sin dirección.'
