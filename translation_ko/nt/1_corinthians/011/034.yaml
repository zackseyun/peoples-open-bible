  yaml_path: translation/nt/1_corinthians/011/034.yaml
  text: If anyone is hungry[a], let him eat at home, so that you may not come together for judgment. And I will give directions about the rest when I come.
  footnotes:
  - marker: a
    text: Or 'for condemnation.' The Greek κρίμα can mean 'judgment' or 'condemnation'; here 'judgment' best fits the immediate context, where Paul speaks of the Lord's present discipline rather than final condemnation (vv. 29–32).
    reason: lexical_alternative
