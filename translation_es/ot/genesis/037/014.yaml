translation:
  language: es
  text: 'Él le dijo: «Ve ahora, ve cómo están[a] tus hermanos y el rebaño, y tráeme noticias». Así lo envió desde el valle de Hebrón, y él llegó a Siquem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ve a ver el bienestar de tus hermanos y el bienestar del rebaño». El hebreo usa shalom en ambas expresiones, con el sentido de paz, bienestar o buena condición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶךְ נָא
  english_pob_choice: Go now
  chosen_spanish: Ve ahora
  alternatives_spanish:
  - Por favor, ve
  - Ve, por favor
  lexicon: HALOT
  rationale: El imperativo לֶךְ pide acción directa, y נָא añade suavización o ruego. “Ve ahora” conserva la urgencia y fluidez narrativa en español sin sonar arcaico.
- source_word: רְאֵה
  english_pob_choice: see about the well-being of
  chosen_spanish: mira por el bienestar de
  alternatives_spanish:
  - ve a ver el bienestar de
  - revisa el bienestar de
  - observa el bienestar de
  lexicon: HALOT
  rationale: ראה literalmente es “ver”, pero aquí introduce una verificación del estado de personas y animales. “Mira por el bienestar de” comunica la idea de ocuparse de su condición, reflejando el valor de שְׁלוֹם sin volverlo una paráfrasis demasiado libre.
- source_word: שְׁלוֹם
  english_pob_choice: well-being
  chosen_spanish: bienestar
  alternatives_spanish:
  - paz
  - bienestar
  - salud
  lexicon: HALOT
  rationale: שְׁלוֹם aquí no apunta solo a ausencia de conflicto, sino a estado favorable, bienestar o prosperidad. “Bienestar” preserva mejor ese campo semántico en español. Se repite en ambas frases para conservar la correspondencia del hebreo.
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus hermanos varones
  - tus hermanos y hermanas
  - tus hermanos
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino y el contexto se refiere a los hermanos varones de José. “Tus hermanos” es natural en español y fiel al referente contextual.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas
  - el hato
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras; “rebaño” es un colectivo natural en español y evita especificar indebidamente una especie.
- source_word: וַהֲשִׁבֵנִי דָּבָר
  english_pob_choice: bring me word
  chosen_spanish: tráeme respuesta
  alternatives_spanish:
  - regrésame palabra
  - tráeme un informe
  - háblame con un reporte
  lexicon: HALOT
  rationale: La construcción causativa de שוב con דָּבָר expresa volver con noticia o informe. “Tráeme respuesta” es idiomático y conserva la idea de informar de regreso sin forzar un calco.
- source_word: מֵעֵמֶק חֶבְרוֹן
  english_pob_choice: from the Valley of Hebron
  chosen_spanish: desde el Valle de Hebrón
  alternatives_spanish:
  - desde el valle de Hebrón
  - desde Hebrón, en el valle
  - del valle de Hebrón
  lexicon: HALOT
  rationale: עֵמֶק significa “valle”. Mantener “Valle de Hebrón” refleja la construcción hebrea y sigue la decisión auditada de no reducirla simplemente a “Hebrón”.
- source_word: שְׁכֶמָה
  english_pob_choice: to Shechem
  chosen_spanish: a Siquem
  alternatives_spanish:
  - hacia Siquem
  - a Siquem
  lexicon: HALOT
  rationale: El he direccional marca movimiento hacia el lugar; en español se expresa naturalmente con “a”. Se usa “Siquem” como forma tradicional y ampliamente reconocible del topónimo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente reforzó la repetición de שְׁלוֹם como “well-being” en ambas frases. El borrador español conserva esa repetición con “bienestar” dos veces para mantener la correspondencia semántica y el paralelismo del hebreo, y evita suavizarlo a un sentido meramente general de “estar bien”.
  spanish_consistency_notes:
  - Se mantiene la misma traducción de שְׁלוֹם en ambas ocurrencias para reflejar el paralelismo del original.
  - Se conserva el orden narrativo breve y directo del hebreo con un español fluido y publicable.
  - Los topónimos se dan en forma conocida en español, sin perder la relación constructa del hebreo.
