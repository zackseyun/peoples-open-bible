revisions:
- from: 'Y los hombres de la ciudad le dijeron al séptimo día[a], antes de que se pusiera el sol: «¿Qué cosa es más dulce que la miel, y qué cosa es más fuerte que un león?». Y él les respondió: «Si no hubieran arado con mi heifer[b], no habrían encontrado mi enigma».'
  to: 'Y los hombres de la ciudad le dijeron el séptimo día[a], antes de que se pusiera el sol: «¿Qué es más dulce que la miel, y qué es más fuerte que un león?». Y él les dijo: «Si no hubieran arado con mi novilla[b], no habrían descubierto mi acertijo».'
  rationale: Se corrigió el giro temporal a un español natural ('el séptimo día'), se eliminó el anglicismo 'heifer' en favor de 'novilla', se mantuvo la metáfora agrícola literal conforme al POB, y se ajustó el final a 'habrían descubierto mi acertijo' para expresar claramente el sentido contextual de resolver la adivinanza sin alejarse demasiado del hebreo y del audit trail inglés.
