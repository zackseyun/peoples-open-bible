translation:
  language: es
  text: Pero en cuanto a mí[a], soy como un olivo frondoso en la casa de Dios; confío en el amor leal[b] de Dios por siempre y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «olivo verde» o «olivo fresco». El adjetivo hebreo enfatiza una vitalidad verde y lozana.'
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce חֶסֶד, un término que a menudo se refiere al amor fiel y pactal de Dios; también pueden considerarse «amor constante», «misericordia» o «fidelidad amorosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La construcción introduce contraste con el malvado del contexto previo; «pero en cuanto a mí» conserva ese giro adversativo y suena natural en español.
- source_word: כְּזַיִת
  english_pob_choice: like a ... olive tree
  chosen_spanish: como un olivo
  alternatives_spanish:
  - como un olivo frondoso
  - como un olivo verde
  lexicon: HALOT
  rationale: El hebreo usa comparación con imagen arbórea; «olivo» basta en español para la metáfora, y el matiz de vitalidad se expresa en el adjetivo siguiente.
- source_word: רַעֲנָן
  english_pob_choice: flourishing
  chosen_spanish: frondoso
  alternatives_spanish:
  - verde
  - floreciente
  - fresco
  lexicon: HALOT
  rationale: El adjetivo denota vitalidad verdosa, no solo color. «Frondoso» comunica vigor vivo y crecimiento en un español digno y comprensible, sin perder la imagen vegetal.
- source_word: בְּבֵית אֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en la casa de Dios
  - en la casa de Dios
  lexicon: HALOT
  rationale: Se mantiene la imagen del santuario/templo con una traducción directa y reverente, acorde con el valor bíblico de la expresión.
- source_word: בָּטַחְתִּי
  english_pob_choice: I trust
  chosen_spanish: confío
  alternatives_spanish:
  - he confiado
  - confié
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí una postura estable; el presente español «confío» comunica mejor la confianza continua ligada a «para siempre y eternamente».
- source_word: בְחֶסֶד
  english_pob_choice: in the steadfast love
  chosen_spanish: en la amor leal
  alternatives_spanish:
  - en la misericordia
  - en el amor constante
  - en la fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד es un término de fuerte peso relacional y pactual. «Amor leal» intenta preservar tanto afecto como fidelidad; se evita «misericordia» por estrechar demasiado el sentido.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Es la designación común del Dios de Israel; «Dios» es la equivalencia directa y natural en español.
- source_word: עוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y eternamente
  alternatives_spanish:
  - para siempre y para siempre
  - por los siglos de los siglos
  lexicon: HALOT
  rationale: La pareja intensifica la duración. «Para siempre y eternamente» conserva la fuerza enfática sin depender de una fórmula litúrgica fija.
theological_decisions:
- issue: Valor teológico de חֶסֶד en un contexto de confianza en Dios
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - misericordia
  - fidelidad amorosa
  rationale: La confianza del salmista se apoya en el carácter fiel y relacional de Dios. «Amor leal» intenta retener la dimensión pactual y perseverante de חֶסֶד sin reducirla a simple afecto o a misericordia puntual.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión del expediente inglés no introdujo cambios respecto de la última pasada; por eso el borrador español sigue de cerca la solución auditada, manteniendo las mismas decisiones semánticas principales y solo adaptando la formulación al español natural.
  spanish_consistency_notes:
  - Se preserva el contraste inicial con «Pero en cuanto a mí».
  - Se mantiene la metáfora vegetal sin explicar en exceso la imagen.
  - «Casa de Dios» conserva el valor de santuario/templo.
  - «Amor leal» se usa de manera consistente para חֶסֶד en este verso, con nota de alternativas.
  - La duración enfática de la cláusula final se refleja con dos términos coordinados.
