translation:
  language: es
  text: Y el rey nombró a Benaía hijo de Joyaidá en su lugar al frente del ejército[a], y el rey nombró a Sadoc, el sacerdote, en lugar de Abiatar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en su lugar»; el pronombre remite al comandante desplazado en el contexto inmediato, Joab.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - puso
  - estableció
  lexicon: HALOT
  rationale: En este contexto administrativo de instalación en un cargo, el hebreo literalmente ‘dio/colocó’ expresa la acción de poner a alguien en un puesto. ‘Nombró’ comunica de forma natural y fiel esa idea de investidura sin volverla más interpretativa de lo que permite el texto.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en vez de él
  lexicon: HALOT
  rationale: El sufijo pronominal remite al oficial previamente removido en el contexto inmediato. ‘En su lugar’ conserva la idea de sustitución en el cargo y funciona con naturalidad en español.
- source_word: עַל הַצָּבָא
  english_pob_choice: over the army
  chosen_spanish: sobre el ejército
  alternatives_spanish:
  - al frente del ejército
  - sobre las tropas
  lexicon: HALOT
  rationale: צָבָא aquí se refiere a la fuerza militar. ‘Ejército’ es la forma más clara y directa en español; ‘sobre’ preserva la relación de autoridad/mandato que el hebreo expresa.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joyaidá
  alternatives_spanish:
  - Benaía, hijo de Joyaidá
  - Benaía, el hijo de Joyaidá
  lexicon: transliteration/patronymic
  rationale: Se conserva la forma propia de nombres personales en español bíblico de estilo sobrio. El patronímico se traduce literalmente como ‘hijo de’, sin añadir artículos que el hebreo no requiere.
- source_word: צָדוֹק הַכֹּהֵן
  english_pob_choice: Zadok the priest
  chosen_spanish: el sacerdote Sadoc
  alternatives_spanish:
  - Sadoc el sacerdote
  - Sadoc, el sacerdote
  lexicon: HALOT
  rationale: El título apposicional identifica el cargo de Sadoc. En español, ‘el sacerdote’ es natural y exacto; se mantiene la relación nombre-título sin reordenar de manera innecesaria.
- source_word: תַּחַת אֶבְיָתָר
  english_pob_choice: in place of Abiathar
  chosen_spanish: en lugar de Abiatar
  alternatives_spanish:
  - en vez de Abiatar
  - sustituyendo a Abiatar
  lexicon: HALOT
  rationale: תַּחַת marca sustitución en un cargo. ‘En lugar de’ reproduce esa idea de reemplazo de manera precisa y idiomática en español.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el soberano
  lexicon: HALOT
  rationale: El título definido se traduce de forma directa y transparente. Se repite en la segunda cláusula, como en el hebreo, para mantener ritmo y claridad narrativa.
- source_word: אֶבְיָתָר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abiaratar
  - Abiathar
  lexicon: standard Spanish biblical transliteration
  rationale: Se usa la transliteración bíblica española común ‘Abiatar’, coherente con el uso de nombres propios en español y con la pronunciación habitual en el ámbito eclesial hispano.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  - Zadok
  lexicon: standard Spanish biblical transliteration
  rationale: Se adopta ‘Sadoc’, la forma tradicional y reconocible en español bíblico, manteniendo el nombre propio sin anglicizarlo.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el análisis auditado en inglés; no se detectan revisiones textuales relevantes que exijan una nota de variante. Se conserva la estructura de nombramiento y sustitución del original.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención general del proyecto solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se preserva la repetición de ‘el rey’ para reflejar el hebreo y evitar ambigüedad de sujeto.
  - 'Los nombres propios se adaptan a transliteraciones españolas habituales: Benaía, Joyaidá, Sadoc, Abiatar.'
