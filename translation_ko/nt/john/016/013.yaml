  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ὅταν δὲ ἔλθῃ ἐκεῖνος, τὸ πνεῦμα τῆς ἀληθείας, ὁδηγήσει ὑμᾶς ⸂ἐν τῇ ἀληθείᾳ πάσῃ⸃, οὐ γὰρ λαλήσει ἀφ’ ἑαυτοῦ, ἀλλ’ ὅσα ⸀ἀκούσει λαλήσει, καὶ τὰ ἐρχόμενα ἀναγγελεῖ ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/013.yaml
  text: But when he[a], the Spirit of truth, comes, he will guide you into all the truth. For he will not speak from himself, but whatever he hears he will speak[d][c][b], and he will declare to you the things that are coming.
  footnotes:
  - marker: a
    text: Or 'in all the truth.' The Greek reads 'in all the truth,' but English idiom with 'guide' commonly uses 'into.'
    reason: alternative_reading
  - marker: b
    text: Or 'he will not speak on his own.' Literally, 'he will not speak from himself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the things to come' / 'what is to come.'
    reason: lexical_alternative
  - marker: d
    text: Or 'But when he comes, the Spirit of truth, he will guide you'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러나 그분, 곧 진리의 영이 오시면, 그분이 여러분을 모든 진리 가운데로 인도하실 것입니다. 그분은 스스로 말씀하시지 않고, 들으시는 것을 말씀하시며, 또 다가올 일들을 여러분에게 알려 주실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 진리 안에서」. 헬라어는 「모든 진리 안에서」이나, 「인도하다」와 어울리는 한국어 표현으로 「~로」를 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그분은 자기 자신으로부터 말씀하시지 않을 것이다」. 문자적으로는 「그분이 자기로부터 말씀하시지 않을 것이다」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「장차 올 일들」, 「올 것들」.
    reason: lexical_alternative
  - marker: d
    text: 또는 「진리의 영이 오시면, 그분이 너희를 인도하실 것이다」.
    reason: lexical_alternative
