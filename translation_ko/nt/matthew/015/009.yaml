- source_word: διδασκαλίας ἐντάλματα ἀνθρώπων
  english_pob_choice: as doctrines the commandments of men
  chosen_korean: 사람의 계명을 교훈으로
  alternatives_korean:
  - 사람의 계명들을 교훈들로
  lexicon: BDAG
  rationale: 압축된 헬라어 통사를 자연스러운 한국어 「-을 -으로 가르치다」 구조로 풀되, 인간 명령에 교리적 권위를 부여한다는 의미를 분명히 한다.
