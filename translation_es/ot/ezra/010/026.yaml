translation:
  language: es
  text: 'Y de los hijos de Elam: Matanías, Zacarías, Jehiel, Abdí, Jeremot y Elías.'
  philosophy: formal
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y entre los hijos de
  lexicon: HALOT
  rationale: Mantiene el giro genealógico/listado del hebreo con un equivalente natural en español. «Hijos de» conserva la fórmula de pertenencia clánica que la POB inglesa preserva con «sons of». «Descendientes de» suaviza el hebraísmo, pero pierde parte de la forma listal tradicional.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: HALOT
  rationale: Es nombre propio de linaje; se translitera. «Elam» es la forma estándar y transparente en español bíblico.
- source_word: מַתַּנְיָה
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Matanías
  lexicon: HALOT
  rationale: Se adapta el nombre propio a la forma corriente en español bíblico. La terminación -ías refleja mejor la vocalización recibida y la tradición hispana de nombres hebreos.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zeharías
  lexicon: HALOT
  rationale: Forma usual y reconocible en español bíblico para el nombre propio. Conserva la identificación tradicional sin añadir explicación innecesaria.
- source_word: וִ/יחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yehiel
  - Jehiel
  lexicon: HALOT
  rationale: Se mantiene la transliteración establecida en español de Biblia para este nombre propio. Aunque la forma hebrea admite otras representaciones, «Jehiel» es clara y convencional.
- source_word: וְ/עַבְדִּי
  english_pob_choice: Abdi
  chosen_spanish: Abdí
  alternatives_spanish:
  - Abdi
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio dentro de una lista, no como el sustantivo común «mi siervo». Se conserva la transliteración nominal con acento español para facilitar la lectura.
- source_word: וִ/ירֵמ֖וֹת
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jeremot
  - Jerimot
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. La forma sin -h final se ajusta mejor al uso hispano y evita una grafía menos natural.
- source_word: וְ/אֵלִיָּה
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: HALOT
  rationale: Se usa la forma tradicional y plenamente reconocible en español para el nombre propio. Es la equivalencia estable de «Elijah» en la tradición bíblica hispana.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada muestran plena concordancia, sin variantes textuales ni revisiones aplicadas; por ello, la versión española sigue de cerca la lista nominal sin añadir glosas.
  spanish_consistency_notes:
  - Se mantuvo la fórmula genealógica «Y de los hijos de» para reflejar la estructura del hebreo.
  - Se adaptaron los nombres propios a formas hispanas bíblicamente reconocibles, evitando calcos gráficos innecesarios.
  - No hay notas al pie porque el versículo no presenta ambigüedad textual o teológica significativa en el audit trail.
