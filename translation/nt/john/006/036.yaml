theological_decisions:
- issue: Force of the first καί in the clause καὶ ἑωράκατέ με
  chosen_reading: 'Render with concessive emphasis: ''even though you have seen me'''
  alternative_readings:
  - Render more formally as 'that you have also seen me and do not believe'
  - Render as 'that indeed you have seen me and do not believe'
  rationale: 'The Greek construction can be represented woodenly with repeated ''and/also,'' but idiomatic English needs to show the rhetorical force: their seeing Jesus should have led to belief, yet it has not. This is a discourse-level decision, not an importation of doctrine. It preserves the contrast inherent in the clause without overstating it.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering πιστεύω
  chosen_reading: believe
  alternative_readings:
  - have faith
  - trust
  rationale: Although πίστις is listed as a contested term, this verse uses the verb πιστεύω. In Johannine context, 'believe' is the most direct and established verbal equivalent and does not force a narrower doctrinal reading such as mere intellectual assent or a more expansive paraphrase like 'trust in.'
  doctrine_reference: 'Contested terms: πίστις; Translation philosophy §5'
