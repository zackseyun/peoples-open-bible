translation:
  language: es
  text: Porque, al ver el tirano Antíoco su valentía[a] y virtud, y su perseverancia en las torturas, proclamó su perseverancia como ejemplo para sus soldados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coraje» o «bravura» para ἀνδρίαν. El término griego es explícitamente marcado por género y alude a una valentía varonil o fortaleza masculina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνδρίαν
  english_pob_choice: courage
  chosen_spanish: valentía
  alternatives_spanish:
  - coraje
  - bravura
  lexicon: LSJ
  rationale: El término griego es un sustantivo moralmente elogioso y marcado por el valor varonil; en español, "valentía" comunica bien el valor intrépido sin forzar un calco de género que resultaría poco natural en esta línea. Se conserva la tensión con la nota, porque el matiz de fortaleza viril está documentado en la tradición léxica, aunque el cuerpo del texto debe sonar publicable en español.
- source_word: ἀρετὴν
  english_pob_choice: virtue
  chosen_spanish: virtud
  alternatives_spanish:
  - excelencia
  - nobleza moral
  lexicon: LSJ
  rationale: Aquí ἀρετή se refiere a excelencia moral o nobleza de carácter. "Virtud" es la equivalencia más natural y precisa en español, y mantiene el sentido ético del pasaje sin ampliar indebidamente el alcance.
- source_word: βασάνοις
  english_pob_choice: tortures
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - suplicios
  lexicon: LSJ
  rationale: En este contexto de martirio, el término apunta a sufrimientos infligidos. "Tormentos" conserva la gravedad física y el registro literario; "torturas" también sería posible, pero "tormentos" resulta más fluido en español sin perder fuerza.
- source_word: ὑπομονὴν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - constancia
  lexicon: BDAG
  rationale: El griego expresa firmeza sostenida bajo sufrimiento. "Perseverancia" reproduce esa resistencia continua con buena naturalidad en español. Aunque "resistencia" sería posible, puede sonar más genérico; "perseverancia" mantiene el aspecto de aguante sostenido.
- source_word: ἀφιδὼν
  english_pob_choice: saw
  chosen_spanish: al ver
  alternatives_spanish:
  - habiendo observado
  - al observar
  lexicon: LSJ
  rationale: El participio se vierte con una construcción temporal natural en español. "Al ver" comunica la simultaneidad/antecedencia sin forzar una estructura demasiado literal.
- source_word: ἀνεκήρυξεν
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - declaró públicamente
  - anunció
  lexicon: LSJ
  rationale: El verbo tiene fuerza pública y formal. "Proclamó" mantiene ese registro solemne y encaja mejor que un simple "anunció".
- source_word: ὑπόδειγμα
  english_pob_choice: an example
  chosen_spanish: ejemplo
  alternatives_spanish:
  - modelo
  - lección
  lexicon: LSJ
  rationale: El sustantivo designa un patrón o caso ejemplar. "Ejemplo" es la opción más directa y natural en español para este uso.
- source_word: στρατιώτας
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - tropas
  lexicon: LSJ
  rationale: La referencia es a personal militar bajo Antíoco. "Soldados" es el equivalente directo y más claro en español.
theological_decisions:
- issue: 'Matiz de ἀνδρίαν: virtud varonil / valentía'
  english_pob_reading: The English POB notes the gendered force of ἀνδρίαν and preserved it with a lexical note, though the latest English revision preferred 'courage' in the main text for naturalness.
  chosen_spanish_reading: Se mantiene "valentía" en el texto principal y se anota que el griego tiene un matiz de fortaleza varonil o masculina.
  alternative_spanish_readings:
  - coraje
  - bravura
  - hombría
  rationale: En español, un calco como "hombría" sonaría más marcado y podría cargar con asociaciones modernas no deseadas. "Valentía" es más natural y fiel al valor moral descrito, mientras la nota conserva la tensión léxica documentada por el audit trail.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: El inglés POB pasó de 'manliness' a 'courage' en una revisión posterior por naturalidad. La presente redacción española sigue esa preferencia de fluidez con 'valentía', pero preserva en nota el matiz léxico-género documentado por el audit trail, evitando neutralizarlo sin explicación.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando corresponda; en este versículo no aparece el nombre divino.
  - '"Mesías/Cristo" no interviene aquí.'
  - '"espíritu"/"Espíritu" no interviene aquí.'
  - Se ha mantenido un registro sobrio y publicable, con puntuación española estándar.
  - La repetición de "perseverancia" en ambos miembros refleja la repetición de ὑπομονήν en el griego.
