  to: ¿Es este hombre, Conías[b], una vasija[a] despreciada y quebrada, o una vasija en la cual no hay agrado? ¿Por qué fueron arrojados él y su descendencia, y lanzados a una tierra que no conocían?
  rationale: Se corrigieron los anclajes de notas para que correspondan al término realmente comentado, se mejoró la naturalidad y fuerza imagética con «vasija» en lugar de «recipiente», y se sustituyó «deleite» por «agrado» para un español más idiomático sin perder cercanía al hebreo. También se unió «despreciada y quebrada» para reflejar que ambos calificativos describen el primer objeto en la pregunta retórica.
