translation:
  language: es
  text: 'Y dijo el rey de los amonitas a los mensajeros de Jefté: «Israel tomó mi tierra cuando subió de Egipto, desde el Arnón hasta el Jaboc y hasta el Jordán. Así que ahora devuélvelas[a] en paz[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre femenino plural en hebreo se refiere a los territorios o tierras reclamados por el rey de los amonitas.
    reason: lexical_alternative
  - marker: b
    text: 'O: «pacíficamente». La frase hebrea también puede entenderse de esa manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Luego dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, 'Y dijo' conserva ese flujo sin añadir una inferencia temporal más fuerte que el hebreo.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: the king of the Ammonites
  chosen_spanish: el rey de los hijos de Amón
  alternatives_spanish:
  - el rey de los amonitas
  - el rey del pueblo amonita
  lexicon: HALOT
  rationale: '''Hijos de Amón'' sigue de cerca la construcción hebrea y evita suavizarla en una etiqueta étnica más interpretativa; ''Amón'' reproduce el nombre propio del pueblo.'
- source_word: מַלְאֲכֵי יִפְתָּח
  english_pob_choice: Jephthah’s messengers
  chosen_spanish: los mensajeros de Jefté
  alternatives_spanish:
  - los enviados de Jefté
  - los mensajeros pertenecientes a Jefté
  lexicon: HALOT
  rationale: Aquí מַלְאָךְ designa representantes humanos; 'mensajeros' es claro en español y mantiene el valor diplomático del contexto.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se apoderó de
  - arrebató
  lexicon: HALOT
  rationale: '''Tomó'' reproduce el verbo básico sin intensificarlo más de lo que exige el hebreo; evita cargar la acusación con una fuerza no explícita en la forma verbal.'
- source_word: אַרְצִי
  english_pob_choice: my land
  chosen_spanish: mi tierra
  alternatives_spanish:
  - mi tierra propia
  - mi territorio
  lexicon: HALOT
  rationale: '''Tierra'' conserva el campo semántico territorial de אֶרֶץ con naturalidad en español; ''mi territorio'' explicita más de lo que requiere el texto.'
- source_word: בַּעֲלוֹתוֹ מִמִּצְרַיִם
  english_pob_choice: when it came up from Egypt
  chosen_spanish: cuando subió de Egipto
  alternatives_spanish:
  - cuando Israel subió de Egipto
  - al subir de Egipto
  lexicon: HALOT
  rationale: El infinitivo con sufijo puede referirse a Israel como colectivo; 'subió' mantiene la imagen direccional de עלה y en español permite la referencia colectiva sin forzar el pronombre.
- source_word: מֵאַרְנוֹן וְעַד הַיַּבֹּק וְעַד הַיַּרְדֵּן
  english_pob_choice: from the Arnon as far as the Jabbok and as far as the Jordan
  chosen_spanish: desde el Arnón hasta el Jaboc y hasta el Jordán
  alternatives_spanish:
  - desde el Arnón hasta el Jaboc y hasta el río Jordán
  - del Arnón al Jaboc y al Jordán
  lexicon: HALOT
  rationale: '''Desde ... hasta ... y hasta ...'' preserva el marcaje de límites por extensión. Se mantienen los topónimos en forma castellana habitual para lectura bíblica.'
- source_word: וְעַתָּה
  english_pob_choice: now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - y ahora
  - por tanto, ahora
  lexicon: HALOT
  rationale: El contexto requiere una transición discursiva hacia la demanda; 'Así que ahora' refleja la fuerza conclusiva e inferencial que la revisión inglesa también destacó.
- source_word: הָשִׁיבָה
  english_pob_choice: restore
  chosen_spanish: devuélvelas
  alternatives_spanish:
  - restáuralas
  - vuélvelas a dar
  lexicon: HALOT
  rationale: El imperativo hifil de שוב expresa hacer volver/retornar. Dado que el objeto es femenino plural en hebreo y se refiere a territorios, 'devuélvelas' comunica el retorno exigido con precisión en español.
- source_word: אֶתְהֶן
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las tierras
  - esas tierras
  lexicon: HALOT
  rationale: El pronombre femenino plural se refiere a los territorios reclamados; 'las' conserva la pluralidad y el género gramatical sin añadir una glosa intrusiva al texto principal.
- source_word: בְּשָׁלוֹם
  english_pob_choice: peacefully / in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - sin guerra
  lexicon: HALOT
  rationale: '''En paz'' es la equivalencia más natural y directa en español para בְּשָׁלוֹם; además preserva la posible lectura adverbial más literal que el inglés documentó.'
theological_decisions:
- issue: Alcance del sujeto colectivo en 'subió de Egipto'
  english_pob_reading: it came up from Egypt
  chosen_spanish_reading: cuando subió de Egipto
  alternative_spanish_readings:
  - cuando Israel subió de Egipto
  - cuando el pueblo subió de Egipto
  rationale: El hebreo usa un sufijo masculino singular sobre un sujeto colectivo (Israel). En español, dejar el verbo sin sujeto explícito preserva esa ambigüedad colectiva sin imponer una paráfrasis interpretativa.
  doctrine_reference: Unidad colectiva de Israel en el hebreo bíblico; gramática concordante del sujeto colectivo.
- issue: Referencia del pronombre femenino plural 'las' / 'devuélvelas'
  english_pob_reading: them refers to the territories/lands claimed by the king of the Ammonites
  chosen_spanish_reading: devuélvelas / las
  alternative_spanish_readings:
  - devuélvelos
  - devuélvelo
  rationale: El hebreo femenino plural apunta a las tierras o territorios, no a un singular abstracto. El español debe conservar ese plural y no normalizarlo a un singular genérico.
  doctrine_reference: Fidelidad al referente gramatical del texto; consistencia con el plural hebreo de אֶתְהֶן.
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'Because' para evitar una cláusula causal que sonara incompleta y prefirió una transición conclusiva ('So now'). En español, esa solución se refleja con 'Así que ahora', que comunica la misma relación discursiva sin forzar una suboración causal. También se conservó el plural femenino del objeto, reflejado explícitamente en 'devuélvelas' y en la nota sobre los territorios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero en este versículo no aparece el tetragrámaton ni una cita directa del nombre divino.
  - Se usa 'Amón' y 'Jefté' en formas castellanas habituales y bibliológicamente reconocibles.
  - Se conserva la serie de límites geográficos con preposiciones paralelas para respetar el ritmo del hebreo.
  - No se introduce 'Cristo' ni terminología cristológica, ya que el pasaje no lo requiere.
