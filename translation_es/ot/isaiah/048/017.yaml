base_translation:
  language: en
  yaml_path: translation/ot/isaiah/048/017.yaml
  text: 'Thus says Yahweh[a], your Redeemer, the Holy One of Israel: I am Yahweh your God, who teaches you to profit[b], who leads you in the way you should go.'
  footnotes:
