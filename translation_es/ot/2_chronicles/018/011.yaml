base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/011.yaml
  text: And all the prophets were prophesying thus[a], saying, “Go up to Ramoth-gilead and succeed, and Yahweh will give it into the hand of the king.”
  footnotes:
