  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura y la mayor parte del sentido del hebreo: instrucción a Moisés dirigida a los hijos de Israel, mandato plural de tomar los animales prescritos, y especificaciones de edad, integridad y finalidad sacrificial. Sin embargo, la traducción de לְחַטָּאת como ''para expiación'' no preserva bien la decisión auditada del POB (''sin offering'' con alternativa en nota ''purification offering'') ni la referencia concreta a una categoría sacrificial/ofrenda.'
  spanish_quality_summary: El español es generalmente claro y digno, pero mezcla registro peninsular ('Tomad') con el objetivo de español neutro latinoamericano. Además, 'para expiación' suena más abstracto que cultual en este contexto. Conviene usar una formulación más natural y precisa como 'Tomen' y 'como ofrenda por el pecado', manteniendo la alternativa en nota.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''los hijos de Israel'', ''becerro'', ''cordero'', ''sin defecto'', ''holocausto''. El punto principal de desalineación es חַטָּאת: el proyecto/documentación favorece una categoría sacrificial explícita en el texto principal, no el abstracto ''expiación''.'
  issues:
  - severity: high
    issue: חַטָּאת fue traducido como 'para expiación'
    rationale: El hebreo en contexto sacerdotal aquí nombra una ofrenda/categoría sacrificial, no meramente un efecto abstracto. La auditoría inglesa eligió 'sin offering' y preservó 'purification offering' como alternativa en nota. 'Expiación' cambia el referente semántico y debilita la precisión cultual.
  - severity: medium
    issue: Uso de 'Tomad' en vez de una forma panhispánica más neutra
    rationale: Aunque fiel al imperativo plural, 'Tomad' es marcadamente peninsular. Dado el estilo objetivo 'neutral Latin American / broadly church-readable', 'Tomen' encaja mejor sin perder fuerza imperativa.
  - severity: low
    issue: La nota al pie no corresponde idealmente al texto principal revisable
    rationale: Si el texto principal se corrige a 'ofrenda por el pecado', la nota debe conservar la alternativa documentada 'ofrenda de purificación' anclada en esa expresión.
  revised_spanish_text: 'Y a los hijos de Israel hablarás, diciendo: ‘Tomen un macho cabrío como ofrenda por el pecado[a], y un becerro y un cordero, ambos de un año, sin defecto, para holocausto.’'
  revised_footnotes:
