lexical_decisions:
- source_word: וַ֭/יַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En la fórmula narrativa hebrea, ענה introduce una réplica a un discurso previo. En español, «respondió» comunica bien el movimiento conversacional sin forzar un calco; «contestó» también sería posible, pero «respondió» suena más neutro y natural en registro bíblico moderno.
- source_word: צֹפַ֥ר
  english_pob_choice: Zophar
  chosen_spanish: Zofar
  alternatives_spanish:
  - Zophar
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio al español como «Zofar», manteniendo la pronunciación aproximada y la naturalidad gráfica del español. La forma inglesa «Zophar» no es necesaria en la meta lengua.
- source_word: הַ/נַּֽעֲמָתִ֗י
  english_pob_choice: the Naamathite
  chosen_spanish: el naamatita
  alternatives_spanish:
  - el naamatita
  - el de Naama
  lexicon: HALOT
  rationale: El gentilicio indica procedencia o asociación con Naama. «Naamatita» conserva el valor étnico/geográfico del hebreo y funciona como gentilicio asentado en español bíblico; «el de Naama» explicita el origen, pero pierde la forma adjetival breve del texto.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: אמר introduce la continuación directa del discurso. En español, «dijo» es la equivalencia más precisa y natural para mantener la doble fórmula «respondió y dijo» sin ampliar el sentido.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: gramatical
  rationale: La waw consecutiva abre la secuencia narrativa. «Entonces» conserva mejor el avance temporal y discursivo que un simple «Y» en español moderno.
translation_notes:
  revision_awareness: El hebreo presenta la fórmula narrativa estándar וַיַּעַן ... וַיֹּאמַר. La versión española sigue esa secuencia con un verbo de respuesta más natural en español («respondió») y conserva la repetición verbal sin suavizarla ni expandirla.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se prefiere la transliteración adaptada al español para nombres propios y gentilicios.
  - No hay decisiones textuales complejas ni variantes teológicas en este versículo.
