translation:
  language: es
  text: 'Y respondiendo[a], dijo: «Les digo que, si estos guardan silencio, las piedras clamarán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedan en silencio» o «se callan».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  - contestando
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción de respuesta previa al verbo principal. «Respondiendo» conserva esa relación participial y suena natural en español en esta construcción narrativa.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - les dijo
  lexicon: BDAG
  rationale: El verbo principal de discurso se traduce de manera directa y sobria con «dijo». El complemento pronominal explícito posterior ya recoge el destinatario con naturalidad.
- source_word: Λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: Les digo
  alternatives_spanish:
  - Les digo a ustedes
  - Yo les digo
  lexicon: BDAG
  rationale: La fórmula enfática de habla directa se conserva con «Les digo», que mantiene el tono autoritativo sin volverlo arcaico.
- source_word: ὅτι
  english_pob_choice: if
  chosen_spanish: que, si
  alternatives_spanish:
  - si
  - que si
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido de lo dicho y antecede a una cláusula condicional. En español, «que, si» reproduce mejor la relación sintáctica que omitir por completo el enlace o fusionarlo sin marca.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estas personas
  - estos mismos
  lexicon: BDAG
  rationale: El demostrativo se mantiene sin ampliar el referente en el texto principal. «Estos» conserva la deixis inmediata del contexto.
- source_word: σιωπήσουσιν
  english_pob_choice: become silent
  chosen_spanish: se callan
  alternatives_spanish:
  - callan
  - guardan silencio
  - se quedan callados
  lexicon: BDAG
  rationale: El futuro griego tiene aquí valor prospectivo dentro de la condición. «Se callan» comunica con naturalidad el cese de la voz; la posibilidad de silencio voluntario o de quedar en silencio se conserva mejor en nota que forzando una sola matización en el cuerpo.
- source_word: οἱ λίθοι
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - las piedras del camino
  - las rocas
  lexicon: BDAG
  rationale: Aunque λίθοι puede ser «piedras» o «piedras/rocas», en español «las piedras» transmite la imagen literal con más fluidez que «los piedras» o una especificación interpretativa. Se conserva el artículo definido.
- source_word: κράξουσιν
  english_pob_choice: will cry out
  chosen_spanish: gritarán
  alternatives_spanish:
  - clamarán
  - darán gritos
  lexicon: BDAG
  rationale: κράζω expresa un grito fuerte o clamor. «Gritarán» conserva la fuerza sonora del verbo sin añadir una explicación interpretativa que no está en el texto.
theological_decisions:
- issue: Si aclarar en el texto principal si la afirmación es metáfora, hipérbole o posibilidad literal
  english_pob_reading: Retain the literal image 'the stones will cry out' without interpretive qualification.
  chosen_spanish_reading: 'Conservar la imagen literal: «las piedras gritarán».'
  alternative_spanish_readings:
  - las piedras testificarán metafóricamente
  - la creación misma alabará a Dios
  - las piedras clamarán
  rationale: El griego presenta una imagen tajante y sin explicación. La traducción mantiene esa tensión retórica y teológica sin resolverla en favor de una interpretación específica.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se corrigió la validación previa añadiendo el marcador [a] en el texto principal junto al participio inicial, para que la nota quede anclada correctamente.
  spanish_consistency_notes:
  - Se mantuvo el contraste entre el participio inicial y el verbo principal con «Respondiendo... dijo».
  - Se evitó introducir «Cristo» o lenguaje litúrgico no presente en el versículo.
  - Se preservó la imagen concreta y audaz de «las piedras gritarán» sin suavizarla.
