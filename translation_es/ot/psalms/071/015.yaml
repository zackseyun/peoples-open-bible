translation:
  language: es
  text: Mi boca contará tu justicia[a] y tu salvación todo el día[b], porque no sé su número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu rectitud' o 'tus actos justos'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el salmista habla de las acciones justas y salvadoras de Dios como demasiado numerosas para contarlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּי
  english_pob_choice: My mouth
  chosen_spanish: Mi boca
  alternatives_spanish:
  - Yo
  - Mi habla
  lexicon: HALOT
  rationale: Se conserva el sujeto literal del hebreo, que destaca el órgano de la alabanza y no solo la persona en abstracto.
- source_word: יְסַפֵּר
  english_pob_choice: will recount
  chosen_spanish: contará
  alternatives_spanish:
  - relatará
  - proclamará
  lexicon: HALOT
  rationale: En español, 'contará' comunica de modo natural la idea de enumerar o narrar detalladamente, en línea con el sentido de recuento del verbo hebreo.
- source_word: צִדְקָתֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tus actos justos
  lexicon: HALOT
  rationale: '''צדקה'' admite ''justicia'' o ''rectitud''; aquí se mantiene ''justicia'' por su cobertura semántica amplia y por la nota textual que preserva la alternativa concreta.'
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - durante todo el día
  lexicon: HALOT
  rationale: Expresa continuidad de manera idiomática y clara en español, sin añadir matices no presentes en el hebreo.
- source_word: תְּשׁוּעָתֶךָ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - tus actos salvadores
  lexicon: HALOT
  rationale: '''Salvación'' es la equivalencia más directa y abarca el sentido de rescate y preservación implícito en el sustantivo hebreo.'
- source_word: לֹא יָדַעְתִּי סְפֹרוֹת
  english_pob_choice: I do not know their number
  chosen_spanish: porque no conozco su número
  alternatives_spanish:
  - porque no sé contarlas
  - porque son innumerables
  lexicon: HALOT
  rationale: Se conserva la imagen de número/cantidad sin convertirla por completo en una paráfrasis; 'su número' refleja bien la imposibilidad de contarlas.
theological_decisions:
- issue: 'צִדְקָתֶךָ: ''justicia'' frente a ''actos justos'''
  english_pob_reading: your righteousness with a footnote for 'your justice' or 'your righteous acts'
  chosen_spanish_reading: tu justicia con nota para 'tu rectitud' o 'tus actos justos'
  alternative_spanish_readings:
  - tu rectitud
  - tus actos justos
  rationale: El hebreo presenta el sustantivo abstracto en singular; por eso la línea principal mantiene 'justicia'. La nota conserva la tensión entre atributo divino y acciones concretas, tal como hace el POB en inglés.
  doctrine_reference: Translation philosophy §3, §5; preservación de tensión léxica en términos de justicia divina.
- issue: Relación entre 'justicia' y 'salvación' como obras innumerables de Dios
  english_pob_reading: God's righteous and saving acts as too many to count
  chosen_spanish_reading: las acciones justas y salvadoras de Dios son demasiadas para contarlas
  alternative_spanish_readings:
  - sus actos justos y salvadores
  - su justicia y su salvación
  rationale: La frase principal sigue el hebreo, pero la nota explica que el salmista habla de actos de Dios que exceden el conteo. Esto evita perder el sentido acumulativo implícito en 'no conozco su número'.
  doctrine_reference: Salmos 71; teología bíblica de los actos salvadores de Yahvé.
translation_notes:
  revision_awareness: La redacción inglesa más reciente unió 'your righteousness and your salvation' y colocó 'all day long' después de ambos complementos. La versión española sigue esa revisión, evitando separar los objetos y conservando la continuidad del hebreo. También se tomó en cuenta la nota de que la línea final expresa una imposibilidad de contar las obras divinas, no solo un dato numérico.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en el contexto del libro; aquí el versículo no lo explicita, por lo que no se añade.
  - '''justicia'' se mantiene como término principal para צִדְקָה; ''rectitud'' queda reservada como alternativa anotada.'
  - Se evita 'Señor' como sustituto teológico no presente en el hebreo de este versículo.
  - La construcción 'su número' conserva el plural implícito del hebreo sin forzar una paráfrasis excesiva.
