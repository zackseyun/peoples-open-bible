    rationale: Aunque comprensible, en español suena más natural «haces la guerra contra» o «combates». Dado el registro, «haces la guerra contra» conserva mejor la imaginería bélica del verbo πολεμεῖς.
  - severity: low
    issue: «los que son reverentes hacia Dios» suena algo estático y tieso
    rationale: El participio εὐσεβοῦντας denota conducta de reverencia. «Los que actúan con reverencia hacia Dios» reproduce mejor el matiz dinámico y evita una formulación poco natural.
