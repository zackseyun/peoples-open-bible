base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/027/012.yaml
  text: And Achish trusted David[a], saying, “He has surely made himself odious among his people Israel[b], so he will be my servant forever.”
  footnotes:
  - marker: a
    text: Or, more idiomatically, “He has made himself utterly odious among his people in Israel.” The Hebrew literally says “made himself stink,” an idiom for becoming detestable.
    reason: lexical_alternative
  - marker: b
    text: “Servant” here may also be rendered “slave,” but the context suggests ongoing vassal-like service to Achish rather than emphasizing chattel status.
    reason: lexical_alternative
