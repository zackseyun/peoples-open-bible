translation:
  language: es
  text: 'Entonces me dijo[a]: «Profetiza al aliento; profetiza, hijo de hombre, y di al aliento: “Así dice el Señor Yahvé: Ven de entre los cuatro vientos, oh aliento, y sopla sobre estos muertos, para que vivan”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo רוּחַ puede significar aliento, viento o espíritu. Aquí se traduce como «aliento» en singular y como «vientos» en «los cuatro vientos»; alternativamente, puede entenderse «espíritu», preservando la imaginería en capas de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּבֵא
  english_pob_choice: Prophesy
  chosen_spanish: Profetiza
  alternatives_spanish:
  - Profetiza en voz profética
  - Habla proféticamente
  lexicon: HALOT
  rationale: Es el imperativo profético de נבא. «Profetiza» mantiene el acto de hablar como portavoz de Dios sin añadir explicación ni suavizar el mandato.
- source_word: הָרוּחַ / רוּחוֹת
  english_pob_choice: breath / winds
  chosen_spanish: espíritu / vientos
  alternatives_spanish:
  - aliento / vientos
  - espíritu / soplos
  - viento / vientos
  lexicon: HALOT
  rationale: En español, «espíritu» conserva la multivalencia de רוּחַ y permite la resonancia teológica y literaria; «vientos» traduce naturalmente מֵאַרְבַּע רוּחוֹת como una expresión direccional. La nota preserva la alternativa de «aliento» y la tensión semántica.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Ezequiel usa esta forma de manera característica como tratamiento divino al profeta. «Hijo de hombre» es la correspondencia más directa y reconocible en español, sin convertirlo en título cristológico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: Se conserva Yahvé según el estándar del proyecto. «Señor Yahvé» comunica el título compuesto de forma reverente y evita la convención de ocultar el nombre divino tras «SEÑOR».
- source_word: בֹּאִי
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Entra
  - Acércate
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a רוּחַ. «Ven» es la forma natural en español para la invocación breve y directa.
- source_word: וּפְחִי
  english_pob_choice: breathe on
  chosen_spanish: y sopla
  alternatives_spanish:
  - y sopla sobre
  - y alienta sobre
  - y respira sobre
  lexicon: HALOT
  rationale: נפח puede ser «soplar» o «respirar/alentar». En español «sopla» funciona de modo idiomático y conserva la acción vivificadora sobre los cuerpos; la preposición posterior con «sobre» explicita el objeto como en el hebreo.
- source_word: בַּהֲרוּגִים הָאֵלֶּה
  english_pob_choice: on these slain
  chosen_spanish: sobre estos muertos
  alternatives_spanish:
  - sobre estos caídos
  - sobre estos asesinados
  - sobre estos muertos yacentes
  lexicon: HALOT
  rationale: הֲרוּגִים significa literalmente «muertos por violencia / asesinados». «Muertos» es una opción publicable y natural en español; el contexto visionario ya indica que se trata de cadáveres, y la nota conserva la fuerza alternativa de «caídos»/«asesinados».
- source_word: וְיִחְיוּ
  english_pob_choice: so that they may live
  chosen_spanish: para que vivan
  alternatives_spanish:
  - y vivan
  - a fin de que vivan
  - para que tengan vida
  lexicon: HALOT
  rationale: El imperfecto con waw expresa propósito o resultado. «Para que vivan» es la fórmula más natural y exacta en español, preservando el efecto vivificante del mandato.
theological_decisions:
- issue: Multivalencia de רוּחַ en la visión del valle
  english_pob_reading: Render singular רוּחַ as 'breath' and plural רוּחוֹת as 'winds,' while preserving 'spirit' as an alternative in a footnote.
  chosen_spanish_reading: Traducir el singular como «espíritu» y el plural como «vientos», con nota que preserve «aliento» como alternativa.
  alternative_spanish_readings:
  - Traducir todo como «espíritu/espíritus»
  - Traducir todo como «aliento/alientos»
  - Traducir todo como «viento/vientos»
  rationale: En español, «espíritu» mantiene mejor la amplitud semántica de רוּחַ y la densidad de la escena profética, sin romper la relación con «los cuatro vientos». La nota deja explícita la alternativa de «aliento», de modo que no se borra la tensión léxica del hebreo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - Señor Dios
  rationale: El proyecto usa Yahvé para יְהוָה; en el título compuesto, «Señor Yahvé» refleja la combinación hebrea sin recurrir a la convención de sustitución por mayúsculas. Mantiene la reverencia y la transparencia textual.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado reportó alta concordancia. Esta versión corrige la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto, no «SEÑOR» en mayúsculas.
  - Se mantiene «hijo de hombre» para בן־אדם, sin reinterpretación cristológica.
  - Se preserva la tensión de רוּחַ con «espíritu» y «vientos», dejando la alternativa semántica en nota.
  - La sintaxis reproduce el imperativo profético directo del hebreo sin añadir explicaciones.
