revisions:
- from: Porque las flechas de Yahvé[a] están en mí; mi espíritu bebe su veneno[b]; los terrores de Dios se alinean contra mí[c].
  to: Porque las flechas del Todopoderoso[a] están en mí; mi espíritu bebe su veneno[b]; los terrores de Dios se alinean contra mí[c].
  rationale: Se corrige 'Yahvé' a 'del Todopoderoso' para reflejar fielmente שַׁדַּי y alinearse con la decisión lexical y teológica documentada. Se conservan el resto de las elecciones principales, con ajuste menor de notas para claridad, tipografía y correspondencia más precisa con el rastro POB.
