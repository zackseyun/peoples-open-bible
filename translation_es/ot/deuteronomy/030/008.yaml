translation:
  language: es
  text: Y tú volverás[a] y obedecerás la voz de Yahvé[b], y harás todos sus mandamientos que yo te estoy mandando hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te volverás atrás»; en contexto también puede llevar el sentido de retorno o arrepentimiento de pacto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «escuchar la voz de Yahvé»; este modismo a menudo implica obediencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y tú mismo
  - Y entonces tú
  lexicon: HALOT
  rationale: Se conserva el pronombre enfático explícito del hebreo sin forzar un matiz adversativo o temporal que el texto no exige.
- source_word: תָשׁוּב
  english_pob_choice: shall return
  chosen_spanish: volverás
  alternatives_spanish:
  - regresarás
  - te volverás
  lexicon: HALOT
  rationale: שׁוּב admite el sentido de volver/regresar. «Volverás» preserva la amplitud semántica de retorno sin resolverla en la traducción principal como arrepentimiento explícito.
- source_word: וְשָׁמַעְתָּ בְּקוֹל יְהוָה
  english_pob_choice: obey the voice of Yahweh
  chosen_spanish: obedecerás la voz de Yahvé
  alternatives_spanish:
  - escucharás la voz de Yahvé
  - oirás la voz de Yahvé
  lexicon: HALOT
  rationale: En Deuteronomio, שׁמע con בְּקוֹל suele implicar obediencia. El español «obedecer la voz de» conserva ese valor covenantal que la versión inglesa decidió explicitar en lugar de mantener una traducción más literal de «escuchar».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Nombre divino, preservando la referencia personal al Tetragrámaton en vez de sustituirla por un título.
- source_word: וְעָשִׂיתָ
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - cumplirás
  - llevarás a cabo
  lexicon: HALOT
  rationale: עָשָׂה es el verbo común «hacer». En español, «harás» es natural y mantiene la proximidad léxica sin introducir un glosado interpretativo como «guardar».
- source_word: כָּל מִצְוֺתָיו
  english_pob_choice: all his commandments
  chosen_spanish: todos sus mandamientos
  alternatives_spanish:
  - todos sus preceptos
  - todos sus órdenes
  lexicon: HALOT
  rationale: «Mandamientos» preserva el registro legal y de pacto de מִצְוֺת en Deuteronomio. El posesivo se refiere a Yahvé por el contexto inmediato.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te estoy mandando hoy
  alternatives_spanish:
  - que yo te mando hoy
  - que hoy te estoy mandando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inmediata; «te estoy mandando» conserva esa fuerza. Se mantiene «hoy» por su valor de marcador de obligación pactal deuteronómica.
theological_decisions:
- issue: Si שׁוּב debe resolverse como arrepentimiento explícito
  english_pob_reading: shall return
  chosen_spanish_reading: volverás
  alternative_spanish_readings:
  - te arrepentirás
  - volverás en arrepentimiento
  rationale: El contexto incluye restauración y obediencia, pero el verbo por sí solo no obliga a especificar arrepentimiento. «Volverás» preserva la tensión entre retorno físico, retorno de pacto y arrepentimiento sin cerrarla prematuramente.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica)
- issue: Si שׁמע בְּקוֹל debe convertirse en un verbo directo de obediencia o mantenerse más descriptivo
  english_pob_reading: obey the voice of Yahweh
  chosen_spanish_reading: obedecerás la voz de Yahvé
  alternative_spanish_readings:
  - escucharás la voz de Yahvé
  - oirás la voz de Yahvé
  rationale: La POB inglesa optó por explicitar el sentido de obediencia. En español, «obedecer la voz de» comunica esa misma implicación sin perder el vínculo con la fórmula hebrea de escuchar/atender la voz.
  doctrine_reference: Translation philosophy §1 y §3
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «listen to the voice of the LORD» a «obey the voice of the LORD» para reflejar el valor covenantal de שָׁמַע בְּקוֹל. La redacción española adopta esa decisión, pero conserva la transparencia semántica de «obedecer la voz de Yahvé» sin perder la conexión con el modismo hebreo subyacente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estable para יְהוָה, conforme a las directrices del proyecto.
  - Se prefiere «mandamientos» para מִצְוֺת en coherencia con el registro legal de Deuteronomio.
  - «Volverás» se mantiene deliberadamente amplio para no resolver שׁוּב en arrepentimiento explícito.
  - La nota al pie marca la alternativa literal de «escuchar la voz», preservando el matiz idiomático del hebreo.
