translation:
  language: es
  text: Y estarán puestos sobre Aarón y sobre sus hijos cuando entren en la tienda de reunión, o cuando se acerquen al altar para ministrar en el lugar santo, para que no lleven culpa y mueran[a]. Será estatuto perpetuo para él y para su descendencia después de él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘incurran en culpa’; el hebreo ‘lleven culpa’ es un modismo legal-cultual.
    reason: lexical_alternative
  - marker: b
    text: O ‘estatuto permanente’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And they shall be
  chosen_spanish: Y estarán
  alternatives_spanish:
  - Y serán
  - Y deberán estar
  lexicon: HALOT 1961
  rationale: En una norma sacerdotal, el verbo expresa estado prescriptivo sobre las vestiduras; ‘estarán’ conserva la idea de disposición obligatoria sin volverse rígidamente literal.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre
  lexicon: HALOT 5921
  rationale: Aquí indica las vestiduras puestas encima de Aarón y sus hijos; ‘sobre’ es natural en español y mantiene la imagen física.
- source_word: בְּבֹאָם
  english_pob_choice: when they enter
  chosen_spanish: cuando entren
  alternatives_spanish:
  - cuando ingresen
  - al entrar
  lexicon: HALOT 935
  rationale: El infinitivo con prefijo expresa circunstancia temporal; ‘cuando entren’ comunica bien el valor temporal y el movimiento de acceso al recinto sagrado.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT 168, 4150
  rationale: ‘Tienda de reunión’ sigue de cerca la forma hebrea y es comprensible en español, preservando el carácter técnico del lugar de encuentro cultual.
- source_word: בְגִשְׁתָּם
  english_pob_choice: when they approach
  chosen_spanish: cuando se acerquen
  alternatives_spanish:
  - cuando se aproximen
  - al acercarse
  lexicon: HALOT 5066
  rationale: El verbo denota acercamiento para servicio sagrado; ‘se acerquen’ es claro y conserva el registro formal.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  lexicon: HALOT 4196
  rationale: ‘Altar’ es la equivalencia directa y estándar en español para el altar sacrificial.
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer su ministerio
  lexicon: HALOT 8334
  rationale: En contexto sacerdotal, ‘ministrar’ conserva el matiz cultual de servicio sagrado; evita reducirlo a un ‘servir’ demasiado general.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santuario
  - en lo santo
  lexicon: HALOT 6944
  rationale: ‘Lugar santo’ mantiene el lenguaje de santidad del texto y resulta natural en español bíblico sin borrar la referencia al ámbito sagrado.
- source_word: וְלֹא יִשְׂאוּ עָוֺן
  english_pob_choice: so that they may not bear guilt
  chosen_spanish: para que no lleven culpa
  alternatives_spanish:
  - para que no carguen culpa
  - para que no incurran en culpa
  lexicon: HALOT 5375, 5771
  rationale: Se conserva el idiomático ‘llevar culpa’, equivalente al hebreo ‘bear guilt’; ‘culpa’ comunica la responsabilidad legal-cultual sin atenuarla.
- source_word: וָמֵתוּ
  english_pob_choice: and die
  chosen_spanish: y mueran
  alternatives_spanish:
  - y mueran
  - y morirán
  lexicon: HALOT 4191
  rationale: La coordinación final expresa la consecuencia grave por una aproximación indebida; el subjuntivo en la cláusula final responde al valor preventivo de la construcción.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto permanente
  - ordenanza perpetua
  lexicon: HALOT 2708, 5769
  rationale: ‘Estatuto perpetuo’ reproduce con precisión el carácter normativo y duradero de la fórmula legal hebrea. ‘Perpetuo’ preserva mejor la solemnidad que ‘permanente’.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - sus descendientes
  lexicon: HALOT 2233
  rationale: ‘Descendencia’ mantiene el valor colectivo del sustantivo hebreo y evita una lectura excesivamente biológica o singular.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - a continuación de él
  lexicon: HALOT 310
  rationale: Expresa la sucesión genealógica de manera natural en español, manteniendo el orden temporal del hebreo.
theological_decisions:
- issue: Cláusula legal-cultual de culpa y muerte
  english_pob_reading: The text states that the prescribed garments are required so the priests do not bear guilt and die.
  chosen_spanish_reading: El texto afirma que las vestiduras prescritas son necesarias para que los sacerdotes no lleven culpa y mueran.
  alternative_spanish_readings:
  - '...para que no incurran en culpa y mueran.'
  - '...a fin de que no carguen culpa y mueran.'
  rationale: 'Se conserva la tensión teológica del hebreo: el acceso al ámbito santo está regulado por una exigencia real, y la consecuencia no se suaviza. La formulación española mantiene el nexo entre santidad, responsabilidad y muerte sin domesticar el aviso.'
  doctrine_reference: Mantener la tensión teológica y legal del texto; santidad divina y responsabilidad sacerdotal.
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa de alta concordancia: no se introdujeron revisiones posteriores y la traducción mantiene el valor prescriptivo, el modismo legal de ‘llevar culpa’ y la fórmula de estatuto duradero.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando el texto lo requiera; en este versículo no aparece.
  - ‘Tienda de reunión’ y ‘lugar santo’ conservan la terminología cultual de forma consistente con el proyecto.
  - ‘Ministrar’ se usa en sentido sacerdotal, no como calco de ‘minister’ moderno.
  - ‘Llevar culpa’ preserva el modismo hebreo sin reemplazarlo por un equivalente interpretativo más débil.
