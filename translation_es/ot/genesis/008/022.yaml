translation:
  language: es
  text: Mientras la tierra permanezca[a], siembra y cosecha, frío y calor, verano e invierno[b], y día y noche no cesarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «todos los días de la tierra».
    reason: lexical_alternative
  - marker: b
    text: 'O: «Mientras duren todos los días de la tierra».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹד כָּל יְמֵי הָאָרֶץ
  english_pob_choice: For as long as the earth endures
  chosen_spanish: Mientras la tierra permanezca
  alternatives_spanish:
  - Mientras duren todos los días de la tierra
  - Por todo el tiempo que la tierra dure
  lexicon: HALOT
  rationale: La construcción hebrea expresa duración limitada al período de la tierra; en español, «Mientras la tierra permanezca» comunica con naturalidad ese marco temporal sin ampliar la promesa más allá de lo que el hebreo dice.
- source_word: זֶרַע
  english_pob_choice: seedtime
  chosen_spanish: siembra
  alternatives_spanish:
  - tiempo de siembra
  - sementera
  lexicon: HALOT
  rationale: En paralelo con קָצִיר, aquí designa la actividad o estación de sembrar, no la semilla como objeto. «Siembra» es claro, breve y acorde con el par agrícola.
- source_word: קָצִיר
  english_pob_choice: harvest
  chosen_spanish: cosecha
  alternatives_spanish:
  - siega
  - recolección
  lexicon: HALOT
  rationale: «Cosecha» es el equivalente agrícola más natural en español y mantiene el paralelismo con «siembra».
- source_word: קֹר
  english_pob_choice: cold
  chosen_spanish: frío
  alternatives_spanish:
  - frialdad
  - baja temperatura
  lexicon: HALOT
  rationale: El sustantivo nombra el frío como opuesto de calor; «frío» conserva esa oposición directa y es idiomático.
- source_word: חֹם
  english_pob_choice: heat
  chosen_spanish: calor
  alternatives_spanish:
  - ardor
  - temperatura alta
  lexicon: HALOT
  rationale: «Calor» es el antónimo natural de «frío» y refleja bien el contraste climático del texto.
- source_word: קַיִץ
  english_pob_choice: summer
  chosen_spanish: verano
  alternatives_spanish:
  - estío
  - temporada seca
  lexicon: HALOT
  rationale: Aunque en algunos contextos puede sugerir estación seca, aquí el contraste estacional estándar se expresa mejor con «verano».
- source_word: חֹרֶף
  english_pob_choice: winter
  chosen_spanish: invierno
  alternatives_spanish:
  - época de lluvias
  - estación fría
  lexicon: HALOT
  rationale: «Invierno» es el equivalente español más claro para la estación opuesta a verano, preservando el paralelismo del hebreo.
- source_word: יוֹם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  lexicon: HALOT
  rationale: La pareja fija de ciclos temporales se expresa de forma directa con «día y noche», manteniendo el ritmo y sentido de continuidad.
- source_word: לֹא יִשְׁבֹּתוּ
  english_pob_choice: shall not cease
  chosen_spanish: no cesarán
  alternatives_spanish:
  - no se detendrán
  - no descansarán
  lexicon: HALOT
  rationale: El verbo שׁבת significa cesar, detenerse. En este contexto de ciclos recurrentes, «no cesarán» es preciso y natural; evita la ambigüedad de «descansarán».
theological_decisions:
- issue: Alcance temporal de la promesa sobre los ciclos creados
  english_pob_reading: The verse describes the continuing stability of the earth's ordinary cycles for as long as the earth endures, without specifying an absolute metaphysical claim about eternity.
  chosen_spanish_reading: El versículo describe la continuidad estable de los ciclos ordinarios de la tierra mientras la tierra permanezca, sin convertirlo en una afirmación metafísica absoluta sobre la eternidad.
  alternative_spanish_readings:
  - Una promesa universal de que estos ciclos continuarán para siempre sin matiz temporal
  - Una lectura meramente poética sin valor afirmativo
  rationale: La frase hebrea כָּל יְמֵי הָאָרֶץ limita naturalmente la declaración al tiempo de la tierra. La traducción mantiene esa restricción y no la exagera a una eternidad sin matices, preservando la tensión textual.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión de estilo de una formulación redundante a una más natural; en español se siguió ese mismo principio, optando por una frase temporal concisa («Mientras la tierra permanezca») que conserva la limitación temporal del hebreo. No se detectaron cambios doctrinales posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto cuando corresponda; en este versículo no aparece explícitamente.
  - 'Se eligieron pares léxicos simétricos para conservar el paralelismo hebreo: siembra/cosecha, frío/calor, verano/invierno, día/noche.'
  - «No cesarán» refleja mejor el valor de שׁבת que una traducción de descanso físico.
  - La nota a pie a explica la literalidad de «todos los días de la tierra» sin sobrecargar el texto principal.
  - La nota b preserva la alternativa de lectura temporal que el audit trail inglés documenta.
