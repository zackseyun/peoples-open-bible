translation:
  text: |-
    For you know the holy Scriptures—and know them well, beloved—and you have bent closely over the sayings of God. Therefore we write these things for your remembrance.
    
    2. For when Moses had gone up onto the mountain and had spent forty days and forty nights in fasting and self-abasement, God said to him, “Moses, Moses, come down quickly from here, because your people, whom you brought out of the land of Egypt, have acted lawlessly. They have quickly turned aside from the way that you commanded them; they have made molten images for themselves.”
    
    3. And the Lord said to him, “I have spoken to you once and twice, saying, ‘I have seen this people, and behold, it is stiff-necked. Let me utterly destroy them, and I will blot out their name from under heaven; and I will make you into a nation great and marvelous and far greater than this one.’”
    
    4. And Moses said, “By no means, Lord. Forgive the sin of this people—or else blot me out from the book of the living.”
    
    5. O great love! O unsurpassable perfection! A servant speaks boldly to his Lord, asks forgiveness for the multitude, or even pleads to be blotted out with them.
