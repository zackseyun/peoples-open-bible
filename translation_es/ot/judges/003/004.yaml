    reason: lexical_alternative
  - marker: b
    text: Aquí «escucharían» tiene el sentido de prestar atención con obediencia; es decir, obedecer los mandamientos de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sus padres»; es decir, sus antepasados o forefathers.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula relativa para reflejar con mayor precisión la sintaxis hebrea y se devuelve שׁמע a una forma más cercana al original ('escucharían') con nota aclaratoria de obediencia. Se mantiene 'Yahvé' y la nota instrumental sobre בָּם. También se simplifica 'había mandado' a 'mandó' para mayor naturalidad y fidelidad.
