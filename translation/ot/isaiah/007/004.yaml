  chosen_reading: Retained the image 'smoldering stubs of firebrands' in the main text
  alternative_readings:
  - Rendered more dynamically as 'two dying threats'
  rationale: The verse's theological and rhetorical force lies in God's assessment that the feared kings are dangerous-looking but nearly spent. Preserving the metaphor maintains prophetic imagery and divine irony without over-paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
