review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato a Moisés, destinatario «los hijos de Israel», cláusula temporal «cuando entren», «la tierra», y la dádiva divina en presente. Sin embargo, hay un desajuste importante en la persona posesiva de מוֹשְׁבֹתֵיכֶם: el hebreo dice «sus/vuestras moradas» dirigido a la segunda persona plural, por lo que en español debe concordar con «entren» y no con una tercera persona referencial desligada. También conviene mejorar la nota a para que ofrezca alternativas reales, ya que actualmente repite la misma expresión.'
  spanish_quality_summary: El español es legible y digno, pero «la tierra de sus moradas» suena menos natural en este contexto por la discordancia con el tratamiento verbal. «La tierra de sus moradas» puede entenderse, pero con «entren» se espera «sus» si se mantiene ustedes; mejor aún, una formulación más natural y fiel es «la tierra donde habitarán» o «la tierra de sus moradas» con concordancia consistente. La nota a necesita corrección editorial.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Los hijos de Israel» coincide con la decisión documentada para בְּנֵי יִשְׂרָאֵל. «La tierra» preserva la carga pactal de אֶרֶץ. «Que yo les doy» es aceptable para נֹתֵן, aunque «que yo les estoy dando» sería más explícito; no es necesario forzar el progresivo en español. La principal corrección es la concordancia y la presentación de alternativas en las notas.
  issues:
  - severity: medium
    issue: Discordancia de tratamiento/persona en «la tierra de sus moradas»
    rationale: El hebreo מוֹשְׁבֹתֵיכֶם lleva sufijo de segunda persona plural («vuestras/sus [de ustedes] moradas»). Dado que el verbo está en segunda persona plural («entren»), conviene mantener esa referencia de manera clara en español. La formulación actual puede leerse como tercera persona ajena al destinatario.
  - severity: low
    issue: La nota [a] no ofrece una alternativa real
    rationale: Dice «O “los hijos de Israel”» y luego «el hebreo es literalmente “los hijos de Israel”», repitiendo la misma forma. Debe reflejar las alternativas documentadas por el POB inglés, como «los israelitas» o «los hijos de Israel» frente a otra opción principal.
  - severity: low
    issue: La frase principal puede sonar más natural en español manteniendo la fidelidad
    rationale: La construcción literal «la tierra de sus moradas» es posible, pero el propio rastro inglés preserva alternativas. En español bíblico claro, «la tierra donde habitarán» comunica bien la idea sin perder el contenido léxico, y puede dejar la opción más literal en nota.
  revised_spanish_text: 'Habla a los hijos de Israel y diles[a]: «Cuando entren en la tierra donde habitarán[b], que yo les doy»'
  revised_footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo es literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra de sus moradas» o «la tierra de sus asentamientos».
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión de מוֹשְׁבֹתֵיכֶם para evitar la discordancia de persona y mejorar la naturalidad en español, usando una alternativa ya contemplada por el rastro inglés («donde habitarán»), mientras la formulación más literal queda preservada en nota. También se repara la nota [a] para que ofrezca alternativas genuinas y no repita la misma frase. No se requiere adjudicación especial.
