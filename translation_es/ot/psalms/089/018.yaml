    rationale: El hebreo tiene sufijo 3mp y el POB inglés documentó como decisión importante preservar «their strength» frente a una posible armonización. En español, «su» no distingue singular/plural, por lo que el borrador no conserva de manera suficientemente auditable esa elección.
  - severity: low
