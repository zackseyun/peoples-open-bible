lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca secuencia temporal y lógica; «Entonces» es natural en español y conserva el avance narrativo del salmo.
- source_word: יְדַבֵּר
  english_pob_choice: he will speak
  chosen_spanish: él les hablará
  alternatives_spanish:
  - él declarará a ellos
  - él les dirá
  lexicon: HALOT
  rationale: El verbo pi'el de דבר admite la idea de hablar o dirigirse a alguien. En este contexto, «les hablará» mantiene el valor verbal sin introducir una formulación más interpretativa como «declarará».
- source_word: אֵלֵימוֹ
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural de tercera persona se refiere a los reyes y gobernantes rebeldes del contexto anterior. En español, el dativo clítico «les» suena natural y preserva la referencia.
- source_word: בְאַפּוֹ
  english_pob_choice: in his anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su enojo
  - en su furor
  lexicon: HALOT
  rationale: אַף idiomáticamente significa ira/enojo. «Ira» es más solemne y bíblica que «enojo», y mantiene la tensión judicial del texto.
- source_word: וּבַחֲרוֹנֹו
  english_pob_choice: and in his burning wrath
  chosen_spanish: y en su ardor de furor
  alternatives_spanish:
  - y en el ardor de su ira
  - y en su furia ardiente
  lexicon: HALOT
  rationale: חֲרוֹן expresa ira encendida o ardiente. «Ardor de furor» intenta conservar la intensificación por calor/fuego sin repetir simplemente «ira»; así se distingue del primer término y se mantiene la imagen de ardor.
- source_word: יְבַהֲלֵמוֹ
  english_pob_choice: he will terrify them
  chosen_spanish: los aterrará
  alternatives_spanish:
  - los espantará
  - los dismayerá
  lexicon: HALOT
  rationale: בהל en pi'el transmite causar sobresalto, pánico o dismay. «Aterrará» capta bien el impacto de terror/júbilo tembloroso y es más fuerte que «dismayar» en español común.
theological_decisions:
- issue: Lenguaje antropopático de la ira divina
  english_pob_reading: Retain the language of God's anger and burning wrath as stated in the text without softening it into mere displeasure.
  chosen_spanish_reading: Conservar el lenguaje de la ira y el ardor de furor de Dios sin suavizarlo en una simple desaprobación.
  alternative_spanish_readings:
  - Entonces lo corregirá con su desagrado
  - Entonces los inquietará con su juicio
  rationale: El hebreo presenta oposición judicial real ante la rebelión. La traducción debe preservar esa carga teológica, no resolverla ni atenuarla. El español propuesto mantiene el peso del juicio divino tal como aparece en el texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión sustantiva; se conserva la progresión temporal, la doble expresión de ira y el efecto de terror/dismay del verbo final.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo o el contexto lo requieran; este versículo no lo contiene.
  - Se mantuvo «ira» para אַף y se distinguió la intensificación de חֲרוֹן con una segunda expresión ardiente.
  - Se prefirió un español bíblico claro y actual, evitando calcos rígidos como «en su nariz».
