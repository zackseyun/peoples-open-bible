translation:
  language: es
  text: Y como viajaban desde el oriente[a], hallaron una llanura en la tierra de Sinar y se establecieron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras viajaban hacia el oriente». La expresión hebrea מִקֶּדֶם puede entenderse como origen («desde el oriente») o como dirección («hacia el oriente»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And as it happened / And as
  chosen_spanish: Y como
  alternatives_spanish:
  - Y aconteció que
  - Y cuando
  lexicon: HALOT
  rationale: La forma hebrea introduce la circunstancia de la acción siguiente. En español, «Y como» integra esa función temporal/circunstancial sin forzar una fórmula más pesada.
- source_word: בְּנָסְעָם
  english_pob_choice: as they journeyed
  chosen_spanish: viajaban
  alternatives_spanish:
  - mientras viajaban
  - cuando viajaban
  - migraban
  lexicon: HALOT
  rationale: נסע expresa el acto de ponerse en marcha / viajar. «Viajaban» mantiene el sentido de movimiento continuo y evita sobrerinterpretar como «migraban».
- source_word: מִקֶּדֶם
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - del oriente
  - hacia el oriente
  - desde el este
  lexicon: HALOT
  rationale: La preposición מִ con קדם favorece el valor de origen («desde»). «Oriente» es un término claro y digno en español bíblico, y conserva la ambigüedad básica entre procedencia y dirección.
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - dieron con
  lexicon: HALOT
  rationale: מצא significa «hallar/encontrar». «Hallaron» suena natural en registro bíblico y refleja bien la acción de descubrir la llanura.
- source_word: בִקְעָה
  english_pob_choice: a plain
  chosen_spanish: una llanura
  alternatives_spanish:
  - una planicie
  - un valle amplio
  lexicon: HALOT
  rationale: בִקְעָה puede referirse a una llanura o valle amplio. «Llanura» es la opción más clara y natural en español para este contexto geográfico.
- source_word: בְּאֶרֶץ שִׁנְעָר
  english_pob_choice: in the land of Shinar
  chosen_spanish: en la tierra de Sinar
  alternatives_spanish:
  - en el país de Sinar
  - en la región de Sinar
  lexicon: HALOT
  rationale: Se conserva el sustantivo geográfico «tierra» para reflejar אֶרֶץ sin perder fluidez. «Sinar» mantiene la transliteración del topónimo.
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: and settled there
  chosen_spanish: y se establecieron allí
  alternatives_spanish:
  - y habitaron allí
  - y moraron allí
  lexicon: HALOT
  rationale: ישב en este contexto sugiere fijar residencia tras el viaje. «Se establecieron» comunica tanto la residencia como el cese del desplazamiento.
theological_decisions:
- issue: Ambigüedad de מִקֶּדֶם (origen vs. dirección)
  english_pob_reading: from the east, with a footnote allowing eastward
  chosen_spanish_reading: desde el oriente, con nota que deja abierta la lectura direccional implícita
  alternative_spanish_readings:
  - del oriente
  - hacia el oriente
  - desde el este
  rationale: 'El hebreo admite dos lecturas: procedencia («desde») o dirección («hacia/orientado al este»). La preposición con מ favorece la procedencia, pero la nota evita cerrar indebidamente la ambigüedad documentada.'
  doctrine_reference: Sin implicación doctrinal directa; decisión de semántica y geografía textual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió «journeyed» sobre «migrated» por ser más natural y formal; por eso se eligió «viajaban» en lugar de un verbo más técnico o interpretativo. También se preservó la nota de ambigüedad de מִקֶּדֶם en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se prefirió un español bíblico digno y moderno: «hallaron», «llanura», «se establecieron».'
  - No se empleó «Cristo» ni terminología teológica ajena al pasaje; la nota se limita a la ambigüedad geográfica del hebreo.
