base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/023.yaml
  text: Do I take any pleasure at all in the death of the wicked? declares the Lord GOD[c][b][a]. Is it not rather in his turning from his ways and living?
  footnotes:
  - marker: a
    text: Or 'Do I indeed delight in the death of the wicked?' The Hebrew verb can express pleasure, delight, or desire.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'declares the Lord GOD' (אֲדֹנָי יְהוִה). The divine name יְהוָה is normally rendered 'the LORD'; in this compound title English convention uses 'GOD' to avoid 'Lord LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when he turns from his ways and lives.'
    reason: alternative_reading
