revisions:
- from: Y abandonaron a Yahvé[a], el Dios de sus padres, que los había sacado de la tierra de Egipto; y fueron tras otros dioses, de entre los dioses de los pueblos que estaban alrededor de ellos, y se postraron ante ellos, y provocaron a Yahvé a ira.
  to: Y abandonaron a Yahvé[a], el Dios de sus padres, que los había sacado de la tierra de Egipto, y fueron tras otros dioses, de entre los dioses de los pueblos que estaban alrededor de ellos, y se postraron ante ellos, y provocaron a ira a Yahvé.
