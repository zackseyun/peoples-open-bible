translation:
  language: es
  text: Mayor que todas estas cosas es la sabiduría[a], y la verdad ha prevalecido desde la eternidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado puede leerse más literalmente: «Más que todas estas cosas la sabiduría es grande», mientras que el griego paralelo dice: «Antes de todas las cosas fue creada la sabiduría».'
    reason: alternative_reading
  - marker: b
    text: 'La segunda línea del hebreo dice: «y la verdad ha prevalecido desde la eternidad», mientras que el griego lee: «y el entendimiento de la prudencia es desde la eternidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: προτέρα πάντων / מִכָּל אֵלֶּה
  english_pob_choice: Before all these
  chosen_spanish: Antes que todo lo demás
  alternatives_spanish:
  - Más que todo lo demás
  - Antes de todo lo demás
  lexicon: HALOT; BDAG
  rationale: La evidencia griega apunta a prioridad temporal (προτέρα πάντων), mientras que el hebreo conservado tiene una comparación más ambigua. En español, 'Antes que todo lo demás' mantiene la prioridad sin sonar tan rígido como una calca literal.
- source_word: ἔκτισται
  english_pob_choice: was created
  chosen_spanish: fue creada
  alternatives_spanish:
  - fue hecha
  - fue establecida
  lexicon: BDAG
  rationale: El griego usa un pasivo perfecto de κτίζω, y el contexto de sabiduría personificada admite un español directo y digno. 'Fue creada' preserva la fuerza lexical sin suavizarla.
- source_word: σοφία / הַחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT; BDAG
  rationale: '''Sabiduría'' es la equivalencia normal y conserva la personificación implícita del texto sin necesidad de mayúscula editorial.'
- source_word: σύνεσις φρονήσεως / הָאֱמֶת
  english_pob_choice: true understanding / truth
  chosen_spanish: el verdadero entendimiento
  alternatives_spanish:
  - el entendimiento verdadero
  - la verdad
  lexicon: BDAG; HALOT
  rationale: El griego ofrece un sintagma de comprensión/discernimiento, mientras que el hebreo conservado dice 'la verdad'. En español, 'verdadero entendimiento' permite reflejar la línea griega sin perder del todo el valor conceptual de la verdad, que queda anotado como alternativa textual.
- source_word: ἐξ αἰῶνος / מֵעוֹלָם
  english_pob_choice: from eternity
  chosen_spanish: desde la eternidad
  alternatives_spanish:
  - desde siempre
  - desde la antigüedad
  lexicon: HALOT; BDAG
  rationale: La expresión comunica anterioridad ilimitada. 'Desde la eternidad' es natural en español bíblico contemporáneo y mantiene el sentido temporal-amplio del griego y el hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en ambos miembros
  english_pob_reading: Main text follows the Greek verse structure and core sense, while allowing the Hebrew witness to inform wording where possible.
  chosen_spanish_reading: El texto principal sigue el sentido griego, con nota que preserva la lectura hebrea alternativa.
  alternative_spanish_readings:
  - Más que todo lo demás, la sabiduría es grande, y la verdad ha prevalecido desde la eternidad.
  rationale: El hebreo de Kahana está marcado como texto extant y difiere sustancialmente del griego. Para una traducción auditada, conviene dejar visible la tensión en lugar de fusionarla sin aviso. El español principal refleja la prioridad temporal y la creación de la sabiduría, mientras la nota registra la lectura hebrea.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: La redacción responde al contexto de revisión más reciente, que privilegiaba una lectura más hebrea ('Greater than all these...'), pero aquí se opta por una solución auditada que mantiene visible la divergencia hebreo-griego y conserva el peso del paralelo griego en el texto principal con notas explícitas.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' en minúscula por tratarse de una personificación sin capitalización obligatoria.
  - '''Desde la eternidad'' se usa de manera consistente para ἐξ αἰῶνος / מֵעוֹלָם.'
  - No se sustituye 'sabiduría' por términos doctrinales tradicionales que oscurecerían la tensión textual.
