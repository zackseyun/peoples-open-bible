translation:
  language: es
  text: Escúchenme y reciban entendimiento[a], y pongan su corazón en mis palabras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Variante griega: «Escúchame, hijo, y aprende conocimiento»; el testimonio hebreo no trae «hijo» y dice «reciban entendimiento».'
    reason: textual_variant
  - marker: b
    text: 'Hebreo más literalmente: «pongan su corazón en mis palabras»; compárese el griego: «presta atención con tu corazón a mis palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ / Ἄκουσόν μου
  english_pob_choice: Listen to me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Escúchenme atentamente
  lexicon: HALOT; LSJ
  rationale: El imperativo plural de שמע y el griego ἄκουσον expresan una exhortación a oír con atención. En español, «Escúchenme» comunica de forma natural tanto oír como prestar atención, sin perder el tono exhortativo.
- source_word: וּקְחוּ / μάθε
  english_pob_choice: receive understanding
  chosen_spanish: reciban entendimiento
  alternatives_spanish:
  - adquieran entendimiento
  - aprendan entendimiento
  lexicon: HALOT; LSJ
  rationale: El hebreo לקח aquí se entiende en sentido instructivo, y el paralelo griego μάθε apunta al aprendizaje. «Reciban entendimiento» conserva la receptividad de la instrucción y evita una traducción más mecánica como «tomen».
- source_word: שִׂכְלִי / ἐπιστήμην
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - conocimiento
  - prudencia
  - sabiduría
  lexicon: HALOT; LSJ
  rationale: שכל y ἐπιστήμη señalan una capacidad cognitiva, no solo información. «Entendimiento» mantiene ese campo semántico en español y suena natural en un contexto sapiencial.
- source_word: וְעַל דְבָרַי
  english_pob_choice: my words
  chosen_spanish: en mis palabras
  alternatives_spanish:
  - sobre mis palabras
  - para mis palabras
  lexicon: HALOT
  rationale: La preposición hebrea con el verbo siguiente da una idea de orientación hacia las palabras del hablante. En español, «en mis palabras» permite continuar naturalmente con la expresión idiomática del siguiente miembro.
- source_word: שִׂימוּ לֵב / πρόσεχε τῇ καρδίᾳ σου
  english_pob_choice: set your heart on
  chosen_spanish: pongan su corazón en
  alternatives_spanish:
  - pongan atención con su corazón en
  - presten atención con su corazón a
  - tengan presente
  lexicon: HALOT; LSJ
  rationale: El hebreo literalmente dice «pongan corazón», y el griego mantiene la referencia al corazón. «Pongan su corazón en» conserva la imagen idiomática y la antropología bíblica sin reducirla a un mero acto mental.
theological_decisions:
- issue: Presencia del vocativo añadido en la tradición griega
  english_pob_reading: The Hebrew witness lacks 'child'; the Greek reads 'child' and the English POB preserved this in a footnote.
  chosen_spanish_reading: El texto principal no incluye un vocativo filial explícito; la variante griega se conserva en nota.
  alternative_spanish_readings:
  - Escúchenme, hijo, y reciban entendimiento...
  - Escúchenme, hijo mío, y reciban entendimiento...
  rationale: El testimonio hebreo base no tiene un vocativo explícito, mientras que el griego sí añade τέκνον. Para respetar la primacía del testimonio hebreo donde está disponible, el cuerpo principal omite el vocativo y lo documenta como variante significativa.
  doctrine_reference: Primacía de las fuentes originales y preservación de la tensión textual
- issue: Imagen del corazón como facultad de atención
  english_pob_reading: Retain 'heart' explicitly
  chosen_spanish_reading: Conservar «corazón» de manera explícita
  alternative_spanish_readings:
  - presten atención
  - fíjense bien
  - mediten
  rationale: Tanto el hebreo como el griego usan lenguaje del corazón, por lo que conviene conservarlo en español. Así se preserva la concepción bíblica del corazón como centro de atención, voluntad y reflexión.
  doctrine_reference: Antropología bíblica; preservación del lenguaje figurado original
translation_notes:
  revision_awareness: 'Se tomó como base el testimonio hebreo disponible y se contrastó con el paralelo griego. La redacción española sigue la preferencia del POB por una equivalencia óptima: preserva la exhortación, el matiz sapiencial de «entendimiento» y la imagen del corazón, mientras documenta en nota la variante griega con vocativo filial. También se armonizó el plural exhortativo en español para reflejar el hebreo plural.'
  spanish_consistency_notes:
  - Se usa «corazón» con sentido bíblico de facultad interior, no solo emoción.
  - Se eligió «entendimiento» para שִׂכְלִי / ἐπιστήμην por ser más neutral y fiel al campo semántico sapiencial.
  - La forma plural «Escúchenme / reciban / pongan» sigue el hebreo plural y mantiene el tono didáctico comunitario.
  - No se introdujo «Cristo», «SEÑOR» ni terminología eclesiástica ajena al pasaje.
