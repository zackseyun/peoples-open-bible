translation:
  language: es
  text: Fue más sabio que todos los hombres[a]—que Etán el ezrajita[b], y Hemán, Calcol y Darda, los hijos de Mahol—, y su nombre era conocido entre todas las naciones vecinas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que toda la humanidad». El hebreo אָדָם puede referirse a «hombre» o a la humanidad en general; aquí la lista de sabios varones favorece «todos los hombres».
    reason: lexical_alternative
  - marker: b
    text: «Ezrajita» puede reflejar una designación étnica o familiar; algunos la relacionan con «zeraíta».
    reason: lexical_alternative
  - marker: c
    text: 'O «su fama estaba entre todas las naciones vecinas». Literalmente: «su nombre estaba en todas las naciones de alrededor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחְכַּם
  english_pob_choice: He was wiser
  chosen_spanish: Fue más sabio
  alternatives_spanish:
  - Se hizo más sabio
  - Sobresalió en sabiduría
  lexicon: HALOT
  rationale: El hebreo expresa superioridad comparativa en sabiduría con un valor resultativo en contexto. «Fue más sabio» conserva la comparación y suena natural en español bíblico moderno.
- source_word: מִכָּל הָאָדָם
  english_pob_choice: than every man
  chosen_spanish: que todos los hombres
  alternatives_spanish:
  - que toda la humanidad
  - que toda persona
  lexicon: HALOT
  rationale: En este contexto hay una comparación con sabios nombrados varones; por eso «todos los hombres» refleja mejor el valor masculino del sustantivo colectivo אָדָם sin diluirlo en una neutralización que el contexto no exige.
- source_word: מֵאֵיתָן הָאֶזְרָחִי
  english_pob_choice: than Ethan the Ezrahite
  chosen_spanish: que Etán el ezrajita
  alternatives_spanish:
  - que Etán el ezrita
  - que Etán el zeraíta
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio y del gentilicio/título tradicionalmente incierto. «Ezrajita» conserva la forma auditable del hebreo sin decidir una etimología no obligada por el texto consonántico.
- source_word: וְהֵימָן וְכַלְכֹּל וְדַרְדַּע
  english_pob_choice: and Heman, Kalkol, and Darda
  chosen_spanish: Hemán, Calcol y Darda
  alternatives_spanish:
  - Hemán, Kalkol y Darda
  - Hemán, Calcol, y Darda
  lexicon: HALOT
  rationale: Son nombres propios; se transliteran de modo transparente. «Calcol» sigue la opción española tradicional más cercana a la forma hebrea, sin perder claridad.
- source_word: בְּנֵי מָחוֹל
  english_pob_choice: the sons of Mahol
  chosen_spanish: los hijos de Mahol
  alternatives_spanish:
  - los hijos de Maol
  - los descendientes de Mahol
  lexicon: HALOT
  rationale: La construcción se entiende de manera más natural como patronímico o designación familiar. «Hijos de Mahol» respeta esa lectura sin introducir la alternativa semántica de «baile», que el contexto no exige.
- source_word: וַיְהִי שְׁמוֹ
  english_pob_choice: his name was
  chosen_spanish: su nombre estaba
  alternatives_spanish:
  - su nombre era
  - su fama estaba
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su nombre fue/estuvo», un modismo de reputación. En español, «su nombre estaba» mantiene la imagen idiomática sin imponer todavía la glosa interpretativa de «fama» en el texto principal.
- source_word: בְכָל הַגּוֹיִם סָבִיב
  english_pob_choice: in all the surrounding nations
  chosen_spanish: en todas las naciones de alrededor
  alternatives_spanish:
  - entre todas las naciones de alrededor
  - en todas las naciones vecinas
  lexicon: HALOT
  rationale: גוֹיִם aquí apunta a pueblos/naciones circundantes en sentido geográfico. «Naciones de alrededor» conserva el espacio relacional del hebreo y evita la carga teológica posterior de «gentiles».
theological_decisions:
- issue: Valor de אָדָם en la comparación
  english_pob_reading: every man
  chosen_spanish_reading: todos los hombres
  alternative_spanish_readings:
  - toda la humanidad
  - toda persona
  rationale: Dado que la comparación se hace con sabios varones nombrados, el español puede preservar el matiz masculino del hebreo sin volverlo genérico moderno. Esto mantiene la precisión contextual y la coherencia con la lectura POB.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; contested term אָדָם'
- issue: Posible sentido de fama en שְׁמוֹ
  english_pob_reading: his name was / Or 'his fame was among all the surrounding nations.'
  chosen_spanish_reading: su nombre estaba en todas las naciones de alrededor
  alternative_spanish_readings:
  - su fama estaba en todas las naciones de alrededor
  - era conocido en todas las naciones de alrededor
  rationale: Se conserva primero el modismo hebreo «su nombre estaba», dejando abierta la inferencia de renombre. La alternativa de «fama» se reserva para nota, como en el audit trail inglés, para no sobreinterpretar el texto base.
  doctrine_reference: 'DOCTRINE.md: transparency in idioms and lexical ambiguity'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última pasada revisada del contexto inglés, que no requirió cambios. Se mantuvieron las mismas decisiones de comparación, transliteración y modismo de reputación, con adaptación natural al español y sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando corresponda al Tetragrámaton explícito; este versículo no lo contiene.
  - Se preserva la transliteración de nombres propios y el gentilicio incierto «ezrajita» para no fijar una etimología no obligada.
  - «Hijos de Mahol» se entiende aquí como designación familiar/patronímica, coherente con el flujo nominal de la lista.
  - La frase final mantiene el modismo hebreo del nombre/reputación y deja la expansión semántica para la nota, como en el audit trail inglés.
