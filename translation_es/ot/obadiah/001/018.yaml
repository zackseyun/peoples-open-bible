translation:
  language: es
  text: La casa de Jacob será fuego[a], y la casa de José, llama; y la casa de Esaú, rastrojo. Arderán contra ellos y los consumirán, y no quedará sobreviviente para la casa de Esaú[b], porque Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Les prenderán fuego y los consumirán». El hebreo de «arder contra/entre ellos» es compacto y puede entenderse más directamente como una acción hostil contra la casa de Esaú.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no quedará remanente». שָׂרִיד puede significar «sobreviviente» o «remanente»; se usa «sobreviviente» para no insinuar un remanente preservado de Esaú en un versículo que anuncia destrucción total.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית יַעֲקֹב
  english_pob_choice: the house of Jacob
  chosen_spanish: la casa de Jacob
  alternatives_spanish:
  - la familia de Jacob
  - el linaje de Jacob
  lexicon: HALOT
  rationale: Conserva el idiomático bíblico de בית con nombre patriarcal y la referencia corporativa/nacional, sin volverlo demasiado doméstico ni explicativo.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  - una llama
  lexicon: HALOT
  rationale: En español, el predicado nominal «ser fuego» suena natural y preserva la metáfora de poder destructivo; el artículo indefinido del inglés no es necesario aquí.
- source_word: בֵית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - la familia de José
  - el linaje de José
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «la casa de Jacob» y conserva el sentido colectivo de José/Efraín dentro de Israel.
- source_word: לֶהָבָה
  english_pob_choice: a flame
  chosen_spanish: llama
  alternatives_spanish:
  - una llama
  - flama
  lexicon: HALOT
  rationale: «Llama» es el correlato más natural de «fuego» en español y preserva la intensificación poética del paralelismo.
- source_word: בֵית עֵשָׂו
  english_pob_choice: the house of Esau
  chosen_spanish: la casa de Esaú
  alternatives_spanish:
  - la familia de Esaú
  - el linaje de Esaú
  lexicon: HALOT
  rationale: Conserva la fórmula profética y la referencia corporativa a Edom como descendencia de Esaú.
- source_word: לְקַשׁ
  english_pob_choice: stubble
  chosen_spanish: rastrojo
  alternatives_spanish:
  - paja
  - hojarasca seca
  lexicon: HALOT
  rationale: «Rastrojo» comunica combustible seco y desechable, manteniendo con precisión la imagen de algo que arde y desaparece pronto.
- source_word: וְדָלְקוּ בָהֶם
  english_pob_choice: They will burn them
  chosen_spanish: Ellos los incendiarán
  alternatives_spanish:
  - Arderán contra ellos
  - Arderán entre ellos
  - Les prenderán fuego
  lexicon: HALOT
  rationale: El hebreo compacto permite una lectura de acción hostil dirigida contra la casa de Esaú; «incendiarán» expresa esa causalidad con naturalidad en español y evita una ambigüedad pasiva.
- source_word: וַאֲכָלוּם
  english_pob_choice: and consume them
  chosen_spanish: y los consumirán
  alternatives_spanish:
  - y los devorarán
  - y los devorarán por completo
  lexicon: HALOT
  rationale: «Consumir» mantiene el campo semántico de consumir por fuego y preserva la idea de destrucción total sin agregar color interpretativo.
- source_word: שָׂרִיד
  english_pob_choice: survivor
  chosen_spanish: sobreviviente
  alternatives_spanish:
  - resto
  - remanente
  - uno que quede
  lexicon: HALOT
  rationale: Se prefiere «sobreviviente» para evitar la carga positiva que «remanente» suele tener en teología bíblica, preservando el sentido de ausencia total de los que quedan vivos.
- source_word: כִּי יְהוָה דִּבֵּר
  english_pob_choice: for Yahweh has spoken
  chosen_spanish: porque Yahvé ha hablado
  alternatives_spanish:
  - porque Yahvé lo ha dicho
  - pues Yahvé ha hablado
  lexicon: HALOT
  rationale: Sigue el convenio del proyecto para el Nombre divino y conserva la fórmula profética de certeza y autoridad con una expresión natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se aplica el estándar del proyecto para el Tetragrámaton, preservando la referencia al Nombre propio sin la convención de enmascaramiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido corporativo de «la casa de Jacob», «la casa de José» y «la casa de Esaú»
  english_pob_reading: Corporate/national entities within Israel acting together in judgment
  chosen_spanish_reading: 'Entidades corporativas y nacionales: Israel (Jacob/José) contra Edom (Esaú)'
  alternative_spanish_readings:
  - casas dinásticas estrictamente literales
  - imágenes espirituales sin referencia histórica
  rationale: La paralelismo del verso y el contexto de Abdías favorecen una lectura colectiva; la traducción mantiene el idioma bíblico sin disolverlo en una paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: שָׂרִיד en contexto de juicio total
  english_pob_reading: survivor
  chosen_spanish_reading: sobreviviente
  alternative_spanish_readings:
  - remanente
  - resto
  rationale: En un anuncio de destrucción, «sobreviviente» comunica mejor la ausencia de quien quede con vida y evita la connotación salvadora o eclesial que puede tener «remanente».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del expediente inglés: se prefirió una formulación más natural y directa para la acción de quemar/destruir, manteniendo el paralelismo poético y la clausula final de certeza profética sin introducir matices no sustentados por el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «casa de X» de forma consistente para reproducir el paralelismo del hebreo y el POB inglés.
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evitó «Cristo» y otras sustituciones tradicionales no pertinentes al texto.
  - «Sobreviviente» se eligió de manera consistente para שָׂרִיד, en lugar de «remanente», por el contexto de juicio total.
