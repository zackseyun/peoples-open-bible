review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: valor aditivo de וְגַם, fórmula pactual de הֲקִמֹתִי אֶת־בְּרִיתִי, propósito de לָתֵת לָהֶם, y la doble referencia a אֶרֶץ con Canaán y luego la tierra de su מגור. Sin embargo, ''peregrinación/peregrinaron'' desplaza el sentido de גור/מגור desde residencia como forasteros hacia viaje o romería, y por eso no preserva con suficiente precisión el matiz de estancia extranjera/temporal presente en la fuente y en el rastro inglés auditado.'
  spanish_quality_summary: La frase es fluida y digna, pero 'peregrinación' suena interpretativa y algo eclesial en un sentido que puede sugerir desplazamiento devocional más que residencia en tierra ajena. Una formulación con 'residencia como forasteros' o 'morada como forasteros' suena más precisa en español moderno y mantiene mejor la repetición léxica del hebreo. También conviene quitar la nota en 'establecí', porque la nota inglesa corresponde al sintagma final, no al verbo del pacto.
  glossary_alignment: '''mi pacto'' está bien alineado con ברית. No hay términos del glosario mayor en conflicto. El punto principal es גור/מגור: el proyecto inglés finalmente prefirió una representación más formal y cercana (''their sojourning, where they sojourned''); en español conviene evitar ''peregrinación'' y usar lenguaje de forastería/residencia temporal.'
  issues:
  - severity: high
    issue: '''peregrinación/peregrinaron'' no reproduce con precisión מגור/גור'
    rationale: En hebreo, el campo semántico apunta a residir como extranjero/forastero, no primariamente a viajar. 'Peregrinación' puede implicar trayecto o romería y debilita el matiz social de extranjería temporal.
  - severity: medium
    issue: La nota al pie está anclada en la palabra equivocada
    rationale: La nota inglesa explica el sintagma 'the land of their sojourning, where they sojourned', pero en el borrador el marcador [a] está en 'establecí'. El anclaje debe ir en la frase final relevante.
  - severity: low
    issue: La nota actual no añade una alternativa útil en español
    rationale: Tal como está, la nota repite esencialmente el propio texto. Si se conserva una nota, debe ofrecer una opción más literal o aclarar la relación léxica; de lo contrario, puede omitirse.
  revised_spanish_text: También establecí mi pacto con ellos, para darles la tierra de Canaán, la tierra de su residencia como forasteros[a], donde residieron como forasteros.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «la tierra de sus residencias como forasteros, en la cual residieron como forasteros».
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'peregrinación/peregrinaron' por 'residencia como forasteros/residieron como forasteros' para reflejar mejor מגור/גור como estancia en calidad de extranjero. Se movió la nota al sintagma final, donde corresponde según el audit trail inglés, y se formuló como alternativa más literal al plural implícito de מְגֻרֵיהֶם y la repetición verbal del hebreo.
