translation:
  language: es
  text: Amado de Dios y de los hombres[a] fue Moisés[b], cuya memoria sea para bendición[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «amado de Dios y de hombres». El paralelo griego usa ἀνθρώπων, «humanos / gente», lo que también podría expresarse como «de las personas»; se conserva «de los hombres» porque reproduce mejor la forma del texto base.
    reason: alternative_reading
  - marker: b
    text: 'El griego de esta sección es más amplio: añade que Dios «sacó de él un hombre de misericordia, que hallaba gracia ante los ojos de toda carne». Ese material no está en el testigo hebreo suministrado y por eso no se incorpora al texto principal.'
    reason: textual_variant
  - marker: c
    text: 'Más literalmente: «cuya memoria sea para bien». El griego paralelo, «su memorial en bendiciones», apoya el sentido idiomático de una memoria honrada y bendecida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אהוב / ἠγαπημένον
  english_pob_choice: Beloved
  chosen_spanish: Amado
  alternatives_spanish:
  - Amado
  - Amado de Dios
  lexicon: HALOT / LXX ἠγαπημένον
  rationale: El hebreo y el griego presentan un predicado pasivo/adjetival de amor. En español, «amado» conserva ese valor honorífico de manera natural; se evita una paráfrasis como «querido» por ser más débil y menos solemne.
- source_word: אלהים / θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  - de Dios
  lexicon: HALOT / BDAG
  rationale: El referente es el Dios de Israel. En español, «de Dios» expresa con claridad la relación pasiva del participio y mantiene el sentido reverencial sin necesidad de añadir explicaciones.
- source_word: ואנשים / ἀνθρώπων
  english_pob_choice: and men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de la gente
  - de los seres humanos
  lexicon: HALOT / LSJ
  rationale: La forma hebrea usa un plural masculino humano, y el paralelo griego amplía a ἀνθρώπων. «De los hombres» conserva la fuerza idiomática del texto base y refleja bien la pareja tradicional «Dios y hombres»; se evita neutralizarla más allá de lo que el texto exige.
- source_word: משה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio
  rationale: Transliteración estándar al español para el nombre propio.
- source_word: זכרו
  english_pob_choice: whose memory
  chosen_spanish: cuya memoria
  alternatives_spanish:
  - su memoria
  - su recuerdo
  - su memorial
  lexicon: HALOT
  rationale: El hebreo posee un sustantivo en relación posesiva; «cuya memoria» es el equivalente más natural y conserva el tono conmemorativo del pasaje. «Memorial» sería posible, pero en español suena más técnico y menos directo.
- source_word: לטובה / ἐν εὐλογίαις
  english_pob_choice: is for blessing
  chosen_spanish: es para bendición
  alternatives_spanish:
  - es para bien
  - es para buena memoria
  - es de bendición
  lexicon: HALOT / LXX
  rationale: La expresión hebrea es idiomática; el griego confirma un sentido de memoria celebrada con bendiciones. «Es para bendición» mantiene la concisión del original y la ambigüedad benéfica sin forzar una explicación interpretativa.
theological_decisions:
- issue: Alcance de la cláusula final sobre la memoria de Moisés
  english_pob_reading: whose memory is for blessing
  chosen_spanish_reading: cuya memoria es para bendición
  alternative_spanish_readings:
  - cuya memoria es bendita
  - cuya memoria es para bien
  - de quien se habla con bendición
  rationale: El hebreo no dice literalmente «bendita», sino una fórmula idiomática de recuerdo favorable. Traducirla como «es para bendición» preserva la frase y evita cerrar el sentido a una sola paráfrasis. El griego («en bendiciones») respalda esta lectura.
  doctrine_reference: 'PHILOSOPHY.md: conservar el sentido idiomático sin borrar la forma semítica.'
- issue: Relación entre el hebreo breve y el paralelo griego más amplio
  english_pob_reading: Translate the extant Hebrew clause directly, while allowing the Greek to clarify the idiom in זכרו לטובה.
  chosen_spanish_reading: Traducir solo la cláusula hebrea conservada, dejando que el griego ilumine el modismo final.
  alternative_spanish_readings:
  - Incluir al hombre de misericordia y el favor ante toda carne
  - Reducir la frase final a «su memoria es para bien»
  rationale: El testigo hebreo disponible es breve y debe gobernar la línea principal. El griego aporta claridad sobre el valor idiomático de la última frase, pero no debe expandirse el texto principal con material que no está en el hebreo suministrado.
  doctrine_reference: 'PHILOSOPHY.md: el hebreo es la base principal; el griego funciona como apoyo de control y clarificación.'
translation_notes:
  revision_awareness: 'El control cruzado indica alta concordancia entre el hebreo disponible y el paralelo griego, con una sola cuestión menor: el griego amplía el verso antes de nombrar a Moisés. La redacción española sigue el hebreo como texto base y usa el griego solo para confirmar y matizar el modismo final sobre la memoria.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אלהים/θεοῦ en contexto reverencial.
  - Se conserva «hombres» para ואנשים/ἀνθρώπων conforme a la forma masculina plural del hebreo y al tono tradicional de la pareja «Dios y hombres».
  - «Memoria» se usa para זכרו por su naturalidad en español bíblico y por el apoyo del paralelo griego; no se sustituye por «memorial» en el texto principal.
  - No se importan al texto principal las frases griegas ausentes del hebreo suministrado.
