revisions:
- from: Y el que la quema lavará sus vestidos en agua y lavará su cuerpo en agua[a], y estará impuro hasta la tarde[b].
  to: Y el que la quema lavará sus vestidos en agua y bañará su cuerpo en agua[a], y estará impuro hasta el atardecer[b].
  rationale: Se revisa para preservar en español la distinción léxica del hebreo entre lavar la ropa (כבס) y bañar/lavar el cuerpo (רחץ), tal como la auditoría inglesa la consideró significativa. También se ajusta 'hasta la tarde' a 'hasta el atardecer' para reflejar mejor עַד הָעָרֶב como límite temporal ritual. Las notas se conservan con anclajes correctos y en orden.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: sujeto sustantivado (''el que la quema''), lavado de ropa, lavado del cuerpo y estado de impureza hasta el final del día. Sin embargo, pierde el contraste léxico entre כבס (''lavar'' ropa) y רחץ (''bañar/lavar el cuerpo''), que el POB inglés preservó deliberadamente con ''wash'' / ''bathe''. Además, ''hasta la tarde'' es menos preciso para עַד הָעָרֶב que ''hasta el atardecer'' o ''hasta la noche''; el hebreo apunta al anochecer/la caída de la tarde como término ritual.'
  spanish_quality_summary: El español es claro y legible, pero 'lavará ... y lavará ...' suena algo plano y borra una distinción importante del original. 'Sus vestidos' es aceptable y digno, aunque algo menos natural que 'su ropa'; no requiere cambio. 'Impuro' con nota es adecuado. La redacción mejora con 'bañará su cuerpo' para reflejar la distinción verbal sin volverse coloquial.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. La decisión ''impuro'' para טמא es aceptable con nota ritual. La revisión recomendada se centra en fidelidad léxica: preservar la diferencia entre כבס y רחץ. También se ajusta mejor עֶרֶב con ''atardecer''.'
  issues:
  - severity: medium
    issue: Se perdió la distinción entre כבס y רחץ al usar 'lavará' en ambos casos.
    rationale: El hebreo diferencia el lavado de las vestiduras del baño/lavado del cuerpo. El POB inglés documentó esta decisión con 'wash' y 'bathe'. En español conviene reflejarla con 'lavará sus vestidos' y 'bañará su cuerpo'.
  - severity: medium
    issue: '''Hasta la tarde'' es una representación débil de עַד הָעָרֶב.'
    rationale: En legislación ritual, הָעָרֶב marca el límite temporal al llegar la tarde/anochecer. 'Hasta la tarde' puede sonar como una parte amplia del día ya iniciada; 'hasta el atardecer' comunica mejor el punto terminal.
  - severity: low
    issue: La nota [a] dice 'en el agua' como literal hebreo, mientras el texto principal usa 'en agua'.
    rationale: 'No es error grave, pero conviene mantener la nota tal como explica la alternativa ya documentada: el hebreo lleva artículo. La formulación actual de la nota es básicamente correcta y puede mantenerse.'
  revised_spanish_text: Y el que la quema lavará sus vestidos en agua y bañará su cuerpo en agua[a], y estará impuro hasta el atardecer[b].
  revised_footnotes:
