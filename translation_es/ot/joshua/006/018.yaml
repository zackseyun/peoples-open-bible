    reason: lexical_alternative
  - marker: c
    text: La misma raíz hebrea comunica aquí tanto las cosas prohibidas como el estado judicial resultante de quedar bajo esa misma dedicación a destrucción. Se mantiene la repetición para no ocultar esa relación.
    reason: theological_note
