lexical_decisions:
- source_word: Τίνι
  english_pob_choice: To whom
  chosen_spanish: ¿A quién...
  alternatives_spanish:
  - ¿Por quién...
  - ¿Para quién...
  lexicon: LSJ
  rationale: El dativo interrogativo impersonal se expresa de modo natural en español con «¿a quién...?», manteniendo la relación indirecta del griego sin forzar una pasiva no indicada por el texto.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: LSJ
  rationale: «Pues» conserva el matiz inferencial o continuativo de οὖν con fluidez en español bíblico actual.
- source_word: γνωστὸν ἐστὶν
  english_pob_choice: is it known
  chosen_spanish: le es conocido
  alternatives_spanish:
  - es sabido
  - se conoce
  lexicon: LSJ
  rationale: La construcción impersonal griega se vierte con una fórmula española igualmente impersonal. «Le es conocido» mantiene el valor de conocimiento disponible sin introducir un sujeto explícito.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: LSJ
  rationale: Introduce de manera directa la cláusula de contenido en español.
- source_word: οὐκ εἰσὶν
  english_pob_choice: they are not
  chosen_spanish: no son
  alternatives_spanish:
  - no existen como
  - no son en realidad
  lexicon: LSJ
  rationale: La cópula negada se expresa de forma simple y fiel. «No son» conserva la literalidad del griego y deja intacta la fuerza polémica del pasaje.
- source_word: θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  - ídolos
  lexicon: LSJ
  rationale: El plural θεοί se traduce por «dioses», que es transparente y mantiene el contraste idolátrico sin sustituirlo por una explicación interpretativa.
theological_decisions:
- issue: Polemica contra la idolatría y fuerza de la negación
  english_pob_reading: they are not gods
  chosen_spanish_reading: no son dioses
  alternative_spanish_readings:
  - no son verdaderos dioses
  - no son nada
  rationale: 'Se conserva la afirmación directa del griego sin intensificarla con una paráfrasis. Esto preserva la tensión teológica: el texto niega su condición de dioses, pero no desarrolla más la ontología de los ídolos.'
  doctrine_reference: Preservar la tensión teológica y la forma del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando toda nota al pie no anclada. La traducción mantiene el sentido literal del griego y conserva la pregunta retórica sin sobrecargarla con una glosa.
  spanish_consistency_notes:
  - Se usa «dioses» para θεοί, en coherencia con el plural griego y con el contexto de polémica idolátrica.
  - Se evita «SEÑOR» o cualquier sustitución teológica no presente en este versículo.
  - Se prefiere una construcción impersonal natural en español para γνωστὸν ἐστὶν, sin añadir sujeto explícito.
