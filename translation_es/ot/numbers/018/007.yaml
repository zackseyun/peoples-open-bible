  yaml_path: translation/ot/numbers/018/007.yaml
  text: But you and your sons with you shall keep your priesthood for everything concerning the altar and for what is within the veil[a], and you shall serve. I give your priesthood as a gift of service[b], but the outsider who comes near shall be put to death.
  footnotes:
  - marker: a
    text: Or 'the unauthorized person'; Hebrew 'the stranger/outsider' refers here to anyone not authorized to perform priestly duties, not specifically to a foreigner.
    reason: lexical_alternative
  - marker: b
    text: Or 'a service given as a gift.' The Hebrew phrase may emphasize either that the service is a gift or that the priesthood is granted as a gift for service.
    reason: lexical_alternative
