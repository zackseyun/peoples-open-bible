base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/003/003.yaml
  text: 'Now these are the foundations Solomon laid for building the house of God: the length in cubits[a], according to the former measure, was sixty cubits[c][b], and the width twenty cubits.'
  footnotes:
  - marker: a
    text: Or “Now this is what Solomon founded for building the house of God.” The Hebrew of 'foundations/founded' is somewhat difficult, and some translations render the clause more generally as Solomon’s plan or foundation for the temple.
    reason: lexical_alternative
  - marker: b
    text: “By the former measure” may refer to an older cubit standard.
    reason: cultural_note
  - marker: c
    text: Or 'the length, in cubits by the former measure, was sixty cubits'.
    reason: previous_rendering
