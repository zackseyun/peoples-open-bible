  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/Cristo u otros términos sensibles del glosario. Las decisiones «sayal» para שַׂק y «los cielos» para הַשָּׁמַיִם son compatibles con el expediente, aunque la nota alternativa debe alinearse mejor con el punto exacto del texto que comenta.
  issues:
  - severity: high
    issue: Marcador de nota [a] colocado en «sayal» en vez de en la cláusula sobre el agua desde los cielos.
    rationale: La nota [a] explica la alternativa de עַד נִתַּךְ מַיִם... ('hasta que llovió...'), no el término הַשַּׂק. Tal como está, induce al lector a pensar que la nota comenta «sayal», lo cual distorsiona la evidencia lexical.
  - severity: medium
    issue: La nota [b] sobre «la roca» es innecesaria y poco coherente con el expediente.
    rationale: El POB inglés no preservó una nota aquí, y la diferencia «sobre/en la roca» ya queda resuelta adecuadamente en el texto principal. Añadir esta nota introduce ruido sin necesidad textual o exegética suficiente.
  revised_spanish_text: Entonces Rizpa, la hija de Aya, tomó el sayal y lo extendió para sí sobre la roca, desde el comienzo de la cosecha hasta que se derramó agua sobre ellos desde los cielos[a]. Y no permitió que las aves del cielo descansaran sobre ellos de día, ni las fieras del campo de noche.
  revised_footnotes:
