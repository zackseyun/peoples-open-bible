translation:
  language: es
  text: Que vuelva el mal sobre mis adversarios[a]; en tu fidelidad[b], destrúyelos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El mal volverá sobre mis adversarios; en tu fidelidad los destruirás». El primer verbo puede leerse como indicativo más que como voluntativo, y «destrúyelos» corresponde al verbo final con mayor literalidad.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en tu verdad». La palabra hebrea puede significar verdad, confiabilidad o fidelidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ישוב
  english_pob_choice: May ... return
  chosen_spanish: Que vuelva
  alternatives_spanish:
  - Volverá
  - Que regrese
  lexicon: HALOT
  rationale: El verbo imperfecto qal de שוב admite lectura volitiva o indicativa. En el contexto de súplica del salmo, el español expresa mejor el matiz optativo con «Que vuelva», manteniendo la tensión entre oración y posible valor futuro sin resolverla de forma excesiva.
- source_word: הרע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el daño
  - la calamidad
  lexicon: HALOT
  rationale: רַע puede abarcar mal moral, daño o desgracia. «El mal» conserva la brevedad hebrea y permite el doble matiz de maldad y desastre retributivo, como en la decisión inglesa.
- source_word: לשררי
  english_pob_choice: upon my adversaries
  chosen_spanish: sobre mis adversarios
  alternatives_spanish:
  - sobre mis enemigos
  - contra los que me hostigan
  lexicon: HALOT
  rationale: El término designa oponentes hostiles. «Adversarios» es natural en español y suficientemente amplio, sin forzar una precisión militar que el hebreo no exige.
- source_word: באמתך
  english_pob_choice: in your faithfulness
  chosen_spanish: en tu fidelidad
  alternatives_spanish:
  - en tu verdad
  - por tu fidelidad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, confiabilidad o fidelidad. En un ruego dirigido a Dios, «fidelidad» comunica mejor la idea de lealtad pactual que sostiene la petición. La preposición ב se conserva con «en» para reflejar de cerca la construcción hebrea.
- source_word: הצמיתם
  english_pob_choice: destroy them
  chosen_spanish: destrúyelos
  alternatives_spanish:
  - arráncalos
  - extermínalos
  - pon fin a ellos
  lexicon: HALOT
  rationale: 'El hifil imperativo de צמת es fuerte: destruir, exterminar o acabar con. «Destrúyelos» reproduce con mayor precisión y naturalidad la fuerza del hebreo, como en la revisión inglesa más reciente.'
theological_decisions:
- issue: Fuerza imprecatoria y modo verbal
  english_pob_reading: Render the verse as a prayer for divine judgment rather than as a flat prediction.
  chosen_spanish_reading: 'Traducirlo como una súplica imprecatoria: una petición a Dios, no una mera predicción.'
  alternative_spanish_readings:
  - El mal volverá sobre mis adversarios; en tu fidelidad los destruirás.
  - Que el mal vuelva sobre mis adversarios; en tu fidelidad, destrúyelos.
  rationale: El salmo está en خطاب directo a Dios y el final funciona como imperativo. El español conserva esa tensión orante con un verbo optativo inicial y un imperativo final, evitando convertir el verso en simple anuncio futuro.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió «destroy them» frente a una expresión más perifrástica, así como la nota de alternativa para el primer verbo. La redacción española mantiene esa mayor precisión léxica y conserva la ambigüedad verbal del hebreo mediante la opción optativa inicial.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton esté explícito; aquí no aparece.
  - «Fidelidad» se emplea de manera consistente para אֱמֶת en contexto divino, sin borrar la alternativa «verdad» indicada en nota.
  - «Adversarios» preserva un registro bíblico claro y evita una equivalencia demasiado estrecha con «enemigos» cuando el hebreo es más amplio.
  - Se mantiene el tono poético y breve del hebreo sin añadir explicaciones en el cuerpo del texto.
