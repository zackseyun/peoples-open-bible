translation:
  language: es
  text: Que, por tanto, el corazón de ustedes esté enteramente con Yahvé nuestro Dios[a], para andar en sus estatutos y guardar sus mandamientos, como en este día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin división»: «Que, por tanto, el corazón de ustedes esté sin división con Yahvé nuestro Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «como en este día», aludiendo al día presente como modelo o testigo de esa lealtad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Let ... be
  chosen_spanish: Que ... sea
  alternatives_spanish:
  - Y será
  - Y que sea
  lexicon: HALOT
  rationale: El hebreo waw + qatal funciona aquí como exhortación; en español, «Que ... sea» reproduce mejor el valor jussivo que un futuro simple.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: el corazón de ustedes
  alternatives_spanish:
  - su corazón
  - su interior
  lexicon: HALOT
  rationale: לֵבָב incluye el centro interior de la persona. «Corazón» mantiene la metáfora bíblica y «de ustedes» hace explícito el plural sin ambigüedad de cortesía.
- source_word: שָׁלֵם
  english_pob_choice: wholly
  chosen_spanish: enteramente
  alternatives_spanish:
  - completamente
  - íntegramente
  - sin división
  lexicon: HALOT
  rationale: En contexto de pacto, שָׁלֵם expresa integridad o lealtad no dividida. «Enteramente» conserva la idea de devoción plena sin resolverla en un término más técnico o moralizante.
- source_word: עִם יְהוָה אֱלֹהֵינוּ
  english_pob_choice: with Yahweh our God
  chosen_spanish: de Yahvé, nuestro Dios
  alternatives_spanish:
  - con Yahvé, nuestro Dios
  - para Yahvé, nuestro Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con Yahvé nuestro Dios». En español, «de Yahvé» con «ser de» comunica natural y fielmente pertenencia/lealtad relacional, evitando una construcción forzada con «estar con». Se conserva el nombre divino «Yahvé» según el criterio del proyecto.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: para andar
  alternatives_spanish:
  - para caminar
  - para vivir
  lexicon: HALOT
  rationale: «Andar» es un equivalente bíblico natural para el idiomático הלך en sentido de conducta. Mantiene la imagen de caminar sin sonar tan literal como «caminar» en este registro.
- source_word: בְּחֻקָּיו
  english_pob_choice: in his statutes
  chosen_spanish: en sus estatutos
  alternatives_spanish:
  - según sus estatutos
  - en sus decretos
  lexicon: HALOT
  rationale: חֻקִּים son estatutos/decretos prescritos. «Estatutos» es el término más transparente y cercano en español bíblico contemporáneo.
- source_word: וְלִשְׁמֹר
  english_pob_choice: and to keep
  chosen_spanish: y guardar
  alternatives_spanish:
  - y observar
  - y custodiar
  lexicon: HALOT
  rationale: שׁמר en contexto legal-covenantal se traduce con frecuencia «guardar». En español bíblico mantiene bien la idea de atender obedientemente los mandamientos.
- source_word: מִצְוֹתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus preceptos
  - sus órdenes
  lexicon: HALOT
  rationale: מִצְוֹת son mandatos divinos; «mandamientos» preserva el registro bíblico-covenantal y es inmediatamente comprensible.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as at this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hoy
  - tal como en este día
  lexicon: HALOT
  rationale: La expresión hebrea remite al día presente como referencia o patrón. «Como en este día» conserva la forma idiomática sin sobreexplicar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. Siguiendo la norma del proyecto, se traslada como «Yahvé» para mantener el nombre propio del pacto y no ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Sentido de שָׁלֵם en exhortación de pacto
  english_pob_reading: wholly / undivided
  chosen_spanish_reading: enteramente
  alternative_spanish_readings:
  - íntegramente
  - sin división
  - enteramente de corazón
  rationale: La frase exhorta a una fidelidad total, no a perfección moral absoluta. «Enteramente» preserva la tensión de lealtad íntegra sin imponer una categoría doctrinal ajena al versículo.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than flatten it'
- issue: Construcción relacional עִם + YHWH
  english_pob_reading: with Yahweh our God
  chosen_spanish_reading: de Yahvé, nuestro Dios
  alternative_spanish_readings:
  - con Yahvé, nuestro Dios
  - para Yahvé, nuestro Dios
  rationale: Aunque el hebreo dice literalmente «con», en español «ser de» expresa de modo natural la pertenencia y la lealtad del corazón al Dios del pacto, sin perder el sentido relacional del original.
  doctrine_reference: 'POB Spanish style guidance: maintain source-based nuance with idiomatic Spanish'
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada y quedó sin cambios en el último pase; el español sigue esa lectura alta de acuerdo con el hebreo, conservando la exhortación jussiva, el nombre divino Yahvé, y la fuerza covenantal de שָׁלֵם sin suavizarla. No se detectan revisiones adicionales necesarias más allá de la adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usó «mandamientos» para מִצְוֹתָיו y «estatutos» para חֻקָּיו para conservar la distinción léxica.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - «Enteramente» conserva la tensión entre integridad y lealtad sin convertirla en perfección moral.
  - La nota de pie a y b se ancla en las expresiones «Yahvé» y «mandamientos» respectivamente, siguiendo la auditoría inglesa.
