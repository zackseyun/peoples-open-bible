translation:
  language: es
  text: Y echaron suertes, pequeños y grandes por igual, según sus casas paternas, para cada puerta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puerta por puerta». El hebreo repite el sustantivo singular para dar énfasis distributivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפִּילוּ
  english_pob_choice: they cast
  chosen_spanish: echaron
  alternatives_spanish:
  - tiraron
  - hicieron caer
  lexicon: HALOT
  rationale: En la colocación fija con גוֹרָל֜וֹת, el hebreo expresa el acto de sortear. En español, «echar suertes» es la manera natural y fiel de reproducir el idiom. «Hicieron caer» sería demasiado literal y opaco.
- source_word: גוֹרָל֜וֹת
  english_pob_choice: lots
  chosen_spanish: suertes
  alternatives_spanish:
  - lotes
  - sortes
  lexicon: HALOT
  rationale: «Suertes» es el equivalente bíblico y español más transparente para las piezas usadas en un sorteo o reparto. Mantiene el valor lexical sin imponer un tecnicismo ajeno.
- source_word: כַּקָּטֹן כַּגָּדוֹל
  english_pob_choice: small and great alike
  chosen_spanish: pequeños y grandes por igual
  alternatives_spanish:
  - los pequeños y los grandes por igual
  - el pequeño y el grande por igual
  lexicon: HALOT
  rationale: La expresión hebrea marca inclusión sin distinción de rango. «Por igual» conserva la fuerza distributiva y evita una ampliación interpretativa como «jóvenes y ancianos».
- source_word: לְבֵית אֲבוֹתָם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - conforme a sus casas paternas
  - según sus casas de padres
  lexicon: HALOT
  rationale: «Casas paternas» comunica la organización por clanes/familias de linaje paterno. «Según» reproduce bien el valor distributivo del hebreo en este contexto de asignación.
- source_word: לְשַׁעַר וָשָׁעַר
  english_pob_choice: for each gate
  chosen_spanish: para cada puerta
  alternatives_spanish:
  - para puerta por puerta
  - para cada portón
  lexicon: HALOT
  rationale: El hebreo repite el singular para dar énfasis distributivo. «Para cada puerta» transmite de modo natural ese sentido. Se prefiere «puerta» como equivalente publicable y comprensible en español, sin perder la referencia a los accesos del templo.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el artículo innecesario antes de “small and great” sin cambiar el sentido. La traducción española refleja directamente ese par distributivo sin artículo adicional y conserva el resto del enunciado tal como exige el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Suertes» sigue la terminología bíblica tradicional en español para גוֹרָל֜וֹת y evita una paráfrasis moderna.
  - La nota al pie conserva la alternativa distributiva documentada por el POB inglés y la adapta al español sin introducir otra lectura.
  - «Puerta» traduce el singular repetido con valor distributivo; la nota aclara la alternativa literal «puerta por puerta».
