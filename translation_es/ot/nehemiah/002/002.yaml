translation:
  language: es
  text: 'Y el rey me dijo: «¿Por qué está triste[a] tu rostro, si no estás enfermo? Esto no es sino tristeza de corazón[b]». Entonces tuve muchísimo miedo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'tu rostro está malo' o 'tu rostro es malo'; es un modismo para un semblante triste o preocupado.
    reason: lexical_alternative
  - marker: b
    text: O 'dolor de corazón' o 'angustia de corazón'; hebreo literalmente, 'maldad' o 'mal' de corazón, refiriéndose aquí a aflicción interior más que a maldad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué...
  alternatives_spanish:
  - ¿A qué se debe...
  - ¿Por qué razón...
  lexicon: HALOT
  rationale: Interrogativo directo de causa; en español '¿Por qué...?' es natural y fiel al valor causal sin añadir explicaciones.
- source_word: פָּנֶיךָ רָעִים
  english_pob_choice: your face sad
  chosen_spanish: tu rostro está triste
  alternatives_spanish:
  - tu rostro está afligido
  - tu rostro está abatido
  - tu rostro está mal
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tu rostro está malo/ruin', un modismo para apariencia triste o preocupada. 'Está triste' comunica el sentido idiomático en español sin volverlo torpemente literal.
- source_word: חוֹלֶה
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - mal de salud
  - con enfermedad
  - indispuesto
  lexicon: HALOT
  rationale: Adjetivo directo para estado de enfermedad física; 'enfermo' es claro y natural en español contemporáneo.
- source_word: אֵין זֶה כִּי אִם
  english_pob_choice: This is nothing but
  chosen_spanish: Esto no es sino
  alternatives_spanish:
  - Esto no es más que
  - Esto es solamente
  - Esto no es otra cosa que
  lexicon: HALOT
  rationale: La construcción excluye otras explicaciones y presenta la conclusión del rey. 'No es sino' conserva bien el valor restrictivo del giro hebreo.
- source_word: רֹעַ לֵב
  english_pob_choice: sadness of heart
  chosen_spanish: tristeza de corazón
  alternatives_spanish:
  - dolor de corazón
  - angustia de corazón
  - mal de corazón
  lexicon: HALOT
  rationale: Literalmente es 'mal/badness de corazón', pero el contexto contrasta enfermedad física con aflicción interior. 'Tristeza de corazón' conserva la lectura afectiva y evita sugerir mal moral.
- source_word: וָאִירָא
  english_pob_choice: Then I was ... afraid
  chosen_spanish: Entonces tuve mucho miedo
  alternatives_spanish:
  - Entonces temí mucho
  - Y tuve muchísimo miedo
  - Y me asusté mucho
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; 'tuve mucho miedo' es fluido y mantiene el sentido de reacción inmediata.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - grandemente
  - muchísimo
  lexicon: HALOT
  rationale: Los dos intensificadores hebreos refuerzan el temor de Nehemías. 'Mucho' es suficiente en español, y el contexto narrativo ya concentra la intensidad.
theological_decisions:
- issue: פָנִים רָעִים como modismo no moral
  english_pob_reading: '''your face sad'' reflects an idiom for a sad or troubled expression, not literal moral badness.'
  chosen_spanish_reading: '''tu rostro está triste'' refleja un modismo para una expresión afligida, no una afirmación sobre culpa moral.'
  alternative_spanish_readings:
  - '''tu rostro está malo'' (demasiado literal y poco idiomático)'
  - '''tu semblante está afligido'' (correcto pero más marcado y menos directo)'
  rationale: En el contexto, el rey interpreta señales externas de aflicción interior. La traducción debe evitar que el adjetivo 'malo' se lea como juicio ético del rostro o de Nehemías.
  doctrine_reference: Lexical idiom; no doctrinal issue
translation_notes:
  revision_awareness: He tomado en cuenta la revisión más reciente del inglés POB, que prefirió 'though you are not sick' por su matiz concesivo. En español, 'si no estás enfermo' ya puede sonar concesivo, pero 'si' podría leerse causal en algunos contextos; por claridad idiomática se eligió 'si no estás enfermo' dentro de la cita, manteniendo el contraste del rey entre enfermedad física y aflicción interior. También he conservado la secuencia narrativa del cierre con un equivalente natural de 'Then I was very much afraid'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - '''Corazón'' se conserva para רֹעַ לֵב porque el modismo apunta al estado interior, no al órgano físico.'
  - No se usa 'Cristo' ni terminología cristológica en este versículo.
  - La puntuación abre comillas directas en español y respeta el cierre narrativo con punto fuera de la cita.
