revisions:
- from: O si lo golpeó con una piedra de mano[a], con la que se puede morir, y murió, homicida es; ciertamente el homicida será muerto.
  to: O si lo golpeó con una piedra en la mano[a], con la que se puede causar la muerte, y murió, él es homicida; ciertamente se le dará muerte al homicida.
  rationale: Se reemplazó el calco opaco «piedra de mano» por la expresión natural «piedra en la mano», conservando la literalidad en nota, en línea con el audit trail inglés. Se ajustó la cláusula de capacidad letal a un español más claro («se puede causar la muerte»). Se sustituyó «será muerto» por «se le dará muerte», que mantiene el tono legal y la fuerza penal del hebreo sin sonar antinatural. Se conservó «homicida» por coherencia con la decisión léxico-teológica documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido jurídico del hebreo: caso casuístico adicional, objeto letal, golpe, muerte resultante, clasificación del agresor como culpable y pena capital enfática. Sin embargo, dos giros españoles no preservan bien la naturalidad ni la fuerza exacta del original: «piedra de mano» suena demasiado calcado en el texto principal, y «será muerto» es poco idiomático en español bíblico moderno. Además, «con la que se puede morir» es comprensible pero menos natural que una formulación de capacidad letal más clara.'
  spanish_quality_summary: La legibilidad necesita ajuste. «O si» funciona. «Con una piedra de mano» resulta opaco en español general y debe pasar a una expresión natural con nota explicativa. «Homicida es» es comprensible pero algo rígido; «él es homicida» o «es homicida» serían más naturales, aunque el énfasis puede mantenerse. «Ciertamente el homicida será muerto» es demasiado literalista; «ciertamente se dará muerte al homicida» o «el homicida ciertamente será condenado a muerte» serían más naturales, pero la opción más fiel al inglés POB y al hebreo es «el homicida ciertamente deberá morir / se le dará muerte».
  glossary_alignment: No hay conflicto con la terminología de proyecto. La decisión de usar «homicida» para רצח es defendible en este contexto jurídico, aunque «asesino» reflejaría más directamente ‘murderer’. Dado el razonamiento auditado, se puede conservar «homicida». La nota léxica debe permanecer para בְּאֶבֶן יָד, pero anclada a una expresión española natural.
  issues:
  - severity: medium
    issue: «piedra de mano» en el texto principal es un calco poco natural
    rationale: Aunque refleja la literalidad hebrea, en español no comunica con claridad la idea de una piedra sostenida en la mano o apta para usarse manualmente como arma. El inglés POB mantuvo una frase natural y reservó la literalidad para nota.
  - severity: medium
    issue: «con la que se puede morir» suena poco idiomático
    rationale: El hebreo expresa capacidad letal del objeto, no una generalidad abstracta. «con la que se puede causar la muerte» o «con la que alguien podría morir» comunica mejor esa capacidad en español.
  - severity: medium
    issue: «será muerto» es un giro antinatural en español contemporáneo
    rationale: Aunque intenta reflejar el pasivo hebreo, en español resulta tosco. Una formulación como «se le dará muerte» preserva el tono jurídico y la idea de ejecución sin perder fidelidad.
  revised_spanish_text: O si lo golpeó con una piedra en la mano[a], con la que se puede causar la muerte, y murió, él es homicida; ciertamente se le dará muerte al homicida.
  revised_footnotes:
