review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: envío del rey a Rahab, mandato de sacar a los hombres, doble descripción de su llegada, y la razón causal final. Sin embargo, hay dos ajustes importantes. Primero, la nota [a] no preserva la alternativa significativa del POB inglés; el texto inglés anota una alternativa para לַחְפֹּר (''to spy out''), mientras que la nota española actual comenta innecesariamente ''a Rahab'', que no aporta una ambigüedad relevante en español. Segundo, «toda la tierra» es comprensible pero en este contexto narrativo de conquista «toda la tierra» puede sonar más global/terrenal; «toda la región» o «todo el país/territorio» comunica mejor הָאָרֶץ como land/region under consideration. También «a ti» es fiel pero menos natural en español que «a tu casa» o «a donde estás»; no obstante, puede mantenerse si se conserva la distinción con la siguiente cláusula.'
  spanish_quality_summary: El español es claro y digno, pero la fluidez mejora con pequeños cambios. «Envió a Rahab» puede sonar como enviar físicamente a Rahab; «mandó a decir a Rahab» sería una expansión no explícita, así que «envió a Rahab, diciendo» es aceptable por cercanía al original. El mayor problema de calidad está en la nota y en «toda la tierra». «Reconocer» funciona bien para לַחְפֹּר, y «Saca» es natural e imperativo.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas clave están generalmente alineadas con el expediente inglés. Debe alinearse la nota léxica con la alternativa documentada para חפר: «espiar/reconocer» en vez de una nota sobre Rahab.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada a «Rahab» y no refleja la alternativa léxica relevante del expediente inglés.
    rationale: 'El POB inglés conserva una alternativa para לַחְפֹּר: «to spy out all the land». En español, la nota debería acompañar «reconocer» y ofrecer «espiar toda la región/el país», no explicar «a Rahab», que no genera ambigüedad útil.'
  - severity: medium
    issue: «Toda la tierra» puede sonar demasiado literal o cosmológica en este contexto.
    rationale: הָאָרֶץ aquí se refiere al territorio/región de interés, no al planeta ni necesariamente a toda la tierra en sentido absoluto. «Toda la región» preserva mejor el sentido contextual y coincide con la rationale inglesa.
  - severity: low
    issue: «Que vinieron a ti» es fiel pero algo menos idiomático en español actual.
    rationale: La frase preserva el contraste con «entraron en tu casa», así que no es incorrecta. Aun así, la construcción suena algo rígida; se puede mantener por fidelidad estructural.
  revised_spanish_text: 'Entonces el rey de Jericó envió a Rahab, diciendo: «Saca a los hombres que vinieron a ti, que entraron en tu casa, porque han venido a reconocer[a] toda la región».'
  revised_footnotes:
  - marker: a
    text: O «a espiar toda la región». El verbo hebreo puede llevar en este contexto el sentido de reconocimiento de espionaje.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para que preserve la alternativa léxica documentada en el expediente inglés para חפר, y se ajusta «toda la tierra» a «toda la región» para expresar mejor הָאָרֶץ en su contexto narrativo. El resto del texto se mantiene por ser fiel y claro.
