translation:
  text: But he kept saying[a], “Remember from whom you come, and by what father's hand you are to be slaughtered.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Remember where you are from.' The Greek expression can denote place of origin, but here likely points to family lineage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἔλεγεν
  chosen: But he kept saying
  alternatives:
  - But he said
  - And he was saying
  lexicon: BDAG
  rationale: Imperfect ἔλεγεν suggests continued or repeated speech, so 'kept saying' better reflects the aspect than a simple past 'said.' δέ is rendered 'But' to mark the discourse shift.
- source_word: Μνήσθητε
  chosen: Remember
  alternatives:
  - Call to mind
  - Be mindful
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive recollection; 'Remember' is the most natural and direct English equivalent.
- source_word: πόθεν ἐστέ
  chosen: from whom you come
  alternatives:
  - where you are from
  - from where you are
  lexicon: BDAG
  rationale: Although πόθεν often means 'from where,' in this familial exhortation the sense is lineage/origin rather than location. 'From whom you come' brings out the ancestral/familial force in context.
- source_word: τίνος πατρὸς
  chosen: what father's
  alternatives:
  - whose father’s
  - what kind of father's
  lexicon: BDAG
  rationale: The genitive τίνος with πατρός points to paternal identity. 'What father's' is idiomatic enough in English when paired with the following noun, preserving the rhetorical appeal to noble descent.
- source_word: χειρὶ
  chosen: hand
  alternatives:
  - power
  - agency
  lexicon: BDAG
  rationale: χείρ is literally 'hand' and often metonymic for agency or instrumentality. Retaining 'hand' preserves the vividness and the familial pathos of the expression.
- source_word: σφαγιασθῆναι
  chosen: to be slaughtered
  alternatives:
  - to be slain
  - to be butchered
  - to be killed as a sacrifice
  lexicon: BDAG
  rationale: The verb carries the sense of slaughter, often with sacrificial or violent overtones. 'To be slaughtered' preserves the brutality more clearly than the flatter 'to be slain.'
