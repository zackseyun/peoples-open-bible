translation:
  language: es
  text: Porque Aram, Efraín y el hijo de Remalías[a] han planeado el mal[b] contra ti, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El hijo de Remalías» alude a Peka, rey de Israel. El hebreo usa el patronímico en lugar del nombre personal, probablemente con tono despectivo.
    reason: cultural_note
  - marker: b
    text: O «han tramado el mal contra ti». El verbo hebreo puede llevar el sentido de idear o tramar, especialmente en un contexto político hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce la causa de la afirmación siguiente; «porque» comunica esa relación causal de manera natural y directa en español.
- source_word: יָעַץ
  english_pob_choice: has planned
  chosen_spanish: han tramado
  alternatives_spanish:
  - han planeado
  - han ideado
  - han conspirado
  lexicon: HALOT
  rationale: El verbo hebreo puede significar idear/planear o tramar en contexto hostil. «Han tramado» conserva la idea de un plan deliberado con matiz adversativo, sin volverlo más fuerte de lo que el contexto exige.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en tu contra
  lexicon: HALOT
  rationale: La preposición con el sentido hostil se expresa con claridad en español como «contra ti».
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo para mantener la forma del texto fuente y la terminología POB, en lugar de sustituirlo por un equivalente geopolítico posterior.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - desastre
  lexicon: HALOT
  rationale: «Mal» preserva la amplitud semántica del hebreo, que puede abarcar intención hostil y daño concreto. En español suena menos cargado moralmente que «maldad» y más amplio que «daño».
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Israel
  - el reino del norte
  lexicon: HALOT
  rationale: El hebreo usa el nombre tribal/regional de forma metonímica. «Efraín» conserva esa forma y deja que el contexto identifique al reino del norte.
- source_word: וּבֶן רְמַלְיָהוּ
  english_pob_choice: the son of Remaliah
  chosen_spanish: el hijo de Remalías
  alternatives_spanish:
  - el hijo de Remalías, es decir, Peka
  - Peka
  lexicon: HALOT
  rationale: Se mantiene la designación patronímica del hebreo, que tiene un efecto despectivo o despersonalizador. Traducir directamente el nombre preserva ese rasgo sin introducir el nombre personal que el texto no usa.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - 'así:'
  lexicon: HALOT
  rationale: Es la introducción estándar al discurso directo siguiente. «Diciendo» es transparente y formalmente fiel al hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión final del inglés POB, que ordena a Aram, Efraín y el hijo de Remalías como los sujetos coordinados que han tramado mal. También conserva la introducción causal y la forma patronímica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Aram» en lugar de «Siria» para coherencia con la política POB de transliteración de nombres propios.
  - Se usa «Efraín» como metonimia del reino del norte, sin explicitarlo en el cuerpo del texto.
  - «El hijo de Remalías» conserva el tono del hebreo y evita normalizarlo a un nombre propio en el texto principal.
