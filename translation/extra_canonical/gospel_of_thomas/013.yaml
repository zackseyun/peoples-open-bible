translation:
  text: 'Jesus said to his disciples[a], "Compare me, and tell me whom I am like."

    Simon Peter said to him, "You are like a righteous angel."

    Matthew said to him, "You are like a human being—a philosopher, a man of understanding."

    Thomas said to him, "Teacher, my mouth will not be able at all to say whom you
    are like."

    Jesus said, "I am not your teacher, because you have drunk and you have become
    intoxicated from the bubbling spring that I myself have measured out."

    And he took him; he withdrew and spoke three sayings to him.

    When Thomas came to his companions, they asked him, "What did Jesus say to you?"

    Thomas said to them, "If I should tell you one of the sayings he spoke to me,
    you will pick up stones and throw them at me[j][i][h][g][f][e][d][c][b], and fire
    will come out of the stones and consume you."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘A human being—a philosopher, a man of understanding’ translates ⲣⲱⲙⲉ ⲛⲫⲓⲗⲟⲥⲟⲫⲟⲥ
      ⲛⲣⲙⲛϩⲏⲧ. Literally, ‘a man, a philosopher, a man of heart/mind’; hence ‘a wise
      philosopher’ is an acceptable paraphrase.
    reason: lexical_alternative
  - marker: b
    text: '‘Bubbling spring’: ⲃⲣⲃⲣ is onomatopoetic; alternatives like ‘gurgling’
      or ‘sparkling’ occur in the literature.'
    reason: cultural_note
  - marker: c
    text: ‘Measured out’ (ϣⲓⲛⲧⲟⲥ) could also be rendered ‘apportioned’ or ‘drawn (as
      water).’ The metaphor is intentionally vivid and somewhat strange; we preserve
      it.
    reason: lexical_alternative
  - marker: d
    text: The line ‘I am not your teacher’ is rhetorically paradoxical in Thomas;
      it rebukes Thomas’s inability to speak while asserting he has already drunk
      from Jesus’s spring.
    reason: cultural_note
  - marker: e
    text: Dilley notes a bracketed restoration in the verb ⲉⲓⲛⲉ (‘be like’) near the
      opening; no broader textual uncertainty is present.
    reason: lacuna_or_restoration
