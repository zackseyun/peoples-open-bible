translation:
  language: es
  text: Y el gobernador[a] les dijo que no comieran de las porciones santísimas[b] hasta que se levantara un sacerdote con Urim y Tumim[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Tirshata», un título administrativo persa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las porciones sacerdotales consideradas especialmente santas; no el «Lugar Santísimo» del santuario.
    reason: cultural_note
  - marker: c
    text: Urim y Tumim eran medios sagrados de consulta sacerdotal; la forma exacta y el procedimiento no están claros.
    reason: cultural_note
lexical_decisions:
- source_word: הַתִּרְשָׁתָא
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el Tirshatá
  - el gobernador de la provincia
  lexicon: HALOT
  rationale: El título persa se vierte por su función administrativa para ser transparente al lector español. «Gobernador» conserva el sentido de autoridad sin depender de una transliteración opaca. Mantengo la opción tradicional «Tirshatá» como alternativa documentada.
- source_word: אֲשֶׁר לֹא יֹאכְלוּ
  english_pob_choice: that they should not eat
  chosen_spanish: que no comieran
  alternatives_spanish:
  - que no debían comer
  - que no debían comer de
  lexicon: HALOT
  rationale: La construcción reporta el contenido de la orden en estilo indirecto. «Que no comieran» conserva el valor de mandato/prohibición sin sonar rígido en español.
- source_word: מִקֹּדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: from the most holy things
  chosen_spanish: de las cosas santísimas
  alternatives_spanish:
  - de las cosas sumamente santas
  - de las porciones santísimas
  - del Santo de los Santos
  lexicon: HALOT
  rationale: En contexto se trata de porciones sacerdotales especialmente santas, no del recinto interior del santuario. «Cosas santísimas» preserva el superlativo y evita la lectura espacial errónea de «Santo de los Santos».
- source_word: עַד עֲמֹד כֹּהֵן
  english_pob_choice: until a priest should arise
  chosen_spanish: hasta que se levantara un sacerdote
  alternatives_spanish:
  - hasta que apareciera un sacerdote
  - hasta que surgiera un sacerdote
  lexicon: HALOT
  rationale: «Levantarse» reproduce bien la idea de surgir/comparecer en un punto futuro, con tono formal adecuado al decreto. «Se levantara» mantiene el valor temporal de la restricción.
- source_word: לְאוּרִים וּלְתֻמִּים
  english_pob_choice: with Urim and Thummim
  chosen_spanish: con Urim y Tumim
  alternatives_spanish:
  - por medio de Urim y Tumim
  - para Urim y Tumim
  lexicon: HALOT
  rationale: Son términos técnicos cultuales y se preservan transliterados para no fingir una certeza interpretativa inexistente. «Con» sigue la solución idiomática del POB inglés para el instrumento de consulta sacerdotal.
theological_decisions:
- issue: Naturaleza de קֹדֶשׁ הַקֳּדָשִׁים en este contexto
  english_pob_reading: It refers to the most holy priestly portions/offerings, not access to the inner sanctuary.
  chosen_spanish_reading: Se refiere a porciones u ofrendas sacerdotales de carácter santísimo, no al acceso al santuario interior.
  alternative_spanish_readings:
  - Se refiere al Lugar Santísimo como espacio.
  - Se refiere simplemente a comida sagrada en general.
  rationale: El verbo «comer» y el contexto de la genealogía sacerdotal muestran que la cuestión es el consumo de porciones sagradas, no la entrada a un lugar. La redacción española evita imponer «Lugar Santísimo» y conserva la tensión semántica de una santidad superlativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Representación de Urim y Tumim
  english_pob_reading: Preserve as transliterated technical terms.
  chosen_spanish_reading: 'Se conservan como términos técnicos transliterados: Urim y Tumim.'
  alternative_spanish_readings:
  - Luces y perfecciones.
  - Urim y Tumim, entendidos como un medio de consulta sacerdotal.
  rationale: La forma exacta, función y procedimiento siguen siendo inciertos; traducirlos interpretivamente sobrerresuelve el texto. La transliteración mantiene la especificidad cultual y la ambigüedad histórica del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requerían cambios tras la comprobación de alta concordancia. La presente redacción sigue el audit trail inglés y resuelve en español la ambigüedad de קֹדֶשׁ הַקֳּדָשִׁים con un término no espacial.'
  spanish_consistency_notes:
  - Se usa «gobernador» para el título persa funcional, no «Tirshatá» en el texto principal.
  - «Santísimas» mantiene el superlativo y evita confundir las ofrendas con un recinto.
  - Se conserva «Urim y Tumim» sin traducir, conforme al tratamiento de término técnico.
  - El verbo en imperfecto subjuntivo («se levantara») refleja la restricción futura en estilo indirecto.
