  to: 'Y José dijo a su padre: «Estos son mis hijos, los que Dios me ha dado aquí[a]». Y él dijo: «Por favor, tráemelos[b], y los bendeciré».'
  rationale: Se corrigió el anclaje de la nota sobre «aquí», que en el borrador estaba colocada erróneamente tras «su padre». También se ajustó la última cláusula a una coordinada simple, «y los bendeciré», para seguir más fielmente la decisión principal documentada en el POB para וַאֲבָרֲכֵם. El resto del texto se conservó con cambios mínimos para mantener naturalidad y fidelidad.
