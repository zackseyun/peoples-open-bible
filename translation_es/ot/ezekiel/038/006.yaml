translation:
  language: es
  text: 'Gomer y todas sus tropas[a], la casa de Togarmah desde las regiones más remotas del norte[b], y todas sus tropas: muchos pueblos están contigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus alas» / «sus divisiones»; el término hebreo puede referirse a alas, extremidades o compañías adscritas. Aquí se traduce «tropas» por el contexto militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las partes remotas del norte».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּמֶר
  english_pob_choice: Gomer
  chosen_spanish: Gomer
  alternatives_spanish:
  - Gómer
  lexicon: HALOT
  rationale: Es nombre propio de pueblo/nación; en español conviene transliterarlo sin traducirlo. Mantengo la forma simple «Gomer» por claridad y porque el audit trail inglés también lo translitera.
- source_word: אֲגַפֶּיהָ / אֲגַפָּיו
  english_pob_choice: its troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus alas
  - sus bandas
  - sus divisiones
  lexicon: HALOT
  rationale: En este contexto militar y de lista de coaliciones, «tropas» comunica mejor el sentido colectivo y bélico que una traducción literal como «alas». La forma española mantiene la fuerza del término sin perder naturalidad.
- source_word: בֵּית תּוֹגַרְמָה
  english_pob_choice: the house of Togarmah
  chosen_spanish: la casa de Togarmah
  alternatives_spanish:
  - Bet-Togarmah
  - el pueblo de Togarmah
  lexicon: HALOT
  rationale: Conservo el giro constructo «casa de» porque funciona como designación etnogeográfica en el hebreo y el audit trail inglés lo preserva. «Casa de Togarmah» es transparente y fiel, sin reemplazarlo por una paráfrasis más interpretativa.
- source_word: יַרְכְּתֵי צָפוֹן
  english_pob_choice: from the far north
  chosen_spanish: desde las partes más remotas del norte
  alternatives_spanish:
  - desde el norte más lejano
  - desde las regiones más apartadas del norte
  lexicon: HALOT
  rationale: La expresión hebrea apunta a los confines septentrionales. En español, «las partes más remotas del norte» conserva la idea de extensión extrema y hace visible la metáfora geográfica documentada en el inglés («the remote parts of the north»).
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos y naciones
  lexicon: HALOT
  rationale: «עַמִּים» suele referirse a grupos étnicos o pueblos más que a entidades políticas modernas. «Muchos pueblos» preserva ese matiz mejor que «naciones», que podría endurecer el sentido hacia categorías estatales.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - a tu lado
  lexicon: HALOT
  rationale: «Contigo» es la forma natural y fiel para la relación preposicional final. No marco en español la feminidad gramatical del sufijo, siguiendo el criterio del audit trail inglés y el uso idiomático.
theological_decisions:
- issue: Alcance de la lista de aliados y la fuerza militar de «sus tropas»
  english_pob_reading: The verse enumerates Gomer, the house of Togarmah, and their troops, ending with many peoples accompanying Gog.
  chosen_spanish_reading: El versículo enumera a Gomer, la casa de Togarmah y sus tropas, concluyendo que muchos pueblos están contigo.
  alternative_spanish_readings:
  - Gomer y todas sus alas
  - Gomer y todas sus divisiones
  rationale: No hay necesidad de suavizar el carácter militar del pasaje. «Tropas» mantiene la lectura contextual sin borrar la ambigüedad léxica del hebreo, que el POB inglés documenta explícitamente.
  doctrine_reference: No aplica; decisión léxica-textual, no doctrinal.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés de alta concordancia; no se registran revisiones aplicadas. Se mantuvo la decisión clave de traducir אֲגַפֶּיהָ / אֲגַפָּיו como «tropas» y de verter יַרְכְּתֵי צָפוֹן con una expresión geográfica natural en español.
  spanish_consistency_notes:
  - Se conservó «Yahvé» solo cuando el hebreo subyacente lo requiera; aquí no aparece, por lo que no se usa.
  - «Mesías»/«Cristo» no aplica en este versículo.
  - Se respetó el tono profético y la enumeración sintáctica del hebreo sin añadir elementos interpretativos.
  - Las notas al pie distinguen alternativas léxicas reales sin duplicar marcadores.
