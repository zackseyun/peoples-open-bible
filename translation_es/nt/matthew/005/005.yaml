review_pass:
  verdict: revise
  source_alignment_summary: ‘El borrador español refleja correctamente el sentido básico del griego: bienaventuranza, cualidad de οἱ πραεῖς, motivo causal, herencia futura y la ambigüedad de τὴν γῆν. Sin embargo, una nota léxica introduce un error importante: «los gentiles» no puede funcionar como alternativa para πραεῖς, porque en español significa normalmente ‘Gentiles/Gentiles no judíos’ o ‘amables/corteses’ de forma confusa, y no preserva el sentido de ‘meek/gentle’. También la nota sobre γῆ como «el país» es menos fiel que «la tierra» o «la tierra/la tierra prometida» como alternativa contextual, y suena demasiado moderna-política.’
  spanish_quality_summary: ‘El texto principal es claro, natural y digno: «Bienaventurados los mansos, porque ellos heredarán la tierra». La lectura es eclesialmente inteligible y no suena acartonada. Solo requieren ajuste las notas para evitar ambigüedad seria y para alinear mejor el español con el razonamiento documentado.’
  glossary_alignment: ‘No hay conflictos con la terminología base del proyecto en este versículo. «Bienaventurados», «mansos», «heredarán» y «la tierra» están bien elegidos. La excepción necesaria es corregir la alternativa de nota para πραεῖς: debe ser «los apacibles» o «los humildes», no «los gentiles».’
  issues:
  - severity: high
    issue: La nota [b] ofrece «los gentiles» como alternativa de «los mansos».
    rationale: «Gentiles» en español moderno se entiende primariamente como ‘no judíos’ o, secundariamente, como ‘amables’, pero no transmite con fidelidad el valor de πραεῖς. Crea una ambigüedad grave y distorsiona la evidencia léxica documentada por el English POB, cuya alternativa es ‘the gentle’, not ‘the Gentiles’.
  - severity: medium
    issue: La nota [a] usa «el país» para la alternativa de τὴν γῆν.
    rationale: Aunque γῆ puede significar ‘land’, «el país» en español suena demasiado moderno y político, y no conserva bien la resonancia bíblica/covenantal del eco a Salmo 37:11. «La tierra» como texto principal ya está bien; la nota alternativa debe hablar de «la tierra» en sentido de ‘la tierra prometida’ o simplemente explicar ‘la tierra/la tierra de la promesa’.
  revised_spanish_text: Bienaventurados los mansos[a][b], porque ellos heredarán la tierra.
  revised_footnotes:
  - marker: a
    text: O «la tierra» en sentido de «la tierra de la promesa»; la expresión probablemente alude al Salmo 37:11, donde la promesa puede oírse tanto en términos de la tierra de la alianza como en un sentido más amplio.
    reason: alternative_reading
  - marker: b
    text: O «los apacibles»; aquí «mansos» significa una mansedumbre humilde, no debilidad.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal, que es fiel y natural. Se corrigen únicamente las notas para eliminar una alternativa léxica errónea («los gentiles») y para expresar con español más bíblico y preciso la alternativa de γῆ, preservando el eco de Salmo 37:11 sin introducir un matiz político moderno.
