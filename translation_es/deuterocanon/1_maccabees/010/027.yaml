review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: ἐχάρημεν = alegría pasada, καὶ νῦν = transición epistolar, y la exhortación a mantener una relación de fidelidad. Sin embargo, se aparta innecesariamente del rastro auditado del POB inglés en dos puntos importantes: (1) la nota en español sobre ἐχάρημεν no refleja las alternativas documentadas en inglés, que son ''we were glad/pleased'', no un intensificador como «nos alegramos mucho»; y (2) πίστιν se mueve del principal inglés ''faith'' a «fidelidad» sin nota que preserve la tensión documentada entre ''faith / faithfulness / loyalty''. Además, «permanezcan todavía en guardar fidelidad» suena torpe en español y no representa tan bien la fuerza exhortativa de ἐμείνατε con infinitivo como «continúen todavía manteniendo…».'
  spanish_quality_summary: El español es comprensible pero algo acartonado. «Permanezcan todavía en guardar fidelidad» no es natural en español eclesiástico moderno y mezcla una construcción poco idiomática. «Nos alegramos» funciona, aunque «nos regocijamos» puede quedar como alternativa estilística. Conviene mejorar la fluidez con «continúen todavía manteniendo fe con nosotros» o equivalente, y añadir nota para aclarar el valor político de «fe» en este contexto.
  glossary_alignment: 'Alineación parcial. No hay conflictos con nombres divinos ni otros términos del glosario principal. El punto relevante es πίστις: el POB inglés documenta como principal ''faith'' por política del proyecto, con ''faithfulness/loyalty'' en nota. El español borrador reemplaza eso por «fidelidad» en texto principal. Dado que la política pide preservar la tensión documentada, conviene usar «fe» en el texto principal con nota explicativa que dé «fidelidad» y «lealtad» como alternativas contextuales.'
  issues:
  - severity: high
    issue: La traducción principal de πίστιν como «fidelidad» no preserva la decisión auditada del POB inglés de mantener 'faith' en el texto principal.
    rationale: 'El expediente inglés documenta explícitamente una política doctrinal/lexical para πίστις: mantener ''faith'' y anotar ''faithfulness/loyalty''. En español, aunque «fe» requiere aclaración contextual, debe conservarse esa tensión mediante una nota, no resolverse silenciosamente en el texto principal.'
  - severity: medium
    issue: La construcción «permanezcan todavía en guardar fidelidad» es poco natural en español.
    rationale: Aunque μένω puede relacionarse con «permanecer», aquí el imperativo con infinitivo suena mejor como «continúen todavía manteniendo/guardando…». La redacción actual afecta la legibilidad y dignidad del texto.
  - severity: medium
    issue: La nota [a] no coincide con las alternativas documentadas para ἐχάρημεν.
    rationale: La auditoría inglesa ofrece 'We were glad' y 'We were pleased'. La nota española propuesta introduce «Nos alegramos mucho», que no corresponde a una alternativa léxica del expediente y añade matiz no documentado.
  revised_spanish_text: Nos alegramos[a]. Y ahora continúen todavía manteniendo fe[b] con nosotros,
  revised_footnotes:
