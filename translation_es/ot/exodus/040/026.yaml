translation:
  language: es
  text: Y puso el altar de oro en la tienda de reunión, delante del velo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cortina». El término hebreo designa la partición interior del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: And he placed
  chosen_spanish: Y puso
  alternatives_spanish:
  - Y colocó
  - Y depositó
  lexicon: HALOT
  rationale: El hebreo expresa una acción secuencial de poner/colocar un objeto en un lugar preciso. En español, «puso» es natural, breve y fiel para un contexto de mobiliario sagrado, sin añadir énfasis indebido.
- source_word: מִזְבַּח הַזָּהָב
  english_pob_choice: the gold altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  - el altar de oro puro
  lexicon: HALOT
  rationale: La construcción hebrea es nominal («altar de oro»). «El altar de oro» mantiene esa relación material de forma directa y clara en español; «dorado» sugeriría color más que material, y «oro puro» añade una precisión no explicitada aquí.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el tabernáculo del encuentro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tienda de reunión», en español bíblico «tabernáculo de reunión» comunica mejor el recinto sagrado ya identificado en este contexto y evita ambigüedad. «Reunión» conserva el valor de מוֹעֵד como lugar/tiempo señalado para encuentro.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: HALOT
  rationale: En este contexto espacial, «delante de» expresa con naturalidad la ubicación del altar respecto del velo. «Ante» sería posible, pero menos transparente para una lectura amplia.
- source_word: הַפָּרֹכֶת
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  lexicon: HALOT
  rationale: «Velo» reproduce la terminología cultual tradicional para la partición interior del santuario y conserva la carga simbólica que el término adquiere en la tradición bíblica. «Cortina» es una alternativa lexical válida, pero menos marcada teológicamente.
theological_decisions:
- issue: Terminología del recinto sagrado en בְּאֹהֶל מוֹעֵד
  english_pob_reading: the tent of meeting
  chosen_spanish_reading: el tabernáculo de reunión
  alternative_spanish_readings:
  - la tienda de reunión
  - el tabernáculo del encuentro
  rationale: Se opta por «tabernáculo de reunión» para comunicar con claridad al lector hispanohablante el espacio litúrgico del texto. Mantiene el sentido de cita/encuentro señalado por מוֹעֵד sin perder la referencia al santuario portátil.
  doctrine_reference: Éxodo 40; terminología del santuario en el Pentateuco
- issue: Valor cultual de הַפָּרֹכֶת
  english_pob_reading: the veil
  chosen_spanish_reading: el velo
  alternative_spanish_readings:
  - la cortina
  rationale: «Velo» preserva la resonancia bíblica y cultual del separador interior del santuario, importante para la lectura canónica posterior. No se amplía el término más allá de su función espacial básica en este versículo.
  doctrine_reference: Ex 26:31-33; Hebreos 9:3-8
translation_notes:
  revision_awareness: La redacción sigue la lectura unánime del texto hebreo y el acuerdo alto del audit trail inglés. Se ajustó «tent of meeting» a «tabernáculo de reunión» para mayor inteligibilidad en español, manteniendo el valor cultual del término y la posición espacial «before the veil» como «delante de el velo» reformulada idiomáticamente como «delante de el velo»/«delante del velo».
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo porque no aparece el nombre divino.
  - «Velo» se mantiene como término cultual coherente con la serie del tabernáculo.
  - «Tabernáculo de reunión» conserva la terminología del Pentateuco en español sin sustituirla por un equivalente más libre.
