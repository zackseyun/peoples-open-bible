translation:
  language: es
  text: 'Cuando se acercaron los días de David para morir[a], mandó a Salomón, su hijo, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David llegó a los días de morir»; el hebreo expresa idiomáticamente que se acercaba el tiempo de la muerte de David.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  english_pob_choice: drew near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - llegaron cerca
  lexicon: HALOT
  rationale: El verbo קרב en este contexto temporal expresa que el tiempo de David estaba por cumplirse. «Se acercaron» conserva la metáfora de proximidad temporal de modo natural en español.
- source_word: יְמֵי דָוִד
  english_pob_choice: the days of David
  chosen_spanish: los días de David
  alternatives_spanish:
  - los días de David
  - la vida de David
  lexicon: HALOT
  rationale: La construcción hebrea literal es «los días de David». Mantenerla preserva el giro idiomático, aunque en español sugiere su sentido temporal por el contexto.
- source_word: לָמוּת
  english_pob_choice: for him to die
  chosen_spanish: para morir
  alternatives_spanish:
  - a morir
  - para que muriera
  lexicon: HALOT
  rationale: El infinitivo con ל indica aquí la cercanía de los días de David respecto a la muerte. «Para morir» mantiene la relación verbal sin añadir una glosa interpretativa excesiva.
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: צוה expresa una orden o encargo solemne. «Mandó» es directo y fiel al peso del acto final de David hacia Salomón.
- source_word: אֶת שְׁלֹמֹה בְנוֹ
  english_pob_choice: Solomon his son
  chosen_spanish: a Salomón, su hijo
  alternatives_spanish:
  - a Salomón, su hijo
  - a Salomón, el hijo de él
  lexicon: HALOT
  rationale: El hebreo presenta el objeto directo con su identificación filial. En español, el orden natural es «a Salomón, su hijo», manteniendo la relación sin calco pesado.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: La fórmula introductoria לֵאמֹר pide una partícula verbal que enlace con el discurso directo. «Diciendo» conserva esa función formal.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto hebreo y el sentido ya auditado en la versión inglesa POB. No se introdujeron cambios doctrinales ni ampliaciones interpretativas; se conservó la imagen temporal del original con una formulación española natural.
  spanish_consistency_notes:
  - Se mantiene «mandó» para reflejar la fuerza de צוה sin volverlo más suave.
  - Se conserva «los días de David» como eco idiomático del hebreo, aunque el contexto deja claro que se refiere a su tiempo de vida.
  - Se usa «Salomón» en forma directa con coma explicativa para representar אֶת שְׁלֹמֹה בְנוֹ de manera natural en español.
