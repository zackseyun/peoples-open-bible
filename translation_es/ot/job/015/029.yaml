translation:
  language: es
  text: No se enriquecerá, ni su riqueza permanecerá, ni su fruto[a] se doblará hasta la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus bienes», «su ganancia» o «su abundancia» para el término final; el hebreo es raro e incierto. La cláusula también puede evocar la imagen de ramas o fruto que no se doblan hasta el suelo por la abundancia; algunos la entienden más generalmente como sus posesiones que no se extienden por la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶעְשַׁר
  english_pob_choice: will not become rich
  chosen_spanish: No se enriquecerá
  alternatives_spanish:
  - No será rico
  - No crecerá en riqueza
  lexicon: HALOT
  rationale: El verbo en qal expresa llegar a ser rico o hacerse rico; el español reflexivo «se enriquecerá» conserva bien el matiz verbal de proceso sin volverlo estático.
- source_word: יָקוּם
  english_pob_choice: will not endure
  chosen_spanish: permanecerá
  alternatives_spanish:
  - subsistirá
  - se mantendrá
  - perdurará
  lexicon: HALOT
  rationale: Con חֵילוֹ, la idea no es solo ‘levantarse’ literalmente sino quedar establecido o mantenerse firme. «Permanecerá» comunica esa estabilidad/continuidad de manera natural en español.
- source_word: חֵילוֹ
  english_pob_choice: his wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - su patrimonio
  - su fuerza
  lexicon: HALOT
  rationale: En este contexto de prosperidad y colapso, el sustantivo se entiende mejor como riqueza o bienes. «Riqueza» mantiene la lectura contextual principal del texto fuente y la tradición auditada.
- source_word: יִטֶּה
  english_pob_choice: will not bend down
  chosen_spanish: se inclinará
  alternatives_spanish:
  - se doblará
  - se agachará
  - se abatirá
  lexicon: HALOT
  rationale: El verbo נטה puede expresar inclinar, extender o doblar. Con ‘a la tierra’ y un término raro al final del verso, la imagen física de algo que cae o se vence se conserva bien con «se inclinará».
- source_word: מִנְלָם
  english_pob_choice: his produce
  chosen_spanish: su abundancia
  alternatives_spanish:
  - sus productos
  - su cosecha
  - sus bienes
  lexicon: HALOT
  rationale: El término es raro y de sentido incierto. El contexto permite una referencia a abundancia, bienes o producción; «abundancia» evita decidir demasiado estrechamente por una de las alternativas y conserva la incertidumbre léxica.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión auditada que corrigió la referencia del posesivo final a singular (‘su’), y mantiene la secuencia del hebreo: prosperidad no adquirida, riqueza no establecida y abundancia que no se inclina hacia la tierra. También conserva la incertidumbre del término final con una nota de alternativas.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y se mantuvo un registro sobrio y bíblico en español contemporáneo.
  - «Riqueza» traduce חֵילֹו sin forzar ‘fuerza’ o ‘poder’, porque aquí el contexto es económico y de prosperidad.
  - La nota al pie conserva la ambigüedad del sustantivo final y la imaginería posible de fruto/ramas que se vencen hacia el suelo.
