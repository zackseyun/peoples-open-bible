translation:
  language: es
  text: Yo santificaré mi gran nombre[a], que ha sido profanado entre las naciones, el cual ustedes han profanado entre ellas. Entonces las naciones sabrán que yo soy Yahvé, declara el Señor Dios[b], cuando me muestre santo por medio de ustedes ante sus ojos.
  philosophy: formal
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Yo santificaré mi gran nombre»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando sea santificado en ustedes ante sus ojos»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתִּי
  english_pob_choice: I will sanctify
  chosen_spanish: Yo santificaré
  alternatives_spanish:
  - Yo haré santo
  - Yo mostraré como santo
  lexicon: HALOT
  rationale: El piel de קדשׁ aquí expresa una acción declarativa y pública respecto del nombre de Dios. «Santificaré» mantiene la correspondencia formal con el hebreo y con la revisión inglesa más reciente, sin perder la fuerza de vindicar públicamente su santidad.
- source_word: שְׁמִי הַגָּדוֹל
  english_pob_choice: my great name
  chosen_spanish: mi gran nombre
  alternatives_spanish:
  - mi nombre grande
  - mi nombre, el grande
  lexicon: HALOT
  rationale: La construcción posesiva con adjetivo se vierte de modo directo y natural en español. «Gran nombre» conserva la idea de reputación, majestad y valor del nombre divino.
- source_word: הַמְחֻלָּל
  english_pob_choice: which has been profaned
  chosen_spanish: que ha sido profanado
  alternatives_spanish:
  - que ha sido contaminado
  - que ha sido deshonrado
  lexicon: HALOT
  rationale: '«Profanado» comunica con precisión el valor de חלל en este contexto: tratar lo santo como común o impuro. Es el equivalente español más exacto para el lenguaje del texto.'
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» refleja היטב el uso de גוים en Ezequiel y evita imponer una distinción posterior entre judíos y gentiles. «Entre» mantiene la idea locativa de presencia pública.
- source_word: אֲשֶׁר חִלַּלְתֶּם בְּתוֹכָם
  english_pob_choice: which you have profaned among them
  chosen_spanish: el cual vosotros profanasteis en medio de ellas
  alternatives_spanish:
  - el cual profanasteis en su medio
  - que profanasteis entre ellas
  lexicon: HALOT
  rationale: La frase retoma «mi gran nombre» y בְּתוֹכָם se entiende naturalmente como «en medio de ellas». Se conserva la relación entre el sujeto Israel y el lugar público de la profanación.
- source_word: וְיָדְעוּ
  english_pob_choice: Then ... will know
  chosen_spanish: Entonces ... sabrán
  alternatives_spanish:
  - Y ... sabrán
  - Luego ... sabrán
  lexicon: HALOT
  rationale: «Entonces» expresa bien el valor consecuencial de la conjunción en contexto narrativo-profético, sin añadir interpretación ajena al texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: transliterar el nombre divino como «Yahvé», preservando el nombre personal revelado a Israel y evitando la sustitución por un título.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor DIOS
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: «Declara» reproduce la fórmula profética נְאֻם. «Señor Yahvé» preserva la combinación de אֲדֹנָי con el nombre divino sin crear la forma artificial «Señor SEÑOR».
- source_word: בְּהִקָּדְשִׁי בָכֶם
  english_pob_choice: when I show myself holy through you
  chosen_spanish: cuando me muestre santo por medio de vosotros
  alternatives_spanish:
  - cuando sea santificado en vosotros
  - cuando muestre mi santidad en vosotros
  lexicon: HALOT
  rationale: El hebreo puede leerse con un sentido circunstancial y pasivo-reflexivo. «Por medio de vosotros» da en español la idea de que Dios manifiesta su santidad mediante su obrar con Israel, sin borrar la posibilidad formal más literal de «en vosotros».
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - ante sus ojos
  lexicon: HALOT
  rationale: «Delante de sus ojos» es una expresión natural y fiel del modismo de visibilidad pública. Mantiene la imagen de observación directa por parte de las naciones.
theological_decisions:
- issue: Renderizar קדשׁ respecto del nombre de Dios
  english_pob_reading: I will sanctify my great name
  chosen_spanish_reading: Yo santificaré mi gran nombre
  alternative_spanish_readings:
  - Yo haré santo mi gran nombre
  - Yo vindicaré la santidad de mi gran nombre
  rationale: El texto no sugiere que el nombre de Dios carezca de santidad, sino que esa santidad ha sido desacreditada públicamente. «Santificaré» conserva la formulación bíblica y la tensión teológica entre santidad intrínseca y reconocimiento público.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de בְּהִקָּדְשִׁי בָכֶם
  english_pob_reading: when I show myself holy through you
  chosen_spanish_reading: cuando me muestre santo por medio de vosotros
  alternative_spanish_readings:
  - cuando sea santificado en vosotros
  - cuando me santifique en vosotros
  rationale: La forma hebrea admite una lectura más literal («en vosotros»), pero el contexto explica una manifestación pública ante las naciones. «Por medio de vosotros» conserva la función instrumental/circunstancial sin negar la posibilidad literal que queda implícita.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'La base inglesa fue revisada desde una formulación más explicativa («vindicate the holiness of») a «sanctify», para reflejar más directamente el verbo hebreo קדשׁ y mantener coherencia con «show myself holy». La versión española sigue esa revisión y conserva la tensión teológica: Dios no se vuelve santo, sino que demuestra y hace visible la santidad de su nombre ante las naciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «naciones» para גוים, no «gentiles», por fidelidad al contexto de Ezequiel.
  - «Santificaré» y «me muestre santo» conservan la misma raíz conceptual en español.
  - «Señor Yahvé» evita la duplicación artificial y preserva ambas referencias del hebreo.
  - La sintaxis procura ser formal y publicable sin depender de un calco mecánico del inglés.
