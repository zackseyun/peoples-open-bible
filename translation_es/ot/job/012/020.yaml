translation:
  language: es
  text: Él quita[a] el habla a los dignos de confianza, y quita[b] el discernimiento a los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el labio»; es decir, los priva del habla o de la elocuencia.
    reason: lexical_alternative
  - marker: b
    text: O «juicio» o «entendimiento» para «discernimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵסִיר
  english_pob_choice: removes
  chosen_spanish: quita
  alternatives_spanish:
  - remueve
  - arrebata
  - retira
  lexicon: HALOT
  rationale: El participio hifil expresa la acción causativa de apartar o quitar. «Quita» transmite con naturalidad la idea de privar a alguien de algo, sin introducir una formulación más interpretativa que el hebreo no exige.
- source_word: שָׂפָה
  english_pob_choice: speech
  chosen_spanish: el habla
  alternatives_spanish:
  - la lengua
  - los labios
  - la palabra
  - la elocuencia
  lexicon: HALOT
  rationale: Literalmente es «labio», pero aquí funciona como metonimia de la capacidad de hablar. «El habla» conserva el sentido idiomático del enunciado y evita una traducción demasiado anatómica que no reflejaría bien el paralelo.
- source_word: לְנֶאֱמָנִים
  english_pob_choice: from the trusted
  chosen_spanish: a los fieles
  alternatives_spanish:
  - a los confiables
  - a los dignos de confianza
  - a los leales
  lexicon: HALOT
  rationale: נֶאֱמָנִים puede significar fieles, confiables o dignos de confianza. En este contexto sapiencial, «los fieles» mantiene la fuerza relacional y moral del término y resulta natural en español bíblico contemporáneo.
- source_word: טַעַם
  english_pob_choice: discernment
  chosen_spanish: discernimiento
  alternatives_spanish:
  - juicio
  - entendimiento
  - sensatez
  lexicon: HALOT
  rationale: Aquí טַעַם no es «sabor» sino capacidad de juzgar con acierto. «Discernimiento» reproduce bien la idea de juicio prudente y encaja con el paralelismo sapiencial del versículo.
- source_word: זְקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los mayores
  - los ancianos de edad
  lexicon: HALOT
  rationale: En poesía sapiencial el término puede referirse a personas mayores y experimentadas, con peso social. «Los ancianos» preserva esa combinación de edad y prestigio mejor que una traducción puramente biológica.
- source_word: יִקָּח
  english_pob_choice: takes away
  chosen_spanish: arrebata
  alternatives_spanish:
  - toma
  - quita
  - se lleva
  lexicon: HALOT
  rationale: El verbo לקח significa «tomar», pero en este paralelo el sentido privativo debe hacerse explícito. «Arrebata» comunica con claridad la acción de quitar algo valioso, y permite mantener el paralelismo con el primer hemistiquio sin sonar redundante.
theological_decisions:
- issue: La acción divina sobre la capacidad humana de hablar y discernir
  english_pob_reading: He removes speech from the trusted, and takes away discernment from the elders.
  chosen_spanish_reading: Él quita el habla a los fieles, y arrebata el discernimiento a los ancianos.
  alternative_spanish_readings:
  - Él quita la palabra a los fieles, y arrebata el juicio a los ancianos.
  - Él quita la elocuencia a los fieles, y arrebata la sensatez a los ancianos.
  rationale: El versículo atribuye a Dios la soberanía para privar incluso a personas respetadas de sus capacidades de palabra y juicio. La traducción conserva ese alcance sin suavizarlo ni convertirlo en una mera descripción psicológica.
  doctrine_reference: Job 12:20; soberanía divina sobre la sabiduría humana
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo y con la decisión inglesa auditada; no se requieren cambios de fondo respecto al sentido ya validado. Se mantiene el paralelismo entre privar de palabra y privar de discernimiento, con español natural y fuente-visible.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece explícitamente en otros contextos; aquí el sujeto está implícito y no requiere inserción del tetragrámaton.
  - Se prefirió «fieles» frente a «confiables» para mantener el matiz relacional/moral de נֶאֱמָנִים sin perder fluidez.
  - «Discernimiento» se conserva para טַעַם por coherencia con el campo sapiencial y con el audit trail inglés.
