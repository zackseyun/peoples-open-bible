- from: y Bela, hijo de Azaz, hijo de Shema, hijo de Joel; él habitó en Aroer, hasta Nebo y Baal-meón.
  to: y Bela, hijo de Azaz, hijo de Shema, hijo de Joel; él vivía[a] en Aroer, hasta Nebo y Baal-meón.
