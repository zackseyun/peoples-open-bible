translation:
  language: es
  text: 'Y el cadáver de Jezabel será como estiércol sobre la faz del campo en el territorio de Jezreel[a], de modo que no dirán: «Esta es Jezabel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, “en la parcela de Jezreel”. El hebreo חֵלֶק puede denotar una porción, parcela o tracto de tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... estará
  - Y ... acontecerá
  lexicon: HALOT
  rationale: El perfecto narrativo/profético hebreo se vierte con futuro en español para mantener el valor oracular; “será” conserva la continuidad profética sin volver la frase rígida.
- source_word: נִבְלַת
  english_pob_choice: corpse
  chosen_spanish: cadáver
  alternatives_spanish:
  - cuerpo muerto
  - carcasa
  lexicon: HALOT
  rationale: El término designa un cuerpo muerto. “Cadáver” es natural en español moderno y conserva el tono crudo sin animalizar el referente.
- source_word: אִיזֶבֶל
  english_pob_choice: Jezebel
  chosen_spanish: Jezabel
  alternatives_spanish:
  - Jezebel
  lexicon: N/A nombre propio
  rationale: Se translitera el nombre propio al uso normal en español bíblico.
- source_word: כְּדֹמֶן
  english_pob_choice: like dung
  chosen_spanish: como estiércol
  alternatives_spanish:
  - como abono
  - como excremento
  lexicon: HALOT
  rationale: דֹּמֶן refiere a estiércol/desecho orgánico. “Estiércol” comunica la imagen con fuerza y resulta más natural que un calco literal demasiado brusco en español.
- source_word: עַל־פְּנֵי הַשָּׂדֶה
  english_pob_choice: on the face of the field
  chosen_spanish: sobre la faz del campo
  alternatives_spanish:
  - sobre la superficie del campo
  - en la faz del campo
  lexicon: HALOT
  rationale: “Faz” reproduce el hebraísmo de ‘la cara/faz del campo’ mejor que una simple abstracción, y mantiene el paralelismo espacial de la imagen.
- source_word: בְּחֵלֶק יִזְרְעֶאל
  english_pob_choice: in the territory of Jezreel
  chosen_spanish: en el territorio de Jezreel
  alternatives_spanish:
  - en la porción de Jezreel
  - en el lote de Jezreel
  lexicon: HALOT
  rationale: חֵלֶק puede significar porción, parcela o territorio. Se adopta “territorio” siguiendo la elección inglesa auditada por su naturalidad; la alternativa literal se documenta en nota.
- source_word: אֲשֶׁר לֹא יֹאמְרוּ
  english_pob_choice: so that they will not say
  chosen_spanish: de modo que no dirán
  alternatives_spanish:
  - para que no digan
  - así que no dirán
  lexicon: HALOT
  rationale: La יחס relativa expresa resultado; “de modo que” preserva el valor consecutivo sin forzar una subordinación final.
- source_word: זֹאת אִיזָבֶל
  english_pob_choice: This is Jezebel
  chosen_spanish: Ésta es Jezabel
  alternatives_spanish:
  - Esta es Jezabel
  - Ésta es Jezebel
  lexicon: HALOT
  rationale: Se conserva la fórmula de identificación directa. Se usa tilde diacrítica tradicional en “Ésta” por estilo bíblico reverente, aunque “Esta” también sería posible en español actual.
theological_decisions:
- issue: La brutalidad del juicio profético sobre Jezabel
  english_pob_reading: Jezebel’s corpse will be like dung ... so that they will not say, “This is Jezebel.”
  chosen_spanish_reading: 'El texto se mantiene deliberadamente crudo: “cadáver” y “estiércol” reproducen la humillación y la deshonra del juicio, sin suavizarla.'
  alternative_spanish_readings:
  - cuerpo muerto ... como desecho
  - carcasa ... como basura
  rationale: El hebreo presenta una imagen intencionalmente degradante. Suavizarla borraría la fuerza del oráculo; por eso se conserva el choque semántico en español.
  doctrine_reference: Juicio divino; retribución profética en el relato de 2 Reyes 9
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió “face of the field” sobre “surface of the field” para acercarse más a la expresión hebrea. En español se reflejó con “faz del campo”, manteniendo el hebraísmo y la imagen espacial. También se preservó la lectura resultante “de modo que no dirán”, coherente con el valor consecutivo de אֲשֶׁר en este contexto.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó “Jezabel” como nombre propio estándar en español, no “Jezebel”.
  - Se eligió “cadáver” en vez de “carcasa” para una persona, por claridad y registro bíblico.
  - Se documentó en nota la ambigüedad de חֵלֶק, ya que puede ser ‘territorio’, ‘parcela’ o ‘porción’.
