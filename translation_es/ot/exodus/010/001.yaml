translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Ve a Faraón, porque yo he endurecido su corazón y el corazón de sus siervos[b], para que yo ponga estas señales mías entre ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «he hecho pesado su corazón». Esta expresión idiomática indica que Yahvé endureció o volvió insensible a Faraón.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «en su medio». Puede referirse específicamente a Faraón, o a Faraón junto con sus siervos o su corte.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton con la forma POB en español, en lugar de sustituirlo por un título. «Yahvé» mantiene la decisión teológica y traductológica del texto fuente auditado.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» comunica el encadenamiento temporal de modo natural en español sin perder el flujo narrativo.
- source_word: בֹּא אֶל־פַּרְעֹה
  english_pob_choice: Go in to Pharaoh
  chosen_spanish: Entra a Faraón
  alternatives_spanish:
  - Ve a Faraón
  - Entra en presencia de Faraón
  lexicon: HALOT
  rationale: «Entrar» conserva el matiz direccional y de acceso a la presencia real, que el inglés POB preservó con «Go in to». «A Faraón» es natural en español y mantiene la confrontación del mandato.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» expresa con claridad la causalidad directa.
- source_word: הִכְבַּדְתִּי
  english_pob_choice: have hardened
  chosen_spanish: he endurecido
  alternatives_spanish:
  - he hecho pesado
  - he hecho insensible
  - he endurecido su corazón
  lexicon: HALOT
  rationale: Se adopta la equivalencia idiomática habitual en español para el endurecimiento del corazón, pero sin borrar la tensión lexical del hebreo; el sentido literal de «hacer pesado» queda preservado en la nota. «Endurecido» refleja el efecto del hebreo en contexto.
- source_word: לִבּוֹ ... לֵב עֲבָדָיו
  english_pob_choice: his heart and the heart of his servants
  chosen_spanish: su corazón y el corazón de sus siervos
  alternatives_spanish:
  - su mente y la mente de sus siervos
  - su corazón y el corazón de sus oficiales
  - su corazón y el corazón de sus esclavos
  lexicon: HALOT
  rationale: «Corazón» mantiene el centro volitivo/cognitivo del hebreo. Para עֲבָדָיו se usa «siervos» porque en la corte de Faraón puede abarcar funcionarios/atendientes; «esclavos» sería demasiado fuerte en este contexto, aunque léxicamente posible.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Marca propósito. «Para que» es la forma más directa y natural en español para reproducir la finalidad del texto.
- source_word: שִׁתִי
  english_pob_choice: I may set
  chosen_spanish: ponga
  alternatives_spanish:
  - coloque
  - ponga yo
  - establezca
  lexicon: HALOT
  rationale: El verbo שׂים se expresa naturalmente con «poner» en español. En una subordinada final, «ponga» transmite bien la acción de colocar las señales sin rigidez.
- source_word: אֹתֹתַי אֵלֶּה
  english_pob_choice: these signs of mine
  chosen_spanish: estas mis señales
  alternatives_spanish:
  - estas señales mías
  - estas señales de las mías
  - estas señales
  lexicon: HALOT
  rationale: Se conserva la demostración y la posesión. «Mis señales» es más natural en español que un genitivo más largo, y refleja el valor enfático del hebreo.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: among them
  chosen_spanish: en medio de él
  alternatives_spanish:
  - en su interior
  - entre ellos
  - en medio de ellos
  lexicon: HALOT
  rationale: Se preserva la lectura más literal del singular hebreo («en su medio / en su interior») tal como lo anotó el POB inglés, dejando abierta la referencia a Faraón o a su esfera inmediata. «En medio de él» mantiene la ambigüedad documentada.
theological_decisions:
- issue: Endurecimiento divino del corazón de Faraón
  english_pob_reading: I have hardened his heart
  chosen_spanish_reading: yo he endurecido su corazón
  alternative_spanish_readings:
  - yo he hecho pesado su corazón
  - yo he hecho insensible su corazón
  rationale: La traducción principal mantiene la atribución directa a Yahvé, sin suavizarla. Se evita resolver la tensión teológica entre soberanía divina y responsabilidad humana; la nota preserva el sentido más literal del hebreo («he hecho pesado»).
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alcance de la referencia en בְּקִרְבּוֹ
  english_pob_reading: among them
  chosen_spanish_reading: en medio de él
  alternative_spanish_readings:
  - entre ellos
  - en medio de ellos
  rationale: 'Se conserva la ambigüedad del hebreo: puede referirse primariamente a Faraón o, por extensión, a su corte. La lectura española no cierra esa tensión semántica.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue el último estado revisado del POB inglés, que cambió «place» por «set»; en español se optó por «ponga» en la cláusula final, manteniendo el ajuste de naturalidad sin perder el valor aspectual de la acción. También se respetó la decisión de no resolver la ambigüedad de בְּקִרְבּוֹ y de conservar la tensión del endurecimiento divino mediante una nota lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se prefiere «Faraón» como nombre propio tradicional, coherente con el registro bíblico español.
  - «Siervos» se usa para עֲבָדָיו por el contexto de corte real; no se emplea «esclavos» para no sobredeterminar la relación social.
  - «Corazón» se mantiene como centro de voluntad/pensamiento, conforme al uso bíblico y al POB inglés.
  - La nota a preserva la tensión entre traducción idiomática y literal del hebreo 'hacer pesado' sin anularla.
