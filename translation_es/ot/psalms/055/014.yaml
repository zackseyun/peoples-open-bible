translation:
  language: es
  text: Pero tú, un hombre como mi igual[a], mi compañero y mi amigo íntimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de mi rango'. Para 'mi compañero', el hebreo también puede significar 'mi guía'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: El hebreo introduce un contraste directo con lo anterior; en español, 'Pero tú' expresa con naturalidad el giro adversativo sin perder el apóstrofe personal.
- source_word: אֱנוֹשׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - un mortal
  lexicon: HALOT
  rationale: Aquí el énfasis está en la traición de una persona cercana, no en la mortalidad como tal. 'Un hombre' conserva el valor referencial y el tono de reproche del salmo.
- source_word: כְּעֶרְכִּי
  english_pob_choice: as my equal
  chosen_spanish: como yo[a]
  alternatives_spanish:
  - como mi igual
  - de mi mismo valor
  - según mi estima
  lexicon: HALOT
  rationale: La idea básica es de equivalencia o nivel comparable. En español, 'como yo' es idiomático y directo; el marcador de nota preserva la posibilidad interpretativa de 'mi igual' o incluso de un matiz de rango/valor comparable.
- source_word: אַלּוּפִי
  english_pob_choice: my companion
  chosen_spanish: mi compañero
  alternatives_spanish:
  - mi guía
  - mi cercano aliado
  - mi amigo
  lexicon: HALOT
  rationale: El término puede denotar compañero íntimo o, en ciertos contextos, guía/líder. Dado el paralelismo con 'mi amigo íntimo', el sentido relacional es el más probable; 'mi compañero' mantiene esa cercanía sin cerrar la ambigüedad del hebreo.
- source_word: וּמְיֻדָּעִי
  english_pob_choice: my familiar friend
  chosen_spanish: mi amigo íntimo
  alternatives_spanish:
  - mi conocido cercano
  - mi allegado
  - mi confidente
  lexicon: HALOT
  rationale: Derivado de ידע, el participio con sufijo expresa alguien conocido de manera cercana y personal. 'Amigo íntimo' comunica bien la fuerza afectiva del lamento y es más fuerte que 'conocido'.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés, preservando el contraste inicial, la serie de tres descripciones relacionales y la ambigüedad lexicológica documentada para אַלּוּפִי mediante nota.
  spanish_consistency_notes:
  - Se usó 'Pero tú' para reflejar el valor adversativo de וְאַתָּה.
  - Se prefirió 'un hombre' para אֱנוֹשׁ por claridad y fidelidad al contexto de relación humana.
  - 'Se mantuvo el paralelismo de tres miembros: ''como yo[a], mi compañero y mi amigo íntimo''.'
  - No se introdujo terminología eclesiástica ajena al contexto del salmo.
