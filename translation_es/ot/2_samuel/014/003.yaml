translation:
  language: es
  text: Entonces ve al rey y háblale de esta manera. Y Joab puso las palabras en su boca[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «puso las palabras en su boca», un modismo que significa que Joab le dio el discurso exacto que debía decir.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבָאת
  english_pob_choice: Then go
  chosen_spanish: Entonces ve
  alternatives_spanish:
  - Y vendrás
  - Y ve
  lexicon: HALOT
  rationale: La forma verbal hebrea funciona aquí con fuerza directiva dentro de una instrucción. «Entonces ve» conserva el impulso secuencial y la naturalidad en español, sin volverla excesivamente literal ni suavizarla a mera descripción.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - hacia el rey
  lexicon: HALOT
  rationale: אֶל indica movimiento hacia el rey. «Al rey» es la equivalencia más directa y natural. «Ante el rey» sería posible por el contexto cortesano, pero añade una matiz contextual no exigido por la forma hebrea.
- source_word: וְדִבַּרְתְּ אֵלָיו
  english_pob_choice: and speak to him
  chosen_spanish: y háblale
  alternatives_spanish:
  - y hablarás con él
  - y dile
  lexicon: HALOT
  rationale: דבר con אֶל significa «hablar a». «Háblale» mantiene el valor verbal y la dirección del discurso, y suena idiomático en español. «Dile» sería algo más interpretativo.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de esta forma
  - según esta palabra
  lexicon: HALOT
  rationale: La expresión introduce el modo o contenido de la intervención preparada por Joab. «De esta manera» refleja bien el demostrativo sin calcar «palabra» de forma rígida, y conserva la formalidad del registro bíblico.
- source_word: וַיָּשֶׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - metió
  lexicon: HALOT
  rationale: שׂים en este contexto idiomático se expresa naturalmente como «puso». Mantiene la imagen concreta de suministrar las palabras, en consonancia con el audit trail inglés.
- source_word: אֶת הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - el mensaje
  lexicon: HALOT
  rationale: דְּבָרִים aquí alude a las expresiones exactas que Joab preparó. «Las palabras» conserva mejor la concreción verbal que «el mensaje», que sería más abstracto.
- source_word: בְּפִיהָ
  english_pob_choice: in her mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus labios
  - en su boca misma
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para indicar que Joab le proporcionó el discurso exacto. «En su boca» preserva la imagen idiomática sin perder inteligibilidad en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la revisión inglesa más reciente en la idea de «de esta manera» para כַּדָּבָר הַזֶּה. Se conserva también el modismo de «poner las palabras en su boca», explicándolo en una nota para no perder su fuerza idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa un español bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios como «habla» en sentido sustantivo o «dijo» donde el hebreo exige la acción directa de hablar.
  - El singular/plural de «palabras» reproduce el plural hebreo דְּבָרִים y el sentido de un discurso preparado.
