base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/007/019.yaml
  text: They will throw their silver into the streets[a], and their gold will become an unclean thing. Their silver and their gold will not be able to deliver them in the day of Yahweh’s wrath. They will not satisfy their appetite, nor fill their stomachs, for it has become the stumbling block of their iniquity.
  footnotes:
