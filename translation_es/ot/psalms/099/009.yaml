translation:
  language: es
  text: Exalten a Yahvé nuestro Dios[a], y póstrense en su santo monte, porque santo es Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘adoren en su santo monte’. El verbo hebreo puede expresar tanto postrarse como adorar, y la preposición puede entenderse como ‘en’ o ‘hacia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֽוֹמְמ֡וּ
  english_pob_choice: Exalt
  chosen_spanish: Exalten
  alternatives_spanish:
  - Ensalcen
  - Levanten en alto
  - Exalten
  lexicon: HALOT
  rationale: El imperativo plural de רום en sentido de exaltar o engrandecer pide un verbo español natural para una exhortación litúrgica. 'Exalten' conserva el tono directo y reverente del llamado a magnificar a Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo la terminología POB para el Tetragrámaton, se usa 'Yahvé' en el texto principal como forma castellana estable y reverente del nombre divino, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: El sustantivo con sufijo de 1.ª persona plural se vierte de forma directa como 'nuestro Dios', manteniendo la relación de pertenencia del pacto sin añadir matices no presentes.
- source_word: וְהִשְׁתַּחֲווּ
  english_pob_choice: bow down
  chosen_spanish: póstrense
  alternatives_spanish:
  - adórenlo
  - inclinense
  - bájense en reverencia
  lexicon: HALOT
  rationale: El verbo hebreo señala la acción corporal de inclinarse o postrarse, que también puede implicar adoración. 'Póstrense' conserva mejor la imagen física que 'adoren', sin borrar su sentido cultual.
- source_word: לְהַר קָדְשׁוֹ
  english_pob_choice: at his holy mountain
  chosen_spanish: ante su santo monte
  alternatives_spanish:
  - en su santo monte
  - junto a su santo monte
  - hacia su santo monte
  lexicon: HALOT
  rationale: La preposición ל puede expresar relación espacial o dirección. 'Ante' comunica la postura de reverencia en relación con el monte sagrado sin sugerir que el monte sea el objeto de culto; 'santo monte' preserva el vínculo léxico con קָדוֹשׁ.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación, y 'porque' expresa con naturalidad esa relación causal en español contemporáneo y bíblico.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: En este salmo, el adjetivo de santidad funciona como proclamación central sobre Yahvé. 'Santo' es la correspondencia más directa y tradicional en español, sin perder la fuerza teológica del término.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio de Dios en vez de una sustitución titular. 'Yahvé' es la forma española adecuada para el texto principal y mantiene la decisión doctrinal POB de no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de הִשְׁתַּחֲווּ entre postración y adoración
  english_pob_reading: bow down
  chosen_spanish_reading: póstrense
  alternative_spanish_readings:
  - adórenlo
  - inclínense
  - postrarse en adoración
  rationale: El contexto poético enfatiza el gesto corporal delante del monte santo. 'Póstrense' preserva la tensión entre acto físico y adoración sin resolverla demasiado pronto en una paráfrasis más explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El inglés POB pasó de 'toward his holy mountain' a 'at his holy mountain' para reflejar mejor la preposición y evitar una lectura meramente direccional. La redacción española adopta 'ante su santo monte' para conservar esa relación espacial-reverente sin introducir una localización más estrecha que la del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma coherente con la política POB para el Tetragrámaton.
  - '''Santo'' se usa de manera uniforme para קָדוֹשׁ en este versículo.'
  - '''Póstrense'' conserva el paralelismo poético entre el imperativo de alabanza y el gesto de reverencia.'
