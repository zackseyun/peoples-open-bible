translation:
  language: es
  text: Y partieron y fueron a Berea con veinte mil hombres y dos mil jinetes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «dos mil caballos»; en contexto militar, la expresión probablemente se refiere a tropas montadas, de ahí «jinetes».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἀπῆραν
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - se alejaron
  - levantaron el campamento
  lexicon: LSJ
  rationale: El verbo griego marca salida o partida; en español, «partieron» transmite el movimiento narrativo de forma natural y breve. «Levantaron el campamento» sería más específico de un contexto militar que el texto no explicita.
- source_word: ἐπορεύθησαν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - marcharon
  - viajaron
  lexicon: LSJ
  rationale: Es un verbo general de ir o desplazarse. «Fueron» conserva la sencillez del original sin añadir la idea militar de marcha que no está expresada de manera explícita.
- source_word: εἰς Βερέαν
  english_pob_choice: to Berea
  chosen_spanish: a Berea
  alternatives_spanish:
  - hacia Berea
  - a la Berea
  lexicon: LSJ
  rationale: La preposición de dirección se vierte de modo directo con «a». El nombre propio se translitera como «Berea», conforme al uso del proyecto para topónimos.
- source_word: ἐν εἴκοσι χιλιάσιν ἀνδρῶν
  english_pob_choice: with twenty thousand men
  chosen_spanish: con veinte mil hombres
  alternatives_spanish:
  - entre veinte mil hombres
  - en veinte mil hombres
  lexicon: LSJ
  rationale: Aunque ἐν puede ser literalmente «en», aquí expresa acompañamiento o contingente. «Con» es la equivalencia idiomática natural en español para una fuerza militar que acompaña al movimiento.
- source_word: δισχιλίοις ἵπποις
  english_pob_choice: two thousand horsemen
  chosen_spanish: dos mil jinetes
  alternatives_spanish:
  - dos mil caballos
  - dos mil de caballería
  lexicon: LSJ
  rationale: El griego dice literalmente «dos mil caballos», pero el contexto militar favorece la referencia metonímica a tropas montadas. «Jinetes» comunica esa fuerza de manera clara en español y evita la literalidad animal que sonaría extraña.
translation_notes:
  revision_awareness: 'El texto griego de Swete coincide sustancialmente con el audit trail inglés: salida/partida, desplazamiento a Berea y el conteo militar. La única decisión interpretativa relevante es δισχιλίοις ἵπποις, donde se preserva en español la lectura metonímica de tropas montadas, tal como hizo la POB en inglés.'
  spanish_consistency_notes:
  - Se mantiene un estilo directo y narrativo, sin adornos añadidos.
  - 'Los nombres propios se transliteran de forma consistente: Berea.'
  - Se evita «SEÑOR» o terminología teológica ajena, ya que no hay lenguaje divino en este verso.
  - «Jinetes» se usa por claridad militar y por fidelidad a la interpretación auditada del inglés.
