  glossary_alignment: 'No hay términos teológicos mayores en juego. El borrador sigue bien la política general de transliterar nombres en vez de traducirlos. La excepción necesaria aquí es de forma española de nombres propios, no de significado: «Simei» -> «Simeí» y «Uzza» -> «Uzá» mejor alinean la transliteración con la ortografía y pronunciación españolas.'
