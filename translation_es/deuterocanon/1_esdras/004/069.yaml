translation:
  language: es
  text: Entonces el rey Darío se levantó y lo besó, y escribió cartas en favor de él a todos los administradores[a], los gobernantes locales, los generales y los sátrapas, para que lo encaminaran[b], junto con todos los que estaban con él y subían a construir Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mayordomos»; el griego puede referirse literalmente a administradores de casa o, en este contexto, a funcionarios administrativos.
    reason: lexical_alternative
  - marker: b
    text: O «lo escoltaran» o «proveyeran para su viaje»; el verbo griego puede implicar enviarlo adelante con apoyo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεφίλησεν
  english_pob_choice: kissed
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó con afecto
  - lo abrazó y besó
  lexicon: LSJ
  rationale: El verbo griego expresa beso, con posible matiz afectuoso; en español, «lo besó» conserva la fuerza lexical sin añadir intensidad no garantizada.
- source_word: ἐπιστολάς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas oficiales
  - escritos
  lexicon: LSJ
  rationale: En este contexto administrativo, «cartas» comunica naturalmente el sentido de comunicaciones escritas sin introducir una formalidad adicional que el griego no explicita.
- source_word: οἰκονόμους
  english_pob_choice: stewards
  chosen_spanish: administradores
  alternatives_spanish:
  - mayordomos
  - encargados
  lexicon: LSJ
  rationale: «Administradores» transmite bien la función de manejo o gestión en un contexto imperial. «Mayordomos» sería más literal, pero menos claro para lectores actuales en este pasaje.
- source_word: τοπάρχας
  english_pob_choice: local rulers
  chosen_spanish: gobernantes locales
  alternatives_spanish:
  - gobernantes del lugar
  - tetrarcas locales
  lexicon: LSJ
  rationale: El término designa autoridades de una localidad o distrito. «Gobernantes locales» preserva la referencia política sin transliterar el cargo.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  - jefes militares
  lexicon: LSJ
  rationale: «Generales» es el equivalente más directo y natural para líderes militares en español.
- source_word: σατράπας
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: LSJ
  rationale: Se conserva el título persa específico para mantener la precisión histórica y administrativa, como en la traducción inglesa.
- source_word: προπέμψωσιν
  english_pob_choice: send him on his way
  chosen_spanish: lo enviaran en su camino
  alternatives_spanish:
  - lo escoltaran
  - lo despidieran con provisiones
  lexicon: LSJ
  rationale: La expresión griega puede implicar despedida con apoyo o escolta. «Lo enviaran en su camino» conserva esa amplitud sin estrechar el sentido a una sola forma de ayuda.
- source_word: ἀναβαίνοντας
  english_pob_choice: going up
  chosen_spanish: subían
  alternatives_spanish:
  - subían
  - iban subiendo
  lexicon: LSJ
  rationale: «Subían» reproduce la imagen geográfica y convencional de ascender a Jerusalén, manteniendo la literalidad básica del participio.
- source_word: οἰκοδομῆσαι
  english_pob_choice: build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: LSJ
  rationale: La revisión inglesa prefirió «build» sobre «rebuild» para corresponder más de cerca al verbo. En español, «construir» conserva esa correspondencia sin añadir el matiz de reconstrucción que no está explícito en el griego.
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del control cruzado y refleja la revisión inglesa más reciente, que dejó οἰκοδομῆσαι como «build» y no «rebuild». Se evitó introducir una reconstrucción explícita en español para no exceder el griego.
  spanish_consistency_notes:
  - Se mantuvo Yahvé cuando no aparece aquí ninguna referencia al nombre divino; no se añadió terminología teológica ajena al verso.
  - Se conservó la secuencia administrativa (administradores, gobernantes locales, generales, sátrapas) siguiendo el orden del griego y del audit trail inglés.
  - «Subían» mantiene la imagen de ascenso hacia Jerusalén sin explicitar peregrinación o retorno.
