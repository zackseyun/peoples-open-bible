translation:
  language: es
  text: Sepultaron a Abner en Hebrón[a], y el rey alzó su voz y lloró junto a la tumba de Abner, y todo el pueblo lloró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse literalmente «hacia la tumba de Abner», pero el contexto favorece el sentido idiomático de lamento junto a la tumba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: They buried
  chosen_spanish: Sepultaron
  alternatives_spanish:
  - Y sepultaron
  - Lo sepultaron
  lexicon: HALOT
  rationale: El verbo קבר denota enterrar/sepultar en contexto funerario. «Sepultaron» suena natural y solemne en español bíblico moderno, y mantiene el sentido narrativo sin añadir sujeto explícito innecesario.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón
  - en Hebrón
  lexicon: HALOT
  rationale: La preposición ב marca ubicación. «En Hebrón» es la equivalencia más directa y natural en español.
- source_word: וַיִשָּׂא ... אֶת־קוֹלוֹ
  english_pob_choice: lifted up his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  - alzó la voz
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de levantar/alzar la voz para expresar lamento o exclamación solemne. «Alzó su voz» refleja bien el original y su tono literario.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró
  - sollozó
  lexicon: HALOT
  rationale: בכה se expresa de forma natural como «llorar» en español. «Lloró» es claro y mantiene la repetición verbal del verso.
- source_word: אֶל־קֶבֶר אַבְנֵר
  english_pob_choice: at Abner’s grave
  chosen_spanish: junto a la tumba de Abner
  alternatives_spanish:
  - ante la tumba de Abner
  - en la tumba de Abner
  - hacia la tumba de Abner
  lexicon: HALOT
  rationale: Aunque אֶל puede ser literalmente «a/hacia», en este contexto fúnebre la idea idiomática es la lamentación en relación con la tumba. «Junto a la tumba de Abner» comunica bien la escena en español sin forzar una preposición extraña.
- source_word: וַיִּבְכּוּ כָּל־הָעָם
  english_pob_choice: all the people wept
  chosen_spanish: todo el pueblo lloró
  alternatives_spanish:
  - todo el pueblo lloró
  - y todo el pueblo lloró
  lexicon: HALOT
  rationale: כָּל־הָעָם se vierte de manera natural como «todo el pueblo». Se mantiene el mismo verbo de lamento con «lloró» para conservar la repetición del hebreo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el rastro auditado en inglés POB. Se conservó el paralelismo del llanto y la escena funeraria; la única adaptación principal es la naturalización de אֶל־קֶבֶר אַבְנֵר como una expresión idiomática en español.
  spanish_consistency_notes:
  - Se prefirió «sepultaron» para el acto de enterramiento solemne.
  - Se mantuvo «Hebrón» con acento en español.
  - Se usó «alzó su voz» para preservar el hebraísmo idiomático.
  - Se mantuvo la repetición de «lloró» como eco del verbo hebreo בכה.
