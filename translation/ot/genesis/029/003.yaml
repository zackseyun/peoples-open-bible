id: GEN.29.3
reference: Genesis 29:3
source:
  edition: WLC
  text: וְ/נֶאֶסְפוּ שָׁ֣מָּ/ה כָל הָ/עֲדָרִ֗ים וְ/גָלֲל֤וּ אֶת הָ/אֶ֨בֶן֙ מֵ/עַל֙ פִּ֣י הַ/בְּאֵ֔ר וְ/הִשְׁק֖וּ אֶת הַ/צֹּ֑אן וְ/הֵשִׁ֧יבוּ אֶת הָ/אֶ֛בֶן עַל פִּ֥י הַ/בְּאֵ֖ר לִ/מְקֹמָֽ/הּ־־־־־־׃
translation:
  text: And all the flocks would gather there[a], and they would roll the stone away from the mouth of the well and water the flock[b], and then put the stone back in its place over the mouth of the well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'mouth of the well,' an idiom for the well's opening.
    reason: lexical_alternative
  - marker: b
    text: Or 'in its place over the mouth of the well'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְנֶאֶסְפוּ
  chosen: would gather
  alternatives:
  - were gathered
  - gathered
  lexicon: HALOT
  rationale: Niphal imperfect 3cp of אסף here describes customary/repeated action in the narrative setting, not a single future event. 'Would gather' communicates habitual past action in natural English.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  lexicon: HALOT
  rationale: Adverb of place indicating the location of gathering; idiomatic English is simply 'there'.
- source_word: כָל הָעֲדָרִים
  chosen: all the flocks
  alternatives:
  - all the herds
  lexicon: HALOT
  rationale: עדרים commonly refers to groups of small livestock in this pastoral context. 'Flocks' fits the immediate context of sheep and avoids the broader English 'herds'.
- source_word: וְגָלֲלוּ
  chosen: they would roll ... away
  alternatives:
  - they rolled
  - they would remove
  lexicon: HALOT
  rationale: Qal perfect with vav in this descriptive sequence continues the customary action. 'Roll ... away' preserves the concrete imagery of moving the stone; 'remove' is possible but less vivid.
- source_word: אֶת הָאֶבֶן
  chosen: the stone
  lexicon: HALOT
  rationale: Direct object marking plus definite noun; straightforward rendering.
- source_word: מֵעַל פִּי הַבְּאֵר
  chosen: from the mouth of the well
  alternatives:
  - from over the opening of the well
  - from upon the mouth of the well
  lexicon: HALOT
  rationale: פִּי literally 'mouth of' is a standard Hebrew idiom for an opening. 'Mouth of the well' is both faithful and natural in English; 'from' adequately represents מֵעַל in context.
- source_word: וְהִשְׁקוּ
  chosen: water
  alternatives:
  - give water to
  - let drink
  lexicon: HALOT
  rationale: Hiphil of שׁקה means to give water, cause to drink. English 'water' is concise and idiomatic for livestock.
- source_word: אֶת הַצֹּאן
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: HALOT
  rationale: Though צאן can denote small livestock collectively, 'the sheep' matches the immediate pastoral scene and common English usage here.
- source_word: וְהֵשִׁיבוּ
  chosen: put ... back
  alternatives:
  - returned
  - restored
  lexicon: HALOT
  rationale: Hiphil of שוב means cause to return. For an inanimate object in this context, 'put back' is the most natural English equivalent.
- source_word: עַל פִּי הַבְּאֵר
  chosen: over the mouth of the well
  alternatives:
  - on the mouth of the well
  - over the opening of the well
  lexicon: HALOT
  rationale: עַל indicates placement over/on the well opening. 'Over the mouth of the well' preserves the Hebrew idiom while reading smoothly.
- source_word: לִמְקֹמָהּ
  chosen: in its place
  alternatives:
  - to its place
  - back to its place
  lexicon: HALOT
  rationale: The preposition ל plus מקום with 3fs suffix indicates restoration to the stone's proper location. 'In its place' is idiomatic English; 'back' is implied by the verb and context.
