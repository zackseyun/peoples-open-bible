translation:
  language: es
  text: 'A los gazitas[a] les dijeron: «Sansón ha venido aquí». Entonces lo rodearon y le tendieron una emboscada toda la noche junto a la puerta de la ciudad. Toda la noche guardaron silencio[b], diciendo: «Hasta la luz de la mañana[c], entonces lo mataremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gazitas» traduce el gentilicio plural hebreo; también puede entenderse como «los habitantes de Gaza» o «los gazanos».
    reason: lexical_alternative
  - marker: b
    text: O «permanecieron en silencio» o «se mantuvieron quietos» toda la noche; el hebreo sugiere silencio sigiloso mientras esperaban en emboscada.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «hasta la luz de la mañana».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעַזָּתִים
  english_pob_choice: The Gazites
  chosen_spanish: los gazitas
  alternatives_spanish:
  - los habitantes de Gaza
  - los gazanos
  lexicon: HALOT
  rationale: Es un plural gentilicio referido a los habitantes de Gaza. «Gazitas» conserva la designación local y funciona de manera breve y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: were told, saying
  chosen_spanish: 'les dijeron:'
  alternatives_spanish:
  - 'se les dijo:'
  - 'les fue dicho:'
  lexicon: HALOT
  rationale: La construcción introduce discurso referido. En español, «les dijeron» expresa con naturalidad el reporte implícito sin sobrecargar el texto.
- source_word: בָּא ... הֵנָּה
  english_pob_choice: has come here
  chosen_spanish: ha venido aquí
  alternatives_spanish:
  - vino aquí
  - ha llegado aquí
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la llegada como hecho vigente para la acción siguiente. «Ha venido aquí» conserva ese valor de actualidad.
- source_word: וַיָּסֹבּוּ
  english_pob_choice: surrounded him
  chosen_spanish: lo rodearon
  alternatives_spanish:
  - lo cercaron
  - lo encircled
  lexicon: HALOT
  rationale: El verbo indica ir alrededor; en contexto de asedio/emboscada, «rodearon» comunica bien la acción táctica y no añade más de lo necesario.
- source_word: וַיֶּאֶרְבוּ ל֥וֹ
  english_pob_choice: lay in wait for him
  chosen_spanish: lo tendieron una emboscada
  alternatives_spanish:
  - lo acecharon
  - le tendieron una emboscada
  lexicon: HALOT
  rationale: ארב con ל expresa espera hostil. «Tendieron una emboscada» preserva la fuerza léxica y el sentido militar/hostil del contexto.
- source_word: כָל הַלַּיְלָה
  english_pob_choice: all night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - la noche entera
  lexicon: HALOT
  rationale: Equivalente natural en español que mantiene la duración completa.
- source_word: בְּשַׁעַר הָעִיר
  english_pob_choice: at the city gate
  chosen_spanish: junto a la puerta de la ciudad
  alternatives_spanish:
  - en la puerta de la ciudad
  - a la puerta de la ciudad
  lexicon: HALOT
  rationale: «Puerta de la ciudad» comunica el lugar estratégico del acceso urbano. «Junto a» evita una lectura demasiado literal de ubicación física cerrada dentro de la puerta y encaja con la escena de vigilancia.
- source_word: וַיִּתְחָרְשׁוּ
  english_pob_choice: kept quiet
  chosen_spanish: guardaron silencio
  alternatives_spanish:
  - se mantuvieron callados
  - permanecieron en silencio
  lexicon: HALOT
  rationale: El hitpael transmite silencio/ocultamiento en contexto de emboscada. «Guardaron silencio» preserva la idea de sigilo sin introducir una paráfrasis excesiva.
- source_word: עַד א֥וֹר הַבֹּ֖קֶר
  english_pob_choice: Until the light of morning
  chosen_spanish: Hasta la luz de la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta la luz del alba
  lexicon: HALOT
  rationale: La frase es literalmente «hasta la luz de la mañana». Se mantiene la imagen luminosa, que el inglés POB también preservó.
- source_word: וַהֲרְגְנֻהוּ
  english_pob_choice: then we will kill him
  chosen_spanish: entonces lo mataremos
  alternatives_spanish:
  - y lo mataremos
  - lo mataremos entonces
  lexicon: HALOT
  rationale: El imperfecto cohortativo/jussivo en primera plural expresa intención resuelta. «Entonces lo mataremos» mantiene la secuencia temporal y la intención hablada.
translation_notes:
  revision_awareness: 'Se siguió el último estado revisado del inglés POB: el objeto de «rodearon» se entiende como él, no «el lugar». En español se mantuvo esa relación implícita y se preservó la imagen de silencio nocturno y de la luz de la mañana.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «Samson» como forma propia del nombre según la ortografía española solicitada no estaba especificada; si se requiere adaptación, puede revisarse a «Sansón» en una pasada editorial posterior.
  - Se evitó «Señor» o equivalentes de máscara, ya que el verso no contiene el nombre divino.
  - 'La emboscada y el silencio se distinguieron léxicamente para no perder la doble acción del hebreo: rodear/esperar y callar/estar quietos.'
