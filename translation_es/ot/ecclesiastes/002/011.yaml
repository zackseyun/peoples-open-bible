    rationale: El audit trail del POB eligió 'vanity' como término principal por continuidad temática y reservó 'vapor/aliento' para nota. La transliteración cambia la estrategia traductora documentada y reduce la legibilidad en español sin necesidad textual.
  - severity: medium
