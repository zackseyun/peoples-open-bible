review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro inglés en la secuencia general: inspección sacerdotal tras el lavado, falta de cambio visible, falta de propagación, declaración de impureza, quema y diagnóstico final de deterioro corrosivo en una u otra superficie del material. Sin embargo, hay dos desajustes importantes con el sentido y con el audit trail: (1) הַנֶּגַע se volvió sistemáticamente «la plaga», que en español moderno suena a calamidad/epidemia y no refleja bien el valor contextual de área/mancha/afección en un tejido o cuero; (2) la nota [a] no preserva la alternativa documentada sobre «apariencia/color», sino que introduce una observación redundante sobre el pasivo. Además, «es inmunda» fuerza concordancia con «plaga», cuando el hebreo apunta al objeto afectado y en español suena más natural «está inmundo/impuro» o reformular con referente material.'
  spanish_quality_summary: El español es legible, pero «la plaga» repetida tres veces resulta poco natural en este contexto material de Levítico 13. «Lado desnudo» también suena algo antropomórfico; «lado pelado» o «superficie desnuda» sería más idiomático, aunque «desnuda» puede mantenerse si se apoya por nota. La puntuación y el tono son adecuados. Conviene simplificar para claridad y evitar una nota mal enfocada.
  glossary_alignment: 'No hay conflicto con los términos teológicos globales principales. El problema terminológico es contextual: para נגע, aquí conviene «mancha» o «zona afectada» mejor que «plaga». «Inmundo»/«impuro» para טמא se alinea mejor con el registro ritual que «inmunda» concordando con «plaga». «Mancha corrosiva» para פּחתת es aceptable y coherente con la decisión inglesa.'
