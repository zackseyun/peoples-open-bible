translation:
  language: es
  text: Y así también ustedes[a], durante sus fiestas designadas, celebren un día notable con toda clase de banquetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus fiestas conmemorativas» o «sus fiestas señaladas». La expresión griega se refiere literalmente a fiestas que llevan nombre o designación.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὑμεῖς οὖν
  english_pob_choice: And so you also
  chosen_spanish: Y así también ustedes
  alternatives_spanish:
  - Por tanto, ustedes también
  - Y ustedes también, por lo tanto
  lexicon: BDAG
  rationale: La combinación conjuntiva e inferencial se vierte de modo natural con «Y así también», preservando el sentido de continuación exhortativa sin forzar un calco.
- source_word: ἐν ταῖς ἐπωνύμοις ὑμῶν ἑορταῖς
  english_pob_choice: on your appointed festivals
  chosen_spanish: en sus fiestas señaladas
  alternatives_spanish:
  - en sus fiestas nombradas
  - en sus fiestas conmemorativas
  lexicon: LSJ
  rationale: ἐπωνύμοις expresa festivales que llevan nombre o designación. «Fiestas señaladas» comunica que son fiestas marcadas/distinguidas y evita una formulación demasiado técnica; «señaladas» mantiene algo de la fuerza de designación sin fijar indebidamente solo la idea de mandato.
- source_word: ἐπίσημον ἡμέραν
  english_pob_choice: a notable day
  chosen_spanish: un día notable
  alternatives_spanish:
  - un día distinguido
  - un día marcado
  lexicon: BDAG
  rationale: ἐπίσημον pide la idea de algo destacado o distinguido. «Día notable» es idiomático en español y conserva el valor conmemorativo.
- source_word: μετὰ πάσης εὐωχίας
  english_pob_choice: with every kind of feasting
  chosen_spanish: con toda clase de banquetes
  alternatives_spanish:
  - con toda clase de festín
  - con todo tipo de celebración festiva
  lexicon: LSJ
  rationale: εὐωχία apunta a banquete o gozo festivo, con referencia concreta a comida y celebración. «Banquetes» conserva la materialidad festiva mejor que una paráfrasis general.
- source_word: ἄγετε
  english_pob_choice: keep
  chosen_spanish: celebren
  alternatives_spanish:
  - observen
  - guarden
  lexicon: BDAG
  rationale: En contexto festivo, el imperativo exhorta a observar/celebrar el día. «Celebren» fluye con naturalidad en español y expresa el acto de mantener la fiesta.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «appointed festivals» sobre «named festivals». En español se optó por «fiestas señaladas», que transmite tanto la idea de designación como la de festividad establecida, sin perder la alusión etimológica de ἐπωνύμοις.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Señor» o terminología eclesiástica no requerida por el griego.
  - «Fiestas señaladas» deja abierta la relación entre nombramiento, conmemoración y designación, coherente con la nota auditada del inglés.
