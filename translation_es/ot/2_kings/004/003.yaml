base_translation:
  language: en
  yaml_path: translation/ot/2_kings/004/003.yaml
  text: Then he said[a], “Go, borrow vessels for yourself from outside, from all your neighbors—empty vessels[b]. Do not gather only a few.”
  footnotes:
  - marker: a
    text: Or 'ask for vessels'; the Hebrew verb can mean 'ask' more generally, but here likely implies borrowing from neighbors for temporary use.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Do not make few' or 'Do not diminish.' The sense in context is not to collect only a small number of vessels.
    reason: lexical_alternative
