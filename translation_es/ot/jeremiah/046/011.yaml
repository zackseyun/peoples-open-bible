translation:
  language: es
  text: Sube a Galaad y toma bálsamo[a], virgen hija de Egipto. En vano has multiplicado remedios[b]; no hay curación para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Galaad era conocido por su bálsamo medicinal; el mandato es irónico, porque ni el remedio más célebre sanará a Egipto.
    reason: cultural_note
  - marker: b
    text: 'O: «En vano has usado muchos remedios». La forma verbal hebrea en «has multiplicado» es textual y morfológicamente difícil en el texto consonántico, pero el sentido en contexto es claro: los muchos tratamientos de Egipto resultan inútiles.'
    reason: textual_variant
lexical_decisions:
- source_word: עֲלִי
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Ve hacia arriba
  lexicon: HALOT
  rationale: Imperativo femenino singular de עלה. «Sube» conserva el movimiento direccional y suena natural en español sin perder la fuerza del mandato profético.
- source_word: גִלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español bíblico es estándar «Galaad», transliteración asentada y reconocible.
- source_word: וּקְחִי
  english_pob_choice: and get
  chosen_spanish: toma
  alternatives_spanish:
  - y toma
  - y consigue
  lexicon: HALOT
  rationale: Imperativo femenino singular de לקח. «Toma» refleja la acción de obtener el bálsamo y es idiomático en español.
- source_word: צֳרִי
  english_pob_choice: balm
  chosen_spanish: bálsamo
  alternatives_spanish:
  - resina
  - medicina
  lexicon: HALOT
  rationale: Término del remedio famoso de Galaad; «bálsamo» preserva la imagen medicinal y la asociación cultural del texto.
- source_word: בְּתוּלַת בַּת מִצְרָיִם
  english_pob_choice: virgin daughter of Egypt
  chosen_spanish: virgen hija de Egipto
  alternatives_spanish:
  - doncella hija de Egipto
  - virgen hija egipcia
  lexicon: HALOT
  rationale: Conservar «virgen hija de Egipto» mantiene la personificación profética y la estructura metafórica del hebreo sin suavizarla.
- source_word: לַשָּׁוְא
  english_pob_choice: In vain
  chosen_spanish: En vano
  alternatives_spanish:
  - Para nada
  - Sin provecho
  lexicon: HALOT
  rationale: Expresa con claridad la idea de futility/ineficacia y corresponde bien al tono del juicio profético.
- source_word: הרביתי
  english_pob_choice: you have multiplied
  chosen_spanish: has multiplicado
  alternatives_spanish:
  - has aumentado
  - has hecho muchas
  lexicon: HALOT
  rationale: Sigue la lectura contextual del verbo como 2.ª singular femenina dirigida a Egipto. «Has multiplicado» preserva la abundancia de los remedios y la ironía del texto.
- source_word: רְפֻא֔וֹת
  english_pob_choice: remedies
  chosen_spanish: remedios
  alternatives_spanish:
  - medicinas
  - curas
  lexicon: HALOT
  rationale: Plural de recursos curativos concretos; «remedios» comunica mejor los tratamientos intentados que un abstracto como «curas».
- source_word: תְּעָלָ֖ה
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - salud
  lexicon: HALOT
  rationale: Aquí el sustantivo expresa la restauración buscada frente a la enfermedad o herida. «Sanidad» conserva el sentido de recuperación integral y suena natural en registro bíblico moderno.
- source_word: אֵ֥ין לָךְ
  english_pob_choice: there is no ... for you
  chosen_spanish: no hay ... para ti
  alternatives_spanish:
  - no tienes ...
  - no existe ... para ti
  lexicon: HALOT
  rationale: La negación existencial se vierte de modo directo y fluido en español; «no hay sanidad para ti» conserva la contundencia del hebreo.
translation_notes:
  revision_awareness: Se mantuvo la lectura contextual del verbo problemático como segunda persona femenina singular, en continuidad con el análisis auditado del texto hebreo y la solución adoptada en la POB inglesa. No se introdujeron cambios de sentido sustanciales.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se prefirió «bálsamo», «remedios» y «sanidad» para conservar la red médica e irónica del hebreo.
  - La personificación «virgen hija de Egipto» se mantuvo sin suavizarla para no perder el paralelismo profético.
