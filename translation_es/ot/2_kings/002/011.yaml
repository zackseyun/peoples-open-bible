  to: Y aconteció que, mientras ellos iban caminando y hablando, he aquí, un carro de fuego y caballos de fuego separaron a los dos de ellos[b], y Elías subió en el torbellino[a] al cielo.
  rationale: Se reubicó la nota léxica al segmento correcto («en el torbellino») y se añadió la nota exegética presente en la auditoría inglesa para preservar la distinción entre el elemento que separa y el medio explícitamente asociado con la subida de Elías. También se ajustó «a los dos» a «a los dos de ellos» para reflejar un poco más claramente el dual explícito del hebreo.
