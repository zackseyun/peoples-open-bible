base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/034.yaml
  text: David said to Saul[a], “Your servant was tending his father’s sheep[b], and when a lion or a bear came and carried off a lamb from the flock,”
  footnotes:
  - marker: a
    text: 'Or, more formally, ''the lion and the bear''; the Hebrew uses ''and,'' but the sense is likely distributive: either predator would come.'
    reason: lexical_alternative
  - marker: b
    text: '''A lamb'' may also be rendered ''a sheep'' or ''one animal of the flock,'' since the Hebrew term can be broader than a young lamb.'
    reason: lexical_alternative
