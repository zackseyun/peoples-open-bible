translation:
  language: es
  text: Porque él estableció un testimonio en Jacob y puso una ley en Israel[a][b][c], que mandó a nuestros padres para darlo a conocer a sus descendientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ley» traduce aquí תּוֹרָה; también puede entenderse como «instrucción».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «nuestros padres»; se conserva el masculino explícito del original.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sus hijos»; en contexto probablemente se refiere a la descendencia en sentido intergeneracional, no solo a varones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - levantó
  - puso
  - estableció
  lexicon: HALOT
  rationale: 'El Hifil de קום tiene valor causativo: hacer que algo quede firme o establecido. En español, «estableció» comunica bien esa noción institucional y de permanencia, sin volverlo demasiado físico.'
- source_word: עֵדוּת
  english_pob_choice: a testimony
  chosen_spanish: un testimonio
  alternatives_spanish:
  - un testimonio
  - un decreto
  - una estipulación de pacto
  lexicon: HALOT
  rationale: «Testimonio» conserva el sentido léxico básico de עֵדוּת y deja abierta la resonancia de testimonio/certificación divina sin estrecharla solo a «decreto».
- source_word: בְּיַעֲקֹב
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - entre Jacob
  - para Jacob
  lexicon: HALOT
  rationale: Se mantiene la preposición «en» para preservar el paralelismo poético con «en Israel» y el valor corporativo de Jacob como nombre del pueblo.
- source_word: וְתוֹרָה
  english_pob_choice: and a law
  chosen_spanish: y una ley
  alternatives_spanish:
  - y una instrucción
  - y la ley
  lexicon: HALOT
  rationale: Aunque תּוֹרָה también puede significar «instrucción», aquí el contexto de establecimiento y mandato favorece «ley» para conservar el peso normativo-covenantal. El artículo indefinido «una» refleja el hebreo sin absolutizarlo como título técnico.
- source_word: שָׂם
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - estableció
  - colocó
  lexicon: HALOT
  rationale: שׂים es «poner/colocar/establecer». «Puso» es natural en español y mantiene la sencillez del paralelo con «estableció».
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - para Israel
  lexicon: HALOT
  rationale: 'Se conserva «en» por la misma razón que en Jacob: el paralelo poético y el sentido de pertenencia/corporatividad dentro del pueblo.'
- source_word: אֲשֶׁר צִוָּה
  english_pob_choice: which he commanded
  chosen_spanish: que mandó
  alternatives_spanish:
  - que ordenó
  - que mandó
  lexicon: HALOT
  rationale: צוה se vierte naturalmente como «mandó»; en español es claro y fiel al carácter de mandato transmitido a los padres.
- source_word: אֶת אֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  lexicon: HALOT
  rationale: Se retiene la referencia masculina explícita del hebreo con «padres», siguiendo la política de precisión de género cuando el original lo marca.
- source_word: לְהוֹדִיעָם
  english_pob_choice: to make known
  chosen_spanish: para que la dieran a conocer
  alternatives_spanish:
  - para hacerla saber
  - para enseñarla
  lexicon: HALOT
  rationale: La forma causativa de ידע expresa «hacer saber / dar a conocer». En español, «para que la dieran a conocer» reproduce bien la idea comunicativa amplia sin reducirla solo a «enseñar».
- source_word: לִבְנֵיהֶם
  english_pob_choice: to their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos
  - a su descendencia
  lexicon: HALOT
  rationale: בנים se traduce aquí de modo natural como «hijos». Aunque puede tener valor genérico de descendencia, el término español mantiene la referencia intergeneracional sin forzar neutralización.
theological_decisions:
- issue: Sentido de תּוֹרָה en un salmo de transmisión del pacto
  english_pob_reading: a law
  chosen_spanish_reading: una ley
  alternative_spanish_readings:
  - una instrucción
  rationale: El contexto une «testimonio» y «ley» con el mandato de transmitirlos a la siguiente generación. «Ley» preserva mejor la fuerza normativa y el carácter de ordenanza pactal en español.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Lenguaje de parentesco masculino explícito en אֲבוֹתֵינוּ y לִבְנֵיהֶם
  english_pob_reading: our fathers ... their children
  chosen_spanish_reading: nuestros padres ... sus hijos
  alternative_spanish_readings:
  - nuestros antepasados ... sus hijos
  - nuestros padres ... su descendencia
  rationale: Se conserva «padres» porque el hebreo es explícitamente masculino. Para בנים, «hijos» es una traducción natural y suficientemente amplia en español bíblico para el marco intergeneracional del verso.
  doctrine_reference: Translation philosophy §4 (precisión de género sobre neutralización automática)
- issue: Relación entre el testimonio/ley y su transmisión
  english_pob_reading: which he commanded our fathers to make known to their children
  chosen_spanish_reading: que mandó a nuestros padres para que la dieran a conocer a sus hijos
  alternative_spanish_readings:
  - que mandó a nuestros padres para que se la enseñaran a sus hijos
  - que mandó a nuestros padres para hacerla saber a sus hijos
  rationale: El hebreo destaca una cadena de transmisión autorizada por mandato divino. «Dieran a conocer» mantiene la amplitud semántica de הוֹדִיעַ sin imponer un único modo pedagógico.
  doctrine_reference: Translation philosophy §3 (claridad con fidelidad al alcance semántico)
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se introdujeron cambios sustantivos respecto del texto auditado en inglés; se mantuvo la equivalencia óptima con ajustes naturales al español.'
  spanish_consistency_notes:
  - Se preserva el paralelismo «en Jacob / en Israel».
  - «Testimonio» y «ley» mantienen la distinción léxica del hebreo.
  - Se respeta el género explícito de «padres» sin neutralización.
  - «Sus hijos» comunica el sentido intergeneracional de בניים sin perder naturalidad en español.
  - Las notas a, b y c siguen el orden y la función de las variantes del audit trail inglés.
