  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐν μεγάλῃ δὲ οἰκίᾳ οὐκ ἔστιν μόνον σκεύη χρυσᾶ καὶ ἀργυρᾶ ἀλλὰ καὶ ξύλινα καὶ ὀστράκινα, καὶ ἃ μὲν εἰς τιμὴν ἃ δὲ εἰς ἀτιμίαν·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/020.yaml
  text: Now in a large house there are not only gold and silver vessels, but also wooden and earthenware ones, and some are for honor, but others for dishonor.
translation:
  language: ko
  text: 큰 집에는 금그릇과 은그릇만 있는 것이 아니라 나무그릇과 질그릇[a]도 있습니다. 어떤 것은 귀하게 쓰이고, 어떤 것은 천하게 쓰입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「질그릇」은 흙으로 빚은 그릇을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_korean: 그릇
  alternatives_korean:
  - 기명
  - 용기
  lexicon: BDAG
  rationale: 「그릇」이 한국 성서 전통에서 σκεῦος의 표준 어휘이며, 다음 절(21)의 비유 적용에서도 자연스럽다.
- source_word: ξύλινα καὶ ὀστράκινα
  english_pob_choice: wooden and earthenware
  chosen_korean: 나무그릇과 질그릇
  alternatives_korean:
  - 나무 그릇과 토기
  - 목제와 토기
  lexicon: BDAG
  rationale: ὀστράκινον은 토기·도자기. 한국 성서 전통의 「질그릇」이 자연스럽다.
- source_word: εἰς τιμὴν ... εἰς ἀτιμίαν
  english_pob_choice: for honor ... for dishonor
  chosen_korean: 귀하게 쓰이고 ... 천하게 쓰입니다
  alternatives_korean:
  - 귀한 용도로 ... 천한 용도로
  - 영예로운 일에 ... 천한 일에
  lexicon: BDAG
  rationale: τιμή/ἀτιμία를 그릇의 용도에 적용하여 「귀하게 쓰이다/천하게 쓰이다」로 옮기면 한국어로 자연스러우며, 다음 절의 비유 적용을 매끄럽게 받는다.
