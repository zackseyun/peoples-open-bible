  - marker: b
    text: 'O: ''la multitud se iba deshaciendo, y se iba de aquí para allá''. El hebreo es conciso y presenta confusión visible entre los filisteos.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta הַצֹּפִים a ''vigías'' para reflejar mejor el sentido de observadores apostados, y la cláusula final se rehace para conservar más fielmente el doble movimiento hebreo: la multitud se estaba deshaciendo y yendo erráticamente ''aquí y allá''.'
