  to: Por esta razón nuestros padres fueron entregados a la espada y al saqueo, y cayeron como una gran matanza[a] delante de nuestros enemigos.
  rationale: Se reemplaza «matadero» por «matanza» para reflejar con mayor fidelidad y naturalidad el sentido de πτῶμα μέγα en español. Se mantiene «como» para seguir la revisión auditada del inglés («as a great slaughter»), pero con una expresión española inteligible. El marcador de nota se mueve al final del sintagma que la nota realmente explica.
