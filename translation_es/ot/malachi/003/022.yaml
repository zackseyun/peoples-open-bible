    rationale: Las notas [a] y [c] deben quedar ancladas a las expresiones pertinentes. El texto actual funciona, pero el anclaje puede hacerse más transparente al poner [a] tras «ley» y [b] tras «Horeb».
  revised_spanish_text: 'Recuerden la ley[a] de Moisés, mi siervo, que le mandé en Horeb[b] para todo Israel: estatutos y juicios[c].'
