revisions:
- from: Y descubrió el manto de Judá[a][b], y aquel día miraste hacia las armas de la Casa del Bosque.
  to: Y quitó la cobertura de Judá[a][b], y aquel día miraste hacia las armas de la Casa del Bosque.
  rationale: 'Se revisa la primera cláusula para alinearla más estrechamente con el hebreo y con el audit trail inglés: וַיְגַל + מָסַךְ se expresa mejor como «quitó la cobertura» que como «descubrió el manto». «Cobertura» preserva la metáfora sin estrecharla a una prenda, y «quitó» comunica la remoción de la protección de Judá con mayor naturalidad y precisión en español. El resto del versículo puede mantenerse.'
  reviewer_model: gpt-5.4
