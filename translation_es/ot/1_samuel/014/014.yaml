  to: Esa primera matanza, que hicieron Jonatán y su escudero, fue como de veinte hombres en como medio surco[a] de un yugo de campo.
  rationale: Se reemplaza «derramamiento de sangre» por «matanza» para reflejar mejor הַמַּכָּה en contexto bélico letal; «Jonathan» por «Jonatán» según uso español; y «reja» por «surco», que corresponde a מַעֲנָה. También se simplifica la secuencia espacial para que conserve la doble aproximación del hebreo sin volverse opaca, y se consolida la explicación agraria en una sola nota fiel al audit trail inglés.
