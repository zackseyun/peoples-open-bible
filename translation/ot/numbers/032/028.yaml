id: NUM.32.28
reference: Numbers 32:28
source:
  edition: WLC
  text: וַ/יְצַ֤ו לָ/הֶם֙ מֹשֶׁ֔ה אֵ֚ת אֶלְעָזָ֣ר הַ/כֹּהֵ֔ן וְ/אֵ֖ת יְהוֹשֻׁ֣עַ בִּן נ֑וּן וְ/אֶת רָאשֵׁ֛י אֲב֥וֹת הַ/מַּטּ֖וֹת לִ/בְנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: So Moses commanded Eleazar the priest[a], Joshua son of Nun[b], and the heads of the fathers’ houses of the tribes of the sons of Israel concerning them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commanded them,' taking 'them' as the leaders named in the verse rather than as the tribes mentioned previously.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heads of the fathers’ houses of the tribes of the sons of Israel,' an administrative expression for Israel’s clan and tribal leaders.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַו
  chosen: gave orders
  alternatives:
  - commanded
  - instructed
  lexicon: HALOT
  rationale: The verb צוה denotes commanding or giving instructions. 'Gave orders' preserves the authoritative force while reading naturally in modern English. 'Commanded' is possible, but here the object is a group of leaders entrusted with implementing Moses' decision, so 'gave orders concerning them' fits the administrative context well.
- source_word: לָהֶם
  chosen: concerning them
  alternatives:
  - to them
  - about them
  lexicon: HALOT
  rationale: The pronominal phrase most naturally refers back to the Reubenites and Gadites in the immediate context. In English, 'gave orders to them to Eleazar...' would be awkward because Eleazar, Joshua, and the clan heads are the recipients of the command. Rendering it 'concerning them' captures the sense that Moses issued instructions about those tribes to these leaders.
- source_word: אֵת אֶלְעָזָר הַכֹּהֵן
  chosen: to Eleazar the priest
  alternatives:
  - Eleazar the priest
  lexicon: HALOT
  rationale: The direct-object marker with צוה introduces the persons charged with carrying out the command. English idiom requires 'to' with 'gave orders,' making the relationship explicit.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua the son of Nun
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Son of Nun' is the natural concise English rendering of the Hebrew patronymic.
- source_word: רָאשֵׁי אֲבוֹת הַמַּטּוֹת
  chosen: the heads of the fathers’ houses of the tribes
  alternatives:
  - the heads of the ancestral houses of the tribes
  - the chiefs of the fathers’ houses of the tribes
  lexicon: HALOT
  rationale: This is a compressed administrative expression. רָאשֵׁי are leaders/heads; אֲבוֹת here refers to paternal or ancestral houses/clans; הַמַּטּוֹת are tribes. 'Heads of the fathers’ houses of the tribes' stays close to the Hebrew structure while remaining understandable. 'Ancestral houses' is smoother but slightly more interpretive.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - for the Israelites
  - of the people of Israel
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'for/of the sons of Israel.' Because the phrase modifies the tribal leadership structure, a more formal rendering preserves the source texture. 'Israelites' is possible, but 'sons of Israel' better reflects the genealogical and tribal framing of the passage.
