lexical_decisions:
- source_word: ὁ ἕτερος
  english_pob_choice: The other
  chosen_spanish: El otro
  alternatives_spanish:
  - El segundo
  - Otro
  lexicon: LSJ
  rationale: Con el artículo y ἕτερος, la frase señala al siguiente participante identificado en la secuencia. «El otro» conserva de forma natural la oposición implícita con el escritor anterior sin añadir información.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - anotó
  - inscribió
  lexicon: LSJ
  rationale: El aoristo de γράφω significa simplemente «escribió». En español, «escribió» es la opción más directa y natural; «inscribió» sugeriría una acción más técnica o solemne de la que el griego no obliga a inferir.
- source_word: Ὑπερισχύει
  english_pob_choice: is strongest
  chosen_spanish: es el más fuerte
  alternatives_spanish:
  - prevalece
  - tiene la ventaja
  - es más fuerte
  lexicon: LSJ
  rationale: ὑπερισχύω expresa superioridad de fuerza o de poder prevaleciente. Dado el contexto de afirmaciones competidoras, «es el más fuerte» refleja bien la fuerza superlativa del enunciado y mantiene una lectura transparente en español. «Prevalece» sigue siendo una alternativa válida, pero aquí sonaría menos directa como predicado descriptivo.
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  - el gobernante
  lexicon: LSJ
  rationale: βασιλεύς significa «rey». «El rey» es la equivalencia precisa y más natural; «gobernante» sería demasiado general.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que llevó de «is stronger» a «is strongest» para reflejar mejor Ὑπερισχύει en el marco de una serie de afirmaciones competitivas. En español se optó por una formulación superlativa natural («es el más fuerte»), que conserva ese matiz.
  spanish_consistency_notes:
  - Se mantiene «rey» para βασιλεύς según el valor léxico básico del griego.
  - No se introducen términos eclesiásticos ni interpretativos ajenos al breve enunciado.
  - La nota al pie conserva la alternativa semántica principal sin sobrecargar el texto principal.
