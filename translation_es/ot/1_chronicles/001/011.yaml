lexical_decisions:
- source_word: מִצְרַיִם
  english_pob_choice: Mizraim
  chosen_spanish: Mizraim
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: En esta genealogía se trata del nombre propio del antepasado, no del topónimo. Se conserva la transliteración para mantener la fuerza onomástica y la coherencia con el enfoque POB.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  lexicon: HALOT
  rationale: En contexto genealógico el verbo expresa descendencia/engendramiento. «Engendró» es la opción española más natural y fiel al valor genealógico masculino del hebreo.
- source_word: לודיים
  english_pob_choice: Ludites
  chosen_spanish: luditas
  alternatives_spanish:
  - Ludim
  lexicon: HALOT
  rationale: El inglés POB lo trata como etnónimo. En español, «luditas» conserva ese valor de grupo humano y adapta la forma al plural habitual, mientras que «Ludim» sería una transliteración más estricta.
- source_word: עֲנָמִים
  english_pob_choice: Anamites
  chosen_spanish: anamitas
  alternatives_spanish:
  - Anamim
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con los demás etnónimos de la lista. «Anamitas» es claro en español y refleja el mismo criterio aplicado en inglés.
- source_word: לְהָבִים
  english_pob_choice: Lehabites
  chosen_spanish: lehabitas
  alternatives_spanish:
  - Lehabim
  lexicon: HALOT
  rationale: Se conserva la lectura étnica del nombre y se adapta a una forma castellana transparente, equivalente al etnónimo inglés.
- source_word: נַפְתֻּחִים
  english_pob_choice: Naphtuhites
  chosen_spanish: naptuhitas
  alternatives_spanish:
  - Naphtuhim
  lexicon: HALOT
  rationale: Se sigue el mismo patrón etnónimo de la lista, con adaptación al español. La transliteración más directa queda como alternativa.
translation_notes:
  revision_awareness: El texto inglés POB y la revisión más reciente coinciden sin cambios; no se detectan revisiones aplicadas que afecten esta línea. Se preserva el mismo criterio de transliteración de nombres propios y etnónimos, con adaptación española para legibilidad.
  spanish_consistency_notes:
  - Se mantiene «Mizraim» como nombre propio genealógico, en línea con el criterio POB de no traducirlo como «Egipto» aquí.
  - Los etnónimos se adaptan al plural español («-itas») para lectura natural, sin perder la referencia a pueblos descendientes de Mizraim.
  - No se añade puntuación explicativa fuera del alcance del texto fuente; se respeta la lista coordinada simple del hebreo.
