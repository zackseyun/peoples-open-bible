translation:
  language: es
  text: Quien arroja una piedra hacia arriba[a] la arroja sobre su propia cabeza, y un golpe traicionero hace heridas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia lo alto». El griego expresa movimiento ascendente; la frase puede traducirse de manera más literal o más idiomática.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ βάλλων
  english_pob_choice: Whoever throws
  chosen_spanish: Quien arroja
  alternatives_spanish:
  - El que arroja
  - Quien tira
  lexicon: LSJ
  rationale: El participio articular funciona de manera genérica y proverbial. «Quien arroja» conserva la fuerza gnómica con español natural y digno.
- source_word: λίθον
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una roca
  - piedra
  lexicon: LSJ
  rationale: El singular indefinido se expresa de forma directa. «Piedra» es el equivalente más natural en español para esta imagen proverbial.
- source_word: εἰς ὕψος
  english_pob_choice: upward
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - en alto
  - a lo alto
  lexicon: LSJ
  rationale: La frase indica movimiento ascendente. «Hacia arriba» es idiomático y conserva el sentido de acción que rebota sobre el propio sujeto.
- source_word: ἐπὶ κεφαλὴν αὐτοῦ βάλλει
  english_pob_choice: throws it on his own head
  chosen_spanish: la arroja sobre su propia cabeza
  alternatives_spanish:
  - la lanza sobre su propia cabeza
  - la echa sobre su propia cabeza
  lexicon: LSJ
  rationale: Se mantiene el paralelismo con el primer verbo y se explicita el valor reflexivo con «su propia». «Arroja» funciona bien en ambos miembros y evita una traducción demasiado mecánica.
- source_word: πληγὴ δολία
  english_pob_choice: a treacherous blow
  chosen_spanish: un golpe traicionero
  alternatives_spanish:
  - un golpe engañoso
  - un golpe pérfido
  lexicon: LSJ
  rationale: πληγή puede designar golpe, herida o lesión; aquí el paralelo favorece el acto que produce daño. «Traicionero» recoge la carga moral de δολία y mantiene el tono proverbial.
- source_word: διελεῖ
  english_pob_choice: makes
  chosen_spanish: causa
  alternatives_spanish:
  - hace
  - abre
  - divide
  lexicon: LSJ
  rationale: El verbo puede sugerir separar o dividir, pero con τραύματα como objeto el sentido en español debe ser claro y no excesivamente interpretativo. «Causa heridas» refleja el efecto producido sin perder la tersura del dicho.
- source_word: τραύματα
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - lesiones
  - llagas
  lexicon: LSJ
  rationale: τραύματα significa heridas o lesiones. «Heridas» es la equivalencia más directa y vívida en español contemporáneo.
theological_decisions:
- issue: Valor proverbial y retributivo del dicho
  english_pob_reading: A general proverb about self-harm and the consequences of treachery, without explicit divine-agent language.
  chosen_spanish_reading: Un refrán general sobre el daño que vuelve al que actúa y sobre el efecto dañino del engaño.
  alternative_spanish_readings:
  - Una afirmación moral más específica sobre la retribución divina
  - Una advertencia sapiencial centrada solo en la prudencia
  rationale: El griego presenta una sentencia gnómica sin referencia explícita a Dios. La traducción mantiene el carácter sapiencial y la advertencia moral sin añadir un agente divino inexistente en el texto.
  doctrine_reference: Sabiduría proverbial; no hay afirmación doctrinal explícita adicional
translation_notes:
  revision_awareness: El inglés POB revisó la segunda cláusula de «opens wounds» a «makes wounds» para acercarse más al verbo griego y evitar una interpretación excesiva. En español se siguió esa cautela con «causa heridas», manteniendo el efecto del verbo sin convertirlo en una explicación más amplia. También se preservó el paralelismo proverbial de la primera cláusula con un lenguaje natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino ni una cita alusiva.
  - Se prefirió «heridas» en lugar de «lesiones» por su mayor fuerza proverbial y correspondencia directa con τραύματα.
  - «Quien» conserva bien el valor genérico del participio articular griego en un registro moderno y respetuoso.
