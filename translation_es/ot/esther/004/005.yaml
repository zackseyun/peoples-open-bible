translation:
  language: es
  text: Entonces Ester llamó a Hatac[a], uno de los eunucos del rey, a quien él había asignado para atenderla, y le encargó que fuera a ver a Mardoqueo, para saber qué era esto y por qué sucedía esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de los funcionarios de la corte del rey». El término hebreo puede designar específicamente a un eunuco o, en algunos contextos, a un oficial real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  english_pob_choice: Then Esther called for
  chosen_spanish: Entonces Ester llamó a
  alternatives_spanish:
  - Y Ester llamó a
  - Entonces Ester mandó llamar a
  lexicon: HALOT
  rationale: La forma narrativa encadenada del verbo se reproduce con «Entonces»; «llamó a» expresa de manera natural la acción de convocar a alguien ante sí.
- source_word: לַהֲתָךְ
  english_pob_choice: Hathach
  chosen_spanish: Hatac
  alternatives_spanish:
  - Hataj
  - Hathac
  lexicon: Transliteración propia del nombre
  rationale: Se conserva el nombre propio mediante transliteración, adaptada a la ortografía española para lectura fluida.
- source_word: מִסָּרִיסֵי הַמֶּלֶךְ
  english_pob_choice: one of the king’s eunuchs
  chosen_spanish: uno de los eunucos del rey
  alternatives_spanish:
  - uno de los oficiales del rey
  - uno de los funcionarios de la corte del rey
  lexicon: HALOT
  rationale: Se mantiene el sentido más concreto de סָרִיס, como en la lectura principal inglesa. En este contexto de corte persa, «eunucos» es fiel y claro en español.
- source_word: אֲשֶׁר הֶעֱמִיד לְפָנֶיהָ
  english_pob_choice: whom he had appointed to attend her
  chosen_spanish: a quien él había puesto para atenderla
  alternatives_spanish:
  - a quien él había puesto delante de ella
  - a quien él había asignado a su servicio
  lexicon: HALOT
  rationale: «Había puesto para atenderla» comunica la idea de asignación oficial y presencia ante la reina sin forzar un giro demasiado literal en español. El sujeto implícito se entiende como el rey, como en la lectura inglesa.
- source_word: וַתְּצַוֵּהוּ עַל מָרְדֳּכָי
  english_pob_choice: and commanded him concerning Mordecai
  chosen_spanish: y le mandó acerca de Mardoqueo
  alternatives_spanish:
  - y le ordenó sobre Mardoqueo
  - y le encargó el asunto de Mardoqueo
  lexicon: HALOT
  rationale: «Mandó» conserva la fuerza imperativa del verbo; «acerca de» expresa de forma natural la preposición עַל en este marco de asunto o encargo.
- source_word: לָדַעַת
  english_pob_choice: to learn
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para averiguar
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte con «para saber», opción breve y natural que conserva la finalidad investigativa del contexto.
- source_word: מַה זֶּה
  english_pob_choice: what this was
  chosen_spanish: qué era esto
  alternatives_spanish:
  - qué era esto mismo
  - qué significaba esto
  lexicon: HALOT
  rationale: Se preserva la referencia abierta del demostrativo hebreo con «esto», sin añadir una interpretación más fuerte como «significaba».
- source_word: וְעַל מַה זֶּה
  english_pob_choice: and why this was
  chosen_spanish: y por qué era esto
  alternatives_spanish:
  - y por qué era así
  - y cuál era la causa de esto
  lexicon: HALOT
  rationale: Se refleja la repetición hebrea del demostrativo y la pregunta causal con una formulación española natural. «Era esto» conserva mejor la forma del hebreo que una paráfrasis más libre.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al eliminar una repetición innecesaria del sujeto y al conservar el paralelismo de la doble pregunta con el demostrativo «esto».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton cuando aparezca, pero aquí no hay referencia explícita al nombre divino.
  - Se conserva la distinción entre nombre propio transliterado («Hatac») y título funcional («eunucos»).
  - La doble secuencia interrogativa reproduce la repetición del hebreo con el mismo demostrativo «esto» para no suavizar la tensión del texto.
