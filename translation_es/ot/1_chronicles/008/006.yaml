revisions:
- from: 'Estos eran los hijos de Ehud[a]. Estos eran los jefes de las casas paternas[b] de los habitantes de Geba, y los llevaron cautivos a Manahat:'
  to: 'Estos eran los hijos de Ehud. Estos eran los jefes de las casas paternas[a] de los habitantes de Geba, y los llevaron al exilio a Manahat[b]:'
  rationale: Se ajusta el verbo final para reflejar mejor el sentido de exilio forzado de גלה y para alinearlo con la revisión auditada del POB inglés. Se conserva 'casas paternas' con su nota explicativa, y se añade una nota de alternativa léxica para la cláusula final. La nota anterior sobre 'hijos de' se elimina por ser menos necesaria en este versículo.
