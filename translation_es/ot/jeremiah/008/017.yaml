translation:
  language: es
  text: Porque, he aquí, estoy enviando entre ustedes serpientes, víboras[a] que no pueden ser encantadas[b], y los morderán, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Víboras» refleja el término más específico y peligroso; también podría traducirse «áspides» o «serpientes venenosas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para las cuales no hay encantamiento» o «no hay conjuro». El sentido es que no pueden ser dominadas por ese medio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la explicación o razón del anuncio anterior. «Porque» conserva bien ese valor causal en español sin volver la frase artificial.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí, estoy
  alternatives_spanish:
  - mira, estoy
  - aquí estoy
  lexicon: HALOT
  rationale: La construcción es enfática y deíctica. «He aquí» mantiene el tono formal y solemne que el audit trail inglés señaló como adecuado para הִנְנִי.
- source_word: מְשַׁלֵּחַ
  english_pob_choice: sending
  chosen_spanish: enviando
  alternatives_spanish:
  - mandando
  - despachando
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente o segura. «Enviando» transmite bien la imagen y funciona naturalmente con «estoy».
- source_word: בָּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - contra ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: El sentido espacial encaja con la imagen de soltar serpientes en el medio del pueblo. «Entre ustedes» comunica esa idea de manera clara y natural en español.
- source_word: נְחָשִׁים
  english_pob_choice: snakes
  chosen_spanish: serpientes
  alternatives_spanish:
  - culebras
  lexicon: HALOT
  rationale: En español, «serpientes» es el equivalente general más natural y digno. «Culebras» puede sonar más coloquial o regional.
- source_word: צִפְעֹנִים
  english_pob_choice: vipers
  chosen_spanish: víboras
  alternatives_spanish:
  - áspides
  - víboras venenosas
  lexicon: HALOT
  rationale: El término designa una serpiente venenosa. «Víboras» preserva el matiz de peligro y funciona mejor que una glosa más extensa dentro del versículo.
- source_word: אֲשֶׁר אֵין לָהֶם לָחַשׁ
  english_pob_choice: that cannot be charmed
  chosen_spanish: que no pueden ser encantadas
  alternatives_spanish:
  - para las cuales no hay encantamiento
  - que no admiten conjuro
  lexicon: HALOT
  rationale: לָחַשׁ alude al murmullo o encantamiento usado para amansar o dominar serpientes. «Encantadas» reproduce esa práctica sin forzar una explicación dentro del texto principal; la nota aclara la alternativa literal.
- source_word: וְנִשְּׁכוּ אֶתְכֶם
  english_pob_choice: and they will bite you
  chosen_spanish: y las morderán
  alternatives_spanish:
  - y los morderán
  - y os morderán
  lexicon: HALOT
  rationale: El verbo significa literalmente morder. Se eligió «las» por concordancia con el sustantivo femenino plural más cercano («serpientes/víboras»), manteniendo el referente colectivo del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma del proyecto, Yahvé, y se reproduce la fórmula profética de cierre con un verbo solemne y sobrio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, y la política del proyecto pide representarlo como Yahvé en el texto principal. Se evita la sustitución litúrgica por «SEÑOR» para mantener la transparencia auditiva y textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לָחַשׁ en relación con serpientes
  english_pob_reading: that cannot be charmed
  chosen_spanish_reading: que no pueden ser encantadas
  alternative_spanish_readings:
  - que no pueden ser conjuradas
  - que no admiten encantamiento
  rationale: El contexto trata de serpientes venenosas a las que no les sirve el encantamiento o conjuro. «Encantadas» conserva la referencia cultural al encantamiento de serpientes sin sobreinterpretar el mecanismo.
  doctrine_reference: 'DOCTRINE.md: Lexical precision and cultural background'
- issue: Imagen de juicio con serpientes venenosas
  english_pob_reading: snakes, vipers that cannot be charmed, and they will bite you
  chosen_spanish_reading: serpientes, víboras que no pueden ser encantadas, y las morderán
  alternative_spanish_readings:
  - serpientes, víboras que no admiten encantamiento, y las morderán
  - serpientes venenosas, víboras que no pueden ser encantadas, y las morderán
  rationale: 'La repetición intensifica el juicio: un término general seguido de uno más específico y peligroso. Se mantiene esa tensión sin suavizarla ni convertirla en una paráfrasis explicativa.'
  doctrine_reference: 'DOCTRINE.md: Preserving rhetorical force'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión menor en הִנְנִי, cambiando «look» por «behold» para elevar el registro. En español, la traducción sigue ese ajuste con «he aquí» para conservar la solemnidad y la deixis enfática. También se mantuvo la decisión revisada de traducir el nombre divino directamente como Yahvé en vez de ocultarlo tras una sustitución reverencial.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma constante para יְהוָה.
  - Se preserva la progresión retórica «serpientes, víboras» sin fusionar ambos términos.
  - «Encantadas» se usa en sentido cultural de serpientes sometidas por encantamiento, no en sentido romántico ni ornamental.
  - El pronombre «las» sigue al sustantivo femenino plural más inmediato y no pretende corregir la referencia colectiva del hebreo.
