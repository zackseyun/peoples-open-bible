revisions:
- from: Pero no cortaré de ti a todo hombre de junto a mi altar[a], para hacer que se consuman tus ojos y se entristezca tu alma; y toda la descendencia de tu casa morirá por la espada de hombres[b].
  to: Pero no eliminaré de junto a mi altar a todos los tuyos, para consumir tus ojos[a] y entristecer tu alma; y todos los que aumentan en tu casa morirán como hombres[b].
  rationale: Se corrigió la sintaxis para un español natural y fiel («a todos los tuyos»), se reubicó la nota [a] en la frase que realmente comenta, y se restauró en el texto principal la literalidad ambigua de אֲנָשִׁים («como hombres») con su alternativa interpretativa en nota, en vez de imponer «por la espada» en el cuerpo del versículo. También se ajustó la última cláusula para reflejar mejor מַרְבִּית como multiplicación/aumento de la casa y evitar la discordancia del singular colectivo.
