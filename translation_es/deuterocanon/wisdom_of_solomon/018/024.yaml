translation:
  language: es
  text: Porque sobre la vestidura talar estaba todo el mundo[a], y la gloria de los padres sobre la talla de las piedras de cuatro hileras[b], y tu majestad sobre la diadema en su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestidura que llega hasta los pies».
    reason: lexical_alternative
  - marker: b
    text: La frase «las piedras de cuatro hileras» probablemente alude al pectoral del sumo sacerdote con sus piedras dispuestas en cuatro filas; el griego es compacto y algo difícil.
    reason: cultural_note
lexical_decisions:
- source_word: ποδήρους ἐνδύματος
  english_pob_choice: full-length robe
  chosen_spanish: vestidura talar
  alternatives_spanish:
  - ropa larga
  - vestido que llega hasta los pies
  lexicon: LSJ
  rationale: ποδήρης designa una prenda que llega hasta los pies. En español, «vestidura talar» conserva el registro elevado y el valor cultual de la imagen, sin perder la idea de longitud completa.
- source_word: ὅλος ὁ κόσμος
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - toda la creación
  lexicon: LSJ
  rationale: κόσμος aquí conserva un alcance amplio y simbólico. «Todo el mundo» comunica bien esa amplitud en español y evita precisar indebidamente si se trata de ‘universo’ o ‘creación’.
- source_word: πατέρων δόξα
  english_pob_choice: the glory of the fathers
  chosen_spanish: la gloria de los padres
  alternatives_spanish:
  - el esplendor de los padres
  - el honor de los patriarcas
  lexicon: LSJ
  rationale: δόξα puede ser gloria, esplendor u honor. Se mantiene «gloria» para preservar el tono solemne y la ambigüedad respetuosa del original; «padres» reproduce el genitivo plural sin convertirlo interpretativamente en «patriarcas».
- source_word: ἐπὶ τετραστίχου λίθου γλυφῆς
  english_pob_choice: on the engraving of the four-rowed stones
  chosen_spanish: sobre la talla de las piedras de cuatro hileras
  alternatives_spanish:
  - sobre el grabado de las piedras de cuatro hileras
  - sobre la talla de las piedras dispuestas en cuatro hileras
  lexicon: LSJ
  rationale: La frase griega es compacta y alude al engaste o grabado de las piedras del pectoral en cuatro hileras. «Talla» conserva el sentido de trabajo grabado/cincelado, y «piedras de cuatro hileras» refleja la estructura sin exceder lo que el griego dice.
- source_word: μεγαλοσύνη σου
  english_pob_choice: your majesty
  chosen_spanish: tu majestad
  alternatives_spanish:
  - tu grandeza
  - tu magnificencia
  lexicon: LSJ
  rationale: μεγαλοσύνη expresa grandeza exaltada; en contexto de alabanza a Dios, «majestad» es la opción española más natural y reverente, y mantiene el registro elevado del original.
- source_word: διάδημα
  english_pob_choice: diadem
  chosen_spanish: el diadema
  alternatives_spanish:
  - la diadema
  - la corona
  lexicon: LSJ
  rationale: διάδημα es una banda real o diadema, más específica que «corona». En español, lo normal es el femenino «la diadema»; se adopta aquí ese uso idiomático, conservando el término distintivo.
theological_decisions:
- issue: Imaginería sacerdotal y símbolo cósmico
  english_pob_reading: The verse preserves the claim that cosmic and ancestral glory were represented on the high priestly garments, without expanding the symbolism beyond what the Greek states.
  chosen_spanish_reading: El verso conserva la afirmación de que el mundo, la gloria de los padres y la majestad divina estaban figurados en las vestiduras sacerdotales, sin añadir explicaciones que el griego no explicita.
  alternative_spanish_readings:
  - Identificar de manera explícita el pectoral y la mitra sacerdotal de Éxodo 28
  - Traducir κόσμος como ‘universo’ para intensificar el simbolismo cósmico
  rationale: La traducción mantiene la imagen cultual y simbólica tal como aparece en el texto, dejando al lector inferir la alusión bíblica más amplia. No se sobreinterpreta el pasaje ni se estrecha indebidamente el alcance de κόσμος.
  doctrine_reference: Tradición textual y lectura tipológica prudente; principios de transparencia POB
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail en cuanto a la frase de las piedras: se prefirió una formulación más cercana al valor singular/colectivo del griego y se evitó expandirla a ‘stonework’. En español se mantuvo esa cercanía con ‘piedras de cuatro hileras’, conservando además el registro litúrgico y la imagen sacerdotal. También se atendió la decisión inglesa de preservar ‘diadem’ como término específico, adaptándolo al uso idiomático español como ‘diadema’.'
  spanish_consistency_notes:
  - Se conservó el tono solemne y cultual del pasaje, evitando una paráfrasis explicativa.
  - «Padres» se mantuvo como equivalente directo del genitivo plural, sin sustituirlo por ‘patriarcas’.
  - Se usó «majestad» para μεγαλοσύνη por coherencia con el registro divino y reverencial.
  - La puntuación reproduce la estructura triádica del griego con dos comas coordinando las tres imágenes.
  - El artículo en «el diadema» se evitó por no ser idiomático en español; se normalizó a «la diadema» en la decisión lexical, aunque el texto final mantiene la forma más natural del sustantivo en contexto.
