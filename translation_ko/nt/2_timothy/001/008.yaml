id: 2TI.1.8
reference: 2 Timothy 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μὴ οὖν ἐπαισχυνθῇς τὸ μαρτύριον τοῦ κυρίου ἡμῶν μηδὲ ἐμὲ τὸν δέσμιον αὐτοῦ, ἀλλὰ συγκακοπάθησον τῷ εὐαγγελίῳ κατὰ δύναμιν θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/008.yaml
  text: Therefore, do not be ashamed of the testimony about our Lord, nor of me, his prisoner, but suffer hardship with the gospel according to the power of God,
translation:
  language: ko
  text: 그러므로 그대는 우리 주에 관한 증언[a]을 부끄러워하지 마십시오. 주의 죄수가 된 나도 부끄러워하지 마십시오. 도리어 하나님의 능력을 따라 복음을 위하여 함께 고난을 받으십시오.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리 주의 증언」. 헬라어 속격은 두 가지로 읽힐 수 있으나, 본 문맥에서는 「주에 관한 증언」이 자연스럽다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 συγκακοπαθέω는 「함께 고난을 받음」을 뜻하며, 바울과 더불어 또는 복음과 더불어 고난에 동참함을 함의한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαισχυνθῇς
  english_pob_choice: be ashamed
  chosen_korean: 부끄러워하다
  alternatives_korean:
  - 수치로 여기다
  lexicon: BDAG
  rationale: ἐπαισχύνομαι는 단순한 부끄러움이 아니라 공공장소에서의 거리두기를 함의한다. 한국어 「부끄러워하다」는 본문의 권면 흐름에서 자연스럽다.
- source_word: τὸ μαρτύριον τοῦ κυρίου ἡμῶν
  english_pob_choice: the testimony about our Lord
  chosen_korean: 우리 주에 관한 증언
  alternatives_korean:
  - 우리 주의 증언
  - 우리 주께 대한 증언
  lexicon: BDAG
  rationale: 목적격 속격(주에 관한 증언)으로 읽는 것이 박해 문맥에서 가장 자연스럽다. 가능성은 각주로 표시한다.
- source_word: τὸν δέσμιον αὐτοῦ
  english_pob_choice: his prisoner
  chosen_korean: 주의 죄수
  alternatives_korean:
  - 주를 위해 갇힌 자
  - 주의 갇힌 자
  lexicon: BDAG
  rationale: δέσμιος는 「쇠사슬에 매인 자·죄수」를 가리킨다. 바울이 자신을 「예수의 죄수」로 부르는 강한 표현을 약화시키지 않기 위해 「주의 죄수」로 옮긴다.
- source_word: συγκακοπάθησον τῷ εὐαγγελίῳ
  english_pob_choice: suffer hardship with the gospel
  chosen_korean: 복음을 위하여 함께 고난을 받으십시오
  alternatives_korean:
  - 복음과 함께 고난을 받으십시오
  - 복음을 위해 나와 함께 고난을 받으십시오
  lexicon: BDAG
  rationale: συν- 접두사가 가져오는 「동참」을 살리되, 한국어로는 「복음을 위하여 함께」가 가장 자연스럽다. 여격 τῷ εὐαγγελίῳ는 이익의 여격으로 「복음을 위하여」로 옮긴다.
- source_word: κατὰ δύναμιν θεοῦ
  english_pob_choice: according to the power of God
  chosen_korean: 하나님의 능력을 따라
  alternatives_korean:
  - 하나님의 능력에 의지하여
  - 하나님의 능력에 따라
  lexicon: BDAG
  rationale: κατά + 대격이 「~에 의거하여·~의 힘으로」를 가리키며, 「하나님의 능력을 따라」가 그 의지의 의미를 자연스럽게 담는다.
