lexical_decisions:
- source_word: בַּֽעֲנָא
  english_pob_choice: Baana
  chosen_spanish: Baana
  alternatives_spanish:
  - Baaná
  lexicon: Nombre propio (transliteración)
  rationale: Se mantiene el nombre propio con transliteración reconocible. La acentuación española puede variar, pero la forma breve 'Baana' conserva el valor onomástico sin añadir información no presente en el hebreo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: Construcción genealógica estándar
  rationale: La relación filial debe expresarse de modo natural en español administrativo. 'Hijo de' reproduce la función constructa sin introducir un tono arcaizante.
- source_word: חוּשָׁי
  english_pob_choice: Hushai
  chosen_spanish: Husaí
  alternatives_spanish:
  - Husai
  - Husái
  lexicon: Nombre propio (transliteración)
  rationale: Se vierte el nombre propio con una transliteración española ajustada a la pronunciación probable y a la lectura pública en español. No se traduce el nombre.
- source_word: בְּ/אָשֵׁר
  english_pob_choice: in Asher
  chosen_spanish: en Aser
  alternatives_spanish:
  - sobre Aser
  lexicon: Preposición + topónimo/territorio
  rationale: La preposición ב se conserva como 'en', siguiendo el valor formal del hebreo y el matiz administrativo de jurisdicción territorial. 'Sobre' sería más interpretativo y menos cercano al hebreo.
- source_word: וּ/בְעָלֽוֹת
  english_pob_choice: and Bealoth
  chosen_spanish: y Bealot
  alternatives_spanish:
  - y Alot
  - y Bealot[a]
  lexicon: Topónimo con incertidumbre textual
  rationale: Se conserva el topónimo en forma española breve. Dado que la tradición textual ofrece incertidumbre entre 'Bealoth' y 'Aloth', se mantiene una transliteración sobria y se documenta la variante en nota.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al pasaje; la redacción se mantiene alineada con el consenso alto del control cruzado y con la nota de incertidumbre del último topónimo.
  spanish_consistency_notes:
  - Se usa 'Aser' para el territorio tribual, siguiendo la transliteración española habitual del hebreo Asher.
  - Se conserva el estilo de lista administrativa breve y directo, sin añadir preposiciones no presentes en el hebreo.
  - La nota se ancla en el topónimo final porque allí recae la incertidumbre lexical documentada en el expediente inglés.
