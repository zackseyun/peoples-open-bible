    issue: La nota al pie [a] está colocada sobre «apartado» pero su contenido explica «malo/dañino/perturbador».
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase relevante. Tal como está, la nota induce a pensar que ofrece alternativas para «apartado», lo cual falsea la evidencia léxica.
  - severity: low
    issue: «de parte de Yahvé» añade un matiz menos directo que el hebreo מֵאֵת.
    rationale: Aunque puede expresar procedencia, en español suele sugerir representación o mensaje. «de Yahvé» preserva mejor la formulación desnuda del texto fuente y la tensión teológica documentada.
