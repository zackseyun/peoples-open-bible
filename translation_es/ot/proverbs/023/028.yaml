translation:
  language: es
  text: Ciertamente[a], ella acecha como un ladrón[b], y multiplica a los traicioneros entre la humanidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Incluso». אַף es una partícula enfática; aquí introduce una afirmación enfática más que una adición simple.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como un bandido». El hebreo חֶתֶף es raro y difícil; puede entenderse de manera más general como ataque violento o captura súbita.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «en Adán / en el ser humano», con אָדָם usado de manera genérica para la humanidad; es decir, ella multiplica a los traicioneros entre el género humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Además
  - Incluso
  - Ciertamente
  lexicon: HALOT
  rationale: אַף aquí funciona como partícula enfática/asseverativa. «Ciertamente» transmite bien la fuerza de énfasis sin añadir una idea de suma o contraste que no esté explícita.
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - esa mujer
  - la
  lexicon: HALOT
  rationale: El pronombre femenino singular remite a la mujer extraña/adúltera del contexto inmediato; «ella» conserva esa referencia personal de modo natural en español.
- source_word: כְּחֶתֶף
  english_pob_choice: like a robber
  chosen_spanish: como un ladrón
  alternatives_spanish:
  - como un bandido
  - como un saqueador
  - como una presa
  lexicon: HALOT
  rationale: חֶתֶף es raro y difícil. La decisión inglesa lo entiende en sentido predatorio/violento; en español «ladrón» comunica bien esa imagen de asalto furtivo, manteniendo la ambigüedad básica sin suavizar el término.
- source_word: תֶּאֱרֹב
  english_pob_choice: lies in wait
  chosen_spanish: acecha
  alternatives_spanish:
  - está al acecho
  - tiende una emboscada
  lexicon: HALOT
  rationale: ארב expresa la idea de esperar para atacar. «Acecha» es idiomático en español y conserva la noción de vigilancia hostil y predatoria.
- source_word: וּבוֹגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: los traicioneros
  alternatives_spanish:
  - los traidores
  - los infieles
  - los falsos
  lexicon: HALOT
  rationale: בוגדים denota personas que obran con traición o deslealtad. «Los traicioneros» mantiene el carácter moral general del término mejor que una especificación política o eclesiástica.
- source_word: בְּאָדָם
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre la humanidad
  - entre los seres humanos
  - entre los hombres
  lexicon: HALOT
  rationale: אָדָם es colectivo/generico. Siguiendo la lectura auditada en inglés, «entre los hombres» preserva el singular genérico hebreo en español natural, aunque el sentido incluye a la humanidad en general.
- source_word: תּוֹסִף
  english_pob_choice: increases
  chosen_spanish: aumenta
  alternatives_spanish:
  - incrementa
  - multiplica
  - añade
  lexicon: HALOT
  rationale: El hifil de יסף tiene valor causativo de añadir o aumentar. «Aumenta» es claro, conciso y fiel al desarrollo cuantitativo implícito en el contexto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el auditable inglés POB, pero el español se ajustó para sonar natural y digno: se mantuvo la fuerza enfática de אַף, la imagen predatoria de חֶתֶף/תֶּאֱרֹב y el sentido colectivo de אָדָם. No se introdujeron lecturas doctrinales nuevas ni se suavizó la tensión léxica del hebreo.'
  spanish_consistency_notes:
  - Se prefirió «Ciertamente» para la partícula enfática אַף, coherente con un español bíblico moderno y no arcaizante.
  - Se mantuvo «los hombres» para אָדָם por fidelidad al genérico hebreo y alineación con el audit trail en inglés; en el contexto significa humanidad en general.
  - «Acecha» conserva la metáfora de emboscada sin convertir el verbo en una explicación interpretativa.
  - No se usó «Mesías», «Yahvé» ni otros términos de proyecto porque este versículo no los contiene.
