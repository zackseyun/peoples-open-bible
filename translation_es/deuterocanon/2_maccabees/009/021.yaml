    rationale: φροντίσαι expresa tomar thought/cuidado deliberado por la seguridad de todos; «ocuparme de» es comprensible, pero en este contexto real-administrativo «velar por» preserva mejor el matiz de cuidado responsable y el tono formal.
  - severity: low
