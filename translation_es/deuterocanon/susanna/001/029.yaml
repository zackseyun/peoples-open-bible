translation:
  language: es
  text: 'Y ocurrió al día siguiente[a], cuando el pueblo se había reunido donde estaba su esposo Joaquín, que llegaron los dos ancianos, llenos del designio ilícito de dar muerte a Susana, y dijeron delante del pueblo: «Manden llamar a Susana, hija de Helcías, que es la esposa de Joaquín».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llenos de propósito ilícito» o «llenos de designio contrario a la ley». El griego destaca un plan interior que viola la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ἐπαύριον
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al siguiente día
  lexicon: LSJ
  rationale: La expresión griega marca secuencia narrativa simple. «Al día siguiente» es natural en español moderno y conserva el avance temporal sin arcaísmo.
- source_word: συνῆλθεν
  english_pob_choice: had gathered
  chosen_spanish: se había reunido
  alternatives_spanish:
  - se había congregado
  - se había juntado
  lexicon: BDAG
  rationale: El contexto es una reunión colectiva del pueblo. El pluscuamperfecto en español comunica bien el estado previo del grupo al momento en que llegan los ancianos.
- source_word: πρὸς τὸν ἄνδρα αὐτῆς Ἰωακείμ
  english_pob_choice: to her husband Joakim
  chosen_spanish: junto al marido de ella, Joaquín
  alternatives_spanish:
  - junto a su esposo Joaquín
  - ante su marido Joaquín
  lexicon: LSJ
  rationale: πρός con persona aquí indica acercamiento o reunión junto a alguien. «Marido de ella» mantiene explícita la referencia pronominal del griego; «Joaquín» sigue la transliteración habitual española.
- source_word: οἱ δύο πρεσβῦται
  english_pob_choice: the two elders
  chosen_spanish: los dos ancianos
  alternatives_spanish:
  - los dos ancianos del pueblo
  - los dos presbíteros
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «elders» para preservar su función social, en español el término más inmediato y comprensible en este relato es «ancianos». El contexto narrativo no especifica un título técnico, y el término conserva la referencia a hombres de edad y autoridad pública.
- source_word: πλήρεις τῆς ἀνόμου ἐννοίας
  english_pob_choice: full of the lawless intent
  chosen_spanish: llenos de la intención sin ley
  alternatives_spanish:
  - llenos de propósito ilícito
  - llenos de designio sin ley
  lexicon: LSJ
  rationale: ἐννοία expresa pensamiento, propósito o intención; ἄνομος añade la idea de algo contrario a la ley. «Intención sin ley» preserva el valor literal y la dureza del giro griego, evitando suavizarlo a una noción más general de maldad.
- source_word: κατὰ Σουσάννης
  english_pob_choice: against Susanna
  chosen_spanish: a Susana
  alternatives_spanish:
  - contra Susana
  - en perjuicio de Susana
  lexicon: BDAG
  rationale: La preposición con genitivo señala dirección adversativa del plan. En español, la secuencia «de dar muerte a Susana» ya incorpora el carácter adverso; por eso no fue necesario repetir «contra» en la línea principal.
- source_word: τοῦ θανατῶσαι αὐτήν
  english_pob_choice: to put her to death
  chosen_spanish: de dar muerte a Susana
  alternatives_spanish:
  - para matarla
  - de llevarla a la muerte
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Dar muerte» conserva el registro judicial y solemne mejor que «matarla», mientras que el sustantivo «Susana» se mantiene dentro de la cláusula para una lectura más fluida.
- source_word: Ἀποστείλατε ἐπὶ Σουσάνναν
  english_pob_choice: Send for Susanna
  chosen_spanish: Manden llamar a Susana
  alternatives_spanish:
  - Envien a buscar a Susana
  - Manden por Susana
  lexicon: LSJ
  rationale: El idiomático «mandar llamar» comunica bien la orden de traerla ante la asamblea. «Manden» conserva el plural imperativo del griego.
- source_word: θυγατέρα Χελκίου
  english_pob_choice: daughter of Hilkiah
  chosen_spanish: hija de Helcías
  alternatives_spanish:
  - hija de Hilcías
  - hija de Quelcías
  lexicon: LSJ
  rationale: Se adopta la forma española bíblica tradicional «Helcías» para Χελκίου, que es reconocible en español y mantiene la identificación patronímica.
- source_word: ἥ ἐστιν γυνὴ Ἰωακείμ
  english_pob_choice: who is the wife of Joakim
  chosen_spanish: que es la esposa de Joaquín
  alternatives_spanish:
  - que es mujer de Joaquín
  - que es la mujer de Joaquín
  lexicon: BDAG
  rationale: γυνή aquí significa «esposa» en una identificación pública y matrimonial. «Esposa» suena natural en español y evita la ambigüedad de «mujer».
theological_decisions:
- issue: Cómo traducir πρεσβῦται en un contexto judicial y comunitario
  english_pob_reading: elders
  chosen_spanish_reading: ancianos
  alternative_spanish_readings:
  - presbíteros
  - ancianos del pueblo
  rationale: En este pasaje la referencia principal es social y narrativa, no eclesiástica. «Ancianos» comunica autoridad y edad sin importar un cargo técnico que el texto no explicita.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Intensidad moral de ἀνόμος / lawless
  english_pob_reading: lawless intent
  chosen_spanish_reading: intención sin ley
  alternative_spanish_readings:
  - propósito ilícito
  - designio perverso
  rationale: La frase griega subraya una intención interior contraria a la ley. «Sin ley» conserva el choque semántico, y evita reemplazarlo por un adjetivo moral más interpretativo.
  doctrine_reference: Translation philosophy §4 (fidelidad semántica y tensión lexical)
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión que ajustó una redacción más pesada («their lawless intent against Susanna to put her to death») a una forma más cercana al griego y más natural en inglés. La versión española sigue esa línea: conserva la intención ilícita como rasgo interno, evita redundancias innecesarias y mantiene la secuencia narrativa y la formulación judicial del mandato público.'
  spanish_consistency_notes:
  - Se usa «Y ocurrió» para reproducir el arranque narrativo equivalente al inglés «And it happened», sin sobrecargar el estilo.
  - Se mantiene «Susana» y «Joaquín» según la transliteración española habitual en el corpus bíblico.
  - Se eligió «hija de Helcías» con forma tradicional bíblica española para el patronímico.
  - La frase «dijeron delante del pueblo» conserva el carácter público de la acusación.
  - Se preserva la tensión entre legalidad e ilegalidad en «intención sin ley», vinculada al juicio narrativo.
