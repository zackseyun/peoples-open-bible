translation:
  language: es
  text: lo que ha sido expuesto por Jasón de Cirene en cinco libros[a], procuraremos abreviarlo en un solo volumen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘epitomizarlo’ o ‘condensarlo’. El verbo griego indica producir una versión más breve de una obra escrita mayor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὸ Ἰάσονος τοῦ Κυρηναίου
  english_pob_choice: by Jason of Cyrene
  chosen_spanish: por Jasón de Cirene
  alternatives_spanish:
  - por Jasón el cireneo
  - por Jasón, natural de Cirene
  lexicon: LSJ
  rationale: ὑπό con genitivo expresa el agente; en español, 'por' introduce naturalmente ese agente. 'De Cirene' conserva el identificador geográfico de manera clara y sobria.
- source_word: δηλωθέντα
  english_pob_choice: has been set forth
  chosen_spanish: ha sido expuesto
  alternatives_spanish:
  - ha sido presentado
  - ha sido dado a conocer
  - ha sido relatado
  lexicon: LSJ
  rationale: '''Expuesto'' conserva la idea de una obra literaria presentada o expuesta al público, sin forzar la noción de explicación doctrinal.'
- source_word: διὰ πέντε βιβλίων
  english_pob_choice: in five books
  chosen_spanish: en cinco libros
  alternatives_spanish:
  - por medio de cinco libros
  - a través de cinco libros
  lexicon: LSJ
  rationale: La construcción idiomática en español para el formato literario es 'en cinco libros'; mantiene el contraste cuantitativo con 'un solo volumen'.
- source_word: πειρασόμεθα
  english_pob_choice: we will attempt
  chosen_spanish: procuraremos
  alternatives_spanish:
  - intentaremos
  - trataremos de
  lexicon: LSJ
  rationale: El futuro medio sugiere una empresa emprendida con modestia. 'Procuraremos' mantiene ese tono de intento respetuoso y algo cauteloso.
- source_word: διʼ ἑνὸς συντάγματος
  english_pob_choice: in one volume
  chosen_spanish: en un solo volumen
  alternatives_spanish:
  - en una sola obra
  - en una sola composición
  - en un solo tratado
  lexicon: LSJ
  rationale: σύνταγμα designa una obra compuesta u organizada; 'volumen' reproduce bien la contraposición con 'cinco libros' y es natural en español actual.
- source_word: ἐπιτεμεῖν
  english_pob_choice: to abridge
  chosen_spanish: abreviarlo
  alternatives_spanish:
  - epitomarlo
  - condensarlo
  - resumirlo
  lexicon: LSJ
  rationale: El verbo significa cortar o recortar una obra extensa. 'Abreviarlo' conserva la relación con la idea de una versión más corta, sin tecnicismo excesivo.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés presentan un acuerdo alto y no requieren cambios sustanciales. Se mantuvo la estructura de una declaración metatextual sobre una obra previa y el proyecto de abreviarla en una sola composición.
  spanish_consistency_notes:
  - Se preservó el tono literario y editorial del versículo, no narrativo.
  - '''Jasón de Cirene'' mantiene el referente geográfico sin añadir interpretación.'
  - '''Volumen'' se usó como equivalente moderno y legible de σύνταγμα, en contraste con ''libros''.'
