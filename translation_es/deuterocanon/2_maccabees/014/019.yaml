review_pass:
  verdict: revise
  source_alignment_summary: 'El griego dice literalmente: «Por eso envió a Posidonio, Teódoto y Matatías, para dar y recibir derechas/manos derechas», un modismo de concertar garantías o señal de buena fe. El borrador español capta bien la estructura y la relación inferencial, pero «prendas» en español moderno tiende a significar ropa o un objeto dejado en garantía, y no comunica con claridad el sentido de promesas/garantías pactales del gesto. Conviene ajustar el sustantivo principal y mantener la nota cultural.'
  spanish_quality_summary: El español es claro y digno, pero «prendas» suena poco natural y potencialmente equívoco en este contexto. «Garantías» funciona mejor en español eclesial general y armoniza con la nota explicativa. El resto de la redacción es natural.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario principal en este versículo. La decisión clave es léxica-cultural: δεξιάς debe representarse con un término español inteligible para un gesto de buena fe; «garantías» preserva mejor el sentido que «prendas».'
  issues:
  - severity: medium
    issue: «prendas» es equívoco para δεξιάς
    rationale: Aunque puede significar garantía en registros antiguos o jurídicos, en español contemporáneo general se entiende primero como ropa o prenda material. Aquí el sentido es el de garantías/compromisos de buena fe sellados con el apretón de manos derechas.
  - severity: low
    issue: La nota explica bien el gesto, pero depende demasiado de corregir el término principal
    rationale: Con «garantías», la nota pasa a complementar el trasfondo cultural en vez de rescatar una palabra principal potencialmente confusa.
  revised_spanish_text: Por eso envió a Posidonio, Teodoto y Matatías, para dar y recibir garantías[a].
  revised_footnotes:
  - marker: a
    text: Es decir, intercambiar las manos derechas como garantía de buena fe o de acuerdo.
    reason: cultural_note
  revision_rationale: Se reemplaza «prendas» por «garantías» para expresar de manera clara y natural el sentido idiomático de δοῦναι καὶ λαβεῖν δεξιάς en español contemporáneo, mientras la nota conserva el gesto literal de intercambiar las manos derechas como señal de buena fe.
