translation:
  language: es
  text: El que hace estas cosas no será sacudido jamás por el mal; una llama de fuego, y la ira de los injustos no lo tocará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ποιῶν ταῦτα
  english_pob_choice: The one who does these things
  chosen_spanish: El que hace estas cosas
  alternatives_spanish:
  - Quien hace estas cosas
  - El que realiza estas cosas
  lexicon: BDAG
  rationale: El participio sustantivado se vierte naturalmente con una construcción relativa en español. «El que» conserva el singular genérico y «estas cosas» mantiene el deíctico plural del griego.
- source_word: οὐ σαλευθήσεται
  english_pob_choice: will never be shaken
  chosen_spanish: no será sacudido jamás
  alternatives_spanish:
  - no será movido jamás
  - nunca vacilará
  lexicon: BDAG
  rationale: El pasivo futuro de σαλεύω expresa ser sacudido o desestabilizado. «No será sacudido jamás» conserva la fuerza pasiva y la idea de estabilidad duradera.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - nunca
  lexicon: BDAG
  rationale: Aquí funciona como negación enfática de duración indefinida. «Jamás» suena natural en español y reproduce bien el valor enfático del giro.
- source_word: ἀπὸ κακοῦ
  english_pob_choice: by evil
  chosen_spanish: por el mal
  alternatives_spanish:
  - a causa del mal
  - del mal
  lexicon: BDAG
  rationale: Con un verbo de ser sacudido, la preposición expresa la causa o agente de la perturbación. «Por el mal» conserva la relación causal sin sobretraducir a una imagen espacial.
- source_word: φλογὸς πυρὸς
  english_pob_choice: a flame of fire
  chosen_spanish: una llama de fuego
  alternatives_spanish:
  - una llama ígnea
  - una llama ardiente
  lexicon: BDAG
  rationale: La secuencia genitiva es una expresión vívida y enfática. «Una llama de fuego» reproduce el paralelismo intenso sin perder la redundancia expresiva del original.
- source_word: ὀργὴ ἀδίκων
  english_pob_choice: the wrath of the unrighteous
  chosen_spanish: la ira de los injustos
  alternatives_spanish:
  - la ira de los malvados
  - la indignación de los injustos
  lexicon: BDAG
  rationale: ἀδίκων puede referirse a personas injustas o impías. «Los injustos» conserva la correspondencia formal con el griego y evita suavizar la carga moral del término.
- source_word: οὐχ ἅψεται αὐτοῦ
  english_pob_choice: will not touch him
  chosen_spanish: no lo tocarán
  alternatives_spanish:
  - no lo tocará
  - no lo alcanzarán
  lexicon: BDAG
  rationale: ἅπτομαι suele significar tocar o tomar contacto. Aunque el sujeto inmediato incluye dos sustantivos coordinados, en español la concordancia natural es plural; «no lo tocarán» mantiene el sentido de protección y evita un giro forzado.
theological_decisions:
- issue: 'Sentido de ἀπὸ κακοῦ: moral o meramente nocivo'
  english_pob_reading: by evil
  chosen_spanish_reading: por el mal
  alternative_spanish_readings:
  - a causa del mal
  - del mal
  rationale: El contexto presenta fuerzas destructivas en términos morales y judiciales. «Mal» preserva esa amplitud ética sin reducirlo a simple daño físico.
  doctrine_reference: Sabiduría bíblica sobre la protección del justo frente al mal y al juicio
- issue: Relación de ὀργὴ ἀδίκων con el sintagma de fuego
  english_pob_reading: a flame of fire and the wrath of the unrighteous will not touch him
  chosen_spanish_reading: una llama de fuego y la ira de los injustos no lo tocarán
  alternative_spanish_readings:
  - una llama de fuego, y la ira de los injustos no lo tocará
  - una llama de fuego y la ira de los injustos no lo tocarán
  rationale: El griego coordina dos realidades amenazantes. Se conserva la coordinación sin desplazar el foco ni convertir la frase en una sola imagen metafórica.
  doctrine_reference: Juicio divino y preservación del justo
translation_notes:
  revision_awareness: Se incorporó la corrección de revisión que reconoció la coordinación de los peligros y el valor genitivo de ἀδίκων, evitando la lectura que hacía de 'flame of fire' un sujeto independiente o una construcción mal segmentada.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y claro, apto para lectura eclesial.
  - Se evitó 'Señor' o 'Cristo' porque el verso no contiene léxico divino o cristológico.
  - Se usó 'injustos' para ἀδίκων por coherencia formal con el griego y por su fuerza moral.
  - Se prefirió una sola cláusula fluida en español para reflejar la unidad retórica del verso.
