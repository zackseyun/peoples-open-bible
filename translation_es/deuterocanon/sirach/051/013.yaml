translation:
  language: es
  text: Yo era joven, y amaba la sabiduría; la deseé y la busqué. En fidelidad[a] mi pie caminó; desde mi juventud, oh Señor,[b] aprendí sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «En fidelidad»; también puede entenderse «En verdad mi pie caminó».'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego difiere notablemente: «Aún siendo joven, antes de descarriarme, busqué la sabiduría abiertamente en mi oración». El texto principal sigue el testimonio hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - un joven
  - muchacho
  lexicon: HALOT
  rationale: El hebreo indica juventud; en español, «joven» reproduce esa idea sin añadir un género específico innecesario en la primera persona del hablante.
- source_word: וָאוֹהַב
  english_pob_choice: I loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amé
  - llegué a amar
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa una acción/actitud continua o habitual; «amaba» comunica bien ese amor sostenido por la sabiduría.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - entendimiento
  lexicon: HALOT
  rationale: Es el equivalente estándar y adecuado para חכמה en Sirácida, donde además aparece personificada.
- source_word: וְחָפַצְתִּי בָהּ
  english_pob_choice: I desired her
  chosen_spanish: la deseé
  alternatives_spanish:
  - me deleité en ella
  - la aprecié
  lexicon: HALOT
  rationale: חפץ abarca deseo y deleite; «la deseé» conserva la fuerza afectiva y encaja con el paralelismo cercano.
- source_word: וּבִקַּשְׁתִיהָ
  english_pob_choice: sought her out
  chosen_spanish: la busqué
  alternatives_spanish:
  - la procuré
  - la busqué con empeño
  lexicon: HALOT
  rationale: בקש significa buscar. En español, «la busqué» es la forma más natural y fiel; el matiz de empeño queda sugerido por el contexto.
- source_word: בַּאֲמִתָּהּ
  english_pob_choice: In faithfulness
  chosen_spanish: En fidelidad
  alternatives_spanish:
  - En verdad
  - Con verdad
  lexicon: HALOT
  rationale: אמת puede significar verdad, fidelidad o confiabilidad. «En fidelidad» preserva el valor ético y relacional que el contexto sugiere para la conducta del hablante.
- source_word: דָּרְכָה רַגְלִי
  english_pob_choice: my foot walked
  chosen_spanish: caminó mi pie
  alternatives_spanish:
  - anduvo mi pie
  - pisó mi pie
  lexicon: HALOT
  rationale: La imagen hebrea es concreta. «Caminó mi pie» mantiene el hebraísmo sin volverlo torpe; en español suena poético y comprensible.
- source_word: מִנְּעוּרַי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mis años mozos
  - desde que era joven
  lexicon: HALOT
  rationale: Expresión temporal estándar que indica el inicio de una práctica prolongada.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - oh Señor
  lexicon: HALOT
  rationale: Aunque el hebreo masorético lee אֲדֹנָי, el contexto de la dirección vocativa y la política del proyecto para el nombre divino favorecen «Yahvé». La alternativa «Señor» sería más tradicional, pero aquí se evita el reemplazo reverencial opaco.
- source_word: לָמַדְתִּי
  english_pob_choice: I learned
  chosen_spanish: aprendí
  alternatives_spanish:
  - estudié
  - fui instruido
  lexicon: HALOT
  rationale: למד expresa aprender/ser instruido; «aprendí» es la forma directa y fiel al verbo en primera persona.
theological_decisions:
- issue: Tratamiento del nombre divino en la vocativa final
  english_pob_reading: O Lord
  chosen_spanish_reading: ¡oh Yahvé!
  alternative_spanish_readings:
  - ¡oh Señor!
  - ¡Señor!
  rationale: El texto hebreo presenta אֲדֹנָי, mientras que la política del proyecto indica usar «Yahvé» para el nombre divino y no ocultarlo tras una máscara reverencial. La vocativa «¡oh Yahvé!» mantiene la apelación directa y hace explícita la identidad divina conforme a la norma del POB en español.
  doctrine_reference: 'POLÍTICA TERMINOLÓGICA DEL POB: יהוה / YHWH -> Yahvé en el texto principal; evitar SEÑOR como reemplazo opaco cuando el nombre divino está en juego.'
- issue: Preferencia del hebreo sobre el paralelo griego
  english_pob_reading: Translate primarily from the surviving Hebrew, while allowing the Greek to inform coherence and confirm the theme of youthful pursuit of wisdom.
  chosen_spanish_reading: Traducir principalmente del hebreo conservado, dejando que el griego solo confirme el tema y el sentido general.
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «Aún siendo joven, antes de descarriarme, busqué la sabiduría abiertamente en mi oración».'
  - Armonizar hebreo y griego en una sola redacción.
  rationale: Aquí el hebreo superviviente ofrece una formulación distinta y suficiente; el griego es un testigo paralelo valioso, pero no debe desplazar el texto hebreo. Por eso la redacción española sigue el hebreo y no incorpora la cláusula griega de «antes de descarriarme» ni «en mi oración» al cuerpo principal.
  doctrine_reference: 'PHILOSOPHY.md: Sirácida hebreo se traduce desde el hebreo cuando sobrevive; el paralelo griego se usa como control, no como sustituto.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del inglés POB, que simplificó el arranque a «I was young» y añadió la vocativa «O Lord». La versión española mantiene esa simplificación inicial, conserva la secuencia verbal del hebreo, y explicita la decisión terminológica sobre el nombre divino conforme a la política del proyecto.
  spanish_consistency_notes:
  - «Sabiduría» se mantiene como traducción uniforme de חכמה y conserva la personificación femenina exigida por los pronombres del hebreo.
  - «En fidelidad» refleja la ambigüedad אמת sin perder la fuerza ética; la nota preserva la alternativa «en verdad».
  - La imagen concreta «caminó mi pie» se conserva para no desdibujar el hebraísmo.
  - La vocativa final usa puntuación exclamativa para marcar la apelación directa en español.
  - La nota griega distingue claramente el testimonio hebreo principal del paralelo heleno, sin armonizarlos de manera indebida.
