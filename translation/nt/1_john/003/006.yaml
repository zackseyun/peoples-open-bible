theological_decisions:
- issue: Whether the verse teaches absolute sinless perfection for believers
  chosen_reading: The present-tense verbs are rendered as ongoing/characteristic action ('keep on sinning') rather than an absolute denial that a believer ever commits any sin.
  alternative_readings:
  - 'Absolute reading: ''does not sin'' / ''everyone who sins'''
  rationale: 'This preserves the tension within 1 John itself: believers are called away from sin, yet 1 John 1:8–2:2 acknowledges the reality of believers'' sin and Christ''s advocacy. The translation therefore reflects the likely aspectual force of the present forms without softening the ethical claim into mere occasional failure.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
- issue: Referent of 'him'
  chosen_reading: The pronoun is left untranslated beyond 'him' rather than specifying 'God' or 'the Son.'
  alternative_readings:
  - Explicitly identifying the referent as God
  - Explicitly identifying the referent as the Son/Christ
  rationale: The immediate context allows discussion of both the Father and the Son in 1 John, and the Greek text itself uses pronouns here. Preserving 'him' avoids importing a doctrinally precise identification beyond what the verse itself states.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it
