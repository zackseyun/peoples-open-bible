translation:
  language: es
  text: No volveremos a nuestras casas hasta que los hijos de Israel hayan tomado posesión cada uno de su heredad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא / not
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La negación hebrea simple se expresa de forma directa con «no»; mantiene el compromiso rotundo del juramento sin añadir matiz temporal no presente en el hebreo.
- source_word: נָשׁוּב
  english_pob_choice: we will return
  chosen_spanish: volveremos
  alternatives_spanish:
  - regresaremos
  - iremos de vuelta
  lexicon: HALOT
  rationale: El imperfecto cohortativo/plural expresa una acción futura o comprometida; «volveremos» es natural en español y preserva el valor de decisión futura.
- source_word: אֶל בָּתֵּינוּ
  english_pob_choice: to our houses
  chosen_spanish: a nuestras casas
  alternatives_spanish:
  - a nuestros hogares
  lexicon: HALOT
  rationale: «Casas» reproduce con mayor cercanía la concreción del hebreo בַּיִת y conserva el plural posesivo; «hogares» sería más interpretativo.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: HALOT
  rationale: En español, la cláusula temporal con verbo requiere «hasta que» para expresar adecuadamente el límite de la acción negada.
- source_word: הִתְנַחֵל
  english_pob_choice: have taken possession
  chosen_spanish: hayan tomado posesión
  alternatives_spanish:
  - hayan heredado
  - hayan recibido como herencia
  - hayan entrado en posesión
  lexicon: HALOT
  rationale: El hitpael de נחל aquí se refiere a entrar en posesión del reparto territorial. «Tomar posesión» comunica mejor esa idea concreta que «heredar», que en español puede sonar más abstracto o legalista.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la imagen genealógica y pactal del hebreo con «hijos de Israel». Es transparente en español bíblico y evita neutralizar el plural masculino documentado en la fuente.
- source_word: אִישׁ נַחֲלָתוֹ
  english_pob_choice: each... his inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - la heredad de cada uno
  - la herencia de cada hombre
  lexicon: HALOT
  rationale: El distributivo אִישׁ + sufijo singular se expresa de manera fluida con «su heredad», donde el sentido es colectivo/distributivo en contexto. «Heredad» reproduce mejor el alcance de la repartición territorial que «herencia» en español corriente.
theological_decisions:
- issue: Expresión masculina colectiva בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma masculina colectiva del hebreo, siguiendo la lectura auditada del POB en inglés. En español, «hijos de Israel» conserva la familia pactal y la correspondencia formal sin borrar la marca gramatical del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Sentido territorial de נַחֲלָה
  english_pob_reading: his inheritance
  chosen_spanish_reading: su heredad
  alternative_spanish_readings:
  - su herencia
  - su posesión
  rationale: El contexto no es meramente patrimonial sino la repartición de la tierra prometida. «Heredad» mantiene el peso bíblico-territorial del término sin convertirlo en un tecnicismo jurídico moderno.
  doctrine_reference: Uso bíblico de נַחֲלָה en el Pentateuco
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés. No se detectaron revisiones posteriores que requirieran ajustar la redacción base; se conservaron las decisiones léxicas principales del POB en inglés, adaptadas de forma idiomática al español.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para conservar el paralelismo con la fuente y la terminología POB.
  - «Heredad» se usó de modo consistente para נַחֲלָה en sentido territorial.
  - La sintaxis española reproduce la estructura condicional-temporal del hebreo sin sobreexplicar el contenido.
