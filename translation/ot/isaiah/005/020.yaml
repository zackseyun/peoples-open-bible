id: ISA.5.20
reference: Isaiah 5:20
source:
  edition: WLC
  text: ה֣וֹי הָ/אֹמְרִ֥ים לָ/רַ֛ע ט֖וֹב וְ/לַ/טּ֣וֹב רָ֑ע שָׂמִ֨ים חֹ֤שֶׁךְ לְ/אוֹר֙ וְ/א֣וֹר לְ/חֹ֔שֶׁךְ שָׂמִ֥ים מַ֛ר לְ/מָת֖וֹק וּ/מָת֥וֹק לְ/מָֽר׃ס
translation:
  text: Woe to those who call evil good and good evil[a], who make darkness light and light darkness[b], who make bitter sweet and sweet bitter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'say to evil, “good,” and to good, “evil.”'
    reason: lexical_alternative
  - marker: b
    text: The repeated imagery of darkness/light and bitter/sweet intensifies the charge of reversing moral reality, not merely making a verbal mistake.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection of denunciation/judgment; 'Woe' is the standard and most forceful English equivalent in this context.
- source_word: הָאֹמְרִים
  chosen: those who call
  alternatives:
  - those who say
  lexicon: HALOT
  rationale: Although the verb is literally 'say,' in this construction with predicate terms ('to evil, good') English 'call' better conveys assigning a moral label rather than merely speaking.
- source_word: לָרַע ... טוֹב
  chosen: evil good
  alternatives:
  - what is evil good
  - bad good
  lexicon: HALOT
  rationale: Retains the terse moral contrast of the Hebrew. 'Evil' is preferable to 'bad' because the verse concerns moral inversion, not mere undesirability.
- source_word: וְלַטּוֹב רָע
  chosen: good evil
  alternatives:
  - what is good evil
  lexicon: HALOT
  rationale: Mirrors the first clause for rhetorical balance and preserves the antithetical structure.
- source_word: שָׂמִים
  chosen: make
  alternatives:
  - put
  - set
  lexicon: HALOT
  rationale: In these metaphorical pairings, 'make' communicates active reclassification or transformation in perception more naturally than the more wooden 'put' or 'set'.
- source_word: חֹשֶׁךְ ... לְאוֹר
  chosen: darkness into light
  alternatives:
  - darkness for light
  - darkness as light
  lexicon: HALOT
  rationale: The preposition ל here marks exchanged valuation or presentation. 'Into' is idiomatic in English and conveys reversal without over-paraphrasing.
- source_word: וְאוֹר לְחֹשֶׁךְ
  chosen: light into darkness
  alternatives:
  - light for darkness
  - light as darkness
  lexicon: HALOT
  rationale: Keeps the parallelism exact and readable in modern English.
- source_word: מַר
  chosen: bitter
  lexicon: HALOT
  rationale: Straightforward adjectival opposite of 'sweet'; preserves the sensory metaphor for moral inversion.
- source_word: לְמָתוֹק
  chosen: sweet
  alternatives:
  - sweetness
  lexicon: HALOT
  rationale: Adjectival rendering matches the Hebrew contrast and reads naturally in English.
- source_word: וּמָתוֹק לְמָר
  chosen: sweet bitter
  alternatives:
  - what is sweet bitter
  lexicon: HALOT
  rationale: Maintains the compact, poetic reversal of the Hebrew and the verse's climactic symmetry.
