theological_decisions:
- issue: Ethical force of 'remember' in relation to God's commands
  chosen_reading: Rendered 'remember his precepts so as to do them' to preserve that remembrance is practical and obedient, not merely cognitive.
  alternative_readings:
  - remember his precepts, to do them
  - mindful of his commands and do them
  rationale: The Hebrew syntax links remembrance with action. The translation preserves this covenantal obedience theme without importing a works-righteousness framework; it simply states the text's own description of those who receive the LORD's covenant mercy in context.
  doctrine_reference: Translation philosophy §§1, 3, 5
