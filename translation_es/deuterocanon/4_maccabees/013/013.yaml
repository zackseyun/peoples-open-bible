translation:
  language: es
  text: 'Por la piedad[a] Isaac resistió. Y todos, mirándose unos a otros, juntos, alegres y muy valientes, decían: «Consagrémonos a Dios con todo el corazón, al que nos dio nuestras almas[b], y empleemos nuestros cuerpos en la vigilancia[c] de la ley».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la devoción a Dios». El griego εὐσέβεια puede traducirse «piedad» o «devoción reverente»; aquí se eligió «piedad» por su concisión y su tono bíblico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «nuestras almas». En este contexto también puede entenderse «nuestras vidas»; la traducción conserva la cercanía con ψυχάς sin excluir el sentido de vida entregada.
    reason: lexical_alternative
  - marker: c
    text: O «en la guardia de la ley». El griego conserva la imagen de vigilancia o guardia, no simplemente la idea de obedecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: Because of godliness
  chosen_spanish: Por la piedad
  alternatives_spanish:
  - Por la devoción a Dios
  - Por la piedad hacia Dios
  lexicon: LSJ
  rationale: εὐσέβεια nombra una reverencia/devoción orientada a Dios. En español, «piedad» mantiene el campo de reverencia religiosa sin sonar tan abstracto como «devoción» ni desplazar el matiz hacia mera observancia ritual.
- source_word: ὑπέμεινεν
  english_pob_choice: endured
  chosen_spanish: sufrió con firmeza
  alternatives_spanish:
  - perseveró
  - soportó con firmeza
  lexicon: LSJ
  rationale: El verbo expresa resistencia perseverante bajo prueba. «Sufrió con firmeza» comunica bien la idea de aguante en contexto de martirio, sin perder el matiz de fortaleza.
- source_word: ἐφορῶντες
  english_pob_choice: looking at the others
  chosen_spanish: mirando a los demás
  alternatives_spanish:
  - mirándose unos a otros
  - fijando la mirada en los demás
  lexicon: LSJ
  rationale: La participación mutua queda bien expresada con una fórmula natural en español. «Mirando a los demás» conserva el gesto recíproco sin sonar forzado.
- source_word: φαιδροὶ
  english_pob_choice: cheerful
  chosen_spanish: alegres
  alternatives_spanish:
  - radiantes
  - de semblante alegre
  lexicon: LSJ
  rationale: El término sugiere brillo de semblante y ánimo sereno. «Alegres» es la solución más clara y digna en español, manteniendo la idea de ánimo no abatido.
- source_word: μάλα θαρραλέοι
  english_pob_choice: very courageous
  chosen_spanish: muy valientes
  alternatives_spanish:
  - sumamente audaces
  - muy animosos
  lexicon: LSJ
  rationale: La intensificación de μάλα se refleja con «muy». «Valientes» transmite el coraje moral del contexto de manera natural para el lector español.
- source_word: ἀφιερώσωμεν
  english_pob_choice: Let us dedicate ourselves
  chosen_spanish: Consagrémonos
  alternatives_spanish:
  - Dediquémonos
  - Entreguémonos
  lexicon: LSJ
  rationale: El verbo implica ofrecerse/dedicarse solemnemente. «Consagrémonos» conserva el peso devocional y la dirección a Dios, sin depender de un giro demasiado técnico.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: LSJ
  rationale: La forma directa «a Dios» es la más natural en español y preserva la orientación del acto de consagración.
- source_word: τῷ δόντι τὰς ψυχάς
  english_pob_choice: to the one who gave us our souls
  chosen_spanish: al que nos dio las almas
  alternatives_spanish:
  - al que nos dio la vida
  - al que nos dio nuestras almas
  lexicon: LSJ
  rationale: La revisión inglesa volvió a «souls» para reflejar ψυχάς con mayor cercanía formal. En español, «al que nos dio las almas» preserva ese vínculo léxico sin cerrar la posible resonancia de vida/alma.
- source_word: χρήσωμεν
  english_pob_choice: let us employ
  chosen_spanish: empleemos
  alternatives_spanish:
  - usemos
  - apliquemos
  lexicon: LSJ
  rationale: El verbo medio expresa hacer uso de algo con un propósito. «Empleemos» suena natural y mantiene la idea de utilizar los cuerpos como instrumento.
- source_word: τῇ περὶ τὸν νόμον φυλακῇ
  english_pob_choice: in guarding the law
  chosen_spanish: en la custodia de la ley
  alternatives_spanish:
  - en la guardia de la ley
  - en la vigilancia de la ley
  lexicon: LSJ
  rationale: φυλακή conserva la imagen de guardia/vigilancia. «Custodia» permite un español digno y preciso, manteniendo el matiz de protección vigilante sin reducirlo a mera obediencia.
- source_word: τὰ σώματα
  english_pob_choice: our bodies
  chosen_spanish: nuestros cuerpos
  alternatives_spanish:
  - los cuerpos
  - nuestras personas
  lexicon: LSJ
  rationale: El plural se refiere a sus cuerpos físicos como instrumentos de fidelidad. En español, «nuestros cuerpos» es claro y exacto.
theological_decisions:
- issue: Renderizar εὐσέβεια como una virtud teológica central
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - temor de Dios
  rationale: En 4 Macabeos εὐσέβεια designa una fidelidad reverente y orientada a Dios. «Piedad» conserva el peso religioso del término sin imponer una formulación doctrinal ajena al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Sentido de ψυχάς en el juramento de entrega
  english_pob_reading: souls
  chosen_spanish_reading: almas
  alternative_spanish_readings:
  - vida
  - vidas
  rationale: La versión inglesa revisada opta por «souls» para reflejar más de cerca ψυχάς. En español, «almas» mantiene esa correspondencia formal, aunque el contexto de martirio también deja oír la entrega de la vida.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Imagen de φυλακή aplicada a la ley
  english_pob_reading: guarding the law
  chosen_spanish_reading: custodia de la ley
  alternative_spanish_readings:
  - vigilancia de la ley
  - guardia de la ley
  rationale: No se debe borrar la metáfora de vigilancia activa. «Custodia» preserva la idea de cuidado vigilante y evita reducir la expresión a una simple obediencia abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que ajustó ψυχάς hacia «souls» y refinó χρήσωμεν ... φυλακῇ como una imagen de guardar/custodiar la ley. La redacción española intenta conservar esas decisiones revisadas sin perder naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el texto griego no contiene κύριος aquí.
  - Se preservó la metáfora de vigilancia en τῇ περὶ τὸν νόμον φυλακῇ mediante «custodia de la ley».
  - Se optó por un registro solemne pero moderno, apto para lectura eclesial amplia.
