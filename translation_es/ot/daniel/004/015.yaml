    text: 'O: «el Espíritu del Dios santo». Las formas arameas son plurales, pero algunos entienden la expresión como una referencia singular.'
    reason: alternative_reading
  revision_rationale: Se conserva la traducción principal porque refleja fielmente el sentido del arameo y las decisiones auditadas del POB. Solo se corrige la ubicación del marcador de nota para anclarlo a la frase que realmente tiene la variante interpretativa.
