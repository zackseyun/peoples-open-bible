translation:
  language: es
  text: Tu camino y tus obras han traído estas cosas sobre ti. Esta es tu maldad[a], porque es amarga, porque llega hasta tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘tu calamidad’ o ‘tu desgracia’. La palabra hebrea puede designar tanto el mal moral como el desastre que resulta de él; aquí el texto principal conserva el tono acusatorio del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּרְכֵּךְ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu manera de vivir
  - tu senda
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, senda o manera de vivir. En este contexto profético, junto con ‘tus obras’, apunta al curso de conducta de Judá. ‘Tu camino’ conserva la metáfora hebrea y suena natural en español.
- source_word: וּמַעֲלָלַיִךְ
  english_pob_choice: and your deeds
  chosen_spanish: y tus obras
  alternatives_spanish:
  - y tus acciones
  - y tus prácticas
  lexicon: HALOT
  rationale: מַעֲלָלִים denota obras o acciones, con matiz moral en contextos proféticos. ‘Obras’ mantiene brevedad y el peso evaluativo sin sobreexplicar.
- source_word: עָשׂוֹ אֵלֶּה לָךְ
  english_pob_choice: have brought these things upon you
  chosen_spanish: han traído estas cosas sobre ti
  alternatives_spanish:
  - han hecho estas cosas en ti
  - han causado estas cosas en ti
  lexicon: HALOT
  rationale: El hebreo expresa literalmente ‘han hecho estas cosas para/a ti’. En un contexto de juicio, ‘han traído estas cosas sobre ti’ transmite bien causa y consecuencia en español, de manera fiel y natural.
- source_word: זֹאת רָעָתֵךְ
  english_pob_choice: This is your evil
  chosen_spanish: Esta es tu mal[a]
  alternatives_spanish:
  - Esta es tu maldad
  - Esta es tu calamidad
  - Esta es tu desgracia
  lexicon: HALOT
  rationale: רָעָה puede designar mal moral o desastre/calamidad. La POB inglesa retiene ‘evil’ para conservar la acusación moral, sin borrar la posibilidad del resultado aflictivo. En español, ‘mal’ preserva esa tensión mejor que ‘calamidad’, que debilitaría el reproche; la nota recoge la alternativa del sentido resultante.
- source_word: כִּי מָר
  english_pob_choice: because it is bitter
  chosen_spanish: porque es amarga
  alternatives_spanish:
  - porque es amarga de verdad
  - porque es muy amarga
  lexicon: HALOT
  rationale: מָר significa ‘amargo/a’. Aquí se conserva el valor explicativo de כִּי con ‘porque’, en línea con la revisión del inglés POB, evitando una exclamación interpretativa. ‘Amarga’ es el equivalente natural en español.
- source_word: כִּי נָגַע עַד לִבֵּךְ
  english_pob_choice: because it reaches to your heart
  chosen_spanish: porque llega hasta tu corazón
  alternatives_spanish:
  - porque ha llegado hasta tu corazón
  - porque ha tocado tu corazón
  lexicon: HALOT
  rationale: נגע puede significar tocar, alcanzar o llegar hasta. ‘Llega hasta tu corazón’ reproduce la progresión y la penetración interior sin cargar el verbo con una interpretación más intensa de la que exige el hebreo. ‘Corazón’ mantiene el sentido bíblico del centro interior de la persona.
theological_decisions:
- issue: Sentido de רָעָה en זֹאת רָעָתֵךְ
  english_pob_reading: Rendered as 'your evil' to preserve the moral dimension of Judah's culpability while allowing the following bitterness to describe its consequence.
  chosen_spanish_reading: ‘tu mal’ conserva la dimensión moral de la culpa de Judá, sin borrar que ese mal se experimenta también como desastre amargo.
  alternative_spanish_readings:
  - tu maldad
  - tu calamidad
  - tu desgracia
  rationale: 'El verso une acusación y consecuencia: el mal de Judá es a la vez culpable y devastador. Traducirlo solo como ‘calamidad’ reduciría el reproche; traducirlo solo como ‘maldad’ podría oscurecer el resultado sufrido. ‘Mal’ preserva la tensión documentada por la POB inglesa.'
  doctrine_reference: Preservar la tensión lexical y teológica en vez de resolverla; consistencia de términos, con excepción documentada cuando el contexto lo exige.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una correspondencia más directa para las dos cláusulas con כי (‘porque’) y para נגע (‘llega/reaches’), manteniendo ‘evil’ para רָעָה. La versión española adopta esa misma estructura, evitando una exclamación interpretativa y preservando el doble valor moral y calamitoso del término.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió ‘mal’ para רָעָתֵךְ siguiendo la tensión lexical documentada; la nota al pie explicita las alternativas ‘calamidad’ y ‘desgracia’.
  - ‘Corazón’ se mantiene como centro interior de la persona, no como simple emoción, en continuidad con el uso bíblico tradicional y con el valor del hebreo לֵב.
  - La puntuación con dos ‘porque’ reproduce la relación causal/explanatoria del hebreo y la revisión inglesa reciente.
