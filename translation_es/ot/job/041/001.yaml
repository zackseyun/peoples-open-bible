translation:
  language: es
  text: He aquí[a], su esperanza resulta falsa[b]; ¿acaso no queda uno abatido con solo verlo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Mira». La partícula hebrea introduce una afirmación enfática que llama la atención.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su expectativa queda defraudada» o «su confianza falla». El hebreo puede resaltar que la esperanza resulta engañosa, falsa o defraudada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y llama la atención del oyente. «¡Mira!» conserva ese tono directo y poético en español sin sonar forzado.
- source_word: תֹּחַלְתּוֹ
  english_pob_choice: his hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su expectativa
  - su confianza
  lexicon: HALOT
  rationale: El sustantivo expresa esperanza o expectativa. «Esperanza» es la equivalencia más natural y precisa en español, manteniendo el matiz de expectativa implícito.
- source_word: נִכְזָבָה
  english_pob_choice: proves false
  chosen_spanish: se frustra
  alternatives_spanish:
  - resulta falsa
  - queda desilusionada
  - falla
  lexicon: HALOT
  rationale: 'El verbo comunica fracaso, desengaño o falsedad resultante. «Se frustra» refleja bien el sentido resultativo: la esperanza termina decepcionando o quedando sin cumplimiento.'
- source_word: הֲגַם
  english_pob_choice: is one not
  chosen_spanish: ¿acaso uno no
  alternatives_spanish:
  - ¿no es también
  - ¿no queda uno
  lexicon: HALOT
  rationale: La combinación interrogativa y aditiva forma una pregunta retórica intensificadora. «¿Acaso uno no» mantiene el golpe retórico y la función de énfasis.
- source_word: אֶל
  english_pob_choice: at
  chosen_spanish: con solo
  alternatives_spanish:
  - ante
  - al
  lexicon: HALOT
  rationale: Con la idea de reacción ante la visión, el español pide una expresión natural. «Con solo» transmite la fuerza de reacción inmediata sugerida por la construcción hebrea.
- source_word: מַרְאָיו
  english_pob_choice: the sight of him
  chosen_spanish: verlo
  alternatives_spanish:
  - su apariencia
  - su sola presencia
  lexicon: HALOT
  rationale: El sustantivo alude a apariencia o vista. En español, «verlo» expresa de modo natural la reacción provocada por su mera presencia, sin añadir más de lo que el hebreo permite.
- source_word: יֻטָל
  english_pob_choice: is cast down
  chosen_spanish: queda abatido
  alternatives_spanish:
  - es derribado
  - es echado por tierra
  - queda postrado
  lexicon: HALOT
  rationale: El pasivo de טול/נטל expresa ser arrojado o derribado, y en este contexto la reacción es de abatimiento. «Queda abatido» comunica el efecto emocional de manera idiomática y fiel.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la lectura retórica del hebreo con un giro idiomático. La presente redacción sigue esa misma línea, pero ajusta el cierre a un español más natural («con solo verlo») sin perder la pregunta retórica ni el valor de reacción inmediata.
  spanish_consistency_notes:
  - Se conservó un registro poético, sobrio y directo.
  - No se usó «Señor» ni terminología teológica ajena al versículo.
  - «Esperanza» se mantuvo para תֹּחַלְתּוֹ por ser la opción más transparente y reconocible en español.
