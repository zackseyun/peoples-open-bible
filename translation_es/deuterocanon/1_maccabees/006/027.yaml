    issue: «los adelanta» es poco natural y algo ambiguo para προκαταλάβῃ
    rationale: El griego expresa adelantarse a ellos / actuar antes que ellos, no simplemente 'adelantarlos' en sentido espacial. En español, con objeto personal, «se les adelanta» comunica mejor la idea de anticipación o preemption.
  - severity: medium
    issue: La nota [a] usa «preempta», forma no natural en español
    rationale: Aunque el inglés usa 'preempt', en español bíblico general debe evitarse un calco técnico no asentado. Mejor «se les adelanta», «se anticipa a ellos» o «los toma por delante» según contexto.
  - severity: low
    issue: La nota [a] repite prácticamente la misma opción que el texto principal
    rationale: Una nota de alternativa debe ofrecer verdaderas opciones léxicas distintas y aclarar el matiz del griego.
