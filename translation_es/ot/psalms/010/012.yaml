translation:
  language: es
  text: Levántate, Yahvé; oh Dios, alza tu mano. No te olvides de los afligidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los pobres», «los humildes» o «los oprimidos». El término hebreo puede referirse en general a quienes han sido abatidos y son vulnerables.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántate
  - Alzate
  lexicon: HALOT
  rationale: Es un imperativo dirigido a Dios. «Levántate» conserva el impulso urgente y el valor idiomático de la petición sin sonar arcaico en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del Tetragrámaton, conforme al criterio del proyecto, en lugar de sustituirlo por un título como «SEÑOR».
- source_word: אֵל
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh Poderoso
  lexicon: HALOT
  rationale: Funciona como vocativo paralelo a «Yahvé». «Oh Dios» preserva el tono de súplica y el paralelismo poético.
- source_word: נְשָׂא
  english_pob_choice: lift up
  chosen_spanish: alza
  alternatives_spanish:
  - levanta
  - eleva
  lexicon: HALOT
  rationale: Con «tu mano» el hebreo expresa una imagen concreta de acción. «Alza» reproduce bien la metáfora y suena natural en español.
- source_word: יָדֶךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica del texto sin interpretarla, siguiendo la fuerza poética del original.
- source_word: אַל תִּשְׁכַּח
  english_pob_choice: Do not forget
  chosen_spanish: No te olvides
  alternatives_spanish:
  - No olvides
  - No te acuerdes de
  lexicon: HALOT
  rationale: En español, el imperativo negativo pronominal es la forma más natural y fiel para expresar la prohibición/jussivo hebreo.
- source_word: עניים
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los pobres
  - los humildes
  - los oprimidos
  lexicon: HALOT
  rationale: El término hebreo puede abarcar pobres, humildes u oprimidos, pero en este contexto el énfasis recae en los que sufren bajo la opresión. «Afligidos» preserva ese rango semántico sin reducirlo a una sola categoría socioeconómica.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se traduce el Tetragrámaton con el nombre propio del pacto, no con una sustitución reverencial, para conservar la referencia personal y covenantal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No hubo cambios en la pasada de revisión más reciente; el texto coincide con la decisión auditada de mantener el sentido óptimo-equivalente sin ajustes pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal del nombre divino en todo el registro.
  - 'Se conserva el paralelismo vocativo con dos apelativos: «Yahvé» y «oh Dios».'
  - «Afligidos» se elige por amplitud semántica; la nota recoge las alternativas documentadas por el POB en inglés.
