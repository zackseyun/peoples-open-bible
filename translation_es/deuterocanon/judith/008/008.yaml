    issue: 'Expresión poco idiomática: ''le dirigiera palabra mala'''
    rationale: Aunque intenta conservar el vínculo entre verbo y objeto, en español suena forzado y poco natural. El proyecto pide español moderno y digno, evitando calcos de madera.
  - severity: medium
    issue: Registro demasiado coloquial en 'muchísimo'
    rationale: σφόδρα es fuerte, pero 'muchísimo' en este contexto suena conversacional. 'Mucho' mantiene el sentido con mejor dignidad bíblica.
  - severity: low
    issue: La nota puede afinar su primera alternativa
    rationale: Dado que el texto principal propuesto usa 'hablara mal de ella', conviene que la nota preserve la opción más literal/abierta de 'dijera una palabra mala contra ella' para representar mejor el abanico semántico del griego.
  revised_spanish_text: Y no hubo quien hablara mal de ella[a], porque temía mucho a Dios.
