  - marker: a
    text: 'El hebreo es elíptico en este registro: los nombres personales probablemente representan al jefe o representante de cada rama familiar.'
    reason: cultural_note
  - marker: b
    text: 'O: «los hijos de Leví que quedaban».'
    reason: lexical_alternative
  revision_rationale: Se ajusta הַנּוֹתָרִים a una formulación más natural y precisa en español principal («los restantes hijos de Leví») y se conserva la otra posibilidad como nota. También se regulariza la transliteración del nombre שׁוּבָאֵל a «Subael» para mejor legibilidad y coherencia en español.
