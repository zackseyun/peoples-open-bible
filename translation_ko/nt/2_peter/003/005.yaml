  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λανθάνει γὰρ αὐτοὺς τοῦτο θέλοντας ὅτι οὐρανοὶ ἦσαν ἔκπαλαι καὶ γῆ ἐξ ὕδατος καὶ δι’ ὕδατος συνεστῶσα τῷ τοῦ θεοῦ λόγῳ,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/005.yaml
  text: 'For they deliberately overlook this: that the heavens existed long ago[a], and the earth was formed out of water and through water by the word of God[c][b],'
  footnotes:
  - marker: a
    text: Or, 'For this escapes them willingly' or 'For they willingly ignore this.' The Greek expression combines being unaware with a willful disposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth.' The Greek lacks the article, which may emphasize the earth as a created realm in the argument rather than as a proper name.
    reason: lexical_alternative
  - marker: c
    text: Or 'by God's command.' The phrase more literally reads 'by the word of God.'
    reason: lexical_alternative
translation:
  language: ko
  text: '그들은 이것을 일부러 못 본 체합니다: 옛날에 하나님의 말씀으로 하늘이 있었고 땅이 물에서 나와 물로 말미암아 이루어졌으며,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λανθάνει ... θέλοντας
  english_pob_choice: deliberately overlook
  chosen_korean: 일부러 못 본 체하다
  alternatives_korean:
  - 고의로 외면하다
  - 알면서 모른 척하다
  lexicon: BDAG
  rationale: 「알지 못함」과 「의지적 외면」의 결합. 의도적 무시를 명확히.
