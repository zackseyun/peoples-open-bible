id: GAL.2.16
reference: Galatians 2:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰδότες ⸀δὲ ὅτι οὐ δικαιοῦται ἄνθρωπος ἐξ ἔργων νόμου ἐὰν μὴ διὰ πίστεως ⸂Ἰησοῦ Χριστοῦ⸃, καὶ ἡμεῖς εἰς Χριστὸν Ἰησοῦν ἐπιστεύσαμεν, ἵνα δικαιωθῶμεν ἐκ πίστεως Χριστοῦ καὶ οὐκ ἐξ ἔργων νόμου, ⸂ὅτι ἐξ ἔργων νόμου οὐ δικαιωθήσεται⸃ πᾶσα σάρξ.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/002/016.yaml
  text: Yet knowing that a person is not justified by works of the law except through faith in Jesus Messiah[a], even we have believed in Messiah Jesus, so that we might be justified by faith in Messiah and not by works of the law[c][b], because by works of the law no flesh will be justified.
  footnotes:
  - marker: a
    text: 'Or, ''through the faithfulness of Jesus Messiah.'''
    reason: alternative_reading
  - marker: b
    text: 'Or, ''by the faithfulness of Messiah.'''
    reason: alternative_reading
  - marker: c
    text: 'Lit. ''no flesh.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 우리는 사람이 율법의 행위로 의롭다 함을 받지 못하고 다만 예수 메시아의 믿음[a]을 통해서 의롭다 함을 받는다는 것을 알기에, 우리도 메시아 예수를 믿었습니다. 이는 메시아의 믿음[b]에 근거해 의롭다 함을 받으려는 것이지, 율법의 행위에 근거한 것이 아닙니다. 율법의 행위로는 어떤 육체도 의롭다 함을 받지 못할 것이기 때문입니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 πίστεως Ἰησοῦ Χριστοῦ. 「예수 메시아를 믿는 믿음」(목적격적 속격)일 수도, 「예수 메시아의 신실하심」(주격적 속격)일 수도 있다. 본 번역은 양면적 모호성을 보존한다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 πίστεως Χριστοῦ. 위와 같은 양면성을 지닌다.
    reason: alternative_reading
  - marker: c
    text: 직역하면 「어떤 육체도」. 한국 전통은 「혈육 있는 자」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργων νόμου
  english_pob_choice: works of the law
  chosen_korean: 율법의 행위
  alternatives_korean:
  - 율법의 일들
  lexicon: BDAG
  rationale: 바울 신학의 표준 용어로서 「율법의 행위」가 정립된 한국어이다.
- source_word: πίστεως Ἰησοῦ Χριστοῦ
  english_pob_choice: faith in Jesus Messiah
  chosen_korean: 예수 메시아의 믿음
  alternatives_korean:
  - 예수 메시아를 믿는 믿음
  - 예수 메시아의 신실하심
  lexicon: BDAG
  rationale: 속격의 모호성(목적격적/주격적)을 한국어에서도 보존하기 위해 「의 믿음」을 택하고 각주로 설명한다.
- source_word: δικαιοῦται
  english_pob_choice: is justified
  chosen_korean: 의롭다 함을 받다
  alternatives_korean:
  - 의롭게 되다
  - 의롭다고 인정받다
  lexicon: BDAG
  rationale: 한국 성경 전통의 표준 표현이며 칭의의 신학적 무게를 담는다.
- source_word: πᾶσα σάρξ
  english_pob_choice: no flesh
  chosen_korean: 어떤 육체도
  alternatives_korean:
  - 모든 육체가 … 못한다
  - 혈육 있는 자
  lexicon: BDAG
  rationale: 헬라어 σάρξ를 직역으로 보존하여 시편 143:2 인용의 셈어 어조를 살린다.
theological_decisions:
- issue: πίστεως Ἰησοῦ Χριστοῦ의 속격 해석
  chosen_reading: 예수 메시아의 믿음 (양면적 모호성 보존)
  alternative_readings:
  - 예수 메시아를 믿는 믿음 (목적격적 속격)
  - 예수 메시아의 신실하심 (주격적 속격)
  rationale: 본 절은 신약학에서 가장 논쟁적인 속격 구문 중 하나로, 「~을 향한 믿음」과 「~의 신실하심」 양쪽 해석이 모두 강력하다. 본 번역은 한국어 「의 믿음」 구조로 양면을 보존하고 각주로 명시한다. 곧이은 「우리도 메시아 예수를 믿었습니다」 구절이 신자의 믿음을 명시적으로 다루기 때문에, 본 속격을 자동으로 목적격적으로 환원할 필요가 없다.
  doctrine_reference: 'DOCTRINE.md: preserve genitive ambiguities; KOREAN_PIPELINE.md glossary'
