translation:
  language: es
  text: 'Los jóvenes[a] que habían crecido con él hablaron con él, diciendo: «Así dirás al pueblo que te habló, diciendo: “Tu padre hizo pesado nuestro yugo, pero tú hazlo más ligero para nosotros”. Así les dirás: “Mi dedo pequeño[b] es más grueso que la cintura de mi padre[c]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «los muchachos» o «los niños»; el contexto indica a los compañeros jóvenes de Roboam que habían crecido con él.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «mi pequeñez»; la expresión se entiende idiomáticamente como «mi dedo pequeño».
    reason: lexical_alternative
  - marker: c
    text: O «los lomos de mi padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְלָדִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: HALOT
  rationale: En este contexto cortesano y con la aclaración de que habían crecido con él, el sentido apunta a compañeros más jóvenes, no a niños pequeños. «Los jóvenes» conserva la referencia social de forma natural en español.
- source_word: גָּדְלוּ אִתּוֹ
  english_pob_choice: had grown up with him
  chosen_spanish: habían crecido con él
  alternatives_spanish:
  - habían sido criados con él
  - habían madurado con él
  lexicon: HALOT
  rationale: La expresión indica crecimiento o formación compartida con Roboam. «Habían crecido con él» reproduce bien el matiz idiomático sin forzar el español.
- source_word: כֹּה תֹאמַר
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirás
  alternatives_spanish:
  - De esta manera dirás
  - Entonces dirás
  lexicon: HALOT
  rationale: Es una fórmula introductoria de discurso. «Así dirás» mantiene el tono directivo y formal del hebreo y del POB en inglés.
- source_word: לָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: El término es genérico en el verso; «pueblo» es la opción más sobria y fiel sin añadir explícitamente «de Israel».
- source_word: אָבִיךָ הִכְבִּיד אֶת עֻלֵּנוּ
  english_pob_choice: Your father made our yoke heavy
  chosen_spanish: Tu padre hizo pesado nuestro yugo
  alternatives_spanish:
  - Tu padre cargó nuestro yugo
  - Tu padre agravó nuestro yugo
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta de «yugo», que el POB también preserva en inglés. «Hizo pesado» refleja היטב la idea verbal de cargar/agobiar.
- source_word: הָקֵל מֵעָלֵינוּ
  english_pob_choice: make it lighter for us
  chosen_spanish: aligéranos
  alternatives_spanish:
  - alígéralo para nosotros
  - hazlo más ligero para nosotros
  lexicon: HALOT
  rationale: El hebreo pide alivio del yugo ya mencionado. En español, el imperativo enclítico «aligéranos» es breve, natural y conserva la fuerza de la petición.
- source_word: קָטָנִּי
  english_pob_choice: My little finger
  chosen_spanish: mi dedit[o] pequeño
  alternatives_spanish:
  - mi dedo pequeño
  - mi meñique
  lexicon: HALOT
  rationale: La frase es idiomática y el inglés POB optó por el sentido convencional. En español, «mi dedo pequeño» transmite el valor idiomático sin añadir una identificación demasiado técnica como «meñique»; se señala la lectura literal en nota.
- source_word: עָבָה
  english_pob_choice: is thicker than
  chosen_spanish: es más grueso que
  alternatives_spanish:
  - es más robusto que
  - es más gordo que
  lexicon: HALOT
  rationale: El comparativo de grosor es directo; «más grueso» mantiene la imagen física y la jactancia del hablante.
- source_word: מִמָּתְנֵי אָבִי
  english_pob_choice: my father’s waist
  chosen_spanish: la cintura de mi padre
  alternatives_spanish:
  - los lomos de mi padre
  - las caderas de mi padre
  lexicon: HALOT
  rationale: «Cintura» comunica con claridad la zona corporal al español contemporáneo. Se evita «lomos» por su posible arcaísmo y ambigüedad en registro general.
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del POB en inglés: conserva la fórmula directiva formal («Así dirás») y la petición de alivio con objeto implícito recuperado del contexto, pero adapta la segunda mitad al español con un imperativo natural («aligéranos») sin perder la relación con el yugo mencionado.'
  spanish_consistency_notes:
  - Se mantiene «yugo» para עֻלֵּנוּ, en coherencia con el uso POB de conservar metáforas concretas.
  - Se evita «Cristo/Mesías» y otros términos teológicos no presentes en el versículo.
  - Se usa «Dios/Yahvé» no aplicable aquí; el verso no contiene el nombre divino.
  - La nota sobre el sentido idiomático de קָטָנִּי se ancla en la traducción con marca visible para evitar una nota sin soporte en el texto.
