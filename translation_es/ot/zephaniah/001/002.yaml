translation:
  language: es
  text: Barreré por completo todo de sobre la faz de la tierra[a], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Eliminaré por completo todo de sobre la faz de la tierra». El hebreo usa una construcción verbal enfática: literalmente, «recogiendo, recogeré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסֹף אָסֵף
  english_pob_choice: I will utterly sweep away
  chosen_spanish: Yo los barreré por completo
  alternatives_spanish:
  - Yo los eliminaré por completo
  - Yo los quitaré por completo
  - Yo los recogeré y apartaré por completo
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto + verbo finito expresa intensidad y certeza enfática. En este contexto de juicio, el español necesita una imagen de remoción total y no una simple idea de 'reunir'. 'Barreré por completo' conserva la fuerza idiomática y el alcance total sin suavizar el juicio.
- source_word: כֹּל
  english_pob_choice: everything
  chosen_spanish: los
  alternatives_spanish:
  - todo
  - todo ello
  - todo cuanto hay
  lexicon: HALOT
  rationale: El hebreo amplía el objeto de manera absoluta. En español, el objeto pronominal 'los' se entiende a partir del contexto de la destrucción/jucio y evita una formulación artificial como 'barreré todo' sin referente explícito. La nota de alcance total queda preservada con 'por completo' y 'de sobre la faz de la tierra'.
- source_word: מֵעַל פְּנֵי
  english_pob_choice: from the face of
  chosen_spanish: de sobre la faz de
  alternatives_spanish:
  - de sobre la superficie de
  - de la presencia de
  - de encima de
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de remoción 'de sobre la faz de'. 'Faz' mantiene el paralelo léxico con el inglés auditado y reproduce bien la imagen de superficie/exposición sin perder inteligibilidad en español.
- source_word: הָאֲדָמָה
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aunque אֲדָמָה puede significar 'suelo' o 'tierra/país', el marco universal del versículo favorece 'la tierra' en español. 'La tierra' mantiene el alcance amplio del juicio y es idiomático en registro bíblico contemporáneo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética introduce habla divina solemne. 'Dice Yahvé' es breve, natural y fiel al valor enunciativo del hebreo; se evita sustituir el nombre por un título, siguiendo el criterio de la obra para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración española estándar de la serie POB. 'Yahvé' respeta la decisión doctrinal de no ocultar el Tetragrámaton detrás de 'SEÑOR'.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino, no un título. En español, 'Yahvé' comunica ese nombre personal de pacto y mantiene la transparencia textual exigida por el proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Alcance del juicio: totalidad universal'
  english_pob_reading: everything / the earth
  chosen_spanish_reading: los barreré por completo de sobre la faz de la tierra
  alternative_spanish_readings:
  - los eliminaré por completo de la tierra
  - barreré todo de la tierra
  rationale: La combinación de כֹּל con אֲדָמָה en un anuncio de juicio exige una traducción totalizante. La elección española conserva la intensidad sin introducir una interpretación local restringida.
  doctrine_reference: Contexto profético de juicio en Sofonías 1:2
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios. El contexto auditado inglés mantiene la lectura enfática de la construcción hebrea y la transliteración del nombre divino; la propuesta española preserva ambas decisiones sin depender de una paráfrasis libre.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme a la política del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Faz de la tierra'' conserva el modismo hebreo de superficie/presencia, en paralelo al audit trail inglés.'
  - '''Barreré por completo'' reproduce la intensidad de la construcción enfática sin perder naturalidad en español.'
