translation:
  language: es
  text: Te prostituiste con los hijos de Egipto[a], tus vecinos, grandes de carne[b], y multiplicaste tu prostitución para provocarme a enojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los egipcios».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «grandes de carne», una descripción sexual cruda; algunas traducciones la vuelven más interpretativa, como «lujuriosos» o «bien dotados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּזְנִי
  english_pob_choice: You prostituted yourself
  chosen_spanish: Te prostituiste
  alternatives_spanish:
  - Te entregaste a la prostitución
  - Cometiste prostitución
  - Te fuiste tras la prostitución
  lexicon: HALOT
  rationale: זנה en contexto profético conserva la imagen sexual como metáfora de infidelidad. «Te prostituiste» transmite esa fuerza en español moderno sin suavizarla con un eufemismo excesivo.
- source_word: אֶל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Aunque el hebreo literal es «a/hacia», en español la relación sexual implícita con זנה se expresa de modo natural con «con».
- source_word: בְּנֵי מִצְרַיִם
  english_pob_choice: the sons of Egypt
  chosen_spanish: los hijos de Egipto
  alternatives_spanish:
  - los egipcios
  - la gente de Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión concreta del hebreo. «Hijos de Egipto» mantiene la textura del original y permite la alternativa interpretativa en nota.
- source_word: שְׁכֵנַיִךְ
  english_pob_choice: your neighbors
  chosen_spanish: tus vecinos
  alternatives_spanish:
  - los que están cerca de ti
  lexicon: HALOT
  rationale: «Vecinos» comunica de forma directa la idea de proximidad geográfica y política sin perder naturalidad en español.
- source_word: גִּדְלֵי בָשָׂר
  english_pob_choice: great of flesh
  chosen_spanish: grandes de carne
  alternatives_spanish:
  - de gran carne
  - muy robustos
  - bien dotados
  lexicon: HALOT
  rationale: La frase hebrea es deliberadamente cruda y sexual. «Grandes de carne» preserva la extrañeza y el impacto sin convertirla en una paráfrasis interpretativa.
- source_word: וַתַּרְבִּי
  english_pob_choice: and multiplied
  chosen_spanish: y multiplicaste
  alternatives_spanish:
  - e incrementaste
  - y aumentaste
  lexicon: HALOT
  rationale: El verbo refleja aumento/intensificación. «Multiplicaste» reproduce con concisión la progresión del texto.
- source_word: תַּזְנֻתֵךְ
  english_pob_choice: your prostitution
  chosen_spanish: tu prostitución
  alternatives_spanish:
  - tus actos de prostitución
  - tus fornicaciones
  - tu harlotería
  lexicon: HALOT
  rationale: El sustantivo deriva de זנה y debe conservarse con un término de la misma familia semántica. «Tu prostitución» mantiene el vínculo léxico con el verbo inicial.
- source_word: לְהַכְעִיסֵנִי
  english_pob_choice: to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - para irritarme
  - para enojarme
  - para provocarme
  lexicon: HALOT
  rationale: El causativo de כעס expresa provocar ira. «Provocarme a ira» conserva el registro bíblico y la relación causal sin atenuar el resultado emocional.
theological_decisions:
- issue: Metáfora sexual profética para la infidelidad de Jerusalén
  english_pob_reading: Retain the explicit prostitution imagery in the main text
  chosen_spanish_reading: Mantener la imaginería explícita de prostitución en el texto principal
  alternative_spanish_readings:
  - Suavizarla como «te fuiste tras otros dioses»
  - Reformularla como «fuiste infiel»
  rationale: El hebreo usa una imagen sexual deliberadamente ofensiva para describir la infidelidad del pueblo. Suavizarla ocultaría la fuerza retórica del pasaje y debilitaría la correspondencia con la fuente.
  doctrine_reference: Poética profética y fidelidad de traducción al tropo textual
- issue: Referencia concreta a «los hijos de Egipto»
  english_pob_reading: the sons of Egypt
  chosen_spanish_reading: Conservar «los hijos de Egipto» en el texto principal, con alternativa interpretativa en nota
  alternative_spanish_readings:
  - los egipcios
  - la gente de Egipto
  rationale: La forma literal del hebreo es transparente y significativa. En español puede sonar menos idiomática que «los egipcios», pero esa extrañeza es parte del tejido del texto y merece preservarse, mientras la nota ofrece la lectura más fluida.
  doctrine_reference: Precisión léxica y prioridad del texto fuente
translation_notes:
  revision_awareness: Se tuvo en cuenta que el control inglés de POB no introdujo revisiones posteriores en este versículo; la coincidencia alta con la revisión más reciente confirma que no había cambios pendientes y que conviene mantener la literalidad cruda del hebreo en los puntos léxicos sensibles.
  spanish_consistency_notes:
  - Se preserva la familia léxica de זנה con «prostituirte/prostitución».
  - «Provocarme a ira» mantiene el registro bíblico y evita una banalización coloquial.
  - «Hijos de Egipto» se deja en el texto con nota para la alternativa idiomática «egipcios».
  - La puntuación sigue el ritmo coordinado del hebreo y la prosa profética en español natural.
