base_translation:
  language: en
  yaml_path: translation/ot/psalms/083/014.yaml
  text: My God[a], make them like whirling dust[b], like chaff before the wind.
  footnotes:
  - marker: a
    text: Or 'like a wheel' for the Hebrew גַּלְגַּל; the term can denote something rolling or whirling. The main text adopts the sense that best fits the parallel image of wind-driven chaff.
    reason: lexical_alternative
  - marker: b
    text: Hebrew קַשׁ more literally refers to straw or stubble; 'chaff' is used here because the phrase 'before the wind' evokes the image of light refuse blown away.
    reason: lexical_alternative
