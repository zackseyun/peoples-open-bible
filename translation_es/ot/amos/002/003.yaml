translation:
  language: es
  text: Y cortaré al juez de en medio de ella[a], y mataré con él a todos sus oficiales”, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el gobernante»; el hebreo puede designar un funcionario judicial o, más ampliamente en este contexto, una autoridad gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - eliminaré
  - arrasaré
  lexicon: HALOT
  rationale: כרת en hifil expresa la idea de cortar/retirar de manera decisiva. En español, «cortaré» conserva la imagen verbal y la fuerza de juicio, sin añadir el matiz más interpretativo de «eliminaré» ni el más libre de «arrasaré».
- source_word: שׁוֹפֵט
  english_pob_choice: the judge
  chosen_spanish: el juez
  alternatives_spanish:
  - el gobernante
  - el magistrado
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «juez». Aunque en contexto puede abarcar una figura de gobierno, la POB inglesa ya reconoció la tensión léxica; en español se mantiene el término directo «juez» y se deja la alternativa contextual en nota.
- source_word: מִקִּרְבָּהּ
  english_pob_choice: from her midst
  chosen_spanish: de en medio de ella
  alternatives_spanish:
  - de entre ella
  - de su medio
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conserva la personificación femenina de la entidad mencionada. «De en medio de ella» suena natural en español y mantiene la imagen de expulsión o remoción desde el interior.
- source_word: וְכָל שָׂרֶיהָ
  english_pob_choice: all her officials
  chosen_spanish: a todos sus oficiales
  alternatives_spanish:
  - a todos sus príncipes
  - a todos sus líderes
  lexicon: HALOT
  rationale: שָׂרִים puede ser «príncipes», «jefes» u «oficiales». Dado el paralelismo con una autoridad gobernante y el objetivo de evitar una lectura demasiado monárquica, «oficiales» reproduce bien el sentido de la élite gobernante.
- source_word: אֶהֱרֹג
  english_pob_choice: I will kill
  chosen_spanish: mataré
  alternatives_spanish:
  - mataré de muerte
  - daré muerte
  lexicon: HALOT
  rationale: הרג significa matar/asesinar de forma directa. «Mataré» es la correspondencia española más clara y fiel, sin recurrir a un arcaísmo innecesario.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con el juez
  lexicon: HALOT
  rationale: El sufijo masculino singular apunta naturalmente al sustantivo singular anterior. «Con él» conserva la concisión del hebreo y comunica que los oficiales compartirán la suerte del juez.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la terminología proyectual para יְהוָה: «Yahvé». El marco profético en español fluye de manera natural con «dice»; mantiene el carácter de fórmula oracular sin sobrecargarla.'
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto pide transliterar el Nombre divino como «Yahvé», no ocultarlo detrás de un título. En este verso no hay necesidad de máscara litúrgica; la fórmula profética queda transparente y auditables sus referencias.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שׁוֹפֵט en contexto
  english_pob_reading: judge / ruler tension
  chosen_spanish_reading: juez
  alternative_spanish_readings:
  - gobernante
  - magistrado
  rationale: La tensión entre oficio judicial y autoridad política debe preservarse, no borrarse. «Juez» es el sentido léxico base; el contexto de «oficiales» permite inferir la dimensión de gobierno sin abandonar la palabra fuente.
  doctrine_reference: 'DOCTRINE.md: Preserve documented lexical tensions; do not erase contextual ambiguity'
translation_notes:
  revision_awareness: La POB inglesa atravesó una revisión en la que se pasó de «ruler» a «judge» para acercarse más al hebreo שׁוֹפֵט; la presente versión española sigue esa decisión reciente, pero conserva en nota la amplitud semántica documentada. También se adoptó la decisión doctrinal del nombre divino como «Yahvé», coherente con la directriz proyectual en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, según el estándar del proyecto.
  - Se mantiene «juez» en el texto principal y se anota la alternativa contextual para no borrar la tensión léxica.
  - 'El paralelismo verbal se preserva con dos futuros simples: «cortaré» / «mataré».'
  - «Oficiales» se usa en sentido de élite gobernante, coherente con el contexto político del pasaje.
