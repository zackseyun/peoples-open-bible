  to: que no nos harás daño[a], así como nosotros no te hemos tocado[b] y así como solo te hemos hecho bien y te despedimos en paz[c]. Ahora eres bendecido por Yahvé.
  rationale: La revisión conserva todas las decisiones fuente-clave, pero mejora la idiomaticidad española y corrige una nota redundante. «solo te hemos hecho bien» expresa mejor רַק טוֹב en español natural. «te despedimos en paz» refleja bien la secuencia verbal hebrea y deja la forma con auxiliar como alternativa, en línea con el historial inglés. La clausula final se simplifica a «Ahora eres bendecido por Yahvé», más natural y digna sin alterar el sentido.
