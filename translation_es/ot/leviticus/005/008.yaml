translation:
  language: es
  text: Y las llevará al sacerdote, y presentará primero la que será para la ofrenda por el pecado[a], y le desprenderá[b] la cabeza desde el frente de su cuello, pero no la separará completamente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ofrenda de purificación»; el término hebreo חַטָּאת también puede entenderse más específicamente así en contextos sacrificiales levíticos.
    reason: lexical_alternative
  - marker: b
    text: El verbo describe la manipulación ritual que el sacerdote hace del ave; versiones tradicionales suelen decir «retorcer» o «arrancar» la cabeza.
    reason: lexical_alternative
  - marker: c
    text: Es decir, la cabeza no debía quedar totalmente desprendida del cuerpo.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: he shall bring
  chosen_spanish: lo llevará
  alternatives_spanish:
  - lo traerá
  - lo presentará
  lexicon: HALOT
  rationale: El verbo de movimiento en contexto legal-sacrificial se rinde naturalmente con un futuro de obligación en español. 'Lo llevará' conserva la dirección hacia el sacerdote sin sobrecargar el verbo de ofrenda.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los dos
  - ellos
  lexicon: HALOT
  rationale: El plural debe mantenerse porque el contexto inmediato refiere a las dos aves. 'Los' es la forma más fluida en español.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiante
  lexicon: HALOT
  rationale: '''Sacerdote'' comunica de forma natural el oficio cultual. No se añade ''oficiante'' porque el hebreo no lo especifica.'
- source_word: וְהִקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - hará acercar
  lexicon: HALOT
  rationale: En contexto sacrificial, קרב en Hifil expresa presentar/ofrecer. 'Presentará' distingue esta acción ritual del mero llevar al sacerdote.
- source_word: אֶת אֲשֶׁר לַחַטָּאת רִאשׁוֹנָה
  english_pob_choice: first the one for the sin offering
  chosen_spanish: primero el que será para la ofrenda por el pecado
  alternatives_spanish:
  - primero el destinado a la ofrenda por el pecado
  - primero el que será para la ofrenda de purificación
  lexicon: HALOT
  rationale: Se conserva el orden con 'primero' y la idea de selección de una de las aves. 'Ofrenda por el pecado' sigue el valor culto-tradicional del término en este contexto, mientras que 'ofrenda de purificación' queda como alternativa legítima.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  lexicon: HALOT
  rationale: En Levítico, חטאת puede entenderse como ofrenda por el pecado o como ofrenda de purificación. Se mantiene 'ofrenda por el pecado' por ser la equivalencia cultual más reconocible, sin borrar la alternativa semántica.
- source_word: וּמָלַק
  english_pob_choice: he shall pinch off
  chosen_spanish: le arrancará
  alternatives_spanish:
  - le torcerá
  - le desprenderá con un pellizco
  lexicon: HALOT
  rationale: El verbo técnico describe la acción ritual sobre la cabeza/cuello del ave. 'Le arrancará' comunica con naturalidad la separación parcial y evita un calco poco claro en español.
- source_word: אֶת רֹאשׁוֹ
  english_pob_choice: its head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - su cabeza
  lexicon: HALOT
  rationale: Se usa 'la cabeza' porque el referente inmediato ya es el ave; el posesivo puede sonar redundante en español. La referencia sigue siendo inequívoca por el contexto.
- source_word: מִמּוּל עָרְפּוֹ
  english_pob_choice: from the front of its neck
  chosen_spanish: desde la parte delantera de su cuello
  alternatives_spanish:
  - desde el frente de su cuello
  - desde delante de su cuello
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. Se preserva el sentido espacial de מול y ערף sin recurrir a 'nuca', que podría sugerir la parte posterior. 'Parte delantera de su cuello' mantiene la imagen ritual con claridad.
- source_word: וְלֹא יַבְדִּיל
  english_pob_choice: but he shall not sever it
  chosen_spanish: pero no la separará completamente
  alternatives_spanish:
  - pero no la separará
  - pero no la dividirá
  lexicon: HALOT
  rationale: בדל expresa separar/dividir; en este rito el sentido es que la cabeza no debe quedar totalmente desprendida. 'Separará completamente' explicita la fuerza práctica que el inglés POB también preserva con 'sever'.
theological_decisions:
- issue: Sentido sacrificial de חַטָּאת
  english_pob_reading: sin offering, with a noted scholarly alternative 'purification offering'
  chosen_spanish_reading: ofrenda por el pecado, con la alternativa ofrenda de purificación
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: La expresión admite una gama cultual amplia en Levítico. Se opta por una forma reconocible en español eclesial, pero se preserva la tensión semántica con una alternativa explícita.
  doctrine_reference: Levítico 5:8; cf. Levítico 4–5 sacrificial terminology
translation_notes:
  revision_awareness: La revisión inglesa reciente afinó la preposición hacia 'from the front of its neck'. La redacción española refleja esa precisión con 'desde la parte delantera de su cuello', manteniendo además la distinción entre el acto de presentar al sacerdote y el acto ritual sobre la primera ave.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva la distinción entre 'traer/llevar' y 'presentar' para no fusionar dos acciones rituales distintas.
  - Se evita 'Cristo' porque no aplica aquí; 'Mesías' no corresponde a este pasaje.
  - La elección de 'ofrenda por el pecado' conserva la terminología cultual común, pero la nota mantiene viva la alternativa académica 'ofrenda de purificación'.
