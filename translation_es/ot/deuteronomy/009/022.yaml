review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura locativa tripartita, los topónimos transliterados y el nombre divino Yahvé. También mantiene el sentido causativo/continuo de מַקְצִפִים הֱיִיתֶם. Sin embargo, la expresión final 'a ira' es poco natural en español y no refleja bien el giro idiomático; además, la nota [a] está anclada en el topónimo equivocado.
  spanish_quality_summary: La lectura general es comprensible, pero 'estuvieron provocando a Yahvé a ira' suena forzada y menos idiomática que 'provocaban la ira de Yahvé' o 'provocaban a Yahvé hasta hacerlo enojar'. Para un español bíblico claro y digno, conviene usar una formulación natural. También debe corregirse la ubicación del marcador de nota para que corresponda a Kibrot-hatavá.
  glossary_alignment: Alineado con la política del proyecto en 'Yahvé' para יְהוָה. Los topónimos transliterados son aceptables. No hay conflicto doctrinal serio; la revisión es principalmente de estilo, naturalidad y anclaje de nota.
  issues:
  - severity: medium
    issue: La frase 'provocando a Yahvé a ira' es antinatural en español.
    rationale: Aunque intenta reflejar el causativo de קצף, en español moderno y eclesial suena calcada. 'Provocaban la ira de Yahvé' comunica fielmente el sentido sin perder dignidad ni claridad.
  - severity: medium
    issue: El marcador [a] está colocado en 'Taberá' pero la nota explica 'Kibrot-hatavá'.
    rationale: Las instrucciones requieren que cada nota esté anclada exactamente en la palabra o frase pertinente. Actualmente hay desajuste entre texto y nota.
  - severity: low
    issue: '''Estuvieron provocando'' es posible, pero menos natural que una forma imperfecta en este contexto de conducta característica.'
    rationale: La perífrasis hebrea con participio + היה expresa acción continua/característica. En español, 'provocaban' suele sonar más natural que 'estuvieron provocando' en una lista recapitulativa histórica.
  revised_spanish_text: Y en Taberá, y en Masá, y en Kibrot-hatavá[a], provocaban la ira de Yahvé.
  revised_footnotes:
  - marker: a
    text: Kibrot-hatavá es un nombre de lugar; literalmente, 'tumbas del deseo' o 'tumbas del anhelo'.
    reason: lexical_alternative
