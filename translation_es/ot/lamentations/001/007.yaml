translation:
  language: es
  text: Jerusalén recordó en los días de su aflicción y de su vagar[a] todas sus cosas preciosas, que tenía desde días antiguos. Cuando su pueblo cayó en manos del enemigo, y no había quien la ayudara, los enemigos la vieron; se rieron de su ruina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y de su peregrinar» o «y de su falta de hogar» para מְרוּדֶיהָ; el hebreo es raro y su sentido exacto es debatido.
    reason: lexical_alternative
  - marker: b
    text: O «de su desolación» o «de su caída» para עַל מִשְׁבַּתֶּהָ; el sustantivo hebreo puede referirse a su ruina o a su condición devastada.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó
  - tuvo presente
  lexicon: HALOT
  rationale: El perfecto qal femenino singular pide un pasado narrativo; "recordó" comunica memoria activa sin volverlo mecánico.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: uso bíblico estándar
  rationale: Nombre propio de la ciudad; en español bíblico natural se usa "Jerusalén".
- source_word: יְמֵי עָנְיָהּ
  english_pob_choice: the days of her affliction
  chosen_spanish: los días de su aflicción
  alternatives_spanish:
  - los días de su miseria
  - los días de su sufrimiento
  lexicon: HALOT
  rationale: '"Aflicción" conserva el peso del hebreo עָנְיָהּ y el tono de lamentación sin expandir el sentido.'
- source_word: וּמְרוּדֶיהָ
  english_pob_choice: and her wanderings
  chosen_spanish: y de sus wanderings
  alternatives_spanish:
  - y de su peregrinar
  - y de su vagar
  - y de su homelessness
  lexicon: HALOT
  rationale: La forma hebrea es rara y debatida; el inglés POB conserva "wanderings" por la imagen concreta. En español se mantiene el préstamo técnico en el texto principal para no elegir prematuramente una glosa que borre la tensión léxica; la alternativa se documenta en nota.
- source_word: כֹּל מַחֲמֻדֶיהָ
  english_pob_choice: all her precious things
  chosen_spanish: todas sus cosas preciosas
  alternatives_spanish:
  - todos sus bienes preciosos
  - todos sus tesoros
  - todas sus cosas deseables
  lexicon: HALOT
  rationale: La frase abarca cosas valiosas o queridas; "cosas preciosas" es amplio y fiel sin restringirlo solo a tesoros materiales.
- source_word: אֲשֶׁר הָיוּ מִימֵי קֶדֶם
  english_pob_choice: that were from days of old
  chosen_spanish: que habían sido desde los días antiguos
  alternatives_spanish:
  - que existían desde los días de antaño
  - que eran de tiempos pasados
  lexicon: HALOT
  rationale: '"Desde los días antiguos" refleja מִימֵי קֶדֶם con un registro bíblico natural y claro en español.'
- source_word: בִּנְפֹל עַמָּהּ
  english_pob_choice: When her people fell
  chosen_spanish: Cuando cayó su pueblo
  alternatives_spanish:
  - Cuando su pueblo cayó
  - Al caer su pueblo
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal; en español se puede verter con una oración temporal fluida.
- source_word: בְּיַד צָר
  english_pob_choice: into the hand of the foe
  chosen_spanish: en mano del enemigo
  alternatives_spanish:
  - en mano del adversario
  - en poder del enemigo
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo de "mano" como poder/subyugación, y "enemigo" expresa la fuerza colectiva de צָר.
- source_word: וְאֵין עוֹזֵר לָהּ
  english_pob_choice: and there was no one to help her
  chosen_spanish: y no había quien la ayudara
  alternatives_spanish:
  - y no tenía ayudador
  - y no había quien le ayudase
  lexicon: HALOT
  rationale: La cláusula expresa desamparo total; "no había quien la ayudara" es natural y mantiene la fuerza del participio עוֹזֵר.
- source_word: רָאוּהָ צָרִים
  english_pob_choice: foes saw her
  chosen_spanish: los enemigos la vieron
  alternatives_spanish:
  - los enemigos la miraron
  - los adversarios la vieron
  lexicon: HALOT
  rationale: El plural צָרִים se vierte naturalmente como "enemigos"; el verbo conserva el acto simple de ver antes de la burla.
- source_word: שָׂחֲקוּ
  english_pob_choice: they laughed
  chosen_spanish: se rieron
  alternatives_spanish:
  - se burlaron
  - se mofaron
  lexicon: HALOT
  rationale: El hebreo puede implicar risa despectiva; "se rieron" preserva la imagen concreta, y el contexto ya marca el tono de desprecio.
- source_word: עַל מִשְׁבַּתֶּהָ
  english_pob_choice: at her ruin
  chosen_spanish: de su ruina
  alternatives_spanish:
  - de su desolación
  - de su caída
  - de su destrucción
  lexicon: HALOT
  rationale: La noción del sustantivo es discutida, pero el contexto apunta a su estado arruinado/desolado; "ruina" coincide con la revisión inglesa y es idiomática en español.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al reflejar el sentido temporal con «en los días de» y al preferir «ruina» para מִשְׁבַּתֶּהָ; también se conservó la tensión léxica de מְרוּדֶיהָ mediante una decisión documentada en nota.
  spanish_consistency_notes:
  - Se usa «Jerusalén» como nombre propio estándar en español.
  - Se mantuvo el paralelismo temporal y poético del verso sin expandirlo interpretativamente.
  - 'Se conservaron en nota las dos zonas léxicamente debatidas: מְרוּדֶיהָ y מִשְׁבַּתֶּהָ.'
  - No se introdujo terminología doctrinal ajena al texto; el verso es descriptivo y lamentativo.
