review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el contraste de וְ/אַתָּה con «Pero tú», mantiene correctamente לְעֹלָם como «para siempre» y sigue la política del proyecto al usar «Yahvé» para יְהוָה. Sin embargo, מָרוֹם se traduce mejor con una expresión que preserve el sentido de altura/exaltación espacial-metafórica («en lo alto» / «en las alturas») en vez de «sublime», que cambia la imagen del hebreo.
  spanish_quality_summary: El español es claro y digno, pero «eres sublime» introduce una cualidad abstracta menos fiel que la imagen original. «Pero tú estás en lo alto para siempre, oh Yahvé» suena natural y más cercano al hebreo. La nota actual es innecesaria si se adopta una formulación más literal e idiomática.
  glossary_alignment: 'Alineación buena en el nombre divino: «Yahvé» cumple el criterio del proyecto. No hay otros términos glosarios sensibles en el versículo. La principal corrección es léxico-semántica para מָרוֹם.'
  issues:
  - severity: medium
    issue: «sublime» para מָרוֹם debilita la imagen de altura del hebreo
    rationale: מָרוֹם denota altura, lugar elevado o exaltación. El inglés auditado eligió «on high» precisamente para conservar esa metáfora espacial sin convertirla en mero atributo abstracto. «Sublime» suena elegante, pero desplaza el sentido hacia cualidad estética/moral.
  - severity: low
    issue: La nota al pie compensa una elección evitable
    rationale: Como el español puede decir naturalmente «estás en lo alto» o «estás en las alturas», no hace falta apartarse del sentido principal y luego restaurarlo en nota. Es mejor que el texto principal lleve la imagen central del original.
  revised_spanish_text: Pero tú estás en lo alto para siempre, oh Yahvé.
  revision_rationale: Se revisa «eres sublime» a «estás en lo alto» para reflejar con más fidelidad מָרוֹם y seguir la rationale documentada en el audit trail inglés («on high»). La cláusula nominal hebrea admite la cópula española «estás» en una expresión locativa natural. Se elimina la nota porque la traducción revisada ya preserva directamente el sentido fuente sin crear una ambigüedad nueva.
