translation:
  language: es
  text: Restituirá por lo que pecó en relación con lo santo[a], y le añadirá una quinta parte y la dará al sacerdote. Entonces el sacerdote hará expiación por él con el carnero del sacrificio por la culpa[b], y le será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pecó contra lo santo»; también, «retuvo indebidamente algo santo». El hebreo puede referirse a una falta relacionada con algo santo o consagrado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con el carnero de la ofrenda por la culpa»; también, «con el carnero del sacrificio de reparación». אָשָׁם puede destacar tanto la culpa como la reparación.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָטָא מִן הַקֹּדֶשׁ
  english_pob_choice: sinned against from the holy thing
  chosen_spanish: pecó en relación con lo sagrado
  alternatives_spanish:
  - pecó contra lo sagrado
  - defraudó lo sagrado
  - retuvo indebidamente lo sagrado
  lexicon: HALOT
  rationale: La construcción hebrea apunta a una ofensa que afecta algo santo o perteneciente a lo sagrado. En español, 'en relación con lo sagrado' preserva la amplitud del hebreo sin imponer de entrada una sola concreción; la nota permite la lectura más específica de retención indebida, que la POB inglesa también documenta.
- source_word: יְשַׁלֵּם
  english_pob_choice: make restitution
  chosen_spanish: restituirá
  alternatives_spanish:
  - hará restitución
  - repagará
  - devolverá con compensación
  lexicon: HALOT
  rationale: En este contexto legal-sacrificial, el verbo expresa compensación o reparación, no simple pago. 'Restituirá' es natural en español y conserva la fuerza jurídica del acto.
- source_word: חֲמִישִׁתוֹ
  english_pob_choice: a fifth of it
  chosen_spanish: una quinta parte
  alternatives_spanish:
  - un quinto
  - una quinta parte de ello
  lexicon: HALOT
  rationale: La expresión cuantitativa hebrea se refiere a la porción adicional del veinte por ciento. 'Una quinta parte' es clara, precisa y fluida en español.
- source_word: יוֹסֵף עָלָיו
  english_pob_choice: add ... to it
  chosen_spanish: añadirá a ello
  alternatives_spanish:
  - añadirá sobre ello
  - lo agregará a ello
  lexicon: HALOT
  rationale: La idea es sumar la quinta parte al monto principal. 'Añadirá a ello' conserva el sentido idiomático sin sonar forzado en español.
- source_word: לַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote ministrante
  - al kohén
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente español directo y transparente para el destinatario del pago. No hace falta transliteración aquí.'
- source_word: יְכַפֵּר עָלָיו
  english_pob_choice: make atonement for him
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará reconciliación por él
  - hará expiación a favor de él
  lexicon: HALOT
  rationale: Aunque 'hacer expiación' es menos común que 'hacer atonement' en español bíblico, aquí preserva el valor técnico sacrificial de כפר mejor que 'perdonar' o una paráfrasis más amplia. La preposición 'por él' mantiene el beneficio vicario.
- source_word: בְּאֵיל הָאָשָׁם
  english_pob_choice: with the ram of the guilt offering
  chosen_spanish: con el carnero del sacrificio por la culpa
  alternatives_spanish:
  - con el carnero de la ofrenda por la culpa
  - con el carnero del sacrificio de reparación
  lexicon: HALOT
  rationale: אָשָׁם combina culpa y ofrenda de reparación. 'Sacrificio por la culpa' conserva esa tensión en español sin reducirla solo a sentimiento moral ni imponer una terminología demasiado técnica. 'Carnero' refleja el animal específico del texto.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: La pasiva refleja hebrea se vierte bien con 'le será perdonado', que suena natural y mantiene el carácter impersonal/divino del perdón concedido.
theological_decisions:
- issue: Alcance del término אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: sacrificio por la culpa
  alternative_spanish_readings:
  - ofrenda por la culpa
  - sacrificio de reparación
  - ofrenda de reparación
  rationale: La POB inglesa preserva tanto la dimensión de culpa como la de reparación. En español, 'sacrificio por la culpa' mantiene visible la culpa sin perder el sentido sacrificial; la nota a pie recoge la variante de 'ofrenda de reparación' para no borrar la tensión semántica del término.
  doctrine_reference: Translation philosophy §5 (consistencia terminológica y conservación de tensiones léxicas)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó la redundancia en la cuantificación ('a fifth to it' sin repetición innecesaria). Por eso el español evita cualquier duplicación equivalente y formula simplemente 'añadirá a ello una quinta parte'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo donde aparece en otros contextos; este versículo no lo contiene.
  - '''Sacerdote'' se usa de manera consistente para כֹּהֵן, sin transliteración innecesaria.'
  - Se eligió 'expiación' para כפר, conservando el registro sacrificial técnico en español.
  - La relación entre culpa y reparación en אָשָׁם se deja visible en el cuerpo y en la nota, sin reducir el término a una sola idea.
