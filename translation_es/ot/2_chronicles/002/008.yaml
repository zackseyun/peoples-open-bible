translation:
  language: es
  text: y para preparar para mí madera en abundancia, pues la casa[a] que estoy edificando será grande y maravillosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el templo'; el hebreo dice literalmente 'la casa'.
    reason: lexical_alternative
  - marker: b
    text: O 'grande y maravillosa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהָכִין
  english_pob_choice: and to prepare
  chosen_spanish: y para preparar
  alternatives_spanish:
  - y preparar
  - y para disponer
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo expresa finalidad o continuación de la petición; en español, 'para preparar' comunica naturalmente el propósito sin perder el valor verbal del hebreo.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - para mi uso
  lexicon: HALOT
  rationale: El sufijo de 1ª persona indica beneficio o destinatario; 'para mí' es la forma directa y sobria en español.
- source_word: עֵצִים
  english_pob_choice: timber
  chosen_spanish: madera
  alternatives_spanish:
  - madera de construcción
  - leño
  lexicon: HALOT
  rationale: En contexto de construcción, el referente es material para edificar; 'madera' es claro en español y no fuerza un tecnicismo innecesario. Se evita 'árboles' porque aquí no son árboles vivos sino material para obra.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran cantidad
  - abundantemente
  lexicon: HALOT
  rationale: La expresión marca gran cantidad; 'en abundancia' conserva el sentido nominal e idiomático de manera natural.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Hebreo literalmente 'la casa'. En español 'la casa' preserva el texto fuente; el referente es el templo, pero no se sustituye por una interpretación más explícita sin necesidad.
- source_word: אֲנִי בוֹנֶה
  english_pob_choice: that I am building
  chosen_spanish: que estoy edificando
  alternatives_spanish:
  - que estoy construyendo
  - que edificaré
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. 'Estoy edificando' mantiene la progresividad y, en un registro elevado, conecta bien con el contexto del santuario.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - magnífica
  - gran
  lexicon: HALOT
  rationale: '''Grande'' conserva el valor de tamaño y relevancia. En español, la coordinación con ''maravillosa'' ya aporta el matiz de esplendor; ''magnífica'' sería más interpretativo.'
- source_word: וְהַפְלֵא
  english_pob_choice: wonderful
  chosen_spanish: maravillosa
  alternatives_spanish:
  - asombrosa
  - extraordinaria
  lexicon: HALOT
  rationale: La raíz פלא expresa lo maravilloso, extraordinario o portentoso. 'Maravillosa' comunica bien esa cualidad sin ampliar indebidamente el alcance del hebreo.
theological_decisions:
- issue: 'הַבַּיִת: ''house'' literal versus ''temple'' interpretive'
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Se preserva la formulación literal del hebreo. Aunque el referente es claramente el templo, el texto fuente dice 'la casa', y mantenerlo conserva el idiomático bíblico y la transparencia de la traducción.
  doctrine_reference: Transparencia textual y fidelidad al lema hebreo; no hay cambio doctrinal.
- issue: 'גָּדוֹל וְהַפְלֵא: tension between size and wonder'
  english_pob_reading: great and wonderful
  chosen_spanish_reading: grande y maravillosa
  alternative_spanish_readings:
  - grande y extraordinaria
  - grande y admirable
  rationale: 'Se conserva la doble cualidad: magnitud (''grande'') y carácter extraordinario (''maravillosa''). En español, esta pareja transmite el mismo campo semántico sin borrar la tensión entre tamaño y esplendor.'
  doctrine_reference: Semántica léxica del hebreo פלא; sin implicación doctrinal especial.
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente coinciden con alta concordancia; no se detectaron cambios necesarios. La versión española sigue de cerca el hebreo WLC y conserva las alternativas léxicas documentadas en el aparato inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo 'la casa' para reflejar el hebreo literal, con nota alternativa para 'el templo'.
  - '''Maravillosa'' se eligió para פלא por coherencia con el audit trail inglés y por naturalidad en español.'
  - Se evitó introducir 'Cristo', 'Señor' u otra terminología no presente en este versículo.
