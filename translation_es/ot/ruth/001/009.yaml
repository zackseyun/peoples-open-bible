translation:
  language: es
  text: «Que Yahvé les conceda hallar[a] descanso, cada una en la casa de su marido». Entonces ella las besó, y ellas alzaron sus voces y lloraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguridad» o «estabilidad»; el hebreo מְנוּחָה aquí se refiere a la seguridad estable de la vida en la casa de un marido.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֵּן יְהוָה
  english_pob_choice: May Yahweh grant
  chosen_spanish: «Yahvé les conceda»
  alternatives_spanish:
  - «Yahvé les dé»
  - «Que Yahvé les conceda»
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/ bendición con valor jussivo. En español, «que ... conceda» comunica mejor la petición benévola que un simple «dé», y mantiene la agencia divina con un tono natural y reverente. Se conserva «Yahvé» según el criterio del proyecto para יְהוָה.
- source_word: לָכֶם
  english_pob_choice: that you find
  chosen_spanish: «les»
  alternatives_spanish:
  - «a ustedes»
  - «para ustedes»
  lexicon: HALOT
  rationale: El destinatario es plural y distributivo. El clítico dativo «les» encaja con el verbo «conceda» y deja que el resto de la cláusula exprese el contenido de la bendición.
- source_word: וּמְצֶאןָ
  english_pob_choice: that you find
  chosen_spanish: «hallen»
  alternatives_spanish:
  - «encuentren»
  - «hayan hallado»
  lexicon: HALOT
  rationale: El verbo tiene sentido de encontrar/hallar en un contexto de bendición. «Hallen» suena más idiomático y solemne que un calco, y preserva la idea de logro deseado.
- source_word: מְנוּחָה
  english_pob_choice: rest
  chosen_spanish: «descanso»
  alternatives_spanish:
  - «reposo»
  - «seguridad»
  - «asentamiento»
  lexicon: HALOT
  rationale: La POB en inglés mantiene «rest» con una nota que aclara el sentido de seguridad/establecimiento en el hogar del esposo. En español, «descanso» reproduce el término básico con naturalidad; la nota preserva la tensión semántica entre descanso literal y seguridad establecida.
- source_word: אִשָּׁה בֵּית אִישָׁהּ
  english_pob_choice: each of you in the house of her husband
  chosen_spanish: «cada una en la casa de su marido»
  alternatives_spanish:
  - «cada una en la casa de su esposo»
  - «cada una en el hogar de su marido»
  lexicon: HALOT
  rationale: La construcción hebrea es distributiva respecto de las dos mujeres. «Cada una» hace explícita esa distribución, y «casa de su marido» mantiene el paralelismo con el hebreo sin añadir una paráfrasis más amplia de lo que el texto dice.
- source_word: וַתִּשַּׁק
  english_pob_choice: Then she kissed them
  chosen_spanish: «Entonces ella las besó»
  alternatives_spanish:
  - «Y ella las besó»
  - «Luego las besó»
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte con una transición temporal natural. «Entonces» conserva el encadenamiento narrativo sin forzar un hebraísmo.
- source_word: וַתִּשֶּׂאנָה קוֹלָן
  english_pob_choice: they lifted up their voices
  chosen_spanish: «alzaron sus voces»
  alternatives_spanish:
  - «levantaron sus voces»
  - «prorrumpieron en llanto»
  lexicon: HALOT
  rationale: La expresión es un hebraísmo idiomático de lamento audible. «Alzaron sus voces» conserva el giro figurado que la POB en inglés decidió preservar; en español es comprensible y mantiene el color original.
- source_word: וַתִּבְכֶּינָה
  english_pob_choice: and wept
  chosen_spanish: «lloraron»
  alternatives_spanish:
  - «y lloraron»
  - «y se pusieron a llorar»
  lexicon: HALOT
  rationale: El verbo indica llanto. «Lloraron» es directo y, unido a la frase anterior, transmite el paralelismo narrativo sin sobreexplicarlo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: Se sigue el principio del proyecto para preservar el nombre del pacto en lugar de sustituirlo por una máscara litúrgica. «Yahvé» es la forma adoptada para el texto principal en español, coherente con el tratamiento fuente-auditable del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מְנוּחָה en este contexto
  english_pob_reading: 'rest, with note: security or settledness in a husband''s household'
  chosen_spanish_reading: descanso, con nota explicativa sobre seguridad/establecimiento en la casa del marido
  alternative_spanish_readings:
  - reposo
  - seguridad
  - asentamiento estable
  rationale: El inglés POB retiene «rest» pero documenta que aquí apunta a la seguridad estable de la vida conyugal. En español, «descanso» conserva el lexema básico, y la nota evita borrar la dimensión social y doméstica del término.
  doctrine_reference: 'DOCTRINE.md: Lexical transparency and contextual nuance'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios en la última revisión del inglés POB; por eso no se introducen variantes expansivas. La única glosa necesaria es la de מְנוּחָה, siguiendo la nota inglesa y trasladando su tensión semántica al español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evita «señor»/«SEÑOR» como sustituto del nombre divino.
  - «Cada una» mantiene el sentido distributivo del hebreo.
  - «Alzaron sus voces» preserva el hebraísmo idiomático sin convertirlo en una paráfrasis interpretativa.
  - «Lloraron» cierra la escena con un verbo simple y narrativo, en paralelo con el inglés auditable.
