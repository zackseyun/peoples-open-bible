id: ACT.20.7
reference: Acts 20:7
source:
  edition: SBLGNT
  text: Ἐν δὲ τῇ μιᾷ τῶν σαββάτων συνηγμένων ⸀ἡμῶν κλάσαι ἄρτον ὁ Παῦλος διελέγετο αὐτοῖς, μέλλων ἐξιέναι τῇ ἐπαύριον, παρέτεινέν τε τὸν λόγον μέχρι μεσονυκτίου.
translation:
  text: Now on the first day of the week[a], when we had gathered to break bread, Paul was speaking to them, intending to depart the next day[b], and he prolonged the message until midnight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the breaking of bread.' The phrase may refer to a shared meal and may also carry Lord's Supper overtones.
    reason: lexical_alternative
  - marker: b
    text: Or 'Paul was speaking with them, since he was about to depart the next day, and he prolonged the message until midnight.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἐν δὲ
  chosen: Now on
  alternatives:
  - And on
  - 'On'
  lexicon: BDAG
  rationale: Ἐν with the dative marks time ('on/in'), and δέ is a mild connective. 'Now on' gives a natural English transition without overstating contrast.
- source_word: τῇ μιᾷ τῶν σαββάτων
  chosen: the first day of the week
  alternatives:
  - the first of the week
  - on one of the Sabbaths
  lexicon: BDAG
  rationale: This is a standard idiom in Koine for the first day of the week. A more literal 'one of the Sabbaths' would be misleading in English here.
- source_word: συνηγμένων ἡμῶν
  chosen: when we had gathered
  alternatives:
  - when we were gathered
  - after we had assembled
  lexicon: BDAG
  rationale: The genitive absolute gives the circumstance of the main action. 'When we had gathered' is natural English and preserves the first-person plural narrative perspective.
- source_word: κλάσαι ἄρτον
  chosen: to break bread
  alternatives:
  - for the breaking of bread
  - to share a meal
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'Break bread' preserves the idiom, which may refer to a communal meal and likely includes eucharistic overtones, without narrowing it to one denominational interpretation.
- source_word: διελέγετο
  chosen: was speaking with
  alternatives:
  - was discoursing with
  - was discussing with
  - was talking with
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'Was speaking with' is readable modern English and preserves the interactive sense of διαλέγομαι better than a monologic 'was preaching'.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - the disciples
  - those present
  lexicon: BDAG
  rationale: The pronoun's referent is the gathered group. 'Them' is the direct and textually warranted rendering without importing a more specific label.
- source_word: μέλλων ἐξιέναι
  chosen: since he was about to depart
  alternatives:
  - because he was going to leave
  - being about to go out
  lexicon: BDAG
  rationale: μέλλω with infinitive conveys imminence. 'Depart' fits travel context better than the overly literal 'go out'.
- source_word: τῇ ἐπαύριον
  chosen: the next day
  alternatives:
  - on the following day
  - tomorrow
  lexicon: BDAG
  rationale: This temporal expression refers to the following day. 'The next day' is idiomatic and clear.
- source_word: παρέτεινέν τε τὸν λόγον
  chosen: and he prolonged the message
  alternatives:
  - and he kept talking at length
  - and he extended his speech
  lexicon: BDAG
  rationale: παρατείνω means to extend or prolong. λόγος here refers to Paul's spoken address/message. 'Message' is more natural than 'word' or 'speech' while staying close to the sense.
- source_word: μέχρι μεσονυκτίου
  chosen: until midnight
  alternatives:
  - as far as midnight
  lexicon: BDAG
  rationale: 'A straightforward temporal limit: Paul continued until midnight.'
