translation:
  language: es
  text: 'Entonces ella dijo: «Que halle favor ante tus ojos, mi señor, porque me has consolado y porque has hablado al corazón[a] de tu sierva, aunque yo no soy como una de tus siervas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has hablado con bondad a tu sierva». El hebreo dice literalmente: «has hablado al corazón de tu sierva».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶמְצָא חֵן
  english_pob_choice: May I find favor
  chosen_spanish: Halle yo favor
  alternatives_spanish:
  - Permita que halle favor
  - Que halle favor
  lexicon: HALOT
  rationale: La forma imperfecta en primera persona aquí funciona como petición cortés o deseo deferente, no como futuro simple. ‘Halle yo favor’ conserva la idiomaticidad de ‘hallar favor’ y el tono rogativo sin volverlo demasiado moderno o explicativo.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: en tus ojos
  alternatives_spanish:
  - a tus ojos
  - en tu vista
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de evaluación o aceptación personal. En español, ‘en tus ojos’ es natural y transparente, y refleja la metáfora del original.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Es un título de respeto dirigido a Booz, no un título divino. ‘Mi señor’ mantiene la deferencia social sin la dureza de ‘amo’ y con mejor naturalidad que ‘sir’.
- source_word: נִחַמְתָּנִי
  english_pob_choice: you have comforted me
  chosen_spanish: me has consolado
  alternatives_spanish:
  - me has confortado
  - me has animado
  lexicon: HALOT
  rationale: El verbo expresa consuelo ante vulnerabilidad o aflicción. ‘Consolado’ comunica bien ese valor emocional en español actual.
- source_word: דִבַּרְתָּ עַל־לֵב
  english_pob_choice: you have spoken to the heart of
  chosen_spanish: has hablado al corazón de
  alternatives_spanish:
  - has hablado bondadosamente a
  - me has hablado con ternura a
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea literal ‘hablar al corazón’, que es transparente y fiel. La lectura inglesa preservó la literalidad, y el español también la conserva para no borrar la fuerza afectiva del giro.
- source_word: שִׁפְחָתֶךָ / שִׁפְחֹתֶיךָ
  english_pob_choice: your female servant / your female servants
  chosen_spanish: tu sierva / tus siervas
  alternatives_spanish:
  - tu criada / tus criadas
  - tu esclava / tus esclavas
  lexicon: HALOT
  rationale: El término refiere a una mujer en condición de servidumbre; en este contexto de respeto y auto-humillación, ‘sierva’ comunica la relación social con dignidad y es una opción española muy estable. Se conserva la distinción entre singular y plural como en el hebreo y en el audit trail inglés.
- source_word: וְאָנֹכִי לֹא אֶהְיֶה כְּאַחַת
  english_pob_choice: though I am not like one
  chosen_spanish: aunque yo no soy como una de
  alternatives_spanish:
  - y yo no seré como una de
  - aunque no llegaré a ser como una de
  lexicon: HALOT
  rationale: La cláusula es concesiva y contrasta la benevolencia de Booz con la condición de Rut. En español, ‘aunque yo no soy como una de’ expresa bien ese contraste y mantiene el sentido estativo sin forzar un futuro.
translation_notes:
  revision_awareness: Se siguió el sentido consolidado del audit trail inglés, incluyendo la revisión que mantiene ‘your female servant’ como ‘servant’ en la primera ocurrencia y deja la segunda como plural diferenciado. En español se preservó esa diferencia con ‘sierva’ / ‘siervas’ y se mantuvo la metáfora hebrea ‘hablar al corazón’.
  spanish_consistency_notes:
  - Se usa ‘sierva/siervas’ de manera consistente para traducir שִׁפְחָה/שִׁפְחוֹת, siguiendo la decisión lexical del proyecto.
  - ‘Mi señor’ se reserva aquí para un destinatario humano respetuoso; no implica el uso divino de Yahvé.
  - La puntuación mantiene el estilo de cita directa publicable en español, con dos puntos antes de la cita y comillas angulares.
  - Se conservó el matiz de petición cortés con el subjuntivo ‘Halle yo favor’, evitando una formulación demasiado interpretativa.
