revisions:
- from: Así David y sus hombres siguieron por el camino[a], mientras Simei iba por la ladera del monte, en dirección opuesta a él, iba y maldecía[b], y arrojaba piedras en dirección opuesta a él[c] y esparcía polvo.
  to: Así David y sus hombres siguieron por el camino[a], mientras Simei iba por la ladera del monte frente a él, iba y maldecía[b], y arrojaba piedras frente a él[c] y arrojaba polvo.
  rationale: Se reemplazó «en dirección opuesta a él» por «frente a él» en ambas ocurrencias para reflejar mejor לְעֻמָּתוֹ en español natural. Se mantuvo el movimiento repetido de הֹלֵךְ ... הָלוֹךְ con «iba y maldecía». Se ajustó «esparcía polvo» a «arrojaba polvo» para expresar con más claridad el gesto hostil. También se corrigió la nota c para que preserve la alternativa documentada del POB inglés de manera idiomática en español.
