  - Now
  - Then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction simply links this line to the preceding visionary sequence. 'And' preserves the connective, apocalyptic
    flow without adding temporal force not explicit in the witness.
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form points to separation/origin from a previously indicated location. 'From there' is clear modern English
    and keeps the deictic sense. Because the verse as transmitted here is fragmentary and ends without a predicate, an em
    dash is used to signal continuation rather than supplying missing material.
