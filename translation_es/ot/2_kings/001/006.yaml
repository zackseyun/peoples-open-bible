translation:
  language: es
  text: 'Y ellos le dijeron[a]: «Un hombre subió a encontrarnos y nos dijo: “Vayan, vuelvan al rey que los envió, y háblenle: ‘Así dice Yahvé: ¿Es porque no hay Dios en Israel que tú estás enviando a consultar a Baal-zebub, el dios de Ecrón? Por tanto, no bajarás de la cama[b] a la que subiste, porque ciertamente morirás’”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Es por falta de un Dios en Israel que estás enviando a consultar a Baal-zebub…?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del lecho». Lit. «de la cama a la que subiste allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un hombre
  - alguien
  lexicon: HALOT
  rationale: אִישׁ designa aquí a una persona varón no identificada; «un hombre» conserva la indefinición narrativa mejor que un nombre propio o una paráfrasis más vaga.
- source_word: עָלָה לִקְרָאתֵנוּ
  english_pob_choice: came up to meet us
  chosen_spanish: subió a encontrarnos
  alternatives_spanish:
  - vino a encontrarnos
  - subió para encontrarnos
  lexicon: HALOT
  rationale: El hebreo conserva la idea de «subir» y de movimiento hacia los hablantes; «subió a encontrarnos» mantiene ambos rasgos sin sonar forzado en español.
- source_word: לְכוּ שׁוּבוּ
  english_pob_choice: Go, return
  chosen_spanish: Vayan, vuelvan
  alternatives_spanish:
  - Vayan, regresen
  - Vayan, retornen
  lexicon: HALOT
  rationale: Se conservan los dos imperativos como en el hebreo. «Vuelvan» expresa con naturalidad el valor de שובו sin borrar la secuencia verbal.
- source_word: וְדִבַּרְתֶּם אֵלָיו
  english_pob_choice: and speak to him
  chosen_spanish: y díganle
  alternatives_spanish:
  - y háblenle
  - y hablen con él
  lexicon: HALOT
  rationale: En español, dentro del discurso directo, «díganle» reproduce de forma natural la introducción de la orden citada, aunque el hebreo usa un verbo más amplio que אמר. La frase siguiente mantiene explícita la cita profética.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el SEÑOR
  lexicon: HALOT
  rationale: Se conserva la fórmula profética clásica y el nombre divino «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: הֲמִבְּלִי אֵין אֱלֹהִים בְּיִשְׂרָאֵל
  english_pob_choice: Is it because there is no God in Israel
  chosen_spanish: ¿Es porque no hay Dios en Israel
  alternatives_spanish:
  - ¿Es por falta de Dios en Israel
  - ¿Acaso no hay Dios en Israel
  lexicon: HALOT
  rationale: El hebreo expresa una reprensión retórica. «¿Es porque no hay Dios en Israel...?» conserva esa fuerza y evita una traducción demasiado rígida o una paráfrasis excesiva.
- source_word: שֹׁלֵחַ לִדְרֹשׁ
  english_pob_choice: you are sending to inquire of
  chosen_spanish: estás enviando a consultar a
  alternatives_spanish:
  - envías a buscar a
  - estás enviando a preguntar por
  lexicon: HALOT
  rationale: דרש en este contexto es consultar una deidad/oráculo. «Consultar a» preserva ese sentido religioso mejor que «preguntar por», y suena natural en español bíblico contemporáneo.
- source_word: בַּעַל זְב֖וּב
  english_pob_choice: Baal-zebub
  chosen_spanish: Baal-zebub
  alternatives_spanish:
  - Baal Zebub
  lexicon: HALOT
  rationale: Se translitera el nombre propio de la deidad, como en el texto fuente y en la tradición crítica del proyecto.
- source_word: אֱלֹהֵי עֶקְרוֹן
  english_pob_choice: the god of Ekron
  chosen_spanish: dios de Ecrón
  alternatives_spanish:
  - el dios de Ecrón
  lexicon: HALOT
  rationale: La construcción genitiva identifica a Baal-zebub como la deidad asociada con Ecrón. «Dios de Ecrón» evita duplicar el artículo en una apposición ya clara por el contexto.
- source_word: הַמִּטָּה
  english_pob_choice: the bed
  chosen_spanish: la cama
  alternatives_spanish:
  - la cama
  - el lecho
  lexicon: HALOT
  rationale: מִטָּה puede significar cama o lecho. En un contexto de enfermedad y muerte, «la cama» resulta clara y natural en español, sin perder la imagen física.
- source_word: אֲשֶׁר עָלִיתָ שָּׁם
  english_pob_choice: to which you have gone up there
  chosen_spanish: a la que subiste allí
  alternatives_spanish:
  - sobre la que subiste allí
  - a la que has subido allí
  lexicon: HALOT
  rationale: Se conserva la referencia espacial del hebreo, incluida la partícula adverbial «allí». La redacción evita sobrerrelajar el vínculo con la cama/estrado y mantiene la imagen de ascenso.
- source_word: לֹא תֵרֵד מִמֶּנָּה
  english_pob_choice: you will not come down from it
  chosen_spanish: no bajarás de ella
  alternatives_spanish:
  - no descenderás de ella
  - no volverás a bajar de ella
  lexicon: HALOT
  rationale: 'ירד se expresa naturalmente con «bajar» en español. Se conserva el objeto pronominal femenino acorde con «la cama». '
- source_word: כִּי מוֹת תָּמוּת
  english_pob_choice: for you will surely die
  chosen_spanish: porque ciertamente morirás
  alternatives_spanish:
  - porque morirás sin falta
  - porque morirás de seguro
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la certeza. «Ciertamente morirás» comunica bien esa fuerza en español sin perder sobriedad.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio divino. Conforme al criterio del proyecto, se translitera como «Yahvé» para no ocultar el nombre con un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética y cita oracular
  english_pob_reading: Thus says Yahweh
  chosen_spanish_reading: Así dice Yahvé
  alternative_spanish_readings:
  - Así ha dicho Yahvé
  - Así dice el SEÑOR
  rationale: La fórmula transmite un oráculo directo. Mantener «Así dice Yahvé» conserva la cadencia profética y la continuidad con el nombre divino personal.
  doctrine_reference: Uso estándar de fórmulas proféticas en los profetas y narrativa histórica
- issue: Densidad del interrogante hebreo הֲמִבְּלִי אֵין
  english_pob_reading: Is it because there is no God in Israel
  chosen_spanish_reading: ¿Es porque no hay Dios en Israel?
  alternative_spanish_readings:
  - ¿Es por falta de Dios en Israel?
  - ¿Acaso no hay Dios en Israel?
  rationale: La pregunta tiene tono de reproche retórico. La elección mantiene la tensión entre forma interrogativa y sentido acusatorio sin suavizarla a una simple afirmación.
  doctrine_reference: Énfasis retórico del hebreo bíblico en discursos de juicio
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión aplicada al inglés sobre la suavización de la cláusula relativa con 'there'; en español se mantuvo la locución espacial «allí» para preservar el eco del hebreo, aunque con una sintaxis natural («a la que subiste allí»). También se respetó la lectura estable del nombre divino como «Yahvé» y la equivalencia óptima del imperativo doble.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto.
  - Se usa «Baal-zebub» como transliteración consistente del nombre propio.
  - Se eligió «consultar a» para דרש en sentido oracular, evitando «preguntar» que rebajaría el matiz religioso.
  - La discordancia de género de «ella» en el pronombre de «de ella» sigue al referente femenino «la cama».
  - El discurso directo conserva una estructura clara de citas anidadas sin sobrecargar comillas innecesarias.
