id: MIC.7.10
reference: Micah 7:10
source:
  edition: WLC
  text: וְ/תֵרֶ֤א אֹיַ֨בְתִּ/י֙ וּ/תְכַסֶּ֣/הָ בוּשָׁ֔ה הָ/אֹמְרָ֣ה אֵלַ֔/י אַיּ֖/וֹ יְהוָ֣ה אֱלֹהָ֑יִ/ךְ עֵינַ/י֙ תִּרְאֶ֣ינָּה בָּ֔/הּ עַתָּ֛ה תִּֽהְיֶ֥ה לְ/מִרְמָ֖ס כְּ/טִ֥יט חוּצֽוֹת׃
translation:
  text: Then my enemy will see[a], and shame will cover her—the one who said to me, “Where is Yahweh your God?” My eyes will look on her[b]; now she will be trampled down like mud in the streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My eyes will see her.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'she will be for trampling, like mire in the streets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתֵרֶא
  chosen: Then ... will see
  alternatives:
  - And ... will see
  lexicon: HALOT
  rationale: 'Qal imperfect 3fs of ראה with prefixed waw. In context it continues the sequence from the previous verse and is naturally rendered future: ''Then ... will see'' rather than a simple present. ''Then'' captures the discourse progression better than a bare ''and'' in English.'
- source_word: אֹיַבְתִּי
  chosen: my enemy
  alternatives:
  - my female enemy
  lexicon: HALOT
  rationale: The noun with 1cs suffix is grammatically feminine singular, matching subsequent feminine verbs and pronouns. English normally uses 'enemy' without marking gender; the feminine sense is preserved by later 'her' references.
- source_word: וּתְכַסֶּהָ בוּשָׁה
  chosen: and shame will cover her
  alternatives:
  - and disgrace will cover her
  - and she will be covered with shame
  lexicon: HALOT
  rationale: כסה with 3fs suffix plus בושה yields the idiom of shame enveloping someone. 'Shame will cover her' is both close to the Hebrew and idiomatic English.
- source_word: הָאֹמְרָה אֵלַי
  chosen: the one who said to me
  alternatives:
  - she who said to me
  - the woman saying to me
  lexicon: HALOT
  rationale: The feminine singular participial form with article functions substantivally, identifying the enemy by her taunt. 'The one who said to me' is natural English and preserves the identifying force.
- source_word: אַיּוֹ
  chosen: Where is
  alternatives:
  - Where then is
  lexicon: HALOT
  rationale: Interrogative particle with pronominal element forms the taunt 'Where is ...?' No added emphasis is required in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיִךְ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2fs suffix. 'Your God' preserves the direct taunt addressed to daughter Zion/Jerusalem in feminine form.
- source_word: עֵינַי תִּרְאֶינָּה בָּהּ
  chosen: My eyes will look on her
  alternatives:
  - My eyes will see her
  - I will gaze on her
  lexicon: HALOT
  rationale: The explicit subject 'my eyes' is retained for emphasis. English 'look on her' preserves the personal, almost vindicatory observation better than the flatter 'see her.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - then
  - at that time
  lexicon: HALOT
  rationale: The adverb marks the next stage/result. 'Now' is the most direct equivalent, signaling the imminent reversal.
- source_word: תִּהְיֶה לְמִרְמָס
  chosen: she will become something trampled
  alternatives:
  - she will be for trampling
  - she will become a trampling
  lexicon: HALOT
  rationale: לְמִרְמָס denotes an object/place of trampling. English requires some smoothing; 'become something trampled' communicates the result state without over-paraphrase.
- source_word: כְּטִיט חוּצוֹת
  chosen: like mud in the streets
  alternatives:
  - like mire of the streets
  - like street mud
  lexicon: HALOT
  rationale: טיט is mud/mire; חוצות are streets/open places. 'Like mud in the streets' is idiomatic and preserves the simile of contemptible trampling.
