translation:
  language: es
  text: 'Entonces el ángel de Yahvé subió de Gilgal a Boquim[a] y dijo: «Yo los saqué de Egipto y los traje a la tierra que juré a sus padres; y dije[b]: “Nunca romperé mi pacto con ustedes”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Boquim probablemente significa «los que lloran» o se refiere a un lugar de llanto.
    reason: cultural_note
  - marker: b
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar 'mensajero' o 'ángel'. En este contexto narrativo, y siguiendo la decisión auditada del POB inglés, 'ángel' conserva la lectura convencional sin resolver interpretativamente si se trata de un mensajero creado o de una manifestación divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el Nombre divino como 'Yahvé', preservando el nombre personal de Dios en vez de sustituirlo por un título.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue de subida
  - ascendió
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. 'Subió' es natural en español y conserva el matiz topográfico sin volverse rígido.
- source_word: הַגִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estable.
- source_word: הַבֹּכִים
  english_pob_choice: Bochim
  chosen_spanish: Boquim
  alternatives_spanish:
  - Bochim
  - los que lloran
  - lugar de llanto
  lexicon: HALOT
  rationale: Se adopta la transliteración española más natural 'Boquim', manteniendo el nombre del lugar. El sentido del nombre se preserva mejor en nota que en el cuerpo del texto.
- source_word: אַעֲלֶה אֶתְכֶם מִמִּצְרַיִם
  english_pob_choice: I brought you up from Egypt
  chosen_spanish: Yo los saqué de Egipto
  alternatives_spanish:
  - Yo los subiré de Egipto
  - Yo los hice subir de Egipto
  lexicon: HALOT
  rationale: El hebreo recuerda una acción pasada de liberación. En español, 'saqué de Egipto' expresa con naturalidad la salida redentora y evita una construcción menos idiomática, sin perder el sentido de rescate histórico.
- source_word: וָאָבִיא אֶתְכֶם אֶל הָאָרֶץ
  english_pob_choice: and brought you into the land
  chosen_spanish: y los traje a la tierra
  alternatives_spanish:
  - y los introduje en la tierra
  - y los llevé a la tierra
  lexicon: HALOT
  rationale: בוא en causativo puede ser 'traer' o 'hacer entrar'. 'Traje a la tierra' es claro y mantiene el paralelo con la liberación de Egipto.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  lexicon: HALOT
  rationale: '''La tierra'' preserva la resonancia pactal de la tierra prometida mejor que ''el país''.'
- source_word: נִשְׁבַּעְתִּי לַאֲבֹתֵיכֶם
  english_pob_choice: that I swore to your fathers
  chosen_spanish: que juré a sus padres
  alternatives_spanish:
  - que juré a sus antepasados
  - que prometí a sus padres
  lexicon: HALOT
  rationale: Se conserva 'padres' para respetar el paralelismo masculino plural del hebreo y el contexto patriarcal del pacto.
- source_word: וָאֹמַר
  english_pob_choice: and I said
  chosen_spanish: y dije
  alternatives_spanish:
  - y les dije
  lexicon: HALOT
  rationale: La secuencia verbal continúa el recuento divino en estilo directo; 'y dije' es la forma más directa y fiel en español.
- source_word: לֹא אָפֵר בְּרִיתִי אִתְּכֶם לְעוֹלָם
  english_pob_choice: I will never break my covenant with you
  chosen_spanish: Nunca romperé mi pacto con ustedes
  alternatives_spanish:
  - No romperé mi pacto con ustedes jamás
  - Nunca anularé mi pacto con ustedes
  lexicon: HALOT
  rationale: הפר en contexto de pacto significa quebrantar/romper/anular. 'Romper mi pacto' es idiomático en español y conserva la fuerza jurídica del hebreo; 'nunca' recoge לְעוֹלָם como negación de duración sin sonar forzado.
theological_decisions:
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: Rendered as 'the angel of Yahweh' without specifying whether this is a created angel or a theophanic manifestation.
  chosen_spanish_reading: Se mantiene 'el ángel de Yahvé' sin definir si es un ángel creado o una manifestación divina.
  alternative_spanish_readings:
  - el mensajero de Yahvé
  - el ángel de Yahvé, es decir, una manifestación de Yahvé
  rationale: El versículo usa primera persona divina en el discurso del mensajero, generando una tensión teológica que el POB inglés preserva. La traducción española evita resolverla por interpretación y deja abierta la misma tensión.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla interpretativamente.
translation_notes:
  revision_awareness: Se siguió el texto fuente hebreo junto con el audit trail inglés. No se identificaron revisiones posteriores que requirieran ajuste; la lectura final coincide con el pasaje auditado de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del Nombre divino.
  - Se usa 'pacto' para בְּרִית, en coherencia con el POB inglés 'covenant'.
  - Se conserva la tensión de מַלְאַךְ יְהוָה sin explicación doctrinal añadida en el texto principal.
  - La secuencia verbal se presentó en pasado narrativo natural en español, acorde con el discurso retrospectivo del hebreo.
