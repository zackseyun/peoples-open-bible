translation:
  language: es
  text: 'Así es el hombre que engaña a su prójimo[a] y dice[b]: «¿No estoy solo bromeando?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su amigo» o «su compañero». El hebreo רֵעַ puede referirse a un vecino, amigo o asociado, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «¿No estoy jugando?» / «¿No estoy chanceando?». El participio hebreo puede denotar jugar o bromear; aquí funciona como una excusa despectiva para minimizar un engaño dañino.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So is
  chosen_spanish: Así es
  alternatives_spanish:
  - De este modo es
  - Así mismo es
  lexicon: HALOT
  rationale: Introduce la comparación proverbial de forma natural en español y conserva el valor analógico del hebreo sin volverla explicativa.
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - la persona
  lexicon: HALOT
  rationale: Mantiene el singular representativo típico de la sabiduría bíblica y la correspondencia con el inglés auditado.
- source_word: רִמָּה
  english_pob_choice: deceives
  chosen_spanish: engaña
  alternatives_spanish:
  - trampea
  - defrauda
  - miente a
  lexicon: HALOT
  rationale: '"Engaña" comunica con precisión la acción moralmente negativa de inducir a error o actuar con fraude, sin sobreespecificar.'
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su amigo
  - su compañero
  lexicon: HALOT
  rationale: '"Prójimo" es una opción natural en español bíblico para רֵעַ y conserva el alcance relacional amplio que el inglés POB explicó como "neighbor".'
- source_word: וְאָמַר
  english_pob_choice: and says
  chosen_spanish: y dice
  alternatives_spanish:
  - y dice entonces
  - y dijo
  lexicon: HALOT
  rationale: El presente discursivo funciona bien en el proverbio y mantiene el valor proverbial de una conducta típica.
- source_word: הֲלֹא
  english_pob_choice: Am I not
  chosen_spanish: ¿No estoy
  alternatives_spanish:
  - ¿Acaso no estoy
  - ¿No es que estoy
  lexicon: HALOT
  rationale: La partícula interrogativa-retórica se expresa de manera natural en español con "¿No estoy...?",
- source_word: מְשַׂחֵק
  english_pob_choice: only joking
  chosen_spanish: bromeando
  alternatives_spanish:
  - jugando
  - jestando
  - haciendo una broma
  lexicon: HALOT
  rationale: En este contexto el hablante minimiza un engaño dañino como broma. "Bromeando" transmite bien la excusa despectiva sin cargar el verso con un adverbio añadido que no está explícito en español.
- source_word: אָֽנִי
  english_pob_choice: I
  chosen_spanish: estoy
  alternatives_spanish:
  - soy
  - ando
  lexicon: HALOT
  rationale: Se integra en la perífrasis verbal natural "estoy bromeando" para expresar el participio de estado/acción de manera fluida en español.
translation_notes:
  revision_awareness: Se corrigió el fallo de validación anterior eliminando notas al pie no ancladas. La traducción se ajustó para que el texto español sea autosuficiente y publicable sin marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantiene el registro proverbial y sobrio.
  - '"Prójimo" se usa como equivalente contextual de רֵעַ sin forzar una relación de amistad íntima.'
  - No se introdujo nota textual porque el pasaje no requiere variantes para la forma española elegida.
