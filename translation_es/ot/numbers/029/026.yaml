translation:
  language: es
  text: 'El quinto día: nueve toros[a], dos carneros y catorce corderos machos de un año de edad, sin defecto,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y el quinto día». El hebreo incluye una conjunción al comienzo del versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: On the fifth day
  chosen_spanish: En el quinto día
  alternatives_spanish:
  - Y en el quinto día
  lexicon: HALOT
  rationale: El hebreo lleva una conjunción prefijada además de la preposición 'en/para'. En español, la secuencia cultual queda natural como 'En el quinto día'; la coordinación queda implícita por el contexto de la lista, sin necesidad de forzar 'Y' en el cuerpo principal.
- source_word: הַ/חֲמִישִׁי
  english_pob_choice: fifth
  chosen_spanish: quinto
  alternatives_spanish:
  - quinto
  lexicon: HALOT
  rationale: Es un adjetivo ordinal directo que modifica 'día'; 'quinto' es la equivalencia normal y clara en español.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: En contexto sacrificial, פָּרִים designa ganado macho adulto ofrecido en sacrificio. 'Toros' conserva la fuerza léxica y la referencia animal sin añadir una precisión de edad que el hebreo de este versículo no exige.
- source_word: תִּשְׁעָה
  english_pob_choice: nine
  chosen_spanish: nueve
  alternatives_spanish:
  - nueve
  lexicon: HALOT
  rationale: Número cardinal simple que modifica 'toros'.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - borregos
  lexicon: HALOT
  rationale: '''Carneros'' comunica bien el animal macho adulto usado en sacrificio y mantiene el registro bíblico sin sonar arcaico.'
- source_word: שְׁנָיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: Cardinal directo que modifica 'carneros'.
- source_word: כְּבָשִׂים
  english_pob_choice: male lambs
  chosen_spanish: corderos machos
  alternatives_spanish:
  - corderos
  - corderos varones
  lexicon: HALOT
  rationale: El inglés POB explicita el rasgo masculino por la fuerza cultual del sustantivo. En español, 'corderos machos' conserva esa explicitación de manera natural; 'corderos' por sí solo sería más genérico.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - año tras año
  lexicon: HALOT
  rationale: La expresión hebrea idiomática indica animales en su primer año. 'De un año' es la forma más natural y fiel en español, equivalente a 'a year old'.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - catorce
  lexicon: HALOT
  rationale: Número cardinal compuesto que modifica 'corderos machos'.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - sin tacha
  lexicon: HALOT
  rationale: En contexto sacrificial, תמים señala animales sin defecto físico. 'Sin defecto' preserva el sentido cultual de manera clara y evita cargar el término con connotaciones morales ajenas al pasaje.
translation_notes:
  revision_awareness: 'Coincide con el testimonio hebreo de WLC y con la línea de traducción inglesa auditada: lista sacrificial breve, con la conjunción inicial reflejada como alternativa y el lenguaje cultual mantenido sin suavizarse.'
  spanish_consistency_notes:
  - Se mantuvo el orden enumerativo del hebreo para preservar el ritmo ritual.
  - '''Sin defecto'' se usó como equivalente cultual estándar de תמים, en paralelo con la decisión inglesa ''without blemish''.'
  - '''Corderos machos'' reproduce la explicitación de sexo que el audit trail inglés consideró necesaria para el contexto sacrificial.'
