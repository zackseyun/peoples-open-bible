  yaml_path: translation/ot/1_chronicles/029/006.yaml
  text: Then the leaders of the fathers’ houses[a], and the leaders of the tribes of Israel, and the commanders of the thousands and of the hundreds, and the overseers of the king’s work[c][b], gave willingly.
  footnotes:
  - marker: a
    text: Or “offered willingly” or “volunteered.” The Hebrew verb emphasizes a freewill response; in this context it likely refers to voluntary giving.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the fathers’ houses,” referring to ancestral or clan-based family divisions.
    reason: cultural_note
  - marker: c
    text: “The thousands and the hundreds” refers to military or administrative units, and thus to their commanders.
    reason: cultural_note
