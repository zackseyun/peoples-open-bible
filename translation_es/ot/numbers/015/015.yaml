    text: O «la congregación». קָהָל apunta al pueblo reunido; «asamblea» conserva ese valor comunitario y jurídico.
    reason: lexical_alternative
  - marker: b
    text: O «una ordenanza permanente» o «un estatuto perpetuo». עוֹלָם en fórmulas legales indica vigencia duradera a través de las generaciones.
    reason: lexical_alternative
  revision_rationale: Se ajusta γֵּר a «residente extranjero» para reflejar mejor el matiz de extranjero asentado entre Israel en un contexto legal-cúltico. Se corrige la nota b para que ofrezca alternativas reales y completas. El resto del versículo se conserva casi intacto porque ya transmite bien la paridad normativa delante de Yahvé.
