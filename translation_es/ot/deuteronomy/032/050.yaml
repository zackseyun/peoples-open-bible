revisions:
- from: y muere en el monte al que subes, y sé reunido a tu pueblo, así como Aarón tu hermano murió en el monte Hor y fue reunido a su pueblo.
  to: y muere en el monte que estás subiendo, y sé reunido[a] a tu pueblo, así como Aarón tu hermano murió en el monte Hor y fue reunido a su pueblo.
  rationale: Se añade la nota alternativa ya sustentada en la auditoría inglesa para preservar la evidencia léxica y la tensión teológica del modismo hebreo. Además, se suaviza 'al que subes' a 'que estás subiendo' para una lectura más natural en español sin apartarse del sentido de עלה. No se requieren cambios doctrinales ni una adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:38:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: imperativo/volitivo (''muere''), locativo (''en el monte''), comparación con Aarón, y preserva el modismo אסף אל־עמיו con formulación no explicativa. Sin embargo, omite la alternativa léxica preservada en la auditoría inglesa para ''tu pueblo'' / ''sus antepasados'', y ''al que subes'' suena un poco menos natural y preciso que una formulación relativa simple en español.'
  spanish_quality_summary: 'El texto es claro y legible, con tono bíblico digno. La principal mejora es estilística y de documentación: ''en el monte que estás subiendo'' o ''en el monte al que estás subiendo'' suena más natural que ''al que subes'' en este contexto solemne, y conviene añadir una nota para la alternativa ''antepasados'' ya documentada por POB. También es preferible mantener consistencia con el matiz pasivo del hebreo en ''sé reunido''.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. El tratamiento de הַר como 'monte' y de אסף como 'ser reunido' está alineado con la filosofía del proyecto. Debe conservarse el idiomático 'a tu pueblo' en el texto principal, con nota alternativa 'a tus antepasados' para reflejar la decisión léxica inglesa.
  issues:
  - severity: medium
    issue: Falta la nota alternativa para el modismo 'ser reunido a tu pueblo'
    rationale: 'La auditoría inglesa incluye una nota léxica importante: ''Or "be gathered to your ancestors." The Hebrew idiom literally says "be gathered to your people."'' El español debería conservar esa alternativa en nota para no perder evidencia documentada y para ayudar a lectores que podrían entender ''pueblo'' de forma demasiado sociológica o contemporánea.'
  - severity: low
    issue: '''al que subes'' es menos natural en español bíblico actual'
    rationale: Aunque no es incorrecto, 'en el monte que estás subiendo' o 'al que estás subiendo' expresa mejor la acción progresiva de עלה y suena más fluido en este registro. La revisión es de estilo y precisión, no de sentido.
  revised_spanish_text: y muere en el monte que estás subiendo, y sé reunido[a] a tu pueblo, así como Aarón tu hermano murió en el monte Hor y fue reunido a su pueblo.
  revised_footnotes:
  - marker: a
    text: O 'sé reunido a tus antepasados'. El modismo hebreo dice literalmente 'sé reunido a tu pueblo'.
    reason: lexical_alternative
  revision_rationale: Se añade la nota alternativa ya sustentada en la auditoría inglesa para preservar la evidencia léxica y la tensión teológica del modismo hebreo. Además, se suaviza 'al que subes' a 'que estás subiendo' para una lectura más natural en español sin apartarse del sentido de עלה. No se requieren cambios doctrinales ni una adjudicación adicional.
