    text: 'O: «la región hamatita» o «la región de Hamat». La expresión griega se refiere al territorio de Hamat.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no les dio respiro». Aquí ἀνοχή puede sugerir demora, tolerancia o margen de acción, no necesariamente una tregua formal.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la trazabilidad de las notas para que [a] corresponda al lugar («tierra de Hamat») y [b] a ἀνοχή («oportunidad/respiro»), en línea con el audit trail inglés. También se regularizó el topónimo como «Hamat» y se ajustó ἀπήντησεν a «les salió al encuentro», una formulación más fiel y natural en español.
