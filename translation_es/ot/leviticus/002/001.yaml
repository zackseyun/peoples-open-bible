- from: Cuando una persona presente una ofrenda de cereal[a] a Yahvé, su ofrenda será de flor de harina[b]; y derramará sobre ella aceite y pondrá sobre ella incienso.
  to: Cuando una persona presente una ofrenda de cereal[a] a Yahvé, su ofrenda será de flor de harina[b], y derramará sobre ella aceite y pondrá sobre ella franquincienso.
  rationale: Se corrige «incienso» a «franquincienso» para reflejar con precisión לְבֹנָה / frankincense según la evidencia fuente y la auditoría inglesa. También se ajusta la nota alternativa de מִנְחָה para evitar la ambigüedad de «vegetal» y se aligera la puntuación para mayor naturalidad en español.
