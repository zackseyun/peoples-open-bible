  source_alignment_summary: 'El borrador sigue bien la estructura casuística y la mayoría de las decisiones léxicas del hebreo y del audit trail inglés: ''Si'', ''encuentra'', ''una joven, virgen'', ''no desposada'', ''se acuesta con ella'' y ''son descubiertos'' reflejan adecuadamente el texto fuente. Sin embargo, en וּתְפָשָׂהּ el español principal se aparta del equilibrio documentado al añadir ''por la fuerza'', lo cual intensifica e interpreta más allá de ''seizes her / takes hold of her / grasps her''. El audit trail inglés quiso preservar la fuerza física sin resolver del todo la cuestión legal; ''la toma por la fuerza'' se acerca demasiado a una conclusión interpretativa que debía quedar en nota.'
  spanish_quality_summary: 'El español es claro y legible, con registro bíblico moderno adecuado. La frase fluye bien. No obstante, la nota [a] está mal anclada semánticamente: dice ''O "no desposada"'' cuando la alternativa inglesa corresponde a ''who is not betrothed'', de modo que en español la nota debe ofrecer ''O "no prometida en matrimonio"'' o similar, anclada en ''no desposada''. Además, conviene evitar ''toma por la fuerza'' por precisión y fidelidad al proyecto.'
  glossary_alignment: 'No hay conflicto con la terminología global principal del proyecto. La decisión problemática es local: תפשׂ debe conservar una formulación como ''la agarra'' o ''se apodera de ella'' antes que ''la toma por la fuerza'', para no fijar una interpretación legal en el texto principal. ''Desposada'' es aceptable como término más jurídico-bíblico, con alternativa explicativa en nota.'
