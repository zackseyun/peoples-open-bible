revisions:
- from: No desprecies el dicho de los sabios, y revuélvete en sus proverbios; porque de ellos aprenderás instrucción y cómo servir a los grandes.[a]
  to: No avergüences a un anciano[a]; recuerda que tú también serás contado entre los ancianos.
  rationale: Se restituye el hebreo como texto principal, conforme al expediente y al POB inglés. «No avergüences» refleja mejor אַל תְּבַיֵּשׁ que «No desprecies». «Un anciano» conserva la referencia singular concreta de modo natural en español. «Serás contado entre los ancianos» preserva la voz pasiva y el sentido de incorporarse al grupo de los mayores. La lectura griega divergente se mantiene en nota con un español más natural que el borrador.
  reviewer_model: gpt-5.4
