translation:
  language: es
  text: Pero la antigua ordenanza del tiempo[a], que alterna bellamente entre la noche y el día por obra del que concede el sueño a todos, a quienes él mismo quiere, envió una porción de sueño sobre el rey[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘la creación del tiempo desde antiguo’; la frase griega es poética y compacta, y describe el orden creado y duradero del tiempo expresado en noche y día.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘envió una porción de sueño al rey’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ δὲ ἀπʼ αἰῶνος κτίσμα χρόνου
  english_pob_choice: the age-old ordinance of time
  chosen_spanish: la ordenanza antigua de tiempo
  alternatives_spanish:
  - la creación antigua de tiempo
  - la disposición antigua del tiempo
  - la ordenanza de los tiempos
  lexicon: LSJ
  rationale: κτίσμα admite la idea de algo creado o establecido; en este contexto poético, la revisión inglesa prefirió ‘ordinance of time’. En español, ‘ordenanza’ conserva la noción de un orden establecido sin forzar una imagen demasiado literal de ‘creación’ ni volverlo abstracto en exceso.
- source_word: ἀπʼ αἰῶνος
  english_pob_choice: age-old
  chosen_spanish: antigua
  alternatives_spanish:
  - de antiguo
  - ancestral
  - de largo tiempo
  lexicon: LSJ
  rationale: La frase expresa antigüedad o duración prolongada. ‘Antigua’ comunica bien esa idea en español y evita intensificarla indebidamente como ‘desde la eternidad’.
- source_word: καλὸν
  english_pob_choice: beautifully
  chosen_spanish: bellamente
  alternatives_spanish:
  - hermosamente
  - bien
  - de manera hermosa
  lexicon: LSJ
  rationale: El griego puede ser ‘bello’, ‘bueno’ o ‘apropiado’. Dado el ritmo poético de noche y día, ‘bellamente’ conserva el valor estético que la traducción inglesa auditada también privilegió.
- source_word: ἐν νυκτὶ καὶ ἡμέρᾳ ἐπιβαλλόμενον
  english_pob_choice: alternating in night and day
  chosen_spanish: alternada en noche y día
  alternatives_spanish:
  - alternando en noche y día
  - que alterna en noche y día
  - desplegándose en noche y día
  lexicon: LSJ
  rationale: ἐπιβαλλόμενον sugiere algo que se va imponiendo o superponiendo cíclicamente. En español, ‘alternada en noche y día’ reproduce la sucesión rítmica con naturalidad y mantiene el matiz del ciclo.
- source_word: ὑπὸ τοῦ χαριζομένου πᾶσιν
  english_pob_choice: by the One who grants sleep to all
  chosen_spanish: por el que concede el sueño a todos
  alternatives_spanish:
  - por el que da sueño a todos
  - por el que otorga sueño a todos
  - por el que concede a todos
  lexicon: LSJ
  rationale: χάριζομαι implica conceder o dar con benevolencia. El objeto ‘sueño’ se explicita en el contexto, como hace la traducción inglesa, para que la relación con ὕπνον sea clara y fluida en español.
- source_word: οἷς ἂν αὐτὸς θελήσῃ
  english_pob_choice: to whomever he himself wills
  chosen_spanish: a quienes él mismo quiere
  alternatives_spanish:
  - a quienes él mismo desee
  - a quienes quiera
  - a quien él mismo quiera
  lexicon: LSJ
  rationale: La construcción expresa decisión soberana. ‘Él mismo’ conserva el énfasis de αὐτός; ‘quiere’ es idiomático en español y mantiene el sentido de voluntad personal.
- source_word: ὕπνον μέρος
  english_pob_choice: a portion of sleep
  chosen_spanish: una parte de sueño
  alternatives_spanish:
  - un porción de sueño
  - un poco de sueño
  - una medida de sueño
  lexicon: LSJ
  rationale: μέρος es ‘parte’ o ‘porción’. ‘Una parte de sueño’ mantiene la concreción del griego y suena más natural que un calco más duro en español.
- source_word: ἀπέστειλεν εἰς τὸν βασιλέα
  english_pob_choice: sent ... upon the king
  chosen_spanish: envió ... sobre el rey
  alternatives_spanish:
  - envió ... al rey
  - trajo ... sobre el rey
  - lo envió al rey
  lexicon: LSJ
  rationale: Con sueño como objeto, ‘sobre el rey’ preserva la imagen de algo que cae o se posa sobre él, cercana al inglés auditado y más expresiva que el simple dativo ‘al rey’.
theological_decisions:
- issue: Referencia implícita a Dios en τοῦ χαριζομένου πᾶσιν
  english_pob_reading: from the One who grants sleep to all
  chosen_spanish_reading: por el que concede el sueño a todos
  alternative_spanish_readings:
  - por él que da sueño a todos
  - por el que concede a todos
  rationale: El participio refiere contextualmente a Dios como dador del sueño. El español lo hace explícito con una forma reverente pero no añadida, evitando imponer un título que no está en el texto griego.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Fuerza de ἀπʼ αἰῶνος
  english_pob_reading: age-old
  chosen_spanish_reading: antigua
  alternative_spanish_readings:
  - de antiguo
  - desde antiguo
  - eterna
  rationale: Se preserva la antigüedad sin convertir la expresión en una afirmación metafísica más fuerte, como ‘eterno’ o ‘desde la eternidad’.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió ‘ordinance of time’ y ‘alternating in night and day’. La versión española sigue esa línea, pero ajusta el ritmo y la sintaxis para que el texto sea natural en español sin perder la imaginería del ciclo noche-día ni la concreción de ‘parte de sueño’.
  spanish_consistency_notes:
  - Se conservó ‘sueño’ como objeto explícito, siguiendo el audit trail inglés y la economía del griego.
  - Se evitó ‘SEÑOR’ o un título añadido para el dador del sueño; se mantiene una referencia reverente y contextual.
  - ‘Rey’ se traduce de forma directa sin añadir interpretación política o ceremonial.
  - La puntuación y el orden buscan una cadencia elevada, apta para lectura pública, sin arcaísmos innecesarios.
