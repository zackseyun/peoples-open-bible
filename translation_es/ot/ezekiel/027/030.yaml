translation:
  language: es
  text: Harán oír su voz sobre ti[a] y clamarán amargamente; echarán polvo sobre sus cabezas, y se revolcarán en cenizas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alzarán su voz sobre ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se revolcarán en ceniza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁמִיעוּ
  english_pob_choice: make their voice heard
  chosen_spanish: harán oír
  alternatives_spanish:
  - harán escuchar
  - harán sentir su voz
  - alzarán su voz
  lexicon: HALOT
  rationale: 'El hiphil de שׁמע tiene valor causativo: hacer oír. En español, «harán oír» conserva esa causalidad de forma natural y evita un calco pesado.'
- source_word: עָלַיִךְ
  english_pob_choice: over you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - acerca de ti
  - sobre vosotros
  lexicon: HALOT
  rationale: El contexto es un lamento fúnebre sobre Tiro; «sobre ti» reproduce la orientación del llanto dirigido hacia su caída, sin convertirlo en una acusación hostil.
- source_word: בְּקוֹלָם
  english_pob_choice: their voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - sus voces
  - su clamor
  lexicon: HALOT
  rationale: 'Aunque el hebreo lleva un singular con sufijo plural, en español la fórmula natural es singular colectivo: «su voz», manteniendo el sentido de voz pública y unida.'
- source_word: וְיִזְעֲקוּ
  english_pob_choice: cry out
  chosen_spanish: clamarán
  alternatives_spanish:
  - gritarán
  - vociferarán
  - proferirán un grito
  lexicon: HALOT
  rationale: זעק expresa un grito fuerte de angustia. «Clamarán» es solemne y adecuado para el registro de duelo profético.
- source_word: מָרָה
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - con amargura
  - en amargura
  - amargo
  lexicon: HALOT
  rationale: La forma adverbial describe la intensidad del lamento. «Amargamente» es el equivalente español más idiomático y fiel.
- source_word: וְיַעֲלוּ עָפָר
  english_pob_choice: they will throw dust
  chosen_spanish: echarán polvo
  alternatives_spanish:
  - arrojarán polvo
  - alzarán polvo
  - echarán tierra
  lexicon: HALOT
  rationale: עלה con עפר en este gesto de duelo no significa simplemente «subir» sino arrojar polvo sobre la cabeza. «Echarán polvo» comunica el acto ritual sin exagerar la imagen.
- source_word: עַל רָאשֵׁיהֶם
  english_pob_choice: on their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - encima de sus cabezas
  - sobre la cabeza de ellos
  lexicon: HALOT
  rationale: Es la formulación española más directa para el gesto de luto descrito en el verso.
- source_word: בָּאֵפֶר
  english_pob_choice: in ashes
  chosen_spanish: en ceniza
  alternatives_spanish:
  - en las cenizas
  - con ceniza
  - en el polvo y la ceniza
  lexicon: HALOT
  rationale: אפר puede referirse a ceniza/cenizas; «en ceniza» mantiene la imagen de duelo y funciona bien en español bíblico moderno.
- source_word: יִתְפַּלָּשׁוּ
  english_pob_choice: they will roll
  chosen_spanish: se revolcarán
  alternatives_spanish:
  - se rodarán
  - se abatirán
  - se retorcerán
  lexicon: HALOT
  rationale: El hitpael de פלשׁ expresa moverse o revolverse en la ceniza como señal de luto. «Se revolcarán» preserva la intensidad visual del acto.
translation_notes:
  revision_awareness: El texto inglés POB revisó «raise their voice» a «make their voice heard» para reflejar mejor el causativo de הִשְׁמִיעוּ. La redacción española «harán oír» sigue esa revisión y mantiene la misma decisión lexical. También se conserva el paralelismo de lamento con dos notas alternativas donde el hebreo admite matices de traducción.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene el tono profético de duelo con verbos en futuro simple, en concordancia con el hebreo.
  - «Ceniza» se emplea como equivalente de אפר en este contexto de lamento ritual; no se introduce vocabulario eclesiástico ajeno al pasaje.
