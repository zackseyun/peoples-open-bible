  rationale: Se corrige la fórmula exhortativa para reflejar fiel y naturalmente חֲזַק וֶאֱמָץ como 'Sé fuerte y valiente'. También se añade la nota léxica sobre la distinción entre los dos términos legales, siguiendo la auditoría inglesa y manteniendo transparencia terminológica.
