review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del rastro de auditoría inglés: recapacitar para וְהֵשִׁיבוּ אֶל־לִבָּם, arrepentirse para וְשָׁבוּ, suplicar para וְהִתְחַנְּנוּ, y la tríada confesional se conserva. Sin embargo, hay dos desajustes notables: la nota [c] no aporta una alternativa real porque repite exactamente el texto principal, y «cautivadores» para שֹׁבֵיהֶם suena poco natural en español bíblico actual y es menos claro que «captores» o la forma explícita «los que los llevaron cautivos».'
  spanish_quality_summary: El español es en general claro y digno, pero «cautivadores» resulta forzado y poco idiomático en este contexto; además, «malvadamente» suena pesado en una tríada solemne donde «impíamente» o «con maldad» leerían mejor, aunque no es un error grave. La estructura global es legible y fiel.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión de «se arrepienten» concuerda con la revisión inglesa documentada. Se debe mejorar la elección contextual de שֹׁבֵיהֶם a un español más natural.
  issues:
  - severity: medium
    issue: La nota [c] repite el texto principal en vez de dar una alternativa real.
    rationale: El texto principal dice «en la tierra de sus cautivadores[c]» y la nota [c] dice exactamente «O ‘en la tierra de sus cautivadores’». Esto invalida la función auditiva de la nota y no preserva correctamente la alternativa inglesa ‘in the land of their captors’ frente a la forma más explícita del texto principal.
  - severity: medium
    issue: «Sus cautivadores» es poco natural para שֹׁבֵיהֶם en español.
    rationale: Aunque semánticamente posible, «cautivadores» no es la opción más clara ni más eclesialmente legible. «Sus captores» es más natural, y permite además conservar en nota la opción explícita «los que los llevaron cautivos», que refleja bien el participio hebreo.
  - severity: low
    issue: «Hemos actuado malvadamente» suena algo pesado y menos idiomático.
    rationale: No falsea el sentido de רָשָׁעְנוּ, pero en español solemne «hemos actuado con maldad» fluye mejor y conserva la fuerza moral sin sonar calcado.
