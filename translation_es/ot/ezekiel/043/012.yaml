review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido básico del hebreo: preserva la repetición de «Esta… esta», mantiene «la ley de la casa», comunica adecuadamente «en la cima del monte» y refleja bien קֹדֶשׁ קָדָשִׁים con «santísimo». También conserva la alternativa léxica sobre גְּבוּל. Sin embargo, el tratamiento de הִנֵּה como «Mira» rebaja el registro solemne del marcador discursivo, y además la nota al pie está anclada en la palabra equivocada.'
  spanish_quality_summary: El español es claro y legible, pero «Mira» suena demasiado coloquial para el tono de Ezequiel y para la función enfática-resuntiva de הִנֵּה. «He aquí» encaja mejor con un registro moderno-digno y con la fuerza demostrativa del original. También conviene mover la nota al pie para que ancle donde realmente corresponde la alternativa «límite/borde» frente a «territorio».
  glossary_alignment: 'No hay conflicto con los términos globales del proyecto. «La ley de la casa» y «santísimo» están bien alineados con las decisiones auditadas. La única desviación relevante es discursiva/estilística: הִנֵּה debe representarse con más solemnidad que «Mira».'
  issues:
  - severity: medium
    issue: «Mira» para הִנֵּה
    rationale: Aunque comunica atención, «Mira» es demasiado coloquial y menos solemne que el hebreo y la auditoría inglesa («Behold»). «He aquí» preserva mejor el tono profético y la función resumitiva.
  - severity: medium
    issue: Nota al pie anclada en «Mira[a]» en vez de la frase territorial
    rationale: La nota explica la alternativa léxica de כָּל גְּבֻלוֹ סָבִיב סָבִיב («territorio/límite»), no una variante de הִנֵּה. El marcador debe aparecer junto a «territorio alrededor» o expresión equivalente.
  revised_spanish_text: 'Esta es la ley de la casa: en la cima del monte, todo su territorio alrededor[a] es santísimo. He aquí, esta es la ley de la casa.'
  revised_footnotes:
  - marker: a
    text: O, «todo su límite alrededor es santísimo».
    reason: lexical_alternative
