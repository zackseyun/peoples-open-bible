id: T12P.LEV.07
reference: Testament of Levi 7
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: VII. Καὶ εἶπον¹ Γἐγὼ²⁾ τῷ πατρί μου³, Ἰακώβ⁴, ὅτι ἐν σοὶ ἐξουδενώσει⁵ Κύριος⁶ τοὺς Χαναναίους⁷ καὶ δώσει⁸ τὴν γῆν αὐτῶν σοι καὶ τῷ σπέρματί σου μετὰ σε. 2. Ἔσται γὰρ ἀπὸ τῆς⁹ σήμερον *ἡ Σύκημα¹⁰ λεγομένη πόλις ἀσυνέτων¹¹, ὅτι¹² ὡσεί¹³ τις *χλευάσει μωρὸν¹⁴ οὕτως ἐχλευάσαμεν αὐτούς¹⁵. 3. Ὅτι καίγε¹⁶ ἀφροσύνην ἔπραξαν ἐν Ἰσραὴλ μιάναντες¹⁷ τὴν ἀδελφήν μου¹⁸. 4. *Ἀπάραντες δὲ¹⁹ *ἤλθομεν εἰς²⁰ Δίναν Βεθήλ²¹.
  language: Greek
  source_pages:
  - 108
  - 109
translation:
  text: And I said to my father Jacob[a], “In you the Lord will bring the Canaanites to nothing, and he will give their land to you and to your seed after you. For from this day the city called Sychem shall be a city of fools. For just as one mocks a fool, so we mocked them, because they indeed committed folly in Israel by defiling my sister. Then, after taking her up[b], we came to Bethel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sychem is the Greek form of the place more commonly known in English as Shechem.
    reason: lexical_alternative
  - marker: b
    text: Or 'after taking her away'; the participle likely refers to removing Dinah before going on to Bethel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουδενώσει
  chosen: will bring ... to nothing
  alternatives:
  - will despise
  - will make of no account
  - will utterly humble
  lexicon: LSJ
  rationale: The verb conveys reducing to nothing or treating as of no account. In this conquest context, 'will bring ... to nothing' preserves the force of decisive humiliation without over-paraphrasing.
- source_word: σπέρματι
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: LSJ
  rationale: '''Seed'' preserves covenantal and patriarchal diction appropriate to Jacobic promise language, while remaining intelligible in context.'
- source_word: ἀσυνέτων
  chosen: of fools
  alternatives:
  - senseless
  - without understanding
  - foolish
  lexicon: LSJ
  rationale: The genitive after πόλις is rendered idiomatically as 'a city of fools.' This keeps the moral sting and matches the following language of mocking a fool.
- source_word: χλευάσει
  chosen: mocks
  alternatives:
  - ridicules
  - derides
  - scoffs at
  lexicon: LSJ
  rationale: A simple present in English best captures the gnomic comparison. 'Mocks' is direct and fits the parallel with ἐχλευάσαμεν.
- source_word: ἐχλευάσαμεν
  chosen: we mocked
  alternatives:
  - we ridiculed
  - we made sport of
  lexicon: LSJ
  rationale: 'Keeps the lexical echo with χλευάσει and preserves the rhetorical comparison: as one mocks a fool, so we mocked them.'
- source_word: ἀφροσύνην
  chosen: folly
  alternatives:
  - senselessness
  - madness
  - foolishness
  lexicon: LSJ
  rationale: '''Folly'' is the standard moral term in elevated biblical English and suits the ethical register of the testament.'
- source_word: μιάναντες
  chosen: defiling
  alternatives:
  - polluting
  - violating
  lexicon: LSJ
  rationale: The participle denotes ritual/moral defilement. 'Defiling' preserves the moral-religious dimension better than the more interpretive 'violating,' while the context still makes the offense clear.
- source_word: Ἀπάραντες
  chosen: after taking her up
  alternatives:
  - after taking her away
  - after departing with her
  lexicon: LSJ
  rationale: The participle likely means taking Dinah up/away from the place before proceeding. 'After taking her up' stays close to the Greek while remaining readable; the movement is clarified by the following journey to Bethel.
- source_word: Βεθήλ
  chosen: Bethel
  alternatives: []
  lexicon: LSJ
  rationale: Standard transliteration of the place name, in keeping with the project's policy to transliterate names.
- source_word: Σύκημα
  chosen: Sychem
  alternatives:
  - Shechem
  lexicon: LSJ
  rationale: Rendered by a direct transliteration from the Greek form in this witness. The more familiar 'Shechem' is noted as an alternative.
