revisions:
- from: Pero cuando lo recibió y quedó [a]atónito ante la salida ilegal, dominado en todo por la ignorancia[b], seguía preguntando si lo decretado se había llevado a cabo para él con urgencia.
  to: Pero cuando lo recibió y quedó atónito ante el desenlace ilegal[a], dominado en todo por la ignorancia, seguía preguntando si lo decretado se había llevado a cabo para él con urgencia.
