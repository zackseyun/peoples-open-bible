review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: vocativo a los montes de Israel, promesa de ramas y fruto para el pueblo de Dios, y motivo basado en la inminencia del regreso. Sin embargo, dos elecciones principales no preservan bien la fuerza idiomática: ''llevarán su fruto'' suena poco natural en español bíblico actual para תִּשְׂאוּ con ''fruto'', y la nota alternativa ''para su llegada está cerca'' está gramaticalmente defectuosa y no refleja bien la alternativa inglesa documentada (''their coming is near'').'
  spanish_quality_summary: El texto es generalmente legible, pero 'Pero ustedes[a], montes de Israel' coloca la nota en 'ustedes' sin verdadera necesidad, y 'llevarán su fruto' resulta torpe frente a la colocación española normal 'darán fruto' o 'producirán fruto'. 'Están por venir' es aceptable, aunque 'están a punto de venir' suena más claro. La nota al pie necesita corrección idiomática.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Montes de Israel' y 'mi pueblo Israel' están bien. No intervienen Yahvé/Mesías u otros términos sensibles. La mejora necesaria es estilístico-lexical, no terminológica de glosario.
  issues:
  - severity: medium
    issue: '''llevarán su fruto'' no es la mejor equivalencia española para תִּשְׂאוּ con ''fruto'''
    rationale: Aunque intenta conservar la metáfora de 'bear', en español natural la collocación normal es 'darán fruto' o 'producirán fruto'. 'Llevar fruto' existe pero aquí suena menos idiomático y más forzado que la formulación esperable en una Biblia de lectura amplia.
  - severity: medium
    issue: 'La nota alternativa está mal formulada: ''para su llegada está cerca'''
    rationale: La alternativa documentada corresponde a 'su venida/llegada está cerca', no 'para su llegada está cerca'. La forma actual introduce una preposición sin base en la alternativa auditada y produce español incorrecto.
  - severity: low
    issue: El anclaje de la nota en 'ustedes' es poco pertinente
    rationale: La nota no comenta 'ustedes' sino la cláusula final. Debe anclarse donde aparece la alternativa relevante, en la expresión de inminencia al final del versículo.
  revised_spanish_text: Pero ustedes, montes de Israel, darán sus ramas y darán su fruto para mi pueblo Israel, porque están por venir[a].
  revised_footnotes:
  - marker: a
    text: 'O: «su venida está cerca».'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'llevarán su fruto' a 'darán su fruto' para un español más natural y fiel al sentido idiomático de producir/bear fruit. Se corrige y reubica la nota al pie para reflejar con precisión la alternativa documentada para קֵרְבוּ לָבוֹא. No se requiere adjudicación adicional, porque el sentido fuente y la solución española son claros.
