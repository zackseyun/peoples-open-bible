    rationale: Aunque transmite movimiento forzado, en español bíblico-literario suena calcado. Para humo, «arrastradas» o «que eran arrastradas» funciona mejor, y la nota ya preserva la metáfora agrícola original.
  - severity: medium
    issue: La secuencia «sino aun su apariencia aterradora destruirlos» es gramaticalmente áspera
    rationale: El griego contrasta el daño con la mera vista que, al atemorizar, puede destruir. En español conviene explicitar el verbo auxiliar o reordenar la frase para claridad y fluidez sin añadir sentido.
