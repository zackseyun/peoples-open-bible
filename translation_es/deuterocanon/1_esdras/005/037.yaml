translation:
  language: es
  text: 'Y no podían declarar sus familias y linaje como de Israel: los hijos de Asán[a], hijo de Baenán[b], los hijos de Nékodán[a], seiscientos cincuenta y dos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres de esta línea siguen el texto griego de 1 Esdras; el paralelo aproximado en Nehemías 7 presenta otros nombres en este punto.
    reason: source_note
  - marker: b
    text: La secuencia genealógica griega es algo irregular; el español conserva la filiación sin repetir mecánicamente la expresión 'hijo del hijo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἠδύναντο
  english_pob_choice: were not able
  chosen_spanish: no podían
  alternatives_spanish:
  - no eran capaces de
  - no podían conseguir
  lexicon: BDAG
  rationale: Expresa la idea de incapacidad de forma natural en español sin perder la fuerza verbal del original.
- source_word: ἀπαγγεῖλαι
  english_pob_choice: to declare
  chosen_spanish: declarar
  alternatives_spanish:
  - informar
  - manifestar
  - dar cuenta de
  lexicon: BDAG
  rationale: En un contexto genealógico, 'declarar' conserva el tono formal de presentar o establecer la ascendencia.
- source_word: τὰς πατριὰς
  english_pob_choice: their families
  chosen_spanish: sus familias
  alternatives_spanish:
  - sus clanes
  - sus casas paternas
  lexicon: LEH
  rationale: '''Familias'' es el equivalente más claro y publicable en español; mantiene la referencia a grupos de parentesco sin sonar arcaico.'
- source_word: γενεάς
  english_pob_choice: lineage
  chosen_spanish: linaje
  alternatives_spanish:
  - descendencia
  - genealogía
  - generación
  lexicon: BDAG
  rationale: '''Linaje'' diferencia bien γενεά de πατριά y conserva el sentido de ascendencia familiar.'
- source_word: ὡς ἐκ τοῦ Ἰσραὴλ εἰσίν
  english_pob_choice: that they were from Israel
  chosen_spanish: que eran de Israel
  alternatives_spanish:
  - que pertenecían a Israel
  - que provenían de Israel
  lexicon: BDAG
  rationale: La cláusula expresa la pretensión o constatación de identidad israelita; 'que eran de Israel' reproduce esa relación de manera directa y natural.
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: LEH
  rationale: En listas genealógicas, 'hijos de' es la fórmula más transparente y fiel al patrón del texto griego.
- source_word: Ἀσὰν
  english_pob_choice: Asan
  chosen_spanish: Asán
  alternatives_spanish:
  - Asan
  lexicon: transliteration from Greek
  rationale: Se translitera directamente del griego y se adapta la acentuación al español para lectura natural.
- source_word: τοῦ υἱοῦ τοῦ Βαενάν
  english_pob_choice: son of Baenan / son of the son of Baenan
  chosen_spanish: hijo de Baenán
  alternatives_spanish:
  - hijo del hijo de Baenán
  - descendiente de Baenán
  lexicon: LEH
  rationale: La secuencia griega transmitida es genealógicamente breve/irregular; en español se conserva la relación filiativa sin forzar una duplicación poco natural, siguiendo la revisión inglesa que suavizó la repetición.
- source_word: Νεκωδάν
  english_pob_choice: Nekodan
  chosen_spanish: Nékodán
  alternatives_spanish:
  - Nekodán
  - Necodán
  lexicon: transliteration from Greek
  rationale: Transliteración directa del griego con acentuación española para evitar ambigüedad prosódica.
- source_word: ἑξακόσιοι πεντήκοντα δύο
  english_pob_choice: six hundred fifty-two
  chosen_spanish: seiscientos cincuenta y dos
  alternatives_spanish:
  - seiscientos y cincuenta y dos
  lexicon: LEH
  rationale: Número cardinal exacto y idiomático en español moderno.
theological_decisions:
- issue: Retención de los nombres griegos frente al paralelo hebreo aproximado
  english_pob_reading: The Greek names are retained in the main text because 1 Esdras is translated from the Greek witness, even though the MT parallel lists different names here.
  chosen_spanish_reading: Se mantienen los nombres griegos en el texto principal.
  alternative_spanish_readings:
  - Sustituirlos por las formas del paralelo hebreo aproximado
  - armonizarlos con Nehemías
  rationale: Para 1 Esdras, la autoridad textual de trabajo es el testimonio griego; armonizar con el paralelo hebreo borraría una diferencia textual documentada.
  doctrine_reference: Principio de prioridad del testimonio textual base; integridad textual del libro deuterocanónico
- issue: Expresión de la incapacidad para verificar ascendencia israelita
  english_pob_reading: were not able to declare their families and lineage, that they were from Israel
  chosen_spanish_reading: no podían declarar sus familias y su linaje, que eran de Israel
  alternative_spanish_readings:
  - no podían demostrar que eran de Israel
  - no podían establecer su pertenencia a Israel
  rationale: La frase española conserva la tensión probatoria del original sin convertirla en una afirmación más fuerte o más débil de lo que el griego dice.
  doctrine_reference: Lectura histórica y genealógica del pasaje; precisión textual
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en dos puntos: conserva el sentido de incapacidad con ''no podían'' y evita una duplicación artificiosa en la filiación de Baenán, manteniendo la transparencia del testimonio griego.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Israel'' se conserva como nombre propio sin glosa.'
  - Los nombres propios se transliteran del griego con acentuación española para lectura pública.
  - Se mantiene el registro genealógico formal sin arcaísmos innecesarios.
