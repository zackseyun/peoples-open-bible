source:
  edition: WLC
  text: יְחַזְּקוּ לָ֨/מוֹ דָּ֘בָ֤ר רָ֗ע יְֽ֭סַפְּרוּ לִ/טְמ֣וֹן מוֹקְשִׁ֑ים אָ֝מְר֗וּ מִ֣י יִרְאֶה לָּֽ/מוֹ־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/064/006.yaml
  text: They hold fast to an evil plan[a]; they talk of laying hidden snares; they say[b], “Who will see them?”
  footnotes:
  - marker: a
    text: Or, “Who will see us?” Some interpreters take the line as the plotters speaking of themselves more directly; the Hebrew form, however, is third person plural (“them”).
    reason: alternative_reading
  - marker: b
    text: “An evil matter” may also be understood as “an evil plan” or “a wicked scheme,” since the Hebrew word can mean “word,” “matter,” or “affair.”
    reason: lexical_alternative
