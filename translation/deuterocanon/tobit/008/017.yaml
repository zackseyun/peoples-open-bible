id: TOB.8.17
reference: Tobit 8:17
source:
  edition: lxx-swete-1909
  text: εὐλογητὸς εἶ ὅτι ηὔφρανάς με, καὶ οὐκ ἐγένετό μοι καθὼς ὑπενόουν, ἀλλὰ κατὰ τὸ πολὺ ἔλεός σου ἐποίησας μεθʼ ἡμῶν. εὐλογητὸς εἶ ὅτι ἠλέησας δύο μονογενεῖς· ποίησον αὐτοῖς, δέσποτα, ἔλεος, συντέλεσον τὴν ζωὴν αὐτῶν ἐν ὑγείᾳ μετὰ εὐφροσύνης καὶ ἐλέους.
  language: Greek
  pages:
  - 832
  - 835
  - 848
  - 849
  - 850
  - 851
  - 852
  - 853
  confidence: high
  validation: minor_mismatch
translation:
  text: Blessed are you[a], because you have made me rejoice, and it has not happened to me as I suspected; rather, according to your abundant mercy, you have acted with us. Blessed are you, because you have shown mercy to two only children. Show them mercy, Master[c][b]; bring their life to completion in health with gladness and mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it did not happen to me as I supposed.' The Greek verb can express suspicion or supposition; the context suggests anxious expectation.
    reason: lexical_alternative
  - marker: b
    text: '''Two only children'' means that each of the couple was an only child in his or her family.'
    reason: cultural_note
  - marker: c
    text: Or 'bring their lives to completion' or 'grant that they may complete their life.' The Greek uses a collective singular 'life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  chosen: Blessed
  alternatives:
  - Praised
  lexicon: BDAG
  rationale: Predicate adjective in a blessing formula addressed to God. 'Blessed are you' preserves the liturgical tone and standard doxological force better than the more interpretive 'Praised are you.'
- source_word: ηὔφρανάς
  chosen: you have made me rejoice
  alternatives:
  - you have gladdened me
  - you have made me glad
  lexicon: BDAG
  rationale: The causative sense of εὐφραίνω is explicit here. 'Made me rejoice' keeps the verbal force and emotional intensity without sounding archaic.
- source_word: ὑπενόουν
  chosen: I suspected
  alternatives:
  - I supposed
  - I feared
  - I imagined
  lexicon: BDAG
  rationale: The verb can mean to suspect or suppose. In context, the speaker contrasts feared expectation with merciful outcome; 'suspected' preserves that apprehensive nuance without over-translating to 'feared.'
- source_word: κατὰ τὸ πολὺ ἔλεός σου
  chosen: according to your abundant mercy
  alternatives:
  - according to your great mercy
  - in keeping with your great mercy
  lexicon: BDAG
  rationale: This phrase expresses measure or standard. 'Abundant mercy' renders πολὺ naturally in modern English while retaining the emphasis on the magnitude of divine mercy.
- source_word: ἐποίησας μεθʼ ἡμῶν
  chosen: you have acted with us
  alternatives:
  - you have dealt with us
  - you have done for us
  lexicon: BDAG
  rationale: The idiom is broad. 'Acted with us' stays close to the Greek construction μεθʼ ἡμῶν and leaves the merciful action general, as the source does.
- source_word: ἠλέησας
  chosen: you have shown mercy
  alternatives:
  - you have had mercy
  - you have pitied
  lexicon: BDAG
  rationale: The aorist of ἐλεέω is central to the verse's theology of divine compassion. 'Shown mercy' is idiomatic and clear in contemporary English.
- source_word: δύο μονογενεῖς
  chosen: two only children
  alternatives:
  - two only-begotten ones
  - two unique children
  - the two only children
  lexicon: BDAG
  rationale: μονογενής here refers to each member of the couple as the sole child of his or her parents, not to metaphysical uniqueness. 'Two only children' communicates the familial sense naturally in English.
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' in doctrine, this verse uses δέσποτα, which carries the sense of sovereign authority or mastership. 'Master' preserves the lexical distinction from κύριος.
- source_word: συντέλεσον τὴν ζωὴν αὐτῶν
  chosen: bring their life to completion
  alternatives:
  - complete their life
  - bring their lives to fulfillment
  - grant them to finish life
  lexicon: BDAG
  rationale: The imperative asks that their course of life be brought to its full end. Singular 'life' follows the Greek collective singular, while the English phrase conveys a prayer for a full lifespan rather than mere survival.
- source_word: ἐν ὑγείᾳ
  chosen: in health
  alternatives:
  - in soundness
  - in well-being
  lexicon: BDAG
  rationale: A straightforward rendering of bodily well-being. 'In health' is concise and natural.
- source_word: μετὰ εὐφροσύνης καὶ ἐλέους
  chosen: with gladness and mercy
  alternatives:
  - with joy and mercy
  - with gladness and favor
  lexicon: BDAG
  rationale: The Greek pairs joyful flourishing with continued mercy. Retaining 'mercy' rather than softening to 'favor' preserves the repeated ἔλεος theme across the verse.
