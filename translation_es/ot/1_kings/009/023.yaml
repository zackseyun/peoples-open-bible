  to: 'Estos eran los principales funcionarios[a] sobre la obra de Salomón: quinientos cincuenta, los que gobernaban[b] sobre el pueblo que hacía la obra.'
  rationale: Se reubicaron las notas en las palabras pertinentes para cumplir la disciplina de anclaje del proyecto. Se suavizó la cláusula final a «el pueblo que hacía la obra» para mejor español y mejor correspondencia con el participio hebreo sin perder el sentido colectivo de בָּעָם. También se corrigió la redacción de la nota b para evitar calcos poco naturales.
