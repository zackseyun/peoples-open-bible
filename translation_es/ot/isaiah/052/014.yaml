- from: Tal como muchos se quedaron asombrados[a] de ti, así fue desfigurado[b] su aspecto[c], más que el de un hombre, y su forma más que la de los hijos de los hombres.
  to: Tal como muchos quedaron horrorizados[a] ante ti, tan desfigurado[b] estaba su aspecto, más allá del de un hombre, y su forma más allá de la de los hijos de los hombres.[c]
  rationale: Se reemplazó 'se quedaron asombrados' por 'quedaron horrorizados' para reflejar mejor el shock de שָׁמְמוּ en este contexto. Se reformuló el centro del verso como 'tan desfigurado estaba su aspecto' para sonar natural en español y mantener la correlación 'tal como... tan...'. Se eliminó la nota redundante sobre 'aspecto' y se conservó la nota idiomática sobre 'hijos de los hombres'.
