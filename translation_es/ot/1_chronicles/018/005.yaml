    reason: lexical_alternative
  - marker: b
    text: El nombre se escribe aquí «Hadadezer»; en pasajes paralelos aparece la variante «Hadarezer».
    reason: alternative_reading
  revision_rationale: 'Se revisa solo el verbo principal de combate: «abatió» representa mejor נכה en este contexto militar con cifra de bajas que «derribó». También se normaliza la razón de la nota b para alinearla con el audit trail en inglés («alternative_reading»).'
