  glossary_alignment: No hay conflicto con la terminología del proyecto en este versículo. «Dios», «levitas», «casa de nuestro Dios» y «diezmo del diezmo» están bien alineados. «Almacén» refleja correctamente la decisión inglesa «storehouse» mejor que «tesorería».
