base_translation:
  language: en
  yaml_path: translation/ot/isaiah/033/014.yaml
  text: 'Sinners in Zion are afraid[d][c][b][a]; trembling has seized the godless: “Who among us can dwell with a consuming fire? Who among us can dwell with everlasting burnings?”'
  footnotes:
  - marker: a
    text: Or “the hypocrites.” The Hebrew term can denote those who are impious or irreligious, not only those who are insincere.
    reason: lexical_alternative
  - marker: b
    text: Or “Who among us can sojourn.” The Hebrew verb can mean “sojourn” or “dwell/remain.”
    reason: lexical_alternative
  - marker: c
    text: “A consuming fire” echoes biblical language for God's holy and judging presence; compare Deut 4:24; Heb 12:29.
    reason: cross_reference
  - marker: d
    text: Or “eternal burnings” or “perpetual flames.”
    reason: lexical_alternative
