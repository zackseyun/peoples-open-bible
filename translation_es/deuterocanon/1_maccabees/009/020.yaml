  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y preserva la acumulación de lenguaje de duelo: ἐκόψαντο ... ἐκόψαντο ... κοπετὸν μέγαν ... ἔπενθουν. Sin embargo, la primera cláusula griega no requiere el objeto explícito en español con tanta fuerza como en el borrador, y la secuencia suena más natural y mejor equilibrada si se evita repetir ''lo'' dos veces en dos miembros tan cercanos. Además, ''se dolieron'' es comprensible pero menos idiomático en español bíblico general que una formulación de luto más clara.'
  spanish_quality_summary: El español es claro, pero 'lo lloraron allí; todo Israel lo lloró...' resulta algo pesado por la doble repetición inmediata del pronombre. 'Se dolieron por muchos días' es entendible, aunque suena menos natural que 'guardaron luto por muchos días' o 'estuvieron de duelo por muchos días'. Una pequeña revisión mejora la fluidez sin perder la progresión léxica del original.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. El manejo del campo semántico del duelo es en general fiel al audit trail inglés. La nota léxica debe seguir explicando la triple acumulación de vocabulario de duelo.
  issues:
  - severity: medium
    issue: Repetición pesada de 'lo' en dos cláusulas consecutivas
    rationale: Aunque αὐτόν aparece en ambas cláusulas griegas, en español repetir 'lo lloraron ... lo lloró' en tan corto espacio suena torpe. La referencia a Judas se preserva suficientemente con 'lloraron por él allí' seguido de 'todo Israel hizo gran duelo por él'.
  - severity: medium
    issue: '''Se dolieron por muchos días'' es poco idiomático'
    rationale: Expresa la idea básica de ἔπενθουν, pero en registro bíblico español suena menos natural que 'guardaron luto por muchos días', que mantiene la distinción con los verbos anteriores y comunica duelo prolongado.
  revised_spanish_text: Y lloraron por él allí[a], y todo Israel hizo gran duelo por él, y guardaron luto por muchos días, y dijeron,
  revised_footnotes:
  - marker: a
    text: 'El griego encadena vocabulario de duelo: primero un verbo de lamentación, luego el sustantivo ''gran duelo'', y después otro verbo distinto para el luto. La traducción conserva esa acumulación en vez de suavizarla.'
    reason: lexical_alternative
