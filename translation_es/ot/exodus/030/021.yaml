translation:
  language: es
  text: Lavarán sus manos y sus pies, para que no mueran. Esto será para ellos un estatuto permanente[a], para él[b] y para su descendencia, por todas sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estatuto perpetuo» o «estatuto eterno». La expresión hebrea חָק עוֹלָם es una fórmula legal estándar para una ordenanza duradera.
    reason: lexical_alternative
  - marker: b
    text: «Para él» se refiere a Aarón en el contexto inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: וְרָחֲצוּ
  english_pob_choice: they shall wash
  chosen_spanish: Lavarán
  alternatives_spanish:
  - Y lavarán
  - Deberán lavar
  lexicon: HALOT
  rationale: En este contexto legal-ritual, el perfecto con valor injuntivo/futuro se expresa naturalmente en español con futuro de mandato. 'Lavarán' conserva el tono normativo sin añadir paráfrasis.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus manos
  lexicon: HALOT
  rationale: Equivalencia directa y natural del plural con sufijo posesivo de tercera persona plural.
- source_word: וְרַגְלֵיהֶם
  english_pob_choice: and their feet
  chosen_spanish: y sus pies
  alternatives_spanish:
  - y sus pies
  lexicon: HALOT
  rationale: Traducción literal del paralelismo corporal. 'Pies' mantiene la especificidad ritual sin suavizarla.
- source_word: וְלֹא יָמֻתוּ
  english_pob_choice: so that they may not die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - y no morirán
  - para no morir
  lexicon: HALOT
  rationale: La cláusula expresa finalidad/resultado ligado a la obediencia ritual. 'Para que no mueran' comunica con claridad el valor preventivo de la advertencia en español actual.
- source_word: וְהָיְתָה לָהֶם
  english_pob_choice: This shall be for them
  chosen_spanish: Esto será para ellos
  alternatives_spanish:
  - Y esto será para ellos
  - Esto les será
  lexicon: HALOT
  rationale: El sujeto implícito se expresa con 'Esto' para referirse a la disposición ritual ya mencionada, siguiendo el sentido del inglés auditado y del hebreo.
- source_word: חָק
  english_pob_choice: statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - decreto
  - ordenanza
  - precepto
  lexicon: HALOT
  rationale: '''Estatuto'' o ''estatuto'' en español bíblico es el equivalente más estable para חָק en contexto jurídico-cultual. Mantiene el carácter normativo sin introducir una lectura doctrinal distinta.'
- source_word: עוֹלָם
  english_pob_choice: permanent
  chosen_spanish: perpetuo
  alternatives_spanish:
  - permanente
  - eterno
  - para siempre
  lexicon: HALOT
  rationale: '''Perpetuo'' transmite bien la fórmula legal de duración continua del mandato. En español suena más natural que ''eterno'' para una ordenanza cultual y preserva el alcance institucional del hebreo.'
- source_word: ל֥וֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para Aarón
  - para él mismo
  lexicon: HALOT
  rationale: Se conserva el pronombre singular del hebreo. El referente inmediato es Aarón; en el texto principal no se sustituye por el nombre para no sobreespecificar lo que el hebreo mantiene pronominal.
- source_word: וּלְזַרְע֖וֹ
  english_pob_choice: and for his offspring
  chosen_spanish: y para su descendencia
  alternatives_spanish:
  - y para sus hijos
  - y para su linaje
  - y para su posteridad
  lexicon: HALOT
  rationale: '''Descendencia'' reproduce el sentido colectivo de זֶרַע con naturalidad en español bíblico contemporáneo. Evita la literalidad de ''simiente'' y mantiene la referencia genealógica.'
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - por todas sus generaciones
  - de generación en generación
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La fórmula hebrea se vierte con una expresión idiomática y fiel. 'Por sus generaciones' conserva el eco legal del original sin forzar un giro más interpretativo.
theological_decisions:
- issue: Duración del estatuto ritual expresada por חָק עוֹלָם
  english_pob_reading: permanent statute
  chosen_spanish_reading: estatuto perpetuo
  alternative_spanish_readings:
  - estatuto permanente
  - estatuto eterno
  - ordenanza perpetua
  rationale: La fórmula hebrea indica un mandato duradero dentro del marco cultual de Israel. 'Perpetuo' preserva la fuerza de continuidad sin imponer una afirmación filosófica más amplia que el contexto inmediato no requiere.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referente de לּוֹ / 'for him'
  english_pob_reading: for him (Aaron in context)
  chosen_spanish_reading: para él
  alternative_spanish_readings:
  - para Aarón
  - para él, es decir, Aarón
  rationale: Se conserva el pronombre como en el hebreo, dejando que el contexto inmediato identifique a Aarón. Esto evita reemplazar la forma pronominal del texto por una explicitación no requerida en la línea principal.
  doctrine_reference: Contexto inmediato de Éxodo 30:20–21
translation_notes:
  revision_awareness: 'Se revisó la redacción frente al antecedente inglés auditado: se mantuvo el valor injuntivo del verbo, la finalidad de la cláusula negativa y la fórmula legal de duración. No se detectaron cambios textuales posteriores en el control de revisión; la versión vigente del audit trail permaneció sin modificaciones.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' según la terminología del proyecto, aunque en este versículo no aparece el nombre divino.
  - '''Estatuto perpetuo'' mantiene la terminología legal del POB sin recurrir a equivalentes eclesiásticos más interpretativos.'
  - '''Descendencia'' se usa de forma consistente para זֶרַע en contextos genealógicos.'
  - La nota sobre Aarón se deja en pie por el referente contextual del pronombre singular.
