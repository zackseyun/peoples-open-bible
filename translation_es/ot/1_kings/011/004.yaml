translation:
  language: es
  text: Y cuando Salomón ya era anciano, sus mujeres desviaron su corazón tras otros dioses, y su corazón no estaba plenamente entregado[a] a Yahvé su Dios, como el corazón de David su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «plenamente devoto». El hebreo dice literalmente que su corazón no estaba «entero» con Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵת זִקְנַת
  english_pob_choice: when Solomon was old
  chosen_spanish: cuando Salomón era viejo
  alternatives_spanish:
  - al tiempo de la vejez de Salomón
  - cuando Salomón llegó a la vejez
  lexicon: HALOT
  rationale: La expresión hebrea marca un momento temporal en la vejez de Salomón. 'Era viejo' conserva la sencillez temporal del original sin forzar una perífrasis más pesada.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus mujeres/esposas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus mujeres'. Aunque 'esposas' aclara la relación con más precisión, 'mujeres' sigue de cerca el texto y mantiene la correspondencia con el sustantivo hebreo sin añadir una especificación ausente.
- source_word: הִטּוּ אֶת־לְבָבוֹ
  english_pob_choice: turned his heart
  chosen_spanish: inclinaron su corazón
  alternatives_spanish:
  - torcieron su corazón
  - desviaron su corazón
  lexicon: HALOT
  rationale: El hifil de נטה expresa causar que el corazón se incline. 'Inclinaron' conserva la imagen hebrea mejor que una formulación más interpretativa como 'desviaron'.
- source_word: אַחֲרֵי אֱלֹהִים אֲחֵרִים
  english_pob_choice: after other gods
  chosen_spanish: tras otros dioses
  alternatives_spanish:
  - después de otros dioses
  - hacia otros dioses
  - siguiendo a otros dioses
  lexicon: HALOT
  rationale: '''Tras'' reproduce bien la idea hebrea de seguir después de, y mantiene el matiz de apostasía/caminar en pos de otros dioses sin explicitar más de lo que el texto dice.'
- source_word: לְבָבוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su mente
  lexicon: HALOT
  rationale: '''Corazón'' preserva la antropología bíblica del hebreo, donde incluye voluntad, pensamiento y lealtad.'
- source_word: שָׁלֵם
  english_pob_choice: fully devoted
  chosen_spanish: plenamente entregado
  alternatives_spanish:
  - completo
  - íntegro
  - totalmente dedicado
  lexicon: HALOT
  rationale: El POB inglés pasó de 'whole' a 'fully devoted' para captar la fidelidad de pacto. En español, 'plenamente entregado' comunica esa lealtad íntegra de forma natural sin perder la metáfora de integridad.
- source_word: עִם יְהוָה אֱלֹהָיו
  english_pob_choice: with Yahweh his God
  chosen_spanish: a Yahvé su Dios
  alternatives_spanish:
  - con Yahvé su Dios
  - ante Yahvé su Dios
  - junto a Yahvé su Dios
  lexicon: HALOT
  rationale: La preposición עִם con שָׁלֵם expresa relación/fidelidad; en español, 'a' funciona de manera natural con 'entregado' y mantiene la idea de orientación leal hacia Yahvé. Se conserva 'Yahvé' según el criterio POB para el nombre divino.
- source_word: כִּלְבַב דָּוִיד אָבִיו
  english_pob_choice: like the heart of David his father
  chosen_spanish: como el corazón de David su padre
  alternatives_spanish:
  - como el corazón de su padre David
  - tal como el corazón de David, su padre
  lexicon: HALOT
  rationale: La comparación se centra en el 'corazón', no solo en la persona. Mantenerlo explícito preserva la fuerza del contraste con Salomón.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de usar 'Yahvé' para el Tetragrámaton, evitando la sustitución por un título.
theological_decisions:
- issue: 'Estado del corazón de Salomón: ''whole'' / ''fully devoted'''
  english_pob_reading: his heart was not fully devoted to Yahweh his God
  chosen_spanish_reading: su corazón no estaba plenamente entregado a Yahvé su Dios
  alternative_spanish_readings:
  - su corazón no estaba íntegro con Yahvé su Dios
  - su corazón no estaba completamente fiel a Yahvé su Dios
  - su corazón no era entero con Yahvé su Dios
  rationale: La idea no es solo emocional sino de lealtad de pacto. 'Plenamente entregado' comunica la integridad y la devoción que el inglés POB quiso capturar sin perder el trasfondo metafórico de 'corazón'.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Otros dioses
  english_pob_reading: after other gods
  chosen_spanish_reading: tras otros dioses
  alternative_spanish_readings:
  - hacia otros dioses
  - siguiendo a otros dioses
  rationale: El hebreo usa la fórmula estándar de apostasía. 'Tras' conserva el eco bíblico de seguir a otros dioses sin rebajar la expresión a una mera preferencia religiosa.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'whole with' a 'fully devoted to' para שָׁלֵם עִם, y mantuvo 'other gods' y 'Yahweh'. La versión española sigue esa revisión al preferir 'plenamente entregado' para expresar fidelidad de pacto, conservando 'tras otros dioses' y el nombre divino 'Yahvé'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יהוה, conforme al criterio POB.
  - Se mantuvo 'corazón' para לֵב/לֵבָב, preservando la antropología bíblica.
  - '''Mujeres'' refleja el literal hebreo; en este contexto se entiende como esposas por el relato.'
  - '''Plenamente entregado'' fue elegido para evitar tanto un calco duro como una paráfrasis doctrinalmente más cerrada.'
