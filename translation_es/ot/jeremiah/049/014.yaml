translation:
  language: es
  text: 'He oído una noticia de Yahvé[a], y ha sido enviado un mensajero entre las naciones: «Reúnanse, vengan contra ella[b] y levántense para la batalla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un enviado» o «un embajador ha sido enviado entre las naciones».
    reason: lexical_alternative
  - marker: b
    text: El pronombre «ella» se refiere a Edom, personificada como mujer en el contexto circundante.
    reason: cross_reference
lexical_decisions:
- source_word: שְׁמוּעָה
  english_pob_choice: a report
  chosen_spanish: un reporte
  alternatives_spanish:
  - una noticia
  - un informe
  - un mensaje
  lexicon: HALOT
  rationale: El sustantivo nombra algo oído, es decir, una noticia o reporte. «Reporte» comunica bien ese valor en español moderno y conserva el tono de anuncio profético sin volverlo arcaico.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - Oí
  - He escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo admite pasado simple o perfecto compuesto. «He oído» mantiene la inmediatez de la recepción del mensaje y suena natural en español.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - desde Yahvé
  lexicon: HALOT
  rationale: La preposición marca procedencia/origen. Se conserva el nombre divino «Yahvé» según la norma del proyecto, en vez de ocultarlo con una sustitución reverencial.
- source_word: צִיר
  english_pob_choice: a messenger
  chosen_spanish: un mensajero
  alternatives_spanish:
  - un enviado
  - un embajador
  lexicon: HALOT
  rationale: El término puede designar mensajero, enviado o embajador. «Mensajero» es amplio, claro y fiel al contexto profético de una comunicación enviada entre las naciones.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en medio de las naciones
  - a las naciones
  lexicon: HALOT
  rationale: La preposición con el plural indica localización distributiva. «Entre las naciones» reproduce bien la idea de circulación del mensajero en ese ámbito.
- source_word: שָׁלוּחַ
  english_pob_choice: has been sent
  chosen_spanish: se ha enviado
  alternatives_spanish:
  - ha sido enviado
  - está enviado
  lexicon: HALOT
  rationale: El participio pasivo expresa un mensajero ya despachado. La construcción impersonal en español suena natural y conserva la pasividad del hebreo.
- source_word: הִתְקַבְּצוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Reúnanse
  alternatives_spanish:
  - Congréguense
  - Júntense
  lexicon: HALOT
  rationale: Es un imperativo plural de convocatoria colectiva. «Reúnanse» transmite el llamado sin añadir matices reflexivos forzados en español.
- source_word: וּבֹאוּ עָלֶיהָ
  english_pob_choice: come against her
  chosen_spanish: vengan contra ella
  alternatives_spanish:
  - vengan sobre ella
  - avancen contra ella
  lexicon: HALOT
  rationale: En contexto militar, el verbo con על indica avance hostil contra un objetivo. Se conserva el femenino singular para reflejar la personificación de Edom en el contexto inmediato.
- source_word: וְקוּמוּ לַמִּלְחָמָה
  english_pob_choice: rise up for battle
  chosen_spanish: levántense para la batalla
  alternatives_spanish:
  - levántense para guerrear
  - alcense para la guerra
  lexicon: HALOT
  rationale: קוּם es un llamado a ponerse en acción. «Levántense para la batalla» conserva la fuerza verbal y el campo militar sin volverlo más abstracto de lo necesario.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la terminología base del proyecto, se lo vierte como «Yahvé» para preservar el nombre del pacto y no neutralizarlo con una sustitución tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Pronombre femenino singular en 'contra ella'
  english_pob_reading: her refers to Edom, personified as a woman in the surrounding context.
  chosen_spanish_reading: ella se refiere a Edom, personificado como figura femenina en el contexto cercano.
  alternative_spanish_readings:
  - contra él
  - contra eso
  rationale: El hebreo usa pronombre femenino singular; la traducción mantiene esa concordancia para no borrar la personificación literaria de Edom como mujer/ciudad.
  doctrine_reference: Consistencia contextual y respeto a la personificación del discurso profético
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios y el cotejo de control indicó alta concordancia.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - Se mantiene «mensajero» como solución principal para צִיר, dejando «enviado» y «embajador» en nota por su posible valor contextual.
  - Se preserva el femenino singular «ella» para reflejar la personificación de Edom.
  - El tono es formal y publicado, sin depender de una paráfrasis libre del inglés; la sintaxis sigue de cerca el hebreo donde el español lo permite naturalmente.
