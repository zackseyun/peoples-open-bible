translation:
  language: es
  text: En aquel tiempo se llevará tributo[a] a Yahvé de los ejércitos, de un pueblo alto y de piel lisa, de un pueblo temido de lejos y de cerca, una nación de mandato sobre mandato[b] y de pisoteo, cuya tierra dividen los ríos, al lugar del nombre de Yahvé de los ejércitos, el monte Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'presente'. El hebreo puede referirse a un regalo o tributo ofrecido a un soberano honrado.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'línea sobre línea' o 'cordel de medir sobre cordel de medir'; la frase es difícil y puede referirse a medición repetida, mandato o dominación.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁי
  english_pob_choice: tribute
  chosen_spanish: ofrenda
  alternatives_spanish:
  - tributo
  - presente
  lexicon: HALOT
  rationale: שַׁי puede designar un obsequio ofrecido a un superior, y el contexto de traerlo a Yahvé permite una lectura reverente. En español, 'ofrenda' comunica bien la acción de presentar algo a Dios sin reducirlo a un mero pago político. 'Tributo' se preserva como alternativa porque el sentido honorífico también es posible y el inglés POB lo retomó en su revisión.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  lexicon: DOCTRINE.md contested terms; HALOT
  rationale: Se mantiene 'Yahvé' como forma transparente del nombre divino, y צְבָאוֹת se rinde como 'de los ejércitos' para conservar el valor militar/cósmico del título en español actual. 'Huestes' es más tradicional, pero menos transparente para lectores modernos.
- source_word: מְמֻשָּׁךְ
  english_pob_choice: tall
  chosen_spanish: alto
  alternatives_spanish:
  - estirado
  - de gran estatura
  lexicon: HALOT
  rationale: El participio sugiere literalmente algo 'extendido' o 'alargado'; en este contexto etnográfico el sentido probablemente apunta a la estatura, como refleja el inglés. 'Alto' es la forma más natural y sobria en español.
- source_word: מוֹרָט
  english_pob_choice: smooth-skinned
  chosen_spanish: sin vello
  alternatives_spanish:
  - rasurado
  - de piel lisa
  lexicon: HALOT
  rationale: El término es raro y describe una apariencia lisa o afeitada. 'Sin vello' comunica esa idea con naturalidad en español sin comprometerse demasiado con una glosa demasiado específica. 'Rasurado' sería posible, pero sugiere una acción más que una descripción.
- source_word: נוֹרָא
  english_pob_choice: feared
  chosen_spanish: temido
  alternatives_spanish:
  - dreadful
  - imponente
  lexicon: HALOT
  rationale: En el contexto de un pueblo entre naciones, el sentido es que inspira temor. 'Temido' conserva ese matiz mejor que 'imponente', que puede sonar demasiado elogioso o vago.
- source_word: מִן ה֣וּא וָ/הָלְאָה
  english_pob_choice: far and wide
  chosen_spanish: por aquí y por allá
  alternatives_spanish:
  - desde allí y más allá
  - lejos y ampliamente
  lexicon: HALOT
  rationale: El modismo es difícil y no conviene forzar una precisión falsa. 'Por aquí y por allá' expresa una extensión distribuida y amplia en español natural, manteniendo la apertura semántica del original y de la solución inglesa.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: '''Nación'' conserva la distinción respecto de עַם y mantiene el tono colectivo-político del texto.'
- source_word: קַו קָו
  english_pob_choice: command upon command
  chosen_spanish: norma sobre norma
  alternatives_spanish:
  - línea sobre línea
  - medida sobre medida
  lexicon: HALOT
  rationale: La expresión es notoriamente difícil. El inglés POB optó por una lectura de imposición/orden repetido; en español, 'norma sobre norma' transmite esa idea de precepto repetido sin depender de una imagen demasiado técnica. 'Línea sobre línea' se conserva como alternativa literal.
- source_word: וּ/מְבוּסָה
  english_pob_choice: trampling
  chosen_spanish: atropello
  alternatives_spanish:
  - pisoteo
  - trillamiento
  lexicon: HALOT
  rationale: El sustantivo procede de 'pisotear/trampear'. 'Atropello' en español puede comunicar la idea de dominación violenta y encaja con la brevedad del verso; no obstante, 'pisoteo' queda como alternativa más cercana al verbo base.
- source_word: בָּזְאוּ
  english_pob_choice: divide
  chosen_spanish: dividen
  alternatives_spanish:
  - despojan
  - saquean
  lexicon: HALOT
  rationale: Aunque el verbo suele significar 'despojar/plunder', con 'ríos' como sujeto y 'su tierra' como objeto la idea geográfica es que la parten o dividen. 'Dividen' sigue la decisión del inglés POB y mantiene la sintaxis más probable.
- source_word: מְקוֹם שֵׁם יְהוָה צְבָאוֹת
  english_pob_choice: the place of the name of the LORD of Armies
  chosen_spanish: el lugar del nombre de Yahvé de los ejércitos
  alternatives_spanish:
  - el lugar donde Yahvé de los ejércitos ha puesto su nombre
  lexicon: HALOT
  rationale: Se conserva la construcción genitiva del hebreo para no diluir la resonancia teológica del 'nombre' asociado al santuario. La alternativa explicativa es válida, pero la forma elegida es más cercana al patrón del original y coincide con la lectura auditada en inglés.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sion
  alternatives_spanish:
  - Monte Sion
  - el monte de Sion
  lexicon: HALOT
  rationale: '''Monte Sion'' es la forma más natural y reconocible en español bíblico actual, sin perder el valor de nombre propio geográfico-teológico.'
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para יהוה y se evita el enmascaramiento por mayúsculas. 'Yahvé' mantiene transparencia histórica y consistencia en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adaptado al español como Yahvé)'
- issue: Sentido del grupo descrito por adjetivos étnico-poéticos
  english_pob_reading: A people tall and smooth-skinned, feared far and wide
  chosen_spanish_reading: un pueblo alto y sin vello, un pueblo temido por aquí y por allá
  alternative_spanish_readings:
  - un pueblo de gran estatura y de piel lisa
  - un pueblo temido lejos y ampliamente
  rationale: No se introduce una identificación histórica específica en la línea principal. Se conserva la descripción textual, como hace el inglés POB, para no sobreinterpretar el verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: 'קַו קָו / וּמְבוּסָה: frase de sentido difícil'
  english_pob_reading: command upon command and trampling
  chosen_spanish_reading: norma sobre norma y de atropello
  alternative_spanish_readings:
  - línea sobre línea y pisoteo
  - medida sobre medida y subyugación
  rationale: Se preserva la tensión interpretativa sin reducir la frase a una sola glosa tradicional. La traducción elegida mantiene la idea de repetición/orden y de dominio violento que el inglés POB consideró probable, dejando abiertas las alternativas más literales.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'gift' a 'tribute' en la revisión más reciente para ajustar mejor שַׁי. En español se optó por 'ofrenda' en el texto principal por claridad reverente y por mantener la presentación a Yahvé, pero se documenta la alternativa 'tributo' en la nota, reflejando la tensión lexical que el POB ya reconoció.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé de los ejércitos' de forma uniforme para צְבָאוֹת.
  - Se evita 'SEÑOR' como sustituto del nombre divino, conforme al estándar del proyecto.
  - Se conserva la estructura paralela del hebreo con dos miembros descriptivos ('pueblo... / nación...').
  - '''Monte Sion'' se usa como nombre propio fijo, sin expandirlo innecesariamente.'
  - La frase difícil קַו קָו no se 'resuelve' con una equivalencia tradicional única; se deja una formulación sobria y se documenta la alternativa literal.
