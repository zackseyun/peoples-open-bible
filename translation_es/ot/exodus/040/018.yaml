translation:
  language: es
  text: Así Moisés levantó el tabernáculo, y colocó sus bases[a], y colocó sus marcos[b], y puso sus barras, y alzó sus pilares[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'zócalos' para 'bases' (אֲדָנָיו), es decir, las piezas de fundamento que sostenían los marcos del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O 'tablas' para 'marcos' (קְרָשָׁיו). El término hebreo puede designar tablas, pero aquí probablemente alude a los miembros estructurales verticales del tabernáculo.
    reason: lexical_alternative
  - marker: c
    text: O 'postes' para 'pilares' (עַמּוּדָיו).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - alzò
  - armó
  - estableció
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto describe hacer que la estructura quede en pie. En español, 'levantar' comunica bien la acción de montar o poner en posición vertical el tabernáculo, sin sonar tan técnico como 'erigir' ni tan abstracto como 'establecer'.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: En Éxodo, מִשְׁכָּן funciona como término consolidado para el santuario portátil. 'Tabernáculo' es el equivalente tradicional y claro en español, y preserva el referente cultual específico.
- source_word: אֲדָנָיו
  english_pob_choice: its bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus sockets
  - sus zócalos
  lexicon: HALOT
  rationale: אֲדָנִים son las piezas de fundamento donde encajan los marcos. 'Bases' es suficientemente amplio y natural en español; 'sockets' sería demasiado técnico en una publicación general.
- source_word: קְרָשָׁיו
  english_pob_choice: its frames
  chosen_spanish: sus marcos
  alternatives_spanish:
  - sus tablas
  - sus tablones
  lexicon: HALOT
  rationale: Aunque el término puede referirse a 'tablas' o 'tableros', aquí el contexto arquitectónico favorece la idea de los miembros verticales de la estructura. 'Marcos' transmite mejor su función de sostén en español moderno sin reducirlos a simples tablas.
- source_word: בְּרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus cerrojos
  lexicon: HALOT
  rationale: בְּרִיחַ designa las barras que unen y aseguran la estructura. 'Barras' mantiene la correspondencia directa y es claro en español; 'travesaños' es una alternativa válida pero más interpretativa.
- source_word: עַמּוּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: עַמּוּד remite a soportes verticales. 'Columnas' suena natural y digno en español y conserva la imagen de soportes verticales; 'pilares' también sería posible, pero 'columnas' encaja mejor con la secuencia descriptiva.
- source_word: וַיָּשֶׂם
  english_pob_choice: set
  chosen_spanish: dispuso
  alternatives_spanish:
  - colocó
  - puso
  lexicon: HALOT
  rationale: שׂוּם expresa poner o situar. 'Disponer' en español añade orden sin exceder el sentido, y funciona bien en una lista de acciones de montaje.
- source_word: וַיִּתֵּן
  english_pob_choice: placed / put in
  chosen_spanish: colocó / puso
  alternatives_spanish:
  - instaló
  - dispuso
  lexicon: HALOT
  rationale: נָתַן aquí refiere a situar elementos estructurales. 'Colocó' y 'puso' reproducen de manera natural la alternancia del original y evitan una traducción mecánica. Se conserva la diferencia estilística según el objeto, como en el inglés auditado.
translation_notes:
  revision_awareness: El pasaje revisado muestra alta concordancia con la forma inglesa auditada; no se requieren cambios sustantivos. Se preserva la secuencia de montaje y las alternativas léxicas documentadas para las piezas estructurales del tabernáculo.
  spanish_consistency_notes:
  - Se mantuvo 'tabernáculo' para מִשְׁכָּן por coherencia con el uso consolidado en Éxodo.
  - '''Bases'' / ''marcos'' / ''barras'' / ''columnas'' siguen la terminología estructural ya documentada y evitan introducir vocabulario eclesiástico no sustentado por el hebreo.'
  - La alternancia 'colocó' / 'puso' refleja el hebreo con naturalidad en español sin perder precisión.
  - No hay decisiones doctrinales especiales en este versículo; el foco es descriptivo y arquitectónico.
