  text: 「그가 아버지에게 대답하여 말하였다. 「보십시오, 제가 이렇게 여러 해를 아버지를 섬겨 한 번도 명령을 어긴 적이 없는데, 제게는 친구들과 즐기라고 염소 새끼 한 마리도 주신 적이 없습니다.」」
