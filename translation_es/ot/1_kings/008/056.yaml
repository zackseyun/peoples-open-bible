revisions:
- from: Bendito sea Yahvé[a], que ha dado descanso a su pueblo Israel, conforme a todo lo que había dicho. No ha caído ni una sola palabra de todas sus buenas palabras que dijo por medio de Moisés, su esclavo.
  to: Bendito sea Yahvé[a], que ha dado descanso a su pueblo Israel, conforme a todo lo que dijo. No ha fallado ni una sola palabra de todas sus buenas palabras que dijo por medio de Moisés, su siervo.
  rationale: Se corrige el tiempo verbal a 'dijo' para reflejar más de cerca el hebreo; se reemplaza 'ha caído' por 'ha fallado' para expresar con mejor español el modismo de cumplimiento; se cambia 'su esclavo' a 'su siervo' conforme a la excepción contextual documentada para Moisés; y se reescribe la nota al pie en español natural, preservando la alternativa 'promesa'.
  reviewer_model: gpt-5.4
