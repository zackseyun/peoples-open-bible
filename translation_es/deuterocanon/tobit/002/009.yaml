translation:
  language: es
  text: Y esa misma noche, después de haber salido y haberlo enterrado, me acosté en estado de impureza[a] junto al muro del patio, y mi rostro estaba descubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «impuro» o «contaminado». El griego describe impureza ritual derivada del contacto con un cadáver, no culpa moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῇ τῇ νυκτί
  english_pob_choice: on that very night
  chosen_spanish: en esa misma noche
  alternatives_spanish:
  - en aquella misma noche
  - esa noche
  lexicon: LSJ
  rationale: El pronombre demostrativo αὐτῇ con el artículo τῇ y el sustantivo νυκτί crea una expresión enfática de inmediatez temporal. 'Esa misma noche' reproduce ese énfasis de forma natural en español latinoamericano contemporáneo. 'Aquella misma noche' sería igualmente válido pero introduce una distancia narrativa ligeramente mayor que el griego no impone.
- source_word: ἀνέλυσα θάψας
  english_pob_choice: after I had gone out and buried him
  chosen_spanish: después de haber salido a enterrarlo
  alternatives_spanish:
  - tras salir y enterrarlo
  - después de salir a darle sepultura
  - habiendo salido y enterrado
  lexicon: LSJ
  rationale: 'ἀνέλυσα (aoristo de ἀναλύω, ''partir, alejarse, salir'') y θάψας (participio aoristo de θάπτω, ''enterrar'') forman una construcción participial que indica acción previa. El POB en inglés opta por ''had gone out and buried him'' para clarificar la secuencia. ''Después de haber salido a enterrarlo'' absorbe la misma secuencia con naturalidad en español: la finalidad del salir implícita en ''a enterrarlo'' evita añadir una coordinación que resultaría más pesada.'
- source_word: ἐκοιμήθην
  english_pob_choice: I lay down to sleep
  chosen_spanish: me acosté
  alternatives_spanish:
  - me dormí
  - me eché a dormir
  - me recosté
  lexicon: LSJ
  rationale: κοιμάω en voz media/pasiva significa 'dormir' o 'acostarse a dormir'. En español, 'me acosté' evoca la acción concreta de tenderse, que es lo que la narrativa requiere (el incidente del versículo siguiente presupone que Tobías está tendido con el rostro expuesto). Agregar 'a dormir' sería redundante en español estándar; 'me acosté' ya contiene ese sentido en contexto narrativo.
- source_word: μεμιαμμένος
  english_pob_choice: in a defiled state
  chosen_spanish: en estado de impureza
  alternatives_spanish:
  - impuro
  - contaminado
  - en estado de contaminación ritual
  lexicon: LSJ
  rationale: Participio perfecto de μιαίνω ('contaminar, manchar ritualmente'). El tiempo perfecto indica un estado resultante que persiste en el momento de acostarse, producto del contacto con el cadáver. 'En estado de impureza' preserva la dimensión ritual del término (impureza levítica por contacto con un muerto) sin importar connotación moral que no está presente en el texto. 'Contaminado' en español moderno tiende a evocar contaminación física o moral; 'impuro' es más ambiguo. La frase nominal 'en estado de impureza' se mantiene fiel al participio de estado del griego.
- source_word: παρὰ τὸν τοῖχον τῆς αὐλῆς
  english_pob_choice: beside the wall of the courtyard
  chosen_spanish: junto al muro del patio
  alternatives_spanish:
  - junto a la pared del patio
  - al lado del muro del atrio
  - junto al muro del atrio
  lexicon: LSJ
  rationale: 'παρά + acusativo indica posición lateral (''junto a, al lado de''). τοῖχος es la pared de un edificio o recinto (distinto de τεῖχος, muralla de ciudad). αὐλή es el patio o corral de una vivienda doméstica. ''Muro del patio'' es preciso: ''muro'' evoca una pared de cerramiento o recinto mejor que ''pared'' (que tiende a asociarse con muros interiores); ''patio'' es el término más natural en el español latinoamericano para el αὐλή doméstico. ''Atrio'' evoca un espacio eclesiástico que no corresponde al contexto doméstico de Tobías.'
- source_word: τὸ πρόσωπόν μου ἀκάλυπτον ἦν
  english_pob_choice: my face was uncovered
  chosen_spanish: mi rostro estaba descubierto
  alternatives_spanish:
  - mi cara estaba descubierta
  - mi rostro quedó al descubierto
  lexicon: LSJ
  rationale: πρόσωπον es 'rostro/cara' (no κεφαλή, 'cabeza'). El POB inglés señala acertadamente que el griego dice 'cara', no 'cabeza', distinción que tiene relevancia narrativa para el episodio siguiente (los pájaros, la ceguera). 'Rostro' se prefiere sobre 'cara' por el registro levemente más elevado que corresponde a un texto deuterocanónico; ambos son exactos. ἀκάλυπτον ('descubierto, sin cubrir') se traduce por 'descubierto', calco directo sin forzar el español.
theological_decisions:
- issue: Impureza ritual por contacto con cadáver (μεμιαμμένος)
  english_pob_reading: in a defiled state
  chosen_spanish_reading: en estado de impureza
  alternative_spanish_readings:
  - impuro
  - contaminado
  - manchado
  rationale: 'El participio perfecto μεμιαμμένος describe impureza ritual derivada del contacto con un muerto (cf. Nm 19:11-22), no culpa moral ni pecado intencional. ''En estado de impureza'' preserva esa distinción en español: el sustantivo abstracto ''impureza'' se asocia más fácilmente con la categoría cultual que ''contaminación'' (que en español contemporáneo puede evocar contaminación ambiental o moral) o ''inmundicia'' (que en contextos bíblicos hispanos tradicionales arrastra connotaciones morales de la Reina-Valera). El POB inglés documenta esta distinción en su nota; la decisión española la mantiene sin resolverla artificialmente.'
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica antes que resolverla; la impureza ritual (categoría cultual) no debe asimilarse a culpa moral.'
- issue: El rostro descubierto como detalle narrativo-teológico
  english_pob_reading: my face was uncovered
  chosen_spanish_reading: mi rostro estaba descubierto
  alternative_spanish_readings:
  - mi cabeza estaba descubierta
  - mi rostro quedó expuesto
  rationale: 'El detalle del rostro sin cubrir (πρόσωπόν μου ἀκάλυπτον) no es ornamental: prepara directamente el episodio de v.10, donde las heces de gorriones caen sobre los ojos de Tobías, causando su ceguera. Mantener ''rostro'' (y no ''cabeza'') es fidelidad al texto griego y a su coherencia narrativa interna. Cualquier paráfrasis que lo borrara o suavizara suprimiría un elemento de la cadena causal del relato.'
  doctrine_reference: 'DOCTRINE.md: No parafrasear más allá de lo que el texto fuente justifica; preservar detalles narrativos con función estructural.'
translation_notes:
  revision_awareness: El pase de revisión más reciente del POB inglés (modelo gpt-5.4, 2026-04-23) no introdujo cambios. El cotejo cruzado (gemini-3.1-pro-preview) registra un veredicto de «major-issues» con índice de acuerdo 0,85, sin detallar las discrepancias específicas. El borrador español sigue de cerca el texto griego de Swete 1909 y las decisiones documentadas en el POB inglés, especialmente la distinción entre impureza ritual y culpa moral, que es el único punto de tensión teológica explícitamente señalado en el rastro de auditoría. La nota del POB inglés estaba anclada en la primera frase del texto inglés («on that very night[a]»), pero su contenido concierne inequívocamente a μεμιαμμένος; el borrador español corrige la ubicación del ancla y coloca [a] sobre la expresión que porta la tensión léxica («en estado de impureza[a]»).
  spanish_consistency_notes:
  - No aparece el nombre divino (YHWH/κύριος) ni cristología en este versículo; las convenciones 'Yahvé'/'Mesías' no se aplican.
  - '''Rostro'' se prefiere sobre ''cara'' para mantener el registro digno apropiado al texto deuterocanónico, sin alejarse del español moderno.'
  - '''Patio'' (no ''atrio'') para αὐλή doméstica: ''atrio'' evoca un espacio litúrgico en el español bíblico tradicional que no corresponde al contexto doméstico de Tobías.'
  - '''Muro'' (no ''pared'') para τοῖχος del recinto del patio: ''pared'' se asocia más con muros interiores en el uso latinoamericano.'
  - La locución 'en estado de impureza' se adopta como término técnico-ritual en el proyecto para μεμιαμμένος/μιαίνω en contextos de impureza levítica, distinguiéndola de 'contaminado' (impureza física/moral) e 'impuro' (excesivamente ambiguo en español bíblico tradicional).
