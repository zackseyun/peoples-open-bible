translation:
  language: es
  text: Pero ya no mencionaréis «la carga de Yahvé», porque la palabra de cada hombre llegará a ser su propia carga[a]; y habéis pervertido las palabras del Dios vivo, Yahvé de los ejércitos[b], nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oráculo de Yahvé». El hebreo מַשָּׂא puede significar «carga» o, en contextos proféticos, «oráculo/mensaje»; aquí el profeta parece explotar ambos sentidos.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la carga será su palabra». La idea probable es que lo que cada uno dice recaerá sobre él, en vez de ser una verdadera palabra de Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: burden
  chosen_spanish: carga
  alternatives_spanish:
  - oráculo
  - mensaje
  lexicon: HALOT, BDB
  rationale: 'En español, «carga» conserva el doble sentido del hebreo מַשָּׂא: peso literal y, en uso profético, “oráculo”. Mantiene mejor el juego de palabras del versículo que «oráculo» o «mensaje», sin perder inteligibilidad.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT, BDB
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: תִזְכְּרוּ
  english_pob_choice: you shall ... mention
  chosen_spanish: mencionaréis
  alternatives_spanish:
  - recordaréis
  - volveréis a mencionar
  lexicon: HALOT, BDB
  rationale: Con una fórmula citada como objeto, זכר puede tener el sentido de “mencionar” o “volver a traer a colación”. «Mencionaréis» expresa mejor la prohibición de usar la expresión como fórmula.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - nunca más
  - no más
  lexicon: HALOT, BDB
  rationale: «Ya no» es la equivalencia idiomática natural en español para לֹא ... עוֹד en una prohibición.
- source_word: הַמַּשָּׂא יִהְיֶה לְאִישׁ דְּבָרוֹ
  english_pob_choice: each man’s own word will become his burden
  chosen_spanish: la carga de cada hombre será su propia palabra
  alternatives_spanish:
  - para cada hombre la carga será su palabra
  - la carga será la palabra de cada hombre
  lexicon: HALOT, BDB
  rationale: 'La construcción hebrea es compacta y retórica. La versión española mantiene el paralelismo y el juego semántico: lo que se llamaba “carga” resultará ser la palabra propia del hablante.'
- source_word: לְאִישׁ
  english_pob_choice: each man’s
  chosen_spanish: de cada hombre
  alternatives_spanish:
  - de cada persona
  - de cada uno
  lexicon: HALOT, BDB
  rationale: «Hombre» refleja el valor de אִישׁ y conserva el distributivo del hebreo. «Cada» transmite el sentido individual.
- source_word: וַהֲפַכְתֶּם
  english_pob_choice: you have perverted
  chosen_spanish: habéis pervertido
  alternatives_spanish:
  - habéis torcido
  - habéis trastornado
  lexicon: HALOT, BDB
  rationale: El verbo aquí denota distorsión culpable de las palabras. «Habéis pervertido» reproduce el registro formal de la revisión inglesa y su fuerza ética.
- source_word: דִּבְרֵי אֱלֹהִים חַיִּים
  english_pob_choice: the words of the living God
  chosen_spanish: las palabras del Dios vivo
  alternatives_spanish:
  - las palabras del Dios viviente
  - las palabras del Dios que vive
  lexicon: HALOT, BDB
  rationale: «Dios vivo» es la equivalencia natural y teológicamente estable para אֱלֹהִים חַיִּים, conservando el valor confesional de la expresión.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT, BDB
  rationale: «De los ejércitos» conserva el campo metafórico del hebreo צְבָאוֹת mejor que opciones más interpretativas. Se mantiene la proximidad al título tradicional sin ocultar el nombre divino.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  lexicon: HALOT, BDB
  rationale: Traducción directa del posesivo inclusivo final, manteniendo la confesión de pertenencia del pueblo.
theological_decisions:
- issue: El nombre divino יהוה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio explícito del proyecto de transliterar el Nombre. Esto preserva la identidad personal y pactual de Dios en el pasaje, especialmente importante al final con el título completo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Juego de palabras sobre מַשָּׂא
  english_pob_reading: burden
  chosen_spanish_reading: carga
  alternative_spanish_readings:
  - oráculo
  - mensaje
  rationale: 'El texto reprende el uso banalizado de una fórmula profética y luego la vuelve contra quienes la usan. «Carga» permite reproducir en español la ironía central: la supuesta ‘carga de Yahvé’ termina siendo la carga propia del hablante.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Sentido de la frase final sobre ‘las palabras del Dios vivo’
  english_pob_reading: you have perverted the words of the living God
  chosen_spanish_reading: habéis pervertido las palabras del Dios vivo
  alternative_spanish_readings:
  - habéis torcido las palabras del Dios vivo
  - habéis trastornado las palabras del Dios vivo
  rationale: La elección conserva la acusación moral fuerte del hebreo y la revisión inglesa, evitando atenuar el reproche profético.
  doctrine_reference: 'DOCTRINE.md: Formal equivalence in prophetic rebuke passages'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó «twisted» por «perverted» para dar un registro más formal, y conserva la decisión estable de traducir מַשָּׂא con un término que sostenga el juego de palabras. En español, «carga» y «pervertido» reproducen mejor la tensión retórica y ética del verso que una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el texto para coherencia con el criterio del proyecto.
  - «Dios vivo» sigue el patrón terminológico bíblico habitual y evita una paráfrasis más interpretativa.
  - El juego semántico de מַשָּׂא se conserva con «carga» en ambas apariciones; la nota aclara la lectura alternativa sin perder el sentido principal.
  - Se usa el plural reverencial/dirigido «habéis» por adecuación al hebreo y al tono profético.
  - «Ejércitos» se conserva como equivalente del título divino צְבָאוֹת, no como “Almighty”, para mantener la imagen original.
