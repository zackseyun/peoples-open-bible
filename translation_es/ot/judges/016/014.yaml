translation:
  language: es
  text: 'Entonces la sujetó con el pasador y le dijo: «¡Los filisteos están sobre ti, Sansón!» Y él despertó de su sueño y arrancó[a] el pasador del telar y el tejido[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacó» o «tiró de». El verbo hebreo puede indicar una retirada enérgica; «arrancó» conserva la fuerza de la acción.
    reason: lexical_alternative
  - marker: b
    text: O «la tela tejida». El término hebreo se refiere al material producido en el telar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְקַע
  english_pob_choice: fastened
  chosen_spanish: aseguró
  alternatives_spanish:
  - fijó
  - sujetó
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar clavar, meter o asegurar firmemente. En este contexto de tejido, «aseguró» comunica la acción de fijar el cabello tejido al pasador sin forzar una imagen más técnica de la que el español necesita.
- source_word: בַּיָּתֵד
  english_pob_choice: with the pin
  chosen_spanish: con el pasador
  alternatives_spanish:
  - con el pin
  - con la estaca
  lexicon: HALOT
  rationale: El término puede significar «estaca», «pasador» o «pin». Como el contexto es el telar, «pasador» resulta natural en español y mantiene la idea de un elemento que sujeta en el tejido.
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  english_pob_choice: The Philistines are upon you
  chosen_spanish: ¡Los filisteos están sobre ti!
  alternatives_spanish:
  - ¡Los filisteos están encima de ti!
  - ¡Los filisteos vienen contra ti!
  lexicon: HALOT
  rationale: Se conserva el giro idiomático de alarma. «Están sobre ti» reproduce mejor la urgencia y la fórmula hebrea que una paráfrasis como «vienen contra ti».
- source_word: וַיִּיקַץ מִשְּׁנָתוֹ
  english_pob_choice: he awoke from his sleep
  chosen_spanish: despertó de su sueño
  alternatives_spanish:
  - se despertó de su sueño
  - despertó
  lexicon: HALOT
  rationale: La frase hebrea es directa y narrativa. «Despertó de su sueño» mantiene el registro sobrio y la referencia explícita al sueño.
- source_word: וַיִּסַּע
  english_pob_choice: pulled away
  chosen_spanish: arrancó
  alternatives_spanish:
  - sacó
  - tiró de y quitó
  lexicon: HALOT
  rationale: El verbo puede implicar retirar con fuerza. «Arrancó» expresa bien la fuerza de la acción en español y corresponde a la nota inglesa sobre una remoción violenta o firme.
- source_word: הַיְתַד הָאֶרֶג
  english_pob_choice: the pin of the loom
  chosen_spanish: el pasador del telar
  alternatives_spanish:
  - el pasador del tejido
  - el pin del telar
  lexicon: HALOT
  rationale: La construcción hebrea nombra el implemento asociado al telar. «Del telar» refleja la relación genitiva, y «pasador» conserva un término claro y no excesivamente técnico.
- source_word: הַמַּסָּכֶת
  english_pob_choice: the web
  chosen_spanish: el tejido
  alternatives_spanish:
  - la malla
  - la tela tejida
  lexicon: HALOT
  rationale: El sustantivo se refiere al material tejido. «Tejido» es una equivalencia natural en español y evita una palabra como «red» que podría confundir el contexto textil.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés en su decisión final de reflejar la construcción hebrea de הַיְתַד הָאֶרֶג como un sintagma genitivo («pin of the loom»). En español se optó por una forma igualmente directa («pasador del telar») y se mantuvo la fuerza verbal de וַיִּסַּע con un verbo de extracción enérgica. No se añadió ninguna lectura doctrinal; el pasaje es narrativo y las notas se limitan a alternativas léxicas y de estilo.
  spanish_consistency_notes:
  - Se mantuvo «filisteos» en minúscula como etnónimo común en español.
  - Se evitó «SEÑOR» o equivalentes porque este versículo no contiene el nombre divino.
  - «Tejido» se usa de modo técnico-sobrio para no confundir la imagen con una red no textil.
  - La puntuación reproduce el tono directo y dramático del original hebreo.
