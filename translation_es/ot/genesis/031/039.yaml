    text: «Desgarrado» traduce el hebreo de un animal atacado y despedazado por fieras; también podría expresarse «despedazado».
    reason: lexical_alternative
  - marker: b
    text: O «me lo exigías a mí». La expresión «de mi propia mano» conserva el modismo hebreo de responsabilidad personal.
    reason: lexical_alternative
  revision_rationale: Se corrige «No te llevé» a «No te traje» para reflejar correctamente el movimiento hacia el destinatario. Se cambia «respondía por él» por «asumía la pérdida» para representar mejor el sentido de cargar con la pérdida. Se ajusta «de mi mano» a «de mi propia mano» y se añade nota para conservar el modismo hebreo con español más natural.
