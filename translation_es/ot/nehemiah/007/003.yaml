base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/007/003.yaml
  text: And I said to them[a], “The gates of Jerusalem must not be opened until the sun is hot. While they are still standing guard, let them shut the doors and fasten them. And appoint guards from the inhabitants of Jerusalem[c][b], each at his watch and each opposite his own house.”
  footnotes:
  - marker: a
    text: Or “until the sun grows hot,” that is, not merely at sunrise but later in the morning.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “hold them”; in context this means to fasten or secure the doors after shutting them.
    reason: lexical_alternative
  - marker: c
    text: Or “appoint watches from among the inhabitants of Jerusalem.” The Hebrew term can refer either to guards or to guard-duties/watches.
    reason: lexical_alternative
