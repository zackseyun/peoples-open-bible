translation:
  language: es
  text: Sean silenciados[a][d][c][b] los labios mentirosos, que hablan con arrogancia contra el justo, con orgullo y desprecio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «queden mudos»; el verbo hebreo puede expresar llegar a estar en silencio o ser silenciado.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «contra un justo»; el singular hebreo puede referirse a una persona justa individual o funcionar de manera representativa.'
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea detrás de «con arrogancia» nombra insolencia o altivez, aquí aplicada al modo de hablar.
    reason: lexical_alternative
  - marker: d
    text: 'También: «hablan arrogantemente».'
    reason: previous_rendering
lexical_decisions:
- source_word: תֵּאָלַמְנָה
  english_pob_choice: Let ... be silenced
  chosen_spanish: Sean enmudecidos
  alternatives_spanish:
  - Que sean silenciados
  - Queden mudos
  - Sean hechos callar
  lexicon: HALOT
  rationale: El nifal imperfecto/jusivo femenino plural expresa quedar en silencio o ser enmudecido. En español, "Sean enmudecidos" conserva el valor desiderativo/impetratorio y la posible pasividad sin perder naturalidad.
- source_word: שִׂפְתֵי שָׁקֶר
  english_pob_choice: lying lips
  chosen_spanish: los labios mentirosos
  alternatives_spanish:
  - los labios de falsedad
  - los labios falsos
  lexicon: HALOT
  rationale: La construcción literal es "labios de falsedad"; sin embargo, "labios mentirosos" comunica bien el sentido moral de engaño y mantiene la personificación del verso en un español idiomático.
- source_word: הַדֹּבְרוֹת
  english_pob_choice: which speak
  chosen_spanish: que hablan
  alternatives_spanish:
  - que hablan
  - las que hablan
  - las cuales hablan
  lexicon: HALOT
  rationale: El participio femenino plural concuerda con "labios" y funciona atributivamente. "Que hablan" conserva la relación relativa sin endurecer la sintaxis española.
- source_word: עַל צַדִּיק
  english_pob_choice: against the righteous
  chosen_spanish: contra el justo
  alternatives_spanish:
  - contra el justo
  - contra el inocente
  - contra un justo
  lexicon: HALOT
  rationale: El singular puede ser representativo o individual. "El justo" preserva la fuerza sustantiva y la referencia al inocente/righteous person sin añadir género ni especificación innecesaria.
- source_word: עָתָק
  english_pob_choice: arrogantly
  chosen_spanish: con arrogancia
  alternatives_spanish:
  - arrogantemente
  - con insolencia
  - de manera arrogante
  lexicon: HALOT
  rationale: El término denota insolencia, arrogancia o altivez. En español, la forma adverbial natural es "con arrogancia", que refleja el matiz de habla altiva sin sonar forzada.
- source_word: בְּגַאֲוָה
  english_pob_choice: with pride
  chosen_spanish: con orgullo
  alternatives_spanish:
  - en orgullo
  - con soberbia
  - con altivez
  lexicon: HALOT
  rationale: La preposición con el sustantivo indica manera. "Con orgullo" es transparente y conserva el sentido de elevación propia o soberbia contextual.
- source_word: וָבוּז
  english_pob_choice: and contempt
  chosen_spanish: y desprecio
  alternatives_spanish:
  - y desprecio
  - y escarnio
  - y desdén
  lexicon: HALOT
  rationale: בּוּז expresa desprecio o escarnio. "Desprecio" empareja bien con "orgullo" y reproduce la dureza del cierre del verso.
theological_decisions:
- issue: ¿Cómo traducir el valor impetratorio del verbo?
  english_pob_reading: Let ... be silenced
  chosen_spanish_reading: Sean enmudecidos
  alternative_spanish_readings:
  - Que sean silenciados
  - Queden mudos
  rationale: El verso es una imprecación/petición fuerte. "Sean enmudecidos" mantiene el tono de deseo judicial o suplicatorio sin convertirlo en mera descripción.
  doctrine_reference: Salmos imprecatorios; lenguaje de petición ante la injusticia
- issue: ¿Cómo reflejar el singular de צַדִּיק?
  english_pob_reading: the righteous / a righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - los justos
  - un justo
  rationale: El singular hebreo puede funcionar de modo representativo. "El justo" conserva esa ambigüedad útil, sin perder el carácter colectivo que la nota inglesa deja abierto.
  doctrine_reference: Uso representativo del singular en poesía hebrea
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el packet hebreo y el audit trail inglés. Se conservó la acumulación retórica de cuatro rasgos: silencio/enmudecimiento, habla insolente, orgullo y desprecio. Se eligieron equivalentes españoles naturales sin diluir la tensión semántica entre insolencia (modo de hablar), orgullo (actitud) y desprecio (desenlace).'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto en otros pasajes; este versículo no contiene el nombre divino.
  - Se mantuvo «el justo» para preservar la ambigüedad representativa del singular hebreo.
  - «Con arrogancia» y «con orgullo» se distinguen para evitar redundancia excesiva en español, aunque el hebreo agrupa matices cercanos para énfasis retórico.
