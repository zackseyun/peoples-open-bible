translation:
  language: es
  text: Serán llevados a Babilonia[a], y allí permanecerán hasta el día en que los atienda[b], declara Yahvé. Entonces los haré subir[c] y los restauraré a este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán traídos a Babilonia». El pasivo hebreo puede entenderse como traslado o conducción hacia Babilonia.
    reason: lexical_alternative
  - marker: b
    text: O «los visite». El verbo hebreo puede significar atender, visitar o intervenir; aquí el contexto favorece una intervención restauradora, no punitiva.
    reason: lexical_alternative
  - marker: c
    text: O «los traeré de regreso». El hebreo dice literalmente «los haré subir», una expresión común para el retorno del exilio a la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - a Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional de lugar expresa movimiento hacia Babilonia; en español, la preposición natural es «a». Se evita una perífrasis más larga que no añade precisión.
- source_word: יוּבָאוּ
  english_pob_choice: will be brought
  chosen_spanish: serán llevados
  alternatives_spanish:
  - serán traídos
  - serán transportados
  lexicon: HALOT
  rationale: El pasivo causativo expresa que otros los conducen o trasladan. «Serán llevados» conserva la pasividad y suena natural en español bíblico actual.
- source_word: וְשָׁמָּה יִהְיוּ
  english_pob_choice: and there they will remain
  chosen_spanish: y allí permanecerán
  alternatives_spanish:
  - y allí estarán
  - y allí se quedarán
  lexicon: HALOT
  rationale: El verbo «ser/estar» con marcador locativo comunica permanencia; «permanecerán» refleja mejor la duración que una mera copula.
- source_word: עַד י֣וֹם פָּקְדִי אֹתָם
  english_pob_choice: until the day I attend to them
  chosen_spanish: hasta el día en que los atienda
  alternatives_spanish:
  - hasta el día en que los visite
  - hasta el día en que me acuerde de ellos
  lexicon: HALOT
  rationale: פָּקַד puede implicar visitar, atender o intervenir. Se eligió «atienda» para conservar la amplitud del verbo sin fijarlo indebidamente en castigo, en armonía con el contexto de restauración.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - afirma Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme a la terminología del proyecto, y la fórmula profética se vierte de manera directa y sobria con «declara».
- source_word: וְהַעֲלִיתִי/ם
  english_pob_choice: I will bring them up
  chosen_spanish: los subiré
  alternatives_spanish:
  - los haré subir
  - los traeré arriba
  lexicon: HALOT
  rationale: El hifil de עלה conserva la imagen de ascenso desde el exilio de regreso a la tierra. «Los subiré» mantiene esa imaginería hebrea sin sobreexplicarla.
- source_word: וַהֲשִׁיבֹתִי/ם
  english_pob_choice: and restore them
  chosen_spanish: y los restauraré
  alternatives_spanish:
  - y los haré volver
  - y los devolveré
  lexicon: HALOT
  rationale: שׁוּב en hifil con objeto puede significar hacer volver. «Restauraré» comunica el retorno con un matiz de restablecimiento que encaja con el contexto y preserva la idea de regreso.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - a este lugar aquí
  lexicon: HALOT
  rationale: Se conserva «lugar» en vez de expandir a «tierra», porque el hebreo dice literalmente «este lugar» y el contexto puede apuntar a Jerusalén/Judá sin necesidad de especificarlo en la traducción.
theological_decisions:
- issue: Sentido de פקד en un contexto de retorno
  english_pob_reading: favorable visitation leading to restoration
  chosen_spanish_reading: atención/intervención favorable que desemboca en restauración
  alternative_spanish_readings:
  - visita judicial
  - castigo
  - simple visita
  rationale: El contexto inmediato promete que Dios los «subirá» y «restaurará» al lugar, por lo que la acción de פקד no debe leerse como castigo. «Los atienda» mantiene la amplitud semántica y la tensión textual entre visita, atención e intervención.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Nombre divino YHWH
  english_pob_reading: the LORD / Yahweh distinction in audit trail
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrama, usando «Yahvé» en el texto principal en vez de sustituirlo por un título. Esto preserva la forma del nombre propio revelado en el texto fuente.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios sustantivos respecto del inglés POB auditado. Se preserva la lectura restaurativa de פקד y la imaginería de ‘subir’/‘hacer volver’ del hebreo, con equivalentes españoles naturales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con los criterios del proyecto para יהוה.
  - Se mantiene «Babilonia» como destino con preposición direccional natural («a Babilonia»).
  - «Los subiré» y «los restauraré» conservan la secuencia hebrea de ascenso y retorno sin expandir el referente de «este lugar».
  - «Los atienda» evita resolver demasiado pronto la amplitud de פקד, dejando visible la tensión lexical documentada.
