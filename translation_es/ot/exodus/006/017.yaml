translation:
  language: es
  text: 'Los hijos de Gersón: Libni y Simei[a], según sus clanes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus familias». El término hebreo puede designar grupos extensos de parentesco o clanes dentro de una tribu.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos de familia de
  lexicon: HALOT
  rationale: En una lista genealógica, el constructo plural introduce una relación de filiación directa. «Hijos de» conserva esa forma breve y natural en español, sin ampliar indebidamente a «descendientes».
- source_word: גֵרְשׁוֹן
  english_pob_choice: Gershon
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gershon
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio con una transliteración española usual y legible. «Gersón» evita una forma híbrida y se adapta mejor a la ortografía española.
- source_word: לִבְנִי
  english_pob_choice: Libni
  chosen_spanish: Libni
  alternatives_spanish:
  - Libní
  lexicon: Nombre propio transliterado
  rationale: Nombre propio; se mantiene sin traducir. La forma llana «Libni» es clara y evita añadir acento sin evidencia textual para una adaptación distinta.
- source_word: וְשִׁמְעִי
  english_pob_choice: and Shimei
  chosen_spanish: y Simei
  alternatives_spanish:
  - y Shimei
  - y Simí
  lexicon: Nombre propio transliterado
  rationale: La conjunción se traduce de manera directa. Para el nombre, «Simei» es una transliteración española conocida y más natural que conservar la grafía inglesa.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: En contexto genealógico/tribal, מִשְׁפָּחָה puede referirse a una unidad de linaje o clan. «Según sus clanes» mantiene el valor social más amplio que «familias» y refleja bien la fórmula enumerativa.
translation_notes:
  revision_awareness: La fuente inglesa mantiene una nota alternativa para לְמִשְׁפְּחֹתָם; la versión española conserva esa ambigüedad con una nota equivalente y mantiene la estructura genealógica breve del texto hebreo. No se detectan revisiones textuales recientes que afecten este versículo.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico con dos puntos tras el nombre del patriarca, siguiendo la economía del hebreo y la solución inglesa auditada.
  - «Clanes» se usa aquí por coherencia con el valor tribal de מִשְׁפָּחָה; la nota preserva la alternativa «familias».
  - Los nombres propios se adaptan a una forma española estable y legible, sin introducir equivalencias interpretativas.
