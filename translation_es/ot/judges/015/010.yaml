review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: sujeto colectivo «los hombres de Judá», pregunta de motivo, repetición de עלה («subir»), propósito de «atar» a Sansón, y la cláusula retributiva final. Sin embargo, la última frase española «como él nos hizo a nosotros» suena incompleta o poco idiomática en español porque «hacer» normalmente requiere complemento explícito; el sentido fuente es «hacerle a él tal como él nos hizo a nosotros», es decir, tratarlo del mismo modo. Conviene explicitar levemente el objeto implícito sin añadir contenido nuevo.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «han subido contra nosotros» y «hemos subido» resultan algo tiesos en español latinoamericano aunque todavía comprensibles. La principal dificultad de legibilidad está en «para hacerle como él nos hizo a nosotros», que suena forzado. Una reparación mínima a «para hacer con él tal como él hizo con nosotros» mejora notablemente la naturalidad y preserva la simetría retributiva.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece el nombre divino ni términos doctrinales sensibles. «Sansón» es correcto. «Atar» para לֶאֱסוֹר es aceptable. La repetición de «subir» conserva la decisión léxica auditada, aunque en español sea algo rígida.
  issues:
  - severity: medium
    issue: La cláusula final «como él nos hizo a nosotros» es poco idiomática y semánticamente incompleta en español.
    rationale: Aunque reproduce de cerca el verbo hebreo עשה, en español «hacer a alguien» sin complemento suele sonar defectuoso. El hebreo permite elipsis por el contexto retributivo; en español conviene explicitar una formulación natural equivalente como «hacer con él tal como él hizo con nosotros».
  - severity: low
    issue: Puntuación exterior innecesaria alrededor de las comillas.
    rationale: 'En español es más limpio: dijo: «...». El punto fuera de la pregunta y antes de cerrar la oración principal no es necesario aquí.'
  revised_spanish_text: 'Y los hombres de Judá dijeron: «¿Por qué han subido contra nosotros?». Y ellos dijeron: «Hemos subido para atar a Sansón, para hacer con él tal como él hizo con nosotros».

