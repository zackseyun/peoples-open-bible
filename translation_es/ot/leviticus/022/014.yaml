revisions:
- from: Y si un hombre[a] come inadvertidamente[b] una cosa santa, entonces añadirá un quinto[c] sobre ello y dará la cosa santa al sacerdote.
  to: Y si un hombre[a] come inadvertidamente[b] algo santo, entonces le añadirá un quinto[c] y dará lo santo al sacerdote.
  rationale: Se revisa para eliminar el calco antinatural «sobre ello» y para mejorar la idiomaticidad de קֹדֶשׁ en español sin perder su amplitud semántica. «Algo santo ... lo santo» preserva el vínculo léxico entre ambas ocurrencias y sigue siendo suficientemente amplio para alimento o propiedad consagrada. «Le añadirá un quinto» comunica con claridad la restitución requerida.
