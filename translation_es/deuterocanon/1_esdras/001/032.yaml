- from: Y los de la nación tomaron a Jeconías, hijo de Josías, y lo proclamaron rey en lugar de Josías su padre[a], cuando tenía veintitrés años.
  to: Y los del pueblo tomaron a Jeconías, hijo de Josías, y lo hicieron rey en lugar de Josías su padre[a], cuando tenía veintitrés años.
  rationale: Se ajusta «los de la nación» a «los del pueblo» para mejorar la naturalidad y reflejar mejor el referente colectivo en contexto histórico, sin importar el modismo hebreo paralelo. Se cambia «lo proclamaron rey» por «lo hicieron rey» para alinearse mejor con el valor más general de ἀνέδειξαν y con la decisión del POB inglés, evitando sobreespecificar una ceremonia. Se conserva la nota sobre la divergencia onomástica griega/paralela y la cláusula de edad, que es idiomática en español.
