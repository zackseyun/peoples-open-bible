base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/015.yaml
  text: But you trusted in your beauty[a], and you prostituted yourself because of your fame, and you poured out your prostitutions on every passerby[b]; his it was.
  footnotes:
