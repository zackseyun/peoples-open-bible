  to: 'Él dijo[a]: «Bien. Haré un pacto contigo. Solo una cosa te pido: no verás mi rostro[b] a menos que primero me traigas a Mical, hija de Saúl, cuando vengas a ver mi rostro».'
  rationale: Se reemplaza «hasta que» por «a menos que» para reflejar fielmente el valor exceptivo-condicional de כִּי אִם y del inglés auditado «unless». Se conserva «primero» para expresar la prioridad temporal de לִפְנֵי. También se ajusta la nota léxica para que describa con más precisión la expresión hebrea preservada en el texto principal.
