revisions:
- from: 'Entonces llevaron el tabernáculo a Moisés: la tienda y todos sus muebles; sus [a]clavijas, sus marcos, sus barras, sus pilares[b] y sus bases.'
  to: 'Entonces llevaron el tabernáculo a Moisés: la tienda y todos sus enseres; sus broches, sus marcos[a], sus barras, sus pilares y sus bases[b].'
  rationale: 'Se corrigen dos problemas de fidelidad léxica y uno de documentación. «Broches» refleja mejor קְרָסָיו que «clavijas». «Enseres» evita la limitación semántica de «muebles» y cubre bien tanto objetos como componentes del tabernáculo. Se reubican las notas para alinearlas con las alternativas preservadas por el POB inglés: «marcos/tablas» y «bases/zócalos».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea general: trajeron el tabernáculo a Moisés, especificado como la tienda y sus componentes. Sin embargo, dos elecciones léxicas se apartan del sentido documentado en el audit trail: קְרָסָיו se tradujo como «clavijas», que no refleja bien las piezas de unión tipo broches/ganchos/clasps; y la nota colocada en «pilares» no corresponde al lugar donde el inglés preservó alternativa. Además, falta una nota para «bases» que sí está documentada en el POB inglés.'
  spanish_quality_summary: El español es legible y digno, pero «todos sus muebles» suena demasiado doméstico y estrecho para abarcar componentes estructurales como marcos, barras y bases. «Todos sus utensilios» tampoco es ideal; una opción más amplia y natural es «todos sus enseres». También conviene quitar el espacio intrusivo antes de la nota en «sus [a]clavijas» y reubicar las notas para que anclen correctamente.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. «Tabernáculo» y «Moisés» están bien. La revisión principal afecta terminología cultual/estructural: usar «broches» para קְרָסָיו, mantener «marcos» para קְרָשָׁיו con nota de alternativa «tablas», y conservar «bases» con nota de alternativa «zócalos» o mejor «encajes/sockets» en español explicativo.'
  issues:
  - severity: high
    issue: «clavijas» para קְרָסָיו
    rationale: El hebreo y el audit trail inglés apuntan a piezas de unión tipo «clasps», no a clavijas. «Broches» o «ganchos» preserva mejor la función de sujetar y enlazar.
  - severity: medium
    issue: «todos sus muebles» para כָּל כֵּלָיו
    rationale: «Muebles» en español reduce el campo semántico y suena doméstico; el contexto incluye piezas estructurales. «Enseres» es más amplio y natural.
  - severity: medium
    issue: Notas desalineadas con el audit trail
    rationale: La nota inglesa preserva alternativa para «frames/boards» y para «bases/sockets», no para «pillars». En español conviene mantener esas alternativas donde corresponden.
  - severity: low
    issue: Anclaje tipográfico de la nota
    rationale: La forma «sus [a]clavijas» es poco natural; el marcador debe ir adjunto a la palabra pertinente, por ejemplo «broches[a]».
