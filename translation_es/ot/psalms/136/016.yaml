translation:
  language: es
  text: al que condujo a su pueblo en el desierto[a], porque su amor leal[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el desierto». El hebreo usa literalmente la preposición «en»; aquí se conserva «en el desierto» como traducción más directa, aunque con un verbo de guía también puede entenderse el sentido de recorrido.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo חֶסֶד (ḥésed): término que también puede traducirse como «amor constante», «fidelidad pactal», «amor fiel» o, según el contexto, «misericordia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמוֹלִיךְ
  english_pob_choice: to him who led
  chosen_spanish: al que condujo
  alternatives_spanish:
  - al que guio
  - al que hizo ir
  lexicon: HALOT
  rationale: El participio causativo con לְ funciona como referencia a Dios, por lo que en español la construcción natural es «al que condujo». «Condujo» conserva la idea de guía efectiva sin perder el matiz causativo de hacer avanzar a su pueblo.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su nación
  - a su gente
  lexicon: HALOT
  rationale: עַם en este contexto es el pueblo pactal de Dios. «Pueblo» mantiene la relación de pertenencia y evita debilitar el sentido covenantal con un término más genérico.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la estepa
  lexicon: HALOT
  rationale: El hebreo usa literalmente «en». En español, «desierto» es la forma más natural y bíblicamente comprensible para מִדְבָּר. Se evita «por el desierto» porque añadiría movimiento no explicitado por la revisión del texto fuente.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia constante
  - su amor fiel
  lexicon: HALOT
  rationale: חֶסֶד es un término de amplitud pactal. «Amor leal» conserva la dimensión afectiva y de fidelidad sin reducirlo solo a «amor» ni desplazarlo por completo a «misericordia». Esta elección intenta mantener la tensión semántica documentada por la POB.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: El hebreo expresa duración perpetua; en español, el refrán litúrgico queda más claro y conciso con «para siempre». La idea de permanencia queda apoyada por el sintagma completo «para siempre es su amor leal».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En esta línea responsorial, «porque» introduce de manera natural el fundamento de la alabanza. Aunque «for» puede sonar más litúrgico en inglés, en español «porque» comunica mejor la relación causal sin solemnidad artificial.
theological_decisions:
- issue: Renderización de חֶסֶד en el refrán
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: porque para siempre es su amor leal
  alternative_spanish_readings:
  - porque para siempre es su amor constante
  - porque para siempre es su misericordia
  rationale: Se preserva el rango semántico pactal de חֶסֶד sin reducirlo a una sola noción. «Amor leal» equilibra afecto y fidelidad, manteniendo la fuerza teológica del refrán del Salmo 136.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al mantener «en el desierto» en vez de expandir a «por/through el desierto». También conserva el refrán final con una solución española equivalente que refleja la duratividad de לְעוֹלָם y la amplitud de חֶסֶד.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene «pueblo» para עַם en sentido pactal/nacional, coherente con el resto del proyecto.
  - Se evita «Señor» como sustituto de nombres divinos porque el hebreo aquí no lo exige.
  - «Desierto» se prefiere sobre «yermo» o «estepa» por claridad bíblica y naturalidad en español.
  - La frase final se formula como estructura copulativa en español para conservar el carácter de refrán litúrgico.
