translation:
  language: es
  text: Y ahora, he aquí[a], el clamor de los hijos de Israel ha llegado a mí[b], y también he visto la opresión con que los egipcios los oprimen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira»; la partícula hebrea llama la atención sobre lo que sigue.
    reason: lexical_alternative
  - marker: b
    text: O «ha venido a mí». El hebreo dice literalmente «ha venido/llegado a mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva y la continuidad del discurso. En español, «Y ahora» suena natural y mantiene el valor conjuntivo del hebreo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: HALOT
  rationale: Es una partícula de atención. «Mira» comunica el llamado a fijarse en algo sin recurrir a un giro arcaico innecesario; además, el POB inglés revisó desde una opción más coloquial a «behold», pero en español «he aquí» puede sonar más rígido que el registro meta deseado.
- source_word: צַעֲקַת
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - el clamor
  - la súplica
  lexicon: HALOT
  rationale: El sustantivo denota un clamor nacido de la angustia. «Clamor» conserva fuerza y gravedad; «grito» sería más estrecho, y «súplica» añade una matización no explícita en el sustantivo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva el giro genealógico/covenantal del hebreo. En español, «hijos de Israel» es claro y natural; mantiene mejor la forma fuente que «israelitas», que neutraliza el vínculo filial.
- source_word: בָּאָה אֵלַי
  english_pob_choice: has come to me
  chosen_spanish: ha llegado hasta mí
  alternatives_spanish:
  - ha venido a mí
  - ha llegado a mí
  lexicon: HALOT
  rationale: El verbo básico es «venir/llegar». «Ha llegado hasta mí» reproduce bien la idea de que el clamor ha alcanzado a Dios sin sobrecargar el texto.
- source_word: רָאִיתִי
  english_pob_choice: I have also seen
  chosen_spanish: también he visto
  alternatives_spanish:
  - y he visto también
  - he visto además
  lexicon: HALOT
  rationale: El perfecto expresa una acción con vigencia presente. «También he visto» mantiene ese valor y enlaza con el clamor recibido.
- source_word: הַלַּחַץ
  english_pob_choice: the oppression
  chosen_spanish: la opresión
  alternatives_spanish:
  - la aflicción
  - la presión
  - el atropello
  lexicon: HALOT
  rationale: El sustantivo apunta a opresión/coacción. «Opresión» es la equivalencia principal más fiel al contexto de Egipto.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  - los egipcios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es el nombre geográfico, aquí funciona colectivamente como sujeto que oprime. La revisión inglesa ya corrigió hacia el plural; en español, «los egipcios» preserva esa referencia colectiva y evita una construcción menos precisa.
- source_word: לֹחֲצִים
  english_pob_choice: are oppressing
  chosen_spanish: oprimen
  alternatives_spanish:
  - están oprimiendo
  - los oprimen
  lexicon: HALOT
  rationale: 'El participio expresa acción continua. En español, el presente simple comunica con naturalidad el valor durativo/contextual: «los oprimen».'
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los
  lexicon: HALOT
  rationale: Pronombre objeto directo que retoma a los hijos de Israel. «Los» es breve y fiel; el contexto elimina ambigüedad.
theological_decisions:
- issue: Preservación de la designación filial/covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se mantiene la forma de parentesco masculina del hebreo, como lo hace el POB inglés. «Los israelitas» sería más neutral pero borra la imagen filial; «los hijos de Jacob» introduce un equivalente no presente en el versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de הִנֵּה como partícula de atención
  english_pob_reading: behold
  chosen_spanish_reading: mira
  alternative_spanish_readings:
  - he aquí
  rationale: La función es llamar la atención del oyente. «Mira» preserva esa fuerza en un español contemporáneo y digno, sin pérdida doctrinal ni textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Sujeto colectivo de מִצְרַיִם en la segunda cláusula
  english_pob_reading: the Egyptians
  chosen_spanish_reading: los egipcios
  alternative_spanish_readings:
  - Egipto
  rationale: La forma hebrea del nombre geográfico opera aquí como sujeto colectivo humano. Traducir «los egipcios» refleja mejor el agente personal de la opresión y evita una personificación geográfica innecesaria.
  doctrine_reference: Aplicación del ajuste revisionario auditado en el POB inglés
translation_notes:
  revision_awareness: El POB inglés revisó este versículo de una formulación más coloquial («look») a «behold» y corrigió el sujeto colectivo de מִצְרַיִם a «the Egyptians». La presente propuesta sigue esa revisión en cuanto al valor de atención de הִנֵּה y al agente plural de la opresión, pero adapta el registro a un español natural y digno.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el hablante del versículo sin introducir «SEÑOR», conforme al texto fuente.
  - Se preserva la distinción entre el clamor recibido y la opresión vista en dos cláusulas coordinadas.
  - El presente español («oprimen») refleja el participio hebreo de acción continua sin convertirlo en un simple pasado.
