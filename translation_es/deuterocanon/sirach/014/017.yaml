  - severity: medium
    issue: «Morir, morirán» suena poco idiomático en español
    rationale: Aunque busca reproducir la fuerza enfática, la forma infinitivo + futuro queda abrupta y puede distraer. «Muriendo, morirán» mantiene la extrañeza retórica, refleja mejor el valor enfático/documentado en la nota y resulta más inteligible para lectores hispanos.
