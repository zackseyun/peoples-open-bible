id: 1TI.1.17
reference: 1 Timothy 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τῷ δὲ βασιλεῖ τῶν αἰώνων, ἀφθάρτῳ, ἀοράτῳ, ⸀μόνῳ θεῷ, τιμὴ καὶ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/017.yaml
  text: Now to the King of the ages[a], immortal, invisible, the only God, be honor and glory forever and ever. Amen.
  footnotes:
  - marker: a
    text: 'Some manuscripts read: "the only wise God."'
    reason: textual_variant
translation:
  language: ko
  text: 영원하신 왕[a], 곧 죽지 않으시고 보이지 않으시는 유일하신 하나님께 존귀와 영광이 영원무궁토록 있기를 빕니다. 아멘.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「유일하시고 지혜로우신 하나님」으로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: τῷ βασιλεῖ τῶν αἰώνων
  english_pob_choice: to the King of the ages
  chosen_korean: 영원하신 왕
  alternatives_korean:
  - 만세의 왕
  - 모든 시대의 왕
  lexicon: BDAG
  rationale: αἰών의 복수 속격은 「모든 시대·영원」의 어감. 「영원하신 왕」이 한국어로 자연스럽다.
- source_word: ἀφθάρτῳ
  english_pob_choice: immortal
  chosen_korean: 죽지 않으시고
  alternatives_korean:
  - 썩지 않으시는
  - 불멸하시는
  lexicon: BDAG
  rationale: ἄφθαρτος는 「썩지 않음·불멸」. 「죽지 않으시고」가 자연스럽고 본문의 신적 속성을 살린다.
- source_word: ἀοράτῳ
  english_pob_choice: invisible
  chosen_korean: 보이지 않으시는
  alternatives_korean:
  - 눈에 보이지 않으시는
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: μόνῳ θεῷ
  english_pob_choice: the only God
  chosen_korean: 유일하신 하나님
  alternatives_korean:
  - 한 분이신 하나님
  - 홀로 하나이신 하나님
  lexicon: BDAG
  rationale: μόνος의 유일성을 「유일하신」으로 자연스럽게 담는다.
- source_word: τιμὴ καὶ δόξα
  english_pob_choice: honor and glory
  chosen_korean: 존귀와 영광
  alternatives_korean:
  - 영예와 영광
  lexicon: BDAG
  rationale: 「존귀」가 τιμή의 신적 송영 어감을 가장 잘 담는다.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_korean: 영원무궁토록
  alternatives_korean:
  - 영원에서 영원까지
  - 세세토록
  lexicon: BDAG
  rationale: 송영의 정형구를 한국 교회 정립 어휘 「영원무궁토록」으로 옮긴다.
