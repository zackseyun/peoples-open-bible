base_translation:
  language: en
  yaml_path: translation/ot/isaiah/051/015.yaml
  text: For I am Yahweh your God[b][a], who stirs up the sea so that its waves roar— Yahweh of hosts is his name.
  footnotes:
  - marker: a
    text: Or 'who stills the sea, so that its waves roar'; the Hebrew participle can be understood as 'stir up' or 'still/calm' depending on context, though the following clause here favors 'stirs up.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the LORD of hosts is his name.'' Some English translations smooth this to ''is my name,'' but the Hebrew text has third person.'
    reason: alternative_reading
