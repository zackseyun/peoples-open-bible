translation:
  language: es
  text: Como el sonido de carros, saltan[a] sobre las cimas de los montes[b]; como el sonido de una llama de fuego que consume rastrojo; como un pueblo poderoso, en orden de batalla[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brincan» o «danzan»; el verbo hebreo puede denotar un movimiento vivo y saltado. Aquí se traduce «saltan» para ajustarse a la imagen de avance militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre las cabezas de los montes».
    reason: lexical_alternative
  - marker: c
    text: O «preparado para la guerra» / «dispuesto para la batalla». El hebreo subraya una formación militar ordenada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּקוֹל / קוֹל
  english_pob_choice: Like the sound of
  chosen_spanish: Como el sonido de
  alternatives_spanish:
  - Como la voz de
  - Como el ruido de
  lexicon: HALOT
  rationale: קוֹל aquí denota sonido audible; en español, «como el sonido de» conserva bien la comparación y evita un giro menos natural como «como la voz de».
- source_word: מַרְכָּבוֹת
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros
  lexicon: HALOT
  rationale: «Carros» reproduce el referente básico sin añadir una especificación militar que el hebreo no explicita directamente; el contexto bélico queda claro por la imagen general.
- source_word: עַל רָאשֵׁי הֶהָרִים
  english_pob_choice: on the tops of the mountains
  chosen_spanish: sobre las cimas de los montes
  alternatives_spanish:
  - sobre las cumbres de los montes
  - en las cimas de los montes
  lexicon: HALOT
  rationale: La imagen hebrea dice literalmente «sobre las cabezas de los montes». «Cimas» comunica el modismo con naturalidad y conserva la fuerza visual.
- source_word: יְרַקֵּדוּן
  english_pob_choice: they leap
  chosen_spanish: saltan
  alternatives_spanish:
  - brincan
  - rebotan
  - dan saltos
  lexicon: HALOT
  rationale: El verbo admite ideas de saltar, brincar o danzar. En este cuadro militar-teofánico, «saltan» mantiene el movimiento vivo sin sugerir una danza celebratoria.
- source_word: לַהַב אֵשׁ
  english_pob_choice: a flame of fire
  chosen_spanish: una llama de fuego
  alternatives_spanish:
  - una llamarada de fuego
  - una llama ardiente
  lexicon: HALOT
  rationale: La secuencia nominal funciona naturalmente en español como «una llama de fuego» y conserva la redundancia enfática del hebreo sin suavizarla.
- source_word: אֹכְלָה קָשׁ
  english_pob_choice: consuming stubble
  chosen_spanish: que consume rastrojo
  alternatives_spanish:
  - consumiendo rastrojo
  - que devora rastrojo
  - que consume paja
  lexicon: HALOT
  rationale: El participio expresa acción de consumir. «Rastrojo» es una opción española viva y adecuada para la imagen de fuego que arrasa materia seca; preserva la crudeza del cuadro.
- source_word: כְּעַם עָצוּם
  english_pob_choice: like a mighty people
  chosen_spanish: como un pueblo poderoso
  alternatives_spanish:
  - como un pueblo fuerte
  - como un pueblo grande y poderoso
  lexicon: HALOT
  rationale: עָצוּם puede abarcar fuerza y poder. «Poderoso» mantiene el énfasis en la fuerza colectiva y su aptitud para la acción bélica.
- source_word: עֱרוּךְ מִלְחָמָה
  english_pob_choice: arrayed for battle
  chosen_spanish: dispuesto para la guerra
  alternatives_spanish:
  - en orden de batalla
  - preparado para la guerra
  - arreglado para la guerra
  lexicon: HALOT
  rationale: El participio de ערך indica estar puesto en orden. «Dispuesto para la guerra» comunica la formación preparada sin introducir un tecnicismo excesivo; en español conserva la idea de orden militar.
theological_decisions:
- issue: Metáfora militar y teofánica acumulada
  english_pob_reading: The verse is a rapid chain of martial similes; no explicit doctrinal claim beyond vivid divine-judgment imagery.
  chosen_spanish_reading: Mantener la cadena de símiles militares sin explicitar más de lo que dice el hebreo.
  alternative_spanish_readings:
  - Añadir explicaciones interpretativas sobre juicio divino
  - Suavizar la imaginería bélica
  rationale: El texto funciona por acumulación imagética; la traducción debe preservar esa tensión visual y auditiva sin convertirla en paráfrasis explicativa.
  doctrine_reference: Joel 2:5; imaginería profética de juicio
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la versión actual usa «saltan» en lugar de «leap», conserva el símil repetido con «como», y mantiene la ambigüedad ordenada de עֱרוּךְ מִלְחָמָה como disposición militar sin sobreexplicación. No se detectaron revisiones aplicadas en el pasaje inglés de referencia.'
  spanish_consistency_notes:
  - Se mantuvo «como» para todos los miembros del paralelismo, reproduciendo la cadencia repetida del hebreo.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no presentes en el verso.
  - «Rastrojo» preserva una imagen agrícola seca y combustible coherente con la metáfora profética.
  - El orden de cláusulas sigue de cerca el hebreo para conservar el crescendo de la escena.
