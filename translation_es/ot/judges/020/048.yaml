translation:
  language: es
  text: Y los hombres de Israel se volvieron contra los hijos de Benjamín y los hirieron a filo de espada, desde la ciudad, hombres, hasta el ganado, todo lo que se encontraba[a]; además, incendiaron[b] todas las ciudades que hallaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea traducida 'desde la ciudad, hombres' es difícil. Probablemente significa que fueron matando por completo a los habitantes de las ciudades, junto con el ganado y todo lo demás que encontraron.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'las enviaron al fuego'; también puede entenderse 'les prendieron fuego'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: אַישׁ puede funcionar colectivamente con valor distributivo; en este contexto militar, "los hombres de Israel" preserva el referente masculino y colectivo sin borrar el matiz narrativo.
- source_word: שָׁבוּ
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - regresaron
  - volvieron
  lexicon: HALOT
  rationale: El verbo expresa un cambio de dirección en el movimiento. "Se volvieron" comunica bien el giro de retorno hacia los benjaminitas con naturalidad en español.
- source_word: אֶל בְּנֵי בִנְיָמִן
  english_pob_choice: against the sons of Benjamin
  chosen_spanish: contra los hijos de Benjamín
  alternatives_spanish:
  - contra los benjaminitas
  - a los hijos de Benjamín
  lexicon: HALOT
  rationale: La preposición final debe entenderse hostilmente por el verbo siguiente. Mantengo "hijos de Benjamín" para conservar la expresión hebrea de parentesco, como hace la POB en inglés.
- source_word: וַיַּכּוּם
  english_pob_choice: struck them
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los golpearon
  - los derrotaron
  lexicon: HALOT
  rationale: 'נכה es amplio: golpear, herir, matar o derrotar según contexto. Aquí, con la precisión de "a filo de espada", "los hirieron" evita sobreespecificar más allá del hebreo y suena más idiomático que un calco literal.'
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - con el filo de la espada
  - por la espada
  lexicon: HALOT
  rationale: Es un equivalente español establecido que conserva la imagen concreta de la "boca/filo" de la espada sin sonar forzado.
- source_word: מֵעִיר מְתֹם
  english_pob_choice: from the city, men
  chosen_spanish: desde la ciudad, hombres
  alternatives_spanish:
  - de cada ciudad, hombres
  - desde la ciudad, hasta hombres
  lexicon: HALOT
  rationale: La secuencia es difícil en hebreo. Sigo de cerca la decisión auditada de la POB inglesa, manteniendo el orden ciudad → hombres para reflejar el alcance local y humano de la matanza sin resolver artificialmente la ambigüedad.
- source_word: עַד בְּהֵמָה
  english_pob_choice: to livestock
  chosen_spanish: hasta ganado
  alternatives_spanish:
  - hasta los animales
  - incluido el ganado
  lexicon: HALOT
  rationale: El עד extiende la destrucción desde personas hasta animales. "Hasta ganado" es breve y fiel; el contexto deja claro que se trata del ganado/livestock.
- source_word: עַד כָּל הַנִּמְצָא
  english_pob_choice: all that was found
  chosen_spanish: todo lo que se encontraba
  alternatives_spanish:
  - todo lo hallado
  - todo lo encontrado
  lexicon: HALOT
  rationale: La forma participial subraya aquello que estaba presente o disponible en el lugar. "Todo lo que se encontraba" conserva esa amplitud y evita decidir demasiado entre hallado/encontrado.
- source_word: גַּם כָּל הֶעָרִים הַנִּמְצָאוֹת
  english_pob_choice: Also all the cities that were found
  chosen_spanish: además, a todas las ciudades que se hallaban
  alternatives_spanish:
  - también todas las ciudades que fueron encontradas
  - además, todas las ciudades que se hallaban allí
  lexicon: HALOT
  rationale: Sigo el vínculo léxico con מָצָא mediante "se hallaban", que permite una lectura de ciudades localizadas/alcanzadas. La construcción española evita una pasiva pesada y mantiene la continuidad con "todo lo que se encontraba".
- source_word: שִׁלְּחוּ בָאֵשׁ
  english_pob_choice: they set on fire
  chosen_spanish: las pusieron al fuego
  alternatives_spanish:
  - las incendiaron
  - las quemaron
  lexicon: HALOT
  rationale: El hebreo literalmente dice "enviaron al fuego". "Las pusieron al fuego" conserva esa imagen sin convertirla en una simple paráfrasis de "quemaron"; también deja espacio al matiz de la POB inglesa sobre la acción de ponerlas en llamas.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se prefirió un equivalente singular-colectivo para עִיר מְתֹם ("desde la ciudad") y se evitó un intensificador añadido como "incluso", manteniendo la idea de totalidad con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene "hijos de Benjamín" para preservar la expresión hebrea auditada, en lugar de sustituirla por un gentilicio interpretativo.
  - '"Yahvé" no aparece en este versículo.'
  - Se conserva la imaginería concreta del arma con "a filo de espada", acorde con la línea terminológica del proyecto.
  - '"Se volvieron contra" refleja un retorno hostil; no se suaviza a un simple "regresaron".'
  - '"Pusieron al fuego" mantiene la tensión entre literalidad idiomática y claridad lectora, sin borrar el posible matiz de incineración.'
