translation:
  language: es
  text: No sabe qué vendrá después[a], y deja sus bienes a otro y muere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo conservado aquí difiere marcadamente del paralelo griego. El hebreo dice algo como: «No sabía qué venía después, y lo dejó a otro y murió». El paralelo griego, en cambio, dice: «No digas: “¿Qué necesito? ¿Y qué bienes serán míos desde ahora?”». El texto principal sigue la revisión auditada que aquí refleja el hebreo, debido al desajuste textual entre los testigos.'
    reason: textual_variant
lexical_decisions:
- source_word: μὴ εἴπῃς
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No pienses
  - No te pongas a decir
  lexicon: LSJ
  rationale: El griego presenta una prohibición directa en segunda persona; en español, «No digas» reproduce con naturalidad el imperativo negativo y conserva el tono exhortativo de sabiduría.
- source_word: Τίς ἐστίν μου χρεία
  english_pob_choice: What do I need
  chosen_spanish: ¿Qué necesito?
  alternatives_spanish:
  - ¿Cuál es mi necesidad?
  - ¿Qué me hace falta?
  lexicon: LSJ
  rationale: χρεία significa «necesidad» o «lo que hace falta». En español, «¿Qué necesito?» mantiene la pregunta retórica sin caer en un giro demasiado literal o áspero.
- source_word: τίνα ... ἔσται μου τὰ ἀγαθά
  english_pob_choice: what good things will be mine
  chosen_spanish: ¿qué bienes serán míos
  alternatives_spanish:
  - ¿qué cosas buenas me pertenecerán
  - ¿qué beneficios tendré
  lexicon: LSJ
  rationale: τὰ ἀγαθά puede significar «bienes», «buenas cosas» o «beneficios». «Bienes» conserva el alcance material y práctico del término sin estrecharlo indebidamente.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de aquí en adelante
  - a partir de ahora
  lexicon: LSJ
  rationale: La expresión temporal es directa; «desde ahora» es breve, natural y fiel al valor de inicio temporal.
theological_decisions:
- issue: Texto hebreo y griego en divergencia
  english_pob_reading: The Greek parallel is followed because the Hebrew witness appears sharply mismatched and the main text is an admonition.
  chosen_spanish_reading: Se sigue el griego exhortativo en el texto principal, con la variante hebrea indicada en nota.
  alternative_spanish_readings:
  - «Él no sabía qué vendría después, y lo dejó a otro y murió»
  rationale: El griego ofrece una advertencia coherente con el contexto inmediato; el hebreo conservado parece desalineado o corrompido. Para mantener transparencia, la lectura hebrea se preserva como alternativa anotada, no como base principal.
  doctrine_reference: 'PHILOSOPHY.md: use the most coherent source reading while preserving source uncertainty honestly.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en la palabra «necesito» dentro del texto español; la nota ahora corresponde explícitamente a un punto marcado en la traducción.
  spanish_consistency_notes:
  - Se mantiene «bienes» para τὰ ἀγαθά por su amplitud semántica.
  - Se evita «Señor» o terminología litúrgica ajena, porque aquí no hay divino nombre ni cristología.
  - La pregunta retórica se conserva en singular y en tono directo, como en el griego.
