translation:
  language: es
  text: Yahvé está por mí[a]; no temeré. ¿Qué puede hacerme el hombre?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está conmigo» o «está de mi parte». El hebreo לִי expresa apoyo o alineación favorable, no solo presencia o posesión.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «¿Qué hará el hombre conmigo?» El español «puede» hace explícita la fuerza retórica de la limitada capacidad humana en este contexto. También puede entenderse genéricamente como «un ser humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton como nombre divino transliterado, no como título sustitutivo. En español, 'Yahvé' es la forma correspondiente y coherente con la política del proyecto.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - a mi favor
  - de mi parte
  lexicon: HALOT
  rationale: El hebreo לִי aquí expresa apoyo/alineación en un contexto de confianza. En español, 'está conmigo' comunica de manera natural esa presencia favorable sin perder el sentido de sostén implícito.
- source_word: לֹא אִירָא
  english_pob_choice: I will not fear
  chosen_spanish: no temeré
  alternatives_spanish:
  - no tengo miedo
  - no voy a temer
  - no temeré
  lexicon: HALOT
  rationale: El imperfecto expresa resolución o confianza futura. 'No temeré' conserva la brevedad y el tono declarativo del hebreo.
- source_word: מַה
  english_pob_choice: What can
  chosen_spanish: ¿Qué puede
  alternatives_spanish:
  - ¿Qué hará
  - ¿Qué podría
  lexicon: HALOT
  rationale: La pregunta retórica en español requiere un verbo modal para expresar la limitación humana que el contexto implica. 'Puede' refleja bien la fuerza retórica sin añadir más contenido del necesario.
- source_word: יַעֲשֶׂה
  english_pob_choice: do
  chosen_spanish: hacerme
  alternatives_spanish:
  - hacer contra mí
  - obrar en mi contra
  - hacer a mí
  lexicon: HALOT
  rationale: 'עָשָׂה es amplio (''hacer, actuar''). Con לִי, la equivalencia natural en español es un complemento indirecto u objeto afectado: ''hacerme''. El sentido de acción dirigida al hablante queda explícito.'
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: Aquí לִי marca a la persona afectada por la acción. En español, el clítico 'me' es la forma más directa y fluida para reflejar ese valor.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un ser humano
  - una persona
  - la humanidad
  lexicon: HALOT
  rationale: El singular genérico de אָדָם contrasta con Yahvé y mantiene el alcance representativo del término. 'El hombre' reproduce esa forma genérica y conserva la fuerza retórica del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El verso usa el nombre de pacto de Dios, no un título. 'Yahvé' preserva esa identidad personal y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un ser humano
  - la gente
  - la humanidad
  rationale: El hebreo es singular y genérico; no se trata de un individuo específico sino de la humanidad vista representativamente. 'El hombre' conserva el contraste teológico entre Yahvé y la capacidad limitada humana.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam → man / humankind (context)'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no había cambios necesarios; el presente borrador sigue el acuerdo alto del texto base y conserva las decisiones clave: Yahvé para el nombre divino, una lectura de apoyo para לִי, y el singular genérico de אָדָם.'
  spanish_consistency_notes:
  - Se mantuvo un registro homogéneo de Yahvé como nombre divino.
  - Se usó 'el hombre' en sentido genérico, no como referencia a un varón específico.
  - La puntuación reproduce la estructura breve y enfática del hebreo con dos proposiciones y una pregunta retórica final.
