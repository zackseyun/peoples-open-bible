revisions:
- from: ¿Y no están escritos todos los actos de su poder[a] y de su valentía, y la narración completa de la grandeza de Mardoqueo, a quien el rey engrandeció? ¿No están escritos en el libro de las crónicas de los reyes de Media y de Persia?
  to: Y todos los actos de su poder y de su poderío, y la narración completa de la grandeza de Mardoqueo, a quien el rey engrandeció, ¿no están escritos en el libro de las crónicas[a] de los reyes de Media y Persia?
  rationale: Se reemplaza 'valentía' por 'poderío' para reflejar mejor גְבוּרָתוֹ en paralelo con 'poder'; se recompone la oración como una sola pregunta retórica, conforme al hebreo; y se mueve la nota al pie a 'crónicas' para preservar la alternativa documentada 'anales'.
