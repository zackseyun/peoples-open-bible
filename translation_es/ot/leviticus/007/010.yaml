  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Hijos de Aarón' preserva correctamente el lenguaje masculino. 'Ofrenda de cereal' es una buena correspondencia para מִנְחָה en contexto cultual. La revisión propuesta alinea mejor בְלוּלָה con 'mezclada' y el modismo distributivo con 'cada uno por igual con su hermano'.
