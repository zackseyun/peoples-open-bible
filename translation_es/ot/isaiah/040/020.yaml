review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo y sigue de cerca el audit trail inglés: pobreza relativa a la ofrenda, selección de madera durable, búsqueda de un artesano competente, y un ídolo estable. Sin embargo, hay dos problemas de fidelidad/forma: «Él que» es poco natural en español para este relativo y conviene «El que» o «Quien»; y «se busca para sí un artesano» suena reflexivo de manera innecesaria, mientras que el hebreo יְבַקֶּשׁ לוֹ se refleja mejor con «busca para sí» o «se procura».'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta detalles de naturalidad y corrección. «Él que» debe corregirse a «El que». La nota a tiene un error: «constricción» debe ser «construcción». Además, la nota actualmente queda algo menos natural que el inglés; conviene «permite una ligera variación de construcción». El resto del verso fluye bien, y «artesano hábil», «ídolo» y «que no se tambalee» son opciones legibles y fieles.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Ídolo» para פֶּסֶל está bien justificado en este contexto antiidolátrico. «Ofrenda», «madera», «artesano hábil» y «preparar» concuerdan con las decisiones léxicas auditadas. No aparecen términos de glosario mayor como Yahvé/Mesías/doûlos, etc.
  issues:
  - severity: medium
    issue: Uso de «Él que» al inicio del verso
    rationale: En español estándar y bíblico legible, el relativo sustantivado aquí debe ser «El que» o «Quien». La tilde en «Él» introduce un pronombre enfático poco natural y gramaticalmente impropio en esta construcción.
  - severity: medium
    issue: «se busca para sí» suena torpe y reflexivo
    rationale: El hebreo יְבַקֶּשׁ לוֹ expresa que busca/procura algo para su propio beneficio, no que se busca a sí mismo. «Busca para sí un artesano hábil» refleja mejor la sintaxis y suena más natural en español.
  - severity: low
    issue: 'Error léxico en nota al pie: «constricción»'
    rationale: La nota explica una ambigüedad sintáctica/estructural, no una constricción. Debe decir «construcción» para precisión y buen español.
  revised_spanish_text: El que es demasiado pobre para una ofrenda[a] escoge madera que no se pudra; busca para sí un artesano hábil para preparar un ídolo[b] que no se tambalee.
  revised_footnotes:
  - marker: a
    text: 'O: «El empobrecido escoge como ofrenda madera que no se pudra». El inicio hebreo es compacto y permite una ligera variación de construcción.'
    reason: alternative_reading
  - marker: b
    text: 'O: «imagen tallada» para «ídolo».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron correcciones menores pero necesarias de español y fidelidad sintáctica: «Él que» → «El que»; «se busca para sí» → «busca para sí» para reflejar mejor יְבַקֶּשׁ לוֹ; y en la nota «constricción» → «construcción». No se requieren cambios teológicos ni de terminología principal.'
