revisions:
- from: 'Yahvé le dijo: “Dos naciones hay en tu vientre, y dos pueblos se separarán desde dentro de ti; uno de los pueblos será más fuerte que el otro[a], y el mayor servirá al menor.”'
  to: 'Yahvé le dijo: “Dos naciones hay en tu vientre, y dos pueblos se separarán desde dentro de ti; uno de los pueblos será más fuerte que el otro, y el mayor servirá al menor[a].”'
  rationale: 'Se conserva el texto base español porque es fiel y legible, pero se corrige el aparato crítico: se mueve el marcador [a] a la cláusula final pertinente y se reemplaza la nota por una alternativa real que refleje la tensión documentada entre una lectura contextual por edad (''mayor/menor'') y una lectura más literal-adjetival (''grande/pequeño'').'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:22:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Yahvé habla a Rebeca, hay paralelismo entre ''dos naciones'' y ''dos pueblos'', la separación futura de los descendientes, la comparación de fuerza entre un pueblo y otro, y la clausula final ''el mayor servirá al menor''. Sin embargo, la nota al pie está mal anclada y mal redactada: el marcador [a] aparece sobre ''el otro'', pero el contenido de la nota ofrece una lectura alternativa para la cláusula final ''el mayor servirá al menor''. Eso rompe la trazabilidad del aparato y no preserva correctamente la decisión teológica documentada en inglés.'
  spanish_quality_summary: El español es claro y digno. 'Yahvé', 'vientre', 'dos naciones', 'dos pueblos' y 'el mayor servirá al menor' son naturales y fieles. 'Desde dentro de ti' es aceptable, aunque 'de dentro de ti' o 'desde tus entrañas' también serían posibles; no exige cambio. La reparación necesaria es principalmente de aparato crítico y colocación del marcador.
  glossary_alignment: 'La terminología principal está alineada con el glosario del proyecto: יהוה -> ''Yahvé''; גויים/לְאֻמִּים -> ''naciones/pueblos''; no hay conflicto con términos doctrinales clave. La elección ''el mayor ... el menor'' sigue la racionalidad contextual del POB, pero debe conservarse la alternativa documentada ''el mayor/grande ... el menor/pequeño'' en una nota correctamente ubicada.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie anclado en la frase equivocada
    rationale: El [a] está puesto después de 'el otro', pero la nota trata de la lectura alternativa de וְרַב יַעֲבֹד צָעִיר, es decir, la cláusula 'el mayor servirá al menor'. El marcador debe moverse a esa cláusula o a 'mayor/menor'.
  - severity: medium
    issue: Contenido de la nota repite el texto principal en vez de dar la alternativa documentada
    rationale: 'La nota actual dice ''O: “el mayor servirá al menor”'', que no ofrece ninguna variante real. Según el rastro inglés, la alternativa es ''the greater will serve the lesser''; en español debe expresarse como una alternativa significativa, por ejemplo ''el grande servirá al pequeño'' o ''el mayor servirá al más joven'' según el matiz que se quiera conservar.'
  revised_spanish_text: 'Yahvé le dijo: “Dos naciones hay en tu vientre, y dos pueblos se separarán desde dentro de ti; uno de los pueblos será más fuerte que el otro, y el mayor servirá al menor[a].”'
  revised_footnotes:
  - marker: a
    text: 'O: “el grande servirá al pequeño”.'
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto base español porque es fiel y legible, pero se corrige el aparato crítico: se mueve el marcador [a] a la cláusula final pertinente y se reemplaza la nota por una alternativa real que refleje la tensión documentada entre una lectura contextual por edad (''mayor/menor'') y una lectura más literal-adjetival (''grande/pequeño'').'
