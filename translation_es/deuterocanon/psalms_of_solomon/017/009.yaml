lexical_decisions:
- source_word: ἐν τῷ ἐπαναστῆναι
  english_pob_choice: when ... rose up
  chosen_spanish: cuando ... se levantó
  alternatives_spanish:
  - al levantarse
  - cuando ... se alzó
  - cuando ... se levantó contra
  lexicon: LSJ
  rationale: El infinitivo articular con ἐν expresa aquí una relación temporal; en español, 'cuando' reproduce bien esa función. 'Se levantó' conserva el valor verbal de ἐπαναστῆναι sin volverlo demasiado interpretativo.
- source_word: αὐτοῖς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: LSJ
  rationale: Con ἐπανίστημι, el dativo marca a quienes se oponen. 'Contra ellos' expresa con naturalidad esa oposición en español.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: LSJ
  rationale: El griego es singular y masculino; 'un hombre' conserva esa referencia explícita sin suavizarla.
- source_word: ἀλλότριον
  english_pob_choice: foreign
  chosen_spanish: extranjero
  alternatives_spanish:
  - ajeno
  - forastero
  - de otra procedencia
  lexicon: LSJ
  rationale: '''Extranjero'' comunica de forma clara y digna la idea de alguien de fuera del grupo propio. En este contexto resulta más natural en español que ''ajeno'' o ''forastero''.'
- source_word: γένους ἡμῶν
  english_pob_choice: to our race
  chosen_spanish: a nuestra raza
  alternatives_spanish:
  - a nuestro linaje
  - a nuestro pueblo
  - de nuestro linaje
  lexicon: LSJ
  rationale: '''γένος'' aquí apunta a pertenencia étnico-genealógica; ''raza'' sigue de cerca la correspondencia léxica del audit trail inglés, aunque en español moderno requiere cautela. Se mantiene por fidelidad al campo semántico documentado.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'people' por 'race' para acercarse más a γένους; el español refleja esa decisión con 'raza', manteniendo 'contra ellos' como equivalente natural de ἐπαναστῆναι αὐτοῖς.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - Se conserva un registro bíblico sobrio y directo, sin añadir información no presente en el griego.
  - La nota al pie preserva la alternativa lexical señalada en el aparato inglés, adaptada al español.
