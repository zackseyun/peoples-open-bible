translation:
  language: es
  text: 'Y ellos alzaron la voz[a], diciendo: «Jesús, Maestro[b], ten misericordia de nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «alzaron la voz».
    reason: lexical_alternative
  - marker: b
    text: «Maestro» traduce el griego epistata, un término de tratamiento que significa alguien con autoridad; no es la palabra usual para «Señor» (kyrios).
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conecta de manera simple la escena con el contexto inmediato, sin añadir una fuerza temporal que el griego no exige.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre está expresado en griego; en español puede omitirse, pero aquí se conserva como sujeto explícito para mantener el énfasis narrativo.
- source_word: ἦραν φωνὴν
  english_pob_choice: raised their voices
  chosen_spanish: alzaron la voz
  alternatives_spanish:
  - levantaron la voz
  - clamaron
  lexicon: BDAG
  rationale: Es una expresión idiomática de hablar en voz alta. «Alzaron la voz» conserva la imagen y suena natural en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio se refleja bien con una forma de gerundio en español, manteniendo la estructura narrativa sin forzarla.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio en vocativo; se traduce con la forma española estándar.
- source_word: ἐπιστάτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Jefe
  - Señor
  lexicon: BDAG
  rationale: En Lucas, ἐπιστάτης es un vocativo de respeto que expresa autoridad y dirección. «Maestro» comunica esa relación sin confundirlo con κύριος («Señor»), ni introducir un matiz demasiado técnico como «Jefe».
- source_word: ἐλέησον
  english_pob_choice: have mercy
  chosen_spanish: ten misericordia
  alternatives_spanish:
  - ten compasión
  - apiádate
  lexicon: BDAG
  rationale: La petición es urgente y compasiva. En español, la fórmula directa y reconocible es «ten misericordia», que conserva el carácter de súplica del imperativo.
- source_word: ἡμᾶς
  english_pob_choice: on us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - por nosotros
  - a nosotros
  lexicon: BDAG
  rationale: Con «tener misericordia» en español, la construcción más natural es «de nosotros». Mantiene el sentido del objeto de la petición sin calcar el régimen del inglés.
theological_decisions:
- issue: Distinguir ἐπιστάτα de κύριος en el trato a Jesús
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Jefe
  rationale: El término griego aquí no es κύριος. Traducirlo como «Señor» borraría una distinción léxica relevante y podría sugerir más de lo que el vocativo específico comunica. «Maestro» conserva el respeto y la autoridad implícita, de acuerdo con la lectura POB.
  doctrine_reference: 'DOCTRINE.md: traducir títulos con base en el término original; no importar automáticamente títulos teológicos de otros vocablos.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de SBLGNT y el tramo de auditoría inglesa. Se preserva la imagen idiomática de ἦραν φωνὴν, se mantiene la distinción entre ἐπιστάτα y κύριος, y se adapta la súplica final a la sintaxis natural del español sin perder el tono urgente de la petición.
  spanish_consistency_notes:
  - Se usa «Jesús» como forma española del nombre propio, conforme a la política de transliteración.
  - «Maestro» se reserva aquí para ἐπιστάτα, no como equivalente general de «Señor».
  - La petición «ten misericordia de nosotros» es idiomática y comunicativamente equivalente al griego.
