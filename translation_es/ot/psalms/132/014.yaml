    rationale: La revisión inglesa cambió de 'her' a 'it'. En español, el clítico femenino 'la' deja una ambigüedad distinta y de hecho suena más naturalmente como referencia femenina explícita. Para seguir la decisión auditada, es mejor expresar un objeto no personificado, p. ej. 'he deseado este lugar'.
  - severity: low
