- from: 'Entonces llamó a Giezi y dijo[a]: «Llama a esta sunamita». Así que la llamó, y ella vino a él. Entonces dijo: «Levanta a tu hijo».'
  to: 'Entonces llamó a Giezi y dijo[a]: «Llama a esta sunamita». Así que la llamó, y ella se acercó a él. Entonces dijo: «Toma a tu hijo».'
