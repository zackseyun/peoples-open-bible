translation:
  language: es
  text: Porque hay un amigo[a] por un tiempo, y no permanecerá firme en el día de tu angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la ocasión» o «cuando le conviene». La frase hebrea es idiomática, y el paralelo griego también sugiere una amistad limitada a circunstancias favorables.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹהֵב / φίλος
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - amigo íntimo
  - compañero
  - el que ama
  lexicon: HALOT; LXX φίλος
  rationale: En el contexto sapiencial de Ben Sira, el participio hebreo funciona sustantivamente como una relación de amistad, no como 'amante'. El griego paralelo usa φίλος ('amigo'), por lo que 'amigo' conserva el valor relacional y mantiene la correspondencia interlingüística.
- source_word: כְּפִי עֵת / ἐν καιρῷ αὐτοῦ
  english_pob_choice: for the occasion
  chosen_spanish: para la ocasión
  alternatives_spanish:
  - por un tiempo
  - según la ocasión
  - cuando le conviene
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a una amistad condicionada por las circunstancias favorables. 'Para la ocasión' reproduce esa idea de manera natural en español y refleja el sentido del griego 'en su tiempo' o 'en el momento favorable'.
- source_word: יַעֲמוֹד / παραμείνῃ
  english_pob_choice: stand firm
  chosen_spanish: permanecerá firme
  alternatives_spanish:
  - se mantendrá firme
  - resistirá
  - permanecerá
  - se sostendrá
  lexicon: HALOT; LXX παραμένω
  rationale: El hebreo literalmente dice 'estar de pie', pero en este contexto expresa lealtad o constancia ante la presión. 'Permanecerá firme' conserva la imagen de firmeza y la idea de continuidad/constancia que sugiere también el griego παραμείνῃ.
- source_word: בְּיוֹם צָרָה / ἐν ἡμέρᾳ θλίψεώς σου
  english_pob_choice: in the day of distress
  chosen_spanish: en el día de tu angustia
  alternatives_spanish:
  - en el día de tu aflicción
  - en el día de tu dificultad
  - en el día de tu tribulación
  lexicon: HALOT; LXX θλῖψις
  rationale: צָרָה y θλῖψις abarcan opresión, angustia y aflicción. 'Angustia' comunica bien el peso personal de la prueba en español, sin perder la estructura idiomática 'en el día de...'."}],
- source_word: כִּי יֵשׁ
  english_pob_choice: For there is
  chosen_spanish: Porque hay
  alternatives_spanish:
  - Pues hay
  - Porque existe
  lexicon: BHQ-style idiom; LXX ἔστιν γὰρ
  rationale: La partícula introductoria y el verbo existencial se traducen de forma simple y fluida en español, manteniendo el valor sentencioso del proverbio.
translation_notes:
  revision_awareness: Sin cambios respecto al estado de revisión más reciente; la lectura española sigue de cerca el hebreo de Ben Sira y se confirma con el paralelo griego, sin necesidad de ajustes editoriales.
  spanish_consistency_notes:
  - Se mantiene 'amigo' para אָהֵב/φίλος según el sentido relacional del contexto sapiencial.
  - Se preserva la imagen proverbial del 'día de angustia' sin suavizarla a una generalidad.
  - '''Permanecerá firme'' conserva la idea de constancia que el inglés POB expresó con ''stand firm''.'
