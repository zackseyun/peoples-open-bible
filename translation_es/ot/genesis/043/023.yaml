translation:
  language: es
  text: 'Él dijo: «Paz para ustedes. No teman. Su Dios y el Dios de su padre les ha dado un tesoro[a] en sus sacos. Su plata[b] ha llegado a mí». Entonces les sacó a Simeón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tesoro escondido'.
    reason: lexical_alternative
  - marker: b
    text: O 'Su dinero ha llegado a mí'. En hebreo, 'plata' a menudo se refiere al dinero.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Todo está bien
  - Paz a ustedes
  lexicon: HALOT
  rationale: שָׁלוֹם aquí funciona como saludo tranquilizador y bendición breve. 'Paz' conserva el valor léxico central y suena natural y digno en español.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not be afraid
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No temáis
  lexicon: HALOT
  rationale: La forma negativa exhortativa se expresa con claridad en español con 'No teman'. Mantiene la fuerza directa del hebreo sin arcaísmo innecesario.
- source_word: אֱלֹהֵיכֶם וֵאלֹהֵי אֲבִיכֶם
  english_pob_choice: Your God and the God of your father
  chosen_spanish: Su Dios y el Dios de su padre
  alternatives_spanish:
  - Su Dios y el Dios de sus padres
  - Su dios y el dios de su padre
  lexicon: HALOT
  rationale: El hebreo apunta al Dios singular de la familia de José. En español conviene conservar ese singular con mayúscula reverente en 'Dios' y mantener 'su padre' en singular, como en el original.
- source_word: נָתַן לָכֶם
  english_pob_choice: has given you
  chosen_spanish: les ha dado
  alternatives_spanish:
  - les dio
  - les ha concedido
  lexicon: HALOT
  rationale: El perfecto hebreo queda bien en español con presente perfecto por el efecto inmediato en la escena. 'Ha dado' conserva la conexión entre la acción de Dios y el hallazgo actual.
- source_word: מַטְמוֹן
  english_pob_choice: treasure
  chosen_spanish: un tesoro
  alternatives_spanish:
  - un tesoro escondido
  - un oculto tesoro
  lexicon: HALOT
  rationale: '''Tesoro'' reproduce la idea central con naturalidad. Mantiene la amplitud del término sin forzar en el texto principal la especificación de ''escondido'', que el inglés dejó como alternativa.'
- source_word: בְּאַמְתְּחֹתֵיכֶם
  english_pob_choice: in your sacks
  chosen_spanish: en sus costales
  alternatives_spanish:
  - en sus sacos
  - en sus bolsas
  lexicon: HALOT
  rationale: '''Costales'' comunica bien el recipiente de grano en español contemporáneo y evita un término demasiado moderno como ''bolsas''. Conserva el contexto narrativo de transporte de provisiones.'
- source_word: כַּסְפְּכֶם בָּא אֵלָי
  english_pob_choice: Your silver came to me
  chosen_spanish: Su plata ha llegado a mí
  alternatives_spanish:
  - Su dinero me llegó
  - He recibido su plata
  lexicon: HALOT
  rationale: '''Plata'' preserva el valor concreto del hebreo כֶּסֶף, que puede significar plata o dinero. ''Ha llegado a mí'' respeta la formulación hebrea y evita suavizarla a una recepción explícita que el texto no dice.'
- source_word: וַיּוֹצֵא אֲלֵהֶם אֶת שִׁמְעוֹן
  english_pob_choice: Then he brought Simeon out to them
  chosen_spanish: Entonces les sacó a Simeón
  alternatives_spanish:
  - Entonces les sacó a Simeón fuera
  - Y les trajo a Simeón
  lexicon: HALOT
  rationale: El causativo de יצא pide la idea de 'sacar'. En español, 'les sacó a Simeón' comunica con naturalidad la salida de Simeón hacia ellos sin añadir detalles no presentes en el hebreo.
theological_decisions:
- issue: Referencia a Dios en la խոս actual del administrador/siervo
  english_pob_reading: Render the steward's words straightforwardly as referring to the brothers' God and the God of their father, without implying the steward's personal confession or denying it.
  chosen_spanish_reading: Traducir las palabras como una referencia directa al Dios de ellos y al Dios de su padre, sin afirmar ni negar la fe personal del hablante.
  alternative_spanish_readings:
  - Entenderlo solo como cortesía diplomática
  - Tomarlo como prueba de fe personal plena
  rationale: El hebreo presenta el discurso sin interpretar la convicción interna del hablante. La traducción debe conservar esa tensión y no resolverla con una lectura teológica que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés indica que no hubo cambios; el acuerdo de revisión fue alto y estable, por lo que la versión española sigue de cerca las decisiones auditadas sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים en sentido singular contextual, no como plural teológico.
  - '''Plata'' se conserva para כֶּסֶף por fidelidad léxica, con la ambigüedad monetaria implícita.'
  - '''Sacar'' en lugar de ''traer'' preserva la dirección verbal de וַיּוֹצֵא.'
  - Se usa 'costales' como equivalente natural de sacos de grano, sin perder el contexto narrativo.
  - Los signos de puntuación siguen el español estándar y las comillas angulares para el discurso directo.
