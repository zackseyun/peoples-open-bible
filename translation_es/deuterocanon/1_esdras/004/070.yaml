review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue el rastro del POB en puntos clave: ''Celesiria'' preserva el topónimo histórico, ''gobernantes locales'' comunica adecuadamente τοπάρχαις, y se mantiene correctamente ''la ciudad'' en lugar de armonizar con ''el templo''. También conserva el valor de propósito en las cláusulas con infinitivo y subjuntivo.'
  spanish_quality_summary: La redacción es clara y mayormente natural, pero tiene dos problemas relevantes. Primero, la nota [a] está anclada en 'Líbano' cuando en realidad explica τοπάρχαις; debe moverse a 'gobernantes locales'. Segundo, 'para que edifiquen' suena menos natural tras una secuencia pasada ('escribió') y conviene 'para que edificaran' o 'a fin de que edificaran'. También puede mejorarse la fluidez con 'los del Líbano' en vez de 'los que estaban en el Líbano'.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. Las decisiones léxicas centrales están alineadas: ''Celesiria'', ''madera de cedro'', ''la ciudad''. La excepción necesaria es reubicar la nota léxica de τοπάρχαις al término español correspondiente.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'Líbano' pero explica 'gobernantes locales' / τοπάρχαις.
    rationale: Esto desinforma al lector sobre qué término fuente está siendo aclarado y rompe la disciplina requerida de anclar cada nota en la palabra o frase pertinente del texto español.
  - severity: medium
    issue: '''para que edifiquen'' no concuerda bien con la narración en pasado.'
    rationale: Aunque el presente de subjuntivo puede aparecer en ciertos contextos, aquí suena menos natural en español narrativo después de 'escribió cartas'. 'Para que edificaran' expresa mejor el propósito pasado.
  - severity: low
    issue: '''los que estaban en el Líbano'' es algo más pesado que una alternativa más idiomática.'
    rationale: El griego repite el dativo para 'los en el Líbano'; en español 'los del Líbano' mantiene el sentido con mejor fluidez sin pérdida semántica.
  revised_spanish_text: Y escribió cartas a todos los gobernantes locales[a] en Celesiria y Fenicia, y a los del Líbano, para traer madera de cedro del Líbano a Jerusalén, a fin de que edificaran la ciudad con él.
  revised_footnotes:
  - marker: a
    text: O 'gobernantes de distrito'; griego 'toparcas', es decir, gobernantes sobre distritos locales.
    reason: lexical_alternative
  revision_rationale: 'Se reubica la nota al término correcto que traduce τοπάρχαις, se mejora la naturalidad temporal de la cláusula final con ''a fin de que edificaran'', y se aligera ''los que estaban en el Líbano'' a ''los del Líbano'' sin alterar el sentido. Se preservan las decisiones auditadas importantes: ''Celesiria'' como topónimo histórico y ''la ciudad'' como objeto explícito de la construcción.'
