base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/010.yaml
  text: So the Philistines fought[a], and Israel was defeated, and each man fled to his tent. The slaughter was very great[b], and thirty thousand foot soldiers from Israel fell.
  footnotes:
  - marker: a
    text: Or 'each man fled to his home.' The Hebrew literally says 'to his tent,' an expression that can function idiomatically for one's dwelling place.
    reason: lexical_alternative
  - marker: b
    text: Or 'the defeat was very severe.' The Hebrew says 'the blow/slaughter was very great.'
    reason: lexical_alternative
