translation:
  language: es
  text: Tú los presentarás delante de Yahvé, y los sacerdotes echarán[a] sal sobre ellos y los ofrecerán como holocausto a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrojarán» o «lanzarán». El verbo hebreo es literalmente «arrojar/lanzar», no el más específico «rociar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּם
  english_pob_choice: You shall present them
  chosen_spanish: Tú los presentarás
  alternatives_spanish:
  - Tú los traerás cerca
  - Tú los ofrecerás
  lexicon: HALOT
  rationale: El verbo causativo de קרב expresa acercar/presentar algo ante Dios. «Presentarás» comunica bien el acto cultual sin confundirlo con el verbo posterior de ofrecer en sacrificio.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa la relación espacial y cultual de estar «delante de» o «en presencia de». «Delante de Yahvé» es natural en español y conserva el matiz ceremonial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, según la decisión doctrinal del POB. «Yahvé» preserva el nombre personal y evita la sustitución por un título.
- source_word: וְהִשְׁלִיכוּ
  english_pob_choice: shall throw
  chosen_spanish: echarán
  alternatives_spanish:
  - arrojarán
  - tirarán
  lexicon: HALOT
  rationale: El verbo שלך tiene el sentido básico de lanzar/arrojar. En español, «echar» transmite el gesto de poner o lanzar sal sobre el animal sin volverlo demasiado técnico ni duro.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los ministros del santuario
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: Es la correspondencia directa y estándar de כֹּהֲנִים en contexto sacrificial.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre las víctimas
  lexicon: HALOT
  rationale: La preposición עַל indica colocación encima de los animales. «Sobre ellos» es claro y mantiene la referencia pronominal del hebreo.
- source_word: מֶלַח
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal
  lexicon: HALOT
  rationale: Equivalente léxico directo; se mantiene el término simple y natural en español.
- source_word: וְהֶעֱלוּ
  english_pob_choice: offer them up
  chosen_spanish: los ofrecerán
  alternatives_spanish:
  - los subirán
  - los sacrificarán
  lexicon: HALOT
  rationale: El hiphil de עלה en contexto sacrificial significa hacer subir/ofrecer. En español, «ofrecerán» comunica adecuadamente la acción ritual, y se evita una paráfrasis excesiva.
- source_word: עֹלָה
  english_pob_choice: as a burnt offering
  chosen_spanish: en holocausto
  alternatives_spanish:
  - como holocausto
  - como ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio totalmente consumido por el fuego. «Holocausto» es la forma tradicional y precisa en español para este término técnico; se prefiere aquí por claridad cultual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para Yahveh
  lexicon: HALOT
  rationale: La lamed final indica orientación/dedicación del sacrificio. «A Yahvé» reproduce de forma natural esa dedicación en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del POB de rendir el Tetragrámaton con el nombre divino transliterado. «Yahvé» conserva la referencia personal del pacto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Término sacrificial עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda íntegra
  rationale: El término técnico hebreo designa la ofrenda completamente quemada. En español, «holocausto» es el equivalente culto asentado y comunica la categoría sacrificial con precisión.
  doctrine_reference: Lexical-sacrificial terminology for עֹלָה in cultic contexts
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail en inglés: mantiene la distinción entre «presentar» y «ofrecer», conserva el nombre divino como Yahvé y refleja el verbo de echar/arrojar sal sin suavizarlo a «rociar». No se registran revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Holocausto» se reserva aquí para עֹלָה en su sentido técnico sacrificial.
  - Se mantiene un registro culto pero natural, apto para lectura eclesial en español neutro.
  - La nota textual marca la alternativa verbal sin cambiar el flujo principal del versículo.
