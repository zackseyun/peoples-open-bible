translation:
  language: es
  text: En el trigésimo primer año de Asa rey de Judá[a], Omrí comenzó a reinar sobre Israel por doce años; reinó en Tirsa seis años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Omrí reinó sobre Israel doce años; en Tirsa reinó seis años». El versículo distingue su reinado total de los seis años que reinó en Tirsa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת ... שְׁלֹשִׁים וְ/אַחַת שָׁנָה
  english_pob_choice: In the thirty-first year
  chosen_spanish: En el trigésimo primer año
  alternatives_spanish:
  - En el año treinta y uno
  - Durante el trigésimo primer año
  lexicon: HALOT
  rationale: El hebreo usa una fórmula regnal idiomática; en español, "en el trigésimo primer año" transmite con naturalidad la cronología sin perder el valor idiomático de la expresión.
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - perteneciente a Asa, rey de Judá
  - de Asa, el rey de Judá
  lexicon: HALOT
  rationale: La preposición ל en esta fecha regnal refiere el año de Asa; en español se expresa de forma natural con "de Asa, rey de Judá". Se mantiene el título sin añadir artículos innecesarios.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - se hizo rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: El primer מָלַךְ es inceptivo, marcando la entronización de Omrí. "Llegó a ser rey" conserva ese inicio del reinado mejor que un simple "reinó".
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Israel
  - en Israel
  lexicon: HALOT
  rationale: Con מלך, עַל expresa dominio o gobierno sobre un pueblo. "Sobre Israel" preserva ese sentido regnal sin suavizarlo.
- source_word: שְׁתֵּ֥ים עֶשְׂרֵ֖ה שָׁנָ֑ה
  english_pob_choice: for twelve years
  chosen_spanish: por doce años
  alternatives_spanish:
  - durante doce años
  - por un total de doce años
  lexicon: HALOT
  rationale: La frase indica la duración total del reinado de Omrí. "Por doce años" comunica esa duración de forma breve y fiel, aunque en español también podría leerse como mero lapso; el contexto lo aclara.
- source_word: בְּ/תִרְצָ֖ה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirsá
  - en Tirzá
  lexicon: HALOT
  rationale: Se usa la forma castellana establecida "Tirsa" para el topónimo, manteniendo la referencia geográfica del texto.
- source_word: מָלַ֥ךְ שֵׁשׁ שָׁנִֽים
  english_pob_choice: he reigned in Tirzah six years
  chosen_spanish: reinó en Tirsa seis años
  alternatives_spanish:
  - reinado en Tirsa durante seis años
  - reinó allí seis años
  lexicon: HALOT
  rationale: El segundo מָלַךְ describe la duración del reinado de Omrí en Tirsa. "Reinó" reproduce el valor durativo, y se conserva el lugar para reflejar el contraste implícito entre los doce años totales y los seis en Tirsa.
theological_decisions:
- issue: Relación entre el reinado total de Omrí y el tiempo en Tirsa
  english_pob_reading: The verse distinguishes his total reign from the six years spent reigning in Tirzah.
  chosen_spanish_reading: El versículo distingue el total del reinado de Omrí de los seis años que reinó en Tirsa.
  alternative_spanish_readings:
  - El versículo puede leerse como si Omrí hubiera reinado doce años en total, de los cuales seis fueron en Tirsa.
  - Omrí reinó doce años; en Tirsa reinó seis años.
  rationale: 'Se conserva la tensión observada en la nota inglesa: el texto distingue entre la duración total del reinado y el tiempo específicamente situado en Tirsa. La traducción evita homogeneizar ambos datos en una sola cifra sin explicación.'
  doctrine_reference: Ninguna; se trata de una observación cronológica y textual.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el texto español sigue de cerca la lectura auditada y conserva la distinción cronológica señalada por la nota inglesa.
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma editorial por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene "rey de Judá" con puntuación española natural y sin añadir artículos que no estén motivados por el hebreo.
  - '"Tirsa" se normaliza como topónimo en español para una lectura publicable y consistente.'
