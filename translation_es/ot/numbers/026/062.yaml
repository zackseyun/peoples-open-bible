translation:
  language: es
  text: Y los contados entre ellos fueron veintitrés mil, todo varón de un mes de edad en adelante, porque no fueron contados entre los hijos de Israel[a], porque no se les dio herencia entre los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los israelitas» en ambas ocurrencias de «hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדֵיהֶם
  english_pob_choice: those counted from among them
  chosen_spanish: el número de ellos
  alternatives_spanish:
  - los contados entre ellos
  - los registrados entre ellos
  lexicon: HALOT
  rationale: En contexto censal, el sustantivo formado de פקד apunta al total o número de los inscritos. "El número de ellos" comunica el resultado del censo con naturalidad en español, sin perder la referencia al conteo.
- source_word: שְׁלֹשָׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-three thousand
  chosen_spanish: veintitrés mil
  alternatives_spanish:
  - veintitrés millares
  lexicon: HALOT
  rationale: Es la equivalencia numérica directa y natural en español para la secuencia cardinal hebrea.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todo macho
  lexicon: HALOT
  rationale: '"Varón" conserva el valor masculino personal del hebreo sin sonar tan biológico como "macho"; "todo" refleja כָּל en uso distributivo.'
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: desde un mes de edad y arriba
  alternatives_spanish:
  - desde un mes de edad y más
  - de un mes de edad en adelante
  lexicon: HALOT
  rationale: La construcción de edad se vierte de forma idiomática en español, preservando el umbral mínimo sin suavizarlo.
- source_word: הָתְפָּקְדוּ
  english_pob_choice: were not counted
  chosen_spanish: no fueron contados
  alternatives_spanish:
  - no fueron registrados
  - no fueron inscritos
  lexicon: HALOT
  rationale: Se mantiene la raíz censal de פקד y la voz pasiva, como en el inglés POB; "contados" es claro y consistente con el contexto.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - en medio de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación familiar/covenantal del hebreo, con una preposición española natural; "hijos de Israel" refleja el texto fuente sin generalizarlo.
- source_word: נִתַּן לָהֶם נַחֲלָה
  english_pob_choice: no inheritance was given to them
  chosen_spanish: no se les dio herencia
  alternatives_spanish:
  - no se les dio una herencia
  - no se les concedió herencia
  lexicon: HALOT
  rationale: '"Herencia" es la equivalencia habitual de נַחֲלָה en el reparto de la tierra; la pasiva impersonal española preserva la construcción hebrea.'
theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  rationale: Se conserva la expresión literal y familiar del hebreo, como hace el POB en inglés con "sons of Israel". En español, "hijos de Israel" mantiene mejor el eco genealógico y pactal que una generalización neutralizada.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 4
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente con alta concordancia; no se detectaron cambios sustanciales necesarios respecto del texto inglés auditado. La única tensión relevante es la frase doble «בְּנֵי יִשְׂרָאֵל», preservada en español como «hijos de Israel» por fidelidad al hebreo y al criterio POB de conservar el lenguaje familiar/covenantal.
  spanish_consistency_notes:
  - Se mantiene "hijos de Israel" de forma consistente para בְּנֵי יִשְׂרָאֵל.
  - Se conserva "herencia" para נַחֲלָה por su fuerza técnica en contexto de reparto territorial.
  - '"Contados" se usa para la raíz censal פקד en coherencia con el contexto numérico del versículo.'
