translation:
  language: es
  text: Y el rey de Egipto no volvió a salir de su país, porque el rey de Babilonia había tomado todo lo que pertenecía al rey de Egipto, desde el torrente[a] de Egipto hasta el río Éufrates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «wadi de Egipto». El hebreo נחל puede referirse a un cauce estacional o arroyo; «río» es menos probable aquí y podría confundirse con el Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹסִיף עוֹד / לָצֵאת
  english_pob_choice: did not go out again
  chosen_spanish: no volvió a salir
  alternatives_spanish:
  - no continuó saliendo
  - no salió otra vez
  lexicon: HALOT
  rationale: El hebreo expresa cese de una acción repetida o continuada. En español, «no volvió a salir» comunica bien la repetición cesada sin sonar forzado, y conserva el matiz de movimiento/salida del contexto militar.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el soberano de Egipto
  lexicon: HALOT
  rationale: La construcción se traduce de forma directa y natural; «rey de Egipto» mantiene el referente político sin introducir un matiz no pedido por el texto.
- source_word: מֵאַרְצוֹ
  english_pob_choice: from his land
  chosen_spanish: de su país
  alternatives_spanish:
  - de su tierra
  - de su territorio
  lexicon: HALOT
  rationale: «País» comunica bien el ámbito territorial en español moderno. Aunque «tierra» sería más literal, «país» evita una posible lectura meramente agrícola y suena más claro en contexto político.
- source_word: לָקַח
  english_pob_choice: had taken
  chosen_spanish: había tomado
  alternatives_spanish:
  - había arrebatado
  - había capturado
  lexicon: HALOT
  rationale: «Tomar» reproduce el valor amplio de לקח sin añadir una intensidad que el hebreo no exige. El pluscuamperfecto refleja la relación temporal explicativa del versículo.
- source_word: כֹּל אֲשֶׁר הָיְתָה
  english_pob_choice: all that belonged to
  chosen_spanish: todo lo que pertenecía a
  alternatives_spanish:
  - todo lo que era de
  - todo cuanto pertenecía a
  lexicon: HALOT
  rationale: La frase hebrea indica posesión o control total. «Todo lo que pertenecía a» es fiel, formal y suficientemente amplio para abarcar bienes y dominio territorial implícitos.
- source_word: מִנַּחַל מִצְרַיִם
  english_pob_choice: from the Brook of Egypt
  chosen_spanish: desde el Torrente de Egipto
  alternatives_spanish:
  - desde el Wadi de Egipto
  - desde el Arroyo de Egipto
  lexicon: HALOT
  rationale: «Torrente» puede abarcar el sentido de cauce estacional del hebreo נחל mejor que «arroyo». Mantiene además la decisión de no usar «río», que podría sugerir el Nilo o una entidad hidrográfica distinta.
- source_word: נְהַר פְּרָת
  english_pob_choice: the Euphrates River
  chosen_spanish: el río Éufrates
  alternatives_spanish:
  - el Éufrates
  - el río Éufrates
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional en español y el sustantivo «río» para reflejar el hebreo נהר de modo claro y natural.
theological_decisions:
- issue: Extensión del dominio descrito por todo lo tomado por Babilonia
  english_pob_reading: all that belonged to the king of Egypt, from the Brook of Egypt to the Euphrates River
  chosen_spanish_reading: todo lo que pertenecía al rey de Egipto, desde el Torrente de Egipto hasta el río Éufrates
  alternative_spanish_readings:
  - todo lo que era del rey de Egipto
  - todo lo que había pertenecido al rey de Egipto
  rationale: No se restringe el objeto a tierra solamente, porque el hebreo usa una fórmula amplia de posesión y el marco geográfico ya delimita el alcance territorial. La traducción conserva esa amplitud sin precisar más de lo que el texto dice.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal junto al término que la nota explica. La redacción también mantiene la decisión del POB inglés de evitar «río» para מִנַּחַל מִצְרַיִם.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el nombre propio «Éufrates» en lugar de una glosa explicativa, siguiendo el uso bíblico común en español.
  - La frase temporal «había tomado» refleja la anterioridad implícita en el inglés POB «had taken» y la relación causal del versículo.
