revisions:
- from: 'Por la ventana miraba la madre de Sísara, y se lamentaba por la celosía: «¿Por qué se demora tanto su carro en venir? ¿Por qué se atrasan las huellas de sus carros?»'
  to: 'Por la ventana se asomó la madre de Sísara, y clamó[a] por la celosía: «¿Por qué se demora tanto su carro en venir? ¿Por qué se retrasan las ruedas[b] de sus carros?»'
  rationale: Se ajustó el texto para reflejar mejor el sentido espacial de נִשְׁקְפָה («se asomó»), la fuerza vocal de וַתְּיַבֵּב («clamó»), y el referente contextual de פַּעֲמֵי מַרְכְּבוֹתָיו, donde «las ruedas de sus carros» evita la torpeza y la imprecisión de «huellas». Se añadieron notas para preservar las alternativas léxicas significativas del hebreo y del audit trail inglés.
