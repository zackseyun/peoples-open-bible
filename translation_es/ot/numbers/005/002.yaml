review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: un mandato a Moisés para que los hijos de Israel hagan salir del campamento a tres clases de personas ritualmente impuras. También preserva adecuadamente la impureza cultual de טָמֵא לָנָפֶשׁ con «impuro por un cadáver». Sin embargo, en כָּל צָרוּעַ el texto principal español se aparta de la decisión del POB inglés, que evitó «leproso» en el cuerpo del texto por su especificidad médica anacrónica y prefirió una formulación amplia de afección cutánea, dejando «leproso» como alternativa en nota.'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse en fidelidad terminológica. «Expulsen» suena algo más punitivo de lo que exige וִישַׁלְּחוּ; «saquen» o «hagan salir» es más neutro y más cercano a «send out». Además, la nota [a] está mal anclada: el marcador aparece sobre «todo», cuando la nota corresponde a «leproso».'
  glossary_alignment: Buen alineamiento general con la terminología del proyecto en cuanto a «hijos de Israel» e «impuro». El principal desajuste es «todo leproso» en vez de una expresión como «toda persona con una enfermedad de la piel», ya que el audit trail inglés documenta explícitamente que צָרוּעַ no debe restringirse a la lepra moderna en el texto principal. La nota alternativa debe conservar «leproso» como opción tradicional.
  issues:
  - severity: high
    issue: «todo leproso» en el texto principal restringe indebidamente כָּל צָרוּעַ
    rationale: El POB inglés documenta que el término hebreo abarca una afección cutánea ritual amplia, no necesariamente lepra moderna. En español, «leproso» arrastra con más fuerza esa especificidad; conviene reservarlo para nota.
  - severity: medium
    issue: «expulsen» añade un matiz más duro que וִישַׁלְּחוּ
    rationale: El hebreo expresa hacer salir/enviar fuera del campamento. «Expulsar» puede sonar penal o coercitivo más allá de lo explícito; «saquen del campamento» o «hagan salir del campamento» refleja mejor el sentido base.
  - severity: medium
    issue: El marcador [a] está colocado en «todo» en vez de en la expresión que la nota explica
    rationale: La nota [a] trata el valor léxico de צָרוּעַ, no del cuantificador «todo». El anclaje debe ir en «enfermedad de la piel[a]» o equivalente.
  revised_spanish_text: Ordena a los hijos de Israel que saquen del campamento a toda persona con una enfermedad de la piel[a], a todo el que tenga una secreción y a todo el que esté impuro por un cadáver[b].
  revised_footnotes:
  - marker: a
    text: O, «todo leproso». El término hebreo abarca, en contextos de ley ritual, una afección grave de la piel, no necesariamente la lepra moderna.
    reason: lexical_alternative
  - marker: b
    text: Lit., «todo impuro por una persona/alma»; este modismo se refiere a la impureza causada por un cadáver.
    reason: lexical_alternative
  revision_rationale: Se revisa el texto principal para alinear כָּל צָרוּעַ con la decisión léxica documentada del POB, evitando «leproso» en el cuerpo del texto y conservándolo como alternativa en nota. También se cambia «expulsen» por «saquen» para reflejar con más neutralidad וִישַׁלְּחוּ, y se corrigen los anclajes de las notas para que correspondan a los términos explicados.
