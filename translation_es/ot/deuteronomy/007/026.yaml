review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: prohibición de introducir una תּוֹעֵבָה en la casa, advertencia consecuencial, doble mandato intensificado de rechazo, y razón causal final. Sin embargo, falla en la decisión clave para חֵרֶם: el inglés auditado decidió ''devoted to destruction'' con nota alternativa, mientras que el español principal introduce la transliteración ''herem'', que no preserva la decisión documentada ni la legibilidad esperada del texto principal. Además, la nota [a] está anclada en ''casa'' aunque explica חֵרֶם; el anclaje debe ir sobre la expresión correspondiente.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'herem' en el cuerpo principal suena técnico y poco natural para lectura bíblica pública. 'Para que no llegues a ser' funciona, aunque 'no sea que llegues a ser' refleja mejor la advertencia. La repetición 'ciertamente' es aceptable, pero el conjunto mejora con una formulación más idiomática y fiel al dossier.
  glossary_alignment: 'Alineación parcial. ''abominación'', ''tu casa'', ''detestar'' y ''aborrecer'' concuerdan bien. La principal desviación es חֵרֶם: según el rastro POB debe expresarse en texto principal como ''dedicado a destrucción'' o equivalente claro, no como transliteración. La nota puede conservar las alternativas ''bajo el ban'' y ''maldita''.'
  issues:
  - severity: high
    issue: Uso de 'herem' en el texto principal para חֵרֶם
    rationale: 'El dossier inglés documenta una decisión explícita: traducir el término como ''devoted to destruction'' en el cuerpo principal y dejar ''under the ban/accursed'' como alternativas en nota. La transliteración no sigue esa decisión y reduce la inteligibilidad en español.'
  - severity: medium
    issue: La nota [a] está anclada en 'casa' en vez de la expresión que traduce חֵרֶם
    rationale: La nota explica el término חֵרֶם, no 'tu casa'. Debe marcar la frase relevante para evitar confusión y cumplir la disciplina de anclaje.
  - severity: medium
    issue: '''para que no llegues a ser'' es menos preciso que una advertencia tipo ''no sea que llegues a ser'''
    rationale: El hebreo y el inglés auditado expresan advertencia preventiva ('lest'). 'No sea que' comunica mejor ese matiz que una finalidad más simple.
  - severity: low
    issue: La alternativa 'devotado a destrucción' en decisiones léxicas es español deficiente
    rationale: Aunque no está en el texto principal, evidencia una formulación poco natural; 'dedicado a destrucción' o 'consagrado a destrucción' sería mejor.
  revised_spanish_text: Y no introduzcas una abominación en tu casa, no sea que llegues a ser dedicado a destrucción[a] como ella. Ciertamente la detestarás y ciertamente la aborrecerás, porque es dedicada a destrucción.
  revised_footnotes:
