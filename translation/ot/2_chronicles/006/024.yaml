theological_decisions:
- issue: Repentance language in וְשָׁבוּ
  chosen_reading: turn back
  alternative_readings:
  - return
  - repent
  rationale: The verse describes covenant restoration after sin and defeat, so repentance is conceptually present. However, the Hebrew verb itself is broader than an explicit technical term for repentance. 'Turn back' preserves the theological tension without narrowing the sense beyond the source text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
