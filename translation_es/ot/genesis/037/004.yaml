review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la secuencia básica del hebreo: percepción de los hermanos, amor preferencial del padre, odio resultante e incapacidad de hablarle amistosamente. Sin embargo, hay dos ajustes importantes para mayor fidelidad: el hebreo narrativo favorece mejor un pasado puntual (''amó'', ''pudieron'') en esta cadena narrativa, y la nota al pie actual no preserva una alternativa real, porque repite prácticamente la misma frase que el texto principal en vez de reflejar la alternativa documentada (''hablarle amistosamente'' / ''hablarle en términos amistosos'').'
  spanish_quality_summary: El español es claro y legible, pero 'más que a todos sus hermanos' suena algo tosco; 'más que a cualquiera de sus hermanos' o 'más que a todos sus hermanos' son posibles, aunque la segunda es más literal. 'No podían hablarle en paz' es comprensible, pero en español natural suena algo calcado; se puede mantener por cercanía semítica si la nota explica el sentido amistoso. La puntuación y el registro son adecuados.
  glossary_alignment: No hay términos del glosario mayor en juego salvo lenguaje relacional ordinario. El borrador mantiene bien 'amar' para אָהַב en vez de introducir 'favorecer', conforme a la decisión auditada. No hay conflictos con Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Aspecto verbal narrativo en 'amaba'
    rationale: Aunque el hebreo usa un qatal dentro de la cláusula de percepción, en esta narración encadena hechos completos. 'Su padre lo amó más...' en español refleja mejor la constatación puntual que desencadena la reacción de los hermanos que el imperfecto 'amaba'.
  - severity: medium
    issue: Aspecto verbal en 'no podían'
    rationale: El hebreo וְלֹא יָכְלוּ en la secuencia wayyiqtol/qatal narrativa se vierte con mayor naturalidad como 'no pudieron'. 'No podían' no es imposible, pero introduce un matiz durativo menos directo que el audit trail inglés.
  - severity: medium
    issue: Nota al pie no ofrece una alternativa distinta
    rationale: 'La nota actual repite ''no podían hablarle en paz'' en vez de ofrecer la alternativa semántica documentada: ''no podían hablarle en términos amistosos'' o equivalente. Una nota debe aclarar el sentido idiomático de לְשָׁלוֹם.'
  revised_spanish_text: Cuando sus hermanos vieron que su padre lo amó más que a todos sus hermanos,[a] lo odiaron y no pudieron hablarle en paz.
  revised_footnotes:
  - marker: a
    text: 'O: «no pudieron hablarle en términos amistosos». Lit. «no pudieron hablarle en paz».'
    reason: lexical_alternative
  revision_rationale: Se ajustan los tiempos verbales a un pasado narrativo más natural y más cercano a la secuencia hebrea y al audit trail inglés. Se conserva 'en paz' en el texto por fidelidad al hebreo לְשָׁלוֹם, pero la nota se corrige para ofrecer una alternativa explicativa real y útil en español. No se requiere adjudicación adicional.
