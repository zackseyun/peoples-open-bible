translation:
  language: es
  text: 'Por tanto, así dice el Señor, Yahvé: Puesto que todos ustedes se han convertido en escoria[a], por eso he aquí que yo los reuniré en medio de Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'residuo de fundición' o 'impurezas metálicas'. El término hebreo se refiere al material de desecho separado del metal durante la fundición.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, 'el Señor Yahvé' preserva ambos elementos sin sustituir el nombre por un enmascaramiento litúrgico como 'SEÑOR', y evita la redundancia de 'Señor Señor'.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión o consecuencia del juicio. 'Por tanto' mantiene el valor inferencial y suena natural en español bíblico contemporáneo.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Expresa la base causal de la sentencia. 'Porque' es claro y conserva la relación de causalidad directa del hebreo.
- source_word: הֱיוֹת
  english_pob_choice: have become
  chosen_spanish: se han convertido
  alternatives_spanish:
  - han llegado a ser
  - son
  lexicon: HALOT
  rationale: El infinitivo constructo con יַעַן expresa un estado resultante. 'Se han convertido' comunica bien ese cambio de condición sin forzar una paráfrasis.
- source_word: כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos vosotros
  - todos ustedes juntos
  lexicon: HALOT
  rationale: Preserva el alcance colectivo del plural de segunda persona. 'Ustedes' mantiene registro neutral latinoamericano.
- source_word: לְסִגִים
  english_pob_choice: dross
  chosen_spanish: escoria
  alternatives_spanish:
  - dross
  - impurezas metálicas
  lexicon: HALOT
  rationale: סִיגִים designa el residuo o material impuro separado del metal. 'Escoria' es el equivalente español más natural y conserva la imagen metalúrgica del contexto.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí,
  alternatives_spanish:
  - mire que
  - estoy por
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una afirmación enfática e inminente. 'He aquí' preserva la deixis y el tono profético en español.
- source_word: קֹבֵץ
  english_pob_choice: am gathering
  chosen_spanish: los voy a reunir
  alternatives_spanish:
  - los reuniré
  - los estoy reuniendo
  lexicon: HALOT
  rationale: El participio con הִנְנִי comunica acción cierta e inminente. 'Los voy a reunir' reproduce esa inminencia en un español natural y evita una traducción demasiado mecánica del aspecto.
- source_word: אֶל תּוֹךְ יְרוּשָׁלִָם
  english_pob_choice: into the midst of Jerusalem
  chosen_spanish: en medio de Jerusalén
  alternatives_spanish:
  - en el centro de Jerusalén
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: תּוֹךְ significa 'medio/interior'. 'En medio de Jerusalén' conserva la imagen espacial y el énfasis del contexto judicial mejor que un simple 'dentro de Jerusalén'.
theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: La política del proyecto pide traducir יְהוִה como 'Yahvé' en el texto principal. Mantener 'Señor' para אֲדֹנָי y 'Yahvé' para el nombre divino preserva la doble designación del hebreo sin ocultar el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor profético de הִנְנִי + participio
  english_pob_reading: behold, I am gathering
  chosen_spanish_reading: he aquí, los voy a reunir
  alternative_spanish_readings:
  - he aquí, los estoy reuniendo
  - miren, los reuniré
  rationale: La construcción hebrea expresa certeza e inminencia. En español, 'los voy a reunir' transmite la cercanía de la acción sin perder el tono solemne de anuncio profético.
  doctrine_reference: Uso profético del perfecto/participio en hebreo bíblico
translation_notes:
  revision_awareness: El audit trail en inglés no requirió cambios revisionales; el contenido se mantiene en alta concordancia con la traducción fuente, con adaptación sistemática al criterio del proyecto para YHWH → Yahvé y con equivalencias españolas naturales para el vocabulario metalúrgico y la fórmula profética.
  spanish_consistency_notes:
  - Se usó 'Señor' para אֲדֹנָי y 'Yahvé' para יְהוִה, conforme al criterio del proyecto.
  - '''Todos ustedes'' conserva el plural enfático כֻּלְּכֶם en registro latinoamericano neutral.'
  - '''Escoria'' mantiene la metáfora metalúrgica de סִיגִים sin explicar en exceso el verso.'
  - '''En medio de Jerusalén'' refleja תּוֹךְ con mayor precisión espacial que ''dentro de Jerusalén''.'
