translation:
  language: es
  text: Pasará por el mar de angustia[a] y herirá las olas del mar; y se secarán todas las profundidades del Nilo[b]. La soberbia de Asiria será abatida, y el cetro[c] de Egipto se apartará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «por un mar de angustia» o «por el mar angustioso». El hebreo es compacto y puede evocar imágenes del éxodo además de designar un mar literal.'
    reason: lexical_alternative
  - marker: b
    text: יְאֹר puede significar «río», pero en contexto egipcio suele referirse al Nilo.
    reason: lexical_alternative
  - marker: c
    text: 'También: «la vara de Egipto». «Cetro» destaca mejor la idea de poder y gobierno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר
  english_pob_choice: He will pass through
  chosen_spanish: Pasará por
  alternatives_spanish:
  - Pasará a través de
  - Atravesará
  lexicon: HALOT
  rationale: El perfecto con sentido profético se vierte en futuro. «Pasará por» conserva la imagen de movimiento sin añadir matices no presentes en el hebreo.
- source_word: בַּיָּם צָרָה
  english_pob_choice: through the sea of distress
  chosen_spanish: el mar de angustia
  alternatives_spanish:
  - el mar de aflicción
  - el mar de angustia y tribulación
  - el mar turbulento
  lexicon: HALOT
  rationale: Se mantiene la estructura nominal compacta y el sustantivo צָרָה como «angustia»; «mar de angustia» suena natural en español y conserva la posible alusión de éxodo/angustia sin reducirlo a un adjetivo.
- source_word: וְהִכָּה בַיָּם גַּלִּים
  english_pob_choice: and strike the waves of the sea
  chosen_spanish: y herirá las olas del mar
  alternatives_spanish:
  - y golpeará las olas del mar
  - y herirá las olas en el mar
  lexicon: HALOT
  rationale: נכה se traduce por su valor básico «herir/golpear». «Las olas del mar» sigue el orden natural del español y preserva la imagen de abatir el oleaje.
- source_word: וְהֹבִישׁוּ
  english_pob_choice: will dry up
  chosen_spanish: se secarán
  alternatives_spanish:
  - se resecarán
  - serán secadas
  lexicon: HALOT
  rationale: En contexto acuático, el verbo expresa secarse/desecarse, no avergonzarse. El giro pronominal es más fluido en español y refleja el resultado del hebreo.
- source_word: כֹּל מְצוּל֣וֹת יְאֹר
  english_pob_choice: all the depths of the Nile
  chosen_spanish: todas las profundidades del Nilo
  alternatives_spanish:
  - todos los abismos del Nilo
  - todas las honduras del Nilo
  - todas las profundidades del río
  lexicon: HALOT
  rationale: מְצוּלוֹת se vierte como «profundidades» para mantener el sentido de aguas hondas; יְאֹר en contexto egipcio se entiende naturalmente como el Nilo, como en la audit trail inglesa.
- source_word: וְהוּרַד גְּא֣וֹן אַשּׁ֔וּר
  english_pob_choice: The pride of Assyria will be brought down
  chosen_spanish: La soberbia de Asiria será derribada
  alternatives_spanish:
  - El orgullo de Asiria será abatido
  - La majestad de Asiria será humillada
  - La arrogancia de Asiria será humillada
  lexicon: HALOT
  rationale: גְּאוֹן admite «orgullo», «soberbia» o «majestad»; aquí, en juicio, «soberbia» conserva bien la carga negativa. El pasivo causativo de הוּרַד se expresa con «será derribada».
- source_word: וְשֵׁבֶט מִצְרַ֖יִם
  english_pob_choice: the scepter of Egypt
  chosen_spanish: el cetro de Egipto
  alternatives_spanish:
  - la vara de Egipto
  - el bastón de Egipto
  - el cetro gubernamental de Egipto
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser «vara», «bastón», «tribu» o «cetro». En paralelo con el poder imperial de Asiria, «cetro» comunica bien el sentido de autoridad y dominio.
- source_word: יָסוּר
  english_pob_choice: will depart
  chosen_spanish: se apartará
  alternatives_spanish:
  - desaparecerá
  - se retirará
  - será quitado
  lexicon: HALOT
  rationale: El verbo expresa alejarse o retirarse; «se apartará» mantiene la idea de remoción del dominio sin sobrecargarlo con una interpretación más específica.
theological_decisions:
- issue: Sujeto implícito de la secuencia verbal
  english_pob_reading: The verse continues the preceding context with God as the implied subject of the verbs.
  chosen_spanish_reading: Se conserva la lectura de que Yahvé es el sujeto implícito que actúa en la secuencia verbal.
  alternative_spanish_readings:
  - Podría leerse con un sujeto colectivo en algunos verbos.
  - Podría neutralizarse el sujeto para dejarlo implícito sin identificación.
  rationale: El encadenamiento verbal singular y el contexto de salvación y juicio favorecen a Yahvé como agente. Mantenerlo implícito respeta el hebreo sin explicitar un sujeto ajeno al texto.
  doctrine_reference: Exodo 15; Salmo 77; Isaías 51:10-11
- issue: Valor de la imagen del mar y del Nilo
  english_pob_reading: The Hebrew phrase is compact and may evoke exodus imagery rather than identify a literal body of water only.
  chosen_spanish_reading: Se conserva la imagen compacta y evocadora del mar, con posible resonancia de éxodo, sin reducirla a una referencia meramente literal.
  alternative_spanish_readings:
  - Interpretarlo sólo como una alusión geográfica.
  - Parafrasearlo como 'las dificultades' para explicitar el sentido.
  rationale: La formulación española mantiene la metáfora bíblica y permite la resonancia intertextual que el hebreo sugiere. No se elimina la tensión entre imagen y referencia histórica.
  doctrine_reference: Éxodo 14; Isaías 11:15-16
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requirieron cambios respecto al inglés auditado; se preservaron la imagen del mar, el valor egipcio de יְאֹר y la lectura política de שֵׁבֶט.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como sujeto implícito coherente con el estándar del proyecto, aunque no aparece explícito en el versículo.
  - Se mantiene «Asiria» y «Egipto» como nombres propios estables.
  - Se prefirió «soberbia» por el matiz de גְּאוֹן en contexto de juicio, sin anular la posible idea de grandeza o majestad que queda señalada en las notas.
  - El orden y la puntuación siguen la fluidez natural del español, sin perder el paralelismo de dos movimientos de juicio sobre aguas e imperios.
