translation:
  language: es
  text: Y quebrantaron y aplastaron a los hijos de Israel en aquel año[a]; por dieciocho años oprimieron a todos los hijos de Israel que estaban al otro lado del Jordán, en la tierra de los amorreos[b], que está en Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los quebraron y oprimieron a los israelitas». El hebreo usa dos verbos intensos y casi sinónimos para subrayar la severidad de la aflicción.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «los hijos de Israel» en todo este versículo; se mantiene la forma más literal aquí para conservar la repetición formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְעֲצוּ
  english_pob_choice: they shattered
  chosen_spanish: los quebrantaron
  alternatives_spanish:
  - los quebraron
  - los destrozaron
  lexicon: HALOT
  rationale: El verbo expresa una acción violenta de romper o aplastar; en español, «quebrantar» conserva esa fuerza y permite el paralelismo con el verbo siguiente sin volverlo demasiado abstracto.
- source_word: וַיְרֹצְצוּ
  english_pob_choice: and crushed
  chosen_spanish: y los aplastaron
  alternatives_spanish:
  - y los oprimieron
  - y los machacaron
  lexicon: HALOT
  rationale: La secuencia hebrea acumula dos verbos intensos y cercanos en sentido. «Aplastaron» mantiene la imagen violenta y la intensificación sin reducirla a un solo término general como «oprimieron».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión formal y repetida del hebreo. «Hijos de Israel» mantiene mejor la repetición y la forma del texto fuente que una simplificación a «israelitas».
- source_word: בַּשָּׁנָה הַהִיא
  english_pob_choice: in that year
  chosen_spanish: en aquel año
  alternatives_spanish:
  - en ese año
  lexicon: HALOT
  rationale: «Aquel año» reproduce de modo natural el deíctico hebreo y conserva la referencia puntual al momento del ataque.
- source_word: שְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  english_pob_choice: for eighteen years
  chosen_spanish: por dieciocho años
  alternatives_spanish:
  - durante dieciocho años
  lexicon: HALOT
  rationale: La duración se expresa en español de forma directa con «por», que conserva el sentido de extensión temporal del sufrimiento.
- source_word: אֶת כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todo Israel
  - a todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene la totalidad indicada por כָּל y la expresión repetida «hijos de Israel»; el objeto directo con «a» hace fluida la sintaxis española sin perder literalidad.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: who were beyond the Jordan
  chosen_spanish: que estaban al otro lado del Jordán
  alternatives_spanish:
  - que estaban más allá del Jordán
  - que estaban al otro lado del río Jordán
  lexicon: HALOT
  rationale: «Al otro lado del Jordán» conserva el valor idiomático sin fijar una perspectiva direccional que el hebreo deja abierta.
- source_word: בְּאֶרֶץ הָאֱמֹרִי
  english_pob_choice: in the land of the Amorites
  chosen_spanish: en la tierra de los amorreos
  alternatives_spanish:
  - en el territorio de los amorreos
  - en la tierra amorrea
  lexicon: HALOT
  rationale: «Tierra de los amorreos» sigue de cerca la construcción territorial del hebreo y mantiene el sustantivo étnico tradicional en español bíblico.
- source_word: אֲשֶׁר בַּגִּלְעָד
  english_pob_choice: which is in Gilead
  chosen_spanish: que está en Galaad
  alternatives_spanish:
  - que se halla en Galaad
  - en Galaad
  lexicon: HALOT
  rationale: Se retiene la cláusula relativa para reproducir la identificación geográfica del texto y aclarar que la zona mencionada está ubicada en Galaad.
theological_decisions:
- issue: Intensificación por doble verbo de violencia
  english_pob_reading: The Hebrew uses two forceful, near-synonymous verbs to intensify the severity of the affliction.
  chosen_spanish_reading: Se conserva la doble serie verbal («quebraron» / «aplastaron») para reflejar la intensificación de la aflicción.
  alternative_spanish_readings:
  - Reducirlo a un solo verbo como «oprimieron»
  - Fusionar el sentido en una sola frase más general
  rationale: El hebreo no es redundante accidentalmente; la acumulación verbal subraya la dureza del trato. El español debe preservar esa tensión semántica sin diluirla en un abstracto único.
  doctrine_reference: Principio de transparencia textual y preservación de énfasis retórico del texto bíblico
- issue: Expresión étnica formal «hijos de Israel»
  english_pob_reading: Rendered formally here to preserve the repeated expression.
  chosen_spanish_reading: Se mantiene «hijos de Israel» en vez de sustituirlo por una forma más general.
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La repetición forma parte de la textura del versículo y conviene conservarla para que el lector perciba el patrón del hebreo y no solo su referencia general.
  doctrine_reference: Fidelidad al patrón léxico del texto fuente
- issue: Topografía de «al otro lado del Jordán»
  english_pob_reading: Beyond the Jordan leaves the directional perspective as in the Hebrew rather than over-specifying it.
  chosen_spanish_reading: «Al otro lado del Jordán» mantiene la perspectiva abierta del hebreo.
  alternative_spanish_readings:
  - Más allá del Jordán
  - del lado oriental del Jordán
  rationale: El hebreo presenta una ubicación relativa sin precisar el punto de vista narrativo; la traducción debe conservar esa ambigüedad controlada.
  doctrine_reference: Transparencia geográfica y respeto por la deixis del original
translation_notes:
  revision_awareness: El contexto inglés de POB fue revisado para mantener la pareja verbal intensiva («shattered and crushed») y la estructura geográfica completa. La versión española sigue esa misma decisión de no suavizar la violencia verbal ni simplificar la designación de «sons of Israel». También respeta la actualización editorial que convirtió la frase de duración en una cláusula completa en inglés; en español se expresa naturalmente con «por dieciocho años oprimieron».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se conserva «hijos de Israel» por consistencia con el registro formal del proyecto.
  - Se emplea «Galaad» como forma española usual del topónimo.
  - Se evita «SEÑOR» porque no hay aquí sustitución del nombre divino.
  - La puntuación con punto y coma reproduce la pausa mayor entre la agresión puntual y la duración del dominio.
