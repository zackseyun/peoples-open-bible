translation:
  language: es
  text: y todos los reyes de Arabia[a], y todos los reyes de los pueblos mezclados que habitan en el desierto[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los reyes de los árabes»; o «los reyes de los pueblos mixtos». El hebreo distingue este grupo de «Arabia» en la frase anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el desierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי
  english_pob_choice: kings of
  chosen_spanish: reyes de
  alternatives_spanish:
  - reyes
  lexicon: HALOT
  rationale: El constructo plural exige en español una relación posesiva o de pertenencia. «Reyes de» reproduce naturalmente la estructura del hebreo sin añadir contenido ajeno.
- source_word: עֲרָב
  english_pob_choice: Arabia
  chosen_spanish: Arabia
  alternatives_spanish:
  - los árabes
  - Arabia del desierto
  lexicon: HALOT
  rationale: Aquí funciona como nombre geográfico/etnopolítico, y «Arabia» mantiene esa referencia mejor que el etnónimo simple.
- source_word: הָעֶרֶב
  english_pob_choice: the mixed peoples
  chosen_spanish: los pueblos mezclados
  alternatives_spanish:
  - la mezcla
  - la muchedumbre mezclada
  - los pueblos mixtos
  lexicon: HALOT
  rationale: El hebreo distingue este término de עֲרָב. «Pueblos mezclados» preserva la distinción léxica y la idea de una población compuesta, sin colapsarla con Arabia.
- source_word: הַשֹּׁכְנִים
  english_pob_choice: who dwell
  chosen_spanish: que habitan
  alternatives_spanish:
  - que moran
  - que viven
  - moradores
  lexicon: HALOT
  rationale: El participio describe de manera atributiva a los pueblos; «que habitan» es idiomático en español y conserva el matiz de residencia estable.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la región desértica
  - en el yermo
  lexicon: HALOT
  rationale: Aunque «wilderness» puede traducirse como «desierto» o «desierto/wilderness» según contexto, aquí la referencia geográfica para habitantes nómadas hace más natural «desierto» en español.
- source_word: וְאֵת ... וְאֵת
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - también ... y
  - y también ... y
  lexicon: HALOT
  rationale: El hebreo repite la conjunción coordinante para continuar la lista. En español conviene reproducir esa acumulación con «y ... y» sin hacer visible el marcador de objeto.
theological_decisions:
- issue: Distinción entre עֲרָב y הָעֶרֶב en una lista de naciones/grupos
  english_pob_reading: The Hebrew distinguishes this group from 'Arabia' in the previous phrase.
  chosen_spanish_reading: El texto distingue «Arabia» de «los pueblos mezclados» como dos grupos diferentes.
  alternative_spanish_readings:
  - Arabia y los árabes
  - Arabia y la mezcla
  - Arabia y los pueblos mixtos
  rationale: La traducción debe mantener la diferencia entre los dos sintagmas hebreos, porque el propio audit trail subraya esa distinción. «Pueblos mezclados» evita fusionarlos y conserva el valor de lista de pueblos/naciones.
  doctrine_reference: Ninguna doctrina especial; cuestión de exégesis y lexicografía.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el texto hebreo y la decisión inglesa se mantienen con acuerdo alto y sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Arabia» para עֲרָב y no se sustituye por «árabes», para conservar el valor geográfico/etnopolítico señalado en el audit trail.
  - Se usa «desierto» para בַּמִּדְבָּר por naturalidad en español, aunque «wilderness» también podría reflejarse como «desierto» o «región desértica» según contexto.
  - «Pueblos mezclados» traduce הָעֶרֶב sin borrar su diferencia respecto de Arabia.
