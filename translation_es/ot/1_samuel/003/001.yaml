- from: Y el joven Samuel estaba ministrando a Yahvé[a] delante de Elí, y la palabra de Yahvé era rara en aquellos días; no había visión extendida.
  to: Ahora el muchacho Samuel estaba ministrando a Yahvé delante de Elí,[a] y la palabra de Yahvé era rara en aquellos días; las visiones no eran frecuentes.
