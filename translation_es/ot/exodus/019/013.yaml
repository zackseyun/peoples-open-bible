translation:
  language: es
  text: Nadie lo tocará[a] con la mano, porque seguramente será apedreado o lanzado con flechas[b]; sea animal o sea hombre, no vivirá. Cuando se prolongue el toque del cuerno[c], podrán subir al monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ninguna mano lo tocará», si el pronombre se toma de forma más general; el sentido es que el culpable no debe ser tocado directamente, sino ejecutado a distancia.'
    reason: alternative_reading
  - marker: b
    text: 'O: «seguramente atravesado». El verbo hebreo puede referirse a ser herido por un proyectil, probablemente flechas en este contexto.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «cuando se prolongue el yōḇēl»; probablemente se refiere a un toque prolongado de cuerno de carnero.'
    reason: cultural_note
lexical_decisions:
- source_word: תִגַּע בּוֹ יָד
  english_pob_choice: No hand shall touch him
  chosen_spanish: Nadie tocará con su mano[a]
  alternatives_spanish:
  - Ninguna mano lo tocará
  - Nadie pondrá la mano sobre él
  lexicon: HALOT
  rationale: El hebreo expresa literalmente que una mano no debe tocar al culpable. En español, una construcción impersonal con ‘nadie’ conserva el tono legal y evita una frase demasiado literal y extraña. Se mantiene el referente personal del pronombre, como en la lectura auditada del POB.
- source_word: סָקוֹל יִסָּקֵל
  english_pob_choice: he must surely be stoned
  chosen_spanish: seguramente será apedreado
  alternatives_spanish:
  - debe ser apedreado sin falta
  - será apedreado ciertamente
  lexicon: HALOT
  rationale: El infinitivo absoluto más verbo finito intensifica la certeza de la pena. ‘Seguramente será apedreado’ conserva la fuerza enfática y el registro judicial, sin añadir modalización extra.
- source_word: יָרֹה יִיָּרֶה
  english_pob_choice: surely shot
  chosen_spanish: o seguramente atravesado[b]
  alternatives_spanish:
  - o seguramente disparado
  - o seguramente herido por un tiro
  lexicon: HALOT
  rationale: El verbo puede referir a disparar o herir con proyectil; en este contexto de ejecución a distancia, ‘atravesado’ comunica el resultado violento sin obligar a especificar un arma en el texto principal. La nota conserva la alternativa lexical ‘disparado’.
- source_word: אִם בְּהֵמָה אִם אִישׁ
  english_pob_choice: whether beast or man
  chosen_spanish: sea animal o sea hombre
  alternatives_spanish:
  - sea bestia o sea hombre
  - ya sea animal o persona
  lexicon: HALOT
  rationale: ‘Beast’ puede sonar duro en español contemporáneo; ‘animal’ comunica la categoría de forma natural. Se conserva la estructura distributiva con ‘sea... o sea...’, y ‘hombre’ refleja el singular masculino del hebreo, que el POB también mantuvo.
- source_word: לֹא יִחְיֶה
  english_pob_choice: he shall not live
  chosen_spanish: no vivirá
  alternatives_spanish:
  - no permanecerá con vida
  - no habrá de vivir
  lexicon: HALOT
  rationale: La frase hebrea declara el resultado obligatorio de la transgresión. ‘No vivirá’ mantiene la tersura judicial y la fuerza absoluta sin suavizarla.
- source_word: בִּמְשֹׁךְ הַיֹּבֵל
  english_pob_choice: When the ram’s horn sounds a long blast
  chosen_spanish: Cuando se prolongue el toque del cuerno[c]
  alternatives_spanish:
  - Cuando suene prolongadamente el cuerno
  - Cuando resuene largamente el cuerno del carnero
  lexicon: HALOT
  rationale: La expresión hebrea literalmente sugiere ‘al prolongarse’ el yôbēl; el POB entiende un toque prolongado de cuerno de carnero. ‘Toque del cuerno’ es natural en español y evita introducir ‘carnero’ en el cuerpo principal, mientras la nota mantiene la aclaración cultural y léxica.
- source_word: הֵמָּה יַעֲל֥וּ בָהָר
  english_pob_choice: they may go up on the mountain
  chosen_spanish: ellos subirán al monte
  alternatives_spanish:
  - podrán subir al monte
  - subirán a la montaña
  lexicon: HALOT
  rationale: El POB ve aquí el levantamiento de la restricción tras el toque prolongado. En español, ‘subirán’ transmite bien ese permiso o habilitación sin forzar un modal que el hebreo no explicita de modo léxico directo; ‘monte’ conserva el registro bíblico del escenario.
theological_decisions:
- issue: Referente del pronombre masculino singular en la prohibición de contacto
  english_pob_reading: The suffix refers to the violator who touched the mountain, not to the mountain itself.
  chosen_spanish_reading: El pronombre se entiende como referido al transgresor que tocó el monte, no al monte mismo.
  alternative_spanish_readings:
  - El pronombre podría referirse de modo más general a lo que quedó prohibido por contacto
  rationale: El contexto inmediato trata de la persona o animal que traspasa el límite y debe morir; la lógica jurídica exige evitar el contacto directo con el condenado. La redacción española conserva ese referente personal y no neutraliza la tensión del singular masculino.
  doctrine_reference: Exodus 19:12-13; contexto legal de santidad y exclusión por contacto
- issue: Relación entre la pena y el levantamiento de la restricción al sonar el cuerno
  english_pob_reading: When the ram’s horn sounds a long blast ... they may go up on the mountain.
  chosen_spanish_reading: El acceso al monte queda habilitado solo después del toque prolongado del cuerno.
  alternative_spanish_readings:
  - Podrán subir al monte cuando suene el cuerno
  - El monte se vuelve accesible tras el toque
  rationale: 'La segunda mitad del versículo se entiende como un cambio de estado jurídico-cultual: cesa la prohibición y se permite subir. La formulación española mantiene esa transición sin añadir elementos doctrinales ajenos al texto.'
  doctrine_reference: Exodus 19:13; santidad del monte Sinaí y mediación del acceso
translation_notes:
  revision_awareness: La versión española sigue de cerca el cierre del audit trail inglés y no requiere revisión adicional según el último pase; se han conservado la ambigüedad del pronombre, la intensidad judicial de los verbos y la explicación cultural del yôbēl.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ en el texto bíblico cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ y se mantuvo un registro legal y cultual coherente con Éxodo 19.
  - Se prefirió ‘monte’ sobre ‘montaña’ para conservar el registro bíblico tradicional sin perder inteligibilidad.
  - Se mantuvo ‘hombre’ como correlato de אִישׁ, en coherencia con la decisión auditada del POB de conservar el singular masculino genérico.
