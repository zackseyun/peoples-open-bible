translation:
  language: es
  text: 'Y murmuraron[a] contra Moisés y contra Aarón todos los hijos de Israel[b], y toda la congregación les dijo: «¡Ojalá hubiéramos muerto en la tierra de Egipto! O, en este desierto, ¡ojalá hubiéramos muerto!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se quejaron» o «se lamentaron».
    reason: lexical_alternative
  - marker: b
    text: 'O «todos los israelitas». Hebreo: «todos los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלֹּנוּ
  english_pob_choice: grumbled
  chosen_spanish: murmuraron
  alternatives_spanish:
  - se quejaron
  - protestaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa descontento/queja colectiva contra los dirigentes en contexto de rebelión en el desierto. «Murmuraron» conserva bien ese matiz bíblico y es natural en español; «se quejaron» suaviza demasiado la fuerza del pasaje, y «protestaron» puede sonar más moderno pero menos preciso en este contexto.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: HALOT
  rationale: Con este verbo, la preposición marca oposición dirigida a Moisés y Aarón. «Contra» reproduce mejor la fuerza adversativa que una preposición meramente temática.
- source_word: כֹּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los israelitas
  - todos los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo sin neutralizarla. «Hijos de Israel» es fiel y transparente en español bíblico; «israelitas» sería más idiomático, pero borra la forma lexical del original.
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: עֵדָה en Números denota al cuerpo reunido del pueblo. «Congregación» mantiene ese sentido corporativo heredado por el texto bíblico y funciona bien en español eclesial contemporáneo.
- source_word: לוּ
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - ¡Si tan solo!
  - ¡Quién hubiera...!
  lexicon: HALOT
  rationale: לוּ introduce un deseo irrealizado y contrafactual. «¡Ojalá!» comunica de forma natural en español ese lamento deseoso; «si tan solo» es válido pero más literal y menos fluido.
- source_word: מַתְנוּ / מָתְנוּ
  english_pob_choice: we had died
  chosen_spanish: hubiéramos muerto
  alternatives_spanish:
  - habríamos muerto
  - muriéramos
  lexicon: HALOT
  rationale: El qatal tras לוּ expresa un deseo contrario a la realidad pasada. El pluscuamperfecto de subjuntivo en español («hubiéramos muerto») expresa mejor ese matiz contrafactual que el condicional o el pretérito simple.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce la amplitud de אֶרֶץ y el marco geográfico-covenantal del hebreo. «En Egipto» sería más breve, pero menos fiel al fraseo del texto.
- source_word: בַּמִּדְבָּר הַזֶּה
  english_pob_choice: in this wilderness
  chosen_spanish: en este desierto
  alternatives_spanish:
  - en este desierto estéril
  - en este lugar desértico
  lexicon: HALOT
  rationale: Aunque «wilderness» suele renderizarse como «desierto» en español, aquí la frase alude al lugar hostil e inhabitable de la marcha. «Desierto» es claro y natural; se evita «wilderness» en inglés por no ser español corriente.
theological_decisions:
- issue: Designación nacional masculina en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: all the sons of Israel
  chosen_spanish_reading: todos los hijos de Israel
  alternative_spanish_readings:
  - todos los israelitas
  - todos los hijos de Israel
  rationale: Se conserva la forma masculina del hebreo, en línea con la política de precisión gramatical del proyecto. La frase sigue refiriéndose al pueblo entero, pero sin neutralizar la imagen filial del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura y decisiones del audit trail inglés de POB, sin cambios de sentido. No se introdujeron revisiones textuales ni variantes en este versículo según el paquete provisto.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis bíblica clara y publicable en español, evitando arcaísmos innecesarios.
  - Se preservó el paralelismo de las dos cláusulas de deseo con tiempos verbales contrafactuales naturales en español.
  - Se usó «murmuraron» para reflejar el matiz de queja rebelde sin endurecerlo más allá del hebreo.
