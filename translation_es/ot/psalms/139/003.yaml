translation:
  language: es
  text: Cribas mi camino y mi acostarme[a], y conoces bien todos mis caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Escudriñas mi camino y mi acostarme». El verbo hebreo lleva la imagen de aventar o cribar grano, y por eso sugiere un examen minucioso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרְחִי
  english_pob_choice: my path
  chosen_spanish: mi andar
  alternatives_spanish:
  - mi camino
  - mi senda
  lexicon: HALOT
  rationale: El hebreo apunta a una imagen concreta de recorrido o camino. En español, "andar" conserva la idea de movimiento y de trayectoria vital sin forzar una literalidad pesada. "Camino" es posible, pero "andar" ayuda a que la primera mitad del paralelismo no se confunda de inmediato con "caminos" al final del verso.
- source_word: רִבְעִי
  english_pob_choice: my lying down
  chosen_spanish: mi reposo
  alternatives_spanish:
  - mi acostarme
  - mi recostarme
  - mi lugar de descanso
  lexicon: HALOT
  rationale: La forma se refiere al acto de acostarse o recostarse. "Reposo" comunica bien la idea en español poético y bíblico, aunque es un poco más interpretativo que "acostarme". Se elige por fluidez y porque mantiene el contraste con el movimiento implícito en "andar".
- source_word: זֵרִיתָ
  english_pob_choice: you sift out
  chosen_spanish: cribas
  alternatives_spanish:
  - avientas
  - cribas cuidadosamente
  - pudres examinar
  lexicon: HALOT
  rationale: El verbo hebreo conserva la imagen de aventar, cribar o aventar el grano. "Cribas" es una equivalencia fuerte y comprensible en español, y preserva la metáfora de examen minucioso sin reducirla a un simple "buscar".
- source_word: דְּרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mi conducta
  - mi manera de vivir
  lexicon: HALOT
  rationale: '"Caminos" reproduce de manera directa la metáfora hebrea de דרך y permite oír tanto el sentido literal como el moral o existencial. Mantiene además el paralelismo con "andar".'
- source_word: הִסְכַּנְתָּה
  english_pob_choice: you are acquainted with
  chosen_spanish: estás familiarizado con
  alternatives_spanish:
  - conoces bien
  - estás al tanto de
  - te has acostumbrado a
  lexicon: HALOT
  rationale: El Hiphil de סכן expresa familiaridad o conocimiento íntimo. "Estás familiarizado con" conserva bien ese matiz relacional y evita convertir el verbo en una abstracción genérica como "sabes".
theological_decisions:
- issue: Imagen concreta de examen divino frente a abstracción de omnisciencia
  english_pob_reading: Retain the concrete metaphors of sifting and ways while expressing God's exhaustive knowledge without doctrinal expansion.
  chosen_spanish_reading: Mantener la imagen de cribar junto con la de caminos y reposo, sin convertirla en una paráfrasis abstracta de "conoces todo".
  alternative_spanish_readings:
  - me examinas
  - me conoces por completo
  - escudriñas mi vida
  rationale: El verso poético habla de una acción cuidadosa y penetrante de Dios sobre toda la vida del salmista. En español conviene conservar la metáfora de cribar, porque transmite mejor la tensión literaria del texto que una simplificación abstracta.
  doctrine_reference: Salmo 139:3; filosofía de equivalencia óptima; preservación de metáfora poética
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: ''sift out'' preserva la metáfora de זרה, ''my lying down'' se volvió ''mi reposo'' por naturalidad poética en español, y ''my ways'' se conservó como ''mis caminos'' para mantener el paralelismo con ''andar''. No se detectaron revisiones posteriores que alteraran estas decisiones.'
  spanish_consistency_notes:
  - Se mantuvo "caminos" para דרך, coherente con el uso bíblico amplio de una vida o conducta como camino.
  - '"Cribas" conserva la fuerza figurada del hebreo mejor que un mero "buscas".'
  - Se evitó "SEÑOR" porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
