translation:
  language: es
  text: En vez de estas cosas[a], alimentaste a tu pueblo con el alimento de ángeles, y sin fatiga les enviaste pan preparado del cielo, con toda clase de deleites y apto para todo gusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comida de ángeles» o «pan apto para ángeles». La expresión griega no exige una explicación más específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθʼ ὧν
  english_pob_choice: Instead of these things
  chosen_spanish: En vez de estas cosas
  alternatives_spanish:
  - A cambio de estas cosas
  - En lugar de estas cosas
  lexicon: LSJ
  rationale: La frase introduce contraste con los juicios previos; «En vez de estas cosas» conserva ese valor adversativo de manera natural en español.
- source_word: ἀγγέλων τροφήν
  english_pob_choice: the food of angels
  chosen_spanish: alimento de ángeles
  alternatives_spanish:
  - comida de ángeles
  - pan de ángeles
  lexicon: LSJ
  rationale: «τροφὴν» es alimento/nutrición; «alimento de ángeles» mantiene la construcción genitiva sin forzar una aclaración teológica que el griego no exige.
- source_word: ἐψώμισας
  english_pob_choice: you fed
  chosen_spanish: alimentaste
  alternatives_spanish:
  - les diste de comer
  - los sustentaste
  lexicon: LSJ
  rationale: El verbo significa alimentar o dar de comer; «alimentaste» es directo, claro y fiel al objeto inmediato «tu pueblo».
- source_word: ἕτοιμον ἄρτον
  english_pob_choice: ready bread
  chosen_spanish: pan preparado
  alternatives_spanish:
  - pan listo
  - pan ya preparado
  lexicon: LSJ
  rationale: «ἕτοιμον» comunica algo ya preparado o listo; «pan preparado» suena natural en español y conserva la idea de provisión dispuesta de antemano.
- source_word: ἀπʼ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: LSJ
  rationale: «Desde el cielo» expresa el origen espacial de forma transparente y idiomática en español.
- source_word: ἀκοπιάτως
  english_pob_choice: without toil
  chosen_spanish: sin fatiga
  alternatives_spanish:
  - sin trabajo
  - sin esfuerzo
  lexicon: LSJ
  rationale: El adverbio denota ausencia de trabajo penoso o cansancio; «sin fatiga» mantiene ese matiz de no haber desgaste ni labor pesada.
- source_word: πᾶσαν ἡδονὴν ἰσχύοντα
  english_pob_choice: having every delight
  chosen_spanish: teniendo todo deleite
  alternatives_spanish:
  - con todo deleite
  - poseyendo todo deleite
  lexicon: LSJ
  rationale: La revisión inglesa evitó ampliar a «satisfy» y volvió más literal la idea de «ἰσχύοντα»; «teniendo todo deleite» conserva esa cercanía al participio y a la plenitud de cualidades agradables.
- source_word: πρὸς πᾶσαν ἁρμόνιον γεῦσιν
  english_pob_choice: suited to every taste
  chosen_spanish: apto para todo gusto
  alternatives_spanish:
  - adaptado a todo paladar
  - adecuado para todo gusto
  lexicon: LSJ
  rationale: «ἁρμόνιον» implica ajuste o conveniencia armoniosa, y «γεῦσις» es gusto/paladar; «apto para todo gusto» comunica esa adaptabilidad de modo natural y preciso.
theological_decisions:
- issue: La expresión «alimento de ángeles» y su posible sentido
  english_pob_reading: Retain the phrase as written without explaining whether it means food belonging to angels or food fit for angels.
  chosen_spanish_reading: Mantener «alimento de ángeles» sin precisar si significa alimento de los ángeles o alimento apto para ángeles.
  alternative_spanish_readings:
  - alimento de los ángeles
  - pan apto para ángeles
  - pan de ángeles
  rationale: El genitivo griego permite varias lecturas; en español conviene conservar esa tensión sin resolverla, para no imponer una interpretación que el texto no obliga a fijar.
  doctrine_reference: Preservar la tensión semántica y teológica del texto.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: mantiene el contraste inicial, conserva la fórmula «alimento de ángeles» sin explicación restrictiva, traduce ἀκοπιάτως con un equivalente directo de ausencia de fatiga, y refleja la redacción revisada de πᾶσαν ἡδονὴν ἰσχύοντα sin introducir una paráfrasis como «capaz de satisfacer».'
  spanish_consistency_notes:
  - Se usó «Dios» no por aparecer en este verso sino por coherencia con el proyecto; aquí no hay término divino explícito.
  - Se prefirió «alimento» sobre «comida» por el tono más solemne y por la cercanía a la estructura del griego.
  - «Sin fatiga» mantiene el matiz de ἀκοπιάτως sin convertirlo en una explicación interpretativa más amplia.
  - «Apto para todo gusto» conserva el valor de adaptabilidad de ἁρμόνιον γεῦσιν sin sustituirlo por un equivalente culinario demasiado libre.
