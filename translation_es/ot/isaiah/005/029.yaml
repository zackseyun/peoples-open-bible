translation:
  language: es
  text: Su rugido es como el de un león[a], y ruge como leones jóvenes; gruñe y se apodera de la presa, y se la lleva[b], sin que nadie la rescate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como el de una leona’; el hebreo admite esa posibilidad en algunos contextos, aunque aquí ‘león’ encaja mejor con el paralelismo.
    reason: lexical_alternative
  - marker: b
    text: O ‘la arrastra’ / ‘escapa con ella’; el verbo hebreo sugiere llevarse la presa de modo que ya no pueda recuperarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאָגָה
  english_pob_choice: roaring
  chosen_spanish: rugido
  alternatives_spanish:
  - rugir
  - rugido
  lexicon: HALOT
  rationale: 'El sustantivo designa el bramido o rugido de un león. En español, ''rugido'' mantiene el valor nominal de la cláusula inicial y suena natural en una frase copulativa: ''Su rugido es como...''.'
- source_word: לוֹ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - su
  lexicon: HALOT
  rationale: El sufijo pronominal es masculino singular y remite a la fuerza/nación personificada del contexto. 'Su' conserva la relación posesiva sin forzar el género en español.
- source_word: כַּלָּבִיא
  english_pob_choice: like a lion
  chosen_spanish: como el de un león
  alternatives_spanish:
  - como un león
  - como una leona
  lexicon: HALOT
  rationale: Aunque el término puede, en algunos contextos, entenderse más específicamente como 'leona', aquí el paralelismo con 'leones jóvenes' favorece el valor general 'león'. En español, 'como el de un león' permite vincularlo con 'rugido' sin perder la imagen.
- source_word: וְשאג
  english_pob_choice: and it roars
  chosen_spanish: y ruge
  alternatives_spanish:
  - y rugirá
  - y ruge
  lexicon: HALOT
  rationale: El verbo describe la continuación vívida de la imagen. El presente 'ruge' reproduce bien la fuerza poética y la secuencia descriptiva del hebreo.
- source_word: כַּכְּפִירִים
  english_pob_choice: like young lions
  chosen_spanish: como leones jóvenes
  alternatives_spanish:
  - como cachorros de león
  - como leoncillos
  lexicon: HALOT
  rationale: כְּפִירִים no son crías pequeñas, sino leones jóvenes en vigor predatorio. 'Leones jóvenes' preserva mejor esa fuerza que 'cachorros'.
- source_word: וְיִנְהֹם
  english_pob_choice: it growls
  chosen_spanish: ruge
  alternatives_spanish:
  - gruñe
  - brama
  lexicon: HALOT
  rationale: Aunque el verbo puede sugerir un sonido grave de gruñido, en este contexto poético sigue la cadena de imágenes leoninas. Mantener 'ruge' evita introducir una distinción demasiado técnica que en español podría sonar forzada; la progresión se conserva por la estructura del verso.
- source_word: וְיֹאחֵז טֶרֶף
  english_pob_choice: and seizes prey
  chosen_spanish: se apodera de la presa
  alternatives_spanish:
  - agarra la presa
  - se afianza en la presa
  lexicon: HALOT
  rationale: El verbo significa tomar firmemente o echar mano de. 'Se apodera de la presa' transmite la idea de captura violenta y encaja con el registro poético.
- source_word: וְיַפְלִיט
  english_pob_choice: and carries it off
  chosen_spanish: y se la lleva
  alternatives_spanish:
  - y la arrastra
  - y escapa con ella
  lexicon: HALOT
  rationale: El hifil expresa sacar la presa fuera del alcance, llevándola a un lugar donde ya no puede recuperarse. 'Se la lleva' es idiomático y conserva la irreversibilidad implícita.
- source_word: וְאֵין מַצִּיל
  english_pob_choice: with none to rescue
  chosen_spanish: sin que nadie la rescate
  alternatives_spanish:
  - y no hay quien la rescate
  - sin rescatador
  lexicon: HALOT
  rationale: La cláusula afirma la ausencia de cualquier libertador. 'Sin que nadie la rescate' expresa con claridad la impotencia total del texto.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios; no se documentan modificaciones adicionales en el audit trail. La redacción española intenta mantener la secuencia poética y la ambigüedad lexical relevante del hebreo, especialmente en el posible matiz de לָבִיא.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' cuando corresponde en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo 'presa' para טֶרֶף por la metáfora leonina, evitando 'botín' porque sería menos directo aquí.
  - Se usó 'ruge' dos veces para sostener la repetición enfática del paralelismo, aun cuando el segundo verbo hebreo puede insinuar un matiz de sonido más grave.
