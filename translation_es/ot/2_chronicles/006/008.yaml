translation:
  language: es
  text: 'Pero Yahvé dijo a David mi padre: «Porque estaba en tu corazón edificar una casa[a] para mi nombre, hiciste bien[b], porque estaba en tu corazón»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'edificar un templo para mi nombre'. El hebreo dice literalmente 'edificar una casa para mi nombre'.
    reason: lexical_alternative
  - marker: b
    text: O 'hiciste bien que estaba en tu corazón'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española establecida en el proyecto, en vez de sustituirlo por un título. Esto mantiene la transparencia hacia el hebreo y la consistencia doctrinal del POB.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: Es el verbo narrativo normal para אמר y su equivalente natural en español bíblico contemporáneo.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi padre, David
  lexicon: HALOT
  rationale: Se mantiene el parentesco literal de la fórmula de Salomón. No se expande innecesariamente el nombre propio, porque el hebreo ya lo expresa explícitamente.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La pareja de partículas introduce una cláusula causal; 'Porque' es claro, natural y fiel al valor explicativo del hebreo.
- source_word: הָיָה עִם לְבָבְךָ
  english_pob_choice: it was in your heart
  chosen_spanish: estaba en tu corazón
  alternatives_spanish:
  - estaba con tu corazón
  - lo tenías en el corazón
  - estaba en tu interior
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea del corazón como centro de intención y decisión. 'Estaba en tu corazón' comunica bien el idioma original sin desfigurarlo.
- source_word: לִבְנוֹת בַּיִת לִשְׁמִי
  english_pob_choice: to build a house for my name
  chosen_spanish: edificar una casa para mi nombre
  alternatives_spanish:
  - construir un templo para mi nombre
  - edificar un templo para mi nombre
  lexicon: HALOT
  rationale: Se conserva 'casa' como traducción literal de בַּיִת, con el valor teológico de una 'casa para el nombre' de Dios. 'Edificar' refleja bien לִבְנוֹת y suena más digno que 'construir' en este contexto.
- source_word: הֱטִיבוֹתָ
  english_pob_choice: you did well
  chosen_spanish: hiciste bien
  alternatives_spanish:
  - lo hiciste bien
  - obrando así, hiciste bien
  lexicon: HALOT
  rationale: La forma hiphil expresa aprobación. 'Hiciste bien' es la manera más natural de transmitir esa evaluación positiva en español.
- source_word: כִּי הָיָה עִם לְבָבֶֽךָ
  english_pob_choice: that it was in your heart
  chosen_spanish: que estaba en tu corazón
  alternatives_spanish:
  - porque estaba en tu corazón
  - pues estaba en tu corazón
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo sin añadir elementos ajenos. La repetición 'estaba en tu corazón' mantiene la tensión retórica del texto fuente y la aprobación de la intención de David.
theological_decisions:
- issue: 'בַּיִת לִשְׁמִי: relación entre ''casa'' y ''templo'''
  english_pob_reading: house for my name
  chosen_spanish_reading: una casa para mi nombre
  alternative_spanish_readings:
  - un templo para mi nombre
  - una casa del nombre
  rationale: El hebreo dice literalmente 'casa'; se mantiene esa forma para no ocultar la imagen original. Aunque el referente es el templo, el POB preserva la expresión 'casa para mi nombre' para respetar la carga teológica del lugar asociado al nombre de Yahvé, no a una idea de encierro divino.
  doctrine_reference: Principio de transparencia textual y preservación de la metáfora bíblica del 'nombre' divino
- issue: 'Repetición final: evaluación divina y énfasis hebreo'
  english_pob_reading: you did well that it was in your heart
  chosen_spanish_reading: hiciste bien que estaba en tu corazón
  alternative_spanish_readings:
  - hiciste bien al tener esto en tu corazón
  - hiciste bien de haberlo tenido en tu corazón
  rationale: La hebra final repite el motivo 'estaba en tu corazón'. El español conserva esa repetición, aun si suena ligeramente marcada, para no suavizar el recurso retórico ni perder la confirmación explícita de la intención interior de David.
  doctrine_reference: Respeto por la repetición semítica y por la valoración divina de la intención interior
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés POB: se evitó la expansión ''tener esto en tu corazón'', pero también se evitó una simplificación que eliminara la repetición hebrea. La solución española conserva la causalidad y la reiteración final del original, con una formulación publicable y auditables.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma española consistente con el proyecto para יְהוָה.
  - Se conserva 'casa' en lugar de 'templo' en el texto principal, siguiendo la transparencia del texto fuente.
  - Se mantiene el paralelismo 'estaba en tu corazón' dos veces, porque la repetición es parte del énfasis del hebreo.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden.
