translation:
  language: es
  text: No seas llamado de lengua doble[a][b], ni acostumbres tu lengua a eso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «poseedor de dos [cosas]», probablemente un modismo para habla dividida o engañosa; de ahí la traducción idiomática «de lengua doble».'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego dice: «No seas como un león en tu casa, ni andes fantaseando entre tus siervos». Esto difiere marcadamente del hebreo conservado y probablemente refleja una forma textual o tradición interpretativa distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No has de
  lexicon: HALOT
  rationale: La prohibición sapiencial se expresa naturalmente en español con «No» + imperativo/subjuntivo exhortativo, manteniendo fuerza directiva sin sobreformalizar.
- source_word: תִּקָּרֵא
  english_pob_choice: be called
  chosen_spanish: seas llamado
  alternatives_spanish:
  - seas nombrado
  - se te llame
  lexicon: HALOT
  rationale: El nifal pide una pasiva/reflexiva; «seas llamado» conserva la forma receptiva del hebreo y suena natural en español bíblico moderno.
- source_word: בַּעַל שְׁתַּיִם
  english_pob_choice: double-tongued
  chosen_spanish: doble de lengua
  alternatives_spanish:
  - de dos lenguas
  - doble lengua
  - bifronte
  lexicon: HALOT
  rationale: El hebreo dice literalmente «poseedor de dos [cosas]», y el contexto de la lengua orienta a habla dividida o duplicidad verbal. «Doble de lengua» mantiene esa tensión semántica sin borrar la base idiomática; se evita reemplazarla por un equivalente demasiado fijo como «doble cara».
- source_word: לְשׁוֹנְךָ
  english_pob_choice: your tongue
  chosen_spanish: tu lengua
  alternatives_spanish:
  - tu habla
  - tu palabra
  lexicon: HALOT
  rationale: «Lengua» reproduce la metáfora hebrea del órgano de la habla y es idiomático en español bíblico; «lengua» también permite vincular el dicho con la primera cláusula.
- source_word: אַל תַּרְגֵּל
  english_pob_choice: do not train
  chosen_spanish: ni acostumbres
  alternatives_spanish:
  - ni entrenes
  - ni hagas hábito de
  lexicon: HALOT
  rationale: El verbo expresa habituar/entrenar hacia una conducta; «acostumbres» comunica la idea de formar un hábito de habla sin forzar un tecnicismo. Se mantiene la relación con la lengua como objeto de esa habituación.
- source_word: וְאֶל לְשׁוֹנְךָ
  english_pob_choice: and ... to it
  chosen_spanish: a tu lengua
  alternatives_spanish:
  - para tu lengua
  - respecto de tu lengua
  lexicon: HALOT
  rationale: Aunque el inglés audit trail resuelve la preposición de modo interpretativo, el hebreo apunta a dirigir la práctica hacia la lengua. En español, «a tu lengua» comunica esa orientación de manera concisa y readable.
theological_decisions:
- issue: Tensión textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Greek parallel reads, 'Do not be like a lion in your house, and do not be fanciful among your servants.' This differs sharply from the extant Hebrew and likely reflects a different textual form or interpretive tradition.
  chosen_spanish_reading: Se traduce según el hebreo conservado, sin incorporar el paralelo griego al cuerpo del texto.
  alternative_spanish_readings:
  - No seas como un león en tu casa, ni te muestres fantasioso entre tus siervos.
  - No seas llamado doble de lengua, ni acostumbres a tu lengua a eso.
  rationale: El expediente fuente da prioridad al hebreo extante, mientras el griego se registra como tradición paralela distinta. Para no borrar la tensión textual documentada, el texto principal sigue el hebreo y no armoniza con la versión griega; la discrepancia queda reflejada en la conciencia de revisión.
  doctrine_reference: Crítica textual; prioridad del testimonio hebreo conservado frente al paralelo griego divergente.
translation_notes:
  revision_awareness: El cruce de control reporta un desacuerdo importante con el paralelo griego, porque el hebreo conservado difiere radicalmente de la tradición griega. Por eso el borrador español sigue el hebreo de base y preserva la equivalencia idiomática sin mezclar ambas tradiciones en una sola línea.
  spanish_consistency_notes:
  - Se mantuvo «lengua» para conservar la metáfora hebrea de la habla.
  - Se evitó «SEÑOR» o terminología cristiana ajena al versículo, porque no aparece ningún término divino en este pasaje.
  - La nota al pie marca la tensión lexical del hebreo sin ocultarla, y la redacción principal sigue siendo publicable y fluida.
