translation:
  language: es
  text: Segub engendró a Jair, y tuvo veintitrés ciudades en la tierra de Galaad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En contextos genealógicos, el causativo de ילד expresa la transmisión paternal de descendencia. En español, «engendró» conserva ese valor genealógico con un registro natural y bíblico, sin volver la frase rígidamente calca.
- source_word: יָאִיר
  english_pob_choice: Jair
  chosen_spanish: Jair
  lexicon: convención onomástica
  rationale: El nombre propio se translitera de forma estándar al español como «Jair».
- source_word: וַיְהִי לוֹ
  english_pob_choice: and he had
  chosen_spanish: tuvo
  alternatives_spanish:
  - y le fueron
  - y tuvo para sí
  lexicon: HALOT
  rationale: El hebreo expresa posesión con היה + ל. En español, «tuvo» transmite de manera idiomática y breve la posesión de ciudades, manteniendo el valor posesivo del original.
- source_word: עֶשְׂרִים וְשָׁלוֹשׁ
  english_pob_choice: twenty-three
  chosen_spanish: veintitrés
  alternatives_spanish:
  - veinte y tres
  lexicon: HALOT
  rationale: El número se normaliza en español moderno como «veintitrés», que es natural y fiel al cardinal hebreo.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - villas
  lexicon: HALOT
  rationale: «Ciudades» mantiene el valor territorial estándar de עִיר en este tipo de noticia genealógica y geográfica.
- source_word: בְּאֶרֶץ הַגִּלְעָד
  english_pob_choice: in the land of Gilead
  chosen_spanish: en la tierra de Galaad
  alternatives_spanish:
  - en la región de Galaad
  - en el territorio de Galaad
  lexicon: HALOT
  rationale: אֶרֶץ con nombre propio conserva la noción de tierra/territorio. «Tierra de Galaad» reproduce bien la amplitud geográfica del hebreo sin perder claridad en español.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden de forma alta; no se observaron revisiones aplicadas ni variantes textuales relevantes. La única decisión de estilo importante fue conservar un español bíblico claro sin archaismos innecesarios.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Galaad» de manera consistente con la tradición bíblica en español.
  - Se eligió un verbo genealógico con fuerza causal («engendró») para reflejar mejor el hebreo que un simple «fue padre de», pero sin endurecer el estilo.
  - La posesión se expresó con un verbo español natural («tuvo») para no forzar una construcción posesiva semítica.
