- from: Josué se levantó temprano por la mañana y pasó revista al pueblo[a], y él y los ancianos de Israel subieron delante del pueblo hacia Hai.
  to: Josué se levantó muy de mañana y pasó revista al pueblo[a], y él y los ancianos de Israel subieron delante del pueblo hacia Ai.
  rationale: Se ajusta la frase temporal para conservar el sentido hebreo con mejor naturalidad en español, se mantiene «pasó revista al pueblo» como la mejor opción contextual para פקד, se mejora la redacción de la nota léxica, y se cambia «Hai» por «Ai» para alinearse con la evidencia fuente y el inglés POB sin introducir una castellanización no documentada.
