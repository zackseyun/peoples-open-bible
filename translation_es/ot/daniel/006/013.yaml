revisions:
- from: 'Entonces se acercaron y hablaron delante del rey acerca de la injunción[a] del rey: «¿No has firmado una injunción[a] de que todo hombre[b] que haga una petición a cualquier dios o a hombre, durante treinta días, fuera de ti, oh rey, será arrojado al foso de los leones?» El rey respondió y dijo: «La cosa es cierta, conforme a la ley de los medos y de los persas, que no puede ser cambiada»[c].'
  to: 'Entonces se acercaron y hablaron delante del rey acerca de la prohibición[a] del rey: «¿No firmaste una prohibición[a] de que todo hombre[b] que haga una petición a cualquier dios o a cualquier hombre, durante treinta días, salvo a ti, oh rey, será arrojado al foso de los leones?» El rey respondió y dijo: «El asunto es firme, conforme a la ley de los medos y de los persas, que no puede ser cambiada[c]».'
  rationale: La revisión conserva el sentido fuente y la lógica lexical del POB inglés, pero corrige expresiones poco naturales o defectuosas en español. Se cambia «injunción» por «prohibición» para comunicar mejor el valor legal restrictivo de אֱסָר; se corrige «a hombre» a «a cualquier hombre»; se mejora la excepción con «salvo a ti»; y «La cosa es cierta» pasa a «El asunto es firme» para reflejar mejor la firmeza legal del original. Las notas preservan las alternativas relevantes del audit trail.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:37:16Z'
