revisions:
- from: 'Y les dije[a]: «Cada uno, arroje lejos de sí las cosas detestables delante de sus ojos, y no se contaminen[b] con los ídolos de Egipto. Yo soy Yahvé, su Dios»[c].'
  to: 'Y les dije[a]: «Que cada uno arroje las cosas detestables delante de sus ojos, y no se contaminen con los ídolos de Egipto[b]. Yo soy Yahvé, su Dios»'
  rationale: 'Se corrigió la concordancia y naturalidad de la exhortación distributiva para reflejar mejor el hebreo: «Que cada uno arroje» conserva el valor de אִישׁ con imperativos plurales sin producir una construcción española defectuosa. Se simplificó «arroje lejos de sí» a «arroje». Se eliminó la nota [c] por redundante y no necesaria para este registro.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo y sigue el audit trail inglés en los puntos principales: mandato distributivo, rechazo de objetos idolátricos, prohibición de contaminarse, y uso de «Yahvé». Sin embargo, hay un desajuste gramatical importante: «Cada uno, arroje» pasa de un distributivo singular a un imperativo singular, mientras que el hebreo tiene imperativos plurales dirigidos al grupo. Conviene mantener el distributivo con verbo plural («Cada uno arroje» suena forzado en español); una solución fiel y natural es «que cada uno arroje». También «arroje lejos de sí» añade matiz no exigido por השליך y suena menos natural que «arrojen».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero necesita un ajuste de fluidez y concordancia. «Y les dije» está bien. «Las cosas detestables delante de sus ojos» es aceptable, aunque «que tienen delante de sus ojos» fluye un poco mejor; no es necesario cambiarlo. Debe quitarse la nota [c], porque introduce una explicación teológica redundante no preservada en el audit trail inglés y sobrecarga el versículo. El cierre «Yo soy Yahvé, su Dios» es correcto para español latinoamericano amplio.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהֵיכֶם -> «su Dios», גִּלּוּלִים -> «ídolos» con matiz peyorativo en nota, y אַל תִּטַּמָּאוּ -> «no se contaminen». La principal excepción es sintáctica, no terminológica: la representación de אִישׁ más el imperativo plural debe rehacerse en español para conservar el valor distributivo sin romper la gramática.'
  issues:
  - severity: high
    issue: Concordancia verbal incorrecta en «Cada uno, arroje»
    rationale: El hebreo usa אִישׁ distributivo con imperativos plurales. En español, «Cada uno, arroje» cambia impropiamente a singular y suena como mandato individual aislado, no como exhortación al grupo con fuerza distributiva.
  - severity: medium
    issue: «arroje lejos de sí» añade matiz no necesario y resulta poco natural
    rationale: הַשְׁלִיכוּ significa «arrojar/echar fuera». «Lejos de sí» no está explícito en la fuente y complica la frase sin ganancia semántica.
  - severity: low
    issue: Nota [c] es innecesaria en este versículo
    rationale: El uso de «Yahvé» ya sigue la norma del proyecto. La nota no responde a una ambigüedad textual del versículo ni a una nota preservada en el audit trail inglés.
  revised_spanish_text: 'Y les dije[a]: «Que cada uno arroje las cosas detestables delante de sus ojos, y no se contaminen con los ídolos de Egipto[b]. Yo soy Yahvé, su Dios»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «las cosas detestables de sus ojos», un giro idiomático para los objetos abominables que cada persona contempla o desea; probablemente se trata de objetos idolátricos.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «ídolos» aquí es muy despectivo en Ezequiel; también podría expresarse como «ídolos inmundos» o, más literalmente, «ídolos de estiércol».
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la concordancia y naturalidad de la exhortación distributiva para reflejar mejor el hebreo: «Que cada uno arroje» conserva el valor de אִישׁ con imperativos plurales sin producir una construcción española defectuosa. Se simplificó «arroje lejos de sí» a «arroje». Se eliminó la nota [c] por redundante y no necesaria para este registro.'
