translation:
  language: es
  text: Hicieron un becerro en Horeb y se postraron ante una imagen fundida[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «imagen fundida» o «imagen vaciada»; el término hebreo se refiere específicamente a una imagen formada por fundición, a menudo en metal.
    reason: lexical_alternative
  - marker: b
    text: Esto recuerda el becerro hecho en Horeb/Sinaí en Éxodo 32.
    reason: cross_reference
lexical_decisions:
- source_word: יַעֲשׂוּ
  english_pob_choice: They made
  chosen_spanish: Hicieron
  alternatives_spanish:
  - Hicieron para sí
  - Fabricaron
  lexicon: HALOT
  rationale: עשה en qal expresa hacer o producir. «Hicieron» es directo, natural y no añade matices que el hebreo no exige.
- source_word: עֵגֶל
  english_pob_choice: a calf
  chosen_spanish: un becerro
  alternatives_spanish:
  - un ternero
  - un novillo joven
  lexicon: HALOT
  rationale: עֵגֶל designa un bovino joven; en español bíblico y moderno «becerro» comunica bien esa imagen y mantiene la referencia al episodio de Horeb/Sinaí.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - allí en Horeb
  lexicon: HALOT
  rationale: La preposición ב con nombre de lugar se expresa de forma natural en español con «en». No requiere una paráfrasis más interpretativa.
- source_word: וַיִּשְׁתַּחֲווּ
  english_pob_choice: and bowed down
  chosen_spanish: y se postraron
  alternatives_spanish:
  - y adoraron
  - y se inclinaron
  lexicon: HALOT
  rationale: El verbo denota inclinarse o postrarse en homenaje/adoración. «Se postraron» conserva el gesto físico señalado por el hebreo y deja claro el acto de idolatría por el contexto.
- source_word: לְמַסֵּכָה
  english_pob_choice: to a cast image
  chosen_spanish: ante una imagen fundida
  alternatives_spanish:
  - ante una imagen fundida en metal
  - ante una imagen vaciada
  - ante un ídolo fundido
  lexicon: HALOT
  rationale: מַסֵּכָה se refiere a una imagen hecha por fundición. En español, «imagen fundida» mantiene esa fuerza lexical sin expandirse indebidamente; la preposición «ante» refleja el sentido de rendir homenaje delante del objeto, como ocurre en el acto descrito.
theological_decisions:
- issue: Si explicitar o no el carácter de idolatría y la conexión con el becerro de Horeb/Sinaí
  english_pob_reading: Retains 'a calf' and 'a cast image'; footnote recalls Exodus 32.
  chosen_spanish_reading: Mantener la imagen del becerro y la postración ante la imagen fundida, con nota de referencia al episodio del Sinaí/Horeb.
  alternative_spanish_readings:
  - becerro de oro
  - ídolo
  rationale: El verso hebreo no dice «de oro»; añadirlo importaría un dato del relato de Éxodo 32. «Imagen fundida» conserva el rasgo material específico del término y la nota permite la remisión intertextual sin alterar el texto.
  doctrine_reference: Translation philosophy §1; primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'an image cast in metal' a 'a cast image' para hacer más directa la forma de מַסֵּכָה. La versión española sigue esa dirección con «imagen fundida», que es breve, fiel y suficientemente técnica, sin añadir 'oro' ni especificar metal donde el verso no lo hace.
  spanish_consistency_notes:
  - Se usa «Horeb» para conservar la toponimia del texto fuente y su vínculo con Éxodo 32.
  - Se evita «Cristo/SEÑOR» u otras sustituciones no pertinentes; este verso no contiene terminología para Yahvé ni para Mesías.
  - «Se postraron» mantiene la acción física y cultual sin diluirla en un simple 'adoraron'.
  - «Imagen fundida» preserva el valor lexical de מַסֵּכָה y evita 'ídolo', que sería más general y menos preciso.
