review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: promesa de posesión territorial seguida por la delimitación geográfica. Conserva correctamente «desde el río, el río Éufrates» y «mar occidental» con nota sobre el sentido literal. Sin embargo, «que pise la planta de su pie» no representa con naturalidad ni precisión la expresión hebrea «la planta de vuestro pie pise en él»; en español sugiere erróneamente que la planta pisa algo, en vez de que ustedes ponen el pie en un lugar. También conviene mantener el plural de segunda persona con mayor claridad.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero la frase inicial suena poco natural en español. «Todo lugar donde pise la planta de sus pies» o una formulación equivalente comunica mejor la imagen concreta y evita tropiezo sintáctico. El resto del versículo es legible y adecuado para un registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología proyectual principal. Los topónimos y la nota sobre «mar occidental» están bien encaminados. La revisión propuesta mejora la fidelidad idiomática sin alterar decisiones léxicas clave.
  issues:
  - severity: high
    issue: 'Expresión inicial poco fiel y poco natural: «Todo lugar que pise la planta de su pie»'
    rationale: El hebreo כַּף רַגְלְכֶם es una expresión fija «la planta de vuestro pie». En español, la construcción con «que pise la planta de su pie» resulta torpe y semánticamente extraña, porque parece hacer sujeto a «la planta» de una acción mal encajada. Debe reformularse con «donde pise la planta de sus pies» o similar.
  - severity: medium
    issue: Inconsistencia de número/persona en «su pie / ustedes / su límite»
    rationale: El hebreo usa segunda persona plural. El español del borrador mezcla posesivos singulares formales con «ustedes». En español latinoamericano bíblico es preferible mantener «sus pies ... de ustedes ... su límite» o simplificar con una formulación coherente.
  - severity: low
    issue: La nota al pie está anclada en «pie» pero comenta «mar occidental»
    rationale: El marcador [a] debe aparecer en la frase relevante. Actualmente está colocado tras «pie», pero la nota explica «mar occidental»/«mar de atrás». Debe moverse al sintagma correspondiente.
  revised_spanish_text: Todo lugar donde pise la planta de sus pies será de ustedes; desde el desierto y el Líbano, desde el río, el río Éufrates, hasta el mar occidental[a], será su límite.
  revised_footnotes:
  - marker: a
    text: O «hasta el mar occidental», tradicionalmente entendido como el mar Mediterráneo; literalmente, «el mar de atrás/último».
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula inicial para representar con fidelidad y naturalidad la expresión hebrea sobre «la planta del pie», se armoniza mejor la segunda persona plural y se traslada la nota al punto textual que realmente comenta. No se requieren cambios doctrinales ni de fondo.
