translation:
  language: es
  text: Y cuando los que llevaban el arca de Yahvé hubieron dado seis pasos[a], sacrificó un buey y un ternero cebado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "seis paces".
    reason: lexical_alternative
  - marker: b
    text: Hebreo "un animal cebado"; tradicionalmente aquí se entiende como un ternero cebado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: Uso consistente del nombre divino en el proyecto / equivalencia directa del Tetragrámaton
  rationale: El hebreo contiene el nombre propio divino יְהוָה; por la norma del proyecto se conserva como 'Yahvé' y no se oculta detrás de un sustituto como 'el SEÑOR'. 'Yahveh' es posible, pero 'Yahvé' es la forma base del proyecto en español.
- source_word: אֲרוֹן
  english_pob_choice: the ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca sagrada
  - arca del pacto
  lexicon: HALOT
  rationale: En contexto cultual, אֲרוֹן designa el arca sagrada. 'Arca' preserva el término técnico sin añadir especificación que el hebreo de este versículo no expresa explícitamente.
- source_word: נֹשְׂאֵי
  english_pob_choice: those carrying
  chosen_spanish: los que llevaban
  alternatives_spanish:
  - los portadores de
  - los que transportaban
  lexicon: HALOT
  rationale: El participio plural describe a los que iban cargando el arca. 'Los que llevaban' es natural en español y mantiene la acción en curso.
- source_word: צָעֲדוּ
  english_pob_choice: had gone
  chosen_spanish: habían dado
  alternatives_spanish:
  - habían caminado
  - habían avanzado
  lexicon: HALOT
  rationale: La imagen es la de dar pasos medidos; en español 'habían dado seis pasos' reproduce mejor la secuencia narrativa que un verbo más general como 'habían caminado'.
- source_word: שִׁשָּׁה צְעָדִים
  english_pob_choice: six steps
  chosen_spanish: seis pasos
  alternatives_spanish:
  - seis paces
  - seis zancadas
  lexicon: HALOT
  rationale: '''צְעָדִים'' puede entenderse como pasos o paces. ''Pasos'' es claro y natural en español; ''paces'' se mantiene como alternativa posible pero menos común.'
- source_word: וַיִּזְבַּח
  english_pob_choice: he sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - ofreció en sacrificio
  - inmoló
  lexicon: HALOT
  rationale: El verbo זבח expresa el acto sacrificial. 'Sacrificó' es directo y suficientemente preciso; 'inmoló' resulta más marcado y menos neutral para el español general.
- source_word: שׁוֹר
  english_pob_choice: an ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - un novillo
  lexicon: HALOT
  rationale: שׁוֹר puede referirse a un bovino adulto. 'Buey' funciona bien en español bíblico y cultual, y evita la posible especificidad sexual de 'toro'.
- source_word: וּמְרִיא
  english_pob_choice: a fattened calf
  chosen_spanish: un ternero cebado
  alternatives_spanish:
  - un animal cebado
  - un becerro cebado
  lexicon: HALOT
  rationale: El hebreo indica un animal cebado para sacrificio. 'Ternero cebado' conserva la idea de un animal joven engordado; 'becerro cebado' también sería posible, pero 'ternero' resulta más claro para lectores generales.
theological_decisions:
- issue: Nombre divino יְהוָה en una narrativa cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se mantiene el nombre propio del pacto en lugar de un sustituto honorífico, de acuerdo con la política del proyecto y con el valor explícito del Tetragrámaton en el hebreo.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés fue revisado y no presentó cambios sustantivos; la decisión relevante ya estaba establecida: ''six steps'' como medida narrativa y ''a fattened calf'' como equivalente de מְרִיא. La versión española conserva esas decisiones con ajuste natural de registro.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en el texto principal.
  - Se preserva el orden narrativo simple del hebreo sin añadir elementos interpretativos.
  - '''Pasos'' se usa para la medida; la alternativa ''paces'' queda documentada en nota.'
  - '''Ternero cebado'' refleja el animal engordado para sacrificio sin forzar una precisión zoológica no explícita en el hebreo.'
