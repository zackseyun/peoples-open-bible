  to: Desde Dan se oye el resoplar de sus caballos; al sonido del relincho de sus corceles[a], toda la tierra[b] tiembla. Vienen y devoran la tierra y su plenitud[c], la ciudad y los que habitan en ella.
  rationale: 'Se mantiene casi todo el borrador, pero se reparan dos omisiones frente al expediente auditable: se restaura la nota sobre la ambigüedad de אֶרֶץ y se alinea el texto principal con la decisión formal «su plenitud», dejando la paráfrasis idiomática en nota. También se elimina una nota meramente estilística para no desplazar alternativas textualmente más relevantes.'
