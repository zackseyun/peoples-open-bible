revisions:
- from: No se transferirá ninguna herencia de una tribu a otra tribu[a], porque cada una de las tribus de los hijos de Israel se apegará a su propia herencia.
  to: No se transferirá ninguna herencia de una tribu a otra tribu[a], porque las tribus de los hijos de Israel se mantendrán unidas a su propia herencia.
  rationale: 'Se conserva el sentido jurídico de תִסֹּב con «se transferirá», así como «herencia», «tribu» y «los hijos de Israel». Se revisa la segunda cláusula para reflejar de manera más natural en español el plural de יִדְבְּקוּ y la idea de דבק en contexto territorial: «se mantendrán unidas a su propia herencia» suena más claro y bíblicamente digno que «se apegará». La nota alternativa se mantiene intacta y correctamente anclada.'
