base_translation:
  language: en
  yaml_path: translation/ot/2_kings/016/007.yaml
  text: So Ahaz sent messengers to Tiglath-pileser king of Assyria[a], saying, “I am your servant and your son. Come up and save me from the hand of the king of Aram and from the hand of the king of Israel[c][b], who are rising up against me.”
  footnotes:
  - marker: a
    text: Or 'your vassal and your son'; the Hebrew uses diplomatic language of submission literally, 'your servant and your son.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is traditionally rendered ''Syria.'''
    reason: alternative_reading
  - marker: c
    text: Hebrew 'from the hand of,' an idiom meaning 'from the power of.'
    reason: lexical_alternative
