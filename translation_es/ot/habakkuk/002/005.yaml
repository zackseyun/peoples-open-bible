base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/005.yaml
  text: Moreover[a], wine betrays; an arrogant man does not remain at rest. He enlarges his appetite like Sheol, and he is like death and is never satisfied[c][b]. He gathers to himself all the nations and collects to himself all the peoples.
  footnotes:
  - marker: a
    text: Or 'wine is treacherous' or 'wine deceives.' The Hebrew is concise and somewhat difficult; some interpreters also connect the line more broadly with the proud conqueror's intoxicated arrogance.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not stay at home' or 'does not abide.' The Hebrew verb is difficult; the main text reflects the sense of restless instability in context.
    reason: lexical_alternative
  - marker: c
    text: Sheol is the realm of the dead; alternatively, 'the grave.'
    reason: cultural_note
