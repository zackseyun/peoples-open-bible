translation:
  text: And they gave Judith the tent of Holofernes[a], and all the silver vessels, and the couches, and the utensils, and all his furnishings. And she took them and placed them on her mule, and harnessed her wagons[b], and piled them on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek term rendered 'furnishings' (ὅλκια) is rare and uncertain; possible narrower senses include 'hangings' or other tent appurtenances.
    reason: lexical_alternative
  - marker: b
    text: The repeated pronouns in the final clause likely mean that Judith piled the goods onto the wagons, though the Greek wording is somewhat compressed.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκηνήν
  chosen: tent
  alternatives:
  - canopy
  - pavilion
  lexicon: LSJ
  rationale: The ordinary sense is a military or travel tent. In context, this is Holofernes' field lodging among captured goods, so 'tent' is the most natural and least interpretively loaded rendering.
- source_word: ἀργυρώματα
  chosen: silverware
  alternatives:
  - silver objects
  - silver vessels
  lexicon: LSJ
  rationale: The term denotes articles made of silver. 'Silverware' is idiomatic modern English and fits a list of household/luxury goods, though not restricted to table utensils in a technical sense.
- source_word: κλίνας
  chosen: couches
  alternatives:
  - beds
  - banqueting couches
  lexicon: LSJ
  rationale: κλίνη can mean bed or couch. In a wealthy military commander's tent and among portable furnishings, 'couches' better captures luxury furniture without overcommitting to sleeping beds alone.
- source_word: ὅλκια
  chosen: furnishings
  alternatives:
  - hangings
  - coverings
  - gear
  lexicon: LSJ
  rationale: The word is rare and contextually uncertain, but it appears in a list of movable tent/property items. 'Furnishings' preserves the broad sense of appurtenances without forcing a narrower identification.
- source_word: σκευάσματα
  chosen: equipment
  alternatives:
  - goods
  - utensils
  - possessions
  lexicon: LSJ
  rationale: A broad term for gear, equipment, or articles. 'Equipment' fits the military-camp setting and complements the preceding more specific items.
- source_word: ἡμίονον
  chosen: mule
  alternatives:
  - she-mule
  lexicon: LSJ
  rationale: The noun denotes a mule; while the Greek form can refer specifically to a female mule, English normally uses 'mule' unless the sex is contextually important.
- source_word: ἔζευξεν
  chosen: hitched
  alternatives:
  - yoked
  - harnessed
  lexicon: LSJ
  rationale: The verb means to yoke or harness. With ἁμάξας ('wagons/carts'), 'hitched' is natural modern English for preparing vehicles for transport.
- source_word: ἁμάξας
  chosen: wagons
  alternatives:
  - carts
  lexicon: LSJ
  rationale: The term refers to wheeled transport vehicles. 'Wagons' conveys larger conveyances suitable for carrying spoil; 'carts' remains possible but slightly less weighty.
- source_word: ἐσώρευσεν
  chosen: piled
  alternatives:
  - loaded up
  - heaped
  lexicon: LSJ
  rationale: The verb means to heap up or pile. 'Piled' preserves the concrete image and works smoothly with the repeated pronouns referring to the goods and vehicles.
