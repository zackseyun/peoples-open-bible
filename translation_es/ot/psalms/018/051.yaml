  text: מגדל יְשׁוּע֪וֹת מַ֫לְכּ֥/וֹ וְ/עֹ֤שֶׂה חֶ֨סֶד לִ/מְשִׁיח֗/וֹ לְ/דָוִ֥ד וּ/לְ/זַרְע֗/וֹ עַד עוֹלָֽם׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/018/051.yaml
  text: He gives great victories to his king and shows steadfast love to his anointed[c][b][a], to David and to his offspring forever.
  footnotes:
  - marker: a
    text: Or 'He is a tower of salvations for his king'; the Hebrew form at the start of the verse is textually and syntactically difficult, and 2 Samuel 22:51 has a closely related reading, 'He makes great the salvations/victories of his king.'
    reason: textual_variant
  - marker: b
    text: '''His anointed'' can also be rendered ''his Messiah.'' Here it refers immediately to David/the Davidic king, while also carrying broader messianic resonance.'
    reason: alternative_reading
  - marker: c
    text: '''Offspring'' translates a singular collective noun, which can refer to David''s line as a whole and, in canonical context, also invites messianic reading.'
    reason: lexical_alternative
