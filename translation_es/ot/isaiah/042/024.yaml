base_translation:
  language: en
  yaml_path: translation/ot/isaiah/042/024.yaml
  text: Who gave Jacob over to plunder[a], and Israel to looters? Was it not Yahweh, he against whom we have sinned? They were not willing to walk in his ways[b], and they did not listen to his law.
  footnotes:
