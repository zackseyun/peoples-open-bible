translation:
  language: es
  text: Porque, así como las torres sobre los rompeolas del puerto, al rechazar las amenazas de las olas, proporcionan un puerto[a] en calma a los que entran por mar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fondeadero» o «abrigo» al final; el griego ὅρμον puede denotar un puerto, un fondeadero o un refugio.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Pues así como
  - Porque igual que
  lexicon: LSJ
  rationale: Mantiene la fuerza comparativa y conectiva del griego con una transición natural en español.
- source_word: προβλῆτες λιμένων πύργοι
  english_pob_choice: towers on harbor breakwaters
  chosen_spanish: las torres de los rompeolas de un puerto
  alternatives_spanish:
  - las torres de los muelles de un puerto
  - las torres sobre los rompeolas del puerto
  lexicon: LSJ
  rationale: προβλῆτες alude a estructuras salientes o defensas proyectadas; «rompeolas» comunica bien la función marítima. Se conserva «torres» y la relación con el puerto sin forzar un tecnicismo opaco.
- source_word: τὰς κυμάτων ἀπειλάς
  english_pob_choice: the threats of the waves
  chosen_spanish: las amenazas de las olas
  alternatives_spanish:
  - los embates de las olas
  - las amenazas del oleaje
  lexicon: LSJ
  rationale: Se mantiene la personificación de las olas como agentes amenazantes; «amenazas» refleja bien ἀπειλάς y conserva el tono figurado.
- source_word: ἀνακόπτοντες
  english_pob_choice: by beating back
  chosen_spanish: al rechazar
  alternatives_spanish:
  - al repeler
  - al contener
  lexicon: LSJ
  rationale: El participio expresa la acción defensiva de hacer retroceder. «Rechazar» es más natural en español y mantiene la idea de repeler el oleaje.
- source_word: γαληνὸν παρέχουσιν
  english_pob_choice: provide a calm harbor
  chosen_spanish: proporcionan un puerto sereno
  alternatives_spanish:
  - proporcionan un puerto en calma
  - dan serenidad al puerto
  lexicon: LSJ
  rationale: γαληνός describe calma, especialmente del mar. «Puerto sereno» preserva la imagen de un lugar tranquilo para la navegación.
- source_word: τοῖς εἰσπλέουσιν
  english_pob_choice: for those sailing in
  chosen_spanish: a los que entran navegando
  alternatives_spanish:
  - a los que navegan hacia adentro
  - a los que van entrando por mar
  lexicon: LSJ
  rationale: Expresa con claridad el movimiento de entrada al puerto, manteniendo el sentido náutico del participio.
- source_word: τὸν ὅρμον
  english_pob_choice: haven / harbor
  chosen_spanish: un puerto[a]
  alternatives_spanish:
  - un fondeadero
  - un abrigo
  lexicon: LSJ
  rationale: ὅρμος puede significar puerto, fondeadero o refugio; aquí «puerto» es la opción más directa y entendible, y la nota conserva la alternativa semántica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el final de «haven» a «harbor» para acercarse más a ὅρμον y preservar la imaginería náutica; la redacción española sigue esa preferencia con «puerto».
  spanish_consistency_notes:
  - 'Se mantuvo el campo semántico marítimo de todo el verso: rompeolas, olas, puerto, navegando.'
  - «Amenazas» conserva la personificación del oleaje sin convertirlo en mera descripción física.
  - No se usó «SEÑOR» ni terminología teológica, porque el versículo no contiene vocabulario divino.
