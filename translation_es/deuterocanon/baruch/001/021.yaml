translation:
  language: es
  text: Y no escuchamos la voz del Señor nuestro Dios[a], según todas las palabras de los profetas que él nos envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no obedecimos a la voz del Señor nuestro Dios'. El griego puede expresar no solo oír, sino también atender o hacer caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσαμεν
  english_pob_choice: did not listen
  chosen_spanish: no escuchamos
  alternatives_spanish:
  - no oímos
  - no obedecimos
  lexicon: BDAG
  rationale: En este contexto de desobediencia pactal, ἀκούω con complemento en genitivo puede implicar atender o prestar oído, no solo oír. 'No escuchamos' conserva esa fuerza de heed/hearing sin convertirla directamente en 'obedecer'.
- source_word: τῆς φωνῆς
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - el llamado
  lexicon: LSJ
  rationale: φωνή es literalmente 'voz', y la expresión bíblica 'escuchar la voz de' debe mantenerse para no diluir el paralelismo con 'las palabras de los profetas' en la segunda mitad del versículo.
- source_word: Κυρίου τοῦ θεοῦ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: el Señor nuestro Dios
  alternatives_spanish:
  - Yahvé nuestro Dios
  - el Señor, nuestro Dios
  lexicon: LSJ
  rationale: El griego dice κύριος, no el tetragrámaton explícito. Por eso se conserva 'Señor' como equivalente directo del texto fuente, manteniendo el registro bíblico y la relación posesiva 'nuestro Dios'.
- source_word: κατὰ πάντας τοὺς λόγους
  english_pob_choice: according to all the words
  chosen_spanish: conforme a todas las palabras
  alternatives_spanish:
  - según todas las palabras
  - de acuerdo con todas las palabras
  lexicon: BDAG
  rationale: κατά con acusativo expresa correspondencia o conformidad. 'Conforme a' suena natural en español y preserva el matiz de ajuste a la totalidad del mensaje profético.
- source_word: τῶν προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - proferidas por los profetas
  - de los profetas enviados
  lexicon: LSJ
  rationale: Se mantiene el genitivo simple sin expandirlo innecesariamente; la cláusula relativa siguiente ya identifica a esos profetas como enviados por Dios.
- source_word: ὧν ἀπέστειλεν πρὸς ἡμᾶς
  english_pob_choice: whom he sent to us
  chosen_spanish: que él nos envió
  alternatives_spanish:
  - a quienes envió a nosotros
  - que nos envió
  lexicon: BDAG
  rationale: El relativo se refiere naturalmente a 'los profetas', no a 'las palabras'. 'Nos envió' mantiene claro el sujeto divino implícito y conserva la dirección 'a nosotros' sin sonar forzado en español.
theological_decisions:
- issue: Valor de 'oír/escuchar' frente a 'obedecer' en la fórmula de desobediencia
  english_pob_reading: did not listen to the voice of the Lord our God
  chosen_spanish_reading: no escuchamos la voz del Señor nuestro Dios
  alternative_spanish_readings:
  - no oímos la voz del Señor nuestro Dios
  - no obedecimos la voz del Señor nuestro Dios
  rationale: La frase denuncia culpa por no atender a Yahvé/Señor. 'No escuchamos' conserva la tensión entre percepción y respuesta obediente, sin resolverla demasiado pronto en un verbo más interpretativo como 'obedecer'.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y el idioma bíblico, con español moderno y claro.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura revisada del POB en inglés: mantiene ''listen'' como ''escuchar'', conserva ''voice'' como ''voz'', y refleja κατὰ con una equivalencia natural (''conforme a'') sin añadir interpretación extra. También evita sustituir κύριος por una máscara tipográfica, porque el texto fuente es griego y el audit trail del POB justifica ''Lord/Señor''.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, coherente con el texto griego y con el criterio del POB auditado.
  - '''Escuchar'' conserva la posible fuerza de ''prestar oído/obedecer'' sin cerrar la ambigüedad.'
  - '''Conforme a'' es una opción idiomática equivalente a ''according to'' en este contexto profético.'
  - La referencia a 'los profetas' se deja intacta para no desplazar el peso sintáctico del relativo final.
