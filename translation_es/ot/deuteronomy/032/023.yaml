    issue: Nota b no reproduce bien la alternativa auditada
    rationale: La alternativa inglesa es «I will spend my arrows on them». En español, «consumiré mis flechas contra ellos» duplica casi el mismo enfoque del texto principal y no refleja bien el matiz alternativo de gasto dirigido «en ellos».
