  rationale: Se reubicaron las notas para que correspondan a las frases correctas, se añadió la nota faltante sobre la compresión sintáctica del hebreo y se suavizó «junto al lado de» a «al lado de» para un español más natural, manteniendo el sentido arquitectónico y el paralelismo de orientación.
