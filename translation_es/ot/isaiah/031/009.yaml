base_translation:
  language: en
  yaml_path: translation/ot/isaiah/031/009.yaml
  text: His rock will pass away because of terror[a], and his princes will be terrified at the signal, declares Yahweh[c][b], whose fire is in Zion and whose furnace is in Jerusalem.
  footnotes:
  - marker: a
    text: Or 'his stronghold will pass away in terror.' The Hebrew 'rock' may be a metaphor for Assyria's refuge or ruler.
    reason: lexical_alternative
  - marker: b
    text: Or 'his princes will be dismayed at the banner/standard.'
    reason: alternative_reading
  - marker: c
    text: The imagery of the LORD's 'fire' and 'furnace' in Zion and Jerusalem likely evokes his consuming presence in judgment, though the text does not specify the image more narrowly.
    reason: cultural_note
