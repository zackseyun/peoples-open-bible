base_translation:
  language: en
  yaml_path: translation/ot/ezra/010/003.yaml
  text: So now let us make a covenant with our God to send away all the women and what has been born from them[a], according to the counsel of the Lord and of those who tremble at the commandment of our God[d][c][b]; and let it be done according to the law.
  footnotes:
  - marker: a
    text: Or 'all the wives'; the context concerns foreign wives taken in marriage.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the children born to them' or 'and their offspring.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'my lord' here likely refers to Ezra, not to God.
    reason: alternative_reading
  - marker: d
    text: Or 'according to the Torah.'
    reason: lexical_alternative
