translation:
  language: es
  text: No juren falsamente por mi nombre, y así profanarán el nombre de su Dios[a]. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No juren por mi nombre para mentira» o «para falsedad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׁבְעוּ
  english_pob_choice: you shall not swear
  chosen_spanish: No jurarás
  alternatives_spanish:
  - No haréis juramento
  - No tomarás juramento
  lexicon: HALOT
  rationale: El nifal de שׁבע en contexto legal ético se traduce con el verbo español natural «jurar». Mantiene la fuerza prohibitiva directa sin añadir explicación no presente en el hebreo.
- source_word: בִשְׁמִי
  english_pob_choice: by my name
  chosen_spanish: por mi nombre
  alternatives_spanish:
  - en mi nombre
  - con mi nombre
  lexicon: HALOT
  rationale: En el contexto de juramento, la preposición con «nombre» expresa la apelación a la autoridad divina. «Por mi nombre» comunica bien esa base invocada en español bíblico contemporáneo.
- source_word: לַשָּׁקֶר
  english_pob_choice: falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - para falsedad
  - para una mentira
  lexicon: HALOT
  rationale: Aunque el hebreo es más literalmente «para/por falsedad», en español jurídico-moral la forma adverbial «falsamente» reproduce la función del término en el acto de jurar.
- source_word: וְחִלַּלְתָּ
  english_pob_choice: and so profane
  chosen_spanish: ni profanarás
  alternatives_spanish:
  - y profanarás
  - y así profanarás
  lexicon: HALOT
  rationale: El verbo חלל en piel significa profanar o desacralizar. Se eligió coordinación negativa con «ni» para reflejar la prohibición unificada del versículo, sin perder la relación ética entre jurar falsamente y profanar el nombre divino.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  - el Nombre
  lexicon: HALOT
  rationale: Se conserva «el nombre» de manera literal porque en la teología bíblica el «nombre» expresa la identidad revelada y el honor de Dios; no hace falta una paráfrasis.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: of your God
  chosen_spanish: de tu Dios
  alternatives_spanish:
  - de tus dioses
  lexicon: HALOT
  rationale: Aunque la forma es morfológicamente plural, aquí el referente es singular y el sufijo posesivo de segunda persona singular pide «tu Dios».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre personal del pacto en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Relación causal entre jurar falsamente y profanar el nombre de Dios
  english_pob_reading: 'consequential: ''and so profane'''
  chosen_spanish_reading: 'coordinación exhortativa: ''ni profanarás'''
  alternative_spanish_readings:
  - y así profanarás
  - y profanarás
  rationale: El hebreo une ambas acciones en una prohibición ética compacta. En español, «ni profanarás» mantiene la relación sin sobreexplicar la consecuencia, conservando la tensión entre el acto falso y la profanación del nombre.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without unnecessary paraphrase'
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política del proyecto pide «Yahvé» en español, para conservar el nombre propio revelado de Dios y no sustituirlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético y el audit trail inglés sin cambios textuales relevantes; se conserva la tensión lexical de לַשָּׁקֶר como adverbio de falsedad y la relación ética entre el juramento falso y la profanación del nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Dios» para אֱלֹהֶיךָ con sufijo singular de segunda persona.
  - Se preserva «nombre» como término teológicamente cargado en lugar de parafrasearlo.
  - La puntuación refleja dos prohibiciones coordinadas dentro de una sola unidad versicular.
