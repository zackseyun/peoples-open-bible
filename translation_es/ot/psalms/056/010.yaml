revisions:
- from: Entonces mis enemigos volverán atrás en el día en que yo clame. Esto lo sé[b], que Dios está para mí.
  to: Entonces mis enemigos volverán atrás en el día en que yo clame. Esto lo sé[a], que Dios está a mi favor.
  rationale: Se corrigió la expresión final para comunicar con naturalidad el sentido de apoyo/favor de לִי, manteniendo la estructura general del borrador y la alternativa exegética documentada en nota. También se normalizó el marcador de nota a [a].
