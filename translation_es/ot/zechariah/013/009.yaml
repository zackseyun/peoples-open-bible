base_translation:
  language: en
  yaml_path: translation/ot/zechariah/013/009.yaml
  text: And I will bring the third part through the fire[a], and I will refine them as silver is refined, and test them as gold is tested. He will call on my name, and I will answer him. I will say, ‘He is my people,’ and he will say, ‘Yahweh is my God.’
  footnotes:
