translation:
  language: es
  text: 'Y estos son los que estaban[a], y sus hijos: de los hijos de los coatitas[b]: Hemán, el cantor, hijo de Joel, hijo de Samuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que estaban de pie». En este contexto de lista o función, el hebreo también puede implicar a los que estaban en servicio, pero «los que estaban» conserva mejor la imagen concreta del original sin sobreinterpretarla.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de entre los coatitas» o «de los descendientes de Coat». El hebreo identifica el linaje clánico de Coat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Ahora estos son
  - Estos son
  lexicon: HALOT
  rationale: Conserva la conjunción inicial y la fuerza demostrativa sin forzar una calca poco natural en español.
- source_word: הָעֹמְדִים
  english_pob_choice: the ones who stood
  chosen_spanish: los que estaban presentes
  alternatives_spanish:
  - los que estaban de pie
  - los que servían
  - los que estaban
  lexicon: HALOT
  rationale: En este contexto genealógico/lista de identificación, "estaban presentes" comunica la idea de estar en función o en posición reconocida sin sonar rígidamente literal; se evita "servían" porque interpreta más de lo que el hebreo exige.
- source_word: וּבְנֵיהֶם
  english_pob_choice: and their sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - con sus hijos
  - y sus descendientes
  lexicon: HALOT
  rationale: El hebreo une la frase con una simple waw; en español, "y sus hijos" reproduce la relación directa sin introducir una preposición no explícita.
- source_word: מִבְּנֵי הַקְּהָתִי
  english_pob_choice: from the sons of the Kohathites
  chosen_spanish: de los hijos de los coatitas
  alternatives_spanish:
  - de entre los coatitas
  - de los descendientes de Coat
  lexicon: HALOT
  rationale: Se mantiene la referencia clánica a Coat/Kehat con el gentilicio españolizado "coatitas", evitando una paráfrasis más amplia que borre la filiación textual.
- source_word: הֵימָן
  english_pob_choice: Heman
  chosen_spanish: Hemán
  alternatives_spanish:
  - Heman
  lexicon: Nombre propio estándar
  rationale: Se adapta la transliteración al uso castellano común con acento gráfico para la pronunciación natural, manteniendo el nombre propio reconocible.
- source_word: הַמְשׁוֹרֵר
  english_pob_choice: the singer
  chosen_spanish: el cantor
  alternatives_spanish:
  - el cantante
  - el músico
  lexicon: HALOT
  rationale: '"Cantor" refleja bien la función de canto litúrgico o musical sin restringirlo al sentido moderno de "cantante"; también conserva mejor el registro bíblico.'
- source_word: בֶּן יוֹאֵל בֶּן שְׁמוּאֵל
  english_pob_choice: son of Joel, son of Samuel
  chosen_spanish: hijo de Joel, hijo de Samuel
  alternatives_spanish:
  - descendiente de Joel, descendiente de Samuel
  lexicon: Genealogical formula
  rationale: Se conserva la construcción genealógica directa del hebreo y del audit trail inglés, sin sustituirla por una formulación interpretativa.
theological_decisions:
- issue: Valor de הָעֹמְדִים en un contexto de lista/función
  english_pob_reading: the ones who stood
  chosen_spanish_reading: los que estaban presentes
  alternative_spanish_readings:
  - los que servían
  - los que estaban de pie
  rationale: La frase hebrea admite un matiz de estar en servicio o en posición oficial, pero el texto no lo explicita. "Estaban presentes" deja abierta esa tensión y evita una interpretación más fuerte que el contexto inmediato no obliga a tomar.
  doctrine_reference: Principio de cautela textual en pasajes genealógicos/organizativos; cf. usos de עמד con matiz funcional sin sobretraducción.
- issue: Designación clánica מִבְּנֵי הַקְּהָתִי
  english_pob_reading: from the sons of the Kohathites
  chosen_spanish_reading: de los hijos de los coatitas
  alternative_spanish_readings:
  - de entre los coatitas
  - de los descendientes de Coat
  rationale: No se borra la identidad levítica de Kohat/Kehat ni se la sustituye por una etiqueta eclesiástica; se traduce de modo transparente el linaje/clan que estructura la genealogía.
  doctrine_reference: Números 3–4; 1 Crónicas 6, genealogía levítica de Coat/Kehat.
translation_notes:
  revision_awareness: Se siguió el ajuste de la revisión inglesa que prefirió la coordinación simple «and their sons» y el plural natural «the Kohathites». En español se reflejó con «y sus hijos» y «los hijos de los coatitas», manteniendo la misma relación genealógica sin introducir «con».
  spanish_consistency_notes:
  - Se usa «Hemán» con tilde por adaptación ortográfica castellana del nombre propio.
  - Se preserva el registro genealógico con repeticiones de «hijo de» en lugar de compactarlo.
  - No se introdujo terminología eclesiástica moderna para מְשׁוֹרֵר; se optó por «cantor» por su adecuación bíblica y musical.
