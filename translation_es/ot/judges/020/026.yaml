translation:
  language: es
  text: Entonces subieron todos los hijos de Israel y todo el pueblo, y fueron a Betel[a]. Allí lloraron y se sentaron delante de Yahvé, y ayunaron aquel día hasta la tarde. Luego ofrecieron holocaustos y ofrendas de paz[b] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos los israelitas y todo el pueblo'.
    reason: lexical_alternative
  - marker: b
    text: O 'ofrendas de comunión'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - ascendieron
  lexicon: HALOT
  rationale: עלה en un contexto narrativo de desplazamiento se expresa naturalmente en español como 'subieron', conservando la dirección ascendente sin resultar forzado.
- source_word: כָל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los israelitas
  lexicon: HALOT
  rationale: Se preserva la expresión filial y nacional del hebreo בני ישראל con 'hijos de Israel', siguiendo la forma del original más de cerca que el más genérico 'israelitas'.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  lexicon: HALOT
  rationale: העם se traduce de manera directa como 'el pueblo', manteniendo el segundo miembro apposicional sin fusionarlo con la frase anterior.
- source_word: בֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  lexicon: HALOT
  rationale: Se usa la forma española habitual del topónimo bíblico, 'Betel', en lugar de transliterar la grafía inglesa.
- source_word: וַיִּבְכּוּ
  english_pob_choice: they wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - se lamentaron
  lexicon: HALOT
  rationale: '''Lloraron'' comunica el duelo o lamento formal del contexto cultual mejor que un genérico ''cried''.'
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: sat there
  chosen_spanish: se sentaron allí
  alternatives_spanish:
  - permanecieron allí
  lexicon: HALOT
  rationale: ישב conserva bien el sentido corporal de sentarse, que aquí acompaña el acto de duelo y humildad; por eso se mantiene la imagen concreta.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene la preposición relacional 'delante de' para reflejar la presencia cultual ante el rostro de Yahvé, y se conserva el nombre divino 'Yahvé' conforme al criterio del proyecto.
- source_word: וַיָּצֻמוּ
  english_pob_choice: fasted
  chosen_spanish: ayunaron
  alternatives_spanish:
  - guardaron ayuno
  lexicon: HALOT
  rationale: צום se expresa de manera natural y precisa con 'ayunar/ayunaron' en español contemporáneo.
- source_word: בַיּוֹם הַהוּא עַד הָעָרֶב
  english_pob_choice: that day until evening
  chosen_spanish: aquel día hasta la tarde
  alternatives_spanish:
  - ese día hasta el anochecer
  lexicon: HALOT
  rationale: Se conserva el límite temporal del hebreo con una construcción fluida en español; 'tarde' es la equivalencia normal de 'evening' en este registro narrativo.
- source_word: וַיַּעֲלוּ עֹלוֹת
  english_pob_choice: they offered up burnt offerings
  chosen_spanish: ofrecieron holocaustos
  alternatives_spanish:
  - ofrecieron sacrificios quemados
  lexicon: HALOT
  rationale: עולות corresponde al término cultual 'holocaustos' en español bíblico y eclesial, manteniendo el valor técnico de la ofrenda completamente quemada.
- source_word: וּשְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - sacrificios de paz
  lexicon: HALOT
  rationale: Se opta por 'ofrendas de paz' como equivalente claro y sobrio para שלמים; evita 'fellowship offerings' por ser más interpretativo, pero conserva el matiz de comunión/reconciliación sin perder la referencia sacrificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio español del proyecto para el Tetragrama: ''Yahvé'', que mantiene la transliteración del nombre propio divino en una forma natural para lectores hispanohablantes.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El hebreo usa directamente el Tetragrama, no un título sustitutivo. Por ello se conserva el nombre propio divino en español como 'Yahvé', evitando la sustitución por 'Señor' y manteniendo la distinción teológica del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión nacional בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  rationale: Se preserva la forma semítica y genealógica del hebreo en lugar de suavizarla a un etnónimo genérico. 'Hijos de Israel' mantiene la fuerza representativa del plural masculino del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: שְׁלָמִים y su alcance sacrificial
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - sacrificios de paz
  - ofrendas de comunión
  rationale: '''Ofrendas de paz'' retiene el término tradicional y no lo reduce de antemano a una sola idea devocional como ''comunión''. Así conserva la amplitud del hebreo שלמים sin borrar la categoría sacrificial.'
  doctrine_reference: HALOT s.v. שְׁלָמִים; Levítico 3; Levítico 7
translation_notes:
  revision_awareness: Se verificó el antecedente inglés auditado y la última revisión indica que no hubo cambios necesarios; la presente redacción española sigue el mismo contenido base, conservando las decisiones auditadas sobre el nombre divino, la expresión nacional y los términos sacrificiales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el versículo, conforme al estándar del proyecto.
  - '''Hijos de Israel'' conserva la formulación hebrea y su paralelismo con ''todo el pueblo''.'
  - '''Holocaustos'' y ''ofrendas de paz'' preservan el registro cultual sin reinterpretar el sistema sacrificial.'
  - La puntuación sigue el orden narrativo del hebreo con dos secuencias de acciones separadas por 'Luego'.
