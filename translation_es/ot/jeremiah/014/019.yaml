revisions:
- from: ¿Has rechazado por completo a Judá? ¿[a]Tu alma aborrece a Sion? ¿Por qué nos has herido, y no hay para nosotros sanidad? Esperábamos paz, pero no hubo bien; y para tiempo de sanidad, y he aquí terror.
