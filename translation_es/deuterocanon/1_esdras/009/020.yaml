translation:
  language: es
  text: y se comprometieron a enviar lejos a sus esposas[a], y para expiación, carneros por su ignorancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «pusieron mano para enviar lejos a sus esposas»; el giro es idiomático y expresa que asumieron el compromiso de hacerlo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por su error» o «por su pecado involuntario»; en este contexto sacrificial, «ignorancia» conserva más de cerca el griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβαλον τὰς χεῖρας
  english_pob_choice: they pledged themselves
  chosen_spanish: se comprometieron
  alternatives_spanish:
  - pusieron sus manos
  - se obligaron
  - tomaron el compromiso
  lexicon: LSJ
  rationale: El griego es idiomático y no describe aquí un gesto físico, sino la adopción de una resolución u obligación. En español, «se comprometieron» comunica bien la fuerza de compromiso sin introducir una imagen corporal engañosa.
- source_word: ἐκβαλεῖν
  english_pob_choice: to send away
  chosen_spanish: despedir
  alternatives_spanish:
  - enviar fuera
  - expulsar
  - repudiar
  lexicon: BDAG
  rationale: En el contexto matrimonial, el sentido es separarse de las esposas / repudiarlas, no simplemente expulsarlas con violencia. «Despedir» expresa la separación con naturalidad en español y evita un matiz excesivamente fuerte.
- source_word: τὰς γυναῖκας αὐτῶν
  english_pob_choice: their wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus mujeres casadas
  lexicon: BDAG
  rationale: Aquí γυναῖκας significa claramente esposas, como confirma el paralelo hebreo de esposas extranjeras. «Esposas» es la opción precisa y transparente en español.
- source_word: εἰς ἐξιλασμόν
  english_pob_choice: for atonement
  chosen_spanish: para expiación
  alternatives_spanish:
  - como expiación
  - para atonerse
  lexicon: LEH
  rationale: «Expiación» conserva el sentido sacrificial del término griego ἐξιλασμός y suena natural en español bíblico contemporáneo. «Atonamiento» sería menos idiomático.
- source_word: κριοὺς
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - machos de oveja
  - ovejas macho
  lexicon: LSJ
  rationale: 'El animal sacrificial es específico: un carnero. «Carneros» es la forma española más directa y reconocible, manteniendo el plural.'
- source_word: ὑπὲρ τῆς ἀγνοίας αὐτῶν
  english_pob_choice: for their ignorance
  chosen_spanish: por su ignorancia
  alternatives_spanish:
  - por su error
  - por su falta de conocimiento
  - por su pecado involuntario
  lexicon: BDAG
  rationale: «Ignorancia» sigue de cerca el griego ἀγνοία. Aunque el contexto sacrificial implica una falta cometida sin intención o por desconocimiento, la traducción principal conserva el término literal y deja la carga cultual implícita.
theological_decisions:
- issue: Sentido sacrificial de ἀγνοία
  english_pob_reading: ignorance with sacrificial nuance left implicit
  chosen_spanish_reading: ignorancia con matiz sacrificial implícito
  alternative_spanish_readings:
  - error
  - pecado involuntario
  - falta cometida por desconocimiento
  rationale: El griego no desarrolla el matiz más allá de ἀγνοία, aunque el contexto de expiación apunta a una culpa no intencional. Para no sobreexplicar, la versión principal mantiene «ignorancia» y reserva las otras opciones para la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Valor idiomático de ἐπέβαλον τὰς χεῖρας
  english_pob_reading: commitment/pledge rather than literal hand-laying
  chosen_spanish_reading: compromiso más que colocación literal de las manos
  alternative_spanish_readings:
  - pusieron las manos sobre
  - tomaron la resolución de
  - se obligaron a
  rationale: Una traducción literal sería oscura o podría sugerir un acto físico con las mujeres. El español «se comprometieron» transmite la idea de tomar una resolución vinculante, en línea con el análisis del POB inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el criterio de la revisión inglesa más reciente: mantiene la frase sacrificial elíptica («para expiación, carneros por su ignorancia») y evita añadir explicación interpretativa al cuerpo principal. Se privilegia una solución española natural sin perder la transparencia con el griego.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí el nombre divino, sino como norma general del proyecto cuando corresponda.
  - Se prefirió «expiación» frente a un tecnicismo más pesado para conservar legibilidad y el valor sacrificial del término.
  - «Esposas» traduce γυναῖκας conforme al contexto marital, evitando «mujeres» por ambigüedad.
