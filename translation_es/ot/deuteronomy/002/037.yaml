translation:
  language: es
  text: Excepto que no te acercaste a la tierra de los hijos de Amón[a], a lo largo de toda la orilla del torrente Jaboc[b], ni a las ciudades de la región montañosa, ni a nada de lo que Yahvé nuestro Dios había mandado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de los amonitas». Literalmente, «la tierra de los hijos de Amón».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «toda la mano del torrente Jaboc», un modismo que se refiere al lado, la orilla o la región junto al Jaboc.
    reason: cultural_note
  - marker: c
    text: O «ni a todo aquello que Yahvé nuestro Dios había mandado», con el objeto dejado implícito en hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: Expresa la marca de excepción de forma natural en español y conserva la brevedad del hebreo sin añadir matiz explicativo extra.
- source_word: אֶל אֶרֶץ בְּנֵי עַמּוֹן
  english_pob_choice: the land of the sons of Ammon
  chosen_spanish: la tierra de los hijos de Amón
  alternatives_spanish:
  - la tierra de los amonitas
  - el territorio de los amonitas
  lexicon: HALOT
  rationale: Mantiene la construcción literal «hijos de Amón» que el POB inglés conservó como más transparente al hebreo, sin perder inteligibilidad en español.
- source_word: לֹא קָרָבְתָּ
  english_pob_choice: you did not come near
  chosen_spanish: no te acercaste
  alternatives_spanish:
  - no llegaste cerca
  - no te aproximaste
  lexicon: HALOT
  rationale: «Acercarte» comunica bien el sentido espacial de קרב en español y suena más natural que un calco más rígido como «venir cerca».
- source_word: כָּל יַד נַחַל יַבֹּק
  english_pob_choice: all along the bank of the Jabbok
  chosen_spanish: por todo el lado del torrente Jaboc
  alternatives_spanish:
  - a lo largo de toda la orilla del Jaboc
  - por toda la ribera del Jaboc
  lexicon: HALOT
  rationale: El hebreo usa el modismo «mano de» aplicado al cauce; en español se expresa como lado/orilla/ribera. «Torrente Jaboc» conserva el carácter de wadi o curso estacional.
- source_word: וְעָרֵי הָהָר
  english_pob_choice: and the cities of the hill country
  chosen_spanish: y las ciudades de la región montañosa
  alternatives_spanish:
  - y las ciudades de la serranía
  - y las ciudades del monte
  lexicon: HALOT
  rationale: En Deuteronomio, הָהָר designa la zona alta o montañosa, no un monte único; «región montañosa» evita una lectura excesivamente literal o singular.
- source_word: וְכֹל אֲשֶׁר צִוָּה
  english_pob_choice: and all that ... had commanded
  chosen_spanish: y todo lo que Yahvé nuestro Dios había mandado
  alternatives_spanish:
  - y todo cuanto Yahvé nuestro Dios había mandado
  - y todo aquello que Yahvé nuestro Dios había mandado
  lexicon: HALOT
  rationale: Sigue la amplitud del hebreo y la lectura auditada del POB inglés, donde el objeto queda implícito; en español, «todo lo que» preserva esa elasticidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino usada por el proyecto en español, en lugar de sustituirla por «SEÑOR» o por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Traducción directa y covenantal del posesivo plural inclusivo, coherente con el español bíblico claro y contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto en español preserva el nombre divino como «Yahvé», evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La fuente auditada muestra alta concordancia y ninguna revisión aplicada en el último pase; por ello el borrador español sigue de cerca la lectura inglesa aprobada, pero vuelve al hebreo para resolver el modismo de יַד נַחַל y conservar la amplitud de וְכֹל אֲשֶׁר צִוָּה.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en consonancia con la terminología del proyecto.
  - Se prefiere «hijos de Amón» por transparencia al hebreo, con nota alternativa para «amonitas».
  - «Torrente Jaboc» refleja el carácter de wadi y evita estrechar el sentido a un río permanente.
  - «Región montañosa» traduce הָהָר como zona alta, no como un solo monte.
  - Se mantiene «nuestro Dios» para אֱלֹהֵינוּ con el valor comunitario del posesivo inclusivo.
