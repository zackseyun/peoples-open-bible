review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente la decisión textual principal del POB inglés en un punto clave: el hebreo base dice «hijos de Israel», y el inglés lo mantiene en el texto principal con nota para la lectura griega «tribus de Israel». El borrador invierte esa relación al poner «tribus de Israel» en el texto principal y relegar «hijos de Israel» a nota. El resto del sentido fuente se preserva en general: piedras preciosas, pectoral, grabado de sello, engastes y función memorial.'
  spanish_quality_summary: 'El español es legible y digno, pero presenta dos problemas de naturalidad/precisión: «grabadas como sello» suena incompleto en español; «grabadas como un sello» o «grabadas al estilo de un sello» es más idiomático. Además, la nota [a] está anclada a «pectoral», aunque su contenido corresponde a la frase final sobre «hijos/tribus de Israel»; el anclaje debe moverse a esa expresión. También conviene mantener la nota [b] en «engastes» o cerca de esa idea, ya que trata del engaste de oro griego.'
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: «pectoral» para החשן, «memorial» para לזכרון y «piedras preciosas» para אבני חפץ son adecuados. La desviación principal está en למספר בני ישראל, donde debe seguirse el hebreo primario como «según el número de los hijos de Israel» en el texto principal, con nota para la variante griega «tribus».'
  issues:
  - severity: high
    issue: El texto principal usa «las tribus de Israel» en lugar de «los hijos de Israel».
    rationale: La auditoría inglesa documenta expresamente que el hebreo es el testigo primario aquí y que el texto principal debe seguir «sons of Israel», dejando «tribes of Israel» en nota. El borrador español contradice esa decisión textual.
  - severity: medium
    issue: La nota [a] está anclada en «pectoral» pero trata sobre «hijos/tribus de Israel».
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. Tal como está, el lector asociará erróneamente la nota con «pectoral».
  - severity: low
    issue: «Grabadas como sello» es menos natural en español que una formulación con artículo o giro explicativo.
    rationale: La comparación de פתוחי חותם se expresa mejor en español con «como un sello» o «al estilo de un sello», sin alterar el sentido.
  revised_spanish_text: piedras preciosas sobre el pectoral, grabadas como un sello en sus engastes[b]; cada piedra preciosa como memorial, grabada con escritura según el número de los hijos de Israel[a].
