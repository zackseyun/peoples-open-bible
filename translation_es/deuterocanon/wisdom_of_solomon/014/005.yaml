revisions:
- from: Pero tú quieres que las obras de tu sabiduría no estén ociosas[a]; por eso, aun con el más pequeño pedazo de madera, los hombres confían sus vidas, y al pasar por las olas en una balsa[b], fueron llevados a salvo.
  to: Pero tú te propones que las obras de tu sabiduría no queden inactivas; por eso, aun con el más pequeño pedazo de madera, los hombres encomiendan sus vidas[a], y al pasar por las olas en una balsa[b], fueron llevados a salvo.
  rationale: Se corrige el anclaje de la nota para que corresponda a «vidas», se refuerza el matiz teleológico de θέλεις con «te propones», se mejora la naturalidad de μὴ ἀργὰ εἶναι con «no queden inactivas», y se afina πιστεύουσιν con «encomiendan sus vidas». No se requieren cambios doctrinales ni una nueva adjudicación compleja.
