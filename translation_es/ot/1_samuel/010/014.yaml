translation:
  language: es
  text: 'Entonces el tío de Saúl le dijo a él y a su acompañante joven[a]: «¿Adónde fueron?» Y él respondió: «A buscar los asnos[b]. Cuando vimos que no aparecían por ninguna parte, fuimos[c] a Samuel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su joven»; el término נַעַר puede significar «joven», «muchacho», «sirviente» o «asistente». Aquí se refiere al compañero de viaje de Saúl, sin especificar condición servil.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa la forma femenina plural de «asnos», refiriéndose específicamente a hembras.
    reason: lexical_alternative
  - marker: c
    text: 'O: «vinimos a Samuel» o «llegamos a Samuel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹד שָׁאוּל
  english_pob_choice: Saul’s uncle
  chosen_spanish: el tío de Saúl
  alternatives_spanish:
  - el pariente de Saúl
  lexicon: HALOT
  rationale: דּוֹד en un contexto narrativo de parentesco se entiende naturalmente como «tío». En español, «tío de Saúl» conserva la relación familiar específica y sigue la lectura del audit trail inglés.
- source_word: אֵלָיו וְאֶל נַעֲרוֹ
  english_pob_choice: to him and to his young man
  chosen_spanish: a él y a su joven
  alternatives_spanish:
  - a él y a su siervo
  - a él y a su muchacho
  lexicon: HALOT
  rationale: נַעַר puede ser «joven», «muchacho», «sirviente» o «asistente». Se eligió «su joven» para mantener la neutralidad lexical del inglés POB («young man») sin cargar el texto con el matiz servil que no es necesario aquí.
- source_word: אָן הֲלַכְתֶּם
  english_pob_choice: Where did you go?
  chosen_spanish: ¿Adónde fueron?
  alternatives_spanish:
  - ¿Adónde han ido?
  - ¿Dónde fueron?
  lexicon: HALOT
  rationale: אָן pregunta por lugar, y הֲלַכְתֶּם es segunda persona plural. «¿Adónde fueron?» es natural en español bíblico moderno y conserva el plural del hebreo, que en la escena se dirige tanto a Saúl como a su acompañante.
- source_word: לְבַקֵּשׁ אֶת הָאֲתֹנֹת
  english_pob_choice: To seek the donkeys
  chosen_spanish: A buscar los asnos
  alternatives_spanish:
  - A buscar las asnas
  - A buscar las asnas de Saúl
  lexicon: HALOT
  rationale: בקשׁ significa «buscar/seek». Se prefirió «buscar» por naturalidad en español. אֲתֹנוֹת es formalmente femenino plural, por eso «asnos» evita una marca de género que en español sonarían extraña o demasiado explícita; la nota conserva la observación lexical.
- source_word: וַנִּרְאֶה כִי אַיִן
  english_pob_choice: When we saw that they were nowhere to be found
  chosen_spanish: Y cuando vimos que no estaban
  alternatives_spanish:
  - Y cuando vimos que no había ninguno
  - Y cuando vimos que no se encontraban
  lexicon: HALOT
  rationale: La cláusula expresa ausencia real de los animales. «Que no estaban» transmite de manera breve y natural la idea de «they were nowhere to be found» sin sobreparafrasear.
- source_word: וַנָּבוֹא אֶל שְׁמוּאֵל
  english_pob_choice: we went to Samuel
  chosen_spanish: fuimos a Samuel
  alternatives_spanish:
  - vinimos a Samuel
  - fuimos donde Samuel
  lexicon: HALOT
  rationale: בוא con אֶל indica movimiento hacia Samuel. «Fuimos a Samuel» sigue la dirección del relato desde el punto de vista de los hablantes y evita el giro menos idiomático «vinimos» en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que prefirió «seek» sobre «look for» por un registro ligeramente más formal. También conserva la alternativa auditada para וַנִּרְאֶה כִי אַיִן con una formulación española breve y natural, sin perder la idea de ausencia documentada en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «joven» para נַעַר conforme al audit trail inglés, evitando introducir «siervo» sin base contextual suficiente.
  - «Asnos» funciona como término genérico y no intenta masculinizar el femenino hebreo de manera no señalada; la nota lo explicita.
  - La puntuación y el orden de diálogo siguen un estilo bíblico moderno y publicable en español.
