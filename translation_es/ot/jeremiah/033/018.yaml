revisions:
- from: Y para los sacerdotes levíticos[a], no será cortado de delante de mí ningún hombre que ofrezca una ofrenda quemada, que queme una ofrenda de cereal[b] y que haga un sacrificio todos los días[c].
  to: Y para los sacerdotes levíticos[a], no será cortado de delante de mí ningún hombre que ofrezca un holocausto, que queme una ofrenda de cereal y que haga un sacrificio todos los días[b].
  rationale: Se reemplaza 'ofrenda quemada' por 'holocausto' para reflejar con mayor fidelidad y naturalidad el término sacrificial técnico עוֹלָה. Se eliminó la nota sobre 'ofrenda vegetal' porque no era necesaria para resolver una ambigüedad creada en español ni estaba sostenida por una nota equivalente en el rastro inglés. Se conservó 'será cortado de delante de mí' por su fuerza pactual y su cercanía al hebreo, y 'todos los días' con nota explicativa por su valor literal y continuo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:32:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva en general la estructura y el sentido del hebreo: mantiene la identificación de ''los sacerdotes levíticos'', preserva el idiomismo fuerte de כרת con ''ser cortado'', refleja los participios con relativas, y retiene la literalidad temporal de ''todos los días''. Sin embargo, hay un desajuste léxico importante en עוֹלָה: ''ofrenda quemada'' no es la mejor equivalencia para el sacrificio técnico ''burnt offering''; en español bíblico claro y fiel conviene ''holocausto''.'
  spanish_quality_summary: 'El español es mayormente claro, pero ''no será cortado de delante de mí ningún hombre'' suena algo rígido; aun así es aceptable por su fidelidad al idiomismo. La mejora necesaria es terminológica: ''ofrenda quemada'' resulta poco natural y puede sonar descriptiva más que cultual. ''Holocausto'' es la opción más legible y estable en español eclesial moderno. También conviene ajustar la nota b para no duplicar una alternativa no anclada y mantener solo las notas necesarias.'
  glossary_alignment: Alinea bien con la terminología del proyecto en lo principal. No aparecen términos sensibles como Yahvé/Mesías. 'Ofrenda de cereal' para מִנְחָה es aceptable. El punto a corregir es עוֹלָה, donde 'holocausto' representa mejor la categoría sacrificial establecida que 'ofrenda quemada'.
  issues:
  - severity: medium
    issue: עוֹלָה está vertido como 'ofrenda quemada'
    rationale: Aunque semánticamente comprensible, no preserva tan bien el valor técnico-sacrificial de עוֹלָה como 'holocausto', que además es más natural y reconocible en español bíblico amplio.
  - severity: low
    issue: La nota b introduce una alternativa adicional no reflejada en el rastro inglés
    rationale: El inglés solo nota una variante estructural previa para la secuencia verbal, no una alternativa léxica para מִנְחָה. En español puede mantenerse sin nota, o dejar una sola nota útil donde haya verdadera necesidad de aclaración.
  revised_spanish_text: Y para los sacerdotes levíticos[a], no será cortado de delante de mí ningún hombre que ofrezca un holocausto, que queme una ofrenda de cereal y que haga un sacrificio todos los días[b].
  revised_footnotes:
