translation:
  language: es
  text: ¿Hasta cuándo esta malvada congregación[a] murmurará contra mí? He oído las quejas de los hijos de Israel[b], que murmuran contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘asamblea’ o ‘comunidad’ para ‘congregación’.
    reason: lexical_alternative
  - marker: b
    text: O ‘los israelitas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será
  - ¿Hasta cuándo durará
  lexicon: HALOT
  rationale: Es la pregunta temporal idiomática en español para expresar impaciencia o reproche, y conserva bien el tono exasperado del hebreo.
- source_word: לָעֵדָה
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: La idea es la del grupo reunido de Israel; 'congregación' mantiene el registro bíblico y el valor colectivo sin perder claridad.
- source_word: הָרָעָה הַזֹּאת
  english_pob_choice: this evil
  chosen_spanish: esta malvada
  alternatives_spanish:
  - esta maligna
  - esta mala
  lexicon: HALOT
  rationale: El adjetivo tiene fuerza moral, no solo descriptiva. En español, al concordar con 'congregación', 'malvada' conserva esa evaluación negativa con naturalidad.
- source_word: מַלִּינִים
  english_pob_choice: grumble
  chosen_spanish: murmurará / murmuran
  alternatives_spanish:
  - se quejará / se quejan
  - refunfuñará / refunfuñan
  lexicon: HALOT
  rationale: '''Murmurar'' es el equivalente español más cercano al valor recurrente y rebelde del verbo en los relatos del desierto; evita suavizarlo como simple queja.'
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: La preposición aquí es adversativa; 'contra mí' preserva el sentido de oposición directa a Dios.
- source_word: תְּלֻנּוֹת
  english_pob_choice: complaints
  chosen_spanish: las quejas
  alternatives_spanish:
  - las murmuraciones
  - los reclamos
  lexicon: HALOT
  rationale: '''Quejas'' expresa el sustantivo de forma clara y natural en español; el paralelismo con ''murmuran'' mantiene la carga semántica de la raíz.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israelitas
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo, como en el texto fuente y en la política de precisión de género del proyecto.
- source_word: שָׁמָעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - He escuchado
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una realidad ya constatada con relevancia actual; en español, el pretérito perfecto compuesto transmite bien esa actualidad.
theological_decisions:
- issue: Valor de גָּדֵה/עֵדָה como colectivo de Israel
  english_pob_reading: congregation
  chosen_spanish_reading: congregación
  alternative_spanish_readings:
  - asamblea
  - comunidad
  rationale: 'No se espiritualiza el término: el texto acusa al colectivo visible de Israel. ''Congregación'' conserva esa referencia corporativa y el tono judicial/divino del pasaje.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Mantenimiento de la acusación divina de maldad
  english_pob_reading: this evil congregation
  chosen_spanish_reading: esta congregación malvada
  alternative_spanish_readings:
  - esta congregación mala
  - esta asamblea malvada
  rationale: El hebreo presenta una evaluación moral severa; no debe atenuarse. 'Malvada' refleja la gravedad del juicio divino sin introducir tecnicismos ajenos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Reproducción del relativo en la segunda cláusula
  english_pob_reading: which they are grumbling against me
  chosen_spanish_reading: que murmuran contra mí
  alternative_spanish_readings:
  - la cual murmuran contra mí
  - que siguen murmurando contra mí
  rationale: El relativo hebreo introduce la explicación de las quejas; en español, 'que' funciona de manera natural y mantiene la relación causal/explicativa sin sobrecargar la frase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El inglés POB ajustó la segunda cláusula para reflejar con mayor precisión la construcción relativa (‘which they are grumbling against me’). En español se conservó esa relación con 'que murmuran contra mí', manteniendo el paralelismo del hebreo y la intensidad reiterativa de 'murmurar'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo usa habla divina sin el Tetragrámaton en la superficie, por lo que no aparece aquí.
  - Se prefirió 'murmurar' para conservar la fuerza lexical recurrente del desierto, evitando suavizarlo como mera 'queja'.
  - El tiempo verbal combina perfecto compuesto y presente para reflejar la acusación continua y la respuesta ya recibida de Dios.
  - Se respetó la forma masculina plural 'hijos de Israel' por fidelidad al hebreo y a la política de precisión de género del proyecto.
