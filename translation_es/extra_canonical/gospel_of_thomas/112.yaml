base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/112.yaml
  text: Jesus said[a], “Woe to the flesh that depends on the soul[c][b]; woe to the soul that depends on the flesh.”
  footnotes:
  - marker: a
    text: The verb ⲉⲓϣⲉ can also be rendered “hangs upon” or “leans on,” preserving a more concrete image.
    reason: lexical_alternative
  - marker: b
    text: ⲯⲩⲭⲏ (psyche) can also mean “life” or “self,” but “soul” keeps the stark flesh/soul polarity of the Coptic.
    reason: lexical_alternative
  - marker: c
    text: MS shows ⲧⲁⲉⲓ (fem. demonstrative) in both clauses; Dilley normalizes to ⲡⲁⲓ. The demonstrative is semantically bleached here (“that [which]”), so gender does not affect the meaning.
    reason: dialect_note
