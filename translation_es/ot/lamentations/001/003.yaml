revisions:
- from: Judá ha ido al destierro[a] por causa de aflicción y por causa de gran servidumbre; ella habita entre las naciones y no encuentra descanso. Todos sus perseguidores la alcanzaron entre los lugares estrechos[b].
  to: Judá ha ido al destierro[a] por causa de aflicción y por causa de gran servidumbre; habita entre las naciones y no encuentra descanso. Todos los que la persiguen la han alcanzado entre las angosturas[b].
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad léxica y naturalidad del español: se omitió «ella» por ser innecesario; se cambió «sus perseguidores» por «todos los que la persiguen» para reflejar mejor la imagen de רֹדְפֶיהָ; se sustituyó «entre los lugares estrechos» por «entre las angosturas», una formulación más idiomática y poética en español, manteniendo la alternativa en nota; y se afinó «la alcanzaron» a «la han alcanzado» para alinearlo mejor con el aspecto resultativo de la línea auditada inglesa.'
