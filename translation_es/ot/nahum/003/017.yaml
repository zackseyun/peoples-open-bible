base_translation:
  language: en
  yaml_path: translation/ot/nahum/003/017.yaml
  text: Your guards are like locusts[a], and your scribes like swarms of locusts, settling on the walls on a cold day. The sun rises, and they fly away[d][c][b]; no one knows where they are.
  footnotes:
  - marker: a
    text: Or 'your crowned ones,' 'your princes,' or 'your consecrated ones' for the rare Hebrew term.
    reason: lexical_alternative
  - marker: b
    text: Or 'your officers' or 'your military commanders' for 'your scribes.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew may also mean 'on the fences/enclosures,' not necessarily city walls.
    reason: lexical_alternative
  - marker: d
    text: The final clause is literally something like, 'and its/their place is not known—where are they?'
    reason: lexical_alternative
