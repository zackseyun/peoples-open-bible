revisions:
- from: ¿Cómo, pues, podrías hacer retroceder el rostro[a] de un solo capitán[b] entre los más pequeños de los siervos de mi señor, mientras confías en Egipto para carros y jinetes?
  to: ¿Cómo, pues, podrías rechazar a un solo capitán[b] de entre los siervos de menor rango de mi señor[a], mientras confías en Egipto para carros y jinetes?
  rationale: Ajusté el texto para preservar mejor el sentido del hebreo y la auditoría inglesa en español natural. Reemplacé el calco poco idiomático del modismo por 'rechazar' en el cuerpo del texto y trasladé el hebraísmo literal a la nota. También cambié 'los más pequeños' por 'los siervos de menor rango' para expresar el valor estamental de הַקְּטַנִּים en este contexto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:53:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura retórica del hebreo y conserva las dos alternativas léxicas principales documentadas por el POB en inglés: el modismo de ''volver atrás el rostro'' y el valor de פחת como cargo militar/administrativo. Sin embargo, dos elecciones no preservan con suficiente fidelidad el sentido auditado: ''los más pequeños'' desplaza הַקְּטַנִּים hacia tamaño físico en vez de rango (''los de menor rango'' / ''los menos importantes''), y ''hacer retroceder el rostro'' suena poco idiomático en español si no se formula como explicación del hebraísmo. Además, ''entre los más pequeños'' puede sugerir inclusión dentro de un grupo físico, mientras que el hebreo apunta a un oficial perteneciente a los subordinados de menor rango de su señor.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'hacer retroceder el rostro' resulta demasiado calcado y poco natural como texto principal. También 'los más pequeños' suena impropio en este contexto militar-político. Una reparación pequeña mejora mucho la legibilidad manteniendo el rastro del modismo en nota.
  glossary_alignment: No hay conflicto con términos teológicos del proyecto. 'mi señor' es correcto aquí como superior humano, y 'capitán' encaja con la decisión inglesa con nota alternativa. 'Siervos' es aceptable contextualmente como excepción razonada frente al default más fuerte para δοῦλος, ya que aquí no se trata de ese término griego sino de עבדי en marco cortesano-militar.
  issues:
  - severity: medium
    issue: '''los más pequeños'' para הַקְּטַנִּים'
    rationale: El contexto y la auditoría inglesa marcan rango ('the least'), no tamaño. En español, 'los más pequeños' introduce una lectura física o etaria innecesaria.
  - severity: medium
    issue: '''hacer retroceder el rostro'' en el texto principal'
    rationale: Aunque intenta preservar el hebraísmo, en español suena forzado y opaco. Conviene usar una formulación más inteligible en el cuerpo del texto y dejar el modismo literal en nota, como ya hace el POB inglés con su nota alternativa.
  - severity: low
    issue: '''entre los más pequeños de los siervos de mi señor'''
    rationale: La preposición 'entre' no es imposible, pero una formulación como 'de entre los siervos de menor rango de mi señor' refleja mejor la relación de pertenencia y estatus.
  revised_spanish_text: ¿Cómo, pues, podrías rechazar a un solo capitán[b] de entre los siervos de menor rango de mi señor[a], mientras confías en Egipto para carros y jinetes?
  revised_footnotes:
