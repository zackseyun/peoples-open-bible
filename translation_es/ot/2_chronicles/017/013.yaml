  rationale: Se ajusta מְלָאכָה a 'bienes' para reflejar mejor el sentido material amplio respaldado por la auditoría inglesa, evitando la sobreinterpretación de 'riqueza'. También se suaviza la expresión militar para un español más natural y fiel al paralelismo hebreo.
