  language: en
  yaml_path: translation/ot/ezekiel/020/013.yaml
  text: But the house of Israel rebelled against me in the wilderness[a]. They did not walk in my statutes, and they rejected my judgments, which if a person does them, he will live by them. They greatly profaned my Sabbaths. Then I said I would pour out my wrath on them in the wilderness[c][b], to put an end to them.
  footnotes:
