base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/028.yaml
  text: Then Joshua son of Nun[a], Moses’ attendant from his youth, answered and said, “My lord Moses[b], restrain them!”
  footnotes:
  - marker: a
    text: Or “one of his young men,” or possibly “from his chosen men.” The Hebrew phrase is compact and somewhat ambiguous.
    reason: lexical_alternative
  - marker: b
    text: Or “forbid them.” The Hebrew verb can mean to restrain, hold back, or prohibit.
    reason: lexical_alternative
