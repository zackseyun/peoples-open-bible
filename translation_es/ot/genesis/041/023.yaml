- from: Y he aquí[a], siete espigas[b], delgadas y quemadas por el viento del oriente, iban brotando detrás de ellas.
  to: Y he aquí[a], siete espigas[b], marchitas, delgadas y quemadas por el viento del oriente, brotaban después de ellas.
  rationale: Se distingue la doble descripción hebrea mediante «marchitas, delgadas», se mantiene la imagen de daño agrícola por el viento del oriente, y se reemplaza «detrás de ellas» por «después de ellas» para una secuencia más natural en español.
