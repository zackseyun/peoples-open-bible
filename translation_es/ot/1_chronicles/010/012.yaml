translation:
  language: es
  text: Entonces todos los valientes se levantaron y llevaron el cuerpo de Saúl y los cuerpos de sus hijos, y los trajeron a Jabés[b]. Enterraron sus huesos debajo de la encina[a] en Jabés, y ayunaron siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo del terebinto». El hebreo אֵלָה puede referirse a un árbol grande del tipo encina/roble/terebinto.
    reason: lexical_alternative
  - marker: b
    text: El relato más amplio identifica el lugar como Jabés de Galaad; aquí el hebreo lo abrevia a «Jabés».
    reason: cross_reference
lexical_decisions:
- source_word: כָּל אִישׁ חַיִל
  english_pob_choice: all the valiant men
  chosen_spanish: todos los valientes
  alternatives_spanish:
  - todos los hombres de valor
  - todos los hombres valientes
  lexicon: HALOT
  rationale: La expresión hebrea es un sintagma fijo para hombres de capacidad, valor o fuerza militar. En español, «los valientes» comunica bien ese matiz honorífico y marcial sin sonar forzado, y evita una traducción demasiado literal como «cada hombre de valor».
- source_word: גּוּפַת ... גּוּפֹת
  english_pob_choice: the body of Saul and the bodies of his sons
  chosen_spanish: el cuerpo de Saúl y los cuerpos de sus hijos
  alternatives_spanish:
  - el cadáver de Saúl y los cadáveres de sus hijos
  - el cuerpo ... los cuerpos
  lexicon: HALOT
  rationale: גּוּפָה nombra un cuerpo muerto. «Cuerpo/cuerpos» conserva la referencia concreta sin endurecer innecesariamente el registro con «cadáver», aunque esa opción también sería semánticamente válida.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried away
  chosen_spanish: llevaron
  alternatives_spanish:
  - transportaron
  - cargaron
  lexicon: HALOT
  rationale: Aquí נשא expresa el acto de tomar y trasladar los cuerpos. «Llevaron» resulta natural en español y mantiene la idea de mover físicamente los restos; «transportaron» suena más técnico de lo que pide el verso.
- source_word: וַיְבִיאוּם יָבֵישָׁה
  english_pob_choice: brought them to Jabesh
  chosen_spanish: los trajeron a Jabés
  alternatives_spanish:
  - los llevaron a Jabés
  - los trajeron a Jabés-galaad
  lexicon: HALOT
  rationale: El hebreo dice solo «a Jabés». Se mantiene esa forma breve, ya que el contexto narrativo permite identificar el lugar, y «trajeron» reproduce bien el movimiento hacia el destino.
- source_word: עַצְמוֹתֵיהֶם
  english_pob_choice: their bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus huesos mortales
  - sus restos
  lexicon: HALOT
  rationale: La palabra hebrea significa literalmente «huesos». «Sus huesos» preserva la concreción del texto y no suaviza la imagen a «restos».
- source_word: תַּחַת הָאֵלָה
  english_pob_choice: under the oak
  chosen_spanish: debajo de la encina
  alternatives_spanish:
  - debajo del roble
  - debajo del terebinto
  lexicon: HALOT
  rationale: אֵלָה puede referirse a un gran árbol del tipo encina/roble/terebinto. «Encina» es una solución natural en español y conserva la imagen arbórea; la ambigüedad se documenta en nota.
- source_word: וַיָּצֻמוּ שִׁבְעַת יָמִים
  english_pob_choice: and fasted seven days
  chosen_spanish: ayunaron siete días
  alternatives_spanish:
  - ayunaron por siete días
  - y ayunaron durante siete días
  lexicon: HALOT
  rationale: El verbo צום se traduce de forma directa por «ayunar». En español, omitir la preposición «por/durante» mantiene la frase natural y cercana al hebreo sin perder claridad.
theological_decisions:
- issue: 'Identificación del lugar: Jabés frente a Jabés-galaad'
  english_pob_reading: The broader narrative identifies the location as Jabesh-gilead; here the Hebrew text abbreviates it to 'Jabesh.'
  chosen_spanish_reading: Jabés
  alternative_spanish_readings:
  - Jabés de Galaad
  - Jabés-galaad
  rationale: Se sigue el texto hebreo de este versículo, que abrevia el topónimo a «Jabés». La identificación ampliada queda para la nota, sin incorporar al cuerpo principal una expansión que el verso mismo no da.
  doctrine_reference: 1 Samuel 31:13; 2 Samuel 2:4
- issue: Ambigüedad léxica de הָאֵלָה
  english_pob_reading: Or 'under the terebinth.' The Hebrew אֵלָה can refer to a large tree of the terebinth/oak type.
  chosen_spanish_reading: debajo de la encina
  alternative_spanish_readings:
  - debajo del terebinto
  - debajo del roble
  rationale: El hebreo permite más de una especie arbórea exacta. Se mantiene una opción española natural en el texto principal y se explicita en nota la amplitud semántica, para no borrar la tensión lexical del original.
  doctrine_reference: No aplica
- issue: Tratamiento funerario y ayuno como gesto de luto
  english_pob_reading: They buried their bones ... and fasted seven days.
  chosen_spanish_reading: Enterraron sus huesos ... y ayunaron siete días.
  alternative_spanish_readings:
  - sepultaron sus huesos ... y ayunaron siete días
  - enterraron sus restos ... y ayunaron siete días
  rationale: 'Se conserva la secuencia concreta del hebreo: recuperación, sepultura de los huesos y ayuno. No se suaviza a una referencia genérica a «restos» porque el texto insiste en «huesos».'
  doctrine_reference: 2 Samuel 21:12-13
translation_notes:
  revision_awareness: No se registraron revisiones posteriores que alteren el sentido base de la versión inglesa auditada; el acuerdo final fue alto y no hubo cambios aplicados.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto directo.
  - Se eligió «huesos» en lugar de «restos» para conservar la concreción del hebreo.
  - Se evitó expandir «Jabés» en el texto principal, reservando la aclaración geográfica para la nota.
  - Se usó «encina» como solución española idiomática, documentando la alternativa botánica en la nota.
  - «Ayunaron siete días» reproduce el verbo de forma directa y natural en español.
