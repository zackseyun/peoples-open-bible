translation:
  language: es
  text: Cuando la reina de Saba vio la sabiduría de Salomón y la casa que él había construido,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el palacio que él había construido». El hebreo dice «la casa», que en este contexto real puede referirse específicamente al complejo palaciego de Salomón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: El waw consecutivo introduce la acción narrativa en secuencia. En español, «Cuando» preserva bien el valor temporal y prepara la continuación, igual que la solución inglesa.
- source_word: מַלְכַּת שְׁבָא
  english_pob_choice: the queen of Sheba
  chosen_spanish: la reina de Saba
  alternatives_spanish:
  - la reina de Sheba
  - la reina proveniente de Saba
  lexicon: HALOT
  rationale: El hebreo identifica a la figura real por su reino o región. «Saba» es la forma hispana más natural y readable; «de Sheba» se conserva como alternativa transliterada.
- source_word: חָכְמַת שְׁלֹמֹה
  english_pob_choice: Solomon’s wisdom
  chosen_spanish: la sabiduría de Salomón
  alternatives_spanish:
  - la sabiduría de Salomón
  - la sabiduría salomónica
  lexicon: HALOT
  rationale: La construcción en estado constructo se vierte de forma natural con el genitivo español. «Sabiduría» mantiene el sentido de discernimiento e inteligencia práctica, no solo conocimiento acumulado.
- source_word: וְהַבַּיִת
  english_pob_choice: and the house
  chosen_spanish: y la casa
  alternatives_spanish:
  - y el palacio
  - y la casa real
  lexicon: HALOT
  rationale: Aunque en contexto real puede aludir al complejo palaciego, el hebreo dice literalmente «la casa». Se mantiene ese término en el texto principal para no especificar más allá de la evidencia, siguiendo la cautela del POB inglés.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he had built
  chosen_spanish: que él había construido
  alternatives_spanish:
  - que había construido
  - que él construyó
  lexicon: HALOT
  rationale: La cláusula relativa expresa una acción completada antes de la visión de la reina. El pluscuamperfecto español refleja mejor esa anterioridad narrativa.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene «house» en el cuerpo y ofrece «palace» como alternativa lexical por el contexto real. La versión española sigue esa misma cautela: conserva «casa» en el texto principal y documenta «palacio» en nota.'
  spanish_consistency_notes:
  - Se conservó «Salomón» y no «Shlomó» por la forma española establecida del nombre.
  - Se usó «la reina de Saba» como equivalente idiomático de «the queen of Sheba».
  - Se mantuvo el marcador de nota [a] junto a «construido» para reflejar la alternativa lexical del sustantivo subyacente.
  - No se añadió ningún término doctrinal o interpretativo que no esté sostenido por el hebreo o por la nota inglesa.
