    issue: διεπέρασεν está traducido como «pasó»
    rationale: El griego indica cruce o paso de un lado a otro. «Pasó» es demasiado amplio y debilita el matiz de movimiento específico que el POB inglés conservó con «crossed over».
  - severity: medium
    issue: ἐν Καρναΐν está traducido como «de Carnain»
    rationale: La preposición ἐν es locativa. «De Carnain» desplaza el sentido hacia pertenencia o especificación nominal del santuario, mientras que el original dice que huyeron al santuario ubicado en Carnain.
