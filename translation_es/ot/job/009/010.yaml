translation:
  language: es
  text: el que hace grandes cosas [a] más allá de toda investigación, y maravillas [b] sin número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «imposibles de sondear» o «que no se pueden investigar plenamente». El hebreo idiomático afirma que sus grandes actos no pueden ser plenamente investigados ni comprendidos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «más allá de todo número». La frase hebrea expresa que las maravillas de Dios son innumerables.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: who does
  chosen_spanish: el que hace
  alternatives_spanish:
  - quien hace
  - el que realiza
  lexicon: HALOT
  rationale: El participio qal funciona de modo descriptivo y relativo; en español, «el que hace» conserva esa relación sin volverlo artificialmente nominal.
- source_word: גְדֹלוֹת
  english_pob_choice: great things
  chosen_spanish: grandes cosas
  alternatives_spanish:
  - grandes hechos
  - grandes obras
  lexicon: HALOT
  rationale: La forma plural sustantivada abarca más que «hechos» u «obras»; «grandes cosas» mantiene la amplitud semántica del hebreo.
- source_word: עַד אֵין חֵקֶר
  english_pob_choice: beyond searching out
  chosen_spanish: incomprensibles
  alternatives_spanish:
  - más allá de toda investigación
  - imposibles de sondear
  lexicon: HALOT
  rationale: El hebreo expresa que las obras de Dios no pueden investigarse plenamente. En español, «incomprensibles» comunica esa imposibilidad sin perder la fuerza del dicho idiomático.
- source_word: וְנִפְלָאוֹת
  english_pob_choice: and wonders
  chosen_spanish: y maravillas
  alternatives_spanish:
  - y cosas maravillosas
  - y obras maravillosas
  lexicon: HALOT
  rationale: «Maravillas» es un equivalente natural y reverente para נפלאות, preservando el matiz de actos que provocan asombro.
- source_word: עַד אֵין מִסְפָּר
  english_pob_choice: beyond number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - más allá de todo número
  lexicon: HALOT
  rationale: La expresión hebrea significa que no se pueden contar. «Sin número» conserva el paralelismo con la cláusula anterior y el sentido de innumerabilidad.
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés no introdujo cambios; se mantuvo el sentido óptimo-equivalente de «beyond searching out» y «beyond number». La versión española sigue esa misma lectura y solo adapta la idiomaticidad al español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para no enmascarar el referente divino; el contexto habla de Dios de forma implícita en el discurso de Job.
  - Se mantuvo la amplitud de «grandes cosas» sin restringirlo a «obras» o «hechos», en línea con la decisión inglesa.
  - Las notas al pie están ancladas exactamente en «incomprensibles» y «maravillas», que son los puntos donde el español concentra la alternativa lexical.
