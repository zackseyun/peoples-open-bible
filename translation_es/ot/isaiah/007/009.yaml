translation:
  language: es
  text: Y la cabeza de Efraín es Samaria, y la cabeza de Samaria es el hijo de Remalías. Si ustedes no creen[a], ciertamente no quedarán firmes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Juego de palabras hebreo: los dos verbos provienen de la misma raíz (אמן), vinculando «creer/confiar» con «quedar firme/ser establecido».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Si ustedes no confían, no se mantendrán firmes».'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - capital
  lexicon: HALOT
  rationale: Conservo la metáfora política del hebreo y el paralelismo con la segunda cláusula. «Capital» suaviza demasiado el primer miembro y rompe la simetría con la persona en la segunda cláusula.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - el reino de Efraín
  - Israel
  lexicon: HALOT
  rationale: Mantengo el nombre propio tal como está en el hebreo. En contexto se refiere al reino del norte, pero el texto dice «Efraín», y esa designación debe preservarse en el cuerpo principal.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: HALOT
  rationale: Nombre propio estándar de la ciudad, que aquí funciona como la capital de Efraín.
- source_word: בֶּן רְמַלְיָהוּ
  english_pob_choice: the son of Remaliah
  chosen_spanish: el hijo de Remalías
  alternatives_spanish:
  - Remalías hijo
  - Pekaj hijo de Remalías
  lexicon: HALOT
  rationale: Sigo la estructura patronímica literal del hebreo, porque su uso retórico es significativo. No introduzco el nombre personal del rey en el texto principal.
- source_word: אִם לֹא
  english_pob_choice: If you do not
  chosen_spanish: Si ustedes no
  alternatives_spanish:
  - Ciertamente no
  - De no ser que
  lexicon: HALOT
  rationale: Lo vierto como protasis condicional, no como partícula asertiva. Así se conserva mejor la sintaxis y el juego verbal del versículo.
- source_word: תַאֲמִינוּ
  english_pob_choice: believe
  chosen_spanish: creen
  alternatives_spanish:
  - confían
  - tienen fe
  lexicon: HALOT
  rationale: En español, «creer» comunica de forma natural la fuerza de אמן en hifil en este contexto. También mantiene la relación audible con el verbo final de la misma raíz.
- source_word: תֵאָמֵנוּ
  english_pob_choice: be established
  chosen_spanish: serán establecidos
  alternatives_spanish:
  - se mantendrán firmes
  - serán confirmados
  lexicon: HALOT
  rationale: Uso una pasiva natural en español para reflejar el niphal de אמן. «Serán establecidos» preserva el vínculo léxico con «creer» y el sentido de firmeza/estabilidad.
theological_decisions:
- issue: Juego de palabras entre creer y ser establecidos
  english_pob_reading: If you do not believe, surely you will not be established.
  chosen_spanish_reading: Si ustedes no creen, de cierto no serán establecidos.
  alternative_spanish_readings:
  - Si ustedes no confían, no se mantendrán firmes.
  - Si no creen, no serán confirmados.
  rationale: 'El hebreo usa dos formas de la misma raíz אמן: una para creer/confiar y otra para ser establecidos/firmes. Mi versión conserva esa relación semántica y retórica sin forzar una paráfrasis más explicativa que el texto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se preservan la metáfora de «cabeza», el patronímico de Remalías y el juego de palabras de אמן en la cláusula final. No se documentaron revisiones posteriores que alteren esta lectura.'
  spanish_consistency_notes:
  - Uso «Efraín» y «Samaria» como nombres propios estables, en línea con el tratamiento del POB inglés.
  - Mantengo la distinción verbal creer/ser establecidos para no borrar la tensión léxica del hebreo.
  - Prefiero «de cierto» para reproducir el valor enfático de כִּי en la apódosis, sin añadir doctrina ajena al versículo.
