translation:
  language: es
  text: Haz expiación por tu pueblo Israel, a quien redimiste, Yahvé, y no pongas sangre inocente en medio de tu pueblo Israel. Y así quedarán absueltos de la culpa de esa sangre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y la sangre será expiada por ellos». El hebreo usa «la sangre» como expresión legal para la responsabilidad surgida por derramamiento de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפֵּר
  english_pob_choice: Make atonement
  chosen_spanish: Haz expiación
  alternatives_spanish:
  - Haz atonamiento
  - Realiza expiación
  lexicon: HALOT
  rationale: En este contexto cultual-jurídico, כּפר pide una expresión española que conserve el sentido de expiar/obtener expiación. «Haz expiación» es natural, sobrio y fiel al valor sacrificial y legal del verbo.
- source_word: לְעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: for your people Israel
  chosen_spanish: por tu pueblo Israel
  alternatives_spanish:
  - por tu pueblo, Israel
  - por Israel, tu pueblo
  lexicon: HALOT
  rationale: El lamed indica beneficio o destinatario de la expiación. «Por tu pueblo Israel» conserva la relación pactual y suena fluido en español.
- source_word: אֲשֶׁר פָּדִיתָ
  english_pob_choice: whom you redeemed
  chosen_spanish: a quien redimiste
  alternatives_spanish:
  - a quien rescataste
  - a quien libraste
  lexicon: HALOT
  rationale: פּדה expresa redimir/rescatar de una situación de servidumbre o obligación. «Redimiste» preserva el lenguaje pactual de redención que el POB inglés también quiso mantener.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma estándar del proyecto en español, conforme al criterio de no sustituirlo por un título.
- source_word: וְאַל תִּתֵּן
  english_pob_choice: and do not set
  chosen_spanish: y no pongas
  alternatives_spanish:
  - y no coloques
  - y no dejes
  lexicon: HALOT
  rationale: נתן aquí tiene valor de poner/colocar. «No pongas» refleja con más cercanía la imagen hebrea que una paráfrasis como «no permitas».
- source_word: דָּם נָקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre de inocente
  - la sangre del inocente
  lexicon: HALOT
  rationale: La expresión hebrea funciona como fórmula jurídica de sangre derramada injustamente. «Sangre inocente» conserva la concisión y la fuerza legal del original.
- source_word: בְּקֶרֶב עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: in the midst of your people Israel
  chosen_spanish: en medio de tu pueblo Israel
  alternatives_spanish:
  - entre tu pueblo Israel
  - dentro de tu pueblo Israel
  lexicon: HALOT
  rationale: בקרב significa literalmente «en medio de». «En medio de» mantiene la imagen espacial y el énfasis comunitario del hebreo.
- source_word: וְנִכַּפֵּר לָהֶם הַדָּם
  english_pob_choice: Then the bloodguilt will be atoned for them
  chosen_spanish: Entonces se hará expiación por ellos respecto de la sangre
  alternatives_spanish:
  - Entonces la sangre será expiada para ellos
  - Entonces se les expiará la sangre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la sangre será expiada». En español, «se hará expiación por ellos respecto de la sangre» conserva el sujeto implícito y evita introducir «culpa» como interpretación explícita, aunque el sentido jurídico de responsabilidad por derramamiento de sangre queda implícito por el contexto.
theological_decisions:
- issue: Nombre divino en vocativo
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El versículo está en forma de súplica directa. Mantener «Yahvé» preserva el nombre propio divino conforme al estándar del proyecto en español y evita la sustitución titulística.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
- issue: Cláusula final sobre הַדָּם
  english_pob_reading: the bloodguilt will be atoned for them
  chosen_spanish_reading: se hará expiación por ellos respecto de la sangre
  alternative_spanish_readings:
  - la culpa de sangre será expiada por ellos
  - se expiará para ellos la sangre
  rationale: El inglés POB explicita «bloodguilt» para aclarar el sentido jurídico. En español, la formulación elegida mantiene el referente al derramamiento de sangre sin forzar una palabra interpretativa única; la nota puede conservar la alternativa más literal del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés al preferir un equivalente más literal de תִּתֵּן y בְּקֶרֶב («no pongas... en medio de») y conserva la estructura final resuelta por el equipo, pero en español evita introducir «culpa» de forma explícita, dejando que el contexto legal del versículo sostenga el sentido de expiación por derramamiento de sangre.
  spanish_consistency_notes:
  - Se usó «Yahvé» de acuerdo con el estándar español del proyecto para יְהוָה.
  - Se mantuvo «expiación» como término técnico principal, coherente con el campo semántico de כפר y con el español eclesial contemporáneo.
  - «Sangre inocente» reproduce la fórmula jurídica breve del hebreo; la nota aclara la alternativa más literal.
  - La cláusula final evita una glosa excesiva y conserva la ambigüedad controlada del original, permitiendo la lectura jurídica de responsabilidad por sangre derramada.
