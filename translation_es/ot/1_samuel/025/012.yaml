- from: Así que los jóvenes de David[d] volvieron[e] por su camino[f], y regresaron y llegaron, e informaron a él[g] todas estas palabras[a].
  to: Entonces los jóvenes[a] de David dieron la vuelta y emprendieron el regreso; volvieron, llegaron y le informaron todas estas palabras[b].
  rationale: La revisión conserva la cadena narrativa hebrea y las decisiones léxicas centrales del POB («jóvenes», «palabras»), pero corrige formulaciones españolas poco naturales. «Dieron la vuelta y emprendieron el regreso» expresa mejor וַיַּהַפְכוּ לְדַרְכָּם, y «le informaron» reemplaza el calco torpe «a él». Se eliminaron notas de estilo no necesarias y se retuvieron solo las notas léxicas útiles para el lector y el expediente.
