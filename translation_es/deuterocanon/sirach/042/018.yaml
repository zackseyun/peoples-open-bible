translation:
  language: es
  text: Él explora el abismo y el corazón[a][b], y comprende todos sus secretos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de Masada conserva una apertura más breve: «Abismo y corazón él exploró», mientras que el texto de la Guenizá de El Cairo continúa con la cláusula sobre «todo lo que de ellos está al descubierto».'
    reason: textual_variant
  - marker: b
    text: 'El griego dice: «y consideró todas sus maquinaciones/acciones astutas». El hebreo lee literalmente «sus desnudeces», probablemente refiriéndose a todo lo que queda expuesto ante él.'
    reason: alternative_reading
lexical_decisions:
- source_word: תהום
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - las profundidades
  - lo profundo
  lexicon: HALOT
  rationale: תהום designa la profundidad abisal o el abismo primordial. En español, "abismo" conserva bien el alcance cósmico y la fuerza del término, y además armoniza con el paralelo griego ἄβυσσον.
- source_word: לב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  lexicon: HALOT
  rationale: לב suele abarcar la persona interior, incluidas intención y pensamiento. "Corazón" mantiene ese antropologismo bíblico y coincide con καρδίαν en el paralelo griego.
- source_word: חקר
  english_pob_choice: searches out
  chosen_spanish: explora
  alternatives_spanish:
  - escudriña
  - investiga
  - sondea
  lexicon: HALOT
  rationale: El verbo expresa búsqueda minuciosa y penetrante. "Explora" comunica esa indagación profunda en español moderno sin perder el matiz de examen cuidadoso; "escudriña" sería posible, pero aquí resulta algo más tradicional y menos transparente.
- source_word: מערומיהם / πανουργεύμασιν
  english_pob_choice: their secrets
  chosen_spanish: sus secretos
  alternatives_spanish:
  - sus desnudeces
  - sus cosas ocultas
  - sus artificios
  lexicon: HALOT
  rationale: La tradición hebrea apunta a lo que está descubierto o al descubierto, mientras que el paralelo griego habla de "sus maquinaciones/astucias" (πανουργεύμασιν). Dado que la revisión inglesa ya optó por "secrets" para reflejar el sentido natural de lo oculto o expuesto ante Dios, "secretos" preserva en español esa misma solución de equilibrio. Se evita "desnudeces" por ser poco natural en este contexto castellano.
- source_word: יתבונן
  english_pob_choice: he understands
  chosen_spanish: comprende
  alternatives_spanish:
  - discierne
  - entiende
  - considera
  lexicon: HALOT
  rationale: El hitbonen expresa comprensión atenta, no mera observación. "Comprende" es natural y fiel al valor cognitivo del verbo.
theological_decisions:
- issue: Sujeto divino implícito en el hebreo frente al sujeto explícito en el griego
  english_pob_reading: Use 'he' in the verse, with the divine referent understood from context and confirmed by the Greek parallel's explicit 'the Lord' in the following clause.
  chosen_spanish_reading: Mantener el sujeto implícito con "Él", entendiendo que se refiere a Yahvé por el contexto.
  alternative_spanish_readings:
  - Yahvé explora...
  - El Señor explora...
  rationale: El hebreo no nombra explícitamente a Dios en la línea principal, pero el referente divino es claro por el contexto sapiencial y por el griego, que lo explicita como ὁ κύριος. En español, "Él" conserva la economía del hebreo y sigue siendo inteligible; además, evita introducir una fórmula que no aparece en el testigo hebreo base.
  doctrine_reference: Primacía de la fuente original con respeto a la explicitación contextual; no añadir más de lo que el hebreo dice, aunque el griego aclare el referente.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió una versión demasiado literal de מערומיהם ('their nakednesses') hacia 'their secrets' para expresar en inglés natural el sentido de lo oculto o expuesto ante Dios. La presente propuesta sigue esa decisión auditada, pero mantiene la base hebrea y deja constancia del paralelo griego, que ofrece una lectura alternativa centrada en 'maquinaciones' o 'astucias'.
  spanish_consistency_notes:
  - Se usa "abismo" para תהום, coherente con el paralelo griego ἄβυσσον y con el registro bíblico español.
  - '"Corazón" conserva el valor antropológico bíblico de לב.'
  - '"Comprende" mantiene el tono gnómico del dicho sapiencial.'
  - Se evita traducir mecánicamente el griego como "astucias" en el texto principal, porque la línea hebrea base y la revisión inglesa favorecen un sentido más general de lo oculto/descubierto ante Dios.
  - Se mantiene "Él" sin nombrar directamente a Yahvé para respetar la forma implícita del hebreo, aunque la referencia divina sea transparente.
