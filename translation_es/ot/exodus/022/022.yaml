translation:
  language: es
  text: Si ciertamente lo afliges[a], y si de veras clama a mí[b], ciertamente oiré su clamor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa pronombres masculinos singulares («lo», «su»), funcionando aquí de manera distributiva para cualquier viuda o huérfano mencionado en el versículo anterior.
    reason: cultural_note
  - marker: b
    text: 'Las formas verbales hebreas repetidas («afliges», «clama», «oiré») usan un infinitivo absoluto con un verbo finito para dar énfasis: «ciertamente / de veras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición directa; en español, «si» conserva mejor la estructura condicional del hebreo que «cuando», aunque el contexto legal implique una situación esperable.
- source_word: עַנֵּה תְעַנֶּה
  english_pob_choice: indeed afflict
  chosen_spanish: de veras lo afliges
  alternatives_spanish:
  - ciertamente lo afliges
  - de veras lo maltratas
  - lo oprimes
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. «Afliges» mantiene la cercanía lexical con ענה, y «de veras» expresa la fuerza enfática sin volver la frase artificial en español.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - les
  lexicon: HALOT
  rationale: El sufijo es masculino singular. En español, el pronombre objeto directo «lo» refleja esa forma y permite un referente genérico distributivo para la persona vulnerable mencionada en el versículo anterior.
- source_word: כִּי אִם
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - si de veras
  - y cuando
  lexicon: HALOT
  rationale: Aquí la expresión continúa la condición y el desarrollo consecuente; «y si» suena natural en español y conserva la conexión sintáctica del hebreo sin convertirla en contraste.
- source_word: צָעֹק יִצְעַק
  english_pob_choice: he indeed cries out
  chosen_spanish: de veras clama
  alternatives_spanish:
  - clama con insistencia
  - ciertamente clama
  lexicon: HALOT
  rationale: La duplicación verbal marca énfasis. «Clama» comunica היטב el grito de auxilio, y «de veras» conserva la intensificación sin perder naturalidad.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - ante mí
  - hacia mí
  lexicon: HALOT
  rationale: Preposición simple y directa; «a mí» reproduce el destinatario del clamor de manera clara y fiel.
- source_word: שָׁמֹעַ אֶשְׁמַע
  english_pob_choice: I will surely hear
  chosen_spanish: yo ciertamente oiré
  alternatives_spanish:
  - yo de veras oiré
  - yo oiré con certeza
  lexicon: HALOT
  rationale: La construcción enfática se mantiene con un adverbio de certeza. «Oiré» es una traducción directa de שמע en este contexto de respuesta atenta al clamor.
- source_word: צַעֲקָתוֹ
  english_pob_choice: his cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su voz de clamor
  lexicon: HALOT
  rationale: «Clamor» expresa mejor el grito de auxilio judicial/social que «grito» en español, y sigue la relación léxica con צעק sin perder dignidad estilística.
theological_decisions:
- issue: Pronombres masculinos singulares aplicados distributivamente
  english_pob_reading: him / his
  chosen_spanish_reading: lo / su
  alternative_spanish_readings:
  - le / su
  - los / sus
  rationale: Se conserva el singular masculino del hebreo, como en la auditoría inglesa, pero funciona distributivamente para cualquier persona vulnerable referida por el grupo del versículo anterior. En español, «lo» y «su» preservan la concordancia sin neutralizar la forma del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el último pase indicó que el texto estaba sin cambios y con alto grado de acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se evitó «SEÑOR» como sustitución oculta porque el versículo habla en primera persona divina sin el Tetragrámaton explícito.
  - Se prefirió «clamor» sobre «grito» para sostener el registro jurídico y la intensidad del hebreo צעק/צעקה.
  - La estructura condicional con repetición enfática se conservó en español mediante «si... y si... ciertamente».
