translation:
  language: es
  text: Ahora bien, Ephrón estaba sentado entre los hijos de Het[a], y Ephrón el hitita respondió a Abraham a oídos de los hijos de Het, delante de todos los que entraban por la puerta de su ciudad, diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hititas» para «los hijos de Het» en ambas ocurrencias; el hebreo dice más literalmente «hijos de Het».
    reason: lexical_alternative
  - marker: b
    text: La «puerta de su ciudad» se refiere al lugar público donde se realizaban asuntos legales y comerciales delante de testigos.
    reason: cultural_note
lexical_decisions:
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba habitando
  lexicon: HALOT
  rationale: El participio hebreo presenta a Ephrón en un estado/situación en curso en la escena, no solo como un hecho puntual pasado. «Estaba sentado» conserva ese matiz aspectual con naturalidad en español.
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - en medio de los
  lexicon: HALOT
  rationale: En este contexto social, la idea es que Ephrón estaba incluido en el grupo reunido; «entre» transmite bien la pertenencia dentro del conjunto sin sonar forzado.
- source_word: בְּנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Het
  alternatives_spanish:
  - los hititas
  - los descendientes de Het
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea más literal, como hace el POB en inglés, para mantener la distinción con el rótulo etnónimo apposicional posterior. «Hijos de Het» es transparente y auditable.
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: HALOT
  rationale: «Respondió» es el equivalente natural en español para el verbo de diálogo y mantiene la función narrativa directa del hebreo.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - un hitita
  lexicon: HALOT
  rationale: El artículo hebreo favorece la designación definida; «el hitita» conserva esa identificación étnica como etiqueta narrativa.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a oídos de
  - en el oído de
  lexicon: HALOT
  rationale: La locución hebrea expresa publicidad audible, dentro del alcance de quienes escuchan. «En presencia de» comunica bien la dimensión pública en español; el matiz auditivo se mantiene por contexto en la frase completa.
- source_word: לְכֹל בָּאֵי שַׁעַר עִירוֹ
  english_pob_choice: before all who entered the gate of his city
  chosen_spanish: delante de todos los que entraban por la puerta de su ciudad
  alternatives_spanish:
  - ante todos los que entraban por la puerta de su ciudad
  - en presencia de todos los que entraban por la puerta de su ciudad
  lexicon: HALOT
  rationale: La puerta de la ciudad es el lugar público de transacciones y testimonio. «Delante de todos los que entraban por la puerta de su ciudad» preserva la escena pública y legal que el POB inglés explica en nota.
- source_word: שַׁעַר עִירוֹ
  english_pob_choice: the gate of his city
  chosen_spanish: la puerta de su ciudad
  alternatives_spanish:
  - la puerta de la ciudad
  - la puerta de su pueblo
  lexicon: HALOT
  rationale: En español, «puerta de la ciudad» comunica de forma natural el lugar cívico de reunión y juicio. Se evita una literalidad menos idiomática sin perder la referencia cultural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Fórmula narrativa estándar para introducir el discurso directo; «diciendo» mantiene la continuidad con la oración siguiente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y conserva las dos expresiones clave del versículo: la fórmula colectiva «los hijos de Het» y el marco público/legal de la «puerta de su ciudad», en continuidad con el audit trail inglés. No hay revisiones aplicadas en el historial más reciente; se mantiene el acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene «hitita» para הַחִתִּי como adjetivo étnico definido, en paralelo con la decisión inglesa.
  - «Puerta de su ciudad» se conserva tanto por literalidad como por su valor cultural de tribunal y mercado público.
  - No se introduce paráfrasis doctrinal ni terminología eclesiástica ajena al contexto narrativo.
