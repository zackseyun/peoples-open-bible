  rationale: 'Se reemplazó «desmenuzó» por «raspó» en ambas ocurrencias para reflejar fielmente רדה y mantener coherencia léxica con la auditoría inglesa. Se eliminó la grafía no natural «de[l]» y su nota de estilo, sustituyéndola por una nota léxica útil y correctamente anclada. También se suavizó la construcción media con una puntuación más natural: «siguió caminando, comiendo mientras iba».'
