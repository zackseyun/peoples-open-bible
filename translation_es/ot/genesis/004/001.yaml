revisions:
- from: 'Ahora el hombre conoció a Eva, su esposa[a]; ella concibió y dio a luz a Caín, y dijo[b]: «He adquirido un hombre con Yahvé».'
  to: 'Ahora el hombre conoció a Eva, su esposa; ella concibió y dio a luz a Caín[a], y dijo: «He adquirido un hombre con Yahvé[b]».'
  rationale: Se corrigen las notas para que coincidan con el hebreo y con el audit trail inglés. Se elimina la nota errónea sobre «su esposa», se reancla la nota del juego de palabras a «Caín», y se añade la nota necesaria sobre la ambigüedad de אֶת יְהוָה, preservando las alternativas documentadas sin cambiar el texto principal.
