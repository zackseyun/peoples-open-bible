translation:
  language: es
  text: Hace mucho tiempo tú fundaste la tierra[a], y los cielos son obra de tus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Desde antiguo tú echaste los cimientos de la tierra.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנִים
  english_pob_choice: Long ago
  chosen_spanish: Desde hace mucho tiempo
  alternatives_spanish:
  - Antiguamente
  - De antiguo
  - Hace mucho
  lexicon: HALOT
  rationale: El adverbio hebreo expresa anterioridad temporal general, equivalente a 'of old/long ago'. 'Desde hace mucho tiempo' comunica bien esa antigüedad en español actual sin sonar arcaico ni perder el valor temporal.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En paralelo con 'los cielos', el hebreo apunta al ámbito cósmico de la creación. 'La tierra' conserva ese alcance y es la opción más natural en español poético; 'el mundo' sería más interpretativo.
- source_word: יָסַדְתָּ
  english_pob_choice: you founded
  chosen_spanish: fundaste
  alternatives_spanish:
  - estableciste
  - echaste los cimientos de
  lexicon: HALOT
  rationale: El verbo יסד puede significar fundar o poner cimientos. 'Fundaste' retiene la imagen de establecimiento creador con concisión natural; 'echaste los cimientos de' explicita más la metáfora pero alarga el verso.
- source_word: וּמַעֲשֵׂה
  english_pob_choice: are the work
  chosen_spanish: son obra
  alternatives_spanish:
  - son el trabajo
  - son la hechura
  lexicon: HALOT
  rationale: La construcción nominal pide una cópula implícita en español. 'Son obra' reproduce con naturalidad la idea de producto hecho, manteniendo el paralelismo poético con 'de tus manos'.
- source_word: יָדֶיךָ
  english_pob_choice: of your hands
  chosen_spanish: de tus manos
  alternatives_spanish:
  - de tu mano
  - hecha por tus manos
  lexicon: HALOT
  rationale: El hebreo conserva el plural idiomático; en español, 'tus manos' suena natural y preserva la imagen antropomórfica de artesanía divina.
- source_word: שָׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo favorece el plural español. 'Los cielos' mantiene el tono elevado y el paralelismo con 'la tierra'.
theological_decisions:
- issue: Lenguaje de creación aplicado directamente a Dios
  english_pob_reading: 'Retain the direct second-person address: God founded the earth and made the heavens.'
  chosen_spanish_reading: 'Mantener el trato directo a Dios: tú fundaste la tierra y los cielos son obra de tus manos.'
  alternative_spanish_readings:
  - tú estableciste la tierra y los cielos son obra de tus manos
  - tú echaste los cimientos de la tierra y los cielos son obra de tus manos
  rationale: El versículo atribuye sin atenuación la creación a Dios en forma de oración poética. La traducción conserva el sujeto explícito 'tú' y la imagen antropomórfica de 'tus manos' sin suavizarla ni sustituirla por una formulación más abstracta.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El contexto auditado en inglés no registra revisiones aplicadas y muestra acuerdo alto entre revisores; la redacción española sigue de cerca esa decisión estable sin introducir variantes interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'tú' explícito para conservar el paralelismo con el hebreo y la lectura devocional directa.
  - '''Los cielos'' se dejó en plural para reflejar שָׁמָיִם y el tono cósmico del pareado.'
  - '''Obra de tus manos'' conserva la metáfora antropomórfica sin explicarla en exceso.'
