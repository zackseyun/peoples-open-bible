base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/008.yaml
  text: But there is only one path laid between them[a], that is, between the fire and the water, so that the path can hold only a man's footprint.
  footnotes:
  - marker: a
    text: Or 'between the fire and the water'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:41:59Z'
    unchanged: false
    changes_summary: Added 'But' for autem, clarified that the path lies between the fire and the water, and rendered vestigium hominis more naturally as 'a man's footprint.'
translation:
  language: es
  text: Pero hay una sola senda puesta entre ellos, esto es, entre el fuego y el agua, de modo que la senda pueda contener solo la huella de un hombre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: semita
  english_pob_choice: path
  chosen_spanish: senda
  alternatives_spanish:
  - camino
  - ruta
  - vereda
  lexicon: semantic field of a narrow way/path
  rationale: El latín semita indica una senda o paso angosto; "senda" comunica mejor la idea de un trayecto estrecho que solo admite una huella. "Camino" sería más general y menos preciso en español.
- source_word: autem
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: discourse connector
  rationale: Se conserva el valor adversativo de autem con "Pero", acorde con el giro del texto.
- source_word: hoc est
  english_pob_choice: that is
  chosen_spanish: esto es
  alternatives_spanish:
  - es decir
  - o sea
  lexicon: epexegetical formula
  rationale: La fórmula explicativa del latín se rinde naturalmente con "esto es", que mantiene el valor aclaratorio sin sobreexplicar.
- source_word: vestigium hominis
  english_pob_choice: a man's footprint
  chosen_spanish: la huella de un hombre
  alternatives_spanish:
  - la pisada de un hombre
  - la marca de un hombre
  lexicon: footprint / track
  rationale: '"Vestigium" aquí es la huella o marca dejada por el pie; "huella" conserva la imagen concreta y el límite de espacio que el texto enfatiza.'
theological_decisions:
- issue: La imagen del único paso entre fuego y agua
  english_pob_reading: There is only one path laid between them, that is, between the fire and the water
  chosen_spanish_reading: hay una sola senda puesta entre ellos, esto es, entre el fuego y el agua
  alternative_spanish_readings:
  - hay un solo camino entre ellos, es decir, entre el fuego y el agua
  rationale: No hay un conflicto doctrinal explícito; se preserva la imagen extrema de un paso único y angosto entre dos peligros opuestos, sin suavizarla ni generalizarla.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que insistió en conservar la glosa explicativa de hoc est y en mantener explícito que la senda está situada entre el fuego y el agua; por eso se prefirió "esto es, entre el fuego y el agua" en lugar de fusionar la explicación en una sola frase.
  spanish_consistency_notes:
  - Se mantiene "senda" para el matiz de paso angosto en este versículo.
  - Se conserva "esto es" para reflejar el valor explicativo del latín.
  - '"Huella" reproduce la limitación física del vestigium hominis sin introducir un matiz interpretativo adicional.'
