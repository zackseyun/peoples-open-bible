revisions:
- from: Lo levantan sobre el hombro[a], lo cargan, y lo colocan en su lugar, y allí queda en pie; no se mueve de su sitio. Aunque alguien le clame, no responde; no lo salva de su angustia.
  to: Lo levantan sobre el hombro[a], lo cargan, y lo colocan en su lugar, y queda allí de pie; no se mueve de su sitio. Aun si alguien clama a él, no responde; no lo salva de su angustia.
  rationale: 'Se hicieron ajustes menores de español: «queda allí de pie» fluye mejor que «allí queda en pie», y «Aun si alguien clama a él» refleja de manera más natural y fiel la construcción hebrea de clamar hacia el ídolo. Se mantuvo intacto el sentido del original y la nota léxica sobre «debajo de él».'
