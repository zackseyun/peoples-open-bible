translation:
  language: es
  text: Yahvé, Dios mío[a], si he hecho esto, si hay injusticia en mis manos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «si hay mal en mis manos»; la expresión hebrea puede denotar culpa moral o responsabilidad por el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio del pacto, y el marco del proyecto pide mantenerlo como «Yahvé» en español, no ocultarlo tras una convención de mayúsculas. «Jehová» es una forma tradicional pero menos adecuada al estándar del proyecto; «SEÑOR» sería una máscara que pierde el nombre.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi dios
  lexicon: HALOT
  rationale: 'La forma con sufijo de primera persona expresa posesión relacional: «mi Dios». En español, la mayúscula en «Dios» es la forma natural cuando se refiere al Dios de Israel en oración directa.'
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  - si acaso
  lexicon: HALOT
  rationale: Introduce una cláusula condicional de autoexamen o autoimprecación; «si» reproduce de forma directa y natural la estructura del hebreo.
- source_word: עָשִׂיתִי זֹאת
  english_pob_choice: I have done this
  chosen_spanish: he hecho esto
  alternatives_spanish:
  - hice esto
  - he obrado así
  lexicon: HALOT
  rationale: El perfecto hebreo funciona bien como perfecto compuesto en español en este contexto de protesta jurídica/moral. «He hecho esto» conserva la referencia concreta del demostrativo «esto» sin añadir paráfrasis.
- source_word: יֶשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - hay allí
  lexicon: HALOT
  rationale: La partícula existencial se expresa naturalmente con «hay»; es la forma más idiomática y fiel en español actual.
- source_word: עָוֶל
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - torcedura moral
  - culpa
  lexicon: HALOT
  rationale: «Injusticia» mantiene el tono judicial del salmo y corresponde bien al campo semántico de עָוֶל, que puede abarcar injusticia, maldad o desviación moral. No se optó por «iniquidad» por ser más arcaico en español.
- source_word: בְּכַפָּי
  english_pob_choice: in my hands
  chosen_spanish: en mis manos
  alternatives_spanish:
  - sobre mis manos
  - por mis manos
  lexicon: HALOT
  rationale: La imagen hebrea es corporal e idiomática, y en español «en mis manos» conserva tanto la metáfora como la naturalidad. Puede sugerir responsabilidad o culpabilidad, sin forzar el sentido.
theological_decisions:
- issue: Nombre divino יהוה en un salmo de lamentación/protesta
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se preserva el nombre del pacto tal como pide la línea editorial del proyecto. No se reemplaza por un título genérico, porque el hebreo contiene explícitamente el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto inglés fue revisado y quedó sin cambios: la traducción base mantiene el nombre divino como Yahweh y la nota alternativa sobre el hebreo de «injustice/wrong». La versión española conserva esa tensión semántica en «injusticia», con una nota que permite también «mal» para reflejar el alcance del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el versículo, conforme al estándar del proyecto.
  - «Dios» se capitaliza por referencia directa al Dios de Israel en oración.
  - La frase final conserva la imagen corporal de «manos» para no diluir la posible carga de culpabilidad implícita en el hebreo.
