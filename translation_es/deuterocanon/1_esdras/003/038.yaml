translation:
  language: es
  text: Las mujeres dieron a luz al rey y a todo el pueblo que gobierna sobre el mar y la tierra;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ γυναῖκες
  english_pob_choice: Women
  chosen_spanish: Las mujeres
  alternatives_spanish:
  - Mujeres
  - Las esposas
  lexicon: LSJ
  rationale: γυναῖκες es el plural de γυνή y aquí funciona genéricamente como “mujeres”, no como “esposas”. Mantengo el artículo plural por la referencia general y por la naturalidad del español.
- source_word: ἐγέννησαν
  english_pob_choice: gave birth to
  chosen_spanish: dieron a luz a
  alternatives_spanish:
  - parieron a
  - engendraron
  lexicon: LSJ
  rationale: Con mujeres como sujeto, γεννάω indica parir o dar a luz. “Dieron a luz a” es claro y fiel en español moderno; “parieron” es más literal pero más áspero, y “engendraron” desplaza el sujeto hacia una formulación menos natural aquí.
- source_word: τὸν βασιλέα
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey,
  - al monarca
  lexicon: LSJ
  rationale: El artículo apunta a un singular genérico y definido. En español, el dativo/objeto directo preposicional con “al rey” conserva la referencia concreta y la naturalidad sintáctica.
- source_word: πάντα τὸν λαόν
  english_pob_choice: all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - al pueblo entero
  lexicon: LSJ
  rationale: λαός es colectivo; “todo el pueblo” preserva la amplitud totalizadora de πάντα y el sustantivo colectivo en singular, como en el griego.
- source_word: ὃς κυριεύει
  english_pob_choice: who rule over
  chosen_spanish: que gobierna sobre
  alternatives_spanish:
  - que domina sobre
  - que ejerce dominio sobre
  lexicon: LSJ
  rationale: κυριεύω expresa ejercicio de dominio o gobierno. En español, “gobierna sobre” conserva ese valor sin sonar excesivamente técnico. Mantengo el singular del relativo por concordancia con el griego, ya que λαός es colectivo singular.
- source_word: τῆς θαλάσσης καὶ τῆς γῆς
  english_pob_choice: the sea and the land
  chosen_spanish: el mar y la tierra
  alternatives_spanish:
  - el mar y la tierra firme
  - el mar y el país
  lexicon: LSJ
  rationale: El par griego designa la totalidad del ámbito habitado. “Mar y tierra” reproduce la antítesis de manera idiomática en español; “tierra” cubre mejor γῆ en este contraste que “tierra firme” o “país”.
theological_decisions:
- issue: Concordancia singular/plural en el relativo con un sustantivo colectivo
  english_pob_reading: Render the collective sense naturally as 'all the people who rule over the sea and the land.'
  chosen_spanish_reading: 'Conservar el singular del relativo: “todo el pueblo que gobierna sobre el mar y la tierra.”'
  alternative_spanish_readings:
  - todo el pueblo que gobiernan sobre el mar y la tierra
  - todo el pueblo que tiene dominio sobre el mar y la tierra
  rationale: El griego usa ὃς en singular con λαόν, un singular colectivo. En español también es natural mantener el singular con un colectivo como “pueblo”, sin forzar la concordancia plural.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió los artículos definidos a ‘the sea and the land’. En español, el equivalente natural ya queda satisfecho con ‘el mar y la tierra’, sin necesidad de una nota aparte.
  spanish_consistency_notes:
  - Uso de ‘Dios’/‘Yahvé’ no aplica en este versículo.
  - Se evita ‘Cristo’/‘Mesías’ porque el texto no contiene ese léxico.
  - ‘Pueblo’ se mantiene como colectivo singular para reflejar el griego y el estilo español natural.
