    text: Or 'the mother of seven.' The Hebrew idiom evokes a woman once considered fully fruitful and blessed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has breathed out her soul/life.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'her sun has gone down while it was still day,' a poetic image of a premature end.
    reason: cultural_note
