translation:
  language: es
  text: Para que tu confianza esté en Yahvé, te he hecho saber[a] hoy, aun a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «he hecho saber hoy, aun tú / también tú»; no expresa un objeto directo, que queda implícito por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  english_pob_choice: So that ... may be
  chosen_spanish: Para que ... esté
  alternatives_spanish:
  - para ... ser
  - a fin de que ... esté
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa propósito. En español, «Para que ... esté» comunica con naturalidad la finalidad de la instrucción sin perder el valor purposivo del hebreo.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el SEÑOR
  - en Yahweh
  lexicon: HALOT
  rationale: La preposición ב indica el ámbito u objeto en el que se coloca la confianza. Se mantiene «Yahvé» conforme a la norma del proyecto para יהוה.
- source_word: מִבְטַחֶךָ
  english_pob_choice: your trust
  chosen_spanish: tu confianza
  alternatives_spanish:
  - tu seguridad
  - tu esperanza
  lexicon: HALOT
  rationale: מִבְטָח se refiere a aquello en lo que uno confía o deposita seguridad. «Tu confianza» preserva bien el sustantivo y el sufijo de segunda persona singular masculina.
- source_word: הוֹדַעְתִּיךָ
  english_pob_choice: I have made known to you
  chosen_spanish: te lo he dado a conocer
  alternatives_spanish:
  - te lo he hecho saber
  - te he dado a conocer
  lexicon: HALOT
  rationale: El hiphil de ידע expresa «hacer conocer». El objeto está implícito en el hebreo y, siguiendo la lectura auditada en inglés, se introduce «lo» para reflejar ese referente contextual sin añadir contenido nuevo.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: Adverbio temporal directo; «hoy» es claro y fiel.
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: sí
  alternatives_spanish:
  - incluso
  - aun
  lexicon: HALOT
  rationale: Aquí el partícula enfática puede reforzarse en español con una marca discursiva breve. «Sí» busca reproducir el énfasis del hebreo y del inglés auditado («even to you») sin sonar forzado.
- source_word: אָתָּה
  english_pob_choice: to you / even you
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - a ti
  - aun a ti
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis personal. «A ti mismo» intenta conservar esa intensificación («tú mismo/precisamente tú») de forma idiomática en español; el contexto ya expresa la segunda persona con el dativo clítico.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se sigue la norma terminológica del proyecto para el Tetragrámaton. En este versículo no hay necesidad de enmascarar el nombre divino, y «Yahvé» mantiene la referencia explícita al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Objeto implícito de הוֹדַעְתִּיךָ
  english_pob_reading: I have made known to you today, even to you
  chosen_spanish_reading: te lo he dado a conocer hoy, sí, a ti mismo
  alternative_spanish_readings:
  - te he dado a conocer hoy, aun a ti
  - te lo he hecho saber hoy, incluso a ti
  rationale: El hebreo no expresa explícitamente el objeto de «hacer conocer»; el contexto lo suple. En español, se marca ese objeto implícito con «lo», siguiendo la lógica auditada del inglés y evitando una traducción incompleta o demasiado elíptica.
  doctrine_reference: 'DOCTRINE.md: Source-complete rendering; implied objects may be supplied when demanded by Spanish grammar and context'
translation_notes:
  revision_awareness: La auditoría inglesa reciente retiró el objeto explícito «them» porque no aparece en el hebreo; esta versión española mantiene la misma cautela al no inventar un referente plural y, a la vez, introduce solo el objeto implícito mínimo exigido por la sintaxis española con «lo». También preserva el énfasis final del hebreo con una construcción idiomática.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - Se conserva el valor causativo de הוֹדַעְתִּיךָ con una perífrasis natural en español.
  - La partícula enfática final se refleja con una expresión que mantiene la redundancia/intensificación del hebreo sin sobreexplicar.
