translation:
  language: es
  text: Ciertamente, no habías oído; ciertamente, no habías sabido; ciertamente, desde tiempo antiguo no se había abierto tu oído. Porque yo sabía que sin duda procederías con traición, y que desde el vientre[a] serías llamado transgresor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde el nacimiento'. El hebreo dice literalmente 'desde el vientre', un modismo para la etapa más temprana de la vida.
    reason: lexical_alternative
  - marker: b
    text: O 'rebelde'. El término hebreo denota a quien se rebela o quebranta la fidelidad debida.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: indeed
  chosen_spanish: ciertamente
  alternatives_spanish:
  - en verdad
  - sí
  lexicon: HALOT
  rationale: La repetición triple exige un intensificador en español que conserve el tono enfático sin sonar mecánico. 'Ciertamente' reproduce bien la acumulación retórica de גַּם.
- source_word: שָׁמַעְתָּ
  english_pob_choice: you had not heard
  chosen_spanish: no habías oído
  alternatives_spanish:
  - no oíste
  - no has oído
  lexicon: HALOT
  rationale: El contexto profético retrospectivo favorece el pluscuamperfecto, que refleja una falta anterior de recepción auditiva.
- source_word: יָדַעְתָּ
  english_pob_choice: you had not known
  chosen_spanish: no habías conocido
  alternatives_spanish:
  - no sabías
  - no has conocido
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'oído' y el valor cognitivo de ידע. 'Conocido' conserva el matiz de conocimiento previo en un tiempo retrospectivo.
- source_word: מֵאָז
  english_pob_choice: from of old
  chosen_spanish: desde tiempo antiguo
  alternatives_spanish:
  - desde antiguo
  - desde entonces
  - desde hace mucho
  lexicon: HALOT
  rationale: '''Desde tiempo antiguo'' expresa la profundidad temporal de מֵאָז con un registro natural en español y sin reducirlo a un punto temporal simple.'
- source_word: פִתְּחָה אָזְנֶךָ
  english_pob_choice: your ear had not been opened
  chosen_spanish: no se había abierto tu oído
  alternatives_spanish:
  - tu oído no había sido abierto
  - tu oído no se abrió
  lexicon: HALOT
  rationale: El hebreo usa un verbo en femenino singular con 'oído' como sujeto. En español, la pasiva refleja suena natural y conserva la imagen de inaccesibilidad/receptividad no concedida.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de las afirmaciones previas y en español la causal 'porque' comunica esa explicación con claridad.
- source_word: יָדַעְתִּי
  english_pob_choice: I knew
  chosen_spanish: yo sabía
  alternatives_spanish:
  - yo conocía
  - yo he sabido
  lexicon: HALOT
  rationale: El imperfecto español expresa aquí conocimiento previo y continuo del hablante divino; 'sabía' es más idiomático que un pretérito puntual.
- source_word: בָּגוֹד תִּבְגּוֹד
  english_pob_choice: you would surely deal treacherously
  chosen_spanish: sin duda procederías con traición
  alternatives_spanish:
  - traicionarías con toda seguridad
  - sin duda actuarías con traición
  - sin duda serías infiel
  lexicon: HALOT
  rationale: La intensificación hebrea se conserva con una expresión adverbial fuerte. 'Proceder con traición' mantiene el campo semántico de בגד sin perder naturalidad en español.
- source_word: וּפֹשֵׁעַ
  english_pob_choice: a transgressor
  chosen_spanish: transgresor
  alternatives_spanish:
  - rebelde
  - transgresor que se rebela
  - violador del pacto
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más formal ('transgressor') para פֹשֵׁעַ. 'Transgresor' evita estrechar el sentido solo a rebeldía personal y conserva la infracción/falta de lealtad.
- source_word: מִבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde el seno
  - desde el nacimiento
  lexicon: HALOT
  rationale: '''Vientre'' es la traducción más directa y mantiene la fuerza idiomática. En español bíblico puede sonar corporal; por eso se evita suavizarlo a ''nacimiento'' en el texto principal.'
- source_word: קֹרָא לָךְ
  english_pob_choice: you would be called
  chosen_spanish: serías llamado
  alternatives_spanish:
  - te llamarían
  - serías designado
  lexicon: HALOT
  rationale: La pasiva española conserva el valor de designación nominal sin añadir un sujeto explícito que el hebreo no da.
theological_decisions:
- issue: Si 'desde el vientre' debe entenderse como culpa prenatal literal o caracterización idiomática temprana
  english_pob_reading: Idiomatic characterization of Israel/Jacob as rebellious from earliest existence
  chosen_spanish_reading: Caracterización idiomática de Israel/Jacob como transgresor desde el comienzo de su existencia
  alternative_spanish_readings:
  - culpa literal desde el vientre
  - pecado prenatal literal
  rationale: La traducción conserva la imagen fuerte 'desde el vientre' pero no la convierte en una afirmación doctrinal sobre culpa prenatal. El contexto profético habla de Israel corporativamente y de su conocida tendencia a la infidelidad.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa revisó 'from long ago' por 'from of old' y 'a rebel' por 'a transgressor'; la redacción española sigue esas decisiones al elegir 'desde tiempo antiguo' y 'transgresor', manteniendo el registro formal y la fuerza léxica del hebreo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo triple con 'ciertamente' para גַּם.
  - Se conserva el pluscuamperfecto para los dos primeros verbos, en armonía con el contexto retrospectivo del verso.
  - '''Oído'' se usa para אָזְנֶךָ, respetando la imagen hebrea sin normalizarla a una abstracción.'
  - '''Desde el vientre'' se mantiene literal en el texto principal para preservar la tensión idiomática documentada por la POB inglesa.'
  - '''Transgresor'' sigue la revisión inglesa y evita sustituirla por un término más devocional como ''rebelde''.'
