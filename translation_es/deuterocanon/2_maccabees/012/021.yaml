  to: Pero cuando Timoteo supo del avance de Judas, envió por delante a las mujeres y el resto del bagaje al lugar llamado Carnión, pues el lugar era difícil de sitiar y difícil de alcanzar, a causa de la estrechez de todos los parajes[a].
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la precisión: «al lugar llamado Carnión» refleja mejor el artículo definido del griego; «difícil de alcanzar» expresa con buen español el sentido de δυσπρόσιτον; y la nota se pulió levemente sin alterar su contenido. Se mantuvo «bagaje» por su matiz de impedimenta, aunque «equipaje» también sería posible.'
