base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/012/005.yaml
  text: Also they are afraid of heights[a], and terrors are on the road; the almond tree blossoms, the grasshopper drags itself along, and the caper berry fails, because man is going to his eternal house[c][b], and the mourners go about in the street.
  footnotes:
  - marker: a
    text: Or 'the grasshopper becomes a burden.' The Hebrew expression is difficult, and the image may emphasize either feeble movement or the slightest thing becoming burdensome in old age.
    reason: lexical_alternative
  - marker: b
    text: Or 'desire fails.' The Hebrew literally refers to 'the caper berry,' likely an image connected with appetite or stimulation.
    reason: lexical_alternative
  - marker: c
    text: '''Mourners'' may include professional mourners who publicly lamented the dead.'
    reason: cultural_note
