base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/029.yaml
  text: And these camped opposite those for seven days[a]. Then on the seventh day the battle drew near[c][b], and the sons of Israel struck down Aram—one hundred thousand foot soldiers in one day.
