    reason: lexical_alternative
  - marker: b
    text: O «a la que subiste allí». El hebreo dice literalmente «la cama a la que subiste allí»; la redacción conserva el contraste entre «subir» y «descender».
    reason: lexical_alternative
  revision_rationale: Se elimina el calco poco idiomático «allí» del texto principal para lograr un español natural sin perder el contraste semántico entre עלה y ירד. La nota b preserva la alternativa más literal con «allí» y explica la formulación hebrea, en línea con el rastro de auditoría inglés.
