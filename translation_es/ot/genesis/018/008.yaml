translation:
  language: es
  text: Entonces tomó cuajada[a] y leche, y el becerro que había preparado, y lo puso delante de ellos[b]. Él estaba de pie junto a ellos debajo del árbol mientras comían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuajada» traduce aquí un producto lácteo espeso; el hebreo puede referirse también a mantequilla, crema o un preparado similar, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de pie sobre ellos». Aquí la expresión probablemente significa que estaba cerca de ellos atendiéndolos como anfitrión.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶמְאָה
  english_pob_choice: curds
  chosen_spanish: cuajada
  alternatives_spanish:
  - mantequilla
  - nata
  - crema
  lexicon: HALOT
  rationale: El término hebreo designa un producto lácteo espeso; en este contexto pastoral, «cuajada» comunica mejor que «mantequilla» una textura y uso plausibles sin forzar el sentido moderno.
- source_word: חָלָב
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche fresca
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del sustantivo común, sin necesidad de especificación adicional.
- source_word: וּבֶן הַבָּקָר
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el novillo joven
  - el animal joven del ganado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «becerro» conserva la referencia a un bovino joven y suena natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had prepared
  chosen_spanish: que había preparado
  alternatives_spanish:
  - que había hecho
  - que había cocinado
  - que había dispuesto
  lexicon: HALOT
  rationale: En el contexto de comida servida a huéspedes, «preparado» expresa el valor de עשה sin reducirlo a una simple fabricación ni sonar excesivamente interpretativo.
- source_word: וַיִּתֵּן לִפְנֵיהֶם
  english_pob_choice: and set it before them
  chosen_spanish: y se lo puso delante
  alternatives_spanish:
  - y lo puso delante de ellos
  - y se lo sirvió
  - y lo colocó ante ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «puso delante de ellos»; en español, «se lo puso delante» conserva la imagen de la hospitalidad y evita una traducción demasiado abstracta.
- source_word: וְהוּא עֹמֵד עֲלֵיהֶם
  english_pob_choice: He stood by them
  chosen_spanish: Él se quedó de pie junto a ellos
  alternatives_spanish:
  - Él estaba de pie sobre ellos
  - Él se mantuvo junto a ellos
  - Él permanecía a su lado
  lexicon: HALOT
  rationale: Se conserva el matiz de la postura vigilante/servidora. «Junto a ellos» evita la posible impresión de superioridad que podría sugerir una traducción literal de «sobre ellos».
- source_word: תַּחַת הָעֵץ
  english_pob_choice: under the tree
  chosen_spanish: debajo del árbol
  alternatives_spanish:
  - bajo el árbol
  - bajo el árbol frondoso
  lexicon: HALOT
  rationale: Es una equivalencia directa, clara y idiomática en español.
- source_word: וַיֹּאכֵלוּ
  english_pob_choice: while they ate
  chosen_spanish: mientras comían
  alternatives_spanish:
  - y comieron
  - mientras ellos comían
  lexicon: HALOT
  rationale: La forma verbal hebrea se integra mejor en español como una cláusula temporal que mantiene la escena continua de hospitalidad.
theological_decisions:
- issue: Si la frase de servicio de Abraham debe elevarse o mantenerse en el plano narrativo ordinario
  english_pob_reading: Translate the verse in ordinary narrative terms without importing a christological or trinitarian interpretation.
  chosen_spanish_reading: Mantener la escena en términos narrativos ordinarios de hospitalidad y servicio.
  alternative_spanish_readings:
  - Redactar de modo más solemne para sugerir el carácter divino de los visitantes
  - Acentuar una lectura cristológica o trinitaria
  rationale: El verso describe la hospitalidad de Abraham; el texto hebreo no exige cargar la traducción con una conclusión teológica posterior. La versión española conserva la tensión narrativa sin añadirla.
  doctrine_reference: 'Principios de traducción POB: fidelidad al texto base y no importación de conclusiones doctrinales no explícitas en el pasaje.'
translation_notes:
  revision_awareness: 'Coincido con el estado de alta concordancia del auditor: no se requieren cambios sustanciales respecto del sentido base. La redacción española busca claridad natural sin perder las decisiones léxicas documentadas, especialmente en חֶמְאָה y en la locución עֹמֵד עֲלֵיהֶם.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «becerro» para וּבֶן הַבָּקָר por ser natural y suficientemente preciso en español bíblico.
  - La cláusula temporal «mientras comían» conserva la simultaneidad del hebreo frente a una simple coordinación.
  - Se evita «siervo» para el gesto de Abraham porque el contexto inmediato es de anfitrión atendiendo a sus huéspedes, no de esclavitud o servidumbre formal.
