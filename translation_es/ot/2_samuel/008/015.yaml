revisions:
- from: Así reinó David sobre todo Israel[a], y David administraba justicia y rectitud a todo su pueblo.
  to: David reinó sobre todo Israel[a], y David administraba justicia y rectitud a todo su pueblo.
  rationale: El borrador es básicamente fiel al hebreo y al POB inglés, pero requiere una reparación menor de estilo. Se eliminó «Así» para un español más natural sin alterar el sentido, y se corrigió la nota al pie para que la alternativa suene idiomática y editorialmente limpia en español. Se conservó «justicia y rectitud» porque mantiene la distinción léxica y teológica entre מִשְׁפָּט y צְדָקָה.
