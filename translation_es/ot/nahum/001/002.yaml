translation:
  language: es
  text: Yahvé es un Dios celoso[a] y vengador; Yahvé es vengador y lleno de ira[b]. Yahvé toma venganza de sus adversarios[c], y guarda ira para sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lleno de celo' para 'celoso'. El término hebreo denota celo de pacto y exclusividad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'dueño/poseedor de ira'.
    reason: lexical_alternative
  - marker: c
    text: O 'él reserva ira para sus enemigos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - dios
  lexicon: HALOT
  rationale: En este contexto אֵל funciona como predicativo/apposición que describe a Yahvé. 'Dios' es la forma natural y reverente en español; 'Dios poderoso' añadiría precisión que el hebreo aquí no explicita, y 'dios' sería inadecuado para el Dios de Israel.
- source_word: קַנּוֹא
  english_pob_choice: jealous
  chosen_spanish: celoso
  alternatives_spanish:
  - zeloso
  lexicon: HALOT
  rationale: El adjetivo expresa celo exclusivo en contexto de pacto. En español, 'celoso' conserva esa fuerza bíblico-teológica; 'zeloso' es posible pero menos natural y puede sonar más abstracto.
- source_word: נֹקֵם / וְנֹקֵם
  english_pob_choice: avenging / takes vengeance
  chosen_spanish: vengador / toma venganza
  alternatives_spanish:
  - vengativo
  - es un vengador
  - ejecuta venganza
  lexicon: HALOT
  rationale: Se conserva la repetición del participio con fuerza verbal. 'Vengador' y 'toma venganza' comunican la acción continua o característica sin suavizarla; 'vengativo' suena más psicológico y puede cargar un matiz interpretativo no exigido por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de transliterar el nombre divino, no reemplazarlo por un título. 'Yahvé' es la forma española estable y legible para el Tetragrámaton.
- source_word: וּבַעַל חֵמָה
  english_pob_choice: full of wrath
  chosen_spanish: lleno de ira
  alternatives_spanish:
  - dueño de la ira
  - poseedor de la ira
  lexicon: HALOT
  rationale: Aunque בעל significa literalmente 'dueño/señor/poseedor', en esta construcción idiomática expresa una cualidad posesiva. 'Lleno de ira' comunica el sentido en español sin forzar una literalidad extraña; se conserva la tensión del hebreo en nota.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - furia
  lexicon: HALOT
  rationale: En el marco profético de juicio, 'ira' es el equivalente más natural y solemne en español. 'Furor' o 'furia' pueden sonar más intensos, pero también más coloquiales o menos precisos.
- source_word: לְצָרָיו
  english_pob_choice: on his adversaries
  chosen_spanish: de sus adversarios
  alternatives_spanish:
  - contra sus adversarios
  - sobre sus adversarios
  lexicon: HALOT
  rationale: Con נֹקֵם el complemento marca el objeto de la venganza. En español, 'de sus adversarios' mantiene bien el régimen verbal 'tomar venganza de' y preserva el matiz relacional/hostil.
- source_word: וְנוֹטֵר
  english_pob_choice: he keeps wrath
  chosen_spanish: guarda ira
  alternatives_spanish:
  - reserva ira
  - retiene ira
  - guarda rencor
  lexicon: HALOT
  rationale: El verbo נטר puede implicar guardar, retener o mantener. 'Guarda ira' reproduce el valor de conservarla en reserva y suena natural en español; 'guarda rencor' sería demasiado psicológico y coloquial.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El pronombre explícito aporta énfasis en hebreo. En español se puede mantener explícitamente o por concordancia; aquí se conserva con 'él' implícito en la sintaxis, sin necesidad de repetirlo de forma artificial.
- source_word: לְאֹיְבָיו
  english_pob_choice: for his enemies
  chosen_spanish: para sus enemigos
  alternatives_spanish:
  - contra sus enemigos
  - a sus enemigos
  lexicon: HALOT
  rationale: El verbo נטר sugiere guardar algo en reserva en relación con los enemigos. 'Para sus enemigos' mantiene la idea de destino o reserva; en español es más natural que forzar 'contra' si se quiere conservar ese matiz.
theological_decisions:
- issue: Jealousy/covenantal zeal of Yahvé
  english_pob_reading: The LORD is described as 'jealous' in the sense of covenantal exclusivity and righteous zeal.
  chosen_spanish_reading: Yahvé es 'celoso' en el sentido de un celo exclusivo y de pacto.
  alternative_spanish_readings:
  - Yahvé es 'zeloso'
  - Yahvé siente celos
  rationale: '''Celoso'' mantiene la categoría bíblica sin diluirla. ''Zeloso'' es menos común en español moderno, y ''siente celos'' puede psicologizar indebidamente la afirmación.'
  doctrine_reference: Ex 34:14; Dt 4:24
- issue: Divine vengeance and wrath
  english_pob_reading: Retain strong judgment language without softening or psychologizing it.
  chosen_spanish_reading: Conservar el lenguaje fuerte de venganza e ira judicial.
  alternative_spanish_readings:
  - castiga
  - está enojado
  rationale: El hebreo repite נקם y usa חֵמָה, por lo que el verso debe conservar la dureza judicial de la afirmación. 'Castiga' o 'está enojado' reducirían la fuerza semántica del texto.
  doctrine_reference: Dt 32:35; Rom 12:19
- issue: Literally 'master/possessor of wrath'
  english_pob_reading: Literally 'master/possessor of wrath.'
  chosen_spanish_reading: '''Lleno de ira'' como equivalente idiomático, con nota sobre el literal hebreo.'
  alternative_spanish_readings:
  - dueño de ira
  - poseedor de ira
  rationale: El español literal resulta torpe y menos claro; sin embargo, la nota preserva la tensión del hebreo בעל חֵמָה para no ocultar el rasgo idiomático.
  doctrine_reference: HALOT בעל
translation_notes:
  revision_awareness: 'Coincido con el control de revisión más reciente: no se requieren cambios respecto al sentido auditado. La traducción mantiene la repetición de נקם, la fuerza de חֵמָה y la nota lexical sobre בעל חֵמָה, sin suavizar el juicio divino.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa 'celoso' para קַנּוֹא por su valor de celo de pacto.
  - Se conserva la repetición de 'vengador' / 'toma venganza' para reflejar la estructura hebrea.
  - '''Ira'' se usa como equivalente estable de חֵמָה en este contexto profético.'
  - La nota sobre בעל חֵמָה preserva la tensión literal sin volver la línea inelegante en español.
