translation:
  language: es
  text: Y yo mismo también[a] he levantado[b] tus faldas sobre tu rostro[c], y se ha visto tu vergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y yo mismo he levantado también». El hebreo abre con una conjunción más partícula aditiva, que puede reflejarse con distinta colocación en español sin cambiar el énfasis básico.'
    reason: previous_rendering
  - marker: b
    text: 'O: «he descubierto». El verbo hebreo significa «descubrir/exponer»; «he levantado» reproduce de modo idiomático la imagen de la ropa alzada.'
    reason: lexical_alternative
  - marker: c
    text: La imagen es la de una humillación pública por exposición forzada, una metáfora profética de la deshonra bajo juicio.
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: So ... also
  chosen_spanish: Así que ... también
  alternatives_spanish:
  - Y también
  - Incluso
  lexicon: HALOT
  rationale: La combinación de la conjunción con el aditivo intensifica y continúa el anuncio de juicio. «Así que ... también» conserva la continuidad lógica y el énfasis sin sonar forzado en español.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  lexicon: HALOT
  rationale: El pronombre explícito es enfático; «yo mismo» preserva que Yahvé actúa personalmente en el juicio.
- source_word: חָשַׂפְתִּי
  english_pob_choice: have lifted up
  chosen_spanish: he levantado
  alternatives_spanish:
  - he descubierto
  - he destapado
  lexicon: HALOT
  rationale: El verbo significa descubrir/exponer. En español, «levantar» las faldas reproduce con naturalidad la imagen corporal de exposición forzada que el inglés POB también quiso mantener.
- source_word: שׁוּלַיִךְ
  english_pob_choice: your skirts
  chosen_spanish: tus faldas
  alternatives_spanish:
  - tu falda
  - el borde de tu vestido
  lexicon: HALOT
  rationale: El término designa los bordes inferiores del vestido; «faldas» comunica la imagen vestimentaria y la humillación pública de modo claro para el lector hispanohablante.
- source_word: עַל פָּנָיִךְ
  english_pob_choice: over your face
  chosen_spanish: sobre tu rostro
  alternatives_spanish:
  - sobre tu cara
  - delante de tu rostro
  lexicon: HALOT
  rationale: «Sobre tu rostro» conserva la preposición espacial y la imagen vívida de la vestidura alzada hasta cubrir/exponer el rostro.
- source_word: וְנִרְאָה
  english_pob_choice: has been seen
  chosen_spanish: se ha visto
  alternatives_spanish:
  - ha sido visto
  - ha quedado visible
  lexicon: HALOT
  rationale: 'El nifal expresa pasividad/resultativo: la vergüenza queda manifiesta. «Se ha visto» es natural y preserva el estado de visibilidad alcanzado.'
- source_word: קְלוֹנֵךְ
  english_pob_choice: your shame
  chosen_spanish: tu vergüenza
  alternatives_spanish:
  - tu deshonra
  - tu oprobio
  lexicon: HALOT
  rationale: El sustantivo denota vergüenza/deshonra pública. «Vergüenza» es breve y fiel; mantiene el peso social y moral de la exposición judicial.
theological_decisions:
- issue: Imagen de humillación pública mediante exposición forzada
  english_pob_reading: Retain the concrete image of lifted skirts and visible shame as a metaphor of humiliating judgment
  chosen_spanish_reading: Mantener la imagen concreta de faldas alzadas y vergüenza visible como metáfora de juicio humillante
  alternative_spanish_readings:
  - Suavizar la imagen a una simple deshonra
  - Expresar solo la idea de humillación sin la metáfora corporal
  rationale: El hebreo usa una imagen corporal y vestimentaria muy fuerte para describir la humillación de Jerusalén. Suavizarla borraría el filo profético y se apartaría de la evidencia textual.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo masorético y el audit trail inglés: conserva el énfasis de וְגַם + אֲנִי, mantiene la metáfora concreta de exposición con lenguaje natural en español, y no introduce suavizaciones interpretativas ajenas al texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en esta serie, aunque aquí el versículo no lo explicite.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Vergüenza» se prefiere aquí por su concisión y por conservar la dimensión pública de la deshonra.
  - La puntuación separa claramente las dos proposiciones coordinadas para reflejar el paralelismo del hebreo.
