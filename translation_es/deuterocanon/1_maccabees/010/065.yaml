translation:
  language: es
  text: Y el rey lo honró, y lo inscribió entre los primeros amigos[a], y lo nombró general y gobernador de un distrito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo registró entre los amigos principales». La expresión griega probablemente refleja un rango oficial de la corte.'
    reason: lexical_alternative
  - marker: b
    text: El término griego traducido «gobernador de un distrito» se refiere a un gobernante administrativo sobre una división territorial.
    reason: cultural_note
lexical_decisions:
- source_word: ἐδόξασεν
  english_pob_choice: honored
  chosen_spanish: lo honró
  alternatives_spanish:
  - lo glorificó
  - le concedió honor
  lexicon: LSJ
  rationale: En este contexto cortesano y político, δοξάζω expresa conferir honra o distinción, no ‘glorificar’ en sentido religioso. ‘Lo honró’ conserva la naturalidad del español y el matiz de elevación social del original.
- source_word: ἔγραψεν αὐτὸν τῶν πρώτων φίλων
  english_pob_choice: enrolled him among the first friends
  chosen_spanish: lo inscribió entre los primeros amigos
  alternatives_spanish:
  - lo registró entre los primeros amigos
  - lo anotó entre los amigos principales
  lexicon: LSJ
  rationale: 'γράφω aquí tiene sentido administrativo: inscribir en una lista o rango oficial. ‘Inscribió’ reproduce esa acción formal, y ‘entre los primeros amigos’ mantiene la expresión técnica del título sin diluirla.'
- source_word: τῶν πρώτων φίλων
  english_pob_choice: the first friends
  chosen_spanish: los primeros amigos
  alternatives_spanish:
  - los amigos principales
  - los amigos principales de la corte
  lexicon: LSJ
  rationale: La expresión parece un rango cortesano establecido. Se conserva la forma literal ‘primeros amigos’ para no borrar el posible carácter técnico del título, aunque en español suene algo inusual.
- source_word: στρατηγόν
  english_pob_choice: general
  chosen_spanish: general
  alternatives_spanish:
  - comandante
  - jefe militar
  lexicon: LSJ
  rationale: El sentido militar es primario y se distingue bien de la función administrativa que sigue. ‘General’ es claro y fiel al valor de cargo militar superior.
- source_word: μεριδάρχην
  english_pob_choice: governor of a district
  chosen_spanish: gobernador de un distrito
  alternatives_spanish:
  - gobernante de un distrito
  - gobernador provincial
  - meridarca
  lexicon: LSJ
  rationale: El término designa una autoridad sobre una división territorial. ‘Gobernador de un distrito’ comunica la función administrativa sin imponer una transliteración opaca ni una precisión histórica excesiva.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura griega de Swete y coincide con la solución del audit trail en inglés: honra cortesana, inscripción en un rango oficial, y doble nombramiento militar y administrativo. No se registran revisiones sustantivas en el pass más reciente; la traducción se mantiene estable conforme al alto acuerdo textual.'
  spanish_consistency_notes:
  - Se preserva la distinción entre honra cortesana y glorificación religiosa.
  - ‘Primeros amigos’ se mantiene como título potencialmente técnico, sin reemplazarlo por una formulación más interpretativa en el cuerpo principal.
  - ‘General’ y ‘gobernador de un distrito’ separan adecuadamente la función militar de la civil/administrativa.
  - Se usa ‘lo’ como objeto directo implícito coherente con el sujeto masculino singular del verso.
