revisions:
- from: Entonces llevaron sus ganados[a] a José, y José les dio pan por los caballos, los rebaños, los hatos y los asnos[b]; y los sostuvo con pan por todos sus ganados durante ese año.
  to: Entonces llevaron su ganado a José, y José les dio pan por los caballos, los rebaños, el ganado vacuno y los asnos; y los sostuvo con pan por todo su ganado[a] durante ese año.
  rationale: Se ajustó «ganados» a «ganado» para reflejar mejor el valor colectivo natural de מִקְנֶה en español. También se reemplazó «los hatos» por «el ganado vacuno» para mayor claridad panhispánica. Se eliminó la nota [b] porque la alternativa «por todo su ganado» ya coincide con el texto revisado y, por tanto, no aporta una variante real; además, la nota sobre וַיְנַהֲלֵם se reancló en la cláusula final, donde corresponde al verbo comentado.
