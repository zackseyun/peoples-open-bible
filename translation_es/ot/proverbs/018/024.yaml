translation:
  language: es
  text: El hombre de muchos compañeros puede llegar a la ruina[a], pero hay un amigo que permanece más cerca que un hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un hombre de muchos compañeros debe mostrarse amigable»; el verbo hebreo לְהִתְרֹעֵעַ es difícil y se ha entendido de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  - Alguien
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo. «El hombre» conserva ese valor genérico y mantiene la correspondencia con la elección inglesa de ‘man’.
- source_word: רֵעִים
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - amigos
  - asociados
  lexicon: HALOT
  rationale: «Compañeros» refleja el plural relacional sin adelantar todavía la idea positiva de amistad plena, y conserva el contraste con el singular de la segunda cola.
- source_word: לְהִתְרֹעֵעַ
  english_pob_choice: may come to ruin
  chosen_spanish: puede llegar a la ruina
  alternatives_spanish:
  - puede arruinarse
  - puede mostrarse amigable
  - llega a la ruina
  lexicon: HALOT
  rationale: El verbo es difícil y admite lecturas distintas. La POB inglesa tomó la lectura que sugiere deterioro/ruina en este contexto; «puede llegar a la ruina» preserva esa fuerza proverbial sin convertirla en una certeza absoluta.
- source_word: וְיֵשׁ
  english_pob_choice: but there is
  chosen_spanish: pero hay
  alternatives_spanish:
  - y hay
  - sin embargo, hay
  lexicon: HALOT
  rationale: La partícula introduce contraste entre la multitud de compañeros y la figura del amigo fiel. «Pero» expresa mejor esa oposición en español.
- source_word: אֹהֵב
  english_pob_choice: a friend
  chosen_spanish: un amigo
  alternatives_spanish:
  - uno que ama
  - un amante
  lexicon: HALOT
  rationale: En este proverbio sapiencial, el participio designa una relación de lealtad afectiva. «Un amigo» es la forma natural en español y conserva la relación personal sugerida por el hebreo.
- source_word: דָּבֵק
  english_pob_choice: sticks closer
  chosen_spanish: se apega
  alternatives_spanish:
  - se adhiere
  - se mantiene unido
  - se pega
  lexicon: HALOT
  rationale: El participio transmite adhesión estrecha y persistente. «Se apega» comunica cercanía relacional sin sonar demasiado mecánico, y preserva la imagen de unión fuerte.
- source_word: מֵאָח
  english_pob_choice: than a brother
  chosen_spanish: más que un hermano
  alternatives_spanish:
  - que un hermano
  - más que su hermano
  lexicon: HALOT
  rationale: La comparación expresa un grado de cercanía superior a la fraternidad. «Más que un hermano» es la formulación idiomática más clara en español y conserva el contraste comparativo.
translation_notes:
  revision_awareness: 'La versión española sigue el pasaje hebreo de forma directa y coincide con la lectura inglesa auditable: contraste entre muchos compañeros y un amigo verdaderamente leal. Se preserva la ambigüedad documentada del verbo לְהִתְרֹעֵעַ mediante nota alternativa, sin borrar la lectura de ruina adoptada por la POB inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «compañeros» para רֵעִים y «amigo» para אֹהֵב, conservando la distinción semántica del proverbio.
  - Se prefirió «se apega» para דָּבֵק por ser natural en español y mantener la imagen de adhesión cercana.
  - «Ruina» traduce el efecto posible del verbo difícil sin cerrar el debate exegético; la nota ofrece la alternativa tradicional.
  - Se usó «más que un hermano» para reproducir el valor comparativo de מֵאָח sin añadir explicaciones no presentes en el texto.
