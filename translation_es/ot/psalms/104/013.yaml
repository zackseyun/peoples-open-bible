translation:
  language: es
  text: Él riega las montañas desde sus aposentos superiores; la tierra queda saciada con el fruto de tus obras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el fruto de tus obras». La preposición hebrea puede expresar fuente o medio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁקֶה
  english_pob_choice: He waters
  chosen_spanish: Él riega
  alternatives_spanish:
  - Él da de beber
  - Él hace beber
  lexicon: HALOT
  rationale: El participio hifil funciona verbalmente con sujeto implícito en el contexto; en español, "riega" comunica de forma natural la acción causativa de proveer agua. "Dar de beber" sería más literal, pero menos idiomático aquí.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - los montes
  - las colinas
  lexicon: HALOT
  rationale: El sustantivo con artículo pide un plural definido. "Montañas" preserva el sentido habitual y el tono cósmico del salmo.
- source_word: מֵעֲלִיּוֹתָיו
  english_pob_choice: from his upper chambers
  chosen_spanish: desde sus aposentos altos
  alternatives_spanish:
  - desde sus cámaras altas
  - desde sus cuartos altos
  - desde sus habitaciones altas
  lexicon: HALOT
  rationale: עֲלִיּוֹת denota aposentos o cámaras superiores. "Aposentos altos" conserva la imagen arquitectónica del texto y sugiere la esfera celestial sin perder la metáfora de la casa cósmica.
- source_word: מִפְּרִי
  english_pob_choice: with the fruit of
  chosen_spanish: con el fruto de
  alternatives_spanish:
  - por el fruto de
  - desde el fruto de
  lexicon: HALOT
  rationale: La preposición מִן puede expresar fuente o medio. En español, "con el fruto de" reproduce bien el valor instrumental/mediador adoptado por la traducción inglesa revisada, sin cerrar la ambigüedad del hebreo.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tu obra
  lexicon: HALOT
  rationale: El plural constructo apunta a acciones/obras. "Obras" es fiel y natural en español, y en este contexto puede abarcar la actividad creadora de Dios.
- source_word: תִּשְׂבַּע
  english_pob_choice: is satisfied
  chosen_spanish: queda saciada
  alternatives_spanish:
  - está satisfecha
  - se sacia
  lexicon: HALOT
  rationale: El verbo qal 3fs concuerda con "la tierra". "Queda saciada" preserva el resultado de plenitud del hebreo y suena bien en español poético sin forzar el aspecto.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este salmo de creación, el referente global puede expresarse naturalmente como "la tierra" en español, manteniendo el alcance cósmico sin sonar abstracto.
theological_decisions:
- issue: Sujeto divino explícito en la primera cola
  english_pob_reading: He waters the mountains
  chosen_spanish_reading: Él riega las montañas
  alternative_spanish_readings:
  - regando las montañas
  - riega las montañas
  rationale: El participio hebreo no trae sujeto expreso, pero el contexto inmediato identifica a Dios. Hacerlo explícito mejora la legibilidad y no añade una afirmación nueva; simplemente desarrolla el sujeto implícito del hebreo.
  doctrine_reference: Principio de primacía del texto fuente y claridad lectora
- issue: Valor de מִן en מִפְּרִי מַעֲשֶׂיךָ
  english_pob_reading: with the fruit of your works
  chosen_spanish_reading: con el fruto de tus obras
  alternative_spanish_readings:
  - desde el fruto de tus obras
  - por el fruto de tus obras
  rationale: 'El hebreo permite entender la preposición como fuente o medio. La lectura española mantiene esa amplitud: "con" sugiere medio/provisión sin cerrar de manera indebida la relación semántica.'
  doctrine_reference: Principio de no eliminar tensiones léxicas documentadas
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente y el audit trail inglés. Se mantiene la imagen de los «aposentos altos» para מֵעֲלִיּוֹתָיו, y se conserva la tensión de מִן en מִפְּרִי con una nota alternativa. También se respeta el cambio de sujeto explícito en la primera cola, tal como en la traducción inglesa revisada.
  spanish_consistency_notes:
  - Se prefirió «la tierra» para הָאָרֶץ por el marco de salmo de creación.
  - Se evitó «SEÑOR» o «Cristo» porque el versículo no los requiere.
  - Se mantuvo el registro poético-digno con sintaxis española natural.
  - «Obras» y no «hechos» conserva mejor el campo semántico creativo del hebreo.
