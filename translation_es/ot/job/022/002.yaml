translation:
  language: es
  text: ¿Puede un hombre ser de provecho para Dios? Ciertamente, el que es sabio es de provecho para sí mismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Puede un hombre beneficiar a Dios? Ciertamente, el que tiene discernimiento se beneficia a sí mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְאֵל
  english_pob_choice: Can ... to God?
  chosen_spanish: ¿Puede ... para Dios?
  alternatives_spanish:
  - ¿Es posible que ... para Dios?
  - ¿Puede ... ser de provecho para Dios?
  lexicon: HALOT
  rationale: La construcción retórica pregunta si un ser humano puede resultar útil o ventajoso para Dios. En español, 'ser de provecho para Dios' conserva la relación indirecta con לְאֵל y mantiene el tono natural de la pregunta sin forzar un calco.
- source_word: יִסְכָּן
  english_pob_choice: be of use
  chosen_spanish: ser de provecho
  alternatives_spanish:
  - ser útil
  - beneficiar
  - aportar provecho
  lexicon: HALOT
  rationale: El verbo סכן aquí expresa utilidad o provecho. 'Ser de provecho' reproduce bien el valor de utilidad sin cargar la frase con un matiz comercial excesivo.
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - un varón
  lexicon: HALOT
  rationale: גבר es masculino singular y funciona de manera representativa para una persona humana. 'Un hombre' preserva esa forma y el paralelismo del hebreo.
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Pues
  - En verdad
  - Porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce la segunda cola con valor explicativo/enfático. 'Ciertamente' transmite bien ese refuerzo argumentativo en español sin volver mecánica la conexión.
- source_word: יִסְכֹּן
  english_pob_choice: is of use
  chosen_spanish: es de provecho
  alternatives_spanish:
  - es útil
  - le aprovecha
  - beneficia
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica que en la primera cola para conservar el paralelismo. 'Es de provecho' funciona con naturalidad en español y refleja la idea de beneficio.
- source_word: עָלֵימוֹ
  english_pob_choice: to himself
  chosen_spanish: para sí mismo
  alternatives_spanish:
  - para él mismo
  - en su propio beneficio
  lexicon: HALOT
  rationale: La expresión preposicional apunta idiomáticamente al beneficio que recae sobre la misma persona. 'Para sí mismo' es la forma más natural y fiel en español.
- source_word: מַשְׂכִּיל
  english_pob_choice: he who is wise
  chosen_spanish: el que es sabio
  alternatives_spanish:
  - el entendido
  - el que tiene discernimiento
  - el prudente
  lexicon: HALOT
  rationale: El participio sustantivado de שכל denota a quien tiene entendimiento o actúa con sabiduría. 'El que es sabio' conserva la forma participial y la claridad en español.
theological_decisions:
- issue: Si el versículo afirma o niega que el ser humano pueda aportar beneficio a Dios
  english_pob_reading: The verse is rendered as a rhetorical denial that a human can provide benefit to God; any benefit from wisdom accrues to the human himself.
  chosen_spanish_reading: La pregunta retórica niega que el hombre pueda ser de provecho para Dios; el provecho de la sabiduría recae en la propia persona.
  alternative_spanish_readings:
  - ¿Puede un hombre ser útil a Dios?; la segunda cola solo afirma el provecho personal sin enfatizar la negación.
  - ¿Puede un hombre beneficiar a Dios?; el sabio se beneficia a sí mismo.
  rationale: El hebreo contrapone a Dios con el beneficio que el humano puede recibir. La traducción conserva esa tensión teológica sin suavizarla ni expandirla más allá del versículo.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El inglés POB revisó 'the one who is wise' a 'he who is wise' para mayor formalidad y naturalidad. En español se optó por 'el que es sabio', que conserva la sustantivación participial y evita una paráfrasis innecesaria, manteniendo el paralelismo con la primera cola.
  spanish_consistency_notes:
  - Se usa 'Dios' porque el hebreo contiene אֵל y no un sustituto reverencial que requiera máscara; no hay aquí YHWH.
  - Se preserva la repetición semántica de סכן con 'ser/es de provecho' para reflejar el paralelismo.
  - '''Sabio'' traduce el participio מַשְׂכִּיל de forma comprensible y sobria, sin introducir una categoría más técnica que el texto no exige.'
