revisions:
- from: En aquel día el luto en Jerusalén se hará grande[a], como el luto de Hadad-rimón en la llanura de Meguido.
  to: En aquel día el duelo en Jerusalén aumentará[a], como el duelo de Hadad-rimón en la llanura de Meguido.
  rationale: Se revisa «luto» a «duelo» para reflejar mejor מִסְפֵּד como lamentación o duelo público, y «se hará grande» a «aumentará» para expresar de forma más idiomática el crecimiento/intensificación de יִגְדַּל. Se conserva la nota interpretativa sobre Hadad-rimón y la referencia topográfica a la llanura de Meguido.
