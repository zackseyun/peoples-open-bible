translation:
  language: es
  text: 'Escucha, Israel: hoy estás cruzando el Jordán para entrar y desposeer[a] naciones más grandes y más poderosas que tú, con ciudades grandes y fortificadas hasta los cielos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomar posesión de»; el verbo hebreo puede significar heredar o poseer, pero aquí, en un contexto de conquista, lleva el sentido de desposeer a los habitantes previos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a los cielos», una expresión hiperbólica para fortificaciones muy altas.
    reason: cultural_note
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: ¡Escucha[a]!
  alternatives_spanish:
  - Oye
  - Escucha
  lexicon: HALOT
  rationale: El imperativo singular se dirige a Israel como entidad corporativa. «Escucha» conserva el llamado pactal y suena natural en español bíblico moderno; se usa con signo de exclamación para reflejar la fuerza exhortativa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: עֹבֵר הַיּוֹם
  english_pob_choice: today you are crossing
  chosen_spanish: hoy estás cruzando
  alternatives_spanish:
  - hoy cruzas
  - estás cruzando hoy
  lexicon: HALOT
  rationale: El participio con «hoy» expresa acción inminente o en curso. «Estás cruzando» preserva ese valor aspectual de manera natural en español.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico usual; no es necesario añadir «río» para la claridad del contexto.
- source_word: לָבֹא
  english_pob_choice: to go in
  chosen_spanish: para entrar
  alternatives_spanish:
  - para ir a entrar
  - para ir dentro
  lexicon: HALOT
  rationale: En contexto de entrada a la tierra, «entrar» comunica bien la dirección del verbo sin agregar parafraseo.
- source_word: לָרֶשֶׁת
  english_pob_choice: to dispossess
  chosen_spanish: para desposeer
  alternatives_spanish:
  - para tomar posesión de
  - para heredar
  lexicon: HALOT
  rationale: La raíz puede significar poseer/heredar, pero en un contexto de conquista el matiz de quitar la posesión previa es importante. «Desposeer» conserva esa fuerza, como en la opción inglesa de la POB.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  lexicon: HALOT
  rationale: «Naciones» es el equivalente usual en Deuteronomio para grupos nacionales diferenciados.
- source_word: גְּדֹלִים וַעֲצֻמִים מִמֶּךָּ
  english_pob_choice: greater and mightier than you
  chosen_spanish: más grandes y más poderosas que tú
  alternatives_spanish:
  - más grandes y más fuertes que tú
  - mayores y más poderosas que tú
  lexicon: HALOT
  rationale: «Más grandes» refleja el comparativo de tamaño/alcance y «más poderosas» el de fuerza. Se evita una literalidad rígida que en español sonaría menos natural.
- source_word: עָרִים גְּדֹלֹת וּבְצֻרֹת
  english_pob_choice: with cities great and fortified
  chosen_spanish: con ciudades grandes y fortificadas
  alternatives_spanish:
  - con ciudades grandes y amuralladas
  - con ciudades grandes y fortificadas
  lexicon: HALOT
  rationale: El hebreo presenta una aposición explicativa; «con ciudades» hace visible la relación sintáctica. «Fortificadas» conserva el matiz defensivo sin desplazar el sentido hacia un detalle arquitectónico específico.
- source_word: בַּשָּׁמָיִם
  english_pob_choice: up to the heavens
  chosen_spanish: hasta los cielos
  alternatives_spanish:
  - hasta el cielo
  - a los cielos
  lexicon: HALOT
  rationale: Se conserva la hipérbole hebrea de altura extrema. El plural «los cielos» respeta mejor la forma del hebreo y mantiene el tono elevado de la imagen.
theological_decisions:
- issue: Hipérbole de fortificaciones «hasta los cielos»
  english_pob_reading: Rendered as a vivid idiom of great height/strength, without flattening it into mere paraphrase.
  chosen_spanish_reading: 'Se mantiene como hipérbole: «fortificadas hasta los cielos».'
  alternative_spanish_readings:
  - fortificadas hasta el cielo
  - fortificadas altísimas
  rationale: La expresión hebrea no requiere literalización plana ni reducción a una paráfrasis. Mantener la imagen preserva el carácter retórico del texto y su intensidad de conquista.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de לָרֶשֶׁת en contexto de conquista
  english_pob_reading: The Hebrew verb can mean inherit/possess, but here in a conquest context it carries the sense of dispossessing prior inhabitants.
  chosen_spanish_reading: «Desposeer» refleja que la posesión de estas naciones implica quitarles la tierra a sus ocupantes previos.
  alternative_spanish_readings:
  - tomar posesión de
  - heredar
  rationale: La tensión léxica entre poseer y desposeer debe quedar visible. En español, «desposeer» preserva esa fuerza y evita borrar el trasfondo de conquista que el contexto exige.
  doctrine_reference: HALOT; nota lexical de la POB
- issue: Forma imperativa de שְׁמַע
  english_pob_reading: Corporate covenantal summons preserved by 'Hear'.
  chosen_spanish_reading: La exhortación se conserva con «¡Escucha!» dirigida a Israel como colectivo.
  alternative_spanish_readings:
  - Oye, Israel
  - Escuchen, Israel
  rationale: Aunque el singular hebreo se dirige al pueblo como unidad, el español admite una forma singular exhortativa que transmite el llamado pactal sin cambiar el destinatario.
  doctrine_reference: Deuteronomio 6:4; fórmula de exhortación pactal
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para aclarar la relación appositiva con «with cities». La propuesta española reproduce esa relación con «con ciudades» para evitar una enumeración ambigua y mantener la lectura concordante con el texto hebreo. También se preserva la hipérbole final y la fuerza del imperativo inicial, conforme al último estado aprobado del inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se usa «el Jordán» como nombre geográfico sin añadir explicaciones innecesarias.
  - «Desposeer» se emplea por fuerza contextual de conquista; no se sustituye por «heredar» o «poseer» sin nota.
  - La hipérbole «hasta los cielos» conserva el plural del hebreo y evita suavizar el efecto retórico.
