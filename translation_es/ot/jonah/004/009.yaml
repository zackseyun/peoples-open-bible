  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios» para אֱלֹהִים es correcto; no aparece Yahvé ni otros términos sensibles del glosario. La decisión de usar «la planta» en vez de una especie específica está bien alineada con la rationale documentada. «Enojarse» comunica bien חרה en español moderno eclesial legible.'
