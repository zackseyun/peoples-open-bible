translation:
  language: es
  text: Y Salomón dio a Hiram veinte mil cores de trigo como alimento para su casa[a], y veinte cores de aceite batido[b]. Así Salomón solía darle a Hiram año tras año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'provisiones para su casa'. El hebreo probablemente se refiere al alimento suministrado para la casa real de Hiram.
    reason: lexical_alternative
  - marker: b
    text: '''Aceite batido'' se refiere a aceite de alta calidad obtenido de aceitunas machacadas o trituradas, no por un proceso posterior de prensado.'
    reason: cultural_note
lexical_decisions:
- source_word: נָתַן / יִתֵּן
  english_pob_choice: gave / would give
  chosen_spanish: dio / se lo daría
  alternatives_spanish:
  - dio / daba
  - dio / le daría
  - entregó / se lo daría
  lexicon: HALOT
  rationale: El hebreo combina un perfecto con un imperfecto para expresar un arreglo establecido y su repetición habitual. En español, 'dio' expresa el hecho puntual inicial, y 'se lo daría' mantiene el valor habitual/futuro relativo del imperfecto con 'año tras año'.
- source_word: כֹּר
  english_pob_choice: cors
  chosen_spanish: cor
  alternatives_spanish:
  - kor
  - medidas
  lexicon: HALOT
  rationale: '''Cor'' conserva la unidad antigua de medida sin diluirla en un genérico ''medidas''. Se mantiene la transliteración tradicional en castellano para una unidad técnica del texto.'
- source_word: חִטִּים
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: HALOT
  rationale: El término hebreo designa específicamente trigo, no grano en general. 'Trigo' es la equivalencia precisa y natural en español.
- source_word: מַכֹּלֶת לְבֵיתוֹ
  english_pob_choice: as food for his household
  chosen_spanish: como alimento para su casa
  alternatives_spanish:
  - como provisiones para su casa
  - como alimento para su casa real
  - para el sustento de su casa
  lexicon: HALOT
  rationale: מַכֹּלֶת apunta a comida/provisiones, y לְבֵיתוֹ a la casa o casa real de Hiram. 'Como alimento para su casa' preserva la idea de suministro sin añadir más de lo que el hebreo exige. 'Casa' deja abierta la referencia al hogar/corte/household, como en el audit trail inglés.
- source_word: שֶׁמֶן כָּתִית
  english_pob_choice: beaten oil
  chosen_spanish: aceite batido
  alternatives_spanish:
  - aceite machacado
  - aceite de aceitunas batidas
  - aceite fino
  lexicon: HALOT
  rationale: כָּתִית indica aceite obtenido por machacar o batir, no simplemente por prensar. 'Aceite batido' conserva el rasgo técnico y sigue de cerca la imagen del original. Aunque el contexto presupone aceite de oliva, el hebreo no lo expresa de forma explícita.
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - De este modo
  - Por tanto
  lexicon: HALOT
  rationale: כֹּה introduce el patrón o forma del arreglo. 'Así' enlaza de manera natural la cantidad puntual con la práctica repetida que sigue.
- source_word: שָׁנָה בְשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - de año en año
  - año por año
  lexicon: HALOT
  rationale: El hebreo expresa repetición regular anual. 'Año tras año' es idiomático en español y conserva la reiteración continua mejor que una simple mención de periodicidad.
theological_decisions:
- issue: 'Referencia de לְבֵיתוֹ: casa doméstica o casa real/corte de Hiram'
  english_pob_reading: The Hebrew likely refers to food supplied for Hiram's royal household.
  chosen_spanish_reading: El hebreo puede referirse al sustento de la casa de Hiram, entendida como su casa/corte real.
  alternative_spanish_readings:
  - su casa
  - su casa real
  - su corte
  rationale: El hebreo בית en este contexto puede abarcar hogar, casa dinástica o corte. La traducción principal mantiene la ambigüedad prudente con 'su casa', mientras la nota aclara la posibilidad de una referencia a la casa real, siguiendo el juicio del audit trail inglés sin cerrarlo de forma indebida.
  doctrine_reference: Semántica contextual de בית en el hebreo bíblico; precisión histórica y lexicográfica, no una doctrina en sentido estricto.
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura y el valor aspectual observados en el texto hebreo: una entrega inicial en pasado y una entrega habitual/regular expresada con un imperfecto y la fórmula ''año tras año''. No hubo revisiones previas en el paquete; esta redacción sigue de cerca la decisión inglesa auditada y conserva la posible referencia a la ''casa'' de Hiram sin imponer una especificación innecesaria en el texto principal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo tenga el nombre divino; aquí no aparece.
  - Se mantiene 'Hiram' y 'Salomón' como nombres propios estándar.
  - '''cor'' se conserva como unidad antigua de medida para coherencia con otros pasajes.'
  - '''aceite batido'' se emplea de forma uniforme para כָּתִית donde el contexto lo requiera.'
  - La construcción 'año tras año' preserva la repetición habitual del imperfecto hebreo.
