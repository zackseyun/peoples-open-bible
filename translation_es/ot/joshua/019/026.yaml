translation:
  language: es
  text: y Allammelec, Amad y Mishal; y llegó a Carmel[a] hacia el occidente, y a Shihor-libnat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'hacia el mar'; en contexto geográfico significa 'hacia el occidente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַֽלַמֶּ֥לֶךְ
  english_pob_choice: Allammelech
  chosen_spanish: Allammelec
  alternatives_spanish:
  - Alammelec
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera en lugar de traducirse. La forma con -c final refleja de cerca la terminación inglesa usada en el POB y mantiene legibilidad en español.
- source_word: עַמְעָ֖ד
  english_pob_choice: Amad
  chosen_spanish: Amad
  alternatives_spanish:
  - Am'amad
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración breve y clara, adecuada para una lista de fronteras.
- source_word: מִשְׁאָ֑ל
  english_pob_choice: Mishal
  chosen_spanish: Misal
  alternatives_spanish:
  - Mishal
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera de forma naturalizada al español, conservando el valor toponímico.
- source_word: וּ/פָגַ֤ע
  english_pob_choice: and it reached
  chosen_spanish: y llegó
  alternatives_spanish:
  - y tocó
  - y se encontró con
  lexicon: HALOT
  rationale: En descripciones de límites, פגע expresa llegar a un punto fronterizo. 'Llegó' comunica el sentido direccional sin forzar un literalismo poco natural en español.
- source_word: בְּ/כַרְמֶל֙
  english_pob_choice: to Carmel
  chosen_spanish: a Carmel
  alternatives_spanish:
  - hasta Carmel
  - en Carmel
  lexicon: HALOT
  rationale: Con el verbo de frontera, la preposición indica el punto alcanzado. 'A' mantiene el movimiento hacia el hito geográfico.
- source_word: הַ/יָּ֔מָּ/ה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el mar
  - al occidente
  - hacia el oeste
  lexicon: HALOT
  rationale: Hebreo literalmente 'hacia el mar', pero en contexto geográfico de Canaán señala dirección occidental. 'Hacia el occidente' preserva la equivalencia geográfica y el matiz del POB sin depender de una explicación en el texto principal.
- source_word: וּ/בְ/שִׁיח֖וֹר לִבְנָֽת
  english_pob_choice: and to Shihor-libnath
  chosen_spanish: y a Sihor-libnat
  alternatives_spanish:
  - y a Shihor-libnat
  - y hasta Sihor-libnat
  lexicon: HALOT
  rationale: Topónimo compuesto; se mantiene como nombre propio transliterado, con grafía española fluida y sin intentar descomponerlo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó la coma tras ''Carmel'' para que ''westward'' modifique naturalmente el avance hacia ese punto. En español se reproduce esa relación sin coma innecesaria: ''a Carmel hacia el occidente''.'
  spanish_consistency_notes:
  - Se mantiene el estilo de lista toponímica con transliteración consistente de nombres propios.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes; el versículo no contiene vocabulario divino.
  - '''Occidente'' se usa como equivalente bíblico/geográfico de ''westward'' para conservar la orientación territorial.'
