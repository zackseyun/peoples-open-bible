translation:
  language: es
  text: Entonces Aarón lo tomó[a], tal como Moisés había hablado, y corrió hacia el medio de la asamblea. Y he aquí, la plaga había comenzado entre el pueblo, así que puso el incienso[b] y hizo expiación por el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo tomó» sin objeto expreso; el hebreo simplemente dice «tomó», con el objeto implícito por el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: O «colocó el incienso»; el hebreo es literalmente «dio/puso el incienso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took it
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo tomó
  - lo recogió
  - lo llevó
  lexicon: HALOT
  rationale: El verbo básico es 'tomar'. En español conviene explicitar el objeto implícito con 'lo' para mantener la referencia al implemento ritual ya introducido en el contexto, sin añadir contenido nuevo.
- source_word: כַּאֲשֶׁר דִּבֶּר מֹשֶׁה
  english_pob_choice: just as Moses had spoken
  chosen_spanish: tal como Moisés había hablado
  alternatives_spanish:
  - como Moisés había dicho
  - según había hablado Moisés
  lexicon: HALOT
  rationale: דִּבֶּר expresa 'hablar/decir'. 'Había hablado' conserva la relación verbal del hebreo y su valor de anterioridad narrativa, sin convertirlo en 'mandó'.
- source_word: וַיָּרָץ אֶל תּוֹךְ הַקָּהָל
  english_pob_choice: ran into the midst of the assembly
  chosen_spanish: corrió en medio de la asamblea
  alternatives_spanish:
  - corrió al medio de la asamblea
  - corrió en medio de la congregación
  lexicon: HALOT
  rationale: רָץ es 'correr'. תּוֹךְ se expresa naturalmente como 'en medio'. קָהָל se rinde como 'asamblea' para evitar el matiz eclesial de 'congregación' en español, aunque ambas son posibles.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - y mira
  - y, he aquí
  lexicon: HALOT
  rationale: La fórmula introduce una escena súbita y vívida. 'Y he aquí' conserva esa fuerza discursiva en un español bíblico claro y todavía natural.
- source_word: הֵחֵל הַנֶּגֶף בָּעָם
  english_pob_choice: the plague had begun among the people
  chosen_spanish: la plaga había comenzado entre el pueblo
  alternatives_spanish:
  - la plaga había empezado entre el pueblo
  - el azote había comenzado entre el pueblo
  lexicon: HALOT
  rationale: נֶגֶף aquí nombra una plaga/judgmento divino; 'plaga' es la equivalencia más directa. El perfecto narrativo tras 'Y he aquí' se refleja bien con 'había comenzado'.
- source_word: וַיִּתֵּן אֶת הַקְּטֹרֶת
  english_pob_choice: he put the incense on
  chosen_spanish: puso el incienso
  alternatives_spanish:
  - lo puso
  - puso el incienso sobre el fuego
  lexicon: HALOT
  rationale: נתן literalmente es 'dar/poner'. En español, 'puso el incienso' mantiene la acción concreta sin sobreexplicar el altar o el fuego; el contexto ritual ya indica el acto de colocarlo.
- source_word: וַיְכַפֵּר עַל הָעָם
  english_pob_choice: made atonement for the people
  chosen_spanish: hizo expiación por el pueblo
  alternatives_spanish:
  - hizo atonación por el pueblo
  - hizo expiación a favor del pueblo
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal requiere una solución cultual. Se eligió 'hizo expiación' para conservar la fuerza ritual y la posibilidad de debate terminológico, mientras que 'hizo atonación' resulta menos idiomático en español.
theological_decisions:
- issue: Verbo cultual כפר
  english_pob_reading: made atonement for the people
  chosen_spanish_reading: hizo expiación por el pueblo
  alternative_spanish_readings:
  - hizo atonación por el pueblo
  - expiÓ por el pueblo
  rationale: El acto de Aarón interrumpe un juicio divino en curso y pertenece al lenguaje sacerdotal de mediación. 'Hizo expiación' conserva el peso ritual sin forzar una lectura doctrinal más específica que el texto no explicita.
  doctrine_reference: Translation philosophy §6; lenguaje cultual del Pentateuco
- issue: Campo semántico de קָהָל
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - reunión
  rationale: '''Asamblea'' comunica el grupo reunido de Israel sin cargar el texto con una asociación eclesiástica posterior. Mantiene la dimensión comunitaria y pública del episodio.'
  doctrine_reference: Translation philosophy §6
- issue: Tensión terminológica de la plaga
  english_pob_reading: the plague had begun among the people
  chosen_spanish_reading: la plaga había comenzado entre el pueblo
  alternative_spanish_readings:
  - la plaga había empezado entre el pueblo
  - el azote había comenzado entre el pueblo
  rationale: '''Plaga'' es la equivalencia directa para נֶגֶף en este contexto de juicio. ''Entre el pueblo'' respeta el alcance corporativo del castigo sin diluirlo.'
  doctrine_reference: Contexto narrativo-cultual de Números 17
translation_notes:
  revision_awareness: La edición inglesa más reciente ajustó solo la colocación de 'put the incense on' para mayor naturalidad, sin cambiar el sentido. La versión española sigue de cerca esa revisión, optando por 'puso el incienso' como formulación natural y suficientemente literal del נתן en contexto ritual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Asamblea'' se usa de forma consistente para קָהָל, evitando ''congregación'' salvo necesidad contextual.'
  - '''Expiación'' se conserva para el verbo cultual כפר, en línea con una estrategia de preservar la terminología sacerdotal.'
  - La puntuación y el uso de 'Y he aquí' buscan respetar el tono narrativo solemne del hebreo sin arcaizar en exceso.
