translation:
  language: es
  text: 'Los justos lo verán y temerán[a], y se reirán de él[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tendrán miedo»; el hebreo puede expresar temor en el sentido de pavor, aunque en este contexto también puede implicar temor reverente ante el juicio de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «se reirán sobre él» o «se burlarán de él». El verbo hebreo significa «reír», con un matiz de desprecio sugerido por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִרְאוּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán
  - mirarán
  lexicon: HALOT
  rationale: El verbo hebreo ראה mantiene su sentido básico de percepción visual; en español, «verán» conserva esa fuerza directa y el encadenamiento poético del versículo.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: HALOT
  rationale: El plural sustantivado describe a la clase moral de los fieles; «los justos» es la equivalencia natural en español y preserva el valor ético sin añadir matices ajenos.
- source_word: וְיִירָאוּ
  english_pob_choice: fear
  chosen_spanish: temerán
  alternatives_spanish:
  - temerán
  - tendrán temor
  lexicon: HALOT
  rationale: יִרא puede abarcar temor y reverencia. «Temerán» reproduce la tensión del contexto judicial sin convertirla en mera reverencia devocional ni en miedo trivial.
- source_word: וְעָלָיו
  english_pob_choice: at him
  chosen_spanish: de él
  alternatives_spanish:
  - de él
  - contra él
  lexicon: HALOT
  rationale: La construcción con על y שׂחק admite el sentido de burla dirigida a la persona. En español, «de él» permite la lectura de risa burlona sin forzar un giro menos natural.
- source_word: יִשְׂחָקוּ
  english_pob_choice: will laugh
  chosen_spanish: se reirán
  alternatives_spanish:
  - se reirán
  - se burlarán
  lexicon: HALOT
  rationale: El verbo base es «reír», pero el contexto implica desprecio. «Se reirán» conserva el valor léxico principal y deja que el contexto comunique la burla.
theological_decisions:
- issue: Temor de los justos ante el juicio
  english_pob_reading: fear
  chosen_spanish_reading: temerán
  alternative_spanish_readings:
  - tendrán temor
  - se llenarán de reverente temor
  rationale: Se preserva la tensión entre miedo y reverencia sin resolverla. En este salmo, los justos observan el juicio de Dios sobre el malvado, y el hebreo permite una reacción que incluye tanto temor como reconocimiento de la justicia divina.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica)
- issue: La risa dirigida al malvado juzgado
  english_pob_reading: will laugh at him
  chosen_spanish_reading: se reirán de él
  alternative_spanish_readings:
  - se burlarán de él
  - se reirán contra él
  rationale: La burla está implicada por el contexto, pero el texto hebreo conserva el verbo básico «reír». La traducción mantiene esa base y deja visible la dureza del juicio sin suavizarla.
  doctrine_reference: Lexical transparency / contextual scorn
