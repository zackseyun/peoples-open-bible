translation:
  language: es
  text: con cuánto cuidado juzgaste a tus hijos[a][b], a cuyos padres les diste juramentos y pactos con buenas promesas[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con qué gran cuidado» o «con qué rigor juzgaste a tus hijos».
    reason: lexical_alternative
  - marker: b
    text: El griego dice específicamente «hijos» en masculino plural; también podría traducirse más explícitamente «tus hijos varones».
    reason: lexical_alternative
  - marker: c
    text: O «juramentos y pactos que contenían buenas promesas».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πόσης ἀκριβείας
  english_pob_choice: with how much care
  chosen_spanish: con cuánto cuidado
  alternatives_spanish:
  - con qué gran cuidado
  - con cuánta exactitud
  - con qué rigor
  lexicon: LSJ
  rationale: ἀκριβείας expresa una atención minuciosa o estricta. En español, «con cuánto cuidado» conserva la idea de precisión cuidadosa sin sonar forzado; evita tanto una paráfrasis demasiado libre como un calco técnico.
- source_word: ἔκρινας
  english_pob_choice: you judged
  chosen_spanish: juzgaste
  alternatives_spanish:
  - fallaste
  - dictaste juicio
  - gobernaste
  lexicon: LSJ
  rationale: Aquí κρίνω tiene sentido judicial. «Juzgaste» preserva el acto de evaluar o pronunciar juicio sobre el pueblo, manteniendo el tono moral-jurídico del contexto.
- source_word: τοὺς υἱούς σου
  english_pob_choice: your sons
  chosen_spanish: tus hijos[a]
  alternatives_spanish:
  - tus hijos varones
  - tus hijos
  lexicon: LSJ
  rationale: El griego dice literalmente «tus hijos varones»/«tus hijos» en sentido masculino plural (υἱούς). En español, «hijos» puede mantener la referencia filial sin sonar marcadamente masculino en la recepción contemporánea; la nota conserva la precisión del original al indicar que el griego dice «sons».
- source_word: ὧν τοῖς πατράσιν
  english_pob_choice: to whose fathers
  chosen_spanish: a cuyos padres
  alternatives_spanish:
  - cuyos padres
  - a sus padres
  lexicon: LSJ
  rationale: La construcción relativa vincula a los hijos con sus antepasados. «A cuyos padres» refleja la dirección del dativo y mantiene clara la relación de pacto con la generación anterior.
- source_word: ὅρκους
  english_pob_choice: oaths
  chosen_spanish: juramentos
  alternatives_spanish:
  - votos
  - promesas juradas
  lexicon: LSJ
  rationale: «Juramentos» es el equivalente natural y formal de ὅρκους en un contexto solemne de alianza. Conserva la distinción respecto de συνθήκας sin debilitar el peso legal.
- source_word: συνθήκας
  english_pob_choice: covenants
  chosen_spanish: pactos
  alternatives_spanish:
  - alianzas
  - convenios
  lexicon: LSJ
  rationale: En contexto bíblico, συνθήκας expresa compromisos solemnes. «Pactos» comunica bien la dimensión relacional y vinculante en español, sin cargarlo con el registro técnico de «covenant» traducido mecánicamente.
- source_word: ἀγαθῶν ὑποσχέσεων
  english_pob_choice: with good promises
  chosen_spanish: con buenas promesas
  alternatives_spanish:
  - con promesas buenas
  - con promesas de bien
  - con promesas beneficiosas
  lexicon: LSJ
  rationale: La revisión inglesa favoreció «with good promises» para reflejar mejor la construcción griega. En español, «con buenas promesas» mantiene esa estructura compacta y natural, sin perder el carácter positivo de las promesas.
theological_decisions:
- issue: Lenguaje filial con valor de pacto
  english_pob_reading: your sons
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  - tus descendientes
  rationale: Aunque el griego es masculino plural, el español «hijos» puede funcionar como forma general de filiación sin perder la referencia textual. La nota a pie de página conserva la precisión de que el griego dice «sons», manteniendo auditable la decisión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Preservar la doble terminología de compromiso divino
  english_pob_reading: oaths and covenants
  chosen_spanish_reading: juramentos y pactos
  alternative_spanish_readings:
  - promesas y pactos
  - juramentos y alianzas
  rationale: El texto apila términos de pacto para subrayar la solemnidad del compromiso divino con los padres. «Juramentos y pactos» preserva esa dualidad sin fusionarla en una sola idea.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete 1909 y toma en cuenta el ajuste final del audit trail inglés: se prefirió una equivalencia natural para ἀκριβείας («con cuánto cuidado») y una relación más directa para ἀγαθῶν ὑποσχέσεων («con buenas promesas»). También se conserva la distinción entre ὅρκους y συνθήκας, y se mantiene la referencia filial masculina del original con una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Dios» de forma implícita en el sujeto de la cláusula, como en el contexto, sin añadir explicaciones no presentes en el versículo.
  - Se eligió «pactos» para συνθήκας por su naturalidad bíblica en español y para conservar la dualidad con «juramentos».
  - La puntuación con punto y coma reproduce el tono oracional del verso y deja visible la cláusula final dependiente.
  - Se evitó «SEÑOR» porque el texto griego aquí no contiene κύριος ni una sustitución del nombre divino.
