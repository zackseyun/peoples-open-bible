translation:
  language: es
  text: Y he aquí[a], Amarías, el sacerdote principal, está a cargo de ustedes en todo asunto de Yahvé, y Zebadías, hijo de Ismael, el príncipe de la casa de Judá, en todo asunto del rey; y los levitas servirán como oficiales delante de ustedes. Esfuércense y actúen, y que Yahvé esté con quien haga el bien[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren»; la partícula hebrea introduce atención enfática.
    reason: lexical_alternative
  - marker: b
    text: O «con el que hace el bien»; el hebreo puede entenderse de manera genérica («el bueno / los buenos») o individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y miren
  - Y ahora
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva de llamar la atención sobre la disposición que sigue. «He aquí» es formal pero natural en registro bíblico y reproduce mejor el énfasis que omitir la partícula.
- source_word: כֹהֵן הָרֹאשׁ
  english_pob_choice: the chief priest
  chosen_spanish: el sacerdote principal
  alternatives_spanish:
  - el sumo sacerdote
  - el sacerdote jefe
  lexicon: HALOT
  rationale: «Sacerdote principal» refleja literalmente la idea de «cabeza / principal» sin imponer de entrada el matiz técnico más cargado de «sumo sacerdote». Mantiene la posible tensión entre rango administrativo y oficio cultual.
- source_word: עֲלֵיכֶם
  english_pob_choice: is over you
  chosen_spanish: está sobre ustedes
  alternatives_spanish:
  - está al frente de ustedes
  - está encargado de ustedes
  lexicon: HALOT
  rationale: La construcción indica supervisión o autoridad sobre el grupo. «Está sobre ustedes» conserva la imagen relacional y la idea de jurisdicción.
- source_word: לְכֹל דְּבַר יְהוָה
  english_pob_choice: in every matter of Yahweh
  chosen_spanish: en todo asunto de Yahvé
  alternatives_spanish:
  - en cada asunto de Yahvé
  - para todo asunto de Yahvé
  lexicon: HALOT
  rationale: דָּבָר se entiende aquí como asunto/caso/causa. «Asunto» es natural en español y mantiene la amplitud del término sin restringirlo a un solo tipo de caso.
- source_word: הַנָּגִיד לְבֵית יְהוּדָה
  english_pob_choice: the ruler of the house of Judah
  chosen_spanish: el príncipe de la casa de Judá
  alternatives_spanish:
  - el gobernante de la casa de Judá
  - el dirigente de la casa de Judá
  lexicon: HALOT
  rationale: נָגִיד puede ser líder, príncipe o gobernante. «Príncipe» es una opción digna y bíblicamente idiomática en español para un cargo de autoridad sobre la casa de Judá, sin perder el matiz de estatus oficial.
- source_word: לְכֹל דְּבַר הַמֶּלֶךְ
  english_pob_choice: in every matter of the king
  chosen_spanish: en todo asunto del rey
  alternatives_spanish:
  - para todo asunto del rey
  - en cada asunto real
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «en todo asunto de Yahvé». La frase conserva la distinción entre la esfera divina y la real/administrativa.
- source_word: וְשֹׁטְרִים הַלְוִיִּם לִפְנֵיכֶם
  english_pob_choice: and the Levites will serve as officers before you
  chosen_spanish: y los levitas estarán como oficiales delante de ustedes
  alternatives_spanish:
  - y los levitas servirán como oficiales delante de ustedes
  - y los levitas serán oficiales ante ustedes
  lexicon: HALOT
  rationale: שֹׁטְרִים son funcionarios/oficiales administrativos. «Estarán como oficiales» refleja la cláusula nominal hebrea con un español natural y conserva «delante de ustedes» como señal de asistencia y servicio en su presencia.
- source_word: חִזְקוּ וַעֲשׂוּ
  english_pob_choice: Be strong and act
  chosen_spanish: Esfuércense y actúen
  alternatives_spanish:
  - Cobren ánimo y actúen
  - Sean fuertes y actúen
  lexicon: HALOT
  rationale: La exhortación combina fortaleza/coraje con ejecución obediente. «Esfuércense» transmite la idea de fortalecerse o tomar ánimo; «actúen» expresa el hacer efectivo lo encargado.
- source_word: וִיהִי יְהוָה עִם הַטּוֹב
  english_pob_choice: and may Yahweh be with the good
  chosen_spanish: y que Yahvé esté con el bueno
  alternatives_spanish:
  - y que Yahvé esté con quien es bueno
  - y que Yahvé esté con el que hace el bien
  lexicon: HALOT
  rationale: 'La lectura es jussiva: un deseo o bendición. «El bueno» mantiene la sustantivación posible de הַטּוֹב; en español queda algo abierto, como en el hebreo. Se conserva la tensión entre una persona buena y la categoría de «los buenos».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé», no una sustitución por mayúsculas ni una forma tradicional alternativa.'
theological_decisions:
- issue: Título de oficio en כֹהֵן הָרֹאשׁ
  english_pob_reading: the chief priest
  chosen_spanish_reading: el sacerdote principal
  alternative_spanish_readings:
  - el sumo sacerdote
  - el sacerdote jefe
  rationale: El hebreo dice literalmente «sacerdote principal/cabeza». En este contexto administrativo conviene no fijar sin más el título técnico de «sumo sacerdote»; «sacerdote principal» deja visible el matiz y evita borrar la posible distinción histórica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — office titles should preserve source-level ambiguity when the context is administrative rather than liturgical.'
- issue: Ambigüedad de הַטּוֹב
  english_pob_reading: the good
  chosen_spanish_reading: el bueno
  alternative_spanish_readings:
  - quien es bueno
  - el que hace el bien
  rationale: El hebreo puede funcionar de manera genérica o individual. «El bueno» conserva la ambigüedad sin resolverla prematuramente, mientras que las alternativas explicitan interpretaciones posibles. Esto mantiene la tensión textual documentada por la POB.
  doctrine_reference: 'DOCTRINE.md: Preserve meaningful ambiguities when the source permits more than one referent.'
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto conforme al estándar del proyecto, evitando el sustituto litúrgico. La fórmula final debe leerse como bendición/deseo, no como afirmación doctrinal distinta.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última forma inglesa revisada: nombres propios normalizados, estructura paralela de «en todo asunto de Yahvé / del rey», y cierre jussivo con «may Yahweh be with the good». Se decidió traducir «chief priest» de forma menos técnica que «sumo sacerdote» para no sobreinterpretar el cargo, y se mantuvo la ambigüedad de הַטּוֹב mediante «el bueno».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «casa de Judá» para בית יהודה, conservando la expresión de pertenencia dinástica.
  - «Oficiales» traduce שֹׁטְרִים con un término administrativo claro y no eclesiástico.
  - La sintaxis intenta preservar el paralelismo hebreo entre asunto de Yahvé / asunto del rey.
  - Las notas al pie sólo señalan alternativas realmente presentes en el texto fuente o en la tensión léxica documentada.
