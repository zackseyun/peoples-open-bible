    rationale: El borrador pone una nota en [a] y otra en [b], ambas sobre el mismo segmento semántico, pero ninguna preserva la alternativa principal documentada para ἀπώλετο. Esto desordena el sistema de notas y no refleja bien el audit trail.
  - severity: low
    issue: «Y le dijo a ella» es menos natural en español narrativo
    rationale: Aunque no es incorrecto, «Y ella le dijo» suena más idiomático y mantiene el mismo sentido sin calco innecesario del griego.
