translation:
  language: es
  text: 'Y cuando vio que el campamento era fuerte, oró y dijo: «Bendito eres tú, oh Salvador de Israel, que aplastaste el asalto del poderoso[a] por la mano de tu esclavo David, y entregaste el campamento de los extranjeros en manos de Jonatán, hijo de Saúl, y del que llevaba su armadura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La oración alude a la historia de David y Goliat, y a Jonatán con su escudero en batalla; el griego aquí dice «el poderoso» y «los extranjeros» en lugar de nombrarlos explícitamente.
    reason: cross_reference
lexical_decisions:
- source_word: παρεμβολή
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campo
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa un campamento o fuerza acampada. «Campamento» es natural en español y conserva el matiz militar sin volverlo más interpretativo de lo necesario.
- source_word: ἰσχυράν
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - formidable
  lexicon: LSJ
  rationale: El adjetivo describe la fuerza militar del campamento enemigo. «Fuerte» es directo y breve; mantiene el valor de resistencia o potencia sin exagerarlo.
- source_word: σωτήρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  lexicon: LSJ
  rationale: Es un título dirigido a Dios. «Salvador» conserva el peso teológico y la correspondencia léxica; se capitaliza en la invocación directa.
- source_word: συντρίψας
  english_pob_choice: crushed
  chosen_spanish: aplastaste
  alternatives_spanish:
  - destruiste
  - destrozaste
  lexicon: LSJ
  rationale: El participio expresa derrota violenta y decisiva. «Aplastaste» comunica con fuerza esa acción en español, con un tono bíblico natural.
- source_word: ὅρμημα
  english_pob_choice: assault
  chosen_spanish: asalto
  alternatives_spanish:
  - embate
  - ataque
  - irrupción
  lexicon: LSJ
  rationale: Ὅρμημα puede referirse a una acometida o ataque violento. «Asalto» preserva la idea de embestida militar sin añadir detalles no presentes.
- source_word: τοῦ δυνατοῦ
  english_pob_choice: the mighty one
  chosen_spanish: del poderoso
  alternatives_spanish:
  - del fuerte
  - del poderoso guerrero
  - del valiente
  lexicon: LSJ
  rationale: La expresión griega mantiene un singular sustantivado. «Del poderoso» conserva esa referencia personal general sin identificarlo explícitamente en el texto principal.
- source_word: ἐν χειρὶ
  english_pob_choice: by the hand of
  chosen_spanish: por la mano de
  alternatives_spanish:
  - por medio de
  - mediante
  lexicon: LSJ
  rationale: Es un modismo bíblico de agencia. «Por la mano de» preserva la textura escritural y la estructura del original.
- source_word: δούλου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: BDAG
  rationale: El proyecto pide conservar la fuerza de δοῦλος cuando el vínculo de pertenencia es saliente. «Esclavo» mantiene esa fuerza con transparencia; «siervo» suavizaría indebidamente el término.
- source_word: ἀλλοφύλων
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - filisteos
  lexicon: LSJ
  rationale: El griego dice literalmente «de otra raza/otro pueblo», no nombra aquí a los filisteos. «Extranjeros» se mantiene pegado al texto y deja la alusión histórica implícita.
- source_word: αἰρόντος τὰ σκεύη αὐτοῦ
  english_pob_choice: the one who carried his armor
  chosen_spanish: del que llevaba su armadura
  alternatives_spanish:
  - de su escudero
  - del que llevaba sus armas
  lexicon: LSJ
  rationale: La frase es participial y literalmente alude al que porta el equipo/armadura. «Del que llevaba su armadura» conserva la estructura y resulta claro en español.
theological_decisions:
- issue: Cómo traducir δοῦλος aplicado a David
  english_pob_reading: your slave David
  chosen_spanish_reading: tu esclavo David
  alternative_spanish_readings:
  - tu siervo David
  rationale: La lectura aprobada por el POB destaca el vínculo de pertenencia y subordinación. En esta oración a Dios, «esclavo» conserva esa fuerza mejor que «siervo», que en español puede sonar más edulcorado.
  doctrine_reference: 'DOCTRINE.md: términos discutidos para δοῦλος; filosofía de traducción §1'
- issue: Si explicitar la alusión a Goliat o a los filisteos en el texto principal
  english_pob_reading: retain the Greek's generic expressions in the main text
  chosen_spanish_reading: mantener las expresiones genéricas del griego
  alternative_spanish_readings:
  - el asalto de Goliat
  - el campamento de los filisteos
  rationale: Aunque la oración alude claramente a las tradiciones de David y Jonatán, el griego no nombra a Goliat ni a los filisteos en esta línea. La traducción conserva esa reserva y deja la identificación histórica implícita.
  doctrine_reference: 'DOCTRINE.md: filosofía de traducción §1 y §3'
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió a «slave» por política terminológica y ajustó «mighty one»; la presente redacción sigue esas decisiones auditadas al usar «esclavo» y conservar una referencia singular genérica («el poderoso») sin introducir nombres no presentes en el griego. También mantiene el tono directo de la oración y la fórmula de agencia «por la mano de».
  spanish_consistency_notes:
  - Se usó «Yahvé» en otras secciones solo cuando el hebreo lo exige; aquí el griego dice «Salvador de Israel», por lo que no se introduce el nombre divino.
  - «Esclavo» se reservó para δοῦλος; no se sustituyó por «siervo» pese a la tradición eclesial, conforme al criterio léxico del proyecto.
  - «Extranjeros» refleja ἀλλόφυλοι sin importar una identificación histórica al cuerpo principal del verso.
  - La puntuación y el tratamiento vocativo siguen un español bíblico moderno y publicable.
