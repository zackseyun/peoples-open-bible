base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/001/008.yaml
  text: And the third I would give to those to whom it was due[a], just as Deborah, my father's mother, commanded[c][b], because I was left an orphan by my father.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the third portion' or 'a third part'; the Greek leaves the noun implied from the context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'my father's mother.'
    reason: lexical_alternative
  - marker: c
    text: That is, effectively 'fatherless'; the Greek reads literally, 'I was left an orphan by my father,' referring to the loss of his father.
    reason: lexical_alternative
