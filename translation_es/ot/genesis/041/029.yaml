translation:
  language: es
  text: Mira[a], siete años de gran abundancia vienen en toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «He aquí, siete años vienen; gran abundancia en toda la tierra de Egipto» o «He aquí, siete años de gran abundancia vienen en toda la tierra de Egipto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  - Mira bien
  lexicon: HALOT
  rationale: El hebreo introduce la frase con fuerza deíctica y llamada de atención. «Mira» conserva esa inmediatez en español moderno y evita el tono más arcaico de «He aquí», sin perder la función exhortativa.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: seven years
  chosen_spanish: siete años
  alternatives_spanish:
  - siete años
  lexicon: HALOT
  rationale: Expresión temporal directa y transparente; no requiere ajuste idiomático en español.
- source_word: בָּאוֹת
  english_pob_choice: are coming
  chosen_spanish: vienen
  alternatives_spanish:
  - están viniendo
  - están por venir
  - vienen
  lexicon: HALOT
  rationale: El participio femenino plural expresa llegada inminente/futura concordando con «años». «Vienen» conserva esa vividez verbal en español y evita una paráfrasis excesiva.
- source_word: שָׂבָע
  english_pob_choice: abundance
  chosen_spanish: gran abundancia
  alternatives_spanish:
  - abundancia
  - plenitud
  - suficiencia
  lexicon: HALOT
  rationale: En este contexto narrativo-económico, el sustantivo apunta a provisión abundante, no solo al estado abstracto de saciedad. «Gran abundancia» reproduce bien el sentido y la intensificación del término.
- source_word: גָּד֖וֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - enorme
  - extraordinaria
  lexicon: HALOT
  rationale: El adjetivo intensifica la abundancia. En español, «gran» es natural antepuesto y preserva la fuerza evaluativa sin sonar pesado.
- source_word: בְּ/כָל אֶרֶץ מִצְרָיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra de Egipto
  - a través de toda la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición con «toda la tierra de Egipto» comunica extensión territorial. «Sobre toda la tierra de Egipto» refleja un alcance que cubre el país entero y mantiene un español fluido y solemne.
translation_notes:
  revision_awareness: El rastro inglés reciente muestra una corrección de redacción para evitar la secuencia poco natural «are coming of great abundance» y fijar la construcción «of great abundance are coming». La versión española sigue esa decisión semántica, pero adapta la estructura a un giro natural en español («siete años de gran abundancia vienen»), manteniendo el valor participial e inminente del hebreo.
  spanish_consistency_notes:
  - Se preserva «Egipto» como topónimo sin artículos añadidos ajenos al hebreo.
  - Se usa «tierra» para אֶרֶץ en coherencia con el registro bíblico y sin forzar «país».
  - La exclamación inicial refleja la fuerza de הִנֵּה sin introducir contenido nuevo.
  - La puntuación con coma tras la interjección es compatible con el tono exhortativo del hebreo.
