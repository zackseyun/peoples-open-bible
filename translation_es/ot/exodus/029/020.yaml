base_translation:
  language: en
  yaml_path: translation/ot/exodus/029/020.yaml
  text: Then you shall slaughter the ram[a], and take some of its blood and put it on the lobe of Aaron’s right ear, and on the lobe of the right ear of his sons, and on the thumb of their right hand, and on the big toe of their right foot[b]; and you shall throw the blood against the altar all around.
  footnotes:
  - marker: a
    text: Or 'tip of Aaron’s right ear ... tip of the right ear of his sons.' The Hebrew term may denote the ear’s extremity more generally, though 'lobe' is the most likely sense in this ritual context.
    reason: lexical_alternative
  - marker: b
    text: Or 'dash the blood against the altar all around.' The Hebrew verb suggests a forceful ritual application rather than a gentle sprinkling.
    reason: lexical_alternative
