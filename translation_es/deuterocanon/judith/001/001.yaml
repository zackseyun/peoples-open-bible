translation:
  language: es
  text: En el año decimosegundo del reinado de Nabucodonosor, que reinó sobre los asirios en Nínive, la gran ciudad, en los días de Arfaxad, que reinó sobre los medos en Ecbátana,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego termina con καί, dejando la oración abierta para continuar en el versículo siguiente; por eso la traducción conserva la coma final.
    reason: textual_variant
lexical_decisions:
- source_word: ἜΤΟΥΣ δωδεκάτου
  english_pob_choice: In the twelfth year
  chosen_spanish: En el año duodécimo
  alternatives_spanish:
  - En el año doce
  - En el duodécimo año
  lexicon: LSJ
  rationale: La fórmula dativa/genitiva de datación se expresa de manera natural en español con 'En el año duodécimo', conservando el orden temporal sin calco rígido.
- source_word: τῆς βασιλείας
  english_pob_choice: of the reign
  chosen_spanish: del reinado
  alternatives_spanish:
  - del reino
  - de la realeza
  lexicon: LSJ
  rationale: Aquí βασιλεία señala el período o ejercicio del gobierno real, no el territorio; 'reinado' reproduce mejor ese valor temporal.
- source_word: Ναβουχοδονοσόρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  lexicon: Transliteración estándar en español
  rationale: Se usa la forma establecida en español bíblico para esta figura, manteniendo la identificación del nombre griego con una forma inteligible y reconocible.
- source_word: ὃς ἐβασίλευσεν Ἀσσυρίων
  english_pob_choice: who reigned over the Assyrians
  chosen_spanish: que reinó sobre los asirios
  alternatives_spanish:
  - que fue rey de los asirios
  - que gobernó a los asirios
  lexicon: LSJ
  rationale: El genitivo plural se vierte naturalmente como el pueblo sobre el cual ejerció el reinado. 'Reinó sobre' mantiene la relación verbal de ἐβασίλευσεν.
- source_word: ἐν Νινευῇ
  english_pob_choice: in Nineveh
  chosen_spanish: en Nínive
  alternatives_spanish:
  - en Nínive
  lexicon: Topónimo español tradicional
  rationale: Se conserva el nombre geográfico en su forma española usual, con acento gráfico conforme a la ortografía del español.
- source_word: τῇ πόλει τῇ μεγάλῃ
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - aquella gran ciudad
  lexicon: LSJ
  rationale: La aposición epitética se traduce de forma directa y natural. 'Gran ciudad' preserva el tono solemne sin introducir explicación adicional.
- source_word: ἐν ταῖς ἡμέραις Ἀρφαξάδ
  english_pob_choice: in the days of Arphaxad
  chosen_spanish: en los días de Arfaxad
  alternatives_spanish:
  - durante el tiempo de Arfaxad
  lexicon: LSJ
  rationale: La expresión temporal fija se reproduce con la fórmula bíblica española 'en los días de', que mantiene el tono histórico-literario.
- source_word: Μήδων
  english_pob_choice: the Medes
  chosen_spanish: los medos
  alternatives_spanish:
  - Media
  - el pueblo medo
  lexicon: LSJ
  rationale: El genitivo plural designa al pueblo sobre el que reinó Arfaxad; 'los medos' es la correspondencia directa y clara en español.
- source_word: ἐν Ἐκβατάνοις
  english_pob_choice: in Ecbatana
  chosen_spanish: en Ecbátana
  alternatives_spanish:
  - en Ecbatana
  lexicon: Topónimo español tradicional
  rationale: Se adopta la forma hispana habitual del topónimo con acento para facilitar lectura y pronunciación sin alterar la referencia geográfica.
- source_word: καὶ
  english_pob_choice: ','
  chosen_spanish: ','
  alternatives_spanish:
  - y
  lexicon: Coordinación textual
  rationale: El griego termina con καί porque la frase continúa en el siguiente versículo. En español se conserva la coma final para señalar la continuación sin cerrar la oración.
theological_decisions:
- issue: Nombre divino no presente; continuidad sintáctica truncada por final de versículo
  english_pob_reading: The Greek text ends with 'and,' continuing directly into the next verse; the English uses a comma to reflect the unfinished sentence more naturally.
  chosen_spanish_reading: La frase queda abierta con coma final para indicar que continúa en el versículo siguiente.
  alternative_spanish_readings:
  - terminar con punto
  - añadir 'y' al final
  rationale: 'La decisión es textual y estilística: el griego no cierra la oración. La coma final en español preserva esa apertura sin añadir contenido ausente.'
  doctrine_reference: Crítica textual y puntuación de traducción
- issue: Designación de Nabucodonosor como rey de Asiria en Nínive
  english_pob_reading: who reigned over the Assyrians in Nineveh, the great city
  chosen_spanish_reading: que reinó sobre los asirios en Nínive, la gran ciudad
  alternative_spanish_readings:
  - que fue rey de los asirios en Nínive, la gran ciudad
  - que gobernó a los asirios en Nínive, la gran ciudad
  rationale: Se mantiene la afirmación del texto griego sin suavizarla ni armonizarla con otros datos históricos; la traducción refleja la forma en que este libro presenta la escena.
  doctrine_reference: Integridad textual y respeto al testimonio del libro de Judit
translation_notes:
  revision_awareness: 'Se revisó la redacción contra el griego de Swete y el aparato auditado en inglés. No se requirieron cambios sustantivos respecto del sentido base: se mantuvo la sintaxis abierta del versículo y se cuidó la equivalencia de los topónimos y la fórmula de datación.'
  spanish_consistency_notes:
  - Se usó 'reinado' para βασιλεία en sentido temporal, no 'reino'.
  - Se mantuvo 'los asirios' y 'los medos' como genitivos de pueblo, de acuerdo con el griego y el audit trail inglés.
  - 'Se prefirieron topónimos españoles tradicionales con acentuación: ''Nínive'' y ''Ecbátana''.'
  - La puntuación final con coma refleja fielmente la continuidad del texto hacia el versículo siguiente.
