translation:
  language: es
  text: Absalón hizo esto con todos los de Israel que venían al rey para juicio[a], y Absalón robó los corazones[b] de los hombres de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ser juzgados». El hebreo dice literalmente «para juicio», conservando el marco judicial de la escena.
    reason: lexical_alternative
  - marker: b
    text: O «se ganó los corazones de los hombres de Israel». El hebreo literalmente dice «robó el corazón», preservando la imagen de ganar lealtad por medios furtivos o manipuladores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - procedió
  lexicon: HALOT
  rationale: El hebreo עשה aquí retoma la conducta habitual de Absalón descrita en el contexto inmediato. «Hizo esto» conserva la referencia idiomática sin añadir interpretación.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - de esta manera
  - según esta práctica
  lexicon: HALOT
  rationale: La expresión hebrea equivale literalmente a «según esta cosa/materia». En español, «esto» es la forma más natural y breve para remitir al patrón ya establecido.
- source_word: לְכָל יִשְׂרָאֵל
  english_pob_choice: to all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - para todo Israel
  - con todo Israel
  lexicon: HALOT
  rationale: La preposición לְ con «todo Israel» se expresa con naturalidad como «a» en este contexto de acción dirigida hacia el pueblo.
- source_word: אֲשֶׁר יָבֹאוּ
  english_pob_choice: who came
  chosen_spanish: que venía
  alternatives_spanish:
  - que venían
  - que venían a venir
  lexicon: HALOT
  rationale: El imperfecto describe una acción acostumbrada en el relato pasado. «Venía» puede funcionar de modo distributivo en español, manteniendo el sentido repetido sin sonar rígido.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para sentencia
  - para resolución judicial
  - para ser juzgados
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí alude a una instancia o decisión judicial. «Juicio» preserva el campo legal con concisión; no se reemplaza por «justicia» porque el contexto es forense.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - hacia el rey
  lexicon: HALOT
  rationale: La llegada se dirige al rey como autoridad judicial. «Al rey» es la traducción directa y natural; «ante el rey» sería más interpretativa.
- source_word: וַיְגַנֵּב
  english_pob_choice: stole
  chosen_spanish: robaba
  alternatives_spanish:
  - robó
  - ganaba secretamente
  - atraía furtivamente
  lexicon: HALOT
  rationale: גנב conserva el valor metafórico de «robar» aplicado al corazón. El imperfecto narrativo favorece «robaba», que refleja acción continua o repetida y mantiene la imagen de captación furtiva.
- source_word: אֶת לֵב
  english_pob_choice: the hearts
  chosen_spanish: el corazón
  alternatives_spanish:
  - los corazones
  - la lealtad
  lexicon: HALOT
  rationale: En hebreo «corazón» aparece en singular como sede de la voluntad y la lealtad. En español, el singular conserva mejor la imagen original y evita diluirla en una abstracción como «lealtad».
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: de los hombres de Israel
  alternatives_spanish:
  - del pueblo de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente «hombres de». Se mantiene la forma masculina para respetar la precisión léxica del hebreo y la preferencia del proyecto por el lenguaje de género del original.
theological_decisions:
- issue: Preservación de la imagen de «robar el corazón» frente a una equivalencia interpretativa
  english_pob_reading: Absalom stole the hearts of the men of Israel.
  chosen_spanish_reading: Absalón robaba el corazón de los hombres de Israel.
  alternative_spanish_readings:
  - Absalón ganó el favor de los hombres de Israel.
  - Absalón se ganó el corazón de los hombres de Israel.
  rationale: El hebreo usa explícitamente el verbo «robar» con «corazón», una metáfora de captación clandestina o manipuladora. Se conserva la fuerza figurativa en el texto principal; la alternativa interpretativa queda para la nota.
  doctrine_reference: DOCTRINE.md § Lexical transparency and imagery
- issue: Valor judicial de מִשְׁפָּט en un contexto real
  english_pob_reading: who came to the king for judgment
  chosen_spanish_reading: que venía al rey para juicio
  alternative_spanish_readings:
  - que venía al rey para sentencia
  - que venía al rey para resolución judicial
  rationale: El contexto no habla de «justicia» como virtud general, sino de una audiencia o decisión legal ante el rey. «Juicio» mantiene el marco forense sin suavizarlo.
  doctrine_reference: DOCTRINE.md § Context-sensitive legal terms
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete hebreo y el audit trail inglés. Se mantuvieron las dos imágenes clave del versículo: la orientación judicial de מִשְׁפָּט y la metáfora de גנב con לֵב. No se detectaron revisiones aplicadas en el expediente inglés, por lo que no hubo que reconciliar variantes editoriales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - Se prefirió un español sobrio y publicable, evitando calcos innecesarios pero conservando la imagen verbal del hebreo.
  - «Hombres de Israel» mantiene la correspondencia con אַנְשֵׁי y la política de precisión de género del proyecto.
