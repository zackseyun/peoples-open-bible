id: 1KI.10.3
reference: 1 Kings 10:3
source:
  edition: WLC
  text: וַ/יַּגֶּד לָ֥/הּ שְׁלֹמֹ֖ה אֶת כָּל דְּבָרֶ֑י/הָ לֹֽא הָיָ֤ה דָּבָר֙ נֶעְלָ֣ם מִן הַ/מֶּ֔לֶךְ אֲשֶׁ֧ר לֹ֦א הִגִּ֖יד לָֽ/הּ־־־־־׃
translation:
  text: And Solomon answered all her questions[a]; there was nothing hidden from the king that he did not tell her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Solomon told her all her words/matters.' The Hebrew can be rendered more literally, but in context it refers to Solomon's responses to the queen's inquiries.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  chosen: answered
  alternatives:
  - told
  - declared
  - explained
  lexicon: HALOT
  rationale: Though the verb נגד commonly means 'tell' or 'declare,' in this context with 'all her words/questions' and the surrounding scene of testing Solomon with hard questions, idiomatic English is better served by 'answered,' which captures that Solomon responded to her inquiries rather than merely repeating her words.
- source_word: דְּבָרֶיהָ
  chosen: her questions
  alternatives:
  - her words
  - her matters
  - her sayings
  lexicon: HALOT
  rationale: דבר is broad ('word, matter, thing'). In context, the queen has come to test Solomon with difficult questions (v. 1), so 'her questions' best reflects the sense here. This is a contextual narrowing, not a paraphrase beyond the narrative setting.
- source_word: לֹא הָיָה דָּבָר נֶעְלָם
  chosen: there was nothing hidden
  alternatives:
  - no matter was hidden
  - not a thing was concealed
  lexicon: HALOT
  rationale: This clause is rendered idiomatically in English while preserving the Hebrew sense that no matter remained concealed or beyond Solomon's grasp.
- source_word: נֶעְלָם
  chosen: hidden
  alternatives:
  - concealed
  - unknown
  lexicon: HALOT
  rationale: The Niphal participle from עלם conveys being hidden or concealed. 'Hidden' is the most natural English equivalent here. 'Unknown' is possible by implication, but 'hidden' stays closer to the Hebrew image.
- source_word: מִן־הַמֶּלֶךְ
  chosen: from the king
  alternatives:
  - from King Solomon
  - to the king
  lexicon: HALOT
  rationale: The preposition מן with the passive idea 'hidden' naturally yields 'hidden from the king.' Retaining 'the king' reflects the Hebrew wording and maintains the royal emphasis.
- source_word: אֲשֶׁר לֹא הִגִּיד לָהּ
  chosen: that he did not tell her
  alternatives:
  - which he did not explain to her
  - that he did not declare to her
  lexicon: HALOT
  rationale: 'This relative clause clarifies the previous statement: there was no matter hidden from the king that he did not disclose to her. ''Tell her'' is straightforward modern English and fits the narrative tone.'
