translation:
  language: es
  text: Pero vuélvete hacia la oración de tu siervo y hacia su súplica de favor[a], Yahvé mi Dios, para escuchar el clamor[b] y la oración que tu siervo ora ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su petición de favor’. El hebreo denota una súplica intensa orientada a obtener misericordia o favor.
    reason: lexical_alternative
  - marker: b
    text: O ‘grito resonante’. El término hebreo puede referirse a una voz fuerte; aquí probablemente es un clamor de ayuda en la oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָנִיתָ
  english_pob_choice: Yet turn toward
  chosen_spanish: Pero vuelve a
  alternatives_spanish:
  - y vuelve a
  - mas vuelve a
  - vuelve hacia
  lexicon: HALOT
  rationale: El verbo פנה conserva la imagen de ‘volverse/dirigirse hacia’. En español, ‘vuelve a’ expresa bien la orientación atenta de Dios en este contexto de súplica; ‘pero’ refleja el valor concesivo/retomador del hebreo en la secuencia de petición.
- source_word: תְּפִלַּת
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la petición
  lexicon: HALOT
  rationale: תפלה se rinde de manera normal y transparente como ‘oración’, manteniendo el paralelismo con el segundo sustantivo sin añadir matices que el hebreo no exige.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí el lenguaje de súplica ante Dios usa el término de dependencia reverente. En español ‘siervo’ comunica mejor ese registro bíblico que ‘esclavo’, que sería demasiado duro en esta fórmula devocional.
- source_word: תְּחִנָּתוֹ
  english_pob_choice: his plea for favor
  chosen_spanish: su súplica de favor
  alternatives_spanish:
  - su ruego de favor
  - su súplica
  - su petición de misericordia
  lexicon: HALOT
  rationale: תחנה denota una ruego intenso, orientado a recibir favor o misericordia. ‘Súplica de favor’ conserva esa tensión lexical sin reducirlo a una mera ‘oración’ ni imponer un término técnico menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención española del proyecto para el Nombre divino, preservando el Tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - oh mi Dios
  - Dios mío
  lexicon: HALOT
  rationale: 'La forma posesiva directa se conserva como vocativo natural en español: ‘mi Dios’.'
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para escuchar
  alternatives_spanish:
  - para oír
  lexicon: HALOT
  rationale: 'El infinitivo indica propósito: que Dios se vuelva para oír/escuchar. ‘Escuchar’ es la opción más adecuada en español para una atención intencional a la plegaria.'
- source_word: הָרִנָּה
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la voz
  - la aclamación
  lexicon: HALOT
  rationale: רנה puede abarcar un grito fuerte, incluso de gozo, pero en este contexto de oración es un clamor de auxilio. ‘Clamor’ preserva esa intensidad sin cargarlo de un sentido exclusivamente jubiloso.
- source_word: הַתְּפִלָּה
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  lexicon: HALOT
  rationale: Se repite el mismo término en hebreo; mantener ‘oración’ respeta la paralelidad semántica y estilística.
- source_word: מִתְפַּלֵּל
  english_pob_choice: is praying
  chosen_spanish: hace
  alternatives_spanish:
  - está orando
  - ora
  lexicon: HALOT
  rationale: El participio describe la acción en curso. ‘Hace delante de ti’ sigue el giro idiomático bíblico ‘hacer oración’, pero en una forma que en español suena natural y mantiene la idea de acción presente.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La locución idiomática se vierte con una fórmula reverente y clara. ‘Delante de ti’ conserva el valor espacial-relacional del hebreo sin sobreinterpretar.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. El proyecto pide mantener el Nombre divino como ‘Yahvé’ en español, evitando la sustitución litúrgica ‘SEÑOR’ para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción entre תְּפִלָּה y תְּחִנָּה
  english_pob_reading: prayer / plea for favor
  chosen_spanish_reading: oración / súplica de favor
  alternative_spanish_readings:
  - oración / petición
  - plegaria / súplica
  - oración / ruego de misericordia
  rationale: 'El hebreo distingue dos términos relacionados pero no idénticos. Se conserva la diferencia: ‘oración’ para תפלה y ‘súplica de favor’ para תחנה, de modo que la segunda expresión mantenga su matiz de petición intensa por gracia o favor.'
  doctrine_reference: 'DOCTRINE.md: lexical precision and preserved tensions'
- issue: Sentido de הָרִנָּה en contexto de oración
  english_pob_reading: the cry
  chosen_spanish_reading: el clamor
  alternative_spanish_readings:
  - el grito
  - la voz alta
  - el grito de ayuda
  rationale: Aunque רנה puede sonar jubiloso en otros contextos, aquí la simetría con ‘oración’ y el entorno de intercesión favorecen una lectura de súplica intensa. ‘Clamor’ deja visible esa posible tensión entre ‘voz fuerte’ y ‘pedido de auxilio’.
  doctrine_reference: 'DOCTRINE.md: context-sensitive lexemes'
- issue: Valor de עבד como relación de dependencia ante Dios
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu esclavo
  - tu servidor
  rationale: En una oración dirigida a Dios, ‘siervo’ comunica con fidelidad la relación de subordinación reverente sin forzar el peso social de ‘esclavo’.
  doctrine_reference: 'DOCTRINE.md: context-sensitive lexemes'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y conserva la distinción léxica entre תְּפִלָּה y תְּחִנָּה, además de la tensión semántica de רִנָּה. También integra la revisión del audit trail inglés que simplificó la coordinación para mejorar la paralelidad, reflejada aquí en un español fluido sin pérdida de contenido.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene ‘siervo’ para עבד en el registro de oración a Dios.
  - Se conserva ‘oración’ para תפלה y ‘súplica de favor’ para תחנה, evitando colapsar ambos términos.
  - ‘Clamor’ se eligió para רנה por el contexto de petición, no como equivalencia automática de ‘gozo’.
