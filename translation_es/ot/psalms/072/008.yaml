translation:
  language: es
  text: Que gobierne de mar a mar[a], y desde el Río[b] hasta los confines de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Gobernará de mar a mar, y desde el Río hasta los confines de la tierra».'
    reason: alternative_reading
  - marker: b
    text: «El Río» probablemente se refiere al Éufrates, una frontera geográfica bíblica estándar.
    reason: cultural_note
lexical_decisions:
- source_word: וְיֵרְדְּ
  english_pob_choice: May he rule
  chosen_spanish: Que gobierne
  alternatives_spanish:
  - Y que gobierne
  - Que tenga dominio
  - Que reine
  lexicon: HALOT
  rationale: El verbo רדה expresa gobierno o dominio. En este contexto de súplica/benedición real, el subjuntivo exhortativo «Que gobierne» conserva el matiz desiderativo que la POB inglés resuelve con «May he rule», y suena natural en español sin perder la fuerza de mando.
- source_word: מִיָּם ... עַד יָם
  english_pob_choice: from sea to sea
  chosen_spanish: de mar a mar
  alternatives_spanish:
  - de un mar a otro
  - de mar hasta mar
  lexicon: HALOT
  rationale: La expresión es un merismo de amplitud total. «De mar a mar» preserva la forma proverbial y poética del hebreo/inglés, con naturalidad en español bíblico contemporáneo.
- source_word: וּמִנָּהָר
  english_pob_choice: and from the River
  chosen_spanish: y desde el Río
  alternatives_spanish:
  - y desde el río
  - y desde el Éufrates
  lexicon: HALOT
  rationale: La POB inglesa conserva «the River» como designación bíblica convencional del Éufrates. En español, «el Río» mantiene esa referencia implícita sin introducir el nombre explícito en el texto principal, respetando el valor geográfico convencional del hebreo.
- source_word: עַד אַפְסֵי אָרֶץ
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los últimos confines de la tierra
  lexicon: HALOT
  rationale: אַפְסֵי אָרֶץ comunica los extremos de la tierra. «Los confines de la tierra» es una equivalencia idiomática clara y digna en español, conservando el alcance universal del original.
theological_decisions:
- issue: Valor verbal jussivo en el hemistiquio inicial
  english_pob_reading: 'Rendered as a wish/prayer: ''May he rule'''
  chosen_spanish_reading: 'Subjuntivo exhortativo: «Que gobierne»'
  alternative_spanish_readings:
  - 'Futuro predictivo: «Gobernará»'
  - 'Imperativo estilizado: «Gobierna»'
  rationale: El hebreo puede leerse con tono desiderativo dentro de una oración por el rey, y la POB inglesa preserva esa lectura. El subjuntivo español mantiene la tensión entre petición y expectativa, sin cerrar la posibilidad de una lectura mesiánica más amplia.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Referencia geográfica de «el Río»
  english_pob_reading: '''The River'' likely refers to the Euphrates, a standard biblical geographic boundary.'
  chosen_spanish_reading: «el Río» como designación convencional del Éufrates
  alternative_spanish_readings:
  - «el río» genérico
  - «el Éufrates» explícito
  rationale: La designación con artículo definido sugiere un referente conocido en la geografía bíblica. Mantener «el Río» en el texto principal conserva la señal convencional y deja la identificación al aparato de notas, sin sobreexplicitarla en la línea principal.
  doctrine_reference: Translation philosophy §4 (preserve contextual lexical signals and document conventional referents)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de control fue alto y la lectura quedó estable. Se mantuvo la tensión entre petición y predicción en el verbo inicial, y la designación convencional «el Río» para respetar el audit trail inglés y el hebreo subyacente.
  spanish_consistency_notes:
  - Se usó «gobierne» para reflejar el valor jussivo/desiderativo del hebreo, coherente con el POB inglés «May he rule».
  - Se prefirió «de mar a mar» como merismo idiomático equivalente, sin explicitar mares concretos.
  - «El Río» se mantuvo con mayúscula inicial para señalar el referente convencional del Éufrates, en línea con el inglés POB.
  - «Confin(es) de la tierra» preserva el alcance universal del cierre poético sin añadir interpretación doctrinal.
