translation:
  language: es
  text: Nada ciego, quebrado, mutilado, o con una verruga, una costra o una enfermedad de la piel, esto no lo presentarán a Yahvé; y no pondrán ninguno de ellos sobre el altar como ofrenda de alimento[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda hecha por fuego' o 'ofrenda de fuego'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַוֶּרֶת
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - ciego
  - con ceguera
  - animales ciegos
  lexicon: HALOT
  rationale: En esta lista de defectos sacrificiales, el término funciona como rasgo físico de los animales. 'Ciegos' mantiene la fuerza adjetival y suena natural en español.
- source_word: שָׁבוּר
  english_pob_choice: broken
  chosen_spanish: quebrados
  alternatives_spanish:
  - rotos
  - fracturados
  - lesionados
  lexicon: HALOT
  rationale: '''Quebrados'' comunica de manera clara que el animal tiene una parte del cuerpo rota o dañada, sin sobreinterpretar el tipo exacto de lesión.'
- source_word: חָרוּץ
  english_pob_choice: mutilated
  chosen_spanish: mutilados
  alternatives_spanish:
  - cortados
  - mancos
  - mutilados gravemente
  lexicon: HALOT
  rationale: El hebreo indica una deformidad o daño corporal serio, posiblemente por corte. 'Mutilados' conserva la gravedad del defecto y corresponde bien al tono de la lista.
- source_word: יַבֶּלֶת
  english_pob_choice: wart
  chosen_spanish: una verruga
  alternatives_spanish:
  - un tumor
  - una excrecencia
  - un wen
  lexicon: HALOT
  rationale: '''Verruga'' es el equivalente más transparente para una protuberancia cutánea anormal y evita tecnicismos opacos.'
- source_word: גָרָב
  english_pob_choice: scab
  chosen_spanish: una costra
  alternatives_spanish:
  - sarna
  - mange
  - una erupción
  lexicon: HALOT
  rationale: Aunque el término puede abarcar una afección cutánea más amplia, 'costra' reproduce bien la imagen visible y concreta que exige la lista.
- source_word: יַלֶּפֶת
  english_pob_choice: skin disease
  chosen_spanish: una enfermedad de la piel
  alternatives_spanish:
  - una afección de la piel
  - una erupción cutánea
  - eczema
  lexicon: HALOT
  rationale: El referente exacto es incierto; 'enfermedad de la piel' preserva esa amplitud sin fingir precisión médica que el hebreo no garantiza.
- source_word: תַקְרִיבוּ
  english_pob_choice: present
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - presentarán
  - traerán
  - acercarán
  lexicon: HALOT
  rationale: En contexto sacrificial, 'presentar' es posible, pero 'ofrecer' suena más natural en español para una acción cultual dirigida a Yahvé.
- source_word: וְאִשֶּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  - ofrenda alimenticia
  lexicon: HALOT
  rationale: El término sacrificial conserva la relación con el fuego del altar. En español, 'ofrenda encendida' mantiene la huella lexical tradicional y la imagen cultual sin sonar excesivamente técnica.
- source_word: תִתְּנוּ מֵהֶם עַל הַמִּזְבֵּחַ
  english_pob_choice: place any of them on the altar
  chosen_spanish: no pondrán ninguno de ellos sobre el altar
  alternatives_spanish:
  - no colocarán ninguno de ellos sobre el altar
  - no darán de ellos sobre el altar
  - no los pondrán sobre el altar
  lexicon: HALOT
  rationale: '''Pondrán'' reproduce bien el hebreo de colocar o poner; ''ninguno de ellos'' conserva el sentido distributivo de מֵהֶם.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: ''Yahvé''. En este contexto sacrificial, la preposición ''a'' refleja bien el destinatario de la ofrenda.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton; el estándar español del proyecto es 'Yahvé', manteniendo el nombre del pacto y evitando el enmascaramiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וְאִשֶּׁה
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  - ofrenda alimenticia
  rationale: Aunque el inglés POB opta por 'food offering' y preserva una nota alternativa, en español la expresión tradicional 'ofrenda encendida' transmite con claridad la asociación con el fuego del altar sin perder el carácter sacrificial del término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
translation_notes:
  revision_awareness: 'La redacción sigue la estructura revisada del inglés POB: primero la lista de defectos, luego la prohibición de presentarlos a Yahvé, y finalmente la prohibición de ponerlos sobre el altar como ofrenda encendida. Se conservó la tensión terminológica de וְאִשֶּׁה mediante una formulación española natural con nota alternativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - Se mantiene la secuencia de defectos como una lista compacta y no interpretativa.
  - '''Ofrecer'' se usa para el acto cultual general; ''poner'' para la acción concreta sobre el altar.'
  - La nota al pie marca la alternativa sacrificial preservada por el audit trail inglés.
