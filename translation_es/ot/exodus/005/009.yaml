  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: mandato jussivo sobre el peso del trabajo, propósito de que sigan trabajando, y prohibición de atender a «palabras de mentira». Sin embargo, «la obra» suena menos natural en este contexto de labor forzada que «el trabajo», y la colocación «sobre los hombres» resulta más rígida en español que «a los hombres».'
  spanish_quality_summary: 'El español es comprensible y bastante fiel, pero tiene cierta rigidez calcaica: «Sea pesada la obra sobre los hombres» no suena tan natural ni claro como una formulación más idiomática y digna. «Palabras de mentira» es aceptable, pero «palabras mentirosas» o «palabras falsas» sería más natural; aun así, puede conservarse la forma más literal por fidelidad al matiz nominal. Conviene una revisión menor para mejorar legibilidad sin perder fuerza.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. «Los hombres» respeta la decisión de mantener הָאֲנָשִׁים con precisión de género. La nota alternativa sobre «los varones» es válida. La decisión principal a ajustar es estilística-contextual: preferir «trabajo» frente a «obra» en un pasaje sobre cargas laborales impuestas.'
  issues:
  - severity: medium
    issue: «la obra» en este contexto suena menos natural que «el trabajo»
    rationale: עֲבֹדָה aquí se refiere concretamente al trabajo/labor forzada de los israelitas. En español bíblico general «obra» puede entenderse, pero en este contexto de opresión laboral «trabajo» comunica mejor el referente sin pérdida de fidelidad.
  - severity: medium
    issue: «sobre los hombres» es un calco algo rígido
    rationale: Aunque עַל literalmente es «sobre/on», en español natural la idea de imponer una carga se expresa mejor como «a los hombres» o «sobre ellos». «Pesado a los hombres» mantiene el sentido de carga impuesta y mejora la fluidez.
  - severity: low
    issue: La nota al pie está anclada correctamente, pero no es estrictamente necesaria
    rationale: «Los hombres» ya refleja bien el hebreo. La alternativa «los varones» puede conservarse como nota léxica, pero no es indispensable para la comprensión.
  revised_spanish_text: Que el trabajo sea pesado para los hombres[a], para que trabajen en él y no presten atención a palabras de mentira.
