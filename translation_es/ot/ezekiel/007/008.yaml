translation:
  language: es
  text: Ahora[a], pronto derramaré mi ira sobre ti, y agotaré mi enojo[b] contra ti; te juzgaré conforme a tus caminos, y haré recaer sobre ti todas tus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en breve» o «dentro de poco»; la expresión hebrea señala un juicio inminente.
    reason: lexical_alternative
  - marker: b
    text: O «agotaré mi enojo sobre ti». El modismo hebreo indica que la ira de Dios seguirá su curso completo contra la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה מִקָּרוֹב
  english_pob_choice: Now, soon
  chosen_spanish: Ahora, pronto
  alternatives_spanish:
  - Ahora, en breve
  - Ahora, dentro de poco
  - Ahora, de inmediato
  lexicon: HALOT
  rationale: עַתָּה marca el giro temporal urgente, y מִקָּרוֹב expresa proximidad temporal, no espacial. «Ahora, pronto» conserva ambas ideas sin añadir énfasis no explícito.
- source_word: אֶשְׁפּוֹךְ חֲמָתִי
  english_pob_choice: I will pour out my wrath
  chosen_spanish: derramaré mi ira
  alternatives_spanish:
  - verteré mi ira
  - derramaré mi furor
  lexicon: HALOT
  rationale: שׁפך con חמה conserva la metáfora de derramar. «Ira» es natural en español y mantiene el peso judicial del término; «furor» sería posible, pero menos estable en este contexto profético.
- source_word: וְכִלֵּיתִי אַפִּי
  english_pob_choice: I will spend my anger
  chosen_spanish: gastaré mi enojo
  alternatives_spanish:
  - consumiré mi enojo
  - agotaré mi enojo
  - desfogaré mi enojo
  lexicon: HALOT
  rationale: כלה con אף expresa llevar el enojo a su curso completo. «Gastaré» mantiene la idea de agotarlo o consumirlo; «enojo» distingue este segundo término de חמה, como hace la POB en inglés.
- source_word: וּשְׁפַטְתִּיךְ
  english_pob_choice: I will judge you
  chosen_spanish: te juzgaré
  alternatives_spanish:
  - te haré juicio
  - te condenaré
  - pronunciaré juicio contra ti
  lexicon: HALOT
  rationale: El verbo es judicial de manera primaria. «Juzgaré» preserva el sentido legal-teológico antes de explicitarse en el castigo.
- source_word: כִּדְרָכָיִךְ
  english_pob_choice: according to your ways
  chosen_spanish: conforme a tus caminos
  alternatives_spanish:
  - según tus caminos
  - de acuerdo con tu conducta
  - conforme a tu conducta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referirse metafóricamente al modo de vida. «Caminos» conserva la metáfora hebrea y «conforme a» reproduce la relación normativa del juicio.
- source_word: וְנָתַתִּי עָלַיִךְ אֵת כָּל תּוֹעֲבוֹתָיִךְ
  english_pob_choice: I will bring all your abominations upon you
  chosen_spanish: pondré sobre ti todas tus abominaciones
  alternatives_spanish:
  - traeré sobre ti todas tus abominaciones
  - colocaré sobre ti todas tus abominaciones
  - haré recaer sobre ti todas tus abominaciones
  lexicon: HALOT
  rationale: נתן על en este contexto judicial significa imponer o hacer recaer. «Pondré sobre ti» es idiomático en español y permite conservar la fuerza de la imagen. «Abominaciones» mantiene el peso moral-religioso de תועבות.
theological_decisions:
- issue: Distinción de dos términos de ira divina
  english_pob_reading: The English POB distinguishes חֲמָה as 'wrath' and אַף as 'anger'.
  chosen_spanish_reading: Se distinguen «ira» y «enojo» para reflejar la intensificación y no borrar la diferencia retórica.
  alternative_spanish_readings:
  - 'usar el mismo término en ambos casos: «ira»'
  - 'usar el mismo término en ambos casos: «enojo»'
  - traducir ambos como «furor»
  rationale: El hebreo usa dos términos emparentados pero no idénticos; conservar dos palabras distintas en español ayuda a no nivelar el paralelismo y respeta la auditable decisión de la POB en inglés.
  doctrine_reference: Lenguaje profético de juicio divino en Ezequiel 7:8
- issue: Sentido judicial de la sentencia
  english_pob_reading: I will judge you according to your ways
  chosen_spanish_reading: te juzgaré conforme a tus caminos
  alternative_spanish_readings:
  - te castigaré conforme a tus caminos
  - te condenaré conforme a tus caminos
  - te haré juicio conforme a tus caminos
  rationale: «Juzgaré» mantiene el marco jurídico del texto; el castigo queda implicado por la cláusula final, sin sustituir el verbo principal por uno más interpretativo.
  doctrine_reference: Juicio retributivo según la conducta en literatura profética
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'very soon' a 'soon' para acercarse más a עתה מקרוב sin añadir énfasis; la versión española sigue esa misma cautela con «Ahora, pronto». También conserva la distinción entre חֲמָה y אַף mediante «ira» y «enojo», y mantiene el carácter judicial de שׁפט y נתן על sin reinterpretarlos como mero castigo explicativo.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí porque el versículo no contiene el tetragrámaton.
  - Se conserva un registro profético solemne y directo, con segunda persona singular femenina acorde con el hebreo.
  - «Abominaciones» traduce תועבות con el mismo peso moral-religioso que en la POB inglesa.
