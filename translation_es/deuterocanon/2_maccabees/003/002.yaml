revisions:
- from: Porque allí había piedad y odio de la maldad[a], sucedía que incluso los mismos reyes honraban el lugar y glorificaban el santuario con las ofrendas más excelentes.
  to: A causa de la piedad y del aborrecimiento de la maldad que había allí, sucedía que incluso los mismos reyes honraban el lugar y glorificaban el santuario con las ofrendas[a] más excelentes.
  rationale: Se corrigió el anclaje de la nota al pie para que corresponda a «ofrendas», que es el término explicado por la nota. También se suavizó «odio de la maldad» a «aborrecimiento de la maldad» por naturalidad en español, y se ajustó la introducción causal para reflejar mejor la sintaxis y el sentido del griego y de la auditoría inglesa.
