translation:
  language: es
  text: Aun en Horeb ustedes provocaron la ira de Yahvé[a], y Yahvé se enojó con ustedes tanto que estaba dispuesto a destruirlos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En Horeb» o «Y en Horeb»; la conjunción hebrea puede simplemente continuar la narración, aunque aquí probablemente añade énfasis.
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé se enojó con ustedes para destruirlos» o «Yahvé se enojó con ustedes lo suficiente como para destruirlos»; el hebreo vincula la ira de Yahvé directamente con la destrucción amenazada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְחֹרֵב
  english_pob_choice: Even at Horeb
  chosen_spanish: Hasta en Horeb
  alternatives_spanish:
  - Y en Horeb
  - También en Horeb
  lexicon: HALOT
  rationale: La conjunción con la preposición introduce continuidad con énfasis. «Hasta en Horeb» conserva ese matiz enfático de reproche mejor que un simple «y» en español.
- source_word: הִקְצַפְתֶּם
  english_pob_choice: you provoked ... to wrath
  chosen_spanish: provocaron ... a ira
  alternatives_spanish:
  - enojaron ...
  - hicieron ... enojar
  lexicon: HALOT
  rationale: El hifil de קצף expresa causar ira o provocar indignación. «Provocaron ... a ira» preserva la fuerza causativa y el tono grave del incumplimiento de pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto según la convención del proyecto para יְהוָה, en vez de ocultarlo con un título genérico.
- source_word: וַיִּתְאַנַּף
  english_pob_choice: was angry enough
  chosen_spanish: se enojó ... hasta el punto de
  alternatives_spanish:
  - se indignó ... lo suficiente como para
  - ardió de ira ... como para
  lexicon: HALOT
  rationale: El verbo denota enojo intenso, y en esta construcción se vincula con el infinitivo siguiente. «Hasta el punto de» preserva la relación entre la ira divina y la destrucción sin sobreinterpretar la sintaxis.
- source_word: בָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - contra ustedes
  lexicon: HALOT
  rationale: Aunque el contexto es hostil, «con ustedes» sigue el giro idiomático después de «se enojó», mientras la cláusula final aclara la orientación adversa.
- source_word: לְהַשְׁמִיד אֶתְכֶם
  english_pob_choice: to destroy you
  chosen_spanish: hasta el punto de destruirlos
  alternatives_spanish:
  - para destruirlos
  - para acabarlos
  lexicon: HALOT
  rationale: El hifil de שׁמד significa destruir, arrasar o exterminar. «Destruirlos» es directo y solemne; el encadenamiento con la expresión de resultado reproduce la fuerza del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton de manera explícita. En el español del proyecto se conserva el nombre del pacto «Yahvé» para no enmascarar el dato original ni diluir la referencia teológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of divine anger linked to destruction
  english_pob_reading: was angry with you enough to destroy you
  chosen_spanish_reading: se enojó con ustedes hasta el punto de destruirlos
  alternative_spanish_readings:
  - se indignó con ustedes como para destruirlos
  - se airó contra ustedes para destruirlos
  rationale: La sintaxis hebrea enlaza directamente la ira con el infinitivo de destrucción. La formulación española mantiene esa conexión sin convertirla en una simple descripción emocional.
  doctrine_reference: HALOT, entrada de אנף y construcción con infinitivo de resultado
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más natural en el enlace entre ira y destrucción, preservando el nexo sintáctico del infinitivo final. También incorpora la decisión auditada de mantener el nombre divino como Yahvé en lugar de sustituirlo por un título.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología proyectual para יְהוָה.
  - Se conserva el tratamiento plural «ustedes/los» por la forma hebrea plural de segunda persona.
  - «Ira» se usa como equivalente sobrio de קצף/אנף en un contexto de juicio divino.
  - La estructura «hasta el punto de» funciona como equivalente español del vínculo causal entre la ira y la destrucción.
