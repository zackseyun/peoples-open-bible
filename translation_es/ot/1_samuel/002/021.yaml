base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/021.yaml
  text: For Yahweh visited Hannah[a], and she conceived and bore three sons and two daughters[b]. And the boy Samuel grew before Yahweh.
  footnotes:
  - marker: a
    text: Or 'the LORD attended to Hannah' or 'the LORD cared for Hannah.' The Hebrew verb can denote gracious intervention on someone's behalf.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with the LORD'; in context, this likely means Samuel grew up in the LORD's presence at the sanctuary.
    reason: lexical_alternative
