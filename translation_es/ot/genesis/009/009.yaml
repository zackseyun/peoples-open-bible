translation:
  language: es
  text: Y en cuanto a mí[a], he aquí, estoy estableciendo mi alianza con ustedes y con su descendencia después de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su simiente». El hebreo usa un sustantivo colectivo que puede referirse a la descendencia o a los descendientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And as for me
  chosen_spanish: Y en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Y por mi parte
  - Y en lo que a mí respecta
  lexicon: HALOT
  rationale: La construcción hebrea introduce un contraste o cambio de enfoque. «En cuanto a mí» conserva ese énfasis discursivo mejor que un simple «yo», sin forzar el sentido.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  - aquí estoy
  lexicon: HALOT
  rationale: «He aquí» mantiene el tono solemne y de atención especial que expresa la partícula hebrea, con un registro natural en español bíblico contemporáneo.
- source_word: מֵקִים
  english_pob_choice: I am establishing
  chosen_spanish: estoy estableciendo
  alternatives_spanish:
  - establezco
  - estoy confirmando
  - estoy instituyendo
  lexicon: HALOT
  rationale: El participio intensifica la acción performativa de fijar o establecer el pacto. «Estoy estableciendo» reproduce bien ese valor progresivo y solemne; «instituyendo» sería posible, pero menos directo al hebreo.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: Aunque «pacto» no es la opción más frecuente en algunas tradiciones, aquí refleja el término de relación formal del hebreo בְּרִית sin cargarlo con matices eclesiásticos ajenos. «Alianza» también es válida, pero «pacto» suele ser más claro y estable en contexto jurídico-covenantal.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto con ustedes
  lexicon: HALOT
  rationale: El hebreo marca relación directa con los destinatarios. En español, «con ustedes» es la forma neutral y ampliamente inteligible para el plural.
- source_word: זַרְעֲכֶם
  english_pob_choice: your offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - su posteridad
  - sus descendientes
  lexicon: HALOT
  rationale: זֶרַע es un colectivo que puede abarcar descendencia/offspring. «Su descendencia» conserva el valor colectivo y resulta natural en español; «simiente» preserva más literalmente la imagen, pero suena menos transparente para la lectura pública.
- source_word: אַחֲרֵיכֶם
  english_pob_choice: after you
  chosen_spanish: después de ustedes
  alternatives_spanish:
  - tras ustedes
  - que vendrá después de ustedes
  lexicon: HALOT
  rationale: La frase indica generaciones posteriores. «Después de ustedes» mantiene el paralelismo con el hebreo y el sentido temporal de sucesión sin ampliar el texto más de lo necesario.
theological_decisions:
- issue: Terminología del pacto divino-humano
  english_pob_reading: my covenant
  chosen_spanish_reading: mi pacto
  alternative_spanish_readings:
  - mi alianza
  - mi convenio
  rationale: Se conserva la categoría bíblico-teológica de בְּרִית como relación formal establecida por Dios con Noé y su linaje, sin reemplazarla por un término más secular ni por una formulación doctrinalmente cargada.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; este borrador sigue la lectura auditada de la POB en estilo y decisiones léxicas, adaptándolas al español con el mismo énfasis en el discurso, la solemnidad del anuncio y la referencia colectiva de זֶרַע.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se evita «SEÑOR» como sustituto automático, siguiendo la norma del proyecto.
  - Se usa un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - El término «pacto» se conserva de manera consistente para בְּרִית en este contexto.
