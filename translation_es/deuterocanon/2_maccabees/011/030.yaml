translation:
  language: es
  text: Por tanto, para los que descienden hasta el treinta de Xántico, habrá una mano derecha[a] de garantía junto con permiso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «una mano derecha»; aquí la expresión funciona como un modismo diplomático para una garantía o señal de buena fe.
    reason: lexical_alternative
  - marker: b
    text: Xántico es un nombre de mes macedonio usado en la datación helenística.
    reason: cultural_note
lexical_decisions:
- source_word: τοῖς οὖν καταπορευομένοις
  english_pob_choice: for those who come down
  chosen_spanish: para los que descienden
  alternatives_spanish:
  - para los que bajan
  - para los que vienen de abajo
  lexicon: LSJ
  rationale: El participio medio/pasivo expresa movimiento descendente; «descienden» conserva esa dirección sin añadir demasiado sobre el destino. «Para» refleja el dativo de referencia/beneficio del griego en este contexto administrativo.
- source_word: μέχρι τριακάδος Ξανθικοῦ
  english_pob_choice: until the thirtieth of Xanthicus
  chosen_spanish: hasta el treinta de Xántico
  alternatives_spanish:
  - hasta el día treinta de Xántico
  - hasta el trigésimo de Xántico
  lexicon: LSJ
  rationale: Se mantiene el límite temporal y se translitera el nombre del mes macedonio como «Xántico»/«Xántico» en forma castellanizada «Xántico», en vez de convertirlo a otro calendario.
- source_word: ὑπάρξει
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirá
  - se dará
  lexicon: LSJ
  rationale: El futuro de ὑπάρχω aquí funciona de manera existencial; «habrá» es la forma natural en español y no introduce un sujeto explícito.
- source_word: δεξιὰ
  english_pob_choice: a right hand of assurance
  chosen_spanish: una derecha
  alternatives_spanish:
  - una mano derecha
  - un juramento
  - una prenda de fidelidad
  lexicon: LSJ
  rationale: El griego literalmente dice «derecha» y, según el audit trail inglés, aquí funciona como modismo de garantía o empeño de buena fe. En español, «una derecha» conserva la literalidad del giro; la nota explica el valor idiomático.
- source_word: μετὰ τῆς ἀδείας
  english_pob_choice: together with permission
  chosen_spanish: junto con la licencia
  alternatives_spanish:
  - junto con el permiso
  - con autorización
  - con libertad
  lexicon: LSJ
  rationale: ἄδεια puede significar permiso, licencia o autorización. «Licencia» refleja bien el registro formal y administrativo del pasaje; «permiso» sería la opción más simple.
theological_decisions:
- issue: El valor idiomático de «derecha» como garantía o prenda de buena fe
  english_pob_reading: The phrase 'right hand' here is an idiom for a pledge or assurance of good faith.
  chosen_spanish_reading: «Derecha» se mantiene en el texto, pero se entiende como un modismo de garantía o empeño de buena fe, no solo como la mano física.
  alternative_spanish_readings:
  - prenda de fidelidad
  - garantía
  - aseguramiento
  rationale: El testimonio auditado en inglés señala explícitamente el carácter idiomático. En español conviene conservar la forma literal para no borrar la imagen diplomática, y aclarar su fuerza en la nota.
  doctrine_reference: Uso idiomático diplomático; no implica una doctrina específica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que volvió a una expresión más literal para δεξιὰ («right hand of assurance»). Por eso el español conserva la literalidad («una derecha») y deja la explicación idiomática en nota, en lugar de sustituirla por una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se conservó Yahvé/Jesús/Mesías solo cuando el texto lo requiera; aquí no aplica.
  - Se prefirió una forma formal y transparente, sin borrar el matiz administrativo del original.
  - «Licencia» se usa como equivalente de ἄδεια en registro formal; «permiso» queda como alternativa semántica cercana.
