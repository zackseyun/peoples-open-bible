translation:
  language: es
  text: 'Y le dijo: «Has respondido correctamente[a]. Haz esto[b], y vivirás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Has respondido bien».'
    reason: lexical_alternative
  - marker: b
    text: 'El contexto más amplio trata de la vida eterna (véase Lucas 10:25), pero el griego aquí dice simplemente: «vivirás».'
    reason: cross_reference
lexical_decisions:
- source_word: εἶπεν δὲ αὐτῷ
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Así que le dijo
  lexicon: BDAG
  rationale: εἶπεν es el verbo simple 'dijo'; δέ funciona como conectivo leve, por lo que en español 'Y' conserva el flujo narrativo sin cargar contraste. El dativo αὐτῷ se expresa naturalmente con 'le'.
- source_word: Ὀρθῶς
  english_pob_choice: correctly
  chosen_spanish: correctamente
  alternatives_spanish:
  - bien
  - rectamente
  lexicon: BDAG
  rationale: El adverbio significa 'correctamente / justamente / bien en el sentido de acierto'. 'Correctamente' es natural en español moderno y conserva la evaluación de Jesús sin suavizarla.
- source_word: ἀπεκρίθης
  english_pob_choice: you have answered
  chosen_spanish: Has respondido
  alternatives_spanish:
  - Respondiste
  - Has contestado
  lexicon: BDAG
  rationale: El aoristo deponente de ἀποκρίνομαι señala una respuesta ya dada. En español, el pretérito perfecto 'has respondido' suena natural en el diálogo directo y mantiene la relevancia actual de la respuesta.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto mismo
  - esta cosa
  lexicon: BDAG
  rationale: El demostrativo neutro singular remite al mandamiento resumido previamente. 'Esto' es la forma más directa y fiel en español.
- source_word: ποίει
  english_pob_choice: Do
  chosen_spanish: Haz
  alternatives_spanish:
  - Sigue haciendo
  - Practica
  lexicon: BDAG
  rationale: El imperativo presente puede sugerir acción continuada, pero el español natural aquí es 'Haz'. En contexto puede conservarse la fuerza de práctica continuada sin sobretraducirla.
- source_word: ζήσῃ
  english_pob_choice: you will live
  chosen_spanish: vivirás
  alternatives_spanish:
  - tendrás vida
  - vivirás para siempre
  lexicon: BDAG
  rationale: ζήσῃ significa sencillamente 'vivirás'. Se evita ampliar el texto a 'vida eterna' en la línea principal, porque el griego no lo dice explícitamente en esta cláusula.
theological_decisions:
- issue: Alcance de 'vivirás' en el contexto de vida eterna
  english_pob_reading: Render ζήσῃ as 'you will live' without expanding it to 'you will inherit eternal life' in the main text.
  chosen_spanish_reading: Traducir ζήσῃ como 'vivirás' sin añadir 'vida eterna' en el cuerpo del texto.
  alternative_spanish_readings:
  - heredarás vida eterna
  - tendrás vida eterna
  rationale: El contexto amplio de Lucas 10:25 sí trata de la vida eterna, pero la cláusula griega aquí dice simplemente 'vivirás'. Mantener esa forma preserva la transparencia lexical y no borra la tensión contextual.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés POB sin mecanizar el inglés como base. Se conserva la evaluación adverbial de Ὀρθῶς, el matiz narrativo de δέ, el imperativo presente de ποιέω y la sobriedad de ζήσῃ. No se introducen expansiones doctrinales en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto solo cuando el texto base lo requiere; aquí no aparece.
  - Se mantiene 'vivirás' para ζήσῃ, coherente con la preferencia POB por no importar 'vida eterna' al texto principal cuando el griego no lo explicita.
  - La nota b se ancla en 'Haz esto[b]' para conservar la alternativa contextual sin alterar la línea principal.
