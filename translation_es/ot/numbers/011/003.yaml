translation:
  language: es
  text: Así le puso a aquel lugar el nombre de Taberá[a], porque el fuego de Yahvé ardió entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Taberá suena como “arder” o “incendio”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - lo llamó
  - nombró
  lexicon: HALOT
  rationale: En español, “llamó” reproduce el verbo de nombrar sin forzar una calca. El sujeto está implícito en el contexto narrativo, como en el hebreo.
- source_word: שֵׁם הַמָּקוֹם הַהוּא
  english_pob_choice: the name of that place
  chosen_spanish: el nombre de aquel lugar
  alternatives_spanish:
  - aquel lugar
  - el nombre de ese lugar
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal completa para reflejar la construcción hebrea y el acto formal de poner nombre.
- source_word: תַּבְעֵרָה
  english_pob_choice: Taberah
  chosen_spanish: Taberá
  alternatives_spanish:
  - Taberáa
  - Taberah
  lexicon: HALOT
  rationale: Se translitera como topónimo en una forma natural para el español bíblico. El eco semántico de “ardor/quemazón” se preserva en la nota.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: “Porque” expresa con claridad la relación causal del hebreo en español contemporáneo.
- source_word: בָעֲרָה
  english_pob_choice: burned
  chosen_spanish: ardió
  alternatives_spanish:
  - quemó
  - se encendió
  lexicon: HALOT
  rationale: El verbo בער se vierte con “ardió”, que en español suena natural y mantiene la imagen de fuego activo sin introducir un objeto implícito.
- source_word: בָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en ellos
  lexicon: HALOT
  rationale: “Entre ellos” comunica la localización comunitaria del juicio y evita la ambigüedad de un sentido interior (“en ellos”).
- source_word: אֵשׁ יְהוָה
  english_pob_choice: the fire of Yahweh
  chosen_spanish: el fuego de Yahvé
  alternatives_spanish:
  - el fuego de Yahvé
  - un fuego de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé conforme al criterio del proyecto. “Fuego de Yahvé” conserva el genitivo hebreo y la atribución divina del juicio.
theological_decisions:
- issue: Renderización del nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo el criterio del proyecto, se translitera como “Yahvé” en lugar de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Relación entre el fuego y el lugar llamado Taberá
  english_pob_reading: Taberah sounds like 'burning.'
  chosen_spanish_reading: Taberá[a] con nota sobre su resonancia con “ardor/quemazón”
  alternative_spanish_readings:
  - Taberá, que significa ‘ardor’
  - Taberá, que suena a ‘quemazón’
  rationale: La forma del topónimo se deja en el texto principal, mientras la nota explica el juego fonético-semántico sin sobreinterpretarlo. Así se preserva el valor narrativo del nombre.
  doctrine_reference: Principios POB de transparencia lexical y preservación de juegos de palabras
translation_notes:
  revision_awareness: El inglés POB pasó revisión reciente sin cambios y recibió alta concordancia; se siguió su lectura principal, ajustando la forma española para naturalidad sin alterar las decisiones léxicas ni la referencia explícita al nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” de forma consistente con el criterio del proyecto para יְהוָה.
  - Se evitó “SEÑOR” como sustituto del nombre divino.
  - El topónimo se translitera como “Taberá” para sonar natural en español, con nota explicativa del juego de palabras.
  - Se eligió “ardió” en lugar de “quemó” para conservar la imagen intransitiva del fuego en el relato.
