base_translation:
  language: en
  yaml_path: translation/ot/proverbs/031/006.yaml
  text: Give strong drink to one who is perishing[b][a], and wine to those bitter in soul.
  footnotes:
  - marker: a
    text: Or 'to the one who is dying' for 'to one who is perishing.' The Hebrew participle can refer broadly to someone perishing, ruined, or near death.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the bitter of soul,' an idiom for deep inner anguish or misery.
    reason: cultural_note
