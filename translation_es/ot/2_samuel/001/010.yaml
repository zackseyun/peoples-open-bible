base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/001/010.yaml
  text: So I stood over him and put him to death[a], because I knew that he would not live after he had fallen. Then I took the crown that was on his head and the armlet that was on his arm[b], and I brought them here to my lord.
  footnotes:
  - marker: a
    text: Or 'the bracelet.' The Hebrew term refers to an ornament worn on the arm.
    reason: lexical_alternative
  - marker: b
    text: This is the Amalekite's report to David. Compare 1 Samuel 31:4–5 for the earlier account of Saul's death.
    reason: cross_reference
