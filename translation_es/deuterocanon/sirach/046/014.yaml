translation:
  language: es
  text: Por mandato de Yahvé, mandó a la asamblea[a], y el Dios de Jacob lo visitó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido lee «mandó a la asamblea»; el paralelo griego lee «juzgó a la asamblea». El texto principal sigue el hebreo, mientras que el griego apoya el sentido contextual de «juzgó».
    reason: alternative_reading
  - marker: b
    text: O «visitó a Jacob» / «atendió a Jacob». El verbo hebreo puede expresar desde tomar nota hasta intervenir en favor de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: במצות / ἐν νόμῳ
  english_pob_choice: by the command of / at the command of
  chosen_spanish: Según el mandamiento de
  alternatives_spanish:
  - por el mandamiento de
  - de acuerdo con el mandamiento de
  - en el mandamiento de
  lexicon: HALOT; LXX συναγωγήν / νόμῳ
  rationale: La preposición ב aquí funciona de manera normativa o instrumental. 'Según el mandamiento de' expresa bien que la acción estuvo regida por la orden divina, sin sonar forzado en español.
- source_word: צוה / ἔκρινεν
  english_pob_choice: he judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - mandó
  - dio la orden de
  - gobernó como juez sobre
  lexicon: HALOT; LXX ἔκρινεν
  rationale: El hebreo transmitido tiene צוה, pero el paralelo griego lee ἔκρινεν. Como el contexto de Samuel en Sirácides resalta su función judicial, 'juzgó' preserva el sentido contextual apoyado por el griego sin ocultar la tensión textual.
- source_word: עדה / συναγωγήν
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el pueblo reunido
  lexicon: HALOT; LSJ
  rationale: '''Asamblea'' corresponde bien a עֵדָה y a συναγωγήν, y mantiene un registro claro y contemporáneo.'
- source_word: ויפקד / ἐπεσκέψατο
  english_pob_choice: visited / took notice / attended to
  chosen_spanish: lo visitó
  alternatives_spanish:
  - visitó a Jacob
  - lo atendió
  - tuvo en cuenta a Jacob
  lexicon: HALOT; LSJ
  rationale: 'פקד admite un rango de sentidos: visitar, intervenir, tomar en cuenta. Dado que el objeto queda implícito en hebreo y explícito en el griego con ''Jacob'', ''lo visitó'' conserva la fuerza verbal breve y permite recuperar el referente pronominal de la tradición hebrea/poética.'
- source_word: אלהי יעקב / Κύριος
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - el Señor de Jacob
  - Dios de Jacob
  lexicon: HALOT; LXX
  rationale: El hebreo nombra explícitamente 'el Dios de Jacob', mientras que el griego usa Κύριος con el mismo sentido referencial en el contexto. Se mantiene la fórmula tradicional sin sustituirla por un equivalente menos preciso.
- source_word: יהוה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el nombre divino: ''Yahvé'' en el texto principal, no una máscara litúrgica. Esto distingue claramente el nombre propio del título ''Dios''.'
theological_decisions:
- issue: Manejo de la discrepancia textual entre el hebreo transmitido (he commanded) y el griego paralelo (he judged).
  english_pob_reading: The English audit trail preferred 'he judged the assembly' in one stage, then revised to 'he commanded the assembly' to reflect the transmitted Hebrew צוה while retaining a note about the Greek.
  chosen_spanish_reading: juzgó a la asamblea
  alternative_spanish_readings:
  - mandó a la asamblea
  - dio la orden a la asamblea
  rationale: Para el español de trabajo se prioriza el testimonio griego en esta cláusula, porque encaja mejor con el papel judicial de Samuel en el contexto inmediato. La tensión textual queda visible en la nota, en lugar de armonizarla sin más.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives, using the Greek parallel as actual translation input'
- issue: Forma verbal de פקד / ἐπεσκέψατο con sujeto divino y objeto humano implícito o explícito.
  english_pob_reading: The English audit trail revised toward 'visited him' / 'took notice' to preserve the verb closely and account for the implied object.
  chosen_spanish_reading: lo visitó
  alternative_spanish_readings:
  - visitó a Jacob
  - lo atendió
  - tuvo en cuenta a Jacob
  rationale: '''Lo visitó'' reproduce la brevedad del verbo y deja abierta la gama semántica de intervención benévola, atención o visita. La nota permite recordar que el hebreo y el griego difieren en la explicitación del destinatario.'
  doctrine_reference: HALOT; LSJ; contexto benéfico de la acción divina
translation_notes:
  revision_awareness: La versión española toma en cuenta la revisión más reciente del audit trail, pero no copia mecánicamente la última decisión inglesa cuando el paralelo griego y el contexto literario ofrecen una lectura más fuerte en español. Se preserva la tensión textual entre el hebreo transmitido y el griego, y se explicita en nota en vez de resolverla invisiblemente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene 'Dios de Jacob' como fórmula estable para אלהי יעקב.
  - '''Asamblea'' se emplea para עדה / συναγωγήν por su claridad y neutralidad.'
  - '''Juzgó'' conserva el matiz judicial del paralelo griego; la nota registra la alternativa hebrea con ''mandó''.'
  - '''Lo visitó'' evita fijar indebidamente una sola matización de פקד, dejando abierta la amplitud semántica del verbo.'
