translation:
  language: es
  text: ¿Acaso no está mi ayuda dentro de mí, y ha sido apartada de mí la sabiduría práctica[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recursos eficaces» o «consejo eficaz» para תֻשִׁיָּה; el término hebreo puede denotar sabiduría práctica, competencia o consejo eficaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאִם
  english_pob_choice: Is ... ?
  chosen_spanish: ¿Acaso ... ?
  alternatives_spanish:
  - ¿No ... ?
  - ¿Es que ... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica; «¿acaso ... ?» conserva ese matiz sin volver la frase más enfática de lo que exige el hebreo.
- source_word: אֵין
  english_pob_choice: not
  chosen_spanish: no está
  alternatives_spanish:
  - no hay
  - no existe
  lexicon: HALOT
  rationale: En una cláusula nominal interrogativa, el sentido es de negación retórica. «No está» fluye de manera natural en español y conserva la idea de ausencia.
- source_word: עֶזְרָתִי
  english_pob_choice: my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - mi auxilio
  - mi socorro
  lexicon: HALOT
  rationale: עזרָה significa ayuda o asistencia. «Mi ayuda» es directo y transparente; «auxilio» o «socorro» serían posibles, pero suenan más marcados en español.
- source_word: בִי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - en mi interior
  lexicon: HALOT
  rationale: El valor locativo puede ser «en mí» o «dentro de mí». Aquí se entiende mejor como recurso interno, por lo que «dentro de mí» reproduce bien el matiz de interioridad.
- source_word: תֻשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: sabiduría sólida
  alternatives_spanish:
  - sensatez
  - sabiduría práctica
  - criterio
  lexicon: HALOT
  rationale: תושיה puede aludir a sabiduría práctica, eficacia o recurso competente. «Sabiduría sólida» mantiene la resonancia sapiencial y evita reducir el término a mera habilidad.
- source_word: נִדְּחָה
  english_pob_choice: has been driven
  chosen_spanish: ha sido apartada
  alternatives_spanish:
  - ha sido alejada
  - ha sido expulsada
  - ha sido empujada lejos
  lexicon: HALOT
  rationale: El nifal de נדח expresa ser apartada o expulsada. «Ha sido apartada» es idiomático en español y preserva el pasivo sin sobrecargar la imagen.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - desde mí
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal se traduce de forma simple con «de mí»; en combinación con «apartada» ya se entiende la separación.
translation_notes:
  revision_awareness: La revisión reciente no requirió cambios; se mantiene el sentido retórico y la ambigüedad lexical de תֻשִׁיָּה con una traducción española natural y auditable.
  spanish_consistency_notes:
  - Se conserva Yahvé no aplicable aquí; no hay términos divinos en el versículo.
  - Se evita «SEÑOR» y cualquier paráfrasis interpretativa ajena al hebreo.
  - «Sabiduría sólida» se usa como equivalente funcional de sound wisdom, manteniendo abierta la alternativa práctica/competente en nota.
  - 'El orden español se ajusta para leer con naturalidad, pero respeta el paralelismo del hebreo: ayuda interior // sabiduría apartada.'
