lexical_decisions:
- source_word: ὑμεῖς δέ
  english_pob_choice: But as for you
  chosen_korean: 그러나 ~ 여러분
  alternatives_korean:
  - 그러나 여러분으로서는
  - 한편 여러분은
  lexicon: BDAG
  rationale: 강조 대명사 + δέ의 대조를 호격 「형제 여러분」과 결합하여 자연스럽게 표현.
- source_word: ἀδελφοί
  english_pob_choice: brothers
