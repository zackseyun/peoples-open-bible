translation:
  language: es
  text: y la mitad de Galaad, y Astarot y Edrei, las ciudades del reino de Og en Basán[a], pertenecían a los hijos de Makir, hijo de Manasés, a la mitad de los hijos de Makir[b], según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ciudades reales de Og en Basán». El hebreo dice literalmente «las ciudades del reino de Og en Basán».
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Makir» puede referirse más ampliamente a los descendientes de Makir, pero la traducción conserva la formulación familiar del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַחֲצִי
  english_pob_choice: and half of
  chosen_spanish: y la mitad de
  alternatives_spanish:
  - y la mitad
  - y medio
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, חֲצִי se refiere naturalmente a una porción del territorio; «la mitad de» conserva la relación de asignación sin calco innecesario.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: HALOT
  rationale: Se usa la forma castellana establecida «Galaad» para el topónimo, manteniendo identificación clara y lectura fluida en español.
- source_word: עַשְׁתָּר֣וֹת
  english_pob_choice: Ashtaroth
  chosen_spanish: Astarot
  alternatives_spanish:
  - Ashtarot
  - Astharot
  lexicon: HALOT
  rationale: El topónimo se adapta a una transliteración española transparente y pronunciable, sin cambiar la referencia geográfica.
- source_word: וְאֶדְרֶעִי
  english_pob_choice: Edrei
  chosen_spanish: Edrei
  alternatives_spanish:
  - Edreí
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva una transliteración reconocible en español.
- source_word: עָרֵי מַמְלְכ֥וּת ע֖וֹג בַּבָּשָׁן
  english_pob_choice: the cities of the kingdom of Og in Bashan
  chosen_spanish: las ciudades del reino de Og en Basán
  alternatives_spanish:
  - las ciudades reales de Og en Basán
  - las ciudades del reino de Og en Basán
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y sobria. «Del reino de Og» preserva el vínculo genitivo sin forzar «ciudades reales», que podría sugerir una interpretación más específica que el hebreo no exige.
- source_word: לִבְנֵ֤י מָכִיר֙ בֶּן־מְנַשֶּׁה
  english_pob_choice: belonged to the sons of Machir son of Manasseh
  chosen_spanish: pertenecían a los hijos de Makir, hijo de Manasés
  alternatives_spanish:
  - eran para los hijos de Makir, hijo de Manasés
  - pertenecían a los descendientes de Makir, hijo de Manasés
  lexicon: HALOT
  rationale: El dativo de asignación se expresa idiomáticamente con «pertenecían a». Se conserva la forma familiar «hijos de» que POB retiene por transparencia, en vez de generalizar a «descendientes».
- source_word: לַחֲצִ֥י בְנֵֽי מָכִ֖יר
  english_pob_choice: to half of the sons of Machir
  chosen_spanish: a la mitad de los hijos de Makir
  alternatives_spanish:
  - para la mitad de los hijos de Makir
  - a la mitad de los descendientes de Makir
  lexicon: HALOT
  rationale: La frase precisa que solo una mitad de la línea de Makir está en vista. Se mantiene el paralelismo con el hebreo y con la decisión inglesa de no introducir «tribu».
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - de acuerdo con sus clanes
  lexicon: HALOT
  rationale: En textos de reparto territorial, מִשְׁפָּחוֹת designa divisiones clánicas; «clanes» es más preciso que «familias» en español y conserva el valor administrativo-genealógico.
theological_decisions:
- issue: Naturaleza del reparto territorial y fórmula de asignación
  english_pob_reading: belonged to / according to their clans
  chosen_spanish_reading: pertenecían a ... según sus clanes
  alternative_spanish_readings:
  - eran para ... según sus familias
  - fueron asignadas a ...
  rationale: El hebreo presenta una cláusula de asignación territorial sin verbo explícito; «pertenecían a» comunica el resultado del reparto sin añadir una acción inexistente en el texto. «Según sus clanes» conserva la organización covenantal-administrativa del reparto tribal.
  doctrine_reference: Josué 13:31; distribución de la tierra por Yahvé mediante Josué
translation_notes:
  revision_awareness: Se siguió el pasaje base hebreo (WLC) y el audit trail inglés POB, sin revisiones aplicadas en la última pasada; la redacción española preserva la misma estructura de reparto y las mismas alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - 'Se mantiene la distinción entre topónimos transliterados y términos comunes: Galaad/Basán frente a «clanes».'
  - «Hijos de Makir» conserva la transparencia genealógica del hebreo, en paralelo con la decisión inglesa de no expandir a «descendientes» en el texto principal.
