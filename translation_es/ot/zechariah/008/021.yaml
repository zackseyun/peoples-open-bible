translation:
  language: es
  text: 'Y los habitantes de una ciudad irán a otra, diciendo: «Vayamos de inmediato[a] a implorar el favor[b] de Yahvé y a buscar a Yahvé de los ejércitos». «Yo también iré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vayamos ya» o «Vamos, vayamos»; el hebreo usa una construcción enfática («vayamos, yendo») para intensificar la invitación.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a implorar el rostro de Yahvé», un modismo que significa buscar su favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  english_pob_choice: will go
  chosen_spanish: irán
  alternatives_spanish:
  - caminarán
  - se pondrán en camino
  lexicon: HALOT
  rationale: El verbo de movimiento en discurso profético futuro se expresa naturalmente con «irán» en español. «Caminarán» sería más literal pero menos idiomático aquí, donde el contexto es desplazarse de una ciudad a otra.
- source_word: יֹשְׁבֵי אַחַת אֶל אַחַת
  english_pob_choice: the inhabitants of one city ... to another
  chosen_spanish: los habitantes de una ciudad ... a otra
  alternatives_spanish:
  - los moradores de una ciudad ... a otra
  - los residentes de una ciudad ... a otra
  lexicon: HALOT
  rationale: «Habitantes» corresponde bien a יֹשְׁבֵי. El sentido distributivo de «una ... a otra» se conserva sin forzar una explicación adicional, y en español la mención explícita de «ciudad» resulta natural por el contexto.
- source_word: נֵלְכָה הָלוֹךְ
  english_pob_choice: Let us go at once
  chosen_spanish: Vayamos[a]
  alternatives_spanish:
  - Vayamos de inmediato
  - Vamos, vayamos
  lexicon: HALOT
  rationale: La construcción enfática hebrea se reduce en español a una exhortación breve y viva. Se conserva el impulso invitacional sin sobrecargar con una paráfrasis; el detalle de la fuerza intensiva queda explicado en la nota.
- source_word: לְחַלּוֹת אֶת פְּנֵי יְהוָה
  english_pob_choice: to entreat the favor of Yahweh
  chosen_spanish: a implorar el favor[b] de Yahvé
  alternatives_spanish:
  - a pedir el favor de Yahvé
  - a suplicar ante Yahvé
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática con «la faz/rostro de Yahvé». En español, «implorar el favor» comunica bien la función idiomática sin perder el matiz relacional de búsqueda de benevolencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma establecida en el texto español base del POB.
- source_word: וּלְבַקֵּשׁ אֶת יְהוָה צְבָאוֹת
  english_pob_choice: and to seek Yahweh of hosts
  chosen_spanish: y a buscar a Yahvé de los ejércitos
  alternatives_spanish:
  - y a buscar a Yahvé de los ejércitos celestiales
  - y a buscar a Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: «Buscar» reproduce bien בקשׁ. «De los ejércitos» preserva el título צְבָאוֹת sin interpretarlo demasiado; en español suena más sobrio y fiel que una expansión explicativa en el cuerpo del texto.
- source_word: אֵלְכָה גַּם אָנִי
  english_pob_choice: I too will go
  chosen_spanish: Yo también iré
  alternatives_spanish:
  - Iré yo también
  - Yo también voy
  lexicon: HALOT
  rationale: La respuesta breve y enfática se expresa con un futuro simple natural en español. El orden «Yo también» reproduce bien גַּם אָנִי y mantiene el tono personal de adhesión.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión del POB de representar el Tetragrámaton con un nombre propio transliterado, no con una sustitución titulada. «Yahvé» es la forma española consistente con el proyecto y preserva la referencia personal del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of צְבָאוֹת in the divine title
  english_pob_reading: the LORD of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  rationale: «De los ejércitos» mantiene el peso del título sin traducirlo por una forma que desplace el sentido hacia una sola esfera. En español, esta opción conserva tanto la solemnidad como la amplitud del título.
  doctrine_reference: Título divino tradicional con equivalencia semántica conservadora
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió «go at once» sobre una paráfrasis más marcada. En español se optó por una solución equivalente y breve («Vayamos») con nota explicativa para conservar la fuerza enfática del infinitivo absoluto sin añadir material innecesario al texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se traduce צְבָאוֹת como «de los ejércitos» en coherencia con el tono del título divino y con el registro del POB.
  - Se conserva un registro bíblico moderno y digno, evitando arcaismos innecesarios como «Jehová» o «huestes» en el cuerpo principal.
  - La puntuación con comillas españolas y la ubicación de las notas siguen las convenciones editoriales del proyecto.
