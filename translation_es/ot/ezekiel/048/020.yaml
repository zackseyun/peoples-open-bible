translation:
  language: es
  text: La contribución total será de veinticinco mil por veinticinco mil[a]; apartarán la contribución santa como un cuadrado[b], junto con la posesión de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «veinticinco mil codos por veinticinco mil codos», si aquí se suple la unidad de medida del contexto circundante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «apartarán la contribución santa como una cuarta parte de la posesión de la ciudad».'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּרוּמָה / תְּרוּמַת
  english_pob_choice: contribution / contribution
  chosen_spanish: contribución / contribución
  alternatives_spanish:
  - ofrenda
  - porción apartada
  - ofrenda alzada
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, el término no se refiere a un sacrificio del altar sino a una porción separada del total. «Contribución» conserva la idea de algo apartado y destinado, sin introducir connotaciones cultuales ajenas al pasaje.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף ... בַּחֲמִשָּׁה וְעֶשְׂרִים אָלֶף
  english_pob_choice: twenty-five thousand by twenty-five thousand
  chosen_spanish: veinticinco mil por veinticinco mil
  alternatives_spanish:
  - veinticinco mil codos por veinticinco mil codos
  lexicon: HALOT
  rationale: El hebreo da las dimensiones numéricas sin repetir aquí la unidad. En español, «por» expresa de forma natural las medidas de un área. La unidad de medida permanece implícita en el texto principal, como en el audit trail inglés.
- source_word: רְבִיעִית
  english_pob_choice: as a square
  chosen_spanish: como un cuadrado
  alternatives_spanish:
  - como una cuarta parte
  - como un cuadrado de cuatro lados
  lexicon: HALOT
  rationale: Sigo la revisión del POB que entendió רְבִיעִית como una forma cuadrada / de cuatro lados, no como «cuarta parte». En español, «como un cuadrado» comunica esa figura geométrica de manera clara y sobria.
- source_word: תָּרִימוּ
  english_pob_choice: you shall set apart
  chosen_spanish: apartarán
  alternatives_spanish:
  - levantarán
  - ofrecerán
  - separarán
  lexicon: HALOT
  rationale: El hifil de רום con תְּרוּמָה aquí expresa la acción de reservar o separar una porción. «Apartarán» comunica la función administrativa del mandato sin sugerir un gesto físico de alzar.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  - consagrada
  lexicon: HALOT
  rationale: «Santa» mantiene el registro bíblico normal en español y expresa pertenencia al ámbito de Dios. «Sagrada» o «consagrada» serían posibles, pero menos directas aquí.
- source_word: אֶל
  english_pob_choice: as
  chosen_spanish: como / junto con
  alternatives_spanish:
  - para
  - hacia
  - en relación con
  lexicon: HALOT
  rationale: El hebreo une la porción santa con la posesión de la ciudad mediante una relación idiomática que no conviene volver rígida con un simple «a». Dado el ajuste revisado del POB, «junto con» mantiene la conexión sin convertirla en una posesión genitiva de la ciudad.
- source_word: אֲחֻזַּת הָעִיר
  english_pob_choice: the property's city / the city's property
  chosen_spanish: la posesión de la ciudad
  alternatives_spanish:
  - la propiedad de la ciudad
  - la heredad de la ciudad
  - la tenencia de la ciudad
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una posesión o tenencia territorial. «Posesión» es más preciso que «propiedad» para este reparto de tierra y preserva el tono técnico del pasaje.
theological_decisions:
- issue: 'Sentido de רְבִיעִית: geometría o fracción'
  english_pob_reading: holy contribution as a square, together with the property of the city
  chosen_spanish_reading: la contribución santa como un cuadrado, junto con la posesión de la ciudad
  alternative_spanish_readings:
  - la contribución santa como una cuarta parte de la posesión de la ciudad
  - la contribución santa como una porción cuadrada
  rationale: La revisión inglesa decidió abandonar «quarter» y adoptar «square», señalando una lectura geométrica de רְבִיעִית. Por fidelidad al audit trail, la versión española refleja esa decisión principal y no reintroduce la lectura fraccional en el texto base.
  doctrine_reference: no aplica
- issue: Relación entre la contribución santa y la posesión de la ciudad
  english_pob_reading: together with the property of the city
  chosen_spanish_reading: junto con la posesión de la ciudad
  alternative_spanish_readings:
  - para la posesión de la ciudad
  - con la posesión de la ciudad
  rationale: El hebreo אֶל, en este contexto, fue revisado en inglés para evitar una genitividad posesiva implícita. «Junto con» conserva la relación de adición o asociación sin afirmar que la ciudad posea esa porción santa en sentido genitivo.
  doctrine_reference: no aplica
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó este versículo para leer la porción santa como «a square, together with the property of the city», en lugar de «a quarter of the city's property». La propuesta española sigue esa revisión y evita reintroducir la lectura fraccional descartada, manteniendo además la distinción técnica de תְּרוּמָה como porción apartada.
  spanish_consistency_notes:
  - Se conserva «contribución» para תְּרוּמָה de manera uniforme con el criterio lexicográfico del POB, sin cargarlo con matiz sacrificial.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el Tetragrámaton.
  - La medida queda implícita en el texto principal, con la alternativa explícita en la nota.
  - «Posesión» se usa para אֲחֻזָּה en vez de «propiedad» por mayor precisión territorial en este contexto de reparto.
  - El adjetivo «santa» mantiene el registro bíblico y evita la neutralización de la consagración implícita en הַקֹּדֶשׁ.
