translation:
  language: es
  text: Si un hombre peca contra su prójimo, y se le hace prestar un juramento[a], y viene, y el juramento está delante de tu altar en esta casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se le impone un juramento con maldición’ / ‘se le pone bajo un juramento con maldición’. El término hebreo puede denotar un juramento acompañado de maldición si se viola el juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: Introduce una condición simple y natural en español, conservando el valor hipotético del hebreo.
- source_word: יֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - hace mal
  - comete pecado
  lexicon: HALOT
  rationale: ‘Peca’ preserva la fuerza moral/religiosa del verbo hebreo mejor que un simple ‘hace mal’.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa masculino singular; ‘un hombre’ refleja ese dato de forma directa y clara.
- source_word: לְרֵעֵהוּ
  english_pob_choice: against his neighbor
  chosen_spanish: contra su prójimo
  alternatives_spanish:
  - contra su vecino
  - contra su compañero
  lexicon: HALOT
  rationale: ‘Prójimo’ comunica bien la relación interpersonal cercana y suena natural en español bíblico moderno.
- source_word: וְנָשָׁא ב֥וֹ אָלָה
  english_pob_choice: and is made to take an oath
  chosen_spanish: y se le hace prestar juramento
  alternatives_spanish:
  - y se le impone un juramento
  - y se le pone bajo juramento
  lexicon: HALOT
  rationale: La construcción causativa se expresa con naturalidad en español; ‘prestar juramento’ mantiene el acto formal sin reducirlo a mera ‘maldición’.
- source_word: לְהַאֲלֹתוֹ
  english_pob_choice: to make him swear
  chosen_spanish: prestar juramento
  alternatives_spanish:
  - hacer jurar
  - poner bajo juramento
  lexicon: HALOT
  rationale: El infinitivo causativo se traduce con una perífrasis idiomática. En contexto jurídico-litúrgico, ‘prestar juramento’ es claro y fiel.
- source_word: וּבָא
  english_pob_choice: and he comes
  chosen_spanish: y viene
  alternatives_spanish:
  - y llega
  - y entra
  lexicon: HALOT
  rationale: ‘Viene’ reproduce el verbo simple de movimiento sin añadir detalles no presentes en el hebreo.
- source_word: אָלָה
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - la maldición-juramento
  - el juramento con maldición
  lexicon: HALOT
  rationale: En el flujo de la frase española, ‘juramento’ es el término más natural; la posible carga de sanción queda preservada en la nota.
- source_word: לִפְנֵי מִזְבַּחֲךָ
  english_pob_choice: before your altar
  chosen_spanish: delante de tu altar
  alternatives_spanish:
  - en presencia de tu altar
  - ante tu altar
  lexicon: HALOT
  rationale: ‘Delante de tu altar’ conserva el sentido espacial y judicial de la expresión hebrea.
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: in this house
  chosen_spanish: en esta casa
  alternatives_spanish:
  - en este templo
  lexicon: HALOT
  rationale: ‘Casa’ reproduce literalmente בַּיִת y mantiene la resonancia teológica del texto.
theological_decisions:
- issue: Sentido legal de אָלָה
  english_pob_reading: Rendered primarily as 'oath' in the main text, with curse-sanction nuance preserved in a footnote.
  chosen_spanish_reading: Renderizado principalmente como ‘juramento’ en el texto principal, con la matización de juramento acompañado de maldición preservada en nota.
  alternative_spanish_readings:
  - maldición
  - juramento-malición
  - juramento con maldición
  rationale: En este contexto judicial, el término incluye la idea de un juramento sancionado por una maldición si se quebranta. ‘Juramento’ mantiene la fluidez, y la nota evita perder la tensión semántica documentada.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive tension where ambiguity is genuine.
translation_notes:
  revision_awareness: Se reflejó la revisión inglesa que prefirió una formulación más natural para la causativa (‘is made to take an oath’). En español, la solución equivalente es ‘se le hace prestar juramento’, que evita redundancia y conserva el sentido causativo.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como forma por defecto para el nombre divino, pero este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ como sustituto, ya que el texto no incluye el nombre divino explícito.
  - ‘Casa’ se conservó frente a ‘templo’ para respetar el hebreo בַּיִת.
  - La nota [a] está anclada en el término ‘juramento’ para evitar ambigüedad de validación.
