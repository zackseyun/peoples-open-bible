translation:
  language: es
  text: Ahora, todos los pozos que habían cavado los siervos de su padre en los días de Abraham su padre[a][b], los filisteos los taparon y los llenaron de tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los esclavos de su padre». El hebreo עֶבֶד puede referirse a un siervo o a un esclavo; aquí el contexto no exige destacar la condición de esclavitud.
    reason: lexical_alternative
  - marker: b
    text: O «los llenaron de polvo». El hebreo עָפָר puede denotar tierra suelta, polvo o suelo, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: Now all
  chosen_spanish: Ahora, todos
  alternatives_spanish:
  - Y todos
  - Todos
  lexicon: HALOT
  rationale: El וְ inicial enlaza con el relato anterior; «Ahora» da flujo discursivo natural en español sin perder la continuidad. כָל se mantiene con «todos» para conservar el valor totalizador.
- source_word: הַבְּאֵרֹת
  english_pob_choice: the wells
  chosen_spanish: los pozos
  alternatives_spanish:
  - los pozos de agua
  - las cisternas
  lexicon: HALOT
  rationale: בְּאֵרֹת designa pozos; «pozos» es el equivalente natural y suficientemente preciso en español.
- source_word: אֲשֶׁר חָפְרוּ
  english_pob_choice: that ... had dug
  chosen_spanish: que habían cavado
  alternatives_spanish:
  - que cavaron
  - que habían excavado
  lexicon: HALOT
  rationale: El pluscuamperfecto «habían cavado» sitúa la acción anterior a la de los filisteos. «Cavar» transmite bien la acción concreta de abrir pozos.
- source_word: עַבְדֵי אָבִיו
  english_pob_choice: his father's servants
  chosen_spanish: los siervos de su padre
  alternatives_spanish:
  - los esclavos de su padre
  - los servidores de su padre
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede significar esclavo o siervo, aquí el contexto no exige subrayar la condición jurídica de esclavitud. «Siervos» conserva dependencia y pertenencia sin introducir una dureza no explicitada por el contexto narrativo.
- source_word: בִּימֵי אַבְרָהָם אָבִיו
  english_pob_choice: in the days of Abraham his father
  chosen_spanish: en los días de Abraham, su padre
  alternatives_spanish:
  - durante la vida de Abraham, su padre
  - en tiempos de Abraham, su padre
  lexicon: HALOT
  rationale: La fórmula idiomática se reproduce de manera directa con «en los días de», manteniendo la referencia temporal y la repetición filial del hebreo.
- source_word: סִתְּמוּם
  english_pob_choice: stopped up
  chosen_spanish: los taparon
  alternatives_spanish:
  - los obstruyeron
  - los cerraron
  lexicon: HALOT
  rationale: El verbo expresa bloquear o cerrar un pozo; «los taparon» es la forma natural en español para un pozo obstruido y conserva la concreción del acto.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Transliteración usual en español para este pueblo.
- source_word: וַיְמַלְאוּם עָפָר
  english_pob_choice: and filled them with earth
  chosen_spanish: y los llenaron de tierra
  alternatives_spanish:
  - y los llenaron de polvo
  - y los llenaron de polvo y tierra
  lexicon: HALOT
  rationale: עָפָר puede ser tierra, polvo o suelo según el contexto. «Tierra» ofrece un registro formal y cercano al valor del término en este pasaje. Se mantiene el pronombre objeto «los» para reflejar el sufijo hebreo.
translation_notes:
  revision_awareness: 'La versión en inglés pasó por ajustes menores de claridad y registro, en particular la restauración del pronombre objeto explícito y el cambio de ''dirt'' a ''earth''. La redacción española refleja esas decisiones: conserva el objeto pronominal y emplea «tierra» como equivalente formal y natural de עָפָר.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se usa «siervos» en lugar de «esclavos» porque el contexto narrativo no exige enfatizar servidumbre forzada.
  - Se mantiene una puntuación que separa con claridad el inciso temporal de Abraham, su padre.
  - Las notas quedan ancladas explícitamente en la frase final «tierra[a][b][c]», por lo que todos los marcadores aparecen en el texto.
