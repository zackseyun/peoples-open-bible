id: MAT.21.19
reference: Matthew 21:19
source:
  edition: SBLGNT
  text: καὶ ἰδὼν συκῆν μίαν ἐπὶ τῆς ὁδοῦ ἦλθεν ἐπ’ αὐτήν, καὶ οὐδὲν εὗρεν ἐν αὐτῇ εἰ μὴ φύλλα μόνον, καὶ λέγει αὐτῇ· ⸀Μηκέτι ἐκ σοῦ καρπὸς γένηται εἰς τὸν αἰῶνα· καὶ ἐξηράνθη παραχρῆμα ἡ συκῆ.
translation:
  text: And seeing a fig tree by the road[a], he came up to it and found nothing on it except leaves alone. And he said to it, “May there no longer ever be fruit from you.” And the fig tree withered at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “May no fruit ever come from you again.”
    reason: lexical_alternative
lexical_decisions:
- source_word: συκῆν μίαν
  chosen: a fig tree
  alternatives:
  - one fig tree
  - a single fig tree
  lexicon: BDAG
  rationale: μίαν can be rendered explicitly as 'one/single,' but in idiomatic English with an indefinite noun it often functions simply to introduce the object. 'A fig tree' is natural English while preserving the sense.
- source_word: ἐπὶ τῆς ὁδοῦ
  chosen: by the road
  alternatives:
  - on the road
  - beside the road
  lexicon: BDAG
  rationale: With a stationary object, ἐπί with the genitive here is best rendered locatively. 'By the road' is idiomatic and fits the scene better than the more wooden 'on the road.'
- source_word: ἦλθεν ἐπ’ αὐτήν
  chosen: he came up to it
  alternatives:
  - he came to it
  - he went up to it
  lexicon: BDAG
  rationale: The combination of ἔρχομαι with ἐπί toward an object suggests approach. 'Came up to it' conveys movement toward the tree in natural English.
- source_word: οὐδὲν εὗρεν ἐν αὐτῇ
  chosen: found nothing on it
  alternatives:
  - found nothing in it
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' English idiom for fruit/leaves on a tree prefers 'on it.' This is an optimal-equivalence adjustment for naturalness without changing sense.
- source_word: εἰ μὴ φύλλα μόνον
  chosen: except leaves alone
  alternatives:
  - except only leaves
  - except leaves only
  lexicon: BDAG
  rationale: 'The phrase is emphatic: nothing except leaves, and leaves only. ''Except leaves alone'' preserves the emphasis, though slightly marked, better than a flatter rendering.'
- source_word: λέγει αὐτῇ
  chosen: he said to it
  alternatives:
  - he says to it
  lexicon: BDAG
  rationale: λέγει is present tense in a historical narrative (historical present). English commonly smooths this to past tense for readability while preserving narrative force.
- source_word: Μηκέτι
  chosen: no longer ever
  alternatives:
  - never again
  - no longer
  lexicon: BDAG
  rationale: Μηκέτι means 'no longer' or 'no more'; in this curse context, combined with εἰς τὸν αἰῶνα, it yields the force of permanent cessation. 'No longer ever' preserves both elements, though the smoother idiom 'never again' is possible.
- source_word: ἐκ σοῦ καρπὸς γένηται
  chosen: be fruit from you
  alternatives:
  - come from you fruit
  - grow from you fruit
  - you bear fruit
  lexicon: BDAG
  rationale: γένηται with καρπός and ἐκ σοῦ is literally 'may fruit come/be from you.' Rendering it this way preserves the source imagery better than the more interpretive 'you bear fruit.'
- source_word: εἰς τὸν αἰῶνα
  chosen: ever
  alternatives:
  - forever
  - for the age
  lexicon: BDAG
  rationale: In this idiom, εἰς τὸν αἰῶνα expresses enduring permanence. 'Ever' works naturally with 'no longer' in English; 'forever' is also possible. 'For the age' would be too wooden here.
- source_word: ἐξηράνθη
  chosen: withered
  alternatives:
  - dried up
  - was dried up
  lexicon: BDAG
  rationale: For a tree, 'withered' is the most natural English equivalent and matches the semantic domain of becoming dried up.
- source_word: παραχρῆμα
  chosen: at once
  alternatives:
  - immediately
  - instantly
  lexicon: BDAG
  rationale: '''At once'' is clear modern English and preserves the immediacy of the adverb.'
