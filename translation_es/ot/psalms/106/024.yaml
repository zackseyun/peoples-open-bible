    issue: «no creyeron su palabra» omite la preposición esperable en español
    rationale: Aunque se entiende, en español estándar y bíblico suena más natural «no creyeron en su palabra» o «no le creyeron». Esto preserva mejor la construcción de fe/confianza del hebreo sin calco inglés.
  - severity: low
    issue: «tierra agradable» suena algo plano para חֶמְדָּה
    rationale: «Agradable» es comprensible, pero en este contexto de la tierra prometida resulta menos expresivo que «deleitosa» o «deseable». «Deleitosa» además coincide con una alternativa ya documentada y se lee con dignidad eclesial.
  revised_spanish_text: Entonces despreciaron la tierra deleitosa[a]; no creyeron en su palabra[b].
