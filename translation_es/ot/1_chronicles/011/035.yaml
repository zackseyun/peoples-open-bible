translation:
  language: es
  text: Ahiam, hijo de Sachar, el hararita[a], Elifal, hijo de Ur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «descendiente de» en cada ocurrencia de «hijo de», aunque la filiación inmediata es el sentido más natural en este registro militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִיאָם
  english_pob_choice: Ahiam
  chosen_spanish: Ahiam
  alternatives_spanish:
  - Ahián
  lexicon: nombre propio
  rationale: Es un nombre propio masculino; se translitera, no se traduce. Mantengo la forma más cercana al nombre del hebreo y al audit trail inglés.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En este registro militar, la filiación inmediata es la lectura más natural; en español, «hijo de» expresa esa relación de manera directa y natural. «Descendiente de» queda como alternativa más amplia.
- source_word: שָׂכָר
  english_pob_choice: Sachar
  chosen_spanish: Sachar
  alternatives_spanish:
  - Sacar
  lexicon: nombre propio
  rationale: Nombre propio transliterado. «Sachar» conserva la forma auditada en inglés y evita forzar una adaptación no atestiguada por el texto fuente.
- source_word: הַ/הֲרָרִי
  english_pob_choice: the Hararite
  chosen_spanish: el hararita
  alternatives_spanish:
  - el montañés
  - el hombre de Harar
  lexicon: HALOT
  rationale: La forma hebrea funciona como designación gentilicia o geográfica; en español, «hararita» preserva esa etiqueta sin expandir indebidamente el significado a una explicación interpretativa. Mantengo minúscula por ser un gentilicio común en el flujo del verso.
- source_word: אֱלִיפַל
  english_pob_choice: Eliphal
  chosen_spanish: Elifal
  alternatives_spanish:
  - Elipal
  lexicon: nombre propio
  rationale: Nombre propio transliterado al español. «Elifal» refleja la adaptación fonética normal en español y evita el calco gráfico del inglés cuando no es necesario.
- source_word: אֽוּר
  english_pob_choice: Ur
  chosen_spanish: Ur
  alternatives_spanish:
  - Aur
  lexicon: nombre propio
  rationale: Nombre propio transliterado. En este contexto es una persona, no la ciudad mesopotámica.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés de alta concordancia; no se reportan revisiones aplicadas ni cambios textuales adicionales.
  spanish_consistency_notes:
  - 'Se preserva el orden enumerativo del hebreo/inglés: dos miembros del listado unidos por coma.'
  - Se mantiene la transliteración de los nombres propios en forma breve y publicable.
  - El gentilicio «hararita» se usa como equivalente funcional de «Hararite», sin añadir explicación extratextual en el cuerpo del verso.
