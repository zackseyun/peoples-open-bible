translation:
  language: es
  text: Por eso sacrifica a su red y quema incienso a su trasmallo, porque por ellos su porción es rica[a] y su alimento es abundante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «su porción es grasa, y su alimento es rico/escogido». El hebreo usa la imagen de la gordura para expresar abundancia y prosperidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La frase marca consecuencia lógica respecto del contexto previo. «Por eso» conserva ese valor inferencial en español natural y digno.
- source_word: יְזַבֵּחַ
  english_pob_choice: he sacrifices
  chosen_spanish: sacrifica
  alternatives_spanish:
  - ofrece sacrificio
  - inmola
  lexicon: HALOT
  rationale: El piel de זבח aquí expresa acto sacrificial; «sacrifica» es fiel y no añade matices innecesarios.
- source_word: לְחֶרְמוֹ
  english_pob_choice: to his net
  chosen_spanish: a su red
  alternatives_spanish:
  - a su red de pesca
  lexicon: HALOT
  rationale: חֵרֶם designa una red de captura. «Red» mantiene la imagen sin sobreexplicar; «de pesca» sería contextual pero no estrictamente necesario.
- source_word: וִיקַטֵּר
  english_pob_choice: and burns incense
  chosen_spanish: quema incienso
  alternatives_spanish:
  - ofrece incienso
  - hace humear ofrenda
  lexicon: HALOT
  rationale: קטר en este contexto cultual-idolátrico se expresa con naturalidad como «quemar incienso», preservando la acción ritual.
- source_word: לְמִכְמַרְתּוֹ
  english_pob_choice: to his dragnet
  chosen_spanish: a su trasmallo
  alternatives_spanish:
  - a su red grande
  - a su red envolvente
  lexicon: HALOT
  rationale: מִכְמֶרֶת es una red más amplia o envolvente que חֵרֶם. «Trasmallo» permite diferenciarla de «red» en español y conservar la distinción léxica del hebreo.
- source_word: כִּי בָהֵמָּה
  english_pob_choice: because by them
  chosen_spanish: porque por ellos
  alternatives_spanish:
  - porque mediante ellos
  - pues por medio de ellos
  lexicon: HALOT
  rationale: 'La preposición con pronombre es instrumental: la prosperidad viene por medio de esos instrumentos. «Por ellos» mantiene esa causalidad instrumental.'
- source_word: שָׁמֵן חֶלְקוֹ
  english_pob_choice: his portion is rich
  chosen_spanish: su porción es rica
  alternatives_spanish:
  - su parte es gruesa
  - su heredad es abundante
  lexicon: HALOT
  rationale: שָׁמֵן literalmente significa «graso», pero aquí funciona metafóricamente como abundancia/prosperidad. «Rica» conserva la imagen con buena naturalidad en español.
- source_word: וּמַאֲכָלוֹ בְּרִיאָה
  english_pob_choice: and his food is plentiful
  chosen_spanish: y su alimento es abundante
  alternatives_spanish:
  - y su comida es copiosa
  - y su alimento es graso
  lexicon: HALOT
  rationale: בְּרִיאָה comunica lo robusto/pleno. En español, «abundante» expresa mejor el resultado de esa imagen de prosperidad sin volverla áspera.
theological_decisions:
- issue: Lenguaje cultual aplicado a medios de conquista/captura
  english_pob_reading: The verse is rendered straightforwardly as the conqueror worshiping his own means of success ('his net' and 'his dragnet').
  chosen_spanish_reading: 'El versículo presenta sin suavizar la imagen de un culto dirigido a sus propios instrumentos de éxito: su red y su trasmallo.'
  alternative_spanish_readings:
  - Puede entenderse solo como confianza excesiva en su poder.
  - Puede reducirse a una metáfora de autosuficiencia sin sentido cultual.
  rationale: El hebreo usa terminología sacrificial e incienso de forma explícita, por lo que la traducción debe conservar la dimensión idolátrica y no rebajarla a mera confianza abstracta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa POB y la revisión más reciente concuerdan plenamente; no se registraron cambios aplicados. Se mantuvo la lectura cultual/idolátrica del texto y la nota alternativa sobre la imagen de gordura/abundancia.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija; este versículo no lo contiene.
  - «Red» y «trasmallo» se usaron para reflejar la distinción entre חֶרֶם y מִכְמֶרֶת.
  - Se conservó la metáfora de abundancia en lugar de normalizarla completamente, para respetar la tensión léxica del hebreo.
