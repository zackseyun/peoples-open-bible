translation:
  language: es
  text: ¿Tienes hijos? Disciplínalos[a], y consígueles esposas en su juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¿Tienes hijos? Disciplínalos, y dobla su cuello desde la juventud». El testimonio hebreo, en cambio, lee: «…y consígueles esposas en su juventud».'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: El hebreo בָּנִים puede significar 'hijos' en general, y en español 'hijos' funciona de manera natural sin perder la referencia masculina que ya queda implícita por la segunda mitad del versículo. Dado que la lectura hebrea continúa con la provisión de esposa, el contexto mantiene la orientación familiar/matrimonial sin necesidad de forzar 'varones' en el cuerpo del texto.
- source_word: יַסֵּר
  english_pob_choice: discipline
  chosen_spanish: corrígelos
  alternatives_spanish:
  - disciplínalos
  - repréndelos
  - instrúyelos
  lexicon: HALOT
  rationale: יסר expresa corrección formativa y disciplinaria. 'Corrígelos' conserva la fuerza de intervención educativa y resulta más natural en español que un calco como 'disciplínalos', aunque esta última opción sea viable. Se evita 'repréndelos' porque estrecha demasiado el alcance, y 'instrúyelos' porque suaviza la idea de corrección.
- source_word: וְשָׂא לָהֶם נָשִׁים
  english_pob_choice: get wives for them
  chosen_spanish: consigue para ellos esposa
  alternatives_spanish:
  - busca para ellos esposa
  - arréglales esposa
  - consígueles esposas
  lexicon: HALOT
  rationale: El hebreo con נשׂא + נשים apunta a procurarles matrimonio, no simplemente a casarlos en sentido genérico. 'Consigue para ellos esposa' expresa bien la acción de proveer o gestionar ese matrimonio. Se usa el singular 'esposa' como sustantivo colectivo/representativo en español, pero se señala la posibilidad plural en alternativas para no ocultar la pluralidad implícita del hebreo.
- source_word: בִּנְעוּרֵיהֶם
  english_pob_choice: in their youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - desde su juventud
  - cuando aún son jóvenes
  - en la flor de su juventud
  lexicon: HALOT
  rationale: La frase indica el período juvenil. 'En su juventud' es idiomático, claro y fiel. Se evita 'desde su juventud' en el cuerpo porque puede sugerir una acción que arranca demasiado pronto respecto del verbo principal, aunque esa posibilidad queda preservada en la nota sobre la lectura griega.
theological_decisions:
- issue: Desacuerdo entre el hebreo preservado y el paralelo griego en la segunda cola
  english_pob_reading: 'Follow the Hebrew: ''get wives for them in their youth'''
  chosen_spanish_reading: 'Seguir el hebreo: ''consigue para ellos esposa en su juventud'''
  alternative_spanish_readings:
  - 'Seguir el griego: ''y dobla su cuello desde la juventud'''
  - '''y somete su cuello desde la juventud'''
  rationale: La política del proyecto da prioridad al hebreo donde se conserva con suficiente seguridad. El griego ofrece una tradición paralela distinta, no una simple variación menor, por lo que no debe ocultarse. La traducción principal sigue el hebreo y la nota mantiene visible la alternativa griega para que el lector perciba la tensión textual real.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando sobrevive; DOCTRINE.md: preservar la tensión textual e interpretativa sin resolverla silenciosamente.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta ningún cambio; se mantiene la decisión de base: texto principal según el hebreo y nota explícita del paralelo griego.'
  spanish_consistency_notes:
  - Se mantiene un español moderno y digno, evitando el arcaismo innecesario.
  - '''Hijos'' se usa con naturalidad en español, mientras que el contexto y la nota aclaran la orientación masculina del hebreo.'
  - La nota conserva la tensión hebreo/griego en vez de armonizarla artificialmente.
  - El marcador [a] está anclado en el término afectado del texto principal, conforme a las instrucciones del proyecto.
