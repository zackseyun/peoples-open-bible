base_translation:
  language: en
  yaml_path: translation/ot/proverbs/030/004.yaml
  text: Who has gone up to heaven and come down? Who has gathered the wind in his fists? Who has wrapped the waters in a garment? Who has established all the ends of the earth? What is his name[a], and what is his son's name[c][b], if you know?
  footnotes:
  - marker: a
    text: Or 'the heavens.' Hebrew שָׁמַיִם is formally plural.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''if you know.'' The Hebrew can be taken as an ironic challenge: ''if you know.'''
    reason: lexical_alternative
  - marker: c
    text: Christian interpretation has often seen significance in 'his son's name,' but the Hebrew text itself does not explicitly identify the son.
    reason: cross_reference
