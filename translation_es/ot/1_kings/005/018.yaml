translation:
  language: es
  text: Pero ahora Yahvé, mi Dios, me ha dado reposo por todos lados; no hay adversario[a] ni desgracia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oponente». El hebreo שָׂטָן aquí es un sustantivo común, no necesariamente el nombre propio «Satanás».
    reason: lexical_alternative
  - marker: b
    text: O «calamidad», «desastre» o «suceso malo». La expresión hebrea denota un acontecimiento dañino o adverso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La partícula introduce un contraste con la situación previa; en español, «Pero ahora» conserva ese valor adversativo y suena natural y solemne.
- source_word: הֵנִיחַ
  english_pob_choice: has given me rest
  chosen_spanish: me ha dado reposo
  alternatives_spanish:
  - me ha dado descanso
  - me ha hecho descansar
  - me ha concedido reposo
  lexicon: HALOT
  rationale: El hifil de נוח expresa causar reposo o descanso. «Me ha dado reposo» mantiene el sentido causativo y resulta claro en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva la referencia al Nombre propio del pacto y es idiomático en español de este registro.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: La construcción posesiva es directa y personal; «mi Dios» conserva la confesión de relación sin añadir exclamación.
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: Con הֵנִיחַ, el dativo de beneficio en español se expresa naturalmente con «me»; «para mí» sería más perifrástico.
- source_word: מִסָּבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - de todos lados
  - en derredor
  lexicon: HALOT
  rationale: La expresión espacial indica ausencia de amenaza circundante. «Por todos lados» comunica con claridad el alcance total del reposo sin caer en arcaísmo.
- source_word: אֵין
  english_pob_choice: there is neither
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no queda
  lexicon: HALOT
  rationale: En la segunda parte del paralelismo, el español fluye mejor con una negación simple. La coordinación posterior mantiene el valor de «ni... ni...» implícito.
- source_word: שָׂטָן
  english_pob_choice: adversary
  chosen_spanish: adversario
  alternatives_spanish:
  - oponente
  - enemigo
  lexicon: HALOT
  rationale: Aquí שָׂטָן funciona como sustantivo común, no como nombre propio. «Adversario» preserva la fuerza de oposición y evita importar la lectura del Satanás personal.
- source_word: פֶּגַע רָע
  english_pob_choice: evil occurrence
  chosen_spanish: calamidad maligna
  alternatives_spanish:
  - desgracia
  - suceso malo
  - adversidad
  lexicon: HALOT
  rationale: La frase designa un golpe, daño o acontecimiento nocivo. «Calamidad maligna» intenta reflejar tanto el sustantivo de daño como el calificativo רָע, manteniendo la tensión semántica sin reducirlo solo a un desastre natural.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera explícita. Conforme al criterio del proyecto, se traduce con el Nombre propio del pacto, no con una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de שָׂטָן
  english_pob_reading: common noun 'adversary'
  chosen_spanish_reading: adversario
  alternative_spanish_readings:
  - Satanás
  - oponente
  rationale: El contexto trata de paz política y ausencia de oposición, no de un ser personal demoníaco. Traducirlo como «Satanás» añadiría una identificación que el hebreo aquí no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Sentido de פֶּגַע רָע
  english_pob_reading: evil occurrence
  chosen_spanish_reading: calamidad maligna
  alternative_spanish_readings:
  - desgracia
  - desastre
  - suceso dañino
  rationale: La combinación apunta a un acontecimiento dañino o un golpe adverso. La versión española conserva el alcance amplio y la dureza del giro, sin limitarlo a una sola clase de infortunio.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión más reciente, que no introdujo cambios. La versión española conserva la decisión contextual sobre שָׂטָן como sustantivo común y mantiene abierta la amplitud semántica de פֶּגַע רָע mediante una nota léxica.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene «adversario» para שָׂטָן en sentido común, evitando el nombre propio.
  - Se traduce la clausula negativa final con una estructura natural en español sin perder el paralelismo hebreo.
  - No se emplea «SEÑOR» como máscara del Nombre divino.
