    text: Or 'as a statute for Israel' or 'a decree for Israel.' The Hebrew עֵדוּת can denote testimony/witness or an established covenantal ordinance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Yah,' the short poetic form of the divine name, distinct in form from the later 'the LORD' (YHWH) in this verse.
    reason: cultural_note
