translation:
  language: es
  text: Así que da a tu siervo un corazón que escucha[a], para juzgar a tu pueblo, para discernir entre lo bueno y lo malo; porque ¿quién podrá juzgar a este gran pueblo tuyo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un corazón de entendimiento»; literalmente, «un corazón que oye/escucha».
    reason: lexical_alternative
  - marker: b
    text: «Gran» traduce un hebreo que literalmente significa «pesado» o «de mucho peso»; aquí expresa la importancia o magnitud del pueblo y la carga de gobernarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  english_pob_choice: So give
  chosen_spanish: Así que da
  alternatives_spanish:
  - Y da
  - Por tanto, da
  lexicon: HALOT
  rationale: El waw con valor consecutivo en esta oración funciona como petición que brota del contexto anterior. «Así que da» conserva la relación lógica y suena natural en español sin perder el tono de súplica.
- source_word: לְעַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En el discurso de Salomón a Dios, עבד es una fórmula humilde de autoidentificación. En español, «siervo» comunica mejor ese uso reverente que «esclavo», que aquí sonarí­a demasiado fuerte y poco natural.
- source_word: לֵב שֹׁמֵעַ
  english_pob_choice: a listening heart
  chosen_spanish: un corazón que escucha
  alternatives_spanish:
  - un corazón entendimiento
  - un corazón oyente
  - un corazón que oye
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «un corazón que oye/escucha». «Corazón que escucha» preserva la metáfora y la antropología bíblica del corazón como centro de percepción y respuesta, sin imponer de entrada la interpretación más explicativa «entendimiento».
- source_word: לִשְׁפֹּט
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - gobernar
  - administrar justicia
  lexicon: HALOT
  rationale: שפט incluye la función judicial y, por extensión, la de gobierno. Aquí «juzgar» mantiene el núcleo léxico y deja visible el marco de discernimiento y gobierno real implícito en el contexto.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: Es la equivalencia directa de עם con sufijo de segunda persona. «Tu pueblo» mantiene tanto el matiz político como el de pertenencia/covenio.
- source_word: לְהָבִין
  english_pob_choice: to discern
  chosen_spanish: discernir
  alternatives_spanish:
  - entender
  - percibir
  lexicon: HALOT
  rationale: El hifil de בין expresa capacidad de distinguir con juicio. «Discernir» reproduce mejor esa idea evaluativa que el más general «entender».
- source_word: בֵּין טוֹב לְרָע
  english_pob_choice: between good and evil
  chosen_spanish: entre lo bueno y lo malo
  alternatives_spanish:
  - entre el bien y el mal
  - entre lo correcto y lo incorrecto
  lexicon: HALOT
  rationale: La expresión hebrea es moral y evaluativa, «bueno y malo». En español, «lo bueno y lo malo» conserva esa fuerza sin volverla demasiado abstracta; «el bien y el mal» es válido, pero aquí suena más doctrinal que el hebreo de base.
- source_word: כִּי מִי יוּכַל
  english_pob_choice: for who is able
  chosen_spanish: porque ¿quién será capaz
  alternatives_spanish:
  - porque ¿quién puede
  - pues ¿quién podrá
  lexicon: HALOT
  rationale: Introduce la razón de la petición. «¿Quién será capaz?» comunica con claridad la insuficiencia humana frente a la tarea, manteniendo el valor retórico de la pregunta.
- source_word: הַכָּבֵד
  english_pob_choice: great
  chosen_spanish: tan pesado
  alternatives_spanish:
  - tan grande
  - tan grave
  - tan oneroso
  lexicon: HALOT
  rationale: El término hebreo significa literalmente «pesado», de donde «importante», «gravoso» o «grande». Aquí se preserva la tensión lexical con «pesado», en consonancia con la decisión inglesa de mantener el matiz literal en nota. En español se añade «tan» para sostener la naturalidad de la expresión final.
theological_decisions:
- issue: Imagen antropológica del «corazón» como sede de discernimiento
  english_pob_reading: a listening heart
  chosen_spanish_reading: un corazón que escucha
  alternative_spanish_readings:
  - un corazón de entendimiento
  - un corazón entendimiento
  rationale: 'Se conserva «corazón» para reflejar la antropología bíblica: no sólo intelecto, sino el centro de percepción, voluntad y respuesta. La lectura alternativa más interpretativa existe en la tradición, pero el español puede mantener la imagen original sin oscurecer el sentido.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre el juicio de Salomón y el discernimiento moral
  english_pob_reading: to discern between good and evil
  chosen_spanish_reading: discernir entre lo bueno y lo malo
  alternative_spanish_readings:
  - discernir entre el bien y el mal
  - distinguir entre lo bueno y lo malo
  rationale: La fórmula hebrea es deliberadamente moral. «Lo bueno y lo malo» conserva la forma evaluativa concreta del hebreo sin convertirla en una abstracción excesiva; el matiz judicial queda implícito por el verbo «discernir».
  doctrine_reference: Translation philosophy §§1, 4, 6
- issue: Valor de הַכָּבֵד en referencia al pueblo
  english_pob_reading: great people
  chosen_spanish_reading: este pueblo tuyo tan pesado
  alternative_spanish_readings:
  - este gran pueblo tuyo
  - este pueblo tuyo tan grande
  - este pueblo tuyo tan grave
  rationale: El hebreo usa un adjetivo que significa literalmente «pesado», con extensiones semánticas como «importante», «grande» y «gravoso». Aquí se preserva esa tensión para no borrar el juego lexical entre grandeza y carga. Aunque «pesado» suena menos idiomático, la nota aclara el sentido amplio en la línea del audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y no requiere revisiones previas: la elección central se mantiene en torno a la metáfora del «corazón que escucha» y a la preservación del matiz literal de הַכָּבֵד en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «siervo» para עבד por el contexto de súplica reverente ante Dios.
  - Se conserva la metáfora de «corazón» para mantener la antropología bíblica y no reducirla a mera inteligencia.
  - Se evita sustituir «juzgar» por «gobernar» para no perder el núcleo léxico de שפט.
  - Se mantiene una equivalencia formal-optimal con notas para las tensiones léxicas significativas.
