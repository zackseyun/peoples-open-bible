translation:
  language: es
  text: Pero todo Israel y Judá amaban a David[a], porque él salía y entraba delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él los sacaba y los hacía entrar», es decir, actuaba como su líder público, especialmente en la batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: But all
  chosen_spanish: Pero todo
  alternatives_spanish:
  - Y todo
  - Ahora todo
  lexicon: HALOT
  rationale: El hebreo enlaza con valor contrastivo respecto del contexto inmediato; en español, 'Pero' comunica mejor ese giro discursivo. 'Todo' preserva el alcance inclusivo de כָל sin añadir matices ajenos.
- source_word: יִשְׂרָאֵל וִ/יהוּדָה
  english_pob_choice: Israel and Judah
  chosen_spanish: Israel y Judá
  alternatives_spanish:
  - todo Israel y todo Judá
  lexicon: HALOT
  rationale: Se conserva la distinción política y social entre Israel y Judá. No se repite 'todo' antes de cada nombre porque el hebreo presenta un solo cuantificador sobre el conjunto.
- source_word: אֹהֵב
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amó
  - quería
  lexicon: HALOT
  rationale: El participio expresa una disposición continua o general; en español, el imperfecto 'amaba' transmite mejor esa continuidad que un pretérito puntual.
- source_word: אֶת דָּוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: En español el objeto directo personal requiere la 'a' personal; por eso se explicita aunque el marcador hebreo אֶת no se traduzca literalmente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: '''Porque'' expresa con claridad la relación causal introducida por כִּי y suena natural en español bíblico moderno.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se mantiene el pronombre explícito para reflejar el hebreo y conservar el énfasis del sujeto en la frase siguiente.
- source_word: יוֹצֵא וָ/בָא
  english_pob_choice: went out and came in
  chosen_spanish: salía y entraba
  alternatives_spanish:
  - iba y venía
  - salía y volvía
  lexicon: HALOT
  rationale: El español idiomático admite el par imperfectivo 'salía y entraba', que conserva el carácter habitual del hebreo sin importar de manera innecesaria el objeto elíptico. La lectura de liderazgo queda disponible en la nota.
- source_word: לִ/פְנֵי/הֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - a su cabeza
  lexicon: HALOT
  rationale: '''Delante de ellos'' traduce con naturalidad la localización relacional de לִפְנֵי y mantiene abierta la posible implicación de liderazgo sin añadirla al texto principal.'
theological_decisions:
- issue: Alcance del amor de Israel y Judá hacia David
  english_pob_reading: all Israel and Judah loved David
  chosen_spanish_reading: todo Israel y Judá amaba a David
  alternative_spanish_readings:
  - todo Israel y todo Judá amaba a David
  - Israel y Judá amaban a David
  rationale: No hay una carga doctrinal especial, pero sí una cuestión de concordancia y de alcance colectivo. Se conserva el sujeto colectivo singular, como en la estructura hebrea y en la traducción inglesa auditada, para no diluir la unidad del pueblo en la frase.
  doctrine_reference: Gramática bíblica y concordancia del sujeto colectivo
- issue: Sentido idiomático de 'salía y entraba delante de ellos'
  english_pob_reading: he went out and came in before them
  chosen_spanish_reading: él salía y entraba delante de ellos
  alternative_spanish_readings:
  - él los guiaba y los conducía
  - él iba al frente de ellos
  rationale: La versión principal preserva la expresión hebrea sin fijar de antemano una interpretación militar o administrativa. La nota permite la lectura de liderazgo público, especialmente en batalla, sin borrar la literalidad del texto.
  doctrine_reference: Principios de transparencia textual y preservación de la ambigüedad lexical
translation_notes:
  revision_awareness: 'La revisión más reciente dejó el texto inglés sin cambios (''unchanged: true''). No se registran revisiones aplicadas; por tanto, la propuesta española sigue de cerca el estado auditado estable, manteniendo la decisión del inglés de conservar la imagen idiomática principal en el texto y reservar la lectura de liderazgo para nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'amaba' para reflejar el valor durativo del participio hebreo.
  - Se conserva la tensión entre literalidad e implicación idiomática en 'salía y entraba delante de ellos' mediante la nota.
  - Se evita un lenguaje eclesiástico ajeno al hebreo, como 'siervo' o 'príncipe', porque no aparece aquí.
