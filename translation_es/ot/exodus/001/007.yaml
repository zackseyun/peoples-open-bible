translation:
  language: es
  text: Pero los hijos de Israel fueron fecundos, pulularon[a], se multiplicaron y se volvieron sumamente fuertes[b], de modo que la tierra se llenó de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se llenaron como enjambre»; el verbo hebreo evoca abundancia que pulula o se multiplica como un enjambre.
    reason: lexical_alternative
  - marker: b
    text: O «se volvieron muy poderosos»; el verbo hebreo destaca la fuerza, no solo el número.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: But the sons of Israel
  chosen_spanish: Pero los hijos de Israel
  alternatives_spanish:
  - Y los hijos de Israel
  - Pero los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea בני ישראל como fórmula familiar/nacional. «Hijos» mantiene mejor el paralelo con el inglés POB y evita una neutralización innecesaria. «Pero» refleja bien el contraste narrativo con el versículo anterior.
- source_word: פָּרוּ
  english_pob_choice: were fruitful
  chosen_spanish: fueron fecundos
  alternatives_spanish:
  - fueron fructíferos
  - dieron fruto
  lexicon: HALOT
  rationale: El verbo פרה expresa fecundidad y crecimiento reproductivo. «Fueron fecundos» es natural en español bíblico contemporáneo y conserva el valor de abundancia vital sin mecanicismo.
- source_word: וַיִּשְׁרְצ֛וּ
  english_pob_choice: swarmed
  chosen_spanish: se multiplicaron
  alternatives_spanish:
  - se apiñaron
  - se reprodujeron abundantemente
  - se teemaron
  lexicon: HALOT
  rationale: El hebreo sugiere imagen de teeming/swarming. En español, la metáfora de «se multiplicaron» ya está en el mismo campo semántico de abundancia poblacional y evita una imagen zoológica que sonaría extraña en lectura pública. Se preserva la progresión de crecimiento intenso.
- source_word: וַ/יִּרְבּ֥וּ
  english_pob_choice: multiplied
  chosen_spanish: se multiplicaron
  alternatives_spanish:
  - aumentaron
  - llegaron a ser muchos
  lexicon: HALOT
  rationale: רבה es el verbo estándar de volverse numeroso. Aquí se conserva con la misma forma verbal para reproducir la secuencia enfática del hebreo y del audit trail inglés.
- source_word: וַ/יַּֽעַצְמ֖וּ
  english_pob_choice: became exceedingly strong
  chosen_spanish: se volvieron sumamente fuertes
  alternatives_spanish:
  - se hicieron muy poderosos
  - crecieron muchísimo en fuerza
  lexicon: HALOT
  rationale: עצם aquí comunica hacerse fuerte/poderoso. «Sumamente fuertes» conserva el peso de la fuerza más que solo el número, como subraya el POB inglés. «Se volvieron» refleja el valor intransitivo del verbo en la cadena narrativa.
- source_word: בִּ/מְאֹ֣ד מְאֹ֑ד
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - muchísimo
  - en gran manera
  lexicon: HALOT
  rationale: La duplicación de מאד intensifica al máximo el verbo. «Sumamente» da una intensificación sobria y publicable, equivalente al «exceedingly» del POB.
- source_word: וַ/תִּמָּלֵ֥א הָ/אָ֖רֶץ אֹתָֽ/ם
  english_pob_choice: so that the land was filled with them
  chosen_spanish: de modo que la tierra se llenó de ellos
  alternatives_spanish:
  - y la tierra se llenó de ellos
  - de manera que la tierra quedó llena de ellos
  lexicon: HALOT
  rationale: El nifal de מלא con הארץ como sujeto se rinde naturalmente con pasiva/reflexiva en español. «De modo que» expresa la relación resultativa explícita del hebreo y coincide con el valor del inglés POB.
theological_decisions:
- issue: Posible resonancia con el lenguaje de bendición y fecundidad de Génesis sin añadir explicación al texto
  english_pob_reading: Retain the sequence 'were fruitful ... multiplied' without making the allusion explicit in the main text
  chosen_spanish_reading: Mantener la secuencia «fueron fecundos ... se multiplicaron» sin explicitar la alusión en el cuerpo del versículo
  alternative_spanish_readings:
  - «Fecundos como en la bendición de Génesis ...»
  - «Dieron fruto y se hicieron muchos»
  rationale: El texto hebreo probablemente evoca el lenguaje de bendición primordial, pero no lo desarrolla explícitamente. La traducción conserva esa resonancia por elección léxica y no por expansión interpretativa.
  doctrine_reference: 'Translation philosophy: primacía del original y no importar explicaciones ajenas al texto.'
translation_notes:
  revision_awareness: Se corrigió la ubicación de las notas para que los marcadores [a] y [b] aparezcan exactamente en el texto español. Se mantuvo la estructura semántica del versículo y la secuencia intensiva del hebreo, alineada con el audit trail inglés.
  spanish_consistency_notes:
  - «Hijos de Israel» conserva la fórmula bíblica y evita una paráfrasis étnica más abstracta.
  - «Fecundos / se multiplicaron / sumamente fuertes» reproduce la escalera de intensificación del hebreo.
  - «Tierra» se mantiene como traducción de הָאָרֶץ en este contexto territorial, no cosmológico.
  - Los marcadores de nota siguen el orden alfabético y aparecen anclados en el texto exactamente donde corresponden.
