- from: Mis enemigos me aplastan todo el día[a], porque muchos luchan contra mí con soberbia.
  to: Mis enemigos me pisotean todo el día[a], porque muchos luchan contra mí con soberbia.
  rationale: 'Se cambia «aplastan» por «pisotean» para reflejar mejor la imagen de agresión continua asociada con «trample on». Se conserva «con soberbia» como lectura principal de מָרוֹם, pero se amplía la nota al pie para incluir todas las alternativas significativas documentadas en el expediente inglés: vocativo («¡Oh, Altísimo!») y sentido adverbial («orgullosamente»), además de la idea de posición exaltada.'
