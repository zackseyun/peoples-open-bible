translation:
  language: es
  text: 'Pero el otro dijo: «Yo también soy un gobernante sobre la tierra, el que ordena tomar[a] las armas y llevar a cabo los asuntos del rey». Sin embargo, no pudo llevar a cabo su propósito cruel[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «empuñar las armas». El griego dice literalmente «levantar/tomar las armas», un giro idiomático de acción militar.
    reason: lexical_alternative
  - marker: b
    text: O «plan cruel» o «resolución monstruosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάστης
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - señor
  - potentado
  lexicon: LSJ
  rationale: δυνάστης expresa a una persona con poder o dominio. «Gobernante» conserva la idea de autoridad y resulta natural en español moderno, sin cargar el término con una realeza explícita que el griego no exige.
- source_word: προστατάσσων
  english_pob_choice: the one who commands
  chosen_spanish: el que ordena
  alternatives_spanish:
  - el que manda
  - el que da órdenes
  - el que comanda
  lexicon: LSJ
  rationale: El participio presenta una acción característica de quien ejerce autoridad. «El que ordena» mantiene ese valor descriptivo y sigue siendo idiomático en español.
- source_word: αἴρειν τὰ ὅπλα
  english_pob_choice: to take up arms
  chosen_spanish: levantar las armas
  alternatives_spanish:
  - tomar las armas
  - empuñar las armas
  - alzarse en armas
  lexicon: LSJ
  rationale: La imagen griega es literalmente «levantar/tomar las armas», una expresión militar idiomática. «Levantar las armas» conserva más de cerca la forma del griego, mientras que «tomar las armas» sería una alternativa más idiomática en español.
- source_word: τὰς βασιλικὰς χρείας ἐπιτελεῖν
  english_pob_choice: to carry out the king’s business
  chosen_spanish: ejecutar los asuntos del rey
  alternatives_spanish:
  - cumplir los asuntos del rey
  - realizar las tareas del rey
  - llevar a cabo los negocios del rey
  lexicon: LSJ
  rationale: χρείας puede significar asuntos, necesidades o encargos. En este contexto, la frase alude a gestiones reales o servicio oficial. «Asuntos del rey» mantiene la amplitud semántica del original sin volverla excesivamente interpretativa.
- source_word: ὅμως
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Con todo
  - Pero
  lexicon: LSJ
  rationale: Marca un contraste fuerte con lo anterior. «Sin embargo» expresa bien el giro adversativo en español contemporáneo.
- source_word: οὐ κατέσχεν
  english_pob_choice: he did not prevail
  chosen_spanish: no pudo llevar a cabo
  alternatives_spanish:
  - no prevaleció
  - no tuvo éxito
  - no logró
  lexicon: LSJ
  rationale: La idea es fracaso para completar la intención. «No pudo llevar a cabo» transmite con claridad la incapacidad de consumar el acto, sin perder el sentido de frustración implícito en el verbo.
- source_word: σχέτλιον
  english_pob_choice: savage
  chosen_spanish: cruel
  alternatives_spanish:
  - salvaje
  - monstruoso
  - malvado
  lexicon: LSJ
  rationale: El adjetivo es fuertemente despectivo y describe la brutalidad del propósito. «Cruel» comunica esa severidad de manera natural en español y evita una intensificación gratuita.
- source_word: βούλημα
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - voluntad
  - resolución
  lexicon: LSJ
  rationale: βούλημα denota una intención deliberada o resolución. «Propósito» funciona bien en español para una intención hostil, sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Autoidentificación del personaje como autoridad terrenal
  english_pob_reading: I also am a ruler upon the earth.
  chosen_spanish_reading: «Yo también soy un gobernante sobre la tierra».
  alternative_spanish_readings:
  - «Yo también soy rey sobre la tierra»
  - «Yo también soy uno que tiene dominio en la tierra»
  rationale: El griego presenta la afirmación de manera directa y no exige identificar más al hablante que por sus propias palabras. «Gobernante» conserva la fuerza de la autodescripción sin añadir un título más específico que el texto no fuerza.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla por traducción.
translation_notes:
  revision_awareness: Coincide con el último pase de revisión en que no se requieren cambios sustantivos; se mantiene la lectura sobria y cercana al griego, con decisión explícita sobre el giro militar y sobre el adjetivo fuertemente peyorativo del cierre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se traduce δυνάστης con un término de autoridad general, sin sobrecargarlo con connotaciones monárquicas.
  - Se preserva la tensión del final con una traducción de tono negativo fuerte, sin suavizar σχέτλιον.
