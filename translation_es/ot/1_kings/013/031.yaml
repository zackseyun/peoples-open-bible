    issue: בָּנָיו fue justificado como referencia familiar amplia
    rationale: El expediente inglés documenta explícitamente que el hebreo se refiere a 'sons', no a 'children' en general. Aunque 'hijos' puede mantenerse en el texto, la rationale española no debe afirmar que puede entenderse ampliamente sin pérdida.
  - severity: low
    issue: '''los huesos de él'' suena poco natural'
    rationale: El hebreo contrasta 'sus huesos' y 'mis huesos'. En español, 'sus huesos' aquí es claro y más legible; no introduce ambigüedad significativa dentro de la oración.
  revised_spanish_text: 'Y sucedió que, después de haberlo sepultado, dijo a sus hijos: «Cuando yo muera, sepúltenme en el sepulcro donde está sepultado el hombre de Dios; pongan mis huesos junto a sus huesos».'
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y reflejar mejor la decisión léxica documentada: se reemplaza ''junto a los huesos de él'' por ''junto a sus huesos'', que es idiomático y claro en contexto. Además, la revisión presupone que la nota editorial/lexical sobre בָּנָיו debe ajustarse para no diluir la especificidad masculina del hebreo, aunque el texto principal ''sus hijos'' puede permanecer.'
