translation:
  language: es
  text: 'Así dice Yahvé: «Deténganse junto a los caminos y miren; pregunten por las sendas antiguas[a], cuál es el buen camino; anden por él, y hallen descanso para sus almas[b]. Pero dijeron: “No andaremos por él”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las sendas de antaño» o «las sendas eternas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para sus almas»; נֶפֶשׁ también puede significar «ustedes mismos» o «sus vidas», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton con la forma estable del proyecto en español, "Yahvé", evitando la sustitución por un título genérico y manteniendo la transparencia del original.
- source_word: עִמְדוּ
  english_pob_choice: Stand
  chosen_spanish: Deténganse
  alternatives_spanish:
  - Párense
  - Permanezcan de pie
  - Deténganse y quédense
  lexicon: HALOT
  rationale: En el contexto de una encrucijada, el imperativo pide dejar de avanzar para prestar atención; "deténganse" expresa bien esa pausa atenta en español, sin perder la fuerza de la orden.
- source_word: עַל דְּרָכִים
  english_pob_choice: by the roads
  chosen_spanish: en los caminos
  alternatives_spanish:
  - junto a los caminos
  - sobre los caminos
  - en las rutas
  lexicon: HALOT
  rationale: La imagen es de situarse en un lugar de caminos para discernir dirección. "En los caminos" conserva el cuadro sin forzar una especificación interpretativa como "encrucijadas".
- source_word: וּרְאוּ
  english_pob_choice: look
  chosen_spanish: miren
  alternatives_spanish:
  - vean
  - consideren
  - observen
  lexicon: HALOT
  rationale: '"Miren" mantiene el imperativo visual y la invitación a discernir, con un tono natural en español junto a los otros mandatos de la línea.'
- source_word: וְשַׁאֲלוּ
  english_pob_choice: ask
  chosen_spanish: pregunten
  alternatives_spanish:
  - inquieran
  - busquen
  - consulten
  lexicon: HALOT
  rationale: El verbo implica pedir información o indagar; "pregunten" es la forma más directa y fluida en español dentro de la secuencia de mandatos.
- source_word: לִנְתִבוֹת עוֹלָם
  english_pob_choice: for the ancient paths
  chosen_spanish: por las sendas antiguas
  alternatives_spanish:
  - por las sendas de antaño
  - por las sendas eternas
  - por los caminos antiguos
  lexicon: HALOT
  rationale: נְתִיבוֹת son sendas o rutas; עוֹלָם aquí señala antigüedad o larga duración. "Sendas antiguas" preserva la referencia a caminos tradicionales y establecidos, sin imponer una idea metafísica de eternidad.
- source_word: אֵי זֶה דֶרֶךְ הַטּוֹב
  english_pob_choice: where the good way is
  chosen_spanish: cuál es el buen camino
  alternatives_spanish:
  - qué camino es el bueno
  - dónde está el buen camino
  - cuál sea el buen camino
  lexicon: HALOT
  rationale: La pregunta busca identificar el camino correcto. En español, "cuál es el buen camino" reproduce de forma natural esa búsqueda de identificación y conserva el valor moral de הַטּוֹב como "el bueno/el recto".
- source_word: וּלְכוּ בָהּ
  english_pob_choice: then walk in it
  chosen_spanish: y anden por él
  alternatives_spanish:
  - y caminen en él
  - y vayan por él
  - entonces anden en él
  lexicon: HALOT
  rationale: '"Anden" reproduce el valor conductual/metafórico del verbo hebreo; "por él" hace explícita la referencia al camino. Se evita añadir una inferencia temporal que el hebreo no exige de manera explícita.'
- source_word: וּמִצְאוּ מַרְגּוֹעַ
  english_pob_choice: and find rest
  chosen_spanish: y hallen descanso
  alternatives_spanish:
  - y encuentren reposo
  - y hallen reposo
  - y encuentren descanso
  lexicon: HALOT
  rationale: מַרְגּוֹעַ expresa reposo, alivio o quietud. "Descanso" es idiomático y claro en español; "hallen" mantiene el eco formal del imperativo y la promesa implícita del resultado.
- source_word: לְנַפְשְׁכֶם
  english_pob_choice: for your souls
  chosen_spanish: para sus almas
  alternatives_spanish:
  - para ustedes mismos
  - para sus vidas
  - para sus seres
  lexicon: HALOT
  rationale: Se mantiene "almas" para reflejar la decisión inglesa y la carga antropológica de נֶפֶשׁ en este contexto, sin convertirla en una categoría técnica ajena al pasaje. "Sus" adapta el texto al plural respetuoso/natural del español.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But they said
  chosen_spanish: Pero dijeron
  alternatives_spanish:
  - Y dijeron
  - Pero respondieron
  - Entonces dijeron
  lexicon: HALOT
  rationale: El giro adversativo refleja adecuadamente la respuesta negativa frente a la exhortación divina. "Pero" hace visible el contraste que el contexto exige.
- source_word: לֹא נֵלֵךְ
  english_pob_choice: We will not walk in it
  chosen_spanish: No andaremos
  alternatives_spanish:
  - No iremos
  - No caminaremos
  - No andaremos por él
  lexicon: HALOT
  rationale: 'El hebreo expresa una negativa breve: "no iremos/andaremos". En español, el verbo "andar" mantiene la metáfora del caminar moral; se omite el objeto explícito porque el antecedente inmediato ya lo identifica y añadirlo no es necesario para la claridad.'
theological_decisions:
- issue: Tetragrámaton en la cita profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige transparencia respecto del nombre divino. Mantener "Yahvé" conserva la referencia directa al nombre revelado sin sustituirlo por un título, y es coherente con el audit trail en inglés.
  doctrine_reference: Terminología del proyecto POB; afirmación de transparencia textual sobre el nombre divino
- issue: נֶפֶשׁ como sede de la persona íntegra
  english_pob_reading: for your souls
  chosen_spanish_reading: para sus almas
  alternative_spanish_readings:
  - para ustedes mismos
  - para sus vidas
  rationale: Aunque נֶפֶשׁ también puede significar "vida" o "persona", aquí la decisión de mantener "almas" conserva la resonancia espiritual y antropológica que el texto busca, sin imponer una antropología técnica más allá del contexto.
  doctrine_reference: Jer. 6:16; nota inglesa sobre נֶפֶשׁ; filosofía de equivalencia óptima
- issue: La imagen del camino como conducta
  english_pob_reading: walk in it
  chosen_spanish_reading: anden por él
  alternative_spanish_readings:
  - caminen en él
  - vayan por él
  rationale: El hebreo usa el caminar como metáfora moral. "Anden por él" mantiene esa imagen y su fuerza exhortativa en español, evitando una paráfrasis abstracta como "siganlo" que debilitaría el paralelismo.
  doctrine_reference: Uso bíblico de הלך como conducta; coherencia retórica del pasaje
translation_notes:
  revision_awareness: Se siguió el audit trail del inglés POB y no se detectaron revisiones pendientes en la fuente inglesa; el borrador español conserva la misma estructura exhortativa y la misma nota sobre נֶפֶשׁ.
  spanish_consistency_notes:
  - Se usó "Yahvé" de manera consistente con el estándar del proyecto para יְהוָה.
  - Se prefirió "sendas antiguas" para לִנְתִבוֹת עוֹלָם, en coherencia con la alternativa contextual principal del inglés POB.
  - Se mantuvo la metáfora de caminar con "anden por él" / "No andaremos" para conservar el paralelismo verbal.
  - '"Almas" se usó como equivalente transparente de נֶפֶשׁ en esta nota textual, sin excluir otras posibles lecturas semánticas.'
