translation:
  language: es
  text: 'Y los fariseos y los escribas le preguntaron[a]: «¿Por qué tus discípulos no andan según la tradición de los ancianos, sino que comen el pan con manos impuras?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con manos inmundas»; literalmente, «con manos comunes», es decir, con impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπερωτῶσιν
  english_pob_choice: asked
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le hicieron una pregunta
  - le preguntaron repetidamente
  lexicon: BDAG
  rationale: El presente histórico griego se naturaliza bien en pasado simple español. 'Le preguntaron' comunica la acción de interrogar sin sobrecargar el aspecto.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - expertos en la Ley
  - maestros de la Ley
  lexicon: BDAG
  rationale: '''Escribas'' es el equivalente transparente y tradicional en el contexto de los Evangelios para esa clase de especialistas legales.'
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: BDAG
  rationale: Equivalente interrogativo idiomático y natural en español.
- source_word: περιπατοῦσιν
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - viven
  - se conducen
  lexicon: BDAG
  rationale: '''Andar'' conserva la metáfora bíblica de conducta o modo de vida sin sonar forzado en español.'
- source_word: κατὰ τὴν παράδοσιν
  english_pob_choice: according to the tradition
  chosen_spanish: según la tradición
  alternatives_spanish:
  - de acuerdo con la tradición
  - en conformidad con la tradición
  lexicon: BDAG
  rationale: '''Según'' reproduce bien la relación normativa de κατά con acusativo y suena natural en español.'
- source_word: τῶν πρεσβυτέρων
  english_pob_choice: of the elders
  chosen_spanish: de los ancianos
  alternatives_spanish:
  - de los mayores
  - de los presbíteros
  lexicon: BDAG
  rationale: '''Ancianos'' mantiene el sentido de autoridades anteriores y el eco judío del texto, sin importar una referencia eclesiástica posterior.'
- source_word: κοιναῖς χερσὶν
  english_pob_choice: with unclean hands
  chosen_spanish: con manos impuras
  alternatives_spanish:
  - con manos inmundas
  - con manos contaminadas ritualmentе
  - con manos comunes
  lexicon: BDAG
  rationale: '''Impuras'' expresa el valor ritual de κοινός en este contexto. ''Comunes'' sería más literal, pero menos claro para el lector español; ''inmundas'' suena más pesado y ''contaminadas ritualmente'' explicita demasiado.'
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - pan
  - el alimento
  lexicon: BDAG
  rationale: '''Pan'' conserva el singular del griego y la formulación concreta de la acusación, con uso natural en español bíblico.'
theological_decisions:
- issue: Sentido ritual de κοινός
  english_pob_reading: Rendered as 'unclean hands' to preserve the ritual-purity sense rather than ordinary dirtiness or moral evil.
  chosen_spanish_reading: '''Manos impuras'' mantiene la impureza ritual implícita en κοινός sin convertirla en una afirmación moral ni en mera suciedad física.'
  alternative_spanish_readings:
  - manos inmundas
  - manos contaminadas ritualmente
  - manos comunes
  rationale: El contexto trata de pureza ritual farisea. 'Impuras' equilibra fidelidad y claridad, preservando la tensión teológica sin resolverla con lenguaje doctrinal posterior.
  doctrine_reference: Pureza ritual judía; conservar la distinción entre impureza ceremonial y suciedad moral/física.
translation_notes:
  revision_awareness: El audit trail en inglés pasó de 'defiled hands' a 'unclean hands' para reflejar más directamente κοιναῖς. Esta versión española adopta 'manos impuras' como equivalente natural y preciso dentro del registro bíblico, manteniendo el sentido de impureza ritual y evitando una traducción demasiado literal de 'comunes'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'escribas' para γραμματεῖς y 'ancianos' para πρεσβυτέρων, manteniendo el referente judío del pasaje.
  - '''Andan'' preserva la metáfora de περιπατέω sin explicar en exceso.'
  - '''Pan'' sigue el singular del griego y la forma de la acusación.'
  - La nota al pie aclara la alternativa literal 'comunes' y el trasfondo ritual sin introducir terminología eclesiástica.
