  text: 내게 주신 은혜로 말미암아 여러분 가운데 있는 각 사람에게 내가 말합니다. 마땅히 생각해야 할 그 이상으로 자기를 높이 생각하지 말고, 도리어 절제 있게 생각하십시오. 하나님께서 각 사람에게 나누어 주신 믿음의 분량을 따라서 말입니다.
