translation:
  language: es
  text: Entraron a ella como se entra a una prostituta[a]; así entraron a Oholá y a Oholibá[b], mujeres de perversión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Vino a ella como uno entra a una prostituta; así entraron a Oholá y a Oholibá». El hebreo comienza con un verbo singular y luego pasa al plural.'
    reason: textual_variant
  - marker: b
    text: O «mujeres de depravación». La expresión hebrea dice literalmente «mujeres de perversión» o «mujeres de depravación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא / בָּאוּ
  english_pob_choice: they went in
  chosen_spanish: vinieron / fueron
  alternatives_spanish:
  - entraron
  - se acostaron con
  lexicon: HALOT
  rationale: En este contexto sexual, בוא con אֶל puede expresarse como «entrar a» o «ir a» sin perder el sentido idiomático. Elegí «vinieron ... así fueron» para conservar el paralelo con el hebreo y evitar una formulación demasiado interpretativa. «Se acostaron con» sería más explícito, pero añade un verbo no presente en el texto.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - hacia ella
  - sobre ella
  lexicon: HALOT
  rationale: La preposición con pronombre es literalmente «a ella». En español, con el verbo de aproximación y el contexto sexual, «a ella» mantiene la cercanía al hebreo sin forzar una paráfrasis.
- source_word: כְּבוֹא אֶל
  english_pob_choice: as men go in to
  chosen_spanish: como se entra a
  alternatives_spanish:
  - como uno entra a
  - como se va a
  lexicon: HALOT
  rationale: El infinitivo con כ expresa comparación de manera. En español, una construcción impersonal («como se entra a») reproduce el valor general del hebreo y evita introducir un sujeto que el hebreo aquí no explicita en la forma comparativa.
- source_word: אִשָּׁה זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una mujer prostituta
  lexicon: HALOT
  rationale: זונה refiere a una mujer sexualmente promiscua o prostituta; «prostituta» es el equivalente moderno más claro y natural en español. «Ramera» es más tradicional pero menos neutral; «mujer prostituta» suena pesado.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - entonces
  lexicon: HALOT
  rationale: כֵּן concluye la comparación. «Así» es la forma española más directa y mantiene el enlace lógico entre la comparación y su resultado.
- source_word: אָהֳלָה ... אָהֳלִיבָה
  english_pob_choice: Oholah ... Oholibah
  chosen_spanish: Oholá ... Oholibá
  alternatives_spanish:
  - Oholah ... Oholibah
  lexicon: HALOT
  rationale: Son nombres propios hebreos y se transliteran. Apliqué una adaptación ortográfica española con acento para facilitar la pronunciación y lectura, sin cambiar la identidad de los nombres.
- source_word: אִשֹּׁת הַזִּמָּה
  english_pob_choice: women of depravity
  chosen_spanish: mujeres de perversión
  alternatives_spanish:
  - mujeres de depravación
  - mujeres de lujuria
  - mujeres de lascivia
  lexicon: HALOT
  rationale: זִמָּה en Ezequiel suele cargar una idea de conducta sexual corrupta y vergonzosa. «Perversión» conserva el peso moral amplio del término sin limitarlo solo a lo sexual, aunque el contexto claramente incluye ese campo semántico. «Depravación» también es posible, pero en español puede sonar más abstracto o severo.
theological_decisions:
- issue: Cambio de singular a plural al inicio del versículo
  english_pob_reading: 'Render the clause with a plural English subject: ''They went in to her'''
  chosen_spanish_reading: 'Usar plural desde el inicio: «Vinieron a ella ...; así fueron ...»'
  alternative_spanish_readings:
  - Vino a ella ...; así fueron ...
  - Entró a ella ...; así entraron ...
  rationale: El hebreo abre con una forma singular y enseguida pasa a plural, pero el contexto inmediato trata del grupo de amantes. En español, iniciar con plural evita una lectura engañosa y sigue la decisión auditada del POB inglés de expresar el sentido colectivo. Mantengo la tensión textual en la nota en vez de resolverla silenciosamente en el texto.
  doctrine_reference: Nota textual y de sintaxis; no implica una variante doctrinal.
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del audit trail inglés y del hebreo: se preservó la transición singular/plural del verbo inicial como tensión textual, se mantuvo el idiomatismo sexual de בוא con אֶל, y se eligió un término español amplio para זִמָּה sin suavizar su carga moral.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo la transliteración de los nombres propios con adaptación gráfica española para facilitar lectura.
  - «Prostituta» y «perversión» conservan el registro moral fuerte del pasaje sin arcaísmos innecesarios.
