  text: יְהוָ֣ה אֱלֹהֵי/נוּ֮ אַתָּ֪ה עֲנִ֫יתָ֥/ם אֵ֣ל נֹ֭שֵׂא הָיִ֣יתָ לָ/הֶ֑ם וְ֝/נֹקֵ֗ם עַל עֲלִילוֹתָֽ/ם־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/099/008.yaml
  text: O Yahweh our God[a], you answered them; you were a forgiving God to them[b], yet an avenger of their deeds.
  footnotes:
  - marker: a
    text: Or 'a God who bore away [their sin] for them'; the Hebrew participle can carry the sense of forgiving by bearing away guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'taking vengeance on their actions.' The Hebrew allows either a nominal ('an avenger') or more verbal sense here.
    reason: lexical_alternative
