revisions:
- from: Y con toda carne está con ellos su ansiedad, y su riqueza ahuyenta su sueño.[a]
  to: Y con toda carne está su ansiedad, y su riqueza ahuyenta su sueño.[a]
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del hebreo ni de la auditoría inglesa: se eliminó la repetición torpe «está con ellos» y se conservó la idea de que la ansiedad acompaña a toda carne. También se pulió ligeramente la nota griega para mayor fluidez en español.'
  reviewer_model: gpt-5.4
