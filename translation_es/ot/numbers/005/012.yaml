translation:
  language: es
  text: 'Habla a los hijos de Israel[a] y diles: Si la mujer de algún hombre se desvía y le es infiel,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más idiomáticamente, «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo de דבר en esta fórmula legal introductoria se vierte naturalmente como «Habla», manteniendo el tono directo y solemne del mandato divino a Moisés.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, en consonancia con la decisión del inglés POB de mantener el término familiar masculino, sin ocultar la forma del original.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y diles a ellos
  - y habla con ellos
  lexicon: HALOT
  rationale: La frase formulaica se expresa de modo natural en español con «diles», que conserva el valor de comunicación directa y el paralelismo de la instrucción legal.
- source_word: אִישׁ אִישׁ
  english_pob_choice: If any man's
  chosen_spanish: de algún hombre
  alternatives_spanish:
  - de un hombre
  - de cualquier hombre
  lexicon: HALOT
  rationale: La repetición distributiva se integra en español dentro de «la mujer de algún hombre», que transmite el sentido de cualquier caso individual sin forzar una repetición artificial.
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Si
  lexicon: HALOT
  rationale: En este contexto casuístico, כִּי introduce una condición; «Si» es la equivalencia española más precisa.
- source_word: תִשְׂטֶה
  english_pob_choice: goes astray
  chosen_spanish: se desvía
  alternatives_spanish:
  - se aparta
  - anda errante
  lexicon: HALOT
  rationale: שׂטה conserva una imagen de desviación o apartarse; «se desvía» mantiene la metáfora sin especificar todavía el acto concreto, como en el inglés POB.
- source_word: אִשְׁתּוֹ
  english_pob_choice: wife
  chosen_spanish: la mujer
  alternatives_spanish:
  - su esposa
  - su mujer
  lexicon: HALOT
  rationale: En español, «la mujer de algún hombre» refleja la relación posesiva implícita del hebreo y evita una formulación demasiado idiomática que pudiera adelantar más de lo que el verso dice.
- source_word: וּמָעֲלָה ... מָעַל
  english_pob_choice: is unfaithful
  chosen_spanish: le es infiel
  alternatives_spanish:
  - actúa con infidelidad
  - comete una traición
  lexicon: HALOT
  rationale: La combinación verbal-nominal intensifica la idea de deslealtad relacional. «Le es infiel» reproduce bien el sentido de infidelidad/traición que el inglés POB expresó como «is unfaithful to him».
theological_decisions:
- issue: Address to Israel as a covenant people with masculine collective form
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma literal del hebreo y la decisión auditada del POB de no sustituir automáticamente la expresión por un equivalente inclusivo idiomático, preservando la huella formal del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «is unfaithful to him» por ser más natural que «commits a breach of faith against him», mientras conserva la fuerza relacional y legal del hebreo. Esta decisión se refleja en «le es infiel».
  spanish_consistency_notes:
  - Se conserva el registro legal y solemne de apertura con imperativos breves y directos.
  - Se evita «SEÑOR» y no aparece el tetragrámaton en este versículo.
  - «Hijos de Israel» se mantiene como calco controlado, con alternativa idiomática en nota.
  - «Se desvía» e «infiel» preservan la tensión entre metáfora y especificación moral sin exagerar el contenido.
