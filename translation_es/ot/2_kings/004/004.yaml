- from: Luego entra, y cierra la puerta detrás de ti y detrás de tus hijos[a]; y vierte sobre todos estos recipientes[b]; y aparta los llenos.
  to: Luego entra, y cierra la puerta detrás de ti y detrás de tus hijos; y vierte en todos estos recipientes[a]; y aparta los llenos.
  rationale: Se cambió «sobre» por «en» para reflejar el sentido contextual correcto de llenar recipientes. Se eliminó la nota errónea sobre «tus hijos» porque el hebreo es específico. Se simplificó y españolizó la nota léxica restante.
