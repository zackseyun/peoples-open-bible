translation:
  language: es
  text: Pero ellos no escucharon, ni inclinaron su oído; pero endurecieron su cerviz para no oír[a] y para no aceptar disciplina[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "escuchar". El verbo hebreo puede significar oír, escuchar u obedecer según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "endurecieron su cerviz", un modismo de resistencia obstinada.'
    reason: cultural_note
  - marker: c
    text: O "recibir instrucción" o "tomar corrección" para "aceptar disciplina".
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no obedecieron
  lexicon: HALOT
  rationale: שמע puede significar oír, escuchar o obedecer según el contexto. Aquí, con el paralelo de inclinar el oído y la referencia a disciplina, 'no escucharon' preserva la idea de atención rechazada sin forzar el sentido a obediencia plena.
- source_word: הִטּוּ אֶת אָזְנָם
  english_pob_choice: did not incline their ear
  chosen_spanish: ni inclinaron su oído
  alternatives_spanish:
  - ni doblaron su oído
  - ni prestaron atención
  lexicon: HALOT
  rationale: La expresión conserva la imagen corporal del hebreo y sigue siendo natural en español bíblico contemporáneo. 'Inclinar el oído' mantiene el matiz de atención intencional sin perder claridad.
- source_word: וַיַּקְשׁוּ אֶת עָרְפָּם
  english_pob_choice: but stiffened their neck
  chosen_spanish: sino que endurecieron su cerviz
  alternatives_spanish:
  - endurecieron su cuello
  - se pusieron tercos
  lexicon: HALOT
  rationale: El hebreo usa un modismo de obstinación. 'Endurecieron su cerviz' preserva la metáfora profética tradicional y el peso idiomático; 'cerviz' es más exacto al trasfondo semítico que 'cuello'.
- source_word: לְבִלְתִּי שֹׁמֵעַ
  english_pob_choice: so as not to hear
  chosen_spanish: para no oír[a]
  alternatives_spanish:
  - para no escuchar
  - a fin de no oír
  lexicon: HALOT
  rationale: La forma infinitiva con לְבִלְתִּי expresa propósito o resultado. 'Para no oír' es breve y natural en español; la nota marca que el verbo puede abarcar oír/escuchar, como en el audit trail inglés.
- source_word: וּלְבִלְתִּי קַחַת מוּסָר
  english_pob_choice: and not to accept discipline
  chosen_spanish: y para no aceptar disciplina
  alternatives_spanish:
  - y para no recibir disciplina
  - y para no aceptar corrección
  lexicon: HALOT
  rationale: מוּסָר incluye corrección, instrucción formativa y disciplina. 'Disciplina' preserva el peso correctivo y covenantal del término; 'aceptar' refleja bien la resistencia a recibirla.
theological_decisions:
- issue: Conservación del modismo de obstinación
  english_pob_reading: Preserved the bodily metaphor 'stiffened their neck' rather than replacing it with an interpretive gloss like 'became stubborn.'
  chosen_spanish_reading: Endurecieron su cerviz
  alternative_spanish_readings:
  - se volvieron obstinados
  - endurecieron su cuello
  rationale: La profecía de Jeremías recurre a metáforas corporales para describir rebeldía pactual. Mantener el modismo evita diluir la carga teológica y conserva la continuidad intertextual con otros textos bíblicos.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Alcance de שׁמע en la reprensión profética
  english_pob_reading: Rendered as 'listen' in the first clause and 'hear' in the purpose clause.
  chosen_spanish_reading: '''No escucharon'' ... ''para no oír'''
  alternative_spanish_readings:
  - no oyeron ... para no oír
  - no obedecieron ... para no obedecer
  rationale: Se preserva la amplitud semántica de שׁמע sin cargar el texto con una obediencia explícita que el hebreo no exige en la primera cláusula. La variación escuchar/oír mantiene naturalidad en español y refleja la progresión del verso.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de מוּסָר
  english_pob_reading: accept discipline
  chosen_spanish_reading: aceptar disciplina
  alternative_spanish_readings:
  - recibir instrucción
  - aceptar corrección
  rationale: En literatura profética, מוּסָר no es solo información sino corrección formativa. 'Disciplina' retiene ese peso moral y pactual, mientras 'aceptar' comunica la negativa activa de la gente.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, con la finalidad unida a la clausula verbal final sin coma innecesaria. Se mantuvo la secuencia paralela del hebreo y la metáfora de cerviz endurecida, evitando una paráfrasis explicativa que borraría la tensión lexical de שמע y מוּסר.
  spanish_consistency_notes:
  - Se usa 'cerviz' para conservar la metáfora bíblica y el registro profético.
  - '''Escuchar/oír'' se distribuye de forma consistente con el rango semántico de שמע.'
  - '''Disciplina'' se usa como término principal para מוּסר, con alternativas documentadas en nota.'
  - La puntuación refleja dos miembros coordinados y una cláusula final de propósito, en línea con el hebreo.
