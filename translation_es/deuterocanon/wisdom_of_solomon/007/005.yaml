translation:
  language: es
  text: Porque ningún rey tuvo un origen distinto en su nacimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún rey tuvo otro origen de existencia». El griego γενέσεως puede entenderse más ampliamente como «origen» o «generación», no solo como nacimiento físico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: 'no'
  chosen_spanish: ningún
  alternatives_spanish:
  - 'no'
  - ninguno
  lexicon: BDAG
  rationale: En español, con el sustantivo en singular 'rey', 'ningún' expresa la negación universal de forma natural y mantiene el sentido de 'no one among kings'.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Se conserva la conexión explicativa con el contexto; 'Porque' fluye con naturalidad en español y mantiene la relación causal/explanatoria.
- source_word: βασιλέων
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - ruler
  - monarca
  lexicon: LSJ
  rationale: El término griego se refiere específicamente a reyes; 'rey' preserva mejor esa referencia concreta que un término más amplio como 'gobernante'.
- source_word: ἑτέραν
  english_pob_choice: different
  chosen_spanish: distinto
  alternatives_spanish:
  - diferente
  - otro
  lexicon: LSJ
  rationale: '''Distinto'' conserva la idea de diferencia de clase o identidad sin sonar forzado en español, en una construcción que habla del origen de la vida.'
- source_word: ἔσχεν
  english_pob_choice: had
  chosen_spanish: tuvo
  alternatives_spanish:
  - poseyó
  - recibió
  lexicon: BDAG
  rationale: El pasado simple 'tuvo' reproduce con naturalidad el valor de posesión/existencia del verbo en esta frase idiomática sobre el origen.
- source_word: γενέσεως
  english_pob_choice: birth
  chosen_spanish: nacimiento
  alternatives_spanish:
  - origen
  - generación
  lexicon: LSJ
  rationale: Aunque el griego admite un sentido más amplio de 'origen', en este contexto el énfasis está en el comienzo común de la vida humana; 'nacimiento' es claro y fiel, sin perder la nota de procedencia.
- source_word: ἀρχήν
  english_pob_choice: beginning
  chosen_spanish: comienzo
  alternatives_spanish:
  - principio
  - inicio
  lexicon: BDAG
  rationale: '''Comienzo'' comunica el punto de partida de forma idiomática en español y evita ambigüedad filosófica de ''principio''.'
theological_decisions:
- issue: Origen común de reyes y demás humanos
  english_pob_reading: The verse emphasizes that kings do not have a different starting point in birth from other humans.
  chosen_spanish_reading: El versículo afirma que incluso los reyes comparten el mismo comienzo de nacimiento que los demás humanos.
  alternative_spanish_readings:
  - ningún rey tuvo otro origen
  - ningún rey tuvo un origen distinto
  rationale: La formulación española mantiene el nivelamiento antropológico del texto sin ampliar indebidamente su alcance doctrinal. No se resuelve la tensión entre 'nacimiento' y 'origen'; se conserva la posibilidad semántica del griego mediante la nota.
  doctrine_reference: Mantener la tensión lexical del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: El inglés POB opta por 'For no king had a different beginning of birth' y añade una nota que abre 'origin of existence' como alternativa. La versión española sigue esa línea y conserva la tensión semántica entre nacimiento y origen sin resolverla a favor de un solo matiz.
  spanish_consistency_notes:
  - Se mantiene 'rey' para βασιλέων por especificidad referencial.
  - '''Nacimiento'' se usa por claridad, pero el pie de nota preserva el valor más amplio de γενέσεως.'
  - '''Porque'' conserva el enlace explicativo de γάρ.'
  - No se introduce terminología eclesiástica ni reinterpretación doctrinal ajena al versículo.
