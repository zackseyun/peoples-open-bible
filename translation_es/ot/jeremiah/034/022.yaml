translation:
  language: es
  text: He aquí, yo doy la orden, declara Yahvé, y haré que vuelvan[a] a esta ciudad; pelearán contra ella, la tomarán y la quemarán con fuego. Y convertiré las ciudades de Judá en desolación[b], sin ningún habitante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los traeré de vuelta a esta ciudad». El verbo hebreo es causativo («hacer volver / traer de regreso»). En este contexto se refiere a las fuerzas enemigas siendo devueltas a Jerusalén.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sin nadie que habite allí». El modismo hebreo enfatiza una desolación completa y la despoblación total.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: La partícula de llamado profético se expresa en español de forma natural con «Mira» o «He aquí». Se eligió «Mira» por ser sobrio y comprensible, manteniendo el tono de advertencia sin sonar arcaico.
- source_word: מְצַוֶּה
  english_pob_choice: I am commanding
  chosen_spanish: yo estoy mandando
  alternatives_spanish:
  - yo mando
  - yo estoy ordenando
  - yo doy la orden
  lexicon: HALOT
  rationale: El participio con sujeto en primera persona comunica acción declarada e inmediata. «Estoy mandando» conserva mejor ese matiz aspectual que un simple presente.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - así dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé según la norma del proyecto. «Dice Yahvé» reproduce la fórmula profética con dignidad y claridad; «declara» es posible, pero «dice» refleja bien el hebreo נְאֻם en este contexto.
- source_word: וַהֲשִׁבֹתִים
  english_pob_choice: I will bring them back
  chosen_spanish: haré que vuelvan
  alternatives_spanish:
  - los haré volver
  - los traeré de vuelta
  - los devolveré
  lexicon: HALOT
  rationale: El hebreo hiphil de שוב es causativo. En español, «haré que vuelvan» expresa con claridad la causalidad sin sonar forzado; «los traeré de vuelta» también sería válido, pero puede ocultar un poco el matiz causativo.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - esta urbe
  lexicon: HALOT
  rationale: Renderización directa y natural del sintagma demostrativo. «Ciudad» conserva el tono formal y el referente inmediato a Jerusalén.
- source_word: וְנִלְחֲמוּ עָלֶיהָ
  english_pob_choice: they will fight against it
  chosen_spanish: pelearán contra ella
  alternatives_spanish:
  - harán guerra contra ella
  - la atacarán
  lexicon: HALOT
  rationale: «Pelearán contra ella» transmite el combate militar de forma directa. Se evita «atacarán» porque reduce el matiz de enfrentamiento bélico del verbo.
- source_word: וּלְכָדוּהָ
  english_pob_choice: capture it
  chosen_spanish: la tomarán
  alternatives_spanish:
  - la capturarán
  - la conquistarán
  - la apresarán
  lexicon: HALOT
  rationale: En contexto de asedio, לכד puede renderizarse como «tomar» una ciudad. Se prefirió «la tomarán» por ser una fórmula natural en español bíblico y suficientemente precisa; «capturarán» también es exacto, pero algo más técnico.
- source_word: וּשְׂרָפֻהָ בָאֵשׁ
  english_pob_choice: burn it with fire
  chosen_spanish: la quemarán con fuego
  alternatives_spanish:
  - la incendiarán
  - la prenderán fuego
  - la quemarán en fuego
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea con una formulación clara y literal. «Con fuego» mantiene el énfasis del original sin sobreinterpretarlo.
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las ciudades de Judá
  - las ciudades judías
  lexicon: HALOT
  rationale: Se preserva la relación constructa de manera transparente. «Judá» nombra el territorio/pueblo según el contexto histórico.
- source_word: אֶתֵּן שְׁמָמָה
  english_pob_choice: I will make ... a desolation
  chosen_spanish: convertiré ... en desolación
  alternatives_spanish:
  - haré ... una desolación
  - las dejaré desoladas
  - las haré desoladas
  lexicon: HALOT
  rationale: El hebreo נתן + שׁממה expresa tornar en desolación. «Convertiré ... en desolación» comunica bien el resultado y evita perder la fuerza resultativa del idiomismo.
- source_word: מֵאֵין יֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin nadie que habite allí
  - sin moradores
  - sin nadie que viva allí
  lexicon: HALOT
  rationale: Se reproduce la idiomática de despoblación total de modo conciso. «Sin habitante» mantiene el eco semítico y la fuerza colectiva del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la norma del proyecto en español, se traduce como «Yahvé» para preservar el nombre propio divino y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Causative force of וַהֲשִׁבֹתִים
  english_pob_reading: I will bring them back
  chosen_spanish_reading: haré que vuelvan
  alternative_spanish_readings:
  - los haré volver
  - los traeré de vuelta
  - los devolveré
  rationale: El verbo hebreo en hiphil indica que Yahvé causa el retorno. «Haré que vuelvan» conserva la fuerza causativa sin ambigüedad y sin sugerir un simple regreso voluntario.
  doctrine_reference: 'DOCTRINE.md: Verbs of divine causation — causative Hiphil should remain causative when context requires'
- issue: Idiomatic force of מֵאֵין יֹשֵׁב
  english_pob_reading: without inhabitant
  chosen_spanish_reading: sin habitante
  alternative_spanish_readings:
  - sin nadie que habite allí
  - sin moradores
  - deshabitada
  rationale: La expresión hebrea apunta a despoblación completa. «Sin habitante» preserva esa fuerza total y deja visible la imagen semítica del original.
  doctrine_reference: 'DOCTRINE.md: Idioms — Hebrew desolation formulas should remain totalizing rather than softened'
translation_notes:
  revision_awareness: 'Se siguió el paquete fuente en hebreo con el audit trail en inglés. No hubo revisiones posteriores en el registro aplicado; el acuerdo de revisión es alto y el contenido permanece estable. La traducción española mantiene las decisiones léxicas clave: nombre divino como Yahvé, causativo de שוב en forma explícita, y el modismo de desolación con valor totalizante.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «ciudad» para הָעִיר y «ciudades de Judá» para עָרֵי יְהוּדָה, conservando la relación geográfica e histórica.
  - «Haré que vuelvan» preserva la causalidad del hiphil sin perder naturalidad en español.
  - «Sin habitante» mantiene el carácter absoluto del cierre hebreo.
  - Las notas a y b están ancladas en el texto y reflejan alternativas léxicas relevantes sin alterar el sentido principal.
