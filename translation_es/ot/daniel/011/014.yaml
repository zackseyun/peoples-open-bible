translation:
  language: es
  text: Y en aquellos tiempos muchos se levantarán contra el rey del Sur, y los violentos[a] entre tu pueblo se exaltarán[b] para establecer la visión[c], pero tropezarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de los violentos entre tu pueblo»; la expresión hebrea es literalmente más compleja que la redacción fluida en español.
    reason: lexical_alternative
  - marker: b
    text: O «se levantarán en alto»; esto conserva más literalmente el matiz reflexivo de יִנַּשְּׂאוּ.
    reason: lexical_alternative
  - marker: c
    text: O «para cumplir la visión».
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָעִתִּים הָהֵם
  english_pob_choice: And in those times
  chosen_spanish: Y en aquellos tiempos
  alternatives_spanish:
  - Y en esos tiempos
  - Y en aquellos días
  lexicon: HALOT
  rationale: עִתִּים en plural con el demostrativo señala un período histórico determinado; «en aquellos tiempos» suena natural en español y conserva el marco temporal sin endurecerlo en un calco.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - multitudes
  lexicon: HALOT
  rationale: Aquí funciona sustantivamente; «muchos» reproduce la indefinición del hebreo sin añadir un sustantivo que el texto no expresa.
- source_word: יַעַמְד֖וּ עַל
  english_pob_choice: will rise up against
  chosen_spanish: se levantarán contra
  alternatives_spanish:
  - se pondrán contra
  - se alzarán contra
  lexicon: HALOT
  rationale: El giro idiomático עמד על en contexto hostil expresa oposición activa. «Se levantarán contra» preserva la imagen de alzarse en rebeldía y funciona con naturalidad en español.
- source_word: מֶלֶךְ הַנֶּגֶב
  english_pob_choice: the king of the South
  chosen_spanish: el rey del Sur
  alternatives_spanish:
  - el rey del Negev
  - el rey meridional
  lexicon: HALOT
  rationale: En Daniel 11, נֶגֶב designa la potencia geopolítica del «Sur», no simplemente la región del Néguev. Por eso se mantiene la designación direccional establecida por la tradición de lectura del capítulo.
- source_word: וּבְנֵי פָּרִיצֵי עַמְּךָ
  english_pob_choice: the violent among your people
  chosen_spanish: los violentos entre tu pueblo
  alternatives_spanish:
  - los hijos de los violentos entre tu pueblo
  - los violadores entre tu pueblo
  - los impíos entre tu pueblo
  lexicon: HALOT
  rationale: La construcción es sintácticamente densa; בְנֵי puede indicar pertenencia o caracterización. «Los violentos entre tu pueblo» conserva el matiz pejorativo de פָּרִיצִים sin forzar una paráfrasis explicativa ni identificar un grupo posterior no explícito en el texto.
- source_word: יִנַּשְּׂא֛וּ
  english_pob_choice: will lift themselves up
  chosen_spanish: se exaltarán
  alternatives_spanish:
  - se levantarán en alto
  - se enaltecieran
  - se alzarán
  lexicon: HALOT
  rationale: El sentido reflexivo del verbo sugiere autoexaltación o arrogancia. «Se exaltarán» comunica esa elevación de sí mismos con precisión y en un registro bíblico comprensible; además evita una imagen física extraña en español.
- source_word: לְהַעֲמִ֥יד חָז֖וֹן
  english_pob_choice: to establish the vision
  chosen_spanish: para establecer la visión
  alternatives_spanish:
  - para cumplir la visión
  - para hacer firme la visión
  - para hacer que la visión se mantenga
  lexicon: HALOT
  rationale: העמיד significa «hacer estar en pie, establecer». «Establecer la visión» permanece cerca del hebreo y deja abierta la relación exacta entre su acción y la visión profética, sin resolverla interpretativamente.
- source_word: חָז֖וֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la profecía
  - la revelación
  lexicon: HALOT
  rationale: Daniel usa חָזוֹן como término técnico de visión profética. «La visión» preserva esa terminología propia del libro.
- source_word: וְנִכְשָֽׁלוּ
  english_pob_choice: but they will stumble
  chosen_spanish: pero tropezarán
  alternatives_spanish:
  - pero caerán
  - pero fracasarán
  lexicon: HALOT
  rationale: כשל conserva la imagen de tropiezo, frecuentemente metafórica de ruina o fracaso. «Tropezarán» mantiene el valor imagético y no cierra el sentido a una sola consecuencia.
theological_decisions:
- issue: Interpretación de וּבְנֵי פָּרִיצֵי עַמְּךָ
  english_pob_reading: Rendered as 'the violent among your people' rather than a more literal 'sons of the violent of your people.'
  chosen_spanish_reading: «los violentos entre tu pueblo» en vez de una traducción más literal y pesada de «los hijos de los violentos de tu pueblo».
  alternative_spanish_readings:
  - los hijos de los violentos entre tu pueblo
  - los violentos de tu pueblo
  - los impíos entre tu pueblo
  rationale: Es sobre todo una decisión léxico-sintáctica, pero afecta la caracterización del grupo. La redacción elegida conserva la fuerza moral negativa sin introducir una identificación sectaria o histórica que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Interpretación de לְהַעֲמִיד חָזוֹן
  english_pob_reading: Rendered as 'to establish the vision' in the main text.
  chosen_spanish_reading: «para establecer la visión» en el texto principal.
  alternative_spanish_readings:
  - para cumplir la visión
  - para hacer firme la visión
  rationale: El verbo hebreo es «establecer/hacer estar en pie», no «cumplir» de manera explícita. Dado que la frase admite leer una acción orientada a la realización de la visión o a su confirmación, la traducción principal se mantiene cercana al original y no resuelve la ambigüedad.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión para suavizar «violent ones» a «violent» y por otro ajuste que volvió a una expresión más literal de יִנַּשְּׂאוּ; por eso la versión española mantiene «los violentos» y opta por un reflexivo idiomático («se exaltarán») que conserva el sentido de autoelevación sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Sur» para נֶגֶב, conforme al uso direccional del capítulo.
  - Se conserva «visión» para חָזוֹן, no «profecía», para respetar la terminología propia de Daniel.
  - «Tropezarán» reproduce la metáfora de כשל sin cerrarla en un único resultado.
  - No se usa «Cristo» ni vocabulario eclesiástico tradicional, porque el versículo no lo requiere.
