translation:
  language: es
  text: La palabra de Yahvé que vino al profeta Jeremías acerca de las naciones:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra las naciones». La preposición hebrea puede introducir el tema general o, según el contexto, oráculos hostiles dirigidos contra ellas.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Introduce la cláusula relativa de manera natural en español, manteniendo la conexión sintáctica del encabezado profético sin añadir contenido.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - fue
  - ocurrió
  lexicon: HALOT
  rationale: En la fórmula profética, «vino» reproduce de forma idiomática la llegada de la palabra divina al profeta, evitando una traducción demasiado literal de «era/fue».
- source_word: דְבַר יְהוָה
  english_pob_choice: The word of Yahweh
  chosen_spanish: La palabra de Yahvé
  alternatives_spanish:
  - El mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» conserva el peso formal y revelatorio del hebreo דְבַר־יְהוָה; «mensaje» sería más explicativo de lo que el texto exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: usar el nombre divino «Yahvé» en vez de una sustitución por título.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: Marca al destinatario de la palabra; en español, «a Jeremías» expresa con claridad esa dirección.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: HALOT
  rationale: Nombre propio asentado en español bíblico y plenamente inteligible para la lectura eclesial.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Jeremías
  lexicon: HALOT
  rationale: Se conserva el título apposicional explícito del hebreo, que forma parte del encabezado y de su tono formal.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: «Acerca de» mantiene el carácter de encabezado temático y deja abierta la tensión contextual entre asunto general y oráculo adverso, sin resolverla prematuramente.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentiles
  lexicon: HALOT
  rationale: En Jeremías 46–51 el referente son las potencias extranjeras; «naciones» es la forma más clara y sobria en español.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre propio de Dios, no un título. «Yahvé» preserva esa distinción y sigue la política del proyecto de no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de עַל הַגּוֹיִם en el encabezado
  english_pob_reading: concerning the nations
  chosen_spanish_reading: acerca de las naciones
  alternative_spanish_readings:
  - contra las naciones
  rationale: 'Se conserva la amplitud del encabezado: la expresión introduce el tema de la sección y no fuerza en la primera línea la carga hostil que el contexto posterior sí desarrolla. La alternativa «contra» sigue siendo viable en el flujo profético.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó acuerdo alto y no introdujo cambios; esta versión conserva la estructura del hebreo y la decisión auditada de mantener la ambigüedad de עַל con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto y de manera consistente con el resto de la serie.
  - Se mantiene «palabra» para דְבַר־יְהוָה, evitando sustituirlo por «mensaje» salvo necesidad contextual no presente aquí.
  - «Acerca de las naciones» conserva la ambigüedad funcional del encabezado profético y no anticipa la interpretación de los capítulos siguientes.
