  - marker: a
    text: O 'la comida de los gentiles'. El griego dice literalmente 'los panes de los gentiles', un giro idiomático para las provisiones de comida.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'los de mi linaje' a 'los de mi parentela' para reflejar mejor γένος como grupo de parentesco amplio, en línea con 'kindred' del rastro POB. También se cambia 'comían' a 'comieron' para seguir la decisión auditada de usar un pasado narrativo simple y mantener una lectura más natural en español, sin alterar el sentido central del original.
