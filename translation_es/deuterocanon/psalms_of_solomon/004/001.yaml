translation:
  language: es
  text: ¿Por qué tú, profano, te sientas en un consejo santo[b], mientras tu corazón se ha ido muy lejos del Señor, provocando al Dios de Israel con proverbios[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con burlas», «con dichos proverbiales» o «en lenguaje enigmático».
    reason: lexical_alternative
  - marker: b
    text: O «consejo piadoso».
    reason: previous_rendering
lexical_decisions:
- source_word: βέβηλε
  english_pob_choice: profane one
  chosen_spanish: profano
  alternatives_spanish:
  - impío
  - sin reverencia
  lexicon: LSJ
  rationale: El vocativo describe a la persona como irreverente o moralmente contaminada. “Profano” conserva el contraste directo con el consejo “piadoso” y suena natural en español bíblico sin suavizar la censura.
- source_word: συνεδρίῳ ὁσίῳ
  english_pob_choice: holy council
  chosen_spanish: consejo piadoso
  alternatives_spanish:
  - asamblea piadosa
  - consejo santo
  lexicon: LSJ
  rationale: συνέδριον apunta a un cuerpo deliberativo o consejo; ὅσιος tiene el matiz de piedad/fidelidad más que el de ἅγιος. “Consejo piadoso” refleja mejor ese valor y evita usar “santo” donde el griego no es ἅγιος.
- source_word: ἡ καρδία σου μακρὰν ἀφέστηκεν
  english_pob_choice: your heart has gone far away
  chosen_spanish: tu corazón se ha alejado lejos
  alternatives_spanish:
  - tu corazón se ha apartado lejos
  - tu corazón se ha ido muy lejos
  lexicon: LSJ
  rationale: El perfecto de ἀφίστημι indica un estado resultante de separación. “Se ha alejado lejos” conserva el movimiento y el distanciamiento persistente en un español claro y fiel.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  lexicon: LSJ
  rationale: Aunque el proyecto normalmente usa “Yahvé” para el nombre divino, aquí el texto griego dice κύριος y el audit trail inglés lo traduce como “Lord”. En español, “el Señor” mantiene esa equivalencia y el tono bíblico; no se introduce “Yahvé” sin un marcador textual explícito en el griego.
- source_word: ἐν παροιμίαις
  english_pob_choice: with proverbs
  chosen_spanish: con proverbios
  alternatives_spanish:
  - con dichos proverbiales
  - con refranes
  - con burlas
  lexicon: LSJ
  rationale: παροιμίαι significa primariamente “proverbios” o dichos proverbiales. Se conserva esa forma en el texto principal y se deja implícita la posible carga de dichos punzantes o burlones.
- source_word: παροργίζων
  english_pob_choice: provoking
  chosen_spanish: provocando
  alternatives_spanish:
  - irritando
  - exasperando
  - provocando a ira
  lexicon: LSJ
  rationale: El participio expresa causar ira. “Provocando” es idiomático en español y permite que el complemento “al Dios de Israel” sostenga la fuerza total del reproche.
theological_decisions:
- issue: Título divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: El contexto es claramente divino, pero el griego usa κύριος, y el auditable inglés mantiene “Lord”. En español se preserva “el Señor” como equivalente directo y reverente; se evita “Yahvé” porque no hay aquí una forma explícita del nombre hebreo en el texto fuente.
  doctrine_reference: Uso reverente del nombre divino en traducción bíblica; distinción entre κύριος y el tetragrámaton.
- issue: ὅσιος aplicado a συνεδρίον
  english_pob_reading: holy council / pious council in revision trail
  chosen_spanish_reading: consejo piadoso
  alternative_spanish_readings:
  - consejo santo
  - asamblea piadosa
  rationale: La revisión inglesa muestra oscilación, pero el propio aparato final vuelve a “holy council”. En español, “piadoso” evita confundir ὅσιος con ἅγιος y conserva el matiz de una corporación caracterizada por piedad/fidelidad.
  doctrine_reference: Distinción léxica entre santidad cultual y piedad/fidelidad comunitaria.
translation_notes:
  revision_awareness: El texto inglés de auditoría pasó por una corrección intermedia hacia “pious council”, pero la revisión más reciente revirtió esa opción a “holy council”. El español sigue la última lectura estable del registro, mientras conserva en la decisión léxica la razón por la que ὅσιος se rinde mejor como “piadoso” que como “santo”. También se mantuvo la ambigüedad de ἐν παροιμίαις mediante una nota alternativa, porque el inglés audit trail preserva varias posibilidades semánticas.
  spanish_consistency_notes:
  - Se usó “profano” para βέβηλε por su contraste natural con “piadoso”.
  - Se evitó “Cristo” o terminología no presente en el versículo.
  - “Señor” se emplea para κύριος como equivalente directo, no como máscara automática del nombre divino.
  - “Con proverbios” mantiene la literalidad del griego y deja abierta la matización retórica de la expresión.
  - La puntuación y el tratamiento vocativo siguen el español bíblico moderno con dignidad y claridad.
