translation:
  language: es
  text: Embriáguenlo[a], porque se ha engrandecido contra Yahvé; y Moab se revolcará en su vómito, y él también será motivo de burla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Moab aplaudirá / golpeará con las manos en su vómito». El verbo hebreo puede entenderse más literalmente, pero en este contexto «se revolcará» expresa mejor la imagen de humillación por la embriaguez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁכִּירֻהוּ
  english_pob_choice: Make him drunk
  chosen_spanish: Embriáguenlo
  alternatives_spanish:
  - Háganlo borracho
  - Métanle embriaguez
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de 3.ª masc. sing. pide causar embriaguez. «Embriáguenlo» conserva la fuerza causal y suena natural en español actual, manteniendo el matiz de juicio.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» expresa con claridad la causalidad.
- source_word: עַל יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - frente a Yahvé
  - en oposición a Yahvé
  lexicon: HALOT
  rationale: Con הִגְדִּיל, עַל marca oposición hostil. Se usa «contra» para conservar esa carga adversativa. Se mantiene «Yahvé» según el criterio del proyecto para el nombre divino.
- source_word: הִגְדִּיל
  english_pob_choice: has magnified himself
  chosen_spanish: se ha engrandecido
  alternatives_spanish:
  - se ha exaltado
  - ha actuado con arrogancia
  - se ha jactado
  lexicon: HALOT
  rationale: El hiphil de גדל expresa hacerse grande de manera arrogante. «Se ha engrandecido» sigue de cerca la imagen hebrea y permite el sentido reflexivo sin añadir más de lo que el texto requiere.
- source_word: וְסָפַק
  english_pob_choice: shall wallow
  chosen_spanish: revolerá
  alternatives_spanish:
  - chapoteará
  - se revolcará
  - aplaudirá
  lexicon: HALOT
  rationale: El verbo admite literalmente «aplaudir/golpear con las manos», pero en este contexto con «en su vómito» la imagen es de agitación humillante. «Revolverá» intenta reflejar esa escena degradante sin afirmar más de lo que el hebreo permite en contexto; se preserva la tensión lexical con la nota.
- source_word: בְּקִיאוֹ
  english_pob_choice: in his vomit
  chosen_spanish: en su vómito
  alternatives_spanish:
  - dentro de su vómito
  - sobre su vómito
  lexicon: HALOT
  rationale: Mantiene la concreción imagética del sustantivo y el valor locativo de la preposición.
- source_word: וְהָיָה לִשְׂחֹק
  english_pob_choice: shall become a laughingstock
  chosen_spanish: vendrá a ser motivo de burla
  alternatives_spanish:
  - será objeto de burla
  - vendrá a ser risa
  lexicon: HALOT
  rationale: La construcción expresa el estado resultante de ridículo público. «Motivo de burla» es idiomático en español y conserva el valor de objeto de escarnio.
- source_word: גַּם הוּא
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - hasta él
  lexicon: HALOT
  rationale: Refuerza la inclusión de Moab en el mismo destino de vergüenza; «él también» es directo y natural.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para traducir el Tetragrámaton como «Yahvé», preservando el nombre propio del pacto en lugar de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַל con הִגְדִּיל
  english_pob_reading: against Yahweh
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - sobre Yahvé
  - ante Yahvé
  rationale: La relación es de hostilidad o exaltación arrogante dirigida contra Yahvé; «contra» comunica mejor esa oposición que un sentido meramente espacial.
  doctrine_reference: HALOT; contexto profético de arrogancia y juicio
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conserva la lectura de juicio por embriaguez, la oposición contra Yahvé y la imagen de vergüenza pública. La única tensión lexical relevante es וְסָפַק, para la cual se mantiene una solución contextual con nota alternativa literal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - «Embriáguenlo» conserva el imperativo causal y la fuerza profética del hebreo.
  - «Motivo de burla» mantiene el resultado de escarnio sin introducir vocabulario eclesiástico innecesario.
