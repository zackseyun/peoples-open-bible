revisions:
- from: No hay quien la guíe entre todos los hijos que ha dado a luz; ni hay quien la tome de la mano entre todos los hijos que ella crió[a].
  to: No hay quien la guíe entre todos los hijos que ha dado a luz[a], y no hay quien la tome de la mano entre todos los hijos que ha criado.
  rationale: Se ajusta la conjunción para reflejar mejor la repetición hebrea, se elimina el pronombre innecesario «ella» para mayor naturalidad en español, y se corrige la nota al pie para que preserve la alternativa lexical real documentada en el POB inglés, especialmente el matiz de selección «de entre».
