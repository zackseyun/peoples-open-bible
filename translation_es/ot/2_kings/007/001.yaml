translation:
  language: es
  text: 'Entonces Eliseo dijo: «Escuchen la palabra de Yahvé. Así dice Yahvé: Mañana, como a esta hora, una seá[a] de flor de harina será por un siclo, y dos seás de cebada por un siclo, a la puerta de Samaria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una seá era una medida seca; el hebreo conserva la unidad específica en vez de usar un término genérico como «medida».
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene la secuencia natural en español sin perder el valor progresivo del verbo.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elías
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; «Eliseo» es la forma reconocible y fiel del hebreo.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Atiendan
  lexicon: HALOT
  rationale: Imperativo plural de שׁמע; «Escuchen» conserva la exhortación profética con un tono natural y directo.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» preserva el registro profético-covenantal de דְּבַר mejor que «mensaje»; se conserva «Yahvé» por la regla del proyecto para יהוה.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se mantiene con cadencia solemne y actual; «Así dice» refleja el presente performativo del hebreo.
- source_word: כָּעֵת מָחָר
  english_pob_choice: About this time tomorrow
  chosen_spanish: Mañana, a esta misma hora
  alternatives_spanish:
  - A esta hora mañana
  - Más o menos a esta hora mañana
  lexicon: HALOT
  rationale: La construcción idiomática hebrea expresa aproximación temporal; «a esta misma hora» comunica el sentido de כ sin rigidez literal.
- source_word: סְאָה
  english_pob_choice: seah
  chosen_spanish: una medida
  alternatives_spanish:
  - una sea
  lexicon: HALOT
  rationale: El texto hebreo nombra una unidad de volumen específica; en español, «una medida» conserva la función sin introducir un hebraísmo opaco en el cuerpo del texto. Se señala la especificidad en nota.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina de primera
  lexicon: HALOT
  rationale: סֹלֶת designa harina refinada; «flor de harina» es una equivalencia tradicional y clara en español bíblico, sin perder el valor de calidad superior.
- source_word: בְּשֶׁקֶל
  english_pob_choice: for a shekel
  chosen_spanish: costará un siclo
  alternatives_spanish:
  - por un siclo
  - a un siclo
  lexicon: HALOT
  rationale: El contexto es de precio de mercado, por eso se explicita la relación económica con «costará»; «siclo» conserva la unidad monetaria/ponderal.
- source_word: וְסָאתַיִם
  english_pob_choice: and two seahs
  chosen_spanish: dos medidas
  alternatives_spanish:
  - dos sea's
  - dos seas
  lexicon: HALOT
  rationale: El dual pluraliza la misma unidad; se mantiene la equivalencia funcional con «dos medidas» por claridad en español, dejando la precisión técnica en nota.
- source_word: שְׂעֹרִים
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - grano de cebada
  lexicon: HALOT
  rationale: Término agrícola estándar; «cebada» es la forma natural y precisa en español.
- source_word: בְּשַׁעַר שֹׁמְרוֹן
  english_pob_choice: at the gate of Samaria
  chosen_spanish: en la puerta de Samaria
  alternatives_spanish:
  - a la puerta de Samaria
  - en el portal de Samaria
  lexicon: HALOT
  rationale: «Puerta» reproduce el valor urbano-social de שַׁעַר como lugar público de acceso y comercio; «en» suena más natural que un calco preposicional.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre propio divino en español y evitando la sustitución por un título. La forma «Yahvé» es la preferida para la lectura pública en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantener la unidad de medida sin borrar la especificidad hebrea
  english_pob_reading: A seah was a dry measure; the Hebrew keeps the specific unit rather than a generic 'measure.'
  chosen_spanish_reading: una medida[b] ... (con nota explicativa de la seá)
  alternative_spanish_readings:
  - una sea
  - una medida seca
  rationale: 'El cuerpo del texto evita un hebraísmo poco transparente, pero no borra la unidad concreta: la nota conserva la especificidad histórica y económica del término hebreo.'
  doctrine_reference: POB audit trail on preserving concrete source detail
translation_notes:
  revision_awareness: El contexto en inglés mantuvo la traducción optimizada y añadió una nota cultural para seah; esta versión española conserva ese mismo criterio, pero adapta la unidad al uso comprensible en español mediante «medida» en el texto y una nota que restituye la precisión histórica. No se introdujeron cambios textuales sustantivos respecto del testimonio fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - «Flor de harina» se usa como equivalente bíblico natural de סֹלֶת, evitando una calco excesivamente técnico.
  - Se conserva la distinción entre la unidad de volumen y el precio, explicitando «costará» para el sentido comercial del pasaje.
  - «Puerta de Samaria» refleja el espacio cívico-comercial del hebreo שַׁעַר sin añadir interpretación.
