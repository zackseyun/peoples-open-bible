  text: Then Joshua took Achan son of Zerah[a], and the silver, the cloak, the bar of gold, his sons, his daughters, his ox, his donkey, his flock, his tent[b], and all that belonged to him—and all Israel with him—and they brought them up to the Valley of Achor.
