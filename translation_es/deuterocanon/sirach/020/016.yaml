translation:
  language: es
  text: 'Un necio dirá[a]: «No tengo amigo, y no hay gratitud por mis buenas obras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gratitud» aquí corresponde al sentido de χάρις; también puede traducirse «gracias» o «favor». La frase griega τοῖς ἀγαθοῖς μου puede entenderse como «mis buenas obras» o «mis beneficios».
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρὸς
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - un necio
  - el tonto
  - el insensato
  lexicon: LSJ
  rationale: En literatura sapiencial, μωρός designa a una persona necia o insensata. «El necio» conserva el tono proverbial y genérico del inglés POB sin sonar demasiado coloquial.
- source_word: ἐρεῖ
  english_pob_choice: will say
  chosen_spanish: dirá
  alternatives_spanish:
  - dirá así
  - dirá para sí
  - dirá
  lexicon: LSJ
  rationale: El futuro griego se refleja de forma directa con el futuro español «dirá», manteniendo el valor verbal sin forzar una forma perifrástica.
- source_word: Οὐχ ὑπάρχει μοι φίλος
  english_pob_choice: I have no friend
  chosen_spanish: No tengo amigo
  alternatives_spanish:
  - No hay para mí amigo
  - No me pertenece ningún amigo
  - No tengo un amigo
  lexicon: LSJ
  rationale: La construcción con ὑπάρχει y dativo expresa posesión/existencia relativa al hablante. «No tengo amigo» transmite esa idea de manera natural; se omite el artículo para conservar el sentido proverbial y general.
- source_word: χάρις
  english_pob_choice: gratitude
  chosen_spanish: gratitud
  alternatives_spanish:
  - gracias
  - favor
  - gracia
  lexicon: LSJ
  rationale: Aquí χάρις no es la gracia teológica, sino la respuesta agradecida ante beneficios recibidos. «Gratitud» conserva con claridad el sentido social-moral señalado por el POB inglés.
- source_word: τοῖς ἀγαθοῖς μου
  english_pob_choice: for my good deeds
  chosen_spanish: mis buenas obras
  alternatives_spanish:
  - mis buenos actos
  - mis beneficios
  - mis cosas buenas
  lexicon: LSJ
  rationale: El adjetivo sustantivado en plural puede referirse a bienes o acciones benéficas. «Mis buenas obras» comunica de forma natural la idea de benefacciones o actos de bien, siguiendo la interpretación del inglés POB sin exagerar el alcance.
theological_decisions:
- issue: Sentido de χάρις en un contexto sapiencial no teológico
  english_pob_reading: gratitude / thanks / favor
  chosen_spanish_reading: gratitud
  alternative_spanish_readings:
  - gracia
  - gracias
  - favor
  rationale: No hay aquí un uso doctrinal de «gracia». El contexto habla de la falta de respuesta agradecida hacia las obras buenas del hablante, por lo que «gratitud» evita confundir al lector español con el sentido teológico de la palabra.
  doctrine_reference: Uso contextual de χάρις en sabiduría, no doctrina de la gracia
- issue: Posesión/existencia en Οὐχ ὑπάρχει μοι φίλος
  english_pob_reading: I have no friend
  chosen_spanish_reading: No tengo amigo
  alternative_spanish_readings:
  - No hay para mí amigo
  - No tengo un amigo
  rationale: La idea no es una afirmación metafísica sino una queja de falta de amistades. La formulación española debe sonar proverbial y directa, manteniendo la ausencia relacional expresada por el griego.
  doctrine_reference: Sintaxis posesiva griega en proverbio sapiencial
translation_notes:
  revision_awareness: Coincide con la lectura inglesa auditada y no requiere revisión adicional; se conserva el futuro verbal, la posesión negativa y el sentido no teológico de χάρις.
  spanish_consistency_notes:
  - Se mantiene «necio» para μωρός, en línea con la terminología sapiencial.
  - Se evita «gracia» para χάρις porque en este contexto podría inducir una lectura doctrinal ajena al verso.
  - La nota refleja la ambigüedad del sintagma final sin introducir una paráfrasis excesiva.
