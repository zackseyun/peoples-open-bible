revisions:
- from: En aquel día haré brotar un cuerno para la casa de Israel[a], y te daré una apertura de boca entre ellos[b], y sabrán que yo soy Yahvé.
  to: En aquel día haré brotar un cuerno para la casa de Israel[a], y te daré una apertura de la boca entre ellos[b], y sabrán que yo soy Yahvé.
