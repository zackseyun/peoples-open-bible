revisions:
- from: Pero mi siervo Caleb[a], porque había en él un espíritu diferente[b], y me siguió plenamente[c], yo lo llevaré a la tierra donde fue, y su descendencia la poseerá[d].
  to: Pero mi siervo Caleb[a], porque había con él un espíritu diferente[b] y me siguió plenamente[c], yo lo llevaré a la tierra adonde fue, y su descendencia la poseerá[d].
  rationale: Se corrige la preposición de «en él» a «con él» para ajustarse mejor a עִמּוֹ y preservar la apertura teológica documentada. Se cambia «donde fue» por «adonde fue» para mejorar la naturalidad y precisión del español sin perder la cercanía al hebreo revisado en inglés. También se corrige la nota [a], cuya alternativa estaba mal indicada.
