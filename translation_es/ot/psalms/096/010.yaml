translation:
  language: es
  text: 'Digan entre las naciones[a]: «¡Yahvé reina! Sí, el mundo[b] está establecido; no será movido. Él juzgará a los pueblos con equidad[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé es rey», o «Yahvé ha llegado a reinar». El hebreo puede entenderse como una proclamación de realeza presente o como una entronización.'
    reason: alternative_reading
  - marker: b
    text: 'O: «la tierra habitada».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con rectitud» o «con imparcialidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Digan
  alternatives_spanish:
  - Digan
  - Declaren
  - Proclamen
  lexicon: HALOT
  rationale: El imperativo plural exige una orden pública dirigida a varios oyentes. «Digan» es natural en español y mantiene la fuerza directiva sin sobrecargar el mandato con un matiz interpretativo adicional.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre las naciones
  - en medio de las naciones
  - a las naciones
  lexicon: HALOT
  rationale: La preposición con גּוֹיִם indica la esfera donde debe oírse la proclamación. «Entre las naciones» conserva el alcance internacional y el sentido locativo-social del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte por el nombre divino transliterado, no por un sustituto como «SEÑOR». «Yahvé» sigue el criterio POB y es la forma más reconocible en español bíblico contemporáneo.
- source_word: מָלָךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - reina
  - es rey
  - ha llegado a reinar
  lexicon: HALOT
  rationale: El qatal en este himno de entronización funciona como proclamación presente de la realeza divina. «Reina» expresa bien esa declaración litúrgica sin resolver en exceso la tensión entre estado presente y entronización proclamada.
- source_word: תִּכּוֹן
  english_pob_choice: is established
  chosen_spanish: está establecido
  alternatives_spanish:
  - está establecido
  - queda establecido
  - está firmemente establecido
  lexicon: HALOT
  rationale: El nifal de כון expresa ser afirmado o hecho firme. «Está establecido» es fiel y fluido en español; se conserva el carácter resultativo de la afirmación.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo
  - el orbe
  - la tierra habitada
  lexicon: HALOT
  rationale: POB opta por «the world» para תֵּבֵל; en español «el mundo» comunica de forma natural la creación ordenada y habitada sin volverse técnico. La variante más explícita «la tierra habitada» se reserva para notas si fuera necesario.
- source_word: בַּל תִּמּוֹט
  english_pob_choice: shall not be moved
  chosen_spanish: no será movido
  alternatives_spanish:
  - no será movido
  - no vacilará
  - no se tambaleará
  lexicon: HALOT
  rationale: La negación poética más el nifal de מוֹט expresan estabilidad firme. «No será movido» conserva el eco bíblico y la imagen de firmeza sin perder inteligibilidad en español.
- source_word: יָדִין
  english_pob_choice: He will judge
  chosen_spanish: Él juzgará
  alternatives_spanish:
  - Él juzgará
  - Él gobernará
  - Él hará justicia a
  lexicon: HALOT
  rationale: דין aquí mantiene el sentido judicial en el contexto del reinado divino. «Juzgará» preserva la referencia forense sin excluir el trasfondo de gobierno real.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a los pueblos
  - a las naciones
  - a los pueblos y naciones
  lexicon: HALOT
  rationale: Se mantiene la pluralidad colectiva y la distinción con גּוֹיִם al inicio del versículo. «Pueblos» en español comunica bien los colectivos humanos sometidos al juicio de Dios.
- source_word: בְּמֵישָׁרִים
  english_pob_choice: with equity
  chosen_spanish: con equidad
  alternatives_spanish:
  - con equidad
  - con rectitud
  - con justicia
  lexicon: HALOT
  rationale: מֵישָׁרִים denota rectitud, llaneza y equidad. «Con equidad» reproduce el matiz de imparcialidad recta en el juicio y coincide con el valor jurídico del contexto.
theological_decisions:
- issue: Cómo traducir el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: Se conserva el nombre propio divino en lugar de sustituirlo por un título. Esto refleja la práctica POB y evita ocultar el nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del perfecto מָלָךְ en un salmo de entronización
  english_pob_reading: The LORD reigns
  chosen_spanish_reading: Yahvé reina
  alternative_spanish_readings:
  - Yahvé es rey
  - Yahvé ha llegado a reinar
  rationale: Se mantiene la proclamación presente de realeza como lectura litúrgica principal. No se fuerza una sola interpretación entre «es rey» y «ha comenzado a reinar», preservando la tensión histórica y celebrativa del hebreo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Revisión final sin cambios sustantivos respecto del último pase auditado; se mantiene el acuerdo alto con el control cruzado y no se introducen modificaciones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio POB.
  - Se conservó la secuencia poética de proclamación, estabilidad cósmica y juicio, sin añadir explicaciones dentro del texto principal.
  - «Pueblos» se reservó para עַמִּים para distinguirlo de «naciones» en la primera mitad del versículo.
  - La puntuación reproduce un llamado directo con cita, apto para lectura pública en español bíblico contemporáneo.
