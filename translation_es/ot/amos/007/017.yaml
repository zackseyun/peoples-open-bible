  rationale: Se corrige 'lejos de su tierra' a 'de su tierra' para ajustarse mejor a מֵעַל אַדְמָתוֹ y al rastro de auditoría inglés, evitando expansión interpretativa. También se simplifica 'por medio de un cordel' a 'por cordel' para un español más directo sin perder la imagen de medición explicada en la nota.
