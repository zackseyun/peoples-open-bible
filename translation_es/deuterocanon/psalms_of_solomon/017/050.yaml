    text: 'O: «..., las cuales Dios hará realidad» o «..., que Dios hará realidad».'
    reason: Preserva la alternativa de la revisión previa documentada en el audit trail inglés, donde la cláusula final se entendía como subordinada en vez de una exclamación volitiva independiente.
  revision_rationale: Se ajusta la sintaxis para un español más natural y fiel al valor de la beatitud («al ver»), se reemplaza una expresión poco idiomática por una súplica más natural («¡Que Dios lo haga realidad!»), y se añade la nota que conserva la alternativa histórica registrada en el POB inglés.
