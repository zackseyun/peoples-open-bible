lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación de la súplica anterior. «Porque» conserva ese valor causal/explanatorio de manera natural en español poético.
- source_word: אֵין
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: HALOT
  rationale: La negación existencial se expresa de forma idiomática en español con «no hay».
- source_word: בַּמָּוֶת
  english_pob_choice: in death
  chosen_spanish: en la muerte
  alternatives_spanish:
  - entre los muertos
  - al morir
  lexicon: HALOT
  rationale: La preposición con «muerte» se vierte locativamente como «en la muerte», manteniendo el paralelismo con «en el Seol».
- source_word: זִכְרֶךָ
  english_pob_choice: remembrance of you
  chosen_spanish: recuerdo de ti
  alternatives_spanish:
  - memoria de ti
  - mención de ti
  lexicon: HALOT
  rationale: זכר puede significar recuerdo, memoria o mención. «Recuerdo de ti» es claro, poético y mantiene la relación con la segunda cola, donde aparece la alabanza o acción de gracias.
- source_word: בִּשְׁאוֹל
  english_pob_choice: in Sheol
  chosen_spanish: en el Seol
  alternatives_spanish:
  - en la tumba
  - en el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva la transliteración «Seol» para preservar la especificidad del concepto hebreo, como en la POB inglesa.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿quién, pues?
  - ¿quién entonces?
  lexicon: HALOT
  rationale: Interrogativo directo para la pregunta retórica del paralelismo poético.
- source_word: יוֹדֶה לָּךְ
  english_pob_choice: will give thanks to you
  chosen_spanish: te dará gracias
  alternatives_spanish:
  - te alabará
  - te confesará
  lexicon: HALOT
  rationale: La forma causativa de ידה suele implicar dar gracias o alabar. «Te dará gracias» reproduce bien el sentido y el tono de la POB inglesa, con un español natural.
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: Se mantiene el término técnico hebreo en transliteración para no reducirlo a una equivalencia moderna más estrecha y para conservar la tensión teológica del texto poético.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical/theological tension.'
translation_notes:
  revision_awareness: Coincide con el último pase revisado como sin cambios; no se detectan revisiones aplicadas en el paquete auditado. La redacción española sigue la lectura estable del texto fuente y la decisión inglesa de conservar Sheol como término transliterado.
  spanish_consistency_notes:
  - Se mantiene el pronombre de segunda persona en minúscula porque no se trata de una regla tipográfica devocional específica dentro de este proyecto.
  - «Seol» se usa de forma consistente como transliteración de Sheol, alineada con la política del proyecto para términos técnicamente cargados.
  - «Te dará gracias» conserva el valor de reconocimiento agradecido sin forzar una paraphrasis de «alabar».
