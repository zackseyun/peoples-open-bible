translation:
  language: es
  text: 'Azel tuvo seis hijos[a], y estos fueron sus nombres: Azricam su primogénito, Ismael, Searías, Obadías y Hanán. Todos estos fueron los hijos de Azel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «A Azel le correspondieron seis hijos». El hebreo usa una fórmula genealógica de posesión/existencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָצֵל
  english_pob_choice: Azel had
  chosen_spanish: Azel tuvo
  alternatives_spanish:
  - A Azel le correspondieron
  - Para Azel fueron
  lexicon: HALOT
  rationale: La construcción genealógica con ל se expresa de manera natural en español con posesión/existencia. 'Tuvo' conserva la relación sin volver la frase artificial, y sigue de cerca la solución inglesa documentada.
- source_word: שִׁשָּׁה בָנִים
  english_pob_choice: six sons
  chosen_spanish: seis hijos
  alternatives_spanish:
  - seis hijos varones
  - seis varones
  lexicon: HALOT
  rationale: Aunque בָנִים suele ser 'hijos', en genealogías puede referirse a descendencia masculina. En español, 'hijos' evita una dureza innecesaria y mantiene la referencia genealógica. El contexto de la lista hace claro que son varones.
- source_word: וְאֵלֶּה שְׁמוֹתָם
  english_pob_choice: and these were their names
  chosen_spanish: y estos fueron sus nombres
  alternatives_spanish:
  - y estos son sus nombres
  - y estos eran sus nombres
  lexicon: HALOT
  rationale: La fórmula de introducción de nombres se conserva con un español idiomático. 'Fueron' refleja bien la enumeración retrospectiva y mantiene la estructura del hebreo sin sobrerreformularla.
- source_word: עַזְרִיקָם
  english_pob_choice: Azrikam
  chosen_spanish: Azricam
  alternatives_spanish:
  - Azrikam
  lexicon: HALOT
  rationale: Se translitera el nombre propio, pero se adapta la grafía al uso castellano preferente con c/k para una lectura más natural. Se conserva la forma reconocible del nombre sin cambiar su identidad.
- source_word: בֹּכְרוּ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo primogénito
  - el primogénito
  lexicon: HALOT
  rationale: El término designa al hijo primogénito. 'Primogénito' es preciso y natural en español bíblico contemporáneo; además mantiene la relación posesiva implícita en el hebreo y explicitada en la solución inglesa.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ishmael
  lexicon: HALOT
  rationale: Se usa la forma tradicional y ampliamente reconocible en español para el nombre propio.
- source_word: שְׁעַרְיָה
  english_pob_choice: Sheariah
  chosen_spanish: Searías
  alternatives_spanish:
  - Sheariah
  - Shaarías
  lexicon: HALOT
  rationale: Se busca una forma española legible y cercana a la transliteración del hebreo. 'Searías' preserva la secuencia consonántica básica y evita una calca excesivamente inglesa.
- source_word: עֹבַדְיָה
  english_pob_choice: Obadiah
  chosen_spanish: Obadías
  alternatives_spanish:
  - Obadiah
  lexicon: HALOT
  rationale: Nombre propio con forma tradicional en español. Se mantiene la equivalencia estándar y reconocible.
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Hanán
  alternatives_spanish:
  - Hanan
  lexicon: HALOT
  rationale: Se añade tilde para acomodar la prosodia del español y mantener una lectura natural de nombre propio bíblico.
- source_word: כָּל אֵלֶּה בְּנֵי אָצַל
  english_pob_choice: All these were the sons of Azel
  chosen_spanish: Todos هؤلاء fueron los hijos de Azel
  alternatives_spanish:
  - Todos estos fueron los hijos de Azel
  - Todos ellos fueron los hijos de Azel
  lexicon: HALOT
  rationale: La frase final concluye la lista genealógica. En español, 'Todos estos' es la equivalencia natural de כָּל אֵלֶּה. Se mantiene 'hijos de Azel' para conservar la formulación genealógica explícita del hebreo y del inglés auditado.
