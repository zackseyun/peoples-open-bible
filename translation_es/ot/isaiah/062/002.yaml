review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: las naciones ven la restauración pública de Sion, los reyes su gloria, y recibe un nombre nuevo dado por Yahvé. Sin embargo, hay problemas formales y de fidelidad auditiva al expediente inglés: el marcador [a] fue reutilizado indebidamente para dos notas distintas; la nota [b] no preserva la alternativa textual importante sobre el sufijo de ''lo'' en ''lo designará''; y ''serás llamado con un nombre nuevo'' es menos natural y menos preciso que ''serás llamada por un nombre nuevo'' en esta construcción. También conviene alinear mejor la opción principal de צִדְקֵךְ con el POB inglés mediante ''tu rectitud'' o, alternativamente, mantener ''justicia'' con mejores notas; aquí prefiero ''rectitud'' por claridad en español y por preservar mejor el matiz de righteousness sin reducirlo a justicia/vindicación.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta un error técnico serio en las notas y una formulación algo poco idiomática en 'serás llamado con'. Además, dado que el referente es Sion/Jerusalén en femenino, 'serás llamada' mejora la concordancia contextual del español bíblico. La frase final fluye bien con 'la boca de Yahvé', que debe mantenerse.
  glossary_alignment: 'Buena alineación con los términos del proyecto en ''Yahvé'', ''gloria'' y ''naciones''. La principal desalineación está en el manejo de las notas del audit trail: debe conservarse la alternativa sobre el sufijo de יִקֳּבֶנּוּ (''lo'', refiriéndose al nombre nuevo). Para צִדְקֵךְ, ''rectitud'' representa mejor ''righteousness'' del POB, mientras que ''justicia'' queda mejor como alternativa de nota.'
  issues:
  - severity: high
    issue: Se reutiliza el marcador [a] para dos notas distintas.
    rationale: Las instrucciones exigen marcadores únicos por registro. Además, el texto ancla [a] tanto en 'justicia' como en 'llamado', pero solo existe una nota con ese marcador.
  - severity: medium
    issue: La nota [b] no conserva la información relevante del expediente inglés sobre el hebreo 'lo designará', donde 'lo' se refiere al nombre nuevo.
    rationale: El POB inglés preserva una alternativa textual significativa ligada al sufijo masculino singular de יִקֳּבֶנּוּ. La nota española actual introduce una explicación nueva sobre el paralelismo, pero omite esa observación más importante.
  - severity: medium
    issue: '''Serás llamado con un nombre nuevo'' suena menos natural y preciso que ''serás llamada por un nombre nuevo''.'
    rationale: En español, la construcción de nombramiento suele expresarse mejor con 'por' o 'con el nombre de'. Además, el referente contextual es femenino (Sion/Jerusalén), por lo que 'llamada' encaja mejor.
  - severity: low
    issue: La elección principal 'tu justicia' para צִדְקֵךְ puede estrechar el matiz frente al inglés 'your righteousness'.
    rationale: Aunque 'justicia' es defendible, en español 'rectitud' preserva mejor el campo semántico de 'righteousness' sin inclinar tanto hacia justicia forense. Las alternativas pueden mantenerse en nota.
  revised_spanish_text: Las naciones verán tu rectitud[a], y todos los reyes tu gloria; y serás llamada por un nombre nuevo[b], que la boca de Yahvé designará.
  revised_footnotes:
  - marker: a
    text: O «tu vindicación» o «tu justicia» para «tu rectitud».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que la boca de Yahvé lo designará», donde «lo» se refiere al nombre nuevo.'
    reason: lexical_alternative
  revision_rationale: Se corrigen los marcadores de notas para que sean únicos y conformes a las instrucciones; se restituye en nota la observación importante del expediente inglés sobre el sufijo de 'lo designará'; se mejora la naturalidad y precisión de la construcción de nombramiento con 'serás llamada por un nombre nuevo'; y se ajusta צִדְקֵךְ a 'rectitud' para reflejar mejor el valor de 'righteousness' manteniendo 'vindicación' y 'justicia' como alternativas legítimas.
