translation:
  language: es
  text: Honra a Yahvé con tus bienes[a] y con las primicias de toda tu cosecha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «de tus bienes»; el hebreo con מִן después del mandato admite procedencia o medio.
    reason: lexical_alternative
  - marker: b
    text: «Primicias» designa la primera y mejor porción de la cosecha ofrecida en honor a Dios.
    reason: cultural_note
lexical_decisions:
- source_word: כַּבֵּד
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Da honor a
  - Glorifica
  lexicon: HALOT
  rationale: El imperativo piél de כבד expresa la idea de dar peso, valor o honra a alguien. «Honra» es la equivalencia natural en español y conserva el tono exhortativo sapiencial sin volverlo excesivamente litúrgico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se conserva el nombre divino como «Yahvé» en vez de sustituirlo por una mayúscula funcional o un título.
- source_word: מֵהוֹנֶךָ
  english_pob_choice: with your wealth
  chosen_spanish: con tus bienes
  alternatives_spanish:
  - de tus bienes
  - con tu riqueza
  - de tu riqueza
  lexicon: HALOT
  rationale: הוֹן designa riqueza, recursos o posesiones. En español, «bienes» comunica de forma amplia y natural los recursos materiales sin reducirlo solo a dinero. La preposición hebrea permite una relación instrumental o de procedencia; aquí se opta por «con» por su fluidez en el mandato.
- source_word: וּמֵרֵאשִׁית
  english_pob_choice: and with the firstfruits
  chosen_spanish: y con las primicias
  alternatives_spanish:
  - y con lo primero
  - y con la primera parte
  lexicon: HALOT
  rationale: רֵאשִׁית remite al primer porción o comienzo. En contexto agrícola, «primicias» es la equivalencia precisa y establecida para la ofrenda inicial o mejor parte de la cosecha.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - el conjunto de
  lexicon: HALOT
  rationale: כָּל significa «todo» aquí, modificando el sustantivo siguiente en sentido totalizador.
- source_word: תְּבוּאָתֶךָ
  english_pob_choice: your produce
  chosen_spanish: tu fruto
  alternatives_spanish:
  - tu producción
  - tu cosecha
  - tu rendimiento
  lexicon: HALOT
  rationale: תְּבוּאָה puede significar produce, rendimiento o cosecha. «Fruto» funciona bien en español bíblico para designar el producto de la tierra o del trabajo, manteniendo la amplitud semántica sin sonar artificial.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se preserva el nombre personal de Dios revelado en el hebreo, siguiendo la política del proyecto para el Tetragrámaton. Se evita la sustitución por un título funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de ‘firstfruits’ en contexto sapiencial
  english_pob_reading: firstfruits refers to the first and best portion of the harvest given in honor to God
  chosen_spanish_reading: primicias
  alternative_spanish_readings:
  - primeros frutos
  - primera porción
  rationale: «Primicias» conserva la carga cultural de la ofrenda de la primera y mejor parte de la cosecha dada a Dios, sin diluir la referencia agrícola.
  doctrine_reference: Uso cultural-sapiencial del término agrícola en Pr 3:9
translation_notes:
  revision_awareness: 'Se siguió el consenso alto del auditorio inglés: sin cambios sustantivos respecto a la lectura base; se mantuvieron Yahvé, una equivalencia instrumental natural para מִן y el valor cultural de «primicias». La única adaptación principal es la elección de «bienes» y «fruto» como español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה.
  - «Primicias» se usa de manera consistente para רֵאשִׁית en contexto de ofrenda agrícola.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - La preposición «con» refleja la lectura instrumental adoptada en el audit trail inglés.
