translation:
  language: es
  text: a los que guardan su alianza[a], y a los que recuerdan sus preceptos[b], para hacerlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su pacto».
    reason: lexical_alternative
  - marker: b
    text: O «sus instrucciones» o «sus mandatos» para «sus preceptos».
