translation:
  language: es
  text: Entonces trajeron los vasos de oro que habían sacado del templo[a], la casa de Dios, que estaba en Jerusalén; y el rey y sus nobles[b], sus esposas y sus concubinas, bebieron de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que habían sacado del templo». El arameo admite una formulación más activa; la redacción principal mantiene el énfasis en los vasos.'
    reason: lexical_alternative
  - marker: b
    text: «Sus esposas» traduce un término arameo que puede referirse a consortes reales; algunas traducciones ponen «sus reinas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca discursiva narrativa que introduce la acción siguiente en secuencia; 'Entonces' preserva la progresión sin sonar arcaico.
- source_word: הַיְתִיו
  english_pob_choice: they brought in
  chosen_spanish: trajeron
  alternatives_spanish:
  - introdujeron
  - hicieron traer
  lexicon: HALOT
  rationale: El contexto ya establece los vasos como objeto directo; en español, 'trajeron' comunica de forma natural la entrada de los vasos al banquete.
- source_word: מָאנֵי דַהֲבָא
  english_pob_choice: the gold vessels
  chosen_spanish: los vasos de oro
  alternatives_spanish:
  - los utensilios de oro
  - los recipientes de oro
  lexicon: HALOT
  rationale: '''Vasos'' conserva el sentido de objetos cultuales/vasijas y suena más natural en español bíblico que una traducción más general como ''utensilios''.'
- source_word: דִּי הַנְפִּקוּ
  english_pob_choice: that had been taken out
  chosen_spanish: que habían sacado
  alternatives_spanish:
  - que habían sido sacados
  - que habían retirado
  lexicon: HALOT
  rationale: El arameo permite una referencia pasiva/resultado; en español, la construcción activa impersonal 'habían sacado' mantiene el foco en los vasos y refleja la ambigüedad sin forzar un sujeto explícito.
- source_word: מִן הֵיכְלָא
  english_pob_choice: out of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - de la casa santa
  - del santuario
  lexicon: HALOT
  rationale: '''Templo'' es el equivalente claro y directo en este contexto. La preposición ''del'' basta en español para expresar el origen desde el templo.'
- source_word: דִּי בֵית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de el Dios
  - la morada de Dios
  lexicon: HALOT
  rationale: Conserva la fórmula bíblica y refleja el paralelo explicativo del texto. 'La casa de Dios' es más natural que 'la casa de el Dios' en español.
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: which was in Jerusalem
  chosen_spanish: que estaba en Jerusalén
  alternatives_spanish:
  - que era en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: La relativa expresa la localización del templo/casa de Dios. 'Estaba' resulta fluido y fiel al estado locativo.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo con artículo definido.
- source_word: רַבְרְבָנוֹהִי
  english_pob_choice: his nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus grandes
  - sus dignatarios
  lexicon: HALOT
  rationale: '''Nobles'' traduce con precisión el grupo de altos oficiales o magnates y coincide con la elección de la POB inglesa.'
- source_word: שֵׁגְלָתֵהּ
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus reinas
  - sus consortes
  lexicon: HALOT
  rationale: El término puede referirse a mujeres reales/consortes; 'esposas' es comprensible y evita reducir indebidamente el campo semántico a 'reinas'.
- source_word: וּלְחֵנָתֵהּ
  english_pob_choice: his concubines
  chosen_spanish: sus concubinas
  alternatives_spanish:
  - sus secundarias esposas
  lexicon: HALOT
  rationale: Es el equivalente preciso y tradicionalmente transparente para una categoría distinta de las esposas.
translation_notes:
  revision_awareness: 'Coincide con el testimonio hebreo/arameo y con el audit trail inglés en el sentido y la estructura: marcador temporal, verbo de traslado, objeto cultual, procedencia del templo de Dios en Jerusalén, y la lista de participantes en el banquete. No se registran revisiones aplicadas en el dossier inglés; por ello se mantiene una solución conservadora pero natural en español.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלָהָא conforme al estándar POB.
  - Se prefirió 'esposas' en el texto principal por claridad, con nota sobre la posibilidad de 'reinas' o 'consortes'.
  - Se evitó 'SEÑOR' porque aquí el texto habla de la casa de Dios, no del Tetragrámaton.
  - La puntuación separa la cláusula relativa y el tramo final de participantes para reflejar la sintaxis de la secuencia aramea.
