revisions:
- from: Porque los hijos de José eran dos tribus[a], Manasés y Efraín; y no dieron parte a los levitas en la tierra, sino ciudades para habitar[c][b], con sus ejidos para su ganado y para sus posesiones.
  to: Porque los hijos de José eran dos tribus[a], Manasés y Efraín; y no dieron parte a los levitas en la tierra, sino ciudades para habitar, con sus tierras de pastoreo[b] para su ganado y para sus posesiones.
  rationale: Se corrigió el aparato de notas para que cada nota corresponda a su anclaje real y se eliminó la nota [c], que era editorialmente incoherente. También se reemplazó «ejidos» por «tierras de pastoreo» para una lectura más clara y panhispánica, manteniendo fielmente el sentido de מִגְרְשֵׁיהֶם y la explicación cultural del POB inglés.
