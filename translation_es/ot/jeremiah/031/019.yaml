base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/019.yaml
  text: For after I turned back[a], I repented; and after I was instructed, I struck my thigh. I was ashamed, and also humiliated[c][b], because I bore the disgrace of my youth.
  footnotes:
