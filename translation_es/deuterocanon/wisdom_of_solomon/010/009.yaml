translation:
  language: es
  text: Pero la sabiduría rescató a los que la servían de sus aflicciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de sus trabajos’, ‘de sus sufrimientos’ o ‘de sus dolores’. El término griego puede abarcar labor penosa, sufrimiento o aflicción en un sentido más amplio.
