base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/016.yaml
  text: How much better to acquire wisdom than gold[b][a], and to acquire understanding is to be chosen rather than silver.
  footnotes:
  - marker: a
    text: Or 'fine gold' for 'gold' (חָרוּץ), emphasizing especially precious or refined gold.
    reason: lexical_alternative
  - marker: b
    text: Or 'understanding is preferable to silver.' The Hebrew participle can be rendered more idiomatically as a statement of preference.
    reason: lexical_alternative
