id: TOB.7.11
reference: Tobit 7:11
source:
  edition: lxx-swete-1909
  text: ἔδωκα τὸ παιδίον μου ἑπτὰ ἀνδράσιν, καὶ ὁπότε ἐὰν εἰσεπορεύοντο πρὸς αὐτήν, ἀπέθνησκον ὑπὸ νύκτα. ἀλλὰ τὸ νῦν ἔχων ἡδέως γίνου. καὶ εἶπεν Τωβίας Οὐ γεύομαι οὐδὲν ὧδε ἕως ἂν στήσητε καὶ σταθῆτε πρὸς μέ.
