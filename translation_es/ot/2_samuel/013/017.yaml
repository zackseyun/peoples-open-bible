translation:
  language: es
  text: 'Entonces llamó a su joven sirviente y dijo[a]: «Por favor, saca a esta[b] de mi presencia, afuera, y echa el cerrojo a la puerta detrás de ella[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente ‘dijo’, sin contenido adicional; la explicación importante en este versículo recae en el demostrativo femenino ‘esta’.
    reason: translation_note
  - marker: b
    text: El hebreo usa un demostrativo femenino, ‘esta’, que aquí se refiere a Tamar con un tono deliberadamente distante y despectivo. El español conserva ‘esta’ sin añadir ‘mujer’.
    reason: lexical_alternative
  - marker: c
    text: 'O: ‘atranca la puerta detrás de ella’ o ‘cierra con cerrojo la puerta detrás de ella’. El verbo hebreo puede significar ‘poner cerrojo’, ‘trancar’ o ‘cerrar con seguro’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרוֹ מְשָׁרְתוֹ
  english_pob_choice: his young man who served him
  chosen_spanish: su joven que le servía
  alternatives_spanish:
  - su sirviente
  - su asistente
  lexicon: HALOT
  rationale: נַעַר puede significar ‘joven’, ‘sirviente’ o ‘asistente’; el participio מְשָׁרֵת añade la idea de servicio continuo. ‘Su joven que le servía’ conserva ambos matices sin reducir la frase a un solo cargo.
- source_word: שִׁלְחוּ נָא
  english_pob_choice: Please send
  chosen_spanish: Por favor, envíen
  alternatives_spanish:
  - Por favor, despachen
  - Envíen, por favor
  lexicon: HALOT
  rationale: El imperativo plural שִׁלְחוּ + נָא expresa una petición urgente y cortés. En español, ‘Por favor, envíen’ transmite naturalmente esa fuerza sin endurecer indebidamente el tono.
- source_word: זֹאת
  english_pob_choice: this one
  chosen_spanish: esta
  alternatives_spanish:
  - esta mujer
  - esto
  lexicon: HALOT
  rationale: El demostrativo femenino singular apunta a Tamar con distancia deliberada. En español, ‘esta’ mantiene la deíxis y el desprecio implícito sin añadir un sustantivo que el hebreo no tiene.
- source_word: מֵעָלַי
  english_pob_choice: away from me
  chosen_spanish: lejos de mí
  alternatives_spanish:
  - fuera de mi presencia
  - apartada de mí
  lexicon: HALOT
  rationale: La expresión literalmente significa ‘de sobre mí’, pero en contexto indica alejamiento. ‘Lejos de mí’ es una equivalencia natural y clara en español.
- source_word: הַחוּצָה
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: La forma con artículo funciona adverbialmente como ‘afuera/al exterior’. ‘Afuera’ resulta idiomático y conciso en español contemporáneo.
- source_word: וּנְעֹל
  english_pob_choice: and bolt
  chosen_spanish: y echen el cerrojo
  alternatives_spanish:
  - y cierren con cerrojo
  - y aseguren la puerta
  lexicon: HALOT
  rationale: נעל puede significar ‘cerrar con cerrojo’, ‘trancar’ o ‘cerrar’. ‘Echen el cerrojo’ preserva la imagen concreta del acto de asegurar la puerta y su fuerza verbal.
- source_word: אַחֲרֶיהָ
  english_pob_choice: behind her
  chosen_spanish: detrás de ella
  alternatives_spanish:
  - tras ella
  - a sus espaldas
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse ‘después de ella’, el contexto de una puerta pide el valor idiomático ‘detrás de ella’.
theological_decisions:
- issue: El demostrativo femenino de desprecio aplicado a Tamar
  english_pob_reading: Hebrew 'this'; the feminine form refers to Tamar with a deliberately distancing, contemptuous tone. 'This woman' makes the referent explicit in English.
  chosen_spanish_reading: El hebreo usa un demostrativo femenino que se refiere a Tamar con tono despectivo; en español se conserva con ‘esta’ sin añadir ‘mujer’.
  alternative_spanish_readings:
  - esta mujer
  - esta muchacha
  - ella
  rationale: Agregar ‘mujer’ interpretaría más de lo que el texto exige y podría suavizar o alterar el matiz despectivo. ‘Esta’ preserva la distancia sin perder la referencia femenina implícita.
  doctrine_reference: N/A (pragmática narrativa / valoración del hablante)
- issue: Dirección y cierre de la puerta
  english_pob_reading: Or 'lock the door behind her.' The Hebrew verb can mean 'bolt,' 'bar,' or 'lock.'
  chosen_spanish_reading: ‘Echen el cerrojo de la puerta’ deja abierta la posibilidad de cierre fuerte/asegurado sin forzar ‘cerrar’ como única opción.
  alternative_spanish_readings:
  - cierren la puerta con llave
  - traben la puerta
  - pongan el cerrojo
  rationale: El verbo hebreo admite varias soluciones; ‘cerrojo’ mantiene la imagen física y evita especificar una tecnología moderna como ‘llave’.
  doctrine_reference: N/A (variación léxica)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que cambió ‘this woman’ por ‘this one’ para reflejar con más precisión el demostrativo hebreo זֹאת. En español se siguió esa misma cautela, evitando introducir un sustantivo inexistente en el hebreo y preservando la referencia femenina implícita.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se prefirió un castellano neutral y readable: ‘afuera’, ‘cerrojo’, ‘detrás de ella’.'
  - Se evitó traducir mecánicamente el hebreo literal ‘de sobre mí’ para no crear una expresión antinatural en español.
  - La puntuación y el discurso directo siguen el registro bíblico moderno del proyecto.
