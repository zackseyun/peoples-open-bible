translation:
  language: es
  text: Ellos comerán porciones iguales[a], además de lo que reciba por la venta de su patrimonio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «además de lo que recibe por vender bienes familiares»; el hebreo de la cláusula final es difícil y puede referirse más ampliamente a ingresos vinculados a su casa ancestral.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: porciones
  alternatives_spanish:
  - parte
  - porción
  - reparto
  lexicon: HALOT
  rationale: חֵלֶק expresa una porción o parte asignada. En español, «porciones» mantiene la idea concreta de una repartición de sustento sin volverla abstracta.
- source_word: כְּחֵלֶק
  english_pob_choice: equal portions
  chosen_spanish: porciones iguales
  alternatives_spanish:
  - porción tras porción
  - porciones por igual
  - porciones equivalentes
  lexicon: HALOT
  rationale: La construcción es idiomática y expresa equivalencia distributiva. «Porciones iguales» comunica de manera natural que no hay diferencia en el reparto.
- source_word: יֹאכֵלוּ
  english_pob_choice: they shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerán de
  - recibirán para comer
  - participarán de
  lexicon: HALOT
  rationale: Se conserva el verbo concreto «comer» para reflejar el giro hebreo de recibir sustento como alimento, sin abstraerlo a «recibir».
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - excepto
  - fuera de
  lexicon: HALOT
  rationale: Aquí introduce algo adicional o separado del reparto igual. «Además de» expresa bien la adición en español moderno y evita ambigüedad innecesaria.
- source_word: מִמְכָּרָיו
  english_pob_choice: what comes from the sale of his patrimony
  chosen_spanish: lo que provenga de la venta de su patrimonio
  alternatives_spanish:
  - lo que reciba por la venta de sus bienes familiares
  - el producto de su venta
  - lo que venda
  lexicon: HALOT
  rationale: El término puede referirse a ingresos o producto de venta. «Lo que provenga de la venta de su patrimonio» conserva la relación con bienes heredados/familiares sin cerrar indebidamente la ambigüedad.
- source_word: עַל הָאָבוֹת
  english_pob_choice: of his patrimony
  chosen_spanish: de su patrimonio
  alternatives_spanish:
  - de su herencia paterna
  - de su heredad ancestral
  - según los padres
  lexicon: HALOT
  rationale: La frase es elíptica y difícil. Siguiendo la lectura contextual del POB en inglés, «de su patrimonio» expresa de forma idiomática la idea de bienes heredados o vinculados a la casa ancestral, sin resolver en exceso la tensión del hebreo.
theological_decisions:
- issue: Interpretación de la cláusula final difícil
  english_pob_reading: The clause refers to private income derived from ancestral/family property or patrimonial rights, additional to the equal priestly share.
  chosen_spanish_reading: La cláusula alude a ingresos privados derivados del patrimonio o derechos familiares ancestrales, adicionales a la porción igual.
  alternative_spanish_readings:
  - además de lo que reciba por vender bienes familiares
  - aparte de lo que le corresponde por casas ancestrales
  - excepto las ventas hechas según los padres
  rationale: La sintaxis hebrea es comprimida y admite varias lecturas. La versión española conserva esa dificultad mediante una formulación prudente, manteniendo el sentido práctico del contexto sin forzar una explicación única.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: Relación entre el reparto igual y el ingreso patrimonial
  english_pob_reading: The equal share is given regardless of any separate personal income tied to family inheritance or patrimonial assets.
  chosen_spanish_reading: La porción igual se da independientemente de cualquier ingreso personal separado ligado a la herencia familiar o a bienes patrimoniales.
  alternative_spanish_readings:
  - la porción igual se recibe aparte de bienes familiares
  - el reparto igual excluye los ingresos patrimoniales
  - la igualdad del reparto solo se refiere al sustento del santuario
  rationale: El texto pone en contraste el sustento común con otra posible fuente de ingreso. La redacción española deja claro ese contraste sin añadir conclusiones doctrinales o históricas que el hebreo no exige.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: El texto coincide con el último pase de revisión, que no introdujo cambios y fue verificado como de alta concordancia.
  spanish_consistency_notes:
  - Se conserva el verbo concreto «comer» para reflejar el idioma sacerdotal del hebreo.
  - «Patrimonio» se usa como equivalente idiomático de la idea de heredad o casa ancestral, en línea con la lectura auditada en inglés.
  - Se mantiene la ambigüedad controlada de la cláusula final mediante nota, sin sustituirla por una paráfrasis interpretativa excesiva.
