- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: Se emplea la forma castellana tradicional 'Coré', más natural en español bíblico y ampliamente reconocible, sin alterar la identidad del nombre propio.
- source_word: וָ/נֶפֶג
  english_pob_choice: and Nepheg
