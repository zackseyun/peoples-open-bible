base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/016/001.yaml
  text: So they brought in the ark of God and set it in the midst of the tent that David had pitched for it[b][a], and they offered burnt offerings and peace offerings before God.
  footnotes:
  - marker: a
    text: Or 'inside the tent' or 'within the tent'; the Hebrew phrase can denote being within something, though literally it is 'in the midst of the tent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
