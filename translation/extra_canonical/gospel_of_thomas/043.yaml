  from: He said to them, "From what I say in your ears,
  to: '"From what I say to you,'
  rationale: 'The Coptic text does not contain an introductory "He said to them" (ⲡⲉϫⲁϥ
    ⲛⲁⲩ); the dialogue shifts speakers directly. More importantly, "in your ears"
    is a severe mistranslation. The manuscript reads ⲙ̄ⲙⲟⲟⲩ ⲛⲏⲧⲛ̄ ("them to you").
    The draft misread the normalized form ⲛⲛⲧⲟⲟⲩ (the object marker ⲛ- + 3rd plural
    pronoun ⲛⲧⲟⲟⲩ) as a noun meaning "ears" (which would be ⲙⲁⲁϫⲉ). The phrase ϩⲛ̄
    ⲛⲉϯϫⲱ ⲙ̄ⲙⲟⲟⲩ ⲛⲏⲧⲛ̄ simply means "From the things I say to you". | Azure: The proposed
    change is clearly supported by the Coptic. The reviewer is right that the phrase
    is built on ϩⲛ̄ + ⲛⲉϯϫⲱ + object pronoun construction, with ⲙ̄ⲙⲟⲟⲩ/normalized
    ⲛⲛⲧⲟⲟⲩ referring to “them” ('
