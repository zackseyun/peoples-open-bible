translation:
  language: es
  text: 'Y por la mañana la palabra de Yahvé vino a mí[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El wayyiqtol introduce la fórmula profética narrativa. En español, "vino" conserva el movimiento de llegada de la palabra y suena más natural que un calco como "sucedió" o "aconteció" sin perder la progresión narrativa marcada por el hebreo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: '"Palabra" preserva el sustantivo דבר y la fórmula profética estable. Se usa "Yahvé" conforme al criterio del proyecto para יְהוָה, evitando la máscara tradicional "SEÑOR" y manteniendo el nombre divino explícito en español.'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición más el sufijo de primera persona se vierte de manera directa y natural como "a mí". Conserva la referencia personal del receptor de la revelación sin añadir matices que el hebreo no exige.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: '"Por la mañana" es idiomático en español y expresa el marco temporal del momento en que vino la palabra. "En la mañana" es posible, pero menos natural en este giro formular; "al amanecer" estrecha más el sentido de lo que permite el hebreo.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así diciendo
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso directo siguiente. "Diciendo" mantiene la transición formal y el valor de enlace sin convertir la frase en una paráfrasis más libre.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente, no un sustituto. Siguiendo la política del proyecto, se preserva el nombre del pacto como "Yahvé" en la línea principal, manteniendo la transparencia frente al texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés POB ya optó por una traducción óptima y no requirió revisiones; el español sigue la misma lectura del nombre divino y de la fórmula profética, adaptándolos a una sintaxis natural sin perder el valor léxico de דבר ni la referencia explícita a יְהוָה.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como "Yahvé" de forma consistente con el estándar del proyecto.
  - Se conserva la fórmula profética con "la palabra de Yahvé" y el enlace temporal inicial con "Y vino".
  - La puntuación con coma antes de "diciendo" refleja la apertura de discurso del hebreo y la lectura fluida en español.
