    reason: alternative_reading
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido: «ganar» expresa mejor πορίζειν en esta construcción que «obtener ganancia». También se suavizó «aun» a «incluso» por fluidez contemporánea. En la nota [a], «celebración lucrativa» refleja mejor la alternativa inglesa documentada que repetir «feria lucrativa», ya que la nota busca preservar la variante léxica del sustantivo festivo.'
