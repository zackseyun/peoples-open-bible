translation:
  language: es
  text: 'Esta fue la ofrenda de dedicación del altar el día en que fue ungido[a], de los líderes de Israel[b]: doce platos de plata, doce tazones de plata[c] y doce cucharas de oro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Esta es la dedicación del altar”; el hebreo puede traducirse de manera más formal, pero el contexto favorece un resumen retrospectivo de las ofrendas presentadas.
    reason: lexical_alternative
  - marker: b
    text: O “jefes” o “príncipes de Israel”. El término hebreo se refiere a los líderes tribales reconocidos.
    reason: lexical_alternative
  - marker: c
    text: Los nombres de las vasijas también pueden verterse como “platos de plata”, “fuentes de plata” y “bandejas/cucharones de oro”, según cómo se entienda la forma exacta de los utensilios cultuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente “esta”, el contexto es un resumen retrospectivo de las ofrendas ya presentadas; por eso el pasado “fue” comunica bien el valor resumidor sin perder la fuerza demostrativa.
- source_word: חֲנֻכַּת
  english_pob_choice: dedication offering
  chosen_spanish: ofrenda de dedicación
  alternatives_spanish:
  - dedicación
  - ofrenda de consagración
  lexicon: HALOT
  rationale: El sustantivo expresa dedicación/consagración. En este contexto alude a los objetos ofrecidos para la dedicación del altar, así que “ofrenda de dedicación” hace explícito el sentido de ofrenda sin exagerar el texto.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el sacrificatorio
  lexicon: HALOT
  rationale: Término cultual estándar; “altar” es natural y exacto en español.
- source_word: בְּיוֹם הִמָּשַׁח אֹתוֹ
  english_pob_choice: on the day it was anointed
  chosen_spanish: el día en que fue ungido
  alternatives_spanish:
  - el día de su unción
  - cuando fue ungido
  lexicon: HALOT
  rationale: La forma temporal del hebreo se expresa con naturalidad en español. “Ungido” mantiene el paralelismo cultual del texto; aquí el referente es el altar, implícito por el contexto.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: por parte de
  alternatives_spanish:
  - de parte de
  - de
  lexicon: HALOT
  rationale: La preposición señala origen/procedencia de las ofrendas. “Por parte de” suena más natural en español para introducir a los oferentes y conserva la idea de procedencia.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: the leaders of Israel
  chosen_spanish: los líderes de Israel
  alternatives_spanish:
  - los jefes de Israel
  - los príncipes de Israel
  lexicon: HALOT
  rationale: “Líderes” expresa bien la función de נָשִׂיאֵי en Números sin introducir un matiz aristocrático innecesario. Mantiene el sentido de jefes tribales reconocidos.
- source_word: קַעֲרֹת כֶּסֶף
  english_pob_choice: silver dishes
  chosen_spanish: platos de plata
  alternatives_spanish:
  - fuentes de plata
  - platillos de plata
  lexicon: HALOT
  rationale: קַעֲרָה designa una pieza tipo plato/plato hondo o fuente. “Platos” es claro en español y permite distinguir esta clase de vasijas de las siguientes.
- source_word: מִזְרְקֵי כֶסֶף
  english_pob_choice: silver bowls
  chosen_spanish: tazones de plata
  alternatives_spanish:
  - cuencos de plata
  - jofainas de plata
  lexicon: HALOT
  rationale: מִזְרָק apunta a un recipiente de servicio ritual, más cercano a un cuenco/tazón que a un plato. “Tazones” mantiene la distinción funcional y suena natural.
- source_word: כַּפּוֹת זָהָב
  english_pob_choice: gold pans
  chosen_spanish: copas de oro
  alternatives_spanish:
  - platos de oro
  - cucharas de oro
  lexicon: HALOT
  rationale: כַּף puede referirse a una pieza pequeña de recipiente/vasija; en inventarios cultuales, “copas” comunica bien un utensilio pequeño y valioso en español, aunque la forma exacta del objeto es discutida. Se mantiene el carácter de pieza ritual sin forzar una equivalencia demasiado moderna.
- source_word: שְׁתֵּים עֶשְׂרֵה / שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - '12'
  lexicon: HALOT
  rationale: Número cardinal directo; en español no hace falta distinguir género en la forma numérica.
theological_decisions:
- issue: Valor retrospectivo del encabezado (“Esta fue” vs. “Esta es”)
  english_pob_reading: This was the dedication offering of the altar
  chosen_spanish_reading: Esta fue la ofrenda de dedicación del altar
  alternative_spanish_readings:
  - Esta es la ofrenda de dedicación del altar
  rationale: El inglés POB opta por un pasado retrospectivo porque el versículo resume una lista ya presentada. La versión española sigue ese mismo valor temporal para respetar la función discursiva del hebreo.
  doctrine_reference: Números 7:84; coherencia discursiva del relato cultual
- issue: Identificación del sujeto implícito de “ungido”
  english_pob_reading: on the day it was anointed
  chosen_spanish_reading: el día en que fue ungido
  alternative_spanish_readings:
  - el día en que fue ungido el altar
  - el día de la unción del altar
  rationale: El hebreo se refiere al altar, aunque no lo repite en la segunda cláusula. En español conviene mantener la referencia implícita, con suficiente claridad contextual, sin añadir innecesariamente un sustantivo que el texto no repite.
  doctrine_reference: Contexto inmediato de la dedicación del altar en Números 7
translation_notes:
  revision_awareness: Se siguió el pasaje fuente y el audit trail en inglés, sin cambios respecto al criterio de equivalencia óptima ya validado; la versión española conserva el valor retrospectivo, la procedencia de las ofrendas y la distinción entre los tres tipos de vasijas.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” en el estándar del proyecto solo cuando corresponde; este versículo no lo contiene.
  - Se preservó el contraste de recipientes cultuales con términos distintos en español para no nivelar indebidamente קערות, מזרקים y כפות.
  - Se eligió “ungido” para el participio verbal por ser la forma cultual más natural y precisa en español.
  - Se usó “líderes” para נְשִׂיאֵי יִשְׂרָאֵל, evitando “príncipes” como término menos neutral en español contemporáneo.
