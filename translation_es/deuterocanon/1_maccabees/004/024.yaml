revisions:
- from: 'Y cuando regresaron, entonaban himnos y daban alabanza hacia el cielo: «Porque es bueno[a]; su misericordia es para siempre[b]».'
  to: 'Y cuando regresaron, cantaban himnos y alababan al cielo[a]: «Porque él es bueno[b]; su misericordia es para siempre»'
  rationale: Se corrige el anclaje de la nota cultural para que recaiga sobre «al cielo», se ajusta la fórmula de alabanza a la decisión principal del POB («porque él es bueno»), y se mejora la naturalidad del español con «alababan» y «al cielo». La nota alternativa ahora preserva la lectura más literal e impersonal documentada en el expediente inglés.
