translation:
  language: es
  text: Y el holocausto que el príncipe presenta a Yahvé en el día de reposo será de seis corderos sin defecto y un carnero sin defecto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrece»; el verbo hebreo literalmente significa «acerca» o «trae cerca» en uso sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: עֹלָה es el término técnico del sacrificio que se quema por completo. En español bíblico, «holocausto» comunica bien esa ofrenda total y conserva el valor cultual sin volverla un calco extraño. Aunque «ofrenda quemada» sería más descriptivo, es menos establecido y más pesado en esta clase de lista sacrificial.
- source_word: אֲשֶׁר יַקְרִב
  english_pob_choice: that ... presents
  chosen_spanish: que ... presenta
  alternatives_spanish:
  - que ... ofrece
  - que ... acerca
  lexicon: HALOT
  rationale: El verbo hiphil de קרב en contexto sacrificial tiene la idea de acercar o presentar una ofrenda ante Dios. «Presenta» sigue de cerca la decisión inglesa de «presents» y evita perder el matiz cultual que tendría solo «ofrece».
- source_word: הַנָּשִׂיא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: En Ezequiel, נָשִׂיא se refiere al dirigente reconocido en la visión del templo. «Príncipe» es la equivalencia tradicional y precisa en este contexto, sin imponer la idea de rey.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», según la terminología española del proyecto, en lugar de sustituirlo por una máscara como «SEÑOR». La preposición ל indica dirección o dedicación de la ofrenda, por lo que «a Yahvé» transmite bien la relación sacrificial.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de sábado
  alternatives_spanish:
  - el día de reposo
  - en sábado
  lexicon: HALOT
  rationale: La frase fija el tiempo de la ofrenda. «En el día de sábado» conserva la estructura hebrea y resulta comprensible en español; «en sábado» sería más breve, pero pierde algo de la formulación explícita del texto.
- source_word: שִׁשָּׁה כְבָשִׂים
  english_pob_choice: six ... lambs
  chosen_spanish: seis corderos
  alternatives_spanish:
  - seis ovejas
  - seis carneros jóvenes
  lexicon: HALOT
  rationale: כְבָשִׂים en listas sacrificiales se refiere a corderos, no a ovejas en general. «Corderos» es la opción natural en español sacrificial y mantiene el paralelismo numérico del hebreo.
- source_word: תְּמִימִם
  english_pob_choice: unblemished
  chosen_spanish: sin defecto
  alternatives_spanish:
  - perfectos
  - íntegros
  lexicon: HALOT
  rationale: En lenguaje sacrificial, תמים expresa ausencia de defecto físico. «Sin defecto» es transparente y fiel, y evita una carga moral que «perfectos» podría sugerir en español.
- source_word: וְאַיִל
  english_pob_choice: and one ... ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho cabrío
  - y un borrego
  lexicon: HALOT
  rationale: אַיִל significa «carnero». Se conserva «un» para reflejar la cuenta del listado, como en la decisión inglesa. «Borrego» podría sonar regional o juvenil y no es tan preciso aquí.
- source_word: תָּמִים
  english_pob_choice: unblemished
  chosen_spanish: sin defecto
  alternatives_spanish:
  - perfecto
  - íntegro
  lexicon: HALOT
  rationale: Se usa la misma equivalencia que para תְּמִימִם para mantener consistencia terminológica en la ofrenda sacrificial del carnero.
theological_decisions:
- issue: Nombre divino יהוה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto español establece «Yahvé» como forma principal para יהוה. Aquí el contexto es una ofrenda dirigida al Dios de Israel, y no hay razón textual para ocultar el nombre propio mediante una sustitución reverencial. Por eso se evita «SEÑOR» y se preserva la identidad del destinatario de la ofrenda.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se siguió el paquete fuente hebreo con su audit trail en inglés. La principal diferencia respecto del inglés POB es el tratamiento del nombre divino: el inglés usa «Yahweh», mientras que el estándar español del proyecto pide «Yahvé». Se mantuvo la equivalencia sacrificial técnica («holocausto», «corderos», «carnero») y la alternativa verbal documentada para יקרב mediante nota.'
  spanish_consistency_notes:
  - 'Se mantuvo la terminología sacrificial técnica de forma consistente: «holocausto», «sin defecto», «corderos», «carnero».'
  - Se respetó el valor direccional/dedicativo de לַיהוָה con «a Yahvé».
  - «Príncipe» conserva la designación de נָשִׂיא en Ezequiel sin expandirla a «gobernante» o «líder».
  - La nota de alternativa verbal se ancla solo en «presenta», porque ese es el punto de variación lexical documentado.
