translation:
  language: es
  text: Y sucederá que, así como velé sobre ellos para arrancar, y para derribar, y para arrasar, y para destruir, y para hacerles daño[a], así velaré sobre ellos para edificar y para plantar, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'traerles calamidad'. El verbo hebreo puede denotar causar calamidad o daño en juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: Conserva la apertura profética y el valor prospectivo de היה sin caer en un calco demasiado arcaico.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: HALOT
  rationale: Expresa con claridad la comparación explícita entre la acción pasada y la futura.
- source_word: שָׁקַדְתִּי / אֶשְׁקֹד
  english_pob_choice: watched over / will watch over
  chosen_spanish: estuve atento / estaré atento
  alternatives_spanish:
  - velé sobre / velaré sobre
  - fui vigilante sobre / seré vigilante sobre
  lexicon: HALOT
  rationale: שמקד aquí comunica vigilancia atenta y deliberada. 'Estar atento' conserva la idea de cuidado vigilante; en español permite mantener la asimetría entre juicio y restauración sin sugerir mera observación pasiva.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - acerca de ellos
  - contra ellos
  lexicon: HALOT
  rationale: '''Sobre ellos'' mantiene la preposición y la paralelidad del texto. En la primera mitad el énfasis recae en acción judicial; en la segunda, en cuidado restaurador.'
- source_word: לִנְתוֹשׁ
  english_pob_choice: to uproot
  chosen_spanish: para arrancar
  alternatives_spanish:
  - para desarraigar
  - para arrancarlos de raíz
  lexicon: HALOT
  rationale: En español, 'arrancar' comunica el desarraigo agrícola con fuerza natural; conserva la imagen de Jeremías sin sonar forzado.
- source_word: וְלִנְתּוֹץ
  english_pob_choice: to tear down
  chosen_spanish: y para derribar
  alternatives_spanish:
  - y para demoler
  - y para echar abajo
  lexicon: HALOT
  rationale: Mantiene la secuencia de verbos destructivos con un verbo español directo y reconocible.
- source_word: וְלַהֲרֹס
  english_pob_choice: to overthrow
  chosen_spanish: y para derribar por completo
  alternatives_spanish:
  - y para arrasar
  - y para demoler
  lexicon: HALOT
  rationale: Se distingue de נָתַץ y de הַאֲבִיד sin borrar la progresión retórica; 'derribar por completo' preserva la intensidad acumulativa.
- source_word: וּלְהַאֲבִיד
  english_pob_choice: to destroy
  chosen_spanish: y para destruir
  alternatives_spanish:
  - y para hacer perecer
  - y para causar destrucción
  lexicon: HALOT
  rationale: Es la equivalencia más directa y clara para el causativo de אבד.
- source_word: וּלְהָרֵעַ
  english_pob_choice: to bring harm
  chosen_spanish: y para hacerles daño
  alternatives_spanish:
  - y para traerles calamidad
  - y para causarles mal
  lexicon: HALOT
  rationale: La POB inglesa documenta la alternativa 'to bring disaster'; en español, 'hacerles daño' conserva la amplitud de daño/calamidad sin atribuir mal moral a Dios.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de ese modo
  lexicon: HALOT
  rationale: Mantiene la correspondencia directa entre ambas mitades del versículo.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  lexicon: HALOT
  rationale: '''Edificar'' es natural en registro bíblico y preserva la simetría con el lenguaje de destrucción previo.'
- source_word: וְלִנְטוֹעַ
  english_pob_choice: to plant
  chosen_spanish: y para plantar
  alternatives_spanish:
  - y para sembrar
  lexicon: HALOT
  rationale: Conserva el paralelismo agrícola con 'arrancar' y la imagen de restauración del texto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la guía del proyecto, y la fórmula profética queda en un español sobrio y audible.
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula conclusiva
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - declara Yahvé
  - oráculo de Yahvé
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que se mantiene 'Yahvé' en vez de una sustitución por 'Señor'. La fórmula final se traduce con naturalidad profética sin ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de וּלְהָרֵעַ
  english_pob_reading: to bring harm
  chosen_spanish_reading: para hacerles daño
  alternative_spanish_readings:
  - para traerles calamidad
  - para causarles mal
  rationale: Se evita una traducción que sugiera maldad moral en Dios. 'Daño' comunica el sentido de calamidad/judicio reconocido por la nota inglesa, conservando la tensión lexical sin suavizarla.
  doctrine_reference: Jeremiah 31:28 lexical note on הָרַע / causing calamity in judgment
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que reporta alta concordancia y sin cambios necesarios. La redacción española conserva la estructura comparativa y la progresión de verbos de juicio/restauración, mientras explicita en nota la alternativa lexical para הָרֵעַ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con la guía del proyecto.
  - Se emplea 'arrancar' / 'plantar' para conservar la imaginería agrícola de Jeremías.
  - Se evita 'Señor' como sustituto del nombre divino para no enmascarar el Tetragrámaton.
  - '''Estar atento'' reproduce la vigilancia activa del verbo שׁקד sin introducir un término técnico innecesario.'
