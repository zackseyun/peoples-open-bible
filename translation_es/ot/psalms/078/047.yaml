translation:
  language: es
  text: Él destruyó sus vides con granizo[a], y sus árboles sicómoros con escarcha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con langostas', 'con piedras de granizo' o 'con aguanieve'; el término hebreo es raro e incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַהֲרֹג
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - mató
  - hirió de muerte
  - arruinó
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar 'matar' o 'degollar', aquí el objeto directo son plantas ('sus vides' y 'sus sicómoros'). En español, 'destruyó' transmite el efecto sobre la vegetación sin forzar una personificación extraña.
- source_word: בַּבָּרָד
  english_pob_choice: with hail
  chosen_spanish: con granizo
  alternatives_spanish:
  - por granizo
  - con el granizo
  lexicon: HALOT
  rationale: La preposición hebrea expresa medio o instrumento. 'Con granizo' es natural en español y conserva el valor instrumental del texto fuente.
- source_word: גַּפְנָם
  english_pob_choice: their vines
  chosen_spanish: sus vides
  alternatives_spanish:
  - sus parras
  - sus viñedos
  lexicon: HALOT
  rationale: El sustantivo singular colectivo con sufijo plural apunta a las plantas de vid en general. 'Vides' mantiene el referente vegetal; 'viñedos' desplaza el sentido al terreno cultivado.
- source_word: וְשִׁקְמוֹתָם
  english_pob_choice: and their sycamore trees
  chosen_spanish: y sus sicómoros
  alternatives_spanish:
  - y sus árboles sicómoros
  - y sus higueras sicómoras
  lexicon: HALOT
  rationale: '''Sicómoros'' es un equivalente claro y natural en español para la especie aludida, sin añadir explicación innecesaria en el texto principal.'
- source_word: בַּחֲנָמַל
  english_pob_choice: with frost
  chosen_spanish: con escarcha
  alternatives_spanish:
  - con helada
  - con granizo
  - con aguanieve
  lexicon: HALOT
  rationale: El término hebreo es raro y su valor léxico es incierto. En paralelo con el granizo, 'escarcha' mantiene la imagen de daño por frío y conserva una opción poética plausible en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se conserva la ambigüedad léxica de בַּחֲנָמַל mediante nota, y se evita traducir mecánicamente 'kill' donde el objeto son plantas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma de referencia solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió 'destruyó' para mantener el efecto sobre la vegetación sin introducir una imagen extraña.
  - Se mantuvo una estructura coordinada simple y poética, acorde con el paralelismo hebreo.
