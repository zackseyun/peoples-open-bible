translation:
  language: es
  text: entonces Yahvé expulsará de delante de ustedes a todas estas naciones, y ustedes desposeerán de su tierra a naciones más grandes y más poderosas que ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהוֹרִישׁ
  english_pob_choice: will drive out
  chosen_spanish: expulsará
  alternatives_spanish:
  - desalojará
  - hará salir
  - desposeerá
  lexicon: HALOT
  rationale: El verbo causativo de ירשׁ aquí expresa quitar a otros de su posesión o territorio. En español, 'expulsará' comunica bien la acción de sacar a esas naciones de delante de Israel sin forzar una construcción poco natural. 'Desposeerá' se reserva mejor para la segunda cláusula, donde Israel toma posesión en contraste.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con una transliteración española ya establecida por el proyecto. No se sustituye por un título como 'SEÑOR', porque el texto hebreo usa el Tetragrama directamente.
- source_word: כָּל הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: all these nations
  chosen_spanish: todas estas naciones
  alternatives_spanish:
  - todos estos pueblos
  - todas esas naciones
  lexicon: HALOT
  rationale: '''Naciones'' refleja mejor el sentido político-territorial del pasaje de conquista. ''Estas'' conserva la referencia inmediata del hebreo; ''pueblos'' sería posible, pero es menos preciso en este contexto.'
- source_word: מִלִּפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - de su presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de delante de ustedes'. En español, 'de delante de ustedes' conserva la imagen sin sonar demasiado rígida; también mantiene el matiz espacial de expulsión.
- source_word: וִירִשְׁתֶּם
  english_pob_choice: you will dispossess
  chosen_spanish: desposeerán
  alternatives_spanish:
  - tomarán posesión de
  - heredarán
  - poseerán
  lexicon: HALOT
  rationale: En este contexto, el verbo señala que Israel quitará a otros de su posesión. 'Desposeerán' preserva ese valor causativo y el paralelismo con la primera cláusula mejor que 'heredarán' o 'tomarán posesión de'.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  lexicon: HALOT
  rationale: Se repite el mismo sustantivo con el mismo valor geopolítico. Mantener 'naciones' conserva consistencia léxica.
- source_word: גְּדֹלִים
  english_pob_choice: greater
  chosen_spanish: más grandes
  alternatives_spanish:
  - más numerosos
  - mayores
  lexicon: HALOT
  rationale: '''Más grandes'' refleja el comparativo hebreo de forma directa. Aunque puede implicar tamaño o poder, aquí funciona naturalmente junto con el siguiente calificativo.'
- source_word: וַעֲצֻמִים
  english_pob_choice: mightier
  chosen_spanish: más poderosas
  alternatives_spanish:
  - más fuertes
  - más poderosas y fuertes
  - más robustas
  lexicon: HALOT
  rationale: עָצוּם expresa fuerza, poder o imponencia. 'Más poderosas' capta bien el rango semántico y suena natural en español contemporáneo; además, coordina con 'más grandes' sin perder el sentido de superioridad.
- source_word: מִכֶּם
  english_pob_choice: than you
  chosen_spanish: que ustedes
  alternatives_spanish:
  - que vosotros
  - que ustedes mismos
  lexicon: HALOT
  rationale: La partícula comparativa final se traduce con 'que'. Se usa 'ustedes' por registro latinoamericano neutral y para mantener coherencia de número y trato.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo contiene el Tetragrama, no un título genérico. En español, 'Yahvé' preserva el nombre propio del pacto y evita la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre expulsión y desposesión
  english_pob_reading: will drive out ... and you will dispossess
  chosen_spanish_reading: expulsará ... y ustedes desposeerán
  alternative_spanish_readings:
  - expulsará ... y tomarán posesión
  - hará salir ... y heredarán
  rationale: 'El texto distingue la acción de Yahvé de la acción de Israel. ''Expulsará'' y ''desposeerán'' preservan esa tensión: Dios quita a las naciones, e Israel entra en posesión por consecuencia.'
  doctrine_reference: Lexical/theological distinction in ירשׁ causative vs. ישראל possession
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'stronger' a 'mightier' para reflejar mejor עֲצֻמִים y mantener registro formal. La versión española refleja ese ajuste con 'más poderosas', evitando una simplificación a solo fuerza física. No se requieren notas textuales adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'SEÑOR' para el Tetragrama, conforme al estándar del proyecto.
  - Se mantiene el plural de respeto 'ustedes' para coherencia regional y lectura eclesial neutral.
  - '''Naciones'' se conserva en ambas apariciones para reflejar el mismo sustantivo hebreo.'
  - La duplicación comparativa 'más grandes y más poderosas' reproduce la estructura del hebreo sin añadir contenido interpretativo.
