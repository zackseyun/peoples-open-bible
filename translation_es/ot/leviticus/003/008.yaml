translation:
  language: es
  text: Él pondrá su mano sobre la cabeza de su ofrenda y la degollará delante de la tienda de reunión; y los hijos de Aarón arrojarán[a] su sangre contra el altar alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la salpicarán» o «la lanzarán con fuerza»; el verbo hebreo denota arrojar la sangre en una acción ritual enérgica, no una aspersión suave.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: shall lay
  chosen_spanish: pondrá
  alternatives_spanish:
  - apoyará
  - colocará
  - impondrá
  lexicon: HALOT
  rationale: En contexto sacrificial, סמך con la mano sobre la víctima describe el acto ritual de ponerla sobre su cabeza. En español, «pondrá su mano» expresa de manera natural y fiel la acción sin sobreinterpretarla como imposición litúrgica posterior.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: El singular posesivo refleja directamente el hebreo y mantiene la instrucción ritual concreta.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza superior
  lexicon: HALOT
  rationale: «Cabeza» es el equivalente natural y preciso para la parte del animal mencionada en el rito.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es algo presentado a Dios; «ofrenda» conserva bien esa idea amplia. «Sacrificio» sería más estrecho y podría cargar la frase en exceso.
- source_word: וְשָׁחַט
  english_pob_choice: slaughter
  chosen_spanish: la sacrificará
  alternatives_spanish:
  - la degollará
  - la matará
  - la inmolará
  lexicon: HALOT
  rationale: El verbo es técnico en un contexto cultual. «Sacrificar» comunica el acto ritual en español culto y evita la rudeza de «matar», sin perder el sentido de ejecución del animal en el rito.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» es una forma clara y natural para el valor espacial/cultual de לִפְנֵי, manteniendo la referencia a la tienda de reunión.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Se conserva la designación tradicional del santuario portátil con una traducción directa y transparente. «Tienda de reunión» refleja el hebreo sin introducir una paráfrasis interpretativa.
- source_word: וְזָרְקוּ
  english_pob_choice: shall throw
  chosen_spanish: rociarán
  alternatives_spanish:
  - arrojarán
  - esparcirán
  - salpicarán
  lexicon: HALOT
  rationale: Aunque el inglés POB resalta la fuerza de זרק con «throw», en español «rociar» comunica mejor el gesto ritual de aplicar la sangre al altar. Se evita «rociar» en sentido débil de aspersión común, pero aquí el contexto sacrificial lo define con suficiente precisión; «arrojar» sonaría excesivamente brusco y menos idiomático.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos varones de Aarón
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: «Hijos» reproduce literalmente בְּנֵי y preserva el rasgo genealógico masculino señalado por el texto.
- source_word: דָּמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de la víctima
  lexicon: HALOT
  rationale: El sufijo remite al animal sacrificado; el español normal usa «su sangre» sin necesidad de explicitar «de la víctima».
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - contra el altar
  - en el altar
  lexicon: HALOT
  rationale: La acción cultual implica aplicar la sangre al altar. En español, «sobre el altar» mantiene la relación espacial sin hacer sonar la frase más rígida o violenta de lo necesario.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: El adverbio distributivo se conserva con «alrededor», una forma clara y natural que indica la cobertura completa del altar.
theological_decisions:
- issue: Naturaleza del acto de poner la mano sobre la ofrenda
  english_pob_reading: Rendered as a plain ritual action without importing symbolic interpretation.
  chosen_spanish_reading: 'Se presenta como un acto ritual sencillo: «pondrá su mano sobre la cabeza de su ofrenda».'
  alternative_spanish_readings:
  - «apoyará su mano» para sugerir presión
  - traducciones interpretativas que impliquen transferencia de culpa o identificación
  rationale: El versículo describe la acción ritual, no su explicación teológica. Por eso conviene no añadir interpretaciones que el texto no explicita en esta línea.
  doctrine_reference: Translation philosophy §3
- issue: Traducción de בְּנֵי אַהֲרֹן
  english_pob_reading: Aaron’s sons
  chosen_spanish_reading: los hijos de Aarón
  alternative_spanish_readings:
  - los descendientes de Aarón
  - los sacerdotes de Aarón
  rationale: El hebreo dice literalmente «hijos», y esa precisión debe conservarse para no neutralizar el dato genealógico/masculino del texto.
  doctrine_reference: Translation philosophy §4
- issue: Rito de la sangre alrededor del altar
  english_pob_reading: throw its blood against the altar all around
  chosen_spanish_reading: rociarán su sangre sobre el altar, alrededor
  alternative_spanish_readings:
  - arrojarán su sangre contra el altar, alrededor
  - esparcirán su sangre alrededor del altar
  rationale: Se preserva la acción ritual sin suavizarla ni volverla meramente ornamental. «Rociarán» aquí intenta comunicar la aplicación cultual de la sangre, manteniendo la idea de un movimiento distribuido alrededor del altar.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El draft sigue la última revisión disponible del texto fuente en inglés POB (estado sin cambios, acuerdo alto). No se observan revisiones posteriores que afecten el sentido o la terminología de esta frase.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología predeterminada cuando corresponda, aunque este versículo no la contiene.
  - Se conserva «tienda de reunión» como equivalente estable de אֹהֶל מוֹעֵד en armonía con la serie legal sacrificial.
  - Se evita «SEÑOR» por convención editorial; aquí no aparece el Tetragrámaton.
  - «Su sangre» mantiene la referencia al animal sacrificado, conforme al patrón narrativo-ritual.
  - «Alrededor» preserva el valor distributivo de סָבִיב sin añadir detalle no explicitado.
