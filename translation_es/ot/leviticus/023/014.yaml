revisions:
- from: Y no comerán pan, ni grano tostado, ni grano fresco[a], hasta este mismo día, hasta que hayan traído la ofrenda de su Dios[b]. Es un estatuto perpetuo[c] para todas sus generaciones, en todos sus lugares de morada.
  to: Y no comerán pan, ni grano tostado[a], ni grano fresco[b], hasta este mismo día, hasta que hayan traído la ofrenda de su Dios. Es un estatuto permanente[c] para todas sus generaciones, en todos sus lugares de morada.
  rationale: Se corrigieron los anclajes de las notas al pie para que correspondan a las palabras correctas en el texto, y se cambió 'estatuto perpetuo' a 'estatuto permanente' para alinearlo mejor con la decisión léxica y teológica documentada en el POB inglés, manteniendo las alternativas tradicionales en nota.
