translation:
  language: es
  text: Él ha alejado[a] a mis hermanos lejos de mí, y los que me conocen[b] se me han vuelto completamente extraños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha apartado de mí a mis hermanos»
    reason: lexical_alternative
  - marker: b
    text: O «los que me conocen han llegado a ser como extraños para mí»
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: a mis hermanos
  alternatives_spanish:
  - a mis parientes
  - a mis hermanos y hermanas
  lexicon: HALOT
  rationale: La forma hebrea es un plural masculino con sufijo de primera persona singular; el sentido base es literalmente 'mis hermanos'. En español, 'a mis hermanos' conserva la forma léxica y la fuerza relacional del texto. 'Parientes' sería posible en el contexto lamentativo, pero suaviza el término; 'hermanos y hermanas' introduce una inclusividad no exigida por el hebreo.
- source_word: מֵעָלַי
  english_pob_choice: far from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartados de mí
  lexicon: HALOT
  rationale: La construcción con מן + עַל y sufijo indica separación/remoción desde la esfera de Job. En español, el verbo 'alejar' ya expresa esa distancia, de modo que 'de mí' basta para reflejar el complemento de separación sin recargar la frase. 'Lejos de mí' sería más explícito, pero la preposición simple queda bien integrada con el verbo.
- source_word: הִרְחִיק
  english_pob_choice: has driven ... far
  chosen_spanish: ha alejado
  alternatives_spanish:
  - ha apartado
  - ha removido
  lexicon: HALOT
  rationale: 'El hifil perfecto de רחק es causativo: ''hacer alejar'', ''poner a distancia''. ''Ha alejado'' comunica esa acción de forma natural en español y conserva el tono enérgico del lamento. ''Ha apartado'' es viable, pero menos marcado; ''ha removido'' es más abstracto.'
- source_word: וְיֹדְעַי
  english_pob_choice: those who know me
  chosen_spanish: los que me conocen
  alternatives_spanish:
  - mis conocidos
  - mis allegados
  lexicon: HALOT
  rationale: La forma participial plural con sufijo puede entenderse como 'los que me conocen', literalmente 'mis conocedores'. Esta opción es transparente y directa en español. 'Mis conocidos' es posible, pero puede sonar más social que relacional; 'mis allegados' interpreta demasiado el alcance del término.
- source_word: אַךְ
  english_pob_choice: wholly
  chosen_spanish: completamente
  alternatives_spanish:
  - solo
  - ciertamente
  - por completo
  lexicon: HALOT
  rationale: Aquí אַךְ intensifica el predicado y señala totalidad. 'Completamente' reproduce esa intensificación de manera natural en español moderno. 'Por completo' sería muy cercano; 'solo' o 'ciertamente' no expresan tan bien la plenitud del alejamiento.
- source_word: זָרוּ
  english_pob_choice: are wholly estranged
  chosen_spanish: se han vuelto extraños
  alternatives_spanish:
  - se han vuelto extranjeros
  - se han alienado
  lexicon: HALOT
  rationale: El perfecto qal de זוּר/זרר expresa volverse extraño o tratar como extraños. 'Se han vuelto extraños' preserva el cambio de relación y funciona bien con el intensificador anterior. 'Alienado' es más técnico; 'extranjeros' puede sonar menos relacional que 'extraños'.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: para mí
  alternatives_spanish:
  - de mí
  - respecto de mí
  lexicon: HALOT
  rationale: El hebreo marca separación relacional ('de mí'), pero en español la secuencia 'extraños para mí' expresa naturalmente el efecto subjetivo de esa ruptura. Aun así, la cláusula completa mantiene el sentido de alejamiento por el verbo inicial y por la relación rota. 'De mí' sería más literal, pero menos idiomático en esta segunda cola.
theological_decisions:
- issue: Sujeto implícito de הִרְחִיק
  english_pob_reading: The English keeps the implicit third-person singular subject as 'He,' reflecting the Hebrew and the immediate context in which Job attributes his affliction to God.
  chosen_spanish_reading: Él ha alejado
  alternative_spanish_readings:
  - Dios ha alejado
  - Ha alejado
  rationale: El hebreo deja el sujeto en tercera persona singular sin nombrarlo. En español, 'Él' conserva esa economía textual y el peso teológico del lamento sin resolver la referencia en la frase misma. 'Dios' sería interpretativamente correcto por el contexto, pero explicita más de lo que el verso dice; omitir el sujeto también es posible, pero pierde la referencia personal implícita.
  doctrine_reference: Preservar la tensión teológica y la primacía del texto original; no resolver de manera innecesaria lo implícito.
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del expediente: no hay revisiones aplicadas y el control cruzado reporta alta concordancia, por lo que no se introducen cambios respecto de la lectura base auditada.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita explícita que requiera esa decisión.
  - Se usa 'extraños' para זוּר/זרר, manteniendo el valor relacional de 'estranged' sin forzar un tecnicismo.
  - La puntuación y el orden siguen un español bíblico claro y publicable, sin calco rígido del inglés.
