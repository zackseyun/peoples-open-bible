revisions:
- from: Y de uno de ellos salió un cuerno pequeño[a], y creció sobremanera hacia el sur, hacia el oriente[b], y hacia la Tierra Hermosa.
  to: Y de uno de ellos salió un cuerno pequeño[a], y creció sobremanera hacia el sur, hacia el oriente, y hacia la tierra hermosa[b].
  rationale: Se mantiene la traducción principal porque es fiel y legible, pero se corrige el anclaje de la nota [b] para que corresponda a הַצְּבִי, se convierte la nota [a] en una alternativa real, y se normaliza «la tierra hermosa» en minúscula para reflejar mejor un epíteto descriptivo.
