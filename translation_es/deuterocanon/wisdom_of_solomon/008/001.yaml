translation:
  language: es
  text: Pero ella alcanza vigorosamente[a] de un extremo al otro, y gobierna todas las cosas bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se extiende de un extremo al otro con vigor».
