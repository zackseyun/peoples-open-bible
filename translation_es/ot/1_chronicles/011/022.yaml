  yaml_path: translation/ot/1_chronicles/011/022.yaml
  text: Benaiah son of Jehoiada[a], son of a mighty man, a man of many deeds, from Kabzeel—he struck down the two heroes of Moab. He also went down and struck down the lion in the midst of a pit on a snowy day.
