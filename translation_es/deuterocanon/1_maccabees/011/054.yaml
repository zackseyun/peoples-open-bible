translation:
  language: es
  text: Después de estas cosas, Trifón volvió y Antíoco con él, un muchacho joven[a]; y llegó a ser rey y se puso la diadema[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un niño más joven» o «un muchacho muy joven». El griego παιδάριον νεώτερον subraya su juventud.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se puso la corona». Literalmente, el griego dice «se puso la diadema».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: LSJ
  rationale: La frase temporal plural se conserva de manera directa; en español, «Después de estas cosas» mantiene el valor acumulativo del demonstrativo sin suavizarlo demasiado.
- source_word: ἀπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta
  lexicon: LSJ
  rationale: El verbo expresa el giro de regreso. «Volvió» es natural en español y conserva la idea narrativa de retorno sin introducir un matiz más técnico que el griego no exige.
- source_word: παιδάριον νεώτερον
  english_pob_choice: a younger boy
  chosen_spanish: un muchacho más joven
  alternatives_spanish:
  - un niño más joven
  - un muchacho muy joven
  - un joven más joven
  lexicon: LSJ
  rationale: παιδάριον indica un muchacho/niño, y νεώτερον añade la comparación de menor edad. «Muchacho más joven» conserva ambos elementos con una lectura natural en español, sin fijar una edad exacta que el texto no da.
- source_word: ἐβασίλευσεν
  english_pob_choice: he became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - reinó
  - se hizo rey
  lexicon: LSJ
  rationale: El contexto sugiere acceso al poder, no solo el ejercicio de un reinado ya establecido. «Llegó a ser rey» refleja ese sentido ingresivo que la revisión inglesa destacó, sin forzar una formulación extraña.
- source_word: ἐπέθετο διάδημα
  english_pob_choice: put on the crown
  chosen_spanish: se puso la diadema
  alternatives_spanish:
  - se puso la corona
  - se colocó la diadema
  lexicon: LSJ
  rationale: διάδημα es específicamente la insignia real, más precisa que «corona». Se conserva «diadema» para no perder la especificidad léxica del original, mientras que el verbo medio se expresa naturalmente como «se puso».
theological_decisions:
- issue: Título real de διάδημα
  english_pob_reading: crown
  chosen_spanish_reading: diadema
  alternative_spanish_readings:
  - corona
  rationale: Aunque «corona» sería más común, el griego nombra una diadema real. En español, «diadema» preserva mejor la especificidad histórica y evita diluir el objeto nombrado por el texto.
  doctrine_reference: Translation philosophy §6 (claridad moderna sin perder precisión lexical)
- issue: Valor ingresivo de ἐβασίλευσεν
  english_pob_reading: he became king
  chosen_spanish_reading: llegó a ser rey
  alternative_spanish_readings:
  - reinó
  rationale: La secuencia con la diadema muestra asunción del poder. «Llegó a ser rey» comunica ese comienzo del reinado y mantiene el matiz ingresivo resaltado en la revisión inglesa.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §5 (consistencia terminológica)
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «he reigned» por «he became king» para reflejar mejor el sentido ingresivo de ἐβασίλευσεν. La presente redacción española sigue esa decisión con «llegó a ser rey». También conserva la precisión de διάδημα como «diadema» en lugar de generalizar a «corona».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - 'Se conserva la distinción entre título real y símbolo real: «rey» / «diadema».'
  - Las notas al pie solo se emplean donde el español necesita señalar una alternativa lexical real o una literalidad significativa.
