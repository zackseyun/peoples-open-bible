translation:
  language: es
  text: Esa primera matanza, que hicieron Jonatán y su escudero, fue como de veinte hombres en como medio surco[a] de un yugo de campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «como medio surco de un yugo de campo», probablemente una medida de terreno relacionada con lo que un yugo de bueyes podía arar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּכָּה
  english_pob_choice: slaughter
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - matanza
  - carnicería
  - golpe
  lexicon: HALOT
  rationale: En este contexto militar, el sustantivo apunta al resultado letal de la acción, no a un simple golpe. «Derramamiento de sangre» conserva el hecho de muerte violenta sin introducir una imagen más cruda que el hebreo no exige.
- source_word: הָרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primer
  alternatives_spanish:
  - primero
  - inicial
  lexicon: HALOT
  rationale: Es el adjetivo ordinal normal en español para calificar el sustantivo en esta posición.
- source_word: הִכָּה
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - abatieron
  - mataron
  - hirieron
  lexicon: HALOT
  rationale: La construcción hebrea atribuye a Jonathan y a su escudero la realización de la acción; el inglés POB optó por «made» para respetar ese giro idiomático. En español, «hicieron» conserva la idea de que ellos realizaron esa matanza/derramamiento, sin forzar un verbo que duplicaría la idea ya expresada por el sustantivo.
- source_word: וְנֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - su portador de armas
  - el que llevaba sus armas
  lexicon: HALOT
  rationale: «Escudero» es el equivalente militar y narrativo más natural en español para el auxiliar que carga el armamento del guerrero, y comunica la función sin sonar técnico o artificial.
- source_word: כְּעֶשְׂרִים אִישׁ
  english_pob_choice: about twenty men
  chosen_spanish: como de veinte hombres
  alternatives_spanish:
  - unos veinte hombres
  - aproximadamente veinte hombres
  lexicon: HALOT
  rationale: El prefijo de comparación marca aproximación; «como de veinte hombres» mantiene esa indeterminación con un tono bíblico claro y natural.
- source_word: כְּבַחֲצִי
  english_pob_choice: within about half
  chosen_spanish: dentro de como media reja
  alternatives_spanish:
  - en como media reja
  - como a media reja
  lexicon: HALOT
  rationale: El hebreo repite el matiz aproximativo. «Dentro de como media reja» reproduce la idea de espacio/medida limitada y conserva la relación con la imagen agrícola del texto.
- source_word: מַעֲנָה
  english_pob_choice: furrow
  chosen_spanish: reja
  alternatives_spanish:
  - surco
  - arado
  - hilera
  lexicon: HALOT
  rationale: El término se refiere a una medida o tramo de terreno arado; en español «reja» puede designar la pieza del arado y, por extensión, el surco que produce. Se usa aquí para mantener el enlace con la medida agrícola subyacente, que el inglés POB explica en nota.
- source_word: צֶמֶד שָׂדֶה
  english_pob_choice: an acre of a field
  chosen_spanish: un yugo de campo
  alternatives_spanish:
  - un yugo de tierra
  - un terreno que un yugo puede arar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «un yugo de campo», una medida agraria basada en lo que un yugo de bueyes puede arar. Se preserva esta literalidad en el texto principal porque la tradición POB evita ocultar la imagen original; el valor aproximado puede inferirse del contexto y de la nota.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que corrigió el verbo desde «struck down» a «made» para reflejar mejor el giro idiomático hebreo donde el sustantivo de la matanza funciona con el verbo de hacer. Por eso el español no traduce el verbo como «abatieron» o «mataron», sino que conserva la estructura «derramamiento de sangre ... hicieron».
  spanish_consistency_notes:
  - Se preserva el estilo POB de visibilizar imágenes agrícolas y medidas antiguas en lugar de sustituirlas por una equivalencia explicativa dentro del texto principal.
  - «Jonathan» se mantiene como nombre propio sin adaptación, de acuerdo con el uso bíblico en español.
  - No se introduce «Mesías», «Yahvé» ni otros términos teológicos no presentes en este versículo.
