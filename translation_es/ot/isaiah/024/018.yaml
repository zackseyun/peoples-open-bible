translation:
  language: es
  text: 'Y sucederá: el que huye del sonido del terror caerá en la fosa, y el que sube de en medio de la fosa será atrapado en la trampa; porque las ventanas de lo alto[a] se han abierto, y los cimientos de la tierra tiemblan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «las compuertas del cielo». El hebreo dice más literalmente: «las ventanas de lo alto se han abierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y acontecerá así
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una circunstancia futura con tono solemne. «Sucederá» conserva el valor idiomático sin volverse arcaizante.
- source_word: הַנָּס
  english_pob_choice: the one who flees
  chosen_spanish: el que huye
  alternatives_spanish:
  - el que escapa
  - el fugitivo
  lexicon: HALOT
  rationale: El participio funciona como sustantivo genérico. «El que huye» preserva el sentido verbal y evita fijarlo demasiado como título nominal.
- source_word: מִקּוֹל הַפַּחַד
  english_pob_choice: from the sound of terror
  chosen_spanish: de la voz del terror
  alternatives_spanish:
  - del sonido del terror
  - del ruido del terror
  lexicon: HALOT
  rationale: קוֹל puede ser «voz» o «sonido». En español, «voz del terror» conserva la fuerza auditiva y la personificación implícita, aunque «sonido» es también posible.
- source_word: יִפֹּל אֶל הַפַּחַת
  english_pob_choice: will fall into the pit
  chosen_spanish: caerá en el hoyo
  alternatives_spanish:
  - caerá en el pozo
  - caerá en la fosa
  lexicon: HALOT
  rationale: פַּחַת designa una cavidad/trampa cavada. «Hoyo» comunica bien la imagen y mantiene la cercanía con el segundo término «trampa».
- source_word: וְהָעוֹלֶה מִתּוֹךְ הַפַּחַת
  english_pob_choice: and the one who comes up from the midst of the pit
  chosen_spanish: y el que sale del medio del hoyo
  alternatives_spanish:
  - y el que sube desde el interior del hoyo
  - y el que asciende del medio del hoyo
  lexicon: HALOT
  rationale: «Sale del medio» reproduce la idea de מִתּוֹךְ con una frase natural en español. «Hoyo» se mantiene para coherencia con «caerá en el hoyo».
- source_word: יִלָּכֵד בַּפָּח
  english_pob_choice: will be caught in the trap
  chosen_spanish: quedará atrapado en la trampa
  alternatives_spanish:
  - será apresado en la trampa
  - será capturado en la trampa
  lexicon: HALOT
  rationale: פַּח es una trampa o lazo. «Quedará atrapado» conserva la pasividad efectiva del verbo y suena natural en español moderno.
- source_word: אֲרֻבּוֹת מִמָּרוֹם
  english_pob_choice: the windows from on high
  chosen_spanish: las ventanas desde lo alto
  alternatives_spanish:
  - las ventanas de lo alto
  - las compuertas desde lo alto
  lexicon: HALOT
  rationale: Se mantiene la literalidad de «ventanas» para no importar «cielos/heaven» donde el hebreo dice «desde lo alto». «Desde lo alto» conserva la imagen espacial del original.
- source_word: נִפְתָּחוּ
  english_pob_choice: are opened
  chosen_spanish: se han abierto
  alternatives_spanish:
  - están abiertas
  - fueron abiertas
  lexicon: HALOT
  rationale: El pasivo hebreo admite una lectura resultativa. «Se han abierto» suena natural y comunica que el estado resultante ya está en efecto.
- source_word: וַיִּרְעֲשׁוּ
  english_pob_choice: shake
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - se agitan
  - se conmueven
  lexicon: HALOT
  rationale: El verbo expresa sacudida/quebranto. En español, «tiemblan» transmite de forma clara el efecto en los cimientos de la tierra.
- source_word: מוֹסְדֵי אָרֶץ
  english_pob_choice: the foundations of the earth
  chosen_spanish: los cimientos de la tierra
  alternatives_spanish:
  - los fundamentos de la tierra
  - los cimientos del mundo
  lexicon: HALOT
  rationale: «Cimientos» conserva la metáfora arquitectónica de מוֹסְדֵי. «Tierra» refleja el alcance cósmico del pasaje mejor que «país» o «tierra» en sentido local.
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la región
  rationale: En Isaías 24 el juicio es de alcance universal, no local. «La tierra» reproduce mejor esa amplitud cósmica sin forzar una lectura doctrinal.
  doctrine_reference: Contexto literario de Isaías 24
- issue: Imagen de אֲרֻבּוֹת מִמָּרוֹם
  english_pob_reading: the windows from on high
  chosen_spanish_reading: las ventanas desde lo alto
  alternative_spanish_readings:
  - las compuertas del cielo
  - las ventanas del cielo
  rationale: Se evita reemplazar la imagen hebrea por un término tradicional más interpretativo. «Desde lo alto» conserva la ambigüedad espacial y la tensión lexical del original.
  doctrine_reference: Principio de transparencia léxica del POB
translation_notes:
  revision_awareness: El texto inglés del POB fue revisado y mantenido sin cambios en la última pasada; la versión española sigue esa lectura estable y conserva la alternancia pozo/hoyo/trampa donde el hebreo lo permite.
  spanish_consistency_notes:
  - Se mantiene la secuencia imagenica «hoyo / trampa» para reflejar el paralelismo hebreo entre פַּחַת y פַּח.
  - «Desde lo alto» evita introducir explícitamente «cielo» y preserva la literalidad del original.
  - La puntuación con dos puntos tras «sucederá» reproduce el arranque solemne del hebreo y del POB inglés.
