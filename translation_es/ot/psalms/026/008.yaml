revisions:
- from: Yahvé[a], te amo la morada de tu casa, el lugar donde habita tu gloria.
  to: Oh Yahvé[a], amo la morada de tu casa, el lugar donde habita tu gloria.
  rationale: Se corrige el error sintáctico principal cambiando «te amo» por «amo», ya que el objeto de אָהַבְתִּי es «la morada de tu casa». Se añade «Oh» para reflejar el valor vocativo de la invocación a Yahvé. Se conserva «morada», «tu casa» y «el lugar donde habita tu gloria» por su buena correspondencia con el hebreo y con la explicación léxica del POB. La nota se ajusta para ofrecer una alternativa más formal sin repetir la construcción errónea.
