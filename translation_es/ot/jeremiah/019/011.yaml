  text: וְ/אָמַרְתָּ֨ אֲלֵי/הֶ֜ם כֹּה אָמַ֣ר יְהוָ֣ה צְבָא֗וֹת כָּ֣כָה אֶשְׁבֹּ֞ר אֶת הָ/עָ֤ם הַ/זֶּה֙ וְ/אֶת הָ/עִ֣יר הַ/זֹּ֔את כַּ/אֲשֶׁ֤ר יִשְׁבֹּר֙ אֶת כְּלִ֣י הַ/יּוֹצֵ֔ר אֲשֶׁ֛ר לֹֽא יוּכַ֥ל לְ/הֵרָפֵ֖ה ע֑וֹד וּ/בְ/תֹ֣פֶת יִקְבְּר֔וּ מֵ/אֵ֥ין מָק֖וֹם לִ/קְבּֽוֹר־׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/019/011.yaml
  text: 'And you shall say to them[a], ‘Thus says Yahweh of hosts: So I will break this people and this city, as one breaks a potter’s vessel, which cannot be repaired again[b]; and in Topheth they will bury because there is no place else to bury.’'
  footnotes:
  - marker: a
    text: Or, “as one breaks a potter’s jar.” The Hebrew says “potter’s vessel,” a broader term than “jar.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “that cannot be healed again”; here the sense is that the broken pottery cannot be repaired.
    reason: lexical_alternative
