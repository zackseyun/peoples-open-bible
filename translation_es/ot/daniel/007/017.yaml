    issue: '''animales'' debilita la fuerza de חֵיוָתָא'
    rationale: El POB inglés escogió 'beasts' precisamente para preservar la fuerza ominosa y simbólica del contexto apocalíptico. En español, 'animales' resulta demasiado neutral y no refleja bien ese matiz.
  - severity: medium
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota [a] trata de אַרְעָא ('tierra'/'país'), pero en el borrador el marcador está colocado tras 'animales'. Debe anclarse en 'tierra[a]'.
