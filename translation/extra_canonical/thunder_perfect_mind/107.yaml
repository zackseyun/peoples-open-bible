translation:
  text: 'I am the hearing that is attainable to all[a];

    I am the speech that cannot be grasped;

    the name of the sound and the sound of the name;

    I am the sign of this[g][f][e][d][c][b], and the manifestation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ϣⲏⲡ can mean “great,” but in this Thunder collocation many editors take
      it as “attainable/within reach,” yielding the paradox with the following clause.
    reason: lexical_alternative
  - marker: b
    text: ⲉⲙⲁⲩ/ⲙⲁⲩ is deictic (“there”). Some translations read an inaccessibility
      contrast here (“the speech that cannot be grasped”), which may reflect a different
      underlying reading.
    reason: alternative_reading
  - marker: c
    text: ⲥⲙⲁϩⲧⲉ = “remembrance/memory.” The pronominal object ⲙⲙⲟϥ (“of it/him”)
      likely refers to the “speech/word.”
    reason: lexical_alternative
  - marker: d
    text: ⲥⲙⲏ may be “sound,” “voice,” or “report.” I choose “sound” to preserve the
      abstract acoustic pair with “name.”
    reason: lexical_alternative
  - marker: e
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ could be rendered “light that shines out” to make the outward
      aspect explicit.
    reason: lexical_alternative
  - marker: f
    text: Or 'I am the speech that is there;\nI am its remembrance—'.
    reason: previous_rendering
  - marker: g
    text: Or 'I am the sign as well, and the light that goes forth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲱⲧⲙ
  chosen: hearing
  alternatives:
  - listening
  - obedience
  lexicon: Crum; Layton
  rationale: Noun of ⲥⲱⲧⲙ “to hear”; preserves the auditory motif in Thunder rather
    than moralizing to “obedience.”
- source_word: ⲉⲧϣⲏⲡ
  chosen: attainable
  alternatives:
  - great
  - accessible
  - within reach
  lexicon: Crum; Kasser (Sahidic usage)
  rationale: In Thunder this collocates with ⲥⲱⲧⲙ to yield “hearing that is within
    reach/attainable,” not simply “great.” Rendering keeps paradox with the next clause’s
    inaccessibility theme.
- source_word: ⲛϩⲱⲃ ⲛⲓⲙ
  chosen: to all
  alternatives:
  - among all things
  - of every deed
  lexicon: Crum
  rationale: Idiomatically functions adverbially for universality; concise “to all”
    fits cadence.
- source_word: ⲡϣⲁϫⲉ
  chosen: speech
  alternatives:
  - word
  - utterance
  lexicon: Crum; Layton
  rationale: “Speech” preserves performative, ongoing voice; “word” is possible but
    risks theological freight from other corpora.
- source_word: ⲉⲧⲉⲙⲁⲩ (ⲉⲙⲁⲩ)
  chosen: that is there
  alternatives:
  - that is over there
  - that cannot be grasped
  lexicon: Crum
  rationale: ⲙⲁⲩ is deictic “there.” Some translations paraphrase the antithesis as
    “incomprehensible,” but the attested form supports a locative; I render conservatively
    and flag uncertainty.
- source_word: (ⲥ)ⲙⲁϩⲧⲉ
  chosen: remembrance
  alternatives:
  - memory
  - recollection
  lexicon: Crum
  rationale: Nominal form “remembrance” fits Thunder’s series of abstract self-identifications.
- source_word: ⲙⲙⲟϥ
  chosen: its
  alternatives:
  - of it
  - of him
  lexicon: Layton
  rationale: 3ms object; antecedent likely “speech/word.” I use “its” to avoid gendered
    personification.
- source_word: ⲣⲁⲛ
  chosen: name
  alternatives: []
  lexicon: Crum
  rationale: Standard gloss; forms a chiastic pair with “sound.”
- source_word: ⲥⲙⲏ
  chosen: sound
  alternatives:
  - voice
  - report
  lexicon: Crum
  rationale: In the Thunder formula, “sound” best matches the abstract acoustic counterpart
    to “name.”
- source_word: ⲥⲏⲙⲉⲓ(ον)
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: Greek loanword (σημεῖον) via Crum
  rationale: “Sign” is the established semantic range; keeps the semiotic chain (name/sound/sign).
- source_word: ⲟⲛ
  chosen: as well
  alternatives:
  - also
  - again
  lexicon: Crum
  rationale: Here marks additive force; “as well” reads smoothly in the line’s cadence.
- source_word: ⲡⲁⲓ
  chosen: this
  alternatives:
  - of this
  - that
  lexicon: Crum
  rationale: Deictic; context suggests resumptive/additive force. Low certainty; not
    over-translated.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: the light that goes forth
  alternatives:
  - the light that shines out
  - the light that goes out
  lexicon: Crum
  rationale: ⲉⲃⲟⲗ indicates outward motion; “goes forth” preserves archaic-solemn
    cadence without obscurity.
parallelism_check: 'This block keeps the antithetical-parallel structure: “hearing
  … to all” stands with/against “speech … there”; then the chiastic pair “the name
  of the sound and the sound of the name” is preserved verbatim; the sequence culminates
  in semiotics (“sign”) and epiphany (“light that goes forth”). I avoid collapsing
  these into prose to preserve Thunder’s patterned cadence.'
voice_check: The declarative “I am” voice is maintained where the Coptic explicitly
  has ⲁⲛⲟⲕ ⲡⲉ. Where the Coptic shifts into apposition (name/sound), I keep the asyndetic
  listing to let the same voice carry without artificially inserting extra “I am”s.
  Diction (“speech,” “remembrance,” “sign,” “light”) stays concrete and paradoxical
  in Thunder’s self-revelatory tone.
alignment_risk_note: 'Alignment confidence is medium and the consult English supplied
  (“If you are condemned…”) does not match this Coptic. By content, this block matches
  the well-known Thunder series (“hearing … speech … name/sound … sign … light”).
  Specific weak points: (1) ⲉⲧϣⲏⲡ is read as “attainable/within reach” rather than
  “great”; (2) ⲉⲧⲉⲙⲁⲩ is taken as deictic “there,” though some witnesses render an
  inaccessibility contrast; (3) line division places “ⲙⲡⲣⲁⲛ” with the second half
  of the chiastic pair. I avoid forcing the consult’s sense and translate the Coptic
  as seen.'
