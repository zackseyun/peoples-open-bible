translation:
  language: es
  text: Y sucedía que cuando Israel sembraba, Madián, Amalec y los hijos de Oriente subían contra ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene el sufijo singular «contra él», referido colectivamente a Israel; en español se vierte de forma natural como «contra ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה / אִם
  english_pob_choice: And whenever
  chosen_spanish: Y sucedía que, cuando
  alternatives_spanish:
  - Y acontecía que, cuando
  - Y cuando sucedía que
  - Y cada vez que
  lexicon: HALOT
  rationale: La construcción narrativa con וְהָיָה + אִם expresa una circunstancia repetida. En español, «Y sucedía que, cuando» mantiene el valor iterativo sin volverlo meramente hipotético.
- source_word: זָרַע
  english_pob_choice: sowed
  chosen_spanish: sembraba
  alternatives_spanish:
  - sembraba la semilla
  - había sembrado
  - cosechaba
  lexicon: HALOT
  rationale: «Sembraba» reproduce el sentido agrícola básico de זרע y conserva la habitualidad del contexto.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio del pueblo; se conserva sin modificación.
- source_word: וְעָלָה / וְעָלוּ
  english_pob_choice: would come up / would come up against them
  chosen_spanish: subían / subían contra ellos
  alternatives_spanish:
  - subía / subía contra él
  - venían / venían contra ellos
  - ascendían / ascendían contra ellos
  lexicon: HALOT
  rationale: «Subir» conserva el valor espacial de עלה y es idiomático en español bíblico. Se repite para ambas apariciones del verbo y se explicita el matiz hostil con «contra ellos».
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  lexicon: HALOT
  rationale: Se translitera al español con forma natural y reconocible para el lector bíblico.
- source_word: וַעֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalecitas
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio עֲמָלֵק; «Amalec» preserva esa forma nominal mejor que una etnónimo explicativo.
- source_word: וּבְנֵי קֶדֶם
  english_pob_choice: the people of the East
  chosen_spanish: los hijos de Oriente
  alternatives_spanish:
  - los pueblos de Oriente
  - la gente de Oriente
  - los orientales
  lexicon: HALOT
  rationale: Se mantiene la literalidad relacional de «hijos de Oriente», que refleja mejor el hebreo que una paráfrasis geográfica más libre. En español suena natural dentro del registro bíblico.
- source_word: עָלָיו
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - contra él
  - contra Israel
  lexicon: HALOT
  rationale: El sufijo singular hebreo se refiere colectivamente a Israel. Se sigue la revisión inglesa que suaviza al plural natural en español sin perder el referente colectivo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «against him» por «against them» para expresar el sentido colectivo de Israel. El español sigue ese ajuste, pero conserva la huella del singular hebreo en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se evita «los amalecitas» porque el hebreo usa el nombre propio Amalec.
  - «Hijos de Oriente» conserva la estructura semítica y el tono bíblico sin forzar un equivalente más interpretativo.
