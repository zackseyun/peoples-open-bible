translation:
  language: es
  text: Cántico de ascensos. Alzo mis ojos a los montes[a]; ¿de dónde vendrá mi ayuda?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las montañas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר לַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascenso
  alternatives_spanish:
  - Canción de ascensos
  - Cántico de ascensos
  - Canto de ascenso
  lexicon: שִׁיר; מַעֲלוֹת
  rationale: ‘שִׁיר’ pide un término elevado y natural en español; ‘cántico’ conserva el registro litúrgico sin volverlo arcaico. En vez de pluralizar mecánicamente ‘ascensos’, ‘de ascenso’ expresa bien la función del encabezado como título de colección.
- source_word: אֶשָּׂא עֵינַי
  english_pob_choice: I lift up my eyes
  chosen_spanish: Alzo mis ojos
  alternatives_spanish:
  - Levanto mis ojos
  - Elevo mis ojos
  lexicon: נשא + עיניים
  rationale: ‘Alzo’ reproduce el gesto de mirar hacia arriba con claridad y buen español. ‘Levanto’ también es posible, pero ‘alzo mis ojos’ suena más directo y menos redundante con el complemento siguiente.
- source_word: אֶל הֶהָרִים
  english_pob_choice: to the mountains
  chosen_spanish: a los montes
  alternatives_spanish:
  - a las montañas
  - hacia los montes
  - hacia las montañas
  lexicon: הרים
  rationale: ‘הָרִים’ puede traducirse como ‘montes’ o ‘montañas’. ‘Montes’ conserva un tono bíblico y permite mantener la imagen del verso sin exigir una diferencia artificial entre cerros y montañas.
- source_word: מֵאַיִן יָבֹא עֶזְרִי
  english_pob_choice: from where will my help come?
  chosen_spanish: ¿de dónde vendrá mi ayuda?
  alternatives_spanish:
  - ¿de dónde me vendrá la ayuda?
  - ¿de dónde provendrá mi ayuda?
  lexicon: מאין; בוא; עזר
  rationale: La pregunta retórica en español suena natural con ‘¿de dónde vendrá mi ayuda?’. ‘Vendrá’ preserva la idea de origen y llegada del auxilio sin añadir explicaciones.
theological_decisions:
- issue: Encabezado del salmo como parte del texto
  english_pob_reading: A Song of Ascents.
  chosen_spanish_reading: Cántico de ascenso.
  alternative_spanish_readings:
  - Canción de ascenso.
  - Cántico de ascensos.
  rationale: El hebreo funciona como título/encabezado y el POB inglés lo conserva como parte del registro textual. En español conviene mantenerlo igualmente, sin convertirlo en nota o eliminarlo.
  doctrine_reference: Ninguna; decisión de formato y género literario.
translation_notes:
  revision_awareness: 'El inglés POB revisado completó el contenido del versículo añadiendo la cláusula principal y la pregunta retórica completas: ‘I lift up my eyes to the mountains; from where will my help come?’. La versión española sigue ese alcance completo y conserva el encabezado del salmo con su nota alternativa para la imagen topográfica.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el tetragrámaton en otros contextos, pero este verso no lo contiene.
  - Se usó ‘montes’ en lugar de ‘montañas’ para conservar un registro bíblico sobrio, con nota alternativa donde el español admite ambas posibilidades.
  - La puntuación respeta el valor interrogativo del segundo miembro del versículo.
