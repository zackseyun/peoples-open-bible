review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y la trayectoria auditada en inglés: juicio divino activo, alcance colectivo de אָדָם, comparación con ciegos, pecado contra Yahvé, sangre derramada como polvo y carne como estiércol. También respeta correctamente la política del proyecto al usar ‘Yahvé’. Sin embargo, hay un problema interno en la nota [a]: repite exactamente la lectura principal (‘la humanidad’) como si fuera alternativa, en lugar de preservar la alternativa significativa documentada por el POB (‘el hombre’/‘la humanidad’ o equivalente).'
  spanish_quality_summary: El español es claro, natural y digno. ‘Y yo causaré angustia’ es comprensible, aunque algo más literal y fluido sería ‘Y traeré angustia’. No obstante, el texto actual es aceptable. La única reparación necesaria es la nota [a], para que no sea redundante y sí informe una alternativa real. El resto de la redacción es buena y legible para un público eclesial amplio.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → ‘Yahvé’ correctamente; imágenes de juicio preservadas; ‘carne’ mantiene la decisión léxica principal para וּלְחֻמָם con alternativa en nota. El tratamiento de אָדָם como colectivo mediante ‘la humanidad’ es defendible, pero la nota debe reflejar la alternativa formal ‘el hombre’ o ‘la humanidad’ conforme al expediente inglés.'
  issues:
  - severity: medium
    issue: La nota [a] no presenta una alternativa real
    rationale: El texto principal ya dice ‘la humanidad’, pero la nota [a] también dice ‘O ‘la humanidad’’; eso no añade información y no preserva la alternativa significativa del expediente inglés sobre el singular colectivo אָדָם.
  revised_spanish_text: Y yo causaré angustia a la humanidad[a], y caminarán como los ciegos, porque han pecado contra Yahvé; su sangre será derramada como polvo[b], y su carne como estiércol.
  revised_footnotes:
  - marker: a
    text: O ‘al hombre’. El hebreo usa אָדָם en singular, pero con sentido colectivo.
    reason: lexical_alternative
  - marker: b
    text: O ‘sus entrañas’ / ‘sus vísceras’, reflejando una comprensión más específica del término hebreo.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para que preserve una alternativa léxica real y útil, en vez de repetir la misma expresión del texto principal. No se cambia el cuerpo del versículo porque su sentido, terminología y español son sustancialmente fieles.
