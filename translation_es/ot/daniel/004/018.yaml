  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del arameo: follaje hermoso, fruto abundante, alimento para todos, animales debajo y aves en las ramas. La sintaxis principal y las elecciones léxicas clave siguen de cerca tanto el original como la auditoría inglesa.'
  spanish_quality_summary: 'El español es claro, digno y muy legible. Sin embargo, la nota al pie actual no corresponde a la nota de la auditoría inglesa: desplaza la alternativa desde «las aves de los cielos / del cielo» hacia «fruto abundante / grande», lo cual altera el foco documentado. Conviene conservar la nota en el lugar donde el inglés preservó la alternativa literal/suavizada.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «follaje», «alimento», «bestias del campo», «ramas» y «aves de los cielos» son compatibles con el estilo y con la racionalidad léxica auditada. La única desalineación es la ubicación y contenido de la nota léxica, que debe acompañar «las aves de los cielos».
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada a «abundante» y ofrece «su fruto grande» como alternativa.
    rationale: La auditoría inglesa documenta la nota alternativa para «the birds of the heavens / sky», no para שַׂגִּיא. Aunque «grande» sea una alternativa léxica posible para שַׂגִּיא, aquí no forma parte del rastro auditado preservado y sustituye indebidamente una nota significativa del original.
  - severity: low
    issue: La nota española actual explica «grandeza/abundancia» de forma algo metalingüística.
    rationale: No es incorrecta en sí, pero resulta menos útil para el lector que una nota textual directa sobre «los cielos / el cielo», que además preserva la alternativa explícita documentada por POB.
  revised_spanish_text: Su follaje era hermoso y su fruto abundante, y en él había alimento para todos. Debajo de él vivían las bestias del campo, y en sus ramas habitaban las aves de los cielos[a].
  revised_footnotes:
  - marker: a
    text: O «las aves del cielo». El arameo literalmente dice «las aves de los cielos».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal salvo la reubicación de la nota al pie al sintagma que realmente la requiere según la auditoría inglesa. Así se preserva mejor el rastro léxico documentado para צִפֲּרֵי שְׁמַיָּא y se evita introducir una nota secundaria no necesaria sobre «abundante».
