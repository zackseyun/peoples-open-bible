translation:
  language: es
  text: Si ustedes violan el pacto de Yahvé, su Dios[a], que él les ordenó, y van a servir a otros dioses y se postran ante ellos, la ira de Yahvé se encenderá contra ustedes, y perecerán pronto de la buena tierra[b] que él les ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ustedes violen el pacto de Yahvé, su Dios». La apertura hebrea puede leerse temporalmente («cuando») o condicionalmente («si»).'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «de sobre la buena tierra». La expresión enfatiza la remoción de la tierra que Yahvé les dio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָבְרְכֶם
  english_pob_choice: If you transgress
  chosen_spanish: Si ustedes violan
  alternatives_spanish:
  - Cuando ustedes violen
  - Si ustedes transgreden
  lexicon: HALOT
  rationale: El hebreo presenta una construcción que puede leerse de forma condicional o temporal. En español, para un aviso exhortativo y jurídico-covenantal, 'si ustedes violan' conserva el sentido de advertencia. 'Violar' comunica la infracción de un pacto con fuerza natural; 'transgreden' también es posible, pero suena algo más abstracto.
- source_word: בְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el pacto de alianza
  - el convenio
  lexicon: HALOT
  rationale: Aquí בְּרִית designa el vínculo pactal entre Yahvé e Israel. 'Pacto' es claro en español y conserva el peso jurídico y teológico del término sin sonar artificioso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito conforme a la convención del proyecto. 'Yahvé' es la forma principal en el texto español, en lugar de una sustitución por título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El hebreo es plural de segunda persona con valor posesivo colectivo. En español, 'su Dios' con contexto plural evita regionalismos de voseo o 'vosotros' y mantiene la referencia comunitaria.
- source_word: וַהֲלַכְתֶּם
  english_pob_choice: go
  chosen_spanish: y van
  alternatives_spanish:
  - y se van
  - y caminan
  lexicon: HALOT
  rationale: El inglés auditado reduce el hebreo a un movimiento que introduce la apostasía. En español, 'y van' es la continuación más natural dentro de la serie verbal. 'Caminan' sería demasiado literal y menos idiomático aquí.
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: serve
  chosen_spanish: sirven
  alternatives_spanish:
  - adoran
  - sirven como esclavos a
  lexicon: HALOT
  rationale: עבד con dioses suele expresar servicio cultual. 'Sirven' preserva el paralelismo con el verbo siguiente sin convertirlo prematuramente en 'adorar', y sin introducir la esclavitud como imagen principal en este versículo.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses ajenos
  - a dioses extraños
  lexicon: HALOT
  rationale: La expresión hebrea es la fórmula común para deidades rivales. 'Otros dioses' es directo y fiel; 'ajenos' o 'extraños' serían posibles, pero alteran el matiz idiomático estándar.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  english_pob_choice: and bow down to them
  chosen_spanish: y se postran ante ellos
  alternatives_spanish:
  - y se arrodillan ante ellos
  - y se inclinan ante ellos
  lexicon: HALOT
  rationale: El verbo implica postración física. 'Se postran ante ellos' mantiene esa concreción y distingue este gesto del simple 'servir' anterior. 'Adorar' sería más interpretativo y fusionaría dos acciones distintas.
- source_word: וְחָרָה אַף יְהוָה בָּכֶם
  english_pob_choice: then the anger of Yahweh will burn against you
  chosen_spanish: la ira de Yahvé se encenderá contra ustedes
  alternatives_spanish:
  - el furor de Yahvé arderá contra ustedes
  - Yahvé se enojará contra ustedes
  lexicon: HALOT
  rationale: חָרָה אַף conserva la metáfora de ira encendida. 'Se encenderá' reproduce bien el campo semántico del fuego y evita rebajar el hebreo a una mera emoción. 'Ira' mantiene אַף como el sustantivo idiomático apropiado en español bíblico moderno.
- source_word: וַאֲבַדְתֶּם
  english_pob_choice: and you will perish
  chosen_spanish: y perecerán
  alternatives_spanish:
  - y serán destruidos
  - y desaparecerán
  lexicon: HALOT
  rationale: '''Perecer'' comunica la ruina y muerte implícitas sin especificar más de lo que el verbo requiere. En esta advertencia, encaja mejor que ''serán destruidos'', que puede sonar más explicativo que el hebreo.'
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - enseguida
  lexicon: HALOT
  rationale: El adverbio expresa rapidez. 'Pronto' suena natural en español y preserva la inmediatez del castigo sin forzar un estilo demasiado coloquial.
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de sobre la buena tierra
  alternatives_spanish:
  - de la tierra
  - de encima de la tierra
  lexicon: HALOT
  rationale: מֵעַל indica remoción 'de sobre' algo. 'De sobre la buena tierra' conserva esa imagen espacial que el inglés auditado resumió como expulsión de la tierra. Es una expresión un poco más marcada, pero fiel al hebreo.
- source_word: הָאָרֶץ הַטּוֹבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra buena
  - la tierra prometida
  lexicon: HALOT
  rationale: '''Buena tierra'' refleja el calificativo covenantal del hebreo y evita introducir ''prometida'', que no está en el texto. El orden con artículo pospuesto en español resulta natural y digno.'
- source_word: אֲשֶׁר נָתַן לָכֶם
  english_pob_choice: that he has given you
  chosen_spanish: que él les ha dado
  alternatives_spanish:
  - que les dio
  - que les dio Yahvé
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar un don ya efectuado con vigencia presente. 'Les ha dado' conserva esa realidad actual. Se explicita 'él' para claridad referencial, siguiendo el antecedente inmediato.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. El proyecto pide preservar el nombre divino en español, por lo que 'Yahvé' mantiene la referencia personal y pactal sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lectura condicional de la apertura
  english_pob_reading: If you transgress
  chosen_spanish_reading: Si ustedes violan
  alternative_spanish_readings:
  - Cuando ustedes violen
  rationale: La sintaxis hebrea admite lectura temporal o condicional, pero el contexto es una advertencia. 'Si' conserva mejor la fuerza exhortativa en español, sin negar que la forma hebrea también pueda tener matiz temporal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense over tradition, optimal equivalence'
translation_notes:
  revision_awareness: El audit trail inglés mostró una revisión menor en la frase final para hacer más natural 'from the good land' sin perder el sentido de expulsión. En español se optó por una forma que mantiene explícita la imagen hebrea de 'de sobre la buena tierra', porque el idioma lo permite con claridad y conserva la fuerza del original. No se introdujeron cambios doctrinales ni léxicos fuera del marco del texto fuente.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה y Dios con minúscula/posesivo según el contexto reverente y monoteísta.
  - Se conserva la distinción entre 'sirven' y 'se postran' para reflejar dos verbos hebreos distintos.
  - La serie verbal usa segunda persona plural formal/neutral ('ustedes', 'les') para un registro amplio de lectura eclesial en español latinoamericano.
  - '''Pacto'' y ''buena tierra'' siguen la terminología covenantal del pasaje sin introducir glosas teológicas no presentes en el hebreo.'
