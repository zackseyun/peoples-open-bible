  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν εἴπωμεν ὅτι οὐχ ἡμαρτήκαμεν, ψεύστην ποιοῦμεν αὐτὸν καὶ ὁ λόγος αὐτοῦ οὐκ ἔστιν ἐν ἡμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/010.yaml
  text: If we say that we have not sinned[a], we make him a liar[b], and his word is not in us.
  footnotes:
  - marker: a
    text: Or 'we did not sin.' The Greek uses a perfect verb, which is naturally rendered 'we have not sinned' to express a past action with present significance.
    reason: lexical_alternative
  - marker: b
    text: '''His word'' could also be rendered ''his message.'' The Greek λόγος can carry either sense; ''word'' is retained to preserve Johannine wording.'
    reason: lexical_alternative
translation:
  language: ko
  text: 만일 우리가 죄를 짓지 않았다고 말하면, 우리는 그분을 거짓말쟁이로 만드는 것이고, 그분의 말씀이 우리 안에 있지 않습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ψεύστην ποιοῦμεν αὐτὸν
  english_pob_choice: we make him a liar
  chosen_korean: 그분을 거짓말쟁이로 만드는 것
  alternatives_korean:
  - 그분을 거짓말하시는 분으로 만드는 것
  lexicon: BDAG
  rationale: 강한 표현을 약화시키지 않는다. 「거짓말쟁이」는 한국어에서 다소 강하지만 헬라어 ψεύστης의 정면 충돌을 정확히 옮긴다.
