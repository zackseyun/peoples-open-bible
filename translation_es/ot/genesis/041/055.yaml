translation:
  language: es
  text: 'Y toda la tierra de Egipto tuvo hambre, y el pueblo clamó a Faraón por pan. Y Faraón dijo a todo Egipto: «Vayan a José. Lo que él les diga, hagan[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Forma más idiomática: «Hagan lo que él les diga». Se mantiene el orden más cercano al hebreo para conservar el énfasis del original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּרְעַב
  english_pob_choice: became hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - se hambró
  - llegó a tener hambre
  - sufrió hambre
  lexicon: HALOT
  rationale: El hebreo expresa el inicio o la experiencia de hambre/falta de alimento. En español, «tuvo hambre» comunica ese estado de manera natural y fiel; «sufrió hambre» añade énfasis interpretativo que el verbo por sí solo no exige.
- source_word: כָּל אֶרֶץ מִצְרַיִם
  english_pob_choice: all the land of Egypt
  chosen_spanish: toda la tierra de Egipto
  alternatives_spanish:
  - todo Egipto
  - todo el país de Egipto
  lexicon: HALOT
  rationale: La construcción hebrea conserva explícitamente «tierra», no solo la nación. «Tierra de Egipto» mantiene esa concreción geográfica y textual; «todo Egipto» es más fluido, pero suaviza el sustantivo presente en el original.
- source_word: וַיִּצְעַק הָעָם
  english_pob_choice: the people cried out
  chosen_spanish: el pueblo clamó
  alternatives_spanish:
  - el pueblo gritó
  - el pueblo llamó con angustia
  lexicon: HALOT
  rationale: צעק denota un clamor fuerte, generalmente de necesidad o angustia. «Clamó» reproduce bien ese registro bíblico en español sin volverlo demasiado coloquial como «gritó».
- source_word: לַלָּחֶם
  english_pob_choice: for bread
  chosen_spanish: por pan
  alternatives_spanish:
  - por alimento
  - por comida
  lexicon: HALOT
  rationale: Aunque literalmente es «pan», en el contexto funciona como alimento básico pedido por necesidad. «Por pan» respeta la forma concreta del hebreo; «por alimento» explicita el sentido pero se aleja del término exacto.
- source_word: לְכָל מִצְרַיִם
  english_pob_choice: to all Egypt
  chosen_spanish: a todo Egipto
  alternatives_spanish:
  - a todos los egipcios
  - para todo Egipto
  lexicon: HALOT
  rationale: El hebreo usa el nombre del país como destinatario colectivo. «A todo Egipto» conserva esa apelación nacional de forma directa y natural en español.
- source_word: לְכוּ אֶל יוֹסֵף
  english_pob_choice: Go to Joseph
  chosen_spanish: Vayan a José
  alternatives_spanish:
  - Vayan donde José
  - Acudan a José
  lexicon: HALOT
  rationale: El imperativo plural con la preposición אֶל se expresa con naturalidad como «Vayan a José». «Acudan a José» suena más formal, pero desplaza ligeramente la direccionalidad del hebreo.
- source_word: אֲשֶׁר יֹאמַר לָכֶם תַּעֲשׂוּ
  english_pob_choice: What he says to you, do
  chosen_spanish: Lo que él les diga, hagan
  alternatives_spanish:
  - Lo que él les diga, háganlo
  - Hagan lo que él les diga
  lexicon: HALOT
  rationale: 'El hebreo antepone la cláusula relativa para dar énfasis: primero lo que José diga, luego la acción requerida. «Lo que él les diga, hagan» preserva ese orden y suena natural en español; «Hagan lo que él les diga» es más idiomático, pero pierde un poco de la prominencia del relativo.'
translation_notes:
  revision_awareness: Se siguió la lectura inglesa auditada sin cambios sustanciales; la única tensión estilística relevante está en la cláusula final, donde se preservó el orden enfático del hebreo con una nota sobre la alternativa más idiomática. No se detectaron revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino.
  - «Faraón» se conserva como título propio establecido en español bíblico.
  - Se usó «pan» para לַלָּחֶם por transparencia textual; en contexto remite al sustento alimentario general.
  - La cláusula final conserva un orden algo marcado para reflejar el énfasis del hebreo, con nota de alternativa idiomática.
