translation:
  language: es
  text: 'Esto es lo que le dirán a Yosef: “Por favor, perdona[a] la transgresión de tus hermanos y su pecado, porque te pagaron con mal. Y ahora, por favor, perdona la transgresión de los siervos del Dios de tu padre”. Y Yosef lloró cuando le hablaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea usa literalmente ‘levantar/cargar’ la culpa; aquí se traduce por su sentido idiomático: perdonar. O bien, ‘perdona la ofensa de tus hermanos y su pecado’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה תֹאמְרוּ
  english_pob_choice: This is what you shall say
  chosen_spanish: Esto es lo que dirán
  alternatives_spanish:
  - Así dirán
  - Esto dirán
  lexicon: HALOT
  rationale: La fórmula introduce discurso citado de manera natural en español y conserva el valor directivo del hebreo sin sonar forzada. 'Dirán' mantiene la instrucción implícita del contexto.
- source_word: לְיוֹסֵף
  english_pob_choice: to Yosef
  chosen_spanish: a Yosef
  alternatives_spanish:
  - a José
  lexicon: HALOT
  rationale: Se conserva la transliteración 'Yosef' conforme a la convención del proyecto y al audit trail en inglés, en lugar de sustituirla por el nombre tradicional español.
- source_word: שָׂא נָא
  english_pob_choice: Please forgive
  chosen_spanish: Por favor, perdona
  alternatives_spanish:
  - Por favor, perdona ahora
  - Te ruego que perdones
  lexicon: HALOT
  rationale: La idiomática hebrea 'levantar/cargar' se vierte por el sentido en contexto. En español, 'perdona' comunica con claridad el acto de absolver la culpa, y 'por favor' refleja la súplica intensificada por las partículas.
- source_word: פֶּשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - ofensa
  - rebeldía
  lexicon: HALOT
  rationale: '''Transgresión'' preserva el peso moral del término y mantiene la distinción respecto de ''pecado'', como en el inglés POB.'
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus hermanos varones
  lexicon: HALOT
  rationale: El referente son los hermanos de Yosef; 'hermanos' es literal, claro y suficiente en español.
- source_word: וְחַטָּאתָם
  english_pob_choice: and their sin
  chosen_spanish: y su pecado
  alternatives_spanish:
  - y su culpa
  - y su falta
  lexicon: HALOT
  rationale: Se conserva la segunda noción moral como término distinto de 'transgresión'. 'Pecado' es la equivalencia más directa y transparente en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aunque el inglés POB revisó 'because' a 'for' por registro, en español 'porque' expresa con naturalidad la relación causal sin perder formalidad.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  lexicon: HALOT
  rationale: '''Mal'' mantiene la carga moral del hebreo y suena natural en español; evita reducirlo a daño meramente físico.'
- source_word: גְמָלוּךָ
  english_pob_choice: they repaid you
  chosen_spanish: te hicieron
  alternatives_spanish:
  - te pagaron con
  - te retribuyeron
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar trato o retribución. En esta frase, 'te hicieron mal' comunica el sentido global con naturalidad en español, reflejando la relación entre 'mal' y la acción realizada sobre Yosef.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora pues
  - Y ahora bien
  lexicon: HALOT
  rationale: Mantiene el giro discursivo que reanuda la petición, con un enlace natural en español.
- source_word: לְפֶשַׁע
  english_pob_choice: the transgression
  chosen_spanish: la transgresión
  alternatives_spanish:
  - la ofensa
  lexicon: HALOT
  rationale: Se conserva la correspondencia léxica con פֶּשַׁע y su repetición retórica en la segunda súplica.
- source_word: עַבְדֵי אֱלֹהֵי אָבִיךָ
  english_pob_choice: the servants of the God of your father
  chosen_spanish: los esclavos del Dios de tu padre
  alternatives_spanish:
  - los siervos del Dios de tu padre
  lexicon: HALOT
  rationale: Se elige 'esclavos' por la fuerza léxica de עבד, conforme a la pauta del proyecto cuando el inglés POB reservaría 'slave'. Aquí la autodesignación humilde ante una autoridad superior y la pertenencia a Dios sostienen ese matiz. No se suaviza a 'siervos' salvo razón contextual documentada, y aquí no la hay.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - sollozó
  - se echó a llorar
  lexicon: HALOT
  rationale: '''Lloró'' reproduce el hecho narrativo de manera concisa y solemne, adecuada al tono del pasaje.'
- source_word: בְּדַבְּרָם אֵלָיו
  english_pob_choice: when they spoke to him
  chosen_spanish: cuando le hablaron
  alternatives_spanish:
  - al hablarle
  - mientras le hablaban
  lexicon: HALOT
  rationale: La construcción temporal se expresa de modo natural en español. 'Le hablaron' mantiene el complemento indirecto y la referencia directa a Yosef.
theological_decisions:
- issue: 'Doble vocabulario moral: פֶּשַׁע / חַטָּאת'
  english_pob_reading: Distinguish as 'transgression' and 'sin'
  chosen_spanish_reading: Distinguir 'transgresión' y 'pecado'
  alternative_spanish_readings:
  - Traducir ambos como 'falta'
  - Traducir ambos como 'culpa'
  rationale: El hebreo usa dos términos relacionados pero no idénticos. Mantener la distinción preserva la fuerza retórica de la súplica y evita aplanar el paralelismo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor de עַבְדֵי אֱלֹהֵי אָבִיךָ
  english_pob_reading: the servants of the God of your father
  chosen_spanish_reading: los esclavos del Dios de tu padre
  alternative_spanish_readings:
  - los siervos del Dios de tu padre
  - los servidores del Dios de tu padre
  rationale: El hebreo עבד conserva fuerza de subordinación y pertenencia. Aunque en español 'esclavos' puede sonar fuerte, aquí refleja mejor la forma de autohumillación implícita y evita suavizar el término más de lo que el texto permite.
  doctrine_reference: Translation philosophy §5 (lexical force and documented exceptions)
- issue: Referencia divina en אֱלֹהֵי אָבִיךָ
  english_pob_reading: the God of your father
  chosen_spanish_reading: el Dios de tu padre
  alternative_spanish_readings:
  - el Dios de vuestro padre
  rationale: Se mantiene 'Dios' como equivalente estándar de אֱלֹהִים y el singular posesivo de segunda persona singular para concordar con el discurso dirigido a Yosef.
  doctrine_reference: 'Project terminology default: אֱלֹהִים -> Dios'
translation_notes:
  revision_awareness: Se siguió el texto hebreo directamente y se tuvo en cuenta el cambio del audit trail inglés de 'because' a 'for' solo como indicio de registro, no como obligación de calcar la estructura. También se preservó la distinción moral entre פֶּשַׁע y חַטָּאת, y se adoptó la transliteración 'Yosef' conforme al proyecto.
  spanish_consistency_notes:
  - Se mantuvo 'Yosef' en lugar de 'José' para coherencia con el estándar del POB.
  - Se usó 'Dios' para אֱלֹהִים y no 'SEÑOR', conforme a la terminología del proyecto.
  - Se distinguieron 'transgresión' y 'pecado' para reflejar el paralelismo hebreo.
  - Se eligió 'esclavos' para עַבְדֵי por la fuerza léxica documentada, sin suavizar a 'siervos'.
