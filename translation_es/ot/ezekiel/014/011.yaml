translation:
  language: es
  text: para que la casa de Israel ya no se extravíe de mí[a], ni se contamine más con todas sus rebeliones, sino que sea mi pueblo, y yo sea su Dios, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se desvíe de mí'. El hebreo dice literalmente 'vague detrás de mí', un modismo para apartarse de seguir a Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa bien la finalidad/resultado del hebreo sin forzar un giro demasiado literal en español.
- source_word: יִתְעוּ
  english_pob_choice: may ... go astray
  chosen_spanish: se extravíe
  alternatives_spanish:
  - se desvíe
  - ande errante
  lexicon: HALOT
  rationale: מָשָׁג/תעה comunica la idea de desviarse o perderse; 'se extravíe' conserva la imagen de desviación y suena natural en español contemporáneo.
- source_word: מֵאַחֲרַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de seguirme
  - de ir tras de mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de detrás de mí / de ir tras de mí'. En español, 'se extravíe de mí' mantiene el resultado relacional del alejamiento sin un calco incómodo. La nota preserva la imagen idiomática.
- source_word: יִטַּמְּאוּ
  english_pob_choice: may ... defile themselves
  chosen_spanish: se contamine
  alternatives_spanish:
  - se mancille
  - se impurifique
  lexicon: HALOT
  rationale: El hitpael indica contaminación/impureza auto-incurrida. 'Contaminarse' comunica bien la acción reflexiva y el trasfondo cultual-moral.
- source_word: בְּכָל פִּשְׁעֵיהֶם
  english_pob_choice: with all their transgressions
  chosen_spanish: con todas sus rebeliones
  alternatives_spanish:
  - con todas sus transgresiones
  - por todas sus ofensas
  lexicon: HALOT
  rationale: פֶּשַׁע tiene fuerte carga de rebelión contra autoridad del pacto. 'Rebeliones' preserva esa fuerza mejor que un término más genérico, sin perder inteligibilidad.
- source_word: וְהָיוּ לִי לְעָם
  english_pob_choice: may be my people
  chosen_spanish: sean para mí un pueblo
  alternatives_spanish:
  - sean mi pueblo
  - lleguen a ser para mí un pueblo
  lexicon: HALOT
  rationale: La fórmula de pacto se expresa con naturalidad en español como 'ser para mí un pueblo', manteniendo el sentido relacional y evitando una traducción rígidamente nominal.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  english_pob_choice: and I may be their God
  chosen_spanish: yo sea para ellos Dios
  alternatives_spanish:
  - yo sea su Dios
  - yo les sea Dios
  lexicon: HALOT
  rationale: En español, 'ser para ellos Dios' conserva la estructura relacional del hebreo y evita la simple repetición de 'su Dios' si se quiere reflejar el paralelismo formal del pacto.
- source_word: יְהוִה
  english_pob_choice: Lord GOD / Yahweh in doctrinal note
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el nombre divino como 'Yahvé', preservando la referencia directa al Tetragrámaton en el texto principal.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: '''אֲדֹנָי'' se traduce ''el Señor'' y ''יְהוִה'' como ''Yahvé''. Esta combinación mantiene ambos elementos del título sin ocultar el nombre propio divino.'
theological_decisions:
- issue: Fórmula de pacto 'serán mi pueblo / yo seré su Dios'
  english_pob_reading: may be my people, and I may be their God
  chosen_spanish_reading: sean para mí un pueblo, y yo sea para ellos Dios
  alternative_spanish_readings:
  - sean mi pueblo, y yo sea su Dios
  - lleguen a ser para mí un pueblo, y yo llegue a ser su Dios
  rationale: El versículo expresa la fórmula pactual clásica sin añadir contenido doctrinal extra. 'Para mí' y 'para ellos' conservan la reciprocidad del pacto y el tono final de propósito del versículo.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Render del nombre divino en la doxología final
  english_pob_reading: declares the Lord GOD
  chosen_spanish_reading: declara el Señor Yahvé
  alternative_spanish_readings:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  rationale: El texto hebreo cierra con una fórmula profética de declaración. En español, 'declara' es idiomático y 'Señor Yahvé' preserva tanto el título אדני como el nombre propio יְהוָה.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Tensión léxica de 'from after me'
  english_pob_reading: go astray from me
  chosen_spanish_reading: se extravíe de mí
  alternative_spanish_readings:
  - se desvíe de mí
  - ande tras de mí
  rationale: La imagen hebrea es literalmente 'de detrás de mí / de seguirme'. En el texto principal se privilegia la naturalidad y la claridad, mientras la nota conserva el matiz idiomático de seguimiento leal.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del audit trail inglés, que ajustó 'wander from following me' a 'go astray from me' para mayor alineación léxica con el hebreo. En español se buscó mantener esa cercanía semántica con un verbo natural ('se extravíe') y se preservó el idiomismo hebreo en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al criterio del proyecto.
  - Se preserva la fórmula de pacto con 'pueblo' y 'Dios' sin reemplazarla por terminología eclesiástica más libre.
  - '''Rebeliones'' se usa para פִּשְׁעֵיהֶם por su fuerza de transgresión contra el pacto.'
  - La nota a aclara el hebraísmo de 'de detrás de mí' sin sobrecargar el texto principal.
