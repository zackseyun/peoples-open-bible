translation:
  language: es
  text: Y clamaron con himnos[a], bendiciendo a Yahvé, porque su bondad y su gloria son para siempre para todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque su bondad y su gloria permanecen para siempre para todo Israel». La frase griega es condensada y admite una expansión verbal distinta sin cambiar el sentido general.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφώνησαν
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - exclamaron
  - alzaron la voz
  lexicon: LSJ
  rationale: El verbo expresa una proclamación audible y pública; «clamaron» conserva ese tono litúrgico sin sonar demasiado coloquial.
- source_word: δι’ ὕμνων
  english_pob_choice: with hymns
  chosen_spanish: con himnos
  alternatives_spanish:
  - por himnos
  - mediante himnos
  - en himnos
  lexicon: LSJ
  rationale: La relación instrumental queda bien en español con «con himnos», natural en un contexto de alabanza y fiel al valor de medio o acompañamiento.
- source_word: εὐλογοῦντες
  english_pob_choice: blessing
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - alabando
  - diciendo bien de
  - bendiciendo alabar
  lexicon: LSJ
  rationale: «Bendiciendo» sigue de cerca el participio griego y mantiene la dicción bíblica; «alabando» sería más interpretativo.
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: LSJ
  rationale: En griego se trata de κύριος en contexto litúrgico. En español, «Señor» es la forma natural para este título; aquí no hay señal textual de un reemplazo por el nombre divino.
- source_word: χρηστότης
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - bondad benevolente
  - bondad
  - benignidad
  lexicon: LSJ
  rationale: «Bondad» es el equivalente bíblico más natural y amplio; mantiene la idea de benevolencia sin estrecharla a un matiz demasiado técnico.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: LSJ
  rationale: «Gloria» es la correspondencia bíblica estable y funciona bien en la fórmula paralela con «bondad».
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: are forever
  chosen_spanish: son para siempre
  alternatives_spanish:
  - permanecen para siempre
  - duran para siempre
  - son eternas
  lexicon: LSJ
  rationale: El griego es elíptico; en español hace falta un verbo copulativo. «Son para siempre» conserva la duración sin añadir una imagen verbal más específica.
- source_word: παντὶ Ἰσραήλ
  english_pob_choice: for all Israel
  chosen_spanish: para todo Israel
  alternatives_spanish:
  - para todo Israel
  - a todo Israel
  - sobre todo Israel
  lexicon: LSJ
  rationale: La cláusula final es compacta y de alcance colectivo. «Para todo Israel» refleja bien el destinatario global de la afirmación y evita sobredeterminar la preposición.
theological_decisions:
- issue: Traducción de κύριος en un contexto litúrgico griego deuterocanónico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Señor Dios
  rationale: El texto griego usa κύριος sin indicio de que aquí deba marcarse el tetragrámaton. En español, «el Señor» conserva el título reverente y sigue el sentido del POB inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Cláusula elíptica de elogio sobre bondad y gloria
  english_pob_reading: because his goodness and his glory are forever for all Israel
  chosen_spanish_reading: porque su bondad y su gloria son para siempre para todo Israel
  alternative_spanish_readings:
  - porque su bondad y su gloria permanecen para siempre para todo Israel
  - porque su bondad y su gloria duran para siempre para todo Israel
  rationale: El griego comprime la frase; el español requiere una cópula explícita. «Son para siempre» es la expansión mínima y mantiene el paralelismo de la frase.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que ajustó la última cláusula de una lectura más literal de «upon all Israel» a «for all Israel». La versión española refleja ese mismo alcance con «para todo Israel», evitando una preposición de sobreposición que no está exigida por el griego final aprobado.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, conforme al uso estándar del proyecto para este contexto griego.
  - Se prefirió «bondad» y «gloria» como pareja bíblica estable, en paralelo con la lectura inglesa auditada.
  - La nota al pie está anclada correctamente en «himnos[a]» para reflejar la expansión posible de la cláusula final sin dejar marcadores sueltos.
