translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: «He aquí, extiendo mi mano contra los filisteos, cortaré a los quereteos[a], y destruiré el remanente de la costa del mar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los cretenses» para «los quereteos»; el término hebreo puede referirse a un pueblo asociado con Creta, pero el texto principal conserva el etnónimo por transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título אדני con el nombre divino יהוה. En español, ‘Señor’ conserva el valor de título soberano de אֲדֹנָי, y ‘Yahvé’ preserva el nombre propio divino según el criterio del proyecto, en lugar de ocultarlo con una sustitución como ‘SEÑOR’.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Aquí estoy
  - Atento
  lexicon: HALOT
  rationale: Es una partícula de atención profética e introduce una acción divina inminente. ‘He aquí’ mantiene el registro solemne y corresponde bien al valor discursivo de ‘Behold’.
- source_word: נוֹטֶה יָדִי
  english_pob_choice: I am stretching out my hand
  chosen_spanish: extiendo mi mano
  alternatives_spanish:
  - estoy extendiendo mi mano
  - voy a extender mi mano
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa una acción inmediata o en curso. En español, ‘extiendo mi mano’ comunica esa inminencia de manera natural, sin perder la imagen corporal de juicio.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el etnónimo estándar en español y no requiere transliteración.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - destruiré
  - extirparé
  lexicon: HALOT
  rationale: כרת en contextos de juicio mantiene la imagen de ‘cortar’ y puede implicar eliminación total. ‘Cortaré’ conserva esa fuerza idiomática mejor que una paráfrasis más general.
- source_word: כְּרֵתִים
  english_pob_choice: the Cherethites
  chosen_spanish: los quereteos
  alternatives_spanish:
  - los cereteos
  - los cretenses
  lexicon: HALOT
  rationale: Se conserva el etnónimo por transliteración, como en el texto base inglés, porque el hebreo presenta un grupo nombrado. ‘Cretenses’ sigue siendo una alternativa histórica posible, pero se evita resolver la identificación en el cuerpo principal.
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - haré perecer
  - haré desaparecer
  lexicon: HALOT
  rationale: El causativo de אבד expresa hacer perecer o destruir. ‘Destruiré’ es claro y conserva el tono judicial sin exagerar el sentido.
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - los sobrevivientes
  - lo que quede
  lexicon: HALOT
  rationale: ‘Remanente’ es el equivalente directo y mantiene el matiz de lo que queda después del juicio, sin añadir una connotación teológica positiva que no está en este contexto.
- source_word: חוֹף הַיָּם
  english_pob_choice: the seacoast
  chosen_spanish: la costa del mar
  alternatives_spanish:
  - la ribera del mar
  - la franja costera
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente ‘costa del mar’. ‘La costa del mar’ es transparente en español y conserva la referencia geográfica.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé (con nota sobre el nombre divino)
  rationale: El proyecto pide traducir יהוה como ‘Yahvé’. Dado que aquí aparece junto a אֲדֹנָי, la combinación española ‘el Señor Yahvé’ reproduce el doble título sin ocultar el nombre propio divino ni recurrir a una convención de mayúsculas que no es necesaria en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la auditoría inglesa, sin cambios de sentido respecto del pasaje de juicio. Se preserva la tensión lexical de כְּרֵתִים como etnónimo transliterado, aunque existe una identificación histórica posible con ‘cretenses’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יהוה conforme al estándar del proyecto.
  - Se usa ‘Señor’ para אֲדֹנָי y no ‘Señor Dios’ porque en español ‘el Señor Yahvé’ comunica de forma más directa el doble título.
  - ‘Filisteos’ y ‘quereteos’ siguen la normalización española de etnónimos bíblicos.
  - ‘Remanente’ conserva el sentido de resto sobreviviente sin sugerir automáticamente un uso teológico positivo.
