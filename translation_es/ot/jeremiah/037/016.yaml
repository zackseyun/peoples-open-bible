translation:
  language: es
  text: Pues Jeremías había entrado en la casa del calabozo y en las celdas[a], y Jeremías permaneció allí muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «las habitaciones abovedadas» o «los compartimentos»; el término hebreo es raro y probablemente se refiere a espacios cerrados dentro de la prisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce una explicación circunstancial de la situación de Jeremías. «Porque» conserva bien ese valor explicativo en español sin convertir la frase en una mera indicación temporal.
- source_word: בָא
  english_pob_choice: had come
  chosen_spanish: había entrado
  alternatives_spanish:
  - había venido
  - entró
  lexicon: HALOT
  rationale: El hebreo בוא con אֶל puede expresar movimiento de llegada/entrada. «Había entrado» comunica con naturalidad que el ingreso al lugar ocurrió antes del estado de permanencia posterior, como en el inglés auditado.
- source_word: בֵּית הַבּוֹר
  english_pob_choice: the dungeon house
  chosen_spanish: la casa del calabozo
  alternatives_spanish:
  - la casa de la cisterna
  - la casa del pozo
  - la casa de la mazmorra
  lexicon: HALOT
  rationale: El hebreo es literalmente «casa del pozo/cisterna». En este contexto carcelario, «calabozo» transmite el sentido de prisión subterránea o confinamiento duro, manteniendo la imagen concreta sin sonar forzado en español.
- source_word: הַחֲנֻיוֹת
  english_pob_choice: the cells
  chosen_spanish: las celdas
  alternatives_spanish:
  - las habitaciones abovedadas
  - los compartimentos
  - las estancias
  lexicon: HALOT
  rationale: El término es raro y probablemente designa compartimentos cerrados dentro del complejo carcelario. «Celdas» es la opción más clara y natural en español para este contexto, aunque no fija de más la arquitectura exacta.
- source_word: וַיֵּשֶׁב שָׁם
  english_pob_choice: remained there
  chosen_spanish: permaneció allí
  alternatives_spanish:
  - se quedó allí
  - habitó allí
  - estuvo allí
  lexicon: HALOT
  rationale: ישב puede significar sentarse, habitar o permanecer. En una narración de prisión, «permaneció allí» expresa continuidad de confinamiento mejor que una traducción postural.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - un largo tiempo
  - por muchos días
  lexicon: HALOT
  rationale: Es una traducción directa y sobria del modismo hebreo, preservando la duración sin añadir interpretación.
translation_notes:
  revision_awareness: No se detectaron revisiones textuales ni cambios de sentido relevantes respecto del paquete fuente y el audit trail inglés; la solución española sigue de cerca la lectura aprobada, con adaptación idiomática natural.
  spanish_consistency_notes:
  - Se mantiene «Jeremías» como nombre propio en ambas menciones, siguiendo el hebreo y el uso español estándar.
  - Se conserva la secuencia narrativa de anterioridad con pretérito pluscuamperfecto («había entrado») y luego pretérito simple («permaneció»).
  - Se evita «SEÑOR» u otros sustitutos porque no aparece el nombre divino en este versículo.
  - «Calabozo» y «celdas» reflejan el contexto penitenciario sin borrar la posible concreción arquitectónica del hebreo.
