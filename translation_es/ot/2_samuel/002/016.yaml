translation:
  language: es
  text: Cada hombre agarró a su compañero por la cabeza, y su espada estaba en el costado de su compañero; así cayeron juntos. Por eso aquel lugar, que está en Gibeón, fue llamado Helcat-hazurim[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Helcat-hazurim es una transliteración del nombre hebreo del lugar. Su sentido exacto es incierto; entre las propuestas figuran «Campo de los Lados», «Campo de las Espadas Afiladas» y otras semejantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲזִקוּ
  english_pob_choice: seized
  chosen_spanish: sujetó
  alternatives_spanish:
  - agarró
  - se apoderó de
  lexicon: HALOT
  rationale: El verbo expresa un agarre violento y decidido en combate. En español, «sujetar» comunica la acción física de aferrar al rival sin sonar tan artificial como una traducción mecánica de ‘seized’.},{
translation_notes:
  revision_awareness: La redacción sigue el hebreo con apoyo del POB en inglés. Se mantiene la estructura narrativa y la incertidumbre del nombre propio, sin resolver etimológicamente más de lo que el texto permite.
  spanish_consistency_notes:
  - Se usó «Cada hombre» para reflejar el valor distributivo de אִישׁ.
  - «compañero» conserva la relación correlativa de רֵעַ sin implicar amistad.
  - «costado» reproduce צַד con un término natural en español.
  - El nombre del lugar se translitera como nombre propio y no se traduce en el texto principal.
  - «Gibeón» conserva la forma castellana habitual del topónimo.
