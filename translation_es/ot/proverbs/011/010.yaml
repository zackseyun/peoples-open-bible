base_translation:
  language: en
  yaml_path: translation/ot/proverbs/011/010.yaml
  text: In the prosperity of the righteous a city rejoices[b][a], and in the perishing of the wicked there is shouting.
  footnotes:
  - marker: a
    text: Or, 'When it goes well with the righteous, a city rejoices.' The Hebrew literally speaks of the 'good' or 'well-being' of the righteous.
    reason: lexical_alternative
  - marker: b
    text: Or, 'there is a cry of joy.' The Hebrew term can denote ringing or jubilant shouting.
    reason: lexical_alternative
