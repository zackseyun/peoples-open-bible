translation:
  language: es
  text: 'Porque dice[b][a]: «¿No son mis comandantes todos reyes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis príncipes»; el hebreo שָׂרַי puede denotar príncipes, gobernantes, oficiales o comandantes.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «juntos»; aquí transmite la idea de que todos ellos son, por igual, reyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces the explanatory or grounding force of the clause; 'Porque' preserves the discourse relation naturally in Spanish.
- source_word: יֹאמַר
  english_pob_choice: he says
  chosen_spanish: él dice
  alternatives_spanish:
  - dirá
  - decía
  lexicon: HALOT
  rationale: The imperfect functions idiomatically in quoted prophetic speech as a present 'dice'.
- source_word: הֲלֹא
  english_pob_choice: Are not
  chosen_spanish: ¿No son...?
  alternatives_spanish:
  - ¿Acaso no son...?
  - ¿No es cierto que son...?
  lexicon: HALOT
  rationale: Preserves the rhetorical question expecting affirmation while fitting Spanish syntax.
- source_word: שָׂרַי
  english_pob_choice: my commanders
  chosen_spanish: mis comandantes
  alternatives_spanish:
  - mis príncipes
  - mis oficiales
  - mis jefes
  lexicon: HALOT
  rationale: In the Assyrian imperial context, 'comandantes' best conveys high-ranking military-political officers and avoids misleading royal associations of 'príncipes'.
- source_word: יַחְדָּו
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - juntos
  - todos ellos
  lexicon: HALOT
  rationale: 'The Hebrew literally means ''juntos'', but here it idiomatically expresses the collective scope: all of them alike are kings.'
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  lexicon: HALOT
  rationale: Direct lexical equivalent; the boast is that the subordinate commanders have status equivalent to kings.
