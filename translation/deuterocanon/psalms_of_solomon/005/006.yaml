  from: For man and his portion are before you on a balance; he will not add anything so as to exceed your judgment, O God.
  to: For man and his portion from you are on a balance; he will not add anything so as to exceed your judgment, O God.
  rationale: 'The phrase παρὰ σοῦ uses παρά with the genitive, meaning ''from you'', not ''before you'' (which would require the dative παρὰ σοί). The draft''s lexical note acknowledges the genitive but forces a locative sense. However, ''from you'' perfectly continues the thought of verse 5 (that God gives everything): man''s portion comes *from God* and is measured out on a balance. | Adjudicator: The reviewer is correct regarding the Greek grammar. The preposition παρά with the genitive (παρὰ σοῦ) means ''from you'', whereas ''before you'' or ''in your presence'' would require the dative (παρὰ σοί).'
