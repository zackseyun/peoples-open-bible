translation:
  language: es
  text: ¿Quién puede subir al monte de Yahvé?[a] Y ¿quién puede estar de pie en su lugar santo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la montaña de Yahvé». El hebreo הַר puede significar «monte» o «montaña»; aquí se conserva «monte» por ser la traducción más habitual en este salmo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién puede ser
  lexicon: HALOT
  rationale: El interrogativo hebreo introduce una pregunta retórica sobre la persona apta; en español, «¿Quién» es la forma natural y concisa que conserva ese valor.
- source_word: יַעֲלֶה
  english_pob_choice: may ascend
  chosen_spanish: puede subir
  alternatives_spanish:
  - puede ascender
  - subirá
  - puede ir subiendo
  lexicon: HALOT
  rationale: עלה expresa subir/ascender. Aquí, en registro poético-litúrgico, «puede subir» comunica aptitud o acceso permitido, manteniendo el sentido de elevación sin sonar artificial.
- source_word: בְהַר
  english_pob_choice: the mountain of
  chosen_spanish: el monte de
  alternatives_spanish:
  - la montaña de
  - el cerro de
  lexicon: HALOT
  rationale: הַר puede ser «monte» o «montaña». En español bíblico y poético, «monte» es natural y puede abarcar tanto la elevación como el lugar sagrado, sin forzar un calco demasiado moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» para preservar el nombre propio divino, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: יָקוּם
  english_pob_choice: may stand
  chosen_spanish: puede estar
  alternatives_spanish:
  - puede permanecer
  - puede mantenerse en pie
  - puede ponerse de pie
  lexicon: HALOT
  rationale: קום aquí funciona en paralelo con «subir» y en contexto de acceso al santuario. En español, «puede estar» comunica la permanencia/presencia ante Dios de manera clara y sobria; no se pierde la fuerza de estar de pie, que queda implícita en el contexto ritual.
- source_word: בִּמְקוֹם
  english_pob_choice: in ... place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su lugar santo
  - en el lugar
  lexicon: HALOT
  rationale: מָקוֹם es «lugar». Dado el sufijo posesivo y el paralelismo con la segunda línea, «en su lugar» conserva la referencia espacial sin introducir más especificación que la del contexto.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - de santidad
  lexicon: HALOT
  rationale: קֹדֶשׁ con sufijo implica «su santo lugar» / «su lugar santo». En español, «lugar santo» preserva la relación atributiva y el sentido de consagración del espacio de presencia divina.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en lugar de un sustituto titulado, siguiendo el criterio del proyecto y preservando la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza modal de los verbos imperfectos en las preguntas retóricas
  english_pob_reading: may ascend / may stand
  chosen_spanish_reading: puede subir / puede estar
  alternative_spanish_readings:
  - subirá / estará
  - puede ascender / puede permanecer
  rationale: Las preguntas no describen mero futuro, sino idoneidad para acercarse y permanecer ante Yahvé. «Puede» conserva esa cualificación sin resolverla en una afirmación cronológica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto español sigue el consenso alto del audit trail inglés sin cambios sustanciales. Se conservan la pregunta retórica, el paralelismo poético y la decisión de verter el nombre divino por transliteración. No se añadieron expansiones interpretativas fuera de lo que el hebreo exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, según la norma del proyecto.
  - Se eligió «monte» en vez de «montaña» por naturalidad bíblica en español, manteniendo abierta la alternativa en nota.
  - «Lugar santo» preserva el sustantivo concreto y el valor de santidad del hebreo sin paraphrasear a «santuario».
  - El marcador de nota [a] aparece junto a la frase con la alternativa lexical relevante.
