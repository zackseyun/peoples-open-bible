review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no preserva plenamente el sentido del hebreo principal ni la revisión final del POB inglés. La fuente hebrea dice literalmente que un compañero 'como tu propia alma' se vuelve adversario/enemigo; el paralelo griego apoya la idea de amistad íntima, pero no justifica reemplazar en el texto principal la imagen hebrea después de que la auditoría inglesa la restituyó. Además, 'se vuelve enemistad' cambia indebidamente una persona ('enemy/adversary') por una abstracción ('enmity').
  spanish_quality_summary: 'El español es mayormente legible, pero tiene dos problemas claros: el anclaje de nota ''[a]'' está mal colocado tras ''hay'', y ''se vuelve enemistad'' suena poco natural y semánticamente impreciso en español. ''Pesar hasta la muerte'' es aceptable, aunque conviene reflejar mejor ''que llega hasta la muerte''.'
  glossary_alignment: 'No hay términos teológicos de glosario mayor en juego. La decisión clave es filológica: conservar en el texto principal ''como tu propia alma'' conforme al hebreo y a la revisión inglesa, dejando en nota la alternativa griega ''compañero y amigo''.'
  issues:
  - severity: high
    issue: El texto principal usa 'un compañero y amigo' en vez de reflejar 'como tu propia alma'.
    rationale: La revisión auditada del POB inglés cambió expresamente 'and friend' a 'as your own soul' para alinearse mejor con רע כנפשך. El español debe seguir esa decisión, no la lectura anterior.
  - severity: high
    issue: '''Se vuelve enemistad'' no reproduce ''turns into an enemy''.'
    rationale: La fuente hebrea נהפך לצר y el inglés auditado apuntan a una persona hostil ('adversario/enemigo'), no al estado abstracto de enemistad. En español natural y fiel corresponde 'se vuelve enemigo' o 'se convierte en enemigo'.
  - severity: medium
    issue: El marcador de nota [a] está anclado en un lugar incorrecto.
    rationale: La nota explica la expresión relacional 'como tu propia alma' / 'compañero y amigo', por lo que el marcador debe ir junto a esa frase, no después de 'hay'.
  - severity: low
    issue: La expresión 'pesar hasta la muerte' podría reforzarse con 'que llega hasta la muerte'.
    rationale: Aunque no es errónea, añadir el relativo refleja mejor la imagen verbal de מגיע אל מות ('reaches to death') y mejora la fluidez.
  revised_spanish_text: ¿No hay pesar que llega hasta la muerte, cuando un compañero como tu propia alma[a] se vuelve enemigo?
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: “un compañero como tu propia alma”; el paralelo griego tiene “un compañero y amigo”. El texto principal conserva la imagen hebrea de amistad íntima.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto principal para ajustarlo a la fuente hebrea y a la revisión final del POB inglés: se restaura ''como tu propia alma'' y se reemplaza la abstracción impropia ''enemistad'' por ''enemigo''. También se recoloca la nota donde corresponde y se afina la frase verbal para reflejar ''reaches to death''.'
