translation:
  language: es
  text: 'Entonces Moisés llegó y contó al pueblo todas las palabras de Yahvé y todas las ordenanzas[a], y todo el pueblo respondió con una sola voz y dijo: «Todas las palabras que Yahvé ha hablado, haremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ordenanzas» traduce aquí מִשְׁפָּטִים en su sentido de disposiciones legales o reglamentos del pacto; también podría traducirse «juicios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then Moses came
  chosen_spanish: Entonces Moisés vino
  alternatives_spanish:
  - Y Moisés vino
  - Moisés llegó
  lexicon: HALOT
  rationale: וַיָּבֹא marca avance narrativo; «vino» conserva el movimiento básico de בוא, y «Entonces» da fluidez natural en español sin perder la secuencia.
- source_word: וַיְסַפֵּר
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - dijo
  - narró
  lexicon: HALOT
  rationale: ספר en piel significa contar/relatar; «contó» es fiel y natural para comunicar al pueblo el contenido recibido.
- source_word: כָּל דִּבְרֵי יְהוָה
  english_pob_choice: all the words of Yahweh
  chosen_spanish: todas las palabras de Yahvé
  alternatives_spanish:
  - todo lo que Yahvé había dicho
  - todas las palabras de Yahvé
  lexicon: HALOT
  rationale: Se conserva «palabras» para reflejar דִּבְרֵי y mantener el vínculo con la respuesta del pueblo; «Yahvé» traduce el Nombre divino según la convención del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» en el texto español principal, conforme al criterio del proyecto, preservando el nombre propio del pacto.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the ordinances
  chosen_spanish: las ordenanzas
  alternatives_spanish:
  - los juicios
  - las disposiciones
  - las leyes
  lexicon: HALOT
  rationale: En este contexto legal de pacto, מִשְׁפָּטִים se entiende mejor como rulings/ordinances; «ordenanzas» refleja bien esa fuerza normativa en español.
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió en voz alta
  lexicon: HALOT
  rationale: ענה aquí introduce la reacción verbal del pueblo; «respondió» es natural y comunica la reciprocidad del diálogo sin añadir matices innecesarios.
- source_word: קוֹל אֶחָד
  english_pob_choice: with one voice
  chosen_spanish: a una sola voz
  alternatives_spanish:
  - con una sola voz
  - en una sola voz
  lexicon: HALOT
  rationale: El modismo hebreo expresa unanimidad; «a una sola voz» reproduce la imagen idiomática de manera idiomática y clara en español.
- source_word: כָּל הַדְּבָרִים
  english_pob_choice: All the words
  chosen_spanish: Todas las palabras
  alternatives_spanish:
  - Todo lo dicho
  - Todas estas palabras
  lexicon: HALOT
  rationale: Se conserva «palabras» para reflejar el paralelismo con «todas las palabras de Yahvé» y evitar una generalización excesiva.
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: דִּבֶּר se vierte con «ha hablado» para mantener la referencia a la palabra pronunciada por Yahvé con relevancia vigente en la respuesta del pueblo.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: las haremos
  alternatives_spanish:
  - las haremos y obedeceremos
  - las cumpliremos
  - obedeceremos
  lexicon: HALOT
  rationale: El verbo עשה significa hacer; el objeto implícito se recupera por contexto en español como «las», refiriéndose a «palabras»/mandatos. Se evita ampliar a «obedeceremos» para no suavizar la forma concreta del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue la decisión doctrinal del proyecto de no sustituir el Nombre divino por un título como «Señor». «Yahvé» es la forma principal en español para preservar el Nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of מִשְׁפָּטִים in covenantal law context
  english_pob_reading: ordinances
  chosen_spanish_reading: ordenanzas
  alternative_spanish_readings:
  - juicios
  - leyes
  - disposiciones
  rationale: En este contexto de pacto y normativa, la lectura principal es de disposiciones legales. «Ordenanzas» mantiene la fuerza jurídica sin imponer un tono eclesiástico ajeno al hebreo.
  doctrine_reference: HALOT / English POB audit trail for mishpatim
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que prefirió «ordinances» para מִשְׁפָּטִים por ser más natural en este contexto legal. En español se adopta «ordenanzas» por equivalencia funcional, manteniendo la misma decisión léxica principal. También se conserva la elección del Nombre divino como forma transliterada y la estructura paralela «todas las palabras... y todas las ordenanzas».
  spanish_consistency_notes:
  - Se mantiene el paralelismo léxico entre «todas las palabras» en la primera cola y «Todas las palabras» en la respuesta del pueblo.
  - Se conserva el Nombre divino como «Yahvé» de forma consistente con el proyecto.
  - «Respondió a una sola voz» reproduce el hebreo קוֹל אֶחָד sin sobreexplicar la unanimidad.
  - La cláusula final usa «las haremos» para retener el valor concreto de עשה y el referente contextual de las palabras/mandatos hablados.
