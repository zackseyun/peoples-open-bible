  to: Y fueron causa de amargura de espíritu para Isaac y Rebeca[a][b][c].
  rationale: Se ajusta la frase principal para un español más natural sin perder el valor nominal de מֹרַת ni el modismo «de espíritu». También se normaliza la puntuación de las notas y se mejora la claridad de la nota explicativa.
