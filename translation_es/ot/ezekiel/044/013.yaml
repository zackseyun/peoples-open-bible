translation:
  language: es
  text: No se acercarán a mí para servir como sacerdotes para mí[a], ni para acercarse a ninguna de mis cosas sagradas, las cosas santísimas; sino que cargarán con su vergüenza y con las abominaciones que han cometido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al Lugar Santísimo». La frase hebrea puede referirse tanto a las cosas más santas como al lugar santísimo interior; aquí el contexto favorece la primera lectura.
    reason: alternative_reading
lexical_decisions:
- source_word: יִגְּשׁוּ אֵלַי
  english_pob_choice: come near to me
  chosen_spanish: se acercarán a mí
  alternatives_spanish:
  - se aproximarán a mí
  - vendrán cerca de mí
  lexicon: HALOT
  rationale: נגשׁ en contextos sacerdotales expresa acercarse a la presencia sagrada. «Se acercarán a mí» conserva la proximidad cultual y suena natural en español.
- source_word: לְכַהֵן לִי
  english_pob_choice: to serve as priests for me
  chosen_spanish: para ejercer el sacerdocio para mí
  alternatives_spanish:
  - para ministrar como sacerdotes para mí
  - para servir como sacerdotes para mí
  lexicon: HALOT
  rationale: כּהן como verbo denominal expresa desempeñar funciones sacerdotales. «Ejercer el sacerdocio» mantiene la función oficial sin perder claridad en español.
- source_word: וְלָגֶשֶׁת
  english_pob_choice: nor to come near
  chosen_spanish: ni se acercarán
  alternatives_spanish:
  - ni se aproximarán
  - ni vendrán cerca
  lexicon: HALOT
  rationale: La repetición del verbo נגשׁ refuerza la prohibición. Repetir «se acercarán» conserva ese paralelismo y la fuerza legal del texto.
- source_word: עַל כָּל קָדָשַׁי
  english_pob_choice: any of my holy things
  chosen_spanish: a ninguna de mis cosas santas
  alternatives_spanish:
  - a ninguno de mis objetos santos
  - a nada de mis cosas santas
  lexicon: HALOT
  rationale: La expresión plural sustantivada se refiere a bienes u ઓફrendas consagradas. «Cosas santas» comunica el referente colectivo sin imponer una especificación no exigida por el hebreo.
- source_word: אֶל קָדְשֵׁי הַקְּדָשִׁים
  english_pob_choice: the most holy things
  chosen_spanish: a las cosas santísimas
  alternatives_spanish:
  - al Lugar Santísimo
  - a lo santísimo
  lexicon: HALOT
  rationale: En este contexto inmediato la frase sigue a «mis cosas santas», por lo que es más probable un superlativo de cosas consagradas que una referencia espacial. «Cosas santísimas» preserva esa lectura y mantiene abierta la tensión textual.
- source_word: וְנָשְׂאוּ
  english_pob_choice: they shall bear
  chosen_spanish: llevarán
  alternatives_spanish:
  - soportarán
  - cargarán con
  lexicon: HALOT
  rationale: נשא con vergüenza y culpa puede indicar cargar o soportar su peso. «Llevarán» es breve y natural, y deja intacta la idea de cargar la consecuencia.
- source_word: כְּלִמָּתָם
  english_pob_choice: their shame
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su deshonra
  - su oprobio
  lexicon: HALOT
  rationale: כלמה denota vergüenza/deshonra. «Vergüenza» es la equivalencia más directa y comprensible en español contemporáneo.
- source_word: וְתוֹעֲבוֹתָם
  english_pob_choice: their abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - sus actos abominables
  - sus cosas detestables
  lexicon: HALOT
  rationale: תוֹעֵבָה es un término moral fuerte que conviene preservar. «Abominaciones» mantiene la severidad profética que la POB inglesa también retuvo.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that they have committed
  chosen_spanish: que han cometido
  alternatives_spanish:
  - que hicieron
  - que han hecho
  lexicon: HALOT
  rationale: El relativo finaliza la acusación sobre actos previos con efecto presente. «Han cometido» suena formal y conserva la carga moral del hebreo y del inglés auditado.
theological_decisions:
- issue: Sentido de קָדְשֵׁי הַקְּדָשִׁים
  english_pob_reading: 'object reference: ''the most holy things'''
  chosen_spanish_reading: 'referencia objetiva: «las cosas santísimas»'
  alternative_spanish_readings:
  - 'referencia espacial: «el Lugar Santísimo»'
  - «lo santísimo»
  rationale: El contexto inmediato habla de acceso a cosas santas, no de entrada a una sala del templo. Por eso se preserva la lectura de superlativo de santidad sin resolver la ambigüedad arquitectónica más allá de lo que el texto exige.
  doctrine_reference: Preservar la tensión textual y cultual sin sobreespecificar.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una repetición incómoda de 'to' y aclaró el cierre con 'have committed'. En español, se evitó una repetición equivalente y se prefirió «que han cometido» para mantener naturalidad formal sin perder la acusación ni la relación con las abominaciones.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito solo donde aparece en el hebreo; en este versículo no figura el tetragrámaton.
  - Se evitó «SEÑOR» como sustituto, siguiendo la pauta del proyecto de no enmascarar el nombre divino cuando no corresponde.
  - «Cosas santas / cosas santísimas» conserva la distinción entre lo consagrado en general y el superlativo de santidad.
  - «Ejercer el sacerdocio» preserva la función sacerdotal sin colapsarla en un mero «servir».
