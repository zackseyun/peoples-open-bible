  text: Blessed is the man who lives with an intelligent wife[a], and who has not slipped with his tongue[c][b], and who has not served one unworthy of him.
  footnotes:
  - marker: a
    text: Or 'a prudent wife' or 'a sensible wife'; the Greek describes a wife marked by practical understanding.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has not slipped with the tongue,' an idiom for not stumbling in speech.
    reason: lexical_alternative
  - marker: c
    text: Or 'has not been enslaved to one unworthy of him'; the Greek verb can carry the sense of servitude, but here 'served' is used as the less overdetermined English rendering.
    reason: alternative_reading
