- from: 'Por tanto, oigan el consejo de Yahvé que ha planeado contra Edom[a], y sus pensamientos que ha ideado contra los habitantes de Temán: ciertamente los más pequeños del rebaño los arrastrarán[b]; ciertamente hará desolado su pastizal sobre ellos.'
  to: 'Por tanto, oigan el consejo de Yahvé que ha planeado contra Edom[a], y sus pensamientos que ha ideado contra los habitantes de Temán: ciertamente los más pequeños del rebaño los arrastrarán[b]; ciertamente dejará desolado su pastizal[c] sobre ellos.'
  rationale: Se mantiene casi todo el borrador por su fidelidad al hebreo y al rastro léxico del POB, pero se corrige la última cláusula para lograr un español natural sin perder el valor resultativo de יַשִּׁים ni la literalidad relativa de עֲלֵיהֶם. Además, se añade la nota faltante sobre נְוֵהֶם para preservar la documentación léxica del audit trail.
