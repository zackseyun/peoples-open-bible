translation:
  language: es
  text: Tú[a], padre, confirmaste nuestra manera de vivir conforme a la ley por medio de tu perseverancia para gloria, y, honrando la santidad, no la anulaste, y por tus obras verificaste las palabras[b] de la filosofía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para gloria». La expresión εἰς δόξαν puede indicar resultado o finalidad.
    reason: lexical_alternative
  - marker: b
    text: O «las enseñanzas» o «los principios» de la filosofía. El griego λόγοι puede significar «palabras», «argumentos» o «enseñanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - nuestro padre
  lexicon: LSJ
  rationale: El vocativo griego es singular y no lleva posesivo. En español, «padre» conserva la apelación directa sin añadir un posesivo no presente en el texto.
- source_word: εὐνομίαν
  english_pob_choice: law-abiding way
  chosen_spanish: norma de buena ley
  alternatives_spanish:
  - camino conforme a la ley
  - legalidad
  - observancia de la ley
  lexicon: LSJ
  rationale: El término apunta a un orden de vida ajustado a la buena ley, no solo a legalidad abstracta. «Norma de buena ley» intenta conservar la idea de un modo de vida regulado por la ley sin sonar demasiado técnico o jurídico.
- source_word: διὰ τῶν ὑπομονῶν
  english_pob_choice: through your endurance
  chosen_spanish: por medio de tu perseverancia
  alternatives_spanish:
  - a través de tu constancia
  - por tu perseverancia
  - mediante tu resistencia
  lexicon: BDAG/LSJ
  rationale: διά con genitivo expresa medio o instrumento. «Perseverancia» comunica el sentido de soportar con firmeza; el singular español evita la forma plural inglesa y sigue el ajuste revisado del audit trail, que ve aquí una referencia singular al padre.
- source_word: εἰς δόξαν
  english_pob_choice: unto glory
  chosen_spanish: hasta la gloria
  alternatives_spanish:
  - para gloria
  - hacia la gloria
  - en gloria
  lexicon: LSJ
  rationale: Se conserva el movimiento telico/resultativo de εἰς. «Hasta la gloria» es una solución española natural que mantiene la dirección hacia la honra/gloria.
- source_word: ἐκύρωσας
  english_pob_choice: confirmed
  chosen_spanish: confirmaste
  alternatives_spanish:
  - ratificaste
  - estableciste
  - validaste
  lexicon: LSJ
  rationale: El verbo expresa hacer válido o autoritativo algo. «Confirmaste» corresponde bien al hecho de que la perseverancia del padre da firmeza a la norma vivida.
- source_word: ἁγιαστίαν
  english_pob_choice: holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - la santificación
  - la santidad sagrada
  - la consagración
  lexicon: LSJ
  rationale: El sustantivo nombra santidad/sanctidad. En español, «santidad» es la equivalencia más natural y fiel al valor moral-religioso del término.
- source_word: σεμνολογήσας
  english_pob_choice: honoring holiness
  chosen_spanish: honrando la santidad
  alternatives_spanish:
  - hablando reverentemente de la santidad
  - alabando con dignidad la santidad
  - ensalzando la santidad
  lexicon: LSJ
  rationale: El participio tiene un matiz de hablar o tratar con dignidad/reverencia. Dado el ajuste del audit trail, «honrando la santidad» suena más natural en español y conserva el gesto reverente sin sobreinterpretarlo como mera alabanza verbal.
- source_word: οὐ κατέλυσας
  english_pob_choice: you did not abolish it
  chosen_spanish: no la anulaste
  alternatives_spanish:
  - no la aboliste
  - no la derribaste
  - no la invalidaste
  lexicon: BDAG/LSJ
  rationale: En contexto, la santidad no fue desmontada ni contradicha por la conducta. «Anular» comunica bien la idea de invalidar o deshacer algo por la propia acción, sin perder fluidez en español.
- source_word: ἐπιστοποίησας
  english_pob_choice: you verified
  chosen_spanish: verificaste
  alternatives_spanish:
  - atestiguaste
  - autenticaste
  - comprobaste
  lexicon: LSJ
  rationale: El verbo expresa confirmar por evidencia. «Verificaste» sigue de cerca el inglés revisado y comunica con claridad la fuerza probatoria de las obras.
- source_word: τοὺς τῆς φιλοσοφίας λόγους
  english_pob_choice: the words of philosophy
  chosen_spanish: las palabras de la filosofía
  alternatives_spanish:
  - las enseñanzas de la filosofía
  - los principios de la filosofía
  - las afirmaciones de la filosofía
  lexicon: LSJ
  rationale: λόγοι puede significar palabras, enseñanzas o argumentos. Se conserva «palabras de la filosofía» para mantener la literalidad del giro y el vocabulario filosófico helenístico del libro.
theological_decisions:
- issue: Valor de φιλοσοφία en 4 Macabeos
  english_pob_reading: philosophy
  chosen_spanish_reading: filosofía
  alternative_spanish_readings:
  - sabiduría
  - enseñanza racional
  - sabiduría reflexiva
  rationale: El libro usa conscientemente vocabulario filosófico helenístico. «Filosofía» preserva ese marco conceptual en lugar de reemplazarlo por un término más general como «sabiduría».
  doctrine_reference: Principio de primacía del texto original y conservación del registro conceptual del autor.
- issue: Relación entre la perseverancia y la gloria
  english_pob_reading: through your endurance unto glory
  chosen_spanish_reading: por medio de tu perseverancia hasta la gloria
  alternative_spanish_readings:
  - por tu perseverancia para gloria
  - mediante tu perseverancia para la gloria
  rationale: 'La frase griega permite un valor de medio y un valor final. En español conviene mantener ambos: el medio («por medio de») y la dirección final («hasta la gloria»).'
  doctrine_reference: Cautela hermenéutica ante εἰς δόξαν; preservar la tensión entre resultado y propósito.
- issue: Sentido de ἁγιαστίαν σεμνολογήσας
  english_pob_reading: honoring holiness
  chosen_spanish_reading: honrando la santidad
  alternative_spanish_readings:
  - hablando reverentemente de la santidad
  - alabando la santidad con dignidad
  rationale: La expresión griega no obliga a limitarse a habla verbal; puede incluir el trato reverente o la exaltación digna de la santidad. «Honrando» mantiene la amplitud de sentido sin perder naturalidad en español.
  doctrine_reference: Respeto a la amplitud semántica del participio sin reducirlo indebidamente a una sola modalidad de acción.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del contexto inglés: se entendió que el vocativo se dirige al padre en singular, que la expresión sobre la santidad funciona mejor en inglés como «honoring holiness», y que el verbo final pide un matiz de verificación. La versión española sigue esas decisiones y conserva la tensión semántica de εἰς δόξαν y λόγοι.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «filosofía» de manera consistente con el mundo conceptual de 4 Macabeos.
  - Se evita introducir posesivos no presentes en el vocativo griego.
  - Se mantiene un registro formal, bíblico y publicable, sin calcos innecesarios.
