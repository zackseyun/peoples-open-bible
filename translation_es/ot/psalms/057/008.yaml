revisions:
- from: Mi corazón está firme[a], oh Dios; mi corazón está firme. Cantaré, sí[b], entonaré melodía.
  to: Mi corazón está firme[a], oh Dios; mi corazón está firme. Cantaré, sí[b], cantaré alabanzas.
  rationale: Se mantiene «firme» para נָכוֹן y la repetición enfática del paralelismo hebreo. Se conserva el vocativo «oh Dios». Se revisa únicamente la segunda acción para reemplazar la expresión poco idiomática «entonaré melodía» por «cantaré alabanzas», que en español comunica con mayor naturalidad el valor de זמר en contexto de alabanza. La nota preserva la alternativa más literal «haré melodía».
