revisions:
- from: Desde la púrpura y el mármol que se pudren sobre ellos se conocerá que no son dioses; y al final ellos mismos serán comidos[a], y serán un oprobio en la tierra.
  to: Por la púrpura y el mármol que se deterioran sobre ellos se conocerá que no son dioses; y al final ellos mismos serán comidos[a], y serán un oprobio en la tierra.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad y la precisión semántica del español sin apartarse del griego ni del audit trail inglés: «Por» expresa mejor la idea de evidencia, y «se deterioran» evita la aspereza de «mármol que se pudre» mientras mantiene la imagen de decadencia que prueba la falsedad de los ídolos.'
