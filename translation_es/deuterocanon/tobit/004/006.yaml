translation:
  language: es
  text: Porque si practicas la verdad, tus obras[a] prosperarán, y también todos los que practican la rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tus hechos». El griego ἔργα puede referirse a obras, acciones o hechos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la justicia». Gr. δικαιοσύνη puede significar rectitud o justicia según el contexto; aquí resalta la conducta ética recta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιοῦντός σου
  english_pob_choice: if you practice
  chosen_spanish: si practicas
  alternatives_spanish:
  - cuando practiques
  - si haces
  lexicon: BDAG
  rationale: El genitivo absoluto con διότι tiene un valor comprimido; el español natural y fiel en un contexto exhortativo es una condición directa. 'Practicas' conserva la idea de conducta continua, no de un acto aislado.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la veracidad
  - la fidelidad
  - lo verdadero
  lexicon: BDAG
  rationale: '''Verdad'' mantiene la cercanía al griego y en Tobit puede abarcar honestidad, integridad y conducta fiel. ''Veracidad'' sería más estrecho y ''fidelidad'' desplaza demasiado el matiz.'
- source_word: εὐοδίαιι ἔσονται
  english_pob_choice: will prosper
  chosen_spanish: prosperarán
  alternatives_spanish:
  - les irá bien
  - serán exitosas
  - tendrán buen éxito
  lexicon: LSJ
  rationale: El griego expresa resultado favorable o éxito en las empresas; 'prosperarán' comunica bien ese sentido sin limitarlo a prosperidad material. Se conserva el tono sapiencial de la frase.
- source_word: ἐν τοῖς ἔργοις σου
  english_pob_choice: in your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tus acciones
  - en tus obras
  lexicon: BDAG
  rationale: 'La revisión inglesa señaló que la frase griega debe sonar natural y no forzar un calco de ''en tus obras''. En español, el sentido se expresa mejor como sujeto resultativo: ''tus obras prosperarán'', manteniendo ἔργα como actos/obras.'
- source_word: πᾶσι τοῖς ποιοῦσι
  english_pob_choice: all who practice
  chosen_spanish: todos los que practican
  alternatives_spanish:
  - todos los que hacen
  - todos los que obran
  - quienes practican
  lexicon: BDAG
  rationale: El participio describe a personas caracterizadas por una conducta habitual. 'Los que practican' reproduce ese valor mejor que un simple presente puntual.
- source_word: τὴν δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  - la justicia y rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió 'righteousness', en español 'justicia' conserva mejor la amplitud semántica de δικαιοσύνη, que puede incluir rectitud moral y conducta conforme a lo debido. Aquí el paralelismo sapiencial favorece 'justicia' como alternativa plenamente válida.
theological_decisions:
- issue: Renderización de δικαιοσύνη en un contexto sapiencial y ético
  english_pob_reading: righteousness, with justice preserved as an alternative
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  - la justicia recta
  rationale: 'No se debe borrar la tensión semántica: δικαιοσύνη puede denotar tanto justicia como rectitud. En español, ''justicia'' es la opción más amplia y natural para este pasaje, mientras que ''rectitud'' sería una glosa interpretativa más estrecha. Se preserva la alternativa en nota.'
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Sentido de εὐοδίαι ἔσονται como éxito favorable de las obras
  english_pob_reading: your works will prosper
  chosen_spanish_reading: tus obras prosperarán
  alternative_spanish_readings:
  - les irá bien a tus obras
  - tus acciones tendrán buen éxito
  rationale: La frase griega es comprimida y no debe traducirse de forma mecánica. La forma castellana elegida expresa el resultado favorable de la conducta sin añadir prosperidad material ni perder el vínculo entre verdad practicada y resultado bueno.
  doctrine_reference: POB revision awareness on εὐοδίαι ἔσονται
- issue: Relación entre verdad practicada y justicia practicada
  english_pob_reading: practice the truth ... all who practice righteousness
  chosen_spanish_reading: practicas la verdad ... practican la justicia
  alternative_spanish_readings:
  - haces la verdad ... hacen la justicia
  - practicas la fidelidad ... practican la rectitud
  rationale: El paralelismo del versículo contrapone dos modos de conducta ética. 'Verdad' y 'justicia' son equivalentes lo bastante amplios para sostener el paralelismo sin convertirlo en una paráfrasis doctrinal.
  doctrine_reference: Tobit wisdom ethics / no special doctrine beyond lexical force
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés POB: evita un calco como ''en tus obras'' y expresa εὐοδίαι ἔσονται de forma natural como resultado favorable de la conducta. También conserva la alternativa semántica de δικαιοσύνη sin borrar la tensión entre ''justicia'' y ''rectitud''.'
  spanish_consistency_notes:
  - Se usa 'verdad' para τὴν ἀλήθειαν, en línea con el valor ético de conducta veraz/fiel.
  - Se usa 'justicia' para δικαιοσύνη como opción amplia y natural en español, con nota de 'rectitud' como alternativa.
  - '''Prosperarán'' se emplea en sentido de éxito favorable, no necesariamente riqueza material.'
  - 'El orden del verso mantiene el paralelismo del griego: práctica de la verdad -> resultado favorable -> práctica de la justicia.'
