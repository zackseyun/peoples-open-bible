base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/005/020.yaml
  text: Having a cruelty worse than Phalaris[a], he said that they should be grateful for today's respite in sleep; but, having been kept alive until the approaching day[c][b], prepare the elephants in the same way for the destruction of the lawless Jews.
  footnotes:
  - marker: a
    text: Phalaris was remembered in Greek tradition as a notoriously cruel ruler; the comparison intensifies the king's brutality.
    reason: cultural_note
  - marker: b
    text: Or 'that they should count today's sleep as a favor.' The Greek idiom means they were to regard being allowed to sleep today as something for which they owed thanks.
    reason: lexical_alternative
  - marker: c
    text: '''Lawless'' renders a hostile epithet in the speaker''s words; alternatively, ''unlawful'' or ''impious.'''
    reason: alternative_reading
