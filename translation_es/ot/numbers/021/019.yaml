translation:
  language: es
  text: Y de Mattanah a Nahaliel, y de Nahaliel a Bamoth[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo Bamoth también puede significar «alturas» o «lugares altos», pero aquí es mejor entenderlo como el nombre de una localidad en el itinerario de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּתָּנָה
  english_pob_choice: and from Mattanah
  chosen_spanish: y de Matana
  alternatives_spanish:
  - y desde Matana
  lexicon: HALOT
  rationale: El hebreo lleva la conjunción וּ y la preposición מִן; en español la secuencia natural y fiel es «y de». El nombre propio מַתָּנָה se translitera como Matana, manteniendo el valor de lugar del itinerario.
- source_word: נַחֲלִיאֵל
  english_pob_choice: to Nahaliel
  chosen_spanish: Nahaliel
  alternatives_spanish:
  - a Nahaliel
  lexicon: HALOT
  rationale: El hebreo no escribe una preposición antes del segundo topónimo, pero el contexto de itinerario la sugiere. En español puede mantenerse la coordinación elíptica sin forzar un «a» explícito, conservando la concisión del original.
- source_word: וּ/מִ/נַּחֲלִיאֵל
  english_pob_choice: and from Nahaliel
  chosen_spanish: y de Nahaliel
  alternatives_spanish:
  - y desde Nahaliel
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo con «y de», reflejando tanto la conjunción como la preposición de origen en el cambio de estación.
- source_word: בָּמֽוֹת
  english_pob_choice: Bamoth
  chosen_spanish: Bamot
  alternatives_spanish:
  - las alturas
  - los lugares altos
  lexicon: HALOT
  rationale: En este contexto la forma funciona como nombre propio de lugar, por lo que se translitera como Bamot. Se preserva la alternativa semántica «alturas» en nota, pero no en el texto principal, para no perder la lectura toponímica del itinerario.
translation_notes:
  revision_awareness: El texto inglés POB y el expediente léxico mantienen una lectura toponímica de los tres nombres de lugar, con una nota explícita solo en במות/Bamoth por su posible sentido común «heights/high places». No hay revisiones aplicadas ni discrepancias de fondo en el pasaje.
  spanish_consistency_notes:
  - 'Se mantuvo la transliteración de los topónimos con ortografía española sencilla y consistente: Matana, Nahaliel y Bamot.'
  - Se usó «y de» para reproducir el valor de origen de מִן sin recargar el español.
  - La nota se ancla solo en Bamot, porque es el único término con ambigüedad léxica relevante documentada en el expediente.
