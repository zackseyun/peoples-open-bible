translation:
  language: es
  text: Pero cuando se cansaron de golpearlo con azotes, sin conseguir nada, lo subieron a la rueda de tortura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sobre la rueda»; el griego ἐπί con acusativo puede enfatizar el movimiento hacia el instrumento. La «rueda» es un instrumento de tortura, no la rueda ordinaria de un carro.
    reason: lexical_alternative_and_cultural_note
lexical_decisions:
- source_word: τύπτοντες
  english_pob_choice: striking him
  chosen_spanish: golpearlo
  alternatives_spanish:
  - golpeándolo
  - pegándole
  lexicon: LSJ
  rationale: El participio expresa golpes repetidos. En español, "golpearlo" comunica la acción física continua con naturalidad y sin introducir una intensidad no explicitada por el griego.
- source_word: ταῖς μάστιξιν
  english_pob_choice: with whips
  chosen_spanish: con azotes
  alternatives_spanish:
  - con látigos
  - con flagelos
  lexicon: LSJ
  rationale: μάστιξ puede referir al instrumento de flagelación y también al acto mismo. En español, "azotes" conserva el valor de castigo corporal y evita una imagen demasiado moderna de simple herramienta.
- source_word: ἐκοπίασαν
  english_pob_choice: grew weary
  chosen_spanish: se cansaron
  alternatives_spanish:
  - quedaron exhaustos
  - se agotaron
  lexicon: BDAG
  rationale: El verbo indica cansancio por esfuerzo. "Se cansaron" es natural y fiel; no añade más de lo que el contexto exige.
- source_word: μηδὲν ἀνύοντες
  english_pob_choice: accomplishing nothing
  chosen_spanish: sin conseguir nada
  alternatives_spanish:
  - sin lograr nada
  - sin obtener resultado
  lexicon: LSJ
  rationale: La frase expresa falta total de resultado. "Sin conseguir nada" es idiomático y conserva la fuerza negativa del griego.
- source_word: ἀνέβαλον
  english_pob_choice: they put
  chosen_spanish: lo subieron
  alternatives_spanish:
  - lo colocaron
  - lo montaron
  lexicon: LSJ
  rationale: El verbo con ἐπί seguido del acusativo sugiere movimiento hacia arriba y sobre el instrumento. "Lo subieron" refleja ese desplazamiento mejor que un simple "lo pusieron".
- source_word: ἐπὶ τὸν τροχόν
  english_pob_choice: on the wheel
  chosen_spanish: al rueda de tortura
  alternatives_spanish:
  - sobre la rueda
  - en la rueda de tortura
  lexicon: LSJ
  rationale: τροχός aquí es un instrumento de tortura, no una rueda común. En español, "rueda de tortura" hace explícita esa función; se usa la preposición contracta "al" por el movimiento hacia el instrumento.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado auditado indica que la versión inglesa quedó sin cambios y con acuerdo alto, por lo que la redacción española sigue de cerca el griego y el análisis léxico aportado.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y directo.
  - Se preservó la referencia concreta al instrumento de tortura mediante "rueda de tortura".
  - 'Se evitó la paráfrasis expansiva y se reflejó la secuencia griega: cansancio, fracaso, traslado al instrumento.'
