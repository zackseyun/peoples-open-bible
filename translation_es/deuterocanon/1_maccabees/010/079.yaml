translation:
  language: es
  text: Y Apolonio dejó secretamente[a] mil jinetes detrás de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en secreto detrás de ellos». El adverbio griego κρυπτῶς puede entenderse de modo adverbial («secretamente») más que con un sentido participial de «ocultos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλειπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - retuvo aparte
  - dejó en reserva
  lexicon: LSJ
  rationale: El imperfecto describe una acción de dejar un destacamento separado del cuerpo principal. «Dejó» comunica bien la acción en español sin añadir una interpretación excesiva del aspecto.
- source_word: χιλίαν
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - un millar de
  - mil hombres
  lexicon: LSJ
  rationale: Es un cardinal simple; «mil» es natural en español y conserva la cantidad sin redundancia.
- source_word: ἵππον
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - de a caballo
  lexicon: LSJ
  rationale: Aunque el singular griego puede funcionar colectivamente en contexto militar, en español «jinetes» expresa con claridad tropas montadas y conserva la imagen de fuerzas de caballería.
- source_word: κρυπτῶς
  english_pob_choice: hidden / secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - en secreto
  - ocultamente
  lexicon: LSJ
  rationale: El adverbio modifica mejor a «dejó» que a «jinetes»; por eso se vierte adverbialmente como en la revisión inglesa final. «Secretamente» mantiene el sentido de ocultamiento militar sin forzar una lectura participial.
- source_word: κατόπισθεν αὐτῶν
  english_pob_choice: behind them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - a sus espaldas
  - a retaguardia de ellos
  lexicon: LSJ
  rationale: La frase marca posición en la retaguardia del grupo al que siguen; «detrás de ellos» es la equivalencia más directa y transparente.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: κρυπτῶς se toma como adverbio que modifica a «dejó», y no se añade un equivalente de «ocultos» que sobrecargue la frase. También se mantiene la imagen militar simple de «detrás de ellos».'
  spanish_consistency_notes:
  - Se usa «Apolonio» como forma española habitual del nombre propio.
  - Se prefiere «jinetes» frente a «caballería» para reflejar con más cercanía el valor colectivo de ἵππον en este contexto militar.
  - Se evita introducir vocabulario eclesiástico o teológico no presente en el versículo.
