  yaml_path: translation/ot/exodus/007/019.yaml
  text: Then Yahweh said to Moses[a], “Say to Aaron, ‘Take your staff and stretch out your hand over the waters of Egypt—over their rivers, over their canals, over their ponds, and over every pool of their waters—that they may become blood. And there will be blood throughout all the land of Egypt[b], even in wooden and stone vessels.’”
