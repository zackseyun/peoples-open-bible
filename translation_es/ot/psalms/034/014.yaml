translation:
  language: es
  text: Guarda tu lengua del mal[a], y tus labios de hablar con engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mantén tu lengua del mal, y tus labios de hablar con astucia engañosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְצֹר
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Cuida
  - Vela
  - Resguarda
  lexicon: HALOT
  rationale: El imperativo pide vigilancia activa sobre el habla. «Guarda» conserva la idea de custodiar y controlar, y suena natural en español bíblico contemporáneo sin perder la fuerza exhortativa.
- source_word: לְשׁוֹנְךָ
  english_pob_choice: your tongue
  chosen_spanish: tu lengua
  alternatives_spanish:
  - tu habla
  - tu boca
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal de la lengua, paralela a los labios en la segunda cola. «Lengua» es el equivalente más directo y idiomático en español.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - del mal moral
  - de la maldad
  lexicon: HALOT
  rationale: En este contexto ético, רָע expresa maldad o mal moral. «Del mal» preserva la fuerza moral del término y su brevedad poética.
- source_word: וּשְׂפָתֶיךָ
  english_pob_choice: and your lips
  chosen_spanish: y tus labios
  alternatives_spanish:
  - y tu boca
  - y tu habla
  lexicon: HALOT
  rationale: «Labios» reproduce la concreción del paralelismo hebreo con «lengua». Se evita generalizar a «habla» para no perder la imagen poética.
- source_word: מִדַּבֵּר
  english_pob_choice: from speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - de decir
  - de pronunciar
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición se vierte de forma natural como «de hablar», manteniendo el paralelismo sintáctico con «del mal».
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - mentira
  - decepción
  - fraude
  lexicon: HALOT
  rationale: מִרְמָה puede significar engaño, fraude o astucia engañosa. «Engaño» es claro en español y no se inclina innecesariamente hacia un matiz más técnico o arcaico.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en una exhortación paralela y concreta: lengua/labios, mal/engaño. No se requieren ajustes textuales; la versión española conserva el paralelismo y la fuerza moral del original.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo corporal «lengua / labios» para reflejar la poética hebrea.
  - «Del mal» y «engaño» conservan el tono moral del verso sin añadir explicaciones interpretativas.
  - Se evita «SEÑOR» u otras sustituciones porque no aparece el Tetragrámaton en este versículo.
