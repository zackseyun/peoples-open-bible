translation:
  language: es
  text: Si un hombre vende una casa en una ciudad amurallada, su redención podrá efectuarse hasta el cumplimiento de un año completo desde su venta; su derecho de redención durará un año completo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘por días’; en este modismo legal, la expresión denota la duración de un año completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: If a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y si un hombre
  - Si alguien
  lexicon: HALOT
  rationale: En este caso jurídico, אִישׁ mantiene un sujeto singular masculino representativo. ‘Si un hombre’ conserva la forma casuística y la fuerza jurídica del hebreo sin volverla impersonal en exceso.
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Aquí כִּי introduce una cláusula de caso legal; ‘si’ es la equivalencia natural en español.
- source_word: יִמְכֹּר
  english_pob_choice: sells
  chosen_spanish: vende
  alternatives_spanish:
  - vendiere
  - si vende
  lexicon: HALOT
  rationale: El imperfecto hebreo en este estilo legal se expresa naturalmente en presente español dentro de la condición.
- source_word: בֵּית מוֹשַׁב
  english_pob_choice: a house in a walled city
  chosen_spanish: una casa
  alternatives_spanish:
  - una casa de habitación
  - una casa para morar
  lexicon: HALOT
  rationale: El audit trail inglés simplifica la frase sin perder el valor de vivienda; en español, ‘casa’ ya comunica el objeto de la venta. El matiz de residencia queda reforzado por el contexto inmediato y no exige una perífrasis forzada.
- source_word: עִיר חוֹמָה
  english_pob_choice: a walled city
  chosen_spanish: en una ciudad amurallada
  alternatives_spanish:
  - en una ciudad fortificada
  - en una ciudad con muralla
  lexicon: HALOT
  rationale: ‘Ciudad amurallada’ es el equivalente claro y estándar de la expresión hebrea, manteniendo la imagen de una ciudad caracterizada por su muralla.
- source_word: וְהָיְתָה גְּאֻלָּתוֹ
  english_pob_choice: its redemption may take place
  chosen_spanish: su redención podrá efectuarse
  alternatives_spanish:
  - podrá redimirse
  - su rescate podrá hacerse
  lexicon: HALOT
  rationale: En este contexto jurídico, גְּאֻלָּה denota la posibilidad o derecho de ser rescatado/redimido. ‘Podrá efectuarse’ conserva el valor de posibilidad legal sin convertirlo en una abstracción impersonal.
- source_word: עַד תֹּם שְׁנַת מִמְכָּרוֹ
  english_pob_choice: until the completion of a full year from its sale
  chosen_spanish: hasta el cumplimiento de un año completo desde su venta
  alternatives_spanish:
  - hasta el término del año de su venta
  - hasta completar un año desde su venta
  lexicon: HALOT
  rationale: La frase hebrea marca el límite temporal del derecho de redención. ‘Cumplimiento de un año completo’ preserva la idea de período íntegro desde la venta, no solo el cierre de un año calendario.
- source_word: יָמִים
  english_pob_choice: a full year
  chosen_spanish: un año completo
  alternatives_spanish:
  - por días
  - por un año
  lexicon: HALOT
  rationale: La expresión idiomática hebrea ‘días’ funciona aquí como duración completa; en español se resuelve de forma natural como ‘un año completo’, siguiendo la decisión auditada en inglés.
- source_word: תִּהְיֶה גְאֻלָּתוֹ
  english_pob_choice: its right of redemption shall last
  chosen_spanish: su derecho de redención durará
  alternatives_spanish:
  - su redención permanecerá
  - seguirá teniendo derecho a redención
  lexicon: HALOT
  rationale: La cláusula final expresa duración jurídica. ‘Derecho de redención’ explicita el valor legal de גְּאֻלָּה y ‘durará’ conserva el aspecto temporal de la frase.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo base y el audit trail inglés más reciente, que simplifica la construcción de ‘a house for dwelling in a walled city’ a ‘a house in a walled city’ y aclara que ‘for days’ equivale a ‘a full year’. La versión española conserva esa simplificación natural sin perder el marco jurídico del texto.
  spanish_consistency_notes:
  - Se usa ‘redención’ para גְּאֻלָּה conforme al valor legal del pasaje y la terminología POB.
  - Se mantiene ‘ciudad amurallada’ para עִיר חוֹמָה, evitando un giro más interpretativo como ‘fortificada’ salvo que el contexto lo exija.
  - ‘Un año completo’ resuelve el modismo hebreo יָמִים de manera legible en español y queda documentado en nota.
  - 'La sintaxis reproduce el estilo casuístico: condición inicial, cláusula temporal y declaración final de duración.'
