translation:
  language: es
  text: veía la carne de sus hijos derritiéndose en el fuego, y los dedos de sus pies y de sus manos esparcidos[a] sobre la tierra, y la carne de sus cabezas hasta las partes alrededor de sus barbas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El participio que aquí se vierte como 'esparcidos' también puede entenderse con un matiz como 'temblando' o 'retorciéndose'. Como el pasaje dice además que los dedos estaban 'sobre la tierra', la traducción principal adopta la idea de que estaban diseminados allí.
    reason: lexical_alternative
  - marker: b
    text: El griego de este versículo termina de manera abrupta ('y la [carne] de sus cabezas hasta las partes alrededor de sus barbas'); la traducción permanece cerca del texto conservado en vez de reconstruirlo con más libertad.
    reason: textual_variant
lexical_decisions:
- source_word: σάρκας
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpos
  - tejido
  - carne física
  lexicon: BDAG
  rationale: En este contexto de tortura física, 'carne' conserva la concreción corporal del griego y del audit trail inglés, sin suavizar el horror ni desplazarlo a un término más abstracto.
- source_word: ἑώρα
  english_pob_choice: she saw
  chosen_spanish: veía
  alternatives_spanish:
  - vio
  - estaba viendo
  lexicon: LSJ
  rationale: El imperfecto sugiere percepción continua; 'veía' preserva mejor esa duratividad que un perfecto puntual, manteniéndose natural en español narrativo.
- source_word: τηκομένας
  english_pob_choice: melting
  chosen_spanish: derritiéndose
  alternatives_spanish:
  - fundiéndose
  - consumiéndose
  - deshaciéndose
  lexicon: LSJ
  rationale: '''Derritiéndose'' comunica la imagen térmica de disolución por el fuego y sigue de cerca la fuerza verbal del participio.'
- source_word: περὶ τὸ πῦρ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - alrededor del fuego
  - junto al fuego
  - por el fuego
  lexicon: LSJ
  rationale: Aunque la preposición literalmente puede sugerir cercanía, el contexto y la revisión inglesa indican que la frase se entiende aquí como ubicación dentro del fuego; 'en el fuego' es la opción más fiel y fluida.
- source_word: δακτύλους
  english_pob_choice: fingers
  chosen_spanish: dedos
  alternatives_spanish:
  - digitos
  - dedos de las manos
  - dedos de los pies
  lexicon: BDAG
  rationale: '''Dedos'' permite abarcar la referencia griega amplia, que con la especificación siguiente incluye manos y pies, sin forzar una distinción que el texto no hace de manera explícita.'
- source_word: τῶν ποδῶν καὶ χειρῶν
  english_pob_choice: of their feet and hands
  chosen_spanish: de sus pies y de sus manos
  alternatives_spanish:
  - de los pies y las manos
  - de sus manos y pies
  lexicon: LSJ
  rationale: Conserva la estructura del griego y evita reinterpretar el orden o dividir el sustantivo de modo no justificado por el texto.
- source_word: σπαίροντας
  english_pob_choice: scattered
  chosen_spanish: esparcidos
  alternatives_spanish:
  - temblando
  - retorciéndose
  - tirados
  lexicon: LSJ
  rationale: Dado que los dedos están 'sobre la tierra', 'esparcidos' sigue la lectura adoptada por el POB inglés de piezas diseminadas en el suelo, sin cerrar del todo la posible tensión léxica del participio.
- source_word: μέχρι τῶν περὶ τὰ γένεια
  english_pob_choice: down to the parts around their beards
  chosen_spanish: hasta las partes alrededor de sus barbas
  alternatives_spanish:
  - hasta las partes alrededor de sus barbas
  - hasta la zona de sus barbas
  - hasta lo que rodea sus barbas
  lexicon: LSJ
  rationale: La sintaxis griega es abrupta e incompleta; la traducción conserva esa aspereza sin reconstruirla libremente. 'Barbas' refleja el plural/ambigüedad del segmento en español sin introducir una armonización no atestiguada.
theological_decisions:
- issue: Syntactic abruptness / possible textual damage in the final clause
  english_pob_reading: The Greek text is syntactically abrupt at the end, and the translation stays close to the surviving wording rather than reconstructing it more freely.
  chosen_spanish_reading: El texto griego queda abrupto al final, y la versión española conserva esa incompletitud sin completar la frase más allá de lo atestiguado.
  alternative_spanish_readings:
  - reconstruir el final de manera más lisa
  - suavizar la frase final para hacerla completa
  rationale: El POB inglés opta por no resolver la posible corrupción o compresión textual. En español se mantiene la misma decisión para no borrar la tensión documental del pasaje.
