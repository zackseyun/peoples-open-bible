translation:
  language: es
  text: Has visto toda su venganza, todas sus intrigas[a] contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos sus planes acerca de mí». El hebreo puede rendirse de manera más neutra, pero el contexto hostil favorece «intrigas… contra mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתָה
  english_pob_choice: You have seen
  chosen_spanish: Tú has visto
  alternatives_spanish:
  - Tú viste
  - Has visto
  lexicon: HALOT
  rationale: El verbo qal perfecto de ראה expresa una acción completa dirigida a Dios; en español, el pretérito perfecto compuesto mantiene la relevancia presente del lamento. Se conserva el sujeto explícito «Tú» por el carácter directo del خطاب.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda / todos
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: Aparece dos veces y expresa totalidad. En español, «toda» concuerda con «venganza» y «todos» con «planes», preservando la repetición enfática del hebreo.
- source_word: נִקְמָתָם
  english_pob_choice: their vengeance
  chosen_spanish: su venganza
  alternatives_spanish:
  - su revancha
  - sus actos de venganza
  lexicon: HALOT
  rationale: נִקמה designa venganza/acto vengativo. «Venganza» conserva mejor la fuerza léxica y la solemnidad del término que «revancha». El sufijo plural se expresa naturalmente en español mediante «su», con referencia contextual a los enemigos.
- source_word: מַחְשְׁבֹתָם
  english_pob_choice: their schemes
  chosen_spanish: sus planes
  alternatives_spanish:
  - sus esquemas
  - sus pensamientos
  lexicon: HALOT
  rationale: מחשבות puede significar pensamientos, planes o designios. La POB inglesa optó por «schemes» para captar la intención hostil; en español, «planes» comunica la idea con naturalidad. «Esquemas» sonaría menos idiomático y «pensamientos» sería demasiado neutro.
- source_word: לִי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - acerca de mí
  - para mí
  lexicon: HALOT
  rationale: La preposición ל puede indicar relación o dirección. En este contexto de venganza y planes hostiles, «contra mí» expresa la hostilidad implícita de forma idiomática en español sin añadir contenido ajeno al hebreo.
translation_notes:
  revision_awareness: El texto inglés POB permanece estable y de acuerdo con la revisión más reciente; no se registran cambios aplicados. La redacción española sigue ese mismo trazado, manteniendo la tensión entre el valor neutro posible de מַחְשְׁבֹתָם y la lectura hostil exigida por el contexto.
  spanish_consistency_notes:
  - Se mantiene el tono de lamento y el destinatario directo en segunda persona.
  - Se evita el calco rígido donde el español pide naturalidad, pero sin suavizar la hostilidad del verso.
  - La nota conserva la alternativa semántica documentada para מַחְשְׁבֹתָם.
  - La puntuación y la concordancia siguen el uso estándar del español bíblico contemporáneo.
