review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: la alegría interrumpida, la irrupción de los hombres de la ciudad, el cerco de la casa, los golpes a la puerta y la demanda final con eufemismo sexual preservado. Sin embargo, hay desajustes importantes con la línea léxica auditada del POB: la nota [a] está anclada en el lugar equivocado, ya que explica ''hijos de Belial'' pero aparece tras ''corazón''; además, ''hombres hijos de Belial'' conserva una formulación tradicional pero no refleja la decisión inglesa principal ''worthless men'' y suena menos natural en español. También conviene mejorar ''ha entrado en tu casa'' a ''entró en tu casa'' para corresponder mejor al perfecto hebreo narrativo.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta cierta rigidez: ''se estaban alegrando el corazón'' es comprensible aunque algo calcado; ''he aquí que'' funciona; ''hombres hijos de Belial'' suena forzado; y la colocación de ''el anciano'' tras una aposición larga entorpece la lectura. Una revisión menor puede hacer el versículo más natural sin perder fuerza ni literalidad.'
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé/Mesías. En lo léxico, conviene alinearse mejor con la decisión POB de אַנְשֵׁי בְנֵי בְלִיַּעַל como 'hombres despreciables' o equivalente, dejando 'hijos de Belial' en nota como alternativa más literal. La preservación de 'lo conozcamos' con nota explicativa sí está bien alineada con la justificación teológica documentada.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el segmento equivocado.
    rationale: La nota explica 'hijos de Belial', pero el marcador aparece después de 'corazón'. Esto rompe la trazabilidad exigida entre texto y nota y puede confundir al lector.
  - severity: medium
    issue: '''hombres hijos de Belial'' no sigue la decisión léxica principal auditada y suena poco natural en español.'
    rationale: El inglés POB escogió 'worthless men' como texto principal y dejó la forma más literal para nota. En español, una opción como 'hombres despreciables' o 'hombres perversos' comunica mejor el modismo, mientras la alternativa literal puede mantenerse en nota.
  - severity: low
    issue: '''ha entrado en tu casa'' puede mejorarse a ''entró en tu casa''.'
    rationale: El hebreo בָּא en esta narración se vierte más naturalmente en pretérito simple en español. 'Ha entrado' no es incorrecto, pero suena menos narrativo en registro bíblico neutral latinoamericano.
  - severity: low
    issue: La secuencia 'al hombre, al dueño de la casa, el anciano' es algo pesada.
    rationale: Reordenar a 'al anciano, dueño de la casa' mejora la fluidez sin alterar el sentido.
  revised_spanish_text: 'Mientras ellos se estaban alegrando el corazón, he aquí que los hombres de la ciudad, hombres despreciables[a], rodearon la casa, golpeando la puerta. Y dijeron al anciano, dueño de la casa: «Saca al hombre que entró en tu casa, para que lo conozcamos[b]».'
  revised_footnotes:
