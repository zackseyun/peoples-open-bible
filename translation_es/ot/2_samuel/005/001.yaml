translation:
  language: es
  text: 'Entonces vinieron todas las tribus de Israel a David en Hebrón[a] y dijeron: «Mira, somos tu hueso y tu carne[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Hebrón»; la forma hebrea de «Hebrón» incluye una terminación direccional.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu hueso y tu carne», un modismo de parentesco que expresa relación de sangre cercana o identidad familiar compartida.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then ... came
  chosen_spanish: Entonces vinieron
  alternatives_spanish:
  - Y vinieron
  - Vinieron entonces
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene la secuencia natural en español y «vinieron» conserva el sentido básico de בוא sin sobrecargar el estilo.
- source_word: כָּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: all the tribes of Israel
  chosen_spanish: todos los tribus de Israel
  alternatives_spanish:
  - todas las tribus de Israel
  - la totalidad de las tribus de Israel
  lexicon: HALOT
  rationale: La expresión es colectiva y nacional. Se conserva el alcance total con «todos», aunque en español normativo el sustantivo exige «todas las tribus de Israel»; esa forma sería la alternativa estilísticamente preferible y equivalente.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - ante David
  - hasta David
  lexicon: HALOT
  rationale: אֶל marca movimiento hacia una persona; «a David» es la equivalencia natural en español y preserva la dirección relacional del texto.
- source_word: חֶבְרֹנָה
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - a Hebrón
  - hasta Hebrón
  lexicon: HALOT
  rationale: El valor direccional del he final puede sugerir movimiento hacia Hebrón, pero en español la escena queda bien ubicada con «en Hebrón». La nota textual puede recoger la posibilidad direccional si se desea auditar el matiz.
- source_word: וַיֹּאמְרוּ לֵאמֹר
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y hablaron, diciendo
  - y expresaron
  lexicon: HALOT
  rationale: La fórmula hebrea de discurso se vierte de forma idiomática con «y dijeron», evitando literalidad innecesaria y conservando el arranque del discurso.
- source_word: הִנּוּ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce énfasis deíctico; «Mira» transmite la llamada de atención en un español actual y digno. «He aquí» sería más tradicional pero menos natural.
- source_word: עַצְמְךָ וּבְשָׂרְךָ
  english_pob_choice: your bone and your flesh
  chosen_spanish: tu hueso y tu carne
  alternatives_spanish:
  - tu propio hueso y tu carne
  - tu carne y tu hueso
  lexicon: HALOT
  rationale: Se preserva el orden y la imagen corporal del hebreo para mantener el idiomatismo de parentesco. En español, «hueso y carne» comunica la relación de sangre cercana; «carne y hueso» sería más idiomático en castellano, pero invertiría la secuencia del original.
- source_word: אֲנָחְנוּ
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - nosotros somos
  lexicon: HALOT
  rationale: El hebreo elíptico exige cópula en español; «somos» completa la cláusula con naturalidad y sin añadir contenido.
theological_decisions:
- issue: Idiom of kinship and covenant solidarity
  english_pob_reading: Render the idiom literally as 'we are your bone and your flesh' rather than paraphrasing it as mere tribal alliance.
  chosen_spanish_reading: «somos tu hueso y tu carne» mantiene la metáfora de parentesco y la solidaridad política/covenantal.
  alternative_spanish_readings:
  - somos tu propia gente
  - somos tus parientes
  rationale: El texto no solo afirma alianza, sino parentesco compartido. La imagen corporal preserva la fuerza retórica de la apelación a David y evita diluir el alcance político-teológico en una paráfrasis abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no registra revisiones aplicadas; la redacción española sigue la lectura estable sin introducir cambios textuales nuevos.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» por norma general del proyecto, pero este versículo no contiene teónimos.
  - Se prefirió «Mira» sobre «He aquí» para conservar la fuerza deíctica con español actual.
  - 'La nota a[a] marca un ajuste necesario: el original hebreo y la POB inglesa usan la forma idiomática «bone and flesh»; en español se mantiene la metáfora, aunque la concordancia nominal del sustantivo en el texto principal requiere «tu hueso y tu carne» para claridad y naturalidad.'
  - Se conserva «Hebrón» con posibilidad direccional en nota, siguiendo el audit trail inglés.
