translation:
  language: es
  text: Toma plata y oro, haz coronas[a], y ponlas sobre la cabeza de Josué hijo de Jozadac, el sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «coronas» (plural). Algunos entienden esto como una sola corona compuesta y por eso traducen «corona».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - Toma
  - Y tomarás
  lexicon: HALOT
  rationale: La forma verbal hebrea es 2ms con waw consecutiva en instrucción profética; en español, el futuro con valor exhortativo mantiene bien el matiz mandativo sin sonar tan abrupto como un imperativo desnudo. 'Y tomarás' también es posible, pero 'Tomarás' fluye mejor en el registro bíblico actual.
- source_word: כֶסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - dinero y oro
  - metales preciosos
  lexicon: HALOT
  rationale: Los sustantivos hebreos designan literalmente los metales. 'Plata y oro' conserva con precisión la materia mencionada, sin generalizar a 'metales preciosos' ni convertirlo en 'dinero'.
- source_word: וְעָשִׂיתָ עֲטָרוֹת
  english_pob_choice: make crowns
  chosen_spanish: harás coronas
  alternatives_spanish:
  - harás una corona
  - fabricarás coronas
  lexicon: HALOT
  rationale: Se conserva el plural hebreo עֲטָרוֹת con 'coronas', como en el texto base inglés. 'Harás' reproduce bien la acción de confeccionar/realizar un objeto ceremonial; 'fabricarás' suena más técnico de lo que exige el pasaje.
- source_word: וְשַׂמְתָּ
  english_pob_choice: set
  chosen_spanish: las pondrás
  alternatives_spanish:
  - las colocarás
  - las pondrás sobre
  lexicon: HALOT
  rationale: El verbo indica colocar un objeto en una posición concreta. 'Las pondrás' es natural en español; la repetición de 'sobre' con el complemento siguiente mantiene la claridad ceremonial.
- source_word: בְּרֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - en la cabeza de
  - encima de la cabeza de
  lexicon: HALOT
  rationale: '''Sobre la cabeza de'' expresa adecuadamente la colocación física y conserva el tono narrativo-ritual del hebreo.'
- source_word: יְהוֹשֻׁעַ בֶּן יְהוֹצָדָק
  english_pob_choice: Joshua son of Jehozadak
  chosen_spanish: Josué hijo de Jozadac
  alternatives_spanish:
  - Jeshúa hijo de Jozadac
  - Josué hijo de Jehozadac
  lexicon: HALOT
  rationale: '''Josué'' es la forma estándar en español para יְהוֹשֻׁעַ. ''Jozadac'' sigue la transliteración usual en español bíblico para יְהוֹצָדָק, evitando una forma demasiado inglesa como ''Jehozadak''.'
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: '''Sumo sacerdote'' es la equivalencia idiomática fiel y ampliamente inteligible en español para el título oficial. ''Gran sacerdote'' sería más literal pero menos natural.'
theological_decisions:
- issue: Plural hebreo עֲטָרוֹת frente a la posible lectura interpretativa singular
  english_pob_reading: Retain the plural 'crowns' in the main text, with a footnote noting that some understand a single composite crown.
  chosen_spanish_reading: Mantener 'coronas' en el texto principal, con nota que preserve la posibilidad de una sola corona compuesta.
  alternative_spanish_readings:
  - corona
  - una corona compuesta
  rationale: El hebreo usa explícitamente el plural, y el inglés POB decidió preservarlo por su valor interpretativo. En español conviene mantener 'coronas' en el cuerpo del texto y anotar que algunos entienden una sola corona compuesta, para no borrar la tensión textual.
  doctrine_reference: Principios de equivalencia óptima y respeto del dato morfológico hebreo
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo cambios posteriores y mantiene acuerdo alto con la revisión; por ello, la versión española sigue de cerca el dato morfológico del hebreo, especialmente el plural de עֲטָרוֹת, sin añadir explicaciones no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene el título 'sumo sacerdote' por ser la forma idiomática estable en español bíblico.
  - Se usa el plural 'coronas' en el texto principal para reflejar la morfología hebrea, con nota explicativa sobre la alternativa singular.
