translation:
  language: es
  text: Y si no escuchan la voz de Yahvé[a], para servir al rey de Babilonia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atiendan la voz de Yahvé»; el giro griego puede implicar obediencia, no solo audición.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «para trabajar para el rey de Babilonia»; aquí el sentido es «servirle».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ ἀκούσητε
  english_pob_choice: if you do not listen
  chosen_spanish: si no escuchan
  alternatives_spanish:
  - si no oyen
  - si no atienden
  - si no obedecen
  lexicon: BDAG
  rationale: ἀκούω con genitivo puede significar oír/escuchar y, en contextos de pacto, implica obedecer. En español, «escuchen» conserva el valor auditivo sin convertir prematuramente el sentido en una explicitación interpretativa como «obedezcan».
- source_word: τῆς φωνῆς
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - la palabra
  - el mandato
  lexicon: BDAG
  rationale: φωνή significa literalmente «voz». Mantener «la voz» preserva la expresión bíblica «escuchar la voz del Señor» y evita reducirla a «mandato».
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: BDAG
  rationale: Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, aquí la forma griega κύριος ya aparece en una construcción fija de la LXX («la voz del Señor»). En español, «del Señor» reproduce de manera natural ese eco escritural sin forzar una reexpresión del nombre propio en una fórmula ya establecida por el texto fuente.
- source_word: ἐργάσασθαι
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para trabajar para
  - para laborar para
  - para hacer servicio al
  lexicon: LSJ
  rationale: Aunque el verbo base puede significar «trabajar», en esta construcción con dativo personal expresa prestar servicio. «Servir» comunica mejor la subordinación política y evita una literalidad torpe.
- source_word: τῷ βασιλεῖ Βαβυλῶνος
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey de Babilonia
  - al monarca de Babilonia
  lexicon: BDAG
  rationale: La construcción posesiva/griega se vierte de manera natural como «al rey de Babilonia», que es clara en español y conserva la referencia geopolítica.
theological_decisions:
- issue: Si hacer explícita la obediencia implícita en ἀκούσητε
  english_pob_reading: Retain 'listen to the voice of the Lord' in the main text; alternatives include 'heed' or 'obey'
  chosen_spanish_reading: Mantener «escuchan la voz del Señor» en el texto principal
  alternative_spanish_readings:
  - «obedecen al Señor»
  - «atienden la voz del Señor»
  rationale: El giro es una fórmula bíblica en la que oír implica obedecer, pero el griego sigue siendo auditivo. Conservar «escuchan» preserva la tensión entre escuchar y obedecer sin resolverla interpretativamente en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la traducción inglesa auditada y no requiere revisiones adicionales; se conserva la sintaxis breve del griego y la tensión entre escuchar y obedecer, así como entre «trabajar» y «servir».
  spanish_consistency_notes:
  - Se mantiene «Señor» en la fórmula estable «la voz del Señor» por fidelidad al patrón escritural de la LXX y por fluidez en español.
  - Se usa «Babilonia» como nombre geográfico sin artículo adicional, siguiendo el genitivo griego naturalizado en español.
  - La puntuación con coma final reproduce el corte abierto del verso griego, que continúa la exhortación del contexto inmediato.
