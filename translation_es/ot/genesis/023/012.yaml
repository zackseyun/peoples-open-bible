translation:
  language: es
  text: Entonces Abraham se inclinó ante la gente del lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se postró ante la gente del lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se prosternó
  - rindió homenaje
  lexicon: HALOT
  rationale: El hishtaphel de שׁחה expresa aquí un gesto físico de reverencia o deferencia. En español, «se inclinó» comunica bien el acto de respeto en este contexto de negociación social sin cargar de más la escena con un matiz estrictamente cultual. «Se postró» o «se prosternó» son posibles, pero resultan más intensos; «rindió homenaje» se aleja más del gesto corporal concreto.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: La construcción con פָּנִים funciona idiomáticamente como «ante» o «delante de». «Ante» conserva la relación espacial y formal de respeto de manera natural en español.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - población
  - habitantes
  lexicon: HALOT
  rationale: En la expresión עַם הָאָרֶץ, el sustantivo apunta al cuerpo social local. «Pueblo» es natural en español y mantiene la idea colectiva más claramente que «gente».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En עַם הָאָרֶץ, la referencia es a la tierra/región habitada por ese grupo. «La tierra» reproduce con fidelidad el valor de la expresión hebrea sin introducir una lectura política moderna de «país».
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: Nombre propio
  rationale: Nombre propio estándar en español bíblico.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: Gramática hebrea
  rationale: El waw consecutivo avanza la narrativa. «Entonces» comunica con naturalidad la secuencia temporal en español sin perder la función discursiva.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés están en alto acuerdo; no se detectan revisiones sustantivas que afecten esta línea. La versión española sigue la misma decisión léxica central («bowed down») con una equivalencia natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el original hebreo lo exige; aquí no aparece.
  - Se evita «SEÑOR» o lenguaje cultual innecesario, porque el gesto es de deferencia social, no de adoración.
  - «Tierra» se usa en sentido territorial/colectivo, coherente con עַם הָאָרֶץ.
