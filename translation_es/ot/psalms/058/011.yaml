    issue: La nota a usa «porque vea la venganza» como alternativa
    rationale: En español más natural, la alternativa estrictamente paralela al hebreo perfecto podría formularse mejor como «porque ha visto la venganza» o simplemente «porque vio la venganza». Sin embargo, la nota actual sigue comunicando correctamente la ambigüedad causal/temporal y no distorsiona el sentido.
