base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/009.yaml
  text: But Saul and the people spared Agag and the best of the sheep and cattle[a], and the fattened calves, and the lambs, and all that was good, and they were not willing to devote them to destruction[b]. But every despised and worthless thing they devoted to destruction.
  footnotes:
  - marker: a
    text: Or 'the fatlings.' The Hebrew term מִשְׁנִים is difficult; the traditional rendering is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'devote to destruction,' a technical term for placing something under the ban for destruction.
    reason: lexical_alternative
