revisions:
- from: Escucha la voz de mis ruegos[a][b], cuando clamo a ti, cuando alzo mis manos hacia tu santuario interior santo.
  to: Escucha la voz de mis súplicas[a][b], cuando clamo a ti, cuando alzo mis manos hacia tu santo santuario interior[c].
  rationale: Se ajusta «mis ruegos» a «mis súplicas» para reflejar mejor תַּחֲנוּנַי y mejorar el registro oracional. Se reordena la frase final a «tu santo santuario interior» para lograr español natural sin perder la especificidad cultual de דְּבִיר; además se añade una nota que preserva la alternativa más general «santuario», en línea con la auditoría inglesa.
