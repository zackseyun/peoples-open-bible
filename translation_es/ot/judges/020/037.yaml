- from: Entonces los hombres de la emboscada se apresuraron y arremetieron contra Gabaa[a], y la emboscada avanzó y hirió a toda la ciudad a filo de espada.
  to: Entonces los hombres que estaban en emboscada se apresuraron y arremetieron contra Gabaa, y la emboscada avanzó[a] y golpeó a toda la ciudad a filo de la espada.
  rationale: Se corrigió el anclaje de la nota para que explique el verbo relevante, se fortaleció 'hirió' a 'golpeó' para concordar mejor con el modismo letal posterior, se ajustó la locución a 'a filo de la espada' por naturalidad y fidelidad, y se mejoró la fluidez de la referencia colectiva a la fuerza emboscada.
