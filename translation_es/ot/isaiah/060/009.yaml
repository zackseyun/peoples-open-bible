translation:
  language: es
  text: Ciertamente, las costas lejanas[a] me esperan, y las naves de Tarsis, primero, para traer a tus hijos varones de lejos, con su plata y su oro consigo, por el nombre de Yahvé tu Dios y por el Santo de Israel, porque él te ha glorificado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las islas» o «las costas distantes»; el hebreo suele referirse en sentido amplio a tierras marítimas o costas lejanas.
    reason: lexical_alternative
  - marker: b
    text: O «porque él te ha embellecido» o «porque él te ha honrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Porque
  - En verdad
  lexicon: HALOT
  rationale: En este contexto introductorio y explicativo, «Ciertamente» comunica la fuerza enfática del hebreo sin sonar rígido ni causal de manera exclusiva.
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las tierras lejanas
  lexicon: HALOT
  rationale: «Costas» conserva el campo semántico de tierras marítimas lejanas y funciona de forma natural en español, manteniendo la amplitud del hebreo.
- source_word: יְקַוּוּ
  english_pob_choice: wait
  chosen_spanish: esperan
  alternatives_spanish:
  - aguardan
  - esperan con anhelo
  lexicon: HALOT
  rationale: El verbo incluye expectativa confiada; «esperan» es el equivalente más natural y suficientemente amplio en español, sin reducirlo a mera espera pasiva.
- source_word: וָאֳנִיּוֹת תַּרְשִׁישׁ
  english_pob_choice: the ships of Tarshish
  chosen_spanish: las naves de Tarsis
  alternatives_spanish:
  - los barcos de Tarsis
  - las naves de Tarshish
  lexicon: HALOT
  rationale: «Naves» es idiomático y solemne en español bíblico, y «Tarsis» conserva el nombre propio tradicional del topónimo/transporte bíblico.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: las primeras
  alternatives_spanish:
  - primero
  - en primer lugar
  lexicon: HALOT
  rationale: La secuencia del texto sugiere prioridad; «las primeras» integra el adverbio de forma fluida con «naves» en español.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para llevar
  - para conducir
  lexicon: HALOT
  rationale: «Traer» expresa el movimiento hacia Sion/Zion con claridad y mantiene el sentido de propósito del infinitivo.
- source_word: בָנַיִךְ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «hijos» puede abarcar el conjunto filial de modo natural; «hijos varones» sería más explícito pero más duro y menos fluido. Se preserva la referencia a los descendientes sin forzar una lectura exclusivamente sexista en español.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde muy lejos
  - de una tierra lejana
  lexicon: HALOT
  rationale: «De lejos» es claro, breve y fiel al valor locativo/distancial del hebreo.
- source_word: כַּסְפָּם וּזְהָבָם אִתָּם
  english_pob_choice: with their silver and their gold with them
  chosen_spanish: con su plata y su oro con ellos
  alternatives_spanish:
  - trayendo su plata y su oro
  - con su plata y oro, con ellos
  lexicon: HALOT
  rationale: Se conserva la repetición posesiva y la añadidura de «con ellos», reflejando el énfasis concreto del hebreo sin sobrecargar el ritmo.
- source_word: לְשֵׁם יְהוָה אֱלֹהַיִךְ
  english_pob_choice: for the name of Yahweh your God
  chosen_spanish: para el nombre de Yahvé tu Dios
  alternatives_spanish:
  - por el nombre de Yahvé tu Dios
  - para la honra del nombre de Yahvé tu Dios
  lexicon: HALOT
  rationale: «Para el nombre de» conserva el valor de propósito/referencia honorífica del hebreo, y «Yahvé» sigue la convención del proyecto para el Tetragrámaton.
- source_word: וְלִקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: and for the Holy One of Israel
  chosen_spanish: y para el Santo de Israel
  alternatives_spanish:
  - y para el Santo de Israel
  - y para el Santo de Israel
  lexicon: HALOT
  rationale: El título isaiano fijo se preserva literalmente como «el Santo de Israel», manteniendo su forma teológica establecida.
- source_word: כִּי פֵאֲרָךְ
  english_pob_choice: because he has glorified you
  chosen_spanish: porque te ha glorificado
  alternatives_spanish:
  - porque te ha embellecido
  - porque te ha honrado
  lexicon: HALOT
  rationale: «Glorificado» recoge adecuadamente el efecto de ensalzar/embellecer/ennoblecer en este contexto de exaltación de Sion, sin reducir el matiz del verbo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El proyecto español sigue la convención de traducir el Tetragrámaton como «Yahvé», manteniendo visible el nombre de pacto y evitando el reemplazo litúrgico por «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אִיִּים
  english_pob_reading: the coastlands
  chosen_spanish_reading: las costas
  alternative_spanish_readings:
  - las islas
  - las tierras lejanas
  rationale: En el contexto profético, el término abarca regiones marítimas lejanas; «las costas» conserva esa amplitud y la imagen geográfica sin estrecharla a islas literales.
  doctrine_reference: HALOT / Isaiah usage
- issue: Valor de בָנַיִךְ
  english_pob_reading: your sons
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  rationale: Aunque el hebreo es masculino plural, en español «hijos» puede funcionar como colectivo filial y hace la frase más natural; no se pierde el sentido de descendencia restaurada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor del verbo פֵאֲרָךְ
  english_pob_reading: he has glorified you
  chosen_spanish_reading: te ha glorificado
  alternative_spanish_readings:
  - te ha embellecido
  - te ha honrado
  rationale: El campo semántico incluye adornar/embellecer/honrar; en este marco de exaltación de Sion, «glorificado» expresa mejor el resultado público y teológico.
  doctrine_reference: HALOT / Isaiah 60 context
translation_notes:
  revision_awareness: 'Se revisó la validación previa: el marcador [a] estaba ausente en el texto. En esta versión, [a] y [b] aparecen anclados exactamente en el span correspondiente del texto español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la terminología del proyecto.
  - Se preserva «el Santo de Israel» como título fijo isaiano.
  - Se usa un registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se conservó la estructura de propósito con «para» donde el hebreo usa לְ.
