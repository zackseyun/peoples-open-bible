- from: Así que los hijos de Israel partieron y llegaron a sus ciudades al tercer día[a]. Ahora bien, sus ciudades eran Gabaón, Chefirá, Beerot y Quiriat-jearim.
  to: Entonces los hijos de Israel partieron y llegaron a sus ciudades el tercer día[a]. Ahora bien, sus ciudades eran Gabaón, Chefirá, Beerot y Quiriat-jearim.
  rationale: Se ajusta la expresión temporal a «el tercer día» para reflejar con mayor precisión בַּיּוֹם הַשְּׁלִישִׁי y se suaviza el arranque narrativo con «Entonces», manteniendo intactos el sentido, la nota léxica y los topónimos del borrador.
