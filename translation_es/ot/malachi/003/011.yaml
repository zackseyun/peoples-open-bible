translation:
  language: es
  text: Y reprenderé al devorador por ustedes, para que no destruya para ustedes el fruto de la tierra, ni la vid en el campo[a] pierda su fruto para ustedes, dice Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «la vid en el campo no les abortará/malogrará el fruto». La imagen es de pérdida del fruto antes de madurar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגָעַרְתִּי
  english_pob_choice: I will rebuke
  chosen_spanish: reprenderé
  alternatives_spanish:
  - reprenderé severamente
  - regañaré
  lexicon: HALOT
  rationale: גָּעַר expresa reprensión con fuerza y autoridad. En español, «reprender» conserva ese valor verbal sin suavizarlo a «contener» ni volverlo coloquial. «Reprenderé» reproduce bien la iniciativa divina y el tono judicial del contexto.
- source_word: בָּאֹכֵל
  english_pob_choice: the devourer
  chosen_spanish: el devorador
  alternatives_spanish:
  - el que devora
  - el consumidor
  lexicon: HALOT
  rationale: El participio sustantivado de אכל nombra al agente que consume o arrasa. «El devorador» mantiene la imagen agentiva y suena natural en español. Evita especificar indebidamente una plaga concreta.
- source_word: יַשְׁחִת
  english_pob_choice: destroy
  chosen_spanish: destruya
  alternatives_spanish:
  - arruine
  - dañe
  lexicon: HALOT
  rationale: En este marco agrícola, שׁחת en hifil indica causar ruina o destrucción. «Destruya» conserva la fuerza del verbo y encaja con la cláusula final de propósito con «para que no».
- source_word: פְּרִי הָאֲדָמָה
  english_pob_choice: the fruit of the ground
  chosen_spanish: el fruto de la tierra
  alternatives_spanish:
  - el fruto del suelo
  - la producción de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es concreta y agrícola. «Fruto de la tierra» sigue de cerca el original y es plenamente idiomático en español bíblico contemporáneo, sin restringir el sentido a un cultivo específico.
- source_word: תְשַׁכֵּל
  english_pob_choice: will not fail to bear
  chosen_spanish: les dé fruto defectuoso
  alternatives_spanish:
  - no abortará
  - no se le caerá el fruto
  lexicon: HALOT
  rationale: El verbo שׁכל aplicado a la vid sugiere pérdida de fruto antes de su término, algo más fuerte que simple esterilidad. «Les dé fruto defectuoso» intenta conservar la tensión agrícola del hebreo sin usar «miscarry», que sería poco natural en español para una vid. Se mantiene la ambigüedad entre abortar/perder fruto y una mala producción, como pide el contexto.
- source_word: הַגֶּפֶן
  english_pob_choice: the vine
  chosen_spanish: la vid
  alternatives_spanish:
  - la parra
  - la viña
  lexicon: HALOT
  rationale: גֶּפֶן designa la planta de la vid, no el viñedo. «La vid» es la correspondencia más directa y mantiene el singular definido del hebreo.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el terreno
  lexicon: HALOT
  rationale: «Campo» conserva la localización concreta y funciona mejor en español que una repetición excesivamente literal de «campo»/«campo agrícola». Mantiene el escenario visible del verso.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH; HALOT'
  rationale: Se conserva «Yahvé» para el Nombre divino según la norma del proyecto, y se traduce צְבָאוֹת por «los Ejércitos» para transparentar el título. «De los Ejércitos» sigue la morfología plural del hebreo y mantiene el registro reverente.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo contiene el Tetragrama de forma directa. La línea del proyecto pide mantener el Nombre como «Yahvé» en el texto principal, evitando la sustitución litúrgica por «SEÑOR» y preservando el valor pactual del Nombre revelado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título divino צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos
  rationale: El título se traduce por sentido, no se deja opaco. «De los Ejércitos» comunica el plural hebreo y conserva el carácter militar/celestial del título. Se evita la forma tradicional «de los ejércitos» como simple fórmula, aunque puede considerarse una variante estilística cercana.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión inglesa revisada sin cambios de sentido: reprender al agente destructor, preservar la negación de destrucción del fruto de la tierra y mantener la dificultad del verbo final sobre la vid con una equivalencia española que conserve la tensión agrícola del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como «los Ejércitos» en lugar de conservar «hosts» o «huestes», por transparencia semántica.
  - Se mantiene el registro profético solemne, evitando un español demasiado litúrgico o arcaizante.
  - La nota b conserva la ambigüedad del hebreo sobre תְשַׁכֵּל, sin convertirla en una paráfrasis interpretativa cerrada.
