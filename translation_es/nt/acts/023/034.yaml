lexical_decisions:
- source_word: ἀναγνοὺς
  english_pob_choice: After reading it
  chosen_spanish: Después de leerlo
  alternatives_spanish:
  - habiéndolo leído
  - cuando lo hubo leído
  lexicon: BDAG
  rationale: El participio aoristo de ἀναγινώσκω expresa la acción previa de leer el documento; «Después de leerlo» conserva la relación temporal y suena natural en español.
- source_word: ἐπερωτήσας
  english_pob_choice: asking
  chosen_spanish: de preguntar
  alternatives_spanish:
  - preguntando
  - habiendo preguntado
  lexicon: BDAG
  rationale: El participio aoristo coordina una acción subsecuente de indagación; «de preguntar» mantiene la secuencia narrativa en una construcción fluida en español.
- source_word: ἐκ ποίας ἐπαρχείας ἐστίν
  english_pob_choice: what province he was from
  chosen_spanish: de qué provincia era
  alternatives_spanish:
  - de cuál provincia era
  - de qué jurisdicción era
  lexicon: BDAG
  rationale: ἐπαρχεία designa una provincia administrativa romana; «provincia» es el equivalente claro y fiel en español. La pregunta indirecta «de qué provincia era» conserva el matiz de procedencia.
- source_word: πυθόμενος
  english_pob_choice: learning
  chosen_spanish: al enterarse de
  alternatives_spanish:
  - al saber
  - habiendo sabido
  lexicon: BDAG
  rationale: El participio medio de πυνθάνομαι indica llegar a saber una información; «al enterarse de» expresa bien ese descubrimiento y enlaza naturalmente con la cláusula anterior.
- source_word: ὅτι ἀπὸ Κιλικίας
  english_pob_choice: that he was from Cilicia
  chosen_spanish: de que era de Cilicia
  alternatives_spanish:
  - que era de Cilicia
  - de que provenía de Cilicia
  lexicon: BDAG
  rationale: La preposición ἀπό con lugar indica origen; «era de Cilicia» es una forma idiomática en español para expresar procedencia sin añadir sentido no presente en el griego.
- source_word: Κιλικίας
  english_pob_choice: Cilicia
  chosen_spanish: Cilicia
  alternatives_spanish:
  - la Cilicia
  lexicon: BDAG
  rationale: Se conserva el nombre propio tradicional de la región/provincia en transliteración estándar española.
