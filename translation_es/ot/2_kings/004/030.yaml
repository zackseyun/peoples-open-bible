translation:
  language: es
  text: 'Entonces la madre del muchacho dijo[a]: «¡Tan cierto como que vive Yahvé y como que vives tú, no te dejaré!» Y él se levantó y la siguió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula hebrea de juramento, literalmente: «¡Vive Yahvé, y vive tu alma!»; es decir, «Tan ciertamente como vive Yahvé y como vives tú».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵם הַנַּעַר
  english_pob_choice: the boy’s mother
  chosen_spanish: la madre del muchacho
  alternatives_spanish:
  - la madre del niño
  - la madre del joven
  lexicon: HALOT
  rationale: La frase constructa significa literalmente «madre del muchacho». En español, «la madre del muchacho» es natural, preciso y mantiene la identificación materna específica del contexto.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Tan cierto como vive Yahvé!
  - ¡Vive el Señor!
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento idiomático basado en la vida de YHWH. Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto, y el verbo en forma exclamativa transmite el valor de juramento con naturalidad en español.
- source_word: וְחֵי נַפְשְׁךָ
  english_pob_choice: and as your soul lives
  chosen_spanish: y vive tu alma
  alternatives_spanish:
  - y como vive tu alma
  - y por la vida de tu alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la «vida/alma» de la persona en una fórmula de juramento. «Tu alma» conserva el término y la tensión semántica; «vive» reproduce la estructura paralela de la cláusula hebrea.
- source_word: אִם אֶעֶזְבֶךָּ
  english_pob_choice: I will not leave you
  chosen_spanish: que no te dejaré
  alternatives_spanish:
  - si te dejo
  - ciertamente no te dejaré
  lexicon: HALOT
  rationale: Tras un juramento, אִם funciona de manera idiomática como negación enfática. En español, «que no te dejaré» expresa con claridad la fuerza asseverativa sin introducir una condicional engañosa.
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo קום en narrativa secuencial suele indicar que alguien se incorpora o se levanta para actuar. «Se levantó» es claro y fiel en español contemporáneo.
- source_word: וַיֵּלֶךְ אַחֲרֶיהָ
  english_pob_choice: went after her
  chosen_spanish: la siguió
  alternatives_spanish:
  - fue detrás de ella
  - anduvo tras ella
  lexicon: HALOT
  rationale: Aunque la forma literal es «fue tras ella», en español «la siguió» comunica mejor la relación espacial y narrativa sin perder el sentido de movimiento detrás de ella.
theological_decisions:
- issue: Representación del nombre divino YHWH en una fórmula de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama en una fórmula de juramento directa. Se conserva el nombre propio divino como «Yahvé» para mantener la transparencia textual y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֶפֶשׁ en la expresión juramentaria
  english_pob_reading: your soul
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tu vida
  - tu ser
  rationale: La expresión hebrea une la vida del destinatario con el juramento. «Tu alma» preserva el término de base y deja visible la imagen semítica; «tu vida» sería más explicativo, pero borra parte de la correspondencia léxica.
  doctrine_reference: HALOT, נֶפֶשׁ; contexto de juramento en la narración
translation_notes:
  revision_awareness: El contexto inglés auditado fue revisado desde «as you yourself live» a la forma más exacta «as your soul lives». La versión española refleja ese ajuste al conservar «tu alma» y mantener la estructura de juramento paralela. No se detectan otras revisiones relevantes en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como traducción del Tetragrama, en coherencia con el estándar del proyecto.
  - Se eligió un español natural pero transparente, evitando la sustitución sistemática por «el Señor».
  - «Madre del muchacho» respeta la referencia concreta del hebreo sin sobreinterpretar la edad del hijo.
  - «La siguió» es una equivalencia idiomática aceptable para אַחֲרֶיהָ dentro del flujo narrativo.
