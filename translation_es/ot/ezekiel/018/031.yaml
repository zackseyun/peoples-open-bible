review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato de desechar, cláusula relativa con repetición cognada, mandato de hacerse un corazón/espíritu nuevos, y pregunta retórica final al vocativo «casa de Israel». Sin embargo, el cambio de פִּשְׁעֵיכֶם de «transgresiones/rebeliones» a «pecados» debilita un matiz importante de rebelión/transgresión contra autoridad y se aparta de la decisión documentada del POB inglés de preservar la repetición léxica con ‘transgressions / have transgressed’.'
  spanish_quality_summary: 'El español es mayormente claro, pero «Arrojad de sobre vosotros» y el uso de «vosotros / habéis / haceos / habríais» no encajan con el estilo meta solicitado de español neutral latinoamericano y además suenan algo rígidos. «Habéis pecado» también crea un registro peninsular innecesario. Conviene usar formas plurales de ustedes y una sintaxis más natural: «Arrojen de sobre ustedes… con las cuales han transgredido… háganse…».'
  glossary_alignment: 'No hay términos del glosario mayor implicados como Yahvé/Mesías, pero sí una decisión léxica importante: פשע debe tender a «transgresión» o «rebelión», no a «pecado», salvo razón fuerte. También debe preservarse, en lo posible, la repetición cognada sustantivo/verbo que el POB inglés documentó expresamente.'
  issues:
  - severity: high
    issue: «pecados» para פִּשְׁעֵיכֶם
    rationale: El hebreo פשע enfatiza transgresión/rebelión, y el rastro de auditoría inglés escogió deliberadamente «transgressions» con repetición cognada. «Pecados» es más general y pierde ese matiz.
  - severity: high
    issue: No se preserva adecuadamente la repetición cognada פשע / פשע
    rationale: El inglés POB la conserva en texto principal. En español es viable usar «transgresiones… han transgredido», que mantiene la fuerza retórica mejor que «pecados… habéis pecado».
  - severity: medium
    issue: Registro peninsular en lugar de español neutral latinoamericano
    rationale: Formas como «arrojad», «vosotros», «habéis», «haceos», «habríais» contradicen el objetivo de español neutral latinoamericano/broadly church-readable.
  - severity: low
    issue: «de sobre vosotros» suena algo marcado
    rationale: Es defendible por la imagen hebrea de quitar algo de encima, pero en español natural conviene ajustarlo a «de sobre ustedes» dentro de un registro más fluido.
  revised_spanish_text: Arrojen de sobre ustedes todas sus transgresiones[a] con las cuales han transgredido, y háganse un corazón nuevo y un espíritu nuevo. ¿Por qué habrían de morir, casa de Israel?
  revised_footnotes:
