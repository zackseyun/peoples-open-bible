review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la estructura del hebreo: examen al séptimo día, propagación de la afección en prenda/urdimbre/trama/cuero, cláusula abarcadora sobre objetos de cuero, y dictamen final de impureza. Sin embargo, falla en dos puntos importantes: (1) צָרַעַת se vertió como «sarna», lo cual estrecha y distorsiona el término técnico ritual y además suena impropio cuando se aplica a tejidos y cuero; (2) la cláusula לְכֹל אֲשֶׁר יֵעָשֶׂה הָעוֹר לִמְלָאכָה quedó demasiado calcada y poco inteligible en español.'
  spanish_quality_summary: La legibilidad del borrador es desigual. «Examinará», «urdimbre», «trama» y «cuero» son buenas elecciones. Pero «en cualquier cosa para la cual se hace el cuero para trabajo» es torpe y poco natural. «Es una sarna destructiva la lesión» también suena antinatural por orden y por léxico. Conviene reformular para mantener registro legal claro y español natural.
  glossary_alignment: 'No hay conflicto con términos teológicos mayores del proyecto, pero sí con la racionalidad léxica documentada de צָרַעַת: el inglés POB evitó un término médico específico y optó por una expresión amplia. En español, «sarna» contradice esa motivación. «Enfermedad cutánea» preserva mejor la amplitud técnica, aunque aquí se aplique metafóricamente a materiales; una nota puede aclarar que el hebreo usa el mismo término técnico tradicionalmente traducido «lepra».'
  issues:
  - severity: high
    issue: «sarna» para צָרַעַת
    rationale: «Sarna» es demasiado específica y engañosa, y no funciona bien en un contexto donde el término también se aplica a ropa y cuero. Va contra la rationale auditada de evitar una categoría médica estrecha.
  - severity: medium
    issue: Cláusula sobre el cuero demasiado calcada
    rationale: «en cualquier cosa para la cual se hace el cuero para trabajo» reproduce parcialmente la forma hebrea, pero en español resulta forzada y poco clara. Debe decirse de forma más idiomática sin perder el alcance legal, por ejemplo «en cualquier objeto hecho de cuero para uso».
  - severity: medium
    issue: Orden sintáctico antinatural en la predicación final
    rationale: «es una sarna destructiva la lesión» no suena natural en español jurídico/bíblico contemporáneo. La información debe ordenarse como «la lesión es una enfermedad cutánea destructiva».
  - severity: low
    issue: Nota [a] innecesaria frente al criterio del proyecto
    rationale: El sentido de «examinará» ya está bien expresado en el texto principal; la nota añade poca información necesaria. Es preferible conservar notas para cuestiones textuales o ambigüedades más relevantes.
