translation:
  language: es
  text: Hiciste señales y maravillas[a] contra el faraón, contra todos sus siervos y contra todo el pueblo de su tierra, porque sabías que se habían comportado con presunción[b] contra ellos. Así te hiciste un nombre, como hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prodigios»; el par hebreo אֹתֹת וּמֹפְתִים designa actos extraordinarios de Dios como señales visibles y asombrosas.
    reason: lexical_alternative
  - marker: b
    text: O «con insolencia» o «con arrogancia». El verbo hebreo puede expresar presunción, altivez o comportamiento insolente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: You performed
  chosen_spanish: Tú hiciste
  alternatives_spanish:
  - Tú realizaste
  - Tú efectuaste
  lexicon: HALOT
  rationale: El verbo hebreo, con 'señales y maravillas', expresa la acción de producirlas o mostrarlas. En español, 'hiciste' conserva la agencia divina sin sonar mecánico; 'realizaste' o 'efectuaste' serían posibles, pero menos naturales aquí.
- source_word: אֹתֹת וּמֹפְתִים
  english_pob_choice: signs and wonders
  chosen_spanish: señales y maravillas
  alternatives_spanish:
  - señales y prodigios
  - señales y milagros
  lexicon: HALOT
  rationale: La pareja hebrea es una expresión fija para actos divinos extraordinarios con valor de señal. 'Señales y maravillas' reproduce bien la dualidad semántica y mantiene un registro bíblico claro.
- source_word: בְּפַרְעֹה
  english_pob_choice: against Pharaoh
  chosen_spanish: contra el faraón
  alternatives_spanish:
  - sobre el faraón
  - en contra del faraón
  lexicon: HALOT
  rationale: La preposición ב en este contexto introduce el objeto contra el cual se ejercen las señales. 'Contra' expresa mejor el sentido adversativo que 'sobre'.
- source_word: וּבְכָל עֲבָדָיו
  english_pob_choice: against all his servants
  chosen_spanish: contra todos sus siervos
  alternatives_spanish:
  - contra todos sus servidores
  - contra todos sus funcionarios
  lexicon: HALOT
  rationale: עֲבָדִים puede abarcar siervos, servidores o funcionarios según el contexto. Aquí, para preservar la fuerza léxica del término sin rebajarlo a un mero cargo administrativo, 'siervos' resulta más cercano al hebreo.
- source_word: וּבְכָל עַם אַרְצוֹ
  english_pob_choice: against all the people of his land
  chosen_spanish: contra todo el pueblo de su tierra
  alternatives_spanish:
  - contra todo el pueblo de su país
  - contra toda la gente de su tierra
  lexicon: HALOT
  rationale: '''Tierra'' traduce con mayor fidelidad אֶרֶץ que ''país'', y ''pueblo de su tierra'' conserva la relación posesiva del hebreo sin explicitar más de lo que el texto dice.'
- source_word: כִּי יָדַעְתָּ
  english_pob_choice: for you knew
  chosen_spanish: porque sabías
  alternatives_spanish:
  - pues sabías
  - ya que sabías
  lexicon: HALOT
  rationale: כִּי introduce aquí la causa. 'Porque sabías' es natural en español y mantiene la relación causal explícita.
- source_word: הֵזִידוּ
  english_pob_choice: acted presumptuously
  chosen_spanish: se habían comportado con presunción
  alternatives_spanish:
  - habían actuado con presunción
  - se habían mostrado insolentes
  - habían obrado con arrogancia
  lexicon: HALOT
  rationale: El verbo transmite actuar con presunción, insolencia o arrogancia. 'Se habían comportado con presunción' conserva la raíz conceptual y evita perder la tensión lexical documentada por la POB inglesa.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - contra tu pueblo
  lexicon: HALOT
  rationale: El pronombre se mantiene indefinido como en el hebreo y en la POB inglesa. En el contexto de Éxodo, el referente más probable son los oprimidos de Dios, pero la traducción no lo explicita para no sobreinterpretar.
- source_word: וַתַּעַשׂ לְךָ שֵׁם
  english_pob_choice: you made a name for yourself
  chosen_spanish: te hiciste un nombre
  alternatives_spanish:
  - te ganaste renombre
  - te hiciste famoso
  lexicon: HALOT
  rationale: El hebreo usa un modismo de reputación o renombre. 'Te hiciste un nombre' preserva el giro idiomático de manera comprensible en español.
- source_word: כְּהַיּוֹם הַזֶּה
  english_pob_choice: as it is to this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - hasta el día de hoy
  - así como hasta hoy
  lexicon: HALOT
  rationale: La expresión temporal indica continuidad hasta el presente del marco narrativo. 'Como en este día' sigue de cerca la forma hebrea y resulta legible en español bíblico moderno.
theological_decisions:
- issue: Referente de «contra ellos»
  english_pob_reading: The Egyptians/Pharaoh acted arrogantly against Israel.
  chosen_spanish_reading: Los egipcios/Faraón actuaron con presunción contra el pueblo de Israel, sin nombrarlo explícitamente en el verso.
  alternative_spanish_readings:
  - actuaron con presunción contra tu pueblo
  - actuaron con presunción contra ellos, dejando el referente implícito
  rationale: El contexto del éxodo hace que el referente más natural sean los israelitas. Sin embargo, como el hebreo y la POB inglesa mantienen un pronombre indirecto/implícito, la versión española conserva «contra ellos» para no cerrar la referencia más allá de la formulación del texto.
  doctrine_reference: Éxodo 14; Nehemías 9:9-10
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «acted presumptuously» sobre «acted arrogantly» para corresponder más de cerca a הֵזִידוּ. Por eso la española usa «se habían comportado con presunción» y mantiene el resto de la estructura sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para el nombre divino, pero en este verso no aparece el Tetragrámaton en el texto hebreo dado.
  - Se mantuvo «faraón» en minúscula por tratarse de un título en español bíblico, aunque funcione casi como nombre propio en el contexto.
  - Se preservó el pronombre «ellos» para reflejar el hebreo y el audit trail inglés, evitando explicitar «tu pueblo» en el texto principal.
