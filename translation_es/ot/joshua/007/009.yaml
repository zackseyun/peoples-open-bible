review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: futuro prospectivo, amenaza militar de ser rodeados, y apelación final al nombre grande de Dios. Sin embargo, introduce un marcador extraño ''[o]'' no documentado en el texto, y en un punto se aparta innecesariamente de la decisión léxica auditada: וְהִכְרִיתוּ אֶת שְׁמֵנוּ se había preservado como ''cut off our name'', por lo que en español conviene una forma más cercana como ''eliminarán nuestro nombre'' o ''cortarán de raíz nuestro nombre'' antes que ''borrarán'', que suaviza algo la fuerza de הכרית. También conviene aclarar que הָאָרֶץ en la primera mención se entiende localmente como ''la tierra'', mientras que en la expresión idiomática final puede mantenerse ''de la tierra''.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. No obstante, el texto necesita reparación formal por el marcador '[o]' incrustado sin nota correspondiente. Además, la puntuación y el flujo mejoran si se mantiene la interrogación final sin añadir artificios. La frase 'por tu gran nombre' es natural y fiel.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto; este versículo no contiene Yahvé ni Mesías. 'Gran nombre' preserva adecuadamente la dimensión teológica documentada sobre la reputación pública de Dios. La principal mejora es alinear mejor הכרית con una expresión española más fuerte que conserve el modismo de 'nombre'.
  issues:
  - severity: high
    issue: El texto español contiene el marcador '[o]' en 'la tierra[o]' sin nota correspondiente.
    rationale: Esto viola el requisito de marcadores únicos y consistentes entre texto y notas, y produce un error editorial visible.
  - severity: medium
    issue: '''Borrarán nuestro nombre'' debilita ligeramente la fuerza de וְהִכְרִיתוּ אֶת שְׁמֵנוּ frente a la decisión auditada ''cut off our name''.'
    rationale: Aunque comprensible, 'borrar' tiende a enfatizar eliminación de memoria escrita; 'eliminarán nuestro nombre' conserva mejor la idea de erradicación de existencia y recuerdo, mientras mantiene el modismo con 'nombre'.
  - severity: low
    issue: La primera ocurrencia de הָאָרֶץ se traduce 'tierra', pero el borrador introducía una marca aparentemente destinada a señalar alternativa sin documentarla.
    rationale: No es necesario cambiar 'tierra', pero sí eliminar la marca errónea y dejar la nota sobre el modismo para la segunda ocurrencia.
  revised_spanish_text: Porque los cananeos[a] y todos los habitantes de la tierra oirán[b], y nos rodearán y eliminarán nuestro nombre de la tierra[c]. ¿Y qué harás por tu gran nombre?
