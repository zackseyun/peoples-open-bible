  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Los términos «Adar», «banquete» y «alegría» son adecuados. La principal cuestión es idiomática y de correspondencia con las notas: la nota [a] ofrece una alternativa sobre ordinal/cardinal que no encaja con el inglés auditado, donde la alternativa es sobre el valor verbal de וְעָשֹׂה אֹתוֹ.'
