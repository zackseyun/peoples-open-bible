translation:
  language: es
  text: Helez el paltita[a], Ira hijo de Iqués el tecoíta;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posiblemente, «el pelonita» en algunas tradiciones de traducción; sin embargo, el hebreo de este versículo se lee más naturalmente como «el paltita».
    reason: alternative_reading
lexical_decisions:
- source_word: חֶלֶץ
  english_pob_choice: Helez
  chosen_spanish: Helez
  alternatives_spanish:
  - Heles
  lexicon: HALOT
  rationale: Es un nombre propio; en español conviene transliterarlo de forma estable. Mantengo la forma Helez para reflejar la convención onomástica y la transparencia respecto del hebreo.
- source_word: הַפַּלְטִי
  english_pob_choice: the Paltite
  chosen_spanish: el paltita
  alternatives_spanish:
  - el pelonita
  lexicon: HALOT
  rationale: El hebreo presenta un gentilicio con artículo. Sigo la lectura más directa del texto consonántico con 'paltita', preservando el vínculo con la forma hebrea; 'pelonita' queda como alternativa tradicional atestiguada en otras tradiciones, pero no es la lectura preferida aquí.
- source_word: עִירָא
  english_pob_choice: Ira
  chosen_spanish: Ira
  alternatives_spanish:
  - Irá
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español no se adapta léxicamente porque el valor es identificatorio, no semántico.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Marcador filiatorio estándar. 'Hijo de' es la equivalencia natural y fiel en español formal.
- source_word: עִקֵּשׁ
  english_pob_choice: Ikkesh
  chosen_spanish: Iques
  alternatives_spanish:
  - Ikkes
  - Iquésh
  lexicon: HALOT
  rationale: Nombre propio; se translitera para lectura española. El ajuste gráfico busca ser legible en español sin introducir traducción del nombre.
- source_word: הַתְּקוֹעִי
  english_pob_choice: the Tekoite
  chosen_spanish: el tecoíta
  alternatives_spanish:
  - el de Tecoa
  lexicon: HALOT
  rationale: Gentilicio con artículo. 'Tecoíta' conserva la forma adjetival breve del hebreo y mantiene la relación con Tecoa; 'el de Tecoa' es posible, pero menos compacto y menos cercano al patrón del texto.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail en inglés están en alto acuerdo: el versículo es una lista onomástica con dos gentilicios. La única tensión relevante es la forma del primer gentilicio, donde la tradición inglesa registra una variante alternativa («Pelonite»), pero el texto hebreo favorece «Paltite»; se conserva esa decisión en español.'
  spanish_consistency_notes:
  - 'Se preserva el orden de los nombres del hebreo: nombre + gentilicio, luego nombre + filiación + gentilicio.'
  - Se evitó 'SEÑOR' u otras equivalencias no presentes; el versículo es puramente onomástico.
  - Se usó minúscula en los gentilicios españoles por tratarse de adjetivos de origen, salvo en nombres propios.
