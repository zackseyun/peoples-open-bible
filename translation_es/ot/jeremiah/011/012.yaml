revisions:
- from: Entonces las ciudades de Judá y los habitantes de Jerusalén irán y clamarán a los dioses[a] a quienes queman incienso, pero no los salvarán en el tiempo de su calamidad[b].
  to: Entonces las ciudades de Judá y los habitantes de Jerusalén irán y clamarán a los dioses a quienes queman incienso, pero no los salvarán en el momento de su calamidad[a].
  rationale: Se quitó la nota innecesaria sobre 'ofrecen incienso', se reemplazó la expresión temporal por una forma más natural en español ('en el momento de su calamidad') y se ajustó la nota léxica para mantener alternativas cercanas al sentido de רָעָה como calamidad sufrida, sin introducir una opción menos precisa como 'angustia'.
