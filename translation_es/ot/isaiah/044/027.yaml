translation:
  language: es
  text: 'el que dice al abismo[a]: «Queda seca, y secaré tus ríos»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las profundidades». El término hebreo se refiere a la profundidad de las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  english_pob_choice: who says
  chosen_spanish: el que dice
  alternatives_spanish:
  - quien dice
  - el que está diciendo
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo. «El que dice» conserva ese valor descriptivo y suena natural en español, sin volverlo pasado ni recargarlo con una perífrasis innecesaria.
- source_word: לַצּוּלָה
  english_pob_choice: to the deep
  chosen_spanish: al abismo
  alternatives_spanish:
  - a lo profundo
  - a las profundidades
  - al mar profundo
  lexicon: HALOT
  rationale: צּוּלָה designa la profundidad acuática. «Abismo» comunica bien la profundidad de las aguas en español bíblico y mantiene la fuerza imagética; es una opción más natural que una expresión demasiado explicativa.
- source_word: חֳרָבִי
  english_pob_choice: Be dry
  chosen_spanish: Sécate
  alternatives_spanish:
  - Hazte seco
  - Queda seca
  - Deséchate
  lexicon: HALOT
  rationale: El imperativo femenino singular concuerda con el sustantivo femenino implícito en el hebreo. «Sécate» expresa de manera directa y natural la orden de quedar seco.
- source_word: וְנַהֲרֹתַיִךְ
  english_pob_choice: and your rivers
  chosen_spanish: tus ríos
  alternatives_spanish:
  - tus corrientes
  - tus arroyos
  lexicon: HALOT
  rationale: נְהָרוֹת es el plural de «río». El posesivo de segunda femenina singular se conserva con «tus». «Ríos» es la correspondencia más directa y transparente.
- source_word: אוֹבִישׁ
  english_pob_choice: I will dry up
  chosen_spanish: secaré
  alternatives_spanish:
  - haré secar
  - los secaré
  lexicon: HALOT
  rationale: El causativo imperfecto de primera persona expresa acción futura y causativa. En español, «secaré» reproduce bien el sentido de que Dios hará secarse las aguas sin sobrecargar la frase.
theological_decisions:
- issue: Identidad del hablante y dependencia del contexto previo
  english_pob_reading: Retain the relative clause 'who says...' without supplying 'the LORD' in this verse.
  chosen_spanish_reading: Conservar la cláusula relativa «el que dice...» sin añadir el sujeto explícito.
  alternative_spanish_readings:
  - el Señor, el que dice...
  - quien, desde el contexto, dice...
  rationale: El hebreo depende sintácticamente de la descripción anterior; añadir el sujeto en la línea principal introduciría material no presente en este versículo. La formulación española conserva la continuidad literaria y deja que el contexto identifique al hablante.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el análisis previo y no requiere revisiones textuales o de sentido; se mantiene la estructura relativa y la imagen acuática del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el contexto sin añadirlo en el versículo.
  - Se usa «abismo» como equivalente bíblico de la profundidad acuática, con nota alternativa para transparentar el hebreo.
  - La puntuación reproduce una cláusula relativa seguida de discurso directo breve, acorde con el hebreo y con el flujo del POB en inglés.
