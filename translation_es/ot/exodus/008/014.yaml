translation:
  language: es
  text: Y los magos hicieron lo mismo con sus artes secretas para sacar los jejenes[a], pero no pudieron; y los jejenes estaban sobre el hombre y sobre las bestias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piojos». El término hebreo para el insecto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחַרְטֻמִּים
  english_pob_choice: the magicians
  chosen_spanish: los magos
  alternatives_spanish:
  - los hechiceros
  - los practicantes de artes ocultas
  lexicon: HALOT
  rationale: El término designa a los especialistas rituales de la corte de Faraón. «Magos» es una equivalencia natural en español y mantiene el sentido de profesionales de prácticas ocultas sin sobreespecificar su técnica.
- source_word: בְּלָטֵיהֶם
  english_pob_choice: by their secret arts
  chosen_spanish: con sus artes secretas
  alternatives_spanish:
  - con sus encantamientos
  - mediante sus artes ocultas
  lexicon: HALOT
  rationale: La idea es de técnicas escondidas o esotéricas. «Con sus artes secretas» conserva ese matiz y fluye bien en español.
- source_word: לְהוֹצִיא
  english_pob_choice: to bring out
  chosen_spanish: para sacar
  alternatives_spanish:
  - para producir
  - para hacer salir
  lexicon: HALOT
  rationale: Aquí el verbo expresa el intento de producir o hacer aparecer la plaga. «Para sacar» es cercano al hebreo y natural en español; evita una paráfrasis más interpretativa.
- source_word: הַכִּנִּים / הַכִּנָּם
  english_pob_choice: the gnats
  chosen_spanish: los mosquitos
  alternatives_spanish:
  - los piojos
  lexicon: HALOT
  rationale: El término hebreo para el insecto es incierto. «Mosquitos» es una opción clara y actual en español; «piojos» se conserva como alternativa tradicional por la misma incertidumbre léxica.
- source_word: וְלֹא יָכֹלוּ
  english_pob_choice: but they were not able
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - pero no fueron capaces
  lexicon: HALOT
  rationale: Expresa de forma directa la incapacidad indicada por el hebreo. «No pudieron» es idiomático y mantiene la fuerza verbal.
- source_word: בָּאָדָם
  english_pob_choice: on man
  chosen_spanish: sobre el hombre
  alternatives_spanish:
  - sobre la humanidad
  - sobre las personas
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo, en contraste con el ganado. «El hombre» refleja la forma מקור y no borra la referencia representativa a la humanidad.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: and on beast
  chosen_spanish: y sobre el ganado
  alternatives_spanish:
  - y sobre los animales
  - y sobre las bestias
  lexicon: HALOT
  rationale: «Ganado» comunica bien el colectivo hebreo en un contexto de plaga sobre seres humanos y animales domésticos. En español resulta más natural que un singular colectivo como «bestia», aunque este también es posible.
theological_decisions:
- issue: Conservación del colectivo singular אָדָם frente a opciones inclusivas
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: El hebreo usa אָדָם en singular colectivo en contraste con בְּהֵמָה. Mantener «el hombre» preserva la correspondencia formal y la distinción del texto sin imponer una neutralización no exigida por la fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: 'Término del insecto: incertidumbre léxica'
  english_pob_reading: gnats
  chosen_spanish_reading: mosquitos[a]
  alternative_spanish_readings:
  - piojos
  rationale: La fuente hebrea no permite fijar con total seguridad la especie. Se mantiene la alternativa tradicional mediante nota para no cerrar indebidamente una ambigüedad documentada.
  doctrine_reference: HALOT; English POB footnote a
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de revisión recientes; la versión más reciente indica que no hubo modificaciones necesarias. La redacción española conserva la ambigüedad léxica del término de insecto y mantiene el colectivo singular de אָדָם en contraste con בְּהֵמָה.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se evitó «SEÑOR» porque el versículo no incluye el nombre divino.
  - Se usó «el hombre» para conservar el singular colectivo hebreo en paralelo con «el ganado».
  - Se prefirió «artes secretas» por consistencia con el valor de prácticas ocultas en el contexto de los magos de Faraón.
