translation:
  language: es
  text: No entren en conflicto con ellos[a], porque no les daré nada de su tierra, ni siquiera lo suficiente para que la planta de un pie pise, porque he dado el monte Seír[c] a Esaú como posesión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no los provoquen» o «no contiendan con ellos».'
    reason: lexical_alternative
  - marker: b
    text: «Como posesión» también puede traducirse «como herencia».
    reason: lexical_alternative
  - marker: c
    text: «Monte Seír» puede referirse también a la región montañosa o serranía de Seír.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְגָּרוּ בָם
  english_pob_choice: Do not contend with them
  chosen_spanish: No contiendan con ellos
  alternatives_spanish:
  - No los provoquen
  - No entren en conflicto con ellos
  - No se enfrenten con ellos
  lexicon: HALOT
  rationale: El hitpael de גרה con ב expresa entrar en provocación o conflicto hostil. «Contiendan con ellos» conserva el sentido de disputa/conflicto y evita volverlo demasiado militar o demasiado coloquial.
- source_word: לֹא אֶתֵּן לָכֶם מֵאַרְצָם
  english_pob_choice: I will not give you any of their land
  chosen_spanish: no les daré nada de su tierra
  alternatives_spanish:
  - no les daré ninguna parte de su tierra
  - no les daré algo de su tierra
  - no les daré de su tierra
  lexicon: HALOT
  rationale: El מן partitivo comunica que no se dará ninguna porción. «Nada de su tierra» expresa bien esa negación total en español natural, manteniendo el valor partitivo sin sonar forzado.
- source_word: עַד מִדְרַךְ כַּף רָגֶל
  english_pob_choice: not even enough for the sole of a foot to tread on
  chosen_spanish: ni siquiera lo suficiente para que la planta de un pie la pise
  alternatives_spanish:
  - ni siquiera para la planta de un pie
  - ni tanto como la huella de un pie
  - ni siquiera un paso de pie
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca la mínima porción posible. «La planta de un pie» conserva la imagen del pie; «la pise» reproduce el verbo de pisar/tropear con fluidez en español.
- source_word: יְרֻשָּׁה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como herencia
  - como patrimonio
  - como posesión heredada
  lexicon: HALOT
  rationale: Aquí el énfasis es en una posesión territorial concedida por Dios. «Posesión» sigue de cerca el valor del término sin forzar la imagen familiar de «herencia», aunque esa alternativa sigue siendo posible.
- source_word: לְעֵשָׂו
  english_pob_choice: to Esau
  chosen_spanish: a Esaú
  alternatives_spanish:
  - para Esaú
  - a favor de Esaú
  lexicon: HALOT
  rationale: El dativo señala al beneficiario de la concesión. «A Esaú» es la forma natural en español para marcar destinatario.
- source_word: הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: el monte Seír
  alternatives_spanish:
  - la serranía de Seír
  - la región montañosa de Seír
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional «monte Seír», que en español bíblico es claro y corresponde al referente geográfico del texto. La nota permite recordar que puede aludir también a la región montañosa.
theological_decisions:
- issue: Fundamento divino del no-agredir a Edom
  english_pob_reading: The prohibition is grounded in God's sovereign assignment of Seir to Esau.
  chosen_spanish_reading: La prohibición se presenta como fundada en la asignación soberana de Seír por parte de Dios a Esaú.
  alternative_spanish_readings:
  - Es solo una instrucción política sin énfasis teológico
  - La mención de Dios es secundaria al mandato práctico
  rationale: Los dos כי fundamentan el mandato en la distribución soberana de la tierra. La redacción española conserva ese motivo sin ampliarlo más allá del texto.
  doctrine_reference: Providencia divina y soberanía de Dios sobre la distribución de la tierra
- issue: Naturaleza de יְרֻשָּׁה
  english_pob_reading: as a possession
  chosen_spanish_reading: como posesión
  alternative_spanish_readings:
  - como herencia
  - como patrimonio
  rationale: «Posesión» mantiene la tensión del término entre herencia y dominio territorial, sin decidir por completo una idea genealógica que el contexto no exige de manera exclusiva.
  doctrine_reference: Asignación divina de territorios; uso contextual de herencia/posesión
translation_notes:
  revision_awareness: He seguido la última revisión inglesa que prefirió «contend with» frente a «provoke» y ajustó la idiomaticidad de la imagen del pie. En español se preserva esa lectura de conflicto hostil con una formulación natural y se mantiene la tensión entre «posesión» e «herencia» mediante nota.
  spanish_consistency_notes:
  - Se usa «Esaú» como transliteración estándar del nombre propio.
  - Se usa «Seír» con acento para adecuación ortográfica española.
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton ni una cita directa del nombre divino; se habla de Dios implícitamente en la primera persona del discurso.
  - «Posesión» se mantiene como término técnico contextual para יְרֻשָּׁה.
