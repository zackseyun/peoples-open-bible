translation:
  language: es
  text: 'Así dice el Señor Yahvé: Porque Moab y Seír dicen[a]: «He aquí, la casa de Judá es como todas las naciones»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Seír es el nombre hebreo de la región montañosa asociada con Edom; por eso algunas traducciones lo vierten como «Edom».
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Mantiene la fórmula profética solemne y natural en español, sin volverla rígida ni arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la distinción del título compuesto y se traduce el nombre divino como 'Yahvé' según el estándar del proyecto, en lugar de ocultarlo con mayúsculas de sustitución.
- source_word: יַעַן אֲמֹר
  english_pob_choice: Because ... say
  chosen_spanish: Porque ... dicen
  alternatives_spanish:
  - Debido a que ... dicen
  - Por cuanto ... dicen
  lexicon: HALOT
  rationale: En español, la subordinada causal se expresa con naturalidad mediante 'porque'; el infinitivo causal hebreo queda bien reflejado por el verbo finito en presente dentro de la acusación profética.
- source_word: מוֹאָב וְשֵׂעִיר
  english_pob_choice: Moab and Seir
  chosen_spanish: Moab y Seír
  alternatives_spanish:
  - Moab y Edom
  lexicon: HALOT
  rationale: Se preserva el topónimo hebreo 'Seír' porque es el dato textual directo; 'Edom' queda como alternativa interpretativa, no como sustituto en el texto principal.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: '''Miren'' comunica en español la función deíctica y exhortativa de הִנֵּה con un registro claro y bíblico sin sonar forzado.'
- source_word: כְּכָל הַגּוֹיִם
  english_pob_choice: like all the nations
  chosen_spanish: como todas las naciones
  alternatives_spanish:
  - igual que todas las naciones
  - como todos los pueblos
  lexicon: HALOT
  rationale: '''Naciones'' preserva el sentido colectivo de גּוֹיִם y el matiz comparativo de כְּ.'
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - la casa de la tribu de Judá
  lexicon: HALOT
  rationale: Se mantiene la designación corporativa/covenantal 'casa de Judá', que es más precisa que el simple nombre territorial o tribal.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El hebreo contiene el Tetragrámaton explícito; el proyecto pide 'Yahvé' en el texto principal para no enmascarar el nombre del pacto. 'Señor' conserva la lectura reverente de אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés, pero ajusta dos decisiones relevantes para español: mantiene ''Yahvé'' donde el inglés usa ''Lord GOD'' por convención, y opta por ''Miren'' para reflejar con naturalidad la fuerza exhortativa de הִנֵּה.'
  spanish_consistency_notes:
  - Se conserva 'casa de Judá' para la entidad corporativa.
  - '''Seír'' se deja en el texto principal con nota alternativa a ''Edom''.'
  - La puntuación respeta el cierre de cita con comillas españolas.
