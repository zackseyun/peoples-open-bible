translation:
  language: es
  text: 'Entonces Moisés volvió a Yahvé y dijo[a]: «Te ruego, este pueblo ha cometido un gran pecado, y se hicieron dioses de oro para sí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se hizo un dios de oro para sí». El hebreo dice «dioses de oro» en plural, aunque algunos lo entienden en singular por el contexto más amplio del becerro de oro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  - retornó
  lexicon: HALOT
  rationale: El hebreo indica un acto de volver a Yahvé después del episodio con el pueblo. «Volvió» es natural en español y conserva la idea de regreso sin añadir matices innecesarios.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Siguiendo la directriz del proyecto, el nombre divino יְהוָה se traduce como «Yahvé», no como «Señor». La preposición אֶל se expresa de forma directa con «a».
- source_word: אָ֣נָּ֗א
  english_pob_choice: Please
  chosen_spanish: Te ruego
  alternatives_spanish:
  - por favor
  - te suplico
  - oh, por favor
  lexicon: HALOT
  rationale: La partícula expresa súplica. «Te ruego» transmite el tono de intercesión de Moisés con dignidad y sin sonar mecánico.
- source_word: חָטָ֞א
  english_pob_choice: has sinned
  chosen_spanish: ha cometido un ... pecado
  alternatives_spanish:
  - ha pecado
  - ha cometido pecado
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal completada con valor vigente en la súplica. En español, «ha cometido un gran pecado» comunica bien la acción consumada y su gravedad, manteniendo la relación con el sustantivo siguiente.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo aquí
  - estas personas
  lexicon: HALOT
  rationale: עָם es singular colectivo en hebreo. «Este pueblo» preserva el número y el sentido colectivo mejor que un plural.
- source_word: חֲטָאָה גְדֹלָה
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un pecado grande
  - un pecado gravísimo
  - una gran culpa
  lexicon: HALOT
  rationale: La construcción repite la raíz de pecado para intensificar la confesión. «Un gran pecado» conserva esa gravedad en español sin forzar una perífrasis más explicativa.
- source_word: וַיַּעֲשׂוּ לָהֶם
  english_pob_choice: they have made for themselves
  chosen_spanish: se han hecho para sí mismos
  alternatives_spanish:
  - se hicieron
  - se han hecho para ellos
  lexicon: HALOT
  rationale: La frase hebrea expresa beneficio/reflexividad. «Para sí mismos» preserva el matiz de לָהֶם con claridad en español.
- source_word: אֱלֹהֵי זָהָב
  english_pob_choice: gods of gold
  chosen_spanish: dioses de oro
  alternatives_spanish:
  - un dios de oro
  - un becerro de oro
  - ídolos de oro
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo, que el POB inglés también mantuvo como «gods of gold». Aunque el contexto inmediato alude al becerro, el texto masorético dice plural y no debe armonizarse prematuramente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: La política del proyecto para el tetragrámaton es usar «Yahvé» en el texto principal. Esto conserva el nombre de pacto revelado en el Sinaí y evita la sustitución devocional por «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Pluralidad de אֱלֹהֵי זָהָב
  english_pob_reading: gods of gold
  chosen_spanish_reading: dioses de oro
  alternative_spanish_readings:
  - un dios de oro
  - el becerro de oro
  rationale: El hebreo es plural y el POB inglés documenta esa tensión con una nota. En español se conserva el plural para no borrar la forma textual, aun reconociendo que el relato contextualiza la idolatría con el becerro.
  doctrine_reference: Nota lexical del POB inglés sobre el plural hebreo
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y declara que no hubo cambios en la última pasada de revisión. Se mantuvo la decisión doctrinal del nombre divino en favor de «Yahvé» y se conservó la tensión lexical del plural «dioses de oro» en lugar de armonizarla al singular.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente pero moderno de la súplica con «Te ruego».
  - «Este pueblo» conserva el singular colectivo hebreo.
  - La repetición semántica de pecado se refleja con «ha cometido un gran pecado» para no perder la intensidad del original.
  - Se evitó la forma tradicional «SEÑOR» porque el proyecto requiere «Yahvé» para יְהוָה.
  - La nota al pie usa un marcador único y anclado en el texto con [a].
