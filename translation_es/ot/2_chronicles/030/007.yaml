translation:
  language: es
  text: No sean como sus padres ni como sus hermanos, que fueron infieles a Yahvé, el Dios de sus padres, y él los hizo desolación[a], como ustedes ven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «objeto de horror» o «de asombro»; el término hebreo puede denotar tanto devastación como el espectáculo espantoso que produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַל תִּהְיוּ
  english_pob_choice: Do not be
  chosen_spanish: No sean
  alternatives_spanish:
  - No lleguen a ser
  - No se comporten como
  lexicon: HALOT
  rationale: אַל con imperfecto expresa prohibición. «No sean» conserva el sentido estativo de no adoptar ese estado o semejanza, y suena natural en español bíblico contemporáneo.
- source_word: כַאֲבֹותֵיכֶם
  english_pob_choice: like your fathers
  chosen_spanish: como sus padres
  alternatives_spanish:
  - como sus antepasados
  - como vuestros padres
  lexicon: HALOT
  rationale: אָבוֹת puede significar «padres» o «antepasados». «Sus padres» mantiene el paralelismo con «sus hermanos» y la referencia generacional concreta sin perder el alcance de ascendencia.
- source_word: וְכַאֲחֵיכֶם
  english_pob_choice: and like your brothers
  chosen_spanish: ni como sus hermanos
  alternatives_spanish:
  - y como sus hermanos
  - ni como sus parientes
  lexicon: HALOT
  rationale: אָמח/אָח en este contexto preserva la fraternidad del pacto. En español, la coordinación negativa con «ni» fluye mejor tras «No sean» y mantiene el paralelo semítico.
- source_word: מָעֲלוּ
  english_pob_choice: were unfaithful
  chosen_spanish: fueron infieles
  alternatives_spanish:
  - obraron con traición
  - quebraron su fidelidad
  lexicon: HALOT
  rationale: מעל en contextos de pacto denota infidelidad o traición. «Fueron infieles» comunica esa fuerza relacional y religiosa de manera clara y no excesivamente técnica.
- source_word: בַּיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - contra Yahvé
  - para con Yahvé
  lexicon: HALOT
  rationale: El hebreo con מעל puede expresarse en español con «a» o «contra» según el giro. Aquí «fueron infieles a Yahvé» es idiomático y conserva el vínculo de lealtad quebrantada; se usa «Yahvé» según el estándar del proyecto para יהוה.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: La fórmula de pacto se conserva de forma bastante literal. «Padres» mantiene la resonancia bíblica del hebreo y enlaza con el sujeto anterior.
- source_word: וַיִּתְּנֵם
  english_pob_choice: he made them
  chosen_spanish: y él los entregó
  alternatives_spanish:
  - y los hizo
  - y los dejó
  lexicon: HALOT
  rationale: נתן en esta construcción con לְשַׁמָּה puede implicar entregar, poner o hacer pasar a un estado de ruina. «Los entregó» mantiene la idea de que Dios los puso en esa condición sin suavizar la agencia divina.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: a la desolación
  alternatives_spanish:
  - en desolación
  - a la ruina
  lexicon: HALOT
  rationale: שַׁמָּה denota desolación, devastación y, por extensión, una escena espantosa. «A la desolación» preserva el sustantivo y el efecto resultante; el matiz alternativo se deja reflejado en la nota.
- source_word: כַּאֲשֶׁר אַתֶּם רֹאִים
  english_pob_choice: as you see
  chosen_spanish: como ustedes ven
  alternatives_spanish:
  - como ustedes mismos ven
  - como pueden ver
  lexicon: HALOT
  rationale: La apelación es a una realidad visible y comprobable. «Como ustedes ven» es conciso, directo y fiel al presente observacional del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton. Conforme al estándar del proyecto, se preserva el nombre propio divino como «Yahvé» en vez de sustituirlo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de la cláusula final sobre desolación
  english_pob_reading: he made them a desolation
  chosen_spanish_reading: él los entregó a la desolación
  alternative_spanish_readings:
  - él los convirtió en desolación
  - él los dejó en desolación
  rationale: La secuencia hebrea permite una traducción de resultado, no de propósito. «Los entregó a la desolación» conserva la acción divina y evita introducir una causalidad no explicitada.
  doctrine_reference: 2 Chronicles 30:7 source syntax and applied revision pass
- issue: Matiz de לְשַׁמָּה
  english_pob_reading: an object of horror / astonishment
  chosen_spanish_reading: desolación con posible tono de horror o asombro
  alternative_spanish_readings:
  - horror
  - asombro
  - ruina
  rationale: El sustantivo puede designar desolación y también el efecto espantoso que produce. Se mantiene «desolación» en el texto y se preserva el matiz alternativo en nota para no borrar la tensión léxica.
  doctrine_reference: HALOT on שַׁמָּה
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó «so that he made them» por «and he made them» para reflejar con más fidelidad la secuencia hebrea. En español se siguió esa misma relación coordinada con «y él los entregó», sin introducir finalidad ni consecuencia adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se prefirió «fueron infieles a» para מעל por claridad idiomática y fidelidad al matiz de pacto.
  - «Desolación» conserva el sustantivo hebreo y la nota explica el posible matiz de horror/asombro.
  - El tono es bíblico y contemporáneo, sin depender de fórmulas tradicionales de ocultación del nombre divino.
