translation:
  language: es
  text: Acércate y oye[a] todo lo que Yahvé nuestro Dios diga, y tú nos dirás[b] todo lo que Yahvé nuestro Dios te diga; y oiremos y lo haremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «oye»; se conserva «oye» en vez de «escucha» para mantener la relación verbal con «oiremos» más adelante.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hablarás a nosotros»; se vierte «nos dirás» porque en este contexto de mediación expresa de manera natural en español la transmisión de las palabras de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרַב
  english_pob_choice: go near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven cerca
  - Arrímate
  - Acércate tú
  lexicon: HALOT
  rationale: El imperativo de קרב pide aproximarse. «Acércate» es natural en español y conserva la idea de acercarse para mediar ante Dios sin calco incómodo.
- source_word: וּשֲׁמָע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  - y oye atentamente
  lexicon: HALOT
  rationale: שמע aquí expresa recepción auditiva de la palabra de Dios. «Oye» mantiene la correspondencia con el contexto inmediato y con el posterior «oiremos», sin introducir «obedecer» en esta cláusula.
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: diga
  alternatives_spanish:
  - diga
  - dirá
  - esté diciendo
  lexicon: HALOT
  rationale: 'El imperfecto tras אֲשֶׁר en este contexto se vierte de forma natural con presente subjuntivo en español: «todo lo que Yahvé nuestro Dios diga». Conserva el valor de discurso directo futuro/continuado.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española estándar del proyecto, preservando el Tetragrámaton como nombre propio y no como título.
- source_word: תְּדַבֵּר אֵלֵינוּ
  english_pob_choice: you shall tell us
  chosen_spanish: tú hablarás a nosotros
  alternatives_spanish:
  - nos hablarás
  - nos dirás
  - nos comunicarás
  lexicon: HALOT
  rationale: דבר con אֶל/ל־ significa «hablar a». La lectura inglesa «tell us» es idiomática, pero en español «hablarás a nosotros» conserva mejor la estructura verbal y el matiz de mediación. Se evita «decir» porque podría estrechar indebidamente el verbo.
- source_word: יְדַבֵּר אֵלֶיךָ
  english_pob_choice: says to you
  chosen_spanish: te diga
  alternatives_spanish:
  - te diga
  - te hable
  - te declare
  lexicon: HALOT
  rationale: 'Se alinea con el primer hemistiquio: lo que Yahvé le diga a Moisés. «Te diga» preserva la equivalencia verbal con «diga» y el flujo del mandato.'
- source_word: וְשָׁמַעְנוּ
  english_pob_choice: and we will hear
  chosen_spanish: y oiremos
  alternatives_spanish:
  - y escucharemos
  - y atenderemos
  lexicon: HALOT
  rationale: Se conserva שׁמע como «oír» para mantener la conexión léxica con el primer verbo y dejar que la obediencia quede expresada en el siguiente miembro.
- source_word: וְעָשִׂינוּ
  english_pob_choice: and do it
  chosen_spanish: y lo haremos
  alternatives_spanish:
  - y lo haremos
  - y lo cumpliremos
  - y lo obedeceremos
  lexicon: HALOT
  rationale: עשה se traduce de forma transparente como «hacer». «Lo haremos» respeta el objeto implícito de las palabras recibidas y conserva la secuencia oír/hacer.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política del proyecto en español pide «Yahvé» como forma principal. Se preserva el nombre propio del pacto en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Tetragrámaton יְהוָה / YHWH'
- issue: Matiz de שׁמע en contexto de pacto
  english_pob_reading: hear rather than obey in both occurrences
  chosen_spanish_reading: oír / oiremos, no obedecer
  alternative_spanish_readings:
  - escuchar
  - obedecer
  rationale: 'El hebreo mantiene una secuencia deliberada: primero oír la palabra, luego hacerla. Traducir ambos שׁמע como «obedecer» borraría esa distinción semántica que el texto refuerza con וְעָשִׂינוּ («y lo haremos»).'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: imperativo directo («Go near»), consistencia léxica para יֹאמַר/יְדַבֵּר como «says», y preservación de la secuencia «hear and do». En español se ajusta eso con imperativo natural («Acércate»), paralelismo «diga/te diga» y cierre «oiremos y lo haremos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la terminología base del proyecto en español.
  - Se evita «obedecer» para שׁמע porque el versículo contrapone claramente oír y hacer.
  - «Lo haremos» mantiene el objeto implícito sin añadir explicación interpretativa.
  - Se mantiene un tono bíblico contemporáneo, claro y apto para lectura eclesial.
