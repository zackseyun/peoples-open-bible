translation:
  language: es
  text: 'Estos son los hijos de Zilpa, a quien Labán dio a Lea su hija, y ella dio a luz a estos a Jacob: dieciséis personas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “dieciséis almas”. En este contexto, el hebreo nephesh es una manera idiomática de contar personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos eran
  lexicon: HALOT
  rationale: La fórmula deíctica de apertura de lista genealógica se expresa naturalmente en presente en español. Mantiene el valor enumerativo sin volverla más pesada.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los niños de
  lexicon: HALOT
  rationale: En este contexto genealógico, בני conserva el sentido directo de descendencia masculina. En español, 'hijos' es la forma más fiel y natural para una lista familiar, aunque el conjunto contado al final incluya personas de la línea.
- source_word: זִלְפָּה
  english_pob_choice: Zilpah
  chosen_spanish: Zilpa
  alternatives_spanish:
  - Zilpá
  lexicon: Transliteración del nombre propio
  rationale: Se translitera el nombre propio al español de manera directa y sobria. Se prefiere 'Zilpa' para una lectura bíblica amplia en español.
- source_word: אֲשֶׁר נָתַן לָבָן לְלֵאָה בִתּוֹ
  english_pob_choice: whom Laban gave to Leah his daughter
  chosen_spanish: a quien Labán dio a Lea su hija
  alternatives_spanish:
  - que Labán dio a Lea su hija
  lexicon: HALOT
  rationale: El relativo se adapta a un español natural manteniendo la relación sintáctica del hebreo. 'A quien' conserva que el antecedente es una persona; 'su hija' refleja la apposición posesiva sin expandir el sentido.
- source_word: וַתֵּלֶד
  english_pob_choice: and she bore
  chosen_spanish: y ella dio a luz
  alternatives_spanish:
  - y ella parió
  - y ella engendró
  lexicon: HALOT
  rationale: En fórmulas genealógicas, ילד con sujeto femenino se vierte bien como 'dio a luz'. Es claro, digno y equivalente al valor narrativo del verbo.
- source_word: אֶת אֵלֶּה
  english_pob_choice: these
  chosen_spanish: a estos
  alternatives_spanish:
  - estos
  lexicon: HALOT
  rationale: El objeto directo personal en español suele requerir la preposición 'a'. El demostrativo retoma al grupo ya enumerado sin añadir sustantivo innecesario.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - a Jacob
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'to', en español la relación de filiación puede expresarse mejor como destinatario/finalidad con 'para'. Sin embargo, 'a Jacob' también sería posible; se mantiene 'para' para evitar un calco demasiado mecánico y conservar la función genealógica.
- source_word: שֵׁשׁ עֶשְׂרֵה
  english_pob_choice: sixteen
  chosen_spanish: dieciséis
  alternatives_spanish:
  - '16'
  lexicon: HALOT
  rationale: Número cardinal directo, sin necesidad de glosa.
- source_word: נָפֶשׁ
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - seres
  lexicon: HALOT
  rationale: En este contexto censal/genealógico, נֶפֶשׁ cuenta individuos. 'Personas' comunica ese valor sin introducir la ambigüedad teológica de 'almas' en español contemporáneo.
theological_decisions:
- issue: Cómo entender נָפֶשׁ al final del recuento
  english_pob_reading: ‘persons’; Hebrew nephesh here is an idiomatic way of counting persons.
  chosen_spanish_reading: ‘personas’; hebreo nephesh aquí es una manera idiomática de contar individuos.
  alternative_spanish_readings:
  - ‘almas’
  - ‘seres’
  rationale: No se espiritualiza el término. Se conserva el sentido idiomático de conteo, tal como lo señala el aparato inglés, para no sugerir una antropología distinta de la que exige el pasaje.
  doctrine_reference: Uso idiomático de נֶפֶשׁ en listas/censos; cf. uso bíblico de conteo de personas.
translation_notes:
  revision_awareness: 'La versión sigue el consenso alto del control cruzado y mantiene sin cambios sustanciales la lectura auditada: lista genealógica, relativo personal, verbo de parto en fórmula narrativa y conteo idiomático de נָפֶשׁ.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'hijos' por fidelidad genealógica; el recuento final se traduce con 'personas' para reflejar el hebreo idiomático sin forzar 'almas'.
  - Se opta por 'Labán' y 'Jacob' con transliteración estándar, y 'Lea' como forma española común del nombre.
