    text: Or 'Do not be too wicked.' The Hebrew includes a degree term, creating a deliberate tension with the surrounding context rather than approving any amount of wickedness.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in not your time.' That is, before your proper or expected time.
    reason: lexical_alternative
