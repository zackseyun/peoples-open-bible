    text: Or 'and my transgressions'; the Hebrew conjunction can be rendered either way in English.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often carrying the sense of loyal, covenantal love; alternatively, ''mercy'' or ''covenant love.'''
    reason: lexical_alternative
