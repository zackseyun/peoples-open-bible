base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/004/035.yaml
  text: But when Lysias saw the rout that had happened to his own force[a], and the boldness that had arisen in Judas’s men, and how they were ready either to live or to die nobly, he departed for Antioch, and recruited foreign troops, intending, after becoming stronger in number[b], to come again into Judea.
  footnotes:
  - marker: a
    text: Greek literally, 'the boldness of Judas'; the sense in context is the courage of Judas's side or forces, since the next clause uses the plural 'they were ready.'
    reason: lexical_alternative
  - marker: b
    text: Or 'recruited mercenaries.' The Greek verb emphasizes enlisting foreigners; whether they are specifically mercenaries is an interpretive refinement.
    reason: alternative_reading
