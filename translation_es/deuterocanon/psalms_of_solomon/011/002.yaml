review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en sus elementos principales: κηρύξατε = «Proclamen», ἐν Ἰερουσαλήμ = «en Jerusalén», φωνὴν εὐαγγελιζομένου = «la voz del que trae buenas nuevas», y ἠλέησεν = «ha mostrado misericordia». El punto principal a corregir es ἐν τῇ ἐπισκοπῇ αὐτῶν. «En su visita» es demasiado llano y puede sonar a visita humana común; además deja ambigua la dirección de αὐτῶν. El contexto y la auditoría inglesa piden conservar el sustantivo con resonancia de intervención/visitación divina, idealmente con nota aclaratoria.'
  spanish_quality_summary: El español es claro y digno, pero «su visita» rebaja la carga teológica/literaria de ἐπισκοπή. «Visitación» aquí, aunque algo más técnico, es comprensible en registro bíblico y preserva mejor la elección documentada del POB. También conviene ajustar la nota c para reflejar mejor la ambigüedad del genitivo/pronombre sin formular una lectura extraña como si Israel visitara a otro.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Dios» está bien. No aparecen Yahvé/Mesías/etc. La decisión clave es léxica-teológica: ἐπισκοπή debe mantenerse con un equivalente nominal de mayor densidad que «visita», y las notas deben conservar las alternativas documentadas («intervención», «supervisión/inspección») y la idea de cuidado atento.'
  issues:
  - severity: medium
    issue: «su visita» para ἐπισκοπῇ
    rationale: Aunque natural, «visita» suena demasiado cotidiana y pierde la resonancia de visitación/intervención divina que el inglés auditado quiso conservar con «visitation».
  - severity: medium
    issue: Ambigüedad insuficientemente controlada en «su visita» para αὐτῶν
    rationale: En español, «su» no aclara bien la relación con Israel y puede sonar posesivo simple. Una nota puede preservar la forma literal mientras explica que el contexto favorece la acción misericordiosa de Dios hacia Israel.
  - severity: low
    issue: 'Nota c formula una posibilidad poco feliz: «la visita de ellos / de Israel»'
    rationale: Esa redacción puede sugerir equivocadamente que Israel realiza la visita. Conviene explicar la ambigüedad de forma más precisa y menos engañosa.
  revised_spanish_text: 'Proclamen en Jerusalén la voz del que trae buenas nuevas: porque Dios ha mostrado misericordia a Israel en su visitación[a][b][c].'
  revised_footnotes:
