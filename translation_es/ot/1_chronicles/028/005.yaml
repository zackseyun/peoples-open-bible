    text: Or, 'the LORD gave me many sons.' The Hebrew clause is explanatory and may be rendered with either present-perfect or simple past in English.
    reason: lexical_alternative
  - marker: b
    text: '''The throne of the kingdom of the LORD'' emphasizes that Israel''s monarchy belongs ultimately to the LORD, even though Solomon is the human king.'
    reason: cross_reference
