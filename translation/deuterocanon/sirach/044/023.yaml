theological_decisions:
- issue: Referent of the masculine singular pronouns in the verse
  chosen_reading: The pronouns refer to Jacob/Israel, continuing the subject matter from the Greek parallel and the surrounding context.
  alternative_readings:
  - The pronouns could be taken more generally of the patriarchal recipient of blessing without naming him in the Hebrew line itself.
  rationale: The Hebrew text is elliptical, but the Greek parallel explicitly mentions 'the head of Jacob' and the broader context concerns the patriarchs and Israel's tribal inheritance. The English keeps the pronouns as in the Hebrew while translating in a way consistent with Jacob/Israel as the referent.
  doctrine_reference: Preserve theological tension rather than resolve it
