  language: en
  yaml_path: translation/ot/isaiah/039/001.yaml
  text: At that time Merodach-baladan son of Baladan[a], king of Babylon, sent letters and a gift to Hezekiah, for he heard that he had been sick and had recovered.
  footnotes:
