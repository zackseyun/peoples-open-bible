theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of מלאך in the comparison to the king
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: The comparison elevates the king's discernment by likening him to a divine being associated with extraordinary perception. 'Angel' best preserves that theological and literary force in this context.
