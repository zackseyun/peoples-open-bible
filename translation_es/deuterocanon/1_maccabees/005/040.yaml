translation:
  language: es
  text: 'Y Timoteo dijo a los comandantes de sus fuerzas, cuando Judas y su campamento se acercaban al wadi[a]: «Si él cruza primero hacia nosotros, no podremos resistirle[b], porque sin duda prevalecerá contra nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«wadi» reproduce el sentido del griego χειμάρρους: un torrente o cauce estacional, no necesariamente un río permanente.'
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «no podremos estar de pie contra él». El sentido es que Judas los vencerá en combate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρχουσιν
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - líderes
  - oficiales
  - jefes
  lexicon: BDAG
  rationale: En este contexto militar, ἄρχουσιν designa a quienes mandan sobre tropas. «Comandantes» comunica bien la función de mando sin introducir una jerarquía más específica de la que el griego no obliga.
- source_word: δυνάμεως
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - ejército
  - tropas
  - poder
  lexicon: BDAG
  rationale: La expresión apunta a la fuerza armada de Timoteo. «Fuerzas» conserva el sentido colectivo militar y evita precisar indebidamente «ejército» como unidad formal.
- source_word: ἐν τῷ ἐγγίζειν
  english_pob_choice: when ... were drawing near
  chosen_spanish: cuando ... se acercaban
  alternatives_spanish:
  - al acercarse
  - mientras se acercaban
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa temporalidad contemporánea. «Cuando ... se acercaban» es natural en español y mantiene el valor de simultaneidad.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de guerra
  - campamento
  lexicon: BDAG
  rationale: Aquí παρεμβολή nombra el grupo acampado junto con su campamento. «Campamento» resulta claro en español y refleja bien el conjunto móvil de combatientes.
- source_word: χειμάρρουν τοῦ ὕδατος
  english_pob_choice: wadi
  chosen_spanish: wadi
  alternatives_spanish:
  - rambla
  - cauce seco
  - torrente
  lexicon: LSJ
  rationale: La frase griega describe un torrente estacional o cauce de agua; «wadi» preserva ese sentido topográfico sin convertirlo en un río regular. En español bíblico moderno es comprensible con apoyo de nota.
- source_word: διαβῇ
  english_pob_choice: crosses over
  chosen_spanish: pasa primero hacia nosotros
  alternatives_spanish:
  - cruza
  - atraviesa
  - pasa al otro lado
  lexicon: BDAG
  rationale: El verbo indica cruzar de un lado a otro. «Pasa primero hacia nosotros» recoge la prioridad del movimiento en el contexto bélico y mantiene el sentido direccional.
- source_word: ὑποστῆναι
  english_pob_choice: withstand
  chosen_spanish: resistirle
  alternatives_spanish:
  - hacerle frente
  - sostenernos contra él
  - resistir
  lexicon: BDAG
  rationale: Aquí el verbo significa mantenerse firme frente a un enemigo. «Resistirle» es breve, natural y conserva la idea de no poder hacerle frente en combate.
- source_word: δυνήσεται πρὸς ἡμᾶς
  english_pob_choice: he will surely prevail against us
  chosen_spanish: sin duda prevalecerá contra nosotros
  alternatives_spanish:
  - podrá contra nosotros
  - será capaz contra nosotros
  - nos vencerá
  lexicon: BDAG
  rationale: La construcción griega es compacta e idiomática, literalmente «podrá contra nosotros». «Prevalecerá contra nosotros» expresa el resultado militar esperado sin borrar la tensión lexical de la capacidad/poder del verbo.
- source_word: Τιμόθεος
  english_pob_choice: Timotheus
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timoteo
  lexicon: LSJ
  rationale: En español bíblico y cristiano, el nombre propio se comunica de forma más transparente como «Timoteo». Aunque el griego es Τιμόθεος, la adaptación usual en español facilita la lectura sin cambiar la identidad del personaje.
- source_word: Ἰούδαν
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: El referente es Judas Macabeo, no la tribu ni el territorio de Judá. «Judas» conserva la identificación personal tradicional y evita ambigüedad.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete y el audit trail inglés, respetando la revisión que simplifica la expresión topográfica a «wadi». Se mantuvo la tensión de ὑποστῆναι y δυνήσεται mediante «resistirle» / «prevalecerá contra nosotros», evitando una paráfrasis que borre el matiz de capacidad y superioridad militar.
  spanish_consistency_notes:
  - Se emplea «Timoteo» como forma española estándar del nombre propio, con correspondencia clara al griego Τιμόθεος.
  - Se traduce la topografía como «wadi» siguiendo el criterio auditado del inglés POB para χειμάρρους, con nota explicativa.
  - 'Se conserva el paralelismo bélico de los dos verbos finales: incapacidad de resistir y victoria efectiva del adversario.'
