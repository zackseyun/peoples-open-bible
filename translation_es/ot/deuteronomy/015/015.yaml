translation:
  language: es
  text: Y recordarás que fuiste esclavo[a] en la tierra de Egipto, y Yahvé tu Dios te redimió[b]; por eso yo te mando esto[c] hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo»; el hebreo עֶבֶד puede denotar ambas ideas, pero aquí el contexto de la esclavitud de Egipto hace más fuerte «esclavo».
    reason: lexical_alternative
  - marker: b
    text: O «te rescató». El verbo hebreo expresa la idea de rescatar o redimir sacando de la servidumbre.
    reason: lexical_alternative
  - marker: c
    text: Heb. «esta cosa»; es decir, la instrucción que se está dando aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: And you shall remember
  chosen_spanish: Y recordarás
  alternatives_spanish:
  - Y te acordarás
  - Y debes recordar
  lexicon: HALOT
  rationale: La forma verbal en contexto legal exhortativo funciona como mandato fundado en memoria del pacto. «Recordarás» conserva el valor injuntivo sin volverlo pesado, y mantiene el enlace con la cláusula anterior.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: En el marco de Egipto, el término destaca la condición de servidumbre forzada y opresiva. «Esclavo» preserva esa fuerza social e histórica mejor que «siervo».
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión concreta y bíblica «tierra de Egipto», que mantiene el tono histórico-covenantal del hebreo.
- source_word: וַיִּפְדְּךָ
  english_pob_choice: redeemed you
  chosen_spanish: te redimió
  alternatives_spanish:
  - te rescató
  - te rescató de la esclavitud
  - te ransomó
  lexicon: HALOT
  rationale: «Redimió» reproduce el valor de פדה en clave de liberación mediante rescate, manteniendo la resonancia teológica del término sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el Nombre divino, evitando la sustitución por una forma disfrazada como «SEÑOR».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el mismo
  lexicon: HALOT
  rationale: La construcción posesiva directa se traduce de manera natural y precisa como «tu Dios».
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - por consiguiente
  lexicon: HALOT
  rationale: Se usa una inferencia clara y idiomática en español. «Por eso» conserva la relación causal entre la redención y el mandato.
- source_word: אָנֹכִי מְצַוְּךָ
  english_pob_choice: I am commanding you
  chosen_spanish: yo te mando
  alternatives_spanish:
  - yo te estoy mandando
  - yo te ordeno
  lexicon: HALOT
  rationale: El participio en contexto exhortativo expresa una acción en curso o enfatizada. «Yo te mando» suena natural en español formal y conserva la fuerza de mandato.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  - este mandato
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa que evitó «thing» por naturalidad, en español «esto» resulta más idiomático y preserva la referencia deíctica amplia del hebreo sin introducir una glosa interpretativa.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y directo del marcador temporal, manteniendo la inmediatez del encargo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se preserva el Nombre propio con «Yahvé» en vez de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: עֶבֶד en el recuerdo de Egipto
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La memoria de la opresión egipcia exige conservar la carga de sometimiento. «Esclavo» comunica mejor la dureza histórica y la motivación ética del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested bonded-status terms
- issue: אֶת הַדָּבָר הַזֶּה
  english_pob_reading: this today
  chosen_spanish_reading: esto hoy
  alternative_spanish_readings:
  - este mandato hoy
  - esta instrucción hoy
  rationale: La revisión inglesa muestra que el inglés natural puede omitir «thing» sin perder el referente. En español, «esto» mantiene la deixis abierta sin forzar una interpretación más específica de la que da el hebreo.
  doctrine_reference: Applied revision note in source audit trail
- issue: וַיִּפְדְּךָ
  english_pob_reading: redeemed you
  chosen_spanish_reading: te redimió
  alternative_spanish_readings:
  - te rescató
  - te rescató de la esclavitud
  rationale: «Redimió» mantiene el campo semántico de rescate/liberación con resonancia pactal. No se reduce a un simple liberarse, para no perder la dimensión teológica del verbo.
  doctrine_reference: HALOT; covenant-redemption usage
translation_notes:
  revision_awareness: 'El auditor inglés retuvo el sentido de אֶת־הַדָּבָר הַזֶּה con una forma más natural («this today») tras una revisión que eliminó «thing». La redacción española sigue esa misma prudencia: usa «esto» para mantener la deixis del hebreo sin una glosa excesivamente literal. También se conservó el énfasis del mandato y la fuerza de la redención, y se reflejó el Nombre divino con la forma proyectual «Yahvé».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se mantiene «esclavo» en lugar de «siervo» por el peso contextual de la liberación de Egipto.
  - «Redimió» conserva la dimensión de rescate/covención del verbo פדה.
  - La deixis breve «esto» evita añadir contenido no explícito en el hebreo.
  - El tono general es formal y bíblico, pero con sintaxis natural en español.
