    text: Greek literally repeats a phrase that can mean 'behind you'; in context it is best understood idiomatically as 'before you' or 'in your presence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'may it be accepted before you.' The Greek verb can carry sacrificial atonement/appeasement force.
    reason: alternative_reading
