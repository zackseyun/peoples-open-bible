    text: O «confiesen a Dios» o «alaben a Dios»; el verbo griego puede abarcar reconocimiento expresado en agradecimiento o alabanza.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y la fidelidad idiomática del español: «subo hacia el que me envió» representa mejor ἀναβαίνω πρὸς que «voy a subir al que me envió», evitando un giro coloquial y manteniendo la imagen de ascenso. También se cambió «ha sido llevado a término» por «ha sido cumplido», que sigue reflejando la idea de hechos completados/acabados de συντελεσθέντα pero con mejor legibilidad en español bíblico moderno.'
