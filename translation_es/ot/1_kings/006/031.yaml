translation:
  language: es
  text: Para la entrada del santuario interior hizo puertas de madera de olivo[a]; los postes de la puerta y las jambas eran de cinco lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los postes de la puerta y las jambas eran una quinta parte», una traducción tradicional pero arquitectónicamente oscura de la frase final.
    reason: alternative_reading
lexical_decisions:
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - entrada
  - acceso
  - umbral
  lexicon: HALOT
  rationale: פֶּתַח nombra la apertura o el acceso, no las hojas de la puerta. «Entrada» conserva esa distinción frente a las «puertas» que siguen.
- source_word: הַדְּבִיר
  english_pob_choice: the inner sanctuary
  chosen_spanish: santuario interior
  alternatives_spanish:
  - recinto interior
  - sala interior
  - lugar santísimo
  lexicon: HALOT
  rationale: En contexto del templo, דְּבִיר señala la cámara más interna. «Santuario interior» mantiene claridad moderna sin imponer de forma automática una denominación litúrgica más específica.
- source_word: דַּלְתּוֹת
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - hojas de la puerta
  - portones
  lexicon: HALOT
  rationale: El plural hebreo alude a las hojas/puertas del acceso; «puertas» es natural en español y conserva el valor arquitectónico.
- source_word: עֲצֵי שָׁמֶן
  english_pob_choice: olivewood
  chosen_spanish: madera de olivo
  alternatives_spanish:
  - madera de olivo
  - madera de aceituno
  - olivo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para el material de olivo. «Madera de olivo» suena natural en español y evita un calco opaco.
- source_word: הָאַיִל
  english_pob_choice: the doorposts
  chosen_spanish: los postes
  alternatives_spanish:
  - el marco
  - los montantes
  - los postes de la puerta
  lexicon: HALOT
  rationale: Aquí אַיִל puede designar el conjunto estructural del acceso. «Postes» funciona bien con la mención paralela de las jambas y conserva la referencia arquitectónica amplia.
- source_word: מְזוּזוֹת
  english_pob_choice: jambs
  chosen_spanish: jambas
  alternatives_spanish:
  - marcos laterales
  - postes laterales
  - umbrales
  lexicon: HALOT
  rationale: «Jambas» es el término español técnico correspondiente a los elementos laterales de una puerta y preserva la distinción con הָאַיִל.
- source_word: חֲמִשִׁית
  english_pob_choice: were five-sided
  chosen_spanish: eran de cinco caras
  alternatives_spanish:
  - eran pentagonales
  - eran de cinco lados
  - eran una quinta parte
  lexicon: HALOT
  rationale: La frase final es breve y arquitectónicamente difícil. «De cinco caras» comunica la forma con menos interpretación que «quinta parte», sin borrar la tensión del hebreo.
theological_decisions:
- issue: Terminología del espacio sagrado más interno
  english_pob_reading: the inner sanctuary
  chosen_spanish_reading: santuario interior
  alternative_spanish_readings:
  - lugar santísimo
  - recinto interior
  rationale: No hay en este versículo una fórmula doctrinal explícita; la decisión es espacial/arquitectónica. «Santuario interior» refleja el hebreo sin cargar el texto con una terminología posterior que el verso no exige.
  doctrine_reference: Templo/santuario en 1 Reyes 6; distinción arquitectónica del recinto más interno.
translation_notes:
  revision_awareness: 'El texto inglés final permanece sin cambios respecto del pasaje auditado: mantiene «entrance / inner sanctuary / olivewood» y la nota alternativa sobre la cláusula final oscura. La versión española sigue esa misma línea, conservando la ambigüedad arquitectónica del último miembro sin resolverla de manera más fuerte de lo que el hebreo permite.'
  spanish_consistency_notes:
  - Uso de «Yahvé» no aplica en este versículo.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una cita directa con κύριος.
  - «Santuario interior» se mantiene consistente con el valor espacial del hebreo y con el inglés auditado.
  - La nota a conserva la lectura alternativa tradicional sin convertirla en la lectura principal.
