translation:
  language: es
  text: Nosotros también nos impusimos la obligación de dar cada año un tercio de un siclo para el servicio de la casa de nuestro Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nos impusimos también obligaciones de dar un tercio de un siclo cada año».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱמַדְנוּ
  english_pob_choice: we also laid
  chosen_spanish: nosotros también nos impusimos
  alternatives_spanish:
  - también establecimos
  - también nos impusimos sobre nosotros
  lexicon: HALOT
  rationale: El hifil de עמד aquí expresa poner o imponer algo sobre uno mismo. «Nos impusimos» conserva la idea de autoimposición requerida por el contexto y suena natural en español; «también» refleja el וְ enfático/consecutivo del verso.
- source_word: עָלֵינוּ
  english_pob_choice: on ourselves
  chosen_spanish: nos
  alternatives_spanish:
  - sobre nosotros
  - a nosotros mismos
  lexicon: HALOT
  rationale: La repetición de על con sufijo de 1cp subraya que la carga fue asumida por la comunidad. En español, el verbo pronominal ya lleva esa fuerza, así que se integra sin recargar la frase.
- source_word: מִצְוֺת
  english_pob_choice: the obligation
  chosen_spanish: la obligación
  alternatives_spanish:
  - el mandamiento
  - las obligaciones
  - la ordenanza
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, aquí funciona como una obligación vinculante que el pueblo se impone. «Obligación» preserva la tensión del POB inglés entre mandato y carga asumida, sin estrecharlo a una fórmula eclesiástica.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: de dar
  alternatives_spanish:
  - para dar
  - para entregar
  - de pagar
  lexicon: HALOT
  rationale: El infinitivo de נתן es «dar». En español, «de dar» encaja mejor con «nos impusimos la obligación» y mantiene la relación de finalidad/objeto sin convertirlo interpretativamente en «pagar».
- source_word: שְׁלִשִׁית הַשֶּׁקֶל
  english_pob_choice: a third of a shekel
  chosen_spanish: un tercio de siclo
  alternatives_spanish:
  - un tercio de un siclo
  - una tercera parte de siclo
  lexicon: HALOT
  rationale: La expresión es una fracción monetaria. «Un tercio de siclo» refleja con precisión la construcción hebrea y evita una calca menos natural como «un tercero de shekel».},{
theological_decisions:
- issue: Naturaleza de la carga asumida en מִצְוֺת
  english_pob_reading: a self-imposed obligation to give annually for the temple service
  chosen_spanish_reading: una obligación autoimpuesta de dar cada año para el servicio del templo
  alternative_spanish_readings:
  - un mandamiento autoimpuesto
  - unas ordenanzas
  rationale: El texto no describe una donación voluntaria genérica, sino una obligación comunitaria asumida solemnemente. «Obligación» preserva esa fuerza jurídica y comunitaria sin borrar el carácter de compromiso religioso.
  doctrine_reference: Translation philosophy §1, §5
- issue: בית אלהינו como expresión cultual
  english_pob_reading: the house of our God
  chosen_spanish_reading: la casa de nuestro Dios
  alternative_spanish_readings:
  - el templo de nuestro Dios
  - la casa de Dios
  rationale: Se conserva la imagen literal del hebreo, que en contexto cultual apunta al lugar de servicio y adoración. «Casa» mantiene mejor la correspondencia fuente-texto que «templo», aunque ambas son contextualmente posibles.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue el ajuste del POB inglés que prefirió «obligation» frente a «commandment» por mayor naturalidad contextual. En español, ese mismo ajuste se refleja con «obligación», manteniendo la idea de carga asumida sin suavizarla. También se conservó la periodicidad anual y la referencia literal a la casa de Dios.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהֵינוּ según el estándar del proyecto.
  - Se usa «siclo» como término español idiomático para la unidad monetaria del texto.
  - Se mantiene «casa de nuestro Dios» para conservar la imagen cultual del hebreo.
  - La nota a pie queda anclada en el texto con [a] para evitar ambigüedad de variante.
