id: TIT.1.1
reference: Titus 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος δοῦλος θεοῦ, ἀπόστολος δὲ Ἰησοῦ Χριστοῦ κατὰ πίστιν ἐκλεκτῶν θεοῦ καὶ ἐπίγνωσιν ἀληθείας τῆς κατ’ εὐσέβειαν
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/001.yaml
  text: Paul[a], a slave of God and an apostle of Jesus Messiah, for the faith of God’s chosen ones and the knowledge of the truth that accords with godliness[c][b],
  footnotes:
  - marker: a
    text: Or 'God’s elect.'
    reason: lexical_alternative
  - marker: b
    text: Or 'full knowledge of the truth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the truth which leads to godliness.'
    reason: alternative_reading
translation:
  language: ko
  text: 하나님의 노예[a]요 예수 메시아의 사도인 바울은, 하나님께서 택하신 자들[b]의 믿음과 경건에 부합하는 진리의 온전한 지식[c]을 위하여 부름받았습니다 —
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「종」. 헬라어 δοῦλος는 단순한 봉사자가 아니라 주인에게 매인 자를 가리킨다. 영어 POB가 「slave」로 옮겨 매임의 신학적 무게를 드러낸 결정을 한국어에서도 「노예」로 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님의 선민」. ἐκλεκτοί는 하나님께서 친히 택하신 백성을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「경건으로 이끄는 진리의 지식」. 헬라어 κατ’ εὐσέβειαν은 진리가 경건에 「부합하는」 의미와 「이끄는」 의미 모두로 읽힐 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 하인
  lexicon: BDAG
  rationale: 영어 POB가 바울의 자기 칭호 δοῦλος θεοῦ에서 매임(bonded status)의 신학적 무게를 살리기 위해 「slave」를 택했으므로, 한국어에서도 같은 무게를 살려 「노예」를 택한다. 한국 전통의 「종」은 친숙하지만 매임의 어감이 약하다.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 보냄받은 자
  - 사절
  lexicon: BDAG
  rationale: 바울의 위임된 직무를 가리키는 정립된 한국어 어휘.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: Χριστός의 칭호성을 살린다. 「그리스도」는 음역으로 굳어져 칭호의 무게가 가려진다.
- source_word: ἐκλεκτῶν θεοῦ
  english_pob_choice: God’s chosen ones
  chosen_korean: 하나님께서 택하신 자들
  alternatives_korean:
  - 하나님의 선민
  - 하나님의 택하신 자들
  lexicon: BDAG
  rationale: 능동 관계절로 풀어 하나님의 주권적 택하심을 드러낸다.
- source_word: ἐπίγνωσιν ἀληθείας
  english_pob_choice: knowledge of the truth
  chosen_korean: 진리의 온전한 지식
  alternatives_korean:
  - 진리에 관한 지식
  - 진리를 아는 일
  lexicon: BDAG
  rationale: ἐπί- 접두는 강조적 지식(full/recognitional knowledge)의 어감을 가진다. 영어 POB는 본문에서 「knowledge」로, 각주로 「full knowledge」를 두었다. 한국어에서는 「온전한 지식」으로 살려도 의미가 자연스럽다.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_korean: 경건
  alternatives_korean:
  - 경외
  - 신앙심
  lexicon: BDAG
  rationale: 목회서신의 핵심 덕목 εὐσέβεια의 정립된 한국어 어휘.
- source_word: κατὰ πίστιν ... καὶ ἐπίγνωσιν
  english_pob_choice: for the faith ... and the knowledge
  chosen_korean: 믿음과 ... 지식을 위하여
  alternatives_korean:
  - 믿음과 ... 지식에 따라
  - 믿음과 ... 지식을 따라
  lexicon: BDAG
  rationale: κατά + 대격은 여기서 목적·기준의 의미를 가진다. 영어 POB의 「for」를 따라 사도직의 목적성을 살린다.
