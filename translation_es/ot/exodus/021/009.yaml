translation:
  language: es
  text: Pero si la destina para su hijo, la tratará conforme al derecho de las hijas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según la costumbre para las hijas». La expresión hebrea puede referirse al derecho establecido o al trato consuetudinario debido a las hijas; aquí se conserva el matiz jurídico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En una secuencia legal casuística, ‘Pero si’ mantiene el giro contrastivo de la cláusula anterior y fluye naturalmente en español.
- source_word: לִבְנוֹ
  english_pob_choice: for his son
  chosen_spanish: para su hijo
  alternatives_spanish:
  - a su hijo
  - para el hijo de él
  lexicon: HALOT
  rationale: La preposición ל en este contexto indica asignación o destinación en una situación de matrimonio; ‘para su hijo’ conserva esa función sin sonar forzado.
- source_word: יִיעָדֶנָּה
  english_pob_choice: designates her
  chosen_spanish: la destina
  alternatives_spanish:
  - la designa
  - la asigna
  - la desposa
  lexicon: HALOT
  rationale: ‘Destina’ preserva la idea de asignación formal y el trasfondo legal. ‘Designa’ es posible, pero en español puede sonar más abstracto; ‘desposa’ explicaría más de lo que el verbo exige.
- source_word: כְּמִשְׁפַּט
  english_pob_choice: according to the rights of
  chosen_spanish: conforme al derecho de
  alternatives_spanish:
  - según el derecho de
  - conforme a la norma de
  - según la costumbre de
  lexicon: HALOT
  rationale: מִשְׁפָּט en un contexto jurídico apunta a derecho, norma o debido legal. ‘Conforme al derecho de’ preserva la fuerza jurídica que el POB inglés quiso evitar diluir en ‘custom’.
- source_word: הַבָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - las hijas de la casa
  - las muchachas
  - las jóvenes
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘las hijas’. En español, el plural femenino ‘las hijas’ mantiene la referencia directa y el valor social/jurídico del término.
- source_word: יַעֲשֶׂה לָּהּ
  english_pob_choice: he shall deal with her
  chosen_spanish: la tratará
  alternatives_spanish:
  - procederá con ella
  - hará con ella
  - actuará respecto de ella
  lexicon: HALOT
  rationale: La construcción עשה + ל expresa acción hacia alguien. ‘La tratará’ es idiomático en español legal y suficientemente amplio para abarcar las obligaciones implícitas sin precisar de más.
theological_decisions:
- issue: Naturaleza del deber hacia la joven destinada al hijo
  english_pob_reading: The verse requires that she be treated with the legal standing and protections due a daughter.
  chosen_spanish_reading: La norma exige que reciba el trato y el estatus legal debidos a una hija.
  alternative_spanish_readings:
  - La norma se limita a costumbres matrimoniales asociadas con las hijas.
  - Debe recibir un trato familiar, no necesariamente una protección jurídica específica.
  rationale: כְּמִשְׁפַּט הַבָּנוֹת sugiere una pauta jurídica/de derecho, no solo una costumbre social. ‘Derecho de las hijas’ o ‘trato y estatus legal debidos a una hija’ conserva esa tensión legal sin añadir doctrinas posteriores.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
translation_notes:
  revision_awareness: 'Coincide con el juicio de alta concordancia del control previo: no se requieren cambios sustantivos. La versión española mantiene la lectura jurídica de כמשפט y evita rebajarla a simple costumbre.'
  spanish_consistency_notes:
  - Se preserva ‘Yahvé’ como norma general del proyecto, pero este versículo no lo contiene.
  - Se mantiene un registro jurídico claro y natural, evitando ‘siervo’/‘esclavo’ porque no aparecen en este verso.
  - ‘Hijas’ traduce literalmente הַבָּנוֹת y conserva la base legal de la cláusula.
