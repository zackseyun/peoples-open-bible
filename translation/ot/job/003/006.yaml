id: JOB.3.6
reference: Job 3:6
source:
  edition: WLC
  text: הַ/לַּ֥יְלָה הַ/הוּא֮ יִקָּחֵ֪/ה֫וּ אֹ֥פֶל אַל יִ֭חַדְּ בִּ/ימֵ֣י שָׁנָ֑ה בְּ/מִסְפַּ֥ר יְ֝רָחִ֗ים אַל יָבֹֽא־־׃
translation:
  text: As for that night[a], let darkness seize it; let it not rejoice among the days of the year; let it not enter into the number of the months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let it not be joined to the days of the year.' The Hebrew verb is rare here, and some understand it as exclusion from the calendar rather than lack of rejoicing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלַּיְלָה הַהוּא
  chosen: As for that night
  alternatives:
  - That night
  - As for that night
  lexicon: HALOT
  rationale: The phrase is fronted for emphasis. 'As for that night' preserves the marked topicalization better than a flat 'That night,' while remaining natural English.
- source_word: יִקָּחֵהוּ
  chosen: let ... seize it
  alternatives:
  - take it
  - claim it
  - capture it
  lexicon: HALOT
  rationale: From לקח, literally 'take.' In context of darkness overtaking a night, 'seize it' conveys hostile possession more vividly and idiomatically than 'take it,' without over-paraphrasing.
- source_word: אֹפֶל
  chosen: darkness
  alternatives:
  - gloom
  - deep darkness
  lexicon: HALOT
  rationale: אֹפֶל denotes darkness/gloom. 'Darkness' is the broad, clear rendering; 'gloom' is possible but slightly more interpretive. The personified force of darkness is retained by the verb 'seize.'
- source_word: אַל יִחַדְּ
  chosen: let it not rejoice
  alternatives:
  - let it not be joined
  - let it not be glad
  - let it not unite itself
  lexicon: HALOT
  rationale: The verb יחד in this rare usage is commonly understood in context as expressing joyful participation or inclusion. 'Rejoice' fits the parallelism with exclusion from the calendar and matches the curse context better than a wooden 'be joined.' Because the sense is debated, an alternative is preserved in a footnote.
- source_word: בִּימֵי שָׁנָה
  chosen: among the days of the year
  alternatives:
  - with the days of the year
  - in the days of the year
  lexicon: HALOT
  rationale: The preposition ב here is best rendered idiomatically as inclusion within a set. 'Among the days of the year' communicates the sense of belonging to the yearly cycle.
- source_word: בְּמִסְפַּר יְרָחִים
  chosen: into the number of the months
  alternatives:
  - among the months
  - in the count of the months
  lexicon: HALOT
  rationale: This phrase speaks of being counted within the months. 'Into the number of the months' preserves the counting imagery more closely than the simpler 'among the months.'
- source_word: אַל יָבֹא
  chosen: let it not enter
  alternatives:
  - let it not come
  - let it not be included
  lexicon: HALOT
  rationale: בוא literally means 'come/enter.' With 'number of the months,' 'enter' naturally expresses admission into a reckoning or register.
