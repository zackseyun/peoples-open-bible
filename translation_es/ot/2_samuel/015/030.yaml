translation:
  language: es
  text: Y David subía por la cuesta del monte de los Olivos, subiendo[a] y llorando, con la cabeza cubierta, e iba descalzo. Y todo el pueblo que estaba con él, cada uno se cubrió la cabeza[b], y subían, llorando mientras iban[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite «subiendo» para dar énfasis y vividez.
    reason: lexical_alternative
  - marker: b
    text: O «cada hombre se cubrió la cabeza»; el hebreo usa un singular distributivo.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite al final la idea de subir y llorar: «subieron, subiendo y llorando»; el español lo expresa de forma natural como «subían, llorando mientras iban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֵה הַזֵּיתִים
  english_pob_choice: the ascent of the Mount of Olives
  chosen_spanish: la subida del monte de los Olivos
  alternatives_spanish:
  - la cuesta del monte de los Olivos
  - la subida del monte de las aceitunas
  lexicon: HALOT
  rationale: מַעֲלֵה expresa una subida, un ascenso o pendiente; en español, «subida» conserva esa idea topográfica de manera natural. «monte de los Olivos» es el nombre establecido del lugar, y evita un calco como «de las aceitunas» que oscurecería el topónimo.
- source_word: עֹלֶה ... עֹלֶה וּבוֹכֶה
  english_pob_choice: was going up ... going up and weeping
  chosen_spanish: subía ... subiendo y llorando
  alternatives_spanish:
  - iba subiendo ... y llorando
  - ascendía ... ascendiendo y llorando
  lexicon: HALOT
  rationale: El hebreo usa participios repetidos para dar acción continua y énfasis. «subía / subiendo» mantiene ese valor durativo y la repetición audible sin forzar una traducción excesivamente literal.
- source_word: בֹּכֶה
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - lamentando
  - sollozando
  lexicon: HALOT
  rationale: «Llorando» comunica el sentido emocional y físico básico de manera directa. «Lamentando» introduciría un matiz más formal o ritual que el texto no exige.
- source_word: וְרֹאשׁ לֹו חָפוּי
  english_pob_choice: with his head covered
  chosen_spanish: con la cabeza cubierta
  alternatives_spanish:
  - y con la cabeza cubierta
  - con la cabeza tapada
  lexicon: HALOT
  rationale: La expresión describe una postura de duelo. «Con la cabeza cubierta» conserva el estado resultante sin especificar de más el tipo de cobertura.
- source_word: יָחֵף
  english_pob_choice: barefoot
  chosen_spanish: descalzo
  alternatives_spanish:
  - con los pies descalzos
  - sin calzado
  lexicon: HALOT
  rationale: «Descalzo» es el equivalente natural y claro en español moderno, y preserva la imagen de andar sin calzado.
- source_word: כָּל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: all the people who were with him
  chosen_spanish: todo el pueblo que estaba con él
  alternatives_spanish:
  - toda la gente que estaba con él
  - todo el pueblo que iba con él
  lexicon: HALOT
  rationale: «Pueblo» refleja el sentido colectivo amplio de הָעָם sin restringir indebidamente a un grupo militar. «Que estaba con él» expresa bien la compañía continua.
- source_word: חָפוּ אִישׁ רֹאשׁוֹ
  english_pob_choice: each covered his head
  chosen_spanish: cubría cada uno su cabeza
  alternatives_spanish:
  - cada uno cubría su cabeza
  - cada hombre cubría su cabeza
  lexicon: HALOT
  rationale: 'El hebreo usa un singular distributivo: «cada uno». En español, «cubría cada uno su cabeza» comunica esa distribución con naturalidad y mantiene el paralelismo con el duelo de David.'
- source_word: וְעָלוּ עָלֹה וּבָכֹה
  english_pob_choice: they went up, weeping as they went
  chosen_spanish: subían, llorando mientras iban
  alternatives_spanish:
  - iban subiendo, llorando al ir
  - subían, llorando al caminar
  lexicon: HALOT
  rationale: La construcción hebrea intensifica y prolonga la acción. «Llorando mientras iban» conserva el movimiento y la simultaneidad del llanto sin repetir mecánicamente el verbo «subir» hasta el punto de sonar forzado.
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo con apoyo del audit trail en inglés. Se mantuvo la progresión continua y el paralelismo de duelo, pero se evitó una repetición demasiado rígida en el cierre, en línea con la revisión inglesa más natural («weeping as they went»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «monte de los Olivos» se conserva como topónimo establecido.
  - Se usó «descalzo» en lugar de una perífrasis más técnica por claridad y naturalidad.
  - La repetición verbal del hebreo se refleja mediante progresivos españoles y una nota de énfasis.
