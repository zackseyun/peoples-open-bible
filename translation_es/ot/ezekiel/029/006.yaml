translation:
  language: es
  text: Entonces todos los habitantes de Egipto sabrán que yo soy Yahvé, porque fueron un bastón de caña[a] para la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una vara de caña». La imagen hebrea es de algo usado como apoyo, pero demasiado débil para sostener peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then ... will know
  chosen_spanish: Entonces ... sabrán
  alternatives_spanish:
  - Y ... sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: El waw consecutivo en discurso profético expresa consecuencia y avance del juicio; «Entonces» comunica bien esa relación. «Sabrán» mantiene el valor de ידע en la fórmula de reconocimiento de Ezequiel.
- source_word: כָּל יֹשְׁבֵי מִצְרַיִם
  english_pob_choice: all the inhabitants of Egypt
  chosen_spanish: todos los habitantes de Egipto
  alternatives_spanish:
  - todos los que habitan en Egipto
  - todos los residentes de Egipto
  lexicon: HALOT
  rationale: «Habitantes» es natural en español moderno y conserva el sentido colectivo de los que moran en Egipto.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy Yahweh
  - que yo soy el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino como «Yahvé» en el texto principal, conforme a la pauta del proyecto, preservando la fórmula de reconocimiento de Ezequiel sin enmascararla con «SEÑOR».
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón del juicio y «porque» es la equivalencia más clara y natural en español contemporáneo.
- source_word: הֱיוֹתָם
  english_pob_choice: they were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - por haber sido
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo se vierte de forma natural como cláusula finita en español; «fueron» conserva la relación causal del pasaje.
- source_word: מִשְׁעֶנֶת קָנֶה
  english_pob_choice: a staff of reed
  chosen_spanish: una vara de caña
  alternatives_spanish:
  - una caña como vara
  - una vara de junco
  lexicon: HALOT
  rationale: La imagen es de un apoyo frágil e inservible; «vara de caña» reproduce la metáfora con un español bíblico claro y evita añadir explicación interpretativa al cuerpo del texto.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - a la casa de Israel
  - en favor de la casa de Israel
  lexicon: HALOT
  rationale: El ל expresa relación/beneficio en este contexto; «para» suena natural en español y conserva la expresión nacional-covenantal «casa de Israel».
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete fuente y la pauta terminológica del proyecto favorecen transliterar el nombre pactal. En español, «Yahvé» es la forma establecida y más readable para una audiencia eclesial amplia.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés. La principal diferencia doctrinal respecto del inglés auditado es la elección de «Yahvé» en lugar de la forma enmascarada «the LORD», según la terminología del proyecto. También se mantuvo la imagen constructa con «vara de caña» en vez de expandirla interpretativamente.
  spanish_consistency_notes:
  - Se preserva la fórmula profética de reconocimiento con «sabrán que yo soy Yahvé».
  - «Casa de Israel» se mantiene como expresión técnica nacional/covenantal.
  - «Vara de caña» conserva la fragilidad metafórica sin explicarla dentro del versículo.
  - La puntuación sigue el español moderno y la cláusula causal queda marcada con «porque».
