revisions:
- from: De David[a]. Un salmo. Cantaré de amor constante y justicia; a ti, Yahvé[b], cantaré alabanzas.
  to: De David[a]. Un salmo. Cantaré de amor fiel y justicia[b]; te cantaré alabanzas, Yahvé.
  rationale: Se ajusta חֶסֶד de «amor constante» a «amor fiel» para preservar mejor la dimensión de lealtad/carácter pactal en español. Se mejora la naturalidad de la cláusula final con «te cantaré alabanzas» sin perder el valor de לְךָ. Se simplifican y enfocan las notas en los puntos de ambigüedad y alternativa léxica realmente útiles para el lector.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:17:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: encabezado de superscripción, anuncio volitivo de cantar sobre חֶסֶד וּמִשְׁפָּט, y dirección directa a Yahvé en la cláusula final. «De David», «Un salmo», «justicia», «a ti» y «Yahvé» están bien alineados con la evidencia fuente y con la auditoría inglesa. La principal mejora necesaria es estilística y léxica en חֶסֶד: «amor constante» es entendible, pero «amor fiel» preserva mejor en español la idea de lealtad estable/covenantal sin sonar forzado. También conviene afinar la nota a la marca [b], ya que actualmente explica יְהוָה, pero en la auditoría inglesa la nota marcada b corresponde realmente a «De David»; no es obligatorio reproducir exactamente la misma distribución de notas, pero la nota actual no añade una alternativa contextual tan útil como la del encabezado.'
  spanish_quality_summary: El texto es claro, natural y digno. Sin embargo, «cantaré alabanzas» suena un poco redundante tras «Cantaré»; sigue siendo aceptable, pero «te cantaré alabanzas» mejora la fluidez al integrar el dativo personal y hace más natural la cláusula final en español. «Amor fiel» resulta más idiomático y teológicamente preciso que «amor constante».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente. מִשְׁפָּט → «justicia» está bien. No hay conflicto con términos doctrinales mayores. La única decisión a ajustar es חֶסֶד, donde «amor fiel» se ajusta mejor al valor de amor/lealtad de pacto que «amor constante».'
  issues:
  - severity: medium
    issue: La traducción de חֶסֶד como «amor constante» no es la mejor opción disponible.
    rationale: Aunque es comprensible, «constante» enfatiza duración más que lealtad. «Amor fiel» comunica mejor en español la combinación de amor duradero y fidelidad relacional/covenantal que sustenta el inglés «steadfast love».
  - severity: low
    issue: La cláusula final «a ti, Yahvé, cantaré alabanzas» es correcta pero menos natural que una formulación con pronombre dativo.
    rationale: «Te cantaré alabanzas, Yahvé» o «a ti, Yahvé, te cantaré alabanzas» fluye mejor en español. Dado que el hebreo incluye לְךָ, conviene reflejarlo de manera idiomática.
  - severity: low
    issue: La nota [b] explica el uso de «Yahvé», pero no preserva una alternativa léxica o ambigüedad tan relevante como la superscripción.
    rationale: No es un error doctrinal, pero la nota del nombre divino es menos necesaria aquí porque el proyecto ya fija «Yahvé». Es más útil conservar solo la nota sobre «De David» y la alternativa de חֶסֶד/מִשְׁפָּט.
  revised_spanish_text: De David[a]. Un salmo. Cantaré de amor fiel y justicia[b]; te cantaré alabanzas, Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «De David». En un título de salmo, la preposición puede indicar autoría, dedicación o asociación.'
    reason: alternative_reading
  - marker: b
    text: O «misericordia y juicio». Los términos hebreos también pueden traducirse más estrechamente así, pero «amor fiel y justicia» refleja mejor aquí su sentido más amplio de lealtad de pacto y rectitud ética.
    reason: lexical_alternative
  revision_rationale: Se ajusta חֶסֶד de «amor constante» a «amor fiel» para preservar mejor la dimensión de lealtad/carácter pactal en español. Se mejora la naturalidad de la cláusula final con «te cantaré alabanzas» sin perder el valor de לְךָ. Se simplifican y enfocan las notas en los puntos de ambigüedad y alternativa léxica realmente útiles para el lector.
