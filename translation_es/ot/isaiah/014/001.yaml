translation:
  language: es
  text: Porque Yahvé tendrá compasión de Jacob y volverá a escoger a Israel, y los asentará sobre su propia tierra. El extranjero[a] se unirá a ellos, y se adherirán a la casa de Jacob[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el forastero» o «el residente extranjero». El hebreo גֵּר suele referirse a un no nativo que vive entre Israel, no meramente a un extraño de paso.
    reason: lexical_alternative
  - marker: b
    text: O «serán unidos a la casa de Jacob».
    reason: alternative_reading
lexical_decisions:
- source_word: יְרַחֵם
  english_pob_choice: will have compassion
  chosen_spanish: tendrá compasión
  alternatives_spanish:
  - mostrará misericordia
  - tendrá misericordia
  - se apiadará
  lexicon: HALOT
  rationale: El piel de רחם expresa una compasión entrañable y activa. «Tendrá compasión» conserva ese valor afectivo de manera natural en español, sin endurecerlo con un calco ni suavizarlo a un mero favor.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, manteniendo la referencia del pacto de forma transparente y sin máscara litúrgica.
- source_word: וּבָחַר עוֹד בְּיִשְׂרָאֵל
  english_pob_choice: and will again choose Israel
  chosen_spanish: volverá a escoger a Israel
  alternatives_spanish:
  - escogerá otra vez a Israel
  - volverá a elegir a Israel
  - elegirá de nuevo a Israel
  lexicon: HALOT
  rationale: «עוד» marca una acción renovada. «Volverá a escoger» preserva la idea de elección/restauración repetida sin introducir una lectura más específica que el hebreo no exige.
- source_word: וְהִנִּיחָם
  english_pob_choice: and he will settle them
  chosen_spanish: los asentará
  alternatives_spanish:
  - los hará descansar
  - los establecerá
  - los pondrá
  lexicon: HALOT
  rationale: En el contexto de restauración en la tierra, el verbo expresa hacerlos reposar/establecer. «Los asentará» comunica bien el resultado territorial y es más directo que una paráfrasis explicativa.
- source_word: עַל אַדְמָתָם
  english_pob_choice: on their own land
  chosen_spanish: sobre su propia tierra
  alternatives_spanish:
  - en su tierra
  - sobre su suelo
  - en su propio territorio
  lexicon: HALOT
  rationale: אַדְמָה puede significar tierra/terreno/suelo. «Su propia tierra» conserva la posesión del sufijo y el matiz de restauración sin volverlo técnico.
- source_word: הַגֵּר
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el foráneo
  - el residente extranjero
  lexicon: HALOT
  rationale: «Extranjero» es claro y amplio en español. La nota conserva la alternativa más específica, porque גֵּר puede referirse a un no nativo residente, no solo a alguien de paso.
- source_word: וְנִלְוָה
  english_pob_choice: will join them
  chosen_spanish: se unirá a ellos
  alternatives_spanish:
  - se allegará a ellos
  - se agregará a ellos
  - se asociará con ellos
  lexicon: HALOT
  rationale: El verbo implica adherirse/asociarse voluntariamente. «Se unirá» reproduce ese sentido de asociación sin la dureza de un calco técnico.
- source_word: וְנִסְפְּחוּ
  english_pob_choice: and they will attach themselves
  chosen_spanish: se adherirán
  alternatives_spanish:
  - se unirán
  - se agregarán
  - se pegarán
  lexicon: HALOT
  rationale: El nifal de ספח indica ser añadido o adherirse. «Se adherirán» conserva el matiz de incorporación estrecha y evita ambigüedad con una simple unión social.
- source_word: עַל בֵּית יַעֲקֹב
  english_pob_choice: to the house of Jacob
  chosen_spanish: a la casa de Jacob
  alternatives_spanish:
  - a la familia de Jacob
  - a la casa de Israel
  - al linaje de Jacob
  lexicon: HALOT
  rationale: Con verbos de adhesión, עַל puede expresarse idiomáticamente como «a». «Casa de Jacob» mantiene la imagen covenantal y la forma hebrea tradicional del miembro del pueblo.
theological_decisions:
- issue: Sentido de la elección renovada de Israel
  english_pob_reading: will again choose Israel
  chosen_spanish_reading: volverá a escoger a Israel
  alternative_spanish_readings:
  - escogerá a Israel otra vez
  - volverá a elegir a Israel
  - elegirá de nuevo a Israel
  rationale: La frase debe leerse como renovación del favor y de la elección divina en contexto de restauración, sin resolverla demasiado hacia una interpretación exclusivamente nacional, escatológica o tipológica. La formulación española conserva esa tensión.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica, no resolverla)
- issue: Identidad de הַגֵּר en el verso
  english_pob_reading: The foreigner will join them
  chosen_spanish_reading: El extranjero se unirá a ellos
  alternative_spanish_readings:
  - El sojourner se unirá a ellos
  - El residente extranjero se unirá a ellos
  - El forastero se unirá a ellos
  rationale: «Extranjero» ofrece una lectura clara y pública en español. No fuerza una categoría legal posterior, pero la nota conserva las alternativas lexicales más precisas del hebreo.
  doctrine_reference: Translation philosophy §6 (lenguaje moderno legible, no académico ni litúrgico)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que simplificó la idea de «join himself to them» a «join them»; por eso el español usa una forma natural y colectiva («se unirá a ellos») sin sobrecargar el reflexivo. También se preservó la lectura renovada de la elección de Israel y la asociación progresiva del extranjero con la casa de Jacob.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה conforme al estándar del proyecto.
  - Se usa «casa de Jacob» de modo consistente con la imagen familiar/covenantal del hebreo.
  - «Extranjero» se conserva como término general legible, con nota que preserva el matiz de גֵּר.
  - 'Los verbos de unión se distribuyen para reflejar dos matices distintos: נלוה como unión voluntaria («se unirá») y נספחו como adhesión/incorporación estrecha («se adherirán»).'
