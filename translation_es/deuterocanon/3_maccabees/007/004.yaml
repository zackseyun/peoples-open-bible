translation:
  language: es
  text: afirmando que nuestros asuntos nunca estarían seguros, por la hostilidad que estos tienen hacia las naciones[a], hasta que esto se cumpla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «los gentiles». El griego τὰ ἔθνη puede significar «las naciones», «los pueblos» o, en uso judío, «los gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: προφερόμενοι
  english_pob_choice: asserting
  chosen_spanish: afirmando
  alternatives_spanish:
  - sosteniendo
  - alegando
  - presentando
  lexicon: LSJ
  rationale: El participio introduce el contenido de lo que se expone o alega; «afirmando» comunica una declaración pública sin cargar el tono con una interpretación más fuerte que la fuente no exige.
- source_word: μηδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - en ningún momento
  lexicon: LSJ
  rationale: Es la negación absoluta natural en español y conserva la fuerza temporal total del original.
- source_word: εὐσταθήσειν
  english_pob_choice: would ... be secure
  chosen_spanish: estarían seguros
  alternatives_spanish:
  - se mantendrían firmes
  - serían estables
  - prosperarían
  lexicon: LSJ
  rationale: La idea central es estabilidad/seguridad de la situación; «estarían seguros» expresa bien el estado de los asuntos en español moderno sin perder la noción de firmeza.
- source_word: τὰ πράγματα ἡμῶν
  english_pob_choice: our affairs
  chosen_spanish: nuestros asuntos
  alternatives_spanish:
  - nuestras cosas
  - nuestra situación
  - nuestros problemas
  lexicon: LSJ
  rationale: «πράγματα» aquí remite a la condición o gestión pública de la comunidad; «asuntos» es la equivalencia más natural y amplia en español.
- source_word: διʼ ἣν ἔχουσιν οὗτοι πρὸς τὰ ἔθνη δυσμένειαν
  english_pob_choice: because of the hostility these people have toward the nations
  chosen_spanish: por la hostilidad que estos tienen hacia las naciones
  alternatives_spanish:
  - por la enemistad que estos tienen con los pueblos
  - por el odio que estos sienten hacia los gentiles
  lexicon: LSJ
  rationale: «δυσμένεια» es hostilidad o mala voluntad; «hostilidad» preserva el valor léxico directo. «τὰ ἔθνη» se mantiene como «las naciones» para seguir la amplitud del griego, sin cerrar prematuramente el sentido a una sola etiqueta confesional.
- source_word: μέχρι ἂν συντελεσθῇ τοῦτο
  english_pob_choice: until this is accomplished
  chosen_spanish: hasta que esto se cumpla
  alternatives_spanish:
  - hasta que esto se complete
  - hasta que esto se realice
  - hasta que esto llegue a su fin
  lexicon: LSJ
  rationale: «συντελεσθῇ» comunica culminación o cumplimiento. «Se cumpla» mantiene esa idea de consumación de manera natural y sobria en español.
theological_decisions:
- issue: Traducción de τὰ ἔθνη
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los pueblos
  rationale: El contexto es una acusación político-social en un marco helenístico, no una oposición paulina técnica. «Las naciones» conserva el alcance amplio del griego y evita introducir una lectura demasiado especializada.
  doctrine_reference: Principio de primacía del texto fuente; preservar ambigüedad genuina cuando exista.
translation_notes:
  revision_awareness: 'El griego presenta una construcción de acusación con matiz de estabilidad futura y culminación condicional. El borrador español conserva esa secuencia: declaración pública, negación absoluta, estado de seguridad, causa de hostilidad y cláusula temporal final. No se detectaron revisiones textuales que exigieran apartarse del sentido del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparece el nombre divino, pero este versículo no lo contiene.
  - Se prefirió «las naciones» para τὰ ἔθνη, coherente con la decisión auditada en inglés y con el contexto helenístico.
  - «Hostilidad» refleja δυσμένεια sin suavizar el tono jurídico-político del pasaje.
  - La referencia temporal final se tradujo con una construcción natural en español («hasta que esto se cumpla») sin añadir contenido interpretativo.
