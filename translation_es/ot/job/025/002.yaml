translation:
  language: es
  text: El dominio y el pavor están con él[b]; él establece la paz en sus alturas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en sus lugares altos»; la expresión probablemente alude a la esfera celestial exaltada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «le pertenecen»; la frase hebrea también puede leerse en sentido posesivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמְשֵׁל
  english_pob_choice: Dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - el señorío
  - la soberanía
  lexicon: HALOT
  rationale: El sustantivo expresa la idea abstracta de gobierno o dominio. «Dominio» conserva esa cualidad nominal y sigue de cerca la elección inglesa sin volverla excesivamente interpretativa.
- source_word: וָפַחַד
  english_pob_choice: and dread
  chosen_spanish: y el pavor
  alternatives_spanish:
  - y el temor
  - y el terror
  lexicon: HALOT
  rationale: פחד puede abarcar miedo, temor o pavor. «Pavor» comunica mejor el temor reverente e imponente del contexto poético, sin intensificarlo hasta «terror».
- source_word: עִמּוֹ
  english_pob_choice: are with him
  chosen_spanish: están con él
  alternatives_spanish:
  - le pertenecen
  - son de él
  lexicon: HALOT
  rationale: La cláusula hebrea es nominal y la preposición literal es «con». «Están con él» mantiene la imagen relacional y evita convertirla de entrada en una afirmación posesiva más fuerte.
- source_word: עֹשֶׂה
  english_pob_choice: he makes
  chosen_spanish: él hace
  alternatives_spanish:
  - él establece
  - él produce
  lexicon: HALOT
  rationale: El participio funciona verbalmente en el contexto. «Hace» es fiel al verbo base עשה y preserva la formulación breve del hebreo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - el bienestar
  - la plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más natural en español y conserva el alcance relacional y cósmico de שָׁלוֹם sin sobreexplicar sus matices.
- source_word: בִּמְרוֹמָיו
  english_pob_choice: in his heights
  chosen_spanish: en sus alturas
  alternatives_spanish:
  - en sus lugares altos
  - en sus cielos
  lexicon: HALOT
  rationale: מְרוֹם alude a altura o lugar exaltado. «Alturas» reproduce bien la imagen poética y permite mantener la ambigüedad entre espacio elevado y esfera celestial.
theological_decisions:
- issue: Naturaleza de la primera cláusula nominal
  english_pob_reading: An assertion that dominion and dread are attendant attributes of God
  chosen_spanish_reading: Una afirmación de que el dominio y el pavor están asociados con él
  alternative_spanish_readings:
  - 'Una lectura posesiva: el dominio y el pavor le pertenecen'
  - 'Una lectura de pertenencia: el dominio y el pavor son suyos'
  rationale: El hebreo permite una construcción relacional sin verbo explícito, y la versión inglesa conserva «are with him». En español, «están con él» mantiene esa transparencia y no fuerza una posesión explícita que el texto no formula de manera directa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la última pasada (high_agreement, acuerdo 1.0), por lo que el borrador español sigue de cerca la decisión establecida: mantener la cláusula nominal transparente y la imagen de «sus alturas» sin expandirla a «cielos» en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito mediante el pronombre «él», siguiendo el referente del contexto inmediato del libro.
  - «Alturas» conserva la ambigüedad poética de מְרוֹמָיו y queda glosado en nota para no perder la posible referencia al ámbito celestial.
  - 'El orden de las dos primeras unidades nominales respeta el paralelismo del hebreo: dominio / pavor, luego paz en sus alturas.'
