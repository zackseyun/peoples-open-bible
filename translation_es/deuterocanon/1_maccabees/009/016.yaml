translation:
  language: es
  text: Y los del ala izquierda[a], al ver que el ala derecha había sido aplastada, se volvieron a los talones de Judas y de los que estaban con él[b], por detrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cuerno izquierdo» y «cuerno derecho», una expresión militar griega para las alas o flancos izquierdo y derecho de un ejército.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «se volvieron a los talones de Judas y de los que estaban con él, por detrás»; el giro es un modismo que expresa persecución muy cercana por la retaguardia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριστερὸν κέρας
  english_pob_choice: left wing
  chosen_spanish: ala izquierda
  alternatives_spanish:
  - cuerno izquierdo
  - flanco izquierdo
  lexicon: LSJ
  rationale: En contexto militar, κέρας no se entiende de manera literal como «cuerno», sino como la formación lateral de un ejército. «Ala» es el equivalente militar natural en español y preserva el paralelismo con el miembro opuesto del verso.
- source_word: δεξιὸν κέρας
  english_pob_choice: right wing
  chosen_spanish: ala derecha
  alternatives_spanish:
  - cuerno derecho
  - flanco derecho
  lexicon: LSJ
  rationale: Se mantiene el mismo valor militar que en ἀριστερὸν κέρας. «Ala derecha» es claro y simétrico en español, y evita una traducción anatómica engañosa.
- source_word: συνετρίβη
  english_pob_choice: had been crushed
  chosen_spanish: había sido aplastada
  alternatives_spanish:
  - había sido quebrada
  - había sido destrozada
  - había sido rota
  lexicon: BDAG/LSJ
  rationale: El pasivo expresa derrumbe o quebrantamiento por acción violenta. «Había sido aplastada» conserva la fuerza de la imagen de derrota militar y suena natural en español.
- source_word: ἐπέστρεψαν
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - regresaron
  - dieron media vuelta
  lexicon: BDAG/LSJ
  rationale: El verbo marca un giro de dirección. «Se volvieron» es fiel y suficientemente amplio para el movimiento de repliegue descrito en la escena de batalla.
- source_word: κατὰ πόδας
  english_pob_choice: at the heels of
  chosen_spanish: tras las pisadas de
  alternatives_spanish:
  - a los talones de
  - siguiendo de cerca a
  - pisándole los talones a
  lexicon: LSJ
  rationale: El giro idiomático apunta a persecución muy cercana. «Tras las pisadas de» conserva la imagen corporal del griego sin sonar excesivamente coloquial, y refleja bien el matiz de ir pegados al que huye.
- source_word: ἐκ τῶν ὄπισθεν
  english_pob_choice: from behind
  chosen_spanish: desde atrás
  alternatives_spanish:
  - por detrás
  - desde la retaguardia
  lexicon: LSJ
  rationale: La frase explicita la dirección del acercamiento/persecución. «Desde atrás» comunica de forma directa el valor espacial sin añadir interpretación militar ajena al texto.
- source_word: τῶν μετʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: de los que estaban con él
  alternatives_spanish:
  - de sus acompañantes
  - de los que iban con él
  lexicon: BDAG/LSJ
  rationale: El griego es más amplio que «sus hombres» y solo dice que iban junto a Judas. «Los que estaban con él» mantiene esa amplitud; la adición de «estaban» ayuda a la fluidez en español.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que ajustó el final del verso para reflejar con mayor cercanía κατὰ πόδας ... ἐκ τῶν ὄπισθεν como una expresión de persecución inmediata «at the heels of ... from behind», en lugar de una paráfrasis más interpretativa. Por eso se ha preferido una solución idiomática visible en español («tras las pisadas de ... desde atrás») con nota que conserve el valor literal del modismo.
  spanish_consistency_notes:
  - Se usa «ala» para κέρας en sentido militar, coherente con la terminología POB inglesa «wing».
  - Se mantiene el contraste izquierda/derecha con la misma estructura en todo el verso.
  - No se introduce terminología eclesiástica ni doctrinal ajena al pasaje; el vocabulario se limita al movimiento militar y a la persecución.
  - Las notas al pie conservan la tensión entre la literalidad del modismo griego y una lectura española natural, sin borrar el matiz de persecución cercana.
