review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo principal: לֹא יִמָּלֵט = «no escapará», עַוָּל = «el injusto», y תַּאֲוַת צַדִּיק = «el deseo de los justos». También preserva correctamente en nota la variante griega sobre la perseverancia del piadoso. Sin embargo, «con el saqueo» suena menos preciso que la idea de ganancia arrebatada/plunder, y «nunca fallará» aplicado a «deseo» en español resulta ambiguo: puede sugerir que el deseo mismo no desaparece, no que no será frustrado o no quedará sin realización.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «con el saqueo» es algo tosco en español bíblico general y «el deseo de los justos nunca fallará» no comunica con suficiente naturalidad la promesa del hebreo. Una reparación mínima mejora fidelidad y legibilidad sin apartarse del audit trail inglés.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «El injusto» refleja bien עַוָּל. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La nota textual está bien planteada, pero conviene ajustar el texto principal para que el español exprese mejor la fuerza de וְלֹא יַשְׁבִּית.
  issues:
  - severity: medium
    issue: «con el saqueo» es una elección poco idiomática y algo estrecha para בְּגָזֵל
    rationale: El hebreo גזל y el griego ἁρπάγματα apuntan a robo/plunder/ganancia arrebatada. «Saqueo» puede evocar pillaje de guerra más que bienes obtenidos por rapiña en general. «Con el botín» suena más natural y conserva la idea de provecho ilícito que no le dará escape.
  - severity: medium
    issue: «el deseo de los justos nunca fallará» es ambiguo en español
    rationale: En español, un deseo que «falla» no es expresión natural; puede entenderse como que el deseo no desaparece, no que no será frustrado. El hebreo con יַשְׁבִּית comunica que no será hecho cesar/thwarted. «Nunca será frustrado» transmite con más claridad la promesa, y coincide con la nota que ya contrasta esta lectura con la griega.
  revised_spanish_text: El injusto no escapará con el botín[a], y el deseo de los justos nunca será frustrado.
  revised_footnotes:
  - marker: a
    text: 'Griego: «y la perseverancia del piadoso ciertamente no será demorada». El hebreo dice: «el deseo de los justos nunca será frustrado».'
    reason: alternative_reading
  revision_rationale: Se ajusta «saqueo» a «botín» para una expresión española más natural y más cercana a la idea de plunder/ganancia arrebatada. Se cambia «nunca fallará» por «nunca será frustrado» porque expresa con mayor claridad en español la fuerza del hebreo en la segunda cola y evita una ambigüedad innecesaria. La nota textual se conserva con el mismo marcador porque sigue documentando correctamente la variante griega significativa.
