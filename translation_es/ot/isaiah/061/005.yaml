review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: extranjeros realizando labores pastoriles y agrícolas para el pueblo restaurado. También mantiene el paralelismo entre זָרִים y בְנֵי נֵכָר y refleja correctamente אִכָּרֵיכֶם / כֹרְמֵיכֶם como trabajadores del campo y de la viña. Sin embargo, וְעָמְדוּ se ha vertido como «se pondrán», que no preserva con suficiente fidelidad la imagen sencilla de «estar de pie/estar allí» que el POB inglés quiso mantener expresamente.'
  spanish_quality_summary: El español es claro y legible, pero «se pondrán y pastorearán» suena poco natural e incluso ambiguo en este contexto. «Estarán y pastorearán» sería demasiado literal y torpe; una mejor solución es «estarán allí y pastorearán», que conserva la imagen de presencia/disposición sin perder naturalidad. El resto del verso suena digno y comprensible. «Forasteros» es posible, aunque en registro bíblico general «extranjeros» resultaría algo más transparente; no obstante, no exige cambio obligatorio aquí.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones léxicas principales son razonables: «pastorearán», «rebaños», «labradores» y «viñadores» reflejan bien el expediente inglés y el hebreo. La nota cultural sobre «hijos de forasteros» está bien orientada. El ajuste principal es al verbo וְעָמְדוּ para alinearlo mejor con la rationale documentada del POB.'
  issues:
  - severity: medium
    issue: «se pondrán» para וְעָמְדוּ debilita la imagen fuente
    rationale: El expediente inglés subraya que debe preservarse el sentido llano de «stand» y evitar paráfrasis. «Se pondrán» introduce un matiz incoativo no presente y, junto con «pastorearán», suena poco idiomático.
  - severity: low
    issue: La combinación «se pondrán y pastorearán» resulta torpe en español
    rationale: Aunque inteligible, la secuencia no fluye con naturalidad en español bíblico moderno. Una pequeña reparación mejora legibilidad sin alterar el sentido.
  - severity: low
    issue: Formato de nota b con comilla inicial innecesaria
    rationale: La nota b comienza con una comilla simple antes de «Hebreo», lo que parece un detalle tipográfico sobrante.
  revised_spanish_text: Forasteros estarán allí y pastorearán tus rebaños[a][b], y los hijos de forasteros serán tus labradores y tus viñadores.
