translation:
  language: es
  text: En ti han tratado con desprecio[a] al padre y a la madre; en medio de ti han oprimido al forastero[c]; en ti han defraudado al que no tiene padre[b] y a la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han deshonrado» o «han menospreciado» para «han tratado con desprecio».
    reason: lexical_alternative
  - marker: b
    text: O «al huérfano y a la viuda». El hebreo dice más literalmente «al que no tiene padre».
    reason: lexical_alternative
  - marker: c
    text: La repetición de «en ti» dirige la acusación a la ciudad personificada, Jerusalén, tratada como mujer.
    reason: cultural_note
lexical_decisions:
- source_word: הֵקַלּוּ
  english_pob_choice: have treated ... with contempt
  chosen_spanish: han tratado con desprecio
  alternatives_spanish:
  - han deshonrado
  - han menospreciado
  lexicon: HALOT
  rationale: El verbo en hifil expresa tratar como algo liviano, deshonrar o mostrar desprecio. «Han tratado con desprecio» comunica bien la fuerza moral del agravio en español actual sin perder la idea de menosprecio.
- source_word: אָב וָאֵם
  english_pob_choice: father and mother
  chosen_spanish: al padre y a la madre
  alternatives_spanish:
  - a los padres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente las dos figuras. Mantener «al padre y a la madre» conserva la formulación concreta y su eco del lenguaje del mandamiento, en lugar de generalizar a «padres».
- source_word: בָךְ
  english_pob_choice: In you
  chosen_spanish: En ti
  alternatives_spanish:
  - Dentro de ti
  - Entre ti
  lexicon: HALOT
  rationale: La forma femenina singular dirige la acusación a la ciudad personificada. «En ti» preserva el paralelismo repetido y la dirección retórica directa.
- source_word: לַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: al forastero
  alternatives_spanish:
  - al residente forastero
  - al extranjero
  lexicon: HALOT
  rationale: גֵּר designa al no nativo que vive dentro de la comunidad. «Forastero» es la opción más natural en español para un lector amplio y conserva la idea de alguien no originario del lugar; se evita «extranjero» por su posible reducción meramente nacional y «residente forastero» por sonar poco idiomático.
- source_word: עָשׂוּ בַעֹשֶׁק
  english_pob_choice: have oppressed
  chosen_spanish: han oprimido
  alternatives_spanish:
  - han tratado con opresión
  - han cometido extorsión contra
  lexicon: HALOT
  rationale: La construcción idiomática comunica un trato abusivo y explotador. «Han oprimido» es breve, natural y mantiene el contenido injusto del término עֹשֶׁק.
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  lexicon: HALOT
  rationale: תוֹךְ se refiere al interior o al centro. «En medio de ti» suena natural en español y subraya que estas injusticias ocurren dentro de la propia comunidad.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: al huérfano
  alternatives_spanish:
  - al sin padre
  - al huérfano de padre
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «sin padre», en español «huérfano» transmite de manera clara la condición social vulnerable y funciona bien con el par tradicional «la viuda».
- source_word: וְאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la mujer viuda
  lexicon: HALOT
  rationale: El sustantivo es directo y tradicional; no requiere expansión. «La viuda» preserva el paralelismo y la referencia social protegida.
- source_word: הוֹנוּ
  english_pob_choice: have defrauded
  chosen_spanish: han defraudado
  alternatives_spanish:
  - han explotado
  - han maltratado
  lexicon: HALOT
  rationale: El verbo en hifil denota abuso, fraude o trato injusto que lesiona materialmente. «Han defraudado» recoge bien la idea de explotación injusta y funciona con fluidez en español.
theological_decisions:
- issue: Categorías protegidas del pacto frente a una traducción generalizante
  english_pob_reading: Retain specific categories ('sojourner,' 'fatherless,' 'widow') rather than flattening to generic 'the vulnerable.'
  chosen_spanish_reading: Conservar categorías específicas ('forastero,' 'huérfano,' 'viuda') en vez de reducirlas a un genérico.
  alternative_spanish_readings:
  - los vulnerables
  - el extranjero, el huérfano y la viuda
  rationale: El pasaje acusa violaciones concretas contra grupos protegidos por la ley de Israel. Mantener las categorías nombradas preserva la fuerza intertextual y el alcance ético del texto sin añadir una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Direccionamiento a Jerusalén personificada en segunda persona femenina
  english_pob_reading: The repeated 'in you' addresses the city directly, personifying Jerusalem as a woman.
  chosen_spanish_reading: Mantener el trato directo en segunda persona femenina ('en ti').
  alternative_spanish_readings:
  - en Jerusalén
  - dentro de la ciudad
  rationale: La personificación es parte del efecto retórico del hebreo y del análisis auditado en inglés. Conservarla en español ayuda a reflejar que la ciudad misma es interpelada y culpada.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés; no se registraron revisiones aplicadas en la fuente inglesa, y la concordancia de revisión fue alta sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se usa «forastero» para גֵּר por consistencia con una categoría social concreta y no meramente étnica.
  - 'Se preserva el paralelismo ternario y la acusación escalonada del hebreo: padre/madre, forastero, huérfano/viuda.'
