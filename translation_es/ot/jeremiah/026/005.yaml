review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro del POB inglés en casi todos los segmentos: ''para escuchar'', ''las palabras de mis siervos, los profetas'', y la cláusula de envío continuo. Sin embargo, la cláusula final וְלֹא שְׁמַעְתֶּם se presenta en el borrador como ''y no han escuchado'', lo que debilita la fuerza concesiva/adversativa que el POB inglés explicitó con ''though you have not listened''. En español conviene reflejar esa relación con ''aunque no han escuchado'' o similar. Además, la nota al pie está anclada a ''los profetas'' cuando en realidad explica ''madrugando y enviando''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la colocación de la nota es incorrecta y la conjunción final 'y no han escuchado' suena menos precisa discursivamente que 'aunque no han escuchado'. 'Madrugando y enviando' es aceptable como conservación relativamente literal del modismo, aunque algo rígido; no requiere cambio si la nota se ancla bien.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''siervos'' es una excepción contextual justificada para עֲבָדַי; no hay conflictos con nombres divinos o títulos clave. ''Escuchar'' para שׁמע y ''profetas'' para נביאים están bien. La principal corrección es discursiva y de anclaje de nota, no terminológica.'
  issues:
  - severity: medium
    issue: La conjunción final no refleja bien la fuerza concesiva/adversativa de וְלֹא שְׁמַעְתֶּם en el contexto.
    rationale: El hebreo puede traducirse de varias maneras, pero el rastro auditado del POB eligió 'though you have not listened' para mostrar la acusación en contraste con el envío persistente de Dios. 'Y no han escuchado' es más plano y pierde esa relación lógica.
  - severity: medium
    issue: La nota al pie [a] está anclada a 'los profetas' en vez de a la frase que explica.
    rationale: La nota dice 'Literalmente, «madrugando y enviando»...', por lo que el marcador debe aparecer junto a 'madrugando y enviando', no junto a 'los profetas'. Esto es un requisito formal del proyecto.
  revised_spanish_text: para escuchar las palabras de mis siervos, los profetas, que yo les envío, madrugando y enviando[a], aunque no han escuchado,
  revised_footnotes:
  - marker: a
    text: Literalmente, «madrugando y enviando», un modismo hebreo para una acción persistente y repetida.
    reason: lexical_alternative
  revision_rationale: Se corrige la relación discursiva final con 'aunque no han escuchado' para reflejar mejor el contraste concesivo del contexto y la decisión auditada en inglés. También se mueve el marcador de nota al sintagma 'madrugando y enviando', que es la expresión explicada por la nota. No se requieren cambios terminológicos mayores.
