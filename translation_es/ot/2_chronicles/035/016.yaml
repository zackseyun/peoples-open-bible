translation:
  language: es
  text: Así quedó preparado todo el servicio de Yahvé aquel día, para celebrar la Pascua y ofrecer holocaustos sobre el altar de Yahvé, conforme al mandamiento del rey Josías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּכּוֹן
  english_pob_choice: was prepared
  chosen_spanish: quedó preparada
  alternatives_spanish:
  - fue preparada
  - quedó establecida
  - quedó dispuesta
  lexicon: HALOT
  rationale: El hebreo nifal con valor resultativo expresa que la labor quedó puesta en orden y lista para realizarse. 'Quedó preparada' conserva ese matiz pasivo/resultativo y suena natural en español bíblico contemporáneo.
- source_word: כָּל עֲבוֹדַת יְהוָה
  english_pob_choice: all the service of Yahweh
  chosen_spanish: toda la obra de Yahvé
  alternatives_spanish:
  - todo el servicio de Yahvé
  - toda la obra del servicio de Yahvé
  - todo el servicio para Yahvé
  lexicon: HALOT
  rationale: עֲבוֹדָה en contexto cultual abarca la labor/servicio litúrgico. 'Obra' permite incluir el conjunto de tareas rituales sin restringirlo solo a 'servicio' entendido de forma demasiado estrecha, y conserva el alcance total de כָּל.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar la forma transliterada ''Yahvé'' en el texto principal, en lugar de una sustitución como ''SEÑOR''. Es la forma más asentada en español bíblico para preservar el nombre divino.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: '''Aquel día'' reproduce con naturalidad el demostrativo hebreo y funciona bien como marcador temporal en español.'
- source_word: לַעֲשׂוֹת הַפֶּסַח
  english_pob_choice: to keep the Passover
  chosen_spanish: para celebrar la Pascua
  alternatives_spanish:
  - para hacer la Pascua
  - para guardar la Pascua
  - para celebrar el paso
  lexicon: HALOT
  rationale: El hebreo idiomático 'hacer la Pascua' designa su observancia ritual. En español, 'celebrar la Pascua' comunica esa práctica de manera clara y digna; 'guardar' sería posible, pero aquí 'celebrar' evita rigidez y sigue el sentido del rito.
- source_word: וְהַעֲלוֹת עֹלוֹת
  english_pob_choice: and to offer burnt offerings
  chosen_spanish: y ofrecer holocaustos
  alternatives_spanish:
  - y ofrecer sacrificios quemados
  - y subir holocaustos
  - y presentar holocaustos
  lexicon: HALOT
  rationale: El valor sacrificial técnico del término עֹלוֹת se expresa de forma tradicional y clara con 'holocaustos' en español bíblico. Mantiene la referencia al sacrificio totalmente quemado sin introducir perífrasis innecesaria.
- source_word: עַל מִזְבַּח יְהוָה
  english_pob_choice: on the altar of Yahweh
  chosen_spanish: sobre el altar de Yahvé
  alternatives_spanish:
  - en el altar de Yahvé
  - sobre el altar de Yahweh
  lexicon: HALOT
  rationale: '''Sobre'' refleja bien la preposición hebrea עַל con el altar sacrificial y su uso es natural en español. Se conserva el nombre divino conforme al criterio del proyecto.'
- source_word: כְּמִצְוַת
  english_pob_choice: according to the command
  chosen_spanish: conforme al mandamiento
  alternatives_spanish:
  - según el mandamiento
  - de acuerdo con el mandato
  - conforme a la orden
  lexicon: HALOT
  rationale: מִצְוָה puede significar mandamiento/mandato. 'Conforme al mandamiento' preserva el valor normativo y funciona bien para una orden real en este contexto.
- source_word: הַמֶּלֶךְ יֹאשִׁיָּהוּ
  english_pob_choice: King Josiah
  chosen_spanish: el rey Josías
  alternatives_spanish:
  - el rey Josías
  - Josías, el rey
  lexicon: HALOT
  rationale: En español bíblico la colocación más natural es 'el rey Josías'. Conserva el título real y la identificación personal sin forzar el orden hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se mantiene el nombre propio divino en español con 'Yahvé', evitando la sustitución tradicional por un título. Esto preserva la referencia pactual del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: ¿'Holocaustos' o 'ofrendas quemadas' para עֹלוֹת?
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  rationale: Aunque 'ofrenda quemada' es transparente, 'holocaustos' es el término bíblico tradicional en español para עֹלָה y comunica con precisión el carácter total del sacrificio. Aquí no introduce ambigüedad doctrinal y mantiene la equivalencia lexical.
  doctrine_reference: 'DOCTRINE.md: Sacrificial terminology'
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios y presenta alta concordancia con el original. La versión española sigue la misma lectura semántica general, ajustando solo la idiomaticidad propia del español y el término normativo del nombre divino.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo cultual del versículo: preparación de la obra, celebración de la Pascua y ofrecimiento de holocaustos.'
  - Se mantuvo el nombre divino como 'Yahvé' de forma consistente con el estándar del proyecto.
  - '''Pascua'' y ''holocaustos'' se usaron como términos bíblicos establecidos en español, evitando paráfrasis innecesarias.'
