    text: O 'amos'. El griego dice 'señores/amos' (κυρίοις), aquí refiriéndose a aquellos para quienes ella trabajaba.
    reason: lexical_alternative
  revision_rationale: Se cambia 'amos' por 'dueños' para seguir la decisión contextual del POB auditado sobre κυρίοις en un entorno laboral no teológico y para mejorar la naturalidad del español. También se ajusta la nota para reflejar esa prioridad y se suaviza la redundancia de 'añadiendo además' con 'añadiendo también'.
