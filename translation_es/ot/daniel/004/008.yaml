translation:
  language: es
  text: El árbol se hizo grande y se hizo fuerte[a], y su altura llegó hasta los cielos, y era visible hasta el extremo de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su apariencia hasta el extremo de toda la tierra». El sustantivo arameo puede significar «apariencia/aspecto» además de «lo visible» o «lo que se ve», pero el contexto favorece la idea de visibilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְבָה
  english_pob_choice: grew large
  chosen_spanish: creció grande
  alternatives_spanish:
  - creció mucho
  - se hizo grande
  lexicon: HALOT
  rationale: El verbo expresa aumento o hacerse grande. «Creció grande» conserva la idea de desarrollo del árbol y suena natural en español, sin reducirlo a una mera descripción estática.
- source_word: אִילָנָא
  english_pob_choice: the tree
  chosen_spanish: el árbol
  alternatives_spanish:
  - un árbol
  lexicon: HALOT
  rationale: El estado enfático apunta al árbol específico de la visión, por lo que el artículo definido es adecuado.
- source_word: וּתְקִף
  english_pob_choice: became strong
  chosen_spanish: se hizo fuerte
  alternatives_spanish:
  - creció fuerte
  - era fuerte
  lexicon: HALOT
  rationale: El verbo expresa fortalecerse o volverse poderoso. «Se hizo fuerte» mantiene la progresión del crecimiento y la fuerza en un español natural.
- source_word: וְרוּמֵהּ
  english_pob_choice: its height
  chosen_spanish: su altura
  alternatives_spanish:
  - su estatura
  - su elevación
  lexicon: HALOT
  rationale: La forma alude a la altura o elevación del árbol. «Su altura» es la correspondencia más directa y clara en español.
- source_word: יִמְטֵא לִשְׁמַיָּא
  english_pob_choice: reached to the heavens
  chosen_spanish: llegó hasta los cielos
  alternatives_spanish:
  - alcanzó los cielos
  - llegó a los cielos
  lexicon: HALOT
  rationale: Se conserva el plural arameo con «los cielos», que en español bíblico comunica bien la altura extrema sin banalizarla como «cielo» singular.
- source_word: וַחֲזוֹתֵהּ
  english_pob_choice: it was visible
  chosen_spanish: era visible
  alternatives_spanish:
  - podía verse
  - se veía
  lexicon: HALOT
  rationale: La construcción puede referirse a la visibilidad o al aspecto. El contexto favorece la idea de que podía verse desde lejos, por eso se traduce verbalmente como «era visible».
- source_word: לְסוֹף כָּל אַרְעָא
  english_pob_choice: to the end of the whole earth
  chosen_spanish: hasta el extremo de toda la tierra
  alternatives_spanish:
  - hasta los confines de toda la tierra
  - hasta el fin de toda la tierra
  lexicon: HALOT
  rationale: La expresión idiomática señala la máxima extensión observable. «Extremo» conserva la imagen espacial y «toda la tierra» reproduce el alcance universal del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo arameizado de Daniel 4:8 y mantiene la secuencia de crecimiento, fortalecimiento, altura extrema y visibilidad universal. La nota reproduce la alternativa léxica documentada en el audit trail inglés para חֲזוֹתֵהּ, sin desplazar el sentido contextual preferido.
  spanish_consistency_notes:
  - Se mantiene «los cielos» para reflejar el plural arameo de שְׁמַיָּא.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo.
  - La nota al pie usa una alternativa de aspecto/visibilidad porque el arameo permite ambas lecturas, aunque el contexto favorece la visibilidad.
