translation:
  language: es
  text: La higuera ha madurado sus higos tempranos[a], y las vides en flor[b] desprenden fragancia. Levántate, amor mío, hermosa mía, y ven[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha formado sus higos verdes». El hebreo puede destacar la etapa temprana del fruto más que una maduración completa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las vides en flor son fragantes» o «las vides con uvas tiernas desprenden fragancia».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «y ve para ti»; aquí el sentido es una invitación a apartarse con el hablante: «ven, aléjate» o «ven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָֽנְטָ֣ה
  english_pob_choice: has ripened
  chosen_spanish: ha dado
  alternatives_spanish:
  - ha madurado
  - ha ripened
  lexicon: HALOT
  rationale: En este contexto con פַגֶּיהָ (‘sus higos tempranos’), el sentido apunta al desarrollo visible del fruto; en español, ‘ha dado’ con ‘higos tempranos’ comunica ese avance natural sin forzar una idea de madurez completa que el hebreo no exige necesariamente.
- source_word: פַגֶּ֔י/הָ
  english_pob_choice: its early figs
  chosen_spanish: sus higos tempranos
  alternatives_spanish:
  - sus higos verdes
  - sus higos inmaduros
  lexicon: HALOT
  rationale: ‘Higos tempranos’ preserva la referencia botánica y estacional del hebreo פג mejor que una paráfrasis más interpretativa. Mantiene la imagen de la estación del fruto sin exigir ‘madurez’ total.
- source_word: וְ/הַ/גְּפָנִ֥ים סְמָדַ֖ר
  english_pob_choice: the vines in blossom
  chosen_spanish: las vides en flor
  alternatives_spanish:
  - las vides en floración
  - las vides con brotes tiernos
  lexicon: HALOT
  rationale: סְמָדַר designa la etapa de flor o desarrollo muy temprano de la vid. ‘En flor’ es natural en español y conserva la imagen primaveral que explica la fragancia del verso.
- source_word: נָ֣תְנוּ רֵ֑יחַ
  english_pob_choice: give off fragrance
  chosen_spanish: desprenden fragancia
  alternatives_spanish:
  - dan fragancia
  - despiden aroma
  - son fragantes
  lexicon: HALOT
  rationale: ‘Desprenden fragancia’ reproduce con naturalidad el modismo hebreo de ‘dar olor/fragancia’ y mantiene la imagen sensorial sin volverla demasiado literal o torpe.
- source_word: ק֥וּמִי
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte en pie
  lexicon: HALOT
  rationale: Es un imperativo de invitación. ‘Levántate’ suena claro, digno y idiomático en español, conservando el impulso poético del llamado.
- source_word: רַעְיָתִ֥/י
  english_pob_choice: my love
  chosen_spanish: amor mío
  alternatives_spanish:
  - amada mía
  - mi amor
  lexicon: HALOT
  rationale: En el Cantar, el término expresa afecto íntimo. ‘Amor mío’ comunica cercanía y ternura en español sin perder la fuerza relacional del vocativo.
- source_word: יָפָתִ֖/י
  english_pob_choice: my beautiful one
  chosen_spanish: hermosa mía
  alternatives_spanish:
  - bella mía
  - mi hermosa
  lexicon: HALOT
  rationale: ‘Hermosa mía’ preserva el elogio directo del hebreo y evita una formulación demasiado moderna o demasiado libre. Conserva el paralelo poético con ‘amor mío’.
- source_word: וּ/לְכִי לָֽ/ךְ
  english_pob_choice: and come away
  chosen_spanish: y ven conmigo
  alternatives_spanish:
  - y vete
  - y sal
  - y ven
  lexicon: HALOT
  rationale: La forma hebrea es literalmente una invitación a irse para unirse al hablante. En español, ‘ven conmigo’ expresa esa misma invitación relacional con naturalidad poética, sin ocultar el sentido de movimiento compartido.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios respecto del texto auditado; por ello la propuesta mantiene la equivalencia óptima ya aprobada por el contexto inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como default del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente contextual.
  - Se evita ‘Cristo/Mesías’ porque no aparece en el verso.
  - Se conserva la alternancia poética entre vocativos afectivos y la imagen agrícola del hebreo, sin añadir interpretación doctrinal.
  - ‘Ven conmigo’ refleja el valor discursivo de לָךְ en el cierre, como invitación relacional, no como mandato aislado.
