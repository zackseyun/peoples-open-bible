review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en su estructura básica: κήρυγμα = «proclamación», el ámbito «en/toda Judea y Jerusalén», el destinatario «todos los que... de la cautividad», y el propósito de reunirse en Jerusalén. Sin embargo, «procedían de la cautividad» suena poco natural y algo más interpretativo de lo necesario para πᾶσι τοῖς ἐκ τῆς αἰχμαλωσίας. Conviene una formulación más fiel y más idiomática en español.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos problemas menores: 1) «procedían de la cautividad» resulta rígido y extraño en registro bíblico actual; 2) la nota al pie contiene un error grave de escritura («վերադարձido»), mezcla de caracteres no españoles. El resto fluye bien.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Judea», «Jerusalén» y «proclamación» están bien. Para αἰχμαλωσία, en este contexto «cautiverio» suena más natural que «cautividad» y mantiene la fuerza del original; también armoniza mejor con la nota explicativa.
  issues:
  - severity: medium
    issue: «procedían de la cautividad» es poco idiomático
    rationale: Aunque intenta reflejar literalmente ἐκ, en español suena forzado. «los que venían del cautiverio» o «los que eran del cautiverio» preserva mejor el origen/grupo del griego sin dureza estilística innecesaria.
  - severity: high
    issue: La nota al pie contiene el error tipográfico «վերադարձido»
    rationale: Es una corrupción textual evidente con caracteres armenios incrustados; debe corregirse antes de aprobarse.
  - severity: low
    issue: «cautividad» suena menos natural que «cautiverio» en español bíblico contemporáneo
    rationale: Ambas opciones son comprensibles, pero «cautiverio» es más natural y ampliamente legible en este contexto.
  revised_spanish_text: Y se hizo una proclamación en toda Judea y Jerusalén para todos los que venían del cautiverio[a], para reunirse en Jerusalén.
  revised_footnotes:
  - marker: a
    text: O, de manera más interpretativa, «para todos los exiliados» o «para todos los exiliados que habían regresado». El griego dice literalmente «para todos los que eran/venían de la cautividad».
    reason: lexical_alternative
  revision_rationale: Se ajustó «procedían de la cautividad» a «venían del cautiverio» para conservar el sentido de ἐκ τῆς αἰχμαλωσίας en un español más natural y legible. También se corrigió la nota al pie, eliminando la corrupción tipográfica y manteniendo las alternativas documentadas en el rastro inglés.
