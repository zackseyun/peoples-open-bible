review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: mantiene el sujeto implícito plural, la doble idea de recaer ''sobre ti'' y ''sobre tu descendencia'', y traduce adecuadamente לְאוֹת / מוֹפֵת como ''señal'' / ''prodigio''. La nota contextual sobre el referente de ''ellos'' también concuerda con el rastro de auditoría inglés. Sin embargo, el español introduce una coma innecesaria antes de ''como señal y como prodigio'', y la nota [a] presenta una alternativa duplicada en vez de contrastar correctamente ''descendencia'' con ''simiente''.'
  spanish_quality_summary: 'El texto es claro y legible, pero puede pulirse para sonar más natural y preciso: sin la coma fluye mejor, y ''como señal y prodigio'' evita repetición innecesaria sin perder fidelidad. Las notas necesitan corrección menor de estilo y exactitud. Además, en los metadatos teológicos aparece ''juícios'', que debería ser ''juicios'', aunque no afecta el texto principal.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Descendencia' para זֶרַע está bien justificado en este contexto; 'señal' y 'prodigio' reflejan adecuadamente אוֹת y מוֹפֵת. No aparecen términos sensibles del glosario principal que requieran ajuste.
  issues:
  - severity: medium
    issue: Coma antes de 'como señal y como prodigio'
    rationale: En español esta coma separa de forma poco natural el predicado preposicional del complemento resultativo; el hebreo no exige esa pausa y la frase suena más limpia sin ella.
  - severity: medium
    issue: Nota [a] mal formulada
    rationale: 'La nota dice ''O: «tu simiente» o «tu descendencia»'' cuando el texto ya usa ''tu descendencia''; la alternativa debería presentar opciones reales y no repetir la lectura adoptada como si fuera alternativa.'
  - severity: low
    issue: Repetición de 'como' en 'como señal y como prodigio'
    rationale: Es comprensible y fiel, pero 'como señal y prodigio' suena más natural en español y sigue representando los dos sustantivos hebreos coordinados.
  - severity: low
    issue: 'Error ortográfico en metadato teológico: ''juícios'''
    rationale: Debe corregirse a 'juicios' en la documentación, aunque no requiere nota ni afecta directamente el texto bíblico.
  revised_spanish_text: Y estarán sobre ti y sobre tu descendencia[a] como señal y prodigio, para siempre[b].
  revised_footnotes:
