  rationale: La revisión corrige el anclaje de las notas para que cada una corresponda al elemento pertinente del texto, restaura la nota cultural presente en el POB inglés, y pule dos giros de estilo («a pie», «de Ramesés a Sucot») para mejorar naturalidad y dignidad sin apartarse del hebreo ni del rationale documentado.
