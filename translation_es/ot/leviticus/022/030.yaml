translation:
  language: es
  text: Se comerá en ese mismo día[a]; no se dejará nada de ello hasta la mañana[b]. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en aquel día».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yo soy Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that same day
  chosen_spanish: en ese mismo día
  alternatives_spanish:
  - en ese día
  - en aquel mismo día
  lexicon: HALOT
  rationale: La expresión hebrea marca el día señalado con énfasis de inmediatez. «En ese mismo día» conserva el valor temporal restrictivo y suena natural en español bíblico moderno.
- source_word: יֵאָכֵל
  english_pob_choice: It shall be eaten
  chosen_spanish: Se comerá
  alternatives_spanish:
  - Deberá comerse
  - Será comido
  lexicon: HALOT
  rationale: El nifal funciona aquí como prescripción pasiva/impersonal. «Se comerá» mantiene el mandato legal sin introducir una paráfrasis más explicativa que el hebreo.
- source_word: לֹא תוֹתִירוּ
  english_pob_choice: you shall leave none
  chosen_spanish: no dejarán nada
  alternatives_spanish:
  - no dejarán nada de ello
  - no dejarán de ello nada
  lexicon: HALOT
  rationale: El hiphil de יתר expresa ‘dejar sobrante’. En español, «no dejarán nada» comunica con fuerza la prohibición de dejar restos, preservando el tono normativo.
- source_word: מִמֶּנּוּ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere a la porción sacrificial. «De ello» es neutro y evita forzar género en español.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta la madrugada
  lexicon: HALOT
  rationale: La locución temporal indica que no debe guardarse para el día siguiente. «Hasta la mañana» reproduce la restricción con claridad y naturalidad.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo, Yahvé
  - Yo soy el Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme a la terminología del proyecto. La fórmula identificatoria se traduce de manera directa y reverente.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton, y la política del proyecto exige su transliteración como «Yahvé» en lugar de sustituirlo por un título. Se conserva así la referencia al nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El auditor inglés mantiene alta concordancia y no registra revisiones aplicadas; la versión española sigue de cerca la estructura jurídica del hebreo y conserva la formulación final del nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a las pautas del proyecto.
  - Se conserva el registro legal/cultual breve y directo, sin expansión interpretativa.
  - «Se comerá» respeta el valor impersonal del hebreo sin convertirlo en mandato explícito de segunda persona.
