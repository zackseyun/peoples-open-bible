translation:
  language: es
  text: 'Entonces el rey dijo a los corredores que estaban alrededor de él: «Giren y maten a los sacerdotes de Yahvé, porque también su mano está con David[a], y porque sabían que él estaba huyendo y no me lo dieron a conocer[b]». Pero los siervos del rey no quisieron extender la mano para atacar a los sacerdotes de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “su mano también está con David”, un modismo que expresa apoyo o complicidad con David.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “no descubrieron mi oído”, es decir, “no me informaron” o “no me lo dieron a conocer”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרָצִים
  english_pob_choice: to the runners
  chosen_spanish: a los corredores
  alternatives_spanish:
  - a los runners
  - a los guardias
  - a los mensajeros
  lexicon: HALOT
  rationale: רוץ conserva el sentido básico de “correr”; “corredores” mantiene la imagen léxica del hebreo y sigue siendo inteligible en español. En contexto cortesano puede aludir a funcionarios/guardias, pero el español no necesita explicitar esa función en el sustantivo si el mandato posterior ya revela su papel.
- source_word: הַנִּצָּבִים עָלָיו
  english_pob_choice: who were standing around him
  chosen_spanish: los que estaban alrededor de él
  alternatives_spanish:
  - los que estaban junto a él
  - los que estaban de pie junto a él
  - los que estaban puestos sobre él
  lexicon: HALOT
  rationale: נצב עם על expresa estar de pie junto/a la persona atendiendo su presencia. “Alrededor de él” fluye de forma natural en español y conserva el escenario cortesano sin introducir una imagen jerárquica extraña como “sobre él”.
- source_word: סֹבּוּ
  english_pob_choice: Turn
  chosen_spanish: Giren
  alternatives_spanish:
  - Den la vuelta
  - Vuélvanse
  - Rodeen
  lexicon: HALOT
  rationale: El imperativo pide cambiar de dirección para pasar al ataque. “Giren” es natural en español actual y conserva la brusquedad del mandato.
- source_word: וְהָמִיתוּ
  english_pob_choice: and kill
  chosen_spanish: y maten
  alternatives_spanish:
  - y den muerte a
  - y ejecuten
  - y hagan morir
  lexicon: HALOT
  rationale: El hifil de מות aquí es un mandato directo de dar muerte. “Maten” es la forma más directa y fiel al tono violento del pasaje.
- source_word: כֹּהֲנֵי יְהוָה
  english_pob_choice: the priests of Yahweh
  chosen_spanish: los sacerdotes de Yahvé
  alternatives_spanish:
  - los sacerdotes de Yahweh
  - los sacerdotes del SEÑOR
  lexicon: HALOT + project terminology
  rationale: Se conserva el nombre divino como “Yahvé” según el estándar del proyecto. “Sacerdotes” es el equivalente natural de כֹּהֲנֵי, sin cambiar a vocabulario eclesiástico más interpretativo.
- source_word: כִּי גַם יָדָם עִם דָּוִד
  english_pob_choice: because their hand also is with David
  chosen_spanish: porque también su mano está con David
  alternatives_spanish:
  - porque también ellos apoyan a David
  - porque también están de parte de David
  - porque su mano también está con David
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea de “mano” para no borrar el matiz de apoyo/complicidad. “Está con David” mantiene la construcción relacional del original; la nota explica la expresión idiomática.
- source_word: וְכִי יָדְעוּ כִּי בֹרֵחַ הוּא
  english_pob_choice: and because they knew that he was fleeing
  chosen_spanish: y porque sabían que él estaba huyendo
  alternatives_spanish:
  - y porque sabían que era un fugitivo
  - y porque supieron que huía
  - y porque sabían que él huía
  lexicon: HALOT
  rationale: בורח es participio; “estaba huyendo” conserva el aspecto progresivo sin convertirlo en una afirmación más cerrada como “era fugitivo”.
- source_word: וְלֹא גָלוּ אֶת אזנו
  english_pob_choice: and did not disclose it to me
  chosen_spanish: y no me lo dieron a conocer
  alternatives_spanish:
  - y no me informaron
  - y no me lo revelaron
  - y no descubrieron mi oído
  lexicon: HALOT
  rationale: La idiomática hebrea “descubrir el oído” significa informar/revelar. En español, “darlo a conocer” transmite el sentido con naturalidad sin perder la referencia al acto de comunicación omitido.
- source_word: וְלֹא אָבוּ
  english_pob_choice: were not willing
  chosen_spanish: no quisieron
  alternatives_spanish:
  - no estuvieron dispuestos
  - no estuvieron dispuestos a
  - se negaron a
  lexicon: HALOT
  rationale: אָבָה expresa voluntad/consentimiento. “No quisieron” es conciso y adecuado en el registro narrativo, sin forzar una formalidad excesiva.
- source_word: לִשְׁלֹחַ אֶת יָדָם
  english_pob_choice: to put out their hand
  chosen_spanish: extender su mano
  alternatives_spanish:
  - alargar su mano
  - echar mano
  - levantar su mano
  lexicon: HALOT
  rationale: La imagen de la mano se conserva en español. “Extender su mano” es una fórmula natural que prepara el infinitivo siguiente y mantiene el paralelismo hebreo.
- source_word: לִפְגֹעַ בְּכֹהֲנֵי יְהוָה
  english_pob_choice: to strike the priests of Yahweh
  chosen_spanish: para herir a los sacerdotes de Yahvé
  alternatives_spanish:
  - para atacar a los sacerdotes de Yahvé
  - para golpear a los sacerdotes de Yahvé
  - para caer sobre los sacerdotes de Yahvé
  lexicon: HALOT
  rationale: פגע puede ser golpear/atacar/embestir según contexto. “Herir” comunica el acto violento sin volverlo más técnico de lo que el texto exige; además encaja bien con la resistencia de los siervos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide traducir el Tetragrammaton como “Yahvé”. Se mantiene el nombre propio del pacto en lugar de una sustitución litúrgica, siguiendo la política terminológica del POB en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Metáfora de la mano en ‘su mano está con David’
  english_pob_reading: their hand also is with David
  chosen_spanish_reading: su mano está con David
  alternative_spanish_readings:
  - apoyan a David
  - están de parte de David
  - tienen trato con David
  rationale: Se conserva la metáfora porque el audit trail la retiene explícitamente. En español la imagen puede sonar extraña, pero justamente esa tensión es parte del valor lexical del hebreo y se aclara en nota.
  doctrine_reference: DOCTRINE.md Principles on lexical transparency and auditable ambiguity
