translation:
  language: es
  text: 'Una sola cosa he pedido a Yahvé; esta buscaré: que habite en la casa de Yahvé todos los días de mi vida, para contemplar la hermosura[a] de Yahvé y para inquirir[b] en su templo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la agradabilidad de Yahvé» o «el favor de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y para buscar en su templo» o «y para meditar en su templo». El verbo hebreo aquí es difícil y puede llevar la idea de indagación atenta o contemplación en el santuario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַת
  english_pob_choice: One thing
  chosen_spanish: Una sola cosa
  alternatives_spanish:
  - Una cosa
  - Una única cosa
  lexicon: HALOT
  rationale: El numeral femenino singular funciona sustantivamente y expresa singularidad enfática. 'Una sola cosa' conserva ese énfasis con español natural y fiel.
- source_word: שָׁאַלְתִּי
  english_pob_choice: I have asked
  chosen_spanish: he pedido
  alternatives_spanish:
  - pedí
  - he solicitado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una petición ya hecha con vigencia presente. 'He pedido' refleja bien ese valor y suena natural en español bíblico contemporáneo.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: La preposición aquí marca procedencia o fuente de la petición. En español, con 'pedir' la construcción más natural es 'pedir a alguien'; se preserva así el sentido relacional sin perder la idea de origen en la petición dirigida a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio editorial del POB, en lugar de sustituirlo por un título.
- source_word: אוֹתָהּ
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - eso
  - la misma
  lexicon: HALOT
  rationale: El pronombre retoma la petición singular anterior; 'esta' preserva la fuerza resumptiva y el foco enfático en español.
- source_word: אֲבַקֵּשׁ
  english_pob_choice: I will seek
  chosen_spanish: buscaré
  alternatives_spanish:
  - la buscaré
  - seguiré buscando
  lexicon: HALOT
  rationale: El imperfecto expresa determinación continua o volitiva. 'Buscaré' conserva esa intención de empeño sostenido y funciona bien con el paralelismo del versículo.
- source_word: שִׁבְתִּי
  english_pob_choice: that I may dwell
  chosen_spanish: que habite
  alternatives_spanish:
  - para morar
  - que permanezca
  lexicon: HALOT
  rationale: Aunque la forma es difícil, el contexto apunta a permanencia en la casa de Yahvé. 'Habite' comunica mejor la idea de residencia/estancia que un calco como 'sentarme'.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa de Yahweh
  - en la casa del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la imagen cultual de la casa de Yahvé con terminología consistente con el POB.
- source_word: כָּל יְמֵי חַיַּי
  english_pob_choice: all the days of my life
  chosen_spanish: todos los días de mi vida
  alternatives_spanish:
  - durante toda mi vida
  - todos mis días
  lexicon: HALOT
  rationale: Es la equivalencia más directa y natural para la duración total expresada por la fórmula hebrea.
- source_word: לַחֲזוֹת
  english_pob_choice: to behold
  chosen_spanish: para contemplar
  alternatives_spanish:
  - para ver
  - para mirar
  lexicon: HALOT
  rationale: '''Contemplar'' conserva el matiz de mirada atenta y reverente que el POB expresa con ''behold''.'
- source_word: בְּנֹעַם יְהוָה
  english_pob_choice: the beauty of Yahweh
  chosen_spanish: la hermosura de Yahvé
  alternatives_spanish:
  - la belleza de Yahvé
  - la dulzura de Yahvé
  - el favor de Yahvé
  lexicon: HALOT
  rationale: נֹעַם puede abarcar hermosura, agrado o belleza. En este contexto de adoración, 'hermosura' es una opción digna y fiel que preserva el atractivo de la presencia divina sin forzar 'favor'.
- source_word: וּלְבַקֵּר
  english_pob_choice: and to inquire
  chosen_spanish: y para inquirir
  alternatives_spanish:
  - y para buscar
  - y para meditar
  lexicon: HALOT
  rationale: El verbo es semánticamente difícil y puede implicar búsqueda atenta o examen contemplativo. 'Inquirir' conserva esa densidad y permite mantener abierta la gama de sentidos cultuales.
- source_word: בְּהֵיכָלוֹ
  english_pob_choice: in his temple
  chosen_spanish: en su templo
  alternatives_spanish:
  - en su santuario
  - en su palacio
  lexicon: HALOT
  rationale: En paralelo con 'la casa de Yahvé' y en contexto de adoración, 'templo' comunica con claridad el lugar de presencia y culto.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en forma transliterada, evitando la sustitución por un título. Esto mantiene la correspondencia con el criterio del POB y la visibilidad del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נֹעַם יְהוָה
  english_pob_reading: the beauty of Yahweh
  chosen_spanish_reading: la hermosura de Yahvé
  alternative_spanish_readings:
  - la belleza de Yahvé
  - el favor de Yahvé
  - la dulzura de Yahvé
  rationale: Se elige una traducción que preserve el matiz estético y contemplativo del término en un contexto de adoración, sin reducirlo al sentido de favor o gracia.
  doctrine_reference: 'DOCTRINE.md: semantic range of נֹעַם in worship contexts'
- issue: Valor de וּלְבַקֵּר
  english_pob_reading: and to inquire
  chosen_spanish_reading: y para inquirir
  alternative_spanish_readings:
  - y para buscar
  - y para meditar
  - y para visitar temprano
  rationale: Se mantiene la ambigüedad léxica reconocida por el POB. 'Inquirir' permite abarcar la idea de búsqueda atenta, examen o contemplación ante Dios sin cerrar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: difficult Hebrew verbs in cultic contexts'
translation_notes:
  revision_awareness: El texto sigue la última revisión estable del pasaje sin cambios sustantivos reportados; se mantiene la decisión de no mascarar el nombre divino y de conservar la ambigüedad reconocida en נֹעַם y וּלְבַקֵּר.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יְהוָה.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''templ(o)'' se emplea para הֵיכָל en armonía con ''casa de Yahvé''.'
  - '''Inquirir'' conserva la nota de dificultad verbal y no fuerza una sola interpretación.'
  - 'La puntuación refleja el paralelismo hebreo con dos propósitos coordinados: contemplar e inquirir.'
