translation:
  language: es
  text: Luego el límite giró alrededor de él por el norte de Hanatón[a], y su extremo estaba en el valle de Iphtá-el[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al norte de Hanatón». La frase hebrea puede entenderse de manera posicional («al norte de») o más direccional.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus salidas», término técnico de límites que puede referirse a sus extremos o puntos terminales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  english_pob_choice: Then ... turned around
  chosen_spanish: Entonces ... se curvaba
  alternatives_spanish:
  - Entonces ... rodeaba
  - Entonces ... daba vuelta
  lexicon: HALOT
  rationale: En descripciones territoriales, נָסַב expresa el recorrido curvo o el giro de un límite. 'Se curvaba' conserva el movimiento direccional sin sonar forzado en español.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En contextos de repartición territorial, גְּבוּל puede referirse al límite del territorio. 'Límite' comunica bien la línea territorial sin introducir la idea moderna de frontera política.
- source_word: מִצְּפוֹן חַנָּתֹן
  english_pob_choice: on the north to Hannathon
  chosen_spanish: desde el norte de Hanatón
  alternatives_spanish:
  - al norte de Hanatón
  - por el norte de Hanatón
  lexicon: HALOT
  rationale: El מן con צפון en fórmulas de límites puede indicar ubicación relativa. 'Desde el norte de' conserva la posibilidad direccional del hebreo y evita fijar demasiado la preposición a una sola lectura.
- source_word: וְהָיוּ תֹּצְאֹתָיו
  english_pob_choice: and its end was
  chosen_spanish: y su extremo estaba
  alternatives_spanish:
  - y sus salidas estaban
  - y sus extremos estaban
  - y su término estaba
  lexicon: HALOT
  rationale: תֹּצָאוֹת en textos de límites designa los puntos terminales o la terminación del recorrido. 'Su extremo estaba' mantiene la referencia geográfica y la singularidad natural que adoptó la revisión inglesa.
- source_word: גֵּי
  english_pob_choice: Valley of
  chosen_spanish: valle de
  alternatives_spanish:
  - Valle de
  - quebrada de
  lexicon: HALOT
  rationale: גֵּי puede ser valle o barranca; aquí el nombre propio del lugar permite 'valle de' como expresión clara y reverente en español.
- source_word: יִפְתַּח אֵל
  english_pob_choice: Iphtah-el
  chosen_spanish: Iphtá-el
  alternatives_spanish:
  - Iftá-el
  - Jifta-el
  lexicon: HALOT
  rationale: Se conserva la transliteración del topónimo. 'Iphtá-el' refleja la forma hebrea con una adaptación española natural y reconocible.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una expresión singular y más natural para el término final del límite ('its end was'). En español se refleja con 'su extremo estaba'. También se preserva la ambigüedad direccional de מִצְּפוֹן mediante una nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'límite' para גְּבוּל en un contexto territorial, coherente con el audit trail inglés.
  - Se conserva la transliteración de Iphtah-el para un topónimo, siguiendo la práctica del proyecto.
  - 'No se traduce mecánicamente desde el inglés: ''se curvaba'' y ''su extremo estaba'' buscan una sintaxis natural en español sin perder el valor topográfico del hebreo.'
