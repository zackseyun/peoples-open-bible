translation:
  language: es
  text: Desde los tiempos de nuestros padres[a], hemos estado en gran pecado[b] hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de nuestros antepasados». El griego dice «de nuestros padres», preservando el modismo ancestral masculino.
    reason: lexical_alternative
  - marker: b
    text: O, «estamos en gran pecado». El presente griego puede verterse de forma más literal así, pero el perfecto compuesto español comunica mejor el estado continuado desde el pasado hasta ahora.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: From
  chosen_spanish: Desde
  alternatives_spanish:
  - A partir de
  lexicon: BDAG
  rationale: La preposición con genitivo marca un punto de inicio temporal. «Desde» expresa de modo natural ese comienzo y conserva la idea de continuidad hasta el presente.
- source_word: τῶν χρόνων
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - los días
  - los años
  lexicon: BDAG
  rationale: χρόνοι se refiere a períodos o tiempos. «Los tiempos» es la equivalencia más directa y no restringe indebidamente el sentido a días o años literales.
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  lexicon: BDAG
  rationale: El griego usa el masculino plural πατέρων, con sentido idiomático de antecesores. Se mantiene la forma literal «padres» en el texto principal, evitando neutralizarla sin una razón textual suficiente.
- source_word: ἐσμεν
  english_pob_choice: we have been
  chosen_spanish: hemos estado
  alternatives_spanish:
  - somos
  - estamos
  lexicon: BDAG
  rationale: Aunque formalmente es presente («somos/estamos»), en la construcción temporal con ἀπὸ ... ἕως el sentido es continuativo desde el pasado hasta ahora. «Hemos estado» transmite bien esa duración en español.
- source_word: ἐν μεγάλῃ ἁμαρτίᾳ
  english_pob_choice: in great sin
  chosen_spanish: en gran pecado
  alternatives_spanish:
  - en gran culpa
  - en un gran pecado
  lexicon: BDAG
  rationale: ἁμαρτία denota «pecado»; «gran pecado» conserva el contenido moral-religioso del griego. Se evita trasladar el matiz a «culpa» porque eso introduciría un giro más jurídico de lo que exige el texto.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el presente día
  lexicon: BDAG
  rationale: La expresión temporal señala continuidad hasta el presente del hablante. «Hasta este día» es clara, idiomática y cercana al griego.
theological_decisions:
- issue: Lenguaje ancestral masculino
  english_pob_reading: of our fathers
  chosen_spanish_reading: de nuestros padres
  alternative_spanish_readings:
  - de nuestros antepasados
  rationale: El texto fuente usa el término masculino plural πατέρων. Conforme a la práctica del proyecto, se preserva el lenguaje ancestral masculino en el cuerpo principal en vez de sustituirlo por una forma neutralizada.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Pecado como condición continua
  english_pob_reading: we have been in great sin
  chosen_spanish_reading: hemos estado en gran pecado
  alternative_spanish_readings:
  - estamos en gran pecado
  - hemos estado en gran culpa
  rationale: El griego describe una condición persistente de pecado desde un punto pasado hasta el presente. «Hemos estado» refleja esa continuidad; «pecado» mantiene la categoría moral explícita del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el contexto de auditoría inglesa: la decisión principal sigue el griego de Swete, con acuerdo alto en el pasaje y sin revisiones aplicadas; se mantuvo la tensión entre el presente griego ἐσμεν y el valor continuativo expresado en español con perfecto compuesto, sin perder el sentido temporal del enunciado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conservó «pecado» para ἁμαρτία, sin desplazarlo a «culpa».
  - Se mantuvo el lenguaje masculino de parentesco («padres») conforme a la fuente.
  - La puntuación y el orden siguen un español moderno y publicable, sin añadir contenido explicativo ajeno al versículo.
