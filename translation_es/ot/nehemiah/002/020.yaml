translation:
  language: es
  text: 'Entonces les respondí y dije: «El Dios de los cielos, él nos hará prosperar, y nosotros, sus siervos, nos levantaremos y edificaremos[a]. Pero ustedes no tienen parte ni derecho ni memorial en Jerusalén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos dará éxito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשִׁיב אוֹתָם דָּבָר
  english_pob_choice: Then I answered them
  chosen_spanish: Entonces les respondí
  alternatives_spanish:
  - Entonces di respuesta
  - Entonces les contesté
  lexicon: HALOT
  rationale: La expresión hebrea idiomática significa dar respuesta; en español, «respondí» comunica de modo natural el acto de contestar sin perder el valor narrativo de réplica formal.
- source_word: וָאוֹמַר לָהֶם
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - y les dije
  lexicon: HALOT
  rationale: La continuación narrativa se expresa con una fórmula directa y natural en español. El complemento indirecto ya quedó explícito en el contexto inmediato.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: The God of heaven
  chosen_spanish: El Dios de los cielos
  alternatives_spanish:
  - El Dios del cielo
  - El Dios de los cielos
  lexicon: HALOT
  rationale: Se conserva el título postexílico y su registro reverente. «Cielos» refleja con fidelidad el plural hebreo y evita ocultar el matiz del original.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre es enfático; en español se conserva de manera natural mediante la presencia explícita de «él» y la pausa puntuacional, sin sobrecargar con una glosa redundante.
- source_word: יַצְלִיחַ לָנוּ
  english_pob_choice: will make us prosper
  chosen_spanish: nos hará prosperar
  alternatives_spanish:
  - nos dará éxito
  - nos hará tener éxito
  lexicon: HALOT
  rationale: El verbo causativo expresa conceder éxito o prosperidad en la empresa. «Nos hará prosperar» preserva la fuerza causativa y suena natural en español bíblico contemporáneo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aquí el énfasis es la pertenencia y servicio a Dios, no la condición social de esclavitud. «Siervos» mantiene la relación de lealtad sin imponer un matiz social ajeno al contexto.
- source_word: נָקוּם
  english_pob_choice: will arise
  chosen_spanish: nos levantaremos
  alternatives_spanish:
  - nos alzaremos
  - nos pondremos de pie
  lexicon: HALOT
  rationale: El verbo expresa decisión y disposición a emprender la obra. En español, «nos levantaremos» conserva el impulso resolutivo del hebreo y encaja con la construcción paralela del verso.
- source_word: וּבָנִינוּ
  english_pob_choice: and build
  chosen_spanish: y edificaremos
  alternatives_spanish:
  - y construiremos
  - y levantaremos
  lexicon: HALOT
  rationale: El contexto de Jerusalén y sus muros hace que «edificaremos» comunique de forma precisa y digna la acción de construir. Evita la ambigüedad de un simple «hacer» y refleja el sentido prospectivo del verbo.
- source_word: אֵין חֵלֶק
  english_pob_choice: no share
  chosen_spanish: no tienen parte
  alternatives_spanish:
  - no tienen porción
  - no tienen participación
  lexicon: HALOT
  rationale: חלק puede denotar porción o participación; «parte» conserva esa amplitud y suena natural en español jurídico-relacional.
- source_word: וּצְדָקָה
  english_pob_choice: or right
  chosen_spanish: ni derecho
  alternatives_spanish:
  - ni justicia
  - ni reivindicación
  lexicon: HALOT
  rationale: En este contexto, צְדָקָה señala un derecho o título legítimo, no la justicia moral. «Derecho» preserva el matiz de reclamación válida en Jerusalén.
- source_word: וְזִכָּרוֹן
  english_pob_choice: or memorial
  chosen_spanish: ni memorial
  alternatives_spanish:
  - ni recuerdo
  - ni conmemoración
  lexicon: HALOT
  rationale: «Memorial» mantiene el valor de inscripción, recuerdo público o reconocimiento perdurable que comunica el hebreo, y sigue la decisión auditada del POB en inglés.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa y estándar.
theological_decisions:
- issue: Título divino y referencia al nombre de Dios
  english_pob_reading: The God of heaven
  chosen_spanish_reading: El Dios de los cielos
  alternative_spanish_readings:
  - El Dios del cielo
  rationale: Se mantiene el título bíblico sin sustituirlo por una fórmula litúrgica que pudiera suavizar el registro del texto postexílico. La opción plural «cielos» respeta mejor la forma hebrea y es comprensible en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Relación de pertenencia y servicio a Dios
  english_pob_reading: his servants
  chosen_spanish_reading: sus siervos
  alternative_spanish_readings:
  - sus esclavos
  rationale: Aunque el proyecto suele preferir «esclavo» cuando el trasfondo lexical exige la fuerza de dependencia, aquí la función retórica es declarar lealtad a Yahvé frente a opositores sin afirmar un estatus social de servidumbre. «Siervos» preserva la relación teológica de servicio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table by analogy
- issue: Sentido de צְדָקָה en la exclusión final
  english_pob_reading: right
  chosen_spanish_reading: derecho
  alternative_spanish_readings:
  - justicia
  - righteousness
  rationale: La negación no trata de justicia moral sino de legitimidad y título en Jerusalén. «Derecho» comunica con claridad la ausencia de reclamo válido y evita introducir una carga ética que el contexto no pide.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue el patrón revisado del POB inglés: se mantuvo el énfasis de «The God of heaven, he will make us prosper», y en el cierre se adoptó «right» para צְדָקָה conforme a la última revisión aprobada. También se preservó la tríada negativa «parte / derecho / memorial» como formulación estable del versículo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto fuente lo requiera explícitamente; en este versículo aparece el título «Dios de los cielos», por lo que no corresponde introducir el nombre divino.
  - Se prefirió «siervos» por el valor relacional-teológico del contexto y la tradición auditada del POB en este pasaje.
  - «Memorial» se conservó como término técnico bíblico por coherencia con la decisión inglesa auditada y por su utilidad en español eclesial.
  - La puntuación reproduce la fuerza enfática del hebreo con una pausa tras «cielos» y mantiene el cierre antitético del versículo.
