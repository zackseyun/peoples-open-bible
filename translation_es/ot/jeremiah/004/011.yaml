    issue: La nota [a] repite la lectura principal como si fuera alternativa.
    rationale: El texto principal ya dice «viento caliente», por lo que la nota «También puede traducirse “viento caliente”...» es redundante y no informa una alternativa real. Debe listar solo opciones distintas, como «viento abrasador».
  - severity: low
    issue: Los dos puntos antes de la frase negativa suenan menos naturales que una pausa explicativa con raya o coma.
    rationale: El hebreo continúa la descripción del viento y el inglés auditado usa un guion largo. En español bíblico moderno, «... la hija de mi pueblo, no para aventar ni para limpiar» o con raya refleja mejor la relación sintáctica y mejora la fluidez.
  - severity: low
    issue: La coordinación negativa puede simplificarse en el texto principal.
    rationale: «No para aventar ni para limpiar» es más natural que «no para aventar, ni para limpiar»; ambos son correctos, pero la versión sin coma fluye mejor y coincide con la lógica unitaria del hebreo.
