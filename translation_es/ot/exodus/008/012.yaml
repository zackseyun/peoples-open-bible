    issue: «jejenes» no es la mejor opción principal para לְכִנִּם.
    rationale: Aunque intenta preservar la incertidumbre, su uso no es igualmente transparente en todo el ámbito hispano y puede sonar demasiado regional o entomológicamente específico. El término hebreo es incierto; conviene una forma más reconocible con nota aclaratoria.
  - severity: low
