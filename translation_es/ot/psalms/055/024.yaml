    rationale: Esto altera la función documental de la nota y deja sin preservar la alternativa léxica principal de לִבְאֵר שַׁחַת.
  - severity: medium
    issue: Falta una nota para «no vivirán la mitad de sus días», correspondiente al modismo hebreo לֹא יֶחֱצוּ יְמֵיהֶם.
    rationale: El POB inglés documenta explícitamente que la expresión es literalmente «no dividirán/mitad sus días», es decir, que su vida será acortada. Esa aclaración debe conservarse en español.
  - severity: low
