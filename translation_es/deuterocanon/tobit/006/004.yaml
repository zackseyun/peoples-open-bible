    issue: «Toma el pez» debilita Ἐπιλαβοῦ
    rationale: El imperativo pide asir o agarrar firmemente al pez. En español, «tomar» aquí puede sonar a ‘coger/recibir’ más que a sujetar con fuerza en una escena urgente.
  - severity: medium
    issue: «Tomó el pez» debilita ἐκράτησεν
    rationale: El griego enfatiza que el muchacho obtuvo control firme sobre el pez. «Tomó» es demasiado plano; «agarró» o «sujetó» preserva mejor la fuerza del verbo.
  - severity: medium
    issue: «Lo alzó hasta la tierra» es poco natural para ἀνέβαλεν αὐτὸν ἐπὶ τὴν γῆν
    rationale: La frase española suena extraña y «hasta la tierra» no es la forma idiomática de expresar sacar algo del agua onto the land. «Lo sacó a tierra» o «lo subió a tierra» es más fiel y natural.
