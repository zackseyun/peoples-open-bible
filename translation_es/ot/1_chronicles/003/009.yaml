translation:
  language: es
  text: Todos estos eran hijos de David[a], además de los hijos de las concubinas; y Tamar era hermana de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de los hijos de las concubinas». La frase hebrea puede entenderse como excluyendo a esos hijos del total precedente o como mencionándolos además, fuera de la lista principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos
  - La totalidad de estos
  lexicon: HALOT
  rationale: כֹּל expresa totalidad; «Todos estos» recoge de manera natural la lista genealógica previa y mantiene la función recapitulativa del versículo.
- source_word: בְּנֵי דָוִיד
  english_pob_choice: David’s sons
  chosen_spanish: hijos de David
  alternatives_spanish:
  - hijos varones de David
  - los hijos de David
  lexicon: HALOT
  rationale: Aunque בְּנֵי es masculino plural y puede traducirse como «hijos», en español «hijos de David» es idiomático y comunica el valor genealógico sin perder el referente masculino del hebreo.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - excepto
  lexicon: HALOT
  rationale: La preposición puede señalar exclusión o adición fuera del grupo principal. «Además de» conserva esa relación de adición/totalidad sin volver la frase rígida en español.
- source_word: בְּנֵי פִילַגְשִׁים
  english_pob_choice: the sons of the concubines
  chosen_spanish: los hijos de las concubinas
  alternatives_spanish:
  - los hijos de las concubinas de David
  - los hijos de las mujeres secundarias
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «concubinas», que es el equivalente más preciso del término social del hebreo. Se mantiene también «hijos» para reflejar el masculino plural del original.
- source_word: פִילַגְשִׁים
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - mujeres secundarias
  lexicon: HALOT
  rationale: «Concubinas» es el término español estándar y más exacto para esta categoría en contextos reales/monárquicos.
- source_word: וְתָמָר
  english_pob_choice: and Tamar
  chosen_spanish: y Tamar
  alternatives_spanish:
  - junto con Tamar
  lexicon: HALOT
  rationale: La conjunción simple más el nombre propio reproduce fielmente la coordinación hebrea sin añadir matices no presentes en el texto.
- source_word: אֲחוֹתָם
  english_pob_choice: was their sister
  chosen_spanish: era su hermana
  alternatives_spanish:
  - era hermana de ellos
  - era la hermana de ellos
  lexicon: HALOT
  rationale: El hebreo es nominal y no tiene verbo explícito; en español se suple con «era» de forma natural. «Su hermana» mantiene la referencia relacional del pasaje.
translation_notes:
  revision_awareness: La versión española sigue el mismo estado de alta concordancia reflejado en el audit trail inglés; no se observan revisiones aplicadas ni cambios pendientes respecto del sentido base del hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no hay términos divinos en este versículo.
  - Se mantuvo el orden natural del español, pero sin perder la relación de suma/excepción de מִלְּבַד.
  - «Hijos» se usó para reflejar el plural masculino del hebreo, mientras que «era» se añadió por la elipsis verbal del original.
  - La nota al pie preserva la ambigüedad semántica ya documentada en el audit trail inglés.
