id: 2MA.3.8
reference: 2 Maccabees 3:8
source:
  edition: lxx-swete-1909
  text: εὐθέως δὲ ὁ Ἡλιόδωρος ἐποιεῖτο τὴν πορίαν, τῇ μὲν ἐμφάσει ὡς τὰς κατὰ Κοίλην Συρίαν καὶ Φοινίκην πόλεις ἐφοδεῦσαι, τῷ πράγματι δὲ τὴν τοῦ A βασιλέως πρόθεσιν ἐπιτελεῖν.
  language: Greek
  pages:
  - 690
  confidence: high
  validation: agree
translation:
  text: So Heliodorus immediately set out on the journey[a], outwardly as though to inspect the cities of Coele-Syria and Phoenicia, but in reality to carry out the king’s purpose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The source text here includes an anomalous ''A'' before ''king'' (βασιλέως), likely an edition or transcription artifact rather than part of the sense. The translation follows the clear contextual meaning: ''the king’s purpose.'''
    reason: textual_variant
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: LSJ
  rationale: Conveys prompt action in clear modern English without archaic tone.
- source_word: ἐποιεῖτο τὴν πορίαν
  chosen: set out on the journey
  alternatives:
  - made the journey
  - undertook the trip
  lexicon: LSJ
  rationale: The idiom literally means 'was making the journey/journeying.' 'Set out on the journey' captures the inceptive sense naturally in English.
- source_word: τῇ μὲν ἐμφάσει
  chosen: outwardly
  alternatives:
  - in appearance
  - under the pretext
  lexicon: LSJ
  rationale: The phrase contrasts appearance with reality in the following clause. 'Outwardly' is concise and preserves that contrast; 'under the pretext' would sharpen the deceit more than the Greek explicitly requires here.
- source_word: ὡς ... ἐφοδεῦσαι
  chosen: as though to inspect
  alternatives:
  - as if to visit
  - as if to review
  lexicon: LSJ
  rationale: ὡς with infinitive marks the stated or apparent purpose. ἐφοδεῦσαι suggests going over or inspecting places rather than merely passing through them.
- source_word: τὰς κατὰ Κοίλην Συρίαν καὶ Φοινίκην πόλεις
  chosen: the cities of Coele-Syria and Phoenicia
  alternatives:
  - the cities in Coele-Syria and Phoenicia
  lexicon: LSJ
  rationale: A straightforward geographical rendering. 'Coele-Syria' is retained as the standard transliteration of the historical regional name.
- source_word: τῷ πράγματι δέ
  chosen: but in reality
  alternatives:
  - but in fact
  - but actually
  lexicon: LSJ
  rationale: This balances the earlier appearance/reality contrast and preserves the adversative force.
- source_word: τὴν ... πρόθεσιν ἐπιτελεῖν
  chosen: to carry out ... purpose
  alternatives:
  - to accomplish ... plan
  - to fulfill ... intention
  lexicon: LSJ
  rationale: πρόθεσις here denotes intention or plan; 'purpose' is natural and suitably weighty. ἐπιτελεῖν is well represented by 'carry out.'
- source_word: τοῦ A βασιλέως
  chosen: the king’s
  alternatives:
  - King A's
  - the king A's
  lexicon: LSJ
  rationale: The source as provided reads 'A' before βασιλέως, which appears to reflect an edition/transcription artifact rather than a meaningful lexical element in the sentence. Since the sense of the clause clearly requires 'the king’s purpose,' the translation renders the intelligible Greek meaning while noting the issue as a source-level textual matter.
