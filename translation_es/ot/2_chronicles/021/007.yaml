translation:
  language: es
  text: Sin embargo, Yahvé no quiso destruir la casa de David, por causa del pacto que había hecho con David[a], y como había dicho que le daría a él y a sus hijos una lámpara[b] para todos los días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «darle una lámpara a él, y a sus hijos».
    reason: previous_rendering
  - marker: b
    text: O «luz». La metáfora hebrea probablemente alude a la continuidad de la línea o del gobierno de David.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «por todos los días»; algunas traducciones lo expresan interpretativamente como «para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא אָבָה
  english_pob_choice: Yet ... was not willing
  chosen_spanish: Sin embargo, ... no quiso
  alternatives_spanish:
  - Pero ... no quiso
  - Y ... no estuvo dispuesto
  - Y ... no quiso
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o disposición, no solo deseo. «No quiso» comunica bien esa negativa de voluntad en español. «Sin embargo» refleja el valor adversativo del contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto para יהוה, en vez de sustituirlo por un título.
- source_word: לְהַשְׁחִית
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - aniquilar
  lexicon: HALOT
  rationale: El verbo hiphil aquí indica llevar a destrucción; «destruir» es directo y fiel sin intensificar más de lo necesario.
- source_word: בֵּית דָּוִיד
  english_pob_choice: the house of David
  chosen_spanish: la casa de David
  alternatives_spanish:
  - la dinastía de David
  - la casa davídica
  lexicon: HALOT
  rationale: «Casa de David» preserva el modismo dinástico hebreo y su resonancia bíblica. «Dinastía» explicita la idea, pero interpreta más.
- source_word: לְמַעַן הַבְּרִית
  english_pob_choice: because of the covenant
  chosen_spanish: por causa del pacto
  alternatives_spanish:
  - a causa del pacto
  - por amor al pacto
  - por el pacto
  lexicon: HALOT
  rationale: לְמַעַן marca motivo o razón. «Por causa del pacto» mantiene la causalidad de manera natural en español. Se opta por «pacto» para reflejar el lenguaje bíblico del acuerdo divino con David.
- source_word: כָּרַת ... לְדָוִיד
  english_pob_choice: had made with David
  chosen_spanish: había hecho con David
  alternatives_spanish:
  - había cortado con David
  - había establecido con David
  - había concertado con David
  lexicon: HALOT
  rationale: La expresión hebrea «cortar un pacto» se vierte idiomáticamente como «hacer un pacto». Aquí «había hecho con David» conserva la relación pactal sin sonar extraño en español.
- source_word: וְכַאֲשֶׁר אָמַר
  english_pob_choice: and as he had said
  chosen_spanish: y como había dicho
  alternatives_spanish:
  - y tal como había dicho
  - y así como había dicho
  - y conforme había dicho
  lexicon: HALOT
  rationale: La cláusula enlaza la acción de Dios con su palabra anterior. «Y como había dicho» reproduce esa correspondencia de manera sobria y clara.
- source_word: לָתֵת לוֹ נִיר
  english_pob_choice: that he would give to him ... a lamp
  chosen_spanish: que le daría ... una lámpara
  alternatives_spanish:
  - que le daría ... un lampón
  - que le daría ... una luz
  - que le daría ... un resplandor
  lexicon: HALOT
  rationale: Aunque el inglés POB conserva «lamp», en español «lámpara» suele comunicar la misma metáfora dinástica de continuidad. Se mantiene la imagen en vez de sustituirla por una explicación interpretativa como «dinastía».
- source_word: נִיר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  - lumbre
  lexicon: HALOT
  rationale: El sustantivo se traduce con un equivalente visible y metafórico en español. «Lámpara» preserva la imagen de continuidad dinástica; «luz» sería más interpretativo.
- source_word: וּלְבָנָיו
  english_pob_choice: and to his sons
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a sus hijos varones
  - y a su descendencia
  - y a sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos». En español, «hijos» es la forma más natural y formalmente cercana, sin añadir limitaciones innecesarias.
- source_word: כָּל הַיָּמִים
  english_pob_choice: for all days
  chosen_spanish: para todos los días
  alternatives_spanish:
  - para siempre
  - por todos los días
  - por todos los tiempos
  lexicon: HALOT
  rationale: Se conserva la expresión literal «todos los días», como en el POB inglés, en vez de intensificarla a «para siempre», que sería más interpretativo.
theological_decisions:
- issue: Metáfora dinástica de נִיר
  english_pob_reading: lamp
  chosen_spanish_reading: lámpara
  alternative_spanish_readings:
  - luz
  - dinastía
  rationale: En este contexto la «lámpara» funciona como imagen de continuidad de la línea y gobierno davídicos. Mantener la metáfora preserva la tensión literaria y teológica del texto en vez de resolverla explicativamente en el cuerpo del versículo.
  doctrine_reference: Permanecer cercano al símbolo bíblico sin desactivar su carga intertextual.
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto de traducir el Tetragrama con el nombre propio «Yahvé», para no ocultar el nombre revelado en el hebreo.
  doctrine_reference: Consistencia terminológica para el nombre del pacto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se mantuvo la lectura de la metáfora dinástica como «lámpara», se preservó la causalidad de לְמַעַן con «por causa de», y se respetó la corrección revisada que vincula a David y a sus hijos en la misma promesa. En español, la formulación se ajustó para que «a él y a sus hijos» quede explícito y natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה.
  - Se mantuvo «casa de David» para el modismo dinástico.
  - Se conservó «lámpara» en el cuerpo del texto y se dejó la alternativa «luz» en nota.
  - Se evitó «para siempre» en el texto principal para respetar el hebreo «todos los días».
