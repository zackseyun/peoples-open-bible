translation:
  language: es
  text: Y se levantaron[a], y no lo vieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''ya no lo vieron''. El griego dice más literalmente: ''no lo vieron'', lo cual puede implicar su desaparición sin expresarla de manera directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστησαν
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: BDAG
  rationale: En este contexto narrativo breve, el griego expresa una acción física simple. 'Se levantaron' transmite la acción de ponerse en pie de manera natural en español y conserva el valor observacional sin añadir matices interpretativos.
- source_word: οὐκ εἶδον
  english_pob_choice: did not see
  chosen_spanish: no lo vieron
  alternatives_spanish:
  - no pudieron verlo
  - ya no lo vieron
  lexicon: BDAG
  rationale: La construcción griega dice literalmente que no lo vieron. 'No lo vieron' preserva ese sentido directo en español sin explicitar la causa ni convertir la observación en imposibilidad.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre masculino singular se refiere a Rafael en el contexto. En español, el objeto directo átono 'lo' es la forma más natural y clara en esta oración breve.
theological_decisions:
- issue: Si hacer explícita la desaparición milagrosa implícita
  english_pob_reading: 'Keep the wording observational: ''they did not see him'''
  chosen_spanish_reading: 'Mantener la formulación observacional: ''no lo vieron'''
  alternative_spanish_readings:
  - ya no lo vieron
  - desapareció de su vista
  rationale: El griego presenta el resultado desde la perspectiva de los observadores, sin describir el mecanismo del evento. La traducción conserva esa sobriedad y deja que el contexto sugiera el carácter milagroso sin resolverlo de forma explícita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto griego es muy breve y estable; la versión española sigue de cerca la observación narrativa sin añadir elementos ausentes en el original. Se conserva la ambigüedad sobre el modo en que dejó de ser visto, tal como hace el griego.
  spanish_consistency_notes:
  - Se usa 'se levantaron' como equivalente natural de ἀνέστησαν en un contexto narrativo simple.
  - Se traduce οὐκ εἶδον de forma directa como 'no lo vieron', evitando intensificarlo a 'no pudieron verlo' salvo en la nota.
  - Se mantiene un español sobrio y publicable, acorde con el carácter extremadamente breve del versículo.
