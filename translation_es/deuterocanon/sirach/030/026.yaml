translation:
  language: es
  text: Porque la ira ha matado a muchos[b][a], y no hay provecho en el furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego suministrado para este versículo dice otra sentencia distinta: «Consideren que no he trabajado solo para mí, sino para todos los que buscan instrucción». Eso indica una discrepancia de numeración o una tradición textual diferente; la línea principal sigue el testimonio hebreo conservado.'
    reason: textual_variant
  - marker: b
    text: La palabra hebrea traducida aquí como «ira» es algo incierta en su forma; se entiende por el contexto y por su paralelismo con la segunda línea.
    reason: lexical_alternative
lexical_decisions:
- source_word: כי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce de forma natural la razón proverbial que sigue; «Porque» conserva la función causal del hebreo con español fluido y sobrio.
- source_word: רבים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitudes
  - numerosas personas
  lexicon: HALOT
  rationale: «Muchos» reproduce el valor cuantitativo directo y mantiene el tono sentencioso del dicho.
- source_word: הרג
  english_pob_choice: has killed
  chosen_spanish: ha matado
  alternatives_spanish:
  - ha dado muerte
  - ha asesinado
  lexicon: HALOT
  rationale: El verbo hebreo expresa matar/dar muerte; «ha matado» es natural en español y conserva la fuerza proverbial del resultado.
- source_word: דין
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - la indignación
  - el enojo
  - el resentimiento
  lexicon: HALOT
  rationale: Aunque la forma hebrea es algo incierta, el contexto y el paralelismo con קצפון apuntan a una emoción airada. «Ira» es una opción sobria y amplia en español, fiel a esa lectura contextual.
- source_word: ואין
  english_pob_choice: and there is no
  chosen_spanish: y no hay
  alternatives_spanish:
  - y no existe
  - y carece de
  lexicon: HALOT
  rationale: Mantiene la coordinación del hebreo y la negación existencial de manera simple y transparente.
- source_word: תעלה
  english_pob_choice: benefit
  chosen_spanish: beneficio
  alternatives_spanish:
  - provecho
  - ventaja
  - ganancia
  lexicon: HALOT
  rationale: «Beneficio» comunica bien el valor sapiencial de utilidad/provecho en español contemporáneo sin perder el sentido moral del término.
- source_word: בקצפון
  english_pob_choice: in wrath
  chosen_spanish: en la indignación
  alternatives_spanish:
  - en la ira
  - en el enojo
  - en el furor
  lexicon: HALOT
  rationale: Para evitar una repetición excesiva con «ira» en la primera línea, «indignación» conserva el campo semántico de קצפון y refleja la cualidad airada con un matiz ligeramente distinto en español.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego divergente
  english_pob_reading: The main translation follows the extant Hebrew witness; the supplied Greek parallel appears to belong to a different verse or textual tradition.
  chosen_spanish_reading: La traducción principal sigue el testimonio hebreo conservado; el paralelo griego suministrado parece corresponder a otro versículo o a otra tradición textual.
  alternative_spanish_readings:
  - 'Una versión basada en el griego sería: «Consideren que no he trabajado solo para mí, sino para todos los que buscan instrucción».'
  rationale: La política del proyecto da prioridad al hebreo de Sirácida cuando está disponible. Dado que el griego aportado no coincide en contenido con el hebreo, no debe gobernar la línea principal; se registra la discrepancia con transparencia.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
- issue: Valor semántico de דין en contexto
  english_pob_reading: The Hebrew word rendered 'anger' in the first line is somewhat uncertain in form; it is translated from context and from its parallel with 'wrath' in the second line.
  chosen_spanish_reading: La palabra hebrea subyacente se entiende por contexto como una emoción airada, en paralelo con «indignación» en la segunda línea.
  alternative_spanish_readings:
  - justicia
  - juicio
  - resentimiento
  rationale: En español, «juicio» o «justicia» sonarían fuera de lugar aquí; el paralelismo proverbial exige una lectura afectiva, no jurídica. Se preserva la tensión textual sin forzar el léxico.
  doctrine_reference: HALOT; contextual parallelism in the Hebrew witness
translation_notes:
  revision_awareness: 'No se requirieron revisiones adicionales: la versión española conserva la sentencia sapiencial del hebreo y documenta explícitamente la divergencia con el paralelo griego provisto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; en este versículo no aparece el nombre divino.
  - Se eligió «ira»/«indignación» para preservar el campo semántico afectivo de la línea, evitando términos jurídicos como «juicio».
  - El ritmo breve y proverbial del hebreo se mantiene con una estructura igualmente concisa en español.
