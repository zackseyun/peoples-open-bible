base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/016/014.yaml
  text: And you shall rejoice in your festival—you and your son and your daughter[a], and your male slave and your female slave, and the Levite, and the sojourner, and the fatherless, and the widow[d][c][b], who are within your gates.
  footnotes:
  - marker: a
    text: Or “at your festival.” The Hebrew חַג can denote a festival celebration or feast.
    reason: lexical_alternative
  - marker: b
    text: “The sojourner” refers to a non-Israelite resident living among Israel; alternatively, “the resident alien.”
    reason: lexical_alternative
  - marker: c
    text: Or “the orphan.” Hebrew “fatherless” highlights the vulnerable social status addressed in Torah law.
    reason: lexical_alternative
  - marker: d
    text: Hebrew “within your gates” is an idiom for those living within your towns or community.
    reason: cultural_note
