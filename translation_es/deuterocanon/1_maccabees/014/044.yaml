base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/014/044.yaml
  text: And it is not permitted for anyone of the people or of the priests to set aside any of these things[a], or to contradict what is spoken by him, or to convene an assembly in the country without him[b], or to put on purple and wear a gold clasp.
  footnotes:
  - marker: a
    text: Or possibly, 'to organize a faction in the country without him.' The Greek phrase involving συστροφή can suggest a gathering, coalition, or potentially a factional assembly.
    reason: lexical_alternative
  - marker: b
    text: Purple clothing and a gold clasp were marks of rank or official honor.
    reason: cultural_note
