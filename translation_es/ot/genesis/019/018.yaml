translation:
  language: es
  text: 'Pero Lot les dijo: «No, por favor, mis señores[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No, por favor, mi Señor». La forma hebrea אֲדֹנָי puede entenderse como un tratamiento singular respetuoso en algunas lecturas, pero el contexto plural («les») favorece aquí «mis señores».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce el avance narrativo y, por el contexto inmediato de la súplica de Lot frente a la instrucción previa, «pero» comunica bien la respuesta objecional sin apartarse del hebreo.
- source_word: לוֹט
  english_pob_choice: Lot
  chosen_spanish: Lot
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio en su forma usual en español, sin añadir adaptación innecesaria.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El complemento pronominal de tercera persona plural se expresa de manera natural en español con «les», manteniendo el referente plural del hebreo.
- source_word: אַל
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagan eso
  - 'No'
  lexicon: HALOT
  rationale: Aquí funciona como negación enfática de la petición previa; «No» reproduce con naturalidad la fuerza idiomática del hebreo sin convertirla en mandato verbal que el texto no expresa explícitamente.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ruego
  lexicon: HALOT
  rationale: La partícula de súplica y cortesía se vierte con «por favor», que comunica en español moderno el matiz de ruego respetuoso sin arcaísmo.
- source_word: אֲדֹנָי
  english_pob_choice: my lords
  chosen_spanish: mis señores
  alternatives_spanish:
  - señores míos
  - mi señor
  lexicon: HALOT
  rationale: Aunque la forma puede leerse en singular en otras tradiciones, el contexto inmediato («a ellos») favorece un tratamiento plural. «Mis señores» preserva el valor honorífico y el plural, y es más natural en español que un calco rígido.
theological_decisions:
- issue: Si אֲדֹנָי debe entenderse como dirección singular divina o como apelación plural respetuosa a los dos visitantes
  english_pob_reading: 'human/angelic plural address: ''my lords'''
  chosen_spanish_reading: 'apelación plural respetuosa: «mis señores»'
  alternative_spanish_readings:
  - «mi señor»
  - «Señor»
  rationale: El destinatario explícito es plural («les/ a ellos»), de modo que el sentido natural del texto es una apelación a los dos visitantes. Se conserva la tensión interpretativa en nota, pero el texto principal sigue la lectura que mejor se ajusta a la sintaxis hebrea.
  doctrine_reference: Preservar el sentido gramatical inmediato del hebreo y no resolver prematuramente una ambigüedad titulárica.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el juicio auditado del POB en inglés: mantiene la oposición discursiva de But con «Pero», conserva la negación breve de אַל y la súplica de נָא con un español natural, y retiene la tensión interpretativa de אֲדֹנָי en nota sin imponer una resolución teológica no sustentada por el contexto inmediato.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara editorial porque el hebreo aquí no exige una identificación divina en la línea principal; la ambigüedad queda documentada en nota.
  - «Mis señores» preserva el plural respetuoso y evita borrar el referente de dos destinatarios implícito en «a ellos».
  - La puntuación con comillas angulares y la colocación de la nota mantienen el registro bíblico editorial en español.
