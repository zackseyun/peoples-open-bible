translation:
  language: es
  text: Al cabo de siete años, la mujer volvió de la tierra de los filisteos, y salió para clamar[a] al rey por su casa y por su campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para apelar al rey»; o «para suplicar al rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: La expresión temporal hebrea marca la culminación de un período; «al cabo de» conserva ese valor idiomático en español sin sonar rígido ni perder precisión.
- source_word: וַתָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: שׁוּב en este contexto narrativo expresa volver de un lugar de estancia; «volvió» es natural en español y mantiene el sentido de retorno.
- source_word: אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: the land of the Philistines
  chosen_spanish: la tierra de los filisteos
  alternatives_spanish:
  - Filistea
  - la región de los filisteos
  lexicon: HALOT
  rationale: Se conserva la transparencia del hebreo («tierra de los filisteos») en lugar de una etiqueta geográfica más tradicional pero menos explícita.
- source_word: וַתֵּצֵא
  english_pob_choice: she went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - se presentó
  lexicon: HALOT
  rationale: יַצָא indica movimiento de salida; «salió» reproduce de manera directa y natural ese movimiento narrativo.
- source_word: לִצְעֹק
  english_pob_choice: to cry out
  chosen_spanish: clamar
  alternatives_spanish:
  - gritar
  - pedir auxilio
  - suplicar
  lexicon: HALOT
  rationale: El inglés POB revisado volvió a «cry out» para reflejar más directamente el verbo hebreo. En español, «clamar» conserva la fuerza de una queja o petición intensa ante una autoridad, sin reducirla a un simple «gritar» ni convertirla en un tecnicismo jurídico demasiado interpretativo.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  lexicon: HALOT
  rationale: אֶל marca dirección hacia la figura real; «al rey» es la correspondencia más directa y natural.
- source_word: בֵּיתָהּ
  english_pob_choice: her house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa de habitación
  lexicon: HALOT
  rationale: En el contexto de restitución de propiedad, בַּיִת conserva su valor concreto como «casa»; el posesivo femenino queda claro por el contexto.
- source_word: שָׂדָהּ
  english_pob_choice: her field
  chosen_spanish: su campo
  alternatives_spanish:
  - su terreno
  - su parcela
  lexicon: HALOT
  rationale: שָׂדֶה suele referirse a campo o tierra cultivable. «Campo» preserva el valor concreto y coordina bien con «casa» en este reclamo de bienes.
theological_decisions:
- issue: 'La intensidad de לִצְעֹק ante el rey: queja, súplica o reclamo'
  english_pob_reading: '''to cry out'' with a note allowing ''to plead with the king'''
  chosen_spanish_reading: «clamar al rey»
  alternative_spanish_readings:
  - «suplicar al rey»
  - «reclamar al rey»
  - «apelar al rey»
  rationale: El hebreo permite una demanda intensa que no se limita a un simple pedido formal. «Clamar» conserva la urgencia y la carga emocional/judicial sin imponer de entrada una lectura técnica única. La nota mantiene la alternativa interpretativa de peticionamiento legal implícita en el contexto.
  doctrine_reference: No aplica; decisión lexical-narrativa sin carga doctrinal directa.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que cambió la traducción de לִצְעֹק de «appeal» a «cry out» para reflejar con más precisión el verbo hebreo. La versión española sigue esa revisión al elegir «clamar» y evita un lenguaje excesivamente jurídico que no está exigido por el texto.
  spanish_consistency_notes:
  - Se preserva el paralelismo posesivo «su casa y su campo» para reflejar בֵּיתָהּ וְאֶל שָׂדָהּ.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - «Filisteos» se mantiene como gentilicio plural correspondiente a ארץ פלשתים, siguiendo la transparencia del original.
