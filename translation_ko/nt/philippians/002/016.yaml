id: PHP.2.16
reference: Philippians 2:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λόγον ζωῆς ἐπέχοντες, εἰς καύχημα ἐμοὶ εἰς ἡμέραν Χριστοῦ, ὅτι οὐκ εἰς κενὸν ἔδραμον οὐδὲ εἰς κενὸν ἐκοπίασα.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/016.yaml
  text: 'holding fast the word of life, for a boast to me in the day of Messiah, that I did not run in vain or labor in vain.'
translation:
  language: ko
  text: 생명의 말씀[a]을 굳게 붙들면서, 메시아[b]의 날에 나의 자랑이 되십시오. 그래야 내가 헛되이 달리지도 않았고 헛되이 수고하지도 않았다고 할 수 있을 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「생명의 말씀을 들어 보이며」, 「내어 들며」. 헬라어 ἐπέχω는 「굳게 잡다」와 「내어 들다·내어 보이다」 두 의미가 가능하다.
    reason: lexical_alternative
  - marker: b
    text: 전통적 번역으로는 「그리스도의 날」.
    reason: alternative_reading
lexical_decisions:
- source_word: λόγον ζωῆς
  english_pob_choice: the word of life
  chosen_korean: 생명의 말씀
  alternatives_korean:
  - 생명의 메시지
  - 생명에 관한 말씀
  lexicon: BDAG
  rationale: λόγος는 「말씀」 또는 「메시지」일 수 있다. 「생명의 말씀」은 본문의 압축적 표현과 가능한 이중적 의미(생명을 주는 말씀, 생명에 관한 말씀)를 함께 담는다.
- source_word: ἐπέχοντες
  english_pob_choice: holding fast
  chosen_korean: 굳게 붙들다
  alternatives_korean:
  - 내어 들다
  - 들어 보이다
  lexicon: BDAG
  rationale: 영어 POB의 결정에 따라, 앞의 견고한 순종 권면 흐름에 부합하는 「굳게 붙들다」를 본문에 둔다. 외향적·선포적 의미는 각주로 보존한다.
- source_word: καύχημα
  english_pob_choice: a boast
  chosen_korean: 자랑
  alternatives_korean:
  - 자랑거리
  - 자랑할 근거
  lexicon: BDAG
  rationale: 자랑할 대상을 가리키는 명사. 「자랑」이 한국어로 간결하고 자연스럽다.
- source_word: ἡμέραν Χριστοῦ
  english_pob_choice: the day of Messiah
  chosen_korean: 메시아의 날
  alternatives_korean:
  - 그리스도의 날
  lexicon: BDAG
  rationale: Χριστοῦ가 칭호로 기능하므로 본 번역의 원칙에 따라 「메시아」로 옮긴다. 종말론적 칭호 의미를 보존한다.
- source_word: οὐκ εἰς κενὸν
  english_pob_choice: not in vain
  chosen_korean: 헛되이 ~지 않았다
  alternatives_korean:
  - 무익하게 ~지 않았다
  - 헛수고로 ~지 않았다
  lexicon: BDAG
  rationale: 표준적 「헛되이」 관용 표현. 바울의 수사적 평행을 보존한다.
- source_word: ἔδραμον
  english_pob_choice: I did run
  chosen_korean: 달리다
  alternatives_korean:
  - 뛰다
  - 달려가다
  lexicon: BDAG
  rationale: 바울의 사도적 분투에 대한 비유. 한국어 「달리다」가 가장 자연스럽고 이어지는 「수고」와 평행을 이룬다.
- source_word: ἐκοπίασα
  english_pob_choice: labor
  chosen_korean: 수고하다
  alternatives_korean:
  - 애쓰다
  - 힘써 일하다
  lexicon: BDAG
  rationale: κοπιάω는 힘든 노력의 무게를 가진다. 「수고하다」가 「달리다」와 평행을 이루는 한국어 어휘이다.
theological_decisions:
- issue: 종말론적 칭호 구절에서 Χριστοῦ를 칭호로 옮김
  chosen_reading: 메시아의 날
  alternative_readings:
  - 그리스도의 날
  rationale: DOCTRINE.md 지침에 따라 칭호성이 살아 있는 Χριστός는 「메시아」로 옮긴다. 「메시아의 날」에서 종말론적·왕적 칭호의 무게가 분명히 작용한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός default ''Messiah'' where title.'
