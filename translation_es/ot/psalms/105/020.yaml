translation:
  language: es
  text: El rey mandó soltarlo[a]; el gobernante de pueblos lo puso en libertad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo liberó». El verbo hebreo también puede significar «lo soltó» o «lo aflojó de sus ataduras».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lo abrió» o «abrió para él»; el modismo significa que fue liberado de su confinamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo qal expresa el acto básico de enviar; «envió» conserva la relación directa con el sujeto («el rey») sin añadir matices innecesarios.
- source_word: מֶלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: HALOT
  rationale: Aunque el hebreo es anarthrous, el contexto identifica al referentedefinido; en español la forma natural y fiel es el artículo definido.
- source_word: וַיַּתִּירֵהוּ
  english_pob_choice: released him
  chosen_spanish: lo liberó
  alternatives_spanish:
  - lo soltó
  - lo liberó de sus ataduras
  - lo dejó libre
  lexicon: HALOT
  rationale: La raíz en este contexto expresa soltar o liberar de restricciones. «Lo liberó» mantiene el sentido de liberación y funciona con naturalidad en español, sin perder la tensión con la lectura más literal de «soltar».
- source_word: מֹשֵׁל עַמִּים
  english_pob_choice: the ruler of peoples
  chosen_spanish: el gobernante de pueblos
  alternatives_spanish:
  - el que gobierna a los pueblos
  - el gobernante de las naciones
  lexicon: HALOT
  rationale: El participio funciona como título; «gobernante» conserva el valor de quien ejerce dominio, y «pueblos» reproduce el plural colectivo de עַמִּים mejor que una singularización.
- source_word: וַיְפַתְּחֵהוּ
  english_pob_choice: set him free
  chosen_spanish: lo dejó libre
  alternatives_spanish:
  - lo abrió
  - le abrió
  - lo puso en libertad
  lexicon: HALOT
  rationale: Aunque el verbo básico es «abrir», en este contexto idiomático con un objeto humano remite a abrir la prisión o desatar la confinación; «lo dejó libre» comunica el efecto liberador sin borrar la imagen idiomática subyacente.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con la revisión vigente y no requiere cambios sustanciales; se mantiene la equivalencia óptima con dos notas que preservan la alternancia léxica del original.
  spanish_consistency_notes:
  - Se mantiene «el rey» como referente definido por contexto.
  - Se conserva el plural colectivo «pueblos» para עַמִּים.
  - «Lo dejó libre» evita un calco de «abrir» en el texto principal, pero las notas preservan el modismo hebreo.
  - No se introduce terminología eclesiástica ajena al hebreo.
  - La puntuación y el orden mantienen la paralelismo poético del verso.
