review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico de la pregunta retórica sobre la imposibilidad de escapar de Dios y mantiene correctamente «tu Espíritu» y «tu presencia». Sin embargo, introduce matices no presentes en la fuente o en el audit trail: «lejos de» añade la idea de distancia en vez de simplemente separación/origen («de/desde»), «podría ir» y «huiría» no reflejan de manera paralela la posibilidad retórica tan bien como «puedo/podría ... huir», y «Y» debilita el valor disyuntivo/paralelo de וְאָ֗נָה que el POB auditó como «Or where».'
  spanish_quality_summary: 'El español es legible y digno, pero la primera mitad suena algo expandida por «lejos de», y la asimetría entre «podría ir» y «huiría» reduce la fuerza poética. Una revisión menor mejora fidelidad y paralelismo: «¿A dónde puedo ir de tu Espíritu? ¿O a dónde puedo huir de tu presencia?»'
  glossary_alignment: Alineación buena con la terminología del proyecto en «Espíritu». No aparece Yahvé ni otros términos sensibles. La nota léxica sobre rúaj está bien formulada y debe conservarse. La única excepción es que «lejos de» se aparta innecesariamente del valor básico de מִן y de la decisión inglesa «from your Spirit».
  issues:
  - severity: medium
    issue: «lejos de tu Espíritu» añade un matiz no explícito en el hebreo
    rationale: מֵ/רוּחֶךָ significa «de/desde tu Espíritu». «Lejos de» interpreta la separación como distancia espacial y expande el texto más allá de la evidencia fuente.
  - severity: medium
    issue: Asimetría modal entre «podría ir» y «huiría»
    rationale: El paralelismo hebreo y el audit trail inglés usan dos preguntas equivalentes de posibilidad/imposibilidad. «Huiría» suena más condicional hipotético que paralelo a «podría ir»; conviene una formulación simétrica.
  - severity: low
    issue: «Y a dónde» es menos fiel que «O a dónde» al valor auditado de וְאָ֗נָה
    rationale: Aunque la conjunción hebrea puede coordinar de varias maneras, el POB justificó «Or where» por el paralelismo idiomático. En español, «O a dónde» preserva mejor esa relación retórica.
  revised_spanish_text: ¿A dónde puedo ir[a] de tu Espíritu? ¿O a dónde puedo huir de tu presencia?
  revised_footnotes:
  - marker: a
    text: Hebreo rúaj también puede significar «viento» o «aliento»; aquí el contexto favorece «Espíritu».
    reason: lexical_alternative
  revision_rationale: Se elimina «lejos de» por ser una expansión interpretativa; se ajusta la segunda pregunta a un paralelismo modal más claro con «puedo»; y se cambia «Y» por «O» para reflejar mejor la decisión auditada y la estructura poética. La nota sobre «rúaj» se conserva sin cambios.
