base_translation:
  language: en
  yaml_path: translation/ot/micah/007/013.yaml
  text: But the land will become a desolation because of its inhabitants[b][a], because of the fruit of their deeds.
  footnotes:
  - marker: a
    text: Or 'the earth will be a desolation.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; here 'land' best fits the immediate judgment context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the fruit of their deeds,' a Hebrew expression for the consequences produced by what they have done.
    reason: lexical_alternative
