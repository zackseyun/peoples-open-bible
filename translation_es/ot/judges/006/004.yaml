review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: acciones habituales de incursión, devastación agrícola, alcance hasta Gaza y privación de sustento y ganado en Israel. Sin embargo, ''el produce de la tierra'' no es español natural ni fiel al registro meta; debe corregirse a una opción idiomática como ''el producto de la tierra'' o ''el fruto de la tierra''.'
  spanish_quality_summary: 'La redacción es en general clara y digna, con buen manejo del imperfecto habitual (''acampaban'', ''destruían'', ''no dejaban''). La principal falla es léxica y de naturalidad: ''produce'' en español funciona mal aquí. El resto del verso lee con fluidez y conserva bien el tono bíblico moderno.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Israel', 'sustento', 'buey' y 'asno' son adecuados. La decisión de mantener 'hasta Gaza' sin nota puede aceptarse porque sigue la revisión inglesa auditada, aunque el hebreo más literal incluía el modismo 'tu llegada/acercamiento a Gaza'.
  issues:
  - severity: medium
    issue: Uso de 'produce' en 'el produce de la tierra'
    rationale: Aunque calca el inglés 'produce', en español bíblico y general 'produce' no es la forma natural para rendimiento agrícola. 'Producto de la tierra' o 'fruto de la tierra' preserva mejor el sentido de יְבוּל y la legibilidad.
  revised_spanish_text: Acampaban contra ellos y destruían el producto de la tierra hasta Gaza, y no dejaban sustento alguno en Israel, ni oveja, ni buey, ni asno.
  revision_rationale: Se corrige únicamente 'produce' por 'producto' para lograr español natural y fiel al sentido agrícola de יְבוּל, sin alterar las demás decisiones bien resueltas del borrador.
