  glossary_alignment: No hay términos teológicos mayores en juego. El borrador sí respeta la decisión de mantener οἶκον como 'casa' y no 'templo'. La revisión propuesta preserva esa alineación y corrige la sobreespecificación de οἰκοδόμοι.
