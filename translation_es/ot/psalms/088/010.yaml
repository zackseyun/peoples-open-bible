translation:
  language: es
  text: Mi ojo se debilita[a] a causa de la aflicción; te invoco cada día, Yahvé; extiendo hacia ti mis manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi ojo se consume» o «mi ojo está en dolor por la miseria».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינִי
  english_pob_choice: My eye
  chosen_spanish: Mi ojo
  alternatives_spanish:
  - Mis ojos
  lexicon: HALOT
  rationale: El hebreo usa singular, y el español puede conservar esa concreción poética con «mi ojo». Mantiene la imagen corporal y la posible referencia a la vitalidad o la capacidad de ver, sin volverla genérica en plural.
- source_word: דָאֲבָה
  english_pob_choice: grows weak
  chosen_spanish: se debilita
  alternatives_spanish:
  - se marchita
  - languidece
  - se consume
  lexicon: HALOT
  rationale: El verbo expresa languidez, desfallecimiento o debilitamiento por sufrimiento. «Se debilita» comunica bien el efecto en español natural, sin cargar de más el matiz de dolor físico explícito.
- source_word: מִנִּי עֹנִי
  english_pob_choice: because of affliction
  chosen_spanish: a causa de la aflicción
  alternatives_spanish:
  - por la aflicción
  - a causa de mi miseria
  - desde la aflicción
  lexicon: HALOT
  rationale: La construcción indica causa o fuente. «A causa de» hace explícita la relación causal en español, y «aflicción» conserva el valor frecuente de עֹנִי en un contexto poético de padecimiento.
- source_word: קְרָאתִיךָ
  english_pob_choice: I call on you
  chosen_spanish: a ti clamo
  alternatives_spanish:
  - te invoco
  - he clamado a ti
  - te llamo
  lexicon: HALOT
  rationale: Aunque el valor básico es «llamar», en este contexto de oración el español «clamar» expresa la invocación dirigida a Dios con naturalidad y dignidad. Mantiene la fuerza devocional sin añadir más de lo que exige el verbo.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, conforme al criterio del POB, usando la forma española «Yahvé» como adaptación natural en el texto principal. No se sustituye por un título como «Señor».
- source_word: בְכָל י֑וֹם
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: HALOT
  rationale: La frase expresa repetición distributiva. «Cada día» es la forma más directa y natural en español para este uso.
- source_word: שִׁטַּחְתִּי
  english_pob_choice: I spread out
  chosen_spanish: extiendo
  alternatives_spanish:
  - he extendido
  - despliego
  - tiendo
  lexicon: HALOT
  rationale: El verbo describe el gesto físico de extender las manos en oración. En español, «extiendo» preserva el acto visible y resulta idiomático; el presente puede funcionar en tono poético para la acción habitual del salmista.
- source_word: כַפָּי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis palmas
  lexicon: HALOT
  rationale: Aunque el hebreo puede apuntar a las palmas, «mis manos» es la expresión española más natural para el gesto de oración. Evita una precisión anatómica que en español sonaría forzada sin aportar claridad sustancial.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrama. La elección «Yahvé» preserva el nombre propio divino y evita la sustitución por un título, en línea con la política del POB y con la transparencia frente al texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Coincide con el expediente inglés de alta concordancia; no se aplicaron revisiones posteriores y la solución mantiene las decisiones léxicas y teológicas auditadas.
  spanish_consistency_notes:
  - Se conserva la singularidad de «mi ojo» para reflejar el hebreo.
  - «A ti» se mantiene explícito para reflejar el objeto directo de la invocación.
  - «Yahvé» se usa de forma consistente como equivalente del Tetragrama.
  - El orden de la cláusula final sigue el paralelismo poético del hebreo sin forzar sintaxis.
