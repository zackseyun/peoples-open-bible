    rationale: Aunque intenta reflejar 'was breached', «brechada» no es uso estándar en español general ni eclesial; afecta seriamente la legibilidad y dignidad del texto.
  - severity: medium
    issue: La marca de nota [a] está insertada dentro de la palabra «brechada».
    rationale: El proyecto exige que los marcadores aparezcan en el punto relevante del texto, pero no rompiendo ortográficamente la palabra.
  - severity: medium
    issue: Falta en español la nota sobre el sujeto implícito de וַיֵּלֶךְ.
    rationale: El inglés POB documenta que el hebreo deja implícito el sujeto y que el contexto indica al rey. Como el español también explicita «el rey», debe preservarse esa decisión léxica/auditiva.
