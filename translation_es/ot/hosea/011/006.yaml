revisions:
- from: La espada[a] pasará como torbellino por sus ciudades, y consumirá sus cerrojos[b], y devorará por causa de sus consejos.
  to: La espada[a] se arremolinará por sus ciudades, y consumirá sus cerrojos[b], y devorará por causa de sus planes.
  rationale: Se ajusta «pasará como torbellino» a «se arremolinará» para evitar añadir una comparación no explícita y acercarse más al valor poético de movimiento violento documentado para וְחָלָה. Se cambia «consejos» por «planes» para reflejar mejor el matiz causal negativo de מִמֹּעֲצוֹתֵיהֶם en contexto de juicio, manteniendo un español natural y fiel.
