translation:
  language: es
  text: ¡Yahvé[a], cuán numerosos son mis adversarios! Muchos se levantan contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El texto principal sigue la decisión del proyecto de traducir el nombre divino con su transliteración, no con la sustitución «SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Yahvé!
  alternatives_spanish:
  - ¡Yahvé!
  - ¡Jehová!
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del hebreo, siguiendo la decisión auditada del POB de no sustituirlo por un título. En español, «Yahvé» es la forma neutral y reverente más coherente con esa política.
- source_word: מָה
  english_pob_choice: how
  chosen_spanish: cuán
  alternatives_spanish:
  - qué
  - cómo
  lexicon: HALOT
  rationale: En exclamación antes de una idea cuantitativa, מָה expresa intensidad o magnitud; «cuán» reproduce mejor ese valor exclamativo en español que un simple «qué».
- source_word: רַבּוּ
  english_pob_choice: many are
  chosen_spanish: son ... numerosos
  alternatives_spanish:
  - son muchos
  - han llegado a ser muchos
  - se han multiplicado
  lexicon: HALOT
  rationale: El hebreo comunica abundancia de adversarios en un lamento. «Son numerosos» mantiene la idea de multitud de manera natural en español sin añadir un matiz temporal innecesario.
- source_word: צָרַי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis enemigos
  - mis foes
  - los que me hostigan
  lexicon: HALOT
  rationale: «Adversarios» preserva la oposición activa sin ampliar indebidamente a una hostilidad militar absoluta. En español resulta claro y mantiene una tensión menor que «enemigos».
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Numerosos
  - Muchísimos
  lexicon: HALOT
  rationale: El adjetivo funciona de modo enfático y abre la segunda cola. «Muchos» es la equivalencia más directa y natural en español.
- source_word: קָמִים
  english_pob_choice: are rising up
  chosen_spanish: se levantan
  alternatives_spanish:
  - se alzan
  - están levantándose
  - se ponen en pie
  lexicon: HALOT
  rationale: El participio de קום con עַל expresa oposición hostil. «Se levantan» comunica bien esa acción de insurgencia/hostilidad sin volverla más específica de lo que permite el hebreo.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mi contra
  lexicon: HALOT
  rationale: Con קום, עַל señala dirección hostil. «Contra mí» es la forma idiomática y precisa en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio de Dios en español para conservar la política terminológica del POB y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con el juicio de revisión más reciente: no se requieren cambios respecto del inglés auditado; se conserva la misma decisión para el nombre divino y la misma lectura exclamativa de intensidad y hostilidad.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento exclamativo del verso con una puntuación natural en español.
  - «Adversarios» y «se levantan contra mí» conservan la oposición hostil sin sobreinterpretar el verbo hebreo.
  - Se evita «SEÑOR» como máscara del Tetragrámaton, en coherencia con la política del proyecto.
