translation:
  language: es
  text: Y de nuevo[a], si hay curación para la lengua, no está entre los seres humanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo extante para este versículo parece desajustado o corrupto frente al paralelo griego de Sirácida 35:24, que dice: «El que confía en la ley presta atención a los mandamientos, y el que confía en el Señor no será disminuido».'
    reason: textual_variant
lexical_decisions:
- source_word: ועוד
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y además
  - Y de nuevo
  lexicon: N/A (hebreo contextual; correspondencia semántica directa)
  rationale: El hebreo añade una transición discursiva; «Y otra vez» conserva el valor de continuidad sin volverlo más interpretativo que el fuente.
- source_word: מרפא לשון
  english_pob_choice: healing for the tongue
  chosen_spanish: sanidad de la lengua
  alternatives_spanish:
  - curación de la lengua
  - remedio para la lengua
  lexicon: N/A (hebreo contextual; comparación con uso bíblico de מרפא)
  rationale: «Sanidad» mantiene el sentido de curación/restauración de forma natural en español, y «de la lengua» reproduce la construcción nominal sin ampliar el alcance a un dicho o metáfora no explicitada.
- source_word: אין אישהּ מבני אדם
  english_pob_choice: it is not among human beings
  chosen_spanish: no está entre los seres humanos
  alternatives_spanish:
  - no hay entre los seres humanos
  - no se encuentra entre los seres humanos
  lexicon: N/A (hebreo contextual)
  rationale: La frase española preserva la negación de disponibilidad/existencia en el ámbito humano, con un registro claro y sobrio. «Seres humanos» expresa bien מבני אדם sin reducirlo a «hombres».
theological_decisions:
- issue: El texto hebreo suministrado es el que debe gobernar esta unidad, aunque el paralelo griego de la referencia canónica transmite otra sentencia distinta.
  english_pob_reading: The English audit trail had noted a Greek parallel reading for this reference, but the latest revision pass aligned the draft to the extant Hebrew line because the supplied Hebrew witness was judged controlling for the translation unit.
  chosen_spanish_reading: Traducir el hebreo extante, sin introducir el contenido del paralelo griego en el cuerpo del versículo.
  alternative_spanish_readings:
  - 'Traducir según el griego: «El que confía en la ley presta atención a los mandamientos…»'
  - Combinar hebreo y griego en una traducción mixta
  rationale: El packet indica una revisión que reemplazó el draft griego por uno hebreo, y la validación posterior es de alto acuerdo. Por fidelidad al testimonio fuente disponible y a la revisión más reciente, la redacción española sigue el hebreo extante y no injerta el paralelo griego en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; reconocer honestamente la base textual y no fusionar lecturas competidoras en el cuerpo principal.'
translation_notes:
  revision_awareness: 'La versión inicial basada en el griego fue corregida en la revisión posterior para seguir el hebreo extante: de una sentencia sobre confiar en la ley y el Señor a la formulación hebrea sobre la «sanidad de la lengua». La traducción española sigue esa última decisión y evita reintroducir el contenido griego en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» fuera de este versículo porque no aparecen en el texto fuente.
  - Se eligió «seres humanos» para abarcar el hebreo מבני אדם sin sesgo masculino.
  - El tono es sobrio y bíblico, pero no arcaizante.
  - La nota al pie explica la discrepancia textual sin sobrecargar el verso principal.
