translation:
  language: es
  text: 'Y su ofrenda de cereal será flor de harina mezclada con aceite: tres décimas para el toro[a], dos décimas para el carnero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «tres décimas» y «dos décimas» se refieren a décimas partes de un efa, una medida seca usada en el sistema sacrificial de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  english_pob_choice: And their grain offering shall be
  chosen_spanish: Y su ofrenda de cereal será
  alternatives_spanish:
  - Y su ofrenda será
  - Y su oblación será
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial designa la ofrenda de cereal, no una ofrenda genérica. Se conserva el valor posesivo de 'su' y el enlace conjuntivo inicial con 'Y'.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - flor de harina fina
  lexicon: HALOT
  rationale: סֹלֶת refiere a harina de calidad, finamente molida, usada en ofrendas. 'Flor de harina' es una equivalencia asentada en español bíblico y fiel al valor cultual.
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada en aceite
  - batida con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica harina preparada por mezcla con aceite. 'Mezclada con aceite' es natural en español y mantiene la idea de preparación.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: three-tenths
  chosen_spanish: tres décimas
  alternatives_spanish:
  - tres décimas de un efa
  - tres diezmos
  lexicon: HALOT
  rationale: עִשָּׂרוֹן es una medida de décima parte, normalmente de un efa en la legislación sacrificial. En español, 'tres décimas' conserva la cuantificación breve del original y del inglés POB.
- source_word: לַפָּר
  english_pob_choice: for the bull
  chosen_spanish: para el becerro
  alternatives_spanish:
  - para el toro
  - para el novillo
  lexicon: HALOT
  rationale: פַּר puede traducirse por becerro, toro o novillo según contexto. Aquí, en lenguaje sacrificial, 'becerro' resulta preciso y claro para la ofrenda, sin perder el referente zoológico.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: two-tenths
  chosen_spanish: dos décimas
  alternatives_spanish:
  - dos décimas de un efa
  - dos diezmos
  lexicon: HALOT
  rationale: Se mantiene la misma solución que para la primera medida para preservar consistencia y la fuerza cuantitativa del hebreo.
- source_word: לָאָיִל
  english_pob_choice: for the ram
  chosen_spanish: para el carnero
  alternatives_spanish:
  - para el macho carnero
  - para el ram
  lexicon: HALOT
  rationale: אַיִל es 'carnero' en español culto y bíblico; conserva la especificidad del animal sacrificial sin introducir perífrasis innecesarias.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo, manteniendo la estructura enumerativa y la cuantificación sacrificial. Se adopta la terminología de ofrenda de cereal y las medidas abreviadas como en el POB inglés, con una nota explicativa sobre su unidad implícita.
  spanish_consistency_notes:
  - Se usa 'ofrenda de cereal' para מִנְחָה en contexto sacrificial.
  - Se conserva 'flor de harina' como equivalente idiomático de סֹלֶת.
  - Se mantiene la serie cuantitativa breve ('tres décimas', 'dos décimas') con nota cultural.
  - '''Becerro'' y ''carnero'' se usan para los animales del sacrificio con registro bíblico claro.'
