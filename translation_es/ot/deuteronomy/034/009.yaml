translation:
  language: es
  text: Y Josué, hijo de Nun, estaba lleno del espíritu de sabiduría[a], porque Moisés había impuesto sus manos sobre él. Y los hijos de Israel le escucharon y hicieron como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue lleno con el Espíritu de sabiduría». El hebreo también puede entenderse de manera más general como «un espíritu de sabiduría» o, más específicamente, como una dotación divina.
    reason: alternative_reading
lexical_decisions:
- source_word: מָלֵא רוּחַ חָכְמָה
  english_pob_choice: was full of the spirit of wisdom
  chosen_spanish: estaba lleno del espíritu de sabiduría
  alternatives_spanish:
  - estaba lleno del Espíritu de sabiduría
  - estaba lleno de un espíritu de sabiduría
  lexicon: HALOT
  rationale: «Estaba lleno» conserva la construcción predicativa del hebreo. «Espíritu de sabiduría» mantiene la relación nominal sin decidir más de lo que permite el texto acerca de si se trata específicamente del Espíritu Santo o de una dotación espiritual.
- source_word: ר֣וּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - viento
  - aliento
  lexicon: HALOT
  rationale: Aquí רוּחַ expresa una cualidad o dotación espiritual relacionada con la sabiduría; «espíritu» en minúscula preserva esa amplitud y evita cerrar la lectura hacia una identificación explícita con el Espíritu Santo.
- source_word: סָמַךְ ... אֶת יָדָיו עָלָיו
  english_pob_choice: had laid his hands on him
  chosen_spanish: había puesto sus manos sobre él
  alternatives_spanish:
  - había impuesto sus manos sobre él
  - había apoyado sus manos sobre él
  lexicon: HALOT
  rationale: En español, «poner las manos sobre» comunica con naturalidad el acto ritual de imposición de manos. «Puesto» conserva bien el valor del gesto sin sonar forzado.
- source_word: וַיִּשְׁמְעוּ אֵלָיו
  english_pob_choice: listened to him
  chosen_spanish: le escucharon
  alternatives_spanish:
  - lo escucharon
  - le obedecieron
  - oyeron
  lexicon: HALOT
  rationale: «Escucharle» reproduce el valor de atención auditiva y deja que la obediencia quede explícita en la cláusula siguiente. El clítico dativo «le» es natural en español culto y bíblico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la filiación masculina explícita del hebreo. «Hijos de Israel» es claro, tradicional y fiel al paralelismo familiar/covenantal del original.
- source_word: וַיַּעֲשׂוּ כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: did as Yahweh had commanded Moses
  chosen_spanish: hicieron como Yahvé había mandado a Moisés
  alternatives_spanish:
  - hicieron según lo que Yahvé había mandado a Moisés
  - actuaron como Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: «Hicieron como» suena natural y conserva la conformidad con la orden previa. «Mandado» expresa el carácter directivo de צִוָּה sin diluir la fuerza del mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, evitando el sustituto litúrgico «SEÑOR».
theological_decisions:
- issue: Si רוּחַ debe entenderse explícitamente como el Espíritu Santo
  english_pob_reading: Render as 'the spirit of wisdom' with lowercase 'spirit'
  chosen_spanish_reading: «espíritu de sabiduría» en minúscula
  alternative_spanish_readings:
  - «Espíritu de sabiduría»
  - «Espíritu Santo de sabiduría»
  rationale: La frase hebrea permite una dotación espiritual sin exigir una identificación explícita con el Espíritu Santo. Mantener minúscula preserva la tensión interpretativa del texto y sigue la cautela del audit trail inglés.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Cómo reflejar בְּנֵי יִשְׂרָאֵל sin borrar la forma masculina del hebreo
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  - los descendientes de Israel
  rationale: La forma hebrea es masculina plural y conserva un lenguaje familiar/covenantal. «Los hijos de Israel» mantiene esa forma sin neutralizarla.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión más reciente no cambió la redacción base; el pasaje quedó en alta concordancia con el control cruzado y no requiere ajustes sustantivos respecto del texto fuente y el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «los hijos de Israel» para reflejar la forma masculina plural del hebreo.
  - «Espíritu» se escribe en minúscula porque el contexto no obliga a identificarlo explícitamente con el Espíritu Santo.
  - «Puso sus manos sobre él» conserva el gesto ritual de la imposición de manos sin alterar el sentido.
  - La puntuación sigue convención española y el ritmo de la oración bíblica permanece sobrio y publicable.
