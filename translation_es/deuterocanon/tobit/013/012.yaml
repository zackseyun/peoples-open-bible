translation:
  language: es
  text: Todos los que te odian son malditos; todos los que te aman serán benditos para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπικατάρατοι
  english_pob_choice: accursed
  chosen_spanish: Malditos
  alternatives_spanish:
  - Maldichos
  - Malditos bajo maldición
  lexicon: BDAG
  rationale: El griego expresa una condición de maldición pronunciada sobre un grupo. «Malditos» comunica esa fuerza de forma natural en español y evita suavizarla a una mera desaprobación.
- source_word: μισοῦντές
  english_pob_choice: hate
  chosen_spanish: odian
  alternatives_spanish:
  - aborrecen
  - detestan
  lexicon: BDAG
  rationale: El participio sustantivado significa «los que odian». «Odiar» conserva la polaridad moral directa del texto y corresponde al paralelismo con «aman».
- source_word: εὐλογημένοι
  english_pob_choice: blessed
  chosen_spanish: benditos
  alternatives_spanish:
  - bendecidos
  - bienaventurados
  lexicon: BDAG
  rationale: Aquí el sentido es recibir bendición. «Benditos» suena natural en español bíblico y mantiene el contraste fuerte con «malditos».
- source_word: ἀγαπῶντές
  english_pob_choice: love
  chosen_spanish: aman
  alternatives_spanish:
  - quieren
  - aman de afecto
  lexicon: BDAG
  rationale: El participio sustantivado equivale a «los que aman». «Amar» es la correspondencia más directa y consistente con el paralelo de «odian».
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: BDAG
  rationale: La expresión indica duración continua. «Para siempre» comunica el valor idiomático sin arcaísmo y sin perder el énfasis de permanencia.
- source_word: ἔσονται
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  lexicon: BDAG
  rationale: El futuro griego se conserva con «serán». En la primera cláusula, la copulativa en español funciona bien para expresar el estado declarado; en la segunda, mantiene el futuro explícito de la bendición.
theological_decisions:
- issue: Fuerza de maldición y bendición en relación con la destinataria del discurso
  english_pob_reading: Render as straightforward covenantal blessing-and-curse language without softening
  chosen_spanish_reading: Traducir como declaración real de maldición y bendición, sin rebajarla a mero rechazo social o aprobación humana
  alternative_spanish_readings:
  - Quienes te desprecian quedan mal vistos; quienes te estiman serán favorecidos
  - Todos los que te odian recibirán consecuencias negativas; todos los que te aman recibirán bien
  rationale: El griego usa términos fuertes y absolutos. La versión española debe conservar el peso teológico de una fórmula de bendición/maldición, no convertirla en lenguaje psicológico o social.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se detectan revisiones aplicadas ni tensiones textuales que requieran nota crítica.
  spanish_consistency_notes:
  - Se mantiene la terminología POB de ‘benditos’/‘malditos’ para reflejar la polaridad del versículo.
  - Se conserva ‘para siempre’ como equivalente idiomático de εἰς τὸν αἰῶνα.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otras convenciones ajenas al texto.
