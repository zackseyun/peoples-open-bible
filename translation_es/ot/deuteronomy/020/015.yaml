translation:
  language: es
  text: Así harás esto a todas las ciudades que están muy lejos de ti[a], que no están entre las ciudades de estas naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así harás» o «De este modo harás esto».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que no son de entre las ciudades de estas naciones»; el sentido es que estas ciudades no pertenecen al grupo de naciones recién mencionado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  - Así pues
  lexicon: HALOT
  rationale: En este contexto legal-instructivo, כֵּן introduce la manera conforme a lo dicho antes. «Así» conserva la relación con la instrucción previa sin sonar excesivamente interpretativo.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - harás tú
  - deberás hacer
  - harás así
  lexicon: HALOT
  rationale: El imperfecto 2ms en una ley puede expresar mandato. «Harás» mantiene el tono directivo en español bíblico-legible, con menor dureza que «deberás hacer».
- source_word: לְכָל הֶעָרִים
  english_pob_choice: to all the cities
  chosen_spanish: con todas las ciudades
  alternatives_spanish:
  - a todas las ciudades
  - para todas las ciudades
  lexicon: HALOT
  rationale: El ל aquí marca el ámbito afectado por la acción; en español, «con» comunica la aplicación de la norma a esas ciudades de manera natural, sin perder el alcance total de לְכָל.
- source_word: הָרְחֹקֹת מִמְּךָ מְאֹד
  english_pob_choice: that are very far from you
  chosen_spanish: que están muy lejos de ti
  alternatives_spanish:
  - que están a gran distancia de ti
  - que están muy apartadas de ti
  lexicon: HALOT
  rationale: La combinación del adjetivo y מְאֹד pide una intensificación clara. «Muy lejos de ti» reproduce bien la distancia espacial y el énfasis.
- source_word: אֲשֶׁר לֹא מֵעָרֵי
  english_pob_choice: which are not among the cities of
  chosen_spanish: que no son de entre las ciudades de
  alternatives_spanish:
  - que no pertenecen a las ciudades de
  - que no están entre las ciudades de
  lexicon: HALOT
  rationale: El מן partitivo se expresa mejor en español con «de entre», como en la línea auditada inglesa «among». Evita sugerir origen físico («proceden de») y preserva la exclusión del grupo.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas gentes
  lexicon: HALOT
  rationale: גּוֹיִם en Deuteronomio se refiere normalmente a naciones/pueblos en sentido étnico-político. «Naciones» es el equivalente más estable y evita sobrecargar el término.
theological_decisions:
- issue: Distinción legal entre ciudades lejanas y las ciudades de las naciones mencionadas
  english_pob_reading: Render the verse as a legal distinction without softening or expanding its military-judicial force.
  chosen_spanish_reading: 'Presentar el versículo como una delimitación jurídica: lo dicho antes aplica a las ciudades lejanas, no a las ciudades de estas naciones.'
  alternative_spanish_readings:
  - Parafrasear para explicar en el texto la instrucción del asedio anterior
  - Suavizar la oposición entre ambos grupos de ciudades
  rationale: El hebreo funciona como frontera normativa dentro del contexto inmediato. La traducción debe conservar esa delimitación sin añadir explicación interpretativa al cuerpo del versículo.
  doctrine_reference: Deuteronomio 20:10–18; delimitación de la instrucción de guerra en el contexto del capítulo
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que hubo alta concordancia; por ello, este borrador mantiene la lectura principal y solo explicita en español las alternativas léxicas ya observadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם, en coherencia con el uso del POB y con el contexto de Deuteronomio.
  - Se preserva la fuerza injuntiva del imperfecto hebreo con una forma verbal directa en español.
  - La nota sobre «de entre» refleja la tensión partitiva del hebreo sin convertirla en paráfrasis extensa.
