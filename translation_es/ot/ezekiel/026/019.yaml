translation:
  language: es
  text: 'Porque así dice el Señor Yahvé: Cuando te convierta en una ciudad arruinada, como las ciudades que no están habitadas, cuando haga subir sobre ti el abismo[a] y las aguas grandes[b] te cubran,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "cuando haga subir el abismo sobre ti".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "las muchas aguas".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: En español conviene preservar el compuesto de título divino con el nombre propio. 'Yahvé' sigue el criterio del proyecto para יְהוָה, y 'Señor' refleja אֲדֹנָי sin duplicar impropiamente el título como 'Señor SEÑOR'.
- source_word: בְּתִתִּי
  english_pob_choice: When I make
  chosen_spanish: cuando te convierta en
  alternatives_spanish:
  - cuando te haga
  - al hacerte
  lexicon: HALOT
  rationale: 'El verbo נתן en esta construcción idiomática expresa el acto de poner/hacer que alguien sea algo. ''Convertir en'' comunica con naturalidad el valor resultativo: hacerte pasar a ese estado de ciudad arruinada.'
- source_word: עִיר נֶחֱרֶבֶת
  english_pob_choice: a ruined city
  chosen_spanish: una ciudad arruinada
  alternatives_spanish:
  - una ciudad devastada
  - una ciudad asolada
  lexicon: HALOT
  rationale: '''Arruinada'' reproduce el sentido pasivo-resultativo de חרב sin cargar demasiado con un matiz bélico que el español puede insinuar más de lo necesario.'
- source_word: כֶּעָרִים אֲשֶׁר לֹא נוֹשָׁבוּ
  english_pob_choice: like the cities that are not inhabited
  chosen_spanish: como las ciudades que no están habitadas
  alternatives_spanish:
  - como las ciudades que no fueron habitadas
  - como las ciudades deshabitadas
  lexicon: HALOT
  rationale: Mantiene el contraste descriptivo del hebreo con el participio pasivo de ישב. 'No están habitadas' es claro y conserva la negación de ocupación sin forzar un calco rígido.
- source_word: בְּהַעֲלוֹת ... אֶת תְּהוֹם
  english_pob_choice: when I bring up the deep
  chosen_spanish: cuando haga subir sobre ti el abismo
  alternatives_spanish:
  - cuando haga subir el abismo sobre ti
  - cuando levante el abismo sobre ti
  lexicon: HALOT
  rationale: El hebreo expresa el ascenso del abismo como agente de juicio 'sobre ti'. 'Haga subir sobre ti el abismo' conserva la imagen y la dirección del movimiento mejor que una paráfrasis más suave.
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - el profundo
  - el mar profundo
  lexicon: HALOT
  rationale: '''Abismo'' expresa el peso de תְּהוֹם en un contexto de aguas de juicio y mantiene la resonancia bíblica de profundidad caótica. Se prefiere aquí a ''lo profundo'' por mayor precisión y fuerza.'
- source_word: וְכִסּוּךְ הַמַּיִם הָרַבִּים
  english_pob_choice: and the great waters cover you
  chosen_spanish: y las aguas grandes te cubran
  alternatives_spanish:
  - y las muchas aguas te cubran
  - y las aguas abundantes te cubran
  lexicon: HALOT
  rationale: '''Aguas grandes'' sigue de cerca הַמַּיִם הָרַבִּים y evita diluir el carácter solemne del juicio. Se conserva el sujeto plural con el verbo final en castellano natural.'
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: 'Se sigue la directriz del proyecto para יְהוָה: ''Yahvé''. El compuesto con אֲדֹנָי se vuelve ''el Señor Yahvé'' para respetar el valor del título y del nombre propio sin recurrir al masking convencional ''SEÑOR''.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que prefirió 'great waters' sobre 'many waters' para mayor cercanía léxica a הַמַּיִם הָרַבִּים. La redacción española sigue esa preferencia con 'aguas grandes', manteniendo además la imagen del abismo que sube sobre Tiro. Se evitó traducir mecánicamente desde el inglés cuando el hebreo pide una relación más directa entre el sujeto implícito de juicio y el movimiento de las aguas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - '''Señor'' traduce אֲדֹנָי dentro del compuesto divino.'
  - '''Abismo'' se usa para תְּהוֹם por coherencia con el contexto de juicio acuático.'
  - La sintaxis conserva el paralelismo del hebreo con dos cláusulas temporales 'cuando... cuando...' .
