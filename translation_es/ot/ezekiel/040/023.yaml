translation:
  language: es
  text: Y una puerta del atrio interior estaba enfrente de la puerta del norte y de la puerta del oriente[a]; y midió de puerta a puerta cien codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "frente a" la puerta del norte y a la puerta del oriente.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - entrada
  lexicon: HALOT
  rationale: En este contexto arquitectónico del templo, el hebreo puede referirse a una abertura/estructura de acceso. En español, 'puerta' resulta natural y claro para un lector amplio, sin perder la función de acceso; 'portón' suena más pesado y 'entrada' es menos preciso como elemento arquitectónico.
- source_word: חָצֵר הַפְּנִימִי
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - el atrio de adentro
  lexicon: HALOT
  rationale: '''Atrio'' preserva el vocabulario arquitectónico-templeño tradicional en español y corresponde bien al área cercada del complejo. ''Interior'' mantiene la relación espacial del hebreo. ''Patio interior'' sería comprensible, pero menos técnico en este contexto.'
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: enfrente de
  alternatives_spanish:
  - opuesto a
  - frente a
  lexicon: HALOT
  rationale: El hebreo indica correspondencia espacial de una abertura con otra. 'Enfrente de' comunica de forma natural esa relación; 'opuesto a' es correcto pero más abstracto, y 'frente a' puede sonar menos preciso en el registro arquitectónico.
- source_word: לַצָּפוֹן וְלַקָּדִים
  english_pob_choice: on the north and on the east
  chosen_spanish: del norte y de la del oriente
  alternatives_spanish:
  - al norte y al oriente
  - en el norte y en el oriente
  lexicon: HALOT
  rationale: El hebreo señala la ubicación direccional de la puerta correspondiente. En español, la coordinación 'del norte y de la del oriente' evita la repetición pesada de 'puerta' y conserva la referencia a dos lados direccionales. 'Oriente' mantiene una forma bíblica digna y clara.
- source_word: וַיָּמָד
  english_pob_choice: he measured
  chosen_spanish: midió
  alternatives_spanish:
  - y midió
  - él midió
  lexicon: HALOT
  rationale: El verbo narrativo hebreo se puede expresar con simple pretérito en español. Se omite el pronombre porque el sujeto es claro por el contexto y porque el español lo permite con mayor naturalidad.
- source_word: מִשַּׁעַר אֶל שַׁעַר
  english_pob_choice: from gate to gate
  chosen_spanish: de una puerta a la otra
  alternatives_spanish:
  - de puerta a puerta
  - de una puerta a puerta
  lexicon: HALOT
  rationale: La locución hebrea marca la distancia entre dos accesos. 'De una puerta a la otra' reproduce la relación distributiva y suena natural; 'de puerta a puerta' es más literal pero menos fluido.
- source_word: מֵאָה אַמָּה
  english_pob_choice: one hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - ciento codos
  - cien medidas de codo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codos' para mantener la medida del texto fuente en un pasaje técnico de visión arquitectónica. 'Cien codos' es la forma natural en español para la cantidad expresada con cardenal pleno.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del texto hebreo y la lectura inglesa auditada, con una adaptación española más natural en la primera cláusula: ''atrio interior'' y ''enfrente de'' preservan el valor espacial, mientras que ''de una puerta a la otra'' refleja el hebreo idiomático sin añadir contenido.'
  spanish_consistency_notes:
  - Se mantiene 'oriente' para alinear el registro bíblico y la terminología direccional del pasaje.
  - Se conserva la unidad 'codos' sin convertirla a medidas modernas, por tratarse de una escena de medición visionaria.
  - 'La puntuación separa las dos acciones del versículo conforme a la sintaxis hebrea: ubicación de la puerta y medición.'
