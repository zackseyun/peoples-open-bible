translation:
  language: es
  text: pero si hace lo malo a mis ojos, no escuchando mi voz, entonces yo desistiré[a] del bien que dije que le haría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cambiaré de parecer». El verbo hebreo puede expresar que Dios revoca o revierte una acción anunciada; no implica arrepentimiento moral.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «hacerle bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: but if it does
  chosen_spanish: pero si hace
  alternatives_spanish:
  - y si hace
  - y si lo hace
  lexicon: HALOT
  rationale: En contexto condicional, la forma hebrea continúa la hipótesis de la cláusula anterior. En español, 'pero si' conserva la contraposición implícita y 'hace' mantiene el valor verbal simple del verbo עשה sin sobrecargarlo.
- source_word: הָרָעָה
  english_pob_choice: what is evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que es malo
  lexicon: HALOT
  rationale: El artículo y el sustantivo femenino en hebreo describen conducta moralmente mala. 'Lo malo' suena natural en español y conserva el sentido ético sin volverlo demasiado abstracto.
- source_word: בְּעֵינַי
  english_pob_choice: in my sight
  chosen_spanish: a mis ojos
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: El hebreo es un modismo de evaluación divina. 'A mis ojos' comunica bien esa valoración personal y evita una paráfrasis más interpretativa.
- source_word: לְבִלְתִּי שְׁמֹעַ בְּקוֹלִי
  english_pob_choice: not listening to my voice
  chosen_spanish: no escuchando mi voz
  alternatives_spanish:
  - sin escuchar mi voz
  - sin obedecer a mi voz
  lexicon: HALOT
  rationale: La construcción infinitiva expresa la negativa a atender la voz divina. 'No escuchando mi voz' sigue de cerca la forma y conserva la posibilidad semántica de oír/obedecer presente en 'escuchar'.
- source_word: וְנִחַמְתִּי
  english_pob_choice: then I will relent
  chosen_spanish: entonces yo me arrepentiré[a]
  alternatives_spanish:
  - entonces yo me retractaré
  - entonces cederé
  lexicon: HALOT
  rationale: El verbo נחם puede expresar lamentar, desistir o cambiar de curso. Aquí, como en la auditable lectura inglesa, el punto es la reversión de una acción anunciada. En español se mantiene la tensión con 'me arrepentiré', pero el pie de nota aclara que no implica pecado en Dios; alternativamente podría decirse 'me retractaré' o 'cederé', aunque ambas pierden parte del eco bíblico.
- source_word: עַל הַטּוֹבָה
  english_pob_choice: concerning the good
  chosen_spanish: del bien
  alternatives_spanish:
  - respecto del bien
  - acerca del bien
  lexicon: HALOT
  rationale: La preposición עַל marca el asunto del que se habla. 'Del bien' es una forma breve y fiel en español; mantiene la referencia a la acción beneficiosa prometida.
- source_word: אֲשֶׁר אָמַרְתִּי
  english_pob_choice: that I said
  chosen_spanish: que dije
  alternatives_spanish:
  - que había dicho
  - que había prometido
  lexicon: HALOT
  rationale: אָמַר significa decir, y el pasado simple reproduce bien la secuencia del texto. 'Dije' es directo y suficientemente preciso; 'había dicho' añade una anterioridad que no es imprescindible aquí.
- source_word: לְהֵיטִיב אֹתוֹ
  english_pob_choice: I would do to it
  chosen_spanish: que le haría[b]
  alternatives_spanish:
  - para hacerle bien
  - para beneficiarlo
  lexicon: HALOT
  rationale: El verbo היטיב comunica hacer bien, tratar bien o beneficiar. En español, 'le haría' conserva la relación verbal con el pronombre colectivo implícito y evita una repetición torpe de 'bien'; la nota aclara literalmente 'hacerle bien'.
theological_decisions:
- issue: Renderización de נחם aplicada a Dios
  english_pob_reading: I will relent
  chosen_spanish_reading: yo me arrepentiré[a]
  alternative_spanish_readings:
  - yo me retractaré
  - yo cederé
  - cambiaré de parecer
  rationale: El hebreo presenta a Dios respondiendo a la conducta humana mediante un cambio anunciado de trato. En español, 'me arrepentiré' conserva la fuerza tradicional del verbo hebreo, pero la nota evita una lectura moral impropia de Dios. Se preserva así la tensión teológica del texto sin suavizarla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directamente y toma como contexto auditable la solución inglesa revisada, que eliminó una lectura más instrumental de la infinitiva y mantuvo el valor condicional de la cláusula. El español conserva ese mismo arco: conducta mala, negativa a escuchar, y reversión del bien anunciado. También se tuvo en cuenta que el POB inglés eligió ''relent'' para preservar la tensión teológica de נחם; el español adopta una solución equivalente con nota aclaratoria.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de un sustituto como 'Señor', conforme al estándar del proyecto.
  - Se mantiene un registro formal y eclesialmente inteligible, sin calco excesivo del inglés.
  - '''A mis ojos'' y ''mi voz'' preservan los modismos hebreos de evaluación y obediencia.'
  - La nota sobre 'hacerle bien' conserva la alternativa literal que el inglés también documenta.
