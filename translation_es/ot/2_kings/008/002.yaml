translation:
  language: es
  text: Entonces la mujer se levantó e hizo conforme a la palabra del hombre de Dios. Ella se fue[a], ella y los de su casa, y vivió como extranjera residente en la tierra de los filisteos por siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «habitó como extranjera en la tierra de los filisteos por siete años».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El wayyiqtol de קום marca avance narrativo y respuesta de la mujer. En español, 'se levantó' conserva el movimiento inicial sin cargar un tono demasiado literal o arcaizante.
- source_word: וַתַּעַשׂ כִּדְבַר
  english_pob_choice: did according to the word of
  chosen_spanish: hizo conforme a la palabra de
  alternatives_spanish:
  - hizo como
  - actuó conforme a lo dicho por
  lexicon: HALOT
  rationale: La expresión hebrea indica obediencia a una instrucción hablada. 'Conforme a la palabra de' preserva el giro semítico y la fuerza de la instrucción recibida, de modo natural en español bíblico moderno.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  - el varón de Dios
  lexicon: HALOT
  rationale: Es el título bíblico estándar para una figura comisionada por Dios. 'Hombre de Dios' reproduce la fórmula con transparencia y sin reemplazarla por una categoría interpretativa más específica.
- source_word: וַתֵּלֶךְ הִיא וּבֵיתָהּ
  english_pob_choice: She went, she and her household
  chosen_spanish: Ella se fue, ella y su casa
  alternatives_spanish:
  - ella fue con su casa
  - ella y su casa se fueron
  lexicon: HALOT
  rationale: '''Casa'' refleja el hebreo בַּיִת con sufijo, que puede referirse al grupo doméstico. La repetición ''ella, ella y su casa'' mantiene la estructura enfática del hebreo y la revisión del POB en inglés que explicitó ese paralelismo.'
- source_word: וַתָּגָר
  english_pob_choice: lived as a foreign resident
  chosen_spanish: vivió como residente extranjera
  alternatives_spanish:
  - sojournó
  - habitó como forastera
  - vivió como forastera
  lexicon: HALOT
  rationale: גור expresa residencia como extranjera o forastera. 'Residente extranjera' comunica la idea de manera clara y moderna; 'sojournó' sería demasiado arcaico para el español general.
- source_word: בְּאֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: in the land of the Philistines
  chosen_spanish: en la tierra de los filisteos
  alternatives_spanish:
  - en la tierra filistea
  - en Filistea
  lexicon: HALOT
  rationale: Se conserva la formulación etnogeográfica del hebreo. 'Tierra de los filisteos' es más transparente y cercana al original que una forma más geográfica o técnica.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: for seven years
  chosen_spanish: por siete años
  alternatives_spanish:
  - durante siete años
  - siete años
  lexicon: HALOT
  rationale: En español, la duración de una residencia se expresa naturalmente con 'por'. Mantiene la equivalencia temporal del hebreo sin añadir más contenido del necesario.
translation_notes:
  revision_awareness: El texto inglés revisado hizo explícita la secuencia hebrea 'She went, she and her household'. La redacción española conserva esa explicitación mediante 'Ella se fue, ella y su casa', evitando reducirlo a una simple frase de compañía.
  spanish_consistency_notes:
  - Se usó 'Dios' en el título אישי־teológico sin sustituirlo por un equivalente eclesiástico no necesario.
  - Se eligió 'residente extranjera' para mantener la tensión semántica de גור sin caer en un arcaísmo innecesario.
  - '''Casa'' se mantuvo para בֵּיתָהּ conforme al uso bíblico de familia/hogar doméstico, no solo edificio.'
