translation:
  language: es
  text: porque los que trabajan en plata[a] y se preocupan, y no hay modo de averiguar sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que elaboran la plata y están llenos de preocupación, y no hay manera de descubrir sus obras». El griego es breve y algo difícil; la línea puede describir a artesanos hábiles cuyos logros no permiten, al final, descubrir la sabiduría.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La conjunción introduce una explicación causal; «porque» expresa con claridad esa relación en español contemporáneo sin desplazar el sentido del griego.
- source_word: οἱ ... τεκταίνοντες
  english_pob_choice: those who work
  chosen_spanish: los que trabajan
  alternatives_spanish:
  - los que elaboran
  - los que fabrican
  - los que artesanan
  lexicon: LSJ
  rationale: El participio identifica a una clase por su actividad. «Los que trabajan» es natural en español y mantiene la referencia a una labor manual o artesanal sin forzar un tecnicismo.
- source_word: τὸ ἀργύριον
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - plata
  - metal precioso
  - dinero
  lexicon: LSJ
  rationale: El objeto directo es literalmente el metal «plata». En español, «trabajan la plata» comunica de forma natural la labor artesanal y preserva la referencia material, sin pasar a «dinero».
- source_word: μεριμνῶντες
  english_pob_choice: are concerned
  chosen_spanish: se preocupan
  alternatives_spanish:
  - están ansiosos
  - se inquietan
  - están preocupados
  lexicon: BDAG
  rationale: El griego puede expresar cuidado ansioso o preocupación. Dado el ajuste del inglés POB hacia un registro más sobrio, «se preocupan» conserva la idea de afán/cuidado sin la intensidad psicológica de «ansiosos».
- source_word: οὐκ ἔστιν ἐξεύρεσις
  english_pob_choice: there is no finding out
  chosen_spanish: no hay modo de averiguar
  alternatives_spanish:
  - no se puede descubrir
  - no hay descubrimiento
  - no es posible encontrar
  lexicon: LSJ
  rationale: La construcción abstracta de «ἐξεύρεσις» se vierte con una formulación española clara. «No hay modo de averiguar» mantiene el sentido de imposibilidad de llegar a conocer plenamente.
- source_word: τῶν ἔργων αὐτῶν
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus obras
  - sus trabajos
  - lo que hacen
  lexicon: BDAG
  rationale: «Obras» conserva el vínculo con ἔργα y en español funciona tanto para productos artesanales como para acciones, sin precisar indebidamente el referente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el ajuste editorial del inglés POB desde «work silver» a «work in silver» y desde «are anxious» a «are concerned». La versión española conserva la misma línea interpretativa, pero la expresa con una construcción natural en español: «trabajan la plata» y «se preocupan».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología litúrgica ajena porque el texto no contiene el Tetragrámaton ni un título divino.
  - Se prefirió «plata» en sentido material, coherente con el griego ἀργύριον y con la nota alternativa del POB inglés.
  - «Obras» mantiene la ambigüedad útil entre productos y acciones, en lugar de especificar «productos» o «deeds».
