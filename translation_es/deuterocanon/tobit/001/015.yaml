translation:
  language: es
  text: Y cuando murió Enemessar[a], Achreil, su hijo, llegó a ser rey en su lugar, y sus caminos se volvieron inseguros[b], y ya no pude ir a Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres reales aparecen aquí como Enemessar y Achreil en el testimonio griego usado para esta traducción; otras tradiciones textuales de Tobit conservan grafías diferentes y, en algunos casos, nombres distintos.
    reason: textual_variant
  - marker: b
    text: 'El griego de este verbo es difícil y aparece en una forma inusual. La traducción sigue el sentido contextual inferido por el POB inglés: los caminos quedaron en desorden o inseguros, de modo que Tobit ya no podía viajar a Media.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - expiró
  lexicon: BDAG
  rationale: El griego narra la muerte de forma simple y directa; «murió» conserva ese tono sin añadir solemnidad ni eufemismo.
- source_word: ἐβασίλευσεν
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - empezó a reinar
  lexicon: BDAG
  rationale: Aquí la idea principal es la sucesión al trono tras la muerte del anterior rey. En español, «reinó» comunica naturalmente que asumió la realeza, aunque el matiz de acceso queda reforzado por «en su lugar».
- source_word: ἀντʼ αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: BDAG
  rationale: Es la fórmula idiomática de reemplazo o sucesión; «en su lugar» transmite bien la sustitución sin sonar forzado.
- source_word: αἱ ὁδοὶ αὐτοῦ
  english_pob_choice: his roads
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus rutas
  - los caminos de su reino
  lexicon: LSJ
  rationale: Aunque el inglés POB optó por «roads», en español «caminos» es la opción más natural y puede abarcar las rutas de viaje en este contexto. El referente sigue siendo literal, ligado al viaje a Media.
- source_word: ἠκαταστάτησαν
  english_pob_choice: became unsafe
  chosen_spanish: se volvieron inseguros
  alternatives_spanish:
  - quedaron en desorden
  - se desordenaron
  - se volvieron inestables
  lexicon: LSJ
  rationale: 'El verbo es difícil y su sentido se infiere por el contexto del viaje. «Se volvieron inseguros» preserva el resultado práctico: ya no eran transitables con seguridad, sin afirmar más de lo que el texto permite.'
- source_word: οὐκέτι ἠδυνάσθην
  english_pob_choice: I was no longer able
  chosen_spanish: ya no pude
  alternatives_spanish:
  - ya no fui capaz
  - ya no me fue posible
  lexicon: BDAG
  rationale: En español, «ya no pude» expresa con naturalidad la cesación de la capacidad de viajar, manteniendo el sentido de incapacidad continuada terminada en el pasado.
- source_word: πορευθῆναι εἰς τὴν Μηδείαν
  english_pob_choice: to go into Media
  chosen_spanish: ir a Media
  alternatives_spanish:
  - viajar a Media
  - dirigirme a Media
  lexicon: BDAG
  rationale: «Ir a Media» es idiomático y claro en español. Se conserva la dirección del movimiento sin sobrecargar la frase con una preposición más literal que resultaría menos natural.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su conclusión de alta concordancia sin cambios necesarios. No hubo revisiones aplicadas al versículo; la redacción española sigue el mismo núcleo semántico y conserva la dificultad léxica de ἠκαταστάτησαν mediante una solución contextual equivalente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «Media» como topónimo transliterado en español.
  - Se evita «Cristo/Mesías» porque no hay léxico correspondiente en el versículo.
  - La sucesión real se expresa con lenguaje natural español sin introducir matices doctrinales ajenos al contexto narrativo.
