source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/אָ֫סָ֥ף אֱֽלֹהִ֗ים נִצָּ֥ב בַּ/עֲדַת אֵ֑ל בְּ/קֶ֖רֶב אֱלֹהִ֣ים יִשְׁפֹּֽט־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/082/000.yaml
  text: A psalm of Asaph[a]. God stands in the assembly of God; in the midst of the gods he judges.
  footnotes:
  - marker: a
    text: Or 'the divine beings.' Some understand 'the gods' here as human judges or rulers.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:37:22Z'
    unchanged: false
    changes_summary: Completed the verse by adding the main clause and judgment statement from the Hebrew; retained the superscription and rendered the repeated Elohim terms transparently.
translation:
  language: es
  text: Un salmo de Asaf. Dios está de pie en la asamblea de Dios; en medio de los dioses[a] juzga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los seres divinos”. Algunos entienden aquí “los dioses” como jueces o gobernantes humanos.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמ֗וֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Salmo
  lexicon: מִזְמָר / mizmor
  rationale: Se mantiene el género literario con el sustantivo español natural 'salmo', sin añadir artículo definido porque el hebreo de encabezado funciona de forma titular.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - de Asaf, el músico
  lexicon: לְ + אָסָף
  rationale: La preposición lamed en encabezamientos puede indicar atribución; 'de Asaf' refleja mejor la forma breve y convencional del superscrito sin expandir innecesariamente.
- source_word: אֱלֹהִים נִצָּב
  english_pob_choice: God stands
  chosen_spanish: Dios se pone de pie
  alternatives_spanish:
  - Dios está de pie
  - Dios se alza
  lexicon: אֱלֹהִים + נצב
  rationale: '''Se pone de pie'' conserva la imagen verbal de נִצָּב y evita una mera cópula estática que perdería el movimiento figurado del hebreo.'
- source_word: בַּעֲדַת אֵל
  english_pob_choice: in the assembly of God
  chosen_spanish: en la asamblea de Dios
  alternatives_spanish:
  - en la congregación de Dios
  - en la asamblea divina
  lexicon: עֲדַת + אֵל
  rationale: '''Asamblea'' transmite el sentido colectivo y solemne de עֲדָה. Se mantiene ''de Dios'' como en la lectura del POB en inglés, sin suavizar la tensión del texto.'
- source_word: בְּקֶרֶב אֱלֹהִים
  english_pob_choice: in the midst of the gods
  chosen_spanish: en medio de los dioses
  alternatives_spanish:
  - entre los dioses
  - en medio de los seres divinos
  - entre los jueces
  lexicon: אֱלֹהִים
  rationale: Se conserva 'dioses' para reflejar la tensión lexical documentada en el POB inglés, sin resolverla prematuramente hacia 'jueces' o 'seres divinos' en el texto principal.
- source_word: יִשְׁפֹּט
  english_pob_choice: he judges
  chosen_spanish: juzga
  alternatives_spanish:
  - juzgará
  - emite juicio
  lexicon: שׁפט
  rationale: En presente gnómico, 'juzga' reproduce la acción judicial del hebreo sin forzar un tiempo futuro que no está exigido por la forma verbal en este contexto.
theological_decisions:
- issue: Sentido de אֱלֹהִים en el segundo colon
  english_pob_reading: the gods / Some understand the gods here as human judges or rulers.
  chosen_spanish_reading: los dioses
  alternative_spanish_readings:
  - los seres divinos
  - los jueces o gobernantes humanos
  rationale: El texto principal preserva la lectura más directa del hebreo y la misma tensión que la nota inglesa documenta. La alternativa interpretativa se reserva para nota, no para el cuerpo del verso.
  doctrine_reference: Salmo 82; cf. Jn 10:34-36 para el uso posterior del pasaje
- issue: Conservación de la doble referencia a Elohim
  english_pob_reading: God ... in the assembly of God ... in the midst of the gods
  chosen_spanish_reading: Dios ... en la asamblea de Dios ... en medio de los dioses
  alternative_spanish_readings:
  - Dios ... en la asamblea divina ... en medio de seres divinos
  rationale: Se mantiene la repetición de אֱלֹהִים con distinta función gramatical para no borrar la ambigüedad deliberada del hebreo. Esto preserva el contraste entre el Dios que juzga y los 'dioses' juzgados.
  doctrine_reference: Teología bíblica del consejo divino
translation_notes:
  revision_awareness: La revisión reciente completó el encabezado y el contenido principal del versículo a partir del hebreo, manteniendo la transparencia de las tres ocurrencias de אֱלֹהִים. Esta versión española sigue ese ajuste y conserva la misma tensión lexical en una forma natural para el lector hispanohablante.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים cuando designa al sujeto singular del verbo, y 'los dioses' cuando aparece en el marco colectivo del juicio.
  - Se usa 'asamblea' para עֲדָה como equivalente estable y no eclesiástico, en armonía con el estilo POB.
  - No se traduce el superscrito como oración independiente con puntuación fuerte; se conserva la función de encabezado poético.
  - La nota al pie cubre la alternativa semántica documentada sin desplazar la lectura principal del texto.
