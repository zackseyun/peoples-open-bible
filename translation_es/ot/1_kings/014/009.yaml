translation:
  language: es
  text: y has hecho más maldad que todos los que fueron antes de ti. Fuiste e hiciste para ti otros dioses e imágenes fundidas[a], para provocarme a ira, y a mí me has arrojado detrás de tus espaldas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estatuas fundidas'. El hebreo se refiere a imágenes hechas por fundición, probablemente objetos cúlticos de metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּרַע לַעֲשׂוֹת
  english_pob_choice: have done evil above all
  chosen_spanish: has hecho más mal
  alternatives_spanish:
  - has obrado más perversamente
  - has hecho el mal
  lexicon: HALOT
  rationale: El hebreo usa la idiomática combinación de הרע + לעשות con valor de ‘hacer el mal’; el comparativo con מִכֹּל pide expresar superioridad. ‘Has hecho más mal’ conserva la comparación y suena natural en español, sin suavizar la acusación.
- source_word: מִכֹּל אֲשֶׁר הָיוּ לְפָנֶיךָ
  english_pob_choice: than all who were before you
  chosen_spanish: que todos los que fueron antes de ti
  alternatives_spanish:
  - que todos los que te precedieron
  - que todos los que estuvieron antes de ti
  lexicon: HALOT
  rationale: לְפָנֶיךָ aquí es temporal y jerárquico. ‘Antes de ti’ mantiene el orden comparativo del hebreo y la claridad del sentido histórico.
- source_word: וַתֵּלֶךְ
  english_pob_choice: You went
  chosen_spanish: Fuiste
  alternatives_spanish:
  - Y fuiste
  - Te fuiste
  lexicon: HALOT
  rationale: El verbo marca secuencia narrativa. En español, ‘fuiste’ conserva esa progresión sin volverlo redundante.
- source_word: וַתַּעֲשֶׂה לְּךָ
  english_pob_choice: made for yourself
  chosen_spanish: te hiciste
  alternatives_spanish:
  - te hiciste para ti
  - te fabricaste
  lexicon: HALOT
  rationale: El dativo לְּךָ tiene fuerza reflexiva/benefactiva. ‘Te hiciste’ comunica con naturalidad esa autoaplicación del acto, sin perder el matiz de fabricación.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: dioses ajenos
  alternatives_spanish:
  - otros dioses
  - dioses extranjeros
  lexicon: HALOT
  rationale: Aunque la expresión más literal sería ‘otros dioses’, ‘dioses ajenos’ mantiene la carga bíblica de ilicitud y evita una lectura meramente cuantitativa. ‘Ajenos’ conserva la alteridad religiosa implícita.
- source_word: וּמַסֵּכוֹת
  english_pob_choice: molten images
  chosen_spanish: estatuas fundidas
  alternatives_spanish:
  - imágenes fundidas
  - ídolos fundidos
  lexicon: HALOT
  rationale: מַסֵּכוֹת designa objetos hechos por fundición. ‘Estatuas fundidas’ conserva el sentido material y resulta más claro en español que un calco técnico como ‘molten images’.
- source_word: לְהַכְעִיסֵנִי
  english_pob_choice: to provoke me to anger
  chosen_spanish: para provocarme a ira
  alternatives_spanish:
  - para irritarme
  - para enojarme
  lexicon: HALOT
  rationale: El hiphil de כעס expresa provocación a ira. ‘Provocarme a ira’ es la fórmula más fiel y solemne en español bíblico.
- source_word: וְאֹתִי הִשְׁלַכְתָּ אַחֲרֵי גַוֶּךָ
  english_pob_choice: you have cast me behind your back
  chosen_spanish: a mí me has arrojado detrás de tu espalda
  alternatives_spanish:
  - me has echado detrás de tu espalda
  - me has arrojado a tus espaldas
  lexicon: HALOT
  rationale: La imagen hebrea expresa rechazo despectivo. ‘Arrojado detrás de tu espalda’ conserva la metáfora con un tono formal y comprensible. Añadir ‘a mí’ reproduce el énfasis del objeto explícito וְאֹתִי.
theological_decisions:
- issue: Conservar la condena concreta de la idolatría sin reducirla a un término abstracto
  english_pob_reading: other gods and molten images
  chosen_spanish_reading: dioses ajenos y estatuas fundidas
  alternative_spanish_readings:
  - otros dioses e imágenes fundidas
  - dioses extranjeros e ídolos
  rationale: 'El versículo no solo censura una actitud interior, sino acciones cultuales concretas. Mantener ambos elementos preserva la ofensiva teológica del texto: adoración ilícita y fabricación material de objetos de culto.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Preservar la fuerza del gesto de rechazo hacia Yahvé
  english_pob_reading: you have cast me behind your back
  chosen_spanish_reading: a mí me has arrojado detrás de tu espalda
  alternative_spanish_readings:
  - me has echado detrás de tu espalda
  - me has despreciado
  rationale: La metáfora corporal comunica desprecio y expulsión relacional. Se evita resolverla en una abstracción como ‘me has despreciado’, para no borrar la imagen verbal y su carga profética.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se prefirió una formulación que mantuviera el comparativo hebreo (''más mal que todos los que fueron antes de ti'') y el objeto de metal fundido de מַסֵּכוֹת, sin perder la metáfora de rechazo hacia Dios. El texto español busca equilibrio entre fidelidad formal y naturalidad publicable.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como forma preferida del proyecto solo cuando el nombre divino aparece explícitamente; aquí el versículo usa pronombres y no exige inserción del nombre.
  - Se evitó ‘ídolos’ como término único para no diluir la distinción entre el acto de fabricar y el objeto fabricado.
  - Se mantuvo ‘ira’ en lugar de ‘enojo’ por registro bíblico y por la correspondencia con el hiphil causativo de כעס.
