translation:
  language: es
  text: 'Los hijos de Lotán: Hori y Homam[a]; y la hermana de Lotán era Timna.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el pasaje paralelo de Génesis 36:22, el nombre aparece como Hemam; aquí se conserva Homam conforme a Crónicas.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En contexto genealógico, בְּנֵי se expresa de manera natural y precisa como «los hijos de». Conserva el valor de relación familiar sin sobrecargar el texto con una conjunción inicial innecesaria en español.
- source_word: לוֹטָן
  english_pob_choice: Lotan
  chosen_spanish: Lotán
  alternatives_spanish:
  - Lotan
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio. La acentuación ayuda a la lectura en español sin cambiar la forma del nombre.
- source_word: חֹרִי
  english_pob_choice: Hori
  chosen_spanish: Hori
  alternatives_spanish:
  - Jorí
  lexicon: Nombre propio transliterado
  rationale: Se mantiene la transliteración del nombre personal. Aunque la forma puede recordar otro término hebreo, aquí el contexto genealógico exige tratarlo como nombre propio.
- source_word: וְהוֹמָם
  english_pob_choice: and Homam
  chosen_spanish: y Homam
  alternatives_spanish:
  - y Hemam
  lexicon: Nombre propio transliterado
  rationale: Se conserva la lectura de Crónicas como «Homam». La nota permite registrar la variante paralela «Hemam» sin alterar el texto base.
- source_word: וַאֲחוֹת
  english_pob_choice: and ... sister was
  chosen_spanish: y la hermana de
  alternatives_spanish:
  - y la hermana era de
  - y la hermana
  lexicon: HALOT
  rationale: En español, la relación nominal se expresa con naturalidad como «la hermana de». La cópula implícita se sobreentiende en el predicado, como en el hebreo nominal.
- source_word: לוֹטָן
  english_pob_choice: Lotan’s
  chosen_spanish: Lotán
  alternatives_spanish:
  - de Lotán
  lexicon: Relación genitiva
  rationale: La relación posesiva hebrea se vierte de forma idiomática en español con «la hermana de Lotán», manteniendo claro el vínculo familiar.
- source_word: תִּמְנָע
  english_pob_choice: Timna
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma breve del nombre en esta verse como «Timna», siguiendo la forma consonántica del hebreo y la decisión del POB inglés.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: mantiene la estructura genealógica breve, conserva los nombres propios por transliteración y registra la variante textual con Génesis 36:22 sin armonizarla en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usa «Lotán» con tilde por la acentuación natural del español.
  - Se evita «señor» o equivalentes ajenos al verso, ya que no aparecen en el hebreo.
  - La nota de variante textual se ancla solo en «Homam» para no duplicar información.
