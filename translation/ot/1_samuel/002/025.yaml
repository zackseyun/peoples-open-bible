theological_decisions:
- issue: Meaning of אֱלֹהִים in the first clause
  chosen_reading: God
  alternative_readings:
  - the judges
  rationale: The verse contrasts human-against-human sin, where divine adjudication/mediation is possible, with sin against the LORD himself, where the rhetorical question intensifies the gravity. Reading אֱלֹהִים as 'God' best fits the parallelism and theological logic of the verse. The alternative is preserved in a footnote because it has historical support in some translations and commentators.
  doctrine_reference: Translation philosophy §1, §3
- issue: Divine intention in כִּי חָפֵץ יְהוָה לַהֲמִיתָם
  chosen_reading: because Yahweh desired to put them to death
  alternative_readings:
  - because the LORD had determined to put them to death
  - because the LORD was pleased to kill them
  rationale: The Hebrew states divine willing plainly and should not be paraphrastically softened. At the same time, 'desired' is preferable to 'was pleased' because it avoids suggesting delight in evil while still preserving the text's strong assertion of divine judgment. This maintains the text's theological tension rather than resolving debates about divine sovereignty and human responsibility.
  doctrine_reference: Translation philosophy §3
