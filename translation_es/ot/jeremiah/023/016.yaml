  revised_footnotes:
  - marker: a
    text: O, más formalmente, «los hacen vanos». El verbo hebreo lleva la idea de causar vacío o vanidad; por extensión, de engañar con algo vacío.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad y la fidelidad al hebreo sin cambiar el sentido: ''que les profetizan'' expresa mejor לָכֶם; ''los engañan'' evita una perífrasis pesada; y la nota reemplaza una alternativa poco idiomática por una explicación léxica útil y natural en español.'
