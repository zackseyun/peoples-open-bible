translation:
  language: es
  text: Y la tierra de Judá será un terror para Egipto[a][b][c]; todo aquel a quien se le mencione tendrá miedo por causa del plan de Yahvé de los Ejércitos, que él está planeando contra Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espanto», «un horror» o, según otra tradición interpretativa, «un tambaleo». El término hebreo es raro y difícil.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo aquel a quien se le mencione»; la expresión significa que cualquier mención de Judá hará que un egipcio tenga miedo.'
    reason: lexical_alternative
  - marker: c
    text: 'Renderización tradicional: «el SEÑOR de los Ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת יְהוּדָה
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el suelo de Judá
  - el territorio de Judá
  lexicon: HALOT
  rationale: אַדְמָה puede significar suelo, terreno o tierra; en un contexto geopolítico con Egipto y Judá, «la tierra de Judá» comunica de forma natural el valor territorial que el inglés POB captó con «the land of Judah».
- source_word: לְמִצְרַיִם
  english_pob_choice: to Egypt
  chosen_spanish: para Egipto
  alternatives_spanish:
  - a Egipto
  lexicon: HALOT
  rationale: 'La preposición ל aquí expresa efecto/relación: Judá llega a ser algo en la experiencia de Egipto. En español, «para Egipto» comunica mejor ese impacto resultante, aunque «a Egipto» sigue siendo posible.'
- source_word: לְחָגָּא
  english_pob_choice: a terror
  chosen_spanish: un terror
  alternatives_spanish:
  - un espanto
  - un horror
  - un temblor
  lexicon: HALOT
  rationale: El término es raro y difícil; el contexto inmediato exige un efecto de miedo. «Un terror» preserva la fuerza semántica sin decidir excesivamente por una glosa interpretativa como «reeling».
- source_word: כֹּל אֲשֶׁר יַזְכִּיר אֹתָהּ אֵלָיו
  english_pob_choice: everyone to whom it is mentioned
  chosen_spanish: todo el que se la mencione
  alternatives_spanish:
  - todos a quienes se la mencione
  - cada uno a quien se la mencione
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y distributiva; la lectura inglesa entiende que cualquier mención de Judá provoca temor. En español, «todo el que se la mencione» conserva ese valor y evita una literalidad torpe.
- source_word: יִפְחָד
  english_pob_choice: will fear
  chosen_spanish: temblará
  alternatives_spanish:
  - tendrá miedo
  - se asustará
  lexicon: HALOT
  rationale: פחד puede expresarse como miedo o temblor. Dado el tono poético y la intensidad del pasaje, «temblará» reproduce bien la reacción física y emocional que el inglés POB concentra en «will fear».
- source_word: מִפְּנֵי עֲצַת
  english_pob_choice: because of the plan
  chosen_spanish: por causa del plan
  alternatives_spanish:
  - a causa del plan
  - por el plan
  lexicon: HALOT
  rationale: מִפְּנֵי expresa causalidad aquí. עֵצָה puede ser «consejo» o «plan»; en este contexto de designio divino contra Egipto, «plan» es más claro y sigue la decisión del inglés POB.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos Celestiales
  - Yahvé de los Ejércitos
  lexicon: DOCTRINE.md + HALOT
  rationale: Se sigue el estándar del proyecto para יהוה como «Yahvé». צְבָאוֹת se vierte como «de los Ejércitos» para mantener transparencia y la fuerza militar/cósmica del título; «de los Hosts» no es natural en español.
- source_word: אֲשֶׁר הוּא יוֹעֵץ עָלָיו
  english_pob_choice: that he is planning against it
  chosen_spanish: que él está tramando contra ella
  alternatives_spanish:
  - que él está planeando contra ella
  - que él está proponiendo contra ella
  - que él está concibiendo contra ella
  lexicon: HALOT
  rationale: יוֹעֵץ expresa acción deliberada en curso. «Tramando» transmite intención hostil y planificación activa con el matiz del inglés POB. El pronombre «ella» concuerda con «la tierra de Judá».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto prescribe «Yahvé» para el Tetragrámaton. Se mantiene esa forma para no ocultar el nombre divino mediante una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Título צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Hosts
  - de los ejércitos
  rationale: Se traduce el título en vez de transliterarlo. «De los Ejércitos» es transparente para lectores modernos y conserva el sentido de poder militar/cósmico que el inglés POB buscó con «of Armies».
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: El contexto de revisión del inglés POB indica alta concordancia y sin cambios recientes; por tanto, la versión española sigue de cerca la lectura auditada, manteniendo las decisiones léxicas clave sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se preservó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se tradujo צְבָאוֹת como «de los Ejércitos» en lugar de «de los Hosts».
  - Se mantuvo el valor raro/difícil de לְחָגָּא con una nota de alternativas.
  - Se evitó la sustitución por «SEÑOR», reservando esa forma solo como nota de traducción tradicional.
