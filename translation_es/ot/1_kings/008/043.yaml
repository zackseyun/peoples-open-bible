review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: petición volitiva a Dios, respuesta al ruego del extranjero, propósito universal de que los pueblos conozcan el nombre de Dios, le teman como Israel, y reconozcan la relación del templo con ese nombre. Sin embargo, hay dos puntos que conviene corregir para mayor fidelidad y naturalidad: (1) «te pida» simplifica demasiado יִקְרָא אֵלֶיךָ, que en este contexto mantiene mejor la idea de clamar/invocar a Dios; (2) la nota [b] está anclada en «Israel» pero comenta la comparación, mientras la nota inglesa preserva el modismo final sobre el nombre llamado sobre la casa. Además, «es llamado sobre esta casa» suena poco natural en español y pide nota explicativa.'
  spanish_quality_summary: El español es claro y digno, pero algunas elecciones suenan algo rígidas o menos precisas de lo necesario. «El lugar de tu morada» es aceptable, aunque «el lugar donde habitas» sería más fluido; no es obligatorio cambiarlo. Sí conviene mejorar la distribución de notas y hacer más transparente el modismo final mediante una nota en el lugar correcto. También es preferible explicitar «lo hace» en «como lo hace tu pueblo Israel» para evitar una comparación algo truncada en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, etc. Se preservan correctamente «extranjero», «temerte», «tu nombre» y «esta casa». La corrección principal es mantener mejor el matiz de יִקְרָא אֵלֶיךָ y reubicar la nota del modismo נִקְרָא עַל.
  issues:
  - severity: medium
    issue: «te pida» debilita el matiz de יִקְרָא אֵלֶיךָ
    rationale: El hebreo expresa llamar/clamar a Dios en contexto de súplica, no solo pedir en sentido general. «Clame a ti por» o formulación equivalente preserva mejor el verbo y coincide con la auditoría inglesa.
  - severity: medium
    issue: La nota [b] comenta la comparación con Israel en vez del modismo final sobre el nombre llamado sobre la casa
    rationale: La traza inglesa conserva y explica el idiomatismo teológico «your name is called on this house». En español, la nota debe anclarse allí, no en «Israel».
  - severity: low
    issue: «como tu pueblo Israel» queda algo elíptico en español
    rationale: Aunque comprensible, la comparación suena más natural y precisa como «como lo hace tu pueblo Israel», reflejando el verbo implícito reconocido en la auditoría inglesa.
  - severity: low
    issue: «tu nombre es llamado sobre esta casa» necesita apoyo explicativo
    rationale: La literalidad es defendible, pero en español resulta poco idiomática. Debe retenerse por fidelidad al hebreo, acompañado de una nota que explique el sentido de pertenencia/dedicación.
