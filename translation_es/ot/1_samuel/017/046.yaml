  yaml_path: translation/ot/1_samuel/017/046.yaml
  text: This day Yahweh will deliver you into my hand[a], and I will strike you down and remove your head from you. And this day I will give the corpses of the Philistine camp to the birds of the sky and to the wild animals of the earth, so that all the earth may know that there is a God for Israel.
  footnotes:
