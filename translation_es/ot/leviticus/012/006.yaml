translation:
  language: es
  text: Y cuando se cumplan los días de su purificación, ya sea por un hijo o por una hija, traerá un cordero de un año para holocausto y un pichón de paloma o una tórtola como ofrenda por el pecado[a], al sacerdote, a la entrada del tabernáculo de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como ofrenda de purificación». El término hebreo puede denotar la ofrenda usada para quitar impureza ritual, no solo una ofrenda por transgresión moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִמְלֹאת יְמֵי טָהֳרָהּ
  english_pob_choice: when the days of her purification are completed
  chosen_spanish: cuando se cumplan los días de su purificación
  alternatives_spanish:
  - al completarse los días de su purificación
  - cuando terminen los días de su purificación
  lexicon: HALOT
  rationale: El hebreo expresa el cumplimiento/completación de un período. «Se cumplan» preserva ese valor temporal y suena natural en español bíblico moderno. «Purificación» mantiene el matiz ritual del sustantivo טָהֳרָה.
- source_word: לְבֵן אוֹ לְבַת
  english_pob_choice: whether for a son or for a daughter
  chosen_spanish: ya sea por un hijo o por una hija
  alternatives_spanish:
  - sea por un hijo o por una hija
  - tanto si es por un hijo como por una hija
  lexicon: HALOT
  rationale: La construcción inclusiva se expresa bien con «ya sea... o...». «Hijo» y «hija» son naturales en español y conservan la alternancia de sexo/parto del hebreo.
- source_word: תָּבִיא
  english_pob_choice: she shall bring
  chosen_spanish: traerá
  alternatives_spanish:
  - deberá traer
  - ha de traer
  lexicon: HALOT
  rationale: En lenguaje legal, el imperfecto hebreo tiene fuerza prescriptiva. «Traerá» conserva ese registro sin sobrerregularizar con modal explícito.
- source_word: כֶּבֶשׂ בֶּן שְׁנָתוֹ
  english_pob_choice: a year-old lamb
  chosen_spanish: un cordero de un año
  alternatives_spanish:
  - un cordero de un año de edad
  - un cordero añal
  lexicon: HALOT
  rationale: El idiomático hebreo indica un animal de un año. «Cordero de un año» es claro y fiel; «añal» es menos transparente para lectores generales.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para una ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el término cultual tradicional en español para עֹלָה y comunica el tipo sacrificial con precisión. «Para» conserva la función ofrecida.
- source_word: וּבֶן יוֹנָה אוֹ תֹר
  english_pob_choice: a young pigeon or a turtledove
  chosen_spanish: un pichón de paloma o una tórtola
  alternatives_spanish:
  - un pichón de paloma o una tortolita
  - una cría de paloma o una tórtola
  lexicon: HALOT
  rationale: בֶּן יוֹנָה remite a un ave joven; «pichón de paloma» es claro y natural. תֹר se traduce bien por «tórtola». Se evita «dove» genérico para no diluir la distinción del hebreo.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - para ofrenda por el pecado
  - para ofrenda de purificación
  lexicon: HALOT
  rationale: En este contexto de pureza ritual, «expiación» puede funcionar como término más amplio y evita sugerir que el nacimiento sea un pecado moral. Se conserva la tensión textual del término sacrificial sin convertirlo en una paráfrasis interpretativa cerrada.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada del tabernáculo de reunión
  alternatives_spanish:
  - a la entrada de la tienda de reunión
  - ante la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: «Tabernáculo de reunión» es la forma tradicional y comprensible en español para אֹהֶל מוֹעֵד. «A la entrada» refleja la ubicación cultual indicada por אֶל פֶּתַח.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiante
  - al sacerdote
  lexicon: HALOT
  rationale: Aunque el inglés usa «priest», en español bíblico «sacerdote» es el equivalente natural y estable para הַכֹּהֵן. Se mantiene el referente cultual sin introducir un matiz ajeno.
theological_decisions:
- issue: Rendering of חַטָּאת in a childbirth-purification rite
  english_pob_reading: sin offering
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: El contexto trata de la restauración ritual tras el parto, no de una culpa moral por dar a luz. «Expiación» conserva la función ritual de la ofrenda y evita una lectura moralizante, aunque admite que el hebreo usa un término sacrificial técnicamente afín a «ofrenda por el pecado».
  doctrine_reference: Translation philosophy §3, §5
- issue: Cultic setting of אֹהֶל מוֹעֵד
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tabernáculo de reunión
  alternative_spanish_readings:
  - tienda de reunión
  - tabernáculo del encuentro
  rationale: La designación tradicional en español comunica el lugar santo de la presentación sin perder la referencia específica al santuario portátil. Se conserva el carácter cultual y no se reemplaza por una formulación secularizada.
  doctrine_reference: Terminología cultual POB
translation_notes:
  revision_awareness: La versión inglesa revisada reordenó la frase final para que la ofrenda se presente «al sacerdote» en la entrada del tabernáculo de reunión, reflejando más de cerca el hebreo. La redacción española sigue ese mismo orden sintáctico y conserva la relación espacial y ritual del recipiente y del lugar.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto hebreo lo exija; aquí no aparece.
  - Se mantiene «holocausto» para עֹלָה y «expiación» para חַטָּאת en este contexto ritual, en coherencia con el registro cultual del Pentateuco.
  - «Tabernáculo de reunión» se usa de modo consistente para אֹהֶל מוֹעֵד.
  - «Sacerdote» se prefiere a «príncipe» o «cura», por ser el equivalente bíblico natural de הַכֹּהֵן en español.
  - La puntuación y el orden de los complementos buscan reflejar la secuencia hebrea sin volverla artificial en español.
