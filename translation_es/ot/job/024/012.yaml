translation:
  language: es
  text: Desde la ciudad los moribundos[a] gimen, y el alma de los caídos clama por ayuda; sin embargo, Dios no lo considera necedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En la ciudad los hombres gimen»; el hebreo מְתִים es difícil aquí, y algunos lo entienden como «hombres» más que como «moribundos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sin embargo, Dios no lo tiene por necedad» o «sin embargo, Dios no lo juzga como absurdo». El modismo hebreo es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעִיר
  english_pob_choice: From the city
  chosen_spanish: Desde la ciudad
  alternatives_spanish:
  - En la ciudad
  - De la ciudad
  lexicon: HALOT
  rationale: La preposición מִן con עִיר puede expresar procedencia o situación localizada; «Desde la ciudad» conserva la idea de origen del clamor sin decidir de forma excesiva entre fuente y ubicación.
- source_word: מְתִים
  english_pob_choice: the dying
  chosen_spanish: los moribundos
  alternatives_spanish:
  - los hombres
  - los muertos
  - los mortales
  lexicon: HALOT
  rationale: El contexto de lamento y el paralelo con los violentamente muertos favorecen una referencia vinculada a la muerte. «Los moribundos» conserva ese matiz y suena natural en español.
- source_word: יִנְאָקוּ
  english_pob_choice: groan
  chosen_spanish: gimen
  alternatives_spanish:
  - gimen con dolor
  - se lamentan
  - murmuran
  lexicon: HALOT
  rationale: El verbo expresa un gemido audible de sufrimiento. «Gimen» es breve, idiomático y mantiene la fuerza física del hebreo.
- source_word: וְנֶפֶשׁ
  english_pob_choice: and the soul
  chosen_spanish: el alma
  alternatives_spanish:
  - la vida
  - la persona
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. Aquí la construcción «el alma de...» reproduce bien el peso emocional y la formulación del hebreo.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los heridos
  - los atravesados
  - los caídos
  lexicon: HALOT
  rationale: El sustantivo suele referirse a quienes han caído por herida fatal. Para un español fluido, «los muertos» comunica el resultado de esa violencia, aunque es algo más amplio que «los caídos».
- source_word: תְּשַׁוֵּעַ
  english_pob_choice: cries out for help
  chosen_spanish: clama por ayuda
  alternatives_spanish:
  - clama
  - grita pidiendo auxilio
  - implora
  lexicon: HALOT
  rationale: La forma intensiva indica un clamor desesperado. «Clama por ayuda» expresa de manera clara la súplica implícita y evita una traducción demasiado seca.
- source_word: וֶאֱלוֹהַּ
  english_pob_choice: yet God
  chosen_spanish: sin embargo, Dios
  alternatives_spanish:
  - pero Dios
  - y Dios
  lexicon: HALOT
  rationale: La conjunción tiene valor adversativo por el contraste con el sufrimiento humano. «Sin embargo» preserva esa tensión y resulta natural en español.
- source_word: לֹא יָשִׂים תִּפְלָה
  english_pob_choice: does not regard it as folly
  chosen_spanish: no lo considera como necedad
  alternatives_spanish:
  - no lo tiene por necedad
  - no lo estima como insensatez
  - no lo juzga como absurdo
  lexicon: HALOT
  rationale: El giro idiomático es difícil. Dado el ajuste revisado de la POB inglesa hacia «folly», «necedad» es una equivalencia directa y comprensible en español, manteniendo la ambigüedad de si Dios lo toma por insensatez, absurdo u ofensa.
theological_decisions:
- issue: La aparente inacción divina ante la injusticia
  english_pob_reading: yet God does not regard it as folly
  chosen_spanish_reading: sin embargo, Dios no lo considera como necedad
  alternative_spanish_readings:
  - sin embargo, Dios no lo tiene por necedad
  - pero Dios no lo juzga como absurdo
  - y Dios no lo considera un desorden
  rationale: El versículo expresa la queja de Job frente al sufrimiento sin resolverla. La traducción conserva la tensión teológica del texto y evita suavizar la crítica implícita a la aparente indiferencia divina.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Ajusté la cláusula final para reflejar la revisión de la POB inglesa hacia una lectura de תִּפְלָה como «folly»/«necedad» más que como «wrong» legal. También anclé las notas a los puntos exactos del texto para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - Usé «Dios» para אֱלֹהַּ conforme al estándar del proyecto.
  - Mantuve «alma» para נֶפֶשׁ por su valor tradicional y su correspondencia con la frase hebrea.
  - Evité resolver la tensión teológica del final; la frase queda deliberadamente ambigua dentro del límite semántico de תִּפְלָה.
