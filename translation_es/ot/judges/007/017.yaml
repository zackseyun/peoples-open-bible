revisions:
- from: 'Y él les dijo[a]: «Mírenme, y hagan lo mismo. Y miren: yo voy al extremo del campamento; y sucederá que, como yo haga, así harán ustedes».'
  to: 'Y él les dijo[a]: «Mírenme y hagan lo mismo. Miren, cuando yo llegue al borde del campamento, entonces, como yo haga, así harán ustedes».'
  rationale: Se conserva el sentido del original y del POB inglés, pero se corrige «voy» a «llegue» para reflejar mejor בָא en contexto, se reemplaza «al extremo» por «al borde» por naturalidad y fidelidad, y se suaviza «Y miren:» a «Miren,» para representar וְהִנֵּה sin repetición torpe. La nota existente sigue siendo válida y está correctamente anclada.
