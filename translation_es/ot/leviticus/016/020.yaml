translation:
  language: es
  text: Cuando haya terminado de hacer expiación[c] por el santuario[a], la tienda de reunión y el altar, presentará[b] el macho cabrío vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el lugar santo'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'acercar'; es decir, presentarlo para la siguiente acción ritual.
    reason: lexical_alternative
  - marker: c
    text: La expresión 'hacer expiación' también puede entenderse aquí como realizar una limpieza o purgación ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלָּה
  english_pob_choice: When he has finished
  chosen_spanish: Cuando haya terminado
  alternatives_spanish:
  - Y habrá terminado
  - Y cuando termine
  lexicon: HALOT
  rationale: El verbo expresa la conclusión de una acción ritual previa. En español, una cláusula temporal en futuro perfecto de subjuntivo transmite con naturalidad la anterioridad respecto de la acción siguiente.
- source_word: מִכַּפֵּר
  english_pob_choice: making atonement
  chosen_spanish: de hacer expiación
  alternatives_spanish:
  - de expiar
  - de purgar ritualmente
  lexicon: HALOT
  rationale: Se conserva el valor cultual de כפר con el sustantivo verbal 'expiación', que es claro en español y no reduce el término a una sola teoría. 'Hacer expiación' mantiene el paralelismo con la tradición bíblica sin calcar mecánicamente el inglés.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el lugar santísimo
  lexicon: HALOT
  rationale: En este contexto de Levítico 16, el término designa el recinto sagrado en conjunto. 'Santuario' es la opción más transparente y corresponde al alcance espacial que el contexto sugiere.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo
  lexicon: HALOT
  rationale: '''Tienda de reunión'' es una traducción directa y comprensible de אֹהֶל מוֹעֵד, preservando la imagen de la estructura y la idea de encuentro designado.'
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Término cultual directo y estable en español bíblico contemporáneo.
- source_word: וְהִקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - lo acercará
  - lo hará llegar
  lexicon: HALOT
  rationale: קרב literalmente es 'acercar'. 'Presentará' comunica de forma idiomática la acción ritual de traer delante para el siguiente acto, sin perder el matiz de acercamiento.
- source_word: הַשָּׂעִיר הֶחָי
  english_pob_choice: the live goat
  chosen_spanish: el macho cabrío vivo
  alternatives_spanish:
  - el chivo vivo
  - el macho cabrío que está vivo
  lexicon: HALOT
  rationale: '''Macho cabrío'' refleja con más precisión el hebreo שָׂעִיר que ''chivo'' en un registro bíblico más técnico. ''Vivo'' conserva el contraste con el animal ya sacrificado.'
theological_decisions:
- issue: Sentido de כפר en el rito de expiación
  english_pob_reading: making atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - purgar ritualmente
  - realizar expiación
  rationale: La frase mantiene el sentido sacrificial y no lo reduce a 'perdonar' sin mediación. 'Hacer expiación' preserva la tensión entre limpieza ritual y reconciliación cultual que el contexto levítico permite.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de הַקֹּדֶשׁ
  english_pob_reading: the sanctuary
  chosen_spanish_reading: el santuario
  alternative_spanish_readings:
  - el lugar santo
  rationale: Se evita resolver la expresión hacia un espacio más específico de lo que el contexto inmediato exige. 'Santuario' deja abierta la referencia al ámbito sagrado integral, coherente con el flujo del versículo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto base en inglés ya estaba en alto acuerdo y sin revisiones aplicadas; la redacción española sigue de cerca la decisión auditada de 'making atonement' y 'present the live goat', ajustando el orden y la naturalidad del español sin añadir contenido no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de proyecto cuando aparezca el Tetragrámaton; en este versículo no ocurre.
  - Se usa 'expiación' para כפר y no 'propiciación' para no introducir una carga doctrinal no explicitada por el texto.
  - '''Tienda de reunión'' conserva el término técnico del tabernáculo sin reemplazarlo por una glosa interpretativa.'
  - '''Macho cabrío vivo'' preserva el contraste cultual explícito del adjetivo חי.'
