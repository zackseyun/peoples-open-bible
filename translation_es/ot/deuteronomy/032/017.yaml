translation:
  language: es
  text: Sacrificaron a demonios[a], no a Dios, a dioses que no habían conocido, nuevos, que habían llegado recientemente[b], que sus padres no habían temido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no a un dios». El hebreo puede leerse como una negación de que estos seres fueran verdaderamente divinos, aunque el contexto los contrapone específicamente con el Dios verdadero de Israel.
    reason: lexical_alternative
  - marker: b
    text: Lit., «de cerca vinieron»; es decir, recién llegados o introducidos recientemente.
    reason: lexical_alternative
  - marker: c
    text: O, «que sus padres no habían temblado ante ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְבְּחוּ
  english_pob_choice: They sacrificed
  chosen_spanish: Sacrificaron
  alternatives_spanish:
  - Ofrecieron sacrificios
  - Hicieron sacrificios
  lexicon: HALOT
  rationale: El hebreo expresa el acto cultual de sacrificar. «Sacrificaron» mantiene la fuerza verbal directa y suena natural en español, sin diluir el sentido ritual.
- source_word: לַשֵּׁדִים
  english_pob_choice: to demons
  chosen_spanish: a demonios
  alternatives_spanish:
  - a shedim
  - a espíritus malignos
  lexicon: HALOT
  rationale: El término alude a seres demoníacos; «demonios» comunica el sentido con claridad y conserva el contraste cultual del verso. Se evita la transliteración por opaca.
- source_word: לֹא אֱלֹהַ
  english_pob_choice: not God
  chosen_spanish: no a Dios
  alternatives_spanish:
  - no a un dios
  - no a un dios verdadero
  lexicon: HALOT
  rationale: La negación contrasta a los receptores falsos con el Dios verdadero de Israel. En español, «no a Dios» conserva mejor la fuerza polémica que «no a un dios».
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: HALOT
  rationale: Aquí el plural funciona como referencia a falsos dioses en aposición. «Dioses» es la correspondencia más directa y mantiene la secuencia retórica del hebreo.
- source_word: לֹא יְדָעוּם
  english_pob_choice: they had not known
  chosen_spanish: que no habían conocido
  alternatives_spanish:
  - que no conocían
  - que no habían reconocido
  lexicon: HALOT
  rationale: El perfecto hebreo mira retrospectivamente desde el canto, por lo que el pluscuamperfecto español transmite bien el valor temporal y relacional de ידע con sufijo objeto.
- source_word: חֲדָשִׁים
  english_pob_choice: new ones
  chosen_spanish: nuevos
  alternatives_spanish:
  - nuevos dioses
  - novedosos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente y puede quedar breve en español. «Nuevos» conserva la concisión hebrea; el sustantivo «dioses» queda recuperado por el contexto inmediato.
- source_word: מִקָּרֹב בָּאוּ
  english_pob_choice: that had recently come
  chosen_spanish: que habían venido de cerca
  alternatives_spanish:
  - que habían llegado recientemente
  - que vinieron de cerca
  lexicon: HALOT
  rationale: La expresión hebrea comunica procedencia reciente o llegada próxima; «de cerca» refleja la literalidad del giro, aunque en español puede percibirse como temporal-espacial. Se conserva esa tensión porque el hebreo mismo es compacto y algo ambivalente.
- source_word: לֹא שְׂעָרוּם
  english_pob_choice: whom your fathers had not feared
  chosen_spanish: que sus padres no habían temido
  alternatives_spanish:
  - ante los cuales sus padres no habían temblado
  - que sus padres no habían reverenciado
  lexicon: HALOT
  rationale: El verbo expresa miedo, temor reverente o estremecimiento ante lo terrible. «Temido» recoge el campo semántico más natural en español sin borrar la posibilidad de temor reverencial.
- source_word: אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: El hebreo dirige la frase a Israel con sufijo de segunda plural. En español, «sus padres» conserva la referencia colectiva y fluye mejor en esta construcción, sin alterar el referente heredado del texto fuente.
theological_decisions:
- issue: Relación entre «demonios» y «dioses»
  english_pob_reading: 'Render both terms in sequence: ''to demons, not God—gods they had not known'''
  chosen_spanish_reading: 'Mantener ambos términos: «a demonios, no a Dios, a dioses que no habían conocido»'
  alternative_spanish_readings:
  - «a demonios, no a Dios» omitiendo la repetición
  - «a seres demoníacos» solo
  rationale: 'El hebreo acumula etiquetas para los mismos destinatarios del culto falso: primero demonios, luego dioses, y a la vez niega que sean Dios. Repetir ambos términos en español preserva la densidad polémica del texto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de la negación en «לֹא אֱלֹהַ»
  english_pob_reading: Use 'God' with capital G
  chosen_spanish_reading: Usar «Dios» con mayúscula
  alternative_spanish_readings:
  - «un dios»
  - «ningún dios»
  rationale: La oposición es entre el Dios verdadero de Israel y falsos destinatarios del sacrificio. «Dios» con mayúscula comunica ese referente sin introducir una explicación ajena al verso.
  doctrine_reference: Translation philosophy §1
- issue: Tensión semántica de «מִקָּרֹב בָּאוּ»
  english_pob_reading: that had recently come
  chosen_spanish_reading: «que habían venido de cerca» con posible lectura de llegada reciente
  alternative_spanish_readings:
  - «que habían llegado recientemente»
  - «que habían venido hace poco»
  rationale: La frase hebrea es compacta y admite una relación entre cercanía espacial y reciente introducción. La redacción elegida deja visible esa ambigüedad sin sobreexplicarla.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo masorético y la revisión auditada en inglés, en particular la decisión de conservar la repetición retórica «a demonios, no a Dios, a dioses...» y de reflejar la frase compacta «מִקָּרֹב בָּאוּ» sin suavizarla en exceso. También respeta la lectura revisada del tramo final con comas/segmentación sintáctica simple, en lugar de introducir un quiebre enfático no presente en la última revisión inglesa.
  spanish_consistency_notes:
  - Se emplea «Dios» para el referente verdadero y «demonios/dioses» para los falsos destinatarios del sacrificio, manteniendo la distinción lexical y teológica.
  - Se conserva el pluscuamperfecto («habían conocido», «habían venido», «habían temido») para reproducir la perspectiva retrospectiva del canto.
  - 'Se evita «SEÑOR» por la convención del proyecto: aquí el contraste no usa el tetragrámaton explícitamente, sino «Dios» frente a falsos seres.'
  - La estructura española mantiene la secuencia paralela del hebreo y no unifica las dos cláusulas finales en una sola frase interpretativa.
