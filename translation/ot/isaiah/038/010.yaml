id: ISA.38.10
reference: Isaiah 38:10
source:
  edition: WLC
  text: אֲנִ֣י אָמַ֗רְתִּי בִּ/דְמִ֥י יָמַ֛/י אֵלֵ֖כָה בְּ/שַׁעֲרֵ֣י שְׁא֑וֹל פֻּקַּ֖דְתִּי יֶ֥תֶר שְׁנוֹתָֽ/י׃
translation:
  text: I said[a], “In the middle of my days I must go through the gates of Sheol[b]; I am deprived of the rest of my years.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the realm of the dead' or 'the grave.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the cutting off / middle of my days'; the phrase likely means in the prime or midpoint of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּדְמִי
  chosen: in the middle of
  alternatives:
  - in the cutting off of
  - in the quietness of
  lexicon: HALOT
  rationale: The noun דְּמִי here is difficult. In context with 'my days' and the parallel complaint about losing remaining years, the sense is best taken as 'midpoint' or 'prime' of life rather than 'silence/quietness.' This matches the lament that death is coming prematurely. 'In the middle of my days' is idiomatic modern English and reflects the contextual sense without over-literal obscurity.
- source_word: יָמַי
  chosen: my days
  lexicon: HALOT
  rationale: Retained literally as part of the idiom for one's lifespan.
- source_word: אֵלֵכָה
  chosen: I must go through
  alternatives:
  - I will go
  - I am going
  lexicon: HALOT
  rationale: The imperfect expresses the speaker's anticipated movement toward death. 'Must go through' brings out the inevitability in context while fitting the following phrase 'through the gates of Sheol.'
- source_word: בְּשַׁעֲרֵי
  chosen: through the gates of
  alternatives:
  - to the gates of
  - into the gates of
  lexicon: HALOT
  rationale: The preposition with 'gates' can be rendered locatively, but in English 'go through the gates' is the most natural way to express entry into the realm of the dead.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Kept as 'Sheol' rather than flattening to 'grave,' since the Hebrew term denotes the underworld/the realm of the dead more specifically than a burial place. A footnote preserves a more interpretive alternative.
- source_word: פֻּקַּדְתִּי
  chosen: I am deprived of
  alternatives:
  - I am consigned to
  - I am appointed to
  - I have been visited concerning
  lexicon: HALOT
  rationale: The passive of פקד in this lament context conveys being assigned over to loss or having something exacted from one. With 'the rest of my years' as object, 'I am deprived of' best captures the sense that his remaining years are taken away.
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  - what is left of
  lexicon: HALOT
  rationale: Straightforward rendering of the noun meaning remainder or surplus.
- source_word: שְׁנוֹתַי
  chosen: my years
  lexicon: HALOT
  rationale: Literal and natural in English; together with 'the rest of' it expresses the years he expected still to live.
