translation:
  text: Jesus said[1], "The kingdom is like a man who has a hidden treasure in his
    field, without knowing about it. And after he died, he left it to his son. The
    son did not know. He took that field and sold it. And the one who bought it came,
    and while he was plowing, he found the treasure[2]. He began to lend money at
    interest to whomever he wished."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:46:08Z'
  footnotes:
  - marker: '1'
    text: The parable in Thomas diverges significantly from the canonical parallel
      in Matthew 13:44. In Thomas, the original owner is unaware of the treasure,
      and it is the subsequent buyer who finds it and uses it to lend at interest.
    reason: cross_reference
  - marker: '2'
    text: Several words in this saying are restored from lacunas in the manuscript,
      but the restorations are standard and highly certain from the surviving letters
      and context.
    reason: textual_variant
lexical_decisions:
- source_word: ⲁϩⲟ
  chosen: treasure
  rationale: Standard term for treasure or hoard.
  lexicon: Crum 22a
  alternatives:
  - hoard
  - wealth
- source_word: ⲁⲧⲥⲟⲟⲩⲛ
  chosen: without knowing
  rationale: Translates the circumstantial phrase ⲉϥⲟ ⲛⲁⲧⲥⲟⲟⲩⲛ ⲉⲣⲟϥ ('being ignorant
    of it').
  lexicon: Crum 348a
  alternatives:
  - being ignorant
  - unaware
- source_word: ϥⲓ
  chosen: took
  rationale: Can mean 'take', 'lift', or 'receive/inherit'. 'Took' preserves the straightforward
    narrative action of assuming possession.
  lexicon: Crum 701a
  alternatives:
  - received
  - inherited
- source_word: ⲧⲟⲟⲩ
  chosen: bought
  rationale: From ⲧⲟⲩⲟ/ⲧⲟⲟⲩ, meaning 'to buy'.
  lexicon: Crum 439a
- source_word: ϩⲉ ⲉ-
  chosen: found
  rationale: The verb ϩⲉ with preposition ⲉ- means 'to fall upon' or 'to find'.
  lexicon: Crum 656a
  alternatives:
  - stumbled upon
  - discovered
- source_word: ϯ ϩⲟⲙⲧ ⲉ ⲧⲙⲏⲥⲉ
  chosen: lend money at interest
  rationale: 'Literal idiom: ''give copper/money at interest''.'
  lexicon: Crum 185b
  alternatives:
  - invest the money
  - lend on usury
theological_decisions:
- issue: Lending at interest
  chosen_reading: lend money at interest
  rationale: The Coptic explicitly says 'give copper at interest' (ⲛϯϩⲟⲙⲧ ⲉⲧⲙⲏⲥⲉ).
    Despite early Christian prohibitions against usury, the text must not be softened.
    The act of lending at interest here likely represents utilizing the discovered
    wisdom/treasure rather than hoarding it.
  alternatives_noted:
  - invest the money
drafter_notes: The translation preserves the distinct narrative trajectory of Thomas's
  parable of the hidden treasure, which differs markedly from Matthew 13:44. The Coptic
  idiom 'give copper at interest' is rendered clearly as 'lend money at interest',
  maintaining the sharp, pragmatic ending of the Thomasine version.
