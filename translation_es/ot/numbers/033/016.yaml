lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: נסע, en la fórmula itineraria del desierto, expresa salida o partida de un lugar hacia otro. «Partieron» comunica bien ese movimiento en español moderno y conserva la sobriedad narrativa del texto.
- source_word: מִמִּדְבַּר סִינַי
  english_pob_choice: from the wilderness of Sinai
  chosen_spanish: del desierto de Sinaí
  alternatives_spanish:
  - del desierto del Sinaí
  - de la región desértica de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «tierra desértica». «Del desierto de Sinaí» mantiene la relación constructa y es natural en español. Se evita añadir artículo innecesario al topónimo, siguiendo el uso bíblico.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y acamparon allí
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה en las listas de itinerario significa establecer campamento. «Acamparon» es claro y fiel, sin el tono más arcaico de «acamparon/acamparon»; no requiere ampliar el sentido.
- source_word: בְּקִבְרֹת הַתַּאֲוָה
  english_pob_choice: at Kibroth-hattaavah
  chosen_spanish: en Kibrot-hataavá
  alternatives_spanish:
  - en Kibrot Hataavá
  - en los Sepulcros del Deseo
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado como nombre propio, siguiendo el tratamiento del inglés POB. La vocalización española se adapta a una forma legible y consistente. El valor semántico del nombre se preserva en la nota, no en el cuerpo principal.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo masorético y con el inglés POB auditado: secuencia verbal simple de itinerario, dos topónimos, y el nombre propio final transliterado con glosa semántica en nota.'
  spanish_consistency_notes:
  - Se mantiene «Sinaí» como topónimo bíblico tradicional en español.
  - Se translitera el nombre final para distinguirlo del significado literal, tal como hace la traducción inglesa auditada.
  - No se introduce terminología eclesiástica ni interpretativa ajena al hebreo.
  - La nota conserva la tensión entre nombre propio y sentido etimológico sin sustituir el topónimo en el texto principal.
