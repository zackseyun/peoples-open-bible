review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: כִּי como explicación, כָּל הַתּוֹעֵבֹת הָאֵל como «todas estas abominaciones», אַנְשֵׁי הָאָרֶץ como «los hombres de la tierra», y וַתִּטְמָא הָאָרֶץ como resultado de impureza de la tierra. Sin embargo, la nota alternativa no sigue de cerca la alternativa inglesa documentada («the land was defiled»), ya que «profanada» desplaza el campo semántico de טמא hacia profanación más que impureza/contaminación.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español bíblico contemporáneo. «Porque» funciona bien, y «quedó impura» expresa adecuadamente el estado resultante. La única reparación necesaria es la nota al pie, para alinearla mejor con la evidencia léxica y evitar una alternativa menos fiel.
  glossary_alignment: No hay términos del glosario de proyecto en conflicto aquí. «Abominaciones», «hombres», y «tierra» concuerdan con las decisiones auditadas. Para טמא, «impura» en el texto principal es adecuado; la alternativa en nota debe ser «fue contaminada» o «fue impurificada/defilada» no «fue profanada».
  issues:
  - severity: medium
    issue: La nota al pie usa «la tierra fue profanada» como alternativa léxica.
    rationale: La alternativa inglesa auditada es «the land was defiled», y el hebreo טמא trata de impureza/contaminación, no de profanación en sentido principal. «Profanada» introduce otro matiz teológico y léxico.
  - severity: low
    issue: Formato de la nota al pie con comillas y prefijo innecesariamente torpes.
    rationale: 'La redacción actual «''O: «la tierra fue profanada».''» suena editorialmente poco limpia. Conviene una formulación sencilla y consistente.'
  revised_spanish_text: Porque los hombres de la tierra que estaban antes que ustedes hicieron todas estas abominaciones[a], y la tierra quedó impura.
  revised_footnotes:
  - marker: a
    text: 'O: «la tierra fue contaminada».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota para ajustarla al campo semántico de טמא y a la alternativa inglesa auditada «was defiled», evitando «profanada», que sería menos precisa.
