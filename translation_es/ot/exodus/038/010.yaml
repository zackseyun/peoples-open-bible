translation:
  language: es
  text: Sus pilares eran veinte, y sus veinte basas[a] eran de bronce; los ganchos de los pilares y sus bandas[b] eran de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus veinte sockets eran de bronce».'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «sus filletes eran de plata». El hebreo probablemente se refiere a bandas o elementos de unión asociados con los pilares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵיהֶם
  english_pob_choice: their pillars
  chosen_spanish: sus pilares
  alternatives_spanish:
  - sus postes
  lexicon: HALOT
  rationale: עמּוּדִים designa soportes arquitectónicos verticales; «pilares» conserva el sentido técnico y es natural en español. El posesivo refleja el sufijo pronominal plural de tercera persona en el contexto de las piezas del tabernáculo.
- source_word: עֶשְׂרִים
  english_pob_choice: twenty
  chosen_spanish: veinte
  alternatives_spanish:
  - '20'
  lexicon: HALOT
  rationale: Número cardinal directo, sin matiz adicional. Se mantiene la repetición en ambos miembros del versículo.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their twenty bases
  chosen_spanish: sus veinte basas
  alternatives_spanish:
  - sus veinte sockets
  - sus veinte bases
  lexicon: HALOT
  rationale: En contexto tabernacular, אֶדֶן se refiere a la pieza de apoyo inferior de los pilares. «Basas» es un término español tradicional pero comprensible; evita «sockets», que sería más técnico en inglés y menos natural en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: El término puede abarcar cobre/bronce; en el contexto del tabernáculo, «bronce» es la opción española más estable y concordante con la tradición de materiales del mobiliario sagrado. No se fuerza «cobre» porque el contexto cultual apunta al aleado/metal acabado.
- source_word: וָוֵי הָעַמֻּדִים
  english_pob_choice: the hooks of the pillars
  chosen_spanish: los ganchos de los pilares
  alternatives_spanish:
  - los ganchos de las columnas
  lexicon: HALOT
  rationale: וָוִים son elementos de enganche; «ganchos» comunica la función con claridad. Se conserva la relación genitiva «de los pilares» porque el hebreo los vincula a esos soportes.
- source_word: חֲשֻׁקֵיהֶם
  english_pob_choice: their bands
  chosen_spanish: sus bandas
  alternatives_spanish:
  - sus filletes
  - sus ligaduras
  lexicon: HALOT
  rationale: El término es técnicamente difícil y la POB inglesa ya optó por «bands» para evitar el arcaísmo opaco «fillets». «Bandas» mantiene una lectura funcional y suficientemente literal en español.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - de plata fina
  lexicon: HALOT
  rationale: El metal es claramente «plata»; se expresa con la construcción natural española de material («eran de plata») sin perder el valor sustantivo del hebreo.
theological_decisions:
- issue: Tratamiento de términos de construcción del tabernáculo sin suavizar la especificidad material
  english_pob_reading: 'The verse inventories exact structural parts and materials: pillars, bases, hooks, bands, bronze, silver.'
  chosen_spanish_reading: 'El versículo enumera piezas estructurales concretas y sus materiales: pilares, basas, ganchos, bandas, bronce y plata.'
  alternative_spanish_readings:
  - El versículo habla de elementos ornamentales generales.
  - El versículo deja los términos más vagos para facilitar la lectura.
  rationale: No hay carga doctrinal directa, pero sí una precisión cultual e histórica que conviene preservar. Se evita generalizar los componentes porque el hebreo enumera piezas específicas del tabernáculo.
  doctrine_reference: Éxodo 38:10; fidelidad descriptiva del tabernáculo
- issue: Decisión sobre «bases» frente a «sockets»/«zocalos» en la pieza inferior de los pilares
  english_pob_reading: 'Their twenty bases were bronze; alternative note: ''their twenty sockets were bronze.'''
  chosen_spanish_reading: Sus veinte basas eran de bronce.
  alternative_spanish_readings:
  - Sus veinte zócalos eran de bronce.
  - Sus veinte sockets eran de bronce.
  rationale: La POB documenta la alternativa lexical «sockets»; en español, «basas» es el equivalente más natural y bíblicamente reconocible, sin caer en un tecnicismo importado ni en una palabra demasiado arquitectónica moderna como «zócalos».
  doctrine_reference: Éxodo 38:10; nota lexical de la POB
- issue: Decisión sobre חֲשֻׁקֵיהֶם, tradicionalmente traducido con un arcaísmo
  english_pob_reading: their bands; Traditionally 'their fillets were silver.' The Hebrew likely refers to bands or connecting elements associated with the pillars.
  chosen_spanish_reading: sus bandas
  alternative_spanish_readings:
  - sus filletes
  - sus conectores
  rationale: 'Se conserva la tensión lexical: el hebreo probablemente alude a bandas o elementos de unión, no simplemente a un adorno. «Bandas» es transparente y evita el arcaísmo «filletes», pero la nota conserva la alternativa tradicional para quien compare con otras versiones.'
  doctrine_reference: Éxodo 38:10; nota lexical de la POB
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta ningún cambio adicional (estado: unchanged). La redacción española mantiene la misma estructura semántica del texto hebreo y conserva las dos notas léxicas relevantes que el auditor inglés documentó: la alternativa de אַדְנֵיהֶם y el término tradicional para חֲשֻׁקֵיהֶם.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «basas» para אַדְנִים por consistencia con la terminología del tabernáculo y para evitar un anglicismo.
  - «Plata» y «bronce» conservan el material exacto sin reinterpretaciones.
  - Las notas al pie están ancladas en los elementos léxicos más relevantes y usan marcadores únicos en orden.
