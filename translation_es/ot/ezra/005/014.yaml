  language: en
  yaml_path: translation/ot/ezra/005/014.yaml
  text: Also[a], the gold and silver vessels of the house of God, which Nebuchadnezzar had taken out of the temple that was in Jerusalem and brought to the temple of Babylon—these Cyrus the king took out of the temple of Babylon and gave to one named Sheshbazzar, whom he had appointed governor.
  footnotes:
