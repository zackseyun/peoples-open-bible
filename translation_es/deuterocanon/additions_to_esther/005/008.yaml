translation:
  language: es
  text: y considerar lo que vendrá después de estas cosas[a], para conceder el reino, sin perturbación, a todas las personas en paz[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prestar atención a lo que sigue». El griego προσέχειν puede significar atender o considerar; aquí se mantiene un verbo que haga visible la orientación hacia el futuro.
    reason: lexical_alternative
  - marker: b
    text: O «el dominio» o «el reinado». Griego βασιλεία puede referirse al reino como esfera o al gobierno real de manera más abstracta.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχειν
  english_pob_choice: to look ahead to
  chosen_spanish: considerar
  alternatives_spanish:
  - prestar atención a
  - tener en cuenta
  - mirar hacia adelante a
  lexicon: LSJ
  rationale: En este contexto el infinitivo continúa la secuencia peticionaria y apunta a la reflexión sobre resultados futuros. En español, «considerar» recoge bien ese matiz de atender reflexivamente a lo que sigue sin sonar forzado.
- source_word: τὰ μετὰ ταῦτα
  english_pob_choice: what comes after these things
  chosen_spanish: lo que vendrá después de estas cosas
  alternatives_spanish:
  - lo que sigue después de estas cosas
  - lo posterior a estas cosas
  lexicon: LSJ
  rationale: La expresión es temporal y futura. «Lo que vendrá después de estas cosas» conserva la orientación hacia consecuencias posteriores con un español natural.
- source_word: Βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el dominio
  - la realeza
  - el reinado
  lexicon: LSJ
  rationale: «Reino» es la equivalencia más directa y amplia para βασιλεία en este marco político. Mantiene abierta la referencia tanto al ámbito como al régimen sin sobreespecificar.
- source_word: ἀτάραχον
  english_pob_choice: undisturbed
  chosen_spanish: sereno
  alternatives_spanish:
  - sin perturbación
  - tranquilo
  - sin tumulto
  lexicon: LSJ
  rationale: El adjetivo describe el estado del reino como libre de agitación. «Sereno» comunica bien la idea de calma y falta de perturbación en un español digno y claro.
- source_word: τοῖς πᾶσιν ἀνθρώποις
  english_pob_choice: to all people
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - a todas las personas
  - a toda la gente
  - para todos los hombres
  lexicon: LSJ
  rationale: Aunque ἀνθρώποις puede ser genérico para seres humanos, en este contexto político la construcción permite una recepción colectiva. «A todos los pueblos» mantiene el alcance universal y el dativo destinatario de modo idiomático en español.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: LSJ
  rationale: La revisión inglesa favorece «in peace»; en español, la forma natural y más equivalente es «en paz», conservando el sustantivo y el valor de estado.
- source_word: παρέξεσθαι
  english_pob_choice: to grant
  chosen_spanish: conceder
  alternatives_spanish:
  - otorgar
  - proveer
  - dar
  lexicon: LSJ
  rationale: El futuro medio infinitivo expresa hacer que algo esté disponible o sea conferido. En un contexto real, «conceder» transmite adecuadamente la acción de otorgar el reino.
theological_decisions:
- issue: Naturaleza de βασιλεία en contexto persa
  english_pob_reading: the kingdom; possible realm or royal rule
  chosen_spanish_reading: el reino
  alternative_spanish_readings:
  - el dominio
  - el reinado
  - la realeza
  rationale: No hay indicio suficiente para restringir βασιλεία a solo territorio o solo gobierno. «El reino» preserva la ambigüedad productiva indicada por el audit trail.
  doctrine_reference: No doctrinal issue; lexical/theological ambiguity preserved per source.
translation_notes:
  revision_awareness: La redacción sigue el texto griego directo y toma en cuenta el audit trail inglés, incluyendo la revisión que prefirió ‘in peace’ para μετʼ εἰρήνης. Se preservó la tensión semántica de βασιλεία sin resolverla de forma excesiva y se evitó una traducción mecánica del inglés cuando el español pedía una formulación más natural.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, pero con español contemporáneo.
  - Se evita «SEÑOR» o fórmulas tradicionales no presentes en el griego.
  - «En paz» reproduce mejor el estado expresado por μετʼ εἰρήνης que un adverbio como «pacíficamente».
