translation:
  language: es
  text: No los mates, no sea que mi pueblo olvide; hazlos vagar[a] por tu poder[b] y hazlos descender, oh Señor nuestro escudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hazlos tambalear» o «hazlos errar»; el verbo hebreo puede denotar movimiento inquieto, desestabilización o vagar.
    reason: lexical_alternative
  - marker: b
    text: O «por tu fuerza»; el hebreo puede referirse a fuerza, poder o fuerza militar, pero aquí el posesivo dirigido a Dios favorece «poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תַּהַרְגֵם
  english_pob_choice: Do not kill them
  chosen_spanish: No los mates
  alternatives_spanish:
  - No los mates del todo
  - No los hagas morir
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición directa con הרג; en español, «matar» comunica con claridad el valor ordinario y no añade matiz interpretativo. Mantiene el tono de súplica sin arcaísmo innecesario.
- source_word: פֶּן / יִשְׁכְּחוּ
  english_pob_choice: lest my people forget
  chosen_spanish: para que mi pueblo no olvide
  alternatives_spanish:
  - no sea que mi pueblo olvide
  - para que no llegue a olvidar mi pueblo
  lexicon: HALOT
  rationale: פֶּן introduce una cláusula de temor o prevención. En español, «para que no» expresa con naturalidad la finalidad negativa sin perder la fuerza del resultado temido. «Mi pueblo» conserva el referente posesivo del hebreo.
- source_word: הֲנִיעֵמוֹ
  english_pob_choice: make them wander
  chosen_spanish: hazlos vagar
  alternatives_spanish:
  - hazlos tambalear
  - hazlos errar
  - hazlos andar errantes
  lexicon: HALOT
  rationale: El verbo puede implicar mover, hacer errar o desestabilizar. «Hazlos vagar» conserva la idea de movimiento inquieto y prolongado que el POB inglés documenta, sin fijar excesivamente una sola imagen.
- source_word: בְּחֵילְךָ
  english_pob_choice: by your power
  chosen_spanish: por tu poder
  alternatives_spanish:
  - por tu fuerza
  - con tu poder
  - por tu fuerza militar
  lexicon: HALOT
  rationale: חיל puede significar fuerza, poder o hueste. En este contexto dirigido a Dios, «por tu poder» reproduce bien el valor instrumental y evita reducir la expresión a un sentido militar no necesario.
- source_word: וְהוֹרִידֵמוֹ
  english_pob_choice: bring them down
  chosen_spanish: hazlos descender
  alternatives_spanish:
  - derríbalos
  - hazlos caer
  - bájalos
  lexicon: HALOT
  rationale: 'El hifil de ירד es causativo: hacer bajar/descender. «Hazlos descender» mantiene de manera más literal la metáfora del descenso; «derríbalos» sería posible, pero puede sonar más interpretativo. Se conserva el paralelismo con «hazlos vagar».'
- source_word: מָגִנֵּנוּ
  english_pob_choice: our shield
  chosen_spanish: nuestro escudo
  alternatives_spanish:
  - nuestra defensa
  - nuestro protector
  lexicon: HALOT
  rationale: La metáfora de Dios como escudo es bíblicamente estable y debe preservarse. «Escudo» es la correspondencia directa y más auditable, sin abstractizar la imagen.
- source_word: אֲדֹנָי
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Señor nuestro
  lexicon: HALOT
  rationale: Es un vocativo de dirección a Dios. En español, «oh Señor» refleja con naturalidad la invocación; se evita «Yahvé» porque aquí el hebreo dice אֲדֹנָי, no el Tetragrama.
theological_decisions:
- issue: La tensión entre matar y prolongar el castigo
  english_pob_reading: The verse asks God not to execute the enemies immediately but to subject them to prolonged, visible judgment so that the people remember.
  chosen_spanish_reading: El versículo pide que no los elimine de inmediato, sino que los someta a una humillación visible y prolongada para que el pueblo no olvide.
  alternative_spanish_readings:
  - El versículo pide solamente que los desoriente y debilite, sin especificar una pena prolongada
  - El versículo podría leerse como una simple petición de que no los mate
  rationale: La secuencia negativa/progresiva del hebreo y la lectura auditada del POB distinguen entre muerte inmediata y un juicio continuado. La traducción conserva esa tensión al unir «No los mates» con «hazlos vagar» y «hazlos descender», sin resolverla en una explicación más precisa de la que el texto da.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto inglés revisado eliminó la coma después de «Lord» para una aposición más natural («O Lord our shield»). La presente versión española también evita una coma innecesaria: «oh Señor, nuestro escudo» puede leerse como vocativo con aposición clara; no obstante, en la redacción final se privilegia la fluidez natural del español. Además, se conservó la estructura tripartita del hebreo y la decisión revisada de no introducir una segmentación adicional no atestiguada.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para אֲדֹנָי, no «Yahvé», porque no corresponde al Tetragrama.
  - Se conserva «escudo» como metáfora concreta y no se sustituye por «defensa» o «protector».
  - «Hazlos vagar» refleja la ambigüedad del verbo sin volverlo demasiado interpretativo.
  - Se evita «Cristo» y otra terminología no presente en el verso.
  - 'La puntuación sigue el sentido vocativo final: «oh Señor, nuestro escudo».'
