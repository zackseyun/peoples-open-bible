base_translation:
  language: en
  yaml_path: translation/ot/numbers/036/001.yaml
  text: Then the heads of the fathers’ houses of the clan of the sons of Gilead son of Machir[a], son of Manasseh, from the clans of the sons of Joseph, came near and spoke before Moses and before the leaders[b], the heads of the fathers’ houses of the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'the heads of the families' / 'the chiefs of the ancestral houses.' The Hebrew idiom refers to recognized kinship-household leaders within Israel's tribal structure.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Israel'' is the formal Hebrew expression; alternatively, ''Israelites.'''
    reason: lexical_alternative
