translation:
  language: es
  text: Y la franja costera será para el remanente de la casa de Judá; en ella pastarán. En las casas de Ascalón se acostarán por la tarde, porque Yahvé, su Dios, los atenderá y restaurará su bienestar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hará volver a sus cautivos». El modismo hebreo suele referirse a la restauración de la condición de un pueblo, no solo al regreso literal de cautivos.
    reason: alternative_reading
lexical_decisions:
- source_word: חֶבֶל
  english_pob_choice: coastland
  chosen_spanish: territorio
  alternatives_spanish:
  - región
  - franja costera
  - territorio costero
  lexicon: HALOT
  rationale: En español, «territorio» comunica la idea de una porción de tierra asignada o ocupada sin forzar «costa» donde el hebreo puede abarcar una región amplia dentro del marco costero del contexto inmediato (vv. 5–6).
- source_word: שְׁאֵרִית
  english_pob_choice: remnant
  chosen_spanish: remanente
  alternatives_spanish:
  - resto
  - sobrevivientes
  lexicon: HALOT
  rationale: «Remanente» preserva el valor profético-teológico de un grupo preservado por Dios. «Resto» suena más cuantitativo y menos cargado teológicamente; «sobrevivientes» enfatiza supervivencia física más que elección/restauración.
- source_word: עֲלֵיהֶם
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ellos
  - en ella
  lexicon: HALOT
  rationale: Aunque el pronombre es plural en hebreo, en el contexto remite colectivamente al territorio. En español, «sobre él» mantiene la referencia al terreno como posesión y lugar de pastoreo.
- source_word: יִרְעוּן
  english_pob_choice: shall pasture
  chosen_spanish: apacentarán
  alternatives_spanish:
  - pastorearán
  - pacerán
  - se alimentarán
  lexicon: HALOT
  rationale: '«Apacentarán» conserva la imagen pastoral concreta del verbo רעה: usar la tierra para pasto. «Pastorearán» puede sonar a dirigir ganado; «pacerán» es posible, pero menos natural en este marco.'
- source_word: בְּבָתֵּי אַשְׁקְלוֹן
  english_pob_choice: In the houses of Ashkelon
  chosen_spanish: En las casas de Ascalón
  alternatives_spanish:
  - En los casas de Ascalón
  - En las viviendas de Ascalón
  lexicon: HALOT
  rationale: La expresión locativa se conserva de modo directo. «Ascalón» es la forma española estable para el topónimo; «casas» mantiene la imagen de habitación restaurada en la ciudad antes juzgada.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: por la tarde
  alternatives_spanish:
  - en la tarde
  - al anochecer
  - en la noche
  lexicon: HALOT
  rationale: «Por la tarde» es una equivalencia natural en español para el momento en que se recuestan. Aunque «en la tarde» también es posible, «por la tarde» fluye mejor y evita una lectura demasiado estricta de reloj.
- source_word: יִרְבָּצ֔וּן
  english_pob_choice: shall lie down
  chosen_spanish: se acostarán
  alternatives_spanish:
  - se recostarán
  - se tenderán
  - descansarán
  lexicon: HALOT
  rationale: El verbo sugiere echarse o recostarse; «se acostarán» conserva la concreción del gesto y encaja con la imagen pastoril. «Descansarán» sería más abstracto y menos visual.
- source_word: יִפְקְדֵם
  english_pob_choice: will attend to them
  chosen_spanish: los atenderá
  alternatives_spanish:
  - los visitará
  - los cuidará
  - los tomará en cuenta
  lexicon: HALOT
  rationale: «Atenderá» mantiene la idea de intervención atenta y eficaz sin decidir de antemano entre visita benigna o juicio. En este contexto de restauración, evita la ambigüedad de «visitará» y la demasiada paráfrasis de «cuidará».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, según el criterio del proyecto, sin sustituirlo por un título. «Yahvé» es la forma española estándar de la transliteración usada aquí.
- source_word: וְשָׁב שְׁבוּתָם
  english_pob_choice: and restore their fortunes
  chosen_spanish: y restaurará su fortuna
  alternatives_spanish:
  - y restaurará su cautiverio
  - y volverá su cautiverio
  - y traerá de vuelta a sus cautivos
  lexicon: HALOT
  rationale: El hebreo es un modismo de restauración de condición/estado. «Restaurará su fortuna» sigue la línea idiomática del inglés POB, pero en español «fortuna» aquí se entiende como suerte/estado próspero; no se limita a «cautiverio», que sería más literal pero demasiado estrecho.
theological_decisions:
- issue: Cómo traducir el modismo וְשָׁב שְׁבוּתָם
  english_pob_reading: restore their fortunes
  chosen_spanish_reading: restaurará su fortuna
  alternative_spanish_readings:
  - restaurará su cautiverio
  - traerá de vuelta a sus cautivos
  rationale: En contexto profético, el modismo apunta a una reversión de la condición del pueblo, no solo al retorno físico de cautivos. La elección conserva esa amplitud restauradora, en consonancia con la lectura auditada del inglés POB, aunque en español puede sonar menos idiomática que otras opciones; por eso se mantiene una formulación clara y sobria.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se preserva el nombre propio de Dios en lugar de sustituirlo por un título, coherente con la política del proyecto y con la transparencia hacia la fuente original.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La base inglesa revisada cambió «at evening» por «in the evening» por naturalidad; en español se optó por «por la tarde», que expresa con naturalidad el mismo momento y mantiene la escena de reposo. Se conservó el enfoque de restauración y el uso del nombre divino Yahvé/Yahvé según el audit trail, sin introducir un lenguaje eclesiástico ajeno al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, consistente con el criterio del proyecto.
  - «Remanente» se usa como término técnico profético, no como simple «resto».
  - Se preserva la imagen pastoral concreta con «apacentarán» y «se acostarán».
  - «Ascalón» sigue la forma española tradicional y clara del topónimo.
  - La frase final se entiende como restauración integral de la situación del pueblo, no solo de un regreso literal del exilio.
