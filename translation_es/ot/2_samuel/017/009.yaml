base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/009.yaml
  text: Look[a], right now he is hidden in one of the pits or in one of the other places. And when some of them fall at the first attack, whoever hears it will say[b], ‘There has been a slaughter among the people who follow Absalom.’
  footnotes:
  - marker: a
    text: Or 'in one of the hollows'; the Hebrew term can refer to pits, depressions, or similar hiding places in the terrain.
    reason: lexical_alternative
  - marker: b
    text: '''There has been a slaughter'' could also be rendered ''There has been a defeat'' or ''a blow'' among Absalom''s followers; the Hebrew term refers here to a severe military striking down, not to a disease-plague.'
    reason: lexical_alternative
