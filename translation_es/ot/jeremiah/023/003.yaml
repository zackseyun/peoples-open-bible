revisions:
- from: Y yo mismo reuniré el remanente de mis ovejas de todas las tierras adonde las he dispersado[a], y las haré volver a sus pastos[b]; y fructificarán y se multiplicarán.
  to: Y yo mismo reuniré el remanente de mi rebaño de todas las tierras adonde los he expulsado[a], y los haré volver a sus pastos[b]; y serán fecundos y se multiplicarán.
  rationale: Se revisa para alinear el texto principal con la fuerza del hebreo הִדַּחְתִּי y con la decisión auditada de preservar explícitamente la agencia divina en el juicio. También se ajusta «mis ovejas» a «mi rebaño» para reflejar mejor el colectivo צֹאן. Se cambia «fructificarán» por «serán fecundos» por mayor naturalidad en español aplicado al rebaño, manteniendo el eco de la fórmula bíblica «ser fecundos y multiplicarse».
