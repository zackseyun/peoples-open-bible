translation:
  language: es
  text: ¿Quién puede reconocer sus errores? Absuélveme de las faltas ocultas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los pecados secretos» o «de las cosas ocultas». El hebreo puede denotar faltas ocultas para el orante, para otros, o simplemente asuntos ocultos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁגִיאוֹת
  english_pob_choice: errors
  chosen_spanish: errores
  alternatives_spanish:
  - desviaciones
  - faltas
  - pecados por error
  lexicon: HALOT
  rationale: El término hebreo puede abarcar errores, extravíos o pecados cometidos por equivocación. «Errores» conserva la amplitud moral y la naturalidad en español, sin precisar indebidamente el grado de intención.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién podría
  lexicon: HALOT
  rationale: Interrogativo directo que mantiene el tono retórico del hebreo.
- source_word: יָבִין
  english_pob_choice: can discern
  chosen_spanish: puede discernir
  alternatives_spanish:
  - puede entender
  - puede percibir
  - puede detectar
  lexicon: HALOT
  rationale: «Discernir» reproduce bien la idea de comprender o reconocer con claridad, y conserva el matiz retórico de incapacidad humana para percibir plenamente los propios fallos.
- source_word: מִנִּסְתָּרוֹת
  english_pob_choice: from hidden faults
  chosen_spanish: de las faltas ocultas
  alternatives_spanish:
  - de los pecados ocultos
  - de las cosas ocultas
  - de las faltas secretas
  lexicon: HALOT
  rationale: La preposición con el participio pasivo sugiere cosas ocultas o escondidas; en este contexto, el paralelismo con «errores» favorece un sentido moral. «Faltas ocultas» conserva esa referencia sin cerrar la tensión entre lo oculto para el hablante, para otros o en general.
- source_word: נַקֵּנִי
  english_pob_choice: Clear me
  chosen_spanish: Límpiame
  alternatives_spanish:
  - Acumplédame
  - Absuélveme
  - Lávame
  lexicon: HALOT
  rationale: El piel de נקה puede expresar limpiar, declarar inocente o absolver. «Límpiame» mantiene una amplitud compatible con el trasfondo forense y de purificación que el inglés POB también preserva con «Clear me».
theological_decisions:
- issue: Naturaleza de las faltas ocultas
  english_pob_reading: The phrase refers to hidden faults/sins rather than morally neutral secret things.
  chosen_spanish_reading: La frase se refiere a faltas ocultas, no a cosas secretas moralmente neutras.
  alternative_spanish_readings:
  - pecados secretos
  - cosas ocultas en general
  rationale: El paralelismo con «errores» orienta la expresión hacia una realidad moral. «Faltas ocultas» preserva esa lectura y deja abierta la tensión sobre si están ocultas al propio orante, a otros o de manera general.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés sin mecanicismos. No se introduce una precisión no exigida por el original; se conserva la tensión entre «errores» y «faltas ocultas», y se refleja la amplitud semántica de נקה con «Límpiame».
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - «Errores» mantiene el paralelismo semántico con «faltas ocultas» sin sustituirlo por lenguaje eclesiástico más interpretativo.
  - La puntuación reproduce el tono retórico de pregunta seguida de petición directa.
