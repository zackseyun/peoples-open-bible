revisions:
- from: 'Entonces llamó rápidamente al joven que llevaba sus armas y le dijo[a]: «Saca tu espada y mátame, para que no digan de mí: “Una mujer lo mató”.» Así su joven lo atravesó, y murió.'
  to: 'Entonces llamó rápidamente al joven que llevaba sus armas y le dijo[a]: «Saca tu espada y mátame, para que no digan de mí: “Una mujer lo mató”.» Entonces su escudero lo atravesó, y murió.'
  rationale: Se conserva la literalidad principal en la primera referencia («el joven que llevaba sus armas»), pero se reemplaza «su joven» por «su escudero» en la segunda para lograr un español natural y claro sin perder el referente. La nota explica la repetición hebrea y la razón estilística de la adaptación.
