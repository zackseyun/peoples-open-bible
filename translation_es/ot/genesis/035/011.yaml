review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo general: Dios se identifica, manda a Jacob ser fecundo y multiplicarse, promete una nación y una asamblea de naciones procedentes de él, y reyes de sus lomos. Sin embargo, la colocación de las notas no preserva fielmente el audit trail en inglés: la nota sobre «El Shaddai» está anclada a «Dios Todopoderoso», pero la nota sobre la alternativa de קְהַל גּוֹיִם y la nota cultural sobre «de tus lomos» no están ambas presentes según el patrón documentado. Además, la nota [a] del borrador sobre «le» no corresponde al source evidence ni al audit trail y debe eliminarse.'
  spanish_quality_summary: El español es claro y digno, pero «Fructifica» suena más duro y menos natural en registro bíblico moderno que «Sé fecundo», especialmente en una fórmula patriarcal bien establecida. También conviene ajustar el orden para que «una nación y una asamblea de naciones» se lea con más fluidez en español. «De tus lomos» es aceptable y fiel, aunque requiere la nota cultural correspondiente.
  glossary_alignment: 'La terminología clave está mayormente alineada: אֱלֹהִים -> «Dios»; אֵל שַׁדַּי -> «Dios Todopoderoso» con nota sobre «El Shaddai»; גּוֹי -> «nación»; קְהַל גּוֹיִם -> «asamblea de naciones»; מֵחֲלָצֶיךָ -> «de tus lomos». No hay conflicto con los defaults del proyecto. El ajuste principal es de naturalidad española y de preservación correcta de notas léxicas/culturales.'
  issues:
  - severity: medium
    issue: La nota [a] del borrador no está justificada por el source packet ni por el audit trail.
    rationale: El inglés base no tiene una nota sobre «to him» en este versículo; la nota [a] en el audit trail corresponde a otra decisión léxica, no al pronombre dativo. Mantenerla introduce evidencia no documentada.
  - severity: medium
    issue: Falta una nota cultural explícita para «de tus lomos».
    rationale: El audit trail en inglés preserva una nota para el idiomático מֵחֲלָצֶיךָ. En español también conviene conservarla para evitar opacidad o malentendido.
  - severity: low
    issue: «Fructifica» es fiel pero menos natural que «Sé fecundo» en español bíblico moderno.
    rationale: La fórmula de bendición patriarcal se entiende mejor y suena más idiomática con «Sé fecundo y multiplícate», sin perder fuerza ni literalidad esencial.
  revised_spanish_text: 'Y Dios le dijo: «Yo soy Dios Todopoderoso[a]. Sé fecundo y multiplícate. De ti saldrán una nación y una asamblea de naciones[b], y de tus lomos[c] saldrán reyes.»'
  revised_footnotes:
