revisions:
- from: Entonces, a la media tribu de Manasés Moisés había dado tierra en Basán[a], pero a la otra mitad Josué dio tierra con sus hermanos más allá del Jordán, hacia el occidente. Y cuando Josué los despidió a sus tiendas, los bendijo.
  to: Entonces, a una mitad de la tribu de Manasés Moisés había dado tierra en Basán, pero a la otra mitad Josué dio tierra con sus hermanos[a] más allá del Jordán, hacia el occidente. Y cuando Josué los despidió para que regresaran a sus tiendas, los bendijo.
  rationale: Se revisó «media tribu» a «una mitad de la tribu» para mejorar la naturalidad y reflejar mejor el contraste con «la otra mitad». También se ajustó «los despidió a sus tiendas» a «los despidió para que regresaran a sus tiendas» para un español más idiomático sin perder el matiz de שִׁלְּחָם + «a sus tiendas». La nota al pie se conserva, pero se ancla correctamente en «hermanos», que es donde corresponde la aclaración léxica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:11:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: contrasta las dos mitades de Manasés, mantiene la secuencia temporal con «Moisés había dado» frente a «Josué dio», conserva «con sus hermanos» y traduce correctamente el envío a sus tiendas y la bendición final. Sin embargo, hay un ajuste menor de naturalidad y fidelidad contextual en la expresión inicial y en la preposición con «despidió».'
  spanish_quality_summary: El español es claro y mayormente natural, pero «a la media tribu de Manasés» suena menos idiomático que «a una mitad de la tribu de Manasés» o «a la mitad de la tribu de Manasés», especialmente porque luego aparece «la otra mitad». Además, «los despidió a sus tiendas» suena menos natural en español que «los despidió para que regresaran a sus tiendas» o «los envió a sus tiendas».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Nombres propios y términos clave están bien: «Manasés», «Basán», «Jordán», «hermanos», «bendijo». No aparece el nombre divino ni títulos mesiánicos. La nota léxica sobre «con sus hermanos» está bien orientada.'
  issues:
  - severity: medium
    issue: «a la media tribu de Manasés» es poco idiomático en este contexto
    rationale: Aunque «media tribu» existe, aquí la construcción comparativa con «la otra mitad» se expresa con más claridad y naturalidad como «a una mitad de la tribu de Manasés». Además, el inglés auditado explicitó «one half-tribe», y el español actual puede reflejar mejor ese contraste inicial.
  - severity: low
    issue: «los despidió a sus tiendas» suena forzado en español
    rationale: El hebreo expresa enviarlos a sus tiendas; con «despedir», la preposición «a» resulta menos natural. Una reformulación como «los despidió para que regresaran a sus tiendas» preserva el sentido de envío/despedida con mejor español.
  revised_spanish_text: Entonces, a una mitad de la tribu de Manasés Moisés había dado tierra en Basán, pero a la otra mitad Josué dio tierra con sus hermanos[a] más allá del Jordán, hacia el occidente. Y cuando Josué los despidió para que regresaran a sus tiendas, los bendijo.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «con sus hermanos». Se refiere a sus compañeros israelitas de las otras tribus.'
    reason: lexical_alternative
  revision_rationale: Se revisó «media tribu» a «una mitad de la tribu» para mejorar la naturalidad y reflejar mejor el contraste con «la otra mitad». También se ajustó «los despidió a sus tiendas» a «los despidió para que regresaran a sus tiendas» para un español más idiomático sin perder el matiz de שִׁלְּחָם + «a sus tiendas». La nota al pie se conserva, pero se ancla correctamente en «hermanos», que es donde corresponde la aclaración léxica.
