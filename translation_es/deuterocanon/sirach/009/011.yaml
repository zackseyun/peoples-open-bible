    rationale: La política del proyecto y la decisión teológica auditada indican que, donde sobrevive el hebreo de Sirácida, este tiene primacía. Aquí el hebreo es extante y de alta confianza.
  - severity: high
    issue: La nota al pie invierte la jerarquía textual.
    rationale: La nota actual presenta el hebreo como variante secundaria, cuando el inglés POB preserva el griego como lectura alternativa y el hebreo como base del texto principal.
  - severity: medium
    issue: «Con su marido» resulta ambiguo en español.
    rationale: Puede sonar como si el posesivo se refiriera al destinatario. «Con el marido de ella» aclara que בַּעְלָהּ se refiere al marido de la mujer mencionada en el contexto.
  - severity: low
    issue: Falta reflejar de modo más directo el matiz convivial de mesa/bebida.
    rationale: La combinación «no comas… y no te sientes a beber…» suena natural en español y refleja bien las decisiones léxicas auditadas.
