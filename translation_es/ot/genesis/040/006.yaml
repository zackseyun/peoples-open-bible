    reason: lexical_alternative
  revision_rationale: Se reemplaza «preocupados» por «afligidos» para reflejar mejor el estado visible de turbación o abatimiento expresado por זֹעֲפִים y documentado en la auditoría inglesa. También se aligera la puntuación para una lectura más natural sin perder la fuerza de «y he aquí».
