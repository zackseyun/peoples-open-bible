review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: acercamiento militar hostil a Joppe, rechazo de entrada por parte de los de la ciudad, motivo dado por la presencia de una guarnición de Apolonio, y conservación del cambio a plural en «combatieron». Sin embargo, «le cerraron la entrada» añade un sustantivo no presente en el texto y puede suavizar la idea más directa de excluirle o cerrarle el paso. Además, el enlace adversativo «pero» no corresponde tan bien a la simple coordinación griega como «y».'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. «Acampó contra Joppe» y «combatieron contra ella» funcionan bien. Conviene ajustar «pero» a «y» para seguir mejor la secuencia narrativa, y cambiar «le cerraron la entrada» por una expresión más directa y fiel como «le cerraron el paso».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La transliteración «Joppe» es aceptable en español bíblico según la justificación dada. Se mantiene correctamente el plural en «combatieron».
  issues:
  - severity: medium
    issue: «pero» introduce un contraste no explicitado en el griego
    rationale: El texto griego usa simple coordinación con καὶ. Aunque el contexto admite cierto contraste, «y» preserva mejor la progresión narrativa sin interpretar de más.
  - severity: medium
    issue: «le cerraron la entrada» es menos ceñido que el griego ἀπέκλεισαν αὐτόν
    rationale: El verbo significa cerrar fuera, bloquear acceso o impedir la entrada. «Le cerraron el paso» expresa mejor que no lo dejaron entrar sin añadir «entrada», que no está en el original.
  revised_spanish_text: Y acampó contra Joppe[a], y los de la ciudad le cerraron el paso, porque había una guarnición de Apolonio en Joppe; y combatieron contra ella.
