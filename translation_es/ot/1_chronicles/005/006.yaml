translation:
  language: es
  text: Béera, su hijo, a quien Tilgat-pilneser[a], rey de Asiria, llevó al exilio; él era jefe de los rubenitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre hebreo aquí aparece reflejado como 'Tilgat-pilneser' según la forma consonántica de este versículo; muchas versiones usan la forma más familiar 'Tiglat-pileser'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵרָה
  english_pob_choice: Beerah
  chosen_spanish: Béera
  alternatives_spanish:
  - Beerá
  - Beera
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera consistente y readable para español; se conserva la identidad onomástica sin traducir.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se expresa naturalmente en español como 'su hijo'; mantiene la relación genealógica sin torpeza literal.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: La partícula relativa introduce el objeto de la acción de exilio; 'a quien' preserva esa función objetiva con naturalidad en español.
- source_word: הֶגְלָה
  english_pob_choice: carried away into exile
  chosen_spanish: llevó al exilio
  alternatives_spanish:
  - deportó
  - llevó cautivo
  lexicon: HALOT
  rationale: El hifil de גלה expresa causar exilio. 'Llevó al exilio' conserva el sentido histórico y causal sin sonar excesivamente técnico; 'cautivo' añadiría una matización no explícita aquí.
- source_word: תִּלְגַת פִּלְנְאֶסֶר
  english_pob_choice: Tilgath-pilneser
  chosen_spanish: Tilgat-pilneser
  alternatives_spanish:
  - Tiglat-pileser
  lexicon: nombre histórico
  rationale: Se sigue de cerca la forma hebrea del versículo, como hizo el POB en inglés; 'Tiglat-pileser' es la forma más familiar, pero aquí se preserva la grafía reflejada en la fuente.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa y natural. Se omite el artículo por fluidez, sin cambiar el referente.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él era
  alternatives_spanish:
  - él fue
  - era él
  lexicon: HALOT
  rationale: El pronombre independiente tiene valor resumptivo/enfático. 'Él era' conserva el retorno enfático al sujeto y evita una frase nominal más pesada.
- source_word: נָשִׂיא
  english_pob_choice: chief
  chosen_spanish: príncipe
  alternatives_spanish:
  - jefe
  - líder
  - caudillo
  lexicon: HALOT
  rationale: En contexto tribal, נָשִׂיא puede denotar un líder reconocido. Se elige 'príncipe' para mantener la dignidad del título; 'jefe' sería más funcional, pero menos acorde con el matiz de rango.
- source_word: לָרְאוּבֵנִי
  english_pob_choice: of the Reubenites
  chosen_spanish: de los rubenitas
  alternatives_spanish:
  - de la tribu de Rubén
  - para los rubenitas
  lexicon: HALOT
  rationale: El lamed relacional indica pertenencia/ámbito de liderazgo. 'De los rubenitas' reproduce ese vínculo de manera natural en español.
theological_decisions:
- issue: 'Título de liderazgo tribal: נָשִׂיא'
  english_pob_reading: chief
  chosen_spanish_reading: príncipe
  alternative_spanish_readings:
  - jefe
  - líder
  - caudillo
  rationale: No hay una decisión doctrinal fuerte, pero sí una elección de matiz. Se evita 'rey' o 'gobernante' porque el contexto es genealógico-tribal, no monárquico. 'Príncipe' conserva dignidad y estatus sin imponer una estructura política ajena.
  doctrine_reference: No aplica; decisión lexical-contextual.
translation_notes:
  revision_awareness: 'Se mantiene la lectura auditada del POB en inglés: nombre propio transliterado según la forma hebrea del versículo, verbo causativo de exilio y título tribal rendido como liderazgo reconocido. No se detectaron revisiones aplicadas en el expediente inglés; esta propuesta conserva esa estabilidad interpretativa.'
  spanish_consistency_notes:
  - Se usa 'Asiria' y no una transliteración del topónimo hebreo para claridad y consistencia bíblica en español.
  - Se prefiere 'al exilio' frente a 'cautiverio' para mantener el valor histórico del hifil de גלה sin añadir matiz no explícito.
  - La puntuación con punto y coma refleja la pausa del hebreo entre la cláusula relativa y la cláusula principal resumptiva.
