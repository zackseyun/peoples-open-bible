translation:
  language: es
  text: 'Y morirá todo primogénito en la tierra de Egipto: desde el primogénito de Faraón, que está sentado sobre su trono, hasta el primogénito de la esclava[a] que está detrás de las muelas de molino, y todo primogénito del ganado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sierva» / «la esclava». El hebreo se refiere a una mujer en condición servil; la expresión «detrás de las muelas de molino» describe el trabajo humilde de moler grano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵת
  english_pob_choice: And every firstborn in the land of Egypt will die
  chosen_spanish: Y morirá
  alternatives_spanish:
  - Y morirá ciertamente
  - Y va a morir
  lexicon: WLC/HALOT
  rationale: El hebreo usa un perfecto profético en un anuncio de juicio futuro; en español, el futuro simple transmite mejor la certeza y la proyección de la amenaza sin volverlo pasado ni meramente progresivo.
- source_word: כָּל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo hijo primogénito
  lexicon: WLC/HALOT
  rationale: El distributivo de כָּל con un sustantivo singular se expresa de forma natural con 'todo' en español. 'Primogénito' conserva el término técnico sin añadir 'hijo', que el hebreo no explicita aquí.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en Egipto
  lexicon: WLC/HALOT
  rationale: '''Tierra de Egipto'' sigue de cerca la frase hebrea y mantiene el marco geográfico completo. ''Tierra'' es una correspondencia más directa que ''país'' o una paráfrasis como ''por todo Egipto''.'
- source_word: מִבְּכוֹר פַּרְעֹה ... עַד בְּכוֹר הַשִּׁפְחָה
  english_pob_choice: from the firstborn of Pharaoh ... to the firstborn of the slave woman
  chosen_spanish: desde el primogénito de Faraón ... hasta el primogénito de la esclava
  alternatives_spanish:
  - desde el primogénito de Faraón ... hasta el primogénito de la sierva
  - desde el primogénito de Faraón ... hasta el primogénito de la sirvienta
  lexicon: WLC/HALOT
  rationale: La secuencia marca el alcance social total del juicio. 'Esclava' preserva el peso de servidumbre del término hebreo y evita suavizarlo con 'sierva' o 'sirvienta', que pueden sonar menos marcados socialmente en español.
- source_word: הַיֹּשֵׁב עַל כִּסְאוֹ
  english_pob_choice: who sits on his throne
  chosen_spanish: que está sentado sobre su trono
  alternatives_spanish:
  - que se sienta sobre su trono
  - sentado sobre su trono
  lexicon: WLC/HALOT
  rationale: El participio describe estado/posición del rey. 'Que está sentado sobre su trono' comunica bien la función atributiva y conserva la dignidad del cargo sin añadir matices no presentes.
- source_word: אַחַר הָרֵחָיִם
  english_pob_choice: behind the millstones
  chosen_spanish: que está detrás de los molinos
  alternatives_spanish:
  - detrás de las piedras de molino
  - tras la muela
  lexicon: WLC/HALOT
  rationale: La frase hebrea alude al lugar de trabajo más bajo asociado con la molienda. 'Detrás de los molinos' sigue la imagen espacial del original; 'piedras de molino' es más explícito pero menos fluido para lectura pública.
- source_word: בְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: animales domésticos
  alternatives_spanish:
  - ganado
  - bestias domésticas
  lexicon: WLC/HALOT
  rationale: El término abarca animales domesticados en general. 'Animales domésticos' es comprensible en español moderno y evita restringirlo indebidamente a solo 'ganado'.
theological_decisions:
- issue: Alcance social del juicio desde la casa real hasta la servidumbre
  english_pob_reading: from the firstborn of Pharaoh ... to the firstborn of the slave woman
  chosen_spanish_reading: desde el primogénito de Faraón ... hasta el primogénito de la esclava
  alternative_spanish_readings:
  - desde el primogénito de Faraón ... hasta el primogénito de la sirvienta
  - desde el primogénito de Faraón ... hasta el primogénito de la sierva
  rationale: La estructura retórica del verso subraya que la plaga alcanza desde el rango más alto hasta el más bajo. Mantener 'esclava' conserva esa tensión social y no la atenúa con un término más neutral.
  doctrine_reference: Translation philosophy §1 (primacía del original) y principio POB para términos de estatus servil
- issue: Traducción del futuro profético
  english_pob_reading: will die
  chosen_spanish_reading: morirá
  alternative_spanish_readings:
  - morirá ciertamente
  - va a morir
  rationale: El hebreo presenta la muerte de los primogénitos como un anuncio judicial seguro. El futuro simple en español comunica esa certeza sin desplazar el valor profético a una narración pasada.
  doctrine_reference: Principio de equivalencia funcional con prioridad del valor aspectual del hebreo
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: se mantiene la lectura profética de וּמֵת, el distributivo de כָּל, el rango social completo de מִבְּכוֹר ... עַד בְּכוֹר, la imagen concreta de אַחַר הָרֵחָיִם y la traducción de בְּהֵמָה como un término colectivo para animales domesticados.'
  spanish_consistency_notes:
  - Se usa 'Faraón' como nombre histórico convencional y no se sustituye por 'el faraón' para conservar la referencia fija del texto bíblico.
  - '''Primogénito'' se mantiene para humanos y animales, siguiendo la repetición del hebreo.'
  - '''Esclava'' refleja el término de estatus social del hebreo y coincide con la preferencia POB por hacer visible la servidumbre donde es relevante.'
