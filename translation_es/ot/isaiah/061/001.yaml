translation:
  language: es
  text: El Espíritu del Señor Dios Yahvé está sobre mí, porque Yahvé me ha ungido para anunciar buenas nuevas a los humildes[a]; me ha enviado a vendar a los quebrantados de corazón, a proclamar libertad a los cautivos y apertura de la prisión a los atados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a los pobres”; עֲנָוִים puede denotar a los humildes, mansos, afligidos o pobres.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil: también puede entenderse como “apertura de los ojos” o, en general, “liberación/apertura” para los atados.'
    reason: alternative_reading
lexical_decisions:
- source_word: ר֛וּחַ
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - aliento
  - viento
  lexicon: HALOT
  rationale: En este marco de investidura profética y junto al título divino, se trata del Espíritu de Dios, no de viento ni de aliento físico. Mantener mayúscula conserva la referencia personal y teológica.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  - el Señor
  lexicon: HALOT
  rationale: La construcción combina el título אדֹנָי con el nombre divino. En español, 'Señor Yahvé' preserva ambos elementos sin borrar el nombre revelado, conforme a la norma del proyecto de usar 'Yahvé' para יְהוָה.
- source_word: עָלַי
  english_pob_choice: is upon me
  chosen_spanish: está sobre mí
  alternatives_spanish:
  - reposa sobre mí
  - está en mí
  lexicon: HALOT
  rationale: '''Está sobre mí'' reproduce la imagen de investidura/unción sin sonar forzado en español y conserva el matiz de presencia capacitadora.'
- source_word: מָשַׁח
  english_pob_choice: has anointed
  chosen_spanish: me ha ungido
  alternatives_spanish:
  - me ungió
  - me ha consagrado
  lexicon: HALOT
  rationale: '''Ungir'' es el equivalente directo y mantiene el trasfondo mesiánico y de comisión; ''consagrar'' sería demasiado interpretativo.'
- source_word: לְבַשֵּׂר
  english_pob_choice: to bring good news
  chosen_spanish: para anunciar buenas nuevas
  alternatives_spanish:
  - para llevar buenas nuevas
  - para proclamar buenas nuevas
  - para predicar buenas nuevas
  lexicon: HALOT
  rationale: '''Anunciar buenas nuevas'' expresa bien el valor verbal de לבשר y su tono de proclamación pública; ''buenas nuevas'' evita reducirlo a un tecnicismo eclesiástico.'
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los pobres
  - los mansos
  - los afligidos
  lexicon: HALOT
  rationale: '''Humildes'' mantiene el rango semántico de עֲנָוִים sin estrecharlo solo a lo económico. Se conserva la alternativa ''pobres'' porque la tradición receptiva y Lucas 4 la destacan.'
- source_word: שְׁלָחַנִי
  english_pob_choice: he has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con pretérito perfecto compuesto, que en este contexto de comisión expresa una acción cumplida con vigencia presente.
- source_word: לַחֲבֹשׁ
  english_pob_choice: to bind up
  chosen_spanish: a vendar
  alternatives_spanish:
  - a vendar las heridas
  - a sanar
  - a curar
  lexicon: HALOT
  rationale: Para español, 'vendar' conserva la imagen concreta de vendar heridas; 'sanar' o 'curar' diluirían el verbo y serían más interpretativos.
- source_word: לְנִשְׁבְּרֵי לֵב
  english_pob_choice: the brokenhearted
  chosen_spanish: a los quebrantados de corazón
  alternatives_spanish:
  - a los de corazón quebrantado
  - a los rotos de corazón
  lexicon: HALOT
  rationale: La expresión idiomática se conserva en una forma natural y digna en español, manteniendo la metáfora del corazón quebrado.
- source_word: לִקְרֹא
  english_pob_choice: to proclaim
  chosen_spanish: a proclamar
  alternatives_spanish:
  - a anunciar
  - a llamar
  lexicon: HALOT
  rationale: En este contexto de declaración pública de liberación, 'proclamar' reproduce el registro formal del hebreo mejor que un simple 'decir'.
- source_word: לִשְׁבוּיִם
  english_pob_choice: to the captives
  chosen_spanish: a los cautivos
  alternatives_spanish:
  - a los prisioneros
  - a los exiliados
  lexicon: HALOT
  rationale: '''Cautivos'' corresponde al sentido de personas tomadas y retenidas por fuerza, y armoniza con el paralelismo del verso.'
- source_word: דְּרוֹר
  english_pob_choice: liberty
  chosen_spanish: libertad
  alternatives_spanish:
  - liberación
  - emancipación
  lexicon: HALOT
  rationale: '''Libertad'' conserva el tono solemne de proclamación y el trasfondo de liberación jubilar; en español es más natural y directo que ''emancipación''.'
- source_word: וְלַאֲסוּרִים
  english_pob_choice: to the bound
  chosen_spanish: a los atados
  alternatives_spanish:
  - a los presos
  - a los encadenados
  - a los cautivos
  lexicon: HALOT
  rationale: '''Atados'' mantiene la diferencia con ''cautivos'' y refleja el participio pasivo literal, sin forzar una cárcel específica que el hebreo no explicita.'
- source_word: פְּקַח־קוֹחַ
  english_pob_choice: opening of the prison
  chosen_spanish: apertura de prisión
  alternatives_spanish:
  - apertura de la prisión
  - liberación
  - apertura de los ojos
  lexicon: HALOT
  rationale: La expresión es difícil y debatida; 'apertura de prisión' sigue la lectura contextual de liberación de los atados y evita decidir prematuramente entre sentidos alternativos.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide traducir directamente el nombre divino como 'Yahvé'. Mantenerlo en el cuerpo del texto preserva la distinción entre el nombre propio y el título 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura de פְּקַח־קוֹחַ
  english_pob_reading: opening of the prison
  chosen_spanish_reading: apertura de prisión
  alternative_spanish_readings:
  - apertura de los ojos
  - liberación
  - apertura
  rationale: La POB inglesa conserva la tensión de una expresión difícil. En español, 'apertura de prisión' mantiene la imagen carcelaria apoyada por el paralelismo inmediato, sin cerrar del todo la ambigüedad del hebreo.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se registraron cambios en el último pase; se preservan la decisión principal sobre Yahvé, la ambigüedad léxica de עֲנָוִים y la dificultad de פְּקַח־קוֹחַ, adaptándolas a un español publicable sin perder la tensión documental.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'Espíritu' con mayúscula para la referencia divina.
  - '''Humildes'' preserva el rango semántico de עֲנָוִים; la nota conserva ''pobres'' como alternativa importante.'
  - '''Apretura/apertura de prisión'' se formula de manera legible en español sin resolver la ambigüedad del hebreo.'
  - Se evita 'Cristo' porque el verso habla de un ungido en sentido profético, no de una designación litúrgica fija.
