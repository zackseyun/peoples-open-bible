translation:
  language: es
  text: Él ha hecho que se recuerden sus obras maravillosas[a]; Yahvé es clemente y compasivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha hecho un memorial para sus obras maravillosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵכֶר
  english_pob_choice: to be remembered
  chosen_spanish: sean recordadas
  alternatives_spanish:
  - un memorial
  - recordatorio
  - recuerdo
  lexicon: HALOT
  rationale: El sustantivo זֵכֶר significa 'recuerdo/memorial'. En español, dentro de la construcción con עָשָׂה, la forma verbal 'sean recordadas' comunica con naturalidad la idea de que Dios hizo que sus obras quedaran en memoria, sin perder la relación idiomática del hebreo.
- source_word: עָשָׂה
  english_pob_choice: has caused
  chosen_spanish: ha hecho que
  alternatives_spanish:
  - ha hecho
  - hizo que
  - ha causado que
  lexicon: HALOT
  rationale: El verbo admite el sentido básico de 'hacer', pero en esta construcción el español más fiel y claro es 'ha hecho que', que reproduce el efecto causativo indicado por el POB inglés y conserva el sujeto divino implícito hasta el final del versículo.
- source_word: לְנִפְלְאוֹתָיו
  english_pob_choice: his wondrous works
  chosen_spanish: sus obras maravillosas
  alternatives_spanish:
  - sus maravillas
  - sus obras portentosas
  - sus hechos maravillosos
  lexicon: HALOT
  rationale: נִפְלְאוֹת se refiere a actos extraordinarios de Dios. 'Obras maravillosas' mantiene el carácter concreto de actos/hechos y evita reducirlo a un sustantivo abstracto como 'maravillas' sin complemento.
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: clemente
  alternatives_spanish:
  - gracioso
  - benigno
  - gracioso en su gracia
  lexicon: HALOT
  rationale: Aunque 'gracioso' sería posible, en español bíblico 'clemente' expresa bien la disposición favorable y benevolente de Dios sin sonar ambiguo. Se conserva la distinción con el siguiente adjetivo.
- source_word: וְרַחוּם
  english_pob_choice: and compassionate
  chosen_spanish: y compasivo
  alternatives_spanish:
  - y misericordioso
  - y lleno de compasión
  lexicon: HALOT
  rationale: רַחוּם apunta a compasión/misericordia afectiva. 'Compasivo' es la equivalencia más directa y no repite exactamente el matiz de 'clemente', preservando la pareja adjetival del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton por 'Yahvé' en el texto principal, preservando el nombre propio divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton, y la práctica del proyecto es verterlo como 'Yahvé'. Esto mantiene visible el nombre del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sujeto implícito del verbo inicial
  english_pob_reading: He has caused his wondrous works to be remembered
  chosen_spanish_reading: Él ha hecho que sus obras maravillosas sean recordadas
  alternative_spanish_readings:
  - Se ha hecho un memorial de sus obras maravillosas
  - Sus obras maravillosas han quedado en memoria
  rationale: En hebreo el verbo aparece antes del nombre divino final, pero el sujeto es Yahvé. El español explícito 'Él' conserva la continuidad sintáctica sin cambiar la referencia teológica.
  doctrine_reference: Hebrew poetic subject continuity; PSA.111.4 audit trail
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del audit trail sin cambios sustanciales respecto del razonamiento inglés: se conserva la causatividad de עָשָׂה, la idea de recuerdo/memorial de זֵכֶר, la dupla adjetival חַנּוּן/רַחוּם y el nombre divino Yahvé. No se detectaron revisiones posteriores que obligaran a ajustar la traducción.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología del proyecto para el Tetragrámaton.
  - '''Clemente y compasivo'' conserva la pareja adjetival sin mezclarla con formulaciones eclesiásticas más tradicionales.'
  - La nota al pie marca una alternativa léxica real en torno a זֵכֶר/עָשָׂה, paralela a la del POB inglés.
