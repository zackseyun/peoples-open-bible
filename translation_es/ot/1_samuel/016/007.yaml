base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/007.yaml
  text: But Yahweh said to Samuel[a], “Do not look at his appearance or at the height of his stature, because I have rejected him. For not as man sees does God see, for man sees what is before the eyes[c][b], but Yahweh sees the heart.”
  footnotes:
  - marker: a
    text: Or, more literally, 'For not what man sees'; the Hebrew is elliptical, and the sense is that the LORD's way of seeing differs from man's.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is generic, referring to human beings in general.'
    reason: lexical_alternative
  - marker: c
    text: Or 'For the LORD does not see as man sees, for man sees'.
    reason: previous_rendering
