lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Entonces vino
  - Y aconteció
  lexicon: HALOT
  rationale: El hebreo usa la forma narrativa de היה como introducción secuencial. En español, "vino" reproduce con naturalidad el movimiento de llegada de la palabra, manteniendo el arranque conjuntivo sin caer en un calco rígido como "y aconteció".
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, "la palabra" conserva el valor técnico e intertextual del hebreo y corresponde al criterio auditado del POB inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo contiene el nombre propio del pacto, no un título. Por la norma del proyecto, se vierte como "Yahvé" para preservar el nombre divino y evitar la sustitución litúrgica.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el profeta; "a mí" es la forma natural y fiel en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita de la palabra divina. "Diciendo" reproduce la fórmula hebrea con claridad y sin añadir contenido.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre personal de Dios revelado a Israel, conforme al POB en inglés. En español, "Yahvé" es la transliteración de uso académico y eclesial amplia que mejor preserva el alcance teológico del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al propio texto español mediante [a] junto a la palabra correspondiente, sin cambiar el contenido fuente ni la decisión lexical principal.
  spanish_consistency_notes:
  - Se preservó la fórmula profética breve y solemne del hebreo.
  - Se evitó "SEÑOR" en el cuerpo principal por la norma del proyecto sobre el Tetragrama.
  - El orden "Y vino... a mí, diciendo," mantiene la secuencia narrativa y la apertura del versículo.
