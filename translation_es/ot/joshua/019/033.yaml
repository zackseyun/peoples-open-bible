base_translation:
  language: en
  yaml_path: translation/ot/joshua/019/033.yaml
  text: And their border was from Heleph[a], from the oak in Zaannannim, and Adami-nekeb and Jabneel, as far as Lakkum[b]; and its end was at the Jordan.
  footnotes:
  - marker: a
    text: Or “from Elon-bezaanannim”; the Hebrew may be read either as a place name or as “the oak in/of Zaannannim.”
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, “its outgoings were the Jordan,” an idiom for the border’s terminal points reaching the Jordan.
    reason: lexical_alternative
