translation:
  language: es
  text: Y sucedió en el año duodécimo, en el mes duodécimo, el primer día del mes, que la palabra de Yahvé[a] vino a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''YHWH''; tradicionalmente se vierte ''el SEÑOR'' en muchas traducciones españolas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La forma verbal narrativa introduce una fórmula profética fechada. 'Aconteció' conserva el valor de evento introducido por wayyiqtol sin sonar arcaica en español.
- source_word: בִּשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the twelfth year
  chosen_spanish: en el año duodécimo
  alternatives_spanish:
  - en el duodécimo año
  - en año doce
  lexicon: HALOT
  rationale: La fecha se expresa de manera natural en español con el ordinal después del sustantivo. Se mantiene el sentido calendárico del hebreo sin añadir 'del exilio', que no aparece explícitamente aquí.
- source_word: בִּשְׁנֵי עָשָׂר חֹדֶשׁ
  english_pob_choice: in the twelfth month
  chosen_spanish: en el mes duodécimo
  alternatives_spanish:
  - en el duodécimo mes
  - en mes doce
  lexicon: HALOT
  rationale: '''Mes duodécimo'' reproduce la fórmula de datación con un equivalente idiomático y claro en español.'
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: al primer día del mes
  alternatives_spanish:
  - el primero del mes
  - en el primer día del mes
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática que significa el primer día del mes. 'Al primer día del mes' conserva la precisión temporal con español natural.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  english_pob_choice: the word of Yahweh came to me
  chosen_spanish: la palabra de Yahvé vino a mí
  alternatives_spanish:
  - la palabra de Yahvé me llegó
  - vino a mí la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva el giro profético tradicional con 'vino a mí', que expresa la irrupción de la revelación. 'Palabra' traduce דְבַר con su valor de mensaje revelado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio 'Yahvé' según la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La partícula introductoria de discurso directo se vierte con 'diciendo', fórmula natural y fiel que señala la continuación del mensaje.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa documenta el Tetragrámaton como nombre propio y no como título. En español se mantiene esa decisión con 'Yahvé', conforme al estándar del proyecto y sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre la fuente hebrea y la versión inglesa, sin revisiones aplicadas. La traducción española sigue la misma lectura de datación y la misma decisión teológica sobre el nombre divino, adaptándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantuvo la secuencia temporal completa de la fórmula fechada sin añadir información implícita no presente en el hebreo.
  - Se evitó la sustitución de Yahvé por un título, en coherencia con la política terminológica del proyecto.
  - '''Diciendo'' queda ligado a la cláusula final como introducción al discurso que continúa en el contexto inmediato.'
