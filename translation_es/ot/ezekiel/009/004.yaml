translation:
  language: es
  text: 'Y Yahvé le dijo: «Pasa por en medio de la ciudad, por en medio de Jerusalén, y pon una marca[a] sobre las frentes de los hombres que suspiran y gimen por todas las abominaciones que se hacen en medio de ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo taw: posiblemente alude a la letra ת como marca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto en español. “Yahvé” preserva la referencia explícita a YHWH sin ocultarla tras un título.
- source_word: עֲבֹר
  english_pob_choice: Pass through
  chosen_spanish: Pasa por en medio de
  alternatives_spanish:
  - Ve por en medio de
  - Atraviésa
  lexicon: HALOT
  rationale: El imperativo pide moverse a través de la ciudad; “pasa por en medio de” conserva el valor direccional y la fuerza del mandato, en un español natural.
- source_word: בְּתוֹךְ ... בְּתוֹךְ
  english_pob_choice: through the midst of ... through the midst of
  chosen_spanish: por en medio de ... por en medio de
  alternatives_spanish:
  - en medio de ... en medio de
  - a través de ... a través de
  lexicon: HALOT
  rationale: Se reproduce la repetición hebrea para mantener el énfasis y el ritmo del original, sin volver la frase artificial en español.
- source_word: וְהִתְוִיתָ תָּו
  english_pob_choice: put a mark
  chosen_spanish: pon una marca
  alternatives_spanish:
  - pon una señal
  - marca con una taw
  - inscribe una marca
  lexicon: HALOT
  rationale: El conjunto verbal-nominal expresa colocar una señal distintiva. “Marca” comunica la función protectora/identificadora sin introducir una interpretación más específica en el texto principal.
- source_word: מִצְחוֹת
  english_pob_choice: foreheads
  chosen_spanish: las frentes
  alternatives_spanish:
  - las testas
  - las sienes
  lexicon: HALOT
  rationale: Es la equivalencia anatómica directa y más clara en español contemporáneo.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los habitantes
  lexicon: HALOT
  rationale: Se conserva el valor masculino plural del hebreo, ya que el grupo señalado no es genérico sino concreto.
- source_word: הַנֶּאֱנָחִים וְהַנֶּאֱנָקִים
  english_pob_choice: who sigh and groan
  chosen_spanish: que suspiran y gimen
  alternatives_spanish:
  - que gimen y se lamentan
  - que suspiran y se lamentan
  lexicon: HALOT
  rationale: Los dos participios expresan dolor audible y continuo. “Suspiran y gimen” conserva la pareja léxica y el matiz de aflicción sin ampliar innecesariamente el sentido.
- source_word: עַל כָּל הַתּוֹעֵבוֹת
  english_pob_choice: over all the abominations
  chosen_spanish: por todas las abominaciones
  alternatives_spanish:
  - a causa de todas las abominaciones
  - sobre todas las abominaciones
  lexicon: HALOT
  rationale: En este contexto עַל expresa motivo o carga afectiva respecto de los pecados de la ciudad. “Por” comunica bien esa congoja concernida sin endurecer la sintaxis.
- source_word: הַנַּעֲשׂוֹת
  english_pob_choice: being done
  chosen_spanish: que se hacen
  alternatives_spanish:
  - que están siendo hechas
  - hechas
  lexicon: HALOT
  rationale: El participio presenta acciones en curso; “que se hacen” conserva esa continuidad de manera natural en español.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: La referencia retoma la ciudad personificada en femenino. “En medio de ella” preserva esa referencia sin sonar extrañamente literal.
theological_decisions:
- issue: Sentido de תָּו como marca vs. la letra taw
  english_pob_reading: Rendered functionally as 'a mark' in the main text, with a footnote noting the Hebrew taw.
  chosen_spanish_reading: “una marca” en el texto principal, con nota sobre la posible referencia a la letra taw.
  alternative_spanish_readings:
  - “la letra taw”
  - “una taw”
  - “una señal”
  rationale: El contexto inmediato pide un distintivo puesto para separar/proteger. Nombrar la letra en el texto principal adelantaría una identificación que el pasaje no exige de forma explícita; por eso se mantiene la ambigüedad y se documenta en nota.
  doctrine_reference: Preservar la tensión lexicográfica y no resolverla más allá del alcance del hebreo.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente del POB inglés, que no introdujo cambios adicionales y mantuvo la decisión funcional sobre תָּו. La redacción española conserva esa misma prudencia interpretativa y la nota correspondiente.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” conforme al criterio del proyecto para יְהוָה.
  - Se prefirió “marca” y no una transliteración de תָּו, para no sobrerresolver el símbolo.
  - La repetición de “por en medio de” intenta reflejar el paralelismo hebreo sin sacrificar legibilidad.
  - “Abominaciones” conserva el peso profético del término תּוֹעֵבוֹת.
