    text: Or 'God spoke in his holy place' or 'by his holiness.' The Hebrew phrase can denote either God's holiness or a holy place associated with him.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will rejoice.' The Hebrew verb conveys jubilant exultation.
    reason: lexical_alternative
