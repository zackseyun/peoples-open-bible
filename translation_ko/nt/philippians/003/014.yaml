id: PHP.3.14
reference: Philippians 3:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ σκοπὸν διώκω ⸀εἰς τὸ βραβεῖον τῆς ἄνω κλήσεως τοῦ θεοῦ ἐν Χριστῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/014.yaml
  text: I press on toward the goal for the prize of the upward call of God in Messiah Jesus[a][b].
  footnotes:
  - marker: a
    text: Or “the heavenly call” or “the call from above.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek: “in Christ Jesus”; rendered “Messiah Jesus” because Χριστός is a title here.'
    reason: lexical_alternative
translation:
  language: ko
  text: 푯대를 향하여 좇아갑니다. 메시아 예수 안에서 하나님께서 위로 부르신 그 부르심[a]의 상을 얻기 위함입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하늘의 부르심」 또는 「위로부터의 부르심」. 헬라어 ἄνω는 본 장의 달리기 비유에 어울리는 「위로」의 공간적·방향적 의미를 살린다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어는 「메시아(그리스도) 예수 안에서」. 본 번역은 Χριστός의 칭호성을 살려 「메시아」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ σκοπόν
  english_pob_choice: toward the goal
  chosen_korean: 푯대를 향하여
  alternatives_korean:
  - 목표를 향하여
  - 목표를 바라보며
  lexicon: BDAG
  rationale: 운동 비유에서 κατὰ σκοπόν은 정해진 목표를 향한 직진적 움직임. 한국 성서 전통의 「푯대」가 그 비유적 어감을 가장 잘 보존한다.
- source_word: διώκω
  english_pob_choice: I press on
  chosen_korean: 좇아갑니다
  alternatives_korean:
  - 달려갑니다
  - 힘써 좇아갑니다
  lexicon: BDAG
  rationale: 12절과 일관된 어휘 「좇아가다」 사용. 본 장 경주 비유의 통일된 어휘를 유지한다.
- source_word: εἰς τὸ βραβεῖον
  english_pob_choice: for the prize
  chosen_korean: 그 ~의 상을 얻기 위함입니다
  alternatives_korean:
  - 상을 향하여
  - 상을 받고자
  lexicon: BDAG
  rationale: εἰς가 목표를 도입한다. 한국어에서는 「~의 상을 얻기 위함입니다」로 목적을 자연스럽게 표현하면서 동시에 합쇼체의 종결을 살린다.
- source_word: ἄνω
  english_pob_choice: upward
  chosen_korean: 위로
  alternatives_korean:
  - 하늘의
  - 위로부터의
  lexicon: BDAG
  rationale: 「위로」가 ἄνω의 공간적·운동적 함의를 함께 살린다. 「하늘의」는 해석적이며 본 장의 경주 비유를 약하게 한다.
- source_word: κλήσεως τοῦ θεοῦ
  english_pob_choice: of the upward call of God
  chosen_korean: 하나님께서 위로 부르신 그 부르심
  alternatives_korean:
  - 하나님의 위로 부르심
  - 하나님의 위에서의 부르심
  lexicon: BDAG
  rationale: 속격 구문을 한국어로 자연스럽게 풀되, 명사 「부르심」과 동작 「부르신」을 함께 사용하여 강조한다. 「그」로 지시성을 살린다.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 칭호의 의미가 살아 있는 본 문맥에서 「메시아」를 유지한다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에서
  alternatives_korean:
  - 메시아 예수와 연합하여
  - 메시아 예수 안에
  lexicon: BDAG
  rationale: 바울의 「그리스도 안에」 정형 표현을 풀어쓰지 않고 보존하며, 본 절의 부르심의 영역·근거를 가리킨다.
theological_decisions:
- issue: ἄνω κλήσεως의 의미
  chosen_reading: 위로 부르신 (운동 비유에 어울리는 방향적 의미)
  alternative_readings:
  - 하늘의 부르심
  - 위로부터의 부르심
  rationale: 직전 문맥의 경주 비유에 어울리는 「위로의 부르심」이 가장 자연스럽다. 「하늘의」는 해석적이고 비유를 추상화한다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
