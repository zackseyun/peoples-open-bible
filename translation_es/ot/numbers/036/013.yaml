review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y del POB inglés: fórmula conclusiva, nombre divino Yahvé, mediación de Moisés, ''hijos de Israel'', ''llanuras de Moab'' y ubicación junto al Jordán cerca/opuesto a Jericó. Sin embargo, presenta un error gramatical importante en ''las mandatos'' y una nota desanclada; además, ''en Jericó'' interpreta demasiado la geografía, pues el hebreo ubica en las llanuras de Moab junto al Jordán, frente/a la altura de Jericó, no dentro de Jericó.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero requiere corrección por concordancia incorrecta (''las mandatos'') y por puntuación/geografía mejorable al final del verso. ''Los mandamientos y las normas'' o ''los mandamientos y las ordenanzas'' suena más idiomático y fiel que la combinación actual. También debe corregirse la colocación de las notas: [a] está en el lugar equivocado y no ancla ''hijos de Israel''.'
  glossary_alignment: Alinea bien con la política del proyecto en 'Yahvé' para יהוה. Conviene usar 'mandamientos' para מִצְוֺת por tono legal-bíblico y por la propia justificación auditada; para מִשְׁפָּטִים, 'normas' es posible, pero 'juicios' o 'ordenanzas' preserva mejor la distinción legal del POB. Se conserva correctamente 'hijos de Israel'.
  issues:
  - severity: high
    issue: Error gramatical en 'las mandatos'
    rationale: '''Mandatos'' es masculino plural; la forma actual es incorrecta y afecta la calidad básica del texto. Además, la propia decisión léxica reconoce que ''mandamientos'' sería más idiomático y solemne.'
  - severity: high
    issue: La nota [a] está anclada al término equivocado
    rationale: La nota [a] explica 'hijos de Israel', pero en el texto está colocada sobre 'mandatos'. Esto incumple la disciplina de anclaje de notas y puede confundir al lector.
  - severity: medium
    issue: '''en Jericó'' sobreinterpreta la localización hebrea'
    rationale: El hebreo עַל יַרְדֵּן יְרֵחוֹ y el POB inglés ubican el escenario junto al Jordán en relación con Jericó, no dentro de la ciudad. 'Frente a Jericó' o una nota alternativa preserva mejor la geografía.
  - severity: medium
    issue: La nota [c] introduce una alternativa no reflejada adecuadamente por el texto base
    rationale: Si el texto dice 'en Jericó', la nota con 'frente a Jericó' y 'al otro lado del Jordán' queda demasiado distante del anclaje semántico principal. El texto debe ajustarse para que la nota sea verdaderamente alternativa y no correctiva.
  revised_spanish_text: Estos son los mandamientos y los juicios que Yahvé mandó por medio de Moisés a los hijos de Israel[a], en las llanuras de Moab, junto al Jordán, frente a Jericó[b].
