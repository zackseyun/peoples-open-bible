revisions:
- from: Josué capturó a todos estos reyes y su tierra[a] de una sola vez, porque Yahvé, el Dios de Israel, peleó por Israel.
  to: Josué capturó a todos estos reyes y sus tierras en una sola ocasión[a], porque Yahvé, el Dios de Israel, combatió por Israel.
  rationale: Se ajusta פַּעַם אֶחָת a «en una sola ocasión» para reflejar mejor el literal y evitar la sobreinterpretación de «de una sola vez». Se mejora la naturalidad de «sus tierras» y el registro con «combatió por Israel». También se normaliza la nota al pie para que sea idiomática y coherente con la decisión léxica principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Josué captura a todos esos reyes y su tierra, y la razón causal es que Yahvé peleó por Israel. También conserva correctamente el nombre divino «Yahvé» y la relación «el Dios de Israel». Sin embargo, «de una sola vez» en el texto principal inclina más hacia ‘all at once’ que hacia el hebreo literal/POB «at one time», que en contexto puede referirse a una sola campaña; conviene ajustar el español principal para no sobreinterpretar la modalidad temporal.'
  spanish_quality_summary: 'El español es claro y natural, pero «su tierra» suena algo singular e individual tras «todos estos reyes»; «sus tierras» o «su territorio» suenan más naturales en español. Además, la nota al pie tiene comillas y prefijo poco naturales («''O: ...''»). «Combatió por Israel» suena más digno que «peleó por Israel» en este registro, aunque «peleó» no es incorrecto.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en «Yahvé» y «Dios». No hay conflicto doctrinal. El ajuste principal es de matiz léxico/estilístico: preferir una formulación para פַּעַם אֶחָת que preserve mejor el literal «en una sola ocasión» en el texto principal, dejando «en una sola campaña» como alternativa en nota.'
  issues:
  - severity: medium
    issue: «de una sola vez» en el texto principal sobreinterpreta פַּעַם אֶחָת
    rationale: El inglés auditado mantiene «at one time» como redacción principal precisamente para no fijar la lectura interpretativa ‘en una sola campaña’. En español, «de una sola vez» sugiere más fuertemente inmediatez o simultaneidad.
  - severity: low
    issue: «su tierra» suena menos natural tras un antecedente plural
    rationale: Aunque el singular colectivo puede defenderse, en español corriente «sus tierras» o «su territorio» fluye mejor con «todos estos reyes» y conserva el sentido de אַרְצָם.
  - severity: low
    issue: Redacción de la nota al pie poco idiomática
    rationale: 'La fórmula «''O: ...''» con comillas externas es torpe. Conviene normalizar a «O: “en una sola campaña”. El hebreo dice literalmente…».'
  - severity: low
    issue: Registro de «peleó» algo coloquial
    rationale: «Combatió por Israel» conserva el sentido bélico y encaja mejor con un estilo bíblico moderno y digno.
  revised_spanish_text: Josué capturó a todos estos reyes y sus tierras en una sola ocasión[a], porque Yahvé, el Dios de Israel, combatió por Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «en una sola campaña». El hebreo dice literalmente «en una sola ocasión».'
    reason: lexical_alternative
  revision_rationale: Se ajusta פַּעַם אֶחָת a «en una sola ocasión» para reflejar mejor el literal y evitar la sobreinterpretación de «de una sola vez». Se mejora la naturalidad de «sus tierras» y el registro con «combatió por Israel». También se normaliza la nota al pie para que sea idiomática y coherente con la decisión léxica principal.
