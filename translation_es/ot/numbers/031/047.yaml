revisions:
- from: De la mitad perteneciente a los hijos de Israel[a], Moisés tomó una porción de uno de cada cincuenta, de entre los hombres y de entre el ganado, y los dio a los levitas, los que guardaban la custodia del tabernáculo de Yahvé[b], tal como Yahvé había mandado a Moisés.
  to: De la mitad perteneciente a los hijos de Israel[a], Moisés tomó una porción de uno de cada cincuenta[b], de entre las personas y de entre el ganado, y se los dio a los levitas que estaban encargados del cuidado del tabernáculo de Yahvé, tal como Yahvé había mandado a Moisés.
  rationale: Se corrigió la nota [b] para que refleje la alternativa documentada en el POB inglés y se ancló en la frase de la cuota. Se ajustó 'de entre los hombres' a 'de entre las personas' para preservar el sentido colectivo de הָאָדָם. Se cambió 'y los dio' por 'y se los dio' para español natural, y se suavizó 'guardaban la custodia' a 'estaban encargados del cuidado' para mantener el sentido de custodia del hebreo con mejor legibilidad.
  reviewer_model: gpt-5.4
