  to: Delante de él, el fuego devora; detrás de él, una llama abrasa. La tierra delante de él es como el jardín de Edén, pero detrás de él es un desierto desolado; en verdad, nada escapa de él[a].
  rationale: Se corrige la cláusula final para reflejar fielmente la destrucción total expresada por פְּלֵיטָה לֹא הָיְתָה לוֹ, manteniendo además la ambigüedad documentada en la nota. Se mejora la intensidad de תְּלַהֵט con ‘abrasa’. Aunque permanece ‘él’ por naturalidad española, el mayor problema semántico queda reparado; el contexto sigue tratando al invasor como fuerza colectiva. No hace falta adjudicación adicional.
