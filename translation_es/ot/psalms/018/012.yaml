translation:
  language: es
  text: Él puso oscuridad como su escondite[a], alrededor de él su refugio[b]—aguas oscuras[c], nubes espesas de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su lugar secreto».
    reason: lexical_alternative
  - marker: b
    text: O «su pabellón» o «su cabaña».
    reason: lexical_alternative
  - marker: c
    text: Lit. «oscuridad de aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֶׁת
  english_pob_choice: He made
  chosen_spanish: Él puso
  alternatives_spanish:
  - Él hizo
  - Él estableció
  - Él colocó
  lexicon: HALOT
  rationale: El hebreo expresa el acto de poner/establecer; en español, «puso» conserva la fuerza verbal breve y poética sin forzar un giro más interpretativo que el hebreo.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - noche
  lexicon: HALOT
  rationale: «Oscuridad» comunica bien la imagen atmosférica y teofánica sin añadir un tono más abstracto o litúrgico que «tinieblas» en este contexto.
- source_word: סִתְרוֹ
  english_pob_choice: his hiding place
  chosen_spanish: su lugar de escondite
  alternatives_spanish:
  - su lugar secreto
  - su escondite
  - su secreto
  lexicon: HALOT
  rationale: La construcción apunta a un lugar de ocultamiento; «lugar de escondite» preserva la referencia espacial. Se evita resolver la posible ambigüedad hacia «secreto» como si el sentido fuera solo abstracción.
- source_word: סְבִיבוֹתָיו
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - en torno a él
  - rodeándolo
  - a su alrededor
  lexicon: HALOT
  rationale: Se mantiene el valor locativo/adverbial simple del hebreo. «Alrededor de él» es natural en español y conserva el paralelismo.
- source_word: סֻכָּתוֹ
  english_pob_choice: his shelter
  chosen_spanish: su refugio
  alternatives_spanish:
  - su cabaña
  - su pabellón
  - su enramada
  lexicon: HALOT
  rationale: El término puede ser «choza/cabaña» o cobertura protectora; en este contexto poético-teofánico, «refugio» comunica la función sin imponer un objeto demasiado concreto. Se conserva la tensión entre estructura física e imagen protectora.
- source_word: חֶשְׁכַת מַיִם
  english_pob_choice: dark waters
  chosen_spanish: oscuridad de aguas
  alternatives_spanish:
  - aguas oscuras
  - tinieblas de aguas
  - oscuridad sobre las aguas
  lexicon: HALOT
  rationale: Se conserva la cadena nominal hebrea de modo auditable. «Oscuridad de aguas» refleja el genitivo poético y evita suavizar demasiado la imagen; en español suena algo más literal que la redacción inglesa revisada, pero sigue siendo comprensible y fiel.
- source_word: עָבֵי שְׁחָקִים
  english_pob_choice: thick clouds of the skies
  chosen_spanish: nubes espesas de los cielos
  alternatives_spanish:
  - nubes densas de los cielos
  - espesas nubes del cielo
  - nubes gruesas del firmamento
  lexicon: HALOT
  rationale: «עָבֵי» expresa espesor/densidad; «שְׁחָקִים» es un plural poético de «cielos». «Cielos» mantiene el paralelismo bíblico y el registro poético, evitando reducir el sentido a simple meteorología.
theological_decisions:
- issue: La imagen de oscuridad y nube describe el ocultamiento divino en una teofanía sin convertirla automáticamente en un símbolo doctrinal de maldad.
  english_pob_reading: Render the imagery straightforwardly as poetic concealment around God.
  chosen_spanish_reading: Traducir la imagen como ocultamiento poético alrededor de Dios, sin moralizar la oscuridad.
  alternative_spanish_readings:
  - Entender la oscuridad como juicio
  - Leer el refugio como una alusión cultual al tabernáculo
  rationale: El hebreo presenta paralelismos visuales y atmosféricos; la versión española debe conservar esa tensión poética. No se añade una interpretación que el texto no exija.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El contexto inglés fue revisado de «darkness of waters» a «dark waters» por naturalidad; en español se optó por mantener una cadena nominal más cercana al hebreo («oscuridad de aguas») para preservar la textura poética y la audibilidad del genitivo constructo, sin perder inteligibilidad.
  spanish_consistency_notes:
  - Se usó «Dios» implícito por el contexto poético del salmo, sin introducir sustituciones reverenciales no presentes en el hebreo.
  - Se preservó el paralelismo entre «lugar de escondite», «refugio» y las imágenes de agua/nube como elementos de una teofanía.
  - No se recurrió a «tabernáculo» ni a «SEÑOR» porque el hebreo aquí no lo exige; el sentido es imaginería poética de ocultamiento, no una fórmula cultual fija.
