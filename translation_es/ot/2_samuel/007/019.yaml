base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/019.yaml
  text: And even this was too small in your eyes[a], Lord GOD; you have also spoken of your servant’s house for a long time to come, and this is the law of man[c][b], Lord GOD.
  footnotes:
  - marker: a
    text: Or 'for the distant future.' The phrase refers to what lies far ahead in time.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house,' which can mean household or dynasty.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew of the final clause is difficult. It may also mean 'this is the charter for humanity' or 'this is the law/custom of man.'
    reason: alternative_reading
