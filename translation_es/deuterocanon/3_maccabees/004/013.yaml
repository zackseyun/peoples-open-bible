    issue: «con cuidado» para ἐπιμελῶς
    rationale: Aunque literalmente posible, en español puede sugerir trato cuidadoso o delicado, lo cual choca con el contexto punitivo. «Cuidadosamente» o «con esmero» comunica mejor ejecución minuciosa.
  - severity: medium
    issue: «sin quedarse en modo alguno cortos en su castigo»
    rationale: La expresión es comprensible pero suena forzada. El griego se refiere a no quedar en nada por debajo del castigo aplicado a los otros; conviene explicitar esa comparación para mayor fidelidad y claridad.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: «de tener trato idéntico» es poco natural en español. La nota puede conservar la alternativa lexical con una formulación más clara y eufónica.
