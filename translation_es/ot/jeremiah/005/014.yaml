translation:
  language: es
  text: 'Por tanto, así dice Yahvé, el Dios de los ejércitos: Porque ustedes hablan[a] esta palabra, he aquí, hago de mis palabras en tu boca fuego,[b] y de este pueblo leña[c], y este los consumirá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque ustedes han hablado esta palabra». El participio hebreo puede leerse con fuerza presente o de pasado reciente.'
    reason: alternative_reading
  - marker: b
    text: 'O: «estoy dando mis palabras en tu boca como fuego». El hebreo dice literalmente «dando», pero el sentido es que Dios hace que las palabras de Jeremías funcionen como fuego.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «este pueblo [como] leña» o «leña para fuego».'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conjunción inferencial que enlaza esta amenaza con el contexto anterior; 'Por tanto' conserva el valor conclusivo sin sonar artificial.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Fórmula profética convencional; en español, el presente resulta natural y solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por título.'
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' preserva la fuerza militar/cósmica de צְבָאוֹת con buena transparencia en español.'
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la acción anunciada; 'Porque' mantiene la relación causal de forma directa.
- source_word: דַּבֶּרְכֶם אֶת הַדָּבָר הַזֶּה
  english_pob_choice: you speak this word
  chosen_spanish: ustedes hablan esta palabra
  alternatives_spanish:
  - ustedes han hablado esta palabra
  - ustedes dicen esta palabra
  lexicon: HALOT
  rationale: El participio con sufijo puede tener fuerza presente o reciente. Se conserva la referencia a 'palabra' para enlazar con 'mis palabras' más adelante.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira, yo
  lexicon: HALOT
  rationale: Fórmula de solemnidad e inmediatez profética; 'he aquí' es la equivalencia española más estable.
- source_word: נֹתֵן
  english_pob_choice: I am making
  chosen_spanish: estoy haciendo
  alternatives_spanish:
  - estoy dando
  - voy a hacer
  lexicon: HALOT
  rationale: Aunque literalmente es 'dar', el sentido metafórico es causar que las palabras funcionen como fuego; 'estoy haciendo' transmite esa transformación.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - lo que digo
  lexicon: HALOT
  rationale: El plural del hebreo se preserva en español para mantener la correspondencia con el texto fuente.
- source_word: בְּפִיךָ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  - en tu habla
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del órgano del habla; el sufijo singular se refleja con 'tu'.
- source_word: לְאֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - como fuego
  - en fuego
  lexicon: HALOT
  rationale: 'Complemento predicativo de la metáfora: las palabras llegan a ser fuego.'
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: El sustantivo colectivo hebreo se expresa naturalmente como 'pueblo' en español bíblico y contemporáneo.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: leña
  alternatives_spanish:
  - madera
  - trozos de madera
  lexicon: HALOT
  rationale: En este contexto de fuego consumidor, 'leña' comunica mejor la imagen de material combustible que 'madera'.
- source_word: וַאֲכָלָתַם
  english_pob_choice: and it will consume them
  chosen_spanish: y los consumirá
  alternatives_spanish:
  - y los devorará
  - y los comerá
  lexicon: HALOT
  rationale: El verbo אכל significa 'comer/consumir'; en el contexto del fuego, 'consumirá' reproduce bien la metáfora y evita una traducción demasiado literal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la decisión doctrinal del proyecto de no ocultar el nombre propio divino bajo un título genérico; 'Yahvé' es la forma española estándar del transliterado.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Relación entre 'estoy haciendo' y el verbo hebreo נֹתֵן
  english_pob_reading: I am making my words in your mouth fire
  chosen_spanish_reading: estoy haciendo que mis palabras en tu boca sean fuego
  alternative_spanish_readings:
  - estoy dando mis palabras en tu boca como fuego
  - estoy poniendo mis palabras en tu boca como fuego
  rationale: 'La evidencia hebrea usa literalmente ''dar'', pero el efecto semántico es causal/metafórico: Dios provoca que las palabras actúen como fuego. ''Hacer que sean'' evita perder la tensión entre literalidad y sentido.'
  doctrine_reference: HALOT; POB lexical note on predicate metaphor
- issue: Identidad del 'tú' en בְּפִיךָ
  english_pob_reading: singular, referring to Jeremiah personally
  chosen_spanish_reading: tu boca
  alternative_spanish_readings:
  - su boca
  - vuestra boca
  rationale: El sufijo hebreo es singular masculino, y el POB inglés observó el cambio de plural a singular. Se conserva esa distinción en español, entendiendo el destinatario inmediato como Jeremías.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #5'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios. Se mantuvo la alta coincidencia con el inglés auditado y se preservaron las notas alternativas relevantes del POB donde el español también crea o conserva ambigüedad semántica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se conserva el plural 'mis palabras' para דְּבָרַי.
  - Se refleja el cambio de plural a singular en 'tu boca'.
  - '''Leña'' se eligió por su valor combustible en el contexto del fuego consumidor.'
  - Se evitó 'Señor' como sustituto de YHWH para no borrar el nombre divino.
