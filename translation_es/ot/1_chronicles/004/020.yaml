translation:
  language: es
  text: 'Los hijos de Shimon: Amnón y Riná, Ben-Hanán[a] y Tilón. Y los hijos de Ishi: Zohet y Ben-Zohet[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hijo de Hanán». Aquí se conserva «Ben-Hanán» como nombre compuesto, conforme al contexto genealógico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el hijo de Zohet». Aquí se conserva «Ben-Zohet» como nombre compuesto, conforme al contexto genealógico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of / And the sons of
  chosen_spanish: Los hijos de / Y los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Y los descendientes de
  lexicon: HALOT
  rationale: La construcción genealógica בְּנֵי se vierte de manera directa como 'hijos de'. En español, mantener 'hijos' conserva la fórmula genealógica sin ampliar indebidamente a 'descendientes', que sería posible pero menos estricta al hebreo del verso.
- source_word: שִׁימוֹן
  english_pob_choice: Shimon
  chosen_spanish: Shimon
  alternatives_spanish:
  - Simeón
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo como 'Shimon' para reflejar la forma original, siguiendo la política del proyecto; 'Simeón' es tradicional, pero oculta la forma hebrea específica aquí.
- source_word: אַמְנוֹן
  english_pob_choice: Amnon
  chosen_spanish: Amnón
  alternatives_spanish:
  - Amnon
  lexicon: HALOT
  rationale: 'Nombre propio transliterado de forma natural al español con acento gráfico para lectura estándar: Amnón.'
- source_word: וְרִנָּה
  english_pob_choice: and Rinnah
  chosen_spanish: Riná
  alternatives_spanish:
  - y Riná
  lexicon: HALOT
  rationale: El nombre propio se translitera como Riná; en español el contexto ya está marcado por la lista, así que la conjunción puede omitirse ante el nombre siguiente sin perder la relación enumerativa.
- source_word: בֶּן חָנָן
  english_pob_choice: Ben-Hanan
  chosen_spanish: Ben-Hanán
  alternatives_spanish:
  - hijo de Hanan
  - Benhanán
  lexicon: HALOT
  rationale: La lectura como nombre compuesto se preserva con 'Ben-Hanán', tal como el inglés POB entiende el sintagma en la lista genealógica. 'Hijo de Hanan' introduciría una relación filial más explícita de la que el contexto favorece.
- source_word: וְתוֹלוֹן
  english_pob_choice: and Tilon
  chosen_spanish: Tilón
  alternatives_spanish:
  - Tilon
  - y Tilón
  lexicon: HALOT
  rationale: Se translitera el nombre como Tilón para una adaptación española clara. La conjunción del hebreo se integra en la puntuación de la lista en español.
- source_word: וּבְנֵי יִשְׁעִי
  english_pob_choice: And the sons of Ishi
  chosen_spanish: Y los hijos de Ishi
  alternatives_spanish:
  - Y los descendientes de Ishi
  lexicon: HALOT
  rationale: Se conserva la misma fórmula genealógica que al inicio del verso. 'Hijos' mantiene la repetición deliberada del hebreo y el paralelismo del listado.
- source_word: זוֹחֵת
  english_pob_choice: Zoheth
  chosen_spanish: Zohet
  alternatives_spanish:
  - Zoheth
  lexicon: HALOT
  rationale: Nombre propio transliterado; en español se simplifica la grafía final a Zohet para lectura fluida, sin alterar el referente.
- source_word: וּבֶן זוֹחֵת
  english_pob_choice: and Ben-Zoheth
  chosen_spanish: Ben-Zohet
  alternatives_spanish:
  - y Ben-Zohet
  - hijo de Zohet
  lexicon: HALOT
  rationale: Se mantiene la decisión del POB inglés de leer la expresión como nombre compuesto y no como cláusula filial. La forma española Ben-Zohet preserva ese valor onomástico.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto fuente y con la auditoría inglesa: se mantiene la lectura genealógica de los compuestos Ben-Hanán y Ben-Zohet, sin cambios textuales necesarios.'
  spanish_consistency_notes:
  - Se usa 'hijos de' para la fórmula genealógica recurrente.
  - 'Se transliteran los nombres propios de manera uniforme: Shimon, Amnón, Riná, Ben-Hanán, Tilón, Ishi, Zohet, Ben-Zohet.'
  - Se conservan las ambigüedades genealógicas señaladas por el POB inglés mediante notas alternativas.
