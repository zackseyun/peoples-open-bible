translation:
  language: es
  text: 'Y los filisteos se reunieron para combatir contra Israel: treinta mil carros[a], seis mil jinetes, y tropas tan numerosas como la arena que está a la orilla del mar. Subieron y acamparon en Micmas, al oriente de Bet-aven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “treinta mil carros”. Algunos intérpretes y testigos antiguos han sugerido un número menor, por ejemplo “tres mil”, porque treinta mil parece inusualmente grande en este contexto; sin embargo, el texto principal sigue el hebreo masorético.'
    reason: textual_variant
lexical_decisions:
- source_word: וּפְלִשְׁתִּים / the Philistines
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo bíblico estándar en español, en minúscula por tratarse de un gentilicio común en el flujo narrativo.
- source_word: נֶאֶסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - fueron reunidos
  lexicon: HALOT
  rationale: El niphal de אסף expresa reunión/mustración para guerra. 'Se reunieron' comunica el hecho con naturalidad y conserva el carácter colectivo sin añadir pasividad innecesaria.
- source_word: לְהִלָּחֵם עִם
  english_pob_choice: to fight against
  chosen_spanish: para combatir contra
  alternatives_spanish:
  - para pelear contra
  - para hacer guerra contra
  lexicon: HALOT
  rationale: '''Combatir contra'' reproduce bien el valor hostil del infinitivo con עִם. ''Combatir'' evita una formulación demasiado coloquial y mantiene el registro militar.'
- source_word: שְׁלֹשִׁים אֶלֶף רֶכֶב
  english_pob_choice: thirty thousand chariots
  chosen_spanish: treinta mil carros
  alternatives_spanish:
  - treinta mil carros de guerra
  - treinta mil carrozas
  lexicon: HALOT
  rationale: רֶכֶב se rinde aquí como 'carros' en español bíblico; 'carros de guerra' sería aclaratorio pero más interpretativo. Se conserva el número del texto hebreo recibido, con nota sobre la variante textual.
- source_word: שֵׁשֶׁת אֲלָפִים פָּרָשִׁים
  english_pob_choice: six thousand horsemen
  chosen_spanish: seis mil jinetes
  alternatives_spanish:
  - seis mil hombres a caballo
  - seis mil caballeros
  lexicon: HALOT
  rationale: פָּרָשִׁים denota tropas montadas. 'Jinetes' es preciso y natural en español; evita ambigüedad social de 'caballeros'.
- source_word: וְעָם
  english_pob_choice: and troops
  chosen_spanish: y gente
  alternatives_spanish:
  - y tropas
  - y pueblo
  - y soldados
  lexicon: HALOT
  rationale: El sustantivo literal es 'pueblo/gente', pero en contexto militar señala una masa combatiente. Se conserva la amplitud semántica con 'gente', y la frase siguiente explicita la magnitud mediante el símil con la arena.
- source_word: כַּחוֹל אֲשֶׁר עַל שְׂפַת הַיָּם לָרֹב
  english_pob_choice: as numerous as the sand that is on the seashore
  chosen_spanish: como la arena que está a la orilla del mar, en multitud
  alternatives_spanish:
  - como la arena de la orilla del mar, en abundancia
  - como la arena a la orilla del mar, por su gran número
  lexicon: HALOT
  rationale: Se preserva el símil hebreo tradicional y su fuerza hiperbólica. 'En multitud' refleja לָרֹב sin sonar artificial en español; además evita convertir el símil en una simple repetición mecánica del número.
- source_word: וַיַּעֲלוּ
  english_pob_choice: They went up
  chosen_spanish: Subieron
  alternatives_spanish:
  - Fueron
  - Ascendieron
  lexicon: HALOT
  rationale: עלה conserva aquí el movimiento narrativo de 'subir'. En español, 'Subieron' mantiene la dirección y el ritmo breve de la secuencia militar.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - levantaron su campamento
  lexicon: HALOT
  rationale: חנה significa acampar/encampar. 'Acamparon' es claro y moderno; evita arcaísmos y conserva el sentido militar.
- source_word: בְמִכְמָשׂ
  english_pob_choice: at Mikmash
  chosen_spanish: en Micmas
  alternatives_spanish:
  - en Micmash
  lexicon: HALOT
  rationale: Se translitera el topónimo conforme al uso castellano bíblico habitual. 'En' es la preposición más natural para un lugar de campamento.
- source_word: קִדְמַת בֵּית אָוֶן
  english_pob_choice: east of Beth-aven
  chosen_spanish: al oriente de Bet-aven
  alternatives_spanish:
  - al este de Bet-aven
  - frente a Bet-aven
  lexicon: HALOT
  rationale: קִדְמַת indica una posición hacia el este / enfrente según contexto. Aquí la referencia espacial se vierte como 'al oriente de', forma bíblica clara y fiel, sin perder la orientación geográfica.
theological_decisions:
- issue: Uso del nombre divino en este versículo
  english_pob_reading: No appears in the verse; the verse is a military narrative without divine-name terminology.
  chosen_spanish_reading: No se introduce ningún término divino en el texto español.
  alternative_spanish_readings:
  - No aplica
  rationale: El versículo no contiene יהוה, אֱלֹהים ni κύριος; por tanto no hay decisión teológica directa sobre el nombre divino aquí.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético, en línea con la lectura inglesa auditada, y conserva la nota textual sobre la cifra de carros sin intentar resolverla en el cuerpo del versículo. No se registran revisiones previas en este pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se usa 'Micmas' y 'Bet-aven' con grafía castellana estable y consistente con topónimos bíblicos habituales.
  - Se reserva 'carros' para רֶכֶב y 'jinetes' para פָּרָשִׁים, evitando mezclar categorías militares.
  - La puntuación con dos puntos reproduce bien la enumeración hebrea y la estructura del registro militar.
