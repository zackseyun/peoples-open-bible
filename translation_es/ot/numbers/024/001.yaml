translation:
  language: es
  text: Cuando Balaam vio que le parecía bien a Yahvé bendecir a Israel[a], no fue, como en otras ocasiones, a buscar presagios, sino que volvió su rostro hacia el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a buscar adivinaciones» o «a encontrarse con augurios». La expresión hebrea alude a la práctica anterior de Balaam de buscar señales divinatorias.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - advirtió
  lexicon: HALOT
  rationale: El hebreo ראה conserva aquí el valor básico de ver; en español, «vio» reproduce de manera natural la apertura narrativa y no fuerza una paráfrasis psicológica.
- source_word: כִּי טוֹב בְּעֵינֵי יְהוָה
  english_pob_choice: that it was good in the eyes of Yahweh
  chosen_spanish: que era bueno ante los ojos de Yahvé
  alternatives_spanish:
  - que agradaba a Yahvé
  - que era aceptable a Yahvé
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática «ante los ojos de» para no perder la metáfora hebrea de valoración; «bueno» conserva el adjetivo del מקור y evita suavizarlo en exceso con «agradable».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio doctrinal del proyecto, el Tetragrámaton se translitera como «Yahvé» y no se sustituye por un título genérico.
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: bendecir
  alternatives_spanish:
  - bendecir a
  - dar bendición a
  lexicon: HALOT
  rationale: El infinitivo de ברך aquí expresa la acción de bendecir a Israel; en español, «bendecir» es directo y fiel sin requerir expansión.
- source_word: וְלֹא הָלַךְ
  english_pob_choice: he did not go
  chosen_spanish: no fue
  alternatives_spanish:
  - no salió
  - no se fue
  lexicon: HALOT
  rationale: «Ir»/«fue» conserva el movimiento narrativo del hebreo y suena natural en español; el contexto inmediato ya aclara que no emprendió la acción habitual.
- source_word: כְּפַעַם בְּפַעַם
  english_pob_choice: as at other times
  chosen_spanish: como en otras ocasiones
  alternatives_spanish:
  - como otras veces
  - como en tiempos anteriores
  lexicon: HALOT
  rationale: La expresión idiomática se vierte con una locución natural que mantiene la idea de repetición habitual sin volverse literalista.
- source_word: לִקְרַאת נְחָשִׁים
  english_pob_choice: to seek omens
  chosen_spanish: a buscar presagios
  alternatives_spanish:
  - a encontrar presagios
  - a buscar señales divinatorias
  lexicon: HALOT
  rationale: נְחָשִׁים alude aquí a prácticas adivinatorias; «presagios» comunica esa función en español. Se evita «serpientes» por ser un falso literalismo semántico.
- source_word: וַיָּשֶׁת ... פָּנָיו
  english_pob_choice: set his face
  chosen_spanish: puso su rostro
  alternatives_spanish:
  - dirigió su rostro
  - volvió su rostro
  lexicon: HALOT
  rationale: Se conserva el hebraísmo con un equivalente comprensible en español. «Puso su rostro» retiene la fuerza idiomática de una orientación deliberada.
- source_word: אֶל הַמִּדְבָּר
  english_pob_choice: toward the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - hacia el desierto estéril
  - al desierto
  lexicon: HALOT
  rationale: «מִדְבָּר» puede ser «desierto» o «desierto/estepa» según contexto; aquí «hacia el desierto» es claro y idiomático en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión del proyecto de transliterar el nombre divino en lugar de ocultarlo tras una sustitución reverencial; «Yahvé» mantiene la referencia explícita al nombre propio de Dios en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés. No introduce cambios de sentido respecto del consenso de revisión más reciente; conserva la imagen idiomática de «ante los ojos de Yahvé», el valor adivinatorio de נְחָשִׁים mediante una equivalencia natural, y la orientación deliberada expresada por «puso su rostro».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se eligió «bendecir» en lugar de una perífrasis para reflejar con precisión לְבָרֵךְ.
  - Se evitó el calco «ir tras augurios» porque en español resultaría poco natural; «buscar presagios» conserva el sentido.
  - «Puso su rostro» conserva el hebraísmo del original sin volverlo opaco.
