translation:
  language: es
  text: Y levantarás el atrio alrededor, y pondrás la cortina[a] para la puerta del atrio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “colgadura” para מָסַךְ, refiriéndose al paño colgado en la entrada del atrio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  english_pob_choice: And you shall set up
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y dispondrás
  lexicon: HALOT
  rationale: El hebreo שׂים es amplio (“poner, colocar, establecer”). En este contexto de instrucción para la tienda, “pondrás” comunica de modo natural la acción de instalar el atrio sin perder el sentido básico de colocación.
- source_word: הֶחָצֵר
  english_pob_choice: the courtyard
  chosen_spanish: el atrio
  alternatives_spanish:
  - el patio
  - el recinto
  lexicon: HALOT
  rationale: Para el tabernáculo, חָצֵר designa el espacio cercado alrededor del santuario. “Atrio” es el término tradicional y preciso en español bíblico para ese recinto cultual.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: El adverbio expresa encierro o circunvalación completa. “Alrededor” reproduce bien esa idea de manera natural en español.
- source_word: וְנָתַתָּ
  english_pob_choice: and put up
  chosen_spanish: y pondrás
  alternatives_spanish:
  - y colocarás
  - y alzarás
  lexicon: HALOT
  rationale: Aunque el inglés POB usa “put up” por el contexto de una instalación, el hebreo נתן aquí sigue siendo el verbo general de “poner”. En español, “pondrás” mantiene la correspondencia básica sin forzar un matiz arquitectónico no explícito en el hebreo.
- source_word: מָסַךְ
  english_pob_choice: the screen
  chosen_spanish: la cortina
  alternatives_spanish:
  - el velo
  - la pantalla
  lexicon: HALOT
  rationale: En contextos del tabernáculo, מָסָךְ puede referirse a una cubierta o colgadura de entrada. Aunque el inglés distingue “screen” con nota de alternativa “curtain”, en español “cortina” comunica mejor una colgadura de acceso y evita la falsa asociación de “pantalla”; se mantiene la referencia técnica por el contexto cultual.
- source_word: שַׁעַר
  english_pob_choice: the gate
  chosen_spanish: la entrada
  alternatives_spanish:
  - la puerta
  - la puerta de acceso
  lexicon: HALOT
  rationale: En este verso no se trata de una puerta rígida sino del acceso al atrio. “Entrada” preserva la función del término sin imponer una imagen demasiado arquitectónica para el elemento de tela.
- source_word: הֶחָצֵר
  english_pob_choice: of the courtyard
  chosen_spanish: del atrio
  alternatives_spanish:
  - del patio
  - del recinto
  lexicon: HALOT
  rationale: La cadena constructa identifica la entrada perteneciente al atrio. En español, repetir “atrio” mantiene la cohesión terminológica y la referencia cultual del pasaje.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el testimonio final concuerda plenamente con el texto fuente y su lectura léxica. No se requieren ajustes textuales adicionales en español.
  spanish_consistency_notes:
  - Se mantuvo “atrio” como término cultual coherente para הֶחָצֵר en toda la cláusula.
  - Se optó por “cortina” en el texto principal para מָסַךְ, con nota de alternativa, porque en español resulta más transparente para una colgadura de entrada.
  - Se conservó el paralelismo verbal de dos imperativos futuros (“pondrás... y pondrás...”) para reflejar la secuencia de acciones del hebreo.
