translation:
  language: es
  text: Teman ustedes mismos a causa de la espada, porque la ira trae los castigos de la espada, para que sepan que hay juicio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que el Todopoderoso existe»; la expresión hebrea final es difícil y también se ha entendido como «que hay juicios» o «que hay un juez».
    reason: alternative_reading
lexical_decisions:
- source_word: גּוּרוּ
  english_pob_choice: Be afraid
  chosen_spanish: Teman
  alternatives_spanish:
  - Tengan miedo
  - Dread
  lexicon: HALOT
  rationale: El imperativo plural de גור aquí expresa advertencia y temor ante peligro. «Teman» es natural en español bíblico contemporáneo y conserva la fuerza exhortativa sin sonar mecánico.
- source_word: לָכֶם
  english_pob_choice: yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - para ustedes mismos
  - a ustedes mismos
  lexicon: HALOT
  rationale: El pronombre dativo añade énfasis al imperativo. «Ustedes mismos» transmite ese valor enfático/reflexivo con español claro y directo.
- source_word: מִפְּנֵי חֶרֶב
  english_pob_choice: of the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - ante la espada
  - a causa de la espada
  lexicon: HALOT
  rationale: La expresión idiomática con מִפְּנֵי comunica motivo o causa del temor. «Por la espada» funciona de modo natural en español y mantiene la concisión del hebreo.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - la furia
  - el furor
  lexicon: HALOT
  rationale: El término denota enojo ardiente con tono judicial. «Ira» preserva ese registro moral y evita una carga demasiado emocional.
- source_word: עֲוֺנוֹת
  english_pob_choice: punishments
  chosen_spanish: los castigos
  alternatives_spanish:
  - las iniquidades
  - los castigos por las iniquidades
  lexicon: HALOT
  rationale: Aunque el sustantivo suele significar «iniquidades», en este contexto con espada y juicio la POB inglesa lo toma como consecuencia retributiva. «Castigos» sigue esa lectura y produce sentido coherente en la cláusula.
- source_word: חָרֶב
  english_pob_choice: of the sword
  chosen_spanish: de la espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: Mantiene la asociación del castigo con la espada y conserva la tersura del hebreo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: HALOT
  rationale: Con valor final/purposivo, «para que» es la equivalencia más natural y precisa en español.
- source_word: תֵּדְעוּן
  english_pob_choice: you may know
  chosen_spanish: sepan
  alternatives_spanish:
  - lleguen a saber
  - conozcan
  lexicon: HALOT
  rationale: El imperfecto tras לְמַעַן expresa finalidad. «Sepan» conserva la referencia a conocimiento pleno y suena fluido en español.
- source_word: שדין
  english_pob_choice: that there is judgment
  chosen_spanish: que hay juicio
  alternatives_spanish:
  - que hay juicios
  - que existe un juez
  - que el Todopoderoso existe
  lexicon: HALOT
  rationale: La forma consonántica es difícil y admite varias lecturas. «Juicio» mantiene la tensión textual sin resolverla de manera excesiva, y encaja bien con el contexto de advertencia retributiva.
theological_decisions:
- issue: Lectura del final difícil שדין
  english_pob_reading: that there is judgment
  chosen_spanish_reading: que hay juicio
  alternative_spanish_readings:
  - que hay juicios
  - que existe un juez
  - que el Todopoderoso existe
  rationale: El hebreo final es problemático y ha sido entendido de varias maneras. La opción «juicio» preserva la idea inmediata de retribución divina sin imponer una identificación más específica del término, y deja visible la tensión documental.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje presenta alta concordancia con la evaluación de revisión más reciente, por lo que no se hicieron cambios de contenido más allá de la formulación española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino.
  - «Juicio» se eligió para conservar la ambigüedad documentada del hebreo final y no cerrar indebidamente la lectura.
  - Se prefirió «Teman» frente a «Tengan miedo» por su concisión y tono exhortativo sin perder naturalidad.
  - La nota al pie preserva las alternativas principales del expediente inglés para la forma final difícil.
