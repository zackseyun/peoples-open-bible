id: TOB.14.13
reference: Tobit 14:13
source:
  edition: lxx-swete-1909
  text: καὶ ἐγήρασεν ἐντίμως, καὶ ἔθαψεν τοὺς πενθεροὺς αὐτοῦ ἐνδόξως, καὶ ἐκληρονόμησεν τὴν οὐσίαν αὐτῶν καὶ Τωβεὶτ τοῦ πατρὸς αὐτοῦ.
  language: Greek
  pages: []
  confidence: high
translation:
  text: And he grew old honorably[a], and he buried his parents-in-law with honor, and he inherited their property and that of Tobit his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he buried his parents-in-law gloriously/splendidly'; here the sense is taken as an honorable burial rather than display.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγήρασεν
  chosen: grew old
  alternatives:
  - became old
  - aged
  lexicon: LSJ
  rationale: The aorist of γηράσκω denotes advancing into old age. 'Grew old' is natural modern English and preserves the verbal sense better than the more static 'was old.'
- source_word: ἐντίμως
  chosen: honorably
  alternatives:
  - with honor
  - worthily
  lexicon: LSJ
  rationale: The adverb conveys honorable or esteemed manner. 'Honorably' fits the first clause idiomatically in English while preserving the moral/social sense.
- source_word: ἔθαψεν
  chosen: buried
  alternatives:
  - laid to rest
  lexicon: LSJ
  rationale: The verb straightforwardly means 'buried.' A more euphemistic rendering would soften the plain sense unnecessarily.
- source_word: τοὺς πενθεροὺς αὐτοῦ
  chosen: his parents-in-law
  alternatives:
  - his in-laws
  - his wife's parents
  lexicon: LSJ
  rationale: The plural of πενθερός refers to parents-in-law. 'Parents-in-law' is the clearest natural English equivalent and avoids the vaguer 'in-laws.'
- source_word: ἐνδόξως
  chosen: with honor
  alternatives:
  - gloriously
  - honorably
  lexicon: LSJ
  rationale: The adverb can mean gloriously or splendidly, but in a burial context it most naturally indicates an honorable burial. To avoid awkward repetition with the earlier ἐντίμως rendered 'honorably,' this clause uses 'with honor' while preserving the same semantic field.
- source_word: ἐκληρονόμησεν
  chosen: inherited
  alternatives:
  - received as an inheritance
  - came into possession of
  lexicon: LSJ
  rationale: The verb specifically denotes receiving by inheritance. 'Inherited' is concise and accurate.
- source_word: τὴν οὐσίαν αὐτῶν
  chosen: their property
  alternatives:
  - their estate
  - their possessions
  lexicon: LSJ
  rationale: οὐσία here refers to property or estate. 'Property' is broad and clear; 'estate' is possible but can sound more technical or legalistic in English.
- source_word: καὶ Τωβεὶτ τοῦ πατρὸς αὐτοῦ
  chosen: and that of Tobit his father
  alternatives:
  - and the property of Tobit his father
  - and Tobit his father's estate
  lexicon: LSJ
  rationale: The Greek appends a second inherited estate, that of Tobit his father. English idiom allows ellipsis with 'that of' to avoid repeating 'property' while keeping the sense explicit.
