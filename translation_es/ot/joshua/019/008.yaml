    issue: Uso de «aldeorrios»
    rationale: No es una forma estándar ni ampliamente inteligible en español neutral. El hebreo חֲצֵרִים en este contexto se puede traducir con claridad como «aldeas» o «poblados» sin perder el sentido.
  - severity: medium
    issue: Nota léxica innecesaria sobre «aldeorrios»
    rationale: La nota existe para defender una elección española deficiente. Al usar una opción estándar, la nota deja de ser necesaria. La nota que sí debe preservarse es la alternativa toponímica documentada en el POB inglés.
  - severity: medium
    issue: «según sus familias» debilita el matiz técnico de מִשְׁפְּחֹתָם
    rationale: En listas tribales y de heredad, «clanes» comunica mejor las subdivisiones internas de la tribu que «familias», y coincide con la decisión auditada en inglés.
