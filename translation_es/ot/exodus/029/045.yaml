translation:
  language: es
  text: Y habitaré en medio de los hijos de Israel[a][b], y seré su Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel»; tradicionalmente, «los hijos de Israel».'
    reason: lexical_alternative
  - marker: c
    text: O «seré Dios para ellos».
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁכַנְתִּי
  english_pob_choice: And I will dwell
  chosen_spanish: Y habitaré
  alternatives_spanish:
  - Y moraré
  - Y residiré
  lexicon: HALOT
  rationale: שׁכן expresa habitar, asentarse o permanecer en un lugar. «Habitaré» comunica con naturalidad en español la presencia estable de Yahvé entre su pueblo y conserva el peso teológico del término sin introducir una metáfora ajena como «tabernacularé».
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: HALOT
  rationale: Con un grupo de personas, בְּתוֹךְ señala ubicación interna o central dentro del pueblo. «En medio de» reproduce bien esa idea y evita la ambigüedad de un simple «entre», que puede sonar demasiado distributivo o relacional.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Israel». En español, «hijos de Israel» es la forma más directa y bíblica, mientras que «los israelitas» suaviza el giro familiar y «el pueblo de Israel» interpreta en vez de reflejar la expresión del texto.
- source_word: וְהָיִיתִי
  english_pob_choice: and I will be
  chosen_spanish: y seré
  alternatives_spanish:
  - y estaré
  - y llegaré a ser
  lexicon: HALOT
  rationale: היה aquí formula una relación de pacto, no un cambio de estado. «Seré» conserva la estructura simple y relacional del hebreo, sin cargar el verbo con un matiz de devenir que el contexto no exige.
- source_word: לָהֶם
  english_pob_choice: their / to them
  chosen_spanish: su
  alternatives_spanish:
  - para ellos
  - de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «para ellos / a ellos», el español idiomático en la fórmula de pacto es «seré su Dios». Esta forma mantiene la relación de pertenencia y alianza que el texto expresa.
- source_word: לֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  lexicon: HALOT
  rationale: En esta fórmula de alianza con Israel, אֱלֹהִים se refiere inequívocamente al Dios verdadero. «Dios» es la única opción fiel y adecuada aquí; «un dios» falsearía el sentido del pasaje.
theological_decisions:
- issue: 'Fórmula de pacto: «I will be their God»'
  english_pob_reading: I will be their God
  chosen_spanish_reading: seré su Dios
  alternative_spanish_readings:
  - seré Dios para ellos
  rationale: La construcción hebrea וְהָיִיתִי לָהֶם לֵאלֹהִים es una fórmula clásica de alianza. En español, «seré su Dios» es natural, fiel y conserva la fuerza relacional sin perder el matiz de pertenencia pactal.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Ubicación divina entre el pueblo
  english_pob_reading: dwell among the sons of Israel
  chosen_spanish_reading: habitaré en medio de los hijos de Israel
  alternative_spanish_readings:
  - habitaré entre los hijos de Israel
  rationale: «En medio de» mantiene el valor espacial del hebreo בְּתוֹךְ y hace visible la idea de presencia divina dentro del pueblo. «Entre» puede funcionar, pero es menos preciso para la centralidad interna sugerida por el texto.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Expresión masculina del grupo
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los niños de Israel
  - los israelitas
  rationale: El hebreo usa בן/בְּנֵי, una expresión masculina y genealógica. Se conserva en español para no neutralizar la forma del original ni diluir el eco del lenguaje de pacto del Pentateuco.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincido con el último pase auditado en que no se requieren cambios sustantivos: la traducción mantiene el valor covenantal de שׁכן / היה y la fórmula relacional de לֵאלֹהִים. Para el español, se ajustó la preposición a una construcción natural («en medio de») y se mantuvo la expresión bíblica «hijos de Israel» para reflejar con mayor fidelidad el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en minúscula cuando funciona como nombre común dentro de la fórmula de pacto, siguiendo el uso español bíblico estándar.
  - «Habitaré» se eligió por su claridad y por su capacidad de conservar la resonancia teológica de presencia estable sin introducir tecnicismos.
  - No se usó «SEÑOR» porque el versículo no contiene el Tetragrámaton; el sujeto implícito es Yahvé por el contexto inmediato del discurso divino.
  - 'Las notas a y b reflejan dos tensiones distintas: una alternativa espacial en בְּתוֹךְ y la literalidad de בְּנֵי יִשְׂרָאֵל.'
