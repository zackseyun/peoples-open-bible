  lexicon: BDAG
  rationale: 바울이 고린도 회중의 서신 질문을 차례로 다루는 도입 정형구. 「~에 관하여는」(Περὶ δέ).
- source_word: καλὸν … γυναικὸς μὴ ἅπτεσθαι
