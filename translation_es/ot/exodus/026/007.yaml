translation:
  language: es
  text: Harás cortinas de pelo de cabra para una tienda sobre el tabernáculo[a]; las harás en once cortinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, "cortinas de cabras". El hebreo usa "cabras" para denotar el material procedente de cabras, es decir, pelo de cabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás tú
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal de instrucción directa en secuencia cultual. En español, el futuro simple transmite bien el mandato prescriptivo sin añadir un giro más pesado como "y harás".
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - lonas
  - paños
  - paneles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, la palabra designa grandes paños o cortinajes. "Cortinas" es natural en español y conserva el valor de piezas textiles extendidas.
- source_word: עִזִּים
  english_pob_choice: goats’ hair
  chosen_spanish: pelo de cabras
  alternatives_spanish:
  - cabras
  - lana de cabras
  - pelo caprino
  lexicon: HALOT
  rationale: El hebreo dice literalmente "cabras", pero el contexto muestra material procedente de cabras, es decir, pelo o fibra de cabra. "Pelo de cabras" conserva la nota material sin volver técnica la frase.
- source_word: לְאֹהֶל
  english_pob_choice: for a tent
  chosen_spanish: para una tienda
  alternatives_spanish:
  - para una carpa
  - como tienda
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una estructura de cobertura. En español, "tienda" comunica el valor funcional de cubierta/estructura portátil con mayor naturalidad que una repetición literal de "tienda de campaña".
- source_word: עַל הַמִּשְׁכָּן
  english_pob_choice: over the tabernacle
  chosen_spanish: sobre el tabernáculo
  alternatives_spanish:
  - encima del tabernáculo
  - sobre la morada
  lexicon: HALOT
  rationale: '"Tabernáculo" preserva el sentido técnico de מִשְׁכָּן en Éxodo. "Sobre" refleja la relación espacial de cobertura indicada por עַל.'
- source_word: עַשְׁתֵּי עֶשְׂרֵה
  english_pob_choice: eleven
  chosen_spanish: once
  alternatives_spanish:
  - once en total
  lexicon: HALOT
  rationale: El numeral compuesto equivale claramente a "once"; el español idiomático prefiere la forma simple.
- source_word: יְרִיעֹת תַּעֲשֶׂה אֹתָם
  english_pob_choice: you shall make them as eleven curtains
  chosen_spanish: harás once cortinas
  alternatives_spanish:
  - harás de ellas once cortinas
  - harás once cortinas de ellas
  lexicon: HALOT
  rationale: 'El hebreo repite "cortinas" tras el numeral. En español, la repetición se puede integrar de forma natural como un enunciado conclusivo: "harás once cortinas", manteniendo la especificación numérica sin sobrecargar la sintaxis.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el registro cultual del POB inglés, manteniendo la decisión auditada de interpretar עִזִּים como material de cabra. Se optó por "tienda" en lugar de una formulación más técnica o más dependiente del inglés, y por una sintaxis española fluida que conserva el mandato y la enumeración.
  spanish_consistency_notes:
  - Se usa "tabernáculo" para מִשְׁכָּן en coherencia con el registro cultual del pasaje.
  - Se evita "SEÑOR" y no aparecen nombres divinos en este versículo.
  - '"Pelo de cabras" mantiene la tensión entre literalidad y sentido material documentada en la nota inglesa.'
  - La repetición numérica se resuelve de manera idiomática sin perder el dato de "once".
