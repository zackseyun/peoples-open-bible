translation:
  text: And you will find me in greatness; and do not look at me going out among those
    who are honored, and in the least places look for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲙⲙⲛⲧⲣⲙⲁⲟ is literally ‘greatness’; some take this semantic field to include
      social ‘exaltation’ and, contextually, ‘riches.’
    reason: lexical_alternative
  - marker: b
    text: The cluster ⲉⲉⲓⲛⲏⲩ ⲉⲃⲟⲗ is read here as ‘going out/coming forth’; if instead
      it encodes a different verb, the clause may need re-interpretation.
    reason: alignment_note
  - marker: c
    text: Traditional English presentations often read this segment as ‘Heed my poverty
      and my wealth’; our Coptic excerpt, as mapped, points to ‘great … least’ rather
      than explicit ‘poverty/wealth.’
    reason: alternative_reading
  - marker: d
    text: Or 'in greatness'.
    reason: previous_rendering
  - marker: e
    text: Or 'among the great'.
    reason: previous_rendering
  - marker: f
    text: Or 'but among the least—in the place of silence.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲉⲧⲛⲁϭⲓⲛⲉ
  chosen: you (pl.) will find
  alternatives:
  - you will seek
  - you will discern
  lexicon: Crum; Layton
  rationale: ϭⲓⲛⲉ commonly bears the sense “find/discover.” With ⲧⲉⲧⲛⲁ- future 2pl.,
    the straightforward reading is “you will find.”
- source_word: ⲙⲙⲟⲉⲓ
  chosen: me (direct object)
  alternatives: []
  lexicon: Layton pronoun charts
  rationale: ⲙⲙⲟ- + 1sg enclitic ⲓ yields the object “me.”
- source_word: ϩⲛ
  chosen: in
  alternatives:
  - within
  - among
  lexicon: Crum
  rationale: Preposition ϩⲛ usually “in/within”; in distributive contexts can be “among.”
    Here it governs abstract/collective nouns and groups.
- source_word: ⲙⲙⲛⲧⲣⲙⲁⲟ
  chosen: greatness
  alternatives:
  - exaltation
  - highness
  - riches
  lexicon: Crum (ⲣⲙⲁⲟ = great)
  rationale: ⲙⲙⲛⲧ- nominalizes ⲣⲙⲁⲟ (“great”). Hence “greatness” fits; “riches” is
    possible thematically but less precise lexically.
- source_word: ⲟⲩⲇⲉ ⲙⲡⲣⲛⲁⲩ ⲉⲣⲟⲉⲓ
  chosen: and do not look at me
  alternatives:
  - nor should you behold me
  - and do not see me
  lexicon: Crum; Layton
  rationale: 'ⲟⲩⲇⲉ + prohibitive ⲙⲡⲣ- + ⲛⲁⲩ (“see, look”) + ⲉⲣⲟⲓ (“at me”) gives a
    prohibition: “and do not look at me.”'
- source_word: ⲉⲉⲓⲛⲏⲩ ⲉⲃⲟⲗ
  chosen: going out
  alternatives:
  - coming forth
  - emerging
  lexicon: Crum
  rationale: ⲉⲃⲟⲗ (out); the verbal form likely conveys motion outward. “Going out/coming
    forth” keeps the imagery without over-commitment to aspect.
- source_word: ⲛⲉⲧⲧⲁⲉⲓⲏⲩ (segmentation uncertain)
  chosen: among the great
  alternatives:
  - among the eminent
  - among the exalted
  lexicon: Contextual; ⲧⲁ- (great?) + plural marker
  rationale: OCR and segmentation are uncertain. Parallelism with ⲛⲉⲗⲁⲭⲓⲥⲧⲟⲥ (“the
    least”) suggests a contrasting “the great.” Chosen as cautious, sense-driven rendering.
- source_word: ⲛⲉⲗⲁⲭⲓⲥⲧⲟⲥ
  chosen: the least (ones)
  alternatives:
  - the smallest
  - the lowliest
  lexicon: Greek loan (elachistos)
  rationale: Direct Greek loan; plural article ⲛⲉ- indicates “the least (ones).”
- source_word: ⲧⲟⲡⲟⲥ ⲛ̄ⲧⲉ ⲧⲏⲥ ⲱⲕ
  chosen: the place of silence
  alternatives:
  - the place of quiet
  - the place of stillness
  lexicon: Greek loan (topos); Crum (ⲱⲕ ≈ silence)
  rationale: ⲧⲟⲡⲟⲥ is ‘place’; ⲱⲕ attested as ‘silence/quiet.’ Genitival ⲛ̄ⲧⲉ = ‘of.’
- source_word: ⲉⲛⲥⲱⲉⲓ
  chosen: '[I] dwell'
  alternatives:
  - I rest
  - I am
  lexicon: Crum (uncertain form)
  rationale: Form and segmentation are unclear; many Thunder lines locate the speaker.
    Rendering “I dwell” keeps location imagery while acknowledging uncertainty.
parallelism_check: The antithesis “great … the least” is preserved, with the speaker
  located in both realms. The added locale “place of silence” balances the motion
  clause (“going out”) with a still point, preserving the poem’s paradox of movement
  and repose.
voice_check: The line maintains the direct, authoritative first-person presence (“me”)
  addressing a plural audience with prohibition (“do not look”), consistent with Thunder’s
  commanding voice and self-revelatory tone.
alignment_risk_note: Alignment confidence is only medium, and several tokens (esp.
  ⲉⲉⲓⲛⲏⲩ, ⲛⲉⲧⲧⲁⲉⲓⲏⲩ?, ⲉⲛⲥⲱⲉⲓ) are susceptible to OCR/segmentation error. The consult
  summary (“Heed my poverty and my wealth”) does not directly match this excerpt,
  which reads more like “find me in greatness … and among the least.” I thus avoid
  forcing ‘poverty/wealth’ and render the contrast that the Coptic supports, while
  noting uncertainty.
