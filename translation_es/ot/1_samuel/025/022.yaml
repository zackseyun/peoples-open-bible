translation:
  language: es
  text: Que así haga Dios a los enemigos de David[b], y aun añada más, si para la mañana dejo siquiera a un solo varón[a] de entre todos los que le pertenecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el que orina contra la pared», un modismo crudo que significa «varón».'
    reason: lexical_alternative
  - marker: b
    text: Algunos intérpretes entienden «los enemigos de David» como un eufemismo de escriba por «David» (o «a mí»), pues la fórmula habitual del juramento es autorreferencial.
    reason: textual_variant
lexical_decisions:
- source_word: כֹּה ... וְכֹה יֹסִיף
  english_pob_choice: May God do so ... and more also
  chosen_spanish: Que así haga Dios ... y aun añada más
  alternatives_spanish:
  - Así haga Dios ... y así añada
  - Que Dios haga esto ... y aun más
  lexicon: HALOT
  rationale: Es una fórmula de juramento/maldición en hebreo. En español, «Que así haga Dios ... y aun añada más» conserva el giro imprecatorio y la repetición enfática sin sonar demasiado literal o forzado.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aunque el sustantivo es morfológicamente plural, aquí el verbo es singular y el referente es la deidad única; «Dios» es la forma natural y fiel en español.
- source_word: לְאֹיְבֵי דָוִד
  english_pob_choice: to David’s enemies
  chosen_spanish: a los enemigos de David
  alternatives_spanish:
  - a los enemigos de David
  - contra los enemigos de David
  lexicon: HALOT
  rationale: Se mantiene el wording masorético recibido, aun cuando el contexto sugiera una fórmula alterada o eufemística. En español, «a los enemigos de David» reproduce la relación posesiva de forma clara.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - ciertamente si
  - de veras si
  lexicon: HALOT
  rationale: En una fórmula de juramento, «si» conserva la estructura protásica del hebreo; la fuerza imprecatoria queda en la expresión completa del enunciado.
- source_word: אַשְׁאִיר
  english_pob_choice: I leave
  chosen_spanish: dejo con vida
  alternatives_spanish:
  - dejo
  - dejo quedar
  - dejo sobrevivir
  lexicon: HALOT
  rationale: El verbo hebreo significa dejar/permitir que quede. En este contexto, el sentido es dejar con vida, y eso aclara la implicación sin abandonar el valor original.
- source_word: מִכָּל אֲשֶׁר לוֹ
  english_pob_choice: of all who belong to him
  chosen_spanish: de todo lo que le pertenece
  alternatives_spanish:
  - de todos los que le pertenecen
  - de todo lo suyo
  lexicon: HALOT
  rationale: El hebreo posee un alcance posesivo general. El español «de todo lo que le pertenece» permite abarcar personas y pertenencias; el contexto inmediato restringe la referencia a varones.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: by morning
  chosen_spanish: para la mañana
  alternatives_spanish:
  - hasta la mañana
  - antes de la mañana
  lexicon: HALOT
  rationale: «Para la mañana» expresa bien el límite temporal previsto en español natural, equivalente a «by morning».
- source_word: מַשְׁתִּין בְּקִיר
  english_pob_choice: one male
  chosen_spanish: un solo varón
  alternatives_spanish:
  - un varón
  - uno que orina contra la pared
  lexicon: HALOT
  rationale: La frase hebrea es un modismo crudo que designa a un varón. En el texto principal se prefiere una equivalencia clara y publicable; la literalidad idiomática se conserva en nota por su valor lexical.
theological_decisions:
- issue: Wording masorético 'David’s enemies' within an oath formula
  english_pob_reading: Retain the MT as 'David’s enemies' in the main text
  chosen_spanish_reading: Retener «los enemigos de David» en el texto principal
  alternative_spanish_readings:
  - Emendar implícitamente a «David» o «a mí»
  - Interpretarlo como un eufemismo textual y no como el sujeto literal
  rationale: La traducción española sigue el texto hebreo recibido con transparencia, aunque la expresión resulte contextual y probablemente eufemística. La dificultad no se resuelve en silencio, sino que se documenta.
  doctrine_reference: Principios de transparencia textual y primacía del original en la traducción POB
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la presente propuesta mantiene la lectura del texto masorético y conserva la tensión textual documentada por el POB en inglés.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al contexto del juramento.
  - Se mantiene «David» en forma posesiva natural («de David») para evitar calcos innecesarios.
  - «Varón» se emplea como equivalente publicable de la referencia masculina del modismo, con la expresión cruda preservada en nota.
  - No se introduce «SEÑOR» ni «Cristo» porque no aparecen en el texto fuente.
  - La puntuación reproduce un tono solemne y formal, adecuado para un juramento imprecatorio.
