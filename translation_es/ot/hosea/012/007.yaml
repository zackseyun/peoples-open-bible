translation:
  language: es
  text: Así tú[a], por tu Dios, vuelve; guarda el amor fiel y la justicia, y espera[b] continuamente a tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a tu Dios». El hebreo tiene literalmente «por/con tu Dios vuelve», una construcción inusual que puede expresar medio, relación o dirección.'
    reason: lexical_alternative
  - marker: b
    text: «Espera» también puede verterse «espera con esperanza» o «aguarda expectante».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהֶיךָ
  english_pob_choice: by your God
  chosen_spanish: por tu Dios
  alternatives_spanish:
  - a tu Dios
  - con tu Dios
  lexicon: HALOT
  rationale: La preposición ב puede expresar medio, relación o esfera. «Por tu Dios» conserva el matiz no usual de la construcción y sugiere el fundamento o ámbito de la vuelta sin normalizarla demasiado. «A tu Dios» sería más natural, pero borra más la rareza del hebreo.
- source_word: תָשׁוּב
  english_pob_choice: return
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - vuélvete
  - arrepiéntete
  lexicon: HALOT
  rationale: שׁוּב tiene el sentido básico de volver/retornar. «Vuelve» es claro en español y mantiene la amplitud covenantal-restaurativa sin imponer «arrepiéntete», que estrecha el verbo más de lo que el hebreo exige.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor fiel
  alternatives_spanish:
  - misericordia
  - amor leal
  - bondad amorosa
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad de pacto, misericordia y amor fiel. «Amor fiel» comunica bien la dimensión relacional y covenantal en español contemporáneo sin reducirla a solo «misericordia».
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la rectitud
  - el derecho
  lexicon: HALOT
  rationale: En este mandato ético, מִשְׁפָּט se entiende mejor como justicia práctica y social. «La justicia» preserva ese peso; «el juicio» sonaría demasiado forense o como acto de juzgar.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - mantén
  - conserva
  lexicon: HALOT
  rationale: El imperativo pide custodiar o observar esas realidades. «Guarda» funciona naturalmente con objetos abstractos en español bíblico y no suena mecánico.
- source_word: וְקַוֵּה
  english_pob_choice: wait
  chosen_spanish: espera
  alternatives_spanish:
  - aguarda
  - pon tu esperanza
  - aguarda con esperanza
  lexicon: HALOT
  rationale: קוה incluye esperar con expectativa y esperanza. «Espera» conserva la postura de dependencia; el matiz de esperanza queda sostenido por el contexto y por el adverbio «continuamente».
- source_word: אֶל אֱלֹהֶיךָ
  english_pob_choice: for your God
  chosen_spanish: a tu Dios
  alternatives_spanish:
  - para tu Dios
  - hacia tu Dios
  - en tu Dios
  lexicon: HALOT
  rationale: Con קוה, el español natural pide «esperar a». Aunque el hebreo usa אֶל («a/hacia»), «a tu Dios» comunica la construcción verbal de forma idiomática y cercana al original.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  - sin cesar
  lexicon: HALOT
  rationale: תָּמִיד denota continuidad permanente. «Continuamente» suena natural en una exhortación y mantiene la idea de perseverancia continua.
theological_decisions:
- issue: Si traducir la llamada como arrepentimiento explícito
  english_pob_reading: return
  chosen_spanish_reading: vuelve
  alternative_spanish_readings:
  - arrepiéntete
  - vuélvete
  rationale: El verso exhorta a una vuelta pactal a Dios, pero el verbo hebreo es más amplio que el vocabulario técnico de arrepentimiento. «Vuelve» preserva esa tensión sin resolverla doctrinalmente de antemano.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica documentada en lugar de cerrarla prematuramente.'
translation_notes:
  revision_awareness: Sin cambios respecto al último repaso; se corrigió la anclaje de las notas al texto mediante los marcadores [a] y [b].
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según la norma del proyecto.
  - Se usa «amor fiel» para חֶסֶד, evitando «misericordia» como reducción del matiz pactal.
  - Se conserva «vuelve» en vez de un término más técnico como «arrepiéntete» para respetar el alcance del hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, sin notas sin anclaje.
