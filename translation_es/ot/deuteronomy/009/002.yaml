translation:
  language: es
  text: 'un pueblo grande y alto[a], los hijos de Anak, a quienes conoces y de quienes has oído: «¿Quién podrá mantenerse en pie delante de los hijos de Anak?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los anakitas». El hebreo dice literalmente «los hijos de Anak».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: En este contexto describe a un grupo humano identificado colectivamente; «pueblo» es natural en español bíblico y conserva la referencia a una colectividad.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - numeroso
  - importante
  lexicon: HALOT
  rationale: Aquí el adjetivo se aplica al tamaño/impacto del grupo. «Grande» mantiene la amplitud del hebreo sin forzar una lectura de prestigio.
- source_word: וָרָם
  english_pob_choice: tall
  chosen_spanish: alto
  alternatives_spanish:
  - elevado
  - encumbrado
  lexicon: HALOT
  rationale: En combinación con «grande», el sentido apunta a estatura física. «Alto» comunica ese rasgo de manera directa y natural.
- source_word: בְּנֵי עֲנָקִים / בְּנֵי עֲנָק
  english_pob_choice: the sons of Anak
  chosen_spanish: los hijos de Anak
  alternatives_spanish:
  - los anakitas
  - los descendientes de Anak
  lexicon: HALOT
  rationale: Se conserva la estructura literal hebrea «hijos de Anak», siguiendo el criterio de mantener el vínculo familiar/nominal y no aplanarlo de inmediato a un etnónimo.
- source_word: אֲשֶׁר אַתָּה יָדַעְתָּ
  english_pob_choice: whom you know
  chosen_spanish: de quienes tú sabes
  alternatives_spanish:
  - a quienes conoces
  - de los que tú sabes
  lexicon: HALOT
  rationale: El hebreo expresa conocimiento previo. En español, con un colectivo, «de quienes tú sabes» suena natural y mantiene la referencia al conocimiento ya poseído.
- source_word: וְאַתָּה שָׁמַעְתָּ
  english_pob_choice: and of whom you have heard
  chosen_spanish: y de quienes has oído
  alternatives_spanish:
  - y de quienes has escuchado
  - y a quienes has oído mencionar
  lexicon: HALOT
  rationale: «Oír» reproduce el valor del verbo hebreo sin añadir más contenido del necesario. El complemento «de quienes» enlaza con el objeto del reporte.
- source_word: מִי יִתְיַצֵּב לִפְנֵי
  english_pob_choice: Who can stand before
  chosen_spanish: ¿Quién se mantendrá en pie delante de
  alternatives_spanish:
  - ¿Quién podrá resistir delante de
  - ¿Quién podrá hacer frente a
  lexicon: HALOT
  rationale: La locución «mantenerse en pie delante de» conserva la imagen de resistencia/afrontamiento del hebreo y es idiomática en español bíblico sin volverse oscura.
theological_decisions:
- issue: Alcance de בְּנֵי עֲנָקִים / בְּנֵי עֲנָק como nombre de grupo frente a una traducción etnónima
  english_pob_reading: the sons of Anak; footnote notes that ‘the Anakites’ is a valid alternative
  chosen_spanish_reading: los hijos de Anak, con nota que admite ‘los anakitas’ como alternativa
  alternative_spanish_readings:
  - los anakitas
  - los descendientes de Anak
  rationale: La forma literal preserva la dependencia del nombre propio y coincide con el rastro de auditoría del POB en inglés. La nota ofrece el equivalente etnónimo para lectores que prefieran una designación de grupo.
  doctrine_reference: Ninguna; decisión lexical/antropológica
- issue: Fuerza retórica de la pregunta final
  english_pob_reading: Who can stand before the sons of Anak?
  chosen_spanish_reading: ¿Quién se mantendrá en pie delante de los hijos de Anak?
  alternative_spanish_readings:
  - ¿Quién podrá resistir delante de los hijos de Anak?
  - ¿Quién podrá hacer frente a los hijos de Anak?
  rationale: La pregunta es retórica y expresa la imposibilidad de resistir. «Se mantendrá en pie» conserva la imagen corporal del hebreo y la fuerza interrogativa del original.
  doctrine_reference: Ninguna; decisión retórica
- issue: Redacción de la cláusula de conocimiento y oído
  english_pob_reading: whom you know, and of whom you have heard
  chosen_spanish_reading: de quienes tú sabes y de quienes has oído
  alternative_spanish_readings:
  - a quienes conoces y de quienes has oído
  - de los que sabes y has oído
  rationale: Se mantiene la doble referencia a conocimiento previo y rumor/informe oído, sin reducirla a una sola idea. La formulación evita añadir un sujeto o referente no presente en el hebreo.
  doctrine_reference: Ninguna; decisión semántica
translation_notes:
  revision_awareness: 'Se revisó la traducción inglesa del POB y su nota léxica: se conservó la estructura literal de “the sons of Anak” y la pregunta retórica con ‘stand before’. No se introdujeron cambios doctrinales; solo se ajustó la sintaxis al español natural manteniendo el paralelismo del hebreo.'
  spanish_consistency_notes:
  - Se usa «pueblo» para עַם, coherente con una colectividad humana.
  - Se prefiere «grande» y «alto» para reflejar tamaño y estatura sin cargar el texto con explicaciones.
  - Se mantiene «hijos de Anak» en el cuerpo y se ofrece la alternativa etnónima en nota, como en el POB inglés.
  - Se conserva el tratamiento de segunda persona singular («tú / has oído / se mantendrá») para corresponder al hebreo.
  - La puntuación introduce comillas españolas y dos puntos para reproducir el discurso citado.
