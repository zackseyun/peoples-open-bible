review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: mujeres en duelo llenando las calles, vírgenes recluidas corriendo a puertas y muros, y otras mirando desde las ventanas. Sin embargo, dos elecciones no preservan con suficiente fidelidad el matiz léxico documentado: σάκκους no debe quedar como "saco", que en español sugiere bolsa y no vestidura de duelo; y διεκύπτον se debilita demasiado en "miraban", pues el griego describe asomarse o mirar hacia fuera desde dentro.'
  spanish_quality_summary: El español es fluido y legible, pero "con el saco ceñido bajo los pechos" suena poco natural y potencialmente equívoco. "Con cilicio ceñido debajo del pecho" o formulación equivalente comunica mejor la escena. También conviene mantener el paralelismo final con "algunas" para τινὲς δὲ, en vez de repetir "otras" como si fueran simplemente el tercer subgrupo coordinado del mismo tipo.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Sí hay una cuestión léxica importante de estilo bíblico: σάκκους corresponde mejor a "cilicio" que a "saco" en español eclesial amplio. "Vírgenes" está bien para παρθένων. "Encerradas" para κατάκλειστοι y "puertas" para πυλῶνας son adecuadas. Para τὰ τείχη, "murallas" suena más natural que "muros" en contexto urbano defensivo, aunque "muros" no es imposible.'
  issues:
  - severity: high
    issue: '"el saco" para σάκκους'
    rationale: El griego se refiere a tela/vestidura de duelo (sackcloth), no a una bolsa. En español bíblico y general, "saco" aquí resulta engañoso; "cilicio" preserva mejor el sentido cultural y lexical.
  - severity: medium
    issue: '"miraban" para διεκύπτον'
    rationale: La decisión inglesa documenta "were peering out". El verbo implica asomarse o mirar hacia fuera desde adentro; "miraban" pierde esa imagen espacial y el matiz de ansiedad.
  - severity: low
    issue: '"muros" para τὰ τείχη'
    rationale: Aunque posible, en una ciudad "murallas" comunica más naturalmente el referente defensivo de τείχη en español.
  - severity: low
    issue: Repetición de "otras" en la tercera cláusula
    rationale: El griego cambia a τινὲς δὲ ('algunas'), no simplemente αἱ δὲ otra vez. Reflejarlo mejora la precisión discursiva.
  - severity: low
    issue: Notas al pie actuales no priorizan la necesidad principal
    rationale: La nota sobre "ventanas" no es necesaria en español principal; en cambio, conviene una nota breve sobre "cilicio" o mantener la nota cultural del inglés sobre el modo de llevarlo.
  revised_spanish_text: Y las mujeres, con cilicio[a] ceñido debajo del pecho, llenaban las calles; y las vírgenes que estaban encerradas, unas corrían a las puertas, otras a las murallas, y algunas se asomaban por las ventanas.
  revised_footnotes:
  - marker: a
    text: Es decir, una vestidura áspera de luto o penitencia; el griego describe que la llevaban ceñida debajo del pecho.
    reason: cultural_note
  revision_rationale: Se ajusta σάκκους a "cilicio" para evitar un falso sentido en español, se fortalece διεκύπτον con "se asomaban", se mejora τὰ τείχη con "murallas", y se refleja mejor τινὲς con "algunas". La revisión mantiene el tono natural y digno del español bíblico sin apartarse del griego ni del rastro auditado en inglés.
