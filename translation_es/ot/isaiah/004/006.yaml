translation:
  language: es
  text: Y habrá un abrigo[a] para sombra de día, del calor[b], y para refugio y escondite, de la tormenta[c] y de la lluvia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cabaña» para «abrigo» (סֻכָּה), subrayando una estructura temporal cubierta.
    reason: lexical_alternative
  - marker: b
    text: O «calor abrasador» para «calor» (חֹרֶב).
    reason: lexical_alternative
  - marker: c
    text: O «torrente» o «aguacero» para «tormenta» (זֶרֶם).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסֻכָּה
  english_pob_choice: shelter
  chosen_spanish: cabaña
  alternatives_spanish:
  - refugio
  - shelter
  - tabernáculo
  lexicon: HALOT
  rationale: סֻכָּה designa una estructura temporal cubierta. En español, «cabaña» comunica bien la idea de una cobertura sencilla y temporal sin imponer un matiz litúrgico excesivo. Mantiene abierta la alternativa lexical de «cabaña»/«choza»/«refugio»; aquí «cabaña» conserva mejor la imagen concreta del resguardo.
- source_word: תִּהְיֶה
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - existirá
  lexicon: HALOT
  rationale: El verbo expresa futuro simple e impersonal. «Habrá» es la forma natural en español para una existencia futura de este tipo, equivalente al «there will be» inglés del POB.
- source_word: לְצֵל
  english_pob_choice: for shade
  chosen_spanish: para sombra
  alternatives_spanish:
  - para resguardo
  - para abrigo
  lexicon: HALOT
  rationale: צֵל es «sombra» en sentido físico y protector. «Para sombra» conserva esa imagen directa; no se reemplaza por un término más interpretativo porque el hebreo mismo usa la metáfora de sombra protectora.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: durante el día
  alternatives_spanish:
  - de día
  - en el día
  lexicon: HALOT
  rationale: El adverbio señala el periodo diurno. «Durante el día» suena natural en español y mantiene el marco temporal del original.
- source_word: מֵחֹרֶב
  english_pob_choice: from heat
  chosen_spanish: contra el calor
  alternatives_spanish:
  - del calor
  - contra el calor abrasador
  lexicon: HALOT
  rationale: חֹרֶב puede referirse al calor abrasador o al ardor seco. Dado el contexto de protección climática, «calor» es suficiente y claro; «contra el calor» expresa la función defensiva del lugar y deja abierta la posible fuerza de «calor abrasador» sin sobretraducir.
- source_word: מַחְסֶה
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - asilo
  lexicon: HALOT
  rationale: מַחְסֶה es un lugar de protección. «Refugio» conserva el valor de resguardo y distingue este término de סֻכָּה sin forzar una equivalencia plana.
- source_word: מִסְתּוֹר
  english_pob_choice: hiding place
  chosen_spanish: escondedero
  alternatives_spanish:
  - escondite
  - lugar oculto
  - hiding place
  lexicon: HALOT
  rationale: מִסְתּוֹר apunta a un lugar oculto o cubierto. «Escondedero» comunica con claridad la idea de un sitio resguardado y distinto de מַחְסֶה; aunque menos solemne que otras opciones, preserva la separación semántica que el hebreo presenta.
- source_word: זֶרֶם
  english_pob_choice: storm
  chosen_spanish: tormenta
  alternatives_spanish:
  - aguacero
  - torrente
  - correría de agua
  lexicon: HALOT
  rationale: זֶרֶם puede aludir a lluvia torrencial o a una violencia de agua/tormenta. En español, «tormenta» recoge esa fuerza meteorológica y funciona bien en pareja con «lluvia», manteniendo la distinción que el POB hace entre los dos términos.
- source_word: מָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  lexicon: HALOT
  rationale: מָטָר es el vocablo estándar para lluvia. «Lluvia» es la opción más directa y natural, especialmente tras «tormenta» para זֶרֶם.
theological_decisions:
- issue: Naturaleza de la protección prometida
  english_pob_reading: The verse describes a concrete shelter of protection from weather without specifying a later theological referent in the translation.
  chosen_spanish_reading: La traducción presenta una imagen concreta de resguardo contra el calor, la tormenta y la lluvia, sin identificar en el texto principal un referente teológico posterior.
  alternative_spanish_readings:
  - Interpretar explícitamente la cabaña como Sion o como la presencia divina
  - Hacer de la frase una alusión mesiánica explícita
  rationale: El hebreo poético ofrece una imagen funcional de protección. Para respetar la tensión interpretativa señalada por el POB, no se añade una identificación teológica que el verso no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: Base auditada en el texto hebreo masorético (WLC) y en la decisión inglesa POB de mantener una imagen concreta de resguardo; no hubo cambios posteriores en la revisión más reciente, y el cotejo externo reporta alta coincidencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB cuando no aparece en este versículo, sin introducir terminología sustitutiva.
  - 'Se evita homogeneizar todos los términos de protección: סֻכָּה = cabaña, מַחְסֶה = refugio, מִסְתּוֹר = escondedero.'
  - «Tormenta» y «lluvia» se distinguen para respetar la doblete hebrea זֶרֶם / מָטָר.
  - La puntuación y la coordinación reproducen el paralelismo del original sin volverlo prosa explicativa.
