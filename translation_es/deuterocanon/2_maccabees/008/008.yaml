revisions:
- from: Pero cuando Felipe vio que aquel hombre avanzaba poco a poco hacia el progreso y progresaba todavía más en éxitos[a], escribió a Tolomeo, el gobernador de Celesiria y Fenicia[b], para que acudiera en ayuda de la causa del rey.
