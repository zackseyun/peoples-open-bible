translation:
  language: es
  text: Pues ustedes están cruzando el Jordán para entrar a poseer[a] la tierra que Yahvé su Dios les está dando, y la poseerán y habitarán en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a tomar posesión de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación lógica con lo anterior; «porque» conserva el valor explicativo/causal del hebreo de manera natural en español.
- source_word: עֹבְרִים
  english_pob_choice: are crossing
  chosen_spanish: están cruzando
  alternatives_spanish:
  - cruzan
  - están por cruzar
  lexicon: HALOT
  rationale: El participio con segunda persona plural expresa acción en curso o inminente; «están cruzando» preserva ese matiz sin volverlo más interpretativo de lo necesario.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español; no hace falta añadir «río» porque el contexto lo implica.
- source_word: לָבֹא
  english_pob_choice: to go in
  chosen_spanish: para entrar
  alternatives_spanish:
  - para ir a
  - para llegar a
  lexicon: HALOT
  rationale: El infinitivo indica finalidad tras cruzar el Jordán; «para entrar» comunica el ingreso a la tierra con naturalidad y fidelidad.
- source_word: לָרֶשֶׁת
  english_pob_choice: to take possession of
  chosen_spanish: a poseer[a]
  alternatives_spanish:
  - a tomar posesión de
  - a heredar
  lexicon: HALOT
  rationale: En este contexto, ירשׁ refiere a recibir y ocupar la tierra como posesión. «Poseer» conserva la fuerza breve del POB inglés y la relación semántica con la posesión de la tierra; se marca la alternativa más explícita en nota.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio el referente es la tierra de promesa; «tierra» es la forma sobria y directa que mantiene el registro bíblico sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la política del proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  lexicon: HALOT
  rationale: La segunda persona plural posesiva se expresa de forma natural en español mediante el posesivo de cortesía o plural «su»; el referente queda claro por el contexto y por «ustedes».
- source_word: נֹתֵן לָכֶם
  english_pob_choice: is giving you
  chosen_spanish: les da
  alternatives_spanish:
  - les está dando
  - les está por dar
  lexicon: HALOT
  rationale: El participio hebreo indica acción presente o inminente; «les da» mantiene la fuerza declarativa y el carácter de don divino sin sonar pesado en español.
- source_word: וִירִשְׁתֶּם אֹתָהּ
  english_pob_choice: you will possess it
  chosen_spanish: la poseerán
  alternatives_spanish:
  - tomarán posesión de ella
  - la heredarán
  lexicon: HALOT
  rationale: Se mantiene consistencia con לָרֶשֶׁת mediante «poseer»; en español suena más directo que una perífrasis, y conserva la idea de adquisición plena de la tierra.
- source_word: וִישַׁבְתֶּם בָּהּ
  english_pob_choice: dwell in it
  chosen_spanish: habitarán en ella
  alternatives_spanish:
  - dormirán en ella
  - vivirán en ella
  lexicon: HALOT
  rationale: ישׁב suele expresar morar o habitar; «habitarán» preserva el registro formal y la continuidad de residencia que exige el contexto de asentamiento en la tierra.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Conforme a la política del proyecto, se vierte como «Yahvé» para conservar el nombre personal de Dios y no sustituirlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de ירשׁ aplicado a la tierra
  english_pob_reading: take possession of / possess
  chosen_spanish_reading: poseer / poseerán
  alternative_spanish_readings:
  - tomar posesión de
  - heredar
  - recibir en herencia
  rationale: Aquí el verbo no se limita a una herencia abstracta; en Deuteronomio implica entrar y hacerse dueño de la tierra prometida. «Poseer» mantiene ese valor legal y territorial sin diluirlo en una noción exclusivamente espiritual.
  doctrine_reference: 'DOCTRINE.md: léxico de posesión de la tierra en Deuteronomio'
- issue: Matiz de la relación entre cruzar el Jordán y entrar en la tierra
  english_pob_reading: to go in
  chosen_spanish_reading: para entrar
  alternative_spanish_readings:
  - para ir a entrar
  - para ir a
  rationale: 'El hebreo presenta una secuencia: cruzar el Jordán con el fin de entrar en la tierra. «Para entrar» expresa adecuadamente la finalidad y evita añadir una interpretación que no está en el texto.'
  doctrine_reference: 'DOCTRINE.md: fidelidad a la secuencia verbal del hebreo'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «possess» como forma más directa y «dwell in it» por registro más formal. En español, esa decisión se refleja con «poseerán» y «habitarán», manteniendo la fuerza del verbo hebreo sin sobreexplicación. También se preservó el nombre divino como «Yahvé» conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de acuerdo con la convención del proyecto para יהוה.
  - 'Se mantuvo el tono bíblico sobrio con verbos directos: «cruzando», «entrar», «poseer», «habitar».'
  - La nota al pie marca la alternativa más explícita para ירשׁ sin duplicar el sentido principal del texto.
