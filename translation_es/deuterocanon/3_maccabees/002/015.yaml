translation:
  language: es
  text: Pero, puesto que te complaciste en mostrar tu gloria entre tu pueblo, Israel[a], has santificado este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «te complaciste con tu gloria entre tu pueblo, Israel». El griego puede traducirse de manera más formal, pero el texto principal expresa el sentido más probable en español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste con lo anterior. En español, «Pero» suena natural y mantiene el giro adversativo sin intensificarlo indebidamente.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Expresa fundamento causal en un contexto de súplica o argumentación dirigida a Dios. «Puesto que» conserva ese valor mejor que una simple correlación temporal.
- source_word: εὐδόκησας
  english_pob_choice: you were pleased
  chosen_spanish: te complaciste
  alternatives_spanish:
  - te agradó
  - mostraste agrado
  lexicon: BDAG
  rationale: La idea central es la disposición favorable de Dios. «Te complaciste» conserva el matiz de voluntad benigna y funciona con naturalidad en español bíblico contemporáneo.
- source_word: τὴν δόξαν σου
  english_pob_choice: to display your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: BDAG
  rationale: La construcción griega permite entender la gloria divina como algo manifestado entre el pueblo. En español, «mostrar tu gloria» preserva la relación sin convertir el sintagma en una paráfrasis excesiva.
- source_word: ἐν τῷ λαῷ σου Ἰσραήλ
  english_pob_choice: among your people Israel
  chosen_spanish: entre tu pueblo Israel
  alternatives_spanish:
  - en tu pueblo Israel
  - con tu pueblo Israel
  lexicon: BDAG
  rationale: «Entre» reproduce de modo natural el valor relacional de ἐν en este contexto y deja claro el ámbito de la manifestación divina.
- source_word: ἡγίασας
  english_pob_choice: you have sanctified
  chosen_spanish: has santificado
  alternatives_spanish:
  - has hecho santo
  - has consagrado
  lexicon: BDAG
  rationale: «Santificado» mantiene el léxico cultual y formal del verbo ἁγιάζω con precisión doctrinal y buena inteligibilidad en español.
- source_word: τὸν τόπον τοῦτον
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar santo
  lexicon: BDAG
  rationale: Traducción directa y sobria del demostrativo. «Este lugar» es suficiente y no añade una cualificación ausente del griego.
theological_decisions:
- issue: Relación entre la gloria de Dios y el pueblo Israel
  english_pob_reading: you were pleased to display your glory among your people Israel
  chosen_spanish_reading: te complaciste en mostrar tu gloria entre tu pueblo Israel
  alternative_spanish_readings:
  - te complaciste con tu gloria entre tu pueblo Israel
  - te complaciste en tu gloria entre tu pueblo Israel
  rationale: El griego es compacto y admite una lectura más literal. Se eligió una formulación verbal para expresar la manifestación de la gloria de Dios en relación con Israel sin borrar la posibilidad de una lectura más directa del sintagma «tu gloria».
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Consagración del lugar
  english_pob_reading: you have sanctified this place
  chosen_spanish_reading: has santificado este lugar
  alternative_spanish_readings:
  - has hecho santo este lugar
  - has consagrado este lugar
  rationale: «Santificar» conserva el peso cultual del acto divino de apartar un lugar para uso sagrado. «Consagrar» sería posible, pero en español puede sonar más eclesiástico o menos directo al verbo del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos clave: mantiene el valor relacional de la gloria divina como manifestada entre el pueblo, y conserva el registro formal de ἡγίασας con «santificado». También evita una paráfrasis excesiva de τὴν δόξαν σου, optando por «tu gloria» dentro de una construcción verbal natural en español.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino y la terminología cultual en un registro bíblico claro y moderno.
  - No se introdujo nota al pie porque la ambigüedad principal del inglés se resolvió en la redacción española sin necesidad de un marcador explícito.
  - «Israel» se conserva como nombre propio sin artículo, conforme al uso bíblico estándar en español.
