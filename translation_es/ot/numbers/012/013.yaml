translation:
  language: es
  text: 'Entonces Moisés clamó a Yahvé, diciendo: «¡Oh Dios, por favor, sánala[a]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¡Oh Dios, por favor, sánala, por favor!»; la repetición de «por favor» preserva la urgencia de la súplica de Moisés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - alzó su voz
  lexicon: HALOT
  rationale: צעק expresa un clamor urgente o un grito de súplica; «clamó» conserva mejor la intensidad intercesora que un simple «llamó».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: 'La preposición direccional se expresa naturalmente con «a» en español: «clamó a Yahvé».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de יְהוָה, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo así
  lexicon: HALOT
  rationale: La fórmula introduce el contenido del clamor; «diciendo» es una equivalencia natural y fiel.
- source_word: אֵל
  english_pob_choice: O God
  chosen_spanish: ¡Oh Dios!
  alternatives_spanish:
  - Dios
  - ¡Dios mío!
  lexicon: HALOT
  rationale: Aquí אֵל funciona como vocativo en oración; «¡Oh Dios!» conserva el tono de invocación directa sin añadir matices no presentes en el hebreo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula expresa ruego urgente; «por favor» es la forma moderna más clara en español.
- source_word: רְפָא
  english_pob_choice: heal
  chosen_spanish: sana
  alternatives_spanish:
  - cúrala
  - restáurala
  lexicon: HALOT
  rationale: El imperativo de רפא se refiere a curar o sanar; «sana» es breve, natural y acorde con el tono de súplica.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: Se conserva la segunda partícula de ruego como «por favor»; se mantiene la repetición enfática del hebreo sin sobrecargar la oración.
- source_word: לָהּ
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - a Miriam
  lexicon: HALOT
  rationale: 'El sufijo femenino singular refiere a Miriam; en español, el objeto directo se expresa con «la». La fusión con el verbo produce una frase natural: «sánala».'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en forma transliterada, siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Repetición de la súplica con נָא
  english_pob_reading: please ... please
  chosen_spanish_reading: por favor ... por favor
  alternative_spanish_readings:
  - te ruego ... te ruego
  - por favor ... te ruego
  rationale: La duplicación de נָא comunica urgencia e insistencia. En español se conserva con la repetición de «por favor» para no suavizar el tono del hebreo.
  doctrine_reference: Audit trail of lexical emphasis in Numbers 12:13
translation_notes:
  revision_awareness: La revisión inglesa más reciente redujo la segunda ocurrencia de «please» por fluidez, pero el audit trail deja claro que las dos partículas נָא siguen siendo significativas. En español se decidió conservar explícitamente la repetición con dos marcas de cortesía para mantener el énfasis del original, sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para יְהוָה, conforme al estándar del proyecto.
  - Se eligió «clamó» para צעק por su valor de súplica intensa.
  - Se mantuvo «sana» en estilo imperativo directo y natural en español.
  - La nota al pie está anclada en el texto y no se deja ninguna nota sin marcador.
