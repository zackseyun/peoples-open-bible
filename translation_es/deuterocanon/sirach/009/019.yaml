translation:
  language: es
  text: Sabe que pisarás entre trampas[a], y andarás cerca de una red.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado dice literalmente: «Sabe que pisarás entre trampas, y andarás hasta una red». La tradición griega de este versículo es muy distinta: «Un hombre hablador es temible en su ciudad, y el precipitado en su palabra será odiado». Esta traducción sigue el hebreo conservado como testigo principal, mientras deja constancia del paralelo griego divergente.'
    reason: textual_variant
lexical_decisions:
- source_word: דַּע
  english_pob_choice: Know
  chosen_spanish: Sabe
  alternatives_spanish:
  - Conoce
  - Sabe bien
  lexicon: HALOT
  rationale: El imperativo de ידע expresa una exhortación directa. «Sabe» conserva la concisión y el tono admonitorio del hebreo, con registro natural en español.
- source_word: בֵּין פַּחִים
  english_pob_choice: among traps
  chosen_spanish: entre trampas
  alternatives_spanish:
  - en medio de trampas
  - entre lazos
  - entre snare(s)
  lexicon: HALOT
  rationale: פח designa un trampa o lazo. «Entre trampas» reproduce bien la imagen espacial de movimiento dentro de peligro oculto y suena claro en español.
- source_word: תִּצְעָד
  english_pob_choice: you will tread
  chosen_spanish: andarás
  alternatives_spanish:
  - pisarás
  - caminarás
  - hollarás
  lexicon: HALOT
  rationale: צעד se refiere a dar pasos, avanzar o pisar. «Andarás» es natural y conserva la idea de desplazamiento continuo; «pisarás» sería más concreto, pero menos fluido en la frase.
- source_word: וְעַד רֶשֶׁת
  english_pob_choice: near a net
  chosen_spanish: cerca de una red
  alternatives_spanish:
  - hasta una red
  - junto a una red
  - próximo a una red
  lexicon: HALOT
  rationale: עַד puede marcar proximidad o límite. «Cerca de» sigue la revisión inglesa que prefirió un valor más natural que «hasta», manteniendo la imagen de peligro inmediato sin afirmar captura consumada. Se traduce רֶשֶׁת como «red» para distinguirlo de פחים.
- source_word: תִּתְהַלָּךְ
  english_pob_choice: walk about
  chosen_spanish: caminarás
  alternatives_spanish:
  - andarás
  - irás y vendrás
  - te pasearás
  lexicon: HALOT
  rationale: El hitpael de הלך sugiere una acción continua o iterativa. En español, «caminarás» transmite el desplazamiento general de forma natural; la repetición ya queda sugerida por el paralelismo.
- source_word: רֶשֶׁת
  english_pob_choice: net
  chosen_spanish: red
  alternatives_spanish:
  - malla
  - lazo
  - trampa
  lexicon: HALOT
  rationale: רֶשֶׁת es literalmente una red. «Red» es la equivalencia más directa en español y mantiene el paralelismo con «trampas» sin fusionar las dos imágenes.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The translation follows the extant Hebrew as the primary witness here, while preserving awareness of the divergent Greek parallel.
  chosen_spanish_reading: La traducción sigue el hebreo conservado como testigo principal, y deja constancia del paralelo griego divergente.
  alternative_spanish_readings:
  - 'Seguir el griego: «Un hombre chismoso es temible en su ciudad, y el impetuoso en su hablar será odiado»'
  - Combinar ambos testigos en una traducción mixta
  rationale: El hebreo disponible ofrece un texto coherente y el inglés POB lo adopta como base. El griego presenta una sentencia totalmente distinta; por fidelidad auditada al testigo primario y para no fusionar tradiciones dispares, la versión española sigue el hebreo y señala la variante en nota.
  doctrine_reference: Principio de crítica textual y prioridad del testigo conservado en la tradición hebrea del libro de Ben Sira
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «up to a net» a «near a net» por naturalidad y por un mejor valor contextual de עַד; en español se refleja esa misma decisión con «cerca de una red», conservando el paralelismo y la imagen de peligro inmediato.
  spanish_consistency_notes:
  - Se prefirió «red» para רֶשֶׁת y «trampas» para פַּחִים, a fin de mantener dos imágenes relacionadas pero no idénticas.
  - Se evitó «SEÑOR» o terminología litúrgica no pertinente, ya que este versículo no contiene el nombre divino.
  - La nota textual explica la discrepancia sustancial con el griego sin mezclar ambos textos en el cuerpo principal.
