revisions:
- from: Los reyes de la tierra no lo creyeron[a], ni ninguno de los habitantes del mundo, que un adversario y un enemigo entrara[b] por las puertas de Jerusalén.
  to: Los reyes de la tierra no creyeron[a], ni ninguno de los habitantes del mundo, que un adversario y un enemigo entrara[b] por las puertas de Jerusalén.
  rationale: Se hizo una reparación menor para quitar el pronombre innecesario en 'no lo creyeron', que no está en el hebreo y en español suena menos directo. Se mantuvo la estructura general del borrador porque es fiel y legible. También se corrigió la nota sobre 'entrara' para reflejar con precisión que el verbo hebreo es literalmente 'venir/llegar', mientras que 'entrar' explicita el sentido contextual de ingreso por las puertas.
