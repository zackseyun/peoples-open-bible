translation:
  language: es
  text: Cuando yo quiebre tu provisión[a] de pan, diez mujeres hornearán tu pan en un solo horno, y te lo devolverán por peso; comerás, pero no te saciarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la vara de pan», un modismo para la provisión sustentadora de pan.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשִׁבְרִי
  english_pob_choice: When I break
  chosen_spanish: Cuando yo quiebre
  alternatives_spanish:
  - Cuando yo rompa
  - Cuando yo destruya
  lexicon: HALOT
  rationale: La forma infinitiva con prefijo expresa una cláusula temporal. En español, «cuando yo quiebre» conserva la imagen activa de ruptura y el matiz de juicio sin diluirlo en una paráfrasis más general.
- source_word: מַטֵּה לֶחֶם
  english_pob_choice: your supply of bread
  chosen_spanish: el sustento de tu pan
  alternatives_spanish:
  - la vara del pan
  - el sostén del pan
  - el suministro de pan
  lexicon: HALOT
  rationale: El hebreo es literalmente «vara de pan», un modismo para el apoyo/sustento que el pan provee. «El sustento de tu pan» comunica la fuerza idiomática y mantiene el vínculo específico con el pan; la nota preserva la literalidad.
- source_word: וְאָפוּ
  english_pob_choice: will bake
  chosen_spanish: cocerán
  alternatives_spanish:
  - hornearán
  - cocinarán
  lexicon: HALOT
  rationale: El contexto doméstico de pan y horno favorece «cocerán» o «hornearán». «Cocerán» resulta natural en español y conserva el sentido de preparar pan en horno.
- source_word: עֶשֶׂר נָשִׁים
  english_pob_choice: ten women
  chosen_spanish: diez mujeres
  alternatives_spanish:
  - diez mujeres
  - diez esposas
  lexicon: HALOT
  rationale: La frase es directa y debe mantenerse sin generalizar. «Mujeres» reproduce el referente explícito del hebreo.
- source_word: בְּתַנּוּר אֶחָד
  english_pob_choice: in a single oven
  chosen_spanish: en un solo horno
  alternatives_spanish:
  - en un horno único
  - en un solo fogón
  lexicon: HALOT
  rationale: «En un solo horno» refleja con claridad la escasez implicada en el texto y evita oscurecer el sustantivo concreto del hebreo.
- source_word: וְהֵשִׁיבוּ
  english_pob_choice: and return
  chosen_spanish: y lo devolverán
  alternatives_spanish:
  - y lo traerán de vuelta
  - y lo entregarán
  lexicon: HALOT
  rationale: El verbo causativo de שוב expresa devolver/traer de vuelta. Aquí el pan ya cocido vuelve a los destinatarios en porciones racionadas; «devolverán» comunica bien esa acción.
- source_word: בַּמִּשְׁקָל
  english_pob_choice: by weight
  chosen_spanish: por peso
  alternatives_spanish:
  - a peso
  - pesado
  lexicon: HALOT
  rationale: La expresión indica racionamiento medido. «Por peso» es una construcción natural y fiel; evita ampliar el sentido a una medida distinta.
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: and you will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - y comerán
  - y comeréis
  lexicon: HALOT
  rationale: En español conviene continuar la secuencia con un futuro impersonal/sujeto omitido, ya que el versículo describe el efecto general del castigo. El sentido se mantiene sin recargar la sintaxis.
- source_word: וְלֹא תִשְׂבָּעוּ
  english_pob_choice: but you will not be satisfied
  chosen_spanish: pero no se saciarán
  alternatives_spanish:
  - pero no quedarán satisfechos
  - pero no estarán saciados
  lexicon: HALOT
  rationale: שׂבע en contexto alimentario es saciarse. «No se saciarán» expresa claramente que la comida no quitará el hambre; es más idiomático que «no estarán satisfechos».
theological_decisions:
- issue: Juicio de alianza expresado como escasez de sustento
  english_pob_reading: When I break your supply of bread
  chosen_spanish_reading: Cuando yo quiebre el sustento de tu pan
  alternative_spanish_readings:
  - Cuando yo rompa el suministro de pan
  - Cuando yo destruya tu provisión de pan
  rationale: 'El texto presenta una sanción pactual: Yahvé quiebra la base del sustento. «Sustento de tu pan» conserva el carácter metafórico e intensifica la idea de dependencia sin borrar la imagen original.'
  doctrine_reference: Levítico 26; teología de bendiciones y maldiciones del pacto
- issue: 'Resultado de la disciplina: comer sin saciedad'
  english_pob_reading: you will eat, but you will not be satisfied
  chosen_spanish_reading: comerán, pero no se saciarán
  alternative_spanish_readings:
  - comerán, pero no quedarán satisfechos
  - comerán, pero no estarán saciados
  rationale: 'La frase expresa una frustración del alimento bajo juicio divino: hay consumo, pero no alivio. Mantener «saciar» conserva el paralelismo hebreo y el efecto teológico del pasaje.'
  doctrine_reference: Levítico 26:26; dependencia humana del sustento dado por Dios
translation_notes:
  revision_awareness: Se siguió el testigo hebreo masorético de Levítico 26:26 y el audit trail inglés POB con acuerdo alto. No hubo revisiones aplicadas en la pasada más reciente; la redacción española preserva la metáfora de sustento y el cierre de saciedad sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantuvo Yahvé solo cuando el nombre divino aparece explícitamente en el marco editorial; este versículo no lo contiene.
  - 'Se conservó el paralelismo del juicio: quebrar el sustento, pan cocido en escasez, racionamiento por peso y falta de saciedad.'
  - «Saciar» se usó en sentido alimentario para reflejar el hebreo שׂבע sin cambiar a un lenguaje devocional más amplio.
