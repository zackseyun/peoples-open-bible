translation:
  language: es
  text: Pero contra los que desobedecen, tu ojo[a] no perdonará; los entregarás[b] a la matanza y al saqueo en toda tu tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego ὁ ὀφθαλμός σου, ''tu ojo'': modismo que personifica el ojo como sede de la compasión o clemencia; alternativa dinámica: ''no mostrarás ninguna misericordia''. La imagen se conserva siguiendo el criterio del POB inglés de no suavizar el texto fuente.'
    reason: cultural_note
  - marker: b
    text: Griego δοῦναι, infinitivo aoristo de δίδωμι, que expresa el resultado del mandato ('de modo que los entregues'). Se traduce como verbo finito para reflejar la fuerza ejecutiva del discurso de mandato real, siguiendo el inglés POB 'you shall give them over'.
    reason: grammatical_note
lexical_decisions:
- source_word: ἀπειθοῦντας
  english_pob_choice: those who disobey
  chosen_spanish: los que desobedezcan
  alternatives_spanish:
  - los desobedientes
  - los que rehúsen obedecer
  - los que no obedezcan
  lexicon: BDAG
  rationale: El participio presente activo ἀπειθοῦντας expresa acción en curso de personas que rehúsan la obediencia. 'Los que desobedezcan' preserva la fuerza activa mejor que el adjetivo sustantivado 'los desobedientes,' que es más estático. El subjuntivo es natural en español para referentes genéricos dentro de cláusulas prepositivas (ἐπὶ τοὺς ἀπειθοῦντας). El inglés POB eligió 'those who disobey' por la misma razón.
- source_word: οὐ φείσεται ὁ ὀφθαλμός σου
  english_pob_choice: your eye shall not spare
  chosen_spanish: tu ojo no perdonará
  alternatives_spanish:
  - tu ojo no tendrá piedad
  - no mostrarás misericordia
  - no tendrás compasión
  lexicon: LSJ
  rationale: φείδομαι (LSJ) significa abstenerse de dañar, escatimar, perdonar en el sentido de 'no castigar.' La expresión ὁ ὀφθαλμός σου es un modismo que personifica el ojo como órgano de compasión o clemencia. 'Tu ojo no perdonará' mantiene la imagen antropomórfica del griego sin importar lenguaje interpretativo ajeno al texto. Las alternativas dinámicas ('no mostrarás misericordia') eliminarían la imagen del ojo, que el POB inglés optó por conservar deliberadamente.
- source_word: δοῦναι αὐτοὺς
  english_pob_choice: you shall give them over
  chosen_spanish: los entregarás
  alternatives_spanish:
  - para entregarlos
  - al entregarlos
  - dándolos
  lexicon: BDAG
  rationale: 'El infinitivo aoristo δοῦναι de δίδωμι expresa aquí el resultado o propósito implícito de la orden: ''de modo que los entregues.'' En el contexto del mandato real, el inglés POB lo convirtió en cláusula finita (''you shall give them over''). El español sigue la misma lógica con ''los entregarás'' (futuro con sentido imperativo-resultativo), que resulta más fluido que el infinitivo propositivo ''para entregarlos,'' sin alejarse de la fuerza del texto griego.'
- source_word: εἰς φόνον
  english_pob_choice: to slaughter
  chosen_spanish: a la matanza
  alternatives_spanish:
  - al exterminio
  - a la muerte
  - a la mortandad
  - al degüello
  lexicon: LSJ
  rationale: φόνος (LSJ) denota muerte violenta, homicidio, matanza. En contexto militar de conquista, 'matanza' es el equivalente más transparente y específico en español moderno, superior a 'muerte' (demasiado genérico) o 'exterminio' (con connotaciones más modernas). Mantiene el par natural con 'saqueo' en la misma cláusula, paralelo al par 'slaughter and plunder' del inglés POB.
- source_word: ἁρπαγήν
  english_pob_choice: plunder
  chosen_spanish: saqueo
  alternatives_spanish:
  - pillaje
  - rapiña
  - botín
  - despojo
  lexicon: LSJ
  rationale: ἁρπαγή (LSJ) denota la apropiación violenta de bienes, especialmente en contexto de conquista. 'Saqueo' es el término estándar en español moderno para esta acción militar (arrasar y robar bienes de un territorio), paralelo directo a 'plunder' del inglés POB. 'Pillaje' es igualmente preciso pero de registro ligeramente más literario; 'rapiña' tiene connotaciones más arcaicas.
- source_word: ἐν πάσῃ τῇ γῇ σου
  english_pob_choice: in all your land
  chosen_spanish: en toda tu tierra
  alternatives_spanish:
  - por toda tu tierra
  - en todo tu territorio
  - a lo largo de toda tu tierra
  lexicon: LSJ
  rationale: ἐν πάσῃ τῇ γῇ σου indica el alcance total del territorio del destinatario. 'En toda tu tierra' es la traducción más directa y alinea con la revisión final del inglés POB, que cambió 'throughout all your land' a 'in all your land' para un renderizado más literal de ἐν. El español 'en toda tu tierra' logra la misma precisión. 'Por toda tu tierra' acentuaría la extensión distributiva, pero podría exceder lo que ἐν expresa estrictamente.
theological_decisions:
- issue: Retención del modismo antropomórfico violento 'tu ojo no perdonará'
  english_pob_reading: your eye shall not spare
  chosen_spanish_reading: tu ojo no perdonará
  alternative_spanish_readings:
  - no mostrarás ninguna misericordia
  - no tendrás compasión
  - no escatimarás castigo
  rationale: 'El versículo forma parte de un mandato real de conquista despiadada. Suavizar la expresión (''no mostrarás misericordia'') eliminaría la imagen del ojo como órgano de clemencia y añadiría interpretación no respaldada por el griego. El inglés POB decidió explícitamente conservar ''your eye shall not spare'' para no suavizar la violencia ni importar lenguaje interpretativo. El español sigue la misma línea: ''tu ojo no perdonará'' retiene la imagen y la contundencia del original.'
  doctrine_reference: 'Filosofía de traducción §§1, 3, 6; decisión teológica del POB inglés: ''Retain the direct command and the anthropomorphic idiom without softening'''
- issue: 'Función sintáctica del infinitivo δοῦναι: ¿cláusula de resultado o segundo mandato?'
  english_pob_reading: you shall give them over
  chosen_spanish_reading: los entregarás
  alternative_spanish_readings:
  - para entregarlos
  - de modo que los entregues
  rationale: 'El infinitivo δοῦναι es sintácticamente ambiguo: puede ser resultado (''de modo que los entregues''), propósito (''para entregarlos'') o equivalente implícito de un segundo imperativo en el contexto del discurso de mandato. El inglés POB optó por convertirlo en cláusula finita (''you shall give them over''), lo que captura la fuerza ejecutiva del mandato. El español ''los entregarás'' adopta la misma solución; un futuro con valor yusivo es natural en discurso de órdenes reales en español sin forzar la sintaxis.'
  doctrine_reference: Filosofía de traducción §§1, 3; decisión léxica del POB sobre δοῦναι αὐτοὺς
translation_notes:
  revision_awareness: El inglés POB fue revisado (2026-04-23) para cambiar 'throughout all your land' a 'in all your land' como renderizado más directo de ἐν πάσῃ τῇ γῇ σου. El español 'en toda tu tierra' refleja y es coherente con esa posición corregida, evitando la tendencia distributiva de 'por toda tu tierra' que habría reproducido el matiz de la versión anterior en inglés.
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה/YHWH) en este versículo; la convención 'Yahvé' no se aplica aquí.
  - No hay términos cristológicos ni pneumatológicos en este versículo.
  - δοῦλος no aparece; la convención 'esclavo' vs. 'siervo' no se activa.
  - '''Matanza'' y ''saqueo'' se establecen como traducción de φόνος y ἁρπαγή respectivamente para los contextos militares de Judith; deben mantenerse consistentes en capítulos paralelos.'
  - La expresión idiomática 'el ojo no perdonará' (ὀφθαλμός / φείδομαι) puede reaparecer en Judith; se recomienda usar 'tu/su ojo no perdonará' de forma consistente cuando el griego usa este modismo.
