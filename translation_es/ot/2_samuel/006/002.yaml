  language: en
  yaml_path: translation/ot/2_samuel/006/002.yaml
  text: David arose and went[a], with all the people who were with him, from Baale-judah to bring up from there the ark of God, which is called by the Name, the name of Yahweh of Armies[d][c][b], who is enthroned above the cherubim.
  footnotes:
  - marker: a
    text: Or “from Baalah of Judah.” The Hebrew form here is unusual and may reflect a place associated with Kiriath-jearim.
    reason: alternative_reading
  - marker: b
    text: Or “over which the name of the LORD of hosts is called.” The Hebrew naming formula is compressed and can be rendered more literally this way.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: “the LORD of hosts.”'
    reason: lexical_alternative
  - marker: d
    text: Or “who dwells between the cherubim.”
    reason: lexical_alternative
