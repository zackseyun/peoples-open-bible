translation:
  language: es
  text: Porque tú los has apartado para ti como herencia de entre todos los pueblos de la tierra, tal como hablaste por medio[a] de Moisés, tu siervo, cuando sacaste a nuestros padres[b] de Egipto, Señor Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la mano de Moisés, tu siervo».
    reason: lexical_alternative
  - marker: b
    text: O «nuestros antepasados».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Señor YHWH»; en español se conserva el nombre divino como «Yahvé».
    reason: theological_note
lexical_decisions:
- source_word: הִבְדַּלְתָּם
  english_pob_choice: set them apart
  chosen_spanish: has apartado
  alternatives_spanish:
  - los has separado
  - los has distinguido
  lexicon: HALOT
  rationale: El hiphil de בדל expresa separar o apartar. «Has apartado» comunica bien la idea de consagración y pertenencia sin perder el sentido de distinción del pueblo.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu posesión
  lexicon: HALOT
  rationale: El dativo indica pertenencia y finalidad. «Para ti» es natural en español y conserva que el pueblo pertenece a Dios.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - como patrimonio
  lexicon: HALOT
  rationale: נחלה se refiere a una porción heredada o posesión asignada. «Herencia» mantiene el valor de don/covenant y funciona bien con «como».
- source_word: מִכֹּל עַמֵּי הָאָרֶץ
  english_pob_choice: from all the peoples of the earth
  chosen_spanish: de entre todos los pueblos de la tierra
  alternatives_spanish:
  - de entre todas las naciones de la tierra
  - de todos los pueblos de la tierra
  lexicon: HALOT
  rationale: La fórmula contrasta a Israel con el resto de los pueblos. «De entre» refleja mejor la separación interna frente al conjunto que un simple «de».
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: La idea es de correspondencia entre la acción de Dios y su palabra previa. «Conforme a lo que» expresa esa correspondencia con claridad en español.
- source_word: דִּבַּרְתָּ
  english_pob_choice: you spoke
  chosen_spanish: hablaste
  alternatives_spanish:
  - dijiste
  - pronunciaste
  lexicon: HALOT
  rationale: «Hablaste» conserva el registro formal de la palabra divina y se ajusta al paralelismo con la fórmula de promesa.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: El hebreo usa una locución instrumental. En español, «por medio de» transmite la mediación de manera natural y mantiene el sentido sin calco duro.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: Aunque el contexto honra a Moisés, el término עבד tiene fuerza de dependencia servil y la política POB privilegia «esclavo» cuando la fuerza léxica lo requiere. Aquí el vocativo no borra esa tensión.
- source_word: בְּהוֹצִיאֲךָ
  english_pob_choice: when you brought
  chosen_spanish: cuando sacaste
  alternatives_spanish:
  - al sacar tú
  - cuando hiciste salir
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal. «Cuando sacaste» es claro y reproduce la fórmula del éxodo.
- source_word: אֶת אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros padres/antepasados
  lexicon: HALOT
  rationale: «Padres» conserva la especificidad masculina plural del hebreo y corresponde al uso bíblico de referencia a los antepasados de Israel.
- source_word: יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor Yahvé
  - Yahvé Dios
  lexicon: HALOT
  rationale: El texto hebreo contiene el nombre divino YHWH, que en el proyecto se rinde como «Yahvé». Aquí se evita ocultarlo bajo una traducción sustitutiva y se preserva el nombre del pacto.
theological_decisions:
- issue: Collocation אֲדֹנָי יְהוִה y la representación del nombre divino
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé Dios
  rationale: El hebreo combina אֲדֹנָי con YHWH. En español conviene conservar ambos elementos sin borrar el nombre propio del pacto. «Señor Yahvé» expresa la combinación de título y nombre con dignidad y claridad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: עַבְדֶּךָ aplicado a Moisés
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: El texto llama a Moisés עבדך. La decisión mantiene la fuerza lexical de עבד y no la suaviza innecesariamente; el contexto honorífico se entiende por la escena, pero el término sigue marcando dependencia real.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος/עבד → esclavo when lexical force is foregrounded'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: se conservó la idea de apartar como herencia, la mediación «por medio de»/«por la mano de», la referencia a «our fathers» y la collocación divina final. La principal divergencia respecto del inglés auditado es la terminología de YHWH, porque el proyecto español exige «Yahvé» en lugar de la convención inglesa «Lord GOD».'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico formal sin arcaísmos innecesarios.
  - «De entre» refleja mejor la separación del pueblo que un simple «de».
  - Se preservó la tensión léxica de עבד con «esclavo» en el vocativo de Moisés.
  - No se usó «SEÑOR» como máscara para YHWH; se dejó explícito «Yahvé».
