id: ACT.18.18
reference: Acts 18:18
source:
  edition: SBLGNT
  text: Ὁ δὲ Παῦλος ἔτι προσμείνας ἡμέρας ἱκανὰς τοῖς ἀδελφοῖς ἀποταξάμενος ἐξέπλει εἰς τὴν Συρίαν, καὶ σὺν αὐτῷ Πρίσκιλλα καὶ Ἀκύλας, κειράμενος ⸂ἐν Κεγχρεαῖς τὴν κεφαλήν⸃, εἶχεν γὰρ εὐχήν.
translation:
  text: After Paul had remained many more days[a], he said farewell to the brothers and sailed away for Syria, and with him were Priscilla and Aquila. In Cenchreae he had his head shaved[e][d][c][b], for he had a vow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having cut his hair.' The Greek verb can refer more generally to cutting or shearing hair, not necessarily complete shaving.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters take the haircut and vow to refer to Aquila rather than Paul, though the Greek grammar most naturally points to Paul.
    reason: alternative_reading
  - marker: c
    text: The text says only 'a vow'; many connect it with a Nazirite-type vow, but this is not stated explicitly.
    reason: cultural_note
  - marker: d
    text: '"Brothers" here likely refers to the community of believers, including women as well as men.'
    reason: lexical_alternative
  - marker: e
    text: Or 'and with him were Priscilla and Aquila.'.
    reason: previous_rendering
lexical_decisions:
- source_word: προσμείνας
  chosen: had remained there
  alternatives:
  - had stayed
  - continued for
  lexicon: BDAG
  rationale: Aorist participle indicating prior action before the main verb ἐξέπλει. 'Remained' is natural English and preserves the sense of staying on. 'There' is supplied from context to make the English idiomatic.
- source_word: ἡμέρας ἱκανὰς
  chosen: many more days
  alternatives:
  - quite a few days
  - a considerable number of days
  lexicon: BDAG
  rationale: ἱκανός here denotes a considerable amount/number. 'Many more days' is concise and idiomatic while preserving the comparative sense introduced by ἔτι.
- source_word: τοῖς ἀδελφοῖς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Gender-accurate policy favors retaining the masculine familial term where Greek has ἀδελφοί for the Christian community. A more inclusive sense may be contextually understood, but the main text keeps 'brothers' to match the source.
- source_word: ἀποταξάμενος
  chosen: he said farewell to
  alternatives:
  - having taken leave of
  - having bid farewell to
  lexicon: BDAG
  rationale: The middle participle commonly means to take leave of someone. 'Said farewell to' is readable modern English and accurately conveys the action.
- source_word: ἐξέπλει εἰς τὴν Συρίαν
  chosen: sailed away for Syria
  alternatives:
  - set sail for Syria
  - sailed to Syria
  lexicon: BDAG
  rationale: ἐκπλέω means to sail away/depart by ship. 'For Syria' reflects destination naturally in English.
- source_word: σὺν αὐτῷ
  chosen: with him were
  alternatives:
  - and with him
  - accompanied by
  lexicon: BDAG
  rationale: This phrase introduces Priscilla and Aquila as companions. 'With him were' makes the English clause complete and clear.
- source_word: κειράμενος
  chosen: he had his head shaved
  alternatives:
  - having cut his hair
  - having shaved his head
  lexicon: BDAG
  rationale: κείρω can mean cut or shear hair. Given the object τὴν κεφαλήν and the vow context, 'had his head shaved' best captures the likely ritual action in idiomatic English, while allowing that the exact degree of cutting is debated.
- source_word: ἐν Κεγχρεαῖς
  chosen: In Cenchreae
  alternatives:
  - at Cenchreae
  lexicon: BDAG
  rationale: Standard transliteration of the place name. 'In' is a natural rendering of ἐν with a city/port location.
- source_word: τὴν κεφαλήν
  chosen: his head
  alternatives:
  - the head
  lexicon: BDAG
  rationale: English idiom normally uses the possessive here though Greek has the article. The referent is the subject of the participle.
- source_word: εἶχεν γὰρ εὐχήν
  chosen: for he was under a vow
  alternatives:
  - for he had a vow
  - for he had taken a vow
  lexicon: BDAG
  rationale: The idiom ἔχειν εὐχήν means to be bound by or under a vow. 'Was under a vow' communicates the ongoing state more clearly than the wooden 'had a vow'.
