translation:
  language: es
  text: Y algunos de los hijos de Benjamín y de Judá vinieron a la fortaleza[a], a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «refugio fortificado». El hebreo מְצָד se refiere a un lugar fortificado de defensa y amparo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - vinieron hasta
  lexicon: HALOT
  rationale: El hebreo en narración avanzada indica movimiento hacia el destino; en español, «llegaron» comunica naturalmente el arribo al punto señalado sin perder el avance narrativo.
- source_word: מִן
  english_pob_choice: some of
  chosen_spanish: algunos de
  alternatives_spanish:
  - de entre
  - unos de
  lexicon: HALOT
  rationale: 'La construcción es partititiva: no todo Judá ni todo Benjamín, sino miembros de esos grupos. «Algunos de» expresa bien esa restricción en español.'
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - los descendientes de Benjamín
  lexicon: HALOT
  rationale: Se conserva la formulación genealógica del hebreo porque es transparente y fiel al patrón bíblico. «Benjaminitas» sería más idiomático, pero menos cercano a la forma fuente.
- source_word: וִיהוּדָה
  english_pob_choice: and Judah
  chosen_spanish: y de Judá
  alternatives_spanish:
  - y Judá
  - y los de Judá
  lexicon: HALOT
  rationale: El hebreo coordina un nombre tribal de modo elíptico. En español, «y de Judá» hace explícita la pertenencia tribal sin añadir más de lo que la construcción permite.
- source_word: לַמְצָד
  english_pob_choice: the stronghold
  chosen_spanish: el refugio
  alternatives_spanish:
  - la fortaleza
  - el baluarte
  lexicon: HALOT
  rationale: מְצָד designa un lugar fortificado de refugio/defensa. «Refugio» recoge la función de amparo; como alternativa, «fortaleza» mantiene el matiz militar. Se evita una sola opción fija cuando el término admite ambas facetas.
- source_word: לְדָוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - hasta David
  lexicon: HALOT
  rationale: La preposición marca dirección y relación con David como destino personal. En español, «a David» es la expresión más directa y natural.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés coinciden de manera alta; no se registran revisiones sustantivas. La redacción española mantiene la lectura partitiva de מִן, la coordinación elíptica de Judá y el valor de lugar fortificado de מְצָד.
  spanish_consistency_notes:
  - Se preservó la estructura breve del hebreo sin expandirla innecesariamente.
  - Se usó «hijos de» en paralelo con el original para mantener coherencia bíblica.
  - «Refugio» se eligió como término principal por su naturalidad en español, con nota que preserva la alternativa «fortaleza» para no borrar el matiz defensivo.
