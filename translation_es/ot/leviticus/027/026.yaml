translation:
  language: es
  text: Sin embargo[a], el primogénito del ganado, que por ser primogénito pertenece a Yahvé, nadie puede consagrarlo; sea un buey o una oveja[b], le pertenece a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero». La partícula hebrea introduce una restricción o excepción respecto de lo anterior.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo שֶׂה puede referirse más ampliamente a un animal del rebaño, especialmente una oveja o una cabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Solo
  lexicon: HALOT
  rationale: Expresa bien el valor restrictivo/adversativo de la partícula hebrea al iniciar una excepción respecto de la norma anterior.
- source_word: בְּכוֹר
  english_pob_choice: a firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - un primogénito
  - el primero nacido
  - el primer nacido
  lexicon: HALOT
  rationale: En este contexto sacrificial/legal, 'primogénito' es la forma natural y precisa en español para un animal nacido primero.
- source_word: אֲשֶׁר יְבֻכַּר לַיהוָה בִּבְהֵמָה
  english_pob_choice: which as a firstborn belongs to Yahweh
  chosen_spanish: que como primogénito pertenece a Yahvé
  alternatives_spanish:
  - que es hecho primogénito para Yahvé
  - que, por ser primogénito, pertenece a Yahvé
  - que como primogénito es de Yahvé
  lexicon: HALOT
  rationale: El pasivo de בכר señala estado/estatus de primogénito, no una acción humana. 'Pertenece a Yahvé' refleja la idea de pertenencia legal ya establecida por su condición de primogénito.
- source_word: בִּבְהֵמָה
  english_pob_choice: among the livestock
  chosen_spanish: entre el ganado
  alternatives_spanish:
  - entre los animales domésticos
  - entre la ganadería
  - entre los animales de cría
  lexicon: HALOT
  rationale: '''Ganado'' es un equivalente natural y amplio para בהמה en este contexto de animales domésticos/livestock, sin perder el matiz colectivo.'
- source_word: לֹא יַקְדִּישׁ אִישׁ אֹתוֹ
  english_pob_choice: no man may consecrate
  chosen_spanish: ningún hombre puede consagrarlo
  alternatives_spanish:
  - nadie puede consagrarlo
  - ningún hombre debe consagrarlo
  - un hombre no puede dedicarlo
  lexicon: HALOT
  rationale: '''Consagrar'' preserva el sentido cultual de קדש. ''Ningún hombre'' mantiene el valor genérico de אִישׁ tal como lo refleja la auditoría inglesa.'
- source_word: אִם שׁוֹר אִם שֶׂה
  english_pob_choice: whether an ox or a sheep
  chosen_spanish: sea un toro o una oveja
  alternatives_spanish:
  - sea un buey o una oveja
  - sea un toro o una cabra/oveja
  - ya sea un toro o un animal del rebaño
  lexicon: HALOT
  rationale: שׁוֹר se entiende naturalmente como 'toro' o 'buey'; aquí 'toro' funciona bien en español. שֶׂה puede abarcar oveja o cabra, pero 'oveja' es una opción clara y reverente; la nota preserva la amplitud del término hebreo.
- source_word: לַיהוָה הוּא
  english_pob_choice: it belongs to Yahweh
  chosen_spanish: de Yahvé es
  alternatives_spanish:
  - le pertenece a Yahvé
  - es de Yahvé
  - pertenece a Yahvé
  lexicon: HALOT
  rationale: La frase final expresa posesión/adscripción legal. 'De Yahvé es' suena natural en español y conserva la afirmación de pertenencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el Nombre divino.
theological_decisions:
- issue: Imposibilidad de consagrar por voto un primogénito ya perteneciente a Yahvé
  english_pob_reading: It cannot be newly consecrated because it already belongs to the LORD by prior divine claim as firstborn.
  chosen_spanish_reading: No puede ser consagrado de nuevo porque ya pertenece a Yahvé por su condición de primogénito.
  alternative_spanish_readings:
  - No puede dedicarse porque ya es santo por nacimiento.
  - No puede apartarse como ofrenda especial porque ya es de Yahvé.
  rationale: 'La lógica del versículo es de propiedad previa: el animal no queda disponible para una consagración adicional por voto, porque su estatus de primogénito lo asigna ya a Yahvé.'
  doctrine_reference: Levítico 27:26; Éxodo 13:2, 12-15; Números 18:15-17
translation_notes:
  revision_awareness: Concordamos con el audit trail en la lectura de restricción inicial, en el valor legal de 'pertenece a Yahvé' y en la imposibilidad de una nueva consagración de algo ya reclamado por derecho divino. También se preserva la amplitud de שֶׂה mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - '''Consagrar'' mantiene el registro cultual/legal de קדש sin sustituirlo por un verbo más genérico.'
  - '''Primogénito'' y ''ganado'' ofrecen un español natural sin perder la fuerza jurídica del hebreo.'
  - Se evita 'SEÑOR' por la política terminológica del proyecto.
  - La nota sobre שֶׂה preserva la tensión entre 'oveja' y el sentido más amplio de animal del rebaño.
