    text: Or 'the Hittites' for 'the sons of Heth' in both occurrences; the Hebrew more literally reads 'sons of Heth.'
    reason: lexical_alternative
  - marker: b
    text: The 'gate of his city' refers to the public place where legal and commercial matters were conducted before witnesses.
    reason: cultural_note
