  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la auditoría inglesa en casi todo: mantiene la personificación de γλῶσσα como «lengua», conserva la rareza formal de τρίτη mediante nota, refleja ἐξέβαλεν con «ha expulsado» y ἐστέρεσεν ... τῶν πόνων αὐτῶν con «las ha privado del fruto de su trabajo». El punto débil es la formulación principal «Una lengua de tercero», que no representa de manera suficientemente fiel el adjetivo griego «tercera» y en español sugiere más bien pertenencia a un tercero que una «tercera lengua» intrusa.'
  spanish_quality_summary: El texto es claro y digno, pero «lengua de tercero» suena poco idiomático y potencialmente confuso en español eclesial general. «Una lengua tercera» conserva mejor la literalidad auditada, aunque sigue siendo extraña; la nota explica esa extrañeza y evita una paráfrasis interpretativa en el texto principal. El resto del versículo es natural y legible.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Lengua», «mujeres valientes», «ha expulsado» y «las ha privado del fruto de su trabajo» son compatibles con las decisiones léxicas documentadas. La única corrección necesaria es ajustar τρίτη de «de tercero» a «tercera» para alinearse mejor con la decisión inglesa «third» y con el griego.
  issues:
  - severity: medium
    issue: «de tercero» no refleja con precisión el griego τρίτη
    rationale: El griego dice literalmente «tercera». La construcción española «de tercero» cambia el valor gramatical hacia posesión/procedencia («de un tercero») y puede desviar el sentido idiomático documentado de una lengua que entra como tercera parte.
  - severity: low
    issue: La extrañeza deliberada debe sostenerse con una nota clara
    rationale: Dado que «lengua tercera» no es una expresión española corriente, conviene conservar y afinar la nota para explicar la idiomaticidad sin interpretar demasiado el texto principal.
  revised_spanish_text: Una lengua tercera[a] ha expulsado a mujeres valientes, y las ha privado del fruto de su trabajo.
