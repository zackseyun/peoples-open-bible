review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἤγαγεν = «trajo», τὸν … τὸν = dos descripciones del mismo individuo, y mantiene las dos alternativas léxicas en notas. Sin embargo, «al que viene del extremo de la tierra» introduce «viene», que no está en el griego; el original solo dice «al que [es] del extremo de la tierra». Además, κραταιῶς se expresa mejor con un adverbio de fuerza («poderosamente» / «con fuerza») que con «con poder», que suena menos idiomático y algo semánticamente desplazado.'
  spanish_quality_summary: El español es generalmente claro, pero «al que viene» añade una acción inexistente y debilita la concisión del original. «Con poder» es comprensible, pero menos natural en este contexto que «poderosamente». Una leve corrección produce un español más fiel y más fluido, manteniendo tono digno y legible.
  glossary_alignment: 'No hay términos teológicos clave del glosario general en este versículo. Las decisiones léxicas principales sí requieren ajuste: conservar la referencia nominal de τὸν ἀπʼ ἐσχάτου τῆς γῆς sin añadir «viene», y rendir κραταιῶς con un equivalente adverbial más natural en español.'
  issues:
  - severity: medium
    issue: «al que viene del extremo de la tierra» añade el verbo «viene»
    rationale: El griego τὸν ἀπʼ ἐσχάτου τῆς γῆς identifica al personaje por procedencia, no por una acción de venir. Añadir «viene» sobretraduce el original.
  - severity: low
    issue: «con poder» para κραταιῶς es menos idiomático
    rationale: κραταιῶς expresa la manera de golpear con gran fuerza. En español bíblico natural, «poderosamente» o «con fuerza» reproduce mejor el valor adverbial que «con poder».
  revised_spanish_text: Él trajo al que es del extremo de la tierra[a], al que golpea poderosamente[b],
