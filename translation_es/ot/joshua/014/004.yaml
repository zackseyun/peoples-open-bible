  yaml_path: translation/ot/joshua/014/004.yaml
  text: For the sons of Joseph were two tribes[a], Manasseh and Ephraim; and they gave no portion to the Levites in the land, except cities to dwell in[c][b], with their pasturelands for their livestock and for their possessions.
