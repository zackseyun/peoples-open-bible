review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura distributiva del hebreo: עִשָּׂרוֹן עִשָּׂרוֹן se entiende correctamente como una medida por cada animal, תַּעֲשֶׂה como instrucción de preparación, y las dos frases finales conservan tanto la asignación individual como la referencia al conjunto de siete corderos. Sin embargo, «una décima» no es una formulación suficientemente natural ni clara en español bíblico para una medida cultual; puede sonar a ordinal femenino o fracción aislada sin referente. Conviene explicitar «una décima parte» en el texto principal, manteniendo la nota sobre la literalidad repetida.'
  spanish_quality_summary: La redacción es generalmente clara, pero «Una décima prepararás» suena poco idiomático y algo opaco en español. «Una décima parte prepararás» mejora notablemente la legibilidad sin añadir indebidamente «de un efa» al texto principal. El resto de la sintaxis es comprensible y digna.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Cordero» corresponde bien a כֶּבֶשׂ aquí. «Prepararás» sigue adecuadamente la decisión auditada para תַּעֲשֶׂה. La revisión solo ajusta la expresión de la medida para mejor español.
  issues:
  - severity: medium
    issue: «Una décima» es poco natural y ambiguo en español
    rationale: Aunque intenta reflejar literalmente עִשָּׂרוֹן, en español actual y eclesial «una décima» puede no comunicar claramente una medida fraccionaria cultual. «Una décima parte» preserva el sentido sin introducir el efa en el texto principal.
  - severity: low
    issue: La nota al pie usa «cordero único»
    rationale: Como glosa de literalidad, «el cordero uno» o «el cordero individual» sería más transparente que «cordero único», que en español puede sugerir exclusividad. La nota debe seguir siendo literal pero clara.
  revised_spanish_text: Una décima parte[a] prepararás para cada cordero, para los siete corderos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «una décima, una décima prepararás para el un cordero, para los siete corderos». La repetición expresa un sentido distributivo: una décima parte para cada cordero.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la medida a una formulación española más natural y clara («una décima parte») sin añadir «de un efa» al texto principal, en línea con la revisión inglesa auditada. Se conserva la nota sobre la repetición distributiva del hebreo y se evita una redacción principal que podría resultar opaca para lectores hispanos.
