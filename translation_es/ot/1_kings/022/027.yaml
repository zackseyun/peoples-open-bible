translation:
  language: es
  text: 'y dirás: «Así dice el rey: Pongan a este hombre en la cárcel, y denle pan de aflicción y agua de aflicción[a] hasta que yo vuelva en paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pan de angustia» y «agua de angustia»; la expresión probablemente se refiere a raciones duras o escasas en la cárcel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  english_pob_choice: Thus says the king
  chosen_spanish: Así ha dicho el rey
  alternatives_spanish:
  - Así dice el rey
  - De esta manera ha dicho el rey
  lexicon: HALOT
  rationale: La fórmula mensajera se conserva con un registro solemne y natural en español. «Ha dicho» refleja bien el perfecto profético/declarativo del hebreo y evita sonar demasiado moderno o demasiado litúrgico.
- source_word: שִׂימוּ אֶת זֶה
  english_pob_choice: Put this man
  chosen_spanish: Pongan a este hombre
  alternatives_spanish:
  - Pongan a este
  - Metan a este hombre
  lexicon: HALOT
  rationale: El demostrativo «este» en contexto apunta a Micaías; en español conviene explicitar «hombre» para que el referente sea claro sin añadir información doctrinal. «Pongan» conserva el imperativo plural.
- source_word: בֵּית הַכֶּלֶא
  english_pob_choice: in the prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en el encierro
  - en la prisión
  lexicon: HALOT
  rationale: «Casa de la prisión» sería demasiado literal y poco natural. «Cárcel» comunica con claridad el lugar de confinamiento y mantiene el sentido concreto del hebreo.
- source_word: וְהַאֲכִילֻהוּ
  english_pob_choice: and feed him
  chosen_spanish: y denle
  alternatives_spanish:
  - y aliméntenlo
  - y denle de comer
  lexicon: HALOT
  rationale: El causativo de אכל se expresa de forma idiomática con «denle». El complemento específico aparece luego en «pan de aflicción y agua de aflicción», por lo que no se pierde contenido.
- source_word: לֶחֶם לַחַץ
  english_pob_choice: bread of affliction
  chosen_spanish: pan de aflicción
  alternatives_spanish:
  - pan de angustia
  - pan de angustia y escasez
  lexicon: HALOT
  rationale: Se conserva la estructura genitiva y la dureza de la expresión. «Pan de aflicción» mantiene la resonancia semítica y la posible idea de ración miserable o de aflicción sufrida.
- source_word: וּמַיִם לַחַץ
  english_pob_choice: water of affliction
  chosen_spanish: agua de aflicción
  alternatives_spanish:
  - agua de angustia
  - agua de escasez
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «pan de aflicción». La repetición preserva el ritmo y la carga de dureza del original.
- source_word: עַד בֹּאִי בְשָׁלוֹם
  english_pob_choice: until I come in peace
  chosen_spanish: hasta que yo vuelva en paz
  alternatives_spanish:
  - hasta que yo vuelva seguro
  - hasta que yo regrese en paz
  lexicon: HALOT
  rationale: «Volver» expresa de forma natural el movimiento implícito en el discurso del rey hacia su regreso. «En paz» preserva la ambigüedad de שָׁלוֹם entre retorno pacífico y retorno seguro, sin resolverla de antemano.
theological_decisions:
- issue: Valor de בְשָׁלוֹם en la afirmación del rey
  english_pob_reading: rendered as 'in peace'
  chosen_spanish_reading: «en paz»
  alternative_spanish_readings:
  - «seguro»
  - «sin peligro»
  rationale: 'La expresión se deja abierta para mantener la tensión narrativa: el rey habla con seguridad de un regreso pacífico/seguro. Traducirla por «en paz» conserva la ambigüedad del hebreo y permite que la ironía del relato permanezca sin aclararla excesivamente.'
  doctrine_reference: Preservar la tensión textual y narrativa sin armonizarla interpretativamente.
translation_notes:
  revision_awareness: El contexto auditado en inglés confirma una traducción estable sin cambios recientes; se mantuvo la lectura de «bread/water of affliction» como forma literal con nota alternativa, y se conservó la ambigüedad de בְשָׁלוֹם en el cierre.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo exige el nombre divino; aquí no aparece.
  - Se evita «SEÑOR» porque el texto no contiene el tetragrámaton.
  - «Cárcel» se eligió por claridad idiomática sobre «prisión», sin alterar el referente.
  - La nota al pie marca la alternativa semántica de לַחַץ sin debilitar el texto principal.
