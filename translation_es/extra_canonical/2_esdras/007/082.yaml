translation:
  language: es
  text: 'El segundo camino: porque no pueden ahora hacer un buen arrepentimiento para vivir.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: secunda uia
  english_pob_choice: The second way
  chosen_spanish: El segundo camino
  alternatives_spanish:
  - La segunda vía
  - El segundo sendero
  lexicon: via
  rationale: «Via» puede ser «camino» o «vía»; «camino» suena natural en español bíblico y conserva la imagen de una senda moral o escatológica. Mantengo el numeral y la estructura nominal del inglés POB.
- source_word: reuersionem bonam facere
  english_pob_choice: make a good repentance
  chosen_spanish: hacer una buena conversión
  alternatives_spanish:
  - hacer un buen arrepentimiento
  - hacer una buena penitencia
  lexicon: reuersio
  rationale: El latín «reuersio» tiene el sentido de volver/convertirse; en español «conversión» expresa mejor ese retorno que una fórmula más literal pero menos natural. «Arrepentimiento» sería posible, pero «conversión» conserva con más claridad el matiz de volver atrás o volverse a Dios. «Penitencia» introduciría una carga doctrinal no requerida por el latín.
- source_word: non possunt
  english_pob_choice: they cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no les es posible
  lexicon: posse
  rationale: «No pueden» reproduce con sobriedad la imposibilidad expresada por el latín, sin añadir temporalidad ni intensidad extra.
- source_word: uivere / so as to live
  english_pob_choice: so as to live
  chosen_spanish: para vivir
  alternatives_spanish:
  - a fin de vivir
  - de manera que vivan
  lexicon: uiuere
  rationale: «Para vivir» es la manera más directa y natural de expresar finalidad en español, manteniendo la relación causal-final del original.
theological_decisions:
- issue: ¿Conviene traducir «reuersionem bonam» como arrepentimiento o conversión?
  english_pob_reading: good repentance
  chosen_spanish_reading: una buena conversión
  alternative_spanish_readings:
  - un buen arrepentimiento
  - una buena penitencia
  rationale: El contexto del pasaje habla de imposibilidad moral/escatológica de volver a la vida; «conversión» conserva mejor la idea de volver o darse vuelta que el sustantivo «arrepentimiento». Aun así, la frase sigue siendo compatible con la lectura penitencial del inglés POB.
  doctrine_reference: Arrepentimiento / conversión en lenguaje bíblico de retorno a Dios
translation_notes:
  revision_awareness: La revisión del inglés POB eliminó «now» por no estar explicitado en el latín; la versión española sigue esa corrección y no añade un equivalente temporal. También evita reforzar el matiz con «ahora» o «ya» para no sobretraducir.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología de máscara, porque este versículo no contiene el nombre divino.
  - «Camino» se usa de forma consistente para mantener la imagen direccional de via.
  - «Conversión» se eligió por claridad en español y por su compatibilidad con la tensión semántica del latín reuersionem.
