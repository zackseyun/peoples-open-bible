base_translation:
  language: en
  yaml_path: translation/ot/exodus/014/004.yaml
  text: And I will harden Pharaoh’s heart[a], and he will pursue them; and I will gain glory through Pharaoh and through all his army[b], and the Egyptians will know that I am Yahweh.” And they did so.
  footnotes:
  - marker: a
    text: Or, 'I will strengthen Pharaoh’s heart.' The Hebrew verb can mean 'make strong/firm'; in Exodus this firmness is expressed as obstinacy, hence 'harden.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will be glorified through Pharaoh.' The Hebrew expression speaks of the LORD gaining honor/glory in relation to Pharaoh through what follows.
    reason: alternative_reading
