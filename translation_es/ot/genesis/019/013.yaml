translation:
  language: es
  text: Porque estamos a punto de destruir este lugar[a], ya que su clamor se ha hecho grande delante de Yahvé, y Yahvé nos ha enviado para destruirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el clamor contra ellos se ha hecho grande delante de Yahvé». La forma hebrea puede tomarse formalmente como «su clamor», pero en el contexto muchos la entienden como el clamor levantado contra la gente de este lugar.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׁחִתִים
  english_pob_choice: are about to destroy
  chosen_spanish: estamos a punto de destruir
  alternatives_spanish:
  - estamos destruyendo
  - destruiremos
  lexicon: HALOT
  rationale: El participio hifil plural expresa acción inminente o en curso. En el discurso directo del juicio, «estamos a punto de destruir» comunica bien la inminencia sin convertirlo en un futuro simple más distante.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - esta ciudad
  lexicon: HALOT
  rationale: מָקוֹם admite «lugar» de forma natural en español; «este lugar» conserva el deíctico y evita precisar «ciudad» antes de que el contexto lo haga necesario.
- source_word: גָדְלָה
  english_pob_choice: has become great
  chosen_spanish: ha crecido mucho
  alternatives_spanish:
  - se ha hecho grande
  - ha aumentado mucho
  lexicon: HALOT
  rationale: El perfecto qal indica resultado alcanzado. «Ha crecido mucho» transmite el aumento de intensidad del clamor con un español natural y cercano al valor resultativo.
- source_word: צַעֲקָתָם
  english_pob_choice: their outcry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - el clamor contra ellos
  lexicon: HALOT
  rationale: La forma pronominal puede leerse estrictamente como «su clamor», pero el contexto permite entenderlo como clamor relacionado con la ciudad; se conserva la tensión en la nota en vez de resolverla en el texto principal.
- source_word: אֶת־פְּנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La locución idiomática se vierte con una preposición relacional natural en español. «Delante de Yahvé» mantiene el matiz judicial/personal sin calco excesivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la norma del proyecto en español, en lugar de sustituirlo por un título.
- source_word: וַיְשַׁלְּחֵנוּ
  english_pob_choice: has sent us
  chosen_spanish: nos ha enviado
  alternatives_spanish:
  - nos envió
  - nos mandó
  lexicon: HALOT
  rationale: El wayyiqtol en discurso directo presenta la misión como ya concedida y vigente; el perfecto español expresa bien la relación entre el envío y la acción presente.
- source_word: לְשַׁחֲתָהּ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para arruinarlo
  - para destruirla
  lexicon: HALOT
  rationale: El infinitivo constructo de שׁחת retoma el verbo principal. Se usa «lo» por el referente español natural «este lugar», aunque la forma hebrea final es femenina y puede aludir a la ciudad; la nota preserva esa posibilidad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La convención editorial del proyecto en español es transliterarlo como «Yahvé», manteniendo el nombre personal del Dios del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de צַעֲקָתָם
  english_pob_reading: their outcry / the outcry against them
  chosen_spanish_reading: su clamor
  alternative_spanish_readings:
  - el clamor contra ellos
  - su clamor contra la ciudad
  rationale: 'La POB inglesa conserva la ambigüedad con nota. En español se mantiene también: el texto principal traduce formalmente el sufijo, y la nota ofrece la lectura contextual alternativa sin resolverla dogmáticamente.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requirieron cambios y el acuerdo de revisión fue alto. La redacción española sigue la decisión del POB inglés de conservar la ambigüedad de צַעֲקָתָם mediante nota, mientras adapta las preposiciones y tiempos verbales a un español natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «delante de» para reproducir la relación espacial/forense de אֶת־פְּנֵי sin sonar artificial.
  - Se conserva «su clamor» en el texto y se explicita la alternativa contextual en la nota, como en la POB inglesa.
  - El pronombre objeto «lo» sigue al referente español «este lugar», aunque la nota recuerda que el hebreo puede aludir a la ciudad (femenino).
