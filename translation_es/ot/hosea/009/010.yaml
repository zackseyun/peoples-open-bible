    reason: alternative_reading
  - marker: c
    text: 'Or ''your ancestors.'' Hebrew: ''your fathers.'''
    reason: lexical_alternative
  - marker: d
    text: Compare Numbers 25:1–5, where Israel joined itself to Baal-peor.
    reason: cross_reference
