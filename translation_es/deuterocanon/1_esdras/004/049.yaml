  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los cargos administrativos están bien resueltos: ''sátrapa'', ''toparca'' y ''administrador'' son aceptables en contexto. ''Toparca'' debe seguir respaldado por la nota cultural en el lugar correcto.'
