- from: 'Y hablaron con ellos en Silo, en la tierra de Canaán[a], diciendo: «Yahvé mandó por medio de Moisés que se nos dieran ciudades para habitarlas[b], junto con sus ejidos para nuestro ganado».'
  to: 'Y les hablaron en Silo, en la tierra de Canaán, diciendo: «Yahvé mandó por medio de Moisés[a] que nos diera ciudades para habitar, junto con sus pastos[b] para nuestro ganado».'
  rationale: Se corrigió el anclaje de la nota [a] para que explique el modismo hebreo en el lugar correspondiente; se ajustó «con ellos» a «les hablaron» para reflejar mejor אֲלֵיהֶם; y se reemplazó «ejidos» por «pastos», que es más claro y panhispánico, manteniendo la explicación más precisa en la nota [b]. También se alisó la sintaxis a «que nos diera ciudades para habitar» para mayor naturalidad sin perder el sentido del original.
