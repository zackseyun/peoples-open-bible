id: 1PE.1.21
reference: 1 Peter 1:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοὺς δι’ αὐτοῦ πιστοὺς εἰς θεὸν τὸν ἐγείραντα αὐτὸν ἐκ νεκρῶν καὶ δόξαν αὐτῷ δόντα, ὥστε τὴν πίστιν ὑμῶν καὶ ἐλπίδα εἶναι εἰς θεόν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/021.yaml
  text: 'who through him are believers in God, who raised him from the dead and gave him glory, so that your faith and hope are in God.'
translation:
  language: ko
  text: '여러분은 그분으로 말미암아, 그분을 죽은 자들 가운데서 일으키시고 그분께 영광을 주신 하나님을 믿는 자들입니다. 그래서 여러분의 믿음과 소망은 하나님께 있습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δι’ αὐτοῦ πιστοὺς εἰς θεὸν
  english_pob_choice: through him are believers in God
  chosen_korean: 그분으로 말미암아 ... 하나님을 믿는 자들
  alternatives_korean:
  - 그분을 통하여 하나님께 대하여 신실한 자들
  - 그를 말미암아 하나님께 신뢰하는 자들
  lexicon: BDAG
  rationale: πιστούς를 명사적 「믿는 자들」로 옮긴다. 일부 사본은 πιστεύοντας(분사 「믿는」)로 읽지만 의미는 거의 동일하다.
- source_word: τὸν ἐγείραντα αὐτὸν ἐκ νεκρῶν
  english_pob_choice: who raised him from the dead
  chosen_korean: 그분을 죽은 자들 가운데서 일으키시고
  alternatives_korean:
  - 그를 죽은 자들로부터 다시 살리신
  lexicon: BDAG
  rationale: 부활 정형 ἐκ νεκρῶν을 「죽은 자들 가운데서」로 유지하여 1:3과 통일.
- source_word: δόξαν αὐτῷ δόντα
  english_pob_choice: gave him glory
  chosen_korean: 그분께 영광을 주신
  alternatives_korean:
  - 그에게 영광을 부여하신
  lexicon: BDAG
  rationale: 부활-영광-승귀의 흐름을 그대로 살린다.
