translation:
  language: es
  text: 'Y el ángel de Yahvé le dijo: «¿Por qué preguntas por mi nombre, pues es maravilloso[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘más allá de entender’, ‘incomprensible’ o quizá ‘secreto’. La palabra hebrea denota algo extraordinario o demasiado maravilloso para captarlo plenamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar ‘mensajero’ o ‘ángel’; en este contexto narrativo se trata de un ser celestial, por lo que ‘ángel’ comunica naturalmente el valor del término. יְהוָה se mantiene como ‘Yahvé’ según el criterio del proyecto, preservando el nombre divino.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué entonces?
  - ¿A qué viene esto?
  lexicon: HALOT
  rationale: La expresión formula una pregunta retórica. ‘¿Por qué?’ conserva la fuerza directa y no sobretraduce el hebreo.
- source_word: תִּשְׁאַל לִשְׁמִי
  english_pob_choice: do you ask my name
  chosen_spanish: preguntas por mi nombre
  alternatives_spanish:
  - inquieres por mi nombre
  - preguntas mi nombre
  lexicon: HALOT
  rationale: שׁאל con ל más ‘nombre’ indica preguntar o inquirir acerca del nombre de alguien. ‘Preguntas por mi nombre’ suena natural en español y mantiene el sentido relacional del hebreo.
- source_word: וְהוּא
  english_pob_choice: seeing it is
  chosen_spanish: viendo que es
  alternatives_spanish:
  - pues es
  - ya que es
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la pregunta anterior. ‘Viendo que es’ refleja mejor el valor explicativo que un simple ‘y es’.
- source_word: פֶלִאי
  english_pob_choice: wonderful
  chosen_spanish: maravilloso
  alternatives_spanish:
  - extraordinario
  - incomprensible
  - más allá de entender
  lexicon: HALOT
  rationale: El adjetivo expresa algo extraordinario y admirable, fuera del alcance ordinario de comprensión. ‘Maravilloso’ conserva el valor lexical sin resolver la posible carga teológica del término.
theological_decisions:
- issue: Posible peso teofánico o cristológico de פֶלִאי
  english_pob_reading: Render the adjective lexically as 'wonderful' without making the translation itself resolve the identity of the angel.
  chosen_spanish_reading: Traducir el adjetivo de manera léxica como ‘maravilloso’ sin que la versión cierre la identidad del ángel.
  alternative_spanish_readings:
  - ‘incomprensible’
  - ‘más allá de entender’
  - tratarlo como título
  rationale: El hebreo permite una resonancia teológica, pero la traducción no debe imponer una conclusión doctrinal. ‘Maravilloso’ mantiene la tensión del texto y deja abierta la reflexión.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: Esta redacción sigue la revisión final del POB en inglés, que prefirió ‘seeing it is wonderful’ para reflejar con mayor precisión la conjunción hebrea, manteniendo el registro formal; la versión española imita ese matiz con ‘viendo que es maravilloso’.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - Se usa ‘ángel’ en vez de ‘mensajero’ por el contexto narrativo sobrenatural.
  - El adjetivo ‘maravilloso’ mantiene la ambigüedad teológica del hebreo sin explicitarla.
  - El marcador de nota [a] aparece en el texto principal y corresponde exactamente a la nota lexical adjunta.
