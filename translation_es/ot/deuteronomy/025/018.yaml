  glossary_alignment: 'Cumple con la terminología del proyecto en este versículo: אֱלֹהִים se traduce como «Dios» y no hay conflictos con otros términos de glosario. La decisión de mantener el singular en «no temió a Dios» coincide con la justificación teológica auditada.'
