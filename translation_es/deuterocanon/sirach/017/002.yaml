review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: días limitados, un tiempo determinado y autoridad sobre lo que está sobre la tierra. Sin embargo, hay un problema de concordancia pronominal en español: el griego tiene αὐτοῖς (''a ellos'') en ambas cláusulas, pero el borrador pasa a singular en la segunda (''y le dio autoridad''), lo cual altera el referente colectivo humano del texto.'
  spanish_quality_summary: El español es claro y digno, pero la inconsistencia entre 'Le dio' y luego 'le dio' después de una primera referencia plural implícita suena descuidada y menos fiel. Además, 'las cosas que hay en ella' es comprensible, aunque 'las cosas que hay sobre ella' preserva mejor el valor de ἐπ᾿. Aun así, puede mantenerse la formulación más natural con nota literal si se corrige la concordancia principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Autoridad' para ἐξουσίαν y 'tiempo señalado' para καιρόν son adecuados. La nota alternativa 'un tiempo fijado' funciona, aunque convendría eliminar el anglicismo residual 'appointed' en las decisiones léxicas internas del YAML; no afecta directamente el texto bíblico mostrado.
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en el destinatario
    rationale: El griego repite αὐτοῖς ('a ellos') en ambas cláusulas. El borrador español dice 'Le dio...' y luego 'y le dio autoridad...', lo que introduce singular y debilita la referencia colectiva a la humanidad.
  - severity: low
    issue: La expresión 'en ella' suaviza la preposición griega 'sobre'
    rationale: τῶν ἐπ᾿ αὐτῆς significa literalmente 'las cosas sobre ella'. La traducción actual es natural y está explicada por nota, pero una formulación más cercana puede mejorar la fidelidad sin perder claridad.
  revised_spanish_text: Les dio un número fijo de días y un tiempo señalado[b][a], y les dio autoridad sobre las cosas que hay sobre ella.
  revised_footnotes:
  - marker: a
    text: Literalmente, «las cosas sobre ella»; el pronombre probablemente remite a la tierra mencionada en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «un tiempo fijado».'
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia para reflejar el plural αὐτοῖς en ambas cláusulas y se ajusta la frase final para acercarla un poco más a ἐπ᾿ αὐτῆς, manteniendo un español natural y fiel al razonamiento léxico documentado.
