translation:
  language: es
  text: 'Por tanto, así dice el Señor Dios, Yahvé de los ejércitos: No temas[a], mi pueblo, que habita en Sion, a causa de Asiria. Él te golpeará con la vara, y alzará su vara contra ti, a la manera de Egipto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No tengas miedo».
    reason: lexical_alternative
  - marker: b
    text: O «en el camino de Egipto»; probable alusión a la antigua opresión de Egipto sobre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Por consiguiente
  lexicon: HALOT
  rationale: Marca de inferencia discursiva que enlaza con lo anterior; «Por tanto» conserva la relación lógica con registro natural en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así dijo
  - esto dice
  lexicon: HALOT
  rationale: Fórmula profética estable; en español, el presente «dice» mantiene la vivacidad performativa del oráculo.
- source_word: אֲדֹנָי יְהוִה צְבָאוֹת
  english_pob_choice: the Lord GOD of hosts
  chosen_spanish: el Señor Yahvé de los ejércitos
  alternatives_spanish:
  - el Señor Dios de los ejércitos
  - el Señor Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva la combinación especial de título más nombre divino con la forma «Yahvé», conforme al criterio del proyecto para YHWH. «de los ejércitos» traduce צְבָאוֹת de modo directo y bíblico.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: Prohibición directa y pastoral; «No temas» es la forma más concisa y fiel al imperativo hebreo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: Aunque «mi pueblo» es literal, «pueblo mío» suena más natural en vocativo español y conserva la relación de posesión/covenio.
- source_word: יֹשֵׁב צִיּוֹן
  english_pob_choice: who dwell in Zion
  chosen_spanish: que habitas en Sion
  alternatives_spanish:
  - habitante de Sion
  - que mora en Sion
  lexicon: HALOT
  rationale: El participio singular funciona colectivamente; en español, el singular vocativo «habitas» reproduce el sentido colectivo sin sonar forzado.
- source_word: מֵאַשּׁוּר
  english_pob_choice: because of Assyria
  chosen_spanish: a causa de Asiria
  alternatives_spanish:
  - por Asiria
  - debido a Asiria
  lexicon: HALOT
  rationale: La preposición expresa el motivo o fuente del temor; «a causa de» comunica esa relación con naturalidad.
- source_word: בַּשֵּׁבֶט
  english_pob_choice: with the rod
  chosen_spanish: con la vara
  alternatives_spanish:
  - con el cetro
  - con el bastón
  lexicon: HALOT
  rationale: Se mantiene el valor instrumental; «vara» es un equivalente bíblico claro para el instrumento de golpe/opresión.
- source_word: יַכֶּכָּה
  english_pob_choice: He will strike you
  chosen_spanish: te golpeará
  alternatives_spanish:
  - te herirá
  - te azotará
  lexicon: HALOT
  rationale: El verbo puede abarcar golpear o herir; «golpeará» preserva la fuerza física sin cargar más de lo que exige el contexto.
- source_word: וּמַטֵּהוּ יִשָּׂא עָלֶיךָ
  english_pob_choice: and he will lift up his staff against you
  chosen_spanish: y levantará su bastón contra ti
  alternatives_spanish:
  - y alzará su vara contra ti
  - y blandirá su bastón contra ti
  lexicon: HALOT
  rationale: נָשָׂא con עַל comunica alzar/levantar en actitud hostil. «Bastón»/«vara» son opciones posibles; aquí se eligió «bastón» para diferenciarlo de בַּשֵּׁבֶט y evitar redundancia excesiva.
- source_word: בְּדֶרֶךְ מִצְרָיִם
  english_pob_choice: in the manner of Egypt
  chosen_spanish: como en el camino de Egipto
  alternatives_spanish:
  - al modo de Egipto
  - como en la forma de Egipto
  - en la manera de Egipto
  lexicon: HALOT
  rationale: Se conserva la ambigüedad y la posible alusión histórica del hebreo. «Camino» deja abierta la lectura de modo/ruta y refleja la reserva del texto, aunque no resuelve la imagen.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD of hosts
  chosen_spanish_reading: el Señor Yahvé de los ejércitos
  alternative_spanish_readings:
  - el Señor Dios de los ejércitos
  - el Señor Yahvé
  rationale: Se sigue la política del proyecto de traducir YHWH como «Yahvé», evitando la máscara devocional «SEÑOR» y preservando el nombre propio del pacto. El título compuesto mantiene la solemnidad del oráculo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alusión histórica en בְּדֶרֶךְ מִצְרָיִם
  english_pob_reading: in the manner of Egypt
  chosen_spanish_reading: como en el camino de Egipto
  alternative_spanish_readings:
  - en el modo de Egipto
  - como en la manera de Egipto
  rationale: La expresión probablemente evoca la opresión egipcia de Israel como modelo del castigo asirio. La redacción elegida conserva la tensión entre ruta literal e imitación histórica sin resolverla de forma explicativa en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y se indicó que no requería cambios sustanciales; este borrador conserva la lectura auditada, con ajuste de estilo español para mayor naturalidad y consistencia con la terminología del proyecto.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para YHWH conforme al criterio del proyecto.
  - Se traduce צְבָאוֹת como «de los ejércitos» en lugar de «de las huestes» por claridad y consistencia.
  - «No temas» mantiene el imperativo breve y reverberante del hebreo.
  - La alusión final se deja abierta para respetar la ambigüedad histórica-teológica del hebreo.
