review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: Israel debe adquirir comida y agua de los edomitas mediante pago, no tomarlos por fuerza. También sigue correctamente la revisión inglesa más reciente al mantener la coordinación directa (''y comerás ... y beberás'') en vez de una cláusula explícita de finalidad. Sin embargo, hay un problema gramatical importante: el hebreo está en segunda persona plural, pero el español usa segunda singular (''comprarás ... comerás ... beberás''). Además, ''de ellos'' suena poco natural en español bíblico claro; ''a ellos'' o ''de ellos'' debe ajustarse según el verbo, y aquí lo más idiomático es ''les comprarán'' / ''les comprarán agua''.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero no suena del todo natural ni gramaticalmente coherente para una audiencia eclesial amplia. El mayor problema es la discordancia de número verbal. También conviene mejorar la fluidez reemplazando ''de ellos'' por una construcción idiomática en español. La nota al pie actual está mal anclada: el marcador está sobre ''comida'', pero la nota trata de ''y comerás''.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. ''Comida'', ''agua'' y ''con plata'' están bien alineados con las decisiones auditadas. El ajuste necesario es gramatical y estilístico: segunda persona plural y una construcción española más natural para la compra a los edomitas. La decisión de conservar ''plata'' en vez de ''dinero'' sigue correctamente el criterio del POB.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a singular
    rationale: 'Los verbos hebreos תִּשְׁבְּרוּ, וַאֲכַלְתֶּם, תִּכְרוּ, וּשְׁתִיתֶם son 2mp. El español debe reflejar plural: ''comprarán/comerán/beberán'' o una forma equivalente según la política de tratamiento. El singular ''comprarás'' altera la referencia del mandato.'
  - severity: medium
    issue: Construcción poco natural 'comprar ... de ellos'
    rationale: Aunque calca 'from them', en español estándar y natural aquí suena mejor 'les comprarán comida' / 'les comprarán agua' o 'comprarán de ellos' evitándolo. La traducción debe ser fiel pero idiomática.
  - severity: medium
    issue: Nota al pie mal ubicada
    rationale: El marcador [a] aparece en 'comida', pero el contenido de la nota explica la secuencia verbal 'y comerán' / 'y beberán'. El anclaje debe ponerse en la frase verbal pertinente o eliminarse si no se conservará la nota.
  - severity: low
    issue: La nota al pie no refleja bien la revisión inglesa actual
    rationale: La nota dice 'O, más literalmente, «y comerás»', pero el texto principal ya usa justamente esa forma coordinada. Si se conserva una nota, debe explicar la alternativa funcional 'para que coman/beban' frente al hebreo más formal 'y comerán/y beberán', no repetir el mismo texto principal.
  revised_spanish_text: Les comprarán comida con plata, y comerán[a]; y también les comprarán agua con plata, y beberán.
