translation:
  language: es
  text: 'Entonces Amnón se acostó y fingió estar enfermo. Cuando el rey vino a verlo, Amnón le dijo al rey: «Por favor, permite que venga Tamar, mi hermana, y prepare dos pasteles[a] delante de mis ojos, para que yo coma de su mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pasteles» traduce de manera amplia el hebreo לְבִבֹת, cuyo tipo exacto de alimento no puede determinarse con certeza; también podría entenderse como «tortas» o «pastelillos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se echó
  - se tendió
  lexicon: WLC/HALOT
  rationale: El hebreo indica que Amnón se puso en cama como parte de su plan. «Se acostó» es natural en español moderno y conserva el movimiento narrativo sin añadir énfasis innecesario.
- source_word: וַיִּתְחָל
  english_pob_choice: pretended to be sick
  chosen_spanish: fingió estar enfermo
  alternatives_spanish:
  - simuló estar enfermo
  - se hizo el enfermo
  lexicon: WLC/HALOT
  rationale: El hitpael comunica simulación de enfermedad, no una dolencia real. «Fingió estar enfermo» expresa claramente el engaño con un español digno y directo.
- source_word: לִרְאֹתוֹ
  english_pob_choice: to see him
  chosen_spanish: a verlo
  alternatives_spanish:
  - a visitarlo
  - para verlo
  lexicon: WLC/HALOT
  rationale: La construcción hebrea es literalmente «verlo». En contexto implica una visita, pero «a verlo» conserva la referencia directa del texto fuente.
- source_word: תָּבוֹא נָא
  english_pob_choice: Please let ... come
  chosen_spanish: deja que venga
  alternatives_spanish:
  - por favor, permite que venga
  - te ruego que venga
  lexicon: WLC/HALOT
  rationale: La petición cortés dirigida al rey se expresa de forma natural en español con imperativo suave. «Por favor» está añadido implícitamente por el contexto de נָא, y se mantiene en la cita completa.
- source_word: תָּמָר אֲחֹתִי
  english_pob_choice: Tamar my sister
  chosen_spanish: Tamar, mi hermana
  alternatives_spanish:
  - mi hermana Tamar
  lexicon: WLC/HALOT
  rationale: Se conserva el orden cercano al hebreo y la apposición fraterna. La coma ayuda a leer el nombre y la relación sin sonar forzado.
- source_word: וּתְלַבֵּב
  english_pob_choice: make
  chosen_spanish: prepare
  alternatives_spanish:
  - hacer
  - cocinar
  lexicon: WLC/HALOT
  rationale: El verbo raro alude a la preparación de un alimento especial, y el propio contexto inmediato aclara que se trata de levivot. «Prepare» evita precisar indebidamente el procedimiento culinario.
- source_word: לְעֵינַי
  english_pob_choice: before my eyes
  chosen_spanish: delante de mis ojos
  alternatives_spanish:
  - ante mis ojos
  - en mi presencia
  lexicon: WLC/HALOT
  rationale: La imagen visual se conserva literalmente. «Delante de mis ojos» mantiene la concreción del hebreo y el matiz de que Amnón quiere verla hacerlo.
- source_word: שְׁתֵּי לְבִבֹת
  english_pob_choice: two cakes
  chosen_spanish: dos tortas
  alternatives_spanish:
  - dos pasteles
  - dos panes
  lexicon: WLC/HALOT
  rationale: La POB inglesa retiró «heart-shaped» por falta de base explícita. En español, «tortas» funciona como término amplio para una clase de pan/cake y evita una especificación no sustentada por el hebreo.
- source_word: וְאֶבְרֶה
  english_pob_choice: so that I may eat
  chosen_spanish: para que yo coma
  alternatives_spanish:
  - para que yo pueda comer
  - y yo coma
  lexicon: WLC/HALOT
  rationale: La forma expresa finalidad. «Para que yo coma» reproduce de modo natural el propósito de la acción solicitada.
- source_word: מִיָּדָהּ
  english_pob_choice: from her hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de la mano de ella
  - con sus manos
  lexicon: WLC/HALOT
  rationale: Se conserva la expresión idiomática hebrea sobre recibir alimento directamente de ella. «De su mano» es sobrio y fiel.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión auditada del POB inglés, que retiró «heart-shaped» de la versión principal por no estar explícito en el hebreo. Por eso la línea española usa un término general («tortas») y deja la precisión abierta en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se usa «fingió estar enfermo» para reflejar el valor de simulación del verbo hebreo, sin suavizarlo a una simple descripción de estado.
  - La expresión «de su mano» conserva el matiz relacional e íntimo del hebreo.
  - La puntuación de la cita directa sigue el uso estándar del español moderno.
