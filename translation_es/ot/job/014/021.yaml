review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los hijos alcanzan honor o son honrados, luego son abatidos, mientras el hombre no lo sabe ni lo percibe. Sin embargo, «quedan abatidos» introduce un matiz más emocional/estativo que el contraste de rebajamiento social o reducción implícito en וְיִצְעֲרוּ. «Son humillados» o «son rebajados» preserva mejor la oposición con «honrados».'
  spanish_quality_summary: El español es claro y natural, con buen ritmo. «Sus hijos llegan a ser honrados» es aceptable, aunque algo más pesado que «sus hijos alcanzan honra» o «son honrados». La principal mejora necesaria es léxica en la segunda cláusula para mantener mejor el paralelismo antitético. También conviene pulir la nota para reflejar con más precisión la alternativa inglesa auditada.
  glossary_alignment: No hay términos del glosario principal en juego. «Sus hijos» es una buena representación de בָנָיו en español natural, manteniendo el masculino plural sin sobreexplicar. «Percibe» para בין funciona bien en contexto. La nota alternativa debe conservar la opción «son honrados» como variante léxica documentada.
  issues:
  - severity: medium
    issue: «quedan abatidos» debilita el contraste léxico con «honrados»
    rationale: וְיִצְעֲרוּ, en contraste con יִכְבְּדוּ, apunta a ser rebajados, disminuidos o humillados. «Abatidos» en español suele sugerir desánimo o postración emocional, menos nítido que la reversión de honor/posición del hebreo y del POB inglés.
  - severity: low
    issue: La nota al pie no preserva del todo la alternativa documentada
    rationale: La alternativa inglesa conserva explícitamente «are honored». En español conviene reflejar de forma más directa «son honrados» y ajustar la segunda cláusula al mismo mejoramiento léxico del texto revisado.
