id: COL.3.10
reference: Colossians 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐνδυσάμενοι τὸν νέον τὸν ἀνακαινούμενον εἰς ἐπίγνωσιν κατ’ εἰκόνα τοῦ κτίσαντος αὐτόν,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/010.yaml
  text: and have put on the new self, which is being renewed in knowledge according to the image of the one who created it,
translation:
  language: ko
  text: 새 사람[a]을 입었으니, 이 새 사람은 그를 창조하신 분의 형상을 따라 지식[b]에 이르도록 새로워지고 있는 자입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「새 자아」. 9절의 「옛 사람」과 대조되는 바울의 인간학적 표현.
    reason: lexical_alternative
  - marker: b
    text: 또는 「온전한 앎」. 헬라어 ἐπίγνωσις는 깊고 충만한 인식의 어감을 담을 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδυσάμενοι
  english_pob_choice: have put on
  chosen_korean: 입었으니
  alternatives_korean:
  - 입은 자들이며
  - 입었고
  lexicon: BDAG
  rationale: 부정과거 중간 분사. 의복 비유의 완료된 행위를 「입었으니」로 옮긴다.
- source_word: τὸν νέον
  english_pob_choice: the new self
  chosen_korean: 새 사람
  alternatives_korean:
  - 새 자아
  - 새 인간
  lexicon: BDAG
  rationale: 9절 「옛 사람」과 어휘적 대조 유지. 한국 교회의 정립된 「새 사람」 사용.
- source_word: τὸν ἀνακαινούμενον
  english_pob_choice: which is being renewed
  chosen_korean: 새로워지고 있는 자
  alternatives_korean:
  - 새롭게 되고 있는 자
  - 갱신되고 있는 자
  lexicon: BDAG
  rationale: 현재 수동 분사로 지속적 갱신 과정을 「새로워지고 있는」으로 옮긴다.
- source_word: εἰς ἐπίγνωσιν
  english_pob_choice: in knowledge
  chosen_korean: 지식에 이르도록
  alternatives_korean:
  - 온전한 앎으로
  - 앎을 향하여
  lexicon: BDAG
  rationale: εἰς는 방향·결과. 「지식에 이르도록」으로 갱신의 목표를 표현한다.
- source_word: κατ’ εἰκόνα τοῦ κτίσαντος αὐτόν
  english_pob_choice: according to the image of the one who created it
  chosen_korean: 그를 창조하신 분의 형상을 따라
  alternatives_korean:
  - 창조자의 형상에 따라
  - 그것을 지으신 분의 형상에 따라
  lexicon: BDAG
  rationale: 창세기 형상 언어의 반향. 「형상」은 글로사리 기본. 「그를」로 새 사람의 인격적 함의 보존.
