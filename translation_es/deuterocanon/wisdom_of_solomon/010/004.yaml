translation:
  language: es
  text: Por causa de él, cuando la tierra estaba siendo inundada, la sabiduría la salvó de nuevo, pilotando al hombre justo por medio de un humilde trozo de madera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de un humilde/insignificante trozo de madera». La expresión alude al arca y subraya el medio material humilde por el cual la sabiduría preservó al hombre justo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δι' ὃν
  english_pob_choice: Because of him
  chosen_spanish: Por causa de él
  alternatives_spanish:
  - Porque por él
  - A causa de él
  - Por él
  lexicon: LSJ
  rationale: El griego expresa relación causal con el antecedente inmediato; en español, «por causa de él» conserva esa fuerza causal sin volver demasiado literal una construcción que sonaría dura.
- source_word: κατακλυζομένην
  english_pob_choice: was being flooded
  chosen_spanish: era inundada
  alternatives_spanish:
  - estaba siendo inundada
  - era anegada
  - era cubierta por el diluvio
  lexicon: LSJ
  rationale: El participio pasivo imperfectivo se rinde mejor con una forma pasiva natural en español. «Era inundada» mantiene la acción en curso y el contexto del diluvio.
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra habitada
  - el mundo
  lexicon: LSJ
  rationale: En este contexto de diluvio, γῆ puede abarcar tierra/terreno o la tierra en sentido amplio. «La tierra» es la opción más natural y suficientemente amplia en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: LSJ
  rationale: «De nuevo» reproduce el valor de renovación o repetición del adverbio sin carga estilística excesiva.
- source_word: διέσωσεν
  english_pob_choice: saved it
  chosen_spanish: la salvó
  alternatives_spanish:
  - la preservó
  - la libró con seguridad
  - la hizo pasar a salvo
  lexicon: LSJ
  rationale: El compuesto comunica salvar atravesando un peligro. «La salvó» es conciso y fiel; el objeto femenino concuerda con «la tierra».
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - Sabiduría
  - la Sabiduría
  lexicon: LSJ
  rationale: El texto griego presenta σοφία como agente personificado, pero el audit trail inglés la deja en minúscula. En español, mantener «la sabiduría» conserva la personificación sin elevarla a nombre propio.
- source_word: δι' εὐτελοῦς ξύλου
  english_pob_choice: by means of a humble piece of wood
  chosen_spanish: por medio de un humilde trozo de madera
  alternatives_spanish:
  - por medio de un trozo de madera humilde
  - mediante un humilde pedazo de madera
  - por medio de un insignificante trozo de madera
  lexicon: LSJ
  rationale: εὐτελοῦς señala bajeza de valor, modestia o poca apariencia; «humilde» preserva esa fuerza sin la connotación moderna de calidad deficiente que tendría «barato». «Trozo de madera» deja abierto el referente al arca de modo natural en español.
- source_word: τὸν δίκαιον
  english_pob_choice: the righteous man
  chosen_spanish: al hombre justo
  alternatives_spanish:
  - al justo
  - al hombre recto
  - al hombre righteous
  lexicon: LSJ
  rationale: El referente inmediato es Noé. «Hombre justo» traduce δικαίος con el valor moral/legal de «justo» y mantiene la referencia masculina singular con claridad.
- source_word: κυβερνήσασα
  english_pob_choice: steering
  chosen_spanish: guiando
  alternatives_spanish:
  - dirigiendo
  - pilotando
  - navegando
  lexicon: LSJ
  rationale: Aunque el verbo es náutico y literalmente remite a gobernar o pilotar una nave, en español «guiando» preserva la acción directiva dentro de una construcción fluida y no técnica. El matiz marítimo queda sugerido por el contexto del arca.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: wisdom is rendered as an active personified agent without capitalization
  chosen_spanish_reading: la sabiduría aparece como agente activo personificado, sin capitalización
  alternative_spanish_readings:
  - Sabiduría como título casi propio
  - la Sabiduría
  rationale: El griego presenta σοφία actuando; traducirla como «la sabiduría» mantiene la personificación literaria sin imponer una afirmación hipostática más fuerte que el versículo por sí mismo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referente de 'él' y de 'el hombre justo'
  english_pob_reading: '''him'' refers to the unrighteous man in the previous verse; ''the righteous man'' refers to Noah'
  chosen_spanish_reading: «él» remite al impío del versículo anterior; «el hombre justo» es Noé
  alternative_spanish_readings:
  - porque él
  - al justo
  - el justo
  rationale: El vínculo causal depende del contexto inmediato del capítulo. Identificar el referente en una nota de trabajo evita ambigüedad sin introducir doctrina ajena al texto.
  doctrine_reference: Contexto literario inmediato de Sabiduría 10:3–4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «cheap piece of wood» a «humble piece of wood» para evitar una connotación moderna engañosa. La redacción española adopta ese ajuste con «humilde trozo de madera», manteniendo el matiz de bajeza o modestia de εὐτελοῦς y la imagen náutica de κυβερνήσασα.
  spanish_consistency_notes:
  - Se mantiene «sabiduría» en minúscula para conservar la personificación sin convertirla en nombre propio.
  - Se usa «la tierra» por el campo semántico amplio de γῆ en contexto de diluvio.
  - «Hombre justo» conserva el valor moral de δίκαιος y hace explícito el referente humano.
  - «Guiando» prioriza fluidez en español; el contexto del arca conserva el trasfondo náutico del griego.
