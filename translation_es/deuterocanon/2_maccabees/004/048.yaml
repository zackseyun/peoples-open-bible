translation:
  language: es
  text: Y liberó a Menelao, el causante de todo el mal, de entre los acusados; pero a aquellos hombres desdichados—que, aun si hubieran presentado su defensa ante los escitas[a], habrían sido absueltos[b]—a estos les decretó la muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, «que, aun si hubieran hablado ante los escitas». La mención de los escitas intensifica la ironía: incluso un pueblo estereotipado como severo los habría considerado sin culpa.'
    reason: cultural_note
  - marker: b
    text: 'O: «habrían quedado sin condena»; el griego expresa que habrían sido puestos en libertad como no condenados.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los sentenció a muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν μὲν τῆς ὅλης κακίας αἴτιον
  english_pob_choice: the cause of all the evil
  chosen_spanish: el causante de todo el mal
  alternatives_spanish:
  - el responsable de todo el mal
  - la causa de todo el mal
  lexicon: LSJ
  rationale: αἴτιος en esta construcción expresa responsabilidad causal. 'Causante' conserva la fuerza acusatoria y suena natural en español; 'mal' traduce bien κακία sin endurecerlo innecesariamente como 'maldad'.
- source_word: ἀπέλυσεν τῶν κατηγορημένων
  english_pob_choice: released ... from among the accused
  chosen_spanish: liberó ... de entre los acusados
  alternatives_spanish:
  - dejó libre ... de entre los acusados
  - absolvió ... de entre los acusados
  lexicon: BDAG
  rationale: ἀπολύω significa liberar/dejar libre. 'Liberó de entre los acusados' mantiene la imagen procesal sin convertirlo en una absolución formal que el griego no explicita por sí sola.
- source_word: ταλαιπώροις
  english_pob_choice: wretched men
  chosen_spanish: aquellos hombres desdichados
  alternatives_spanish:
  - aquellos hombres miserables
  - aquellos hombres míseros
  - aquellos hombres desventurados
  lexicon: LSJ
  rationale: ταλαιπώροις expresa desgracia y miseria conmovedora. 'Desdichados' preserva el tono patético en un español digno y claro.
- source_word: οἵτινες εἰ καὶ ἐπὶ Σκυθῶν ἔλεγον
  english_pob_choice: who, even if they had pleaded their case before Scythians
  chosen_spanish: que, aun si hubieran hablado en su defensa ante los escitas
  alternatives_spanish:
  - que, aunque hubieran argumentado su caso ante los escitas
  - que, aunque se hubieran defendido ante los escitas
  lexicon: LSJ
  rationale: La preposición ἐπί con genitivo tiene sentido forense de 'ante/en presencia de'. 'Hablado en su defensa' conserva ese sentido judicial y evita introducir una tecnicidad excesiva que el griego no exige.
- source_word: ἀπελύθησαν ἀκατάγνωστοι
  english_pob_choice: would have been acquitted
  chosen_spanish: habrían sido declarados inocentes
  alternatives_spanish:
  - habrían sido absueltos
  - habrían quedado sin condena
  lexicon: LSJ
  rationale: ἀκατάγνωστος significa 'no condenado' o 'sin culpa reconocida'. 'Declarados inocentes' comunica bien el resultado judicial; se evita 'absueltos' porque podría sugerir un tecnicismo legal más estrecho que el griego y el contexto.
- source_word: θάνατον ἀπέκρινεν
  english_pob_choice: he decreed death
  chosen_spanish: decretó la muerte
  alternatives_spanish:
  - les sentenció a muerte
  - pronunció muerte
  lexicon: LSJ
  rationale: ἀποκρίνω aquí es emitir una decisión/jucio. 'Decretó la muerte' sigue de cerca la forma griega y conserva el tono solemne del veredicto.
theological_decisions:
- issue: Tratamiento de Menelao y la imparcialidad judicial del pasaje
  english_pob_reading: Menelaus is released despite being the cause of all the evil, while the wretched men receive death
  chosen_spanish_reading: Menelao es liberado, aunque es el causante de todo el mal, y los hombres desdichados reciben la muerte
  alternative_spanish_readings:
  - Menelao queda libre
  - Menelao es absuelto
  rationale: El pasaje denuncia una inversión injusta del juicio. Mantener 'liberó' y 'decretó la muerte' preserva esa tensión moral y evita suavizarla con una formulación más neutral o más técnica de absolución.
  doctrine_reference: Justicia retributiva e ironía judicial en 2 Macabeos 4:48
translation_notes:
  revision_awareness: Tomé como base el texto griego de Swete y el audit trail inglés, especialmente la revisión que prefirió 'acquitted' para ἀπελύθησαν ἀκατάγνωστοι. En español, opté por 'declarados inocentes' para mantener la equivalencia judicial sin perder naturalidad, y conservé la ironía cultural de los escitas en nota.
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca en el versículo, sino como norma del proyecto para el Tetragrámaton cuando corresponda.
  - Mantuve 'causante' para αἴτιος por su valor causal y acusatorio; no lo suavicé a 'responsable' porque el contexto es judicial y moral.
  - Elegí 'liberó' en vez de 'absolvió' para ἀπέλυσεν, reservando la terminología más estricta para ἀκατάγνωστοι si el contexto la requiere.
  - Conservé una estructura de dos miembros contrastivos ('Menelao... pero a aquellos...') para reflejar el contraste enfático del griego.
