translation:
  language: es
  text: Y la hambruna estaba sobre toda la faz de la tierra, y José abrió todo lo que había en ellos[a] y vendió grano a Egipto, y la hambruna se agravó en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «abrió todo lo que había en ellos». El texto deja implícitos los recipientes o depósitos; el sentido es que José abrió los graneros o almacenes para distribuir provisiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la carestía
  lexicon: HALOT
  rationale: רָעָב puede referirse a hambre severa o a hambruna; en este contexto narrativo, 'hambre' mantiene naturalidad en español y conserva el sentido de crisis alimentaria general. 'Hambruna' también es posible, pero suena más interpretativa y menos directa para este versículo.
- source_word: עַל כָּל פְּנֵי הָאָרֶץ
  english_pob_choice: over all the face of the earth
  chosen_spanish: sobre toda la faz de la tierra
  alternatives_spanish:
  - sobre toda la superficie de la tierra
  - por toda la tierra
  lexicon: HALOT
  rationale: La imagen hebrea de 'faz de la tierra' puede reproducirse en español con un giro elevado y fiel. 'Tierra' aquí conserva el alcance amplio del idioma del relato, sin forzar una precisión geográfica que el contexto no exige.
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - abrió los graneros
  - desbloqueó
  lexicon: HALOT
  rationale: פתח significa literalmente 'abrir'. En el contexto se entiende que José abrió los depósitos o graneros, pero el hebreo no los nombra explícitamente; por eso se conserva el verbo simple en el texto principal, dejando la explicación implícita sin añadir un sustantivo no expresado.
- source_word: אֶת כָּל אֲשֶׁר בָּהֶם
  english_pob_choice: all that was in them
  chosen_spanish: todo lo que había en ellos
  alternatives_spanish:
  - todo lo que tenían dentro
  - todos los graneros
  lexicon: HALOT
  rationale: La expresión hebrea es elíptica y literalmente dice 'todo lo que había en ellos'. Mantener esa estructura en español respeta la forma del original; el antecedente de 'ellos' queda implícito por el contexto, y la nota puede aclarar que se trata de los depósitos o graneros.
- source_word: וַיִּשְׁבֹּר לְמִצְרַיִם
  english_pob_choice: sold grain to Egypt
  chosen_spanish: vendió trigo a Egipto
  alternatives_spanish:
  - vendió grano a Egipto
  - suministró trigo a Egipto
  lexicon: HALOT
  rationale: שׁבר en este contexto es un modismo de comercio de grano/provisiones. En español, 'vendió trigo' expresa la acción económica con naturalidad y claridad. 'Trigo' es una equivalencia funcional común para el alimento distribuido, aunque 'grano' también sería posible si se quisiera mayor neutralidad botánica.
- source_word: וַיֶּחֱזַק
  english_pob_choice: grew severe
  chosen_spanish: se agravó
  alternatives_spanish:
  - se hizo más fuerte
  - se intensificó
  - se volvió más severo
  lexicon: HALOT
  rationale: חזק aplicado al hambre comunica que el fenómeno se volvió más intenso o duro. 'Se agravó' es un español natural y digno que preserva la idea de empeoramiento sin perder el matiz de fuerza creciente.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en la tierra egipcia
  lexicon: HALOT
  rationale: '''La tierra de Egipto'' sigue de cerca la formulación hebrea y mantiene el tono narrativo tradicional del Pentateuco. ''En Egipto'' sería correcto, pero menos transparente respecto de la forma original.'
translation_notes:
  revision_awareness: El inglés POB revisó este versículo varias veces para resolver la elipsis de וַיִּפְתַּח / אֶת כָּל אֲשֶׁר בָּהֶם y para equilibrar literalidad con claridad. En español se siguió la línea posterior de conservar la apertura literal ('abrió') y la elipsis ('todo lo que había en ellos'), mientras que la idea distributiva de וַיִּשְׁבֹּר se expresó de forma natural como 'vendió trigo a Egipto'.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio para reproducir la secuencia narrativa.
  - '''faz de la tierra'' y ''tierra de Egipto'' preservan el paralelismo bíblico y la cadencia del hebreo.'
  - No se añadió 'graneros' en el texto principal para no sobreespecificar lo que el hebreo deja implícito.
  - '''trigo'' se usa como equivalente funcional de la provisión de cereal en este contexto, en armonía con el sentido comercial del verbo.'
  - No hay decisiones teológicas doctrinales en este versículo; el trabajo principal es léxico y sintáctico.
