  text: And when she came[a], she urged him to ask her father for the field. Then she dismounted from the donkey, and Caleb said to her[c][b], “What do you want?”
  footnotes:
  - marker: a
    text: Or, “she persuaded him” or “she incited him.” The Hebrew verb can carry a range from urging to inciting; here the context favors a neutral sense of urging.
    reason: lexical_alternative
  - marker: b
    text: Or, “she alighted from the donkey” or “she dropped down from the donkey.”
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom literally reads, “What is to you?” meaning “What do you want?” or “What is the matter?”
    reason: lexical_alternative
