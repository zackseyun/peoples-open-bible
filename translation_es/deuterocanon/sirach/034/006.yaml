translation:
  language: es
  text: A menos que sea enviado del Altísimo en visitación[a], no des tu corazón a ellas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al tiempo de la visitación» o «en inspección/observación divina».
    reason: alternative_reading
  - marker: b
    text: O «a esas cosas», refiriéndose a los sueños y experiencias semejantes mencionados en el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ
  english_pob_choice: Unless
  chosen_spanish: Si no
  alternatives_spanish:
  - A menos que
  - Salvo que
  lexicon: LSJ
  rationale: La construcción negativa condicional se expresa de forma natural en español con «si no», manteniendo la advertencia sin volverla pesada.
- source_word: παρὰ Ὑψίστου
  english_pob_choice: from the Most High
  chosen_spanish: por el Altísimo
  alternatives_spanish:
  - del Altísimo
  - desde el Altísimo
  lexicon: LSJ
  rationale: παρά con genitivo expresa fuente/origen; en español, «por el Altísimo» comunica mejor el agente/sendero del envío dentro de la pasiva, sin perder la procedencia divina.
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - Dios Altísimo
  - el Dios Altísimo
  lexicon: LSJ
  rationale: El título divino se traduce, no se translitera, conforme a la práctica del proyecto y a la inteligibilidad bíblica en español.
- source_word: ἀποσταλῇ
  english_pob_choice: it is sent
  chosen_spanish: es enviado
  alternatives_spanish:
  - sea enviado
  - fuera enviado
  lexicon: LSJ
  rationale: La voz pasiva del subjuntivo aoristo se refleja con una pasiva natural en español, preservando la condición de envío divino.
- source_word: ἐν ἐπισκοπῇ
  english_pob_choice: in visitation
  chosen_spanish: en visita
  alternatives_spanish:
  - en visitación
  - en inspección
  - en vigilancia
  lexicon: LSJ
  rationale: «ἐπισκοπή» puede significar visita, inspección u oversight. «Visita» conserva la ambigüedad semántica y suena más natural en español moderno que un calco más técnico.
- source_word: μὴ δῷς
  english_pob_choice: do not give
  chosen_spanish: no pongas
  alternatives_spanish:
  - no des
  - no entregues
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «no des», en español «no pongas tu corazón en ello» expresa con fidelidad el sentido idiomático de atención, apego o confianza interior, sin perder el mandato.
- source_word: εἰς αὐτὰ
  english_pob_choice: to them
  chosen_spanish: en ello
  alternatives_spanish:
  - en esas cosas
  - en ellas
  lexicon: LSJ
  rationale: El antecedente remite a sueños y experiencias afines del contexto; en español singularizar la referencia como «ello» evita una formulación rara y mantiene el carácter anafórico.
- source_word: τὴν καρδίαν σου
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu atención
  lexicon: LSJ
  rationale: «Corazón» preserva la antropología bíblica del centro interior de confianza y decisión, mejor que reducirlo a una facultad meramente mental.
theological_decisions:
- issue: Sentido de ἐν ἐπισκοπῇ
  english_pob_reading: '''In visitation'' may also be understood as ''at the time of visitation'' or ''in divine inspection/oversight.'''
  chosen_spanish_reading: «en visita» mantiene abierta la posibilidad de una visita, inspección u observación divina sin decidir entre ellas.
  alternative_spanish_readings:
  - en visitación
  - en inspección
  - en vigilancia divina
  - al tiempo de la visitación
  rationale: La frase griega es semánticamente amplia y el contexto de sabiduría advierte contra fiarse de sueños salvo que procedan verdaderamente de Dios. La traducción conserva esa tensión en vez de resolverla.
  doctrine_reference: Preservar la tensión textual y la ambigüedad teológica donde el griego la deja abierta.
translation_notes:
  revision_awareness: El borrador sigue la lectura final sin cambios indicada por el auditor, pero ajusta la sintaxis al español para que suene publicable sin perder las decisiones léxicas y la ambigüedad teológica documentadas. No se introdujeron revisiones nuevas respecto del pasaje fuente/inglés de auditoría.
  spanish_consistency_notes:
  - Se usó «Altísimo» para Ὑψίστου en lugar de una máscara tipo «SEÑOR», conforme al estándar del proyecto.
  - Se evitó «Cristo», pues no aparece en el versículo ni hay motivo auditado para una excepción.
  - Se mantuvo un registro bíblico sobrio y moderno; «no pongas tu corazón en ello» preserva el ímpetu idiomático del mandato mejor que una traducción demasiado literal.
  - Las notas al pie conservan la ambigüedad de ἐπισκοπῇ y la referencia anafórica de αὐτὰ sin sobreexplicar el contexto.
