translation:
  language: es
  text: 'Cuando el pueblo oyó estas palabras[a], dijo: «¿Qué favor habremos de retribuir a Simón y a sus hijos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué gratitud habremos de devolver a Simón y a sus hijos?». El griego χάρις puede significar favor, gracias o gratitud; con ἀποδώσομεν, la idea es recíproca, de devolver algo en respuesta a un beneficio recibido.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: LSJ
  rationale: Introduce la circunstancia temporal de manera natural en español y conserva el valor de inicio narrativo sin cargar innecesariamente δέ.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - había oído
  lexicon: LSJ
  rationale: En español narrativo, 'oyó' comunica con claridad el hecho de percibir lo dicho, sin añadir la implicación de atención voluntaria que tendría 'escuchó'.
- source_word: ὁ δῆμος
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  - la multitud
  lexicon: LSJ
  rationale: δῆμος designa al cuerpo colectivo que responde; 'el pueblo' mantiene ese matiz comunitario y resulta más natural que 'la gente' en tono histórico.
- source_word: τῶν λόγων τούτων
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas palabras dichas
  - estos dichos
  lexicon: LSJ
  rationale: λόγοι aquí se refiere a lo que se acaba de decir; 'palabras' preserva la referencia directa y es idiomático en español.
- source_word: Τίνα χάριν
  english_pob_choice: What favor
  chosen_spanish: ¿Qué favor
  alternatives_spanish:
  - ¿Qué gratitud
  - ¿Qué gracias
  - ¿Qué agradecimiento
  lexicon: LSJ
  rationale: En este contexto, χάρις tiene sentido recíproco de favor agradecido que se devuelve. 'Favor' mantiene esa ambigüedad entre benevolencia y gratitud sin forzar una sola acepción.
- source_word: ἀποδώσομεν
  english_pob_choice: shall we repay
  chosen_spanish: habremos de retribuir
  alternatives_spanish:
  - retribuiremos
  - habremos de pagar
  - devolveremos
  lexicon: LSJ
  rationale: ἀποδίδωμι expresa devolver, retribuir o pagar en retorno. 'Habremos de retribuir' conserva el matiz deliberativo y la idea de responder a un beneficio recibido con otro acto correspondiente.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: LSJ
  rationale: Nombre propio helenizado que en español bíblico se adapta normalmente como 'Simón'.
- source_word: τοῖς υἱοῖς αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos/descendientes
  lexicon: LSJ
  rationale: υἱοί significa literalmente 'hijos' o 'hijos varones'; en este contexto español, 'hijos' comunica bien el parentesco y evita una repetición forzada de la masculinidad que el plural ya implica.
theological_decisions:
- issue: Sentido de χάρις en una pregunta de reciprocidad
  english_pob_reading: What favor shall we repay to Simon and to his sons?
  chosen_spanish_reading: ¿Qué favor habremos de retribuir a Simón y a sus hijos?
  alternative_spanish_readings:
  - ¿Qué gratitud habremos de devolver a Simón y a sus hijos?
  - ¿Qué gracias habremos de dar a Simón y a sus hijos?
  rationale: La frase griega une χάρις con ἀποδίδωμι, por lo que el sentido no es solo 'agradecimiento' abstracto, sino una respuesta recíproca a un bien recibido. 'Favor' conserva la amplitud semántica y la tensión del texto, mientras 'retribuir' explicita el retorno.
  doctrine_reference: Lexical-theological nuance in reciprocal gratitude/favor language; no doctrinal claim beyond the text.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y coincide sustancialmente con la línea auditada en inglés. Se conservó la ambigüedad de χάρις mediante 'favor', evitando cerrar el sentido solo en 'gracias' o solo en 'gratitud', como ya advertía la nota inglesa. No se detectaron revisiones sustantivas en el pasaje auditado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'Simón' como forma española estable del nombre propio.
  - '''Hijos'' traduce υἱοί sin neutralización, en coherencia con la distinción lexical del original.'
  - La puntuación con comillas latinas y el orden sintáctico responden al español moderno bíblico, sin añadir contenido interpretativo.
