translation:
  language: es
  text: y el cinto de lino fino finamente torcido[a], y azul y púrpura y carmesí, obra de un bordador[b], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la faja» o «el cinturón».
    reason: lexical_alternative
  - marker: b
    text: También puede verterse «escarlata»; el hebreo se refiere a material teñido de este color.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַבְנֵט
  english_pob_choice: the sash
  chosen_spanish: el cinto
  alternatives_spanish:
  - la faja
  - el cinturón
  - el sash
  lexicon: HALOT
  rationale: אַבְנֵט designa la prenda cultual que ceñía al sacerdote. En español, «cinto» comunica una banda ceñida al cuerpo con registro digno y natural; «cinturón» suena más cotidiano, y «faja» puede sugerir usos no cultuales o regionales. Mantiene el objeto sin exagerar el sentido.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: finely twisted linen
  chosen_spanish: lino finamente torcido
  alternatives_spanish:
  - lino finamente retorcido
  - lino torcido finamente
  - lino de fino torcido
  lexicon: HALOT
  rationale: שֵׁשׁ es lino fino, y מָשְׁזָר aporta la idea de hilo/tejido torcido. «Lino finamente torcido» conserva el material y la cualidad de elaboración sin añadir material inexistente en la fuente.
- source_word: תְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul intenso
  - azul púrpura
  - azul
  lexicon: HALOT
  rationale: El término nombra el tinte/textil azul usado en el santuario. «Azul» es suficiente en el texto principal y mantiene la serie de colores sin forzar precisión no explicitada aquí.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura
  lexicon: HALOT
  rationale: אַרְגָּמָן refiere al tinte púrpura del tejido. «Púrpura» conserva el valor técnico y ceremonial mejor que un color más genérico.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - hilo carmesí
  - escarlata
  - carmín
  lexicon: HALOT
  rationale: La expresión denota material teñido de escarlata/carmesí. En español, «carmesí» funciona bien como color-textil solemne; el contexto ya indica que se trata de material tejido, por lo que no es necesario repetir «hilo» en el texto principal.
- source_word: מַעֲשֵׂה רֹקֵם
  english_pob_choice: the work of an embroiderer
  chosen_spanish: obra de un bordador
  alternatives_spanish:
  - trabajo de un bordador
  - obra bordada
  - obra de un artífice del bordado
  lexicon: HALOT
  rationale: La frase describe labor ornamental especializada. «Obra de un bordador» preserva el artesano y la técnica con un registro claro; «bordada» sería posible, pero perdería el énfasis en el oficio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto: el Tetragrámaton se vierte «Yahvé» en el texto principal español, no como sustitución por un título. Esto conserva el nombre propio del pacto, como en el auditable inglés POB.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - justamente como Yahvé mandó a Moisés
  lexicon: HALOT
  rationale: La fórmula marca obediencia exacta a la instrucción divina. «Tal como» refleja conformidad precisa con un español natural; el pluscuamperfecto («había mandado») reproduce el valor narrativo del inglés POB sin rigidizar el estilo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El verso contiene explícitamente el Tetragrámaton. Se mantiene el nombre propio del Dios del pacto con la forma establecida por el proyecto en español («Yahvé»), evitando la sustitución por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB ya fue revisado y quedó sin cambios. No se requieren ajustes textuales adicionales; la presente versión española sigue el mismo sentido auditado, manteniendo la lista de materiales, la técnica textil y la fórmula final de obediencia exacta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al criterio doctrinal del proyecto.
  - Se conserva una secuencia nominal compacta para los materiales textiles, en paralelo con el hebreo.
  - «Cinto» y «obra de un bordador» preservan el registro cultual sin caer en arcaísmos innecesarios.
  - La nota sobre «carmesí/escarlata» refleja la tensión léxica documentada sin sobrecargar el texto principal.
