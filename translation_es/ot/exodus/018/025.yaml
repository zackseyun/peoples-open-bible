base_translation:
  language: en
  yaml_path: translation/ot/exodus/018/025.yaml
  text: 'Moses chose capable men from all Israel and appointed them as heads over the people: commanders of thousands[a], commanders of hundreds, commanders of fifties[b], and commanders of tens.'
  footnotes:
  - marker: a
    text: Or 'able men.' The Hebrew phrase אַנְשֵׁי חַיִל can denote men of strength, competence, or proven worth; in this context it refers to qualified leaders.
    reason: lexical_alternative
  - marker: b
    text: Or 'leaders' or 'chiefs' over the people. The Hebrew uses 'heads' metaphorically for persons in authority.
    reason: lexical_alternative
