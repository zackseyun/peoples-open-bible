translation:
  language: es
  text: Así me han tocado meses de vacío[a], y noches de miseria[b] me han sido asignadas a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «meses de futilidad» o «meses de vanidad» para «meses de vacío».
    reason: lexical_alternative
  - marker: b
    text: O «noches de penalidades», «noches de aflicción» o «noches de angustia» para «noches de miseria».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: Introduce la conclusión o comparación con el versículo anterior. «Así» conserva la fuerza inferencial sin sonar rígido en español.
- source_word: הָנְחַ֣לְתִּי
  english_pob_choice: I have been allotted
  chosen_spanish: me han tocado
  alternatives_spanish:
  - me han sido asignados
  - he recibido en herencia
  - me han sido adjudicados
  lexicon: HALOT
  rationale: El verbo en pasivo comunica que Job recibe una porción impuesta, no elegida. «Me han tocado» es natural en español y conserva la idea de repartición/lote; en contexto de sufrimiento no sugiere herencia gozosa.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: El dativo se integra de manera natural en la construcción pasiva española.
- source_word: יַרְחֵי
  english_pob_choice: months of
  chosen_spanish: meses de
  alternatives_spanish:
  - meses
  - lunas de
  lexicon: HALOT
  rationale: Conserva el sustantivo temporal en plural y la relación de constructo con el sustantivo siguiente.
- source_word: שָׁוְא
  english_pob_choice: emptiness
  chosen_spanish: vacío
  alternatives_spanish:
  - vanidad
  - futilidad
  - inutilidad
  lexicon: HALOT
  rationale: El campo semántico incluye vacío, vanidad y futilidad. «Vacío» es claro, moderno y mantiene la idea de algo hueco o carente de propósito sin imponer una sola matización demasiado fuerte.
- source_word: וְלֵילוֹת
  english_pob_choice: and nights of
  chosen_spanish: y noches de
  alternatives_spanish:
  - y noches
  - y veladas de
  lexicon: HALOT
  rationale: Mantiene la coordinación con la primera expresión temporal y conserva la relación constructa con el sustantivo siguiente.
- source_word: עָמָל
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - fatiga
  - trabajo penoso
  - aflicción
  lexicon: HALOT
  rationale: En Job el término puede aludir a esfuerzo penoso, trouble, affliction o misery. «Miseria» expresa bien el tono de sufrimiento y desdicha de las noches sin forzar una connotación laboral.
- source_word: מִנּוּ
  english_pob_choice: have been assigned
  chosen_spanish: me han sido asignadas
  alternatives_spanish:
  - me han sido destinadas
  - me han sido apportionadas
  - me han sido fijadas
  lexicon: HALOT
  rationale: La forma pasiva comunica que estas noches han sido impuestas o designadas para Job. «Han sido asignadas» refleja esa idea de adjudicación sufrida.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: Se integra naturalmente con la pasiva española y mantiene el destinatario de la asignación.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se conservó el valor inferencial de כֵּן, la pasiva de הָנְחַ֣לְתִּי y מִנּוּ, y la ambigüedad lexical de שָׁוְא y עָמָל mediante notas alternativas sin borrar la tensión semántica.'
  spanish_consistency_notes:
  - Se usó «vacío» para שָׁוְא, en coherencia con el valor elegido por POB en inglés.
  - Se usó «miseria» para עָמָל, manteniendo el tono sufriente del contexto de Job.
  - La formulación pasiva en español evita convertir a Job en agente de su propia suerte.
