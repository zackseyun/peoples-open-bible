translation:
  language: es
  text: forma la luz y crea la oscuridad[a], hace la paz y crea la calamidad; yo soy Yahvé, que hace todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desastre» o «mal». El hebreo רָע puede significar mal, daño, desastre o calamidad; aquí, en contraste con «paz», probablemente se refiere a calamidad o adversidad más que a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹצֵר
  english_pob_choice: forming
  chosen_spanish: forma
  alternatives_spanish:
  - formando
  - moldea
  lexicon: HALOT
  rationale: El participio qal expresa una acción descriptiva y continua. «Forma» conserva esa fuerza verbal en español y evita volverlo un simple sustantivo. Se prefirió una forma verbal breve para mantener el paralelismo poético con «crea».
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: Es el equivalente léxico directo y mantiene el contraste poético con «oscuridad».
- source_word: וּבֹרֵא
  english_pob_choice: and creating
  chosen_spanish: y crea
  alternatives_spanish:
  - y creando
  - y crea
  lexicon: HALOT
  rationale: El participio de ברא se vierte con un verbo finito en español para una lectura fluida y digna, sin perder la acción durativa/descriptiva. «Crea» conserva el paralelismo con «forma» y el uso reverente de un verbo de actividad divina.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - oscuridad
  lexicon: HALOT
  rationale: «Oscuridad» es natural en español moderno y mantiene la antítesis directa con «luz». «Tinieblas» sería posible, pero aquí suena más literario y menos neutral.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» preserva la pareja antitética concisa con רָע y evita extender el sentido más allá de lo que exige el contexto. El artículo definido ayuda a que el paralelismo suene natural en español.
- source_word: רָע
  english_pob_choice: calamity
  chosen_spanish: calamidad
  alternatives_spanish:
  - desastre
  - adversidad
  - mal
  - mal moral
  lexicon: HALOT
  rationale: En contraste con שָׁלוֹם, רָע aquí apunta a desgracia, calamidad o adversidad, no a mal moral. «Calamidad» preserva la tensión teológica sin sugerir que Dios sea autor del mal moral. «Calamidad» también armoniza con el lenguaje profético de juicio.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: yo soy Yahvé
  alternatives_spanish:
  - yo soy Yahvé
  - yo, Yahvé
  lexicon: DOCTRINE.md contested terms / POB Spanish defaults
  rationale: Se mantiene el nombre divino como «Yahvé», según el estándar español del proyecto. «Yo soy» reproduce la autoidentificación enfática del hebreo, y el orden es natural en español.
- source_word: עֹשֶׂה כָל־אֵלֶּה
  english_pob_choice: who does all these things
  chosen_spanish: que hace todas estas cosas
  alternatives_spanish:
  - que hace todas estas cosas
  - que obra todas estas cosas
  - que hace todo esto
  lexicon: HALOT
  rationale: El participio final resume la acción soberana sobre todo lo mencionado. «Hace todas estas cosas» es claro y suficiente; conserva la amplitud de la agencia divina sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Cómo renderizar רָע en relación con la soberanía divina
  english_pob_reading: calamity
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - desastre
  - adversidad
  - mal
  rationale: 'El verso contrapone paz y רָע dentro de un marco de juicio y providencia. «Calamidad» deja intacta la tensión: Yahvé gobierna también la adversidad, pero la traducción no sugiere que cree el mal moral como tal. Esta lectura sigue el principio de no resolver la tensión teológica más allá del alcance lexical del texto.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. En español del proyecto, la forma establecida es «Yahvé», que preserva el nombre propio del pacto y evita la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase en inglés, sin cambios de revisión pendientes, y adapta las decisiones léxicas auditadas al español manteniendo el paralelo poético forma/crea y la tensión teológica sobre רָע.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar español del proyecto.
  - Se eligió «calamidad» para רָע para evitar una lectura de mal moral.
  - Se conservaron dos verbos paralelos breves («forma» / «crea») para reflejar la estructura participial del hebreo.
  - «La paz» y «la oscuridad» se usaron con artículo para naturalidad estilística sin alterar el sentido.
