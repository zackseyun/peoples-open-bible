translation:
  language: es
  text: Entonces fueron y llegaron a la región montañosa[a], y permanecieron allí tres días, hasta que los perseguidores regresaron. Los perseguidores buscaron por todo el camino, pero no los encontraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al monte» o «a las colinas». El hebreo probablemente se refiere a la región montañosa al oeste de Jericó, más que a una sola cumbre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: HALOT
  rationale: El verbo הלך en este contexto narrativo expresa desplazamiento simple; «fueron» es natural y conserva la secuencia narrativa sin añadir matices no presentes en el hebreo.
- source_word: וַיָּבֹאוּ הָהָרָה
  english_pob_choice: came to the hill country
  chosen_spanish: subieron a la región montañosa
  alternatives_spanish:
  - fueron al monte
  - subieron al monte
  - entraron en las colinas
  lexicon: HALOT
  rationale: La forma direccional הָהָרָה indica movimiento hacia la zona montañosa. En español, «región montañosa» comunica mejor el sentido geográfico que un singular literal como «el monte», y «subieron» refleja el movimiento ascendente implícito sin forzar una topografía específica.
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: stayed there
  chosen_spanish: permanecieron allí
  alternatives_spanish:
  - se quedaron allí
  - habitaron allí
  lexicon: HALOT
  rationale: ישב aquí denota permanecer temporalmente, no asentarse de modo permanente. «Permanecieron allí» es fiel y sobrio; evita la carga más duradera de «habitaron».
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  lexicon: HALOT
  rationale: Correspondencia directa y natural de la expresión cardinal-nombre.
- source_word: עַד שָׁבוּ הָרֹדְפִים
  english_pob_choice: until the pursuers returned
  chosen_spanish: hasta que los perseguidores regresaron
  alternatives_spanish:
  - hasta que volvieron los perseguidores
  - hasta que los que los perseguían regresaron
  lexicon: HALOT
  rationale: שוב significa «volver/regresar»; aquí el participio funciona sustantivamente como «los perseguidores». «Regresaron» mantiene el valor verbal y es idiomático en español.
- source_word: וַיְבַקְשׁוּ הָרֹדְפִים
  english_pob_choice: The pursuers searched
  chosen_spanish: Los perseguidores buscaron
  alternatives_spanish:
  - Los perseguidores los buscaron
  - Los perseguidores siguieron buscando
  lexicon: HALOT
  rationale: בקש en este contexto de persecución puede ser «buscar»; en español esa opción conserva el alcance amplio de la búsqueda sin añadir la especificidad de una inspección minuciosa que implicaría «registrar» o «buscar atentamente».
- source_word: בְּכָל הַדֶּרֶךְ
  english_pob_choice: all along the road
  chosen_spanish: por todo el camino
  alternatives_spanish:
  - a lo largo de todo el camino
  - en todo el camino
  lexicon: HALOT
  rationale: La frase indica la ruta recorrida en la búsqueda. «Por todo el camino» transmite bien la distribución espacial de כל y suena natural en español.
- source_word: וְלֹא מָצָאוּ
  english_pob_choice: but did not find them
  chosen_spanish: pero no los encontraron
  alternatives_spanish:
  - y no los hallaron
  - pero no dieron con ellos
  lexicon: HALOT
  rationale: מצא aquí requiere el objeto implícito por el contexto. «Encontraron» es el equivalente más transparente y común; «no los encontraron» conserva la referencia a los fugitivos.
translation_notes:
  revision_awareness: Se siguió el alineamiento de alta concordancia del borrador inglés POB y no se introdujeron revisiones sustantivas; la principal decisión de estilo en español fue resolver הָהָרָה como una región geográfica natural («región montañosa») y mantener el resto de la cláusula con correspondencia narrativa directa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece ningún nombre divino en el hebreo de este pasaje.
  - Se evitó «Cristo»/«Mesías» y otros términos teológicos porque el versículo es narrativo y no contiene esos lexemas.
  - «Perseguidores» conserva el valor sustantivo del participio hebreo y armoniza con el contexto de búsqueda y regreso.
  - La puntuación usa coma antes de la cláusula adversativa final para reflejar el contraste narrativo en español moderno.
