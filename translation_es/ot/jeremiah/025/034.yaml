translation:
  language: es
  text: ¡Aullad[a], pastores, y clamad; revolcaos en el polvo[b], señores[c] del rebaño, porque se han cumplido los días de vuestra matanza, y han llegado vuestras dispersiones[d], y caeréis como un vaso precioso[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Lamentad». El verbo hebreo denota una lamentación fuerte.
    reason: lexical_alternative
  - marker: b
    text: O «revolcaos». El hebreo probablemente se refiere a un gesto de duelo o humillación, como revolcarse en el polvo o la ceniza.
    reason: cultural_note
  - marker: c
    text: O «jefes» o «nobles del rebaño» para «señores del rebaño».
    reason: lexical_alternative
  - marker: d
    text: El hebreo de «vuestras dispersiones» es difícil; puede referirse a que seréis dispersados o esparcidos.
    reason: alternative_reading
  - marker: e
    text: O «un vaso deseable» o «un vaso escogido». La imagen es de algo valioso pero quebradizo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Aullad
  alternatives_spanish:
  - Lamentad
  - Gritad de dolor
  lexicon: HALOT
  rationale: El verbo denota lamentación fuerte y audible; «aullad» conserva la intensidad del lamento y puede funcionar en español bíblico sin volverse animalizante en este contexto.
- source_word: הָרֹעִים
  english_pob_choice: you shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - ustedes, pastores
  - los pastores
  lexicon: HALOT
  rationale: Conserva la metáfora pastoral del hebreo. El vocativo queda claro por el contexto y por la cadena imperativa.
- source_word: וְזַעֲקוּ
  english_pob_choice: and cry out
  chosen_spanish: y clamad
  alternatives_spanish:
  - y gritad
  - y alzad el grito
  lexicon: HALOT
  rationale: זעק expresa un grito fuerte de angustia; «clamad» mantiene ese valor de exclamación dolorosa y combina bien con el primer imperativo.
- source_word: וְהִתְפַּלְּשׁוּ
  english_pob_choice: roll in the dust
  chosen_spanish: revolcaos en el polvo
  alternatives_spanish:
  - rodad en el polvo
  - volvedos en el polvo
  lexicon: HALOT
  rationale: El hitpael aquí es un gesto de duelo/humillación. «Revolcaos en el polvo» comunica la acción y el carácter ritual del duelo sin perder la imagen corporal.
- source_word: אַדִּירֵי הַצֹּאן
  english_pob_choice: you lords of the flock
  chosen_spanish: lords del rebaño
  alternatives_spanish:
  - señores del rebaño
  - jefes del rebaño
  - nobles del rebaño
  lexicon: HALOT
  rationale: «Lords» se conserva porque el POB distingue la fuerza lexical de אַדִּירֵי como término de elevación/autoridad. Se deja el sustantivo inglés incrustado solo para reflejar el audit trail, ya que una traducción completamente española aquí habría suavizado el matiz; el vocativo sigue siendo comprensible por el contexto.
- source_word: כִּי מָלְאוּ יְמֵיכֶם לִטְבוֹחַ
  english_pob_choice: for the days of your slaughter are fulfilled
  chosen_spanish: porque se han cumplido los días de vuestra matanza
  alternatives_spanish:
  - porque se han llenado vuestros días para ser degollados
  - porque ha llegado el tiempo de vuestra matanza
  lexicon: HALOT
  rationale: Se mantiene el valor violento de טבח con «matanza», y «se han cumplido» reproduce היטב el sentido de plenitud/consumación temporal del hebreo y de la revisión inglesa.
- source_word: וּתְפוֹצוֹתִיכֶם
  english_pob_choice: and your dispersions have come
  chosen_spanish: y han llegado vuestras dispersiones
  alternatives_spanish:
  - y ha venido vuestro esparcimiento
  - y vuestra dispersión ha llegado
  lexicon: HALOT
  rationale: La forma hebrea es difícil; el POB toma el sentido nominal de dispersión. «Han llegado» sigue el hebreo/inglés de forma sobria, sin resolver de manera excesiva la ambigüedad textual.
- source_word: וּנְפַלְתֶּם
  english_pob_choice: and you will fall
  chosen_spanish: y caeréis
  alternatives_spanish:
  - y caerán
  - y os desplomaréis
  lexicon: HALOT
  rationale: Futuro directo y natural en español, conservando la caída como imagen de juicio.
- source_word: כִּכְלִי חֶמְדָּה
  english_pob_choice: like a precious vessel
  chosen_spanish: como un vaso precioso
  alternatives_spanish:
  - como un recipiente precioso
  - como un vaso deseable
  - como un objeto precioso
  lexicon: HALOT
  rationale: «Vaso» mantiene la imagen concreta de כלי y «precioso» refleja חֶמְדָּה como algo valioso/estimado, en línea con la nota inglesa sobre algo valioso pero frágil.
theological_decisions:
- issue: Mantener la metáfora pastoral en vez de explicitarla como liderazgo político
  english_pob_reading: Retain the pastoral metaphor in the main text rather than interpret it as 'rulers' or 'leaders.'
  chosen_spanish_reading: Conservar «pastores» y «rebaño» en el texto principal.
  alternative_spanish_readings:
  - traducir como «gobernantes» o «líderes»
  - explicitar «jefes del rebaño» en el texto principal
  rationale: El hebreo presenta la imagen pastoral; seguirla evita introducir interpretación en el cuerpo del versículo. La ambigüedad metafórica queda disponible para nota o comentario, no para reemplazo del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservar el lenguaje fuerte de juicio
  english_pob_reading: Keep 'slaughter' in the main text.
  chosen_spanish_reading: Mantener «matanza» en el texto principal.
  alternative_spanish_readings:
  - suavizar a «destrucción»
  - suavizar a «muerte»
  rationale: טבח es violento y concreto. «Matanza» preserva el tono judicial y la crudeza del oráculo sin eufemismo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB en inglés, conservando su ajuste de «the days of your slaughter are fulfilled» con un equivalente español natural («se han cumplido los días de vuestra matanza»), y manteniendo el giro difícil de «your dispersions have come» sin resolverlo de forma interpretativa. La traducción evita suavizar el juicio y conserva la metáfora pastoral del hebreo.
  spanish_consistency_notes:
  - Se usa «matanza» para טבח en coherencia con la preferencia POB por el lenguaje violento explícito.
  - Se conserva «pastores» y «rebaño» como metáfora no explicada en el texto principal.
  - «Vaso precioso» mantiene la concreción del hebreo כלי y la valoración de חֶמְדָּה.
  - La dificultad de תְּפוֹצוֹתִיכֶם se refleja con una traducción sobria y una nota de ambigüedad.
  - Se emplean formas verbales de mandato y futuro acordes al hebreo y naturales en español.
