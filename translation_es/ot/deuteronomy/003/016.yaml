translation:
  language: es
  text: Y a los rubenitas[a] y a los gaditas[b] les di desde Galaad hasta el valle del Arnón[c], el medio del valle como límite, y hasta el valle del Jaboc[d], el límite de los hijos de Amón[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tribu de Rubén». El hebreo usa un gentilicio tribal.
    reason: lexical_alternative
  - marker: b
    text: O «a la tribu de Gad». El hebreo usa un gentilicio tribal.
    reason: lexical_alternative
  - marker: c
    text: Hebreo נחל puede referirse a un arroyo, cauce seco o valle asociado; aquí se traduce «valle» porque la frase siguiente habla del medio del valle como límite.
    reason: lexical_alternative
  - marker: d
    text: Hebreo נחל puede referirse a un arroyo, cauce seco o valle asociado; aquí se traduce «valle» por coherencia con la referencia anterior y porque el contexto describe un límite territorial.
    reason: lexical_alternative
  - marker: e
    text: O «de los amonitas». El hebreo dice literalmente «los hijos de Amón», una expresión de parentesco para el pueblo de Amón.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרֻאוּבֵנִי
  english_pob_choice: to the Reubenites
  chosen_spanish: a los rubenitas
  alternatives_spanish:
  - a Rubén
  - a la tribu de Rubén
  lexicon: HALOT
  rationale: El gentilicio tribal está en plural distributivo y no se refiere al patriarca individual. «Rubenitas» conserva la referencia al grupo receptor de la heredad y suena natural en español bíblico actual.
- source_word: לַגָּדִי
  english_pob_choice: to the Gadites
  chosen_spanish: a los gaditas
  alternatives_spanish:
  - a Gad
  - a la tribu de Gad
  lexicon: HALOT
  rationale: Como en Rubén, el hebreo usa un gentilicio tribal. «Gaditas» mantiene la simetría con «rubenitas» y evita convertir el nombre propio en destinatario individual.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: les di
  alternatives_spanish:
  - les asigné
  - les concedí
  lexicon: HALOT
  rationale: «Dar» reproduce el verbo básico נתן sin añadir matices interpretativos. En este contexto territorial, el sentido de concesión/asignación queda implícito.
- source_word: מִן הַגִּלְעָד
  english_pob_choice: from Gilead
  chosen_spanish: desde Galaad
  alternatives_spanish:
  - de Galaad
  - desde la región de Galaad
  lexicon: HALOT
  rationale: «Desde» marca con claridad el punto de partida del límite territorial. Se conserva el topónimo sin añadir información geográfica que el hebreo no explicita.
- source_word: עַד נַחַל אַרְנֹן
  english_pob_choice: as far as the Arnon Valley
  chosen_spanish: hasta el valle del Arnón
  alternatives_spanish:
  - hasta el torrente del Arnón
  - hasta el wadi Arnón
  lexicon: HALOT
  rationale: נחל puede designar arroyo, cauce o valle asociado; aquí se sigue la lectura inglesa de «Valley» porque la cláusula siguiente habla del medio del valle como límite. «Valle del Arnón» es más claro para lectores hispanos y conserva la relación topográfica.
- source_word: תּוֹךְ הַנַּחַל
  english_pob_choice: the middle of the valley
  chosen_spanish: el medio del valle
  alternatives_spanish:
  - el centro del valle
  - el interior del valle
  lexicon: HALOT
  rationale: תוך expresa el centro o interior; «el medio del valle» es la forma más directa y refleja la función de esa franja como línea limítrofe.
- source_word: וּגְבֻל
  english_pob_choice: as a border
  chosen_spanish: como límite
  alternatives_spanish:
  - como frontera
  - como borde
  lexicon: HALOT
  rationale: El sustantivo funciona aquí en aposición explicativa. «Límite» es el término natural en español para una delimitación territorial y evita una traducción demasiado literal de «border».
- source_word: עַד יַבֹּק הַנַּחַל
  english_pob_choice: as far as the Jabbok Valley
  chosen_spanish: hasta el valle del Jaboc
  alternatives_spanish:
  - hasta el torrente del Jaboc
  - hasta el wadi Jaboc
  lexicon: HALOT
  rationale: Se mantiene la misma decisión tomada para נחל en la primera mitad del verso, por coherencia terminológica y porque la frase paralela también describe un tramo territorial.
- source_word: גְּבוּל בְּנֵי עַמּוֹן
  english_pob_choice: the border of the sons of Ammon
  chosen_spanish: el límite de los hijos de Amón
  alternatives_spanish:
  - la frontera de los amonitas
  - el límite de los amonitas
  lexicon: HALOT
  rationale: Se conserva la expresión de parentesco «hijos de Amón» porque el hebreo la usa de manera deliberada. Aunque «amonitas» sería más idiomático, aquí se prefiere la forma más cercana al texto fuente.
theological_decisions:
- issue: Expresión de parentesco para Amón
  english_pob_reading: the border of the sons of Ammon
  chosen_spanish_reading: el límite de los hijos de Amón
  alternative_spanish_readings:
  - el límite de los amonitas
  - la frontera de los amonitas
  rationale: 'No hay una tensión doctrinal, pero sí una decisión semántica importante: el hebreo usa una fórmula de parentesco étnico. Se conserva para no perder la textura del original, tal como hace la POB inglesa al preferir la expresión kinship antes que una etnónimo más libre.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente de la POB inglesa al usar una formulación más directa para la apposición territorial: «el medio del valle como límite». También conserva la decisión revisada de no introducir un equivalente explicativo adicional como «con el medio...», manteniendo la relación sintáctica estrecha del hebreo.'
  spanish_consistency_notes:
  - Se unificó נחל como «valle» en ambos casos para mantener coherencia terminológica con la POB inglesa y con la cláusula paralela sobre el medio del valle.
  - Se evitó «SEÑOR» y otras convenciones de máscara divina porque este verso no contiene el nombre divino.
  - Se prefirió «Amón» con tilde en español, conforme a la ortografía habitual de nombres bíblicos en español.
