translation:
  language: es
  text: Y pondré tu carne sobre los montes, y llenaré los valles con tu cadáver[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «con tu altura/lozano porte». El término hebreo es difícil, pero el contexto apunta al cuerpo caído de Faraón esparcido por la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will put
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y colocaré
  - Y pondré allí
  lexicon: HALOT
  rationale: נתן tiene un rango amplio de sentidos; en este contexto de juicio corporal y espacial, «poner» conserva la acción directa y resulta natural en español sin suavizar la imagen.
- source_word: בְּשָׂרְךָ
  english_pob_choice: your flesh
  chosen_spanish: tu carne
  alternatives_spanish:
  - tu cuerpo
  - tu carne
  lexicon: HALOT
  rationale: בשר designa literalmente «carne»; se mantiene la crudeza física del hebreo y del audit trail inglés, evitando una generalización a «cuerpo».
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes
  lexicon: HALOT
  rationale: «Montes» comunica bien la imagen topográfica en español bíblico y conserva la amplitud de הרים sin rebajarla a un término más débil.
- source_word: וּמִלֵּאתִי
  english_pob_choice: and I will fill
  chosen_spanish: y llenaré
  alternatives_spanish:
  - y haré llenar
  - y colmaré
  lexicon: HALOT
  rationale: מלא en pi'el se traduce de forma directa con «llenar»; aquí mantiene la simetría visual del paralelismo con «montes/valles».
- source_word: הַגֵּאָיוֹת
  english_pob_choice: the valleys
  chosen_spanish: los valles
  alternatives_spanish:
  - los valles
  - las quebradas
  lexicon: HALOT
  rationale: «Valles» es la opción más idiomática y amplia en español para גיאות en este paralelismo con «montes».
- source_word: רָמוּתֶךָ
  english_pob_choice: your carcass
  chosen_spanish: tu cadáver
  alternatives_spanish:
  - tu cadáver
  - tu cuerpo caído
  - tu despojo
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el contexto apunta al cuerpo caído de Faraón; «cadáver» comunica la humillación y la concreción del juicio sin forzar un término más interpretativo como «despojo».
theological_decisions:
- issue: Imagen violenta y humillante del juicio
  english_pob_reading: Preserve the concrete imagery of flesh scattered on mountains and valleys filled with the fallen body.
  chosen_spanish_reading: Conservar la imagen concreta de la carne sobre los montes y los valles llenos del cadáver.
  alternative_spanish_readings:
  - Suavizar a «cuerpo» y «restos» para mayor fluidez
  - Parafrasear para evitar la crudeza
  rationale: La profecía usa un lenguaje deliberadamente gráfico para expresar derrota y humillación. La traducción debe mantener esa tensión teológica y retórica en lugar de atenuarla.
  doctrine_reference: Principio de primacía del original; preservación de la fuerza profética del juicio.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios en el tramo auditado y el consenso de revisión fue alto.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino en el texto hebreo.
  - Se eligió «carne» para בשר y «cadáver» para la segunda cola, manteniendo la tensión entre la imagen física y la interpretación contextual del miembro final.
  - Se prefirió «montes»/«valles» por claridad y naturalidad en español, sin perder el paralelismo topográfico del hebreo.
