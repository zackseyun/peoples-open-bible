translation:
  language: es
  text: Solo asegúrate de no comer la sangre[a], porque la sangre es la vida, y no comerás la vida con la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'alma' para נֶפֶשׁ en ambos casos; aquí el término hebreo se refiere a la vida animante de la criatura, por lo que muchas traducciones lo vierten como 'vida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Pero
  lexicon: HALOT
  rationale: Marca la restricción o excepción con naturalidad en español y conserva el valor de limitación del hebreo.
- source_word: חֲזַק
  english_pob_choice: be sure
  chosen_spanish: cuida
  alternatives_spanish:
  - sé firme
  - ten cuidado
  - procura con firmeza
  lexicon: HALOT
  rationale: En esta construcción exhortativa con לְבִלְתִּי, la idea no es fuerza física sino una admonición enfática a vigilar. 'Cuida' comunica la advertencia de manera natural en español; 'solo cuida' retiene el tono de insistencia.
- source_word: לְבִלְתִּי אֲכֹל
  english_pob_choice: not to eat
  chosen_spanish: de no comer
  alternatives_spanish:
  - para no comer
  - a fin de no comer
  - para evitar comer
  lexicon: HALOT
  rationale: Expresa la prohibición/finalidad de la exhortación de modo idiomático en español, sin suavizar el mandato.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  - la sangre de la víctima
  lexicon: HALOT
  rationale: Traducción directa y consistente del término repetido dos veces en el verso.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición con un conector causal claro y natural en español.
- source_word: ה֣וּא
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - significa
  - representa
  lexicon: HALOT
  rationale: 'Conserva la ecuación explícita del hebreo: la sangre es la vida.'
- source_word: הַנָּפֶשׁ
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - el ser viviente
  - la vida del ser
  lexicon: HALOT
  rationale: En este contexto dietético, נֶפֶשׁ designa la vida animante del animal. 'La vida' preserva la lógica del pasaje y evita imponer una lectura filosófica de 'alma'.
- source_word: וְלֹא תֹאכַל
  english_pob_choice: and you shall not eat
  chosen_spanish: y no comerás
  alternatives_spanish:
  - y no debes comer
  - y no has de comer
  - y no comerás jamás
  lexicon: HALOT
  rationale: La forma legal de prohibición en español puede expresarse con futuro prohibitivo; conserva el registro normativo del Deuteronomio.
- source_word: הַנֶּפֶשׁ עִם הַבָּשָׂר
  english_pob_choice: the life with the flesh
  chosen_spanish: la vida con la carne
  alternatives_spanish:
  - el alma con la carne
  - la vida junto con la carne
  - la vida con la carne del animal
  lexicon: HALOT
  rationale: Mantiene la correspondencia con el hebreo y con la decisión previa de traducir נֶפֶשׁ como 'vida'; 'carne' refleja mejor בָּשָׂר que 'carne' en sentido alimentario, aquí como sustancia corporal.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en una ley alimentaria
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser viviente
  rationale: '''Vida'' evita sugerir una antropología dualista que el verso no está formulando. El texto explica la sangre como portadora de la vida del animal, no como una referencia a un alma separable en sentido posterior.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor prohibitivo del futuro en español
  english_pob_reading: and you shall not eat
  chosen_spanish_reading: y no comerás
  alternative_spanish_readings:
  - y no debes comer
  - y no has de comer
  rationale: En español bíblico y normativo, el futuro prohibitivo puede transmitir adecuadamente una orden legal. Aquí conserva el tono legislativo del pasaje sin necesidad de perífrasis más interpretativas.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: 'El texto inglés POB y su auditoría muestran un acuerdo alto y no registran revisiones aplicadas. La draft española sigue de cerca la lectura léxica y teológica ya establecida: רַק como restricción, חֲזַק como exhortación enfática, נֶפֶשׁ como ''vida'' y la cláusula legal como prohibición normativa. No se detectan variantes textuales adicionales en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantiene 'la sangre' de forma uniforme en ambas apariciones para reflejar la repetición hebrea.
  - Se conserva 'vida' para נֶפֶשׁ en ambas ocurrencias, siguiendo el razonamiento auditado.
  - '''Carne'' se usa para בָּשָׂר como sustancia corporal del animal, no en sentido culinario restringido.'
  - El registro es bíblico y normativo, pero en español moderno y legible.
