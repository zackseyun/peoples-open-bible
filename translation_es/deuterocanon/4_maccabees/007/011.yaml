translation:
  language: es
  text: Porque, así como el padre Aarón, armado con el incensario, corriendo por en medio de la multitud, venció al ángel portador de fuego[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ángel de fuego» o «el ángel destructor». La expresión probablemente alude a la intervención de Aarón durante la plaga en Números 16.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Porque, como
  - Así como
  lexicon: LSJ
  rationale: La combinación griega une explicación y comparación. «Porque, así como» mantiene ambas fuerzas en un español natural y apto para un argumento encadenado.
- source_word: ὁ πατὴρ Ἀαρὼν
  english_pob_choice: the father Aaron
  chosen_spanish: el padre Aarón
  alternatives_spanish:
  - padre Aarón
  - Aarón, el padre
  lexicon: LSJ
  rationale: Se conserva el artículo y el valor honorífico/ancestral de πατήρ, sin convertirlo en un tratamiento eclesiástico ajeno al griego.
- source_word: τῷ θυμιατηρίῳ
  english_pob_choice: with the censer
  chosen_spanish: con el incensario
  alternatives_spanish:
  - con el censer
  - con su incensario
  lexicon: LSJ
  rationale: «Incensario» comunica el instrumento cultual de modo claro y reverente en español. «Con» refleja el dativo instrumental.
- source_word: καθωπλισμένος
  english_pob_choice: armed
  chosen_spanish: armado
  alternatives_spanish:
  - equipado
  - aprestado
  lexicon: LSJ
  rationale: La imagen marcial se conserva mejor con «armado», que en español sigue siendo vívida y no borra la metáfora bélica.
- source_word: διὰ τοῦ ἔθνοπλήθους
  english_pob_choice: through the midst of the multitude
  chosen_spanish: por en medio de la multitud
  alternatives_spanish:
  - a través de la multitud
  - por entre la multitud
  lexicon: LSJ
  rationale: El compuesto expresa una multitud densa; «por en medio de la multitud» reproduce el movimiento atravesando el gentío sin forzar un término más técnico que el español no necesita aquí.
- source_word: ἐπιτρέχων
  english_pob_choice: running through the midst of the multitude
  chosen_spanish: corriendo
  alternatives_spanish:
  - corriendo a través
  - arremetiendo
  lexicon: LSJ
  rationale: El participio indica acción simultánea y rápida. «Corriendo» conserva esa estructura sin añadir información no atestiguada.
- source_word: τὸν ἐμπυριστὴν ἄγγελον
  english_pob_choice: the fire-bearing angel
  chosen_spanish: al ángel portador de fuego
  alternatives_spanish:
  - al ángel de fuego
  - al ángel incendiario
  lexicon: LSJ
  rationale: «Portador de fuego» sigue de cerca el valor de ἐμπυριστής y evita resolver la frase hacia «ángel destructor», que el griego no dice de forma explícita.
- source_word: ἐνίκησεν
  english_pob_choice: overcame
  chosen_spanish: venció
  alternatives_spanish:
  - derrotó
  - conquistó
  lexicon: LSJ
  rationale: «Venció» conserva el lenguaje de triunfo de νικάω con un tono sobrio y bíblico en español.
theological_decisions:
- issue: Identidad del ángel en la alusión al episodio de Aarón
  english_pob_reading: Rendered generically as 'the fire-bearing angel' without expanding to 'destroying angel' in the main text
  chosen_spanish_reading: Se mantiene «ángel portador de fuego» sin convertirlo en «ángel destructor» en el cuerpo del texto
  alternative_spanish_readings:
  - ángel destructor
  - ángel de la destrucción
  - ángel que portaba fuego
  rationale: El griego ofrece una designación ligada al fuego, no una glosa completa del episodio de Números. La traducción conserva esa tensión interpretativa y deja la identificación más amplia como inferencia, no como añadido del texto principal.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión lexical-teológica sin sobreinterpretación.
translation_notes:
  revision_awareness: Se siguió la revisión que añadió el artículo antes de «padre Aarón» y que prefirió una estructura participial para reflejar mejor la relación entre «corriendo» y el resto de la cláusula. También se mantuvo una designación transparente del ángel sin expandirla más allá de lo que el griego expresa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene el registro culto y bíblico, evitando calcos innecesarios como «armado con el incensario» si el español requiere una preposición más natural.
  - No se sustituye el imaginario bélico de καθωπλισμένος por una paráfrasis más suave, para conservar la metáfora original.
