id: 3MA.3.28
reference: 3 Maccabees 3:28
source:
  edition: lxx-swete-1909
  text: μηνύειν δὲ τὸν βουλόμενον ἐφʼ ᾧ τὴν οὐσίαν τοῦ ἐμπίπτοντος ὑπὸ τὴν εὔθυναν λήμψεται, καὶ ἐκ τοῦ βασιλικοῦ δραχμὰς δισχιλίας, καὶ τῆς ἐλευθερίας στεφανωθήσεται.
