translation:
  language: es
  text: Porque no seremos auxiliados por los hijos[a] de Israel; pues, he aquí, son un pueblo en quien no hay fuerza ni poder para una formación militar sólida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los israelitas» o «los hijos del pueblo de Israel». El griego dice literalmente «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: βοηθησόμεθα
  english_pob_choice: we will not be helped
  chosen_spanish: no seremos auxiliados
  alternatives_spanish:
  - no recibiremos ayuda
  - no seremos ayudados
  lexicon: BDAG / LEH
  rationale: El futuro pasivo de βοηθέω pide mantener la pasividad explícita. "Ser auxiliados" conserva el matiz de ayuda prestada en un contexto militar sin volverla más libre de lo que permite el griego.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: LEH
  rationale: Se conserva la expresión familiar masculina del griego. En español, "hijos de Israel" es natural y transparente, y mantiene la elección de forma del audit trail inglés.
- source_word: λαὸς
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: LEH
  rationale: '"Pueblo" expresa bien el sustantivo colectivo sin introducir el matiz político de "nación".'
- source_word: δύναμις
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - capacidad
  lexicon: LEH
  rationale: En este juicio militar, δύναμις apunta a capacidad o fuerza efectiva. "Fuerza" es natural en español y encaja con la repetición intensificadora junto a κράτος.
- source_word: κράτος
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - maldad
  - dominio
  - fuerza
  lexicon: LEH
  rationale: Aquí κράτος no significa dominio político, sino potencia o vigor. "Poder" preserva la duplicación semántica con δύναμις sin sonar forzado en español.
- source_word: παράταξιν ἰσχυράν
  english_pob_choice: strong battle formation
  chosen_spanish: una formación de batalla fuerte
  alternatives_spanish:
  - una formación militar fuerte
  - un despliegue fuerte para la batalla
  - una línea de batalla fuerte
  lexicon: LEH
  rationale: '"Formación de batalla" mantiene el término militar de παράταξις; "fuerte" traduce ἰσχυράν. Se conserva la imagen bélica de una línea ordenada para combate.'
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - obsérvese
  lexicon: BDAG
  rationale: La revisión inglesa optó por un registro más formal; "he aquí" reproduce bien la fuerza deíctica y es idiomático en español bíblico sin volver a una paráfrasis.
theological_decisions:
- issue: Expresión étnico-familiar masculina
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: No hay conflicto doctrinal, pero el texto usa una expresión familiar masculina. Se conserva en español por fidelidad formal y porque la política del proyecto prefiere mantener la forma cuando es clara y natural.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Repetición de carencia de capacidad militar
  english_pob_reading: in whom there is neither strength nor might for strong battle formation
  chosen_spanish_reading: en quien no hay fuerza ni poder para una formación de batalla fuerte
  alternative_spanish_readings:
  - en quien no hay fuerza ni poder para hacer frente en batalla
  - en quien no hay fuerza ni poder para un despliegue fuerte de batalla
  rationale: Se mantiene la doble negación y la acumulación de términos militares para no suavizar la evaluación del texto. No se resuelve la repetición de δύναμις / κράτος mediante un solo término general.
  doctrine_reference: Principio de conservación de tensiones léxicas del texto fuente
translation_notes:
  revision_awareness: 'Se revisó la solución inglesa más formal (''behold'') y se reflejó con ''he aquí'' en español. También se corrigió la omisión previa de la marca de nota: ahora [a] está anclada en el texto principal junto a la expresión étnica.'
  spanish_consistency_notes:
  - Se mantiene "he aquí" para corresponder al inglés revisado y al griego ἰδοὺ.
  - '"Fuerza" y "poder" conservan la distinción de δύναμις y κράτος sin borrar la duplicación retórica.'
  - '"Hijos de Israel" sigue la política de fidelidad a la forma masculina familiar del original.'
  - El tono es bíblico-formal, pero en español moderno y legible.
