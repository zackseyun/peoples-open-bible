translation:
  language: es
  text: Ustedes marcharán alrededor de la ciudad[a], todos los hombres de guerra, rodeando la ciudad una vez. Así harás durante seis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los guerreros» o «todos los combatientes». El hebreo dice literalmente «todos los hombres de guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסַבֹּתֶם
  english_pob_choice: you shall march around
  chosen_spanish: Marcharán alrededor
  alternatives_spanish:
  - irán alrededor
  - rodearán
  lexicon: HALOT
  rationale: El hebreo expresa el movimiento alrededor de la ciudad en una instrucción militar. «Marcharán alrededor» conserva el matiz de desplazamiento ordenado y militar, sin volverlo demasiado literal ni perder la fuerza del mandato.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: La forma hebrea es el sustantivo común con artículo. «La ciudad» es la equivalencia natural y fiel; el contexto identifica Jericó, pero el texto hebreo no lo nombra aquí.
- source_word: כֹּל אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: all the men of war
  chosen_spanish: todos los hombres de guerra
  alternatives_spanish:
  - todos los guerreros
  - todos los hombres de batalla
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente masculina y militar. «Hombres de guerra» preserva esa fuerza lexical y la referencia a combatientes varones, siguiendo el criterio de precisión de género del POB.
- source_word: הַקֵּיף
  english_pob_choice: circling
  chosen_spanish: rodeando
  alternatives_spanish:
  - dando vueltas alrededor
  - haciendo un circuito alrededor
  lexicon: HALOT
  rationale: El término refuerza la acción de circunvalar o completar el recorrido alrededor. «Rodeando» comunica bien ese sentido en español y evita una repetición torpe con «alrededor».
- source_word: פַּעַם אֶחָת
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una sola vez
  lexicon: HALOT
  rationale: Es una expresión idiomática de una única vuelta. «Una vez» es la forma más natural en español y conserva el valor aspectual de una ocurrencia.
- source_word: כֹּה
  english_pob_choice: thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - De este modo
  lexicon: HALOT
  rationale: Es el adverbio de instrucción que introduce el modelo a seguir. «Así» es breve, claro y adecuado al tono imperativo-instructivo del pasaje.
- source_word: תַעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacerlo
  - harás esto
  lexicon: HALOT
  rationale: El hebreo pasa a segunda masculina singular, dirigiéndose a Joshua como responsable de cumplir la instrucción. «Harás» mantiene esa singularidad sin sobrecargar la frase.
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: for six days
  chosen_spanish: durante seis días
  alternatives_spanish:
  - por seis días
  - seis días
  lexicon: HALOT
  rationale: La expresión comunica duración continua o repetida del mandato. «Durante seis días» expresa mejor en español el sentido iterativo que «por seis días», sin añadir algo ajeno al texto.
theological_decisions:
- issue: 'Distribución de personas: plural y singular en el mandato'
  english_pob_reading: plural 'you shall march around' followed by singular 'you shall do'
  chosen_spanish_reading: plural «Marcharán alrededor» seguido de singular «harás»
  alternative_spanish_readings:
  - uniformar todo al plural
  - uniformar todo al singular
  rationale: El hebreo pasa del plural al singular, probablemente del grupo combatiente a Josué como líder responsable. La traducción española conserva esa oscilación para no perder la distinción pragmática del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 5
- issue: Marcación de género en אַנְשֵׁי הַמִּלְחָמָה
  english_pob_reading: all the men of war
  chosen_spanish_reading: todos los hombres de guerra
  alternative_spanish_readings:
  - todos los guerreros
  - todas las personas de guerra
  rationale: El hebreo es masculino y militar. Mantener «hombres» preserva la forma gramatical y la referencia histórica sin neutralizar el texto, conforme al principio de exactitud de género.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: 'El pasaje mantiene el acuerdo alto del antecedente en inglés: no se detectaron revisiones posteriores que alteren el sentido base. Se conservó la alternancia de número (plural/singular) y la elección militar de «hombres de guerra», con equivalentes españoles naturales y auditables.'
  spanish_consistency_notes:
  - Se usa «ciudad» de manera literal y no se explicita Jericó, en línea con el hebreo.
  - «Así» y «durante seis días» reproducen el tono instructivo y la duración iterativa sin añadir interpretación.
  - No se introduce terminología eclesiástica ajena al contexto militar narrativo.
