translation:
  language: es
  text: 'Pero la vergüenza[a] ha devorado el trabajo de nuestros padres desde nuestra juventud: sus rebaños y sus hatos, sus hijos y sus hijas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cosa vergonzosa», probablemente una referencia despectiva a Baal o a la idolatría.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַבֹּשֶׁת
  english_pob_choice: But shame
  chosen_spanish: Pero la vergüenza
  alternatives_spanish:
  - Y la vergüenza
  - la cosa vergonzosa
  lexicon: HALOT
  rationale: Mantengo el valor adversativo del וְ en el contexto confesional con «Pero». «Vergüenza» conserva el sustantivo hebreo sin resolver de antemano si alude de manera metonímica a un ídolo o al oprobio mismo. No se añade artículo en español por claridad y naturalidad sintáctica.
- source_word: אָכְלָה
  english_pob_choice: has devoured
  chosen_spanish: ha devorado
  alternatives_spanish:
  - ha consumido
  - se ha comido
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «comer», pero con este objeto funciona idiomáticamente como «devorar/consumir». «Ha devorado» preserva la fuerza figurada y el perfecto resultativo.
- source_word: יְגִיעַ
  english_pob_choice: the labor
  chosen_spanish: el trabajo
  alternatives_spanish:
  - la labor
  - el fruto del trabajo
  - la ganancia
  lexicon: HALOT
  rationale: יְגִיעַ señala el producto o ganancia del esfuerzo. En español, «el trabajo» comunica de manera natural esa esfera de esfuerzo y permite que la enumeración siguiente concrete lo perdido.
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  lexicon: HALOT
  rationale: Sigo de cerca el hebreo masculino plural. «Padres» es directo y transparente; «antepasados» sería una neutralización interpretativa no necesaria aquí.
- source_word: מִנְּעוּרֵינוּ
  english_pob_choice: from our youth
  chosen_spanish: desde nuestra juventud
  alternatives_spanish:
  - desde que éramos jóvenes
  - desde nuestros primeros años
  lexicon: HALOT
  rationale: La preposición hebrea marca duración desde el comienzo. «Desde nuestra juventud» es la opción más idiomática y fiel al sentido temporal.
- source_word: צֹאנָם
  english_pob_choice: their flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor. En español, «rebaños» es la equivalencia natural y compacta en este paralelismo.
- source_word: בְּקָרָם
  english_pob_choice: their herds
  chosen_spanish: sus hatos
  alternatives_spanish:
  - su ganado vacuno
  - sus manadas
  lexicon: HALOT
  rationale: בקר se refiere al ganado mayor. En español, «hatos» conserva el paralelismo con «rebaños» y el campo semántico pastoril sin explicitar de más el tipo de animal.
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo dice específicamente «hijos/varones». En español, «hijos» mantiene la pareja inmediata con «hijas» y suele ser la forma más natural del binomio.
- source_word: בְּנוֹתֵיהֶם
  english_pob_choice: their daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - sus mujeres
  lexicon: HALOT
  rationale: Traducción directa y específica del femenino plural, preservando el alcance total de la pérdida nombrada en el versículo.
theological_decisions:
- issue: Posible uso metonímico de «la vergüenza» para Baal o la idolatría
  english_pob_reading: Rendered as "shame" in the main text, preserving the Hebrew's personified abstraction.
  chosen_spanish_reading: Se conserva «la vergüenza» en el texto principal, manteniendo la abstracción personificada del hebreo.
  alternative_spanish_readings:
  - «la cosa vergonzosa»
  - una referencia explícita a Baal
  rationale: 'Jeremías usa en otros lugares «la vergüenza» como sustituto despectivo para Baal o la idolatría. Aquí conviene no cerrar la ambigüedad dentro del cuerpo del verso: el texto principal deja oír la imagen hebrea, mientras la nota ofrece la lectura alternativa.'
  doctrine_reference: Principio de conservar tensiones semánticas y teológicas documentadas sin resolverlas prematuramente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el juicio revisado del POB en inglés y conserva la solución principal sin cambios: traducción figurada de אָכְלָה como «ha devorado», «vergüenza» para וְהַבֹּשֶׁת, y la serie posesiva completa de bienes y descendencia. Se mantiene la nota alternativa para no eliminar la tensión lexical documentada.'
  spanish_consistency_notes:
  - «Vergüenza» se usa como equivalente consistente de הַבֹּשֶׁת cuando el contexto sugiere la metonimia o la personificación; aquí no se explicita Baal en el texto base.
  - «Padres» y «hijos/hijas» conservan el paralelismo familiar del hebreo sin neutralización innecesaria.
  - «Rebaños» / «hatos» forman un par pastoril natural en español y preservan la distinción entre צֹאן y בקר.
