  language: en
  yaml_path: translation/ot/joshua/010/001.yaml
  text: Now it happened[a], when Adoni-zedek king of Jerusalem heard that Joshua had captured Ai and had devoted it to destruction, just as he had done to Jericho and its king, so he had done to Ai and its king, and that the inhabitants of Gibeon had made peace with Israel and were among them[b],
  footnotes:
