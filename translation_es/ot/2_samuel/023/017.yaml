review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue correctamente la política de traducir יְהוָה como «Yahvé». Conserva la pregunta retórica sobre «la sangre» y la negativa de David a beber el agua. Sin embargo, hay dos desajustes importantes: el marcador [a] está mal anclado en el texto, porque la nota explica «con/sus vidas» pero fue colocada tras «dijo»; y «los tres hombres valientes» debilita la designación casi técnica de הַגִּבֹּרִים, mejor preservada como «los tres valientes» o equivalente más establecido. También conviene mejorar «que fueron con riesgo de su vida» a un plural más natural y exacto.'
  spanish_quality_summary: El español es claro y digno, pero presenta una torpeza de anclaje de nota y una leve falta de naturalidad en «con riesgo de su vida», donde el plural «sus vidas» corresponde mejor al hebreo y al sentido idiomático. «Los tres hombres valientes» suena genérico; «los tres valientes» es más natural, más conciso y mejor alineado con el uso narrativo.
  glossary_alignment: 'Alineación buena en «Yahvé» y en el tratamiento de la metáfora de la sangre. La principal cuestión terminológica es גִּבֹּרִים: «hombres valientes» no es incorrecto, pero diluye el referente reconocido de la unidad narrativa; «los tres valientes» preserva mejor la etiqueta. No hay otros conflictos relevantes con la glosa del proyecto.'
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado tras «dijo», pero la nota explica la frase «con/sus vidas».
    rationale: Las instrucciones requieren que cada nota esté anclada exactamente en la palabra o frase pertinente. Tal como está, la nota induce error editorial.
  - severity: medium
    issue: «que fueron con riesgo de su vida» es menos natural y menos exacto que una formulación plural.
    rationale: בְּנַפְשׁוֹתָם es plural y el sentido idiomático es peligro mortal asumido por ellos. En español suena mejor «arriesgando sus vidas» o «a riesgo de sus vidas».
  - severity: medium
    issue: «los tres hombres valientes» debilita la designación de הַגִּבֹּרִים.
    rationale: Aunque es comprensible, suena genérico. «Los tres valientes» conserva mejor la función de título/grupo en el contexto de David.
