    reason: alternative_reading
  revision_rationale: 'Se reemplaza «holocaustos» por «sacrificios completamente quemados» para ajustarse mejor a la decisión léxica auditada y evitar connotaciones modernas engañosas en español. Se corrige la nota alternativa para que quede anclada al verbo de expiación/aceptación, no a la frase sobre confiar en Dios. También se suaviza ligeramente la cláusula final para un español más natural: «sea llevado a su cumplimiento».'
