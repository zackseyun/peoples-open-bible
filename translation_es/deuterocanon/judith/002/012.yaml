  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se preserva el tono juramentario y real del original sin sustituirlo por lenguaje devocional posterior.
  - «Reino» se usa para βασιλεία según el contexto monárquico explícito; no se reemplaza por un abstracto como «soberanía» salvo en nota alternativa.
