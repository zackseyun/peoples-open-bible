translation:
  language: es
  text: En el undécimo año de Joram, hijo de Ahab[a], Ahazías llegó a ser rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las notas cronológicas relacionadas con los reinados de Joram y Ahazías son difíciles de armonizar entre Reyes y Crónicas; esta traducción sigue el hebreo tal como está, sin intentar resolver la cronología en el texto principal.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת
  english_pob_choice: In the ... year
  chosen_spanish: En el ... año
  alternatives_spanish:
  - Y en el ... año
  - Ahora, en el ... año
  lexicon: HALOT
  rationale: La expresión hebrea introduce una nota cronológica de manera directa. En español, 'En el ... año' conserva el valor temporal sin añadir un conector innecesario al inicio.
- source_word: אַחַת עֶשְׂרֵה שָׁנָה
  english_pob_choice: eleventh year
  chosen_spanish: undécimo año
  alternatives_spanish:
  - año once
  - once años
  lexicon: HALOT
  rationale: Es el equivalente idiomático normal de la fórmula regnal hebrea. Mantiene el valor ordinal y evita una traducción literal menos natural.
- source_word: לְיוֹרָם
  english_pob_choice: of Joram
  chosen_spanish: de Joram
  alternatives_spanish:
  - para Joram
  - perteneciente a Joram
  lexicon: HALOT
  rationale: En las fórmulas cronológicas de reinado, ל marca el punto de referencia del reinado de otro rey. En español, 'de Joram' comunica esa relación de manera natural.
- source_word: בֶּן אַחְאָב
  english_pob_choice: son of Ahab
  chosen_spanish: hijo de Ahab
  alternatives_spanish:
  - descendiente de Ahab
  lexicon: HALOT
  rationale: Es un patronímico directo y no requiere mayor elaboración. 'Hijo de Ahab' conserva la identificación genealógica del texto.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - se hizo rey
  - reinó
  lexicon: HALOT
  rationale: El verbo aquí señala el inicio del reinado, no solo el hecho general de reinar. 'Comenzó a reinar' preserva el matiz ingresivo del hebreo y suena natural en español.
- source_word: אֲחַזְיָה
  english_pob_choice: Ahaziah
  chosen_spanish: Ahazías
  alternatives_spanish:
  - Ocozías
  lexicon: HALOT
  rationale: Se conserva la transliteración habitual en la línea editorial de la POB. 'Ocozías' es una forma tradicional, pero no se adopta aquí sin una razón textual específica.
- source_word: עַל יְהוּדָה
  english_pob_choice: over Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - en Judá
  - por encima de Judá
  lexicon: HALOT
  rationale: Con מלך, עַל indica el ámbito de dominio. 'Sobre Judá' reproduce bien la relación de gobierno sin perder la imagen del texto base.
theological_decisions:
- issue: Cronología regnal difícil de armonizar entre Reyes y Crónicas
  english_pob_reading: Chronological notices involving the reigns of Joram and Ahaziah are difficult to harmonize across Kings and Chronicles; this translation renders the Hebrew as written without attempting to resolve the chronology in the main text.
  chosen_spanish_reading: La nota cronológica del texto se traduce tal como está escrita, sin intentar resolver en el cuerpo del versículo la armonización entre Reyes y Crónicas.
  alternative_spanish_readings:
  - armonizar la cronología en el texto principal
  - ajustar la fecha para hacerla coincidir con Crónicas
  rationale: La POB inglesa conserva la dificultad histórica/textual y no la resuelve en la traducción principal. La versión española debe preservar esa tensión sin suavizarla ni eliminarla.
  doctrine_reference: Crítica textual y cronología bíblica; comparación con 2 Reyes y 2 Crónicas
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la auditoría inglesa: no hubo revisiones aplicadas y el estado de revisión más reciente indica que no se requieren cambios. La traducción española mantiene la misma decisión de no corregir ni armonizar la cronología en el cuerpo del texto.'
  spanish_consistency_notes:
  - 'Se conserva el orden natural del español bíblico moderno: marco temporal + acceso al trono + ámbito de gobierno.'
  - Se evita 'SEÑOR' u otro reemplazo teológico ajeno al texto, ya que aquí no aparece el nombre divino.
  - '''Ahazías'' se mantiene como transliteración coherente con el audit trail inglés; no se introduce una forma tradicional alternativa sin respaldo contextual.'
