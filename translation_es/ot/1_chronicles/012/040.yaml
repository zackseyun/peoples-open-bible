translation:
  language: es
  text: Estuvieron allí con David durante tres días[a], comiendo y bebiendo, porque sus hermanos habían preparado provisiones para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes» o «sus familiares». El hebreo dice literalmente «sus hermanos», lo cual en este contexto puede referirse de manera más amplia a miembros del mismo clan o tribu.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: They were
  chosen_spanish: Estuvieron
  alternatives_spanish:
  - Fueron
  - Permanecieron
  - Se quedaron
  lexicon: HALOT
  rationale: El verbo היה en este contexto narrativo expresa presencia/estancia en un lugar; en español, «estuvieron» comunica con naturalidad que permanecían allí con David.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio de lugar se refiere al sitio donde estaban reunidos con David; «allí» es la equivalencia breve y natural.
- source_word: עִם דָּוִיד
  english_pob_choice: with David
  chosen_spanish: con David
  alternatives_spanish:
  - junto con David
  lexicon: HALOT
  rationale: La preposición עִם indica compañía o asociación; «con David» lo expresa de forma directa y fiel.
- source_word: יָמִים שְׁלוֹשָׁה
  english_pob_choice: for three days
  chosen_spanish: durante tres días
  alternatives_spanish:
  - por tres días
  - tres días
  lexicon: HALOT
  rationale: El acusativo de duración se traduce naturalmente en español con «durante» para marcar el lapso de estancia.
- source_word: אֹכְלִים וְשׁוֹתִים
  english_pob_choice: eating and drinking
  chosen_spanish: comiendo y bebiendo
  alternatives_spanish:
  - en banquete
  - banqueteando
  lexicon: HALOT
  rationale: Los participios describen actividad continua durante esos tres días; se conserva la expresión explícita «comiendo y bebiendo» en vez de resumir interpretativamente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la comida y bebida; «porque» es la correspondencia clara y directa en español.
- source_word: הֵכִינוּ
  english_pob_choice: had prepared
  chosen_spanish: habían preparado
  alternatives_spanish:
  - prepararon
  - habían dispuesto
  - habían provisto
  lexicon: HALOT
  rationale: El hifil de כון expresa preparar o dejar listo; el pluscuamperfecto español preserva la anterioridad lógica de esa preparación respecto a la estancia.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para estos hombres
  lexicon: HALOT
  rationale: El complemento pronominal se mantiene simple y transparente en español.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus deudos
  - sus clanes
  lexicon: HALOT
  rationale: Se conserva el término literal «hermanos», como en el texto hebreo. En este contexto tribal puede abarcar también a los parientes o miembros del mismo clan, pero el texto base no exige neutralizarlo.
theological_decisions:
- issue: Sentido amplio posible de אֲחֵיהֶם en contexto tribal
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  - sus deudos
  rationale: No hay controversia doctrinal; la decisión sigue la lectura literal y la política de mantener el término masculino cuando el hebreo lo usa, dejando abierta la posibilidad contextual de parentesco o pertenencia tribal sin borrarla del texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa muestran alta concordancia: estancia con David por tres días, actividad continua de comer y beber, y la causa de ello en una provisión previa hecha por sus hermanos. No se requerían revisiones respecto al pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo el orden natural del español sin perder la secuencia causal del hebreo.
  - Se preservó la literalidad de «sus hermanos» con nota explicativa, conforme a la decisión lexical documentada.
  - Se evitó «Cristo» o terminología litúrgica ajena al pasaje, ya que no aparece en el texto fuente.
  - «Habían preparado» conserva la anterioridad implícita del hebreo en una forma verbal idiomática en español.
