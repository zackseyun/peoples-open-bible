translation:
  language: es
  text: Hay esperanza para tu futuro[a] —declara Yahvé—, y tus hijos[b] volverán a su territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay esperanza para tu postrer fin» o «Hay esperanza para tu desenlace».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus hijos varones volverán a su territorio». El hebreo puede traducirse de manera más literal con «hijos» y «territorio/frontera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Y hay
  - Existe
  lexicon: HALOT
  rationale: La construcción existencial en hebreo introduce una afirmación de seguridad; en español, «Hay» comunica de forma natural y fiel la existencia de esa esperanza sin sobrecargar el verso.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - confianza
  lexicon: HALOT
  rationale: El sustantivo denota esperanza/expectativa. «Esperanza» es la equivalencia más directa y natural en este anuncio de restauración.
- source_word: לְאַחֲרִיתֵךְ
  english_pob_choice: for your future
  chosen_spanish: para tu futuro
  alternatives_spanish:
  - para tu postrer destino
  - para tu resultado final
  - para tu porvenir
  lexicon: HALOT
  rationale: אַחֲרִית puede significar fin, postrimería, resultado o futuro. En este contexto de promesa restauradora, «tu futuro» transmite bien la orientación hacia adelante y mantiene la claridad en español contemporáneo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética requiere una expresión solemne. «Declara Yahvé» conserva el tono formal y se alinea con el criterio del proyecto de traducir יְהוָה como «Yahvé».
- source_word: וְשָׁבוּ
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán de nuevo
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético tiene sentido futuro. «Volverán» es natural en español y fiel al movimiento de restauración.
- source_word: בָנִים
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus descendientes
  - tus hijos varones
  lexicon: HALOT
  rationale: Aunque la forma hebrea es masculina plural, el referente colectivo en contexto puede expresarse en español como «tus hijos»; mantiene la referencia filial sin forzar un tecnicismo innecesario.
- source_word: לִגְבוּלָם
  english_pob_choice: to their own territory
  chosen_spanish: a su territorio
  alternatives_spanish:
  - a su frontera
  - a su región
  - a su propio territorio
  lexicon: HALOT
  rationale: גְּבוּל puede denotar frontera, territorio o región. «Territorio» refleja bien el sentido de retorno a la tierra/asignación propia y fue la opción final también en el audit trail inglés por ser más natural y adecuada al contexto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se preserva el nombre propio del pacto como «Yahvé» en vez de ocultarlo con un título sustituto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «border» a «territory» por mayor naturalidad y mejor ajuste al regreso a la tierra; la presente redacción sigue esa decisión y conserva la equivalencia semántica más clara en español. También se mantiene la fórmula profética solemne con el nombre divino explícito, conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, coherente con el criterio del proyecto.
  - Se eligió «esperanza» para תִּקְוָה y «futuro» para אַחֲרִיתֵךְ, preservando la distinción entre la expectativa y el horizonte temporal.
  - «Territorio» refleja mejor el campo semántico de גְּבוּל en este contexto que «frontera» en español moderno.
  - «Tus hijos» comunica el referente colectivo del hebreo sin introducir una traducción demasiado técnica o restrictiva.
