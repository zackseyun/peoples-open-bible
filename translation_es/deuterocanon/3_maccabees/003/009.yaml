translation:
  language: es
  text: Porque una organización tan grande[a], sin desconocer nada, no debe ser pasada por alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse más literalmente: «una organización/cuerpo tan grande, que no ignora nada, no debe ser pasada por alto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... παροραθήσεσθαι
  english_pob_choice: must not be overlooked
  chosen_spanish: no debe ser pasada por alto
  alternatives_spanish:
  - no debe ser ignorada
  - no debe ser desatendida
  lexicon: LSJ
  rationale: παροραθήσεσθαι expresa la idea de pasar por alto, descuidar o ignorar. En español, «ser pasada por alto» conserva bien la pasiva y la fuerza exhortativa/judicial del original sin introducir un tono más fuerte que el griego.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: γάρ introduce la explicación de la afirmación anterior. «Porque» mantiene de forma natural ese valor explicativo en español contemporáneo.
- source_word: οὕτω ... τηλικοῦτο
  english_pob_choice: so great
  chosen_spanish: tan grande
  alternatives_spanish:
  - de tan gran tamaño
  - tan considerable
  lexicon: LSJ
  rationale: La combinación intensiva οὕτω + τηλικοῦτο subraya magnitud o importancia. «Tan grande» preserva la intensificación sin forzar la frase hacia tamaño físico o relevancia abstracta exclusiva.
- source_word: σύστημα
  english_pob_choice: organization
  chosen_spanish: organización
  alternatives_spanish:
  - sistema
  - cuerpo
  - conjunto organizado
  lexicon: LSJ
  rationale: σύστημα puede significar un todo compuesto o una entidad organizada. En este contexto, «organización» comunica con claridad un cuerpo coordinado y mantiene el sentido de entidad colectiva mejor que un calco más abstracto.
- source_word: μηδὲν ἠγνοηκός
  english_pob_choice: lacking no knowledge
  chosen_spanish: que no ignora nada
  alternatives_spanish:
  - sin ignorar nada
  - que no desconoce nada
  lexicon: LSJ
  rationale: El participio perfecto de ἀγνοέω puede rendirse literalmente como «no ignorar». En español, «que no ignora nada» conserva la idea de conocimiento íntegro y evita una perífrasis más técnica que sonaría menos natural.
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa, que prefirió «must not be overlooked» para παροραθήσεσθαι y una expresión más directa para μηδὲν ἠγνοηκός. Por eso se evita tanto «despreciada» como una paráfrasis excesiva y se conserva la estructura explicativa del griego.
  spanish_consistency_notes:
  - Se mantiene «organización» para σύστημα, coherente con la decisión inglesa auditada.
  - Se preserva la pasiva exhortativa con «no debe ser pasada por alto», que refleja mejor el matiz de παροραθήσεσθαι.
  - «Que no ignora nada» intenta reproducir la totalidad cognitiva de μηδὲν ἠγνοηκός sin borrar la tensión entre conocimiento y atención.
  - La puntuación separa claramente la cláusula causal de la principal, como exige γάρ.
