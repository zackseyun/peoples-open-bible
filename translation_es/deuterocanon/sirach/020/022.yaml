translation:
  language: es
  text: Hay quien destruye su propia vida[a] por vergüenza, y por un rostro insensato[b] la perderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alma» para τὴν ψυχὴν αὐτοῦ; ψυχή puede significar «vida», «alma» o «yo mismo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de un rostro/semblante insensato». La frase probablemente alude al aspecto exterior o a la actitud visible de necedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολλύων
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - pierde
  lexicon: BDAG
  rationale: El participio expresa una acción fuerte y dañina; «destruye» conserva la severidad del verbo y su relación con el futuro ἀπολεῖ de la segunda cláusula.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his own life
  chosen_spanish: su propia vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: BDAG
  rationale: ψυχή puede significar vida, alma o yo mismo. En este contexto sapiencial de autodestrucción, «vida» es la opción más natural en español y evita fijar indebidamente una antropología del «alma».
- source_word: διʼ αἰσχύνην
  english_pob_choice: through shame
  chosen_spanish: por vergüenza
  alternatives_spanish:
  - a causa de la vergüenza
  - desde la vergüenza
  lexicon: LSJ
  rationale: La preposición con acusativo puede expresar causa o medio. «Por vergüenza» comunica con naturalidad en español la causa del daño sin añadir matiz interpretativo.
- source_word: ἀπὸ ἄφρονος προσώπου
  english_pob_choice: because of a foolish face
  chosen_spanish: por un rostro insensato
  alternatives_spanish:
  - por un semblante insensato
  - por una cara insensata
  lexicon: LSJ
  rationale: πρόσωπον es literalmente «rostro/cara/semblante». En español, «rostro» mantiene la referencia visible sin caer en una paráfrasis como «expresión». «Insensato» conserva el valor de ἄφρων.
- source_word: ἀπολεῖ αὐτήν
  english_pob_choice: he will lose it
  chosen_spanish: la perderá
  alternatives_spanish:
  - la destruirá
  - la arruinará
  lexicon: BDAG
  rationale: El futuro retoma el verbo anterior y αὐτήν remite a ψυχή. «La perderá» es idiomático en español y preserva el enlace verbal con la primera cláusula.
theological_decisions:
- issue: Sentido de ψυχή en contexto sapiencial
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - persona
  rationale: Se mantiene la lectura práctica y sapiencial del versículo, que habla de autodestrucción concreta. «Vida» evita resolver la tensión lexical de ψυχή hacia una doctrina específica sobre el alma inmortal.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés, que prefirió «face» sobre «expression» para πρόσωπου; por eso se mantiene una imagen facial concreta («rostro») y no una paráfrasis interpretativa. También se conserva «life» para ψυχή como opción de contexto sapiencial.
  spanish_consistency_notes:
  - Se evita «Señor»/«SEÑOR» porque no aparece el Tetragrámaton ni κύριος en este versículo.
  - Se conserva el paralelismo verbal entre «destruye» y «perderá» para reflejar ἀπολλύων / ἀπολεῖ.
  - «Rostro» se usa como equivalente natural de πρόσωπον en español bíblico moderno, sin desplazar el matiz corporal visible del griego.
