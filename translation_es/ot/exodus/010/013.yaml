translation:
  language: es
  text: Así que Moisés extendió su vara sobre la tierra de Egipto, y Yahvé condujo un viento del oriente[a] sobre la tierra todo aquel día y toda aquella noche. Cuando llegó la mañana, el viento del oriente trajo las langostas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un viento de oriente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  lexicon: HALOT
  rationale: נטה expresa extender o alargar. En español, «extendió su vara» comunica bien el gesto ritual de Moisés sin sonar forzado, y mantiene el paralelismo narrativo del relato de las plagas.
- source_word: מַטֵּהוּ
  english_pob_choice: his staff
  chosen_spanish: su vara
  alternatives_spanish:
  - su cayado
  - su bastón
  lexicon: HALOT
  rationale: מַטֶּה puede significar vara, bastón o cayado. «Vara» es claro y sobrio en español bíblico contemporáneo; evita una carga demasiado pastoral de «cayado» y refleja el instrumento usado por Moisés.
- source_word: עַל אֶרֶץ מִצְרַיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - sobre la tierra de Egipto
  - por encima de la tierra de Egipto
  lexicon: HALOT
  rationale: עַל con el gesto de la vara pide una imagen de elevación o extensión «sobre». «Tierra de Egipto» es una forma natural y fiel para אֶרֶץ מִצְרַיִם.
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El tetragrámaton aparece explícitamente en hebreo; conforme a la convención del proyecto, se conserva el nombre divino como «Yahvé» y no se lo sustituye por una convención de ocultamiento.
- source_word: נִהַג
  english_pob_choice: drove
  chosen_spanish: condujo
  alternatives_spanish:
  - empujó
  - hizo soplar
  lexicon: HALOT
  rationale: נהג puede significar conducir o guiar. Con «viento» como objeto, «condujo» mantiene la idea de causar su avance sobre la tierra sin volverlo mecánico.
- source_word: רוּחַ קָדִים
  english_pob_choice: an east wind
  chosen_spanish: un viento del oriente
  alternatives_spanish:
  - un viento de oriente
  - un viento oriental
  lexicon: HALOT
  rationale: La expresión designa un viento procedente del oriente. «Del oriente» conserva la dirección de procedencia con un español natural y digno.
- source_word: בָּאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: HALOT
  rationale: El movimiento del viento se expresa mejor con «sobre la tierra», que conserva la imagen espacial del texto hebreo y su continuidad con el gesto de la vara.
- source_word: כָּל הַיּוֹם הַהוּא וְכָל הַלָּיְלָה
  english_pob_choice: all that day and all that night
  chosen_spanish: todo aquel día y toda aquella noche
  alternatives_spanish:
  - todo el día y toda la noche
  - a lo largo de todo aquel día y toda aquella noche
  lexicon: HALOT
  rationale: El hebreo repite el cuantificador «todo» y subraya la duración. «Todo aquel día y toda aquella noche» reproduce esa insistencia de manera natural en español.
- source_word: הַבֹּקֶר הָיָה
  english_pob_choice: When morning came
  chosen_spanish: Cuando llegó la mañana
  alternatives_spanish:
  - Al amanecer
  - Cuando fue la mañana
  lexicon: HALOT
  rationale: Literalmente la frase marca la llegada/ocurrencia de la mañana. «Cuando llegó la mañana» comunica bien el cambio temporal sin sonar demasiado literal ni oscuro.
- source_word: נָשָׂא אֶת הָאַרְבֶּה
  english_pob_choice: brought the locusts
  chosen_spanish: trajo las langostas
  alternatives_spanish:
  - llevó las langostas
  - arrastró las langostas
  lexicon: HALOT
  rationale: נשא, aplicado al viento, expresa llevar o traer. «Trajo» es la forma más natural en español y conserva la idea de que el viento transportó la plaga.
- source_word: הָאַרְבֶּה
  english_pob_choice: the locusts
  chosen_spanish: las langostas
  alternatives_spanish:
  - la langosta
  - el enjambre de langostas
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, en español bíblico actual resulta más claro el plural colectivo «las langostas», que mantiene la referencia a la plaga de insectos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: the LORD / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto hebreo contiene el nombre propio del Dios del pacto. En consonancia con la política del proyecto, se lo traduce como «Yahvé» para preservar su identidad revelada y evitar una sustitución litúrgica que borre la forma del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para preferir una formulación más directa en la clausula final («brought the locusts») y para naturalizar la duración nocturna («all that night»). La redacción española sigue esa dirección de mayor inmediatez, manteniendo al mismo tiempo el valor durativo del hebreo y la imagen del viento como agente que transporta las langostas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma base para el nombre divino conforme al estándar del proyecto.
  - «Vara» se usa de manera consistente para מַטֶּה en este contexto narrativo.
  - «Viento del oriente» mantiene la dirección de procedencia y puede alternar con la nota «un viento del oriente» sin cambiar el sentido.
  - La clausula temporal reproduce la repetición enfática del hebreo con «todo/toda» para día y noche.
