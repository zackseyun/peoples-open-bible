revisions:
- from: Pero cuando el justo se aparta de su justicia y hace injusticia[a], haciendo todas las abominaciones que hace el malvado, ¿vivirá? Ninguna de sus obras justas será recordada. En la traición[b] con que ha actuado con traición, y en el pecado que ha cometido, en ellos morirá[c].
  to: Pero cuando el justo se aparta de su justicia y comete injusticia[a], haciendo todas las abominaciones que hace el malvado, ¿vivirá? Ninguna de sus obras justas será recordada. En la infidelidad[b] con que ha sido infiel, y en el pecado que ha cometido, en ellos morirá[c].
  rationale: 'Se hicieron dos ajustes menores pero necesarios: ''hace injusticia'' se cambió a ''comete injusticia'' por naturalidad idiomática, y ''traición ... ha actuado con traición'' se reformuló como ''infidelidad ... ha sido infiel'' para reflejar mejor el hebreo מעל con un español claro, digno y fiel a la nota léxica del POB. Se mantuvieron la estructura judicial, la pregunta retórica y el literal ''en ellos morirá''.'
