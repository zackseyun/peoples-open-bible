  to: Y según la ordenanza de David su padre[a], designó las divisiones de los sacerdotes para su servicio, y a los levitas para sus funciones, para alabar y ministrar delante de los sacerdotes, conforme a lo requerido de cada día[b]; y a los porteros en sus divisiones, para cada puerta; porque así fue el mandamiento de David, el hombre de Dios.
  rationale: 'La revisión mantiene la fidelidad general del borrador pero corrige el punto principal del expediente auditado: la preservación del hebraísmo ‘לִדְבַר יוֹם בְּיוֹמוֹ’ mediante nota. También mejora levemente la precisión administrativa con ‘designó’ en lugar de ‘puso’. Se elimina la nota innecesaria sobre ‘ministrar’, ya que no añade una alternativa relevante que el POB deba conservar aquí.'
