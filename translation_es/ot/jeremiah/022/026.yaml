translation:
  language: es
  text: Y te arrojaré a ti y a tu madre, que te dio a luz, a otra tierra[a], donde ustedes no nacieron, y allí morirán ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa del singular («te», «tu») al plural en «nacieron» y «morirán», dirigiendo el anuncio al rey junto con su madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵטַלְתִּי
  english_pob_choice: I will hurl
  chosen_spanish: te arrojaré
  alternatives_spanish:
  - te lanzarė
  - te echaré
  - te tiraré
  lexicon: HALOT
  rationale: El verbo hebreo expresa un acto violento de echar o lanzar con fuerza. En español, «arrojar» conserva mejor ese matiz de juicio y expulsión que un verbo más débil como «echar».
- source_word: אֹתְךָ וְאֶת אִמְּךָ
  english_pob_choice: you and your mother
  chosen_spanish: a ti y a tu madre
  alternatives_spanish:
  - a ti y a tu madre
  - a ustedes dos y a tu madre
  lexicon: HALOT
  rationale: Se mantiene la coordinación directa de los dos objetos. En español, «a ti y a tu madre» comunica con naturalidad la dupla destinataria sin expandir innecesariamente el texto.
- source_word: אֲשֶׁר יְלָדַתְךָ
  english_pob_choice: who gave birth to you
  chosen_spanish: que te dio a luz
  alternatives_spanish:
  - que te dio a luz
  - que te engendró
  - que te parió
  lexicon: HALOT
  rationale: La cláusula relativa modifica a «tu madre». «Dar a luz» es natural y digno en español contemporáneo y preserva la referencia al acto de parto sin suavizarla ni volverla técnica.
- source_word: עַל הָאָרֶץ אַחֶרֶת
  english_pob_choice: into another land
  chosen_spanish: a otra tierra
  alternatives_spanish:
  - a otra tierra
  - sobre otra tierra
  - en otra tierra
  lexicon: HALOT
  rationale: Con verbos de arrojamiento, עַל puede implicar movimiento hacia un lugar. En español, «a otra tierra» transmite el destino del destierro mejor que una calca como «sobre».
- source_word: אֲשֶׁר לֹא יֻלַּדְתֶּם שָׁם
  english_pob_choice: where you were not born
  chosen_spanish: donde no naciste
  alternatives_spanish:
  - donde no naciste
  - donde no nacieron
  - en la que no naciste
  lexicon: HALOT
  rationale: El hebreo cambia al plural en los verbos, pero el español exige decidir entre mantener esa rareza o hacerla fluida. Aquí se opta por una formulación natural para el referente principal, dejando constancia del fenómeno en la nota textual.
- source_word: וְשָׁם תָּמֽוּתוּ
  english_pob_choice: and there you will die
  chosen_spanish: y allí morirán ustedes
  alternatives_spanish:
  - y allí morirán ustedes
  - y allí moriréis
  - y allí morirás
  lexicon: HALOT
  rationale: Se refleja el plural hebreo final. «Morirán ustedes» suena natural en español neutral y preserva que el anuncio alcanza al rey y a su madre juntos.
translation_notes:
  revision_awareness: La traducción sigue de cerca el hebreo consonante/vocalizado del WLC y conserva el giro profético de juicio. Se tomó en cuenta el auditable POB inglés, especialmente la decisión de verter el verbo con fuerza de expulsión («hurl») y de notar el cambio de número en la frase final. No se introdujeron cambios textuales ni interpretativos fuera de ese marco.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el tetragrámaton.
  - Se mantuvo «tierra» para conservar resonancia bíblica territorial, en línea con el inglés POB «land».
  - Se preservó la tensión singular/plural mediante nota, porque el español requiere una resolución estilística en la frase final.
