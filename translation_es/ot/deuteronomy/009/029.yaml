translation:
  language: es
  text: Pero ellos son tu pueblo y tu herencia[a], a quienes sacaste con tu gran poder y con tu brazo extendido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Herencia» conserva el matiz de posesión otorgada y relación de pacto; también puede entenderse como «heredad».
    reason: lexical_alternative
  - marker: b
    text: La expresión «brazo extendido» es una fórmula estable del éxodo para el poder liberador de Yahvé.
    reason: cross_reference
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: But they are
  chosen_spanish: Pero ellos son
  alternatives_spanish:
  - Y ellos son
  - Y son ellos
  lexicon: HALOT
  rationale: El hebreo ו puede ser simplemente coordinante, pero en este contexto de intercesión y contraste con la petición anterior, «pero» expresa bien el matiz adversativo que la POB ya documenta en inglés. «Ellos son» mantiene la referencia enfática al sujeto.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: עַם designa aquí al pueblo del pacto. «Tu pueblo» es la forma más natural y fiel en español, sin diluir la relación posesiva y comunitaria.
- source_word: וְנַחֲלָתֶךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu heredad
  - tu posesión
  lexicon: HALOT
  rationale: En español bíblico, «herencia» comunica bien la idea de una posesión recibida por asignación y mantiene el peso del lenguaje de pacto. «Heredad» sería también posible, pero «herencia» es más transparente para lectura moderna. Se conserva la tensión entre patrimonio recibido y pertenencia a Yahvé.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  - los cuales
  lexicon: HALOT
  rationale: El antecedente son personas («tu pueblo»), por lo que «a quienes» expresa correctamente el relativo con función de objeto directo en español.
- source_word: הוֹצֵאתָ
  english_pob_choice: you brought out
  chosen_spanish: sacaste
  alternatives_spanish:
  - sacaste de allí
  - hiciste salir
  lexicon: HALOT
  rationale: El verbo causativo de יצא en este contexto del éxodo se vierte de modo natural como «sacar»/«sacaste». Evita una perífrasis más pesada y conserva la imagen del éxodo como acto divino de liberación.
- source_word: בְּכֹחֲךָ הַגָּדֹל
  english_pob_choice: by your great power
  chosen_spanish: con tu gran poder
  alternatives_spanish:
  - por tu gran poder
  - con tu poderoso brazo
  lexicon: HALOT
  rationale: La preposición instrumental ב admite en español tanto «con» como «por». «Con tu gran poder» resulta natural y mantiene la fuerza del hebreo sin recargar la frase. «Gran» reproduce bien הַגָּדֹל.
- source_word: וּבִזְרֹעֲךָ הַנְּטוּיָה
  english_pob_choice: and by your outstretched arm
  chosen_spanish: y con tu brazo extendido
  alternatives_spanish:
  - y por tu brazo extendido
  - y con tu brazo alzado
  lexicon: HALOT
  rationale: Se conserva la metáfora antropomórfica de זְרוֹעַ como «brazo» y נְטוּיָה como «extendido». «Extendido» es el equivalente directo y evita suavizar la imagen bíblica. «Con» mantiene el valor instrumental del hebreo y encadena bien con la primera cola.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a la acción divina
  english_pob_reading: Retain 'your outstretched arm' literally as covenantal imagery for God's power.
  chosen_spanish_reading: Mantener «tu brazo extendido» como imagen literal del poder de Yahvé.
  alternative_spanish_readings:
  - tus poderosas acciones
  - tu poder desplegado
  rationale: El hebreo usa una imagen corporal deliberada, típica del éxodo. Traducirla literalmente preserva su valor literario y teológico, en lugar de abstraerla en una fórmula más general.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Lenguaje de pacto en נַחֲלָה
  english_pob_reading: Render as 'inheritance' rather than a weaker term like 'possession.'
  chosen_spanish_reading: Verter נַחֲלָה como «herencia» para conservar el sentido de pertenencia pactal.
  alternative_spanish_readings:
  - heredad
  - posesión
  rationale: Moisés apela a la relación especial de Israel con Yahvé. «Herencia» preserva esa idea de algo asignado y recibido, sin convertirla en un término meramente jurídico o material.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios sustantivos; el presente borrador mantiene la alta coincidencia con la evaluación de concordancia y conserva tanto el contraste implícito de וְהֵם como la metáfora exódica de «brazo extendido».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando el contexto lo requiere, conforme a la convención del proyecto.
  - Se mantiene «pueblo» y «herencia/herencia» para reflejar el lenguaje de pacto, evitando sustituciones más genéricas.
  - Se preserva la metáfora corporal divina sin paráfrasis abstracta.
  - La preposición «con» se usa para reflejar el valor instrumental del hebreo ב en ambas colas, con un español natural.
