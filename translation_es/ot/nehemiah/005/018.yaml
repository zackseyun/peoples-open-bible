translation:
  language: es
  text: Y lo que se preparaba para cada día era un buey y seis ovejas escogidas; también se preparaban aves para mí, y cada diez días, abundancia de toda clase de vino. Con todo esto, no reclamé la asignación de comida del gobernador[a], porque la carga de trabajo pesaba sobre este pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el pan del gobernador’ o ‘las provisiones del gobernador’. El hebreo dice literalmente ‘el pan del gobernador’, probablemente refiriéndose a la asignación oficial de comida ligada al cargo.
    reason: lexical_alternative
  - marker: b
    text: O ‘la labor era gravosa’ o ‘el trabajo era severo’. La frase hebrea subraya el peso de la carga que llevaba este pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר הָיָה נַעֲשֶׂה
  english_pob_choice: Now what was prepared
  chosen_spanish: Y lo que se preparaba
  alternatives_spanish:
  - Y lo que se hacía
  - Ahora bien, lo que se preparaba
  lexicon: HALOT
  rationale: En contexto de provisiones, נַעֲשֶׂה se entiende como comida “preparada”, no como algo meramente “hecho”. El enlace discursivo וַאֲשֶׁר se expresa naturalmente con “Y lo que”, sin forzar un calco.
- source_word: לְיוֹם אֶחָד
  english_pob_choice: for each day
  chosen_spanish: para cada día
  alternatives_spanish:
  - para un día
  - diariamente
  lexicon: HALOT
  rationale: La idea es de ración diaria recurrente; “para cada día” comunica mejor el valor distributivo que un literal “para un día”.
- source_word: שׁוֹר אֶחָד
  english_pob_choice: one ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - una res
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, “buey” es la opción más natural para un animal de trabajo/provisión y evita la sobreespecificación de “toro”.
- source_word: צֹאן שֵׁשׁ בְּרֻרוֹת
  english_pob_choice: six choice sheep
  chosen_spanish: seis ovejas escogidas
  alternatives_spanish:
  - seis ovejas selectas
  - seis animales escogidos del rebaño
  lexicon: HALOT
  rationale: צֹאן es un término colectivo para ganado menor; en contexto alimentario, “ovejas” es la especificación más transparente. בְּרֻרוֹת expresa selección/calidad, por eso “escogidas” preserva el matiz.
- source_word: וְצִפֳּרִים נַעֲשׂוּ לִי
  english_pob_choice: also birds were prepared for me
  chosen_spanish: también se preparaban aves para mí
  alternatives_spanish:
  - también se preparaban pájaros para mí
  - y aves fueron preparadas para mí
  lexicon: HALOT
  rationale: צִפֳּרִים puede ser “aves” o “pájaros”; en contexto de mesa, “aves” es más idiomático y digno. El pasivo conserva la idea de provisión preparada para el narrador.
- source_word: וּבֵין עֲשֶׂרֶת יָמִים
  english_pob_choice: and every ten days
  chosen_spanish: y cada diez días
  alternatives_spanish:
  - y a intervalos de diez días
  - y entre diez días
  lexicon: HALOT
  rationale: La expresión señala intervalo regular. “Cada diez días” es la equivalencia española más natural y clara.
- source_word: בְּכָל יַיִן לְהַרְבֵּה
  english_pob_choice: an abundance of all kinds of wine
  chosen_spanish: abundancia de toda clase de vino
  alternatives_spanish:
  - abundancia de todo tipo de vino
  - mucho vino de toda clase
  lexicon: HALOT
  rationale: La combinación de totalidad y abundancia se reproduce con “toda clase de vino” + “abundancia”. Se evita añadir “tipos” si la construcción española ya comunica la generalidad.
- source_word: וְעִם זֶה
  english_pob_choice: Yet even with this
  chosen_spanish: Con todo esto
  alternatives_spanish:
  - Y aun así
  - Sin embargo, con esto
  lexicon: HALOT
  rationale: La frase introduce contraste concesivo; “Con todo esto” es una solución natural en español y mantiene el sentido de “a pesar de estas provisiones”.
- source_word: לֶחֶם הַפֶּחָה
  english_pob_choice: the governor’s food allowance
  chosen_spanish: el pan del gobernador
  alternatives_spanish:
  - la provisión del gobernador
  - la ración del gobernador
  lexicon: HALOT
  rationale: Literalmente es “el pan del gobernador”. En español, “pan” conserva la metáfora y la relación lexical con el hebreo; la alternativa “ración/provisión” explicita el sentido pero se aleja más del texto.
- source_word: לֹא בִקַּשְׁתִּי
  english_pob_choice: I did not demand
  chosen_spanish: no pedí
  alternatives_spanish:
  - no reclamé
  - no exigí
  lexicon: HALOT
  rationale: בִקַּשׁ puede ser pedir/solicitar. En español, “no pedí” mantiene la sencillez del original; “exigí” sería demasiado fuerte y “reclamé” introduce un matiz más jurídico del que el hebreo exige aquí.
- source_word: כִּי כָבְדָה הָעֲבֹדָה
  english_pob_choice: because the service was heavy
  chosen_spanish: porque la carga del trabajo era pesada
  alternatives_spanish:
  - porque el trabajo era pesado
  - porque la labor era gravosa
  lexicon: HALOT
  rationale: עֲבֹדָה aquí comunica trabajo/imposición/burden. “Carga del trabajo” preserva el peso del término y resulta claro en español; “labor” sería posible, pero menos natural para lectores amplios.
- source_word: עַל הָעָם הַזֶּה
  english_pob_choice: on this people
  chosen_spanish: sobre este pueblo
  alternatives_spanish:
  - sobre esta gente
  - sobre este pueblo
  lexicon: HALOT
  rationale: El colectivo singular עָם se traduce bien como “pueblo”. “Sobre” refleja la presión/burden of the burdened labor, como en el hebreo.
theological_decisions:
- issue: Renuncia de Nehemías a un derecho administrativo por la carga del pueblo
  english_pob_reading: Nehemiah declined the governor's entitled provisions out of concern for the people's burden
  chosen_spanish_reading: Nehemías renuncia a una provisión oficial del cargo por consideración a la carga del pueblo
  alternative_spanish_readings:
  - Nehemías simplemente no pidió la ración oficial
  - Nehemías rechazó un derecho alimentario del gobernador
  rationale: El versículo presenta una decisión ética y social, no una tesis doctrinal. Mantener “el pan del gobernador” y “no pedí” deja abierta la lectura de una provisión vinculada al cargo, sin sobreinterpretar más allá del texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que ajustó la frase sobre el vino a ‘all kinds of wine’ por naturalidad. En español se reflejó con ‘toda clase de vino’, manteniendo la amplitud semántica y la lectura de abundancia. También se preservó la decisión revisada de entender la mención al alimento del gobernador como una provisión oficial, sin convertirla en una paráfrasis más interpretativa de lo que el hebreo permite.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ no aplicable aquí, pues el versículo no contiene el nombre divino.
  - Se preservó el paralelismo de provisiones diarias y periódicas con sintaxis española natural.
  - Se evitó sustituir ‘pan del gobernador’ por una glosa más explicativa en el texto principal, reservando la explicación para la nota.
  - Se usó ‘pueblo’ para el colectivo singular עָם, conservando el valor comunitario del hebreo.
  - La fórmula concesiva ‘Con todo esto’ mantiene la tensión entre provisión abundante y la renuncia de Nehemías.
