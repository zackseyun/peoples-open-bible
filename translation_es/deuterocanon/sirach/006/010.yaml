review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el paralelo griego: conserva la imagen de compartir mesa y la idea de desaparición en la adversidad. Sin embargo, introduce «tu» en el texto principal («tu angustia») siguiendo el griego, cuando el hebreo base dice simplemente «en un día de calamidad/trouble» sin pronombre posesivo. Dado que el POB inglés mantuvo el hebreo en el texto principal y relegó la variante griega a nota, el español debe hacer lo mismo.'
  spanish_quality_summary: El español es claro y natural. «Compañero de mesa» funciona bien y suena más idiomático que un calco rígido. «No se encontrará» es fiel pero algo menos natural en español cuando el sujeto es persona; aun así, con nota explicativa, puede mantenerse por cercanía al hebreo. El ajuste principal necesario es quitar «tu» para no mezclar la variante griega en el texto principal.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales están bien encaminadas: «amigo» para אוֹהֵב/חָבֵר y «compañero de mesa» para la imagen de שֻׁלְחָן / κοινωνὸς τραπεζῶν. La nota sobre «no se encontrará» / «no permanecerá» refleja correctamente la prioridad del hebreo y la aclaración griega.'
  issues:
  - severity: medium
    issue: El texto principal añade «tu» en «en el día de tu angustia».
    rationale: El hebreo base dice בְּיוֹם רָעָה, sin posesivo. El paralelo griego sí tiene θλίψεώς σου («tu aflicción»), pero en el POB inglés esa diferencia se manejó en la documentación, no en el texto principal. El español debe seguir la misma priorización de fuente.
  - severity: low
    issue: La nota a dice «compañero de mesas».
    rationale: Es una traducción cercana al plural griego τραπεζῶν, pero en español suena algo extraña. No es un error grave, aunque conviene suavizarla a «quien comparte la mesa» o mantener la literalidad explicada de forma más idiomática.
  revised_spanish_text: Hay un amigo, compañero de mesa[a], pero no se encontrará[b] en un día de angustia.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «amigo de mesa»; el griego paralelo dice «el que comparte mesas», aclarando que se trata de alguien que comparte comidas contigo pero resulta poco fiable en la adversidad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «no se encontrará»; el griego paralelo dice «no permanecerá». Ambas lecturas comunican que ese amigo desaparece cuando llega la aflicción.
    reason: alternative_reading
  revision_rationale: Se quita «tu» para alinear el texto principal con el hebreo primario y con la decisión documentada del POB inglés. Se conservan «compañero de mesa» y «no se encontrará» por fidelidad léxica, mientras se pulen levemente las notas para un español más natural.
