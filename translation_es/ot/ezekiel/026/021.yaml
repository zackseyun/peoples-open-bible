translation:
  language: es
  text: Te convertiré en un espanto[a], y ya no existirás. Aunque te busquen, no te encontrarán nunca más, declara el Señor Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serás buscada, pero no serás encontrada nunca más». La secuencia hebrea también puede leerse más simplemente como cláusulas futuras coordinadas, en vez de una lectura concesiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: נְאֻם אֲדֹנָי יְהוִה, literalmente «declara el Señor Yahvé». Se conserva «Yahvé» para el nombre divino y también «Señor» para reflejar ambos elementos del hebreo.'
    reason: source_note
lexical_decisions:
- source_word: בַּלָּהוֹת
  english_pob_choice: a terror
  chosen_spanish: un espanto
  alternatives_spanish:
  - un terror
  - un objeto de horror
  - espantos
  lexicon: HALOT
  rationale: El plural hebreo funciona de manera intensiva o abstracta. En español, en este contexto de juicio, «un espanto» comunica bien la idea de algo que causa horror sin sonar forzado ni excesivamente literal.
- source_word: אֶתְּנֵךְ
  english_pob_choice: I will make you
  chosen_spanish: Te convertiré
  alternatives_spanish:
  - Te haré
  - Te pondré
  - Te estableceré
  lexicon: HALOT
  rationale: Con un predicado nominal, נתן tiene el sentido idiomático de «hacer/convertir en». «Te convertiré» expresa con naturalidad esa relación causativa sin perder la fuerza del hebreo.
- source_word: וְאֵינֵךְ
  english_pob_choice: and you will be no more
  chosen_spanish: y dejarás de existir
  alternatives_spanish:
  - y ya no serás
  - y no serás más
  - y ya no existirás
  lexicon: HALOT
  rationale: La cláusula negativa expresa cese de presencia/existencia. «Dejarás de existir» mantiene el peso de juicio y evita una formulación demasiado fría o demasiado interpretativa.
- source_word: וּתְבֻקְשִׁי
  english_pob_choice: Though you are sought
  chosen_spanish: aunque te busquen
  alternatives_spanish:
  - y serás buscada
  - aunque seas buscada
  - te buscarán
  lexicon: HALOT
  rationale: El pasivo/imperfecto hebreo puede leerse como futuro pasivo o con valor concesivo en la secuencia. «Aunque te busquen» preserva esa tensión sin especificar quién busca.
- source_word: וְלֹא תִמָּצְאִי
  english_pob_choice: you will never again be found
  chosen_spanish: no te encontrarán nunca más
  alternatives_spanish:
  - no serás hallada
  - no te hallarán
  - no volverás a ser encontrada
  lexicon: HALOT
  rationale: El nifal de מצא es pasivo. En español, la forma activa impersonal «no te encontrarán» evita una pasiva pesada y conserva la idea de no ser hallada.
- source_word: עוֹד לְעוֹלָם
  english_pob_choice: never again
  chosen_spanish: nunca más
  alternatives_spanish:
  - jamás
  - para siempre
  - ya nunca
  lexicon: HALOT
  rationale: La combinación intensifica la permanencia de la sentencia. En español, «nunca más» concentra bien la fuerza de עוד y לעולם sin redundancia innecesaria.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - declara el Señor Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte de modo natural como «declara». Dado el proyecto, יְהוִה se traduce como «Yahvé». Se omite «Señor» para evitar la redundancia de «Señor Yahvé» y porque aquí el foco está en la fórmula de cierre profética.
theological_decisions:
- issue: Traducción del Nombre divino יְהוִה en la fórmula final
  english_pob_reading: the Lord GOD / Lord GOD convention, avoiding 'Lord LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Yahvé
  - SEÑOR
  rationale: El expediente del proyecto establece que יְהוִה se renderiza como «Yahvé» en el texto principal. En este versículo, la combinación con אֲדֹנָי no obliga a reproducir una duplicación como «Señor Yahvé»; la forma breve «declara Yahvé» mantiene el valor de fórmula profética y el Nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la redundancia de un 'forever' adicional después de 'never again'. Por eso el español también evita duplicación innecesaria y concentra la permanencia en «nunca más».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como equivalente del Tetragramatón, conforme al criterio del proyecto.
  - Se traduce el valor pasivo/concesivo de וּתְבֻקְשִׁי de manera natural en español sin fijar indebidamente el sujeto de la búsqueda.
  - «Espanto» conserva el campo semántico de horror/terror del sustantivo plural hebreo sin forzar pluralidad en español.
