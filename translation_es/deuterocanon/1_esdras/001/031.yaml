base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/031.yaml
  text: for all the family of Israel[a]. Now these things have been recorded in the book of the histories concerning the kings of Judah, and each deed of Josiah, and his glory, and his understanding in the law of the Lord, and the things done by him, both the former things and those now recounted[b], are recorded in the book of the Kings of Israel and Judah.
  footnotes:
  - marker: a
    text: 'Greek: ''the book of the histories concerning the kings of Judah.'' This likely refers to a royal historical record; ''book of the records'' is a possible alternative.'
    reason: lexical_alternative
  - marker: b
    text: The Greek wording near the end is somewhat awkward ('and the things done by him and the things now recounted'). The translation preserves the sense that both Josiah’s deeds and the matters just narrated are said to be recorded in the source book.
    reason: textual_variant
