translation:
  language: es
  text: Porque el vendedor no volverá a lo vendido[a], aunque todavía estén con vida[b]; porque la visión acerca de toda su multitud no se volverá atrás[c][d], y nadie fortalecerá su vida en su iniquidad[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la venta», es decir, a la propiedad o posesión que fue vendida.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo condensado: «mientras todavía estén entre los vivos, su vida». La idea es que, aunque las partes sigan con vida, el vendedor no recuperará lo vendido.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «contra toda su multitud». La preposición puede sugerir dirección hacia el pueblo entero bajo juicio.'
    reason: alternative_reading
  - marker: d
    text: 'O: «no será revocada». El sentido es que el juicio anunciado no se revertirá ni se retirará.'
    reason: alternative_reading
  - marker: e
    text: El hebreo de la cláusula final es difícil. Probablemente significa que nadie asegurará su vida por medio de su iniquidad.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמּוֹכֵר
  english_pob_choice: the seller
  chosen_spanish: el vendedor
  alternatives_spanish:
  - el que vende
  - el comprador
  lexicon: HALOT
  rationale: Es un participio sustantivado; «el vendedor» conserva el referente comercial concreto y suena natural en español.
- source_word: אֶל הַמִּמְכָּר
  english_pob_choice: to what was sold
  chosen_spanish: a lo vendido
  alternatives_spanish:
  - a la venta
  - al objeto vendido
  - a lo que fue vendido
  lexicon: HALOT
  rationale: La expresión apunta al bien vendido o a la cosa vendida. «A lo vendido» mantiene la compactación hebrea sin especificar de más.
- source_word: לֹא יָשׁוּב
  english_pob_choice: will not return
  chosen_spanish: no volverá
  alternatives_spanish:
  - no regresará
  - no volverá atrás
  lexicon: HALOT
  rationale: שוב suele significar volver/regresar. «No volverá» es directo y permite mantener la repetición con la cláusula siguiente.
- source_word: וְעוֹד בַּחַיִּים חַיָּתָם
  english_pob_choice: though they are still alive
  chosen_spanish: aunque todavía estén con vida
  alternatives_spanish:
  - mientras todavía vivan
  - aunque sigan vivos
  lexicon: HALOT
  rationale: El hebreo es compacto y algo abrupto; la frase comunica que, aun permaneciendo vivos, no recuperarán lo vendido.
- source_word: חָזוֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la visión profética
  - el oráculo
  lexicon: HALOT
  rationale: «Visión» conserva el registro profético sin añadir interpretación ajena al término.
- source_word: אֶל כָּל הֲמוֹנָהּ
  english_pob_choice: concerning all its multitude
  chosen_spanish: acerca de toda su multitud
  alternatives_spanish:
  - contra toda su multitud
  - sobre toda su multitud
  lexicon: HALOT
  rationale: אֶל puede señalar referencia o dirección. «Acerca de» evita forzar un matiz hostil explícito, aunque el contexto de juicio lo mantiene implícito.
- source_word: לֹא יָשׁוּב
  english_pob_choice: will not turn back
  chosen_spanish: no volverá
  alternatives_spanish:
  - no se revocará
  - no retrocederá
  lexicon: HALOT
  rationale: Se conserva שוב con un giro natural en español. El sentido es que la visión/jucio no se revertirá.
- source_word: בַּעֲוֺנ֛וֹ
  english_pob_choice: in his iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su iniquidad
  - con su culpa
  lexicon: HALOT
  rationale: 'עָוֹן puede denotar iniquidad o culpa. La preposición hebrea permite un ámbito o esfera: el sujeto no puede afianzar su vida dentro de su pecado.'
- source_word: חַיָּת֖וֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su vitalidad
  - su fuerza de vida
  lexicon: HALOT
  rationale: El término del grupo חיים/חיה aquí apunta a la vida misma; «su vida» es claro y fiel.
- source_word: לֹא יִתְחַזָּקוּ
  english_pob_choice: will strengthen
  chosen_spanish: fortalecerá
  alternatives_spanish:
  - se hará fuerte
  - asegurará
  lexicon: HALOT
  rationale: La forma es difícil y el inglés POB conserva la metáfora de fortaleza. En español, el singular distributivo con «nadie» expresa que ningún hombre podrá afianzar su vida por medio de la iniquidad.
theological_decisions:
- issue: Sentido de la cláusula final sobre iniquidad y vida
  english_pob_reading: No one will strengthen his life in his iniquity.
  chosen_spanish_reading: nadie fortalecerá su vida en su iniquidad.
  alternative_spanish_readings:
  - nadie asegurará su vida por su iniquidad
  - nadie podrá sostener su vida dentro de su pecado
  rationale: El hebreo es sintácticamente difícil, sobre todo por el verbo plural después del singular אִישׁ. Se preserva la idea de que la iniquidad no puede servir para asegurar la vida frente al juicio decretado, sin resolver artificialmente la tensión textual.
  doctrine_reference: Preservar la tensión textual sin suavizar el juicio anunciado
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante y la lectura de la POB en inglés como guía auditada. Se mantuvo la repetición de שוב con variación natural en español, se preservó la ambigüedad de אֶל en la primera cláusula, y se reflejó la dificultad sintáctica del cierre sin imponer una solución doctrinal ajena al contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exija; este versículo no contiene el nombre divino.
  - Se usa «visión» para חָזוֹן como término profético estándar.
  - Se mantiene «iniquidad» para עָוֹן por continuidad léxica y porque el contexto judicial lo favorece.
  - Se evita traducir mecánicamente la estructura inglesa; el español distribuye la última cláusula con «nadie» para naturalidad y fidelidad.
  - Las notas a pie conservan alternativas relevantes donde el hebreo o el español permiten más de una lectura.
