translation:
  language: es
  text: Quien guiña el ojo trama cosas malas[a], y nadie lo apartará de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «de él/ello»; aquí se entiende por el antecedente plural «cosas malas», por eso se traduce «de ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: διανεύων
  english_pob_choice: One who winks
  chosen_spanish: Quien guiña el ojo
  alternatives_spanish:
  - Quien hace una seña
  - Quien parpadea
  lexicon: LSJ
  rationale: El participio describe una señal o gesto disimulado; con ὀφθαλμῷ, el sentido natural en español es un guiño del ojo. «Quien guiña el ojo» conserva la intención furtiva y suena idiomático sin añadir más de lo que el griego permite.
- source_word: ὀφθαλμῷ
  english_pob_choice: with the eye
  chosen_spanish: el ojo
  alternatives_spanish:
  - su ojo
  lexicon: LSJ
  rationale: El dativo es instrumental. En español, el verbo «guiñar» ya incorpora el instrumento, por lo que «el ojo» expresa la imagen sin forzar una construcción artificial ni introducir un posesivo no explícito.
- source_word: τεκταίνει
  english_pob_choice: devises
  chosen_spanish: trama
  alternatives_spanish:
  - maquina
  - planea
  lexicon: LSJ
  rationale: En este contexto moral, el verbo apunta a urdir o planear con intención. «Trama» conserva el matiz de cálculo y malicia, y funciona de forma natural en español.
- source_word: κακά
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - males
  - cosas perversas
  - malas acciones
  lexicon: LSJ
  rationale: El plural griego es amplio. «Cosas malas» mantiene la amplitud semántica sin estrecharlo demasiado a «maquinaciones»; además deja visible que el texto habla de actos o proyectos moralmente malos.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: LSJ
  rationale: Es la equivalencia natural y directa del pronombre negativo indefinido.
- source_word: ἀποστήσει
  english_pob_choice: will turn him away
  chosen_spanish: lo apartará
  alternatives_spanish:
  - lo desviará
  - lo hará desistir
  - lo separará
  lexicon: LSJ
  rationale: El verbo puede expresar hacer que alguien se aparte o se retire. «Lo apartará» preserva esa fuerza sin especificar demasiado si el apartamiento es físico, moral o social.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: from them
  chosen_spanish: de ellas
  alternatives_spanish:
  - de ello
  - de eso
  - de él
  lexicon: LSJ
  rationale: Aunque el griego usa singular, el antecedente inmediato más natural es κακά, plural. En español conviene resolver la referencia de manera coherente con ese plural, como hizo la versión inglesa al decir «from them».
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto griego de Swete y con el trazado auditado en inglés. La única tensión relevante es el pronombre final singular ἀπʼ αὐτοῦ, resuelto en español por referencia al plural inmediato κακά, siguiendo la misma aclaración semántica que ya adoptó la traducción inglesa.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero con español moderno natural.
  - Se evitó «SEÑOR» u այլ formulaciones no aplicables, pues el verso no contiene el nombre divino.
  - Se preservó la imagen de disimulo y malicia con «guiña el ojo» y «trama».
