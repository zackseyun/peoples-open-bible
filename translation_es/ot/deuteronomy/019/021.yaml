translation:
  language: es
  text: 'Tu ojo no tendrá compasión: vida por vida[a][b], ojo por ojo, diente por diente, mano por mano, pie por pie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ahorre» o «muestre compasión».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «vida por vida»; נֶפֶשׁ aquí significa vida, no «alma» en un sentido teológico posterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָח֖וֹס
  english_pob_choice: shall ... pity
  chosen_spanish: tendrá compasión
  alternatives_spanish:
  - perdonará
  - se apiadará
  - ahorrará
  lexicon: HALOT
  rationale: חוס expresa aquí la idea de ahorrar, apiadarse o mostrar compasión. En español, «tener compasión» conserva bien la fuerza idiomática y suena natural en un contexto legal.
- source_word: עֵינֶ֑ךָ
  english_pob_choice: Your eye
  chosen_spanish: Tu ojo
  alternatives_spanish:
  - tú
  - tu compasión
  lexicon: HALOT
  rationale: 'Se conserva la imagen concreta del hebreo: «tu ojo» como sujeto del verbo. Esto mantiene el giro idiomático sin sustituirlo por una abstracción.'
- source_word: נֶ֣פֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - persona
  lexicon: HALOT
  rationale: En la fórmula נֶפֶשׁ בְּנֶפֶשׁ el sentido es retribución equivalente de una vida por otra. «Vida» evita introducir una carga teológica ajena al contexto legal.
- source_word: בְּ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  lexicon: HALOT
  rationale: En esta fórmula jurídica, בְּ marca equivalencia o retribución. «Por» es breve, idiomático y preserva la cadencia de la lista legal.
- source_word: עַיִן
  english_pob_choice: eye
  chosen_spanish: ojo
  lexicon: HALOT
  rationale: Término corporal literal de la fórmula del talión; «ojo» es la correspondencia directa y clara en español.
- source_word: שֵׁן
  english_pob_choice: tooth
  chosen_spanish: diente
  lexicon: HALOT
  rationale: Término corporal literal; «diente» es preciso y plenamente natural en español.
- source_word: יָד
  english_pob_choice: hand
  chosen_spanish: mano
  lexicon: HALOT
  rationale: Término corporal literal en la secuencia legal; «mano» mantiene la enumeración del texto.
- source_word: רֶגֶל
  english_pob_choice: foot
  chosen_spanish: pie
  alternatives_spanish:
  - pierna
  lexicon: HALOT
  rationale: En esta fórmula, «pie» es la traducción convencional y más ajustada al paralelo de las demás partes del cuerpo.
theological_decisions:
- issue: Preservar la fórmula concreta de retribución legal en vez de convertirla en un principio generalizado
  english_pob_reading: 'Preserve the concrete formula: ''life for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'''
  chosen_spanish_reading: 'Preservar la fórmula concreta: «vida por vida, ojo por ojo, diente por diente, mano por mano, pie por pie».'
  alternative_spanish_readings:
  - «la pena debe corresponder al delito»
  rationale: La forma hebrea es una fórmula judicial fija. Mantenerla en español preserva su textura legal y sus resonancias intertextuales; una paráfrasis general suavizaría indebidamente el texto.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión jurídica sin resolverla mediante paráfrasis.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece anclado en el texto principal y las notas no quedan sueltas. La redacción mantiene la fórmula legal concreta y las decisiones léxicas documentadas por el audit trail en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto solo cuando el texto corresponda al nombre divino; aquí no aplica.
  - Se conserva «vida por vida» para נֶפֶשׁ, evitando «alma» por razones léxicas y teológicas.
  - Se mantiene el paralelismo corporal literal («ojo», «diente», «mano», «pie») para reflejar la fórmula del talión.
