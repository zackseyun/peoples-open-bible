- from: El que muera de Ahab en la ciudad, los perros lo comerán[a]; y el que muera en el campo, lo comerán las aves del cielo[b].
  to: Cualquiera de los de Ahab que muera en la ciudad, los perros lo comerán[a]; y a cualquiera que muera en el campo, lo comerán las aves del cielo[b].
