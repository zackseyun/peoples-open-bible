translation:
  language: es
  text: Entonces Jetró, el suegro de Moisés, tomó un holocausto y sacrificios para Dios; y Aarón y todos los ancianos de Israel vinieron a comer pan[a] con el suegro de Moisés, delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a comer pan», un giro que puede significar «a compartir una comida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - ofreció
  lexicon: HALOT
  rationale: לקח en este contexto expresa primero el acto de tomar o traer las víctimas/ofrendas; la ofrenda misma se entiende por el sustantivo y el contexto sacrificial. «Tomó» conserva esa forma sin añadir una interpretación que el hebreo no dice de manera explícita.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses’ father-in-law
  chosen_spanish: el suegro de Moisés
  alternatives_spanish:
  - el pariente por matrimonio de Moisés
  lexicon: HALOT
  rationale: En este pasaje, חֹתֵן designa naturalmente al suegro. «Suegro» es la equivalencia directa y más transparente para el lector español.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - una ofrenda de ascensión
  lexicon: HALOT
  rationale: El término sacrificial estándar en español bíblico para עֹלָה es «holocausto». Aunque «ofrenda de ascensión» es más etimológica, resulta menos clara; «holocausto» preserva la categoría cultual reconocible.
- source_word: וּזְבָחִים
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas sacrificiales
  - sacrificios de inmolación
  lexicon: HALOT
  rationale: זְבָחִים es un plural amplio y no específico, distinto de עֹלָה. «Sacrificios» mantiene esa amplitud y la pareja con «holocausto» sin sobreprecisar.
- source_word: לֵאלֹהִים
  english_pob_choice: for God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  lexicon: HALOT
  rationale: La preposición ל admite «para» o «a». En español, con ofrendas, «para Dios» comunica bien la dedicación de lo sacrificado sin desplazar el sentido hacia movimiento físico.
- source_word: וַיָּבֹא אַהֲרֹן וְכֹל זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: Aaron and all the elders of Israel came
  chosen_spanish: Aarón y todos los ancianos de Israel vinieron
  alternatives_spanish:
  - Aarón y todos los ancianos de Israel llegaron
  - Aarón entró, y todos los ancianos de Israel
  lexicon: HALOT
  rationale: בוא se rinde de manera natural con «venir/llegar». «Vinieron» mantiene el plural coordinado en español y conserva el movimiento narrativo sin introducir un matiz que el hebreo no exige.
- source_word: לֶאֱכָל לֶחֶם
  english_pob_choice: to eat bread
  chosen_spanish: a comer pan
  alternatives_spanish:
  - a comer
  - a compartir una comida
  lexicon: HALOT
  rationale: La expresión literal hebrea es «comer pan». En español, «a comer pan» preserva la transparencia al texto fuente; el valor idiomático de comida compartida queda visible sin reemplazar el giro por una paráfrasis.
- source_word: עִם חֹתֵן מֹשֶׁה
  english_pob_choice: with Moses’ father-in-law
  chosen_spanish: con el suegro de Moisés
  alternatives_spanish:
  - con Jetró
  lexicon: HALOT
  rationale: El hebreo repite la designación relacional en vez del nombre propio. Reproducir «el suegro de Moisés» conserva ese patrón discursivo y evita resolverlo prematuramente en el nombre.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: לִפְנֵי puede significar «delante de» o «en presencia de». «Delante de Dios» es natural en español y mantiene el marco solemne y cultual del pasaje.
theological_decisions:
- issue: Sentido del comer pan en contexto sacrificial
  english_pob_reading: The verse describes a covenantal/sacrificial meal shared in God's presence after Jethro's offering.
  chosen_spanish_reading: El versículo describe una comida ritual o de comunión compartida en la presencia de Dios, vinculada a la ofrenda de Jetró.
  alternative_spanish_readings:
  - Solo informa que comieron pan juntos en sentido ordinario.
  - Describe una comida posterior sin relación teológica especial con los sacrificios.
  rationale: La combinación de holocausto, sacrificios, la participación de Aarón y los ancianos, y la frase «delante de Dios» apunta a una comida con peso cultual. La traducción conserva «a comer pan» para no borrar la tensión entre literalidad e idiomatismo, pero la redacción general deja visible el marco sagrado.
  doctrine_reference: Preservar la tensión teológica sin resolverla por paráfrasis
- issue: Referencia de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: En este contexto narrativo de Israel, el referente es singular. «Dios» evita introducir ambigüedad politeísta no respaldada por el pasaje.
  doctrine_reference: Monoteísmo narrativo de Israel
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el auditoría inglesa: conserva el verbo de tomar, el par de términos sacrificiales diferenciados, la repetición relacional «suegro de Moisés» y el giro idiomático «a comer pan» sin convertirlo de manera plana en «a compartir una comida» en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece; aquí el texto tiene אֱלֹהִים, por lo que corresponde «Dios».
  - Se eligió «holocausto» como término sacrificial estándar y no una calca etimológica menos transparente.
  - Se mantuvo «delante de Dios» para reproducir el valor preposicional de לִפְנֵי sin añadir explicaciones interpretativas en el texto principal.
  - «Aarón» y «Jetró» siguen la ortografía usual en español bíblico, consistente con el registro de la serie.
