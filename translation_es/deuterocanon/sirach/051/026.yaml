translation:
  language: es
  text: Pongan su cuello bajo su yugo[a], y que su alma cargue su carga. Ella está cerca de los que la buscan, y el que se entrega a sí mismo la encuentra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y que su alma reciba instrucción». El hebreo dice: «y que su alma cargue su carga».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְצַוְּארֵיכֶם
  english_pob_choice: your neck
  chosen_spanish: su cuello
  alternatives_spanish:
  - sus cuellos
  lexicon: HALOT
  rationale: El hebreo es plural, pero en español la imagen de exhortación suele sonar más natural en singular colectivo. «Su cuello» conserva la metáfora corporal sin volver la frase pesada o antinatural.
- source_word: בְּעֻלָּהּ
  english_pob_choice: under her yoke
  chosen_spanish: bajo su yugo
  alternatives_spanish:
  - en su yugo
  - debajo de su yugo
  lexicon: HALOT
  rationale: La imagen del yugo está confirmada por el paralelo griego (ὑπὸ ζυγόν). «Bajo su yugo» es la forma más natural en español para expresar sumisión a la disciplina de la Sabiduría.
- source_word: הָבִיאוּ
  english_pob_choice: Bring
  chosen_spanish: Pongan
  alternatives_spanish:
  - Traigan
  - Metan
  lexicon: HALOT
  rationale: El imperativo plural pide una acción directa. En español, «pongan» comunica mejor la colocación bajo el yugo que un «traigan» más literal pero menos idiomático en este contexto.
- source_word: וּמַשָּׂאָהּ
  english_pob_choice: her burden
  chosen_spanish: su peso
  alternatives_spanish:
  - su carga
  - su burden
  lexicon: HALOT
  rationale: El término puede ser «carga» o «peso». «Peso» mantiene bien la idea de algo que se soporta y evita una repetición demasiado rígida de «carga» junto con «yugo».
- source_word: תִּשָּׂא נַפְשְׁכֶם
  english_pob_choice: let your soul bear
  chosen_spanish: que su alma cargue
  alternatives_spanish:
  - que su alma soporte
  - que su alma lleve
  lexicon: HALOT; LXX Greek comparison
  rationale: La hebraica habla de que el alma/persona soporte la carga; el griego paralelo tiene «reciba instrucción». Se mantiene la imagen de «cargar» porque el hebreo es la base principal, y «alma» conserva la antropología del original.
- source_word: קְרוּבָה הִיא
  english_pob_choice: She is near
  chosen_spanish: Ella está cerca
  alternatives_spanish:
  - Está cerca
  lexicon: HALOT
  rationale: La personificación femenina de la Sabiduría justifica conservar «ella». «Está cerca» reproduce el sentido sin añadir matices no presentes.
- source_word: לִמְבַקְשֶׁיהָ
  english_pob_choice: to those who seek her
  chosen_spanish: de los que la buscan
  alternatives_spanish:
  - para los que la buscan
  - a quienes la buscan
  lexicon: HALOT
  rationale: La construcción española más natural para expresar cercanía es «cerca de». «Los que la buscan» conserva el movimiento activo hacia la Sabiduría.
- source_word: וְנוֹתֵן נַפְשׁוֹ
  english_pob_choice: the one who gives himself
  chosen_spanish: el que se entrega a sí mismo
  alternatives_spanish:
  - el que da su vida
  - el que se da
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «da su alma/vida». En español, «se entrega a sí mismo» comunica con claridad la idea de dedicación personal exigente sin reducirla a «morir».
- source_word: מוֹצֵא אֹתָהּ
  english_pob_choice: finds her
  chosen_spanish: la encuentra
  alternatives_spanish:
  - la halla
  lexicon: HALOT
  rationale: «La encuentra» es el equivalente directo y natural en español. Mantiene el objeto femenino referido a la Sabiduría personificada.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la segunda línea
  english_pob_reading: Main text follows the Hebrew 'bear her burden,' with Greek instructional nuance preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue la imagen hebrea de «cargar su peso», y la nota preserva la lectura griega de «recibir instrucción».
  alternative_spanish_readings:
  - «que su alma reciba instrucción»
  - «que su alma acepte disciplina»
  rationale: Sirach se traduce aquí desde el hebreo donde se conserva, pero el griego aporta una variante interpretativa significativa. La nota evita borrar esa tensión textual y permite ver ambas tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde existe; conservar variantes significativas del griego en nota.'
- issue: Personificación de la Sabiduría
  english_pob_reading: Use feminine pronouns ('her,' 'she') throughout.
  chosen_spanish_reading: 'Conservar pronombres femeninos: «su», «ella», «la».'
  alternative_spanish_readings:
  - usar «ello»
  - neutralizar la personificación
  rationale: El hebreo presenta a la Sabiduría con gramática femenina y el contexto la trata como figura personal. Neutralizarla debilitaría el sentido del pasaje.
  doctrine_reference: Principio de primacía del texto fuente y conservación de personificación cuando el original la expresa claramente.
translation_notes:
  revision_awareness: Alineado con el estado de revisión más reciente, que no introdujo cambios y mantuvo alta concordancia entre el hebreo y el paralelo griego.
  spanish_consistency_notes:
  - Se mantuvo «Sabiduría» mediante pronombres femeninos implícitos, sin convertirla en un concepto abstracto.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el pasaje no contiene el Tetragrámaton.
  - «Alma» se conservó para reflejar נֶפֶשׁ sin reducirlo a «vida» o «yo», porque el texto admite esa antropología bíblica.
  - La nota a pie de página marca explícitamente la variante griega sin desplazar la línea principal basada en el hebreo.
