revisions:
- from: Darás[a] sin falta a él, y no se entristecerá tu corazón[b] cuando le des; porque por causa de esto Yahvé tu Dios te bendecirá en toda tu obra y en todo lo que emprendas con tu mano[c].
  to: Ciertamente le darás[a], y tu corazón no será mezquino[b] cuando le des; porque por causa de esto Yahvé tu Dios te bendecirá en toda tu obra y en todo lo que emprendas con tu mano[c].
  rationale: Se ajustó la cláusula del corazón para reflejar mejor el sentido contextual de וְלֹא יֵרַע לְבָבְךָ como falta de generosidad interior o resentimiento al dar. También se mejoró la naturalidad de la apertura manteniendo el énfasis del infinitivo absoluto, y se conservaron Yahvé y la imagen de la mano en la frase final.
  reviewer_model: gpt-5.4
