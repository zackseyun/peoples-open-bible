translation:
  language: es
  text: Sacará todo el toro fuera del campamento, a un lugar limpio[a], al montón de cenizas[b]; lo quemará sobre madera con fuego; será quemado sobre el montón de cenizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «un lugar ritualmente limpio».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el lugar donde se vierten las cenizas»; es decir, un lugar designado para desechar las cenizas del altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצִיא
  english_pob_choice: He shall bring out
  chosen_spanish: Traerá
  alternatives_spanish:
  - Y traerá
  - Lo sacará
  lexicon: HALOT
  rationale: 'El hiphil de יצא es causativo: hacer salir / traer fuera. En español legal-instruccional, «traerá» suena natural y mantiene la acción sin recargar con auxiliaridad.'
- source_word: כָּל הַפָּר
  english_pob_choice: the whole bull
  chosen_spanish: todo el toro
  alternatives_spanish:
  - el toro entero
  - todo el becerro
  lexicon: HALOT
  rationale: כָּל con sustantivo definido enfatiza la totalidad del animal. «Todo el toro» conserva la idea de totalidad y sigue de cerca el referente sacrificial del hebreo.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - más allá del campamento
  - al exterior del campamento
  lexicon: HALOT
  rationale: La expresión designa un lugar fuera del perímetro del campamento. «Fuera del campamento» es la equivalencia española más clara y natural.
- source_word: מָקוֹם טָהוֹר
  english_pob_choice: a clean place
  chosen_spanish: un lugar limpio
  alternatives_spanish:
  - un lugar puro
  - un lugar ritualmente limpio
  lexicon: HALOT
  rationale: טָהוֹר aquí apunta al ámbito ritual, pero el texto principal puede decir «limpio» de manera legible; la nota preserva la posibilidad más explícita de limpieza ceremonial.
- source_word: שֶׁפֶךְ הַדֶּשֶׁן
  english_pob_choice: the ash heap
  chosen_spanish: el montón de ceniza
  alternatives_spanish:
  - el lugar donde se echan las cenizas
  - el basurero de ceniza
  lexicon: HALOT
  rationale: שֶׁפֶךְ sugiere un sitio de vertido o depósito; דֶּשֶׁן aquí se refiere a las cenizas del altar. «Montón de ceniza» comunica un lugar de desecho designado sin introducir un tecnicismo ajeno.
- source_word: וְשָׂרַף אֹתוֹ
  english_pob_choice: and burn it
  chosen_spanish: lo quemará
  alternatives_spanish:
  - y lo quemará
  - y lo incinerará
  lexicon: HALOT
  rationale: שׂרף es el verbo ordinario «quemar». El futuro simple mantiene el tono jurídico de instrucción.
- source_word: עַל עֵצִים בָּאֵשׁ
  english_pob_choice: on wood with fire
  chosen_spanish: sobre madera con fuego
  alternatives_spanish:
  - sobre leña en el fuego
  - sobre leña con fuego
  lexicon: HALOT
  rationale: El hebreo distingue el combustible (madera) y el medio/ámbito de combustión (fuego). «Sobre madera con fuego» conserva ambos elementos sin perder naturalidad en español.
- source_word: עַל שֶׁפֶךְ הַדֶּשֶׁן יִשָּׂרֵף
  english_pob_choice: it shall be burned on the ash heap
  chosen_spanish: será quemado sobre el montón de ceniza
  alternatives_spanish:
  - será quemado en el montón de ceniza
  - será quemado allí, en el montón de ceniza
  lexicon: HALOT
  rationale: La cláusula repite y enfatiza el lugar designado para el depósito. «Sobre» permite conservar la preposición hebrea y la repetición legal sin suavizarla demasiado.
theological_decisions:
- issue: Matiz ritual de טָהוֹר
  english_pob_reading: a clean place
  chosen_spanish_reading: un lugar limpio
  alternative_spanish_readings:
  - un lugar ritualmente limpio
  - un lugar puro
  rationale: El contexto levítico sugiere pureza ritual, pero el texto principal en español puede mantener una formulación accesible. La nota deja abierta la lectura ceremonial sin imponerla en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §5; §6
- issue: Naturaleza del sitio de disposición de las cenizas
  english_pob_reading: the ash heap
  chosen_spanish_reading: el montón de ceniza
  alternative_spanish_readings:
  - el lugar donde se echan las cenizas
  - el basurero de ceniza
  rationale: La frase no describe un montón casual, sino un sitio establecido para depositar las cenizas del altar. «Montón de ceniza» mantiene el carácter concreto del lugar y la repetición del hebreo.
  doctrine_reference: Translation philosophy §1; §6
translation_notes:
  revision_awareness: El inglés POB pasó de «ash dump» a «ash heap» y de «bring out» a «bring» en revisiones posteriores, manteniendo la misma estructura de fondo. La presente versión española sigue de cerca el hebreo y refleja la ubicación repetida del sitio de cenizas, conservando el matiz ritual de טָהוֹר en nota y una formulación natural para el flujo legal del mandato.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo, pues no aparece el nombre divino.
  - Se mantiene «toro» para concordar con el referente sacrificial del hebreo; no se introduce «becerro» porque la fuente específica dice פָּר.
  - Se preserva la repetición de la ubicación de las cenizas en dos miembros del versículo, como énfasis legal del hebreo.
  - Se evita «SEÑOR» y otras sustituciones cultuales no presentes en el texto fuente.
