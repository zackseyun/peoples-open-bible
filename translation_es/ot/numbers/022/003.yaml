translation:
  language: es
  text: Y Moab tuvo mucho miedo a causa del pueblo, porque era numeroso; y Moab se llenó de pavor[a] ante los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Moab aborreció a los hijos de Israel' / 'Moab sintió repugnancia por los hijos de Israel'. El verbo hebreo puede expresar aborrecimiento, disgusto o una aprensión muy intensa; aquí el contexto favorece un temor cargado de repulsión.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'hijos de Israel'; tradicionalmente, 'hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּגָר
  english_pob_choice: was very afraid
  chosen_spanish: tuvo mucho miedo
  alternatives_spanish:
  - estuvo muy atemorizado
  - sintió gran temor
  lexicon: HALOT
  rationale: El verbo expresa temor intenso o pavor; en español, "tuvo mucho miedo" comunica de forma natural la fuerza del hebreo, y "mucho" refleja היטב el intensificador מְאֹד.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y causal en este contexto. "A causa de" conserva la relación causal de manera clara y formal sin sonar mecánica.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - ese pueblo
  lexicon: HALOT
  rationale: El sustantivo colectivo singular se refiere a Israel como entidad. "El pueblo" reproduce bien ese uso colectivo en español bíblico moderno.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - sumamente
  lexicon: HALOT
  rationale: Como intensificador de miedo/temor, "mucho" es natural en español y mantiene la fuerza adverbial del hebreo.
- source_word: כִּי רַב הוּא
  english_pob_choice: because they were numerous
  chosen_spanish: porque era numeroso
  alternatives_spanish:
  - porque eran muchos
  - pues era grande
  lexicon: HALOT
  rationale: El hebreo usa un colectivo con verbo/pronombre singular; en español, el singular "era numeroso" conserva la concordancia con el colectivo y comunica la abundancia del pueblo sin forzar pluralización.
- source_word: וַיָּקָץ
  english_pob_choice: was filled with dread
  chosen_spanish: se llenó de pavor
  alternatives_spanish:
  - abominó
  - fue invadido por el horror
  - sintió repugnancia
  lexicon: HALOT
  rationale: El verbo puede abarcar repulsión, disgusto o una aprensión visceral. Dado el contexto narrativo, "se llenó de pavor" conserva la tensión de temor/repulsión sin reducirlo a una sola emoción. La nota en inglés deja ver esa amplitud semántica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la forma masculina explícita del hebreo, transparente y tradicionalmente comprensible en español. Evita neutralizar la imagen filial del original.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moab
  lexicon: HALOT
  rationale: Nombre propio geográfico/étnico transliterado de manera estándar.
translation_notes:
  revision_awareness: El draft sigue la revisión más reciente del POB inglés, que prefirió una formulación más natural y formal para וַיָּקָץ ('was filled with dread'). La versión española adopta una solución equivalente ('se llenó de pavor') manteniendo abierta la amplitud semántica de temor/repulsión señalada por el audit trail.
  spanish_consistency_notes:
  - Se conserva 'Moab' como sujeto repetido, como en el hebreo, para no suavizar el paralelismo.
  - Se usa 'hijos de Israel' de modo consistente con la preferencia del POB por una traducción formal y transparente del constructo hebreo.
  - La elección de 'pavor' para וַיָּקָץ evita colapsar el verbo en mero 'odio' o mero 'miedo' y preserva la tensión léxica documentada.
