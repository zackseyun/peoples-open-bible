translation:
  language: es
  text: Pidió agua; ella dio leche. En un tazón digno de nobles[a] le trajo cuajada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en un tazón de nobles’, literalmente ‘en un tazón de nobles’.
    reason: lexical_alternative
  - marker: b
    text: O ‘mantequilla’ o ‘crema’ para חֶמְאָה, un producto lácteo rico.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua potable
  - agua para beber
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo básico para ‘agua’. En español, ‘agua’ conserva de forma directa la petición literal de Sisara y el contraste con lo que Jael le dio.
- source_word: שָׁאַל
  english_pob_choice: asked for
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - preguntó por
  lexicon: HALOT
  rationale: El qal perfecto expresa que él solicitó agua. ‘Pidió’ es natural en español y mantiene la relación objeto-verbo sin añadir matices ajenos.
- source_word: חָלָב
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche fresca
  lexicon: HALOT
  rationale: El sentido léxico normal es ‘leche’. ‘Leche’ conserva el contraste narrativo con el agua pedida.
- source_word: נָתָנָה
  english_pob_choice: she gave
  chosen_spanish: dio
  alternatives_spanish:
  - le dio
  lexicon: HALOT
  rationale: La forma verbal femenina singular refiere a Jael. En español puede omitirse el objeto indirecto porque el contexto lo deja claro; ‘dio’ mantiene la concisión del hebreo.
- source_word: בְּסֵפֶל
  english_pob_choice: in a bowl
  chosen_spanish: en una vasija
  alternatives_spanish:
  - en un tazón
  - en un cuenco
  - en un vaso
  lexicon: HALOT
  rationale: סֵפֶל designa un recipiente tipo tazón o vasija. ‘Vasija’ es amplia pero natural; evita restringir el objeto a un tipo moderno demasiado específico.
- source_word: אַדִּירִים
  english_pob_choice: fit for nobles
  chosen_spanish: apta para nobles
  alternatives_spanish:
  - de nobles
  - para nobles
  - digna de nobles
  lexicon: HALOT
  rationale: El término califica el recipiente con una asociación de estatus elevado. ‘Apta para nobles’ transmite el sentido idiomático de un recipiente apropiado para huéspedes nobles o de alta dignidad.
- source_word: הִקְרִיבָה
  english_pob_choice: she brought
  chosen_spanish: le trajo
  alternatives_spanish:
  - presentó
  - ofreció
  - acercó
  lexicon: HALOT
  rationale: El hiphil de קרב literalmente significa ‘hacer acercar/traer’. En este contexto de hospitalidad, ‘le trajo’ comunica con claridad la acción sin sonar cultual.
- source_word: חֶמְאָה
  english_pob_choice: curds
  chosen_spanish: cuajada
  alternatives_spanish:
  - mantequilla
  - nata
  - crema
  lexicon: HALOT
  rationale: La palabra puede referirse a un producto lácteo espeso o cuajado. ‘Cuajada’ preserva bien la idea de un alimento lácteo rico y no impone de entrada ‘mantequilla’, que puede ser menos exacto en este contexto.
translation_notes:
  revision_awareness: El pasaje muestra un alto acuerdo textual y no requiere revisión de variante; la redacción sigue el hebreo masorético con el mismo contraste narrativo del audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió ‘Yahvé’ solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantuvo un registro sobrio y narrativo, acorde con poesía bélica en español.
  - ‘Cuajada’ se usó como equivalente principal de חֶמְאָה por claridad moderna, dejando alternativas en nota para no perder la amplitud semántica.
