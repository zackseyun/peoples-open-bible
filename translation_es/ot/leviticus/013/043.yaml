    text: Los dos términos para la calvicie probablemente distinguen la parte trasera de la cabeza y la parte frontal; se han vertido como «cabeza calva» y «frente calva» para conservar el contraste.
    reason: cultural_note
  - marker: b
    text: Hebreo צָרַעַת se ha traducido tradicionalmente «lepra», pero en Levítico designa de manera más amplia un conjunto de afecciones graves de la piel, no la lepra de Hansen en sentido médico moderno.
    reason: lexical_alternative
  revision_rationale: La revisión elimina la adición indebida «por la lepra», reubica la nota sobre צָרַעַת en el lugar pertinente, mejora la naturalidad de עוֹר בָּשָׂר con «en la carne» y sustituye el tecnicismo «tumefacción» por «hinchazón» para un español más claro y eclesialmente legible, sin perder la precisión diagnóstica del hebreo.
