base_translation:
  language: en
  yaml_path: translation/ot/joshua/021/032.yaml
  text: 'And from the tribe of Naphtali: Kedesh in Galilee[a], the city of refuge for the manslayer, with its pasturelands; Hammoth-dor with its pasturelands[b]; and Kartan with its pasturelands—three cities.'
  footnotes:
  - marker: a
    text: Or 'the city of refuge for the slayer.' The Hebrew term refers to one who has killed, especially in the legal context of asylum, not necessarily a premeditated murderer.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads Hammoth-dor; some traditions identify the place with Hammath.
    reason: alternative_reading
