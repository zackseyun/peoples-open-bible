    text: 'O: «prepárate como un guerrero». El hebreo dice literalmente: «cíñete los lomos como hombre», un modismo para disponerse con resolución.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y me lo darás a conocer» o «y me responderás». El hebreo es más literalmente «hacerme saber».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «varón» por «hombre» para conservar el masculino singular del hebreo con mejor naturalidad en español amplio. También se corrige la nota b para que la alternativa preserve el objeto implícito del causativo (‘me lo darás a conocer’), evitando una lectura desviada.
