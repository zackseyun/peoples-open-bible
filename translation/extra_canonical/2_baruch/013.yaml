theological_decisions:
- issue: Setting of Baruch’s revelation in verse 1
  chosen_reading: The draft retains Ceriani’s riverbank setting rather than harmonizing to Mount Zion.
  alternative_readings:
  - Baruch was standing on Mount Zion
  - The location should be conformed to the control tradition
  rationale: The project rule makes Ceriani the base witness. Because the control tradition differs here, the translation keeps the primary reading and marks the divergence in a footnote rather than silently replacing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Judgment on Israel and the nations in verses 8-11
  chosen_reading: 'God’s judgment is impartial: he first disciplined his own sons, and therefore the nations should not presume immunity.'
  alternative_readings:
  - The nations alone are in view
  - The line about his own sons is only rhetorical and not theological
  rationale: The oracle explicitly grounds coming judgment on the nations in God’s prior severity toward his own people. This preserves the book’s moral logic of divine impartiality.
  doctrine_reference: God's judgment is just, measured, and morally ordered.
- issue: Meaning of the nations’ sin in verse 11
  chosen_reading: The nations are condemned for unrighteous domination of the earth and of creation, not merely for political aggression.
  alternative_readings:
  - Only military oppression is intended
  - Only mistreatment of Israel is intended
  rationale: The language broadens the indictment to the created order itself. The chapter therefore frames empire as a violation of God’s righteous governance over creation.
  doctrine_reference: Creation belongs under God's moral governance, and human dominion is accountable.
