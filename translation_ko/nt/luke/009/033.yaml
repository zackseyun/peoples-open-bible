  text: 'And as they were departing from him[a], Peter said to Jesus, “Master, it is good for us to be here. Let us make three shelters: one for you, one for Moses, and one for Elijah” — not knowing what he was saying.'
  footnotes:
  - marker: a
    text: Or “booths,” “tents,” or traditionally “tabernacles.” The Greek skēnai refers to temporary shelters and may echo biblical festival imagery.
