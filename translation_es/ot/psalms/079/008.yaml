translation:
  language: es
  text: No recuerdes contra nosotros las iniquidades de tiempos pasados; que tus misericordias vengan pronto a encontrarnos[a], porque hemos sido abatidos en gran manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las iniquidades de nuestros antepasados»; o bien, «nuestras iniquidades pasadas». La expresión hebrea es temporalmente ambigua.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל / תִּזְכָּר
  english_pob_choice: Do not remember
  chosen_spanish: No recuerdes
  alternatives_spanish:
  - No tengas presentes
  - No traigas a memoria
  lexicon: HALOT
  rationale: El hebreo usa un prohibitivo con זכר; en español, el imperativo negativo «no recuerdes» transmite de manera natural la petición de que Dios no vuelva a traer esas culpas a la memoria judicial.
- source_word: לָנוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: HALOT
  rationale: Aunque literalmente la preposición puede ser «para/nos», el contexto de recuerdo en juicio exige explicitar la fuerza adversa. «Contra nosotros» conserva el matiz relacional hostil sin suavizarlo.
- source_word: עֲוֺנֹת
  english_pob_choice: iniquities
  chosen_spanish: iniquidades
  alternatives_spanish:
  - pecados
  - culpas
  - maldades
  lexicon: HALOT
  rationale: «Iniquidades» preserva el peso moral y culpable de עון, más preciso aquí que un simple «pecados».
- source_word: רִאשֹׁנִים
  english_pob_choice: of former times
  chosen_spanish: de tiempos pasados
  alternatives_spanish:
  - de antes
  - antiguas
  - primeras
  lexicon: HALOT
  rationale: El hebreo es temporalmente ambiguo; «de tiempos pasados» mantiene esa ambigüedad y no fuerza la interpretación de si se trata de antepasados o de pecados anteriores.
- source_word: מַהֵר יְקַדְּמוּנוּ
  english_pob_choice: let your mercies quickly come to meet us
  chosen_spanish: que tus misericordias vengan pronto a encontrarnos
  alternatives_spanish:
  - que tus misericordias nos salgan al encuentro rápidamente
  - que tus misericordias se apresuren a venir hacia nosotros
  lexicon: HALOT
  rationale: קדם expresa la idea de salir al encuentro o preceder. «Vengan pronto a encontrarnos» conserva la imagen y sugiere que la misericordia divina alcance al pueblo antes de que siga el desastre.
- source_word: רַחֲמֶיךָ
  english_pob_choice: your mercies
  chosen_spanish: tus misericordias
  alternatives_spanish:
  - tu compasión
  - tus compasiones
  lexicon: HALOT
  rationale: El plural hebreo favorece «misericordias»; mantiene la pluralidad y el registro bíblico sin arcaizar excesivamente.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, «porque» introduce con claridad la razón de la súplica, equivalente funcional de la causalidad del hebreo.
- source_word: דַלּוֹנוּ מְאֹד
  english_pob_choice: we have been brought very low
  chosen_spanish: hemos sido humillados muchísimo
  alternatives_spanish:
  - hemos sido abatidos en gran manera
  - estamos muy abatidos
  - hemos quedado muy debilitados
  lexicon: HALOT
  rationale: דלל expresa estar reducido, abatido o empobrecido. «Humillados» recoge bien el descenso de estado en un contexto de ruina nacional; «muchísimo» refleja מְאֹד con intensidad idiomática en español.
theological_decisions:
- issue: Ambigüedad de «las iniquidades de tiempos pasados»
  english_pob_reading: Rendered temporally as 'the iniquities of former times' without specifying whose sins are in view.
  chosen_spanish_reading: «las iniquidades de tiempos pasados» sin precisar si son pecados ancestrales o antiguos pecados del propio pueblo.
  alternative_spanish_readings:
  - las iniquidades de nuestros antepasados
  - nuestras iniquidades pasadas
  rationale: El hebreo permite ambas lecturas. La redacción española conserva esa tensión en vez de resolverla interpretativamente, siguiendo el principio de mantener la ambigüedad documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca la lectura auditada en inglés: mantiene la ambigüedad de רִאשֹׁנִים, conserva el plural de רַחֲמֶיךָ y expresa la fuerza adversativa de לָנוּ en un español natural. No se detectaron revisiones previas que requirieran ajuste.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable en este versículo; no hay sustituciones de nombre divino aquí.
  - «Misericordias» conserva el plural hebreo y la terminología POB preferida.
  - Se evitó suavizar עֲוֺנֹת a un término menos cargado como «faltas» para no perder el peso judicial/moral del texto.
  - La imagen de יְקַדְּמוּנוּ se mantuvo con un giro idiomático español («vengan pronto a encontrarnos») en lugar de una calca rígida.
  - La nota reproduce la ambigüedad reconocida en el audit trail y no introduce una resolución doctrinal nueva.
