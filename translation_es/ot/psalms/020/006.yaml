    rationale: 'El audit trail inglés y el contexto litúrgico-peticionario favorecen claramente el valor jussivo de יְמַלֵּא: «May Yahweh fulfill». En español, la forma más fiel es «Que Yahvé cumpla...». Mantener el futuro como texto principal altera la función discursiva del verso.'
  - severity: medium
    issue: La nota [c] presenta como alternativa la lectura que debería ser principal.
    rationale: Si el texto principal se corrige a «Que Yahvé cumpla...», la nota debe reservar la lectura futura («Yahvé cumplirá...» ) como alternativa, no al revés.
