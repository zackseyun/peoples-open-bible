translation:
  language: es
  text: 'Y los capataces los apremiaban[a], diciendo: «Terminen su trabajo, lo de cada día[b] en su día, tal como cuando había paja».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los supervisores». El hebreo se refiere a quienes exigían el trabajo forzado y administraban la presión laboral.
    reason: lexical_alternative
  - marker: b
    text: O «la cantidad diaria cada día». El hebreo dice literalmente «la cosa/asunto de un día en su día», una expresión idiomática que alude a la cantidad requerida para cada jornada.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּגְשִׂים
  english_pob_choice: the taskmasters
  chosen_spanish: los capataces
  alternatives_spanish:
  - los taskmasters
  - los supervisores
  - los opresores
  lexicon: HALOT
  rationale: En este contexto de trabajos forzados, נגשׂים designa a quienes imponían y exigían la producción. «Capataces» comunica bien la función coercitiva en español moderno sin perder la referencia laboral del pasaje. Evita un calco extraño como «taskmasters» y no suaviza el sentido a un mero supervisor neutral.
- source_word: אָצִים
  english_pob_choice: kept pressing
  chosen_spanish: los apremiaban
  alternatives_spanish:
  - los urgían
  - los apuraban
  - los presionaban
  lexicon: HALOT
  rationale: El participio expresa presión continua e insistente. «Apremiaban» conserva la fuerza coercitiva y la idea de insistencia durativa mejor que una forma más débil como «urgían».
- source_word: כַלּוּ
  english_pob_choice: Finish
  chosen_spanish: Terminen
  alternatives_spanish:
  - Acaben
  - Completen
  - Den por terminado
  lexicon: HALOT
  rationale: Es un mandato directo de concluir la tarea asignada. «Terminen» es natural en español y transmite el imperativo sin añadir matices no presentes en el hebreo.
- source_word: מַעֲשֵׂיכֶם
  english_pob_choice: your work
  chosen_spanish: su trabajo
  alternatives_spanish:
  - sus tareas
  - su labor
  - su obra
  lexicon: HALOT
  rationale: Aquí se refiere al trabajo impuesto de fabricación de ladrillos. «Su trabajo» es suficientemente amplio y natural; en el contexto esclavizante, no conviene reducirlo a «tareas» ni volverlo abstracto como «obra».
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: each day’s matter in its day
  chosen_spanish: la materia de cada día en su día
  alternatives_spanish:
  - lo de cada día en su día
  - el asunto de cada día en su día
  - la cantidad diaria en su día
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático literalmente «la cosa/materia de un día en su día». «La materia de cada día en su día» conserva la extrañeza semántica documentada por la POB inglesa sin convertirla prematuramente en «cuota», que interpretaría más de lo que el hebreo dice. Mantiene la tensión entre literalidad e inteligibilidad con una nota explicativa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - igual que
  - como
  lexicon: HALOT
  rationale: Introduce una comparación con la situación anterior. «Tal como» transmite la equivalencia comparativa de manera clara y natural.
- source_word: בִּהְיוֹת הַתֶּבֶן
  english_pob_choice: when there was straw
  chosen_spanish: cuando había paja
  alternatives_spanish:
  - cuando había tamo
  - cuando se proveía paja
  - cuando la paja estaba disponible
  lexicon: HALOT
  rationale: El infinitivo con בְּ marca la situación anterior en que la paja existía/proveía para el trabajo. «Paja» es el equivalente más natural en español; «tamo» sería menos claro en el registro general. La frase conserva el contraste implícito con la ausencia actual de paja.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión revisada de la POB inglesa de mantener דְּבַר יוֹם בְּיוֹמוֹ de forma más literal que «cuota». Se conservó la comparación final con «cuando había paja» sin explicitar más de lo que el hebreo indica. La opción española busca ser publicable y natural, pero preserva la rareza idiomática mediante nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo el tono de trabajo forzado con «capataces» y «apremiaban», coherente con la terminología POB de coerción laboral.
  - No se introdujo vocabulario doctrinal ajeno al versículo.
  - La nota sobre «la materia de cada día en su día» preserva la tensión léxica del hebreo sin reemplazarla por una interpretación demasiado específica.
