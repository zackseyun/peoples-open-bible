translation:
  language: es
  text: Pero él abandonó el consejo de los ancianos que le habían dado, y consultó con los jóvenes que se habían criado con él, quienes estaban delante de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quienes lo atendían» / «quienes le servían»; el modismo hebreo «estar delante de él» puede denotar servicio de corte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó
  - desatendió
  - rechazó
  lexicon: HALOT
  rationale: עזב puede significar dejar, abandonar o apartar. «Abandonó» reproduce bien la decisión deliberada de Rehoboam de desechar el consejo, con fuerza semejante a la elección inglesa.
- source_word: עֲצַת
  english_pob_choice: advice
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo
  - consejo orientador
  - asesoramiento
  lexicon: HALOT
  rationale: En español, «consejo» comunica de manera natural la orientación dada al rey. «Advice» en inglés se traduce mejor por «consejo» aquí que por un término más abstracto.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los mayores
  lexicon: HALOT
  rationale: זקנים no se refiere solo a edad, sino a hombres de rango y autoridad. «Ancianos» conserva esa carga de respetabilidad y función consultiva en español bíblico y moderno.
- source_word: אֲשֶׁר יְעָצֻהוּ
  english_pob_choice: that they had given him
  chosen_spanish: que le habían dado
  alternatives_spanish:
  - con que le habían aconsejado
  - que le habían aconsejado
  lexicon: HALOT
  rationale: El hebreo expresa que los ancianos le dieron ese consejo. «Le habían dado» con «consejo» evita la repetición pesada de «aconsejar» y sigue el valor idiomático reconocido por la POB inglesa.
- source_word: וַיִּוָּעַץ
  english_pob_choice: consulted with
  chosen_spanish: consultó con
  alternatives_spanish:
  - tomó consejo con
  - se asesoró con
  lexicon: HALOT
  rationale: El niphal de יעץ expresa consulta recíproca. «Consultó con» es claro y natural en español, y conserva la idea de buscar deliberación junto con otros.
- source_word: הַיְלָדִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los mozos
  lexicon: HALOT
  rationale: Aunque el término puede ser más amplio, el contraste con los ancianos pide una referencia a personas jóvenes, no a niños. «Los jóvenes» es más neutral y natural que «los muchachos».
- source_word: אֲשֶׁר גָּדְלוּ אִתּוֹ
  english_pob_choice: who had grown up with him
  chosen_spanish: que se habían criado con él
  alternatives_spanish:
  - que habían crecido con él
  - que crecieron con él
  lexicon: HALOT
  rationale: La expresión indica crianza o maduración compartida. «Se habían criado con él» suena natural en español y refleja bien la relación de cercanía desde la formación.
- source_word: אֲשֶׁר הָעֹמְדִים לְפָנָיו
  english_pob_choice: who stood before him
  chosen_spanish: los que estaban delante de él
  alternatives_spanish:
  - los que servían ante él
  - los que estaban a su servicio
  lexicon: HALOT
  rationale: La frase hebrea conserva el modismo de corte «estar de pie delante de». «Estaban delante de él» preserva la imagen literal; su sentido funcional queda sugerido por el contexto y puede explicarse en nota.
translation_notes:
  revision_awareness: 'El texto inglés de la POB mantiene una traducción optimizada y añade una nota para el modismo de corte en «stood before him». La versión española conserva esa misma tensión: texto principal literal-comprensible y nota para la alternativa funcional.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Ancianos» se usa con valor de consejo reconocido, no como simple referencia a edad.
  - Se evitó «siervos» en el texto principal porque el hebreo aquí habla del grupo que estaba ante el rey; la nota ofrece la posibilidad funcional de servicio o atención.
