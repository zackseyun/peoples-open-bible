  yaml_path: translation/deuterocanon/sirach/049/006.yaml
  text: They set the holy city on fire[a], and made its streets desolate, by the hand of Yirmeyahu; for they afflicted him[c][b], though he had been formed in the womb as a prophet.
  footnotes:
  - marker: a
    text: Or 'through Yirmeyahu,' that is, in connection with his prophetic ministry or warning. The Hebrew idiom 'by the hand of' is retained in the main text; the syntax here is compressed.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'paths/ways'; in the context of a city, 'streets' conveys the sense.
    reason: lexical_alternative
  - marker: c
    text: The line echoes Yirmeyahu's calling from the womb; compare Jeremiah 1:5.
    reason: cross_reference
