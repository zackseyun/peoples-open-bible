revisions:
- from: Porque por la vanidad humana entró en el mundo[a][b], y por eso se ideó que su fin fuera breve[c].
  to: Pues por la vanidad humana entró en el mundo[a][b], y por eso les fue ideado un fin breve[c].
  rationale: Se ajustó la redacción para lograr un español más natural y conservar mejor la pasividad indefinida del griego. 'Pues' evita la torpeza de 'Porque por', y 'les fue ideado un fin breve' refleja de manera más directa ἐπενόηθη σύντομον αὐτῶν τέλος sin introducir un agente explícito.
