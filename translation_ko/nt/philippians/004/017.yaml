id: PHP.4.17
reference: Philippians 4:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐχ ὅτι ἐπιζητῶ τὸ δόμα, ἀλλὰ ἐπιζητῶ τὸν καρπὸν τὸν πλεονάζοντα εἰς λόγον ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/017.yaml
  text: Not that I seek the gift, but I seek the fruit that increases to your account.
translation:
  language: ko
  text: 내가 그 선물을 구하는 것이 아닙니다. 도리어 내가 구하는 것은 여러분의 계좌[a]에 더해지는 열매입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「여러분의 셈에」(εἰς λόγον ὑμῶν). 회계·결산 어휘를 비유로 빌려, 빌립보 성도의 후원이 그들 자신의 영적 유익으로 쌓여 간다는 의미를 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὅτι ... ἀλλὰ
  english_pob_choice: Not that ... but
  chosen_korean: ~것이 아닙니다. 도리어 ~
  alternatives_korean:
  - ~것이 아니라 오히려
  - ~것이 아닙니다. 오히려
  lexicon: BDAG
  rationale: 명료화·대조 구문을 한국어 두 문장으로 자연스럽게 나눈다. 「도리어」가 ἀλλά의 대조적 전환을 잘 담는다.
- source_word: ἐπιζητῶ
  english_pob_choice: I seek
  chosen_korean: 구하는
  alternatives_korean:
  - 추구하는
  - 바라는
  lexicon: BDAG
  rationale: 능동적 추구를 가리키는 ἐπιζητέω. 「구하다」가 한국 교회 정형어이며 합쇼체 흐름에 자연스럽다.
- source_word: τὸ δόμα
  english_pob_choice: the gift
  chosen_korean: 그 선물
  alternatives_korean:
  - 선물 자체
  - 그 예물
  lexicon: BDAG
  rationale: 정관사를 「그」로 살려 빌립보 성도가 보낸 구체적 선물을 가리킴을 분명히 한다. 영어 POB의 「the gift itself」 강조는 한국어에서 「그」만으로 충분히 전달된다.
- source_word: τὸν καρπὸν
  english_pob_choice: the fruit
  chosen_korean: 열매
  alternatives_korean:
  - 결실
  - 소득
  lexicon: BDAG
  rationale: 비유적 「열매」를 그대로 보존한다. 「소득」으로 옮기면 회계 어휘로 평탄화되어 비유의 긴장이 사라진다.
- source_word: πλεονάζοντα
  english_pob_choice: that increases
  chosen_korean: 더해지는
  alternatives_korean:
  - 늘어나는
  - 풍성해지는
  lexicon: BDAG
  rationale: 현재 능동 분사의 지속적 증가를 「더해지는」으로 자연스럽게 옮긴다. 「쌓이는」도 가능하나 회계 함의가 「계좌」 어휘에 이미 들어 있다.
- source_word: εἰς λόγον ὑμῶν
  english_pob_choice: to your account
  chosen_korean: 여러분의 계좌에
  alternatives_korean:
  - 여러분의 셈에
  - 여러분에게 유익이 되도록
  - 여러분의 공로로
  lexicon: BDAG
  rationale: 15절의 「주고받음의 셈」(λόγος δόσεως καὶ λήμψεως)과 어휘적 연결을 위해 회계 비유를 본문에 살린다. 현대 한국어 독자에게 가장 친숙한 「계좌」를 본문에, 직역 「셈」을 각주에 둔다.
