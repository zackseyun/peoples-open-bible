  text: 하나님께서는 미리 아신 자기 백성을 버리지 않으셨습니다. 여러분은 성경이 엘리야에 관해 무엇이라고 말하는지 알지 못합니까? 그가 이스라엘에 대하여 하나님께 호소하기를,
