  language: en
  yaml_path: translation/ot/1_samuel/007/001.yaml
  text: Then the men of Kiriath-jearim came and brought up the ark of Yahweh[a], and they brought it into the house of Abinadab on the hill[b]. And they consecrated Eleazar his son to keep the ark of Yahweh.
  footnotes:
