translation:
  language: es
  text: Porque he tomado el pecho de la ofrenda mecida y el muslo de la contribución[a] de los hijos de Israel, de los sacrificios de sus ofrendas de paz[b][c], y se los he dado a Aarón el sacerdote y a sus hijos como estatuto perpetuo de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: "ofrenda alzada". El hebreo designa una porción apartada y presentada como ofrenda.'
    reason: lexical_alternative
  - marker: b
    text: O "ofrenda elevada". El hebreo puede referirse a una porción levantada o apartada ritualmente.
    reason: lexical_alternative
  - marker: c
    text: O "ofrendas de comunión". La expresión hebrea es un término técnico para un tipo de sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזֵה
  english_pob_choice: breast
  chosen_spanish: pecho
  alternatives_spanish:
  - pecho
  - pecho del animal
  - pechuga
  lexicon: HALOT
  rationale: El término designa la porción del animal destinada al sacerdote. En español, 'pecho' comunica con naturalidad esa parte sacrificial; 'pechuga' sería más culinario y menos adecuado, y 'pecho del animal' es más pesado.
- source_word: תְּנוּפָה
  english_pob_choice: wave offering
  chosen_spanish: ofrenda mecida
  alternatives_spanish:
  - ofrenda mecida
  - ofrenda alzada
  - ofrenda de movimiento
  lexicon: HALOT
  rationale: La POB inglesa usa un término cultual específico. 'Ofrenda mecida' conserva el sentido ritual de una ofrenda asociada al gesto de mecer o presentar, sin caer en una traducción mecánica.
- source_word: שׁוֹק
  english_pob_choice: thigh
  chosen_spanish: pierna
  alternatives_spanish:
  - pierna
  - muslo
  - parte superior de la pierna
  lexicon: HALOT
  rationale: Aunque 'muslo' puede sonar más anatómico, 'pierna' es más natural en español y puede abarcar la porción asignada. Se mantiene la referencia corporal sin forzar un tecnicismo poco transparente.
- source_word: תְּרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - contribución
  - ofrenda alzada
  - ofrenda levantada
  lexicon: HALOT
  rationale: La POB inglesa eligió 'contribution' para destacar la porción apartada. 'Contribución' reproduce esa idea en español moderno, aunque se conserva la posibilidad cultual en nota por la ambigüedad del término.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la designación formal y covenantal del hebreo, siguiendo la opción de la POB por transparencia léxica.
- source_word: זִבְחֵי שַׁלְמֵיהֶם
  english_pob_choice: their sacrifices of peace offerings
  chosen_spanish: los sacrificios de sus ofrendas de paz
  alternatives_spanish:
  - los sacrificios de sus ofrendas de paz
  - sus sacrificios de comunión
  - sus sacrificios de paz
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' mantiene la terminología cultual tradicional y refleja el campo semántico de שְׁלָמִים. Se evita ''comunión'' porque introduce una lectura interpretativa no explícita en el hebreo.'
- source_word: וָאֶתֵּן אֹתָם
  english_pob_choice: I have given them
  chosen_spanish: se las he dado
  alternatives_spanish:
  - se las he dado
  - y se las di
  - las he dado
  lexicon: HALOT
  rationale: El perfecto hebreo y la lectura declarativa justifican un perfecto español. Se antepone el dativo 'se' porque en español es la realización natural de 'les' + objeto directo femenino plural implícito.
- source_word: לְחָק עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como estatuto perpetuo
  - como estatuto permanente
  - como mandato perpetuo
  lexicon: HALOT
  rationale: '''Estatuto perpetuo'' es una fórmula clara y bíblica en español que preserva el carácter legal y duradero del hebreo sin volverlo demasiado moderno o administrativo.'
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de entre los hijos de Israel
  - de parte de los hijos de Israel
  - de los hijos de Israel
  lexicon: HALOT
  rationale: La repetición al final marca origen y ámbito de procedencia. 'De entre' ayuda a reflejar el matiz distributivo/legal del hebreo mejor que un simple 'de'.
theological_decisions:
- issue: Designación covenantal de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina plural y formal del hebreo, en coherencia con la política del proyecto de transparencia lexical. No se neutraliza a una colectividad genérica porque el texto funciona como designación pactal estable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Categoría sacrificial de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: '''Ofrendas de paz'' preserva el término cultual tradicional sin imponer una interpretación más interpretativa como ''comunión''. La traducción conserva la tensión entre categoría ritual y sentido relacional implícito.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Sentido de תְּרוּמָה
  english_pob_reading: contribution
  chosen_spanish_reading: contribución
  alternative_spanish_readings:
  - ofrenda alzada
  - ofrenda levantada
  rationale: La elección enfatiza la porción apartada/dedicada, siguiendo la decisión inglesa de modernizar el término. Se evita una palabra exclusivamente litúrgica que podría ocultar la función concreta de la porción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'Se siguió el audio-trazado inglés sin cambios sustantivos: se conservaron los paralelismos legales y la distinción entre תְּנוּפָה y תְּרוּמָה. La principal adaptación fue lexical en español para lograr naturalidad sin perder transparencia cultual.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo no contiene el tetragrámaton.
  - Se conservó la fórmula 'hijos de Israel' / 'los hijos de Israel' para máxima transparencia; si el contexto editorial requiere mayor idiomaticidad, 'israelitas' sería una alternativa, pero no se adoptó aquí.
  - '''Ofrendas de paz'' y ''ofrendas de comunión'' se mantienen distinguidas en nota para respetar la terminología cultual del proyecto.'
