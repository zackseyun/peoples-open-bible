translation:
  language: es
  text: 'Entonces yo, Daniel, miré, y he aquí, otros dos estaban de pie: uno en esta ribera del río[a], y uno en la otra ribera del río.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno en esta orilla del río y uno en la otra orilla del río».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  english_pob_choice: Then I ... looked
  chosen_spanish: Entonces yo... miré
  alternatives_spanish:
  - Y vi
  - Entonces vi
  lexicon: HALOT
  rationale: El waw + qatal avanza la narración. «Entonces» conserva la secuencia, y «miré» expresa con naturalidad la acción visual inmediata sin perder el valor de ver.
- source_word: אֲנִי דָנִיֵּאל
  english_pob_choice: I, Daniel
  chosen_spanish: yo, Daniel
  alternatives_spanish:
  - Daniel
  - yo Daniel
  lexicon: HALOT
  rationale: El pronombre explícito con el nombre propio es enfático y se mantiene con «yo, Daniel» para conservar la autoidentificación sin sobrerreformular.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La partícula introduce una nueva escena visible. «He aquí» reproduce esa fuerza deíctica en un registro bíblico claro y natural en español.
- source_word: שְׁנַיִם אֲחֵרִים
  english_pob_choice: two others
  chosen_spanish: dos otros
  alternatives_spanish:
  - dos más
  - dos otros seres
  lexicon: HALOT
  rationale: «אֲחֵרִים» marca distinción respecto de la figura mencionada antes. «Dos otros» preserva esa relación sin identificar a los sujetos más de lo que hace el hebreo.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban parados
  - se hallaban de pie
  lexicon: HALOT
  rationale: El participio describe una postura continua. «Estaban de pie» expresa bien el estado durativo en español y conserva la escena.
- source_word: הֵנָּה
  english_pob_choice: this bank / that bank
  chosen_spanish: esta ribera / la otra ribera
  alternatives_spanish:
  - este lado / el otro lado
  - esta orilla / la otra orilla
  lexicon: HALOT
  rationale: El adverbio señala ubicación relativa. «Esta ribera» y «la otra ribera» reflejan el contraste espacial del texto y su valor de lado opuesto.
- source_word: לִשְׂפַת
  english_pob_choice: on ... bank
  chosen_spanish: en ... ribera
  alternatives_spanish:
  - a la ribera de
  - sobre la ribera
  lexicon: HALOT
  rationale: El sustantivo significa borde, orilla o ribera. Con un río, «ribera» es la equivalencia más precisa y estilísticamente natural.
- source_word: הַיְאֹר
  english_pob_choice: the river
  chosen_spanish: del río
  alternatives_spanish:
  - del torrente
  - del Nilo
  lexicon: HALOT
  rationale: Aunque יְאֹר puede referirse al Nilo en otros contextos, aquí el contexto de la visión favorece «río» sin introducir una identificación más específica.
theological_decisions:
- issue: Identidad de los dos otros
  english_pob_reading: Render neutrally as 'two others' without specifying angelic identity.
  chosen_spanish_reading: Traducir neutralmente como «dos otros» sin especificar identidad angelical.
  alternative_spanish_readings:
  - dos ángeles
  - dos seres celestiales
  rationale: El hebreo no identifica explícitamente a estos personajes en este versículo. Mantener la neutralidad preserva la tensión interpretativa y evita añadir una precisión no textual.
  doctrine_reference: 'Principio de transparencia textual: no resolver una identificación teológica que el versículo no formula.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota al texto mediante el marcador [a] en «uno[a]». La redacción mantiene el sentido del original y conserva la alternativa lexical documentada por el POB en forma de nota visible.
  spanish_consistency_notes:
  - Se prefirió «he aquí» para וְהִנֵּה por su valor deíctico y su registro bíblico natural.
  - «Ribera» se usa para preservar el matiz espacial de לִשְׂפַת sin forzar una lectura específica más allá del contexto.
  - No se identificó a los dos personajes como ángeles, en fidelidad al hebreo y al audit trail en inglés.
