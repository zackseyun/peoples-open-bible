translation:
  language: es
  text: 'Y desde su interior salía la semejanza de cuatro seres vivientes[a]. Y este era su aspecto: tenían la semejanza de un hombre[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cuatro seres vivos’.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘la semejanza de un hombre’; es decir, aparecían en forma humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִתּוֹכָהּ
  english_pob_choice: And from within it
  chosen_spanish: Y desde su interior salía
  alternatives_spanish:
  - Y desde en medio de ella salía
  - Y de en medio de ella salía
  - Y desde dentro de ella salía
  lexicon: HALOT
  rationale: La expresión hebrea indica procedencia espacial ‘desde en medio / desde dentro de’. En español, ‘desde su interior’ conserva bien el sentido y suena natural; se mantiene el referente femenino implícito del contexto previo.
- source_word: דְּמוּת
  english_pob_choice: the likeness of
  chosen_spanish: la semejanza de
  alternatives_spanish:
  - la forma de
  - la apariencia de
  - la imagen de
  lexicon: HALOT
  rationale: En Ezequiel, דְּמוּת marca semejanza, no identidad plena. ‘Semejanza’ preserva esa distancia fenomenológica y evita cerrar la visión más de lo que el hebreo permite.
- source_word: אַרְבַּע חַיּוֹת
  english_pob_choice: four living creatures
  chosen_spanish: cuatro seres vivientes
  alternatives_spanish:
  - cuatro criaturas vivientes
  - cuatro seres vivos
  - cuatro criaturas
  lexicon: HALOT
  rationale: חַיּוֹת refiere a seres animados en la visión. ‘Seres vivientes’ es claro en español y mantiene la vitalidad sin forzarlos a la categoría más estrecha de ‘animales’.
- source_word: מַרְאֵיהֶן
  english_pob_choice: their appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su apariencia
  - su semblante
  - su forma visible
  lexicon: HALOT
  rationale: מראה señala lo que se ve. ‘Aspecto’ comunica bien la idea visual en español y permite una transición natural hacia la descripción siguiente.
- source_word: דְּמוּת אָדָם
  english_pob_choice: the likeness of a man
  chosen_spanish: la semejanza de un hombre
  alternatives_spanish:
  - la semejanza de un ser humano
  - una semejanza humana
  - la forma de un hombre
  lexicon: HALOT
  rationale: 'אָדָם aquí describe forma humana. ‘Hombre’ sigue de cerca el singular hebreo, mientras ‘semejanza’ conserva la cautela del texto: no afirma identidad humana, sino parecido humano.'
- source_word: לָהֵנָּה
  english_pob_choice: they had
  chosen_spanish: era
  alternatives_spanish:
  - tenían
  - les pertenecía
  - era suya
  lexicon: HALOT
  rationale: La construcción final hebrea es posesivo-predicativa (‘a ellas’). En español, ‘este era su aspecto’ completa naturalmente la idea y evita una repetición pesada del verbo ‘tener’.
theological_decisions:
- issue: Preservar la cautela visionaria de Ezequiel
  english_pob_reading: Retain repeated 'likeness' language and render חיות as 'living creatures'
  chosen_spanish_reading: Mantener la repetición de ‘semejanza’ y traducir חַיּוֹת como ‘seres vivientes’
  alternative_spanish_readings:
  - Traducir más directamente ‘cuatro criaturas’
  - Interpretarlas explícitamente como ángeles en el texto principal
  rationale: El versículo describe una visión con lenguaje de apariencia y semejanza, no de identificación absoluta. La versión española conserva esa reserva teológica y fenomenológica sin añadir especificaciones que el hebreo no da.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje fuente hebreo, la equivalencia óptima de la versión inglesa y su cautela repetida con דְּמוּת y חַיּוֹת. No se introdujeron revisiones previas, y la redacción española sigue esa misma línea de preservación de la distancia visionaria.
  spanish_consistency_notes:
  - Se mantuvo ‘semejanza’ para דְּמוּת en ambas ocurrencias.
  - Se evitó ‘SEÑOR’ u otras convenciones no presentes en este versículo.
  - ‘Seres vivientes’ conserva el tono visionario sin sobreinterpretación.
  - La puntuación separa con claridad la descripción general y la precisión del aspecto.
