    text: O «Miren». Fórmula de atención profética.
    reason: lexical_alternative
  - marker: b
    text: O «una copa de mareo». El hebreo puede entenderse también de manera más literal como «una vasija/umbral de aturdimiento», pero en contexto la imagen de una copa que produce desorientación es la que mejor encaja.
    reason: lexical_alternative
  - marker: c
    text: El hebreo de esta segunda cláusula es difícil. También puede significar «Judá también será sitiada junto con Jerusalén» o «esto también vendrá sobre Judá en el asedio contra Jerusalén».
    reason: alternative_reading
  revision_rationale: La revisión mantiene las decisiones léxicas principales de la POB inglesa, pero corrige la segunda cláusula para reflejar mejor la dificultad sintáctica del hebreo sin resolverla en exceso. También mejora la naturalidad del español con «estoy a punto de hacer de Jerusalén» y «en el asedio»; además, se añade la nota alternativa que la auditoría inglesa conservó para la cláusula difícil.
