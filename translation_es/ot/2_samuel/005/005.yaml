translation:
  language: es
  text: En Hebrón reinó en Judá siete años y seis meses, y en Jerusalén reinó treinta y tres años sobre todo Israel y Judá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּחֶבְרוֹן
  english_pob_choice: In Hebron
  chosen_spanish: En Hebrón
  alternatives_spanish:
  - En la ciudad de Hebrón
  - En Hebrón, ciudad de Judá
  lexicon: HALOT
  rationale: El prefijo preposicional ב indica ubicación. En español, «En Hebrón» comunica de forma natural el lugar donde reinó David, sin añadir información no presente en el hebreo.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El qatal resume el período de gobierno, no solo el momento de ascenso. «Reinó» conserva el valor verbal de duración y evita desplazar el foco a la coronación.
- source_word: עַל יְהוּדָה
  english_pob_choice: over Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - para Judá
  - en Judá
  lexicon: HALOT
  rationale: עַל con מלך expresa la esfera o pueblo sobre el cual se ejerce el reinado. «Sobre Judá» mantiene esa relación de dominio de manera directa en español.
- source_word: שֶׁ֥בַע שָׁנִ֖ים וְשִׁשָּׁ֣ה חֳדָשִׁ֑ים
  english_pob_choice: seven years and six months
  chosen_spanish: siete años y seis meses
  alternatives_spanish:
  - siete años, seis meses
  - por siete años y seis meses
  lexicon: HALOT
  rationale: La secuencia temporal es transparente y debe conservarse sin parafraseo. «Siete años y seis meses» refleja con precisión la duración en español idiomático.
- source_word: וּבִירוּשָׁלִַ֣ם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y en la ciudad de Jerusalén
  - y en Jerusalén también
  lexicon: HALOT
  rationale: La conjunción y preposición introducen el segundo lugar de reinado. «Y en Jerusalén» es la correspondencia natural y fiel del hebreo.
- source_word: שְׁלֹשִׁ֤ים וְשָׁלֹשׁ֙ שָׁנָ֔ה
  english_pob_choice: thirty-three years
  chosen_spanish: treinta y tres años
  alternatives_spanish:
  - treinta y tres años exactos
  - treinta y tres años completos
  lexicon: HALOT
  rationale: La expresión cardinal hebrea se rinde con el número compuesto normal en español. No hay motivo para explicitar «exactos» o «completos», porque el texto no lo dice.
- source_word: עַל כָּל יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: over all Israel and Judah
  chosen_spanish: sobre todo Israel y Judá
  alternatives_spanish:
  - sobre todo Israel, incluso Judá
  - sobre todo Israel, y también Judá
  lexicon: HALOT
  rationale: El hebreo conserva ambas designaciones políticas. «Todo Israel y Judá» mantiene la distinción sin fusionarlas ni armonizarlas, y «sobre» refleja el valor de מלך con עַל.
theological_decisions:
- issue: Distinción entre Israel y Judá al final del versículo
  english_pob_reading: over all Israel and Judah
  chosen_spanish_reading: sobre todo Israel y Judá
  alternative_spanish_readings:
  - sobre todo Israel, incluso Judá
  - sobre todo Israel, y también Judá
  rationale: El hebreo nombra ambos grupos, lo que preserva la tensión política e histórica del reino unificado. La traducción no debe borrar esa distinción ni hacerla parecer un mero doblete estilístico.
  doctrine_reference: Historiografía bíblica y unidad monárquica de Israel
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y mantenido sin cambios en la última pasada, con acuerdo alto entre evaluadores; no hay revisiones aplicadas que afecten este versículo.
  spanish_consistency_notes:
  - Se usó «reinó» de forma consistente para מָלַךְ, siguiendo la lectura durativa del contexto.
  - Se mantuvo «Judá» e «Israel» como designaciones políticas distintas en toda la línea final.
  - No se introdujeron términos eclesiásticos o tradicionales ajenos al hebreo; el verso queda en español moderno, claro y sobrio.
