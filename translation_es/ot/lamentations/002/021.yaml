    text: O "no tuviste piedad".
    reason: lexical_alternative
  revision_rationale: Se revisa 'mis jóvenes' a 'mis hombres jóvenes' para reflejar con precisión el masculino específico de וּבַחוּרַי y preservar el paralelismo con 'mis vírgenes'. También se suaviza la puntuación suprimiendo la coma tras 'suelo' para una lectura más natural en español sin cambiar el sentido.
