review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: condición legal con אִישׁ, presentación de un sacrificio de שְׁלָמִים a Yahvé, alternativa entre voto y ofrenda voluntaria, procedencia del ganado, y exigencia de integridad física para aceptación. Sin embargo, hay un desajuste de anclaje en las notas: la nota [a] en español está puesta sobre «Yahvé», pero su contenido corresponde a «para cumplir un voto / para realizar un voto». La nota [b] está puesta sobre «aceptado», pero su contenido corresponde a «ofrendas de paz». Además, «falla» para מוּם es menos preciso que «defecto».'
  spanish_quality_summary: El español es en general claro y digno. «Y si un hombre presenta a Yahvé un sacrificio de ofrendas de paz...» es natural, aunque algo pesado por la doble noción sacrificial; sigue de cerca el original y el inglés POB. «De la vacada» es comprensible pero menos ampliamente natural en español eclesial panhispánico que «del ganado». «No habrá en él ninguna falla» suena algo técnico/coloquial frente al registro legal-cultual; «defecto» es más preciso y coherente con la primera cláusula.
  glossary_alignment: 'Alinea bien con los estándares del proyecto en puntos clave: יהוה -> «Yahvé»; שְׁלָמִים -> «ofrendas de paz» en vez de una opción más interpretativa; לִנְדָבָה -> «ofrenda voluntaria». Conviene reforzar la consistencia léxica para מוּם usando «defecto» también en la cláusula final. No hay problema doctrinal que requiera adjudicación especial.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en palabras equivocadas.
    rationale: La nota [a] explica «para realizar un voto», pero está colocada en «Yahvé». La nota [b] explica «ofrendas de paz», pero está colocada en «aceptado». Esto distorsiona el aparato crítico y no cumple la disciplina de anclaje requerida.
  - severity: medium
    issue: «Falla» no es la mejor opción para מוּם.
    rationale: מוּם en este contexto sacrificial denota defecto físico descalificante. «Falla» es menos específico y menos idiomático en registro bíblico-legal que «defecto».
  - severity: low
    issue: «Vacada» es menos natural que «ganado» en español bíblico general.
    rationale: Aunque no es incorrecto, «vacada» puede sonar regional o menos común. «Del ganado o del rebaño» comunica con mayor amplitud y naturalidad el contraste בָּקָר / צֹאן.
  revised_spanish_text: Y si un hombre presenta a Yahvé un sacrificio de ofrendas de paz[a], para cumplir un voto[b] o como ofrenda voluntaria, del ganado o del rebaño, será sin defecto, para ser aceptado; no habrá en él ningún defecto.
  revised_footnotes:
