  yaml_path: translation/ot/joel/002/002.yaml
  text: A day of darkness and gloom[a], a day of clouds and thick darkness; like dawn spread over the mountains, a great and mighty people comes. Nothing like it has ever been from of old, and after it there will not again be any[c][b], through the years of generation after generation.
  footnotes:
  - marker: a
    text: Or 'like blackness spread over the mountains,' if שַׁחַר is taken in a rarer sense; more likely 'like dawn' in keeping with normal Hebrew usage and the image of something spreading rapidly across the hills.
    reason: lexical_alternative
  - marker: b
    text: '''A great and mighty people'' may refer to an invading army, a locust swarm described in military terms, or a deliberately blended prophetic image.'
    reason: alternative_reading
  - marker: c
    text: Literally 'until years of generation and generation,' an idiom for an indefinitely long succession of generations.
    reason: lexical_alternative
