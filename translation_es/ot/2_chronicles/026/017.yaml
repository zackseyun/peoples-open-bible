translation:
  language: es
  text: Azarías, el sacerdote, entró tras él, y con él iban ochenta sacerdotes de Yahvé, hombres valientes.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hombres de valor'. El hebreo בְּנֵי חָיִל puede denotar hombres caracterizados por fuerza, coraje o valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue adentro
  - ingresó
  lexicon: HALOT
  rationale: El verbo בוא puede significar venir, ir o entrar. En este contexto narrativo, Azarías se mueve hacia el mismo espacio al que Uzzías ha entrado; en español, 'entró' expresa de manera natural esa acción sin añadir información no presente en el hebreo.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - siguiéndolo
  lexicon: HALOT
  rationale: La preposición indica seguimiento en secuencia. 'Detrás de él' conserva la relación espacial y narrativa con un español claro y fiel.
- source_word: עֲזַרְיָהוּ
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azariah
  lexicon: convención onomástica bíblica
  rationale: En español bíblico, el nombre se adapta como 'Azarías', forma reconocible y establecida, mientras preserva la identificación del personaje.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  lexicon: HALOT
  rationale: El sustantivo definido identifica el oficio de Azarías. 'Sacerdote' es el equivalente natural en español; 'principal' añadiría un matiz no explícito en el hebreo.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him were
  chosen_spanish: y con él había
  alternatives_spanish:
  - y con él estaban
  - y lo acompañaban
  lexicon: HALOT
  rationale: El hebreo presenta una frase de acompañamiento sin verbo explícito; en español, 'había' mantiene la construcción fluida y conserva el dato de presencia conjunta sin forzar un sujeto distinto.
- source_word: כֹּהֲנִים לַיהוָה
  english_pob_choice: priests of Yahweh
  chosen_spanish: sacerdotes de Yahvé
  alternatives_spanish:
  - sacerdotes de Yahveh
  - sacerdotes del Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio del proyecto. La relación de pertenencia/dedicación expresada por ל se traduce naturalmente como 'de Yahvé'.
- source_word: שְׁמוֹנִים
  english_pob_choice: eighty
  chosen_spanish: ochenta
  alternatives_spanish:
  - '80'
  lexicon: HALOT
  rationale: Número cardinal directo; se mantiene en palabras para un registro bíblico uniforme.
- source_word: בְּנֵי חָיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres valerosos
  - varones valientes
  lexicon: HALOT
  rationale: El modismo puede denotar fuerza, valor o valentía. En español, 'hombres valientes' conserva el sentido idiomático y el matiz de resolución/coraje en una forma natural; no se fuerza un calco como 'hombres de valor' si suena menos directo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el Tetragrámaton. Siguiendo el estándar del proyecto en español, se traduce como 'Yahvé' en el texto principal para preservar el nombre del pacto y evitar el masking reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Modismo bélico/heroico בְּנֵי חָיִל
  english_pob_reading: valiant men
  chosen_spanish_reading: hombres valientes
  alternative_spanish_readings:
  - hombres de valor
  - hombres esforzados
  rationale: El hebreo usa un modismo masculino plural que describe cualidades de fuerza y valentía. En este contexto sacerdotal, 'hombres valientes' conserva la fuerza idiomática sin neutralizar el género gramatical ni suavizar el rasgo de valor requerido por la escena.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el audit trail inglés y no registra revisiones aplicadas; la versión española sigue la misma lectura básica: movimiento de entrada de Azarías, acompañamiento de ochenta sacerdotes y el modismo final בְּנֵי חָיִל resuelto de manera idiomática. Se ajusta la onomástica al español bíblico (''Azarías'') y el nombre divino al estándar del proyecto (''Yahvé'').'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en todo el texto.
  - Se usa 'sacerdote(s)' para הַכֹּהֵן/כֹּהֲנִים sin introducir términos eclesiásticos más cargados.
  - La numeración se escribe con palabras ('ochenta') por consistencia con el estilo bíblico en español.
  - La nota al pie conserva la alternativa semántica del modismo final sin alterar el texto principal.
