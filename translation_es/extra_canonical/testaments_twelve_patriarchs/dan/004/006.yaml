translation:
  language: es
  text: Y si sufren pérdida voluntaria o involuntariamente, no se entristezcan; pues de la tristeza se levanta también la ira con falsedad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζημιωθῆτε
  english_pob_choice: suffer loss
  chosen_spanish: sufran pérdida
  alternatives_spanish:
  - padezcan daño
  - sean perjudicados
  lexicon: LSJ
  rationale: Refleja el sentido pasivo del verbo y mantiene continuidad léxica con ζημία = pérdida en versículos previos.
- source_word: ἑκουσίως ἢ ἀκουσίως
  english_pob_choice: willingly or unwillingly
  chosen_spanish: voluntaria o involuntariamente
  alternatives_spanish:
  - de buen grado o de mal grado
  lexicon: LSJ
  rationale: Equivalente directo y formal del par adverbial.
- source_word: λύπη
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - pena
  - aflicción
  lexicon: LSJ
  rationale: Término ético estable; la tristeza se convierte en semillero de ira.
- source_word: θυμός μετὰ ψεύδους
  english_pob_choice: anger ... with falsehood
  chosen_spanish: la ira con falsedad
  alternatives_spanish:
  - el enojo con engaño
  - la ira acompañada de mentira
  lexicon: LSJ
  rationale: Conserva el sintagma griego y el vínculo doble entre ira y mentira que el capítulo desarrolla.
translation_notes:
  revision_awareness: 'Esta unidad no recibió cambios en la revisión inglesa (unchanged: true).'
  spanish_consistency_notes:
