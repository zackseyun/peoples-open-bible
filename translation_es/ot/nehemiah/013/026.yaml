  language: en
  yaml_path: translation/ot/nehemiah/013/026.yaml
  text: Was it not because of these things that Solomon king of Israel sinned? Yet among the many nations there was no king like him[a], and he was loved by his God, and God made him king over all Israel. Even him foreign women caused to sin.
  footnotes:
