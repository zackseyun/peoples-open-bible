translation:
  language: es
  text: Y les daré un corazón nuevo, y pondré dentro de ustedes un espíritu nuevo[a]; quitaré de su carne el corazón de piedra y les daré un corazón de carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu renovado»; algunos entienden «espíritu» aquí como anticipación del don del Espíritu de Dios en el versículo siguiente.
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - ser interior
  lexicon: HALOT
  rationale: En antropología hebrea, לֵב abarca voluntad, pensamiento y disposición. «Corazón» es la equivalencia más transparente y estable en español, y mantiene ese campo semántico sin interpretarlo excesivamente.
- source_word: חָדָשׁ / חֲדָשָׁה
  english_pob_choice: new
  chosen_spanish: nuevo / nuevo
  alternatives_spanish:
  - renovado
  - fresco
  lexicon: HALOT
  rationale: El hebreo presenta un adjetivo de novedad real. «Nuevo» conserva la formulación directa; «renovado» ya introduce una lectura interpretativa que el texto no explicita.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - viento
  - aliento
  lexicon: HALOT
  rationale: En este contexto de transformación interior, «espíritu» es la opción natural y fiel. «Viento» o «aliento» serían posibles en otros pasajes, pero aquí no reflejan bien la antropología del paralelo con «corazón».
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: within you
  chosen_spanish: dentro de ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su interior
  lexicon: HALOT
  rationale: La imagen inmediata es de interioridad personal, no de ubicación corporativa. «Dentro de ustedes» comunica el sentido de manera clara y natural en español.
- source_word: וַהֲסִרֹתִי
  english_pob_choice: I will remove
  chosen_spanish: quitaré
  alternatives_spanish:
  - retiraré
  - removeré
  lexicon: HALOT
  rationale: El verbo expresa apartar o sacar algo. «Quitaré» es natural en español y mantiene la idea de eliminación del «corazón de piedra».
- source_word: לֵב הָאֶבֶן
  english_pob_choice: the heart of stone
  chosen_spanish: el corazón de piedra
  alternatives_spanish:
  - el corazón pétreo
  - el corazón endurecido
  lexicon: HALOT
  rationale: La construcción hebrea se traduce de forma directa. «Corazón de piedra» preserva la metáfora y el contraste con el corazón de carne.
- source_word: מִבְּשַׂרְכֶם
  english_pob_choice: from your flesh
  chosen_spanish: de su carne
  alternatives_spanish:
  - de su cuerpo
  - de su propia carne
  lexicon: HALOT
  rationale: בָּשָׂר normalmente es «carne». Se conserva el término concreto para mantener la fuerza imagética y la conexión con la cláusula final.
- source_word: לֵב בָּשָׂר
  english_pob_choice: a heart of flesh
  chosen_spanish: un corazón de carne
  alternatives_spanish:
  - un corazón sensible
  - un corazón tierno
  lexicon: HALOT
  rationale: La equivalencia directa preserva el paralelismo con «corazón de piedra». «Corazón sensible» o «tierno» explicitan el efecto, pero no traducen tan de cerca la forma hebrea.
theological_decisions:
- issue: Alcance de «espíritu nuevo»
  english_pob_reading: an inwardly renewed human spirit/disposition given by God
  chosen_spanish_reading: un espíritu humano renovado interiormente que Dios da
  alternative_spanish_readings:
  - el Espíritu Santo
  - un nuevo ánimo
  rationale: La frase va en paralelo con «corazón nuevo», por lo que en este versículo la referencia primaria es a la disposición interior del ser humano. Se mantiene «espíritu» en minúscula para no resolver de antemano la relación con el versículo siguiente, donde se menciona explícitamente el Espíritu de Dios.
  doctrine_reference: Preservar la tensión teológica entre renovación interior y la posterior referencia al Espíritu de Dios.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura hebrea y coincide sustancialmente con el auditorial inglés: mantiene la secuencia de tres actos divinos (dar, poner, quitar/dar), conserva la metáfora corporal «corazón de piedra / corazón de carne» y deja abierta la tensión interpretativa sobre «espíritu nuevo» sin resolverla en el texto principal.'
  spanish_consistency_notes:
  - Se eligió «dentro de ustedes» para בְּקִרְבְּכֶם por naturalidad y claridad, en lugar de «en medio de ustedes», que sonaría más corporativo que interno en este contexto.
  - Se usó «carne» para בָּשָׂר en ambos casos para conservar el mismo campo léxico y el contraste metafórico con «piedra».
  - La nota al pie usa el marcador [a] en el texto principal para reflejar la alternativa documentada por el POB inglés.
  - Se mantuvo «espíritu» en minúscula para respetar la ambigüedad teológica del pasaje y no anticipar la identificación con el Espíritu Santo.
