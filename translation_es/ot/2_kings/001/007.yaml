translation:
  language: es
  text: 'Entonces él les dijo[a]: «¿Cuál era la apariencia[b] del hombre que subió a su encuentro y les habló estas palabras?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «¿Qué clase de hombre era?». Aquí se mantiene «apariencia» porque el contexto siguiente describe sus rasgos identificadores.'
    reason: lexical_alternative
  - marker: b
    text: «Apariencia» traduce el hebreo מִשְׁפַּט en el sentido de descripción o rasgo identificador, no de «juicio» o «costumbre».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה
  english_pob_choice: What was
  chosen_spanish: ¿Cuál era... ?
  alternatives_spanish:
  - ¿Qué era... ?
  - ¿Cómo era... ?
  lexicon: HALOT
  rationale: En español, «¿Cuál era...?» introduce de manera natural una pregunta sobre la identificación del hombre y mantiene la estructura interrogativa del hebreo sin sonar tan mecánica como «¿Qué era...?».
- source_word: מִשְׁפַּט
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - descripción
  - aspecto
  - manera
  lexicon: HALOT
  rationale: La POB inglesa entendió aquí un rasgo identificador del hombre, no «juicio» ni «costumbre». «Apariencia» comunica bien ese valor descriptivo en español y encaja con la respuesta de 2:8.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  lexicon: HALOT
  rationale: Es un referente definido y específico; «el hombre» mantiene la referencia sin sobrecarga estilística.
- source_word: עָלָה
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - vino
  - vino a
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «subió». En español, «subió» conserva la dirección ascendente del movimiento desde el punto de vista de los mensajeros.
- source_word: לִקְרַאתְכֶם
  english_pob_choice: to meet you
  chosen_spanish: a encontrarles
  alternatives_spanish:
  - a encontrarlos
  - a recibirles
  - a salirles al encuentro
  lexicon: HALOT
  rationale: «Encontrarles» o «salirles al encuentro» expresa la idea de לקראת. Se eligió «a encontrarles» para mantener la relación directa con el movimiento del hombre y una dicción sobria; el objeto enclítico en «les» refleja el destinatario plural.
- source_word: וַיְדַבֵּר אֲלֵיכֶם
  english_pob_choice: and spoke ... to you
  chosen_spanish: y les habló
  alternatives_spanish:
  - y les dijo
  - y habló con ustedes
  lexicon: HALOT
  rationale: «Habló» conserva el verbo de palabra del hebreo y evita repetir «dijo» de forma pesada. En español, «les habló» es natural y mantiene el destinatario plural.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: «Palabras» refleja con precisión el objeto directo del discurso reportado y es la correspondencia más transparente para esta fórmula.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura ya establecida por la POB inglesa: la pregunta no busca una valoración moral, sino una descripción identificadora del hombre; por eso se conservó «apariencia» y se ajustó el orden a un español natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo el plural de destinatarios con «les» para reflejar el hebreo plural.
  - No se introdujeron términos eclesiásticos no presentes en el hebreo.
  - Se evitó traducir mecánicamente «said» por «dijo» en ambos miembros para preservar fluidez en español.
