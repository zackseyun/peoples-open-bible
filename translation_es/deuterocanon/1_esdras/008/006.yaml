translation:
  language: es
  text: En el séptimo año del reinado de Artajerjes, en el quinto mes, llegaron a Jerusalén; pues habían salido de Babilonia en la luna nueva del primer mes, y llegaron a Jerusalén conforme al próspero viaje[a] que les fue concedido por el Señor[b] sobre él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'prosperidad' o 'buen éxito' del viaje. Se ha preferido 'próspero viaje' para conservar el sentido de una travesía favorecida por Dios.
    reason: lexical_alternative
  - marker: b
    text: El griego dice κυρίου ('del Señor'). Aunque el paralelo hebreo remite a YHWH, esta sección se traduce desde el testimonio griego de 1 Esdras, por lo que se mantiene 'Señor'. Además, una cláusula difícil del griego —'este año fue el segundo para el rey'— no se representa en el texto principal porque probablemente es una corrupción o un desplazamiento textual.
    reason: theological_note
  - marker: c
    text: Literalmente, 'sobre él'. La expresión es difícil en contexto y probablemente alude al favor divino o a la ayuda de Dios sobre la persona mencionada implícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτους ἑβδόμου βασιλεύοντος Ἀρταξέρξου
  english_pob_choice: In the seventh year of the reign of Artaxerxes
  chosen_spanish: En el séptimo año del reinado de Artajerjes
  alternatives_spanish:
  - En el séptimo año, mientras reinaba Artajerjes
  - En el séptimo año del reinado del rey Artajerjes
  lexicon: LSJ
  rationale: La construcción temporal se vierte naturalmente como datación regnal en español. 'Reinado de Artajerjes' conserva el valor de marco cronológico sin añadir elementos no presentes en el griego.
- source_word: ἐν τῷ πέμπτῳ μηνί
  english_pob_choice: in the fifth month
  chosen_spanish: en el quinto mes
  alternatives_spanish:
  - durante el quinto mes
  lexicon: LSJ
  rationale: Es una frase temporal directa; 'en el quinto mes' es la equivalencia más clara y fiel.
- source_word: ἐξελθόντος ... ἐκ Βαβυλῶνος
  english_pob_choice: having set out from Babylon
  chosen_spanish: habían salido de Babilonia
  alternatives_spanish:
  - después de salir de Babilonia
  - al salir de Babilonia
  lexicon: LSJ
  rationale: El participio anterior marca una acción previa respecto de la llegada. En español, 'habían salido' expresa bien la anterioridad sin forzar un singular o plural más allá de lo que el griego transmite de manera irregular.
- source_word: τῇ νουμηνίᾳ τοῦ πρώτου μηνός
  english_pob_choice: on the new moon of the first month
  chosen_spanish: en la luna nueva del primer mes
  alternatives_spanish:
  - el primer día del primer mes
  lexicon: LSJ
  rationale: νουμηνία nombra propiamente la luna nueva. Mantener 'luna nueva' conserva el matiz calendárico-ritual del griego mejor que reducirlo a un simple día ordinal.
- source_word: παρεγένοντο εἰς Ἰερουσαλήμ
  english_pob_choice: they arrived at Jerusalem
  chosen_spanish: llegaron a Jerusalén
  alternatives_spanish:
  - vinieron a Jerusalén
  - arribaron a Jerusalén
  lexicon: LSJ
  rationale: El verbo griego está en plural en Swete; 'llegaron' reproduce ese plural y el sentido de arribar con éxito al destino.
- source_word: κατὰ τὴν δοθεῖσαν αὐτοῖς εὐοδίαν
  english_pob_choice: according to the prosperous journey given to them
  chosen_spanish: conforme al próspero viaje
  alternatives_spanish:
  - según el buen éxito concedido
  - conforme al buen viaje
  lexicon: LSJ
  rationale: εὐοδία apunta a buen resultado en el viaje. 'Próspero viaje' conserva la referencia al trayecto y al éxito favorable que acompaña la travesía.
- source_word: παρὰ τοῦ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - de parte del Señor
  - del Señor
  lexicon: LSJ
  rationale: παρά con genitivo expresa procedencia o agencia. 'Por el Señor' es una solución natural en español; se usa 'Señor' para reflejar el κύριος griego del testimonio de 1 Esdras.
- source_word: ἐπʼ αὐτῷ
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - recaído sobre él
  - descansando sobre él
  lexicon: LSJ
  rationale: La frase es breve y difícil; literalmente significa 'sobre él'. Se conserva esa literalidad en el texto principal para no borrar la tensión interpretativa del pasaje.
- source_word: οὗτος ἐνιαυτὸς ὁ δεύτερος βασιλεῖ
  english_pob_choice: omitted from main text as textually/syntactically corrupt
  chosen_spanish: omitido del texto principal por ser textualmente y sintácticamente problemático
  alternatives_spanish:
  - este fue el segundo año del rey
  - este año era el segundo para el rey
  lexicon: LSJ
  rationale: La cláusula resulta problemática en contexto y choca con la datación ya dada. Siguiendo el criterio auditado, no se fuerza en el texto principal; se reconoce como problema textual.
theological_decisions:
- issue: Renderización de κύριος en un relato griego deuterocanónico con paralelo hebreo referente a YHWH
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Yahvé
  rationale: El texto fuente inmediato es el griego, que lee κυρίου. Por ello se preserva 'Señor' como equivalente de κύριος, sin reemplazarlo por 'Yahvé' en el texto principal, aunque el paralelo hebreo apunte al Nombre divino.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; יְהוָה → Yahvé / the LORD según el testimonio textual base'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que restauró la cláusula causal ('pues'), reconoció la duplicación del verbo de llegada y ajustó la secuencia temporal para reflejar con más cercanía el griego, manteniendo a la vez el registro formal.
  spanish_consistency_notes:
  - Se mantiene 'Artajerjes' para Ἀρταξέρξης de acuerdo con el uso español estándar.
  - Se usa 'Señor' para κύριος en conformidad con el texto griego base y la política del proyecto para este testimonio.
  - Se preserva la tensión del final ('sobre él') mediante traducción literal y nota explicativa.
  - Se evita resolver en el texto principal la cláusula problemática del segundo año del rey, siguiendo el juicio textual del audit trail.
