translation:
  language: es
  text: Entonces Moisés habló a los hijos de Israel[a], y sacaron al que había maldecido fuera del campamento y lo apedrearon con piedras. Así, los hijos de Israel hicieron tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'el blasfemador'. El participio hebreo significa literalmente 'el que maldijo', y remite al hombre que maldijo el Nombre divino en el contexto anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló a
  lexicon: HALOT
  rationale: El piel de דבר aquí significa 'hablar'. 'Habló' es la forma natural y precisa en español para el discurso de Moisés a Israel.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Conserva el paralelismo transparente del hebreo y refleja el plural masculino del original sin sustituirlo por una etiqueta más interpretativa.
- source_word: וַיּוֹצִיאוּ
  english_pob_choice: they brought ... out
  chosen_spanish: sacaron
  alternatives_spanish:
  - trajeron ... fuera
  - llevaron ... fuera
  lexicon: HALOT
  rationale: El causativo de יצא expresa hacer salir. 'Sacaron' es idiomático en español y mantiene la acción judicial de retirar al hombre del campamento.
- source_word: הַמְקַלֵּל
  english_pob_choice: the one who had cursed
  chosen_spanish: el que había maldecido
  alternatives_spanish:
  - el maldiciente
  - el blasfemador
  lexicon: HALOT
  rationale: La forma participial de קלל significa literalmente 'el que maldijo'. Se conserva esa referencia directa y se evita adelantar en el texto principal el término más interpretativo 'blasfemador'.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del recinto
  lexicon: HALOT
  rationale: '''Fuera del campamento'' es la equivalencia natural y fiel de la expresión hebrea, conservando el marco legal y ritual del relato.'
- source_word: וַיִּרְגְּמוּ אֹתוֹ אָבֶן
  english_pob_choice: stoned him with stones
  chosen_spanish: lo apedrearon con piedras
  alternatives_spanish:
  - lo lapidaron
  - lo apedrearon
  lexicon: HALOT
  rationale: El hebreo repite la idea de piedra con valor intensificador. 'Apedrearon con piedras' conserva esa redundancia sin sonar forzado en español. 'Lapidaron' es posible, pero menos transparente para lectores generales.
- source_word: עָשׂוּ כַּאֲשֶׁר צִוָּה
  english_pob_choice: did as ... had commanded
  chosen_spanish: hicieron ... como Yahvé había mandado
  alternatives_spanish:
  - hicieron según ... había mandado
  - actuaron como ... había ordenado
  lexicon: HALOT
  rationale: La fórmula de obediencia se mantiene con un español claro y solemne. 'Mandado' preserva el matiz de una orden vinculante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, usando 'Yahvé' como nombre propio divino en lugar de una sustitución por título.
theological_decisions:
- issue: Si traducir הַמְקַלֵּל como 'blasfemador' o mantener el sentido verbal más directo
  english_pob_reading: the one who had cursed
  chosen_spanish_reading: el que había maldecido
  alternative_spanish_readings:
  - el blasfemador
  - el maldiciente
  rationale: Aunque el contexto previo involucra una ofensa al Nombre divino, la forma de esta frase es el participio de קלל. El texto español mantiene la tensión entre el sentido léxico inmediato y la implicación teológica del episodio sin resolverla demasiado pronto.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión lexical-teológica
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'out of the camp' a 'outside the camp' por naturalidad; por eso el español usa 'fuera del campamento', que conserva la misma naturalidad y el valor locativo. Se mantuvo la elección revisada de traducir el participio de קלל de modo literal y no como 'blasphemer'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se usa 'hijos de Israel' para reflejar el idiomático hebreo בְּנֵי יִשְׂרָאֵל.
  - '''Apedrearon con piedras'' conserva la redundancia intensiva del hebreo.'
  - No se introduce 'SEÑOR' como sustituto del nombre divino.
