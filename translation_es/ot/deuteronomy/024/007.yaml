  rationale: Se ajustó la apertura para que el español suene natural y legalmente claro sin perder el valor pasivo-condicional del hebreo. También se reforzó la fórmula final con «purgarás», que representa mejor la expresión deuteronómica recurrente y su fuerza judicial. El resto del versículo y las notas se conservan porque reflejan fielmente el sentido fuente y el audit trail inglés.
