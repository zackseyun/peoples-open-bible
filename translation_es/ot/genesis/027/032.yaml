translation:
  language: es
  text: 'Su padre Isaac le dijo[a]: «¿Quién eres?» Y él dijo: «Yo soy tu hijo, tu primogénito[b], Esaú».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Isaac su padre», aquí vertido de forma idiomática como «Su padre Isaac».'
    reason: lexical_alternative
  - marker: b
    text: O «tu hijo mayor»; «tu primogénito» preserva mejor el peso de la primogenitura en la narración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  - habló
  lexicon: HALOT
  rationale: אמר es el verbo normal para hablar o decir; en este contexto español natural exige un verbo de habla simple. Con el dativo explícito, «le dijo» preserva mejor la relación del original que una paráfrasis.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al
  lexicon: HALOT
  rationale: La preposición con sufijo marca el destinatario del habla; en español, el dativo clítico «le» es la opción más natural y precisa.
- source_word: יִצְחָק אָבִיו
  english_pob_choice: His father Isaac
  chosen_spanish: Su padre Isaac
  alternatives_spanish:
  - Isaac su padre
  - Isaac, su padre
  lexicon: HALOT
  rationale: El hebreo literalmente dice «Isaac su padre», pero en español la frase idiomática y clara es «Su padre Isaac», conservando el vínculo filial y la identificación del hablante.
- source_word: מִי אַתָּה
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quién eres?
  alternatives_spanish:
  - ¿Quién eres tú?
  lexicon: HALOT
  rationale: La pregunta directa de מִי + pronombre de 2ms se expresa naturalmente como «¿Quién eres?», sin añadir énfasis no presente en el hebreo.
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo
  lexicon: HALOT
  rationale: El hebreo nominal requiere cópula en español; «Yo soy» mantiene claridad y el sujeto explícito corresponde al énfasis del pronombre independiente.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  lexicon: HALOT
  rationale: בן con sufijo de 2ms es «tu hijo». «Hijo» es el equivalente directo y evita agregar especificación no requerida por el texto.
- source_word: בְכֹרְךָ
  english_pob_choice: your firstborn
  chosen_spanish: tu primogénito
  alternatives_spanish:
  - tu hijo primogénito
  - tu hijo mayor
  lexicon: HALOT
  rationale: בכור conserva la prioridad de nacimiento y su carga narrativa sobre la primogenitura; «primogénito» es el término español más preciso y solemne. «Hijo mayor» suaviza esa fuerza y por eso queda como alternativa.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso bíblico estándar en español.
translation_notes:
  revision_awareness: 'Revisado a la luz del control de validación anterior: las notas [a] y [b] ahora están ancladas explícitamente en el texto español para evitar marcadores huérfanos. Se mantiene la equivalencia óptima con preferencia por formulaciones idiomáticas que no pierden el contenido lexical del hebreo.'
  spanish_consistency_notes:
  - Se usa «Esaú» de forma consistente con la transliteración bíblica habitual en español.
  - «Primogénito» preserva la fuerza narrativa de בכור mejor que una simple glosa explicativa.
  - Se evitó «SEÑOR» u otras sustituciones teológicas irrelevantes para este versículo.
