translation:
  language: es
  text: Tú me diste el escudo de tu salvación; tu diestra me sostuvo, y tu humildad[a] me engrandeció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu gentileza». El hebreo puede denotar humildad, mansedumbre o gentileza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֶּן
  english_pob_choice: You gave
  chosen_spanish: Tú me diste
  alternatives_spanish:
  - Me diste
  - Tú has dado
  lexicon: HALOT
  rationale: El wayyiqtol de נתן expresa acción pasada en este contexto poético; en español, «Tú me diste» comunica con naturalidad la donación divina y conserva la relación directa sujeto-objeto del hebreo.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  - escudo protector
  lexicon: HALOT
  rationale: El sentido básico es el de un arma defensiva. «Escudo» es el equivalente transparente y natural en español contemporáneo; «broquel» resulta más arcaico.
- source_word: יִשְׁעֶךָ
  english_pob_choice: of your salvation
  chosen_spanish: de tu salvación
  alternatives_spanish:
  - de tu liberación
  - tu escudo salvador
  lexicon: HALOT
  rationale: La construcción en hebreo es un sintagma genitivo con מָגֵן. «Salvación» conserva el alcance teológico más amplio del término, no limitado solo a rescate inmediato.
- source_word: וִימִינְךָ
  english_pob_choice: and your right hand
  chosen_spanish: tu diestra
  alternatives_spanish:
  - tu mano derecha
  - y tu diestra
  lexicon: HALOT
  rationale: «Diestra» es una forma bíblica y plenamente comprensible en español para la mano derecha como imagen de fuerza y ayuda eficaz. Se integra bien con el paralelismo del versículo.
- source_word: תִסְעָדֵנִי
  english_pob_choice: supported me
  chosen_spanish: me sostuvo
  alternatives_spanish:
  - me apoyó
  - me sustentó
  lexicon: HALOT
  rationale: El verbo סעד significa apoyar, sostener o sustentar. «Me sostuvo» es conciso, claro y refleja bien la acción de ayuda continua o eficaz en el paralelismo.
- source_word: וְעַנְוַתְךָ
  english_pob_choice: your humility
  chosen_spanish: tu humildad
  alternatives_spanish:
  - tu gentileza
  - tu mansedumbre
  - tu condescendencia
  lexicon: HALOT
  rationale: 'La raíz puede denotar humildad, mansedumbre o gentileza. Se conserva «humildad» para mantener la tensión teológica del hebreo: se atribuye a Dios una disposición de abajamiento para ayudar al salmista.'
- source_word: תַרְבֵּנִי
  english_pob_choice: made me great
  chosen_spanish: me engrandeció
  alternatives_spanish:
  - me hizo grande
  - me aumentó
  - me exaltó
  lexicon: HALOT
  rationale: El hiphil de רבה significa hacer grande, aumentar o engrandecer. «Me engrandeció» reproduce con fidelidad la idea de hacer a alguien grande o sobresaliente, y suena natural en español bíblico actual.
theological_decisions:
- issue: Atributo divino en וְעַנְוַתְךָ
  english_pob_reading: your humility
  chosen_spanish_reading: tu humildad
  alternative_spanish_readings:
  - tu gentileza
  - tu mansedumbre
  rationale: 'Se mantiene la lectura que preserva la tensión del texto: la Escritura atribuye a Yahvé una humildad o abajamiento activo hacia el salmista. No se suaviza automáticamente a un término más devocional si eso borra el rasgo sorprendente del hebreo.'
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores en el paquete de auditoría; el acuerdo de revisión fue alto y estable, por lo que la traducción sigue la lectura aprobada sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - «Diestra» se mantiene para conservar el registro bíblico y el paralelismo poético.
  - Se evita «Señor» como sustituto de Yahvé porque aquí no corresponde al texto hebreo subyacente.
  - La nota a pie de página se vincula al sintagma «tu humildad» para preservar la alternativa interpretativa documentada.
