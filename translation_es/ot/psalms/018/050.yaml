translation:
  language: es
  text: Por eso te daré gracias entre las naciones[a], Yahvé, y cantaré alabanzas a tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las naciones»; también puede entenderse «entre los gentiles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión derivada del contexto previo. «Por eso» reproduce bien la fuerza inferencial en español natural y digno, sin volver mecánico el enlace.
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: te daré gracias
  alternatives_spanish:
  - te alabaré
  - te confesaré
  lexicon: HALOT
  rationale: El hifil de ידה en contexto de salmo de acción de gracias expresa agradecer/alabar. «Te daré gracias» conserva el valor de gratitud y el objeto pronominal directo en español.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - entre los pueblos
  lexicon: HALOT
  rationale: «Naciones» mantiene el alcance amplio del hebreo y es la opción más natural en español bíblico contemporáneo. «Entre» expresa bien la ubicación relacional del testimonio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración en español, conforme al criterio POB de no sustituir el Tetragrámaton por una máscara titulativa. «Yahvé» es la forma establecida en el texto español del proyecto.
- source_word: וּלְשִׁמְךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - para tu nombre
  - por tu nombre
  lexicon: HALOT
  rationale: Aunque el hebreo usa ל, en español la construcción más natural con «cantar alabanzas» es «a tu nombre». Conserva la dirección del canto sin perder el vínculo con el nombre divino.
- source_word: אֲזַמֵּרָה
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - haré música
  lexicon: HALOT
  rationale: זמר en piel denota cantar con alabanza o hacer música de alabanza. «Cantaré alabanzas» expresa el matiz cultual sin sonar forzado en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El verso contiene el Tetragrámaton explícito. Se traduce con el nombre propio divino para preservar el acceso transparente al texto fuente y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el tramo de auditoría inglesa de alta concordancia: no hay revisiones aplicadas y la lectura se mantiene estable. La versión española sigue el mismo sentido inferencial, la misma referencia al nombre divino y la misma alternativa lexical para גוים.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la terminología del proyecto.
  - Se prefirió «naciones» en lugar de «gentiles» como traducción principal, dejando la alternativa en nota.
  - «Cantaré alabanzas» preserva el paralelismo poético con «te daré gracias».
  - La puntuación y el orden buscan fluidez en español sin perder la relación causal/inferencial del hebreo.
