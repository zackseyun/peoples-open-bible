translation:
  language: es
  text: Así lo hizo Noé[a][b]; conforme a todo lo que Dios le mandó, así lo hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el verbo «hacer» para enfatizar la obediencia: «Y Noé hizo ... así lo hizo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y Noé hizo esto;».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo así
  - obró
  lexicon: HALOT
  rationale: עשה es un verbo amplio de 'hacer/obrar'. En este contexto resume la acción obediente de Noé; 'hizo' es natural en español y preserva la repetición enfática del hebreo con el segundo 'así hizo'.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: Nombre propio estándar
  rationale: Es la forma establecida en español para el nombre hebreo נֹחַ.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La construcción expresa conformidad plena con el mandato recibido. 'Conforme a todo lo que' mantiene la idea de correspondencia total sin sonar forzado en español.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato
  lexicon: HALOT
  rationale: El verbo denota una orden con autoridad. 'Mandó' comunica bien esa fuerza en español moderno y es suficientemente directo para el contexto divino.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: Pronombre de objeto indirecto en español
  rationale: 'Aunque el hebreo tiene objeto directo marcado, en español el complemento natural tras ''mandó'' es indirecto: ''le mandó''. El referente sigue siendo Noé.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios único de Israel y lleva verbo singular implícito en el contexto. 'Dios' es la equivalencia normal y clara en español.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de ese modo
  lexicon: HALOT
  rationale: כֵּן retoma y refuerza la correspondencia exacta entre mandato y ejecución. 'Así' conserva la fuerza resumptiva y la repetición del hebreo.
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - obró
  - lo hizo
  lexicon: HALOT
  rationale: Se mantiene la repetición final de עשה para conservar el énfasis hebreo en la obediencia completa. 'Hizo' repite con naturalidad la forma verbal del inicio.
theological_decisions:
- issue: Conservar la repetición enfática del verbo 'hacer' sin suavizarla
  english_pob_reading: 'Retain both clauses: ''Thus Noah did ... so he did.'''
  chosen_spanish_reading: Así hizo Noé ... así hizo.
  alternative_spanish_readings:
  - Noé hizo todo lo que Dios le mandó.
  - Así hizo Noé; hizo todo lo que Dios le mandó.
  rationale: El hebreo repite עשה deliberadamente para subrayar la obediencia de Noé. La traducción conserva esa repetición sin expandirla interpretativamente.
  doctrine_reference: Principios de equivalencia funcional con preservación de énfasis textual
- issue: Evitar la sustitución de la repetición por una sola cláusula resumen
  english_pob_reading: according to all that God commanded him
  chosen_spanish_reading: conforme a todo lo que Dios le mandó
  alternative_spanish_readings:
  - según todo lo que Dios le mandó
  - de acuerdo con todo lo que Dios le mandó
  rationale: La cláusula mantiene la idea de conformidad total con el mandato divino y evita reducir el sentido a una mera paráfrasis general.
  doctrine_reference: Respeto de la plenitud semántica del hebreo
- issue: Renderizar אֱלֹהִים como 'Dios' sin resolver artificiosamente su forma plural
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - Dios mismo
  rationale: Aunque la forma hebrea es morfológicamente plural, aquí la concordancia y el contexto señalan al Dios único. 'Dios' es la forma más directa y teológicamente adecuada en español.
  doctrine_reference: Uso contextual de אֱלֹהִים en el AT
translation_notes:
  revision_awareness: Se siguió la revisión que prefería un arranque resumptivo e idiomático ('Thus Noah did;'), evitando una adición interpretativa como 'this'. En español se refleja con 'Así hizo Noé', que funciona de manera natural y mantiene el paralelismo enfático del hebreo.
  spanish_consistency_notes:
  - Se usó 'Noé' como forma española estándar del nombre.
  - Se eligió 'Dios' para אֱלֹהִים por concordancia y contexto monoteísta.
  - Se preservó la repetición verbal 'hizo ... así hizo' para mantener el énfasis del texto fuente.
  - Se empleó 'mandó' como verbo breve y autoritativo, coherente con el mandato divino.
  - La puntuación con punto y coma ayuda a reflejar la transición entre la acción resumida y su reafirmación final.
