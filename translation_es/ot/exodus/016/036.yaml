    rationale: El POB inglés decidió preservar la unidad por transliteración ('ephah') y no sustituirla por una equivalencia moderna. En español, 'éfah' mantiene mejor ese carácter técnico y evita que 'efa' parezca una castellanización no explicada o una forma menos reconocible para lectores acostumbrados a transliteraciones bíblicas.
