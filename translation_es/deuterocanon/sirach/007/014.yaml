    text: 'Lit.: «no repitas una palabra en tu oración». La advertencia apunta a la repetición redundante o mecánica, no necesariamente a toda petición repetida con sinceridad.'
    reason: alternative_reading
  revision_rationale: 'La revisión es pequeña pero necesaria: ''parlotees'' refleja mejor el matiz de habla ociosa/excesiva en un registro más digno que ''charles'', mientras conserva la fidelidad al hebreo y al griego. También se pulió la nota [a] para mantener la primacía del hebreo sin perder la alternativa del paralelo griego.'
