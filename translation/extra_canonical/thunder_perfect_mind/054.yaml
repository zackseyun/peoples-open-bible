lexical_decisions:
- source_word: ϩⲱⲡ
  chosen: scatter
  alternatives:
  - cast out
  - drive away
  - disperse
  lexicon: Crum, Coptic Dictionary
  rationale: In Thunder’s antithetical pair, ϩⲱⲡ stands opposite ⲟⲩⲟⲛϩ/ⲟⲩⲟⲛϩⲧ; the
    sense “scatter/disperse” best matches the parallel with “gather/bring into one,”
    and ⲉⲣⲟⲓ (‘against/to me’) supports a directed action upon the speaker.
- source_word: ⲟⲩⲟⲛϩ / ⲟⲩⲟⲛϩⲧ
  chosen: gather
  alternatives:
  - unite
  - make one
  - join
  lexicon: Crum, Coptic Dictionary
  rationale: With ⲟⲩⲁⲛ (‘one’) in immediate proximity, the verb naturally carries
    the sense “gather/unite (into one),” rather than the homographic “give life.”
    The translation adds “into one” to preserve the numeric nuance supplied by ⲟⲩⲁⲛ.
- source_word: ⲟⲩⲁⲛ
  chosen: one
  alternatives:
  - unity
  - together
  lexicon: Crum, Coptic Dictionary
  rationale: ⲟⲩⲁⲛ is the numeral ‘one.’ Rendering as “into one” maintains the explicit
    numeric force instead of paraphrasing as “together.”
parallelism_check: 'The couplet preserves the stark antithesis: “scattered” versus
  “gathered into one.” The second clause mirrors and answers the first without softening
  the contradiction, maintaining the balanced, paradoxical cadence characteristic
  of Thunder.'
voice_check: The first-person self-disclosure (“I am the one…”) retains the authoritative,
  declarative voice of the speaker and the recurring “I am” formula. The second clause
  keeps the direct address to “you,” preserving the confrontational intimacy of the
  original.
