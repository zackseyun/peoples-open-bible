    text: O «su cargo era» o «su responsabilidad era».
    reason: lexical_alternative
  - marker: b
    text: O «los vasos sagrados» o «los utensilios del lugar santo».
    reason: lexical_alternative
  - marker: c
    text: Es decir, la cortina o colgadura de la entrada; no el velo interior.
    reason: cultural_note
  revision_rationale: Se conserva el sentido del borrador, pero se añaden las notas léxicas exigidas por la auditoría inglesa y se mejora la frase final para reflejar con más claridad el valor colectivo de וְכָל עֲבֹדָתוֹ en español natural.
