    text: 'O: «el asunto está fijado por Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios lo hará pronto» o «Dios está a punto de hacerlo».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la expresión principal a un español más natural y fiel («está establecido de parte de Dios»), se ajustó «hacerlo» para reflejar más de cerca לַעֲשֹׂתוֹ, y se repararon las notas para que cada marcador corresponda exactamente a su segmento y preserve las alternativas del audit trail inglés sin mezclar unidades distintas.
