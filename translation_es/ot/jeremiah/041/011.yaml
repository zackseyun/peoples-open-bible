translation:
  language: es
  text: Cuando Johanán hijo de Carea y todos los jefes de las tropas que estaban con él oyeron hablar de todo el mal que Ismael hijo de Netanías había hecho,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: When ... heard of
  chosen_spanish: Cuando ... oyeron de
  alternatives_spanish:
  - y ... oyeron
  - oyeron
  lexicon: HALOT
  rationale: El waw consecutivo aquí avanza la narración, pero en español resulta más natural como cláusula temporal dependiente de la continuación inmediata del relato. «Oyeron de» conserva la idea de enterarse de un hecho reportado, no de una percepción auditiva directa.
- source_word: יוֹחָנָן בֶּן קָרֵחַ
  english_pob_choice: Johanan son of Kareah
  chosen_spanish: Johanán hijo de Carea
  alternatives_spanish:
  - Johanan hijo de Carea
  - Johanán, hijo de Carea
  lexicon: convención de transliteración
  rationale: Se translitera el nombre propio según uso bíblico en español, con ajuste ortográfico mínimo para lectura natural. «Hijo de» refleja literalmente בֶּן.
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los jefes de las tropas
  alternatives_spanish:
  - los comandantes de las fuerzas
  - los capitanes de las tropas
  - los oficiales de los soldados
  lexicon: HALOT
  rationale: שָׂרִים denota líderes o jefes; חֲיָלִים refiere a tropas o fuerzas militares. «Jefes de las tropas» es claro y natural en español, manteniendo el matiz militar sin forzar un tecnicismo más duro que el hebreo.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban con él allí
  - los que estaban con él
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los jefes que acompañaban a Johanán. «Que estaban con él» conserva el vínculo relacional sin añadir información.
- source_word: כָּל הָרָעָה
  english_pob_choice: all the evil
  chosen_spanish: todo el mal
  alternatives_spanish:
  - toda la maldad
  - todo el daño
  - toda la calamidad
  lexicon: HALOT
  rationale: רָעָה aquí puede abarcar mal moral y maldad consumada. «Mal» preserva la amplitud semántica y la carga moral del término mejor que opciones más concretas como «daño» o «calamidad».
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había cometido
  lexicon: HALOT
  rationale: El verbo hebreo es amplio («hacer»). En este contexto reportivo, el pluscuamperfecto español expresa correctamente anterioridad respecto al acto de oír. «Había cometido» sería más interpretativo que el hebreo.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  english_pob_choice: Ishmael son of Nethaniah
  chosen_spanish: Ismael hijo de Netanías
  alternatives_spanish:
  - Ismael, hijo de Netanías
  - Ismael hijo de Natanías
  lexicon: convención de transliteración
  rationale: Se conserva la transliteración estable de los nombres propios bíblicos en español. «Hijo de» reproduce el parentesco expresado por בֶּן.
theological_decisions:
- issue: Valor moral de הָרָעָה
  english_pob_reading: all the evil
  chosen_spanish_reading: todo el mal
  alternative_spanish_readings:
  - toda la maldad
  - todo el daño
  rationale: El contexto describe actos graves de Ismael; sin embargo, el hebreo mantiene una formulación amplia. «Mal» deja abierta la tensión entre maldad moral y efectos dañinos, como en el inglés POB.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se siguió la lectura del inglés POB sin cambios de sentido; no hay revisiones aplicadas en el registro fuente y el juicio de cross-check fue de acuerdo mayoritario con observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio.
  - No se introdujeron términos eclesiásticos ajenos al hebreo.
  - Los nombres propios se transliteraron de forma coherente con el uso bíblico en español.
  - La sintaxis reproduce la secuencia narrativa del original sin sobreparafrasear.
