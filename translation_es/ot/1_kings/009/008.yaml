revisions:
- from: 'Y esta casa será una ruina[a]. Todo el que pase junto a ella se quedará pasmado y silbará[b], y dirán: “¿Por qué ha hecho Yahvé así a esta tierra y a esta casa?”'
  to: 'Y esta casa será una ruina[a]. Todo el que pase por allí quedará horrorizado y silbará[b], y dirán: “¿Por qué ha hecho Yahvé así a esta tierra y a esta casa?”'
  rationale: 'La revisión hace dos ajustes menores: cambia “junto a ella” por “por allí” para reflejar mejor el modismo hebreo de los transeúntes y evitar una referencia femenina algo marcada al edificio, y sustituye “se quedará pasmado” por “quedará horrorizado” para un tono más solemne y una fuerza semántica más cercana a ‘will be appalled’. Se mantienen intactas la nota textual sobre “alta/exaltada”, la transliteración “Yahvé”, y la estructura general del versículo.'
