  spanish_quality_summary: La redacción es generalmente clara, pero «fueron y lo hicieron así» suena algo forzada en español y además duplica innecesariamente el matiz de «así» antes y después del punto y coma. Una formulación más natural y digna es «fueron e hicieron así», manteniendo la progresión hebrea sin añadir torpeza estilística.
