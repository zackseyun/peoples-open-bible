revisions:
- from: Por eso, padres comerán a sus hijos en medio de ti[a], y hijos comerán a sus padres; y yo ejecutaré juicios sobre ti y esparciré a todo tu remanente[b] a todo viento.
  to: Por eso, los padres comerán a los hijos en medio de ti, y los hijos comerán a sus padres; y yo ejecutaré juicios sobre ti y esparciré a todo tu remanente[a] a todo viento[b].
  rationale: 'La revisión corrige el anclaje de las notas para que sigan el expediente inglés y la lógica del texto: ''remanente'' recibe la nota de alternativa léxica y ''a todo viento'' la nota idiomática. Además, se ajusta levemente la redacción a ''los padres / los hijos'' para reforzar el paralelismo y la especificidad familiar del hebreo, manteniendo un español natural y eclesialmente legible.'
