revisions:
- from: Y hoy las mujeres nobles[a] de Persia y de Media, que han oído[b] la palabra[c] de la reina, dirán lo mismo a todos los oficiales del rey, y habrá bastante desprecio y enojo.
  to: Y hoy las mujeres nobles[a] de Persia y de Media, que han oído la palabra[b] de la reina, dirán a todos los oficiales del rey; y habrá[c] bastante desprecio y enojo.
