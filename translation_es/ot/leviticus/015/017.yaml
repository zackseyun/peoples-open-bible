translation:
  language: es
  text: Y toda prenda y toda piel sobre las cuales haya una emisión de semen serán lavadas con agua y quedarán impuras hasta la tarde[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una emisión seminal».'
    reason: lexical_alternative
  - marker: b
    text: «Piel» probablemente se refiere a un objeto hecho de piel de animal; «cuero» también es posible según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּגֶד
  english_pob_choice: garment
  chosen_spanish: prenda
  alternatives_spanish:
  - vestidura
  - ropa
  lexicon: HALOT
  rationale: בֶּגֶד es un artículo de vestir de manera amplia. En español, "prenda" suena natural y suficientemente general, sin restringir innecesariamente a una pieza específica de ropa.
- source_word: עוֹר
  english_pob_choice: skin
  chosen_spanish: piel
  alternatives_spanish:
  - cuero
  - cuero curtido
  - hígado
  lexicon: HALOT
  rationale: El término puede referirse a piel/hide, probablemente de animal en este contexto de pureza. "Piel" conserva la literalidad y deja abierta la nota contextual de que puede tratarse de un objeto hecho de piel animal; "cuero" sería más interpretativo.
- source_word: אֲשֶׁר יִהְיֶה עָלָיו
  english_pob_choice: on which there is
  chosen_spanish: sobre la cual haya
  alternatives_spanish:
  - en la que haya
  - sobre la que haya
  - que tenga sobre sí
  lexicon: HALOT
  rationale: La construcción hebrea es relacional y locativa. "Sobre la cual haya" reproduce bien la relación "sobre la que esté" sin sonar artificial en español.
- source_word: שִׁכְבַת זָרַע
  english_pob_choice: an emission of semen
  chosen_spanish: una emisión de semen
  alternatives_spanish:
  - eyaculación de semen
  - emisión seminal
  - semen
  lexicon: HALOT
  rationale: La expresión hebrea designa semen emitido, no "semilla" en sentido abstracto. "Una emisión de semen" es clara, exacta y apropiada para el contexto ritual.
- source_word: וְכֻבַּס
  english_pob_choice: shall be washed
  chosen_spanish: será lavada
  alternatives_spanish:
  - deberá ser lavada
  - será lavado
  - se lavará
  lexicon: HALOT
  rationale: El pasivo legal se expresa naturalmente con "será lavada". Mantiene el mandato sin añadir modalidad más fuerte que la del hebreo.
- source_word: בַּמַּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: HALOT
  rationale: En español, el medio se expresa de forma natural con "con agua". Preserva la función instrumental del hebreo sin rigidizar la sintaxis.
- source_word: וְטָמֵא
  english_pob_choice: and be unclean
  chosen_spanish: y quedará impura
  alternatives_spanish:
  - y será impura
  - y estará impura
  - y quedará inmunda
  lexicon: HALOT
  rationale: '"Impura" transmite la categoría ritual sin cargar el texto con connotaciones morales que el contexto no exige. "Quedará" expresa el efecto resultante de la acción de lavar, siguiendo el valor legal de la cláusula.'
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: '"La tarde" es una forma natural en español para el hebreo con artículo definido. Se evita "noche" porque el término hebreo es más específico y el contexto de pureza sigue la delimitación del día al anochecer.'
theological_decisions:
- issue: Naturaleza de la impureza ritual
  english_pob_reading: Render טָמֵא as 'unclean' in its ritual sense without importing moral guilt.
  chosen_spanish_reading: Traducir טָמֵא como "impura" en sentido ritual, sin introducir culpa moral.
  alternative_spanish_readings:
  - inmunda
  - contaminada
  - impura ritualmente
  rationale: En Levítico 15 la categoría es ceremonial/ritual. "Impura" conserva el valor técnico sin sugerir pecado personal. Se evita "inmunda" por su mayor carga peyorativa en español moderno.
  doctrine_reference: Mantener la distinción entre impureza ritual y culpa moral según el sentido del pasaje.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente están en alto acuerdo; no se detectaron cambios pendientes relevantes. Se mantuvo la equivalencia óptima del inglés auditado, con ajustes al español natural y a la terminología ritual.
  spanish_consistency_notes:
  - Se conservó la distinción ritual de "impura" para טָמֵא, evitando lenguaje moralizante.
  - '"Piel" mantiene la apertura semántica del hebreo עוֹר y queda aclarado en nota.'
  - '"Hasta la tarde" refleja el artículo hebreo y su delimitación temporal específica.'
  - Se usó voz pasiva legal en español para reproducir el carácter normativo del hebreo.
