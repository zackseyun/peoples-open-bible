revisions:
- from: Entonces Aarón presentará el macho cabrío[a] sobre el cual cayó la suerte para Yahvé, y lo hará expiación por el pecado.
  to: Entonces Aarón presentará el macho cabrío[a] sobre el cual cayó la suerte para Yahvé, y lo hará ofrenda por el pecado.
  rationale: Se mantiene la estructura y casi todo el léxico del borrador, pero se corrige la cláusula final para reflejar fielmente el valor sacrificial de חַטָּאת en este contexto. «Ofrenda por el pecado» preserva tanto el sentido del original como la decisión documentada en el POB inglés, y además mejora la naturalidad del español sin introducir una paráfrasis mayor. No se requiere adjudicación adicional, porque la corrección es textual y léxicamente directa.
