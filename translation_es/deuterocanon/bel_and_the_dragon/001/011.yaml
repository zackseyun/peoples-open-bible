    text: O «templo de Bel». El griego dice literalmente «casa de Bel», una manera habitual de referirse al santuario o templo de una divinidad.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al sintagma correcto («casa de Bel») para reflejar la alternativa léxica documentada. Se ajusta «vamos a salir» a «salimos afuera» para una expresión más inmediata y natural. Se cambia «ponlo» por «colócalo» para mayor claridad en español, manteniendo la secuencia de acciones del griego.
