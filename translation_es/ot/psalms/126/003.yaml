lexical_decisions:
- source_word: הִגְדִּיל
  english_pob_choice: has done great things
  chosen_spanish: ha hecho grandes cosas
  alternatives_spanish:
  - ha engrandecido
  - ha hecho maravillas
  - ha hecho cosas grandes
  lexicon: HALOT
  rationale: El hebreo usa el modismo הִגְדִּיל לַעֲשׂוֹת, que no conviene desmenuzar de modo rígido en español. «Ha hecho grandes cosas» conserva el sentido idiomático y el paralelismo del contexto poético sin forzar una calca de la estructura verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La forma hebrea es el nombre propio divino, no un título. En el POB español se adopta «Yahvé» para representar יהוה de manera transparente y consistente con la decisión doctrinal del proyecto.
- source_word: לַעֲשׂוֹת
  english_pob_choice: done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - para hacer
  - al hacer
  - haciendo
  lexicon: HALOT
  rationale: Aunque formalmente es un infinitivo constructo («hacer»), en el modismo con הִגְדִּיל queda absorbido en la expresión verbal. En español se expresa naturalmente con el perfecto compuesto «ha hecho».
- source_word: עִמָּנוּ
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - con nosotros
  - para nosotros
  lexicon: HALOT
  rationale: El sentido literal de עם es «con», y el inglés POB preserva esa alternativa en nota. En español, sin embargo, el valor benefactivo queda más natural y claro con «por nosotros» en el cuerpo principal; la nota conserva la posibilidad más literal.
- source_word: הָיִינוּ
  english_pob_choice: we were
  chosen_spanish: estábamos
  alternatives_spanish:
  - fuimos
  - hemos estado
  - estuvimos
  lexicon: HALOT
  rationale: El perfecto qal de היה aquí comunica un estado en perspectiva pasada. «Estábamos» mantiene el carácter de estado resultante y suena natural en el tono poético español.
- source_word: שְׂמֵחִים
  english_pob_choice: glad
  chosen_spanish: alegres
  alternatives_spanish:
  - contentos
  - gozosos
  - felices
  lexicon: HALOT
  rationale: El adjetivo indica alegría o gozo. «Alegres» es una opción digna y clara en español bíblico moderno, sin desplazar el matiz a una emoción demasiado ligera como «felices».
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Siguiendo la norma doctrinal del proyecto, se mantiene el nombre divino en transliteración («Yahvé») en vez de sustituirlo por un título como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עִם en la cláusula final
  english_pob_reading: for us / with us
  chosen_spanish_reading: por nosotros, con nota de alternativa literal
  alternative_spanish_readings:
  - con nosotros
  - para nosotros
  rationale: El inglés POB privilegia «for us» y conserva «with us» como alternativa literal. En español, «por nosotros» transmite mejor el sentido benefactivo del contexto; la nota mantiene la lectura más literal y la tensión léxica del hebreo.
  doctrine_reference: POB lexical practice on עם / idiomatic benefactive force
translation_notes:
  revision_awareness: Se sigue el estado de revisión más reciente, que indica que no hubo cambios adicionales y que la concordancia con el auditor es alta. La redacción española conserva la solución idiomática del original hebreo y la alternativa literal para עִמָּנוּ en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se evita «Cristo» u otra terminología no presente en el versículo.
  - La cláusula principal usa un español natural, pero la nota preserva la alternativa literal de עִמָּנוּ.
  - «Alegres» refleja el adjetivo hebreo sin convertirlo en verbo o participio.
