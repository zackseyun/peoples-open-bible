translation:
  language: es
  text: Envíen un cordero al gobernante del país[a][b], desde Sela en el desierto al monte de la hija de Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la roca» o «desde el peñasco»; el hebreo סלע puede leerse como sustantivo común, aunque aquí probablemente sea el nombre propio Sela.
    reason: lexical_alternative
  - marker: b
    text: La frase «un cordero» probablemente alude a un tributo enviado al gobernante.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁלְחוּ
  english_pob_choice: Send
  chosen_spanish: Envíen
  alternatives_spanish:
  - Mandad
  - Envíen fuera
  - Despachen
  lexicon: HALOT
  rationale: El imperativo qal masculino plural pide una orden directa a varios destinatarios. «Envíen» conserva el mandato sin añadir matices ajenos; además, es un registro natural y digno en español bíblico contemporáneo.
- source_word: כַר
  english_pob_choice: a lamb
  chosen_spanish: un cordero
  alternatives_spanish:
  - un carnero
  - un cordero de tributo
  - un cordero tributario
  lexicon: HALOT
  rationale: El valor léxico básico se conserva con «cordero». La posible idea de tributo pertenece al contexto político, no a la palabra misma, por lo que no se explicita en el texto principal.
- source_word: מֹשֵׁל אֶרֶץ
  english_pob_choice: the ruler of the land
  chosen_spanish: el gobernante de la tierra
  alternatives_spanish:
  - el que gobierna la tierra
  - el soberano del país
  - el gobernante del país
  lexicon: HALOT
  rationale: 'מֹשֵׁל funciona como participio sustantivado: «gobernante». אֶרֶץ puede ser «tierra» o «país»; aquí se mantiene «tierra» como equivalente más amplio y acorde con la poesía profética, sin forzar la referencia regional.'
- source_word: מִסֶּלַע
  english_pob_choice: from Sela
  chosen_spanish: desde Sela
  alternatives_spanish:
  - desde la roca
  - desde el peñasco
  - desde la peña
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, siguiendo la lectura probable del topónimo. La alternativa léxica literal queda reflejada en la nota, porque la forma hebrea también admite el sentido común de «roca/peñasco».
- source_word: מִדְבָּרָה
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto hacia allí
  - por el desierto
  - desde el desierto
  lexicon: HALOT
  rationale: La forma direccional es sintácticamente difícil, pero el audit trail inglés la entiende como una localización de ruta. En español, «en el desierto» reproduce de manera clara y sobria esa construcción sin sobreinterpretarla.
- source_word: אֶל הַר בַּת צִיּוֹן
  english_pob_choice: to the mountain of daughter Zion
  chosen_spanish: hasta el monte de la hija de Sion
  alternatives_spanish:
  - al monte de la hija de Sion
  - al monte de la hija Sion
  - hasta el monte de la hija de Sion
  lexicon: HALOT
  rationale: Se mantiene la metáfora poética «hija de Sion» y se usa «monte» para הַר. «Hasta» refleja con naturalidad la orientación del movimiento en la frase y conserva la meta del envío.
theological_decisions:
- issue: Si explicitar el sentido de tributo en la traducción principal
  english_pob_reading: Keep the concrete wording 'Send a lamb' and allow the tribute sense to remain implicit.
  chosen_spanish_reading: Mantener «un cordero» y dejar implícita la noción de tributo.
  alternative_spanish_readings:
  - Envíen un tributo en corderos
  - Envíen un cordero de tributo
  - Envíen un cordero como tributo
  rationale: El contexto sugiere una ofrenda política, pero el hebreo nombra concretamente al animal. Para no cargar la traducción con una interpretación que el sustantivo no codifica, se preserva la imagen y se deja la implicación contextual al lector.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la tensión entre topónimo y sustantivo común en סלע
  english_pob_reading: Likely the place-name Sela here, though the Hebrew can be read as 'crag/rock'.
  chosen_spanish_reading: Tratar Sela como nombre propio en el texto principal y señalar la lectura literal posible en nota.
  alternative_spanish_readings:
  - desde la roca
  - desde el peñasco
  - desde el peñasco Sela
  rationale: La evidencia favorece el topónimo, pero la forma hebrea conserva una ambigüedad real. La traducción no debe borrar esa tensión; por eso el texto principal translitera y la nota preserva la alternativa literal.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa: mantiene Sela como topónimo, conserva la localización «en el desierto» y no explicita en el texto principal la lectura política de tributo. También preserva la metáfora poética de «la hija de Sion» en lugar de sustituirla por un equivalente interpretativo.'
  spanish_consistency_notes:
  - Se usó «cordero» para כַר, en armonía con la decisión inglesa y con el uso bíblico usual del animal como regalo/tributo sin convertirlo en paráfrasis.
  - «Gobernante» rinde מֹשֵׁל con un término transparente y no eclesiástico.
  - Se prefirió «tierra» a «país» para אֶרֶץ por su amplitud poética y porque no limita indebidamente el referente.
  - 'La duplicación de notas [a][b] refleja dos decisiones distintas: la ambigüedad de סלע y la lectura tributaria de «un cordero».'
