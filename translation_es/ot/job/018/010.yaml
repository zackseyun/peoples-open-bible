translation:
  language: es
  text: Su cuerda está escondida en el suelo[a], y su trampa sobre el sendero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su cordel está escondido en el suelo, y su lazo sobre el sendero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָמוּן
  english_pob_choice: is hidden
  chosen_spanish: está escondida
  alternatives_spanish:
  - está oculta
  - está enterrada
  lexicon: HALOT
  rationale: El participio pasivo expresa un estado resultante de ocultación. En español, «está escondida» conserva bien esa idea y suena natural en un contexto poético de trampa tendida.
- source_word: בָּאָרֶץ
  english_pob_choice: in the ground
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - en el terreno
  lexicon: HALOT
  rationale: Aunque «tierra» puede abarcar más que el suelo físico, en este contexto de una cuerda oculta para atrapar comunica adecuadamente el lugar donde queda escondida. «Suelo» sería más concreto, pero menos natural con el tono poético.
- source_word: חַבְלוֹ
  english_pob_choice: his rope
  chosen_spanish: su cuerda
  alternatives_spanish:
  - su rope
  - su cordel
  - su cordón
  lexicon: HALOT
  rationale: El sustantivo puede significar cuerda o cordel ligado a una trampa. «Cuerda» mantiene el valor concreto y permite la alternativa lexical sin forzar la imagen; evita el tecnicismo innecesario de «snare-line».
- source_word: וּמַלְכֻּדְתּוֹ
  english_pob_choice: and his trap
  chosen_spanish: y su trampa
  alternatives_spanish:
  - y su lazo
  - y su ardid
  lexicon: HALOT
  rationale: מַלְכֹּדֶת designa una trampa o lazo. «Trampa» es la opción más clara en español moderno y conserva la fuerza visual del texto.
- source_word: עֲלֵי נָתִיב
  english_pob_choice: on the path
  chosen_spanish: sobre el sendero
  alternatives_spanish:
  - sobre el camino
  - en el camino
  - a la vera del sendero
  lexicon: HALOT
  rationale: La preposición indica ubicación respecto de una vía de paso. «Sendero» transmite la imagen de un camino estrecho donde alguien puede caer en la trampa, y mantiene la poeticidad del hebreo.
translation_notes:
  revision_awareness: El texto hebreo es breve y poético; la versión inglesa POB opta por una imagen concreta («rope», «trap», «path»). La presente redacción sigue esa lectura, pero en español conserva una alternativa léxica en nota porque חבל puede ser «cuerda/cordel» y מַלכּדת puede ser «lazo» además de «trampa».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Dios» sin intervención porque el versículo no contiene el Tetragrámaton ni términos teológicos equivalentes.
  - Se prefirió «cuerda»/«trampa» en el texto principal por claridad y naturalidad; la nota preserva las alternativas léxicas documentadas.
  - «Tierra» se usó en vez de «suelo» para respetar el registro poético y evitar una sobreconcreción prosaica.
