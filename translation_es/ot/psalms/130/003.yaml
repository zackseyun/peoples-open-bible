    issue: יָהּ fue traducido como «Yahvé» en lugar de «Yah».
    rationale: La auditoría inglesa documenta explícitamente que יָהּ es la forma breve poética, distinta de יהוה, y debe distinguirse de אֲדֹנָי en este versículo. Cambiarlo a «Yahvé» borra una distinción significativa del hebreo y del razonamiento teológico-lexical registrado.
  - severity: medium
    issue: «guardaras cuenta de» contiene un error ortográfico y la expresión es poco idiomática.
    rationale: 'Debe ser «guardaras»/«guardarás» según contexto, pero aquí además falta tilde verbal adecuada en subjuntivo: «guardaras» no lleva tilde; aun así, la locución suena menos natural que «llevaras cuenta de». Conviene usar una formulación española más fluida que conserve el matiz de registro judicial.'
  revised_spanish_text: Si tú, Yah[a], llevaras cuenta de las iniquidades, Señor, ¿quién podría mantenerse en pie?
  revised_footnotes:
  - marker: a
    text: O «Yahvé». El hebreo tiene יָהּ, la forma breve poética del nombre divino, distinta de אֲדֹנָי («Señor»).
