translation:
  language: es
  text: 'Moisés dijo a Aarón: «¿Qué te hizo este pueblo, que has traído sobre ellos[a] un gran pecado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa un pronombre singular («sobre él» o «sobre ello») referido colectivamente a «el pueblo». En español se expresa más naturalmente con el sentido plural: «sobre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte de forma natural en pasado simple español; se omite la conjunción explícita para mantener fluidez sin perder valor narrativo.
- source_word: מֶה עָשָׂה לְךָ הָעָם הַזֶּה
  english_pob_choice: What did this people do to you
  chosen_spanish: ¿Qué te hizo este pueblo?
  alternatives_spanish:
  - ¿Qué te hizo este pueblo a ti?
  - ¿Qué te hizo este pueblo contra ti?
  lexicon: HALOT
  rationale: Se conserva la fuerza interrogativa de מֶה y el tono algo distante de הַזֶּה con «este pueblo». El verbo con לְךָ se expresa naturalmente como «te hizo»; en español el complemento indirecto ya comunica el daño o impacto personal.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido/resultante de la acusación de Moisés. «Que» reproduce mejor el enlace natural en español dentro de una pregunta retórica que «porque».
- source_word: הֵבֵאתָ
  english_pob_choice: you have brought
  chosen_spanish: has traído
  alternatives_spanish:
  - trajiste
  - has ocasionado
  lexicon: HALOT
  rationale: El hiphil de בוא se vierte como «traer». Se usa presente perfecto por el valor de acción completada con relevancia presente en el discurso directo.
- source_word: עָלָיו
  english_pob_choice: upon them
  chosen_spanish: sobre él[b]
  alternatives_spanish:
  - sobre ellos
  - sobre el pueblo
  lexicon: HALOT
  rationale: Se mantiene la singularidad morfológica del pronombre hebreo con una anotación para la tensión semántica colectiva. En español puede sonar más literal «sobre él», aunque el referente es colectivo; por eso se señala la alternativa plural.
- source_word: חֲטָאָה גְדֹלָה
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un pecado grande
  - una gran culpa
  lexicon: HALOT
  rationale: חֲטָאָה se rinde con «pecado», término claro y bíblico en español. Se preserva el adjetivo «gran» como equivalente directo de גְדֹלָה, sin añadir intensificadores ajenos al hebreo.
theological_decisions:
- issue: Culpabilidad de Aarón
  english_pob_reading: Moses attributes to Aaron the bringing of a great sin upon the people, without softening or expanding the charge.
  chosen_spanish_reading: Moisés atribuye a Aarón haber traído sobre el pueblo un gran pecado, sin suavizar ni aumentar la acusación.
  alternative_spanish_readings:
  - que has causado un gran pecado
  - que has llevado al pueblo a un gran pecado
  rationale: La formulación española conserva la imputación moral directa del hebreo. No se reduce a un simple problema administrativo ni se amplía a una explicación causal que el texto no da.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: El borrador inglés de referencia pasó por una revisión que eliminó un «such» redundante para acercarse más al hebreo. La versión española evita asimismo todo intensificador añadido y conserva solo «un gran pecado».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en otros contextos, pero este versículo no lo contiene.
  - Se mantiene el estilo bíblico sobrio y directo, con tratamiento de segunda persona singular en la reprensión.
  - «Pueblo» se conserva en singular porque el hebreo también lo presenta en singular formal, aunque con sentido colectivo.
