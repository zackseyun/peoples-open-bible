    rationale: El verbo no es mera atracción abstracta, sino atraerla hacia sí, captarla. «Si no la atraemos hacia nosotros» conserva mejor el valor léxico sin sobreinterpretar; la nota sigue ofreciendo «seducimos» y «ganamos para nosotros» como alternativas.
