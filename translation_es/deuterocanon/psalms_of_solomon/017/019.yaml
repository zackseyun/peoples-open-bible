translation:
  language: es
  text: Vagaban en lugares desolados[a], para que sus vidas fueran salvadas[b] del mal, y a los ojos de la comunidad forastera[c], una vida salvada de entre ellos era preciosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desiertos'.
    reason: lexical_alternative
  - marker: b
    text: El griego también puede expresarse como 'para que se salvaran sus vidas'; aquí se conserva el pasivo para reflejar σωθῆναι.
    reason: lexical_alternative
  - marker: c
    text: O 'la comunidad del destierro' / 'la diáspora'; παροικία señala un grupo que vive como forastero o fuera de su patria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλανῶντο
  english_pob_choice: they wandered
  chosen_spanish: anduvieron
  alternatives_spanish:
  - vagaban
  - andaban errantes
  lexicon: BDAG
  rationale: El griego describe aquí un desplazamiento físico en contexto de ἐν ἐρήμοις; ‘anduvieron’ comunica movimiento y evita sugerir una desorientación moral que el contexto no exige.
- source_word: ἐν ἐρήμοις
  english_pob_choice: in wildernesses
  chosen_spanish: en desiertos
  alternatives_spanish:
  - en desiertos
  - en lugares desolados
  - en soledades
  lexicon: BDAG
  rationale: ‘Desiertos’ conserva la amplitud semántica de lugares áridos, despoblados y apartados. En español bíblico es comprensible y no limita indebidamente la imagen a arena física.
- source_word: σωθῆναι
  english_pob_choice: that their lives might be saved
  chosen_spanish: para que sus vidas fueran salvadas
  alternatives_spanish:
  - para salvar sus vidas
  - para que sus vidas fuesen rescatadas
  lexicon: BDAG
  rationale: Se mantiene la fuerza pasiva del infinitivo aoristo pasivo con sujeto acusativo. ‘Fueran salvadas’ refleja mejor que la preservación no la realizan ellos mismos.
- source_word: ψυχὰς αὐτῶν
  english_pob_choice: their lives
  chosen_spanish: sus vidas
  alternatives_spanish:
  - sus almas
  - su vida
  lexicon: BDAG
  rationale: Como en el inglés POB, ψυχή se entiende aquí en sentido concreto de supervivencia. ‘Vidas’ evita importar un sentido antropológico más abstracto que el pasaje no requiere.
- source_word: ἀπὸ κακοῦ
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - del mal
  - del mal o del peligro
  - de la calamidad
  lexicon: BDAG
  rationale: ‘Mal’ conserva el paralelismo con el griego y deja abierta la posibilidad de daño, desgracia o maldad concreta según el contexto.
- source_word: παροικίας
  english_pob_choice: the sojourning community
  chosen_spanish: la comunidad de los forasteros
  alternatives_spanish:
  - la comunidad del destierro
  - la diáspora
  - la comunidad peregrina
  lexicon: BDAG
  rationale: παροικία denota una colectividad que vive como forastera o residente no nativa. ‘Comunidad de los forasteros’ mantiene el sentido comunitario y desplazado sin depender de una terminología técnica eclesial.
- source_word: τίμιον
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - valiosa
  - estimada
  - querida
  lexicon: BDAG
  rationale: ‘Preciosa’ expresa alto valor personal y comunitario, y reproduce bien la apreciación positiva del griego en un registro natural en español.
- source_word: ψυχὴ σεσωμένη
  english_pob_choice: a life saved
  chosen_spanish: una vida salvada
  alternatives_spanish:
  - una vida preservada
  - un alma salvada
  lexicon: BDAG
  rationale: 'La combinación retoma ψυχή como ‘vida’ y el participio perfecto como estado resultante: una vida ya rescatada. En español suena más directa que ‘un alma salvada’ en este contexto de preservación física.'
- source_word: ἐξ αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de entre ellos
  - de ellos
  - de su propio grupo
  lexicon: BDAG
  rationale: ‘De entre ellos’ preserva la idea distributiva/local de salida desde el grupo mencionado, sin reducirlo a una simple procedencia genérica.
theological_decisions:
- issue: Sentido de ψυχή en ambos casos
  english_pob_reading: Render as 'life/lives' rather than 'soul/souls'
  chosen_spanish_reading: Traducir como ‘vidas’ y ‘vida’
  alternative_spanish_readings:
  - ‘almas’
  - ‘alma’
  rationale: El pasaje habla de huida y preservación frente al mal; por eso el sentido inmediato es la vida concreta. Mantener ‘vidas’ evita una carga doctrinal no sustentada por el contexto.
  doctrine_reference: Antropología bíblica; preservación de la vida en contexto de peligro
- issue: Agente implícito de la salvación en σωθῆναι
  english_pob_reading: 'Passive purpose clause: ''that their lives might be saved'''
  chosen_spanish_reading: ‘para que sus vidas fueran salvadas’
  alternative_spanish_readings:
  - ‘para salvar sus vidas’
  - ‘a fin de que sus vidas fueran rescatadas’
  rationale: El pasivo se conserva para no atribuir la acción a los sujetos del verbo principal. La forma española refleja mejor la pasividad del infinitivo griego y su valor final.
  doctrine_reference: Gramática del pasivo; preservación del sujeto paciente
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la pérdida de la voz pasiva en σωθῆναι y depuró la puntuación; la versión española sigue esa decisión, manteniendo una cláusula final pasiva y un ritmo claro en una sola oración.
  spanish_consistency_notes:
  - Se mantiene ‘vida(s)’ para ψυχή, en continuidad con la decisión inglesa y con el contexto de supervivencia.
  - Se evita ‘Señor’ o equivalentes porque el versículo no contiene el nombre divino ni κύριος.
  - ‘Comunidad de los forasteros’ intenta reproducir el valor colectivo de παροικία sin introducir un tecnicismo eclesiástico.
  - No se fuerza ‘Cristo/Mesías’ ni otras terminologías ajenas al versículo.
