translation:
  language: es
  text: Sus cuatro columnas y sus cuatro bases de bronce[a], sus ganchos de plata y el recubrimiento de sus partes superiores[b] y sus bandas de plata[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zócalos» para «bases». El término hebreo se refiere a las piezas metálicas de soporte en la parte inferior de las columnas.
    reason: lexical_alternative
  - marker: b
    text: O «el recubrimiento de sus cabezas». El hebreo dice literalmente «el recubrimiento de sus cabezas/partes superiores».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente «filletes». La forma exacta de estos elementos de plata es incierta; «bandas» es una opción moderna y clara.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדֵיהֶם
  english_pob_choice: their pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: En contexto tabernáculo, עַמּוּד designa un soporte arquitectónico; en español, "columna" comunica bien la función y suena natural en una descripción de construcción sagrada. "Pilares" también sería posible, pero "columnas" evita una resonancia más monumental que "pilares" en este contexto.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus encajes
  lexicon: HALOT
  rationale: אֶדֶן aquí refiere a las piezas de soporte en la parte inferior de las columnas. "Bases" reproduce el sentido funcional con claridad; "zócalos" o "encajes" serían más técnicos, pero menos transparentes para el lector general.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En listas de materiales del tabernáculo, el término suele entenderse como bronce. Esa elección coincide con la lectura auditada en inglés y es la más estable en español bíblico contemporáneo.
- source_word: וָוֵיהֶם
  english_pob_choice: their hooks
  chosen_spanish: sus ganchos
  alternatives_spanish:
  - sus ganchos de sujeción
  - sus perchas
  lexicon: HALOT
  rationale: וָו puede referir ganchos o piezas de sujeción. "Ganchos" es claro y natural en español; evita el tecnicismo de "filletes" y no fuerza una forma más específica que la evidencia no exige.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  lexicon: HALOT
  rationale: El material es plata; en español, el adjetivo "de plata" o el sustantivo "plata" son idiomáticos. Se usa "de plata" en la frase para mantener la relación material directa con los objetos.
- source_word: צִפּוּי רָאשֵׁיהֶם
  english_pob_choice: the overlay of their tops
  chosen_spanish: el recubrimiento de sus extremos
  alternatives_spanish:
  - el recubrimiento de sus cabezas
  - el revestimiento de sus coronas
  lexicon: HALOT
  rationale: צִפּוּי es un recubrimiento o revestimiento; רָאשֵׁיהֶם literalmente es "sus cabezas/extremos". En español, "extremos" comunica con más naturalidad la parte superior de estas piezas sin perder la tensión del hebreo, que no usa un verbo de acción.
- source_word: חֲשֻׁקֵיהֶם
  english_pob_choice: their bands
  chosen_spanish: sus bandas
  alternatives_spanish:
  - sus filletes
  - sus aros
  lexicon: HALOT
  rationale: El término es difícil y la tradición inglesa nota la incertidumbre. "Bandas" es una equivalencia clara y amplia en español, conservando la ambigüedad sin imponer una forma demasiado específica.
translation_notes:
  revision_awareness: 'La versión inglesa revisada reordenó expresiones como «silver hooks» y «silver bands» para hacerlas más naturales sin cambiar el contenido. El español sigue esa misma intención de naturalidad, manteniendo todos los elementos del hebreo: cuatro columnas, cuatro bases de bronce, ganchos de plata, recubrimiento superior y bandas de plata.'
  spanish_consistency_notes:
  - Se mantuvo «plata» en lugar de «de plata» cuando el sustantivo funciona mejor en español, pero se evitó perder la relación material.
  - Se eligió «columnas» por ser el equivalente arquitectónico más natural en español para עַמּוּד en este contexto.
  - Se preservó la ambigüedad de חֲשֻׁקֵיהֶם con «bandas», sin forzar «filletes», que sería más tradicional pero menos transparente.
