id: SIR.27.23
reference: Sirach 27:23
source:
  edition: lxx-swete-1909
  text: ἀπέναντι τῶν ὀφθαλμῶν σου γλυκανεῖ στόμα σου καὶ ἐπὶ τῶν λόγων σου ἐκθαυμάσει, ὕστερον δὲ διαστρέψει τὸ στόμα αὐτοῦ καὶ ἐν τοῖς λόγοις σου δώσει σκάνδαλον.
  language: Greek
  pages:
  - 716
  confidence: high
  validation: agree
translation:
  text: Before your eyes his mouth speaks sweetly[a], and he will marvel at your words; but afterward he will twist his mouth and, in regard to your words, he will cause offense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will give a stumbling block from your words' / 'he will use your words to trip you up.' The Greek σκάνδαλον can denote an offense or a cause of stumbling.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέναντι τῶν ὀφθαλμῶν σου
  chosen: Before your eyes
  alternatives:
  - In your presence
  - Facing you
  lexicon: LSJ
  rationale: The idiom denotes what happens directly in someone's presence. 'Before your eyes' is a natural English rendering that preserves the vividness of the Greek.
- source_word: γλυκανεῖ στόμα σου
  chosen: his mouth speaks sweetly
  alternatives:
  - he sweetens his mouth
  - his speech is sweet
  lexicon: LSJ
  rationale: Although the Greek literally says 'will sweeten [the] mouth,' English idiom prefers expressing the effect as sweet speech. 'His mouth speaks sweetly' keeps the bodily imagery while remaining readable.
- source_word: ἐκθαυμάσει
  chosen: he will marvel
  alternatives:
  - he will admire
  - he will be greatly impressed
  lexicon: LSJ
  rationale: '''Marvel'' captures the overt show of admiration without over-paraphrasing. In context it suggests exaggerated praise.'
- source_word: ὕστερον δὲ
  chosen: but afterward
  alternatives:
  - but later
  - then afterward
  lexicon: LSJ
  rationale: Marks the contrast between flattering speech in person and later betrayal.
- source_word: διαστρέψει τὸ στόμα αὐτοῦ
  chosen: he will twist his mouth
  alternatives:
  - he will distort his speech
  - he will turn his mouth against you
  lexicon: LSJ
  rationale: The Greek is bodily and metaphorical. 'Twist his mouth' preserves the image of speech turning crooked or hostile; a more interpretive rendering like 'distort his speech' is possible but less transparent to the source.
- source_word: δώσει σκάνδαλον
  chosen: he will cause offense
  alternatives:
  - he will give offense
  - he will create a stumbling block
  - he will trip you up
  lexicon: BDAG
  rationale: In this wisdom context, σκάνδαλον refers to something injurious or offensive arising from one's words being used against him. 'Cause offense' is idiomatic and broad enough to preserve the sense without importing a specifically theological 'stumbling block' nuance.
- source_word: ἐν τοῖς λόγοις σου
  chosen: in regard to your words
  alternatives:
  - with your words
  - by means of your words
  - from your words
  lexicon: LSJ
  rationale: 'The preposition ἐν here likely indicates sphere or means: he uses what you said as the occasion for offense. ''In regard to your words'' keeps the relation somewhat open, matching the Greek''s flexibility.'
