translation:
  language: es
  text: Y ahora, oh Señor, Dios nuestro, que sacaste a tu pueblo de la tierra de Egipto con mano fuerte[a] y te hiciste un nombre[b], como en este día[c]—hemos pecado; hemos obrado perversamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «con mano poderosa».
    reason: lexical_alternative
  - marker: b
    text: O, «te ganaste un nombre», es decir, adquiriste renombre.
    reason: lexical_alternative
  - marker: c
    text: O, «hasta este día».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי אֱלֹהֵינוּ
  english_pob_choice: O Lord our God
  chosen_spanish: oh Yahvé, Dios nuestro
  alternatives_spanish:
  - oh Señor, Dios nuestro
  - oh Yahvé, nuestro Dios
  lexicon: HALOT
  rationale: En oración directa, אֲדֹנָי funciona como vocativo reverente; en este proyecto se preserva el nombre divino como «Yahvé» cuando el hebreo lo permite. «Dios nuestro» mantiene el posesivo comunitario del hebreo sin convertirlo en una fórmula litúrgica más tradicional de lo que el texto exige.
- source_word: הוֹצֵאתָ
  english_pob_choice: brought ... out
  chosen_spanish: sacaste ... de
  alternatives_spanish:
  - sacaste ... fuera de
  - llevaste ... fuera de
  lexicon: HALOT
  rationale: El hifil de יצא expresa sacar/traer fuera; «sacaste» es natural en español y conserva la imagen del éxodo.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: En contexto pactual, עם apunta al pueblo perteneciente a Dios. «Tu pueblo» es la equivalencia más directa y reconocible.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva la fórmula del éxodo sin forzar una paráfrasis. «Tierra de Egipto» reproduce el registro bíblico con claridad.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con mano potente
  lexicon: HALOT
  rationale: La expresión fija del éxodo se traduce de manera casi literal; «mano fuerte» preserva el eco intertextual y evita suavizar la fuerza del hebreo.
- source_word: וַתַּעַשׂ לְךָ שֵׁם
  english_pob_choice: made for yourself a name
  chosen_spanish: te ganaste un nombre
  alternatives_spanish:
  - te hiciste un nombre
  - te procuraste un nombre
  lexicon: HALOT
  rationale: El hebreo idiomático apunta a adquirir renombre. «Te ganaste un nombre» mantiene la idea de reputación sin sonar artificial en español, aunque deja visible la metáfora del «nombre».
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta hoy
  alternatives_spanish:
  - como en este día
  - hasta este día
  lexicon: HALOT
  rationale: La frase expresa vigencia continua. «Como hasta hoy» comunica bien la duración hasta el presente y evita una construcción más pesada.
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  - hemos faltado
  lexicon: HALOT
  rationale: En confesión, el perfecto español expresa culpa vigente. «Pecado» conserva el sentido moral y religioso básico.
- source_word: רָשָׁעְנוּ
  english_pob_choice: we have acted wickedly
  chosen_spanish: hemos obrado perversamente
  alternatives_spanish:
  - hemos actuado impíamente
  - hemos hecho maldad
  lexicon: HALOT
  rationale: Se distingue de חָטָאנוּ con un segundo verbo de mayor carga moral. «Obrado perversamente» conserva el paralelismo y evita repetir simplemente «pecado».
theological_decisions:
- issue: Nombre divino frente a «Señor»
  english_pob_reading: The English POB uses 'Lord' for אֲדֹנָי, while also preserving the covenantal prayer address.
  chosen_spanish_reading: Se preserva «Yahvé» en el texto principal, con vocativo reverente «oh».
  alternative_spanish_readings:
  - Señor
  - Señor Dios nuestro
  rationale: El proyecto español prioriza el nombre divino donde el hebreo lo permite, en vez de ocultarlo con una convención de mayúsculas. Aquí la oración dirige la súplica a Dios en su identidad pactual, por lo que «Yahvé, Dios nuestro» es coherente con la política del proyecto.
  doctrine_reference: Éxodo 3; uso del tetragrámaton en la tradición bíblica del proyecto.
- issue: «Con mano fuerte» y el eco del éxodo
  english_pob_reading: Retain the exodus formula and 'with a strong hand.'
  chosen_spanish_reading: «Con mano fuerte» se mantiene de forma casi literal.
  alternative_spanish_readings:
  - con mano poderosa
  - con gran poder
  rationale: La fuerza del versículo está en la fórmula histórica del éxodo. Una traducción más explicativa debilitaría el enlace intertextual con Éxodo y con la memoria de la liberación.
  doctrine_reference: Éxodo 6:1; 13:3; Deuteronomio 4:34.
- issue: Idiom a 'made for yourself a name'
  english_pob_reading: The idiom means acquiring renown or reputation.
  chosen_spanish_reading: «Te ganaste un nombre» conserva la metáfora y la idea de renombre.
  alternative_spanish_readings:
  - te hiciste un nombre
  - te diste renombre
  rationale: En español, la expresión transmite mejor el valor idiomático que una versión demasiado literal. Al mismo tiempo, no se pierde el sustantivo «nombre», que es teológicamente importante en el texto.
  doctrine_reference: Tema bíblico del nombre/reputación divina.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa reciente hizo más natural la vocación directa con «O», ajustó «out from» a «out of» y añadió coma antes de la cláusula temporal. En español se reflejó ese tono solemne con «oh» y se mantuvo la puntuación separando la cláusula de tiempo con coma y raya.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el tetragrámaton.
  - «Dios nuestro» conserva el posesivo comunitario del hebreo.
  - 'Se distinguieron los dos verbos confesionales: «hemos pecado» / «hemos obrado perversamente».'
  - La frase del éxodo se mantuvo próxima al hebreo para conservar la alusión intertextual.
