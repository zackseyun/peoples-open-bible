base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/008/005.yaml
  text: Whoever keeps a command will not know an evil thing[b][a], and a wise heart knows the proper time and judgment.
  footnotes:
  - marker: a
    text: Or 'an evil thing' or 'a bad thing.' The Hebrew phrase is literally 'a bad/evil thing,' and may refer either to moral evil or, more likely here, to harmful consequence or trouble.
    reason: lexical_alternative
  - marker: b
    text: Or 'time and judgment,' that is, the proper time and the right decision/procedure.
    reason: lexical_alternative
