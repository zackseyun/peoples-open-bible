translation:
  language: es
  text: Capturó las ciudades fortificadas que pertenecían a Judá y llegó hasta Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y avanzó hasta Jerusalén». El hebreo dice literalmente «llegó hasta Jerusalén», destacando que alcanzó Jerusalén después de capturar las ciudades fortificadas de Judá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: El verbo לכד en contexto militar expresa la toma de una ciudad o plaza. En español, "tomó" es natural y fiel, pero "capturó" también sería posible. Se evita "se apoderó de" por sonar más interpretativo.
- source_word: עָרֵי הַמְּצֻרוֹת
  english_pob_choice: the fortified cities
  chosen_spanish: las ciudades fortificadas
  alternatives_spanish:
  - las ciudades amuralladas
  - las fortalezas
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente "ciudades fortificadas"; en español esta forma conserva tanto "ciudades" como el rasgo defensivo. "Fortalezas" perdería el matiz de que son ciudades, no solo posiciones militares.
- source_word: אֲשֶׁר לִיהוּדָה
  english_pob_choice: that belonged to Judah
  chosen_spanish: que pertenecían a Judá
  alternatives_spanish:
  - que eran de Judá
  - que estaban en Judá
  lexicon: HALOT
  rationale: El ל posesivo marca pertenencia o afiliación. "Pertenecían a Judá" comunica bien esa relación política/territorial sin reducirla solo a ubicación geográfica.
- source_word: וַיָּבֹא עַד יְרוּשָׁלָם
  english_pob_choice: and came as far as Jerusalem
  chosen_spanish: y llegó hasta Jerusalén
  alternatives_spanish:
  - y avanzó hasta Jerusalén
  - y vino hasta Jerusalén
  lexicon: HALOT
  rationale: '"Llegó hasta" conserva el valor de עַד como límite alcanzado. Se evita "llegó a" porque puede sonar a simple destino sin énfasis en el límite, y "avanzó" añade un matiz militar no explícito.'
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del aparato inglés sin introducir cambios interpretativos: mantiene la secuencia militar de tomar las ciudades fortificadas de Judá y la expresión de límite espacial en עַד יְרוּשָׁלִָם, reflejada con «llegó hasta Jerusalén».'
  spanish_consistency_notes:
  - Se conserva «Judá» como nombre propio territorial/político, no como adjetivo.
  - Se usa «ciudades fortificadas» para mantener la precisión de 'cities' frente a alternativas más generales como 'fortalezas'.
  - La nota a pie de página reproduce la alternativa semántica principal documentada por el POB inglés sobre la expresión de movimiento hasta un límite.
