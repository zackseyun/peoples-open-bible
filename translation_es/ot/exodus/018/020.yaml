translation:
  language: es
  text: Y les advertirás acerca de los estatutos[a] y las leyes, y les darás a conocer el camino[b] por el que deben andar, y la obra que han de hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las instrucciones» para «las leyes» (hebreo torot). El término puede denotar enseñanza en sentido más amplio, pero aquí el contexto legal favorece «leyes».
    reason: lexical_alternative
  - marker: b
    text: Lit. «el camino en que ellos andarán». Se conserva «andar» para mantener la metáfora hebrea de conducta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזְהַרְתָּה
  english_pob_choice: you shall warn
  chosen_spanish: les advertirás
  alternatives_spanish:
  - les amonestarás
  - les enseñarás con advertencia
  lexicon: HALOT
  rationale: El verbo hebreo en causativo comunica una advertencia o instrucción con tono de responsabilidad. «Advertirás» conserva mejor esa fuerza que un simple «enseñarás», y suena natural en español administrativo y legal.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las prescripciones
  lexicon: HALOT
  rationale: חֻקִּים designa disposiciones fijadas u ordenanzas prescritas. «Estatutos» mantiene el valor jurídico sin duplicar el segundo término con una palabra demasiado genérica.
- source_word: הַתּוֹרֹת
  english_pob_choice: the laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - las instrucciones
  - las enseñanzas
  lexicon: HALOT
  rationale: Aunque תּוֹרֹת puede significar «instrucciones», en este contexto legal-administrativo su fuerza se acerca a disposiciones normativas. «Leyes» comunica bien ese matiz en español y conserva la distinción respecto de «estatutos».
- source_word: וְהוֹדַעְתָּ
  english_pob_choice: make known
  chosen_spanish: les darás a conocer
  alternatives_spanish:
  - les harás saber
  - les informarás
  lexicon: HALOT
  rationale: El causativo de ידע es «hacer saber» o «dar a conocer». «Les darás a conocer» conserva el valor causativo con un español claro y fluido.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - la senda
  - el modo de proceder
  lexicon: HALOT
  rationale: La metáfora hebrea de conducta se mantiene mejor con «camino», que es idiomático en español bíblico y no borra la imagen original.
- source_word: יֵלְכוּ בָהּ
  english_pob_choice: in which they must walk
  chosen_spanish: por el que deben andar
  alternatives_spanish:
  - en que deben andar
  - por donde deben caminar
  lexicon: HALOT
  rationale: «Andar» conserva la metáfora bíblica de conducta. «Por el que» expresa con naturalidad la relación con «camino» y evita una construcción forzada.
- source_word: הַמַּעֲשֶׂה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la acción
  lexicon: HALOT
  rationale: En paralelo con «el camino», מַעֲשֶׂה apunta a la acción requerida o tarea a realizar. «Obra» es suficientemente amplia y solemne para este contexto.
- source_word: אֲשֶׁר יַעֲשׂוּן
  english_pob_choice: that they must do
  chosen_spanish: que han de hacer
  alternatives_spanish:
  - que deben hacer
  - que harán
  lexicon: HALOT
  rationale: La cláusula relativa expresa obligación. «Han de hacer» transmite deber sin endurecer innecesariamente el español ni perder el matiz prescriptivo.
theological_decisions:
- issue: Preservación de la metáfora conductual de «camino/andar»
  english_pob_reading: the way in which they must walk
  chosen_spanish_reading: el camino por el que deben andar
  alternative_spanish_readings:
  - el modo de proceder que deben seguir
  - la senda en que deben vivir
  rationale: La lectura inglesa retiene la metáfora hebrea de conducta. En español, «camino/andar» comunica esa imagen de forma reconocible y fiel, sin convertirla en una paráfrasis abstracta.
  doctrine_reference: Antropología bíblica y ética de la obediencia
- issue: Distinción entre estatutos y leyes/instrucciones
  english_pob_reading: the statutes and the laws
  chosen_spanish_reading: los estatutos y las leyes
  alternative_spanish_readings:
  - los estatutos y las instrucciones
  - las ordenanzas y las enseñanzas
  rationale: El hebreo usa dos sustantivos distintos en un marco legal. Mantener ambos con términos diferenciados evita borrar la tensión lexical que el texto presenta.
  doctrine_reference: Hermenéutica legal del Pentateuco
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, marcado como sin cambios necesarios y con alto nivel de acuerdo; no se aplicaron revisiones adicionales respecto de la decisión inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «estatutos» y «leyes» para reflejar los dos lexemas hebreos.
  - Se conserva la metáfora bíblica de «camino/andar» en lugar de convertirla en explicación abstracta.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa que lo exija.
  - Se usa español contemporáneo, pero con registro solemne y bíblico adecuado para lectura eclesial.
