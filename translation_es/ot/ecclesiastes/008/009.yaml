translation:
  language: es
  text: Todo esto he visto[a], poniendo mi corazón en toda obra que se hace bajo el sol, en un tiempo en que un hombre ha gobernado sobre otro hombre para su perjuicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “una persona ha gobernado sobre otra para su perjuicio.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: lo he visto
  alternatives_spanish:
  - lo vi
  - lo he observado
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja bien con un pretérito perfecto compuesto en español para expresar la experiencia acumulada y reflexiva de Qohelet. 'Visto' es más directo que 'observado' y conserva el valor experiencial.
- source_word: וְנָתוֹן אֶת־לִבִּי
  english_pob_choice: while applying my heart
  chosen_spanish: mientras aplicaba mi corazón
  alternatives_spanish:
  - y poniendo mi corazón
  - y dando mi corazón
  - mientras prestaba atención
  lexicon: HALOT
  rationale: La expresión idiomática comunica dirigir la atención interior con reflexión. 'Aplicaba mi corazón' conserva la imagen hebrea y suena natural en español; 'mientras' hace fluida la construcción temporal.
- source_word: לֵב / לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  lexicon: HALOT
  rationale: En hebreo, 'corazón' incluye pensamiento, reflexión y voluntad, no solo emoción. Mantener 'corazón' preserva la antropología bíblica y la metáfora original.
- source_word: מַעֲשֶׂה
  english_pob_choice: deed
  chosen_spanish: obra
  alternatives_spanish:
  - acto
  - hecho
  - deed
  lexicon: HALOT
  rationale: En este contexto abarca lo que se realiza en general, no solo trabajo manual. 'Obra' es natural en español y mantiene la amplitud semántica de 'deed'.
- source_word: נַעֲשָׂה
  english_pob_choice: is done
  chosen_spanish: se hace
  alternatives_spanish:
  - es hecho
  - ocurre
  lexicon: HALOT
  rationale: El pasivo hebreo se expresa de manera natural con 'se hace', que conserva el foco en lo realizado bajo el sol sin introducir matices ajenos.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  lexicon: HALOT
  rationale: Es una expresión característica de Eclesiastés; 'debajo del sol' mantiene la formulación tradicional y transparente del hebreo.
- source_word: עֵת אֲשֶׁר
  english_pob_choice: at a time when
  chosen_spanish: en un tiempo cuando
  alternatives_spanish:
  - cuando
  - en el tiempo en que
  lexicon: HALOT
  rationale: La frase introduce una circunstancia temporal. 'En un tiempo cuando' conserva el sustantivo temporal y su función contextual.
- source_word: שָׁלַט
  english_pob_choice: has ruled over
  chosen_spanish: ha dominado sobre
  alternatives_spanish:
  - ha gobernado sobre
  - ha ejercido dominio sobre
  - ha ejercido autoridad sobre
  lexicon: HALOT
  rationale: El verbo expresa ejercer poder o dominio. 'Ha dominado sobre' transmite esa fuerza de manera clara en español, sin diluir la idea de sometimiento.
- source_word: הָאָדָם בְּאָדָם
  english_pob_choice: man has ruled over man
  chosen_spanish: un hombre ha dominado sobre otro hombre
  alternatives_spanish:
  - una persona ha dominado sobre otra
  - la humanidad ha dominado sobre la humanidad
  lexicon: HALOT
  rationale: El hebreo singular tiene fuerza representativa. 'Un hombre... otro hombre' conserva la forma y el paralelismo del texto; la alternativa inclusiva queda documentada por si se prefiere una formulación más general.
- source_word: לְרַע לוֹ
  english_pob_choice: to his harm
  chosen_spanish: para su mal
  alternatives_spanish:
  - para su daño
  - para su perjuicio
  - para su propio mal
  lexicon: HALOT
  rationale: '''Para su mal'' expresa el resultado perjudicial de forma breve y natural. Mantiene la posible amplitud del referente sin forzar un reflexivo explícito.'
theological_decisions:
- issue: Renderizado representativo de אָדָם en una sentencia general
  english_pob_reading: man has ruled over man
  chosen_spanish_reading: un hombre ha dominado sobre otro hombre
  alternative_spanish_readings:
  - una persona ha dominado sobre otra
  - la humanidad ha dominado sobre la humanidad
  rationale: El texto usa el sustantivo masculino singular de manera proverbial y representativa. Se conserva la forma del hebreo, mientras que la alternativa inclusiva queda disponible en nota o revisión si el contexto lo requiriera.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4; tabla de términos controvertidos para אָדָם
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés no introdujo cambios y fue marcada como sin modificaciones necesarias; el español sigue esa lectura estable, manteniendo la misma decisión lexical principal y la alternativa inclusiva en nota.
  spanish_consistency_notes:
  - Se conserva 'corazón' para לֵב, en coherencia con el uso bíblico de la sede del pensamiento y la reflexión.
  - Se mantiene 'debajo del sol' como fórmula estable de Eclesiastés.
  - Se elige un español moderno pero solemne, sin recurrir a calcos arcaizantes innecesarios.
  - La ambigüedad representativa de אָדָם se preserva mediante la nota, no se borra en el texto principal.
