translation:
  language: es
  text: Y cuando se cumplan setenta años, castigaré al rey de Babilonia y a aquella nación —oráculo de Yahvé— por su iniquidad, y a la tierra de los caldeos, y la convertiré en una desolación perpetua.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when ...
  chosen_spanish: Y cuando ...
  alternatives_spanish:
  - Y sucederá que ...
  - Y será que ...
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia futura. En español, 'Y cuando' conserva la subordinación temporal de manera natural sin añadir más interpretación que la necesaria.
- source_word: כִמְלֹאות
  english_pob_choice: when ... are completed
  chosen_spanish: se cumplan
  alternatives_spanish:
  - se completen
  - lleguen a cumplirse
  lexicon: HALOT
  rationale: El infinitivo con כ marca el momento en que se llena o se completa el plazo. 'Se cumplan' expresa bien ese cierre temporal en español actual.
- source_word: שִׁבְעִים שָׁנָה
  english_pob_choice: seventy years
  chosen_spanish: setenta años
  alternatives_spanish:
  - setenta años completos
  lexicon: HALOT
  rationale: Correspondencia directa y natural del numeral y el sustantivo.
- source_word: אֶפְקֹד עַל
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - tomaré cuentas a
  - visitaré con castigo a
  - castigaré sobre
  lexicon: HALOT
  rationale: En contextos judiciales, פקד con עַל implica castigo o rendición de cuentas. 'Castigaré' es la forma más clara y fiel en español, sin perder el matiz judicial.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey babilonio
  lexicon: HALOT
  rationale: Construcción posesiva estándar; 'de Babilonia' conserva la referencia geopolítica directa.
- source_word: הַגּוֹי הַהוּא
  english_pob_choice: that nation
  chosen_spanish: aquella nación
  alternatives_spanish:
  - ese pueblo
  - esa nación
  lexicon: HALOT
  rationale: '''Nación'' corresponde mejor al uso político de גוי en este contexto. ''Aquella'' reproduce la distancia deíctica del hebreo.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: oracle of Yahweh
  chosen_spanish: oráculo de Yahvé
  alternatives_spanish:
  - declaración de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética formal con el nombre divino según el criterio del proyecto. 'Oráculo de Yahvé' mantiene el registro y la función discursiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Sigue el default del proyecto para el Tetragrámaton. No se usa la sustitución litúrgica 'SEÑOR'.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: עוון expresa iniquidad/culpa moral. El singular colectivo 'su iniquidad' funciona bien con el sujeto conjunto ('el rey... y aquella nación').
- source_word: אֶרֶץ כַּשְׂדִּים
  english_pob_choice: the land of the Chaldeans
  chosen_spanish: la tierra de los caldeos
  alternatives_spanish:
  - la tierra de Babilonia
  - el país de los caldeos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo-histórico 'caldeos', como en la decisión inglesa, en vez de nivelarlo a 'babilonios'. 'Tierra' es la forma natural para אֶרֶץ.
- source_word: וְשַׂמְתִּי אֹתוֹ
  english_pob_choice: and I will make it
  chosen_spanish: y la convertiré
  alternatives_spanish:
  - y la haré
  - y la pondré
  lexicon: HALOT
  rationale: שׂים + objeto + ל indica convertir algo en un estado/condición. En español, 'la convertiré' expresa mejor ese cambio de estado que un calco como 'la haré'.
- source_word: לְשִׁמְמֹת עוֹלָם
  english_pob_choice: an everlasting desolation
  chosen_spanish: desolaciones perpetuas
  alternatives_spanish:
  - desolación perpetua
  - ruinas perpetuas
  lexicon: HALOT
  rationale: El plural hebreo puede funcionar idiomáticamente como intensivo/abstracto. Se conserva el plural 'desolaciones' para reflejar mejor el hebreo, y 'perpetuas' comunica עוֹלָם como duración indefinida.
theological_decisions:
- issue: Renderización del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה directamente. El proyecto pide 'Yahvé' como forma principal en español, preservando el nombre del pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נְאֻם יְהוָה
  english_pob_reading: oracle of Yahweh
  chosen_spanish_reading: oráculo de Yahvé
  alternative_spanish_readings:
  - declaración de Yahvé
  - dice Yahvé
  rationale: La fórmula profética conserva una función autoritativa y formal. 'Oráculo' expresa mejor el sustantivo profético נְאֻם que una simple verba declarativa.
  doctrine_reference: 'DOCTRINE.md: Prophetic formulae — נְאֻם'
- issue: Referente de אֹתוֹ
  english_pob_reading: The pronoun refers primarily to 'the land of the Chaldeans.'
  chosen_spanish_reading: El pronombre se refiere principalmente a 'la tierra de los caldeos'.
  alternative_spanish_readings:
  - Se refiere colectivamente al rey, la nación y la tierra como un solo objeto de juicio.
  rationale: El antecedente singular más cercano es 'tierra', y el resultado final ('desolaciones perpetuas') describe muy bien a la tierra convertida en ruina. La lectura colectiva sigue siendo posible, pero la referencia territorial es la más fundada textualmente.
  doctrine_reference: 'Gramática del hebreo bíblico: concordancia pronominal y antecedente singular más cercano'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje permanece estable en la última pasada de revisión, sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'oráculo de Yahvé' para נְאֻם יְהוָה como fórmula profética formal.
  - Se traduce עוון como 'iniquidad' para respetar el valor moral-jurídico del término.
  - Se conserva 'caldeos' en lugar de 'babilonios' para seguir la decisión léxica documentada en el expediente inglés.
  - La nota [b] se ancla en 'desolaciones perpetuas' para explicar la relación entre el plural hebreo y la opción española.
