    reason: lexical_alternative
  - marker: b
    text: O «pinchazos en sus ojos» para «púas en sus ojos». El sustantivo hebreo es raro y denota algo agudo que perfora.
    reason: lexical_alternative
  - marker: c
    text: O «espinas en sus costados» / «garfios en sus costados». Las dos imágenes describen una aflicción persistente y dolorosa causada por los habitantes que queden.
    reason: lexical_alternative
  - marker: d
    text: O «los afligirán» o «los oprimirán». El verbo hebreo puede abarcar una gama de aflicción hostil.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para un español más natural y fiel al causativo hebreo ('dejen quedar'), se restablece mejor la distinción entre las dos metáforas punzantes del texto fuente ('púas' / 'espinas'), y se añaden las notas léxicas significativas que el audit trail inglés preservó para las imágenes y el verbo final. Se mantiene 'sobre la tierra' para reflejar el matiz de עַל, tal como decidió el POB inglés.
