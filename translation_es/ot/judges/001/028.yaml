review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: cláusula temporal («Y cuando»), sentido ingresivo de חָזַק («se fortaleció»), singular colectivo הַכְּנַעֲנִי vertido idiomáticamente en plural («los cananeos»), coerción de לָמַס («trabajo forzado»), y la negación enfática de וְהוֹרֵישׁ לֹא הוֹרִישׁוֹ («no los expulsó por completo»). Sin embargo, hay un desajuste gramatical importante: el sujeto singular «Israel» exige «expulsó», pero el texto tiene el antecedente plural implícito del inglés; conviene además explicitar mejor la coerción con un verbo más idiomático en español bíblico moderno.'
  spanish_quality_summary: El español es claro y legible, pero «puso a los cananeos a trabajo forzado» suena algo calcado y menos natural que «sometió a los cananeos a trabajos forzados». También hay una inconsistencia entre el sujeto singular «Israel» y el pronombre verbal/objetal en la segunda cláusula, que debe mantenerse en singular verbal. Las notas son útiles, pero la nota b contiene comillas sobrantes y una alternativa («trabajo tributario») que puede sonar demasiado suavizante si no se matiza.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. La decisión clave לָמַס debe conservar fuerza coercitiva; «trabajos forzados» o «labor forzada» alinean mejor con la justificación inglesa que opciones como «tributo». «Los cananeos» respeta bien el singular colectivo hebreo en español.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «puso a los cananeos a trabajo forzado»'
    rationale: Aunque comprensible, suena calcada del inglés. En español natural y digno, «sometió a los cananeos a trabajos forzados» expresa mejor la idea de imponer labor compulsiva.
  - severity: high
    issue: Necesidad de ajuste sintáctico para mantener la referencia y fluidez
    rationale: Con sujeto singular «Israel», la estructura mejora si se mantiene el mismo sujeto expreso o implícito con un verbo singular claro. La redacción revisada evita cualquier tropiezo de concordancia y suena más idiomática.
  - severity: low
    issue: Nota b mejorable en estilo y precisión
    rationale: Las comillas iniciales sobrantes y la alternativa «trabajo tributario» pueden leerse como atenuación indebida. Conviene presentar alternativas con mayor claridad y subrayar que se trata de labor impuesta.
  revised_spanish_text: Y cuando Israel se fortaleció, sometió a los cananeos[a] a trabajos forzados[b], pero no los expulsó por completo.
