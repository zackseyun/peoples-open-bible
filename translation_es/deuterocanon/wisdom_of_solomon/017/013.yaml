translation:
  language: es
  text: Pero la expectativa[a], debilitada en su interior, considera mayor la ignorancia de la causa que trae el tormento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «considera peor no conocer la causa del tormento». El griego dice literalmente que la expectativa «cuenta la ignorancia de la causa que trae el tormento como mayor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνδοθεν
  english_pob_choice: within
  chosen_spanish: dentro
  alternatives_spanish:
  - en lo interior
  - interiormente
  lexicon: LSJ
  rationale: El griego indica una condición o fuente interna; «dentro» conserva esa imagen de interioridad sin sonar forzado en español.
- source_word: ἥττων
  english_pob_choice: weaker
  chosen_spanish: más débil
  alternatives_spanish:
  - más frágil
  - inferior
  lexicon: LSJ
  rationale: El comparativo expresa disminución o debilitamiento. «Más débil» es natural en español y mantiene el sentido psicológico del contexto.
- source_word: προσδοκία
  english_pob_choice: expectation
  chosen_spanish: expectativa
  alternatives_spanish:
  - expectación
  - anticipación
  lexicon: LSJ
  rationale: El sustantivo puede referirse a la expectativa o anticipación mental. «Expectativa» es claro y fiel, y funciona bien en español bíblico moderno.
- source_word: πλείονα λογίζεται
  english_pob_choice: reckons ... to be greater
  chosen_spanish: considera mayor
  alternatives_spanish:
  - estima mayor
  - reckona como mayor
  lexicon: LSJ
  rationale: El verbo λογίζεται implica considerar, estimar o contar. «Considera mayor» comunica el juicio mental sin perder la estructura comparativa del griego.
- source_word: ἄγνοιαν
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - desconocimiento
  - falta de saber
  lexicon: LSJ
  rationale: El término significa falta de conocimiento; «ignorancia» es la equivalencia más directa y concisa.
- source_word: τῆς παρεχούσης τὴν βάσανον αἰτίας
  english_pob_choice: of the cause that brings the torment
  chosen_spanish: de la causa que trae el tormento
  alternatives_spanish:
  - de la causa que produce el tormento
  - de la causa que ocasiona el tormento
  lexicon: LSJ
  rationale: La expresión participial califica a «causa» y βάσανος expresa tormento o aflicción intensa. «Trae el tormento» preserva el vínculo causal y la fuerza del término sin suavizarlo.
theological_decisions:
- issue: Sentido de βάσανος
  english_pob_reading: torment
  chosen_spanish_reading: tormento
  alternative_spanish_readings:
  - tortura
  - aflicción
  rationale: Aquí βάσανος designa sufrimiento intenso; «tormento» mantiene la dureza del término. «Tortura» sería posible, pero en español puede sonar demasiado técnico o físico en este contexto.
  doctrine_reference: No aplica; decisión léxica contextual.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB, que afinó ἔνδοθεν como «within» y λογίζεται como «reckons ... to be greater». La versión española adopta esa misma línea semántica con una formulación natural: «dentro» y «considera mayor».'
  spanish_consistency_notes:
  - Se mantuvo «tormento» para βάσανος, coherente con la fuerza del griego y con la decisión inglesa auditada.
  - Se usó «expectativa» para προσδοκία, evitando un giro más interpretativo como «temor» o «aprehensión» que no está explícito en el texto.
  - La nota de pie conserva la alternativa literal documentada por el inglés POB para reflejar la tensión entre el sentido idiomático y la estructura griega.
