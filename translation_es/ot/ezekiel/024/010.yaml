review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia imperativa y la imagen culinaria del hebreo: aumentar la leña, encender el fuego, cocer la carne, hervir la preparación y dejar que los huesos sufran el calor intenso. Sin embargo, ''Apresta mucha leña'' no representa con suficiente fidelidad הַרְבֵּה הָעֵצִים, que pide amontonar/acumular la leña, no solo prepararla ni añadir ''mucha'' como objeto directo. Además, ''se quemen'' suaviza יֵחָרוּ frente al valor más fuerte de ''quedar chamuscados/carbonizados''.'
  spanish_quality_summary: El español es claro y legible, pero 'apresta' suena algo poco natural o literario en gran parte del español latinoamericano e introduce un matiz de preparación más que de acumulación. Una formulación como 'Amontona la leña' es más natural y más exacta. También conviene reforzar el cierre con 'que los huesos queden chamuscados' para reflejar mejor el resultado pasivo/intensivo del hebreo.
  glossary_alignment: No hay términos del glosario teológico principal en juego aquí. 'Carne' preserva correctamente la elección documentada para הַבָּשָׂר. 'Caldo' es una buena opción contextual para הַמֶּרְקָחָה, con notas que conservan 'mezcla' y 'guiso' como alternativas.
  issues:
  - severity: medium
    issue: הַרְבֵּה הָעֵצִים se tradujo como 'Apresta mucha leña'
    rationale: El hebreo imperativo con 'la leña' expresa acumular/amontonar la madera para el fuego. 'Aprestar' significa preparar/disponer y no refleja tan bien la imagen concreta de 'pile up/heap up' documentada en el audit trail.
  - severity: medium
    issue: יֵחָרוּ se tradujo como 'se quemen'
    rationale: Aunque posible, 'se quemen' es más genérico que el valor de quedar chamuscados/carbonizados por calor intenso. El inglés auditado eligió 'be charred' por esa fuerza resultativa; el español puede reflejarlo mejor sin sonar técnico excesivo.
  - severity: low
    issue: La nota c no corresponde bien al anclaje en el texto
    rationale: La nota está anclada a 'caldo', pero el alternativo inglés también implica la acción ('boil the broth' / 'prepare the mixture' / 'boil the stew'). En español puede mantenerse anclada al sustantivo, pero conviene formularla con mayor claridad como alternativas de la expresión completa.
  revised_spanish_text: Amontona la leña[a], enciende el fuego, cuece bien la carne[b], y hierve el caldo[c]; y que los huesos queden chamuscados[d].
