  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y la auditoría inglesa en la estructura general: persona afectada por una enfermedad cutánea, ropa rasgada, cabeza desarreglada, cobertura del área del bigote/labio superior, y proclamación pública de impureza ritual. Sin embargo, la nota al pie está anclada erróneamente en «la enfermedad de la piel[a]» cuando en realidad corresponde a «cubrirá su bigote/labio superior».'
  spanish_quality_summary: El español es mayormente claro y digno, pero hay un problema de legibilidad y precisión editorial por la ubicación incorrecta de la nota. Además, «despeinada» aplicado a «cabeza» suena algo coloquial e impreciso; una formulación centrada en el cabello o en el estado desarreglado resulta más natural y fiel. El resto del texto es comprensible y adecuado.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La elección de «impuro» para טָמֵא es defendible en español para el sentido ritual. «Infección» reproduce la decisión inglesa documentada, aunque sigue siendo una opción algo moderna; no exige adjudicación adicional aquí. La alternativa léxica sobre «bigote/labio superior» debe conservarse en nota, pero anclada correctamente.
  issues:
  - severity: high
    issue: Nota al pie anclada en la frase equivocada
    rationale: La nota [a] explica el hebreo וְעַל שָׂפָם יַעְטֶה («cubrirá su bigote/labio superior»), pero en el borrador aparece unida a «la enfermedad de la piel». Esto desinforma al lector y rompe la correspondencia requerida entre nota y palabra/frase explicada.
  - severity: medium
    issue: «su cabeza quedará despeinada» suena algo torpe en español
    rationale: El hebreo פָרוּעַ describe cabello desarreglado/suelto o un aspecto descuidado, no literalmente una ‘cabeza despeinada’. «llevará el cabello desarreglado» o similar comunica mejor el sentido en español natural.
  - severity: low
    issue: «vestidos» es aceptable, pero «ropas» sería más natural en registro actual
    rationale: No es un error; solo una cuestión de fluidez. «Vestidos» puede sonar algo más rígido o ambiguo en español contemporáneo.
  revised_spanish_text: 'En cuanto al que tiene la enfermedad de la piel, en quien está la infección, sus vestidos serán rasgados, llevará el cabello desarreglado, cubrirá su bigote[a], y clamará: «¡Impuro, impuro!»'
  revised_footnotes:
  - marker: a
    text: O «cubrirá su labio superior». La expresión hebrea se refiere a cubrir el área del labio o del bigote como señal de luto y advertencia pública.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a «bigote», que es donde realmente existe la alternativa léxica preservada por la POB inglesa. También se mejora «su cabeza quedará despeinada» a «llevará el cabello desarreglado», que suena más natural en español y refleja mejor el sentido de פָרוּעַ como cabello descuidado o suelto. No se requieren cambios doctrinales ni una relectura de fondo.
