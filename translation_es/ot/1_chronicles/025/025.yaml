translation:
  language: es
  text: Para el decimoctavo[a], Hanani; sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: “Para el decimoctavo, Hanani, sus hijos y sus hermanos, doce”. La palabra “lote” no aparece en este versículo, pero está implícita por el patrón repetido del capítulo.'
