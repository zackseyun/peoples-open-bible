revisions:
- from: Como el aspecto del arco iris[a] que aparece en la nube en un día de lluvia, así era el aspecto del resplandor alrededor. Este era el aspecto de la semejanza de la gloria de Yahvé[c]. Cuando lo vi, caí sobre mi rostro, y oí la voz de uno que hablaba[d].
  to: Como el aspecto del arco iris[a] que aparece en la nube en un día de lluvia, así era el aspecto del resplandor que lo rodeaba. Este era el aspecto de la semejanza de la gloria de Yahvé[c]. Cuando lo vi, caí rostro en tierra, y oí la voz de uno que hablaba[d].
  rationale: 'Se hicieron dos ajustes menores para mejorar la fidelidad idiomática del español sin alterar el sentido: ''resplandor que lo rodeaba'' expresa mejor la idea envolvente de סָבִיב, y ''caí rostro en tierra'' evita un calco poco natural de ''caí sobre mi rostro'' mientras preserva la postración reverente del hebreo.'
