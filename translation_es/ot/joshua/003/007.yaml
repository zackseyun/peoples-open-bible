translation:
  language: es
  text: 'Y Yahvé dijo a Josué[a]: “Hoy comenzaré a engrandecerte a los ojos de todo Israel, para que sepan que, así como estuve con Moisés, estaré contigo.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “este día comienzo a engrandecerte ante todo Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. Siguiendo la línea auditada del POB en inglés, se conserva el nombre con la forma española establecida 'Yahvé', en lugar de sustituirlo por un título litúrgico.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: Es el verbo narrativo estándar para introducir discurso directo. 'Dijo' reproduce con naturalidad el wayyiqtol בלי añadir matices no presentes en el hebreo.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: La expresión enfatiza inmediatez temporal; 'Hoy' conserva ese énfasis con español moderno y natural.
- source_word: אָחֵל
  english_pob_choice: I will begin
  chosen_spanish: comenzaré
  alternatives_spanish:
  - empezaré
  - voy a comenzar
  lexicon: HALOT
  rationale: 'El valor idiomático es ''begin''. En español, el futuro simple comunica bien la declaración divina y mantiene la fuerza prospectiva: ''comenzaré''.'
- source_word: גַּדֶּלְךָ
  english_pob_choice: to make you great
  chosen_spanish: engrandecerte
  alternatives_spanish:
  - hacerte grande
  - magnificárt
  - elevarte
  lexicon: HALOT
  rationale: גדל en este contexto expresa elevar públicamente el rango o la honra de Josué. 'Engrandecerte' preserva esa idea de exaltar su estatus ante Israel sin sonar mecánico.
- source_word: בְּעֵינֵי כָּל יִשְׂרָאֵל
  english_pob_choice: in the sight of all Israel
  chosen_spanish: a los ojos de todo Israel
  alternatives_spanish:
  - ante todo Israel
  - en presencia de todo Israel
  lexicon: HALOT
  rationale: La metáfora de 'ojos' en hebreo apunta a percepción pública. 'A los ojos de todo Israel' conserva la imagen idiomática y el sentido de reconocimiento visible.
- source_word: אֲשֶׁר יֵדְעוּן
  english_pob_choice: so that they may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - a fin de que sepan
  - para que conozcan
  lexicon: HALOT
  rationale: La cláusula expresa resultado o propósito. 'Para que sepan' es una equivalencia natural que mantiene la relación causal-intencional del original.
- source_word: כַּאֲשֶׁר הָיִיתִי עִם מֹשֶׁה
  english_pob_choice: just as I was with Moses
  chosen_spanish: así como estuve con Moisés
  alternatives_spanish:
  - como estuve con Moisés
  - tal como estuve con Moisés
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marca comparación explícita. 'Así como' reproduce bien la correlación entre la experiencia de Moisés y la promesa a Josué.
- source_word: אֶהְיֶה עִמָּךְ
  english_pob_choice: I will be with you
  chosen_spanish: estaré contigo
  alternatives_spanish:
  - seré contigo
  - yo estaré contigo
  lexicon: HALOT
  rationale: El hebreo promete presencia continua de Dios. En español, 'estaré contigo' es la forma más natural y fiel para esa promesa de acompañamiento.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión teológica y textual del POB es preservar el nombre propio divino en lugar de ocultarlo tras un título. 'Yahvé' mantiene esa transparencia para lectores de español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Coincide con la lectura auditada del POB inglés y no requiere revisión adicional; se mantiene la equivalencia óptima con conservación del nombre divino y del matiz idiomático de גדל en contexto público.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Josué'' y ''Moisés'' siguen las formas españolas comunes y transparentes.'
  - Se conserva la imagen 'a los ojos de' para reflejar el hebraísmo sin forzar una paráfrasis excesiva.
  - La nota al pie recoge la alternativa lexical documentada en el POB inglés para 'I will begin to make you great'.
