review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: la sangre como señal, la cláusula temporal ''cuando vea'', el mantenimiento de ''pasaré sobre ustedes'' con nota alternativa, y la referencia al golpe divino sobre Egipto. Sin embargo, hay dos desajustes de fidelidad/forma: ''en las casas'' atenúa el valor espacial de עַל הַבָּתִּים (''sobre/en los postes de las casas'' más que simplemente ''en las casas''), y ''no habrá entre ustedes plaga'' se aparta del ajuste final del POB inglés, que reflejó mejor בָכֶם y la sintaxis con ''upon you for destruction''.'
  spanish_quality_summary: El español es claro y eclesialmente legible. No obstante, 'pasaré sobre ustedes' suena algo rígido pero es defendible por la conexión con Pascua; la nota lo compensa bien. La frase 'no habrá entre ustedes plaga para destrucción' resulta menos natural y menos precisa que una formulación como 'no habrá sobre ustedes plaga para destrucción'. También conviene evitar 'en las casas' porque sugiere interioridad más que marcación visible sobre la vivienda.
  glossary_alignment: No hay términos del glosario principal en conflicto. Se preserva correctamente la resonancia de פסח con 'pasaré sobre'. La decisión de no introducir 'destructor' en el texto principal concuerda con la rationale documentada. No hay ocurrencias de Yahvé/Mesías/etc. en este versículo.
  issues:
  - severity: medium
    issue: '`עַל הַבָּתִּים` se tradujo como ''en las casas'''
    rationale: El hebreo usa עַל, y el contexto pascual trata de sangre aplicada a la estructura de la casa. 'En las casas' puede leerse como ubicación interior o mera asociación, mientras 'sobre las casas' o 'en las casas ... [allí]' conserva mejor la imagen espacial del original.
  - severity: medium
    issue: '`וְלֹא יִהְיֶה בָכֶם נֶגֶף` se vertió ''no habrá entre ustedes plaga'''
    rationale: Aunque 'entre ustedes' es posible, el POB auditado terminó con 'upon you' para reflejar mejor בָכֶם en esta cláusula. En español, 'sobre ustedes' transmite mejor que la plaga no caerá sobre ellos, no solo que no estará en su medio.
  - severity: low
    issue: La nota [a] está clasificada como `alternative_reading` en vez de reflejar mejor una alternativa léxica
    rationale: No afecta el texto principal, pero la razón documentada en el audit trail es una alternativa léxica/semántica de פסח ('los libraré', 'los protegeré').
  revised_spanish_text: Y la sangre les servirá de señal sobre las casas donde estén ustedes. Cuando vea la sangre, pasaré sobre ustedes[a], y no habrá sobre ustedes plaga para destrucción cuando hiera la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: 'O: «los libraré» o «los protegeré».'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'en las casas' a 'sobre las casas' para reflejar mejor עַל y el cuadro espacial de la sangre aplicada a la vivienda. Se cambia 'entre ustedes' por 'sobre ustedes' para seguir más de cerca el hebreo בָכֶם y el ajuste final del POB inglés. Se conserva 'pasaré sobre ustedes' por su valor canónico y léxico, manteniendo la nota alternativa ya documentada.
