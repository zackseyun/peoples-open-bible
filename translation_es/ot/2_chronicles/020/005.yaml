translation:
  language: es
  text: Y Josafat se puso en pie en la asamblea de Judá y Jerusalén, en la casa de Yahvé, delante del nuevo atrio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el nuevo patio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso en pie
  alternatives_spanish:
  - estuvo de pie
  - se levantó
  lexicon: HALOT
  rationale: El verbo narrativo expresa una acción simple de ponerse de pie o permanecer en posición erguida. "Se puso en pie" conserva la naturalidad del español y la fuerza escénica del original sin añadir matices no exigidos.
- source_word: בִּקְהַל
  english_pob_choice: in the assembly of
  chosen_spanish: en la asamblea de
  alternatives_spanish:
  - en la congregación de
  - ante la asamblea de
  lexicon: HALOT
  rationale: קהל designa un grupo reunido. "Asamblea" comunica bien el sentido de reunión pública y evita un tecnicismo eclesiástico más cargado que "congregación".
- source_word: יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: Judá y Jerusalén
  alternatives_spanish:
  - la gente de Judá y Jerusalén
  lexicon: HALOT
  rationale: Se conservan los dos nombres propios como en el hebreo y en el POB inglés. El texto identifica a la comunidad reunida, y el español puede mantener la coordinación sin expandirla.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: בית con el nombre divino se mantiene como "casa" para preservar el giro hebreo. "Casa de Yahvé" sigue de cerca la fuente y evita sustituir el lexema por "templo" sin necesidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: "Yahvé" como forma principal en español. Esto preserva el nombre propio del pacto en lugar de ocultarlo tras un título.'
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  lexicon: HALOT
  rationale: En este contexto espacial, "delante de" comunica con naturalidad la posición física respecto del atrio. "Ante" también es posible, pero "delante de" resulta más transparente para el lector general.
- source_word: הֶחָצֵר הַחֲדָשָׁה
  english_pob_choice: the new court
  chosen_spanish: el nuevo atrio
  alternatives_spanish:
  - la nueva corte
  - el nuevo patio
  lexicon: HALOT
  rationale: חצר en el ámbito del templo puede referirse al atrio o al patio; aquí, por el contexto cultual, "atrio" mantiene mejor el referente arquitectónico-templario en español. Se conserva "nuevo" sin suavizar la descripción.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El pasaje contiene explícitamente el Tetragrámaton. La práctica del POB en español es representarlo con "Yahvé", no con una sustitución titular como "SEÑOR". Esto mantiene visible el nombre propio revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: El texto inglés POB vigente usa 'stood', 'assembly', 'house of Yahweh' y 'new court', con una única nota alternativa para 'new courtyard'. No se registran revisiones aplicadas; el consenso de auditoría es de alta concordancia, por lo que la versión española sigue de cerca esas decisiones y solo ajusta la sintaxis al español natural.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente con la convención del proyecto para el Tetragrámaton.
  - '"Asamblea" y no "congregación" para conservar el registro público del contexto.'
  - '"Atrio" se usa por coherencia con el ámbito del templo; la nota conserva la alternativa semántica "corte".'
