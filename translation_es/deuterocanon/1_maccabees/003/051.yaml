translation:
  language: es
  text: Y tus cosas sagradas[a] han sido pisoteadas y profanadas, y tus sacerdotes están en duelo y humillación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tu santuario’ o ‘tu lugar santo’. El griego está en plural, literalmente ‘tus cosas santas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἅγιά
  english_pob_choice: your holy things
  chosen_spanish: tus cosas santas
  alternatives_spanish:
  - tu santuario
  - tu lugar santo
  - tus cosas santas
  lexicon: LSJ
  rationale: El griego neutro plural es literalmente ‘las cosas santas’ y puede abarcar tanto objetos consagrados como el ámbito sagrado. ‘Tus cosas santas’ conserva el plural sin restringir indebidamente el sentido a un solo edificio o recinto. ‘Santuario’ queda como alternativa contextual, pero estrecha más de lo que el griego exige.
- source_word: κατεπεπάτηται
  english_pob_choice: have been trampled down
  chosen_spanish: han sido pisoteadas
  alternatives_spanish:
  - han sido pisoteadas
  - han sido holladas
  - han sido aplastadas bajo los pies
  lexicon: LSJ
  rationale: 'El perfecto pasivo expresa un estado resultante: algo quedó sometido al pisoteo. ‘Han sido pisoteadas’ reproduce la imagen violenta de ser pisoteado y suena natural en español contemporáneo.'
- source_word: βεβήλωται
  english_pob_choice: profaned
  chosen_spanish: profanadas
  alternatives_spanish:
  - profanadas
  - contaminadas ritualmente
  - desecradas
  lexicon: LSJ
  rationale: ‘Profanar’ refleja bien la idea de volver común lo sagrado y mantiene el paralelismo con ‘cosas santas’. ‘Contaminadas ritualmente’ sería demasiado técnico y ‘desecradas’ es menos natural en español bíblico actual.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes
  - sacerdotes del templo
  - clero
  lexicon: LSJ
  rationale: ‘Sacerdotes’ es la correspondencia normal en español para el grupo clerical del templo. ‘Clero’ es demasiado genérico y ‘sacerdotes del templo’ añade una aclaración no presente en el griego.
- source_word: ἐν πένθει
  english_pob_choice: in mourning
  chosen_spanish: en duelo
  alternatives_spanish:
  - en duelo
  - de luto
  - en luto
  lexicon: LSJ
  rationale: La frase indica estado o condición. ‘En duelo’ es idiomático en español y conserva el matiz de lamento público y aflicción; ‘de luto’ también sería posible, pero suena algo menos directo como estado.
- source_word: ταπεινώσει
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - humillación
  - abatimiento
  - bajeza
  lexicon: LSJ
  rationale: El sustantivo puede expresar abatimiento, humillación o condición humillada. ‘Humillación’ recoge mejor la vergüenza pública y la opresión implícitas en el contexto, y funciona bien junto a ‘en duelo’.
theological_decisions:
- issue: Alcance de τὰ ἅγιά σου
  english_pob_reading: broad reference to the sacred things/holy precincts belonging to God, rendered without narrowing to a single sanctuary structure
  chosen_spanish_reading: referencia amplia a las cosas santas pertenecientes a Dios, sin reducirla a un solo edificio o recinto
  alternative_spanish_readings:
  - tu santuario
  - tu lugar santo
  rationale: El plural griego es más amplio que un singular arquitectónico. ‘Tus cosas santas’ preserva ese alcance y evita importar una interpretación más estrecha de la que el texto exige. Las alternativas se mantienen solo como posibilidades contextuales.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios y el acuerdo con la evaluación anterior fue alto.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo del griego: primero la profanación de lo santo y luego la condición de los sacerdotes.'
  - Se prefirió ‘tus cosas santas’ para respetar el plural neutro de τὰ ἅγιά.
  - ‘En duelo y humillación’ refleja el estado descrito por las dos frases preposicionales griegas sin añadir detalles ausentes en el texto.
