translation:
  language: es
  text: Mi amado es para mí un racimo de flores de henna[a] en los viñedos de En-guedi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O una identificación tradicional antigua equivalente a «camphire» en inglés; el término hebreo כֹּפֶר probablemente se refiere a la planta de henna, apreciada por sus flores fragantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁכֹּל
  english_pob_choice: a cluster
  chosen_spanish: un racimo
  alternatives_spanish:
  - un manojo
  - un racimo de uvas
  - un ramillete
  lexicon: HALOT
  rationale: El hebreo אֶשְׁכֹּל denota un conjunto compacto o racimo. En español, «racimo» comunica de forma natural la imagen agrupada sin forzar la referencia a uvas, que aquí no es explícita.
- source_word: הַכֹּפֶר
  english_pob_choice: henna blossoms
  chosen_spanish: flores de henna
  alternatives_spanish:
  - camfor
  - henna
  - ciprés
  lexicon: HALOT
  rationale: La decisión inglesa entiende כֹּפֶר como la planta de henna, apreciada por su fragancia. En español, «flores de henna» conserva la imagen floral y evita el término arcaico «camfor». «Henna» sola podría sonar demasiado general; añadir «flores» sigue la lectura poética del contexto.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi amante
  lexicon: HALOT
  rationale: דּוֹדִי en el Cantar designa al varón amado en un registro poético. «Mi amado» mantiene el tono elevado y evita la connotación más moderna de «mi amante».
- source_word: לִי
  english_pob_choice: is to me
  chosen_spanish: es para mí
  alternatives_spanish:
  - es a mí
  - me es
  lexicon: HALOT
  rationale: La relación expresada por לִי se vierte de manera idiomática en español con «es para mí», que conserva el sentido de valoración o referencia personal del hebreo.
- source_word: בְּכַרְמֵי
  english_pob_choice: in the vineyards
  chosen_spanish: en los viñedos
  alternatives_spanish:
  - entre los viñedos
  - en las viñas
  lexicon: HALOT
  rationale: El plural constructo de כֶּרֶם con ב se traduce de modo natural como «en los viñedos». «Viñedos» reproduce bien la escena locativa y poética.
- source_word: עֵין גֶּדִי
  english_pob_choice: En-gedi
  chosen_spanish: En-gedi
  alternatives_spanish:
  - Ein-gedi
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y se translitera. Se conserva la forma ampliamente reconocible «En-gedi».
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió revisiones sustantivas; se mantuvo la misma lectura básica del hebreo: racimo + henna + relación afectiva + localización en En-gedi. La versión española sigue esa decisión, ajustando solo la idiomaticidad natural del español.'
  spanish_consistency_notes:
  - Se mantuvo «mi amado» para דּוֹדִי y no «mi amante» para preservar el tono poético elevado.
  - «En-gedi» se deja sin traducir por ser topónimo.
  - La nota al pie conserva la alternativa tradicional «camfor» porque el audit trail la documenta como variante histórica relevante.
