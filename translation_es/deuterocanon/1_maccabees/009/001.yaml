translation:
  language: es
  text: Y Demetrio oyó que Nicanor y sus fuerzas habían hecho guerra, y envió por segunda vez a Báquides y a Alcimo a la tierra de Judá, y el ala derecha[a] con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «el cuerno derecho»; en uso militar, la expresión se refiere al ala o flanco derecho del ejército.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - supo
  lexicon: BDAG
  rationale: Ὦír expresa la recepción de una noticia en un relato histórico sin añadir matices interpretativos. 'Oyó' es natural en español y conserva la simplicidad del verbo griego.
- source_word: ἐποίησεν ... πόλεμον
  english_pob_choice: had made war
  chosen_spanish: habían hecho guerra
  alternatives_spanish:
  - habían guerreado
  - habían hecho la guerra
  lexicon: LSJ
  rationale: La construcción griega es literalmente 'hacer guerra'. 'Habían hecho guerra' mantiene esa fuerza idiomática en un español readable sin convertirla en una paráfrasis más libre.
- source_word: αἱ δυνάμεις αὐτοῦ
  english_pob_choice: his forces
  chosen_spanish: sus fuerzas
  alternatives_spanish:
  - su ejército
  - sus tropas
  lexicon: LSJ
  rationale: δυνάμεις designa fuerzas militares en sentido amplio. 'Sus fuerzas' preserva esa amplitud mejor que 'su ejército', que podría sonar más técnico o más cerrado.
- source_word: προσέθετο ... ἀποστεῖλαι
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - procedió a enviar
  lexicon: BDAG
  rationale: El griego con infinitivo expresa acción renovada o añadida, pero la revisión del POB inglés simplificó a 'sent' para una narración más directa. 'Envió' sigue esa decisión y es el equivalente natural en español.
- source_word: ἐκ δευτέρου
  english_pob_choice: a second time
  chosen_spanish: una segunda vez
  alternatives_spanish:
  - por segunda vez
  - de nuevo
  lexicon: LSJ
  rationale: '''Una segunda vez'' preserva el valor numérico explícito de la expresión griega y corresponde de cerca al inglés auditado.'
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - la región de Judá
  - la tierra de Judea
  lexicon: LSJ
  rationale: El griego dice literalmente 'tierra de Judá'. 'La tierra de Judá' conserva esa formulación y evita sustituirla por el nombre regional posterior 'Judea' sin necesidad textual.
- source_word: τὸ δεξιὸν κέρας
  english_pob_choice: the right wing
  chosen_spanish: el ala derecha
  alternatives_spanish:
  - el flanco derecho
  - el cuerno derecho
  lexicon: LSJ
  rationale: En contexto militar, κέρας se usa por extensión para una ala o flanco del ejército. 'El ala derecha' es la equivalencia española más natural y fiel al uso militar.
translation_notes:
  revision_awareness: Se tuvo en cuenta el auditable cambio del inglés POB desde 'proceeded to send' a 'sent', manteniendo en español una formulación directa ('envió') acorde con la revisión final y con el griego προσέθετο ... ἀποστεῖλαι. También se preservó la equivalencia militar de τὸ δεξιὸν κέρας mediante una nota literal para no perder la tensión léxica entre 'cuerno' y 'ala'.
  spanish_consistency_notes:
  - Se usa 'Judá' para reflejar γῆν Ἰούδα literalmente, en coherencia con la preferencia POB por no sustituir el giro geográfico por un nombre regional posterior cuando el texto no lo exige.
  - Se evita 'Cristo/SEÑOR' porque no hay léxico cristológico o divino en este versículo.
  - '''Fuerzas'' y ''ala derecha'' conservan el registro militar del pasaje sin sobreespecificar la unidad táctica.'
