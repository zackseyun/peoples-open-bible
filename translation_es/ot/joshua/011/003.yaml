translation:
  language: es
  text: el cananeo en el oriente y en el occidente[a], y el amorreo, el hitita, el ferezeo y el jebuseo en la serranía, y el heveo debajo de Hermón, en la tierra de Mizpá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y del mar»; aquí «occidente» refleja el uso geográfico probable del término en el contexto de Canaán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanite
  chosen_spanish: el cananeo
  alternatives_spanish:
  - los cananeos
  lexicon: HALOT
  rationale: El singular con artículo en hebreo funciona de manera colectiva para un pueblo. En español, el singular colectivo "el cananeo" conserva esa fuerza y sigue de cerca la decisión auditada del POB en inglés.
- source_word: מִמִּזְרָח
  english_pob_choice: in the east
  chosen_spanish: en el oriente
  alternatives_spanish:
  - desde el oriente
  - al oriente
  lexicon: HALOT
  rationale: Aunque la preposición hebrea literalmente es "de/desde", aquí expresa ubicación o extensión geográfica. "En el oriente" comunica bien el contraste direccional con el occidente sin sonar forzado.
- source_word: וּמִיָּם
  english_pob_choice: and in the west
  chosen_spanish: y en el occidente
  alternatives_spanish:
  - y desde el mar
  - y junto al mar
  lexicon: HALOT
  rationale: El hebreo dice literalmente "y del mar", pero en la geografía de Canaán el mar funciona como marcador del oeste. El POB inglés ya optó por el sentido direccional; en español "occidente" preserva esa equivalencia con dignidad y claridad.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorite
  chosen_spanish: el amorreo
  alternatives_spanish:
  - los amorreos
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo, como en el inglés POB, para reflejar la forma hebrea con artículo y el valor de grupo étnico.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - los hititas
  lexicon: HALOT
  rationale: Se conserva el singular colectivo por fidelidad al hebreo y en paralelo con la serie de etnónimos del versículo.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzite
  chosen_spanish: el ferezeo
  alternatives_spanish:
  - los ferezeos
  lexicon: HALOT
  rationale: Se traduce con el etnónimo tradicional en español bíblico, manteniendo el singular colectivo como en el hebreo y en el inglés auditado.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusite
  chosen_spanish: el jebuseo
  alternatives_spanish:
  - los jebuseos
  lexicon: HALOT
  rationale: Se conserva el singular colectivo y el etnónimo español estándar para reflejar la lista de pueblos con el menor desplazamiento semántico.
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la zona montañosa
  - en la serranía
  lexicon: HALOT
  rationale: En Josué, הָר suele referirse a la zona alta de la tierra, no necesariamente a "montañas" en sentido alpino. "Región montañosa" comunica bien el área geográfica y conserva el valor contextual auditado por el POB inglés.
- source_word: הַחִוִּי
  english_pob_choice: the Hivite
  chosen_spanish: el heveo
  alternatives_spanish:
  - los heveos
  lexicon: HALOT
  rationale: Se conserva el singular colectivo para mantener la correspondencia con la enumeración hebrea y con la estrategia del POB en inglés.
- source_word: תַּחַת חֶרְמוֹן
  english_pob_choice: below Hermon
  chosen_spanish: debajo del Hermón
  alternatives_spanish:
  - bajo el Hermón
  - al pie del Hermón
  - debajo del monte Hermón
  lexicon: HALOT
  rationale: תַּחַת expresa ubicación espacial inferior. "Debajo del Hermón" reproduce bien el sentido local sin añadir un elemento no explícito; se mantiene el nombre propio como topónimo conocido.
- source_word: בְּאֶרֶץ הַמִּצְפָּה
  english_pob_choice: in the land of Mizpah
  chosen_spanish: en la tierra de Mizpa
  alternatives_spanish:
  - en la región de Mizpa
  - en la tierra de la atalaya
  lexicon: HALOT
  rationale: אֶרֶץ indica territorio o tierra, no solo una ciudad. Se translitera el topónimo como Mizpa/Mizpá en lugar de traducirlo como "atalaya", siguiendo la decisión auditada del POB inglés de tratarlo como nombre de lugar.
translation_notes:
  revision_awareness: La versión inglesa auditada fue marcada como sin cambios necesarios en el último pase y con alta concordancia; la presente redacción española sigue esa lectura sin introducir variantes textuales ni reinterpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se conserva el patrón de etnónimos singulares colectivos para todos los pueblos enumerados.
  - Se traduce el marcador geográfico oriental/occidental de forma direccional, no literalmente marítima, porque el contexto lo exige.
  - '"Mizpa" se mantiene como topónimo, no como traducción semántica.'
  - La puntuación y el orden de la lista siguen de cerca el hebreo y el POB inglés.
