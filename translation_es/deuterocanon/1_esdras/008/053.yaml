base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/053.yaml
  text: For we had told the king that the strength of our Lord would be with those who seek him for every restoration[a][b].
  footnotes:
  - marker: a
    text: Or 'for all restoration'; the Greek phrase is unusual, and some interpreters take it more broadly as 'for success' or 'for a good outcome.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel at this point differs substantially, speaking of fasting and seeking God rather than repeating the report to the king. This translation follows the Greek text of 1 Esdras as the primary witness.
    reason: textual_variant
