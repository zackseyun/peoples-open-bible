translation:
  language: es
  text: Así, el reino de Josafat estuvo en paz[a], y su Dios le dio descanso por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y el reino de Josafat estuvo quieto, y su Dios le dio descanso por todas partes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁקֹט
  english_pob_choice: was at peace
  chosen_spanish: estuvo en paz
  alternatives_spanish:
  - estuvo quieto
  - estuvo tranquilo
  - tuvo descanso
  lexicon: HALOT
  rationale: El verbo שׁקט expresa estar quieto, sin perturbación o en paz. Con «el reino» como sujeto, «estuvo en paz» comunica con naturalidad el estado de ausencia de conflicto y conserva la fuerza semántica principal sin sonar mecánico.
- source_word: מַלְכוּת
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  - realidad
  lexicon: HALOT
  rationale: En este contexto histórico, מַלְכוּת se refiere al reino de Josafat. «Reino» es la equivalencia española más clara y usual, y conserva el alcance político-territorial del sustantivo.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: convención onomástica bíblica en español
  rationale: Se emplea la forma española tradicional y ampliamente reconocible «Josafat», que mantiene la identificación del personaje sin introducir una transliteración innecesariamente extraña al lector hispanohablante.
- source_word: וַיָּנַח
  english_pob_choice: gave him rest
  chosen_spanish: le dio descanso
  alternatives_spanish:
  - le concedió descanso
  - lo hizo descansar
  - le dio reposo
  lexicon: HALOT
  rationale: 'El הִפְעִיל de נוח es causativo: Dios hizo que Josafat tuviera descanso. «Le dio descanso» reproduce esa causalidad de forma natural en español y preserva la agencia divina del texto.'
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - el Dios de él
  lexicon: HALOT
  rationale: 'La forma pronominal indica posesión: «su Dios». En español no hace falta explicitar más; la relación personal queda clara y se conserva el sentido singular del referente divino.'
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: por todas partes
  alternatives_spanish:
  - alrededor
  - de todos lados
  - en derredor
  lexicon: HALOT
  rationale: La expresión marca extensión espacial total, en todas las direcciones. «Por todas partes» comunica bien la amplitud y la seguridad completa, con un español moderno y natural.
theological_decisions:
- issue: Relación entre la paz del reino y la acción divina
  english_pob_reading: 'The kingdom''s peace is attributed to God''s action: his God gave him rest all around.'
  chosen_spanish_reading: 'La paz del reino se presenta como resultado de la acción de Dios: su Dios le dio descanso por todas partes.'
  alternative_spanish_readings:
  - y su Dios le dio descanso por todas partes
  - porque su Dios le dio descanso por todas partes
  rationale: El hebreo enlaza las dos cláusulas con waw; el POB inglés explicitó la relación causal con ‘for’ en una etapa, pero la revisión volvió a una coordinación más directa. En español, «y» conserva la unión del hebreo, mientras que el contexto deja clara la implicación teológica sin añadir una causalidad no expresada de forma explícita en la sintaxis final base.
  doctrine_reference: Trasfondo sintáctico del hebreo; filosofía de equivalencia óptima del POB
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión que sustituyó un conector causal por una coordinación más literal y cambió la preposición espacial a una forma más natural. La versión española sigue esa línea revisada: mantiene la coordinación con «y» y vierte מִסָּבִיב con un giro idiomático («por todas partes») que conserva la totalidad espacial.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en su sentido singular referido al Dios de Josafat.
  - Se ha elegido «Josafat» como forma española estable del nombre propio.
  - «Le dio descanso» conserva el valor causativo del verbo hebreo sin forzar un calco sintáctico.
  - La nota al pie ofrece la alternativa léxica más cercana a «quieto», preservando la tensión semántica documentada por el POB inglés.
