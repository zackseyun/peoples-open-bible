translation:
  language: es
  text: Pero los habitantes de Gabaón[a] oyeron lo que Josué había hecho a Jericó y a Hai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y los habitantes de Gabaón oyeron lo que Josué había hecho a Jericó y a Hai».
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/יֹשְׁבֵי
  english_pob_choice: But the inhabitants of
  chosen_spanish: Pero los habitantes de
  alternatives_spanish:
  - Y los habitantes de
  - Entonces los habitantes de
  lexicon: HALOT
  rationale: יֹשְׁבֵי designa a los que habitan o residen en un lugar, por lo que «habitantes» comunica bien el sentido. El וְ inicial puede ser simple coordinación, pero en el flujo narrativo español «Pero» refleja mejor el giro contrastivo respecto del contexto previo, de manera análoga a la decisión inglesa.
- source_word: גִבְעוֹן
  english_pob_choice: Gibeon
  chosen_spanish: Gabaón
  alternatives_spanish:
  - Gibeón
  - Gabaón
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional y ampliamente reconocible «Gabaón», más natural para lectura eclesial en español que una transliteración inglesa directa. Mantiene la identificación del topónimo bíblico sin añadir sentido interpretativo.
- source_word: שָׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - llegaron a oír
  lexicon: HALOT
  rationale: El qal perfecto de שמע expresa aquí la recepción de información. «Oyeron» conserva el valor léxico básico y funciona con naturalidad en español narrativo.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: HALOT
  rationale: La secuencia marcador de objeto + relativo introduce el contenido oído. «Lo que» es la equivalencia española más natural y evita una estructura rígida como «aquello que».
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio de acción o realización. En español, el pluscuamperfecto «había hecho» refleja bien la anterioridad relativa al acto de oír, siguiendo la lógica temporal auditada en la versión inglesa.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. Se mantiene la forma tradicional y reconocible «Josué».
- source_word: לִֽ/ירִיחוֹ
  english_pob_choice: to Jericho
  chosen_spanish: a Jericó
  alternatives_spanish:
  - contra Jericó
  - en Jericó
  lexicon: HALOT
  rationale: La preposición ל con עשה en este contexto señala la acción dirigida hacia la ciudad. En español, «a Jericó» conserva la directividad sin sobreinterpretar con «contra».
- source_word: וְ/לָ/עָי
  english_pob_choice: and to Ai
  chosen_spanish: y a Hai
  alternatives_spanish:
  - y contra Hai
  - y a Ai
  lexicon: HALOT
  rationale: Se conserva el paralelismo con Jericó mediante «y a Hai». «Hai» es la forma castellana habitual del topónimo, y reproduce la referencia a la ciudad sin añadir matiz bélico no explicitado por el hebreo aquí.
theological_decisions:
- issue: Valor discursivo de la conjunción inicial וְ
  english_pob_reading: But
  chosen_spanish_reading: Pero
  alternative_spanish_readings:
  - Y
  - Entonces
  rationale: No se trata de una cuestión doctrinal sino de cohesión discursiva. El contraste narrativo con el contexto precedente se expresa mejor en español con «Pero», manteniendo la función de giro que la versión inglesa documenta.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: No se registran revisiones textuales en el paquete auditado; la versión inglesa más reciente figura como sin cambios y con acuerdo alto. La draft española sigue ese estado estable, conservando la misma estructura básica y la decisión discursiva sobre la conjunción inicial.
  spanish_consistency_notes:
  - 'Se mantienen nombres propios bíblicos en formas españolas estándar: Josué, Jericó, Hai y Gabaón.'
  - Se preserva el matiz temporal del hebreo narrativo con el pluscuamperfecto «había hecho», coherente con la auditoría inglesa.
  - La conjunción inicial se resuelve como «Pero» por valor discursivo, no como traducción mecánica de «y».
  - No se añade material interpretativo como «contra» porque el hebreo usa ל con עשה, y la auditoría inglesa opta por una dirección simple «to».
