translation:
  language: es
  text: Si me alegré de la ruina[a] del que me odia[b], y me regocijé[c] cuando el mal lo alcanzó[d]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'calamidad' o 'desastre' para 'ruina'.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, 'mi enemigo'; literalmente, 'el que me odia'.
    reason: lexical_alternative
  - marker: c
    text: O 'me regodeé' para 'me regocijé', destacando el deleite indebido ante el daño ajeno.
    reason: lexical_alternative
  - marker: d
    text: O 'daño' o 'desgracia lo alcanzó'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: HALOT
  rationale: Introduce la cláusula condicional/protestativa de manera natural en español, manteniendo el valor hipotético del hebreo.
- source_word: אֶשְׂמַח
  english_pob_choice: I rejoiced
  chosen_spanish: me alegré
  alternatives_spanish:
  - me regocijé
  - tuve alegría
  lexicon: HALOT
  rationale: שׂמח expresa alegría/regozijo; en español, 'me alegré' es claro y directo, y conserva el peso retrospectivo de la negación de Job. 'Me regocijé' queda como alternativa más enfática.
- source_word: בְּפִיד
  english_pob_choice: at the ruin
  chosen_spanish: del ruina
  alternatives_spanish:
  - de la ruina
  - de la calamidad
  - del desastre
  lexicon: HALOT
  rationale: פִיד señala ruina, calamidad o desastre. Se eligió un equivalente semántico fuerte y conciso, pero la forma publicada requiere ajuste gramatical en la frase; por eso se registran alternativas más idiomáticas.
- source_word: מְשַׂנְאִי
  english_pob_choice: of the one who hates me
  chosen_spanish: de mi odiador
  alternatives_spanish:
  - de mi enemigo
  - del que me odia
  - del que me aborrece
  lexicon: HALOT
  rationale: El participio expresa literalmente 'el que me odia'. 'Mi odiador' preserva mejor la fuerza verbal y evita suavizarlo a un simple rótulo relacional como 'enemigo'.
- source_word: וְהִתְעֹרַרְתִּי
  english_pob_choice: and exulted
  chosen_spanish: me regocijé
  alternatives_spanish:
  - exulté
  - me enardecí
  - me solivianté
  lexicon: HALOT
  rationale: El verbo sugiere un movimiento interior de exaltación o excitación emocional. 'Me regocijé' comunica ese júbilo, aunque la nota alternativa permite la lectura más fuerte de 'exulté' o incluso el matiz negativo cercano a 'gocé maliciosamente'.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - al
  lexicon: HALOT
  rationale: 'Aquí introduce la circunstancia temporal en que ocurriría el regocijo: ''cuando el mal lo alcanzó''.'
- source_word: מְצָאוֹ
  english_pob_choice: evil found him
  chosen_spanish: lo alcanzó
  alternatives_spanish:
  - lo encontró
  - le sobrevino
  - lo sorprendió
  lexicon: HALOT
  rationale: מצא con sufijo pronominal en este contexto significa que algo sobreviene o alcanza a alguien. 'Lo alcanzó' comunica bien la idea de un mal que cae sobre él.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la desgracia
  - el daño
  - la calamidad
  lexicon: HALOT
  rationale: Aquí רָע no señala maldad moral sino adversidad o daño; 'el mal' conserva la amplitud semántica del hebreo y el paralelismo con el texto fuente.
theological_decisions:
- issue: Delight in an enemy's downfall
  english_pob_reading: Render the verse as a denial of rejoicing/exulting over an enemy's ruin without intensifying it into explicit 'gloating' in the main text.
  chosen_spanish_reading: Presentar la negación como rechazo de alegrarse por la ruina del que lo odia, sin cargar el texto principal con una palabra más interpretativa como 'regodearme maliciosamente'.
  alternative_spanish_readings:
  - Si me alegré de la desgracia de mi enemigo y me regodeé cuando le vino el mal
  rationale: El hebreo implica una conducta moralmente reprobable, pero el texto principal debe quedarse cerca del valor léxico sin sobredeterminar la intención psicológica. La alternativa permite una lectura más fuerte si se desea explicitar el matiz de gloating.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: No se reportaron revisiones aplicadas; el último pase indicó que no había cambios necesarios y el acuerdo de revisión fue alto (0.95), con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene 'el mal' para רָע por coherencia con la amplitud semántica del hebreo, aunque en contexto denote desgracia o adversidad.
  - Se conserva la referencia relacional 'mi odiador' para reflejar el participio hebreo y no aplanarlo inmediatamente a 'enemigo'.
  - La puntuación con raya final sigue la cadencia del original y del POB inglés.
