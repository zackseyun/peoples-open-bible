translation:
  language: es
  text: 'Entonces el faraón le dijo: «Aléjate de mí. Cuídate; no vuelvas a ver mi rostro[a], porque el día que veas mi rostro[b], morirás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente, “no vuelvas a ver mi rostro” o “no veas más mi rostro”. El hebreo dice literalmente: “no añadas a ver mi rostro”.'
    reason: lexical_alternative
  - marker: b
    text: '"Mi rostro" también puede entenderse como "mi presencia", pero el hebreo repite "rostro" para conservar el énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ מֵעָלַי
  english_pob_choice: Go away from me
  chosen_spanish: Aléjate de mí
  alternatives_spanish:
  - Vete de mí
  - Apártate de mí
  lexicon: HALOT
  rationale: La combinación del imperativo con la preposición "de sobre/desde mí" pide una despedida enérgica. "Aléjate de mí" transmite bien la expulsión y suena natural en español sin perder la rudeza del mandato.
- source_word: הִשָּׁ֣מֶר לְ/ךָ
  english_pob_choice: Watch yourself
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Ten cuidado
  - Guárdate
  lexicon: HALOT
  rationale: El nifal imperativo con dativo ético implica una advertencia dirigida personalmente. "Cuídate" conserva el tono exhortativo y amenazante en español moderno y es más directo que "ten cuidado".
- source_word: אֶל תֹּ֨סֶף֙ רְא֣וֹת פָּנַ֔/י
  english_pob_choice: do not see my face again
  chosen_spanish: no vuelvas a ver mi rostro
  alternatives_spanish:
  - no sigas viendo mi rostro
  - no añadas a ver mi rostro
  lexicon: HALOT
  rationale: El hebreo usa la estructura idiomática de "añadir/seguir" con infinitivo. En español, "no vuelvas a ver mi rostro" comunica la prohibición de forma natural y refleja la idea de repetición sin volver al calco opaco. Se mantiene "rostro" para conservar la imagen de "face" del texto fuente.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: HALOT
  rationale: '"Rostro" es una opción digna y literaria en español, cercana a la metáfora hebrea. Se conserva la repetición del término para no diluir el énfasis retórico del hebreo, aunque "presencia" sea una posible metonimia.'
- source_word: בְּ/י֛וֹם רְאֹתְ/ךָ֥ פָנַ֖/י
  english_pob_choice: on the day you see my face
  chosen_spanish: el día que veas mi rostro
  alternatives_spanish:
  - cuando veas mi rostro
  - el día en que veas mi rostro
  lexicon: HALOT
  rationale: '"בְּיוֹם" se vierte con una construcción temporal directa en español. "El día que" suena natural y solemne, y preserva el marco temporal del amago de muerte.'
- source_word: תָּמֽוּת
  english_pob_choice: you will die
  chosen_spanish: morirás
  alternatives_spanish:
  - vas a morir
  - ciertamente morirás
  lexicon: HALOT
  rationale: El futuro simple reproduce la amenaza directa del discurso de Faraón con naturalidad y sin añadir énfasis que el texto no explicita.
theological_decisions:
- issue: '"mi rostro" frente a "mi presencia"'
  english_pob_reading: The Hebrew repeats "face" for emphasis, though it may be understood as presence.
  chosen_spanish_reading: Se conserva "mi rostro" en ambas apariciones, dejando abierta la posibilidad metonímica de "presencia" sin imponerla en el cuerpo del verso.
  alternative_spanish_readings:
  - mi presencia
  - mi semblante
  rationale: El texto hebreo insiste en la repetición de "face/rostro". Traducirlo como "presencia" resolvería la metáfora demasiado pronto y borraría el eco retórico. Mantener "rostro" respeta la tensión semántica documentada.
  doctrine_reference: No aplica; decisión lexical y retórica del hebreo.
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del inglés POB: evitar un calco excesivamente literal de la idiomática hebrea y renderizar la prohibición como una fórmula natural en español, sin perder la repetición de "rostro" que el audit trail conserva por énfasis. Se mantuvo el tono de amenaza directa y la secuencia narrativa del "Entonces" inicial.'
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '"Rostro" se mantiene como traducción coherente de פָּנִים/פָּנַי en esta unidad, siguiendo la repetición del texto fuente.'
  - Se prefirió un español bíblico digno pero actual, sin depender de fórmulas tradicionales que oculten el matiz del hebreo.
