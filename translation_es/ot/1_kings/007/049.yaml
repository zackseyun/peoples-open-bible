translation:
  language: es
  text: y los candelabros[a], cinco a la derecha y cinco a la izquierda, frente al santuario interior, de oro puro; y las flores, las lámparas y las pinzas[c][b], de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'frente al Lugar Santísimo'. El hebreo דְּבִיר se refiere a la cámara más interna del templo.
    reason: lexical_alternative
  - marker: b
    text: O 'oro refinado' para 'oro puro'.
    reason: lexical_alternative
  - marker: c
    text: O 'despabiladeras' para 'pinzas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְּנֹרוֹת
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lampadarios
  - soportes de lámparas
  lexicon: HALOT
  rationale: El término hebreo designa los soportes de luz del templo más que las lámparas mismas. En español, 'candelabros' es el equivalente tradicional más cercano y comprensible para ese objeto cultual, aunque hoy puede sugerir velas; se mantiene por su naturalidad litúrgica y porque no hay un término único más preciso y natural en el uso general.
- source_word: מִיָּמִין ... מִשְּׂמֹאול
  english_pob_choice: on the right ... on the left
  chosen_spanish: a la derecha ... a la izquierda
  alternatives_spanish:
  - al sur ... al norte
  lexicon: HALOT
  rationale: Se conserva el lenguaje relacional del hebreo ('derecha/izquierda') en vez de convertirlo en orientación geográfica. Esto preserva mejor la formulación original, aun cuando el lector pueda inferir la orientación del templo.
- source_word: לִפְנֵי הַדְּבִיר
  english_pob_choice: before the inner sanctuary
  chosen_spanish: frente al santuario interior
  alternatives_spanish:
  - en frente del santuario interior
  - frente al Lugar Santísimo
  lexicon: HALOT
  rationale: '''Santuario interior'' comunica el sentido de דְּבִיר como la cámara interna del templo sin imponer de entrada la formulación técnica ''Lugar Santísimo''. Se conserva la posibilidad de lectura tradicional en la nota.'
- source_word: זָהָב סָגוּר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro fino
  lexicon: HALOT
  rationale: '''Oro puro'' es la equivalencia española más natural y fiel para la idea de metal refinado de alta calidad. Mantiene la fuerza material del hebreo sin calcar la construcción nominal.'
- source_word: הַפֶּרַח
  english_pob_choice: the flowers
  chosen_spanish: las flores
  alternatives_spanish:
  - los ornamentos florales
  - el motivo floral
  lexicon: HALOT
  rationale: פֶּרַח puede referirse aquí a elementos decorativos con forma de flor. Se usa el plural español 'las flores' para reflejar el sentido colectivo/distributivo que el contexto exige.
- source_word: הַנֵּרֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las lámparas de aceite
  - las luces
  lexicon: HALOT
  rationale: Aunque el inglés POB traduce 'lamps', en español 'lámparas' expresa de manera más natural el objeto asociado al candelabro. Evita la lectura moderna de bombillas y mantiene el referente cultual.
- source_word: הַמֶּלְקַחַיִם
  english_pob_choice: the tongs
  chosen_spanish: las tenazas
  alternatives_spanish:
  - las pinzas
  - los tenazas
  lexicon: HALOT
  rationale: El implemento es una herramienta de metal usada para manipular o apagar la mecha. En español, 'tenazas' es el equivalente más extendido y natural; 'pinzas' sería posible, pero algo menos preciso para un utensilio grande de metal.
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro fino
  lexicon: HALOT
  rationale: Se mantiene la construcción nominal 'de oro' para que el inventario de materiales sea transparente en la enumeración final del versículo.
theological_decisions:
- issue: דְּבִיר y su equivalencia en español
  english_pob_reading: 'before the inner sanctuary; footnote: ''Or "before the Most Holy Place." The Hebrew דְּבִיר refers to the temple''s innermost room.'''
  chosen_spanish_reading: frente al santuario interior
  alternative_spanish_readings:
  - frente al Lugar Santísimo
  - frente al Santo de los Santos
  rationale: El texto hebreo apunta al recinto interno del templo; 'santuario interior' es transparente y evita fijar de inmediato una terminología posterior, pero la nota preserva la lectura equivalente tradicional.
  doctrine_reference: 1 Reyes 7:49; cf. Éxodo 26:33; 1 Reyes 6:16, 19-20
translation_notes:
  revision_awareness: El texto inglés POB presenta lectura estable y sin revisiones aplicadas; se conservan sus decisiones léxicas clave y sus alternativas en notas cuando el español introduce una ambigüedad adicional o requiere precisar el referente cultual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se preserva la enumeración de objetos y materiales en el mismo orden del hebreo: candelabros, flores, lámparas y tenazas, todos de oro salvo el primer material ya indicado como oro puro.'
  - Se evita 'Lugar Santísimo' en el texto principal para no cerrar prematuramente la traducción de דְּבִיר; la nota permite la equivalencia tradicional.
  - Se usa puntuación española con coma y punto y coma para reflejar la estructura enumerativa del original.
