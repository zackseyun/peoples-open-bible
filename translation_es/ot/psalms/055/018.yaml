translation:
  language: es
  text: Tarde[a], mañana y mediodía me quejo y gimo, y él[b] oye mi voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la tarde, por la mañana y al mediodía».
    reason: previous_rendering
  - marker: b
    text: El hebreo simplemente dice «y él oye mi voz», con el sujeto implícito; el referente es Dios por el contexto que rodea este versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: עֶרֶב
  english_pob_choice: Evening
  chosen_spanish: Tarde
  alternatives_spanish:
  - En la tarde
  - Tarde, al anochecer
  lexicon: HALOT
  rationale: El hebreo nombra el tiempo del día como sustantivo; en español, «tarde» conserva la serie poética de momentos del día sin añadir una preposición innecesaria.
- source_word: בֹּקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - por la mañana
  - mañana temprana
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el primer miembro de la lista temporal y el valor natural del sustantivo en español.
- source_word: צָהֳרַיִם
  english_pob_choice: at noon
  chosen_spanish: a mediodía
  alternatives_spanish:
  - mediodía
  - al mediodía
  lexicon: HALOT
  rationale: La forma hebrea refiere al mediodía. En español, «a mediodía» expresa bien el valor temporal y preserva el ritmo triádico.
- source_word: אָשִׂיחָה
  english_pob_choice: I complain
  chosen_spanish: me quejo
  alternatives_spanish:
  - medito
  - hablo
  - musito
  lexicon: HALOT
  rationale: En este lamento, el verbo puede incluir hablar, meditar o lamentarse; el contexto de angustia junto con «gimo» favorece una queja verbal y de aflicción. «Me quejo» refleja esa fuerza sin borrar la ambigüedad del verbo hebreo.
- source_word: אֶהֱמֶה
  english_pob_choice: and groan
  chosen_spanish: y gimo
  alternatives_spanish:
  - y me lamento
  - y gimo de dolor
  - y suspiro
  lexicon: HALOT
  rationale: El verbo transmite un gemido o murmullo audible de aflicción. «Gimo» es un equivalente breve y natural en español, manteniendo el tono de lamento.
- source_word: וַיִּשְׁמַע
  english_pob_choice: and he hears
  chosen_spanish: y él oye
  alternatives_spanish:
  - y él escucha
  - y oye
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito como pronombre explícito en español para claridad, sin introducir «Yahvé» en el texto principal; el contexto identifica a Dios como referente.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi clamor
  - mi sonido
  lexicon: HALOT
  rationale: «Voz» es la correspondencia natural y directa en contextos de oración o lamentación, conservando el carácter audible del ruego.
theological_decisions:
- issue: Sujeto implícito de וַיִּשְׁמַע
  english_pob_reading: Generic 'he' referring to God without supplying the divine name in the main text
  chosen_spanish_reading: «él» se mantiene como sujeto explícito, con Dios entendido por el contexto
  alternative_spanish_readings:
  - «Yahvé oye mi voz»
  - «el Señor oye mi voz»
  rationale: El hebreo no nombra explícitamente al sujeto; el entorno del salmo lo identifica como Dios. Para no añadir un nombre que no está en el verso, el texto principal conserva el pronombre, dejando la referencia implícita pero clara.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto español sigue la revisión auditada que favorece una lista temporal paralela de tres miembros. Se evita una frase preposicional desigual en el último elemento y se conserva el cierre con sujeto implícito claro en el hebreo, expresado como «él» en español por fluidez y transparencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando un nombre divino explícito sea necesario; aquí no se añadió porque el hebreo solo usa el verbo con sujeto implícito.
  - 'Se prefirió el paralelismo poético de tres tiempos del día: tarde, mañana y mediodía.'
  - Se conservó el campo semántico de lamento con «me quejo» y «gimo», evitando suavizar el tono del verso.
