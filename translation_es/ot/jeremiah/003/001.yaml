revisions:
- from: 'Se dice[a]: «Si un hombre despide a su esposa, y ella se va de él y llega a ser de otro hombre, ¿volverá a ella otra vez? ¿No será completamente profanada[b] esa tierra? Pero tú te has prostituido con muchos amantes, y ¿volverás a mí?», declara Yahvé.'
  to: 'Se dice[a]: «Si un hombre despide a su esposa, y ella se va de él y llega a ser la mujer de otro hombre[b], ¿volverá a ella otra vez? ¿No quedará totalmente contaminada aquella tierra? Pero tú te has prostituido con muchos amantes, ¿y volverías a mí?», declara Yahvé.'
  rationale: La revisión corrige la ubicación y contenido de la nota [b] para alinearla con el audit trail inglés, mejora la naturalidad de la elipsis marital en español, y afina la formulación de la contaminación de la tierra y de la pregunta retórica final sin cambiar la lectura exegética adoptada.
