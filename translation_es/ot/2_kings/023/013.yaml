translation:
  language: es
  text: Y el rey profanó los lugares altos que estaban delante de Jerusalén, que estaban a la derecha del monte de la Destrucción[a], que Salomón, rey de Israel, había edificado para Astarté, la abominación de los sidonios, para Quemos, la abominación de Moab, y para Milcom[c][b], la abominación de los amonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sur del monte de la Destrucción», ya que «a la derecha» puede reflejar una orientación direccional en la topografía hebrea.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «monte de la Destrucción»; posiblemente el cerro después identificado con el monte de los Olivos.'
    reason: cross_reference
  - marker: c
    text: El hebreo dice «Milcom»; algunos lectores pueden asociar esta deidad con «Moloc».
    reason: alternative_reading
lexical_decisions:
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altares altos
  - los santuarios
  lexicon: HALOT
  rationale: בָּמוֹת designa sitios cultuales elevados o centros de culto; «lugares altos» conserva el valor bíblico técnico sin introducir una arquitectura más específica de la que el texto da.
- source_word: עַל פְּנֵי יְרוּשָׁלִַם
  english_pob_choice: before Jerusalem
  chosen_spanish: delante de Jerusalén
  alternatives_spanish:
  - ante Jerusalén
  - frente a Jerusalén
  lexicon: HALOT
  rationale: La expresión hebrea indica posición frente a la ciudad. «Delante de Jerusalén» mantiene esa relación espacial sin imponer una lectura direccional más concreta que la fuente no exige en la línea principal.
- source_word: מִימִין לְהַר הַמַּשְׁחִית
  english_pob_choice: to the right of the Mount of Destruction
  chosen_spanish: a la derecha del monte de la Destrucción
  alternatives_spanish:
  - al sur del monte de la Destrucción
  - del lado sur del monte de la Destrucción
  lexicon: HALOT
  rationale: מִימִין significa literalmente «a la derecha». En español, «a la derecha de» reproduce con transparencia el giro hebreo; la posible orientación geográfica «al sur» se deja como alternativa, no como sustitución del texto base.
- source_word: הַר הַמַּשְׁחִית
  english_pob_choice: the Mount of Destruction
  chosen_spanish: monte de la Destrucción
  alternatives_spanish:
  - monte de la Corrupción
  - monte de los Olivos
  lexicon: HALOT
  rationale: El hebreo usa un apelativo peyorativo que conviene traducir y no armonizar con un topónimo tradicional más conocido. «Destrucción» conserva el tono condenatorio y la literalidad básica del compuesto.
- source_word: לְעַשְׁתֹּרֶת
  english_pob_choice: for Ashtoreth
  chosen_spanish: para Astarté
  alternatives_spanish:
  - para Ashtoreth
  lexicon: HALOT
  rationale: Se trata de un nombre propio divino. En español bíblico, «Astarté» es la forma estable y reconocible para esta deidad, sin perder la referencia a un culto extranjero.
- source_word: שִׁקֻּץ צִידֹנִים
  english_pob_choice: the abomination of the Sidonians
  chosen_spanish: la abominación de los sidonios
  alternatives_spanish:
  - la cosa detestable de los sidonios
  lexicon: HALOT
  rationale: שִׁקּוּץ es un término cultual fuertemente despectivo. «Abominación» preserva ese valor polémico y es idiomático en español bíblico sin suavizar el juicio del texto.
- source_word: לִכְמוֹשׁ
  english_pob_choice: for Chemosh
  chosen_spanish: para Quemos
  alternatives_spanish:
  - para Camós
  lexicon: HALOT
  rationale: Es un nombre propio divino; «Quemos» sigue la forma tradicional de transliteración en español bíblico y mantiene la identificación del dios moabita.
- source_word: שִׁקֻּץ מוֹאָב
  english_pob_choice: the abomination of Moab
  chosen_spanish: la abominación de Moab
  alternatives_spanish:
  - la cosa detestable de Moab
  lexicon: HALOT
  rationale: Se conserva la misma solución que para שִׁקּוּץ, por coherencia léxica y por la misma fuerza despectiva del sustantivo.
- source_word: לְמִלְכֹּם
  english_pob_choice: for Milcom
  chosen_spanish: para Milcom
  alternatives_spanish:
  - para Moloc
  lexicon: HALOT
  rationale: El texto consonántico lee Milcom, la deidad amonita. En el cuerpo principal se mantiene esa lectura, sin conflarla con Moloc; la alternativa se preserva por la conocida cercanía histórica y textual entre ambas formas.
- source_word: תּוֹעֲבַת בְּנֵי עַמּוֹן
  english_pob_choice: the abomination of the Ammonites
  chosen_spanish: la abominación de los amonitas
  alternatives_spanish:
  - la cosa detestable de los hijos de Amón
  lexicon: HALOT
  rationale: «Amonitas» es la forma natural en español para בְּנֵי עַמּוֹן. El sintagma mantiene el peso despectivo de תּוֹעֵבָה sin diluirlo.
- source_word: טִמֵּא
  english_pob_choice: defiled
  chosen_spanish: profanó
  alternatives_spanish:
  - contaminó
  - hizo impuro
  lexicon: HALOT
  rationale: En este contexto cultual, la acción no es solo limpieza ritual sino desacralización de un lugar idólatra para inutilizarlo. «Profanó» comunica bien ese acto de desacralización en español bíblico actual.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo mantiene el título. En español, «el rey» es la forma directa y sobria que preserva el referente narrativo sin añadir identificación no expresada en la cláusula.
theological_decisions:
- issue: Conservar el lenguaje polémico sobre deidades extranjeras
  english_pob_reading: Use 'abomination' in the main text for שִׁקּוּץ / תּוֹעֵבָה
  chosen_spanish_reading: Usar «abominación» en el texto principal para שִׁקּוּץ / תּוֹעֵבָה
  alternative_spanish_readings:
  - cosa detestable
  - ídolo
  rationale: El hebreo no presenta a estas divinidades de forma neutral; las etiqueta con lenguaje condenatorio. «Abominación» mantiene esa carga teológica y evita suavizar el juicio del texto.
  doctrine_reference: 'Translation philosophy #1 and #5'
- issue: Topónimo peyorativo de הַר הַמַּשְׁחִית
  english_pob_reading: Translate as 'the Mount of Destruction' rather than substitute 'Mount of Olives'
  chosen_spanish_reading: Traducirlo como «monte de la Destrucción» en vez de sustituirlo por «monte de los Olivos»
  alternative_spanish_readings:
  - monte de la Corrupción
  - monte de los Olivos
  rationale: El texto fuente usa un nombre valorativo y polemizante; traducirlo conserva la forma hebrea y su intención teológica mejor que reemplazarlo por una identificación geográfica armonizada.
  doctrine_reference: 'Translation philosophy #1'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del flujo inglés: se prefirió una traducción más literal de עַל פְּנֵי יְרוּשָׁלִַם como relación espacial «delante de Jerusalén», y se mantuvo la estructura de «a la derecha de» para מִימִין. También conservé la decisión auditada de no sustituir הַר הַמַּשְׁחִית por un topónimo armonizado.'
  spanish_consistency_notes:
  - Mantengo «Astarté», «Quemos» y «Milcom» como nombres propios transliterados de deidades, coherentes con el registro bíblico español.
  - Conservo «abominación» para שִׁקּוּץ / תּוֹעֵבָה para preservar la severidad cultual.
  - Uso «profanó» para טִמֵּא por el matiz de desacralización ritual en este contexto.
  - Los marcadores de nota siguen el orden a, b, c y cada uno aparece anclado en el texto principal.
