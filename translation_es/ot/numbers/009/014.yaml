revisions:
- from: Y si un extranjero habita con ustedes y celebra la Pascua[a] para Yahvé, la celebrará conforme al estatuto de la Pascua y conforme a su ordenanza; así la celebrará. Una sola estatuto[b] habrá para ustedes, para el extranjero y para el nativo de la tierra.
  to: Y si un residente extranjero[a] habita con ustedes y celebra la Pascua[b] para Yahvé, la celebrará conforme al estatuto de la Pascua y conforme a su ordenanza; así lo hará. Habrá un solo estatuto para ustedes, para el residente extranjero y para el nativo de la tierra[c].
  rationale: Se corrige el error gramatical principal ('una sola estatuto' → 'un solo estatuto' / 'habrá un solo estatuto'), se mejora la precisión de גֵּר con 'residente extranjero', se elimina una nota que solo comentaba un fallo de estilo ya corregido, y se añaden notas útiles que preservan las alternativas léxicas relevantes del expediente inglés y del hebreo.
