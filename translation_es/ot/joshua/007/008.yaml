translation:
  language: es
  text: Por favor, Señor, ¿qué puedo decir[a] después de que Israel ha vuelto la espalda[b] ante sus enemigos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué diré?»'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ha vuelto la espalda/nuca ante sus enemigos», un modismo hebreo de retirada en derrota.
    reason: cultural_note
lexical_decisions:
- source_word: בִּי
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Ah
  - Oh
  lexicon: HALOT
  rationale: La partícula funciona aquí como súplica respetuosa ante un superior. «Por favor» comunica bien la urgencia y la cortesía implícitas sin volver mecánica la frase.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi señor
  - Señor mío
  lexicon: HALOT
  rationale: En una invocación directa a Dios, «Señor» es la equivalencia natural en español. «Mi señor» suena más posesivo y menos reverencial en este contexto.
- source_word: מָה אֹמַר
  english_pob_choice: what can I say
  chosen_spanish: ¿qué puedo decir?
  alternatives_spanish:
  - ¿qué diré?
  - ¿qué he de decir?
  lexicon: HALOT
  rationale: El hebreo es literalmente «¿qué diré?», pero la pregunta retórica expresa desamparo. «¿Qué puedo decir?» conserva ese matiz de impotencia, como en el audit trail inglés.
- source_word: הָפַךְ
  english_pob_choice: has turned
  chosen_spanish: ha vuelto
  alternatives_spanish:
  - se ha vuelto
  - ha girado
  - ha dado la vuelta
  lexicon: HALOT
  rationale: Con «עֹרֶף» el verbo forma un modismo de retirada. «Ha vuelto la espalda» reproduce de manera idiomática la imagen militar sin suavizarla.
- source_word: עֹרֶף
  english_pob_choice: its back
  chosen_spanish: la espalda
  alternatives_spanish:
  - el cuello
  - la nuca
  - la parte posterior del cuello
  lexicon: HALOT
  rationale: Aunque el término hebreo puede referir la nuca o el cuello, en este modismo bélico español «volver la espalda» expresa de forma clara la retirada ante el enemigo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En contexto militar, «delante de» mantiene la relación espacial y la idea de exposición frente al enemigo, de modo natural en español.
- source_word: אֹיְבָיו
  english_pob_choice: its enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de Israel
  - sus adversarios
  lexicon: HALOT
  rationale: El sufijo es masculino singular, pero el referente es colectivo («Israel»). En español, «sus enemigos» es la forma natural para ese sujeto colectivo.
theological_decisions:
- issue: Título divino אֲדֹנָי en invocación directa
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  - Señor mío
  rationale: No hay en este versículo el nombre del pacto, sino un título reverencial dirigido a Dios. «Señor» preserva la lectura devocional estándar sin introducir «Yahvé».
  doctrine_reference: 'DOCTRINE.md: traducir títulos reverenciales según su función en el texto'
- issue: Modismo bélico «volver la espalda»
  english_pob_reading: Literally 'has turned back/neck before its enemies,' a Hebrew idiom for retreating in defeat.
  chosen_spanish_reading: ha vuelto la espalda delante de sus enemigos
  alternative_spanish_readings:
  - ha retrocedido delante de sus enemigos
  - ha dado la espalda ante sus enemigos
  rationale: El español posee el modismo exacto «volver la espalda», que conserva la fuerza narrativa del hebreo y evita una paráfrasis interpretativa excesiva.
  doctrine_reference: 'DOCTRINE.md: conservar imágenes idiomáticas cuando el español las recibe con naturalidad'
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en tono de súplica, pregunta retórica y modismo militar de retirada. No se requirieron revisiones respecto del pasaje fuente; se mantuvo la lectura de alta concordancia.
  spanish_consistency_notes:
  - Se usó «Señor» para אֲדֹנָי como título divino, coherente con el POB inglés.
  - Se mantuvo la imagen idiomática de derrota militar con «ha vuelto la espalda».
  - Se evitó «Yahvé» porque este versículo no contiene el nombre divino, solo el título reverencial.
  - La pregunta se formuló como expresión de impotencia, no como simple consulta informativa.
