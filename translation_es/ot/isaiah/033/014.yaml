translation:
  language: es
  text: 'Los pecadores en Sion tienen miedo; el temblor se ha apoderado de los impíos[a]: «¿Quién de nosotros podrá habitar[b] con fuego consumidor[c]? ¿Quién de nosotros podrá habitar con llamas perpetuas[d]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hipócritas». El término hebreo puede designar a los impíos o irreligiosos, no solo a quienes son insinceros.
    reason: lexical_alternative
  - marker: b
    text: O «podrá morar» o «podrá vivir como forastero». El verbo hebreo puede significar «morar», «residir» o «vivir como forastero».
    reason: lexical_alternative
  - marker: c
    text: «Fuego consumidor» hace eco del lenguaje bíblico de la presencia santa y juzgadora de Dios; compárese Deuteronomio 4:24 y Hebreos 12:29.
    reason: cross_reference
  - marker: d
    text: O «ardores eternos».
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּחֲדוּ
  english_pob_choice: are afraid
  chosen_spanish: tienen miedo
  alternatives_spanish:
  - están atemorizados
  - han quedado atemorizados
  lexicon: HALOT
  rationale: El perfectivo hebreo expresa un estado ya producido; en español, «tienen miedo» comunica bien ese resultado sin sonar forzado. Mantiene el valor léxico de פחד como temor real.
- source_word: בְצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: La preposición locativa exige «en». Se conserva «Sion» como forma española estable para el topónimo bíblico.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los que pecan
  lexicon: HALOT
  rationale: «Pecadores» es el equivalente natural y directo para los caracterizados por el pecado. Mantiene el sustantivo plural sin suavizarlo.
- source_word: אָחֲזָה רְעָדָה
  english_pob_choice: trembling has seized
  chosen_spanish: el temblor se ha apoderado
  alternatives_spanish:
  - el temblor los ha agarrado
  - el estremecimiento los ha tomado
  lexicon: HALOT
  rationale: La imagen verbal concreta de «seize/grip» se preserva con «se ha apoderado». «Temblor» reproduce רְעָדָה sin convertirlo en un abstracto distinto como «terror».
- source_word: חֲנֵפִים
  english_pob_choice: the godless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los profanos
  - los hipócritas
  lexicon: HALOT
  rationale: El inglés POB opta por el sentido amplio de irreligiosidad/impiedad, no solo hipocresía. En español, «impíos» comunica bien esa amplitud y conserva la tensión lexical documentada.
- source_word: מִי יָגוּר לָנוּ
  english_pob_choice: Who among us can dwell
  chosen_spanish: ¿Quién de nosotros podrá habitar
  alternatives_spanish:
  - ¿Quién de nosotros podrá morar
  - ¿Quién de nosotros podrá permanecer
  lexicon: HALOT
  rationale: גור admite «sojourn/dwell»; aquí, en el paralelismo con el fuego divino, «habitar» conserva la idea de permanecer en presencia de esa santidad. «De nosotros» hace natural el pronombre dativo.
- source_word: אֵשׁ אוֹכֵלָה
  english_pob_choice: a consuming fire
  chosen_spanish: fuego consumidor
  alternatives_spanish:
  - fuego devorador
  - fuego que consume
  lexicon: HALOT
  rationale: «Fuego consumidor» es una expresión bíblica clara y fiel que conserva el participio de acción. Mantiene la imagen del fuego santo y juzgador sin explicitar más de lo que el texto dice.
- source_word: מוֹקְדֵי עוֹלָם
  english_pob_choice: everlasting burnings
  chosen_spanish: brasas eternas
  alternatives_spanish:
  - llamas eternas
  - ardores perpetuos
  lexicon: HALOT
  rationale: El plural constructo con עוֹלָם sugiere fuegos/brasas duraderas. «Brasas eternas» conserva la pluralidad e intensidad del hebreo con un español fluido y digno. «Eternas» refleja el duradero alcance de עוֹלָם.
theological_decisions:
- issue: Referent of the consuming fire and everlasting burnings
  english_pob_reading: The imagery refers to the terrifying holiness and judgment-presence of God, expressed metaphorically as fire.
  chosen_spanish_reading: La imagen alude a la santidad aterradora y a la presencia de juicio de Dios, expresadas metafóricamente como fuego.
  alternative_spanish_readings:
  - La imagen alude más específicamente al fuego del juicio divino contra los impíos.
  - La imagen alude al simbolismo del altar y del fuego de Sion.
  rationale: El contexto inmediato de Isaías presenta la presencia de Yahvé como peligrosa para los impíos, y el versículo siguiente responde quién puede habitar allí. La traducción conserva la metáfora sin cerrar la tensión interpretativa ni desplazarla a categorías posteriores.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en el texto principal.
translation_notes:
  revision_awareness: No hay cambios aplicados en la última pasada; el acuerdo de revisión fue alto y el texto se mantiene sin modificaciones respecto al borrador anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida del nombre divino en este proyecto, aunque en este versículo no aparece explícitamente en la superficie hebrea.
  - Se usa «Sion» en lugar de «Zion» por consistencia con el español bíblico estándar.
  - Se conserva la distinción entre «pecadores» e «impíos» para reflejar dos vocablos hebreos diferentes.
  - Las notas al pie distinguen entre alternativas léxicas y un eco intertextual para no mezclar datos de traducción con observación teológica.
