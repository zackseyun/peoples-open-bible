base_translation:
  language: en
  yaml_path: translation/ot/lamentations/004/018.yaml
  text: They hunted our steps[a], so that we could not walk in our streets. Our end drew near; our days were fulfilled[c][b], for our end had come.
  footnotes:
  - marker: a
    text: Or 'They tracked our steps' or 'They lay in wait for our steps.' The Hebrew verb conveys hostile pursuit.
    reason: lexical_alternative
  - marker: b
    text: '''Our days were full'' is a Hebrew idiom meaning that the allotted time had run out or been completed.'
    reason: cultural_note
  - marker: c
    text: Or 'our doom' for 'our end'; the Hebrew word means 'end' and in context implies destruction.
    reason: lexical_alternative
