translation:
  language: es
  text: 'Yahvé me dijo[a]: «¿Qué ves, Amós?». Yo respondí: «Una plomada». Entonces el Señor dijo: «Mira, estoy poniendo una plomada en medio de mi pueblo Israel[b]; no volveré a pasar por alto a Israel[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente, «plomo», «estaño» o «plomada»; el término hebreo probablemente alude a un instrumento de medición o al material asociado con una plomada.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en medio de mi pueblo Israel». La imagen subraya que la medida de juicio se aplica dentro del propio pueblo del pacto.'
    reason: nuance
  - marker: c
    text: 'O: «no volveré a pasar junto a ellos». La expresión probablemente significa «ya no lo perdonaré» o «ya no pasaré por alto su pecado».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma española ya establecida en el proyecto. No se sustituye por un título genérico, para mantener la distinción con אֲדֹנָי dentro del mismo versículo.
- source_word: מָה אַתָּה רֹאֶה
  english_pob_choice: What do you see
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué estás viendo?
  - ¿Qué es lo que ves?
  lexicon: HALOT
  rationale: La pregunta visionaria se expresa de modo natural en español con presente simple, sin añadir aspecto progresivo que no exige el hebreo.
- source_word: אֲנָךְ
  english_pob_choice: plumb line
  chosen_spanish: plomada
  alternatives_spanish:
  - cuerda de plomada
  - plomo
  - instrumento de plomada
  lexicon: HALOT
  rationale: El contexto de Amós 7:7-8 muestra un instrumento de medición vertical; 'plomada' comunica bien la función sin forzar una interpretación más técnica de lo que permite el texto.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - mi Señor
  - el Soberano
  lexicon: HALOT
  rationale: Aquí el hebreo usa el título de Dios, no el Nombre propio. En español, 'el Señor' preserva la distinción con Yahvé y sigue siendo claro y reverente.
- source_word: הִנְנִי
  english_pob_choice: Look, I am
  chosen_spanish: Mira, estoy
  alternatives_spanish:
  - He aquí que estoy
  - Aquí estoy, estoy
  lexicon: HALOT
  rationale: '''Mira'' reproduce la fuerza deíctica e imperativa de atención en un español natural; se une con el progresivo para reflejar la inmediatez de la declaración divina.'
- source_word: שָׂם
  english_pob_choice: setting
  chosen_spanish: poniendo
  alternatives_spanish:
  - colocando
  - estableciendo
  lexicon: HALOT
  rationale: 'El participio/acción en curso se vierte con gerundio para mantener la viveza de la visión: Dios está actuando en ese momento.'
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - entre
  lexicon: HALOT
  rationale: '''En medio de'' comunica de manera idiomática el centro espacial y relacional del hebreo sin perder naturalidad en español.'
- source_word: לֹא אוֹסִיף עוֹד עֲב֥וֹר לֽוֹ
  english_pob_choice: I will not again pass by them
  chosen_spanish: no volveré a pasar de largo por él
  alternatives_spanish:
  - no volveré a pasar por alto a él
  - ya no le pasaré de largo
  - no seguiré pasando de largo por él
  lexicon: HALOT
  rationale: Se conserva la imagen de 'pasar de largo' para no borrar la metáfora del hebreo, pero en español la expresión también permite oír la idea de dejar de perdonar/ignorar en juicio. El singular pronominal se mantiene en la forma ('él') porque el hebreo lo presenta así, aunque el referente colectivo sea Israel.
theological_decisions:
- issue: Distinción entre el Nombre divino y el título divino en el mismo versículo
  english_pob_reading: Render יְהוָה as 'Yahweh' and אֲדֹנָי as 'the Lord'
  chosen_spanish_reading: Traducir יְהוָה como 'Yahvé' y אֲדֹנָי como 'el Señor'
  alternative_spanish_readings:
  - Traducir ambos como 'el Señor'
  - Usar 'SEÑOR' para יְהוָה y 'Señor' para אֲדֹנָי
  rationale: La distinción del texto fuente se conserva para que el lector perciba que aparecen dos formas distintas de referirse a Dios. Esto es especialmente importante en un versículo breve donde ambas aparecen en inmediata sucesión.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido idiomático de לֹא אוֹסִיף עוֹד עֲבוֹר לוֹ
  english_pob_reading: I will not again pass by them
  chosen_spanish_reading: no volveré a pasar de largo por él
  alternative_spanish_readings:
  - no lo perdonaré más
  - ya no lo pasaré por alto
  - no volveré a pasar sobre él
  rationale: Se mantiene la tensión entre la imagen espacial de 'pasar de largo' y la implicación judicial del contexto. No se resuelve totalmente en una paráfrasis explicativa para conservar la fuerza profética del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Referencia pronominal singular con referente colectivo
  english_pob_reading: them
  chosen_spanish_reading: él
  alternative_spanish_readings:
  - les
  - ellos
  rationale: El hebreo usa sufijo singular, aunque el referente es Israel como pueblo. El español puede conservar esa singularidad formal sin impedir la referencia colectiva, dado que el contexto inmediato la aclara.
  doctrine_reference: Gramática hebrea y referencia colectiva en profecía
translation_notes:
  revision_awareness: La redacción española sigue de cerca el acuerdo alto del expediente inglés y no introduce cambios sustantivos respecto del pasaje base. Se mantuvo la distinción entre Yahvé y el Señor, la imagen de la plomada y la metáfora de 'pasar de largo', con una nota que preserva la posible lectura judicial del idiomismo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al criterio del proyecto.
  - Se usa 'el Señor' para אֲדֹנָי para conservar la distinción con el Nombre propio.
  - '''Plomada'' se eligió como equivalente funcional de plumb line en contexto visionario.'
  - Se preserva la metáfora de 'pasar de largo' y se aclara su posible sentido de no perdonar/no pasar por alto.
  - El texto mantiene un estilo bíblico claro y contemporáneo, sin calcos innecesarios.
