translation:
  language: es
  text: ¡Ay de ti, Moab! ¡Eres destruido, pueblo de Quemos! Él ha dado a sus hijos como fugitivos y a sus hijas en cautiverio a Sijón rey de los amorreos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha dado a sus hijos como fugitivos y a sus hijas en cautiverio», refiriendo los sufijos a Moab en lugar de a Quemos.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ti, Moab!
  lexicon: HALOT
  rationale: «¡Ay de ti!» conserva el tono de lamentación y amenaza profética de אוֹי, con una forma natural en español bíblico contemporáneo. No se suaviza a una exclamación meramente emotiva.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moabita
  lexicon: HALOT
  rationale: Se mantiene el nombre propio geográfico-étnico sin adaptación, como en el texto fuente.
- source_word: אָבַדְתָּ
  english_pob_choice: You are destroyed
  chosen_spanish: Eres destruido
  alternatives_spanish:
  - Has sido destruido
  - Eres arruinado
  lexicon: HALOT
  rationale: «Eres destruido» conserva la fuerza de ruina/catástrofe de אָבַדְתָּ en el contexto del canto burlón. Se evita una paráfrasis más libre como «has sido arrasado».
- source_word: עַם כְּמוֹשׁ
  english_pob_choice: people of Chemosh
  chosen_spanish: pueblo de Quemos
  alternatives_spanish:
  - pueblo de Quemós
  - gente de Quemos
  lexicon: HALOT
  rationale: «Pueblo de Quemos» conserva la relación de pertenencia o identificación del grupo con la deidad moabita. Se usa la transliteración habitual en español bíblico «Quemos» por claridad y consistencia.
- source_word: נָתַן
  english_pob_choice: He has given
  chosen_spanish: Ha dado
  alternatives_spanish:
  - Ha entregado
  - Ha puesto
  lexicon: HALOT
  rationale: «Ha dado» sigue de cerca נָתַן y mantiene la estructura causal del poema. «Ha entregado» sería posible, pero introduce una inferencia más interpretativa.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: HALOT
  rationale: Se traduce con «sus hijos» para evitar una redundancia forzada con el posesivo implícito y porque el español puede abarcar hijos/hijos varones según contexto. La opción mantiene abierta la referencia gramatical del sufijo, que en el hebreo puede leerse como Quemos o Moab.
- source_word: פְּלֵיטִם
  english_pob_choice: fugitives
  chosen_spanish: como fugitivos
  alternatives_spanish:
  - como fugitivos/as
  - en fuga
  lexicon: HALOT
  rationale: «Como fugitivos» preserva la idea de personas convertidas en huidos, sin convertir el sustantivo en una explicación más larga. Se respeta el valor resultativo del hebreo.
- source_word: וּבְנֹתָיו
  english_pob_choice: his daughters
  chosen_spanish: a sus hijas
  alternatives_spanish:
  - a sus hijas
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «sus hijos» y la misma solución de posesivo implícito en español.
- source_word: בַּשְּׁבִית
  english_pob_choice: into captivity
  chosen_spanish: en cautiverio
  alternatives_spanish:
  - en cautividad
  - como cautivas
  lexicon: HALOT
  rationale: «En cautiverio» expresa el estado de deportación/captura con naturalidad en español y preserva el valor de resultado del hebreo. Se evita «cautivas» porque cambia la construcción de estado a rasgo nominal de las personas.
- source_word: לְמֶלֶךְ אֱמֹרִי סִיחוֹן
  english_pob_choice: to Sihon king of the Amorites
  chosen_spanish: a Sijón, rey de los amorreos
  alternatives_spanish:
  - a Sijón rey de los amorreos
  - al rey amorreo Sijón
  lexicon: HALOT
  rationale: Se conserva la apposición del original y la referencia histórica a Sijón como rey de los amorreos. «Sijón» es la transliteración española estándar.
theological_decisions:
- issue: Referente del sufijo posesivo de «sus hijos» y «sus hijas»
  english_pob_reading: The suffixes refer to Chemosh, yielding 'his sons' and 'his daughters.'
  chosen_spanish_reading: Se deja la referencia abierta en la traducción literal española, aunque el contexto poético permite leer el posesivo como referido a Quemos; por eso se usa «sus» sin explicitar si el antecedente es Quemos o Moab.
  alternative_spanish_readings:
  - a sus hijos y a sus hijas de Quemos
  - a sus hijos y a sus hijas de Moab
  rationale: 'El hebreo permite la tensión señalada por la nota inglesa: el sufijo puede leerse como alusivo a Quemos por personificación o, colectivamente, a Moab. En español conviene no resolverla de modo demasiado tajante en el texto principal; «sus» mantiene la ambigüedad documentada.'
  doctrine_reference: Poética profética / personificación idolátrica en el poema; no implica doctrina sistemática añadida.
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de «ruined» a «destroyed», de «made» a «has given» y de «captives» a «into captivity». La redacción española sigue esas decisiones: «destruido», «ha dado» y «en cautiverio», respectivamente, manteniendo además la apposición final «Sijón, rey de los amorreos» sin coma intermedia.'
  spanish_consistency_notes:
  - Se usa «Quemos» para el dios moabita, conforme a la transliteración española más común y legible.
  - Se usa «Sijón» para סִיחוֹן y «amorreos» para אֱמֹרִי, de acuerdo con el vocabulario bíblico estándar en español.
  - Se conserva el tono de oráculo de lamento/burla con exclamaciones iniciales y ritmo breve.
  - La nota sobre el posible referente del posesivo se mantiene implícita en el texto y se documenta en las decisiones teológicas.
