review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura de propósito de לְמַעַן, el sentido reflexivo de יִטַּמְּאוּ y la fórmula pactual final. También preserva correctamente Yahvé para יְהוִה. Sin embargo, hay desajustes gramaticales y de naturalidad en español: ''la casa de Israel'' es singular pero luego aparece ''sean''; y la fórmula pactual suena más fiel e idiomática como ''sea mi pueblo... yo sea su Dios''.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero contiene un problema de concordancia verbal ('la casa... sean') y dos giros algo rígidos ('para mí un pueblo', 'para ellos Dios') que, aunque cercanos al hebreo, suenan menos naturales de lo necesario en español eclesial. La nota al pie también debe ajustar 'vaguen' a singular para concordar con 'la casa de Israel'.
  glossary_alignment: Alinea bien con la política del proyecto en 'Yahvé'. 'Rebeliones' para פִּשְׁעֵיהֶם es defendible y conserva la fuerza pactual. 'El Señor Yahvé' para אֲדֹנָי יְהוִה es aceptable dentro de la política dada. No hay conflicto terminológico mayor.
  issues:
  - severity: medium
    issue: Falta de concordancia verbal en la fórmula pactual
    rationale: El sujeto 'la casa de Israel' es singular colectivo; 'sino que sean para mí un pueblo' debe concordar en singular ('sea') o reformularse.
  - severity: medium
    issue: Fórmula pactual demasiado rígida en español
    rationale: '''sean para mí un pueblo, y yo sea para ellos Dios'' reproduce rasgos del hebreo, pero en español bíblico natural y fiel se expresa mejor como ''sea mi pueblo, y yo sea su Dios'', sin pérdida de sentido.'
  - severity: low
    issue: Nota al pie con desajuste de número
    rationale: La nota dice 'vaguen de detrás de mí', pero el referente en español es singular ('la casa de Israel'); conviene 'vague detrás de mí' o una formulación impersonal.
  revised_spanish_text: para que la casa de Israel ya no se extravíe de mí[a], ni se contamine más con todas sus rebeliones, sino que sea mi pueblo, y yo sea su Dios, declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: O 'se desvíe de mí'. El hebreo dice literalmente 'vague detrás de mí', un modismo para apartarse de seguir a Yahvé.
    reason: lexical_alternative
