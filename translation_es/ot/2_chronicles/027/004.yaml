translation:
  language: es
  text: Edificó ciudades en la región montañosa de Judá, y en los bosques[a] edificó fortalezas[b] y torres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zonas boscosas» o «espesuras» para «los bosques».
    reason: lexical_alternative
  - marker: b
    text: O «ciudadelas» o «plazas fuertes» para el hebreo traducido aquí como «fortalezas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - ciudades
  lexicon: HALOT
  rationale: עִיר/עָרִים designa asentamientos urbanos; «ciudades» conserva el valor normal del plural y es natural en español histórico.
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: HALOT
  rationale: El verbo hebreo expresa construcción de manera directa. «Edificó» mantiene el tono formal y es plenamente idiomático en un contexto real/arquitectónico.
- source_word: בְּהַר יְהוּדָה
  english_pob_choice: in the hill country of Judah
  chosen_spanish: en la región montañosa de Judá
  alternatives_spanish:
  - en la sierra de Judá
  - en los montes de Judá
  lexicon: HALOT
  rationale: הַר aquí tiene sentido regional, no de una sola montaña. «Región montañosa» transmite mejor ese valor geográfico que un singular literal.
- source_word: חֳרָשִׁים
  english_pob_choice: the forests
  chosen_spanish: los bosques
  alternatives_spanish:
  - las zonas boscosas
  - los terrenos arbolados
  - los bosques
  lexicon: HALOT
  rationale: El término puede referirse a zonas arboladas o forestales. «Bosques» es la equivalencia más clara y natural en español, sin perder la imagen del terreno.
- source_word: בִּירָנִיּוֹת
  english_pob_choice: fortresses
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortalezas
  - ciudadelas
  - castillos
  - bastiones
  lexicon: HALOT
  rationale: El sustantivo apunta a estructuras fortificadas. «Fortalezas» comunica bien el valor defensivo sin introducir matices urbanos demasiado específicos.
- source_word: מִגְדָּלִים
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - torres
  lexicon: HALOT
  rationale: El término corresponde de forma directa a «torres», especialmente en un contexto militar o defensivo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de 2 Crónicas 27:4 y concuerda con el audit trail inglés: ciudades en Judá, construcción en los bosques, y dos tipos de estructuras fortificadas. No se registran revisiones posteriores que alteren la decisión base.'
  spanish_consistency_notes:
  - Se mantiene «Judá» sin artículo añadido, conforme al sintagma geográfico del hebreo.
  - «Región montañosa» evita forzar un singular literal para הַר y preserva el sentido territorial.
  - «Fortalezas» y «torres» distinguen dos clases de construcciones defensivas, como en el hebreo y en la versión inglesa auditada.
