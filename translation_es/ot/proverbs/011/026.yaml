translation:
  language: es
  text: Al que retiene el grano, el pueblo[a] lo maldice, pero la bendición está sobre la cabeza del que lo vende[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alternativamente, לְאֹם puede traducirse «la nación» o «la gente», porque el hebreo puede designar un pueblo o un colectivo público.
    reason: lexical_alternative
  - marker: b
    text: Alternativamente, מַשְׁבִּיר puede traducirse «el que distribuye el grano», aunque en este proverbio el contraste con «retiene» favorece «el que lo vende / lo provee».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹנֵעַ
  english_pob_choice: the one who withholds
  chosen_spanish: al que retiene
  alternatives_spanish:
  - el que se abstiene de
  - el que guarda para sí
  lexicon: HALOT
  rationale: El participio hebreo funciona sustantivamente para describir una conducta continua; «retiene» comunica bien la idea de no soltar el grano, sin sonar excesivamente técnico.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el cereal
  - el trigo
  lexicon: HALOT
  rationale: Aquí בָּר designa el grano en sentido genérico. «El grano» es la opción natural en español y conserva el campo semántico agrícola sin restringirlo a una especie.
- source_word: יִקְּבֻהוּ
  english_pob_choice: curse him
  chosen_spanish: lo maldice
  alternatives_spanish:
  - lo maldiga
  - lo maldicen
  - lo deniegan con maldición
  lexicon: HALOT
  rationale: El verbo expresa maldecir/emitir maldición. En español, el presente gnómico con sujeto colectivo («el pueblo lo maldice») refleja bien el dicho proverbial.
- source_word: לְאֹם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  - la comunidad
  lexicon: HALOT
  rationale: El término puede referirse a un grupo humano colectivo. «El pueblo» mantiene esa referencia social amplia y encaja con la fuerza proverbial del verso.
- source_word: וּבְרָכָה
  english_pob_choice: but blessing
  chosen_spanish: pero la bendición
  alternatives_spanish:
  - y la bendición
  - mas la bendición
  lexicon: HALOT
  rationale: Aunque el hebreo trae una conjunción simple, el contraste del paralelismo antitético queda mejor en español con «pero», sin cambiar el sentido.
- source_word: לְרֹאשׁ
  english_pob_choice: is on the head of
  chosen_spanish: está sobre la cabeza de
  alternatives_spanish:
  - recae sobre la cabeza de
  - descansa sobre la cabeza de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la bendición como algo que se posa sobre la cabeza, en lugar de convertirla en un sentido más abstracto.
- source_word: מַשְׁבִּיר
  english_pob_choice: the one who sells it
  chosen_spanish: del que lo vende
  alternatives_spanish:
  - del que lo distribuye
  - del vendedor de grano
  lexicon: HALOT
  rationale: El participio en este contexto comercial se entiende mejor como vender/proveer grano. «Lo vende» conserva la oposición directa con «retiene» y evita añadir el matiz de limosna o distribución gratuita.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura auditada del POB en inglés y conserva el paralelismo antitético del hebreo. No se detectaron revisiones posteriores que alteren la decisión principal.
  spanish_consistency_notes:
  - Se mantiene «grano» para בָּר conforme al valor genérico del término.
  - Se usa «bendición» en lugar de alternativas como «favor» para conservar el paralelismo nominal del hebreo.
  - Se evita «SEÑOR» o cualquier sustitución reverencial porque el verso no contiene el nombre divino.
  - Se preserva el contraste proverbial entre retener y vender, sin ampliar el sentido a una acción caritativa no exigida por el texto.
