revisions:
- from: Salieron de delante de Hahirot[a] y pasaron por en medio del mar hacia el desierto, y caminaron una jornada de tres días en el desierto de Etam y acamparon en Mará[b].
  to: Salieron de delante de Hahirot[a] y pasaron por en medio del mar hacia el desierto, e hicieron un viaje de tres días[b] en el desierto de Etam y acamparon en Mará.
  rationale: Se corrige el anclaje de la nota alternativa para que recaiga sobre la frase de viaje, no sobre «Mará». También se reemplaza «caminaron una jornada de tres días» por «hicieron un viaje de tres días», que preserva el sentido idiomático de וַיֵּלְכוּ דֶּרֶךְ שְׁלֹשֶׁת יָמִים con mejor español. El resto del versículo puede mantenerse, incluido «de delante de Hahirot» y la transliteración breve del topónimo.
