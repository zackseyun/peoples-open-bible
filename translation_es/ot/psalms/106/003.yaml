translation:
  language: es
  text: Bienaventurados[a] los que guardan justicia y practican rectitud en todo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Felices los que guardan justicia y hacen lo que es recto en todo tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: HALOT
  rationale: El hebreo introduce una bienaventuranza; «Bienaventurados» conserva el tono elevado y el valor declarativo mejor que una opción más psicológica como «Felices».
- source_word: שֹׁמְרֵי
  english_pob_choice: those who keep
  chosen_spanish: los que guardan
  alternatives_spanish:
  - los que observan
  - los que cuidan
  lexicon: HALOT
  rationale: El participio expresa una acción continua. «Guardar» es natural en español para mantener u observar una norma, y comunica bien la idea ética del término.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - lo justo
  lexicon: HALOT
  rationale: En este contexto ético, el término se refiere a conducta justa más que a un veredicto judicial. «Justicia» preserva ese sentido y corresponde al paralelo con «rectitud».
- source_word: עֹשֵׂה
  english_pob_choice: who do
  chosen_spanish: los que practican
  alternatives_spanish:
  - los que hacen
  - los que obran
  lexicon: HALOT
  rationale: El participio singular con valor genérico se expresa naturalmente en español con una relativa plural. «Practican» transmite mejor una conducta habitual que un simple hacer puntual.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: La POB distingue este término del anterior. En español, «rectitud» conserva la idea moral de vida íntegra sin colapsarla con «justicia».
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en cada momento
  lexicon: HALOT
  rationale: La expresión indica continuidad o hábito. «En todo tiempo» mantiene el énfasis formal y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Distinción entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: Render the pair distinctly as 'justice' and 'righteousness.'
  chosen_spanish_reading: Distinguirlos como «justicia» y «rectitud».
  alternative_spanish_readings:
  - Traducir ambos con «justicia»
  - Traducir צְדָקָה como «justicia» también
  rationale: El hebreo usa dos términos emparentados pero no idénticos. Mantenerlos distintos preserva el paralelismo poético y evita borrar una tensión léxica documentada.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Valor de la bienaventuranza inicial
  english_pob_reading: Blessed are
  chosen_spanish_reading: Bienaventurados
  alternative_spanish_readings:
  - Felices
  - Dichosos
  rationale: La apertura funciona como fórmula sapiencial/poética de aprobación divina. «Bienaventurados» refleja mejor ese registro que una emoción subjetiva.
  doctrine_reference: Translation philosophy §2 (Register and genre sensitivity)
translation_notes:
  revision_awareness: El texto inglés auditado permaneció sin cambios en la última revisión; no se registraron revisiones aplicadas. La propuesta española sigue de cerca la distinción auditada entre 'justice' y 'righteousness', pero adapta la segunda a «rectitud» por claridad natural en español.
  spanish_consistency_notes:
  - Se mantiene «justicia» para מִשְׁפָּט, conforme al criterio del proyecto para este campo semántico.
  - Se usa «rectitud» para צְדָקָה con el fin de no colapsar los dos miembros del paralelismo.
  - «En todo tiempo» conserva el matiz habitual/continuo de בְּכָל עֵת.
  - La nota al pie ofrece la alternativa equivalente que el audit trail inglés preserva con 'Happy are' y 'what is right'.
