translation:
  language: es
  text: Pero los impíos son como el mar agitado[a], porque no puede aquietarse, y sus aguas arrojan[b] lodo y cieno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mar turbado». El verbo hebreo puede expresarse de modo más interpretativo como «turbado» o «batido», pero la imagen más literal es la de un mar removido.
    reason: lexical_alternative
  - marker: b
    text: O «echan fuera lodo y cieno».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרְשָׁעִים
  english_pob_choice: But the wicked
  chosen_spanish: Pero los impíos
  alternatives_spanish:
  - Y los impíos
  lexicon: HALOT
  rationale: רְשָׁעִים designa personas impías o malvadas, no una cualidad abstracta. En contexto, el conector puede leerse adversativamente; en español, «Pero» expresa mejor el contraste con la paz del versículo anterior que «Y».
- source_word: כַּיָּם
  english_pob_choice: like the ... sea
  chosen_spanish: como el mar
  alternatives_spanish:
  - como el mar
  lexicon: HALOT
  rationale: El כ comparativo se conserva con «como». En español, «mar» es el equivalente natural de יָם y permite una formulación fluida.
- source_word: נִגְרָשׁ
  english_pob_choice: tossing
  chosen_spanish: agitado
  alternatives_spanish:
  - batido
  - impulsado
  - turbulento
  lexicon: HALOT
  rationale: La raíz גרשׁ comunica la idea de ser empujado, arrojado o expulsado. «Agitado» expresa en español la imagen de un mar removido sin suavizarla con una paráfrasis excesiva; mantiene la tensión entre lo literal y lo idiomático que el POB inglés resolvió con «tossing sea».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la comparación. «Porque» es la causal más natural y clara en español.
- source_word: הַשְׁקֵט
  english_pob_choice: be quiet
  chosen_spanish: aquietarse
  alternatives_spanish:
  - estar quieto
  - estar en calma
  - quedarse quieto
  lexicon: HALOT
  rationale: El verbo שׁקט apunta a quietud, reposo o calma no perturbada. «Aquietarse» preserva el valor verbal y suena natural con «no puede».
- source_word: לֹא יוּכָל
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no puede estar
  lexicon: HALOT
  rationale: Se mantiene la modalización simple de la incapacidad. «No puede» es directo y fiel.
- source_word: וַיִּגְרְשׁוּ
  english_pob_choice: toss up
  chosen_spanish: levantan
  alternatives_spanish:
  - arrojan
  - remueven
  - echan
  lexicon: HALOT
  rationale: Con aguas como sujeto y lodo/cieno como objeto, el verbo expresa el movimiento de expulsar o sacar hacia arriba lo que está debajo. «Levantan» comunica en español ese efecto visible sin forzar una imagen extraña.
- source_word: מֵימָיו
  english_pob_choice: its waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - sus aguas
  - las aguas de él
  lexicon: HALOT
  rationale: El sufijo remite al mar, antecedente inanimado en español; por eso se usa «sus».
- source_word: רֶפֶשׁ
  english_pob_choice: mire
  chosen_spanish: lodo
  alternatives_spanish:
  - barro
  - cieno
  - mire
  lexicon: HALOT
  rationale: רֶפֶשׁ alude a sedimento sucio o lodo removido. «Lodo» es claro y natural en español; además, se coordina bien con «cieno» en la línea siguiente.
- source_word: וָטִיט
  english_pob_choice: and mud
  chosen_spanish: y cieno
  alternatives_spanish:
  - y barro
  - y lodo
  - y barro espeso
  lexicon: HALOT
  rationale: טִיט puede significar barro o barro arcilloso, pero «cieno» encaja mejor con el campo semántico acuoso del versículo y conserva la duplicación de suciedad fangosa que el paralelismo hebreo presenta.
theological_decisions:
- issue: Fuerza contrastiva del conector inicial
  english_pob_reading: But the wicked
  chosen_spanish_reading: Pero los impíos
  alternative_spanish_readings:
  - Y los impíos
  rationale: El contexto contrasta a los impíos con la paz y el reposo de los justos. «Pero» comunica esa oposición sin añadir contenido ajeno al texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imagen del mar en movimiento
  english_pob_reading: the tossing sea
  chosen_spanish_reading: el mar agitado
  alternative_spanish_readings:
  - el mar turbado
  - el mar batido
  - el mar en agitación
  rationale: El hebreo no describe solo un estado interno, sino una masa de agua removida y sin calma. «Agitado» conserva la imagen y evita una explicación excesiva; también respeta la decisión inglesa revisada hacia una imagen más natural del mar inquieto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El inglés POB pasó de «driven sea» a «tossing sea» y de «drive up» a «toss up» por naturalidad y precisión imagética. El español adopta una solución equivalente, con «mar agitado» y «levantan», para mantener la imagen de un mar removido que expulsa lodo y cieno.
  spanish_consistency_notes:
  - Se mantiene «impíos» para רְשָעִים, coherente con el uso bíblico de personas culpables o malvadas.
  - Se traduce יָם por «mar» y no por «océano», ya que el término hebreo es más general.
  - Se evita «SEÑOR» porque no aparece aquí el nombre divino.
  - «Lodo y cieno» conserva el paralelismo de dos sustantivos de suciedad fangosa, sin volverlo demasiado técnico.
