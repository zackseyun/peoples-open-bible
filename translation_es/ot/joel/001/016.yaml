translation:
  language: es
  text: ¿No ha sido cortado el alimento delante de nuestros ojos[a], y de la casa de nuestro Dios[b] la alegría y el regocijo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de nosotros». La expresión hebrea es idiomática para algo que sucede abiertamente y a la vista de todos.
    reason: lexical_alternative
  - marker: b
    text: O «del templo de nuestro Dios». El hebreo dice «de la casa de nuestro Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Is not
  chosen_spanish: ¿No ha sido... ?
  alternatives_spanish:
  - ¿No es... ?
  - ¿Acaso no ha sido... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. En español, «¿No ha sido...?» conserva ese valor interrogativo y la fuerza de lamento sin sonar forzado.
- source_word: נֶגֶד עֵינֵינוּ
  english_pob_choice: before our eyes
  chosen_spanish: delante de nuestros ojos
  alternatives_spanish:
  - ante nuestros ojos
  - en presencia de nosotros
  lexicon: HALOT
  rationale: La expresión es idiomática para algo evidente y público. «Delante de nuestros ojos» mantiene la imagen visible y el tono natural en español.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - el sustento
  lexicon: HALOT
  rationale: El término es general. «Alimento» preserva la amplitud semántica y funciona bien en un contexto de devastación agrícola sin reducirlo solo a una comida puntual.
- source_word: נִכְרָת
  english_pob_choice: cut off
  chosen_spanish: ha sido cortado
  alternatives_spanish:
  - ha sido quitado
  - ha sido destruido
  lexicon: HALOT
  rationale: El pasivo conserva la imagen concreta de corte y la fuerza de juicio implícita en el verbo, sin volverlo demasiado interpretativo.
- source_word: מִבֵּית אֱלֹהֵינוּ
  english_pob_choice: from the house of our God
  chosen_spanish: de la casa de nuestro Dios
  alternatives_spanish:
  - del templo de nuestro Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «casa» como en el hebreo y como en la nota inglesa, evitando imponer «templo» en el texto principal.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: la alegría
  alternatives_spanish:
  - el gozo
  - el regocijo
  lexicon: HALOT
  rationale: En español «alegría» es claro y natural. Conserva el valor básico del sustantivo sin perder la paridad con el segundo miembro.
- source_word: וָגִיל
  english_pob_choice: and gladness
  chosen_spanish: y el regocijo
  alternatives_spanish:
  - y la alegría exultante
  - y el júbilo
  lexicon: HALOT
  rationale: Este término añade un matiz de exultación. «Regocijo» mantiene un nivel más elevado y poético que «alegría», reflejando la intensidad del doblete hebreo.
theological_decisions:
- issue: Alcance sintáctico de la pregunta retórica sobre dos pérdidas coordinadas
  english_pob_reading: The verse asks whether both food and joy/gladness have been cut off, with the second phrase elliptically dependent on the same verbal idea.
  chosen_spanish_reading: La pregunta abarca tanto la desaparición del alimento como la pérdida de la alegría y el regocijo; el segundo miembro queda ligado de manera elíptica al mismo hecho de ser cortado.
  alternative_spanish_readings:
  - El alimento ha sido cortado y, además, la alegría y el regocijo han cesado en la casa de Dios.
  - ¿No ha sido cortado el alimento y también la alegría y el regocijo de la casa de nuestro Dios?
  rationale: La poesía hebrea omite con frecuencia el verbo repetido en el segundo colon. En español, unir ambos miembros bajo una sola pregunta retórica preserva el paralelismo y el lamento por la pérdida de sustento y de celebración cultual.
  doctrine_reference: Poética hebrea; lamento comunitario; culto en la casa de Dios
- issue: Elección de «casa» frente a «templo»
  english_pob_reading: Or 'from the temple of our God.' The Hebrew reads 'from the house of our God.'
  chosen_spanish_reading: Se conserva «casa de nuestro Dios» en el texto principal.
  alternative_spanish_readings:
  - templo de nuestro Dios
  - casa/templo de nuestro Dios
  rationale: La nota inglesa preserva la tensión entre la expresión literal hebrea y su referencia al templo. En español, mantener «casa» resguarda la base textual; la alternativa «templo» queda como posibilidad explicativa.
  doctrine_reference: Lexicografía bíblica; referencia al santuario
- issue: Matiz de שִׂמְחָה y וָגִיל
  english_pob_reading: Or 'joy and rejoicing.' The second term can carry the sense of exultant rejoicing.
  chosen_spanish_reading: «Alegría» y «regocijo» reproducen la pareja de términos y conservan la gradación de gozo intenso.
  alternative_spanish_readings:
  - alegría y júbilo
  - gozo y exultación
  rationale: No conviene aplanar el doblete ni volverlo redundante. «Regocijo» permite mantener una distinción semántica leve y una cadencia poética adecuada en español.
  doctrine_reference: Poética hebrea; semántica de dobletes
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente del POB inglés: no hubo cambios necesarios en el texto fuente; la traducción española se ajusta a la misma lectura óptima-equivalente, manteniendo la pregunta retórica unificada, la expresión literal «casa de nuestro Dios» y la distinción poética entre los dos sustantivos de gozo.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהֵינוּ, conforme al estándar del proyecto.
  - Se conserva «casa» en el texto principal y se reserva «templo» para la nota, siguiendo la tensión documentada en el inglés.
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino יהוה en el versículo.
  - Se mantiene una solución natural en español que no borra la imagen concreta de «cortado» aplicada al alimento.
