translation:
  language: es
  text: Pero solo tus cosas santas que te pertenezcan, y tus ofrendas votivas[a], las llevarás y vendrás al lugar que Yahvé elegirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tus votos”; el hebreo puede referirse tanto a los votos mismos como, en este contexto sacrificial, a las ofrendas presentadas en cumplimiento de esos votos.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: But only
  chosen_spanish: Pero solo
  alternatives_spanish:
  - Solo
  - Pero únicamente
  lexicon: HALOT
  rationale: 'En español, la combinación adversativa-restrictiva mantiene mejor la relación con el contexto previo: no es solo restricción, sino una excepción frente a lo permitido antes. ''Pero solo'' conserva ese matiz sin volverse pesada.'
- source_word: קָדָשֶׁיךָ
  english_pob_choice: your holy things
  chosen_spanish: tus cosas consagradas
  alternatives_spanish:
  - tus cosas santas
  - tus ofrendas consagradas
  lexicon: HALOT
  rationale: El hebreo es amplio y no nombra aquí un tipo específico de ofrenda. 'Consagradas' expresa el sentido de cosas apartadas para Dios y evita reducir indebidamente el término a 'ofrendas'.
- source_word: אֲשֶׁר יִהְיוּ לְךָ
  english_pob_choice: that belong to you
  chosen_spanish: que estén en tu poder
  alternatives_spanish:
  - que son tuyas
  - que te pertenezcan
  lexicon: HALOT
  rationale: La cláusula describe posesión o disponibilidad cultual. 'En tu poder' conserva la relación de pertenencia sin forzar una formulación demasiado jurídica; en español suena natural y no añade más de lo que el hebreo exige.
- source_word: וּנְדָרֶיךָ
  english_pob_choice: and your vow offerings
  chosen_spanish: y tus ofrendas votivas
  alternatives_spanish:
  - y tus votos
  - y lo que has votado
  lexicon: HALOT
  rationale: En este contexto sacrificial, el término puede referirse a votos o a las ofrendas que los cumplen. 'Ofrendas votivas' conserva la ambigüedad documentada y comunica el carácter cultual.
- source_word: תִּשָּׂא
  english_pob_choice: you shall carry
  chosen_spanish: las llevarás
  alternatives_spanish:
  - las cargarás
  - las transportarás
  lexicon: HALOT
  rationale: El verbo significa llevar/cargar. En español, 'las llevarás' es claro, natural y suficientemente concreto para el acto de trasladar los elementos sagrados al santuario central.
- source_word: וּבָאתָ
  english_pob_choice: and come
  chosen_spanish: y vendrás
  alternatives_spanish:
  - y irás
  - y entrarás
  lexicon: HALOT
  rationale: El hebreo añade la acción de acudir al lugar escogido. 'Vendrás' preserva el movimiento hacia ese sitio sin introducir un objeto que no está en el texto.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el lugar señalado
  lexicon: HALOT
  rationale: En Deuteronomio, 'el lugar' es la expresión estable para el sitio de culto central. Se mantiene la forma simple y transparente, como en el original.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: that Yahweh will choose
  chosen_spanish: que Yahvé elegirá
  alternatives_spanish:
  - que Yahvé escogerá
  - que Yahvé habrá de elegir
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el nombre divino: ''Yahvé''. ''Elegirá'' reproduce bien el futuro volitivo del hebreo en esta fórmula deuteronómica.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El paquete de fuente y las pautas del proyecto piden traducir directamente el Tetragrámaton con una forma audible en español, no con una máscara litúrgica. 'Yahvé' es la forma fijada para el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de וּנְדָרֶיךָ en contexto sacrificial
  english_pob_reading: and your vow offerings
  chosen_spanish_reading: y tus ofrendas votivas
  alternative_spanish_readings:
  - y tus votos
  - y lo que has prometido
  rationale: 'La nota inglesa conserva la tensión lexical: puede significar los votos mismos o las ofrendas que los cumplen. En español, ''ofrendas votivas'' mantiene esa amplitud y evita borrar la dimensión sacrificial.'
  doctrine_reference: Nota lexical del POB sobre equivalencia contextual
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la revisión inglesa no modificó el contenido: el texto final mantiene la misma lectura de fondo, con la única tensión lexical documentada en וּנְדָרֶיךָ y la decisión estable del nombre divino. No se detectaron cambios textuales adicionales en la pasada más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología del proyecto para יְהוָה.
  - Se conserva una sintaxis fluida pero cercana al orden y a las relaciones semánticas del hebreo.
  - '''Ofrendas votivas'' se eligió para no resolver prematuramente la ambigüedad de נדרים.'
  - No se introducen términos eclesiales no respaldados por el texto, como 'altar' o 'templo'.
