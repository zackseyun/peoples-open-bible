base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/031.yaml
  text: And Rehoboam slept with his fathers and was buried with his fathers in the city of David[a]. And his mother's name was Naamah the Ammonite[b]. And Abijam his son reigned in his place.
  footnotes:
  - marker: a
    text: Or 'Naamah the Ammonite.' The Hebrew uses a feminine gentilic, explicitly identifying her as an Ammonite woman.
    reason: lexical_alternative
  - marker: b
    text: Abijam is called Abijah in some other passages; this verse specifically reads 'Abijam.'
    reason: alternative_reading
