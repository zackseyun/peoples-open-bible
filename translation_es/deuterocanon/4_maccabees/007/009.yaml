revisions:
- from: Tú[a], padre, confirmaste nuestra norma de buena ley por medio de tu perseverancia hasta la gloria, y, honrando la santidad[b], no la anulaste, y por tus obras verificaste las palabras de la filosofía.
  to: Tú[a], padre, confirmaste nuestra manera de vivir conforme a la ley por medio de tu perseverancia para gloria, y, honrando la santidad, no la anulaste, y por tus obras verificaste las palabras[b] de la filosofía.
  rationale: Se reemplazó «norma de buena ley» por «manera de vivir conforme a la ley» para reflejar con fidelidad εὐνομία como modo de vida obediente a la ley. Se cambió «hasta la gloria» por «para gloria» por mayor naturalidad en español y porque esa alternativa ya está documentada en el audit trail. También se reubicó la nota [b] al sintagma «las palabras de la filosofía», donde corresponde según la evidencia inglesa sobre λόγοι.
