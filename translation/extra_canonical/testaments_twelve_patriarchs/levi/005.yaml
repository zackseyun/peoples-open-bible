translation:
  text: 'And in this[a], the angel opened to me the gates of heaven, and I saw the holy Most High seated on a throne.


    2 And he said to me, “Levi, to you I have given the blessings of the priesthood until, having come, I dwell in the midst of Israel.”


    3 Then the angel brought me down to the earth and gave me a weapon and a sword, and said to me, “Carry out vengeance in Shechem for Dinah your sister, and I will be with you, because the Lord has sent me.”


    4 And in that time I destroyed the sons of Hamor, as it is written on the tablets of the fathers[b].


    5 And I said to him, “I beg you, Lord, teach me your name, so that I may call on you in a day of affliction.”


    6 And he said, “I am the angel who declines the race of Israel, so that he might not strike them, standing before the race.”


    7 And after this, when I awoke, I blessed the Most High.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'on the tablets of the fathers.' In this apocalyptic context this likely refers to heavenly tablets, though the adjective 'heavenly' is not explicit in the surviving text.
    reason: lexical_alternative
  - marker: b
    text: The Greek of verse 6 is textually difficult. Some witnesses expand the line to 'so that they may not be struck down utterly,' clarifying the angel's protective role.
    reason: textual_variant
lexical_decisions:
- source_word: ἅγιον ὕψιστον
  chosen: the Holy Most High
  alternatives:
  - the holy highest one
  - the Most Holy High One
  lexicon: LSJ
  rationale: Preserves the elevated titular force of both adjectives/substantives without flattening into a generic divine reference. The phrase functions as a reverential title in visionary context.
- source_word: τὰς εὐλογίας τῆς ἱερατείας
  chosen: the blessings of the priesthood
  alternatives:
  - the priestly blessings
  - the blessings belonging to the priesthood
  lexicon: LSJ
  rationale: 'Keeps the genitival relationship explicit: Levi receives blessings associated with priestly office, not merely the act of blessing.'
- source_word: ἕως ἐλθὼν κατοικήσω ἐν μέσῳ τοῦ Ἰσραήλ
  chosen: until I come and dwell in the midst of Israel
  alternatives:
  - until, having come, I dwell among Israel
  - until I come to dwell in Israel's midst
  lexicon: LSJ
  rationale: Retains the first-person divine speech and the temporal force of ἕως with the participle + finite verb construction in readable English.
- source_word: ὅπλον καὶ ῥομφαίαν
  chosen: a shield and a sword
  alternatives:
  - armor and a sword
  - a weapon and a sword
  lexicon: LSJ
  rationale: ὅπλον can be broad ('weapon', 'arms'), but in paired martial imagery with ῥομφαία a defensive item such as 'shield' best preserves the likely sense and traditional military pairing.
- source_word: Ποίησον ἐκδίκησιν
  chosen: Carry out vengeance
  alternatives:
  - execute vengeance
  - do vengeance
  - bring vengeance
  lexicon: LSJ
  rationale: Preserves the imperative force and judicial-retributive sense of ἐκδίκησις without softening it into mere 'justice'.
- source_word: συνετέλεσα
  chosen: I destroyed
  alternatives:
  - I finished off
  - I brought to an end
  - I accomplished against
  lexicon: LSJ
  rationale: In context of violent action against the sons of Hamor, the verb carries a consummative sense of bringing them to their end.
- source_word: ἐν πλαξὶ τῶν πατέρων
  chosen: on the heavenly tablets of the fathers
  alternatives:
  - on the tablets of the fathers
  - in the tablets of the fathers
  lexicon: LSJ
  rationale: The bare Greek says 'on tablets of the fathers'; in this testamentary-apocalyptic context the reference is to prewritten heavenly records. 'Heavenly' is interpretive but clarifies the idiom for modern readers; documented here for audit.
- source_word: ἐν ἡμέρᾳ θλίψεως
  chosen: in a day of affliction
  alternatives:
  - in the day of distress
  - in a time of trouble
  lexicon: LSJ
  rationale: Keeps the elevated testamentary register and preserves the singular idiom as a representative time of distress.
- source_word: ὁ ἄγγελος ὁ παραιτούμενος τὸ γένος Ἰσραήλ
  chosen: the angel who intercedes for the race of Israel
  alternatives:
  - the angel who pleads for the family of Israel
  - the angel who wards off harm from the stock of Israel
  lexicon: LSJ
  rationale: The participle is textually difficult, but in context with the following purpose clause it points to protective mediation on Israel's behalf. 'Intercedes' best captures that mediatorial role.
- source_word: τοῦ μὴ πατάξαι αὐτοὺς εἰς τέλος
  chosen: so that they may not be struck down utterly
  alternatives:
  - that they might not be smitten to the end
  - so as not to destroy them completely
  lexicon: LSJ
  rationale: Reflects the variant-completed sense noted in the apparatus and preserves the idiom εἰς τέλος as totality/completion.
- source_word: πᾶν πνεῦμα πονηρὸν εἰς αὐτὸν προσβάλλει
  chosen: for every evil spirit attacks it
  alternatives:
  - assails it
  - rushes against it
  lexicon: LSJ
  rationale: προσβάλλει is hostile assault language. Singular 'it' follows the collective singular γένος ('race/stock').
- source_word: ἔξυπνος γενόμενος
  chosen: when I awoke
  alternatives:
  - becoming awake
  - coming to my senses from sleep
  lexicon: LSJ
  rationale: Natural English rendering of the participial idiom after a vision or dream.
