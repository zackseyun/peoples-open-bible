review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo de 2 Crónicas 11:7 es una lista simple de tres topónimos introducidos por וְ/אֶת en continuidad con el versículo anterior: Beth-zur, Soco y Adullam. El borrador español preserva correctamente la estructura coordinada y el sentido básico de lista de lugares fortificados.'
  spanish_quality_summary: 'El español es legible, pero la puntuación no sigue bien la enumeración auditada: falta la coma antes del segundo elemento y el uso de punto y coma final suena importado del inglés. Además, la nota al pie mezcla innecesariamente formas inglesas y la transliteración «Bet-sur»/«Adulam» no sigue de cerca la evidencia y la convención bíblica más reconocible en español. Conviene ajustar a formas más estándar y mantener una lista natural en español.'
  glossary_alignment: 'No hay términos teológicos sensibles aquí. En nombres propios, el proyecto permite transliteración contextual; sin embargo, «Bet-sur» y «Adulam» son menos estables que «Bet-sur»/«Adulam»? Mejor conservar una forma española bíblicamente reconocible y cercana a la base auditada: «Bet-sur, Soco y Adulam». La nota debe explicar la variación de grafías sin centrarla en el inglés.'
  issues:
  - severity: medium
    issue: Puntuación de la enumeración insuficiente
    rationale: El borrador dice «y Bet-sur[a], Soco y Adulam;». Dado que el hebreo enumera tres lugares y el inglés auditado también marca separación entre los tres, en español es más natural «y Bet-sur[a], Soco y Adulam.» o incluso con coma seriada opcional. El punto y coma final no aporta nada aquí.
  - severity: low
    issue: Nota al pie demasiado anglocentrada
    rationale: La nota dice «la alternativa inglesa “Socoh”», pero la revisión española debe explicar variación de grafías de manera útil para lectores hispanos, sin depender de categorías inglesas.
  - severity: medium
    issue: Conviene normalizar la forma del topónimo inicial con una transliteración bíblica más reconocible
    rationale: La elección «Bet-sur» es defendible, pero la nota actualmente remite al hebreo «Bet-zur», lo que crea una tensión gráfica innecesaria. Debe explicarse mejor la equivalencia o usarse una nota que abarque variaciones de transliteración de modo claro.
  revised_spanish_text: y Bet-sur[a], Soco y Adulam.
  revised_footnotes:
  - marker: a
    text: El hebreo tiene «Beth-zur ... Soco ... Adullam». Las grafías de estos nombres de lugar varían entre traducciones; «Socoh» es una variante común de «Soco».
    reason: lexical_alternative
