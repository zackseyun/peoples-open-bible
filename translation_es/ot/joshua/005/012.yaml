translation:
  language: es
  text: Y el maná cesó al día siguiente, después de que comieron del producto[a] de la tierra. Ya no hubo maná para los hijos de Israel[b], y comieron del producto de la tierra de Canaán aquel año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del producto almacenado de la tierra». El término hebreo puede referirse más específicamente a provisiones guardadas de la cosecha del año anterior.
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Israel» es más literal respecto del hebreo; otras traducciones usan «israelitas» o «pueblo de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבֹּת
  english_pob_choice: ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - se detuvo
  - llegó a su fin
  lexicon: HALOT
  rationale: El verbo expresa cese o interrupción, no observancia del día de reposo. «Cesó» es natural en español y conserva el valor eventivo del hebreo.
- source_word: הַמָּן / מָן
  english_pob_choice: the manna / manna
  chosen_spanish: el maná / maná
  alternatives_spanish:
  - el maná / el maná
  lexicon: HALOT
  rationale: «Maná» es el equivalente estable en español para el alimento del desierto. Con el artículo en la primera ocurrencia y sin él en la segunda se refleja el flujo natural del español sin perder el término identificado.
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - desde el día siguiente
  lexicon: HALOT
  rationale: La expresión temporal se entiende aquí como el día posterior al evento inmediatamente anterior. «Al día siguiente» es idiomático y claro en español.
- source_word: בְּאָכְלָם
  english_pob_choice: after they had eaten
  chosen_spanish: después de que habían comido
  alternatives_spanish:
  - cuando comieron
  - al comer
  lexicon: HALOT
  rationale: La construcción con infinitivo puede expresar temporalidad. En español, «después de que habían comido» reproduce la secuencia sin forzar un calco.
- source_word: מֵעֲבוּר הָאָרֶץ
  english_pob_choice: from the produce of the land
  chosen_spanish: del fruto de la tierra
  alternatives_spanish:
  - del producto de la tierra
  - del grano de la tierra
  - del antiguo producto de la tierra
  lexicon: HALOT
  rationale: עֲבוּר puede referirse al producto/producción agrícola de la tierra. «Fruto de la tierra» es una opción bíblica y comprensible en español para el resultado agrícola del suelo; no añade «antiguo», porque esa matización es posible pero no obligatoria aquí. La posible referencia a provisiones almacenadas se deja abierta en la nota.
- source_word: וְלֹא הָיָה עוֹד
  english_pob_choice: There was no longer
  chosen_spanish: Ya no hubo más
  alternatives_spanish:
  - No hubo más
  - Ya no existía
  lexicon: HALOT
  rationale: La cláusula existencial con עוֹד pide una negación de continuidad. «Ya no hubo más» suena natural en narración histórica y mantiene el sentido de cese permanente.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos de Israelitas
  - para los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: «בנים» puede traducirse literalmente como «hijos» en español, conservando la forma del hebreo. «Hijos de Israel» mantiene la transparencia formal sin reemplazarlo automáticamente por una denominación más interpretativa.
- source_word: וַיֹּאכְלוּ
  english_pob_choice: and they ate
  chosen_spanish: y comieron
  alternatives_spanish:
  - y ellos comieron
  - así que comieron
  lexicon: HALOT
  rationale: La forma narrativa פשוטה del wayyiqtol se vierte con pretérito simple. «Y comieron» es breve y fiel.
- source_word: מִתְּבוּאַת
  english_pob_choice: from the yield
  chosen_spanish: del producto
  alternatives_spanish:
  - de la cosecha
  - del rendimiento
  - del fruto
  lexicon: HALOT
  rationale: תְּבוּאָה designa el producto o rendimiento agrícola. «Producto» preserva la amplitud semántica y evita restringirlo indebidamente a «cosecha» en sentido técnico.
- source_word: אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - la tierra de Canaán
  lexicon: HALOT
  rationale: El constructo nombra el territorio. «La tierra de Canaán» es la correspondencia más directa y transparente en español bíblico.
- source_word: בַּשָּׁנָה הַהִיא
  english_pob_choice: that year
  chosen_spanish: aquel año
  alternatives_spanish:
  - en aquel año
  - ese año
  lexicon: HALOT
  rationale: «Aquel año» reproduce bien el valor temporal y tiene un tono narrativo adecuado en español.
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB sin cambios de revisión aplicados; el sentido general coincide plenamente con el texto fuente y con la decisión inglesa de mantener la secuencia narrativa y la alternativa léxica para עֲבוּר.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se mantuvo la distinción entre «maná» y el resto del léxico agrícola para no diluir el contraste narrativo entre provisión milagrosa y producto de la tierra.
  - Se prefirió una formulación española natural pero suficientemente cercana al hebreo para permitir auditoría léxica.
