translation:
  language: es
  text: Ustedes son mis testigos —declara Yahvé—, y mi siervo, a quien yo escogí, para que conozcan y crean en mí[a] y entiendan que yo soy él[b]. Antes de mí no fue formado ningún dios, y después de mí no habrá ninguno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me crean' o 'confíen en mí'. El hebreo puede expresar creer o confiar con Dios como objeto; 'crean en mí' es la forma más natural en español en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O ''que yo soy el indicado''. El hebreo dice de forma compacta: ''que yo soy él'', fórmula isaiana de autoidentificación divina.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo es elíptico: ''y después de mí no habrá''. El sentido implícito es ''no habrá ningún dios'' o ''no habrá ninguno''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵדַי
  english_pob_choice: my witnesses
  chosen_spanish: mis testigos
  alternatives_spanish:
  - mi testigo
  lexicon: HALOT
  rationale: El hebreo es plural con sufijo de 1.ª persona, por lo que conviene mantener el plural en español. 'Testigos' conserva el valor colectivo del apelativo dirigido a Israel.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé—
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se expresa con un verbo declarativo solemne en español. 'Declara Yahvé' conserva el tono oracular sin ocultar el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el término editorial del proyecto para el nombre divino, preservando la forma transparente en español.
- source_word: וְעַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica de עבד como 'esclavo' según la preferencia del proyecto cuando el contexto no exige atenuación. Aunque el sentido contextual es de pertenencia/covenantalidad, el español 'esclavo' conserva la tensión lexical del hebreo mejor que 'siervo'.
- source_word: אֲשֶׁר בָּחָרְתִּי
  english_pob_choice: whom I have chosen
  chosen_spanish: a quien yo escogí
  alternatives_spanish:
  - a quien yo he escogido
  - que yo escogí
  lexicon: HALOT
  rationale: El relativo identifica al esclavo/siervo elegido. El pretérito simple español expresa la elección pasada con resultado vigente sin forzar el aspecto.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce la cláusula de propósito en forma natural y precisa en español.
- source_word: תֵּדְעוּ
  english_pob_choice: you may know
  chosen_spanish: conozcan
  alternatives_spanish:
  - sepan
  lexicon: HALOT
  rationale: El imperfecto final de propósito se vierte con presente de subjuntivo en español. 'Conozcan' mantiene la progresión cognitiva y el plural concordante con el sujeto.
- source_word: וְתַאֲמִינוּ לִי
  english_pob_choice: and believe in me
  chosen_spanish: y crean en mí
  alternatives_spanish:
  - y crean a mí
  - y confíen en mí
  lexicon: HALOT
  rationale: La revisión inglesa optó por 'believe in me' para reflejar el hebreo הֶאֱמִין לְ con לִי. En español, 'crean en mí' es la expresión más natural para conservar la relación personal de confianza/fe, sin perder la fuerza del objeto directo-relacional del hebreo.
- source_word: וְתָבִינוּ
  english_pob_choice: and understand
  chosen_spanish: y entiendan
  alternatives_spanish:
  - y comprendan
  lexicon: HALOT
  rationale: '''Entiendan'' reproduce el tercer miembro de la tríada cognitiva en un español claro y actual.'
- source_word: כִּי אֲנִי הוּא
  english_pob_choice: that I am he
  chosen_spanish: que yo soy él
  alternatives_spanish:
  - que yo soy
  - que yo soy el que soy
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática y su ambigüedad reverente. 'Yo soy él' mantiene el hebreo sin expandirlo hacia formulaciones más interpretativas.
- source_word: לְפָנַי
  english_pob_choice: Before me
  chosen_spanish: Delante de mí
  alternatives_spanish:
  - Antes de mí
  lexicon: HALOT
  rationale: El adverbio temporal permite ambas posibilidades, pero en español 'delante de mí' conserva mejor el valor de precedencia sin sonar forzado en esta construcción.
- source_word: לֹא נוֹצַר אֵל
  english_pob_choice: no god was formed
  chosen_spanish: no fue formado ningún dios
  alternatives_spanish:
  - no se formó ningún dios
  - ningún dios fue formado
  lexicon: HALOT
  rationale: Se mantiene la pasiva del hebreo y el sustantivo común 'dios' en minúscula por contraste polémico. 'Fue formado' refleja con claridad el verbo יצר sin suavizarlo.
- source_word: וְאַחֲרַי לֹא יִהְיֶה
  english_pob_choice: and after me there will be none
  chosen_spanish: y después de mí no habrá ninguno
  alternatives_spanish:
  - y después de mí no habrá ningún dios
  - y tras mí no existirá ninguno
  lexicon: HALOT
  rationale: El hebreo es elíptico; se preserva esa elipsis con 'ninguno', como en el audit trail inglés, evitando añadir explícitamente 'dios' donde el texto lo deja implícito.
theological_decisions:
- issue: Referencia de 'mi esclavo/siervo'
  english_pob_reading: Collective reference to Israel/Jacob in this immediate context
  chosen_spanish_reading: Referencia colectiva a Israel/Jacob en este contexto inmediato
  alternative_spanish_readings:
  - figura individual del siervo
  - representante profético
  rationale: El destinatario es plural ('ustedes') y el paralelismo interno favorece una designación colectiva. Se conserva el singular hebreo 'mi esclavo' sin imponer una lectura mesiánica que el versículo no exige por sí mismo.
  doctrine_reference: Preservar la tensión teológica; no resolverla de antemano.
- issue: Fórmula 'כִּי אֲנִי הוּא'
  english_pob_reading: Retain the idiomatic 'I am he'
  chosen_spanish_reading: Conservar la fórmula idiomática 'yo soy él'
  alternative_spanish_readings:
  - yo soy
  - yo soy el que soy
  rationale: La expresión es teológicamente densa, pero la traducción debe seguir siendo sobria y fiel al hebreo. 'Yo soy él' conserva la autoidentificación compacta sin introducir asociaciones no explicitadas aquí.
  doctrine_reference: Primacía del original; mantener la tensión textual.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail inglés que ajustó 'believe me' a 'believe in me' para reflejar mejor לִי con הֶאֱמִין לְ. La redacción española adopta 'crean en mí' para reflejar esa misma decisión sin perder naturalidad idiomática. También se respetó la preferencia del proyecto por Yahvé y se mantuvo la tensión léxica de עבד como 'esclavo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el nombre divino.
  - 'Se preserva el paralelismo verbal: conozcan / crean en mí / entiendan.'
  - Se mantiene el sustantivo 'dios' en minúscula por contraste con Yahvé.
  - La elipsis final se conserva con 'ninguno' sin explicitar más de lo que permite el hebreo.
