translation:
  language: es
  text: 'Entonces Jeremías dijo a todo el pueblo y a todas las mujeres[a]: «Escuchen la palabra de Yahvé, todo Judá que está en la tierra de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los judeanos que están en la tierra de Egipto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces ... dijo» conserva la secuencia y suena natural en español sin perder el valor de continuidad.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremiah
  lexicon: HALOT
  rationale: En español bíblico el nombre del profeta se expresa de forma estable como «Jeremías», que comunica claramente la referencia personal.
- source_word: אֶל כָּל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a la asamblea
  lexicon: HALOT
  rationale: עָם denota el colectivo del pueblo; «pueblo» mantiene el sentido comunitario y el tono profético del original.
- source_word: וְאֶל כָּל הַנָּשִׁים
  english_pob_choice: and to all the women
  chosen_spanish: y a todas las mujeres
  alternatives_spanish:
  - y a todas las esposas
  lexicon: HALOT
  rationale: נָשִׁים aquí contrasta con «todo el pueblo» y el contexto inmediato apunta a mujeres, no específicamente a esposas; por eso «mujeres» es la opción más fiel.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchad
  lexicon: HALOT
  rationale: El imperativo plural profético se expresa de manera natural con «Escuchen»; conserva el llamado solemne sin sonar arcaico.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» reproduce el sustantivo דְּבַר y mantiene la fórmula profética reconocible; «Yahvé» sigue el criterio del proyecto para el Tetragrámaton.
- source_word: כָּל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - todos los judíos
  - todos los judeanos
  lexicon: HALOT
  rationale: La construcción colectiva funciona como designación del grupo de Judá; «todo Judá» preserva la forma compacta del hebreo sin explicitar más de lo que el texto exige.
- source_word: אֲשֶׁר בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: who are in the land of Egypt
  chosen_spanish: los que están en la tierra de Egipto
  alternatives_spanish:
  - que están en la tierra de Egipto
  - los cuales están en la tierra de Egipto
  lexicon: HALOT
  rationale: El relativo hebreo se vierte de modo directo y claro. «Tierra de Egipto» conserva la expresión geográfica plena del original, y «los que están» evita una paráfrasis excesiva.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se translitera como «Yahvé» para conservar el nombre personal divino y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado auditado más reciente del POB en inglés, que no registró cambios de revisión y mantiene alto acuerdo con la evaluación externa. Se conserva la estructura exhortativa, la distinción entre «pueblo» y «mujeres», y la fórmula profética «palabra de Yahvé» sin ampliar el sentido más allá del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, en coherencia con el estándar del proyecto.
  - «Judá» se conserva como colectivo nacional/étnico, sin cambiarlo por «judeanos» en el texto principal.
  - La nota alternativa aclara la ambigüedad natural de כָּל יְהוּדָה sin imponer una lectura exclusiva.
