base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/032.yaml
  text: And you will bear no sin because of it when you lift up its best part from it[a]. You shall not profane the holy things of the sons of Israel[b], and you shall not die.
  footnotes:
