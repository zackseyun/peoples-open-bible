translation:
  text: Do not multiply words with a fool[a], and do not go to an unintelligent man. Keep away from him, so that you may not have trouble and may not be defiled by his shaking-off. Turn aside from him, and you will find rest, and you will not grow weary because of his madness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek term rendered 'his shaking-off' is rare and difficult; it may refer more broadly to the fool's disruptive outbursts or the contaminating effect of his behavior.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ἄφρονος
  chosen: with a fool
  alternatives:
  - with a senseless person
  - with a foolish man
  lexicon: BDAG
  rationale: ἄφρων commonly denotes a foolish or senseless person in wisdom literature. 'Fool' is concise, idiomatic, and preserves the moral-wisdom category better than a softer paraphrase.
- source_word: μὴ πληθύνῃς λόγον
  chosen: do not multiply words
  alternatives:
  - do not talk much
  - do not prolong conversation
  lexicon: BDAG
  rationale: The Greek is literally 'do not multiply word/speech.' This idiom is preserved in understandable English to retain the proverbial tone while still being readable.
- source_word: πρὸς ἀσύνετον μὴ πορεύου
  chosen: do not go to an unintelligent man
  alternatives:
  - do not approach a senseless person
  - do not associate with an undiscerning man
  lexicon: BDAG
  rationale: ἀσύνετος refers to one lacking understanding or discernment. 'Unintelligent' here conveys lack of sense rather than low IQ in a modern technical sense, though 'senseless' was considered. 'Go to' reflects πορεύου more directly than a more interpretive 'associate with.'
- source_word: φύλαξαι ἀπʼ αὐτοῦ
  chosen: keep away from him
  alternatives:
  - guard yourself from him
  - beware of him
  lexicon: BDAG
  rationale: The middle/imperatival sense calls for self-protective distance. 'Keep away from him' is natural English and captures the practical warning.
- source_word: κόπον ἔχῃς
  chosen: have trouble
  alternatives:
  - have toil
  - suffer hardship
  lexicon: BDAG
  rationale: κόπος can mean toil, trouble, or wearisome effort. In this context of dealing with a fool, 'have trouble' communicates the resulting burden in idiomatic English.
- source_word: μολυνθῇς
  chosen: be defiled
  alternatives:
  - be polluted
  - be stained
  lexicon: BDAG
  rationale: μολύνω can denote contamination or defilement, including moral/social contamination. 'Be defiled' preserves the stronger ethical coloring without overexplaining it.
- source_word: ἐν τῷ ἐντιναγμῷ αὐτοῦ
  chosen: by his shaking-off
  alternatives:
  - by his outburst
  - by his splattering
  - by his violent tossing
  lexicon: LSJ
  rationale: The noun is rare and difficult; from the sense of shaking off or flinging about. A relatively literal rendering is retained because the exact nuance is uncertain, and the image may suggest the fool's disruptive, contaminating behavior. A more interpretive gloss would overstate certainty.
- source_word: ἔκκλινον ἀπʼ αὐτοῦ
  chosen: turn aside from him
  alternatives:
  - avoid him
  - turn away from him
  lexicon: BDAG
  rationale: ἔκκλινον has the sense of turning aside or avoiding. 'Turn aside from him' keeps the vivid directional imagery and matches wisdom-style exhortation.
- source_word: ἀνάπαυσιν
  chosen: rest
  alternatives:
  - relief
  - repose
  lexicon: BDAG
  rationale: ἀνάπαυσις is straightforwardly 'rest' or 'relief.' 'Rest' is the most natural and broadly suitable choice here.
- source_word: οὐ μὴ ἀκηδιάσῃς
  chosen: you will not grow weary
  alternatives:
  - you will not be distressed
  - you will not become disgusted
  lexicon: LSJ
  rationale: ἀκηδιάω can suggest weariness, listlessness, or vexation. In context, the point is freedom from the draining effect of the fool's behavior; 'grow weary' captures that result in clear English.
- source_word: ἐν τῇ ἀπονοίᾳ αὐτοῦ
  chosen: because of his madness
  alternatives:
  - in his folly
  - because of his senselessness
  lexicon: LSJ
  rationale: ἀπόνοια can denote folly, senselessness, or even madness. 'Madness' preserves the stronger force of the Greek, while the causal English 'because of' makes the relation clear.
