translation:
  language: es
  text: Porque todos sus días son dolores[a], y su ocupación es vexación; aun en la noche su corazón no se recuesta[b]. También esto es vapor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus dolores». El hebreo está en plural y puede leerse como padecimientos continuos; se conserva el plural para reflejar la acumulación de aflicciones.
    reason: lexical_alternative
  - marker: b
    text: 'O «su corazón no descansa». El hebreo dice literalmente: «su corazón no se recuesta», expresando inquietud interior que continúa durante la noche.'
    reason: lexical_alternative
  - marker: c
    text: O «vanidad» o «aliento». El hebreo הֶבֶל se traduce aquí como «vapor» para preservar la imagen recurrente del libro de lo fugaz e insustancial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la reflexión anterior. En español, «Porque» comunica con naturalidad la relación causal/expositiva que el hebreo marca aquí, sin perder el flujo discursivo.
- source_word: כָל יָמָיו
  english_pob_choice: all his days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - toda su vida
  - todos los días de su vida
  lexicon: HALOT
  rationale: Mantiene el giro concreto del hebreo y sigue de cerca la estructura de la fuente, conservando el ritmo sentencioso de Qohelet.
- source_word: מַכְאֹבִים
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - penas
  - sufrimientos
  lexicon: HALOT
  rationale: El plural hebreo expresa padecimientos o dolores reales. «Dolores» conserva el plural y la carga de aflicción sin volver el verso más interpretativo de lo que permite la fuente.
- source_word: וָכַעַס
  english_pob_choice: vexation
  chosen_spanish: vejación
  alternatives_spanish:
  - vexación
  - frustración
  - enojo
  lexicon: HALOT
  rationale: En Eclesiastés, el término puede denotar irritación interior, aflicción o provocación. «Vejación» intenta preservar esa tensión sin reducirla a simple enojo; «vexación» es una alternativa más cercana al inglés POB.
- source_word: עִנְיָנוֹ
  english_pob_choice: his occupation
  chosen_spanish: su ocupación
  alternatives_spanish:
  - su tarea
  - su trabajo
  - su negocio
  lexicon: HALOT
  rationale: La revisión inglesa pasó de «work» a «occupation» para reflejar mejor el campo semántico de עִנְיָנוֹ. «Ocupación» conserva ese matiz de actividad/quehacer habitual en un registro formal y claro.
- source_word: גַּם בַּלַּיְלָה
  english_pob_choice: even in the night
  chosen_spanish: aun en la noche
  alternatives_spanish:
  - incluso de noche
  - hasta en la noche
  lexicon: HALOT
  rationale: «Aun» reproduce la fuerza aditiva/enfática de גַּם. «En la noche» sigue de cerca el hebreo con una formulación natural en español.
- source_word: לֹא שָׁכַב לִבּוֹ
  english_pob_choice: his heart does not lie down
  chosen_spanish: su corazón no se recuesta
  alternatives_spanish:
  - su corazón no descansa
  - su mente no se aquieta
  lexicon: HALOT
  rationale: 'La fuente es literalmente metafórica: «no se recuesta». Se conserva la imagen corporal del hebreo para no borrar la tensión entre descanso físico e inquietud interior. «Corazón» mantiene el valor antropológico de לֵב como centro interior.'
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  lexicon: HALOT
  rationale: «Corazón» es la traducción fuente-transparente y en español bíblico puede abarcar pensamiento, voluntad e ինտerioridad. Se evita sustituirlo por «mente» para no estrechar el sentido hebreo.
- source_word: גַּם זֶה
  english_pob_choice: This too
  chosen_spanish: También esto
  alternatives_spanish:
  - Esto también
  - Aun esto
  lexicon: HALOT
  rationale: Reproduce la fórmula recurrente de Qohelet con una solución natural en español y mantiene la fuerza aditiva del hebreo.
- source_word: הֶבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  - futilidad
  lexicon: HALOT
  rationale: Se conserva «vapor» por coherencia con la decisión auditada del inglés POB, preservando la imagen de lo transitorio e insustancial. «Vanidad» sería la opción tradicional, pero oscurece el valor metafórico primario.
theological_decisions:
- issue: Sentido antropológico de לִבּוֹ como centro interior
  english_pob_reading: his heart does not lie down
  chosen_spanish_reading: su corazón no se recuesta
  alternative_spanish_readings:
  - su corazón no descansa
  - su mente no se aquieta
  rationale: La imagen hebrea no habla solo de sueño físico, sino de inquietud interior persistente. Mantener «corazón» y la metáfora de «recostarse» preserva esa tensión sin convertirla en una explicación psicológica moderna.
  doctrine_reference: 'Antropología bíblica: el corazón como sede del pensamiento y la voluntad, no solo de los sentimientos.'
- issue: Valor de הֶבֶל al final del verso
  english_pob_reading: This too is vapor
  chosen_spanish_reading: También esto es vapor
  alternative_spanish_readings:
  - También esto es vanidad
  - También esto es aliento
  rationale: «Vapor» conserva la imagen de fugacidad e insustancialidad que el POB inglés documenta. Se evita «vanidad» por su fuerte tradición eclesiástica, que puede desplazar el matiz imagético del hebreo.
  doctrine_reference: Tema sapiencial de la transitoriedad y la insuficiencia de los logros humanos.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: en particular, la revisión de עִנְיָנוֹ de «work» a «occupation» se reflejó con «ocupación». También se preservó la elección de «vapor» para הֶבֶל y la metáfora literal de לֹא שָׁכַב לִבּוֹ, con una nota alternativa en español para el posible sentido de «descansa».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio, sin depender de fórmulas tradicionales que oculten la imagen hebrea.
  - Se conservaron los plurales y la secuencia breve del hebreo para respetar el tono sentencioso de Eclesiastés.
  - «Corazón» se usa de manera consistente como traducción de לֵב, sin sustituirlo por «mente».
