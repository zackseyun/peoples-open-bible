base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/025/015.yaml
  text: 'Thus says the Lord GOD: Because the Philistines acted in vengeance and took revenge with contempt in the soul[a], to destroy with everlasting enmity[b],'
  footnotes:
  - marker: a
    text: Or 'with scorn in the soul,' 'with contempt from the heart.' The Hebrew expression combines contempt with an inner, whole-person disposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'with ancient enmity' or 'with perpetual hostility.' The Hebrew עוֹלָם can denote long-standing antiquity or enduring perpetuity depending on context.
    reason: lexical_alternative
