translation:
  language: es
  text: Porque él es un Dios de justicia[a], y con él no hay parcialidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego suministrado para este versículo dice otra oración: «Muchas veces me vi en peligro de muerte, y fui librado por causa de estas cosas», lo que indica un desajuste textual o de numeración en este lugar. Esta traducción sigue el testimonio hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: כי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal de la afirmación anterior. «Porque» conserva la fuerza causal de כי de forma natural en español bíblico moderno.
- source_word: אלהי
  english_pob_choice: God of
  chosen_spanish: un Dios de
  alternatives_spanish:
  - el Dios de
  - Dios de
  lexicon: HALOT
  rationale: El hebreo constructo con משפט pide una frase predicativa. En español, «un Dios de» refleja mejor la estructura nominal sin forzar un artículo definido que el hebreo no exige aquí.
- source_word: משפט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - rectitud
  lexicon: HALOT
  rationale: En este contexto, el término expresa el carácter moral y judicial de Dios, base para rechazar soborno y favoritismo. «Justicia» es la opción más clara y fiel en español.
- source_word: אין עמו
  english_pob_choice: with him there is no
  chosen_spanish: con él no hay
  alternatives_spanish:
  - con él no existe
  - en él no hay
  lexicon: HALOT
  rationale: 'La locución idiomática hebrea se vierte de manera natural en español como una negación de presencia o pertenencia: «con él no hay».'
- source_word: משוא פנים
  english_pob_choice: partiality
  chosen_spanish: parcialidad
  alternatives_spanish:
  - favoritismo
  - acepción de personas
  lexicon: HALOT
  rationale: «Parcialidad» comunica de modo breve y actual la idea bíblica de favoritismo judicial o trato desigual por estatus, manteniendo el tono jurídico del contexto.
theological_decisions:
- issue: Cómo expresar משפט en una afirmación sobre el carácter de Dios
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - juicio
  - rectitud
  rationale: La frase no se limita a la acción de juzgar, sino que describe quién es Dios en cuanto a su modo de actuar. «Justicia» conserva ese valor ético-jurídico y funciona bien en español contemporáneo.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave, o excepción documentada'
- issue: Manejo de la discrepancia textual con el griego suministrado
  english_pob_reading: Translate from the surviving Hebrew witness and note the Greek mismatch as a textual issue
  chosen_spanish_reading: Traducir el testimonio hebreo conservado y señalar la discrepancia griega como variante textual
  alternative_spanish_readings:
  - Conflar hebreo y griego en una sola forma
  - Traducir solo el griego transmitido
  rationale: El hebreo de esta ubicación está disponible y el audit trail lo trata como testimonio principal, mientras que el griego dado corresponde a otra frase. La traducción española sigue el hebreo y preserva honestamente la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar con honestidad la incertidumbre de las fuentes'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente sin cambios sustantivos: el inglés POB y el control cruzado coinciden en traducir el hebreo conservado, y la discrepancia con el griego se mantiene como nota textual.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אלהים/אלהי y «justicia» para משפט, conforme a las convenciones del proyecto.
  - Se evita «SEÑOR» porque el texto no contiene יהוה ni un sustituto requerido por el contexto.
  - «Parcialidad» preserva el sentido jurídico de משוא פנים sin introducir formulaciones eclesiásticas ajenas al hebreo.
