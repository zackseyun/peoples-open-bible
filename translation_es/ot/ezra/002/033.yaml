translation:
  language: es
  text: 'Los hijos de[a] Lod[b], Hadid y Ono: setecientos veinticinco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los descendientes de Lod, Hadid y Ono». En esta lista de repatriados, «hijos de» puede señalar un grupo familiar o comunitario más amplio, no solo hijos varones inmediatos.'
    reason: lexical_alternative
  - marker: b
    text: Lod es conocido después como Lida.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hombres de
  lexicon: HALOT
  rationale: En listas censales y genealógicas, בני puede designar un grupo familiar o de pertenencia más amplio que los hijos inmediatos. "Hijos de" conserva la forma del hebreo y su ambigüedad de linaje/comunidad; "descendientes de" explicita esa amplitud pero suaviza la fórmula. "Hombres de" sería menos fiel al valor genealógico de la construcción.
- source_word: לֹד
  english_pob_choice: Lod
  chosen_spanish: Lod
  alternatives_spanish:
  - Lida
  lexicon: HALOT
  rationale: Es un nombre de lugar y se translitera directamente. Se prefiere "Lod" por fidelidad al hebreo; "Lida" o "Lydda" reflejan formas posteriores o adaptadas, no la forma del texto base.
- source_word: חָדִיד
  english_pob_choice: Hadid
  chosen_spanish: Hadid
  alternatives_spanish:
  - Jadid
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la transliteración cercana al hebreo. "Jadid" sería una adaptación ortográfica hispana posible, pero menos transparente para el audit trail.
- source_word: וְאוֹנוֹ
  english_pob_choice: and Ono
  chosen_spanish: y Ono
  alternatives_spanish:
  - e Ono
  lexicon: HALOT
  rationale: La waw conjuntiva se rinde con "y" como coordinación normal en español. Se evita "e" porque el nombre no comienza con sonido i inicial.
- source_word: שְׁבַע מֵאוֹת עֶשְׂרִים וַחֲמִשָּׁה
  english_pob_choice: seven hundred twenty-five
  chosen_spanish: setecientos veinticinco
  alternatives_spanish:
  - setecientos y veinticinco
  lexicon: HALOT
  rationale: La secuencia numérica hebrea expresa el total 725. En español moderno se formula como "setecientos veinticinco" sin "y" intermedio entre centenas y decenas, para mantener naturalidad y precisión numérica.
theological_decisions:
- issue: Valor amplio de "hijos de" en una lista de retorno
  english_pob_reading: In this returnee list, 'sons of' can denote a broader family or community grouping, not only immediate male children.
  chosen_spanish_reading: En esta lista de repatriados, "hijos de" puede designar un linaje, clan o comunidad asociada al lugar, no solo hijos varones inmediatos.
  alternative_spanish_readings:
  - Los descendientes de Lod, Hadid y Ono
  - La gente de Lod, Hadid y Ono
  rationale: El hebreo בני en contextos censales suele funcionar como marcador de pertenencia grupal. Mantener "hijos de" preserva la formulación del texto y deja visible la amplitud semántica; la nota aclara que no debe leerse de manera restrictivamente biológica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se revisó la correspondencia con el hebreo masorético y con el cierre del verso: el texto nombra tres localidades y da el total 725. La versión inglesa auditada no añade variantes textuales, por lo que no se requiere nota de variante. Se mantuvo la estructura breve del verso y se trasladó la ambigüedad de בני mediante una nota lexical.'
  spanish_consistency_notes:
  - Se usa «hijos de» de manera consistente con el valor grupal documentado en el audit trail, no como traducción biológica restringida.
  - Se transliteran los topónimos sin sustituirlos por formas tradicionales posteriores.
  - El número se presenta en palabras, como en el registro bíblico narrativo, manteniendo el total exacto.
