translation:
  language: es
  text: y pan sin levadura[a], y tortas sin levadura mezcladas con aceite, y obleas sin levadura untadas con aceite[b]; de flor de harina de trigo las harás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «panes sin levadura»; el hebreo también puede sugerir una forma más cercana a panes o tortas ácimas.
    reason: lexical_alternative
  - marker: b
    text: O «ungidas con aceite»; el verbo es el habitual para «ungir», pero aquí describe la preparación de las obleas, por eso «untadas con aceite» suena más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: pan sin levadura
  alternatives_spanish:
  - pan ácimo
  - pan sin levadura hecho
  lexicon: HALOT
  rationale: En español, «pan sin levadura» expresa con naturalidad la cualidad ritual del alimento y conserva la especificidad de que no lleva levadura, sin cargar con un tecnicismo innecesario.
- source_word: חַלֹּת מַצֹּת
  english_pob_choice: unleavened cakes
  chosen_spanish: tortas sin levadura
  alternatives_spanish:
  - tortas ácimas
  - bollos sin levadura
  lexicon: HALOT
  rationale: La forma hebrea puede designar una pieza de pan con forma de torta o torta redonda; «tortas» distingue este elemento del «pan» general y mantiene la diferencia de forma que el texto sugiere.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezcladas con aceite
  alternatives_spanish:
  - amasadas con aceite
  - mezcladas en aceite
  lexicon: HALOT
  rationale: El participio indica mezcla o incorporación con aceite. «Mezcladas con aceite» es fiel y claro en español, sin forzar una imagen más técnica que el contexto no exige.
- source_word: רְקִיקֵי מַצּוֹת
  english_pob_choice: unleavened wafers
  chosen_spanish: hojuelas sin levadura
  alternatives_spanish:
  - tortas delgadas sin levadura
  - obleas sin levadura
  lexicon: HALOT
  rationale: רָקִיק sugiere algo delgado, fino o crujiente. «Hojuelas» comunica la delgadez mejor que «tortas» y permite conservar el contraste con las tortas anteriores; «obleas» sería posible, pero puede sonar más litúrgico o eucarístico en español.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  english_pob_choice: spread with oil
  chosen_spanish: esparcidas con aceite
  alternatives_spanish:
  - untadas con aceite
  - ungidas con aceite
  lexicon: HALOT
  rationale: Aunque la raíz puede evocar «ungir», aquí la POB inglesa opta por una acción culinaria más natural. «Esparcidas con aceite» refleja bien esa preparación y evita introducir una resonancia cultual que el contexto inmediato no requiere.
- source_word: סֹלֶת חִטִּים
  english_pob_choice: fine wheat flour
  chosen_spanish: de flor de harina de trigo
  alternatives_spanish:
  - de harina fina de trigo
  - de harina selecta de trigo
  lexicon: HALOT
  rationale: «Flor de harina» es la forma española natural para סֹלֶת y mantiene la calidad fina de la harina; «de trigo» conserva חִטִּים sin perder fluidez.
- source_word: תַּעֲשֶׂה אֹתָם
  english_pob_choice: you shall make them
  chosen_spanish: las harás
  alternatives_spanish:
  - las prepararás
  - deberás hacerlas
  lexicon: HALOT
  rationale: El verbo está en segunda persona masculina singular con fuerza prescriptiva. «Las harás» conserva la instrucción directa y evita una perífrasis innecesaria.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «anointed with oil» por «spread with oil» para hacer más natural la descripción de las obleas. El español sigue esa revisión y evita «ungidas» en el texto principal, aunque la nota conserva la alternativa léxica.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de tres elementos con levadura cero explícita: pan, tortas y hojuelas.'
  - «Flor de harina de trigo» preserva tanto la calidad de la harina como el tipo de grano.
  - Se evitó «Cristo/SEÑOR» o equivalentes porque el versículo no contiene referencias teológicas de ese tipo.
  - La sintaxis final reproduce la instrucción prescriptiva del hebreo con economía y claridad.
