translation:
  language: es
  text: Den gracias al Dios de los dioses[a], porque su amor fiel[b] es para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios por encima de todos los dioses». El hebreo dice literalmente «Dios de dioses», una expresión idiomática de supremacía.
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce el hebreo hesed, que suele referirse al amor leal y de pacto; también puede entenderse como «misericordia» o «fidelidad de pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Den alabanza
  lexicon: HALOT
  rationale: El imperativo plural de ידה en hifil puede expresar dar gracias o alabar. «Den gracias» conserva bien el impulso exhortativo del refrán de Salmo 136 y suena natural en español actual.
- source_word: לֵאלֹהֵי הָאֱלֹהִים
  english_pob_choice: to the God of gods
  chosen_spanish: al Dios de los dioses
  alternatives_spanish:
  - al Dios por encima de todos los dioses
  - al más grande de los dioses
  lexicon: HALOT
  rationale: La cadena constructa es literalmente «Dios de dioses». Se mantiene la formulación directa para preservar el tono exaltado e idiomático del hebreo sin convertirlo en explicación interpretativa.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación. «Porque» expresa de modo claro y natural la relación causal en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: 'En hebreo la frase es preposicional y forma un enunciado nominal: «para siempre». En español, puede ligarse naturalmente al predicado implícito de la cláusula sin añadir una expansión innecesaria.'
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor fiel
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su lealtad de pacto
  lexicon: HALOT
  rationale: חסד abarca amor leal, benevolencia y fidelidad de pacto. «Amor fiel» comunica bien esa combinación en español y evita la rigidez de una sola noción como «misericordia».
theological_decisions:
- issue: Cómo traducir la expresión «Dios de los dioses»
  english_pob_reading: Retain the literal exalted title 'God of gods' as a statement of YHWH's supremacy.
  chosen_spanish_reading: Mantener «el Dios de los dioses» como título exaltado que afirma la supremacía de Yahvé.
  alternative_spanish_readings:
  - Dios por encima de todos los dioses
  - el más grande de los dioses
  rationale: El hebreo usa una fórmula idiomática de supremacía. La versión literal en español conserva la retórica del texto y no obliga a suavizar la expresión con una paráfrasis interpretativa.
  doctrine_reference: La traducción busca preservar el sentido llano del texto sin añadir aclaraciones doctrinales que el versículo no formula.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente más reciente; el juicio de alta concordancia confirma que no se requieren cambios respecto del criterio base. La redacción española mantiene la misma decisión semántica y el mismo equilibrio de literalidad/idiomaticidad del POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta serie cuando aparece el nombre divino explícito; aquí el versículo no lo contiene, por lo que no se introduce.
  - «Dios» se mantiene para אֱלֹהִים, y la forma plural figurada «de los dioses» preserva la construcción hebrea.
  - «Amor fiel» se eligió para חסד por claridad natural en español, sin perder la dimensión de lealtad de pacto.
  - 'El orden del verso sigue la estructura poética del hebreo: exhortación + destinatario + razón.'
