    issue: Falta la nota sobre la lectura alternativa de נַעֲרָן ('Naarah').
    rationale: El inglés POB documenta explícitamente esta alternativa y el hebreo auditado la justifica como tradición relacionada; debe preservarse en español.
  - severity: medium
    issue: Se añadió una nota cultural redundante en 'Siquem y sus aldeas' que no corresponde al aparato auditado.
    rationale: La explicación del modismo 'daughter towns' ya queda cubierta con una sola nota cultural; repetirla en Siquem añade ruido y desplaza la nota necesaria sobre Naarán.
  - severity: low
    issue: '''Lugares de habitación'' suena poco idiomático para מֹשְׁבוֹתָם en una lista territorial.'
    rationale: En español bíblico moderno y claro, 'asentamientos' comunica mejor sitios habitados dentro de una posesión tribal, en línea con el sentido del hebreo y la decisión inglesa 'settlements'.
  revised_spanish_text: Y sus posesiones y sus asentamientos fueron Betel y sus aldeas[b], y al oriente Naarán[a], y al occidente Gezer y sus aldeas, y Siquem y sus aldeas, hasta Ayyah[c] y sus aldeas.
