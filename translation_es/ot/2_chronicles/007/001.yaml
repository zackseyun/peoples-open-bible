translation:
  language: es
  text: Y cuando Salomón terminó de orar, el fuego descendió[a] del cielo y consumió el holocausto y los sacrificios, y la gloria de Yahvé llenó la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajó del cielo».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el hebreo dice «la casa».
    reason: cultural_note
lexical_decisions:
- source_word: וּכְכַלּוֹת
  english_pob_choice: And when ... finished
  chosen_spanish: Y cuando ... terminó
  alternatives_spanish:
  - Ahora que ... terminó
  - Así que ... terminó
  lexicon: HALOT
  rationale: La construcción temporal introduce una acción concluida antes de la siguiente; «Y cuando» conserva bien la relación narrativa y el flujo del hebreo sin añadir inmediatez no requerida. «Terminó» expresa con naturalidad el valor de כלה en este contexto.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma española establecida del nombre propio.
- source_word: לְהִתְפַּלֵּל
  english_pob_choice: praying
  chosen_spanish: de orar
  alternatives_spanish:
  - de orar
  - de rezar
  lexicon: HALOT
  rationale: El infinitivo funciona naturalmente en español con «terminó de orar». «Orar» preserva el sentido verbal y es el término bíblico más amplio y neutral en registro.
- source_word: וְהָאֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: El artículo definido refleja un fuego específico en el relato, entendido como fuego enviado por Dios.
- source_word: יָרְדָה מֵהַשָּׁמַיִם
  english_pob_choice: came down from heaven
  chosen_spanish: descendió del cielo
  alternatives_spanish:
  - bajó del cielo
  - descendió de los cielos
  lexicon: HALOT
  rationale: «Descendió» conserva la imagen vertical del verbo y suena natural en español. «Cielo» es la forma idiomática normal para el plural hebreo en este contexto narrativo.
- source_word: וַתֹּאכַל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se comió
  lexicon: HALOT
  rationale: Con sujeto fuego, «consumió» comunica el efecto sacrificial de forma idiomática y precisa. Conserva el valor de absorber/destruir sin la literalidad extraña de «comió».
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: «Holocausto» es el término cultual español tradicional para la ofrenda totalmente quemada y mantiene la distinción frente a los sacrificios generales que siguen.
- source_word: וְהַזְּבָחִים
  english_pob_choice: and the sacrifices
  chosen_spanish: y los sacrificios
  alternatives_spanish:
  - y las víctimas
  - y las ofrendas
  lexicon: HALOT
  rationale: «Sacrificios» reproduce el término amplio de זְבָחִים y distingue bien la categoría general del holocausto específico.
- source_word: וּכְבוֹד יְהוָה
  english_pob_choice: and the glory of Yahweh
  chosen_spanish: y la gloria de Yahvé
  alternatives_spanish:
  - y la gloria de Yahweh
  - y la gloria del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto. «Gloria» conserva el peso teológico de כָּבוֹד como manifestación visible de la presencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología normativa del proyecto en español. Se evita la sustitución por un título, preservando el nombre propio del pacto.
- source_word: מָלֵא אֶת הַבָּיִת
  english_pob_choice: filled the house
  chosen_spanish: llenó la casa
  alternatives_spanish:
  - llenó el templo
  - llenó la casa del SEÑOR
  lexicon: HALOT
  rationale: «Casa» reproduce literalmente בית y preserva la textura del hebreo; en este contexto se entiende como el templo. Se evita explicitar «templo» en el cuerpo para no perder el término base del texto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, y el marco del proyecto exige su transliteración como nombre propio, no su sustitución por un título. «Yahvé» es la forma española adoptada para mantener esa decisión auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Referencia de הַבָּיִת
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa del SEÑOR
  rationale: Se conserva la literalidad de «casa» para reflejar el hebreo, aunque el referente contextual sea el templo. Esto mantiene la huella textual sin oscurecer el sentido narrativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con la revisión más reciente; no se requirieron cambios de fondo respecto al sentido base. Se mantuvieron las decisiones auditadas sobre el nombre divino y sobre «la casa» como reflejo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «holocausto» para הָעֹלָה y «sacrificios» para וְהַזְּבָחִים, distinguiendo ofrenda específica y categoría general.
  - «Casa» se mantiene literal en el cuerpo, con aclaración en nota para el referente contextual.
  - El estilo es solemne y publicable, sin depender de formulaciones tradicionales que oculten el nombre divino.
