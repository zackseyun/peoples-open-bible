translation:
  language: es
  text: Acuérdense de todo lo que hizo con Abraham, y de cómo puso a prueba[a] a Isaac, y de todo lo que le sucedió a Jacob en Mesopotamia de Siria[b], mientras pastoreaba las ovejas de Labán, el hermano de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «probó a Isaac». El verbo griego puede significar «probar», «poner a prueba» o, en otros contextos, «tentar»; aquí el sentido es una prueba de fidelidad, no una incitación al mal.
    reason: lexical_alternative
  - marker: b
    text: «Mesopotamia de Siria» reproduce la expresión geográfica griega; también puede traducirse «Mesopotamia siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Tengan presente
  lexicon: BDAG
  rationale: El imperativo plural exhorta a traer a la memoria hechos pasados. «Acuérdense» conserva el tono directo y natural del mandato en español, con fuerza exhortativa equivalente a «Remember».
- source_word: ὅσα ἐποίησεν μετʼ Ἀβραάμ
  english_pob_choice: what he did with Abraham
  chosen_spanish: todo lo que hizo con Abraham
  alternatives_spanish:
  - todo lo que hizo por Abraham
  - todo lo que hizo a Abraham
  lexicon: BDAG
  rationale: La preposición μετὰ con genitivo se conserva mejor con «con», reflejando el modo de relación y trato divino sin decidir de antemano entre beneficio o adversidad. «Todo lo que» mantiene la amplitud de ὅσα.
- source_word: ἐπείρασεν
  english_pob_choice: tested
  chosen_spanish: puso a prueba
  alternatives_spanish:
  - probó
  - tentó
  lexicon: BDAG
  rationale: En el contexto patriarcal, πειράζω expresa una prueba que revela o refina fidelidad. «Puso a prueba» comunica esa idea sin cargarla con el sentido moralmente problemático de «tentó».
- source_word: ὅσα ἐγένετο τῷ Ἰακώβ
  english_pob_choice: what happened to Jacob
  chosen_spanish: todo lo que le sucedió a Jacob
  alternatives_spanish:
  - todo lo que aconteció a Jacob
  - todo lo que vino sobre Jacob
  lexicon: BDAG
  rationale: La construcción idiomática se vierte de forma natural en español con «le sucedió», que conserva el alcance general de los acontecimientos sin especificarlos.
- source_word: ἐν Μεσοποταμίᾳ τῆς Συρίας
  english_pob_choice: in Mesopotamia of Syria
  chosen_spanish: en Mesopotamia de Siria
  alternatives_spanish:
  - en Mesopotamia siria
  - en la Mesopotamia de Siria
  lexicon: LSJ
  rationale: Se preserva la expresión geográfica griega de manera transparente. Aunque suena algo marcada, «Mesopotamia de Siria» reproduce fielmente la formulación del texto fuente.
- source_word: ποιμαίνοντι
  english_pob_choice: while he was shepherding
  chosen_spanish: mientras pastoreaba
  alternatives_spanish:
  - mientras estaba pastoreando
  - mientras cuidaba
  lexicon: BDAG
  rationale: El participio circunstancial indica una acción en curso. «Pastoreaba» mantiene el valor durativo y el campo pastoral de ποιμαίνω.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del rebaño
  lexicon: BDAG
  rationale: El sustantivo es literalmente «las ovejas». Se elige «ovejas» para mantener la concreción del original, en vez de generalizar a «rebaño».
- source_word: Λαβὰν τοῦ ἀδελφοῦ τῆς μητρὸς αὐτοῦ
  english_pob_choice: of Laban, his mother's brother
  chosen_spanish: de Labán, el hermano de su madre
  alternatives_spanish:
  - de Labán, su tío materno
  - de Labán, hermano de su madre
  lexicon: BDAG
  rationale: Se conserva la relación de parentesco tal como aparece en griego. «El hermano de su madre» es más cercano al texto que «su tío materno», que ya interpreta la relación con un término más idiomático.
theological_decisions:
- issue: Referencia implícita al agente de las acciones en Abraham e Isaac
  english_pob_reading: The subject is understood as God/he, left implicit in Greek but expressed in English as 'he' where needed for clarity.
  chosen_spanish_reading: El sujeto queda implícito en español también, y la referencia a Dios se entiende por el contexto de la exhortación.
  alternative_spanish_readings:
  - Dios hizo con Abraham
  - él hizo con Abraham
  rationale: El griego no nombra explícitamente al sujeto; la traducción española puede mantener esa reserva sin perder claridad, porque el contexto inmediato remite a los actos de Dios en la historia patriarcal. Evita añadir un sujeto que el versículo no expresa.
  doctrine_reference: Preservar la economía del texto fuente y la primacía del original sobre la explicitación innecesaria.
- issue: Sentido de ἐπείρασεν aplicado a Isaac
  english_pob_reading: tested
  chosen_spanish_reading: puso a prueba
  alternative_spanish_readings:
  - tentó
  - probó
  rationale: «Puso a prueba» recoge el sentido de evaluación/probación que el contexto exige y evita el matiz de incitación al mal que tendría «tentó».
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: Se revisó el inglés auditado y el texto griego de Swete; no se detectaron cambios de texto ni variantes relevantes, y la traducción española sigue la lectura aprobada con una correspondencia transparente al griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino cuando aparezca en otros pasajes, aunque en este versículo el sujeto está implícito.
  - Se usa «puso a prueba» para πειράζω en coherencia con otras decisiones del proyecto cuando el contexto señala una prueba y no una tentación.
  - Se conserva la estructura enumerativa del versículo y el paralelismo de las tres cláusulas.
  - Se preserva el parentesco de Labán con la formulación literal «el hermano de su madre» para no sobreinterpretar el término.
