translation:
  language: es
  text: Acércate a ella con toda tu alma[a], y con toda tu fuerza guarda sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acércate a ella ... y guarda sus caminos». El griego permite un matiz más formal para ambos verbos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσελθε
  english_pob_choice: Approach
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven cerca de ella
  - Arrímate a ella
  lexicon: BDAG
  rationale: El imperativo pide un movimiento intencional hacia la sabiduría personificada. «Acércate» conserva la exhortación directa y suena natural en español sin debilitar el matiz de decisión activa.
- source_word: ἐν πάσῃ ψυχῇ σου
  english_pob_choice: with all your soul
  chosen_spanish: con toda tu alma
  alternatives_spanish:
  - con todo tu ser
  - con todo tu corazón
  lexicon: BDAG
  rationale: «Alma» conserva con fidelidad el vocabulario de la fuente y mantiene la fuerza semítica de dedicación total. «Corazón» desplazaría la antropología; «ser» explicita demasiado.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - lo
  - a ella
  lexicon: BDAG
  rationale: El griego personifica la sabiduría en femenino. En español debe mantenerse la referencia personal femenina para no borrar ese rasgo literario y teológico.
- source_word: ἐν ὅλῃ δυνάμει σου
  english_pob_choice: with all your strength
  chosen_spanish: con toda tu fuerza
  alternatives_spanish:
  - con todo tu poder
  - con toda tu capacidad
  lexicon: BDAG
  rationale: «Fuerza» es la equivalencia más natural y fiel para δυνάμει en este contexto exhortativo. «Poder» suena más abstracto; «capacidad» interpreta demasiado.
- source_word: συντήρησον
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - mantén
  - observa
  lexicon: BDAG
  rationale: Con «caminos» como objeto, «guarda» transmite fidelidad, custodia y adhesión práctica. En español bíblico conserva la idea de atender y preservar el andar de la sabiduría sin sonar técnico o ambiguo.
- source_word: τὰς ὁδοὺς αὐτῆς
  english_pob_choice: her ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su manera de vivir
  lexicon: BDAG
  rationale: «Caminos» reproduce el campo metafórico de conducta o modo de vida y es idiomático en español bíblico. «Sendas» es posible pero más marcado; «manera de vivir» explicita en exceso.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine personal language ('her') for wisdom.
  chosen_spanish_reading: Mantener la referencia femenina («ella», «sus»).
  alternative_spanish_readings:
  - Neutralizar con «eso»/«lo»
  - Usar solo un sustantivo abstracto como «la sabiduría»
  rationale: La fuente griega usa formas femeninas y presenta la sabiduría como figura personal. El español debe conservar ese rasgo porque forma parte del sentido literario y de la teología del pasaje.
  doctrine_reference: Principio de fidelidad al sentido llano del texto y preservación de rasgos significativos de personificación.
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del audit trail inglés, donde la idea de 'keep her ways' se acercó más al valor de συντήρησον τὰς ὁδοὺς αὐτῆς. En español se reflejó con «guarda sus caminos», manteniendo la naturalidad y la cercanía formal al griego.
  spanish_consistency_notes:
  - Se preservó el femenino singular de la sabiduría en toda la frase.
  - «Alma» y «fuerza» reproducen el paralelismo semítico sin añadir interpretaciones.
  - «Caminos» mantiene la metáfora ética común en la tradición bíblica en español.
  - La nota al pie marca la alternativa formal de los verbos sin alterar el texto principal.
