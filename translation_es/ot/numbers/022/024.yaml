    issue: '"se puso" debilita la fuerza de וַיַּעֲמֹד'
    rationale: El hebreo indica que el ángel se detuvo y tomó posición. "Se paró" preserva mejor esa imagen.
  - severity: low
    issue: La nota al pie sobre viñas/viñedos es innecesaria
    rationale: No responde a una ambigüedad exegética significativa y no está en el audit trail inglés.
