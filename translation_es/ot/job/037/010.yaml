translation:
  language: es
  text: Del aliento de Dios se forma[a] el hielo, y la amplia extensión de las aguas queda congelada por completo.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el aliento de Dios se forma el hielo». El hebreo con מִן puede expresar procedencia («de») o medio instrumental («por»).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la anchura de las aguas se congela» o «queda firme». La expresión hebrea es poética y puede referirse a la amplia superficie de las aguas volviéndose sólida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנִּשְׁמַת
  english_pob_choice: From the breath of
  chosen_spanish: Del aliento de
  alternatives_spanish:
  - Por el aliento de
  - Desde el aliento de
  lexicon: HALOT
  rationale: 'נִשְׁמָה designa el aliento o la respiración. Con el prefijo מִן, el valor puede ser de procedencia o medio. En español, ''del aliento de'' conserva la imagen concreta y permite la misma ambigüedad controlada que registra la tradición inglesa: origen o agente.'
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - el Dios fuerte
  lexicon: HALOT
  rationale: אֵל aquí funciona como título divino simple. 'Dios' reproduce mejor la sobriedad del hebreo que ampliaciones explicativas no exigidas por el contexto.
- source_word: יִתֶּן
  english_pob_choice: is given
  chosen_spanish: se da
  alternatives_spanish:
  - da
  - produce
  lexicon: HALOT
  rationale: El verbo נתן literalmente significa 'dar'. El giro pasivo/reflexivo 'se da' suena natural en español y mantiene la idea de que el hielo aparece por acción divina, sin volverlo una paráfrasis causal más amplia.
- source_word: קָרַח
  english_pob_choice: ice
  chosen_spanish: el hielo
  alternatives_spanish:
  - la escarcha
  lexicon: HALOT
  rationale: קָרַח refiere hielo, no solo escarcha. 'Hielo' corresponde mejor al paralelismo con las aguas que se solidifican.
- source_word: וְרֹחַב
  english_pob_choice: the broad expanse of
  chosen_spanish: la amplia extensión de
  alternatives_spanish:
  - la anchura de
  - la vasta extensión de
  lexicon: HALOT
  rationale: רֹחַב expresa anchura o extensión amplia. 'La amplia extensión de' conserva el sustantivo espacial y evita estrechar el sentido a una mera medida abstracta.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se conserva con 'las aguas', registro natural en español bíblico y fiel al tono poético.
- source_word: בְּמוּצָק
  english_pob_choice: is frozen solid
  chosen_spanish: queda congelada en sólido
  alternatives_spanish:
  - se congela
  - queda endurecida
  lexicon: HALOT
  rationale: מוּצָק comunica algo hecho firme o endurecido; en este contexto meteorológico, la idea es que el agua se solidifica. 'Queda congelada en sólido' intenta preservar la imagen de firmeza/materialidad sin perder inteligibilidad en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés, conservando la ambigüedad de מִן (origen/medio) y el carácter poético de רֹחַב מַיִם + מוּצָק sin añadir expansión interpretativa innecesaria.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֵל conforme al valor lexical simple documentado.
  - Se conserva el plural poético 'las aguas'.
  - La nota [a] marca la alternativa de medio/causa que el inglés POB preservó.
  - La nota [b] recoge la alternativa semántica de 'congelarse' / 'quedar firme' para מוּצָק.
