review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la pregunta retórica, el desánimo causado y la referencia a la tierra dada por Yahvé. Sin embargo, se aparta del audit trail inglés en dos puntos relevantes: (1) usa singular colectivo «el corazón» donde el POB inglés revisado fijó «the hearts», y en español «los corazones» es plenamente natural; (2) «para que no pasen» introduce una subordinación final más interpretativa, mientras que el hebreo מֵעֲבֹר expresa mejor impedimento con «de cruzar/de pasar».'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para mayor fidelidad y naturalidad bíblica. «Desaniman los corazones» suena natural en español y refleja mejor la revisión inglesa. «De cruzar a la tierra» preserva mejor la construcción hebrea que «para que no pasen». Las notas actuales tienen redundancia y una de ellas repite «los hijos de Israel» innecesariamente.
  glossary_alignment: Se alinea bien con la política del proyecto en «Yahvé», «hijos de Israel» y el registro general. No hay conflicto doctrinal. La principal mejora es hacer coincidir la decisión lexical documentada para אֶת לֵב con un plural en español y ajustar מֵעֲבֹר a una formulación más cercana al hebreo.
  issues:
  - severity: medium
    issue: «el corazón» no refleja la decisión auditada «the hearts»
    rationale: Aunque el hebreo tiene singular formal, el POB inglés ya resolvió este punto en revisión a plural por concordancia semántica con «sons of Israel». En español, «los corazones de los hijos de Israel» es natural y fiel.
  - severity: medium
    issue: «para que no pasen» es más interpretativo que «de cruzar/de pasar»
    rationale: מֵעֲבֹר es preposición + infinitivo constructo, con sentido de impedir el cruce. «Para que no pasen» cambia la forma a una cláusula final/resultado y añade una negación explícita no presente en la misma forma.
  - severity: low
    issue: Notas al pie redundantes e imprecisas
    rationale: La nota [a] ofrece una alternativa casi idéntica al texto principal y la explicación literal no está optimizada si se cambia a plural en español. La nota [b] repite «los hijos de Israel» entre las alternativas, lo cual no aporta información.
  revised_spanish_text: ¿Y por qué desaniman los corazones de los hijos de Israel para que no crucen[a] a la tierra que Yahvé les ha dado?[b]
  revised_footnotes:
  - marker: a
    text: O «de cruzar a la tierra». El hebreo literalmente dice «desaniman el corazón», una expresión que también puede comunicar desalentar el ánimo o la resolución.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» o «los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se revisa «el corazón» a «los corazones» para reflejar la decisión auditada del POB y sonar natural en español. Se ajusta el verbo de cruce a «crucen» para expresar mejor el motivo contextual de עבר en entrada a la tierra. Se simplifican y corrigen las notas al pie, preservando la alternativa literal/idiomática y la variante para «hijos de Israel».
