review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del verso, conserva 'Yahvé', 'mi roca' y el sentido global de súplica. Sin embargo, no sigue la decisión léxica inglesa clave de distinguir אַל־תֶּחֱרַשׁ ('no seas sordo/no te hagas el sordo') de תֶּחֱשֶׁה ('te calles/guardes silencio'). En el texto español actual ambas cláusulas se vuelven prácticamente la misma idea de silencio, pese a que la nota [c] explica precisamente la distinción. También 'para que no' suena final en español, cuando פֶּן aquí expresa mejor una consecuencia temida ('no sea que').
  spanish_quality_summary: El español es claro y digno, pero 'no guardes silencio ante mí ... para que no te calles ante mí' resulta redundante y menos natural que una formulación que preserve el contraste. Además, 'sepulcro' es aceptable, aunque 'fosa' preserva mejor la imaginería concreta de בור y sigue siendo comprensible; con nota puede mantener la amplitud semántica funeraria.
  glossary_alignment: Alineado en 'Yahvé' para יְהוָה. No hay conflictos mayores de glosario, pero la decisión documentada para חרשׁ/חשה debe reflejarse mejor en español. La nota sobre 'la fosa' puede explicar tumba/ámbito de los muertos, paralela al inglés.
  issues:
  - severity: high
    issue: La primera cláusula verbal borra la distinción entre 'ser sordo/no oír' y 'callar/no responder'.
    rationale: 'El inglés POB y sus notas documentan una elección deliberada: ''do not be deaf to me'' frente a ''lest you be silent to me''. El español principal usa ''no guardes silencio'' y luego ''no te calles'', duplicando la misma idea y contradiciendo la nota [c].'
  - severity: medium
    issue: '''Para que no te calles'' expresa propósito más que consecuencia temida.'
    rationale: פֶּן introduce mejor 'no sea que' / 'no sea que te calles', no una finalidad. La formulación actual puede entenderse como finalidad de la súplica en vez de resultado temido.
  - severity: low
    issue: '''Sepulcro'' interpreta más de la cuenta la imagen concreta de בור.'
    rationale: No es incorrecto, pero 'fosa' o 'pozo' preserva mejor la metáfora concreta mientras la nota mantiene el posible sentido de tumba o ámbito de los muertos.
  revised_spanish_text: De David[a]. A ti, Yahvé, clamo; mi roca, no seas sordo a mí[c], no sea que te calles ante mí y yo llegue a ser como los que descienden a la fosa[b].
  revised_footnotes:
