translation:
  language: es
  text: 'Y a este pueblo le dirás[a]: «Así dice Yahvé: “He aquí, pongo ante ustedes el camino de la vida y el camino de la muerte”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estoy dando ante ustedes»; el hebreo usa literalmente «dar», pero la expresión idiomática significa «poner ante» o «colocar ante» como una alternativa ofrecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: And to
  chosen_spanish: Y a
  alternatives_spanish:
  - Y para
  - Y hacia
  lexicon: HALOT
  rationale: La conjunción enlaza con el contexto inmediato y la preposición introduce al destinatario del mensaje. «Y a» conserva esa conexión discursiva sin sobrecargar la frase.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - estas personas
  - esta nación
  lexicon: HALOT
  rationale: עָם aquí designa al colectivo del pacto; «pueblo» reproduce mejor el valor colectivo singular que «personas» o «nación».
- source_word: תֹּאמַר
  english_pob_choice: you shall say
  chosen_spanish: le dirás
  alternatives_spanish:
  - dirás
  - deberás decir
  lexicon: HALOT
  rationale: El imperfecto funciona como mandato profético dirigido a Jeremías. En español, el futuro simple transmite bien esa instrucción; se añadió el dativo «le» por el referente colectivo del versículo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética estándar se mantiene de forma natural y solemne. Se conserva «Yahvé» según la norma del proyecto para el Tetragrama, en vez de sustituirlo por un título.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: La partícula introduce una auto-presentación divina con solemnidad e inmediatez. En español, «Miren» comunica mejor esa apelación enfática sin sonar tan arcaica como «He aquí».
- source_word: נֹתֵן
  english_pob_choice: I am setting
  chosen_spanish: estoy poniendo
  alternatives_spanish:
  - estoy dando
  - pongo
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», la expresión con «delante de ustedes» pide el sentido idiomático de presentar u ofrecer. «Estoy poniendo» conserva la acción en curso e inmediato ofrecimiento.
- source_word: לִ/פְנֵי/כֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - frente a ustedes
  lexicon: HALOT
  rationale: La imagen espacial se expresa de manera natural en español con «delante de ustedes», manteniendo la idea de una opción colocada ante el pueblo.
- source_word: דֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: En este paralelismo metafórico, «camino» es el equivalente español más claro y natural para דֶּרֶךְ.
- source_word: הַחַיִּים
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - para la vida
  - de vivir
  lexicon: HALOT
  rationale: 'La construcción se refleja de modo directo en español: «el camino de la vida». Se conserva la relación nominal y el contraste antitético con «muerte».'
- source_word: הַמָּוֶת
  english_pob_choice: of death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - para la muerte
  lexicon: HALOT
  rationale: 'Se mantiene el paralelismo con el miembro anterior: «el camino de la muerte».'
theological_decisions:
- issue: Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. La forma del proyecto en español es «Yahvé», preservando el nombre del pacto y evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor exhortativo de הִנְנִי נֹתֵן
  english_pob_reading: Behold, I am setting
  chosen_spanish_reading: Miren, estoy poniendo
  alternative_spanish_readings:
  - He aquí, estoy poniendo
  - Miren, estoy dando
  rationale: Se conserva el carácter solemne e inminente de la intervención divina. «Poniendo» refleja la imagen de colocar una decisión/alternativa delante del pueblo, evitando borrar la tensión entre el verbo literal 'dar' y el sentido idiomático.
  doctrine_reference: Jeremiah 21:8 lexical note on נתן + לִפְנֵי־כם
translation_notes:
  revision_awareness: 'Coincide con el paquete fuente y el audit trail inglés: se mantuvo la fórmula profética, el nombre divino Yahvé, y se resolvió el verbo נתן con un equivalente idiomático español sin ocultar la literalidad en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «pueblo» para הָעָם, manteniendo el singular colectivo.
  - «Camino» se mantiene para דֶּרֶךְ en ambos miembros del paralelismo.
  - La nota a conserva la tensión entre el verbo literal «dar» y el sentido idiomático de «poner/colocar delante».
