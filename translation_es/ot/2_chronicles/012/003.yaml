base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/012/003.yaml
  text: 'with 1,200 chariots and 60,000 horsemen[a], and the people who came with him from Egypt were without number: Libyans, Sukkites[c][b], and Cushites.'
  footnotes:
