translation:
  language: es
  text: 'Y el asombro se apoderó de todos, y hablaban entre sí, diciendo: «¿Qué es esta palabra[a], que con autoridad y poder manda a los espíritus inmundos, y estos salen?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué es este mensaje?». La palabra griega logos puede significar «palabra», «mensaje» o «asunto».
    reason: lexical_alternative
lexical_decisions:
- source_word: θάμβος
  english_pob_choice: amazement
  chosen_spanish: asombro
  alternatives_spanish:
  - pasmo
  - admiración
  - maravilla
  lexicon: BDAG
  rationale: θάμβος expresa una reacción de sorpresa intensa. «Asombro» comunica bien esa reacción en español moderno y conserva el tono de reacción colectiva sin sonar forzado.
- source_word: ἐγένετο ... ἐπὶ πάντας
  english_pob_choice: came upon everyone
  chosen_spanish: cayó sobre todos
  alternatives_spanish:
  - vino sobre todos
  - sobrevino a todos
  lexicon: BDAG
  rationale: La construcción indica que la reacción se abatió o recayó sobre el grupo. «Cayó sobre todos» preserva el carácter dinámico e idiomático del griego, y «sobre todos» refleja el alcance colectivo.
- source_word: πάντας
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos los presentes
  - cada uno
  lexicon: BDAG
  rationale: El plural masculino tiene fuerza colectiva. «Todos» es la forma más natural en español y mantiene la amplitud del referente.
- source_word: συνελάλουν πρὸς ἀλλήλους
  english_pob_choice: they were speaking with one another
  chosen_spanish: hablaban entre sí
  alternatives_spanish:
  - se decían unos a otros
  - conversaban entre sí
  lexicon: BDAG
  rationale: El imperfecto marca acción continua y la expresión recíproca indica intercambio mutuo. «Hablaban entre sí» es natural, conserva la duración y evita añadir una formalidad que el griego no exige.
- source_word: Τίς ὁ λόγος οὗτος
  english_pob_choice: What is this word
  chosen_spanish: ¿Qué es esta palabra[a]?
  alternatives_spanish:
  - ¿Qué es este mensaje?[a]
  - ¿Qué significa esta palabra?[a]
  lexicon: BDAG
  rationale: λόγος puede abarcar «palabra», «mensaje» o «asunto». La POB inglesa mantuvo «word» con nota; en español «palabra» conserva la concisión del griego y permite la misma amplitud de sentido. Se añade nota para mantener la alternativa semántica documentada.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: Aquí introduce el contenido explicativo de la reacción de la multitud. «Que» es la forma natural en español y corresponde al valor completivo del griego.
- source_word: ἐν ἐξουσίᾳ καὶ δυνάμει
  english_pob_choice: with authority and power
  chosen_spanish: con autoridad y poder
  alternatives_spanish:
  - en autoridad y poder
  - con poder y autoridad
  lexicon: BDAG
  rationale: La preposición ἐν tiene aquí valor modal/instrumental. «Con autoridad y poder» es la equivalencia española más natural y conserva el paralelismo de ambos sustantivos.
- source_word: ἐξουσίᾳ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - autoridad delegada
  - poder legítimo
  lexicon: BDAG
  rationale: ἐξουσία designa autoridad o derecho para mandar. «Autoridad» es la traducción estándar y suficientemente amplia; mantiene el matiz de mando legítimo sin sobreexplicarlo.
- source_word: δυνάμει
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: δύναμις aquí refiere poder efectivo. «Poder» es la opción más clara y natural en español, y combina bien con «autoridad».
- source_word: ἐπιτάσσει
  english_pob_choice: he commands
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - da órdenes a
  lexicon: BDAG
  rationale: ἐπιτάσσω significa mandar u ordenar. «Manda» es breve, vivo y suficientemente fiel; en contexto de exorcismo, transmite la fuerza del mandato.
- source_word: τοῖς ἀκαθάρτοις πνεύμασιν
  english_pob_choice: the unclean spirits
  chosen_spanish: a los espíritus inmundos
  alternatives_spanish:
  - a los espíritus impuros
  lexicon: BDAG
  rationale: «Inmundos» conserva el lenguaje de pureza ritual propio del trasfondo judío y del relato sinóptico. Se evita «impuros» como opción más interpretativa o menos tradicional en este campo semántico.
- source_word: ἐξέρχονται
  english_pob_choice: they come out
  chosen_spanish: salen
  alternatives_spanish:
  - salen afuera
  - se van
  lexicon: BDAG
  rationale: ἐξέρχομαι significa salir. «Salen» es natural en español y suficiente para el contexto de expulsión de espíritus.
theological_decisions:
- issue: Terminología de espíritus inmundos en contexto de exorcismo
  english_pob_reading: the unclean spirits
  chosen_spanish_reading: los espíritus inmundos
  alternative_spanish_readings:
  - los espíritus impuros
  rationale: La lectura conserva el marco sobrenatural del pasaje y el lenguaje de pureza/impureza ritual del texto griego, sin reducirlo a una explicación psicológica o metafórica.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Valor semántico de λόγος en la pregunta del pueblo
  english_pob_reading: What is this word
  chosen_spanish_reading: ¿Qué es esta palabra?[a]
  alternative_spanish_readings:
  - ¿Qué es este mensaje?[a]
  - ¿Qué asunto es este?[a]
  rationale: El griego admite un rango entre «palabra», «mensaje» y «asunto». Se mantiene «palabra» en el cuerpo para conservar la brevedad del original y se documenta la alternativa para no borrar la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en que no se requieren cambios sustanciales: la lectura final conserva la fuerza del griego, mantiene «espíritus inmundos» y refleja la ambigüedad de λόγος con una nota breve.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «espíritus inmundos» para conservar el trasfondo de pureza ritual y el marco exorcístico del pasaje.
  - La puntuación y el orden de ideas siguen la sintaxis española natural sin perder el paralelismo del griego.
  - La nota de λόγος evita cerrar el sentido entre «palabra» y «mensaje», en línea con el audit trail inglés.
