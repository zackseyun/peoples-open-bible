  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: οὐ μὴ ἀποθάνῃς se entiende correctamente como negación enfática de futuro, no como imperativo, y τὸ πρόσταγμά ἡμῶν ἐστίν se representa fielmente como «nuestro decreto». También preserva adecuadamente el matiz de κοινόν como algo de aplicación general, apoyado por la nota alternativa.'
  spanish_quality_summary: La principal dificultad es de naturalidad y gramática española en «No ciertamente morirás», que suena antinatural y calcada. En español digno y claro, la mejor forma es «Ciertamente no morirás» o «Sin duda no morirás». El resto del verso es claro; «porque nuestro decreto es general» es aceptable, aunque algo rígido. Puede mantenerse por fidelidad al rastro inglés y la nota ya aclara el sentido.
  glossary_alignment: No hay términos del glosario principal en conflicto. «Decreto» para πρόσταγμα está bien documentado y «general» para κοινόν es defendible en este contexto. La corrección necesaria afecta solo la idiomaticidad de la negación enfática en español.
  issues:
  - severity: high
    issue: La frase «No ciertamente morirás[a]» es español antinatural y suena a calco.
    rationale: Aunque intenta conservar el énfasis de οὐ μή, el orden adverbial no es idiomático en español moderno y dificulta la legibilidad. «Ciertamente no morirás[a]» preserva mejor tanto el énfasis como la claridad sin cambiar el valor no imperativo del griego.
  - severity: low
    issue: «Nuestro decreto es general» es formal pero algo rígido.
    rationale: La expresión es comprensible y fiel al inglés auditado, pero en español suena menos natural que «se aplica a todos por igual». Sin embargo, como esa alternativa ya está en nota y «general» conserva el matiz legal, no exige más que una observación menor.
  revised_spanish_text: Ciertamente no morirás[a], porque nuestro decreto es general.
