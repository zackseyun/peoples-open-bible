translation:
  language: es
  text: Y al final de los cuarenta días y cuarenta noches[a], Yahvé me dio las dos tablas de piedra, las tablas del pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé me dio».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma waw-consecutiva abre una transición narrativa; en español bíblico natural, la simple conjunción «Y» conserva el enlace sin volver la frase pesada o arcaizante.
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al final de
  alternatives_spanish:
  - al término de
  - después de
  lexicon: HALOT
  rationale: El hebreo marca el punto de conclusión del período. «Al final de» transmite bien ese límite temporal en español moderno y fiel.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לָיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - cuarenta jornadas y cuarenta noches
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática hebrea de duración completa sin explicitar más de lo que el texto dice.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - me dio
  lexicon: HALOT
  rationale: «Dar» reproduce el valor básico del verbo sin añadir matices interpretativos. El objeto indirecto «me» queda explícito como en el hebreo con אֵלַי.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transliteración del Tetragrámaton como «Yahvé», preservando el nombre personal del pacto en vez de sustituirlo por un título.'
- source_word: אֵלַי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: En español, con «dar» el dativo natural es «me»; expresa con claridad el destinatario sin rigidez.
- source_word: שְׁנֵי
  english_pob_choice: the two
  chosen_spanish: las dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: El numeral constructo señala un par definido en contexto; «las dos» mantiene esa definitud y fluye con el sustantivo femenino plural «tablas».
- source_word: לֻחֹת הָאֲבָנִים
  english_pob_choice: stone tablets
  chosen_spanish: tablas de piedra
  alternatives_spanish:
  - tablas de roca
  - tablas pétreas
  lexicon: HALOT
  rationale: La relación constructa indica tablas hechas de piedra. «Tablas de piedra» es natural y fiel, y conserva la materialidad sin expandir el sentido.
- source_word: לֻחֹת הַבְּרִית
  english_pob_choice: the tablets of the covenant
  chosen_spanish: las tablas del pacto
  alternatives_spanish:
  - las tablas de la alianza
  - las tablas del convenio
  lexicon: HALOT
  rationale: Se mantiene la repetición del sustantivo «tablas» y se traduce בְּרִית como «pacto» por ser la opción más consistente con el registro bíblico del término en este contexto.
theological_decisions:
- issue: Nombre divino Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. La traducción mantiene el nombre personal revelado a Israel, en línea con el criterio doctrinal del proyecto, en lugar de ocultarlo bajo una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: לֻחֹת הַבְּרִית como expresión del pacto
  english_pob_reading: the tablets of the covenant
  chosen_spanish_reading: las tablas del pacto
  alternative_spanish_readings:
  - las tablas de la alianza
  - las tablas del convenio
  rationale: «Pacto» preserva el valor covenantal del hebreo בְּרִית sin suavizarlo. «Alianza» es viable en español, pero «pacto» resulta más estable para el campo semántico bíblico-jurídico en este versículo.
  doctrine_reference: 'DOCTRINE.md: Covenant terminology'
translation_notes:
  revision_awareness: La versión sigue de cerca el hebreo y el audit trail inglés, conservando la estructura temporal, el paralelismo «las dos tablas... las tablas del pacto» y el nombre divino Yahvé; no se requirieron revisiones adicionales según el control de concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «pacto» para בְּרִית, evitando alternar con «alianza» dentro del versículo.
  - «Tablas de piedra» conserva la materialidad explícita de לֻחֹת הָאֲבָנִים.
  - La puntuación con coma mantiene la aposición del hebreo sin añadir interpretación.
