translation:
  language: es
  text: Habiendo llegado a ser agradable a Dios, fue amado; y mientras vivía entre pecadores, fue quitado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue removido» o «fue trasladado». El griego deja abierta la pregunta de si la idea principal es muerte prematura, remoción de un entorno corrupto o una toma semejante a la de Enoc.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐάρεστος
  english_pob_choice: pleasing
  chosen_spanish: agradable
  alternatives_spanish:
  - placentero
  - bien visto
  - acepto
  lexicon: BDAG
  rationale: εὐάρεστος expresa la idea de ser grato o agradable para alguien. En español, «agradable a Dios» comunica bien la relación personal sin sonar forzado; «acepto» sería posible, pero aquí pierde naturalidad.
- source_word: γενόμενος
  english_pob_choice: having become
  chosen_spanish: habiendo llegado a ser
  alternatives_spanish:
  - llegando a ser
  - siendo
  - después de haber llegado a ser
  lexicon: BDAG
  rationale: El participio aoristo marca una acción anterior al verbo principal. «Habiendo llegado a ser» preserva esa anterioridad y el proceso de pasar a esa condición, con buen español.
- source_word: ἠγαπήθη
  english_pob_choice: was loved
  chosen_spanish: fue amado
  alternatives_spanish:
  - fue querido
  - era amado
  - amado fue
  lexicon: BDAG
  rationale: El pasivo simple se expresa de forma directa como «fue amado». Mantiene la pasividad sin añadir sujeto explícito, tal como el griego no lo expone aquí.
- source_word: ζῶν
  english_pob_choice: while living
  chosen_spanish: mientras vivía
  alternatives_spanish:
  - viviendo
  - cuando vivía
  - aun viviendo
  lexicon: BDAG
  rationale: El participio presente es simultáneo con el verbo siguiente. «Mientras vivía» transmite con claridad esa simultaneidad en español.
- source_word: μεταξὺ ἁμαρτωλῶν
  english_pob_choice: among sinners
  chosen_spanish: entre pecadores
  alternatives_spanish:
  - en medio de pecadores
  - entre personas pecadoras
  - en medio de los pecadores
  lexicon: BDAG
  rationale: «Entre pecadores» reproduce de modo directo la frase preposicional y conserva la categoría moral del sustantivo griego sin suavizarla.
- source_word: μετετέθη
  english_pob_choice: he was taken away
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue removido
  - fue trasladado
  - fue quitado
  lexicon: BDAG
  rationale: El verbo puede sugerir retiro, traslado o una toma divina. «Fue llevado» mantiene la ambigüedad del griego y sugiere tanto una remoción providencial como una muerte prematura, sin resolver el alcance.
theological_decisions:
- issue: 'Ambigüedad de μετετέθη: muerte, remoción divina o traslación al estilo de Enoc'
  english_pob_reading: he was taken away, preserving the tension between ordinary death, divine removal, and possible Enoch-like taking
  chosen_spanish_reading: fue llevado, sin especificar si se trata de muerte prematura, remoción divina o una traslación extraordinaria
  alternative_spanish_readings:
  - fue removido
  - fue trasladado
  - murió
  rationale: La lectura española debe conservar la tensión textual que el griego permite. «Fue llevado» es suficientemente abierta para no clausurar la interpretación y evita decidir de antemano entre muerte ordinaria y una acción especial de Dios.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue el estado aprobado de alta concordancia con el griego de Swete.
  spanish_consistency_notes:
  - Se mantiene «Dios» para τῷ θεῷ, conforme al estándar del proyecto.
  - Se conserva la ambigüedad de μετετέθη con una fórmula abierta («fue llevado») y nota alternativa, sin resolverla en una sola interpretación.
  - «Pecadores» reproduce la fuerza moral del sustantivo griego ἁμαρτωλῶν sin atenuarlo.
