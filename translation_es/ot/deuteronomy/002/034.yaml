revisions:
- from: En aquel tiempo capturamos todas sus ciudades[a], y dedicamos a destrucción toda ciudad habitada, con las mujeres y los niños pequeños. No dejamos ningún sobreviviente.
  to: En aquel tiempo capturamos todas sus ciudades[a], y dedicamos a la destrucción a todos los hombres de toda ciudad, junto con las mujeres y los niños pequeños. No dejamos ningún sobreviviente.
  rationale: La revisión restaura la distinción semántica documentada para מְתִם («los hombres») en vez de neutralizarla como «ciudad habitada», mejora la naturalidad de «a la destrucción», y mantiene el concepto técnico de חרם con una nota alternativa clara. No se requiere adjudicación adicional porque la corrección se desprende con suficiente claridad del expediente fuente y de las decisiones ya auditadas.
