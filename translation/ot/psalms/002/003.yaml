  rationale: The current phrasing "throw away... from us" is slightly redundant and awkward in English. While grammatically correct, "cast... from us" is a more natural and powerful idiom for forceful rejection, which fits the rebellious context. It avoids the colloquial connotation of "throw away" (as in, into the garbage) and aligns well with the Hebrew construction of שׁלך (šlk) with מן (min), meaning "to cast from." The drafter already listed "cast away" as an alternative for the verb, making this a minor adjustment.
