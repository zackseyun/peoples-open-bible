id: ISA.15.4
reference: Isaiah 15:4
source:
  edition: WLC
  text: וַ/תִּזְעַ֤ק חֶשְׁבּוֹן֙ וְ/אֶלְעָלֵ֔ה עַד יַ֖הַץ נִשְׁמַ֣ע קוֹלָ֑/ם עַל כֵּ֗ן חֲלֻצֵ֤י מוֹאָב֙ יָרִ֔יעוּ נַפְשׁ֖/וֹ יָ֥רְעָה לּֽ/וֹ־־׃
translation:
  text: Heshbon and Elealeh cry out[a]; their voice is heard as far as Jahaz. Therefore the armed men of Moab cry out[b]; his soul trembles within him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the warriors of Moab shout.' The Hebrew term for 'armed men' can also be rendered more generally as 'warriors,' and the verb can be translated simply 'shout.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew; alternatively, 'his soul is distressed within him' or 'his soul trembles for him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּזְעַק
  chosen: cry out
  alternatives:
  - cries out
  - shriek
  - wail
  lexicon: HALOT
  rationale: From זעק, denoting a loud cry for distress or alarm. English present-tense narrative style is acceptable in prophetic poetry, but here rendered as present for vividness with the coordinated place names as subject in English.
- source_word: חֶשְׁבּוֹן וְאֶלְעָלֵה
  chosen: Heshbon and Elealeh
  rationale: These are place names and are transliterated per project policy to transliterate names rather than translate them.
- source_word: עַד יַהַץ
  chosen: as far as Jahaz
  alternatives:
  - to Jahaz
  - up to Jahaz
  lexicon: HALOT
  rationale: עַד marks extent; 'as far as' communicates the reach of the cry more idiomatically in English.
- source_word: נִשְׁמַע קוֹלָם
  chosen: their voice is heard
  alternatives:
  - their sound is heard
  - their cry is heard
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice/sound/cry.' 'Voice' preserves the Hebrew image while remaining natural; the plural suffix refers back to the cities personified.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - therefore
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks logical consequence from the preceding distress; 'therefore' fits prophetic discourse.
- source_word: חֲלֻצֵי מוֹאָב
  chosen: the armed men of Moab
  alternatives:
  - the warriors of Moab
  - the loins of Moab
  lexicon: HALOT
  rationale: From חלץ in the sense of men equipped or drawn up for battle. 'Armed men' best captures the military sense. A more literal rendering tied to 'loins' is possible etymologically but does not fit the context as well.
- source_word: יָרִיעוּ
  chosen: raise a battle cry
  alternatives:
  - shout
  - cry aloud
  - raise a shout
  lexicon: HALOT
  rationale: The Hiphil of רוע/ריע often denotes a loud shout, especially in martial settings. Because the subject is armed men, 'raise a battle cry' makes the contextual force explicit without over-paraphrasing.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - his inner being
  lexicon: HALOT
  rationale: נפש can denote soul, life, or self. 'His soul' preserves the metaphorical and emotional depth of the Hebrew, though it likely refers to the inner self rather than a technical anthropology.
- source_word: יָרְעָה לוֹ
  chosen: trembles within him
  alternatives:
  - is distressed for him
  - is shattered within him
  - becomes weak in him
  lexicon: HALOT
  rationale: The clause is difficult. The verb likely conveys being broken, shaken, or distressed. 'Trembles within him' gives a clear English sense of inward collapse while respecting the poetic idiom. The prepositional suffix is absorbed idiomatically as 'within him.'
