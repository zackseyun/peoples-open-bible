revisions:
- from: 'El enemigo dijo[a]: «Perseguiré, alcanzaré, repartiré el botín; mi alma[b] se saciará en ellos. Desenvainaré mi espada; mi mano los despojará»[c].'
  to: 'El enemigo dijo: «Perseguiré, alcanzaré, repartiré el botín; mi deseo se saciará con ellos[a]. Desenvainaré mi espada; mi mano los desposeerá»[b].'
  rationale: Se ajusta el texto principal para seguir la decisión lexical principal de la POB en נֶפֶשׁ («deseo» en vez de «alma»), dejando la opción más literal en nota. También se cambia «los despojará» por «los desposeerá» para reflejar mejor el matiz de ירשׁ como desposesión/conquista. Se corrigen y simplifican las notas para que coincidan con los anclajes reales del texto y con el patrón de alternativas preservadas por la auditoría inglesa.
