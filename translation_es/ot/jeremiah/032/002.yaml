translation:
  language: es
  text: En aquel tiempo el ejército del rey de Babilonia estaba sitiando Jerusalén[a], y Jeremías el profeta estaba encerrado en el patio de la guardia[b], que estaba en la casa del rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaba poniendo sitio a Jerusalén».'
    reason: alternative_reading
  - marker: b
    text: «Casa del rey de Judá» se refiere al complejo del palacio real.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אָז
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - Entonces
  - Y en aquel tiempo
  lexicon: HALOT
  rationale: El marcador temporal introduce el contexto histórico; «En aquel tiempo» conserva el valor discursivo sin sonar forzado en español.
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza militar
  - hueste
  lexicon: HALOT
  rationale: El sustantivo colectivo designa la fuerza militar del rey de Babilonia; «ejército» es el equivalente más claro y natural en español.
- source_word: צָרִים עַל
  english_pob_choice: was besieging
  chosen_spanish: estaba sitiando
  alternatives_spanish:
  - estaba poniendo sitio a
  - estaba cercando
  lexicon: HALOT
  rationale: El participio describe la acción militar en curso; «estaba sitiando» expresa bien el asedio sin perder el matiz aspectual.
- source_word: וְ/יִרְמְיָהוּ הַ/נָּבִיא
  english_pob_choice: and Jeremiah the prophet
  chosen_spanish: y Jeremías el profeta
  alternatives_spanish:
  - y el profeta Jeremías
  - y Jeremías, el profeta
  lexicon: HALOT
  rationale: Se mantiene la aposición explícita del hebreo; el orden elegido es fluido y fiel, sin omitir el título profético.
- source_word: הָיָה כָלוּא
  english_pob_choice: was confined
  chosen_spanish: estaba encerrado
  alternatives_spanish:
  - estaba confinado
  - estaba preso
  lexicon: HALOT
  rationale: «Encerrado» comunica la restricción de libertad sin implicar necesariamente una celda formal; preserva la precisión contextual del lugar guardado que sigue.
- source_word: בַּ/חֲצַר הַ/מַּטָּרָה
  english_pob_choice: in the court of the guard
  chosen_spanish: en el atrio de la guardia
  alternatives_spanish:
  - en el patio de la guardia
  - en el atrio del guardia
  lexicon: HALOT
  rationale: «חצר» puede ser «atrio» o «patio»; aquí «atrio» funciona bien en el registro bíblico. «מַּטָּרָה» se entiende como espacio de custodia/guardia, por eso «de la guardia» mantiene el sentido institucional sin convertirlo explícitamente en prisión.
- source_word: בֵּֽית מֶ֥לֶךְ יְהוּדָֽה
  english_pob_choice: which was in the house of the king of Judah
  chosen_spanish: que estaba en la casa del rey de Judá
  alternatives_spanish:
  - que estaba en el palacio del rey de Judá
  - que pertenecía a la casa del rey de Judá
  lexicon: HALOT
  rationale: Se conserva «casa» como en el hebreo y en el auditable inglés POB; el contexto real permite entender el complejo palaciego sin añadir una glosa al texto principal.
translation_notes:
  revision_awareness: El pasaje coincide con el estado revisado más reciente y con el cotejo de alta concordancia; no se detectaron cambios necesarios respecto del análisis fuente-inglés disponible.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no se presenta.
  - Se usa «atrio» para conservar el registro bíblico, pero la nota aclara el valor institucional del lugar.
  - No se sustituyó el léxico militar por formas más tradicionales no requeridas por la fuente; el aspecto progresivo de la acción queda explícito con «estaba sitiando».
