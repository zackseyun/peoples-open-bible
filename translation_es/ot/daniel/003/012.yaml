base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/012.yaml
  text: 'There are certain Jewish men whom you have appointed over the administration of the province of Babylon—Shadrach[a], Meshach, and Abed-nego. These men have paid no attention to you, O king: they do not serve your gods[b], and they do not worship the golden image that you have set up.'
  footnotes:
  - marker: a
    text: Or, 'have shown no regard for you' or 'have not heeded you.' The Aramaic idiom literally says they have not 'set' regard/attention toward the king.
    reason: lexical_alternative
  - marker: b
    text: 'The Aramaic uses different verbs here: they do not ''serve'' the king''s gods, and they do not ''worship'' the golden image.'
    reason: lexical_alternative
