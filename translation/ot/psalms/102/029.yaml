theological_decisions:
- issue: Whether to make the promise explicitly covenantal or eschatological beyond the wording of the verse
  chosen_reading: Retain the verse as a statement of enduring stability for the servants' descendants in God's presence without importing a more specific doctrinal framework.
  alternative_readings:
  - Read as an explicitly covenantal promise to Israel's line
  - Read as an explicitly eschatological promise of final salvation
  rationale: The Hebrew speaks of descendants dwelling and being established before God, but does not itself specify the fuller theological mechanism or horizon. Per translation philosophy, the rendering preserves the text's theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
