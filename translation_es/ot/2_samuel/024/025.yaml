base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/025.yaml
  text: There David built an altar to Yahweh and offered up burnt offerings and peace offerings[a]. So Yahweh responded to the land[c][b], and the plague was restrained from Israel.
  footnotes:
  - marker: a
    text: Or 'peace offerings,' alternatively 'fellowship offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD responded favorably for the land'; the expression may also be rendered 'the LORD answered prayer for the land.'
    reason: alternative_reading
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
