base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/006/015.yaml
  text: You have kept for your servant David my father what you spoke to him[a]; with your mouth you have spoken, and with your hand you have fulfilled it[b], as it is this day.
  footnotes:
  - marker: a
    text: Or 'what you promised him.' The Hebrew says literally 'what you spoke to him,' with the promissory sense inferred from the context of fulfillment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with your mouth ... and with your hand,' a Hebrew way of contrasting God's spoken word with his effective action.
    reason: cultural_note
