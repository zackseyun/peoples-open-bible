translation:
  language: es
  text: Queriot[a] ha sido capturada, y las fortalezas han sido tomadas; y el corazón de los guerreros de Moab será en aquel día como el corazón de una mujer con dolores de parto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Las ciudades han sido capturadas», si הַקְּרִיּוֹת se toma como nombre común y no como el topónimo Queriot.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַקְּרִיּוֹת
  english_pob_choice: Kerioth
  chosen_spanish: Queriot
  alternatives_spanish:
  - las ciudades
  lexicon: HALOT
  rationale: En este contexto se entiende mejor como nombre propio de la ciudad moabita Keriot/Kerioth, siguiendo la lectura del POB en inglés. En español se conserva el topónimo con adaptación gráfica habitual; la alternativa común ‘las ciudades’ queda señalada como posibilidad interpretativa.
- source_word: נִלְכְּדָה
  english_pob_choice: has been captured
  chosen_spanish: ha sido capturada
  alternatives_spanish:
  - es capturada
  - fue capturada
  - ha sido tomada
  lexicon: HALOT
  rationale: El nifal de לכד indica ser capturado o tomado. ‘Ha sido capturada’ mantiene el valor pasivo y el matiz de hecho consumado profético en español natural.
- source_word: הַמְּצָדוֹת
  english_pob_choice: the strongholds
  chosen_spanish: las fortalezas
  alternatives_spanish:
  - los baluartes
  - las fortificaciones
  lexicon: HALOT
  rationale: El término designa lugares fortificados. ‘Fortalezas’ es un equivalente claro y sobrio en español, sin cargar innecesariamente el término con detalles topográficos.
- source_word: נִתְפָּשָׂה
  english_pob_choice: have been seized
  chosen_spanish: han sido tomadas
  alternatives_spanish:
  - han sido apresadas
  - han sido capturadas
  lexicon: HALOT
  rationale: El pasivo de תפשׂ expresa ser tomado o apresado. En español, ‘han sido tomadas’ conserva el paralelismo militar con el verbo anterior y resulta idiomático.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el ánimo
  - el valor
  - la mente
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de ‘corazón’, que aquí comunica la sede interior del valor y la reacción emocional; evitar ‘ánimo’ o ‘valor’ preserva mejor la metáfora original.
- source_word: גִּבּוֹרֵי מוֹאָב
  english_pob_choice: Moab’s warriors
  chosen_spanish: los guerreros de Moab
  alternatives_spanish:
  - los valientes de Moab
  - los poderosos de Moab
  lexicon: HALOT
  rationale: En contexto militar, גִּבּוֹרִים se refiere a combatientes o guerreros. ‘Guerreros de Moab’ comunica el sentido con naturalidad moderna sin perder el matiz marcial.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - en ese día
  lexicon: HALOT
  rationale: La fórmula profética temporal se vierte con ‘aquel día’, una expresión natural en español bíblico contemporáneo que conserva la distancia deíctica del hebreo.
- source_word: כְּלֵב אִשָּׁה מְצֵרָה
  english_pob_choice: like the heart of a woman in labor
  chosen_spanish: como el corazón de una mujer en trabajo de parto
  alternatives_spanish:
  - como el corazón de una mujer en labor
  - como el corazón de una mujer en dolores de parto
  - como el corazón de una mujer en angustia
  lexicon: HALOT
  rationale: El participio femenino de צרר/צור describe a una mujer en labores de parto o parto doloroso. ‘Trabajo de parto’ es claro en español actual y conserva el símil de angustia extrema sin diluirlo.
theological_decisions:
- issue: Lectura de הַקְּרִיּוֹת como topónimo o como nombre común
  english_pob_reading: Kerioth has been captured, with a footnote allowing ‘The cities have been captured.’
  chosen_spanish_reading: Queriot ha sido capturada, con nota que permite ‘las ciudades han sido capturadas’.
  alternative_spanish_readings:
  - Las ciudades han sido capturadas
  - Queriot ha sido tomada
  rationale: Se mantiene la lectura principal como nombre propio, porque el contexto del oráculo enumera ciudades concretas de Moab. La alternativa común se preserva en nota para no borrar la ambigüedad léxica del hebreo.
  doctrine_reference: No aplica; decisión de toponimia y exégesis textual.
translation_notes:
  revision_awareness: Coincido con el pasaje base del POB inglés y su evaluación de alta concordancia. No se requieren revisiones sustantivas; solo se adapta la forma española manteniendo la misma decisión interpretativa principal y la nota alternativa sobre הַקְּרִיּוֹת.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; en este versículo no aparece.
  - Se conserva ‘corazón’ como metáfora hebrea, no se reduce a ‘valor’ o ‘ánimo’.
  - Se mantiene el paralelismo verbal con dos perfectos pasivos españoles para reflejar la sucesión de capturas y tomas.
  - ‘Trabajo de parto’ se prefiere por claridad moderna y fidelidad semántica al símil.
