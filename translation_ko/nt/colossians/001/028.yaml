id: COL.1.28
reference: Colossians 1:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃν ἡμεῖς καταγγέλλομεν νουθετοῦντες πάντα ἄνθρωπον καὶ διδάσκοντες πάντα ἄνθρωπον ἐν πάσῃ σοφίᾳ, ἵνα παραστήσωμεν πάντα ἄνθρωπον τέλειον ἐν ⸀Χριστῷ·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/028.yaml
  text: 'Him we proclaim, warning every person and teaching every person with all wisdom, so that we may present every person mature in Messiah.'
translation:
  language: ko
  text: 우리는 그분을 전파합니다. 모든 사람을 깨우치고 모든 사람을 모든 지혜로 가르쳐, 모든 사람을 메시아 안에서 성숙한 자로 세우려는 것입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ὃν ἡμεῖς καταγγέλλομεν
  english_pob_choice: Him we proclaim
  chosen_korean: 우리는 그분을 전파합니다
  alternatives_korean:
  - 우리가 그분을 선포합니다
  - 우리는 그분을 알립니다
  lexicon: BDAG
  rationale: 강조된 대명사 ὃν과 1인칭 복수 동사의 결합. 「전파」는 한국 교회의 정립된 표현.
- source_word: νουθετοῦντες
  english_pob_choice: warning
  chosen_korean: 깨우치고
  alternatives_korean:
  - 권면하고
  - 훈계하고
  lexicon: BDAG
  rationale: νουθετέω는 「마음에 두게 함·바로 잡음」을 가리킨다. 영어 POB의 「warning」 결정을 따라 「깨우치고」로 옮긴다(주의·시정을 함께 담음).
- source_word: πάντα ἄνθρωπον (×3)
  english_pob_choice: every person
  chosen_korean: 모든 사람
  alternatives_korean:
  - 각 사람
  lexicon: BDAG
  rationale: 3회 반복되는 πάντα ἄνθρωπον의 보편성을 「모든 사람」으로 일관되게 옮긴다.
- source_word: διδάσκοντες ... ἐν πάσῃ σοφίᾳ
  english_pob_choice: teaching ... with all wisdom
  chosen_korean: 모든 지혜로 가르쳐
  alternatives_korean:
  - 모든 지혜를 가지고 가르치며
  lexicon: BDAG
  rationale: ἐν + 여격을 수단·방식으로 「~로」 옮긴다.
- source_word: ἵνα παραστήσωμεν
  english_pob_choice: so that we may present
  chosen_korean: ~ 세우려는 것입니다
  alternatives_korean:
  - 세우고자 함이며
  - 드리려는 것입니다
  lexicon: BDAG
  rationale: 부정과거 가정법 + ἵνα의 목적절을 「세우려는 것입니다」로 옮긴다.
- source_word: τέλειον
  english_pob_choice: mature
  chosen_korean: 성숙한 자
  alternatives_korean:
  - 온전한 자
  - 완전한 자
  lexicon: BDAG
  rationale: τέλειος는 「완전·성숙」을 함께 담는다. 본 사역적 문맥에서는 「성숙한」이 자연스럽다.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에서
  alternatives_korean:
  - 그리스도 안에서
  lexicon: BDAG
  rationale: Χριστός의 칭호성 보존.
