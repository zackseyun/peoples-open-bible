  to: Y algunos de ellos fueron puestos a cargo de los utensilios, de todos los utensilios sagrados[a], y de la flor de harina, del vino, del aceite, del olíbano y de las especias.
  rationale: Se corrige «incienso» a «olíbano» para reflejar con precisión לְבוֹנָה. Se restituye en el texto principal una traducción más directa de כָּל כְּלֵי הַקֹּדֶשׁ como «todos los utensilios sagrados», conservando «del santuario» como alternativa en nota, en línea con el expediente inglés. También se mueve el marcador de nota al lugar correcto y se suaviza «Y de entre ellos» a «Y algunos de ellos», que expresa mejor el partitivo de forma idiomática en español.
