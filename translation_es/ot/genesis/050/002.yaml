translation:
  language: es
  text: Entonces José mandó a sus siervos[a], los médicos, embalsamar a su padre[b]; y los médicos embalsamaron a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus esclavos»; el término hebreo puede denotar siervos o esclavos según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Israel», es decir, Jacob.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden de
  lexicon: HALOT
  rationale: El verbo de צוה expresa dar una instrucción con autoridad. En español, «mandó» conserva esa fuerza de mando sin volverse excesivamente solemne o rígido.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus esclavos
  lexicon: HALOT
  rationale: Aquí el contexto es administrativo y cortesano, no una discusión sobre la institución de la esclavitud. «Servidores» refleja la función inmediata y evita imponer «esclavos» donde el énfasis del pasaje no está en el estatus jurídico.
- source_word: הָרֹפְאִים
  english_pob_choice: the physicians
  chosen_spanish: los médicos
  alternatives_spanish:
  - los médicos cirujanos
  - los sanadores
  lexicon: HALOT
  rationale: El participio de רפא señala a quienes practican la curación. «Médicos» es natural en español y encaja bien con el entorno egipcio-cortesano del relato.
- source_word: לַחֲנֹט
  english_pob_choice: to embalm
  chosen_spanish: embalsamar
  alternatives_spanish:
  - preparar con especias
  - momificar
  lexicon: HALOT
  rationale: En este contexto el verbo se refiere específicamente al tratamiento funerario del cuerpo. «Embalsamar» es el equivalente español más claro y estándar; «momificar» sería posible, pero sugiere de forma más estrecha una técnica egipcia específica y suena menos natural en una traducción bíblica general.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - a su progenitor
  lexicon: HALOT
  rationale: Es una posesión simple y directa; no hay presión contextual para alterar el sentido básico.
- source_word: וַיַּחַנְטוּ
  english_pob_choice: embalmed
  chosen_spanish: embalsamaron
  alternatives_spanish:
  - prepararon para el entierro mediante embalsamamiento
  lexicon: HALOT
  rationale: Se mantiene la correspondencia verbal con לַחֲנֹט y se preserva el avance narrativo con un pretérito simple en español.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «Israel». Se conserva ese nombre en vez de armonizarlo con «Jacob».
theological_decisions:
- issue: Rendering of עבד in a non-theologically charged household context
  english_pob_reading: servants
  chosen_spanish_reading: servidores
  alternative_spanish_readings:
  - esclavos
  - siervos
  rationale: Siguiendo la lectura contextual del POB en inglés, aquí no se subraya el estatus de esclavitud sino la función dentro de la casa/administración de José. «Servidores» comunica mejor esa relación funcional en español sin borrar la posibilidad semántica más amplia del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; principio contextual para términos de servicio/bondad
- issue: Retention of the Hebrew name Israel in the closing clause
  english_pob_reading: Hebrew 'Israel,' that is, Jacob.
  chosen_spanish_reading: Israel
  alternative_spanish_readings:
  - Jacob
  - Israel, es decir, Jacob
  rationale: La forma hebrea preserva el nombre «Israel» en este versículo. El texto no requiere armonización interna; si se desea aclaración, puede ir en nota, pero el cuerpo principal debe respetar el término fuente.
  doctrine_reference: Principio de preservación del nombre propio según el texto fuente
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el expediente auditado en inglés, manteniendo la secuencia narrativa, el nombre propio «Israel» y la terminología de embalsamamiento. No se documentaron revisiones posteriores que exigieran ajustar el texto base.
  spanish_consistency_notes:
  - Se prefirió «mandó» para צוה por su equilibrio entre autoridad y naturalidad en español.
  - «Servidores» se usa como equivalente contextual de עֲבָדָיו, evitando una imposición no requerida de «esclavos».
  - «Médicos» y «embalsamaron» sostienen el campo semántico médico-funerario del versículo.
  - Se conservó «Israel» en el texto principal y se aclaró la identidad en nota.
  - La puntuación con punto y coma refleja bien la coordinación narrativa del hebreo sin sobrecargar la sintaxis española.
