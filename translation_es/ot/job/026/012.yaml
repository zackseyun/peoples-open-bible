revisions:
- from: Con su poder aquietó el mar[a], y con su entendimiento hirió a Rahab.
  to: Con su poder aquietó el mar[a], y con su entendimiento destrozó a Rahab.
  rationale: Se requiere una reparación puntual para alinear מָחַץ con su fuerza semántica en el hebreo y con la decisión auditada en inglés. «Destrozó» preserva mejor la violencia poética de la derrota cósmica que «hirió», mientras que el resto del verso puede mantenerse. La nota se pule levemente para mayor naturalidad en español sin cambiar su contenido.
