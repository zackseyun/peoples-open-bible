    text: O 'los amonitas' para 'los hijos de Amón'.
    reason: lexical_alternative
  - marker: b
    text: O 'los arameos'; hebreo 'Aram'.
    reason: lexical_alternative
  - marker: c
    text: La expresión 'de su ataque contra los hijos de Amón' comunica la retirada de Joab del combate contra ellos.
    reason: cultural_note
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras pertinentes en el texto. También se reemplazó 'de en medio de los hijos de Amón' por 'de su ataque contra los hijos de Amón' para reflejar mejor el valor militar de מֵעַל en contexto, siguiendo la intención documentada por la nota inglesa. Además, 'huyeron ante Abisai' mejora la naturalidad del español sin perder fidelidad.
