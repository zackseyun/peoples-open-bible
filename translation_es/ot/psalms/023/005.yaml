  text: תַּעֲרֹ֬ךְ לְ/פָנַ֨/י שֻׁלְחָ֗ן נֶ֥גֶד צֹרְרָ֑/י דִּשַּׁ֖נְתָּ בַ/שֶּׁ֥מֶן רֹ֝אשִׁ֗/י כּוֹסִ֥/י רְוָיָֽה׀׃
