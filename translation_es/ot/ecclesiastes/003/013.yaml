translation:
  language: es
  text: Y también que todo hombre coma y beba y vea el bien en todo su trabajo[a][b]—esto es don de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el mundo» / «toda persona»; el hebreo usa un singular genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «disfrute del bien» o «experimente el bien»; el hebreo dice literalmente «ver el bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also that
  chosen_spanish: Y también que
  alternatives_spanish:
  - Además, que
  - Y asimismo que
  lexicon: HALOT
  rationale: La partícula conjuntiva-adverbial añade esta afirmación a lo anterior. «Y también que» conserva el valor aditivo y la conexión de la cláusula sin forzar un giro más interpretativo.
- source_word: כָּל הָאָדָם
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - cada persona
  - todo ser humano
  lexicon: HALOT
  rationale: אָדָם funciona aquí de manera genérica y distributiva. Se mantiene «hombre» para reflejar la forma masculina genérica del hebreo, siguiendo el principio de precisión léxica, con una nota que preserve el sentido inclusivo.
- source_word: שֶׁיֹּאכַל וְשָׁתָה
  english_pob_choice: should eat and drink
  chosen_spanish: coma y beba
  alternatives_spanish:
  - deba comer y beber
  - pueda comer y beber
  - coma y pueda beber
  lexicon: HALOT
  rationale: La construcción expresa lo que corresponde o se concede como bien humano. En español, el subjuntivo coordinado «coma y beba» comunica de manera natural esa orientación sin añadir modalidad más fuerte de la que exige el hebreo.
- source_word: וְרָאָה טוֹב
  english_pob_choice: and see good
  chosen_spanish: y vea bien
  alternatives_spanish:
  - y vea lo bueno
  - y disfrute del bien
  - y experimente el bien
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ver bien». En Eclesiastés puede implicar experimentar o disfrutar el bien, pero «vea bien» conserva la imagen fuente sin paraphrasear más allá del texto. En español la frase sigue siendo comprensible como juicio favorable/experiencia de bien.
- source_word: בְּכָל עֲמָלוֹ
  english_pob_choice: in all his labor
  chosen_spanish: en todo su trabajo
  alternatives_spanish:
  - en toda su labor
  - en todo su afán
  - en toda su fatiga
  lexicon: HALOT
  rationale: עָמָל en Eclesiastés suele señalar trabajo penoso o esfuerzo. «Trabajo» es un equivalente moderno y claro; se evita endurecer innecesariamente el tono con «fatiga» y se conserva la relación preposicional «en».
- source_word: מַתַּת אֱלֹהִים הִיא
  english_pob_choice: this is the gift of God
  chosen_spanish: esto es don de Dios
  alternatives_spanish:
  - esto es el don de Dios
  - esto es un don de Dios
  - esto es regalo de Dios
  lexicon: HALOT
  rationale: La cláusula nominal identifica la realidad precedente como algo dado por Dios. «Don de Dios» reproduce con dignidad la formulación bíblica y mantiene la fuerza teológica de la dádiva divina; se evita «SEÑOR» o similares porque el hebreo usa אֱלֹהִים.
theological_decisions:
- issue: ÁDÁM genérico y el alcance humano del versículo
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda persona
  - cada persona
  - todo ser humano
  rationale: El hebreo usa אָדָם en sentido representativo y genérico. Se conserva la forma masculina del original en el texto principal, sin perder inteligibilidad, y la nota permite al lector entender el alcance universal del enunciado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Sentido de 'see good' en Eclesiastés
  english_pob_reading: and see good
  chosen_spanish_reading: y vea bien
  alternative_spanish_readings:
  - y disfrute del bien
  - y experimente el bien
  - y vea lo bueno
  rationale: El hebreo literalmente dice «ver bien». En el contexto sapiencial de Eclesiastés, eso puede abarcar disfrutar o experimentar el bien, pero el texto principal preserva la metáfora de la percepción visual y deja la expansión interpretativa a la nota.
  doctrine_reference: Eclesiastés 3:13; uso idiomático de רָאָה טוֹב
- issue: Don divino en una afirmación sapiencial
  english_pob_reading: this is the gift of God
  chosen_spanish_reading: esto es don de Dios
  alternative_spanish_readings:
  - esto es el don de Dios
  - esto es un regalo de Dios
  rationale: La frase final presenta como procedencia divina la capacidad/porción descrita en el versículo. «Don de Dios» conserva la solemnidad y el énfasis en la dádiva proveniente de Dios, sin introducir matices ajenos.
  doctrine_reference: Eclesiastés 3:13; doctrina bíblica de la providencia y la dádiva divina
translation_notes:
  revision_awareness: Se siguió de cerca el expediente auditado en inglés y no se detectaron revisiones pendientes relevantes; la formulación española refleja la decisión vigente de mantener el valor genérico de אָדָם, la imagen hebrea de «ver bien» y la clausula final como don procedente de Dios.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal para el Tetragrámaton en este proyecto, pero en este versículo el hebreo dice אֱלֹהִים, por lo que corresponde «Dios».
  - Se usó «don» para preservar la sobriedad bíblica de מַתַּת, en lugar de un equivalente más coloquial como «regalo».
  - No se neutralizó «hombre» en el texto principal porque el expediente inglés documenta el uso genérico de אָדָם; la nota cubre la lectura inclusiva.
  - La puntuación con raya larga ayuda a reproducir la clausura enfática del hebreo sin alterar el sentido.
