revisions:
- from: El hombre sabio será cauteloso en todo[a][b], y en días de pecado cuidará de apartarse del delito.
  to: El hombre sabio será cauteloso en todo[a][b], y en días de pecados se guardará de la mala acción.
  rationale: 'La revisión conserva la buena base del borrador, pero corrige dos puntos importantes de fidelidad léxica: restituye el plural «pecados» y reemplaza «delito» por una expresión más amplia y sapiencial, «la mala acción». Además, «se guardará de» refleja con más naturalidad y cercanía el valor de προσέξει ἀπὸ en este contexto de advertencia moral.'
