  yaml_path: translation/deuterocanon/1_esdras/005/051.yaml
  text: And after these[a], the regular offerings[b], and the sacrifices for Sabbaths and new moons and all the consecrated feasts.
  footnotes:
  - marker: a
    text: Or 'the continual offerings.' The Greek term behind 'regular' can denote offerings made continuously or on a fixed recurring basis.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Ezra emphasizes the burnt offering 'day by day, according to the number required for each day.' First Esdras here presents a broader summary of the regular sacred calendar.
