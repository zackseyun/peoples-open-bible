review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: verbo de residencia seguido de tres topónimos. Sin embargo, hay inconsistencias en la onomástica frente al propio rastro léxico auditado: el inglés base conserva Moladah y Hazar-shual como transliteraciones, mientras que el español adapta dos nombres de manera poco trazable y además la nota b está anclada al nombre equivocado en el texto inglés auditado. La propuesta española también introduce una nota para Beer-seba que es aceptable, pero conviene normalizar los topónimos para mayor fidelidad y claridad.'
  spanish_quality_summary: '«Habitaron» es natural y digno en español bíblico. No obstante, la mezcla de Beer-seba, Molada y Hazar-Sual produce una transliteración irregular. «Molada» puede alejar innecesariamente del hebreo מוֹלָדָה y de la forma auditada Moladah; «Hazar-Sual» es legible, pero la nota asociada habla de «Hazar-shual» mientras el ancla inglesa b en realidad pertenecía a Moladah, lo que revela desalineación interna. Una forma más coherente y legible para español amplio es conservar transliteraciones cercanas al hebreo: «Beerseba», «Moladá» y «Hazar-sual», con notas solo donde realmente ayudan.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. En onomástica, el proyecto pide preservar el sentido fuente y la racionalidad léxica documentada. La revisión mantiene transliteración de topónimos sin traducirlos, mejora la consistencia interna y evita depender de formas inglesas innecesarias.
  issues:
  - severity: medium
    issue: Transliteración inconsistente de topónimos
    rationale: El borrador usa «Beer-seba», «Molada» y «Hazar-Sual», mezclando criterios diferentes. Para una lista geográfica, conviene un criterio más uniforme y más cercano al hebreo/auditoría.
  - severity: medium
    issue: «Molada» reduce la trazabilidad de מוֹלָדָה
    rationale: La forma «Molada» omite la aspiración final reflejada en la transliteración auditada «Moladah» y puede parecer castellanización ad hoc. «Moladá» conserva mejor la forma y sigue siendo pronunciable en español.
  - severity: medium
    issue: Desajuste entre anclaje y contenido de la nota b en relación con la auditoría inglesa
    rationale: En la auditoría inglesa, la nota b está ligada a Moladah aunque su contenido describe Hazar-shual. El español replica una nota sobre Hazar-Sual anclada al nombre final, lo cual es internamente más lógico, pero ya no sigue el rastro documentado. Es mejor simplificar y dejar solo una nota útil sobre Beerseba.
  revised_spanish_text: Habitaron en Beerseba[a], Moladá y Hazar-sual.
