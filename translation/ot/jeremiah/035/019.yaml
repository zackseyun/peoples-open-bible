id: JER.35.19
reference: Jeremiah 35:19
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֑ל לֹֽא יִכָּרֵ֨ת אִ֜ישׁ לְ/יוֹנָדָ֧ב בֶּן רֵכָ֛ב עֹמֵ֥ד לְ/פָנַ֖/י כָּל הַ/יָּמִֽים־־־׃פ
translation:
  text: 'Therefore thus says Yahweh of hosts[b][a], the God of Israel: Jonadab the son of Rechab shall never lack a man standing before me all the days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'shall not be cut off from Jonadab son of Rechab a man standing before me all the days.'
    reason: lexical_alternative
  - marker: b
    text: '''Standing before me'' may denote service in God''s presence; the text does not specify a particular office.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the divine conclusion based on the preceding narrative.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'thus says' preserves the formal prophetic cadence without obscurity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently transparent rendering, preserving the breadth of heavenly/earthly armies rather than narrowing to military forces alone.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Israel's covenant God.
- source_word: לֹא יִכָּרֵת
  chosen: shall never lack
  alternatives:
  - shall not be cut off
  - shall never be cut off from
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off,' but in this idiom with 'a man' and a family line it means not to fail in descendants/representatives. 'Shall never lack' communicates the idiomatic sense in natural English while preserving the promise of ongoing lineage.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - any man
  - someone
  lexicon: HALOT
  rationale: Singular masculine noun here refers to an ongoing male representative from Jonadab's line. 'A man' is gender-accurate to the Hebrew and fits the dynastic idiom.
- source_word: לְיוֹנָדָב בֶּן־רֵכָב
  chosen: Jonadab son of Rechab
  alternatives:
  - Jehonadab son of Rechab
  lexicon: HALOT
  rationale: Standard transliteration of the personal name as it appears here; 'Jonadab' is a common English form for יוֹנָדָב.
- source_word: עֹמֵד לְפָנַי
  chosen: standing before me
  alternatives:
  - to stand before me
  - serving me in my presence
  lexicon: HALOT
  rationale: Literally 'standing before me.' The phrase can imply service in God's presence, but the text does not specify priestly or temple service, so the more literal wording preserves the theological breadth.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - forever
  - continually
  lexicon: HALOT
  rationale: Literal rendering of the temporal phrase. Although idiomatically it conveys enduring perpetuity, 'all the days' preserves the Hebrew expression without over-interpreting its exact temporal scope.
