translation:
  language: es
  text: Tú te los llevas[a] como una inundación; son como un sueño[b]. Por la mañana son como hierba que brota de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú los barres como una inundación»; o «Tú los arrastras como una corriente». El hebreo es muy comprimido y evoca la imagen de ser llevados por una fuerza impetuosa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «como sueño» o «como sueño del dormir». El hebreo usa la palabra «sueño/sueño del dormir», y en español «sueño» preserva la ambigüedad entre dormir y soñar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְרַמְתָּם
  english_pob_choice: You sweep them away
  chosen_spanish: Tú los arrastras lejos
  alternatives_spanish:
  - Tú los arrebatas como una corriente
  - Tú los inundas lejos
  - Tú los barres lejos
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción de arrastre violento por un flujo; en español, «arrastras lejos» conserva la idea de remoción súbita e implacable sin obligar a especificar agua si el contexto poético permite una imagen más amplia. Se evita un calco rígido que sonaría menos natural.
- source_word: שֵׁנָה
  english_pob_choice: sleep / dream
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño ligero
  - dormir
  - reposo
  lexicon: HALOT
  rationale: La secuencia hebrea es muy comprimida. La tradición auditada del POB inglés reconoció la posibilidad de «sleep» y luego la de «dream»; en español, «sueño» mantiene esa misma ambigüedad léxica entre dormir y sueño, y suena más natural en una comparación poética que «como sueño» en sentido estrecho de dormir.
- source_word: יִהְיוּ
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - están
  - llegan a ser
  - serán
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en poesía funciona de modo gnómico/descriptivo. El presente español «son» reproduce bien ese valor caracterizador sin sugerir un proceso temporal.
- source_word: בַּבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - Al amanecer
  - A la mañana
  lexicon: HALOT
  rationale: «Por la mañana» es una equivalencia natural y clara en español general, y mantiene el contraste temporal con la fugacidad de la imagen vegetal.
- source_word: כֶּחָצִיר
  english_pob_choice: like grass
  chosen_spanish: como hierba
  alternatives_spanish:
  - como pasto
  - como césped
  - como heno
  lexicon: HALOT
  rationale: חָצִיר puede significar hierba o vegetación tierna; «hierba» conserva el valor bíblico amplio y evita restringir la imagen a césped ornamental o a pasto regional.
- source_word: יַחֲלֹף
  english_pob_choice: they are like grass that sprouts anew
  chosen_spanish: brota de nuevo
  alternatives_spanish:
  - renace
  - vuelve a brotar
  - se renueva
  lexicon: HALOT
  rationale: La revisión auditada del POB inglés corrigió una lectura de «pasar» por una idea de renovación/surgimiento. En español, «brota de nuevo» expresa ese matiz de modo concreto y coherente con el paralelo inmediato del contexto poético.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail inglés, que rechazó «they pass away» y afirmó una imagen de hierba que brota de nuevo. También toma en cuenta la compresión del hebreo y la tensión léxica entre «sleep» y «dream», manteniéndola de forma controlada en español mediante «sueño».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» reservado para contextos donde aparece el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» y «Cristo» por no corresponder al texto.
  - «Hierba» se usa como término amplio y no técnico, coherente con el paralelismo poético.
  - La puntuación refleja dos miembros poéticos principales con un complemento temporal separado.
