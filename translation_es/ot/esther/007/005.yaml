translation:
  language: es
  text: 'Entonces dijo el rey Asuero a Ester la reina: «¿Quién es ese, y dónde está[b], el que ha llenado su corazón[a] para hacer esto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ha llenado su corazón para hacer esto», un modismo que significa «se ha atrevido» o «ha presumido» hacer tal cosa.'
    reason: lexical_alternative
  - marker: b
    text: O, menos probablemente, «y cuál es él», si la frase se entiende como identificación del culpable más que como pregunta por su paradero.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» mantiene la secuencia natural en español sin perder el valor discursivo del hebreo.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - Asuero, el rey
  - el rey Ahasuero
  lexicon: HALOT
  rationale: Se conserva el título real y el nombre propio transliterado en forma habitual en español. El orden español más natural es título + nombre.
- source_word: לְאֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: said to Esther the queen
  chosen_spanish: a Ester la reina
  alternatives_spanish:
  - a la reina Ester
  - a Ester, la reina
  lexicon: HALOT
  rationale: 'La apposición hebrea se mantiene de manera transparente: «Ester la reina». «La reina Ester» es más idiomático, pero desplaza ligeramente la estructura del original.'
- source_word: מִי הוּא זֶה
  english_pob_choice: Who is he
  chosen_spanish: ¿Quién es ese?
  alternatives_spanish:
  - ¿Quién es él?
  - ¿Quién es este?
  lexicon: HALOT
  rationale: El hebreo combina pregunta de identidad con demostrativo enfático. «Ese» conserva mejor la deixis sin agregar «hombre» ni forzar un masculino personal donde el texto no lo explicita.
- source_word: וְאֵי זֶה הוּא
  english_pob_choice: and where is he
  chosen_spanish: y dónde está
  alternatives_spanish:
  - y cuál es
  - y qué otro es
  lexicon: HALOT
  rationale: Siguiendo el valor locativo de אֵי, «dónde está» refleja la pregunta por el paradero. Se conserva la alternativa interpretativa de identificación en la nota correspondiente.
- source_word: אֲשֶׁר מְלָא֥וֹ לִבּ֖וֹ
  english_pob_choice: who has filled his heart
  chosen_spanish: el que se ha llenado el corazón
  alternatives_spanish:
  - el que ha llenado su corazón
  - el que se ha atrevido
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea del «corazón» como sede de decisión y audacia. La formulación evita borrar el giro idiomático que en contexto significa atreverse o presumir.
- source_word: לַעֲשׂוֹת כֵּן
  english_pob_choice: to do this
  chosen_spanish: para hacer así
  alternatives_spanish:
  - para hacer esto
  - para obrar de ese modo
  lexicon: HALOT
  rationale: «Así» retoma con naturalidad el referimiento al acto ya descrito y deja visible la conexión con la ofensa específica del contexto.
translation_notes:
  revision_awareness: La versión española sigue el sentido y la estructura del hebreo con la ayuda del audit trail en inglés. Se mantuvo la imagen idiomática del «corazón» en la pregunta del rey y se conservó la ambigüedad entre localización e identificación en la segunda interrogante, tal como lo documenta la nota inglesa.
  spanish_consistency_notes:
  - Se usa «Asuero» como forma española estándar del nombre.
  - Se conserva «Ester la reina» para reflejar la apposición hebrea.
  - Se mantiene el verbo de habla en pasado simple («dijo») para una narración fluida y fiel.
  - Se evita reemplazar la imagen del corazón por una paráfrasis interpretativa en el texto principal.
  - La puntuación de diálogo sigue el uso moderno en español, con comillas para la cita directa.
