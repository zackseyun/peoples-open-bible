translation:
  language: es
  text: Has visto, Yahvé, la injusticia contra mí[a]; juzga mi causa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mal hecho contra mí»; el hebreo puede denotar agravio, distorsión o injusticia.
    reason: lexical_alternative
  - marker: b
    text: O «vindica mi causa».
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתָה
  english_pob_choice: You have seen
  chosen_spanish: Tú has visto
  alternatives_spanish:
  - Tú viste
  - Has visto
  lexicon: HALOT
  rationale: El perfecto 2ms de ראה conserva en español un perfecto compuesto de fuerza actual en una súplica dirigida a Dios. «Has visto» expresa mejor la relevancia presente del acto que un pretérito simple, y mantiene la cercanía del reproche/lamento.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahvé
  - oh SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como «Yahvé», conforme al criterio del proyecto. «Oh» reproduce la vocación directa y natural en español, sin sustituir el nombre por un título.
- source_word: עַוָּתָתִי
  english_pob_choice: the wrong done to me
  chosen_spanish: el mal hecho contra mí
  alternatives_spanish:
  - la injusticia contra mí
  - el agravio hecho contra mí
  - mi agravio
  lexicon: HALOT
  rationale: El sustantivo puede abarcar daño, perversión o injusticia. En este contexto de lamento forense, «el mal hecho contra mí» preserva la referencia a una injuria sufrida y evita invertir el sentido como si fuera culpa del hablante. «Contra mí» ayuda a explicitar la dirección objetiva del daño en español.
- source_word: שָׁפְטָה
  english_pob_choice: judge
  chosen_spanish: juzga
  alternatives_spanish:
  - juzga
  - haz justicia en
  - da sentencia sobre
  lexicon: HALOT
  rationale: El imperativo/vocativo de שׁפט pide acción judicial divina. «Juzga» es la forma más directa y mantiene la metáfora legal sin introducir una interpretación más amplia que el hebreo no exige.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my case
  chosen_spanish: mi causa
  alternatives_spanish:
  - mi caso
  - mi causa
  - mi justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט en este contexto forense admite «causa», que suena natural en español bíblico moderno y conserva la idea de una reclamación legal o litigio. «Mi caso» también es posible, pero «mi causa» equilibra fidelidad y registro literario.
theological_decisions:
- issue: Uso del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Yahvé
  - oh SEÑOR
  rationale: El texto hebreo contiene el nombre propio de Dios y el marco doctrinal del proyecto pide transliterarlo como «Yahvé». Se evita la sustitución tradicional por «SEÑOR» para no ocultar el nombre revelado en el original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עַוָּתָתִי
  english_pob_reading: the wrong done to me
  chosen_spanish_reading: el mal hecho contra mí
  alternative_spanish_readings:
  - la injusticia contra mí
  - el agravio hecho contra mí
  - mi agravio
  rationale: La lectura debe reflejar que el salmista/lamen-tista apela a Dios por la injusticia sufrida, no confesando su propia falta. Traducirlo de modo subjetivo debilitaría el paralelismo con la petición judicial inmediata.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3'
- issue: Valor forense de מִשְׁפָּטִי
  english_pob_reading: my case
  chosen_spanish_reading: mi causa
  alternative_spanish_readings:
  - mi caso
  - mi causa
  - mi justicia
  rationale: En un contexto de petición judicial, «causa» preserva el valor de litigio o reclamación. «Mi justicia» sería demasiado abstracto o moralizante; «mi caso» es válido pero menos elevado en registro.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1'
translation_notes:
  revision_awareness: Coincide con la última revisión, que no introdujo cambios; se mantiene la lectura forense y la preferencia por el nombre divino «Yahvé» sin sustitución por un título.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Tetragrámaton, coherente con el proyecto.
  - 'Se conserva un registro bíblico sobrio pero idiomático: «juzga mi causa» evita la paráfrasis y preserva el campo jurídico.'
  - «El mal hecho contra mí» explicita la orientación objetiva del sustantivo hebreo sin borrar su ambigüedad semántica.
