  rationale: Se hace una reparación menor para mejorar la naturalidad del español y reflejar mejor la imagen del verbo hebreo de vuelo ascendente, manteniendo intacto el sentido y la decisión léxica principal. La nota se limpia estilísticamente sin cambiar su contenido.
