review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en los puntos principales: «sacrificó», las cifras, «la casa de Dios» y la reanudación discursiva con «el rey y todo el pueblo». También preserva correctamente la nota léxica sobre צֹאן. Sin embargo, «veintidós mil cabezas de ganado» introduce una formulación contable no presente en el original ni en el POB inglés; el hebreo y el inglés simplemente expresan el colectivo «ganado/cattle».'
  spanish_quality_summary: El español es claro y natural en general, con registro digno y legible. La única aspereza notable es «cabezas de ganado», que suena más técnico-comercial y menos bíblico/literario que «ganado». El resto del verso fluye bien y mantiene buena legibilidad eclesial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» y «la casa de Dios» están bien. La decisión «ovejas[a]» con nota sobre «ganado menor» está alineada con la auditoría inglesa. La mejora propuesta solo ajusta «זבח הבקר» de «cabezas de ganado» a «ganado» para mayor fidelidad y mejor estilo.
  issues:
  - severity: medium
    issue: «cabezas de ganado» añade una unidad de conteo no explícita en el original
    rationale: זֶבַח הַבָּקָר y el POB inglés usan un colectivo simple («cattle»). «Cabezas de ganado» no es incorrecto en español, pero introduce un matiz contable más específico y menos literal, además de sonar más técnico de lo necesario.
  revised_spanish_text: Y el rey Salomón sacrificó veintidós mil reses y ciento veinte mil ovejas[a], y el rey y todo el pueblo dedicaron la casa de Dios.
  revised_footnotes:
  - marker: a
    text: O «ganado menor», pues el término hebreo puede incluir ovejas y cabras en conjunto.
    reason: lexical_alternative
