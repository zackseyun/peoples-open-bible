translation:
  language: es
  text: Pero Israel no quemó ninguna de las ciudades que estaban sobre sus montículos[a], excepto solo a Hazor; Josué la quemó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaban sobre sus tells», es decir, sobre montículos de asentamiento formados por sucesivas capas de habitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Solo
  - Sin embargo
  lexicon: HALOT
  rationale: Introduce contraste/excepción respecto del contexto anterior. «Pero» conserva el giro adversativo de forma natural en español.
- source_word: כָּל הֶעָרִים
  english_pob_choice: any of the cities
  chosen_spanish: ninguna de las ciudades
  alternatives_spanish:
  - todas las ciudades
  - todas las ciudades de ellas
  lexicon: HALOT
  rationale: Con la negación, el hebreo expresa un sentido distributivo equivalente a «ninguna de las ciudades». En español suena más natural y conserva la fuerza del negativo.
- source_word: הָעֹמְדוֹת עַל תִּלָּם
  english_pob_choice: that stood on their mounds
  chosen_spanish: que estaban sobre sus montículos
  alternatives_spanish:
  - que estaban sobre sus tells
  - que se alzaban sobre sus montículos
  lexicon: HALOT
  rationale: «תִּלָּם» alude a montículos de asentamiento. «Montículos» comunica el sentido sin depender del tecnicismo arqueológico «tells». «Que estaban sobre» mantiene el valor participial sin forzar una imagen poco natural en español.
- source_word: לֹא שְׂרָפָם יִשְׂרָאֵל
  english_pob_choice: Israel did not burn
  chosen_spanish: Israel no quemó
  alternatives_spanish:
  - Israel no las quemó
  - Israel no las incendió
  lexicon: HALOT
  rationale: «Quemó» es el equivalente más directo y natural para el verbo. El objeto ya queda expresado por «ninguna de las ciudades», por lo que no hace falta repetirlo.
- source_word: זוּלָתִי
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - menos
  lexicon: HALOT
  rationale: Marca con claridad la única excepción en español contemporáneo.
- source_word: לְבַדָּהּ
  english_pob_choice: alone
  chosen_spanish: solamente
  alternatives_spanish:
  - sola
  - por sí sola
  lexicon: HALOT
  rationale: Tras el nombre propio, «solamente» comunica la exclusividad de modo natural en español. Evita la ambigüedad de «sola», que puede sonar más personal que adverbial.
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jazor
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio, como en el contexto auditado en inglés.
- source_word: שָׂרַף יְהוֹשֻׁעַ
  english_pob_choice: Joshua burned it
  chosen_spanish: Josué la quemó
  alternatives_spanish:
  - Josué la incendió
  - Josué la prendió fuego
  lexicon: HALOT
  rationale: El verbo se repite en hebreo; en español conviene explicitar el referente femenino de Hazor con «la» para mantener claridad. «Quemó» corresponde de forma directa al verbo hebreo.
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB no introdujo cambios; se mantuvo el acuerdo alto con el texto fuente. La presente redacción sigue esa línea, conservando la excepción, el contraste y el sentido topográfico de תִּלָּם sin introducir interpretaciones ajenas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no figura.
  - Se conserva una diferencia funcional entre «montículos» y el tecnicismo «tells», explicada en nota.
  - «Quemó» traduce el verbo hebreo con sencillez; no se introduce una paraphrasis de destrucción no presente en el texto.
  - «Josué» y «Hazor» siguen la transliteración bíblica usual en español.
  - La nota [a] se ancla en «montículos» para preservar la alternativa lexical documentada.
