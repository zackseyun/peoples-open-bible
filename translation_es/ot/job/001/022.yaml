revisions:
- from: En todo esto[a], Job no pecó, ni atribuyó a Dios[b] ninguna impropiedad.
  to: En todo esto, Job no pecó, ni atribuyó a Dios nada indebido[a].
  rationale: Se conserva la fidelidad al hebreo y al POB, pero se mejora la naturalidad del español con «nada indebido», que expresa mejor la fuerza moral de תִּפְלָה. Se simplifican las notas para conservar solo la alternativa léxica realmente significativa documentada por la auditoría inglesa.
  reviewer_model: gpt-5.4
