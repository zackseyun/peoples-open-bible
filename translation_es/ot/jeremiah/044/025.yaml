base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/025.yaml
  text: 'Thus says Yahweh of hosts[a], the God of Israel: You and your wives have spoken with your mouths and fulfilled it with your hands, saying, ‘We will surely perform our vows that we have vowed, to burn incense to the Queen of Heaven and to pour out drink offerings to her.’ Go ahead, confirm your vows and perform your vows.'
  footnotes:
