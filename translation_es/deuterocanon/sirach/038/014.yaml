translation:
  language: es
  text: pues su ruego puede prosperar[a], y su curación sirve para preservar la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo פשרה es incierto aquí. El paralelo griego dice más explícitamente: «ellos también rogarán al Señor, para que él les conceda alivio y curación a fin de seguir con vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: פשרה
  english_pob_choice: his plea
  chosen_spanish: su ruego
  alternatives_spanish:
  - su plegaria
  - su petición
  - su intercesión
  lexicon: HALOT; Greek δεηθήσονται
  rationale: El hebreo es difícil y el paralelo griego explicita la idea de suplicar al Señor. En español, 'ruego' conserva el matiz de súplica sin forzar una interpretación litúrgica más técnica que la que el texto garantiza.
- source_word: יצלח
  english_pob_choice: may succeed
  chosen_spanish: puede prosperar
  alternatives_spanish:
  - puede tener éxito
  - puede resultar eficaz
  - prosperará
  lexicon: HALOT; Greek εὐοδώσῃ
  rationale: El verbo expresa prosperar o tener buen resultado. 'Puede prosperar' mantiene la fuerza resultativa y permite el matiz modal del hebreo y del griego paralelo.
- source_word: ורפאות
  english_pob_choice: his healing
  chosen_spanish: su sanidad
  alternatives_spanish:
  - su curación
  - su remedio
  - su recuperación
  lexicon: HALOT; Greek ἴασιν
  rationale: El plural hebreo puede abarcar actos o medios de sanación. 'Sanidad' es natural en español bíblico actual y conserva el sentido de restauración física sin reducirlo a tratamiento médico.
- source_word: למען מחיה
  english_pob_choice: for the sake of preserving life
  chosen_spanish: para preservar la vida
  alternatives_spanish:
  - para mantener la vida
  - con el fin de conservar la vida
  - para dar vida
  lexicon: HALOT; Greek χάριν ἐμβιώσεως
  rationale: 'La frase indica finalidad: la sanación está orientada a que la persona siga viva. ''Para preservar la vida'' expresa bien esa finalidad con claridad y sobriedad en español.'
theological_decisions:
- issue: Cómo reflejar la tensión textual entre el hebreo difícil y el paralelo griego más explícito
  english_pob_reading: Translate primarily from the Hebrew, but let the Greek clarify that the first clause refers to supplication and the final clause to life-preserving healing.
  chosen_spanish_reading: Traducir sobre todo desde el hebreo conservado, dejando que el griego aclare que el primer miembro habla de súplica y el último de sanidad orientada a conservar la vida.
  alternative_spanish_readings:
  - pues su oración puede prosperar, y su sanidad sirve para preservar la vida
  - pues su petición tendrá éxito, y su curación sirve para conservar la vida
  rationale: La tradición de POB pide no borrar la tensión documentada. 'Su ruego' mantiene la ambigüedad del hebreo y el enlace con el griego, sin sobretraducirlo como una oración formal inequívoca. 'Para preservar la vida' mantiene el valor final de למען מחיה y el sentido del griego.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach, using Greek parallel as input; DOCTRINE.md: preserve ambiguity rather than over-resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió 'serves to preserve life' sobre una formulación más pesada, y mantiene una solución breve y formal equivalente en español.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma habitual del proyecto cuando el texto menciona el nombre divino; aquí el versículo griego usa Κύριον en un contexto que remite a la súplica al Señor, pero el hebreo no requiere una sustitución explícita en el cuerpo del versículo.
  - Se evita 'Cristo' y otros términos litúrgicos no presentes en el texto.
  - '''Ruego'' se eligió por su equilibrio entre claridad y fidelidad, sin convertir el hebreo incierto en una oración técnica más determinada de lo que permite el testimonio textual.'
