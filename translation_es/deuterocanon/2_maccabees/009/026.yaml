translation:
  language: es
  text: Por lo tanto, les ruego y les pido que, recordando los beneficios concedidos tanto en público como en privado, cada uno de ustedes mantenga la buena voluntad que existe hacia mí y hacia mi hijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les suplico
  - les insto
  lexicon: BDAG
  rationale: παρακαλέω expresa una apelación seria y urgente. En español, «les ruego» conserva el tono de súplica respetuosa y formal sin endurecerse como «exhorto» ni debilitarse demasiado.
- source_word: ἀξιῶ
  english_pob_choice: ask
  chosen_spanish: les pido
  alternatives_spanish:
  - les solicito
  - les requiero
  - les demando
  lexicon: BDAG
  rationale: En combinación con παρακαλῶ, ἀξιῶ añade una segunda apelación. «Les pido» mantiene naturalidad en español y evita un matiz excesivo de mandato que «demando» tendría.
- source_word: μεμνημένους
  english_pob_choice: remembering
  chosen_spanish: recordando
  alternatives_spanish:
  - teniendo presentes
  - acordándose de
  - habiendo recordado
  lexicon: BDAG
  rationale: 'El participio funciona como base de la petición: deben tener presentes los actos anteriores. «Recordando» reproduce bien esa relación causal en español y fluye con la sintaxis.'
- source_word: τῶν εὐεργεσιῶν
  english_pob_choice: the benefits shown
  chosen_spanish: los beneficios concedidos
  alternatives_spanish:
  - las benefacciones
  - las bondades mostradas
  - los favores concedidos
  lexicon: BDAG
  rationale: εὐεργεσία denota favores o beneficios concretos, especialmente en contexto real. «Concedidos» expresa bien el carácter otorgado de esos beneficios sin introducir un vocabulario técnico innecesario.
- source_word: κοινῇ καὶ κατʼ ἰδίαν
  english_pob_choice: both publicly and privately
  chosen_spanish: tanto en público como en privado
  alternatives_spanish:
  - en común y en particular
  - colectivamente y personalmente
  lexicon: LSJ
  rationale: El par contrasta la esfera pública/común con la privada/individual. «Tanto en público como en privado» es idiomático en español y conserva el contraste de ámbitos.
- source_word: ἕκαστον
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno
  - todos y cada uno de ustedes
  lexicon: BDAG
  rationale: El distributivo singular se dirige a los receptores de manera individual. «Cada uno de ustedes» lo explicita con claridad y naturalidad.
- source_word: συντηρεῖν
  english_pob_choice: to maintain
  chosen_spanish: mantenga
  alternatives_spanish:
  - conserve
  - sostenga
  - preserve
  lexicon: BDAG
  rationale: συντηρέω aquí significa conservar o mantener algo en vigor. «Mantenga» se ajusta al objeto «buena voluntad» y sugiere continuidad.
- source_word: τὴν οὖσαν εὔνοιαν
  english_pob_choice: the goodwill that exists
  chosen_spanish: la buena voluntad que existe
  alternatives_spanish:
  - la benevolencia que existe
  - el favor que existe
  - la buena disposición que existe
  lexicon: BDAG
  rationale: εὔνοια expresa buena voluntad o favor hacia alguien. «Buena voluntad» es una equivalencia clara y sobria en español; «que existe» refleja el estado actual señalado por οὖσαν sin sobretraducirlo.
- source_word: εἰς ἐμὲ καὶ τὸν υἱόν
  english_pob_choice: toward me and my son
  chosen_spanish: hacia mí y hacia mi hijo
  alternatives_spanish:
  - para conmigo y con mi hijo
  - en favor de mí y de mi hijo
  lexicon: BDAG
  rationale: εἰς con εὔνοια marca dirección relacional, no simple localización. «Hacia mí y hacia mi hijo» expresa adecuadamente la orientación del afecto o la lealtad.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del griego y la auditoría inglesa, conservando la doble apelación verbal y el contraste de ámbito público/privado. Se adoptó «que existe» para τὴν οὖσαν con el fin de reflejar el estado presente sin añadir «ahora» de manera innecesaria.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y claro, adecuado para prosa bíblica pública.
  - Se prefirió «buena voluntad» para εὔνοια por ser la opción más natural y transparente en español.
  - No se introdujeron notas textuales ni alternativas donde el griego y la auditoría inglesa muestran acuerdo alto y sin variantes relevantes.
