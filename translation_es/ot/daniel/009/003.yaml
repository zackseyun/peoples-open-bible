- from: Así que volví mi rostro al Señor Dios[a], para buscar oración y súplicas[b], con ayuno, cilicio y ceniza.
  to: Así que volví mi rostro hacia el Señor Dios[a], para buscar con oración y súplicas[b], con ayuno, cilicio y cenizas.
  rationale: 'Se hicieron reparaciones pequeñas pero necesarias: se añadió «hacia» para completar naturalmente el giro idiomático «volví mi rostro hacia»; se cambió «para buscar oración y súplicas» por «para buscar con oración y súplicas» para que el español sea claro y fiel; se corrigió la nota [b] para que ofrezca una alternativa real; y se ajustó «ceniza» a «cenizas» por idiomaticidad en este contexto penitencial.'
