- from: Se comerá en ese mismo día[a]; no dejarán nada de ello hasta la mañana[b]. Yo soy Yahvé.
  to: Se comerá en ese mismo día[a]; no se dejará nada de ello hasta la mañana[b]. Yo soy Yahvé.
  rationale: Se ajusta la segunda cláusula a una construcción impersonal («no se dejará») para lograr mayor coherencia estilística con «Se comerá», conservar mejor el tono legal del pasaje y evitar una transición innecesaria a segunda persona plural en español. Se mantienen las notas heredadas del expediente inglés y la forma «Yahvé» según la terminología del proyecto.
