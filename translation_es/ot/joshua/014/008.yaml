revisions:
- from: Pero mis hermanos que subieron conmigo hicieron derretirse el corazón del pueblo[a]; pero yo seguí plenamente a Yahvé mi Dios.
  to: Mis hermanos que subieron conmigo hicieron que se derritiera el corazón del pueblo[a], pero yo seguí plenamente a Yahvé mi Dios.
  rationale: Se ajustó una construcción española poco natural para expresar mejor el causativo hebreo sin perder la imagen de ‘corazón’ que se derrite. También se eliminó el ‘Pero’ inicial para evitar repetición innecesaria, manteniendo el contraste principal en ‘pero yo’.
