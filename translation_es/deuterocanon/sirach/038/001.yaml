review_pass:
  verdict: revise
  source_alignment_summary: La base española sigue correctamente el hebreo primario y conserva en nota la alternativa griega. «Honra al médico» refleja bien רעי / Τίμα, y «porque también Dios le ha dado una porción» comunica adecuadamente כי עם אותו חלק אל. Sin embargo, «según tu necesidad de él» suena poco natural en español y no preserva bien la legibilidad del sentido práctico de לפני צרכו.
  spanish_quality_summary: 'El borrador es mayormente fiel, pero contiene una construcción torpe: «según tu necesidad de él». En español eclesial general resulta más natural y claro «según la necesidad que tengas de él», que mantiene el valor relacional del original sin deslizarse al giro griego de «por sus servicios». El resto del versículo es claro, digno y bien formulado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es adecuado para אל, y la nota puede conservar «el Señor» para reflejar el griego κύριος como lectura alternativa documentada, sin imponer «Yahvé» donde no corresponde al texto principal. «Médico» y «porción» están bien elegidos.
  issues:
  - severity: medium
    issue: Construcción poco natural en «según tu necesidad de él»
    rationale: Aunque calca de cerca el inglés auditado, en español suena forzado y puede dificultar la comprensión. «Según la necesidad que tengas de él» preserva mejor el sentido del hebreo comprimido לפני צרכו con buena legibilidad.
  - severity: low
    issue: La nota dice «una porción de Dios», que puede sugerir posesión más que procedencia
    rationale: No es un error grave, porque reproduce la literalidad explicativa del inglés, pero «una porción de parte de Dios» sería más transparente en español. Aun así, puede mantenerse si se busca cercanía al audit trail.
