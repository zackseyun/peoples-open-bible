    text: 'O: «a su simiente»; hebreo: singular colectivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «has establecido tus palabras» o «has confirmado tus palabras».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque tú eres justo».'
    reason: alternative_reading
  revision_rationale: La revisión corrige el anclaje y contenido de las notas para que correspondan al source y al audit trail inglés, y ajusta צדיק a una formulación española que preserva mejor el valor de 'righteous' documentado por POB. Se elimina la nota innecesaria sobre 'delante de ti' porque el inglés no la conservó y no crea ambigüedad nueva en español. También se mejora levemente la naturalidad y coherencia de las alternativas en notas.
