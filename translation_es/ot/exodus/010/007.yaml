translation:
  language: es
  text: 'Entonces los siervos de Faraón le dijeron[a]: «¿Hasta cuándo será este hombre para nosotros un lazo[b]? Deja ir a los hombres[c], para que sirvan a Yahvé su Dios[d][e]. ¿No sabes todavía que Egipto está arruinado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este» o simplemente «esto»; el demostrativo hebreo se refiere a Moisés.
    reason: lexical_alternative
  - marker: b
    text: O «una trampa».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «los hombres»; algunas traducciones amplían a «la gente», pero el texto fuente es específicamente masculino plural.
    reason: lexical_alternative
  - marker: d
    text: O «sirvan/adoren a Yahvé su Dios»; el verbo hebreo puede incluir tanto servicio como adoración en relación con Dios.
    reason: lexical_alternative
  - marker: e
    text: El hebreo dice literalmente el nombre divino; «Yahvé» conserva el Tetragrámaton sin sustituirlo por un título.
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - sirvientes
  - servidores
  - oficiales
  lexicon: HALOT
  rationale: עַבְדֵי פַרְעֹה son los servidores/atendientes de Faraón; en español, «siervos» conserva el registro bíblico y la relación subordinada sin convertirlos innecesariamente en «oficiales», que sería más interpretativo.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Hasta cuándo ocurrirá esto?
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta temporal idiomática; «¿Hasta cuándo?» reproduce su fuerza natural en español con el tono de queja/reproche del contexto.
- source_word: זֶה
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este [hombre]
  - este individuo
  lexicon: HALOT
  rationale: El demostrativo apunta a Moisés en el contexto inmediato. En español hace falta explicitar el referente con «hombre» para evitar una construcción torcida o demasiado ambigua; se conserva así la aclaración contextual que ya practica el POB inglés.
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: un lazo
  alternatives_spanish:
  - una trampa
  - un lazo de captura
  - un escándalo
  lexicon: HALOT
  rationale: מוֹקֵשׁ designa una trampa o lazo de captura. «Lazo» mantiene la imagen figurada de algo que atrapa y funciona bien en español bíblico; «trampa» es posible, pero «lazo» preserva mejor la metáfora.
- source_word: שַׁלַּח
  english_pob_choice: Send ... away
  chosen_spanish: Deja ir
  alternatives_spanish:
  - Despídelos
  - Suéltalos
  - Déjalos ir
  lexicon: HALOT
  rationale: El imperativo pide que Faraón los despida/libere. «Deja ir» expresa esa liberación sin importar una fórmula ajena como «deja salir a mi pueblo»; además, se ajusta a la construcción con «a los hombres».
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - el pueblo
  - los varones
  lexicon: HALOT
  rationale: אֲנָשִׁים es específicamente masculino plural. «Los hombres» conserva esa precisión semántica y la decisión del POB inglés de no neutralizarlo a «people».
- source_word: וְיַעַבְדוּ
  english_pob_choice: so that they may serve
  chosen_spanish: para que sirvan
  alternatives_spanish:
  - y sirvan
  - para que adoren
  - y adoren
  lexicon: HALOT
  rationale: עבד con Dios como objeto incluye servicio y, por extensión, culto. «Sirvan» es la traducción más directa y amplia; en esta frase permite que el matiz de adoración quede implícito sin forzar una equivalencia más estrecha.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la política del POB en español, el Tetragrámaton se vierte como «Yahvé», transliteración estable y reverente del nombre divino, en lugar de la sustitución tradicional por un título.
- source_word: הֲטֶרֶם תֵּדַע
  english_pob_choice: Do you not yet know
  chosen_spanish: ¿No sabes todavía?
  alternatives_spanish:
  - ¿Acaso no sabes aún?
  - ¿Todavía no sabes?
  - ¿No sabías ya?
  lexicon: HALOT
  rationale: La construcción hebrea combina partícula interrogativa y טֶרֶם para una reprensión idiomática. «¿No sabes todavía?» reproduce bien el valor de reproche y conserva la referencia temporal sin volverla literalista.
- source_word: אָבְדָה
  english_pob_choice: is ruined
  chosen_spanish: está arruinado
  alternatives_spanish:
  - ha perecido
  - está destruido
  - está perdido
  lexicon: HALOT
  rationale: El perfecto describe el estado-resultante de Egipto tras las plagas. «Está arruinado» comunica una condición ya alcanzada sin exagerar hacia aniquilación total.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar; aquí designa al país/nación en su conjunto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La edición POB evita la sustitución por un título y lo translitera; en español, «Yahvé» cumple esa misma función con forma ya asentada en el ámbito bíblico hispano, manteniendo la referencia al nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh (aplicado en español como Yahvé)'
- issue: Traducción de הָאֲנָשִׁים como masculino plural
  english_pob_reading: the men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la gente
  - el pueblo
  rationale: La forma hebrea es masculina plural específica. Se conserva esa precisión en español en lugar de neutralizarla, siguiendo la orientación del POB a respetar el dato gramatical cuando no hay razón contextual para ampliarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor semántico de עבד con Dios como objeto
  english_pob_reading: serve/worship
  chosen_spanish_reading: sirvan
  alternative_spanish_readings:
  - adoren
  - sirvan/adoren
  rationale: En este contexto, el verbo incluye servicio cultual; sin embargo, «sirvan» es la base semántica directa y deja abierto el sentido reverente sin introducir una glosa excesiva. El culto queda implícito por el objeto divino.
  doctrine_reference: 'DOCTRINE.md: lexical/theological notes on עבד when directed to God'
translation_notes:
  revision_awareness: El pasaje concuerda en alto grado con la revisión final indicada en el expediente inglés; no se requieren cambios sustantivos respecto del sentido auditado. Se mantuvieron la referencia masculina plural, el valor idiomático de la pregunta temporal, la metáfora de la trampa/lazo y la transliteración del nombre divino con forma española estable.
  spanish_consistency_notes:
  - Se mantuvo el estilo bíblico moderno y digno, sin calcos innecesarios.
  - Se conservó la distinción entre «servir» y «adorar» en nota, porque el hebreo עבד puede abarcar ambos matices cuando el objeto es Dios.
  - Se usó «Yahvé» de manera consistente con la política española del proyecto para יְהוָה.
  - «Los hombres» respeta la precisión morfológica del hebreo frente a una neutralización interpretativa.
  - La frase final «está arruinado» refleja estado-resultante y evita una traducción demasiado absoluta como «ha perecido» o «está destruido».
