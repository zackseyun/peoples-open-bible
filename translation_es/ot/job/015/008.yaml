review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido básico del hebreo y sigue la decisión auditada de סוֹד como «consejo de Dios», con nota que preserva «secreto/consejo». También mantiene correctamente «sabiduría» para חָכְמָה. Sin embargo, la construcción verbal y preposicional en español no suena natural ni expresa con suficiente precisión la acusación retórica de apropiación exclusiva en וְתִגְרַע אֵלֶיךָ חָכְמָה.
  spanish_quality_summary: La frase «¿Has escuchado en el consejo de Dios[a], y has restringido la sabiduría para ti mismo?» es comprensible pero poco idiomática en español bíblico natural. Repetir «has» tras la coma suena rígido, y «restringido la sabiduría para ti mismo» resulta forzado. «Reservado la sabiduría para ti mismo» comunica mejor la idea de apropiación exclusiva y lee con mayor naturalidad.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Dios» es correcto para אֱלוֹהַ. La elección «consejo» para סוֹד sigue la rationale inglesa. La excepción principal es léxica/estilística: para גרע + אֵלֶיךָ, «reservado ... para ti mismo» o «restringido ... a ti mismo» funciona mejor que «restringido ... para ti mismo».'
  issues:
  - severity: medium
    issue: Construcción española poco natural con «y has restringido la sabiduría para ti mismo»
    rationale: Aunque refleja la traducción inglesa de forma cercana, en español esta combinación suena calcada y torpe. El hebreo acusa a Job de reservar o restringir la sabiduría exclusivamente para sí; «reservado la sabiduría para ti mismo» expresa mejor esa idea.
  - severity: low
    issue: Repetición innecesaria de «has» después de la coma
    rationale: En español, «¿Has escuchado..., y has...?» suena menos fluido que «¿Has escuchado... y reservado...?» sin afectar fidelidad.
  revised_spanish_text: ¿Has escuchado en el consejo de Dios[a] y reservado la sabiduría para ti mismo?
  revised_footnotes:
