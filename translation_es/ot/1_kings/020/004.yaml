translation:
  language: es
  text: 'El rey de Israel respondió y dijo[a]: «Según tu palabra, mi señor el rey, yo soy tuyo, y todo lo que es mío es tuyo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Como dices, mi señor el rey, yo y todo lo que tengo somos tuyos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: Mantiene la fórmula narrativa de réplica en diálogo. «Respondió» es natural en español y conserva el tono formal de intercambio del hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: The king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - Israel, el rey
  - el rey israelita
  lexicon: HALOT
  rationale: Sigue el constructo hebreo de manera transparente y idiomática en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y expresó
  lexicon: HALOT
  rationale: Verbo narrativo estándar para introducir discurso directo; conserva el paralelo con el hebreo sin sobrecargar el registro.
- source_word: כִּדְבָרְךָ
  english_pob_choice: According to your word
  chosen_spanish: Según tu palabra
  alternatives_spanish:
  - Como dices
  - De acuerdo con tu palabra
  lexicon: HALOT
  rationale: «Según» transmite la preposición comparativa/direccional de כ y «tu palabra» conserva la formulación deferente y formulaica del hebreo.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: Es un tratamiento cortesano dirigido a un rey humano; «señor» preserva la deferencia sin cargarlo con matiz divino. Se evita «amo» por sonar menos natural en este registro.
- source_word: לְךָ אֲנִי
  english_pob_choice: I am yours
  chosen_spanish: yo soy tuyo
  alternatives_spanish:
  - yo te pertenezco
  - soy para ti
  lexicon: HALOT
  rationale: La construcción hebrea expresa pertenencia/alineación. «Yo soy tuyo» conserva la idea de rendición y posesión de manera breve y directa.
- source_word: וְכָל אֲשֶׁר לִי
  english_pob_choice: and all that is mine
  chosen_spanish: y todo lo que es mío
  alternatives_spanish:
  - y todo lo que tengo
  - y todo lo que me pertenece
  lexicon: HALOT
  rationale: Mantiene el alcance total de כל אשר לי sin reducirlo solo a bienes concretos; «lo que es mío» conserva el paralelismo con la primera cláusula.
theological_decisions:
- issue: Tratamiento honorífico de אֲדֹנִי aplicado a un rey humano
  english_pob_reading: my lord the king
  chosen_spanish_reading: mi señor el rey
  alternative_spanish_readings:
  - mi señor, el rey
  - mi amo el rey
  rationale: El referente es un monarca humano, no un título divino. «Señor» comunica la cortesía cortesana y evita una equivalencia devocional indebida.
  doctrine_reference: Translate titles according to context; preserve human-divine distinctions in honorifics.
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando toda nota al pie no anclada; la traducción actual no requiere marcador de nota porque no se introduce una alternativa textual obligatoria en el cuerpo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable.
  - «Señor» se usa aquí solo como tratamiento cortesano humano, no como sustituto del nombre divino.
  - La cláusula final conserva la idea de pertenencia total sin añadir explicaciones interpretativas.
