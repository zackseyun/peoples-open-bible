theological_decisions:
- issue: Nature of ἐξιλασμός in cultic context
  chosen_reading: atonement
  alternative_readings:
  - expiation
  - propitiation
  rationale: The term concerns the priestly act that averts judgment. 'Atonement' is the project's accessible default in such contexts; 'propitiation' would be more technical and potentially over-specify the mechanism, while 'expiation' is preserved as an alternative lexical possibility.
  doctrine_reference: 'DOCTRINE.md: readable modern English; preserve theological weight without requiring technical jargon'
- issue: Reference of θυμός
  chosen_reading: the wrath
  alternative_readings:
  - the anger
  - the fury
  rationale: In context the wrath is God's plague-bringing judgment, but the translation does not add 'of God' because the Greek leaves it implicit. This preserves the theological force without over-explication.
  doctrine_reference: 'DOCTRINE.md: never import doctrinal claims the text does not make'
