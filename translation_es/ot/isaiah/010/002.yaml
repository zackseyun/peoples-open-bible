review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: desviar a los pobres de la justicia, quitar el derecho a los afligidos del pueblo de Dios, convertir a las viudas en botín y saquear a los huérfanos/los sin padre. Conserva correctamente «mi pueblo» y las categorías concretas de vulnerabilidad. Sin embargo, hay dos desajustes menores con la evidencia fuente y el rastro POB: la nota [a] no preserva la alternativa del inglés POB sobre «los pobres de mi pueblo», y «ellos despojen» explicita innecesariamente el sujeto, menos natural en español.'
  spanish_quality_summary: El texto es claro y digno, pero puede sonar más natural y más fiel al flujo español con «despojar» en paralelo con «botín» y sin el pronombre explícito «ellos». También conviene mejorar la nota [b] para que preserve la precisión de «the fatherless» con una formulación española más natural que «los sin padre».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones «justicia», «derecho», «afligidos», «viudas» son adecuadas. Para יְתוֹמִים, «huérfanos» es aceptable en el texto principal por naturalidad española, pero la nota debe preservar mejor la precisión literal «los que no tienen padre» / «los sin padre».
  issues:
  - severity: medium
    issue: La nota [a] no coincide con la alternativa preservada por el English POB.
    rationale: El POB inglés anota como alternativa «the poor of my people» para el segmento relacionado con דַּלִּים/עֲנִיֵּי עַמִּי, mientras que la nota española introduce otra alternativa («del juicio») que no es la priorizada en el rastro auditado. Debe conservarse la alternativa significativa documentada.
  - severity: low
    issue: «y ellos despojen» suena menos natural de lo necesario en español.
    rationale: El hebreo ya marca el sujeto en el verbo; en español, el pronombre explícito no aporta claridad aquí y endurece el estilo.
  - severity: low
    issue: La nota [b] puede expresar mejor la precisión literal de יְתוֹמִים.
    rationale: «Los sin padre» es entendible pero algo tosco en español. Una formulación como «los que no tienen padre» conserva mejor la explicación lexical con buena legibilidad.
