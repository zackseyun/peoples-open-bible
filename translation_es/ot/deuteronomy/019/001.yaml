translation:
  language: es
  text: Cuando Yahvé tu Dios corte[a] a las naciones cuya tierra Yahvé tu Dios te da, y las desposes y habites en sus ciudades y en sus casas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘corte de en medio’, ‘destruya’ o ‘elimine’; el hebreo dice literalmente ‘corte’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְרִית
  english_pob_choice: cuts off
  chosen_spanish: corte
  alternatives_spanish:
  - destruya
  - elimine
  lexicon: HALOT
  rationale: El Hifil de כרת conserva la imagen concreta de ‘cortar’ o ‘cortar de en medio’. En español, ‘corte’ mantiene esa fuerza idiomática sin volver demasiado interpretativo el verbo. ‘Destruya’ o ‘elimine’ suavizan o explicitan más de lo que el hebreo dice.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto pide reproducir el nombre divino como ‘Yahvé’. Se evita la sustitución por título (‘el SEÑOR’) para preservar el nombre propio del pacto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: Construcción directa y natural en español para el sufijo de segunda persona masculina singular.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: ‘Naciones’ es el equivalente estable de גוים y encaja con el contexto de Deuteronomio sin introducir matices posteriores ajenos al pasaje.
- source_word: אֲשֶׁר ... אַרְצָם
  english_pob_choice: whose land
  chosen_spanish: cuya tierra
  alternatives_spanish:
  - la tierra de las cuales
  - su tierra
  lexicon: HALOT
  rationale: ‘Cuya tierra’ reproduce con naturalidad la relación posesiva del relativo hebreo y evita la rigidez de una perífrasis más literal.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está dando en posesión
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso o certeza. En español, ‘te da’ comunica con naturalidad la acción divina presente/cierta dentro del marco legal del texto.
- source_word: וִירִשְׁתָּם
  english_pob_choice: you dispossess them
  chosen_spanish: las desposes
  alternatives_spanish:
  - las eches fuera
  - tomes posesión de ellas
  lexicon: HALOT
  rationale: El objeto pronominal señala a las naciones como objeto directo y el valor contextual es expulsarlas/desposeerlas del territorio. ‘Desposes’ conserva el matiz de ירש que el inglés POB también destacó.
- source_word: וְיָשַׁבְתָּ
  english_pob_choice: and dwell
  chosen_spanish: y habites
  alternatives_spanish:
  - y vivas
  - y te establezcas
  lexicon: HALOT
  rationale: ‘Habitar’ conserva el registro legal y formal de ‘dwell’ mejor que una versión más coloquial.
- source_word: בְעָרֵיהֶם
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus pueblos
  - en sus urbes
  lexicon: HALOT
  rationale: ‘Ciudades’ es el equivalente estándar de ערים y mantiene el contexto de ocupación del territorio.
- source_word: וּבְבָתֵּיהֶם
  english_pob_choice: and houses
  chosen_spanish: y en sus casas
  alternatives_spanish:
  - y en sus moradas
  - y en sus hogares
  lexicon: HALOT
  rationale: Se conserva el paralelismo con ‘ciudades’ y la referencia a las construcciones ya existentes. ‘Casas’ es más directo que ‘hogares’ y mejor ajustado al contexto de asentamiento.
theological_decisions:
- issue: Tratamiento del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del POB inglés preserva el nombre propio del pacto. En español se sigue el equivalente editorial del proyecto, ‘Yahvé’, evitando la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el registro inglés auditado y no hubo cambios posteriores relevantes; el pasaje se mantiene en alta concordancia con la fuente hebrea y la decisión inglesa de ‘cuts off’ / ‘is giving you’ / ‘you dispossess them’.
  spanish_consistency_notes:
  - Se conservó el nombre divino como ‘Yahvé’ conforme a la terminología del proyecto.
  - Se mantuvo el paralelismo legal del hebreo con verbos en futuro subordinado/valor eventual en español.
  - ‘Desposes’ se eligió para preservar la fuerza de ירש en este contexto de expulsión territorial.
  - ‘Tu Dios’ y ‘sus ciudades / sus casas’ reflejan los sufijos posesivos del hebreo sin sobreexplicación.
