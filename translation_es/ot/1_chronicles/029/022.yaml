  language: en
  yaml_path: translation/ot/1_chronicles/029/022.yaml
  text: And they ate and drank before Yahweh on that day with great joy[a], and they made Solomon son of David king a second time, and they anointed him for Yahweh as ruler[d][c][b], and Zadok as priest.
  footnotes:
