revisions:
- from: En aquellos días la casa de Judá irá con la casa de Israel[a], y vendrán juntos desde la tierra del norte a la tierra que di en herencia a sus padres[b].
  to: En aquellos días la casa de Judá irá con la casa de Israel[a], y vendrán juntos desde la tierra del norte a la tierra que di en herencia a vuestros padres[b].
  rationale: Se corrige 'sus padres' a 'vuestros padres' para preservar la segunda persona del hebreo y la decisión auditada del POB. También se ajusta la nota correspondiente para mantener coherencia exacta con el texto principal. No se requieren otros cambios.
