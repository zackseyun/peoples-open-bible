review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: dos deseos optativos paralelos, ''proteja'' para φυλάξαι, ''guíe'' para κατευθύναι, ''alma'' para ψυχήν, ''hombre'' para ἄνδρα, y ''en la casa'' para ἐν οἴκῳ. También conserva correctamente la postura moral de μισοῦσαν ἀδίκους como ''que odia a los injustos''. Sin embargo, la nota [a] sobre Yahvé no está motivada por una ambigüedad real del texto ni por una alternativa léxica preservada en el inglés; además, ''que hace paz'' resulta demasiado calcado e innecesariamente torpe en español para ποιοῦντα εἰρήνην.'
  spanish_quality_summary: 'La frase es generalmente clara y digna, pero ''hace paz'' suena poco idiomático en español eclesial general. ''Hace la paz'' sería más natural, aunque aquí ''procura la paz'' expresa bien la acción activa de peacemaking sin expandir demasiado. La nota [b] también necesita limpieza: mezcla inglés (''household'') y una glosa confusa (''casa/household'').'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: κύριος como ''Yahvé'' es aceptable aquí según la política española; ψυχή como ''alma'' y ἀδίκους como ''injustos'' también. No obstante, la nota teológica sobre ''Yahvé'' no debe mantenerse porque no responde a una necesidad textual ni a una alternativa preservada en el aparato inglés. Conviene conservar solo la nota léxica sobre ἐν οἴκῳ, expresada plenamente en español.'
  issues:
  - severity: medium
    issue: '''que hace paz'' es un calco poco natural'
    rationale: Aunque reproduce de cerca ποιοῦντα εἰρήνην, en español suena forzado. Una formulación como 'que procura la paz' preserva el sentido activo de peacemaking con mejor legibilidad.
  - severity: medium
    issue: La nota [a] sobre 'Yahvé' es innecesaria
    rationale: No hay aquí una nota del inglés que deba trasladarse, ni una ambigüedad nueva en español. Añadir una nota para justificar la política general del proyecto recarga el verso sin necesidad.
  - severity: low
    issue: La nota [b] mezcla español e inglés y está formulada de manera poco pulida
    rationale: '''en la casa/household'' no es una alternativa adecuada en una nota española. Debe decir ''en la casa'', ''en el hogar'' o ''en la casa/hogar doméstico'' si se quiere explicar el rango semántico.'
  revised_spanish_text: Que Yahvé proteja un alma tranquila que odia a los injustos, y que Yahvé guíe a un hombre que procura la paz en la casa[a].
  revised_footnotes:
  - marker: a
    text: O 'en el hogar' o 'en la casa' entendida como 'hogar doméstico'; aquí se prefiere 'en la casa' por ser la lectura más directa de ἐν οἴκῳ.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre 'Yahvé', se mejora la naturalidad de ποιοῦντα εἰρήνην con 'procura la paz', y se depura la nota léxica final para que quede plenamente en español y refleje mejor las alternativas documentadas.
