translation:
  language: es
  text: En el campo cosechan forraje[a], y rebuscan en la viña del malvado[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pienso» o «forraje mezclado»; el hebreo se refiere a alimento para animales, no a grano ordinario.
    reason: lexical_alternative
  - marker: b
    text: O «rebuscan la viña del malvado». El hebreo no repite explícitamente la preposición equivalente a «en».
    reason: lexical_alternative
  - marker: c
    text: «El malvado» puede referirse de manera genérica a un dueño perverso; alternativamente, «un hombre malvado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׂדֶה
  english_pob_choice: In the field
  chosen_spanish: En el campo
  alternatives_spanish:
  - En un campo
  - Allí en el campo
  lexicon: HALOT
  rationale: El sintagma con ב indica ubicación. «En el campo» es la forma natural en español y conserva el valor locativo sin añadir matices innecesarios.
- source_word: בְּלִילוֹ
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - provenda
  - forraje mezclado
  - su forraje
  lexicon: HALOT
  rationale: El hebreo designa alimento para animales, no grano común para personas. «Forraje» comunica bien ese sentido en español moderno y mantiene la fuerza léxica; se evita forzar el sufijo posesivo de manera artificial.
- source_word: יקצירו
  english_pob_choice: they harvest
  chosen_spanish: cosechan
  alternatives_spanish:
  - siegan
  - recogen
  lexicon: HALOT
  rationale: El verbo expresa segar/cosechar. «Cosechan» suena natural en español actual y preserva la imagen agrícola del original.
- source_word: וְכֶרֶם
  english_pob_choice: and ... the vineyard
  chosen_spanish: y ... la viña
  alternatives_spanish:
  - y el viñedo
  - y en la viña
  lexicon: HALOT
  rationale: «Viña» es una equivalencia clara y bíblicamente reconocible para כֶרֶם. En español, el contexto permite entender la relación locativa sin repetir una preposición adicional en el texto principal.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: del malvado
  alternatives_spanish:
  - del impío
  - del malo
  - del hombre malvado
  lexicon: HALOT
  rationale: El sustantivo/adjetivo funciona de modo substantivo y puede referirse de manera genérica a un propietario perverso. «Malvado» conserva la carga moral sin imponer más de lo que el hebreo explicita.
- source_word: יְלַקֵּשׁוּ
  english_pob_choice: they glean
  chosen_spanish: espigan
  alternatives_spanish:
  - rebuscan
  - recogen las sobras
  lexicon: HALOT
  rationale: El verbo pi'el indica recoger espigas o restos de la cosecha. «Espigan» conserva el enlace con «cosechan» y refleja el sentido de recogida tardía o de rebusca agrícola.
theological_decisions:
- issue: ¿Cómo rendir la referencia al poseedor malvado en la segunda línea?
  english_pob_reading: '''the wicked'' may refer generically to a wicked owner; alternatively, ''a wicked man.'''
  chosen_spanish_reading: «del malvado» deja abierta la lectura genérica o personal, sin precisar más de lo que exige el hebreo.
  alternative_spanish_readings:
  - «de un malvado»
  - «del hombre malvado»
  - «del impío»
  rationale: El hebreo permite una referencia genérica a una persona malvada o a un dueño malvado. La formulación española conserva esa ambigüedad documentada en lugar de resolverla prematuramente.
  doctrine_reference: Ambigüedad lexical del sustantivo/adjetivo רָשָׁע en contexto poético-sapiencial.
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete fuente hebreo y el audit trail inglés, manteniendo las dos imágenes agrícolas en paralelo y preservando la ambigüedad de רָשָׁע documentada por POB. No hay revisiones aplicadas en el contexto fuente, y el borrador refleja ese estado estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se prefiere «espigan» para mantener el paralelismo agrícola con «cosechan».
  - La elección de «forraje» respeta el valor de alimento animal señalado por el audit trail inglés.
  - La nota b se ancla en la ausencia de una preposición explícita en el hebreo, según el análisis auditado.
