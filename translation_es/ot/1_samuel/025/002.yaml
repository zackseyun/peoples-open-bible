translation:
  language: es
  text: Había un hombre en Maón cuyas actividades estaban en Carmelo[a]. El hombre era muy rico, y tenía tres mil ovejas y mil cabras[b]. Estaba esquilando sus ovejas en Carmelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuyo trabajo estaba en Carmelo» o «cuyas posesiones estaban en Carmelo». El término hebreo puede referirse de manera amplia a la actividad, los asuntos o las posesiones de una persona.
    reason: lexical_alternative
  - marker: b
    text: O «el hombre era muy grande», es decir, social o económicamente prominente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  lexicon: HALOT
  rationale: En la narrativa hebrea, אִישׁ introduce de manera indefinida y natural; «un hombre» conserva esa apertura sin sobreespecificar.
- source_word: בְּמָעוֹן
  english_pob_choice: in Maon
  chosen_spanish: en Maón
  alternatives_spanish:
  - en Maon
  lexicon: HALOT
  rationale: Se translitera el topónimo. Se conserva la forma propia del nombre en español con acento ortográfico.
- source_word: מַעֲשֵׂהוּ
  english_pob_choice: whose business was
  chosen_spanish: cuyo negocio estaba
  alternatives_spanish:
  - cuyos asuntos estaban
  - cuya actividad estaba
  - cuyas posesiones estaban
  lexicon: HALOT
  rationale: El término puede abarcar obra, actividad, negocios o posesiones. En este contexto, frente al lugar de residencia y la mención de gran riqueza, «negocio» comunica bien su actividad/empresa sin volverlo rígidamente literal. «Estaba» mantiene la relación de pertenencia/ubicación expresada por el hebreo.
- source_word: בַכַּרְמֶל
  english_pob_choice: in Carmel
  chosen_spanish: en Carmel
  alternatives_spanish:
  - en el Carmelo
  lexicon: HALOT
  rationale: Aquí el hebreo alude al topónimo Carmel, no al sustantivo común. Se conserva el nombre propio, en línea con la decisión inglesa.
- source_word: הָאִישׁ גָּדוֹל מְאֹד
  english_pob_choice: The man was very wealthy
  chosen_spanish: El hombre era muy rico
  alternatives_spanish:
  - El hombre era muy grande
  - El hombre era muy prominente
  - El hombre era muy poderoso
  lexicon: HALOT
  rationale: En este contexto, «grande» describe estatus social/económico; los animales que siguen lo confirman. «Muy rico» expresa con claridad moderna esa fuerza idiomática. Se evita borrar la relación semántica entre «grande» y riqueza, pero se traduce por el sentido contextual.
- source_word: וְלוֹ צֹאן שְׁלֹשֶׁת אֲלָפִים וְאֶלֶף עִזִּים
  english_pob_choice: and he had three thousand sheep and a thousand goats
  chosen_spanish: y tenía tres mil ovejas y mil cabras
  alternatives_spanish:
  - y le pertenecían tres mil ovejas y mil cabras
  - y poseía tres mil ovejas y mil cabras
  lexicon: HALOT
  rationale: La posesión con ל se expresa naturalmente con «tenía». «Cabras» reproduce עִזִּים con precisión léxica. Se conservan los números de forma directa.
- source_word: בִּגְזֹז אֶת צֹאנוֹ
  english_pob_choice: He was shearing his sheep
  chosen_spanish: Estaba esquilando sus ovejas
  alternatives_spanish:
  - Y aconteció que estaba esquilando sus ovejas
  - Estaba trasquilando sus ovejas
  lexicon: HALOT
  rationale: El verbo גזז describe esquilar/trasquilar lana o pelo; en español bíblico contemporáneo, «esquilar» es preciso y digno. El progresivo reproduce la escena en desarrollo del wayyiqtol + infinitivo constructo.
- source_word: בַכַּרְמֶל
  english_pob_choice: in Carmel
  chosen_spanish: en Carmel
  alternatives_spanish:
  - en Maón
  - en el Carmelo
  lexicon: HALOT
  rationale: La repetición del lugar al final del versículo se mantiene para reflejar el hebreo y fijar el escenario de la acción.
theological_decisions:
- issue: Sentido de הָאִישׁ גָּדוֹל מְאֹד en clave socioeconómica
  english_pob_reading: The man was very wealthy
  chosen_spanish_reading: El hombre era muy rico
  alternative_spanish_readings:
  - El hombre era muy grande
  - El hombre era muy prominente
  - El hombre era muy importante
  rationale: La frase hebrea puede significar grandeza o prominencia, pero el contexto inmediato de vastos rebaños y cabras muestra que se trata de riqueza/estatus económico. Se mantiene esa lectura sin eliminar la tensión semántica de «grande».
  doctrine_reference: Ninguna; es una decisión semántica contextual, no doctrinal.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que colocó la acción final como «He was shearing his sheep in Carmel», y refleja el mismo orden de escena. Se mantuvo la lectura contextual de «very wealthy» frente a «very great», preservando la tensión léxica en la nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «esquilando» por precisión agrícola y registro bíblico claro.
  - Se transliteró «Carmel» como topónimo, consistente con el inglés POB y con el valor geográfico del hebreo.
