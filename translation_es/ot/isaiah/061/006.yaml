translation:
  language: es
  text: Pero ustedes serán llamados los sacerdotes de Yahvé; los llamarán ministros de nuestro Dios. Comerán la riqueza de las naciones, y en su gloria se gloriarán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en su esplendor se jactarán”. El verbo final es raro y su matiz se debate; el texto principal sigue un sentido común de gloriarse o presumir de esa gloria.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּהֲנֵי יְהוָה
  english_pob_choice: the priests of Yahweh
  chosen_spanish: los sacerdotes de Yahvé
  alternatives_spanish:
  - los sacerdotes de Yahvé
  - los sacerdotes de Yahvé
  lexicon: HALOT
  rationale: Mantiene el término cultual explícito del hebreo con el nombre divino en la forma principal del proyecto, sin suavizarlo a una expresión más general de servicio religioso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigue el criterio de nombrar directamente el nombre divino en español con 'Yahvé', en lugar de ocultarlo con una sustitución convencional.
- source_word: תִּקָּרֵאוּ
  english_pob_choice: will be called
  chosen_spanish: serán llamados
  alternatives_spanish:
  - serán nombrados
  - serán conocidos como
  lexicon: HALOT
  rationale: El niphal de קרא aquí expresa designación pública; 'serán llamados' es el equivalente directo y natural en español.
- source_word: מְשָׁרְתֵי אֱלֹהֵינוּ
  english_pob_choice: the ministers of our God
  chosen_spanish: los ministros de nuestro Dios
  alternatives_spanish:
  - los siervos de nuestro Dios
  - los servidores de nuestro Dios
  lexicon: HALOT
  rationale: '''Ministros'' preserva el registro elevado y la función oficial/cultual que el hebreo puede implicar, sin convertirlo en un título eclesiástico posterior. ''Siervos'' sería posible, pero borra parte de la especificidad del término.'
- source_word: יֵאָמֵר לָכֶם
  english_pob_choice: they will call you
  chosen_spanish: se les llamará
  alternatives_spanish:
  - dirán de ustedes
  - los llamarán
  lexicon: HALOT
  rationale: La forma impersonal refleja mejor el pasivo/impersonal hebreo y evita una redundancia innecesaria con el primer hemistiquio.
- source_word: חֵיל גּוֹיִם
  english_pob_choice: the wealth of nations
  chosen_spanish: la riqueza de las naciones
  alternatives_spanish:
  - las riquezas de las naciones
  - los bienes de las naciones
  - la fortuna de las naciones
  lexicon: HALOT
  rationale: חֵיל puede referirse a riqueza o recursos; en este contexto la imagen de 'comer' esos bienes favorece 'riqueza' como equivalencia clara y sobria.
- source_word: תֹּאכֵלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - consumirán
  - se alimentarán de
  lexicon: HALOT
  rationale: Se conserva el verbo literal para mantener visible la metáfora hebrea de participación/posesión de la riqueza.
- source_word: וּבִכְבוֹדָם
  english_pob_choice: in their glory
  chosen_spanish: en su gloria
  alternatives_spanish:
  - en su honor
  - en su esplendor
  lexicon: HALOT
  rationale: '''Gloria'' mantiene la correspondencia léxica con כבוד y deja abierta la gama de matices entre honor, esplendor y dignidad.'
- source_word: תִּתְיַמָּרוּ
  english_pob_choice: you will boast
  chosen_spanish: se jactarán
  alternatives_spanish:
  - se gloriarán
  - se enorgullecerán
  - exultarán
  lexicon: HALOT
  rationale: El hitpael es raro y debatido; 'se jactarán' sigue la lectura principal de autoexaltación/boast. Se preserva así la tensión lexical sin forzar una interpretación más suave.
theological_decisions:
- issue: Preservar la imaginería sacerdotal sin convertirla en una categoría eclesial posterior
  english_pob_reading: 'Retain the direct prophetic address: the hearers will be called ''the priests of Yahweh'' and ''ministers of our God.'''
  chosen_spanish_reading: 'Conservar el doble lenguaje sacerdotal y ministerial: ''los sacerdotes de Yahvé'' / ''los ministros de nuestro Dios''.'
  alternative_spanish_readings:
  - '''serán creyentes dedicados al servicio de Dios'''
  - '''serán siervos de Dios'''
  rationale: El hebreo emplea títulos cultuales concretos. La traducción mantiene esa densidad teológica en vez de abstractarla a una idea general de servicio espiritual.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo reflejar el verbo raro final sin borrar su ambigüedad
  english_pob_reading: The final verb is rare and its nuance is debated; the main text follows the common sense 'boast/glory.'
  chosen_spanish_reading: Usar 'se jactarán' en el texto principal y señalar la alternativa de 'se gloriarán' en nota.
  alternative_spanish_readings:
  - se gloriarán
  - exultarán
  rationale: El término hebreo no es transparente; la versión principal conserva la lectura más común, pero la nota evita cerrar indebidamente el campo semántico.
  doctrine_reference: Translation philosophy §§2, 4, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del texto inglés auditado, especialmente el ajuste de una formulación indirecta a una designación más directa en el hemistiquio paralelo: ''they will call you the ministers of our God''. También conserva la decisión revisada de mantener la relación paralela entre el título sacerdotal, la designación ministerial y la imagen metafórica de comer la riqueza de las naciones. El verbo final recibe tratamiento de ambigüedad lexical mediante nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para el nombre divino.
  - Se conserva 'sacerdotes' y 'ministros' por su fuerza cultual; no se sustituye por vocabulario eclesiástico moderno.
  - La metáfora 'comer la riqueza de las naciones' se mantiene literal para respetar la imagen hebrea.
  - La nota final marca la única ambigüedad lexical importante del versículo.
