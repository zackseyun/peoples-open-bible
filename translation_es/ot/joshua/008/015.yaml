translation:
  language: es
  text: Y Josué y todo Israel se dejaron vencer[a] delante de ellos y huyeron por el camino del desierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fueron derrotados'; en contexto, esto probablemente describe una derrota fingida de carácter táctico para atraer a los hombres de Hai fuera de la ciudad.
    reason: alternative_reading
  - marker: b
    text: O 'por el camino hacia el desierto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגְעוּ
  english_pob_choice: let themselves be beaten
  chosen_spanish: se dejaron vencer
  alternatives_spanish:
  - fueron derrotados
  - se dejaron batir
  - parecieron ser vencidos
  lexicon: HALOT
  rationale: El verbo nifal en este contexto militar puede expresar derrota sufrida o derrota aparente dentro de una maniobra táctica. 'Se dejaron vencer' conserva la idea de una derrota permitida o asumida sin añadir explicaciones ajenas al texto, y funciona naturalmente en español narrativo.
- source_word: יְהוֹשֻׁעַ וְכָל יִשְׂרָאֵל
  english_pob_choice: Joshua and all Israel
  chosen_spanish: Josué y todo Israel
  alternatives_spanish:
  - Josué y todos los israelitas
  - Josué y todo el pueblo de Israel
  lexicon: HALOT
  rationale: '''Todo Israel'' preserva la expresión colectiva del hebreo. ''Israelitas'' aclara el sentido para español, pero suaviza la forma bíblica compacta del original.'
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  - frente a ellos
  lexicon: HALOT
  rationale: '''Delante de ellos'' expresa bien la relación espacial del hebreo y es natural en español. Mantiene la referencia militar sin sobreinterpretar la escena.'
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se retiraron
  - salieron huyendo
  lexicon: HALOT
  rationale: '''Huyeron'' es la equivalencia directa y concisa para נוּס. ''Se retiraron'' sería más interpretativo y menos intenso.'
- source_word: דֶּרֶךְ הַמִּדְבָּר
  english_pob_choice: by the way of the wilderness
  chosen_spanish: por el camino del desierto
  alternatives_spanish:
  - por la ruta del desierto
  - hacia el camino del desierto
  - por el camino que lleva al desierto
  lexicon: HALOT
  rationale: '''Camino del desierto'' conserva la construcción hebrea de דֶּרֶךְ + complementación y es idiomático en español bíblico actual. ''Desierto'' traduce el referente geográfico de מִדְבָּר sin necesidad de expansión.'
theological_decisions:
- issue: Posible derrota real o retirada fingida en la maniobra militar
  english_pob_reading: let themselves be beaten; in context this likely describes a tactical feigned defeat to draw the men of Ai away from the city.
  chosen_spanish_reading: se dejaron vencer; en el contexto probablemente describe una derrota fingida de carácter táctico para atraer a los hombres de Hai fuera de la ciudad.
  alternative_spanish_readings:
  - fueron derrotados
  - se fingieron vencidos
  rationale: El texto hebreo por sí solo admite una lectura pasiva/derrota y una lectura estratégica en el contexto narrativo. El español principal conserva la ambigüedad suficiente, y la nota explica la posibilidad táctica sin convertirla en paráfrasis del versículo.
  doctrine_reference: Josué 8:15; lectura narrativa contextual
translation_notes:
  revision_awareness: 'El borrador sigue la línea del registro inglés POB sin cambios sustantivos: conserva la posibilidad semántica de וַיִּנָּגְעוּ en un contexto militar y mantiene la ruta como expresión compacta. No se introdujeron términos litúrgicos ni explicaciones ajenas al verso.'
  spanish_consistency_notes:
  - Se mantuvo 'Josué' para יְהוֹשֻׁעַ y 'Israel' para וְכָל יִשְׂרָאֵל, conforme al uso bíblico del corpus.
  - '''Desierto'' se usa en sentido geográfico bíblico, no como metáfora.'
  - El marcador de nota [a] acompaña la elección verbal principal; [b] acompaña la opción alternativa de ruta, siguiendo la pauta de anclaje textual.
