  text: וְ/לֹא תִקְח֣וּ כֹ֔פֶר לָ/נ֖וּס אֶל עִ֣יר מִקְלָט֑/וֹ לָ/שׁוּב֙ לָ/שֶׁ֣בֶת בָּ/אָ֔רֶץ עַד מ֖וֹת הַ/כֹּהֵֽן־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/035/032.yaml
  text: And you shall not take a ransom for him who has fled to his city of refuge[b][a], so that he may return to live in the land before the death of the priest.
  footnotes:
  - marker: a
    text: Or 'compensation' or 'payment'; Hebrew כֹּפֶר refers to a ransom-price or compensatory payment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew syntax is compact and may also be understood as forbidding payment connected with his remaining in or returning from the city of refuge before the priest dies.
    reason: alternative_reading
