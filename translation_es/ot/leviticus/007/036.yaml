translation:
  language: es
  text: 'Esto es lo que Yahvé mandó que se les diera de parte de los hijos de Israel[a] el día en que los ungió: estatuto perpetuo[b] a través de sus generaciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de los israelitas'. El hebreo dice literalmente 'de los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'estatuto permanente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: lo cual
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Introduce la cláusula relativa retomando la disposición previa; en español, 'lo cual' conserva un matiz formal y claro sin sonar forzado.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: El verbo expresa mandato con autoridad legal y cultual. 'Mandó' comunica bien ese valor en español bíblico moderno sin perder fuerza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'' en el texto principal, preservando el nombre propio revelado a Israel.'
- source_word: לָתֵת
  english_pob_choice: to be given
  chosen_spanish: que se les diera
  alternatives_spanish:
  - para dárseles
  - que les dieran
  lexicon: HALOT
  rationale: El hebreo expresa una acción de dar en construcción dependiente; en español, la pasiva/subjuntiva 'que se les diera' mantiene naturalidad y la dirección del acto hacia los sacerdotes.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: se les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El referente es Aarón y sus hijos, es decir, los sacerdotes. 'Se les' evita redundancia y conserva la relación dativa del original.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día que
  - cuando
  lexicon: HALOT
  rationale: La fórmula temporal se expresa de manera idiomática en español con 'el día en que', preservando la concreción del hebreo.
- source_word: מָשְׁחוֹ אֹתָם
  english_pob_choice: he anointed them
  chosen_spanish: los ungió
  alternatives_spanish:
  - los consagró
  - los ungió él
  lexicon: HALOT
  rationale: 'El verbo específico es ''ungir''. En español, el sujeto ya queda claro por el contexto: Yahvé. ''Ungió'' retiene el acto ritual sin añadir glosa interpretativa.'
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de entre los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión formal y literal del hebreo. 'Hijos de Israel' mantiene el lenguaje pactual sin exigir una paráfrasis étnica más moderna.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: an everlasting statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto eterno
  - estatuto permanente
  - decreto perpetuo
  lexicon: HALOT
  rationale: '''Estatuto'' corresponde bien al lenguaje legal-cultual; ''perpetuo'' comunica la duración obligatoria de עוֹלָם sin cargar la frase con matices filosóficos de eternidad absoluta.'
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por todas sus generaciones
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se vierte de forma breve y natural. 'Por sus generaciones' comunica continuidad transgeneracional sin sobreexplicar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la decisión doctrinal del POB de no ocultar el nombre propio divino tras un título. En español bíblico, 'Yahvé' es la forma más asentada y legible para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Peso legal-cultual de חֻקַּת עוֹלָם
  english_pob_reading: everlasting statute
  chosen_spanish_reading: estatuto perpetuo
  alternative_spanish_readings:
  - estatuto eterno
  - estatuto permanente
  rationale: La frase debe conservar el carácter normativo y duradero de la legislación sacerdotal sin introducir una afirmación doctrinal distinta del texto. 'Perpetuo' mantiene la fuerza de duración continua.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión inglesa más reciente, que no introdujo cambios sustantivos; se conserva la estructura legal del hebreo y la lectura de 'Yahvé' para el nombre divino, con un español natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'estatuto perpetuo' por ser una fórmula legal clara y suficientemente literal.
  - No se añadieron notas al pie porque el texto español puede expresar la alternativa principal sin ambigüedad residual que requiera anclaje explícito.
