    text: O «bruñan las lanzas». El hebreo también puede expresar la idea de hacerlas relucir.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo «siryonot»: armadura corporal, posiblemente cotas de malla o corazas.'
    reason: lexical_alternative
  revision_rationale: Se ajustó «pónganse de pie» a «tomen su puesto» para reflejar mejor la orden militar de asumir posición. Se cambió «Abrillen» por «Pulan» por mayor naturalidad y claridad en español, conservando en nota la alternativa «bruñan». También se normalizó la nota sobre «siryonot» para estilo y precisión editorial.
