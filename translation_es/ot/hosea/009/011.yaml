translation:
  language: es
  text: Efraín—su gloria volará como un ave[a]—desde el nacimiento, desde el vientre[b] y desde la concepción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pájaro'. El hebreo usa un término general para ave; la imagen subraya la rapidez con que la gloria desaparece.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''desde el nacimiento, desde el vientre y desde la concepción/embarazo''; una tríada que describe la pérdida de hijos en cada etapa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se conserva el nombre propio del reino del norte/personificación tribal con la forma española usual y auditable. 'Efraín' es la adaptación natural en español bíblico.
- source_word: כָּעוֹף
  english_pob_choice: like a bird
  chosen_spanish: como un ave
  alternatives_spanish:
  - como un pájaro
  - como un ave voladora
  lexicon: HALOT
  rationale: La comparación con עוֹף se expresa de manera natural en español con 'ave'; mantiene el paralelismo sin forzar un calco. 'Ave' es más amplio y digno que 'pájaro' en este registro.
- source_word: יִתְעוֹפֵף
  english_pob_choice: will fly away
  chosen_spanish: volará
  alternatives_spanish:
  - saldrá volando
  - volará lejos
  lexicon: HALOT
  rationale: El verbo comunica movimiento de vuelo con sentido de desaparición/pérdida. En español, 'volará' con el símil ya expresa suficientemente la desaparición sin añadir un complemento no exigido por el hebreo.
- source_word: כְּבוֹדָם
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su esplendor
  lexicon: HALOT
  rationale: Se mantiene 'gloria' para conservar la metáfora abierta del hebreo y la lectura de la POB en inglés. El contexto sugiere fertilidad/descendencia, pero el término no se especifica en exceso en el texto principal.
- source_word: מִלֵּדָה
  english_pob_choice: from birth
  chosen_spanish: desde el parto
  alternatives_spanish:
  - desde el nacimiento
  - desde dar a luz
  lexicon: HALOT
  rationale: La secuencia de etapas reproductivas requiere una expresión española clara. 'Parto' comunica bien el punto de la llegada al nacimiento y mantiene el valor de privación/separación de la preposición.
- source_word: וּמִבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el seno
  alternatives_spanish:
  - desde el vientre
  - desde el útero
  lexicon: HALOT
  rationale: '''בטן'' en este contexto apunta al ámbito materno. ''Seno'' es una solución bíblica y comprensible en español que evita la rudeza de ''vientre'' sin perder el sentido gestacional.'
- source_word: וּמֵהֵרָיוֹן
  english_pob_choice: from conception
  chosen_spanish: desde la concepción
  alternatives_spanish:
  - desde el embarazo
  - desde la gestación
  lexicon: HALOT
  rationale: '''הֵרָיוֹן'' puede referirse a concepción/pregnancy. Se opta por ''concepción'' siguiendo la POB inglesa y para marcar la regresión retórica hasta la fase más temprana.'
theological_decisions:
- issue: Sentido de 'su gloria'
  english_pob_reading: La gloria de Efraín se deja en sentido metafórico, con el contexto sugiriendo especialmente descendencia y fertilidad.
  chosen_spanish_reading: '''Su gloria'' se mantiene como metáfora abierta; el contexto inmediato permite entenderla como la vitalidad/descendencia de Efraín sin resolverla por completo en el verso.'
  alternative_spanish_readings:
  - su honor
  - su esplendor
  - sus hijos
  rationale: El hebreo admite varias resonancias y la POB en inglés preserva la tensión. Traducirla directamente como 'sus hijos' cerraría demasiado la imagen y borraría el enlace con 'gloria'.
  doctrine_reference: Preservar la tensión léxica y la imagen poética sin sobreexplicar.
- issue: Tríada de las frases preposicionales
  english_pob_reading: 'Las frases expresan la retirada o ausencia de descendencia en cada etapa: concepción, gestación y nacimiento.'
  chosen_spanish_reading: 'Las tres expresiones se entienden como una progresión retórica de pérdida: desde la concepción hasta el parto.'
  alternative_spanish_readings:
  - una simple lista de lugares/orígenes
  - una enumeración sin progresión
  rationale: El hebreo presenta una secuencia descendente o retrospectiva; en español conviene preservar esa fuerza con 'desde... desde... desde...'.
  doctrine_reference: Mantener el alcance retórico y la progresión temporal del texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que eliminó el segundo 'away' para hacer más natural la frase sin perder la secuencia hebrea. En español se reflejó esa naturalidad con una sola estructura repetida 'desde', manteniendo la progresión nacimiento/seno/concepción.
  spanish_consistency_notes:
  - Se usó 'Efraín' como forma española del nombre propio, consistente con el tratamiento bíblico estándar en español.
  - Se prefirió 'ave' por registro y amplitud semántica, aunque 'pájaro' sigue siendo una alternativa válida.
  - '''Desde el parto, desde el seno y desde la concepción'' conserva el movimiento retrospectivo de la tríada hebrea sin introducir interpretaciones adicionales.'
  - No se sustituyó 'gloria' por 'honor' o 'esplendor' en el texto principal para preservar la metáfora abierta del original.
