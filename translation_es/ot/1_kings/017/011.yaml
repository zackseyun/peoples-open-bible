translation:
  language: es
  text: 'Mientras ella iba a buscarlo, él la llamó[a] y le dijo: «Por favor, tráeme un pedazo[b] de pan en tu mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llamó detrás de ella».
    reason: lexical_alternative
  - marker: b
    text: O «un bocado de pan».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  english_pob_choice: As she went
  chosen_spanish: Mientras ella iba
  alternatives_spanish:
  - Y ella fue
  - Entonces fue
  - Cuando iba
  lexicon: HALOT
  rationale: El wayyiqtol avanza la acción narrativa, y el español queda más natural con una construcción progresiva de simultaneidad. «Mientras ella iba» conserva el sentido de acción en curso cuando él la llama.
- source_word: לָקַחַת
  english_pob_choice: to get it
  chosen_spanish: a buscarlo
  alternatives_spanish:
  - a tomarlo
  - a traerlo
  - a conseguirlo
  lexicon: HALOT
  rationale: El infinitivo constructo expresa propósito. El referente inmediato es el agua pedida en el versículo anterior, por eso el pronombre neutro «lo» mantiene la referencia sin repetir «agua» de forma forzada.
- source_word: וַיִּקְרָא אֵלֶיהָ
  english_pob_choice: he called to her
  chosen_spanish: él la llamó
  alternatives_spanish:
  - él le gritó
  - él la llamó después
  - él la llamó a ella
  lexicon: HALOT
  rationale: קרא con אֶל se traduce naturalmente como «llamar a alguien». En español, «la llamó» conserva la dirección del llamado; el matiz de llamar tras ella queda implícito en el contexto narrativo y puede expresarse como alternativa, pero no es necesario en el texto principal.
- source_word: לִקְחִי
  english_pob_choice: bring
  chosen_spanish: tráeme
  alternatives_spanish:
  - toma para mí
  - llévame
  - búscame
  lexicon: HALOT
  rationale: Aunque el verbo base es «tomar», en español la petición de obtener y entregar algo se expresa mejor con «traer». Así se preserva el acto solicitado sin sonar antinatural.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - te pido
  - por gentileza
  lexicon: HALOT
  rationale: La partícula de ruego suaviza el imperativo. «Por favor» es el equivalente contemporáneo más claro y digno.
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: 'El dativo beneficiario en español se expresa de manera idiomática con objeto indirecto: «tráeme».'
- source_word: פַּת לֶחֶם
  english_pob_choice: a piece of bread
  chosen_spanish: un pedazo de pan
  alternatives_spanish:
  - un bocado de pan
  - una migaja de pan
  - un trozo de pan
  lexicon: HALOT
  rationale: La expresión hebrea puede significar una porción, pedazo o bocado de pan. «Pedazo de pan» comunica bien la cantidad pequeña y mantiene una lectura natural en español, sin cargar el texto con un tono excesivamente literario.
- source_word: בְּיָדֵךְ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - contigo
  - en tu poder
  - en tu posesión
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. Aunque puede implicar «contigo», el español literal resulta claro y fiel.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: mantiene la secuencia narrativa, el llamado dirigido a la mujer, la petición cortés y la imagen concreta de «en tu mano». Se eligió un español natural sin perder el referente implícito del objeto pedido en el versículo anterior.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Pan» se mantiene como traducción directa de לֶחֶם, sin ampliar a «alimento».
  - Se conserva el registro de petición respetuosa con «Por favor» para reflejar נָא.
