translation:
  language: es
  text: Porque se nos ha dado vivir de parte de Yahvé; esto nos basta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς γὰρ
  english_pob_choice: For as
  chosen_spanish: Pues, como
  alternatives_spanish:
  - Porque, como
  - Ya que
  lexicon: LSJ
  rationale: Se conserva la fuerza explicativa de γάρ con un enlace natural en español. «Pues» cubre el valor inferencial y «como» mantiene la introducción de la base de la afirmación sin volverla pesada.
- source_word: δέδοται
  english_pob_choice: it has been given
  chosen_spanish: se nos ha dado
  alternatives_spanish:
  - nos ha sido dado
  - se nos dio
  lexicon: BDAG
  rationale: 'El perfecto pasivo pide un estado vigente: la vida sigue siendo un don concedido. La construcción impersonal con «se» suena natural en español y conserva el matiz de recepción.'
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: se nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario/beneficiario se expresa de forma idiomática en español con «se nos», evitando un giro más mecánico sin perder el destinatario del don.
- source_word: ζῇν
  english_pob_choice: to live
  chosen_spanish: vivir
  alternatives_spanish:
  - la vida
  - estar vivos
  lexicon: BDAG
  rationale: El infinitivo verbal se traduce mejor como «vivir», porque lo concedido no es una abstracción sino la acción/estado de seguir con vida.
- source_word: παρὰ τοῦ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - del Señor
  lexicon: BDAG
  rationale: El griego con παρά + genitivo expresa origen o fuente. En la práctica del proyecto, el referente divino se vierte como «Yahvé» en el texto principal; «por» comunica la procedencia del don con fluidez en español. Se evita «Señor» como máscara, siguiendo el criterio del proyecto.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto mismo
  - tal cosa
  lexicon: BDAG
  rationale: 'Recupera el antecedente inmediato: el hecho de que la vida nos ha sido concedida. «Esto» es directo y suficientemente amplio.'
- source_word: ἱκανὸν
  english_pob_choice: enough
  chosen_spanish: nos basta
  alternatives_spanish:
  - es suficiente para nosotros
  - nos es suficiente
  lexicon: BDAG
  rationale: El adjetivo de suficiencia se hace idiomático con «basta», que mantiene el sentido de suficiencia sin inflar la frase. El sujeto implícito se integra naturalmente en español.
- source_word: ὑπάρχει
  english_pob_choice: is
  chosen_spanish: nos basta
  alternatives_spanish:
  - es
  - resulta suficiente
  lexicon: BDAG
  rationale: En esta construcción, ἱκανὸν ... ὑπάρχει expresa «es suficiente». En español, el predicado completo se vierte mejor con «nos basta», que transmite la suficiencia del don y evita una repetición menos natural de «es suficiente».
theological_decisions:
- issue: Renderización del nombre divino implícito en κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: La política del proyecto exige «Yahvé» para יהוה. Aunque el griego dice κύριος, el contexto de atribuir la vida como don divino corresponde al nombre divino subyacente en la tradición de fuente. Se mantiene la transparencia teológica sin adoptar el masking litúrgico «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés auditado dice: «For as it has been given to us by the Lord to live, this is enough for us.» No se detectan revisiones aplicadas ni cambios textuales posteriores; la versión griega y la lectura inglesa están en alto acuerdo, con la única tensión relevante en la traducción del referente divino y en hacer idiomática la suficiencia final en español.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis española natural.
  - Se evita «Señor» en el texto principal por la política del proyecto para el nombre divino.
  - «Nos basta» preserva la idea de suficiencia de ἱκανὸν ὑπάρχει sin forzar una calca.
  - No se añaden notas al pie porque no hay variante textual ni ambigüedad residual que el español requiera marcar explícitamente.
