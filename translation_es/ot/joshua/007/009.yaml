translation:
  language: es
  text: Porque los cananeos[a] y todos los habitantes de la tierra oirán[b], y nos rodearán y eliminarán nuestro nombre de la tierra[c]. ¿Y qué harás por tu gran nombre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aunque el hebreo usa una forma singular colectiva, en español se expresa de manera natural en plural.
    reason: cultural_note
  - marker: b
    text: 'O: "oirán hablar de ello". El sentido es que llegarán a saber del desastre de Israel.'
    reason: alternative_reading
  - marker: c
    text: '"Eliminar nuestro nombre" reproduce un modismo hebreo para la destrucción y el olvido de un pueblo.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיִשְׁמְעוּ
  english_pob_choice: will hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - oirán hablar
  lexicon: HALOT
  rationale: El futuro mantiene el valor prospectivo del imperfecto hebreo en este contexto de consecuencia temida. 'Oirán' conserva la idea de que las naciones llegarán a saber del desastre de Israel.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el sustantivo es morfológicamente singular, funciona de modo colectivo para el pueblo. El plural español expresa mejor ese sentido colectivo.
- source_word: וְכֹל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: and all the inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los que habitan en la tierra
  - todos los habitantes de la tierra/país
  lexicon: HALOT
  rationale: '''יֹשְׁבֵי'' es un sustantivo participial: ''habitantes''. Aunque el contexto apunta al territorio local, en español ''tierra'' mantiene la amplitud idiomática de הָאָרֶץ y funciona bien junto a ''cananeos''.'
- source_word: וְנָסַבּוּ עָלֵינוּ
  english_pob_choice: and they will surround us
  chosen_spanish: y nos rodearán
  alternatives_spanish:
  - y se volverán contra nosotros
  - y nos cercarán
  lexicon: HALOT
  rationale: נָסַב con עַל expresa rodear/encerrar. 'Rodearán' es natural en español y conserva la amenaza militar.
- source_word: וְהִכְרִיתוּ אֶת שְׁמֵנוּ
  english_pob_choice: and cut off our name
  chosen_spanish: y borrarán nuestro nombre
  alternatives_spanish:
  - y acabarán con nuestro nombre
  - y destruirán nuestro recuerdo
  lexicon: HALOT
  rationale: Se conserva la fuerza idiomática de הכרית sin forzar una traducción literal extraña. 'Borrarán nuestro nombre' comunica la eliminación de existencia y memoria que el hebreo implica.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra/país
  lexicon: HALOT
  rationale: '''הָאָרֶץ'' puede leerse como ''tierra'' o ''país''. En español ''de la tierra'' preserva la idiomaticidad del texto y suena natural en la expresión ''borrar el nombre de la tierra''.'
- source_word: וּמַה תַּעֲשֶׂה
  english_pob_choice: And what will you do
  chosen_spanish: ¿Y qué harás?
  alternatives_spanish:
  - ¿Y qué harás entonces?
  - ¿Y qué podrás hacer?
  lexicon: HALOT
  rationale: La interrogación directa y el futuro simples reflejan con precisión el hebreo, sin añadir matices interpretativos.
- source_word: לְשִׁמְךָ הַגָּדוֹל
  english_pob_choice: for your great name
  chosen_spanish: por tu gran nombre
  alternatives_spanish:
  - por causa de tu gran nombre
  - en favor de tu gran nombre
  lexicon: HALOT
  rationale: La preposición ל permite un matiz causal o de beneficio. 'Por tu gran nombre' suena natural en español y conserva la referencia a la honra/reputación pública de Dios.
theological_decisions:
- issue: Sentido de 'tu gran nombre'
  english_pob_reading: An appeal to God's public honor/reputation bound up with Israel's fate
  chosen_spanish_reading: Una apelación al honor y la reputación públicos de Dios, vinculados con el destino de Israel
  alternative_spanish_readings:
  - Una referencia solo devocional al nombre de Dios
  - Una referencia meramente a la identidad divina sin implicaciones públicas
  rationale: En el contexto, Josué teme que la derrota de Israel desacredite a Yahvé ante las naciones. La traducción conserva esa dimensión de honra pública sin sobreexplicarla en el texto principal.
  doctrine_reference: Nombre y honra de Yahvé en el testimonio ante las naciones (cf. Jos 7:9)
translation_notes:
  revision_awareness: Se mantuvo el sentido prospectivo del imperfecto hebreo, el valor colectivo de 'el cananeo', el modismo de 'borrar/cortar el nombre' y la referencia al honor público de Yahvé. La redacción española evita calcos duros donde el español requiere fluidez, sin perder la tensión idiomática del original.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en coherencia con la política POB para el nombre divino, aunque aquí el versículo lo alude indirectamente mediante 'tu gran nombre'.
  - Se prefirió 'tierra' para הָאָרֶץ por fluidez idiomática; el contexto local evita que se entienda como 'mundo' universal.
  - '''Por tu gran nombre'' mantiene la amplitud semántica de לְ sin convertirlo en una paráfrasis más explícita.'
