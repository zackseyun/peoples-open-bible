translation:
  language: es
  text: Ciertamente los reuniré[a], dice Yahvé. No hay uvas en la vid, ni higos en la higuera; la hoja misma se ha marchitado[b], y lo que les di se alejará de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «los barreré por completo» o «los consumiré por completo». El hebreo usa una forma intensificada de «reunir», que en este contexto de juicio puede implicar remoción o destrucción.'
    reason: lexical_alternative
  - marker: b
    text: 'El cierre del versículo es difícil en hebreo. También puede entenderse: «y lo que les di se les quitará» o de modo semejante.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָסֹף אֲסִיפֵם
  english_pob_choice: I will surely gather them
  chosen_spanish: Ciertamente los reuniré
  alternatives_spanish:
  - Los reuniré por completo
  - Ciertamente los juntaré
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. En español, «ciertamente» comunica bien esa certeza/intensificación sin forzar un giro más interpretativo como «los barreré» o «los consumiré». «Reuniré» conserva el valor básico de אסף y permite que el contexto de juicio exprese la idea de remoción.
- source_word: נְאֻם יְהֹוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה. «Dice Yahvé» es natural y fiel; «declara Yahvé» sería un poco más formal, y «oráculo de Yahvé» suena más técnico.
- source_word: אֵין עֲנָבִים בַּגֶּפֶן
  english_pob_choice: There are no grapes on the vine
  chosen_spanish: No hay uvas en la vid
  alternatives_spanish:
  - No hay uvas en la parra
  - No hay racimos en la vid
  lexicon: HALOT
  rationale: Se conserva la estructura existencial simple. «Vid» reproduce bien גפן en registro bíblico; «parra» es posible, pero «vid» es más preciso y natural en este contexto.
- source_word: וְאֵין תְּאֵנִים בַּתְּאֵנָה
  english_pob_choice: and no figs on the fig tree
  chosen_spanish: ni higos en la higuera
  alternatives_spanish:
  - ni higos en el higo
  - ni brevas en la higuera
  lexicon: HALOT
  rationale: Se distingue fruto y árbol en español con «higos» y «higuera», manteniendo la imagen del hebreo. «Brevas» sería demasiado específico y no está exigido por el texto.
- source_word: וְהֶעָלֶה נָבֵל
  english_pob_choice: even the leaf has withered
  chosen_spanish: la hoja misma se ha marchitado
  alternatives_spanish:
  - e incluso la hoja se ha secado
  - la hoja se ha marchitado
  lexicon: HALOT
  rationale: «Hoja» refleja el singular colectivo del hebreo. «Se ha marchitado» transmite bien נבל en un registro natural del español. «Misma» da el matiz de énfasis que el inglés expresa con «even».
- source_word: וָאֶתֵּן לָהֶם
  english_pob_choice: what I gave them
  chosen_spanish: lo que les di
  alternatives_spanish:
  - lo que les concedí
  - lo que les di a ellos
  lexicon: HALOT
  rationale: Se sigue la decisión de mantener el verbo amplio נתן sin precisar indebidamente el objeto. «Lo que les di» es transparente y cercano al hebreo.
- source_word: יַעַבְרוּם
  english_pob_choice: will pass away from them
  chosen_spanish: se apartará de ellos
  alternatives_spanish:
  - pasará de ellos
  - les será quitado
  lexicon: HALOT
  rationale: El final hebreo es difícil y comprimido. «Se apartará de ellos» conserva la idea de alejamiento/pérdida sin decidir de más si el sujeto es un bien, una provisión o algo ya mencionado. Es una equivalencia prudente frente a la ambigüedad del verbo עבר con sufijo pronominal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete de fuente y la norma del proyecto indican traducir el Tetragrama como «Yahvé». Se evita «el SEÑOR» porque ocultaría el nombre propio divino y no reflejaría la decisión doctrinal auditable del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Manejo de un cierre hebreo difícil y abierto
  english_pob_reading: what I gave them will pass away from them
  chosen_spanish_reading: lo que les di se apartará de ellos
  alternative_spanish_readings:
  - lo que les di les será quitado
  - lo que les di pasará de ellos
  rationale: El hebreo final es sintácticamente difícil. Se conserva la idea de pérdida/remoción sin resolver demasiado la relación exacta entre sujeto y verbo. Esto sigue la línea de equivalencia óptima del POB, que mantiene la tensión textual en vez de eliminarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que retiró el «up» de «gather them up» para ajustarse mejor al valor léxico de אסף. En español se reflejó con «reuniré» sin añadido equivalente. También se respetó la nota del cierre difícil del versículo, manteniendo una solución prudente y cercana al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «vid/higuera» para conservar la imaginería agrícola del texto.
  - Se traduce el verbo intensificado de אסף con una forma natural en español sin introducir un significado no atestado.
  - Se preserva la ambigüedad del último cola con una redacción que comunica pérdida o alejamiento sin cerrar indebidamente el sentido.
