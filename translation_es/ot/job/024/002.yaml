translation:
  language: es
  text: Mueven[a] los mojones; roban un rebaño y lo apacientan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «remueven los mojones». El verbo hebreo puede indicar mover o quitar las marcas de propiedad para invadir la tierra ajena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבֻל֥וֹת
  english_pob_choice: boundary markers
  chosen_spanish: mojones
  alternatives_spanish:
  - marcas de lindero
  - linderos
  - mojones de límite
  lexicon: HALOT
  rationale: El hebreo apunta aquí a marcas físicas de propiedad, no a límites abstractos. 'Mojones' es un término español claro y tradicional para piedras o señales de lindero, y preserva la concreción legal-social del contexto.
- source_word: יַשִּׂ֑יגוּ
  english_pob_choice: move
  chosen_spanish: mueven
  alternatives_spanish:
  - remueven
  - desplazan
  - corrigen hacia atrás
  lexicon: HALOT
  rationale: El verbo admite la idea de mover o desplazar los marcadores de propiedad para invadir terreno ajeno. 'Mueven' mantiene amplitud semántica sin forzar la lectura a 'remover' exclusivamente.
- source_word: עֵ֥דֶר
  english_pob_choice: a flock
  chosen_spanish: un rebaño
  alternatives_spanish:
  - un hato
  - un ganado
  - un rebaño de ovejas
  lexicon: HALOT
  rationale: El sustantivo colectivo funciona naturalmente en español como 'rebaño'. 'Rebaño' conserva el carácter de grupo de animales y evita una especificación innecesaria que el hebreo no exige.
- source_word: גָּ֝זְל֗וּ
  english_pob_choice: they seize
  chosen_spanish: toman
  alternatives_spanish:
  - arrebatan
  - roban
  - se apoderan de
  lexicon: HALOT
  rationale: El verbo expresa apoderarse por fuerza o robo. 'Toman' en el español corriente necesita el contexto para adquirir el matiz de apropiación indebida; aquí ese matiz queda reforzado por el paralelismo con el desplazamiento de mojones. 'Se apoderan de' también sería válido, pero es más largo.
- source_word: וַ/יִּרְעֽוּ
  english_pob_choice: and pasture it
  chosen_spanish: y lo apacientan
  alternatives_spanish:
  - y lo pastorean
  - y lo alimentan
  - y lo cuidan como pastor
  lexicon: HALOT
  rationale: El verbo de רעה significa pastorear/apacentar un rebaño. 'Apacientan' es el equivalente español más preciso y dignificado; conserva la acción de cuidar/pastorear el rebaño que antes han tomado como suyo.
translation_notes:
  revision_awareness: 'Coincide con el texto hebreo y con el audit trail inglés: se mantiene el paralelismo entre la alteración de los linderos y la apropiación del rebaño, sin suavizar el matiz de despojo. La versión inglesa fue revisada y quedó sin cambios, con alta concordancia respecto al original.'
  spanish_consistency_notes:
  - Se prefirió «mojones» por su valor concreto de señal de lindero, más fiel al contexto que un abstracto «límites».
  - «Apacientan» refleja mejor el verbo pastoral que un genérico «pastorean», manteniendo el tono bíblico sin caer en arcaísmo excesivo.
  - La nota al pie conserva la alternativa documentada de «remover»/«mover» los mojones, según el valor semántico del hebreo.
