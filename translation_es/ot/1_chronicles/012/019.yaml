review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo y sigue de cerca la auditoría inglesa: lealtad a David, repetición enfática de «paz», sentido colectivo probable de לְעֹזְרֶךָ, y nombramiento militar final. Sin embargo, en la primera cláusula pierde innecesariamente la metáfora clave de לָבְשָׁה («vistió/revistió») al usar «se puso sobre», cuando el POB inglés preserva explícitamente «clothed» y la nota también destaca esa literalidad. Además, «ayudadores» suena poco natural en español e introduce una torpeza evitable sin pérdida semántica.'
  spanish_quality_summary: El texto es claro y mayormente legible, pero necesita un ajuste de estilo importante para sonar natural y digno en español eclesial contemporáneo. «El Espíritu revistió a Amasai» preserva mejor la imagen hebrea y suena bien en español bíblico moderno. «Tus ayudantes» o «los que te ayudan» es mucho más natural que «tus ayudadores». El resto fluye bien.
  glossary_alignment: 'Buen alineamiento general con el glosario del proyecto: «Espíritu», «Dios», «Yahvé» no aplica aquí, y los nombres están bien. No hay conflicto terminológico mayor. La principal cuestión es lexical/estilística: mantener la metáfora de לָבַשׁ y evitar un sustantivo español poco idiomático.'
  issues:
  - severity: medium
    issue: La metáfora hebrea de לָבְשָׁה no se conserva en el texto principal.
    rationale: El hebreo dice literalmente que el espíritu «vistió/revistió» a Amasai, y el POB inglés escogió «the Spirit clothed». «Se puso sobre» se acerca a una alternativa interpretativa admitida en nota, pero no preserva la decisión principal ni la imagen del original.
  - severity: medium
    issue: «Ayudadores» es poco natural en español neutral contemporáneo.
    rationale: Aunque intenta reflejar el participio/singular colectivo, en español suena forzado. «Tus ayudantes» conserva el sentido colectivo y mejora claramente la legibilidad sin alejarse del hebreo.
  - severity: low
