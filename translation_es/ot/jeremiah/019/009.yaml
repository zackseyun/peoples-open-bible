    issue: «en el sitio» para בְּמָצוֹר
    rationale: Aunque «sitio» puede significar asedio, en español general contemporáneo resulta más ambiguo y menos inmediato que «asedio». «En el asedio» preserva mejor la referencia militar del hebreo y suena más natural en lectura bíblica moderna.
  - severity: low
    issue: La nota [a] mezcla alternativa léxica con explicación teológica extensa
    rationale: La nota debería limitarse a la alternativa relevante («Y les haré comer») y, si se menciona el causativo, hacerlo brevemente. La formulación actual añade una glosa interpretativa más amplia de lo necesario.
