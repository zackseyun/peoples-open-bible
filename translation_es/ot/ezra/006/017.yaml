translation:
  language: es
  text: Y ofrecieron para la dedicación de esta casa de Dios cien toros, doscientos carneros, cuatrocientos corderos y doce machos cabríos[b] como ofrenda por el pecado por todo Israel[a], conforme al número de las tribus de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en favor de todo Israel».'
    reason: lexical_alternative
  - marker: b
    text: El número doce corresponde a las doce tribus de Israel, expresando el alcance representativo de la ofrenda.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַקְרִיבוּ
  english_pob_choice: And they offered
  chosen_spanish: Y ofrecieron
  alternatives_spanish:
  - Y presentaron
  - Y trajeron
  lexicon: HALOT
  rationale: El verbo en contexto cultual expresa ofrecer sacrificios. «Ofrecieron» conserva el sentido sacrificial con español natural y digno.
- source_word: לַחֲנֻכַּת
  english_pob_choice: for the dedication
  chosen_spanish: para la dedicación
  alternatives_spanish:
  - en la dedicación
  - para la consagración
  lexicon: HALOT
  rationale: חנכה aquí señala la ceremonia de dedicación o inauguración; «para la dedicación» sigue bien el valor final del lamed.
- source_word: בֵּית אֱלָהָא דְנָה
  english_pob_choice: of this house of God
  chosen_spanish: de esta casa de Dios
  alternatives_spanish:
  - de este templo de Dios
  - de esta casa perteneciente a Dios
  lexicon: HALOT
  rationale: «Casa de Dios» conserva la formulación del texto y evita sustituirla por «templo» sin necesidad lexical.
- source_word: תּוֹרִין
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - toros jóvenes
  lexicon: HALOT
  rationale: En listas sacrificiales el término designa bovinos ofrecidos; «toros» es claro y adecuado en español bíblico contemporáneo.
- source_word: דִּכְרִין
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - machos oveja
  - borregos machos
  lexicon: HALOT
  rationale: El término arameo indica machos de oveja; «carneros» es el equivalente natural en inventarios sacrificiales.
- source_word: אִמְּרִין
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas jóvenes
  - borregos
  lexicon: HALOT
  rationale: El referente son animales jóvenes de ovino; «corderos» es la forma más idiomática en español religioso.
- source_word: וּצְפִירֵי עִזִּין
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabritos machos
  - hechos cabríos
  lexicon: HALOT
  rationale: La construcción especifica machos de cabra; «machos cabríos» mantiene la precisión zoológica y el registro bíblico.
- source_word: לְחַטָּא
  english_pob_choice: as a sin offering
  chosen_spanish: como expiación
  alternatives_spanish:
  - como ofrenda por el pecado
  - como sacrificio expiatorio
  lexicon: HALOT
  rationale: El término sacrificial puede rendirse como «expiación» para conservar la función cultual sin imponer solo la forma técnica «ofrenda por el pecado» en español. La elección mantiene la tensión entre pecado y purificación.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: for all Israel
  chosen_spanish: por todo Israel
  alternatives_spanish:
  - en favor de todo Israel
  - por cuenta de todo Israel
  lexicon: HALOT
  rationale: La preposición puede expresar representación o beneficio. «Por todo Israel» preserva esa amplitud y suena natural en español.
- source_word: תְּרֵי עֲשַׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en número
  lexicon: HALOT
  rationale: Número cardinal directo, sin matiz adicional.
- source_word: לְמִנְיָן שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: according to the number of the tribes of Israel
  chosen_spanish: conforme al número de las tribus de Israel
  alternatives_spanish:
  - según el número de las tribus de Israel
  - correspondientes al número de las tribus de Israel
  lexicon: HALOT
  rationale: La frase explica el valor representativo de los doce machos cabríos. «Conforme al número» conserva la relación explicativa sin sobreinterpretar.
theological_decisions:
- issue: Alcance corporativo de «todo Israel»
  english_pob_reading: Retain 'for all Israel' without narrowing it to only the returned exiles.
  chosen_spanish_reading: Mantener «por todo Israel» sin restringirlo a los repatriados.
  alternative_spanish_readings:
  - por los repatriados solamente
  - en representación de todo el pueblo del pacto
  rationale: El texto menciona explícitamente a Israel en sentido amplio y luego lo vincula con las doce tribus. La traducción conserva ese alcance sin resolver la tensión histórica del pasaje.
  doctrine_reference: Preservar la tensión textual sin armonización interpretativa excesiva.
- issue: Valor sacrificial de לְחַטָּא
  english_pob_reading: as a sin offering
  chosen_spanish_reading: como expiación
  alternative_spanish_readings:
  - como ofrenda por el pecado
  - como sacrificio por el pecado
  rationale: «Expiación» comunica la función sacrificial en español eclesial moderno sin reducir el término a una sola fórmula tradicional. Se conserva la relación entre pecado, purificación y reparación cultual.
  doctrine_reference: Terminología sacrificial del Pentateuco y usos cultuales posteriores.
translation_notes:
  revision_awareness: 'El texto inglés auditado fue afinado para colocar «twelve male goats» antes de «as a sin offering». En español se siguió el orden natural del inventario sacrificial: animales principales y luego la función expiatoria, sin alterar el sentido ni la correspondencia con el hebreo/arameo.'
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» en lugar de «templo» para seguir la formulación del texto fuente.
  - Se usa «expiación» para לְחַטָּא por claridad cultual en español, con nota alternativa que preserva la lectura «en favor de».
  - «Toros», «carneros», «corderos» y «machos cabríos» siguen un registro bíblico claro y no arcaizante.
  - «Por todo Israel» conserva el alcance corporativo sin limitarlo históricamente.
