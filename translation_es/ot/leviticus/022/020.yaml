translation:
  language: es
  text: No presentarán nada que tenga algún defecto[a], porque no les será aceptado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nada que tenga una imperfección». El término hebreo sacrificial suele denotar una falla física que descalifica una ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O «no será aceptable para ustedes» o «no será aceptado en favor de ustedes».
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּל אֲשֶׁר בּוֹ מוּם
  english_pob_choice: anything that has a blemish
  chosen_spanish: nada que tenga defecto
  alternatives_spanish:
  - cualquier cosa que tenga defecto
  - todo lo que tenga defecto
  - cualquier animal con defecto
  lexicon: HALOT
  rationale: La expresión hebrea es amplia e indefinida; en español, «nada que tenga defecto» comunica con naturalidad la prohibición total en el contexto sacrificial. «Defecto» preserva la idea cultual de una falla física descalificadora, equivalente funcional de «blemish» en este contexto.
- source_word: מוּם
  english_pob_choice: blemish
  chosen_spanish: defecto
  alternatives_spanish:
  - mancha
  - imperfección
  - tacha
  lexicon: HALOT
  rationale: En lenguaje sacrificial, מוּם apunta a una falta física que descalifica la ofrenda. «Defecto» es claro en español y evita una imagen moralizante que «tacha» o «mancha» podría sugerir.
- source_word: לֹא תַקְרִיבוּ
  english_pob_choice: You shall not present
  chosen_spanish: No presentarán
  alternatives_spanish:
  - No ofrecerán
  - No traerán cerca
  - No presenten
  lexicon: HALOT
  rationale: El verbo en contexto sacerdotal indica llevar una ofrenda ante Yahvé para presentarla. «Presentarán» sigue la decisión inglesa de evitar simplificar de modo absoluto como «ofrecerán», y conserva el matiz de acercar la ofrenda al culto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque no
  lexicon: HALOT
  rationale: Introduce la razón legal de la prohibición. «Porque» es la equivalencia natural en español y mantiene el tono normativo.
- source_word: לֹא לְרָצוֹן יִהְיֶה לָכֶם
  english_pob_choice: it will not be accepted for you
  chosen_spanish: no será acepto para ustedes
  alternatives_spanish:
  - no les será aceptado
  - no será aceptable para ustedes
  - no será favorable para ustedes
  lexicon: HALOT
  rationale: «Acepto» conserva el valor cultual de רָצוֹן como aceptación/favor ante Dios, sin diluirlo en una mera evaluación abstracta. La forma impersonal evita precisar innecesariamente el sujeto de la aceptación y mantiene el paralelismo legal del hebreo.
theological_decisions:
- issue: Aceptabilidad cultual de la ofrenda
  english_pob_reading: accepted for you
  chosen_spanish_reading: no será acepto para ustedes
  alternative_spanish_readings:
  - no les será aceptado
  - no será aceptable para ustedes
  - no será favorable para ustedes
  rationale: La frase hebrea no describe solo conformidad formal, sino si la ofrenda queda en estado de aceptación cultual. «Acepto» mantiene esa tensión entre validez ritual y recepción favorable, sin introducir categorías doctrinales ajenas.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto inglés POB usa «blemish» y anota la alternativa «defect», además de abrir la lectura «accepted on your behalf». La versión española preserva la decisión cultual central con «defecto» y «acepto», sin añadir notas porque el español no introduce una ambigüedad nueva relevante que requiera marcadores.
  spanish_consistency_notes:
  - Se mantiene el registro legal-sacrificial del pasaje.
  - «Ustedes» refleja el plural de la forma verbal hebrea.
  - No se usa «SEÑOR»; el verso no contiene el tetragrámaton ni κύριος.
