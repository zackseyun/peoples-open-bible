review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general y las decisiones principales del hebreo: preserva «Yahvé», mantiene «Yahvé de los Ejércitos», traduce adecuadamente la cláusula relativa y el participio «que habita». Sin embargo, hay dos puntos mejorables para alineación fina con la fuente y con el rastro inglés: (1) «somos por señales y prodigios» suena poco natural y no expresa tan bien la función marcada por לְ como «somos para señales y prodigios»; (2) la nota al pie está anclada en «He aquí», pero la alternativa tradicional «el SEÑOR de los Ejércitos» corresponde al título divino, no al marcador deíctico inicial.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «somos por señales y prodigios» resulta forzado en español contemporáneo de lectura eclesial amplia. «Para señales y prodigios» mejora la fluidez sin perder sentido. También conviene mover la nota al pie al título «Yahvé de los Ejércitos», donde pertenece semánticamente.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה como «Yahvé», יְהוָה צְבָאוֹת como «Yahvé de los Ejércitos», y mantenimiento de un registro bíblico comprensible. La excepción necesaria es ajustar la preposición de finalidad a «para» por naturalidad y fidelidad funcional en español.'
  issues:
  - severity: medium
    issue: «somos por señales y prodigios» suena antinatural
    rationale: Aunque «por» intenta reflejar función, en español actual la construcción predicativa más clara y fiel aquí es «somos para señales y prodigios» o «somos señal y prodigio». «Para» expresa mejor la finalidad/función de לְאֹתוֹת וּלְמוֹפְתִים.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: La nota «O, de manera más tradicional, “el SEÑOR de los Ejércitos”» explica la alternativa de יְהוָה צְבָאוֹת, no de הִנֵּה/«He aquí». Debe marcarse junto a «Yahvé de los Ejércitos».
  - severity: low
    issue: Desajuste menor respecto al rastro inglés en la nota tradicional
    rationale: El rastro inglés da la alternativa tradicional para el título divino. En español conviene conservar esa equivalencia en el punto exacto del título, no asociarla al inicio del versículo.
  revised_spanish_text: He aquí yo y los hijos que Yahvé me ha dado somos para señales y prodigios en Israel, de parte de Yahvé de los Ejércitos[a], que habita en el monte Sion.
