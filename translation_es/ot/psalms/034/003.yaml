translation:
  language: es
  text: Mi alma se gloriará en Yahvé; los humildes[a] oirán y se alegrarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los afligidos» o «los mansos» para «los humildes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  english_pob_choice: In Yahweh / the LORD
  chosen_spanish: En Yahvé
  alternatives_spanish:
  - En el SEÑOR
  - En Yahweh
  lexicon: HALOT
  rationale: 'La preposición ב indica esfera o base: la alabanza/gloria se sitúa en Yahvé. Se mantiene el nombre divino según el criterio español del proyecto, sin ocultarlo con una convención de reemplazo. «En» conserva la relación locativa/abierta del hebreo y funciona de modo natural en español.'
- source_word: תִּתְהַלֵּל
  english_pob_choice: will boast
  chosen_spanish: se gloriará
  alternatives_spanish:
  - se alabará
  - se jactará
  - gloriará
  lexicon: HALOT
  rationale: El hitpael de הלל aquí expresa la idea de gloriarse/boast, no principalmente «praise». «Se gloriará» conserva la fuerza semántica sin caer en una jactancia demasiado marcada, y es más idiomático que una traducción literal mecánica.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mí mismo
  lexicon: HALOT
  rationale: נפש en los Salmos suele funcionar como el yo vital o la persona entera, pero «mi alma» preserva la expresión antropológica poética de forma reconocible en español y sigue de cerca la elección auditada en inglés.
- source_word: יִשְׁמְעוּ
  english_pob_choice: will hear
  chosen_spanish: oirán
  alternatives_spanish:
  - oirán
  - escucharán
  - oigan
  lexicon: HALOT
  rationale: El qal imperfecto de שמע aquí es simplemente «oir». «Oirán» mantiene el paralelismo verbal y la progresión poética del verso.
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los afligidos
  - los mansos
  - los pobres
  lexicon: HALOT
  rationale: עֲנָוִים puede abarcar humildes, mansos o afligidos. Se elige «los humildes» como la opción más directa para la matiz moral/espiritual del contexto, manteniendo la amplitud semántica sin forzar un sentido social específico.
- source_word: וְיִשְׂמָחוּ
  english_pob_choice: and rejoice
  chosen_spanish: y se alegrarán
  alternatives_spanish:
  - y se regocijarán
  - y estarán alegres
  - y se gozarán
  lexicon: HALOT
  rationale: שׂמח significa alegrarse/regocijarse. «Se alegrarán» es natural y fiel al paralelismo hebreo; conserva el movimiento de respuesta de los humildes al oír.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh / the LORD (with audit-trail tension noted in English)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Para el proyecto español se adopta «Yahvé» como forma principal, en coherencia con la convención indicada para יהוה, evitando la ocultación del nombre propio mediante un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance de עֲנָוִים en el segundo hemistiquio
  english_pob_reading: 'the humble; lexical alternatives: the afflicted / the meek'
  chosen_spanish_reading: los humildes
  alternative_spanish_readings:
  - los afligidos
  - los mansos
  - los pobres
  rationale: La decisión no fuerza un sentido doctrinal exclusivo. «Los humildes» deja abierta la posible cercanía con «afligidos» o «mansos» que el hebreo puede abarcar, y refleja la opción inglesa principal sin borrar la tensión léxica.
  doctrine_reference: HALOT / poesía sapiencial y salmódica
translation_notes:
  revision_awareness: El audit trail inglés marca alta concordancia y no registra revisiones aplicadas en esta unidad. Se respetó la lectura principal y se conservó la tensión léxica del hitpael de הלל («gloriarse/boast») sin neutralizarla en «praise».
  spanish_consistency_notes:
  - Se usó «Yahvé» en el texto principal, consistente con la directriz española del proyecto para יהוה.
  - Se evitó traducir mecánicamente desde el inglés donde el español pide una forma más natural, pero sin alejarse del hebreo.
  - Se conservó el paralelismo poético con dos miembros coordinados por «y».
