translation:
  language: es
  text: 'Entonces les dije[a]: «La palabra de Yahvé vino a mí, diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y les dije: “La palabra de Yahvé vino a mí, diciendo:”»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: So I said
  chosen_spanish: Así les dije
  alternatives_spanish:
  - Y les dije
  - Entonces les dije
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce una secuencia de discurso. «Así les dije» conserva el valor discursivo y suena natural en español; «Y les dije» y «Entonces les dije» son posibles, pero menos precisas para el enlace narrativo aquí.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos todos
  lexicon: HALOT
  rationale: El sufijo de 3mp indica un destinatario plural. En español, el dativo átono «les» transmite de forma natural ese complemento indirecto sin añadir énfasis innecesario.
- source_word: דְּבַר יְהוָה
  english_pob_choice: The word of Yahweh
  chosen_spanish: La palabra de Yahvé
  alternatives_spanish:
  - El mensaje de Yahvé
  lexicon: HALOT
  rationale: Se conserva el fórmula profética tradicional con «palabra», que refleja mejor el hebreo דְּבַר que «mensaje». Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se traslada como «Yahvé» según la terminología establecida del proyecto, evitando la sustitución por un título y manteniendo el nombre propio del pacto.
- source_word: הָיָה אֵלַי
  english_pob_choice: came to me
  chosen_spanish: vino a mí
  alternatives_spanish:
  - fue a mí
  - estuvo sobre mí
  lexicon: HALOT
  rationale: Aunque la forma literal es «fue/era», la fórmula profética en español se expresa con naturalidad como «vino a mí», que conserva el sentido idiomático de recepción de la palabra divina.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como introductor de cita. «Diciendo» mantiene el estilo formal y el vínculo directo con la palabra recibida.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La traducción mantiene el nombre divino como «Yahvé», siguiendo la línea doctrinal del proyecto y evitando una sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se ha mantenido la fórmula profética directa del hebreo y se ha seguido el criterio del proyecto para el nombre divino. La única variación relevante respecto del audit trail inglés es la adaptación natural de la secuencia narrativa a un español fluido («Así les dije» / «vino a mí, diciendo»).
  spanish_consistency_notes:
  - Se conserva el paralelismo entre la fórmula narrativa y la cita profética.
  - «Yahvé» se usa de manera consistente con el estándar del proyecto para יְהוָה.
  - «Les» refleja correctamente el plural del destinatario sin sobreexplicación.
