    reason: cultural_note
  revision_rationale: La revisión conserva el sentido del hebreo y de la auditoría POB, pero mejora la naturalidad y precisión del español. Se cambia "junto con" por "con" para reflejar mejor la relación sacrificial; "hojuelas" por "obleas" para representar mejor רְקִיקֵי מַצּוֹת; y "ungidas" por "untadas" en el texto principal para evitar una lectura ritual innecesaria en español, manteniendo la alternativa literal en la nota.
