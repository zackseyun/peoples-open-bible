translation:
  language: es
  text: y como proverbio[a] de reproche entre los necios. Consideramos su vida locura, y su fin deshonroso[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un refrán de reproche». El griego παραβολή puede designar un dicho proverbial o una palabra pública de burla, no solo una «parábola» en sentido más estrecho.
    reason: lexical_alternative
  - marker: b
    text: O «su muerte deshonrosa». El griego «su fin» puede referirse específicamente a la manera de su muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραβολήν
  english_pob_choice: proverb
  chosen_spanish: expresión
  alternatives_spanish:
  - proverbio
  - dicho
  - refrán
  lexicon: LSJ
  rationale: El griego puede significar una formulación proverbial o un dicho público de burla. En español, «expresión» evita forzar «parábola» en sentido narrativo y mantiene abierta la idea de un dicho difundido; el contenido de escarnio se completa con «reproche».
- source_word: ὀνειδισμοῦ
  english_pob_choice: of reproach
  chosen_spanish: de reproche
  alternatives_spanish:
  - de burla
  - de oprobio
  - de insulto
  lexicon: LSJ
  rationale: «Reproche» conserva la carga de vergüenza y deshonra, en un registro bíblico claro y natural en español.
- source_word: οἱ ἄφρονες
  english_pob_choice: among fools
  chosen_spanish: entre los necios
  alternatives_spanish:
  - los necios
  - entre los insensatos
  - los insensatos
  lexicon: LSJ
  rationale: La construcción griega funciona de modo apposicional con la voz de quienes hablan. «Entre los necios» expresa mejor que el dicho circula en ese grupo, sin borrar que ellos son los hablantes.
- source_word: ἐλογισάμεθα
  english_pob_choice: we considered
  chosen_spanish: consideramos
  alternatives_spanish:
  - pensamos
  - estimamos
  - juzgamos
  lexicon: LSJ
  rationale: El verbo implica una evaluación deliberada. «Consideramos» reproduce bien esa valoración reflexiva y mantiene la primera persona plural del griego.
- source_word: βίον
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - modo de vida
  - curso de su vida
  lexicon: LSJ
  rationale: Aquí βίος se refiere a la vida vivida de la persona. «Vida» es la forma más natural y fiel en español.
- source_word: μανίαν
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - insania
  - demencia
  - frenesí
  lexicon: LSJ
  rationale: «Locura» comunica el desprecio de los hablantes y preserva el sentido fuerte del término griego sin sonar artificial.
- source_word: τελευτήν
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - muerte
  - desenlace
  - partida
  lexicon: LSJ
  rationale: «Fin» permite conservar la amplitud del griego, que puede aludir al final de la vida y, por contexto, a la muerte misma.
- source_word: ἄτιμον
  english_pob_choice: dishonorable
  chosen_spanish: deshonroso
  alternatives_spanish:
  - sin honor
  - vergonzoso
  - ignominioso
  lexicon: LSJ
  rationale: «Deshonroso» expresa la falta de honor de manera directa y clara. Mantiene la valoración negativa sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Voz de los hablantes en la confesión retrospectiva
  english_pob_reading: The verse is rendered as the words of the ungodly/foolish reflecting on their former judgment of the righteous man.
  chosen_spanish_reading: El verso se entiende como palabras de los impíos/necios que recuerdan su propio juicio anterior sobre el justo.
  alternative_spanish_readings:
  - Una declaración neutral del narrador sobre los necios.
  rationale: La primera persona plural de ἐλογισάμεθα y el contexto inmediato de Sabiduría 5 favorecen una confesión retrospectiva. Por eso se mantiene «consideramos» y no se impersonaliza la frase.
  doctrine_reference: Preservar la tensión literaria y el cambio de perspectiva del texto original sin resolverlo por tradición.
translation_notes:
  revision_awareness: Se conserva la decisión auditada de leer οἱ ἄφρονες como identificación de los hablantes, no como voz narratorial neutral. No se adoptaron cambios tras la última revisión, que marcó el texto como unchanged.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «locura» para μανίαν por su fuerza semántica y porque el contexto es desprecio evaluativo.
  - «Fin» conserva la amplitud de τελευτήν y deja abierta la referencia al modo de morir.
  - La nota [a] aparece anclada en la expresión correspondiente y la nota [b] en «deshonroso» para reflejar las alternativas auditadas.
