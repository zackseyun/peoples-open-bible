translation:
  language: es
  text: Su marido es conocido en las puertas[a][b], cuando se sienta entre los ancianos de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En las puertas» se refiere al lugar público donde se atendían asuntos civiles, legales y comunitarios.
    reason: cultural_note
  - marker: b
    text: 'O: «es respetado» / «es reconocido». El hebreo dice literalmente «es conocido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹדָע
  english_pob_choice: is known
  chosen_spanish: es conocido
  alternatives_spanish:
  - es respetado
  - es reconocido
  lexicon: HALOT
  rationale: El nifal de ידע expresa estado de ser conocido o reconocido. «Es conocido» conserva ese sentido básico sin añadir explícitamente una valoración honorífica que el hebreo no exige por sí solo, aunque el contexto sí la sugiere.
- source_word: בַּשְּׁעָרִים
  english_pob_choice: in the gates
  chosen_spanish: en las puertas
  alternatives_spanish:
  - en las puertas de la ciudad
  - en las puertas de la ciudad
  lexicon: HALOT
  rationale: שערים significa literalmente «puertas». En Proverbios alude al lugar público donde se trataban asuntos civiles y judiciales. «En las puertas» conserva la imagen hebrea; la nota puede explicitar la función social.
- source_word: בַּעְלָהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su dueño
  lexicon: HALOT
  rationale: En este contexto doméstico y honorífico, בעל se entiende naturalmente como «marido». «Marido» es claro en español y evita una carga de dominio que aquí no es necesaria.
- source_word: בְּשִׁבְתּוֹ
  english_pob_choice: when he sits
  chosen_spanish: cuando se sienta
  alternatives_spanish:
  - al sentarse
  - mientras se sienta
  lexicon: HALOT
  rationale: La construcción temporal se expresa con naturalidad en español como «cuando se sienta». Mantiene el valor circunstancial del texto hebreo sin volverlo demasiado rígido.
- source_word: עִם
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «con», «entre» comunica mejor la participación de su marido en el grupo de ancianos. En español suena más natural dentro de una escena de consejo público.
- source_word: זִקְנֵי אָרֶץ
  english_pob_choice: the elders of the land
  chosen_spanish: los ancianos de la tierra
  alternatives_spanish:
  - los ancianos del país
  - los ancianos de la región
  lexicon: HALOT
  rationale: Se conserva la forma amplia «la tierra» porque el hebreo dice אָרֶץ, no «ciudad». «Ancianos» traduce זקני y mantiene el matiz de notables veteranos con autoridad.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: conserva la imagen de «las puertas», mantiene el valor temporal de la cláusula y respeta la ambigüedad moderada entre «conocido», «respetado» y «reconocido» sin forzar una interpretación honorífica exclusiva.'
  spanish_consistency_notes:
  - Se usó «marido» por claridad y naturalidad en español, manteniendo el sentido contextual de בַּעְלָהּ.
  - Se prefirió «puertas» a «puertas de la ciudad» para conservar la imagen breve del hebreo; la nota aclara el trasfondo cívico.
  - «Ancianos de la tierra» preserva el alcance literal de אָרֶץ y evita restringir el referente a una sola ciudad.
