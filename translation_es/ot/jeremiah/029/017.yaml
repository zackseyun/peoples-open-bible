revisions:
- from: 'Así dice Yahvé de los ejércitos: He aquí[a], estoy enviando contra ellos la espada, el hambre y la peste, y los pondré como higos podridos, que no se pueden comer por su podredumbre.'
  to: 'Así dice Yahvé de los ejércitos: He aquí[a], estoy enviando contra ellos la espada, el hambre y la peste, y los haré como higos podridos[b], que no se pueden comer por su mal estado.'
  rationale: Se ajusta la cláusula final para reflejar mejor מֵרֹעַ como mala condición general y no específicamente «podredumbre», se mejora la naturalidad de וְנָתַתִּי אוֹתָם con «los haré como», y se añade una nota léxica para preservar las alternativas documentadas de הַשֹּׁעָרִים.
  reviewer_model: gpt-5.4
