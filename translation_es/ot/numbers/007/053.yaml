  yaml_path: translation/ot/numbers/007/053.yaml
  text: 'and for the sacrifice of peace offerings: two cattle[a], five rams, five male goats, and five lambs a year old[b]. This was the offering of Elishama son of Ammihud.'
  footnotes:
