id: GEN.37.3
reference: Genesis 37:3
source:
  edition: WLC
  text: וְ/יִשְׂרָאֵ֗ל אָהַ֤ב אֶת יוֹסֵף֙ מִ/כָּל בָּנָ֔י/ו כִּֽי בֶן זְקֻנִ֥ים ה֖וּא ל֑/וֹ וְ/עָ֥שָׂה ל֖/וֹ כְּתֹ֥נֶת פַּסִּֽים־־־־׃
translation:
  text: Now Israel loved Joseph more than all his sons[a], because he was the son of his old age; and he made for him a richly ornamented robe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'a robe of many colors.' The Hebrew expression is uncertain; it may refer to a richly ornamented robe or one extending to the wrists and ankles rather than specifically to its colors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׂרָאֵל
  chosen: Now Israel
  alternatives:
  - And Israel
  lexicon: HALOT
  rationale: The conjunction וְ can be rendered simply as 'and,' but in narrative English 'now' often better signals a development in the story without overstating sequence. 'Israel' is retained as the personal name used in the Hebrew text, rather than substituting 'Jacob.'
- source_word: אָהַב
  chosen: loved
  alternatives:
  - favored
  lexicon: HALOT
  rationale: The verb means 'loved.' Although the context implies favoritism, the Hebrew uses the ordinary verb for love, so the main text preserves that lexical force rather than interpreting it as 'favored.'
- source_word: מִכָּל בָּנָיו
  chosen: more than all his sons
  alternatives:
  - more than any of his sons
  - more than all his children
  lexicon: HALOT
  rationale: The comparative sense is conveyed by מִן with 'all his sons.' 'Sons' is preferred over 'children' because the Hebrew is specifically masculine plural and refers to Jacob/Israel's sons in the narrative.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Israel's special love, so 'because' is the clearest modern English rendering.
- source_word: בֶן זְקֻנִים
  chosen: the son of his old age
  alternatives:
  - a son of old age
  - a son born in his old age
  lexicon: HALOT
  rationale: This idiom most naturally means a son associated with the father's old age. The English keeps the idiomatic sense while remaining close to the Hebrew. 'His' refers to Israel, matching the phrase הוּא לוֹ.
- source_word: הוּא לוֹ
  chosen: he was
  alternatives:
  - he was to him
  lexicon: HALOT
  rationale: The Hebrew construction literally includes 'to him,' but idiomatic English expresses the sense simply as 'he was.' The relational nuance is already captured in 'his old age.'
- source_word: וְעָשָׂה לוֹ
  chosen: and he made for him
  alternatives:
  - so he made him
  - and made for him
  lexicon: HALOT
  rationale: The Hebrew straightforwardly states that Israel made something for Joseph. 'Made for him' preserves the dative sense of לוֹ.
- source_word: כְּתֹנֶת
  chosen: robe
  alternatives:
  - tunic
  - coat
  lexicon: HALOT
  rationale: כְּתֹנֶת denotes a garment worn next to the body, often tunic-like. 'Robe' is readable modern English and fits the narrative context better than the more technical 'tunic,' while avoiding the potentially misleading modern outerwear sense of 'coat.'
- source_word: פַּסִּים
  chosen: long-sleeved
  alternatives:
  - of many colors
  - ornamented
  - reaching to the palms and soles
  lexicon: HALOT
  rationale: The traditional 'of many colors' is not the plain lexical sense of פַּסִּים. The term likely refers to extremities/palms, suggesting a garment extending to wrists and possibly ankles, hence a long or full-sleeved robe. Because the exact nuance is debated, the main text uses 'long-sleeved' and preserves a traditional alternative in a footnote.
