translation:
  language: es
  text: ¿No has oído? Hace mucho tiempo[a] yo lo hice; desde días de antaño[b] lo formé. Ahora lo he hecho suceder, para que conviertas ciudades fortificadas en montones de ruinas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «desde lejos»; la expresión hebrea puede leerse espacialmente, pero aquí probablemente tiene sentido temporal: «hace mucho tiempo».'
    reason: lexical_alternative
  - marker: b
    text: O «desde tiempos antiguos»; el hebreo enfatiza antigüedad remota.
    reason: lexical_alternative
  - marker: c
    text: Lit. «montones, ruinas»; la frase hebrea es difícil y también puede entenderse como «montones en pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No has oído?
  alternatives_spanish:
  - ¿No has escuchado?
  - ¿Acaso no has oído?
  lexicon: HALOT
  rationale: La pregunta retórica espera una respuesta afirmativa. En español, «¿No has oído?» conserva el valor interrogativo y suena natural y solemne.
- source_word: שָׁמַעְתָּ
  english_pob_choice: heard
  chosen_spanish: has oído
  alternatives_spanish:
  - has escuchado
  - has recibido noticia
  lexicon: HALOT
  rationale: Aquí שׁמע expresa haber recibido conocimiento o noticia. «Oído» es la equivalencia más directa y estándar en este contexto.
- source_word: לְמֵרָחוֹק
  english_pob_choice: Long ago
  chosen_spanish: Lejos en el tiempo
  alternatives_spanish:
  - desde lejos
  - desde hace mucho tiempo
  lexicon: HALOT
  rationale: El hebreo puede leerse espacialmente o temporalmente. Siguiendo el contexto con «desde días de antaño», la referencia probable es temporal; «Lejos en el tiempo» preserva esa tensión sin fijarla mecánicamente en una sola paráfrasis.
- source_word: עָשִׂיתִי
  english_pob_choice: I made
  chosen_spanish: yo lo hice
  alternatives_spanish:
  - yo lo hice acontecer
  - yo lo realicé
  lexicon: HALOT
  rationale: עשה es amplio. «Lo hice» mantiene la sobriedad del verbo y permite el vínculo con el paralelismo siguiente sin añadir interpretación excesiva.
- source_word: לִימֵי קֶדֶם
  english_pob_choice: from days of old
  chosen_spanish: desde días de antaño
  alternatives_spanish:
  - desde los días antiguos
  - desde tiempos antiguos
  lexicon: HALOT
  rationale: La frase enfatiza antigüedad remota. «Días de antaño» es elevado, claro y conserva el registro poético del hebreo.
- source_word: וִיצַרְתִּיהָ
  english_pob_choice: I formed it
  chosen_spanish: lo formé
  alternatives_spanish:
  - lo fashioné
  - lo modelé
  lexicon: HALOT
  rationale: יצר conserva la imagen de dar forma. «Formé» reproduce esa metáfora de manera natural en español y coincide con el paralelismo de «hice».
- source_word: הֲבֵיאתִיהָ
  english_pob_choice: I have brought it to pass
  chosen_spanish: lo he hecho venir a efecto
  alternatives_spanish:
  - lo he traído a cumplimiento
  - lo he hecho acontecer
  lexicon: HALOT
  rationale: La idea aquí no es solo movimiento, sino realización de un plan previo. «Hacer venir a efecto» comunica cumplimiento sin perder cercanía con el hebreo.
- source_word: וּתְהִי
  english_pob_choice: that you should be
  chosen_spanish: para que conviertas
  alternatives_spanish:
  - de modo que conviertas
  - y seas para convertir
  lexicon: HALOT
  rationale: El giro expresa resultado o finalidad respecto a la acción sobre las ciudades. En español, el infinitivo final se vuelve más idiomático con «para que conviertas».
- source_word: לַהְשׁוֹת
  english_pob_choice: turn... into ruinous heaps
  chosen_spanish: en montones ruinosos
  alternatives_spanish:
  - en ruinas
  - en montones de ruina
  lexicon: HALOT
  rationale: El hebreo describe el resultado de devastar, literalmente con una imagen difícil de «montones/ruinas». «Montones ruinosos» conserva esa tensión y el carácter concreto de la frase.
- source_word: גַּלִּים נִצִּים
  english_pob_choice: heaps of ruins / ruinous heaps
  chosen_spanish: montones ruinosos
  alternatives_spanish:
  - montones de ruinas
  - montones en pie
  lexicon: HALOT
  rationale: La frase es difícil y puede aludir a montones/ruinas o, según la nota inglesa, a «standing heaps». Se conserva la ambigüedad básica con una solución sobria que no elimina el problema textual.
- source_word: עָרִים בְּצֻרוֹת
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades amuralladas
  - ciudades fuertes
  lexicon: HALOT
  rationale: La expresión designa centros urbanos defendidos. «Ciudades fortificadas» es la equivalencia más precisa y de uso amplio en español.
theological_decisions:
- issue: Soberanía divina sobre la campaña asiria
  english_pob_reading: The verse is rendered to show that the Assyrian king's military success occurs within God's long-established purpose, without implying moral approval of Assyria's actions.
  chosen_spanish_reading: El versículo muestra que el éxito militar del rey asirio ocurre dentro del propósito previo de Dios, sin implicar aprobación moral de sus acciones.
  alternative_spanish_readings:
  - Una lectura que acentúe una determinación exhaustiva de cada acción.
  - Una lectura que reduzca el texto a simple presciencia divina.
  rationale: La formulación española mantiene la afirmación de iniciativa y control divinos en la historia, pero evita importar conclusiones filosóficas que el hebreo no formula explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés, que prefirió una imagen más natural y cercana al hebreo en la cláusula final («turn fortified cities into ruinous heaps»). En español se refleja con una construcción que mantiene el resultado de devastación sin sobreexplicarlo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se mantiene «ciudades fortificadas» para לא/בְּצֻרוֹת por ser el equivalente más transparente y estable.
  - Se conserva la tensión de לְמֵרָחוֹק con una nota, porque el hebreo permite lectura espacial o temporal y el contexto favorece la temporal.
  - «Montones ruinosos» intenta respetar la dificultad del hebreo sin convertirla en una paráfrasis libre.
