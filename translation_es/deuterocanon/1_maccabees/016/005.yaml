translation:
  language: es
  text: Y cuando se levantaron muy de mañana, fueron al llano; y he aquí, una gran fuerza vino a su encuentro, infantería y caballería, y un cauce de torrente estacional[a] estaba entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «wadi», «cauce de torrente» o «arroyo estacional». El término griego se refiere a un curso de agua que corre en invierno y puede designar tanto el agua misma como su cauce.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες τὸ πρωὶ
  english_pob_choice: when they rose early in the morning
  chosen_spanish: cuando se levantaron muy de mañana
  alternatives_spanish:
  - cuando se levantaron temprano en la mañana
  - después de levantarse de mañana
  lexicon: BDAG
  rationale: El participio con la expresión temporal marca una acción previa al movimiento. «Se levantaron muy de mañana» preserva esa secuencia y suena natural en español.
- source_word: ἐπορεύοντο
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - iban
  - marcharon
  lexicon: BDAG
  rationale: Aunque el imperfecto griego puede sugerir continuidad, el ajuste de revisión del POB inglés muestra que aquí una forma narrativa simple resulta más natural. «Fueron» conserva el desplazamiento sin añadir matiz militar no explícito en el verbo.
- source_word: τὸ πεδίον
  english_pob_choice: the plain
  chosen_spanish: el llano
  alternatives_spanish:
  - la llanura
  - el campo abierto
  lexicon: BDAG
  rationale: En contexto militar, πεδίον designa terreno llano y abierto, no un campo agrícola. «El llano» comunica bien esa idea en español breve y claro.
- source_word: δύναμις πολλὴ
  english_pob_choice: a large force
  chosen_spanish: una gran fuerza
  alternatives_spanish:
  - un gran ejército
  - una gran hueste
  lexicon: BDAG
  rationale: Δύναμις aquí se refiere a un cuerpo armado. «Una gran fuerza» mantiene la amplitud del término sin precisar más de lo que el griego garantiza.
- source_word: εἰς συνάντησιν αὐτοῖς
  english_pob_choice: came to meet them
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - avanzó contra ellos
  - fue al encuentro de ellos
  lexicon: BDAG
  rationale: La expresión idiomática describe movimiento hacia un enfrentamiento. «Salió a su encuentro» es idiomática y mantiene la idea de aproximación sin intensificarla más allá del texto.
- source_word: πεζικοὶ καὶ ἱππεῖς
  english_pob_choice: infantry and cavalry
  chosen_spanish: infantería y caballería
  alternatives_spanish:
  - soldados de a pie y jinetes
  - infantes y jinetes
  lexicon: BDAG
  rationale: Son categorías militares estándar. «Infantería y caballería» es la correspondencia más clara y formal en español.
- source_word: χειμάρρους
  english_pob_choice: a wadi
  chosen_spanish: un wadi
  alternatives_spanish:
  - un torrente
  - un cauce de arroyo estacional
  lexicon: LSJ
  rationale: El término griego apunta a un curso de agua estacional o su cauce. Se conserva «wadi» porque la auditable tradición inglesa del POB lo usa para reflejar bien el trasfondo geográfico de Oriente Próximo y porque en español bíblico puede aclararse con nota.
- source_word: ἦν ἀνὰ μέσον αὐτῶν
  english_pob_choice: was between them
  chosen_spanish: estaba entre ellos
  alternatives_spanish:
  - quedaba entre ellos
  - se hallaba entre ellos
  lexicon: BDAG
  rationale: La frase describe una separación topográfica entre los dos bandos. «Estaba entre ellos» es directo y fiel.
