    issue: «Y ellos dijeron» suena algo pesado en español
    rationale: El hebreo marca el sujeto en la flexión verbal; en español no hace falta explicitar «ellos» salvo para énfasis. «Y dijeron» conserva mejor la fluidez narrativa.
  - severity: low
    issue: La formulación del marcador de nota puede afinarse con puntuación más natural
    rationale: La nota es fiel, pero puede quedar un poco más idiomática con «O bien» o manteniendo la fórmula actual; no es un problema de fidelidad, solo de pulido.
  revised_spanish_text: 'Y dijeron[a]: «Tú nos has mantenido con vida. Que hallemos favor ante los ojos de mi señor, y seremos esclavos de Faraón».'
  revised_footnotes:
