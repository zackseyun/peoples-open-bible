translation:
  language: es
  text: 'Entonces Zebá y Zalmuna dijeron[a]: «Levántate tú y abátenos, porque como es el hombre, así es su fuerza[b]». Entonces Gedeón se levantó, mató a Zebá y a Zalmuna, y tomó los adornos en forma de luna creciente[c] que estaban en los cuellos de sus camellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Levántate tú y mátanos», entendiendo de manera más explícita que וּפְגַע בָּנוּ aquí implica un golpe mortal en contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque como es el hombre, así es su fuerza»; proverbio que expresa que la fuerza de un hombre corresponde a su estatura o valentía.'
    reason: cultural_note
  - marker: c
    text: 'O: «las lunetas» o «los adornos en forma de creciente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... זֶבַח וְצַלְמֻנָּע
  english_pob_choice: Then Zebah and Zalmunna said
  chosen_spanish: Entonces Zebá y Zalmuna dijeron
  alternatives_spanish:
  - Y Zebá y Zalmuna dijeron
  - Entonces Zebá y Zalmuna dijeron
  lexicon: HALOT
  rationale: El verbo singular con sujeto compuesto es idiomático en hebreo; en español natural conviene pluralizar «dijeron». «Entonces» conserva la secuencia narrativa del waw inicial sin forzar un calco.
- source_word: קוּם אַתָּה
  english_pob_choice: Rise yourself
  chosen_spanish: Levántate tú
  alternatives_spanish:
  - Levántate
  - Ponte de pie tú
  lexicon: HALOT
  rationale: La forma imperativa con pronombre explícito es enfática. En español, el énfasis se preserva bien con el pronombre explícito «tú» sin añadir una reflexividad artificial que suene extraña.
- source_word: וּפְגַע בָּנוּ
  english_pob_choice: and strike us down
  chosen_spanish: y derrótanos
  alternatives_spanish:
  - y golpéanos
  - y abátenos
  - y mátanos
  lexicon: HALOT
  rationale: El contexto es de ejecución por combate; el hebreo puede implicar un golpe letal. «Derrótanos» mantiene la fuerza sin volver explícita una paráfrasis más dura que el texto inmediato no exige de manera única.
- source_word: כִּי כָאִישׁ גְּבוּרָתוֹ
  english_pob_choice: for as the man is, so is his strength
  chosen_spanish: porque tal como es el hombre, así es su valor
  alternatives_spanish:
  - porque como es el hombre, así es su fuerza
  - porque según el hombre, así es su valor
  - porque tal como es el hombre, así es su fuerza
  lexicon: HALOT
  rationale: Se conserva el paralelismo proverbial. «Valor» comunica bien la idea de fuerza valiente/capacidad de combate y evita reducir la expresión solo a potencia física; «fuerza» queda como alternativa posible si se prefiere una correspondencia más literal.
- source_word: וַיָּקָם גִּדְעוֹן
  english_pob_choice: So Gideon rose
  chosen_spanish: Y Gedeón se levantó
  alternatives_spanish:
  - Entonces Gedeón se levantó
  - Así que Gedeón se levantó
  lexicon: HALOT
  rationale: La secuencia narrativa se expresa naturalmente con «Y». «Se levantó» refleja la respuesta al imperativo previo sin añadir matices no presentes.
- source_word: וַיַּהֲרֹג
  english_pob_choice: and killed
  chosen_spanish: y mató
  alternatives_spanish:
  - y dio muerte a
  - y acabó con
  lexicon: HALOT
  rationale: Verbo directo y claro para el acto de matar. «Mató» es la equivalencia más natural y fiel en español contemporáneo.
- source_word: הַשַּׂהֲרֹנִים
  english_pob_choice: the crescent ornaments
  chosen_spanish: los adornos en forma de creciente
  alternatives_spanish:
  - las lunetas
  - los crecientes
  - los adornos lunares
  lexicon: HALOT
  rationale: El término designa ornamentos en forma de luna creciente. «Adornos en forma de creciente» conserva la imagen sin introducir la palabra «lunas» como si fueran cuerpos celestes; además evita limitar demasiado el objeto con una sola forma española tradicional.
- source_word: אֲשֶׁר בְּצַוְּארֵי גְמַלֵּיהֶם
  english_pob_choice: that were on the necks of their camels
  chosen_spanish: que estaban en los cuellos de sus camellos
  alternatives_spanish:
  - que colgaban de los cuellos de sus camellos
  - que estaban alrededor del cuello de sus camellos
  lexicon: HALOT
  rationale: La cláusula relativa ubica los adornos. «En los cuellos» reproduce bien la localización, y «sus camellos» mantiene el referente plural masculino del pronombre.
theological_decisions:
- issue: Expresión proverbial masculina כָאִישׁ
  english_pob_reading: as the man is, so is his strength
  chosen_spanish_reading: tal como es el hombre, así es su valor
  alternative_spanish_readings:
  - como es el hombre, así es su fuerza
  - tal como es una persona, así es su valor
  rationale: Se conserva la forma masculina del proverbio, porque el contexto sigue hablando de guerreros varones y del honor/valentía en combate. «Valor» traduce la fuerza en su dimensión de capacidad bélica y evita neutralizar indebidamente el dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto sigue de cerca el juicio auditado del POB en inglés, manteniendo la lectura óptima de וּפְגַע בָּנוּ como agresión letal en contexto, la equivalencia proverbial de כָאִישׁ גְּבוּרָתוֹ y la identificación de הַשַּׂהֲרֹנִים como ornamentos lunares/crescentes. No se introdujeron cambios de revisión posteriores en el testimonio inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en este proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Gedeón» como forma española estable del nombre propio.
  - Se mantuvo «valor» para גְּבוּרָה en el proverbio, porque en este contexto la fuerza se expresa como bravura o capacidad de combate.
  - Se evitó «SEÑOR» y «Cristo», que no aplican a este pasaje.
  - «Adornos en forma de creciente» conserva la ambigüedad útil entre forma lunar y objeto ornamental, conforme al audit trail inglés.
