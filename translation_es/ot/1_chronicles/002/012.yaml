lexical_decisions:
- source_word: בֹעַז / Boaz
  english_pob_choice: Boaz
  chosen_spanish: Boaz
  alternatives_spanish:
  - Booz
  lexicon: HALOT
  rationale: Es nombre propio; en español bíblico circula también «Booz», pero «Boaz» conserva mejor la forma consonántica y queda alineado con la transliteración inglesa auditable del POB.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En genealogías, el hifil de ילד expresa causar el nacimiento / ser padre de. «Engendró» reproduce con precisión la relación genealógica y es un equivalente natural en español bíblico, más directo que una perífrasis.
- source_word: עוֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - Obed
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración estándar en español.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción copulativa se rinde de forma simple con «y». No se requiere la variante «e» porque la siguiente palabra comienza con consonante.
- source_word: יִשָׁי
  english_pob_choice: Jesse
  chosen_spanish: Jesé
  alternatives_spanish:
  - Jesse
  - Yishai
  lexicon: HALOT
  rationale: En español bíblico la forma establecida es «Jesé», que mantiene la identificación tradicional y resulta más reconocible para el lector hispanohablante que la transliteración hebrea.
theological_decisions:
- issue: 'Verbo genealógico: literalidad del hifil de ילד'
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
