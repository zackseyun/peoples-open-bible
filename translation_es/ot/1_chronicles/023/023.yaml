lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: La construcción genealógica introduce una lista de nombres propios; en español, «los hijos de» reproduce de manera directa y natural la relación genealógica inmediata del hebreo.
- source_word: מוּשִׁי
  english_pob_choice: Mushi
  chosen_spanish: Mushi
  lexicon: Nombre propio
  rationale: Nombre personal propio; se translitera sin traducir.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  lexicon: Nombre propio
  rationale: Nombre personal propio; se translitera. Se conserva la forma breve y usual en español bíblico.
- source_word: וְעֵדֶר
  english_pob_choice: and Eder
  chosen_spanish: y Eder
  lexicon: Nombre propio
  rationale: La conjunción hebrea se rinde con «y»; el nombre propio se translitera de forma estándar.
- source_word: וִירֵמוֹת
  english_pob_choice: and Jeremoth
  chosen_spanish: y Jeremot
  alternatives_spanish:
  - y Jerimot
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio con una forma española breve y legible. La variante inglesa «Jerimoth» refleja una alternancia tradicional de vocalización/transcripción, pero en español «Jeremot» mantiene la cercanía fonética y la transparencia del nombre.
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  lexicon: HALOT
  rationale: 'El cardinal cierra el enunciado como resumen total de la lista: «—tres» preserva el valor sumario del hebreo y el ritmo de lista + total.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español junto al nombre correspondiente. No se introdujeron cambios de contenido más allá de esa corrección y de la adaptación ortográfica española del nombre final.
  spanish_consistency_notes:
  - Se mantuvo una estructura breve y genealógica acorde al hebreo.
  - Se usó «hijos» para בְּנֵי por ser la opción más natural y fiel en una lista de linaje.
  - Se conservaron transliteraciones consistentes para los nombres propios.
  - Se empleó un guion largo antes de «tres» para reflejar el total conclusivo de la lista.
