translation:
  language: es
  text: Y al poco rato[a], el cielo[b] se oscureció con nubes y viento, y hubo una fuerte lluvia[c]. Entonces Acab se subió a su carro y fue a Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: ''hasta así y hasta así'', un modismo temporal que significa ''al poco rato'' o ''mientras tanto''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''los cielos se oscurecieron''.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: ''una gran lluvia''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי עַד כֹּה וְעַד כֹּה
  english_pob_choice: And in a little while
  chosen_spanish: Y ocurrió que, mientras tanto
  alternatives_spanish:
  - Y ocurrió que, en poco tiempo
  - Y fue así que, al poco rato
  - Y sucedió que, entretanto
  lexicon: HALOT
  rationale: El hebreo es un modismo temporal que comunica un breve lapso, no una referencia literal a 'así y así'. En español, 'mientras tanto' conserva la función de transición temporal con naturalidad y sin exagerar el lapso.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the sky
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: En este contexto de clima y tormenta, el hebreo plural idiomático puede verterse de forma natural como 'los cielos'. Mantiene el matiz bíblico sin sonar forzado; 'el cielo' también sería posible, pero el plural refleja mejor la forma hebrea.
- source_word: הִתְקַדְּרוּ
  english_pob_choice: grew black
  chosen_spanish: se oscurecieron
  alternatives_spanish:
  - se ennegrecieron
  - se pusieron oscuros
  - se hicieron sombríos
  lexicon: HALOT
  rationale: El verbo expresa oscurecimiento o volverse sombrío. 'Se oscurecieron' es natural en español y comunica el cambio de estado sin añadir más colorido del que exige el hebreo.
- source_word: עָבִים וְרוּחַ
  english_pob_choice: with clouds and wind
  chosen_spanish: con nubes y viento
  alternatives_spanish:
  - con nubes espesas y viento
  - con nubes y un viento fuerte
  lexicon: HALOT
  rationale: La construcción indica acompañamiento o medio del oscurecimiento. 'Con nubes y viento' sigue de cerca el sentido del hebreo y es idiomático en español; no se fuerza 'espesas' porque el texto no lo explicita.
- source_word: וַיְהִי גֶּשֶׁם גָּדוֹל
  english_pob_choice: and there was a heavy rain
  chosen_spanish: y hubo una gran lluvia
  alternatives_spanish:
  - y cayó una gran lluvia
  - y hubo un fuerte aguacero
  - y cayó una lluvia abundante
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'una gran lluvia'. Se mantiene 'gran lluvia' para no perder la elección léxica documentada, aunque 'aguacero fuerte' sería más idiomático; aquí se preserva mejor la imagen del texto fuente.
- source_word: וַיִּרְכַּב
  english_pob_choice: mounted his chariot
  chosen_spanish: se subió a su carro
  alternatives_spanish:
  - montó su carro
  - subió a su carro
  - se montó en su carro
  lexicon: HALOT
  rationale: El verbo indica subir/montar un vehículo de tracción. 'Se subió a su carro' es natural en español; 'carro' preserva el referente narrativo tradicional del carro de guerra sin introducir una palabra ajena al contexto.
- source_word: יִזְרְעֶאלָה
  english_pob_choice: to Jezreel
  chosen_spanish: a Jezreel
  alternatives_spanish:
  - hacia Jezreel
  - para Jezreel
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia el lugar. 'A Jezreel' reproduce el valor direccional de manera directa y clara en español.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el expediente auditado en inglés; no se registran revisiones aplicadas y el acuerdo de revisión es alto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se prefirió 'carro' para el vehículo de Acab, coherente con el contexto narrativo y con el español bíblico contemporáneo.
  - Se conservó el matiz temporal del modismo hebreo sin volverlo literal ni demasiado interpretativo.
