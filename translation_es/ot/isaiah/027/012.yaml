base_translation:
  language: en
  yaml_path: translation/ot/isaiah/027/012.yaml
  text: And in that day Yahweh will thresh from the channel of the River to the Wadi of Egypt[a], and you will be gathered one by one[d][c][b], O sons of Israel.
  footnotes:
  - marker: a
    text: Or, 'the Euphrates'; 'the River' is a common designation for the Euphrates.
    reason: cross_reference
  - marker: b
    text: Or, 'Brook of Egypt.' The Hebrew refers to a wadi or seasonal watercourse, not necessarily the Nile.
    reason: lexical_alternative
  - marker: c
    text: The verb evokes gleaning or collecting individually after threshing.
    reason: cultural_note
  - marker: d
    text: Or, 'children of Israel.' The Hebrew is literally 'sons of Israel.'
    reason: lexical_alternative
