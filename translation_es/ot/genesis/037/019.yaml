translation:
  language: es
  text: 'Y se dijeron unos a otros: «Miren, ahí viene este soñador[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «el señor» o «el dueño de los sueños». La expresión hebrea se vierte idiomáticamente como «soñador» para reflejar el tono burlón de los hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y se dijeron
  alternatives_spanish:
  - Entonces se dijeron
  - Y dijeron
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa. En español, «y se dijeron» conserva la secuencia y el sentido recíproco del hebreo sin sonar forzado.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - el uno al otro
  - cada uno a su hermano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y recíproca. «Unos a otros» comunica el sentido natural en español y evita una traducción demasiado literal como «cada hombre a su hermano».
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  lexicon: HALOT
  rationale: La partícula introduce una llamada de atención. «Miren» conserva el tono de aviso o señalamiento en español contemporáneo.
- source_word: בַּעַל הַחֲלֹמוֹת
  english_pob_choice: this dreamer
  chosen_spanish: este soñador
  alternatives_spanish:
  - el dueño de los sueños
  - el señor de los sueños
  - este hombre de sueños
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente algo como «dueño/señor de los sueños», el contexto es burlón y alude a José como el que sueña y provoca sus celos. «Este soñador» reproduce mejor el tono despectivo que una forma más literal pero extraña en español.
- source_word: הַלָּזֶה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  - aquel
  lexicon: HALOT
  rationale: El demostrativo tiene matiz despectivo o señalador. «Este» puede conservar esa cercanía irónica en español.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - se acerca
  lexicon: HALOT
  rationale: El hebreo expresa una llegada en curso o inminente. «Viene» es natural en español y mantiene el valor aspectual sin añadir matices innecesarios.
translation_notes:
  revision_awareness: El inglés POB eligió una traducción idiomática y marcó en nota la alternativa literal «the master/lord of dreams». La versión española sigue esa misma decisión interpretativa, manteniendo el tono burlón del contexto. No hay revisiones aplicadas en el expediente más reciente; el pasaje permanece estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» y terminología teológica ajena al pasaje.
  - La puntuación y el estilo buscan ser publicables en español bíblico moderno, sin arcaísmos innecesarios.
