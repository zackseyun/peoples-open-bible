    rationale: Aunque el griego dice literalmente «el cabello de su cabeza», en español esa formulación suena forzada. «La cabellera» o «el cabello de la cabeza»; la primera comunica mejor κόμη en registro digno sin pérdida de sentido.
  - severity: low
