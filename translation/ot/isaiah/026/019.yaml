theological_decisions:
- issue: Resurrection language in a poetic-prophetic context
  chosen_reading: Render the verse straightforwardly as bodily resurrection imagery without reducing it to mere national restoration.
  alternative_readings:
  - Purely metaphorical national revival
  rationale: The sequence 'your dead will live,' 'my corpses will rise,' 'awake... you who dwell in the dust,' and the earth expelling the dead strongly supports real resurrection language, even if it also contributes to corporate hope for Israel. The translation should preserve that theological tension rather than flatten it into metaphor alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Speaker reference in 'my corpses'
  chosen_reading: Retain the first-person possessive in the main text.
  alternative_readings:
  - Emend or smooth to 'their corpses' or 'your corpses'
  rationale: The Masoretic text reads first person singular suffix. Because the exact speaker identification is debated, the translation keeps the textual form rather than harmonizing it away.
  doctrine_reference: Original-language primacy over translation tradition.
