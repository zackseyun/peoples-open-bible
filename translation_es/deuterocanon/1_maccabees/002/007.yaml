revisions:
- from: Y dijo:[a] «¡Ay de mí! ¿Por qué fui hecho para ver la ruina de mi pueblo y la ruina de la ciudad santa, y para sentarme allí mientras era entregada en mano de enemigos[b], y el santuario en mano de extranjeros?»
  to: Y dijo:[a] «¡Ay de mí! ¿Por qué nací para ver la ruina[b] de mi pueblo y la ruina de la ciudad santa, y para sentarme allí mientras era entregada en manos de enemigos[c], y el santuario en manos de extranjeros?»
  rationale: Se ajusta «fui hecho» a «nací» porque refleja mejor el valor idiomático de ἐγενήθην en este lamento y suena natural en español. Se cambia «en mano de» por «en manos de» para conservar la metáfora bíblica con español idiomático. Además, se añade una nota que preserva la observación auditada sobre el plural griego de συντρίμματα.
