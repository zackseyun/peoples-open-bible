theological_decisions:
- issue: Meaning of חַטָּאת in prophetic accusation
  chosen_reading: sin
  alternative_readings:
  - sin offering
  rationale: In this context of moral indictment against Lachish and Zion, חַטָּאת clearly denotes sin/guilt rather than a cultic sin offering. The verse traces the spread or origin of wrongdoing, not sacrificial remedy.
- issue: Force of רֵאשִׁית חַטָּאת
  chosen_reading: Lachish as an originating point or first instance of sin for daughter Zion
  alternative_readings:
  - Lachish as chief sin
  - Lachish as first city conquered and thus first in judgment
  rationale: The syntax most naturally presents Lachish as the beginning/source of sin for Zion, followed by the explanatory clause that Israel's transgressions were found there. This preserves the prophetic accusation without over-specifying historical mechanism.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
