translation:
  language: es
  text: ¿Piensan que vine a dar paz en la tierra? No[a], les digo[b], sino más bien división.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «traer paz». El verbo griego dice literalmente «dar», pero en algunas traducciones se expresa de manera idiomática como «traer».
    reason: lexical_alternative
  - marker: b
    text: «En la tierra» también podría traducirse «en el país», pero aquí el sentido más amplio parece más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκεῖτε
  english_pob_choice: Do you think
  chosen_spanish: ¿Piensan que…?
  alternatives_spanish:
  - ¿Creen que…?
  - ¿Suponen que…?
  lexicon: BDAG
  rationale: El presente de δεύτερα persona plural introduce una pregunta retórica dirigida a los oyentes. «Piensan» mantiene el tono directo y natural en español, con el matiz de una suposición cuestionada.
- source_word: παρεγενόμην
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - he venido
  - llegué
  lexicon: BDAG
  rationale: El aoristo de παραγίνομαι funciona aquí idiomáticamente para la venida de Jesús con propósito. «Vine» refleja bien el valor verbal y suena natural en una pregunta retórica.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - traer
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito después de «vine». «Dar» es la correspondencia directa y conserva mejor el vínculo léxico con el griego que «traer».
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - armonía
  - tranquilidad
  lexicon: BDAG
  rationale: «Paz» es el equivalente natural y más amplio de εἰρήνη. En este contexto puede abarcar paz social y relacional; no conviene restringirlo a paz interior.
- source_word: ἐν τῇ γῇ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el mundo
  - en el país
  lexicon: BDAG
  rationale: γῆ puede significar tierra, mundo o país/territorio. Aquí el alcance amplio encaja mejor con la escena y con el paralelo en el contexto, por eso se conserva «en la tierra».
- source_word: οὐχί
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - De ninguna manera
  - En absoluto
  lexicon: BDAG
  rationale: Es una negación fuerte y breve. «No» reproduce la fuerza directa del rechazo retórico sin añadir énfasis innecesario.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les afirmo
  - les aseguro
  lexicon: BDAG
  rationale: La fórmula discursiva es común en los Evangelios. «Les digo» conserva el contacto directo con los oyentes y el tono enfático sin sobretraducir.
- source_word: ἀλλ’ ἢ
  english_pob_choice: but rather
  chosen_spanish: sino más bien
  alternatives_spanish:
  - pero más bien
  - sino
  lexicon: BDAG
  rationale: 'Después de la negación, la construcción expresa contraste fuerte. «Sino más bien» reproduce con claridad la oposición: no paz, sino división.'
- source_word: διαμερισμόν
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - discordia
  - separación
  lexicon: BDAG
  rationale: El sustantivo señala división o desunión, especialmente social y doméstica en el contexto inmediato. «División» es la opción más directa y suficientemente amplia para el español.
theological_decisions:
- issue: Mantener la tensión de que Jesús niega traer paz en este sentido inmediato, sin suavizar el contraste.
  english_pob_reading: 'Retain the stark contrast: Jesus denies that his coming brings peace in this immediate sense and states that it brings division.'
  chosen_spanish_reading: 'Conservar el contraste tajante: Jesús niega que su venida traiga paz en este sentido inmediato y afirma que trae división.'
  alternative_spanish_readings:
  - Suavizar a «conflicto»
  - Interpretar solo un efecto social accidental
  rationale: El griego es deliberadamente incisivo y el contexto sigue con la división en las relaciones familiares. No conviene armonizar el versículo con otros textos sobre la paz ni atenuar el enunciado más allá de lo que permite la fuente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El último pase de revisión indicó alta concordancia y no requirió cambios; este borrador sigue esa lectura, preservando el valor de «dar/vine», el contraste fuerte con «división» y el alcance amplio de γῆ.
  spanish_consistency_notes:
  - Se mantiene «paz» para εἰρήνη y «división» para διαμερισμός, coherente con el registro léxico del proyecto.
  - Se usa «tierra» para γῆ siguiendo el sentido amplio contextual, sin estrecharlo a un territorio local.
  - Se evita «Cristo» u otra terminología no presente en el versículo.
  - La puntuación reproduce la pregunta retórica y el corte adversativo del griego.
