revisions:
- from: Por tanto, mira, yo te reuniré con tus padres, y serás reunido[a] en tus sepulcros en paz, y tus ojos no verán toda la calamidad que yo traigo sobre este lugar.” Y ellos llevaron la respuesta al rey.
  to: Por tanto, mira, yo te reuniré con tus padres, y serás reunido en tus sepulcros en paz[a], y tus ojos no verán toda la calamidad que yo traigo sobre este lugar.” Y llevaron la noticia al rey.
  rationale: Se movió la nota al sintagma correcto ('en paz') para ajustarse al sentido fuente y a la disciplina de anclaje de notas. Además, se revisó la fórmula final a 'Y llevaron la noticia al rey' para reflejar con mayor fidelidad e idiomaticidad el hebreo de reporte. No se requieren cambios doctrinales ni una adjudicación adicional.
