translation:
  language: es
  text: Si se origina un fuego y prende en espinos[a], y se consume el montón de grano, o la mies en pie, o el campo, el que encendió el fuego deberá hacer plena restitución[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y encuentra espinos»; literalmente, «y encuentra espinos».
    reason: lexical_alternative
  - marker: b
    text: O «deberá pagar sin falta»; el hebreo intensifica la obligación con un infinitivo absoluto más verbo finito.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una disposición casuística; en español jurídico y bíblico legal, «Si» expresa con naturalidad la condición.
- source_word: תֵצֵא אֵשׁ
  english_pob_choice: a fire breaks out
  chosen_spanish: se origina un fuego
  alternatives_spanish:
  - brota un fuego
  - se desata un fuego
  lexicon: HALOT
  rationale: La imagen hebrea describe el inicio accidental de un fuego. «Se origina» conserva el hecho de que el fuego comienza sin forzar una frase demasiado coloquial.
- source_word: וּמָצְאָה קֹצִים
  english_pob_choice: and catches in thorns
  chosen_spanish: y prende en espinos
  alternatives_spanish:
  - y encuentra espinos
  - y se agarra a espinos
  - y prende en zarzas
  lexicon: HALOT
  rationale: El hebreo literalmente dice «y encuentra espinos», pero en contexto el fuego los alcanza e incendia. «Prende en espinos» mantiene la imagen y la relación causal sin perder naturalidad.
- source_word: קֹצִים
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - zarzas
  - matorrales
  - espinas
  lexicon: HALOT
  rationale: «Espinos» comunica el campo semántico de vegetación seca que alimenta el fuego, y suena natural en español bíblico contemporáneo.
- source_word: וְנֶאֱכַל
  english_pob_choice: is consumed
  chosen_spanish: se consume
  alternatives_spanish:
  - se quema
  - queda consumido
  - es devorado
  lexicon: HALOT
  rationale: El nifal de אכל aplicado al fuego expresa ser consumido. «Se consume» conserva la pasividad del daño y el tono legal.
- source_word: גָּדִישׁ
  english_pob_choice: stacked grain
  chosen_spanish: el montón de grano
  alternatives_spanish:
  - la gavilla amontonada
  - el montón de mies
  - la parva de grano
  lexicon: HALOT
  rationale: Designa grano cosechado amontonado. «Montón de grano» es claro y suficientemente literal para el contexto agrícola.
- source_word: הַקָּמָה
  english_pob_choice: standing grain
  chosen_spanish: la mies en pie
  alternatives_spanish:
  - el grano en pie
  - la cosecha en pie
  - el cultivo en pie
  lexicon: HALOT
  rationale: Describe el cereal aún sin cosechar. «Mies en pie» es una equivalencia bíblica clara y fiel al contraste con el grano ya amontonado.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la parcela
  - la tierra
  - el terreno
  lexicon: HALOT
  rationale: Equivale de forma directa y natural al lugar afectado por el incendio.
- source_word: שַׁלֵּם יְשַׁלֵּם
  english_pob_choice: must surely make restitution
  chosen_spanish: deberá pagar ciertamente
  alternatives_spanish:
  - deberá resarcir plenamente
  - tendrá que hacer restitución
  - pagará sin falta
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la obligación. Se conserva la fuerza de certeza con «ciertamente»; «pagar» sigue el valor básico del verbo en un contexto legal de resarcimiento.
- source_word: הַמַּבְעִר
  english_pob_choice: the one who started the fire
  chosen_spanish: el que encendió el fuego
  alternatives_spanish:
  - el que prendió el fuego
  - el que lo causó
  - el incendiario
  lexicon: HALOT
  rationale: El participio causativo señala al responsable de encender el fuego. «Encendió» es idiomático y suficientemente cercano; evita una lectura excesivamente técnica.
- source_word: אֶת הַבְּעֵרָה
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la llama
  - el incendio
  - la combustión
  lexicon: HALOT
  rationale: El sustantivo verbal apunta al fuego/burning provocado. «El fuego» es la forma más natural en español para mantener la referencia sin sobretraducción.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del inglés en el giro del fuego que «prende en espinos», y mantiene la misma fuerza legal intensiva en la cláusula de restitución.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en este proyecto, pero este versículo no lo contiene.
  - Se usa un registro legal-bíblico claro, evitando arcaísmos innecesarios.
  - La equivalencia de «mies en pie» preserva el contraste agrícola del hebreo entre grano ya reunido y cereal aún en el campo.
