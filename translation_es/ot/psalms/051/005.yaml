translation:
  language: es
  text: Porque conozco mis transgresiones, y mi pecado está siempre delante de mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento del clamor precedente. En español, "porque" preserva bien el valor explicativo causal sin sonar forzado en la confesión poética.
- source_word: פְשָׁעַי
  english_pob_choice: my transgressions
  chosen_spanish: mis transgresiones
  alternatives_spanish:
  - mis rebeliones
  - mis ofensas
  lexicon: HALOT
  rationale: פשע expresa culpa de rebelión o transgresión contra Dios. "Transgresiones" conserva el peso moral y pactual del término, en paralelo con la decisión inglesa.
- source_word: אֵדָע
  english_pob_choice: know
  chosen_spanish: conozco
  alternatives_spanish:
  - reconozco
  - sé
  lexicon: HALOT
  rationale: El verbo ידע aquí señala conciencia personal y reconocimiento de la propia culpa. "Conozco" comunica esa conciencia de forma natural en español y mantiene la fuerza de la afirmación.
- source_word: וְחַטָּאתִי
  english_pob_choice: and my sin
  chosen_spanish: y mi pecado
  alternatives_spanish:
  - y mi culpa
  - y mi ofensa
  lexicon: HALOT
  rationale: חטאת en este contexto confesional designa el pecado mismo, no el sacrificio por el pecado. "Pecado" es el equivalente más directo y comprensible, sin perder la singularidad del término hebreo.
- source_word: נֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: La imagen es la de algo puesto en la vista o en la conciencia del hablante. "Delante de mí" conserva bien esa metáfora en español bíblico moderno.
- source_word: תָמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: HALOT
  rationale: Expresa continuidad ininterrumpida. "Siempre" es natural, claro y suficientemente fuerte para reflejar la permanencia del recuerdo del pecado.
theological_decisions:
- issue: Mantener la distinción entre "transgresiones" y "pecado"
  english_pob_reading: Retain both terms distinctly in English
  chosen_spanish_reading: Conservar ambos términos como "transgresiones" y "pecado"
  alternative_spanish_readings:
  - Repetir solo "pecados"
  - Nivelar ambos con "culpas"
  rationale: El hebreo usa dos vocablos relacionados pero no idénticos. Mantenerlos distintos preserva la textura confesional y evita aplanar la carga teológica del versículo.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con el patrón del texto inglés auditado: se conservan el paralelismo confesional y la distinción léxica entre פשע y חטאת, sin revisiones posteriores reportadas.'
  spanish_consistency_notes:
  - '"Transgresiones" se usa para פשע según el valor pactual/moral del término.'
  - '"Pecado" se usa para חטאת en contexto de confesión, no como ofrenda por el pecado.'
  - '"Delante de mí" mantiene la imagen espacial de נֶגְדִּי de forma idiomática en español.'
  - '"Siempre" refleja תָמִיד como continuidad permanente, sin añadir matices no presentes en el hebreo.'
