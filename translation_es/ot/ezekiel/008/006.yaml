revisions:
- from: 'Y le dijo: «Hijo de hombre, ¿ves lo que ellos están haciendo, las grandes abominaciones que la casa de Israel está haciendo aquí, para alejarme[a] de mi santuario? Sin embargo, todavía verás abominaciones todavía mayores[b]».'
  to: 'Y me dijo: «Hijo de hombre, ¿ves lo que ellos están haciendo, las grandes abominaciones que la casa de Israel está haciendo aquí, para alejarme[a] de mi santuario? Sin embargo, verás abominaciones aún mayores[b]».'
