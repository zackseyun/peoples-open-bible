translation:
  language: es
  text: Sus caminos son dirigidos por Yahvé, y las obras de sus manos son guardadas por Yahvé su Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ ὁδοὶ αὐτοῦ
  english_pob_choice: His ways
  chosen_spanish: Sus caminos
  alternatives_spanish:
  - sus sendas
  - sus rutas
  - sus vías
  lexicon: BDAG
  rationale: «Caminos» conserva la imagen concreta y amplia de conducta o trayectoria de vida, como en la decisión inglesa «ways», sin estrechar el sentido a una sola dimensión moral o geográfica.
- source_word: κατευθύνονται
  english_pob_choice: are directed
  chosen_spanish: son dirigidos
  alternatives_spanish:
  - son enderezados
  - son guiados
  - son hechos rectos
  lexicon: BDAG
  rationale: La pasiva griega pide una formulación pasiva en español. «Son dirigidos» mantiene la agencia divina explícita y preserva la idea de ser conducidos/ordenados sin suavizarla.
- source_word: πεφυλαγμένα
  english_pob_choice: are guarded
  chosen_spanish: son guardadas
  alternatives_spanish:
  - son protegidas
  - son preservadas
  - son mantenidas bajo custodia
  lexicon: BDAG
  rationale: El participio perfecto indica un estado de haber quedado bajo vigilancia o resguardo. «Son guardadas» reproduce bien esa permanencia y su tono de protección activa.
- source_word: ἔργα χειρῶν αὐτοῦ
  english_pob_choice: the works of his hands
  chosen_spanish: las obras de sus manos
  alternatives_spanish:
  - la obra de sus manos
  - lo que sus manos han hecho
  - su hechura
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal y concreta del original. «Las obras de sus manos» es transparente en español y no diluye la imagen en una paráfrasis más abstracta.
- source_word: Κυρίου ... Κυρίου θεοῦ αὐτοῦ
  english_pob_choice: the Lord ... the Lord his God
  chosen_spanish: el Señor ... el Señor su Dios
  alternatives_spanish:
  - Yahvé ... Yahvé su Dios
  - el Señor ... el Señor, su Dios
  lexicon: BDAG
  rationale: La forma inglesa auditada usa «Lord» como convención para κύριος; aquí se mantiene «Señor» en español por coherencia litúrgica y porque el texto griego no ofrece el Tetragrámaton explícito. «Su Dios» conserva la relación posesiva del griego.
theological_decisions:
- issue: Agencia divina en pasivos
  english_pob_reading: The verse states that the person's ways are directed and his works are guarded by God without softening the claim.
  chosen_spanish_reading: El versículo afirma que los caminos de la persona son dirigidos y las obras de sus manos son guardadas por Dios, sin atenuar esa afirmación providencial.
  alternative_spanish_readings:
  - Sus caminos prosperan bajo el favor del Señor
  - Sus caminos quedan ordenados ante el Señor
  rationale: Los dos pasivos con ὑπό atribuyen acción real a Dios. La traducción conserva esa fuerza providencial y evita reemplazarla por una mera idea de éxito o aprobación general.
  doctrine_reference: Preservar la tensión teológica y la agencia divina explícita en el texto.
translation_notes:
  revision_awareness: El texto base inglés ya había sido revisado y quedó sin cambios en el último pase; la versión española sigue de cerca ese estado auditado sin introducir ajustes no respaldados por el griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con el contexto griego y con la práctica auditada del POB en este pasaje.
  - Se conserva la estructura paralela de dos cláusulas pasivas para reflejar la sintaxis y la teología del original.
  - «Obras de sus manos» se deja sin domesticar para preservar la imaginería concreta del griego.
