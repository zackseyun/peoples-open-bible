    reason: cultural_note
  - marker: c
    text: O «para que la lluvia no te retenga» o «no te impida avanzar».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota alternativa para preservar el sentido comparativo de כְּכַף אִישׁ, se ajusta אֱסֹר a «Apareja tu carro» para reflejar mejor la decisión léxica documentada, se mejora levemente la naturalidad de la frase temporal en español y se reubican las notas en sus anclajes correspondientes.
