- from: Aarón tomó a Elisaba, hija de Amminadab y hermana de Najsón, como su esposa, y ella le dio a luz a Nadab, Abiú, Eleazar e Itamar.
  to: 'Aarón tomó a Eliseba, hija de Amminadab y hermana de Najsón, como su esposa, y ella le dio hijos: Nadab, Abiú, Eleazar e Itamar.'
  rationale: Se ajusta la forma del nombre אֱלִישֶׁבַע a 'Eliseba' para mayor fidelidad al hebreo y se mejora la naturalidad del español al traducir וַתֵּלֶד לוֹ como 'le dio hijos', que expresa adecuadamente el dativo personal y funciona mejor con la enumeración de los cuatro hijos.
