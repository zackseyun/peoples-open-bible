  - severity: medium
    issue: «no volverás por el camino por el que fuiste» suena torpe y contextualemente menos claro
    rationale: Aunque «fuiste» sigue de cerca הָלַכְתָּ, en español la situación de regreso pide de forma natural «viniste». El propio rastro inglés adoptó una revisión idiomática equivalente. El matiz más literal puede conservarse en la nota.
  - severity: low
    issue: La nota al pie repite «por el mismo camino por el que fuiste»
    rationale: Si se revisa el texto principal a «viniste», conviene que la alternativa idiomática en la nota también use «viniste» para mantener naturalidad y coherencia en español.
