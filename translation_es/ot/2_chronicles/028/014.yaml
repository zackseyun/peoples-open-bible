translation:
  language: es
  text: Así los hombres armados dejaron a los cautivos y el botín[a][b] delante de los oficiales y de toda la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la congregación entera'.
    reason: lexical_alternative
  - marker: b
    text: O 'el despojo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  english_pob_choice: left
  chosen_spanish: dejaron
  alternatives_spanish:
  - abandonaron
  - pusieron aparte
  - soltaron
  lexicon: HALOT
  rationale: El verbo עזב aquí expresa la acción de apartar o dejar algo en un lugar. 'Dejaron' comunica de forma natural que entregaron o colocaron a los cautivos y el botín ante las autoridades, sin cargar la frase con el matiz más fuerte de 'abandonar'.
- source_word: הֶחָלוּץ
  english_pob_choice: the armed men
  chosen_spanish: los hombres armados
  alternatives_spanish:
  - los armados
  - los guerreros
  - la fuerza armada
  lexicon: HALOT
  rationale: La forma sustantivada describe a quienes iban equipados para la batalla. 'Hombres armados' conserva el valor militar y suena más natural en español que una literalidad como 'los armados'.
- source_word: הַשִּׁבְיָה
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - los prisioneros
  - la cautividad
  lexicon: HALOT
  rationale: Aquí no se trata de la abstracción 'cautividad', sino de personas tomadas en guerra. 'Cautivos' mantiene esa referencia concreta y corresponde bien al contexto narrativo.
- source_word: הַבִּזָּה
  english_pob_choice: the plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - el saqueo
  - el pillaje
  lexicon: HALOT
  rationale: El término designa los bienes tomados en guerra. 'Botín' es la equivalencia española más natural y directa, y evita un registro más oscuro o excesivamente técnico.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: '''Delante de'' preserva la idea espacial de colocación frente a los líderes y a la asamblea, con una claridad pública que el contexto sugiere.'
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los jefes
  - los príncipes
  - los líderes
  lexicon: HALOT
  rationale: En este contexto los שָׂרִים son autoridades encargadas de supervisar la acción. 'Oficiales' mantiene ese sentido de cargo o función y evita limitar innecesariamente el término a 'príncipes'.
- source_word: כָל הַקָּהָל
  english_pob_choice: all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - la asamblea completa
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: קהל refiere al grupo reunido. 'Asamblea' es una solución clara y acorde con Crónicas; 'toda la asamblea' reproduce bien la extensión total del grupo.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; esta versión española sigue de cerca la lectura estabilizada y conserva las dos alternativas léxicas documentadas para קהל y בִּזָּה.
  spanish_consistency_notes:
  - Se mantuvo 'hombres armados' para הֶחָלוּץ en coherencia con el valor militar señalado por el audit trail.
  - Se eligió 'botín' para בִּזָּה y se dejó la alternativa 'despojo' como opción léxica equivalente.
  - '''Toda la asamblea'' conserva el paralelismo con el inglés POB y el sentido colectivo de קהל.'
