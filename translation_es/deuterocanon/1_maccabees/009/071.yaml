revisions:
- from: Y lo aceptó[a], e hizo conforme a sus palabras, y le juró no buscarle mal todos los días de su vida.
  to: Y aceptó, e hizo conforme a sus palabras, y le juró no buscarle daño[a] todos los días de su vida.
  rationale: Se elimina el pronombre «lo» para no añadir un objeto no expreso en el griego, y se cambia «mal» por «daño» en el texto principal para seguir mejor el sentido contextual de κακόν según la auditoría inglesa, conservando la alternativa más literal en nota.
