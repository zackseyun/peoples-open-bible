revisions:
- from: Cuando mi vida se iba apagando dentro de mí[a], me acordé de Yahvé, y mi oración llegó hasta ti[b], al templo de tu santidad.
  to: Cuando mi vida se iba apagando dentro de mí[a], me acordé de Yahvé, y mi oración llegó hasta ti, a tu santo templo[b].
