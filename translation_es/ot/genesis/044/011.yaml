translation:
  language: es
  text: Entonces cada hombre se apresuró y bajó su saco al suelo[b][a], y cada hombre abrió su saco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite «cada hombre» antes de ambas acciones, enfatizando que cada hermano hizo individualmente las dos cosas: bajó su saco y luego lo abrió.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Entonces se apresuraron, y cada hombre bajó…».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְמַהֲרוּ
  english_pob_choice: they hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dieron prisa
  - se apresuraron
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa o rapidez. En español, «se apresuró» mantiene la inmediatez narrativa y permite la lectura distributiva introducida por אִישׁ («cada hombre»), como reflejan la revisión inglesa.
- source_word: וַיּוֹרִדוּ
  english_pob_choice: lowered
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - lo bajó
  - lo pusieron en el suelo
  lexicon: HALOT
  rationale: 'El hiphil de ירד tiene sentido causativo: hacer bajar. En el contexto concreto de los costales desde la carga hasta el suelo, «bajó» conserva la acción física de manera natural en español sin perder precisión.'
- source_word: אִישׁ ... אַמְתַּחְתּוֹ
  english_pob_choice: each man ... his sack
  chosen_spanish: cada hombre ... su costal
  alternatives_spanish:
  - cada uno ... su costal
  - cada hombre ... su saco
  lexicon: HALOT
  rationale: La construcción distributiva de אִישׁ se expresa bien con «cada hombre». «Costal» comunica el recipiente de transporte en un registro más sobrio y bíblico que «bolsa», y aquí funciona como equivalente contextual de אַמְתַּחַת.
- source_word: אַמְתַּחַת
  english_pob_choice: sack
  chosen_spanish: costal
  alternatives_spanish:
  - saco
  - bolsa
  lexicon: HALOT
  rationale: El término designa un recipiente para granos o provisiones. «Costal» es comprensible en español bíblico y conserva la imagen de un bulto grande de transporte mejor que «bolsa», que resulta demasiado pequeño o moderno.
- source_word: אָרְצָה
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - a la tierra
  lexicon: HALOT
  rationale: La forma direccional de ארץ indica movimiento hacia abajo, hacia el suelo. «A tierra» es breve, natural y suficientemente literal; evita introducir una precisión innecesaria que el hebreo no exige.
- source_word: וַיִּפְתְּחוּ
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desató
  - desabrochó
  lexicon: HALOT
  rationale: פתח significa abrir de forma directa. El singular español se usa aquí para acompañar la distribución de «cada hombre» y reflejar el paralelismo del hebreo, sin añadir matices ajenos como «desató».
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente unifica el sujeto distributivo: «each man hurried and lowered ... and each man opened». La versión española sigue esa decisión, manteniendo el paralelismo y evitando una alternancia incómoda entre plural y singular. También toma en cuenta que la revisión aprobada conservó sin cambios el contenido final, por lo que no introduce variantes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «cada hombre» en ambas acciones para reflejar la repetición distributiva del hebreo.
  - Se usa «costal» de manera consistente como equivalente de אַמְתַּחַת en este versículo.
  - «A tierra» conserva el movimiento direccional del hebreo sin sobreexplicar.
