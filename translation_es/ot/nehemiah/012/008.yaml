  yaml_path: translation/ot/nehemiah/012/008.yaml
  text: And the Levites were Jeshua[a], Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who, with his brothers[b], was over the thanksgiving songs.
  footnotes:
