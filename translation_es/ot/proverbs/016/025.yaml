translation:
  language: es
  text: Hay un camino que le parece correcto a un hombre, pero su fin son los caminos de muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial introduce un proverbio general; «Hay» es la forma natural en español y conserva la afirmación sapiencial sin añadir matices.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - ruta
  lexicon: HALOT
  rationale: En sabiduría bíblica, דֶּרֶךְ puede referirse al curso de vida o conducta. «Camino» es claro, idiomático y conserva bien la imagen.
- source_word: יָשָׁר
  english_pob_choice: right
  chosen_spanish: recto
  alternatives_spanish:
  - derecho
  - justo
  - correcto
  lexicon: HALOT
  rationale: El hebreo describe una evaluación de rectitud/aparente corrección. «Recto» mantiene la imagen literal de lo ישר y evita suavizarlo demasiado con «correcto».
- source_word: לִפְנֵי
  english_pob_choice: to a man
  chosen_spanish: le parece... a un hombre
  alternatives_spanish:
  - ante un hombre
  - a los ojos de un hombre
  lexicon: HALOT
  rationale: La POB inglesa decidió por una equivalencia idiomática que expresa percepción subjetiva. En español, «le parece... a un hombre» comunica mejor esa valoración personal sin forzar una traducción demasiado literal de «antes de».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El singular masculino hebreo tiene fuerza representativa general. Se conserva «un hombre» para mantener la forma del proverbio y la observación sobre percepción humana general.
- source_word: אַחֲרִיתָהּ
  english_pob_choice: its end
  chosen_spanish: su fin
  alternatives_spanish:
  - su final
  - su resultado
  - su desenlace
  lexicon: HALOT
  rationale: אַחֲרִית expresa el resultado final o desenlace de ese camino. «Su fin» es breve, natural y fiel a la tensión proverbial del contraste.
- source_word: דַּרְכֵי
  english_pob_choice: the ways of
  chosen_spanish: los caminos de
  alternatives_spanish:
  - las sendas de
  - las vías de
  lexicon: HALOT
  rationale: Se preserva el plural constructo. Aunque el español puede sonar singularizante, mantener el plural refleja mejor la forma hebrea y la intensificación proverbial.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - destrucción
  - ruina mortal
  lexicon: HALOT
  rationale: El sustantivo denota muerte de forma directa. «Muerte» preserva la fuerza del contraste sin reinterpretar el término.
theological_decisions:
- issue: Valor genérico de אִישׁ
  english_pob_reading: a man as a representative singular, referring to human perception generally
  chosen_spanish_reading: un hombre como singular representativo de la percepción humana en general
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: Se conserva la forma masculina singular porque el hebreo la usa así y porque la observación sapiencial es general, no restrictiva. Esto evita neutralizar innecesariamente el texto y mantiene la resonancia proverbial.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomático de לִפְנֵי
  english_pob_reading: seems right to a man
  chosen_spanish_reading: le parece recto a un hombre
  alternative_spanish_readings:
  - es recto a los ojos de un hombre
  - parece recto ante un hombre
  rationale: El hebreo comunica evaluación subjetiva más que rectitud objetiva. «Le parece recto» expresa esa percepción sin añadir información ajena al proverbio y sin perder la relación entre apariencia y desenlace.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Plural de דַּרְכֵי מָוֶת
  english_pob_reading: the ways of death
  chosen_spanish_reading: los caminos de muerte
  alternative_spanish_readings:
  - las sendas de muerte
  - los caminos mortales
  rationale: Se mantiene el plural porque el hebreo lo presenta así. En español, «caminos de muerte» conserva la imagen y la tensión literaria; evita reducir el plural a un singular más interpretativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: La versión anterior falló por incluir marcadores de nota no anclados en el texto. Esta revisión elimina notas y mantiene una sola línea de traducción limpia, ajustada al hebreo y coherente con el audit trail inglés.
  spanish_consistency_notes:
  - Se evita «Señor» o cualquier máscara por no haber tetragrámaton ni κύριος en este versículo.
  - Se conserva el plural de «caminos» para reflejar דַּרְכֵי מָוֶת.
  - Se usa vocabulario sapiencial natural en español, sin convertir el proverbio en paráfrasis.
