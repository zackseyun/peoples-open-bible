translation:
  language: es
  text: Hablen verdad, cada uno a su prójimo, y de ningún modo caerán en la ira y los tumultos; antes bien, estarán en paz, teniendo al Dios de la paz, y ninguna guerra prevalecerá contra ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀλήθειαν φθέγγεσθε
  english_pob_choice: Speak truth
  chosen_spanish: Hablen verdad
  alternatives_spanish:
  - Pronuncien verdad
  - Digan la verdad
  lexicon: LSJ
  rationale: Imperativo conciso y directo, con resonancia profética (cf. Zac 8:16; Ef 4:25).
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  lexicon: LSJ
  rationale: '''Prójimo'' es el equivalente ético-bíblico estándar en español.'
- source_word: οὐ μὴ ἐμπέσητε
  english_pob_choice: you will certainly not fall
  chosen_spanish: de ningún modo caerán
  alternatives_spanish:
  - en absoluto caerán
  - nunca caerán
  lexicon: LSJ
  rationale: Refleja la fuerza enfática del οὐ μή griego.
- source_word: μῆνιν
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - la cólera
  - el rencor
  lexicon: LSJ
  rationale: μῆνις tiene matiz de ira sostenida o rencor; 'ira' encaja en el flujo, aunque 'rencor' sería más preciso. Sigo el inglés 'wrath' con 'ira' por contexto general.
- source_word: ταραχάς
  english_pob_choice: tumults
  chosen_spanish: tumultos
  alternatives_spanish:
  - disturbios
  - alborotos
  lexicon: LSJ
  rationale: Equivalente directo y formal.
- source_word: θεὸν τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_spanish: el Dios de la paz
  alternatives_spanish:
  - Dios de la paz
  lexicon: LSJ
  rationale: Frase fija en el NT (Rom 15:33; Heb 13:20); preserva la resonancia bíblica.
- source_word: κατισχύσει
  english_pob_choice: will prevail
  chosen_spanish: prevalecerá
  alternatives_spanish:
  - se impondrá
  - vencerá
  lexicon: LSJ
  rationale: Fórmula tradicional bíblica (cf. Mt 16:18); recoge el matiz de fuerza superior.
translation_notes:
  revision_awareness: 'Esta unidad no recibió cambios en la revisión inglesa (unchanged: true).'
  spanish_consistency_notes:
  - θεός → Dios.
  - πλησίον → prójimo.
  - οὐ μή → 'de ningún modo'.
