    text: O ‘los israelitas’ o ‘los hijos de Israel’; el hebreo dice literalmente ‘los hijos de Israel’.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al sintagma que realmente comenta ('los hijos de Israel') y se ajusta el verbo a una forma más natural en español ('debían habitar') manteniendo el sentido normativo del original. No hay cambios doctrinales ni léxicos mayores.
