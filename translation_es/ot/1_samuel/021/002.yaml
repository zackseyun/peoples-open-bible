translation:
  language: es
  text: 'David llegó a Nob[a], a Ahimelec, el sacerdote. Ahimelec tembló al encontrarse con David y le dijo: «¿Por qué estás solo, y no hay ningún hombre contigo?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no hay nadie contigo». El hebreo dice más específicamente «no hay hombre contigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: HALOT
  rationale: El wayyiqtol de בוא indica la llegada de David a Nob. En español, «llegó» conserva el matiz de arribo narrativo con naturalidad y sin sobreespecificar dirección.
- source_word: נֹבֶה
  english_pob_choice: to Nob
  chosen_spanish: a Nob
  alternatives_spanish:
  - hacia Nob
  - hasta Nob
  lexicon: HALOT
  rationale: El hebreo marca movimiento hacia el lugar. «A Nob» reproduce de forma idiomática la meta del desplazamiento.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote aquel
  - el presbítero
  lexicon: HALOT
  rationale: El artículo hebreo identifica a Ahimelec por su oficio. «El sacerdote» es la forma natural y fiel en español contemporáneo.
- source_word: וַיֶּחֱרַד
  english_pob_choice: trembled
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se sobresaltó
  - tuvo miedo
  lexicon: HALOT
  rationale: חרד conserva una reacción corporal de temor o alarma. «Tembló» preserva la vividez física del verbo mejor que una simplificación abstracta como «tuvo miedo».
- source_word: לִקְרַאת
  english_pob_choice: at the meeting with
  chosen_spanish: al encontrarse con
  alternatives_spanish:
  - al salir al encuentro de
  - ante el encuentro con
  lexicon: HALOT
  rationale: La construcción expresa la reacción de Ahimelec ante la llegada/encuentro con David. «Al encontrarse con» mantiene el valor relacional y temporal sin forzar una traducción literal poco natural.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué se debe que
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo causal estándar; «¿Por qué?» es la forma más directa y fiel en español.
- source_word: לְבַדֶּךָ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por ti mismo
  - aislado
  lexicon: HALOT
  rationale: El término denota estar sin compañía. «Solo» es idiomático y mantiene el sentido de David sin acompañantes.
- source_word: וְאִישׁ אֵין אִתָּךְ
  english_pob_choice: and no one is with you
  chosen_spanish: y no hay nadie contigo
  alternatives_spanish:
  - y no hay un hombre contigo
  - y no tienes compañía
  lexicon: HALOT
  rationale: Aunque el hebreo usa אִישׁ («hombre»), el POB inglés ya opta por una formulación más natural sin perder el sentido. En español, «nadie» conserva la ausencia de compañía con claridad, mientras que la nota explica el matiz literal masculino.
theological_decisions:
- issue: Valor de אִישׁ en la pregunta final
  english_pob_reading: no one is with you
  chosen_spanish_reading: no hay nadie contigo
  alternative_spanish_readings:
  - no hay hombre contigo
  - no hay un hombre contigo
  rationale: La escena presupone que David normalmente iría acompañado; la pregunta de Ahimelec es por la ausencia de compañía. En español, la formulación natural es inclusiva en sentido general («nadie»), y la nota conserva el dato lexical de que el hebreo dice literalmente «hombre» sin imponer una traducción torpe o artificial.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde «when he met David» a «at the meeting with David» y desde «no man is with you» a «no one is with you». La redacción española sigue esa revisión: usa una construcción natural para la reacción de Ahimelec ante el encuentro y mantiene el sentido de ausencia de compañía con una formulación idiomática, dejando constancia del matiz literal de אִישׁ en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino en línea con el proyecto, aunque este versículo no lo contiene.
  - Se usa «sacerdote» para הַכֹּהֵן por ser el oficio explícito y el español estándar más claro.
  - Se conserva «David» y «Ahimelec» como formas establecidas y consistentes con la tradición onomástica bíblica en español.
  - La puntuación de cita directa sigue el estilo español y separa claramente la observación narrativa de la pregunta directa.
