revisions:
- from: Él volvió su corazón para odiar a su pueblo[a][b], para tratar con engaño a sus siervos.
  to: Él cambió el corazón[a] de ellos para odiar a su pueblo, para actuar con engaño contra sus siervos.
  rationale: Se elimina la duplicación de notas y se conserva una sola nota que explica el singular colectivo de לִבָּם. «Cambió el corazón de ellos» suena más natural y claro en español que «volvió su corazón», sin reducir la fuerza de la agencia divina. «Actuar con engaño contra sus siervos» expresa mejor el sentido hostil y astuto de לְהִתְנַכֵּל בַּעֲבָדָיו que «tratar con engaño a sus siervos».
