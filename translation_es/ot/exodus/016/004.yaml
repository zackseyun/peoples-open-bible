base_translation:
  language: en
  yaml_path: translation/ot/exodus/016/004.yaml
  text: Then Yahweh said to Moses[a], “Behold, I am raining bread from heaven for you, and the people shall go out and gather a day's portion each day, so that I may test them[c][b], whether they will walk in my law or not.”
  footnotes:
  - marker: a
    text: Or “I will rain bread from heaven for you.” The Hebrew participle can be rendered with imminent future force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the matter of a day in its day,” that is, each day’s needed portion gathered on that day.
    reason: lexical_alternative
  - marker: c
    text: Or “whether they will walk in my instruction or not.”
    reason: alternative_reading
