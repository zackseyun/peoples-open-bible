translation:
  language: es
  text: Caigamos en la mano de Yahvé[a], y no en la mano del hombre; porque así como es su grandeza, así también es su misericordia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene «manos» en ambas cláusulas («en las manos del Señor ... no en las manos de los hombres»), mientras que el testigo hebreo lee singular «mano». La traducción sigue aquí al hebreo como testigo primario.
    reason: textual_variant
  - marker: b
    text: 'O: «su amor leal». El hebreo חֶסֶד puede denotar bondad pactual o amor leal; el paralelo griego lee «misericordia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפֹּל / ἐμπεσοῦμεθα
  english_pob_choice: Let us fall
  chosen_spanish: Caigamos
  alternatives_spanish:
  - Caigamos en
  - Vayamos a caer
  - Encomendémonos
  lexicon: HALOT; LXX ἐμπίπτω
  rationale: El hebreo cohortativo plural y el griego exhortativo expresan una invitación volitiva; en español, «Caigamos» conserva la imagen de caer que está en ambos testigos. Se evitó «encomendémonos» porque suaviza la metáfora y va más allá del verbo fuente.
- source_word: בְּיַד / εἰς χεῖρας
  english_pob_choice: into the hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en las manos
  - bajo la mano
  - bajo el poder
  lexicon: HALOT; BDAG
  rationale: El hebreo transmitido en el paquete fuente usa singular, mientras que el griego paralelo usa plural. En español se conserva el singular «la mano» como imagen principal siguiendo el testigo hebreo, sin perder naturalidad. La preposición «en» reproduce el valor locativo de la expresión bíblica.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: El nombre divino se translitera como «Yahvé» según el estándar del proyecto para el Tetragrama. Se evita «SEÑOR» porque aquí se busca transparencia respecto del nombre propio del pacto.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - una persona
  - los seres humanos
  lexicon: HALOT
  rationale: En contraste con Yahvé, אָדָם funciona aquí de manera genérica para el ser humano mortal. «El hombre» mantiene el contraste singular del hebreo y del griego, sin intentar neutralizar el término más allá de lo que el contexto exige.
- source_word: כְּגָדְלוֹ
  english_pob_choice: as his greatness is
  chosen_spanish: así como es su grandeza
  alternatives_spanish:
  - según su grandeza
  - tan grande como él es
  - como es su grandeza
  lexicon: HALOT
  rationale: La construcción comparativa pide un correlato de «as... so». «Así como es su grandeza» conserva la relación formal y resulta idiomático en español. Se evita una paráfrasis como «según su poder» porque el texto habla de «grandeza».
- source_word: חַסְדּוֹ / τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su bondad leal
  - su clemencia
  lexicon: HALOT; LXX ἔλεος
  rationale: Se eligió «misericordia» porque armoniza con el griego ἔλεος y comunica la compasión divina en un registro bíblico claro. Aunque חֶסֶד puede incluir amor leal o bondad pactual, esas opciones serían más interpretativas en este contexto comparativo.
theological_decisions:
- issue: Nombre divino en una exhortación de confianza
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo del versículo contiene el Tetragrama en forma directa, y el proyecto privilegia su transliteración transparente. Mantener «Yahvé» preserva la identidad personal del Dios de Israel y evita el masking litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión textual singular/plural en 'hand(s)'
  english_pob_reading: Hebrew singular primary witness; Greek plural parallel
  chosen_spanish_reading: singular en la mano
  alternative_spanish_readings:
  - plural en las manos
  - a las manos
  rationale: El hebreo base del expediente lee singular, mientras que el griego de apoyo tiene plural. La traducción española sigue el testigo hebreo principal, y la nota registra la variante griega para no borrar la tensión textual.
  doctrine_reference: Textual criticism principle in project audit trail
translation_notes:
  revision_awareness: El registro inglés más reciente indica que no hubo cambios en la última revisión y que el pasaje mantiene alta concordancia entre los testigos principales. La redacción española conserva esa estabilidad, siguiendo el hebreo como testigo primario y dejando constancia de la variante griega en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva el singular «la mano» para reflejar el testigo hebreo principal.
  - «Misericordia» se usa como equivalente natural de חֶסֶד en este paralelismo, sin excluir la nota alternativa «amor leal».
  - La puntuación con punto y coma reproduce con claridad el paralelismo de la cláusula final.
