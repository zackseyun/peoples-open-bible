revisions:
- from: En tiempo de desgracia se olvida el placer[a], y el fin del hombre lo declara.
  to: En tiempo de desgracia se olvida el placer[a], y el fin del hombre habla de él.
  rationale: Se ajusta la segunda cláusula para reflejar con más fidelidad y naturalidad el hebreo יַגִּיד עָלָיו. «Habla de él» conserva el sentido de que el fin de una persona revela qué clase de persona fue, sin la rigidez ni la posible imprecisión de «lo declara». Se mantiene el resto del verso y la nota de variante, con una leve mejora de fluidez en la formulación del griego paralelo.
