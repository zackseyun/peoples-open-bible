translation:
  language: es
  text: Entonces Shimshón fue y atrapó trescientos zorros[a], y tomó antorchas y los puso cola con cola, y puso una antorcha entre cada par de colas, en medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «chacales». El hebreo שׁוּעָלִים puede referirse a zorros o caninos semejantes; se mantiene «zorros» como traducción principal por ser el sentido más común y por ajustarse a la narración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - anduvo
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de הלך introduce la secuencia narrativa. En español, «fue» expresa el desplazamiento de manera natural y breve sin añadir matices ajenos.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Shimshon
  chosen_spanish: Shimshón
  alternatives_spanish:
  - Sansón
  lexicon: transliteración del nombre propio
  rationale: Se conserva la forma transliterada, coherente con la política de la POB inglesa de no sustituir el nombre por la forma tradicional anglicanizada.
- source_word: וַיִּלְכֹּד
  english_pob_choice: caught
  chosen_spanish: atrapó
  alternatives_spanish:
  - capturó
  - cogió
  lexicon: HALOT
  rationale: El verbo לכד aquí se refiere a tomar animales vivos en trampa. «Atrapó» comunica bien la acción de capturar sin sugerir violencia innecesaria.
- source_word: שְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientas
  alternatives_spanish:
  - trescientos
  lexicon: número cardinal
  rationale: El numerativo concuerda con el sustantivo femenino implícito en «zorras».
- source_word: שׁוּעָלִים
  english_pob_choice: foxes
  chosen_spanish: zorras
  alternatives_spanish:
  - zorros
  - chacales
  lexicon: HALOT
  rationale: Aunque el inglés POB mantiene «foxes» y nota la posibilidad de «jackals», en español «zorras» es la forma más natural para conservar el sentido más común del término y la imagen narrativa. Se deja la alternativa interpretativa en nota.
- source_word: לַפִּדִים / לַפִּיד
  english_pob_choice: torches
  chosen_spanish: teas
  alternatives_spanish:
  - antorchas
  - hachones
  lexicon: HALOT
  rationale: El objeto es un haz encendido/brandón. «Tetas» no aplica; aquí «teas» se usa como equivalente moderno a «torches» en sentido de teas encendidas. «Antorchas» sería también posible, pero «teas» preserva bien la idea de brandones.
- source_word: וַיֶּפֶן זָנָב אֶל זָנָב
  english_pob_choice: turned them tail to tail
  chosen_spanish: las puso cola con cola
  alternatives_spanish:
  - las volvió cola con cola
  - las orientó cola con cola
  lexicon: HALOT
  rationale: El hebreo dice literalmente «volvió/dispuso cola hacia cola». En español, «las puso cola con cola» es natural y mantiene la disposición de los animales sin añadir la idea de amarrarlas, que el hebreo no explicita.
- source_word: וַיָּשֶׂם לַפִּיד אֶחָד
  english_pob_choice: put one torch
  chosen_spanish: puso una tea
  alternatives_spanish:
  - colocó una tea
  - metió una tea
  lexicon: HALOT
  rationale: שׂים se rinde con el verbo simple «poner». «Puso una tea» es directo y fiel.
- source_word: בֵּין שְׁנֵי הַזְּנָבוֹת
  english_pob_choice: between each pair of tails
  chosen_spanish: entre cada par de colas
  alternatives_spanish:
  - entre las dos colas
  - entre cada una de las colas
  lexicon: HALOT
  rationale: La construcción expresa repetición distributiva. «Entre cada par de colas» comunica mejor que el acto se repite para cada pareja de animales.
- source_word: בַּתָּוֶךְ
  english_pob_choice: in the middle
  chosen_spanish: en medio
  alternatives_spanish:
  - en el centro
  - en medio de ellas
  lexicon: HALOT
  rationale: «En medio» es una equivalencia natural y breve para el adverbio hebreo, manteniendo la colocación final del versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma como guía la solución auditada de la POB inglesa, especialmente en la secuencia narrativa, el valor de שׁוּעָלִים y la expresión distributiva «entre cada par de colas». La única adaptación importante es que en español se usa una formulación más natural para «torches» y para la disposición «tail to tail», sin introducir la idea de atar los animales, que no está en el hebreo.
  spanish_consistency_notes:
  - Se conserva «Shimshón» como transliteración del nombre propio.
  - 'Se mantiene el valor narrativo simple de los verbos hebreos de secuencia: fue, atrapó, tomó, puso.'
  - No se traduce el numeral en forma masculina porque «zorras» exige concordancia femenina.
  - Se preserva la ambigüedad lexicográfica de שׁוּעָלִים mediante nota, sin sustituir la lectura principal en el texto.
  - «En medio» reproduce el cierre locativo del hebreo sin ampliar el sentido.
