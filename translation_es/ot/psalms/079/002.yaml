translation:
  language: es
  text: Han dado los cadáveres de tus siervos como alimento a las aves de los cielos[a], la carne de tus fieles[b] a las bestias de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las aves del cielo' o 'las aves del firmamento'.
    reason: lexical_alternative
  - marker: b
    text: O 'tus santos' o 'tus devotos'. El término hebreo puede referirse a quienes están dedicados a Dios con lealtad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתְנוּ
  english_pob_choice: They have given
  chosen_spanish: Han dado
  alternatives_spanish:
  - Dieron
  - Han puesto
  lexicon: HALOT
  rationale: El perfecto hebreo describe una acción ya consumada con fuerza de lamento; en español, el perfecto compuesto conserva bien esa culminación y suena natural en el tono poético.
- source_word: נִבְלַת
  english_pob_choice: the corpses of
  chosen_spanish: los cadáveres de
  alternatives_spanish:
  - los cuerpos de
  - los restos de
  lexicon: HALOT
  rationale: נִבְלָה designa un cadáver; 'cadáveres' mantiene la crudeza y la indignidad del texto, igual que el inglés POB 'corpses'.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: Aquí el término va dirigido a Dios dentro de un salmo y expresa pertenencia pactal. 'Siervos' evita una dureza innecesaria en español, aunque 'esclavos' sería posible en un valor más literal.
- source_word: מַאֲכָל
  english_pob_choice: as food
  chosen_spanish: como alimento
  alternatives_spanish:
  - como comida
  - para alimento
  lexicon: HALOT
  rationale: La estructura predicativa tras נתן pide un equivalente de 'as food'. 'Como alimento' es claro, sobrio y conserva el valor de entrega para ser devorado.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: to the birds of the heavens
  chosen_spanish: a las aves de los cielos
  alternatives_spanish:
  - a las aves del cielo
  - a las aves del firmamento
  lexicon: HALOT
  rationale: עוֹף es un colectivo de aves; 'aves' es natural en español. 'De los cielos' preserva el plural poético del hebreo y mantiene el paralelismo elevado con la segunda línea.
- source_word: בְּשַׂר
  english_pob_choice: the flesh of
  chosen_spanish: la carne de
  alternatives_spanish:
  - la carne
  - los cuerpos de
  lexicon: HALOT
  rationale: '''Carne'' reproduce el hebreo בשר con su aspereza física y su paralelismo con ''cadáveres''.'
- source_word: חֲסִידֶיךָ
  english_pob_choice: your faithful ones
  chosen_spanish: tus fieles
  alternatives_spanish:
  - tus santos
  - tus piadosos
  lexicon: HALOT
  rationale: חסיד describe a quienes son leales/devotos al pacto. 'Fieles' comunica esa lealtad sin importar la carga eclesiástica posterior de 'santos'.
- source_word: לְחַיְתוֹ אָרֶץ
  english_pob_choice: to the beasts of the earth
  chosen_spanish: a las bestias de la tierra
  alternatives_spanish:
  - a las fieras de la tierra
  - a los animales salvajes de la tierra
  lexicon: HALOT
  rationale: חיה aquí nombra animales salvajes/depredadores. 'Bestias' conserva el registro poético y el paralelismo con 'aves de los cielos'.
theological_decisions:
- issue: Valor de חֲסִידֶיךָ como designación pactal
  english_pob_reading: your faithful ones
  chosen_spanish_reading: tus fieles
  alternative_spanish_readings:
  - tus santos
  - tus devotos
  rationale: El hebreo apunta a los que pertenecen a Dios por lealtad de pacto. 'Fieles' preserva esa tensión sin decidirla hacia una categoría eclesiástica posterior.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readably modern Spanish.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo poético y conserva el paralelismo de dos miembros: cadáveres para las aves y carne para las bestias. Se mantiene la tensión lexical de חסידיך como ''fieles'', en línea con el audit trail inglés.'
  spanish_consistency_notes:
  - Se prefirió 'cadáveres' a 'cuerpos' por la fuerza degradante del contexto.
  - Se mantuvo el plural poético 'cielos' para reflejar el hebreo הַשָּׁמַיִם.
  - '''Siervos'' y ''fieles'' conservan el lenguaje relacional dirigido a Yahvé sin introducir terminología litúrgica no requerida.'
