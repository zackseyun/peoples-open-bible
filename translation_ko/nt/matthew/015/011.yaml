  text: οὐ τὸ εἰσερχόμενον εἰς τὸ στόμα κοινοῖ τὸν ἄνθρωπον, ἀλλὰ τὸ ἐκπορευόμενον ἐκ τοῦ στόματος τοῦτο κοινοῖ τὸν ἄνθρωπον.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/011.yaml
  text: 'It is not what enters into the mouth that defiles the man[b][a], but what comes out of the mouth—this defiles the man.'
translation:
  language: ko
  text: '「입으로 들어가는 것이 사람을 더럽히는 것이 아니라, 입에서 나오는 것 — 이것이 사람을 더럽힌다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사람을 부정하게 만들다」. 헬라어 동사 κοινόω는 정결법상 사람을 부정하게 만든다는 뜻을 가질 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 여기서 「사람」은 대표적 단수로, 일반적 인간을 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: κοινοῖ
  english_pob_choice: defiles
  chosen_korean: 더럽힌다
  alternatives_korean:
  - 부정하게 한다
  lexicon: BDAG
  rationale: κοινόω는 「공통의 것으로 만들다 → 부정하게 하다」. 「더럽히다」가 한국어에서 정결 의식적 의미와 도덕적 의미를 모두 포괄한다.
- source_word: τὸν ἄνθρωπον
  english_pob_choice: the man
  chosen_korean: 사람
  alternatives_korean:
  - 그 사람
  lexicon: BDAG
  rationale: 대표적 단수로 인간 일반을 가리킨다. 정관사를 한국어로 옮기면 부자연스러우므로 단순히 「사람」으로 한다.
