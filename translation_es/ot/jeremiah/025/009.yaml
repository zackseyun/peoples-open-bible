review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: anuncio solemne, convocatoria de los grupos del norte y de Nabucodonosor, ataque contra la tierra, sus habitantes y las naciones circundantes, seguido por la dedicación a destrucción y la descripción de ruina. Sin embargo, hay varios desajustes importantes: (1) שֹׁלֵחַ וְלָקַחְתִּי se ha vertido como «estoy enviando y tomando», pero en contexto significa más bien «estoy enviando a buscar y tomando/reuniendo»; sin ese matiz, el español suena impropio y pierde la idea de convocar. (2) עַבְדִּי aplicado a Nabucodonosor está mejor como «mi siervo» en este contexto, no «mi esclavo»; aunque el proyecto favorece «esclavo» para δοῦλος y a veces para עבד por fuerza léxica, aquí la expresión profética fija en español eclesial se entiende mejor como instrumento al servicio de Dios, y «mi esclavo» suena teológicamente y estilísticamente torpe. (3) La nota [a] está anclada a «Mira», pero su contenido corresponde
    a וְהַחֲרַמְתִּים, no a הִנְנִי; los marcadores están desordenados respecto de la tradición del registro inglés. (4) El punto y coma antes de «y los traeré» corta innecesariamente la secuencia. (5) «Naciones alrededor» es entendible, pero «naciones circundantes» o «naciones de alrededor» refleja mejor סָבִיב en estilo bíblico natural.'
  spanish_quality_summary: 'El español es generalmente claro, pero hay frases poco naturales o poco dignas para el registro buscado: «yo estoy enviando y tomando» suena forzado; «mi esclavo» aplicado a Nabucodonosor choca con la legibilidad eclesial amplia; y la puntuación puede fluir mejor. «Un silbido» funciona, aunque en español bíblico también podría entenderse como reacción de burla; no requiere cambio. «Ruinas perpetuas» es bueno.'
  glossary_alignment: 'Se mantiene correctamente «Yahvé». «Clanes» refleja bien מִשְׁפְּחוֹת. «Los dedicaré a la destrucción» preserva adecuadamente חרם. La principal excepción terminológica es עַבְדִּי: aquí conviene apartarse del valor fuerte por razones contextuales y de legibilidad, usando «mi siervo» y explicando que significa instrumento de Yahvé, no adorador fiel. También conviene ajustar la nota alternativa para חרם al lugar correcto.'
  issues:
  - severity: high
    issue: La nota [a] está anclada al término equivocado.
    rationale: 'En el texto español [a] aparece en «Mira[a]», pero su contenido («O: ‘He aquí’...») sí corresponde a הִנְנִי, mientras la auditoría inglesa reserva la alternativa léxica principal para חרם. Además, la nota sobre «desolación» está mal asociada a «horror» con marcador [c] cuando en el registro inglés la alternativa para «a horror» corresponde a לְשַׁמָּה. Hay que rehacer el sistema de notas para que cada marcador ancle exactamente donde corresponde en español.'
  - severity: medium
    issue: «Estoy enviando y tomando» no expresa bien el matiz de convocatoria/recolección.
    rationale: שֹׁלֵחַ וְלָקַחְתִּי, en este contexto, indica que Yahvé envía a buscar/convoca y reúne a los clanes del norte. La formulación actual suena extraña en español y puede sugerir acciones físicas desconectadas. «Estoy mandando a buscar y reuniendo» o «voy a mandar a buscar y a reunir» comunica mejor el sentido.
  - severity: medium
    issue: «Mi esclavo» para Nabucodonosor suena impropio en este contexto profético.
    rationale: Aunque existe un impulso del proyecto a mantener fuerza léxica, aquí עַבְדִּי es un título funcional de instrumento al servicio del propósito divino. En español bíblico ampliamente legible, «mi siervo» transmite mejor el uso contextual sin implicar piedad personal, especialmente con una nota aclaratoria.
  - severity: low
    issue: «Todas estas naciones alrededor» es algo tosco.
    rationale: La frase es comprensible, pero «todas estas naciones circundantes» o «todas estas naciones de alrededor» suena más natural y más acorde con el tono profético.
  - severity: low
    issue: Puntuación mejorable antes de «y los traeré».
    rationale: El punto y coma no responde a una ruptura fuerte del hebreo y entorpece la continuidad de la acción divina.
  revised_spanish_text: Mira, yo estoy mandando a buscar y reuniendo a todos los clanes del norte, declara Yahvé, y a Nabucodonosor, rey de Babilonia, mi siervo[a], y los traeré contra esta tierra, contra sus habitantes y contra todas estas naciones circundantes. Los dedicaré a la destrucción[b] y los convertiré en un horror[c], en un silbido y en ruinas perpetuas.
  revised_footnotes:
