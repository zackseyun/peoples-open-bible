translation:
  language: es
  text: Y Ismael su hijo tenía trece años cuando la carne de su prepucio fue circuncidada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando fue circuncidado en la carne de su prepucio».'
