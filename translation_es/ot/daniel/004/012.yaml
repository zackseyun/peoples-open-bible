translation:
  language: es
  text: Sin embargo[a], dejen el tocón de sus raíces en la tierra, aun con una banda[b] de hierro y de bronce en la hierba del campo; y que sea empapado por el rocío del cielo, y que su porción sea con las bestias en la hierba de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘No obstante’. La partícula aramea introduce un contraste frente a la orden previa; se escoge ‘Sin embargo’ por su tono formal y natural en español.
    reason: lexical_alternative
  - marker: b
    text: O ‘atadura’. El término arameo puede denotar una sujeción o restricción; ‘banda’ se escoge en el texto principal por sonar natural en la imagen del tocón rodeado de hierro y bronce.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַם
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: La partícula introduce una contraposición formal dentro del decreto. ‘Sin embargo’ conserva ese matiz adversativo con tono elevado y natural en español.
- source_word: עִקַּר שָׁרְשׁוֹהִי
  english_pob_choice: the stump of its roots
  chosen_spanish: el tronco de sus raíces
  alternatives_spanish:
  - el tocón de sus raíces
  - el resto de sus raíces
  lexicon: HALOT
  rationale: La expresión apunta al remanente visible del árbol, unido a su sistema de raíces. ‘Tronco’ aquí funciona como base o tocón del árbol talado; ‘de sus raíces’ conserva la idea del sistema radical que permanece.
- source_word: בְּאַרְעָא
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - en la tierra misma
  lexicon: HALOT
  rationale: El valor locativo es agrícola y concreto. ‘En la tierra’ es natural en español y mantiene la imagen del tocón quedando en el terreno.
- source_word: שְׁבֻקוּ
  english_pob_choice: leave
  chosen_spanish: dejen
  alternatives_spanish:
  - dejen que permanezca
  - dejen quedar
  lexicon: HALOT
  rationale: El imperativo plural requiere una forma directa. ‘Dejen’ reproduce bien la orden y suena fluido en español.
- source_word: וּבֶאֱסוּר דִּי פַרְזֶל וּנְחָשׁ
  english_pob_choice: even with a band of iron and bronze
  chosen_spanish: con un aro de hierro y de bronce
  alternatives_spanish:
  - con un lazo de hierro y de bronce
  - con una ligadura de hierro y de bronce
  lexicon: HALOT
  rationale: אֱסוּר puede denotar atadura, restricción o sujeción. ‘Aro’ preserva la imagen de algo que rodea el tocón de modo natural en español, sin forzar ‘fetter’ ni imponer una lectura demasiado técnica.
- source_word: בְּדִתְאָא דִּי בָרָא
  english_pob_choice: in the grass of the field
  chosen_spanish: en la hierba del campo
  alternatives_spanish:
  - en la hierba del campo abierto
  - en la vegetación del campo
  lexicon: HALOT
  rationale: El hebreo/arameo apunta a vegetación o hierba del ámbito abierto. ‘Hierba del campo’ conserva la repetición imagística y suena clara en español.
- source_word: וּבְטַל שְׁמַיָּא יִצְטַבַּע
  english_pob_choice: let him be drenched with the dew of heaven
  chosen_spanish: y que sea empapado con el rocío del cielo
  alternatives_spanish:
  - y que sea mojado con el rocío del cielo
  - y que quede empapado por el rocío del cielo
  lexicon: HALOT
  rationale: El verbo expresa una acción pasiva/intensiva. ‘Empapado’ transmite mejor la intensidad de ‘drenched’ que un simple ‘mojado’, y ‘rocío del cielo’ conserva la expresión tradicionalmente literal del original.
- source_word: וְעִם חֵיוְתָא חֲלָקֵהּ
  english_pob_choice: let his portion be with the beasts
  chosen_spanish: y que su porción sea con las bestias
  alternatives_spanish:
  - y que su parte sea con las bestias
  - y que su suerte sea con las bestias
  lexicon: HALOT
  rationale: חֲלָק puede significar porción, parte o suerte. ‘Porción’ mantiene el tono formal del decreto y ‘bestias’ conserva el contraste con la degradación del rey.
- source_word: בַּעֲשַׂב אַרְעָא
  english_pob_choice: in the grass of the earth
  chosen_spanish: en la hierba de la tierra
  alternatives_spanish:
  - entre la hierba de la tierra
  - en la vegetación de la tierra
  lexicon: HALOT
  rationale: La frase retoma el ambiente del campo y la humillación entre los animales. ‘Hierba de la tierra’ mantiene el paralelismo con la expresión anterior y la concreción del original.
theological_decisions:
- issue: Cambio del referente de árbol a personaje humano
  english_pob_reading: 'Retain the explicit personal pronoun in English: ''let him be drenched ... let his portion be ...'''
  chosen_spanish_reading: 'Mantener el cambio explícito al referente personal: ‘que sea empapado ... y que su porción sea ...’'
  alternative_spanish_readings:
  - 'Mantener todo en impersonal: ‘que sea empapado ... y que su porción sea ...’'
  - 'Usar el árbol como sujeto continuo: ‘que sea empapado ... y que su porción sea ...’'
  rationale: El arameo pasa del símbolo del árbol al rey simbolizado por él. En español conviene conservar ese desplazamiento sin diluirlo en una descripción puramente botánica, porque es clave para la lógica profética/narrativa del pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se revisó la consistencia con el audit trail inglés: se mantuvo la estructura adversativa, la progresión del árbol al rey, y la imaginería agrícola (‘hierba del campo / hierba de la tierra’) sin añadir explicaciones no sustentadas por el texto fuente. No se adoptó ‘faja/freno’ para אֱסוּר porque el contexto visual favorece una sujeción circular sobre el tocón y el español ‘aro’ comunica esa imagen con claridad.'
  spanish_consistency_notes:
  - Se prefirió ‘hierba’ para ambas ocurrencias de עֲשַׂב/דִתְאָא כדי conservar el paralelismo léxico.
  - Se usó ‘bestias’ en vez de ‘animales’ para reflejar el registro solemne y el contraste con la humillación.
  - Se evitó ‘SEÑOR’ u otras sustituciones teológicas porque el versículo no contiene el nombre divino; ‘cielo’ se mantiene como traducción de שְׁמַיָּא según el uso del pasaje.
  - La puntuación sigue el ritmo imperativo del original con comas y punto y coma para separar las cláusulas consecutivas.
