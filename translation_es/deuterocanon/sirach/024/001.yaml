translation:
  language: es
  text: La Sabiduría se alabará[a], y en medio de su pueblo se gloriará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alabará a sí misma»; literalmente, «alabará su propia alma». El griego ψυχὴν αὐτῆς puede funcionar como un giro reflexivo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «se jactará». El verbo griego también puede expresar exaltación pública o auto-gloria según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡ σοφία
  english_pob_choice: Wisdom
  chosen_spanish: la Sabiduría
  alternatives_spanish:
  - la sabiduría
  lexicon: LSJ
  rationale: Se conserva la personificación del sustantivo griego con mayúscula inicial para reflejar que aquí funciona como figura personal, no solo como cualidad abstracta.
- source_word: αἰνέσει
  english_pob_choice: will praise
  chosen_spanish: se alabará
  alternatives_spanish:
  - se elogiará
  - se ensalzará
  lexicon: LSJ
  rationale: El futuro de αἰνέω admite 'alabar/elogiar'. 'Se alabará' expresa el sentido reflexivo y mantiene el paralelismo con la lectura inglesa de autoalabanza sin volverla extraña en español.
- source_word: ψυχὴν αὐτῆς
  english_pob_choice: herself
  chosen_spanish: a sí misma
  alternatives_spanish:
  - su alma
  - su propia alma
  lexicon: LSJ
  rationale: Aunque ψυχή puede ser 'alma' o 'vida', el contexto permite un reflexivo idiomático. En español, 'a sí misma' comunica mejor la fuerza reflexiva que 'su alma', que introduciría una división poco natural entre la persona y su alma.
- source_word: ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de la
  - entre
  lexicon: LSJ
  rationale: '''En medio de'' preserva la imagen espacial y retórica del griego y suena natural en español.'
- source_word: λαοῦ αὐτῆς
  english_pob_choice: her people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - el pueblo que le pertenece
  lexicon: LSJ
  rationale: λαός se vierte normalmente como 'pueblo'. El posesivo mantiene la referencia a la Sabiduría personificada y su ámbito público.
- source_word: καυχήσεται
  english_pob_choice: she will boast
  chosen_spanish: se gloriará
  alternatives_spanish:
  - se jactará
  - se enorgullecerá
  lexicon: LSJ
  rationale: καυχάομαι puede significar 'gloriarse' o 'boast'. 'Se gloriará' evita la connotación negativa de 'jactarse' y conserva el tono de proclamación pública que admite el griego.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain feminine personal language ('her') and capitalize 'Wisdom'
  chosen_spanish_reading: Mantener la personificación con 'la Sabiduría' y pronombres reflexivos femeninos
  alternative_spanish_readings:
  - sabiduría
  - la sabiduría se alabará
  rationale: El griego presenta a la Sabiduría como figura personal femenina. Traducirla en abstracto debilitaría la tensión literaria y teológica del pasaje; por eso se conserva la mayúscula y el lenguaje personal.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla; primacía de la lengua fuente con español legible.'
translation_notes:
  revision_awareness: 'La redacción sigue el juicio de alta concordancia del texto inglés auditado: se mantiene la personificación de la Sabiduría, el valor reflexivo de ψυχὴν αὐτῆς y el matiz de autogloria pública de καυχήσεται. No se introdujeron cambios textuales respecto del sentido base del griego.'
  spanish_consistency_notes:
  - Se usa 'Sabiduría' con mayúscula para reflejar la personificación consistente en el capítulo.
  - '''Se gloriará'' evita la carga negativa de ''jactarse'' y conserva el campo semántico de καυχάομαι.'
  - '''A sí misma'' traduce el reflexivo sin forzar ''alma'' en español, que sonaría más interpretativo que el griego en este contexto.'
