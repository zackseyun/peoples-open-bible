translation:
  language: es
  text: Pero ustedes, los que se aferran[a] a Yahvé su Dios, todos están vivos hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los que se adhieren a» o «los que se apegan a»; la expresión señala una estrecha adhesión de pacto a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero en cuanto a ustedes
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente introduce contraste con el grupo mencionado antes; en español, «Pero ustedes» conserva mejor la oposición discursiva que un simple «Y ustedes».
- source_word: הַ/דְּבֵקִים
  english_pob_choice: who hold fast
  chosen_spanish: los que se mantienen unidos
  alternatives_spanish:
  - los que se adhieren
  - los que se aferran
  - los que están unidos
  lexicon: HALOT
  rationale: דבק expresa cercanía, adhesión y apego de pacto. «Se mantienen unidos» comunica la idea de adherencia continua sin sonar forzado en español, y preserva el matiz relacional.
- source_word: בַּ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino YHWH; conforme al criterio del proyecto, se traduce «Yahvé» en el texto principal para conservar el nombre de pacto.
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: La construcción posesiva indica que Yahvé es el Dios propio de los destinatarios. En español, «su Dios» es natural y suficiente en este contexto.
- source_word: חַיִּ֥ים
  english_pob_choice: alive
  chosen_spanish: están vivos
  alternatives_spanish:
  - viven
  - están con vida
  lexicon: HALOT
  rationale: Como predicado, «están vivos» reproduce con claridad el estado actual descrito por el hebreo.
- source_word: כֻּלְּ/כֶ֖ם
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ustedes
  - todos por completo
  lexicon: HALOT
  rationale: «Todos» conserva el énfasis totalizador del hebreo sin recargar la frase.
- source_word: הַ/יּֽוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la forma más natural y directa en español para el adverbio temporal.
theological_decisions:
- issue: Renderizado del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  - Jehová
  rationale: El hebreo contiene explícitamente יהוה; siguiendo la norma del proyecto, se preserva el nombre divino como «Yahvé» en lugar de sustituirlo por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido de permanencia/adhesión en דבק
  english_pob_reading: who hold fast
  chosen_spanish_reading: los que se mantienen unidos
  alternative_spanish_readings:
  - los que se aferran a
  - los que se adhieren a
  - los que clavan su apego en
  rationale: El participio describe una relación de lealtad y apego de pacto; «se mantienen unidos» conserva esa cercanía sin convertirla en una imagen extraña o demasiado literal en español.
  doctrine_reference: 'HALOT: דבק, adhesion/attachment in covenantal context'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «held fast» a «hold fast» para reflejar mejor el participio presente; el español también se formuló en presente («se mantienen unidos») para corresponder a ese valor aspectual y a la lectura actual del contexto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología española del proyecto para יהוה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino del texto hebreo.
  - «Están vivos hoy» preserva el estado presente y el adverbio temporal del hebreo.
  - La nota usa una alternativa léxica real sin añadir interpretación doctrinal extra.
