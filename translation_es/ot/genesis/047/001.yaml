translation:
  language: es
  text: 'Entonces José entró y le dijo a Faraón: «Mi padre y mis hermanos, con sus rebaños y sus ganados, y todo lo que tienen, han venido[a] de la tierra de Canaán; y aquí están[b] en la tierra de Gosén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Han venido» refleja el perfecto hebreo como acción ya cumplida con efecto presente. También podría traducirse «vinieron»; ambas opciones son posibles, pero la forma elegida resalta la llegada ya realizada.
    reason: alternative_reading
  - marker: b
    text: O «y he aquí que están en la tierra de Gosén». El hebreo llama la atención a su presencia actual allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue
  - pasó a la presencia de
  lexicon: HALOT
  rationale: En este contexto de corte real, בוא indica el ingreso a la presencia de Faraón. «Entró» es natural en español y conserva la idea de acceder al interior/presencia sin perder la fuerza narrativa.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le dijo
  alternatives_spanish:
  - le informó
  - le declaró
  lexicon: HALOT
  rationale: נגד en hifil puede significar comunicar o relatar. En español, «le dijo» funciona bien con la frase introductoria y evita una redundancia innecesaria, manteniendo el acto de comunicar a Faraón.
- source_word: לְפַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: uso nominal propio
  rationale: Se conserva el título real usual en español bíblico, sin sustituirlo por una glosa explicativa que el contexto no requiere.
- source_word: אָבִי וְאַחַי
  english_pob_choice: My father and my brothers
  chosen_spanish: Mi padre y mis hermanos
  alternatives_spanish:
  - mi padre y mis hermanos varones
  lexicon: HALOT
  rationale: El poseedor está claro por el discurso directo de José. «Hermanos» comunica correctamente el referente masculino plural del hebreo.
- source_word: וְצֹאנָם וּבְקָרָם
  english_pob_choice: with their flocks and their herds
  chosen_spanish: con sus rebaños y sus hatos
  alternatives_spanish:
  - con sus flocks y sus ganados
  - con sus rebaños y sus ganados
  lexicon: HALOT
  rationale: צאן y בקר distinguen ganado menor y ganado mayor. «Rebaños y hatos» preserva la distinción con un español bíblico claro; «hatos» evita reducir ambos términos a un solo genérico.
- source_word: וְכָל אֲשֶׁר לָהֶם
  english_pob_choice: and all that they have
  chosen_spanish: y todo lo que tienen
  alternatives_spanish:
  - y todo lo que les pertenece
  - y todo cuanto poseen
  lexicon: HALOT
  rationale: La frase resume posesiones sin precisar una categoría legal. «Todo lo que tienen» es fiel, fluido y suficientemente amplio.
- source_word: בָּאוּ מֵאֶרֶץ כְּנָעַן
  english_pob_choice: have come from the land of Canaan
  chosen_spanish: han venido de la tierra de Canaán
  alternatives_spanish:
  - vinieron de la tierra de Canaán
  lexicon: HALOT
  rationale: El perfecto hebreo puede leerse como llegada ya completada con relevancia presente. «Han venido» conserva ese matiz de resultado actual mejor que un simple pretérito, siguiendo la nota auditada del inglés POB.
- source_word: וְהִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: y aquí están
  alternatives_spanish:
  - y he aquí que están
  - y he aquí
  lexicon: HALOT
  rationale: הנה con sufijo de tercera persona marca presencia actual y llama la atención sobre su estado localizado. «Y aquí están» reproduce la deixis de modo natural en español; no hace falta un «he aquí» más solemne.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  english_pob_choice: in the land of Goshen
  chosen_spanish: en la tierra de Gosén
  alternatives_spanish:
  - en la tierra de Gosen
  - en Gosén
  lexicon: HALOT
  rationale: El hebreo conserva «tierra», por lo que se mantiene en español. Se usa la forma tradicional «Gosén», más asentada en la lectura bíblica en español.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada del inglés POB que eliminó la puntuación extra después de Pharaoh y simplificó la introducción del discurso. En español se optó por una sola cláusula introductoria natural («entró y le dijo») sin duplicar innecesariamente el verbo introductorio, pero preservando el contenido hebreo completo.
  spanish_consistency_notes:
  - Se conserva el nombre propio José y el título Faraón de manera consistente con el registro bíblico en español.
  - «Tierra de Canaán» y «tierra de Gosén» mantienen la especificación geográfica explícita del hebreo.
  - No se usó «SEÑOR» ni terminología teológica ajena al verso.
  - La deixis de וְהִנָּם se traduce con una expresión adverbial presente («aquí están») para mantener la fuerza visual del texto.
