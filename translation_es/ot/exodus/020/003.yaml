translation:
  language: es
  text: No tendrás[a] otros dioses delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'además de mí' o 'en mi presencia'. El hebreo dice literalmente 'delante de mi rostro'.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  english_pob_choice: no / not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No tendrás
  - No habrá
  lexicon: HALOT
  rationale: La negación introduce una prohibición; en español, la forma natural y fiel es una construcción prohibitiva directa.
- source_word: יִהְיֶה
  english_pob_choice: shall have
  chosen_spanish: tendrás
  alternatives_spanish:
  - habrás
  - habrá
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'ser/estar', la construcción negativa con objeto expresa posesión o existencia para la persona interpelada; 'tendrás' comunica bien la prohibición en español sin perder el valor relacional.
- source_word: לְךָ
  english_pob_choice: you
  chosen_spanish: (implícito en 'tendrás')
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: El dativo de segunda persona singular queda absorbido de manera natural en la forma verbal española, manteniendo el singular del mandato.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - divinidades
  - seres divinos
  lexicon: HALOT
  rationale: Aquí el plural con 'otros' señala deidades rivales; 'dioses' es la equivalencia clara y directa en español.
- source_word: אֲחֵרִים
  english_pob_choice: other
  chosen_spanish: otros
  alternatives_spanish:
  - ajenos
  - extraños
  lexicon: HALOT
  rationale: El adjetivo significa 'otros' o 'distintos'; con el sustantivo plural, 'otros dioses' es la formulación más natural y fiel.
- source_word: עַל פָּנָי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - antes de mí
  - en mi presencia
  - además de mí
  lexicon: HALOT
  rationale: La locución hebrea literalmente alude a 'ante/ sobre mi rostro'. En español, 'delante de mí' mantiene la imagen espacial y la fuerza relacional del mandato; se preserva así la tensión entre presencia y exclusividad sin resolverla mediante una sola paráfrasis.
theological_decisions:
- issue: Sentido de עַל פָּנָי en el primer mandamiento
  english_pob_reading: before me
  chosen_spanish_reading: delante de mí
  alternative_spanish_readings:
  - además de mí
  - en mi presencia
  rationale: El hebreo permite una lectura espacial ('en mi presencia') y, en este contexto del pacto, una lectura de exclusividad ('además de mí'). La traducción mantiene 'delante de mí' para no cerrar prematuramente esa tensión interpretativa.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica cuando el hebreo la permite.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y el control de revisión más reciente: no se requieren cambios respecto del sentido auditado; se conserva la ambigüedad interpretativa de עַל פָּנָי en una nota breve.'
  spanish_consistency_notes:
  - Se usa 'dioses' para אֱלֹהִים en su sentido plural de deidades rivales.
  - Se prefiere 'delante de mí' como equivalente idiomático de עַל פָּנָי, manteniendo la posibilidad de lectura 'además de mí'.
  - La prohibición se expresa con futuro simple en español ('tendrás') para reproducir la fuerza normativa del hebreo sin una calca incómoda.
