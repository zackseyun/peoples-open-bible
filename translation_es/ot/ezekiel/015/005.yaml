review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la imagen y la lógica del hebreo: madera de vid inútil aun intacta, y mucho menos después del fuego. Conserva adecuadamente הִנֵּה, בִּהְיוֹתוֹ תָמִים, אַף כִּי, el consumo por el fuego, y la pregunta retórica final. Sin embargo, hay dos problemas de fidelidad/formulación en español: «para ningún trabajo» después de «puede aún hacerse» produce una construcción antinatural y lógicamente trabada en español, y «está quemado» debilita un poco el matiz de וַיֵּחָר (‘chamuscado/carbonizado’).'
  spanish_quality_summary: El español es generalmente claro, pero necesita pulido para sonar natural y digno. «No se hacía para ningún trabajo» es aceptable aunque algo rígido; la cláusula final «puede aún hacerse para ningún trabajo» resulta poco idiomática. También conviene evitar el signo inicial de exclamación en «¡Cuánto menos» dentro de una pregunta continua; «cuánto menos» o «mucho menos» fluye mejor. «Chamuscado» expresa mejor el estado posterior al fuego que el más genérico «quemado».
  glossary_alignment: No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). Las decisiones léxicas clave están en línea con el expediente inglés, salvo que «quemado» no refleja tan bien como «chamuscado»/«carbonizado» el matiz documentado para וַיֵּחָר.
  issues:
  - severity: medium
    issue: 'Construcción final antinatural: «puede aún hacerse para ningún trabajo»'
    rationale: Aunque intenta seguir de cerca «made for any work», en español después de «puede» la combinación con «ningún» suena forzada. La idea retórica se expresa mejor como «puede todavía hacerse útil para algún trabajo?» o «puede todavía hacerse para trabajo alguno?». La primera es más natural, aunque añade «útil» implícitamente; la segunda es más literal y también idiomática.
  - severity: medium
    issue: «Está quemado» suaviza el matiz de וַיֵּחָר
    rationale: El expediente inglés distingue ‘charred/scorched’ de un simple ‘burned’. En español, «chamuscado» preserva mejor ese estado de daño por fuego sin exagerar tanto como «carbonizado».
  - severity: low
    issue: Puntuación enfática de «¡Cuánto menos» dentro de la pregunta
    rationale: La exclamación inicial no es necesaria y entorpece la sintaxis de la pregunta retórica en español. Una formulación continua mejora la legibilidad.
  revised_spanish_text: Mira[a], cuando estaba íntegro, no se hacía para ningún trabajo. Cuánto menos[b], cuando el fuego lo ha consumido y está chamuscado[c], ¿puede todavía hacerse para trabajo alguno?
  revised_footnotes:
  - marker: a
    text: O «sano» o «intacto» para «íntegro». El hebreo describe la madera antes de ser dañada por el fuego.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cuánto menos», un argumento de lo menor a lo mayor; si era inútil cuando estaba intacta, con más razón después de arder.'
    reason: lexical_alternative
  - marker: c
    text: O «carbonizado» para «chamuscado».
    reason: lexical_alternative
  revision_rationale: Se ajustó la cláusula final a un español natural sin perder la pregunta retórica ni el sentido de inutilidad para trabajo alguno; se cambió «quemado» por «chamuscado» para reflejar mejor el matiz de וַיֵּחָר documentado en el expediente; y se suavizó la puntuación para una lectura más fluida en español.
