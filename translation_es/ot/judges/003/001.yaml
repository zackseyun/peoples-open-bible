translation:
  language: es
  text: 'Ahora bien, estas son las naciones que Yahvé dejó para probar[a] a Israel por medio de ellas, es decir, todos los que no habían conocido[b] ninguna de las guerras de Canaán:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «para poner a prueba a Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no habían experimentado»; el verbo hebreo puede referirse a conocimiento vivido o experimentado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: La partícula introductoria marca continuidad narrativa y a la vez apertura de una nueva sección. «Ahora bien» conserva ese valor discursivo sin sonar mecánico.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: En Jueces se refiere a grupos étnico-políticos vecinos; «naciones» es claro y fiel al uso contextual.
- source_word: הִנִּיחַ
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - permitió que quedaran
  - dejó permanecer
  lexicon: HALOT
  rationale: El causativo de נוח/הניח expresa dejar o permitir que permanezcan. «Dejó» es breve y natural; el matiz de permanencia queda implícito en el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración auditable. El proyecto pide «Yahvé» como forma principal en español, evitando la sustitución por un título.
- source_word: לְ/נַסּ֥וֹת
  english_pob_choice: to test
  chosen_spanish: para probar
  alternatives_spanish:
  - para probarlos
  - para poner a prueba
  lexicon: HALOT
  rationale: נסה puede expresar probar o poner a prueba. En español, «probar» reproduce bien el sentido sin cargarlo indebidamente con la idea de tentación.
- source_word: בָּ֖/ם
  english_pob_choice: by them
  chosen_spanish: por medio de ellas
  alternatives_spanish:
  - por ellas
  - a través de ellas
  lexicon: HALOT
  rationale: El sufijo pronominal indica el medio instrumental. En español, «por medio de ellas» explicita ese valor sin perder naturalidad.
- source_word: אֵ֚ת כָּל אֲשֶׁ֣ר לֹֽא יָדְע֔וּ
  english_pob_choice: all who had not known
  chosen_spanish: a todos los que no habían conocido
  alternatives_spanish:
  - a todos los que no habían experimentado
  - a todos los que no conocían
  lexicon: HALOT
  rationale: ידע aquí tiene fuerza experiencial, no mera información. El pluscuamperfecto español mantiene el valor anterior al propósito divino del versículo.
- source_word: אֵ֖ת כָּל מִלְחֲמ֥וֹת כְּנָֽעַן
  english_pob_choice: any of the wars of Canaan
  chosen_spanish: ninguna de las guerras de Canaán
  alternatives_spanish:
  - ninguna de las batallas de Canaán
  - las guerras de Canaán
  lexicon: HALOT
  rationale: Bajo la negación, el sentido es que no habían conocido ninguna de esas guerras. «Guerras de Canaán» conserva el genitivo y el vínculo con la conquista.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La forma principal del proyecto en español es «Yahvé», preservando el nombre propio del pacto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Finalidad divina de probar a Israel
  english_pob_reading: to test Israel by them
  chosen_spanish_reading: para probar a Israel por medio de ellas
  alternative_spanish_readings:
  - para poner a prueba a Israel por medio de ellas
  - para probar a Israel mediante ellas
  rationale: 'La redacción conserva la afirmación teológica sin suavizarla: Yahvé dejó esas naciones con propósito probatorio. No se resuelve la tensión ni se moraliza el texto.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés más reciente ajustó la puntuación para hacer más fluida la frase y aclaró «that is, all who had not known...»; la versión española refleja esa misma estructura explicativa con «es decir» y mantiene el alcance negativo de «ninguna de las guerras de Canaán».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma principal del nombre divino, consistente con el proyecto en español.
  - Se conserva «probar» para נסה, con nota alternativa por la posible lectura «poner a prueba».
  - «Por medio de ellas» traduce el valor instrumental de בָּם de manera transparente y natural.
  - «No habían conocido» mantiene el matiz experiencial del hebreo ידע, sin sustituirlo por una paráfrasis más amplia.
