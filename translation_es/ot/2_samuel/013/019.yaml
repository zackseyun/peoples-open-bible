  - severity: high
    issue: Desalineación con la revisión auditada para כְתֹנֶת הַפַּסִּים
    rationale: Aunque la expresión es incierta, el English POB revisado adoptó en el texto principal 'robe of many colors' y reservó las otras posibilidades para nota. El borrador español conserva una opción anterior ('túnica de mangas largas') y por eso no sigue la base auditada actual.
  - severity: low
    issue: Número de אֵפֶר en español
    rationale: El singular hebreo puede verterse de varias maneras, pero en español el gesto idiomático se expresa mejor con 'cenizas' en plural. Esto mejora naturalidad sin perder fidelidad, y la alternativa singular puede mantenerse en nota.
