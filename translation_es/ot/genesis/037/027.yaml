review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: exhortación cohortativa, venta a los ismaelitas, preservación del modismo de la mano, razón causal por el parentesco y cierre narrativo con שמע preservado de forma relativamente abierta. Sin embargo, omite dos notas del rastro POB en inglés: la nota sobre el modismo «nuestra mano sobre él» y la alternativa para «nuestra propia carne».'
  spanish_quality_summary: El español es claro y digno, pero «Venid» suena más peninsular/litúrgico que neutral latinoamericano. «Y sus hermanos lo escucharon» introduce un objeto directo explícito ausente en el español base y suena un poco menos natural que «escucharon» o mejor «escucharon a Judá»; además, para conservar la apertura semántica del inglés POB conviene una nota. La frase central funciona, aunque «no esté nuestra mano sobre él» es comprensible pero algo rígida.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Se preserva correctamente «ismaelitas», «hermano» y «carne». La decisión de mantener la imagen de la «mano» es consistente con la filosofía POB. No hay asuntos de Yahvé/Mesías/etc. en este versículo.
  issues:
  - severity: medium
    issue: Faltan dos notas relevantes preservadas por la POB inglesa
    rationale: El inglés conserva una nota para el modismo «let not our hand be upon him» y otra para la alternativa «our own kin» de «our own flesh». El borrador español solo retiene la nota sobre «escucharon». Según las instrucciones, deben preservarse alternativas significativas en notas cuando la POB inglesa las preservó.
  - severity: low
    issue: «Venid» no es la opción más neutral para español latinoamericano amplio
    rationale: Aunque fiel, «Venid» tiene sabor peninsular. «Vamos» comunica bien el imperativo deliberativo plural en español neutral y suena más natural en registro narrativo bíblico contemporáneo.
  - severity: low
    issue: «lo escucharon» es menos natural y ligeramente más interpretativo que «escucharon» con nota
    rationale: El hebreo dice simplemente «sus hermanos escucharon». Añadir «lo» puede sugerir con más fuerza que escucharon a Judá específicamente. «Y sus hermanos escucharon[c]» conserva mejor el enlace léxico con שמע y la ambigüedad contextual.
  revised_spanish_text: «Vamos, vendámoslo a los ismaelitas, y no esté nuestra mano sobre él[a], porque es nuestro hermano, nuestra propia carne[b]». Y sus hermanos escucharon[c].
