- from: Porque es un tesoro que no se agota para los hombres[a]; los que se han valido de ella obtuvieron amistad con Dios[b], habiendo sido aprobados mediante los dones que provienen de la instrucción[c].
  to: Porque es un tesoro que no se agota para los hombres[a]; los que se han valido de ella obtuvieron amistad con Dios[b], habiendo sido recomendados mediante los dones que provienen de la instrucción[c].
  rationale: 'Se revisa únicamente συσταθέντες: «recomendados» sigue mejor la decisión auditada del inglés («commended») y conserva el matiz de acreditación o presentación favorable ante Dios por medio de los dones que proceden de la instrucción. El resto del verso puede mantenerse tal como está, por ser fiel, claro y natural en español.'
