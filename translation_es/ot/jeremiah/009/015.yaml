translation:
  language: es
  text: Y los dispersaré entre las naciones que ni ellos ni sus padres conocieron[a], y enviaré tras ellos la espada[b] hasta consumirlos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus antepasados». El hebreo dice «sus padres».
    reason: lexical_alternative
  - marker: b
    text: «La espada» es una imagen bíblica común de guerra o juicio mortal.
    reason: cultural_note
  - marker: c
    text: O «hasta acabar con ellos» o «hasta destruirlos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִֽצוֹתִי/ם
  english_pob_choice: And I will scatter them
  chosen_spanish: los dispersaré
  alternatives_spanish:
  - los esparciré
  - los desparramaré
  - los dispersaré
  lexicon: HALOT
  rationale: פוץ/הפיץ en causativo expresa dispersar o esparcir; «dispersar» es natural en español bíblico contemporáneo y conserva la fuerza de juicio sin suavizarla.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones
  - entre las gentiles
  lexicon: HALOT
  rationale: גוֹיִם refiere a naciones/pueblos; «entre las naciones» reproduce con fidelidad la preposición y evita importar una oposición teológica posterior como «gentiles».
- source_word: אֲשֶׁר לֹא יָדְעוּ
  english_pob_choice: that ... have known
  chosen_spanish: que ni ellos ni sus padres conocieron
  alternatives_spanish:
  - que no conocieron
  - que ni ellos ni sus antepasados conocieron
  - que no llegaron a conocer
  lexicon: HALOT
  rationale: יָדַע aquí tiene sentido de conocer por experiencia o familiaridad. Se mantiene el pretérito en español para reflejar el perfecto contextual del inglés y del hebreo, sin volverlo abstracto.
- source_word: הֵמָּה וַאֲבוֹתָם
  english_pob_choice: neither they nor their fathers
  chosen_spanish: ni ellos ni sus padres
  alternatives_spanish:
  - ni ellos ni sus antepasados
  - ellos y sus padres
  - ni ellos ni sus padres
  lexicon: HALOT
  rationale: La coordinación negativa del hebreo se vierte de modo idiomático con «ni ... ni ...». Se conserva «padres» porque el hebreo es masculino y porque mantiene la resonancia histórica/covenantal del texto.
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: and I will send
  chosen_spanish: y enviaré
  alternatives_spanish:
  - y mandaré
  - y despacharé
  - y enviaré
  lexicon: HALOT
  rationale: שׁלח significa enviar; «enviaré» es la equivalencia más directa y clara en español, sin añadir intensidad interpretativa no explicitada por el hebreo.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - detrás de ellos
  - tras ellos
  - en pos de ellos
  lexicon: HALOT
  rationale: La preposición «tras» conserva la imagen espacial del hebreo («después/detrás de») y funciona naturalmente con el sustantivo «espada» como agente de persecución.
- source_word: אֶת הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada
  - la guerra
  - el filo
  lexicon: HALOT
  rationale: חֶרֶב es literalmente «espada» y funciona aquí como imagen metonímica de guerra o juicio violento; se conserva la imagen concreta en el texto principal.
- source_word: עַד כַּלּוֹתִי אוֹתָם
  english_pob_choice: until I have consumed them
  chosen_spanish: hasta acabar con ellos
  alternatives_spanish:
  - hasta consumirlos
  - hasta destruirlos
  - hasta hacerlos desaparecer
  lexicon: HALOT
  rationale: כלה en esta construcción expresa llevar a término o acabar con algo. «Acabar con ellos» comunica el resultado de destrucción/fin sin forzar un matiz de consumo literal en español.
theological_decisions:
- issue: Metáfora de «la espada» como instrumento de juicio
  english_pob_reading: The sword is a common biblical image for warfare or deadly judgment.
  chosen_spanish_reading: la espada
  alternative_spanish_readings:
  - la guerra
  - el juicio mortal
  - la violencia
  rationale: Se preserva la imagen concreta, dejando que el lector perciba la fuerza profética del símbolo sin explicitarlo en el cuerpo del verso. La nota aclara su valor metonímico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Alcance de «sus padres»
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus mayores
  rationale: Se mantiene el término masculino del hebreo. Aunque «antepasados» es posible para claridad, «padres» preserva mejor la forma fuente y la resonancia histórica del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Finalidad de כַּלּוֹתִי אוֹתָם
  english_pob_reading: until I have consumed them
  chosen_spanish_reading: hasta acabar con ellos
  alternative_spanish_readings:
  - hasta destruirlos
  - hasta consumirlos
  rationale: «Acabar con ellos» equilibra fidelidad y legibilidad. Conserva la idea de consumación/terminación judicial sin introducir una imagen más corporal que la que exige el español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del POB en inglés, incluyendo la adición de «the» antes de «nations» y la conservación de la lectura idiomática de «the sword». La redacción española refleja esa versión estable y mantiene las notas alternativas donde el hebreo admite opciones léxicas reales.
  spanish_consistency_notes:
  - Se mantuvo «naciones» en plural para concordar con גּוֹיִם y con el uso profético habitual.
  - Se preservó la coordinación negativa «ni ellos ni sus padres» para reproducir con claridad el alcance de לֹא.
  - Se evitó «gentiles», «Señor» o formulaciones interpretativas no requeridas por el hebreo.
  - La construcción final «hasta acabar con ellos» conserva el tono de juicio total sin añadir glosa al texto principal.
