review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: un pueblo extranjero consumirá el fruto de la tierra y el producto del trabajo, y el destinatario quedará oprimido y quebrantado continuamente. Sin embargo, hay dos ajustes importantes para alinear mejor con la fuente y con el rastro POB: (1) כָּל הַיָּמִים se refleja mejor como ''todos tus días'' que como ''todos los días'', porque el hebreo conserva la apelación personal; (2) el inglés POB preserva dos alternativas léxicas distintas, una para ''fruit'' y otra para ''your labor'', mientras que el borrador español solo conserva una nota para יְגִיעֲךָ y omite la alternativa de פְּרִי.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico natural. 'El fruto de tu tierra y todo tu trabajo se lo comerá un pueblo...' fluye bien. Aun así, 'todos tus días' suena más fiel y también natural en registro bíblico. La frase 'que no has conocido' es aceptable; 'a quien no has conocido' sería más explícito, pero no es necesario exigirlo. El clítico en 'se lo comerá' funciona bien en español.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las elecciones 'fruto', 'tierra', 'trabajo', 'oprimi­do' y 'aplastado' son generalmente compatibles con el análisis léxico, aunque conviene añadir la nota alternativa para 'fruto' y mantener el matiz personal de 'todos tus días'.
  issues:
  - severity: medium
    issue: La frase final 'todos los días' no preserva plenamente el matiz de כָּל הַיָּמִים.
    rationale: 'El hebreo, y también el inglés POB, expresan una duración personalizada: ''all your days''. ''Todos los días'' puede sonar más adverbial o genérico; ''todos tus días'' conserva mejor la segunda persona y el efecto del original.'
  - severity: medium
    issue: Falta una nota léxica para פְּרִי ('fruto' / 'producción de tu tierra').
    rationale: El POB inglés documenta una alternativa explícita para 'fruit' ('produce'). La revisión española debe preservar esa alternativa cuando es natural en español, especialmente porque 'fruto' puede leerse de manera más estrecha que 'producción'.
  - severity: low
    issue: El borrador solo usa una nota para 'trabajo' y no refleja la doble estructura de notas del audit trail inglés.
    rationale: No es obligatorio copiar el orden exacto de las marcas inglesas, pero sí conviene conservar las alternativas significativas de la auditoría en notas españolas distintas y ancladas correctamente.
  revised_spanish_text: El fruto[a] de tu tierra y todo tu trabajo[b] se lo comerá un pueblo que no has conocido; y serás solamente oprimido y aplastado todos tus días.
  revised_footnotes:
  - marker: a
    text: O ‘la producción de tu tierra’.
    reason: lexical_alternative
  - marker: b
    text: O ‘tu esfuerzo’.
    reason: lexical_alternative
