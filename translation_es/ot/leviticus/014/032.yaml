base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/032.yaml
  text: This is the law for him in whom there is an infection of skin disease[b][a], whose means cannot afford what is required for his cleansing.
  footnotes:
  - marker: a
    text: Hebrew צָרָעַת traditionally rendered 'leprosy,' but in Leviticus it refers more broadly to a range of serious skin conditions and related ritual impurity.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose hand does not reach in his cleansing,' an idiom meaning he lacks sufficient means for the purification offering.
    reason: lexical_alternative
