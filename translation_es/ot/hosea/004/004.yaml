  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: prohibición doble seguida de razón explicativa y símil final sobre contender con un sacerdote. Sin embargo, la colocación de las notas [a] y [b] no corresponde bien a las decisiones léxicas auditadas: [a] debe anclar en «contienda»/«contender», mientras que [b] en el verbo de reprensión. Además, la nota [a] contiene anglicismos (‘dispute’) impropios del español.'
