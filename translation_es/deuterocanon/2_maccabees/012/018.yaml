  glossary_alignment: No hay términos teológicos sensibles en este versículo. 'Guarnición' para φρουράν está bien alineado. Conviene ajustar κατέλαβον a 'no lograron atrapar' o similar, ἐκλελυκότα a 'se había retirado', y ἐν τινι τόπῳ a 'en cierto lugar' para reflejar mejor el griego y la documentación léxica.
