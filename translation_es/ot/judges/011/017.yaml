translation:
  language: es
  text: 'Entonces Israel envió mensajeros al rey de Edom, diciendo: «Por favor, permítenos pasar por tu tierra»[a]; pero el rey de Edom no escuchó. Y también envió mensajeros al rey de Moab, pero este no quiso[b], y Israel se quedó en Cades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa una forma singular de primera persona («déjame pasar»), pero Israel habla aquí como entidad corporativa; por eso se traduce en plural («permítenos pasar»).
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «no accedió» o «se negó»; aquí se conserva el matiz de voluntad o consentimiento que expresa אָבָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo hebreo שׁלח en narrativa se traduce de manera directa y natural con «envió», manteniendo el movimiento diplomático sin añadir matices no presentes en el texto.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  lexicon: HALOT
  rationale: El contexto es diplomático humano; «mensajeros» conserva el sentido básico y evita confundirlo con «ángeles».
- source_word: מֶלֶךְ אֱדוֹם
  english_pob_choice: the king of Edom
  chosen_spanish: el rey de Edom
  alternatives_spanish:
  - el rey edomita
  lexicon: HALOT
  rationale: La construcción posesiva se conserva con claridad en español mediante «el rey de Edom».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Introduce el discurso directo de forma idiomática en español.
- source_word: אֶעְבְּרָה נָּא
  english_pob_choice: Please let us pass
  chosen_spanish: permítenos pasar
  alternatives_spanish:
  - déjanos pasar, por favor
  - te rogamos que nos dejes pasar
  lexicon: HALOT
  rationale: El cohortativo singular hebreo funciona aquí con Israel como sujeto corporativo; por eso se conserva el plural de la petición. «Por favor» expresa el matiz de cortesía de נָא sin sobrecargar la frase.
- source_word: בְאַרְצֶךָ
  english_pob_choice: through your land
  chosen_spanish: por tu tierra
  alternatives_spanish:
  - a través de tu tierra
  - por tu país
  lexicon: HALOT
  rationale: Con עבר en contexto de tránsito, «por tu tierra» comunica paso a través de territorio sin sonar forzado.
- source_word: וְלֹא שָׁמַע
  english_pob_choice: did not listen
  chosen_spanish: no escuchó
  alternatives_spanish:
  - no hizo caso
  - no obedeció
  lexicon: HALOT
  rationale: שׁמע aquí implica no prestar oído favorablemente a la petición; «no escuchó» conserva el valor básico sin añadir explícitamente desobediencia.
- source_word: וְגַם
  english_pob_choice: He also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Asimismo
  lexicon: HALOT
  rationale: Se mantiene la continuidad del sujeto y la adición del segundo intento diplomático, reproduciendo la fuerza conectiva del hebreo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: HALOT
  rationale: Se conserva la misma base verbal que en la primera cláusula para reflejar la repetición del acto diplomático.
- source_word: וְלֹא אָבָה
  english_pob_choice: he was unwilling
  chosen_spanish: no quiso
  alternatives_spanish:
  - no accedió
  - se negó
  lexicon: HALOT
  rationale: אָבָה expresa falta de voluntad o consentimiento; «no quiso» es una equivalencia breve y natural en español, sin endurecerlo más allá del hebreo.
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - habitó
  - residió
  lexicon: HALOT
  rationale: En este relato de desplazamiento, «se quedó» expresa la permanencia temporal en un lugar sin implicar asentamiento definitivo.
- source_word: בְּקָדֵשׁ
  english_pob_choice: at Kadesh
  chosen_spanish: en Cades
  alternatives_spanish:
  - en Kadesh
  lexicon: HALOT
  rationale: Se adapta el topónimo al uso castellano tradicional como «Cades», manteniendo la referencia geográfica del texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el recorrido editorial inglés: conserva la petición de tránsito con sujeto corporativo, mantiene la repetición del envío a Edom y Moab, y refleja la oposición de ambos reyes sin intensificarla. Se adapta el topónimo final a la forma española más usual, Cades.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «mensajeros» para מַלְאָכִים en su sentido diplomático, evitando «ángeles» por ser ambiguo y ajeno al contexto.
  - Se preservó la distinción entre «no escuchó» y «no quiso» para reflejar los dos verbos hebreos distintos.
  - Se tradujo el sujeto corporativo de Israel en plural dentro del discurso directo, como exige el sentido del hebreo y confirma el auditorio inglés.
