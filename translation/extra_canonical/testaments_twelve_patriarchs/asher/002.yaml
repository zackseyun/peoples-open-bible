  text: II. *Ἔστιν οὖν¹ ἡ² ψυχὴ *ἐν λόγοις †ἀφιστῶσα³ τὸ καλὸν ὑπὲρ *τοῦ κακοῦ⁴, καὶ *τὸ τέλος⁵ *τοῦ πράγματος⁶ εἰς κακίαν †ἄγων⁷. 2. Ἔστιν⁸ ἄνθρωπος ὃς⁹ οὐκ οἰκτείρει¹⁰ *λειτουργοὺς αὐτοῦ¹¹. καίγε τοῦτο διπρόσωπον¹², ἀλλὰ τὸ ὅλον πονηρόν ἐστιν. 3. Ἔστιν ἄνθρωπος ἀγαπῶν πονηρευόμενον †ὃ ἐστι πονηρία†¹³, ὅτι καὶ ἀποθανεῖν αἱρεῖται ἐν κακῷ· καὶ περὶ τούτου φανερόν ἐστι †τὸ ὅλον†¹⁴ διπρόσωπόν ἐστι τὸ δὲ πᾶν κακὴ πρᾶξις. 4. †Καίγε ἀγάπη οὖσα, ἐν πονηρίᾳ ἐστὶν ὁ συγκρύπτων²⁰ τὸ κακὸν ὑπὲρ τὸ ὄνομα τὸ καλόν·† τὸ δὲ τέλος τῆς πράξεως ἔρχεται εἰς κακόν. 5. Ἄλλος²⁷ κλέπτει, ἀδικεῖ²⁸, ἁρπάζει, πλεονεκτεῖ²⁸, καὶ ἐλεεῖ²⁹ πτωχούς· διπρόσωπον μὲν ⌈καὶ⌉³⁰ τοῦτο, *τὸ δὲ ὅλον³¹ πονηρόν³² ἐστιν. 6. *Ὁ πλεονεκτῶν³³ τὸν³⁴ πλησίον²⁸ πτωχούς, παροργίζει τὸν Θεόν, καὶ³⁵ τὸν ὕψιστον³⁶ ἐπιορκεῖ καὶ τὸν πτωχὸν³⁷ ἐλεεῖ³⁸. τὸν ἐντολέα³⁹ *τοῦ νόμου⁴⁰ Κύριον⁴¹ ἀθετεῖ⁴² καὶ παροξύνει, καὶ τὸν πένητα ἀναπαύει. 7. ⌈Τὴν⁴³ ψυχὴν σπιλοῖ, καὶ⌉ τὸ σῶμα λαμπρύνει⁴⁴, πολλοὺς ἀναιρεῖ καὶ ὀλίγους ἐλεεῖ, καὶ τοῦτο⁴⁵ διπρόσωπόν⁴⁶ ἐστι, *τὸ δὲ ὅλον πονηρόν ἐστιν⁴⁷. 8. Ἄλλος⁴⁸ μοιχεύει *καὶ πορνεύει⁴⁹ καὶ ἀπέχεται ἐδεσμάτων⁵⁰. καὶ⁵¹ νηστεύων κακοποιεῖ, καὶ τῇ³⁵ δυναστείᾳ *τοῦ πλούτου⁵² πολλοὺς κατασύρει⁵³, καὶ ἐκ⁵⁴ τῆς ὑπερόγκου⁵⁵ κακίας ποιεῖ⁵⁶ ⌈τὰς⌉⁵⁷ ἐντολάς⁵⁸. τοῦτο διπρόσωπόν ἐστιν⁵⁹, *τὸ δὲ ὅλον⁶⁰ κακόν ἐστιν. 9. Οἱ τοιοῦτοί εἰσι⁶¹ δασύποδες, ὅτι⁶² ἐξ ἡμισείας εἰσὶ καθαροί, τὸ δ᾽ ἀληθὲς⁶³ ἀκάθαρτοί εἰσι. 10. *Καὶ γὰρ⁶⁴ ὁ Θεὸς ἐν ταῖς πλαξὶ⁶⁵ τῶν ἐντολῶν⁶⁶ οὕτως εἶπεν.
