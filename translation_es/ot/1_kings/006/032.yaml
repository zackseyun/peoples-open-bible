translation:
  language: es
  text: Además, las dos puertas eran de madera de olivo, y las talló con grabados de querubines, palmeras y flores abiertas[a], y las revistió de oro; y extendió el oro sobre los querubines y sobre las palmeras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tallas de querubines, palmeras y flores en flor».'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo al final dice literalmente «hizo descender» o «extendió hacia abajo», describiendo la aplicación del oro sobre las figuras talladas.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּלְתוֹת עֲצֵי שֶׁמֶן
  english_pob_choice: doors were of olivewood
  chosen_spanish: las dos puertas eran de madera de olivo
  alternatives_spanish:
  - las dos puertas eran de olivo
  - las dos hojas de puerta eran de madera de olivo
  lexicon: HALOT
  rationale: דַּלְתוֹת designa puertas o hojas de puerta; en este contexto arquitectónico, «puertas» es natural y fiel. עֲצֵי שֶׁמֶן es literalmente madera de olivo, por lo que «madera de olivo» preserva el material sin calco forzado.
- source_word: וּשְׁתֵּי
  english_pob_choice: Also, the two
  chosen_spanish: Además, las dos
  alternatives_spanish:
  - Y las dos
  - También las dos
  lexicon: HALOT
  rationale: El valor conjuntivo enlaza con la descripción previa; «Además» transmite bien la función aditiva y suena natural al inicio de la frase.
- source_word: וְקָלַע
  english_pob_choice: he carved
  chosen_spanish: las talló
  alternatives_spanish:
  - las grabó
  - las esculpió
  lexicon: HALOT
  rationale: En ornamento de madera, el verbo indica trabajo de tallado/inscripción. «Talló» conserva la concreción manual mejor que una paráfrasis abstracta.
- source_word: מִקְלְעוֹת
  english_pob_choice: engravings of
  chosen_spanish: con grabados de
  alternatives_spanish:
  - con tallas de
  - con diseños tallados de
  lexicon: HALOT
  rationale: El sustantivo refiere a ornamentación tallada o grabada. «Grabados» permite una equivalencia clara y se ajusta al registro arquitectónico.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  - querubes
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional bíblica en español como término técnico, sin reducirlo a «ángeles» ni a un diminutivo no equivalente.
- source_word: תִמֹרוֹת
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - palmas
  - árboles de palma
  lexicon: HALOT
  rationale: La referencia es a motivos de palmera en la decoración del templo. «Palmeras» es idiomático y visualmente claro en español.
- source_word: פְּטוּרֵי צִצִּים
  english_pob_choice: open flowers
  chosen_spanish: flores abiertas
  alternatives_spanish:
  - flores abiertas
  - flores de brote
  - flores en flor
  lexicon: HALOT
  rationale: La expresión describe ornamentos florales, probablemente abiertos o desplegados. «Flores abiertas» mantiene la imagen sin añadir precisión botánica no segura.
- source_word: וְצִפָּה זָהָב
  english_pob_choice: overlaid them with gold
  chosen_spanish: y las revistió de oro
  alternatives_spanish:
  - y las cubrió de oro
  - y las chapó con oro
  lexicon: HALOT
  rationale: צפה en este contexto es cubrir/recubrir con metal. «Revistió de oro» es natural en español y conserva la idea de aplicar oro sobre la madera.
- source_word: וַיָּרֶד ... אֶת־הַזָּהָב
  english_pob_choice: he spread the gold over
  chosen_spanish: extendió el oro sobre
  alternatives_spanish:
  - dejó caer el oro sobre
  - aplicó el oro sobre
  lexicon: HALOT
  rationale: El hebreo usa un verbo literalmente ‘bajar/descender’, pero en este contexto describe la aplicación del oro. «Extendió» preserva la imagen de aplicación superficial sin volverla opaca en español.
- source_word: עַל הַכְּרוּבִים וְעַל הַתִּמֹרוֹת
  english_pob_choice: over the cherubim and over the palm trees
  chosen_spanish: sobre los querubines y sobre las palmeras
  alternatives_spanish:
  - encima de los querubines y de las palmeras
  - sobre los querubines y las palmeras
  lexicon: HALOT
  rationale: Se reproduce la repetición de עַל para conservar el énfasis del hebreo y la distribución del recubrimiento de oro sobre los motivos esculpidos.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. También se mantuvo la distinción entre el recubrimiento general con oro y la aplicación específica sobre los querubines y las palmeras, conforme al hebreo y al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto cuando corresponda, aunque este versículo no la contiene.
  - Se preservó «querubines» como término técnico estable y «palmeras» para el motivo decorativo.
  - Se evitó «SEÑOR» y otros sustitutos no presentes en el texto base.
  - La puntuación refleja una única oración coordinada, en paralelo con el hebreo y la solución inglesa auditada.
