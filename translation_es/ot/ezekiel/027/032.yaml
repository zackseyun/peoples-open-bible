translation:
  language: es
  text: 'Levantarán sobre ti una lamentación en su lamento[b], y lamentarán por ti: «¿Quién como Tiro, silenciada[a] en medio del mar?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puesta en silencio». El término hebreo puede significar estar quieta, silenciada o arruinada.
    reason: lexical_alternative
  - marker: b
    text: La expresión traducida «en su lamento» es difícil en el texto hebreo; algunos la entienden de otro modo, incluso con una referencia a «sus hijos». El contexto de duelo favorece el sentido de un clamor de lamentación.
    reason: textual_variant
lexical_decisions:
- source_word: וְנָשְׂאוּ
  english_pob_choice: they will raise
  chosen_spanish: Harán una lamentación
  alternatives_spanish:
  - Levantarán una lamentación
  - Tomarán una lamentación
  lexicon: HALOT
  rationale: Con קינה, נשא funciona como modismo para iniciar o entonar un lamento. En español, «harán una lamentación» conserva el valor idiomático y el tono fúnebre sin sonar demasiado literal.
- source_word: אֵלַיִךְ
  english_pob_choice: over you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - acerca de ti
  lexicon: HALOT
  rationale: En el contexto de duelo y denuncia, על/אל dirigido a la ciudad se expresa naturalmente como «sobre ti» en español, manteniendo la orientación del lamento hacia Tiro.
- source_word: בְּנִיהֶם
  english_pob_choice: in their wailing
  chosen_spanish: en su lamento
  alternatives_spanish:
  - con sus hijos
  - en su clamor
  lexicon: HALOT
  rationale: La forma consonántica es difícil; el contexto inmediato de קינה y וְקוֹנְנוּ favorece una referencia al acto de lamentar, no a «hijos» literales. «En su lamento» preserva la lectura adoptada por la POB inglesa y deja la tensión textual implícita.
- source_word: קִינָה
  english_pob_choice: a lamentation
  chosen_spanish: una lamentación
  alternatives_spanish:
  - un lamento
  - una endecha
  lexicon: HALOT
  rationale: «Lamentación» reproduce el género formal de canto fúnebre o elegía y mantiene la elevación del término hebreo.
- source_word: וְקוֹנְנוּ
  english_pob_choice: and they will lament
  chosen_spanish: y te lamentarán
  alternatives_spanish:
  - y harán duelo por ti
  - y entonarán una endecha por ti
  lexicon: HALOT
  rationale: El verbo קונן expresa la acción de entonar un lamento. «Te lamentarán» conserva el vínculo léxico con קינה y suena natural en español bíblico contemporáneo.
- source_word: עָלַיִךְ
  english_pob_choice: over you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - por ti
  - acerca de ti
  lexicon: HALOT
  rationale: En lenguaje de duelo, על introduce el referente del lamento; «sobre ti» conserva la imagen relacional del original.
- source_word: מִי כְצוֹר
  english_pob_choice: Who is like Tyre
  chosen_spanish: ¿Quién como Tiro
  alternatives_spanish:
  - ¿Quién es como Tiro?
  - ¿Quién se compara con Tiro?
  lexicon: HALOT
  rationale: La fórmula comparativa se traduce de modo conciso y solemne. Se usa «Tiro» como nombre castellano establecido del topónimo.
- source_word: כְּדֻמָה
  english_pob_choice: silenced
  chosen_spanish: silenciada
  alternatives_spanish:
  - borrada
  - puesta en silencio
  - destruida
  lexicon: HALOT
  rationale: La forma puede denotar estar quieta, acallada o arruinada. «Silenciada» sigue la decisión inglesa de no estrechar el sentido solo a destrucción, pero sí reflejar el estado pasivo de ruina/acallamiento.
- source_word: בְּתוֹךְ הַיָּם
  english_pob_choice: in the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en medio del mar
  - en el corazón del mar
  lexicon: HALOT
  rationale: «En medio del mar» es la equivalencia más natural en español y mantiene el paralelismo poético del hebreo.
theological_decisions:
- issue: ¿Cómo rendir la lectura difícil de בְּנִיהֶם sin borrar la tensión textual?
  english_pob_reading: '''in their wailing'' with a note that the Hebrew term is difficult and some understand it differently, including ''their sons.'''
  chosen_spanish_reading: «en su lamento» con nota de alternativa textual/lexical implícita
  alternative_spanish_readings:
  - «con sus hijos»
  - «en su clamor»
  rationale: La POB inglesa adopta una lectura contextual de duelo, pero reconoce la dificultad del hebreo. En español, «en su lamento» mantiene esa lectura y deja espacio para una alternativa, sin resolver artificialmente el problema.
  doctrine_reference: Texto hebreo difícil; decisión lexical-contextual, no doctrinal
- issue: ¿Cómo reflejar כְּדֻמָה sin sobreinterpretar el juicio sobre Tiro?
  english_pob_reading: '''silenced'' with footnote allowing ''brought to silence'' or ''laid waste''.'
  chosen_spanish_reading: «silenciada»
  alternative_spanish_readings:
  - «puesta en silencio»
  - «destruida»
  - «asolada»
  rationale: «Silenciada» conserva la ambigüedad semántica entre acallamiento y ruina, evitando imponer una sola lectura más fuerte que la evidencia léxica.
  doctrine_reference: Énfasis literario-profético; no implica diferencia doctrinal
translation_notes:
  revision_awareness: 'Se siguió el último pass sin cambios materiales: la POB inglesa mantiene la lectura contextual de duelo para בְּנִיהֶם y conserva la ambigüedad de כְּדֻמָה con una nota léxica. La versión española refleja esas mismas decisiones sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se usó «Tiro» como topónimo estándar en español, coherente con el uso bíblico tradicional y la práctica de la POB inglesa.
  - Se prefirió «lamentación/lamentará» para mantener la relación léxica entre קינה y קוננו.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no pertinentes, pues el versículo no contiene el nombre divino.
  - Se mantuvo una sintaxis sobria y poética, adecuada para una sección profética de duelo.
