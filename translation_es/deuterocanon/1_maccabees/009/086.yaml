translation:
  language: es
  text: Desde allí, Jonatán avanzó y acampó en Ascalón[a]; y los de la ciudad salieron a recibirlo con gran honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de Swete se corta después de καὶ ἐπέ-, pero la cláusula hasta «con gran honor» está completa y permite una traducción estable de este segmento.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκεῖθεν
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: LSJ
  rationale: Expresa con naturalidad el cambio de escenario narrativo y conserva el valor espacial del griego sin volverlo pesado.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - levantó campamento
  - se acuarteló
  lexicon: LSJ
  rationale: El verbo tiene sentido militar de establecer campamento. En español, «acampó» es claro y fiel; «levantó campamento» desplaza el foco al acto de movimiento, y «se acuarteló» sugiere una instalación más técnica que el contexto no exige.
- source_word: εἰς Ἀσκάλωνα
  english_pob_choice: at Ashkelon
  chosen_spanish: en Ascalón
  alternatives_spanish:
  - a Ascalón
  - hasta Ascalón
  lexicon: LSJ
  rationale: Aunque εἰς puede ser literalmente «a/into», con un verbo de acampar el español natural pide «en». Mantiene el sentido locativo de la llegada e instalación sin sonar forzado.
- source_word: ἐξῆλθον οἱ ἐκ τῆς πόλεως
  english_pob_choice: those from the city came out
  chosen_spanish: los de la ciudad salieron
  alternatives_spanish:
  - los habitantes de la ciudad salieron
  - la gente de la ciudad salió
  lexicon: LSJ
  rationale: 'El griego es algo indefinido: «los de la ciudad» conserva esa generalidad mejor que especificar «habitantes» o «gente».'
- source_word: εἰς συνάντησιν αὐτῷ
  english_pob_choice: to meet him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - a su encuentro
  - para encontrarse con él
  lexicon: LSJ
  rationale: En este contexto narrativo, la expresión indica salir al encuentro de alguien. «A recibirlo» comunica bien el movimiento de bienvenida en español actual.
- source_word: ἐν δόξῃ μεγάλῃ
  english_pob_choice: with great honor
  chosen_spanish: con gran honor
  alternatives_spanish:
  - con gran gloria
  - con gran esplendor
  lexicon: LSJ
  rationale: δώξα aquí describe una recepción honorable y pública, no una gloria abstracta. «Con gran honor» preserva esa fuerza social; «gloria» o «esplendor» introducirían matices menos precisos.
translation_notes:
  revision_awareness: El tramo griego disponible termina de forma truncada en καὶ ἐπέ-, pero la oración anterior está completa y coincide sustancialmente con la traducción inglesa auditada; no se requieren cambios de fondo.
  spanish_consistency_notes:
  - Se mantuvo «Jonatán» para Ἰωναθάν, forma habitual y transparente en español bíblico.
  - Se prefirió «Ascalón» como exónimo español estándar.
  - Se conservó el paralelismo narrativo de movimiento + campamento + recepción pública, sin ampliar el contenido del versículo.
