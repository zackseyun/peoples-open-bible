  to: Si se encuentra un hombre asesinado[a] en la tierra que Yahvé tu Dios te da para poseerla, tendido en el campo abierto, y no se sabe quién lo hirió,
  rationale: Se revisa חָלָל para expresar explícitamente muerte violenta, en línea con la evidencia hebrea y la justificación del POB en inglés. Se mejora además la naturalidad del español con «para poseerla» y «tendido», sin alterar el sentido del original. La nota se ajusta para preservar la alternativa más general sin perder el matiz de homicidio.
