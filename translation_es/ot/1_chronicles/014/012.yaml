translation:
  language: es
  text: Y dejaron allí[a] sus dioses, y David dio la orden[b], y fueron quemados con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ídolos». El hebreo dice literalmente «sus dioses», aunque el referente probable son sus imágenes de culto.
    reason: lexical_alternative
  - marker: b
    text: 'El relato paralelo en 2 Samuel 5:21 dice de forma más activa: «David y sus hombres se los llevaron». Crónicas, en cambio, dice que fueron quemados con fuego por orden de David.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  english_pob_choice: they left
  chosen_spanish: dejaron
  alternatives_spanish:
  - abandonaron
  - desampararon
  lexicon: HALOT
  rationale: עזב expresa dejar, abandonar o desamparar. «Dejaron» es la opción más natural en español y mantiene la idea narrativa de que los objetos de culto quedaron atrás sin añadir tono más fuerte del que el hebreo exige.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio sólo marca ubicación. «Allí» conserva la brevedad y funciona bien en español bíblico moderno.
- source_word: אֶת אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a sus ídolos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus dioses». En español, con dejar un complemento de objeto directo marcado por «a», se conserva la forma del original. «Ídolos» interpretaría el referente más allá del texto hebreo; por eso se deja como alternativa, no como texto principal.
- source_word: וַיֹּאמֶר דָּוִיד
  english_pob_choice: David gave the order
  chosen_spanish: David dio la orden
  alternatives_spanish:
  - David dijo
  - David mandó
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y David dijo», el contexto inmediato muestra que ese decir funciona como una orden que produce la quema. «Dio la orden» expresa esa fuerza pragmática sin alejarse del sentido narrativo.
- source_word: וַיִּשָּׂרְפוּ
  english_pob_choice: they were burned
  chosen_spanish: fueron quemados
  alternatives_spanish:
  - los quemaron
  - fueron echados al fuego
  lexicon: HALOT
  rationale: 'La forma se entiende mejor en sentido pasivo: «fueron quemados». Así se evita añadir un objeto explícito que el hebreo no da y se mantiene la relación con el mandato de David.'
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en el fuego
  - por fuego
  lexicon: HALOT
  rationale: La preposición indica medio o instrumento. «Con fuego» es idiomático en español y refleja bien el valor instrumental.
theological_decisions:
- issue: Eufemización o reinterpretación de אֱלֹהִים aplicado a objetos de culto pagano
  english_pob_reading: their gods
  chosen_spanish_reading: sus dioses
  alternative_spanish_readings:
  - sus ídolos
  rationale: Se conserva la literalidad del hebreo, que habla de «dioses» con sufijo posesivo. Aunque el contexto sugiere imágenes de culto, traducir «ídolos» introduciría una interpretación no expresada por la forma hebrea. La nota mantiene abierta esa tensión.
  doctrine_reference: Principio de primacía del texto original sobre la tradición traductora
translation_notes:
  revision_awareness: 'Se siguió el flujo revisado del POB en inglés sin cambios sustanciales: mantener «their gods» de forma literal, interpretar la secuencia verbal como orden de David, y resolver la pasiva hebrea como «fueron quemados» en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando corresponda al nombre divino, pero este versículo no lo contiene.
  - Se prefirió «dioses» sobre «ídolos» en el texto principal para conservar la literalidad hebrea y la tensión léxica documentada.
  - «Dio la orden» refleja la función pragmática de וַיֹּאמֶר dentro del contexto, no una traducción mecánica de «dijo».
  - La pasiva española «fueron quemados» mantiene el sujeto implícito del hebreo sin forzar un agente no expresado.
