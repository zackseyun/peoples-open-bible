translation:
  language: es
  text: Que añadas[a] días a los días del rey; que sus años sean como generación tras generación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Añadirás días a los días del rey; sus años serán como generación tras generación». La forma verbal hebrea también puede leerse como futuro o afirmación, más que como petición.'
    reason: alternative_reading
  - marker: b
    text: 'Hebraísmo: «generación tras generación», es decir, una duración que continúa a través de sucesivas generaciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִים
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - más días
  - largos días
  - tiempo de vida
  lexicon: HALOT
  rationale: Se conserva el sustantivo básico 'días' para reflejar el hebreo y mantener el paralelismo con 'años'. En este contexto, el valor idiomático de prolongación de vida queda implícito sin perder la imagen concreta.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - encima de
  - a los
  lexicon: HALOT
  rationale: En la expresión idiomática de aumento, el sentido es aditivo ('añadir a'). En español, 'añadas días a los días' reproduce la relación sin forzar un calco preposicional.
- source_word: יְמֵי מֶלֶךְ
  english_pob_choice: the days of the king
  chosen_spanish: los días del rey
  alternatives_spanish:
  - los días del rey
  - los días de un rey
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de forma clara y digna. 'Del rey' conserva la referencia directa al monarca y la formalidad del hebreo.
- source_word: תּוֹסִיף
  english_pob_choice: may you add
  chosen_spanish: que añadas
  alternatives_spanish:
  - que añadas
  - añadirás
  - añade
  lexicon: HALOT
  rationale: Aunque la forma verbal puede leerse como futuro, el contexto oracional favorece una petición dirigida a Dios. 'Que añadas' preserva el valor de súplica sin cerrar la ambigüedad entre petición e indicativo.
- source_word: שְׁנוֹתָיו
  english_pob_choice: his years
  chosen_spanish: sus años
  alternatives_spanish:
  - sus años
  - los años de él
  lexicon: HALOT
  rationale: El sufijo de tercera persona masculina se refiere naturalmente al rey. 'Sus años' es la equivalencia más natural en español y mantiene la relación con 'días'.
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: Equivalente comparativo directo y natural en español, sin añadir matices no presentes en el hebreo.
- source_word: דֹר וָדֹר
  english_pob_choice: generation after generation
  chosen_spanish: generación tras generación
  alternatives_spanish:
  - generación y generación
  - de generación en generación
  - por generaciones
  lexicon: HALOT
  rationale: La repetición hebrea expresa sucesión continua. 'Generación tras generación' conserva el efecto iterativo y suena natural en español contemporáneo.
theological_decisions:
- issue: ¿Es una petición o una afirmación/futuro sobre la longevidad del rey?
  english_pob_reading: 'Rendered as a petition: ''May you add...; may his years be...'' while preserving the note that the Hebrew can also be read as future/indicative.'
  chosen_spanish_reading: 'Se traduce como petición: ''Que añadas...; que sus años sean...'' con nota de lectura alternativa futura.'
  alternative_spanish_readings:
  - Añadirás días a los días del rey; sus años serán...
  - Añades días a los días del rey; sus años serán...
  rationale: El marco del salmo favorece una súplica devocional. Sin embargo, la forma verbal hebrea admite lectura futura/indicativa; por eso se conserva la ambigüedad en nota en lugar de resolverla por completo en el texto principal.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se identificaron cambios necesarios; la lectura preferida sigue siendo la peticional, con la ambigüedad verbal preservada en nota.'
  spanish_consistency_notes:
  - Se mantiene 'días'/'años' para conservar el paralelismo hebreo.
  - Se evita 'SEÑOR' como máscara; el versículo no contiene el Tetragrámaton explícito en esta unidad.
  - '''Que añadas'' preserva la tensión entre súplica e indicativo documentada por el audit trail inglés.'
  - '''Generación tras generación'' comunica el hebraísmo sin arquaismo innecesario y sin perder la repetición enfática.'
