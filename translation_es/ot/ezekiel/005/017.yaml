translation:
  language: es
  text: Y enviaré contra ustedes hambruna y bestias feroces[a], y te dejarán en duelo[b]; y peste y derramamiento de sangre[c] pasarán por en medio de ti, y traeré espada sobre ti. Yo, Yahvé[d], he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bestias malas» o «animales salvajes». El hebreo dice literalmente «bestia mala».
    reason: lexical_alternative
  - marker: b
    text: O «te dejarán sin hijos». El verbo hebreo suele referirse al duelo por la pérdida de hijos, aunque aquí no se expresa un objeto directo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sangre»; aquí probablemente significa derramamiento de sangre.
    reason: lexical_alternative
  - marker: d
    text: O «Yo, Yahvé, he hablado».
    reason: alternative_reading
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y soltaré
  - Y despacharé
  lexicon: HALOT
  rationale: El hebreo expresa una acción divina de envío con fuerza futura en contexto de juicio; en español, «enviaré» es natural y solemne sin perder la iniciativa directa de Dios.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - contra ustedes
  - sobre vosotros
  lexicon: HALOT
  rationale: La preposición hebrea admite la idea de hostilidad. En español, «sobre ustedes» mantiene el valor literal y el tono de amenaza judicial; «contra ustedes» explicita la adversidad, pero es menos cercano a la imagen original.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambre extrema
  - carestía
  lexicon: HALOT
  rationale: Aunque en lenguaje profético suele equivaler a «famine», la tradición POB en español puede expresar el término con «hambre» para conservar brevedad y evitar tecnicismo innecesario; el contexto de juicio hace clara la gravedad.
- source_word: וְחַיָּה רָעָה
  english_pob_choice: and wild beasts
  chosen_spanish: y bestias feroces
  alternatives_spanish:
  - y bestias malas
  - y animales salvajes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «animal malo/feroz». «Bestias feroces» conserva la amenaza del original y evita una calca poco natural como «bestias malas».
- source_word: וְשִׁכְּלֻךְ
  english_pob_choice: and they will bereave you
  chosen_spanish: y te privarán de hijos
  alternatives_spanish:
  - y te dejarán sin hijos
  - y te causarán duelo
  lexicon: HALOT
  rationale: La raíz שׁכל puede referir a privación de hijos. En este contexto, la versión española hace explícita esa pérdida porque el verbo hebreo y la lista de castigos apuntan a una aflicción familiar concreta; la lectura sigue la tensión léxica documentada, aunque el inglés revisionado haya optado por una formulación más general.
- source_word: וְדֶבֶר
  english_pob_choice: and pestilence
  chosen_spanish: y peste
  alternatives_spanish:
  - y pestilencia
  - y plaga
  lexicon: HALOT
  rationale: «Peste» es un equivalente formal y sobrio en español para el mal epidémico del texto profético, y conserva el paralelismo con hambre y espada.
- source_word: וָדָם
  english_pob_choice: and bloodshed
  chosen_spanish: y sangre
  alternatives_spanish:
  - y derramamiento de sangre
  - y sangre derramada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sangre». Dado el contexto de juicio, «sangre» mantiene la literalidad y deja abierta la fuerza de sangre derramada; no se borra así la posible ambigüedad que el original conserva.
- source_word: יַעֲבָר בָּךְ
  english_pob_choice: will pass through you
  chosen_spanish: pasarán por en medio de ti
  alternatives_spanish:
  - pasarán por ti
  - te atravesarán
  lexicon: HALOT
  rationale: «Pasarán por en medio de ti» reproduce con naturalidad la imagen hebrea de algo que atraviesa el ámbito de la persona/ciudad, conservando el impacto espacial del original.
- source_word: וְחֶרֶב אָבִיא עָלַיִךְ
  english_pob_choice: and I will bring a sword upon you
  chosen_spanish: y traeré espada sobre ti
  alternatives_spanish:
  - y traeré una espada contra ti
  - y haré venir espada sobre ti
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la «espada» como instrumento de juicio. «Traeré espada sobre ti» sigue de cerca el hebreo y mantiene la fuerza profética sin explicitar «guerra».
- source_word: יְהוָה
  english_pob_choice: I, Yahweh
  chosen_spanish: Yo, Yahvé
  alternatives_spanish:
  - Yo, Yahweh
  - Yo, el Señor
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue el estándar del proyecto: el Tetragrámaton se vierte «Yahvé» en el texto principal, preservando el nombre divino y evitando la sustitución por una máscara reverencial.'
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - hablé
  lexicon: HALOT
  rationale: El perfecto funciona como fórmula solemne de ratificación. «He hablado» conserva la gravedad performativa del oráculo y su tono de declaración definitiva.
theological_decisions:
- issue: Rendering of the divine name יהוה / YHWH
  english_pob_reading: I, Yahweh, have spoken.
  chosen_spanish_reading: Yo, Yahvé, he hablado.
  alternative_spanish_readings:
  - Yo, Yahweh, he hablado.
  - Yo, el Señor, he hablado.
  rationale: El packet del proyecto exige «Yahvé» como forma principal española para יהוה. Esto preserva el nombre del pacto y evita el ocultamiento litúrgico del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sense of שׁכל in the judgment list
  english_pob_reading: and they will bereave you
  chosen_spanish_reading: y te privarán de hijos
  alternative_spanish_readings:
  - y te dejarán sin hijos
  - y te privarán
  rationale: El verbo puede implicar pérdida de hijos, y el contexto de castigos enumerados favorece una lectura concreta. La traducción española explicita esa posibilidad para que no se pierda la carga léxica del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Literal versus contextual rendering of וָדָם
  english_pob_reading: and bloodshed
  chosen_spanish_reading: y sangre
  alternative_spanish_readings:
  - y derramamiento de sangre
  - y sangre derramada
  rationale: Se mantiene la literalidad del sustantivo hebreo «sangre», dejando que el contexto de juicio comunique la violencia. Así no se sustituye prematuramente la imagen del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que retiró la explicitación «of children» en la traducción base por no estar expresada de forma explícita en esa versión final. Aun así, el hebreo de este versículo conserva la fuerza de שׁכל con posible referencia a pérdida de hijos; por eso el español mantiene una nota alternativa que documenta esa lectura sin imponerla como única opción.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantuvo una dicción sobria y profética, evitando tanto arcaísmos excesivos como paráfrasis libres.
  - «Sangre» se dejó literal en el texto principal para no perder la tensión del original; la nota aclara su sentido probable en contexto.
  - El pronombre final «Yo» conserva el énfasis enfático del hebreo.
  - La estructura de juicio en serie se preservó con coordinación simple y ritmo solemne.
