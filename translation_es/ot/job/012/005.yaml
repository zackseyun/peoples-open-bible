translation:
  language: es
  text: Como una antorcha[a] despreciada en el pensamiento[b] del que está a gusto, está preparada para aquellos cuyos pies resbalan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Antorcha» traduce el hebreo לַפִּיד. También puede entenderse como «lámpara», pero «antorcha» conserva mejor la imagen de fuego del original.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo de esta expresión es difícil, y este sustantivo raro puede referirse a pensamiento, intención o consideración. También podría traducirse: «Una lámpara es despreciable en la opinión del que está a gusto; está preparada para los pies vacilantes».'
    reason: source_note
lexical_decisions:
- source_word: לַפִּיד
  english_pob_choice: torch
  chosen_spanish: antorcha
  alternatives_spanish:
  - tea
  - lámpara
  - antorcha ardiente
  lexicon: HALOT
  rationale: El término designa un objeto de fuego portátil; en español, «antorcha» comunica bien la imagen concreta y mantiene la fuerza visual del original. «Lámpara» sería posible en una nota, pero atenúa el efecto de fuego y puede sonar menos acorde con el paralelo poético.
- source_word: בּוּז
  english_pob_choice: is despised
  chosen_spanish: despreciada
  alternatives_spanish:
  - objeto de desprecio
  - tenida en desprecio
  - despreciado
  lexicon: HALOT
  rationale: El sustantivo expresa desprecio o menosprecio. En español, un participio adjetival como «despreciada» conserva la valoración negativa y encaja con la construcción poética sin forzar un verbo explícito.
- source_word: לְעַשְׁתּוּת
  english_pob_choice: in the thought of
  chosen_spanish: en el pensamiento
  alternatives_spanish:
  - según la opinión
  - en la consideración
  - en la idea
  lexicon: HALOT
  rationale: Es un término raro que apunta a pensamiento, intención o consideración. «En el pensamiento» sigue de cerca la decisión inglesa documentada y deja visible la dificultad léxica sin resolverla demasiado libremente.
- source_word: שַׁאֲנָן
  english_pob_choice: one who is at ease
  chosen_spanish: uno que está en calma
  alternatives_spanish:
  - el que vive confiado
  - el complaciente
  - el que está tranquilo
  lexicon: HALOT
  rationale: El adjetivo describe a alguien seguro, despreocupado o tranquilo. «En calma» conserva esa serenidad/aparente seguridad y suena natural en español; se evita «seguro» porque puede sonar más técnico o teológico que poético.
- source_word: נָכוֹן
  english_pob_choice: it is ready
  chosen_spanish: está preparada
  alternatives_spanish:
  - está lista
  - está dispuesta
  - está preparada/aprestada
  lexicon: HALOT
  rationale: El participio/adjetivo expresa algo establecido o preparado. «Está preparada» conserva la idea de disposición para un fin y funciona bien con el objeto implícito de la metáfora.
- source_word: לְמוֹעֲדֵי רָגֶל
  english_pob_choice: for those whose feet slip
  chosen_spanish: para los pies que resbalan
  alternatives_spanish:
  - para el tropiezo de los pies
  - para quienes resbalan con el pie
  - para los pies vacilantes
  lexicon: HALOT
  rationale: La frase es idiomática y metafórica; la imagen de pies que resbalan comunica inestabilidad y tropiezo. Se mantiene el plural de la revisión inglesa («feet slip») y la metáfora corporal sin convertirla en paráfrasis explicativa.
theological_decisions:
- issue: Tratamiento del sujeto implícito y la estructura verbless del hebreo
  english_pob_reading: Like a torch despised... it is ready...
  chosen_spanish_reading: Como una antorcha despreciada... está preparada...
  alternative_spanish_readings:
  - Una antorcha despreciada...
  - Es como una antorcha despreciada...
  rationale: El hebreo es nominal/poético y no obliga a un verbo inicial explícito. «Como una antorcha...» reproduce mejor la comparación y evita añadir un verbo que el texto no requiere.
  doctrine_reference: Poética hebrea; fidelidad sintáctica al enunciado nominal.
- issue: Ambigüedad del referente en 'para los pies que resbalan'
  english_pob_reading: for those whose feet slip
  chosen_spanish_reading: para los pies que resbalan
  alternative_spanish_readings:
  - para quienes resbalan
  - para los que tropiezan
  rationale: La frase hebrea es idiomática y puede leerse como una imagen del deslizamiento del pie o de personas que resbalan. Se conserva la metáfora concreta de los pies para no neutralizar la imagen.
  doctrine_reference: No doctrinal; decisión de imaginería poética y semántica metafórica.
translation_notes:
  revision_awareness: 'Se incorporó la revisión que hace la apertura más claramente comparativa: «Como una antorcha...», reflejando el hebreo nominal sin verbo inicial. También se preservó el plural de la imagen final («los pies que resbalan») conforme a la revisión del texto inglés auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, pero este versículo no lo contiene.
  - Se usó un registro poético sobrio y moderno, evitando arcaísmos innecesarios.
  - Se preservó la metáfora corporal de «pies que resbalan» en lugar de una abstracción como «tropiezo» para no diluir la imagen original.
