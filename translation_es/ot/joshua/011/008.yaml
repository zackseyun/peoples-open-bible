  rationale: Se corrigió el anclaje de la nota para que recaiga sobre «Misrefot-maim», que es el elemento explicado por la nota. Se reemplazó «los hirieron» por «los derrotaron» en ambas ocurrencias para reflejar mejor la fuerza militar de נכה sin sobrecargar el español. Se ajustó «Sidón la Grande» a «la gran Sidón» por mayor naturalidad. Se mantuvo «Yahvé», «en manos de Israel», «Misrefot-maim», «el valle de Mizpe» y «al oriente» como opciones fieles y legibles.
