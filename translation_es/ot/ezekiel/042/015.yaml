translation:
  language: es
  text: Cuando hubo terminado de medir la casa interior[a], me sacó por la puerta que daba al oriente[b], y la midió por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa interior». El hebreo usa «casa» en el contexto de la visión del templo para la estructura sagrada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la puerta cuyo rostro estaba hacia el oriente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלָּה
  english_pob_choice: When he had finished
  chosen_spanish: Cuando hubo terminado
  alternatives_spanish:
  - Cuando terminó
  - Y terminó
  lexicon: HALOT
  rationale: El hebreo expresa acción completada antes de la siguiente. En español, la construcción temporal con «hubo terminado» conserva bien la anterioridad narrativa sin sonar excesivamente pesada.
- source_word: מִדּוֹת
  english_pob_choice: measuring
  chosen_spanish: de medir
  alternatives_spanish:
  - de las medidas
  - de las dimensiones
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «medidas» o «dimensiones», aquí el contexto verbal pide una frase natural en español que exprese la acción de medir, como en el audit trail inglés.
- source_word: הַבַּיִת הַפְּנִימִי
  english_pob_choice: the inner house
  chosen_spanish: la casa interior
  alternatives_spanish:
  - la casa interna
  - el edificio interior
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar de cerca בַּיִת. «Interior» reproduce el adjetivo hebreo y evita sustituirlo por «templo», que sería interpretativo más allá del término base en este versículo.
- source_word: וְהוֹצִיאַנִי
  english_pob_choice: he brought me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me llevó fuera
  - me hizo salir
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir. «Me sacó» es conciso, fiel y natural en español; mantiene la causalidad sin añadir matices no requeridos.
- source_word: דֶּרֶךְ
  english_pob_choice: by way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la vía de
  - a través de
  lexicon: HALOT
  rationale: «Camino de» conserva el valor direccional de דֶּרֶךְ y suena idiomático en español bíblico moderno. «Por el camino de» refleja bien el modo de salida.
- source_word: הַשַּׁעַר אֲשֶׁר פָּנָיו דֶּרֶךְ הַקָּדִים
  english_pob_choice: the gate that faced east
  chosen_spanish: la puerta que daba al oriente
  alternatives_spanish:
  - la puerta que miraba al oriente
  - la puerta cuyo frente estaba hacia el oriente
  lexicon: HALOT
  rationale: La expresión hebrea indica orientación. «Daba al oriente» comunica con naturalidad la dirección de la puerta y evita una calca como «su rostro», que sería poco español.
- source_word: וּמְדָדֹו
  english_pob_choice: he measured it
  chosen_spanish: la midió
  alternatives_spanish:
  - lo midió
  - la volvió a medir
  lexicon: HALOT
  rationale: El sufijo retoma la estructura/recinto ya mencionado. Como en el inglés auditado, el antecedente se entiende mejor con un pronombre femenino referido a «la casa»; es la solución más fluida en español.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor de todo
  - en derredor
  lexicon: HALOT
  rationale: La duplicación intensifica la idea de perímetro completo. «Todo alrededor» preserva ese énfasis y resulta claro en español contemporáneo.
theological_decisions:
- issue: Referente de «la casa interior» en la visión del templo
  english_pob_reading: the inner house
  chosen_spanish_reading: la casa interior
  alternative_spanish_readings:
  - el templo interior
  - la casa del templo interior
  rationale: Se mantiene el término base «casa» para no borrar la correspondencia léxica con el hebreo בַּיִת. Aunque en el contexto se trata de la visión del templo, este versículo no obliga a sustituirlo por «templo».
  doctrine_reference: Ezequiel 40–42; precisión léxica en la visión del santuario
- issue: Orientación de la puerta hacia el este
  english_pob_reading: the gate that faced east
  chosen_spanish_reading: la puerta que daba al oriente
  alternative_spanish_readings:
  - la puerta que miraba al oriente
  - la puerta orientada al este
  rationale: El hebreo usa una expresión de orientación espacial, no una declaración teológica. «Daba al oriente» conserva el dato arquitectónico sin elevarlo a símbolo no explícito.
  doctrine_reference: Descripción arquitectónica de Ezequiel 42
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del POB en inglés, que volvió de «inner temple» a «inner house» para ajustarse mejor al hebreo. En español se decidió mantener ese ajuste con «casa interior», evitando una paráfrasis más interpretativa como «templo», y se conservó el orden narrativo completo de la acción: terminó de medir, sacó al profeta, y luego midió todo alrededor.'
  spanish_consistency_notes:
  - Se mantiene «oriente» para traducir הַקָּדִים, en consonancia con el registro bíblico y la preferencia del proyecto por términos geográficos claros.
  - Se usa «casa» y no «templo» para respetar la decisión léxica auditada sobre בַּיִת.
  - No se introduce terminología eclesiástica ajena al contexto; el versículo describe medición arquitectónica, no culto.
  - La voz narrativa se conserva en tercera persona singular, coherente con el marco visionario de Ezequiel.
