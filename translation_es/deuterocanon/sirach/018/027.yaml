translation:
  language: es
  text: El hombre sabio será cauteloso en todo[a][b], y en días de pecados se guardará de la mala acción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será reverente en todo». El verbo griego puede denotar reverencia además de cautela; aquí el contexto favorece la prudencia moral.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en días de pecados», probablemente tiempos marcados por el pecado o la tentación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: LSJ
  rationale: El griego usa un singular genérico masculino en estilo proverbial. En español, «el hombre» conserva esa forma representativa sin forzar una neutralización que diluiría la correspondencia formal del texto fuente.
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: LSJ
  rationale: En el contexto sapiencial, σοφός expresa sabiduría práctica y moral; «sabio» es la opción más natural y fiel en español.
- source_word: ἐν παντὶ
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en cada cosa
  - en todo asunto
  lexicon: LSJ
  rationale: La expresión abarca todas las circunstancias o materias. «En todo» reproduce bien la amplitud sin sonar forzado en español.
- source_word: εὐλαβηθήσεται
  english_pob_choice: will be cautious
  chosen_spanish: será cauteloso
  alternatives_spanish:
  - será reverente
  - estará en guardia
  - actuará con cuidado
  lexicon: LSJ
  rationale: El contexto inmediato favorece la idea de prudencia y vigilancia moral antes que la reverencia cultual. «Cauteloso» preserva ese matiz práctico.
- source_word: ἡμέραις ἁμαρτιῶν
  english_pob_choice: days of sins
  chosen_spanish: días de pecado
  alternatives_spanish:
  - días de pecados
  - tiempos de pecado
  - días de tentación
  lexicon: LSJ
  rationale: El plural griego se conserva de manera comprensible con «días de pecado», que en español comunica un tiempo marcado por el pecado o la tentación.
- source_word: προσέξει
  english_pob_choice: he will beware
  chosen_spanish: cuidará de apartarse
  alternatives_spanish:
  - prestará atención
  - tomará cuidado
  - se guardará
  lexicon: LSJ
  rationale: προσέχω significa prestar atención o tomar cuidado. En español, «cuidará de apartarse» expresa con naturalidad la vigilancia dirigida a evitar algo.
- source_word: ἀπὸ
  english_pob_choice: of
  chosen_spanish: del
  alternatives_spanish:
  - de
  - desde
  lexicon: LSJ
  rationale: Aunque el griego literalmente dice «de/desde», la construcción española requiere «apartarse del» para reflejar con fluidez la idea de alejamiento.
- source_word: πλημμελίας
  english_pob_choice: wrongdoing
  chosen_spanish: delito
  alternatives_spanish:
  - falta
  - falta moral
  - transgresión
  - culpa
  lexicon: LSJ
  rationale: πλημμέλεια designa una falta, ofensa o mala conducta. «Delito» transmite un acto culpable y grave, aunque es algo más específico; se elige por su fuerza en español y se mantiene la posibilidad de lectura general mediante el verbo de apartarse.
theological_decisions:
- issue: 'Sentido de εὐλαβηθήσεται: reverencia o cautela'
  english_pob_reading: practical caution rather than explicitly religious reverence
  chosen_spanish_reading: cautela práctica antes que reverencia litúrgica
  alternative_spanish_readings:
  - será reverente en todo
  - actuará con piedad en todo
  rationale: La segunda cláusula, centrada en evitar el mal, inclina el sentido hacia una prudencia moral concreta. Por eso se traduce con un término de cautela y no con un lenguaje más cultual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 and 6
- issue: Pluralidad de ἡμέραις ἁμαρτιῶν
  english_pob_reading: times marked by sin or temptation
  chosen_spanish_reading: días caracterizados por el pecado
  alternative_spanish_readings:
  - tiempos de pecado
  - días de pecados
  rationale: Se mantiene la pluralidad de la expresión griega sin perder inteligibilidad en español. El sentido apunta a momentos definidos por el pecado o la tentación, no a una referencia cronológica precisa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 1
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión más reciente y no requiere cambios sustantivos; se ha mantenido la decisión contextual de εὐλαβηθήσεται como cautela y se ha conservado la pluralidad de «días de pecado» con una nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se ha preferido «sabio» sobre «prudente» para conservar el registro sapiencial.
  - «Delito» se usa como equivalente fuerte de πλημμελία, pero la nota aclara la amplitud semántica del término griego.
  - La puntuación y el orden siguen una sintaxis española natural sin perder la estructura paralela del griego.
