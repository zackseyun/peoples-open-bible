translation:
  language: es
  text: Cuando el rocío descendió sobre el campamento por la noche[a], el maná descendió sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y cuando el rocío descendió sobre el campamento de noche, el maná descendió sobre él». El hebreo usa el mismo verbo para el rocío y para el maná, lo que enfatiza el paralelismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרֶדֶת
  english_pob_choice: When ... came down
  chosen_spanish: Cuando ... descendía
  alternatives_spanish:
  - Y cuando ... descendía
  - Al descender
  lexicon: HALOT
  rationale: La forma con prefijo y el infinitivo constructo introduce una cláusula temporal. En español, 'Cuando ... descendía' comunica bien la acción habitual o repetida en el relato, manteniendo el valor temporal sin una construcción artificiosa.
- source_word: הַטַּל
  english_pob_choice: the dew
  chosen_spanish: el rocío
  alternatives_spanish:
  - la escarcha
  - el dew
  lexicon: HALOT
  rationale: '''Rocío'' es el equivalente natural en español para el fenómeno atmosférico indicado por el hebreo. Conserva el referente concreto sin sobreinterpretarlo.'
- source_word: עַל הַמַּחֲנֶה
  english_pob_choice: on the camp
  chosen_spanish: sobre el campamento
  alternatives_spanish:
  - sobre el campamento
  - en el campamento
  lexicon: HALOT
  rationale: '''Sobre'' refleja bien עַל con imagen de cobertura o caída. ''Campamento'' es más transparente en español que ''campamento'' sin artículo, y evita un calco duro.'
- source_word: לָיְלָה
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: Como adverbial de tiempo, 'de noche' es una solución natural y breve en español, equivalente a 'at night'.
- source_word: יֵרֵד
  english_pob_choice: came down
  chosen_spanish: descendía
  alternatives_spanish:
  - descendía
  - bajaba
  lexicon: HALOT
  rationale: El imperfecto narra una acción recurrente o habitual. 'Descendía' conserva la repetición y además mantiene la raíz semántica del verbo de subir/bajar, tal como la audita el inglés POB con 'came down/descended'.
- source_word: הַמָּן
  english_pob_choice: the manna
  chosen_spanish: el maná
  alternatives_spanish:
  - el maná
  lexicon: HALOT
  rationale: Término ya fijado en español bíblico y transparente para el alimento milagroso.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - encima de él
  lexicon: HALOT
  rationale: El sufijo pronominal de 3ms se conserva con un pronombre masculino singular. 'Sobre él' mantiene la referencia pronominal sin precisar en exceso si apunta al campamento o a la capa de rocío, tal como el hebreo deja la relación abierta.
theological_decisions:
- issue: Paralelismo verbal entre el rocío y el maná
  english_pob_reading: The Hebrew uses the same verb ('came down/descended') for both dew and manna, emphasizing the parallel.
  chosen_spanish_reading: El hebreo usa el mismo verbo ('descendía') para el rocío y para el maná, subrayando el paralelismo.
  alternative_spanish_readings:
  - El rocío caía... el maná caía...
  - El rocío bajaba... el maná bajaba...
  rationale: Conviene preservar en español la repetición verbal porque forma parte de la fuerza literaria y teológica del versículo. 'Descendía' reproduce de manera visible el paralelismo destacado por el POB en inglés.
  doctrine_reference: Éxodo 16; Números 11:7-9
translation_notes:
  revision_awareness: Se corrigió la anotación de nota al pie para que el marcador [a] aparezca en el texto español. No se modificó el sentido base del versículo ni el paralelismo verbal documentado en la revisión inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'maná' con artículo definido por tratarse del alimento ya conocido en el contexto.
  - Se eligió 'descendía' para conservar el paralelismo verbal y la lectura iterativa del imperfecto hebreo.
  - '''Sobre él'' preserva el pronombre masculino singular del hebreo sin resolver de forma indebida el antecedente.'
  - La puntuación española coloca la coma antes de la cláusula principal como corresponde a la estructura temporal inicial.
