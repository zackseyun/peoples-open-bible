translation:
  language: es
  text: Entonces salió un campeón[a] de los campamentos de los filisteos; su nombre era Goliat, de Gat[b]. Su altura era de seis codos y un palmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hombre del entre», probablemente un guerrero representativo que se adelanta entre las líneas de combate; de ahí «campeón».'
    reason: lexical_alternative
  - marker: b
    text: Seis codos y un palmo equivalen aproximadamente a 3,0 metros, según la medida del codo usada.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ הַבֵּנַיִם
  english_pob_choice: a champion
  chosen_spanish: un hombre de entre los campamentos
  alternatives_spanish:
  - un campeón
  - un hombre del espacio entre las líneas
  - un guerrero intermediario
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, literalmente, alude a un hombre que se coloca en medio/entre dos espacios o líneas de batalla. En español, "campeón" sería claro pero introduciría una equivalencia más interpretativa; por eso se mantiene una formulación más cercana al hebreo y se explica en nota.
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino saliendo
  - fue y salió
  lexicon: HALOT
  rationale: El verbo expresa movimiento de salida. "Salió" es la opción natural y fiel en narración española, manteniendo el aspecto puntual del original.
- source_word: מִמַּחֲנוֹת פְּלִשְׁתִּים
  english_pob_choice: from the camps of the Philistines
  chosen_spanish: de entre los campamentos de los filisteos
  alternatives_spanish:
  - del campamento de los filisteos
  - de entre las huestes de los filisteos
  lexicon: HALOT
  rationale: Se conserva el plural de "campamentos" para reflejar el hebreo, y "filisteos" traduce el nombre del pueblo de modo estándar en español bíblico.
- source_word: גָּלְיָת
  english_pob_choice: Goliath
  chosen_spanish: Goliat
  alternatives_spanish:
  - Goliath
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran según el uso habitual en español bíblico; "Goliat" es la forma natural y reconocible.
- source_word: שְׁמוֹ
  english_pob_choice: his name was
  chosen_spanish: su nombre era
  alternatives_spanish:
  - se llamaba
  - llamado
  lexicon: HALOT
  rationale: La construcción posesiva hebrea se vierte de manera directa y natural como "su nombre era".
- source_word: מִגַּת
  english_pob_choice: from Gath
  chosen_spanish: de Gat
  alternatives_spanish:
  - procedente de Gat
  - el gatita
  lexicon: HALOT
  rationale: El texto presenta el lugar de origen directamente; "de Gat" es más literal que convertirlo en gentilicio.
- source_word: גָּבְהוֹ
  english_pob_choice: his height was
  chosen_spanish: Su altura era
  alternatives_spanish:
  - era de estatura
  - medía
  lexicon: HALOT
  rationale: El sustantivo con sufijo se refiere a la estatura/altura. "Su altura era" preserva la referencia cuantitativa de forma clara.
- source_word: שֵׁשׁ אַמּוֹת וָזָרֶת
  english_pob_choice: six cubits and a span
  chosen_spanish: seis codos y un palmo
  alternatives_spanish:
  - seis codos y una cuarta
  - unos tres metros
  lexicon: HALOT
  rationale: Se conservan las unidades antiguas para ser fieles al hebreo y al criterio del POB en inglés; "palmo" comunica bien la medida de זָרֶת en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y conserva la estructura narrativa del original, en línea con la revisión inglesa sin cambios sustanciales. Se mantiene la transparencia de las medidas antiguas y del idiomatismo hebreo, con explicación breve en nota.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene "filisteos" como etnónimo estándar en español bíblico.
  - '"Goliat" sigue la forma onomástica habitual en español para facilitar lectura pública.'
  - Se evita reemplazar las unidades antiguas por equivalentes modernos en el texto principal, reservando la equivalencia aproximada para la nota.
