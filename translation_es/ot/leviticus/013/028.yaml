translation:
  language: es
  text: Pero si la mancha brillante permanece en su lugar[a] y no se ha extendido en la piel, y está descolorida, es la hinchazón de la quemadura; el sacerdote lo declarará limpio, porque es la cicatriz de la quemadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de ella». El hebreo dice literalmente que la mancha brillante «permanece debajo de ella», pero en este contexto el sentido es que permanece en su lugar y no se extiende.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְתֶּיהָ + תַעֲמֹד
  english_pob_choice: remains in its place
  chosen_spanish: permanece en su lugar
  alternatives_spanish:
  - permanece debajo de ella
  - está bajo ella
  lexicon: HALOT
  rationale: La combinación verbal-idiomática expresa que la lesión no se ha movido ni propagado. En español, ‘permanece en su lugar’ comunica de forma natural la idea diagnóstica de estabilidad, sin forzar la imagen literal de ‘estar debajo de ella’.
- source_word: הַבַּהֶרֶת
  english_pob_choice: the bright spot
  chosen_spanish: la mancha brillante
  alternatives_spanish:
  - la mancha luminosa
  - la mancha clara
  lexicon: HALOT
  rationale: ‘Mancha brillante’ sigue de cerca la decisión inglesa y conserva el contraste perceptible del término hebreo en el contexto de examen cutáneo. ‘Mancha’ es más natural en español que ‘punto’ o ‘luz’, y evita tecnicismos innecesarios.
- source_word: פָשְׂתָה
  english_pob_choice: has spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha avanzado
  - se ha propagado
  lexicon: HALOT
  rationale: El verbo describe expansión en la piel; ‘se ha extendido’ es la forma más clara y idiomática en español, manteniendo el valor diagnóstico del hebreo.
- source_word: בָעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - sobre la piel
  - dentro de la piel
  lexicon: HALOT
  rationale: ‘Piel’ es el equivalente natural en español y preserva el marco médico/ritual del texto. ‘En’ mantiene la preposición contextual sin sonar artificial.
- source_word: כֵהָה
  english_pob_choice: faded
  chosen_spanish: está apagada
  alternatives_spanish:
  - está descolorida
  - está desvaída
  lexicon: HALOT
  rationale: La imagen es de pérdida de intensidad o brillo. ‘Apagada’ conserva esa reducción visible y suena natural en español, sin introducir una valoración ajena al contexto.
- source_word: שְׂאֵת הַמִּכְוָה
  english_pob_choice: the swelling from the burn
  chosen_spanish: la hinchazón de la quemadura
  alternatives_spanish:
  - la elevación de la quemadura
  - la tumoración de la quemadura
  lexicon: HALOT
  rationale: שְׂאֵת apunta a una elevación o hinchazón cutánea. ‘Hinchazón’ es comprensible y transmite el rasgo físico visible; ‘de la quemadura’ refleja la relación genitiva del hebreo.
- source_word: וְטִהֲרוֹ הַכֹּהֵן
  english_pob_choice: the priest shall pronounce him clean
  chosen_spanish: el sacerdote lo declarará limpio
  alternatives_spanish:
  - el sacerdote lo pronunciará limpio
  - el sacerdote lo tendrá por limpio
  lexicon: HALOT
  rationale: En el lenguaje sacerdotal, טהר aquí es declarativo/ritual, no una limpieza física. ‘Declarará limpio’ preserva la función judicial del sacerdote y es perfectamente comprensible en español.
- source_word: צָרֶבֶת
  english_pob_choice: the scar
  chosen_spanish: la cicatriz
  alternatives_spanish:
  - la marca
  - la señal
  lexicon: HALOT
  rationale: El término designa el resultado cicatrizado de la quemadura. ‘Cicatriz’ es el equivalente más natural en español y conserva el valor observable del sustantivo hebreo.
theological_decisions:
- issue: Sentido ritual de ‘declarar limpio’
  english_pob_reading: the priest shall pronounce him clean
  chosen_spanish_reading: el sacerdote lo declarará limpio
  alternative_spanish_readings:
  - el sacerdote lo limpiará
  - el sacerdote lo purificará
  rationale: El texto presenta una declaración sacerdotal de estado ritual, no una acción material de purificación. La formulación elegida evita confundir el veredicto con un acto físico.
  doctrine_reference: Levítico 13; distinción entre pureza ritual y limpieza física
- issue: Valor diagnóstico de la lesión
  english_pob_reading: bright spot / swelling / scar of the burn
  chosen_spanish_reading: mancha brillante / hinchazón de la quemadura / cicatriz de la quemadura
  alternative_spanish_readings:
  - mancha clara / elevación de la quemadura / marca de la quemadura
  rationale: 'El versículo describe signos observables para discernimiento sacerdotal. La traducción conserva la progresión: lesión estable, debilitada, y luego identificada como secuela de una quemadura.'
  doctrine_reference: 'Levítico 13: diagnóstico ritual de afecciones cutáneas'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y el texto hebreo: conserva el valor idiomático de תַּחְתֶּיהָ + תַעֲמֹד como permanencia estática, reproduce la secuencia diagnóstica de la lesión y mantiene la declaración sacerdotal como veredicto ritual. No se observaron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferente del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa ‘el sacerdote lo declarará limpio’ para conservar el valor ritual de טהר en contexto levítico.
  - Se evita ‘SEÑOR’ y se conserva un estilo sobrio y publicable, sin calcos innecesarios.
