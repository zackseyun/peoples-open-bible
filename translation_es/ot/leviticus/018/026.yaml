translation:
  language: es
  text: Pero ustedes mismos guardarán mis estatutos y mis juicios[a], y no harán ninguna de estas abominaciones, ni el nativo ni el forastero que reside entre ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis ordenanzas judiciales». El hebreo מִשְׁפָּטַי puede referirse a decisiones o disposiciones judiciales; «mis juicios» preserva la distinción frente a «mis estatutos».
    reason: lexical_alternative
  - marker: b
    text: O «el extranjero residente que reside entre ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  - mantendrán
  lexicon: HALOT
  rationale: שׁמר en contextos de pacto y ley puede significar guardar, observar o cumplir. «Guardarán» conserva la idea de cuidado obediente y el tono normativo sin sonar forzado en español.
- source_word: אַתֶּם
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - así que ustedes
  - por su parte
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Ustedes mismos» reproduce ese énfasis de forma natural en español.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis normas
  - mis preceptos
  lexicon: HALOT
  rationale: חֻקִּים son disposiciones fijas; «estatutos» es una equivalencia precisa y estable en registros bíblicos, y distingue bien el término de מִשְׁפָּטִים.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis decretos
  alternatives_spanish:
  - mis juicios
  - mis decisiones
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones o disposiciones judiciales. Aquí se mantiene la pareja legal con חֻקִּים mediante «decretos», aunque en otros contextos también podría rendirse por «juicios» u «ordenanzas»; la elección evita una repetición pesada y sigue la fuerza normativa del pasaje.
- source_word: תַעֲשׂוּ
  english_pob_choice: do
  chosen_spanish: harán
  alternatives_spanish:
  - practicarán
  - cometerán
  - harán práctica de
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio; en esta prohibición, «harán» es directo y fiel, sin introducir una iteración que el hebreo no exige.
- source_word: מִכֹּל
  english_pob_choice: any of
  chosen_spanish: ninguna de
  alternatives_spanish:
  - alguna de
  - cualquiera de
  - ninguna
  lexicon: HALOT
  rationale: La construcción negativa con מִן + כֹּל expresa amplitud total. «Ninguna de» comunica bien la prohibición absoluta en español.
- source_word: הַתּוֹעֵבֹת
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  - prácticas abominables
  - cosas abominables
  lexicon: HALOT
  rationale: תּוֹעֵבָה expresa algo detestable o repugnante moralmente; «abominaciones» preserva la fuerza evaluativa fuerte del término en este contexto legal-santo.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - tales
  - esas
  lexicon: HALOT
  rationale: Demostrativo directo que remite a las prácticas prohibidas ya enumeradas.
- source_word: הָאֶזְרָח
  english_pob_choice: the native-born
  chosen_spanish: el nativo
  alternatives_spanish:
  - el nacido en la tierra
  - el natural
  - el nacido aquí
  lexicon: HALOT
  rationale: אֶזְרָח designa al nacido en la comunidad/tierra. «El nativo» es breve y claro; conserva el contraste con גֵּר sin añadir explicación interpretativa al texto principal.
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero residente
  alternatives_spanish:
  - el residente extranjero
  - el extranjero residente
  - el prosélito
  lexicon: HALOT
  rationale: גֵּר no es simplemente un visitante ocasional; es un residente no nativo dentro de la comunidad. «Forastero residente» expresa bien esa combinación de extrañeza y residencia, y hace explícita la alternativa lexical que el inglés POB anotó como «resident foreigner».
- source_word: הַגָּר בְּתוֹכְכֶם
  english_pob_choice: who sojourns among you
  chosen_spanish: que reside entre ustedes
  alternatives_spanish:
  - que vive entre ustedes
  - que mora entre ustedes
  - que habita entre ustedes
  lexicon: HALOT
  rationale: El participio refuerza el estado de residencia del גֵּר. «Que reside entre ustedes» mantiene el sentido relacional y comunitario sin depender del verbo tradicional «sojornar», que en español actual suena menos natural.
theological_decisions:
- issue: Alcance de la obligación para nativos y residentes no israelitas
  english_pob_reading: The command applies equally to the native-born and to the sojourner residing among Israel.
  chosen_spanish_reading: El mandamiento obliga por igual al nativo y al forastero residente entre ustedes.
  alternative_spanish_readings:
  - El mandamiento se dirige a ambos sin distinción, nativos y residentes.
  - La prohibición incluye tanto al nacido en la comunidad como al residente extranjero.
  rationale: La sintaxis hebrea menciona explícitamente a ambos grupos al final de la cláusula. La traducción conserva esa amplitud moral y comunitaria sin suavizarla ni convertirla en una mera aclaración appositiva.
  doctrine_reference: Levítico 18:26; obligación comunitaria bajo el orden santo de Yahvé
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo y se cotejó con el audit trail en inglés. La principal decisión ajustada al español fue rendir גֵּר como «forastero residente» y restituir el énfasis de אַתֶּם con «ustedes mismos». No hubo cambios textuales adicionales respecto del sentido base de la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo Yahvé implícito solo en la terminología interna de la tradición POB; este versículo no lo menciona explícitamente.
  - Se preservó la distinción entre «estatutos» y «decretos/juicios» como pareja legal, sin borrar la tensión lexical de מִשְׁפָּטִים.
  - «Abominaciones» conserva la carga moral fuerte de תּוֹעֵבֹת.
  - «El nativo» y «el forastero residente» reproducen el paralelismo social del hebreo con registro bíblico contemporáneo.
