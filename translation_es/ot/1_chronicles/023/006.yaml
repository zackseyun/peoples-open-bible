lexical_decisions:
- source_word: וַיֶּחָלְקֵם
  english_pob_choice: divided them
  chosen_spanish: los dividió
  alternatives_spanish:
  - los distribuyó
  - los repartió
  lexicon: HALOT
  rationale: El verbo hebreo expresa dividir o distribuir con objeto directo pronominal. «Los dividió» conserva la acción transitiva y sigue de cerca la lectura auditada del inglés sin volverla demasiado rígida.
- source_word: מַחְלְקוֹת
  english_pob_choice: into divisions
  chosen_spanish: en divisiones
  alternatives_spanish:
  - por divisiones
  - en grupos
  lexicon: HALOT
  rationale: El sustantivo indica divisiones, cursos u ორგანიზaciones. En español, «en divisiones» reproduce bien el resultado de la acción y mantiene el lenguaje técnico de ordenamiento levítico.
- source_word: לִבְנֵי לֵוִי
  english_pob_choice: for the sons of Levi
  chosen_spanish: para los hijos de Leví
  alternatives_spanish:
  - para los levitas
  - entre los hijos de Leví
  lexicon: HALOT
  rationale: Se preserva la formulación genealógica literal del hebreo, que prepara la lista de clanes. «Levitas» sería idiomático, pero borra la forma explícita del texto fuente.
- source_word: לְגֵרְשׁוֹן קְהָת וּמְרָרִי
  english_pob_choice: Gershon, Kohath, and Merari
  chosen_spanish: Gersón[a], Coat y Merari
  alternatives_spanish:
  - para Gersón, Coat y Merari
  - Gersón, Coat y Merari
  lexicon: HALOT
  rationale: 'Los nombres designan los tres clanes principales levíticos. En español se usan las formas habituales de transliteración bíblica: Gersón y Coat. La nota marca la alternativa sintáctica donde la preposición hebrea puede entenderse más explícitamente con la lista.'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios recientes; el español sigue la lectura estable del hebreo y conserva la alternativa sintáctica documentada para la lista final.
  spanish_consistency_notes:
  - Se mantiene «Leví» y no «Levita(s)» para reflejar la estructura genealógica del hebreo.
  - 'Se eligieron formas bíblicas españolas corrientes de los nombres propios: Gersón, Coat y Merari.'
  - La puntuación con dos puntos reproduce la organización discursiva del inglés y hace clara la enumeración.
  - No se añadió una nota doctrinal porque el versículo es organizativo y no presenta una tensión teológica explícita.
