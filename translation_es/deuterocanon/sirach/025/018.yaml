translation:
  language: es
  text: Su marido se sienta entre sus compañeros[a], y sin juicio gime.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Su marido se reclinará entre sus vecinos/compañeros, y al oírlo, gimió amargamente». Esto refleja una divergencia notable respecto del hebreo conservado, especialmente en el segundo hemistiquio.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲלָה
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto, בעל con sufijo femenino se refiere al esposo de la mujer. «Marido» es natural en español y mantiene la relación conyugal sin introducir una ambigüedad de posesión como «señor/amo».
- source_word: בֵּין רֵעִים
  english_pob_choice: among his companions
  chosen_spanish: entre sus compañeros
  alternatives_spanish:
  - entre sus amigos
  - entre sus allegados
  lexicon: HALOT
  rationale: El hebreo expresa un estar en medio de compañeros o amigos. «Entre sus compañeros» conserva el marco social y evita cargar el término con una intimidad mayor que la que exige el texto.
- source_word: יֵשֵׁב
  english_pob_choice: sits
  chosen_spanish: se sienta
  alternatives_spanish:
  - está sentado
  - se reclina
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sentarse». En español, «se sienta» conserva la acción sin forzar un presente estático; se deja aparte «se reclina», que pertenece al matiz griego y se registra en nota.
- source_word: וּבְלֹא טַעֲמוֹ
  english_pob_choice: without sense
  chosen_spanish: sin sentido
  alternatives_spanish:
  - sin entendimiento
  - sin discernimiento
  - sin juicio
  lexicon: HALOT
  rationale: טַעַם puede abarcar gusto, juicio, discernimiento o sentido. Aquí el audit trail inglés prefirió «sense»; «sin sentido» refleja ese valor con claridad en español y evita una paráfrasis interpretativa excesiva.
- source_word: יִתְאַנָּח
  english_pob_choice: he groans
  chosen_spanish: gime
  alternatives_spanish:
  - suspira
  - se lamenta
  - gime con amargura
  lexicon: HALOT
  rationale: El verbo expresa un lamento audible y cargado. «Gime» transmite mejor ese peso que «suspira»; en español suena idiomático y suficientemente fuerte para el contexto.
theological_decisions:
- issue: Elección de la base hebrea frente al paralelo griego
  english_pob_reading: 'Main text follows the extant Hebrew: the husband sits among companions and groans without understanding. Greek parallel is preserved in a footnote because it diverges notably, especially in the second colon.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado: el marido está entre sus compañeros y gime sin sentido.'
  alternative_spanish_readings:
  - 'La versión griega: «Su marido se reclinará entre sus vecinos/compañeros, y al oírlo, gimió amargamente».'
  - «Su marido se recostará entre sus compañeros, y al oírlo, gimió amargamente».
  rationale: En Sirácides, cuando el hebreo está conservado y es confiable, debe gobernar la traducción principal. El griego muestra una divergencia real en ambos miembros; por eso se mantiene el hebreo en el texto y se documenta la variante griega en nota sin suplantar el testimonio principal.
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo conservado en Sirácides, usando el griego como testigo paralelo cuando diverge.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que ajustó טַעַם de «understanding» a «sense» para reflejar mejor el matiz del hebreo. En español se optó por «sin sentido», que mantiene ese ajuste semántico de forma natural y publicable.
  spanish_consistency_notes:
  - Se preservó «marido» para בַּעֲלָה, evitando «señor» o «amo», que introducirían una lectura ajena al contexto conyugal.
  - Se tradujo טַעַם con una expresión de falta de sentido/juicio, manteniendo la tensión entre juicio, discernimiento y sentido sin resolverla de manera excesiva.
  - La nota refleja la variante griega sin desplazar el hebreo, conforme al expediente de Sirácides.
  - Se evitó «Cristo/SEÑOR» u otras fórmulas no pertinentes; no hay nombres divinos en el versículo.
