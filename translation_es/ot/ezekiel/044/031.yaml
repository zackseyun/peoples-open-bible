  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Sacerdotes», «aves» y «ganado» están bien. La revisión necesaria es léxica-contextual: sustituir «carroña» por una expresión más fiel a נְבֵלָה, y alinear טְרֵפָה con la precisión del POB inglés revisado.'
