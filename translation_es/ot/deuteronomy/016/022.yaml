translation:
  language: es
  text: Y no levantarás para ti un pilar[a], que Yahvé tu Dios aborrece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra erigida» o «piedra de culto». El término hebreo se refiere a una piedra levantada asociada con la adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָקִים
  english_pob_choice: set up
  chosen_spanish: levantarás
  alternatives_spanish:
  - erigirás
  - pondrás
  lexicon: HALOT
  rationale: El hiphil de קום aquí indica hacer que algo quede en pie, es decir, erigirlo. «Levantar» comunica bien esa acción en español sin sonar demasiado técnico.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para ti solo
  lexicon: HALOT
  rationale: El dativo expresa involucramiento personal; «para ti» mantiene esa referencia directa y natural en español, equivalente al matiz reflexivo del inglés auditado.
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: piedra erigida
  alternatives_spanish:
  - pilar
  - piedra en pie
  - piedra ritual
  lexicon: HALOT
  rationale: El término hebreo designa una piedra levantada/erigida con asociación cultual. En español, «piedra erigida» conserva la idea material y la acción de levantarla sin añadir «sagrada», que no está explícito en el hebreo y fue retirado en la revisión inglesa.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Introduce una relativa sobre «piedra erigida». «La cual» conserva la referencia formal del antecedente no personal y suena natural en registro bíblico español.
- source_word: שָׂנֵא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - detesta
  lexicon: HALOT
  rationale: El verbo expresa fuerte aversión. «Aborrece» comunica con fuerza esa repulsión y evita un tono demasiado coloquial para el registro bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme al criterio doctrinal del proyecto, en vez de sustituirlo por un título como «SEÑOR».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios el cual es tu Dios
  lexicon: HALOT
  rationale: Expresión covenantal estándar en segunda persona. «Tu Dios» refleja de forma directa el sufijo posesivo hebreo y la relación pactal.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. Siguiendo la pauta del proyecto, se translitera como «Yahvé» para preservar el nombre personal de Dios, en lugar de sustituirlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Naturaleza de מַצֵּבָה
  english_pob_reading: pillar
  chosen_spanish_reading: piedra erigida
  alternative_spanish_readings:
  - pilar
  - piedra ritual
  - monolito
  rationale: La revisión inglesa eliminó «sacred» para no expandir el sentido. La formulación española evita también añadir sacralidad no explícita y conserva el carácter de objeto erigido asociado al culto.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
- issue: Verbo de rechazo divino
  english_pob_reading: hates
  chosen_spanish_reading: aborrece
  alternative_spanish_readings:
  - odia
  - detesta
  rationale: El hebreo שָׂנֵא expresa odio/aversión fuerte. «Aborrece» mantiene la intensidad sin atenuarla y encaja con el tono bíblico del pasaje.
  doctrine_reference: HALOT lexical force for שָׂנֵא
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada para retirar «sacred» de מַצֵּבָה por ser una expansión interpretativa no explícita en el hebreo. En español se siguió esa revisión, evitando términos que añadan sacralidad no indicada por el texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se mantiene «tu Dios» para אֱלֹהֶיךָ como fórmula pactal natural.
  - «Piedra erigida» intenta preservar el objeto cultual sin introducir adjetivos no presentes en el hebreo.
  - El tono global es bíblico pero contemporáneo, evitando calcos innecesarios.
