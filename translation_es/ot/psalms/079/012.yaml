revisions:
- from: Y devuelve a nuestros vecinos siete veces en su seno[a], el oprobio con que te han deshonrado, oh Señor.
  to: Y devuelve a nuestros vecinos, siete veces, en su regazo[a], el oprobio con que te afrentaron, oh Señor.
  rationale: Se revisa para preservar mejor el campo léxico de חרפה/חרף mediante «oprobio ... afrentaron», mantener una imagen idiomática más natural en español con «regazo», y pulir la puntuación. El cambio es menor y no requiere adjudicación adicional.
