translation:
  language: es
  text: Y ahora[a], Señor, ¿qué espero? Mi esperanza está en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y ahora, Señor, ¿qué he esperado? Mi esperanza está en ti». El verbo hebreo קוה puede expresar tanto esperar como esperar con esperanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Ahora
  lexicon: HALOT
  rationale: Conserva el enlace conjuntivo de ו y el adverbio temporal עתה en un giro natural en español. «Y ahora» mantiene el movimiento discursivo del verso sin forzar contraste inexistente.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - para qué
  - por qué
  lexicon: HALOT
  rationale: 'En la pregunta retórica, «qué» reproduce bien el interrogativo breve del hebreo y funciona de manera idiomática en español: «¿qué espero?».'
- source_word: קִּוִּיתִי
  english_pob_choice: do I wait for
  chosen_spanish: espero
  alternatives_spanish:
  - he esperado
  - aguardo
  - espero con confianza
  lexicon: HALOT
  rationale: קוה puede abarcar esperar y esperar con esperanza. Aquí se privilegia «espero» porque en español comunica de modo natural la orientación actual del salmista y puede incluir el matiz de esperanza sin añadir paráfrasis.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se trata del título reverencial dirigido a Dios. En español, «Señor» es la correspondencia más directa y reverente para esta forma de tratamiento; se evita «mi Señor» porque el uso litúrgico aquí es vocativo y no posesivo.
- source_word: תּוֹחַלְתִּי
  english_pob_choice: My hope
  chosen_spanish: Mi esperanza
  alternatives_spanish:
  - Mi expectativa
  - Mi espera
  - Mi anhelo
  lexicon: HALOT
  rationale: El sustantivo expresa esperanza/expectativa. «Mi esperanza» es la opción más natural y central en español, y preserva la fuerza emocional y teológica del hebreo.
- source_word: לְךָ
  english_pob_choice: is in you
  chosen_spanish: está en ti
  alternatives_spanish:
  - es hacia ti
  - depende de ti
  - es para ti
  lexicon: HALOT
  rationale: La preposición ל marca dirección o referencia de la esperanza. «Está en ti» comunica dependencia y orientación hacia Dios con naturalidad en español, sin exagerar el matiz locativo.
- source_word: הִיא
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - ello es
  lexicon: HALOT
  rationale: La forma pronominal resume «mi esperanza». En español se integra de manera fluida con la frase copulativa «está en ti», evitando una repetición forzada de «ello» o un calco rígido.
theological_decisions:
- issue: Título divino אֲדֹנָי en vocativo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  - Señor Yahvé
  rationale: El hebreo usa el título reverencial dirigido a Dios. La traducción al título español tradicional «Señor» respeta el registro devocional y conserva la función de invocación.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; title rendering principle for divine lordship language'
translation_notes:
  revision_awareness: Se corrigió la presentación de la nota para que el marcador [a] aparezca explícitamente en el texto español. La redacción sigue el audit trail inglés y mantiene la ambigüedad lexical de קוה entre esperar y esperar con esperanza.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en versales para mantener el nombre/título según la política española del proyecto; aquí se usa «Señor» como título reverencial.
  - «Mi esperanza está en ti» conserva la orientación de confianza sin introducir una idea más interpretativa que la del hebreo.
  - El registro es bíblico, moderno y sobrio, sin arcaísmos innecesarios.
