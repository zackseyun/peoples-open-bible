translation:
  language: es
  text: En sus días se construyó el muro con torres en las esquinas[a][b], una morada como un palacio real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea es difícil; literalmente, 'muro de las esquinas'. Puede aludir a secciones de esquina, torres en las esquinas o un recinto fortificado.
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice algo muy distinto: ''En sus días se redujo un depósito de aguas; su contorno de bronce era como el mar'', lo que sugiere un texto subyacente diferente o una línea corrompida en una de las tradiciones.'
    reason: textual_variant
lexical_decisions:
- source_word: אֲשֶׁר בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - en su tiempo
  - durante sus días
  lexicon: HALOT
  rationale: La cláusula temporal se vierte de manera directa y idiomática en español, conservando el vínculo con los hechos atribuidos a su período de gobierno.
- source_word: נִבְנָה
  english_pob_choice: was built
  chosen_spanish: se construyó
  alternatives_spanish:
  - fue construido
  - se edificó
  lexicon: HALOT
  rationale: El pasivo de בנה puede expresarse naturalmente con una construcción pronominal en español; 'se construyó' suena fluido sin perder el valor pasivo del hebreo.
- source_word: קִיר
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: HALOT
  rationale: Aunque 'wall' puede ser 'pared' o 'muralla', 'muro' funciona mejor para una estructura defensiva o monumental y mantiene el sentido arquitectónico amplio.
- source_word: פִּנּוֹת
  english_pob_choice: with corner towers
  chosen_spanish: con torres en las esquinas
  alternatives_spanish:
  - con esquinas
  - con torreones en las esquinas
  - de las esquinas
  lexicon: HALOT
  rationale: El hebreo es breve y algo difícil; la versión inglesa ya interpretó la frase como 'corner towers'. En español, 'torres en las esquinas' comunica esa lectura sin exagerar el grado de certeza.
- source_word: מָעוֹן
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - morada
  - vivienda
  lexicon: HALOT
  rationale: '''Morada'' conserva el sentido de lugar de habitación y suena más natural y solemne que una traducción demasiado técnica.'
- source_word: כְּהֵיכַל מֶלֶךְ
  english_pob_choice: like a royal palace
  chosen_spanish: como palacio real
  alternatives_spanish:
  - como un palacio real
  - como el palacio de un rey
  lexicon: HALOT
  rationale: '''היכל'' aquí encaja mejor como ''palacio'' que como ''templo''. La comparación se mantiene con una formulación natural en español.'
- source_word: ἐν ἡμέραις αὐτοῦ ἠλαττώθη ἀποδοχεῖον ὑδάτων, χαλκὸς ὡσεὶ θαλάσσης τὸ περίμετρον
  english_pob_choice: used as a control on the Hebrew, not followed in the main text
  chosen_spanish: No se sigue en el texto principal; se registra como variante griega.
  alternatives_spanish:
  - En sus días se redujo un depósito de aguas; el bronce alrededor era como el mar.
  lexicon: BDAG
  rationale: La tradición griega difiere notablemente del hebreo conservado y parece reflejar otra Vorlage o una transmisión distinta/corrupta. Por fidelidad al testimonio hebreo disponible, la línea principal sigue el hebreo y la divergencia griega queda señalada en nota.
translation_notes:
  revision_awareness: La redacción principal sigue el hebreo de Kahana/Geniza, que aquí es el testimonio principal. Se tuvo en cuenta la revisión inglesa que prefirió 'with corner towers' frente a 'of the corners', y se evitó imponer una solución más precisa de lo que permite el hebreo. La divergencia griega se conserva como variante textual importante, no integrada en la línea principal.
  spanish_consistency_notes:
  - Se conserva el tono sobrio y documental propio de la POB.
  - '''Muro'' y ''torres'' mantienen el campo arquitectónico sin recurrir a un lenguaje eclesiástico no atestiguado.'
  - No se usa 'SEÑOR' ni terminología teológica no presente en el versículo.
  - La nota marca la ambigüedad de פִּנּוֹת sin resolverla de forma excesiva.
