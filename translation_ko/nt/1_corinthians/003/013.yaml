  text: ἑκάστου τὸ ἔργον φανερὸν γενήσεται, ἡ γὰρ ἡμέρα δηλώσει· ὅτι ἐν πυρὶ ἀποκαλύπτεται, καὶ ἑκάστου τὸ ἔργον ὁποῖόν ἐστιν τὸ πῦρ ⸀αὐτὸ δοκιμάσει.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/003/013.yaml
  text: each one’s work will become evident[a], for the Day will disclose it, because it is revealed in fire[b], and the fire itself will test what sort of work each one has.
  footnotes:
  - marker: a
    text: 'Or ''because it is revealed by fire.'' The Greek phrase ἐν πυρί may be understood as ''in fire'' or instrumentally as ''by fire.'''
    reason: lexical_alternative
  - marker: b
    text: '''The Day'' likely refers to the future day of divine evaluation or judgment.'
    reason: cross_reference
translation:
  language: ko
  text: 각 사람의 일이 드러나게 될 것입니다. 이는 그 날이 그것을 밝히 보여 줄 것이기 때문입니다. 그것은 불로 나타나며, 각 사람의 일이 어떠한 것인지 그 불이 그것을 시험할 것입니다.
  philosophy: optimal-equivalence
