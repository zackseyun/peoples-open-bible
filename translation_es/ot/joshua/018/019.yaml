  to: Entonces el límite pasó a la ladera norte de Bet-hogla, y el límite terminó en la lengua[a] del Mar Salado[b], en el extremo sur del Jordán. Este es el límite meridional.
  rationale: Se ajusta כֶּתֶף a 'ladera' para mayor naturalidad geográfica en español, se reubica correctamente la nota sobre 'Mar Muerto' al término 'Mar Salado', y se pule la clausula final a 'límite meridional' para mejor español sin alterar el sentido fuente.
