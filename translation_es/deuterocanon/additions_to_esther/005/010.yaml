translation:
  language: es
  text: Porque Amán hijo de Hammedata[a], un macedonio, ajeno a la sangre persa[b] y muy alejado de nuestra benevolencia, aunque había sido recibido por nosotros como huésped,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: ‘un macedonio’. Este etnónimo pertenece al enunciado de la adición griega y puede reflejar el marco histórico o el tono polémico de la tradición.'
    reason: cultural_note
  - marker: b
    text: La frase griega detrás de ‘ajeno a la sangre persa’ es sintácticamente difícil; el sentido es que Amán no era verdaderamente de linaje persa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἁμὰν Ἁμαδάθου
  english_pob_choice: Haman son of Hammedatha
  chosen_spanish: Haman hijo de Hammedata
  alternatives_spanish:
  - Haman, de Hammedata
  lexicon: LSJ
  rationale: El genitivo patronímico se vuelve de manera natural en español con ‘hijo de’, conservando la identificación personal sin forzar una construcción ajena al español bíblico contemporáneo.
- source_word: Μακεδὼν
  english_pob_choice: a Macedonian
  chosen_spanish: un macedonio
  alternatives_spanish:
  - macedonio
  lexicon: LSJ
  rationale: El griego da un apelativo étnico/nacional que conviene preservar en la traducción principal. El artículo indefinido reproduce con naturalidad el valor appositivo del término.
- source_word: ταῖς ἀληθείας ἀλλότριος
  english_pob_choice: being alien to the Persian blood
  chosen_spanish: ajeno a la sangre persa
  alternatives_spanish:
  - extraño a la sangre persa
  - ajeno al linaje persa
  lexicon: LSJ
  rationale: El giro es sintácticamente difícil; la revisión inglesa retiró ‘true’ por no estar bien sustentado. En español, ‘ajeno a’ conserva ἀλλότριος y ‘sangre persa’ mantiene el campo de parentesco/linaje sin añadir una glosa no exigida por el griego.
- source_word: τοῦ τῶν Περσῶν αἵματος
  english_pob_choice: the Persian blood
  chosen_spanish: la sangre persa
  alternatives_spanish:
  - la sangre de los persas
  - el linaje persa
  lexicon: LSJ
  rationale: Aquí ‘sangre’ funciona como descendencia o linaje. Se mantiene el sustantivo porque el texto griego usa esa imagen de forma explícita y no meramente metafórica.
- source_word: πολὺ διεστηκὼς
  english_pob_choice: far removed
  chosen_spanish: muy alejado
  alternatives_spanish:
  - lejos separado
  - grandemente distanciado
  lexicon: LSJ
  rationale: El participio perfecto expresa un estado de separación marcada. ‘Muy alejado’ es idiomático en español y preserva la distancia evaluativa del griego.
- source_word: τῆς ἡμετέρας χρηστότητος
  english_pob_choice: from our goodwill
  chosen_spanish: de nuestra benevolencia
  alternatives_spanish:
  - de nuestra bondad
  - de nuestra buena disposición
  lexicon: LSJ
  rationale: χρηστότης puede ser bondad, benignidad o benevolencia. En el marco cortesano-político del pasaje, ‘benevolencia’ comunica mejor una disposición favorable sin volverla meramente sentimental.
- source_word: ἐπιξενωθεὶς ἡμῖν
  english_pob_choice: though he had been received by us as a guest
  chosen_spanish: aunque había sido recibido por nosotros como huésped
  alternatives_spanish:
  - aunque lo habíamos hospedado
  - habiendo sido acogido por nosotros como huésped
  lexicon: LSJ
  rationale: El verbo pasivo sugiere hospitalidad/ser recibido como invitado. ‘Huésped’ conserva el matiz de acogida y la concesión introducida por ‘aunque’.
theological_decisions:
- issue: Conservar el etnónimo macedonio en el texto principal
  english_pob_reading: Retain 'a Macedonian' in the main text
  chosen_spanish_reading: Mantener ‘un macedonio’ en el texto principal
  alternative_spanish_readings:
  - suavizar a ‘extranjero’
  - omitir el etnónimo por parecer polémico
  rationale: La evidencia griega leída por la POB contiene explícitamente Μακεδών. Dado que la tarea es traducir el testimonio griego, el calificativo étnico debe permanecer auditable en el texto principal, aun si históricamente resulta llamativo.
  doctrine_reference: Primacía del testimonio original; preservar lecturas difíciles del texto base.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que eliminó ‘true’ antes de ‘Persian blood’ por no estar bien apoyado por ταῖς ἀληθείας. La redacción española evita añadir ese adjetivo y conserva la tensión sintáctica del original sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se mantiene ‘Haman’ sin adaptación adicional por tratarse de un nombre propio ya estabilizado en español bíblico.
  - Se usa ‘sangre’ en sentido de linaje para conservar el campo semántico del griego.
  - Se prefiere ‘benevolencia’ sobre ‘bondad’ para reflejar el registro cortesano del contexto.
  - El tono general busca ser formal y publicable, sin rebajar la aspereza del sintagma griego.
