translation:
  language: es
  text: Estoy olvidado como un hombre muerto, fuera del recuerdo[a]; he llegado a ser como una vasija perdida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «del corazón»; el hebreo usa un modismo para decir que ya no se me recuerda.
    reason: lexical_alternative
  - marker: b
    text: O «como una vasija arruinada»; אֹבֵד puede implicar perdido, perecido o arruinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁכַּחְתִּי
  english_pob_choice: I am forgotten
  chosen_spanish: Estoy olvidado
  alternatives_spanish:
  - He sido olvidado
  - Soy olvidado
  lexicon: HALOT
  rationale: El nifal perfecto 1cs expresa el estado resultante de alguien que ha quedado olvidado. En español, "estoy olvidado" comunica de manera natural ese estado presente sin forzar una perífrasis demasiado pesada.
- source_word: כְּמֵת
  english_pob_choice: like a dead man
  chosen_spanish: como un hombre muerto
  alternatives_spanish:
  - como un muerto
  - como el muerto
  lexicon: HALOT
  rationale: El comparativo con כ marca semejanza. "Un hombre muerto" conserva la imagen singular y personal del hebreo; "como un muerto" sería posible, pero menos preciso respecto de la forma.
- source_word: מִלֵּב
  english_pob_choice: out of mind
  chosen_spanish: fuera de la memoria
  alternatives_spanish:
  - fuera del corazón
  - fuera del pensamiento
  - fuera del recuerdo
  lexicon: HALOT
  rationale: La expresión literal "del corazón" se refiere idiomáticamente al ámbito interior de recordar/pensar. En español, "fuera de la memoria" transmite la idea de no ser ya recordado sin sonar antinatural ni perder el valor idiomático.
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: he venido a ser
  alternatives_spanish:
  - he llegado a ser
  - me he vuelto
  - fui
  lexicon: HALOT
  rationale: El perfecto qal introduce un estado resultante. "He venido a ser" conserva el matiz de transición y resultado mejor que un simple pasado narrativo.
- source_word: כִּכְלִי
  english_pob_choice: like a vessel
  chosen_spanish: como un vaso
  alternatives_spanish:
  - como un recipiente
  - como un utensilio
  - como un vaso
  lexicon: HALOT
  rationale: כְלִי es un término amplio para objeto/implemento/vasija. "Vaso" es una opción española más concreta pero todavía suficientemente amplia y poética; evita el tecnicismo de "implemento".
- source_word: אֹבֵד
  english_pob_choice: that is lost
  chosen_spanish: perdido
  alternatives_spanish:
  - extraviado
  - arruinado
  - destruido
  lexicon: HALOT
  rationale: El participio puede significar "perdido" o "perecido/arruinado". Siguiendo la revisión inglesa hacia "lost", "perdido" mantiene la correspondencia léxica y la ambigüedad útil entre objeto extraviado y objeto ya inútil o desechado.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió "lost" frente a "perishing" para אֹבֵד, manteniendo una formulación formal y natural. El español adopta "perdido" y conserva en nota la alternativa "arruinado" para no perder la amplitud semántica del participio.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó "SEÑOR" y no hay necesidad de notas teológicas adicionales en este texto poético.
  - '"Olvidado/perdido" se usa en sentido de estado resultante, coherente con los perfectos hebreos.'
