  text: כִּ֤י יְהוָ֨ה אֹ֘הֵ֤ב מִשְׁפָּ֗ט וְ/לֹא יַעֲזֹ֣ב אֶת חֲ֭סִידָי/ו לְ/עוֹלָ֣ם נִשְׁמָ֑רוּ וְ/זֶ֖רַע רְשָׁעִ֣ים נִכְרָֽת׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/028.yaml
  text: For Yahweh loves justice and does not forsake his faithful ones[a]; they are kept forever[b], but the offspring of the wicked will be cut off.
  footnotes:
