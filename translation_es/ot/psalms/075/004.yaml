    rationale: La nota a usa 'se estremecen' mientras las decisiones léxicas listan 'se desvanecen'. No afecta el verso principal, pero conviene coherencia editorial en la revisión.
  revised_spanish_text: La tierra y todos los que habitan en ella se desmoronan[a]; yo mismo he afirmado sus pilares[b]. Selah[c]
