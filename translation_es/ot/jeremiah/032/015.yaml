translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos, el Dios de Israel: De nuevo se comprarán[a] casas, campos y viñedos en esta tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “de nuevo comprarán casas, campos y viñedos en esta tierra”. El verbo hebreo está en niphal y puede entenderse menos estrictamente como medio o cuasi pasivo, pero “se comprarán” preserva mejor la forma aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: conservar el nombre divino en forma transliterada y no sustituirlo por un título. En español, ''Yahvé'' es la forma esperable y legible en este registro.'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' conserva el alcance de fuerzas celestiales y terrenales mejor que una transliteración o una solución demasiado litúrgica. Evita además una expresión poco natural en español moderno.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios israelita
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y natural, manteniendo la identificación pactual sin añadir matices que el hebreo no exige.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  lexicon: HALOT
  rationale: En este contexto de restauración futura, 'otra vez' expresa con claridad la reanudación de una actividad normal tras la interrupción. 'De nuevo' sería también posible, pero 'otra vez' suena más fluido antes de la pasiva.
- source_word: יִקָּנוּ
  english_pob_choice: will be bought
  chosen_spanish: se comprarán
  alternatives_spanish:
  - serán compradas
  - comprarán
  lexicon: HALOT
  rationale: El niphal admite un valor pasivo o medio; en español, la pasiva refleja 'se comprarán' transmite con naturalidad la idea de que volverán a realizarse transacciones inmobiliarias. Mantiene el foco en el restablecimiento del mercado, como en el texto hebreo.
- source_word: בָתִּים
  english_pob_choice: Houses
  chosen_spanish: casas
  alternatives_spanish:
  - viviendas
  - hogares
  lexicon: HALOT
  rationale: '''Casas'' es el equivalente más directo y sobrio para bienes inmuebles en este contexto. ''Viviendas'' moderniza demasiado; ''hogares'' introduce una carga afectiva no requerida.'
- source_word: שָׂדוֹת
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos de cultivo
  - terrenos
  lexicon: HALOT
  rationale: '''Campos'' es una equivalencia amplia y natural para tierras agrícolas. ''Terrenos'' sería más genérico y menos agrícola.'
- source_word: כְרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñedos
  alternatives_spanish:
  - viñas
  - parras
  lexicon: HALOT
  rationale: '''Viñedos'' conserva el sentido de propiedad agrícola destinada a la vid y suena más preciso en español que ''viñas'', que puede referirse también a la planta o al conjunto.'
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta región
  lexicon: HALOT
  rationale: '''Tierra'' preserva la resonancia bíblica y pactual del hebreo ''land'' mejor que ''país''. En Jeremías, esta expresión remite a la tierra prometida y al ámbito de restauración.'
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - SEÑOR de los ejércitos
  rationale: Se mantiene la transliteración del Nombre divino y se vierte צְבָאוֹת con un sustantivo transparente en español. No se sustituye por 'SEÑOR' porque el proyecto distingue el Nombre propio de un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Forma verbal de יִקָּנוּ (Niphal)
  english_pob_reading: will be bought
  chosen_spanish_reading: se comprarán
  alternative_spanish_readings:
  - serán compradas
  - comprarán
  rationale: Se conserva el matiz pasivo/medio del niphal. En español, la construcción con 'se' resulta natural y mantiene la idea de que volverá a haber transacciones normales en la tierra, sin forzar un sujeto explícito.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y el hebreo: conserva el Nombre divino como Yahvé, vierte צְבָאוֹת con una expresión natural en español, y refleja el niphal de יִקָּנוּ con una pasiva refleja que no introduce agentes ajenos al texto. No se aplicaron revisiones previas al contenido de esta línea.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se usa 'el Dios de Israel' como traducción directa y consistente de אֱלֹהֵי יִשְׂרָאֵל.
  - '''Otra vez'' expresa la reanudación futura de la compra de propiedades sin añadir interpretación.'
  - '''Se comprarán'' conserva el valor pasivo del hebreo niphal.'
  - '''Esta tierra'' preserva el sentido pactual de land/אָרֶץ en Jeremías.'
