review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia ritual básica del hebreo: el sacerdote moja su dedo en la sangre, rocía siete veces, y lo hace delante de Yahvé frente a la פָּרֹכֶת. También preserva correctamente el nombre divino como «Yahvé». Sin embargo, «en frente del velo» es menos natural en español bíblico y moderno que «delante de la cortina/velo», y dado que el rastro POB en inglés privilegia «curtain» como lectura principal, conviene alinear el español principal con «cortina» y dejar «velo» como alternativa en nota.'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «en frente del» suena menos idiomático que «delante de la». Además, «cortina» comunica mejor el referente arquitectónico en español moderno, mientras que «velo» puede reservarse como alternativa tradicional en nota. El resto del texto es natural y fiel.
  glossary_alignment: «Yahvé» sigue correctamente la política del proyecto para יהוה. No hay conflictos con otros términos doctrinales principales. Para פָּרֹכֶת, el proyecto inglés documenta «curtain» como lectura principal y «veil» como alternativa; por tanto, en español conviene usar «cortina» en el texto principal y conservar «velo» en nota.
  issues:
  - severity: medium
    issue: Uso de «en frente del»
    rationale: Aunque comprensible, es menos idiomático y más torpe que «delante de» para expresar לִפְנֵי / אֵת פְּנֵי en este contexto cultual.
  - severity: medium
    issue: Lectura principal «velo» para פָּרֹכֶת
    rationale: El expediente POB en inglés eligió «curtain» como término principal por claridad arquitectónica moderna. El español puede reflejar mejor esa decisión con «cortina», dejando «velo» como alternativa tradicional en nota.
  revised_spanish_text: Entonces el sacerdote mojará su dedo en la sangre y rociará parte de la sangre siete veces delante de Yahvé[a], delante de la cortina[b].
  revised_footnotes:
  - marker: a
    text: El nombre divino aquí traduce el Tetragrama hebreo יְהוָה.
    reason: source_note
  - marker: b
    text: O «velo». El término hebreo se refiere a la cortina del santuario que separaba el espacio santo.
    reason: lexical_alternative
  revision_rationale: Se ajustó la expresión espacial a un español más natural («delante de») y se alineó la lectura principal de פָּרֹכֶת con la decisión documentada del POB inglés («curtain»), usando «cortina» en el texto principal y preservando «velo» como alternativa en nota.
