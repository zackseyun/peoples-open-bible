  to: 'Entonces David dijo a Yahvé, cuando vio al ángel que golpeaba al pueblo: «He aquí, he pecado y he obrado mal[a]; pero estas ovejas, ¿qué han hecho? Por favor, que tu mano esté contra mí y contra la casa de mi padre[b]».'
  rationale: Se conserva el contenido y la terminología principales del borrador, pero se corrigen las notas para que reflejen el expediente inglés y el sentido del hebreo, y se alisa una formulación española poco natural en el ruego final. También se suprimen pronombres enfáticos innecesarios para un español más fluido sin pérdida de significado.
