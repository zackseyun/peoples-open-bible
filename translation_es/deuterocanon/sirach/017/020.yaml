review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido base del griego: contraste adversativo, destinatarios arrepentidos, don de una ''vuelta/retorno'' y aliento a quienes están desfalleciendo. Sin embargo, falta una nota de cautela textual que sí está en el rastro POB inglés debido a la validación de fuente ''major mismatch''. Además, la nota c en español formula alternativas poco naturales (''fallando a la paciencia''), y conviene ajustar la redacción para preservar la ambigüedad griega de forma más idiomática.'
  spanish_quality_summary: El texto es mayormente claro y digno. 'Sin embargo' y 'les concedió' funcionan bien. 'Un retorno' es fiel aunque algo menos idiomático que 'un regreso'; no obstante, puede mantenerse por su valor técnico-abierto. La mayor debilidad está en la nota c, cuya redacción no suena natural en español. También conviene anclar la cautela textual en el texto mediante una nota adicional, ya que el inglés la preserva explícitamente.
  glossary_alignment: No hay conflicto con los términos base del proyecto. 'Se arrepienten' para μετανοοῦσιν y 'alentó' para παρεκάλεσεν son adecuados. 'Retorno' preserva la apertura semántica de ἐπάνοδον. 'Paciencia' mantiene ὑπομονή; la construcción 'en la paciencia' es aceptable para conservar la compacidad del griego, aunque sigue siendo algo marcada en español.
  issues:
  - severity: medium
    issue: Falta la nota de cautela textual presente en el POB inglés
    rationale: El inglés incluye una nota explícita sobre la incertidumbre de validación de fuente ('major mismatch'). Dado que el proyecto pide preservar notas significativas del rastro auditado, esta ausencia deja fuera información importante para el lector.
  - severity: medium
    issue: La nota alternativa c está formulada con español poco natural
    rationale: Las expresiones 'fallando a la paciencia' y 'fallando para ser pacientes' no son idiomáticas y pueden confundir. Debe conservarse la ambigüedad, pero con formulaciones naturales como 'desfallecían en la paciencia' o 'los animó a tener paciencia'.
  - severity: low
    issue: La doble nota sobre 'retorno' puede simplificarse en función
    rationale: Las notas a y b cubren bien alternativas léxicas y alcance teológico; no es un error, pero conviene mantenerlas bien diferenciadas y añadir la nota textual sin sobrecargar innecesariamente.
  revised_spanish_text: Sin embargo, a los que se arrepienten les concedió un retorno[a][b][c], y alentó a los que iban fallando en la paciencia[d].
  revised_footnotes:
  - marker: a
    text: «Un retorno» también puede entenderse como «un regreso», «una vuelta» o «una restauración».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega puede abarcar un volver a Dios, un restablecimiento o una recuperación; se conserva el alcance abierto del término.
    reason: theological_note
  - marker: c
    text: La fuente griega aquí está marcada con incertidumbre de validación textual («major mismatch»), de modo que la formulación exacta debe tomarse con cierta cautela, aunque el sentido general es claro.
    reason: textual_variant
  - marker: d
    text: 'La frase griega es compacta y también puede entenderse como: «alentó a los que desfallecían en la paciencia» o «alentó a los que desfallecían a tener paciencia».'
    reason: alternative_reading
  revision_rationale: Se mantiene la traducción base porque es fiel y legible, pero se añade la nota de cautela textual exigida por el rastro POB inglés y se corrige la nota de lectura alternativa para que el español sea natural sin perder la ambigüedad del griego. También se reordena la secuencia de notas para que los marcadores sean únicos y completos en el texto.
