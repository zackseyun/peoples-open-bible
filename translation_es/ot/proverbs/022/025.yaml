review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: una advertencia preventiva para no adoptar la conducta de la persona iracunda y así no incurrir en daño personal. Sin embargo, se aparta innecesariamente del verbo hebreo simple ''tomar'' al usar ''te hagas'', que cambia la imagen de incurrir en un lazo por la de fabricárselo o causárselo activamente. También faltan las notas léxicas preservadas en el POB inglés sobre ''sus caminos'' y ''para ti mismo / para tu vida / para tu alma''.'
  spanish_quality_summary: El español es claro y natural, pero 'te hagas una trampa para ti mismo' suena algo torpe e idiomáticamente menos preciso. 'Tomes un lazo para ti mismo' suena más cercano al original, aunque algo literal; una solución equilibrada es 'tiendas un lazo para ti mismo' no corresponde al hebreo. La mejor reparación mínima es 'tomes una trampa para ti mismo', pero sigue siendo algo dura. Más natural y fiel al léxico sapiencial es 'tomes un lazo para ti mismo', con nota aclaratoria. También conviene usar 'no sea que' en vez de 'para que no' porque refleja mejor el valor precautorio de פֶּן.
  glossary_alignment: No hay términos del glosario mayor en juego. En léxico local, conviene alinear mejor וְלָקַחְתָּ con 'tomes' y preservar la metáfora de מוֹקֵשׁ con 'lazo' o 'trampa'; 'lazo' encaja mejor en literatura sapiencial. Las alternativas del POB inglés deben conservarse en notas en español.
  issues:
  - severity: medium
    issue: '''para que no'' debilita el matiz de advertencia de פֶּן'
    rationale: פֶּן introduce una cautela tipo 'no sea que / lest', no simplemente una finalidad negativa. 'No sea que' reproduce mejor la fuerza proverbial.
  - severity: high
    issue: '''te hagas'' no refleja fielmente וְלָקַחְתָּ (''y tomes'')'
    rationale: El hebreo usa el verbo ordinario 'tomar'. 'Te hagas' desplaza la imagen y sugiere fabricarse o causarse la trampa, más interpretativo que el original.
  - severity: medium
    issue: Faltan las notas léxicas del POB sobre 'sus caminos' y לְנַפְשֶׁךָ
    rationale: El expediente inglés preserva alternativas significativas; además, en español 'para ti mismo' puede beneficiarse de una nota que aclare 'vida/alma/persona'.
  - severity: low
    issue: '''trampa'' es comprensible, pero ''lazo'' preserva mejor la metáfora sapiencial'
    rationale: Ambas opciones son válidas; 'lazo' suena más bíblico y figurado, y combina mejor con el verbo 'tomar' en este contexto.
  revised_spanish_text: no sea que aprendas sus caminos[a] y tomes un lazo para ti mismo[b].
