translation:
  language: es
  text: Y Heber engendró a Jaflet, a Somer[a], a Hotam y a Súa[b], la hermana de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Semer».
    reason: lexical_alternative
  - marker: b
    text: O «Suá». Otra forma transliterada es «Shuah».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבֶר
  english_pob_choice: Heber
  chosen_spanish: Heber
  alternatives_spanish:
  - Heber
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma transliterada usual en español para mantener identificabilidad genealógica.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En genealogías, el verbo hiphil de ילד expresa paternidad/descendencia. «Engendró» comunica bien la relación genealógica en español sin perder el valor activo del verbo.
- source_word: יַפְלֵט
  english_pob_choice: Japhlet
  chosen_spanish: Jaflet
  alternatives_spanish:
  - Japhlet
  lexicon: HALOT
  rationale: Nombre propio; en español conviene adaptar la y inicial al uso gráfico español con J, manteniendo la transliteración del nombre.
- source_word: שׁוֹמֵר
  english_pob_choice: Shomer
  chosen_spanish: Somer
  alternatives_spanish:
  - Shomer
  - Shemer
  lexicon: HALOT
  rationale: Nombre propio. La forma española puede simplificarse a «Somer» para fluidez, pero se conserva en notas la variante posible «Shemer» reflejada en la tradición textual/onomástica inglesa.
- source_word: חוֹתָם
  english_pob_choice: Hotham
  chosen_spanish: Hotam
  alternatives_spanish:
  - Hotham
  lexicon: HALOT
  rationale: Nombre propio; se adapta ortográficamente al español como transliteración sencilla y reconocible.
- source_word: שׁוּעָא
  english_pob_choice: Shua
  chosen_spanish: Súa
  alternatives_spanish:
  - Shua
  - Shuah
  lexicon: HALOT
  rationale: Nombre propio. «Súa» refleja la vocalización hebrea y se lee con naturalidad en español; se deja constancia de la variante inglesa «Shuah» para transparencia.
- source_word: אֲחוֹתָם
  english_pob_choice: their sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ellos
  - su hermana
  lexicon: HALOT
  rationale: 'El sufijo 3mp indica posesión plural: «su hermana» es natural en español y conserva la referencia colectiva a los hermanos nombrados. El contexto genealógico aclara que se trata de un apuesto final, no de una nueva acción verbal.'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al hebreo masorético y al rastro auditado en inglés. No se detectaron cambios textuales de fondo; la decisión principal fue conservar la estructura genealógica simple y adaptar los nombres propios a una forma española legible, manteniendo transparencia sobre variantes onomásticas ya documentadas en la POB inglesa.
  spanish_consistency_notes:
  - Se usó «engendró» para mantener el valor genealógico de הוֹלִיד en un registro bíblico natural en español.
  - Se prefirió «su hermana» para אֲחוֹתָם por claridad y fidelidad al sufijo plural.
  - Los nombres propios se transliteran con ortografía española cuando ayuda a la pronunciación, sin alterar su identificación con las formas inglesas auditadas.
