translation:
  language: es
  text: Tú solo mirarás con tus ojos y verás la retribución[a] de los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la paga», «la recompensa» o «el castigo» de los malvados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: HALOT
  rationale: 'Marca restricción/enfasis: el destinatario no participa en el destino descrito, sino que lo observa. «Solo» es natural en español y conserva la limitación del hebreo.'
- source_word: בְּעֵינֶיךָ
  english_pob_choice: with your eyes
  chosen_spanish: con tus ojos
  alternatives_spanish:
  - con tus propios ojos
  - por tus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para visión personal directa. «Con tus ojos» mantiene la imagen sin añadir énfasis innecesario.
- source_word: תַבִּיט
  english_pob_choice: you will look
  chosen_spanish: mirarás
  alternatives_spanish:
  - verás
  - contemplarás
  lexicon: HALOT
  rationale: El hifil de נבט suele expresar mirar o fijar la vista. «Mirarás» reproduce bien el acto de observar y se combina naturalmente con el verbo siguiente.
- source_word: וְשִׁלֻּמַת
  english_pob_choice: the repayment
  chosen_spanish: la paga[a]
  alternatives_spanish:
  - la retribución
  - el pago
  - la recompensa
  lexicon: HALOT
  rationale: El sustantivo derivado de שלם puede denotar paga/retribución/repago. «La paga» conserva la idea de retribución debida sin cerrarla demasiado en sentido penal; se deja la alternativa en nota porque el hebreo admite más de una matización.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: Es el plural sustantivado habitual para una categoría moral negativa. «Malvados» es claro en español moderno; «impíos» sería más tradicional pero puede sonar más eclesiástico que el hebreo.
- source_word: תִּרְאֶה
  english_pob_choice: and see
  chosen_spanish: verás
  alternatives_spanish:
  - y verás
  - y contemplarás
  lexicon: HALOT
  rationale: Qal simple de ראה. En español, coordinar con «mirarás» mediante «y verás» sería muy literal; al unir la frase, «mirarás ... y verás» preserva el paralelismo sin forzar la sintaxis.
theological_decisions:
- issue: Naturaleza de la retribución de los malvados
  english_pob_reading: the repayment of the wicked
  chosen_spanish_reading: la paga de los malvados
  alternative_spanish_readings:
  - la retribución de los malvados
  - el castigo de los malvados
  - la recompensa de los malvados
  rationale: 'El hebreo שִׁלֻּמַת es más amplio que un castigo explícito; puede expresar retribución, paga o repago. «La paga» mantiene la tensión: algo les acontece a los malvados, pero el verso no especifica mecánicamente si el foco es castigo, retribución o compensación.'
  doctrine_reference: Preservar la tensión léxica y no resolverla de antemano.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una coma por fluidez, sin cambiar el sentido. En español se adopta una sola cláusula corrida, manteniendo el paralelismo verbal del hebreo.
  spanish_consistency_notes:
  - Se mantiene «solo» para רַק como marca de restricción.
  - Se evita «SEÑOR» porque aquí no aparece el tetragrámaton ni un sustituto reverencial.
  - Se usa «malvados» para רְשָׁעִים por consistencia con la categoría moral del hebreo y por claridad contemporánea.
  - Se conserva la ambigüedad de שִׁלֻּמַת en una nota, sin sustituirla directamente por un término más doctrinalmente cargado.
