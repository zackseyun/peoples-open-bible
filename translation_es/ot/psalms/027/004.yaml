    rationale: La auditoría inglesa conserva explícitamente la dificultad semántica del verbo y sus alternativas. El español debe preservar esa apertura, especialmente porque 'inquirir' puede resultar menos transparente para algunos lectores.
  - severity: medium
    issue: El orden y correspondencia de marcadores de nota no siguen el texto revisado necesario.
    rationale: Si se incluyen notas, deben aparecer con marcadores únicos y en orden en el lugar exacto del texto correspondiente.
