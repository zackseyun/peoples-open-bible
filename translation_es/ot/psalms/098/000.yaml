  text: מִזְמ֡וֹר שִׁ֤ירוּ לַֽ/יהוָ֨ה שִׁ֣יר חָ֭דָשׁ כִּֽי נִפְלָא֣וֹת עָשָׂ֑ה הוֹשִֽׁיעָה לּ֥/וֹ יְ֝מִינ֗/וֹ וּ/זְר֥וֹעַ קָדְשֽׁ/וֹ׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/098/000.yaml
  text: A psalm. Sing to Yahweh a new song[a], for he has done wondrous things; his right hand and his holy arm have brought him salvation.
  footnotes:
  - marker: a
    text: 'Or: “have saved him” or “have won salvation for him.” The Hebrew expression can be rendered more literally, but here it conveys that the LORD’s own power has achieved deliverance/victory.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:23Z'
    unchanged: false
    changes_summary: 'Expanded the draft to include the full superscription and verse content from the source: the call to sing to Yahweh a new song, the reason clause, and the statement about his right hand and holy arm bringing salvation for him.'
translation:
  language: es
  text: Salmo. Canten a Yahvé un cántico nuevo, porque ha hecho maravillas; su mano derecha y su santo brazo le han logrado salvación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo han salvado» o «han ganado salvación para él». La expresión hebrea puede traducirse de manera más literal, pero aquí comunica que el propio poder de Yahvé ha realizado la liberación o victoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמֹור
  english_pob_choice: A psalm.
  chosen_spanish: Salmo.
  alternatives_spanish:
  - Un salmo.
  - Salmo de alabanza.
  lexicon: lexical item for superscription genre
  rationale: Se mantiene la designación breve de encabezado genérico como en el texto fuente, sin añadir contenido no explicitado por el hebreo.
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canta
  - Canten ustedes
  lexicon: Qal imperative plural
  rationale: El imperativo plural reproduce la exhortación comunitaria del hebreo y suena natural en español bíblico contemporáneo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: divine name
  rationale: Se conserva el nombre divino según la pauta del proyecto, evitando la sustitución por una convención de ocultamiento.
- source_word: שִׁיר חָדָשׁ
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - un canto nuevo
  - una canción nueva
  lexicon: poetic expression
  rationale: “Cántico” conserva mejor el registro litúrgico y poético de la expresión hebrea que “canción”, sin perder naturalidad en español.
- source_word: נִפְלָאוֹת עָשָׂה
  english_pob_choice: he has done wondrous things
  chosen_spanish: ha hecho cosas maravillosas
  alternatives_spanish:
  - ha hecho maravillas
  - ha obrado cosas asombrosas
  lexicon: wondrous deeds formula
  rationale: Se preserva el sentido de obras portentosas o maravillosas. “Cosas maravillosas” sigue de cerca la amplitud del hebreo sin forzar un tecnicismo.
- source_word: הוֹשִׁיעָה לּוֹ
  english_pob_choice: have worked salvation for him
  chosen_spanish: le han brindado salvación
  alternatives_spanish:
  - le han procurado salvación
  - le han dado victoria
  lexicon: Hiphil of ישע with לו
  rationale: El hebreo y el audit trail permiten entender que la acción de la mano y el brazo de Yahvé produce salvación/victoria “para él/para sí”. En español se opta por una formulación que conserva la idea de salvación lograda, sin añadir una interpretación más estrecha de victoria.
- source_word: יְמִינוֹ וּזְרוֹעַ קָדְשׁוֹ
  english_pob_choice: his right hand and his holy arm
  chosen_spanish: su mano derecha y su santo brazo
  alternatives_spanish:
  - su diestra y su brazo santo
  - su mano diestra y su brazo santo
  lexicon: anthropomorphic poetic parallelism
  rationale: “Mano derecha” y “santo brazo” reflejan con claridad el paralelismo hebreo y son plenamente comprensibles en español.
theological_decisions:
- issue: Cómo verter el cierre הוֹשִׁיעָה לּוֹ en relación con el sujeto divino
  english_pob_reading: The LORD’s own power has achieved deliverance/victory.
  chosen_spanish_reading: Su mano derecha y su santo brazo le han brindado salvación.
  alternative_spanish_readings:
  - su mano derecha y su santo brazo han logrado salvación para él
  - su mano derecha y su santo brazo le han dado victoria
  rationale: 'La frase hebrea admite una relación estrecha entre el sujeto divino y el resultado de salvación. La traducción evita borrar esa tensión: no convierte el texto en una explicación doctrinal, pero sí comunica que la acción poderosa de Yahvé produce salvación.'
  doctrine_reference: Salmo 98:1; cf. Isaías 59:16
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que reemplazó una lectura más general de “victory” por una más directa de “salvation for him”. Por eso el español evita “victoria” como opción principal y conserva el sentido de salvación lograda por la mano y el brazo de Yahvé. También se integró el superscrito completo del texto fuente, no solo el llamado a cantar.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יהוה.
  - Se prefirió “cántico” por registro poético-litúrgico y coherencia con salmos.
  - No se introduce “SEÑOR” ni mayúsculas de sustitución.
  - La frase final mantiene el paralelismo hebreo sin explicitar un objeto teológico adicional.
