review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura hebrea y conserva el modismo final con «corazón», en línea con la decisión del POB inglés. Sin embargo, «la prostitución» estrecha demasiado זְנוּת frente al sentido más amplio documentado («sexual immorality»), y falta la nota principal sobre el modismo «quitan el corazón» = pérdida de entendimiento/sensatez, que el audit trail inglés sí preserva.
  spanish_quality_summary: El texto es claro y natural, pero puede mejorarse para mayor fidelidad y legibilidad bíblica. «Inmoralidad sexual» comunica mejor el alcance semántico en español moderno que «prostitución». «Mosto» es posible, pero aquí «vino nuevo» refleja mejor la distinción léxica ya documentada y evita una posible lectura demasiado técnica o regional. Conviene además anclar una nota al final para aclarar el idiomatismo hebreo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La revisión propuesta alinea mejor זְנוּת con la decisión auditada del POB inglés y mantiene la distinción יַיִן / תִּירוֹשׁ como «vino / vino nuevo». Se preserva «corazón» para לֵב, con nota explicativa del sentido alternativo.
  issues:
  - severity: high
    issue: «La prostitución» traduce זְנוּת de forma demasiado específica
    rationale: El hebreo en este contexto abarca conducta sexual ilícita en general, aunque pueda incluir matiz de prostitución. El POB inglés eligió deliberadamente «sexual immorality». En español, «inmoralidad sexual» preserva mejor ese alcance.
  - severity: medium
    issue: Falta la nota sobre el modismo «quitan el corazón»
    rationale: El audit trail inglés preserva en nota las alternativas «take away understanding / deprive of sense». La decisión teológica fue mantener «heart» en el texto principal pero aclarar el sentido en nota. El borrador español declara esa intención, pero no la implementa.
  - severity: low
    issue: «Mosto» puede sonar más técnico o regional que «vino nuevo»
    rationale: Aunque «mosto» puede funcionar, no siempre equivale con precisión a תִּירוֹשׁ y puede sugerir jugo no fermentado. «Vino nuevo» refleja más directamente la decisión lexical auditada y mantiene la distinción con «vino».
  revised_spanish_text: La inmoralidad sexual, el vino y el vino nuevo quitan el corazón[a].
  revised_footnotes:
