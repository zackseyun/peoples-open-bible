translation:
  language: es
  text: La vida del pobre es mejor que el oro refinado, y un buen espíritu que las perlas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «La salud y el bienestar son mejores que todo el oro, y un cuerpo fuerte que una riqueza inmensurable». El hebreo y el griego difieren considerablemente aquí, lo que sugiere una variante textual o corrupción en el hebreo transmitido.'
    reason: textual_variant
lexical_decisions:
- source_word: חיי
  english_pob_choice: Life
  chosen_spanish: La vida
  alternatives_spanish:
  - La vida de
  - Vivir
  lexicon: HALOT
  rationale: La construcción hebrea expresa una idea proverbial condensada; en español, «La vida» mantiene la brevedad y la fuerza comparativa sin añadir elementos no presentes en el hebreo.
- source_word: שר
  english_pob_choice: the poor
  chosen_spanish: del pobre
  alternatives_spanish:
  - del necesitado
  - de una persona pobre
  lexicon: HALOT
  rationale: Sigo la lectura hebrea transmitida por el testimonio principal, entendiendo שר en contexto como referencia a una persona pobre o menesterosa. «Del pobre» conserva esa referencia directa y el tono proverbial.
- source_word: איביתי
  english_pob_choice: is better than
  chosen_spanish: es mejor que
  alternatives_spanish:
  - vale más que
  - es preferible a
  lexicon: HALOT
  rationale: La forma hebrea es difícil, pero el paralelismo comparativo está claro por el griego βελτίων...ἢ. «Es mejor que» expresa de manera natural la comparación de superioridad.
- source_word: מפז
  english_pob_choice: refined gold
  chosen_spanish: el oro refinado
  alternatives_spanish:
  - el oro fino
  - el oro puro
  lexicon: HALOT
  rationale: פז denota oro refinado o de alta pureza. «Oro refinado» conserva el valor excepcional del metal y suena claro en español moderno.
- source_word: ורוח טובה
  english_pob_choice: and a good spirit
  chosen_spanish: y un espíritu bueno
  alternatives_spanish:
  - y un espíritu alegre
  - y un buen ánimo
  lexicon: HALOT
  rationale: רוּחַ puede abarcar espíritu, disposición interior o vitalidad. «Espíritu bueno» mantiene la amplitud semántica sin reducirlo sólo al estado de ánimo. Se conserva la tensión con la tradición griega, que refleja otra posible línea textual.
- source_word: מפנינים
  english_pob_choice: than pearls
  chosen_spanish: que las perlas
  alternatives_spanish:
  - que las piedras preciosas
  - que las gemas
  lexicon: HALOT
  rationale: פנינים suele referirse a perlas u otro objeto de gran precio. «Perlas» es la opción más transparente y reconocible en español actual.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'Main text follows the extant Hebrew witness: ''Life for the poor ... and a good spirit ...'''
  chosen_spanish_reading: 'El texto principal sigue el testimonio hebreo conservado: «La vida del pobre ... y un espíritu bueno ...».'
  alternative_spanish_readings:
  - «La salud y el bienestar son mejores que todo el oro, y un cuerpo fuerte que una riqueza inmensurable.»
  rationale: En Sirácida, el proyecto traduce del hebreo cuando éste se conserva, usando el griego como control de consistencia y fuente de transparencia textual. Aquí la discrepancia es sustancial, así que se mantiene la lectura hebrea en el texto principal y se documenta la alternativa griega en una nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserve; preservar honestamente la incertidumbre de las fuentes'
translation_notes:
  revision_awareness: La versión revisada más reciente no introdujo cambios; se conserva la lectura principal basada en el hebreo, con la discrepancia greco-hebraica documentada explícitamente.
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según el esquema del proyecto; este versículo no requiere esos nombres.
  - Se ha mantenido «espíritu» para רוּחַ en vez de sustituirlo por una paráfrasis psicológica.
  - Se conserva el comparativo «es mejor que» para reflejar el paralelismo del original sin suavizar la tensión textual.
  - El sintagma «oro refinado» sigue la decisión lexical del inglés POB y su valor semántico en el hebreo.
