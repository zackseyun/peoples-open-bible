review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego: ataque hostil contra ellos, ocurrido en sábado, con muerte de ellos, sus familias y sus animales, y una cifra aproximada de mil personas. Sin embargo, hay problemas de formulación en español y una nota mal enfocada: ἕως χιλίων ψυχῶν ἀνθρώπων no está bien expresado como «hasta unos mil personas», y la nota existente sobre «sábado» introduce un matiz de límite temporal que no corresponde al razonamiento documentado en el POB inglés.'
  spanish_quality_summary: La frase es comprensible, pero «en el sábado» suena poco natural frente a «en sábado», y «hasta unos mil personas» es gramaticalmente incorrecto; debe ser «como mil personas» o «hasta mil personas». «Sus animales» es aceptable, pero «su ganado» o «sus animales» ambos sirven; aquí mantengo «sus animales» por amplitud y claridad. También conviene suavizar la puntuación para una lectura más natural en español.
  glossary_alignment: No hay términos del glosario mayor en disputa. La decisión sobre τοῖς σάββασιν debe mantenerse como «sábado» en singular idiomático, con nota opcional sobre el plural griego. La decisión sobre ἀπέθανον como «murieron» está bien. La cifra aproximada debe reflejar el valor de ἕως con número; en español «como mil personas» preserva mejor la aproximación natural que «hasta unos mil personas».
  issues:
  - severity: medium
    issue: «en el sábado» es poco natural en español
    rationale: Aunque refleja la referencia temporal, el español bíblico natural aquí prefiere «en sábado» o «el sábado». La forma actual suena calcada.
  - severity: high
    issue: «hasta unos mil personas» es gramatical y estilísticamente deficiente
    rationale: La combinación «hasta unos» es torpe, y además debe ser «mil personas», no «mil personas» con «unos» interpuesto así. El sentido aproximado del griego se expresa mejor con «como mil personas» o «hasta mil personas».
  - severity: medium
    issue: La nota [a] sobre «sábado» introduce una explicación no respaldada
    rationale: La nota habla de «un límite aproximado de tiempo», pero el POB inglés solo documenta el plural griego como posibilidad idiomática frente al singular inglés; no se trata de un límite temporal.
  revised_spanish_text: Y se levantaron contra ellos en batalla en sábado[a]; y murieron ellos, sus mujeres, sus hijos y sus animales, como mil personas.
  revised_footnotes:
  - marker: a
    text: 'O: «en los sábados»; el griego está en plural, pero en contexto puede expresarse idiomáticamente en singular para referirse a ese día de reposo.'
    reason: lexical_alternative
  revision_rationale: Se corrige la naturalidad de la expresión temporal («en sábado»), se elimina la construcción incorrecta «hasta unos mil personas» y se reemplaza por «como mil personas» para reflejar con buen español la cifra aproximada o el límite no exacto de ἕως χιλίων ψυχῶν ἀνθρώπων. También se ajusta la nota para que refleje fielmente la justificación lexical documentada en el POB inglés, sin añadir una explicación temporal ajena al caso.
