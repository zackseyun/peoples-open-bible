translation:
  language: es
  text: Solo el ganado y el botín[a] de aquella ciudad Israel tomó para sí, conforme a la palabra de Yahvé que había mandado a Josué.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el despojo' para 'el botín'; el término hebreo se refiere a bienes tomados en guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  lexicon: HALOT
  rationale: Expresa la restricción/excepción con naturalidad en español y mantiene el énfasis limitativo del hebreo.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - el ganado vacuno
  lexicon: HALOT
  rationale: En este contexto de botín de guerra, 'ganado' comunica mejor el conjunto de animales domésticos que una especie particular.
- source_word: וּשְׁלַל
  english_pob_choice: the spoil
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - la presa
  lexicon: HALOT
  rationale: שָׁלָל denota bienes tomados en guerra; 'botín' conserva el sentido militar de manera natural en español.
- source_word: הָעִיר הַהִיא
  english_pob_choice: that city
  chosen_spanish: aquella ciudad
  alternatives_spanish:
  - esa ciudad
  - la ciudad aquella
  lexicon: HALOT
  rationale: El demostrativo especifica una ciudad ya identificada en el contexto; 'aquella' mantiene esa distancia referencial.
- source_word: בָּזְזוּ
  english_pob_choice: took as plunder
  chosen_spanish: se llevó como presa
  alternatives_spanish:
  - saqueó
  - tomó como botín
  lexicon: HALOT
  rationale: El verbo implica apropiación por saqueo; 'se llevó como presa' evita una repetición pesada con 'botín' y conserva la idea de apropiación bélica.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - como suyo
  lexicon: HALOT
  rationale: La dativa de ventaja/posesión se expresa de forma breve y formal con 'para sí'.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre colectivo del sujeto tal como aparece en el hebreo.
- source_word: כִּדְבַר
  english_pob_choice: according to the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: Expresa adecuación a una declaración/mandato divino con una fórmula española clara y formal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española adoptada por el POB, evitando la sustitución por un título.
- source_word: אֲשֶׁר צִוָּה אֶת יְהוֹשֻׁעַ
  english_pob_choice: that he had commanded Joshua
  chosen_spanish: que había mandado a Josué
  alternatives_spanish:
  - que mandó a Josué
  - que había ordenado a Josué
  lexicon: HALOT
  rationale: El relativo apunta a la orden previa de Yahvé; 'había mandado' refleja correctamente la anterioridad narrativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama; en español se conserva como nombre propio divino y no se reemplaza por una traducción de título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión más reciente prefirió una redacción más natural sin auxiliar innecesario en inglés; en español se reprodujo esa fluidez con una estructura directa y formal, manteniendo el orden enfático del hebreo.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para יְהוָה y se usó 'Yahvé' conforme al criterio del proyecto.
  - '''ganado'' y ''botín'' conservan el campo semántico bélico y material del hebreo sin introducir explicación adicional en el texto principal.'
  - '''para sí'' refleja el matiz posesivo/beneficiario de לָהֶם sin sobrerreformulación.'
