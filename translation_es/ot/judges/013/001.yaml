translation:
  language: es
  text: Y los hijos de Israel[a] volvieron a hacer lo malo ante los ojos de Yahvé, y Yahvé los entregó en manos[b] de los filisteos por cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Israel» conserva la forma literal del hebreo y corresponde al inglés POB «the sons of Israel»; la expresión es corporativa, no limitada a varones individuales.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «en la mano de los filisteos», un modismo que significa bajo su poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִ֨פוּ
  english_pob_choice: again did
  chosen_spanish: volvieron a hacer
  alternatives_spanish:
  - hicieron de nuevo
  - siguieron haciendo
  - otra vez hicieron
  lexicon: HALOT
  rationale: El verbo יסף con infinitivo expresa repetición; en español, «volvieron a hacer» comunica con naturalidad la idea de reincidencia que la POB inglesa captó con «again did», sin perder el valor aspectual del hebreo.
- source_word: בְּנֵ֣י יִשְׂרָאֵ֔ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar y corporal del hebreo, equivalente al inglés POB «the sons of Israel». En español, «hijos de Israel» es claro y mantiene la forma literal sin neutralizarla.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: did what was evil
  chosen_spanish: hacer lo malo
  alternatives_spanish:
  - hacer el mal
  - cometer lo malo
  - hacer lo que era malo
  lexicon: HALOT
  rationale: La construcción es un modismo estable en Jueces. «Hacer lo malo» preserva el sentido cualitativo y resulta más natural en español que una traducción más rígida.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  - según la evaluación de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de valoración, como en la POB inglesa «in the eyes of Yahweh». «Ante los ojos de Yahvé» conserva la metáfora sin volverla abstracta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», evitando la sustitución tradicional por un título.'
- source_word: וַיִּתְּנֵ֧/ם
  english_pob_choice: gave them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los puso
  - los entregó en poder de
  lexicon: HALOT
  rationale: El verbo נתן en esta construcción expresa ceder a dominio ajeno. «Los entregó» recoge mejor la fuerza de sometimiento que un mero «dio» y funciona bien con el complemento idiomático siguiente.
- source_word: בְּיַד פְּלִשְׁתִּים
  english_pob_choice: into the hand of the Philistines
  chosen_spanish: en manos de los filisteos
  alternatives_spanish:
  - en la mano de los filisteos
  - bajo el poder de los filisteos
  - en poder de los filisteos
  lexicon: HALOT
  rationale: El hebreo usa el modismo «mano» para poder/control; en español, «en manos de» reproduce el giro idiomático de forma natural y mantiene la imagen de dominio.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  lexicon: HALOT
  rationale: Se conserva el nombre étnico estándar en español bíblico.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: for forty years
  chosen_spanish: por cuarenta años
  alternatives_spanish:
  - durante cuarenta años
  - cuarenta años
  lexicon: HALOT
  rationale: El hebreo expresa duración; en español, «por cuarenta años» reproduce con claridad la extensión temporal que la POB inglesa explicitó con «for forty years».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea auditada del proyecto identifica יְהוָה como el nombre pactal de Dios y no como un título. En español se preserva esa decisión con «Yahvé», manteniendo la transparencia de la traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula corporativa בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La frase hebrea es gramaticalmente masculina plural y funciona de modo corporativo. Se conserva la forma literal, como hizo la POB inglesa, sin reemplazarla por una neutralización interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Idiomático de dominio en בְּיַד
  english_pob_reading: into the hand of the Philistines
  chosen_spanish_reading: en manos de los filisteos
  alternative_spanish_readings:
  - bajo el poder de los filisteos
  - en poder de los filisteos
  rationale: El hebreo usa una imagen de entrega a dominio. En español, el plural idiomático «en manos de» conserva la metáfora de control y evita una paráfrasis excesiva.
  doctrine_reference: 'DOCTRINE.md: source-grounded idiom handling'
translation_notes:
  revision_awareness: La revisión auditada más reciente indica que no hubo cambios necesarios y que el veredicto de concordancia fue alto. Esta propuesta sigue esa línea sin introducir ajustes no respaldados por el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva la imagen hebrea de dominio con «en manos de».
  - El registro es bíblico contemporáneo y sobrio, evitando calcos duros donde el español requiere una formulación idiomática.
  - La elección «hijos de Israel» respeta la terminología corporativa y la preferencia del proyecto por precisión de género gramatical.
