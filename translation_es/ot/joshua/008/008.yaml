translation:
  language: es
  text: Y cuando hayan tomado la ciudad[a], prenderán fuego a la ciudad. Conforme a la palabra de Yahvé, así harán. Miren, yo les he mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Conforme al mandato de Yahvé, hagan eso». La frase hebrea dice literalmente: «conforme a la palabra de Yahvé harán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: El hebreo introduce una acción futura en secuencia; en español, ‘Y cuando’ comunica bien esa relación temporal sin volverla rígida o arcaizante.
- source_word: כְּתָפְשְׂכֶם
  english_pob_choice: you have taken
  chosen_spanish: hayan tomado
  alternatives_spanish:
  - tomen
  - hayan capturado
  lexicon: HALOT
  rationale: La forma con כְ + verbo da valor temporal de ‘cuando/as hayan tomado’. En español, el perfecto de subjuntivo expresa mejor la acción completada antes del siguiente mandato.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la villa
  - la población
  lexicon: HALOT
  rationale: ‘Ciudad’ es la equivalencia natural y estándar para עִיר en este contexto militar narrativo.
- source_word: תַּצִּיתוּ
  english_pob_choice: you shall set ... on fire
  chosen_spanish: prenderán fuego
  alternatives_spanish:
  - incendiarán
  - quemarán
  lexicon: HALOT
  rationale: El causativo de יצת pide una acción de encender o poner en llamas. ‘Prenderán fuego’ conserva el valor causativo y suena natural en español.
- source_word: בָּאֵשׁ
  english_pob_choice: on fire
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: HALOT
  rationale: En español, con ‘prender fuego’ el complemento ‘a la ciudad’ ya expresa el objeto afectado; repetir ‘con fuego’ o ‘en fuego’ sería menos natural. La idea de incendio queda contenida en el verbo.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: According to the word of Yahweh
  chosen_spanish: Conforme a la palabra de Yahvé
  alternatives_spanish:
  - Según la palabra de Yahvé
  - De acuerdo con la palabra de Yahvé
  - Conforme al mandato de Yahvé
  lexicon: HALOT
  rationale: דבר significa literalmente ‘palabra’ aquí, y el hebreo no dice ‘mandato’. ‘Conforme a la palabra de Yahvé’ mantiene la formulación precisa y la referencia al nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, conforme a la decisión doctrinal del proyecto, en lugar de sustituirlo por un título.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall do
  chosen_spanish: así harán
  alternatives_spanish:
  - ustedes harán
  - lo harán
  lexicon: HALOT
  rationale: 'El verbo funciona como exhortación/instrucción general: ‘así harán’ refleja la orden y enlaza naturalmente con la frase anterior en español.'
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Ve
  lexicon: HALOT
  rationale: El imperativo busca llamar la atención. En español, ‘Miren’ es una forma directa, natural y plural.
- source_word: צִוִּיתִי אֶתְכֶם
  english_pob_choice: I have commanded you
  chosen_spanish: yo se los he mandado
  alternatives_spanish:
  - yo se los he ordenado
  - yo se lo he mandado
  lexicon: HALOT
  rationale: El perfecto expresa una orden ya dada. ‘Mandar’ recoge bien el sentido de צוה; el clítico plural ‘se los’ refleja el objeto directo e indirecto con naturalidad en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La tradición auditada del POB usa la transliteración del Tetragrama. En español, ‘Yahvé’ es la forma equivalente más estable y legible para preservar el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre דבר y mandato implícito
  english_pob_reading: According to the word of Yahweh
  chosen_spanish_reading: Conforme a la palabra de Yahvé
  alternative_spanish_readings:
  - Conforme al mandato de Yahvé
  - Según la orden de Yahvé
  rationale: El hebreo dice ‘palabra’, no ‘mandato’. Aunque el sentido práctico es obediencial, la traducción conserva la tensión léxica para no borrar la formulación original.
  doctrine_reference: 'Hebreo bíblico: דבר como ‘palabra/materia/decir’, evitando una paráfrasis que elimine el término recibido'
translation_notes:
  revision_awareness: 'El texto inglés auditado presenta alta concordancia con el hebreo y no requiere cambios sustanciales. La única tensión relevante es lexicográfica: דבר puede verterse como ‘palabra’ o, de manera interpretativa, ‘mandato’. Se preservó ‘palabra’ en el cuerpo principal y se dejó la alternativa en nota, de acuerdo con el criterio del POB de no borrar ambigüedades productivas. También se mantuvo el nombre divino como Yahvé, coherente con la política doctrinal auditada.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de forma consistente para יְהוָה.
  - Se usó ‘la ciudad’ en ambos casos como reflejo uniforme de הָעִיר.
  - Se prefirió ‘Miren’ para el imperativo plural de atención, manteniendo el tono directo del hebreo.
  - La construcción verbal española conserva la secuencia temporal del original sin añadir información doctrinal o narrativa.
  - La nota a explica la alternativa léxica principal sin introducir una glosa tradicional que sustituya la ‘palabra’ del texto.
