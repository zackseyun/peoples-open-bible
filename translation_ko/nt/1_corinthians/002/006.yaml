id: 1CO.2.6
reference: '1 Corinthians 2:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Σοφίαν δὲ λαλοῦμεν ἐν τοῖς τελείοις, σοφίαν δὲ οὐ τοῦ αἰῶνος τούτου οὐδὲ τῶν ἀρχόντων τοῦ αἰῶνος τούτου τῶν καταργουμένων·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/006.yaml
  text: Yet we do speak wisdom among the mature[a], but not a wisdom of this age or of the rulers of this age[c][b], who are being brought to nothing.
  footnotes:
  - marker: a
    text: 'Or "the perfect"; here likely those who are spiritually mature.'
    reason: lexical_alternative
  - marker: b
    text: 'Or "who are passing away," "who are being abolished," or "who are being nullified."'
    reason: lexical_alternative
  - marker: c
    text: '"Rulers of this age" may refer to human authorities, spiritual powers, or both.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 우리는 성숙한 자들 가운데서는 지혜를 말합니다. 다만 이 세대의 지혜나 폐하여지고 있는 이 세대의 통치자들의 지혜가 아닙니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῖς τελείοις
  english_pob_choice: the mature
  chosen_korean: 성숙한 자들
  alternatives_korean:
  - 온전한 자들
  lexicon: BDAG
  rationale: 'τέλειος는 「목표에 다다른, 성숙한」. 3:1–3의 영적·육적 대조와 호응.'
- source_word: ἀρχόντων τοῦ αἰῶνος τούτου
  english_pob_choice: rulers of this age
  chosen_korean: 이 세대의 통치자들
  alternatives_korean:
  - 이 시대의 권세자들
  lexicon: BDAG
  rationale: 인간 정치 권력과 그 배후의 영적 세력을 함께 가리키는 양가적 표현.
- source_word: τῶν καταργουμένων
  english_pob_choice: who are being brought to nothing
  chosen_korean: 폐하여지고 있는
  alternatives_korean:
  - 무력화되고 있는
  lexicon: BDAG
  rationale: '현재 수동 분사. 1:28의 καταργήσῃ와 어휘 호응.'
theological_decisions:
- issue: '2:6–16 영적 지혜의 차원: πνευματικός 어휘 체계 도입'
  chosen_reading: 바울은 인간 지혜와 구분되는 「영(의) 지혜」를 「성숙한 자」 가운데 선포한다고 말한다
  alternative_readings:
  - 「영지주의적 비전의 단계 구분」으로 읽는 해석
  rationale: '본 구절(6–16)은 바울이 πνευματικός/ψυχικός 대비 체계를 본격 도입하는 첫 단계다. 「성숙한 자」(τέλειοι)는 영지주의적 입문 단계가 아니라, 영을 받아 십자가 메시지를 받아들이는 자(2:14–15 참고)를 가리킨다. 한국어로 「성숙한」을 채택해 입문주의적 함의를 피한다.'
  doctrine_reference: 'DOCTRINE.md §5: 원어 일차성; 14–15절 πνευματικός/ψυχικός 결정 참조'
