translation:
  language: es
  text: No de este modo los cantos de sirenas[a] ni las voces como de cisnes, con tono femenino, atraen a los que oyen, como las voces de hijos que llaman a su madre en medio de tormentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «melodías de sirenas» y «voces de cisnes». El griego emplea imágenes poéticas clásicas para describir un sonido irresistiblemente atractivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: σειρήνιοι μελῳδίαι
  english_pob_choice: siren songs
  chosen_spanish: melodías de sirenas
  alternatives_spanish:
  - cantos de sirenas
  - canciones de sirenas
  - melodías sirénicas
  lexicon: LSJ
  rationale: El griego alude a las Sirenas míticas y a su música seductora. En español, «melodías de sirenas» conserva la imagen clásica y el valor poético sin forzar un calco torpe.
- source_word: κύκνιοι ... φωναί
  english_pob_choice: swanlike voices
  chosen_spanish: voces de cisnes
  alternatives_spanish:
  - voces de cisne
  - voces cisníneas
  - voces como de cisnes
  lexicon: LSJ
  rationale: El adjetivo griego es comparativo/relacional, pero en español la construcción nominal «voces de cisnes» comunica de forma natural la comparación y mantiene el paralelo con las Sirenas.
- source_word: πρὸς θηλυκίαν
  english_pob_choice: with feminine sound
  chosen_spanish: con sonido femenino
  alternatives_spanish:
  - con dulzura femenina
  - con encanto femenino
  - con feminidad
  lexicon: LSJ
  rationale: La revisión inglesa volvió más literal la relación con θηλυκίαν. «Con sonido femenino» conserva esa fuerza léxica y evita interpretar en exceso como mera seducción o encanto.
- source_word: ἐφέλκονται
  english_pob_choice: draw
  chosen_spanish: atraen
  alternatives_spanish:
  - draw
  - arrastran
  - seducen
  - atraen hacia sí
  lexicon: LSJ
  rationale: El verbo expresa una acción de atraer hacia uno mismo. En español, «atraen» es fiel, claro y suficientemente vívido para el contraste retórico del pasaje.
- source_word: τέκνων φωναί
  english_pob_choice: the voices of children
  chosen_spanish: las voces de niños
  alternatives_spanish:
  - las voces de los niños
  - voces infantiles
  lexicon: LSJ
  rationale: La expresión nominal simple refleja bien el genitivo griego y conserva el tono emotivo del contraste.
- source_word: μετὰ βασάνων
  english_pob_choice: amid tortures
  chosen_spanish: entre tormentos
  alternatives_spanish:
  - en medio de tormentos
  - bajo tormentos
  - en medio de torturas
  lexicon: LSJ
  rationale: «Μετὰ βασάνων» señala circunstancia acompañante. «Entre tormentos» es natural en español y mantiene el plural y la intensidad del sufrimiento.
- source_word: μητέρα φωνούντων
  english_pob_choice: calling to their mother
  chosen_spanish: que llaman a su madre
  alternatives_spanish:
  - que claman a su madre
  - que gritan a su madre
  - llamando a su madre
  lexicon: LSJ
  rationale: φωναῖς/φωνούντων aquí indica clamar o llamar en voz alta. La forma relativa «que llaman a su madre» preserva el vínculo sintáctico y la carga afectiva.
theological_decisions:
- issue: Retención de la imaginería clásica (Sirenas y cisnes) en vez de generalizarla
  english_pob_reading: Retain the classical allusions to Sirens and swans in the main text
  chosen_spanish_reading: Conservar la imaginería clásica de Sirenas y cisnes en el texto principal
  alternative_spanish_readings:
  - Generalizar a «cantos cautivadores» y «voces hermosas»
  - Sustituir por una imagen menos mitológica y más neutral
  rationale: El poder retórico del versículo depende del contraste entre imágenes poéticas clásicas y el clamor de los hijos. Mantenerlas es más fiel al griego y evita borrar una tensión literaria documentada por el POB inglés.
  doctrine_reference: Principio de primacía del original y preservación de imágenes retóricas del texto fuente.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más literal en πρὸς θηλυκίαν → «con sonido femenino» y en ἐφέλκονται → «atraen», manteniendo al mismo tiempo una formulación española natural. También conserva la imaginería clásica que el audit trail inglés decide retener en el texto principal.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros pasajes, pero este versículo no contiene esos términos.
  - Se mantiene «tormentos» para βασάνων, siguiendo el plural intensivo del griego.
  - La nota al pie se ancla en «melodías de sirenas» para preservar la alternativa lexical documentada.
