translation:
  language: es
  text: 'Y toda la asamblea exclamó: «¡Amén, amén!», y, alzando las manos en alto, cayeron[a] al suelo y adoraron a Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se postraron»; el griego presenta primero la caída corporal y luego el verbo de adoración.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφώνησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  - prorrumpió
  lexicon: BDAG
  rationale: El verbo expresa una emisión vocal fuerte y pública. En español, «exclamó» conserva el carácter audible y colectivo sin sonar excesivamente coloquial como «gritó» ni demasiado pesado como «prorrumpió».
- source_word: πᾶν τὸ πλῆθος
  english_pob_choice: all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la multitud
  - todo el pueblo reunido
  lexicon: BDAG
  rationale: En este contexto litúrgico, «asamblea» comunica mejor que «multitud» la reunión del pueblo para responder a la lectura y a la oración, manteniendo el sentido colectivo de πᾶν τὸ πλῆθος.
- source_word: Ἀμήν, ἀμήν
  english_pob_choice: Amen, amen
  chosen_spanish: Amén, amén
  alternatives_spanish:
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: Se conserva la forma litúrgica transliterada porque aquí funciona como respuesta congregacional. Traducirla como «verdaderamente» alteraría su función en la escena.
- source_word: ἄραντες ἄνω τὰς χεῖρας
  english_pob_choice: lifting up their hands
  chosen_spanish: alzando las manos en alto
  alternatives_spanish:
  - levantando las manos
  - alzando sus manos hacia arriba
  lexicon: BDAG
  rationale: La frase describe un gesto de adoración con dirección ascendente. «Alzando las manos en alto» suena natural en español y conserva la redundancia enfática del griego (ἄραντες ... ἄνω).
- source_word: προσπεσόντες ἐπὶ τὴν γῆν
  english_pob_choice: they fell to the ground
  chosen_spanish: cayeron al suelo
  alternatives_spanish:
  - se postraron en tierra
  - cayeron a tierra
  lexicon: BDAG
  rationale: El griego indica caída corporal antes del acto de adoración. «Cayeron al suelo» preserva el movimiento físico sin convertirlo por anticipado en un término devocional más interpretativo como «se postraron».
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron ante
  - rindieron adoración a
  lexicon: BDAG
  rationale: En relación directa con Dios, el verbo expresa adoración, no solo inclinación o reverencia física. «Adoraron» mantiene la fuerza religiosa del acto, como en la solución inglesa de separar la postura corporal del acto cultual.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: El dativo marca el destinatario de la adoración. En español, «a Dios» expresa de forma directa y natural el objeto del gesto devocional.
theological_decisions:
- issue: Distinción entre la caída corporal y la adoración propiamente dicha
  english_pob_reading: Translate the final action as 'worshiped God' after describing the bodily fall separately.
  chosen_spanish_reading: Describir primero la caída física y luego expresar el acto religioso como «adoraron a Dios».
  alternative_spanish_readings:
  - se postraron ante Dios
  - se inclinaron y adoraron a Dios
  rationale: 'El griego contiene dos acciones relacionadas pero no idénticas: caer al suelo y adorar. Mantener ambas evita diluir el valor teológico de προσκυνέω en mera postura física.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological weight of source terms; readable modern Spanish.'
- issue: Uso de la forma litúrgica «Amén, amén»
  english_pob_reading: Preserve the transliterated liturgical form 'Amen, amen'.
  chosen_spanish_reading: Conservar «Amén, amén» como respuesta congregacional.
  alternative_spanish_readings:
  - Verdaderamente, verdaderamente
  - Así sea, así sea
  rationale: Aquí no se trata de una afirmación doctrinal del narrador, sino de una respuesta de la asamblea. La transliteración respeta la función litúrgica y la continuidad con el uso eclesial reconocido.
  doctrine_reference: 'PHILOSOPHY.md: preserve liturgical forms where the source clearly functions as congregational response.'
translation_notes:
  revision_awareness: The Spanish draft follows the high-agreement Greek source text and preserves the English POB distinction between bodily prostration and worship, with no revision changes needed in the audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo nombra a Dios mediante θεός, por lo que se traduce «Dios».
  - Se mantiene el registro litúrgico con «Amén, amén» y el verbo de adoración como «adoraron», evitando sustituciones tradicionales innecesarias.
  - La combinación «cayeron al suelo y adoraron» conserva la secuencia de dos acciones del griego sin fusionarlas.
