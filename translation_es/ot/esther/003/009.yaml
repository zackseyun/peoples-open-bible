revisions:
- from: Si parece bien al rey[a], que se escriba que sean destruidos, y yo pesaré diez mil talentos[b] de plata, por medio de los que realizan el trabajo[c], para llevarlos a los tesoros del rey.
  to: Si parece bien al rey[a], que se escriba que sean destruidos, y yo pesaré diez mil talentos[b] de plata en manos de los que realizan el trabajo[c], para llevarla a las tesorerías del rey.
  rationale: Se restituye en el texto principal la imagen concreta de עַל יְדֵי como 'en manos de', dejando la lectura agentiva en nota, en línea con la auditoría inglesa y con el hebreo. Se cambia 'llevarlos' por 'llevarla' para que el referente sea la plata/suma implícita, no los 'talentos' como antecedente ambiguo. También se ajusta 'tesoros' a 'tesorerías' para reflejar mejor el contexto administrativo y el plural de גִּנְזֵי.
