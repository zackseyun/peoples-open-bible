translation:
  language: es
  text: vestiduras santas de oro, azul y púrpura, obra de un diseñador; un pectoral de juicio[a], un efod y una faja, y hilo escarlata[b], obra de un tejedor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pectoral de juicio» evoca la terminología sacerdotal de Éxodo para el pectoral del sumo sacerdote asociado con el discernimiento o la decisión.
    reason: cross_reference
  - marker: b
    text: O «lana escarlata»; el hebreo ושני תולעת designa el material textil escarlata o carmesí usado en las vestiduras sacerdotales.
    reason: lexical_alternative
lexical_decisions:
- source_word: בגדי קודש
  english_pob_choice: holy garments
  chosen_spanish: vestiduras santas
  alternatives_spanish:
  - vestiduras sagradas
  - vestiduras de santidad
  lexicon: HALOT
  rationale: La construcción denota prendas cultuales; «vestiduras santas» conserva el valor ritual de קודש con un español natural y digno.
- source_word: זהב תכלת, וארגמן
  english_pob_choice: of gold, blue, and purple
  chosen_spanish: de oro, azul y púrpura
  alternatives_spanish:
  - de oro, azul jacinto y púrpura
  - de oro, azul violeta y púrpura
  lexicon: HALOT
  rationale: Se mantiene la lista de materiales/colores del vestuario sacerdotal. «Azul» es claro en español; el matiz azul-violeta queda suficientemente sugerido por el paralelo griego ὑακίνθῳ.
- source_word: מעשה חשב
  english_pob_choice: the work of a designer
  chosen_spanish: obra de un diseñador
  alternatives_spanish:
  - obra de un artesano
  - trabajo de tejido fino
  - obra de un tejedor experto
  lexicon: HALOT
  rationale: El hebreo apunta a trabajo artístico especializado y ornamentado. «Diseñador» comunica la idea de obra cuidadosamente concebida sin fijar indebidamente una técnica única.
- source_word: חשן משפט
  english_pob_choice: a breastpiece of judgment
  chosen_spanish: un pectoral de juicio
  alternatives_spanish:
  - un pectoral de decisión
  - un pectoral para juicio
  lexicon: HALOT
  rationale: «Pectoral» expresa mejor el objeto sacerdotal en español que «breastpiece». «De juicio» preserva la fuerza tradicional y legal/oracular de משפט, con la tensión semántica intacta.
- source_word: אפוד
  english_pob_choice: an ephod
  chosen_spanish: un efod
  alternatives_spanish:
  - un efod sacerdotal
  - un manto sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico mediante transliteración española normalizada, porque no existe un equivalente breve y preciso que no borre el referente cultual.
- source_word: ואזור
  english_pob_choice: a sash
  chosen_spanish: una faja
  alternatives_spanish:
  - un cinto
  - un ceñidor
  lexicon: HALOT
  rationale: «Faja» es una equivalencia natural y comprensible para la banda o cinturón sacerdotal; evita el tono arcaico de «cinto» y mantiene la imagen de adorno/ceñimiento.
- source_word: ושני תולעת
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - hilo escarlata
  - lana escarlata
  - escarlata carmesí
  lexicon: HALOT
  rationale: El hebreo designa el material/textil teñido de escarlata o carmesí. Dado que el español permite omitir el sustantivo cuando el contexto ya es textil, «escarlata» conserva la referencia cromática sin añadir una palabra no atestiguada directamente por la forma breve del hebreo.
- source_word: מעשה אורג
  english_pob_choice: the work of a weaver
  chosen_spanish: obra de un tejedor
  alternatives_spanish:
  - trabajo de un tejedor
  - tejido de un tejedor
  lexicon: HALOT
  rationale: El sintagma nombra explícitamente al tejedor; «obra de un tejedor» mantiene la distinción frente a «obra de un diseñador» y refleja la artesanía concreta del cierre del verso.
theological_decisions:
- issue: Terminología sacerdotal de Éxodo aplicada a las vestiduras de Aarón
  english_pob_reading: Retain technical priestly terms where needed while translating the rest into clear modern English.
  chosen_spanish_reading: Conservar términos técnicos como «efod» y traducir descriptivamente el resto.
  alternative_spanish_readings:
  - Traducir todos los elementos de forma descriptiva
  - Sustituir los tecnicismos por equivalentes litúrgicos generales
  rationale: El versículo enumera prendas sacerdotales conocidas por la tradición de Éxodo. Mantener «efod» evita borrar un término técnico sin equivalente español breve y preciso, mientras que el resto se vierte con claridad para lectura pública.
  doctrine_reference: 'DOCTRINE.md: Translate titles/meaning where possible; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del expediente inglés y la revisión más reciente, que prefirió «scarlet yarn» frente a «crimson yarn». En español, la opción breve «escarlata» conserva esa decisión cromática sin forzar un sustantivo innecesario; el resto del verso mantiene la estructura cultual y la distinción entre obra artística general y trabajo de tejido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - «Justicia» en contextos cultuales se vierte como «juicio» para preservar el tecnicismo sacerdotal de משפט.
  - «Efod» se mantiene como tecnicismo estable.
  - La lista de colores/materiales se mantiene compacta y paralela al hebreo y al griego.
  - Se evita ampliar «escarlata» a una explicación dentro del texto principal para no sobrecargar el verso; la nota recoge la alternativa textual/lexical.
