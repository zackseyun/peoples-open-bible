  to: Comerán lo viejo, largo tiempo guardado[a], y sacarán lo viejo a causa de lo nuevo.
  rationale: Se corrige 'delante de' a 'a causa de' para preservar el valor causal/de desplazamiento de מִפְּנֵי en este contexto de abundancia agrícola. Se mantiene 'lo viejo' y 'lo nuevo' para conservar la concisión sustantivada del hebreo, y se deja 'sacarán' como equivalente natural de תּוֹצִיאוּ. La nota al pie se ajusta para ofrecer una alternativa más formal pero fiel al mismo sentido.
