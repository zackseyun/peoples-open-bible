translation:
  language: es
  text: Su aliento enciende las brasas[a], y una llama sale de su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría entenderse: «Su alma enciende las brasas», «Su vida enciende las brasas» o «Su garganta enciende las brasas». El sustantivo hebreo נֶפֶשׁ puede significar «alma», «vida», «garganta» o, por extensión en este contexto, «aliento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשׁוֹ
  english_pob_choice: his breath
  chosen_spanish: su aliento
  alternatives_spanish:
  - su alma
  - su garganta
  - su vida
  lexicon: HALOT
  rationale: En este contexto poético y fisiológico, נֶפֶשׁ puede extenderse a la respiración o al aliento. «Su aliento» conserva la imagen de exhalación ígnea y evita imponer «alma» o «vida», que en español sonarían menos naturales en esta línea.
- source_word: גֶּחָלִים
  english_pob_choice: coals
  chosen_spanish: los carbones
  alternatives_spanish:
  - las brasas
  - los carbones encendidos
  lexicon: HALOT
  rationale: El sustantivo designa carbones o brasas. «Carbones» reproduce el referente con sobriedad; el verbo «enciende» ya aporta la idea de combustión, por lo que no es necesario añadir un adjetivo intensificador.
- source_word: תְּלַהֵט
  english_pob_choice: kindles
  chosen_spanish: enciende
  alternatives_spanish:
  - prende
  - inflama
  - quema
  lexicon: HALOT
  rationale: 'El piel de להט tiene valor causativo: hacer arder o prender fuego. «Enciende» expresa esa causalidad de manera natural en español y mantiene la fuerza verbal del hebreo.'
- source_word: וְלַהַב
  english_pob_choice: and a flame
  chosen_spanish: y una llama
  alternatives_spanish:
  - y llama
  - y un resplandor
  - y un fuego
  lexicon: HALOT
  rationale: לַהַב es singular y alude a una llama o blaze. «Una llama» preserva la imagen singular y funciona bien en paralelo con «carbones».
- source_word: מִפִּיו
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - desde su boca
  - de su hocico
  lexicon: HALOT
  rationale: La frase preposicional se rinde de forma directa. «De su boca» es claro, fiel y corresponde al paralelismo con la exhalación descrita en la primera cola.
- source_word: יֵצֵא
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - brota
  - se expulsa
  lexicon: HALOT
  rationale: El verbo significa salir o venir fuera. «Sale» es la opción más natural en español y conserva el movimiento simple del hebreo sin sobreinterpretar el gesto.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo. La principal decisión fue reflejar נַפְשׁוֹ con «aliento» siguiendo la lectura contextual del POB en inglés, y mantener el paralelismo poético con una sintaxis española natural y sobria.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo binario del verso: exhalación que enciende carbones / llama que sale de la boca.'
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, y no hay necesidad de terminología cristológica o teológica adicional en este verso.
  - La puntuación con coma reproduce la pausa poética entre los dos miembros del versículo.
