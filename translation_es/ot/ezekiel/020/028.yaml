base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/028.yaml
  text: So I brought them into the land that I had lifted up my hand to give to them[a], and they saw every high hill and every leafy tree, and there they sacrificed their sacrifices, and there they presented the provocation of their offering, and there they set their pleasing aromas[c][b], and there they poured out their drink offerings.
  footnotes:
  - marker: a
    text: Or, 'the land that I swore to give them'; literally, 'the land that I lifted up my hand to give to them.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional biblical wording: ''every high hill and every green tree.'''
    reason: lexical_alternative
  - marker: c
    text: The Hebrew phrase is literally 'the provocation of their offering,' expressing that their offering was offensive and provoking to God.
    reason: cultural_note
