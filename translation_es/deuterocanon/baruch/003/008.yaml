translation:
  language: es
  text: He aquí[a], hoy estamos en nuestro exilio, donde nos dispersaste, para oprobio, para maldición y para pago[b], conforme a todas las injusticias de nuestros padres, que se apartaron de Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» o «Vean». El griego introduce una llamada enfática a prestar atención; «He aquí» conserva mejor el tono solemne del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «pena» o «deuda». El término griego también puede expresar obligación o responsabilidad incurrida, aquí en un contexto de juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: BDAG
  rationale: La exclamación introduce atención enfática al estado presente. «He aquí» conserva ese tono solemne y bíblico en español sin sonar forzado ni demasiado coloquial.
- source_word: ἀποικίᾳ
  english_pob_choice: exile
  chosen_spanish: exilio
  alternatives_spanish:
  - cautiverio
  - destierro
  - colonia
  lexicon: LSJ
  rationale: En este contexto alude a la condición histórica de deportación entre pueblos extraños. «Exilio» expresa bien ese estado covenantal e histórico; «cautiverio» sería más estrecho y «colonia» no corresponde al sentido.
- source_word: διέσπειρας
  english_pob_choice: scattered
  chosen_spanish: dispersaste
  alternatives_spanish:
  - esparciste
  - diseminaste
  - desperdigaste
  lexicon: LSJ
  rationale: El verbo describe la dispersión entre las naciones. «Dispersaste» mantiene el sentido y el paralelismo bíblico natural en español.
- source_word: ὀνειδισμὸν
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - afrenta
  - vergüenza
  - reproche
  lexicon: BDAG
  rationale: El término implica vergüenza pública y objeto de burla. «Oprobio» preserva mejor el registro bíblico y la fuerza social del término; «reproche» podría sonar más débil en español.
- source_word: ἀρὰν
  english_pob_choice: curse
  chosen_spanish: maldición
  alternatives_spanish:
  - anatema
  - maldito estado
  lexicon: LSJ
  rationale: Es la traducción directa y natural del sustantivo. Mantiene la intensidad judicial y pactal del contexto.
- source_word: ὄφλησιν
  english_pob_choice: payment
  chosen_spanish: pago
  alternatives_spanish:
  - pena
  - deuda
  - obligación de pago
  lexicon: LSJ
  rationale: El griego puede expresar deuda, obligación o pena. Siguiendo la revisión inglesa que simplifica la frase sin perder la idea de responsabilidad incurrida, «pago» conserva la noción de algo debido bajo juicio; las alternativas más explícitas quedan como posibles matices.
- source_word: κατὰ πάσας τὰς ἀδικίας
  english_pob_choice: according to all the wrongdoings
  chosen_spanish: conforme a todas las injusticias
  alternatives_spanish:
  - por causa de todas las injusticias
  - según todas las injusticias
  lexicon: BDAG
  rationale: «Κατά» aquí expresa correspondencia o medida. «Conforme a» preserva esa relación de ajuste sin convertirla en una causalidad distinta; «injusticias» mantiene el peso moral y jurídico del término.
- source_word: ἀπέστησαν
  english_pob_choice: turned away
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se rebelaron
  - apostatizaron
  - se desviaron
  lexicon: BDAG
  rationale: El verbo indica apartamiento o defección respecto de Yahvé. «Se apartaron» es claro y fiel; «se rebelaron» añade una intensidad no explicitada por sí sola en el verbo.
- source_word: Κυρίου θεοῦ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - el Señor nuestro Dios
  - el Señor Dios nuestro
  lexicon: BDAG
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé». Aunque el texto griego usa κύριος, aquí designa al Dios de Israel en lenguaje de pacto; por eso no se enmascara como «SEÑOR» y se explicita el referente divino.'
theological_decisions:
- issue: Tratamiento del nombre divino κύριος en un contexto de cita/alianza
  english_pob_reading: the Lord our God
  chosen_spanish_reading: Yahvé nuestro Dios
  alternative_spanish_readings:
  - el Señor nuestro Dios
  - el Señor Dios nuestro
  rationale: En este contexto κύριος remite al Dios de Israel dentro de un lenguaje de pacto, no a un título genérico de autoridad humana. Según el criterio del proyecto, se restaura el nombre divino como «Yahvé» para transparencia textual y coherencia con el material fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
- issue: ὄφλησιν como obligación/deuda bajo juicio
  english_pob_reading: payment
  chosen_spanish_reading: pago
  alternative_spanish_readings:
  - pena
  - deuda
  - obligación de pago
  rationale: El término griego conserva una gama semántica que incluye deuda u obligación incurrida, pero el contexto judicial permite una traducción breve y natural. «Pago» mantiene la idea de lo debido sin borrar la tensión entre obligación y pena; por eso no se reduce a mera ‘pena’.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency/documented exception)
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir una formulación más sobria para ὄφλησιν, pero en español se opta por «pago» dentro de una construcción más natural («para pago») para conservar la economía del verso. También se mantiene la estructura paralela de «para oprobio, para maldición y para pago», respetando la secuencia del griego y el matiz judicial del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al principio del proyecto para יהוה / κύριος cuando el referente es el Dios de Israel.
  - Se evita «SEÑOR» como máscara tipográfica; el nombre divino se explicita por transparencia textual.
  - «Exilio», «dispersaste», «oprobio» y «maldición» preservan el registro bíblico sin arcaizar innecesariamente.
  - «Injusticias» traduce ἀδικίας con fuerza moral y jurídica, en lugar de suavizarlo a un término meramente ético.
