translation:
  language: es
  text: Pues la cabeza de Aram es Damasco[a], y la cabeza de Damasco es Rezín; y dentro de sesenta y cinco años Efraín será quebrantado hasta dejar de ser un pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Efraín será quebrantado de modo que ya no sea un pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del anuncio anterior; 'Porque' conserva la relación lógica de causa/explicación en español natural.
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - capital
  - principal ciudad
  lexicon: HALOT
  rationale: 'Se mantiene la metáfora de ''cabeza'' para conservar el paralelismo: la cabeza de Aram es Damasco, y la cabeza de Damasco es Rezín.'
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se translitera el nombre propio hebreo para evitar reemplazarlo por un equivalente geopolítico posterior.
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  lexicon: HALOT
  rationale: Nombre propio de lugar en español estándar.
- source_word: רְצִין
  english_pob_choice: Rezin
  chosen_spanish: Rezín
  alternatives_spanish:
  - Rezin
  lexicon: HALOT
  rationale: Se usa la forma hispanizada habitual del nombre propio, con acento gráfico para la pronunciación en español.
- source_word: וּבְעוֹד
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en
  - antes de que pasen
  lexicon: HALOT
  rationale: Expresa el lapso temporal restante antes del cumplimiento; 'dentro de' suena natural en español y conserva el sentido prospectivo.
- source_word: שִׁשִּׁים וְחָמֵשׁ שָׁנָה
  english_pob_choice: sixty-five years
  chosen_spanish: sesenta y cinco años
  alternatives_spanish:
  - sesenta y cinco años
  lexicon: HALOT
  rationale: Número compuesto normal en español contemporáneo; no se requiere forma arcaizante.
- source_word: יֵחַת
  english_pob_choice: will be shattered
  chosen_spanish: será quebrantado
  alternatives_spanish:
  - será quebrado
  - será derribado
  lexicon: HALOT
  rationale: El nifal comunica colapso/ser aplastado como entidad nacional; 'quebrantado' preserva la fuerza del término sin sonar excesivamente físico.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraim
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española usual.
- source_word: מֵעָם
  english_pob_choice: from being a people
  chosen_spanish: hasta dejar de ser pueblo
  alternatives_spanish:
  - para no ser pueblo
  - de modo que no sea pueblo
  lexicon: HALOT
  rationale: La preposición más el sustantivo expresan pérdida de status nacional; 'hasta dejar de ser pueblo' comunica el resultado sin añadir interpretación ajena al hebreo.
theological_decisions:
- issue: Efecto nacional de la profecía sobre Efraín
  english_pob_reading: Ephraim will be shattered from being a people.
  chosen_spanish_reading: Efraín será quebrantado hasta dejar de ser pueblo.
  alternative_spanish_readings:
  - Efraín será quebrantado para no ser pueblo.
  - Efraín será destruido como pueblo.
  rationale: 'Se conserva la tensión profética: no sólo derrota militar, sino pérdida de identidad nacional. La redacción española mantiene esa fuerza sin suavizarla.'
  doctrine_reference: Profecía histórica y juicio nacional en Isaías 7:8; cf. el uso de עַם como pueblo/nación.
translation_notes:
  revision_awareness: El texto base en inglés no requirió revisiones posteriores; se sigue la lectura establecida en el audit trail con alta concordancia y sin cambios aplicados.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la metáfora de 'cabeza' para no perder el paralelismo semítico del original.
  - Se usa 'pueblo' en sentido nacional/colectivo para עַם, no como simple referencia étnica o espiritual.
