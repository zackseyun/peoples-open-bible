    rationale: Aunque formalmente posible, en español «la visión ... no volverá» resulta menos natural y menos transparente para el sentido contextual de no reversión del juicio. «No se volverá atrás» preserva el eco verbal sin sonar tan opaco.
  - severity: low
    issue: La nota d usa «no se invertirá».
    rationale: Para un anuncio de juicio, «invertir» no es la formulación más idiomática en español. «No se revertirá ni se retirará» expresa mejor la idea documentada en la auditoría inglesa.
  - severity: low
    issue: Una decisión léxica interna menciona por error «el comprador» como alternativa para הַמּוֹכֵר.
    rationale: No afecta el texto principal, pero es una alternativa incorrecta en la documentación interna y conviene no perpetuarla.
