  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Atalía oye la conmoción, se dirige hacia el pueblo y la escena ocurre en la casa de Yahvé. También preserva adecuadamente las alternativas léxicas para קוֹל y הָרָצִין, así como la nota sobre בֵּית יְהוָה.'
  spanish_quality_summary: El español es claro y natural en general, pero 'vino al pueblo' suena poco idiomático en este contexto narrativo. 'Fue hacia el pueblo' o 'se acercó al pueblo' expresa mejor el movimiento hacia la multitud sin forzar el español. Además, conviene mantener la coordinación y las notas sin cambios sustanciales.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; עָם → ''pueblo''; הָרָצִין → ''guardias'' con alternativa ''corredores''. No hay conflictos teológicos relevantes.'
  issues:
  - severity: medium
    issue: La expresión 'vino al pueblo' es poco natural en español en 2 Reyes 11:13.
    rationale: Aunque 'vino a' calca bastante bien וַתָּבֹא אֶל, en español narrativo 'vino al pueblo' suena extraña. El sentido es que Atalía se dirigió o se acercó al pueblo reunido en el recinto sagrado. Una formulación como 'fue hacia el pueblo' conserva el movimiento sin introducir interpretación excesiva.
  revised_spanish_text: Cuando Atalía oyó el ruido de los guardias y del pueblo[a][b], fue hacia el pueblo en la casa de Yahvé[c].
