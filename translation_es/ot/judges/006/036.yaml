translation:
  language: es
  text: 'Entonces Gedeón dijo a Dios: «Si vas a salvar a Israel por mi mano, como has hablado,»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» comunica ese paso en la narración de forma natural y digna en español.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a el Dios
  lexicon: HALOT
  rationale: En este contexto la referencia es al Dios de Israel; en español bíblico normal se usa «Dios» sin artículo, manteniendo la dirección del discurso sin sonar forzado.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aun si
  - En caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición abierta que continúa en el verso siguiente; «Si» preserva esa forma sin sobreinterpretarla.
- source_word: יֶשְׁךָ
  english_pob_choice: you will
  chosen_spanish: salvarás
  alternatives_spanish:
  - vas a salvar
  - salvarás tú
  lexicon: HALOT
  rationale: La construcción hebrea expresa una acción prospectiva; en español, el futuro simple transmite bien ese matiz formal y conserva la fuerza directa del original.
- source_word: מוֹשִׁיעַ
  english_pob_choice: save
  chosen_spanish: salvar
  alternatives_spanish:
  - librar
  - rescatar
  lexicon: HALOT
  rationale: El verbo ישׁע abarca salvar/liberar; «salvar» es la opción más amplia y corresponde al uso de POB en inglés, sin perder el contexto de liberación militar.
- source_word: בְּיָדִי
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - por medio de mí
  - por mi intervención
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de agencia instrumental. «Por mi mano» es natural en español bíblico y refleja la expresión concreta del texto fuente.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a Israel mismo
  - a todo Israel
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce; «a Israel» conserva el objeto de la acción de salvar.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: as you have spoken
  chosen_spanish: como has hablado
  alternatives_spanish:
  - como dijiste
  - tal como hablaste
  lexicon: HALOT
  rationale: «Hablar» mantiene la referencia al dicho previo de Dios y suena más cercano al registro bíblico general; el perfecto «has hablado» refleja la palabra ya pronunciada con vigencia presente.
theological_decisions:
- issue: Traducción de אֱלֹהִים en el discurso directo de Gedeón
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - un dios
  rationale: El contexto identifica al Dios de Israel; en español, «Dios» comunica esa referencia específica sin introducir una formulación más interpretativa como «el Dios».
  doctrine_reference: Traducción directa y referencialidad del nombre divino en contexto narrativo.
- issue: Valor prospectivo de la petición condicional
  english_pob_reading: If you will save Israel by my hand
  chosen_spanish_reading: Si salvarás a Israel por mi mano
  alternative_spanish_readings:
  - Si vas a salvar a Israel por mi mano
  - Si quieres salvar a Israel por mi mano
  rationale: La forma verbal futura en español expresa adecuadamente la expectativa/proyección del hebreo sin convertir la frase en una perífrasis menos directa. Se conserva el carácter condicional abierto de la petición.
  doctrine_reference: 'Lectura sintáctica del hebreo bíblico: condición y expectativa de cumplimiento.'
translation_notes:
  revision_awareness: Se siguió el estado revisado del audit trail inglés, especialmente la decisión final de usar un futuro directo ('will save'); en español se reflejó con futuro simple («salvarás») para mantener la misma formalidad y fuerza prospectiva. No se añadieron notas porque el verso no presenta una ambigüedad textual o léxica que requiera glosa en este segmento aislado.
  spanish_consistency_notes:
  - Se mantiene «Dios» como referencia directa al destinatario del discurso.
  - Se conserva el orden narrativo con «Entonces» para reproducir el avance del waw consecutivo.
  - «Por mi mano» preserva la imagen instrumental del hebreo y armoniza con otros pasajes de acción mediada en el proyecto.
  - Se evita introducir «Señor» o «Cristo», ya que el texto no lo requiere.
