    rationale: El hebreo presenta infinitivos de finalidad y la revisión inglesa auditada optó por 'to refine them, to purify, and to make them white'. En español, 'para refinarlos, purificarlos y hacerlos blancos' refleja mejor esa secuencia que 'para ser refinados...'.
  - severity: medium
