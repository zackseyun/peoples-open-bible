translation:
  language: es
  text: El ojo del que me ve ya no me contemplará[a]; tus ojos estarán sobre mí[b], pero yo ya no estaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El ojo que me ve no me verá».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Tus ojos [están] sobre mí, y no estoy»; es un modismo que significa que, cuando se me busca, ya no estoy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְשׁוּרֵנִי
  english_pob_choice: will ... behold me
  chosen_spanish: contemplará
  alternatives_spanish:
  - me verá
  - me observará
  lexicon: HALOT
  rationale: שור comunica mirar con atención, observar o contemplar. «Contemplará» conserva el matiz visual enfático y un tono algo elevado adecuado al lamento de Job, sin reducirlo a un simple «ver».
- source_word: עֵין רֹאִי
  english_pob_choice: the eye of the one who sees me
  chosen_spanish: el ojo del que me ve
  alternatives_spanish:
  - el ojo del que me contempla
  - el ojo que me ve
  lexicon: HALOT
  rationale: La construcción hebrea es un genitivo en cadena, literalmente «ojo de mi vidente / del que me ve». «El ojo del que me ve» preserva la imagen y la relación de observador observado sin sobreexplicarla.
- source_word: לֹא
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - 'no'
  - no volverá a
  lexicon: HALOT
  rationale: En el contexto de desaparición inminente, la negación expresa mejor una cesación temporal que una negación absoluta. «Ya no» reproduce ese valor contextual.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu ojo
  - tu mirada
  lexicon: HALOT
  rationale: El hebreo está en plural; «tus ojos» conserva la forma concreta y antropomórfica del texto. Se mantiene la dirección personal del discurso.
- source_word: בִּי
  english_pob_choice: on me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - en mí
  - a mí
  lexicon: HALOT
  rationale: Con «ojos» en español, «sobre mí» expresa mejor la atención dirigida del observador y sigue de cerca la imagen hebrea.
- source_word: וְאֵינֶנִּי
  english_pob_choice: but I will be gone
  chosen_spanish: pero yo habré desaparecido
  alternatives_spanish:
  - y no estaré
  - pero ya no estaré
  - y no seré
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de ausencia o desaparición. «Habré desaparecido» comunica esa fuerza idiomática en español natural, manteniendo la orientación futura del verso.
theological_decisions:
- issue: ¿A quién se dirige «tus ojos»?
  english_pob_reading: Addressed to God
  chosen_spanish_reading: Se mantiene el trato directo a Dios implícito en el contexto
  alternative_spanish_readings:
  - Puede leerse como un observador genérico
  - 'Podría explicitase: «tus ojos, oh Dios»'
  rationale: El contexto inmediato de Job conserva la segunda persona dirigida a Dios. El hebreo no nombra a Dios en este hemistiquio, por lo que no se añade una explicitación inexistente en el texto; se conserva la referencia implícita.
  doctrine_reference: Contexto discursivo de Job 7; respeto a la deixis del texto hebreo
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español sigue de cerca el audit trail estable y conserva la imagen poética y el modismo de desaparición sin suavizarlos en exceso.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo el paralelismo visual con «ojo/ojos» para conservar la imaginería hebrea.
  - «Contemplará» y «sobre mí» respetan el campo semántico de ver/mirar/dirigir la vista, evitando simplificación excesiva.
