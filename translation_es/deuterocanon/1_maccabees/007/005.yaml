translation:
  language: es
  text: Y vinieron a él todos los hombres inicuos e impíos de Israel, y Alcimo los dirigió, queriendo ejercer el sacerdocio.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «queriendo el sacerdocio». El infinitivo griego puede entenderse más literalmente como «actuar como sacerdote»; en este contexto, la referencia parece ser la aspiración de Alcimo al oficio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  lexicon: BDAG
  rationale: El griego es masculino plural y se refiere a un grupo concreto de varones; «hombres» conserva ese valor de forma natural en español.
- source_word: ἄνομοι
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - ilegales
  - malvados
  lexicon: BDAG
  rationale: «Sin ley» refleja de manera directa la fuerza de ἄνομοι y conserva la referencia probable a una oposición a la ley pactal, sin intensificar innecesariamente hacia un juicio moral más amplio.
- source_word: ἀσεβεῖς
  english_pob_choice: ungodly
  chosen_spanish: impíos
  alternatives_spanish:
  - sin Dios
  - irreligiosos
  lexicon: BDAG
  rationale: «Impíos» mantiene la dimensión religiosa de irreverencia o impiedad ante Dios y corresponde bien al par con «sin ley».
- source_word: ἐξ Ἰσραήλ
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - procedentes de Israel
  lexicon: BDAG
  rationale: La preposición expresa procedencia o pertenencia al grupo; «de Israel» es la forma más natural y fiel en español.
- source_word: ἡγείται
  english_pob_choice: led
  chosen_spanish: los encabezaba
  alternatives_spanish:
  - los guiaba
  - era su líder
  lexicon: BDAG
  rationale: En narrativa, ἡγείται presenta a Alcimo como cabeza del grupo. «Los encabezaba» conserva la idea de liderazgo sin añadir información ajena al texto.
- source_word: βουλόμενος
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  lexicon: BDAG
  rationale: El participio indica intención o propósito de Alcimo. «Queriendo» es una equivalencia sobria y directa en español.
- source_word: ἱερατεύειν
  english_pob_choice: to be priest
  chosen_spanish: ejercer el sacerdocio
  alternatives_spanish:
  - ser sacerdote
  - servir como sacerdote
  lexicon: LSJ
  rationale: Aunque el griego puede leerse más literalmente como «actuar como sacerdote», en este contexto 1 Macabeos trata de una aspiración al cargo sacerdotal. «Ejercer el sacerdocio» preserva la función sin forzar una precisión no explícita en la forma verbal griega.
theological_decisions:
- issue: Carga moral y religiosa de la descripción de los israelitas rebeldes
  english_pob_reading: lawless and ungodly
  chosen_spanish_reading: sin ley e impíos
  alternative_spanish_readings:
  - ilegales e impíos
  - sin ley y malvados
  rationale: 'La frase mantiene la doble acusación: una en clave de ley/pacto («sin ley») y otra en clave religiosa («impíos»). Así no se borra la tensión del texto entre infracción legal y falta de reverencia.'
  doctrine_reference: DOCTRINE.md §§1, 5
- issue: Sentido del infinitivo ἱερατεύειν en el contexto histórico de 1 Macabeos
  english_pob_reading: wanting to be priest
  chosen_spanish_reading: queriendo ejercer el sacerdocio
  alternative_spanish_readings:
  - queriendo ser sacerdote
  - queriendo el sacerdocio
  rationale: El contexto narrativo apunta a la aspiración de Alcimo al oficio sacerdotal. La opción elegida comunica esa ambición de manera clara sin introducir el calificativo «sumo» o «alto» que no está en la forma griega.
  doctrine_reference: DOCTRINE.md §1
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de «wanting to be high priest» a «wanting to be priest» tras una revisión que observó que ἱερατεύειν no incluye explícitamente «alto/sumo». La redacción española evita ese añadido y opta por una expresión que preserve la función sacerdotal sin exagerar el cargo.
  spanish_consistency_notes:
  - Se mantiene el par semántico legal/religioso de la fuente con «sin ley e impíos».
  - Se evita traducir ἱερατεύειν con un término litúrgico más fuerte que el texto no exige.
  - «Alcimo» se conserva como nombre propio estándar en español bíblico.
