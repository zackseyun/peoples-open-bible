translation:
  language: es
  text: 'Entonces la mujer cuyo hijo estaba vivo le dijo al rey, pues se le conmovieron[a] las entrañas por su hijo, y dijo: «Te ruego, mi señor, denle a ella el niño vivo, y no lo maten[b]». Pero la otra dijo: «Ni mío ni tuyo será; córtenlo en dos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expresión hebrea idiomática para una compasión intensa, especialmente maternal; literalmente alude a una conmoción visceral.
    reason: cultural_note
  - marker: b
    text: 'El hebreo usa una prohibición enfática: literalmente, «no, no lo maten» o «ciertamente no lo maten».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְמְרוּ רַחֲמֶיהָ
  english_pob_choice: her compassion was stirred
  chosen_spanish: se le conmovieron las entrañas
  alternatives_spanish:
  - su compasión se conmovió
  - se despertó su compasión
  - se le encendió la compasión
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y combina la idea de emoción visceral con compasión materna. En español, «se le conmovieron las entrañas» conserva el matiz corporal e intenso sin volverlo torpe, y mantiene la tensión entre compasión y afecto profundo que el hebreo sugiere.
- source_word: בִּי אֲדֹנִי
  english_pob_choice: Please, my lord
  chosen_spanish: Te ruego, mi señor
  alternatives_spanish:
  - Por favor, mi señor
  - Te suplico, mi señor
  - Te lo ruego, mi señor
  lexicon: HALOT
  rationale: El בִּי funciona como ruego deferente. «Te ruego, mi señor» expresa súplica respetuosa en un registro natural y digno en español, sin volverlo demasiado coloquial ni excesivamente arcaico.
- source_word: הַיָּלוּד הַחַי
  english_pob_choice: the living child
  chosen_spanish: el niño vivo
  alternatives_spanish:
  - el hijo vivo
  - el niño que vive
  - el recién nacido vivo
  lexicon: HALOT
  rationale: יַלוּד apunta al nacido; en este contexto, «niño» comunica mejor que «hijo» la referencia concreta al infante disputado. «Vivo» mantiene el contraste con el muerto y sigue de cerca el hebreo y la decisión inglesa.
- source_word: וְהָמֵת אַל תְּמִיתֻהוּ
  english_pob_choice: and do not put him to death
  chosen_spanish: y no lo maten
  alternatives_spanish:
  - y de ninguna manera lo maten
  - y no lo den muerte
  - y no lo maten, en absoluto
  lexicon: HALOT
  rationale: El hebreo intensifica la prohibición con infinitivo absoluto + verbo finito. En español, «y no lo maten» es claro y fiel; la intensificación puede explicarse en nota sin forzar una perífrasis dura o antinatural en la línea principal.
- source_word: וְזֹאת אֹמֶרֶת
  english_pob_choice: But the other said
  chosen_spanish: Pero la otra dijo
  alternatives_spanish:
  - Y esta dijo
  - Y la otra dijo
  - Pero ella dijo
  lexicon: HALOT
  rationale: El demostrativo hebreo es contrastivo. «La otra» reproduce esa oposición entre las dos mujeres, natural en español y coherente con la lectura contextual y la elección inglesa.
- source_word: גַּם לִי גַם לָךְ לֹא יִהְיֶה
  english_pob_choice: It shall be neither mine nor yours
  chosen_spanish: Ni mío ni tuyo será
  alternatives_spanish:
  - No será ni mío ni tuyo
  - Ni para mí ni para ti será
  - No te pertenecerá ni me pertenecerá
  lexicon: HALOT
  rationale: El hebreo expresa posesión excluyente. «Ni mío ni tuyo será» conserva el paralelismo y la rivalidad posesiva, y funciona bien en español sin añadir explicaciones.
- source_word: גְּזֹרוּ
  english_pob_choice: cut him in two
  chosen_spanish: córtenlo en dos
  alternatives_spanish:
  - divídanlo
  - córtenlo
  - rásguenlo en dos
  lexicon: HALOT
  rationale: El imperativo final es abrupto y cruel. «Córtenlo en dos» mantiene la violencia del mandato y hace explícito el sentido contextual de dividir al niño, como en el inglés auditado.
theological_decisions:
- issue: Cómo expresar la compasión materna sin borrar su fuerza corporal en el hebreo
  english_pob_reading: her compassion was stirred
  chosen_spanish_reading: se le conmovieron las entrañas
  alternative_spanish_readings:
  - su compasión se conmovió
  - se despertó su compasión
  rationale: El hebreo usa un idioma de afecto visceral, no solo emocional. «Entrañas» preserva esa carga antropológica y literaria, evitando reducir el pasaje a un sentimentalismo abstracto. No introduce doctrina nueva, pero sí cuida la imaginería bíblica del afecto profundo.
  doctrine_reference: Antropología bíblica; uso figurado de compasión en lenguaje semítico
- issue: Intensificación de la prohibición en la orden de no matar al niño
  english_pob_reading: do not put him to death
  chosen_spanish_reading: y no lo maten
  alternative_spanish_readings:
  - y de ninguna manera lo maten
  - y no lo maten, en absoluto
  rationale: La forma hebrea es enfática. La traducción principal mantiene la prohibición simple y legible, mientras que la fuerza enfática queda disponible como nota para no sobrecargar el verso con una construcción poco natural. Así no se pierde la tensión retórica del original.
  doctrine_reference: Ninguna; decisión retórica y sintáctica
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que suavizó la causalidad y simplificó la prohibición final. La versión española sigue esa lectura más directa, pero conserva en nota el valor enfático del hebreo donde el inglés ya había optado por una formulación más natural.
  spanish_consistency_notes:
  - Se mantiene «mi señor» como fórmula de respeto para אֲדֹנִי.
  - Se usa «niño» para יָלוּד en coherencia con el contexto judicial del relato.
  - Se preserva la oposición contrastiva entre «la mujer cuyo hijo estaba vivo» y «la otra».
  - Se evita «SEÑOR» para el nombre divino porque este versículo no lo contiene.
  - Se conserva un registro bíblico claro, sin arcaísmos excesivos ni paráfrasis interpretativas.
