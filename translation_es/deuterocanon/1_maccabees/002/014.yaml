translation:
  language: es
  text: Y Matatías y sus hijos rasgaron sus vestidos, se vistieron de saco[a], y se lamentaron mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa un plural aquí, pero en español esta práctica de duelo normalmente se expresa con el singular colectivo: «saco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διέρρηξεν
  english_pob_choice: tore
  chosen_spanish: rasgaron
  alternatives_spanish:
  - rompieron
  - desgarraron
  lexicon: LSJ
  rationale: El verbo describe el acto ritual de romper las vestiduras en señal de duelo. En español, 'rasgar' comunica bien esa acción visible sin sonar tan general como 'romper' ni tan literario como 'desgarrar'.
- source_word: τὰ ἱμάτια
  english_pob_choice: clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus vestiduras
  lexicon: LSJ
  rationale: ἱμάτια se refiere a prendas exteriores; 'vestidos' conserva un registro bíblico claro en español y funciona naturalmente en la escena de duelo. 'Vestiduras' es más solemne, pero algo más marcado; 'ropas' es más amplio.
- source_word: περιεβάλοντο σάκκους
  english_pob_choice: put on sackcloth
  chosen_spanish: se vistieron de saco
  alternatives_spanish:
  - se cubrieron con saco
  - se pusieron saco
  - se vistieron de cilicio
  lexicon: LSJ
  rationale: El griego usa un plural concreto ('sackcloths'), pero el español bíblico y natural suele expresar esta práctica con singular colectivo. 'Saco' mantiene la imagen de duelo sin imponer 'cilicio', que ya interpreta más allá del sustantivo del original.
- source_word: ἐπένθησαν σφόδρα
  english_pob_choice: mourned greatly
  chosen_spanish: lloraron muchísimo
  alternatives_spanish:
  - guardaron duelo intensamente
  - se lamentaron mucho
  - estuvieron de duelo en gran manera
  lexicon: LSJ
  rationale: El verbo señala duelo/llanto ritual en este contexto. 'Lloraron muchísimo' conserva la intensidad del adverbio y da una respuesta española natural; 'mourned' no tiene un equivalente único y seco en español que suene igual de idiomático aquí.
- source_word: Ματταθίας
  english_pob_choice: Mattathias
  chosen_spanish: Matatías
  alternatives_spanish:
  - Mattatías
  - Matatias
  lexicon: transliteration policy
  rationale: Se adopta la transliteración tradicional en español de uso bíblico para el nombre propio, conservando la forma reconocible y acorde con la lectura pública.
theological_decisions:
- issue: Expresión de duelo ritual con vestiduras rasgadas y saco
  english_pob_reading: The verse presents a conventional mourning action without additional doctrinal framing.
  chosen_spanish_reading: El versículo presenta un gesto convencional de duelo, sin añadir interpretación doctrinal.
  alternative_spanish_readings:
  - El versículo subraya una penitencia formal.
  - El gesto anticipa una liturgia de arrepentimiento.
  rationale: El texto describe una práctica de luto en respuesta a la crisis; no hay base en el griego para convertirla en penitencia sacramental ni para cargarla con un sentido doctrinal que el contexto no explicita.
  doctrine_reference: Historia y práctica de duelo en la Escritura; cf. señales de luto en Gn 37:34; Est 4:1, sin implicar un rito doctrinal específico.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en acuerdo alto y no muestran revisiones sustantivas; esta versión española sigue de cerca ese consenso sin añadir matices no documentados.
  spanish_consistency_notes:
  - 'Se conserva el nombre propio en forma española bíblica: Matatías.'
  - Se evita 'SEÑOR' u otros sustitutos porque no aparece el nombre divino en este versículo.
  - '''Saco'' se usa como equivalente del atuendo de duelo, manteniendo la equivalencia funcional del inglés ''sackcloth''.'
