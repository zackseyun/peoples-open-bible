id: JOB.19.25
reference: Job 19:25
source:
  edition: WLC
  text: וַ/אֲנִ֣י יָ֭דַעְתִּי גֹּ֣אֲלִ/י חָ֑י וְ֝/אַחֲר֗וֹן עַל עָפָ֥ר יָקֽוּם־׃
translation:
  text: But as for me[a], I know that my Redeemer lives[c][b], and afterward he will rise over the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my Vindicator.' The Hebrew גֹּאֵל can denote a redeemer, defender, or one who vindicates a family member's cause.
    reason: lexical_alternative
  - marker: b
    text: Or 'and at the last he will stand upon the earth.' The Hebrew of this clause is difficult and has also been understood as 'and as the last one he will stand over the dust.'
    reason: alternative_reading
  - marker: c
    text: '''Dust'' may evoke mortality, the grave, or the earth; the Hebrew is literally ''dust.'''
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun is emphatic and contrastive in context. 'But as for me' brings out the marked personal assertion better than a bare 'And I.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: The perfect here expresses Job's settled conviction in present relevance. English present 'I know' best communicates that force idiomatically.
- source_word: גֹּאֲלִי
  chosen: my Redeemer
  alternatives:
  - my vindicator
  - my kinsman-redeemer
  - my avenger
  lexicon: HALOT
  rationale: The noun גאל denotes one who acts as a family redeemer, defender, or vindicator. 'Redeemer' preserves the traditional and theological weight while remaining broad enough not to over-specify one legal nuance. Because 'vindicator' is a strong contextual option in Job, it is preserved in a footnote.
- source_word: חָי
  chosen: lives
  alternatives:
  - is living
  - is alive
  lexicon: HALOT
  rationale: Predicate adjective rendered idiomatically as the English verb 'lives.' This is the most natural way to express the ongoing reality asserted by the Hebrew.
- source_word: וְאַחֲרוֹן
  chosen: afterward
  alternatives:
  - at the last
  - as the last one
  - finally
  lexicon: HALOT
  rationale: The form can function adverbially or substantivally, and this verse is famously disputed. 'Afterward' fits the immediate syntax with יקום and avoids importing a more specific eschatological claim than the Hebrew unambiguously states. The traditional 'at the last' and the substantival 'the last one' are preserved in footnotes.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - 'on'
  - against
  lexicon: HALOT
  rationale: The preposition commonly means 'on/upon/over.' 'Over' works naturally in English with 'rise' and leaves the exact spatial nuance open.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - dust
  - the grave
  lexicon: HALOT
  rationale: The Hebrew literally means 'dust.' Rendering it literally preserves the imagery and avoids prematurely interpreting it as 'grave,' though that interpretive sense may be in view.
- source_word: יָקוּם
  chosen: he will rise
  alternatives:
  - he will stand
  - he will arise
  lexicon: HALOT
  rationale: קום can mean 'rise,' 'arise,' or 'stand up.' 'Rise' fits well with 'over the dust' and preserves the vividness of the Hebrew without forcing a courtroom-only or resurrection-only nuance.
