translation:
  language: es
  text: No desees repetir una mentira[a], porque su fin no es agradable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo, literalmente, 'no desees mentir sobre mentira'; la expresión probablemente significa añadir mentira sobre mentira o practicar la falsedad repetidamente. El paralelo griego dice 'no quieras toda mentira', lo que respalda el sentido amplio de falseedad reiterada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - Nunca
  lexicon: HALOT
  rationale: Expresa la prohibición de forma natural en español para un mandato admonitorio.
- source_word: תַּחְפֹּץ
  english_pob_choice: desire
  chosen_spanish: desees
  alternatives_spanish:
  - te complazcas en
  - quieras
  - tengas ganas de
  lexicon: HALOT
  rationale: חפץ comunica deseo o complacencia; en español, 'desees' conserva el matiz volitivo sin sonar arcaico.
- source_word: לְכַחֵש עַל כָּחַש
  english_pob_choice: to repeat a lie
  chosen_spanish: repetir una mentira
  alternatives_spanish:
  - mentir
  - practicar la falsedad
  - decir mentira tras mentira
  lexicon: HALOT
  rationale: La construcción hebrea sugiere añadir falsedad a falsedad, o persistir en ella; 'repetir una mentira' refleja ese carácter acumulativo y coincide con el apoyo de la versión griega al sentido amplio de falseedad repetida.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición y suena natural en español.
- source_word: תִקְוָתוֹ
  english_pob_choice: its end
  chosen_spanish: su fin
  alternatives_spanish:
  - su esperanza
  - su resultado
  - su expectativa
  lexicon: HALOT
  rationale: Aunque literalmente puede significar 'esperanza' o 'expectativa', con antecedente inanimado y en paralelo con el griego, 'su fin' comunica mejor el desenlace o término del proceder falso.
- source_word: לֹא תִנְעָם
  english_pob_choice: is not pleasant
  chosen_spanish: no es agradable
  alternatives_spanish:
  - no es bueno
  - no es dulce
  - no será agradable
  lexicon: HALOT
  rationale: נעם se refiere a lo agradable o dulce; en español 'no es agradable' conserva la fuerza de la evaluación y sigue de cerca el matiz del texto hebreo respaldado por el griego, sin endurecerlo a 'bueno'.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB desde 'su resultado no es bueno' a 'su fin no es agradable', ajustando el español para reflejar con más precisión תִקְוָתוֹ לֹא תִנְעָם y manteniendo al mismo tiempo la amplitud semántica que exige la construcción hebrea y su paralelo griego.
  spanish_consistency_notes:
  - Se usó 'mentira' en lugar de una formulación más genérica como 'falsedad' para conservar la concreción de la admonición.
  - '''Fin'' se eligió para תִקְוָתוֹ por coherencia con la revisión inglesa y porque funciona mejor que ''esperanza'' con un sujeto inanimado.'
  - No se empleó 'Señor' ni terminología teológica no presente en el versículo.
  - La nota al pie preserva la tensión entre el hebreo idiomático y el griego paralelo sin resolverla de manera reductiva.
