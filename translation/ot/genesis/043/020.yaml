id: GEN.43.20
reference: Genesis 43:20
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ בִּ֣י אֲדֹנִ֑/י יָרֹ֥ד יָרַ֛דְנוּ בַּ/תְּחִלָּ֖ה לִ/שְׁבָּר אֹֽכֶל־׃
translation:
  text: And they said[a], “Please, my lord[b], we came down the first time to buy food.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we surely came down the first time to buy food.” The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: “My lord” here is a respectful address to a human superior, not a divine title.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form introducing direct speech. 'And they said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: בִּי
  chosen: Please
  alternatives:
  - Pardon me
  - I beg you
  lexicon: HALOT
  rationale: This interjection is a polite entreaty, not the literal prepositional sense 'in me.' 'Please' is natural modern English and fits the deferential address.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: A respectful form of address to a superior. 'My lord' preserves the elevated social register better than 'sir,' while avoiding theological overtones not present in context.
- source_word: יָרֹד יָרַדְנוּ
  chosen: we indeed came down
  alternatives:
  - we surely came down
  - we really did come down
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Indeed' captures the emphatic force in idiomatic English without sounding awkward.
- source_word: בַּתְּחִלָּה
  chosen: the first time
  alternatives:
  - at the beginning
  - initially
  lexicon: HALOT
  rationale: In this narrative context the phrase refers to their earlier trip, not an abstract beginning. 'The first time' best conveys the temporal sense in natural English.
- source_word: לִשְׁבָּר
  chosen: to buy
  alternatives:
  - to purchase grain
  - to buy grain
  lexicon: HALOT
  rationale: The verb literally refers to procuring grain/food supplies, often by purchase. Since the object here is broader ('food'), 'to buy' is the most fitting concise rendering.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - grain
  - provisions
  lexicon: HALOT
  rationale: Although the broader context involves grain, the noun itself is the more general 'food.' 'Food' follows the source text's plain sense and avoids narrowing beyond what is stated in this verse.
