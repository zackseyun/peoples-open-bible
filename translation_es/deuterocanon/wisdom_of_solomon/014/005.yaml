  yaml_path: translation/deuterocanon/wisdom_of_solomon/014/005.yaml
  text: But you intend that the works of your wisdom should not be idle[a]; therefore even with the smallest piece of wood men entrust their lives, and passing through the waves on a raft[b], they were brought safely through.
  footnotes:
