  rationale: Se elimina el pronombre 'lo' para reflejar mejor la sintaxis hebrea y evitar una frase española confusa. Se cambia 'sobre él' por 'contra él' para una lectura natural en español en contexto hostil, manteniendo 'sobre él' como alternativa en nota. Se reubican las notas a sus palabras pertinentes y se corrige el error tipográfico en la nota lexical.
