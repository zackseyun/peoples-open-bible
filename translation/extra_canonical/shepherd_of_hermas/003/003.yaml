translation:
  text: 'After she had stopped these words, she says to me, “Do you wish to hear me reading?” And I say,
    “I do, Lady.” She says to me, “Become a hearer, and hear the glories of God.” I heard great and wondrous
    things which I was not able to remember; for all the words were terrifying—things a human being is
    not able to bear. So I remembered the last words, for they were beneficial and gentle for us:'
