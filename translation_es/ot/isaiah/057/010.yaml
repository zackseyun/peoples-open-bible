translation:
  language: es
  text: 'En la multitud de tus caminos te cansaste, pero no dijiste: «No hay esperanza».[a] Hallaste la vida de tu mano;[b] por eso no te debilitaste.[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Es inútil». El hebreo puede expresar desesperación o la conclusión de que seguir esforzándose ya no sirve.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «la vida de tu mano». La expresión probablemente alude a vitalidad o fuerza renovada para seguir adelante.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «no desfalleciste» o «no te volviste débil».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב / דַּרְכֵּךְ
  english_pob_choice: In the multitude of your ways
  chosen_spanish: En la multitud de tus caminos
  alternatives_spanish:
  - En la abundancia de tus caminos
  - En la grandeza de tu camino
  lexicon: HALOT
  rationale: רֹב expresa multitud, abundancia o grandeza; con דֶּרֶךְ, el plural español "caminos" refleja mejor la serie de conductas o cursos recorridos. Mantiene la imagen hebrea sin forzar una paráfrasis.
- source_word: יָגַעַתְּ
  english_pob_choice: you grew weary
  chosen_spanish: te cansaste
  alternatives_spanish:
  - te fatigaste
  - te agotaste
  lexicon: HALOT
  rationale: El verbo comunica cansancio por esfuerzo persistente. "Te cansaste" es natural en español y conserva la idea de desgaste por el camino recorrido.
- source_word: נוֹאָשׁ
  english_pob_choice: It is hopeless
  chosen_spanish: No hay esperanza
  alternatives_spanish:
  - Es desesperante
  - No tiene remedio
  lexicon: HALOT
  rationale: El hebreo expresa desesperanza o la conclusión de que seguir esforzándose es inútil. En español, "No hay esperanza" reproduce bien ese valor sin suavizarlo.
- source_word: חַיַּת יָדֵךְ
  english_pob_choice: the life of your hand
  chosen_spanish: la vida de tu mano
  alternatives_spanish:
  - la vitalidad de tu mano
  - la fuerza renovada de tu mano
  - la vida/energía de tu mano
  lexicon: HALOT
  rationale: Se conserva la expresión comprimida y metafórica del hebreo. Aunque el sentido probable sea fuerza o vitalidad renovada, la forma "la vida de tu mano" respeta la tensión léxica documentada por el POB.
- source_word: מָצָאת
  english_pob_choice: you found
  chosen_spanish: hallaste
  alternatives_spanish:
  - encontraste
  - obtuiste
  lexicon: HALOT
  rationale: מצא es el verbo simple "hallar/encontrar". "Hallaste" suena digno y mantiene el paralelismo con el hebreo.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La expresión introduce consecuencia. "Por eso" es claro y natural en español, sin perder la relación causal.
- source_word: לֹא חָלִית
  english_pob_choice: you did not grow weak
  chosen_spanish: no te debilitaste
  alternatives_spanish:
  - no desfalleciste
  - no te cansaste
  lexicon: HALOT
  rationale: חלה aquí no apunta a enfermedad física sino a flaquear o ceder. "No te debilitaste" conserva esa fuerza semántica y el contraste con el cansancio previo.
theological_decisions:
- issue: Sentido global del verso en el contexto de Isaías 57
  english_pob_reading: The verse describes stubborn perseverance in sinful pursuit rather than commendable endurance.
  chosen_spanish_reading: El verso describe una perseverancia obstinada en un camino culpable, no una constancia elogiada.
  alternative_spanish_readings:
  - Podría leerse como simple persistencia en una meta difícil.
  - Podría sonar neutral si se aislara del contexto.
  rationale: El contexto inmediato de Isaías 57 reprende la infidelidad e idolatría; la traducción debe conservar ese filo sin añadir comentario explicativo al texto principal.
  doctrine_reference: Mantener la tensión teológica del texto y depender del contexto canónico para su valoración.
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente del POB inglés: se prefirió una versión literal de חַיַּת יָדֵךְ, pero en español se conserva la forma figurada con nota para no borrar la tensión léxica. También se reflejó el ajuste de pluralidad en בְּרֹב דַּרְכֵּךְ mediante «caminos».'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como convención general del proyecto; aquí no aplica.
  - Se mantuvo un registro sobrio y publicable, evitando calcos innecesarios.
  - Las notas al pie están ancladas exactamente en los tres lugares marcados en el texto.
  - Se preservó la negatividad del contexto sin introducir glosa doctrinal en la línea principal.
