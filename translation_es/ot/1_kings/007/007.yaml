    rationale: El sujeto ya está claro por el contexto verbal; omitirlo mejora la fluidez y evita un tono pesado o calcado.
  revised_spanish_text: Y hizo el Salón del Trono[a], donde había de juzgar, el Salón de juicio; y estaba revestido de cedro, del piso al piso.
