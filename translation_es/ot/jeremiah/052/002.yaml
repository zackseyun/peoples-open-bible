translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé[a], conforme a todo lo que había hecho Joacim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante los ojos de Yahvé», un modismo estándar que significa «a la vista de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol en español puede quedar de forma natural con un verbo simple en pasado; el contexto narrativo ya aporta la secuencia, así que no hace falta repetir una conjunción inicial si la frase fluye mejor sin perder continuidad.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La expresión hebrea עשה הרע es idiomática. En español, 'hacer lo malo' conserva el valor evaluativo sin volver la frase forzada, y evita una abstracción excesiva como 'el mal'.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la vista de
  lexicon: HALOT
  rationale: La imagen evaluativa se mantiene en español con una fórmula transparente y natural. 'Ante los ojos de' comunica adecuadamente el juicio divino sin ocultar la metáfora.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - como todo lo que
  lexicon: HALOT
  rationale: La construcción de conformidad se expresa de manera natural en español con 'conforme a todo lo que', que mantiene la idea de correspondencia plena con el patrón previo.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto español ayuda a mostrar que la acción de Joacim precede a la del sujeto de la oración, reflejando la relación temporal implícita en el hebreo.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Jehoiaquim
  - Joaquim
  lexicon: HALOT
  rationale: Se usa la forma española tradicional de este nombre bíblico, ampliamente reconocible y adecuada para lectura pública en español.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene directamente el Tetragrama. Siguiendo la política del proyecto, se preserva el nombre propio de Dios en español en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se siguió de cerca el texto fuente hebreo y el audit trail inglés. La única decisión sensible es la frase idiomática hebrea עשה הרע בְּעֵינֵי יְהוָה, conservada en español con un modismo equivalente y el nombre divino según la norma del proyecto. No se detectaron revisiones textuales adicionales en el paquete provisto.
  spanish_consistency_notes:
  - Se mantuvo un registro verbal sobrio y bíblico, sin calco excesivo.
  - Se preservó la relación temporal entre la acción del rey y la de Joacim con el pluscuamperfecto español.
  - El nombre de YHWH se normalizó como Yahvé, consistente con el estándar español del proyecto.
  - Joacim se emplea como forma hispanizada habitual del nombre propio bíblico.
