translation:
  language: es
  text: los hijos de Anéis[a], ciento uno; los hijos de Arom, los hijos de Basái, trescientos veintitrés; los hijos de Arseifoureit[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre griego aquí diverge del paralelo hebreo aproximado de Nehemías 7:23, que lee «los hijos de Bezai».
    reason: textual_variant
