lexical_decisions:
- source_word: וְנָקַל
  english_pob_choice: is a small thing
  chosen_spanish: es algo pequeño
  alternatives_spanish:
  - es una cosa ligera
  - es fácil
  - es una cosa trivial
  lexicon: HALOT
  rationale: El verbo expresa que algo resulta liviano, poco importante o fácil. En español, «es algo pequeño» conserva el juicio de poca magnitud sin sonar forzado, y mantiene el valor evaluativo del hebreo.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esto mismo
  lexicon: HALOT
  rationale: El demostrativo se refiere a la acción o provisión mencionada en el contexto inmediato. «Esto» es la forma más natural y fiel en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - a la vista de
  - en la estimación de
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de evaluación. «Ante los ojos de» conserva la imagen y funciona con naturalidad en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, evitando la sustitución por un título.
- source_word: וְנָתַן
  english_pob_choice: he will also give
  chosen_spanish: también entregará
  alternatives_spanish:
  - y entregará
  - entregará además
  - también dará
  lexicon: HALOT
  rationale: En contexto profético, la forma perfecta con waw tiene sentido de futuro. «Entregará» reproduce el acto de poner algo bajo dominio ajeno; «también» refleja que esto se suma a la provisión del agua.
- source_word: אֶת מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: a Moab
  alternatives_spanish:
  - Moab
  - al territorio de Moab
  - a los moabitas
  lexicon: HALOT
  rationale: El objeto directo es la entidad Moab. En español, el verbo «entregar» requiere complemento con «a» para expresar el destinatario del acto, manteniendo la referencia colectiva/política del hebreo.
- source_word: בְּיֶדְכֶם
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en vuestras manos
  - bajo tu poder
  - en tu poder
  lexicon: HALOT
  rationale: La metáfora hebrea de la mano expresa poder, dominio o posesión. Se conserva literalmente «en tu mano» para mantener el modismo bíblico, sin perder inteligibilidad.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino en español como «Yahvé», siguiendo el principio del proyecto de no enmascarar el nombre con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
