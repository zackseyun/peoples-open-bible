translation:
  language: es
  text: 'Si yo hubiera dicho: «Hablaré así», he aquí, habría traicionado la generación de tus hijos.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habría sido infiel a la generación de tus hijos»; también «...de tus hijos» puede entenderse como «...de tus hijos» en sentido colectivo del pueblo que te pertenece.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: HALOT
  rationale: Introduce la cláusula condicional de manera natural en español y conserva el valor hipotético del hebreo.
- source_word: אָמַרְתִּי
  english_pob_choice: I had said
  chosen_spanish: yo hubiera dicho
  alternatives_spanish:
  - yo había dicho
  - yo dijera
  lexicon: HALOT
  rationale: El contexto condicional irreal en español se expresa mejor con pluscuamperfecto de subjuntivo; mantiene la fuerza hipotética del hebreo sin volverla una afirmación factual.
- source_word: אֲסַפְּרָה
  english_pob_choice: I will speak
  chosen_spanish: Hablaré
  alternatives_spanish:
  - Diré
  - Contaré
  - Narraré
  lexicon: HALOT
  rationale: Con כְמוֹ / así, el verbo apunta a expresar esa postura o discurso; «hablaré» es más natural en español y evita sobreespecificar «contar» o «narrar».
- source_word: כְמוֹ
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de esa manera
  lexicon: HALOT
  rationale: «Así» conserva la referencia deíctica al tipo de discurso aludido y corresponde bien al giro formal «thus» del audit trail inglés.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ciertamente
  - ve
  lexicon: HALOT
  rationale: «He aquí» reproduce el valor enfático y abrupto del hebreo con registro bíblico apropiado en español.
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - linaje
  - era
  - pueblo
  lexicon: HALOT
  rationale: «Generación» es la equivalencia directa y conserva el alcance comunitario del término en este contexto.
- source_word: בָּנֶיךָ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tu descendencia
  lexicon: HALOT
  rationale: El sufijo de 2ms dirigido a Dios queda reflejado con «tus». «Hijos» sigue el valor masculino plural formal del hebreo, mientras que el contexto puede incluir al pueblo como conjunto sin necesidad de neutralización.
- source_word: בָגָדְתִּי
  english_pob_choice: I would have betrayed
  chosen_spanish: habría traicionado
  alternatives_spanish:
  - habría sido infiel a
  - habría obrado traidoramente contra
  lexicon: HALOT
  rationale: בגד expresa traición o infidelidad relacional; «traicionado» transmite esa deslealtad con naturalidad y fuerza en español.
theological_decisions:
- issue: 'Sentido de בָּנֶיךָ: hijos/hijos del pacto o comunidad de Dios'
  english_pob_reading: Addressed to God; the psalmist says that voicing his complaint publicly would have been a betrayal of God's covenant people.
  chosen_spanish_reading: Dirigido a Dios; el salmista dice que, si hubiera hablado así, habría traicionado a la generación que le pertenece a Dios.
  alternative_spanish_readings:
  - '...habría traicionado la generación de tus hijos.'
  - '...habría sido infiel a la generación de tus hijos.'
  rationale: La forma pronominal de segunda persona exige entender a Dios como interlocutor. «Tus hijos» conserva la referencia relacional sin exigir una paráfrasis doctrinal; «le pertenece a Dios» explicita la pertenencia implícita en el contexto sin alterar el texto.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de אָמַרְתִּי en un contexto condicional irreal
  english_pob_reading: I had said
  chosen_spanish_reading: «yo hubiera dicho»
  alternative_spanish_readings:
  - «yo había dicho»
  - «yo dijera»
  rationale: El hebreo presenta una condición no realizada y reflexiva; el pluscuamperfecto de subjuntivo en español comunica mejor esa irrealidad que un simple pretérito perfecto de indicativo.
  doctrine_reference: Grammar and discourse in conditional counterfactual clauses
translation_notes:
  revision_awareness: El inglés auditado revisó «like this» a «thus» para un registro más formal. La versión española adopta «así», que conserva la referencia deíctica y suena natural y digna en español. También se preserva la opción de lectura alternativa «Hablaré así» como reflejo directo de אֲסַפְּרָה כְמוֹ.
  spanish_consistency_notes:
  - Se mantuvo Yahvé en términos del proyecto, pero aquí el texto hebreo usa un sufijo posesivo dirigido a Dios, no el tetragrama.
  - Se prefirió «traicionado» frente a «ser infiel» por la fuerza relacional de בגד y por coherencia con el audit trail inglés.
  - La puntuación coloca la cita directa con comillas españolas y conserva la pausa enfática de הִנֵּה con «he aquí».
