    changes_summary: 'Added the remaining clause from the source text: ''Shout joyfully to Yahweh, all the earth.'' Also rendered יהוה as ''Yahweh'' and translated the imperative הָרִיעוּ naturally and accurately.'
translation:
  language: es
  text: Salmo de acción de gracias[a]. ¡Aclamen con júbilo a Yahvé, toda la tierra!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: לְתוֹדָה. También puede entenderse como «salmo para una ofrenda de acción de gracias» o «salmo para dar gracias».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמ֥וֹר לְ/תוֹדָ֑ה
  english_pob_choice: A psalm for thanksgiving / A psalm of thanksgiving
  chosen_spanish: Salmo para agradecimiento[a]
  alternatives_spanish:
  - Salmo de agradecimiento
  - Salmo de acción de gracias
  lexicon: מִזְמֹור
  rationale: מִזְמֹור es el encabezado habitual de un salmo; en español, 'Salmo' es la forma natural y tradicional. לְתוֹדָה admite la relación 'para' o 'de'; aquí 'para agradecimiento' conserva la fuerza preposicional y evita añadir una formulación más interpretativa que el hebreo.
- source_word: תוֹדָה
  english_pob_choice: thanksgiving / thank offering
  chosen_spanish: agradecimiento
  alternatives_spanish:
  - acción de gracias
  - ofrenda de agradecimiento
  - ofrenda de acción de gracias
  lexicon: תוֹדָה
  rationale: תוֹדָה puede referirse tanto a agradecimiento como a una ofrenda de acción de gracias. 'Agradecimiento' deja abierta esa tensión semántica sin forzar una decisión litúrgica que el contexto mínimo del encabezado no resuelve por sí solo.
- source_word: הָרִ֥יעוּ
  english_pob_choice: Shout joyfully / Make a joyful noise
  chosen_spanish: ¡Aclamad con júbilo!
  alternatives_spanish:
  - ¡Dad un grito de alegría!
  - ¡Prorrumpid en júbilo!
  - ¡Alzad un clamor de alegría!
  lexicon: הריע
  rationale: הָרִיעוּ expresa un clamor jubiloso, no solo volumen. 'Aclamad con júbilo' comunica bien la fuerza imperativa y la alegría pública del verbo en español, sin perder naturalidad.
- source_word: לַ֝/יהוָ֗ה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: יהוה
  rationale: 'Se sigue el estándar del proyecto: יהוה se vierte como ''Yahvé'' en el texto principal. En este verso el vocativo/preposición ''a'' en español es la forma natural para el destinatario de la aclamación.'
- source_word: כָּל הָ/אָֽרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - toda la tierra entera
  lexicon: כל הארץ
  rationale: '''Toda la tierra'' es la equivalencia más directa y solemne para כָּל הָאָרֶץ. Mantiene el alcance universal del llamado sin añadir explicaciones.'
theological_decisions:
- issue: 'How to render the superscription term תוֹדָה: thanksgiving or thank offering'
  english_pob_reading: A psalm for thanksgiving / A psalm of thanksgiving
  chosen_spanish_reading: Salmo para agradecimiento
  alternative_spanish_readings:
  - Salmo para acción de gracias
  - Salmo para ofrenda de agradecimiento
  rationale: El hebreo permite una ambigüedad real entre el acto de agradecer y la ofrenda asociada. En español, 'agradecimiento' preserva esa amplitud mejor que una opción exclusivamente cultual o exclusivamente devocional.
  doctrine_reference: Salmos 100:0; uso hebreo de תּוֹדָה en contexto litúrgico y cultual
- issue: Rendering the divine name יהוה in a public Spanish text
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El proyecto exige nombrar el nombre divino en forma transparente. 'Yahvé' es la solución establecida para el texto principal en español; se evita la sustitución por un título en mayúsculas que oscurezca el nombre del original.
  doctrine_reference: Éxodo 3:15; convención editorial del People's Open Bible
- issue: 'Imperative force of הָרִיעוּ: joyful acclamation vs. generic noise'
  english_pob_reading: Shout joyfully / Make a joyful noise
  chosen_spanish_reading: Aclamad con júbilo
  alternative_spanish_readings:
  - Gritad con alegría
  - Prorrumpid en júbilo
  rationale: La decisión busca conservar tanto el carácter vocativo litúrgico como la alegría expresa del verbo hebreo. 'Aclamad con júbilo' es más exacto que un simple 'gritad' y más natural que una frase demasiado literal.
  doctrine_reference: Salmos 95:1; 98:4; 100:1
translation_notes:
  revision_awareness: El audit trail inglés muestra revisiones en el encabezado ('for thanksgiving' / 'of thanksgiving') y en el verbo ('Shout joyfully' / 'Make a joyful noise'), además de la decisión editorial de representar יהוה como 'Yahweh'. La propuesta española sigue el texto hebreo directamente, preserva la ambigüedad de תוֹדָה con una nota, y traduce הָרִיעוּ con un verbo de aclamación jubilosa que corresponde mejor al imperativo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme al estándar del proyecto.
  - '''Salmo'' conserva el género literario del encabezado hebreo sin añadir contenido interpretativo.'
  - Se mantiene el alcance universal de 'toda la tierra' sin expandirlo a glosas explicativas.
  - La nota al pie marca la ambigüedad de לְתוֹדָה para no borrar la tensión léxica documentada en el audit trail.
