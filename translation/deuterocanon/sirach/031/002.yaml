theological_decisions:
- issue: Primary source selection amid major mismatch between Hebrew and Greek witnesses
  chosen_reading: Translate the Greek simile about grasping a shadow and pursuing the wind, while noting the Hebrew witness preserves a substantially different text.
  alternative_readings:
  - 'Hebrew Cairo Geniza text: ''An evil faithful one will stir up reproach, and one who conceals a secret is a friend like oneself'''
  rationale: The Zone 1 Hebrew for this verse is marked 'major_mismatch' and does not correspond to the Greek parallel at all, indicating a verse-level displacement or divergent textual tradition. Per project philosophy for Sirach, the Hebrew is primary where it survives, but the parallel Greek must be used as actual translation input and source uncertainty must be stated honestly. Here the Hebrew appears not to preserve the same verse content as the Greek numbering, so the Greek provides the defensible base text for Sirach 31:2 in this reference system, with the Hebrew alternative preserved in a footnote rather than silently ignored.
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives and from Greek where it does not; preserve source uncertainty honestly.'
