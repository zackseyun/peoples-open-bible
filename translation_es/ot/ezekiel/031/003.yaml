translation:
  language: es
  text: He aquí[a], Asiria era un cedro en el Líbano, hermoso en sus ramas y un bosque que daba sombra, y elevado en altura; su copa estaba entre las nubes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira».
    reason: alternative_reading
  - marker: b
    text: O «entre espesuras» o «entre densas ramas».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Contempla
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y la vivacidad profética del hebreo. «Mira» resulta natural en español bíblico moderno sin sonar tan arcaico como «he aquí».
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  - Assur
  lexicon: HALOT
  rationale: El referente es la potencia imperial, no solo el nombre propio transliterado. «Asiria» comunica con claridad el sujeto histórico y figurado del oráculo.
- source_word: אֶרֶז בַּלְּבָנוֹן
  english_pob_choice: a cedar in Lebanon
  chosen_spanish: un cedro en el Líbano
  alternatives_spanish:
  - un cedro del Líbano
  - un cedro sobre el Líbano
  lexicon: HALOT
  rationale: La preposición hebrea admite la imagen locativa. En español, «en el Líbano» reproduce bien la metáfora y evita decidir prematuramente entre ubicación e identidad genitiva; la alternativa «del Líbano» queda como posible equivalencia idiomática.
- source_word: יְפֵה עָנָף
  english_pob_choice: beautiful in branches
  chosen_spanish: hermoso en sus ramas
  alternatives_spanish:
  - hermoso en ramas
  - hermoso de ramas
  - bello en sus ramas
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo/singular para describir el follaje ramificado. «En sus ramas» conserva el plural implícito que la revisión inglesa aclaró y evita un calco extraño en español.
- source_word: וְחֹרֶשׁ מֵצַל
  english_pob_choice: and a forest giving shade
  chosen_spanish: y un bosque que daba sombra
  alternatives_spanish:
  - y un bosque sombreado
  - y un matorral que daba sombra
  - y un bosque de sombra
  lexicon: HALOT
  rationale: חֹרֶשׁ puede designar arbolado denso, bosque o espesura; מֵצַל expresa la función de dar sombra. «Bosque que daba sombra» mantiene la imagen de abundancia vegetal y la acción verbal del participio.
- source_word: וּגְבַהּ קוֹמָה
  english_pob_choice: and lofty in height
  chosen_spanish: y alto en altura
  alternatives_spanish:
  - y elevado en estatura
  - y sublime en altura
  - y alto de estatura
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y redundante para enfatizar la elevación. «Alto en altura» preserva esa intensificación, aunque suena algo enfático en español; se mantiene por fidelidad a la figura retórica.
- source_word: וּבֵין עֲבֹתִים
  english_pob_choice: among the clouds
  chosen_spanish: entre las nubes
  alternatives_spanish:
  - entre espesuras
  - entre densas ramas
  - entre las espesuras
  lexicon: HALOT
  rationale: La audit trail inglesa opta por leer el final de la imagen como una hipérbole celeste, no solo arbórea. «Entre las nubes» sigue esa lectura poética en español; la alternativa más literal, referida a ramas densas, queda para nota.
- source_word: צַמַּרְתּוֹ
  english_pob_choice: its top
  chosen_spanish: su copa
  alternatives_spanish:
  - su cima
  - su corona
  - su treetop
  lexicon: HALOT
  rationale: En contexto arbóreo, צַמֶּרֶת/צַמַּרְתּוֹ es la parte superior del árbol. «Copa» es el término natural en español para la parte alta del cedro y mantiene la imagen botánica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la auditoría inglesa. Se adopta la misma resolución del cierre imagístico de la POB inglesa, que lee עֲבֹתִים en sentido hiperbólico como ‘nubes’, mientras se conserva en nota la alternativa arbórea más literal. También se refleja la revisión inglesa que aclaró el valor colectivo de «branches» con el plural español «ramas».
  spanish_consistency_notes:
  - Se mantiene «Asiria» como entidad histórica y figurada, no transliteración.
  - Se conserva la metáfora arbórea completa sin suavizar la acumulación de imágenes.
  - «Copa» se usa en sentido botánico, no litúrgico.
  - La puntuación reproduce la cadencia del verso y el paralelismo de los miembros hebreos.
