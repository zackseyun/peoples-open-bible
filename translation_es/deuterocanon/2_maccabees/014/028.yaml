revisions:
- from: Pero cuando éstos cayeron[a] ante Nikanor, él se quedó confundido y lo tomó muy mal[b], al ver que iba a desatender los términos acordados[c], aunque aquel hombre no había hecho ningún mal.
  to: Pero cuando estos cayeron[a] ante Nikanor, él quedó desconcertado y lo tomó muy mal, porque tendría que dejar de lado los términos acordados[b], aunque aquel hombre no había hecho ningún mal.
  rationale: La revisión elimina el matiz añadido de «al ver que iba a», refuerza la fuerza de συνεκέχυτο con «quedó desconcertado» y conserva la naturalidad del español. También simplifica las notas a las alternativas realmente útiles y ancladas en el texto.
