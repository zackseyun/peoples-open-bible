translation:
  language: es
  text: Porque así como al arquitecto de una casa nueva le corresponde ocuparse de toda la estructura, pero al que emprende adornarla[a] con pintura decorativa le corresponde considerar lo que es adecuado para el adorno, así también, pienso yo, sucede con nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «terminarla y pintarla», si ἐγκαινίζειν se entiende en sentido más amplio como habilitar o completar la casa, y no específicamente decorarla.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Así como
  - Pues así como
  lexicon: LSJ
  rationale: La comparación introductoria requiere una fórmula natural en español que conserve el vínculo argumentativo. «Así como» refleja bien la relación comparativa, y el «Porque» inicial ayuda a mantener el matiz explicativo del griego.
- source_word: ἀρχιτέκτονι
  english_pob_choice: architect
  chosen_spanish: al arquitecto
  alternatives_spanish:
  - al maestro de obras
  - al constructor principal
  lexicon: LSJ
  rationale: «Arquitecto» preserva la función de diseñador principal del edificio y sigue la decisión inglesa de no reducirlo a un simple obrero o constructor.
- source_word: καταβολῆς
  english_pob_choice: foundation / structure
  chosen_spanish: toda la estructura
  alternatives_spanish:
  - todo el cimiento
  - toda la fundación
  - toda la obra
  lexicon: LSJ
  rationale: El contexto del edificio completo favorece «estructura» más que «cimiento», siguiendo la revisión inglesa que corrigió la concreción excesiva de «foundation». «Toda la estructura» conserva la idea del conjunto constructivo.
- source_word: φροντιστέον
  english_pob_choice: must take thought for
  chosen_spanish: le corresponde preocuparse por
  alternatives_spanish:
  - debe ocuparse de
  - debe prestar atención a
  lexicon: LSJ
  rationale: El verbal de obligación pide una expresión de deber o incumbencia. En español, «le corresponde preocuparse por» comunica la necesidad con fluidez y sin perder el tono impersonal.
- source_word: ἐγκαινίζειν
  english_pob_choice: decorate it / finish it
  chosen_spanish: decorarla
  alternatives_spanish:
  - terminarla
  - habilitarla
  - adornarla
  lexicon: LSJ
  rationale: El inglés auditado evita sobreespecificar y entiende un trabajo de acabamiento/ornamentación. «Decorarla» mantiene esa amplitud sin forzar el verbo hacia una dedicación ceremonial.
- source_word: ζωγραφεῖν
  english_pob_choice: painted ornament
  chosen_spanish: con ornamentación pintada
  alternatives_spanish:
  - con pintura ornamental
  - con adornos pintados
  lexicon: LSJ
  rationale: El griego apunta a pintura decorativa. «Ornamentación pintada» preserva el carácter artístico y evita un tecnicismo innecesario o una interpretación demasiado estrecha.
- source_word: τὰ ἐπιτήδεια πρὸς διακόσμησιν
  english_pob_choice: the things suitable for adornment
  chosen_spanish: lo necesario para el adorno
  alternatives_spanish:
  - las cosas adecuadas para el adorno
  - los elementos convenientes para ornamentar
  lexicon: LSJ
  rationale: La frase griega habla de lo apropiado o necesario para la decoración. «Lo necesario para el adorno» suena natural en español y conserva la amplitud del original.
- source_word: οὕτως δοκῶ καὶ ἐπὶ ἡμῶν
  english_pob_choice: so also, I think, it is with us
  chosen_spanish: así también, pienso yo, sucede con nosotros
  alternatives_spanish:
  - así también, creo yo, ocurre con nosotros
  - de la misma manera, pienso, es entre nosotros
  lexicon: LSJ
  rationale: La clausura mantiene la modestia del «δοκῶ» y la aplicación de la analogía al grupo del autor. «Sucede con nosotros» reproduce bien el giro general del griego.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: evita «fundación» por ser demasiado estrecho para καταβολῆς y evita una especificación técnica indebida para ζωγραφεῖν. El español conserva la analogía arquitectónica general y el matiz de ornamentación pintada sin introducir contenido no atestiguado.'
  spanish_consistency_notes:
  - Se usa «arquitecto» para ἀρχιτέκτων, coherente con la decisión inglesa.
  - Se traduce καταβολῆς como «estructura» en el sentido del edificio completo, no como «cimiento» o «fundación».
  - Se mantiene un registro sobrio y claro, apto para lectura eclesial sin recurrir a formulaciones arcaizantes.
  - No se introducen notas de variante textual porque el paquete base no presenta una variante significativa del versículo.
