review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del encabezado y del oráculo: לְדָוִד מִזְמוֹר, נְאֻם יְהוָה לַאדֹנִי, y la orden de sentarse a la diestra hasta la sujeción de los enemigos. Sin embargo, omite el matiz de נְאֻם como declaración/oráculo solemne en el texto principal o en nota, y la nota [a] se aparta del rastro inglés al explicar לְדָוִד en vez de reflejar la alternativa documentada sobre la cláusula inicial completa. Además, «mi Señor» con mayúscula sobretraduce adoni y debilita la distinción documentada entre el nombre divino y un título humano/reverencial.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: «por estrado de tus pies» suena menos natural que «como estrado para tus pies» o «por estrado para tus pies», y la mayúscula en «Señor» puede inducir una lectura menos fiel al contraste hebreo con YHWH. «Yahvé dice» es entendible, pero «declara» refleja mejor el tono solemne y encaja bien en español bíblico moderno.'
  glossary_alignment: 'Se cumple correctamente Yahvé para יהוה. La distinción entre YHWH y אדני debe mantenerse sin elevar innecesariamente adoni a un cuasi nombre propio; por eso conviene «mi señor» en minúscula con nota explicativa. La imagen הֲדֹם לְרַגְלֶיךָ debe conservarse de forma idiomática natural en español: «estrado para tus pies» mantiene bien la metáfora.'
  issues:
  - severity: medium
    issue: «mi Señor» debería ser «mi señor»
    rationale: El hebreo לַאדֹנִי distingue claramente entre YHWH y adoni. La mayúscula en español puede borrar esa diferencia al sugerir un título divino o nombre propio. La nota ya explica la distinción; el texto principal debe reflejarla con más precisión.
  - severity: medium
    issue: La nota [a] no sigue la alternativa documentada en el POB inglés
    rationale: La nota inglesa [a] no trata לְדָוִד, sino la posibilidad de leer la cláusula como «Yahvé declara a mi señor» y el valor solemne de נְאֻם. La nota española actual introduce otra cuestión no documentada allí.
  - severity: low
    issue: «dice» atenúa el matiz solemne de נְאֻם
    rationale: Aunque no es incorrecto, «declara» o «pronuncia este oráculo» representa mejor el hebreo y el razonamiento del POB inglés sobre una declaración solemne.
  - severity: low
    issue: «por estrado de tus pies» es menos natural en español
    rationale: La imagen se entiende, pero «como estrado para tus pies» preserva la metáfora y suena más idiomático y claro para lectura pública.
