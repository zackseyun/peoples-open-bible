translation:
  language: es
  text: 'Pero cuando Nabucodonosor, rey de Babilonia, subió contra la tierra[a], dijimos: «Venid, y vayamos a Jerusalén por causa del ejército de los caldeos y por causa del ejército de Aram[b]». Así nos establecimos en Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los babilonios» para «los caldeos».
    reason: lexical_alternative
  - marker: b
    text: «Aram» se traduce tradicionalmente como «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una circunstancia temporal; «Pero cuando» conserva el valor de encuadre y el leve contraste implícito del contexto, sin sonar rígido en español.
- source_word: בַּעֲלוֹת
  english_pob_choice: came up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - subió a
  - avanzó contra
  lexicon: HALOT
  rationale: עלה con אל הארץ en contexto militar expresa avance hostil. «Subió contra» mantiene la imagen verbal del hebreo y comunica la dirección bélica de forma natural.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En Jeremías, הארץ suele referirse al territorio de Judá/Israel. «La tierra» preserva el uso bíblico habitual y evita restringirlo indebidamente a «país».
- source_word: וַנֹּאמֶר
  english_pob_choice: we said
  chosen_spanish: dijimos
  alternatives_spanish:
  - nos dijimos
  - dijimos entre nosotros
  lexicon: HALOT
  rationale: La primera persona plural introduce una decisión colectiva sin objeto indirecto explícito; «dijimos» es directo y fiel.
- source_word: בֹּאוּ וְנָבוֹא
  english_pob_choice: Come, and let us go
  chosen_spanish: Venid, y vayamos
  alternatives_spanish:
  - Venid, y entremos
  - Venid, y vamos
  lexicon: HALOT
  rationale: El imperativo plural más cohortativo expresa exhortación y resolución conjunta. «Venid, y vayamos» conserva ambas fuerzas y suena idiomático en español.
- source_word: יְרוּשָׁלַםִ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por temor a
  lexicon: HALOT
  rationale: Aquí expresa motivo/razón del traslado. «Por causa de» conserva la relación causal sin añadir el matiz subjetivo de «por temor a».
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropas
  lexicon: HALOT
  rationale: חיל denota fuerza militar organizada; «ejército» es el equivalente más claro y natural en español contemporáneo.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva la designación étnico-política del texto hebreo, siguiendo la elección inglesa de mantener «Chaldeans» por su valor léxico distintivo.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se translitera el nombre propio hebreo para preservar la referencia original. «Siria» es un equivalente convencional posterior, pero no el término principal aquí.
- source_word: וַנֵּשֶׁב
  english_pob_choice: we settled
  chosen_spanish: nos establecimos
  alternatives_spanish:
  - nos asentamos
  - habitamos
  lexicon: HALOT
  rationale: יישב aquí concluye la acción de residir/refugiarse tras la decisión previa. «Nos establecimos» refleja el resultado narrativo mejor que un presente perfecto.
translation_notes:
  revision_awareness: Se atendió la revisión del audit trail que cambió el inglés de «we have lived» a «we settled»; por eso el español usa «nos establecimos» y no una forma de presente perfecto. También se preservó la alternativa léxica documentada para הַכַּשְׂדִּים mediante una nota anclada en el texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Aram» se conserva sin adaptar a «Siria», siguiendo la transliteración del nombre propio.
  - El paralelismo «por causa de... y por causa de...» reproduce la estructura causal doble del hebreo.
  - La nota [a] está anclada únicamente en «los caldeos», evitando marcadores huérfanos.
