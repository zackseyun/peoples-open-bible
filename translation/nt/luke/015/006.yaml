id: LUK.15.6
reference: Luke 15:6
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν εἰς τὸν οἶκον συγκαλεῖ τοὺς φίλους καὶ τοὺς γείτονας, λέγων αὐτοῖς· Συγχάρητέ μοι ὅτι εὗρον τὸ πρόβατόν μου τὸ ἀπολωλός.
translation:
  text: And when he comes into the house[a], he calls together his friends and neighbors, saying to them, ‘Rejoice with me[c][b], because I have found my sheep that was lost.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'when he comes home.' The Greek reads literally 'when he comes into the house.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Celebrate with me.' The Greek imperative means to rejoice together with someone.
    reason: lexical_alternative
  - marker: c
    text: Or 'my lost sheep.' The Greek is literally 'my sheep, the one that was lost.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν εἰς τὸν οἶκον
  chosen: when he comes into the house
  alternatives:
  - having come into the house
  - when he comes home
  lexicon: BDAG
  rationale: The aorist participle with εἰς τὸν οἶκον is naturally rendered as a temporal participial clause in English. 'When he comes into the house' is readable and preserves the sequence. 'Home' is possible idiomatically, but 'the house' more closely reflects the Greek wording.
- source_word: συγκαλεῖ
  chosen: he calls together
  alternatives:
  - he gathers
  - he summons
  lexicon: BDAG
  rationale: The verb means to call together or summon. 'Calls together' preserves the verbal imagery and is slightly more formal than 'gathers,' while avoiding the potentially harsher tone of 'summons' in this celebratory context.
- source_word: φίλους
  chosen: friends
  lexicon: BDAG
  rationale: Standard and direct rendering of φίλος in the plural accusative.
- source_word: γείτονας
  chosen: neighbors
  lexicon: BDAG
  rationale: Standard rendering of γείτων in this social setting.
- source_word: λέγων αὐτοῖς
  chosen: saying to them
  alternatives:
  - and says to them
  lexicon: BDAG
  rationale: The present participle is well represented by 'saying,' linking the speech naturally to the main action.
- source_word: Συγχάρητέ μοι
  chosen: Rejoice with me
  alternatives:
  - Celebrate with me
  - Share my joy
  lexicon: BDAG
  rationale: The aorist imperative of συγχαίρω means to rejoice together with someone. 'Rejoice with me' is the most direct rendering and preserves the shared joy motif in the parable. 'Celebrate with me' is idiomatic but slightly more interpretive.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the command. 'Because' is the clearest modern English equivalent.
- source_word: εὗρον
  chosen: I have found
  alternatives:
  - I found
  lexicon: BDAG
  rationale: Although the Greek is aorist, English present perfect fits the discourse context well, emphasizing the present result of the completed action and sounding natural in direct speech.
- source_word: τὸ πρόβατόν μου
  chosen: my sheep
  alternatives:
  - my sheepfold animal
  lexicon: BDAG
  rationale: πρόβατον commonly means 'sheep.' English 'sheep' works for singular as here and is the natural rendering.
- source_word: τὸ ἀπολωλός
  chosen: that was lost
  alternatives:
  - the lost one
  - which had been lost
  lexicon: BDAG
  rationale: 'The perfect participle of ἀπόλλυμι functions adjectivally: ''the one having been lost.'' ''That was lost'' is natural English and preserves the state of lostness without overcomplication.'
