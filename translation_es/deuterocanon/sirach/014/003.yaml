translation:
  language: es
  text: La riqueza no es conveniente para un hombre de corazón pequeño[a][b], ni el tesoro para un hombre de mal ojo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de corazón pequeño»; el paralelo griego sugiere a una persona mezquina o tacaña.'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego dice: «Porque para un hombre mezquino la riqueza no es buena, y para un hombre envidioso, ¿para qué dinero?»; confirma el sentido del hebreo aunque con una formulación distinta.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «un hombre de mal ojo», un modismo para alguien envidioso, tacaño o que mira con mala voluntad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְלֵב קָטֹן
  english_pob_choice: small-hearted man
  chosen_spanish: hombre de corazón pequeño
  alternatives_spanish:
  - hombre mezquino
  - hombre tacaño
  - hombre de ánimo estrecho
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de 'corazón' + 'pequeño', que apunta a estrechez interior, mezquindad o avaricia. En español, 'corazón pequeño' mantiene la metáfora mejor que una paráfrasis completamente interpretativa, y sigue siendo comprensible.
- source_word: לֹא נָאוֶה
  english_pob_choice: is not fitting
  chosen_spanish: no es conveniente
  alternatives_spanish:
  - no es apropiada
  - no es adecuada
  - no es decorosa
  lexicon: HALOT
  rationale: '''No es conveniente'' transmite el juicio de adecuación o conveniencia sin volverse arcaico. Mantiene el tono evaluativo del hebreo y del paralelo griego.'
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - las riquezas
  - la abundancia
  - el patrimonio
  lexicon: HALOT
  rationale: '''Riqueza'' es un equivalente natural y formal para עֹשֶׁר. Funciona bien en contraste con ''tesoro'' en el segundo hemistiquio y evita redundancia excesiva.'
- source_word: וּלְאִישׁ רַע עַיִן
  english_pob_choice: for a man with an evil eye
  chosen_spanish: para un hombre de ojo malo
  alternatives_spanish:
  - para un hombre envidioso
  - para un hombre tacaño
  - para un hombre de mala vista
  lexicon: HALOT
  rationale: Mantengo el idiomismo 'ojo malo' para conservar la transparencia con el hebreo y permitir la auditoría del trasfondo semítico. En el contexto puede implicar envidia, mezquindad o codicia; una nota lo aclara.
- source_word: חָרוּץ
  english_pob_choice: treasure
  chosen_spanish: el tesoro
  alternatives_spanish:
  - la riqueza
  - el dinero
  - los bienes
  lexicon: HALOT
  rationale: '''Tesoro'' refleja con naturalidad el valor material de חָרוּץ según el contexto y el ajuste revisado del POB inglés, que distinguió este término del primero. También encaja bien con el paralelo griego χρήματα (''dinero/bienes'').'
theological_decisions:
- issue: El sentido del 'ojo malo' como expresión idiomática
  english_pob_reading: a man with an evil eye, an idiom for someone envious, stingy, or begrudging
  chosen_spanish_reading: un hombre de ojo malo, entendido como envidioso, tacaño o mezquino
  alternative_spanish_readings:
  - un hombre envidioso
  - un hombre tacaño
  - un hombre mezquino
  rationale: No diluyo el modismo en el texto principal porque el inglés POB conservó la imagen para la trazabilidad. La nota y las alternativas explican la gama semántica sin borrar la tensión entre literalidad e interpretación.
  doctrine_reference: No aplica; decisión lexical/idiomática, no doctrinal.
- issue: La relación entre el hebreo y el paralelo griego
  english_pob_reading: The Greek parallel reads, 'For a petty man wealth is not good, and for an envious man, why money?' This supports the sense of the Hebrew while differing slightly in phrasing.
  chosen_spanish_reading: El verso español sigue el hebreo como base principal y deja abierta la corroboración del griego en nota
  alternative_spanish_readings:
  - 'Una versión más griega: ''para un hombre mezquino la riqueza no es buena, y para un hombre envidioso, ¿para qué dinero?'''
  - Una versión más hebrea literal con 'pequeño de corazón'
  rationale: El hebreo está en buen estado y ofrece la formulación base. El griego confirma el campo semántico de mezquindad/envidia y el matiz de utilidad del dinero, por lo que lo reflejo en la nota sin reemplazar el texto principal.
  doctrine_reference: No aplica; decisión de base textual y de equivalencia.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés que distinguió entre 'wealth' y 'treasure' en los dos hemistiquios. Por eso se eligieron 'riqueza' y 'tesoro' respectivamente, manteniendo también la imagen hebrea de 'corazón pequeño' y 'ojo malo' con apoyo explicativo en notas.
  spanish_consistency_notes:
  - Se usa 'riqueza' para עֹשֶׁר y 'tesoro' para חָרוּץ, evitando homogeneizar ambos términos.
  - Se conserva el modismo 'ojo malo' en el texto principal por fidelidad auditiva; su sentido se aclara en nota.
  - La puntuación en español separa claramente los dos miembros del proverbio con coma y coordinación negativa.
  - Se evita 'SEÑOR' o terminología no pertinente, ya que el verso no contiene el nombre divino.
