translation:
  language: es
  text: 'Cuando ella terminó de darle de beber[a], dijo: «También sacaré agua para tus camellos, hasta que hayan terminado de beber».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Y cuando ella terminó de darle de beber, dijo: “También sacaré agua para tus camellos, hasta que hayan terminado de beber”»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּכַ֖ל
  english_pob_choice: When she had finished
  chosen_spanish: Cuando terminó
  alternatives_spanish:
  - Y terminó
  - Después de terminar
  lexicon: HALOT
  rationale: El hebreo indica завершamiento de la acción previa antes de la siguiente. En español, «Cuando terminó» conserva la relación temporal narrativa de forma natural.
- source_word: לְהַשְׁקֹת֑וֹ
  english_pob_choice: giving him a drink
  chosen_spanish: de darle de beber
  alternatives_spanish:
  - de darle agua
  - de hacerle beber
  lexicon: HALOT
  rationale: El verbo causativo de שׁקה expresa ‘dar de beber’. En español, «darle de beber» es idiomático y preserva el sentido sin introducir una imagen extraña.
- source_word: וַתֹּ֗אמֶר
  english_pob_choice: she said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - le dijo
  lexicon: HALOT
  rationale: En narrativa española puede omitirse el conector inicial para fluidez, manteniendo la sucesión de acciones implícita en el hebreo waw-consecutivo.
- source_word: גַּ֤ם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: 'Expresa el valor aditivo: no solo le dará de beber al hombre, sino que extenderá el servicio a los camellos.'
- source_word: לִ/גְמַלֶּ֨י/ךָ֙
  english_pob_choice: for your camels
  chosen_spanish: para tus camellos
  alternatives_spanish:
  - a tus camellos
  - por tus camellos
  lexicon: HALOT
  rationale: La preposición indica beneficio/destino de la acción. «Para tus camellos» comunica bien que el agua será sacada en favor de ellos.
- source_word: אֶשְׁאָ֔ב
  english_pob_choice: I will draw water
  chosen_spanish: sacaré agua
  alternatives_spanish:
  - extraeré agua
  - voy a sacar agua
  lexicon: HALOT
  rationale: שאב es ‘sacar/draw water’. En español, «sacar agua» es claro y natural; el objeto «agua» se explicita porque el contexto lo exige.
- source_word: עַ֥ד אִם
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta cuando
  - hasta
  lexicon: HALOT
  rationale: La expresión funciona idiomáticamente como cláusula terminativa. «Hasta que» es la mejor equivalencia española para marcar el límite temporal.
- source_word: כִּלּ֖וּ
  english_pob_choice: they have finished
  chosen_spanish: hayan terminado
  alternatives_spanish:
  - terminen
  - se hayan acabado
  lexicon: HALOT
  rationale: El verbo denota la culminación de beber. En español, el subjuntivo perfecto encaja bien tras «hasta que» para señalar el punto final de la acción.
- source_word: לִ/שְׁתֹּֽת
  english_pob_choice: drinking
  chosen_spanish: de beber
  alternatives_spanish:
  - beber
  - de tomar
  lexicon: HALOT
  rationale: Tras «terminado» en español suena natural el infinitivo compuesto «de beber»; mantiene el sentido verbal sin añadir coloraciones ajenas.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustantivas; el español sigue de cerca sus decisiones léxicas comprobadas y se apoya directamente en el hebreo para mantener la secuencia narrativa y la cláusula final de terminación.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - Se evita «regar» o «darles agua» para no diluir la fuerza de שאב como ‘sacar agua’.
  - «Hasta que» traduce de forma idiomática la construcción terminativa hebrea sin perder el límite de la acción.
  - La nota conserva la alternativa formal documentada por el POB inglés.
