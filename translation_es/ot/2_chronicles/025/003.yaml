translation:
  language: es
  text: Entonces, cuando el reino quedó firmemente en su mano[a], mató a sus siervos que habían matado al rey su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «cuando el reino quedó establecido bajo su control».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: Now when
  chosen_spanish: Entonces, cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo hecho en la secuencia histórica. «Entonces, cuando» conserva el giro temporal sin sonar forzado en español moderno.
- source_word: חָזְקָה
  english_pob_choice: was firmly
  chosen_spanish: estuvo firmemente
  alternatives_spanish:
  - se fortaleció
  - llegó a estar firme
  - quedó establecido
  lexicon: HALOT
  rationale: Aquí el verbo expresa la consolidación del poder real, no fuerza física. «Estuvo firmemente» mantiene la idea de estabilidad/control que el inglés auditado comunica con «was firmly».
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el poder real
  - el reinado
  lexicon: HALOT
  rationale: En este contexto, מַמְלָכָה puede referirse al reino como realidad política. «Reino» es natural en español y conserva el campo semántico elegido en el POB inglés.
- source_word: עָלָיו
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - bajo su control
  - en su poder
  - sobre él
  lexicon: HALOT
  rationale: El hebreo usa una metáfora de posesión/control. «En su mano» preserva esa imagen concreta, más cerca del sentido adoptado por el POB inglés que una paráfrasis totalmente abstracta.
- source_word: וַיַּהֲרֹג
  english_pob_choice: he killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - hizo morir a
  - dio muerte
  lexicon: HALOT
  rationale: הרג se traduce de forma directa y clara. «Mató» es la forma más natural y suficientemente solemne en español para este relato histórico.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus oficiales
  - a sus esclavos
  lexicon: HALOT
  rationale: En un contexto de corte real, עבד puede designar servidores del rey. «Siervos» conserva la relación de servicio sin cargar necesariamente la idea de esclavitud; «esclavos» sería demasiado fuerte aquí.
- source_word: הַמַּכִּים
  english_pob_choice: who had struck down
  chosen_spanish: que habían herido
  alternatives_spanish:
  - que habían golpeado
  - que habían dado muerte a
  - que habían matado
  lexicon: HALOT
  rationale: El participio identifica a los asesinos, con el matiz de una agresión letal. «Habían herido» refleja bien el verbo נכה en español bíblico sin repetir inmediatamente «mató», y deja visible la violencia del acto.
- source_word: אֶת הַמֶּלֶךְ אָבִיו
  english_pob_choice: the king his father
  chosen_spanish: al rey su padre
  alternatives_spanish:
  - al rey, su padre
  - a su padre el rey
  - al rey, el padre de él
  lexicon: HALOT
  rationale: La apposición hebrea se conserva de manera cercana. «Al rey su padre» reproduce el orden formal del original y mantiene el tono narrativo sobrio del POB.
translation_notes:
  revision_awareness: El texto base en inglés no presenta cambios de revisión aplicados; se sigue el estado más reciente, con alta concordancia entre auditoría y traducción.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se evita «SEÑOR» como máscara, ya que no hay una referencia al nombre divino en este versículo.
  - «Siervos» se usa por el contexto cortesano; no se sustituye por «esclavos» porque la evidencia contextual no exige esa fuerza léxica aquí.
  - La metáfora de control se conserva con «en su mano», alineada con la decisión auditada en inglés y sin convertirla enteramente en una abstracción.
