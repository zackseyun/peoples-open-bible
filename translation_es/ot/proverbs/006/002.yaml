revisions:
- from: Has sido[a] atrapado por las palabras de tu boca[b]; has sido capturado por las palabras de tu boca.
  to: Has caído en una trampa[a] por las palabras de tu boca[b]; has sido atrapado por las palabras de tu boca.
  rationale: Se ajusta el primer verbo para reflejar mejor la metáfora de quedar en una trampa que motivó «snared» en el POB inglés, sin perder naturalidad en español. También se corrige la nota sobre «tu boca» para que explique la literalidad e idiomaticidad del hebreo en vez de repetir de forma confusa lo que ya dice el texto. El resto del versículo se mantiene porque preserva adecuadamente el sentido y el paralelismo.
