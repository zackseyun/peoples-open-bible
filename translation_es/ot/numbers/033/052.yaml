    text: Or 'their carved images' for 'their figured stones'; the Hebrew term מַשְׂכִּיּוֹת refers to figured representations, and the precise form or material is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'their molten images.'
    reason: lexical_alternative
