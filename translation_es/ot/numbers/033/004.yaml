revisions:
- from: mientras los egipcios estaban enterrando a aquellos[a] a quienes Yahvé había herido entre ellos, a todos los primogénitos; y contra sus dioses Yahvé había ejecutado juicios.
  to: mientras los egipcios estaban enterrando a los que Yahvé había herido entre ellos, a todos los primogénitos, y sobre sus dioses[a] Yahvé había ejecutado juicios.
  rationale: Se corrige la ubicación y el contenido de la nota para que corresponda al sintagma relevante del texto. También se alisa la sintaxis española reemplazando 'a aquellos a quienes' por 'a los que' y usando 'sobre sus dioses' en el texto principal para reflejar más de cerca el hebreo, dejando 'contra sus dioses' como alternativa documentada por la auditoría inglesa. No se requiere cambio doctrinal ni adjudicación compleja.
