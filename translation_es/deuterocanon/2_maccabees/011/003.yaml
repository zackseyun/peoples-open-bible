translation:
  language: es
  text: y hacer que el santuario estuviera sujeto a tributo en plata[a], como los demás templos de las naciones, y hacer que el sumo sacerdocio se vendiera cada año[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gravado en plata» / «tasado en moneda». El raro adjetivo ἀργυρολόγητον indica que el santuario sería tratado como una fuente de ingresos monetarios, en paralelo con los templos paganos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «poner en venta el sumo sacerdocio cada año». El griego presenta el cargo mismo como vendible, subrayando la profanación propuesta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - lugar santo
  lexicon: LSJ
  rationale: El griego nombra el recinto sagrado de Jerusalén. «Santuario» conserva el valor cultual sin reducirlo solo al edificio, y distingue bien esta expresión de τεμένη en la cláusula comparativa.
- source_word: ἀργυρολόγητον
  english_pob_choice: taxable in silver
  chosen_spanish: gravado en plata
  alternatives_spanish:
  - sujeto a un tributo en plata
  - tasado en plata
  - gravado con impuesto monetario
  lexicon: LSJ
  rationale: El adjetivo es raro y expresa que el santuario sería convertido en fuente de ingresos monetarios. «Gravado en plata» mantiene la idea de imposición/recaudación y suena más natural en español que una glosa demasiado literal.
- source_word: τεμένη
  english_pob_choice: temples
  chosen_spanish: templos
  alternatives_spanish:
  - santuarios
  - recintos sagrados
  lexicon: LSJ
  rationale: En este contexto se trata de los lugares sagrados de las naciones. «Templos» es la equivalencia más natural en español y mantiene el contraste con «santuario».
- source_word: πρατὴν
  english_pob_choice: sold each year
  chosen_spanish: vender
  alternatives_spanish:
  - poner en venta
  - hacer vendible
  - sacar a la venta
  lexicon: LSJ
  rationale: El griego presenta el cargo como algo vendible. En español, la forma verbal «vender» comunica de manera directa la profanación comercial del oficio.
- source_word: ἀρχιερωσύνην
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - la dignidad sumo sacerdotal
  lexicon: LSJ
  rationale: La palabra designa el oficio o dignidad, no solo a la persona. «Sumo sacerdocio» es el equivalente tradicional y claro en español, y conserva el valor institucional.
- source_word: κατʼ ἔτος
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  lexicon: LSJ
  rationale: La expresión indica repetición anual. «Cada año» es la opción más transparente y fiel al griego.
- source_word: ποιήσειν
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - causar
  - convertir en
  lexicon: LSJ
  rationale: El infinitivo gobierna ambas propuestas. «Hacer» conserva la fuerza causativa del griego de modo simple y publicable en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de 2 Maccabees 11:3 y toma en cuenta la revisión inglesa más reciente, que afinó ἀργυρολόγητον hacia una expresión más natural y directa. Se conservó la tensión semántica de un santuario convertido en objeto de gravamen y de un sumo sacerdocio tratado como mercancía.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y términos de reemplazo no pertinentes porque este versículo no contiene el Tetragrámaton ni κύριος con función de nombre divino.
  - Se mantuvo la diferencia entre «santuario» y «templos» para reflejar ἱερὸν y τεμένη como términos no idénticos.
  - «Sumo sacerdocio» se prefirió por ser la forma española más estable para ἀρχιερωσύνην y por señalar el cargo, no la persona.
