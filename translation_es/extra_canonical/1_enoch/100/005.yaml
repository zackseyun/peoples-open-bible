translation:
  language: es
  text: Y designará guardianes de entre los santos ángeles sobre todos los justos y santos, y los guardarán como la pupila[a] de un ojo, hasta que todo mal y todo pecado llegue a su fin. Y aun si los justos duermen un largo sueño[b], nada tienen que temer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Como la pupila de un ojo» es un modismo para algo protegido con extremo cuidado; compárese la expresión bíblica más conocida «como la niña de los ojos».
    reason: lexical_alternative
  - marker: b
    text: «Duermen un largo sueño» probablemente alude a la muerte o al estado de los muertos, pero el texto mismo conserva el eufemismo del sueño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዐቀብተ
  english_pob_choice: guardians
  chosen_spanish: guardianes
  alternatives_spanish:
  - centinelas
  - custodios
  lexicon: Dillmann Lexicon
  rationale: El valor nominal del verbo de guardar/velar se expresa de forma natural en español con "guardianes". Evita confundir esta figura con el término técnico "Vigilantes" y conserva el sentido protector del pasaje.
- source_word: ይሁብ
  english_pob_choice: will appoint
  chosen_spanish: designará
  alternatives_spanish:
  - asignará
  - pondrá
  lexicon: Dillmann Lexicon
  rationale: Aunque literalmente puede ser "dará", en esta construcción con guardianes sobre personas el sentido idiomático es de asignar o nombrar. "Designará" comunica bien esa función sin perder la dirección de autoridad.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann Lexicon
  rationale: En español bíblico "justos" transmite el grupo moral y escatológico designado por el término. Mantiene continuidad con el lenguaje de juicio y recompensa.
- source_word: ቅዱሳን
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - consagrados
  - santos fieles
  lexicon: Dillmann Lexicon
  rationale: Aquí el adjetivo funciona casi como sustantivo para el grupo protegido. "Santos" es la forma más natural en español y conserva la doble caracterización del pueblo protegido.
- source_word: እመላእክት ቅዱሳን
  english_pob_choice: from among the holy angels
  chosen_spanish: de entre los santos ángeles
  alternatives_spanish:
  - entre los santos ángeles
  - de los santos ángeles
  lexicon: Dillmann Lexicon
  rationale: La preposición indica procedencia o fuente; por eso se conserva "de entre". "Ángeles" es el término adecuado en contexto apocalíptico, y "santos" califica su esfera de pureza/consagración.
- source_word: የዐቅብዎሙ
  english_pob_choice: they will guard them
  chosen_spanish: los guardarán
  alternatives_spanish:
  - los custodiarán
  - los velarán
  lexicon: Dillmann Lexicon
  rationale: El verbo repite la raíz de guardar/velar y conviene mantener la misma imagen en español. "Guardar" es claro y directo, y preserva el motivo de protección reiterada.
- source_word: ከመ ብንተ ዐይን
  english_pob_choice: like the pupil of an eye
  chosen_spanish: como la pupila de un ojo
  alternatives_spanish:
  - como la niña del ojo
  - como la pupila
  lexicon: Dillmann Lexicon
  rationale: Se conserva el símil concreto del original. "Pupila" resulta comprensible en español moderno y evita imponer automáticamente la fórmula más idiomática de otras tradiciones bíblicas.
- source_word: እስከ ይዌድእ ኵሉ እኩየ ወኵሉ ኃጢአተ
  english_pob_choice: until every evil and every sin comes to an end
  chosen_spanish: hasta que todo mal y todo pecado llegue a su fin
  alternatives_spanish:
  - hasta que todo mal y todo pecado termine
  - hasta que todo mal y todo pecado se acabe
  lexicon: Dillmann Lexicon
  rationale: El verbo apunta al término o conclusión de algo. "Llegue a su fin" expresa el cierre del proceso sin añadir explícitamente un sujeto agente que el texto no exige.
- source_word: እመኒ
  english_pob_choice: even if
  chosen_spanish: Y aun si
  alternatives_spanish:
  - y aunque
  - incluso si
  lexicon: Dillmann Lexicon
  rationale: Marca con claridad el giro concesivo. "Aun si" mantiene la fuerza de la condición extrema sin convertirla en afirmación causal.
- source_word: ይነውሙ
  english_pob_choice: sleep
  chosen_spanish: duermen
  alternatives_spanish:
  - duerme
  - se duermen
  lexicon: Dillmann Lexicon
  rationale: Se mantiene el eufemismo de dormir, que el texto usa con posible referencia a la muerte o al estado de los muertos, sin resolver la ambigüedad en el texto principal.
- source_word: ንዋመ ነዋኅ
  english_pob_choice: a long sleep
  chosen_spanish: un largo sueño
  alternatives_spanish:
  - un sueño prolongado
  - un sueño muy largo
  lexicon: Dillmann Lexicon
  rationale: La construcción intensifica la duración del sueño. "Largo sueño" conserva la ambigüedad eufemística y sugiere la posible alusión a la muerte sin explicitarla.
- source_word: አልቦ ዘይፈረሁ
  english_pob_choice: they have nothing to fear
  chosen_spanish: nada tienen que temer
  alternatives_spanish:
  - no tienen nada que temer
  - no hay nada que teman
  lexicon: Dillmann Lexicon
  rationale: La forma idiomática española transmite la ausencia de objeto de temor con naturalidad, manteniendo el cierre tranquilizador del verso.
theological_decisions:
- issue: 'Naturaleza de la protección: guardianes angelicales literales o imagen general de cuidado divino'
  english_pob_reading: Literal angelic guardianship is kept in the main text
  chosen_spanish_reading: Se conserva la guardia literal de ángeles santos sobre los justos y santos
  alternative_spanish_readings:
  - Se trata de una imagen general del cuidado divino
  - La guardia angelical es solo una metáfora
  rationale: El texto fuente dice explícitamente que los guardianes provienen de entre los ángeles santos. La traducción mantiene ese marco apocalíptico sin desmitologizarlo.
  doctrine_reference: Preservar la imaginería apocalíptica y no aplanar la agencia angelical.
- issue: Sentido de 'sleep' en el final del verso
  english_pob_reading: Retain 'sleep' in the main text
  chosen_spanish_reading: Se conserva 'duermen un largo sueño' sin sustituirlo por 'mueren'
  alternative_spanish_readings:
  - mueren
  - duermen en la muerte
  rationale: El original mantiene el eufemismo del sueño. Traducirlo como muerte resolvería una tensión interpretativa que el texto deja abierta; por eso se conserva la imagen con una nota.
  doctrine_reference: Preservar la tensión teológica e interpretativa en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail en inglés: se evita añadir un sujeto explícito para el fin del mal y el pecado, y se conserva la estructura concesiva con el eufemismo de sueño. También se refleja la corrección sintáctica que separa claramente a los guardianes angélicos de los justos y santos protegidos.'
  spanish_consistency_notes:
  - Se mantiene una distinción clara entre los guardianes angelicales y el grupo humano de los justos y santos.
  - '"Guardar" se repite para conservar el motivo léxico del original.'
  - Se evita el calco de "SEÑOR" o de terminología eclesial posterior, porque este pasaje no trata del tetragrámaton ni requiere 'santos' en sentido técnico posterior.
  - La puntuación conserva una cláusula final concesiva separada para reflejar el contraste del cierre del verso.
