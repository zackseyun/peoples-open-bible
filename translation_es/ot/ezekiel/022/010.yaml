translation:
  language: es
  text: En ti descubren la desnudez de un padre[a][b]; en ti violan a una mujer en su impureza menstrual[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «descubrir la desnudez de un padre», un giro levítico para relaciones sexuales ilícitas; compárese Levítico 18:7.'
    reason: cross_reference
  - marker: b
    text: 'O «entre ustedes». El hebreo se dirige a Jerusalén como mujer/ciudad: «en ti».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la impureza de la menstruación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת אָב
  english_pob_choice: a father's nakedness
  chosen_spanish: la desnudez de un padre
  alternatives_spanish:
  - la desnudez de un padre
  - la desnudez de su padre
  lexicon: HALOT
  rationale: Conservo el idiomatismo legal hebreo sin convertirlo en una paráfrasis explicativa. En español, «la desnudez de un padre» mantiene la construcción de posesión y el eco levítico de la expresión.
- source_word: גִּלָּה
  english_pob_choice: they uncover
  chosen_spanish: descubren
  alternatives_spanish:
  - han descubierto
  - descubren
  lexicon: HALOT
  rationale: El verbo hebreo funciona aquí de modo colectivo y acusatorio. El presente en español da fuerza profética y conserva la denuncia directa.
- source_word: בָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - entre ustedes
  - dentro de ti
  lexicon: HALOT
  rationale: La preposición con sufijo femenino singular dirige el reproche a Jerusalén personificada. «En ti» preserva la segunda persona y la imagen de la ciudad como interlocutora.
- source_word: טְמֵאַת הַנִּדָּה
  english_pob_choice: a woman in her menstrual impurity
  chosen_spanish: una mujer en su impureza menstrual
  alternatives_spanish:
  - la impureza de la menstruación
  - una mujer impura por la menstruación
  lexicon: HALOT
  rationale: La frase hebrea nombra el estado de impureza ritual asociado con la menstruación. «Impureza menstrual» conserva el campo ritual sin medicalizar ni suavizar el sentido.
- source_word: עִנּוּ
  english_pob_choice: they violate
  chosen_spanish: humillan
  alternatives_spanish:
  - violan
  - afligen
  lexicon: HALOT
  rationale: Aunque el contexto es sexual, el verbo hebreo tiene un amplio campo semántico de oprimir, afligir y humillar. Dado que el enunciado ya está cargado por la expresión precedente y por el paralelo con la impureza menstrual, «humillan» evita introducir con demasiada explicitud una especificación que el hebreo no formula de manera directa aquí.
theological_decisions:
- issue: Mantener el idiomatismo levítico de la «desnudez» sin explicitar un objeto sexual concreto en el texto principal
  english_pob_reading: Retain 'uncover a father's nakedness' in the main text while letting the idiom imply incestuous sexual sin.
  chosen_spanish_reading: Mantener «la desnudez de un padre» como expresión idiomática, sin convertirla en una explicación del tipo «se acuestan con la esposa del padre».
  alternative_spanish_readings:
  - «cometen incesto con la mujer de su padre»
  - «deshonran sexualmente a su padre»
  rationale: El hebreo usa una fórmula legal fija de Levítico; traducirla de manera demasiado explícita introduciría una interpretación no dicha en el verso. La versión española conserva la tensión del idiomatismo y su enlace intertextual con Levítico.
  doctrine_reference: Levítico 18:7; Ezequiel 22:10
- issue: Decidir entre un valor estrictamente sexual o uno más amplio para עִנּוּ
  english_pob_reading: they violate
  chosen_spanish_reading: humillan
  alternative_spanish_readings:
  - violan
  - afligen
  - maltratan
  rationale: El término hebreo puede abarcar maltrato, aflicción u opresión; en este contexto el acto es moralmente grave y relacionado con abuso, pero el español «humillan» permite conservar la amplitud semántica sin forzar una especificación sexual que no aparece de forma desnuda en el verbo.
  doctrine_reference: Uso léxico contextual en el hebreo bíblico
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado actual del archivo inglés POB y conserva las dos notas lexicográficas principales: el idiomatismo levítico de «descubrir la desnudez» y la expresión ritual de «impureza menstrual». En la primera cláusula se mantiene la ambigüedad intencional de la fórmula hebrea; en la segunda, se preserva el lenguaje de impureza ritual sin medicalización. No se aplicaron revisiones posteriores al texto fuente.'
  spanish_consistency_notes:
  - Se usa «en ti» para mantener la personificación de Jerusalén como destinataria femenina singular.
  - Se emplea «desnudez» en lugar de una formulación explicativa para conservar el eco intertextual de Levítico.
  - «Impureza menstrual» se mantiene como término ritual, no médico.
  - La elección de «humillan» para עִנּוּ conserva amplitud semántica y evita sobredeterminar el acto en el texto principal.
