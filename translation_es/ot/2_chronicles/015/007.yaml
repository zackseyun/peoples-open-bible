translation:
  language: es
  text: Pero en cuanto a ustedes, manténganse firmes, y no dejen que sus manos se debiliten[a], porque hay recompensa para su trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dejen que sus manos aflojen». El hebreo usa una imagen idiomática de las manos para expresar pérdida de fuerza, resolución o ánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  english_pob_choice: But as for you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero en cuanto a ustedes
  lexicon: HALOT
  rationale: El hebreo introduce un contraste exhortativo con el contexto anterior; en español, «Pero ustedes» comunica bien ese giro sin sonar forzado.
- source_word: חִזְקוּ
  english_pob_choice: be strong
  chosen_spanish: manténganse firmes
  alternatives_spanish:
  - sean fuertes
  - refuércense
  lexicon: HALOT
  rationale: El imperativo pide fortaleza/solidez moral y de ánimo. «Manténganse firmes» expresa esa idea con naturalidad en español bíblico actual, sin perder el matiz de firmeza.
- source_word: וְ/אַל יִרְפּוּ
  english_pob_choice: and do not let your hands grow weak
  chosen_spanish: y no se debiliten
  alternatives_spanish:
  - y no aflojen
  - y no se descuelguen
  lexicon: HALOT
  rationale: La expresión con «manos» es idiomática; en español puede conservarse de modo más natural con el verbo de estado. «No se debiliten» preserva la idea central de perder fuerza o resolución.
- source_word: יְדֵי/כֶם
  english_pob_choice: your hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus manos
  lexicon: HALOT
  rationale: 'Se mantiene la imagen corporal del hebreo, pero en la sintaxis española se integra como posesivo plural de cortesía/segunda persona plural: «sus manos», coherente con el referente de ustedes.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación; «porque» comunica bien la fuerza causal-explicativa.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  lexicon: HALOT
  rationale: El hebreo usa una construcción existencial; «hay» es el equivalente más natural y directo en español.
- source_word: שָׂכָר
  english_pob_choice: a reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - pago
  lexicon: HALOT
  rationale: El término puede significar recompensa, salario o retribución. «Recompensa» conserva el valor retributivo sin estrecharlo a salario literal.
- source_word: לִ/פְעֻלַּתְ/כֶם
  english_pob_choice: for your work
  chosen_spanish: para su trabajo
  alternatives_spanish:
  - por su obra
  - por su labor
  lexicon: HALOT
  rationale: פְעֻלָּה remite a trabajo/obra/labor. «Trabajo» es claro y mantiene el sentido concreto de la acción que recibe recompensa.
theological_decisions:
- issue: Naturaleza de la recompensa prometida
  english_pob_reading: for there is a reward for your work
  chosen_spanish_reading: porque hay recompensa para su trabajo
  alternative_spanish_readings:
  - porque su trabajo tendrá recompensa
  - porque hay galardón para su obra
  rationale: La formulación conserva la promesa de retribución sin desarrollar una doctrina que el versículo no explicita. Se evita importar categorías posteriores de mérito o justificación.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se corrige la validación anterior incluyendo el marcador [a] dentro del texto traducido. La redacción mantiene el contraste exhortativo y la metáfora hebrea de manera comprensible en español.
  spanish_consistency_notes:
  - Se preserva el estilo bíblico moderno y digno, sin recurrir a «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Recompensa» se mantiene como equivalente amplio de שָׂכָר, evitando estrechar el sentido a salario literal.
  - La imagen de las manos se conserva implícitamente en la nota, mientras que el cuerpo del texto prioriza fluidez natural en español.
