translation:
  language: es
  text: 'diciendo[a]: «Padre, si quieres, aparta[b] de mí esta copa[d]. Pero no mi voluntad,[c] sino la tuya, se haga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «dijo». El participio griego introduce el contenido de la oración de Jesús.'
    reason: alternative_reading
  - marker: b
    text: O «quita» o «retira». El verbo griego puede expresarse con distintos matices de apartar o remover.
    reason: lexical_alternative
  - marker: c
    text: O «no lo que yo quiero, sino lo que tú quieres».
    reason: alternative_reading
  - marker: d
    text: La «copa» es una metáfora bíblica de la porción asignada, a menudo de sufrimiento o juicio.
    reason: cross_reference
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decía
  lexicon: BDAG
  rationale: El participio introduce el contenido de la oración de Jesús; «diciendo» conserva esa relación sin añadir una coordinación o una perífrasis narrativa que el griego no exige.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh Padre
  lexicon: BDAG
  rationale: Es vocativo directo a Dios. «Padre» es la equivalencia natural y fiel en español, sin el tono arcaizante de «Oh Padre».
- source_word: εἰ βούλει
  english_pob_choice: if you are willing
  chosen_spanish: si quieres
  alternatives_spanish:
  - si estás dispuesto
  - si lo deseas
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad/disposición. En español, «si quieres» comunica de forma natural la petición condicional y mantiene la idea de voluntad sin sobreexplicar.
- source_word: παρένεγκε
  english_pob_choice: take ... away
  chosen_spanish: aparta
  alternatives_spanish:
  - quita
  - retira
  lexicon: BDAG
  rationale: El imperativo de παραφέρω aquí pide que la copa sea alejada de Jesús. «Aparta» es breve, idiomático y conserva la fuerza direccional de «away from me».
- source_word: τοῦτο τὸ ποτήριον
  english_pob_choice: this cup
  chosen_spanish: esta copa
  alternatives_spanish:
  - este cáliz
  - esta copa de sufrimiento
  lexicon: BDAG
  rationale: Se mantiene la metáfora bíblica de la «copa» sin resolverla en la traducción principal. «Copa» es clara en español y preserva la resonancia intertextual y teológica.
- source_word: ἀπ’ ἐμοῦ
  english_pob_choice: away from me
  chosen_spanish: de mí
  alternatives_spanish:
  - alejada de mí
  - lejos de mí
  lexicon: BDAG
  rationale: Con «aparta» en español, el complemento «de mí» expresa con naturalidad la separación pedida. Evita redundancia y mantiene el sentido del griego.
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Aunque el griego marca un fuerte giro concesivo, en español la transición queda bien expresada con «Pero» al inicio de la oración siguiente, con tono sobrio y claro.
- source_word: μὴ τὸ θέλημά μου ἀλλὰ τὸ σὸν
  english_pob_choice: not my will, but yours
  chosen_spanish: no se haga mi voluntad, sino la tuya
  alternatives_spanish:
  - no mi voluntad, sino la tuya
  - no lo que yo quiero, sino lo que tú quieres
  lexicon: BDAG
  rationale: El griego usa expresiones nominales («mi voluntad... la tuya»). En español, la construcción impersonal «no se haga» completa de manera natural el sentido del imperativo final sin perder la tensión entre ambas voluntades.
- source_word: γινέσθω
  english_pob_choice: be done
  chosen_spanish: se haga
  alternatives_spanish:
  - sea hecha
  - tenga lugar
  lexicon: BDAG
  rationale: El tercer singular imperativo de γίνομαι expresa que la voluntad del Padre llegue a efectuarse. «Se haga» es idiomático en español bíblico contemporáneo y conserva el valor de cumplimiento.
theological_decisions:
- issue: Distinción entre la voluntad humana de Jesús y la voluntad del Padre
  english_pob_reading: Render the contrast straightforwardly as 'not my will, but yours be done' without explanatory expansion.
  chosen_spanish_reading: «No se haga mi voluntad, sino la tuya»
  alternative_spanish_readings:
  - «No lo que yo quiero, sino lo que tú quieres»
  - «No mi voluntad, sino la tuya»
  rationale: La traducción mantiene la oposición explícita entre la voluntad de Jesús y la del Padre, sin suavizarla ni interpretarla. Así se preserva la tensión cristológica del pasaje conforme al testimonio del texto.
  doctrine_reference: Definición de Calcedonia (451); principio traductológico de preservar la tensión teológica sin resolverla
- issue: Forza metafórica de la 'copa'
  english_pob_reading: Keep 'cup' in the main text rather than interpret it as suffering or wrath.
  chosen_spanish_reading: Conservar «copa» en el texto principal.
  alternative_spanish_readings:
  - «sufrimiento»
  - «prueba»
  - «cáliz»
  rationale: La metáfora bíblica de la copa se mantiene intacta porque es comprensible en español y conserva su valor intertextual. Explicarla en el texto principal reduciría su alcance simbólico y teológico.
  doctrine_reference: Primacía del texto original y preservación de la imagen bíblica
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de SBLGNT y el expediente auditado en inglés. Se conserva la metáfora de la copa, el giro concesivo final y la distinción entre la voluntad de Jesús y la del Padre, sin expansion doctrinal ni paráfrasis innecesaria.
  spanish_consistency_notes:
  - Se usa «Padre» para el vocativo y «voluntad» para θέλημα, conforme al tono bíblico contemporáneo.
  - Se mantiene «copa» y no «cáliz» para evitar un registro litúrgico más estrecho que el del griego.
  - «Se haga» conserva la pasiva/impersonalidad funcional de γινέσθω sin romper la naturalidad del español.
  - La puntuación y las comillas siguen el uso editorial en español para discurso directo.
