    text: 'El hebreo emplea aquí dos términos afines para insectos: יֶלֶק, que puede referirse a una clase o etapa de langosta, y אַרְבֶּה, el término común para langosta, a menudo con matiz de enjambre. El texto principal los vierte como ''langosta'' y ''langosta en enjambre'' para conservar claridad sin perder la intensificación.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'te cortará' a 'te cortará de raíz' para reflejar mejor el sentido de כרת y la decisión inglesa 'cut you off'. Se mejora la naturalidad de los imperativos con 'Hazte numerosa', manteniendo el tono irónico sin forzar el español. Se reemplaza 'langosta devoradora' por 'langosta en enjambre' para ajustarse a la razón léxica documentada para אַרְבֶּה y a una expresión más clara en español.
