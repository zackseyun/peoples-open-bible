revisions:
- from: Y le colocaron un cordón de azul[a] para ponerlo sobre el turbante, por encima, tal como Yahvé había mandado a Moisés.
  to: Y le colocaron un cordón azul[a] para ponerlo por encima, sobre el turbante, tal como Yahvé había mandado a Moisés.
  rationale: Se corrige la expresión antinatural «de azul» por «azul», que preserva mejor el sentido en español y sigue la evidencia léxica documentada para תְּכֵלֶת. También se ajusta el orden de la frase locativa para reflejar con más naturalidad «above on the turban» del POB auditado, manteniendo intacta la referencia a Yahvé y la fórmula de cumplimiento.
