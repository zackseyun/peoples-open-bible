theological_decisions:
- issue: Metaphorical sense of 'arm' in a judgment oracle
  chosen_reading: Rendered 'arm' as 'strength' in both occurrences
  alternative_readings:
  - Rendered literally as 'arm'
  rationale: The Hebrew image of the arm commonly signifies strength or power. In this oracle against Eli's house, the point is the removal of power and enduring vitality, clarified by the following clause about no old man remaining. Translating the metaphor's sense serves optimal equivalence without importing extra doctrine.
  doctrine_reference: Translation philosophy §1, §5
