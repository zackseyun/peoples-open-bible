review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: encabezado, sujeto participial general (''los que confían''), nombre divino ''Yahvé'', comparación con el monte Sión y la idea de estabilidad permanente. Sin embargo, ''ascensos'' suena poco natural como designación literaria en español bíblico; ''subidas'' preserva mejor la fórmula tradicional y el sentido de מַעֲלוֹת. Además, la nota alternativa debería corresponder con el hebreo más formal (''no será movido'') en vez de repetir un modal de posibilidad.'
  spanish_quality_summary: La redacción es clara y digna, pero 'Cántico de ascensos' resulta algo forzado en español. El resto del versículo es legible y fiel. 'que no puede ser sacudido, sino que permanece para siempre' funciona bien en español moderno y conserva la imagen poética.
  glossary_alignment: Alinea correctamente con la terminología del proyecto al usar 'Yahvé'. No hay conflicto relevante con otros términos doctrinales. La principal mejora es estilística-lexical en el encabezado y el ajuste de la nota para que refleje mejor la alternativa formal documentada.
  issues:
  - severity: medium
    issue: Encabezado 'Cántico de ascensos' poco natural en español bíblico
    rationale: Aunque 'ascensos' calca el sustantivo hebreo, la designación establecida y más inteligible en español es 'Cántico de subidas', que sigue siendo fiel al valor léxico de מַעֲלוֹת sin sonar técnica o extraña.
  - severity: low
    issue: La nota alternativa dice 'no puede ser movido'
    rationale: La alternativa inglesa documentada es más formalmente 'it will not be moved', que en español se refleja mejor como 'no será movido'. Así se preserva mejor el matiz de alternativa más literal/formal al hebreo.
  revised_spanish_text: Cántico de subidas. Los que confían en Yahvé son como el monte Sión[a], que no puede ser sacudido, sino que permanece para siempre.
