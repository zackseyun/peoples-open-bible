translation:
  language: es
  text: Acuérdate, Dios mío, de Tobías y de Sanbalat, conforme a estos hechos suyos; y también de Noadía la profetisa y del resto de los profetas, que estaban tratando de infundirme miedo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que buscaban intimidarme'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: La forma hebrea es una súplica dirigida a Dios; en español, el imperativo pronominal 'Acuérdate' conserva el valor de ruego directo y suena natural en oración.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'mi Dios', aquí la petición va dirigida al nombre divino implícito en el texto. Se usa 'Yahvé' según el criterio del proyecto para reflejar el nombre divino de forma transparente; 'Dios mío' sería una alternativa posible, pero el texto base ya muestra el vocativo personal.
- source_word: לְטוֹבִיָּה וּלְסַנְבַלַּט
  english_pob_choice: Tobiah and Sanballat
  chosen_spanish: de Tobías y de Sanbalat
  alternatives_spanish:
  - a Tobías y a Sanbalat
  lexicon: HALOT
  rationale: Se conservan los nombres propios en transliteración adaptada al español. La preposición hebrea se vierte de manera natural dentro de la construcción 'Acuérdate de... de...'.
- source_word: כְּמַעֲשָׂיו אֵלֶּה
  english_pob_choice: according to these deeds of theirs
  chosen_spanish: conforme a estos hechos suyos
  alternatives_spanish:
  - según estos hechos suyos
  - de acuerdo con estos hechos suyos
  lexicon: HALOT
  rationale: כְּ expresa correspondencia o medida. 'Conforme a' preserva esa relación sin añadir una fórmula judicial más fuerte que la del hebreo. 'Hechos suyos' refleja el sufijo singular con referencia colectiva, como en el audit trail inglés.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - y además
  lexicon: HALOT
  rationale: La partícula añaditiva se expresa con 'y también', que conserva la suma de personas incluidas en la petición.
- source_word: לְנוֹעַדְיָה הַנְּבִיאָה
  english_pob_choice: Noadiah the prophetess
  chosen_spanish: de Noadías la profetisa
  alternatives_spanish:
  - de Noadías, la profetisa
  - de Noadías la profetisa
  lexicon: HALOT
  rationale: '''Profetisa'' mantiene el rasgo femenino explícito del hebreo הַנְּבִיאָה. El nombre se adapta al español como ''Noadías'', una transliteración más fluida que conserva la referencia personal.'
- source_word: וּלְיֶתֶר הַנְּבִיאִים
  english_pob_choice: and the rest of the prophets
  chosen_spanish: y del resto de los profetas
  alternatives_spanish:
  - y de los demás profetas
  - y del resto de profetas
  lexicon: HALOT
  rationale: יֶתֶר significa 'resto' o 'lo que queda'. 'Del resto de los profetas' reproduce con claridad el grupo añadido después de Noadías.
- source_word: אֲשֶׁר הָיוּ מְיָרְאִים אוֹתִי
  english_pob_choice: who were trying to make me afraid
  chosen_spanish: que estaban tratando de infundirme miedo
  alternatives_spanish:
  - que intentaban atemorizarme
  - que buscaban intimidarme
  - que me estaban asustando
  lexicon: HALOT
  rationale: El verbo en causativo expresa que ellos actuaban para provocar temor. 'Infundirme miedo' conserva la fuerza causativa y evita reducirlo a un simple sentimiento pasivo de Nehemías.
theological_decisions:
- issue: Súplica imprecatoria sin añadir lenguaje judicial explícito
  english_pob_reading: Render as an appeal for God to remember the opponents in accordance with their deeds, without expanding into explicit judgment language not stated in the Hebrew.
  chosen_spanish_reading: Se mantiene una súplica para que Yahvé los recuerde conforme a sus hechos, sin añadir fórmulas de condena o juicio que el hebreo no expresa de modo explícito.
  alternative_spanish_readings:
  - Acuérdate de ellos para juzgarlos
  - Hazles justicia según sus obras
  - Recuerda ... para castigo
  rationale: El verbo 'recordar' y la frase 'conforme a estos hechos suyos' bastan para la petición del texto. Traducir con un juicio explícito intensificaría la imprecación más allá de lo que el hebreo dice.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en la lectura básica: una petición a Dios para que recuerde a los opositores y a otros profetas implicados, con un matiz causativo de producir temor. No se documentan revisiones que alteren la traducción.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el vocativo divino conforme al estándar del proyecto.
  - Se mantiene 'profetisa' para reflejar el femenino explícito de הַנְּבִיאָה.
  - Se traduce el matiz causativo de מְיָרְאִים con una expresión natural en español que conserva la intención de intimidar.
  - La construcción 'conforme a estos hechos suyos' preserva la relación de medida sin sobreinterpretar el pasaje.
