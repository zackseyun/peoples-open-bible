revisions:
- from: '¿Quién ha [a]asignado su camino para él? ¿O quién ha dicho[b]: «Tú has hecho maldad»?'
  to: '¿Quién le ha fijado[a] su camino? ¿O quién le ha dicho: «Tú has hecho mal[b]»?'
  rationale: La revisión corrige la naturalidad del español y afina la correspondencia con el hebreo y con la auditoría inglesa. «Le ha fijado su camino» expresa mejor la idea de prescribir o determinar su curso, evitando el calco «asignado ... para él». La nota [a] se sanea para reflejar alternativas verdaderamente pertinentes. «Has hecho mal» representa mejor la acusación breve de עַוְלָה, mientras que «injusticia» se conserva como alternativa documentada. Se mantiene la referencia contextual a Dios sin introducir convención devocional ajena al proyecto.
