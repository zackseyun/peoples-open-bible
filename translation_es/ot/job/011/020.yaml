review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: ojos de los impíos, pérdida de refugio/escape, y esperanza reducida a una imagen de expiración. Sin embargo, dos giros españoles necesitan ajuste para reflejar mejor el sentido y sonar naturales: ''perecerá de ellos'' no expresa bien מִנְהֶם (''de/desde ellos'' como algo quitado de ellos), y ''el exhalar de la vida'' resulta algo forzado en español bíblico claro.'
  spanish_quality_summary: El registro es digno y legible, pero 'de ellos' después de 'perecerá' suena poco idiomático; 'les desaparecerá' o 'se les perderá' expresa mejor la privación. Además, 'el exhalar de la vida' es comprensible, aunque más natural y igualmente fiel sería 'la exhalación de la vida' o 'el aliento final'. Dado que la auditoría inglesa prefirió una formulación más formal y transparente, conviene mantener la imagen sin caer en una construcción dura.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Impíos' para רְשָׁעִים es aceptable en español eclesial. 'Refugio' sigue la revisión inglesa documentada para מָנוֹס, aunque en español requiere mejor sintaxis con מִנְהֶם. La imagen de מַפַּח נָפֶשׁ debe preservar la expiración/último aliento, no diluirse en una abstracción.
  issues:
  - severity: medium
    issue: La frase 'el refugio perecerá de ellos' es poco natural y no comunica bien la idea de que el refugio/escape les es quitado.
    rationale: מִנְהֶם indica que la posibilidad de refugio desaparece de ellos, no simplemente que algo 'perece de ellos'. En español, 'les desaparecerá' transmite mejor esa privación.
  - severity: medium
    issue: '''El exhalar de la vida'' suena calcado y algo torpe en español.'
    rationale: Aunque intenta seguir de cerca la revisión inglesa, una nominalización como 'la exhalación de la vida' conserva mejor la imagen de expiración con mayor naturalidad y dignidad en español.
  revised_spanish_text: Pero los ojos de los impíos se agotarán[a], el refugio les desaparecerá, y su esperanza será la exhalación de la vida.
  revised_footnotes:
  - marker: a
    text: 'O: «fallarán»; el hebreo presenta la imagen de ojos que se cansan o se consumen al esperar. La frase final también es difícil; «la exhalación de la vida» procura conservar la metáfora de la expiración, es decir, de un último aliento.'
    reason: lexical_alternative
