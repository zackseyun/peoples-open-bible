translation:
  language: es
  text: Sonido de estruendo desde la ciudad[a], sonido desde el templo[c][b], sonido de Yahvé, que les paga a sus enemigos lo que merecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'voz' o 'ruido' para cada ocurrencia de 'sonido'; el hebreo repite la misma palabra tres veces con efecto retórico.
    reason: lexical_alternative
  - marker: b
    text: O 'tumulto' o 'rugido' para 'estruendo'.
    reason: lexical_alternative
  - marker: c
    text: '''Templo'' traduce el hebreo heikhal, que en algunos contextos también puede significar ''palacio''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל
  english_pob_choice: sound
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - ruido
  lexicon: HALOT
  rationale: קוֹל admite 'voz', 'sonido' o 'ruido'. En español, 'voz' conserva bien el paralelismo repetido y permite una expresión natural en una cláusula nominal de anuncio; además mantiene abierta la posibilidad de un estruendo audible sin forzar un matiz exclusivamente vocal.
- source_word: שָׁאוֹן
  english_pob_choice: uproar
  chosen_spanish: estruendo
  alternatives_spanish:
  - tumulto
  - rugido
  - ruido
  lexicon: HALOT
  rationale: שָׁאוֹן expresa conmoción ruidosa o tumultuosa. 'Estruendo' comunica mejor la fuerza sonora del término en español y encaja con el contexto de juicio, sin reducirlo a un simple 'ruido'.
- source_word: מֵעִיר
  english_pob_choice: from the city
  chosen_spanish: desde la ciudad
  alternatives_spanish:
  - de la ciudad
  - desde la urbe
  lexicon: HALOT
  rationale: La preposición marca origen; 'desde la ciudad' preserva el movimiento de procedencia y suena natural en español.
- source_word: מֵהֵיכָל
  english_pob_choice: from the temple
  chosen_spanish: desde el templo
  alternatives_spanish:
  - desde el palacio
  - desde el santuario
  lexicon: HALOT
  rationale: הֵיכָל puede significar 'palacio' o 'templo'. En este contexto de Sion y juicio, 'templo' es la opción más clara y coherente con el paralelismo de la ciudad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme al criterio del proyecto para יְהוָה, en vez de sustituirlo por un título impersonal.
- source_word: מְשַׁלֵּם
  english_pob_choice: repaying
  chosen_spanish: que da el pago debido
  alternatives_spanish:
  - que repaga
  - que retribuye
  - que devuelve
  lexicon: HALOT
  rationale: El participio de שׁלם aquí expresa retribución/repago. 'Que da el pago debido' comunica la idea de retribuir de modo justo sin el torpe giro 'repagando' o la redundancia de 'pago' repetido en exceso.
- source_word: גְּמוּל
  english_pob_choice: what they deserve
  chosen_spanish: el pago debido
  alternatives_spanish:
  - la recompensa debida
  - la retribución
  - lo que merecen
  lexicon: HALOT
  rationale: גְּמוּל es lo retribuido, lo debido en retorno. 'El pago debido' conserva la equivalencia semántica con 'what they deserve' y mantiene el tono judicial del verso.
- source_word: לְאֹיְבָיו
  english_pob_choice: to his enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - contra sus enemigos
  - para sus enemigos
  lexicon: HALOT
  rationale: El ל indica el destinatario del acto retributivo. 'A sus enemigos' es la forma más directa y natural en español; el contexto ya deja claro que se trata de retribución hostil.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del POB, se translitera el nombre divino como 'Yahvé' para preservar el nombre personal revelado, no un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directo y toma en cuenta la revisión inglesa más reciente, que evitó la torpeza de ‘repaying recompense’ y prefirió una formulación más natural del sentido de גְּמוּל como retribución debida. En español se reflejó con ‘que da el pago debido’, manteniendo el valor judicial sin repetir innecesariamente ‘pago’.
  spanish_consistency_notes:
  - Se mantuvo la triple repetición de קוֹל mediante la reiteración de 'voz' para conservar el efecto retórico.
  - Se usó 'Yahvé' de manera consistente con la terminología del proyecto para יְהוָה.
  - '''Templo'' se eligió por contexto frente a ''palacio'', pero se dejó nota de la alternativa semántica.'
  - La cláusula final prioriza claridad y naturalidad en español sin perder la noción de retribución judicial.
