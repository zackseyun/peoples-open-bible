translation:
  language: es
  text: para hacer retroceder el plan impío contra ellos y rescatarlos, con una magnífica manifestación[a], de la muerte que ya estaba lista a sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una aparición gloriosa» o «con una intervención majestuosa». El griego ἐπιφάνεια puede denotar una aparición llamativa, a menudo de ayuda divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστρέψαι
  english_pob_choice: to turn back
  chosen_spanish: volver atrás
  alternatives_spanish:
  - revertir
  - dar vuelta
  lexicon: LSJ
  rationale: El infinitivo expresa hacer que el plan cambie de rumbo o sea revertido. «Volver atrás» comunica ese retroceso de forma natural en español sin perder la idea de invertir el curso del plan hostil.
- source_word: βουλήν
  english_pob_choice: plan
  chosen_spanish: plan
  alternatives_spanish:
  - consejo
  - propósito
  - maquinación
  lexicon: LSJ
  rationale: En el contexto se trata de una intención hostil formada contra ellos. «Plan» es claro y fiel, y evita cargar el texto con una intensidad no necesaria que «maquinación» podría sugerir.
- source_word: ἀνοσίαν
  english_pob_choice: unholy
  chosen_spanish: impío
  alternatives_spanish:
  - profano
  - inícuo
  - sin piedad
  lexicon: LSJ
  rationale: El adjetivo señala una falta de reverencia ante Dios y una maldad religiosa, no solo ética. «Impío» preserva mejor esa dimensión teológica que un término meramente moral.
- source_word: ῥύσασθαι
  english_pob_choice: to rescue
  chosen_spanish: rescatar
  alternatives_spanish:
  - librar
  - salvar
  lexicon: LSJ
  rationale: «Rescatar» es el equivalente más natural para una intervención frente a un peligro inminente de muerte, y conserva el valor de acción decisiva de ῥύσασθαι.
- source_word: μεγαλομεροῦς ἐπιφανείας
  english_pob_choice: with a magnificent manifestation
  chosen_spanish: con una magnífica manifestación
  alternatives_spanish:
  - con una aparición gloriosa
  - con una intervención majestuosa
  - con una epifanía gloriosa
  lexicon: LSJ
  rationale: Ἐπιφάνεια puede ser una aparición o manifestación visible; «manifestación» conserva esa amplitud sin imponer tecnicismo posterior. «Magnífica» reproduce la idea de μεγαλoμεροῦς con dignidad y brillo.
- source_word: μόρου
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - la ruina
  - el destino mortal
  lexicon: LSJ
  rationale: Aquí el peligro concreto es la muerte inminente; «la muerte» es la opción más directa y clara, acorde con el contexto inmediato.
- source_word: παρὰ πόδας ἐν ἑτοίμῳ
  english_pob_choice: ready at their feet
  chosen_spanish: pronta a sus pies
  alternatives_spanish:
  - lista a sus pies
  - a punto a sus pies
  - muy cerca, a sus pies
  lexicon: LSJ
  rationale: La expresión idiomática comunica inminencia y proximidad espacial. «Pronta a sus pies» mantiene la imagen de cercanía y disponibilidad de la amenaza sin sobrecargar la frase.
theological_decisions:
- issue: Sentido de ἐπιφάνεια en el contexto de salvación divina
  english_pob_reading: Rendered as a divine manifestation rather than a generic event
  chosen_spanish_reading: manifestación divina salvadora sin tecnicismo doctrinal posterior
  alternative_spanish_readings:
  - aparición gloriosa
  - intervención majestuosa
  rationale: En 3 Macabeos la liberación se atribuye a la acción dramática de Dios. «Manifestación» conserva el campo semántico de aparición visible y deja abierta la forma exacta de la intervención, sin resolver la tensión con un término más doctrinal.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente al reflejar ἐν ἑτοίμῳ como «pronta» en vez de añadir una imagen verbal extra, manteniendo la naturalidad del español y la proximidad del original griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - «Impío» conserva la carga religiosa de ἀνοσίαν sin banalizarla como mera inmoralidad.
  - La estructura de infinitivos mantiene el paralelismo del griego y la relación entre la reversión del plan y el rescate.
