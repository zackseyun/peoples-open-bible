- from: Entonces subieron desde el pueblo unos tres mil hombres hasta allí, pero huyeron delante de los hombres de Hai.
  to: Entonces subieron allí del pueblo unos tres mil hombres, pero huyeron ante los hombres de Hai.
  rationale: Se ajusta מִן הָעָם a «del pueblo» para reflejar un contingente tomado del pueblo, no procedencia espacial; se simplifica שָׁמָּה a «allí» para evitar un matiz añadido; y se mejora la fluidez con «ante» en vez de «delante de». No se requieren notas.
