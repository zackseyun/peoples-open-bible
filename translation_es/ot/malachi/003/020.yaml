review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: la salida del «sol de justicia», la sanidad/curación asociada, la salida de los temerosos del nombre de Dios y el símil de los terneros. Sin embargo, se aparta del rastro auditado del POB en dos puntos importantes: traduce וּמַרְפֵּא como una cláusula existencial («habrá sanidad») en vez de la construcción adnominal «con sanidad/curación», y omite la nota léxica del inglés sobre «alas» como posible «rayos», que es precisamente relevante en este contexto solar.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «se levantará el sol» suena menos natural que «saldrá» o «se alzará» para el sol, y «habrá sanidad en sus alas» diluye la compacta imagen poética hebrea. Además, la nota b actual se centra en מרפא, cuando en el POB auditado las notas b y c cubren respectivamente «alas/rayos» y «saltarán/retozarán». Conviene ajustar el texto para mayor naturalidad y para conservar mejor la imagen del original.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sol de justicia» preserva adecuadamente צדקה sin imponer lectura mesiánica explícita. «Temen mi nombre» está bien. La principal mejora es alinear mejor מרפא con «con curación/sanidad» y conservar la alternativa de כנף como «rayos».
  issues:
  - severity: medium
    issue: «habrá sanidad» no refleja bien la estructura de וּמַרְפֵּא
    rationale: 'El hebreo presenta un sintagma nominal unido a la imagen solar: «con sanidad/curación en sus alas», no una nueva cláusula existencial. La formulación actual añade un verbo no presente y debilita la relación directa con el sol.'
  - severity: medium
    issue: Falta la nota léxica sobre «alas» = «rayos»
    rationale: El inglés POB preserva explícitamente esta alternativa para בכנפיה por la metáfora solar. En español también es importante, porque «alas» puede sonar extraño sin la aclaración de «rayos».
  - severity: low
    issue: «se levantará el sol» es menos idiomático en español
    rationale: Aunque comprensible, para el sol en español bíblico y general suena más natural «saldrá» o «se alzará». Esto mejora legibilidad sin sacrificar fidelidad.
  - severity: low
    issue: La nota sobre מרפא no corresponde al patrón auditado del POB
    rationale: El aparato inglés prioriza para este segmento «with healing» como texto principal y reserva notas para «wings/rays» y «leap/skip/frolic». La nota española sobre «curación» no es incorrecta, pero es menos necesaria que la omitida sobre «rayos».
  revised_spanish_text: Pero para ustedes que temen mi nombre[a], saldrá el sol de justicia con curación en sus alas[b]; y ustedes saldrán y saltarán[c] como terneros del establo.
