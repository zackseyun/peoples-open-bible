review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: la infidelidad de pacto contra el Dios de sus padres, la metáfora sexual de la idolatría, y la cláusula relativa con Dios como sujeto singular. Sin embargo, hay un problema de fidelidad/idiomaticidad en la nota: la alternativa «se fueron en pos de los dioses» omite la metáfora sexual que el POB inglés preserva precisamente como alternativa significativa (''played the prostitute after'' / ''went whoring after'').'
  spanish_quality_summary: El texto principal es claro, digno y ampliamente legible. «Se comportaron con infidelidad» suena algo más pesado que «actuaron infielmente», pero no es incorrecto. La combinación «se prostituyeron tras» es fuerte pero comprensible y conserva bien la imagen hebrea. «Delante de ellos» es aceptable, aunque «de delante de ellos» sería más literal; no hace falta cambiarlo. La reparación necesaria es pequeña y se limita a la nota al pie.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Dios» para אֱלֹהִים singular por concordancia verbal es correcto; no aparece YHWH. La preservación de la metáfora sexual en «se prostituyeron» concuerda con la decisión teológica y léxica auditada. La nota revisada debe mantener esa misma fuerza metafórica.'
  issues:
  - severity: medium
    issue: La nota al pie alternativa debilita indebidamente la metáfora sexual de זנה.
    rationale: El inglés auditado conserva como alternativas 'played the prostitute after' / 'went whoring after' precisamente para no aplanar la carga metafórica-teológica. La nota española actual («se fueron en pos de los dioses») sustituye la imagen por una paráfrasis de seguimiento idolátrico.
  revised_spanish_text: Pero se comportaron con infidelidad contra el Dios de sus padres y se prostituyeron[a] tras los dioses de los pueblos de la tierra, a quienes Dios había destruido delante de ellos.
  revised_footnotes:
  - marker: a
    text: O «anduvieron como prostitutas tras» o «fornicaron tras». El hebreo usa una metáfora sexual para la idolatría y la infidelidad de pacto.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y legible. Se corrige únicamente la nota para que preserve, como el rastro de auditoría inglés, la metáfora sexual de זנה en vez de sustituirla por una paráfrasis debilitada.
