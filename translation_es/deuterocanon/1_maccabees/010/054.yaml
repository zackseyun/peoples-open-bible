translation:
  language: es
  text: y establezcamos amistad con él[a]. Y ahora, dame a tu hija por mujer, y yo me emparentaré contigo[b], y les daré a ti y a ella regalos dignos de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hagamos una alianza con él»; el griego dice literalmente «amistad», aunque en este contexto real probablemente incluye una alianza diplomática.
    reason: lexical_alternative
  - marker: b
    text: O «me casaré en tu familia». El verbo griego se refiere a entrar en una relación de parentesco por matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνστήσωμεν
  english_pob_choice: let us establish
  chosen_spanish: establezcamos
  alternatives_spanish:
  - hagamos
  - consolidemos
  lexicon: LSJ
  rationale: El subjuntivo exhortativo pide una propuesta voluntaria. «Establezcamos» conserva la idea de formar o instituir una relación y suena natural en español con «amistad».
- source_word: φιλίαν
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - alianza
  - relaciones amistosas
  lexicon: LSJ
  rationale: El sentido básico es «amistad». En este contexto diplomático implica una relación política, pero la palabra griega no es más técnica que eso; «amistad» preserva el término y deja que el contexto sugiera alianza.
- source_word: δός μοι τὴν θυγατέρα σου εἰς γυναῖκα
  english_pob_choice: give me your daughter as a wife
  chosen_spanish: dame a tu hija por mujer
  alternatives_spanish:
  - dame a tu hija en matrimonio
  - entrega a tu hija para esposa
  lexicon: LSJ
  rationale: La fórmula matrimonial idiomática se mantiene con claridad y sin perder el tono transaccional y dinástico del griego. «Por mujer» es una forma española sobria y fiel para expresar el resultado matrimonial.
- source_word: ἐπιγαμβρεύσω
  english_pob_choice: I will become related by marriage to you
  chosen_spanish: me emparentaré contigo
  alternatives_spanish:
  - me uniré a tu familia por matrimonio
  - me haré tu pariente político
  lexicon: LSJ
  rationale: El verbo expresa entrar en relación de afinidad por matrimonio. «Me emparentaré contigo» transmite la relación de parentesco por alianza matrimonial sin reducirla solo al acto de casarse con la hija.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - dones
  - presentes
  lexicon: LSJ
  rationale: El sustantivo es amplio y significa «regalos/dones». «Regalos» es claro en español moderno y no añade la especificación de regalos nupciales que el griego no expresa explícitamente.
- source_word: ἄξιά σου
  english_pob_choice: worthy of you
  chosen_spanish: dignos de ti
  alternatives_spanish:
  - convenientes para ti
  - proporcionados a tu dignidad
  lexicon: LSJ
  rationale: La frase indica dones acordes con la dignidad o rango del interlocutor. «Dignos de ti» preserva la idea de correspondencia honorífica y mantiene el paralelo con los regalos ofrecidos a ella.
translation_notes:
  revision_awareness: El texto griego de Swete 1909 coincide con el paquete de fuente y no se registran revisiones posteriores; se mantiene la lectura auditada sin cambios de contenido.
  spanish_consistency_notes:
  - Se mantuvo «amistad» en el cuerpo principal para reflejar φιλίαν, con nota que reconoce la posible carga diplomática.
  - Se evitó «alianza» en el texto principal para no borrar la tensión léxica entre el valor literal de la palabra griega y su uso político contextual.
  - «Me emparentaré contigo» conserva la noción de afinidad matrimonial expresada por ἐπιγαμβρεύσω sin volverla una paráfrasis excesiva.
  - Se usó «Yahvé» en lineamientos generales del proyecto, pero este versículo no contiene el nombre divino.
