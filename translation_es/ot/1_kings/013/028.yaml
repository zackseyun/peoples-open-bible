translation:
  language: es
  text: Y fue y halló su cadáver[a] arrojado en el camino, y el asno y el león estaban de pie junto al cadáver. El león no había comido el cadáver[b], ni había despedazado al asno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerpo» para נְבֵלָה; el término hebreo es fuerte y subraya la realidad de la muerte.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «no había quebrado al asno»; el sentido en contexto es que el león no lo había despedazado ni maltratado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְלָתוֹ / הַנְּבֵלָה
  english_pob_choice: corpse
  chosen_spanish: cadáver
  alternatives_spanish:
  - cuerpo
  - carroña
  lexicon: HALOT
  rationale: נְבֵלָה designa un cuerpo muerto de manera cruda. En español, 'cadáver' conserva la referencia humana y el tono fuerte mejor que 'cuerpo'. 'Carroña' suena más animal y desplazaría el sentido.
- source_word: מֻשְׁלֶכֶת
  english_pob_choice: thrown
  chosen_spanish: arrojado
  alternatives_spanish:
  - echado
  - tirado
  lexicon: HALOT
  rationale: El participio pasivo de שלך indica que el cuerpo fue lanzado o puesto violentamente. 'Arrojado' mantiene esa fuerza y es natural en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - en la calzada
  - a la orilla del camino
  lexicon: HALOT
  rationale: Aunque la idea básica es 'road', en español bíblico y moderno 'camino' comunica bien la vía transitada. 'En el camino' es claro y fluido sin perder el valor locativo.
- source_word: עֹמְדִים אֵצֶל
  english_pob_choice: standing beside
  chosen_spanish: de pie junto a
  alternatives_spanish:
  - junto a
  - parados junto a
  - de pie al lado de
  lexicon: HALOT
  rationale: La combinación participial señala permanencia en posición cercana. 'De pie junto a' reproduce la imagen visual de forma natural en español.
- source_word: לֹא אָכַל
  english_pob_choice: had not eaten
  chosen_spanish: no había comido
  alternatives_spanish:
  - no comió
  - no había devorado
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja bien el estado observado al llegar. 'Comido' mantiene el verbo común sin introducir una intensificación no presente en el hebreo.
- source_word: שָׁבַר אֶת הַחֲמוֹר
  english_pob_choice: had it torn apart the donkey
  chosen_spanish: había despedazado al asno
  alternatives_spanish:
  - había quebrado al asno
  - había roto al asno
  - lo había atacado
  lexicon: HALOT
  rationale: שׁבר literalmente es 'romper', pero con el asno como objeto aquí comunica daño corporal grave. 'Despedazar' recoge la fuerza contextual que la POB inglesa expresó con 'torn apart' y evita el calco torpe 'romper al asno'.
- source_word: וַיֵּלֶךְ וַיִּמְצָא
  english_pob_choice: He went and found
  chosen_spanish: Y fue y halló
  alternatives_spanish:
  - Y fue y encontró
  - Y se fue y halló
  lexicon: HALOT
  rationale: La secuencia narrativa wayyiqtol se conserva con dos verbos coordinados. 'Halló' es un equivalente bíblico y preciso para 'found', con un registro digno en español.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la POB inglesa y no requiere cambios de sentido. Se mantuvo la misma estructura narrativa y se preservó la tensión léxica de נְבֵלָה y שׁבר con soluciones españolas naturales pero fieles.
  spanish_consistency_notes:
  - Se usó 'cadáver' para mantener la crudeza y la referencia humana de נְבֵלָה.
  - Se evitó 'SEÑOR' y términos teológicos no presentes en el versículo.
  - Se conservó el paralelismo narrativo con dos cláusulas coordinadas.
  - '''León'' y ''asno'' se mantuvieron literales, sin domesticar la imagen.'
  - El pluscuamperfecto ('había comido', 'había despedazado') expresa el resultado ya observado en la escena.
