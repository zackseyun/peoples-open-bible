    rationale: Las notas deben preservar alternativas significativas del expediente, no duplicar el término principal. Conviene reflejar opciones como «entonar un lamento» o «alzar una endecha/canto fúnebre».
  revised_spanish_text: Y tú, levanta un lamento[a] sobre los príncipes de Israel[b].
