id: 2CH.31.21
reference: 2 Chronicles 31:21
source:
  edition: WLC
  text: וּ/בְ/כָֽל מַעֲשֶׂ֞ה אֲשֶׁר הֵחֵ֣ל בַּ/עֲבוֹדַ֣ת בֵּית הָ/אֱלֹהִ֗ים וּ/בַ/תּוֹרָה֙ וּ/בַ/מִּצְוָ֔ה לִ/דְרֹ֖שׁ לֵֽ/אלֹהָ֑י/ו בְּ/כָל לְבָב֥/וֹ עָשָׂ֖ה וְ/הִצְלִֽיחַ־־׀־־׃פ
translation:
  text: And in every work that he began in the service of the house of God[a], and in the law and the commandment, seeking his God with all his heart[c][b], he did and prospered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' for 'law' (Hebrew torah).
    reason: lexical_alternative
  - marker: b
    text: Or 'to inquire of his God.' The Hebrew verb can carry both the sense of seeking and of consulting.
    reason: lexical_alternative
  - marker: c
    text: Or 'and succeeded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל מַעֲשֶׂה
  chosen: And in every work
  alternatives:
  - And in every deed
  - And in every matter
  lexicon: HALOT
  rationale: מַעֲשֶׂה broadly denotes work/deed/activity. 'Work' fits the administrative and cultic context while preserving the concrete sense. The prefixed conjunction and preposition are carried as 'And in' to link with the previous context and retain the Hebrew structure.
- source_word: אֲשֶׁר הֵחֵל
  chosen: that he began
  alternatives:
  - which he undertook
  - that he started
  lexicon: HALOT
  rationale: הֵחֵל from חלל/החל in the Hiphil commonly means 'begin.' 'That he began' is straightforward and preserves the verbal aspect without overinterpreting it as merely 'undertook,' though that is contextually close.
- source_word: בַּעֲבוֹדַת בֵּית הָאֱלֹהִים
  chosen: in the service of the house of God
  alternatives:
  - in the work of the house of God
  - in the service of God's house
  lexicon: HALOT
  rationale: עֲבוֹדָה can mean service, labor, or cultic service. Here it refers to temple-related service broadly. 'Service of the house of God' preserves both the institutional and worship-related sense without narrowing it to priestly ritual alone.
- source_word: וּבַתּוֹרָה
  chosen: and in the law
  alternatives:
  - and in the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction or law. In this royal reform context, reference to the Mosaic legal corpus is prominent, so 'law' is the best main-text rendering. 'Instruction' is a valid lexical alternative and is preserved in a footnote because it can broaden the nuance beyond legal code.
- source_word: וּבַמִּצְוָה
  chosen: and in the commandment
  alternatives:
  - and in the command
  - and in the commandments
  lexicon: HALOT
  rationale: The singular מִצְוָה is retained as singular in English for formal correspondence. It may function collectively, but rendering it singular best reflects the Hebrew form while remaining intelligible.
- source_word: לִדְרֹשׁ לֵאלֹהָיו
  chosen: to seek his God
  alternatives:
  - to inquire of his God
  - to seek after his God
  lexicon: HALOT
  rationale: דרשׁ with God often means seek, consult, or inquire of. 'Seek his God' captures the devotional and covenantal sense in Chronicles, where seeking God is a key theological motif, without reducing it to mere consultation.
- source_word: בְּכָל לְבָבוֹ
  chosen: with all his heart
  alternatives:
  - with his whole heart
  lexicon: HALOT
  rationale: This idiom expresses wholehearted devotion. 'With all his heart' is the most natural and recognizable English equivalent and preserves the covenantal force of total commitment.
- source_word: עָשָׂה
  chosen: he did it
  alternatives:
  - he acted
  - he carried it out
  lexicon: HALOT
  rationale: The verb is very broad ('do/make'). Because the sentence refers back to every work he began, 'he did it' succinctly captures completion/action while maintaining the simple Hebrew diction.
- source_word: וְהִצְלִיחַ
  chosen: and prospered
  alternatives:
  - and succeeded
  lexicon: HALOT
  rationale: הצליח in the Hiphil can mean prosper, succeed, or cause to prosper depending on context. Here the intransitive sense 'prospered' fits the summary evaluation of Hezekiah's endeavors and echoes common biblical phrasing.
