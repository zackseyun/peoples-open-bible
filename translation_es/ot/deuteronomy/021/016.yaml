translation:
  language: es
  text: Y el día que reparta su herencia a sus hijos, no podrá tratar al hijo de la esposa amada[a] como el primogénito sobre el hijo de la esposa aborrecida, que es el primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el hijo de la esposa no amada'' o ''el hijo de la esposa menos amada''. En este contexto legal, el contraste hebreo entre ''amada'' y ''aborrecida'' puede expresar preferencia relativa más que odio activo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ...
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula introduce una cláusula legal o circunstancial. En español, 'Y sucederá que' conserva el valor formular y temporal sin sonar tan rígido como un calco literal.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día en que
  - cuando
  lexicon: HALOT
  rationale: La preposición temporal se mantiene de forma natural en español, preservando el marco legal y circunstancial del hebreo.
- source_word: הַנְחִילוֹ
  english_pob_choice: he gives his inheritance to his sons
  chosen_spanish: reparta su herencia a sus hijos
  alternatives_spanish:
  - dé su herencia a sus hijos
  - asigne su herencia a sus hijos
  lexicon: HALOT
  rationale: El hifil de נחל expresa la acción de adjudicar o distribuir una herencia. 'Reparta su herencia a sus hijos' comunica bien la idea causativa y el contexto de herencia sin forzar un calco.
- source_word: אֵת אֲשֶׁר יִהְיֶה לוֹ
  english_pob_choice: what belongs to him
  chosen_spanish: su herencia
  alternatives_spanish:
  - lo que le pertenece
  - lo que tiene
  lexicon: HALOT
  rationale: El contexto legal aclara que se trata del patrimonio/caudal que le pertenece. 'Su herencia' es la forma más natural y precisa en español, coherente con la revisión inglesa que simplificó la referencia del objeto.
- source_word: לֹא יוּכַל
  english_pob_choice: he may not
  chosen_spanish: no podrá
  alternatives_spanish:
  - no le será permitido
  - no puede
  lexicon: HALOT
  rationale: En contexto jurídico, la forma expresa prohibición o falta de derecho, no solo incapacidad. 'No podrá' transmite adecuadamente la restricción normativa en español contemporáneo.
- source_word: לְבַכֵּר
  english_pob_choice: treat ... as the firstborn
  chosen_spanish: dar la primacía
  alternatives_spanish:
  - dar el derecho de primogenitura
  - tratar ... como primogénito
  lexicon: HALOT
  rationale: El verbo implica conferir prioridad o estatus de primogénito. 'Dar la primacía' evita la ambigüedad de un calco demasiado técnico y conserva el sentido jurídico de preferencia.
- source_word: בֶּן הָאֲהוּבָה
  english_pob_choice: the son of the loved wife
  chosen_spanish: el hijo de la amada[a]
  alternatives_spanish:
  - el hijo de la amada esposa
  - el hijo de la querida
  lexicon: HALOT
  rationale: El hebreo contrapone 'amada' y 'aborrecida'. En español, 'amada' preserva la fuerza relacional del participio. Se evita añadir 'esposa' en el texto principal porque el sustantivo no está explícito en el hebreo inmediato.
- source_word: עַל פְּנֵי
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - en preferencia a
  - antes que
  lexicon: HALOT
  rationale: La relación de preferencia o precedencia se expresa de manera breve y natural con 'sobre' en esta construcción legal.
- source_word: בֶן הַשְּׂנוּאָה
  english_pob_choice: the son of the hated wife
  chosen_spanish: el hijo de la aborrecida
  alternatives_spanish:
  - el hijo de la menos amada
  - el hijo de la no amada
  lexicon: HALOT
  rationale: '''Aborrecida'' refleja con fuerza el contraste léxico con ''amada''. Aunque en contexto familiar puede significar ''menos amada'', el texto principal conserva la antítesis fuerte del hebreo; la alternativa más suave se reserva para nota.'
- source_word: הַבְּכֹר
  english_pob_choice: who is the firstborn
  chosen_spanish: que es el primogénito
  alternatives_spanish:
  - el primogénito
  lexicon: HALOT
  rationale: La cláusula relativa identifica al hijo de la aborrecida como el primogénito real. 'Primogénito' es el término natural y fiel en español para el estatus de nacimiento y prioridad legal.
theological_decisions:
- issue: Tensión entre 'amada' y 'aborrecida' en ley familiar
  english_pob_reading: Retain 'loved wife' and 'hated wife' in the main text, with a footnote allowing 'unloved' or 'less loved'
  chosen_spanish_reading: Mantener 'amada' y 'aborrecida' en el texto principal, con nota que permita 'menos amada'
  alternative_spanish_readings:
  - amada / menos amada
  - favorita / no favorita
  - amada / no amada
  rationale: El hebreo usa una oposición fuerte. En español, 'aborrecida' puede sonar más duro que la intención legal comparativa, pero preserva el contraste del texto. La nota recoge la posibilidad contextual de 'menos amada' para no borrar la tensión interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en cuanto a la estructura del período legal: herencia -> hijos -> prohibición de preferir al primogénito. Se evitó el giro más literal ''reparta su herencia a sus hijos'' dentro de un calco rígido, pero se mantuvo el sentido jurídico de adjudicación patrimonial. También se preservó la tensión léxica documentada entre ''amada'' y ''aborrecida'', con nota para la lectura más suave.'
  spanish_consistency_notes:
  - Se usó 'herencia' para el patrimonio distribuido, coherente con el contexto jurídico del pasaje.
  - '''Primogénito'' se mantuvo como término técnico estable para בכור.'
  - Se evitó 'SEÑOR' u otros reemplazos no pertinentes; no hay nombre divino en el versículo.
  - Se mantuvo un registro legal y bíblico sobrio, sin arcaísmos innecesarios.
