id: ROM.9.29
reference: Romans 9:29
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ καθὼς προείρηκεν Ἠσαΐας· Εἰ μὴ κύριος Σαβαὼθ ἐγκατέλιπεν ἡμῖν σπέρμα, ὡς Σόδομα ἂν ἐγενήθημεν καὶ ὡς Γόμορρα ἂν ὡμοιώθημεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/029.yaml
  text: And just as Isaiah said before[a], “If the Lord of Hosts had not left us offspring[c][b], we would have become like Sodom and been made like Gomorrah.”
  footnotes:
  - marker: a
    text: Or “the Lord Sabaoth”; Greek Σαβαώθ transliterates the Hebrew divine title often rendered “of Hosts” or “of Armies.”
    reason: lexical_alternative
  - marker: b
    text: Literally “seed.” Here it refers to surviving offspring or descendants.
    reason: lexical_alternative
  - marker: c
    text: Quotation from Isaiah 1:9.
    reason: cross_reference
translation:
  language: ko
  text: '또한 이사야가 이미 말한 바와 같습니다: 「만군의 야훼께서 우리에게 씨를 남겨두지 않으셨더라면, 우리는 소돔과 같이 되었고 고모라와 같이 되었을 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 1:9 인용. 헬라어 κύριος Σαβαώθ은 히브리어 יהוה צבאות(만군의 야훼)의 직접적 음역+번역이며, 「만군의」(Σαβαώθ)가 보존되어 야훼 호칭이 명시적이므로 본문에서도 「야훼」로 옮긴다.
    reason: cross_reference
lexical_decisions:
- source_word: κύριος Σαβαώθ
  english_pob_choice: the Lord of Hosts
  chosen_korean: 만군의 야훼
  alternatives_korean:
  - 만군의 주
  - 만군의 여호와
  lexicon: BDAG
  rationale: Σαβαώθ가 히브리 צבאות를 음역해 보존하고 있어 야훼 호칭이 명시적이다. 글로서리 정책에 따라 「야훼」로 직접 옮긴다.
theological_decisions:
- issue: LXX의 κύριος Σαβαώθ(만군의 주)을 「만군의 주」로 옮길지 「만군의 야훼」로 옮길지
  chosen_reading: 만군의 야훼
  alternative_readings:
  - 만군의 주
  - 만군의 여호와
  rationale: Σαβαώθ가 히브리어 צבאות를 음역하여 본문에 보존되어 있어 야훼 호칭의 흔적이 명시적이다. 정책에 따라 「야훼」를 본문에 드러내고 이사야 1:9 인용임을 각주로 밝힌다.
  doctrine_reference: 'DOCTRINE.md: 신적 이름; 야훼 정책'
