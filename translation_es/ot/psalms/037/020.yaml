    reason: alternative_reading
  revision_rationale: 'Se elimina «son» para evitar una cópula no necesaria y para conservar mejor la progresión poética del hebreo: comparación seguida de desaparición. La nueva puntuación integra la imagen «como la gloria de los pastos» dentro de la cláusula verbal y mantiene la repetición enfática «se desvanecen … se desvanecen». La nota se conserva sin cambios porque refleja correctamente la alternativa interpretativa documentada.'
