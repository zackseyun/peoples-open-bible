base_translation:
  language: en
  yaml_path: translation/ot/hosea/004/003.yaml
  text: Therefore the land mourns[a], and everyone who dwells in it languishes, along with the beasts of the field and the birds of the heavens[b]; even the fish of the sea are taken away.
  footnotes:
  - marker: a
    text: Or 'the earth mourns.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'land' best fits Hosea's immediate context of judgment on Israel.
    reason: alternative_reading
  - marker: b
    text: Or 'are swept away' or more literally 'are gathered.' The sense is that even the fish are removed under the judgment described.
    reason: lexical_alternative
