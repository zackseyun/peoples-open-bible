revisions:
- from: 'Entonces dirás a ellos[a]: «Esta es la nación que no ha escuchado la voz de Yahvé, su Dios, y no ha aceptado corrección. La fidelidad ha perecido; ha sido cortada de su boca».'
  to: 'Entonces les dirás: «Esta es la nación que no ha escuchado la voz de Yahvé, su Dios, y no ha aceptado corrección. La fidelidad[a] ha perecido; ha sido cortada de su boca».'
  rationale: Se corrigió el anclaje de la nota para que corresponda a אֱמוּנָה, se mejoró la naturalidad de «dirás a ellos» a «les dirás», y se conservaron las decisiones léxicas principales del POB y del hebreo fuente.
  reviewer_model: gpt-5.4
