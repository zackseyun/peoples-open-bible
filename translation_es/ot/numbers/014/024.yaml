  text: וְ/עַבְדִּ֣/י כָלֵ֗ב עֵ֣קֶב הָֽיְתָ֞ה ר֤וּחַ אַחֶ֨רֶת֙ עִמּ֔/וֹ וַ/יְמַלֵּ֖א אַחֲרָ֑/י וַ/הֲבִֽיאֹתִ֗י/ו אֶל הָ/אָ֨רֶץ֙ אֲשֶׁר בָּ֣א שָׁ֔מָּ/ה וְ/זַרְע֖/וֹ יוֹרִשֶֽׁ/נָּה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/014/024.yaml
  text: But my servant Caleb[a], because a different spirit was with him and he followed me fully, I will bring him into the land where he went[c][b], and his offspring will possess it.
  footnotes:
  - marker: a
    text: Or 'another spirit was with him'; possibly referring to a different disposition or attitude from the rest of Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''he filled after me,'' meaning he followed the LORD wholeheartedly or completely.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his offspring will inherit it.'
    reason: lexical_alternative
  ai_draft:
