review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: la nube que daba sombra al campamento, la aparición de tierra seca desde el agua, el camino por el Mar Rojo y la llanura cubierta de hierba desde el oleaje. También conserva correctamente la nota alternativa sobre «Mar de Juncos». Sin embargo, hay un desajuste importante de anclaje de nota: la nota [a] en español está colocada sobre «fue vista», pero su contenido explica «Mar Rojo», por lo que debe moverse al nombre del mar. Además, «del agua que había estado delante de ellos» es entendible pero algo rígido; «del agua que había estado allí» refleja mejor la idea de agua previamente presente y en reposo sin sonar forzado. «De la ola violenta» también estrecha demasiado κλύδωνος βιαίου, que se refiere mejor a oleaje/embate/surgimiento violento que a una sola ola.'
  spanish_quality_summary: 'El español es en general claro y digno, pero necesita una reparación menor para naturalidad y precisión: reubicar la nota al término correcto y pulir dos expresiones. «Cubría» es aceptable para σκιάζουσα, aunque pierde algo de la noción de sombra; no obstante, no requiere cambio obligatorio. «Llanura herbosa» funciona bien en registro bíblico moderno.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Mar Rojo» en texto principal con alternativa «Mar de Juncos» en nota concuerda con la decisión auditada. No aparecen términos sensibles del glosario mayor que exijan intervención adicional.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «fue vista» pero su contenido trata sobre «Mar Rojo».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, el lector entiende erróneamente que la variante afecta «fue vista» en vez de «Mar Rojo».
  - severity: medium
    issue: «Del agua que había estado delante de ellos» suena calcado y menos natural en español.
    rationale: El griego expresa agua previamente presente/estacionaria. «Había estado allí» o «había permanecido allí» conserva el sentido sin rigidez innecesaria.
  - severity: medium
    issue: «De la ola violenta» reduce κλύδωνος βιαίου a una sola ola.
    rationale: κλύδων suele referirse a oleaje, embate o marejada. En español «oleaje violento» o «embate violento» transmite mejor la fuerza turbulenta del original.
  revised_spanish_text: La nube que cubría el campamento fue vista, y del agua que había estado allí surgió tierra seca; del Mar Rojo[a] vino un camino sin impedimento, y del oleaje violento, una llanura herbosa.
  revised_footnotes:
  - marker: a
    text: O «Mar de Juncos». El texto griego aquí lee «Mar Rojo», por lo que esa forma se conserva en el texto principal.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a «Mar Rojo», que es el único lugar donde aplica la alternativa. También se mejora la naturalidad de «del agua que había estado allí» para reflejar mejor el participio griego sin calco, y se ajusta «ola violenta» a «oleaje violento» para representar con más precisión κλύδωνος βιαίου.
