- from: Y cambió sus ropas de prisión y comió pan delante de él continuamente todos los días de su vida.
  to: Y se cambió la ropa de prisión[a] y comió pan delante de él[b] continuamente todos los días de su vida.
  rationale: Se ajusta el primer verbo para expresar con naturalidad española que dejó la ropa de prisión y se preservan en notas las alternativas léxicas y la aclaración contextual ya documentadas en el rastro de auditoría inglés.
