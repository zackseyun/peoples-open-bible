translation:
  language: es
  text: 'No[a], mi señor, escúchame: te doy el campo, y te doy la cueva que está en él. A la vista de los hijos de mi pueblo[b] te la doy[c]. Sepulta a tu muerto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «No así, mi señor; óyeme»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a la vista de los hijos de mi pueblo», es decir, públicamente y ante testigos de su comunidad.'
    reason: cultural_note
  - marker: c
    text: 'O: «y la cueva que está en él, te la doy».'
    reason: previous_rendering
lexical_decisions:
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No así
  - No, señor
  lexicon: HALOT
  rationale: En este contexto לֹא funciona como una negativa cortés dentro de la negociación, no como una negación lógica simple. «No» conserva la respuesta inmediata y natural en español sin forzar un giro arcaico.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Es un tratamiento honorífico dirigido a Abraham. «Mi señor» mantiene la deferencia social del hebreo sin introducir una connotación servil más fuerte que la del contexto.
- source_word: שְׁמָעֵנִי
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - óyeme
  - escúchame, por favor
  lexicon: HALOT
  rationale: El imperativo de שׁמע en discurso directo pide atención. «Escúchame» suena natural en español y conserva la súplica directa.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la tierra
  - el terreno
  lexicon: HALOT
  rationale: שָׂדֶה denota un campo o extensión abierta; en esta transferencia de propiedad, «el campo» es la equivalencia más directa y clara.
- source_word: נָתַתִּי לָךְ / נְתַתִּיהָ
  english_pob_choice: I give you / I give it
  chosen_spanish: te doy / te la doy
  alternatives_spanish:
  - te doy
  - te lo doy
  lexicon: HALOT
  rationale: 'El perfecto hebreo es performativo en habla directa: expresa una acción de transferencia que se realiza al decirla. En español, el presente «te doy» reproduce mejor esa fuerza que un pretérito compuesto.'
- source_word: הַמְּעָרָה אֲשֶׁר בּוֹ
  english_pob_choice: the cave that is in it
  chosen_spanish: la cueva que está en él
  alternatives_spanish:
  - la cueva que hay en él
  - la cueva dentro de él
  lexicon: HALOT
  rationale: La frase especifica la cueva ubicada dentro del campo. «Que está en él» mantiene la relación espacial con naturalidad en español y evita una paráfrasis excesiva.
- source_word: לְעֵינֵי בְנֵי עַמִּי
  english_pob_choice: In the sight of the sons of my people
  chosen_spanish: A la vista de los hijos de mi pueblo
  alternatives_spanish:
  - En presencia de los hijos de mi pueblo
  - Delante de los hijos de mi pueblo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de publicidad y testigos. «A la vista de» preserva bien la imagen del texto y su sentido público. Se conserva «hijos de mi pueblo» por fidelidad al miembro léxico del hebreo.
- source_word: קְבֹר
  english_pob_choice: Bury
  chosen_spanish: Sepulta
  alternatives_spanish:
  - Bury
  - Entierra
  lexicon: HALOT
  rationale: El imperativo final puede expresarse con «sepulta» o «entierra». «Sepulta» es más formal y solemne, adecuado al registro de la escena funeraria, sin perder el mandato directo.
- source_word: מֵתֶךָ
  english_pob_choice: your dead
  chosen_spanish: tu muerto
  alternatives_spanish:
  - tu difunto
  - tu muerto
  lexicon: HALOT
  rationale: El singular hebreo funciona idiomáticamente para el muerto en cuestión. «Tu muerto» es literal y mantiene la referencia concreta sin añadir interpretaciones.
theological_decisions:
- issue: Tratamiento de la propiedad ofrecida como acto performativo
  english_pob_reading: I give you the field... I give it to you
  chosen_spanish_reading: te doy el campo... te la doy
  alternative_spanish_readings:
  - te he dado el campo... te la he dado
  - te concedo el campo... te la concedo
  rationale: El hebreo usa perfectos en discurso directo con valor performativo; la oferta se realiza al pronunciarse. El presente indicativo en español comunica mejor ese acto eficaz que un pasado o un verbo más jurídico que no está exigido por el texto.
  doctrine_reference: Principio de correspondencia semántica y pragmática del discurso bíblico; no implica doctrina particular
- issue: Expresión pública ante testigos
  english_pob_reading: In the sight of the sons of my people
  chosen_spanish_reading: A la vista de los hijos de mi pueblo
  alternative_spanish_readings:
  - En presencia de los hijos de mi pueblo
  - Delante de los hijos de mi pueblo
  rationale: La frase señala publicidad y testigos comunitarios. La traducción conserva la dimensión legal-social sin convertirla en una explicación interpretativa dentro del texto principal, que queda para la nota si se desea.
  doctrine_reference: Trasfondo jurídico-social del relato patriarcal; transparencia textual
- issue: Imperativo funerario final
  english_pob_reading: Bury your dead
  chosen_spanish_reading: Sepulta a tu muerto
  alternative_spanish_readings:
  - Entierra a tu muerto
  - Sepulta a tu difunto
  rationale: Se mantiene la fuerza del mandato y el singular idiomático del hebreo. «Tu muerto» preserva la referencia inmediata al cadáver de Sara sin suavizarla con un eufemismo más interpretativo.
  doctrine_reference: Fidelidad al habla concreta del relato; respeto del valor idiomático del singular
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y el audit trail inglés: conserva el valor performativo de los perfectos, el orden enfático de la cláusula sobre la cueva y el modismo público de «a la vista de los hijos de mi pueblo». También toma en cuenta la revisión inglesa más reciente, que prefirió «the cave that is in it» frente a una reordenación más forzada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto convencional donde el texto no lo pide.
  - «Mi señor» refleja el tratamiento honorífico de אֲדֹנִי sin intensificarlo a «mi amo».
  - «Tu muerto» conserva el singular idiomático del hebreo y el tono sobrio del contexto funerario.
