translation:
  language: es
  text: Pero tú, Dios, los harás descender a la fosa de destrucción[a]; hombres de sangre y engaño no vivirán la mitad de sus días[b], pero yo confiaré en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la fosa de corrupción», «a la fosa del sepulcro» o simplemente «a la fosa».
    reason: lexical_alternative
  - marker: b
    text: Lit. «no partirán en dos sus días»; es decir, su vida será acortada y no llegarán a la mitad de su duración esperada.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרִדֵם
  english_pob_choice: will bring them down
  chosen_spanish: los harás descender
  alternatives_spanish:
  - los harás bajar
  - los harás caer
  lexicon: HALOT
  rationale: 'El hiphil de ירד es causativo: hacer bajar/descender. «Los harás descender» conserva la causalidad y suena natural en español.'
- source_word: לִבְאֵר שַׁחַת
  english_pob_choice: to the pit of destruction
  chosen_spanish: a la fosa de destrucción
  alternatives_spanish:
  - a la fosa de corrupción
  - a la fosa del sepulcro
  - a la fosa
  lexicon: HALOT
  rationale: «בְאֵר» puede ser pozo/fosa, y «שַׁחַת» puede implicar destrucción o corrupción. «Fosa de destrucción» mantiene la imagen de juicio sin convertirla en un término doctrinal técnico.
- source_word: אַנְשֵׁי דָמִים
  english_pob_choice: men of bloodshed
  chosen_spanish: hombres de sangre
  alternatives_spanish:
  - hombres de derramamiento de sangre
  - hombres sanguinarios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hombres de sangres», un modismo para personas violentas y culpables de sangre. «Hombres de sangre» preserva la fuerza idiomática; el contexto ya completa el sentido.
- source_word: וּמִרְמָה
  english_pob_choice: and deceit
  chosen_spanish: y engaño
  alternatives_spanish:
  - y fraude
  - y traición
  lexicon: HALOT
  rationale: «מִרְמָה» suele significar engaño o traición. «Engaño» es una equivalencia clara y amplia en español.
- source_word: לֹא יֶחֱצ֣וּ יְמֵיהֶם
  english_pob_choice: will not live out half their days
  chosen_spanish: no vivirán la mitad de sus días
  alternatives_spanish:
  - no alcanzarán la mitad de sus días
  - no completarán la mitad de sus días
  lexicon: HALOT
  rationale: El verbo implica dividir en dos; la idea idiomática es que sus vidas serán acortadas antes de llegar a su mitad esperada. «No vivirán la mitad de sus días» reproduce esa idea con naturalidad.
- source_word: וַאֲנִי אֶבְטַח בָּךְ
  english_pob_choice: but I will trust in you
  chosen_spanish: pero yo confiaré en ti
  alternatives_spanish:
  - y yo confiaré en ti
  - pero en cuanto a mí, confiaré en ti
  lexicon: HALOT
  rationale: El pronombre es enfático. «Pero yo» conserva el contraste con el destino de los impíos y el énfasis personal del hebreo.
theological_decisions:
- issue: Imagen del juicio en «fosa de destrucción»
  english_pob_reading: Rendered as a vivid image of divine judgment leading to death/destruction, without specifying a later doctrinal concept such as hell.
  chosen_spanish_reading: Se mantiene como imagen vívida de juicio divino que conduce a ruina o muerte, sin precisar un término escatológico técnico.
  alternative_spanish_readings:
  - sepulcro
  - infierno
  - corrupción
  rationale: El hebreo es fuerte pero no define con precisión una noción doctrinal posterior. «Fosa de destrucción» conserva la imagen judicial y evita sobreinterpretación.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota con su marcador en el texto traducido, sin añadir notas sin ancla.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el hebreo usa el nombre divino; aquí el texto dice אֱלֹהִים, por lo que se traduce «Dios».
  - Se mantuvo «confiaré en ti» con el pronombre enfático «yo» para reflejar el contraste del hebreo.
  - Se usó «fosa» para conservar la imagen espacial de בְאֵר sin perder el matiz de juicio/destrucción.
