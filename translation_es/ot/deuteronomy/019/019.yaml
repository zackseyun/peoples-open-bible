review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: la sanción de talión judicial contra el testigo falso y la fórmula deuteronómica de remover el mal de la comunidad. Sin embargo, dos elecciones debilitan la correspondencia con la evidencia fuente y con la auditoría inglesa: ''con él'' cambia el dativo directo ''a él'' / ''para él'' a una construcción menos precisa, y ''había intentado'' sugiere tentativa más que intención o plan, mientras זָמַם aquí se alinea mejor con ''tenía pensado'' o ''intentó/proyectó'' sin implicar comienzo de ejecución.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para sonar más natural y jurídicamente exacto. 'Harán con él' es menos idiomático en este tipo de fórmula que 'harán con él exactamente lo que...' o mejor 'le harán lo mismo que...'. 'Extirparás' es fuerte y posible, pero en esta fórmula deuteronómica 'eliminarás' o 'quitarás' sería más natural; aun así, 'extirparás' no es incorrecto. La principal mejora necesaria es la sintaxis del objeto indirecto/directo y el valor aspectual de la intención.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Hermano' conserva correctamente אָחִיו con nota alternativa. 'El mal' y 'de en medio de ti' son adecuados para הָרָע / מִקִּרְבֶּךָ. La fórmula deuteronómica puede mantenerse con 'extirparás', aunque 'purgarás' sería más cercana al inglés POB; esto no exige adjudicación mayor.
  issues:
  - severity: medium
    issue: '''con él'' para לוֹ'
    rationale: El hebreo usa pronombre dativo 'a él'. En español jurídico-bíblico, 'harán con él' no es imposible, pero desplaza la relación hacia trato general en vez de sanción impuesta a la persona. 'Le harán' refleja mejor el objeto pronominal.
  - severity: medium
    issue: '''había intentado'' para זָמַם'
    rationale: 'זָמַם aquí expresa intención/plan hostil. ''Había intentado'' puede insinuar intento ya emprendido, no solo propósito. ''tenía pensado'' o ''había planeado'' preserva mejor la base judicial: se castiga lo que procuró hacer por falso testimonio.'
  - severity: low
    issue: Correspondencia de número/persona entre cláusulas
    rationale: El hebreo pasa de 2mp ('harán') a 2ms ('extirparás'), un rasgo común en Deuteronomio. El borrador lo conserva. No es error, pero conviene mantener una formulación fluida en español para que el cambio no suene accidental.
  revised_spanish_text: Entonces le harán lo mismo que él tenía pensado hacer a su hermano[a]. Así extirparás el mal de en medio de ti.
  revised_footnotes:
  - marker: a
    text: O “a su prójimo”; el hebreo dice literalmente “a su hermano”, término de comunidad del pacto en este contexto legal.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'לוֹ' a 'le harán' para reflejar mejor el dativo del hebreo en español natural. Se cambia 'había intentado' por 'tenía pensado' para evitar la idea de tentativa ya ejecutada y preservar el valor de intención/plan de זָמַם en este contexto legal. Se mantiene 'a su hermano' con nota, y se conserva 'Así extirparás el mal de en medio de ti' como una formulación aceptable y fuerte de la fórmula deuteronómica.
