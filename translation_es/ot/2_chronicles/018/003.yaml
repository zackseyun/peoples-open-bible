translation:
  language: es
  text: 'Y dijo Acab, rey de Israel, a Josafat, rey de Judá: «¿Irás conmigo a Ramot de Galaad?» Y le dijo: «Yo soy como tú, y mi pueblo como tu pueblo[a], y estoy contigo en la batalla[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit., «como tu pueblo, mi pueblo»; el hebreo es comparativo y también puede expresarse más idiomáticamente: «tu pueblo es mi pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'La frase final es elíptica en hebreo: literalmente, «y contigo en la batalla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתֵלֵךְ עִמִּי
  english_pob_choice: Will you go with me
  chosen_spanish: ¿Irás conmigo?
  alternatives_spanish:
  - ¿Vendrás conmigo?
  - ¿Quieres ir conmigo?
  lexicon: HALOT
  rationale: El hebreo usa el verbo de movimiento הלך con la partícula interrogativa; en español, «ir conmigo» conserva de modo natural la dirección y la invitación/solicitud implícita sin sonar forzado. «Venir» es posible, pero desplaza el punto de vista; «quieres ir» introduce una modalización que no está explícita.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-Galaad
  - Ramot Galaad
  lexicon: HALOT
  rationale: Es un topónimo; se translitera y se adapta la forma tradicional del segundo elemento al español bíblico. «De Galaad» ayuda a reconocer que se trata de un solo lugar sin perder inteligibilidad.
- source_word: כָּמוֹנִי כָמוֹךָ
  english_pob_choice: I am as you are
  chosen_spanish: Yo soy como tú
  alternatives_spanish:
  - Soy como tú
  - Yo soy igual que tú
  lexicon: HALOT
  rationale: La comparación recíproca hebrea se expresa en español con una copulativa clara y natural. «Yo soy como tú» preserva la solidaridad y la correspondencia personal; «igual que tú» es posible, pero suena más interpretativo y menos sobrio.
- source_word: וּכְעַמְּךָ עַמִּי
  english_pob_choice: and my people as your people
  chosen_spanish: y mi pueblo como tu pueblo
  alternatives_spanish:
  - y tu pueblo como mi pueblo
  - y mi pueblo es como tu pueblo
  lexicon: HALOT
  rationale: El hebreo es elíptico y comparativo; en español conviene mantener el orden y la comparación sin convertirlo directamente en una afirmación idiomática invertida. «Mi pueblo como tu pueblo» conserva la estructura y la solidaridad entre ambos reyes.
- source_word: וְעִמְּךָ בַּמִּלְחָמָה
  english_pob_choice: and I am with you in the battle
  chosen_spanish: y contigo en la batalla
  alternatives_spanish:
  - y estaré contigo en la batalla
  - y estoy contigo en la batalla
  lexicon: HALOT
  rationale: La cláusula hebrea es elíptica, sin verbo explícito; en español puede dejarse implícito mediante una frase preposicional natural. «Contigo en la batalla» reproduce la concisión del original; se evita añadir un verbo futuro o copulativo que cierre indebidamente la ambigüedad de la fórmula.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: said ... said
  chosen_spanish: dijo ... respondió
  alternatives_spanish:
  - dijo ... dijo
  - habló ... respondió
  lexicon: HALOT
  rationale: Aunque אמר es literalmente «decir», en español el segundo miembro funciona mejor como «respondió» porque el contexto es una contestación directa al rey Ahab. Esta elección mantiene la economía narrativa y hace explícita la relación dialogal sin alterar el contenido.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y conserva la comparación recíproca, mientras que la respuesta de Josafat se vierte con una equivalencia natural en español. La nota textual sobre la elipsis final se mantiene porque el hebreo no explicita verbo en la última cláusula.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en esta traducción cuando aparezca; aquí no ocurre.
  - Se mantiene «Judá», «Israel», «Galaad» y los nombres propios en forma usual y legible para lectores bíblicos en español.
  - Se evita introducir «Cristo», «SEÑOR» u otras sustituciones no presentes en el hebreo de este versículo.
  - La puntuación reproduce el diálogo directo y la estructura narrativa del hebreo con comillas españolas y dos puntos.
