translation:
  language: es
  text: Ahora Sébaj y Zalmuna estaban en Karkor[a], y su campamento estaba con ellos, unos quince mil, todos los que habían quedado de todo el campamento de los hijos del oriente; y los que habían caído eran ciento veinte mil hombres que desenvainaban espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Carkor»; el hebreo usa el topónimo קַרְקֹר.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶבח וְצַלְמֻנָּע
  english_pob_choice: Now Zebah and Zalmunna
  chosen_spanish: Ahora Sébaj y Zalmuna
  alternatives_spanish:
  - Y Siba y Zalmuna
  - Y Zebah y Zalmunna
  lexicon: WLC / POB proper-name handling
  rationale: Se conserva el arranque narrativo con «Ahora» como marcador discursivo, siguiendo la función del waw inicial. Los nombres propios se transliteran de forma estable en español; «Sébaj» refleja la forma hebrea זֶבַח y evita la sustitución por un equivalente no atestiguado.
- source_word: בַּקַּרְקֹר
  english_pob_choice: in Karkor
  chosen_spanish: en Carkor
  alternatives_spanish:
  - en Karkor
  - en Karkór
  lexicon: HALOT
  rationale: La preposición locativa בְּ se rinde naturalmente con «en». Se mantiene el topónimo como nombre propio; la vocalización española de «Carkor» busca legibilidad sin alterar el referente.
- source_word: וּמַחֲנֵיהֶם עִמָּם
  english_pob_choice: their camp was with them
  chosen_spanish: su campamento estaba con ellos
  alternatives_spanish:
  - su ejército estaba con ellos
  - su campamento estaba junto a ellos
  lexicon: HALOT
  rationale: Se preserva el singular colectivo «campamento», como en la revisión inglesa final. «Estaba con ellos» reproduce עִמָּם sin diluir la relación espacial/acompañante.
- source_word: כַּחֲמֵשֶׁת עָשָׂר אֶלֶף
  english_pob_choice: about fifteen thousand
  chosen_spanish: como quince mil
  alternatives_spanish:
  - aproximadamente quince mil
  - unos quince mil
  lexicon: HALOT
  rationale: El prefijo כ indica aproximación; «como» expresa esa estimación de manera directa y fiel. Se omite «hombres» aquí porque aparece explícitamente más adelante con אִישׁ.
- source_word: כֹּל הַנּוֹתָרִים
  english_pob_choice: all who were left
  chosen_spanish: todos los que habían quedado
  alternatives_spanish:
  - todos los sobrevivientes
  - todos los que restaban
  lexicon: HALOT
  rationale: 'El participio niphal de יתר se rinde con una expresión retrospectiva natural en español: «habían quedado». Así se conserva el sentido de resto/remanente sin introducir una lectura más interpretativa.'
- source_word: מִכֹּל מַחֲנֵה בְנֵי קֶדֶם
  english_pob_choice: of all the camp of the sons of the east
  chosen_spanish: de todo el campamento de los hijos del oriente
  alternatives_spanish:
  - de todo el campamento de los orientales
  - de todo el ejército de los hijos del oriente
  lexicon: HALOT
  rationale: Se mantiene la expresión ethnogeográfica transparente «hijos del oriente», como en la auditoría inglesa, para no borrar la forma hebrea. «Campamento» traduce מַחֲנֶה con un sustantivo colectivo natural en español.
- source_word: וְהַנֹּפְלִים
  english_pob_choice: those who had fallen
  chosen_spanish: y los que habían caído
  alternatives_spanish:
  - y los caídos
  - y los que cayeron
  lexicon: HALOT
  rationale: El participio se vierte con una forma retrospectiva en español. «Habían caído» conserva la referencia a los muertos en combate sin añadir explícitamente una interpretación ajena al texto.
- source_word: שֹׁלֵף חָרֶב
  english_pob_choice: men drawing the sword
  chosen_spanish: hombres que sacaban la espada
  alternatives_spanish:
  - hombres que desenvainaban la espada
  - hombres armados
  lexicon: HALOT
  rationale: 'Se conserva la imagen verbal de שֹׁלֵף con un equivalente idiomático español: «sacar la espada». Esto mantiene el tono bélico y la literalidad funcional del hebreo mejor que «armados».'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió el singular colectivo «campamento» frente a una pluralización y se mantuvo la lectura literal de «drawing the sword» en forma española equivalente. La nota al pie se conserva solo para la alternativa del topónimo, ya que el resto de opciones no requieren nota explícita en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece; este versículo no lo contiene.
  - Se mantiene el estilo narrativo sobrio y cuantitativo del hebreo, sin expandir el texto con explicaciones.
  - «Hijos del oriente» se conserva como expresión transparente y auditable, no como glosa interpretativa.
