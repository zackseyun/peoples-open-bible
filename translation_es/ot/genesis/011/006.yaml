translation:
  language: es
  text: 'Yahvé dijo: «He aquí, son un solo pueblo, y todos tienen una sola lengua, y esto es lo que han comenzado a hacer. Y ahora nada de lo que se propongan hacer les será vedado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no les será imposible nada de lo que se propongan hacer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el equivalente español fijado por el proyecto para el nombre divino, manteniendo la identificación del tetragrámaton sin enmascararlo.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren ustedes
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: El valor deíctico e introductorio se expresa en español con un imperativo natural y digno; 'Miren' conserva la atención dirigida por Yahvé sin sonar arcaico.
- source_word: עַם אֶחָד
  english_pob_choice: one people
  chosen_spanish: un solo pueblo
  alternatives_spanish:
  - una sola nación
  - un pueblo único
  lexicon: HALOT
  rationale: עַם designa un pueblo/grupo humano, no necesariamente una nación política. 'Un solo pueblo' preserva el sentido colectivo.
- source_word: וְשָׂפָה אַחַת לְכֻלָּם
  english_pob_choice: they all have one language
  chosen_spanish: una sola lengua para todos ellos
  alternatives_spanish:
  - y todos tienen una sola lengua
  - y una sola lengua para todos
  lexicon: HALOT
  rationale: שָׂפָה literalmente es 'labio', pero en este contexto significa lengua/idioma. La versión española mantiene el plural colectivo de לְכֻלָּם y evita el calco 'un labio'.
- source_word: וְזֶה הַחִלָּם לַעֲשׂוֹת
  english_pob_choice: this is what they have begun to do
  chosen_spanish: y esto es lo que han comenzado a hacer
  alternatives_spanish:
  - y esto es apenas el comienzo de lo que harán
  - y esto es lo que empezaron a hacer
  lexicon: HALOT
  rationale: El hifil de חלל aquí significa 'comenzar'. 'Han comenzado a hacer' conserva el aspecto iniciado y la referencia a una acción ya puesta en marcha.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Así que ahora
  lexicon: HALOT
  rationale: El adverbio de transición se vuelve un enlace natural en español; el sentido consecutivo queda claro por el contexto.
- source_word: לֹא יִבָּצֵר מֵהֶם
  english_pob_choice: nothing ... will be withheld from them
  chosen_spanish: no les será imposible nada
  alternatives_spanish:
  - nada les será vedado
  - nada será retenido de ellos
  lexicon: HALOT
  rationale: El verbo pasivo de בצר puede expresar 'ser retenido/vedado' o 'ser imposible'. En español, 'no les será imposible nada' comunica bien la fuerza de capacidad y alcance de la afirmación, sin absolutizarla más allá del contexto narrativo.
- source_word: כֹּל אֲשֶׁר יָזְמוּ לַעֲשׂוֹת
  english_pob_choice: nothing that they plan to do
  chosen_spanish: nada de lo que se propongan hacer
  alternatives_spanish:
  - todo lo que planeen hacer
  - nada de cuanto planeen hacer
  lexicon: HALOT
  rationale: יזם implica idear/planear/proponer. 'Se propongan hacer' expresa bien la intención deliberada y mantiene el tono evaluativo del pasaje.
theological_decisions:
- issue: Alcance de la afirmación sobre la capacidad humana unificada
  english_pob_reading: The verse states that unified humanity's planned projects will not be impossible for them in context, without implying absolute omnipotence or endorsing their project.
  chosen_spanish_reading: El versículo afirma que, por su unidad de pueblo y de lengua, nada de lo que se propongan hacer les será imposible en este contexto narrativo, sin convertir esa observación en una aprobación moral ni en una declaración sobre omnipotencia humana.
  alternative_spanish_readings:
  - Nada les será vedado por Dios
  - Todo lo que quieran hacer será posible para ellos
  rationale: 'La traducción mantiene la tensión del pasaje: describe el efecto de la unidad humana sin resolverlo doctrinalmente. No añade un sujeto divino inexistente en el hebreo ni suaviza la advertencia.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: conserva el inicio con la interjección deíctica, traduce el hifil de חלל como acción ya comenzada, y refleja el pasivo de בצר con una formulación española que puede leerse como imposibilidad o como ser impedido/vedado. Se evitó ''SEÑOR'' para Yahvé según la terminología del proyecto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino.
  - '''Pueblo'' se usa para עַם, no ''nación'', por el matiz colectivo del hebreo.'
  - '''Lengua'' traduce שָׂפָה en sentido idiomático de idioma.'
  - Se preserva la ambigüedad de בצר mediante una nota alternativa en lugar de resolverla de manera unilateral.
  - '''Comenzado a hacer'' refleja el aspecto iniciativo de הַחִלָּם.'
