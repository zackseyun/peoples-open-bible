lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי introduce descendientes; en español, «hijos de» conserva ese valor genealógico. El prefijo conjuntivo se vierte con «Y» para mantener la continuidad del listado.
- source_word: יְהַלֶּלְאֵל
  english_pob_choice: Jehallelel
  chosen_spanish: Jehallelel
  alternatives_spanish:
  - Jehaleleel
  lexicon: Transliteración del nombre propio
  rationale: Es un nombre propio y se translitera en vez de traducirse. Se conserva la forma base usada por la POB en inglés, adaptada solo en ortografía española mínima si fuera necesaria, sin alterar la identificación del nombre.
- source_word: זִיף
  english_pob_choice: Ziph
  chosen_spanish: Zif
  alternatives_spanish:
  - Ziph
  lexicon: Transliteración del nombre propio
  rationale: Nombre propio; en español se evita la grafía inglesa con ‘ph’ y se usa ‘f’ para una transliteración más natural y transparente.
- source_word: וְזִיפָה
  english_pob_choice: Ziphah
  chosen_spanish: Zifá
  alternatives_spanish:
  - Zifah
  - Zifah
  lexicon: Transliteración del nombre propio
  rationale: Nombre propio con vocal final larga/acentuada en español para facilitar la lectura y reflejar la terminación abierta del hebreo. Se conserva la identidad del nombre sin introducir interpretación.
- source_word: תִּירְיָא
  english_pob_choice: Tiria
  chosen_spanish: Tiria
  alternatives_spanish:
  - Tiría
  lexicon: Transliteración del nombre propio
  rationale: Nombre propio; la forma breve ‘Tiria’ es clara en español y mantiene la transliteración sin añadir información no presente en el texto.
- source_word: וַאֲשַׂרְאֵל
  english_pob_choice: and Asarel
  chosen_spanish: Asarel
  alternatives_spanish:
  - Asareel
  lexicon: Transliteración del nombre propio
  rationale: Nombre propio; se conserva la forma principal del inglés POB como base de transliteración. La variación ortográfica documentada en inglés se refleja en nota, no en el cuerpo principal.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios sustanciales; la versión española sigue de cerca esa lectura genealógica, sin añadir ni omitir miembros del listado.
  spanish_consistency_notes:
  - Se usa «Y» inicial para reproducir la cadena genealógica continua.
  - Se prefieren transliteraciones estables y legibles en español, evitando grafías inglesas cuando no aportan claridad.
  - La nota sobre Asarel preserva la variante ortográfica documentada en el expediente inglés.
