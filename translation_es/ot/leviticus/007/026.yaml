review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la prohibición de comer sangre y la referencia a las categorías ave/animal. Sin embargo, pierde el enlace inicial וְ ('Y') y la frase 'en ninguna de sus moradas' suena menos natural y menos cercana al hebreo que una formulación como 'en todos sus lugares donde habitan' o 'en ninguna de las moradas de ustedes'. Además, el inglés auditado preserva una nota para la expresión final 'for bird and for animal', y conviene reflejar también esa alternativa en español.
  spanish_quality_summary: El español es claro, pero 'No comerán sangre alguna en ninguna de sus moradas' resulta algo rígido y ligeramente extraño idiomáticamente, porque la prohibición no ocurre 'en' una morada como si fuera locación del acto, sino que indica alcance territorial/jurisdiccional. 'En todos sus lugares donde habitan' o 'en todas sus moradas' suena más natural y mantiene mejor el valor legal distributivo. También conviene conservar la conjunción inicial para la continuidad discursiva.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Sangre', 'ave' y 'animal' son adecuados. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta mejora fidelidad sintáctica y legibilidad sin apartarse de las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: Falta la conjunción inicial 'Y' / 'Y no...'.
    rationale: וְ/כָל enlaza esta ley con la instrucción previa. Aunque en español a veces puede omitirse, aquí el estilo legal secuencial de Levítico admite y favorece conservarla.
  - severity: medium
    issue: '''En ninguna de sus moradas'' es menos natural y menos ajustado al hebreo que una formulación afirmativa distributiva.'
    rationale: בְּכֹל מוֹשְׁבֹתֵיכֶם significa literalmente 'en todos sus lugares de habitación/asentamientos'. La negación ya recae sobre 'comerán'; convertir el complemento en 'ninguna' es posible, pero suena más torpe y cambia innecesariamente la forma de la expresión.
  - severity: low
    issue: Falta una nota para la alternativa más literal de 'para/de ave y de animal'.
    rationale: El audit trail inglés preserva esta alternativa léxica. Mantenerla en español ayuda a transparentar la sintaxis hebrea sin cargar el texto principal.
  revised_spanish_text: Y no comerán sangre alguna en todas sus moradas[a], ni de ave[b] ni de animal.
  revised_footnotes:
