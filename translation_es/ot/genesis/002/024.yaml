review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: conclusión inferencial, principio normativo general, referencia explícita al padre y a la madre, unión con la esposa y resultado de ''una sola carne''. Sin embargo, en וְהָיוּ el inglés auditado decidió explícitamente ''shall become'' por su fuerza resultativa/transicional, mientras que el español ''serán'' atenúa esa transición. Además, ''se unirá'' para וְדָבַק es aceptable pero algo más débil que la adhesión fuerte destacada en la decisión léxica inglesa; puede mantenerse si la nota lo compensa, pero conviene una formulación principal más cercana.'
  spanish_quality_summary: El español es claro, natural y de tono bíblico contemporáneo. No obstante, 'el hombre' suena algo más genérico/clasificatorio que 'un hombre' en un principio proverbial de este tipo, y 'serán una sola carne' pierde parte de la claridad resultativa. Una leve revisión mejora fidelidad y fluidez sin volver el texto rígido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Esposa' y 'una sola carne' están bien. La revisión propuesta conserva el masculino representativo y fortalece la correspondencia con las decisiones auditadas sobre דבק y וְהָיוּ.
  issues:
  - severity: medium
    issue: וְהָיוּ fue vertido como 'serán' en lugar de una forma resultativa más explícita.
    rationale: La auditoría inglesa justificó 'shall become' para mostrar que la pareja llega a ser una unidad. 'Serán' en español puede leerse como estado simple más que como resultado del proceso.
  - severity: low
    issue: '''El hombre'' puede sonar menos natural que ''un hombre'' en un principio general.'
    rationale: El hebreo usa singular representativo. En español proverbial y normativo, 'un hombre' suele sonar más idiomático que 'el hombre' sin perder el valor genérico masculino.
  - severity: low
    issue: '''Se unirá'' es algo más débil que la fuerza adhesiva de וְדָבַק.'
    rationale: Aunque es inteligible y natural, el verbo hebreo connota apego firme. 'Se unirá' puede conservarse con nota, pero una opción como 'se unirá firmemente' o 'se aferrará' sería más fuerte. Dado el registro y la inteligibilidad, basta mantener la nota y mejorar el resto del verso.
  revised_spanish_text: Por tanto, un hombre dejará a su padre y a su madre, y se unirá[a] a su esposa, y llegarán a ser una sola carne[b].
  revised_footnotes:
