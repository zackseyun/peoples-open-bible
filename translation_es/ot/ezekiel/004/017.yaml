translation:
  language: es
  text: para que les falten el pan y el agua, y cada hombre y su hermano se espanten[a], y se consuman en su iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se queden desolados», «se horroricen» o «queden atónitos» para «se espanten». El verbo hebreo puede expresar desolación o el estado de sobresalto producido por ella.
    reason: lexical_alternative
  - marker: b
    text: O «en su culpa» o «en el castigo de su iniquidad». El término hebreo puede denotar iniquidad, culpa o el castigo que resulta de la iniquidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de manera que
  lexicon: HALOT
  rationale: La partícula introduce finalidad o resultado; «para que» es la forma natural en español y conserva el valor telico del hebreo sin sobrerrepresentarlo.
- source_word: יַחְסְרוּ
  english_pob_choice: they may lack
  chosen_spanish: les falten
  alternatives_spanish:
  - estén necesitados de
  - carezcan de
  lexicon: HALOT
  rationale: El verbo חסר expresa carencia. «Les falten» mantiene el sentido de privación y suena idiomático en español, conservando el matiz potencial/resultativo del imperfecto.
- source_word: לֶחֶם וָמָיִם
  english_pob_choice: bread and water
  chosen_spanish: el pan y el agua
  alternatives_spanish:
  - pan y agua
  - alimento y agua
  lexicon: HALOT
  rationale: Se conserva la pareja concreta del hebreo. «Pan y agua» sería más literal, pero el artículo definido mejora la fluidez en español sin cambiar el referente básico de sustento mínimo.
- source_word: וְנָשַׁמּוּ
  english_pob_choice: may be appalled
  chosen_spanish: se espanten
  alternatives_spanish:
  - se queden asombrados
  - queden desolados
  - se horroricen
  lexicon: HALOT
  rationale: El verbo נָשַׁם/שמם en nifal puede expresar desolación, estupor o consternación. «Se espanten» conserva el impacto subjetivo de quedar sobrecogidos, sin cerrar indebidamente la ambigüedad entre desolación y sobresalto.
- source_word: אִישׁ וְאָחִיו
  english_pob_choice: each man and his brother
  chosen_spanish: cada hombre y su hermano
  alternatives_spanish:
  - cada uno y su hermano
  - cada hombre y su compañero
  lexicon: HALOT
  rationale: Se mantiene la construcción distributiva y la referencia masculina representativa del hebreo. «Hermano» se conserva porque es el equivalente léxico más preciso frente a alternativas como «compañero».
- source_word: וְנָמַקּוּ
  english_pob_choice: and waste away
  chosen_spanish: se consuman
  alternatives_spanish:
  - se pudran
  - se desvanezcan
  - se marchiten
  lexicon: HALOT
  rationale: מָקַק sugiere deshacerse, consumirse o pudrirse. «Se consuman» comunica el proceso de deterioro sin añadir una imagen demasiado corporal o extraña para el lector moderno.
- source_word: בַּעֲוֺנָם
  english_pob_choice: in their iniquity
  chosen_spanish: por causa de su iniquidad
  alternatives_spanish:
  - en su iniquidad
  - por su culpa
  - a causa de su pecado
  lexicon: HALOT
  rationale: El término עָוֹן puede abarcar iniquidad, culpa o el castigo derivado de ella. La preposición «por causa de» explicita la relación causal implícita en el contexto de juicio, mientras «iniquidad» preserva la carga moral del vocablo hebreo.
theological_decisions:
- issue: Ambigüedad semántica de עָוֹן
  english_pob_reading: in their iniquity
  chosen_spanish_reading: por causa de su iniquidad
  alternative_spanish_readings:
  - en su iniquidad
  - por su culpa
  - por el castigo de su iniquidad
  rationale: 'El hebreo permite sentidos relacionados: iniquidad, culpa o castigo por la iniquidad. La formulación elegida conserva el término moral y hace explícita la relación de juicio sin resolver de manera unilateral la tensión semántica del original.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Lenguaje representativo masculino en אִישׁ וְאָחִיו
  english_pob_reading: each man and his brother
  chosen_spanish_reading: cada hombre y su hermano
  alternative_spanish_readings:
  - cada persona y su hermano
  - cada uno y su hermano
  rationale: El hebreo usa sustantivos masculinos con valor distributivo. Se conserva la forma representativa masculina por fidelidad al texto y porque «hermano» es más exacto que una neutralización como «compañero» o «persona».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El pasaje presenta acuerdo sustancial con el audit trail inglés y no requiere revisión adicional; se preservó la tensión léxica principal en וְנָשַׁמּוּ y בַּעֲוֺנָם sin resolverla de forma reductiva.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se evitó traducir mecánicamente desde el inglés en los puntos de ambigüedad: el resultado se apoyó en el hebreo, especialmente en נָשַׁם/שמם y עָוֹן.'
  - La combinación «les falten el pan y el agua» conserva el paralelismo concreto del sustento básico.
  - Los marcadores de nota aparecen exactamente en las palabras o frases pertinentes del texto, y no se reutilizan.
