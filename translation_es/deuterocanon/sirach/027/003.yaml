  rationale: Se cambió «al temor del Señor» por «en el temor del Señor» para reflejar con mayor fidelidad ἐν φόβῳ Κυρίου y mejorar la naturalidad bíblica en español. También se sustituyó «se aferra» por «se mantiene firme» para evitar la construcción menos idiomática «aferrarse al temor» y expresar claramente la perseverancia implícita en κρατήσῃ. La nota se ajustó para preservar mejor la amplitud semántica de οἶκος sin introducir una alternativa española menos precisa.
