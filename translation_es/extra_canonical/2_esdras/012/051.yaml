translation:
  language: es
  text: Pero yo estuve sentado en el campo siete días, como él me mandó, y comí solo las flores del campo; en aquellos días mi alimento se hacía de hierbas.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Ego autem sedi
  english_pob_choice: But I sat
  chosen_spanish: Pero yo me senté
  alternatives_spanish:
  - Pero estuve sentado
  - Mas yo me senté
  lexicon: Latin sedeo
  rationale: Mantiene el sentido de permanencia/ubicación física de sedeo en este contexto narrativo, con un español natural y sobrio. Se conserva el énfasis del sujeto con yo, que ayuda a reflejar el contraste inicial de autem.
- source_word: in campo vii diebus
  english_pob_choice: in the field seven days
  chosen_spanish: en el campo siete días
  alternatives_spanish:
  - por siete días en el campo
  - en el campo durante siete días
  lexicon: Latin campus
  rationale: ‘Campo’ reproduce de forma directa campus. El orden es natural en español y conserva la duración exacta de siete días.
- source_word: sicut mihi mandauit
  english_pob_choice: as he commanded me
  chosen_spanish: como él me mandó
  alternatives_spanish:
  - como me mandó
  - según me mandó
  lexicon: Latin mandare
  rationale: ‘Mandó’ expresa el mandato con fuerza suficiente y es más idiomático que una calca como ‘ordenó’, sin perder el contenido de obediencia. Se mantiene el pronombre él porque el antecedente está implícito en el contexto.
- source_word: manducabam de floribus solummodo agri
  english_pob_choice: and I ate only the flowers of the field
  chosen_spanish: y comí solo las flores del campo
  alternatives_spanish:
  - y comía solo las flores del campo
  - y comí solamente las flores del campo
  lexicon: Latin manducare; floribus
  rationale: ‘Comí’ da un pasado narrativo claro y fluido; ‘solo’ preserva solummodo. ‘Flores del campo’ sigue de cerca el sintagma latino de floribus agri sin añadir interpretación.
- source_word: de herbis facta est mihi esca
  english_pob_choice: my food was made from herbs
  chosen_spanish: mi alimento fue hecho de hierbas
  alternatives_spanish:
  - mi comida fue hecha de hierbas
  - de hierbas fue hecho mi alimento
  lexicon: Latin esca; herbae; facta est
  rationale: Se conserva la pasiva latina facta est. ‘Alimento’ corresponde bien a esca en registro sobrio y evita el posible matiz más coloquial de ‘comida’. ‘Fue hecho de hierbas’ refleja con transparencia la construcción original, aun si resulta ligeramente marcada en español.
theological_decisions:
- issue: Descripción de la provisión alimentaria como ‘fue hecho de hierbas’
  english_pob_reading: my food was made from herbs
  chosen_spanish_reading: mi alimento fue hecho de hierbas
  alternative_spanish_readings:
  - mi alimento se hizo de hierbas
  - mi alimento consistía en hierbas
  rationale: La frase latina usa una pasiva concreta; mantenerla en español respeta la forma del testimonio y evita suavizarla en una paráfrasis más interpretativa. No hay carga doctrinal adicional, pero sí un valor de fidelidad formal al estado de la provisión.
  doctrine_reference: Ninguna; decisión de forma y fidelidad sintáctica.
translation_notes:
  revision_awareness: 'El texto inglés revisado movió la locución final para sonar más natural sin cambiar el sentido; en español se siguió el mismo principio, manteniendo la pasiva latina y el orden final más fluido: ‘en aquellos días mi alimento fue hecho de hierbas’.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ no aplica aquí; no hay nombres divinos en el versículo.
  - Se conserva el pasado narrativo simple para mantener la progresión de la escena.
  - '‘Hierbas’ y ‘flores del campo’ se distinguen explícitamente para reflejar los dos sustantivos latinos distintos: flores y herbae.'
  - No se introduce terminología eclesiástica ajena al texto.
