translation:
  language: es
  text: Porque yo soy Yahvé, tu Dios, el Santo de Israel, tu Salvador; he dado Egipto como tu rescate, Cus[b] y Seba en lugar de ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a cambio de ti». La expresión hebrea al final del versículo comunica sustitución o intercambio.
    reason: lexical_alternative
  - marker: b
    text: Cus es la región antigua al sur de Egipto, a menudo asociada con Nubia o Etiopía.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según el criterio del proyecto. En español, "Yahvé" mantiene el valor pactual del tetragrámaton sin ocultarlo bajo una sustitución convencional.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  - tu divinidad
  lexicon: HALOT
  rationale: La construcción posesiva directa es la forma natural en español y refleja el sufijo de segunda persona masculina singular.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - Israel's Holy One
  lexicon: HALOT
  rationale: Se conserva el título isaiano fijo en una forma idiomática y reverente. "Santo" comunica el sustantivo titular sin forzar una paráfrasis.
- source_word: מוֹשִׁיעֶךָ
  english_pob_choice: your Savior
  chosen_spanish: tu Salvador
  alternatives_spanish:
  - el que te salva
  - tu libertador
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva; "Salvador" preserva la fuerza titular y la relación personal del sufijo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, "Porque" expresa con claridad la conexión explicativa.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - di
  - he puesto
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte bien con perfecto compuesto para expresar una acción divina ya realizada con vigencia en el contexto profético.
- source_word: כָפְרְךָ
  english_pob_choice: your ransom
  chosen_spanish: tu rescate
  alternatives_spanish:
  - tu precio de rescate
  - tu precio de expiación
  - tu redención
  lexicon: HALOT
  rationale: En este contexto el sustantivo denota una compensación sustitutiva; "rescate" conserva la idea de precio dado por otro sin cargar indebidamente un matiz cultual específico.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Misraim
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español bíblico.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se translitera al uso bíblico español como "Cus", evitando una identificación moderna excesiva y manteniendo la referencia antigua.
- source_word: סְבָא
  english_pob_choice: Seba
  chosen_spanish: Seba
  alternatives_spanish:
  - Saba
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la forma española ya reconocible.
- source_word: תַּחְתֶּיךָ
  english_pob_choice: in exchange for you
  chosen_spanish: en lugar de ti
  alternatives_spanish:
  - a cambio de ti
  - en intercambio por ti
  lexicon: HALOT
  rationale: La preposición expresa sustitución/intercambio. "En lugar de ti" reproduce con naturalidad esa relación en español, aunque "a cambio de ti" podría explicitar el intercambio.
theological_decisions:
- issue: Lenguaje de sustitución/exchange aplicado a Egipto, Cus y Seba
  english_pob_reading: The verse speaks of nations given over by God as the price or exchange for Israel's preservation, without specifying a later doctrinal theory of atonement.
  chosen_spanish_reading: El versículo expresa que otras naciones fueron dadas como rescate o en lugar de Israel, sin desarrollar una teoría doctrinal posterior de expiación.
  alternative_spanish_readings:
  - Las naciones fueron dadas como compensación política por Israel.
  - El texto alude solo a una liberación nacional, sin matiz de rescate.
  rationale: Conviene preservar la fuerza de trueque/sustitución del hebreo sin imponer categorías sistemáticas ajenas al pasaje. "Rescate" y "en lugar de ti" mantienen esa tensión semántica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin cambios respecto al pasaje fuente revisado; conserva la tensión lexical de כפר/תחת con una solución española natural y auditable.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el nombre divino conforme al estándar del proyecto.
  - Se usa "Cus" para כּוּשׁ, en línea con transliteración bíblica española y evitando anacronismos geopolíticos.
  - '"Rescate" se eligió para כָפְרְךָ por su fuerza sustitutiva; la nota a aclara la alternativa "en lugar de ti".'
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin perder la estructura explicativa del hebreo.
