translation:
  language: es
  text: ¿No destruiré, en aquel día, declara Yahvé, a los sabios de Edom, y el entendimiento del monte de Esaú?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del monte Esaú» o «de la región montañosa de Esaú». El hebreo dice literalmente «del monte de Esaú».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Will I not
  chosen_spanish: ¿No será... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No... ?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con expectativa afirmativa. En español, «¿No será...?» conserva bien ese valor interrogativo sin convertirlo en una simple aseveración.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es la expresión temporal profética estándar. «En aquel día» es natural en español bíblico y mantiene la deixis solemne del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם marca una declaración divina. En español, «dice Yahvé» conserva la fuerza oracular de manera idiomática y fiel; se mantiene «Yahvé» por el nombre divino, no un sustituto titular.
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - haré perecer
  - aniquilaré
  lexicon: HALOT
  rationale: El causativo expresa la acción activa de Yahvé sobre Edom. «Destruiré» reproduce la fuerza del verbo sin sobreexplicar ni suavizar el juicio.
- source_word: חֲכָמִים
  english_pob_choice: the wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios varones
  lexicon: HALOT
  rationale: El sustantivo masculino plural puede referirse a la clase de sabios de Edom. «Los sabios» suena más natural en español que «los hombres sabios», pero conserva la categoría masculina sin neutralizarla artificialmente.
- source_word: מֵאֱדוֹם
  english_pob_choice: from Edom
  chosen_spanish: de Edom
  alternatives_spanish:
  - desde Edom
  - fuera de Edom
  lexicon: HALOT
  rationale: La preposición indica procedencia o extracción. «De Edom» es la forma más directa y clara en español.
- source_word: וּתְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: la inteligencia
  alternatives_spanish:
  - el entendimiento
  - el discernimiento
  lexicon: HALOT
  rationale: El término puede abarcar comprensión, discernimiento o inteligencia. Aquí, «inteligencia» mantiene el paralelismo con «sabios» y comunica bien la pérdida de capacidad de discernir.
- source_word: מֵהַר עֵשָׂו
  english_pob_choice: from the mountain of Esau
  chosen_spanish: del monte de Esaú
  alternatives_spanish:
  - de la montaña de Esaú
  - de la región montañosa de Esaú
  lexicon: HALOT
  rationale: El hebreo dice literalmente «del monte de Esaú». En español, «monte» preserva el paralelismo y la imagen geográfica, a la vez que suena natural; se conserva «Esaú» como nombre propio del ancestro asociado con Edom.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragramatón de forma explícita. La lectura española sigue el criterio del proyecto de preservar el nombre propio divino como «Yahvé», evitando la sustitución titular «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza retórica de la pregunta inicial
  english_pob_reading: Will I not
  chosen_spanish_reading: ¿No será... ?
  alternative_spanish_readings:
  - ¿Acaso no... ?
  - ¿No... ?
  rationale: La frase funciona como pregunta retórica orientada a un sí implícito. El español escogido conserva esa expectativa y evita volverla una afirmación plana.
  doctrine_reference: HALOT; rhetorical question force in Hebrew syntax
- issue: Expresión de תְבוּנָה
  english_pob_reading: understanding
  chosen_spanish_reading: la inteligencia
  alternative_spanish_readings:
  - el entendimiento
  - el discernimiento
  rationale: El término puede abarcar una capacidad mental y de juicio práctico. En este contexto de destrucción de la sabiduría edomita, «inteligencia» expresa bien la pérdida del recurso humano de discernimiento, sin forzar una lectura espiritualizada.
  doctrine_reference: HALOT; semantic field of תְבוּנָה
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; el borrador español sigue el acuerdo alto del control cruzado y conserva la misma decisión principal sobre el nombre divino, la pregunta retórica y el paralelismo semántico entre «sabios» e «inteligencia».
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto.
  - «Sabios» conserva el masculino plural del hebreo sin neutralización innecesaria.
  - «Monte de Esaú» mantiene la imagen del original y se señala la alternativa geográfica en nota.
  - La puntuación refleja una pregunta retórica completa con cita profética interna.
