translation:
  language: es
  text: Porque así como ahora los vecinos de Sión han visto su cautiverio[a], así pronto verán la salvación[b] de parte de su Dios, que vendrá sobre ustedes con gran gloria y el esplendor del Eterno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cautividad' para αἰχμαλωσίαν. 'Cautiverio' destaca mejor en español la condición concreta de haber sido hecho preso o llevado por enemigos; 'cautividad' también es posible.
    reason: lexical_alternative
  - marker: b
    text: O 'liberación' para σωτηρίαν. El griego σωτηρία puede significar rescate o liberación además de salvación; aquí se mantiene 'salvación' por su peso bíblico.
    reason: lexical_alternative
  - marker: c
    text: O 'el que es eterno' para τοῦ αἰωνίου. El griego tiene un adjetivo sustantivado que funciona como designación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πάροικοι Σειὼν
  english_pob_choice: the neighbors of Zion
  chosen_spanish: los vecinos de Sión
  alternatives_spanish:
  - los habitantes alrededor de Sión
  - los que habitan cerca de Sión
  - los extranjeros que residen cerca de Sión
  lexicon: LSJ
  rationale: πάροικοι puede denotar personas que viven cerca o al lado, a veces con matiz de residentes no plenamente integrados. En este contexto apunta a quienes observan la situación de Sión desde alrededor; 'vecinos' comunica esa cercanía de forma natural en español sin sobreespecificar un estatus legal o étnico que el griego no exige aquí.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - exilio
  - ser llevados cautivos
  lexicon: LSJ
  rationale: El sustantivo expresa el estado de haber sido hecho preso o llevado por enemigos. 'Cautiverio' conserva mejor en español la fuerza concreta de esa condición que 'exilio', que puede sonar más amplio o político, y mantiene una equivalencia cercana a 'captivity'.
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - en breve
  - rápidamente
  - antes de mucho
  lexicon: LSJ
  rationale: La expresión idiomática significa en poco tiempo o sin demora. 'Pronto' es la solución más natural y directa en español para un anuncio futuro de cercanía temporal.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: LSJ
  rationale: Aunque el contexto inmediato es la restauración nacional, el griego admite el peso teológico de un acto salvador de Dios. 'Salvación' preserva ese alcance bíblico y coincide con la decisión inglesa de mantener la resonancia teológica principal.
- source_word: παρὰ τοῦ θεοῦ ὑμῶν
  english_pob_choice: from your God
  chosen_spanish: de parte de tu Dios
  alternatives_spanish:
  - de tu Dios
  - procedente de tu Dios
  - desde tu Dios
  lexicon: LSJ
  rationale: παρά con genitivo señala origen o procedencia. 'De parte de' comunica con claridad esa procedencia y mantiene un registro reverente sin añadir una posesión que el griego no enfatiza de manera explícita.
- source_word: ἐπελεύσεται ὑμῖν
  english_pob_choice: will come upon you
  chosen_spanish: vendrá sobre ti
  alternatives_spanish:
  - vendrá a ti
  - te sobrevendrá
  - caerá sobre ti
  lexicon: LSJ
  rationale: El verbo puede expresar llegada o irrupción hacia alguien. 'Vendrá sobre ti' conserva el movimiento descendente o envolvente del griego y funciona bien en español profético; se evita 'caerá' por ser demasiado fuerte y 'vendrá a ti' por ser menos expresivo del matiz.
- source_word: μετὰ δόξης μεγάλης
  english_pob_choice: with great glory
  chosen_spanish: con gran gloria
  alternatives_spanish:
  - con mucha gloria
  - con gloriosa grandeza
  - con gran honor
  lexicon: LSJ
  rationale: δόξα en contextos bíblicos tiene el peso de 'gloria'. 'Con gran gloria' reproduce el paralelismo y el tono elevado del texto original.
- source_word: λαμπρότητος
  english_pob_choice: the splendor
  chosen_spanish: el esplendor
  alternatives_spanish:
  - la brillantez
  - la resplandecencia
  - el brillo
  lexicon: LSJ
  rationale: λαμπρότης denota brillo, resplandor o esplendor. 'Esplendor' es una equivalencia digna y estilísticamente cercana a 'splendor', además de complementar naturalmente 'gloria' sin redundancia excesiva.
- source_word: τοῦ αἰωνίου
  english_pob_choice: the Eternal
  chosen_spanish: el Eterno
  alternatives_spanish:
  - el Eterno Uno
  - el sempiterno
  - el eterno Dios
  lexicon: LSJ
  rationale: El adjetivo sustantivado funciona como designación divina. 'El Eterno' conserva el valor titular sin introducir un sustantivo ausente en el griego; en español mantiene el tono reverente y la concisión de la decisión inglesa.
theological_decisions:
- issue: σωτηρία en un contexto de restauración nacional
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: El marco inmediato es el retorno/restablecimiento tras la cautividad, pero el término griego conserva una amplitud salvadora que no conviene reducir. 'Salvación' mantiene la densidad teológica y sigue la línea del POB inglés, mientras que 'liberación' o 'rescate' estrechan el sentido a una intervención meramente política o militar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: τοῦ αἰωνίου como título divino
  english_pob_reading: the Eternal
  chosen_spanish_reading: el Eterno
  alternative_spanish_readings:
  - el Eterno Uno
  - el Dios eterno
  rationale: El griego usa un adjetivo con artículo como sustantivo, lo que puede funcionar como designación divina. Traducirlo como 'el Eterno' preserva esa fuerza titular sin añadir explícitamente 'Dios', que no aparece en la construcción griega final. La solución española también evita perder el eco reverente del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que reemplazó una posesión implícita por 'the salvation from your God' para ajustarse mejor al griego y unió el relativo directamente a 'salvation'. En español se refleja eso con 'la salvación de parte de tu Dios, que vendrá sobre ti...', evitando 'tu salvación' y manteniendo la relación directa entre la salvación y su venida.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto solo cuando el texto lo exige; aquí el griego dice τοῦ θεοῦ ὑμῶν y, por tanto, se traduce 'tu Dios'.
  - '''Sión'' se mantiene como topónimo bíblico estándar con tilde conforme al uso español.'
  - Se usó 'el Eterno' como término titular, coherente con la decisión inglesa y con el registro reverente del pasaje.
  - Se evitó 'Mesías' y otras sustituciones no presentes en el versículo.
  - La puntuación reproduce una estructura de paralelismo clara y publicable en español, sin añadir contenido interpretativo no respaldado por el griego.
