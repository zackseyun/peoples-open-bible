    rationale: El griego permite ambas en teoría, pero en español el orden adjetival prenominal aquí suena más natural y mantiene el sentido de λαοὺς μεγάλους como plural étnico-político.
  - severity: low
    issue: La nota «O “sin pecado”» puede mantenerse, pero debe anclarse a la frase revisada
    rationale: Sigue siendo una alternativa útil y natural en español, siempre que el texto principal preserve la opción léxicamente más cercana a καθαρός.
