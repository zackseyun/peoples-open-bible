review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: el rey se levanta temprano, pone en marcha el campamento, avanza por la ruta hacia Bet-zacarías, las fuerzas se ordenan para la batalla y suenan las trompetas. Sin embargo, los anclajes de las notas están colocados en palabras equivocadas: [a] debe marcar la frase de ruta (κατὰ τὴν ὁδὸν Βεθζαχαριά), no «campamento»; y [b] debe marcar la expresión de impulso/fuerza (ἐν ὁρμήματι αὐτῆς), no «campamento» tampoco. Además, «por la mañana» después de «temprano» resulta algo redundante en español.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y precisión. «Se levantó temprano» basta para ὤρθρισεν; «temprano por la mañana» suena repetitivo. «Sacó el campamento» es comprensible, pero «puso en marcha el campamento» expresa mejor el movimiento ordenado del ejército en español neutro. El resto del versículo fluye bien.
  glossary_alignment: No hay términos teológicos sensibles aquí. La transliteración «Bet-zacarías» es aceptable y coherente. Las decisiones léxicas principales siguen razonablemente el expediente inglés, con la salvedad de mejorar la expresión militar de ἀπῆρεν τὴν παρεμβολὴν y de recolocar correctamente las notas.
  issues:
  - severity: high
    issue: Marcadores de notas mal anclados en el texto
    rationale: La nota [a] explica la frase de ruta («por la ruta/camino de Bet-zacarías»), pero en el borrador está anclada a «campamento». La nota [b] explica «con todo su ímpetu», y debe anclarse allí. Esto rompe la correspondencia exigida entre nota y palabra/frase relevante.
  - severity: medium
    issue: «Temprano por la mañana» es redundante
    rationale: ὤρθρισεν τὸ πρωί intensifica la idea de madrugar, pero en español «se levantó temprano» ya lo comunica con naturalidad. La doble expresión suena pesada.
  - severity: medium
    issue: «Sacó el campamento» no es la mejor formulación militar
    rationale: Aunque entendible, en español suena menos idiomático para un desplazamiento militar organizado. «Puso en marcha el campamento» o «levantó el campamento» representan mejor ἀπῆρεν τὴν παρεμβολὴν sin perder claridad.
  revised_spanish_text: Y el rey se levantó temprano, y puso en marcha el campamento con todo su ímpetu[a] por el camino de Bet-zacarías[b], y las fuerzas se dispusieron para la batalla, y tocaron las trompetas.
  revised_footnotes:
  - marker: a
    text: O «con todo su empuje / impulso». La frase traducida «con todo su ímpetu» refleja el sentido militar de ὁρμήμα.
    reason: lexical_alternative
  - marker: b
    text: O «por la ruta hacia Bet-zacarías». La expresión griega puede indicar el movimiento por la ruta que lleva allí.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que coincidan con las frases que explican, se mejora la naturalidad de la apertura eliminando una redundancia temporal, y se sustituye «sacó el campamento» por una formulación militar más idiomática en español sin alterar el sentido fuente.
