id: 3MA.3.9
reference: 3 Maccabees 3:9
source:
  edition: lxx-swete-1909
  text: μὴ γὰρ οὕτω παροραθήσεσθαι τηλικοῦτο σύστημα μηδὲν ἠγνοηκός.
  language: Greek
