    issue: Expresión 'se le hace prestar juramento'
    rationale: Aunque transmite el sentido general, en español suena más burocrática que bíblica y no es la forma más natural de expresar el causativo de 'hacer jurar'. Una redacción más fluida preserva mejor fidelidad y legibilidad.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: '''Si el juramento se quebranta'' es correcto, pero la nota puede afinarse mínimamente para sonar más natural en español sin cambiar el contenido.'
