translation:
  text: '1[a]. The last ruler of that time will be left alive, when the multitude of his hosts has been struck down by the sword; and he will be bound, and they will bring him up to Mount Zion. And my Messiah will convict him of all his impieties[b], and will set before him all the wicked deeds of his hosts.


    2. And afterward he will put him to death, and he will protect the rest of my people, those who are found in the place that I have chosen.


    3. And his dominion will stand forever, until the world of corruption comes to its end, and until the times spoken of before are fulfilled.


    4. This is the vision[c], and this is its interpretation.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ceriani page is textually rough here and overlaps quickly into the next chapter. 'The place that I have chosen' follows the control tradition rather than forcing false precision from the damaged line.
    reason: textual_variant
    anchor_ref: '40:2'
  - marker: b
    text: '''The world of corruption'' could also be rendered ''the corruptible world.'' I kept the more concrete apocalyptic wording.'
    reason: lexical_alternative
    anchor_ref: '40:3'
  - marker: c
    text: Or 'This is your vision'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܒܝܫܘܬܗ
  chosen: impieties
  alternatives:
  - wickedness
  - ungodliness
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: I used 'impieties' in the accusation scene because the offense is not merely political evil but wickedness against God exposed by the Messiah on Zion.
- source_word: ܥܒ̈ܕܝܗܘܢ ܕܒܝܫܘܬܗܘܢ
  chosen: the wicked deeds of his hosts
  alternatives:
  - the works of his hosts
  - their evil deeds
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The visible Syriac preserves the language of deeds and wickedness. 'Wicked deeds of his hosts' keeps both the moral charge and the corporate scope.
- source_word: ܫܪܪܐ / ܫܘܠܛܢܐ sense
  chosen: dominion
  alternatives:
  - rule
  - reign
  - principate
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The line speaks of the Messiah's continuing royal authority. 'Dominion' preserves that political-apocalyptic sense without sounding overly technical.
- source_word: ܥܠܡܐ ܕܚܒܠܐ / corruptible-world sense
  chosen: the world of corruption
  alternatives:
  - the corruptible world
  - the perishing world
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: This wording preserves the apocalyptic contrast between the present ruined order and the age beyond it, without flattening the phrase into generic 'world.'
- source_word: ܛܘܪ ܨܗܝܘܢ
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The proper-name form is the most natural English rendering and preserves the scene of messianic judgment.
