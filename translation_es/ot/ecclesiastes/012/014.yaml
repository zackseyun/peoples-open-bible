review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: causal inicial, universalidad de las obras, juicio divino, inclusión de lo oculto y rango moral total. Sin embargo, «toda obra» es menos fiel al rastro léxico inglés («every deed») y en español suena algo amplio/impersonal; «todo acto» o «toda acción» expresa mejor el matiz de evaluación moral. Además, «traerá ... a juicio» es comprensible, pero «llevará ... a juicio» suena más natural en español jurídico.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión. «Junto con toda cosa oculta» es aceptable, aunque «cosa» resulta algo tosco; «lo oculto» o «toda cosa oculta» ambos sirven, pero conviene mantener la alternativa documentada. La frase final concuerda bien con un antecedente femenino, pero si se revisa «obra» a «acto», la concordancia debe pasar a masculino.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: הָאֱלֹהִים se traduce correctamente como «Dios». No aparecen términos sensibles como Yahvé, Mesías, espíritu, carne, etc. La principal cuestión léxica es מַעֲשֶׂה, donde el borrador usa «obra» pese a que el POB auditó «deed» por su fuerza moral; en español conviene acercarse más con «acto».'
  issues:
  - severity: medium
    issue: «toda obra» debilita el matiz moral de מַעֲשֶׂה en este contexto de juicio
    rationale: El rastro inglés justificó «every deed» sobre «work» precisamente por la evaluación moral. En español, «obra» puede sonar demasiado amplia o neutra; «acto» comunica mejor la idea distributiva y ética.
  - severity: low
    issue: «traerá ... a juicio» es menos idiomático que «llevará ... a juicio»
    rationale: Aunque no es incorrecto, en español jurídico y bíblico moderno «llevar a juicio» suena más natural para introducir actos ante evaluación judicial.
  - severity: low
    issue: La concordancia final depende de «obra»
    rationale: Si se adopta una opción léxicamente más fiel como «acto», debe ajustarse «sea bueno o malo» para mantener buena lectura española.
  revised_spanish_text: Porque Dios llevará todo acto a juicio[a], junto con toda cosa oculta, sea bueno o malo.
  revised_footnotes:
  - marker: a
    text: 'O: «incluyendo toda cosa oculta» o «respecto de toda cosa oculta».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «toda obra» a «todo acto» para reflejar mejor el matiz moral de מַעֲשֶׂה en contexto de juicio, en línea con la decisión inglesa «every deed». También se cambia «traerá» por «llevará» por mayor naturalidad en español con «a juicio». Se mantiene «junto con toda cosa oculta» y la nota alternativa, que preservan bien la amplitud semántica de עַל כָּל נֶעְלָם sin sobreinterpretarla.
