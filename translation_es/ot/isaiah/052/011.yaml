translation:
  language: es
  text: Apártense[a], apártense; salgan de allí. No toquen nada inmundo. Salgan de en medio de ella[b]; purifíquense[c], ustedes que llevan las vasijas de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «partan, partan». La repetición del imperativo intensifica el llamado a separarse.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de en medio de ella», probablemente una referencia femenina a la ciudad.'
    reason: lexical_alternative
  - marker: c
    text: O «estén limpios».
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  english_pob_choice: Turn away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Aléjate
  - Retírense
  - Apartaos
  lexicon: HALOT
  rationale: El imperativo plural de סור pide separación activa. «Apártate» comunica mejor en español la idea de apartarse o retirarse del lugar, sin perder el matiz de distancia intencional que el POB inglés quiso preservar con 'turn away'.
- source_word: צְאוּ
  english_pob_choice: go out
  chosen_spanish: sal
  alternatives_spanish:
  - salgan
  - salid
  - salid de allí
  lexicon: HALOT
  rationale: יצא se rinde naturalmente como «salir». Aquí «sal» mantiene el segundo mandato distinto del primero y conserva la fuerza de la orden breve del hebreo.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La expresión adverbial funciona de forma natural en español como «de allí». Es directa y mantiene el referente espacial sin añadir interpretación.
- source_word: טָמֵא
  english_pob_choice: unclean thing
  chosen_spanish: nada inmundo
  alternatives_spanish:
  - algo inmundo
  - lo inmundo
  - nada impuro
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado en el contexto de la prohibición. En español, «nada inmundo» evita forzar un sustantivo ajeno al hebreo y conserva el alcance absoluto de la prohibición, sin resolver la impurity language solo como ceremonial o solo como moral.
- source_word: אַל תִּגָּעוּ
  english_pob_choice: Touch no
  chosen_spanish: No toques
  alternatives_spanish:
  - No toquen
  - No os acerquéis a
  - No tocáis
  lexicon: HALOT
  rationale: La forma prohibitiva se vuelve idiomática en español con «No toques». Aunque el hebreo es plural, el español puede expresar el mandato colectivo en estilo exhortativo mediante el imperativo general del español bíblico moderno; el contexto plural queda reforzado por el resto de la línea y por «los que lleváis».
- source_word: מִתּוֹכָהּ
  english_pob_choice: from her midst
  chosen_spanish: de en medio de ella
  alternatives_spanish:
  - de su interior
  - del centro de ella
  - de su medio
  lexicon: HALOT
  rationale: La imagen espacial se expresa con naturalidad como «de en medio de ella». Mantiene el referente femenino implícito del texto y evita una literalidad dura como «de su seno» o «de su medio».
- source_word: הִבָּרוּ
  english_pob_choice: purify yourselves
  chosen_spanish: purifícaos
  alternatives_spanish:
  - limpiaos
  - purificaos
  - estad limpios
  lexicon: HALOT
  rationale: El niphal imperativo admite el sentido de limpiarse o purificarse. «Purifícaos» conserva el campo cultual y moral que el POB deja en tensión con 'unclean', sin reducirlo a mera higiene ni a una sola categoría teológica.
- source_word: נֹשְׂאֵי
  english_pob_choice: you who carry
  chosen_spanish: los que lleváis
  alternatives_spanish:
  - los que portáis
  - portadores de
  - los que cargáis
  lexicon: HALOT
  rationale: El participio vocativo se vuelve en español una relativa natural. «Los que lleváis» es claro y mantiene la función de quienes desempeñan una tarea continua.
- source_word: כְּלֵי יְהוָה
  english_pob_choice: the vessels of Yahweh
  chosen_spanish: los utensilios de Yahvé
  alternatives_spanish:
  - los vasos de Yahvé
  - los vasos sagrados de Yahvé
  - los objetos de Yahvé
  lexicon: HALOT
  rationale: כְּלִים en este contexto se refiere a objetos del templo. «Utensilios» es comprensible en español general y conserva la idea de objetos/vasijas sagradas sin imponer una terminología litúrgica más estrecha. Se mantiene «Yahvé» conforme al criterio doctrinal del proyecto.
theological_decisions:
- issue: Lenguaje de impureza y purificación
  english_pob_reading: Retain 'unclean' and 'purify yourselves' as cultic-moral language without narrowing to either ceremonial or purely ethical impurity.
  chosen_spanish_reading: Conservar «inmundo» y «purifícaos» como lenguaje cultual-moral, sin reducirlo a una sola esfera.
  alternative_spanish_readings:
  - «impuro» / «limpiaos»
  - «contaminado» / «purificaos»
  - leerlo solo como separación moral de Babilonia
  rationale: El hebreo conecta la salida de Babilonia con la santidad exigida a los portadores de los utensilios de Yahvé. «Inmundo» y «purifícaos» mantienen la tensión entre pureza ritual y separación ética, que el POB busca no resolver artificialmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El borrador sigue el audit trail en inglés con alta concordancia y no introduce revisiones posteriores distintas de las ya documentadas; se respeta la decisión de mantener la tensión entre impureza cultual y separación moral, así como la elección de Yahvé para יְהוָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, en coherencia con el estándar del proyecto.
  - «Utensilios» se usa de manera cultual, no doméstica, para כְּלֵי יְהוָה.
  - La prohibición «No toques nada inmundo» conserva el valor general del hebreo sin precisar indebidamente el tipo de impureza.
  - Los marcadores de nota están anclados en el texto y no se reutilizan.
