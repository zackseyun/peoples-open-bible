    changes_summary: Revised 'is to hate' to 'is hatred of' for a more natural rendering of the nominal construction; changed 'the way of evil' to 'the evil way' for more natural English while preserving the Hebrew sense; changed 'a mouth of perversions' to 'the mouth of perversions' for better coordination with the list.
translation:
  language: es
  text: El temor de Yahvé es aborrecimiento del mal; la soberbia y la arrogancia, el camino del mal y la boca de perversidades[a] aborrezco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una boca perversa' o 'una boca torcida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh / the LORD
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el miedo de Yahvé
  - el temor del Señor
  lexicon: HALOT
  rationale: יִרְאָה en este contexto sapiencial expresa reverencia y temor religioso, no simple miedo. Se conserva Yahvé como forma española del nombre divino, siguiendo el criterio POB de no ocultarlo tras 'SEÑOR'.
- source_word: שְׂנֹאת
  english_pob_choice: is hatred of
  chosen_spanish: es aborrecimiento del
  alternatives_spanish:
  - es odiar
  - significa aborrecer
  lexicon: HALOT
  rationale: La construcción nominal pide en español un sustantivo equivalente que preserve el valor predicativo. 'Aborrecimiento' mantiene la fuerza de rechazo moral sin volver la frase torpe.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  lexicon: HALOT
  rationale: Aquí el contraste es moral, no meramente desagradable. 'El mal' conserva bien la categoría ética amplia del hebreo.
- source_word: גֵּאָה
  english_pob_choice: pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la altivez
  lexicon: HALOT
  rationale: En una lista de vicios, 'soberbia' comunica mejor la autoexaltación culpable que 'orgullo', que en español puede ser más ambivalente.
- source_word: גָאוֹן
  english_pob_choice: arrogance
  chosen_spanish: la arrogancia
  alternatives_spanish:
  - la altivez
  - la presunción
  lexicon: HALOT
  rationale: Se distingue de גֵּאָה con un término español que preserve el matiz de altura insolente y desprecio hacia otros.
- source_word: דֶרֶךְ רָע
  english_pob_choice: the evil way
  chosen_spanish: el camino del mal
  alternatives_spanish:
  - el camino malo
  - una conducta mala
  lexicon: HALOT
  rationale: La expresión hebrea idiomática describe un curso de vida. 'Camino del mal' mantiene la metáfora proverbial y suena natural en español.
- source_word: פִי תַהְפֻּכ֬וֹת
  english_pob_choice: the mouth of perversions
  chosen_spanish: la boca de perversidades
  alternatives_spanish:
  - una boca perversa
  - la boca torcida
  lexicon: HALOT
  rationale: Se conserva la construcción genitiva y el plural abstracto del hebreo. 'Perversidades' reproduce el sentido de distorsión, desviación o habla torcida.
- source_word: תַהְפֻּכ֬וֹת
  english_pob_choice: perversions
  chosen_spanish: perversidades
  alternatives_spanish:
  - torceduras
  - deformaciones
  lexicon: HALOT
  rationale: El plural abstracto apunta a formas de habla torcida o perversa. 'Perversidades' es transparente en español y conserva la amplitud semántica.
- source_word: שָׂנֵאתִי
  english_pob_choice: I hate
  chosen_spanish: yo aborrezco
  alternatives_spanish:
  - yo odio
  - aborrezco
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como presente gnómico en el discurso de Sabiduría. 'Yo aborrezco' evita un 'odio' más duro en español y conserva la primera persona enfática.
theological_decisions:
- issue: Voz en primera persona dentro del discurso sapiencial
  english_pob_reading: Retain first-person 'I hate' without identifying the speaker in the verse text.
  chosen_spanish_reading: 'Mantener la primera persona: ''yo aborrezco''.'
  alternative_spanish_readings:
  - '''La Sabiduría aborrece'''
  - '''Dios aborrece'''
  rationale: El hebreo pasa a primera persona sin aclarar explícitamente el referente. La traducción conserva esa tensión literaria-teológica y no la resuelve por interpretación.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió una construcción nominal ('hatred of evil') y la coordinación más natural de la lista. En español se reflejó eso con 'es aborrecimiento del mal' y con un orden fluido de los vicios, sin perder el paralelismo del hebreo.
  spanish_consistency_notes:
  - Yahvé se conserva como forma del nombre divino según el estándar del proyecto.
  - Se prefirió 'soberbia' para גֵּאָה y 'arrogancia' para גָאוֹן para mantener la distinción lexical.
  - '''Camino del mal'' conserva la metáfora de conducta/camino del hebreo.'
  - '''Yo aborrezco'' mantiene la primera persona del texto y el tono sapiencial.'
  - La nota al pie marca la ambigüedad de תַהְפֻּכ֬וֹת sin sobreexplicar el verso.
