translation:
  language: es
  text: Derribó la torre de Penuel[a] y mató a los hombres de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Penuel: tradicionalmente también se escribe Peniel.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִגְדַּל
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - fortaleza
  - bastión
  lexicon: HALOT
  rationale: מִגְדַּל designa una torre o estructura elevada y fortificada. En español, 'torre' es la equivalencia más directa y natural en este contexto, y conserva la imagen arquitectónica del texto.
- source_word: פְּנוּאֵל
  english_pob_choice: Penuel
  chosen_spanish: Penuel
  alternatives_spanish:
  - Peniel
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se translitera. 'Penuel' sigue la forma consonántica del hebreo y coincide con la elección inglesa principal; 'Peniel' queda como variante tradicional reflejada en nota.
- source_word: נָתָץ
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - demolió
  lexicon: HALOT
  rationale: El verbo expresa derribar o demoler una estructura. 'Derribó' comunica bien la acción física en español actual sin añadir matices excesivos.
- source_word: וַיַּהֲרֹג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - hizo morir
  lexicon: HALOT
  rationale: הרג significa matar o dar muerte. 'Mató' es claro, directo y fiel al valor léxico básico, sin cargar el texto con un registro arcaico.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - la gente de la ciudad
  - los ciudadanos de la ciudad
  lexicon: HALOT
  rationale: 'La construcción hebrea es literalmente masculina plural: ''hombres de la ciudad''. Se conserva esa precisión, tal como hace la versión inglesa, en un contexto de acción punitiva y militar.'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto hebreo y la versión inglesa POB, sin revisiones aplicadas ni cuestiones textuales abiertas. La traducción sigue de cerca la sintaxis hebrea con español natural.
  spanish_consistency_notes:
  - Se conservó el nombre propio 'Penuel' de manera consistente con la transliteración principal.
  - Se mantuvo el masculino plural 'los hombres' para reflejar el hebreo אַנְשֵׁי sin neutralización innecesaria.
  - '''Derribó'' y ''mató'' preservan el carácter directo de las acciones verbales del hebreo.'
