translation:
  language: es
  text: Sin embargo, Yahvé puso su afecto en tus padres[a], para amarlos, y eligió a su descendencia después de ellos—ustedes—de entre todos los pueblos, como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sólo Yahvé se complació en tus padres para amarlos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Sólo
  - Solo
  - No obstante
  lexicon: HALOT
  rationale: En este contexto introduce contraste y énfasis frente a la declaración anterior. «Sin embargo» comunica la fuerza adversativa de manera natural en español sin perder el matiz restrictivo.
- source_word: בַּאֲבֹתֶיךָ
  english_pob_choice: on your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - sobre tus padres
  - en tus padres
  - con tus padres
  lexicon: HALOT
  rationale: Con חָשַׁק, el sentido es de adhesión o apego dirigido hacia los padres. «A tus padres» conserva la dirección relacional en español con naturalidad; «padres» funciona como equivalente bíblico usual de la referencia ancestral.
- source_word: חָשַׁק
  english_pob_choice: set his affection
  chosen_spanish: se apegó
  alternatives_spanish:
  - se deleitó
  - amó intensamente
  - puso su afecto
  lexicon: HALOT
  rationale: El verbo expresa una adhesión afectiva intensa. «Se apegó» mantiene la idea de fuerte vínculo o apego sin convertirlo en una paráfrasis más interpretativa; también evita sonar demasiado moderno o psicológico.
- source_word: לְאַהֲבָה אֹתָם
  english_pob_choice: to love them
  chosen_spanish: para amarlos
  alternatives_spanish:
  - para amarles
  - a fin de amarlos
  - con el fin de amarlos
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad vinculada al verbo anterior. «Para amarlos» reproduce esa relación de propósito de forma clara y natural en español.
- source_word: וַיִּבְחַר
  english_pob_choice: and he chose
  chosen_spanish: y eligió
  alternatives_spanish:
  - y escogió
  - y seleccionó
  lexicon: HALOT
  rationale: «Elegió» es el equivalente normal y transparente de בחר en una afirmación de elección divina, sin añadir matices ajenos.
- source_word: בְּזַרְעָם אַחֲרֵיהֶם
  english_pob_choice: their offspring after them
  chosen_spanish: a su descendencia después de ellos
  alternatives_spanish:
  - a su linaje después de ellos
  - a su simiente después de ellos
  - a sus hijos después de ellos
  lexicon: HALOT
  rationale: «Descendencia» expresa el sentido colectivo de זֶרַע de modo claro y digno en español. «Después de ellos» conserva la sucesión generacional del hebreo.
- source_word: בָּכֶם
  english_pob_choice: you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a vosotros mismos
  lexicon: HALOT
  rationale: El hebreo identifica a la descendencia con el auditorio presente. El inciso entre rayas «a ustedes» aclara esa aposición sin perder la fuerza directa del original.
- source_word: מִכָּל הָעַמִּים
  english_pob_choice: from all the peoples
  chosen_spanish: de entre todos los pueblos
  alternatives_spanish:
  - de todos los pueblos
  - entre todos los pueblos
  - de entre todas las naciones
  lexicon: HALOT
  rationale: «De entre» conserva mejor el valor separativo de מן en este contexto de elección. «Pueblos» refleja el plural עַמִּים con un término amplio y bíblicamente sobrio.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta hoy
  alternatives_spanish:
  - como en este día
  - como al día de hoy
  - tal como hasta hoy
  lexicon: HALOT
  rationale: La fórmula hebrea apunta al estado vigente y comprobable en el presente. «Como hasta hoy» suena natural en español y mantiene la referencia temporal actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración establecida por el proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Elección divina expresada con afecto y amor
  english_pob_reading: Retain explicit language of the LORD's affection, love, and choice without softening or systematizing it.
  chosen_spanish_reading: Mantener explícitamente que Yahvé se apegó a los padres, los amó y eligió a su descendencia, sin atenuar ni sistematizar esa secuencia.
  alternative_spanish_readings:
  - Reducirlo a una simple preferencia histórica
  - Reformularlo según un sistema doctrinal posterior de elección
  rationale: El hebreo afirma de manera acumulativa apego, amor y elección. La traducción conserva esa progresión sin desdibujarla ni cargarla con formulaciones doctrinales ajenas al versículo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió la lectura revisada del inglés POB sin cambios sustantivos; la solución española mantiene el contraste de רַק, el valor afectivo de חָשַׁק y la aposición explicativa de בָּכֶם con un inciso.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton.
  - Se prefirió «pueblos» para עַמִּים y «descendencia» para זֶרַע.
  - Se mantuvo la relación directa entre la descendencia y la audiencia presente mediante un inciso aclaratorio.
  - La puntuación con rayas reproduce la aposición implícita del hebreo y del inglés POB.
