translation:
  language: es
  text: No te acerques a una mujer ajena[a], no sea que caigas en sus trampas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujer extranjera»; en la literatura sapiencial la expresión puede designar a una mujer fuera de los límites adecuados, y el paralelo griego apunta a una asociación sexual impropia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּקְרַב / μὴ ὑπάντα
  english_pob_choice: Do not approach
  chosen_spanish: No te acerques
  alternatives_spanish:
  - No te arrimes
  - No te acerques demasiado
  - No vayas hacia
  lexicon: HALOT; LXX parallel μὴ ὑπάντα
  rationale: El hebreo y el griego expresan una prohibición de acercamiento o de entrar en relación. «No te acerques» es natural en español moderno y conserva el valor admonitorio sin suavizarlo.
- source_word: אִשָּׁה זָרָה / γυναικὶ ἑταιριζομένῃ
  english_pob_choice: a foreign woman
  chosen_spanish: una mujer extraña
  alternatives_spanish:
  - una mujer extranjera
  - una mujer ajena
  - una mujer inmoral
  lexicon: HALOT; Greek parallel
  rationale: «זָרָה» admite el sentido literal de «extraña/foránea», pero en literatura sapiencial puede señalar a una mujer fuera de los límites adecuados; el paralelo griego sugiere asociación sexual impropia. «Mujer extraña» preserva esa tensión sin reducir el sentido a etnicidad ni explicitar más de lo que el texto dice.
- source_word: פֶּן / μὴ ποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  - no vaya a ser que
  lexicon: HALOT; Greek μὴ ποτε
  rationale: La partícula introduce una advertencia sobre una consecuencia indeseable. «No sea que» comunica bien ese matiz preventivo en español con tono proverbial.
- source_word: תִּפּוֹל / ἐμπέσῃς
  english_pob_choice: you fall
  chosen_spanish: caigas
  alternatives_spanish:
  - caigas en
  - te precipites
  - termines cayendo
  lexicon: HALOT; LXX ἐμπέσῃς
  rationale: El verbo es literalmente «caer», y el griego refuerza la imagen de caer dentro de algo. «Caigas» conserva la metáfora de quedar atrapado.
- source_word: בִּמְצוּדֹתֶיהָ / εἰς τὰς παγίδας αὐτῆς
  english_pob_choice: into her snares
  chosen_spanish: en sus trampas
  alternatives_spanish:
  - en sus lazos
  - en sus redes
  - en sus trampas y lazos
  lexicon: HALOT; LXX παγίδας
  rationale: El hebreo y el griego hablan de dispositivos de captura. «Trampas» es claro y natural en español; mantiene la imagen de peligro moral y de captura, aunque «snares» también podría reflejarse como «lazos».
theological_decisions:
- issue: Alcance de «mujer extraña» en un contexto sapiencial
  english_pob_reading: Render as 'foreign woman' in the main text, preserving the moral-warning category without reducing it to ethnicity alone.
  chosen_spanish_reading: «Mujer extraña» conserva la categoría sapiencial de advertencia moral sin identificarla solo como extranjera por etnia.
  alternative_spanish_readings:
  - mujer extranjera
  - mujer inmoral
  - prostituta
  rationale: La formulación hebrea es literal, pero el paralelo griego muestra que el aviso apunta a una relación sexual impropia. La elección española preserva esa tensión interpretativa y evita una especificación que el texto no obliga a hacer.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El expediente inglés pasó de «strange woman» a «foreign woman» para mayor naturalidad; el hebreo y el griego, sin embargo, sostienen una ambigüedad productiva en español entre extranjería y condición moral. Por eso se eligió «mujer extraña» en el texto principal y se explicó la alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo «trampas» en vez de «lazos» porque el contexto inmediato de captura es claro y natural en español.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el versículo.
  - Se conservó un registro proverbial, sobrio y fácilmente publicable en español contemporáneo.
