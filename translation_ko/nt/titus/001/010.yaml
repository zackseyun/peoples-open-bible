id: TIT.1.10
reference: Titus 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰσὶν γὰρ πολλοὶ ⸀καὶ ἀνυπότακτοι, ματαιολόγοι καὶ φρεναπάται, μάλιστα οἱ ἐκ ⸀τῆς περιτομῆς,
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/010.yaml
  text: For there are many rebellious people[a], empty talkers and deceivers, especially those of the circumcision,
  footnotes:
  - marker: a
    text: Or 'those of the circumcision party' or 'those from the circumcision.' The phrase likely refers to Jewish or Judaizing opponents, but the Greek is less explicit.
    reason: lexical_alternative
translation:
  language: ko
  text: 순종하지 않는 자, 헛된 말을 하는 자, 사람을 속이는 자가 많기 때문입니다. 특히 할례에 속한 자들[a] 가운데 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「할례파에 속한 자들」, 「할례 출신의 자들」. 유대인이나 유대주의 반대자를 가리키는 것으로 보이나, 헬라어 자체는 그만큼 명시적이지 않다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνυπότακτοι
  english_pob_choice: rebellious
  chosen_korean: 순종하지 않는 자
  alternatives_korean:
  - 거역하는 자
  - 복종하지 않는 자
  lexicon: BDAG
  rationale: ὑποτάσσω의 부정형. 권위에 복종하지 않는 상태. 1:6의 ἀνυπότακτα와 같은 어휘로 일관되게 옮긴다.
- source_word: ματαιολόγοι
  english_pob_choice: empty talkers
  chosen_korean: 헛된 말을 하는 자
  alternatives_korean:
  - 공허한 말을 하는 자
  - 무익한 말쟁이
  lexicon: BDAG
  rationale: μάταιος(헛된) + λόγος(말). 「헛된 말을 하는 자」가 직역과 자연스러움을 모두 살린다.
- source_word: φρεναπάται
  english_pob_choice: deceivers
  chosen_korean: 사람을 속이는 자
  alternatives_korean:
  - 마음을 속이는 자
  - 미혹하는 자
  lexicon: BDAG
  rationale: φρήν(마음·정신) + ἀπατάω(속이다). 사람의 분별을 미혹하는 자. 한국어 「사람을 속이는 자」가 일반적이며, 각주 없이도 의미가 명료하다.
- source_word: μάλιστα οἱ ἐκ τῆς περιτομῆς
  english_pob_choice: especially those of the circumcision
  chosen_korean: 특히 할례에 속한 자들 가운데 그러합니다
  alternatives_korean:
  - 특히 할례 출신의 자들
  - 특히 할례파 사람들
  lexicon: BDAG
  rationale: ἐκ + 속격이 출신·소속을 가리킨다. 「할례에 속한 자들」이 그 모호성을 보존하며, 각주로 「할례파」 가능성을 둔다.
