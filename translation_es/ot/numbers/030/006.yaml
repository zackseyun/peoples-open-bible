  text: וְ/אִם הֵנִ֨יא אָבִ֣י/הָ אֹתָ/הּ֮ בְּ/י֣וֹם שָׁמְע/וֹ֒ כָּל נְדָרֶ֗י/הָ וֶֽ/אֱסָרֶ֛י/הָ אֲשֶׁר אָסְרָ֥ה עַל נַפְשָׁ֖/הּ לֹ֣א יָק֑וּם וַֽ/יהוָה֙ יִֽסְלַח לָ֔/הּ כִּי הֵנִ֥יא אָבִ֖י/הָ אֹתָֽ/הּ־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/030/006.yaml
  text: But if her father forbids her on the day he hears of it[a], none of her vows or her binding obligations by which she has bound herself shall stand; and Yahweh will forgive her[b], because her father forbade her.
  footnotes:
  - marker: a
    text: Or 'binding pledges' or 'bonds.' The Hebrew term refers to obligations that bind a person, especially in vow contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall take effect.' The Hebrew literally says 'shall not stand,' meaning the vows are not upheld as binding.
    reason: lexical_alternative
