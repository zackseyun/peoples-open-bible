translation:
  language: es
  text: Porque no hay nada fiable en su boca[a]; su interior es destrucción[b]. Su garganta es un sepulcro abierto; con su lengua halagan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hay fiabilidad en su boca», si se desea conservar con más rigidez el matiz de «fiable/estable» en el hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «su ser interior es destrucción» o «su corazón es destrucción».
    reason: lexical_alternative
  - marker: c
    text: O «con su lengua hablan suavemente».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: there is nothing
  chosen_spanish: no hay nada
  alternatives_spanish:
  - no hay
  - no existe nada
  lexicon: HALOT
  rationale: La negación existencial se expresa de manera natural en español con «no hay nada», conservando la fuerza absoluta del hebreo sin volverlo rebuscado.
- source_word: בְּפִיהוּ
  english_pob_choice: in their mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en su boca
  - en su boca de ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea parece singular, el contexto es colectivo; en español, «su» mantiene esa referencia grupal de forma idiomática y clara.
- source_word: נְכוֹנָה
  english_pob_choice: trustworthy
  chosen_spanish: fiable
  alternatives_spanish:
  - firme
  - confiable
  - verdadera
  lexicon: HALOT
  rationale: «Fiable» comunica bien la idea de algo firme, estable y digno de confianza en el habla; en este contexto de lenguaje engañoso, es una equivalencia natural y precisa.
- source_word: קִרְבָּם
  english_pob_choice: their inward part
  chosen_spanish: su interior
  alternatives_spanish:
  - su parte interior
  - su ser interior
  - su corazón
  lexicon: HALOT
  rationale: «Su interior» preserva la imagen concreta del hebreo sin restringirla indebidamente a «corazón», y resulta comprensible en español bíblico contemporáneo.
- source_word: הַוּוֹת
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  - maldad destructiva
  lexicon: HALOT
  rationale: El sustantivo plural hebreo apunta a ruina/destrucción; el singular abstracto «destrucción» reproduce la fuerza predicativa del verso en español.
- source_word: קֶבֶר פָּתוּחַ
  english_pob_choice: an open grave
  chosen_spanish: un sepulcro abierto
  alternatives_spanish:
  - una tumba abierta
  - un sepulcro abierto y abierto
  lexicon: HALOT
  rationale: «Sepulcro» es un equivalente digno y transparente para la imagen de una tumba abierta; conserva el efecto vívido y mortuorio del hebreo.
- source_word: גְּרוֹנָם
  english_pob_choice: their throat
  chosen_spanish: su garganta
  alternatives_spanish:
  - su garganta
  - su cuello
  - su garguero
  lexicon: HALOT
  rationale: En un contexto de habla, «garganta» es el término anatómico más natural en español para conservar la metáfora del órgano de la voz.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - sus lenguas
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo; en español, «su lengua» mantiene el paralelismo poético y la imagen de la lengua como instrumento del habla.
- source_word: יַחֲלִיקוּן
  english_pob_choice: they flatter
  chosen_spanish: halagan
  alternatives_spanish:
  - hablan suavemente
  - adulan
  - suavizan sus palabras
  lexicon: HALOT
  rationale: El verbo en este contexto expresa hablar con suavidad/halago con intención engañosa; «halagan» reproduce ese sentido sin perder fluidez poética.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en verdad
  lexicon: HALOT
  rationale: «Porque» comunica la relación causal o explicativa entre esta línea y el versículo anterior de manera natural en español.
theological_decisions:
- issue: Referencia colectiva pese a formas singulares en la primera cola
  english_pob_reading: their mouth
  chosen_spanish_reading: su boca
  alternative_spanish_readings:
  - su boca de ellos
  - su boca
  rationale: El hebreo presenta una forma que puede verse como singular, pero el conjunto del versículo habla de los malvados en plural. En español, el posesivo singular colectivo evita una explicación excesiva y conserva la lectura corporativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Imagen antropológica interna de קִרְבָּם
  english_pob_reading: their inward part
  chosen_spanish_reading: su interior
  alternative_spanish_readings:
  - su corazón
  - su ser interior
  rationale: La expresión describe corrupción interna que se manifiesta en la palabra. «Su interior» mantiene el alcance amplio del hebreo sin reducir la imagen a una sola facultad humana.
  doctrine_reference: Translation philosophy §3, §5
- issue: Metáfora de habla corrupta en «sepulcro abierto»
  english_pob_reading: an open grave
  chosen_spanish_reading: un sepulcro abierto
  alternative_spanish_readings:
  - una tumba abierta
  - un sepulcro abierto
  rationale: La metáfora comunica muerte, contaminación y peligro en la speech imagery del verso. «Sepulcro» preserva el tono bíblico y la fuerza visual de la imagen.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registraron cambios aplicados en la última pasada, y el consenso de revisión fue de alta concordancia.'
