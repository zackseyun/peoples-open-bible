translation:
  language: es
  text: Ciertamente, él ama a los pueblos; todos sus consagrados están en tu mano, y ellos se sientan[a] a tus pies; cada uno recibe[b] tus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo es incierto; también se ha entendido como «se reúnen», «se agachan» o incluso «son derribados».
    reason: alternative_reading
  - marker: b
    text: O «cada uno toma de tus palabras» o «lleva tus dichos»; la expresión hebrea es rara y difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - En verdad
  - Sí
  - También
  lexicon: HALOT
  rationale: Aquí אַף funciona como partícula enfática/asseverativa. «Ciertamente» expresa en español la fuerza de afirmación sin volverlo mecánico ni introducir un matiz aditivo indebido.
- source_word: חֹבֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama intensamente
  - quiere
  - aprecia
  lexicon: HALOT
  rationale: El participio expresa una disposición continua. «Ama» es natural en español y conserva la relación afectiva sin sobreexplicar.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y las naciones
  lexicon: HALOT
  rationale: El plural hebreo conserva un sentido colectivo plural. «Los pueblos» mantiene esa amplitud y es una formulación idiomática y bíblica en español.
- source_word: כָּל קְדֹשָׁיו
  english_pob_choice: all his holy ones
  chosen_spanish: todos sus santos
  alternatives_spanish:
  - todos sus seres santos
  - todos sus consagrados
  - todos sus santos seres
  lexicon: HALOT
  rationale: «Santos» reproduce el sustantivo hebreo de los apartados para Dios. En español, «santos» es breve y fiel, aunque en nota se preserva la amplitud del término frente a lecturas más específicas.
- source_word: בְּיָדֶךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - bajo tu poder
  - bajo tu mano
  lexicon: HALOT
  rationale: La expresión es literalmente «en tu mano». Se conserva la imagen corporal y jurídica del hebreo, que es transparente en español.
- source_word: תֻּכּוּ
  english_pob_choice: they sit down
  chosen_spanish: se sientan
  alternatives_spanish:
  - se agachan
  - se reúnen
  - son derribados
  lexicon: HALOT
  rationale: La forma es difícil y el contexto sugiere una postura de subordinación o escucha ante los pies del destinatario. «Se sientan» conserva la imagen principal sin resolver indebidamente la incertidumbre textual.
- source_word: לְרַגְלֶךָ
  english_pob_choice: at your feet
  chosen_spanish: a tus pies
  alternatives_spanish:
  - ante tus pies
  - junto a tus pies
  lexicon: HALOT
  rationale: La locución se vierte de manera idiomática como «a tus pies», que en español expresa postura de sumisión o aprendizaje.
- source_word: יִשָּׂא
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - toma
  - levanta
  - lleva
  lexicon: HALOT
  rationale: En este contexto con «tus palabras», el verbo funciona de manera idiomática. «Recibe» transmite la acción resultante sin perder la dificultad del hebreo.
- source_word: מִדַּבְּרֹתֶיךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tus dichos
  - tus dichos oráculos
  - de tus palabras
  lexicon: HALOT
  rationale: La forma hebrea es rara y difícil, relacionada con el habla o las declaraciones. «Tus palabras» es la opción más clara y sobria en español, manteniendo el sentido verbal.
theological_decisions:
- issue: Cambio de persona en el poema
  english_pob_reading: 'Retain the Hebrew''s poetic shift: ''he loves ... his holy ones ... in your hand ... at your feet ... your words.'''
  chosen_spanish_reading: 'Conservar el cambio poético de persona: «él ama ... sus santos ... en tu mano ... a tus pies ... tus palabras».'
  alternative_spanish_readings:
  - Regularizar todo en tercera persona
  - Regularizar todo en segunda persona
  rationale: El hebreo alterna personas en la bendición poética. Mantener la alternancia evita suavizar una tensión real del texto y respeta el auditable original.
  doctrine_reference: Translation philosophy §3
- issue: Identidad de «sus santos»
  english_pob_reading: Render as 'holy ones' without specifying angels or Israel alone
  chosen_spanish_reading: Traducir como «santos» sin precisar si son ángeles, Israel o un grupo consagrado específico.
  alternative_spanish_readings:
  - ángeles
  - saints
  - el pueblo santo de Israel
  rationale: El verso no obliga a una identificación única. «Santos» preserva la amplitud semántica y evita imponer una interpretación no exigida por el texto.
  doctrine_reference: Translation philosophy §3
- issue: Valor de la expresión difícil con 'receive/bear your words'
  english_pob_reading: each receives your words
  chosen_spanish_reading: cada uno recibe tus palabras
  alternative_spanish_readings:
  - cada uno toma de tus palabras
  - cada uno lleva tus palabras
  rationale: La frase hebrea es rara y admite varios matices. «Recibe» mantiene abierta la posibilidad de escucha, acogida o apropiación de las palabras sin cerrar el sentido.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente, que no introdujo cambios sustanciales: el consenso de auditoría sigue siendo alto y no hubo revisiones aplicadas al contenido de base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando el texto lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se conserva la alternancia de personas del hebreo sin normalizarla en español.
  - Se evita «santos» en sentido eclesiástico estrecho; aquí traduce el hebreo de los consagrados/apartados para Dios.
