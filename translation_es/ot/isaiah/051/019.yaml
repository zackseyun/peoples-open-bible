translation:
  language: es
  text: 'Estas dos cosas[a] te han sobrevenido: —¿quién se lamentará por ti[b]?— desolación y destrucción, hambre y espada; ¿quién te consolará?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice «dos cosas» y luego nombra cuatro desastres, probablemente como dos pares: «desolación y destrucción» y «hambre y espada».'
    reason: cultural_note
  - marker: b
    text: O «te compadecerá». El verbo hebreo puede expresar duelo o simpatía.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתַּיִם הֵנָּה
  english_pob_choice: These two things
  chosen_spanish: Estas dos cosas
  alternatives_spanish:
  - Dos cosas
  - Estas dos
  lexicon: HALOT
  rationale: La construcción hebrea es enfática y deíctica; en español, «estas dos cosas» conserva el valor de señalamiento y el número explícito sin sonar forzado.
- source_word: קֹרְאֹתַיִךְ
  english_pob_choice: have come upon you
  chosen_spanish: han venido sobre ti
  alternatives_spanish:
  - te han sobrevenido
  - te han alcanzado
  - te han acometido
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto de calamidades no significa literalmente «llamar», sino que expresa que los desastres sobrevienen. «Han venido sobre ti» mantiene la idea de irrupción de calamidad de forma natural en español.
- source_word: מִי יָנוּד לָךְ
  english_pob_choice: who will mourn for you?
  chosen_spanish: ¿quién se lamentará por ti?
  alternatives_spanish:
  - ¿quién te compadecerá?
  - ¿quién hará duelo por ti?
  - ¿quién se dolerá por ti?
  lexicon: HALOT
  rationale: נוּד puede implicar lamentar, mostrar simpatía o menear la cabeza en duelo. Dado el contexto de ruina de Jerusalén, «lamentará por ti» preserva el matiz de duelo/compasión sin perder naturalidad.
- source_word: הַשֹּׁד
  english_pob_choice: devastation
  chosen_spanish: Desolación
  alternatives_spanish:
  - devastación
  - ruina
  - despojo
  lexicon: HALOT
  rationale: שֹׁד denota despojo y destrucción violenta. «Desolación» comunica bien el efecto de devastación sobre la ciudad y permite una buena pareja con el término siguiente.
- source_word: הַשֶּׁבֶר
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - quebrantamiento
  - ruina
  - derrumbe
  lexicon: HALOT
  rationale: שֶׁבֶר literalmente es «quiebre» o «fractura», pero en lenguaje profético de juicio significa ruina o colapso. «Destrucción» es claro y mantiene el paralelismo con el término anterior.
- source_word: הָרָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez
  lexicon: HALOT
  rationale: En español bíblico moderno, «hambre» es la forma más directa y comprensible de רָעָב. Evita arcaísmos sin perder la fuerza del juicio.
- source_word: הַחֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - la espada
  lexicon: HALOT
  rationale: Como en inglés, «espada» puede funcionar metonímicamente para guerra y muerte violenta. En una lista de calamidades, la forma sin artículo suena natural en español.
- source_word: מִי אֲנַחֲמֵךְ
  english_pob_choice: who will comfort you?
  chosen_spanish: ¿quién te consolará?
  alternatives_spanish:
  - ¿quién te confortará?
  - ¿quién te consolará?
  lexicon: HALOT
  rationale: נחם en piel expresa consolar. «Consolará» es la opción más natural en español y conserva el motivo isaiano del consuelo.
theological_decisions:
- issue: La mención de «dos cosas» seguida de cuatro sustantivos de calamidad
  english_pob_reading: 'Render the opening as ''These two things have come upon you'' while preserving the four following nouns as two paired sets: devastation and destruction; famine and sword.'
  chosen_spanish_reading: '«Estas dos cosas han venido sobre ti» seguido de cuatro sustantivos dispuestos como dos pares: desolación y destrucción; hambre y espada.'
  alternative_spanish_readings:
  - Tratar el texto como corrupto y corregirlo
  - Decir solo «doble calamidad»
  rationale: El hebreo conserva explícitamente el número dos y luego enumera cuatro términos que encajan naturalmente como dos pares. La traducción debe dejar visible esa tensión textual en lugar de resolverla por emendación o resumirla.
  doctrine_reference: Principio POB de primacía del texto original y preservación de tensiones textuales cuando el propio hebreo las presenta.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que prefirió «mourn» sobre «grieve» por naturalidad y adecuación formal. La versión española sigue esa línea con «se lamentará», evitando un calco excesivamente literal y manteniendo el campo semántico de duelo/compasión. También se respetó la decisión revisada de no emendar la cifra «dos» pese a la lista de cuatro calamidades.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada cuando no aparece en este versículo.
  - «Espada» conserva el valor metonímico de guerra/violencia, habitual en el lenguaje profético.
  - La puntuación con dos puntos y punto y coma reproduce la estructura del hebreo y de la auditoría inglesa, facilitando la lectura pública.
