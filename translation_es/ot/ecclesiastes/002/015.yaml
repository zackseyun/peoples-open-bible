revisions:
- from: 'Y dije en mi corazón[a]: «Como le sucede al necio, así me sucederá también a mí. ¿Por qué, entonces, fui más sabio?». Y hablé en mi corazón que también esto es vanidad.'
  to: 'Y dije en mi corazón: «Como le sucede al necio, así me sucederá también a mí. ¿Por qué, entonces, fui más sabio?». Y dije en mi corazón que también esto es vanidad[a].'
  rationale: Se corrige la ubicación de la nota para que ancle correctamente «vanidad», que es el término explicado. Además, se reemplaza «Y hablé en mi corazón» por «Y dije en mi corazón», porque en este contexto introspectivo es la opción más natural y fiel al sentido funcional del hebreo y al audit trail inglés. El resto del versículo se conserva por ser sólido y legible.
