revisions:
- from: Sobre todos los terrados de Moab y en sus plazas[a], por todas partes hay duelo; porque he quebrado a Moab como a un vaso en el que no hay deleite, declara Yahvé.
  to: Sobre todas las azoteas de Moab y en sus plazas, por todas partes hay duelo; porque he quebrado a Moab como una vasija en la que no hay deleite[a], declara Yahvé.
  rationale: 'Se revisa el texto para mejorar la naturalidad y alinearlo mejor con el rastro de auditoría: ''azoteas'' es más claro para un español amplio; ''como una vasija'' representa mejor el símil hebreo que ''como a un vaso''; y la nota al pie se traslada al punto donde el inglés preservó una alternativa semántica relevante, evitando la nota redundante sobre ''plazas''. No se requiere adjudicación adicional porque los cambios son menores y bien sustentados por la evidencia fuente y la política terminológica.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:31:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: los lugares públicos de Moab están llenos de lamento, Yahvé ha quebrado a Moab, y la comparación con un recipiente/vaso sin deseo o valor está preservada. También mantiene correctamente נְאֻם יְהוָה como ''declara Yahvé''. Sin embargo, hay dos ajustes recomendables: (1) la nota al pie actual para ''plazas'' no preserva bien la alternativa documentada en el inglés, porque ofrece ''sus plazas'' como alternativa a ''sus plazas'', lo que resulta redundante; (2) ''como a un vaso'' suena menos natural y algo impreciso en español aquí; ''como un vaso'' o mejor ''como una vasija'' encaja más naturalmente con el símil hebreo.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y precisión. 'Terrados' es comprensible, aunque 'azoteas' sería más natural en español latinoamericano general; aun así, no es un error grave. La construcción 'como a un vaso' suena forzada en comparación con el hebreo comparativo simple. Además, la nota al pie necesita corrección para que sea informativa y no duplicativa.
  glossary_alignment: El uso de 'Yahvé' sigue correctamente la política del proyecto para יהוה. 'Duelo' para מִסְפֵּד es aceptable. 'Plazas' para רְחֹבֹתֶיהָ concuerda bien con la decisión auditada. La principal mejora léxica es preferir 'vasija' sobre 'vaso' para כְּלִי en este contexto metafórico, y ajustar la nota para reflejar la alternativa documentada 'que nadie quiere'.
  issues:
  - severity: medium
    issue: La nota al pie [a] es redundante y no conserva la alternativa auditada principal.
    rationale: La nota dice 'O, “sus plazas”' cuando el texto principal ya usa 'sus plazas'. Además, el inglés preserva como alternativa importante la implicación idiomática de 'un vaso que nadie quiere', no una nota sobre 'plazas'.
  - severity: medium
    issue: La expresión 'como a un vaso' es poco natural en español.
    rationale: El hebreo usa una comparación simple con כְּ ('como'), no objeto personal con 'a'. En español suena mejor 'como un vaso' o 'como una vasija'.
  - severity: low
    issue: '''Vaso'' es posible, pero ''vasija'' representa mejor la imagen de כְּלִי en este contexto profético.'
    rationale: '''Vasija'' sugiere con más naturalidad un recipiente quebrado y desechado; ''vaso'' en español moderno puede sonar demasiado estrecho o cotidiano.'
  revised_spanish_text: Sobre todas las azoteas de Moab y en sus plazas, por todas partes hay duelo; porque he quebrado a Moab como una vasija en la que no hay deleite[a], declara Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O, “como una vasija que nadie quiere”. El hebreo literalmente dice: “como una vasija en la que no hay deleite”.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto para mejorar la naturalidad y alinearlo mejor con el rastro de auditoría: ''azoteas'' es más claro para un español amplio; ''como una vasija'' representa mejor el símil hebreo que ''como a un vaso''; y la nota al pie se traslada al punto donde el inglés preservó una alternativa semántica relevante, evitando la nota redundante sobre ''plazas''. No se requiere adjudicación adicional porque los cambios son menores y bien sustentados por la evidencia fuente y la política terminológica.'
