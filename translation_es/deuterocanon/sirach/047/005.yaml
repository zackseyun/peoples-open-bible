translation:
  language: es
  text: Porque invocó a Dios Altísimo[a], y él dio fuerza a su diestra, para hacer retroceder a un hombre experto en guerra, y para enaltecer el cuerno[b] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «Dios Altísimo»; el paralelo griego dice «el Señor, el Altísimo».
    reason: alternative_reading
  - marker: b
    text: «Cuerno» es una imagen bíblica de fuerza, honor o poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκαλέσατο / קרא אל
  english_pob_choice: called on
  chosen_spanish: invocó
  alternatives_spanish:
  - llamó a
  - clamó a
  - llamó sobre
  lexicon: HALOT; LSJ
  rationale: El verbo expresa una llamada dirigida a Dios con sentido de súplica o apelación. «Invocó» preserva el valor religioso y es natural en español bíblico contemporáneo sin volverlo mecánico.
- source_word: אל עליון / Κύριον τὸν ὕψιστον
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - el Señor Altísimo
  - Dios, el Altísimo
  - el Dios Altísimo
  lexicon: HALOT; LXX parallel
  rationale: El hebreo dice literalmente «Dios Altísimo», mientras que el griego paralelo tiene «el Señor, el Altísimo». En español, «Dios Altísimo» sigue más de cerca el hebreo y mantiene la tensión documentada sin sustituirla por una fórmula eclesiástica más interpretativa.
- source_word: ויתן בימינו עז
  english_pob_choice: he gave strength to his right hand
  chosen_spanish: dio poder a su diestra
  alternatives_spanish:
  - dio fuerza a su mano derecha
  - puso vigor en su diestra
  - dio fuerza a su diestra
  lexicon: HALOT
  rationale: La frase hebrea es idiomática para conceder capacidad eficaz de acción. «Poder a su diestra» conserva la imagen corporal y funciona con buena fluidez en español; «diestra» mantiene el registro bíblico sin sonar arcaizante en exceso.
- source_word: להדוף
  english_pob_choice: to drive back
  chosen_spanish: para hacer retroceder
  alternatives_spanish:
  - para rechazar
  - para repeler
  - para arrojar atrás
  lexicon: HALOT
  rationale: El verbo describe empujar o rechazar al enemigo. «Hacer retroceder» expresa bien la fuerza del movimiento sin precisar un modo de combate que el texto no explicita.
- source_word: איש יודע מלחמות
  english_pob_choice: a man skilled in war
  chosen_spanish: a un hombre experto en guerra
  alternatives_spanish:
  - a un guerrero experimentado
  - a un hombre entendido en guerras
  - a un hombre diestro en la guerra
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «un hombre que conoce guerras». «Experto en guerra» mantiene la idea de competencia militar y es suficientemente directo en español.
- source_word: κέρας λαοῦ αὐτοῦ / קרן ישראל
  english_pob_choice: the horn of Israel
  chosen_spanish: el cuerno de Israel
  alternatives_spanish:
  - el poder de Israel
  - la fuerza de Israel
  - el honor de Israel
  lexicon: HALOT; biblical metaphor
  rationale: Se conserva «cuerno» porque el texto usa la imagen bíblica tradicional de fuerza, honor o poder. No se sustituye por una abstracción para no borrar el símbolo poético que el propio versículo emplea.
theological_decisions:
- issue: Divine title where Hebrew and Greek differ slightly
  english_pob_reading: God Most High
  chosen_spanish_reading: Dios Altísimo
  alternative_spanish_readings:
  - el Señor Altísimo
  - Dios, el Altísimo
  - el Dios Altísimo
  rationale: El inglés POB revisó la lectura hacia «God Most High» por mayor exactitud al hebreo; el griego, en cambio, lee «el Señor, el Altísimo». La versión española sigue el hebreo principal y deja constancia de la variante griega en nota, sin borrar la tensión textual.
  doctrine_reference: 'DOCTRINE.md: primacía del original; tratamiento de κύριος en textos deuterocanónicos'
- issue: Metáfora de 'horn' as power/honor
  english_pob_reading: horn of Israel
  chosen_spanish_reading: el cuerno de Israel
  alternative_spanish_readings:
  - la fuerza de Israel
  - el poder de Israel
  - el honor de Israel
  rationale: Se conserva la metáfora porque el POB inglés la retuvo y porque en español bíblico «cuerno» puede funcionar como símbolo de fuerza y exaltación. La explicación queda para nota, evitando sustituir la imagen por un equivalente abstracto.
  doctrine_reference: POB lexical policy on biblical metaphors
translation_notes:
  revision_awareness: El inglés POB revisó esta línea desde «the Lord Most High» a «God Most High» para acercarse más al hebreo אל עליון. La redacción española sigue esa revisión y conserva la variante griega en nota para no borrar la diferencia entre testigos.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אל/θεός y no se sustituye por «Señor» en el texto principal, conforme al hebreo base y a la revisión más reciente.
  - Se usa «diestra» para preservar el paralelismo bíblico con «su mano derecha» sin perder naturalidad.
  - «Cuerno» se conserva como metáfora bíblica y no se paraphrasea como «fuerza» en el texto principal.
  - El orden sintáctico sigue el flujo español natural, pero reproduce los elementos semánticos esenciales del hebreo y del griego.
