review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura retórica del hebreo y acierta en «Señor Yahvé» para אֲדֹנָי יְהוִה conforme al criterio del proyecto. Sin embargo, no preserva adecuadamente el matiz contextual de עַבְדְּךָ en esta oración real: aquí funciona como autodesignación humilde de pacto y no exige la fuerza de «esclavo». Además, «decir David a ti» es gramaticalmente poco natural en español; el sentido de לְדַבֵּר אֵלֶיךָ se transmite mejor con «decirte» o «hablarte».'
  spanish_quality_summary: La frase principal es entendible, pero «puede decir David a ti» suena forzada y poco idiomática en español bíblico natural. «Tú conoces a tu esclavo» también resulta más duro de lo que pide el contexto y menos eclesialmente legible que «a tu siervo». El resto del registro es claro y digno.
  glossary_alignment: '«Yahvé» está bien alineado con la política del proyecto. La desviación principal es léxica/contextual: aunque el proyecto favorece «esclavo» cuando el original o la auditoría inglesa escogen ''slave'' por fuerza léxica, aquí la auditoría inglesa documenta explícitamente «your servant» como la opción contextual adecuada para עַבְדְּךָ. Por tanto, en español corresponde «tu siervo», no «tu esclavo».'
  issues:
  - severity: high
    issue: עַבְדְּךָ fue traducido como «tu esclavo»
    rationale: La evidencia fuente y la auditoría inglesa indican que en esta oración real ante Dios el término funciona como autodesignación humilde («your servant»), no como énfasis en condición servil. «Esclavo» sobretraduce el matiz y contradice la justificación léxica documentada.
  - severity: medium
    issue: «decir David a ti» es poco natural en español
    rationale: Aunque intenta seguir de cerca לְדַבֵּר אֵלֶיךָ, en español la combinación correcta y natural es «decirte» o «hablarte». Mantener una literalidad no idiomática perjudica la legibilidad sin añadir fidelidad real.
  - severity: low
    issue: La nota al pie actual defiende una decisión léxica no sustentada por la auditoría
    rationale: La nota sobre «tu esclavo» introduce una racionalización distinta de la decisión inglesa auditada y no resuelve una ambigüedad real del español revisado.
  revised_spanish_text: ¿Y qué más puede decirte David? Tú conoces a tu siervo, Señor Yahvé.
  revision_rationale: Se cambia «decir David a ti» por «decirte David» para lograr español natural sin perder el sentido de לְדַבֵּר אֵלֶיךָ. Se reemplaza «tu esclavo» por «tu siervo» porque, según la auditoría inglesa y el contexto de oración real, עַבְדְּךָ aquí expresa humildad y relación de servicio ante Dios, no la fuerza plena de esclavitud. Se mantiene «Señor Yahvé» para reflejar אֲדֹנָי יְהוִה conforme a la política del proyecto sobre el nombre divino.
