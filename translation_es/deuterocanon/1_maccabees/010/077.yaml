revisions:
- from: Y Apolonio lo oyó, y acampó con tres mil jinetes y una gran fuerza, y fue a Azoto como si pasara de largo, y al mismo tiempo avanzó hacia la llanura, porque tenía una multitud de caballería y confiaba en ella.
  to: Y Apolonio lo oyó, y acampó con tres mil de caballería y una gran fuerza militar, y fue a Azoto como si estuviera de paso[a], y al mismo tiempo avanzó a la llanura[b], porque tenía una multitud de caballería y confiaba en ella.
  rationale: 'Se ajusta la redacción para reflejar mejor el griego y la auditoría inglesa: «como si estuviera de paso» expresa con más precisión la apariencia de simple tránsito; «avanzó a la llanura» preserva mejor el movimiento hacia dentro del llano; y se unifica ἵππος como «caballería» para coherencia militar. La nota [a] conserva la alternativa del POB inglés, y la nota [b] traslada la observación cultural sobre el uso colectivo de «caballo».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:25:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del griego y del POB inglés: Apolonio oye la noticia, acampa con tropas, se dirige a Azoto con apariencia de tránsito, y simultáneamente hace un movimiento táctico hacia la llanura por confiar en su caballería. Sin embargo, hay dos puntos donde la fidelidad puede mejorarse: 1) «hacia la llanura» debilita el valor de εἰς τὸ πεδίον, que en contexto militar y según el POB inglés apunta más bien a entrada en la llanura; 2) «como si pasara de largo» puede sugerir que siguió sin detenerse, mientras que ὡς διοδεύων enfatiza más la apariencia de estar simplemente de paso.'
  spanish_quality_summary: El español es claro y legible, pero «una gran fuerza» suena algo calcado y menos idiomático en narrativa militar; «una gran fuerza militar» o «una gran tropa» sería más natural. También conviene armonizar «tres mil jinetes» con «caballería» posterior para evitar alternancia innecesaria en el mismo versículo. La sintaxis general funciona bien.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. En lo militar, el proyecto inglés documenta ἵππος como colectivo para caballería; por eso conviene preferir «caballería» también en τρισχιλίαν ἵππον, idealmente «tres mil de caballería» o «tres mil soldados de caballería», en lugar de alternar con «jinetes».
  issues:
  - severity: medium
    issue: «avanzó hacia la llanura» atenúa el movimiento de entrada
    rationale: El griego εἰς τὸ πεδίον y el POB inglés «advanced into the plain» indican avance hacia dentro de la llanura, no solo en dirección a ella.
  - severity: medium
    issue: «como si pasara de largo» no refleja del todo la idea de tránsito aparente
    rationale: ὡς διοδεύων sugiere presentarse como quien simplemente va pasando o está de paso, no necesariamente que siga de largo sin implicarse.
  - severity: low
    issue: Alternancia entre «jinetes» y «caballería»
    rationale: El mismo sustantivo griego ἵππος se entiende colectivamente en ambos lugares. Mantener «caballería» en ambos ayuda a la coherencia léxica con la auditoría inglesa.
  - severity: low
    issue: «una gran fuerza» suena algo calcado
    rationale: Aunque fiel, en español militar narrativo resulta más natural «una gran fuerza militar».
  revised_spanish_text: Y Apolonio lo oyó, y acampó con tres mil de caballería y una gran fuerza militar, y fue a Azoto como si estuviera de paso[a], y al mismo tiempo avanzó a la llanura[b], porque tenía una multitud de caballería y confiaba en ella.
  revised_footnotes:
