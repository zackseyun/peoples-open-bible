revisions:
- from: Yo he suscitado [a] a uno desde el norte, y ha venido; desde el nacimiento del sol invoca mi nombre. Vendrá sobre gobernantes como sobre barro [c][b], y como alfarero pisa el lodo.
  to: Yo he suscitado[a] a uno desde el norte, y ha venido; desde la salida del sol invoca mi nombre. Vendrá sobre gobernantes como sobre barro[c][b], y como un alfarero pisa el lodo.
  rationale: 'Se corrigen solo detalles menores de idiomaticidad y gramática sin cambiar la exégesis del borrador: «salida del sol» mejora la naturalidad y fidelidad imagética; se corrige la nota léxica de קרא בשם a un español normal; se arregla la concordancia en la nota sobre Ciro; y se añade «un» antes de «alfarero» para fluidez.'
