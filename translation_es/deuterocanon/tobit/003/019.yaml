base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/003/019.yaml
  text: And at all times bless the Lord God[a], and ask from him that your ways may be made straight and that all your paths and plans may prosper. For no nation has counsel, but the Lord himself gives all good things, and whomever he wills he humbles, as he wills. And now, child, remember my commandments[b], and do not let them be blotted out from your heart.
  footnotes:
  - marker: a
    text: Or, more literally, 'that your ways may become straight.' The Greek can express either becoming straight or being made straight.
    reason: lexical_alternative
  - marker: b
    text: The clause 'For no nation has counsel' is terse in Greek and may mean that no people possesses reliable counsel in itself, in contrast to the Lord who gives what is good.
    reason: alternative_reading
