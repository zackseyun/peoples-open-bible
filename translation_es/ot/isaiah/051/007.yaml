translation:
  language: es
  text: 'Escúchenme, ustedes que conocen la rectitud[a], pueblo con mi ley en su corazón[b]: no teman el reproche del hombre[c], ni se desalienten[d] por sus insultos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes que conocen la justicia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pueblo con mi instrucción en su corazón».'
    reason: lexical_alternative
  - marker: c
    text: «Hombre» traduce el hebreo אֱנוֹשׁ, un término singular para un ser humano, con frecuencia con matiz de fragilidad mortal; también puede entenderse como «humano» o «mortal».
    reason: lexical_alternative
  - marker: d
    text: 'O: «ni se quebranten» o «ni se desanimen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ אֵלַי
  english_pob_choice: Listen to me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Escúchenme a mí
  lexicon: HALOT
  rationale: El imperativo plural con אֵלַי exige una llamada directa y dirigida. «Escúchenme» suena natural en español y conserva el tono exhortativo sin caer en arcaísmo.
- source_word: יֹדְעֵי צֶדֶק
  english_pob_choice: you who know righteousness
  chosen_spanish: ustedes que conocen la justicia
  alternatives_spanish:
  - ustedes que conocen la rectitud
  - conocedores de la justicia
  lexicon: HALOT
  rationale: צֶדֶק puede ser «justicia» o «rectitud». Aquí la formulación vocativa y el contexto de la Torá interiorizada favorecen una lectura ética-covenantal; en español «justicia» es clara y conserva la amplitud del término sin forzar una abstracción técnica.
- source_word: עַם תּוֹרָתִי בְלִבָּם
  english_pob_choice: people with my law in their hearts
  chosen_spanish: pueblo con mi ley en su corazón
  alternatives_spanish:
  - pueblo con mi instrucción en su corazón
  - un pueblo en cuyo corazón está mi ley
  lexicon: HALOT
  rationale: תּוֹרָה puede ser «ley» o «instrucción». Se mantiene «ley» porque el contexto habla de norma pactal interiorizada. Se usa «pueblo» para reflejar el singular colectivo עַם, y «en su corazón» para reproducir la imagen de internalización.
- source_word: חֶרְפַּת אֱנוֹשׁ
  english_pob_choice: the reproach of man
  chosen_spanish: el reproche del hombre
  alternatives_spanish:
  - el oprobio del hombre
  - la burla de un mortal
  - el reproche humano
  lexicon: HALOT
  rationale: חֶרְפָּה denota reproche, afrenta o deshonra; «reproche» preserva el valor verbal-abusivo. אֱנוֹשׁ se traduce por «hombre» para conservar el singular genérico y la fuerza retórica de la frailidad humana frente a Dios.
- source_word: וּמִגִּדֻּפֹתָם
  english_pob_choice: and do not be dismayed by their insults
  chosen_spanish: ni se desalienten por sus insultos
  alternatives_spanish:
  - ni se avergüencen por sus injurias
  - ni se quebranten por sus ultrajes
  - ni se sientan abatidos por sus insultos
  lexicon: HALOT
  rationale: גדף remite a habla injuriosa o de vituperio; «insultos» es la equivalencia más transparente en español actual. Para תֵּחָתּוּ, el POB revisado optó por un verbo de desánimo; «se desalienten» comunica bien la caída interior provocada por el vituperio y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Valor de צֶדֶק en el vocativo
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: Aunque «rectitud» también es posible, en este pasaje el término funciona como cualidad moral y fidelidad al orden de Dios. «Justicia» conserva mejor el campo semántico amplio y la resonancia profética sin reducirlo a mera legalidad.
  doctrine_reference: 'POB contested terms: δικαιοσύνη/צֶדֶק se traduce normalmente como «justicia» o «rectitud» según contexto.'
- issue: Traducción de אֱנוֹשׁ como genérico humano singular
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - un mortal
  rationale: El hebreo destaca el contraste entre la humanidad frágil y la voz de Yahvé. «El hombre» conserva ese singular genérico y la tensión retórica del texto, sin introducir una paráfrasis explicativa.
  doctrine_reference: 'Principio de traducción con género-accurate: conservar el singular genérico cuando el original lo presenta así y el contexto retórico depende de ello.'
- issue: Sentido de תֵּחָתּוּ
  english_pob_reading: do not be dismayed
  chosen_spanish_reading: no se desalienten
  alternative_spanish_readings:
  - no se quiebren
  - no se aterroricen
  - no se desmoronen
  rationale: El hebreo puede abarcar quedar abatido, quebrado o desanimado. Dado el paralelo con el temor y el reproche, «desalentarse» expresa bien la respuesta interna de derrota ante el insulto, sin imponer una imagen más fuerte de ruptura que el contexto inmediato no exige.
  doctrine_reference: 'POB revision pass: se priorizó una forma más natural y exacta para אַל תֵּחָתּוּ dentro de un registro formal.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del POB inglés que ajustó אַל תֵּחָתּוּ desde una imagen más fuerte de «be shattered» a una formulación más natural y precisa, «be dismayed». En español se optó por «se desalienten», que reproduce ese valor de abatimiento interior sin perder la intensidad del paralelo con el reproche y los insultos.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca explícitamente en este versículo, sino por la política general del proyecto cuando el contexto inmediato remite al discurso divino de Isaías.
  - Se prefirió «ley» frente a «instrucción» siguiendo la decisión inglesa auditada y la normatividad pactal de תּוֹרָה en este contexto.
  - Se conservó el singular genérico «el hombre» para אֱנוֹשׁ, en coherencia con la política de precisión frente a la neutralización automática.
