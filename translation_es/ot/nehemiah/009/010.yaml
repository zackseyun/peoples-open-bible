revisions:
- from: Tú hiciste señales y maravillas contra el faraón[a], contra todos sus siervos y contra todo el pueblo de su tierra, porque sabías que se habían comportado con presunción[b] contra ellos. Así te hiciste un nombre, como en este día.
  to: Hiciste señales y maravillas[a] contra el faraón, contra todos sus siervos y contra todo el pueblo de su tierra, porque sabías que se habían comportado con presunción[b] contra ellos. Así te hiciste un nombre, como hasta el día de hoy.
  rationale: Se corrige el modismo temporal final para reflejar fielmente el hebreo y sonar natural en español ('como hasta el día de hoy'). Se reubica la nota [a] sobre la expresión que realmente comenta. Además, se elimina el 'Tú' explícito por estilo español más natural sin cambiar el sentido.
