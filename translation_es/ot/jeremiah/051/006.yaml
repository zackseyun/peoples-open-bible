  text: נֻ֣סוּ מִ/תּ֣וֹךְ בָּבֶ֗ל וּ/מַלְּטוּ֙ אִ֣ישׁ נַפְשׁ֔/וֹ אַל תִּדַּ֖מּוּ בַּ/עֲוֺנָ֑/הּ כִּי֩ עֵ֨ת נְקָמָ֥ה הִיא֙ לַֽ/יהוָ֔ה גְּמ֕וּל ה֥וּא מְשַׁלֵּ֖ם לָֽ/הּ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/006.yaml
  text: Flee from the midst of Babylon[a], and let each man save his life. Do not perish in her iniquity, for this is the time of Yahweh's vengeance; he is repaying her what she deserves.
  footnotes:
  - marker: a
    text: Or 'Do not perish in her guilt' or 'Do not be destroyed because of her iniquity.' The Hebrew can express either being caught up in Babylon's sin or in the judgment that comes because of it.
    reason: lexical_alternative
