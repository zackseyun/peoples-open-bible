revisions:
- from: Y envió a su hermano como jefe de la multitud, y rogó a sus amigos nabateos que tomaran en custodia para ellos su abundante equipaje.
  to: Y envió a su hermano como jefe del grupo, y pidió a sus amigos nabateos que recibieran en custodia[a] su abundante equipaje.
  rationale: Se ajusta «rogó» a «pidió» para no sobredramatizar παρεκάλεσεν; se cambia «multitud» por «grupo» para una lectura más natural en este contexto; y se conserva el matiz léxico documentado de παραθέσθαι mediante una nota, mientras el texto principal usa «recibieran en custodia», que expresa bien la recepción y protección del equipaje.
