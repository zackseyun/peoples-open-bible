translation:
  language: es
  text: 'Entonces Amán dijo al rey Asuero[a]: «Hay cierto pueblo, disperso y separado entre los pueblos en todas las provincias de tu reino. Sus leyes son distintas de las de cualquier otro pueblo, y no obedecen las leyes del rey; por eso no conviene al rey dejarlos permanecer[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jerjes». La forma «Asuero» sigue la tradición castellana para אֲחַשְׁוֵרוֹשׁ y mantiene la identificación del personaje en Ester.
    reason: cultural_note
  - marker: b
    text: O «dejarlos solos» / «tolerarlos». El verbo hebreo puede expresar permitir que alguien quede sin ser perturbado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶשְׁנוֹ עַם אֶחָד
  english_pob_choice: There is a certain people
  chosen_spanish: Hay un pueblo singular
  alternatives_spanish:
  - Hay un cierto pueblo
  - Hay un pueblo
  lexicon: HALOT
  rationale: La expresión introduce un referente indefinido pero señalado. «Un pueblo singular» conserva ese matiz insinuante de Amán sin volverlo demasiado abstracto. «Cierto» también es posible, pero en español suena algo menos natural aquí.
- source_word: מְפֻזָּר וּמְפֹרָד
  english_pob_choice: scattered and separated
  chosen_spanish: disperso y esparcido
  alternatives_spanish:
  - disperso y separado
  - diseminado y separado
  lexicon: HALOT
  rationale: Se preservan los dos participios hebreos como una doble caracterización. «Disperso y esparcido» refleja bien la idea de estar repartido entre otros pueblos; «separado» podría sonar más a división interna que al sentido geográfico/racial del contexto.
- source_word: בֵּין הָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los demás pueblos
  lexicon: HALOT
  rationale: «Pueblos» reproduce mejor el plural étnico del hebreo en este contexto imperial. «Naciones» es posible, pero en español puede cargar una connotación política moderna menos precisa aquí.
- source_word: בְּכֹל מְדִינ֣וֹת מַלְכוּתֶ֑ךָ
  english_pob_choice: in all the provinces of your kingdom
  chosen_spanish: en todas las provincias de tu reino
  alternatives_spanish:
  - por todas las provincias de tu reino
  lexicon: HALOT
  rationale: «Provincias» es el equivalente natural para מְדִינוֹת en Ester, donde se refiere a divisiones administrativas. La frase mantiene la relación directa con «tu reino» sin añadir interpretación.
- source_word: וְדָתֵי/הֶם
  english_pob_choice: their laws
  chosen_spanish: Sus leyes
  alternatives_spanish:
  - Sus decretos
  - Sus normas
  lexicon: HALOT
  rationale: En Ester, דָּת puede abarcar ley, decreto o costumbre, pero aquí el contraste con «las leyes del rey» hace que «leyes» sea la opción más fiel. «Normas» debilitaría el peso jurídico de la acusación.
- source_word: שֹׁנ֣וֹת מִכָּל עָם
  english_pob_choice: are different from those of every other people
  chosen_spanish: son distintas de las de cualquier otro pueblo
  alternatives_spanish:
  - son diferentes de las de todo otro pueblo
  - difieren de las de cualquier otro pueblo
  lexicon: HALOT
  rationale: La comparación se mantiene explícita. «Distintas de las de cualquier otro pueblo» preserva la idea de contraste con los demás grupos, sin forzar un tono demasiado técnico.
- source_word: וְאֶת דָּתֵ֤י הַמֶּ֨לֶךְ֙ אֵינָ֣/ם עֹשִׂ֔ים
  english_pob_choice: and they do not keep the king’s laws
  chosen_spanish: y no obedecen las leyes del rey
  alternatives_spanish:
  - y no cumplen las leyes del rey
  - y no observan las leyes del rey
  lexicon: HALOT
  rationale: «Hacer» leyes en hebreo suele equivaler a practicar u obedecer. «Obedecen» comunica el sentido con claridad en español y evita la traducción mecánica «hacen».
- source_word: וְ/לַ/מֶּ֥לֶךְ אֵין שֹׁוֶ֖ה
  english_pob_choice: so it is not in the king’s interest
  chosen_spanish: por eso no conviene al rey
  alternatives_spanish:
  - por eso no le beneficia al rey
  - por eso no es provechoso para el rey
  lexicon: HALOT
  rationale: La expresión hebrea apunta a conveniencia/beneficio. «No conviene al rey» es breve, natural y refleja la lógica persuasiva de Amán; «interés» sería posible, pero suena más abstracto en español litúrgico.
- source_word: לְ/הַנִּיחָֽ/ם
  english_pob_choice: to let them remain
  chosen_spanish: dejarlos permanecer
  alternatives_spanish:
  - dejarlos en paz
  - tolerarlos
  lexicon: HALOT
  rationale: El verbo puede significar dejar estar, permitir permanecer o no molestar. «Dejarlos permanecer» conserva esa amplitud sin introducir una hostilidad adicional que el hebreo no exige por sí mismo.
translation_notes:
  revision_awareness: El texto inglés POB mantiene una equivalencia óptima y ya ofrece una nota léxica para לְהַנִּיחָם. La presente versión española sigue esa línea, conservando el tono insinuante de Amán, la doble caracterización de «disperso y esparcido», y el valor jurídico de דָּת como «leyes». No se detectaron revisiones aplicadas en el expediente inglés; la traducción se alinea con el estado estable del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Pueblos» se usa para עַמִּים en sentido étnico/plural, no como «naciones» salvo que el contexto lo exija.
  - «Leyes» conserva la fuerza legal de דָּת en Ester y evita suavizarla como «costumbres».
  - La nota [b] se ubica en el verbo final porque allí está la ambigüedad léxica principal del hebreo.
