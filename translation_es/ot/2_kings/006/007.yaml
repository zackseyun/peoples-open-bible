  spanish_quality_summary: La redacción actual es comprensible pero «Levántalo para ti» resulta poco idiomática en español bíblico natural y puede sonar extraña o demasiado literal. «Sácalo para ti» mejora notablemente la legibilidad y la adecuación contextual sin alejarse del sentido fuente. El resto de la frase es claro, digno y natural.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión clave es verbal: para הָרֶם conviene una forma española más idiomática en este contexto que «levantar», y para לָךְ se conserva el matiz dativo con «para ti».'
