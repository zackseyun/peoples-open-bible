translation:
  language: es
  text: En la plenitud de su abundancia, la angustia[a] le sobrevendrá; toda mano de los miserables[b] vendrá contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la estrechez le sobrevendrá». El hebreo es compacto y permite matices como «estrechez», «angustia» o «aflicción».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toda mano de los afligidos», «toda mano de los que sufren» o «toda mano de los que trabajan con fatiga». El hebreo puede apuntar a miseria, sufrimiento o duro afán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְלֹאות
  english_pob_choice: In the fullness of
  chosen_spanish: En la plenitud de
  alternatives_spanish:
  - Cuando esté lleno
  - Al colmarse
  lexicon: HALOT
  rationale: La construcción temporal-circunstancial conserva mejor en español la idea de un momento de plenitud. «En la plenitud de» mantiene la imagen y la relación con el estado previo del hombre.
- source_word: שִׂפְקוֹ
  english_pob_choice: his abundance
  chosen_spanish: su abundancia
  alternatives_spanish:
  - su suficiencia
  - su prosperidad
  - su abundancia suficiente
  lexicon: HALOT
  rationale: El sustantivo expresa suficiencia/plenitud de recursos. «Abundancia» es una opción natural y fiel en español, y preserva el tono de prosperidad implicado en el contexto.
- source_word: יֵצֶר לוֹ
  english_pob_choice: distress will come upon him
  chosen_spanish: la angustia le sobrevendrá
  alternatives_spanish:
  - estará en angustia
  - le vendrá estrechez
  - será afligido
  lexicon: HALOT
  rationale: El hebreo comunica constricción o aflicción que cae sobre la persona. «Le sobrevendrá» reproduce el movimiento hacia él, y «angustia» comunica bien la idea de estrechez/distress sin desdibujarla.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - toda la
  lexicon: HALOT
  rationale: «Toda» encaja naturalmente con «mano» y conserva el valor distributivo del hebreo.
- source_word: יַד
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - fuerza
  - mano
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal/metonímica de «mano» para no suavizar el hebraísmo. El contexto adversativo permite entender la agencia hostil sin explicitarla de más.
- source_word: עָמֵל
  english_pob_choice: the miserable
  chosen_spanish: el miserable
  alternatives_spanish:
  - el afligido
  - el que trabaja
  - el fatigado
  - los miserables
  lexicon: HALOT
  rationale: La revisión inglesa favorece el matiz de wretched/miserable más que una idea de simple labor. En español, «el miserable» reproduce ese campo semántico y evita introducir una pasividad no marcada por el hebreo.
- source_word: תְּבוֹאֶנּוּ
  english_pob_choice: will come against him
  chosen_spanish: se volverá contra él
  alternatives_spanish:
  - vendrá sobre él
  - lo alcanzará
  - vendrá contra él
  lexicon: HALOT
  rationale: El verbo de venir con objeto pronominal en contexto hostil admite un sentido adversativo. «Se volverá contra él» hace explícita la hostilidad implícita en «every hand» y fluye de modo natural en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'the miserable' a 'the afflicted' para עָמֵל, y se trasladó ese ajuste al español con «el miserable». También se respetó la decisión de mantener la fuerza adversativa de 'will come against him' sin volverlo una simple llegada neutral.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general de la serie, pero este verso no contiene el Tetragrámaton.
  - Se prefirió un español claro y publicable sin perder la compactación del hebreo.
  - «Angustia» y «se volverá contra él» conservan el paralelismo y la dirección hostil del texto fuente.
