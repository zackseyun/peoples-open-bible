    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el que ha matado»; el término hebreo aquí es más amplio que «asesino» en este contexto de ciudades de refugio.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el tono verbal al registro legal del hebreo mediante futuros de mandato, y se corrigen las notas para que cada una quede anclada al elemento correcto del texto. La nota literal sobre «y será para huir allí» se traslada a la cláusula de huida, y la nota sobre la amplitud de רֹצֵחַ se coloca en 'homicida' con español natural.
