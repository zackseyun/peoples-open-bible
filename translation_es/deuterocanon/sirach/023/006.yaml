translation:
  language: es
  text: No permitas que el apetito del vientre y las relaciones sexuales[a] se apoderen de mí, ni me entregues a un alma desvergonzada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coito» o «unión sexual»; el griego puede referirse de manera relativamente neutra a la unión sexual, pero en esta oración contra las pasiones el contexto le da una fuerza ética negativa.
    reason: lexical_alternative
  - marker: b
    text: O «un yo desvergonzado». El griego dice literalmente «un alma desvergonzada».
    reason: lexical_alternative
lexical_decisions:
- source_word: κοιλίας
  english_pob_choice: of the belly
  chosen_spanish: del vientre
  alternatives_spanish:
  - del estómago
  - del cuerpo
  lexicon: LSJ
  rationale: En este contexto sapiencial, κoιλία expresa apetito corporal. «Vientre» conserva la imagen concreta y la conexión con el deseo físico sin sonar clínico ni demasiado abstracto.
- source_word: ὄρεξις
  english_pob_choice: appetite
  chosen_spanish: apetito
  alternatives_spanish:
  - deseo
  - ansia
  - ansia de
  lexicon: LSJ
  rationale: El término designa deseo o apetito; «apetito» reproduce bien la fuerza de impulso corporal y encaja naturalmente con «del vientre».
- source_word: συνουσιασμός
  english_pob_choice: sexual intercourse
  chosen_spanish: las relaciones sexuales
  alternatives_spanish:
  - el coito
  - la unión sexual
  - el contacto sexual
  lexicon: LSJ
  rationale: Aunque el inglés audit trail pasó de una lectura más moralizada a «sexual intercourse», el español «relaciones sexuales» conserva la referencia sexual directa y resulta más natural y publicable que un calco técnico. Se mantiene la neutralidad léxica del término griego, sin suavizar ni intensificar indebidamente.
- source_word: μὴ καταλαβέτωσάν με
  english_pob_choice: Do not let ... overtake me
  chosen_spanish: me dominen
  alternatives_spanish:
  - me alcancen
  - me atrapen
  - me sobrepasen
  lexicon: LSJ
  rationale: καταλαμβάνω aquí tiene la idea de ser alcanzado, tomado o vencido. «Dominen» expresa bien la noción de ser vencido por impulsos que toman control, con español claro y sobrio.
- source_word: ψυχὴ ἀναιδεῖ
  english_pob_choice: a shameless soul
  chosen_spanish: un alma desvergonzada
  alternatives_spanish:
  - un alma impúdica
  - un ser desvergonzado
  - una persona desvergonzada
  lexicon: LSJ
  rationale: «Alma» mantiene el registro antropológico de ψυχή; «desvergonzada» comunica ἀναιδής con naturalidad en español y conserva el matiz moral de falta de pudor o recato.
- source_word: μὴ παραδῷς με
  english_pob_choice: do not give me over
  chosen_spanish: ni me entregues
  alternatives_spanish:
  - ni me abandones
  - ni me entregues en manos de
  - ni me dejes
  lexicon: LSJ
  rationale: παραδίδωμι se traduce de modo directo como «entregar» en el sentido de poner a alguien en manos de algo. «Ni me entregues» conserva la fuerza de la súplica y el paralelo con la primera cláusula.
theological_decisions:
- issue: Cómo verter συνουσιασμός sin moralizar de más ni neutralizar el contexto de vicio
  english_pob_reading: sexual intercourse
  chosen_spanish_reading: las relaciones sexuales
  alternative_spanish_readings:
  - el coito
  - la unión sexual
  - la sexualidad
  rationale: El texto es una oración de petición contra impulsos desordenados. «Las relaciones sexuales» mantiene referencia explícita al ámbito sexual sin imponer una valoración excesiva como «lujuria» o «indulgencia sexual», y sin volver el término demasiado técnico.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrase.'
- issue: Si ψυχή debe mantenerse como imagen antropológica o convertirse en un equivalente funcional
  english_pob_reading: a shameless soul
  chosen_spanish_reading: un alma desvergonzada
  alternative_spanish_readings:
  - un yo desvergonzado
  - una persona desvergonzada
  - un corazón desvergonzado
  rationale: Se conserva «alma» para respetar la antropología del griego y su textura sapiencial. En español, «alma desvergonzada» suena natural y no elimina el vínculo entre interioridad y conducta.
  doctrine_reference: Readable modern Spanish without flattening theological weight.
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase de συνουσιασμός desde una paráfrasis moralizada («sexual indulgence») a una formulación más directa («sexual intercourse»). La versión española sigue esa revisión evitando intensificar el término y optando por una equivalencia natural y explícita. También se preserva la referencia antropológica de ψυχή con «alma», como en el inglés final.
  spanish_consistency_notes:
  - Se mantiene el tuteo reverente en forma negativa con «No permitas...», acorde al tono de súplica del verso.
  - Se evita «SEÑOR» u otros términos no presentes en el griego; no hay nombres divinos en este versículo.
  - «Vientre», «apetito» y «alma» conservan la imaginería corporal y moral del original sin modernizarla en exceso.
