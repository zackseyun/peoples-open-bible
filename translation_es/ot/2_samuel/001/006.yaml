revisions:
- from: 'Y el joven que le daba el informe dijo[a]: «Yo me encontré por casualidad en el monte Gilboa, y, he aquí, Saúl estaba apoyado sobre su lanza, y, he aquí[b], los carros y los jinetes lo iban alcanzando[c]».'
  to: 'Y el joven que le informó dijo[a]: «Yo me hallaba por casualidad[b] en el monte Gilboa, y he aquí, Saúl estaba apoyado sobre su lanza, y he aquí, los carros[c] y los jinetes lo iban alcanzando[d]».'
  rationale: La revisión mantiene el sentido del borrador, pero mejora la fidelidad al hebreo y al audit trail inglés. Se reemplaza «que le daba el informe» por «que le informó» para evitar un tono burocrático; se ajusta la idiomática de presencia fortuita a «me hallaba por casualidad»; y se añaden notas que preservan las alternativas relevantes documentadas en inglés, incluida la de la frase militar. También se suaviza la puntuación alrededor de «he aquí» para una lectura más natural en español.
