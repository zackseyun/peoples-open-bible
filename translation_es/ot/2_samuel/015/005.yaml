revisions:
- from: Y sucedía que, cuando un hombre se acercaba para postrarse ante él[a], él extendía su mano, lo tomaba y lo besaba.
  to: Y cuando un hombre se acercaba para postrarse ante él[a], él extendía su mano, lo sujetaba y lo besaba.
  rationale: Se simplificó la apertura para expresar la acción habitual de manera más natural en español, y se precisó el gesto de החזיק con 'lo sujetaba', que comunica mejor el contacto físico cortés del contexto que el vago 'lo tomaba'.
