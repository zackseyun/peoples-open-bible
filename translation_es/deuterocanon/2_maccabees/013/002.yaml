  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. La adaptación «Lisias» es adecuada. La decisión de conservar «miríadas» coincide con el razonamiento documentado del POB. «Guardián» preserva bien ἐπίτροπον; «supervisor de los asuntos» alinea mejor con el inglés auditado «overseer of affairs» que «encargado de los asuntos», aunque este último no es erróneo.
  issues:
