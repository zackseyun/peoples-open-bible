revisions:
- from: Pero Yahvé[a], que los hizo subir de la tierra de Egipto con gran poder y con brazo extendido, a él temerán; ante él se inclinarán[b], y a él ofrecerán sacrificios.
  to: Pero Yahvé[a], que los hizo subir de la tierra de Egipto con gran poder y con un brazo extendido, a él le temerán[b], a él se postrarán, y a él sacrificarán.
  rationale: La revisión mantiene el sentido del hebreo y del POB inglés, mejora la naturalidad del español, restaura la nota semántica correcta sobre 'temer' y preserva mejor la repetición enfática 'a él' en los tres verbos de respuesta cultual.
  reviewer_model: gpt-5.4
