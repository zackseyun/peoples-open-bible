translation:
  text: For because of every matter the eye trembles[a], and from the face tears will flow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The surviving Hebrew here differs sharply from the Greek tradition, which reads: ''The one who fears the Lord will certainly not be timid, and will certainly not be cowardly, because he himself is his hope.'' The main text follows the extant Hebrew witness.'
    reason: textual_variant
lexical_decisions:
- source_word: כי
  chosen: For because
  alternatives:
  - For
  - because
  lexicon: HALOT
  rationale: The Hebrew opens with כי and the clause is elliptical and difficult. Given the surviving wording, it most naturally introduces an explanatory statement; rendering both causal nuances in English best reflects the compressed Hebrew without over-resolving it.
- source_word: מפני כל דבר
  chosen: because of every matter
  alternatives:
  - before every thing
  - at every word
  - from every cause
  lexicon: HALOT
  rationale: מפני commonly carries the sense 'because of' or 'from before/in the presence of.' With כל דבר, 'every matter' preserves the broad semantic range of דבר as thing, matter, or word. 'Matter' is chosen because the line appears proverbial and general rather than tied to speech alone.
- source_word: תזוע עין
  chosen: the eye trembles
  alternatives:
  - the eye is shaken
  - the eye quivers
  - the eye is disturbed
  lexicon: HALOT
  rationale: The verb זוע conveys shaking or trembling. Keeping 'eye' singular matches the Hebrew and preserves the vivid bodily image rather than smoothing to an abstract emotional paraphrase.
- source_word: ומפנים
  chosen: and from the face
  alternatives:
  - and from within
  - and from the presence
  - and from the countenance
  lexicon: HALOT
  rationale: פנים literally means 'face.' Although idiomatic English might prefer 'from the eyes' or 'down the cheeks,' the Hebrew says 'from the face,' and the translation preserves that image.
- source_word: דמעה תדמע
  chosen: tears will flow
  alternatives:
  - a tear will weep
  - tears will drip
  - weeping will weep
  lexicon: HALOT
  rationale: The noun-verb pairing intensifies the image. A highly literal rendering ('a tear will weep') is awkward in English, so 'tears will flow' captures the sense of tearful weeping while remaining readable.
