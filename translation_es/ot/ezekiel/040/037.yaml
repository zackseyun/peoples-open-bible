translation:
  language: es
  text: Su pórtico[a] daba hacia el atrio exterior, y había palmeras[b] en sus jambas, de un lado y del otro; y ocho gradas subían hasta él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vestíbulo/porche daba hacia el atrio exterior». El término hebreo puede referirse al elemento de entrada del portal.
    reason: lexical_alternative
  - marker: b
    text: O «motivos de palmera» o «decoraciones de palmera». El hebreo nombra palmeras explícitamente, pero en este contexto arquitectónico quizá se trate de relieves tallados.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵילָיו / אֵילָו
  english_pob_choice: its portico
  chosen_spanish: su pórtico
  alternatives_spanish:
  - su vestíbulo
  - su portal
  lexicon: HALOT
  rationale: En este contexto arquitectónico de Ezequiel 40, el término designa la estructura de acceso del portal. «Pórtico» comunica bien esa función en español y conserva el matiz arquitectónico que el inglés POB fijó con «portico».
- source_word: לֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: faced the outer court
  chosen_spanish: daba hacia el atrio exterior
  alternatives_spanish:
  - estaba hacia el atrio exterior
  - miraba al atrio exterior
  lexicon: HALOT
  rationale: La preposición con el sustantivo arquitectónico expresa orientación. En español, «daba hacia» es natural y evita una traducción mecánica, manteniendo la relación espacial del hebreo.
- source_word: תִמֹרִים
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - árboles de palma
  - motivos de palmera
  lexicon: HALOT
  rationale: El hebreo nombra literalmente palmeras/palmas. Dado que el contexto es arquitectónico, puede aludir a decoración tallada, pero el texto fuente no lo explicita. «Palmeras» conserva la expresión visible del hebreo sin cerrar indebidamente la ambigüedad.
- source_word: אֶל אֵילָיו
  english_pob_choice: on its jambs
  chosen_spanish: en sus jambas
  alternatives_spanish:
  - sobre sus pilastras
  - en sus postes laterales
  lexicon: HALOT
  rationale: Aquí la referencia es a los elementos laterales de la puerta. «Jambas» expresa de forma breve y precisa esa parte arquitectónica, concordando con la lectura auditada del inglés POB.
- source_word: מִפּוֹ וּמִפּוֹ
  english_pob_choice: on this side and on that side
  chosen_spanish: de un lado y del otro
  alternatives_spanish:
  - a ambos lados
  - por este lado y por el otro
  lexicon: HALOT
  rationale: La pareja distributiva hebrea subraya la simetría. «De un lado y del otro» mantiene el paralelismo y evita comprimir demasiado la repetición del original.
- source_word: שְׁמֹנֶה מַעֲלוֹת
  english_pob_choice: eight steps
  chosen_spanish: ocho gradas
  alternatives_spanish:
  - ocho escalones
  - ocho peldaños
  lexicon: HALOT
  rationale: En un contexto de acceso arquitectónico, «gradas» suena natural y dignifica la imagen de subida. Conserva el sentido de los peldaños sin introducir una modernización innecesaria.
- source_word: מַעֲלוֹ
  english_pob_choice: went up to it
  chosen_spanish: subían hasta él
  alternatives_spanish:
  - subían a él
  - llegaban hasta él
  lexicon: HALOT
  rationale: El singular con sufijo retoma la subida asociada a la estructura. «Subían hasta él» reproduce la imagen del ascenso y conserva la relación con las gradas, como hace el inglés POB.
translation_notes:
  revision_awareness: Se siguió el pasaje tal como aparece en el paquete fuente y la traducción auditada en inglés; no se registran revisiones aplicadas en el historial más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponde al Tetragrámaton; este versículo no lo contiene.
  - 'Se prefirió terminología arquitectónica consistente con el capítulo: «pórtico», «atrio», «jambas», «gradas».'
  - Se conservó la ambigüedad de «palmeras» mediante nota, en línea con el tratamiento auditado en inglés POB.
