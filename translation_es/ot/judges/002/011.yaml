translation:
  language: es
  text: Y los hijos de Israel hicieron lo malo[a] a los ojos de Yahvé, y sirvieron a los Baales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «adoraron a los Baales». El verbo hebreo puede denotar servicio prestado en adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cometieron
  - obraron
  lexicon: HALOT
  rationale: El hebreo usa עשה en una fórmula moral fija con «lo malo». En español, «hicieron lo malo» conserva la naturalidad de la construcción y refleja el valor general de «did» sin añadir especificaciones que el hebreo no exige.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión filial del original, equivalente de manera directa a «the sons of Israel». «Los israelitas» es posible, pero suaviza la imagen familiar que el hebreo conserva.
- source_word: אֶת־הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo perverso
  lexicon: HALOT
  rationale: 'La frase hebrea funciona como un modismo: «hacer el mal». En español, «lo malo» transmite la cualidad moral sin sonar forzado y evita sobreinterpretar con una abstracción más fuerte de la que el texto necesita.'
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora ocular del hebreo. «Ante los ojos de Yahvé» reproduce con claridad la idea de evaluación divina y mantiene el carácter idiomático de בְּעֵינֵי.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la terminología POB para el Tetragrámaton. «Yahvé» preserva el nombre divino personal y evita la sustitución por un título.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron servicio
  lexicon: HALOT
  rationale: «Servir» conserva el alcance amplio de עבד, que puede incluir servicio cultual sin reducirse necesariamente a «adorar». En este contexto idólatra, el verbo español mantiene la tensión entre servicio y culto.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los baales
  alternatives_spanish:
  - los Baales
  - las imágenes de Baal
  lexicon: HALOT
  rationale: Se preserva el plural hebreo y el sentido polemizante del texto. En español, «baales» comunica la pluralidad de cultos o manifestaciones locales sin singularizar indebidamente la referencia.
theological_decisions:
- issue: Cómo rendir el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El pasaje nombra directamente a יְהוָה. La decisión española debe conservar el nombre propio divino, no reemplazarlo por un título, para mantener la transparencia del texto fuente y la coherencia del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Si וַיַּעַבְדוּ debe explicitar culto idólatra como 'adoraron'
  english_pob_reading: served
  chosen_spanish_reading: sirvieron
  alternative_spanish_readings:
  - adoraron
  - dieron culto
  rationale: Aunque el contexto es idolátrico, el verbo hebreo puede abarcar servicio y, en ciertos contextos, culto. «Sirvieron» conserva esa amplitud y evita cerrar el sentido a una sola práctica religiosa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado revisado más reciente del POB en inglés, que no introdujo cambios respecto del borrador anterior. La versión española conserva esa misma solución interpretativa: nombre divino transliterado, modismo de evaluación divina en forma idiomática y verbo de servicio no restringido a ''adorar''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con el estándar del proyecto.
  - Se preserva el plural 'baales' para הַבְּעָלִים, evitando la singularización.
  - Se usa un registro bíblico claro y moderno, sin calcos ingleses innecesarios.
  - Las notas al pie se anclan donde el español admite una alternativa lexical real.
