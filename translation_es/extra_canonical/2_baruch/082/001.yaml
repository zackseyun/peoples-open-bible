theological_decisions:
- issue: Títulos divinos en la sección escatológica
  english_pob_reading: Distinguish 'the Most High' from 'the Mighty One.'
  chosen_spanish_reading: Distinguir 'el Altísimo' de 'el Poderoso'.
  alternative_spanish_readings:
  - unificar ambos títulos como 'Dios'
  - usar solo 'el Altísimo'
  rationale: El siríaco alterna títulos con matiz retórico distinto; mantener ambos preserva la textura teológica del pasaje.
  doctrine_reference: Divine names and titles in apocalyptic discourse
- issue: Imaginería de inversión final
  english_pob_reading: Treat the reversals as final apocalyptic transformation, not merely moral observation.
  chosen_spanish_reading: Tratar las inversiones como transformación apocalíptica final, no como simple observación moral.
  alternative_spanish_readings:
  - leerlo como sabiduría general sobre lo cambiante de la vida
  - suavizarlo como metáfora ética
  rationale: El contexto de juicio, revelación y Sheol obliga a leer la lista como consumación escatológica.
  doctrine_reference: Eschatology and final judgment
- issue: שׁאול / ܫܝܘܠ
  english_pob_reading: Retain 'Sheol.'
  chosen_spanish_reading: Retener 'Sheol'.
  alternative_spanish_readings:
  - traducirlo como 'infierno'
  - traducirlo como 'sepulcro'
  rationale: '''Sheol'' evita cargar el texto con categorías infernales posteriores y deja visible el referente semítico antiguo.'
