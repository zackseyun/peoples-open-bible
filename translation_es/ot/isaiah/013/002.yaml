translation:
  language: es
  text: Sobre un monte desnudo, alzad una señal[a]; levantad la voz hacia ellos; agitad la mano[b], para que entren por las puertas de los nobles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandera» o «estandarte» para «señal». El hebreo נֵס suele denotar una insignia alzada para reunir o dirigir tropas.
    reason: lexical_alternative
  - marker: b
    text: O «haced señas con la mano». El gesto probablemente funciona como una convocatoria a la fuerza atacante.
    reason: lexical_alternative
  - marker: c
    text: O «de los príncipes». נְדִיבִים puede designar nobles, príncipes u այլ altos dignatarios.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁפֶּה
  english_pob_choice: bare
  chosen_spanish: desnudo
  alternatives_spanish:
  - pelado
  - pelado de árboles
  - yermo
  lexicon: HALOT
  rationale: El hebreo describe un monte despojado de cobertura. «Desnudo» comunica la imagen de una altura expuesta y sirve bien en español sin añadir más de lo que el texto exige.
- source_word: נֵס
  english_pob_choice: signal
  chosen_spanish: señal
  alternatives_spanish:
  - bandera
  - estandarte
  - señal alzada
  lexicon: HALOT
  rationale: En contexto militar/profético, נֵס es un signo alzado para convocar o dirigir. «Señal» comunica la función con naturalidad; «bandera» o «estandarte» son posibles, pero pueden restringir innecesariamente el sentido.
- source_word: הָרִימוּ קוֹל
  english_pob_choice: lift up the voice
  chosen_spanish: levantad la voz
  alternatives_spanish:
  - alzad la voz
  - levantad la voz en alta
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente habla de «levantar la voz». «Levantad la voz» mantiene esa imagen y suena natural en español bíblico moderno.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: HALOT
  rationale: El movimiento de la convocatoria se dirige a los que vienen. «Hacia ellos» conserva la dirección del llamado sin cargarlo de una interpretación más específica que el hebreo no obliga.
- source_word: הָנִיפוּ יָד
  english_pob_choice: wave the hand
  chosen_spanish: agitad la mano
  alternatives_spanish:
  - haced señas con la mano
  - saludad con la mano
  - hacédles señas
  lexicon: HALOT
  rationale: El gesto es físico y visible; «agitad la mano» conserva el movimiento concreto. «Hacer señas» explicita la función, pero pierde algo de la imagen corporal del hebreo.
- source_word: וְיָבֹאוּ
  english_pob_choice: that they may enter
  chosen_spanish: para que entren
  alternatives_spanish:
  - y entren
  - para que puedan entrar
  lexicon: HALOT
  rationale: El valor de propósito/resulta mejor en español con «para que». «Entren» se ajusta al objeto inmediato «las puertas» mejor que un simple «vengan».
- source_word: פִּתְחֵי
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - entradas
  - puertas de acceso
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «gates», el hebreo פִּתְחֵי enfatiza aperturas o accesos. En español, «puertas» es natural y suficientemente amplio para el contexto de entrada a una ciudad o recinto.
- source_word: נְדִיבִים
  english_pob_choice: the nobles
  chosen_spanish: de los nobles
  alternatives_spanish:
  - de los príncipes
  - de los notables
  - de los principales
  lexicon: HALOT
  rationale: El término designa personas prominentes, aristócratas o jefes. «Nobles» es amplio y fiel; el genitivo «de los nobles» refleja de forma natural la construcción hebrea de puertas asociadas a ese grupo.
theological_decisions:
- issue: Alcance de la señal levantada en un contexto de juicio militar
  english_pob_reading: signal rather than a churchly or ceremonial banner; the verse summons forces to a strategic point.
  chosen_spanish_reading: señal, entendida como convocatoria militar/profética, no como emblema litúrgico.
  alternative_spanish_readings:
  - bandera
  - estandarte
  rationale: El contexto del pasaje es bélico y profético. Traducir con «señal» evita sacralizar o ceremonializar el objeto y conserva su función de convocatoria.
  doctrine_reference: Isaías 13 en su marco oracular de juicio sobre Babilonia; cf. uso militar de נֵס en textos proféticos.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo WLC y del audit trail inglés. La formulación española conserva la secuencia imperativa, la imagen de la altura desnuda, el signo alzado y el gesto de llamada, con ajustes mínimos para fluidez natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada del proyecto, aunque este versículo no la contiene.
  - Se preservó la diferencia entre la «señal» alzada y el gesto manual, evitando fusionarlos en una sola instrucción.
  - «Puertas» se eligió por naturalidad contextual; no se forzó «gates» como anglicismo semántico.
