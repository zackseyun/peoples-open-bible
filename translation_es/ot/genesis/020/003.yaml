  to: 'Pero Dios vino a Abimelec en un sueño por la noche y le dijo: «Mira[a], eres un hombre muerto a causa de la mujer que has tomado[b], porque ella está casada[c]».'
  rationale: Se corrigió la ubicación de las notas para que expliquen las palabras pertinentes, se eliminó la redundancia entre notas sobre la sentencia de muerte, y se suavizó «de noche» a «por la noche» para un español más natural sin perder fidelidad al hebreo. El resto del texto se mantiene sustancialmente porque es fiel al sentido fuente y a la decisión inglesa auditada.
