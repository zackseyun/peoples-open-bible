translation:
  language: es
  text: Aunque se acuesten entre los rediles[a], las alas de una paloma están cubiertas de plata, y sus plumas de oro amarillento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los sacos de montar» o «entre las piedras del hogar»; el término hebreo es incierto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de oro verdoso» o «con un brillo amarillento-verdoso del oro».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  - Cuando
  lexicon: HALOT
  rationale: En poesía hebrea, אִם puede introducir una idea concesiva. «Aunque» reproduce mejor ese matiz que un condicional simple en español, manteniendo la fuerza poética del pasaje.
- source_word: תִּשְׁכְּבוּן
  english_pob_choice: you lie down
  chosen_spanish: te acuestes
  alternatives_spanish:
  - te acuestas
  - yaces
  lexicon: HALOT
  rationale: El verbo expresa la acción física de acostarse o yacer. «Te acuestes» conserva la imagen de reposo en un giro natural de español; el singular implícito en la segunda persona plural poética se adapta idiomáticamente al español sin perder el sentido.
- source_word: בֵּין שְׁפַתָּיִם
  english_pob_choice: among the sheepfolds
  chosen_spanish: entre los rediles
  alternatives_spanish:
  - entre los apriscos
  - entre las majadas
  - entre los pesebres
  lexicon: HALOT
  rationale: La POB inglesa mantiene «sheepfolds» en el texto principal y reconoce la dificultad léxica en nota. En español, «rediles» comunica bien la idea de un lugar de resguardo para ovejas y evita cargar el texto con una decisión más especulativa.
- source_word: כַּנְפֵי יוֹנָה
  english_pob_choice: the wings of a dove
  chosen_spanish: las alas de una paloma
  alternatives_spanish:
  - las alas de una tórtola
  - las alas de la paloma
  lexicon: HALOT
  rationale: La construcción posesiva hebrea se conserva de forma natural en español. «Paloma» mantiene la imagen simple y ampliamente inteligible del ave, como en la traducción inglesa auditada.
- source_word: נֶחְפָּה בַכֶּסֶף
  english_pob_choice: are covered with silver
  chosen_spanish: están cubiertas de plata
  alternatives_spanish:
  - están recubiertas de plata
  - están cubiertas con plata
  lexicon: HALOT
  rationale: El participio pasivo describe algo cubierto u overlayed con metal. «Están cubiertas de plata» es claro, fiel y estilísticamente sobrio en español.
- source_word: אֶבְרוֹתֶיהָ
  english_pob_choice: her pinions
  chosen_spanish: sus plumas
  alternatives_spanish:
  - sus remeras
  - sus alas
  - sus plumas de vuelo
  lexicon: HALOT
  rationale: «Plumas» es más natural para lectores en español y sigue de cerca la imagen de las plumas externas del ala. «Piniones» sería más preciso técnicamente pero menos transparente para una lectura pública.
- source_word: בִּירַקְרַק חָרוּץ
  english_pob_choice: with yellow gold
  chosen_spanish: de oro amarillento
  alternatives_spanish:
  - de oro verdoso
  - de oro amarillo
  - de oro con brillo verdoso
  lexicon: HALOT
  rationale: La expresión hebrea sugiere un tono amarillento con matiz verdoso. «Oro amarillento» comunica el color sin sonar tan extraño como una traducción más literal, y conserva la tensión cromática documentada por la nota inglesa.
translation_notes:
  revision_awareness: La revisión más reciente del texto de referencia no introdujo cambios; el pasaje se mantiene en acuerdo alto, por lo que esta propuesta sigue de cerca la lectura inglesa auditada y preserva la nota de ambigüedad léxica en שְׁפַתָּיִם y el matiz cromático de בִּירַקְרַק חָרוּץ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece el término mesianico en el versículo.
  - Se conserva una estructura poética de dos miembros principales con paralelismo descriptivo.
  - Se mantiene la nota de incertidumbre léxica en el primer sintagma para no resolver indebidamente שְׁפַתָּיִם.
  - «Plata» y «oro» se conservan como metales literales, con la cualidad cromática expresada en la nota y en la elección principal.
