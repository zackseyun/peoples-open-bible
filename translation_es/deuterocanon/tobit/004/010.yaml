translation:
  language: es
  text: Porque la limosna[a] rescata de la muerte y no deja que uno entre en las tinieblas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'caridad' o 'actos de misericordia'; el griego se refiere concretamente a dar limosnas a los necesitados.
    reason: lexical_alternative
  - marker: b
    text: '''Tinieblas'' probablemente evoca el ámbito de la muerte o una profunda desdicha; el griego deja la imagen breve y algo abierta.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλεημοσύνη
  english_pob_choice: almsgiving
  chosen_spanish: limosna
  alternatives_spanish:
  - caridad
  - actos de misericordia
  - almosna
  lexicon: BDAG; uso helenístico judío
  rationale: En Tobit, el sustantivo denota la dádiva concreta a los necesitados, no solo una actitud interior. 'Limosna' conserva esa concreción y es un término natural en español bíblico; 'caridad' puede sonar más abstracto y 'actos de misericordia' amplía la forma griega.
- source_word: ἐκ θανάτου
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - desde la muerte
  - fuera de la muerte
  lexicon: BDAG
  rationale: La preposición expresa salida o rescate lejos de la muerte. 'De la muerte' es la forma idiomática y fiel en español para mantener el valor de liberación sin introducir matices innecesarios.
- source_word: ῥύεται
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - salva
  - delivers
  lexicon: BDAG
  rationale: '''Rescata'' comunica con precisión la idea de sacar de un peligro real. Evita cargar el verbo con un matiz doctrinal más amplio que ''salva'' podría sugerir en español, mientras conserva la fuerza del griego.'
- source_word: οὐκ ἐάσει
  english_pob_choice: does not allow
  chosen_spanish: no permite
  alternatives_spanish:
  - no dejará
  - no consentirá
  - no permitirá
  lexicon: BDAG
  rationale: El verbo expresa impedir o no dar permiso. 'No permite' reproduce bien la acción de impedir y, como presente en español, puede reflejar la forma griega sin forzar el futuro.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - ir a
  lexicon: BDAG
  rationale: '''Entrar'' es la equivalencia más directa y natural para el infinitivo de εἰσέρχομαι.'
- source_word: εἰς τὸ σκότος
  english_pob_choice: into darkness
  chosen_spanish: en las tinieblas
  alternatives_spanish:
  - en la oscuridad
  - hacia las tinieblas
  - en la tiniebla
  lexicon: BDAG
  rationale: El griego presenta una imagen sobria y abierta. 'Tinieblas' conserva mejor el registro bíblico y la posible resonancia con el ámbito de muerte o calamidad que 'oscuridad' en español moderno.
theological_decisions:
- issue: Si la frase sobre la limosna debe suavizarse para evitar leer mérito salvífico
  english_pob_reading: Retain the text's direct claim that almsgiving rescues from death, without expanding it into a systematic doctrinal statement.
  chosen_spanish_reading: Mantener la afirmación directa de que la limosna rescata de la muerte, sin convertirla en una formulación doctrinal sistemática ni suavizarla con un 'puede'.
  alternative_spanish_readings:
  - La limosna puede rescatar de la muerte
  - La limosna simboliza rescate espiritual
  rationale: El griego afirma la relación de manera directa. La traducción debe conservar esa fuerza textual sin añadir armonizaciones doctrinales posteriores. 'Rescata' conserva la energía del enunciado y evita sobrecargarlo con categorías ajenas al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'will not allow' a 'does not allow' para alinearse más estrechamente con el presente griego, y eliminó el artículo antes de 'darkness' para preservar la concisión de la imagen. En español se refleja esa misma concisión con 'no permite entrar en las tinieblas'.
  spanish_consistency_notes:
  - Se mantuvo 'limosna' como equivalente concreto de ἐλεημοσύνη, coherente con el uso helenístico-judaico del término.
  - Se eligió 'rescata' en lugar de 'salva' para evitar una lectura sistemática que el verso no desarrolla.
  - '''Tinieblas'' conserva el tono bíblico y la ambigüedad semántica del griego.'
  - Se evitó 'Señor' u otra terminología sustitutiva porque el versículo no contiene el Tetragrámaton ni κύριος.
