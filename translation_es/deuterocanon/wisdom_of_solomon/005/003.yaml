review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro de auditoría inglés en los puntos principales: futuro de habla colectiva, participio de arrepentimiento, gemido por angustia interior y referencia al justo antes ridiculizado. Sin embargo, la cláusula final en español no preserva bien el valor idiomático de ἔσχομέν ποτε εἰς γέλωτα; «tuvimos en derision» suena poco natural y además pierde claridad semántica. También conviene reflejar mejor en español la solución inglesa para ἐν ἑαυτοῖς como marco de habla colectiva.'
  spanish_quality_summary: 'El texto es generalmente legible y digno, pero presenta dos problemas de calidad: la nota [a] está anclada en «entre sí», aunque sus alternativas explican la cláusula final; y «en derision» requiere tilde y sigue siendo poco idiomático en este contexto. Una reparación menor produce un español mucho más natural y fiel: «Dirán entre sí… a quien una vez tuvimos por objeto de burla».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Arrepintiéndose» refleja bien μετανοοῦντες según la decisión teológica documentada. «Espíritu» en minúscula es apropiado aquí por el sentido interior, no el Espíritu Santo. No aparecen términos de glosario sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: La frase «a quien antes tuvimos en derision» no es idiomática ni suficientemente clara en español.
    rationale: El griego ἔχω + εἰς γέλωτα significa considerar/tratar como objeto de burla. «Tener en derisión» existe marginalmente, pero aquí suena forzado; «tener por objeto de burla» o «tener por burla» comunica mejor el sentido evaluativo.
  - severity: medium
    issue: La nota [a] está colocada en «entre sí», pero su contenido corresponde a la cláusula final de burla/escarnio.
    rationale: Las notas deben anclarse exactamente donde pertenece la alternativa léxica. Tal como está, el lector pensará que la variante afecta ἐν ἑαυτοῖς en vez de εἰς γέλωτα.
  - severity: low
    issue: Falta tilde en «derisión».
    rationale: Corrección ortográfica necesaria si se mantuviera esa opción.
  - severity: low
    issue: «Se dirán entre sí» es entendible, pero «Dirán entre sí» suena más natural para introducir discurso directo colectivo.
    rationale: El griego simplemente dice «dirán» con el modificador «entre sí»; el reflexivo en español puede sonar innecesariamente marcado.
  revised_spanish_text: 'Dirán entre sí, arrepintiéndose, y gemirán por la angustia del espíritu: «Este era aquel a quien una vez tuvimos por objeto de burla[a]».'
  revised_footnotes:
