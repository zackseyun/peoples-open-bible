translation:
  language: es
  text: Abi-albón, el arbatita[a], Azmávet, el barhumita[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'Abialbón' como un solo nombre sin guion.
    reason: lexical_alternative
  - marker: b
    text: '"Barhumita" sigue el Texto Masorético; algunos relacionan la designación con Bahurim y la vierten como "baharumita".'
