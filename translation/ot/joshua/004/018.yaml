  rationale: The Hebrew structure `וַיְהִי בְעֲלוֹת... נִתְּקוּ... וַיָּשֻׁבוּ...` indicates a sequence of main events introduced by `וַיְהִי` ('And it happened'). The current draft's 'when X, and Y, that Z' awkwardly coordinates the main verb `נִתְּקוּ` ('were lifted up') as if it were parallel to the temporal infinitive `בְעֲלוֹת` ('came up'). Moving the 'that' to encompass the entire sequence of events (the temporal clause and the subsequent main verbs) creates a smoother and more accurate English rendering of the Hebrew's narrative flow, making the entire sequence the content of what 'happened'.
