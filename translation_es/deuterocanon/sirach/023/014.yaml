translation:
  language: es
  text: Recuerda a tu padre y a tu madre[a], porque te sientas en medio de grandes hombres; no sea que seas olvidado delante de ellos, y por tu costumbre te vuelvas necio, y desees no haber nacido, y maldigas el día de tu nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no sea que te olvides de ti mismo delante de ellos», es decir, que pierdas el dominio propio en su presencia. El griego admite más de una manera de entender la frase.'
    reason: alternative_reading
lexical_decisions:
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Ten presente
  - Acuérdate de
  lexicon: BDAG
  rationale: El imperativo aoristo exige un llamado directo a la memoria activa. «Recuerda» es natural, claro y fiel al tono exhortativo.
- source_word: πατρὸς καὶ μητρός σου
  english_pob_choice: your father and your mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a tus padres
  lexicon: BDAG
  rationale: El griego nombra a cada progenitor por separado; mantener ambos preserva la referencia concreta y evita una nivelación colectiva.
- source_word: ἀνὰ μέσον
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  lexicon: BDAG
  rationale: «En medio de» reproduce bien la idea espacial y social de estar situado en un círculo de personas de alto rango.
- source_word: μεγιστάνων
  english_pob_choice: great men
  chosen_spanish: grandes hombres
  alternatives_spanish:
  - nobles
  - magnates
  - personas importantes
  lexicon: LSJ
  rationale: Se conserva el rasgo masculino y el rango social elevado. «Grandes hombres» es una correspondencia transparente para el registro sapiencial.
- source_word: συνεδρεύει
  english_pob_choice: you sit
  chosen_spanish: estás
  alternatives_spanish:
  - estás sentado
  - te sientas
  lexicon: LSJ
  rationale: En español, «estás en medio de» comunica mejor la situación resultante que repetir un verbo de asiento que suena forzado; el contexto ya implica la posición social.
- source_word: μή ποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: BDAG
  rationale: La fórmula de advertencia se expresa de manera natural en español con «no sea que», que conserva el valor preventivo del giro griego.
- source_word: ἐπιλαθῇ ἐνώπιον αὐτῶν
  english_pob_choice: you be forgotten before them
  chosen_spanish: seas olvidado delante de ellos
  alternatives_spanish:
  - te olvides de ti mismo delante de ellos
  - se te pase el respeto delante de ellos
  lexicon: BDAG
  rationale: Se sigue de cerca la forma pasiva del griego. La alternativa reflexiva se mantiene implícitamente como posibilidad interpretativa, pero el cuerpo principal respeta la lectura formal.
- source_word: τῷ ἐθισμῷ σου
  english_pob_choice: by your habit
  chosen_spanish: por tu costumbre
  alternatives_spanish:
  - por tu hábito
  - por tu manera acostumbrada de comportarte
  lexicon: LSJ
  rationale: «Costumbre» comunica el valor de comportamiento adquirido sin sonar artificial. El sentido instrumental del dativo queda bien expresado con «por».
- source_word: μωρανθῇς
  english_pob_choice: become foolish
  chosen_spanish: te vuelvas necio
  alternatives_spanish:
  - te hagas necio
  - actúes como necio
  lexicon: BDAG
  rationale: La pasiva subjuntiva indica llegar a un estado de necedad. «Te vuelvas necio» conserva ese cambio de estado en un español natural.
- source_word: θελήσεις εἰ μὴ ἐγεννήθης
  english_pob_choice: wish that you had not been born
  chosen_spanish: desees no haber nacido
  alternatives_spanish:
  - quisieras no haber nacido
  - desearas no haber nacido
  lexicon: BDAG
  rationale: La idea es una expresión de profundo lamento. En español, la subordinada infinitiva comunica la misma carga sin recargar el período.
- source_word: τὴν ἡμέραν τοῦ τοκετοῦ σου
  english_pob_choice: the day of your birth
  chosen_spanish: el día de tu nacimiento
  alternatives_spanish:
  - el día en que naciste
  - el día de tu parto
  lexicon: LSJ
  rationale: «Nacimiento» es la forma más clara y digna para τοκετός en este contexto, y evita ambigüedad con el acto de dar a luz.
- source_word: μὴ καταράσῃ
  english_pob_choice: curse the day of your birth
  chosen_spanish: maldigas el día de tu nacimiento
  alternatives_spanish:
  - no maldigas el día de tu nacimiento
  - imprecando el día de tu nacimiento
  lexicon: BDAG
  rationale: La cadena de advertencias culmina en una acción maldiciendo el propio origen. En español, el subjuntivo con «no sea que» mantiene la relación con la cláusula precedente.
theological_decisions:
- issue: Termino social masculino μεγιστάνων
  english_pob_reading: great men
  chosen_spanish_reading: grandes hombres
  alternative_spanish_readings:
  - nobles
  - personas importantes
  - grandes
  rationale: Se conserva el masculino del sustantivo griego, conforme a la política de no neutralizar indebidamente una referencia social masculina en un contexto de elites públicas antiguas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Ambigüedad de ἐπιλαθῇ ἐνώπιον αὐτῶν
  english_pob_reading: you be forgotten before them
  chosen_spanish_reading: seas olvidado delante de ellos
  alternative_spanish_readings:
  - te olvides de ti mismo delante de ellos
  - se te note la falta de dominio propio delante de ellos
  - seas pasado por alto delante de ellos
  rationale: La forma griega permite una lectura pasiva o, por contexto, una idea de perder la compostura. El texto principal sigue la lectura más cercana a la forma verbal, sin borrar la tensión interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cadena final con μὴ καταράσῃ
  english_pob_reading: curse the day of your birth
  chosen_spanish_reading: maldigas el día de tu nacimiento
  alternative_spanish_readings:
  - maldigas el día en que naciste
  - maldigas el día de tu parto
  rationale: 'La revisión inglesa mostró que el «not» anterior era erróneo; en español se refleja la misma secuencia causal de la advertencia: «no sea que ... maldigas...».'
  doctrine_reference: Source-gated revision awareness
translation_notes:
  revision_awareness: El texto base inglés fue revisado para quitar el «not» antes de «curse the day of your birth», alineando la cláusula final con el griego μὴ καταράσῃ dentro de la secuencia de advertencias. La versión española sigue esa corrección y mantiene la posibilidad interpretativa de ἐπιλαθῇ en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «grandes hombres» para respetar el masculino social del griego.
  - Se emplea «costumbre» para ἐθισμός, evitando un calco duro como «hábito» cuando el español no lo exige.
  - Se preserva el paralelismo de la advertencia final con «no sea que» + subjuntivo.
  - La nota a desarrolla la ambigüedad de ἐπιλαθῇ sin desplazar el texto principal.
