translation:
  language: es
  text: Porque la habitante de Marot[a] espera con ansiedad el bien, pues ha descendido la calamidad de parte de Yahvé hasta la puerta de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'está angustiada por el bien', 'sufre por el bien' o 'está enferma por el bien'. El verbo hebreo puede expresar dolor, debilidad o una espera ansiosa y afligida.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלָה
  english_pob_choice: waits anxiously
  chosen_spanish: espera con ansiedad
  alternatives_spanish:
  - está angustiada
  - anhela con dolor
  - está enferma
  lexicon: HALOT
  rationale: El hebreo puede expresar enfermedad, debilidad o angustia dolorosa. En este contexto profético, con el complemento 'para el bien', la idea principal es una espera ansiosa y afligida por alivio o bienestar; 'espera con ansiedad' conserva ese matiz sin reducirlo a enfermedad física.
- source_word: לְטוֹב
  english_pob_choice: for good
  chosen_spanish: el bien
  alternatives_spanish:
  - para el bien
  - por el bien
  - para prosperidad
  - para alivio
  lexicon: HALOT
  rationale: La frase hebrea es breve y algo ambigua; en español, 'el bien' comunica de manera natural el objeto de la expectativa sin explicitar más de lo que el texto dice. Mantiene la tersura del original y la ambigüedad entre bien, alivio y bienestar.
- source_word: יוֹשֶׁבֶת מָרוֹת
  english_pob_choice: the inhabitant of Maroth
  chosen_spanish: la habitante de Marot
  alternatives_spanish:
  - la que habita en Marot
  - la residente de Marot
  - la hija de Marot
  lexicon: HALOT
  rationale: El participio femenino singular personifica la ciudad o su población. 'La habitante de Marot' conserva esa singularidad colectiva en español y refleja la lectura del POB inglés, mientras que el nombre propio se translitera como Marot.
- source_word: מָרוֹת
  english_pob_choice: Maroth
  chosen_spanish: Marot
  alternatives_spanish:
  - Bitternesses
  lexicon: HALOT
  rationale: Como topónimo, debe transliterarse. La posible relación etimológica con 'amarguras' o 'amarguras/bitternesses' no se incorpora al texto principal para no forzar un sentido que el hebreo aquí usa como nombre de lugar.
- source_word: יָרַד
  english_pob_choice: has come down
  chosen_spanish: ha descendido
  alternatives_spanish:
  - ha bajado
  - ha venido abajo
  - ha caído
  lexicon: HALOT
  rationale: '''Ha descendido'' conserva el movimiento direccional del hebreo y suena natural en español bíblico moderno. También deja abierta la imagen geográfica y teológica del juicio que baja hacia Jerusalén.'
- source_word: רָע
  english_pob_choice: disaster
  chosen_spanish: el mal
  alternatives_spanish:
  - el desastre
  - la calamidad
  - el daño
  lexicon: HALOT
  rationale: El término hebreo puede referirse a mal moral o a calamidad/desgracia. Dado que el contexto habla del juicio que llega, la versión española mantiene la tensión con 'el mal' en lugar de resolverla automáticamente como 'desastre'. Esto preserva la amplitud semántica del original y el vínculo con la afirmación de que algo 'desciende' de Yahvé.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - desde Yahvé
  - de parte del Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la terminología del proyecto. 'De parte de' expresa con claridad el origen o procedencia del juicio sin suavizar el sujeto fuente.
- source_word: לְשַׁעַר יְרוּשָׁלִָם
  english_pob_choice: to the gate of Jerusalem
  chosen_spanish: hasta la puerta de Jerusalén
  alternatives_spanish:
  - a la puerta de Jerusalén
  - hasta la puerta de Jerusalén
  - a las puertas de Jerusalén
  lexicon: HALOT
  rationale: '''Puerta'' es una traducción directa y natural de שַׁעַר. ''Hasta'' refleja mejor el alcance del juicio que llega al límite de la ciudad y conserva la fuerza del movimiento en la imagen hebrea.'
theological_decisions:
- issue: Origen del mal/disaster respecto de Yahvé
  english_pob_reading: disaster has come down from Yahweh
  chosen_spanish_reading: ha descendido el mal de parte de Yahvé
  alternative_spanish_readings:
  - ha descendido el desastre de parte de Yahvé
  - ha bajado la calamidad de Yahvé
  - ha venido el mal de Yahvé
  rationale: 'La frase hebrea permite tanto ''mal'' como ''desastre/calamidad''. Se eligió ''el mal'' para no borrar la tensión léxica del texto: el juicio procede de Yahvé, pero el vocabulario no se reduce a una sola interpretación suavizada. Así se preserva la soberanía divina en el juicio sin afirmar que Yahvé sea autor del mal moral.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: La base inglesa revisó 'writhes for good' a 'waits anxiously for good' para reflejar mejor la angustia o expectativa dolorosa del hebreo. Esta versión española sigue esa revisión y evita una traducción más física como 'se retuerce', que sería menos natural aquí. También adopta 'Yahvé' en lugar de un equivalente enmascarado, en coherencia con la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene la transliteración del topónimo como 'Marot' para evitar traducir etimológicamente el nombre propio.
  - '''Puerta'' se usa en singular como en el hebreo, sin pluralizarlo.'
  - Se conserva la posible ambigüedad de רָע en una nota, en vez de resolverla por completo en el texto principal.
  - La puntuación con coma y la cláusula causal 'pues' reflejan la estructura del hebreo sin volverla rígida.
