translation:
  language: es
  text: Ahora teman a Yahvé y sírvanle con integridad y fidelidad[a], y quiten de en medio los dioses que sirvieron sus padres al otro lado del río[b] y en Egipto, y sirvan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con verdad»; el hebreo אֱמֶת puede expresar verdad, fiabilidad o fidelidad en contexto de pacto.
    reason: lexical_alternative
  - marker: b
    text: Es decir, al otro lado del Éufrates.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca discursiva de transición y exhortación. "Ahora" comunica con naturalidad el empuje retórico del hebreo sin añadir contenido.
- source_word: יְרָאוּ
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - reverencien
  - tengan temor de
  lexicon: HALOT
  rationale: El verbo hebreo expresa temor reverente/covenantal. "Teman" preserva la fuerza del mandato mejor que suavizarlo a "reverencien".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: reproducir el Tetragrámaton como "Yahvé" y no enmascararlo con un sustituto.'
- source_word: וְעִבְדוּ אֹתוֹ
  english_pob_choice: serve him
  chosen_spanish: sírvanle
  alternatives_spanish:
  - sírvanlo
  - adórenlo
  lexicon: HALOT
  rationale: עבד en contexto de pacto incluye servicio de lealtad y obediencia. "Sírvanle" conserva ese alcance mejor que limitarlo a culto verbal o ritual.
- source_word: בְּתָמִים
  english_pob_choice: with integrity
  chosen_spanish: con integridad
  alternatives_spanish:
  - con sinceridad
  - de manera íntegra
  - con entereza
  lexicon: HALOT
  rationale: תמים aquí señala una devoción completa, sin división. "Integridad" comunica esa plenitud moral y de lealtad en español natural.
- source_word: וּבֶאֱמֶת
  english_pob_choice: and faithfulness
  chosen_spanish: y fidelidad
  alternatives_spanish:
  - y verdad
  - y lealtad
  lexicon: HALOT
  rationale: La revisión inglesa entendió אֱמֶת como fidelidad/fiabilidad en clave de pacto. "Fidelidad" mantiene esa fuerza relacional y evita reducirlo solo a una categoría abstracta de verdad.
- source_word: וְהָסִירוּ אֶת אֱלֹהִים
  english_pob_choice: put away the gods
  chosen_spanish: aparten los dioses
  alternatives_spanish:
  - quiten los dioses de en medio
  - rechacen a los dioses
  - desechen a los dioses
  lexicon: HALOT
  rationale: El hebreo exige retirar o dejar de lado divinidades rivales. "Aparten" expresa el acto de eliminar su presencia y autoridad sin sobreinterpretar el verbo.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres/antepasados
  lexicon: HALOT
  rationale: El término hebreo es masculino plural y puede referirse a los antepasados varones. "Sus padres" sigue de cerca la forma del original y preserva el vínculo genealógico explícito.
- source_word: בְּעֵבֶר הַנָּהָר
  english_pob_choice: beyond the River
  chosen_spanish: al otro lado del río
  alternatives_spanish:
  - más allá del río
  - al otro lado del Río
  - más allá del Éufrates
  lexicon: HALOT
  rationale: La expresión geográfica se traduce de manera transparente en español. No se incorpora "Éufrates" al texto principal porque esa identificación se documenta mejor como nota.
- source_word: וּבְמִצְרַיִם
  english_pob_choice: and in Egypt
  chosen_spanish: y en Egipto
  alternatives_spanish:
  - e en Egipto
  lexicon: HALOT
  rationale: Equivalencia directa y natural del lugar nombrado en el hebreo.
- source_word: וְעִבְדוּ אֶת יְהוָה
  english_pob_choice: and serve Yahweh
  chosen_spanish: y sirvan a Yahvé
  alternatives_spanish:
  - y adoren a Yahvé
  - y sirvan al SEÑOR
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del mandato final. "Sirvan" mantiene el paralelismo con el primer imperativo y el valor de servicio leal.
theological_decisions:
- issue: Renderización del nombre del pacto יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre divino en forma auditable y no se sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'La fuerza de יְרָאוּ: temor o reverencia'
  english_pob_reading: fear
  chosen_spanish_reading: teman
  alternative_spanish_readings:
  - reverencien
  - respeten
  rationale: La advertencia del pasaje conserva la tensión bíblica entre temor y obediencia. "Teman" evita suavizar el mandato y mantiene el peso teológico del verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: 'בְּתָמִים וּבֶאֱמֶת: integridad y fidelidad'
  english_pob_reading: with integrity and faithfulness
  chosen_spanish_reading: con integridad y fidelidad
  alternative_spanish_readings:
  - con integridad y verdad
  - con sinceridad y verdad
  rationale: La pareja hebrea describe servicio entero, sincero y confiable dentro del pacto. "Fidelidad" recoge mejor el matiz relacional de אֱמֶת según la revisión inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó “truth” por “faithfulness” para בֶּאֱמֶת, entendiendo el binomio como una fórmula de integridad y confiabilidad del pacto. La versión española refleja esa decisión con “integridad y fidelidad”, manteniendo además el paralelismo repetido del mandato de servir a Yahvé. También se respeta el nombre divino como Yahvé, conforme al criterio del proyecto.
  spanish_consistency_notes:
  - Se usó "Yahvé" de forma consistente para יְהוָה.
  - Se mantuvo "sirvan" como traducción de עבד para conservar el sentido de servicio de pacto, no solo culto ritual.
  - '"Padres" se retuvo por fidelidad al hebreo masculino plural; no se neutralizó a "antepasados" en el texto principal.'
  - La expresión geográfica "al otro lado del río" deja la identificación con el Éufrates para la nota, siguiendo el enfoque auditado del inglés.
