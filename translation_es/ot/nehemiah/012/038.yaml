    rationale: El hebreo dice literalmente «desde sobre la muralla, desde por encima de la Torre de los Hornos hasta la Muralla Ancha». Aunque no hace falta una reproducción rígida, el borrador actual simplifica demasiado el punto de partida a «desde la Torre de los Hornos».
