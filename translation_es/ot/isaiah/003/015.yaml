- from: ¿Qué quieren decir con aplastar a mi pueblo y moler el rostro de los pobres? declara Yahvé, Dios de los ejércitos.
  to: ¿Qué quieren decir al aplastar a mi pueblo y moler los rostros de los pobres?[a] declara el Señor Yahvé de los ejércitos.
  rationale: Se corrige el título divino para reflejar fielmente אֲדֹנָי יְהוִה צְבָאוֹת conforme a la política del proyecto sobre «Yahvé», sin sustituir אֲדֹנָי por «Dios». También se ajusta el giro inicial para mayor naturalidad en español y se preserva mejor la imagen plural de «rostros», manteniendo en nota la alternativa singular idiomática.
