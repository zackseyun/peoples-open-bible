  yaml_path: translation/deuterocanon/psalms_of_solomon/012/003.yaml
  text: His dwelling is to fill houses with a lying tongue[a], to cut down trees of gladness[d][c][b], flaming against the lawless.
  footnotes:
  - marker: a
    text: Or 'his sojourning' or 'his lodging'; the Greek noun speaks of dwelling or residing, often as a stranger.
    reason: lexical_alternative
  - marker: b
    text: Literally 'trees of gladness'; the image is likely metaphorical for what makes a household flourish or rejoice.
    reason: cultural_note
  - marker: c
    text: The final phrase is compressed in Greek; 'inflaming the lawless' could also be rendered 'setting the lawless ablaze.'
    reason: alternative_reading
  - marker: d
    text: Or 'Where he lodges, he fills houses with a lying tongue, cutting down trees of gladness and inflaming the lawless.'.
    reason: previous_rendering
