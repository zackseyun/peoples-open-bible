translation:
  language: es
  text: Y estos fueron los que subieron de Tel-melah[a], Tel-harsha, Querub, Addán e Imer; pero no pudieron declarar la casa de sus padres ni su descendencia, si eran de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su casa ancestral y su descendencia». La expresión hebrea se refiere al linaje paterno documentado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹלִים
  english_pob_choice: the ones who came up
  chosen_spanish: los que subieron
  alternatives_spanish:
  - los que vinieron
  - los retornados
  lexicon: HALOT
  rationale: עלה en este contexto posexílico conserva el modismo de ascenso al subir a la tierra; «subieron» mantiene esa imagen sin forzar una paráfrasis como «retornados».
- source_word: מִתֵּל מֶלַח תֵּל חַרְשָׁא כְּרוּב אַדָּן אִמֵּר
  english_pob_choice: from Tel-melah, Tel-harsha, Kerub, Addan, and Immer
  chosen_spanish: de Tel-mélaj, Tel-harshá, Querub, Adán e Imer
  alternatives_spanish:
  - de Tel Melaj, Tel Harshá, Querub, Adán e Imer
  - de Tel-melah, Tel-harsha, Cherub, Addán e Imer
  lexicon: HALOT
  rationale: Son nombres propios de lugares o clanes, por lo que se transliteran. Se conserva el guion en los dos primeros por su carácter compuesto en español bíblico.
- source_word: לֹא יָכְלוּ
  english_pob_choice: were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces
  - no pudieron lograr
  lexicon: HALOT
  rationale: «No pudieron» expresa con naturalidad la incapacidad en un registro formal sin añadir matices ajenos al hebreo.
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: declarar
  alternatives_spanish:
  - decir
  - hacer constar
  lexicon: HALOT
  rationale: En un registro genealógico-administrativo, «declarar» refleja mejor el valor de hacer saber o dar a conocer que un simple «decir».
- source_word: בֵּית אֲבוֹתָם
  english_pob_choice: their fathers’ house
  chosen_spanish: la casa de sus padres
  alternatives_spanish:
  - su casa paterna
  - su casa ancestral
  lexicon: HALOT
  rationale: Se conserva la imagen semítica de la «casa» como unidad de linaje; «casa de sus padres» resulta más transparente que una reinterpretación como «linaje».
- source_word: וְזַרְעָם
  english_pob_choice: and their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - su simiente
  lexicon: HALOT
  rationale: «Descendencia» comunica el sentido genealógico de זרע en español moderno y evita la aspereza de una traducción demasiado literal.
- source_word: אִם מִיִּשְׂרָאֵל הֵם
  english_pob_choice: whether they were from Israel
  chosen_spanish: si eran de Israel
  alternatives_spanish:
  - si pertenecían a Israel
  - si procedían de Israel
  lexicon: HALOT
  rationale: La construcción expresa duda sobre su pertenencia o ascendencia israelita; «si eran de Israel» conserva esa incertidumbre en forma concisa.
theological_decisions:
- issue: Pertenencia genealógica a Israel
  english_pob_reading: whether they were from Israel
  chosen_spanish_reading: si eran de Israel
  alternative_spanish_readings:
  - si pertenecían a Israel
  - si procedían de Israel
  rationale: El texto no formula una doctrina, sino una verificación de ascendencia. La redacción española mantiene la duda genealógica sin convertirla en una afirmación identitaria más fuerte de lo que el hebreo permite.
  doctrine_reference: Genealogía y pertenencia del pueblo del pacto en textos postexílicos; cf. Esdras 2 en su conjunto.
translation_notes:
  revision_awareness: El último paso de revisión indicó que no eran necesarios cambios adicionales. Se mantuvo el sentido del borrador inglés auditado, con ajustes mínimos para naturalidad y precisión en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; este versículo no lo contiene.
  - Se mantuvo un estilo sobrio de registro censal/genealógico, evitando lenguaje devocional no presente en el hebreo.
  - Los nombres propios se transliteran de forma consistente y no se traducen.
