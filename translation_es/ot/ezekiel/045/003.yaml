translation:
  language: es
  text: De esta porción medida medirás una longitud de veinticinco mil y un ancho de diez mil[a], y en ella estará el santuario, el lugar santísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el santuario, el Santo de los Santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַמִּדָּה הַזֹּאת
  english_pob_choice: From this measured area
  chosen_spanish: Desde este espacio medido
  alternatives_spanish:
  - Desde esta medida
  - Y desde este espacio medido
  lexicon: HALOT
  rationale: מִדָּה puede significar «medida» o el tramo medido; por el contexto de reparto territorial, «espacio medido» comunica mejor que se trata de una porción ya delimitada. «Desde» conserva el valor de מִן. Se evita «medición» porque en español sugiere el acto y no el área resultante.
- source_word: תָּמֹד
  english_pob_choice: you shall measure
  chosen_spanish: tú medirás
  alternatives_spanish:
  - medirás
  - deberás medir
  lexicon: HALOT
  rationale: El imperfecto qal de מדד funciona como instrucción. «Tú medirás» conserva el mandato directo y el tono procedimental del pasaje, con un español natural y sobrio.
- source_word: אֹרֶךְ
  english_pob_choice: a length
  chosen_spanish: una longitud
  alternatives_spanish:
  - un largo
  - una medida de longitud
  lexicon: HALOT
  rationale: אֹרֶךְ nombra la dimensión longitudinal. «Longitud» es claro y exacto en español bíblico moderno.
- source_word: חמש ועשרים אלף
  english_pob_choice: twenty-five thousand
  chosen_spanish: veinticinco mil
  alternatives_spanish:
  - cinco y veinte mil
  lexicon: HALOT
  rationale: Se adopta el orden normal del español para los numerales, sin alterar la cantidad.
- source_word: וְרֹחַב עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: and a width of ten thousand
  chosen_spanish: y un ancho de diez mil
  alternatives_spanish:
  - y una anchura de diez mil
  - y un ancho de diez mil
  lexicon: HALOT
  rationale: רֹחַב expresa anchura/ancho. «Ancho» es más natural que «anchura» en esta construcción dimensional y conserva el contraste con «longitud».
- source_word: וּבוֹ
  english_pob_choice: and in it
  chosen_spanish: y en él
  alternatives_spanish:
  - y dentro de él
  - y allí
  lexicon: HALOT
  rationale: El sufijo pronominal apunta al espacio medido. «En él» es la forma más directa y evita ambigüedad en español.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el recinto sagrado
  - el templo
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa el lugar sagrado/templo-santuario. «Santuario» es el equivalente más amplio y estándar en visión de templo de Ezequiel.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: the most holy place
  chosen_spanish: el lugar santísimo
  alternatives_spanish:
  - el santísimo
  - el santuario santísimo
  - el Santo de los Santos
  lexicon: HALOT
  rationale: La construcción superlativa se expresa de forma tradicional y comprensible con «lugar santísimo». En español, esta fórmula comunica bien el valor cultual sin volver opaco el sentido. Se preserva en nota la alternativa más tradicional/explicativa cuando el lector la espere.
theological_decisions:
- issue: Equivalencia de קֹדֶשׁ קָדָשִׁים en contexto cultual
  english_pob_reading: the most holy place
  chosen_spanish_reading: el lugar santísimo
  alternative_spanish_readings:
  - el Santo de los Santos
  - el santuario santísimo
  rationale: La frase hebrea es una superlación cultual, no una afirmación doctrinal abstracta. «Lugar santísimo» mantiene la función técnica dentro de la visión del templo y suena natural para lectores bíblicos en español, sin añadir interpretaciones.
  doctrine_reference: Translation philosophy §§5–6
- issue: Tratamiento del nombre divino ausente en este versículo
  english_pob_reading: No divine-name substitution issue in the verse
  chosen_spanish_reading: No aplica
  rationale: El versículo no contiene יהוה ni κύριος; por tanto, no hay decisión sobre «Yahvé» en este registro.
  doctrine_reference: Project-level terminology defaults
translation_notes:
  revision_awareness: 'Se siguió de cerca el trazado auditado en inglés: área medida, instrucción de medir, dimensiones, y la apposición final del santuario con el superlativo cultual. No se introdujeron revisiones textuales adicionales; la nota conserva la alternativa tradicional ya documentada por la POB inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «santuario» para מִקְדָּשׁ, en línea con un registro cultual amplio y no restrictivo.
  - «Lugar santísimo» preserva la equivalencia funcional de «most holy place» y evita calco excesivamente literal.
  - La preposición inicial «Desde» conserva el valor de מִן y su relación con el espacio previamente delimitado.
  - Se evitó «SEÑOR» o cualquier sustitución divina porque el versículo no contiene el nombre divino.
