translation:
  language: es
  text: Porque Yahvé es exaltado[a], y ve al humilde[c]; pero al altivo lo conoce desde lejos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alto». El hebreo dice literalmente «alto»; aplicado a Yahvé, expresa su condición exaltada.
    reason: lexical_alternative
  - marker: b
    text: O «lo reconoce desde lejos» / «lo mantiene a distancia». El hebreo dice «lo conoce desde lejos», lo cual puede implicar distancia relacional sin afirmarla de modo más explícito.
    reason: alternative_reading
  - marker: c
    text: O «al de condición baja». El hebreo puede referirse tanto al humilde como al de baja condición.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o razón del enunciado anterior. «Porque» preserva el valor explicativo y suena natural en español bíblico contemporáneo.
- source_word: רָם
  english_pob_choice: high
  chosen_spanish: alto
  alternatives_spanish:
  - exaltado
  - encumbrado
  lexicon: HALOT
  rationale: Reproduce la metáfora vertical del hebreo de manera breve y transparente. «Alto» conserva la concisión poética y el contraste con «humilde».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transliteración del Tetragrámaton como «Yahvé», no una sustitución por título.'
- source_word: שָׁפָל
  english_pob_choice: the lowly
  chosen_spanish: el humilde
  alternatives_spanish:
  - el bajo
  - el abatido
  - el de condición humilde
  lexicon: HALOT
  rationale: El hebreo puede abarcar bajeza social y disposición humilde. Aquí «el humilde» comunica bien el contraste con el «alto/arrogante» sin perder la tensión de rango y actitud.
- source_word: יִרְאֶה
  english_pob_choice: he sees
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - contempla
  - mira con atención
  lexicon: HALOT
  rationale: «Mira» comunica la atención personal implícita en el verbo de ver y suena natural en español poético; mantiene la observación directa sin añadir interpretación excesiva.
- source_word: גָבֹהַּ
  english_pob_choice: the haughty
  chosen_spanish: al arrogante
  alternatives_spanish:
  - al soberbio
  - al orgulloso
  - al alto
  lexicon: HALOT
  rationale: Aunque la forma es literalmente «alto», el contraste del pasaje exige el matiz moral de arrogancia. «Arrogante» preserva la tensión semántica documentada en la audición inglesa.
- source_word: מִמֶּרְחָק
  english_pob_choice: from afar
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - a distancia
  lexicon: HALOT
  rationale: Equivalente idiomático claro en español. «Desde lejos» conserva la imagen espacial y la distancia relacional sugerida por el contexto.
- source_word: יְיֵדָע
  english_pob_choice: he knows
  chosen_spanish: lo conoce
  alternatives_spanish:
  - lo sabe
  - lo reconoce
  - lo conoce a distancia
  lexicon: HALOT
  rationale: En este contexto, el conocimiento divino no es meramente intelectual; «lo conoce» puede expresar una relación evaluativa o judicial sin resolverla explícitamente. El complemento «desde lejos» mantiene la distancia del hebreo.
theological_decisions:
- issue: El alcance teológico de «lo conoce desde lejos» respecto del arrogante
  english_pob_reading: Rendered 'he knows from afar' without expanding to condemnation or rejection.
  chosen_spanish_reading: «lo conoce desde lejos» sin añadir «lo rechaza», «lo aparta» ni una condena explícita.
  alternative_spanish_readings:
  - lo mantiene a distancia
  - lo reconoce desde lejos
  - lo conoce pero a distancia
  rationale: El hebreo afirma distancia en el conocimiento divino del arrogante, pero no explicita rechazo. La redacción española conserva esa tensión y evita resolverla con una glosa doctrinal más fuerte que el texto.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreinterpretar.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente del inglés que fortaleció la separación entre las cláusulas con un punto y coma, así como el estado de alta concordancia y la ausencia de cambios en el último pase. La versión española mantiene esa progresión lógica con coma, punto y coma implícito por el contraste «pero / mas», y conserva el sentido poético sin sobreexplicarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el nombre divino.
  - Se evita «SEÑOR» como sustitución editorial.
  - «Humilde» conserva la amplitud semántica de condición baja y disposición humilde.
  - «Arrogante» refleja el contraste moral de גָבֹהַּ en este contexto.
  - La distancia en «desde lejos» se conserva como rasgo interpretativo del conocimiento divino sin ampliarlo a rechazo explícito.
