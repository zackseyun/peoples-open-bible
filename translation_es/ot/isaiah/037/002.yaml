    reason: lexical_alternative
  - marker: b
    text: «Que estaba sobre la casa» es un título oficial para quien estaba a cargo de la casa real.
    reason: cultural_note
  revision_rationale: 'Se conserva el texto base casi intacto y solo se reubican los marcadores de nota para que correspondan a las expresiones que realmente explican: [a] con «cubiertos de cilicio» y [b] con «Eliaquim», donde el lector encuentra inmediatamente la cláusula «que estaba sobre la casa». Así se alinea el español con el audit trail inglés y se elimina una ambigüedad innecesaria.'
