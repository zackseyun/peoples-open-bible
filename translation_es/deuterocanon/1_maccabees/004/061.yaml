    rationale: Aparece una palabra con caracteres cirílicos en las alternativas de ὠχύρωσαν. No afecta el texto final, pero debería corregirse en el registro editorial.
  revised_spanish_text: Y destacaron allí una fuerza para guardarlo[a], y fortificaron la ciudadela para guardar Bethsura[b], a fin de que el pueblo tuviera una fortaleza frente a Idumea.
