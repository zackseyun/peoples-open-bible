    rationale: El inglés documenta una alternativa léxica real («wilderness» / «desert»). En español, «O «en el desierto de Sinaí»» no añade información porque el texto ya dice eso mismo.
  - severity: low
    issue: La ubicación del marcador dentro de «desierto[a] de Sinaí» puede hacer menos clara la unidad de la expresión.
    rationale: No es incorrecto, pero al tratarse de una alternativa para toda la frase nominal, queda más limpio anclarla al sintagma completo.
