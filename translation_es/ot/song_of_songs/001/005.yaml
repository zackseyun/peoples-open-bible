translation:
  language: es
  text: Morena[a] soy, pero hermosa, hijas de Jerusalén, como las tiendas de Quedar, como las cortinas de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Morena y hermosa". El hebreo usa simplemente "y"; "pero" explicita el probable contraste contextual.'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁחוֹרָה
  english_pob_choice: dark
  chosen_spanish: morena
  alternatives_spanish:
  - oscura
  - de tez oscura
  lexicon: HALOT
  rationale: El adjetivo describe coloración oscura. En español, 'morena' es natural, digno y menos ambiguo que 'negra', evitando una sobreespecificación étnica. 'Oscura' y 'de tez oscura' quedan como alternativas más literales o explicativas.
- source_word: וְנָאוָה
  english_pob_choice: yet lovely
  chosen_spanish: y hermosa
  alternatives_spanish:
  - y amable
  - pero hermosa
  lexicon: HALOT
  rationale: El hebreo trae simplemente la conjunción 'y'; por eso conservo 'y' en el texto principal. 'Hermosa' comunica bien la cualidad estética en español. Mantengo 'pero hermosa' como alternativa para reflejar una posible lectura adversativa, pero sin introducir una conjunción que el hebreo no marca explícitamente.
- source_word: בְּנוֹת יְרוּשָׁלִָם
  english_pob_choice: daughters of Jerusalem
  chosen_spanish: hijas de Jerusalén
  alternatives_spanish:
  - jóvenes de Jerusalén
  - doncellas de Jerusalén
  lexicon: HALOT
  rationale: La traducción directa conserva la imagen poética y el vocativo femenino plural. 'Jóvenes de Jerusalén' interpreta el sentido, por eso queda solo como alternativa. 'Doncellas' es posible, pero menos transparente para el lector moderno.
- source_word: כְּאָהֳלֵי קֵדָר
  english_pob_choice: like the tents of Kedar
  chosen_spanish: como las tiendas de Quedar
  alternatives_spanish:
  - como las tiendas del pueblo de Quedar
  lexicon: HALOT
  rationale: '''Tiendas'' reproduce bien el símil y sugiere la vida nómada asociada con Quedar. Uso ''Quedar'' como nombre propio tradicional en español bíblico; la forma es transparente y suficientemente reconocible.'
- source_word: כִּירִיעוֹת שְׁלֹמֹה
  english_pob_choice: like the curtains of Solomon
  chosen_spanish: como las cortinas de Salomón
  alternatives_spanish:
  - como las lonas de Salomón
  - como los paños de Salomón
  - como las cortinas del rey Salomón
  lexicon: HALOT
  rationale: '''Cortinas'' es la opción más natural y accesible en español para יְרִיעוֹת. Mantengo ''Salomón'' como nombre propio, siguiendo la política de nombres personales. Las alternativas preservan el posible matiz de telas o cubiertas textiles más que cortinas domésticas.'
theological_decisions:
- issue: Fuerza de la conjunción antes de נָאוָה
  english_pob_reading: Adversative nuance in English ('yet lovely')
  chosen_spanish_reading: 'Coordinación simple: ''y hermosa'''
  alternative_spanish_readings:
  - '''pero hermosa'''
  - '''y hermosa, aunque'''
  rationale: El hebreo usa una simple conjunción, no una marca adversativa. Para no borrar la tensión, conservo la coordinación directa en el texto principal. La nota de alternativa en inglés se refleja al dejar abierta la posibilidad de contraste sin imponerlo al versículo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological/interpretive tension rather than resolve it; optimal equivalence'
- issue: Posible tono despectivo o contrastivo en la auto-descripción de la hablante
  english_pob_reading: '''I am dark, yet lovely'' as a self-description that counters negative perception'
  chosen_spanish_reading: '''morena, y hermosa'' sin resolver el contraste explícitamente'
  alternative_spanish_readings:
  - '''morena, pero hermosa'''
  - '''morena y bella'''
  rationale: La línea puede leerse como autoafirmación frente a una posible valoración negativa de su color. En español, 'y hermosa' conserva el enunciado abierto; no fuerza una oposición que el hebreo no señala de manera explícita. Así se preserva la tensión interpretativa documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve interpretive tension; avoid over-resolving poetic ambiguity'
translation_notes:
  revision_awareness: 'El pasaje se mantiene sin cambios respecto al contexto auditado en inglés: la decisión principal sigue siendo si la conjunción hebrea debe leerse solo como coordinación o con matiz adversativo. En español, opté por conservar la coordinación en el texto principal y dejar la lectura contrastiva en la nota, para no exceder lo que el hebreo marca formalmente.'
  spanish_consistency_notes:
  - '''Yahvé'' no aplica en este versículo; se respetan los nombres propios y la poesía sin introducir sustituciones litúrgicas.'
  - Se evitó 'negra' para no sobredeterminar la referencia cromática ni producir una carga moderna no exigida por el hebreo.
  - '''Hijas de Jerusalén'' conserva el vocativo poético y la estructura del original.'
  - '''Cortinas'' se usa como equivalente transparente de יְרִיעוֹת sin forzar una imagen arquitectónica específica.'
