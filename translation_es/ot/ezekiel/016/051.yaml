translation:
  language: es
  text: Y Samaria no pecó ni la mitad que tú; multiplicaste tus abominaciones más que ellas, y con todas tus abominaciones que cometiste, hiciste que tus hermanas parecieran justas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «justificaste a tus hermanas». El hebreo permite una versión más literal, pero en el contexto la idea es comparativa: la mayor perversidad de Jerusalén hizo que ellas parecieran justas por contraste.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  - Shomrón
  lexicon: HALOT
  rationale: Es un nombre propio geográfico/personificado; en este contexto representa a la ciudad y al reino del norte como una de las 'hermanas' de Jerusalén. 'Samaria' es la forma más reconocible y natural en español bíblico contemporáneo.
- source_word: כַּחֲצִי
  english_pob_choice: did not sin half as much as you
  chosen_spanish: no pecó ni la mitad que tú
  alternatives_spanish:
  - no pecó la mitad que tú
  - no pecó ni siquiera la mitad que tú
  lexicon: HALOT
  rationale: El hebreo expresa comparación de cantidad; en español 'ni la mitad que tú' reproduce bien el valor comparativo sin volverlo torpe. Se conserva el sentido de inferioridad comparativa de Samaria frente a Jerusalén.
- source_word: חַטֹּאתַיִךְ
  english_pob_choice: as you
  chosen_spanish: que tú
  alternatives_spanish:
  - de tus pecados
  - como tú
  lexicon: HALOT
  rationale: El sustantivo 'pecados' está implícito en la comparación hebrea, pero el español puede omitir la repetición sin perder fuerza. 'Que tú' mantiene la comparación directa y natural.
- source_word: וַתַּרְבִּי
  english_pob_choice: you multiplied
  chosen_spanish: multiplicaste
  alternatives_spanish:
  - aumentaste
  - incrementaste
  lexicon: HALOT
  rationale: El verbo hiphil expresa aumento/cantidad; 'multiplicaste' conserva la intensidad profética y la correspondencia semántica más cercana en español.
- source_word: תּוֹעֲבוֹתַיִךְ
  english_pob_choice: your abominations
  chosen_spanish: tus abominaciones
  alternatives_spanish:
  - tus actos abominables
  - tus cosas detestables
  lexicon: HALOT
  rationale: '''Abominaciones'' mantiene el peso moral-religioso fuerte del término de Ezequiel, especialmente asociado con idolatría y perversión ritual.'
- source_word: מֵהֵנָּה
  english_pob_choice: more than they
  chosen_spanish: más que ellas
  alternatives_spanish:
  - más que ellas dos
  - más que esas
  lexicon: HALOT
  rationale: El pronombre femenino plural alude a las hermanas-ciudades. 'Ellas' preserva la referencia contextual y el paralelo femenino del hebreo.
- source_word: וַתְּצַדְּקִי
  english_pob_choice: you made your sisters appear righteous
  chosen_spanish: hiciste que tus hermanas parecieran justas
  alternatives_spanish:
  - justificaste a tus hermanas
  - hiciste parecer justas a tus hermanas
  - declaraste justas a tus hermanas
  lexicon: HALOT
  rationale: 'La forma causativa/comparativa en este contexto no afirma absolución moral real, sino comparación retórica: la mayor maldad de Jerusalén hace que Samaria y Sodom parezcan justas. ''Parecieran justas'' transmite esa tensión sin convertirla en una declaración doctrinal ajena al pasaje.'
- source_word: אֶת אחות/ך
  english_pob_choice: your sisters
  chosen_spanish: tus hermanas
  alternatives_spanish:
  - tus hermanas-ciudades
  - tus hermanas
  lexicon: HALOT
  rationale: El contexto exige plural, aunque la forma gráfica del hebreo presentado sea singular defectiva. En la escena literaria se refiere a Samaria y Sodom como hermanas de Jerusalén.
- source_word: בְּכָל תּוֹעֲבוֹתַיִךְ
  english_pob_choice: by all your abominations
  chosen_spanish: con todas tus abominaciones
  alternatives_spanish:
  - por todas tus abominaciones
  - mediante todas tus abominaciones
  lexicon: HALOT
  rationale: La preposición ב tiene aquí valor instrumental o de medio. 'Con' es natural en español y conserva la idea de medio/ocasionamiento sin endurecer la frase.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that you committed
  chosen_spanish: que cometiste
  alternatives_spanish:
  - que hiciste
  - que has cometido
  lexicon: HALOT
  rationale: '''Cometiste'' reproduce el matiz moral de una acción culpable; en español suena más adecuado que el genérico ''hiciste'' frente a ''abominaciones''.'
theological_decisions:
- issue: Sentido de וַתְּצַדְּקִי en comparación moral
  english_pob_reading: your greater wickedness made your sisters appear righteous by comparison, not actually righteous before God
  chosen_spanish_reading: hiciste que tus hermanas parecieran justas, es decir, justas solo por contraste retórico
  alternative_spanish_readings:
  - justificaste a tus hermanas
  - declaraste justas a tus hermanas
  rationale: El pasaje usa un contraste profético fuerte. Traducirlo como justificación real podría sugerir una absolución moral que el contexto no enseña. 'Parecieran justas' conserva la ironía y la comparación sin borrar la tensión textual.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión lexical/teológica sin importar una lectura doctrinal externa.
- issue: Tratamiento de 'Samaria' como hermana de Jerusalén
  english_pob_reading: Samaria is one of Jerusalem's 'sisters' in the surrounding passage
  chosen_spanish_reading: Samaria aparece como una de tus hermanas en la figura profética
  alternative_spanish_readings:
  - Samaria como tu hermana
  - Samaria y Sodom como hermanas
  rationale: El versículo depende del contexto literario más amplio de Ezequiel 16. La traducción mantiene 'tus hermanas' para no perder la red de metáforas familiares del capítulo.
  doctrine_reference: Coherencia intertextual dentro de Ezequiel 16 y mantenimiento de la imagen retórica sin suavizarla.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y el audit trail inglés. Se evitó el añadido 'ni siquiera' porque el último pase inglés lo retiró por mayor ajuste al original. También se mantuvo la ambigüedad retórica de וַתְּצַדְּקִי con una solución española que preserva la comparación sin convertirla en una afirmación doctrinal de justificación real.
  spanish_consistency_notes:
  - Se usa 'abominaciones' de manera consistente con la severidad profética de Ezequiel.
  - '''Samaria'' se mantiene como nombre propio familiar en español bíblico, no transliterado.'
  - Se conserva 'hermanas' según el contexto, aunque la forma hebrea aislada sea defectiva/singular en la grafía presentada.
  - La puntuación y el orden favorecen una lectura pública natural sin perder paralelos semánticos del hebreo.
