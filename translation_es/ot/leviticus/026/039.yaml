review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: el remanente se consume en tierra enemiga por su propia iniquidad y también por las iniquidades de sus padres. Conserva correctamente el plural «tierras», el doble uso de ימקו con repetición, y no suaviza la tensión intergeneracional. Sin embargo, la colocación de «con ellos» al final de la segunda cláusula suena poco natural y deja la ambigüedad hebrea menos clara en español; además, el rastro inglés preservó dos notas relevantes que conviene mantener en español.'
  spanish_quality_summary: El español es claro y digno, pero «y también por las iniquidades de sus padres con ellos se consumirán» resulta algo trabado. Reordenar a «y también, con ellos, por las iniquidades de sus padres se consumirán» preserva mejor el vínculo de «con ellos» sin forzar la sintaxis. También conviene añadir notas para el matiz de «se consumirán» y la ambigüedad de «con ellos».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Iniquidad/iniquidades» y «padres» están bien elegidos. «Se consumirán» es aceptable para ימקו, pero debe acompañarse con nota léxica porque el hebreo también puede sugerir «desgastarse», «pudrirse» o «consumirse lentamente» bajo juicio.
  issues:
  - severity: medium
    issue: Sintaxis poco natural en la segunda cláusula
    rationale: «por las iniquidades de sus padres con ellos se consumirán» suena forzado en español y dificulta percibir qué modifica «con ellos». Una ligera reordenación mejora la legibilidad sin resolver la ambigüedad del hebreo.
  - severity: medium
    issue: Faltan las notas conservadas por el rastro POB inglés
    rationale: El inglés documentó tanto la alternativa léxica de ימקו como la ambigüedad de אִתָּם. Dado que en español ambas siguen siendo significativas, deben preservarse con notas.
