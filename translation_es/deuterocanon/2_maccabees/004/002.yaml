translation:
  language: es
  text: y se atrevió a llamar al benefactor de la ciudad[a], al guardián de sus compatriotas y al celoso defensor de las leyes, un conspirador contra los asuntos públicos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno que trama contra los asuntos públicos» o «un conspirador contra la cosa pública». La fuerza del griego es política, no meramente de enemistad personal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐεργέτην
  english_pob_choice: benefactor
  chosen_spanish: benefactor
  alternatives_spanish:
  - bienhechor
  - hacedor de bien
  lexicon: LSJ
  rationale: En este contexto honorífico y cívico, «benefactor» reproduce bien el valor público de εὐεργέτην sin añadir explicación innecesaria. «Bienhechor» sería posible, pero «benefactor» suena más sobrio y acorde con el registro de títulos.
- source_word: κηδεμόνα
  english_pob_choice: guardian
  chosen_spanish: guardián
  alternatives_spanish:
  - protector
  - amparo
  lexicon: LSJ
  rationale: «Guardián» conserva la idea de cuidado y protección activa que expresa κηδεμόνα. «Protector» también es válido, pero «guardián» mantiene mejor el tono de título aplicado a una figura pública.
- source_word: τῶν ὁμοεθνῶν
  english_pob_choice: of his fellow countrymen
  chosen_spanish: de sus compatriotas
  alternatives_spanish:
  - de su propio pueblo
  - de sus correligionarios nacionales
  lexicon: LSJ
  rationale: El griego habla de los de la misma nación o pueblo. «Compatriotas» es natural en español y conserva la solidaridad étnico-nacional; el posesivo «sus» es una adaptación idiomática para enlazar el título con la persona descrita.
- source_word: ζηλωτὴν
  english_pob_choice: zealot
  chosen_spanish: celoso
  alternatives_spanish:
  - fervoroso defensor
  - entusiasta
  lexicon: LSJ
  rationale: Aquí ζηλωτήν describe a alguien marcado por celo. En español, «celoso» mantiene la fuerza del término; se evita «zelote» por su carga sectaria moderna y porque el inglés POB lo usa de modo descriptivo, no como etiqueta partidaria.
- source_word: τῶν νόμων
  english_pob_choice: for the laws
  chosen_spanish: por las leyes
  alternatives_spanish:
  - de la ley
  - por la Ley
  lexicon: LSJ
  rationale: El plural griego es explícito; «las leyes» preserva esa forma. «Por» reproduce la idea de adhesión o defensa activa mejor que una simple relación posesiva.
- source_word: ἐπίβουλον τῶν πραγμάτων
  english_pob_choice: a conspirator against the affairs of state
  chosen_spanish: un conspirador contra los asuntos públicos
  alternatives_spanish:
  - un conspirador contra la vida pública
  - un traidor a los asuntos del Estado
  - uno que trama contra la cosa pública
  lexicon: LSJ
  rationale: τῶν πραγμάτων es más literalmente «los asuntos/matters» que «el Estado». «Asuntos públicos» conserva el campo político-cívico del pasaje sin sobreinterpretar; «conspirador» mantiene la acusación personal y política.
- source_word: ἐτόλμα λέγειν
  english_pob_choice: he dared to call
  chosen_spanish: se atrevió a llamar
  alternatives_spanish:
  - osó llamar
  - tuvo la osadía de llamar
  lexicon: LSJ
  rationale: La construcción expresa audacia en el acto de hablar y etiquetar. «Se atrevió a llamar» es natural en español y refleja bien el matiz de valentía insolente del griego.
translation_notes:
  revision_awareness: He seguido el texto griego de Swete 1909 y el audit trail inglés, incorporando la revisión final que prefirió una expresión más precisa para τῶν πραγμάτων como «asuntos de estado/affairs of state». En español, opté por «asuntos públicos» para conservar esa precisión política sin convertirla prematuramente en «Estado», que sería más interpretativo. También mantuve el orden de títulos honoríficos y el matiz acusatorio final.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrama ni una referencia directa al nombre divino.
  - «Mesías/Cristo» no aparece en el versículo.
  - Se mantiene el registro cívico-político del pasaje; no se suaviza la acusación a una simple hostilidad personal.
  - «Celoso» se usa en sentido de ardor/entrega, no en el sentido moderno de envidia o recelo.
