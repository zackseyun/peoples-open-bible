  to: 'Entonces dije: «¿Qué vienen estos a hacer?». Y él dijo: «Estos son los cuernos[a] que dispersaron a Judá, de modo que nadie levantó la cabeza; y estos han venido para aterrorizarlos, para derribar[b] los cuernos de las naciones que alzaron un cuerno contra la tierra de Judá para dispersarla».'
  rationale: Se corrigió el error gramatical «las cuernos» por «los cuernos» y se armonizó el número/género del demostrativo con el referente masculino («Estos son los cuernos»). Se trasladó al texto principal la formulación «¿Qué vienen estos a hacer?» porque preserva mejor el demostrativo del hebreo y suena natural en español. También se mejoró la idiomaticidad de «nadie levantó la cabeza» frente a «su cabeza». Finalmente, se añadió la nota alternativa para «derribar», en línea con el rastro auditado del POB inglés sobre el verbo raro לְיַדּוֹת.
