  yaml_path: translation/nt/revelation/010/009.yaml
  text: 'So I went to the angel[a], telling him to give me the little scroll. And he says to me, “Take and eat it, and it will make your stomach bitter[c][b], but in your mouth it will be sweet like honey.”'
  footnotes:
  - marker: a
    text: Or 'little book.' The Greek βιβλαρίδιον is a diminutive term and may denote a small scroll or booklet.
    reason: lexical_alternative
  - marker: b
    text: Or 'he said to me.' Greek uses a historical present ('he says') for vividness.
    reason: lexical_alternative
  - marker: c
    text: Or 'it will make your belly bitter.'
    reason: lexical_alternative
translation:
  language: ko
  text: '그래서 내가 그 천사에게로 가서, 그 작은 두루마리를 나에게 달라고 말하였습니다. 그러자 그가 나에게 이르기를, 「받아 그것을 먹어 버려라. 그것이 네 배를 쓰게 하리라. 그러나 네 입에서는 꿀같이 달리라」 하였습니다.'
  philosophy: optimal-equivalence
