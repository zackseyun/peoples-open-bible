translation:
  language: es
  text: La inmoralidad sexual, el vino y el vino nuevo quitan el corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quitan el entendimiento» o «privan de sensatez»; en hebreo, «quitan el corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְנוּת
  english_pob_choice: sexual immorality
  chosen_spanish: la prostitución
  alternatives_spanish:
  - inmoralidad sexual
  - fornicación
  - desviación sexual
  lexicon: HALOT
  rationale: El hebreo puede abarcar conducta sexual ilícita en general, con color de prostitución e infidelidad del pacto. En español, «prostitución» conserva la fuerza concreta y el trasfondo moral del término, aunque es algo más específico que el inglés POB «sexual immorality». Se evita «fornicación» por sonar más restrictivo o eclesiástico en español moderno.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: Corresponde al sentido normal de יַיִן. «Vino» es la forma natural y precisa en español.
- source_word: תִירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino fresco
  - vino dulce
  lexicon: HALOT
  rationale: El hebreo distingue aquí una bebida vinosa más reciente o sin madurar frente a יַיִן. «Mosto» comunica bien esa idea en español y preserva la distinción lexical con «vino»; aunque no es una equivalencia exacta en todos los contextos, es una opción más idiomática que «vino nuevo» para un lector hispanohablante.
- source_word: יִקַּח
  english_pob_choice: take away
  chosen_spanish: quitan
  alternatives_spanish:
  - toma
  - arrebata
  - se lleva
  lexicon: HALOT
  rationale: El verbo literalmente es «tomar», pero en este giro con «corazón» expresa el efecto de privar o quitar la capacidad de juicio. «Quitan» transmite de manera natural el resultado, como en el inglés POB «take away», sin perder la idea de remoción.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el entendimiento
  - la mente
  - el juicio
  lexicon: HALOT
  rationale: Se conserva «corazón» para mantener el idiomatismo hebreo y la antropología bíblica del interior humano. El sentido de entendimiento o juicio queda implícito, como en la decisión inglesa, sin sustituir el término concreto por una paráfrasis.
theological_decisions:
- issue: Si traducir el final de forma interpretativa como pérdida de entendimiento o mantener la imagen concreta del corazón
  english_pob_reading: Keep the concrete expression 'take away the heart' in the main text, with a note offering interpretive alternatives.
  chosen_spanish_reading: Mantener «quitan el corazón» en el texto principal, con nota que explicita «entendimiento» o «sensatez» como sentidos posibles.
  alternative_spanish_readings:
  - quitan el entendimiento
  - privan de sensatez
  - arrebatan el juicio
  rationale: El verso describe el efecto moral y cognitivo del pecado sobre la persona interior. La imagen del corazón es central en hebreo y conviene conservarla en el cuerpo del texto; una nota puede aclarar el posible sentido de entendimiento o sensatez sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El control de revisión informó que no se requerían cambios y que el acuerdo general con el borrador previo era alto, con sólo observaciones menores. Se mantuvo la decisión de preservar la imagen de «corazón» y la distinción entre יַיִן y תִירוֹשׁ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la diferencia entre «vino» y «mosto» para reflejar la distinción hebrea entre יַיִן y תִירוֹשׁ.
  - Se usa «corazón» de manera concreta, no como simple sinónimo de emoción, siguiendo el valor antropológico hebreo.
