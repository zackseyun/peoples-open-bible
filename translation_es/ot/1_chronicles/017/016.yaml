    text: O «mi familia», «mi casa real» o «mi dinastía» para «mi casa». El hebreo «casa» puede referirse a la familia de David y, en este contexto, a su línea real.
    reason: lexical_alternative
  revision_rationale: Se corrige «para que» a «que» para reflejar fielmente la función de כִּי en el hebreo. Se afina la nota léxica para conservar mejor la amplitud de «casa» sin introducir la alternativa menos contextual «hogar».
