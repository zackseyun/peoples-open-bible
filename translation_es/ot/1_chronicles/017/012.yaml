translation:
  language: es
  text: Él me edificará una casa[a], y yo estableceré su trono para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo» para «casa»; el hebreo dice literalmente «casa» y, en contexto, se refiere al santuario que Salomón edificaría.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Él mismo
  - él
  lexicon: HALOT
  rationale: El pronombre independiente hebreo se conserva como sujeto explícito para reflejar el énfasis del original. En español, «Él» mantiene esa prominencia sin añadir contenido.
- source_word: יִבְנֶה
  english_pob_choice: will build
  chosen_spanish: edificará
  alternatives_spanish:
  - construirá
  - levantará
  lexicon: HALOT
  rationale: El verbo בנה puede traducirse por «edificar» o «construir». «Edificará» suena natural en español bíblico y conserva la idea de una acción futura de construir una estructura.
- source_word: לִּי
  english_pob_choice: for me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'El ל con sufijo de 1.ª persona singular expresa relación o beneficio. En español, con «edificar» resulta más idiomático incorporar el beneficiario como objeto indirecto: «me edificará», en lugar de forzar «para mí».'
- source_word: בָּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - una casa
  - un templo
  - una morada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». «Casa» preserva la equivalencia léxica y mantiene abierta la referencia contextual al santuario, sin sustituirla por «templo» en el texto principal.
- source_word: וְכֹנַנְתִּי
  english_pob_choice: and I will establish
  chosen_spanish: y yo estableceré
  alternatives_spanish:
  - y yo afirmaré
  - y yo haré firme
  lexicon: HALOT
  rationale: כּוּן en este contexto real y pactal expresa hacer firme o establecer. «Estableceré» reproduce bien esa fuerza en español, con un registro claro y bíblico.
- source_word: אֶת כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - el trono de él
  lexicon: HALOT
  rationale: La construcción con objeto directo y sufijo posesivo se vierte naturalmente como «su trono». «Trono» conserva la imagen real y la relación dinástica del pasaje.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión idiomática denota permanencia duradera. «Para siempre» es la equivalencia española más clara y natural, sin sobrecargar el texto con formulaciones interpretativas.
theological_decisions:
- issue: בָּיִת como «casa» o como «templo»
  english_pob_reading: house, with footnote noting the contextual temple reference
  chosen_spanish_reading: «casa» en el texto principal, con nota que aclare el posible sentido de «templo»
  alternative_spanish_readings:
  - templo
  - morada
  rationale: Se conserva el vocablo literal del hebreo para respetar la primacía del original y la relación literaria con la promesa davídica. La aclaración permite al lector entender que, en contexto, esta «casa» apunta al santuario que Salomón edificaría.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de עַד עוֹלָם en la promesa davídica
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - perpetuamente
  - por los siglos
  rationale: Se mantiene la afirmación de permanencia sin insertar una solución teológica a debates sobre su cumplimiento. La traducción deja hablar al texto con su propia amplitud.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa coinciden en alto grado. No se registran revisiones aplicadas; se mantuvo la decisión de traducir בָּיִת literalmente como «casa» y עַד עוֹלָם como «para siempre».
  spanish_consistency_notes:
  - Se preserva el sujeto explícito «Él» para reflejar el énfasis del hebreo.
  - Se usa «casa» en lugar de «templo» en el cuerpo principal, siguiendo la primacía léxica del original.
  - Se mantiene un registro bíblico natural y contemporáneo, sin calco rígido.
