translation:
  language: es
  text: ¿Por qué seguimos sentados? Reúnanse, y entremos en las ciudades fortificadas y perezcamos[a] allí; porque Yahvé nuestro Dios nos ha condenado y nos ha dado a beber agua venenosa[b], porque hemos pecado contra Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y callemos allí’ / ‘y seamos destruidos allí’; el verbo hebreo puede abarcar silencio, quietud o ruina.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘agua de hiel’ o ‘agua de veneno’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבִים
  english_pob_choice: sitting still
  chosen_spanish: nos estamos quedando sentados
  alternatives_spanish:
  - estamos sentados
  - nos quedamos
  - permanecemos sentados
  lexicon: HALOT
  rationale: El hebreo literal dice 'sentarse/dwelling', pero en esta pregunta retórica expresa inacción o permanencia pasiva. 'Nos estamos quedando sentados' conserva la imagen de estar sentados y comunica la pasividad implícita en español natural.
- source_word: הֵאָסְפוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Reúnanse
  alternatives_spanish:
  - Júntense
  - Asémbense
  - Congréguense
  lexicon: HALOT
  rationale: El imperativo nifal tiene valor reflexivo/pasivo y funciona como convocatoria a reunirse. 'Reúnanse' mantiene el llamado urgente sin sonar forzado en español.
- source_word: עָרֵי הַמִּבְצָר
  english_pob_choice: the fortified cities
  chosen_spanish: las ciudades fortificadas
  alternatives_spanish:
  - las ciudades fortaleza
  - las ciudades amuralladas
  - las ciudades de refugio
  lexicon: HALOT
  rationale: La frase designa centros urbanos defendibles en contexto militar. 'Ciudades fortificadas' es la equivalencia más clara y directa en español.
- source_word: וְנִדְּמָה
  english_pob_choice: and perish there
  chosen_spanish: y perezcamos allí
  alternatives_spanish:
  - y callemos allí
  - y quedemos en silencio allí
  - y seamos destruidos allí
  lexicon: HALOT
  rationale: La raíz דמה puede implicar callar, quedar inmóvil o ser arruinado/destruido. En este contexto de juicio e invasión, 'perezcamos' sigue la decisión inglesa de entender ruina/muerte sin perder la tensión semántica de fondo.
- source_word: הֲדִמָּנוּ
  english_pob_choice: has doomed us
  chosen_spanish: nos ha condenado
  alternatives_spanish:
  - nos ha silenciado
  - nos ha destruido
  - nos ha llevado a la ruina
  lexicon: HALOT
  rationale: La forma causativa del mismo verbo señala que Yahvé ha determinado el juicio/ruina del pueblo. 'Nos ha condenado' comunica esa determinación judicial de manera natural en español.
- source_word: מֵי רֹאשׁ
  english_pob_choice: poisoned water
  chosen_spanish: agua venenosa
  alternatives_spanish:
  - agua de hiel
  - agua de veneno
  - agua amarga
  lexicon: HALOT
  rationale: רֹאשׁ nombra una sustancia/planta venenosa o amarga; no solo 'hiel' en sentido figurado. 'Agua venenosa' conserva la imagen concreta y el sentido dañino; la alternativa más literal queda reflejada en la nota.
- source_word: חָטָאנוּ לַיהוָה
  english_pob_choice: we have sinned against Yahweh
  chosen_spanish: hemos pecado contra Yahvé
  alternatives_spanish:
  - hemos pecado ante Yahvé
  - hemos pecado para con Yahvé
  lexicon: HALOT
  rationale: En español bíblico actual, 'pecar contra' expresa adecuadamente la dirección del agravio. Se mantiene el nombre divino Yahvé conforme al criterio textual del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del tetragrama en español como 'Yahvé', siguiendo el criterio del proyecto de no sustituirlo por un título genérico.
theological_decisions:
- issue: Ambigüedad de דמה en dos cláusulas consecutivas
  english_pob_reading: The verse speaks of the people recognizing that the LORD has consigned them to ruin under judgment.
  chosen_spanish_reading: El verso presenta al pueblo reconociendo que Yahvé los ha puesto bajo condena y ruina.
  alternative_spanish_readings:
  - Yahvé los ha silenciado
  - solo se les manda permanecer en silencio allí
  - Yahvé los ha destruido
  rationale: El hebreo admite matices de silencio, quietud o destrucción. En el marco inmediato de juicio, ciudades fortificadas y confesión de pecado, la lectura de condena/ruina encaja mejor. Aun así, la formulación española evita exagerar más allá de lo que el verbo permite.
  doctrine_reference: Translation philosophy §3 (preserve tension where genuine ambiguity exists)
- issue: Nombre divino en el contexto de pecado confesado
  english_pob_reading: we have sinned against Yahweh
  chosen_spanish_reading: hemos pecado contra Yahvé
  alternative_spanish_readings:
  - hemos pecado contra el Señor
  - hemos pecado ante Dios
  rationale: El texto hebreo repite el tetragrama al final del versículo, y el proyecto pide mantener 'Yahvé' en el texto principal. La confesión conserva su fuerza relacional y de pacto al nombrar explícitamente al Dios ofendido.
  doctrine_reference: 'Proyecto terminológico: יְהוָה -> Yahvé'
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del texto hebreo WLC y del rastro auditado en inglés. No se siguió mecánicamente la versión inglesa: se mantuvo la ambigüedad de דמה en una forma española que suena natural, se preservó el nombre divino Yahvé, y se reflejó en nota la alternativa más literal de מֵי רֹאשׁ.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma uniforme para יְהוָה.
  - Se evitó 'SEÑOR' como sustitución editorial del nombre divino.
  - '''Perezcamos'' armoniza con el contexto judicial y con la lectura inglesa de ruina, sin cerrar por completo el trasfondo de silencio/quietud.'
  - '''Agua venenosa'' se eligió por claridad pública; la nota conserva la literalidad alternativa.'
  - El tono general es formal, bíblico y publicable en español neutral.
