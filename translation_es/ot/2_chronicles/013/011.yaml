translation:
  language: es
  text: Y ofrecemos holocaustos a Yahvé mañana tras mañana y tarde tras tarde, e incienso aromático, y la disposición del pan[a] sobre la mesa pura, y el candelabro de oro con sus lámparas para arder tarde tras tarde; porque guardamos el encargo[b] de Yahvé nuestro Dios, pero ustedes lo han abandonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los panes de la Presencia' o 'el pan de la Presencia'. Literalmente, 'la disposición del pan'.
    reason: lexical_alternative
  - marker: b
    text: O 'el cargo' o 'la obligación'. La expresión hebrea se refiere a un deber o encargo sagrado que se guarda y se cumple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַקְטִרִים
  english_pob_choice: we offer up
  chosen_spanish: hacemos subir
  alternatives_spanish:
  - ofrecemos
  - quemamos
  - hacemos humear
  lexicon: HALOT
  rationale: El verbo en Hifil expresa hacer ascender en humo una ofrenda sobre el altar. 'Hacemos subir' conserva la imagen cultual sin reducirla a mera combustión y funciona de manera natural en español bíblico contemporáneo.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino. Según la convención del proyecto, se conserva como 'Yahvé' en el texto principal para no enmascarar el Tetragrámaton.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: '''Holocaustos'' es el equivalente cultual tradicional y preciso para עֹלָה en contexto sacrificial. Mantiene la fuerza técnica del término más claramente que una paráfrasis descriptiva.'
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición hebrea marca regularidad distributiva. 'Mañana tras mañana' preserva el paralelismo y suena natural en español.
- source_word: וּבָעֶרֶב בָּעֶרֶב
  english_pob_choice: and evening by evening
  chosen_spanish: y tarde tras tarde
  alternatives_spanish:
  - y cada tarde
  - y tarde por tarde
  lexicon: HALOT
  rationale: La segunda repetición mantiene el mismo valor distributivo y el paralelismo con la frase anterior.
- source_word: וּקְטֹרֶת סַמִּים
  english_pob_choice: fragrant incense
  chosen_spanish: incienso aromático
  alternatives_spanish:
  - incienso fragante
  - incienso de especias
  lexicon: HALOT
  rationale: '''סַמִּים'' alude a especias/aromas. ''Incienso aromático'' comunica bien el carácter perfumado del incienso sin perder claridad en español.'
- source_word: וּמַעֲרֶכֶת לֶחֶם
  english_pob_choice: the arrangement of bread
  chosen_spanish: la disposición del pan
  alternatives_spanish:
  - la disposición de los panes
  - el pan puesto en orden
  - el pan de la presencia
  lexicon: HALOT
  rationale: El hebreo subraya el pan colocado en orden ante Dios. 'Disposición del pan' conserva la literalidad y evita introducir de antemano una terminología tradicional que el hebreo no expresa explícitamente.
- source_word: עַל הַשֻּׁלְחָן הַטָּהוֹר
  english_pob_choice: on the pure table
  chosen_spanish: sobre la mesa pura
  alternatives_spanish:
  - sobre la mesa limpia
  - sobre la mesa ritualmente pura
  lexicon: HALOT
  rationale: '''טהור'' en contexto cultual indica pureza ritual. ''Mesa pura'' mantiene el sentido sagrado y es más natural en español que una formulación excesivamente técnica.'
- source_word: וּמְנוֹרַת הַזָּהָב
  english_pob_choice: the golden lampstand
  chosen_spanish: el candelabro de oro
  alternatives_spanish:
  - el lampadario de oro
  - la menorá de oro
  lexicon: HALOT
  rationale: '''Candelabro'' es claro y digno en español; ''menorá'' sería más transliterado, y ''lampadario'' resulta poco natural. Se conserva la referencia al objeto del santuario.'
- source_word: וְנֵרֹתֶיהָ לְבָעֵר
  english_pob_choice: with its lamps to burn
  chosen_spanish: con sus lámparas para encenderlas
  alternatives_spanish:
  - con sus lámparas para arder
  - con sus lámparas para dar luz
  lexicon: HALOT
  rationale: 'El infinitivo expresa finalidad: las lámparas están para ser encendidas. ''Para encenderlas'' comunica la función con naturalidad en español y evita ambigüedad sobre si las lámparas mismas ''arden'' sin intervención humana.'
- source_word: בָּעֶרֶב בָּעֶרֶב
  english_pob_choice: evening by evening
  chosen_spanish: tarde tras tarde
  alternatives_spanish:
  - cada tarde
  - tarde por tarde
  lexicon: HALOT
  rationale: Se repite la fórmula distributiva para las lámparas; se mantiene la misma estrategia de traducción que en la primera expresión temporal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación que justifica las afirmaciones anteriores.
- source_word: שֹׁמְרִים אֲנַחְנוּ אֶת מִשְׁמֶרֶת
  english_pob_choice: we are keeping the charge
  chosen_spanish: estamos guardando la responsabilidad
  alternatives_spanish:
  - estamos guardando el encargo
  - estamos observando la obligación
  - estamos cumpliendo el cargo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea implica una comisión o deber sagrado que se cumple fielmente. 'Responsabilidad' comunica el sentido funcional en español, aunque el matiz de encargo cultual también puede mantenerse en nota.
- source_word: יְהוָה אֱלֹהֵינוּ
  english_pob_choice: Yahweh our God
  chosen_spanish: de Yahvé nuestro Dios
  alternatives_spanish:
  - de Yahvé, nuestro Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la convención del proyecto y la relación posesiva del hebreo.
- source_word: וְאַתֶּם עֲזַבְתֶּם אֹתוֹ
  english_pob_choice: but you have forsaken him
  chosen_spanish: pero ustedes lo han abandonado
  alternatives_spanish:
  - pero ustedes lo han dejado
  - pero ustedes lo han desamparado
  lexicon: HALOT
  rationale: '''Abandonado'' transmite con claridad el peso relacional y de ruptura del verbo en contexto de pacto, sin sonar excesivamente arcaico.'
theological_decisions:
- issue: Nombre divino Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo emplea explícitamente יְהוָה. La política del proyecto pide preservarlo como 'Yahvé' en el texto principal, evitando el sustituto litúrgico 'SEÑOR'.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Término para מִשְׁמֶרֶת
  english_pob_reading: the charge
  chosen_spanish_reading: la responsabilidad
  alternative_spanish_readings:
  - el encargo
  - la obligación
  - el deber
  rationale: El hebreo no habla solo de una rutina administrativa, sino de una comisión sagrada que se debe custodiar y cumplir. 'Responsabilidad' mantiene el sentido de deber confiado, aunque se reconoce en nota la alternativa más literal 'encargo/cargo'.
  doctrine_reference: Translation philosophy §1, §5
- issue: Terminología sacrificial para עֹלוֹת
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  rationale: En contexto sacerdotal, 'holocausto' es el término técnico asentado para עֹלָה y preserva el carácter total de la ofrenda consumida por fuego.
  doctrine_reference: Levitical sacrificial terminology
translation_notes:
  revision_awareness: 'Se revisó la decisión inglesa sobre el nombre divino y se aplicó la convención española del proyecto: ''Yahvé'' en lugar de ''el SEÑOR''. También se mantuvo la alternancia distributiva del hebreo (''mañana tras mañana'', ''tarde tras tarde'') y se evitó trasladar de forma mecánica la tradición de ''showbread'' en favor de una expresión más pegada al hebreo.'
  spanish_consistency_notes:
  - Se preservó la repetición distributiva hebrea con 'mañana tras mañana' / 'tarde tras tarde'.
  - '''Yahvé'' se usó de manera consistente para יְהוָה.'
  - '''Holocaustos'' se eligió como término técnico cultual para עֹלוֹת.'
  - '''Mesa pura'' mantiene la idea cultual de טָהוֹר sin sobreexplicar.'
  - La nota a[a] explica la tensión entre una traducción funcional ('responsabilidad') y la literalidad de מִשְׁמֶרֶת ('encargo/custodia').
