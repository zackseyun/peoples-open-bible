translation:
  language: es
  text: Consúmelos en ira[a]; consúmelos, y no sean más, y sepan que Dios gobierna en Jacob, hasta los confines de la tierra[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Destrúyelos en ira; destrúyelos, y no sean más». El hebreo puede expresarse de forma más abrupta y literal.
    reason: lexical_alternative
  - marker: b
    text: «En Jacob» alude al gobierno de Dios en relación con Jacob, es decir, Israel; algunos traducen «sobre Jacob».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּלֵּה
  english_pob_choice: Consume
  chosen_spanish: Consúmelos
  alternatives_spanish:
  - Destrúyelos
  - Acábalos
  - Pon fin a ellos
  lexicon: HALOT
  rationale: El piel imperativo de כלה expresa llevar algo a su fin con fuerza poética. «Consúmelos» conserva la imagen en español y refleja bien la repetición enfática del verbo.
- source_word: בְחֵמָה
  english_pob_choice: in wrath
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu furor
  - con ira
  - en tu enojo
  lexicon: HALOT
  rationale: חֵמָה es ira ardiente o furor. «En tu ira» es natural en español y mantiene el valor modal de la preposición ב.
- source_word: וְאֵינֵמוֹ
  english_pob_choice: so that they are no more
  chosen_spanish: de modo que no sean más
  alternatives_spanish:
  - y no sean más
  - hasta que no sean más
  - y desaparezcan
  lexicon: HALOT
  rationale: 'La frase hebrea expresa resultado: «y no existen/no son más». «De modo que no sean más» conserva el efecto resultativo sin añadir una duración no explícita.'
- source_word: וְיֵדְעוּ
  english_pob_choice: and let them know
  chosen_spanish: y haz que sepan
  alternatives_spanish:
  - y que sepan
  - para que sepan
  - y conocerán
  lexicon: HALOT
  rationale: En el contexto de súplica, el waw + imperfecto tiene fuerza de ruego/resulto. «Haz que sepan» reproduce esa intención sin volverlo mera predicción.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí designa al Dios verdadero de Israel; «Dios» es la traducción directa y estándar.
- source_word: מֹשֵׁל
  english_pob_choice: rules
  chosen_spanish: reina
  alternatives_spanish:
  - gobierna
  - domina
  - está gobernando
  lexicon: HALOT
  rationale: El participio expresa dominio continuo. «Reina» comunica bien la idea de soberanía sostenida en un registro poético natural en español.
- source_word: בְּיַעֲקֹב
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - sobre Jacob
  - entre Jacob
  - en Israel
  lexicon: HALOT
  rationale: Se conserva «Jacob» como designación pactual del pueblo. «En Jacob» mantiene la preposición literal y la tensión entre el ámbito del reinado y su referencia a Israel.
- source_word: לְאַפְסֵי הָאָרֶץ
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los rincones más lejanos de la tierra
  - a los confines de la tierra
  lexicon: HALOT
  rationale: El modismo hebreo indica el alcance más lejano de la tierra. «Hasta los confines de la tierra» es idiomático y fiel.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: El sentido exacto del término es incierto; se translitera como en el texto fuente.
theological_decisions:
- issue: Lenguaje imprecatorio y destrucción total
  english_pob_reading: Retain the direct petition for their complete destruction without softening it.
  chosen_spanish_reading: Conservar la petición directa y severa sin suavizarla.
  alternative_spanish_readings:
  - Atenuarlo con un sentido de mera derrota
  - Parafrasear la maldición para volverla menos intensa
  rationale: El hebreo repite el imperativo y pide que sean «no más». La traducción debe preservar esa dureza poética sin rebajarla por sensibilidad moderna.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrase beyond what the source warrants.'
- issue: Alcance del reinado divino en Jacob y hacia las naciones
  english_pob_reading: Render both God's rule 'in Jacob' and its recognition 'to the ends of the earth.'
  chosen_spanish_reading: Mantener tanto el reinado en Jacob como su alcance hasta los confines de la tierra.
  alternative_spanish_readings:
  - Limitarlo a Israel solamente
  - Universalizarlo y borrar la referencia a Jacob
  rationale: El versículo conserva la tensión entre el gobierno pactual sobre Jacob y su reconocimiento universal. La versión española no resuelve esa tensión.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail inglés: mantiene la secuencia directa «consume ... y no sean más» y vierte el valor jussivo de וְיֵדְעוּ con una forma exhortativa («haz que sepan») en vez de una simple futura predicción.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención del proyecto solo cuando aparece el Tetragrámaton; aquí el hebreo dice אֱלֹהִים, por eso se traduce «Dios».
  - Se preservó «Jacob» en lugar de sustituirlo por «Israel» en el texto principal, para respetar la designación pactual y la nota de alcance universal.
  - «Selah» se dejó sin traducir por la incertidumbre semántica del término, conforme a la práctica auditada.
