translation:
  language: es
  text: Los montes tiemblan delante de él, y las colinas se derriten; la tierra se agita[a] delante de él[b], el mundo y todos los que habitan en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra se alza» o «la tierra se convulsiona». El verbo hebreo puede transmitir aquí la idea de levantarse, elevarse o ser sacudida violentamente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «delante de su rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: El plural con artículo expresa el referente genérico de la poesía hebrea. «Montes» conserva el registro poético y bíblico sin perder claridad en español; «montañas» también sería posible, pero suena menos litúrgico en este contexto.
- source_word: רָעֲשׁוּ
  english_pob_choice: quake
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - sacuden
  lexicon: HALOT
  rationale: El verbo describe una conmoción sísmica o temblorosa. «Tiemblan» comunica bien la reacción cósmica en español natural; «se estremecen» intensifica la imagen, pero puede sonar más interpretativo.
- source_word: מִמֶּנּוּ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - a causa de él
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «de/desde él», el contexto teofánico apunta a la presencia de Dios. «Delante de él» preserva esa relación espacial y evita una traducción demasiado mecánica como «desde él».
- source_word: וְהַגְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los collados
  - los cerros
  lexicon: HALOT
  rationale: גְּבָעוֹת se refiere a elevaciones menores que montes; «colinas» es claro y neutral en español. «Collados» sería más tradicional, pero menos común en lectura pública moderna.
- source_word: הִתְמֹגָגוּ
  english_pob_choice: melt
  chosen_spanish: se derriten
  alternatives_spanish:
  - se disuelven
  - se deshacen
  lexicon: HALOT
  rationale: La forma reflexiva comunica deshacerse o derretirse por la presencia divina. «Se derriten» mantiene la imagen vívida sin añadir más contenido del que ofrece el hebreo.
- source_word: וַתִּשָּׂא
  english_pob_choice: heaves
  chosen_spanish: se estremece
  alternatives_spanish:
  - se alza
  - se levanta
  - se agita
  lexicon: HALOT
  rationale: El verbo נשׂא en este contexto expresa un levantarse o moverse hacia arriba, dentro de un cuadro cósmico de sacudida. «Se estremece» preserva el efecto general en español y evita sugerir un mero movimiento vertical literal que podría sonar extraño aquí.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En paralelo con «el mundo», el término apunta al ámbito creado. «La tierra» conserva la amplitud semántica y el paralelismo poético con el resto del verso.
- source_word: מִפָּנָיו
  english_pob_choice: before his face
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante su rostro
  - ante su presencia
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de delante de su rostro/cara». En español, «delante de él» comunica la presencia sin volver la frase demasiado pesada; se conserva la tensión antropomórfica sin resolverla.
- source_word: תֵבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  lexicon: HALOT
  rationale: תֵבֵל suele designar el mundo habitado/ordenado. «El mundo» es la equivalencia natural más directa en español, especialmente en paralelismo con «la tierra».
- source_word: יֹשְׁבֵי בָהּ
  english_pob_choice: all who dwell in it
  chosen_spanish: todos los que habitan en él
  alternatives_spanish:
  - todos los que viven en ella
  - todos sus habitantes
  lexicon: HALOT
  rationale: La construcción participial se rinde bien como una cláusula relativa inclusiva. Se eligió el pronombre masculino genérico «él» para concordar con «el mundo» en español y mantener la referencia al antecedente inmediato.
theological_decisions:
- issue: Presencia divina como causa de la convulsión cósmica
  english_pob_reading: Render the verse as describing creation's reaction to the LORD's presence without softening the imagery into mere metaphor.
  chosen_spanish_reading: Presentar el verso como la reacción de la creación ante la presencia de Yahvé, sin rebajarlo a una mera metáfora política.
  alternative_spanish_readings:
  - Reducirlo a una imagen figurada de conmoción histórica o política
  - Suavizar el lenguaje para hacerlo menos cósmico
  rationale: El hebreo sitúa montes, colinas, tierra y mundo dentro de una escena de juicio teofánico. La traducción conserva esa amplitud y evita explicar o reducir la imagen, para mantener la tensión teológica del texto.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Antropomorfismo de «delante de él / de su rostro»
  english_pob_reading: Literally 'before his face.'
  chosen_spanish_reading: Conservar una expresión espacial personal («delante de él») que refleje el hebreo sin forzarla a un tecnicismo.
  alternative_spanish_readings:
  - «ante su rostro»
  - «ante su presencia»
  rationale: El hebreo usa una expresión de rostro/presencia que es teológicamente significativa. En español, «delante de él» mantiene la referencia personal y la fluidez pública; una forma más literal puede resultar pesada, y «presencia» podría nivelar demasiado la imagen.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del inglés POB, que afinó la imagen de la tierra como algo que «heaves» y prefirió «before him» como expresión más natural que «before his face». En español se ha mantenido esa decisión de naturalidad reverente: «delante de él» y «se estremece» conservan la fuerza cósmica sin perder legibilidad pública.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino según la terminología del proyecto, aunque este versículo no lo contiene explícitamente.
  - 'Se conserva el paralelismo poético de cuatro miembros: montes / colinas / tierra / mundo y habitantes.'
  - «El mundo» y el pronombre «él» se coordinan para evitar ambigüedad de género respecto de «la tierra», ya distinguida en la cláusula anterior.
  - No se usa «Cristo» ni vocabulario eclesiástico añadidivo, porque el texto es una descripción teofánica de juicio en lenguaje poético.
