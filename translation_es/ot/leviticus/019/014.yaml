  rationale: 'El texto requiere solo un ajuste menor para mayor naturalidad y precisión idiomática en español: «obstáculo» expresa mejor מִכְשֹׁל en esta construcción que «tropiezo». También se normaliza la capitalización tras dos puntos. No hay problemas doctrinales ni de fidelidad mayores.'
