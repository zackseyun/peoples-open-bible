id: EZR.3.7
reference: Ezra 3:7
source:
  edition: WLC
  text: וַ/יִּ֨תְּנוּ כֶ֔סֶף לַ/חֹצְבִ֖ים וְ/לֶ/חָרָשִׁ֑ים וּ/מַאֲכָ֨ל וּ/מִשְׁתֶּ֜ה וָ/שֶׁ֗מֶן לַ/צִּֽדֹנִים֙ וְ/לַ/צֹּרִ֔ים לְ/הָבִיא֩ עֲצֵ֨י אֲרָזִ֤ים מִן הַ/לְּבָנוֹן֙ אֶל יָ֣ם יָפ֔וֹא כְּ/רִשְׁי֛וֹן כּ֥וֹרֶשׁ מֶֽלֶךְ פָּרַ֖ס עֲלֵי/הֶֽם־־־־׃פ
translation:
  text: So they gave money to the stonecutters and to the craftsmen[a], and food and drink and oil to the Sidonians and the Tyrians, to bring cedar timber from Lebanon to the sea at Joppa[c][b], according to the authorization of Cyrus king of Persia upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver' instead of 'money.' The Hebrew term can denote the metal itself or money in a payment context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the port of Joppa.' Literally, 'to the sea of Joppa.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the permission/grant of Cyrus king of Persia to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: So they gave
  alternatives:
  - And they gave
  - Then they gave
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So' gives natural English narrative flow while preserving sequential force.
- source_word: כֶסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although the noun literally denotes 'silver,' in payment contexts it commonly functions as 'money.' This is an optimal-equivalence rendering that reflects the economic sense here.
- source_word: לַחֹצְבִים
  chosen: to the stonecutters
  alternatives:
  - to the quarrymen
  - to the hewers
  lexicon: HALOT
  rationale: The participle from חצב refers to those who cut or quarry stone. 'Stonecutters' is clear modern English and fits the temple-building context.
- source_word: וְלֶחָרָשִׁים
  chosen: and to the craftsmen
  alternatives:
  - and to the artisans
  - and to the workers
  lexicon: HALOT
  rationale: חָרָשׁ can denote a skilled worker or artisan in various materials. 'Craftsmen' preserves the sense of skilled labor without over-specifying a trade.
- source_word: וּמַאֲכָל
  chosen: food
  alternatives:
  - provisions
  lexicon: HALOT
  rationale: Straightforward rendering of edible supplies; paired with drink and oil as goods provided.
- source_word: וּמִשְׁתֶּה
  chosen: drink
  alternatives:
  - beverage
  - feast
  lexicon: HALOT
  rationale: Here the noun is best taken concretely as drink/supplies for drinking, not as a banquet event, since it appears in a list of provisions.
- source_word: וָשֶׁמֶן
  chosen: and oil
  lexicon: HALOT
  rationale: Standard rendering; likely olive oil as a trade provision, but the Hebrew does not require specifying 'olive.'
- source_word: לַצִּדֹנִים וְלַצֹּרִים
  chosen: to the Sidonians and the Tyrians
  alternatives:
  - to the people of Sidon and the people of Tyre
  lexicon: HALOT
  rationale: These gentilics refer to people from Sidon and Tyre, matching the known Phoenician suppliers of cedar.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - for bringing
  lexicon: HALOT
  rationale: Infinitive of purpose explaining why the provisions were given.
- source_word: עֲצֵי אֲרָזִים
  chosen: cedar timber
  alternatives:
  - cedar wood
  - cedar logs
  lexicon: HALOT
  rationale: Construct phrase literally 'woods/trees of cedars.' In building context, 'cedar timber' is idiomatic and suitably specific.
- source_word: מִן הַלְּבָנוֹן
  chosen: from Lebanon
  lexicon: HALOT
  rationale: Geographical source of the cedar timber.
- source_word: אֶל יָם יָפוֹא
  chosen: to the sea at Joppa
  alternatives:
  - to Joppa by sea
  - to the port of Joppa
  lexicon: HALOT
  rationale: Literally 'to the sea of Joppa.' This likely refers to the seacoast/harbor at Joppa. 'To the sea at Joppa' stays close to the Hebrew while remaining intelligible.
- source_word: כְּרִשְׁיוֹן
  chosen: according to the authorization
  alternatives:
  - according to the permission
  - according to the grant
  - according to the decree
  lexicon: HALOT
  rationale: The noun denotes official permission or authorization. 'Authorization' captures the administrative sense without implying a formal edict more strongly than the term itself requires.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  chosen: of Cyrus king of Persia
  alternatives:
  - from Cyrus king of Persia
  lexicon: HALOT
  rationale: 'Genitival relation after ''authorization'': the authorization belonged to or came from Cyrus. ''Of'' is natural with the chosen English construction.'
- source_word: עֲלֵיהֶם
  chosen: upon them
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The preposition is literally 'upon them.' Retaining 'upon them' preserves the Hebrew idiom, though in English it means the authorization rested on or applied to them.
