base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/010/006.yaml
  text: When the sons of Ammon saw that they had become odious to David[a], the sons of Ammon sent and hired the Arameans of Beth-rehob and the Arameans of Zobah, twenty thousand foot soldiers, and the king of Maacah with one thousand men, and the men of Tob[c][b], twelve thousand men.
  footnotes:
