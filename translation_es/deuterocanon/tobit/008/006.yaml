translation:
  language: es
  text: 'Tú hiciste a Adán, y le diste a Eva como ayuda[a] y apoyo, su esposa; de estos vino la descendencia[b] de la humanidad. Tú dijiste: «No es bueno que el hombre esté solo[c]; hagamos para él una ayuda semejante a él»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ayuda» refleja el griego βοηθὸν y mantiene el eco de Génesis 2:18; en español también podría traducirse «ayudadora» o «auxiliadora».
    reason: lexical_alternative
  - marker: b
    text: O «simiente». El griego dice literalmente «la descendencia / semilla de la humanidad», preservando la imagen genealógica de origen y transmisión.
    reason: lexical_alternative
  - marker: c
    text: Esta línea evoca Génesis 2:18.
    reason: cross_reference
lexical_decisions:
- source_word: ἐποίησας
  english_pob_choice: you made
  chosen_spanish: hiciste
  alternatives_spanish:
  - creaste
  - formaste
  lexicon: BDAG
  rationale: En una oración dirigida a Dios, «hiciste» es natural en español y conserva el valor básico de ποιέω sin introducir una precisión teológica distinta de la que da el griego.
- source_word: Ἀδάμ
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: transliteración bíblica estándar
  rationale: Nombre propio bíblico en español; «Adán» es la forma asentada y transparente para el lector.
- source_word: ἔδωκας
  english_pob_choice: you gave
  chosen_spanish: le diste
  alternatives_spanish:
  - le concediste
  - le otorgaste
  lexicon: BDAG
  rationale: «Le diste» reproduce δίδωμι de forma directa e idiomática en español, manteniendo el tono de provisión divina.
- source_word: βοηθὸν
  english_pob_choice: helper
  chosen_spanish: ayudadora
  alternatives_spanish:
  - ayuda
  - auxiliadora
  - ayudante
  lexicon: BDAG
  rationale: Para preservar el eco de Génesis 2:18, se mantiene el campo semántico de «ayuda/ayudador». «Ayudadora» hace explícito el referente femenino de Eva en este contexto y evita una lectura mecánica demasiado genérica.
- source_word: στήριγμα
  english_pob_choice: support
  chosen_spanish: apoyo
  alternatives_spanish:
  - sostén
  - soporte
  - sostén y apoyo
  lexicon: LSJ
  rationale: «Apoyo» es el equivalente más natural y claro en español para στήριγμα, conservando la idea de sostén sin volverlo técnico o demasiado corporal.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: BDAG
  rationale: En este contexto marital, «esposa» es la opción más clara y digna en español, y corresponde al valor contextual de γυνή.
- source_word: ἐκ τούτων
  english_pob_choice: from these
  chosen_spanish: de estos
  alternatives_spanish:
  - de ellos
  - de ambos
  lexicon: BDAG
  rationale: Se conserva el plural demostrativo y la referencia a Adán y Eva como pareja originaria.
- source_word: τὸ ἀνθρώπων σπέρμα
  english_pob_choice: the seed of mankind
  chosen_spanish: la descendencia de la humanidad
  alternatives_spanish:
  - la simiente de la humanidad
  - la descendencia del género humano
  - la semilla de la humanidad
  lexicon: BDAG
  rationale: «Descendencia» preserva la imagen genealógica de σπέρμα sin sonar extrañamente literal en español. «De la humanidad» mantiene el alcance genérico de ἀνθρώπων.
- source_word: Οὐ καλὸν εἶναι τὸν ἄνθρωπον μόνον
  english_pob_choice: It is not good for the man to be alone
  chosen_spanish: No es bueno que el hombre esté solo
  alternatives_spanish:
  - No es bueno que el ser humano esté solo
  - No conviene que el hombre esté solo
  lexicon: BDAG
  rationale: Se conserva el eco de Génesis 2:18. «El hombre» sigue el artículo del griego y el enlace intertextual con Adán; «esté solo» expresa con naturalidad el estado descrito.
- source_word: ποιήσωμεν
  english_pob_choice: let us make
  chosen_spanish: hagamos
  alternatives_spanish:
  - vamos a hacer
  - haremos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se reproduce de forma natural con «hagamos», manteniendo la cadencia de la alusión a Génesis.
- source_word: ὅμοιον αὐτῷ
  english_pob_choice: like himself
  chosen_spanish: semejante a él
  alternatives_spanish:
  - igual a él
  - parecido a él
  - como él
  lexicon: BDAG
  rationale: «Semejante a él» conserva el sentido de ὅμοιον con un registro sobrio y bíblico, evitando una simplificación excesiva.
theological_decisions:
- issue: ¿Cómo traducir ἀνθρώπων en una afirmación genealógica sobre la humanidad?
  english_pob_reading: the seed of mankind
  chosen_spanish_reading: la descendencia de la humanidad
  alternative_spanish_readings:
  - la simiente de la humanidad
  - la descendencia del género humano
  - la raza humana
  rationale: La frase describe el origen y transmisión de la humanidad a partir de Adán y Eva. «Descendencia» mantiene la metáfora biológica/genealógica; «humanidad» conserva el alcance universal sin masculinizar indebidamente el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos controvertidos sobre אָדָם / hombre / humanidad
- issue: Mantener el eco de Génesis 2:18 en el discurso de oración
  english_pob_reading: It is not good for the man to be alone; let us make for him a helper like himself
  chosen_spanish_reading: No es bueno que el hombre esté solo; hagamos para él una ayudadora semejante a él
  alternative_spanish_readings:
  - No es bueno que el ser humano esté solo; hagamos para él una ayuda semejante a él
  - No es bueno que el hombre esté solo; hagamos para él una ayuda como él
  rationale: El texto de Tobit remite explícitamente a Génesis. Se conserva la formulación reconocible para que el lector perciba la cita/alusión sin perder claridad en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: Esta redacción sigue el último pase revisado del inglés POB, especialmente la apposición «helper and support, his wife», que aquí se reflejó como «ayudadora y apoyo, su esposa». También se mantuvo el eco intertextual de Génesis 2:18 y la lectura genealógica de σπέρμα/seed mediante «descendencia».
  spanish_consistency_notes:
  - Se usa «Adán» como forma establecida para Ἀδάμ.
  - Se opta por «Yahvé» solo cuando aparezca el nombre divino en el texto base; en este versículo el sujeto es de segunda persona, así que no hace falta introducirlo.
  - Se conserva un registro bíblico claro y moderno, evitando calcos innecesarios.
  - Se mantiene la distinción entre «ayudadora/ayuda» y «apoyo» para no perder la doble expresión del griego βοηθὸν ... στήριγμα.
