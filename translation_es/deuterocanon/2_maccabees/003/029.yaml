translation:
  language: es
  text: Y él[a], por el poder divino, yacía sin poder hablar y privado de toda esperanza y salvación;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de toda esperanza y rescate». El griego σωτηρία puede significar rescate, liberación o salvación según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: θείαν ἐνέργειαν
  english_pob_choice: the divine power
  chosen_spanish: el poder divino
  alternatives_spanish:
  - la acción divina
  - la actividad divina
  - la intervención divina
  lexicon: BDAG
  rationale: ἐνέργεια nombra una acción eficaz o poder operativo. En español, «el poder divino» comunica con naturalidad la fuerza activa procedente de Dios sin volver la frase técnica o pesada.
- source_word: ἄφωνος
  english_pob_choice: speechless
  chosen_spanish: sin voz
  alternatives_spanish:
  - mudo
  - incapaz de hablar
  - callado
  lexicon: LSJ
  rationale: El griego indica falta de voz o incapacidad para hablar. «Sin voz» conserva bien esa idea y evita sonar demasiado interpretativo.
- source_word: πάσης ἐστερημένος ἐλπίδος καὶ σωτηρίας
  english_pob_choice: deprived of all hope and salvation
  chosen_spanish: privado de toda esperanza y salvación
  alternatives_spanish:
  - privado de toda esperanza y rescate
  - despojado de toda esperanza y liberación
  - privado de toda esperanza y de la salvación
  lexicon: BDAG
  rationale: ἐστερημένος expresa privación real. Mantengo «esperanza y salvación» para seguir de cerca la correspondencia léxica del texto base; en este contexto narrativo, «salvación» conserva la amplitud de σωτηρία sin reducirla únicamente a un rescate físico.
- source_word: ἔρριπτο
  english_pob_choice: lay
  chosen_spanish: yacía
  alternatives_spanish:
  - estaba tendido
  - quedó tendido
  - estaba echado
  lexicon: LSJ
  rationale: 'El imperfecto describe su estado resultante: permanecía tendido. «Yacía» suena natural en español y refleja bien el estado duradero sin añadir un matiz de acción no presente en el griego.'
theological_decisions:
- issue: σωτηρία en un contexto narrativo de juicio/intervención divina
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - rescate
  - liberación
  rationale: Aunque el contexto inmediato es físico y narrativo, la POB inglesa revisó desde «rescue» a «salvation» para corresponder más estrechamente a σωτηρίας. En español conviene mantener «salvación» como término más fiel y abrir en decisiones léxicas la posibilidad contextual de «rescate» sin sustituir el texto principal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que prefirió una correspondencia más cercana para ἔρριπτο y σωτηρίας. Por eso se mantiene un verbo de estado («yacía») y «salvación» en el texto principal, mientras la nota conserva la alternativa contextual «rescate».
  spanish_consistency_notes:
  - Se usa «poder divino» para θείαν ἐνέργειαν, en línea con la decisión inglesa de priorizar fuerza operativa/eficaz.
  - Se evita «SEÑOR» o paráfrasis doctrinales; el versículo narra un efecto divino inmediato.
  - «Salvación» se conserva en el texto principal por correspondencia léxica con σωτηρία, aunque la nota reconoce el matiz narrativo de rescate.
  - El inicio con «Y él[a]» mantiene el sujeto explícito del griego y la continuidad narrativa del contexto.
