translation:
  language: es
  text: No harás así con Yahvé tu Dios, porque han hecho para sus dioses toda abominación que Yahvé odia; pues aun queman en el fuego a sus hijos y a sus hijas para sus dioses.
  philosophy: formal
lexical_decisions:
- source_word: לֹא תַעֲשֶׂה כֵן
  english_pob_choice: You shall not do so
  chosen_spanish: No harás así
  alternatives_spanish:
  - No harás de esa manera
  - No harás eso
  lexicon: HALOT
  rationale: La prohibición dirige al oyente en segunda persona singular y remite al modo prohibido del contexto inmediato. «Así» conserva la referencia anafórica sin añadir paráfrasis.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé tu Dios
  alternatives_spanish:
  - para Yahvé tu Dios
  - contra Yahvé tu Dios
  lexicon: HALOT
  rationale: El ל expresa relación/dirección hacia Yahvé en un marco cultual. «A Yahvé tu Dios» mantiene el valor relacional y el nombre divino según el estándar del proyecto.
- source_word: תּוֹעֲבַת יְהוָה
  english_pob_choice: every abomination that Yahweh hates
  chosen_spanish: toda abominación que Yahvé odia
  alternatives_spanish:
  - toda cosa abominable que Yahvé odia
  - toda abominación de Yahvé
  lexicon: HALOT
  rationale: «To‘eváh» pide un término fuerte; «abominación» conserva la carga moral/cultual del hebreo. La relación correcta aquí es la cláusula relativa «que Yahvé odia», no una posesión ('de Yahvé').
- source_word: אֲשֶׁר שָׂנֵא
  english_pob_choice: that he hates
  chosen_spanish: que Yahvé odia
  alternatives_spanish:
  - que él odia
  - que detesta
  lexicon: HALOT
  rationale: Se mantiene la atribución personal a Yahvé y el verbo fuerte «odiar», evitando suavizarlo con un equivalente más débil.
- source_word: עָשׂוּ לֵאלֹהֵיהֶם
  english_pob_choice: they have done for their gods
  chosen_spanish: la han hecho para sus dioses
  alternatives_spanish:
  - la hicieron para sus dioses
  - la han practicado para sus dioses
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una práctica estable ya realizada; el español perfecto compuesto comunica esa vigencia. El antecedente de «la» es la abominación mencionada antes, respetando la economía del hebreo.
- source_word: כִּי גַם
  english_pob_choice: for they even
  chosen_spanish: pues aun
  alternatives_spanish:
  - porque aun
  - pues incluso
  lexicon: HALOT
  rationale: «כי» introduce explicación y «גם» intensifica. «Pues aun» suena natural en español y conserva el carácter explicativo e intensificador.
- source_word: בְּנֵיהֶם וְאֶת בְּנֹתֵיהֶם
  english_pob_choice: their sons and their daughters
  chosen_spanish: a sus hijos y a sus hijas
  alternatives_spanish:
  - a sus hijos e hijas
  - a sus hijos, tanto hijos como hijas
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente varones y mujeres; se preserva esa especificidad. Se evita generalizar a «niños» para no perder el paralelismo.
- source_word: יִשְׂרְפ֥וּ בָ/אֵשׁ
  english_pob_choice: burn ... in the fire
  chosen_spanish: los queman en el fuego
  alternatives_spanish:
  - los queman con fuego
  - los hacen pasar por el fuego
  lexicon: HALOT
  rationale: «Quemar en el fuego» refleja el acto literal y violento del texto. Se evita la fórmula interpretativa «hacer pasar por el fuego», que no es la elección del POB inglés aquí.
- source_word: לֵאלֹהֵיהֶם
  english_pob_choice: for their gods
  chosen_spanish: para sus dioses
  alternatives_spanish:
  - a sus dioses
  - en honor de sus dioses
  lexicon: HALOT
  rationale: La preposición ל expresa orientación/consagración cultual. «Para sus dioses» mantiene la dedicación ritual sin añadir explicaciones.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto establece «Yahvé» como forma principal para el Tetragrámaton. Se evita el sustituto litúrgico «SEÑOR» porque el objetivo es transparente y auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza moral de תּוֹעֲבָה y שָׂנֵא
  english_pob_reading: 'Retain strong language: ''abomination'' and ''hates'''
  chosen_spanish_reading: 'Conservar el lenguaje fuerte: «abominación» y «odia»'
  alternative_spanish_readings:
  - cosa detestable y rechaza
  - cosa ofensiva y desaprueba
  rationale: El texto no presenta solo irregularidad ritual sino repulsión moral/cultual intensa. «Abominación» y «odia» conservan esa severidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not flatten theological weight'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y el cierre revisado del audit trail inglés, especialmente la corrección que vincula «toda abominación» con la cláusula relativa «que Yahvé odia». No se añadió una glosa explicativa ni una equivalencia tradicional como «hacer pasar por el fuego», porque el contexto y el POB inglés sostienen el verbo literal «quemar».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en vez de «SEÑOR» para la consistencia con el estándar del proyecto.
  - Se usa «abominación» para conservar la fuerza cultual/moral del hebreo.
  - Se conserva la segunda persona singular para reflejar la forma del mandato hebreo.
  - «Para sus dioses» refleja la orientación cultual del texto sin redefinirla.
  - No se normalizó el verbo a un eufemismo; el acto violento permanece explícito.
