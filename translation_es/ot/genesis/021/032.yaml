translation:
  language: es
  text: Así hicieron un pacto en Beer-seba[a], y Abimelec se levantó con Ficol, el comandante de su ejército, y volvieron a la tierra de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “cortaron un pacto”, un modismo para establecer un pacto solemne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרְתוּ בְרִית
  english_pob_choice: they made a covenant
  chosen_spanish: hicieron un pacto
  alternatives_spanish:
  - cortaron un pacto
  - entraron en un pacto
  - hicieron un convenio
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal de “cortar un pacto”. En español, “hacer un pacto” comunica con naturalidad el mismo acto jurídico-relacional sin volver opaco el modismo. “Convenio” es posible, pero en este contexto bíblico pierde el tono de pacto solemne.
- source_word: בִּבְאֵר שָׁבַע
  english_pob_choice: at Beer-sheba
  chosen_spanish: en Beer-seba
  alternatives_spanish:
  - en Beerseba
  - en Beer-sheba
  - en la fuente de Seba
  lexicon: HALOT
  rationale: El lugar se translitera en forma reconocible para el lector hispano. Se mantiene la preposición “en” porque el texto sitúa la acción en ese lugar. Se prefiere una grafía española clara, Beer-seba, frente a formas más inglesas.
- source_word: וַיָּקָם
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  - se levantó y partió
  lexicon: HALOT
  rationale: El verbo קום aquí marca que Abimelec se puso en movimiento tras el pacto. “Se levantó” conserva el valor básico de levantarse/surgir y resulta natural en español narrativo. “Arose” sería más formal y menos idiomático.
- source_word: שַׂר צְבָאוֹ
  english_pob_choice: the commander of his army
  chosen_spanish: el comandante de su ejército
  alternatives_spanish:
  - el jefe de su ejército
  - el capitán de su ejército
  - el comandante de sus fuerzas
  lexicon: HALOT
  rationale: שַׂר indica un jefe o comandante, y צָבָא aquí es militar. “Comandante de su ejército” conserva la fuerza militar del hebreo y evita un matiz demasiado arcaico.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: they returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - se volvieron
  - volvieron de regreso
  lexicon: HALOT
  rationale: El verbo שׁוּב expresa retorno. “Volvieron” es breve y natural en narración bíblica en español, y mantiene el movimiento de regreso.
- source_word: אֶל אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: to the land of the Philistines
  chosen_spanish: a la tierra de los filisteos
  alternatives_spanish:
  - a la tierra de Filistea
  - al territorio de los filisteos
  - a la tierra filistea
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente “la tierra de los filisteos”. “Tierra” preserva el valor etnogeográfico del original mejor que “territorio”, y mantiene el paralelismo con el texto fuente.
- source_word: וּפִיכֹל
  english_pob_choice: with Phicol
  chosen_spanish: con Ficol
  alternatives_spanish:
  - y Ficol
  lexicon: HALOT
  rationale: Aunque el hebreo usa simplemente la conjunción, el contexto narrativo muestra que Ficol acompaña a Abimelec en la acción de levantarse y regresar. En español, “con Ficol” aclara naturalmente esa asociación sin añadir contenido nuevo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con la decisión inglesa de valor idiomático para וַיִּכְרְתוּ בְרִית, manteniendo la claridad natural en español. No se reportan revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usa “Yahvé” en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene la transliteración Beer-seba para respetar el nombre propio con forma española legible.
  - “Pacto” se elige como equivalente idiomático de ברית; no se usa “convenio” porque debilita el peso bíblico-solemne del término.
  - El referente de Ficol se expresa con “con” por claridad narrativa, siguiendo la equivalencia óptima del audit trail inglés.
