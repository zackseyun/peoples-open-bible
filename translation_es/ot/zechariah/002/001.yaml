translation:
  language: es
  text: Alcé mis ojos y vi[a]; he aquí, cuatro cuernos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuatro poderes». El hebreo dice «cuernos», una imagen bíblica común de fuerza o poder de gobierno; se conserva la imagen literal en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא
  english_pob_choice: I lifted up
  chosen_spanish: Alcé
  alternatives_spanish:
  - levanté
  - alcé hacia arriba
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática para dirigir la mirada. «Alcé» mantiene el movimiento ascendente implícito sin volver la frase pesada en español.
- source_word: עֵינַי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi mirada
  lexicon: HALOT
  rationale: Se conserva el miembro literal del modismo hebreo «alcé mis ojos», en vez de reducirlo a una equivalencia más interpretativa.
- source_word: וָאֵרֶא
  english_pob_choice: and saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y yo vi
  lexicon: HALOT
  rationale: Verbo narrativo simple en pasado; «vi» es natural en español y conserva la secuencia del relato visionario.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: «He aquí» reproduce el valor deíctico y la solemnidad profética de הִנֵּה sin añadir interpretación.
- source_word: אַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Numeral cardinal directo y no problemático.
- source_word: קְרָנוֹת
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - poderes
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «cuernos» porque el texto presenta un símbolo visionario que el contexto inmediato explicará. La alternativa «poderes» resolvería prematuramente la metáfora.
theological_decisions:
- issue: Imagen simbólica de los cuernos en la visión
  english_pob_reading: Retain the literal image 'four horns' in the main text.
  chosen_spanish_reading: Retener la imagen literal «cuatro cuernos» en el texto principal.
  alternative_spanish_readings:
  - cuatro poderes
  rationale: La función del verso es introducir un símbolo profético, no explicarlo. Mantener la imagen respeta la tensión interpretativa y deja la aclaración para el contexto posterior.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; primacía del texto מקור/ original sobre la paráfrasis interpretativa.'
translation_notes:
  revision_awareness: El cotejo más reciente reporta alta concordancia y ningún cambio necesario; se mantiene la solución literal-visionaria ya validada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se conserva el lenguaje visionario literal («cuernos») para no anticipar la explicación contextual.
  - La puntuación sigue el ritmo narrativo breve del hebreo con una sola oración coordinada.
