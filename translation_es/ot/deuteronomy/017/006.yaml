revisions:
- from: Sobre la base del testimonio de dos testigos o de tres testigos[a], el que ha de morir[b] será muerto; no será muerto sobre la base del testimonio de un solo testigo.
  to: Por el testimonio de dos testigos o de tres testigos[a], se le dará muerte al que ha de morir[b]; no se le dará muerte por el testimonio de un solo testigo.
  rationale: Se ajusta la redacción para lograr un español natural y jurídicamente claro, sin perder la fuerza del hebreo. ‘Por el testimonio de’ expresa bien el modismo עַל־פִּי, y ‘se le dará muerte’ comunica mejor que ‘será muerto’ el sentido causativo/pasivo de ejecución legal. Se conserva ‘el que ha de morir’ por fidelidad a la forma algo elíptica de הַמֵּת, y se mejora la nota b para que ofrezca una alternativa real y útil.
