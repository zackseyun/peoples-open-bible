revisions:
- from: Y harás cinco barras de madera de acacia para los marcos[a] del lado del tabernáculo, el primero.
  to: Y harás cinco barras de madera de acacia para los marcos[a] de un lado del tabernáculo.
  rationale: Se corrige «el primero» porque falsea הָאֶחָד al convertirlo en ordinal. Se reformula la expresión final como «de un lado del tabernáculo», que en español suena natural y conserva la función contrastiva del hebreo con el lado correspondiente del versículo siguiente. Se mantiene «marcos» con nota alternativa, en línea con la decisión léxica documentada.
