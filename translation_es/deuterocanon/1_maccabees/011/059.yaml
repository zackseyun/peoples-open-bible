translation:
  language: es
  text: Y nombró a Simón, su hermano, como comandante desde la Escalera de Tiro[a][b] hasta las fronteras de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «general». στρατηγός puede traducirse de manera más específica como un líder militar de alto rango, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Escalera de Tiro» es un nombre de lugar; probablemente alude al paso o escarpe costero cerca de Tiro, no a una escalera literal.
    reason: cultural_note
lexical_decisions:
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - nombró oficialmente
  - puso a cargo
  lexicon: LSJ
  rationale: El verbo indica colocar a alguien en una función u oficio. En español, «nombró» comunica de manera natural la designación oficial sin volverse demasiado literal ni perder el matiz administrativo.
- source_word: στρατηγὸν
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - general
  - jefe militar
  - comandante militar
  lexicon: LSJ
  rationale: El término griego puede referirse a un líder militar. «Comandante» preserva el sentido de autoridad militar de forma clara y evita imponer una estructura de rango más específica que la del texto.
- source_word: ἀπὸ τῆς κλίμακος Τύρου
  english_pob_choice: from the Ladder of Tyre
  chosen_spanish: desde la Escalera de Tiro
  alternatives_spanish:
  - desde la Escala de Tiro
  - desde el Paso de Tiro
  - desde la Escalera de Tiro (topónimo)
  lexicon: LSJ
  rationale: κλίμαξ significa literalmente «escalera», pero aquí funciona como topónimo. Se conserva el nombre tradicional descriptivo en español para mantener el valor geográfico y la rareza del lugar sin convertirlo en paráfrasis.
- source_word: ἕως τῶν ὁρίων Αἰγύπτου
  english_pob_choice: as far as the borders of Egypt
  chosen_spanish: hasta las fronteras de Egipto
  alternatives_spanish:
  - hasta los límites de Egipto
  - hasta la frontera de Egipto
  - hasta los confines de Egipto
  lexicon: LSJ
  rationale: ὅρια expresa límites o fronteras territoriales. «Fronteras» transmite bien el alcance geográfico y conserva el sentido de extensión territorial del griego.
- source_word: Σίμωνα τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: Simon his brother
  chosen_spanish: Simón, su hermano
  alternatives_spanish:
  - Simón, su hermano
  - a Simón, su hermano
  lexicon: LSJ
  rationale: La frase identifica a Simón en relación con el sujeto. En español, la apposición con coma es la forma más natural y clara para preservar la relación familiar sin oscurecer la sintaxis.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés coinciden plenamente; no se registraron revisiones sustantivas. Se mantuvo la estructura básica del original, con adaptación natural al español y preservación del topónimo y del rango militar.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «comandante» en consonancia con el valor militar de στρατηγός, dejando constancia de la alternativa «general».
  - Se mantuvo la forma toponímica «Escalera de Tiro» para reflejar el lugar descrito por el texto.
  - La puntuación reproduce la identificación appositiva de Simón sin sobrecargar la frase.
