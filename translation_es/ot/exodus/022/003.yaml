translation:
  language: es
  text: Si el animal robado es realmente hallado en su posesión[a] con vida —sea buey, asno u oveja—, pagará el doble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “si al hallarlo se halla en su mano lo robado”. El hebreo usa una construcción verbal enfática (“de veras” o “ciertamente se halla”) y el modismo jurídico “en su mano” para indicar posesión o control.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - En caso de que
  lexicon: HALOT
  rationale: Introduce una cláusula legal condicional de manera natural y fiel al hebreo.
- source_word: הִמָּצֵא תִמָּצֵא
  english_pob_choice: is actually found
  chosen_spanish: es hallado
  alternatives_spanish:
  - es hallado de veras
  - es realmente hallado
  - es ciertamente hallado
  lexicon: HALOT
  rationale: La construcción enfática del hebreo se conserva de forma sobria con ‘es hallado’; el adverbio ‘vivo’ ya completa el estado del objeto recuperado sin sobrecargar el español.
- source_word: בְיָדוֹ
  english_pob_choice: in his possession
  chosen_spanish: en su posesión
  alternatives_spanish:
  - en su mano
  - bajo su control
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘en su mano’, pero en contexto jurídico español ‘en su posesión’ comunica mejor la idea de tenencia o custodia sin perder el valor forense.
- source_word: הַגְּנֵבָה
  english_pob_choice: the stolen item
  chosen_spanish: el objeto robado
  alternatives_spanish:
  - la cosa robada
  - el bien robado
  - la propiedad robada
  lexicon: HALOT
  rationale: ‘La robado’ sería demasiado abstracto; ‘objeto robado’ preserva el referente material del sustantivo hebreo y evita sugerir el acto del robo.
- source_word: מִשּׁוֹר עַד חֲמוֹר עַד שֶׂה
  english_pob_choice: whether ox, donkey, or sheep
  chosen_spanish: sea buey, asno o oveja
  alternatives_spanish:
  - sea un buey, un asno o una oveja
  - desde buey hasta asno y hasta oveja
  lexicon: HALOT
  rationale: La serie hebrea presenta animales representativos; en español, la enumeración con ‘sea… o…’ reproduce bien el valor distributivo de la casuística legal.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - con vida
  - aún vivo
  lexicon: HALOT
  rationale: En español jurídico y narrativo, ‘vivo’ es directo y claro para un bien o animal recuperado sin sacrificar el sentido de que no fue sacrificado ni destruido.
- source_word: שְׁנַיִם יְשַׁלֵּם
  english_pob_choice: he shall repay double
  chosen_spanish: pagará el doble
  alternatives_spanish:
  - restituirá el doble
  - deberá pagar dos veces
  lexicon: HALOT
  rationale: La fórmula legal indica restitución doble; ‘pagará el doble’ es natural, breve y conserva el mandato jurídico.
translation_notes:
  revision_awareness: A la luz del audit trail inglés, la decisión principal fue mantener la fuerza legal y la intensificación verbal del hebreo sin caer en una calca excesiva. Se conserva el carácter casuístico del verso, la idiomaticidad forense de ‘en su mano’ y la lista representativa de animales, con una redacción española fluida y publicable.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Objeto robado’ conserva mejor el referente material que un sustantivo abstracto como ‘robo’.
  - ‘Pagará el doble’ funciona como equivalente idiomático de la restitución doble en lenguaje jurídico moderno.
