translation:
  language: es
  text: 'Y dijo Judith[a]: «No comeré de eso, para que no haya tropiezo; más bien, se me proveerá de las cosas que me han acompañado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofensa», o «escándalo». El griego σκάνδαλον puede denotar tropiezo, ofensa o causa de caída.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ φάγομαι
  english_pob_choice: I will not eat
  chosen_spanish: No comeré
  alternatives_spanish:
  - No he de comer
  - No voy a comer
  - No participaré de ellos
  lexicon: LSJ
  rationale: El futuro de primera persona expresa bien la negativa resuelta de Judith. «No comeré» es natural en español y conserva la fuerza directa del rechazo.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de eso
  - de estas cosas
  - de esas provisiones
  lexicon: LSJ
  rationale: El pronombre apunta a los alimentos ofrecidos en el contexto inmediato. «De ellos» mantiene la referencia partitiva sin añadir especificación innecesaria.
- source_word: ἵνα μὴ γένηται
  english_pob_choice: lest there be
  chosen_spanish: para que no haya
  alternatives_spanish:
  - para que no llegue a haber
  - no sea que haya
  - a fin de que no haya
  lexicon: LSJ
  rationale: La cláusula expresa prevención de un resultado. «Para que no haya» comunica bien la finalidad negativa en español, sin perder el valor prospectivo.
- source_word: σκάνδαλον
  english_pob_choice: an offense
  chosen_spanish: tropiezo
  alternatives_spanish:
  - ofensa
  - escándalo
  - causa de caída
  lexicon: LSJ
  rationale: El término puede abarcar tropiezo, ofensa o causa de caída. Aquí se conserva la imagen moral de algo que hace caer, sin reducirlo solo a «escándalo» social. La nota recoge la alternativa semántica documentada.
- source_word: ἀλλʼ
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - antes bien
  - pero
  lexicon: LSJ
  rationale: La partícula contrasta la negativa con la alternativa aceptada. «Más bien» suena formal y refleja el matiz adversativo con claridad.
- source_word: ἐκ τῶν ἠκολουθηκότων μοι
  english_pob_choice: from the things that have accompanied me
  chosen_spanish: de lo que ha venido conmigo
  alternatives_spanish:
  - de las cosas que me han acompañado
  - de las provisiones que traigo conmigo
  - de lo que me acompañó
  lexicon: LSJ
  rationale: El participio perfecto de ἀκολουθέω conserva la idea de algo que ha acompañado a Judith. «Ha venido conmigo» es una equivalencia idiomática que preserva la imagen de acompañamiento sin sonar forzada en español.
- source_word: χορηγηθήσεται
  english_pob_choice: will be made / will be provided
  chosen_spanish: se me proveerá
  alternatives_spanish:
  - se me suministrará
  - se me proporcionará
  - me será provisto
  lexicon: LSJ
  rationale: El futuro pasivo expresa que la provisión vendrá de fuera. «Se me proveerá» es claro, formal y mantiene la pasiva con dativo de ventaja.
theological_decisions:
- issue: Sentido de σκάνδαλον en el contexto de la negativa de Judith
  english_pob_reading: The English POB chose the direct lexical alternative 'an offense' in the revision while retaining the footnoted range 'a stumbling block' / 'a scandal.'
  chosen_spanish_reading: «Tropiezo» en el texto, con nota sobre «ofensa» y «escándalo» como alternativas semánticas.
  alternative_spanish_readings:
  - ofensa
  - escándalo
  - causa de caída
  rationale: Judith evita comer para no incurrir en una situación moralmente comprometida. «Tropiezo» preserva la metáfora de caída y permite mantener la tensión sin diluirla en mera vergüenza pública. La nota da cuenta del rango semántico documentado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que desplazó la imagen de «stumbling block» hacia una formulación más directa con «offense» y volvió más explícita la última cláusula sobre la provisión. En español se mantuvo la claridad de la revisión, pero se conservó la metáfora de σκάνδαλον con «tropiezo», apoyada por nota, para no perder el relieve figurado del término.
  spanish_consistency_notes:
  - Se usa «Judith» sin artículo, como nombre propio en estilo bíblico.
  - Se mantiene el orden de contraste de la cláusula con «más bien».
  - «Se me proveerá» conserva el valor pasivo y suena idiomático en español bíblico actual.
  - La nota a pie de página marca únicamente la alternativa léxica de σκάνδαλον y no introduce otras variantes no documentadas.
