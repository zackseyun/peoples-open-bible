    reason: lexical_alternative
  - marker: b
    text: Es decir, el sentido es que tomar la bebida equivaldría a tratarla como sangre.
    reason: cultural_note
  revision_rationale: Se corrigió el aparato de notas para que los marcadores sean únicos, estén anclados en los lugares pertinentes y representen fielmente las notas del POB en inglés. También se cambió 'juzgó' por 'razonó' para reflejar mejor ἐλογίσατο/λογίζομαι en el argumento de 4 Macabeos. Se mantuvo el resto del phrasing porque transmite adecuadamente el sentido del griego en un español natural y digno.
