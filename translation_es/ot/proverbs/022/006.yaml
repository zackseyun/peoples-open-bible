translation:
  language: es
  text: Instruye al muchacho[a] conforme a su camino[b]; aun cuando envejezca, no se apartará de ese camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Muchacho» refleja el término hebreo masculino singular usado con valor general para un joven; el proverbio expresa un principio general, no una promesa sin excepción.
    reason: cultural_note
  - marker: b
    text: O, de manera más interpretativa, «Instruye al muchacho en el camino que debe seguir». El hebreo, más literalmente, dice «conforme a su camino».
    reason: alternative_reading
lexical_decisions:
- source_word: חֲנֹךְ
  english_pob_choice: Train up
  chosen_spanish: Instruye
  alternatives_spanish:
  - Entrena
  - Forma
  - Inicia
  lexicon: HALOT
  rationale: El imperativo חנך puede implicar iniciar o dedicar, pero en el contexto sapiencial de Proverbios la idea principal es una formación temprana y deliberada. «Instruye» comunica bien la acción pedagógica sin cargar el texto con una metáfora menos natural en español.
- source_word: לַנַּעַר
  english_pob_choice: a boy
  chosen_spanish: al muchacho[a]
  alternatives_spanish:
  - al joven
  - al niño
  - al muchacho
  lexicon: HALOT
  rationale: נַעַר designa a un muchacho, joven o menor en etapa formativa. «Muchacho» preserva el singular masculino genérico de manera natural en español. Se mantiene la nota para aclarar que el hebreo usa una forma masculina singular con valor general.
- source_word: עַל פִּי
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  - en conformidad con
  lexicon: HALOT
  rationale: La locución עַל־פִּי suele equivaler a «según / conforme a / de acuerdo con». «Conforme a» suena natural y conserva la relación normativa o correspondiente que el hebreo expresa sin volverlo literal de manera opaca.
- source_word: דַרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su manera de ser
  - su senda
  - su propio camino
  lexicon: HALOT
  rationale: דֶּרֶךְ es literalmente «camino» o «vía». «Su camino» retiene la ambigüedad del hebreo y evita resolver interpretativamente si se trata del camino que le corresponde o del que le es propio.
- source_word: גַּם כִּי
  english_pob_choice: even when
  chosen_spanish: aun cuando
  alternatives_spanish:
  - aunque
  - incluso cuando
  lexicon: HALOT
  rationale: La construcción introduce un matiz concesivo-temporal. «Aun cuando» conserva bien la fuerza de «even when» y encaja con la expectativa de que el sujeto llegue a la vejez.
- source_word: יַזְקִין
  english_pob_choice: he grows old
  chosen_spanish: envejezca
  alternatives_spanish:
  - llegue a viejo
  - crezca hasta la vejez
  - se haga viejo
  lexicon: HALOT
  rationale: El hiphil de זקן expresa llegar a la vejez. En español, «envejezca» es breve, claro y fiel al proceso de hacerse viejo.
- source_word: לֹא יָסוּר
  english_pob_choice: he will not turn from
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no se desviará
  - no se alejará
  - no dejará
  lexicon: HALOT
  rationale: סור significa apartarse, desviarse o desviarse del camino. «No se apartará» reproduce con naturalidad el movimiento de abandonar una vía sin añadir un tono excesivamente interpretativo.
- source_word: מִמֶּנָּה
  english_pob_choice: it
  chosen_spanish: de él
  alternatives_spanish:
  - de ella
  - de ese camino
  - de eso
  lexicon: HALOT
  rationale: El pronombre hebreo retoma la palabra femenina «camino»; en español, el antecedente más cercano y natural es «camino», que pide el clítico masculino por concordancia con «camino» como referente semántico explícito en la frase resultante. La formulación mantiene la referencia al camino sin forzar una concordancia gramatical extraña.
theological_decisions:
- issue: Sentido de «su camino» en un proverbio conocido por varias lecturas
  english_pob_reading: Retain the literal phrase 'his way' in the main text without expanding it to 'the way he should go.'
  chosen_spanish_reading: Mantener «su camino» en el texto principal sin expandirlo a «el camino que debe seguir».
  alternative_spanish_readings:
  - el camino que debe seguir
  - según su propia inclinación
  - el camino que le corresponde
  rationale: 'El hebreo dice «según/conforme a su camino», y la frase admite más de una comprensión: el camino apropiado para él, o el camino acorde con su disposición. La traducción principal conserva esa tensión interpretativa en vez de resolverla; así se respeta la primacía del texto fuente y se deja al lector el espacio de discernimiento.'
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Alcance proverbial de la afirmación
  english_pob_reading: The proverb states a general principle, not a promise without exception.
  chosen_spanish_reading: Se presenta como principio general de sabiduría, no como promesa absoluta sin excepciones.
  alternative_spanish_readings:
  - promesa incondicional
  - garantía universal
  - regla siempre mecánica
  rationale: Aunque el proverbio tiene un fuerte tono didáctico, el género sapiencial en general formula principios observacionales. La redacción española debe evitar convertirlo en una garantía mecánica que el contexto literario no exige.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el paquete de fuente; el pasaje muestra alto acuerdo en la revisión más reciente y no requiere ajustes adicionales respecto del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aplica al pasaje.
  - Se prefirió «muchacho» sobre «niño» o «joven» para conservar el matiz de נַעַר y la nota cultural del original.
  - La estructura sintáctica conserva la relación concesiva-temporal de «aun cuando» y la ambigüedad de «su camino» sin interpretarla en el texto principal.
