translation:
  language: es
  text: Y la batalla continuó con gran intensidad[a] hasta que se puso el sol, y Demetrio cayó[b] aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «hizo fuerte la batalla»; el griego indica que el combate se sostuvo o se intensificó.'
    reason: lexical_alternative
  - marker: b
    text: «Cayó» es lenguaje de batalla que aquí implica que Demetrio fue muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστερέωσεν
  english_pob_choice: continued
  chosen_spanish: continuó
  alternatives_spanish:
  - se hizo más fuerte
  - se sostuvo con fuerza
  - arreció
  lexicon: LSJ
  rationale: El griego con πόλεμον expresa una guerra o combate que se sostuvo o se intensificó; en español, "continuó" conserva la idea de duración sostenida sin convertir la frase en un calco poco natural. La nota explica la fuerza de la expresión original.
- source_word: πόλεμον
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: LSJ
  rationale: Aunque πόλεμος puede significar "guerra", aquí el contexto narrativo es un enfrentamiento concreto. "La batalla" comunica mejor el episodio puntual.
- source_word: σφόδρα
  english_pob_choice: fiercely
  chosen_spanish: con gran intensidad
  alternatives_spanish:
  - ferozmente
  - ardientemente
  - muy fuertemente
  lexicon: LSJ
  rationale: El adverbio intensifica la acción. "Con gran intensidad" preserva la fuerza del griego y suena natural en español bíblico contemporáneo.
- source_word: ἕως ἔδυ ὁ ἥλιος
  english_pob_choice: until the sun set
  chosen_spanish: hasta que se puso el sol
  alternatives_spanish:
  - hasta la puesta del sol
  - hasta que el sol se puso
  - hasta el ocaso
  lexicon: LSJ
  rationale: La cláusula temporal es directa; "se puso el sol" conserva la imagen concreta y es idiomática en español.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - fue abatido
  - murió
  - pereció
  lexicon: LSJ
  rationale: El griego dice literalmente "cayó". En lenguaje de combate, esa forma puede implicar muerte sin explicitarla; la traducción mantiene esa sobriedad.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en ese día
  - ese mismo día
  - en aquel día
  lexicon: LSJ
  rationale: Es una expresión temporal estándar; "aquel día" resulta natural y fiel al sentido deíctico del griego.
theological_decisions:
- issue: La caída de Demetrio en lenguaje de batalla
  english_pob_reading: ‘Fell’ here is battle language implying that Demetrius was killed.
  chosen_spanish_reading: «Cayó» mantiene el lenguaje de batalla y sugiere su muerte sin añadir una explicación no presente en el griego.
  alternative_spanish_readings:
  - fue muerto
  - murió
  - fue abatido
  rationale: El texto griego usa ἔπεσεν, no un verbo explícito de morir. En español, conviene conservar la ambigüedad relativa del original y dejar que el contexto narrativo comunique el sentido fatal.
  doctrine_reference: Narrativa histórica; precisión lexical y respeto al alcance semántico del original.
translation_notes:
  revision_awareness: La revisión inglesa cambió de ‘raged’ a ‘continued’ para acercarse más a la idea griega de un combate sostenido o intensificado. Por eso la línea española evita un verbo demasiado enfático como "arreció" y opta por "continuó con gran intensidad", que refleja continuidad y fuerza a la vez.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se conserva la metáfora bélica de «cayó» para respetar el lenguaje narrativo del griego.
