  to: 'Entonces Daniel fue llevado ante el rey. El rey respondió y dijo a Daniel[a]: «¿Eres tú aquel Daniel, de entre los exiliados de Judá, a quien el rey mi padre trajo de Judá?»'
  rationale: Se mantiene el sentido del arameo y del English POB, pero se corrige la nota al pie para reflejar la decisión documentada sobre «mi padre». También se alisa levemente la sintaxis española con «el rey mi padre», que conserva el orden cercano al original y mejora la fluidez. Se elimina la nota sobre «llevado», ya que no corresponde a una ambigüedad que deba preservarse en esta etapa.
