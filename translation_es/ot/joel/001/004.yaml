translation:
  language: es
  text: Lo que dejó la langosta cortadora[a], lo comió la langosta en enjambre; y lo que dejó la langosta en enjambre, lo comió la langosta saltarina; y lo que dejó la langosta saltarina, lo comió la langosta devoradora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los cuatro términos hebreos probablemente designan clases o etapas de langostas, pero sus diferencias zoológicas exactas son inciertas; también podrían traducirse como 'langosta roedora', 'langosta en enjambre', 'langosta saltarina' y 'langosta devoradora'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  english_pob_choice: what ... left
  chosen_spanish: lo que dejó
  alternatives_spanish:
  - el resto de
  - lo restante de
  lexicon: HALOT
  rationale: La idea central es de remanente o sobrante en una cadena repetida. En español, 'lo que dejó' reproduce de forma natural la secuencia de restos sin añadir información.
- source_word: גָּזָם
  english_pob_choice: cutting locust
  chosen_spanish: gázam
  alternatives_spanish:
  - langosta cortadora
  - langosta roedora
  lexicon: HALOT
  rationale: La POB inglesa conserva la imprecisión zoológica con un término descriptivo. En español, mantener el vocablo transliterado evita fingir una identificación exacta donde el hebreo no la fija con seguridad.
- source_word: אַרְבֶּה
  english_pob_choice: swarming locust
  chosen_spanish: árbê
  alternatives_spanish:
  - langosta
  - langosta migratoria
  lexicon: HALOT
  rationale: El audit trail inglés distingue este término de los otros por su asociación con el enjambre. La transliteración conserva esa distinción sin sobreespecificar una especie o etapa.
- source_word: יָּלֶק / יֶּלֶק
  english_pob_choice: hopping locust
  chosen_spanish: yélek
  alternatives_spanish:
  - langosta saltarina
  - langosta joven
  lexicon: HALOT
  rationale: El hebreo parece nombrar otra clase o fase de langosta; como la distinción exacta es incierta, la transliteración preserva la tensión documental mejor que una traducción demasiado precisa.
- source_word: חָסִיל
  english_pob_choice: devouring locust
  chosen_spanish: jasil
  alternatives_spanish:
  - langosta devoradora
  - langosta destructora
  lexicon: HALOT
  rationale: La cadena culmina en el término de destrucción más fuerte. La transliteración evita cerrar indebidamente el sentido zoológico y deja visible el patrón lexical del hebreo.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  lexicon: HALOT
  rationale: La conjunción repetida acumula la secuencia de devastación; 'y' mantiene el paralelismo y el ritmo del original.
- source_word: אָכַל
  english_pob_choice: ate
  chosen_spanish: lo comió
  alternatives_spanish:
  - lo devoró
  - lo consumió
  lexicon: HALOT
  rationale: El perfecto hebreo narra acción completa en una cadena vívida. 'Lo comió' conserva la repetición y la sencillez del original sin intensificar más allá del texto.
