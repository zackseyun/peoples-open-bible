base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/029.yaml
  text: Have you seen that Ahab has humbled himself before me? Because he has humbled himself before me[a], I will not bring the disaster in his days[b]; in his son's days I will bring the disaster on his house.
  footnotes:
