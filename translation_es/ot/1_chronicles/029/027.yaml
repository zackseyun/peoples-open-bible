translation:
  language: es
  text: Los días que reinó sobre Israel fueron cuarenta años. En Hebrón reinó siete años, y en Jerusalén reinó treinta y tres años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהַיָּמִים
  english_pob_choice: The days
  chosen_spanish: Los días
  alternatives_spanish:
  - El tiempo
  - La duración
  lexicon: HALOT
  rationale: Conservo el giro hebreo que introduce la duración del reinado con un sustantivo temporal concreto. En español, «Los días» mantiene la forma de la fuente sin sonar forzado en el contexto de una suma de años.
- source_word: אֲשֶׁר מָלַךְ
  english_pob_choice: that he reigned
  chosen_spanish: que reinó
  alternatives_spanish:
  - durante los cuales reinó
  - que fue rey
  lexicon: HALOT
  rationale: «Reinó» reproduce el valor real de מָלַךְ en contexto monárquico. La relativa «que» conserva la estructura descriptiva del hebreo sin añadir contenido no explícito.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre todo Israel
  - para Israel
  lexicon: HALOT
  rationale: «Sobre» refleja la relación de dominio indicada por עַל con מָלַךְ. No se añade «todo», porque el hebreo aquí no lo dice de forma expresa.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - cuarenta año(s)
  lexicon: HALOT
  rationale: Numeral y sustantivo de duración se expresan de manera directa y natural en español.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: In Hebron
  chosen_spanish: En Hebrón
  alternatives_spanish:
  - En Hebrón,
  - En la ciudad de Hebrón
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa. «Hebrón» conserva el topónimo bíblico estándar en español.
- source_word: מָלַךְ שֶׁבַע שָׁנִים
  english_pob_choice: he reigned seven years
  chosen_spanish: reinó siete años
  alternatives_spanish:
  - fue rey siete años
  lexicon: HALOT
  rationale: Repito el verbo «reinó» para mantener el paralelismo del hebreo y la claridad temporal del enunciado.
- source_word: וּבִירוּשָׁלִַם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La conjunción y la preposición locativa se rinden de forma simple y natural. «Jerusalén» sigue la forma española usual del nombre.
- source_word: שְׁלֹשִׁים וְשָׁלוֹשׁ
  english_pob_choice: thirty-three
  chosen_spanish: treinta y tres
  alternatives_spanish:
  - treinta y tres años
  lexicon: HALOT
  rationale: Compuesto numeral español estándar; conserva la suma explícita del hebreo en lugar de normalizarla de otro modo.
