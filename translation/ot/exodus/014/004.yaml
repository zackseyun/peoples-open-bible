id: EXO.14.4
reference: Exodus 14:4
source:
  edition: WLC
  text: וְ/חִזַּקְתִּ֣י אֶת לֵב פַּרְעֹה֮ וְ/רָדַ֣ף אַחֲרֵי/הֶם֒ וְ/אִכָּבְדָ֤ה בְּ/פַרְעֹה֙ וּ/בְ/כָל חֵיל֔/וֹ וְ/יָדְע֥וּ מִצְרַ֖יִם כִּֽי אֲנִ֣י יְהוָ֑ה וַ/יַּֽעֲשׂוּ כֵֽן־־־־־׃
translation:
  text: And I will harden Pharaoh’s heart[a], and he will pursue them; and I will get glory over Pharaoh and over all his army[b], and the Egyptians will know that I am Yahweh.” And they did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will strengthen Pharaoh’s heart.' The Hebrew verb can mean 'make strong/firm'; in Exodus this firmness is expressed as obstinacy, hence 'harden.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will be glorified through Pharaoh.' The Hebrew expression speaks of the LORD gaining honor/glory in relation to Pharaoh through what follows.
    reason: alternative_reading
lexical_decisions:
- source_word: וְחִזַּקְתִּי
  chosen: I will harden
  alternatives:
  - I will strengthen
  - I will make firm
  lexicon: HALOT
  rationale: The Hiphil of חזק here refers to making Pharaoh's heart firm/obstinate in the narrative context of resistance to release Israel. 'Harden' is the most natural English rendering in this Exodus context, while 'strengthen' is more literal but less idiomatic and could understate the judicial nuance.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner will/thought center. 'Heart' preserves the biblical idiom and matches established English usage without flattening the anthropological sense.
- source_word: וְרָדַף אַחֲרֵיהֶם
  chosen: he will pursue them
  alternatives:
  - he will chase after them
  lexicon: HALOT
  rationale: רדף + אחרי means to pursue/chase after. 'Pursue' is concise, natural, and fits military pursuit.
- source_word: וְאִכָּבְדָה בְּפַרְעֹה
  chosen: I will get glory over Pharaoh
  alternatives:
  - I will be glorified through Pharaoh
  - I will gain honor over Pharaoh
  - I will show my glory in Pharaoh
  lexicon: HALOT
  rationale: The Niphal/cohortative of כבד in this construction conveys YHWH's gaining honor/glory in relation to Pharaoh through the coming judgment. 'Get glory over' is idiomatic and preserves the adversative force of בְּ in context better than the more abstract 'be glorified through.'
- source_word: וּבְכָל חֵילוֹ
  chosen: and over all his army
  alternatives:
  - and over all his force
  - and over all his host
  lexicon: HALOT
  rationale: חַיִל here refers to Pharaoh's military forces. 'Army' is the clearest modern English equivalent.
- source_word: וְיָדְעוּ מִצְרַיִם
  chosen: and the Egyptians will know
  alternatives:
  - then Egypt will know
  lexicon: HALOT
  rationale: The plural verb with the proper noun is naturally rendered 'the Egyptians will know.' This keeps the personal, national sense rather than abstracting to 'Egypt.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: And they did so
  alternatives:
  - And they did thus
  - So they did
  lexicon: HALOT
  rationale: A straightforward narrative closure indicating obedience to the preceding command. 'And they did so' is natural modern English and sufficiently formal.
