translation:
  language: es
  text: Los que temen a Yahvé prepararán sus corazones[a], y delante de él humillarán sus espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «humillarán sus almas». El testimonio hebreo lee «sus espíritus», y eso se sigue en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  english_pob_choice: those who fear Yahweh
  chosen_spanish: los que temen a Yahvé
  alternatives_spanish:
  - los que reverencian a Yahvé
  - los temerosos de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea describe a personas caracterizadas por el temor reverente y obediente hacia YHWH. En español, «los que temen a Yahvé» conserva la fórmula bíblica y el nombre divino sin volverla demasiado abstracta.
- source_word: יָכִינוּ לְבָבָם
  english_pob_choice: will prepare their hearts
  chosen_spanish: prepararán sus corazones
  alternatives_spanish:
  - harán que sus corazones estén listos
  - establecerán sus corazones
  lexicon: HALOT
  rationale: כון en hifil puede significar preparar o poner en orden. «Prepararán sus corazones» sigue bien el hebreo y el paralelo griego ἑτοιμάσουσιν, manteniendo la imagen interior del texto.
- source_word: לְבָבָם
  english_pob_choice: their hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - su interior
  - sus mentes
  lexicon: HALOT
  rationale: «Corazones» preserva el lenguaje bíblico del centro interior de la persona, sin reducirlo a mera emoción o pensamiento.
- source_word: וּלְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: HALOT
  rationale: La traducción literal y natural en español es «delante de él». Conserva la postura relacional expresada por el hebreo y el griego ἐνώπιον αὐτοῦ.
- source_word: יַכְנִיעוּ רוּחָם
  english_pob_choice: they will humble their spirits
  chosen_spanish: humillarán sus espíritus
  alternatives_spanish:
  - se humillarán
  - someterán su espíritu
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «su espíritu», mientras que el paralelo griego tiene «sus almas». Se conserva «espíritus» para no perder ese matiz antropológico; «humillarán» reproduce bien la fuerza verbal de הכניעו.
theological_decisions:
- issue: Rendering the divine name יְהֹוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La instrucción de proyecto pide usar «Yahvé» para יהוה en el texto principal. Aquí el hebreo usa directamente el Tetragrámaton, por lo que se mantiene el nombre divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Hebrew spirit versus Greek souls
  english_pob_reading: Hebrew witness reads 'their spirits'; Greek parallel reads 'their souls'
  chosen_spanish_reading: sus espíritus
  alternative_spanish_readings:
  - sus almas
  - se humillarán
  rationale: El testimonio hebreo es el texto principal en el dossier y preserva רוּחַ. Se mantiene «espíritus» en el cuerpo del verso y se documenta en nota la variante griega «almas» para no borrar la tensión textual.
  doctrine_reference: Source-critical decision based on Hebrew priority with Greek parallel noted
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y el expediente indica que no hubo cambios necesarios; por eso la redacción española sigue de cerca la decisión auditada del hebreo principal, con la variante griega consignada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva el paralelismo interno «prepararán... / humillarán...» sin suavizarlo a una paráfrasis reflexiva.
  - «Corazones» y «espíritus» reflejan dos términos antropológicos distintos del texto hebreo, sin fusionarlos.
