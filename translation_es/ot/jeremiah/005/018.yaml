translation:
  language: es
  text: Pero aun en aquellos días[a], declara Yahvé, no haré una destrucción completa de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no acabaré completamente con ustedes». El hebreo dice literalmente: «no haré una consumación completa de ustedes» o «no haré un fin completo de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Yet even
  chosen_spanish: Y aun
  alternatives_spanish:
  - Pero aun
  - Y también
  lexicon: HALOT
  rationale: El hebreo añade continuidad con énfasis; en español, 'Y aun' conserva ese valor aditivo y concesivo sin endurecer el contraste más de lo que permite el contexto.
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: HALOT
  rationale: La expresión temporal profética se conserva con una forma natural en español y con el mismo tono solemne.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé según el criterio del proyecto. 'Dice' reproduce la fórmula profética de manera clara y publicable en español; 'declara' sería posible, pero aquí 'dice' es una equivalencia natural de la fórmula.
- source_word: לֹא אֶעֱשֶׂה
  english_pob_choice: I will not make
  chosen_spanish: no haré
  alternatives_spanish:
  - no haré un
  - no llevaré a cabo
  lexicon: HALOT
  rationale: El hebreo usa el verbo 'hacer' en la locución idiomática con כָּלָה. En español, 'no haré' mantiene el valor verbal básico y permite completar la expresión idiomática sin sonar forzado.
- source_word: אִתְּכֶם
  english_pob_choice: of you
  chosen_spanish: de vosotros
  alternatives_spanish:
  - con vosotros
  - de ustedes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'con ustedes', la locución española normal con 'hacer un fin' requiere 'de'. Se eligió 'vosotros' por fidelidad al plural directo del texto y porque evita una lectura excesivamente coloquial; 'de ustedes' queda como alternativa regional.
- source_word: כָּלָה
  english_pob_choice: a full end
  chosen_spanish: un fin completo
  alternatives_spanish:
  - un fin total
  - una destrucción completa
  lexicon: HALOT
  rationale: Se conserva la tensión del hebreo con una expresión que refleja el idiomatismo sin resolverlo por completo en 'destrucción'. 'Fin completo' preserva la idea de consumación total y la matización de que no será exterminio absoluto.
theological_decisions:
- issue: Juicio real pero no exterminio total
  english_pob_reading: I will not make a full end of you
  chosen_spanish_reading: no haré de vosotros un fin completo
  alternative_spanish_readings:
  - no os destruiré por completo
  - no haré un exterminio total de vosotros
  rationale: 'La cláusula afirma juicio severo, pero también límite divino. La redacción española conserva esa tensión: se anuncia una acción devastadora sin convertirla en aniquilación absoluta.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrama, manteniendo el nombre propio de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto coincide con la última pasada revisada (sin cambios necesarios) y respeta el acuerdo alto del control cruzado; la única decisión de estilo visible es una formulación española más natural para la locución hebrea sin perder la tensión semántica.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino, conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' para no ocultar el Tetragrama.
  - '''En aquellos días'' conserva el registro profético.'
  - La nota textual/lexical refleja la construcción idiomática de כָּלָה sin sobrerinterpretarla.
