lexical_decisions:
- source_word: ὁ ἕτερος
  english_pob_choice: The other
  chosen_spanish: El otro
  alternatives_spanish:
  - El segundo
  - Otro
  lexicon: LSJ
  rationale: La frase con artículo y ἕτερος señala al segundo participante en la secuencia. «El otro» conserva el contraste implícito con el anterior sin añadir información no presente en el griego.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - había escrito
  - inscribió
  lexicon: LSJ
  rationale: El aoristo de γράφω se expresa de manera natural con el pretérito simple en español. «Escribió» reproduce el acto narrativo sin sobreespecificar el soporte material.
- source_word: Ὑπερισχύει
  english_pob_choice: prevails
  chosen_spanish: prevalece
  alternatives_spanish:
  - es más fuerte
  - tiene la ventaja
  - supera
  lexicon: LSJ
  rationale: ὑπερισχύω puede significar prevalecer o ser más fuerte. «Prevalece» mantiene la fuerza proverbial de la afirmación y su brevedad, sin reducirla solo a fuerza física.
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  - el gobernante
  lexicon: LSJ
  rationale: βασιλεύς significa normalmente «rey». En español, «el rey» conserva con precisión el título y la referencia genérica del enunciado.
theological_decisions:
- issue: 'Sentido de ὑπερισχύω: fuerza vs. victoria/prevalencia'
  english_pob_reading: The king prevails. Or, “The king is stronger.”
  chosen_spanish_reading: «El rey prevalece».
  alternative_spanish_readings:
  - «El rey es más fuerte»
  - «El rey lleva la ventaja»
  rationale: La nota inglesa preserva la tensión semántica entre «ser más fuerte» y «prevalecer». En español, «prevalece» comunica ambos matices de modo conciso; la nota conserva la alternativa explícita.
  doctrine_reference: LSJ; uso contextual del verbo ὑπερισχύω
translation_notes:
  revision_awareness: Se respetó el estado sin cambios del último pase de revisión y la concordancia mayoritaria del cotejo cruzado; no se introdujeron ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «rey» para βασιλεύς y no «soberano», por precisión léxica.
  - «Prevalece» conserva la ambigüedad útil del griego entre superioridad y victoria.
  - La puntuación con dos puntos antes de la cita sigue el patrón del texto fuente inglés y es natural en español.
  - No hay términos teológicos sensibles adicionales en este versículo.
