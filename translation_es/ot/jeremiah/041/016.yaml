translation:
  language: es
  text: 'Entonces Johanán hijo de Carea, y todos los jefes de las fuerzas que estaban con él, tomaron a todo el remanente del pueblo que había recuperado de Ismael hijo de Netanías, de Mizpa, después de haber abatido a Guedalías hijo de Ajicam: los soldados, los hombres de guerra, las mujeres, los niños pequeños y los funcionarios de la corte[b], a quienes había traído de vuelta de Gabaón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O 'eunucos' para 'funcionarios de la corte'; el hebreo סָרִיסִים puede referirse tanto a eunucos literales como a funcionarios reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then ... took
  chosen_spanish: Entonces ... tomaron
  alternatives_spanish:
  - Y ... tomaron
  - Luego ... tomaron
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva pide avance secuencial. 'Entonces' conserva bien ese valor en español sin sonar demasiado literal.
- source_word: יוֹחָנָן
  english_pob_choice: Yohanan
  chosen_spanish: Johanán
  alternatives_spanish:
  - Yohanan
  - Johanan
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo; 'Johanán' refleja más de cerca la forma מקורית y es inteligible en español bíblico.
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los jefes de las fuerzas
  alternatives_spanish:
  - los comandantes de las fuerzas
  - los oficiales del ejército
  lexicon: HALOT
  rationale: '''שָׂרִים'' designa jefes o autoridades; ''jefes de las fuerzas'' mantiene la estructura y evita militarizar de más el término, aunque el contexto es bélico.'
- source_word: שְׁאֵרִית הָעָם
  english_pob_choice: the remnant of the people
  chosen_spanish: el remanente del pueblo
  alternatives_spanish:
  - el resto del pueblo
  - los sobrevivientes del pueblo
  lexicon: HALOT
  rationale: '''Remanente'' conserva la fuerza del término profético y la idea de un resto preservado.'
- source_word: הֵשִׁיב
  english_pob_choice: had recovered
  chosen_spanish: había recuperado
  alternatives_spanish:
  - había traído de vuelta
  - había rescatado
  lexicon: HALOT
  rationale: '''Recuperado'' comunica la acción de volver a obtener a esas personas de manos de Ishmael sin añadir una interpretación más fuerte que el hebreo.'
- source_word: מֵאֵת יִשְׁמָעֵאל
  english_pob_choice: from Ishmael
  chosen_spanish: de Ismael
  alternatives_spanish:
  - desde Ismael
  - de entre Ismael
  lexicon: HALOT
  rationale: La preposición marca procedencia/separación; 'de Ismael' es natural y fiel.
- source_word: מִן הַמִּצְפָּה
  english_pob_choice: from Mizpah
  chosen_spanish: desde Mizpa
  alternatives_spanish:
  - de Mizpa
  - en Mizpa
  lexicon: HALOT
  rationale: El hebreo indica origen. 'Desde Mizpa' expresa mejor el punto de partida que un simple 'en'.
- source_word: אַחַר הִכָּה
  english_pob_choice: after he had struck down
  chosen_spanish: después de que había matado
  alternatives_spanish:
  - después de haber golpeado
  - después de haber herido de muerte
  lexicon: HALOT
  rationale: En este contexto la muerte de Guedalías está implícita y en español 'matar' resulta claro y natural; aun así no se introduce más que el resultado narrativo que el hebreo presupone.
- source_word: גְּבָרִים אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the soldiers, the men of war
  chosen_spanish: los soldados, los hombres de guerra
  alternatives_spanish:
  - los hombres, los guerreros
  - los combatientes, los hombres de guerra
  lexicon: HALOT
  rationale: Se conservan los dos miembros appositivos del hebreo con dos expresiones distintas en español, evitando colapsarlos en un solo término.
- source_word: טַף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los niños
  - los dependientes
  lexicon: HALOT
  rationale: '''Niños pequeños'' comunica bien la vulnerabilidad del término sin sonar excesivamente literal.'
- source_word: סָרִסִים
  english_pob_choice: the court officials
  chosen_spanish: los funcionarios de la corte
  alternatives_spanish:
  - los eunucos
  - los oficiales del palacio
  lexicon: HALOT
  rationale: El hebreo puede referirse a eunucos o a funcionarios reales; 'funcionarios de la corte' preserva la ambigüedad y encaja con el contexto administrativo.
- source_word: מִגִּבְעוֹן
  english_pob_choice: from Gibeon
  chosen_spanish: desde Gabaón
  alternatives_spanish:
  - de Gabaón
  - de Gibeón
  lexicon: HALOT
  rationale: Se translitera el topónimo bíblico en su forma española tradicional 'Gabaón', clara para lectores bíblicos.
- source_word: גְּדַלְיָה ... אֲחִיקָם
  english_pob_choice: Gedaliah ... Ahikam
  chosen_spanish: Guedalías ... Ajicam
  alternatives_spanish:
  - Gedalías ... Ahicam
  - Gedalía ... Ajicam
  lexicon: HALOT
  rationale: Se conserva la transliteración hebrea de los nombres propios con adaptación al español bíblico.
theological_decisions:
- issue: 'סָרִסִים: eunucos o funcionarios de corte'
  english_pob_reading: court officials; the Hebrew can mean either literal eunuchs or royal officials
  chosen_spanish_reading: funcionarios de la corte
  alternative_spanish_readings:
  - eunucos
  - oficiales del palacio
  rationale: La POB inglesa preserva la ambigüedad. En español, 'funcionarios de la corte' mantiene la opción administrativa sin afirmar corporalidad que el contexto no exige.
  doctrine_reference: No doctrinal issue; lexical/theological ambiguity preserved.
- issue: Hebrew apposition גְּבָרִים אַנְשֵׁי הַמִּלְחָמָה
  english_pob_reading: the soldiers, the men of war
  chosen_spanish_reading: los soldados, los hombres de guerra
  alternative_spanish_readings:
  - los hombres, los guerreros
  - los combatientes, los hombres de guerra
  rationale: La distinción entre ambos miembros se conserva en español para no perder la plenitud del hebreo ni suavizar el carácter militar del pasaje.
  doctrine_reference: No doctrinal issue; literary structure preservation.
translation_notes:
  revision_awareness: El texto inglés revisado cambió 'the men, the warriors' por 'the soldiers, the men of war' para reflejar mejor la doble apposición hebrea. La versión española conserva esa distinción con 'los soldados, los hombres de guerra'.
  spanish_consistency_notes:
  - Se usa 'Johanán' para יוֹחָנָן y 'Guedalías'/'Ajicam' para los nombres hebreos con grafía española consistente.
  - Se mantiene 'remanente' para שְׁאֵרִית, en línea con el uso bíblico de resto preservado.
  - '''Desde Mizpa'' y ''desde Gabaón'' reflejan la idea de procedencia del hebreo מִן, no mera localización estática.'
  - La ambigüedad de סָרִיסִים se conserva con una nota, sin imponer 'eunucos' como única lectura.
