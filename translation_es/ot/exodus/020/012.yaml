revisions:
- from: Honra a tu padre y a tu madre[a][b], para que se prolonguen tus días sobre la tierra[c] que Yahvé tu Dios te da.
  to: Honra a tu padre y a tu madre[a][b], para que se prolonguen tus días en la tierra[c] que Yahvé tu Dios te da.
  rationale: Se ajusta únicamente la preposición en el texto principal de «sobre la tierra» a «en la tierra» para reflejar mejor en español el referente contextual de הָאֲדָמָה como la tierra dada por Dios, manteniendo en nota la literalidad de עַל. El resto del versículo ya es fiel, claro y alineado con la terminología del proyecto.
