  to: El rey hizo que la plata y el oro en Jerusalén fueran tan abundantes como las piedras[a], e hizo que los cedros fueran tan abundantes como los árboles sicómoros que están en las tierras bajas[b].
  rationale: La revisión conserva el sentido del borrador pero mejora la precisión geográfica de שְּׁפֵלָה con 'las tierras bajas' y hace más transparente el referente de שִׁקְמִים con 'árboles sicómoros'. Se mantienen la estructura comparativa y la nota de alternativa literal del hebreo.
