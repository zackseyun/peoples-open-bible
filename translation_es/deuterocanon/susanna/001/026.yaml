review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: los de la casa oyen la alarma en el jardín, entran con urgencia por una entrada lateral y quieren ver qué le había pasado a Susana. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el rastro inglés, porque repite esencialmente la misma lectura principal («puerta lateral») en vez de ofrecer la alternativa real «puerta/entrada/portón lateral» o «puerta/portillo de costado» frente a «puerta»/«portón».'
  spanish_quality_summary: El español es natural, claro y digno. «Los de la casa», «se lanzaron» y «lo que le había sucedido» funcionan bien. El texto principal no requiere cambio necesario; el problema está en la redacción de la nota, que debe expresar una alternativa léxica real y evitar redundancia.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Las decisiones léxicas relevantes están bien encaminadas: κραυγή -> «grito», παράδεισος -> «jardín», οἱ ἐκ τῆς οἰκίας -> «los de la casa», εἰσεπήδησαν -> «se lanzaron», τὸ συμβεβηκὸς αὐτῇ -> «lo que le había sucedido». Para πλαγία θύρα, «puerta lateral» es válida, pero la nota debe conservar la alternativa arquitectónica real: también puede entenderse como «entrada lateral» o «puerta de costado».'
  issues:
  - severity: medium
    issue: La nota al pie no ofrece una alternativa léxica real.
    rationale: 'El inglés auditado dice: “Or ''through the side gate''...”. La nota española actual dice “O «por la puerta lateral»”, que repite la lectura principal y no preserva la variación significativa entre tipos de acceso.'
  - severity: low
    issue: La explicación de la nota puede ser más idiomática en español.
    rationale: «Puerta de costado» suena menos natural que «puerta del costado» o mejor aún «entrada lateral». Conviene una formulación más limpia y directamente útil para el lector.
  revised_spanish_text: Pero cuando los de la casa oyeron el grito en el jardín[a], se lanzaron por la puerta lateral para ver lo que le había sucedido.
  revised_footnotes:
  - marker: a
    text: O «por la entrada lateral»; el griego πλαγία θύρα puede denotar un acceso lateral, y el sentido arquitectónico exacto no está explicitado.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se corrige la nota para que preserve una alternativa genuina del griego y del rastro inglés, en vez de repetir la misma expresión principal.
