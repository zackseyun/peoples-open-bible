theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered kinship language אַחֵינוּ
  chosen_reading: our brothers
  alternative_readings:
  - our siblings
  - our kin
  rationale: The translation follows the gender-accurate principle. In context the daughters of Zelophehad are requesting a land share alongside male relatives, so 'brothers' preserves the source's social and legal specificity better than a gender-neutral term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Specificity of kinship in אֲחֵי אֲבִיהֶן
  chosen_reading: their father's brothers
  alternative_readings:
  - their brothers
  - their relatives
  rationale: The Hebrew explicitly identifies the paternal clan, not merely siblings. Preserving this avoids flattening the inheritance structure described in the text.
