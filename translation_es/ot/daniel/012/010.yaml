translation:
  language: es
  text: Muchos se purificarán[a] y se emblanquecerán y serán refinados; pero los perversos actuarán perversamente, y ninguno de los perversos entenderá[b]; pero los que tienen discernimiento entenderán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Muchos serán purificados y emblanquecidos y refinados". Los dos primeros verbos hebreos pueden leerse con sentido pasivo, aunque sus formas también permiten el matiz reflexivo reflejado en el texto principal.'
    reason: alternative_reading
  - marker: b
    text: 'O: "los sabios entenderán".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְבָּרֲרוּ
  english_pob_choice: will purify themselves
  chosen_spanish: se purificarán
  alternatives_spanish:
  - se purificarán a sí mismos
  - serán purificados
  lexicon: HALOT
  rationale: El hitpael de ברר puede tener fuerza reflexiva o media, pero en español la forma pronominal impersonalizada 'se purificarán' comunica bien el matiz sin forzar un reflexivo redundante. Mantiene abierta la tensión entre acción propia y proceso sufrido que el hebreo permite.
- source_word: יִתְלַבְּנוּ
  english_pob_choice: make themselves white
  chosen_spanish: se volverán blancos
  alternatives_spanish:
  - se pondrán blancos
  - serán emblanquecidos
  lexicon: HALOT
  rationale: Lבן en hitpael conserva la imagen concreta de volverse blanco. 'Se volverán blancos' mantiene la metáfora corporal/visual del texto, sin reducirla a una abstracción como 'limpios'.
- source_word: יִצָּרְפוּ
  english_pob_choice: be refined
  chosen_spanish: serán refinados
  alternatives_spanish:
  - serán probados
  - serán purificados por el fuego
  lexicon: HALOT
  rationale: El nifal de צרף suele referirse al refinamiento de metales y, por extensión, a una purificación probada. 'Serán refinados' preserva esa imagen técnica y es idiomático en español.
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - multitudes
  - muchas personas
  lexicon: HALOT
  rationale: '''Muchos'' reproduce de manera directa el sujeto indefinido plural del hebreo y mantiene la brevedad del original.'
- source_word: הִרְשִׁיעוּ רְשָׁעִים
  english_pob_choice: the wicked will act wickedly
  chosen_spanish: los perversos actuarán perversamente
  alternatives_spanish:
  - los impíos obrarán impíamente
  - los malvados harán el mal
  lexicon: HALOT
  rationale: El juego cognado entre verbo y sustantivo/adjetivo exige conservar la repetición léxica. 'Perversos/perversamente' reproduce ese énfasis mejor que una paráfrasis más suave.
- source_word: יָבִינוּ
  english_pob_choice: will understand
  chosen_spanish: entenderá/entenderán
  alternatives_spanish:
  - comprenderán
  - discernirán
  lexicon: HALOT
  rationale: בין en qal significa entender/discernir. 'Entenderán' es claro y mantiene el contraste con el último cola del versículo.
- source_word: כָּל רְשָׁעִים
  english_pob_choice: none of the wicked
  chosen_spanish: ninguno de los perversos
  alternatives_spanish:
  - ninguno de los impíos
  - ningún perverso
  lexicon: HALOT
  rationale: El hebreo expresa negación total con כָּל + verbo negativo; en español la forma natural es 'ninguno de...'. 'Perversos' conserva el campo semántico ya usado en la cláusula anterior.
- source_word: הַמַּשְׂכִּלִים
  english_pob_choice: those who have insight
  chosen_spanish: los que tienen discernimiento
  alternatives_spanish:
  - los sabios
  - los entendidos
  lexicon: HALOT
  rationale: El participio de שכל apunta a personas perspicaces/discernientes. 'Los que tienen discernimiento' mantiene el vínculo verbal con 'entenderán' y evita ampliar innecesariamente a una categoría de sabiduría más general.
theological_decisions:
- issue: Si los primeros verbos deben presentarse como pasivos o como formas reflexivas/midias
  english_pob_reading: 'Reflexive/self-involving language in the main text: ''purify themselves'' and ''make themselves white,'' with ''be refined'' for the Niphal third verb'
  chosen_spanish_reading: '''se purificarán'' y ''se volverán blancos'', con ''serán refinados'' para el tercero'
  alternative_spanish_readings:
  - serán purificados y emblanquecidos y refinados
  rationale: 'El hebreo distingue entre hitpael y nifal. El español escogido conserva esa textura: las dos primeras formas suenan medio-reflexivas y la tercera pasiva, sin imponer un sujeto explícito que el texto no expresa.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo traducir הַמַּשְׂכִּלִים sin borrar el contraste con 'entenderán'
  english_pob_reading: those who have insight
  chosen_spanish_reading: los que tienen discernimiento
  alternative_spanish_readings:
  - los sabios
  - los entendidos
  rationale: En Daniel, el término suele señalar a quienes disciernen y enseñan con entendimiento. 'Los que tienen discernimiento' conserva la relación semántica con el verbo final y no introduce una categoría teológica más amplia de 'sabios' si el contexto inmediato no la exige.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios: el cotejo indica alta concordancia y no hubo correcciones aplicadas. La redacción española conserva la decisión auditada de mantener el matiz reflexivo/midio de los dos primeros verbos y la fuerza del contraste entre los perversos y los que tienen discernimiento.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención del proyecto solo cuando el texto lo exige; este versículo no contiene el Tetragrámaton ni un sustituto directo.
  - Se evitó 'impíos' para mantener coherencia interna con el campo léxico de רָשָׁעִים y con la repetición cognada del verbo.
  - '''Discernimiento'' se eligió para conservar el vínculo con ''entenderán'' y con la función del participio en Daniel.'
