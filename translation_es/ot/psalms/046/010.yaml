translation:
  language: es
  text: Hace cesar las guerras hasta el extremo de la tierra; rompe el arco y corta la lanza en dos; quema las carretas[a] con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carros de guerra». El hebreo aquí más literalmente significa «carretas» o «carros de carga», aunque muchas traducciones lo vierten como «carros de guerra» por el contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁבִּית
  english_pob_choice: makes ... cease
  chosen_spanish: hace cesar
  alternatives_spanish:
  - pone fin a
  - detiene
  lexicon: HALOT
  rationale: El participio hifil expresa la idea causativa de hacer que algo cese. «Hace cesar» conserva esa fuerza causativa y suena natural en español.
- source_word: מִלְחָמוֹת
  english_pob_choice: wars
  chosen_spanish: las guerras
  alternatives_spanish:
  - las batallas
  - la guerra
  lexicon: HALOT
  rationale: El plural apunta a guerras/conflictos en sentido amplio. El plural español mantiene mejor el alcance colectivo que un singular genérico.
- source_word: עַד קְצֵה הָאָרֶץ
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el extremo de la tierra
  alternatives_spanish:
  - hasta los confines de la tierra
  - hasta el fin de la tierra
  lexicon: HALOT
  rationale: La construcción hebrea comunica alcance universal. «Hasta el extremo de la tierra» es fiel y fluido, sin forzar una expresión más idiomática que borre la imagen espacial.
- source_word: קֶשֶׁת
  english_pob_choice: the bow
  chosen_spanish: el arco
  alternatives_spanish:
  - el arco de guerra
  - los arcos
  lexicon: HALOT
  rationale: «Arco» es el equivalente directo en español y conserva el valor de arma singular usada de modo representativo.
- source_word: יְשַׁבֵּר
  english_pob_choice: breaks
  chosen_spanish: rompe
  alternatives_spanish:
  - quiebra
  - destroza
  lexicon: HALOT
  rationale: El pi‘el de שׁבר indica romper/quebrar. «Rompe» es preciso y no intensifica más allá del hebreo.
- source_word: וְקִצֵּץ
  english_pob_choice: cuts the spear in two
  chosen_spanish: corta la lanza en dos
  alternatives_spanish:
  - parte la lanza
  - corta la lanza
  lexicon: HALOT
  rationale: קִצֵּץ expresa cortar/seccionar con fuerza. «Corta la lanza en dos» sigue la revisión inglesa más precisa y transmite destrucción del arma sin añadir detalles no presentes.
- source_word: חֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la jabalina
  - la pica
  lexicon: HALOT
  rationale: «Lanza» es un equivalente claro y ampliamente entendible en español. Aunque «spear» podría corresponder a «lanza» o «hasta», aquí «lanza» es la opción más natural.
- source_word: עֲגָלוֹת
  english_pob_choice: the wagons
  chosen_spanish: los carros
  alternatives_spanish:
  - los vagones
  - las carretas
  lexicon: HALOT
  rationale: El hebreo ordinariamente significa carros/vagones/carruajes, no la palabra técnica más común para «carros de guerra». Dado el contexto militar, «carros» funciona mejor en español que «vagones», y se mantiene la alternativa de lectura tradicional en la nota.
- source_word: יִשְׂרֹף בָּאֵשׁ
  english_pob_choice: he burns ... with fire
  chosen_spanish: quema ... con fuego
  alternatives_spanish:
  - consume ... con fuego
  - los quema en fuego
  lexicon: HALOT
  rationale: La construcción preposicional se traduce de modo natural como «con fuego», manteniendo la imagen concreta del acto de quemar.
theological_decisions:
- issue: 'עֲגָלוֹת en contexto bélico: sentido léxico frente a tradición interpretativa'
  english_pob_reading: wagons
  chosen_spanish_reading: carros
  alternative_spanish_readings:
  - carros de guerra
  - carruajes
  - carretas
  - vagones
  rationale: No hay cuestión doctrinal, pero sí una tensión lexical. El hebreo no usa el término técnico habitual para «carro de guerra»; por eso la lectura principal sigue el sentido léxico más directo. En español, «carros» comunica mejor el objeto en contexto bélico que «vagones», sin negar la posibilidad tradicional de entenderlo como vehículos militares.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
- issue: 'קִצֵּץ aplicado a una lanza: nivel de intensidad de la destrucción'
  english_pob_reading: cuts the spear in two
  chosen_spanish_reading: corta la lanza en dos
  alternative_spanish_readings:
  - parte la lanza
  - rompe la lanza
  rationale: La revisión inglesa ajustó la frase para reflejar con más precisión el verbo hebreo. En español, «corta la lanza en dos» preserva el acto de desmembrar el arma sin sobredetallar el modo exacto, manteniendo la equivalencia óptima y la naturalidad.
  doctrine_reference: Consistencia léxica de la POB / revisión textual auditable
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente: «cuts the spear in two» y «with fire». También conserva la alternativa tradicional para עֲגָלוֹת mediante nota, pero el texto principal prefiere el sentido léxico más directo del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Carros» evita el tecnicismo «carros de guerra» en el texto principal, pero la nota documenta la alternativa interpretativa tradicional.
  - La sintaxis conserva el paralelismo hebreo con tres cola coordinados por punto y coma.
