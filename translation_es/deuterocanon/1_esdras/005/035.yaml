translation:
  language: es
  text: 'Todos los servidores del templo[a] y los hijos de los sirvientes de Salomón: trescientos setenta y dos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavos del templo» y «los hijos de los esclavos de Salomón»; los términos griegos denotan servicio dependiente y pueden llevar fuerza servil.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - En total
  - La totalidad de
  lexicon: LSJ
  rationale: El griego introduce un sumario colectivo para los grupos enumerados; «Todos» conserva ese valor totalizador en español de manera natural al iniciar la cláusula.
- source_word: ἱερόδουλοι
  english_pob_choice: temple servants
  chosen_spanish: sirvientes del templo
  alternatives_spanish:
  - esclavos del templo
  - servidores del templo
  - siervos del templo
  lexicon: LSJ
  rationale: El término señala personas vinculadas al servicio del templo. «Sirvientes del templo» comunica esa función en español moderno sin forzar de entrada el matiz servil, aunque ese trasfondo queda disponible en la nota textual.
- source_word: υἱοὶ τῶν παίδων Σαλωμὼν
  english_pob_choice: the sons of Solomon’s servants
  chosen_spanish: los hijos de los sirvientes de Salomón
  alternatives_spanish:
  - los descendientes de los sirvientes de Salomón
  - los hijos de los esclavos de Salomón
  lexicon: LSJ
  rationale: «υἱοί» en listas genealógicas puede equivaler a descendientes, pero aquí se conserva «hijos» por la forma del griego y por la claridad del registro. «παῖδες» se vierte como «sirvientes» para mantener la misma solución semántica adoptada en la primera mitad del versículo.
- source_word: τριακόσιοι ἑβδομήκοντα δύο
  english_pob_choice: three hundred seventy-two
  chosen_spanish: trescientos setenta y dos
  alternatives_spanish:
  - trescientos y setenta y dos
  lexicon: LSJ
  rationale: Número cardinal directo; la forma española sin «y» es la más natural y estable en registro bíblico contemporáneo.
theological_decisions:
- issue: Fuerza servil de los términos de dependencia
  english_pob_reading: Use 'temple servants' and 'Solomon’s servants' in the main text; preserve 'temple slaves' and 'Solomon’s slaves' as an alternative because the Greek can carry servile force.
  chosen_spanish_reading: Usar «sirvientes del templo» y «los sirvientes de Salomón» en el texto principal, manteniendo la posibilidad de un matiz servil en nota.
  alternative_spanish_readings:
  - esclavos del templo
  - los esclavos de Salomón
  rationale: En este versículo de censo administrativo, el sentido principal es la pertenencia a una categoría de servicio. «Sirvientes» evita sobrerredefinir el estado social, pero la nota conserva que el griego puede implicar una condición más baja o dependiente.
  doctrine_reference: 'DOCTRINE.md: contested terms table on δοῦλος; translation philosophy on lexical transparency'
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente indicada como sin cambios; no se requieren ajustes por revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene «Salomón» con tilde según el uso español estándar y el valor propio del nombre.
  - Se conserva la estructura breve de lista/censo del original griego, con dos grupos y el total numérico final.
  - La nota reproduce la alternativa léxica relevante sin introducir una interpretación doctrinal adicional.
