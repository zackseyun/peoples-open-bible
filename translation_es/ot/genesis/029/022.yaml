translation:
  language: es
  text: Así que Labán reunió[a] a todos los hombres del lugar y hizo un banquete[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a toda la gente del lugar». El hebreo dice más literalmente «a todos los hombres del lugar»; se conserva la forma masculina porque probablemente se refiere a los varones del pueblo invitados a la celebración de bodas.'
    reason: lexical_alternative
  - marker: b
    text: «Banquete» traduce un término hebreo usado a menudo para una comida celebrativa y puede implicar bebida como parte de la ocasión.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  lexicon: HALOT
  rationale: אסף en este contexto narrativo expresa reunir personas. «Reunió» es natural en español moderno, conserva la acción concreta y evita un calco rígido.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Labán
  alternatives_spanish:
  - Laban
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma castellana usual «Labán», que es transparente para lectores de español y mantiene el nombre propio sin alterar el referente.
- source_word: אֶת כָּל אַנְשֵׁי הַמָּקוֹם
  english_pob_choice: all the men of the place
  chosen_spanish: a todos los hombres del lugar
  alternatives_spanish:
  - a toda la gente del lugar
  - a todos los varones del lugar
  lexicon: HALOT
  rationale: אַנְשֵׁי es el plural constructo masculino de אִישׁ, literalmente «hombres de». «Hombres del lugar» preserva la forma masculina marcada; «del lugar» sigue de cerca הַמָּקוֹם sin añadir una especificación como «pueblo» o «ciudad» que el hebreo no explicita.
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - preparó
  - celebró
  lexicon: HALOT
  rationale: עשה es un verbo amplio; con מִשְׁתֶּה, «hizo» conserva la relación literal con el hebreo y suena natural en español en este giro.
- source_word: מִשְׁתֶּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un festín
  lexicon: HALOT
  rationale: מִשְׁתֶּה designa un banquete o comida celebrativa, a menudo con bebida. «Banquete» comunica bien el carácter festivo y es más preciso que «fiesta» en este contexto.
translation_notes:
  revision_awareness: El texto base en inglés y el control cruzado muestran alta concordancia y no registran revisiones sustantivas; por eso la versión española sigue de cerca el hebreo, manteniendo el masculino marcado y la imagen de una comida festiva celebrativa.
  spanish_consistency_notes:
  - Se conserva el nombre propio en forma castellana estándar «Labán».
  - Se mantiene la distinción léxica entre «hombres» y una posible lectura más inclusiva, con nota explicativa.
  - «Banquete» se prefiere por claridad cultural y cercanía semántica al hebreo מִשְׁתֶּה.
