translation:
  language: es
  text: Y ahora[a], aborrecedor de la insolencia, abundante en misericordia, juez de todo, preséntate pronto a los santos de la raza de Israel, que son ultrajados[c] por las naciones abominables, sin ley[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: O «muéstrate» para ἐπιφάνηθι, destacando la intervención visible más que la mera llegada.
    reason: lexical_alternative
  - marker: b
    text: «Naciones» aquí se refiere a pueblos no israelitas; «gentiles» es una alternativa contextual posible.
    reason: lexical_alternative
  - marker: c
    text: O «que están siendo abusados de manera ultrajante»; el verbo griego puede denotar trato insolente, humillante o abusivo, no solo sufrimiento general.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισόβρι
  english_pob_choice: hater of insolence
  chosen_spanish: aborrecedor de la insolencia
  alternatives_spanish:
  - enemigo de la insolencia
  - aborrecedor de la arrogancia
  lexicon: LSJ
  rationale: El compuesto es raro y expresa odio o aversión hacia la insolencia, la violencia arrogante o el ultraje. «Aborrecedor de la insolencia» conserva el tono compacto y condenatorio sin suavizar el sentido.
- source_word: πολυέλεε
  english_pob_choice: abundant in mercy
  chosen_spanish: abundante en misericordia
  alternatives_spanish:
  - rico en misericordia
  - muy misericordioso
  lexicon: LSJ
  rationale: El vocativo subraya abundancia de misericordia. «Abundante en misericordia» sigue de cerca la fuerza del griego y suena natural en español bíblico contemporáneo.
- source_word: τῶν ὅλων δίκαστα
  english_pob_choice: judge of all
  chosen_spanish: juez de todo
  alternatives_spanish:
  - juez del universo
  - juez de todas las cosas
  lexicon: LSJ
  rationale: La frase griega expresa alcance universal. «Juez de todo» es breve, claro y conserva el sentido de totalidad sin ampliar innecesariamente el campo semántico.
- source_word: τάχος ἐπιφάνηθι
  english_pob_choice: quickly appear
  chosen_spanish: preséntate pronto
  alternatives_spanish:
  - aparece pronto
  - manifiéstate pronto
  lexicon: LSJ
  rationale: El imperativo pide intervención visible y salvadora. «Preséntate pronto» comunica la idea de hacerse presente de manera notoria, sin reducirla a mera llegada.
- source_word: τοῖς ἁγίοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los consagrados
  lexicon: LSJ
  rationale: Aunque «los santos» puede sonar eclesial, aquí refleja bien el sustantivo usado para el pueblo consagrado. La opción mantiene concisión y se ajusta al lenguaje bíblico en español.
- source_word: Ἰσραὴλ γένους
  english_pob_choice: of Israel’s race
  chosen_spanish: de la raza de Israel
  alternatives_spanish:
  - del linaje de Israel
  - del pueblo de Israel
  lexicon: LSJ
  rationale: γένος conserva fuerza étnico-genealógica. «Raza» reproduce esa carga de pertenencia por descendencia mejor que una paráfrasis más general como «pueblo».
- source_word: ὑπὸ ἐβδελυγμένων ἀνόμων ἐθνῶν
  english_pob_choice: by the abominable lawless nations
  chosen_spanish: por las naciones abominables y sin ley
  alternatives_spanish:
  - por las naciones detestables y sin ley
  - por los gentiles abominables y sin ley
  lexicon: LSJ
  rationale: ἔθνη aquí designa naciones no israelitas. «Naciones» es el equivalente más neutral y contextual; «abominables» y «sin ley» preservan la acusación moral fuerte del griego.
- source_word: ὑβριζομένοις
  english_pob_choice: who are being mistreated
  chosen_spanish: que son ultrajados
  alternatives_spanish:
  - que están siendo maltratados
  - que están siendo insultados con violencia
  lexicon: LSJ
  rationale: El verbo puede implicar trato insolente, humillante u ofensivo, no solo sufrimiento general. «Ultrajados» conserva mejor la violencia y el deshonor del contexto que un simple «maltratados».
theological_decisions:
- issue: Designación de Israel como pueblo consagrado
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los santos de Dios
  - los consagrados de Israel
  rationale: El griego presenta a Israel como el grupo apartado para Dios. «Los santos» mantiene el valor sustantivo del término sin introducir formulaciones posteriores ni diluir la identidad del pueblo en opresión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Conservación de la fuerza étnico-genealógica de γένος
  english_pob_reading: Israel’s race
  chosen_spanish_reading: la raza de Israel
  alternative_spanish_readings:
  - el linaje de Israel
  - el pueblo de Israel
  rationale: La expresión griega enfatiza descendencia o pertenencia de linaje. «Raza» transmite esa fuerza de manera directa, aunque marcada, y evita reducir el término a una categoría meramente religiosa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Valoración del lenguaje acusatorio hacia las naciones
  english_pob_reading: the abominable lawless nations
  chosen_spanish_reading: las naciones abominables y sin ley
  alternative_spanish_readings:
  - las naciones detestables y sin ley
  - las naciones impías y abominables
  rationale: El texto conserva una denuncia moral intensa contra los opresores. La traducción no suaviza esa tensión, porque forma parte explícita de la súplica y del contraste entre Israel y las naciones opresoras.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y refleja la revisión del audit trail: πολυέλεε se resuelve como «abundante en misericordia» en lugar de una fórmula más idiomática pero menos directa; además, se mantiene la doble acusación de ἐβδελυγμένων ἀνόμων con dos calificativos coordinados en español. Se preserva la intensidad de ὑβριζομένοις con «ultrajados», que responde mejor al valor de abuso insolente documentado en el contexto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino en el texto fuente; aquí no aplica.
  - Se conserva «santos» para τοῖς ἁγίοις por ser una designación sustantiva del pueblo apartado, sin reemplazarla por una paráfrasis más vaga.
  - «Raza de Israel» mantiene la fuerza genealógica de γένος, consistente con la prioridad del dato original.
  - La puntuación separa con comas los vocativos y los epítetos, siguiendo la estructura oracional del griego y el audit trail inglés.
  - «Ultrajados» se eligió para no aplanar el matiz de humillación e insolencia presente en ὑβριζομένοις.
