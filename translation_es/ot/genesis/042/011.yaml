translation:
  language: es
  text: Todos nosotros somos hijos de un solo hombre. Somos sinceros[a]; tus siervos[b] no han sido espías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «honestos», «íntegros» o «veraces». El hebreo describe a personas confiables y sinceras en contraste con la acusación de espionaje.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «tus servidores». Aunque עֲבָדֶיךָ puede referirse a esclavos o siervos en otros contextos, aquí funciona como una autoidentificación deferencial ante una autoridad, por eso «siervos» es la opción más fiel en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּנוּ
  english_pob_choice: all
  chosen_spanish: Todos nosotros
  alternatives_spanish:
  - todos
  - todos nosotros
  lexicon: HALOT
  rationale: El hebreo enfatiza la totalidad del grupo. «Todos nosotros» conserva ese énfasis con un orden natural en español.
- source_word: בְּנֵי אִישׁ אֶחָד
  english_pob_choice: the sons of one man
  chosen_spanish: hijos de un solo hombre
  alternatives_spanish:
  - hijos de un hombre solo
  - hijos de un mismo hombre
  lexicon: HALOT
  rationale: «Hijos» reproduce el masculino explícito de בני, y «un solo hombre» conserva la unidad del padre sin añadir una idea ajena.
- source_word: נָחְנוּ / אֲנַחְנוּ
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - nosotros somos
  - somos nosotros
  lexicon: HALOT
  rationale: El hebreo usa pronombres enfáticos; en español se preserva con la primera persona plural en ambas cláusulas, sin forzar una repetición innecesaria.
- source_word: כֵּנִים
  english_pob_choice: honest
  chosen_spanish: sinceros
  alternatives_spanish:
  - honestos
  - íntegros
  - veraces
  lexicon: HALOT
  rationale: El campo semántico apunta a personas confiables, sinceras o veraces frente a la acusación. «Sinceros» comunica bien esa idea en español y evita una posible lectura reducida a honestidad financiera.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: HALOT
  rationale: Dado el valor léxico de עבד y la preferencia POB por «slave» cuando la fuerza lexical lo pide, «esclavos» conserva la dureza del término. En este contexto es también una fórmula deferencial ante un superior.
- source_word: מְרַגְּלִים
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - exploradores
  - reconocedores
  lexicon: HALOT
  rationale: El participio designa aquí a personas que actúan como espías, no una exploración neutral. «Espías» es la equivalencia clara y directa.
- source_word: לֹא הָי֥וּ ... מְרַגְּלִים
  english_pob_choice: have not been spies
  chosen_spanish: no han sido espías
  alternatives_spanish:
  - no son espías
  - no fueron espías
  lexicon: HALOT
  rationale: La construcción hebrea con היה + participio expresa estado/actividad negados. «No han sido espías» refleja bien la negativa extendida al pasado y al estado presente, como defensa frente a la acusación.
theological_decisions:
- issue: Autoidentificación humilde ante autoridad
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: 'No hay un problema doctrinal, pero sí un matiz social y léxico importante: la frase funciona como autoidentificación deferente ante una autoridad. «Esclavos» mantiene la dureza lexical del hebreo y la tensión del contexto, sin suavizarla hacia un término más eclesiástico.'
  doctrine_reference: No aplica; decisión léxica y de registro.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el artículo antes de «sons» y simplificó «honest men» a «honest». En español se sigue esa revisión con una construcción más natural («hijos de un solo hombre») y sin añadir un equivalente de «men». También se respeta la nota inglesa sobre la posible oscilación de sentido de ‘honest’ y la forma alternativa de traducir la cláusula negativa de ‘have not been spies’.
  spanish_consistency_notes:
  - Se mantiene «espías» para מְרַגְּלִים en coherencia con el audit trail inglés.
  - Se evita «Cristo» o terminología litúrgica no pertinente.
  - No se introduce mayúscula teológica innecesaria en «sinceros» ni en «esclavos».
  - La formulación conserva el paralelismo de dos afirmaciones breves, como en el hebreo.
