review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura espacial del hebreo: ubicación fuera de la puerta interior, cámaras de cantores en el atrio interior, una junto al lado de la puerta norte orientada al sur y otra junto al lado de la puerta oriental orientada al norte. Sin embargo, omite la nota de compresión sintáctica presente en el rastro inglés y ancla indebidamente la nota [a] a «atrio interior», cuando esa nota en realidad corresponde a la alternativa de ubicar las cámaras junto al lado de la puerta del norte.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «junto al lado de» suena redundante; «al lado de» o «junto al costado de» sería más natural. También conviene mantener el paralelismo con «su frente hacia…» en ambas mitades. El resto del registro arquitectónico («atrio», «cantores») funciona bien.
  glossary_alignment: No hay términos teológicos sensibles del glosario general en este versículo. «Cantores», «atrio interior» y la orientación cardinal son adecuados. «Oriente» es aceptable en registro bíblico, aunque aquí «este» también sería posible; no es un problema de fidelidad.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: En el POB inglés, la nota a comenta una lectura alternativa para la frase sobre la puerta del norte, no para «inner court». En español, el marcador debe aparecer junto a la cláusula relevante o no incluirse.
  - severity: medium
    issue: Falta la nota de compresión sintáctica equivalente a la nota inglesa [c].
    rationale: El expediente auditado documenta que el hebreo es sintácticamente comprimido y que algunas traducciones ordenan de otro modo la descripción. Esa información debe preservarse porque justifica la resolución española del versículo.
  - severity: low
    issue: «junto al lado de» es una formulación poco natural en español.
    rationale: Aunque comprensible, duplica dos expresiones laterales. «al lado de» transmite bien כֶּתֶף en este contexto arquitectónico y mejora la legibilidad sin perder precisión.
  revised_spanish_text: Y fuera de la puerta interior había cámaras para los cantores en el atrio interior, que estaban al lado de la puerta del norte[a], con su frente hacia el sur; una estaba al lado de la puerta del oriente[b][c], con su frente hacia el norte.
  revised_footnotes:
