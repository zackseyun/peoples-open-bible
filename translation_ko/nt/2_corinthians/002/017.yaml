id: 2CO.2.17
reference: 2 Corinthians 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ γάρ ἐσμεν ὡς οἱ ⸀πολλοὶ καπηλεύοντες τὸν λόγον τοῦ θεοῦ, ἀλλ’ ὡς ἐξ εἰλικρινείας, ἀλλ’ ὡς ἐκ θεοῦ ⸀κατέναντι θεοῦ ἐν Χριστῷ λαλοῦμεν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/002/017.yaml
  text: For we are not like the many, peddling the word of God, but as from sincerity, but as from God, before God we speak in Messiah.
  footnotes:
  - marker: a
    text: Or 'most people' or 'so many others.'
    reason: lexical_alternative
  - marker: b
    text: '''Peddling'' can also carry the sense of adulterating or marketing for profit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with sincerity.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in the sight of God' or 'in God's presence.'
    reason: lexical_alternative
  - marker: e
    text: 'Traditional: ''in Christ.'''
    reason: alternative_reading
  - marker: f
    text: Or 'but from sincerity, but from God'.
    reason: previous_rendering
translation:
  language: ko
  text: 우리는 많은 사람과 같이 하나님의 말씀을 장사하지 않습니다. 도리어 진실함에서 우러나, 하나님께로부터, 하나님 앞에서, 메시아 안에서 우리는 말합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καπηλεύοντες
  english_pob_choice: peddling
  chosen_korean: 장사하다
  alternatives_korean:
  - 행상하다
  - 이익을 위해 팔다
  lexicon: BDAG
  rationale: κάπηλος는 「소매상·행상」으로, 이익을 위해 물건을 섞어 파는 부정적 함의. 「장사하다」가 본문의 비판적 어조를 담는다.
- source_word: εἰλικρινείας
  english_pob_choice: sincerity
  chosen_korean: 진실함
  alternatives_korean:
  - 순전함
  lexicon: BDAG
  rationale: 1:12와 일관되게 「진실함」.
- source_word: κατέναντι θεοῦ
  english_pob_choice: before God
  chosen_korean: 하나님 앞에서
  alternatives_korean:
  - 하나님 면전에서
  lexicon: BDAG
  rationale: 책임적 임재 의식의 정형구.
