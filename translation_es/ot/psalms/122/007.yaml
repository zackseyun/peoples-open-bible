translation:
  language: es
  text: Haya paz dentro de tus baluartes[a], prosperidad dentro de tus ciudadelas[c].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de tus murallas». El hebreo חֵיל puede referirse al recinto defensivo o a la fortificación de una ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «seguridad» o «tranquilidad». El hebreo שַׁלְוָה denota quietud y bienestar seguro.
    reason: lexical_alternative
  - marker: c
    text: O «dentro de tus palacios». El hebreo puede referirse a palacios o a fortalezas elevadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May there be
  chosen_spanish: ¡Haya!
  alternatives_spanish:
  - ¡Que haya!
  - ¡Sea!
  lexicon: HALOT
  rationale: El jussivo expresa deseo o petición. En español, «haya» transmite bien la fuerza optativa en una forma breve y natural para una oración de bendición.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: En este contexto de bendición sobre Jerusalén, «paz» es la equivalencia más directa e idiomática; mantiene también la amplitud semántica sin sobreexplicar.
- source_word: בְּחֵילֵךְ
  english_pob_choice: within your ramparts
  chosen_spanish: dentro de tus murallas
  alternatives_spanish:
  - dentro de tus rampartas
  - dentro de tus fortificaciones
  lexicon: HALOT
  rationale: חֵיל aquí designa una defensa o recinto fortificado de la ciudad. «Murallas» es claro y natural en español, y conserva el sentido de protección urbana más fielmente que una traducción demasiado técnica o poco usual.
- source_word: שַׁלְוָה
  english_pob_choice: prosperity
  chosen_spanish: prosperidad
  alternatives_spanish:
  - seguridad
  - tranquilidad
  - bienestar
  lexicon: HALOT
  rationale: El término puede expresar quietud, seguridad o bienestar. En paralelo con «paz» y como deseo sobre la ciudad, «prosperidad» comunica bien la idea de florecimiento estable que el inglés POB también privilegia.
- source_word: בְּאַרְמְנוֹתָיִךְ
  english_pob_choice: within your citadels
  chosen_spanish: dentro de tus palacios
  alternatives_spanish:
  - dentro de tus fortalezas
  - dentro de tus citadeles
  lexicon: HALOT
  rationale: אַרְמֹן puede significar palacio o fortaleza/fortín elevado. «Palacios» es el valor más transparente y idiomático en español; además, el término mantiene la tensión lexical entre residencia real y lugar fortificado sin forzar un tecnicismo.
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de «walls» a «ramparts» para reflejar con mayor precisión חֵילֵךְ. En español se optó por «murallas» como equivalente natural y tradicional de un recinto fortificado urbano, evitando un anglicismo semántico, pero conservando la misma decisión de fondo: no limitar el término a simples «paredes» ni diluir su sentido defensivo. Se mantuvo «palacios» porque en español comunica claramente el valor posible de אַרְמְנוֹתָיִךְ, aunque el hebreo también puede abarcar fortalezas o residencias reales.'
  spanish_consistency_notes:
  - Se preserva el paralelismo poético de dos miembros.
  - Se mantiene el tratamiento de segunda persona singular posesiva («tus»), coherente con el hebreo.
  - «Paz» y «prosperidad» reflejan el doble campo semántico de שָׁלוֹם y שַׁלְוָה sin colapsarlos en un solo término.
  - Las notas a pie conservan las alternativas léxicas relevantes sin recargar el texto principal.
