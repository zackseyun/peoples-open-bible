base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/008/041.yaml
  text: plants[a], but not everything that has been sown will be saved in its time, nor will everything that has been planted take root; so also those who have been sown in the world will not all be saved.” And I answered and said, “If I have found favor before you, let me speak.”
