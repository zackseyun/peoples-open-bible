revisions:
- from: Y pondrás las dos piedras sobre las hombreras del efod, piedras de memorial[a] para los hijos de Israel[b]; y Aarón llevará sus nombres delante de Yahvé sobre sus dos hombros, para memorial.
  to: Y pondrás las dos piedras sobre las hombreras del efod, como piedras memoriales[a] para los hijos de Israel[b]; y Aarón llevará sus nombres delante de Yahvé sobre sus dos hombros, como memorial.
  rationale: Se ajusta el español para evitar calcos poco naturales ('piedras de memorial', 'para memorial') y se conserva a la vez la repetición conceptual de זִכָּרוֹן mediante 'memorial / memoriales'. También se mejora la nota léxica para ofrecer una alternativa más idiomática en español. No se requiere adjudicación adicional porque el sentido fuente y las decisiones doctrinales están claros.
  reviewer_model: gpt-5.4
