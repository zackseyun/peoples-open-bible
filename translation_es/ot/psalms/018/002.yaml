translation:
  language: es
  text: 'Y dijo[a]: «Te amo, Yahvé, mi fortaleza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Tengo compasión por ti» o «te aprecio profundamente»; el verbo lleva un matiz de compasión tierna, aquí expresado de forma idiomática como amor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Él dijo
  lexicon: HALOT
  rationale: La forma con waw consecutiva introduce una fórmula de discurso. En español, «Y dijo» conserva la transición narrativa sin sobrecargar el texto; «Entonces dijo» sería posible, pero añade un matiz temporal que el hebreo no exige aquí.
- source_word: אֶרְחָמְךָ
  english_pob_choice: I love you
  chosen_spanish: Te amo
  alternatives_spanish:
  - Te tengo compasión
  - Te amo profundamente
  - Te quiero
  lexicon: HALOT
  rationale: La raíz רחם lleva una carga de compasión, ternura y afecto. En dirección a Yahvé, el sentido idiomático devocional se comunica bien con «te amo», mientras que el matiz compasivo se preserva en la nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», en lugar de sustituirlo por un título. «Jehová» y «el SEÑOR» no se adoptan porque no reflejan la decisión auditada del POB en este pasaje.'
- source_word: חִזְקִי
  english_pob_choice: my strength
  chosen_spanish: fortaleza mía
  alternatives_spanish:
  - mi fuerza
  - mi fortaleza
  - mi apoyo
  lexicon: HALOT
  rationale: El sustantivo derivado de חזק expresa la idea de fuerza, apoyo y firmeza. En español, «fortaleza mía» suena natural y solemne; mantiene el valor nominal y la relación posesiva sin reducirlo solo a fuerza física.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB preserva el nombre propio del pacto. En español, «Yahvé» sigue esa misma decisión y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Fuerza semántica de רחם en un contexto de alabanza y devoción
  english_pob_reading: I love you
  chosen_spanish_reading: Te amo
  alternative_spanish_readings:
  - Te tengo compasión
  - Te quiero
  rationale: Aunque רחם puede denotar compasión/tierna misericordia, aquí el hablante se dirige a Dios en una confesión afectiva. «Te amo» expresa con claridad el valor relacional que el texto pretende, sin negar el trasfondo compasivo señalado por el POB.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Sin cambios respecto al pase más reciente del contexto inglés; la presente propuesta mantiene la misma lectura auditada y solo la vierte al español con equivalencia óptima y terminología del proyecto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma española del nombre divino, en coherencia con la norma del proyecto.
  - «Fortaleza mía» mantiene el valor nominal de חִזְקִי y evita una paráfrasis más amplia.
  - La puntuación reproduce el arranque de discurso y la cita directa de manera natural en español.
  - La nota a pie de página se ancla en «Te amo» para transparentar el matiz léxico de רחם.
