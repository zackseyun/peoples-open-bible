revisions:
- from: Desde la antigüedad no han oído, ni han escuchado; ningún ojo ha visto a un Dios fuera de ti[a], que actúa para el que espera en él.
  to: Desde la antigüedad no han oído, ni han escuchado; ningún ojo ha visto a un Dios aparte de ti[a], que actúa para el que lo espera.
  rationale: 'Se hacen reparaciones menores para mejorar fidelidad y español natural: «aparte de ti» expresa mejor la exclusividad de זוּלָתְךָ en esta construcción, y «lo espera» refleja más directamente לִמְחַכֵּה לוֹ que «espera en él». Se conserva la estructura comprimida, los plurales iniciales, el singular «ningún ojo», y la tensión teológica documentada. La nota se ajusta para reflejar con más claridad la alternativa auditada en inglés.'
  reviewer_model: gpt-5.4
