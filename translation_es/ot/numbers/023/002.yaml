translation:
  language: es
  text: Balac hizo tal como Balaam había dicho, y Balac y Balaam ofrecieron[a] un toro y un carnero en el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hicieron subir» o «hicieron ascender»; en contexto sacrificial, esto significa «ofrecieron» u «ofrecieron en sacrificio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo lo que
  - cumplió
  lexicon: HALOT
  rationale: En la construcción idiomática equivalente a “did as … had spoken”, el verbo expresa llevar a cabo lo dicho; “hizo” es natural en español y conserva la acción de cumplimiento sin añadir matices.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: as ... had spoken
  chosen_spanish: como ... había hablado
  alternatives_spanish:
  - tal como ... había dicho
  - según ... había hablado
  lexicon: HALOT
  rationale: “Como ... había hablado” reproduce la idea de conformidad con lo dicho por Balaam y mantiene el valor temporal anterior del perfecto con un tono narrativo sobrio.
- source_word: וַיַּעַל
  english_pob_choice: offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - hicieron subir
  - presentaron en ofrenda
  lexicon: HALOT
  rationale: El verbo hiphil de עלה en contexto sacrificial tiene sentido técnico de ofrecer un sacrificio; “ofrecieron” comunica bien ese valor cultual en español actual.
- source_word: בָּלָק וּבִלְעָם
  english_pob_choice: Balak and Balaam
  chosen_spanish: Balac y Balaam
  alternatives_spanish:
  - Balac junto con Balaam
  lexicon: HALOT
  rationale: Se translitera “Balac” siguiendo uso español usual, mientras que Balaam ya es forma estable; la coordinación simple refleja el hebreo sin sobreexplicar la relación.
- source_word: פָּר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un novillo
  - un toro joven
  lexicon: HALOT
  rationale: פָּר denota un bovino macho para sacrificio; “toro” es claro y digno en español, y evita especificar juventud que el hebreo no marca aquí.
- source_word: וָאַיִל
  english_pob_choice: and a ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho de oveja
  lexicon: HALOT
  rationale: אַיִל corresponde a “ram”; en español bíblico “carnero” es el equivalente directo y plenamente comprensible.
- source_word: בַּמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  lexicon: HALOT
  rationale: La preposición con el sustantivo de altar en contexto sacrificial se expresa de modo natural como “sobre el altar”, conservando la imagen del acto ritual.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: conserva la estructura narrativa, el valor sacrificial de וַיַּעַל y la coordinación de los dos sujetos sin añadir explicaciones interpretativas. No se requieren revisiones registradas aparte de la decisión léxica ya documentada para el verbo sacrificial.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se usa “Balac” como forma española consistente con el nombre propio en la tradición bíblica hispana, sin alterar el hebreo de base.
  - “Ofrecieron” se reserva aquí para el sentido cultual de וַיַּעַל; no implica un cambio doctrinal sino una equivalencia semántica en contexto sacrificial.
