translation:
  language: es
  text: Y daba testimonio a todos de las obras del Dios grandísimo[a], que había visto con sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «el Dios Altísimo». El griego aquí usa μεγίστου, «grandísimo» o «el más grande», no el término habitual para «altísimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεμαρτύρει
  english_pob_choice: he testified
  chosen_spanish: dio testimonio
  alternatives_spanish:
  - testificó
  - daba testimonio
  lexicon: BDAG
  rationale: El imperfecto expresa una acción continuada o reiterada; en español, «dio testimonio» comunica de manera natural el acto de declarar públicamente lo visto. «Daba testimonio» preservaría mejor el aspecto durativo, pero aquí suena menos concluyente en una oración narrativa breve.
- source_word: πᾶσιν
  english_pob_choice: to everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los presentes
  - a cada uno
  lexicon: BDAG
  rationale: El dativo marca destinatario. «A todos» conserva la amplitud universal del griego y es idiomático en español bíblico moderno.
- source_word: ἅπερ
  english_pob_choice: about the works ... that
  chosen_spanish: de las obras ... que
  alternatives_spanish:
  - acerca de las cosas ... que
  - sobre lo que ... que
  lexicon: LSJ
  rationale: La relativa se expresa con naturalidad en español como «de las obras ... que», manteniendo el vínculo entre el testimonio y el contenido visto sin forzar una calca.
- source_word: ὑπʼ ὄψιν
  english_pob_choice: with his own eyes
  chosen_spanish: con sus propios ojos
  alternatives_spanish:
  - ante sus ojos
  - visiblemente
  lexicon: LSJ
  rationale: El modismo enfatiza visión directa y personal. «Con sus propios ojos» reproduce bien esa fuerza idiomática en español.
- source_word: τεθεαμένος
  english_pob_choice: had seen
  chosen_spanish: había visto
  alternatives_spanish:
  - había contemplado
  - había observado
  lexicon: BDAG
  rationale: El participio perfecto medio indica una visión ya completada con relevancia presente. «Había visto» es claro y fiel; «había contemplado» sería más elevado de lo necesario.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - actos
  - hechos
  lexicon: BDAG
  rationale: «Obras» es el equivalente más natural para acciones divinas en español y conserva el matiz de actividad efectiva de Dios.
- source_word: τοῦ μεγίστου θεοῦ
  english_pob_choice: the greatest God
  chosen_spanish: del Dios más grande
  alternatives_spanish:
  - del Dios altísimo
  - del Dios supremo
  lexicon: LSJ
  rationale: El griego dice literalmente «del Dios mayor/más grande» (μεγίστου), no el título habitual «Altísimo». «Dios más grande» conserva la superlación sin sustituirla por una fórmula tradicional no presente en el texto.
theological_decisions:
- issue: Cómo renderizar la superlación divina μεγίστου θεοῦ sin neutralizarla con un título tradicional
  english_pob_reading: the greatest God
  chosen_spanish_reading: el Dios más grande
  alternative_spanish_readings:
  - el Dios Altísimo
  - Dios Altísimo
  - el Dios supremo
  rationale: El texto griego usa un adjetivo superlativo concreto («más grande»), no el título estándar «Altísimo». La traducción mantiene esa tensión lexical para no borrar la diferencia observada por el POB en inglés, y deja abierta la alternativa tradicional en nota.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente, que no introdujo cambios y marcó alta concordancia con solo observaciones menores. La redacción española conserva la decisión central del POB en inglés: mantener la superlación literal de μεγίστου sin reemplazarla por el título tradicional «Altísimo».'
  spanish_consistency_notes:
  - Se mantuvo «Dios» con mayúscula por referencia directa al Dios verdadero.
  - Se prefirió una sintaxis española fluida sin perder la estructura de testimonio + contenido visto.
  - La nota conserva la alternativa tradicional, pero el texto principal retiene la superlación fuente-cercana.
