  yaml_path: translation/ot/genesis/027/012.yaml
  text: Perhaps my father will feel me[a], and I will seem to him like a deceiver[b], and I will bring a curse on myself and not a blessing.
  footnotes:
  - marker: a
    text: Or 'will touch me.' The Hebrew verb refers to feeling by touch, fitting Isaac's attempt to verify Jacob's identity physically.
    reason: lexical_alternative
  - marker: b
    text: Or 'like one mocking' or 'like a trickster.' The Hebrew expression denotes someone acting deceptively or making a fool of another.
    reason: lexical_alternative
