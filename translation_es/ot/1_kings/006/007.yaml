translation:
  language: es
  text: La casa fue construida, al ser edificada, con piedra acabada, sacada de la cantera de antemano[a]; y no se oyó martillo ni hacha ni herramienta de hierro alguna en la casa mientras era edificada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preparada en la cantera». El término hebreo מַסָּע es especializado y puede referirse tanto a la extracción de la piedra como a su preparación previa en la cantera.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene el sustantivo básico del hebreo, como en el POB inglés, para no sustituir por una identificación interpretativa que el versículo no expresa de forma directa. En este contexto se entiende como la casa/edificio del templo, pero 'casa' preserva el idioma bíblico.
- source_word: בְּהִבָּנֹתוֹ
  english_pob_choice: when it was built / while it was being built
  chosen_spanish: cuando fue edificada / mientras se la edificaba
  alternatives_spanish:
  - durante su construcción
  - en su ser edificada
  lexicon: HALOT
  rationale: 'El infinitivo constructo con ב expresa circunstancia temporal. En español, una cláusula temporal es la forma natural y más clara. Se mantiene la repetición del sentido temporal con dos matices: inicio del hecho (''cuando fue edificada'') y proceso en curso (''mientras se la edificaba'').'
- source_word: אֶבֶן שְׁלֵמָה
  english_pob_choice: finished stone
  chosen_spanish: piedra terminada
  alternatives_spanish:
  - piedra completa
  - piedra labrada
  - piedra preparada
  lexicon: HALOT
  rationale: שְׁלֵמָה comunica integridad/completitud; en contexto constructivo, 'terminada' refleja que la piedra estaba preparada antes del montaje. 'Labrada' sería posible, pero introduce una especificación que el término no exige por sí mismo.
- source_word: מַסָּע
  english_pob_choice: quarried in advance
  chosen_spanish: sacada de la cantera de antemano
  alternatives_spanish:
  - preparada en la cantera
  - extraída antes
  - de la cantera
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad documentada: el término puede apuntar al canteo/extracción o a la piedra ya preparada desde la cantera. ''Sacada de la cantera de antemano'' comunica el valor práctico sin fijar más de lo que el hebreo permite.'
- source_word: נִבְנָה
  english_pob_choice: was built
  chosen_spanish: fue construida
  alternatives_spanish:
  - se construyó
  - estaba construida
  lexicon: HALOT
  rationale: El nifal perfecto se vierte naturalmente con pasiva simple en español. 'Fue construida' conserva el foco en la acción de construcción, como en el inglés POB.
- source_word: מַקָּבוֹת
  english_pob_choice: hammer
  chosen_spanish: martillo
  alternatives_spanish:
  - mazo
  - martillo(s)
  lexicon: HALOT
  rationale: En la lista de herramientas, 'martillo' es la equivalencia idiomática más clara para el español. Aunque el hebreo está en plural, el español también puede usar singular colectivo en una serie coordinada, como hace el POB inglés.
- source_word: הַגַּרְזֶן
  english_pob_choice: axe
  chosen_spanish: hacha
  alternatives_spanish:
  - azuela
  lexicon: HALOT
  rationale: La equivalencia básica y más transparente es 'hacha'. 'Azuela' podría considerarse en algunos contextos técnicos, pero el término general es mejor aquí.
- source_word: כָּל כְּלִי בַרְזֶל
  english_pob_choice: any iron tool
  chosen_spanish: herramienta de hierro alguna
  alternatives_spanish:
  - ningún instrumento de hierro
  - ningún utensilio de hierro
  - cualquier herramienta de hierro
  lexicon: HALOT
  rationale: La construcción distributiva se expresa con 'alguna' tras la negación para reflejar la amplitud de כָּל. 'Herramienta de hierro' reproduce bien la categoría general; 'instrumento' o 'utensilio' serían válidos pero menos naturales en esta enumeración.
- source_word: לֹא נִשְׁמַע
  english_pob_choice: was heard
  chosen_spanish: no se oyó
  alternatives_spanish:
  - no fue oído
  - no se escuchó
  lexicon: HALOT
  rationale: El nifal de שמע se traduce de modo natural con una pasiva/reflexiva impersonal en español. 'No se oyó' es idiomático y mantiene la negación observacional del texto.
theological_decisions:
- issue: Identificación del edificio como 'casa' sin explicitar 'templo'
  english_pob_reading: The house
  chosen_spanish_reading: La casa
  alternative_spanish_readings:
  - El templo
  - La casa del templo
  rationale: El POB inglés conserva 'house' para seguir de cerca el hebreo y no añadir la identificación interpretativa. En español se mantiene esa misma reserva, dejando que el contexto más amplio provea la referencia al templo.
  doctrine_reference: Exégesis contextual del AT; respeto a la forma textual sin expansión interpretativa
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas; el último pase indicó ''unchanged: true'' y el control cruzado señaló alta concordancia con solo observaciones menores.'
  spanish_consistency_notes:
  - Se conserva 'casa' para alinearse con el patrón POB de evitar sustituciones interpretativas sin respaldo inmediato.
  - Se mantiene una negación amplia con 'alguna' para reflejar כָּל כְּלִי בַרְזֶל sin restringir indebidamente el alcance.
  - La puntuación y el orden de la lista de herramientas siguen el flujo natural del español sin alterar la secuencia hebrea.
