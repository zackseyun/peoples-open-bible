translation:
  language: es
  text: Golpea al burlador[a], y el simple se volverá prudente[b]; reprende al que tiene entendimiento[c], y adquirirá conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Burlador» traduce el valor moral de לֵץ; también podría decirse «mofador».
    reason: lexical_alternative
  - marker: b
    text: 'O: «el simple aprenderá prudencia».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «un hombre de entendimiento»; se mantiene la referencia personal singular con una formulación natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵץ
  english_pob_choice: scoffer
  chosen_spanish: burlador
  alternatives_spanish:
  - mofador
  - escarnecedor
  lexicon: HALOT
  rationale: לֵץ en Proverbios nombra a una persona que desprecia y se burla con desprecio. «Burlador» comunica bien ese tono de desprecio activo en español, sin sonar tan técnico como «escarnecedor» ni tan general como «mofador».
- source_word: תַּכֶּה
  english_pob_choice: Strike
  chosen_spanish: Castiga
  alternatives_spanish:
  - Golpea
  - Azota
  lexicon: HALOT
  rationale: El verbo hebreo expresa un golpe punitivo dentro de una sentencia sapiencial. En español, «castiga» conserva la fuerza correctiva y permite evitar una lectura innecesariamente brutal de «golpea», manteniendo la intención disciplinaria del proverbio.
- source_word: פֶתִי
  english_pob_choice: the simple
  chosen_spanish: el simple
  alternatives_spanish:
  - el ingenuo
  - el inexperto
  lexicon: HALOT
  rationale: «El simple» es el término sapiencial tradicional y preciso para פֶתִי, preservando la categoría moral de Proverbios. «Ingenuo» o «inexperto» explican parcialmente el sentido, pero pierden el registro proverbial.
- source_word: יַעְרִם
  english_pob_choice: will become shrewd
  chosen_spanish: se volverá prudente
  alternatives_spanish:
  - se volverá astuto
  - aprenderá prudencia
  lexicon: HALOT
  rationale: El verbo, en contexto sapiencial, describe adquirir sensatez práctica. «Prudente» funciona mejor en español que «astuto», porque esta última puede sonar moralmente sospechosa. «Se volverá prudente» conserva el valor resultativo del hebreo.
- source_word: וְהוֹכִיחַ
  english_pob_choice: rebuke
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprocha
  lexicon: HALOT
  rationale: La idea es de reprensión verbal correctiva. «Reprende» es natural, preciso y mantiene la tonalidad disciplinaria del texto sin volverlo excesivamente formal.
- source_word: לְנָבוֹן
  english_pob_choice: one who has understanding
  chosen_spanish: al que tiene entendimiento
  alternatives_spanish:
  - al entendido
  - al discernidor
  lexicon: HALOT
  rationale: נָבוֹן designa a una persona con discernimiento. «Al que tiene entendimiento» preserva el sentido personal singular y evita forzar un sustantivo abstracto donde el hebreo habla de una persona concreta.
- source_word: יָבִין
  english_pob_choice: he will gain
  chosen_spanish: adquirirá
  alternatives_spanish:
  - entenderá
  - llegará a comprender
  lexicon: HALOT
  rationale: Aunque בין frecuentemente significa «entender», aquí con דָּעַת como objeto en paralelo sapiencial el resultado es la adquisición de conocimiento. «Adquirirá» expresa bien ese efecto de incremento de conocimiento sin repetir «entendimiento».
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - discernimiento
  lexicon: HALOT
  rationale: «Conocimiento» es la equivalencia natural y estándar para דָּעַת en Proverbios. Mantiene la distinción entre el entendimiento ya característico de la persona y el conocimiento que ella obtiene al ser reprendida.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Proverbios 19:25 y la solución auditada en inglés, conservando la antítesis entre el burlador y el simple, y entre la reprensión y el aumento de conocimiento. Se ajustó el registro al español bíblico moderno sin perder la fuerza disciplinaria del proverbio.
  spanish_consistency_notes:
  - Se preserva «el simple» como término sapiencial técnico, no como insulto casual.
  - «Entendimiento» y «conocimiento» se distinguen para reflejar נָבוֹן / דָּעַת.
  - «Castiga» se usa por el valor punitivo del contexto, aunque la sentencia se dirija a la corrección moral.
  - Los marcadores de nota se aplican solo donde hay alternativa léxica o aclaración de sentido directamente ligada al hebreo.
