  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales respetan el expediente inglés. La excepción es הַנַּהֲלֹלִים: «manantiales» no preserva bien la amplitud de «watering places», y la nota asociada debe moverse al último sintagma. Además, la glosa difícil sobre הַבַּתּוֹת debe mantenerse en español íntegro.'
