translation:
  language: es
  text: 'Entonces Moisés dio a los hijos de Gad[a], a los hijos de Rubén y a la media tribu de Manasés hijo de José, el reino de Sihón, rey de los amorreos, y el reino de Og, rey de Basán: la tierra con sus ciudades en sus territorios, las ciudades de la tierra circundante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y la tierra, sus ciudades en sus territorios, las ciudades de la tierra circundante». La frase hebrea final está sintácticamente comprimida, y son posibles varias traducciones cercanas.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - otorgó
  lexicon: HALOT
  rationale: En este contexto narrativo, נתן expresa la entrega/asignación de un territorio. «Dio» es la forma más natural y directa en español, y conserva el acto de concesión sin sobreinterpretar.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a ellos mismos
  - les
  lexicon: HALOT
  rationale: El hebreo mantiene el objeto indirecto explícito antes de nombrar a los destinatarios. En español, el dativo queda integrado por la serie «a los hijos de…», de modo que no es necesario repetirlo de forma torpe.
- source_word: לִבְנֵי גָד ... וְלִבְנֵי רְאוּבֵן
  english_pob_choice: to the sons of Gad, to the sons of Reuben
  chosen_spanish: a los hijos de Gad, a los hijos de Rubén
  alternatives_spanish:
  - a los gaditas, a los rubenitas
  lexicon: HALOT
  rationale: Se conserva el paralelismo tribal y la fórmula genealógica de בְּנֵי. «Hijos de» refleja mejor el hebreo que los etnónimos, que son posibles pero menos transparentes respecto de la forma original.
- source_word: וְלַחֲצִי שֵׁבֶט מְנַשֶּׁה
  english_pob_choice: and to the half-tribe of Manasseh
  chosen_spanish: y a la media tribu de Manasés
  alternatives_spanish:
  - y a la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: La construcción de semitribu se vierte de manera idiomática como «media tribu». Mantiene la unidad tribal y la distribución territorial sin alargar innecesariamente la frase.
- source_word: בֶן יוֹסֵף
  english_pob_choice: son of Joseph
  chosen_spanish: hijo de José
  alternatives_spanish:
  - descendiente de José
  lexicon: HALOT
  rationale: Se conserva la identificación genealógica de Manasés. «Hijo de José» es la forma más fiel al sintagma hebreo y coincide con el uso bíblico en español.
- source_word: מַמְלֶכֶת
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio real
  - realeza
  lexicon: HALOT
  rationale: ממלכה denota el reino o dominio gobernado por un rey. «Reino» es el equivalente directo y más claro en español, y funciona bien para los territorios antes regidos por Sihón y Og.
- source_word: סִיחֹן מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: Sihon king of the Amorites
  chosen_spanish: Sihón, rey de los amorreos
  alternatives_spanish:
  - Sihón, el rey amorreo
  lexicon: HALOT
  rationale: Se mantiene la apposición nominal hebrea con puntuación española natural. «Amorreos» preserva el gentilicio colectivo del texto.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: Og king of Bashan
  chosen_spanish: Og, rey de Basán
  alternatives_spanish:
  - Og, el rey de Basán
  lexicon: HALOT
  rationale: Se conserva la estructura de nombre + título. «Basán» es la forma usual en español bíblico y corresponde al topónimo hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - el país
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere a la tierra/territorio entregado. «Tierra» mantiene la amplitud semántica bíblica y funciona bien en la construcción final.
- source_word: לְעָרֶיהָ
  english_pob_choice: with its cities
  chosen_spanish: con sus ciudades
  alternatives_spanish:
  - para sus ciudades
  - incluidas sus ciudades
  lexicon: HALOT
  rationale: El hebreo es elíptico; la relación entre la tierra y sus ciudades se expresa en español con una coordinación simple y natural. «Con sus ciudades» conserva la inclusión de las ciudades dentro del don territorial.
- source_word: בִּגְבֻלֹת
  english_pob_choice: in their territories
  chosen_spanish: en sus territorios
  alternatives_spanish:
  - dentro de sus límites
  - en sus fronteras
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa reciente («in their territories»), «territorios» capta mejor גבול que «fronteras» en este contexto de reparto de tierras. Además evita la literalidad rígida de «límites».
- source_word: עָרֵי הָאָרֶץ סָבִיב
  english_pob_choice: the cities of the surrounding land
  chosen_spanish: las ciudades de la tierra circundante
  alternatives_spanish:
  - las ciudades de la tierra alrededor
  - las ciudades del país circundante
  lexicon: HALOT
  rationale: La frase final hebrea es comprimida y algo appositiva. «Tierra circundante» conserva el sentido de las ciudades que pertenecen al entorno territorial, sin forzar una reconstrucción interpretativa excesiva.
theological_decisions:
- issue: Territorio entregado como reparto divino-mediado a las tribus
  english_pob_reading: So Moses gave ... the kingdom of Sihon ... and the kingdom of Og ...
  chosen_spanish_reading: Así que Moisés dio ... el reino de Sihón ... y el reino de Og ...
  alternative_spanish_readings:
  - Así Moisés entregó ...
  - Y Moisés dio ...
  rationale: El versículo describe una asignación histórica concreta bajo la mediación de Moisés. «Dio» conserva la neutralidad narrativa y evita añadir matices de concesión legal que el hebreo no explicita aquí.
  doctrine_reference: Distribución de la tierra en Números 32; mediación mosaica sin añadir causalidad doctrinal extra
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma en cuenta la revisión inglesa más reciente, que prefirió «in their territories» para בִּגְבֻלֹת. Se ha conservado la compresión del final del versículo mediante una construcción española natural, y se ha mantenido la alternativa de lectura en nota para reflejar la ambigüedad sintáctica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; en este versículo no aparece.
  - Se mantiene «Mesías» solo cuando el texto lo requiera; aquí no aplica.
  - «Hijos de» se conserva para reflejar el hebreo genealógico y tribal.
  - «Media tribu» se usa como equivalente idiomático de la construcción constructa de mitad de tribu.
  - La nota textual/lexical se ancla únicamente en el tramo final, donde la sintaxis hebrea es comprimida y admite más de una reconstrucción española.
