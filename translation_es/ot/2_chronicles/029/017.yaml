  yaml_path: translation/ot/2_chronicles/029/017.yaml
  text: They began to consecrate on the first day of the first month[a], and on the eighth day of the month they came to the vestibule of Yahweh. Then they consecrated the house of Yahweh in eight days, and on the sixteenth day of the first month they finished.
