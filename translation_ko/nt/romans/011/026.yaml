id: ROM.11.26
reference: Romans 11:26
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ οὕτως πᾶς Ἰσραὴλ σωθήσεται· καθὼς γέγραπται· Ἥξει ἐκ Σιὼν ὁ ⸀ῥυόμενος, ἀποστρέψει ἀσεβείας ἀπὸ Ἰακώβ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/026.yaml
  text: 'And in this way all Israel will be saved[a], just as it is written: “The Deliverer will come from Zion[c][b]; he will turn away ungodliness from Jacob.”'
  footnotes:
  - marker: a
    text: Or “And thus all Israel will be saved.” The Greek οὕτως can be rendered “thus/so,” but here it likely means “in this way,” pointing to the manner just described.
    reason: lexical_alternative
  - marker: b
    text: “All Israel” is a disputed phrase in interpretation; the translation preserves the Greek wording without deciding whether Paul means ethnic Israel as a whole, the believing remnant, or the full people of God.
    reason: alternative_reading
  - marker: c
    text: Some English versions render ἐκ Σιὼν as “out of Zion.”
    reason: lexical_alternative
translation:
  language: ko
  text: '그리하여 온 이스라엘이 구원받을 것입니다. 기록된 바와 같습니다: 「구원자가 시온에서 오실 것이며, 그분이 야곱에게서 경건치 않음을 돌이키실 것이다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「온 이스라엘」(πᾶς Ἰσραὴλ)의 해석은 (1) 마지막 때에 회복될 민족적 이스라엘 전체, (2) 「택하심을 받은 자」(11:7) 곧 영적 이스라엘, (3) 시대를 가로지르는 모든 신실한 자들의 합 등 여러 견해가 있다. 본문은 바울의 표현을 그대로 직역하여 다층적 의미를 보존하고, 해석은 독자에게 열어둔다.
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς Ἰσραὴλ σωθήσεται
  english_pob_choice: all Israel will be saved
  chosen_korean: 온 이스라엘이 구원받을 것입니다
  alternatives_korean:
  - 모든 이스라엘이 구원을 얻을 것입니다
  lexicon: BDAG
  rationale: 바울의 직접 표현을 그대로 직역한다.
- source_word: ῥυόμενος
  english_pob_choice: Deliverer
  chosen_korean: 구원자
  alternatives_korean:
  - 건지시는 분
  lexicon: BDAG
  rationale: ῥύομαι의 「구출자」 의미를 표준 한국어 신학 어휘로.
theological_decisions:
- issue: πᾶς Ἰσραὴλ σωθήσεται의 해석 — 민족적 이스라엘인가, 영적 이스라엘인가, 또는 다른 것인가
  chosen_reading: 직역 「온 이스라엘이 구원받을 것입니다」를 본문에 두고, 해석 옵션을 각주에 보존
  alternative_readings:
  - 마지막 때에 회복될 민족적 이스라엘
  - 택하심을 받은 영적 이스라엘
  - 역사 전체의 신실한 자들
  rationale: 바울의 표현은 의도적으로 다층적이다. 본문에서 어느 한 해석을 강제하면 본문의 무게를 약화시킨다. 직역하여 본문의 충격을 보존하고, 신학적 해석 옵션은 각주에 명시한다.
  doctrine_reference: 'DOCTRINE.md: 본문 우선; 해석은 독자에게 열어둠'
