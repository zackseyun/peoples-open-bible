translation:
  language: es
  text: Muchos oyeron mi instrucción en mi juventud, y adquirieron plata y oro por medio de mí[b].[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Recibid instrucción con una gran cantidad de plata, y adquirid mucho oro en ella». El testimonio hebreo aquí es declarativo, no imperativo.'
    reason: alternative_reading
  - marker: b
    text: También puede entenderse «por mí» o «en mí». El hebreo es compacto; «por medio de mí» expresa la mediación de la instrucción que el contexto sapiencial sugiere.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Muchas personas
  - Multitudes
  lexicon: HALOT
  rationale: El hebreo funciona como cuantificador directo; «Muchos» conserva brevedad y naturalidad en español, sin añadir una idea de multitud no exigida por el texto.
- source_word: שָׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - prestaron atención a
  lexicon: HALOT
  rationale: El verbo básico expresa recepción auditiva. «Oyeron» mantiene esa base y deja que el contexto sapiencial sugiera atención o docilidad sin forzarlo.
- source_word: לִמּוּדִי
  english_pob_choice: my instruction
  chosen_spanish: mi instrucción
  alternatives_spanish:
  - mi enseñanza
  - lo que enseñé
  lexicon: HALOT
  rationale: «Instrucción» reproduce bien el matiz didáctico y formal del sustantivo hebreo, y encaja con el registro sapiencial del pasaje.
- source_word: בִּנְעֻרוֹתָי
  english_pob_choice: in my youth
  chosen_spanish: en mi juventud
  alternatives_spanish:
  - cuando era joven
  - en mis años mozos
  lexicon: HALOT
  rationale: «En mi juventud» es la equivalencia más idiomática y digna en español, con la misma referencia temporal que el hebreo.
- source_word: וְכֶסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - dinero y oro
  - plata y riqueza
  lexicon: HALOT
  rationale: El hebreo nombra los metales preciosos directamente; «plata y oro» preserva la concreción y coincide con el paralelo griego ἀργύριον / χρυσός.
- source_word: תִּקְנוּ
  english_pob_choice: acquired
  chosen_spanish: adquirieron
  alternatives_spanish:
  - obtuvieron
  - ganaron
  - compraron
  lexicon: HALOT
  rationale: El verbo קנה suele significar adquirir u obtener. «Adquirieron» mantiene el valor general sin introducir una compra literal que el hebreo no expresa.
- source_word: בִּי
  english_pob_choice: by me
  chosen_spanish: por medio de mí
  alternatives_spanish:
  - por mí
  - por mi medio
  - en mí
  lexicon: HALOT
  rationale: 'La preposición con sufijo es ambigua; en contexto, el sentido mediativo es el más natural: otros llegaron a tener plata y oro mediante la instrucción del hablante. «Por medio de mí» explicita esa mediación sin perder la compacta relación del hebreo. Se conserva la posibilidad alternativa del griego «en ella», es decir, en la instrucción.'
theological_decisions:
- issue: Relación entre el hebreo declarativo y el paralelo griego imperativo en la segunda mitad del versículo
  english_pob_reading: The Hebrew witness is declarative ('Many heard my instruction in my youth, and they acquired silver and gold by me'), while the Greek parallel reads as an exhortation ('Receive instruction... and acquire much gold by it').
  chosen_spanish_reading: 'Texto principal declarativo según el hebreo: «Muchos oyeron mi instrucción en mi juventud, y adquirieron plata y oro por medio de mí»; el griego se refleja en nota como alternativa exhortativa.'
  alternative_spanish_readings:
  - «Recibid instrucción a cambio de una gran cantidad de plata, y adquirid mucho oro por medio de ella»
  - «Recibe instrucción... y adquiere mucho oro por ella»
  rationale: Dado que el testimonio hebreo conservado es alto y concordante, la redacción principal sigue su forma declarativa. Sin embargo, el paralelo griego preserva una tradición interpretativa importante, especialmente en el segundo colon, por lo que se registra como alternativa en nota sin desplazar el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está preservado; usar el paralelo griego como testimonio real y auditable sin anular el testimonio hebreo más directo.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir una forma cercana y formal para בִּי, evitando una paráfrasis excesiva. También conserva la tensión documentada entre el hebreo declarativo y el paralelo griego imperativo mediante nota, sin borrar ninguna de las dos lecturas.
  spanish_consistency_notes:
  - Se usa «instrucción» para לִמּוּדִי, manteniendo registro sapiencial y no sustituyéndolo por una formulación litúrgica.
  - Se traduce בִּי con valor mediativo («por medio de mí») para no confundir la ambigüedad del hebreo, y se preserva la alternativa locativa («en mí») en nota.
  - «Plata y oro» se mantiene literalmente para conservar la imaginería concreta del hebreo y del griego paralelo.
  - El texto principal evita importar el imperativo griego al cuerpo principal, porque el hebreo conservado es declarativo; la nota documenta la diferencia textual.
