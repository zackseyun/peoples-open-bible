revisions:
- from: 'Entonces Abram dijo a Lot[a]: «Por favor, no haya riña entre tú y yo, ni entre mis pastores y los tuyos[b], porque somos hermanos».'
  to: 'Entonces Abram dijo a Lot[a]: «Por favor, que no haya riña entre tú y yo, ni entre mis cuidadores de ganado y los tuyos, porque somos hermanos».'
  rationale: Se ajusta la petición a un español más natural («que no haya»), se reemplaza «pastores» por «cuidadores de ganado» para reflejar mejor el valor contextual de רֹעַי...רֹעֶיךָ según la justificación POB, y se elimina la nota [b] porque preservaba una redacción inglesa anterior ya descartada. Se mantiene «hermanos» en el texto principal con una nota que aclara el sentido amplio de parentesco, en línea con la decisión teológica y léxica auditada.
