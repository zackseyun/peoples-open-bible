translation:
  language: es
  text: Bezer en el yermo[a], en la tierra de la meseta, para el rubenita; y Ramot en Galaad para el gadita; y Golán en Basán para el manasita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la tierra de la planicie». El término hebreo se refiere a un país nivelado o de meseta; aquí se traduce «meseta» para reflejar con mayor precisión las tierras altas transjordanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּצֶר
  english_pob_choice: Bezer
  chosen_spanish: Bezer
  alternatives_spanish:
  - Bezer
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera en español para conservar la forma del topónimo y su trazabilidad con el hebreo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: מִדְבָּר puede designar zona despoblada, abierta o esteparia. En español, 'desierto' comunica de manera natural el entorno geográfico sin forzar una traducción técnica excesiva.
- source_word: בְּאֶרֶץ הַמִּישֹׁר
  english_pob_choice: in the land of the tableland
  chosen_spanish: en la tierra de la meseta
  alternatives_spanish:
  - en la tierra de la meseta
  - en la tierra del llano
  - en la tierra de la planicie
  lexicon: HALOT
  rationale: מִישֹׁר refiere a terreno nivelado o meseta. 'Meseta' refleja bien el relieve transjordano y evita que 'llano' o 'planicie' suenen geográficamente imprecisos en español.
- source_word: לָרֻאוּבֵנִי
  english_pob_choice: for the Reubenite
  chosen_spanish: para el rubenita
  alternatives_spanish:
  - para los rubenitas
  - para la tribu de Rubén
  lexicon: HALOT
  rationale: El gentilicio singular hebreo funciona distributivamente en contexto tribal. 'Rubenita' preserva esa forma y mantiene el paralelismo con los otros dos gentilicios del verso.
- source_word: רָאמֹת
  english_pob_choice: Ramoth
  chosen_spanish: Ramot
  alternatives_spanish:
  - Ramot
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera. Se omite la terminación -h final por adaptación habitual al español bíblico.
- source_word: בַּגִּלְעָד
  english_pob_choice: in Gilead
  chosen_spanish: en Galaad
  alternatives_spanish:
  - en Galaad
  - en Gilead
  lexicon: HALOT
  rationale: '''Galaad'' es la forma tradicional y entendible en español para el topónimo. Conserva la referencia regional sin introducir una forma híbrida.'
- source_word: לַגָּדִי
  english_pob_choice: for the Gadite
  chosen_spanish: para el gadita
  alternatives_spanish:
  - para los gaditas
  - para la tribu de Gad
  lexicon: HALOT
  rationale: Se mantiene el gentilicio singular distributivo del hebreo, en paralelo con 'rubenita' y 'manasita'.
- source_word: גּוֹלָן
  english_pob_choice: Golan
  chosen_spanish: Golán
  alternatives_spanish:
  - Golán
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera con acento gráfico español para respetar la pronunciación natural.
- source_word: בַּבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en Basán
  - en Bashán
  lexicon: HALOT
  rationale: '''Basán'' es la forma española tradicional y transparente del topónimo; se mantiene para lectura eclesial natural.'
- source_word: לַמְנַשִּׁי
  english_pob_choice: for the Manassite
  chosen_spanish: para el manasita
  alternatives_spanish:
  - para los manasitas
  - para la tribu de Manasés
  lexicon: HALOT
  rationale: El gentilicio singular hebreo se conserva distributivamente, como en las otras dos asignaciones tribales.
- source_word: אֶת ... וְאֶת ... וְאֶת
  english_pob_choice: '[not separately translated; reflected by direct listing with ''and'']'
  chosen_spanish: '[no traducido de forma separada; reflejado por la coordinación con ''y'']'
  alternatives_spanish:
  - —
  lexicon: Hebrew grammar
  rationale: El marcador de objeto directo no tiene equivalente directo en español. Su función queda representada por la enumeración coordinada de las tres ciudades.
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete fuente hebreo y el auditorio inglés de POB, manteniendo la estructura triádica, los nombres propios transliterados y el valor geográfico de מִישֹׁר sin calcar mecánicamente el inglés.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de los tres gentilicios singulares: rubenita / gadita / manasita.'
  - 'Se usa un español bíblico moderno y transparente: desierto, meseta, Galaad, Basán.'
  - Los topónimos se transliteran o adaptan según uso español consolidado, sin sustituirlos por equivalentes interpretativos.
