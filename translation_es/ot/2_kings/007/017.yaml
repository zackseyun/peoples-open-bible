revisions:
- from: Entonces el rey había nombrado al oficial[a] sobre cuya mano se apoyaba para que estuviera a cargo de la puerta; pero el pueblo lo atropelló en la puerta, y murió, tal como había hablado el hombre de Dios, cuando el rey descendió a él.
  to: Entonces el rey había puesto al oficial[a], sobre cuya mano se apoyaba[b], a cargo de la puerta; pero el pueblo lo pisoteó en la puerta, y murió, tal como lo había dicho el hombre de Dios, el que habló cuando el rey descendió adonde él estaba.
  rationale: Se corrige «atropelló» a «pisoteó» para reflejar con precisión רמס, se rehace «descendió a él» como «descendió adonde él estaba» para un español natural y fiel, y se añade la nota cultural que el rastro inglés ya documenta para el hebraísmo «sobre cuya mano se apoyaba». También se ajusta ligeramente la cláusula inicial y la fórmula final para mayor fluidez y mejor reflejo del énfasis de cumplimiento profético.
  reviewer_model: gpt-5.4
