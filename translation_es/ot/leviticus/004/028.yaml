source:
  edition: WLC
  text: א֚וֹ הוֹדַ֣ע אֵלָ֔י/ו חַטָּאת֖/וֹ אֲשֶׁ֣ר חָטָ֑א וְ/הֵבִ֨יא קָרְבָּנ֜/וֹ שְׂעִירַ֤ת עִזִּים֙ תְּמִימָ֣ה נְקֵבָ֔ה עַל חַטָּאת֖/וֹ אֲשֶׁ֥ר חָטָֽא־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/028.yaml
  text: Or if the sin that he has committed is made known to him[b][a], then he shall bring as his offering for the sin that he has committed a female goat without blemish.
  footnotes:
  - marker: a
    text: Or, 'it becomes known to him' or 'he is informed of his sin.' The Hebrew passive can describe either personal realization or the sin being reported to him.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall bring as his offering a female goat without blemish'.
    reason: previous_rendering
  ai_draft:
