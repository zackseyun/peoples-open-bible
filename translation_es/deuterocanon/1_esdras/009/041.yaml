base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/009/041.yaml
  text: And he was reading in the broad space before the temple gate from dawn until midday in the presence of the men and the women[b][a]; and all of them gave their attention to the law.
  footnotes:
  - marker: a
    text: Or 'in the open square before the temple gate.' The Greek describes a broad or spacious area; the Hebrew parallel in Nehemiah 8 uses wording commonly rendered 'wooden platform' in a different but related scene, so the exact spatial nuance here should not be over-pressed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they gave all the mind to the law,' that is, they paid full attention.
    reason: lexical_alternative
