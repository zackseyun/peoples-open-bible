translation:
  language: es
  text: Y reunió muchos cautivos, y tomó el control de Gezer y de Bet-zur y de la ciudadela[a], y quitó de ella las impurezas, y no había quien se le opusiera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Acra», la fortaleza amurallada específica de Jerusalén.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - recogió
  lexicon: LSJ
  rationale: «Reunió» comunica la acción de traer juntos el resultado de la conquista sin volverla demasiado literal ni introducir matices ajenos. En español suena natural y mantiene la concreción del aoristo.
- source_word: αἰχμαλωσίαν πολλήν
  english_pob_choice: many captives
  chosen_spanish: muchos cautivos
  alternatives_spanish:
  - una gran cantidad de cautivos
  - muchos prisioneros
  lexicon: LSJ
  rationale: El griego puede sugerir captura como estado, pero aquí el contexto apunta a personas hechas cautivas. «Muchos cautivos» preserva esa referencia personal y sigue de cerca la revisión inglesa, evitando paraphrasear como «prisioneros de guerra».
- source_word: ἐκυρίευσεν
  english_pob_choice: took control of
  chosen_spanish: tomó control de
  alternatives_spanish:
  - se adueñó de
  - se hizo dueño de
  - capturó
  lexicon: LSJ
  rationale: El verbo expresa ejercer dominio o control sobre un lugar. «Tomó control de» reproduce bien la fuerza político-militar del texto sin estrecharlo a «capturó», que podría sugerir solo la toma inicial.
- source_word: Γαζάρων
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  alternatives_spanish:
  - Gazara
  - Gazer
  lexicon: LSJ
  rationale: Se conserva la forma usual en español para el topónimo, que es reconocible y fiel al lugar histórico.
- source_word: Βαιθσούρων
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-zur
  alternatives_spanish:
  - Beth-zur
  - Betzur
  lexicon: LSJ
  rationale: «Bet-zur» es una transliteración clara y natural en español; mantiene la identidad del lugar sin cargarlo con una grafía excesivamente inglesa.
- source_word: τῆς ἄκρας
  english_pob_choice: the citadel / Or, 'the Acra'
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - el Acra
  - la fortaleza
  lexicon: LSJ
  rationale: La opción principal traduce el sentido común de ἄκρα como «ciudadela», que es transparente en español. Se conserva la posibilidad histórica de que se trate del Acra en la nota, siguiendo la tensión documentada por el audit trail inglés.
- source_word: ἐξῆρεν
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - sacó
  - eliminó
  lexicon: LSJ
  rationale: «Quitó» es idiomático en español y expresa la acción de retirar algo de un lugar. En este contexto funciona bien con el complemento siguiente y evita una traducción demasiado técnica.
- source_word: τὰς ἀκαθαρσίας
  english_pob_choice: the uncleanness
  chosen_spanish: las impurezas
  alternatives_spanish:
  - las inmundicias
  - las contaminaciones
  - las cosas impuras
  lexicon: LSJ
  rationale: El plural griego conserva una carga cultual o moral. «Las impurezas» mantiene esa resonancia en español, de modo más natural que un calco como «las uncleannesses», pero sin borrar el matiz religioso de limpieza/defilement.
- source_word: ἐξ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - de esa ciudadela
  - de allí mismo
  lexicon: LSJ
  rationale: El pronombre remite a ἄκρα, que en español es femenino. «De ella» conserva la referencia interna con claridad y sin añadir información.
- source_word: ὁ ἀντικείμενος αὐτῷ
  english_pob_choice: no one opposing him
  chosen_spanish: no había quien se le opusiera
  alternatives_spanish:
  - nadie le hacía frente
  - no había adversario contra él
  lexicon: LSJ
  rationale: La construcción impersonal expresa con naturalidad la ausencia de oponente activo. «Se le opusiera» preserva el sentido de resistencia/oposición continua que encierra el participio.
theological_decisions:
- issue: Sentido cultual de ἀκαθαρσίαι
  english_pob_reading: 'Rendered with cultically marked language: ''uncleannesses.'''
  chosen_spanish_reading: «impurezas», manteniendo un matiz cultual y de purificación.
  alternative_spanish_readings:
  - inmundicias
  - contaminaciones
  rationale: En 1 Macabeos la limpieza de la ciudadela sugiere una dimensión religiosa, no solo higiénica o militar. «Impurezas» preserva ese valor sin forzar una terminología excesivamente arcaica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Identidad de τῆς ἄκρας
  english_pob_reading: Translated in the main text as 'the citadel' with a note for 'the Acra.'
  chosen_spanish_reading: «la ciudadela» en el texto principal, con posibilidad de «el Acra» en nota.
  alternative_spanish_readings:
  - el Acra
  - la fortaleza
  rationale: El griego permite leer ἄκρα como nombre común; por eso el texto principal da el sentido transparente. Pero la referencia histórica al Acra de Jerusalén no debe borrarse, así que se conserva en la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una formulación más directa para αἰχμαλωσίαν πολλήν y una forma más natural para τὰς ἀκαθαρσίας. Por eso se eligió «muchos cautivos» y «las impurezas», manteniendo la tensión cultual sin sobrerrefinarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no la contiene.
  - 'Se conserva una terminología sobria y bíblica, pero en español natural: «tomó control de», «ciudadela», «impurezas».'
  - No se usa «Cristo» ni «Señor» porque el texto no lo requiere.
  - La nota a pie de página marca la alternativa histórica «Acra» sin desplazar el sentido principal del verso.
