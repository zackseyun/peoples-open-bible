translation:
  language: es
  text: Pero los malvados serán cortados del país[a], y los traicioneros serán arrancados[b] de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de la tierra'. El hebreo אֶרֶץ puede significar 'tierra' o 'país/territorio'; aquí 'país' encaja mejor con el contraste del versículo anterior, donde los rectos permanecen en él.
    reason: lexical_alternative
  - marker: b
    text: O 'serán desarraigados'. El verbo hebreo comunica una remoción forzosa, con imagen de arranque o desarraigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְשָׁעִים / רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: El participio sustantivado describe a personas caracterizadas por maldad moral. 'Malvados' comunica bien la clase de personas y suena natural en español bíblico contemporáneo; 'impíos' podría sonar más religioso y menos transparente para la fuerza lexical.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del país
  - de la tierra habitada
  lexicon: HALOT
  rationale: En español, 'tierra' conserva la amplitud semántica de אֶרֶץ y permite la misma tensión que el audit trail inglés señaló entre 'land' y 'earth'. Se prefiere 'tierra' porque evita forzar una lectura exclusivamente territorial cuando el hebreo puede abarcar más, aunque el contexto inmediato siga favoreciendo el sentido de tierra/territorio.
- source_word: יִכָּרֵתוּ
  english_pob_choice: will be cut off
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán exterminados
  - serán eliminados
  - serán arrancados
  lexicon: HALOT
  rationale: La pasiva expresa la remoción judicial y violenta del verbo כרת. 'Serán cortados' mantiene el valor metafórico y forense, sin añadir una paráfrasis más fuerte que el hebreo.
- source_word: בוֹגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: los traicioneros
  alternatives_spanish:
  - los infieles
  - los que obran con traición
  - los pérfidos
  lexicon: HALOT
  rationale: El participio denota conducta habitual de traición o deslealtad. 'Traicioneros' es una equivalencia natural en español y preserva el rasgo moral sin expandirlo a una explicación.
- source_word: יִסְּחוּ
  english_pob_choice: will be uprooted
  chosen_spanish: serán arrancados
  alternatives_spanish:
  - serán desarraigados
  - serán desarraigados de raíz
  - serán uprootados
  lexicon: HALOT
  rationale: El verbo נסח tiene la idea de ser removido con violencia, y el POB inglés revisó la imagen hacia 'uprooted' para conservar la imaginería de raíz/arranque. En español, 'arrancados' reproduce de forma natural esa fuerza de remoción y permite una lectura más viva que un calco como 'desarraigados', que en este contexto podría sugerir demasiado explícitamente la metáfora vegetal.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ella
  - de allí
  - de esa
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a אֶרֶץ, tratado como femenino en español. 'De ella' es la forma más natural y clara para mantener la referencia al sustantivo antecedente.
- source_word: וְ
  english_pob_choice: But ... and ...
  chosen_spanish: Pero ... y ...
  alternatives_spanish:
  - Y ... y ...
  - Mas ... y ...
  lexicon: HALOT
  rationale: El valor adversativo inicial se mantiene con 'Pero', siguiendo el contraste con el versículo anterior. La segunda conjunción queda como coordinación simple con 'y'.
theological_decisions:
- issue: Sentido de אֶרֶץ en el paralelismo con el v. 21
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - tierra prometida
  - mundo
  rationale: El contexto inmediato contrasta permanecer en la 'tierra' con ser removidos de ella. En español, 'tierra' conserva ese contraste sin obligar a una elección entre 'territorio' y 'mundo', y evita una lectura doctrinal más amplia que no está explícita en el versículo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió 'uprooted' sobre 'torn away' para reflejar mejor la fuerza del verbo y mantener la imaginería de remoción con raíz. La versión española adopta 'arrancados' para expresar esa misma intensidad de forma idiomática.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica en este versículo; no hay término divino explícito.
  - '''Tierra'' se usa de modo consistente con el contexto sapiencial y con el contraste del versículo precedente.'
  - Se evita 'impíos' como término dominante para no cargar el verso con un registro más eclesiástico que el hebreo.
  - Se conserva el paralelismo verbal pasivo en ambas cláusulas para respetar la estructura del original.
