translation:
  language: es
  text: Y acercarás a sus hijos, y los vestirás con túnicas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los presentarás’. El verbo hebreo puede llevar el sentido de traer a alguien al frente para una presentación ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Entonces
  lexicon: HALOT
  rationale: La conjunción inicial marca continuidad con el mandato anterior; en español, ‘Y’ reproduce bien la secuencia sin añadir énfasis innecesario.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo designa específicamente a los descendientes varones de Aarón; en español, ‘sus hijos’ es natural y, en este contexto sacerdotal, se entiende como masculino por referencia inmediata. Se evita ‘hijos varones’ por sobreexplicación.
- source_word: תַּקְרִיב
  english_pob_choice: you shall bring near
  chosen_spanish: harás que se acerquen
  alternatives_spanish:
  - presentarás
  - harás que vengan delante
  lexicon: HALOT
  rationale: El verbo Hifil de קרב conserva el valor ritual de ‘hacer acercar/presentar’. En español, ‘harás que se acerquen’ mantiene la idea de presentación cultual sin sonar demasiado rígido.
- source_word: וְהִלְבַּשְׁתָּם
  english_pob_choice: and clothe them
  chosen_spanish: y los vestirás
  alternatives_spanish:
  - y los revestirás
  - y les pondrás vestiduras
  lexicon: HALOT
  rationale: ‘Vestir’ expresa con naturalidad la acción de poner prendas. ‘Revestir’ podría sonar más solemne, pero ‘los vestirás’ es claro y fiel al mandato ritual.
- source_word: כֻּתֳּנֹת
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - vestiduras
  - camisas largas
  lexicon: HALOT
  rationale: ‘Túnicas’ es el equivalente estándar y preciso para el tipo de prenda sacerdotal aludida por כֻּתֳּנֹת. Evita la ambigüedad de ‘vestiduras’, que es más general.
translation_notes:
  revision_awareness: 'El texto hebreo y el control inglés muestran una lectura estable: mandato de presentar a los hijos de Aarón y vestirlos con túnicas. No se observaron revisiones aplicadas en el paquete auditado; la redacción española sigue esa misma estructura y conserva la alternativa léxica de ‘presentar’ mediante nota.'
  spanish_consistency_notes:
  - Se mantiene la secuencia imperativa narrativa con futuro exhortativo (‘harás…’, ‘vestirás’), coherente con el estilo bíblico español contemporáneo.
  - Se conserva ‘túnicas’ como término técnico de vestimenta sacerdotal, evitando equivalencias más vagas.
  - La nota al pie recoge la ambigüedad cultual del verbo sin debilitar la traducción principal.
