translation:
  language: es
  text: Los senderos de su camino se desvían[a]; suben al yermo y perecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las rutas de caravanas se desvían; suben al yermo y desaparecen». El hebreo es difícil, y algunos entienden que el versículo habla de caravanas más que de los senderos o cauces mismos.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִלָּפְתוּ
  english_pob_choice: turn aside
  chosen_spanish: se desvían
  alternatives_spanish:
  - se apartan
  - giran
  - se tuercen
  lexicon: HALOT
  rationale: El nifal expresa un movimiento que se aparta o se desvía del curso esperado. «Se desvían» comunica la idea sin añadir una imagen demasiado interpretativa.
- source_word: אָרְחוֹת
  english_pob_choice: paths
  chosen_spanish: senderos
  alternatives_spanish:
  - caminos
  - huellas
  - rutas
  lexicon: HALOT
  rationale: אָרְחוֹת puede referirse a rutas o huellas de paso. «Senderos» suena natural en español y conserva el valor de trayecto visible.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su vía
  - su ruta
  - su senda
  lexicon: HALOT
  rationale: Se conserva la referencia singular colectiva del hebreo con «su camino», más fluido en español que una repetición literal de «sus caminos».
- source_word: יַעֲלוּ
  english_pob_choice: go up
  chosen_spanish: suben
  alternatives_spanish:
  - ascienden
  - van hacia arriba
  - suben hacia
  lexicon: HALOT
  rationale: El valor básico de עלה es ascender o subir. «Suben» mantiene la imagen concreta y el movimiento direccional.
- source_word: בַתֹּהוּ
  english_pob_choice: into wasteland
  chosen_spanish: por la desolación
  alternatives_spanish:
  - en la desolación
  - hacia el desierto
  - en el vacío
  lexicon: HALOT
  rationale: תֹהוּ denota vacío, desolación o tierra yerma. «Desolación» conserva el campo semántico sin imponer un sustantivo geográfico que el hebreo no exige.
- source_word: וְיֹאבֵדוּ
  english_pob_choice: and perish
  chosen_spanish: y perecen
  alternatives_spanish:
  - y se pierden
  - y desaparecen
  - y se arruinan
  lexicon: HALOT
  rationale: אבד en qal puede significar perecer o perderse. «Perecen» mantiene la fuerza del final del proceso y evita suavizar el resultado.
translation_notes:
  revision_awareness: Seguí el último pasaje auditado del inglés, que optó por una traducción más directa de יִלָּפְתוּ como ‘turn aside’ en lugar de una paráfrasis más libre. En español, por fidelidad y naturalidad, se expresó con «se desvían» y se mantuvo la progresión verbal de ascenso y desaparición.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando el hebreo lo exija; aquí no aparece el nombre divino.
  - Se evitó «Cristo», «SEÑOR» y otras equivalencias no pertinentes al versículo.
  - La imagen difícil del hebreo se preservó con una nota alternativa, sin borrar la ambigüedad entre senderos, caminos o caravanas.
