translation:
  language: es
  text: 'Porque yo soy Yahvé, tu Dios, que sostiene tu mano derecha, que te dice: «No temas; yo te ayudaré[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice formalmente: «te ayudé» o «te he ayudado»; aquí se traduce con futuro para expresar la fuerza de promesa en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio divino, no un título. En español del POB se mantiene la forma transliterada 'Yahvé' para preservar el nombre del pacto, siguiendo la decisión documental del proyecto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  - tu divino
  lexicon: HALOT
  rationale: La construcción posesiva directa expresa relación de pacto y trato personal sin añadir matices ajenos al hebreo.
- source_word: מַחֲזִיק יְמִינֶךָ
  english_pob_choice: who takes hold of your right hand
  chosen_spanish: que sostiene tu mano derecha
  alternatives_spanish:
  - que toma tu mano derecha
  - que se aferra a tu mano derecha
  - que sostiene tu diestra
  lexicon: HALOT
  rationale: El participio comunica una acción continua de apoyo firme. 'Sostiene' conserva la imagen corporal y la idea de sostener/afirmar; 'tu mano derecha' evita un arcaísmo innecesario y es fiel al hebreo.
- source_word: הָאֹמֵר לְךָ
  english_pob_choice: who says to you
  chosen_spanish: que te dice
  alternatives_spanish:
  - que te está diciendo
  - que dice a ti
  lexicon: HALOT
  rationale: El participio funciona como descripción continua del actuar de Yahvé. 'Que te dice' mantiene el encadenamiento natural en español sin perder el valor participial.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas,
  lexicon: HALOT
  rationale: Es la forma imperativa negativa idiomática en español bíblico y moderno. Conserva la concisión profética del hebreo.
- source_word: עֲזַרְתִּיךָ
  english_pob_choice: I will help you
  chosen_spanish: yo te ayudaré
  alternatives_spanish:
  - yo te he ayudado
  - yo te ayudo
  lexicon: HALOT
  rationale: Aunque el hebreo está morfológicamente en perfecto, en esta fórmula de aliento funciona con fuerza promissoria. El futuro español expresa mejor esa promesa sin borrar la observación textual.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre revelado de Dios en lugar de sustituirlo por un título. Esto sigue la terminología POB y evita ocultar el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor aspectual de עֲזַרְתִּיךָ en un contexto de consolación
  english_pob_reading: 'future-promissory sense: ''I will help you'''
  chosen_spanish_reading: 'sentido promisor: ''yo te ayudaré'''
  alternative_spanish_readings:
  - '''yo te he ayudado'''
  - '''yo te ayudo'''
  rationale: El hebreo admite lectura perfecta/pasada formal, pero el contexto de exhortación y ánimo exige en español una promesa clara. Se conserva la tensión textual mediante una nota, sin forzar una lectura meramente pasada.
  doctrine_reference: 'DOCTRINE.md: verbal aspect and prophetic promise'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el pasaje auditado de mayor acuerdo, sin observaciones pendientes en las pasadas de revisión.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יְהוָה en el texto principal.
  - Se conserva la imagen concreta de la mano derecha sin suavizarla a una abstracción.
  - El futuro español en 'yo te ayudaré' refleja la fuerza promissoria del perfecto hebreo sin negar la nota textual.
  - El registro es reverente y claro, apto para lectura pública e iglesia.
