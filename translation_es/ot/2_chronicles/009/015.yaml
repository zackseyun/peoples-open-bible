translation:
  language: es
  text: El rey Salomón hizo doscientos grandes escudos de oro batido[a]; seiscientos siclos de oro batido se usaban para cada escudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «seiscientos de oro batido subían sobre el un escudo». El hebreo implica una medida de peso; «siclos» se añade en español para mayor claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: עשה es el verbo básico 'hacer'. En español, 'hizo' conserva la sencillez narrativa y el valor de producción artesanal del contexto.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - Salomón, el rey
  - el rey, Salomón
  lexicon: HALOT
  rationale: El título real antepuesto se expresa con naturalidad como 'el rey Salomón', manteniendo el orden apposicional del hebreo sin sonar forzado.
- source_word: מָאתַיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - '200'
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: צִנָּה
  english_pob_choice: large shields
  chosen_spanish: grandes escudos
  alternatives_spanish:
  - escudos grandes
  - escudos
  lexicon: HALOT
  rationale: צִנָּה denota un escudo grande o de cuerpo; 'grandes escudos' conserva la distinción léxica sin añadir un tecnicismo menos transparente que en español podría requerir nota.
- source_word: זָהָב שָׁחוּט
  english_pob_choice: beaten gold
  chosen_spanish: oro batido
  alternatives_spanish:
  - oro martillado
  - oro trabajado
  lexicon: HALOT
  rationale: שָׁחוּט describe oro trabajado por golpeado o batido. 'Oro batido' es una equivalencia breve, tradicional y fiel, sin desplazar el sentido hacia un acabado distinto.
- source_word: שֵׁשׁ מֵאוֹת
  english_pob_choice: six hundred
  chosen_spanish: seiscientos
  alternatives_spanish:
  - '600'
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: יַעֲלֶה עַל
  english_pob_choice: went onto
  chosen_spanish: iban sobre
  alternatives_spanish:
  - subían sobre
  - se aplicaban sobre
  - iban aplicados sobre
  lexicon: HALOT
  rationale: La construcción hebrea indica que la cantidad de oro se empleaba sobre cada escudo. 'Iban sobre' conserva el movimiento/ubicación idiomático del hebreo y evita explicitar más de la cuenta con 'cubrían' o 'se aplicaban'.
- source_word: הַצִּנָּה הָאֶחָת
  english_pob_choice: each shield
  chosen_spanish: cada escudo
  alternatives_spanish:
  - el único escudo
  - un escudo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'el uno escudo', en distribución numérica la función es distributiva. 'Cada escudo' expresa con claridad el valor por unidad que el inglés POB resolvió con 'each shield'.
- source_word: '[implied unit after six hundred]'
  english_pob_choice: shekels
  chosen_spanish: siclos
  alternatives_spanish:
  - shéqueles
  - pesos
  lexicon: HALOT
  rationale: El hebreo no repite la unidad, pero el valor implícito es de peso; 'siclos' es la unidad histórica estándar en español bíblico y conserva la aclaración auditable hecha en la traducción inglesa.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo y con la solución inglesa auditada; no se detectan revisiones aplicadas en el expediente inglés. La principal decisión en español es hacer explícita la unidad implícita de peso ('siclos') y mantener la imagen distributiva con 'iban sobre'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'oro batido' como equivalente estable de זָהָב שָׁחוּט, evitando 'martillado' por estilo más técnico.
  - '''Cada escudo'' se eligió por claridad distributiva; la nota conserva la lectura literal hebrea.'
  - '''Siclos'' se usa como unidad implícita de peso, en continuidad con la decisión inglesa de suplir ''shekels'' para claridad.'
