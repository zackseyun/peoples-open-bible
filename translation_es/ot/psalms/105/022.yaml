translation:
  language: es
  text: para sujetar a sus príncipes según su deseo[a], y para enseñar sabiduría a sus ancianos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'para atar a sus príncipes con/en su nefesh'; el hebreo usa una expresión idiomática que aquí significa 'según su deseo' o 'a su gusto', no una referencia literal al 'alma'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''hacer sabios a sus ancianos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶאְסֹר
  english_pob_choice: to bind
  chosen_spanish: poner bajo su autoridad
  alternatives_spanish:
  - atar
  - encadenar
  - restringir
  lexicon: HALOT
  rationale: El hebreo infinitivo de אסר, en este contexto de administración real, no describe atar literalmente sino ejercer dominio o restricción sobre oficiales. En español, 'poner bajo su autoridad' comunica la fuerza funcional sin introducir una imagen corporal demasiado literal que sonaría extraña.
- source_word: שָׂרָיו
  english_pob_choice: his princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus oficiales
  - sus gobernantes
  - sus jefes
  lexicon: HALOT
  rationale: שַׂר nombra a un príncipe, jefe o funcionario de alto rango. 'Príncipes' conserva el matiz cortesano y jerárquico que también preserva la POB en inglés.
- source_word: בְּנַפְשׁוֹ
  english_pob_choice: at his pleasure
  chosen_spanish: bajo su autoridad
  alternatives_spanish:
  - según su deseo
  - a su gusto
  - con su voluntad
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'con/en su nefesh', pero el uso idiomático apunta a deseo, voluntad o placer. La POB inglés opta por 'at his pleasure'; en español, 'bajo su autoridad' expresa bien el resultado práctico del dominio de José y evita un calco como 'en su alma'.
- source_word: וּזְקֵנָיו
  english_pob_choice: and his elders
  chosen_spanish: y sus ancianos
  alternatives_spanish:
  - y sus mayores
  - y sus viejos
  - y sus líderes ancianos
  lexicon: HALOT
  rationale: זָקֵן en contextos de gobierno puede referirse a ancianos como líderes. 'Ancianos' es la forma más directa y comprensible en español para ese cargo o condición de autoridad.
- source_word: יְחַכֵּם
  english_pob_choice: to teach his elders wisdom
  chosen_spanish: enseñar sabiduría a sus ancianos
  alternatives_spanish:
  - hacer sabios a sus ancianos
  - instruir a sus ancianos
  - volver sabios a sus ancianos
  lexicon: HALOT
  rationale: 'El piel de חכם puede ser causativo: ''hacer sabio'' o ''enseñar sabiduría''. La POB inglés eligió una formulación instructiva; el español mantiene esa lectura con una construcción natural y fiel.'
translation_notes:
  revision_awareness: El texto sigue de cerca la decisión inglesa establecida y no requiere revisión sustantiva; el ajuste principal es trasladar al español la idiomaticidad de בְּנַפְשׁוֹ sin perder la idea de autoridad ejercida por José.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - '''Príncipes'' y ''ancianos'' conservan el tono cortesano y de liderazgo del original.'
  - La nota[a] preserva la tensión entre la literalidad hebrea y el sentido idiomático reconocido en la POB inglesa.
