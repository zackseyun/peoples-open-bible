  glossary_alignment: 'No hay conflicto con los términos del proyecto: «Dios», «ley», «andar» y la nota sobre «torá» están alineados. La única mejora recomendada es contextual: para שׁמר con «pacto», «cumplieron» funciona mejor en español que «guardaron», aunque ambos son posibles.'
