    issue: «sentado en su trabajo» es poco idiomático en español bíblico-natural.
    rationale: Aunque calca aceptablemente «sitting at his work», en español suena más natural «sentado junto a su trabajo» o «sentado en su labor». La revisión mejora legibilidad sin perder la imagen concreta.
  - severity: medium
    issue: «está continuamente pendiente de su labor» debilita el matiz de preocupación constante de ἐν μερίμνῃ κεῖται διὰ παντός.
    rationale: «Pendiente de» puede indicar mera atención o supervisión. El griego expresa cuidado/preocupación sostenida; «está continuamente preocupado por su trabajo» o equivalente comunica mejor ese valor semántico, en línea con el ajuste inglés a «concerned».
  revised_spanish_text: Así el alfarero[a], sentado junto a su trabajo y haciendo girar la rueda con sus pies, está continuamente preocupado por su trabajo, y toda su labor está numerada.
