review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: כָּל = alcance inclusivo, צִפּוֹר = ave/pájaro, טְהֹרָה = limpia en sentido dietario-ritual, תֹּאכֵלוּ = permiso legal. La estructura y el sentido general están preservados.'
  spanish_quality_summary: 'La redacción principal es clara y natural. Sin embargo, la nota al pie en español contiene un error gramatical importante: «Todas las aves limpias podrán comer» significa que las aves comerán, no que el pueblo puede comerlas. También conviene ajustar el tratamiento de segunda persona para corresponder mejor al hebreo y al tono directo de la ley.'
  glossary_alignment: No hay términos del glosario principal en disputa. «Ave limpia» y la noción de permiso legal concuerdan con las decisiones auditadas. El único desajuste real está en la formulación alternativa de la nota y, menormente, en preferir una segunda persona directa más fiel al hebreo.
  issues:
  - severity: medium
    issue: 'La nota al pie ofrece una alternativa incorrecta: «Todas las aves limpias podrán comer».'
    rationale: 'Esa frase cambia el sujeto semántico: en español significa que las aves podrán comer, no que los destinatarios podrán comer todas las aves limpias. Distorsiona el sentido del texto fuente y de la nota inglesa.'
  - severity: low
    issue: «Pueden comer» usa tercera persona plural/ustedes implícito, mientras el hebreo es segunda persona plural directa.
    rationale: En español latinoamericano puede funcionar, pero «podrán comer» o «pueden comer ustedes» refleja más claramente la dirección directa legal. Dado el registro bíblico-digno, «podrán comer» encaja mejor aquí y armoniza con la nota formal.
  revised_spanish_text: Podrán comer cualquier ave limpia[a].
