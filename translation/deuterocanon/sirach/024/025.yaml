lexical_decisions:
- source_word: ὁ πιπλῶν
  chosen: It overflows with
  alternatives:
  - It fills with
  - which overflows with
  lexicon: LSJ
  rationale: In the river imagery of this verse, 'overflows with' better captures the active abundance of the Law than the more ambiguous 'fills with'.
- source_word: ὡς Φισὼν
  chosen: like the Pishon
  alternatives:
  - like Pishon
  lexicon: LSJ
  rationale: English river names normally take the definite article. 'The Pishon' is the natural English form.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering of σοφία; in Sirach 24 Wisdom is personified and central to the chapter, so consistency strongly favors 'wisdom.'
- source_word: ὡς Τίγρις
  chosen: like the Tigris
  lexicon: LSJ
  rationale: Proper river name; standard English transliteration is 'Tigris.'
- source_word: ἐν ἡμέραις νέων
  chosen: in the days of the new harvest
  alternatives:
  - in the days of firstfruits
  - at the time of new crops
  lexicon: LSJ
  rationale: νέων refers broadly to the new crops or new harvest, not specifically to the cultic category of firstfruits.
