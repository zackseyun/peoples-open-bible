translation:
  language: es
  text: Lo profundo llama a lo profundo al sonido de tus cascadas[a]; todas tus rompientes y tus olas han pasado sobre mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus cataratas»; versiones más antiguas también tienen «tus mangas de agua».
    reason: lexical_alternative
  - marker: b
    text: O «todas tus olas rompientes y tus olas han barrido sobre mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהוֹם ... תְּהוֹם
  english_pob_choice: Deep ... deep
  chosen_spanish: Lo profundo ... lo profundo
  alternatives_spanish:
  - el abismo ... el abismo
  - la profundidad ... la profundidad
  lexicon: HALOT
  rationale: תְּהוֹם designa las profundidades acuáticas o el abismo. En español, «lo profundo» conserva el paralelismo poético y evita introducir una interpretación más técnica o cosmológica que el hebreo no exige aquí.
- source_word: קוֹרֵא
  english_pob_choice: calls
  chosen_spanish: llama
  alternatives_spanish:
  - clama
  - convoca
  lexicon: HALOT
  rationale: El participio funciona aquí con valor verbal presente en la imagen poética. «Llama» es la equivalencia más directa y natural para mantener el movimiento de la frase.
- source_word: לְקוֹל
  english_pob_choice: at the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - ante el sonido de
  - a causa del sonido de
  lexicon: HALOT
  rationale: La preposición ל con קוֹל en este contexto expresa el marco auditivo de la acción. «Al sonido de» comunica bien esa relación sin forzar el español.
- source_word: צִנּוֹרֶיךָ
  english_pob_choice: your waterfalls
  chosen_spanish: tus cascadas
  alternatives_spanish:
  - tus cataratas
  - tus conductos de agua
  - tus aguas torrenciales
  lexicon: HALOT
  rationale: צִנּוֹר puede referirse a un conducto o a aguas que caen con fuerza. Dado el cuadro de aguas abrumadoras, «cascadas» transmite el ruido y el ímpetu con naturalidad en español.
- source_word: מִשְׁבָּרֶיךָ
  english_pob_choice: your breakers
  chosen_spanish: tus olas rompientes
  alternatives_spanish:
  - tus rompientes
  - tus rompientes de mar
  - tus resacas
  lexicon: HALOT
  rationale: מִשְׁבָּר alude a olas que rompen o a la resaca. «Olas rompientes» conserva el valor concreto y la imagen de violencia acuática sin perder claridad.
- source_word: וְגַלֶּיךָ
  english_pob_choice: and your waves
  chosen_spanish: y tus olas
  alternatives_spanish:
  - y tus ondas
  - y tus billows
  lexicon: HALOT
  rationale: גַּל significa «ola» o «onda». «Olas» es el equivalente llano y contemporáneo, apropiado para emparejarse con «olas rompientes» en la línea anterior.
- source_word: עָלַי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - contra mí
  lexicon: HALOT
  rationale: Con עבר, la preposición expresa el paso de las aguas por encima del hablante. «Sobre mí» reproduce la imagen de forma directa y sobria.
- source_word: עָבָרוּ
  english_pob_choice: have passed over
  chosen_spanish: han pasado
  alternatives_spanish:
  - han cruzado
  - me han cubierto
  - han pasado sobre mí
  lexicon: HALOT
  rationale: El perfecto expresa una acción ya experimentada por el hablante. En combinación con «sobre mí», «han pasado» mantiene la fuerza del hebreo sin añadir una paráfrasis excesiva.
translation_notes:
  revision_awareness: El inglés auditado no requirió revisiones sustantivas; se mantuvo la imagen acuática intensiva del hebreo con equivalentes españoles naturales y poéticamente transparentes. Se preservó la alternativa léxica principal para צִנּוֹרֶיךָ mediante nota, dado que el término admite varias concreciones en español.
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» en ninguna parte porque el versículo no contiene el nombre divino ni un título explícito.
  - Se prefirió un registro poético claro y contemporáneo, evitando arcaísmos innecesarios como «abismo» donde «lo profundo» reproduce mejor el paralelismo.
  - Se mantuvo la distinción entre «cascadas», «olas rompientes» y «olas» para reflejar los tres miembros acuáticos del verso sin colapsarlos en un solo término.
