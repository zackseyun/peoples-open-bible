translation:
  language: es
  text: Entonces algunos de los ancianos del país se levantaron y dijeron a toda la asamblea del pueblo[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces algunos hombres de entre los ancianos del país se levantaron y hablaron a toda la asamblea del pueblo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT / uso narrativo de קום
  rationale: En este contexto narrativo, קום marca que se ponen de pie para intervenir públicamente. «Se levantaron» es natural en español y conserva el matiz de iniciar una intervención en asamblea.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: algunos
  alternatives_spanish:
  - unos hombres
  - algunos hombres
  lexicon: HALOT
  rationale: El hebreo hace explícito que eran varones, pero el versículo español queda más fluido si el enfoque recae en que eran parte del grupo de ancianos. «Algunos» refleja el ajuste del audit trail inglés revisado, sin perder la referencia masculina ya implícita en «ancianos».
- source_word: מִזִּקְנֵי הָאָרֶץ
  english_pob_choice: from the elders of the land
  chosen_spanish: de los ancianos de la tierra
  alternatives_spanish:
  - entre los ancianos de la tierra
  - de entre los ancianos de la tierra
  lexicon: HALOT
  rationale: La construcción con מִן permite leer que procedían del grupo de ancianos. «De los ancianos de la tierra» conserva la cercanía al hebreo; «de entre» sería una explicitación válida, pero menos literal.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  lexicon: HALOT
  rationale: «Dijeron» es la forma estándar para introducir discurso directo y se ajusta al hebreo sin añadir matiz interpretativo.
- source_word: אֶל כָּל קְהַל הָעָם
  english_pob_choice: to all the assembly of the people
  chosen_spanish: a toda la asamblea del pueblo
  alternatives_spanish:
  - a todo el asamblea del pueblo
  - a toda la congregación del pueblo
  lexicon: HALOT
  rationale: «Asamblea» conserva el sentido de reunión pública formal de קהל. «Congregación» sería posible, pero en español puede sonar más eclesiástico que cívico/político; «pueblo» traduce הָעָם con claridad.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijeron:'
  - 'así:'
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea de introducción al discurso. «Diciendo,» mantiene la transparencia sintáctica del original, aunque en español resulte más formal.
translation_notes:
  revision_awareness: 'El texto español sigue el hebreo directamente y también toma en cuenta la revisión del audit trail inglés que corrigió la relación entre «men» y «elders»: no se trata de un grupo distinto, sino de algunos miembros del conjunto de ancianos. Por eso el español evita separar artificialmente «hombres» de «ancianos» y prefiere una formulación natural y fiel.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en coherencia con el proyecto, aunque este versículo no lo contiene.
  - «Ancianos» traduce זקני con el matiz de liderazgo/cuerpo de notables, no simplemente de edad.
  - «Asamblea» conserva el registro público y colectivo de קהל.
