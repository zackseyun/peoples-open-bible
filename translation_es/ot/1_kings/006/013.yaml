translation:
  language: es
  text: Y habitaré en medio de los hijos de Israel[a], y no abandonaré a mi pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁכַנְתִּי
  english_pob_choice: And I will dwell
  chosen_spanish: Y habitaré
  alternatives_spanish:
  - Y morar é
  - Y residiré
  lexicon: HALOT
  rationale: שׁכן expresa la idea de habitar o establecerse; en contexto divino, «habitaré» conserva la fuerza de presencia permanente sin sonar mecánico en español.
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: HALOT
  rationale: La locución hebrea indica posición en el centro de un grupo. «En medio de» comunica bien esa presencia interna dentro de la comunidad de Israel.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos/descendientes de Israel
  lexicon: HALOT
  rationale: Se mantiene la formulación cercana al hebreo y al registro bíblico tradicional, sin reducirla a una etiqueta más abstracta como «israelitas».
- source_word: וְלֹא אֶעֱזֹב
  english_pob_choice: and I will not forsake
  chosen_spanish: y no abandonaré
  alternatives_spanish:
  - y no desampararé
  - y no dejaré
  lexicon: HALOT
  rationale: עָזַב en contexto de pacto puede significar abandonar o desamparar. «Abandonaré» comunica con claridad la promesa relacional; «desampararé» sería posible, pero suena más marcado en español.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo propio
  lexicon: HALOT
  rationale: «Mi pueblo» es la equivalencia natural y fiel del posesivo de pacto. «Mi gente» pierde el peso bíblico del término.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio conservado sin adaptación.
theological_decisions:
- issue: Presencia divina en medio de Israel
  english_pob_reading: Render שׁכן as 'dwell' and בְּתוֹךְ as 'among,' expressing God's covenant presence with Israel without over-specifying temple theology.
  chosen_spanish_reading: Traducir con «habitaré en medio de» para expresar la presencia de Yahvé entre su pueblo sin convertir el versículo en una definición técnica de la morada divina.
  alternative_spanish_readings:
  - Viviré entre los hijos de Israel
  - Residiré en medio de Israel
  rationale: El hebreo afirma presencia covenantal y relacional. «Habitaré en medio de» preserva esa tensión sin desplazar el foco hacia una formulación doctrinal posterior ni hacia una simple localización física.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: No se observan revisiones sustantivas en el pasaje fuente-auditado; el texto inglés final fue confirmado sin cambios y con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero este versículo no requiere el tetragrámaton explícito en el texto hebreo dado.
  - Se conserva el paralelismo entre la presencia divina («habitaré en medio de») y la fidelidad del pacto («no abandonaré a mi pueblo Israel»).
  - La nota al pie conserva la alternativa lexical documentada en el inglés POB sin introducir interpretaciones adicionales.
