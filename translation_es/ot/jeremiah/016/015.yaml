translation:
  language: es
  text: 'pero[a]: «¡Vive Yahvé, que hizo subir a los hijos de Israel de la tierra del norte y de todas las tierras adonde los había arrojado!». Porque los haré volver a su propia tierra, la que di a sus padres[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alternativamente, «más bien» o «pero más bien» al inicio del versículo; el hebreo כִּי אִם marca contraste con la afirmación anterior en el v. 14.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus padres»; alternativamente, «sus antepasados». El texto principal conserva la formulación masculina y pactal del original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - más bien
  - pero más bien
  lexicon: HALOT
  rationale: En este contexto el giro introduce contraste con la afirmación anterior (vv. 14–15). «Pero» expresa bien la oposición en español sin forzar una construcción demasiado pesada.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Por la vida de Yahvé!
  - Yahvé vive
  lexicon: HALOT
  rationale: Es una fórmula de juramento hebrea. En español, «¡Vive Yahvé!» conserva la fuerza idiomática y el valor solemne del juramento, manteniendo el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el tetragrámaton: no se oculta tras «SEÑOR» y se usa la forma española «Yahvé».'
- source_word: הֶעֱלָה
  english_pob_choice: brought up
  chosen_spanish: hizo subir
  alternatives_spanish:
  - sacó
  - trajo arriba
  lexicon: HALOT
  rationale: El hiphil de עלה mantiene la imagen de ascenso/salida, con resonancia de éxodo y restauración. «Hizo subir» preserva esa relación verbal mejor que una paráfrasis más libre.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» corresponde de manera directa al hebreo y mantiene el lenguaje bíblico de filiación/covenio sin neutralizarlo.
- source_word: מֵאֶרֶץ צָפוֹן
  english_pob_choice: from the land of the north
  chosen_spanish: de la tierra del norte
  alternatives_spanish:
  - del país del norte
  - de la tierra septentrional
  lexicon: HALOT
  rationale: «Tierra del norte» reproduce la expresión geográfica hebrea sin precisar indebidamente un referente moderno.
- source_word: וּמִכֹּל הָאֲרָצוֹת
  english_pob_choice: and from all the lands
  chosen_spanish: y de todas las tierras
  alternatives_spanish:
  - y de todos los países
  - y de todas las regiones
  lexicon: HALOT
  rationale: «Tierras» conserva el sentido amplio de אֲרָצוֹת y evita imponer la noción moderna de «países».
- source_word: הִדִּיחָם
  english_pob_choice: he had driven them
  chosen_spanish: los había arrojado
  alternatives_spanish:
  - los había expulsado
  - los había dispersado
  lexicon: HALOT
  rationale: El verbo implica expulsión/alejamiento forzoso. «Arrojado» conserva la violencia de la acción divina con buena naturalidad en español.
- source_word: וַהֲשִׁבֹתִים
  english_pob_choice: For I will bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los devolveré
  - los restauraré
  lexicon: HALOT
  rationale: La forma causativa expresa el retorno producido por Dios. «Haré volver» comunica bien la causación y suena natural, mientras mantiene la idea de regreso.
- source_word: עַל אַדְמָתָם
  english_pob_choice: to their own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - sobre su tierra
  - a su suelo
  lexicon: HALOT
  rationale: אַדְמָה es literalmente suelo/tierra. Aquí «su propia tierra» expresa restauración y posesión de manera clara en español.
- source_word: אֲשֶׁר נָתַתִּי לַאֲבוֹתָם
  english_pob_choice: that I gave to their fathers
  chosen_spanish: la que di a sus padres
  alternatives_spanish:
  - la que di a sus antepasados
  lexicon: HALOT
  rationale: Se conserva el término paternal del hebreo, que en este pasaje tiene peso pactal e histórico. «Padres» refleja de forma fiel la formulación del original.
theological_decisions:
- issue: Forma de juramento con el nombre divino
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - Por vida de Yahvé
  - ¡Tan ciertamente como vive Yahvé!
  rationale: El hebreo presenta la fórmula juramental חַי יְהוָה. En español, la opción exclamativa conserva la solemnidad y el carácter directo del juramento sin introducir una expansión interpretativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Terminología de parentesco pactal
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El hebreo usa un término masculino y pactal; el texto del POB en inglés lo preserva. «Padres» mantiene esa especificidad y la conexión con los patriarcas, sin neutralizar el referente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto inglés auditado revisó solo la puntuación: separó con mayor claridad la cita y capitalizó «For». No hubo cambios léxicos; la presente propuesta conserva esa misma segmentación, trasladando la cita y la frase explicativa a español con puntuación equivalente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - «Hijos de Israel» y «padres» conservan el lenguaje de filiación del hebreo.
  - «Tierras» evita modernizar indebidamente אֲרָצוֹת como «países».
  - La cita se cierra antes de la explicación causal, siguiendo la revisión inglesa.
  - Se evitó «SEÑOR» para no ocultar el nombre propio divino.
