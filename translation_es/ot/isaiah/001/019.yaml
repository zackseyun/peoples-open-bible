  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: condición (''Si''), voluntad/disposición (תאבו), respuesta obediente de שׁמע en contexto pactal, y la recompensa de comer el bien de la tierra. Sin embargo, la formulación española mezcla voseo peninsular (''estáis'', ''comeréis'') con un objetivo de español neutro latinoamericano, y el matiz de שׁמע se puede expresar de forma más natural manteniendo la nota alternativa.'
  spanish_quality_summary: La frase es clara, pero 'estáis dispuestos' suena menos natural en registro bíblico latinoamericano que 'quieren' o 'están dispuestos'. Además, el uso de 'estáis... comeréis' no encaja con el estilo meta solicitado. La nota al pie necesita limpieza tipográfica y mejor español.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. La decisión clave es שׁמע -> 'obedecen'/'obedientes'. Conviene mantener el sentido de obediencia responsiva con una nota que preserve la alternativa 'escuchan'.
  issues:
