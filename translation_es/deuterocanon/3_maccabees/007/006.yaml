translation:
  language: es
  text: Pero nosotros, después de amenazarlos con mayor severidad a causa de estas cosas, conforme a la clemencia que tenemos para con todos los hombres, apenas les concedimos la vida[a], y, reconociendo que el Dios celestial[b] ciertamente había defendido a los judíos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «les perdonamos la vida».
    reason: lexical_alternative
  - marker: b
    text: O «el Dios del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: σκληρότερον
  english_pob_choice: more harshly
  chosen_spanish: con mayor severidad
  alternatives_spanish:
  - más duramente
  - con más dureza
  - más severamente
  lexicon: LSJ
  rationale: El comparativo de σκληρός expresa endurecimiento o mayor rigor; en español, 'con mayor severidad' conserva la gradación y el tono administrativo sin sonar demasiado coloquial.
- source_word: διαπειλησάμενοι
  english_pob_choice: after threatening
  chosen_spanish: después de amenazarlos
  alternatives_spanish:
  - habiéndolos amenazado
  - tras amenazarlos
  - después de haberlos amenazado
  lexicon: LSJ
  rationale: El participio aoristo se vierte mejor como acción previa en español. 'Después de amenazarlos' mantiene la secuencia del griego sin recargar la frase.
- source_word: ἐπὶ τούτοις
  english_pob_choice: on account of these things
  chosen_spanish: por causa de estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - por estos motivos
  - por ello
  lexicon: LSJ
  rationale: La revisión inglesa aclara que la frase es causal, no comparativa. 'Por causa de estas cosas' reproduce esa relación y conserva la referencia a los hechos anteriores.
- source_word: ἐπιείκειαν
  english_pob_choice: clemency
  chosen_spanish: clemencia
  alternatives_spanish:
  - indulgencia
  - lenidad
  - benignidad
  lexicon: LSJ
  rationale: En este contexto de trato judicial o real, 'clemencia' es el equivalente español más natural y fiel al matiz de moderación y restricción del castigo.
- source_word: μόγις τὸ ζῆν αὐτοῖς χαρισάμενοι
  english_pob_choice: scarcely granted them their lives
  chosen_spanish: apenas les concedimos la vida
  alternatives_spanish:
  - apenas les dejamos con vida
  - con dificultad les concedimos la vida
  - apenas les perdonamos la vida
  lexicon: LSJ
  rationale: El giro idiomático griego significa conceder continuidad de vida con dificultad o a regañadientes. 'Concedimos la vida' sigue de cerca el verbo y 'apenas' conserva μόγις.
- source_word: ἐπουράνιον θεόν
  english_pob_choice: the heavenly God
  chosen_spanish: el Dios celestial
  alternatives_spanish:
  - el Dios del cielo
  - el Dios de los cielos
  - el Dios celestial
  lexicon: LSJ
  rationale: Se mantiene el adjetivo y la elevación del original. 'Dios celestial' suena natural en español y evita reducir la frase a una perífrasis menos literal.
- source_word: ἐγνωκότες
  english_pob_choice: recognizing
  chosen_spanish: reconociendo
  alternatives_spanish:
  - sabiendo
  - habiendo reconocido
  - al reconocer
  lexicon: LSJ
  rationale: El participio perfecto expresa reconocimiento asentado; 'reconociendo' conserva la relación de conciencia adquirida y funciona bien en la sintaxis española.
- source_word: ἀσφαλῶς
  english_pob_choice: surely
  chosen_spanish: con toda certeza
  alternatives_spanish:
  - seguramente
  - sin duda
  - con seguridad
  lexicon: LSJ
  rationale: Aquí el adverbio matiza la certeza del acto divino. 'Con toda certeza' intensifica sin cambiar el sentido, y enlaza bien con el siguiente participio.
- source_word: ὑπερησπικότα
  english_pob_choice: had surely defended
  chosen_spanish: había defendido
  alternatives_spanish:
  - había protegido
  - había salido en defensa de
  - había amparado
  lexicon: LSJ
  rationale: El verbo compuesto expresa defensa a favor de alguien. 'Había defendido' es directo y fiel; la certeza ya queda expresada por 'con toda certeza'.
theological_decisions:
- issue: Nombre divino en ἐπουράνιον θεόν
  english_pob_reading: the heavenly God
  chosen_spanish_reading: el Dios celestial
  alternative_spanish_readings:
  - el Dios del cielo
  - el Dios de los cielos
  rationale: Se conserva la referencia a Dios sin ocultarla con un sustituto litúrgico. 'Celestial' mantiene el valor adjetival del griego y la solemnidad del contexto narrativo-político.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de τὸ ζῆν αὐτοῖς χαρισάμενοι
  english_pob_reading: scarcely granted them their lives
  chosen_spanish_reading: apenas les concedimos la vida
  alternative_spanish_readings:
  - apenas les perdonamos la vida
  - con dificultad les concedimos la vida
  rationale: La frase no sugiere simple perdón moral, sino concesión de seguir vivos. La forma elegida preserva esa tensión entre concesión y reluctancia.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referencia a la protección divina de los judíos
  english_pob_reading: the heavenly God had surely defended the Jews
  chosen_spanish_reading: el Dios celestial había defendido con toda certeza a los judíos
  alternative_spanish_readings:
  - el Dios celestial había protegido a los judíos
  - el Dios celestial había salido en defensa de los judíos
  rationale: La frase afirma una defensa efectiva y reconocible por los hablantes. 'Defendido' conserva el acto de amparo y evita suavizar el testimonio de intervención divina.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del inglés auditado, especialmente la corrección de ἐπὶ τούτοις como causal ('on account of these things'). También preservé la decisión revisada de mantener la cláusula sobre la clemencia general y la defensa divina, sin reescrituras interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y se evita cualquier máscara reverencial.
  - Se traduce ἐπὶ τούτοις de forma causal, no comparativa.
  - '''Clemencia'' conserva el registro administrativo/real del contexto.'
  - '''Apenas'' reproduce el valor de μόγις sin convertir la frase en una paráfrasis libre.'
  - La nota textual en a ofrece la alternativa idiomática sin desplazar el sentido principal.
