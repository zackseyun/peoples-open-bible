lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En español, el verbo natural para introducir discurso divino en una fórmula narrativa es «habló». Conserva el valor de intervención verbal directa del hebreo וַיְדַבֵּר sin volverlo redundante frente a «diciendo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrama es transliterar el nombre divino. «Yahvé» preserva el nombre de pacto de forma auditable, evitando la sustitución por un título como «SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla. En español, «a» es la equivalencia natural y directa para este valor dativo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español; se mantiene la forma convencional y legible para lectores eclesiales.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria de habla. «Diciendo» conserva la estructura del hebreo y señala que la cita continúa en el versículo siguiente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal del POB de no enmascarar el nombre propio divino con un título. «Yahvé» es la forma adoptada en español para preservar el Tetragrama como nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el paquete fuente y con la revisión más reciente: no se registran cambios posteriores y el pasaje muestra alto acuerdo entre auditoría y traducción fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología base del proyecto para el Tetragrama.
  - «Moisés» conserva la forma española estándar del nombre propio.
  - La puntuación reproduce la fórmula de introducción de discurso con una coma antes de «diciendo», adecuada al estilo bíblico en español.
