revisions:
- from: Entonces José llevó a Jacob, su padre, y lo presentó[a] delante de Faraón; y Jacob bendijo a Faraón[b].
  to: Entonces José introdujo a Jacob, su padre, y lo presentó ante Faraón[a], y Jacob bendijo a Faraón[b].
  rationale: Se revisa «llevó» a «introdujo» para reflejar mejor el contexto formal de audiencia real y la decisión inglesa «brought in». También se mejora la naturalidad con «ante Faraón» y se mueve el marcador [a] al final del segmento completo que traduce וַיַּעֲמִדֵהוּ לִפְנֵי פַרְעֹה. La nota sobre «bendijo» se mantiene intacta porque está bien fundada léxica y teológicamente.
