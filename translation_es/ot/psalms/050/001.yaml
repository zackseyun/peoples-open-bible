translation:
  language: es
  text: Salmo de Asaf. El Poderoso[a], Dios, Yahvé, ha hablado y ha convocado a la tierra desde la salida del sol hasta su puesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios, Dios, Yahvé»; algunos entienden de otro modo la serie inicial de títulos divinos, incluso «El Dios de dioses, Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, el término designa claramente el género; «Salmo» es la forma natural y fiel en español.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: En una superscripción, ל puede señalar autoría o asociación. «De Asaf» conserva esa relación sin fijarla de manera excesiva.
- source_word: אֵל
  english_pob_choice: The Mighty One
  chosen_spanish: El Poderoso
  alternatives_spanish:
  - Dios
  - El Dios poderoso
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica distintiva de אֵל en aposición, sin absorberlo en los otros títulos divinos.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Por el contexto singular y los verbos singulares, el referente es el Dios de Israel; en español corresponde «Dios».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: transliteración del nombre divino como «Yahvé».'
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - habla
  lexicon: HALOT
  rationale: El perfecto expresa una acción completa con vigencia presente; «ha hablado» conserva ese valor solemne.
- source_word: וַיִּקְרָא
  english_pob_choice: and called
  chosen_spanish: y ha convocado
  alternatives_spanish:
  - y llamó
  - y convocó
  lexicon: HALOT
  rationale: El verbo puede tener matiz de convocar o llamar públicamente; «ha convocado» refleja mejor el alcance judicial/solemne en español.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: Aunque «tierra» puede ser geográfico, aquí el merismo siguiente amplía el alcance total; en español «la tierra» es natural y suficientemente inclusivo.
- source_word: מִמִּזְרַח שֶׁמֶשׁ
  english_pob_choice: from the rising of the sun
  chosen_spanish: desde la salida del sol
  alternatives_spanish:
  - desde el nacimiento del sol
  - desde el oriente
  lexicon: HALOT
  rationale: Se conserva la imagen poética del original con una formulación idiomática clara en español.
- source_word: עַד מְבֹאוֹ
  english_pob_choice: to its setting
  chosen_spanish: hasta su puesta
  alternatives_spanish:
  - hasta su ocaso
  - hasta que se pone
  lexicon: HALOT
  rationale: La referencia es al sol; «su puesta» mantiene brevedad, paralelismo y sentido merístico.
theological_decisions:
- issue: 'Acumulación de títulos divinos: אֵל אֱלֹהִים יְהוָה'
  english_pob_reading: The Mighty One, God, Yahweh
  chosen_spanish_reading: El Poderoso, Dios, Yahvé
  alternative_spanish_readings:
  - Dios, Dios, Yahvé
  - El Dios de dioses, Yahvé
  rationale: El hebreo presenta una serie de designaciones divinas en aposición. En español, distinguir «El Poderoso» evita aplanar la secuencia y conserva la tensión retórica sin forzar un giro constructo que el contexto no exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Convocación universal de la tierra
  english_pob_reading: has spoken and called the earth from the rising of the sun to its setting
  chosen_spanish_reading: ha hablado y ha convocado a la tierra desde la salida del sol hasta su puesta
  alternative_spanish_readings:
  - ha hablado y llamó a la tierra desde el oriente hasta el occidente
  - ha hablado y ha llamado a la tierra
  rationale: La expresión completa funciona como merismo de totalidad. Mantener «desde la salida del sol hasta su puesta» preserva el alcance universal sin sustituirlo por una paráfrasis abstracta.
  doctrine_reference: 'DOCTRINE.md: Poetry and merism — preserve full extent imagery'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo y con la decisión auditada en inglés: se conserva la serie tripartita de títulos divinos, el nombre divino como Yahvé, y la imagen poética del merismo solar sin cambios de sentido. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme a la convención del proyecto.
  - «El Poderoso» preserva la distinción de אֵל frente a «Dios» y evita redundancia plana.
  - La formulación de la última cola conserva el paralelismo temporal y la imagen poética del original.
  - Se usa «ha hablado / ha convocado» para conservar el valor perfecto con vigencia presente y el tono solemne del hebreo.
