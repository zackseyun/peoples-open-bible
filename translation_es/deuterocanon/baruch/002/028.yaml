translation:
  language: es
  text: tal como hablaste por la mano de tu siervo Moisés[a], el día en que le mandaste escribir tu ley delante de los hijos de Israel, diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro bíblico 'por la mano de' expresa agencia mediante un intermediario; en español también puede entenderse como 'por medio de' o 'mediante'.
    reason: cultural_note
  - marker: b
    text: Literalmente, 'los hijos de Israel'. También puede traducirse 'los israelitas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὰ
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: LSJ
  rationale: Expresa correspondencia/comparación de manera natural en español y conserva el sentido de ajuste exacto del griego.
- source_word: ἐλάλησας
  english_pob_choice: you spoke
  chosen_spanish: hablaste
  alternatives_spanish:
  - dijiste
  - hablaste
  lexicon: LSJ
  rationale: El aoristo de λαλέω admite un decir/hablar; 'hablaste' mantiene el tono solemne y evita una paráfrasis excesiva.
- source_word: ἐν χειρὶ
  english_pob_choice: by the hand of
  chosen_spanish: por la mano de
  alternatives_spanish:
  - por medio de
  - mediante
  lexicon: LSJ
  rationale: Conserva el idiomático bíblico de agencia mediada. En español, 'por la mano de' refleja mejor la textura del original que una normalización completa.
- source_word: παιδός σου
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: LSJ
  rationale: Para Moisés, παῖς funciona como designación honorífica de un agente de Dios. 'Siervo' es el equivalente bíblico más fiel y digno en español; 'esclavo' sería demasiado fuerte aquí.
- source_word: ἐν ἡμέρᾳ
  english_pob_choice: on the day
  chosen_spanish: en el día
  alternatives_spanish:
  - el día en que
  - cuando
  lexicon: LSJ
  rationale: Mantiene la estructura temporal solemne del griego, con una formulación clara y natural en español.
- source_word: ἐντειλαμένου σου αὐτῷ
  english_pob_choice: when you commanded him
  chosen_spanish: en que le mandaste
  alternatives_spanish:
  - cuando le mandaste
  - al mandarle
  lexicon: LSJ
  rationale: La idea es de mandato divino en contexto de pacto. 'Mandaste' comunica bien el aoristo en español; 'le ordenaste' sería posible, pero menos idiomático aquí.
- source_word: γράψαι
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - redactar
  - anotar
  lexicon: LSJ
  rationale: Verbo directo y suficiente para el infinitivo de propósito. 'Escribir' conserva la sencillez del original.
- source_word: τὸν νόμον σου
  english_pob_choice: your law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu instrucción
  - tu norma
  lexicon: LSJ
  rationale: En el marco mosaico, νόμος se entiende naturalmente como 'ley'. 'Tu ley' conserva la resonancia covenantal y la expresión tradicional sin caer en un calco rígido.
- source_word: ἐναντίον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: LSJ
  rationale: Con personas, el sentido relacional es 'ante/delante de'. 'Delante de' suena claro y conserva el registro bíblico.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: LSJ
  rationale: El griego dice literalmente 'hijos de Israel'. En español, 'hijos' es la forma bíblica estable y no borra el masculino del original como lo haría 'israelitas'.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: LSJ
  rationale: Participio que introduce la continuación inmediata en el versículo siguiente; 'diciendo' preserva la conexión sintáctica.
theological_decisions:
- issue: Mediated divine agency in ἐν χειρὶ παιδός σου
  english_pob_reading: by the hand of your servant Moses
  chosen_spanish_reading: por la mano de tu siervo Moisés
  alternative_spanish_readings:
  - mediante tu siervo Moisés
  - por medio de tu siervo Moisés
  rationale: La formulación conserva el idiomático bíblico de agencia mediada sin ocultar que la acción se atribuye a Dios por medio de Moisés. Mantiene la tensión textual que el audit trail documenta.
  doctrine_reference: 'DOCTRINE.md: preserve source idiom and mediated agency where textually warranted'
- issue: Gender-accurate rendering of υἱῶν Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos varones de Israel
  - los israelitas
  rationale: El griego es explícitamente masculino plural. Se conserva esa forma en español en vez de neutralizarla, porque el texto base la presenta así.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El auditor inglés marcó acuerdo alto y no registró revisiones posteriores; esta versión sigue la lectura estable del texto griego y conserva las dos notas de alternativa ya documentadas en el POB inglés, ajustándolas al español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología por defecto del proyecto solo cuando aparezca el nombre divino explícito; en este versículo no aparece, por lo que no se usa.
  - Se eligió 'tu siervo' para παῖς en coherencia con el uso bíblico reverente y con la decisión inglesa auditada.
  - '''Hijos de Israel'' preserva la forma griega masculina plural y mantiene el registro bíblico sin modernizarla a ''israelitas''.'
