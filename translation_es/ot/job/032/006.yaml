translation:
  language: es
  text: 'Entonces Eliú hijo de Baraquel, el buzita, respondió y dijo: «Soy joven en días[a], y ustedes son ancianos; por eso fui tímido y tuve miedo de declararles lo que sé[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «joven en días», un modismo que indica que Eliú es relativamente joven en edad.'
    reason: cultural_note
  - marker: b
    text: O «me retraí y tuve miedo de decirles lo que sé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, ‘respondió’ conserva el valor dialogal del verbo hebreo sin exigir una pregunta previa explícita; unido a ‘dijo’ reproduce bien la fórmula narrativa de entrada al discurso.
- source_word: אֱלִיהוּא בֶן בַּרַכְאֵל הַבּוּזִי
  english_pob_choice: Elihu son of Barakel the Buzite
  chosen_spanish: Eliú hijo de Baraquel, el buzita
  alternatives_spanish:
  - Eliú hijo de Baraquel, el buzita
  - Eliú hijo de Baraquel, el de Buz
  lexicon: Nombres propios / gentilicio
  rationale: Se transliteran los nombres propios de forma consistente. El gentilicio se conserva como identidad étnica/familiar; ‘buzita’ mantiene la referencia del original sin sustituirla por una denominación eclesiástica.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: HALOT
  rationale: ‘Dijo’ es la equivalencia natural y precisa para el verbo de habla, y mantiene la fórmula narrativa hebrea en español claro.
- source_word: צָעִיר אֲנִי לְיָמִים
  english_pob_choice: I am young in days
  chosen_spanish: Soy joven en días
  alternatives_spanish:
  - Soy joven
  - Soy joven en años
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo ‘en días’ porque el POB inglés lo conservó como imagen idiomática. En español suena algo marcado, pero sigue siendo inteligible y refleja la contraposición con la vejez de los oyentes.
- source_word: יְשִׁישִׁים
  english_pob_choice: aged
  chosen_spanish: ancianos
  alternatives_spanish:
  - muy viejos
  - viejos
  lexicon: HALOT
  rationale: ‘Ancianos’ comunica edad avanzada con dignidad y corresponde bien al contraste implícito. Se evita una expresión más dura si no añade precisión contextual.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: ‘Por eso’ expresa con naturalidad la relación causal en español; mantiene el enlace lógico del original sin sobreformalizar la frase.
- source_word: זָחַלְתִּי
  english_pob_choice: I was timid
  chosen_spanish: tuve temor
  alternatives_spanish:
  - fui tímido
  - me acobardé
  - me contuve
  lexicon: HALOT
  rationale: El verbo hebreo sugiere retraimiento/timidez. ‘Tuve temor’ comunica la vacilación interior de forma idiomática en español y deja espacio para la siguiente cláusula de miedo explícito.
- source_word: וָאִירָא
  english_pob_choice: and afraid
  chosen_spanish: y me dio miedo
  alternatives_spanish:
  - y temí
  - y tuve miedo
  lexicon: HALOT
  rationale: Se mantiene la segunda expresión de temor como intensificación del primer verbo. ‘Me dio miedo’ es natural y refleja una reacción emocional concreta.
- source_word: מֵחַוּוֹת
  english_pob_choice: to declare
  chosen_spanish: declararles
  alternatives_spanish:
  - decirles
  - hacerles saber
  lexicon: HALOT
  rationale: El infinitivo comunica el acto formal de hacer saber algo. ‘Declararles’ conserva el tono sobrio del discurso de Eliú y sigue de cerca la decisión inglesa de ‘declare’.
- source_word: דֵּעִי
  english_pob_choice: my knowledge
  chosen_spanish: mi conocimiento
  alternatives_spanish:
  - lo que sé
  - mi saber
  lexicon: HALOT
  rationale: ‘Conocimiento’ traduce directamente el sustantivo y mantiene el peso cognitivo del original. ‘Lo que sé’ sería más explicativo, pero menos ligado al léxico del hebreo.
translation_notes:
  revision_awareness: La versión sigue de cerca el registro narrativo del hebreo y coincide sustancialmente con la solución inglesa auditada. Se conservó el modismo ‘en días’ y la doble expresión de temor, con ajuste natural al español para una lectura publicable.
  spanish_consistency_notes:
  - Se mantiene ‘Eliú’ y ‘Baraquel’ de forma uniforme.
  - Se conserva el gentilicio ‘buzita’ en minúscula como adjetivo de procedencia.
  - Se preserva la fórmula verbal doble ‘respondió y dijo’ como opción alternativa en nota, a la vez que el texto principal usa una coordinación natural en español.
  - La expresión ‘en días’ se deja visible por fidelidad al hebreo, con nota explicativa para el lector.
