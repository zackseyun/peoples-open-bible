translation:
  language: es
  text: 'Y ella dijo[a]: «Conforme a sus palabras, así será». Entonces los despidió, y se fueron; y ella ató el cordón escarlata en la ventana.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la línea escarlata». La expresión hebrea puede referirse a un cordón, una línea o una cuerda usados como marca visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְדִבְרֵיכֶם
  english_pob_choice: According to your words
  chosen_spanish: Conforme a sus palabras
  alternatives_spanish:
  - Según sus palabras
  - De acuerdo con lo que dijeron
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo plural "palabras" con sufijo de 2mp, así que mantengo el plural en español. "Conforme a" expresa bien la adhesión a lo dicho sin perder la relación formal con el enunciado de los espías.
- source_word: כֵּן הוּא
  english_pob_choice: so be it
  chosen_spanish: así es
  alternatives_spanish:
  - así sea
  - así es, pues
  lexicon: HALOT
  rationale: La frase hebrea expresa asentimiento y confirmación. En español, "así es" conserva esa aceptación declarativa de manera natural; "así sea" sería posible, pero suena más optativo que afirmativo.
- source_word: וַתְּשַׁלְּחֵם
  english_pob_choice: she sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió lejos
  - los dejó ir
  lexicon: HALOT
  rationale: שלח aquí describe la acción narrativa de dejarlos partir. "Despidió" comunica el acto de darles salida sin añadir una interpretación excesiva, y funciona bien en español bíblico contemporáneo.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: they went
  chosen_spanish: ellos se fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: HALOT
  rationale: El verbo הלך es simple y narrativo. "Se fueron" es la forma natural en español; incluyo "ellos" para reflejar claramente el sujeto plural del hebreo y evitar ambigüedad.
- source_word: וַתִּקְשֹׁר
  english_pob_choice: she tied
  chosen_spanish: ató
  alternatives_spanish:
  - amarró
  - aseguró
  lexicon: HALOT
  rationale: קשר significa atar o sujetar. "Ató" es la correspondencia más directa y suficientemente digna para el contexto de fijar un cordón visible.
- source_word: תִּקְוַת הַשָּׁנִי
  english_pob_choice: the scarlet cord
  chosen_spanish: el cordón escarlata
  alternatives_spanish:
  - la cuerda escarlata
  - la línea escarlata
  lexicon: HALOT
  rationale: Aunque תִּקְוָה puede significar "esperanza" en otros contextos, aquí el sentido concreto es un objeto físico de señalización. "Cordón" conserva la idea material mejor que "linea" y evita perder la referencia tangible del marcador.
- source_word: בַּחַלּוֹן
  english_pob_choice: in the window
  chosen_spanish: en la ventana
  alternatives_spanish:
  - en el alfeizar
  - por la ventana
  lexicon: HALOT
  rationale: La preposición hebrea marca ubicación. "En la ventana" es la forma directa y natural en español para indicar dónde se ata el cordón.
theological_decisions:
- issue: La fórmula de asentimiento de Rahab
  english_pob_reading: so be it
  chosen_spanish_reading: así es
  alternative_spanish_readings:
  - así sea
  - amén
  rationale: No hay una fórmula litúrgica explícita en el hebreo; es una aceptación de lo pactado. "Así es" conserva el valor de confirmación sin introducir una matización devocional no presente en el texto.
  doctrine_reference: Ninguna; decisión de pragmática textual.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la auditoría inglesa: aceptación de las palabras de los espías, envío/despedida, partida y fijación del cordón escarlata en la ventana. Se conserva la ambigüedad lexical de תִּקְוָה mediante una nota, pero se prioriza "cordón" por claridad contextual y naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como término estándar del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva el paralelismo narrativo breve del hebreo con una sintaxis española clara y sobria.
  - '"Escarlata" se mantiene como adjetivo cromático tradicional y preciso, sin sustituirlo por "rojo".'
  - La nota [a] queda anclada en "cordón escarlata" para preservar la alternativa léxica documentada.
