revisions:
- from: 'Y él dijo[a]: «Volveré sin falta a ti por este tiempo el año que viene[b], y he aquí[c] que Sara, tu esposa, tendrá un hijo». Y Sara estaba escuchando a la entrada de la tienda, detrás de él.'
  to: 'Y él dijo: «Sin duda volveré a ti por este tiempo el año que viene[a], y he aquí que Sara, tu esposa, tendrá un hijo». Y Sara estaba escuchando a la entrada de la tienda, detrás de él[b][c].'
  rationale: 'El texto principal solo requiere un ajuste estilístico menor («Sin duda volveré») y, sobre todo, una reparación del aparato de notas para que coincida con la evidencia fuente y la auditoría inglesa: la nota del modismo temporal debe ir en la frase temporal, y las dos notas sobre la cláusula final deben anclarse al segmento «detrás de él», no a «dijo» ni a «he aquí».'
