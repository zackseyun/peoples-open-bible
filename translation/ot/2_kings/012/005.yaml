id: 2KI.12.5
reference: 2 Kings 12:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹאָ֜שׁ אֶל הַ/כֹּהֲנִ֗ים כֹּל֩ כֶּ֨סֶף הַ/קֳּדָשִׁ֜ים אֲשֶׁר יוּבָ֤א בֵית יְהוָה֙ כֶּ֣סֶף עוֹבֵ֔ר אִ֕ישׁ כֶּ֥סֶף נַפְשׁ֖וֹת עֶרְכּ֑/וֹ כָּל כֶּ֗סֶף אֲשֶׁ֤ר יַֽעֲלֶה֙ עַ֣ל לֶב אִ֔ישׁ לְ/הָבִ֖יא בֵּ֥ית יְהוָֽה־־־־־׃
translation:
  text: And Jehoash said to the priests[a], “All the money of the holy things that is brought into the house of Yahweh—the money from each man who is counted, the money of the valuation of persons[c][b], and all the money that comes up on a man’s heart to bring into the house of Yahweh—”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the money of everyone who passes over”; likely the census payment required from those counted (compare Exod 30:13–16).
    reason: lexical_alternative
  - marker: b
    text: Or “the money for the valuation of persons,” likely referring to payments associated with vowed valuations (compare Lev 27:2–8).
    reason: cross_reference
  - marker: c
    text: 'Hebrew idiom: “that comes up upon a man’s heart,” meaning what someone freely purposes to give.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּל כֶּסֶף הַקֳּדָשִׁים
  chosen: all the money of the holy things
  alternatives:
  - all the holy money
  - all the money of the sacred gifts
  - all the money of the dedicated things
  lexicon: HALOT
  rationale: The construct phrase literally refers to money associated with holy/dedicated things. 'Money of the holy things' preserves the Hebrew structure and leaves room for the following appositional specification of types of temple revenue.
- source_word: יוּבָא בֵית יְהוָה
  chosen: is brought into the house of the LORD
  alternatives:
  - is brought to the house of the LORD
  - comes into the house of the LORD
  lexicon: HALOT
  rationale: Passive 'is brought' reflects the Hophal of בוא. 'House of the LORD' is the standard rendering for the temple and preserves the covenant name according to doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֶּסֶף עוֹבֵר אִישׁ
  chosen: the money from each man who is counted
  alternatives:
  - the money of everyone who passes over
  - the poll money from each man
  - the money from each man who passes among those numbered
  lexicon: HALOT
  rationale: This phrase likely refers to the census-related levy known from Exodus 30:13-16. 'Who is counted' communicates the idiomatic sense of עֹבֵר in this fiscal context more clearly than a wooden 'passes over,' while retaining the individual male reference of אִישׁ.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each person
  - a man
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and in this cultic-tax context likely reflects the male individual liable for the levy. Per doctrine, gender-accurate rendering is preferred over neutralizing.
- source_word: כֶּסֶף נַפְשׁוֹת עֶרְכּוֹ
  chosen: the money from the valuation of persons
  alternatives:
  - the money of a person's valuation
  - the silver of assessed persons
  - the money for vowed valuations
  lexicon: HALOT
  rationale: This compressed phrase points to money arising from valuation assessments of persons, likely as in Leviticus 27. 'Valuation of persons' is idiomatic English that preserves the cultic/legal sense without over-specifying 'vows' in the main text.
- source_word: כָּל כֶּסֶף אֲשֶׁר יַעֲלֶה עַל לֶב אִישׁ
  chosen: all the money that comes into any man’s heart
  alternatives:
  - all the money that arises upon a man's heart
  - all the money that a man decides in his heart
  - all the money that comes to a man's mind
  lexicon: HALOT
  rationale: The idiom 'comes up upon the heart' denotes inward intention or willingness. 'Comes into ... heart' preserves the metaphor more closely than a fully interpretive 'decides.'
- source_word: לְהָבִיא בֵּית יְהוָה
  chosen: to bring into the house of the LORD
  alternatives:
  - to bring to the house of the LORD
  lexicon: HALOT
  rationale: 'Infinitive of purpose after the heart-idiom: money someone purposes to bring. ''Into'' matches the directional sense and parallels the earlier clause.'
