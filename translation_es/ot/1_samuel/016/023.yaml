translation:
  language: es
  text: Y siempre que el espíritu de Dios venía sobre Saúl, David tomaba la lira[a] y la tocaba con su mano; entonces Saúl hallaba alivio, y le iba bien[c], y el espíritu dañino[b] se apartaba de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «arpa». El hebreo kinnor designa un instrumento de cuerdas antiguo, probablemente más cercano a una lira que a un arpa moderna.
    reason: lexical_alternative
  - marker: b
    text: O, «el espíritu malo». El hebreo puede significar «malo» o «dañino»; aquí el contexto puede enfatizar el efecto aflictivo del espíritu sobre Saúl.
    reason: lexical_alternative
  - marker: c
    text: La primera cláusula dice «el espíritu de Dios», mientras que la última dice «el espíritu dañino». La traducción conserva la distinción de redacción presente en el hebreo en vez de armonizar ambas expresiones.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה בִּהְיוֹת
  english_pob_choice: And whenever ... came
  chosen_spanish: Y sucedía que, cuando ... venía
  alternatives_spanish:
  - Y acontecía que, cuando ... venía
  - Y cuando ... llegaba a suceder
  lexicon: HALOT
  rationale: La construcción hebrea introduce una circunstancia repetida; en español, «sucedía que, cuando» conserva bien el valor iterativo sin sonar forzado.
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: the spirit of God
  chosen_spanish: el espíritu de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - el Espíritu de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión directa del hebreo, sin armonizarla con la frase posterior sobre el espíritu dañino. «Espíritu» con mayúscula sería posible, pero aquí la forma literal y narrativa favorece minúscula.
- source_word: אֶל שָׁאוּל
  english_pob_choice: came upon Saul
  chosen_spanish: venía sobre Saúl
  alternatives_spanish:
  - venía a Saúl
  - caía sobre Saúl
  lexicon: HALOT
  rationale: «Venía sobre» transmite el alcance o irrupción del espíritu en el contexto narrativo, de manera natural en español.
- source_word: הַכִּנּוֹר
  english_pob_choice: the lyre
  chosen_spanish: el arpa
  alternatives_spanish:
  - la lira
  - el instrumento de cuerdas
  lexicon: HALOT
  rationale: Aunque el audit trail inglés prefiere «lyre», en español «arpa» es el término más reconocible y tradicional para el instrumento, y la nota preserva la precisión histórica del hebreo kinnor.
- source_word: וְנִגֵּן בְּיָדוֹ
  english_pob_choice: and play it with his hand
  chosen_spanish: y la tocaba con su mano
  alternatives_spanish:
  - y la pulsaba con su mano
  - y hacía música con su mano
  lexicon: HALOT
  rationale: «Tocaba» funciona de forma natural para un instrumento de cuerdas y conserva el sentido de ejecutar música con la mano sin añadir más de lo que el hebreo permite.
- source_word: וְרָוַח לְשָׁאוּל
  english_pob_choice: then Saul found relief
  chosen_spanish: entonces Saúl hallaba alivio
  alternatives_spanish:
  - entonces Saúl encontraba alivio
  - entonces Saúl se aliviaba
  lexicon: HALOT
  rationale: «Hallaba alivio» expresa el efecto de descanso o desahogo en Saúl con un tono formal y claro.
- source_word: וְטוֹב ל֔וֹ
  english_pob_choice: and it was well with him
  chosen_spanish: y le iba bien
  alternatives_spanish:
  - y estaba bien
  - y se sentía mejor
  lexicon: HALOT
  rationale: La frase hebrea describe bienestar general; «le iba bien» es una forma idiomática española que conserva amplitud sin explicar demasiado.
- source_word: רוּחַ הָרָעָה
  english_pob_choice: the harmful spirit
  chosen_spanish: el espíritu dañino
  alternatives_spanish:
  - el espíritu malo
  - el espíritu malvado
  lexicon: HALOT
  rationale: Se evita cargar la frase con un matiz moral más fuerte de lo que exige el contexto. «Dañino» refleja el efecto aflictivo sobre Saúl y respeta la tensión lexical del texto.
- source_word: וְסָרָה מֵעָלָיו
  english_pob_choice: departed from him
  chosen_spanish: se apartaba de él
  alternatives_spanish:
  - se retiraba de él
  - se iba de él
  lexicon: HALOT
  rationale: «Se apartaba» conserva el valor de separación o retiro del verbo hebreo de modo claro y sobrio.
theological_decisions:
- issue: Relación entre רוּחַ אֱלֹהִים y רוּחַ הָרָעָה
  english_pob_reading: Render the first phrase literally as 'the spirit of God' and the later phrase as 'the harmful spirit,' without harmonizing them in translation.
  chosen_spanish_reading: Traducir la primera expresión como «el espíritu de Dios» y la posterior como «el espíritu dañino», sin fusionarlas ni explicar la relación dentro del texto.
  alternative_spanish_readings:
  - «el espíritu dañino de Dios»
  - «un espíritu malo de parte de Dios»
  rationale: El hebreo distingue deliberadamente ambas expresiones; mantener esa diferencia en español deja visible la tensión del pasaje y evita introducir una síntesis interpretativa no presente en la forma textual.
  doctrine_reference: Preservar la tensión textual y teológica del pasaje; primacía del original sobre la armonización interpretativa.
translation_notes:
  revision_awareness: Se revisó el equilibrio entre fidelidad al hebreo y naturalidad española. En particular, se eligió una solución idiomática para la apertura iterativa y una terminología que preserve la distinción entre «espíritu de Dios» y «espíritu dañino» sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «espíritu» en minúscula por el contexto narrativo.
  - Se evitó «SEÑOR» u otra sustitución devocional; no aplica aquí.
  - Se usó «el espíritu dañino» para רוּחַ הָרָעָה, coherente con el énfasis en el efecto sobre Saúl.
  - Las notas a pie siguen la secuencia a, b, c y cada marcador aparece anclado en el texto correspondiente.
