translation:
  language: es
  text: Y el sacerdote rociará[a] la sangre sobre el altar de Yahvé, a la entrada de la tienda de reunión, y quemará la grasa como aroma agradable[b] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esparcirá» o «salpicará» la sangre sobre/contra el altar; el verbo hebreo se refiere a la aplicación ritual de la sangre por parte del sacerdote.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «aroma agradable»; tradicionalmente también se traduce «aroma apacible» o «aroma de grato olor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרַק
  english_pob_choice: sprinkle / dash the blood
  chosen_spanish: rociará la sangre
  alternatives_spanish:
  - esparcirá la sangre
  - salpicará la sangre
  lexicon: HALOT
  rationale: En contextos sacrificiales, זָרַק describe la aplicación ritual de la sangre al altar; en español, «rociará» comunica una acción concreta sin sonar tan gruesa como una traslación literal de «dashing».
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote ministro
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן se traduce de forma natural por «sacerdote». «El sacerdote» conserva el artículo definido del hebreo.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre sacrificial
  lexicon: HALOT
  rationale: Se refiere de manera directa a la sangre del sacrificio; «la sangre» es suficiente y fiel.
- source_word: עַל מִזְבַּח יְהוָה
  english_pob_choice: on the altar of Yahweh
  chosen_spanish: sobre el altar de Yahvé
  alternatives_spanish:
  - en el altar de Yahvé
  - contra el altar de Yahvé
  lexicon: HALOT
  rationale: Con זָרַק, עַל puede expresar la aplicación física de la sangre al altar. «Sobre» mantiene la relación espacial sin forzar una formulación extraña en español. Se preserva «Yahvé» para el nombre divino.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - en la entrada de la tienda de reunión
  - junto a la entrada de la tienda de reunión
  lexicon: HALOT
  rationale: פֶּתַח es «entrada»; אֹהֶל מוֹעֵד se expresa de modo establecido como «tienda de reunión». «A la entrada» reproduce bien el valor locativo.
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: quemará
  alternatives_spanish:
  - hará arder
  - ofrecerá en humo
  lexicon: HALOT
  rationale: הִקְטִיר en lenguaje sacrificial implica quemar la porción para que suba en humo. «Quemará» es natural y suficientemente preciso en español.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la grasa sacrificial
  - el sebo
  lexicon: HALOT
  rationale: En Levítico, חֵלֶב alude a la grasa de la ofrenda reservada para el altar; «grasa» es claro para el lector moderno. «Sebo» sería más técnico pero menos transparente.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como aroma placentero
  - como olor agradable
  lexicon: HALOT
  rationale: La fórmula sacrificial expresa aceptación ante Dios. «Aroma agradable» conserva el valor idiomático y la dignidad del registro.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para Yahweh
  lexicon: HALOT
  rationale: La preposición final indica dirección/relación de la ofrenda con YHWH; en español, «a Yahvé» mantiene brevedad y naturalidad, preservando el nombre divino sin sustitución por título.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. En el proyecto, se conserva el nombre divino como «Yahvé» en vez de ocultarlo tras un título. «Yahvé» es la forma establecida para esta serie en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido sacrificial de לְרֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: como aroma agradable
  alternative_spanish_readings:
  - como aroma apacible
  - como aroma de aceptación
  rationale: La expresión no describe simplemente un olor físico, sino una ofrenda aceptable y deleitosa para Yahvé. «Aroma agradable» conserva la fórmula tradicional sin imponer una interpretación excesivamente explicativa.
  doctrine_reference: Levítico 17:6; fórmula sacrificial recurrente
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en el verbo de aplicación de la sangre: de «throw/dash» a «sprinkle», buscando una equivalencia más precisa y natural. La versión española sigue esa revisión con «rociará», evitando tanto una literalidad brusca como una suavización que pierda la acción ritual. También se conserva el nombre divino como «Yahvé», coherente con la política del proyecto y con el texto hebreo directo.'
  spanish_consistency_notes:
  - Se mantiene «tienda de reunión» para אֹהֶל מוֹעֵד, conforme al uso establecido del proyecto.
  - Se usa «sacerdote» para כֹּהֵן por claridad y porque no hay aquí tensión léxica que obligue a «sacerdote» frente a una alternativa más técnica.
  - «Grasa» se elige por legibilidad; el contexto sacrificial aclara que no se trata de grasa común sino de la porción ritual.
  - 'La puntuación y el orden siguen el paralelismo hebreo: acción sobre la sangre, ubicación, luego quema de la porción grasa.'
