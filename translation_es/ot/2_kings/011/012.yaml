translation:
  language: es
  text: 'Entonces sacó al hijo del rey y puso sobre él la corona y le entregó el testimonio[a]; y lo hicieron rey y lo ungieron; y batieron las palmas y dijeron: «¡Viva el rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el documento del pacto» o «el decreto». El hebreo dice «el testimonio», probablemente refiriéndose a un testimonio escrito asociado con el gobierno del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - lo sacó
  - hizo salir
  lexicon: HALOT
  rationale: 'El Hifil de יצא expresa acción causativa: sacar o hacer salir. En español, «sacó» comunica de manera natural esa causación sin añadir matices no presentes en el hebreo.'
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: el hijo del rey
  alternatives_spanish:
  - el hijo del rey
  - el príncipe
  lexicon: HALOT
  rationale: La construcción posesiva se vierte con naturalidad como «el hijo del rey». Se evita «príncipe» porque introduce un término dinástico más interpretativo que el hebreo explícito.
- source_word: הַנֵּזֶר
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - el diadema
  - el ornamento real
  lexicon: HALOT
  rationale: En contexto real, נזר designa el emblema de realeza. «Corona» es la equivalencia más clara y comprensible en español, conservando el valor ceremonial del objeto.
- source_word: הָעֵדוּת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el documento del pacto
  - el decreto
  - el testimonio escrito
  lexicon: HALOT
  rationale: Se mantiene la forma más cercana al hebreo, sin especificar de más. Como en el audit trail inglés, el término puede aludir a un testimonio escrito ligado al pacto o a las estipulaciones reales, pero el texto hebreo solo dice «el testimonio».
- source_word: וַיַּמְלִכוּ אֹתוֹ
  english_pob_choice: they made him king
  chosen_spanish: lo proclamaron rey
  alternatives_spanish:
  - lo hicieron rey
  - lo entronizaron
  lexicon: HALOT
  rationale: El Hifil de מלך puede significar hacer rey o hacer reinar. En español, «lo proclamaron rey» transmite bien el acto público de instalación y armoniza con la coronación ya mencionada, sin redundancia excesiva.
- source_word: וַיִּמְשָׁחֻהוּ
  english_pob_choice: anointed him
  chosen_spanish: lo ungieron
  alternatives_spanish:
  - lo consagraron con aceite
  - lo ungieron con aceite
  lexicon: HALOT
  rationale: «Ungieron» es el equivalente directo y tradicional para משח en contextos de investidura real. Se conserva la sobriedad ritual del verbo hebreo.
- source_word: וַיַּכּוּ כָף
  english_pob_choice: they clapped their hands
  chosen_spanish: golpearon las palmas
  alternatives_spanish:
  - aplaudieron
  - dieron palmadas
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente implica golpear la palma o la mano. «Golpearon las palmas» conserva mejor la imagen verbal que «aplaudieron», aunque esta última sería una equivalencia funcional posible.
- source_word: יְחִי הַמֶּלֶךְ
  english_pob_choice: Long live the king!
  chosen_spanish: ¡Viva el rey!
  alternatives_spanish:
  - ¡Larga vida al rey!
  - ¡Que viva el rey!
  lexicon: HALOT
  rationale: La fórmula jussiva de aclamación se traduce con la exclamación natural en español «¡Viva el rey!», que preserva la fuerza de felicitación pública y la brevedad ritual del hebreo.
theological_decisions:
- issue: Sentido de הָעֵדוּת en la escena de entronización
  english_pob_reading: Rendered as 'the testimony' in the main text, with a note allowing 'the covenant document' or 'the decree'.
  chosen_spanish_reading: «el testimonio» en el texto principal, con nota de alternativas como «el documento del pacto» o «el decreto».
  alternative_spanish_readings:
  - el documento del pacto
  - el decreto
  - el testimonio escrito
  rationale: La escena sugiere un objeto o texto asociado con la autoridad real y pactal, pero el hebreo no especifica más allá de עֵדוּת. Mantener «el testimonio» preserva la tensión lexical y evita imponer una interpretación institucional demasiado concreta.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se introdujeron cambios respecto al sentido auditado de la fuente; se mantuvieron las decisiones léxicas principales y la tensión interpretativa de הָעֵדוּת.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto fuente.
  - Se evitó «Cristo» y otras formas eclesiásticas no presentes en el hebreo.
  - 'Se preservó la secuencia narrativa del hebreo: sacar, poner, dar, proclamar, ungir, aclamar.'
