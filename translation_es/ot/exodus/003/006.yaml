translation:
  language: es
  text: 'Entonces dijo: «Yo soy el Dios de tu padre, el Dios de Abraham, el Dios de Isaac y el Dios de Jacob». Y Moisés ocultó su rostro, porque tenía miedo de mirar a Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativamente consecutiva de waw en español se expresa con naturalidad como «Entonces», que mantiene el avance de la escena sin sonar tan mecánico como «Y dijo».
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y en una cláusula de identificación se traduce con cópula implícita o explícita; «Yo soy» conserva bien la autoidentificación solemne.
- source_word: אֱלֹהֵי אָבִיךָ
  english_pob_choice: the God of your father
  chosen_spanish: el Dios de tu padre
  alternatives_spanish:
  - el Dios de vuestro padre
  - el Dios de tu padre(s)
  lexicon: HALOT
  rationale: La construcción posesiva singular se conserva de forma directa. En español «tu padre» transmite mejor la referencia inmediata del texto que una paráfrasis como «el Dios de tu familia».
- source_word: אֱלֹהֵי אַבְרָהָם אֱלֹהֵי יִצְחָק וֵאלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Abraham, the God of Isaac, and the God of Jacob
  chosen_spanish: el Dios de Abraham, el Dios de Isaac y el Dios de Jacob
  alternatives_spanish:
  - Dios de Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Se conserva la repetición explícita de «el Dios de», porque en hebreo tiene peso retórico y pactal; comprimirla debilitaría esa insistencia.
- source_word: וַיַּסְתֵּר
  english_pob_choice: hid
  chosen_spanish: ocultó
  alternatives_spanish:
  - escondió
  - cubrió
  lexicon: HALOT
  rationale: En contexto teofánico, «ocultó su rostro» suena natural y fiel. «Escondió» también es posible, pero «ocultó» es más digno y preciso en registro bíblico español.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su faz
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «su rostro/cara», en español bíblico y literario «rostro» conserva mejor el tono reverente y evita una expresión demasiado coloquial.
- source_word: כִּי יָרֵא
  english_pob_choice: because he was afraid
  chosen_spanish: porque temió
  alternatives_spanish:
  - porque tuvo miedo
  - pues temía
  lexicon: HALOT
  rationale: El verbo en contexto expresa temor ante la presencia divina. «Temió» preserva la sobriedad del original y evita cargar de psicologismo una frase breve.
- source_word: מֵהַבִּיט
  english_pob_choice: to look
  chosen_spanish: mirar
  alternatives_spanish:
  - ver
  - contemplar
  lexicon: HALOT
  rationale: La infinitiva con מִן/מֵ expresa la acción que él temía realizar; en español, «mirar» es la forma más natural y directa para esta construcción.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: at God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: HALOT
  rationale: La preposición marca el objeto de la mirada. En español, «mirar a Dios» reproduce con naturalidad la relación espacial del hebreo sin necesidad de una expansión interpretativa.
theological_decisions:
- issue: Identificación divina en la teofanía
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el ser divino
  - la divinidad
  rationale: El contexto habla del Dios de los patriarcas que se revela a Moisés; «Dios» mantiene la identificación personal y pactal sin rebajarla a un término genérico.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Repetición del título patriarcal
  english_pob_reading: the God of Abraham, the God of Isaac, and the God of Jacob
  chosen_spanish_reading: el Dios de Abraham, el Dios de Isaac y el Dios de Jacob
  alternative_spanish_readings:
  - el Dios de Abraham, Isaac y Jacob
  rationale: Se preserva la repetición porque el hebreo la usa deliberadamente. En español esta repetición sostiene la continuidad del pacto y la autoidentificación de Yahvé.
  doctrine_reference: 'Translation philosophy #1; #5'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés, sin cambios textuales recientes reportados; la coincidencia de revisión fue alta y no hubo objeciones. Se mantiene el nombre divino como «Dios» en esta autoidentificación narrativa porque el versículo hebreo usa אֱלֹהִים dentro de la fórmula patriarcal, y el contexto inmediato ya identifica al hablante como el Dios de Abraham, Isaac y Jacob.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, coherente con el contexto inmediato y con la convención del proyecto para este lexema.
  - Se usa «rostro» en vez de «cara» por registro reverente y consistencia bíblica.
  - Se conserva la repetición de «el Dios de» para no suavizar la fórmula pactal del hebreo.
  - «Temió mirar» evita una paráfrasis excesiva y respeta la relación causal del texto.
