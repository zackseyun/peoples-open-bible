    text: Or 'those who read this book.' The Greek expression literally speaks of those 'encountering' this book.
    reason: lexical_alternative
  - marker: b
    text: Or 'not to lose heart.'
    reason: lexical_alternative
  - marker: c
    text: '''Discipline'' can also be rendered ''instruction'' or ''correction''; the Greek includes the sense of formative chastening.'
    reason: lexical_alternative
