    rationale: El inglés POB preserva explícitamente el valor técnico de 'fathers’ houses'; omitirla pierde una parte documentada de la rationale léxica y puede llevar a una lectura demasiado moderna o nuclear de 'casas'.
  - severity: medium
    issue: «Hombres valientes» debilita la fuerza establecida de גִּבּוֹרֵי חַיִל.
    rationale: Aunque no es incorrecto, la auditoría inglesa prefirió conservar el peso del hebreo con 'mighty men of valor'. En español, «hombres de valor» mantiene mejor la formulación tradicional y el rango semántico sin estrecharlo a lo militar.
