translation:
  language: es
  text: Y los jueces investigarán con diligencia; y he aquí, si el testigo es un testigo falso y ha testificado falsamente contra su hermano[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra su prójimo» o «contra su compatriota»; el hebreo «su hermano» puede funcionar en la ley de Israel para un miembro del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָרְשׁוּ
  english_pob_choice: shall investigate
  chosen_spanish: investigarán
  alternatives_spanish:
  - indagarán
  - examinarán
  lexicon: HALOT
  rationale: En contexto judicial, דרש expresa indagar/investigar a fondo el caso. "Investigarán" mantiene el valor forense del verbo con una forma natural en español legal y bíblico.
- source_word: הַשֹּׁפְטִים
  english_pob_choice: the judges
  chosen_spanish: los jueces
  alternatives_spanish:
  - los magistrados
  lexicon: HALOT
  rationale: El término se refiere a las autoridades judiciales que resuelven el caso; "jueces" es la correspondencia directa y más clara en español.
- source_word: הֵיטֵב
  english_pob_choice: thoroughly
  chosen_spanish: con diligencia
  alternatives_spanish:
  - a fondo
  - cuidadosamente
  lexicon: HALOT
  rationale: El adverbio intensifica la acción de investigar. "Con diligencia" comunica bien la idea de esmero y seriedad requerida en español jurídico, sin perder la fuerza del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and if / and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y si resulta que
  - y miren
  lexicon: HALOT
  rationale: La partícula introduce el hallazgo del proceso. "Y he aquí" preserva el matiz deíctico del hebreo que la revisión inglesa reintrodujo con "behold".
- source_word: עֵד שֶׁקֶר
  english_pob_choice: a false witness
  chosen_spanish: un testigo falso
  alternatives_spanish:
  - un testigo mentiroso
  - un testigo de falsedad
  lexicon: HALOT
  rationale: La construcción nominal denota un testigo caracterizado por la falsedad. "Testigo falso" es el equivalente bíblico-jurídico natural en español.
- source_word: הָעֵד שֶׁקֶר
  english_pob_choice: the witness is a false witness
  chosen_spanish: el testigo es un testigo falso
  alternatives_spanish:
  - el testigo es falso
  - ese testigo es un testigo falso
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo para énfasis. En español se conserva esa repetición para no suavizar el peso de la constatación judicial.
- source_word: עָנָה
  english_pob_choice: has testified falsely
  chosen_spanish: ha testificado falsamente
  alternatives_spanish:
  - ha dado falso testimonio
  - ha respondido falsamente
  lexicon: HALOT
  rationale: En contexto legal, ענה puede significar testificar. "Ha testificado falsamente" mantiene el sentido forense y la relación con la falsedad ya indicada por שקר.
- source_word: בְאָחִיו
  english_pob_choice: against his brother
  chosen_spanish: contra su hermano
  alternatives_spanish:
  - contra su prójimo
  - contra su compatriota
  lexicon: HALOT
  rationale: אָח es literalmente "hermano" y en la ley de Israel puede extenderse al miembro del mismo pueblo del pacto. Se conserva el término literal en el texto principal por fidelidad formal y se explica su alcance comunitario en nota.
theological_decisions:
- issue: Alcance de אָח en legislación del pacto
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su prójimo
  - su compatriota
  rationale: La lectura principal mantiene el parentesco literal del hebreo sin neutralizarlo. En el marco de la ley deuteronómica, el término puede abarcar a un correligionario o miembro del pacto; esa amplitud queda preservada en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al mantener la partícula deíctica equivalente a «behold»/«he aquí», evitando omitirla en la cláusula condicional. También se conservó la repetición enfática de «testigo falso» y el cierre relacional «contra su hermano».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo «testigo falso» como término jurídico bíblico, evitando paráfrasis como «mentiroso» en el cuerpo principal.
  - La puntuación refleja una sola oración con el giro deíctico «y he aquí», acorde con el hebreo y la revisión inglesa.
  - La nota al pie marca la alternativa semántica de אָח sin borrar el término literal del texto principal.
