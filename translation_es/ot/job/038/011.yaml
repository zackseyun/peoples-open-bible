translation:
  language: es
  text: 'y dije[a]: «Hasta aquí puedes venir, y no más allá; aquí se detendrán[b] tus orgullosas olas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y cuando dije». El hebreo usa una forma narrativa que puede entenderse como secuencia discursiva o como presentación del momento en que se pronunció el límite.
    reason: alternative_reading
  - marker: b
    text: Lit., «aquí se pondrán / serán puestas tus orgullosas olas». El verbo hebreo significa literalmente «poner, colocar»; aquí se traduce según el sentido contextual de ser frenadas al llegar al límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: and I said
  chosen_spanish: y dije
  alternatives_spanish:
  - y yo dije
  - y decía
  lexicon: HALOT
  rationale: La forma wayyiqtol marca secuencia narrativa; «y dije» conserva el avance discursivo natural en español y refleja bien el cambio de turno en el discurso divino.
- source_word: עַד פֹּה
  english_pob_choice: this far
  chosen_spanish: Hasta aquí
  alternatives_spanish:
  - aquí hasta este punto
  - hasta este punto
  lexicon: HALOT
  rationale: La combinación de límite espacial se expresa con naturalidad y precisión en español con «Hasta aquí», sin perder la idea de frontera impuesta.
- source_word: תָבוֹא
  english_pob_choice: you may come
  chosen_spanish: podrás llegar
  alternatives_spanish:
  - vendrás
  - podrás venir
  lexicon: HALOT
  rationale: En el contexto de un límite fijado al mar, «podrás llegar» comunica la extensión permitida. Mantiene la segunda persona singular y la restricción de alcance mejor que un futuro simple neutral.
- source_word: וְלֹא תֹסִיף
  english_pob_choice: and no farther
  chosen_spanish: y no más allá
  alternatives_spanish:
  - y no continuarás
  - y no añadirás más
  lexicon: HALOT
  rationale: El hebreo literalmente expresa 'no añadir/continuar'. La frase idiomática española «y no más allá» reproduce el sentido de límite con claridad y sin sobrecargar el verso.
- source_word: וּפֹא
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - y aquí
  - acá
  lexicon: HALOT
  rationale: El adverbio deíctico repetido se vierte con «aquí» para conservar la localización exacta del punto de detención.
- source_word: יָשִׁית
  english_pob_choice: shall stop
  chosen_spanish: se detendrán
  alternatives_spanish:
  - serán detenidas
  - quedarán detenidas
  - se pondrán
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente significa 'poner/colocar', el contexto exige la idea de ser frenadas o cesar. «Se detendrán» sigue la revisión inglesa que prioriza naturalidad y sentido contextual, y evita introducir un sujeto no explícito.
- source_word: בִּגְאוֹן
  english_pob_choice: proud
  chosen_spanish: orgullosas
  alternatives_spanish:
  - altivas
  - presuntuosas
  - erguidas
  lexicon: HALOT
  rationale: גאון puede abarcar orgullo, exaltación o majestad. En relación con las olas que se alzan con fuerza, «orgullosas» conserva la personificación y el matiz de arrogancia o elevación desbordada.
- source_word: גַּלֶּיךָ
  english_pob_choice: your waves
  chosen_spanish: tus olas
  alternatives_spanish:
  - tus ondas
  - tus marejadas
  - tus olas rompientes
  lexicon: HALOT
  rationale: «Olas» es la equivalencia más clara y natural en español para גלים. «Tus» mantiene la segunda persona singular y la personificación del mar.
theological_decisions:
- issue: Personificación del mar bajo la autoridad divina
  english_pob_reading: Retain second-person address to the sea and boundary-setting language without mythologizing beyond the text.
  chosen_spanish_reading: Mantener la segunda persona dirigida al mar y el lenguaje de límite impuesto, sin convertir la personificación poética en una entidad divina independiente.
  alternative_spanish_readings:
  - despersonalizar el mar por completo como fuerza impersonal
  - ampliar la imagen hasta sugerir un poder rival
  rationale: El hebreo habla directamente al mar como 'tú'. La traducción debe conservar esa personificación poética porque refuerza la soberanía de Dios sobre la creación, sin añadir mitología ajena al texto.
  doctrine_reference: Job 38:8-11; soberanía creadora de Dios
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés en su revisión más reciente: se prefirió una solución idiomática para el verbo final, pasando de una posibilidad más literal (''serán puestas'') a una formulación contextual (''se detendrán''), porque el verso describe el punto exacto en que las olas dejan de avanzar. También se mantuvo la personificación de las olas y el marcador de límite espacial con equivalentes naturales en español.'
  spanish_consistency_notes:
  - Se usa 'Dios' para el referente divino implícito en el discurso, coherente con el criterio general del proyecto.
  - Se conserva la segunda persona singular para mantener la personificación del mar, como en el hebreo.
  - Se traduce גאון con un adjetivo de carga evaluativa ('orgullosas') para reflejar el matiz de exaltación/altivez del mar.
  - No se introduce 'SEÑOR' ni sustituciones litúrgicas, ya que el versículo no contiene יהוה en la superficie hebrea.
