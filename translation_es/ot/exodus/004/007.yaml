translation:
  language: es
  text: 'Y dijo[a]: «Vuelve a meter tu mano en tu seno». Él volvió a meter su mano en su seno, y al sacarla de su seno, he aquí[b], había vuelto como su carne.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el pliegue de tu vestidura junto al pecho».
    reason: cultural_note
  - marker: b
    text: Es decir, su mano había sido restaurada a carne normal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשֵׁב
  english_pob_choice: Put ... back
  chosen_spanish: Vuelve a poner
  alternatives_spanish:
  - Pon ... de nuevo
  - Devuelve
  lexicon: HALOT
  rationale: El imperativo causativo de שוב pide que la mano regrese al lugar anterior. «Vuelve a poner» conserva ese valor restitutivo y suena natural en español actual, mejor que un «devuelve» más abstracto o un «pon ... de nuevo» menos idiomático en este contexto.
- source_word: חֵיק
  english_pob_choice: bosom
  chosen_spanish: seno
  alternatives_spanish:
  - pecho
  - pliegue del manto
  - regazo
  lexicon: HALOT
  rationale: El término designa el hueco del pecho o el pliegue de la vestidura donde se puede introducir algo. «Seno» es una equivalencia sobria y bíblicamente reconocible en español; «pecho» puede sonar demasiado anatómico y «pliegue del manto» explicita demasiado.
- source_word: וַיָּשֶׁב
  english_pob_choice: he put ... back
  chosen_spanish: volvió a poner
  alternatives_spanish:
  - puso otra vez
  - devolvió
  lexicon: HALOT
  rationale: El wayyiqtol de שוב repite la acción del imperativo anterior. «Volvió a poner» mantiene la repetición narrativa y el sentido de restauración sin forzar un calco.
- source_word: וַיּוֹצִאָהּ
  english_pob_choice: he brought it out
  chosen_spanish: al sacarla
  alternatives_spanish:
  - al traerla fuera
  - al extraerla
  lexicon: HALOT
  rationale: El verbo en hifil expresa sacar/traer fuera. «Al sacarla» es la forma más natural en español y conserva el movimiento hacia afuera con claridad.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La partícula introduce un resultado sorprendente. «He aquí» preserva la fuerza de atención del original y el tono narrativo solemne que POB mantiene con «behold».
- source_word: שָׁבָה
  english_pob_choice: it had returned
  chosen_spanish: había vuelto
  alternatives_spanish:
  - volvió
  - había sido restaurada
  lexicon: HALOT
  rationale: El verbo femenino singular retoma «la mano». «Había vuelto» expresa el retorno al estado previo sin añadir una explicación interpretativa; «había sido restaurada» sería más explícito de lo que dice el hebreo.
- source_word: כִּבְשָׂרֽוֹ
  english_pob_choice: like his flesh
  chosen_spanish: como su carne
  alternatives_spanish:
  - como la carne de su cuerpo
  - como su propia carne
  lexicon: HALOT
  rationale: La comparación con בשר se rinde mejor por «carne», término que corresponde al campo semántico hebreo y mantiene la tensión lexical. «Como su propia carne» aclara, pero añade énfasis no requerido por el texto.
theological_decisions:
- issue: El grado de explicitación del resultado milagroso
  english_pob_reading: That is, his hand was restored to normal flesh.
  chosen_spanish_reading: 'La frase principal deja el resultado implícito: la mano había vuelto como su carne.'
  alternative_spanish_readings:
  - es decir, su mano fue restaurada a carne normal
  - esto es, su mano quedó sana
  rationale: El hebreo solo dice que volvió como su carne; el sentido de restauración normal está claro por el contexto, pero no conviene incorporarlo al texto principal como glosa. Se deja para una nota, preservando la tensión entre descripción y explicación.
  doctrine_reference: Ex 4:6-7; principio de traducción transparente y no-expansiva
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantuvo el lenguaje de "bosom" y dejó la explicación de la normalidad en nota, sin cambios en la última revisión. El español sigue esa decisión: conserva una equivalencia sobria en el cuerpo del texto y reserva la aclaración interpretativa para la nota.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto para el nombre divino, pero este versículo no contiene el Tetragrámaton.
  - Se usa «seno» para חֵיק con una nota alternativa porque el español bíblico admite tanto «seno» como la perífrasis del pliegue de la vestidura.
  - «Carne» se conserva para בשר para respetar la correspondencia lexical y la comparación concreta del hebreo.
  - La puntuación sigue el español moderno con comillas angulares para el discurso directo.
