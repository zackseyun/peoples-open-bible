translation:
  language: es
  text: Moisés escuchó la voz de su suegro[a] e hizo todo lo que dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «atendió a la voz de su suegro» u «obedeció la voz de su suegro». El hebreo שׁמע con לְקוֹל puede incluir la idea de obedecer, y la cláusula siguiente la hace explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - atendió
  - obedeció
  lexicon: HALOT
  rationale: שׁמע con לְקוֹל puede expresar tanto oír como escuchar/atender. En español, «escuchó» conserva el valor de recepción atenta y deja que la segunda cláusula explicite la obediencia resultante, como hace la POB en inglés.
- source_word: לְקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - al consejo de
  - a la voz de
  lexicon: HALOT
  rationale: קוֹל significa literalmente «voz»; mantener «la voz de» conserva el giro hebreo sin forzar una paráfrasis por «consejo», que sería más interpretativa. La preposición natural en español es «de».
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su pariente por matrimonio
  lexicon: HALOT
  rationale: El referente contextual es Jetró, y «suegro» es la equivalencia clara y estándar en español para el parentesco indicado por el hebreo.
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  lexicon: HALOT
  rationale: עָשָׂה es el verbo ordinario «hacer». «Hizo» es la forma más directa y natural en español y reproduce bien la simplicidad del hebreo.
- source_word: כֹּל אֲשֶׁר אָמָר
  english_pob_choice: all that he said
  chosen_spanish: todo lo que él le dijo
  alternatives_spanish:
  - todo lo que dijo
  - todo cuanto le había dicho
  lexicon: HALOT
  rationale: 'El contexto inmediato muestra que el suegro habla a Moisés, por lo que en español conviene explicitar el objeto implícito: «le dijo». Esto evita ambigüedad y refleja el sentido discursivo del hebreo sin añadir contenido nuevo.'
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con la lectura hebrea base y con la POB en inglés: se mantiene la estructura de dos miembros, conservando el giro idiomático de «escuchar la voz» y dejando la obediencia explícita en la segunda cláusula. No se requiere corrección textual ni ajuste doctrinal.'
  spanish_consistency_notes:
  - Se usa «su suegro» para חֹתְנוֹ, siguiendo el referente contextual y la terminología española estándar.
  - Se conserva la repetición de acción/obediencia entre las dos cláusulas para reflejar el paralelismo del hebreo.
  - La nota al pie marca la alternativa interpretativa sin sustituir el texto principal.
