translation:
  language: es
  text: Jehoram hijo de Acab llegó a ser rey sobre Israel en Samaria en el año dieciocho de Josafat rey de Judá[a], y reinó doce años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y Jehoram hijo de Acab llegó a ser rey sobre Israel…». La conjunción hebrea puede traducirse simplemente como «y».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוֹרָם
  english_pob_choice: Now Jehoram
  chosen_spanish: Entonces Joram
  alternatives_spanish:
  - Y Joram
  - Ahora Joram
  lexicon: HALOT
  rationale: El prefijo conjuntivo ו- aquí funciona como continuidad narrativa. En español, 'Entonces' expresa esa continuidad de manera natural sin perder el enlace con el contexto previo. Se conserva el nombre propio en forma transliterada usual 'Joram', coherente con la práctica española y con el inglés POB.
- source_word: בֶּן אַחְאָב
  english_pob_choice: son of Ahab
  chosen_spanish: hijo de Acab
  alternatives_spanish:
  - el hijo de Acab
  lexicon: HALOT
  rationale: La relación filial es directa y no requiere artículo en español para ser clara y natural. 'Acab' reproduce el nombre bíblico usual en español.
- source_word: מָלַךְ עַל יִשְׂרָאֵל
  english_pob_choice: became king over Israel
  chosen_spanish: comenzó a reinar sobre Israel
  alternatives_spanish:
  - llegó a ser rey sobre Israel
  - fue hecho rey sobre Israel
  lexicon: HALOT
  rationale: El verbo perfecto aquí marca la entronización, no solo la duración del gobierno. 'Comenzó a reinar' preserva esa transición sin obligar al español a repetir 'rey' de forma pesada. 'Sobre Israel' conserva el valor idiomático del hebreo.
- source_word: בְּ/שֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la Samaria
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición locativa se rinde de forma directa con 'en'. 'Samaria' identifica la capital desde la cual reinaba.
- source_word: בִּ/שְׁנַת שְׁמֹנֶה עֶשְׂרֵה
  english_pob_choice: in the eighteenth year
  chosen_spanish: en el año dieciocho
  alternatives_spanish:
  - en el decimoctavo año
  lexicon: HALOT
  rationale: La fórmula regnal es más natural en español con 'año dieciocho'. Se evita una construcción más rígida sin cambiar el sentido del sincronismo.
- source_word: לִ/יהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: of Jehoshaphat king of Judah
  chosen_spanish: de Josafat rey de Judá
  alternatives_spanish:
  - de Josafat, rey de Judá
  - para Josafat rey de Judá
  lexicon: HALOT
  rationale: En los sincronismos regios, la preposición ל- indica el año de gobierno de Josafat; en español, 'de' expresa esta relación cronológica de manera idiomática. Se mantiene 'rey de Judá' como aposición descriptiva.
- source_word: וַ/יִּמְלֹ֖ךְ שְׁתֵּים עֶשְׂרֵ֥ה שָׁנָה
  english_pob_choice: and he reigned twelve years
  chosen_spanish: y reinó doce años
  alternatives_spanish:
  - y gobernó doce años
  - y estuvo reinando doce años
  lexicon: HALOT
  rationale: Aquí el verbo resume la duración del reinado. 'Reinó doce años' es la correspondencia más clara y sobria en español, sin duplicar la idea de acceso al trono ya expresada antes.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el trazado auditado en inglés POB. Se preserva la distinción entre la entronización ('comenzó a reinar') y la duración del reinado ('reinó doce años'), y se adopta una conjunción inicial natural en español que refleja el valor discursivo de ו- sin borrar la alternativa más formal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - 'Se mantiene la transliteración española habitual de nombres propios bíblicos: Joram, Acab, Josafat, Judá, Samaria.'
  - Se conserva la diferencia semántica entre acceso al trono y duración del reinado, evitando colapsarlas en una sola fórmula.
