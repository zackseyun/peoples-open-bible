review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro del POB: preserva Yahvé por יְהוָה, el avance narrativo con «Entonces», el imperativo «Entra», «el arca», la causalidad de כִּי y la evaluación divina de Noé como צַדִּיק «delante de mí en esta generación». Sin embargo, «toda tu casa» en el texto principal suena más fácilmente al edificio en español actual que al grupo doméstico, mientras que el inglés auditado justificó explícitamente «household» por ese valor social. Conviene explicitar «toda tu familia» para preservar mejor el sentido en español natural.'
  spanish_quality_summary: El español es claro, digno y generalmente natural. La única fricción importante de legibilidad es «toda tu casa», que en contexto bíblico puede entenderse, pero en español contemporáneo neutral es menos preciso que «toda tu familia» o «todos los de tu casa». Además, la nota [a] sobre «justo» no es necesaria aquí porque no resuelve una ambigüedad nueva ni preserva una alternativa textual importante.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; צַדִּיק → «justo» es aceptable en este contexto; no hay conflictos con otros términos doctrinales del glosario. La excepción propuesta es ajustar בֵּיתְךָ para reflejar mejor la decisión auditada «your household» en español idiomático.'
  issues:
  - severity: medium
    issue: «toda tu casa» subrepresenta el sentido de בֵּיתְךָ en español actual
    rationale: Aunque léxicamente posible, en español neutral contemporáneo puede oírse como referencia al inmueble. El POB inglés documentó que el sentido aquí es la unidad doméstica/los miembros del hogar; «toda tu familia» comunica mejor ese referente.
  - severity: low
    issue: La nota [a] sobre «justo» es prescindible
    rationale: No hay ambigüedad textual significativa que exija nota, y «justo» funciona bien en el cuerpo del texto. Mantener la nota añade carga sin necesidad.
  revised_spanish_text: 'Entonces Yahvé dijo a Noé: «Entra en el arca, tú y toda tu familia, porque te he visto justo delante de mí en esta generación».'
  revision_rationale: Se ajusta «toda tu casa» a «toda tu familia» para reflejar con más claridad en español el valor de בֵּיתְךָ como unidad doméstica, en línea con la decisión auditada «household». Se elimina la nota sobre «justo» por no ser necesaria para fidelidad ni claridad.
