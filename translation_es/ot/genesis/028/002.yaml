translation:
  language: es
  text: Levántate[a], ve a Padán-aram, a la casa de Betuel, el padre de tu madre; y toma para ti de allí una esposa de entre las hijas de Labán, hermano de tu madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «tu abuelo materno» y «tu tío materno». El texto principal conserva más explícitamente las expresiones hebreas de parentesco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levanta
  - Ponte en pie
  lexicon: HALOT
  rationale: El imperativo de קום pide una acción de ponerse en pie o levantarse. «Levántate» conserva el tono imperativo directo y resulta natural en español bíblico contemporáneo.
- source_word: לֵךְ֙
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  lexicon: HALOT
  rationale: הלך en imperativo es el mandato simple de ir. «Ve» mantiene brevedad y paralelismo con el verbo anterior.
- source_word: פַּדֶּנָֽה אֲרָ֔ם
  english_pob_choice: to Paddan-aram
  chosen_spanish: a Padán-aram
  alternatives_spanish:
  - a Padan-aram
  - a Padán Aram
  lexicon: HALOT
  rationale: Se translitera el nombre propio del lugar. La preposición direccional se expresa con «a», y el guion ayuda a reconocer la forma convencional del topónimo compuesto.
- source_word: בֵּ֥יתָ/ה בְתוּאֵ֖ל
  english_pob_choice: to the house of Bethuel
  chosen_spanish: a la casa de Betuel
  alternatives_spanish:
  - a la casa de Bethuel
  - a la casa de Betuel
  lexicon: HALOT
  rationale: בית en esta construcción señala destino hacia la casa o el hogar. «A la casa de Betuel» preserva la estructura hebrea y evita una paráfrasis más interpretativa.
- source_word: אֲבִ֣י אִמֶּ֑/ךָ
  english_pob_choice: your mother's father
  chosen_spanish: el padre de tu madre
  alternatives_spanish:
  - tu abuelo materno
  - el padre de tu madre
  lexicon: HALOT
  rationale: La expresión literal hebrea es «el padre de tu madre». Se conserva esa formulación para mantener explícita la relación de parentesco, en lugar de sustituirla por «abuelo materno».
- source_word: וְ/קַח לְ/ךָ֤
  english_pob_choice: and take for yourself
  chosen_spanish: y toma para ti
  alternatives_spanish:
  - y toma para ti mismo
  - y toma
  lexicon: HALOT
  rationale: לקח se traduce por «tomar», y el dativo לְךָ aporta interés personal. «Para ti» conserva ese matiz sin sobreexplicar.
- source_word: מִ/שָּׁם֙
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - allí
  lexicon: HALOT
  rationale: La preposición מִן exige expresar origen. «Desde allí» suena natural en español y retiene el valor de procedencia.
- source_word: אִשָּׁ֔ה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una mujer para esposa
  lexicon: HALOT
  rationale: En este contexto matrimonial, el sentido es el de una mujer para matrimonio. «Esposa» comunica adecuadamente la finalidad del mandato.
- source_word: מִ/בְּנ֥וֹת לָבָ֖ן
  english_pob_choice: from the daughters of Laban
  chosen_spanish: de las hijas de Labán
  alternatives_spanish:
  - entre las hijas de Labán
  - de entre las hijas de Labán
  lexicon: HALOT
  rationale: La frase partitiva se traduce de forma literal con «de las hijas de Labán», manteniendo la referencia genealógica del texto.
- source_word: אֲחִ֥י אִמֶּֽ/ךָ
  english_pob_choice: your mother's brother
  chosen_spanish: el hermano de tu madre
  alternatives_spanish:
  - tu tío materno
  - el hermano de tu madre
  lexicon: HALOT
  rationale: Se conserva la relación explícita «el hermano de tu madre», como en el hebreo y en la decisión auditada en inglés, en vez de reemplazarla por el término más resumido «tío materno».
theological_decisions:
- issue: Tratamiento de los parentescos explícitos frente a equivalentes más idiomáticos
  english_pob_reading: The main text keeps the Hebrew kinship expressions more explicitly.
  chosen_spanish_reading: Mantener «el padre de tu madre» y «el hermano de tu madre» en el cuerpo del texto.
  alternative_spanish_readings:
  - tu abuelo materno / tu tío materno
  - el padre de tu madre / tu tío
  rationale: El texto hebreo nombra los vínculos de parentesco de forma analítica. La traducción conserva esa explicitud para no perder la textura genealógica del mandato ni suavizar la forma semítica del enunciado.
  doctrine_reference: No aplica; decisión de fidelidad semántica y estilística.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; el presente borrador sigue de cerca la lectura auditada en inglés y conserva las decisiones léxicas principales sin introducir paraphraseo adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se mantiene la transliteración de los topónimos y nombres propios según la forma habitual en español bíblico.
  - «Esposa» se eligió por contexto matrimonial; no se usó «mujer» para evitar ambigüedad innecesaria.
  - Los parentescos se conservaron analíticos para respetar la decisión auditada del POB en inglés.
