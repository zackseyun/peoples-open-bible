translation:
  language: es
  text: Porque en muchos sueños y vanidades hay también muchas palabras[a][b]; pero teme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es elíptico; el segundo «כִּי» puede entenderse con matiz adversativo o inferencial. También es posible: «Porque en muchos sueños hay también vanidades y muchas palabras; pero teme a Dios».'
    reason: alternative_reading
  - marker: b
    text: «Vanidades» traduce el plural de hebel, el término recurrente de Eclesiastés para lo fugaz, insustancial o vacío.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El כִּי inicial introduce la base o explicación de la advertencia anterior; «Porque» conserva esa relación causal/de fundamentación de manera natural en español.
- source_word: בְרֹב
  english_pob_choice: in many
  chosen_spanish: en muchos
  alternatives_spanish:
  - en la abundancia de
  - cuando hay muchos
  lexicon: HALOT
  rationale: La combinación preposicional expresa abundancia o multiplicidad; «en muchos» reproduce con concisión la estructura elíptica del hebreo sin sobreexplicarla.
- source_word: חֲלֹמוֹת
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - sueños nocturnos
  lexicon: HALOT
  rationale: Es el equivalente directo y natural del plural de חֲלוֹם.
- source_word: הֲבָלִים
  english_pob_choice: vanities
  chosen_spanish: vanidades
  alternatives_spanish:
  - vaporidades
  - vaciedades
  - vacío
  lexicon: HALOT
  rationale: «Vanidades» preserva la terminología recurrente de Eclesiastés para hebel y mantiene la conexión literaria con el libro; no se reduce a una sola paráfrasis como «vacío».
- source_word: וּדְבָרִים הַרְבֵּה
  english_pob_choice: and many words
  chosen_spanish: hay también muchas palabras
  alternatives_spanish:
  - y muchas palabras
  - abundan las palabras
  - hay abundancia de palabras
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español conviene suplir el verbo para una frase publicable. «Hay también muchas palabras» mantiene la idea de abundancia discursiva y refleja la función sintáctica de la lista.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - más bien
  lexicon: HALOT
  rationale: El segundo כִּי tiene fuerza contrastiva o inferencial en el contexto; «pero» reproduce esa transición de la observación a la exhortación sin volverla mecánica.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - ante Dios
  lexicon: HALOT
  rationale: 'El marcador de objeto directo con el sustantivo definido se expresa en español con la preposición personal: «a Dios».'
- source_word: יְרָא
  english_pob_choice: fear
  chosen_spanish: teme
  alternatives_spanish:
  - reverencia
  - ten en temor reverente
  lexicon: HALOT
  rationale: El imperativo ירא en sabiduría conserva su fuerza teológica con «teme», que en español bíblico mantiene el peso de temor reverente y sumisión; «reverencia» sería más débil.
theological_decisions:
- issue: Valor teológico de ירא en contexto sapiencial
  english_pob_reading: fear God
  chosen_spanish_reading: teme a Dios
  alternative_spanish_readings:
  - reverencia a Dios
  - ten temor reverente de Dios
  rationale: 'La tradición sapiencial usa «temer a Dios» como término técnico para la actitud correcta ante Yahvé: reverencia, obediencia y reconocimiento de su autoridad. Traducirlo con «teme» preserva ese peso canonical y no lo diluye en mera deferencia.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Fuerza relacional del segundo כִּי
  english_pob_reading: but fear God
  chosen_spanish_reading: pero teme a Dios
  alternative_spanish_readings:
  - porque teme a Dios
  - así que teme a Dios
  rationale: 'El hebreo es elíptico y admite lectura adversativa o inferencial. «Pero» mantiene la tensión retórica: frente a la multitud de sueños, vanidades y palabras, la respuesta correcta es una exhortación directa.'
  doctrine_reference: Translation philosophy §2 (source-grounded elasticity)
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete hebreo y el cierre revisado del POB en inglés, que optó por completar la elipsis con una cláusula natural y por expresar el contraste con un conector adversativo. En español se mantuvo esa solución, adaptando el orden para fluidez y conservando el peso técnico de «vanidades» y «teme a Dios».
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se mantuvo «vanidades» para hebel a fin de preservar la red semántica de Eclesiastés.
  - Se prefirió «teme» para ירא por continuidad sapiencial y precisión teológica.
  - La puntuación con punto y coma refleja la transición entre observación y exhortación, equivalente al contraste del inglés auditado.
