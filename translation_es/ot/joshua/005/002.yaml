  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; בְּנֵי יִשְׂרָאֵל -> «los hijos de Israel» preserva la decisión de género; חַרְבוֹת צֻרִים -> «cuchillos de pedernal» es aceptable; la duplicación de repetición se conserva. La única desviación relevante es una nota espuria no sustentada por el expediente inglés ni por el hebreo.'
