base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/011.yaml
  text: He was wiser than every man—than Ethan the Ezrahite[a], and Heman, Kalkol, and Darda[c][b], the sons of Mahol—and his name was in all the surrounding nations.
  footnotes:
  - marker: a
    text: Or 'than all humankind.' Hebrew 'adam' can refer either to 'man' or to humanity more broadly; here the context of named male sages favors 'every man.'
    reason: lexical_alternative
  - marker: b
    text: '''Ezrahite'' may reflect an ethnic or family designation; some connect it with ''Zerahite.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'his fame was among all the surrounding nations.' Literally, 'his name was in all the surrounding nations.'
    reason: lexical_alternative
