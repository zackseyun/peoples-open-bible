id: LUK.8.10
reference: Luke 8:10
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὑμῖν δέδοται γνῶναι τὰ μυστήρια τῆς βασιλείας τοῦ θεοῦ, τοῖς δὲ λοιποῖς ἐν παραβολαῖς, ἵνα βλέποντες μὴ βλέπωσιν καὶ ἀκούοντες μὴ συνιῶσιν.
translation:
  text: And he said[a], “To you it has been given to know the mysteries of the kingdom of God, but to the rest in parables, so that seeing they may not see[c][b], and hearing they may not understand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secrets.' The Greek 'mysteries' refers to truths of God's kingdom hidden from some and disclosed to others.
    reason: lexical_alternative
  - marker: b
    text: The clause 'so that though seeing they may not see, and though hearing they may not understand' echoes Isaiah 6:9–10 and can be understood as expressing divine purpose, judicial result, or both.
    reason: cross_reference
  - marker: c
    text: Or 'but to the rest in parables'.
    reason: previous_rendering
lexical_decisions:
- source_word: δέδοται
  chosen: it has been given
  alternatives:
  - it is given
  - has been granted
  lexicon: BDAG
  rationale: Perfect passive indicative of δίδωμι; the English perfect preserves the sense of a granted state resulting from prior divine action. Passive leaves the implied giver unstated, matching the Greek.
- source_word: γνῶναι
  chosen: to know
  alternatives:
  - to understand
  - to come to know
  lexicon: BDAG
  rationale: Aorist infinitive of γινώσκω here expresses the granted ability/privilege of knowing. 'Know' is the most direct rendering; 'understand' would blur the distinction from συνιῶσιν later in the verse.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secrets
  lexicon: BDAG
  rationale: '''Mysteries'' preserves the established biblical sense of divine truths once hidden and now disclosed, without reducing the term to mere private information. ''Secrets'' is possible but thinner theologically.'
- source_word: βασιλείας τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering that can denote both realm and reign. 'Reign of God' highlights dynamic rule but is less idiomatic here; 'kingdom of God' best balances familiarity and semantic breadth.
- source_word: τοῖς δὲ λοιποῖς
  chosen: but to the rest
  alternatives:
  - but for the others
  - but to those outside
  lexicon: BDAG
  rationale: λοιπός means the remaining ones. 'The rest' is concise and natural. 'Those outside' would import wording from Mark's parallel rather than Luke's text.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - by parables
  - through parables
  lexicon: BDAG
  rationale: The preposition ἐν is naturally rendered 'in' here, indicating the mode/form in which teaching comes to the rest.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: BDAG
  rationale: Retains the purpose/result force of ἵνα without over-resolving whether the clause is strictly purposive or reflects judicial result in citation form.
- source_word: βλέποντες μὴ βλέπωσιν
  chosen: though seeing they may not see
  alternatives:
  - seeing they may not see
  - while seeing they may not perceive
  lexicon: BDAG
  rationale: This echoes Isa 6 language. 'Though seeing' communicates the concessive force often conveyed in English while preserving the repetition of βλέπω. 'Perceive' is interpretive and better reserved for a footnote alternative.
- source_word: ἀκούοντες μὴ συνιῶσιν
  chosen: though hearing they may not understand
  alternatives:
  - hearing they may not understand
  - though hearing they may not comprehend
  lexicon: BDAG
  rationale: συνίημι is stronger than mere hearing; 'understand' is the clearest modern equivalent. 'Comprehend' is possible but less natural.
