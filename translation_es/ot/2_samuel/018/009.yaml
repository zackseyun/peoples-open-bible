translation:
  language: es
  text: Absalón se encontró delante de los siervos de David, mientras Absalón iba montado sobre el mulo. El mulo pasó por debajo de las densas ramas de una gran terebinta[a], y su cabeza quedó atrapada en la terebinta, de modo que quedó colgando entre el cielo y la tierra, mientras el mulo que estaba debajo de él siguió adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'debajo de las densas ramas de un gran roble'. El hebreo אֵלָה puede traducirse de manera más general como un árbol grande, pero 'terebinta' es la opción léxica más precisa aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּרֵא
  english_pob_choice: happened to come
  chosen_spanish: vino a presentarse
  alternatives_spanish:
  - se encontró
  - llegó a estar frente a
  lexicon: HALOT
  rationale: El hebreo en esta forma verbal comunica la llegada/incidencia de Absalón ante ellos, no una reunión intencional. "Vino a presentarse" conserva la idea de aparición ante otros sin sugerir deliberación excesiva.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: En este contexto espacial y narrativo, "delante de" es natural en español y preserva la relación frontal del hebreo.
- source_word: עַבְדֵי דָוִד
  english_pob_choice: David’s servants
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los hombres de David
  lexicon: HALOT
  rationale: '"עבדים" puede ser "siervos" o "esclavos" según el contexto. Aquí la referencia a los acompañantes/retenedores del rey favorece "siervos"; "esclavos" sería demasiado fuerte para la función narrativa.'
- source_word: רֹכֵב עַל הַפֶּרֶד
  english_pob_choice: riding on the mule
  chosen_spanish: iba montado sobre el mulo
  alternatives_spanish:
  - cabalgaba sobre el mulo
  - iba cabalgando en el mulo
  lexicon: HALOT
  rationale: La construcción participial describe el estado de Absalón en el momento. "Iba montado" suena natural en español y mantiene el aspecto continuo sin añadir matices ajenos.
- source_word: הַפֶּרֶד
  english_pob_choice: the mule
  chosen_spanish: el mulo
  alternatives_spanish:
  - la mula
  - el mulo macho
  lexicon: HALOT
  rationale: פֶּרֶד designa un mulo. Se conserva el sustantivo común estándar en español.
- source_word: תַּחַת שׂוֹבֶךְ הָאֵלָה הַגְּדוֹלָה
  english_pob_choice: under the thick branches of a large terebinth
  chosen_spanish: debajo de las densas ramas de una gran terebinta
  alternatives_spanish:
  - debajo de las densas ramas de una gran encina
  - bajo la espesura de una gran terebinta
  lexicon: HALOT
  rationale: שׂוֹבֶךְ apunta a una masa enmarañada/densa de ramas; "las densas ramas" expresa esa idea sin forzar el español. אֵלָה se rinde más precisamente como "terebinta" que como "encina" u "oak"; por eso se mantiene esa elección lexical.
- source_word: וַיֶּחֱזַק רֹאשׁוֹ בָאֵלָה
  english_pob_choice: his head got caught in the terebinth
  chosen_spanish: su cabeza quedó trabada en la terebinta
  alternatives_spanish:
  - su cabeza quedó atrapada en la terebinta
  - su cabeza se trabó en la terebinta
  lexicon: HALOT
  rationale: La idea es de quedar sujetado/atorado de manera involuntaria. "Quedó trabada" reproduce bien la fuerza del hebreo y evita suavizarla demasiado.
- source_word: וַיֻּתַּן
  english_pob_choice: he was left hanging
  chosen_spanish: quedó suspendido
  alternatives_spanish:
  - fue dejado colgando
  - quedó colgado
  lexicon: HALOT
  rationale: El pasivo aquí describe el estado resultante. "Quedó suspendido" es idiomático y conserva la imagen de suspensión sin introducir una interpretación demasiado libre.
- source_word: בֵּין הַשָּׁמַיִם וּבֵין הָאָרֶץ
  english_pob_choice: between heaven and earth
  chosen_spanish: entre el cielo y la tierra
  alternatives_spanish:
  - entre los cielos y la tierra
  - entre el cielo y la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y solemne. "Cielo" funciona bien en español bíblico contemporáneo y mantiene el paralelismo con "tierra".
- source_word: עָבָר
  english_pob_choice: passed on
  chosen_spanish: pasaba de largo
  alternatives_spanish:
  - pasó
  - seguía adelante
  lexicon: HALOT
  rationale: El verbo indica el avance del mulo una vez que Absalón queda atrapado. "Pasaba de largo" comunica ese movimiento continuo y el contraste con la inmovilidad de Absalón.
translation_notes:
  revision_awareness: El texto español sigue de cerca el análisis léxico del paquete fuente y la lectura auditada en inglés, manteniendo la escena narrativa, el matiz incidental de וַיִּקָּרֵא y la elección precisa de אֵלָה como "terebinta". No se detectaron revisiones aplicadas en el pasaje inglés que obliguen a divergencias adicionales.
  spanish_consistency_notes:
  - Se mantiene "terebinta" como equivalente principal de אֵלָה para consistencia con la política POB ya auditada en inglés.
  - Se usa "siervos" para עַבְדֵי דָוִד por el contexto militar/cortesano, sin introducir "esclavos" donde el español sonaría excesivo.
  - Se preserva la imaginería de suspensión entre cielo y tierra con un español natural y digno.
