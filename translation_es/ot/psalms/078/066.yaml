- from: Él hirió a sus enemigos hacia atrás[a]; puso sobre ellos vergüenza perpetua.
  to: Él hirió a sus enemigos por la espalda[a]; puso sobre ellos oprobio perpetuo.
  rationale: Se revisa אָחוֹר a 'por la espalda' en el texto principal porque es una opción legítima del hebreo y produce una frase idiomática en español, mientras la lectura adverbial se conserva en nota. También se cambia 'vergüenza perpetua' por 'oprobio perpetuo' para reflejar mejor el matiz de reproche público y mantener un registro bíblico claro y digno.
