  rationale: Se corrigió la cláusula media para reflejar correctamente el verbo activo hebreo y para seguir la decisión auditada del POB de mantener la segunda persona en el texto principal, dejando la tercera persona en nota. Se eliminó la nota redundante [b]. También se suavizó la sintaxis para que el español sea natural y digno, manteniendo el paralelismo y la reversión del hebreo.
