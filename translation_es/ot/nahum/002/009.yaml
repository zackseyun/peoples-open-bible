translation:
  language: es
  text: Nínive ha sido como un estanque de agua desde sus primeros días[a], pero ellos huyen. «¡Deténganse! ¡Deténganse!»[b], pero nadie vuelve atrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «desde los días de ella». Es un giro idiomático que apunta a la antigüedad o larga existencia de Nínive.
    reason: lexical_alternative
  - marker: b
    text: O «¡Párense! ¡Párense!». Los imperativos hebreos pueden traducirse más literalmente así; «¡Deténganse! ¡Deténganse!» resalta mejor el sentido en una escena de huida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִינְוֵה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  alternatives_spanish:
  - Nineveh
  lexicon: nombre propio
  rationale: Es un nombre propio; en español bíblico estándar se adapta como «Nínive» para lectura natural y reconocible.
- source_word: כִּבְרֵכַת מַיִם
  english_pob_choice: like a pool of water
  chosen_spanish: como un estanque de agua
  alternatives_spanish:
  - como una piscina de agua
  - como un depósito de agua
  - como un estanque de aguas
  lexicon: HALOT
  rationale: La imagen es la de un cuerpo de agua retenida/quieta. «Estanque» preserva la comparación concreta sin introducir una idea técnica de obra hidráulica que el hebreo no exige.
- source_word: מִימֵי הִיא
  english_pob_choice: from her earliest days
  chosen_spanish: desde sus días
  alternatives_spanish:
  - desde sus primeros días
  - desde que existe
  - desde los días de su existencia
  lexicon: HALOT
  rationale: 'El hebreo es un giro idiomático muy breve: literalmente «desde días ella fue/era». En español, «desde sus días» mantiene la referencia temporal y la personificación femenina, sin forzar una explicación interpretativa en el texto principal.'
- source_word: וְהֵמָּה נָסִים
  english_pob_choice: yet they are fleeing
  chosen_spanish: y ellos huyen
  alternatives_spanish:
  - pero ellos huyen
  - y están huyendo
  - sin embargo, ellos huyen
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Huyen» es natural en español y conserva el cuadro de gente en fuga. Se usa «y» para reproducir la coordinación del hebreo, dejando la tensión del contraste al contexto inmediato.
- source_word: עִמְד֥וּ עֲמֹ֖דוּ
  english_pob_choice: Stop! Stop!
  chosen_spanish: ¡Deténganse! ¡Deténganse!
  alternatives_spanish:
  - ¡Alto! ¡Alto!
  - ¡Párense! ¡Párense!
  - ¡Permanezcan! ¡Permanezcan!
  lexicon: HALOT
  rationale: El hebreo repite el imperativo para urgencia. En una escena de huida, «Deténganse» comunica la orden de parar con fuerza y con un registro claro para lectura pública; «Párense» o «Alto» serían opciones posibles, pero menos precisas o menos naturales según contexto.
- source_word: וְאֵין מַפְנֶה
  english_pob_choice: but no one turns back
  chosen_spanish: pero nadie vuelve atrás
  alternatives_spanish:
  - pero no hay quien vuelva atrás
  - pero ninguno se vuelve
  - pero no vuelve nadie
  lexicon: HALOT
  rationale: La forma verbal apunta a girarse/volver en respuesta a la orden. «Vuelve atrás» expresa bien el sentido físico de retroceder o girar, y «nadie» reproduce la generalidad del hebreo con buena naturalidad en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la imagen de una masa de agua y resuelve el hebreo idiomático «מִימֵי הִיא» como una referencia temporal a los primeros días de Nínive. La versión española sigue esa lectura y conserva la secuencia de exclamación/orden de huida con un equivalente natural. No se registran revisiones posteriores al pasaje inglés.
  spanish_consistency_notes:
  - Se conserva el nombre propio como «Nínive».
  - «Estanque de agua» mantiene la metáfora sin añadir información técnica.
  - «Deténganse» traduce la urgencia del imperativo repetido sin suavizarlo a una mera sugerencia.
  - «Nadie vuelve atrás» expresa la falta de respuesta al mandato y el movimiento de retorno del hebreo.
