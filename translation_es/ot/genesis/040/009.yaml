revisions:
- from: 'Así que el jefe de los coperos contó su sueño a José y le dijo[a]: «En mi sueño, mira, había una vid delante de mí».'
  to: 'Entonces el jefe de los coperos contó su sueño a José y le dijo[a]: «En mi sueño, he aquí, había una vid delante de mí».'
  rationale: Se reemplaza «Así que» por «Entonces» para evitar un matiz consecutivo no presente en el hebreo. Se ajusta וְהִנֵּה a «he aquí», que conserva mejor su función de marcador de atención en un registro bíblico natural. Se corrige la nota para que sí ofrezca la alternativa de omitir el marcador de atención, conforme a la auditoría inglesa.
