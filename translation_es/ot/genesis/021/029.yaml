translation:
  language: es
  text: 'Y Abimelec dijo a Abraham: «¿Qué son estas siete corderas[a] que has puesto aparte?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que has colocado por separado». El verbo hebreo puede significar simplemente «poner/colocar», mientras que el contexto sugiere que fueron distinguidas del resto como un grupo separado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: WLC / HALOT
  rationale: El waw consecutivo avanza la narración; en español, "Y ... dijo" conserva la secuencia narrativa natural sin añadir interpretación.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  lexicon: Transliteración estándar del nombre propio
  rationale: Se mantiene el nombre propio con adaptación gráfica habitual en español bíblico, sin cambiar el referente.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca destinatario del habla; "a" es la forma natural en español.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva la forma ampliamente reconocible del nombre propio.
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué son
  alternatives_spanish:
  - ¿Qué son exactamente
  - ¿Qué representan
  lexicon: HALOT
  rationale: En este contexto se pregunta por la identidad de los animales; en español, la estructura natural exige explicitar el verbo 'ser'.
- source_word: הֵנָּה
  english_pob_choice: are these
  chosen_spanish: estas
  alternatives_spanish:
  - estas mismas
  lexicon: HALOT
  rationale: El demostrativo femenino plural queda absorbido en "estas" junto con la estructura interrogativa española.
- source_word: שֶׁבַע כְּבָשֹׂת הָאֵלֶּה
  english_pob_choice: these seven ewe lambs
  chosen_spanish: estas siete corderas
  alternatives_spanish:
  - estas siete ovejas jóvenes
  - estas siete borregas
  lexicon: HALOT
  rationale: כְּבָשֹׂת es femenino plural y especifica hembras jóvenes; "corderas" preserva la referencia femenina y suena natural en español, evitando el genérico "ovejas".
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  lexicon: HALOT
  rationale: La cláusula relativa se expresa de forma simple y directa con "que".
- source_word: הִצַּבְתָּ
  english_pob_choice: you have set apart
  chosen_spanish: has puesto aparte
  alternatives_spanish:
  - has colocado aparte
  - has separado
  lexicon: HALOT
  rationale: El verbo hiphil puede significar poner/colocar; el contexto de la narración favorece la idea de separación de un grupo, y "puesto aparte" la expresa sin exceder el texto.
- source_word: לְבַדָּנָה
  english_pob_choice: by themselves
  chosen_spanish: por sí mismas
  alternatives_spanish:
  - solas
  - separadas
  lexicon: HALOT
  rationale: La frase indica separación del resto. "Por sí mismas" comunica la independencia del grupo en español natural y mantiene el matiz de apartamiento.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto español junto a la frase relevante.'
  spanish_consistency_notes:
