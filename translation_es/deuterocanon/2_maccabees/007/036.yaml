review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: sufrimiento breve, pacto de Dios, vida perdurable y retribución divina por la arrogancia. Sin embargo, «hacia la vida eterna» no representa con suficiente fidelidad la compresión sintáctica de ἀενάου ζωῆς y suena poco natural en español; conviene una formulación que mantenga la tensión entre «han caído» y el resultado/ámbito de «vida eterna» sin introducir una dirección espacial extraña.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «han caído bajo el pacto de Dios hacia la vida eterna» resulta forzado. «Sufrirás con justicia las penas» es entendible, aunque «cargarás justamente con las penas» o «llevarás justamente las penas» reproduce mejor ἀποίσῃ (‘llevarás/soportarás’) que «sufrirás».
  glossary_alignment: Buen ajuste general a la terminología del proyecto. «Pacto de Dios» es aceptable para διαθήκη, aunque «alianza» sería posible; no es necesario cambiarlo. No hay conflicto con Yahvé, Mesías, esclavo, etc. Se preserva correctamente «juicio de Dios», «arrogancia» y la nota sobre «han caído».
  issues:
  - severity: medium
    issue: La frase «hacia la vida eterna» suena poco natural y no refleja bien la relación griega entre πεπτώκασιν y ἀενάου ζωῆς.
    rationale: El griego es compacto; el inglés POB lo resolvió con «have fallen ... into everlasting life». En español, «hacia» sugiere movimiento direccional incompleto y debilita la idea de entrada/resultado. «En la vida eterna» conserva mejor la tensión sin sonar forzado.
  - severity: medium
    issue: «Sufrirás con justicia las penas» atenúa el valor de ἀποίσῃ.
    rationale: ἀποίσῃ aquí expresa llevar/soportar las penalidades impuestas. «Cargarás justamente con las penas» o «llevarás justamente las penas» se acerca más al matiz judicial del original y del POB inglés («bear the penalties»).
  revised_spanish_text: Pues nuestros hermanos[a], después de haber soportado un breve sufrimiento, han caído bajo el pacto de Dios en la vida eterna; pero tú, por el juicio de Dios, cargarás justamente con las penas de tu arrogancia.
  revised_footnotes:
  - marker: a
    text: 'O: «han muerto bajo el pacto de Dios para la vida eterna». El griego es compacto, y «han caído» conserva la imagen verbal literal.'
    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula de la vida eterna para lograr un español natural que preserve mejor la compresión y tensión del griego sin introducir una dirección espacial extraña. También se cambia «sufrirás con justicia» por «cargarás justamente con» para reflejar mejor el sentido de ἀποίσῃ como soportar/llevar las penalidades. La nota al pie se mantiene, pues sigue siendo pertinente y está correctamente anclada.
