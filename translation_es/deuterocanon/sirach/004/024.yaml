translation:
  language: es
  text: Porque en el hablar se da a conocer la sabiduría, y el entendimiento en la respuesta de la lengua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: "y la instrucción en una palabra de la lengua". El testimonio hebreo lee "y el entendimiento en la respuesta de la lengua".'
    reason: alternative_reading
lexical_decisions:
- source_word: בְאֹמֶר / λόγῳ
  english_pob_choice: in speech
  chosen_spanish: por la palabra
  alternatives_spanish:
  - en el habla
  - por el hablar
  - en una palabra
  lexicon: HALOT; BDAG
  rationale: El hebreo בְאֹמֶר y el griego λόγῳ apuntan al ámbito de la palabra/expresión verbal. En español, 'por la palabra' comunica bien el medio instrumental sin sonar forzado, y mantiene la relación con el paralelo griego sin reducirlo a una sola 'frase' o 'discurso'.
- source_word: נוֹדַעַת
  english_pob_choice: is made known
  chosen_spanish: se da a conocer
  alternatives_spanish:
  - es conocida
  - se hace conocida
  - se reconoce
  lexicon: HALOT
  rationale: El nifal de ידע tiene valor pasivo/reflexivo. 'Se da a conocer' conserva la idea de manifestación activa y suena natural en español, sin debilitar el verbo como un simple 'es conocida'.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: '''Sabiduría'' es el equivalente estable y fiel para חָכְמָה en este contexto sapiencial.'
- source_word: תְבוּנָה / παιδεία
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  - instrucción
  lexicon: HALOT; LSJ
  rationale: El hebreo tiene תְבוּנָה, 'entendimiento/ discernimiento'; el griego muestra παιδεία, 'instrucción'. Como el texto hebreo es el principal y de alta confianza, se mantiene 'entendimiento' en el cuerpo del texto. 'Entendimiento' preserva la pareja sapiencial con 'sabiduría' mejor que 'instrucción'.
- source_word: בְּמַעֲנֵה
  english_pob_choice: in the response
  chosen_spanish: en la respuesta
  alternatives_spanish:
  - en el ответ
  - en el responder
  - en la réplica
  lexicon: HALOT
  rationale: מענה es una respuesta/contestación concreta. 'En la respuesta' es idiomático y transparente, y reproduce el sustantivo sin convertirlo en un verbo.
- source_word: לָשׁוֹן / γλώσσης
  english_pob_choice: of the tongue
  chosen_spanish: de la lengua
  alternatives_spanish:
  - de la lengua hablada
  - de la voz
  - del habla
  lexicon: HALOT; BDAG
  rationale: '''Lengua'' conserva el cuerpo-metáfora del hebreo y coincide con el griego γλώσσης. En español bíblico moderno, ''lengua'' es natural y mantiene la concreción física de la fuente.'
theological_decisions:
- issue: Divergencia hebreo-griega en el segundo hemistiquio
  english_pob_reading: 'Hebrew primary text: ''and understanding in the response of the tongue''; Greek note: ''and instruction in an utterance of the tongue.'''
  chosen_spanish_reading: '''y el entendimiento en la respuesta de la lengua'''
  alternative_spanish_readings:
  - '''y la instrucción en la palabra de la lengua'''
  - '''y la enseñanza en el decir de la lengua'''
  rationale: Siguiendo la política del proyecto para Sirácida, el hebreo preservado gobierna el texto principal, y el griego funciona como paralelo de control. Por eso el cuerpo del versículo refleja תבונה / מענה y no παιδεία / ῥήμα. La alternativa griega se conserva en nota para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; consult Greek parallel as input/check'
translation_notes:
  revision_awareness: La revisión más reciente del audit trail en inglés ajustó 'answer' a 'response' para mayor naturalidad, sin cambiar el sentido de מענה. En español, 'respuesta' ya expresa esa mejora natural y mantiene la fidelidad al hebreo. Se conserva también la tensión textual con el griego, que habla de παιδεία/ῥῆμα en lugar de תבונה/מענה.
  spanish_consistency_notes:
  - Se usó 'lengua' para reproducir la metáfora corporal del hebreo y del griego, en lugar de 'idioma' o 'habla'.
  - Se prefirió 'sabiduría' y 'entendimiento' como pareja sapiencial estándar, coherente con el registro de Sirácida.
  - '''Se da a conocer'' conserva la pasividad del nifal sin sonar literalista en español.'
  - La nota al pie deja visible la alternativa griega sin desplazar el texto hebreo principal.
