translation:
  language: es
  text: Y juzgó a Israel en los días de los filisteos durante veinte años[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dirigió a Israel durante veinte años»; el verbo hebreo puede denotar una actividad de gobierno más amplia, no solo la de dictar decisiones judiciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - dirigió
  - ejerció como juez sobre
  lexicon: HALOT
  rationale: שׁפט en Jueces puede abarcar una función de liderazgo y gobierno, no solo decisión judicial. En español, «juzgó» conserva la terminología recurrente del libro y mantiene la conexión léxica con el hebreo sin ampliar indebidamente el sentido.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  lexicon: HALOT
  rationale: El objeto directo es el nombre propio ישראל. En español, «a Israel» es formalmente cercano y natural en esta construcción.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante
  - en el tiempo de
  lexicon: HALOT
  rationale: La locución hebrea se refleja bien con «en los días de», que preserva el idiomismo temporal del original y coincide con la decisión inglesa auditada.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: de los filisteos
  alternatives_spanish:
  - de los Filisteos
  lexicon: HALOT
  rationale: Nombre étnico/político estándar en español bíblico. El genitivo «de los filisteos» expresa con naturalidad la dependencia temporal del sintagma hebreo.
- source_word: עֶשְׂרִים שָׁנָה
  english_pob_choice: twenty years
  chosen_spanish: por veinte años
  alternatives_spanish:
  - veinte años
  - durante veinte años
  lexicon: HALOT
  rationale: El hebreo marca duración; en español, «por veinte años» comunica esa extensión de forma idiomática y evita una lectura demasiado estática. La alternativa «durante veinte años» también sería válida, pero «por» encaja bien con el valor durativo.
theological_decisions:
- issue: Alcance de שׁפט en el resumen de Jueces
  english_pob_reading: Retain 'judged' rather than interpretively expanding to 'ruled' or 'led'.
  chosen_spanish_reading: Mantener «juzgó» en vez de expandir a «gobernó» o «dirigió».
  alternative_spanish_readings:
  - gobernó a Israel
  - dirigió a Israel
  - fue juez sobre Israel
  rationale: El versículo resume a Sansón dentro del patrón terminológico de Jueces. «Juzgó» preserva esa conexión canónica y léxica sin forzar una lectura exclusivamente judicial ni introducir una afirmación política más fuerte que la del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que reordenó la frase temporal para reflejar mejor el hebreo: primero el marco («en los días de los filisteos») y luego la duración («por veinte años»).'
  spanish_consistency_notes:
  - Se conserva «Israel» como nombre propio, en paralelo con la decisión inglesa.
  - Se mantiene «filisteos» en minúscula por tratarse de un etnónimo común en español bíblico.
  - La nota al pie marca la tensión lexical de שׁפט sin reemplazar la traducción principal.
