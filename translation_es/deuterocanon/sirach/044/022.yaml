revisions:
- from: Y también para Isaac estableció un hijo[a], por causa de Abraham su padre. Le dio un pacto de todos los primogénitos[b], y la bendición reposó sobre la cabeza de Israel.
  to: Y también para Isaac estableció un hijo[a], por causa de Abraham su padre. Le dio un pacto con todo primogénito[b], y la bendición reposó sobre la cabeza de Israel.
  rationale: 'Se conserva el texto principal casi intacto, pero se corrige la expresión más opaca (''de todos los primogénitos'' -> ''con todo primogénito'') y se reescriben las notas para alinearlas con exactitud al expediente auditado en inglés: la tensión textual gira en torno a ''hijo'' frente a una lectura griega de bendición/pacto, y la explicación debe decirlo sin ambigüedad.'
