translation:
  language: es
  text: Porque así como castigaste a los adversarios[a], así también, con esto, al habernos llamado, nos glorificaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al habernos convocado» o «al habernos invitado». El participio griego προκαλεσάμενος puede expresar llamar, convocar o invitar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Pues así como
  - Porque de la manera que
  lexicon: Partícula comparativa/causal; ὡς + γάρ
  rationale: Mantiene la relación causal y comparativa del griego. «Porque así como» suena natural en español y conserva el enlace lógico con la cláusula siguiente.
- source_word: ἐτιμώρησας
  english_pob_choice: you punished
  chosen_spanish: castigaste
  alternatives_spanish:
  - castigaste con justo juicio
  - tomaste venganza de
  - ejecutaste juicio sobre
  lexicon: BDAG
  rationale: La idea principal es castigar o vengar. «Castigaste» comunica la acción de manera clara y sobria sin añadir más de lo que el griego exige.
- source_word: τοὺς ὑπεναντίους
  english_pob_choice: the adversaries
  chosen_spanish: a los adversarios
  alternatives_spanish:
  - a los opositores
  - a los enemigos
  lexicon: LSJ
  rationale: «Adversarios» conserva el matiz de oposición hostil y es una opción digna y amplia en español.
- source_word: τούτῳ
  english_pob_choice: by this
  chosen_spanish: por esto
  alternatives_spanish:
  - con esto
  - mediante esto
  - así
  lexicon: BDAG
  rationale: El dativo instrumental apunta al acto recién mencionado. «Por esto» expresa con claridad la relación instrumental sin forzar una interpretación adicional.
- source_word: προκαλεσάμενος
  english_pob_choice: having summoned us
  chosen_spanish: al habernos convocado
  alternatives_spanish:
  - al habernos llamado
  - al habernos reunido
  - al habernos invitado
  lexicon: LSJ
  rationale: El participio medio puede significar llamar, convocar o invitar. «Convocado» preserva la fuerza de una llamada dirigida al pueblo sin introducir la idea reflexiva de «a ti mismo», que el español no exige aquí.
- source_word: ἐδόξασας
  english_pob_choice: you glorified us
  chosen_spanish: nos glorificaste
  alternatives_spanish:
  - nos honraste
  - nos diste gloria
  lexicon: BDAG
  rationale: «Glorificaste» reproduce el peso teológico de δοξάζω y mantiene el contraste con el castigo de los adversarios.
theological_decisions:
- issue: Relación entre el castigo de los adversarios y la glorificación del pueblo
  english_pob_reading: The same divine act that punished the opponents also glorified God's people by calling them to himself.
  chosen_spanish_reading: El mismo actuar divino que castigó a los adversarios también glorificó al pueblo al convocarlo.
  alternative_spanish_readings:
  - El castigo de los adversarios fue simultáneamente la exaltación del pueblo.
  - Dios nos glorificó al llamarnos a sí.
  rationale: La frase mantiene la tensión del paralelismo sin explicarla de más. «Convocarlo» conserva la idea de llamada relacional sin imponer una formulación reflexiva no explícita en el español natural del verso.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish with theological weight.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés: se conservó la estructura comparativa de ὡς γάρ, el valor instrumental de τούτῳ y la fuerza participial de προκαλεσάμενος, sin añadir el matiz reflexivo «a ti mismo» que fue descartado en la revisión.'
  spanish_consistency_notes:
  - Se usa «adversarios» de manera consistente con el inglés POB y con el valor de oposición hostil del griego.
  - Se eligió «glorificaste» para conservar la terminología teológica usual de δοξάζω sin sustituirla por un mero «honraste».
  - Se evitó «SEÑOR» u otra máscara nominal, pues el versículo no contiene el nombre divino explícito.
