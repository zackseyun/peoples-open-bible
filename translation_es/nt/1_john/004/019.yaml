    issue: La nota textual usa «Amamos a él»
    rationale: En español general y bíblico legible, el objeto pronominal debe expresarse como «Lo amamos», no «Amamos a él», salvo énfasis contrastivo especial, que aquí no corresponde. La variante debe sonar natural sin perder su sentido textual.
  - severity: low
    issue: La cita de la variante puede simplificarse levemente
    rationale: «Lo amamos porque él nos amó primero» comunica la variante con mejor español y sin alterar el contenido documentado por el POB inglés.
