  to: Además[a], el vino traiciona; un hombre arrogante no permanece en reposo[b]. Él amplía su apetito como el Seol[c], y es como la muerte y nunca se sacia. Reúne para sí a todas las naciones y junta para sí a todos los pueblos.
  rationale: La revisión mantiene el sentido del hebreo y del POB, pero mejora la naturalidad del español en «para sí» y restaura la nota léxica importante sobre יִנְוֶה, que el borrador había desplazado indebidamente hacia «apetito».
