review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: entrada comparada con la de un padre, hacia la casa de sus hijos, en paz, seguida por la imagen corporal de establecer los pies con gran seguridad. Sin embargo, las notas están mal ancladas respecto al material que explican: [a] aparece sobre «en paz» aunque la nota trata οἶκον υἱῶν αὐτοῦ, y [b] aparece al final sobre la segunda cláusula pero su contenido no preserva bien la alternativa inglesa principal entre «seguridad» y «seguridad/safety», ni la posibilidad de entender la cláusula como afirmación firme del paso. Además, «plantó sus pies» suena algo forzado en español bíblico natural.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «plantó sus pies» resulta poco idiomático; «afirmó sus pies» o «puso firmemente sus pies» suena más natural sin perder la imagen. La primera nota repite prácticamente la misma frase dos veces y no ofrece una alternativa real; además crea confusión porque el texto ya dice «la casa de sus hijos».
  glossary_alignment: No hay términos del glosario maestro particularmente sensibles aquí. «Entró», «como un padre», «la casa de sus hijos», «en paz» y «seguridad» son compatibles con el expediente inglés y con el sentido griego. La mejor corrección terminológica es sustituir «plantó sus pies» por «afirmó sus pies», que conserva la imagen de ἔστησεν τοὺς πόδας αὐτοῦ en español más natural.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «en paz» pero explica «la casa de sus hijos».
    rationale: Los marcadores deben aparecer exactamente en el lugar pertinente. Aquí la nota alternativa corresponde a οἶκον υἱῶν αὐτοῦ, no a μετʼ εἰρήνης.
  - severity: medium
    issue: «Plantó sus pies» es demasiado calcado y poco idiomático en español.
    rationale: Aunque reproduce la revisión inglesa, en español suena extraño. «Afirmó sus pies» conserva la imagen corporal y la idea de firmeza/establecimiento con mejor legibilidad.
  - severity: medium
    issue: La nota [a] no presenta una alternativa clara y repite esencialmente la misma formulación.
    rationale: La auditoría inglesa distingue entre «the house of his sons» y «his sons’ house». En español puede reflejarse como «la casa de sus hijos» o «la casa de los hijos suyos / la casa de sus hijos» explicando que el español ya cubre ambas, pero la redacción actual es redundante y confusa.
  - severity: low
    issue: La nota [b] puede formular mejor la alternativa semántica de ἀσφάλεια.
    rationale: Conviene explicar con más precisión que puede entenderse como «gran seguridad» o «gran firmeza/seguridad al afirmarse», en lugar de una glosa algo vaga.
  revised_spanish_text: Entró como un padre en la casa de sus hijos[a] en paz; afirmó sus pies con gran seguridad[b].
