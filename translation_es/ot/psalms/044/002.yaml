translation:
  language: es
  text: Dios[a], hemos oído con nuestros propios oídos; nuestros padres nos han contado el hecho[b] que hiciste en sus días, en tiempos antiguos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «Oh Dios, hemos oído con nuestros propios oídos»; el hebreo también puede entenderse como vocativo explícito.'
    reason: lexical_alternative
  - marker: b
    text: O «la obra» o «la acción»; el hebreo usa un sustantivo de acto, y aquí «hecho» expresa bien una intervención concreta de Dios.
    reason: lexical_alternative
  - marker: c
    text: O «en días antiguos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Dios!
  - Oh Dios
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo al inicio del salmo. En español, «Dios» basta para expresar la dirección del discurso sin añadir un «Oh» obligatorio; se mantiene la claridad y la dignidad del tono.
- source_word: בְּאָזְנֵינוּ
  english_pob_choice: with our ears
  chosen_spanish: con nuestros oídos
  alternatives_spanish:
  - en nuestros oídos
  - con nuestros oídos
  lexicon: HALOT
  rationale: La imagen corporal del hebreo se conserva de forma natural en español. «Con nuestros oídos» reproduce la fuerza idiomática de haber recibido la noticia por escucha real, sin volverlo calco extraño.
- source_word: שָׁמַעְנוּ
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  - hemos escuchado
  lexicon: HALOT
  rationale: El perfecto verbal comunica una tradición recibida con vigencia presente. «Hemos oído» suena natural y mantiene el matiz testimonial del hebreo.
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres
  lexicon: HALOT
  rationale: Se conserva el término relacional masculino del hebreo. «Padres» sigue de cerca la fuente; «antepasados» sería posible, pero suaviza una forma que aquí tiene valor lexical relevante.
- source_word: סִפְּרוּ לָנוּ
  english_pob_choice: have told us
  chosen_spanish: nos lo han contado
  alternatives_spanish:
  - nos han contado
  - nos han relatado
  lexicon: HALOT
  rationale: «Contar» transmite bien la transmisión oral de una tradición. El objeto directo anticipado «lo» ayuda a enlazar con «la obra/deed» y evita ambigüedad en español.
- source_word: פֹּעַל
  english_pob_choice: the deed
  chosen_spanish: la obra
  alternatives_spanish:
  - la acción
  - el hecho
  - la obra
  lexicon: HALOT
  rationale: Aunque el inglés optó por «deed», en español «obra» es el equivalente más natural y solemne para el acto poderoso de Dios en la historia. Mantiene bien el alcance de una intervención reconocible.
- source_word: פָּעַלְתָּ
  english_pob_choice: you did
  chosen_spanish: hiciste
  alternatives_spanish:
  - realizaste
  - obraste
  - hiciste
  lexicon: HALOT
  rationale: El verbo común «hacer» reproduce de manera directa el acto divino sin forzar un verbo técnico. Además, permite conservar la relación semántica con «obra» sin sonar artificial.
- source_word: בִּימֵי הֶם
  english_pob_choice: in their days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante sus días
  - en sus días
  lexicon: HALOT
  rationale: Es la expresión temporal más directa y natural en español, preservando el referente a la generación de los antepasados.
- source_word: בִּימֵי קֶדֶם
  english_pob_choice: in days of old
  chosen_spanish: en tiempos antiguos
  alternatives_spanish:
  - en días antiguos
  - en los tiempos de antaño
  - en tiempos antiguos
  lexicon: HALOT
  rationale: Se conserva el valor de remota antigüedad con un español actual y digno. «Tiempos antiguos» comunica mejor el registro poético que una traducción demasiado literal de «días de viejo».
theological_decisions:
- issue: Forma de la invocación inicial a Dios
  english_pob_reading: God, we have heard with our ears
  chosen_spanish_reading: Dios, con nuestros oídos hemos oído
  alternative_spanish_readings:
  - Oh Dios, con nuestros oídos hemos oído
  rationale: El hebreo permite un arranque de dirección a Dios sin una partícula vocativa explícita. En español, el vocativo puede quedar sobrentendido por la posición inicial, aunque la forma con «Oh» sigue siendo una alternativa estilística válida.
  doctrine_reference: Salmo de lamento y memoria litúrgica; fidelidad al vocativo sin arcaísmo obligatorio.
- issue: Traducción del sustantivo פֹּעַל junto con el verbo פָּעַלְתָּ
  english_pob_reading: the deed you did
  chosen_spanish_reading: la obra que hiciste
  alternative_spanish_readings:
  - el hecho que hiciste
  - la acción que realizaste
  rationale: El par hebreo sustantivo-verbo se conserva mejor con una combinación natural en español. «Obra» mantiene el valor de acto significativo y poderoso, sin borrar la relación léxica con el verbo «hacer» en la línea siguiente.
  doctrine_reference: Poética hebrea y coherencia lexical; evitar aplanar el juego cognado del original.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma en cuenta la auditoría inglesa: se mantuvo la invocación directa, se conservó el perfecto testimonial, se respetó el término relacional «padres», y se reflejó el par sustantivo-verbo del final con una solución española natural. También se atendió la revisión inglesa que prefirió un singular más natural para פֹּעַל, por lo que se eligió «obra» en vez de un plural o una formulación demasiado abstracta.'
  spanish_consistency_notes:
  - Se usa «Dios» como vocativo directo sin añadir necesariamente «Oh», en coherencia con el estilo POB.
  - Se prefiere «hemos oído» frente a un pasado simple para reflejar memoria transmitida con relevancia presente.
  - Se mantiene «padres» por fidelidad al hebreo, con la nota alternativa «antepasados» disponible para lectores que busquen una equivalencia más inclusiva semánticamente.
  - Se elige «obra» como equivalente natural de פֹּעַל y se conserva el vínculo con «hiciste».
  - Se usa «tiempos antiguos» para expresar la remota antigüedad de בִּימֵי קֶדֶם sin sonar arcaico.
