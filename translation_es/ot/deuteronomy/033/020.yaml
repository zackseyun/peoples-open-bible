review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: fórmula introductoria, bendición declarativa, sujeto implícito no resuelto, símil del león/leona, y la imagen violenta de arrancar miembro y cabeza. Sin embargo, hay dos ajustes necesarios para mayor fidelidad al audit trail y al hebreo: (1) la nota c debe reflejar con más precisión la intensificación de אַף como «incluso/aun» y la alternativa documentada «corona de la cabeza», no «sí»; (2) en español suena más natural y fiel al paralelo corporal omitir el artículo antes de «coronilla» y mantener una formulación algo más directa de la imagen.'
  spanish_quality_summary: 'El español es claro y digno. «Y de Gad dijo» y «Habita como leona» funcionan bien en registro bíblico moderno. «Ensancha a Gad» es aceptable aunque algo literal; no requiere cambio. La principal mejora estilística es pulir la cola final para que la imagen predatoria suene más natural en español: «desgarra brazo, aun coronilla».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La elección «leona» concuerda con la decisión léxica documentada, con nota alternativa «león».
  issues:
  - severity: medium
    issue: La nota c no refleja con suficiente precisión la alternativa inglesa auditada.
    rationale: El inglés conserva literalmente «arm, even crown of the head». La nota española «brazo, sí, coronilla» introduce «sí», que no corresponde tan bien a אַף como intensificador/aditivo, y además pierde «corona de la cabeza», que es la alternativa explícitamente documentada.
  - severity: low
    issue: La frase final puede sonar algo forzada con artículo antes de «coronilla».
    rationale: En español poético-bíblico, «desgarra brazo, aun coronilla» reproduce mejor la coordinación abrupta y violenta del hebreo que «desgarra brazo, aun la coronilla».
  revised_spanish_text: 'Y de Gad dijo: «Bendito[a] el que ensancha a Gad. Habita como leona[b], y desgarra brazo, aun coronilla[c]».'
  revised_footnotes:
