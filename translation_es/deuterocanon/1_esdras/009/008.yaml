    rationale: Aunque el proyecto favorece «Yahvé» para el nombre divino, en español esta construcción normalmente no lleva artículo en este contexto. «Al Yahvé» resulta poco natural y deteriora la legibilidad sin ganar fidelidad.
  - severity: low
