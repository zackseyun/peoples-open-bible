translation:
  language: es
  text: 'que le pertenecerá a él y a su descendencia[a]: el sumo sacerdocio para siempre. Y su pacto fue con David, hijo de Jesé, de la tribu de Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo hebreo de este versículo es más breve y parece estar comprimido; el paralelo griego conserva un contraste más completo: la herencia real pertenece a una sola línea dinástica, mientras que la herencia de Aarón pertenece a su descendencia.'
    reason: textual_variant
lexical_decisions:
- source_word: אשר תהיה לו ולזרעו
  english_pob_choice: which shall belong to him and to his offspring
  chosen_spanish: que le pertenecerá a él y a su descendencia
  alternatives_spanish:
  - que será para él y para su descendencia
  - que le corresponderá a él y a sus hijos
  lexicon: HALOT
  rationale: El hebreo expresa pertenencia o asignación duradera; en español, «pertenecerá» comunica bien la idea de posesión/atribución sin introducir un matiz jurídico excesivo. «Descendencia» preserva el valor dinástico/colectivo de זרע.
- source_word: כהונה גדולה
  english_pob_choice: a high priesthood forever
  chosen_spanish: un sumo sacerdocio para siempre
  alternatives_spanish:
  - el sumo sacerdocio para siempre
  - un sacerdocio supremo para siempre
  lexicon: HALOT
  rationale: «כהונה גדולה» se refiere al oficio de sumo sacerdote, no solo a una dignidad abstracta. «Sumo sacerdocio» mantiene esa referencia institucional con buena naturalidad en español.
- source_word: על עולם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La fórmula hebrea indica duración perpetua; «para siempre» es la equivalencia más clara y reverente en español bíblico contemporáneo.
- source_word: וגם בריתו
  english_pob_choice: And his covenant
  chosen_spanish: Y su pacto
  alternatives_spanish:
  - Y también su pacto
  - Y el pacto de él
  lexicon: HALOT
  rationale: El sufijo pronominal se conserva como «su», con el antecedente implícito por el contexto. «Pacto» traduce ברית de forma directa y estable.
- source_word: עם דוד
  english_pob_choice: with David
  chosen_spanish: con David
  alternatives_spanish:
  - para con David
  - hecho con David
  lexicon: HALOT
  rationale: La preposición simple «con» reproduce la relación pactal sin sobretraducir.
- source_word: בן ישי
  english_pob_choice: son of Jesse
  chosen_spanish: hijo de Jesé
  alternatives_spanish:
  - hijo de Isaí
  - descendiente de Jesé
  lexicon: HALOT
  rationale: «Jesé» es la forma española estándar del nombre bíblico; «hijo de» conserva el patronímico directo del hebreo.
- source_word: למטה יהודה
  english_pob_choice: from the tribe of Judah
  chosen_spanish: de la tribu de Judá
  alternatives_spanish:
  - de Judá
  - procedente de la tribu de Judá
  lexicon: HALOT
  rationale: En contextos genealógicos, מטה significa tribu. «De la tribu de Judá» es natural y exacto, y mantiene la identificación de linaje.
theological_decisions:
- issue: Mantenimiento del sentido perpetuo del sacerdocio en el hebreo recibido
  english_pob_reading: The English revision restored the clause about the perpetual high priesthood and removed the Greek-only royal contrast, because the supplied Hebrew is primary where extant.
  chosen_spanish_reading: Se conserva la cláusula hebrea sobre el sumo sacerdocio perpetuo y no se añade el contraste real-sacerdotal del griego, que no aparece en el texto hebreo suministrado.
  alternative_spanish_readings:
  - Añadir el contraste con la realeza de David y Aarón siguiendo el griego
  - Reducir el versículo solo al pacto con David
  rationale: El paquete de fuentes señala que la revisión más reciente corrigió una inserción griega y volvió al hebreo disponible. Por fidelidad al testigo hebreo, la traducción española sigue esa decisión y no reintroduce el material ausente.
  doctrine_reference: 'PHILOSOPHY.md: cuando el hebreo sobreviene con claridad, se traduce como fuente primaria; el griego paralelo sirve de control, no de expansión indebida.'
- issue: Referencia dinástica de זרע
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - hijos
  - linaje
  rationale: «Descendencia» conserva mejor la amplitud genealógica de זרע que «hijos», y evita restringir indebidamente el alcance a una sola generación.
  doctrine_reference: HALOT / uso bíblico de זרע como descendencia colectiva
translation_notes:
  revision_awareness: 'La revisión más reciente del contexto inglés revirtió una ampliación basada en el griego y restableció la lectura hebrea breve: la cláusula sobre el sumo sacerdocio perpetuo para él y su descendencia, seguida del pacto con David hijo de Jesé de la tribu de Judá. Esta versión española sigue esa misma línea y evita introducir el contraste real-sacerdotal que no está en el hebreo suministrado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene «pacto» para ברית por consistencia con el proyecto.
  - «Sumo sacerdocio» se usa como término técnico estable para כהונה גדולה.
  - «Descendencia» se emplea de manera colectiva para זרע, evitando el singular estrecho de «hijos».
