translation:
  language: es
  text: Tomen esposas y engendren hijos y hijas; y tomen esposas para sus hijos, y entreguen sus hijas a hombres[a], para que ellas den a luz hijos y hijas; multiplíquense allí, y no disminuyan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «den sus hijas a hombres»; en contexto, esto se entiende como darles en matrimonio.
    reason: lexical_alternative
  - marker: b
    text: O, «no se hagan pocos».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחוּ נָשִׁים
  english_pob_choice: Take wives
  chosen_spanish: Tomen esposas
  alternatives_spanish:
  - Tomen mujeres
  - Casen
  lexicon: HALOT
  rationale: El hebreo expresa lenguaje de matrimonio; en español, «tomar esposas» suena natural y conserva el valor imperativo sin añadir una formulación más explicativa que el texto no exige.
- source_word: וְהוֹלִידוּ
  english_pob_choice: father
  chosen_spanish: engendren
  alternatives_spanish:
  - sean padres de
  - engendren hijos
  lexicon: HALOT
  rationale: Con sujetos masculinos, el verbo tiene fuerza causativa/procreativa. «Engendren» preserva esa relación y evita la neutralización general de «tener».
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos y hijas
  alternatives_spanish:
  - niños y niñas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo nombra ambos sexos explícitamente. En español, «hijos y hijas» conserva esa precisión mejor que un genérico como «descendencia».
- source_word: וּקְחוּ לִבְנֵיכֶם נָשִׁים
  english_pob_choice: and take wives for your sons
  chosen_spanish: tomen esposas para sus hijos
  alternatives_spanish:
  - consigan esposas para sus hijos
  - busquen esposas para sus hijos
  lexicon: HALOT
  rationale: La expresión sigue siendo de matrimonio. «Esposas para sus hijos» mantiene la relación de propósito y la concisión del hebreo.
- source_word: וְאֶת בְּנוֹתֵיכֶם תְּנוּ לַאֲנָשִׁים
  english_pob_choice: and give your daughters to men
  chosen_spanish: entreguen sus hijas a hombres
  alternatives_spanish:
  - den sus hijas a hombres
  - den sus hijas en matrimonio
  lexicon: HALOT
  rationale: POB corrigió la lectura hacia «men» para mayor cercanía léxica al hebreo, sin pasar a «esposos». En español, «a hombres» conserva esa correspondencia y deja implícito el contexto matrimonial.
- source_word: וְתֵלַדְנָה
  english_pob_choice: so that they may bear
  chosen_spanish: para que ellas den a luz
  alternatives_spanish:
  - para que den a luz
  - para que puedan tener
  lexicon: HALOT
  rationale: La forma verbal expresa resultado/intención. «Den a luz» es idiomático en español y conserva el matiz de parto que el hebreo permite.
- source_word: וּרְבוּ
  english_pob_choice: multiply
  chosen_spanish: multiplíquense
  alternatives_spanish:
  - crezcan
  - aumenten
  lexicon: HALOT
  rationale: La traducción refleja el mandato de crecimiento numérico poblacional. El reflexivo español comunica bien la idea de incremento colectivo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio apunta al lugar del exilio mencionado en el contexto inmediato. «Allí» es la opción más natural y directa.
- source_word: וְאַל תִּמְעָטוּ
  english_pob_choice: and do not decrease
  chosen_spanish: y no disminuyan
  alternatives_spanish:
  - y no se hagan pocos
  - y no mengüen
  lexicon: HALOT
  rationale: El hebreo contrapone disminuir a multiplicarse en términos de población. «No disminuyan» preserva la fuerza cuantitativa de la advertencia.
translation_notes:
  revision_awareness: La auditoría inglesa mantuvo la estructura imperativa y el léxico de población/matrimonio, con una revisión reciente que cambió «husbands» por «men» para ajustarse más de cerca al hebreo אֲנָשִׁים. En español se preservó esa cercanía con «hombres» sin explicitar «esposos», y se conservó el contraste numérico entre multiplicarse y no disminuir.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el contexto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» o terminología eclesiástica tradicional no presente en el hebreo.
  - 'Se conservó el paralelismo poblacional del texto: engendrar / dar a luz / multiplicarse / no disminuir.'
  - Las notas al pie distinguen el sentido literal de la frase matrimonial sin borrar la ambigüedad léxica del hebreo.
