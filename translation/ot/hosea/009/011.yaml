id: HOS.9.11
reference: Hosea 9:11
source:
  edition: WLC
  text: אֶפְרַ֕יִם כָּ/ע֖וֹף יִתְעוֹפֵ֣ף כְּבוֹדָ֑/ם מִ/לֵּדָ֥ה וּ/מִ/בֶּ֖טֶן וּ/מֵ/הֵרָיֽוֹן׃
translation:
  text: Ephraim—their glory will fly away like a bird—from birth[a], from the womb[b], and from conception.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their honor' or 'their splendor.' In context, 'their glory' likely refers especially to offspring and fertility.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from birth and from the womb and from conception/pregnancy''—a threefold expression describing the loss of children at every stage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, referring to the northern kingdom/tribe personified.
- source_word: כָּעוֹף
  chosen: like a bird
  alternatives:
  - as a bird
  - like a flying creature
  lexicon: HALOT
  rationale: The prefixed כ marks comparison; עוֹף here is best rendered concretely as 'bird' in idiomatic English rather than the broader 'flying creature.'
- source_word: יִתְעוֹפֵף
  chosen: will fly away
  alternatives:
  - will flutter away
  - will fly off
  lexicon: HALOT
  rationale: The verb conveys flying off/disappearing in flight. 'Will fly away' captures both motion and loss in natural English.
- source_word: כְּבוֹדָם
  chosen: their glory
  alternatives:
  - their honor
  - their splendor
  lexicon: HALOT
  rationale: כָּבוֹד often denotes glory, honor, or abundance/importance. In Hosea 9 the context points to Ephraim's glory in offspring and national vitality; 'their glory' preserves the metaphor while allowing the following phrases to define its loss.
- source_word: מִלֵּדָה
  lemma: מִן
  chosen: away from birth
  alternatives:
  - from giving birth
  - from childbearing
  lexicon: HALOT
  rationale: The preposition מִן with לֵדָה marks deprivation beginning at the stage of birth. 'Away from birth' fits the sequence of stages and the sense that glory departs so that there is no successful birth.
- source_word: וּמִבֶּטֶן
  chosen: from the womb
  alternatives:
  - from the belly
  lexicon: HALOT
  rationale: בֶּטֶן in this context refers to the womb/pregnancy stage, not merely the physical abdomen. 'Womb' is the natural contextual rendering.
- source_word: וּמֵהֵרָיוֹן
  chosen: from conception
  alternatives:
  - from pregnancy
  lexicon: HALOT
  rationale: הֵרָיוֹן denotes conception/pregnancy. Given the sequence birth → womb → conception, rendering it 'conception' preserves the backward movement through reproductive stages and sharpens the rhetoric.
