base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/008/005.yaml
  text: Why has this people turned away—Jerusalem—with a perpetual turning away? They hold fast to deceit[c][b][a]; they refuse to return.
  footnotes:
  - marker: a
    text: Or 'with an everlasting backsliding' or 'in perpetual apostasy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats forms of the verb 'turn/return' throughout the verse, contrasting the people's turning away with their refusal to return.
    reason: lexical_alternative
  - marker: c
    text: '''Jerusalem'' may also be taken as a vocative: ''Why has this people turned away, O Jerusalem...?'''
    reason: alternative_reading
