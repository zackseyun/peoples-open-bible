translation:
  language: es
  text: No te apresures en tu espíritu a enojarte[a], porque el enojo reposa en el seno de los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el regazo de los necios». La imagen hebrea sugiere que el enojo se instala muy cerca del interior de la persona necia.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבַהֵל
  english_pob_choice: be quick
  chosen_spanish: te apresures
  alternatives_spanish:
  - te precipites
  - vayas con prisa
  - te agites
  lexicon: HALOT
  rationale: El verbo en esta prohibición expresa una prisa interior o precipitación, no solo rapidez física. «Te apresures» conserva bien la idea de impulsividad y funciona de manera natural en español.
- source_word: בְּרוּחֲךָ
  english_pob_choice: in your spirit
  chosen_spanish: en tu espíritu
  alternatives_spanish:
  - en tu mente
  - en tu temperamento
  - dentro de ti
  lexicon: HALOT
  rationale: רוּחַ aquí apunta a la disposición interior de la persona. «En tu espíritu» mantiene la imagen antropológica del hebreo sin reducirla prematuramente a «temperamento» o «mente».
- source_word: לִכְעוֹס
  english_pob_choice: to become angry
  chosen_spanish: a enojarte
  alternatives_spanish:
  - a airarte
  - a ponerte enojado
  - a irritarte
  lexicon: HALOT
  rationale: 'El infinitivo tiene sentido ingresivo: entrar en un estado de ira. «A enojarte» reproduce de forma natural esa entrada al enojo; «airarte» sería más tradicional, pero menos transparente para lectura general.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Introduce la razón proverbial de la prohibición. «Porque» es la equivalencia más clara y directa en español.
- source_word: כַעַס
  english_pob_choice: anger
  chosen_spanish: el enojo
  alternatives_spanish:
  - la ira
  - el enojo
  - la indignación
  lexicon: HALOT
  rationale: El sustantivo designa ira/enojo. «Enojo» es claro, idiomático y mantiene la correspondencia con el verbo «enojarte» en la primera mitad del versículo.
- source_word: בְּחֵיק
  english_pob_choice: in the bosom
  chosen_spanish: en el seno
  alternatives_spanish:
  - en el regazo
  - en el pecho
  - en el abrazo
  lexicon: HALOT
  rationale: חֵיק comunica un lugar muy cercano al cuerpo, con sentido figurado de cercanía íntima. «En el seno» preserva esa imagen sin sonar arcaico de manera excesiva; «regazo» podría sugerir más específicamente la posición de un objeto o niño.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los insensatos
  - de los tontos
  - de los faltos de juicio
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְּסִילִים es el término técnico para quienes carecen de sabiduría moral. «Necios» conserva el registro sapiencial bíblico y es fiel al valor proverbial del término.
- source_word: יָנוּחַ
  english_pob_choice: rests
  chosen_spanish: reposa
  alternatives_spanish:
  - descansa
  - se asienta
  - permanece
  lexicon: HALOT
  rationale: נוח expresa reposo o asentamiento. «Reposa» conserva la imagen de algo que se instala y queda en un lugar, sin perder el tono figurado del hebreo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo, alineándose con la lectura inglesa auditada: una prohibición contra la precipitación interior que conduce al enojo, seguida de la razón proverbial de que el enojo habita íntimamente en los necios. No se adoptaron revisiones textuales ni cambios de sentido respecto del pass final en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «espíritu» para רוּחַ, coherente con la antropología bíblica y con el tratamiento POB de la disposición interior.
  - Se usó «necios» para כְּסִילִים, preservando el término sapiencial tradicional y su valor moral.
  - Se prefirió «enojo» en ambas mitades para dar cohesión léxica a כַעַס y לִכְעוֹס, evitando una dispersión innecesaria de sinónimos.
