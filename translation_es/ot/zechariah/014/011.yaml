translation:
  language: es
  text: Y habitarán en ella, y ya no habrá nada[a] dedicado a la destrucción, y Jerusalén habitará con seguridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ya no habrá anatema». Hebreo חֵרֶם puede referirse también a algo puesto bajo prohibición o dedicado a la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ בָהּ
  english_pob_choice: And they will dwell in it
  chosen_spanish: Y habitarán en ella
  alternatives_spanish:
  - Y vivirán en ella
  - Y morarán en ella
  lexicon: HALOT
  rationale: El verbo ישׁב expresa asentarse o habitar. «Habitarán» conserva la idea de residencia estable y suena natural en español; «en ella» refleja el sufijo femenino singular de Jerusalén/“la ciudad” implícita en el contexto.
- source_word: חֵרֶם
  english_pob_choice: anything devoted to destruction
  chosen_spanish: cosa dedicada al anatema
  alternatives_spanish:
  - cosa dedicada a la destrucción
  - anatema
  - cosa bajo el ban
  lexicon: HALOT
  rationale: En este contexto profético, חֵרֶם mantiene el campo de algo consagrado para destrucción bajo juicio divino. «Anatema» conserva la fuerza técnica y la tensión teológica, mientras «dedicada a la destrucción» explicita el sentido en español. Se evitó suavizarlo como simple «maldición».
- source_word: לֹא יִהְיֶה עוֹד
  english_pob_choice: there will no longer be
  chosen_spanish: no habrá ya más
  alternatives_spanish:
  - ya no habrá
  - no existirá más
  lexicon: HALOT
  rationale: La fórmula marca cese de una condición futura. «No habrá ya más» comunica continuidad negativa en un español bíblico claro y corresponde al valor de la secuencia verbal.
- source_word: וְיָשְׁבָה יְרוּשָׁלִַם
  english_pob_choice: and Jerusalem will dwell
  chosen_spanish: y Jerusalén habitará
  alternatives_spanish:
  - y Jerusalén morará
  - y Jerusalén será habitada
  lexicon: HALOT
  rationale: El verbo en femenino singular conserva a Jerusalén como sujeto personificado. «Habitará» preserva ese paralelismo con la primera cláusula sin imponer una pasiva que no está en el hebreo.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en seguridad
  - segura
  lexicon: HALOT
  rationale: El sustantivo בטח aquí expresa seguridad o confianza en el estado de la ciudad. «Con seguridad» es una equivalencia clara y digna en español, cercana a «securely» sin perder el matiz de tranquilidad protegida.
theological_decisions:
- issue: Sentido de חֵרֶם en la restauración escatológica
  english_pob_reading: Rendered as 'anything devoted to destruction' rather than 'curse'
  chosen_spanish_reading: «cosa dedicada al anatema» en lugar de una simple «maldición»
  alternative_spanish_readings:
  - cosa dedicada a la destrucción
  - anatema
  - maldición
  rationale: El texto anuncia la desaparición de lo que está bajo juicio de destrucción; no se reduce a una abstracción de «maldición». «Anatema» conserva la carga de separación/jucio y deja visible la tensión lexical del hebreo, mientras la nota explica la posible equivalencia con destrucción.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al mantener un sujeto implícito en la primera cláusula y al conservar la idea de cesación futura con un giro natural en español. También refleja la preferencia auditada por no rebajar חֵרֶם a «maldición» sin más, sino por mantener su peso de juicio mediante «anatema» con nota explicativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» cuando corresponde en otros pasajes, pero aquí no aparece el nombre divino.
  - Se mantuvo «Jerusalén» como sujeto personificado, en paralelo con el hebreo.
  - «Con seguridad» preserva el tono formal y bíblico sin forzar un calco innecesario.
