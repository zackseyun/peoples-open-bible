translation:
  language: es
  text: Entonces lo escribí en el documento[a], lo sellé, convoqué testigos y pesé la plata en la balanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el rollo» o «en el escrito»; סֵפֶר es un término general para un documento escrito, aquí probablemente la escritura de compra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶכְתֹּב
  english_pob_choice: So I wrote
  chosen_spanish: Así que lo escribí
  alternatives_spanish:
  - Y lo escribí
  - Entonces lo escribí
  lexicon: HALOT
  rationale: El verbo en wayyiqtol narra una acción secuencial en primera persona. «Así que» conserva la continuidad narrativa natural en español sin perder el valor sucesivo del hebreo.
- source_word: בַּסֵּפֶר
  english_pob_choice: in the deed
  chosen_spanish: en el documento
  alternatives_spanish:
  - en la escritura
  - en el escrito
  - en el libro
  - en el rollo
  lexicon: HALOT
  rationale: סֵפֶר es un término amplio para un escrito/documento. En este contexto legal-comercial, «documento» comunica bien el instrumento de compra sin imponer de forma demasiado específica «deed», que no es el término normal del español bíblico.
- source_word: וָאֶחְתֹּם
  english_pob_choice: sealed it
  chosen_spanish: lo sellé
  alternatives_spanish:
  - lo cerré con sello
  - lo estampé con sello
  lexicon: HALOT
  rationale: חתם en contexto jurídico alude a poner sello en un documento. «Lo sellé» es la forma breve y fiel en español.
- source_word: וָאָעֵד עֵדִים
  english_pob_choice: called witnesses
  chosen_spanish: convoqué testigos
  alternatives_spanish:
  - llamé testigos
  - tomé testigos
  - hice comparecer testigos
  lexicon: HALOT
  rationale: La forma causativa con עֵדִים indica hacer intervenir testigos o convocarlos para atestiguar. «Convoqué testigos» conserva el matiz legal y resulta natural en español.
- source_word: וָאֶשְׁקֹל
  english_pob_choice: weighed out
  chosen_spanish: pesé
  alternatives_spanish:
  - pesé la cantidad
  - pesé y entregué
  lexicon: HALOT
  rationale: El verbo se refiere al acto transaccional de pesar el pago. En español, el objeto se sobreentiende por el contexto, y «pesé» mantiene la concisión del hebreo.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata en dinero
  - el dinero de plata
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente «plata» y, por extensión, dinero. «La plata» preserva la concreción histórica de un pago pesado en metal.
- source_word: בְּמֹאזְנָיִם
  english_pob_choice: on the scales
  chosen_spanish: en la balanza
  alternatives_spanish:
  - en las balanzas
  - en la báscula
  lexicon: HALOT
  rationale: מֹאזְנַיִם son balanzas de pesar. En español contemporáneo, «balanza» comunica mejor el instrumento que el plural «balanzas», y mantiene la imagen de pesaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el flujo de la POB en inglés, pero ajusta el núcleo legal a un español natural y auditable. Se mantiene la tensión semántica de סֵפֶר con una nota alternativa, sin reducirlo a un equivalente único e inmotivado.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal de acciones sucesivas: escribir, sellar, convocar testigos, pesar.'
  - Se usa «plata» para כֶּסֶף por fidelidad histórica, no «dinero», dado el contexto de pesaje.
  - Se evita «SEÑOR» o vocabulario teológico no pertinente al verso.
  - «Balanza» se eligió en singular como instrumento genérico y natural en español.
