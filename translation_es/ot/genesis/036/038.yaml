translation:
  language: es
  text: Y murió Shaul[a], y Baal-hanán, hijo de Akbor, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Las versiones tradicionales suelen escribir estos nombres «Saúl», «Baal-hanán» y «Acbor». Esta traducción usa formas más cercanas al hebreo: «Shaul» y «Akbor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - se murió
  lexicon: HALOT
  rationale: El verbo narrativo estándar de muerte se vierte naturalmente como «murió» en español. Mantiene la concisión de la fórmula histórica y evita un eufemismo innecesario.
- source_word: שָׁאוּל
  english_pob_choice: Shaul
  chosen_spanish: Shaul
  alternatives_spanish:
  - Saúl
  lexicon: HALOT
  rationale: Se conserva la forma más cercana al hebreo usada por la POB inglesa, en vez de la forma tradicional española «Saúl», para reflejar la decisión transliteradora documentada.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - gobernó
  lexicon: HALOT
  rationale: En fórmulas dinásticas, מלך se expresa con «reinó», que reproduce la brevedad histórica del hebreo y el valor de sucesión real.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La construcción expresa sucesión y reemplazo. «En su lugar» es la equivalencia española más idiomática y fiel al sentido de toma de cargo.
- source_word: בַּעַל חָנָן
  english_pob_choice: Baal-hanan
  chosen_spanish: Baal-hanán
  alternatives_spanish:
  - Baal-hanan
  lexicon: HALOT
  rationale: Se translitera el nombre compuesto con guion para conservar su estructura. Se mantiene el valor onomástico sin sustituirlo por una forma tradicional no documentada en el texto fuente.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  lexicon: HALOT
  rationale: La relación de filiación directa se expresa de manera normal y precisa con «hijo de».
- source_word: עַכְבּוֹר
  english_pob_choice: Akbor
  chosen_spanish: Akbor
  alternatives_spanish:
  - Acor
  lexicon: HALOT
  rationale: Se sigue la transliteración cercana al hebreo adoptada por la POB inglesa. «Akbor» preserva mejor la forma original que la adaptación tradicional castellana.
translation_notes:
  revision_awareness: 'El texto coincide con la lectura hebrea de una breve nota dinástica: muerte de Shaul y sucesión de Baal-hanán hijo de Akbor. No hay variantes textuales relevantes en el paquete fuente ni revisiones previas aplicables.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo, adecuado para una genealogía/cronología real.
  - Los nombres propios siguen la pauta POB de transliteración cercana al hebreo, no la tradición castellana cuando esta difiere de forma significativa.
  - La puntuación reproduce la estructura coordinada del hebreo con coma antes de la segunda cláusula.
