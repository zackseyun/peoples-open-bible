translation:
  language: es
  text: 'Para los hijos de Elizafán: Semaías, el jefe, y doscientos de sus hermanos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes» para «hermanos»; el hebreo puede extender el término a miembros del mismo clan, no solo a hermanos en sentido literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - De los hijos de
  - Para los descendientes de
  lexicon: HALOT
  rationale: Se conserva la designación clanística literal «hijos de», que en listas genealógicas funciona como grupo familiar masculino. «Para» reproduce el valor de encabezado de lista del prefijo ל en este contexto, sin forzar una paráfrasis más general.
- source_word: אֱלִיצָפָן
  english_pob_choice: Elizaphan
  chosen_spanish: Elizafán
  alternatives_spanish:
  - Elizafán
  lexicon: Convención onomástica del proyecto
  rationale: Nombre propio transliterado al español con adaptación ortográfica mínima para lectura natural en español, manteniendo la identidad del nombre bíblico.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Semaía
  lexicon: Convención onomástica del proyecto
  rationale: Se adapta el nombre al español bíblico habitual, conservando la forma reconocible y la vocalización aproximada del hebreo.
- source_word: הַ/שָּׂר
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el jefe
  - el líder
  - el capitán
  lexicon: HALOT
  rationale: «Jefe» comunica bien la función de representante principal de su clan en una lista genealógica o de servicio. Se evita «príncipe» por su posible carga monárquica y «capitán» por implicar un matiz militar no exigido por el contexto.
- source_word: וְ/אֶחָ֥י/ו
  english_pob_choice: and his brothers
  chosen_spanish: y doscientos de sus hermanos
  alternatives_spanish:
  - y doscientos de sus parientes
  - y doscientos de sus hermanos de clan
  lexicon: HALOT
  rationale: Se mantiene «hermanos» por fidelidad al término hebreo אָח, pero en español la frase se entiende como miembros del mismo grupo familiar amplio o clan. El numeral se integra naturalmente con la preposición «de» para evitar una construcción pesada.
- source_word: מָאתָֽיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - doscientos
  lexicon: HALOT
  rationale: Número cardinal directo sin necesidad de explicación adicional.
translation_notes:
  revision_awareness: El pasaje coincide en sentido general con el texto hebreo y con la lectura inglesa auditada. La única tensión léxica relevante es אָח/אֶחָיו, que en listas tribales puede significar hermanos literales o parientes del clan; se conserva «hermanos» en el texto y se explicita la alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Elizafán» con acento en la última sílaba para lectura natural del nombre en español.
  - Se prefiere «jefe» como equivalente funcional de שַׂר en este contexto de lista de clan.
  - «Hijos de» se conserva como fórmula genealógica estable, no como referencia exclusiva a hijos biológicos.
