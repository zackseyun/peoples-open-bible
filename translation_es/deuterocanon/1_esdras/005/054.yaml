revisions:
- from: Y en el segundo año[a], cuando habían llegado a la casa de Dios en Jerusalén, en el segundo mes, Zorobabel hijo de Salatiel y Jesúa hijo de Josadac comenzaron, junto con sus hermanos, los sacerdotes, los levitas y todos los que habían venido de la cautividad a Jerusalén[b],
  to: Y en el segundo año[a], cuando llegaron a la casa de Dios en Jerusalén, en el segundo mes, Zorobabel hijo de Salatiel y Jesúa hijo de Josadac comenzaron, junto con sus hermanos y con los sacerdotes, los levitas y todos los que habían venido de la cautividad a Jerusalén[b],
  rationale: Se hace una reparación menor para mejorar la naturalidad y la claridad sintáctica del español sin cambiar el sentido fuente. «Cuando llegaron» expresa bien la secuencia temporal del participio en contexto narrativo, y la inserción de «y con» ayuda a mostrar que «sus hermanos», «los sacerdotes», «los levitas» y «todos los que habían venido de la cautividad» son grupos coordinados en la enumeración. También se ajusta levemente la redacción de la nota a «lenguaje de restauración» por sonar más idiomática en español.
