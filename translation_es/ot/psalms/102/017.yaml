review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura general: כִּי como explicación, Yahvé como sujeto, Sion como objeto, y la nota conserva correctamente la ambigüedad de נִרְאָה. Sin embargo, «se ha aparecido» no representa bien el valor verbal en español y sugiere una construcción no idiomática distinta del hebreo. La mejor opción fiel y natural es «ha aparecido».'
  spanish_quality_summary: La redacción es mayormente clara, pero «se ha aparecido en su gloria» suena impropia en español culto bíblico y contemporáneo. «Ha construido Sion» es aceptable y fiel; «Porque» funciona bien como conector explicativo. La nota al pie necesita ajuste mínimo de estilo para sonar natural en español.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «Sion» y «gloria». No hay conflicto doctrinal con el manejo de la ambigüedad, pero el verbo español debe corregirse de «se ha aparecido» a «ha aparecido» para reflejar mejor el nifal en contexto sin introducir una forma española poco natural.
  issues:
  - severity: high
    issue: «se ha aparecido» es una formulación no idiomática y semánticamente defectuosa
    rationale: En español estándar, «aparecerse» suele construirse con complemento indirecto («se apareció a...»), y «se ha aparecido en su gloria» suena incorrecto. El hebreo נִרְאָה aquí se representa mejor por «ha aparecido», que además coincide con la decisión auditada en inglés.
  - severity: low
    issue: La nota al pie puede mejorarse estilísticamente
    rationale: 'La apertura con comilla simple y «O:» resulta algo torpe. Una formulación como «O bien: “se ve en su gloria” o “ha sido visto en su gloria”» es más natural en español sin cambiar el contenido.'
  revised_spanish_text: Porque Yahvé ha construido Sion[a]; ha aparecido en su gloria.
  revised_footnotes:
  - marker: a
    text: 'O bien: «se ve en su gloria» o «ha sido visto en su gloria». El verbo hebreo puede entenderse tanto como aparición divina como como ser visto.'
    reason: alternative_reading
