translation:
  language: es
  text: 'Y el jefe de los eunucos les puso nombres: a Daniel le puso el nombre de Beltsasar[a], a Hananías el nombre de Sadrac, a Misael el nombre de Mesac, y a Azarías el nombre de Abed-nego.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el jefe de los oficiales» o «el comandante de los oficiales de la corte»; el término hebreo puede denotar un eunuco o, por extensión, un oficial de la corte real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם ... שֵׁמֹות
  english_pob_choice: gave them names
  chosen_spanish: les puso nombres
  alternatives_spanish:
  - les dio nombres
  - les asignó nombres
  lexicon: BDB/HALOT
  rationale: El hebreo usa literalmente «puso/colocó» con «nombres»; en español, «les puso nombres» comunica de forma natural la acción de asignar nuevos nombres sin perder la imagen verbal del original.
- source_word: שַׂר הַסָּרִיסִים
  english_pob_choice: the chief of the eunuchs
  chosen_spanish: el jefe de los eunucos
  alternatives_spanish:
  - el jefe de los oficiales
  - el comandante de los oficiales de la corte
  lexicon: HALOT
  rationale: La POB inglesa conserva el sentido léxico básico de סָרִיס como «eunuco», con la posibilidad contextual de oficial de corte. En español, «jefe de los eunucos» mantiene esa tensión léxica y refleja el término base sin suavizarlo.
- source_word: וַיָּשֶׂם לְדָנִיֵּאל ...
  english_pob_choice: he gave Daniel the name Belteshazzar
  chosen_spanish: a Daniel le puso el nombre de Beltsasar
  alternatives_spanish:
  - a Daniel le dio el nombre de Beltsasar
  - a Daniel le asignó el nombre de Beltsasar
  lexicon: HALOT
  rationale: Se conserva la estructura distributiva del hebreo con «a Daniel le puso el nombre de…». «Beltsasar» sigue la transliteración española usual, y «el nombre de» explicita la relación objeto-verbo que el hebreo repite.
- source_word: וְלַחֲנַנְיָה שַׁדְרַךְ
  english_pob_choice: Hananiah the name Shadrach
  chosen_spanish: a Hananías el de Sadrac
  alternatives_spanish:
  - a Hananías el nombre de Sadrac
  - a Hananías, Sadrac
  lexicon: HALOT
  rationale: La revisión inglesa añadió «the name» para reflejar la estructura repetida; en español se reproduce con «el de Sadrac» dentro de una serie paralela, que suena natural y conserva la elipsis del hebreo.
- source_word: וּלְמִישָׁאֵל מֵישַׁךְ
  english_pob_choice: Mishael the name Meshach
  chosen_spanish: a Misael el de Mesac
  alternatives_spanish:
  - a Misael el nombre de Mesac
  - a Misael, Mesac
  lexicon: HALOT
  rationale: Se mantiene el paralelismo sintáctico con Hananías y Azarías; «Misael» y «Mesac» son transliteraciones adaptadas al español, respetando que son nombres propios y no vocablos traducibles.
- source_word: וְלַעֲזַרְיָה עֲבֵד נְגוֹ
  english_pob_choice: Azariah the name Abed-nego
  chosen_spanish: y a Azarías el de Abed-nego
  alternatives_spanish:
  - y a Azarías el nombre de Abed-nego
  - y a Azarías, Abed-nego
  lexicon: HALOT
  rationale: «Abed-nego» conserva la forma convencional del nombre compuesto; la partícula «el de» reproduce la relación renombradora del hebreo sin añadir material ajeno.
- source_word: בֵּלְטְשַׁאצַּר
  english_pob_choice: Belteshazzar
  chosen_spanish: Beltsasar
  alternatives_spanish:
  - Belsasar
  - Beltsazar
  lexicon: HALOT
  rationale: Se adopta una transliteración española estable y sobria. «Beltsasar» evita una forma demasiado castellanizada que borraría la sonoridad semítica, a la vez que facilita lectura pública.
- source_word: עֲבֵד נְגוֹ
  english_pob_choice: Abed-nego
  chosen_spanish: Abed-nego
  alternatives_spanish:
  - Abednego
  lexicon: HALOT
  rationale: Se conserva el guion, como en la POB inglesa, para transparentar la forma compuesta del nombre y favorecer la lectura auditable.
theological_decisions:
- issue: Identidad y rango de שַׂר הַסָּרִיסִים
  english_pob_reading: 'the chief of the eunuchs (with note: or chief official / commander of the court officials)'
  chosen_spanish_reading: el jefe de los eunucos
  alternative_spanish_readings:
  - el jefe de los oficiales
  - el comandante de los oficiales de la corte
  rationale: La POB inglesa no oculta la tensión semántica de סָרִיס. En español se mantiene «eunucos» en el texto principal para conservar la fuerza léxica y la transparencia auditable; las alternativas se reservan como nota/posible matiz, no como reemplazo automático.
  doctrine_reference: No aplica; decisión léxica y contextual.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que restauró la repetición explícita de «the name» para Hananías, Misael y Azarías. En español se reflejó esa consistencia mediante la fórmula paralela «a X el de Y», manteniendo el patrón distributivo del hebreo y la claridad de la serie.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí; no hay tetragrámaton en este versículo.
  - Se preservó la transliteración de los nombres propios en forma reconocible para lectura pública española.
  - La frase «les puso nombres» evita un calco rígido de «puso sobre ellos nombres» y sigue fielmente la idiomaticidad del hebreo.
  - La nota al pie se ancla solo en «eunucos», donde existe la ambigüedad léxica documentada.
