theological_decisions:
- issue: Meaning of אֱלֹהִים in the phrase 'which gladdens אֱלֹהִים and men'
  chosen_reading: plural 'gods'
  alternative_readings:
  - singular 'God'
  rationale: The Hebrew form is morphologically plural, and in this poetic/fable setting the statement likely reflects conventional language about wine pleasing both divine and human beings, rather than making a direct theological claim about the God of Israel drinking wine. Rendering 'gods' avoids importing a monotheistic singular where the Hebrew wording is broader. Because 'God and men' is a longstanding translation option, it is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
