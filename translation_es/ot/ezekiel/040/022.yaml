translation:
  language: es
  text: Sus ventanas[a], su pórtico y sus decoraciones de palmeras[b] tenían las mismas medidas que la puerta que daba al oriente. Se subía a ella por siete escalones[c], y su pórtico estaba delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ventanales» o «sus aberturas» para el término arquitectónico.
    reason: lexical_alternative
  - marker: b
    text: En este contexto, el hebreo probablemente se refiere a motivos de palmera tallados o decorativos, no a palmeras literales.
    reason: cultural_note
  - marker: c
    text: 'El hebreo usa un verbo plural, probablemente con valor impersonal: «se subía» o «uno subía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַלּוֹנוֹ
  english_pob_choice: its windows
  chosen_spanish: sus ventanas
  alternatives_spanish:
  - sus aberturas
  - sus ventanales
  lexicon: HALOT
  rationale: חַלּוֹן designa una ventana o abertura para luz/vista. En español, «ventanas» conserva el sentido arquitectónico natural y evita una paráfrasis excesiva.
- source_word: וְאֵלַמּוֹ / וְאֵילַמּוֹ
  english_pob_choice: its porch
  chosen_spanish: su pórtico
  alternatives_spanish:
  - su vestíbulo
  - su portal
  lexicon: HALOT
  rationale: El término señala una estructura de entrada proyectada al frente. «Pórtico» mantiene el valor arquitectónico con dignidad y precisión; «vestíbulo» sería más interior, y «portal» puede sonar más genérico.
- source_word: וְתִמָּרוֹ
  english_pob_choice: its palm-tree decorations
  chosen_spanish: sus decoraciones de palmeras
  alternatives_spanish:
  - sus palmeras
  - sus ornamentos de palmera
  lexicon: HALOT
  rationale: En este contexto arquitectónico, תִּמָּרָה no se refiere a palmeras literales sino a motivos ornamentales con forma de palmera. La fórmula elegida hace explícito ese sentido decorativo sin perder la imagen.
- source_word: כְּמִדַּת
  english_pob_choice: had the same measurements as
  chosen_spanish: tenían las mismas medidas que
  alternatives_spanish:
  - medían lo mismo que
  - eran de la misma medida que
  lexicon: HALOT
  rationale: La construcción expresa conformidad en dimensiones. «Tenían las mismas medidas que» es fiel y natural en español para una descripción técnica de arquitectura.
- source_word: הַשַּׁעַר אֲשֶׁר פָּנָיו דֶּרֶךְ הַקָּדִים
  english_pob_choice: the gate that faced east
  chosen_spanish: la puerta que daba al oriente
  alternatives_spanish:
  - la puerta que miraba al oriente
  - la puerta orientada al oriente
  lexicon: HALOT
  rationale: El hebreo usa un giro de orientación espacial. «Daba al oriente» comunica bien la dirección en español bíblico actual y evita la repetición de «orientada»; «puerta» mantiene la referencia arquitectónica general del contexto.
- source_word: וּבְמַעֲלוֹת שֶׁבַע יַעֲלוּ בוֹ
  english_pob_choice: They would go up to it by seven steps
  chosen_spanish: Subían a ella por siete escalones
  alternatives_spanish:
  - Subían a ella por siete gradas
  - Se subía a ella por siete escalones
  lexicon: HALOT
  rationale: El verbo plural en hebreo funciona de modo impersonal/generic en la descripción. «Subían a ella» conserva esa genericidad; «escalones» es claro y común para el lector hispanohablante, sin forzar un tecnicismo.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La relación espacial se mantiene con un español directo. «Delante de ellos» reproduce el valor locativo de לִפְנֵי con naturalidad.
theological_decisions:
- issue: Motivos de palmera en arquitectura sagrada
  english_pob_reading: Hebrew 'its palm trees'; in context this likely refers to palm-tree carvings or decorative motifs rather than literal trees.
  chosen_spanish_reading: «decoraciones de palmeras» indica motivos ornamentales, no árboles literales.
  alternative_spanish_readings:
  - «sus palmeras»
  - «sus ornamentos de palmera»
  rationale: El contexto arquitectónico obliga a entender el término como adorno tallado o aplicado. La redacción española evita una lectura botánica indebida y conserva la imagen simbólica sin sobreexplicarla en el texto principal.
  doctrine_reference: Ezequiel 40:22; arquitectura del templo/visión
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más literal del audit trail inglés: conserva el sujeto plural impersonal («subían»), mantiene el orden descriptivo del hebreo y traduce לִפְנֵיהֶם con una fórmula espacial sobria. También incorpora la decisión auditada de entender las «palm trees» como ornamentos arquitectónicos.'
  spanish_consistency_notes:
  - Se usa «pórtico» de manera consistente para אֵילָם/אוּלָם, en lugar de alternar con «vestíbulo».
  - Se eligió «oriente» para הַקָּדִים por registro bíblico y claridad; no se sustituyó por «este» para mantener la tonalidad de la visión.
  - «Delante de ellos» conserva el valor relacional de לפנייהם sin añadir interpretación extra.
