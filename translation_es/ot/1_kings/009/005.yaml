translation:
  language: es
  text: 'entonces estableceré el trono de tu reino sobre Israel para siempre,[a] tal como hablé acerca de David tu padre, diciendo: «No te faltará un hombre en el trono de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te será cortado un hombre del trono de Israel»; es decir, no te faltará un descendiente real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: then I will establish
  chosen_spanish: entonces estableceré
  alternatives_spanish:
  - y estableceré
  - entonces confirmaré
  lexicon: HALOT
  rationale: El verbo hifil de קום expresa aquí hacer que algo quede firme o establecido. «Estableceré» conserva bien esa fuerza en español; «entonces» refleja la continuación lógica del contexto condicional previo, como en la solución inglesa.
- source_word: כִּסֵּא מַמְלַכְתְּךָ
  english_pob_choice: the throne of your kingdom
  chosen_spanish: el trono de tu reino
  alternatives_spanish:
  - tu trono real
  - el trono de tu reinado
  lexicon: HALOT
  rationale: 'Se mantienen los dos sustantivos del hebreo: «trono» y «reino». Así se conserva el énfasis dinástico y político sin reducirlo a una sola idea.'
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - para Israel
  lexicon: HALOT
  rationale: La preposición עַל en contexto real indica dominio o autoridad sobre un pueblo. «Sobre Israel» es la correspondencia más directa y natural.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia moderna más clara y fiel para la permanencia duradera del linaje prometido.
- source_word: כַּאֲשֶׁר דִּבַּרְתִּי עַל
  english_pob_choice: just as I spoke concerning
  chosen_spanish: tal como hablé acerca de
  alternatives_spanish:
  - tal como dije acerca de
  - así como hablé respecto de
  lexicon: HALOT
  rationale: El hebreo דִּבַּרְתִּי עַל significa «hablé acerca de/respecto de». «Acerca de» evita introducir explícitamente «prometí» en el verbo, aunque el contexto sí es de promesa.
- source_word: דָּוִד אָבִיךָ
  english_pob_choice: David your father
  chosen_spanish: David, tu padre
  alternatives_spanish:
  - David, tu antepasado
  - David, tu padre y predecesor
  lexicon: HALOT
  rationale: Se conserva la referencia dinástica directa. La coma ayuda a leer «tu padre» como apelativo relacional dentro de la línea real, no como paternidad biológica inmediata.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula estándar de cita que introduce el contenido del discurso previo.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  english_pob_choice: You will not lack a man
  chosen_spanish: No te faltará un hombre
  alternatives_spanish:
  - no se te cortará un hombre
  - no te faltará un descendiente varón
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «no será cortado para ti un hombre», el inglés POB ya optó por la equivalencia idiomática «You will not lack a man». En español, «No te faltará un hombre» transmite la misma idea con naturalidad y preserva la línea dinástica sin perder la tensión del verbo subyacente.
- source_word: מֵעַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: on the throne of Israel
  chosen_spanish: en el trono de Israel
  alternatives_spanish:
  - del trono de Israel
  - sobre el trono de Israel
  lexicon: HALOT
  rationale: La frase final indica la ubicación/ámbito del reinado. «En el trono de Israel» sigue la solución inglesa y evita una construcción extraña en español, sin borrar la referencia al trono como sede del gobierno.
theological_decisions:
- issue: Promesa dinástica y contexto condicional inmediato
  english_pob_reading: Render the promise in straightforward dynastic terms without resolving broader theological debates about unconditional versus conditional Davidic covenant fulfillment.
  chosen_spanish_reading: Traducir la promesa en términos dinásticos directos, sin resolver dentro del versículo la tensión mayor entre promesa y condición.
  alternative_spanish_readings:
  - Hacerla sonar como una garantía incondicional
  - Reformularla para subrayar la condición del contexto inmediato
  rationale: El versículo promete continuidad dinástica, pero el contexto anterior introduce una condición. La traducción conserva la promesa tal como está formulada y deja que el contexto sostenga la tensión teológica, sin suavizarla ni resolverla artificialmente.
  doctrine_reference: Translation philosophy §3
- issue: «Un hombre» como continuidad de la línea real
  english_pob_reading: You will not lack a man on the throne of Israel.
  chosen_spanish_reading: No te faltará un hombre en el trono de Israel.
  alternative_spanish_readings:
  - No te faltará un descendiente en el trono de Israel
  - Nunca quedará vacante un hombre en el trono de Israel
  rationale: La expresión «un hombre» mantiene el paralelismo del hebreo y la idea de continuidad de la dinastía. Aunque puede implicar descendencia, no se explicita más de lo que el texto dice.
  doctrine_reference: HALOT; 1 Reyes 9:5, cláusula final
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que pasó de una formulación demasiado literal a una idiomática («You will not lack a man»). La versión española sigue esa decisión y evita un calco como «un hombre no será cortado para ti», sin perder la fuerza dinástica ni la referencia al trono.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparezca en el versículo; aquí no aparece, por lo que no se introduce ninguna forma divina explícita.
  - «Reino» se mantiene para מַמְלָכָה en concordancia con el énfasis dinástico del hebreo.
  - La nota al pie conserva la alternativa idiomática equivalente al audit trail inglés.
  - Se evita «Cristo/Mesías» porque el versículo no contiene ese léxico.
  - Se conserva el paralelismo entre «trono» y «reino» sin expandir a una paráfrasis explicativa.
