translation:
  language: es
  text: El rey y todo el pueblo que estaba con él llegaron cansados[a], y recobraron fuerzas[b] allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vinieron ... y descansaron allí».
    reason: lexical_alternative
  - marker: b
    text: 'El verbo hebreo está en singular («él recobró fuerzas»), aunque algunos lo entienden colectivamente: «recobraron fuerzas».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: HALOT
  rationale: En este contexto narrativo, בוא expresa la llegada a un lugar para detenerse allí. «Llegaron» comunica con naturalidad ese valor de arribo sin perder el movimiento del relato.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo conserva el título, y en español «el rey» es la forma directa y fiel al registro narrativo.
- source_word: וְכָל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: and all the people who were with him
  chosen_spanish: y toda la gente que estaba con él
  alternatives_spanish:
  - y todo el pueblo que estaba con él
  - y toda la gente con él
  lexicon: HALOT
  rationale: «הָעָם» puede rendirse como «el pueblo» o «la gente». Aquí «la gente» evita una carga eclesiástica o nacional que el contexto inmediato no exige, y «que estaba con él» mantiene explícita la relación relativa del hebreo.
- source_word: עֲיֵפִים
  english_pob_choice: weary
  chosen_spanish: cansados
  alternatives_spanish:
  - agotados
  - fatigados
  - exhaustos
  lexicon: HALOT
  rationale: El adjetivo indica fatiga física. «Cansados» es claro y natural en español; «agotados» sería más intensivo de lo que el hebreo obliga.
- source_word: וַיִּנָּפֵשׁ
  english_pob_choice: they refreshed themselves
  chosen_spanish: se refrescaron
  alternatives_spanish:
  - descansaron
  - se recuperaron
  - tomaron aliento
  lexicon: HALOT
  rationale: El verbo expresa renovarse, tomar aliento o recobrar fuerzas. Dado el seguimiento del texto, «se refrescaron» conserva esa idea de alivio y recuperación mejor que un mero «descansaron».
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» es idiomático y mantiene la referencia espacial del pasaje.
theological_decisions:
- issue: Valor colectivo del verbo final frente a la forma singular hebrea
  english_pob_reading: The English audit first noted the Hebrew singular ('he refreshed himself'), but a revision changed it to 'they refreshed themselves' to match the plural subject in the Hebrew and preserve completeness and accuracy.
  chosen_spanish_reading: 'Se traduce en plural: «se refrescaron allí», siguiendo la revisión final del POB en inglés.'
  alternative_spanish_readings:
  - se refrescó allí
  - el rey se refrescó allí
  rationale: Aunque el verbo hebreo está en singular, el historial de revisión del POB resuelve la cuestión en favor del plural para reflejar el sujeto colectivo. El español debe seguir esa decisión auditada y no reabrir la tensión sin necesidad.
  doctrine_reference: No aplica; decisión de concordancia y sujeto colectivo, no doctrinal.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que cambió la traducción final del verbo de singular a plural para concordar con la lectura colectiva del sujeto. No se incluyeron notas al pie porque el texto español no necesita una alternativa anclada para esta línea en su forma final.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier mascaramiento del nombre divino porque este versículo no lo contiene.
  - «El rey» conserva el título del hebreo, sin añadir el nombre propio de David.
  - «La gente» se eligió para הָעָם por naturalidad en español; no introduce un matiz eclesiástico.
  - El verbo final se mantuvo en plural, en consonancia con la revisión final inglesa y con el sujeto colectivo del contexto.
  - El registro es sobrio y narrativo, apto para lectura pública y coherente con el estilo POB.
