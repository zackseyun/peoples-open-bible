translation:
  language: es
  text: Entonces Gaal hijo de Ebed salió[a] y se puso de pie a la entrada de la puerta de la ciudad, y Abimelec y la gente que estaba con él se levantaron desde la emboscada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salió». El verbo hebreo simplemente señala movimiento hacia afuera; también puede traducirse «vino/salió hacia fuera» según el punto de referencia narrativo.
    reason: lexical_alternative
  - marker: b
    text: O «desde el lugar de la emboscada» o «desde la posición de emboscada». El sustantivo hebreo puede referirse tanto a la emboscada como a la posición de emboscada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - salió fuera
  lexicon: HALOT
  rationale: יצא en la narrativa con waw consecutiva expresa movimiento hacia afuera. En español, «salió» comunica ese desplazamiento de forma natural y fiel, sin añadir matices interpretativos.
- source_word: גַּעַל בֶּן עֶבֶד
  english_pob_choice: Gaal son of Ebed
  chosen_spanish: Gaal hijo de Ebed
  alternatives_spanish:
  - Gaal el hijo de Ebed
  lexicon: Convención de transliteración bíblica / patronímico hebreo
  rationale: Se conservan los nombres propios transliterados y se vierte בן con «hijo de», que es la forma clara y directa del patronímico hebreo en español.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se quedó de pie
  alternatives_spanish:
  - se puso de pie
  - se plantó
  lexicon: HALOT
  rationale: עמד puede ser simplemente «estar de pie» o «ponerse en pie». Aquí el contexto narrativo pide una acción visible y simple; «se quedó de pie» mantiene el sentido sin introducir una connotación militar que el hebreo no explicita.
- source_word: פֶּתַח שַׁעַר הָעִיר
  english_pob_choice: at the entrance of the city gate
  chosen_spanish: a la entrada de la puerta de la ciudad
  alternatives_spanish:
  - en la entrada de la puerta de la ciudad
  - a la abertura de la puerta de la ciudad
  lexicon: HALOT
  rationale: פתח es «entrada/apertura» y שער העיר es «puerta de la ciudad». En español, «a la entrada de la puerta de la ciudad» conserva la relación constructa y el escenario público del episodio, aunque resulte algo redundante en comparación con el hebreo.
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  lexicon: HALOT
  rationale: קום, en este contexto, describe la reacción de Abimelec y su grupo desde su posición oculta. «Se levantaron» mantiene la fuerza narrativa y la idea de pasar a la acción sin forzar una imagen técnica adicional.
- source_word: וְהָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: and the people who were with him
  chosen_spanish: y la gente que estaba con él
  alternatives_spanish:
  - y el pueblo que estaba con él
  - y los hombres que estaban con él
  lexicon: HALOT
  rationale: עָם puede ser «pueblo», «gente» o «hombres» según el contexto. En esta escena militar, «la gente que estaba con él» sigue de cerca la amplitud del sustantivo hebreo sin restringirlo innecesariamente a un término más técnico.
- source_word: מִן הַמַּאְרָב
  english_pob_choice: from the ambush
  chosen_spanish: desde la emboscada
  alternatives_spanish:
  - desde el lugar de emboscada
  - desde el sitio de la emboscada
  lexicon: HALOT
  rationale: מארב puede designar la emboscada misma o la posición/puesto de emboscada. «Desde la emboscada» reproduce bien la imagen táctica y permite la misma ambigüedad controlada que conserva la traducción inglesa.
theological_decisions:
- issue: 'Ambigüedad de מַאְרָב: emboscada como acción o como lugar'
  english_pob_reading: Or 'rose up from the place of ambush.' The Hebrew noun can denote either the ambush itself or the ambush-position.
  chosen_spanish_reading: desde la emboscada
  alternative_spanish_readings:
  - desde el lugar de la emboscada
  - desde el sitio de la emboscada
  rationale: Se conserva la ambigüedad léxica documentada por el texto y por la nota inglesa. En español, «desde la emboscada» puede referirse tanto a la acción táctica como al lugar desde el cual salen Abimelec y su gente.
  doctrine_reference: No aplica; decisión léxica/narrativa.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios respecto del borrador en inglés. El presente draft español refleja esa estabilidad textual y mantiene las alternativas documentadas en la nota auditada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el hebreo lo exija; este versículo no contiene el tetragrámaton.
  - Se conservó el tono narrativo sobrio del relato, sin añadir inferencias tácticas no expresadas explícitamente.
  - «Gaal» y «Abimelec» se transliteran de forma consistente con el uso bíblico estándar del proyecto.
