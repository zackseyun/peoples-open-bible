translation:
  language: es
  text: 'Y cuando Judas se acercó al wadi[a], apostó a los escribas[b] del pueblo en el wadi y les dio esta orden: «No dejen que nadie acampe, sino que todos entren en la batalla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «torrente», «arroyo» o «lecho del arroyo». El griego alude a un cauce estacional; se conserva «wadi» para mantener el sentido topográfico.
    reason: lexical_alternative
  - marker: b
    text: «Escribas del pueblo» puede referirse a oficiales administrativos o a encargados de registros al servicio del ejército, pero se conserva el término literal «escribas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισεν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - llegó cerca
  - se aproximó
  lexicon: LSJ
  rationale: El verbo griego expresa aproximación narrativa simple. «Se acercó» es natural en español y conserva el sentido sin añadir matices innecesarios.
- source_word: χειμάρρουν τοῦ ὕδατος
  english_pob_choice: wadi
  chosen_spanish: wadi
  alternatives_spanish:
  - torrente
  - arroyo
  - lecho del torrente
  lexicon: LSJ
  rationale: Se conserva «wadi» como término geográfico preciso para un cauce estacional, como en el inglés POB. El genitivo «del agua» no se traslada literalmente porque en español resultaría forzado; el contexto ya comunica la idea de curso de agua estacional.
- source_word: ἔστησεν
  english_pob_choice: stationed
  chosen_spanish: puso
  alternatives_spanish:
  - apostó
  - colocó
  - estableció
  lexicon: LSJ
  rationale: En contexto militar, el griego indica colocar personas en una posición determinada. «Puso» es breve y claro en español; «apostó» o «colocó» también serían posibles, pero «puso» evita un registro demasiado técnico y sigue siendo fiel.
- source_word: γραμματεῖς τοῦ λαοῦ
  english_pob_choice: the scribes of the people
  chosen_spanish: los escribas del pueblo
  alternatives_spanish:
  - los funcionarios del pueblo
  - los secretarios del pueblo
  lexicon: LSJ
  rationale: Se mantiene el término lexical «escribas», como en el POB inglés, para no borrar la forma griega. «Del pueblo» conserva el genitivo y deja abierta la función administrativa o documental sin imponer una reinterpretación.
- source_word: ἐπὶ τοῦ χειμάρρου
  english_pob_choice: at the wadi
  chosen_spanish: en el wadi
  alternatives_spanish:
  - junto al wadi
  - al lado del wadi
  lexicon: LSJ
  rationale: La preposición indica ubicación en relación con el cauce. «En el wadi» es conciso y natural en español, manteniendo la localización sin sobreespecificar.
- source_word: Μὴ ἀφῆτε ἄνθρωπον παρεμβαλεῖν
  english_pob_choice: Do not let anyone camp
  chosen_spanish: No dejen que nadie acampe
  alternatives_spanish:
  - No permitan que nadie acampe
  - No dejen a nadie acampar
  lexicon: LSJ
  rationale: La prohibición usa una construcción permisiva; en español, «no dejen que nadie acampe» refleja bien la fuerza del imperativo. «Acampar» traduce el uso militar de παρεμβάλλω sin perder naturalidad.
- source_word: ἐρχέσθωσαν πάντες εἰς τὸν πόλεμον
  english_pob_choice: let them all come into the battle
  chosen_spanish: todos entren en la batalla
  alternatives_spanish:
  - que todos vayan a la batalla
  - que todos entren al combate
  lexicon: LSJ
  rationale: El imperativo plural exhorta a participación total. «Entren en la batalla» reproduce el movimiento hacia el combate y mantiene el sustantivo concreto «batalla» como en el inglés POB.
translation_notes:
  revision_awareness: 'El inglés POB revisó la expresión a partir de una forma más literal («wadi of water») y simplificó la orden militar de «encamp» a «camp» para mayor naturalidad. La versión española sigue esa revisión: evita añadir un equivalente pesado de «del agua», conserva el término geográfico «wadi» y usa una orden fluida («acampe») para reflejar la misma fuerza sin arcaísmo.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Judas» y el título militar o administrativo sin expandirlo más allá de lo exigido por el griego.
  - Se conserva «wadi» por consistencia con la decisión del POB inglés y para no perder el relieve geográfico del cauce estacional.
  - «Batalla» traduce πόλεμος de forma directa y coherente con el tono militar del pasaje.
