review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la promesa negativa futura, el modismo «el pie de Israel», la condición real de obediencia y la tríada legal. Sin embargo, dos puntos requieren ajuste para alinearse mejor con la evidencia fuente y la auditoría inglesa: (1) «por mano de Moisés» se usa en el texto principal donde la POB inglesa eligió una expresión dinámica equivalente en el texto y dejó la forma literal como nota; en español conviene igualmente explicitar la mediación en el texto principal y reservar la literalidad para nota. (2) «establecí» es aceptable, pero «designé» o «dispuse» refleja mejor aquí el sentido de tierra asignada a los padres, en sintonía con la decisión inglesa «appointed».'
  spanish_quality_summary: El español es claro y digno, pero hay cierta rigidez en «de sobre» y especialmente en «por mano de Moisés». «De sobre la tierra» puede mantenerse por fidelidad preposicional, aunque suena algo calcado; no es un error grave. En cambio, «por mano de Moisés» en el cuerpo del texto resulta más arcaizante y menos natural de lo deseable para el estilo meta. La frase condicional «con tal de que» es buena y comunica bien la contingencia real.
  glossary_alignment: 'No hay conflictos con la terminología global principal del proyecto. Los términos legales «ley», «estatutos» y «juicios» respetan la distinción fuente. No aparece Yahvé ni otros términos del glosario central. La principal cuestión de alineación es metodológica: seguir la racionalidad documentada de la POB para בְּיַד מֹשֶׁה con una formulación española principal equivalente a «por medio de / mediante Moisés», dejando «por mano de Moisés» como alternativa en nota.'
  issues:
  - severity: medium
    issue: «por mano de Moisés» en el texto principal
    rationale: La auditoría inglesa decidió expresar el sentido de mediación en el texto principal («given through Moses») y dejar «by the hand of Moses» como alternativa. El español debería seguir esa misma racionalidad documentada para evitar una formulación innecesariamente opaca en el cuerpo del texto.
  - severity: low
    issue: «establecí» puede ser menos preciso que «designé» en este contexto
    rationale: El hebreo הֶעֱמַדְתִּי aquí se refiere a establecer/asignar la tierra para los padres. «Establecí» no es incorrecto, pero «designé» comunica mejor la idea de nombramiento o asignación divina, más cerca de «appointed».
  - severity: low
    issue: La nota b no corresponde al mejor reparto texto/nota
    rationale: Si el texto principal adopta la mediación explícita («por medio de Moisés»), la nota puede conservar la literalidad «por mano de Moisés», reproduciendo mejor la función de la nota inglesa y la transparencia fuente.
  revised_spanish_text: Y no volveré a quitar el pie de Israel de sobre la tierra que designé para sus padres[a], con tal de que cuiden de hacer todo lo que les mandé, conforme a toda la ley, los estatutos y los juicios dados por medio de Moisés[b].
  revised_footnotes:
