translation:
  language: es
  text: Todos tus vestidos están perfumados con mirra, áloes y casia[a]; desde los palacios de marfil[b], instrumentos de cuerda[c] te han alegrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Mirra, áloes y casia son todos tus vestidos''.'
    reason: previous_rendering
  - marker: b
    text: 'O: ''de palacios de marfil''. La frase también puede entenderse con un matiz ligeramente distinto: ''desde los palacios de marfil'', ''fuera de los palacios de marfil'' o ''a causa de los palacios de marfil''.'
    reason: alternative_reading
  - marker: c
    text: 'El hebreo no expresa el sujeto de ''te han alegrado''; las posibilidades incluyen ''música'', ''músicos'' o, por interpretación tradicional, ''instrumentos de cuerda''. También puede entenderse: ''desde los palacios de marfil, instrumentos de cuerda te han alegrado''.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֹר
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra resinosa
  lexicon: HALOT
  rationale: Término bíblico estándar para el aroma/resina fragante; 'mirra' comunica de forma natural y precisa el valor léxico.
- source_word: וַאֲהָלוֹת
  english_pob_choice: aloes
  chosen_spanish: áloes
  alternatives_spanish:
  - agarwood
  - lignáloe
  lexicon: HALOT
  rationale: En este contexto no se trata de la planta moderna, sino de una madera/perfume aromático. 'Áloes' es la equivalencia bíblica usual en español, con la precisión botánica preservable en nota si hiciera falta.
- source_word: קְצִיעוֹת
  english_pob_choice: cassia
  chosen_spanish: casia
  alternatives_spanish:
  - canela de casia
  - casia aromática
  lexicon: HALOT
  rationale: Es una especia aromática; 'casia' es la forma breve y reconocible en español bíblico.
- source_word: כָּל בִּגְדֹתֶיךָ
  english_pob_choice: are all your garments
  chosen_spanish: todos tus vestidos
  alternatives_spanish:
  - todos tus mantos
  - todas tus ropas
  lexicon: HALOT
  rationale: El hebreo es una construcción nominal sin verbo expreso. En español, 'todos tus vestidos son fragantes con...' expresa con naturalidad la cualidad de las prendas sin forzar una traducción demasiado literal que sonaría ajena al idioma.
- source_word: מִן הֵיכְלֵי שֵׁן
  english_pob_choice: from ivory palaces
  chosen_spanish: desde palacios de marfil
  alternatives_spanish:
  - desde palacios de marfil blanco
  - desde palacios marfileños
  lexicon: HALOT
  rationale: Se conserva el valor locativo de מן y el sentido de הֵיכָל como 'palacios' en este marco real. 'Marfil' mantiene la imagen idiomática clara en español.
- source_word: מִנִּי
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - de
  - a causa de
  lexicon: HALOT
  rationale: La preposición es ambigua; 'desde' permite leerla como marco locativo y deja abierta la relación sintáctica exacta que el hebreo no explicita del todo.
- source_word: שִׂמְּחֽוּ/ךָ
  english_pob_choice: have made you glad
  chosen_spanish: te han alegrado
  alternatives_spanish:
  - te han hecho alegre
  - te han dado alegría
  lexicon: HALOT
  rationale: El piel perfecto 3cp con sufijo 2ms expresa que un plural implícito produce alegría en el rey. 'Te han alegrado' es idiomático y conserva el sujeto plural no explicitado.
- source_word: implicit subject of שִׂמְּחֽוּ/ךָ
  english_pob_choice: stringed instruments
  chosen_spanish: cuerdas
  alternatives_spanish:
  - instrumentos de cuerda
  - músicos
  - música
  lexicon: HALOT
  rationale: El hebreo no nombra el sujeto. 'Cuerdas' refleja la interpretación tradicional de instrumentos de cuerda y conserva la incertidumbre con una forma breve en español; la ambigüedad se preserva en nota.
theological_decisions:
- issue: Marco real del salmo y posible lectura mesiánica
  english_pob_reading: Translate in its immediate royal wedding context without importing later messianic interpretation into the wording of this verse.
  chosen_spanish_reading: Traducir el verso dentro de su contexto inmediato de boda real, sin introducir en la redacción una lectura mesiánica posterior.
  alternative_spanish_readings:
  - Redacción más abiertamente mesiánica
  - Formulación que aluda de manera implícita al Mesías
  rationale: El hebreo describe lujo, fragancia y celebración cortesana. Aunque la tradición cristiana pueda leer el salmo tipológicamente, la versión española no debe añadir ese nivel al texto del verso si no está explícito en el original.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'El borrador inglés más reciente aclaró la sintaxis de ''from ivory palaces'' con puntuación y prefirió una lectura más natural del primer hemistiquio como cualidad fragante de los vestidos. La versión española sigue esa línea: conserva la imagen de las especias como fragancia de las vestiduras y mantiene la ambigüedad del sujeto plural implícito en la segunda mitad.'
  spanish_consistency_notes:
  - Se usa 'marfil' para שֵׁן, con 'palacios de marfil' como equivalencia idiomática estable.
  - Se prefirió 'áloes' como término bíblico usual, no la planta moderna, por fidelidad al contexto semítico.
  - Se mantuvo el plural no explícito del hebreo en 'te han alegrado' y se señaló la lectura tradicional de 'cuerdas' en nota.
  - No se introdujo 'Mesías' en el cuerpo del verso, conforme al contexto real inmediato del salmo.
