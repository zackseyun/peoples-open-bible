translation:
  language: es
  text: entonces oye desde el cielo y actúa, y juzga a tus siervos, retribuyendo al malvado al hacer recaer su camino sobre su propia cabeza[b], y dándole la razón al justo[a] al darle conforme a su justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'justificando al justo'. El hebreo usa un término forense que significa declarar o tratar a alguien como quien está en lo correcto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'al poner su camino sobre su cabeza'; es un modismo hebreo para hacer volver sobre alguien su propia conducta en juicio.
    reason: cultural_note
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha atentamente
  lexicon: HALOT
  rationale: En lenguaje de oración dirigido a Dios, שׁמע expresa una escucha atenta y responsiva. 'Escucha' conserva la solemnidad y la naturalidad del español sin volverlo demasiado coloquial.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa plural; en español 'cielos' refleja mejor esa forma, mientras 'desde el cielo' sería más idiomático pero menos transparente respecto al plural hebreo.
- source_word: וְעָשִׂיתָ
  english_pob_choice: act
  chosen_spanish: actúa
  alternatives_spanish:
  - haz
  - obra
  lexicon: HALOT
  rationale: Aquí el verbo es amplio, pero en este contexto judicial pide una intervención decisiva. 'Actúa' comunica bien esa acción divina sin alejarse del valor básico del verbo.
- source_word: וְשָׁפַטְתָּ אֶת עֲבָדֶיךָ
  english_pob_choice: judge your servants
  chosen_spanish: juzga a tus siervos
  alternatives_spanish:
  - juzga a tus servidores
  - gobierna a tus siervos
  lexicon: HALOT
  rationale: שׁפט mantiene un sentido forense en esta oración; 'juzga' preserva ese marco legal. 'Siervos' evita una carga moderna de 'esclavos' que no domina aquí, dado el contexto de pacto y oración.
- source_word: לְהָשִׁיב לְרָשָׁע
  english_pob_choice: repaying the wicked
  chosen_spanish: retribuyendo al malvado
  alternatives_spanish:
  - pagando al malvado
  - devolviendo al malvado
  lexicon: HALOT
  rationale: El infinitivo de שוב con ל expresa retribución, es decir, hacer que la conducta vuelva sobre el culpable. 'Retribuyendo' captura el resultado judicial con buena naturalidad en español.
- source_word: לָתֵת דַּרְכּוֹ בְּרֹאשׁוֹ
  english_pob_choice: by bringing his way upon his own head
  chosen_spanish: al hacer recaer su camino sobre su propia cabeza
  alternatives_spanish:
  - al poner su camino sobre su cabeza
  - al traer su conducta sobre su cabeza
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de que el propio camino/conducta vuelve sobre el culpable. 'Hacer recaer' hace el giro idiomático más natural en español sin perder la metáfora.
- source_word: וּלְהַצְדִּיק צַדִּיק
  english_pob_choice: vindicating the righteous
  chosen_spanish: vindicando al justo
  alternatives_spanish:
  - justificando al justo
  - declarando justo al justo
  lexicon: HALOT
  rationale: 'El hifil de צדק es forense: declarar o tratar como en lo correcto. ''Vindicando'' comunica bien la absolución judicial sin cargar inmediatamente la formulación con asociaciones doctrinales posteriores.'
- source_word: לָתֶת לוֹ כְּצִדְקָתוֹ
  english_pob_choice: by giving to him according to his righteousness
  chosen_spanish: al darle conforme a su justicia
  alternatives_spanish:
  - al darle según su rectitud
  - al recompensarlo conforme a su justicia
  lexicon: HALOT
  rationale: '''Conforme a su justicia'' preserva la idea de retribución proporcional y mantiene δικαιοσύνη/צדקה como ''justicia'' en un sentido práctico y legal.'
theological_decisions:
- issue: Marco forense del juicio divino
  english_pob_reading: 'Render the verse in judicial terms: God judges, repays the wicked, and vindicates the righteous.'
  chosen_spanish_reading: 'Presentar el versículo en términos judiciales: Dios juzga, retribuye al malvado y vindica al justo.'
  alternative_spanish_readings:
  - Describir solo una intervención general de Dios sin lenguaje jurídico explícito
  rationale: Las formas verbales y el paralelismo del verso indican una escena de tribunal. Mantener ese marco preserva la tensión textual sin suavizarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de הצדיק
  english_pob_reading: vindicating the righteous
  chosen_spanish_reading: vindicando al justo
  alternative_spanish_readings:
  - justificando al justo
  rationale: '''Justificar'' es posible, pero en español puede arrastrar asociaciones doctrinales posteriores no explícitas aquí. ''Vindicar'' expresa mejor la declaración forense en este contexto narrativo-oracional.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando ambos marcadores dentro del texto: [b] junto a ''su propia cabeza'' y [a] junto a ''al justo''. Se mantuvo la equivalencia óptima del registro jurídico del versículo y se evitó una calca demasiado rígida donde el español requiere un giro idiomático natural.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en este proyecto, pero este versículo no lo contiene explícitamente.
  - '''Cielos'' conserva el plural hebreo de שָׁמַיִם.'
  - '''Siervos'' se mantiene por el contexto de pacto y oración; no se optó por ''esclavos'' porque aquí el énfasis no es la servidumbre material.'
  - '''Justicia'' traduce צְדָקָה para mantener el campo semántico legal y relacional del hebreo.'
