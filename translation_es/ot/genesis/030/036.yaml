translation:
  language: es
  text: Y puso una distancia de tres días entre él y Jacob[a], y Jacob pastoreaba el resto del rebaño de Labán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un camino de tres días» / «tres días de camino». El hebreo usa literalmente «camino de tres días» para expresar la distancia que los separaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: he set
  chosen_spanish: puso
  alternatives_spanish:
  - estableció
  - colocó
  - puso una distancia
  lexicon: HALOT
  rationale: El verbo שׂוּם aquí expresa la acción de fijar o establecer una separación. En español, «puso una distancia» comunica bien el valor idiomático sin alejarse del hebreo, y mantiene un registro natural y digno.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  english_pob_choice: a distance of three days
  chosen_spanish: una distancia de tres días
  alternatives_spanish:
  - un camino de tres días
  - tres días de camino
  - una jornada de tres días
  lexicon: HALOT
  rationale: La expresión hebrea usa literalmente «camino de tres días» para indicar separación espacial. «Una distancia de tres días» conserva el sentido idiomático auditable y es más claro en español moderno.
- source_word: בֵּינוֹ וּבֵין יַעֲקֹב
  english_pob_choice: between himself and Jacob
  chosen_spanish: entre él y Jacob
  alternatives_spanish:
  - entre sí y Jacob
  - entre él mismo y Jacob
  lexicon: HALOT
  rationale: El sujeto implícito es masculino singular, en contexto Labán. En español, «entre él y Jacob» es suficiente y natural; no hace falta explicitar el reflexivo como en inglés para evitar ambigüedad.
- source_word: וְיַעֲקֹב רֹעֶה
  english_pob_choice: and Jacob was shepherding
  chosen_spanish: y Jacob cuidaba
  alternatives_spanish:
  - y Jacob pastoreaba
  - y Jacob apacentaba
  - y Jacob estaba cuidando
  lexicon: HALOT
  rationale: El participio expresa acción continua. «Cuidaba» preserva la continuidad y funciona bien en español, aunque «pastoreaba» o «apacentaba» son posibles. Se evita un calco torpe, pero se mantiene la imagen pastoril por medio de «rebaño».
- source_word: צֹאן
  english_pob_choice: flock
  chosen_spanish: rebaño
  alternatives_spanish:
  - flock
  - ganado menor
  - ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן designa ganado menor o animales del rebaño. «Rebaño» es la opción más natural y bíblicamente transparente en español para este contexto pastoral.
- source_word: הַנּוֹתָרֹת
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo restante de
  - los restantes
  - lo que quedaba de
  lexicon: HALOT
  rationale: El participio significa «lo que quedó / lo restante». «El resto de» reproduce bien la referencia al grupo no retirado en el contexto previo y suena natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directamente y toma como guía el recorrido auditado del inglés POB: se conserva la idea idiomática de la distancia, se mantiene la acción continua del participio y se evita suavizar en exceso el lenguaje pastoral. La nota al pie conserva la alternativa lexical que el POB inglés documentó para דֶּרֶךְ שְׁלֹשֶׁת יָמִים.'
  spanish_consistency_notes:
  - Se usa «Jacob» y «Labán» de forma consistente con la tradición onomástica bíblica en español.
  - Se eligió «rebaño» para צֹאן por claridad y naturalidad, manteniendo el campo semántico pastoril.
  - No se introdujo terminología doctrinal, porque el versículo es narrativo y no presenta una tensión teológica específica.
