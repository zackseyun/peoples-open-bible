base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/006/013.yaml
  text: 'He was hired for this purpose: that I should become afraid and act that way and sin[a], so that they would have grounds for an evil report[b], in order that they might reproach me.'
  footnotes:
  - marker: a
    text: Or 'He was paid for this' or 'He was bribed for this.' The Hebrew participle שָׂכוּר most directly means 'hired' or 'paid'; 'bribed' makes the corrupt intent more explicit.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it would be to them for an evil name.' The phrase likely means that Nehemiah's sin would give his enemies material for slander or a bad reputation to attach to him.
    reason: lexical_alternative
