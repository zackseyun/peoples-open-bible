translation:
  language: es
  text: las cortinas del atrio[a], sus columnas y sus bases[b], y la cortina para la entrada del atrio, sus cuerdas[c] y sus estacas, y todos los utensilios para el servicio del tabernáculo, para la tienda de reunión;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «patio» por «atrio».
    reason: lexical_alternative
  - marker: b
    text: O «zócalos» por «bases».
    reason: lexical_alternative
  - marker: c
    text: O «cordones» por «cuerdas».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלְעֵי
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - hangings
  - lienzos
  - paños colgantes
  lexicon: HALOT
  rationale: En el contexto del atrio del tabernáculo, el término se refiere a las piezas de tela que forman el cierre perimetral. ‘Cortinas’ comunica bien la función en español sin perder la referencia al tejido colgante.
- source_word: הֶחָצֵר
  english_pob_choice: court
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - patio exterior
  - corte
  lexicon: HALOT
  rationale: ‘Atrio’ es un término bíblico y culto en español para el recinto sagrado exterior. Evita la ambigüedad de ‘patio’ y conserva el valor cultual del espacio.
- source_word: עַמֻּדֶיהָ
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: El sustantivo designa soportes verticales. ‘Columnas’ es natural en español y mantiene la idea de elementos estructurales visibles; ‘pilares’ también sería posible.
- source_word: אֲדָנֶיהָ
  english_pob_choice: its bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus pedestales
  - sus encajes
  lexicon: HALOT
  rationale: ‘Bases’ sigue de cerca la función de las piezas metálicas sobre las que se asentaban las columnas. En español es claro y suficientemente técnico.
- source_word: הַמָּסָךְ
  english_pob_choice: the screen
  chosen_spanish: la pantalla
  alternatives_spanish:
  - el velo
  - la cortina
  - el cerramiento
  lexicon: HALOT
  rationale: Aquí el término designa la pieza de entrada distinta de las cortinas perimetrales. ‘Pantalla’ permite distinguirla de ‘cortinas’ y conserva la imagen de una pieza que cubre la abertura; ‘velo’ podría sonar demasiado litúrgico y confundir con otro término.
- source_word: לְשַׁעַר הֶחָצֵר
  english_pob_choice: for the gate of the court
  chosen_spanish: para la entrada del atrio
  alternatives_spanish:
  - para la puerta del atrio
  - para la puerta del patio
  - para la entrada del patio
  lexicon: HALOT
  rationale: Aunque el hebreo usa ‘שער’ (‘puerta/portón’), en este contexto se trata de una abertura con pantalla. ‘Entrada’ comunica mejor el objeto sin forzar la imagen de un portón rígido.
- source_word: מֵיתָרָיו
  english_pob_choice: its ropes
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus cordones
  - sus sogas
  - sus soguillas
  lexicon: HALOT
  rationale: La POB inglesa deja abierta la alternativa ‘cords’. En español, ‘cuerdas’ refleja bien líneas de sujeción y es más natural que ‘sogas’ en un inventario sagrado.
- source_word: וִיתֵדֹתֶיהָ
  english_pob_choice: its pegs
  chosen_spanish: sus estacas
  alternatives_spanish:
  - sus clavijas
  - sus piquetas
  - sus púas
  lexicon: HALOT
  rationale: Estos elementos fijaban las cuerdas al suelo. ‘Estacas’ transmite mejor la idea de anclaje firme que ‘clavijas’, que podría sonar demasiado pequeña o mecánica.
- source_word: כְּלֵי
  english_pob_choice: the utensils
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los artículos
  - los implementos
  - los objetos
  lexicon: HALOT
  rationale: La revisión inglesa cambió a ‘utensils’ por mayor consistencia formal. En español, ‘utensilios’ refleja bien el conjunto de objetos de servicio sin restringirlos indebidamente a cocina.
- source_word: עֲבֹדַת
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - obra
  - labor
  - ministerio
  lexicon: HALOT
  rationale: Aquí ‘servicio’ mantiene el sentido funcional-cultual del trabajo en el santuario. ‘Ministerio’ sería demasiado eclesiástico y menos literal.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda
  - el santuario portátil
  lexicon: HALOT
  rationale: ‘Tabernáculo’ es el equivalente consagrado en español y preserva la referencia técnica al santuario portátil.
- source_word: לְאֹהֶל מוֹעֵד
  english_pob_choice: for the tent of meeting
  chosen_spanish: para el tabernáculo de reunión
  alternatives_spanish:
  - para la tienda de reunión
  - para la tienda del encuentro
  - para la tienda de la reunión
  lexicon: HALOT
  rationale: La expresión hebrea es el título fijo del santuario. En español, ‘tabernáculo de reunión’ mantiene la solemnidad y la relación interna con ‘tabernáculo’; ‘tienda de reunión’ también es posible, pero menos unificado con el resto del versículo.
theological_decisions:
- issue: 'Designación del lugar santo final: «אֹהֶל מוֹעֵד»'
  english_pob_reading: for the tent of meeting
  chosen_spanish_reading: para el tabernáculo de reunión
  alternative_spanish_readings:
  - para la tienda de reunión
  - para la tienda del encuentro
  rationale: El hebreo usa un título técnico del santuario. Aunque ‘tienda de reunión’ es literal, ‘tabernáculo de reunión’ conserva la continuidad terminológica con ‘tabernáculo’ en la misma frase y evita una oscilación innecesaria de referentes en español.
  doctrine_reference: Ex 29:42-43; Ex 40:34-38
- issue: Distinción entre los elementos del atrio y la apertura de acceso
  english_pob_reading: the hangings of the court... the screen for the gate of the court
  chosen_spanish_reading: las cortinas del atrio... la pantalla para la entrada del atrio
  alternative_spanish_readings:
  - los lienzos del atrio... el velo para la puerta del atrio
  - las cortinas del patio... la cortina para la puerta del patio
  rationale: El texto distingue las cortinas perimetrales de la pieza de entrada. ‘Pantalla’ para הַמָּסָךְ preserva esa diferencia y evita confundirla con las cortinas del perímetro o con un ‘velo’ de connotación distinta.
  doctrine_reference: Ex 27:9-16; Ex 38:9-20
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó ‘equipment’ por ‘utensils’ para uniformar el valor de כְּלֵי. El borrador español refleja esa preferencia con ‘utensilios’ y mantiene la estructura inventarial del versículo. También se conservó la distinción entre las cortinas del atrio y la pieza de entrada, siguiendo la lectura estable del contexto tabernacular.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usó ‘tabernáculo’ para הַמִּשְׁכָּן y, para la expresión fija לְאֹהֶל מוֹעֵד, ‘tabernáculo de reunión’ para conservar cohesión terminológica.
  - 'Se eligieron formas naturales pero cultualmente sobrias: ‘atrio’, ‘cortinas’, ‘bases’, ‘cuerdas’, ‘estacas’, ‘utensilios’.'
