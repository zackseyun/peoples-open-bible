lexical_decisions:
- source_word: בְּרֶגַע קָטֹן
  english_pob_choice: for a brief moment
  chosen_spanish: por un breve momento
  alternatives_spanish:
  - por un momento breve
  - por un instante
  - por poco tiempo
  lexicon: HALOT
  rationale: La combinación hebrea expresa una duración muy corta. En español, «por un breve momento» conserva tanto el valor temporal de בְּרֶגַע como la idea de brevedad de קָטֹן, sin sonar demasiado literal ni perder naturalidad.
- source_word: עֲזַבְתִּיךְ
  english_pob_choice: I abandoned you
  chosen_spanish: te abandoné
  alternatives_spanish:
  - te dejé
  - te desamparé
  - te forsé
  lexicon: HALOT
  rationale: עזב en este contexto tiene fuerza relacional y de pacto; «abandoné» comunica mejor esa intensidad que un simple «dejé». Se evita «forsé» por ser arcaico y menos transparente para el lector actual.
- source_word: וּבְרַחֲמִים גְּדֹלִים
  english_pob_choice: but with great compassion
  chosen_spanish: pero con gran compasión
  alternatives_spanish:
  - y con grandes misericordias
  - y con mucha compasión
  - pero con abundante misericordia
  lexicon: HALOT
  rationale: El contraste es adversativo; por eso «pero» refleja mejor la relación entre el abandono temporal y la restauración prometida. רַחֲמִים se vierte como «compasión», y גְּדֹלִים como «gran» para mantener la intensidad sin forzar un plural español raro.
- source_word: אֲקַבְּצֵךְ
  english_pob_choice: I will gather you
  chosen_spanish: te reuniré
  alternatives_spanish:
  - te reuniré a ti
  - te juntaré
  - te recogeré
  lexicon: HALOT
  rationale: קבץ puede significar «juntar» o «reunir», con resonancia de restauración. «Reuniré» es natural en español y preserva la idea profética de restauración sin caer en un calco rígido.
theological_decisions:
- issue: Abandono divino y restauración
  english_pob_reading: The verse presents a real but temporary divine abandonment followed by compassionate restoration.
  chosen_spanish_reading: El versículo presenta un abandono real pero temporal, seguido de una restauración movida por gran compasión.
  alternative_spanish_readings:
  - El abandono es solo aparente
  - Debe suavizarse el lenguaje para no atribuir abandono a Dios
  rationale: El hebreo usa עזב de manera directa; no conviene atenuarlo. Al mismo tiempo, «por un breve momento» y «pero con gran compasión» preservan la tensión del texto entre juicio y misericordia, en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; se mantiene la lectura base del audit trail inglés sin modificaciones sustantivas.
  spanish_consistency_notes:
  - Se conserva el trato directo en segunda persona singular femenina, reflejando el sufijo hebreo.
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se evita «misericordias» en plural por claridad idiomática en español, aunque el hebreo está en plural.
  - La nota al pie conserva una alternativa léxica real documentada por el POB inglés.
