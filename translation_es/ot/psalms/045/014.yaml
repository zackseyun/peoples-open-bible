translation:
  language: es
  text: La hija del rey es toda gloriosa adentro[a]; su vestidura es de oro entretejido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La hija del rey es toda gloriosa dentro», con «adentro/dentro» quizá referido a la belleza interior o a estar dentro del palacio o cámara.'
