translation:
  language: es
  text: 'Entonces Balac dijo a Balaam[a]: «Ven, por favor; déjame llevarte a otro lugar. Quizá le parezca bien[b] a Dios, y me lo maldecirás desde allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Balaam».
    reason: cultural_note
  - marker: b
    text: O «sea agradable» o «sea aceptable» a Dios; el hebreo idiomático significa literalmente «sea recto en los ojos de Dios», es decir, «le parezca bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה נָּא
  english_pob_choice: Please come
  chosen_spanish: Ven, por favor
  alternatives_spanish:
  - Por favor, ven
  - Ven, te ruego
  lexicon: HALOT
  rationale: El hebreo funciona como una invitación/súplica suave, no como un mandato duro. «Ven, por favor» reproduce bien la entreaty en español natural.
- source_word: אֶקָּחֲךָ
  english_pob_choice: let me take you
  chosen_spanish: te llevaré
  alternatives_spanish:
  - déjame llevarte
  - te tomaré
  lexicon: HALOT
  rationale: En contexto, la forma expresa la intención de Balac de conducir a Balaam a otro lugar. «Te llevaré» suena natural en español y conserva el movimiento dirigido.
- source_word: מָקוֹם אַחֵר
  english_pob_choice: another place
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - a otro sitio
  - a otro lugar distinto
  lexicon: HALOT
  rationale: «Lugar» conserva la referencia espacial concreta del hebreo; «a otro lugar» es la formulación más directa y clara en español.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: La partícula introduce una esperanza incierta. «Quizá» mantiene la cautela sin aumentar la certeza.
- source_word: יִישַׁר בְּעֵינֵי הָאֱלֹהִים
  english_pob_choice: it will be right in the eyes of God
  chosen_spanish: será recto a los ojos de Dios
  alternatives_spanish:
  - será agradable a los ojos de Dios
  - le parecerá bien a Dios
  lexicon: HALOT
  rationale: Se conserva el idiomático «a los ojos de Dios» y se traduce יישר con «será recto» para preservar la fuerza de «right» sin diluirla en una paráfrasis de mera aprobación.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la Deidad
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere al Dios verdadero al que Balaam consulta. En español, «Dios» es la forma más natural y fiel.
- source_word: וְקַבֹּתוֹ לִי
  english_pob_choice: and you shall curse him for me
  chosen_spanish: y desde allí me lo maldecirás
  alternatives_spanish:
  - y me lo maldecirás
  - y lo maldecirás para mí
  lexicon: HALOT
  rationale: El verbo קבב expresa una maldición/imprecación fuerte. «Maldecirás» comunica bien el sentido en español; el clítico «lo» preserva la referencia singular colectiva del objeto, y «me» refleja el interés personal de Balac.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - desde ese lugar
  - de allí
  lexicon: HALOT
  rationale: «Desde allí» conserva la deixis espacial vinculada al nuevo sitio propuesto y suena natural en español.
theological_decisions:
- issue: Referencia de הָאֱלֹהִים en la propuesta de Balac
  english_pob_reading: God refers to the true God whom Balaam consults, not a generic deity.
  chosen_spanish_reading: Dios se refiere al Dios verdadero al que Balaam consulta, no a una deidad genérica.
  alternative_spanish_readings:
  - el dios
  - un dios
  rationale: El contexto inmediato muestra que la preocupación de Balac gira en torno a lo que Dios permita respecto de Israel. Traducir «Dios» evita una ambigüedad innecesaria en español y sigue la lectura auditada del POB inglés.
  doctrine_reference: Monoteísmo bíblico y coherencia narrativa del libro de Números
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audito inglés, que prefirió «it will be right» sobre «it will seem right». Por eso el español usa «será recto» para mantener una correspondencia más directa con יישר, sin perder la idiomaticidad del giro «a los ojos de Dios».
  spanish_consistency_notes:
  - Se conservó «Dios» para הָאֱלֹהִים, conforme al contexto de consulta divina y al criterio del POB inglés.
  - Se evitó «SEÑOR» porque el hebreo aquí no usa יהוה, y el texto habla de Dios en la fórmula idiomática de aprobación.
  - «Maldecirás» se eligió por fuerza léxica fiel a קבב; no se suavizó a «maldirás» o «proferirás maldición».
  - El objeto pronominal singular «lo» sigue el modo en que el inglés POB trató al referente colectivo como una unidad en la súplica de Balac.
