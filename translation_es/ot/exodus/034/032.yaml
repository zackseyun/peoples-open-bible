translation:
  language: es
  text: Después, se acercaron[a] todos los hijos de Israel, y les ordenó todo lo que Yahvé había hablado con él en el monte Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; muchas versiones españolas vierten esta expresión nacional como «los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: La expresión marca secuencia temporal posterior. «Después» es natural en español y conserva la transición narrativa sin añadir matices no presentes en el hebreo.
- source_word: נִגְּשׁוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se presentaron
  lexicon: HALOT
  rationale: El nifal de נגשׁ expresa acercarse o aproximarse. «Se acercaron» conserva el movimiento concreto y es idiomático en español.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los israelitas
  - todos los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural y la fórmula nacional del original. «Hijos de Israel» es transparente en español y conserva la tensión de una designación genealógica/covenantal sin neutralizarla.
- source_word: וַיְצַוֵּם
  english_pob_choice: he commanded them
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les dio mandatos
  lexicon: HALOT
  rationale: צוה expresa dar mandato u orden. «Mandó» comunica con fuerza suficiente la acción sin sonar artificial en español; «les ordenó» es posible, pero algo más duro según el contexto narrativo.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La construcción introduce el contenido completo de lo dicho. «Todo lo que» es la equivalencia española más natural y fiel.
- source_word: דִּבֶּר יְהוָה אִתּוֹ
  english_pob_choice: the LORD had spoken with him
  chosen_spanish: Yahvé había hablado con él
  alternatives_spanish:
  - Yahvé habló con él
  - Yahvé le había hablado
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto. «Había hablado con él» refleja bien la anterioridad respecto de la orden a la gente, y «con él» mantiene la relación conversacional de אִתּוֹ.
- source_word: בְּהַר סִינָי
  english_pob_choice: on Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - sobre el monte Sinaí
  - en el monte del Sinaí
  lexicon: HALOT
  rationale: En español bíblico actual, «en el monte Sinaí» es claro y natural. El hebreo no exige una preposición más marcada que el simple localizador.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El Tetragrámaton se vierte como «Yahvé» según el estándar del proyecto en español. Se evita la sustitución por título para preservar el nombre propio del pacto revelado en Sinaí.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Fórmula nacional בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Israel
  rationale: Se preserva la forma masculina plural del hebreo. Aunque «israelitas» sería más idiomático en algunos contextos, aquí la formulación genealógica mantiene mejor la correspondencia formal y la transparencia léxica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del acuerdo alto del expediente inglés; se ha mantenido la secuencia temporal, la fórmula nacional masculina y el nombre divino conforme al criterio del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «hijos de Israel» para reflejar la forma masculina plural del hebreo.
  - «Monte Sinaí» se mantiene como topónimo bíblico natural en español.
  - La puntuación sigue el estándar del español moderno, con coma tras la cláusula inicial temporal.
