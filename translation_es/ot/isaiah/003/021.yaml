lexical_decisions:
- source_word: הַטַּבָּעוֹת
  english_pob_choice: the rings
  chosen_spanish: los anillos
  alternatives_spanish:
  - los anillos de sello
  - los anillos para los dedos
  lexicon: HALOT
  rationale: טַבָּעוֹת es el plural de טַבַּעַת, 'anillo'. En esta lista de adornos femeninos, el sentido general 'anillos' comunica bien el hebreo sin sobreespecificar el tipo.
- source_word: וְנִזְמֵי הָאָף
  english_pob_choice: and nose rings
  chosen_spanish: y los anillos de nariz
  alternatives_spanish:
  - y los adornos de nariz
  - y los anillos nasales
  lexicon: HALOT
  rationale: נֶזֶם con הָאָף indica un adorno para la nariz. En español, 'anillos de nariz' es claro y conserva la imagen concreta del ornamento corporal sin introducir una paráfrasis más amplia.
- source_word: הָאָף
  english_pob_choice: nose
  chosen_spanish: nariz
  alternatives_spanish:
  - hocico
  - nostril
  lexicon: HALOT
  rationale: אָף se refiere literalmente a la nariz aquí. 'Nariz' es la forma natural y precisa en español; 'fosa nasal' o 'nostril' estrechan sin necesidad el sentido.
translation_notes:
  revision_awareness: El contexto de revisión indica alto acuerdo y ningún cambio necesario; por eso el español sigue de cerca la lectura estable del texto hebreo y la solución léxica ya auditada en inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo nominal simple del hebreo: dos grupos de adornos unidos por ''y''.'
  - Se evitó 'SEÑOR' o cualquier terminología doctrinal no pertinente al versículo.
  - '''Anillos de nariz'' conserva la concreción del hebreo sin añadir interpretación cultural innecesaria.'
