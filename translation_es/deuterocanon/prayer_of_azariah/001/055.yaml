review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido del griego: imperativos a mares y ríos para bendecir al Señor, cantar alabanza y exaltarlo perpetuamente. Sin embargo, dos elecciones españolas se apartan de la mejor equivalencia del POB auditado: «cantadle alabanzas» introduce un dativo no explícito y suena menos directo que el paralelo griego con αὐτόν; y «por los siglos» es comprensible pero menos natural que «para siempre» para εἰς τοὺς αἰῶνας en este refrán, salvo que se busque deliberadamente un sabor litúrgico más tradicional.'
  spanish_quality_summary: 'El texto es legible y digno, pero «Bendecid» y «exaltadlo» pertenecen al voseo plural peninsular, no al español neutral latinoamericano solicitado. Además, «cantadle alabanzas» y «en gran manera» suenan algo rígidos. Una reparación menor puede mantener el tono litúrgico con español más amplio y natural: «Bendigan al Señor, mares y ríos; cántenle alabanzas y exáltenlo en gran manera para siempre».'
  glossary_alignment: 'La decisión «el Señor» para κύριος está bien alineada con la documentación: aquí el griego tiene κύριον, no el tetragrámaton, así que no corresponde imponer «Yahvé». Los demás términos principales están bien orientados, pero conviene ajustar las formas verbales al registro meta del proyecto en español neutral latinoamericano.'
  issues:
  - severity: medium
    issue: 'Uso de formas peninsulares de segunda persona plural: «Bendecid», «cantadle», «exaltadlo».'
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. Las formas en -d y los clíticos asociados son correctos, pero regionalmente marcados y menos adecuados para el objetivo editorial.
  - severity: medium
    issue: «cantadle alabanzas» no reproduce tan limpiamente el griego αὐτόν ni la formulación auditada.
    rationale: El griego tiene «ὑμνεῖτε ... αὐτόν», con referencia explícita a «él». En español, «cántenle alabanzas» o «canten alabanzas a él/al Señor» evita una formulación algo forzada y mantiene mejor el paralelismo con «exáltenlo».
  - severity: low
    issue: «por los siglos» es menos idiomático que «para siempre» en este contexto recurrente.
    rationale: Aunque doxológico y fiel en registro, el POB inglés eligió «forever» por claridad idiomática. En español amplio, «para siempre» comunica mejor el sentido sin pérdida.
  revised_spanish_text: ¡Bendigan al Señor, mares y ríos; cántenle alabanzas y exáltenlo en gran manera para siempre!
  revision_rationale: Se ajustaron las formas verbales al español neutral latinoamericano, se hizo más natural la expresión de ὑμνεῖτε ... αὐτόν con «cántenle alabanzas», y se reemplazó «por los siglos» por «para siempre» para una equivalencia más idiomática y clara del refrán, sin alterar el sentido ni el tono doxológico.
