lexical_decisions:
- source_word: וּ/לְ/מָכִיר
  english_pob_choice: And to Machir
  chosen_spanish: Y a Mácir
  alternatives_spanish:
  - Y para Mácir
  - Ahora bien, a Mácir
  lexicon: HALOT
  rationale: La preposición לְ con el prefijo conjuntivo se entiende naturalmente como 'a' en español para introducir al destinatario de la asignación. Se translitera el nombre propio, con adaptación gráfica mínima a la fonología española ('Mácir') para facilitar la lectura sin perder identificabilidad. Se conserva la conjunción porque enlaza con la declaración de reparto del contexto inmediato.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: di
  alternatives_spanish:
  - he dado
  - asigné
  lexicon: HALOT
  rationale: El perfecto qal 1cs de נתן en este contexto narrativo se expresa con pasado simple en español. 'Di' reproduce con naturalidad la acción de concesión o entrega; 'asigné' explicita la distribución territorial pero añade interpretación que el hebreo no exige.
- source_word: הַ/גִּלְעָֽד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - el Galaad
  - la región de Galaad
  lexicon: HALOT
  rationale: Se vierte como nombre propio geográfico tradicionalmente conocido en español como 'Galaad'. Aunque el hebreo lleva artículo, el español normalmente omite el artículo con topónimos establecidos. 'La región de Galaad' sería más explicativa, pero introduce especificación que no está explícita en este versículo.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la equivalencia óptima y la nota sobre el artículo hebreo. No se documentan cambios de revisión, y la versión española conserva esa decisión sin añadir interpretaciones territoriales como 'tierra montañosa' o 'región'.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio bíblico 'Galaad' como topónimo estándar en español.
  - Se evitó 'SEÑOR' u այլ sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - La puntuación reproduce una oración breve y paratáctica acorde al hebreo narrativo.
