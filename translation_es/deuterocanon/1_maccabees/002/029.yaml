translation:
  language: es
  text: Entonces bajaron muchos que buscaban rectitud y justicia[a] al desierto para establecerse allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud y juicio». El griego junta δικαιοσύνην y κρίμα, una combinación que puede superponerse en significado, pero probablemente conserva dos ideales relacionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese tiempo
  lexicon: LSJ
  rationale: Adverbio temporal narrativo; «entonces» transmite con naturalidad la secuencia del relato.
- source_word: κατέβησαν
  english_pob_choice: went down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - fueron hacia abajo
  lexicon: LSJ
  rationale: El griego expresa movimiento de descenso; «bajaron» conserva esa imagen sin sonar artificioso en español.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - una multitud de
  - gran número de
  lexicon: LSJ
  rationale: Equivalente directo y natural para la cantidad indefinida.
- source_word: ζητοῦντες
  english_pob_choice: were seeking
  chosen_spanish: que buscaban
  alternatives_spanish:
  - buscando
  - que estaban buscando
  lexicon: LSJ
  rationale: El participio presente indica acción en curso; la relativa con imperfecto comunica continuidad de forma idiomática.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: LSJ
  rationale: Aquí se conserva el sentido ético/covenantal. En español «justicia» es más natural en paralelo con κρίμα, aunque la tensión con «rectitud» puede marcar el matiz moral.
- source_word: καὶ κρίμα
  english_pob_choice: and justice
  chosen_spanish: y rectitud
  alternatives_spanish:
  - y juicio
  - y justicia
  lexicon: LSJ
  rationale: Para no colapsar los dos sustantivos griegos en un solo campo semántico, se distingue κρίμα con «rectitud», manteniendo la idea de lo correcto/justo y la relación con δικαιοσύνη. La nota preserva la alternativa «juicio».
- source_word: εἰς τὴν ἔρημον
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - a la soledad
  - a la wilderness
  lexicon: LSJ
  rationale: ἔρημος puede abarcar región despoblada; aquí «desierto» es una opción bíblica clara y natural en español, sin excluir el matiz de lugar deshabitado.
- source_word: καθίσαι ἐκεῖ
  english_pob_choice: to settle there
  chosen_spanish: para establecerse allí
  alternatives_spanish:
  - para habitar allí
  - para quedarse allí
  lexicon: LSJ
  rationale: El infinitivo funciona de manera idiomática para tomar residencia. «Establecerse» comunica mejor la intención de asentarse que un literal «sentarse».
theological_decisions:
- issue: Relación semántica entre δικαιοσύνη y κρίμα
  english_pob_reading: righteousness and justice, with a footnoted alternative 'justice and judgment'
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - justicia y juicio
  - rectitud y juicio
  - justicia y justicia
  rationale: El texto griego conserva dos ideales relacionados pero no idénticos. En español, «justicia» para δικαιοσύνη y «rectitud» para κρίμα evita reducir el paralelismo a una repetición exacta y mantiene la tensión ética/judicial señalada por la nota inglesa.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη and κρίμα as related but distinct ethical-judicial ideals'
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca explícitamente en el texto español junto al término correspondiente. La decisión léxica se ajustó para que la nota anclada en el texto respalde una alternativa real sin dejar marcadores huérfanos.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable aquí; no hay nombre divino en el versículo.
  - Se mantuvo un registro bíblico natural con «desierto» y «establecerse allí», evitando calcos demasiado literales.
  - La nota [a] está anclada en el sintagma «justicia y rectitud[a]» para cumplir la validación.
