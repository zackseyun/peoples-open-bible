revisions:
- from: También se rebeló contra el rey Nabucodonosor[a], quien lo había hecho jurar por Dios; endureció su cerviz[b] y obstinó su corazón[c] para no volver a Yahvé, el Dios de Israel.
  to: También se rebeló contra el rey Nabucodonosor[a], quien lo había hecho jurar por Dios; endureció su cerviz[b] y endureció su corazón de volver a Yahvé, el Dios de Israel.
  rationale: Se ajusta 'obstinó su corazón' a 'endureció su corazón' para reflejar mejor la metáfora hebrea y la decisión léxica auditada, se reemplaza 'para no volver' por 'de volver' para acercarse más al valor de מִשּׁוּב / 'from turning', y se elimina la nota [c] por no ser necesaria ni estar respaldada por el rastro inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: rebelión contra Nabucodonosor, juramento por Dios, obstinación expresada por las imágenes de cerviz y corazón, y negativa a volverse a Yahvé. Sin embargo, añade una nota alternativa no sustentada por el rastro inglés para ''obstinó su corazón'' y convierte el matiz de מִשּׁוּב (''de volver'' / ''apartándose de volver'') en una finalidad más interpretativa (''para no volver'').'
  spanish_quality_summary: El español es claro y digno. 'Endureció su cerviz' funciona bien como hebraísmo con nota. Pero 'obstinó su corazón' suena menos natural que 'endureció su corazón' y además exige una nota innecesaria. 'Para no volver' es idiomático, pero 'de volver' preserva mejor la forma y el enlace con el corazón endurecido sin sobreinterpretar intención.
  glossary_alignment: Correcto en 'Yahvé', 'Dios' y el mantenimiento del idioma figurado. No hay conflicto doctrinal. Conviene alinear mejor con la decisión POB sobre וַיְאַמֵּץ אֶת לְבָבוֹ como 'endureció su corazón' y evitar una nota extra no documentada.
  issues:
  - severity: medium
    issue: '''obstinó su corazón'' se aparta innecesariamente de la decisión auditada ''hardened his heart''.'
    rationale: Aunque comunica terquedad, en español es menos natural y menos bíblico que 'endureció su corazón', que además refleja mejor la metáfora hebrea y la decisión léxica del POB.
  - severity: medium
    issue: La frase 'para no volver' interpreta מִשּׁוּב como finalidad en vez de mantener el matiz más cercano de separación/impedimento.
    rationale: La revisión inglesa prefirió 'from turning'. En español, 'de volver' o 'para no volverse' serían más cercanas; 'de volver' es la opción más sobria y fiel en esta estructura.
  - severity: low
    issue: La nota [c] introduce una alternativa no preservada por el rastro inglés y no necesaria para resolver ambigüedad española.
    rationale: El proyecto pide conservar alternativas significativas cuando el inglés las preservó o cuando el español crea una nueva ambigüedad. Aquí no hace falta una nota adicional si se usa 'endureció su corazón'.
  revised_spanish_text: También se rebeló contra el rey Nabucodonosor[a], quien lo había hecho jurar por Dios; endureció su cerviz[b] y endureció su corazón de volver a Yahvé, el Dios de Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «quien lo había vinculado con un juramento delante de Dios». El hebreo puede subrayar tanto el acto de hacerle jurar como el marco solemne del juramento ante Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «endureció su cerviz», figura de resistencia obstinada.'
    reason: cultural_note
  revision_rationale: Se ajusta 'obstinó su corazón' a 'endureció su corazón' para reflejar mejor la metáfora hebrea y la decisión léxica auditada, se reemplaza 'para no volver' por 'de volver' para acercarse más al valor de מִשּׁוּב / 'from turning', y se elimina la nota [c] por no ser necesaria ni estar respaldada por el rastro inglés.
