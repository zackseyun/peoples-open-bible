translation:
  language: es
  text: Porque, si él no nos juzgara según la abundancia de sus misericordias, ¡ay de todos nosotros que hemos nacido!
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: jud judge / judge us not according to
  english_pob_choice: judge us not according to
  chosen_spanish: nos juzgara no según
  alternatives_spanish:
  - nos juzgara aparte de
  - nos juzgara fuera de
  lexicon: juzgar; según
  rationale: El Syriac, según la revisión, expresa medida o norma de juicio (“no según”), no separación espacial o absoluta. En español, «no según» conserva esa relación de estándar mejor que «aparte de».
- source_word: the abundance of his mercies
  english_pob_choice: the abundance of his mercies
  chosen_spanish: la abundancia de sus misericordias
  alternatives_spanish:
  - la plenitud de sus misericordias
  - la gran abundancia de su misericordia
  lexicon: abundancia; misericordias
  rationale: «Abundancia» refleja bien el valor cuantitativo/intensivo del sustantivo; «misericordias» preserva el plural del original y el matiz de actos reiterados de compasión.
- source_word: woe to all of us who have been born
  english_pob_choice: woe to all of us who have been born
  chosen_spanish: ¡ay de todos nosotros, los que hemos nacido!
  alternatives_spanish:
  - ¡ay de todos nosotros, los nacidos!
  - ¡ay de todos nosotros que hemos nacido!
  lexicon: ¡ay de; los que hemos nacido
  rationale: «¡Ay de» es la exclamación profética natural en español y mantiene el lamento/amenaza. «Los que hemos nacido» conserva el participio con sentido existencial sin introducir una paráfrasis doctrinal.
theological_decisions:
- issue: Base del juicio divino
  english_pob_reading: not according to the abundance of his mercies
  chosen_spanish_reading: no según la abundancia de sus misericordias
  alternative_spanish_readings:
  - no aparte de la abundancia de sus misericordias
  - sin la abundancia de sus misericordias
  rationale: La revisión auditada corrige «apart from» a «not according to»; por tanto, la traducción debe expresar norma/medida y no mera ausencia. Esto preserva la tensión teológica entre justicia y misericordia en el juicio.
  doctrine_reference: Santidad y misericordia divinas en el juicio; coherencia con el estándar del texto fuente
translation_notes:
  revision_awareness: La versión inglesa previa tenía la nota «apart from», pero la revisión aplicada corrigió el valor del Syriac a «not according to». La presente traducción sigue esa decisión revisada y evita reflejar una preposición de separación que no está respaldada por el control siriaco.
  spanish_consistency_notes:
  - Se mantiene «misericordias» en plural para respetar el plural del original y el estilo bíblico semítico.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no corresponde.
  - Se evita «siervo» u otros términos no pertinentes; no hay vocabulario cristológico directo en este verso.
