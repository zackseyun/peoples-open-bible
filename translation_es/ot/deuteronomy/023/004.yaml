base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/023/004.yaml
  text: No Ammonite or Moabite may enter the assembly of Yahweh[a]; even to the tenth generation[b], none of them may enter the assembly of Yahweh forever.
  footnotes:
  - marker: a
    text: Or 'congregation of the LORD' for 'assembly of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says both 'to the tenth generation' and 'forever,' preserving the force of enduring exclusion rather than reducing one phrase to the other.
    reason: cultural_note
