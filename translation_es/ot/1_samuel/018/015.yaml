translation:
  language: es
  text: Cuando Saúl vio que él tenía mucho éxito[a], le tuvo miedo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «obraba con mucha prudencia» o «prosperaba mucho». El verbo hebreo puede señalar conducta prudente y el éxito que de ella resulta.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «temió de delante de él». Es un modismo hebreo para decir que le tuvo miedo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When Saul saw
  chosen_spanish: Cuando Saúl vio
  alternatives_spanish:
  - Y vio Saúl
  - Saúl vio
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Cuando Saúl vio» conserva bien la relación temporal y suena natural en español.
- source_word: אֲשֶׁר הוּא
  english_pob_choice: that he
  chosen_spanish: que él
  alternatives_spanish:
  - cómo él
  - que estaba
  lexicon: HALOT
  rationale: Introduce el contenido de lo percibido por Saúl. En español, «que él» mantiene la subordinación sin añadir interpretación.
- source_word: מַשְׂכִּיל
  english_pob_choice: was very successful
  chosen_spanish: tenía mucho éxito
  alternatives_spanish:
  - obraba con mucha prudencia
  - prosperaba mucho
  - actuaba muy sabiamente
  lexicon: HALOT
  rationale: El participio hiphil de שכל puede implicar actuar sabiamente y el resultado de prosperar o tener éxito. Dado el contexto narrativo, «tenía mucho éxito» comunica el efecto observable que Saúl percibe, sin limitar indebidamente el matiz de sabiduría.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - en extremo
  lexicon: HALOT
  rationale: Como intensificador, «mucho» es natural en español con «éxito» y reproduce la fuerza del original sin sonar forzado.
- source_word: וַיָּגָר
  english_pob_choice: he was afraid
  chosen_spanish: sintió temor
  alternatives_spanish:
  - tuvo miedo
  - se atemorizó
  - estuvo asustado
  lexicon: HALOT
  rationale: El verbo גור en este contexto expresa temor o pavor sostenido. «Sintió temor» conserva ese sentido con un registro digno y evita una lectura meramente momentánea.
- source_word: מִפָּנָיו
  english_pob_choice: of him
  chosen_spanish: de él
  alternatives_spanish:
  - ante él
  - por causa de él
  - desde delante de él
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo literal «desde delante de él» que significa temor respecto a una persona. «De él» funciona de manera idiomática en español.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «he stood in fear of him» a «he was afraid of him» por ser más natural y preciso para ויגר מפניו. La versión española sigue esa revisión con «sintió temor de él» y mantiene el énfasis en el temor de Saúl frente al éxito de David.
  spanish_consistency_notes:
  - Se mantiene «Saúl» como nombre propio conforme al hebreo.
  - Se evita «SEÑOR» u otras sustituciones porque no aparece el nombre divino en este versículo.
  - «Mucho éxito» intenta abarcar tanto la idea de prosperar como la de obrar sabiamente, preservando la tensión léxica documentada en el audit trail.
  - La nota [b] explica el modismo hebreo de manera directa, sin sobretraducirlo.
