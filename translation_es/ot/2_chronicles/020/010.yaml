    text: O «Ahora». El hebreo une una conjunción discursiva con un adverbio temporal; en español ambas opciones son naturales.
    reason: lexical_alternative
  - marker: b
    text: O «los amonitas, moabitas y los del monte Seír». El hebreo literalmente nombra «los hijos de Amón y Moab y el monte Seír».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no permitiste a Israel entrar en/contra ellos»; en contexto, la idea es que Dios no les permitió ir contra ellos.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para que el español sea natural sin perder la cercanía al hebreo ('contra quienes no permitiste que Israel entrara'), se corrige la nota [b] para que refleje con precisión la alternativa/literalidad documentada por la POB inglesa, y se deja la oración abierta con raya final para respetar la continuidad del original.
