  glossary_alignment: No hay conflictos con terminología doctrinal principal. 'Zilpa', 'Labán', 'Lea', 'Jacob' y 'personas' encajan bien. La decisión del aparato sobre נֶפֶשׁ como 'personas' debe conservarse, con alternativa 'almas' en nota, pero la nota debe anclarse en el lugar correcto del texto.
