translation:
  language: es
  text: Esto ofrecerán a Yahvé en sus tiempos señalados[a], además de sus ofrendas de voto y de sus ofrendas voluntarias, para sus holocaustos, sus ofrendas de cereal, sus libaciones y sus ofrendas de paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en sus fiestas señaladas”. El hebreo מוֹעֲדֵיכֶם puede referirse a tiempos designados o a ocasiones festivas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El demostrativo plural retoma las ofrendas prescritas en el contexto inmediato. En español, 'Estas' sería suficiente, pero 'Estas cosas' hace explícito el referente sin añadir contenido ajeno.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall offer
  chosen_spanish: harán
  alternatives_spanish:
  - ofrecerán
  - harán
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'harán', el contexto sacrificial permite mantener el verbo básico sin perder el sentido cultual. En español, 'harán' evita introducir una equivalencia interpretativa más fuerte que el texto breve no exige.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según el criterio del proyecto. 'Para Yahvé' comunica bien la dedicación de las ofrendas, manteniendo la dirección/dedicación del hebreo.
- source_word: בְּמוֹעֲדֵיכֶם
  english_pob_choice: at your appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus tiempos fijados
  - en sus festividades señaladas
  lexicon: HALOT
  rationale: מועד puede abarcar tiempo señalado u ocasión festiva. 'Tiempos señalados' conserva la amplitud cultual sin reducirlo solo a 'fiestas'; el posesivo se adapta naturalmente al español como referencia a Israel.
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además de
  lexicon: HALOT
  rationale: Introduce ofrendas adicionales a las prescritas en las festividades. 'Además de' es idiomático y claro en español.
- source_word: מִנִּדְרֵיכֶם
  english_pob_choice: your vow offerings
  chosen_spanish: sus votos
  alternatives_spanish:
  - sus ofrendas votivas
  - sus ofrendas de voto
  lexicon: HALOT
  rationale: El hebreo apunta a votos vinculados con ofrendas; sin embargo, la formulación española 'votos' puede abarcar el compromiso votivo que el contexto presupone. Se deja el matiz sacrificial en la lista general de ofrendas y se conserva la brevedad del paralelismo.
- source_word: וְנִדְבֹתֵיכֶם
  english_pob_choice: your freewill offerings
  chosen_spanish: sus ofrendas voluntarias
  alternatives_spanish:
  - sus ofrendas libres
  - sus ofrendas espontáneas
  lexicon: HALOT
  rationale: נְדָבָה refiere a ofrendas dadas libremente; 'ofrendas voluntarias' es claro y natural en español y conserva la idea de voluntariedad.
- source_word: לְעֹלֹתֵיכֶם
  english_pob_choice: for your burnt offerings
  chosen_spanish: sus holocaustos
  alternatives_spanish:
  - sus ofrendas quemadas
  - sus holocaustos
  lexicon: HALOT
  rationale: En español bíblico, 'holocausto' nombra el sacrificio totalmente quemado. Se mantiene el término tradicional y preciso para la categoría sacrificial.
- source_word: וּלְמִנְחֹתֵיכֶם
  english_pob_choice: and for your grain offerings
  chosen_spanish: sus ofrendas de cereal
  alternatives_spanish:
  - sus ofrendas de grano
  - sus ofrendas de cereal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal puede ser 'ofrenda de cereal/grano'. Se elige 'cereal' para claridad bíblica contemporánea sin perder el carácter vegetal no sangriento de la ofrenda.
- source_word: וּלְנִסְכֵּיכֶם
  english_pob_choice: and for your drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus libaciones
  - sus ofrendas líquidas
  lexicon: HALOT
  rationale: נֶסֶךְ alude a una ofrenda derramada. 'Libaciones' conserva el término sacrificial técnico y es adecuado en registro bíblico.
- source_word: וּלְשַׁלְמֵיכֶם
  english_pob_choice: and for your peace offerings
  chosen_spanish: sus ofrendas de paz
  alternatives_spanish:
  - sus ofrendas de comunión
  - sus ofrendas de paz
  lexicon: HALOT
  rationale: Se conserva el vínculo semántico con שָׁלוֹם/wholeness. 'Ofrendas de paz' mantiene la categoría tradicional y refleja la lectura del hebreo sin imponer una explicación interpretativa adicional.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El proyecto en español usa 'Yahvé' como forma principal, preservando el nombre del pacto en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Categoría sacrificial שלמים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de paz
  rationale: La categoría de שְׁלָמִים conserva la idea de paz/entereza/wholeness. 'Ofrendas de paz' mantiene la equivalencia más directa y no borra el matiz lexical, mientras que 'ofrendas de comunión' queda como alternativa posible para lectores familiarizados con esa tradición.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado reporta alto acuerdo; por ello, el borrador español sigue de cerca el texto hebreo y la decisión inglesa auditada, sin introducir ajustes innecesarios.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto.
  - Se mantiene una lista coordinada de ofrendas para reflejar el paralelismo hebreo.
  - '''Libaciones'' conserva el registro técnico del sacrificio, paralelo al inglés ''drink offerings''.'
  - '''Ofrendas de cereal'' sigue la decisión inglesa de ''grain offerings'' y evita ''tributo'' por ser menos claro en español moderno.'
