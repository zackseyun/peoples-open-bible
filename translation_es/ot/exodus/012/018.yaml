translation:
  language: es
  text: En el primer mes[a], el día catorce del mes, al anochecer, comerán pan sin levadura, hasta el día veintiuno del mes, al anochecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la tarde» en ambos casos de «al anochecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרִאשֹׁן
  english_pob_choice: In the first month
  chosen_spanish: En el primer mes
  alternatives_spanish:
  - En el primero
  - En el primer [mes]
  lexicon: HALOT
  rationale: La construcción temporal queda completada por לַחֹדֶשׁ; en español, "mes" debe expresarse para evitar una frase incompleta. "Primer mes" mantiene el valor calendárico que la POB inglesa explicitó.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם
  english_pob_choice: on the fourteenth day
  chosen_spanish: el día catorce
  alternatives_spanish:
  - el día catorce del mes
  - el catorce
  lexicon: HALOT
  rationale: El hebreo usa una forma calendárica estándar con cardinal; en español natural la forma más clara y fiel es "el día catorce". Se conserva el valor de fecha sin forzar un ordinal artificial.
- source_word: לַחֹדֶשׁ
  english_pob_choice: of the month
  chosen_spanish: del mes
  alternatives_spanish:
  - del mes lunar
  - de la luna nueva/mes
  lexicon: HALOT
  rationale: Aquí חֹדֶשׁ funciona como designación de fecha, no como "luna nueva". "Del mes" comunica el contexto calendárico de manera directa.
- source_word: בָּעֶרֶב
  english_pob_choice: at evening
  chosen_spanish: al anochecer
  alternatives_spanish:
  - al atardecer
  - en la tarde
  - por la tarde
  lexicon: HALOT
  rationale: La expresión marca un límite temporal. "Al anochecer" es una opción natural en español y conserva la idea de comienzo del período sin precisar más de lo que el hebreo exige.
- source_word: תֹּאכְל֖וּ
  english_pob_choice: you shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comeréis
  - deberán comer
  - ustedes comerán
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza instructiva; en español, el futuro simple puede cumplir esa función normativa. Se evitó "deben" para no añadir una modulación de obligación no explícita en la forma verbal.
- source_word: מַצֹּת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - pan sin levadura
  - pan ácimo
  - matzot
  lexicon: HALOT
  rationale: El plural hebreo pide una forma plural en español. "Panes sin levadura" es transparente y fiel, sin introducir tecnicismos litúrgicos innecesarios.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - hasta el
  lexicon: HALOT
  rationale: Marca el límite final del período de consumo; "hasta" reproduce con naturalidad la función temporal.
- source_word: יוֹם הָאֶחָד וְעֶשְׂרִים
  english_pob_choice: the twenty-first day
  chosen_spanish: el día veintiuno
  alternatives_spanish:
  - el veintiuno
  - el vigésimo primer día
  lexicon: HALOT
  rationale: El hebreo expresa la fecha con cardinalidad; "el día veintiuno" es idiomático y conserva el orden natural del español bíblico moderno.
- source_word: בָּעָרֶב
  english_pob_choice: at evening
  chosen_spanish: al anochecer
  alternatives_spanish:
  - al atardecer
  - en la tarde
  lexicon: HALOT
  rationale: Se mantiene la misma solución para la segunda ocurrencia por coherencia temporal. La frase sigue marcando un borde del tiempo, no una franja amplia.
translation_notes:
  revision_awareness: El inglés POB entiende בָּעֶרֶב como un marcador de límite temporal y mantiene la misma solución en ambas ocurrencias; se conservó ese enfoque en español con "al anochecer". También se respetó la estructura calendárica del hebreo sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo la misma traducción para ambas ocurrencias de בָּעֶרֶב.
  - Se preservó el paralelismo de fecha inicial y final del período de comer panes sin levadura.
  - Se evitó "Cristo", "SEÑOR" o vocabulario litúrgico no presente en el versículo.
