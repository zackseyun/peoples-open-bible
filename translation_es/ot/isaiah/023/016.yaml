translation:
  language: es
  text: Toma una lira[a], recorre la ciudad, prostituta olvidada; toca con destreza, canta muchas canciones, para que seas recordada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arpa» para «lira». El hebreo nombra un instrumento antiguo de cuerdas (kinnor).
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחִי
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma en tus manos
  - Recoge
  lexicon: HALOT
  rationale: Imperativo femenino singular de לקח. En español, «Toma» reproduce con naturalidad la orden breve de tomar un instrumento.
- source_word: כִנּוֹר
  english_pob_choice: a lyre
  chosen_spanish: una lira
  alternatives_spanish:
  - un arpa
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento antiguo de cuerdas; «lira» es la correspondencia más precisa y natural en español. «Arpa» es una alternativa tradicional, pero menos exacta.
- source_word: סֹבִּי
  english_pob_choice: go about
  chosen_spanish: recorre
  alternatives_spanish:
  - anda por
  - da vueltas por
  lexicon: HALOT
  rationale: El imperativo de סבב expresa moverse por la ciudad. «Recorre» comunica ese desplazamiento sin añadir matices innecesarios.
- source_word: עִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: El sustantivo es simplemente «ciudad»; el valor espacial ya está dado por el verbo de movimiento.
- source_word: זוֹנָה
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - mujer prostituida
  lexicon: HALOT
  rationale: El hebreo nombra sin suavizar la figura metafórica. «Prostituta» conserva la fuerza léxica y es comprensible en español moderno.
- source_word: נִשְׁכָּחָה
  english_pob_choice: forgotten
  chosen_spanish: olvidada
  alternatives_spanish:
  - que ha sido olvidada
  - despreciada
  lexicon: HALOT
  rationale: Participio pasivo/adjetival de שכח. «Olvidada» mantiene la concisión y la relación directa con la imagen de una prostituta desatendida.
- source_word: הֵיטִיבִי
  english_pob_choice: play skillfully
  chosen_spanish: toca con destreza
  alternatives_spanish:
  - toca bien
  - hazlo bien al tocar
  lexicon: HALOT
  rationale: El Hifil funciona adverbialmente con el siguiente verbo de tocar. «Con destreza» expresa mejor la idea de habilidad que un simple «bien».
- source_word: נַגֵּן
  english_pob_choice: play
  chosen_spanish: toca
  alternatives_spanish:
  - haz música
  lexicon: HALOT
  rationale: נגן se refiere a tocar un instrumento. Como ya se nombró la lira, «toca» es la forma más natural y precisa.
- source_word: הַרְבִּי
  english_pob_choice: sing many songs
  chosen_spanish: canta muchas canciones
  alternatives_spanish:
  - multiplica el canto
  - canta mucho
  lexicon: HALOT
  rationale: El Hifil de רבה con שיר expresa aumentar o multiplicar canciones. «Canta muchas canciones» transmite ese plural distributivo con naturalidad española.
- source_word: שִׁיר
  english_pob_choice: songs
  chosen_spanish: canciones
  alternatives_spanish:
  - cantos
  - canción
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, el sentido es colectivo tras «multiplicar». «Canciones» comunica mejor la idea en español.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Conjunción final estándar. «Para que» es el equivalente más natural y claro en español.
- source_word: תִּזָּכֵרִי
  english_pob_choice: you may be remembered
  chosen_spanish: seas recordada
  alternatives_spanish:
  - seas tenida en memoria
  - seas traída a memoria
  lexicon: HALOT
  rationale: El nifal de זכר implica ser recordada/traída a memoria. «Seas recordada» es la opción directa; «seas traída a memoria» sería más literal pero menos natural.
theological_decisions:
- issue: Metáfora profética de Tiro como prostituta
  english_pob_reading: Retain the explicit metaphor 'forgotten prostitute' in the main text
  chosen_spanish_reading: Retener la metáfora explícita «prostituta olvidada» en el texto principal
  alternative_spanish_readings:
  - ramera olvidada
  - mujer olvidada
  rationale: Isaías 23 personifica a Tiro con una imagen sexual y comercial fuerte. Mantenerla evita suavizar el juicio profético y conserva la tensión del original.
  doctrine_reference: Principio de primacía del texto fuente; fidelidad a la imaginería profética sin atenuación
- issue: Valor pasivo del nifal en תִּזָּכֵרִי
  english_pob_reading: you may be remembered
  chosen_spanish_reading: seas recordada
  alternative_spanish_readings:
  - seas acordada
  - puedas ser recordada
  rationale: El pasivo refleja que el propósito es volver a traerla a la memoria pública. «Seas recordada» mantiene el valor pasivo y la fluidez en español.
  doctrine_reference: Respeto al sentido verbal hebreo y al uso pasivo del nifal
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el texto sigue la lectura de alta concordancia del paquete fuente y conserva la metáfora profética explícita.
  spanish_consistency_notes:
  - Se usa «lira» para כִנּוֹר conforme a la preferencia de precisión instrumental, reservando «arpa» como alternativa anotada.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios como «meretriz» o «ramera» en el texto principal.
  - La coordinación de imperativos conserva el tono exhortativo del hebreo sin expandir el contenido más allá de la fuente.
