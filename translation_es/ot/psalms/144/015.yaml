- from: Bienaventurado[a] el pueblo al que le sucede así; bienaventurado el pueblo cuyo Dios es Yahvé.
  to: Bienaventurado[a] el pueblo para quien esto es así; bienaventurado el pueblo cuyo Dios es Yahvé.
