theological_decisions:
- issue: Referent of 'my Lord' in Joseph's explanation
  chosen_reading: Joseph refers to God as his Lord, indicating that his words were spoken out of reverence and moral restraint before God.
  alternative_readings:
  - Joseph refers to Potiphar as his master
  - The phrase is left deliberately ambiguous
  rationale: Within the paraenetic flow, Joseph is explaining his inward motive for resisting lust. The subsequent prayer to the Lord reinforces a Godward referent more naturally than Potiphar here.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; preserve theological tension where genuine, but choose the reading most supported by context.'
- issue: Moral psychology of desire in verse 8
  chosen_reading: The text teaches that lust enslaves perception itself, so that even good speech is reinterpreted as serving evil desire.
  alternative_readings:
  - The statement refers only to the Egyptian woman's misunderstanding of Joseph's words
  - The line is a general proverb detached from the immediate narrative
  rationale: The Greek moves from her case ('as she also was') to a general maxim, then back into Joseph's exhortation to his children. The translation preserves both the specific and general force.
