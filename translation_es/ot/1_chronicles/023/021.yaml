lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos
  lexicon: HALOT
  rationale: En una genealogía, el constructo plural de בֵּן introduce una lista familiar. «Los hijos de» reproduce con naturalidad y fidelidad la estructura hebrea, sin ampliar innecesariamente a «descendientes de».
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera estable en español bíblico.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  lexicon: Nombre propio
  rationale: Nombre propio transliterado. Se conserva la misma forma en sus dos apariciones dentro del versículo.
- source_word: וּ/מוּשִׁ֔י
  english_pob_choice: and Mushi
  chosen_spanish: y Musi
  alternatives_spanish:
  - y Mushi
  lexicon: Nombre propio
  rationale: El hebreo presenta una forma con matiz consonántico que en español puede representarse de modo fluido como «Musi». Se mantiene el nombre propio sin sobrecargar la lectura con una grafía más anglosajona.
- source_word: בְּנֵי מַחְלִי
  english_pob_choice: The sons of Mahli
  chosen_spanish: Los hijos de Mahli
  alternatives_spanish:
  - Los descendientes de Mahli
  lexicon: HALOT
  rationale: Se repite la misma fórmula genealógica para conservar la estructura del hebreo y hacer clara la relación entre Mahli y sus hijos.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: Nombre propio
  rationale: Nombre propio transliterado conforme al uso bíblico estándar en español.
- source_word: וְ/קִישׁ
  english_pob_choice: and Kish
  chosen_spanish: y Quis
  alternatives_spanish:
  - y Kish
  lexicon: Nombre propio
  rationale: Se hispaniza el nombre como «Quis», forma natural en español, sin alterar la identidad del nombre propio.
translation_notes:
  revision_awareness: El pasaje es una lista genealógica breve; el texto inglés POB y el hebreo concuerdan estrechamente, sin variantes textuales ni decisiones teológicas de peso. La única decisión sensible fue el tratamiento de los nombres propios, procurando una forma española natural sin perder transparencia.
  spanish_consistency_notes:
  - Se mantuvo la repetición de la fórmula «Los hijos de...» para reflejar el paralelismo del hebreo.
  - Se conservaron nombres propios en transliteración/hispanización consistente con el uso bíblico en español.
  - No se añadió puntuación explicativa ajena al verso; los dos puntos siguen la segmentación genealógica del inglés POB y del hebreo.
