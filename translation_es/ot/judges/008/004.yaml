    text: 'O: «cansados, pero todavía persiguiéndolos» o «desfallecidos, pero aún persiguiéndolos».'
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al hebreo y al POB inglés, pero se mejora la naturalidad del español al expresar la persecución continua con un objeto implícito por el contexto («a los enemigos») y un adverbio concesivo de continuidad («todavía/aún»). Esto transmite mejor «yet pursuing» que el calco «pero persiguiendo».
