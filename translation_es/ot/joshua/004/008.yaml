    text: 'Hebrew: ''the sons of Israel.'' Many English versions simplify this to ''the Israelites.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'from the middle of the Jordan.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to the camp'; the Hebrew more specifically means 'to the lodging place' or overnight encampment.
    reason: lexical_alternative
