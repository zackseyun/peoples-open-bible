id: 1TH.4.8
reference: 1 Thessalonians 4:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοιγαροῦν ὁ ἀθετῶν οὐκ ἄνθρωπον ἀθετεῖ ἀλλὰ τὸν θεὸν τὸν ⸀καὶ ⸀διδόντα τὸ πνεῦμα αὐτοῦ τὸ ἅγιον εἰς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/008.yaml
  text: Therefore[a], whoever rejects this rejects not man but God[b], who also gives his Holy Spirit to you.
  footnotes:
  - marker: a
    text: Or 'whoever disregards this disregards not man but God.' The verb can mean 'reject,' 'disregard,' or 'set aside.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who also gives his Holy Spirit into you.' The Greek preposition is literally 'into,' though English commonly says 'to you' here.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 이를 저버리는 자[a]는 사람을 저버리는 것이 아니라, 자기 성령을 여러분에게[b] 주시는 하나님을 저버리는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이를 무시하는 자」, 「이를 거부하는 자」. 동사는 「거부·무시·물리침」을 함께 담는다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 전치사는 문자적으로 「여러분 안으로」. 영어와 한국어 관용에서는 흔히 「여러분에게」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀθετῶν
  english_pob_choice: whoever rejects this
  chosen_korean: 이를 저버리는 자
  alternatives_korean:
  - 이를 무시하는 자
  - 이를 거부하는 자
  lexicon: BDAG
  rationale: ἀθετέω의 「치워 둠·거부함」 의미를 한국어 「저버리다」로 옮긴다. 무게 있는 거부의 어감을 담는다.
- source_word: τὸ πνεῦμα αὐτοῦ τὸ ἅγιον
  english_pob_choice: his Holy Spirit
  chosen_korean: 자기 성령
  alternatives_korean:
  - 그분의 성령
  - 자신의 거룩한 영
  lexicon: BDAG
  rationale: 글로사리 정책에 따라 πνεῦμα ἅγιον은 「성령」으로 옮긴다. 「자기」가 αὐτοῦ의 재귀적 강조를 보존한다.
- source_word: εἰς ὑμᾶς
  english_pob_choice: to you
  chosen_korean: 여러분에게
  alternatives_korean:
  - 여러분 안으로
  - 여러분 속에
  lexicon: BDAG
  rationale: εἰς의 「안으로」 의미를 본문에서는 「~에게」로 자연스럽게 옮기되, 각주로 직역을 살린다.
