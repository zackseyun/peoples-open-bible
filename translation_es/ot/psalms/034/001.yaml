translation:
  language: es
  text: De David[a], cuando cambió su manera de comportarse[b] delante de Abimelec, y lo expulsó, y se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abimelec se identifica con Aquis en 1 Samuel 21:10–15; aquí puede tratarse de un nombre alternativo o de un título real.
    reason: alternative_reading
  - marker: b
    text: Lit. «su gusto» o «su discernimiento»; aquí se refiere a su manera de comportarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: El לְ con nombre personal en el encabezamiento de los Salmos es amplio y puede indicar asociación, autoría o dedicación. «De David» conserva esa amplitud sin estrecharlo indebidamente.
- source_word: בְּשַׁנּוֹתוֹ
  english_pob_choice: when he changed
  chosen_spanish: cuando cambió
  alternatives_spanish:
  - cuando alteró
  - al cambiar
  lexicon: HALOT
  rationale: El infinitivo constructo con ב tiene valor temporal aquí. «Cambió» es natural en español y mantiene la relación temporal sin añadir matices no exigidos.
- source_word: טַעְמוֹ
  english_pob_choice: his behavior
  chosen_spanish: su comportamiento
  alternatives_spanish:
  - su manera de ser
  - su juicio
  - su razón
  lexicon: HALOT
  rationale: Aunque el sustantivo puede relacionarse con «gusto/sabor/discernimiento», en este contexto describe la manera externa de conducirse. «Comportamiento» comunica bien esa idea en español y evita una lectura clínica o excesivamente literal.
- source_word: לִפְנֵי אֲבִימֶלֶךְ
  english_pob_choice: before Abimelech
  chosen_spanish: delante de Abimelec
  alternatives_spanish:
  - en presencia de Abimelec
  - ante Abimelec
  lexicon: HALOT
  rationale: «Delante de» refleja con claridad la expresión espacial-relacional hebrea y funciona de manera natural en español bíblico contemporáneo.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelec[a]
  - Aquis
  lexicon: HALOT
  rationale: La forma hebrea se translitera como «Abimelec». Se conserva en el texto principal porque el encabezamiento hebreo la usa así; la posible identificación con Aquis queda documentada en la nota, no incorporada al texto.
- source_word: וַיְגָרֲשֵׁהוּ
  english_pob_choice: and he drove him away
  chosen_spanish: y lo expulsó
  alternatives_spanish:
  - y lo echó
  - y lo arrojó fuera
  lexicon: HALOT
  rationale: El verbo expresa expulsar o echar fuera. «Lo expulsó» mantiene la fuerza del verbo y suena más preciso y digno que una paráfrasis más débil.
- source_word: וַיֵּלַךְ
  english_pob_choice: and he went away
  chosen_spanish: y se fue
  alternatives_spanish:
  - y partió
  - y salió
  lexicon: HALOT
  rationale: El verbo פשוט significa «ir». En este contexto, después de la expulsión, «se fue» es la manera más natural de expresar la salida de David sin agregar información.
theological_decisions:
- issue: Identidad histórica de Abimelec
  english_pob_reading: Retain 'Abimelech' in the main text; note the identification with Achish in 1 Samuel 21:10–15.
  chosen_spanish_reading: Conservar «Abimelec» en el texto principal y señalar en nota su posible identificación con Aquis.
  alternative_spanish_readings:
  - Sustituir por «Aquis» en el texto principal
  - Eliminar la nota histórica
  rationale: Se preserva la prioridad del texto hebreo, que dice «Abimelec», y al mismo tiempo se documenta la relación histórica probable con Aquis sin armonizarla dentro del verso.
  doctrine_reference: Principio de primacía del texto original; preservación de tensiones textuales e históricas en nota.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una construcción de finalidad por una simple coordinación narrativa. En español se siguió ese ajuste con «y» en lugar de una expresión de propósito, para reflejar la secuencia hebrea sin inferir intención.
  spanish_consistency_notes:
  - Se mantuvo «Abimelec» y no «SEÑOR» ni otras formas de armonización no presentes en el hebreo.
  - Se prefirió «expulsó» por su fuerza verbal y su correspondencia con el hebreo, evitando suavizarlo.
  - «Se fue» conserva la narración encadenada del hebreo con ritmo sobrio y natural.
  - El estilo general busca ser bíblico y legible en español contemporáneo, sin depender de la fraseología tradicional si esta oscurece el sentido.
