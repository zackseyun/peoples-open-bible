translation:
  language: es
  text: Ahora bien, toma, por favor, tu equipo[a]—tu aljaba y tu arco—y sal al campo y cázame algo de caza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu equipamiento' para el término más amplio que introduce la especificación inmediata 'tu aljaba y tu arco'.
    reason: lexical_alternative
  - marker: b
    text: O 'una presa'. El hebreo se refiere a alimento obtenido por la caza en el campo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: Captura la transición discursiva y la sensación de inmediatez de la instrucción sin sonar rígido en español.
- source_word: שָׂא נָא
  english_pob_choice: please take
  chosen_spanish: por favor toma
  alternatives_spanish:
  - toma, por favor
  - por favor, lleva
  lexicon: HALOT
  rationale: שָׂא en este contexto funciona idiomáticamente como ‘tomar/tomar consigo’, y נָא añade cortesía o ruego; ‘por favor’ conserva ese matiz.
- source_word: כֵלֶיךָ
  english_pob_choice: your equipment
  chosen_spanish: tu equipo
  alternatives_spanish:
  - tus utensilios
  - tu equipamiento
  - tus cosas
  lexicon: HALOT
  rationale: Es un sustantivo amplio que aquí se especifica enseguida con la aljaba y el arco; ‘tu equipo’ mantiene la amplitud sin sobrerrepresentar el hebreo.
- source_word: תֶּלְיְךָ
  english_pob_choice: your quiver
  chosen_spanish: tu aljaba
  alternatives_spanish:
  - tu carcaj
  lexicon: HALOT
  rationale: El término designa el estuche para flechas; ‘aljaba’ es claro y natural en español bíblico moderno.
- source_word: וְקַשְׁתֶּךָ
  english_pob_choice: and your bow
  chosen_spanish: y tu arco
  lexicon: HALOT
  rationale: Equivalencia directa y transparente para el instrumento de caza.
- source_word: וְצֵא הַשָּׂדֶה
  english_pob_choice: and go out to the field
  chosen_spanish: y sal al campo
  alternatives_spanish:
  - y sal al campo abierto
  - y ve al campo
  lexicon: HALOT
  rationale: שָׂדֶה suele significar ‘campo’; ‘al campo’ conserva la imagen concreta y el marco de caza.
- source_word: וְצוּדָה
  english_pob_choice: and hunt
  chosen_spanish: y caza
  alternatives_spanish:
  - y atrapa
  - y procura
  lexicon: HALOT
  rationale: El verbo expresa la acción de cazar o conseguir presa; ‘caza’ es natural y mantiene la relación con la aljaba y el arco.
- source_word: צידה
  english_pob_choice: game
  chosen_spanish: la presa
  alternatives_spanish:
  - la caza
  - el animal cazado
  - la pieza
  lexicon: HALOT
  rationale: En este contexto se refiere a lo cazado para comer; ‘presa’ es natural en español y evita la especificidad de ‘venado/venison’.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo de Génesis 27:3 y el audit trail inglés de la POB, conservando la progresión: transición discursiva, petición cortés, término amplio para ‘equipo’, especificación de aljaba y arco, salida al campo y obtención de la presa. Se prefirió un registro español digno y natural, sin sustituir el sentido de caza por una paráfrasis más amplia.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general de la serie, pero este versículo no contiene el Tetragrámaton.
  - Se evitó ‘SEÑOR’ o equivalentes litúrgicos porque el versículo no presenta un sustituto divino.
  - ‘Aljaba’ se eligió por precisión léxica; ‘carcaj’ queda como alternativa válida en español, pero menos tradicional en estilo bíblico.
  - La estructura imperativa se mantuvo en una sola línea discursiva para reflejar el encadenamiento del hebreo.
