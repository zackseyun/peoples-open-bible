review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura condicional y la idea de oposición, falta de voluntad para escuchar, y castigo intensificado en proporción a los pecados. Sin embargo, varias elecciones españolas no preservan del todo la naturalidad ni la forma semántica del hebreo/audit trail: ''andan conmigo en oposición'' suena poco idiomático; ''les seguiré trayendo un golpe'' no refleja bien וְיָסַפְתִּי + מַכָּה y resulta extraño en español; además el anclaje de notas no corresponde al inglés, pues [b] en el texto inglés va con ''listen to me''/''I will add...'' y aquí se ancla a ''golpe''.'
  spanish_quality_summary: El español es comprensible, pero hay giros poco naturales para lectura bíblica pública. 'Caminan contra mí' o 'andan en oposición a mí' sería más claro que 'andan conmigo en oposición'. 'Les seguiré trayendo un golpe' es torpe; una formulación como 'seguiré castigándolos' o 'les añadiré golpes' fluye mejor. También conviene mantener el matiz proporcional de 'conforme a sus pecados'.
  glossary_alignment: No hay conflicto con términos teológicos globales. El borrador no introduce 'SEÑOR' ni otros desajustes. La decisión sobre קֶרִי como oposición/hostilidad está bien orientada, pero debe expresarse en español más idiomático. La nota alternativa sobre וְיָסַפְתִּי debe reflejar mejor la opción documentada 'añadir' y la formulación fuente 'siete veces/según sus pecados'.
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''andan conmigo en oposición'''
    rationale: El hebreo 'caminar con/en qeri hacia mí' expresa oposición a Yahvé, pero en español 'conmigo en oposición' suena forzado y puede confundir la relación. 'andan contra mí' preserva mejor el sentido y la legibilidad.
  - severity: high
    issue: 'Formulación torpe y semánticamente imprecisa: ''les seguiré trayendo un golpe'''
    rationale: וְיָסַפְתִּי expresa añadir/continuar, y מַכָּה denota golpe/azote/plaga. 'Traer un golpe' no es natural en español y debilita la fórmula de sanción. Conviene una solución como 'seguiré castigándolos' con nota alternativa o 'les añadiré golpes'.
  - severity: medium
    issue: Desajuste en el uso/anclaje de la nota b
    rationale: La documentación inglesa preserva una alternativa para toda la cláusula de castigo ('I will add to strike...'), no solo para 'golpe'. La nota española debe corresponder a la cláusula relevante y no limitarse indebidamente al sustantivo.
  revised_spanish_text: Y si andan contra mí[a] y no quieren escucharme, entonces seguiré castigándolos[b] siete veces, conforme a sus pecados.
  revised_footnotes:
  - marker: a
    text: O 'en hostilidad hacia mí' / 'en oposición a mí'. El hebreo 'caminar conmigo en qeri' es difícil; en este capítulo expresa una postura de oposición, no mera casualidad.
    reason: lexical_alternative
  - marker: b
    text: O 'les añadiré golpes siete veces por sus pecados'. El hebreo literalmente expresa añadir o aumentar el castigo.
    reason: alternative_reading
  revision_rationale: La revisión mejora la fidelidad idiomática del español sin apartarse del análisis fuente. 'Andan contra mí' comunica mejor קֶרִי en este contexto que 'andan conmigo en oposición'. 'Seguiré castigándolos' evita el español extraño de 'traer un golpe' y mantiene abierta la naturaleza de מַכָּה, mientras la nota preserva la alternativa más literal con 'añadir'. Se conserva 'conforme a sus pecados' para reflejar la proporcionalidad de כְּחַטֹּאתֵיכֶם.
