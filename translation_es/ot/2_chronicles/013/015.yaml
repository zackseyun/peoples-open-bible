review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea y conserva correctamente la agencia divina: Dios es el sujeto de נָגַף. También refleja el valor colectivo de אִישׁ יְהוּדָה y mantiene «todo Israel». Sin embargo, dos elecciones necesitan ajuste: «cuando los hombres de Judá gritaban» suena aspectualmente impropio para el hebreo temporal בְּהָרִיעַ, que aquí pide mejor «cuando ... gritaron»; y «levantaron un grito» es comprensible pero menos natural en español bíblico que «lanzaron un grito» o simplemente «dieron un grito».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «levantaron un grito» y «gritaban» suenan algo forzados en español natural. «Delante de Abías y Judá» es aceptable y fiel a לִפְנֵי; no hace falta expandir «Judá» a «los hombres de Judá». La revisión mejora naturalidad sin perder literalidad.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: הָאֱלֹהִים se traduce bien como «Dios», y no aparecen términos sensibles como Yahvé/Mesías/Espíritu. La decisión de mantener «Judá» en vez de expandirlo concuerda con la justificación inglesa.'
  issues:
  - severity: medium
    issue: Uso de «gritaban» para בְּהָרִיעַ
    rationale: El infinitivo constructo con בְּ tiene aquí valor temporal puntual («cuando/as shouted»), no imperfectivo durativo. «Gritaban» introduce un matiz progresivo/habitual que no refleja bien la secuencia narrativa.
  - severity: low
    issue: «Levantaron un grito» suena poco idiomático
    rationale: Aunque calca de cerca el inglés auditado, en español natural y digno suena más fluido «lanzaron un grito» o «dieron un grito», sin alterar el sentido de רוע/ריע.
  revised_spanish_text: Entonces los hombres de Judá[a] lanzaron un grito; y cuando los hombres de Judá gritaron, Dios hirió a Jeroboam y a todo Israel delante de Abías y Judá.
  revised_footnotes:
  - marker: a
    text: «Hombres de Judá» traduce el colectivo hebreo אִישׁ יְהוּדָה; aunque la forma es singular, el contexto y el verbo plural exigen un sentido grupal.
    reason: lexical_alternative
  revision_rationale: Se ajustó «levantaron un grito» a «lanzaron un grito» para un español más natural sin perder la fuerza del hebreo, y «gritaban» a «gritaron» para reflejar mejor el valor temporal puntual de בְּהָרִיעַ en la narración.
