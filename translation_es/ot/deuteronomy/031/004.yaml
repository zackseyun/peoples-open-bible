translation:
  language: es
  text: Y Yahvé les hará lo mismo que hizo con Sihón y con Og[a], los reyes de los amorreos, y con su tierra, que destruyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''cuando los destruyó''. La partícula relativa hebrea también puede entenderse de manera más temporal o circunstancial en contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: And ... will do
  chosen_spanish: Y ... hará
  alternatives_spanish:
  - Y ... hará
  - Y ... actuará
  lexicon: HALOT
  rationale: En este contexto discursivo, el perfecto con valor futuro se expresa naturalmente en español con futuro simple. 'Hará' mantiene el vínculo verbal con עָשָׂה en la cláusula siguiente, como en el POB inglés con 'will do / did'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa directamente el nombre del pacto; en el estándar del POB en español se conserva como 'Yahvé' para no ocultar el Tetragrámaton tras un título.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: Aunque la preposición hebrea marca al destinatario afectado, en español el giro 'hacer con ellos' expresa con naturalidad el objeto de la acción y evita una construcción dura o poco idiomática.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: HALOT
  rationale: '''Como'' reproduce la comparación de manera clara y sobria; el adverbio ''just as'' del inglés no exige en español una intensificación obligatoria si el paralelo ya es evidente.'
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - trató
  lexicon: HALOT
  rationale: Se conserva el verbo básico 'hacer' mediante 'hizo', manteniendo consistencia léxica con la primera ocurrencia y la relación comparativa del versículo.
- source_word: לְסִיחוֹן וּלְעוֹג
  english_pob_choice: to Sihon and Og
  chosen_spanish: con Sihón y con Og
  alternatives_spanish:
  - a Sihón y a Og
  - contra Sihón y Og
  lexicon: HALOT
  rationale: El hebreo repite ל con valor de objeto implicado; en español, 'con' funciona bien con el verbo 'hacer' y conserva la idea de la acción ejercida sobre ellos sin forzar la sintaxis.
- source_word: מַלְכֵי הָאֱמֹרִי
  english_pob_choice: the kings of the Amorites
  chosen_spanish: los reyes de los amorreos
  alternatives_spanish:
  - los reyes amorreos
  - los reyes del amorreo
  lexicon: HALOT
  rationale: La construcción hebrea en estado constructo se refleja de forma directa y transparente. 'Amorreos' es el equivalente normal en español bíblico para הָאֱמֹרִי.
- source_word: וּלְאַרְצָם
  english_pob_choice: and to their land
  chosen_spanish: y con su tierra
  alternatives_spanish:
  - y a su tierra
  - y su tierra
  lexicon: HALOT
  rationale: Se mantiene la relación de objeto afectado por medio de 'con', que suena más natural en español tras 'hacer' y sigue expresando la extensión de la acción a la tierra.
- source_word: הִשְׁמִיד
  english_pob_choice: he destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arrasó
  - aniquiló
  lexicon: HALOT
  rationale: El Hiphil de שׁמד denota destrucción devastadora. 'Destruyó' es fuerte, preciso y suficientemente amplio sin introducir matices más técnicos o más extremos que el hebreo no exige aquí.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los destruyó
  - a ellos
  lexicon: HALOT
  rationale: El pronombre retoma a Sihón y Og, con implicación de sus fuerzas; en español, el clítico objeto directo puede recuperarse en la relativa sin necesidad de reiteración analítica.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión del POB inglés de transliterar el nombre divino se traslada al español con 'Yahvé', forma estable en Biblia española moderna y coherente con la política del proyecto de no sustituir el nombre por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the comparative clause כַּאֲשֶׁר ... אֲשֶׁר
  english_pob_reading: just as ... which he destroyed
  chosen_spanish_reading: como ... la cual destruyó
  alternative_spanish_readings:
  - tal como ... que destruyó
  - como ... cuando los destruyó
  rationale: El inglés revisado del POB entiende la segunda relativa como modificadora de 'their land'. En español, 'la cual destruyó' conserva esa relación directa; se evita trasladar la alternativa temporal/circunstancial cuando el contexto inmediato favorece la referencia a la tierra.
  doctrine_reference: Sintaxis relativa del hebreo; no implica doctrina específica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que reemplazó una lectura temporal ('when he destroyed them') por una relativa más directa ('which he destroyed') para modificar 'their land'. La propuesta española sigue esa decisión y la expresa con una relativa natural ('la cual destruyó'), evitando una paráfrasis temporal no sustentada por el texto final revisado.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del POB español para יְהוָה.
  - Se mantuvo 'amorreos' para הָאֱמֹרִי, evitando un giro más interpretativo.
  - '''Con ellos / con su tierra'' busca conservar la relación de objeto afectado sin calco duro de las preposiciones hebreas.'
  - La nota textual se ancla solo en la frase 'la cual destruyó', donde aparece la ambigüedad relativa documentada por el aparato inglés.
