translation:
  language: es
  text: 'Ciertamente, los príncipes de Zoán son necios; los sabios consejeros de Faraón dan consejo necio[a]. ¿Cómo pueden decirle a Faraón: «Yo soy hijo de sabios[b], hijo de reyes antiguos»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrecen consejo insensato»; literalmente, «el consejo es necio/brutal».
    reason: lexical_alternative
  - marker: b
    text: «Hijo de sabios» y «hijo de reyes antiguos» son giros de linaje o ascendencia; no necesariamente indican filiación inmediata.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguramente
  - Sin duda
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática, no una restricción. «Ciertamente» conserva bien ese énfasis en español sin sonar demasiado coloquial.
- source_word: אֱוִלִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - foolish
  - estúpidos
  lexicon: HALOT
  rationale: Como predicación sobre los príncipes, «necios» mantiene la fuerza evaluativa y funciona con naturalidad en español bíblico actual. Evita la dureza excesiva de «estúpidos».
- source_word: שָׂרֵי צֹעַן
  english_pob_choice: the princes of Zoan
  chosen_spanish: los príncipes de Zoán
  alternatives_spanish:
  - los oficiales de Zoán
  - los gobernantes de Zoán
  lexicon: HALOT
  rationale: שָׂרִים admite «príncipes», «oficiales» o «gobernantes». Aquí el contexto cortesano favorece «príncipes». Zoán se translitera como nombre propio de lugar.
- source_word: חַכְמֵי יֹעֲצֵי פַרְעֹה
  english_pob_choice: the wise counselors of Pharaoh
  chosen_spanish: los sabios consejeros de Faraón
  alternatives_spanish:
  - los consejeros sabios de Faraón
  - los sabios entre los consejeros de Faraón
  lexicon: HALOT
  rationale: La construcción appositiva se conserva con «sabios consejeros». «De Faraón» refleja la relación posesiva del hebreo y evita una paráfrasis más libre.
- source_word: עֵצָה נִבְעָרָה
  english_pob_choice: give foolish counsel
  chosen_spanish: dan consejo necio
  alternatives_spanish:
  - dan consejo insensato
  - ofrecen consejo necio
  lexicon: HALOT
  rationale: 'El hebreo es comprimido: literalmente, «consejo necio/brutal». El español necesita explicitar el verbo implícito; «dan consejo necio» reproduce la idea con sobriedad y mantiene el desprecio lexical.'
- source_word: נִבְעָרָה
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - brutal
  lexicon: HALOT
  rationale: El término expresa torpeza o estupidez moral/intelectual. «Necio» conserva el tono bíblico sin perder inteligibilidad contemporánea.
- source_word: אֵיךְ תֹּאמְר֣וּ אֶל פַּרְעֹה
  english_pob_choice: How can you say to Pharaoh
  chosen_spanish: ¿Cómo pueden decir a Faraón
  alternatives_spanish:
  - ¿Cómo le pueden decir a Faraón
  - ¿Cómo osarían decir a Faraón
  lexicon: HALOT
  rationale: La interrogación es retórica e incrédula. «¿Cómo pueden decir…?» comunica bien el desafío. Se mantiene «a Faraón» como en el hebreo y en el POB inglés.
- source_word: בֶּן חֲכָמִים אֲנִי
  english_pob_choice: I am a son of wise men
  chosen_spanish: Yo soy hijo de sabios
  alternatives_spanish:
  - Soy hijo de sabios
  - Yo soy descendiente de sabios
  lexicon: HALOT
  rationale: «Hijo de» preserva la imagen idiomática de linaje o pertenencia. «Sabios» recoge el sustantivo de forma natural y mantiene la posible carga de pedigree sin explicitarla demasiado.
- source_word: בֶּן מַלְכֵי קֶדֶם
  english_pob_choice: a son of ancient kings
  chosen_spanish: hijo de reyes antiguos
  alternatives_spanish:
  - descendiente de reyes antiguos
  - hijo de reyes de antaño
  lexicon: HALOT
  rationale: קֶדֶם aquí señala antigüedad, no dirección. «Reyes antiguos» es claro y fiel. Se conserva el paralelismo con la frase anterior.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y toma en cuenta el ajuste del POB inglés de «stupid counsel» a «foolish counsel», reflejándolo con «consejo necio» por su registro más formal y por su correspondencia con «necios». También se evitó una traducción mecánica que perdiera el verbo implícito en עֵצָה נִבְעָרָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - «Faraón» se conserva como transliteración tradicional ya estabilizada en español bíblico.
  - Se usó «Zoán» con tilde por ortografía española del topónimo.
  - La estructura poética paralela se preserva en dos hemistiquios y la cita final entre comillas angulares.
  - Se evitó «Cristo» y «SEÑOR», ya que no corresponden a este versículo.
