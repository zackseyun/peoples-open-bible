translation:
  language: es
  text: Te prostituiste con los hijos de Asiria[a], porque no estabas satisfecha; te prostituiste con ellos[b], y aun así no quedaste satisfecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los asirios». Hebreo: «los hijos de Asiria».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite la metáfora de prostitución para expresar la infidelidad de Jerusalén en alianzas e idolatría.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּזְנִי
  english_pob_choice: you prostituted yourself
  chosen_spanish: te prostituiste
  alternatives_spanish:
  - te prostituiste sexualmente
  - cometiste prostitución
  - fuiste infiel sexualmente
  lexicon: HALOT
  rationale: זנה en Ezequiel funciona como metáfora fuerte de prostitución/infidelidad para expresar la infidelidad política y religiosa de Jerusalén. «Te prostituiste» conserva esa fuerza en español sin suavizarla indebidamente.
- source_word: אֶל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - a
  - hacia
  - para con
  lexicon: HALOT
  rationale: Con זנה, אֶל introduce al interlocutor/pareja ilícita de manera idiomática. En español, «con» es la equivalencia natural y clara.
- source_word: בְּנֵי אַשּׁוּר
  english_pob_choice: the sons of Assyria
  chosen_spanish: los hijos de Asiria
  alternatives_spanish:
  - los asirios
  - los hijos de Asur
  lexicon: HALOT
  rationale: La forma hebrea literal es «los hijos de Asiria». La mantengo para respetar la textura del hebreo, aunque puede referirse colectivamente a los asirios.
- source_word: מִבִּלְתִּי שָׂבְעָתֵךְ
  english_pob_choice: because you were not satisfied
  chosen_spanish: porque no quedabas satisfecha
  alternatives_spanish:
  - porque no estabas satisfecha
  - por no quedar satisfecha
  - porque no te saciabas
  lexicon: HALOT
  rationale: La frase expresa falta de saciedad como trasfondo causal. «No quedabas satisfecha» comunica bien el sentido y mantiene el eco del verbo de saciedad sin volverlo demasiado técnico.
- source_word: וַתִּזְנִים
  english_pob_choice: you prostituted yourself with them
  chosen_spanish: te prostituiste con ellos
  alternatives_spanish:
  - te prostituiste con los asirios
  - fornicaste con ellos
  - te hiciste prostituta con ellos
  lexicon: HALOT
  rationale: El sufijo de 3ª plural remite a los asirios, por eso explicito «con ellos». «Te prostituiste» conserva el valor metafórico y la fuerza del verbo.
- source_word: וְגַם
  english_pob_choice: and even then
  chosen_spanish: y aun así
  alternatives_spanish:
  - y además
  - y todavía
  - y con todo
  lexicon: HALOT
  rationale: 'En este contexto intensifica el contraste: a pesar de lo anterior, el resultado no cambió. «Y aun así» reproduce bien ese matiz adversativo-intensivo.'
- source_word: לֹא שָׂבָעַתְּ
  english_pob_choice: you were not satisfied
  chosen_spanish: no quedaste satisfecha
  alternatives_spanish:
  - no fuiste satisfecha
  - no te saciaste
  - no quedaste saciada
  lexicon: HALOT
  rationale: שׂבע aquí es saciarse o quedar satisfecho. «No quedaste satisfecha» suena natural en español y preserva el paralelismo con la primera mitad del verso.
theological_decisions:
- issue: Mantener la metáfora sexual/prostitucional para la infidelidad de Jerusalén
  english_pob_reading: Preserve the explicit sexual metaphor in the main text
  chosen_spanish_reading: Conservar la metáfora explícita de prostitución en el texto principal
  alternative_spanish_readings:
  - suavizar a «fuiste infiel»
  - parafrasear como «buscaste alianzas»
  - reducir la imagen a «te apartaste»
  rationale: Ezequiel 16 usa deliberadamente un lenguaje chocante para describir la infidelidad de Jerusalén. Suavizarlo debilitaría la retórica profética y ocultaría la carga teológica del pasaje.
  doctrine_reference: Principio de fidelidad al lenguaje original y preservación de la tensión teológica del texto.
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se requieren revisiones adicionales; la solución mantiene el paralelo hebreo, la fuerza metafórica y el matiz de saciedad del versículo.'
  spanish_consistency_notes:
  - Se usa «Asiria» para el nombre del país/imperio y «hijos de Asiria» para reflejar la expresión hebrea.
  - Se mantiene «satisfecha»/«quedaste satisfecha» para conservar el campo semántico de שׂבע.
  - El pronombre explícito «ellos» recupera el sufijo plural del hebreo.
  - La puntuación separa las dos cláusulas paralelas y el remate intensivo final.
