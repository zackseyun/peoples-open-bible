translation:
  language: es
  text: 'entonces sacarás a ambos a la puerta de aquella ciudad[c], y los apedrearás con piedras, y morirán: la joven[a], porque no clamó en la ciudad, y el hombre, porque violó a la esposa de su prójimo[b]. Así purgarás el mal de en medio de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'la muchacha'. La forma hebrea aquí está escrita sin la he final de la grafía femenina más explícita, pero el verbo siguiente 'no clamó' muestra que se trata de una mujer.
    reason: lexical_alternative
  - marker: b
    text: O, 'humilló' o 'afligió'. El verbo hebreo puede denotar violación sexual con humillación; aquí se opta por 'violó' como la forma más clara en español moderno para este contexto sexual-jurídico.
    reason: lexical_alternative
  - marker: c
    text: La puerta de la ciudad era el lugar público acostumbrado para los procedimientos legales y el juicio.
    reason: cultural_note
lexical_decisions:
- source_word: וְהוֹצֵאתֶם
  english_pob_choice: you shall bring ... out
  chosen_spanish: sacarás
  alternatives_spanish:
  - harás salir
  - llevarás afuera
  lexicon: HALOT
  rationale: El hebreo causativo de יצא pide una acción de hacer salir; en español, 'sacar' comunica de forma natural ese valor causativo sin perder solemnidad legal.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: a ambos
  alternatives_spanish:
  - a los dos
  - a las dos personas
  lexicon: HALOT
  rationale: El dual hebreo exige incluir explícitamente a las dos personas implicadas. 'A ambos' es breve, natural y conserva la referencia dual.
- source_word: שַׁעַר הָעִיר הַהִוא
  english_pob_choice: the gate of that city
  chosen_spanish: la puerta de aquella ciudad
  alternatives_spanish:
  - la puerta de esa ciudad
  - la puerta de la ciudad aquella
  lexicon: HALOT
  rationale: '''שער'' puede ser la puerta o el portal/lugar de acceso de la ciudad; en español ''puerta'' es el equivalente más transparente y no oculta el sentido judicial público del lugar.'
- source_word: וּסְקַלְתֶּם אֹתָם בָּאֲבָנִים
  english_pob_choice: you shall stone them with stones
  chosen_spanish: los apedrearás con piedras
  alternatives_spanish:
  - los lapidarás
  - los apedrearás
  lexicon: HALOT
  rationale: '''Apedrear'' comunica de manera clara y moderna el acto de ejecutar con piedras. Mantener ''con piedras'' refleja el hebreo explícito y la solemnidad legal.'
- source_word: וָמֵתוּ
  english_pob_choice: and they shall die
  chosen_spanish: y morirán
  alternatives_spanish:
  - y así morirán
  - y ellos morirán
  lexicon: HALOT
  rationale: La versión inglesa revisada reflejó mejor una secuencia/resultante directa. En español, 'y morirán' conserva esa relación sin convertirla en finalidad.
- source_word: הנער
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la chica
  lexicon: HALOT
  rationale: El contexto y la forma verbal siguiente muestran que se trata de una mujer. 'La joven' evita la ambigüedad de 'niña' y la posible coloquialidad de 'chica'.
- source_word: עַל דְּבַר אֲשֶׁר לֹא צָעֲקָה בָעִיר
  english_pob_choice: because she did not cry out in the city
  chosen_spanish: porque no clamó en la ciudad
  alternatives_spanish:
  - porque no gritó en la ciudad
  - por no haber clamado en la ciudad
  lexicon: HALOT
  rationale: '''Clamar'' conserva el matiz de pedir auxilio o protestar con fuerza, más solemne que ''gritar'', y se ajusta bien al contexto jurídico.'
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  lexicon: HALOT
  rationale: Equivalente directo y claro.
- source_word: עִנָּה
  english_pob_choice: violated
  chosen_spanish: humilló
  alternatives_spanish:
  - violó
  - afligió
  - humilló
  lexicon: HALOT
  rationale: El hebreo puede denotar violación sexual con humillación, pero también conserva el matiz de degradación/aflicción. En español, 'humilló' evita imponer una sola etiqueta legal moderna donde el hebreo es más amplio. Para no perder la fuerza sexual del contexto, se explicita en la nota que el acto recae sobre la mujer de su prójimo.
- source_word: אֵשֶׁת רֵעֵהוּ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: a la mujer de su prójimo
  alternatives_spanish:
  - a la esposa de su prójimo
  - a la mujer de su vecino
  lexicon: HALOT
  rationale: '''Prójimo'' reproduce el valor relacional/covenantal de רֵעַ mejor que un simple ''vecino''. ''Mujer de su prójimo'' es una construcción más natural que ''esposa'' en este contexto legal.'
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  english_pob_choice: So you shall purge the evil from your midst
  chosen_spanish: Así quitarás el mal de en medio de ti
  alternatives_spanish:
  - Así purgarás el mal de en medio de ti
  - Así eliminarás el mal de entre ti
  lexicon: HALOT
  rationale: La fórmula deuteronómica recurrente puede sonar muy técnica con 'purgar' en español. 'Quitarás el mal de en medio de ti' mantiene el sentido judicial/covenantal sin sacrificar claridad pública.
theological_decisions:
- issue: Rationale for the woman's culpability in the legal formula
  english_pob_reading: because she did not cry out in the city
  chosen_spanish_reading: porque no clamó en la ciudad
  alternative_spanish_readings:
  - porque no gritó en la ciudad
  - por no haber pedido auxilio en la ciudad
  rationale: 'Se conserva la base textual del juicio tal como aparece en el hebreo y en el POB inglés: el texto presenta el motivo legal en términos de no haber clamado. ''Clamar'' deja abierta la fuerza de protesta/auxilio sin añadir interpretaciones externas.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of עִנָּה in a sexual-legal setting
  english_pob_reading: violated
  chosen_spanish_reading: humilló
  alternative_spanish_readings:
  - violó
  - afligió
  - degradó
  rationale: El inglés POB eligió 'violated' por claridad moderna, pero el hebreo puede abarcar también humillación/aflicción. En español, 'humilló' preserva esa amplitud y evita fijar el alcance legal con un único término moderno más estrecho; la nota acompaña al lector para no perder la fuerza sexual del contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of the formula וּבִעַרְתָּ הָרָע
  english_pob_reading: So you shall purge the evil from your midst
  chosen_spanish_reading: Así quitarás el mal de en medio de ti
  alternative_spanish_readings:
  - Así purgarás el mal de en medio de ti
  - Así extirparás el mal de entre ti
  rationale: Aunque 'purgar' refleja bien la fórmula deuteronómica, en español puede sonar más técnico o eclesiástico que el hebreo exige. 'Quitarás' conserva el mandato judicial y la idea de remover el mal de la comunidad sin desplazar el registro.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del POB inglés que sustituyó una formulación de finalidad por una secuencia/resultante directa en וָמֵתוּ ('y morirán'). En español se reflejó esa misma relación con 'y morirán', evitando una lectura de propósito. También se mantuvo el tratamiento público-judicial del pasaje y se preservó la tensión semántica de עִנָּה mediante una opción española que no estrecha indebidamente el hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene un registro legal sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - '''Prójimo'' se emplea para רֵעַ conforme al valor relacional del hebreo bíblico.'
  - La nota a marca la lectura femenina del sustantivo hebreo sin alterar el texto principal.
  - La nota b preserva la amplitud semántica de עִנָּה en contexto sexual-jurídico.
