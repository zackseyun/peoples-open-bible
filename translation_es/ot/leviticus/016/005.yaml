revisions:
- from: Y de la congregación de los hijos de Israel tomará dos machos cabríos para expiación[a][b], y un carnero para holocausto.
  to: Y de la congregación de los hijos de Israel tomará dos machos cabríos como ofrenda por el pecado[a][b], y un carnero para holocausto.
  rationale: Se revisa únicamente חַטָּאת para reflejar que el hebreo nombra una categoría sacrificial concreta. «Como ofrenda por el pecado» preserva mejor el sentido fuente, se alinea con la POB inglesa y mantiene la alternativa documentada «ofrenda de purificación» en la nota. El resto del versículo puede conservarse tal como está.
