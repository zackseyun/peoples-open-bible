base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/010/004.yaml
  text: Then Saul said to his armor-bearer[a], “Draw your sword and thrust me through with it, lest these uncircumcised men come and mistreat me.” But his armor-bearer was not willing, because he was very afraid[c][b]. So Saul took the sword and fell on it.
  footnotes:
  - marker: a
    text: Or “and make sport of me,” “and mistreat me,” or “and deal shamefully with me.”
    reason: lexical_alternative
  - marker: b
    text: Literally “these uncircumcised ones.”
    reason: lexical_alternative
  - marker: c
    text: Or “thrust me through with it” could be rendered “pierce me with it” or “stab me with it.”
    reason: lexical_alternative
