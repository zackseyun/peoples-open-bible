    text: Nombre propio del Dios del pacto; se traduce aquí como transliteración del Tetragrámaton, no como título sustitutivo.
    reason: source_note
  - marker: b
    text: O «para que me adoren». El verbo hebreo puede denotar servicio rendido a Dios, incluida la adoración.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final al plural ('me sirvan') para reflejar con mayor precisión el verbo hebreo plural y la decisión léxica del English POB. También se ajusta la nota alternativa para que corresponda sintácticamente a la redacción revisada del texto principal.
