    27 testamenta cum doloribus custodierunt. Neque cogites qui in

    28 conspectu tuo false conuersati sunt, sed memorare qui ex uoluntate tuum timorem cognouerunt. Neque uolueris perdere qui pecorum mores habuerunt, sed respicias eos qui legem tuam

    29 neque volueris perdere qui pecorum mores habuerunt, sed respicias eos qui legem tuam splendide docuerunt.

    30 splendide docuerunt. Neque indigneris eis qui bestiis peius sunt

    31 iudicati, sed diligas qui semper in tua gloria confiderunt. Quoniam nos et patres nostri mortalibus moribus egimus, tu autem

