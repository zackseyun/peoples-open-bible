base_translation:
  language: en
  yaml_path: translation/ot/isaiah/014/031.yaml
  text: Wail[a], O gate! Cry out, O city! Melt away, all of you, Philistia! For smoke comes from the north[c][b], and there is no straggler in his ranks.
  footnotes:
  - marker: a
    text: Or 'Howl, O gate!'; the Hebrew verb can also be rendered 'howl' or 'lament.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faint' or 'dissolve in fear' for 'melt away.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and no one lags behind in his appointed places.' The Hebrew final clause may refer to the invader's troops being fully assembled and orderly.
    reason: alternative_reading
