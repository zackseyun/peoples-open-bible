    issue: 'La redacción del refrán en español es poco natural: «porque para siempre es su amor leal».'
    rationale: Aunque transmite la idea general, no suena idiomática ni refleja con claridad la noción de duración en לְעוֹלָם. El refrán gana fidelidad y legibilidad con un verbo explícito como «permanece» o «perdura».
  - severity: low
    issue: La nota [a] no presenta una alternativa distinta del texto principal.
    rationale: El texto dice «en el desierto[a]» y la nota repite «O «en el desierto»». Debe o bien eliminarse, o bien ofrecer una alternativa real como «por el desierto» y explicar por qué no se escogió.
  - severity: low
    issue: «Desierto» puede estrechar el matiz de מִדְבָּר respecto de «wilderness».
    rationale: No es un error grave en español bíblico, pero el expediente inglés documenta preferencia por un término más amplio que no se limite a clima desértico. Si se mantiene «desierto», la nota debe justificarlo mejor.
