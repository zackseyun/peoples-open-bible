translation:
  language: es
  text: Y Matitías, de entre los levitas, el primogénito de Salum el coreíta, fue encargado[a] del trabajo de las tortas planas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fielmente»; la expresión hebrea puede describir tanto el modo confiable de Matitías como el hecho de haber sido puesto en una función de confianza.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo designa una clase de torta horneada, quizá hecha en plancha o comal.
    reason: cultural_note
lexical_decisions:
- source_word: וּמַתִּתְיָה
  english_pob_choice: And Mattithiah
  chosen_spanish: Y Mattitías
  alternatives_spanish:
  - Ahora Mattitías
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme al uso español; la conjunción se rinde con "Y" para continuar la lista genealógico-administrativa.
- source_word: מִן הַלְוִיִּם
  english_pob_choice: from the Levites
  chosen_spanish: de entre los levitas
  alternatives_spanish:
  - de los levitas
  - uno de los levitas
  lexicon: HALOT
  rationale: מִן indica procedencia/pertenencia. "De entre" conserva mejor la idea de pertenencia al grupo sin sonar forzado en español.
- source_word: הוּא הַבְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el mayor
  - el hijo mayor
  lexicon: HALOT
  rationale: בְּכוֹר se traduce con el término bíblico y natural en español "primogénito", que preserva el valor léxico de primogenitura mejor que una paráfrasis.
- source_word: לְשַׁלֻּם הַקָּרְחִי
  english_pob_choice: of Shallum the Korahite
  chosen_spanish: de Sálum el corahita
  alternatives_spanish:
  - de Shallum el coraíta
  - de Sálum, descendiente de Coré
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en forma española y el gentilicio/familiaridad con un equivalente transparente. "Corahita" sigue la forma establecida para el grupo de Coré/Korah.
- source_word: בֶּאֱמוּנָה
  english_pob_choice: was entrusted
  chosen_spanish: fue encargado
  alternatives_spanish:
  - fue puesto al cuidado
  - fue confiado
  lexicon: HALOT
  rationale: En este contexto administrativo, אֱמוּנָה no se limita a "fidelidad" interior; expresa una asignación confiada. "Fue encargado" reproduce esa carga de responsabilidad sin perder la ambigüedad entre confianza y confiabilidad.
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: del
  alternatives_spanish:
  - sobre
  - a cargo de
  lexicon: HALOT
  rationale: El hebreo indica esfera/responsabilidad sobre una tarea. En español, la construcción natural es "encargado del trabajo"; el valor de supervisión queda implícito.
- source_word: מַעֲשֵׂה
  english_pob_choice: the work
  chosen_spanish: el trabajo
  alternatives_spanish:
  - la labor
  - la obra
  lexicon: HALOT
  rationale: מַעֲשֶׂה es amplio; aquí designa la tarea asignada. "Trabajo" es claro y suficientemente literal en español.
- source_word: הַחֲבִתִּים
  english_pob_choice: the flat cakes
  chosen_spanish: las tortas planas
  alternatives_spanish:
  - las tortas de plancha
  - los panes planos
  lexicon: HALOT
  rationale: Se preserva el sentido culinario concreto del término. "Tortas planas" comunica bien la forma y evita introducir de manera indebida el lenguaje de ofrenda, que no está explícito en el hebreo.
theological_decisions:
- issue: Sentido de בֶּאֱמוּנָה en un contexto de administración del templo
  english_pob_reading: was entrusted / faithfully
  chosen_spanish_reading: fue encargado
  alternative_spanish_readings:
  - fielmente
  - en fidelidad
  - fue confiado
  rationale: La frase admite tanto una cualidad moral de fidelidad como una asignación confiada. Dado el contexto de una tarea concreta, la traducción principal debe reflejar la comisión/responsabilidad sin borrar la posibilidad de lectura adverbial.
  doctrine_reference: Estructura de servicio levítico en Crónicas; no implica doctrina controvertida, pero sí fidelidad administrativa en el culto.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el estado revisado más reciente del texto inglés POB, sin cambios sustantivos en la lectura auditada. Se mantiene la misma resolución principal para בֶּאֱמוּנָה y para הַחֲבִתִּים, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Levitas» se mantiene en minúscula como designación de grupo.
  - Se conserva «corahita» para la relación con Coré/Korah, en línea con un gentilicio bíblico estable.
  - «Primogénito» preserva la fuerza léxica de בְּכוֹר sin suavizarla a «hijo mayor».
