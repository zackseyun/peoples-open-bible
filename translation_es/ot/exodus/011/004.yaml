translation:
  language: es
  text: 'Entonces Moisés dijo: «Así dice Yahvé: A eso de la medianoche[a] yo iré por en medio de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a medianoche». La forma hebrea incluye una partícula prefijada que puede indicar aproximación; por eso se traduce «A eso de la medianoche».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Luego dijo
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración; «entonces» conserva esa sucesión con español natural. «Dijo» mantiene el verbo simple de la fórmula narrativa.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y lectura inmediata para la audiencia.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así dijo
  - Esto dice
  lexicon: HALOT
  rationale: 'La fórmula mensajera profética en español se expresa con presente para la cita directa: «Así dice». Conserva el valor de fórmula autorizada sin forzar un pretérito poco idiomático.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española ya acordada para el Tetragrámaton. «Yahvé» preserva el nombre personal del pacto, evitando la sustitución por un título.
- source_word: כַּחֲצֹת הַלַּיְלָה
  english_pob_choice: About midnight
  chosen_spanish: A eso de la medianoche
  alternatives_spanish:
  - A medianoche
  - Alrededor de la medianoche
  - A la mitad de la noche
  lexicon: HALOT
  rationale: La preposición כ aporta aproximación; «a eso de» comunica bien esa idea en español sin endurecerla a una hora exacta. «Medianoche» conserva el referente temporal preciso.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito para mantener el énfasis del sujeto en el discurso divino.
- source_word: יוֹצֵא
  english_pob_choice: will go out
  chosen_spanish: saldré
  alternatives_spanish:
  - voy a salir
  - salgo
  lexicon: HALOT
  rationale: El participio en esta alocución divina tiene valor inminente/futuro; «saldré» expresa claramente la acción anunciada.
- source_word: בְּתוֹךְ
  english_pob_choice: into the midst of
  chosen_spanish: al medio de
  alternatives_spanish:
  - en medio de
  - entre
  lexicon: HALOT
  rationale: El hebreo combina movimiento con interioridad/presencia. «Al medio de» conserva el impulso direccional de «salir» y evita reducirlo solo a ubicación estática.
- source_word: מִצְרָיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Topónimo estándar en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma «Yahvé» respeta la decisión terminológica del proyecto para el nombre del pacto y evita la sustitución reverencial por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz temporal de כַּחֲצֹת הַלַּיְלָה
  english_pob_reading: About midnight
  chosen_spanish_reading: A eso de la medianoche
  alternative_spanish_readings:
  - A medianoche
  - Alrededor de la medianoche
  rationale: La כ prefijada sugiere aproximación, no exactitud puntual. La traducción española debe preservar esa tensión para no convertir la expresión en una marca horaria rígida.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la fórmula profética, el nombre divino como «Yahvé» y el valor aproximativo de כַּחֲצֹת הַלַּיְלָה. No se detectaron revisiones recientes que alteren el sentido de base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה conforme al estándar del proyecto.
  - Se mantiene un registro bíblico claro y moderno, sin calcos innecesarios.
  - «A eso de la medianoche» preserva la aproximación temporal que la tradición a menudo suaviza.
