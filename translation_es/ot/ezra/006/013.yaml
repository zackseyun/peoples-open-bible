translation:
  language: es
  text: Entonces Tatenai, gobernador de Más allá del Río[a], Setar-Bozenai, y sus asociados hicieron exactamente así[b], conforme a lo que el rey Darío había enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Más allá del Río» era el término administrativo persa para la región al oeste del Éufrates.
    reason: cultural_note
  - marker: b
    text: O «lo ejecutaron con cuidado» o «lo llevaron a cabo con toda exactitud». La expresión aramea subraya el cumplimiento preciso de la orden del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la acción siguiente en secuencia narrativa. «Entonces» es natural en español y conserva esa progresión.
- source_word: פַּחַת עֲבַר נַהֲרָה
  english_pob_choice: the governor of Beyond the River
  chosen_spanish: gobernador del Otro lado del Río
  alternatives_spanish:
  - gobernador de Más allá del Río
  - gobernador de la provincia del Otro lado del Río
  lexicon: HALOT
  rationale: פַּחַת expresa la función administrativa de gobernador. La designación imperial aramea se vierte de forma transparente como un nombre geográfico-titular; «Otro lado del Río» mantiene el valor técnico sin ocultarlo tras una equivalencia más explicativa.
- source_word: שְׁתַר בּוֹזְנַי
  english_pob_choice: Shethar-bozenai
  chosen_spanish: Setar-Bozenai
  alternatives_spanish:
  - Shetar-Bozenai
  lexicon: transliteration project standard
  rationale: Nombre propio transliterado según uso español, con adaptación mínima para fluidez y reconocimiento.
- source_word: וּכְנָוָתְהוֹן
  english_pob_choice: and their associates
  chosen_spanish: y sus asociados
  alternatives_spanish:
  - y sus compañeros
  - y sus colegas
  lexicon: HALOT
  rationale: En contexto administrativo, el término señala a los vinculados con ellos en función oficial; «asociados» mantiene ese matiz mejor que opciones más generales.
- source_word: לָקֳבֵל דִּי
  english_pob_choice: in accordance with what
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - de acuerdo con lo que
  - según lo que
  lexicon: HALOT
  rationale: La idiomática aramea introduce conformidad con una orden o mandato. «Conforme a lo que» suena natural y conserva la idea de correspondencia exacta.
- source_word: שְׁלַח
  english_pob_choice: had sent
  chosen_spanish: había enviado
  alternatives_spanish:
  - envió
  - había mandado
  lexicon: HALOT
  rationale: El verbo básico es «enviar». El pluscuamperfecto español refleja la anterioridad del decreto de Darío respecto de la ejecución narrada.
- source_word: כְּנֵמָא אָסְפַּרְנָא
  english_pob_choice: exactly so
  chosen_spanish: exactamente así
  alternatives_spanish:
  - con toda exactitud
  - con precisión
  lexicon: HALOT
  rationale: La combinación adverbial intensifica la precisión y la pronta conformidad. «Exactamente así» comunica bien el matiz de cumplimiento estricto sin perder naturalidad.
- source_word: עֲבַדוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - lo hicieron
  - cumplieron
  lexicon: HALOT
  rationale: Verbo amplio de hacer/realizar; en contexto se refiere a ejecutar la orden. «Hicieron» es directo y mantiene la relación con «exactamente así».
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto fuente y la traducción inglesa están en alto acuerdo y no requieren cambios sustantivos; se ha preservado esa estabilidad y se ha ajustado el español para expresar con claridad la fórmula administrativa y el énfasis en el cumplimiento exacto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Otro lado del Río» reproduce la designación administrativa persa de forma transparente; no se reemplaza por una glosa interpretativa más moderna.
  - «Asociados» se usa por el contexto oficial, no como equivalente genérico de compañía casual.
  - La nota a] se ancla en «exactamente así» para reflejar la alternativa lexical de la expresión aramea intensificadora.
