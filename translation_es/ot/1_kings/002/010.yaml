translation:
  language: es
  text: Entonces David se durmió con sus padres y fue sepultado en la ciudad de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se durmió con sus padres», una expresión habitual para la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo funerario convencional para la muerte. «Se durmió» conserva ese giro idiomático en español y refleja la decisión inglesa de mantener la imagen de sueño en vez de explicitar directamente «murió».
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres y antepasados
  lexicon: HALOT
  rationale: El sentido es la fórmula hebrea fija de muerte. «Padres» mantiene la relación genealógica y el tono tradicional; en español, «con sus padres» comunica la idiomática sin perder naturalidad. Se evita «antepasados» porque atenúa la forma heredada del hebreo.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue inhumado
  lexicon: HALOT
  rationale: 'El nifal expresa pasivo: fue enterrado/sepultado. «Sepultado» es digna, precisa y adecuada para registro bíblico; conserva el acto funerario sin añadir matices ajenos.'
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David,
  - en la ciudadela de David
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional del lugar como designación estable. «Ciudad de David» es transparente en español y corresponde al valor titular/toponímico que el POB inglés preserva.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Entonces» da un flujo natural en español y conserva la secuencia narrativa mejor que una repetición mecánica de «Y».
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin introducir cambios de sentido. La única nota se mantiene para conservar la expresión hebrea idiomática detrás de «se durmió con sus padres» y su valor funerario convencional.
  spanish_consistency_notes:
  - Se usa «David» como nombre propio sin artículo, conforme al hebreo y al uso bíblico en español.
  - «Sepultado» mantiene un registro reverente y claro, coherente con narrativa histórica bíblica.
  - La nota al pie marca la expresión idiomática completa para preservar la tensión entre literalidad y sentido convencional.
