review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del POB inglés: condición casuística («Si»), varón individual dentro de la comunidad («entre ustedes un hombre»), estado de impureza ritual no moral, causa idiomática correctamente interpretada como emisión nocturna, salida fuera del campamento, y prohibición de volver al interior/medio del campamento. La nota también preserva adecuadamente el modismo hebreo.'
  spanish_quality_summary: El texto es claro y fiel, pero necesita un pequeño ajuste de naturalidad y precisión idiomática. «No esté limpio» suena algo forzado en español para este contexto ritual; «no esté puro» puede sonar más moralizante. La opción más natural y precisa aquí es «esté impuro», aclarada por el contexto y la nota para evitar lectura moral. Además, «saldrá fuera del campamento» es comprensible pero algo redundante; «saldrá del campamento» es más natural, aunque para conservar explícitamente מִחוּץ puede preferirse «saldrá afuera del campamento».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión clave es ritualidad: conviene usar «impuro» en español con apoyo contextual, ya que aquí comunica mejor la categoría cultual que «no esté limpio».'
  issues:
  - severity: medium
    issue: «que no esté limpio» suena poco idiomático en español bíblico moderno
    rationale: Aunque intenta evitar carga moral, en español resulta menos natural que «esté impuro» para una categoría ritual. El contexto legal y la nota ya impiden entenderlo como culpa moral.
  - severity: low
    issue: «saldrá fuera del campamento» es ligeramente redundante
    rationale: La combinación es entendible, pero «saldrá afuera del campamento» o «saldrá del campamento» fluye mejor en español. Dado que el hebreo explicita ‘a fuera de’, conviene mantener ‘afuera’.
  - severity: low
    issue: La redacción de la nota puede sonar poco natural por las comillas y el inicio
    rationale: '«Hebreo: “un acontecimiento de la noche”» se puede pulir a «Hebreo: “un acontecimiento de la noche”, un modismo...» para mayor fluidez.'
  revised_spanish_text: Si hay entre ustedes un hombre que esté impuro[a] a causa de una emisión nocturna, saldrá afuera del campamento; no entrará en medio del campamento.
  revised_footnotes:
