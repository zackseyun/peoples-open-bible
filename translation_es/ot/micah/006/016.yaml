    text: Or 'the practices of the house of Ahab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'her inhabitants a hissing,' that is, something people hiss at in derision.
    reason: cultural_note
  - marker: c
    text: Or 'the disgrace of my people,' or 'the reproach against my people.' The Hebrew phrase is compact and may be understood in more than one way.
    reason: alternative_reading
