theological_decisions:
- issue: Rendering of repeated mala in a judgment oracle
  chosen_reading: evils
  alternative_readings:
  - calamities
  - disasters
  rationale: Although English 'evils' can suggest moral evil, the repeated Latin term functions as a stock prophetic label for divinely sent judgments. Retaining 'evils' preserves the rhetorical repetition and theological claim that these disasters are not random.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Personification in the contrast between righteousness and iniquity (v. 51)
  chosen_reading: '''righteousness will hate iniquity when she adorns herself, and will accuse her to her face'''
  alternative_readings:
  - '''justice will accuse injustice'''
  - '''righteousness will accuse the adorned prostitute figure'''
  rationale: The Latin is compressed and metaphorically tangled, likely continuing the prostitute/woman imagery. The translation preserves the personified feminine contrast rather than flattening it into abstract moral prose.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Eschatological phrase saeculum gemet (v. 40)
  chosen_reading: the age will groan
  alternative_readings:
  - the world will groan
  rationale: Saeculum in apocalyptic contexts often denotes the present age/order rather than the physical cosmos alone. 'Age' preserves that eschatological nuance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Address to 'my people' and 'my chosen ones' in a Christian appendix
  chosen_reading: Retained directly without harmonizing to later ecclesial terminology
  alternative_readings:
  - saints
  - church
  rationale: The Latin speaks in prophetic scriptural idiom. We preserve that register and do not import later doctrinal labels not present in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
