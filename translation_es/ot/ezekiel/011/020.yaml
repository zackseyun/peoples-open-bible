translation:
  language: es
  text: para que anden en mis estatutos y guarden mis juicios[a] y los cumplan, y serán mi pueblo, y yo seré su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis ordinanzas» para מִשְׁפָּטַי. El hebreo puede referirse a decisiones judiciales o a preceptos normativos en contexto de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: La partícula expresa finalidad. «Para que» es la forma natural y fiel en español para introducir propósito, manteniendo el valor final del hebreo sin volverlo más explicativo de lo necesario.
- source_word: בְּחֻקֹּתַי
  english_pob_choice: in my statutes
  chosen_spanish: en mis estatutos
  alternatives_spanish:
  - según mis estatutos
  - por mis estatutos
  lexicon: HALOT
  rationale: חֻקּוֹת conserva la imagen de preceptos fijados o estatutos establecidos. «En mis estatutos» reproduce el paralelismo con el verbo «andar» y conserva la metáfora de conducta dentro del marco del pacto.
- source_word: יֵלֵכוּ
  english_pob_choice: may walk
  chosen_spanish: anden
  alternatives_spanish:
  - caminen
  - vivan
  lexicon: HALOT
  rationale: «Andar» mantiene el hebraísmo de conducta continua. En español, el subjuntivo «anden» encaja con la finalidad de לְמַעַן y conserva el matiz de comportamiento habitual.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis ordinanzas
  - mis decisiones judiciales
  - mis decretos
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar decisiones judiciales, juicios u ordenanzas en contexto de pacto. «Juicios» conserva mejor la ambigüedad semántica del hebreo que una palabra más cerrada como «ordenanzas», sin borrar la dimensión legal.
- source_word: יִשְׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - custodien
  lexicon: HALOT
  rationale: שׁמר en este contexto significa observar fielmente o guardar mandamientos. «Guarden» es idiomático en español bíblico y mantiene la noción de fidelidad continuada.
- source_word: וְעָשׂוּ אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los cumplan
  alternatives_spanish:
  - y los hagan
  - y los practiquen
  lexicon: HALOT
  rationale: El hebreo añade una segunda idea de obediencia efectiva después de «guardar». «Cumplir» expresa bien la ejecución concreta de lo mandado en español bíblico contemporáneo, sin suavizar el énfasis práctico.
- source_word: וְהָיוּ לִי לְעָם
  english_pob_choice: and they will be my people
  chosen_spanish: y serán para mí un pueblo
  alternatives_spanish:
  - y serán mi pueblo
  - y me pertenecerán como pueblo
  lexicon: HALOT
  rationale: La fórmula de pacto se conserva con «serán para mí un pueblo», que refleja con transparencia el hebreo לִי לְעָם y mantiene la relación posesiva/covenantal.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  english_pob_choice: and I will be their God
  chosen_spanish: y yo seré para ellos Dios
  alternatives_spanish:
  - y yo seré su Dios
  - y yo seré para ellos como Dios
  lexicon: HALOT
  rationale: Se preserva la forma del pacto sin introducir un artículo posesivo que el hebreo no expresa de modo explícito. «Dios» traduce אֱלֹהִים en su sentido singular de relación pactal; la construcción «para ellos Dios» mantiene la fuerza relacional del hebreo.
theological_decisions:
- issue: Fórmula recíproca de pacto
  english_pob_reading: they will be my people, and I will be their God
  chosen_spanish_reading: serán para mí un pueblo, y yo seré para ellos Dios
  alternative_spanish_readings:
  - serán mi pueblo, y yo seré su Dios
  - serán para mí un pueblo, y yo seré su Dios
  rationale: Se conserva la fórmula bíblica de pacto sin añadir interpretación devocional. La redacción elegida refleja más de cerca la estructura hebrea y mantiene la reciprocidad relacional entre Yahvé e Israel.
  doctrine_reference: Translation philosophy §§5–6
- issue: Alcance de מִשְׁפָּטִים
  english_pob_reading: my judgments
  chosen_spanish_reading: mis juicios
  alternative_spanish_readings:
  - mis ordinanzas
  - mis decretos
  rationale: En este contexto jurídico-covenantal, מִשְׁפָּטִים puede abarcar tanto juicios como disposiciones normativas. «Juicios» mantiene la tensión semántica y evita estrechar el término a una sola noción.
  doctrine_reference: HALOT; uso jurídico-covenantal del término en el AT
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión final inglesa (sin cambios) y preserva su preferencia por una equivalencia óptima: mantiene la fórmula de pacto, el paralelismo hebreo y la ambigüedad útil de מִשְׁפָּטִים, ajustando la sintaxis al español natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo en la documentación, no en el texto del versículo, porque aquí el hebreo no contiene el Tetragrámaton sino la fórmula pactal «yo seré para ellos Dios».
  - Se prefirió «juicios» en el texto y se dejó la alternativa «ordinanzas» en nota para conservar la tensión lexical documentada.
  - La estructura «serán para mí un pueblo, y yo seré para ellos Dios» conserva la cercanía al hebreo y evita una glosa excesiva con posesivos que el texto no explicita.
