translation:
  language: es
  text: Durante seis años sembrarás tu tierra y recogerás su producto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su rendimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֵׁשׁ שָׁנִים
  english_pob_choice: For six years
  chosen_spanish: Durante seis años
  alternatives_spanish:
  - Y seis años
  - Seis años
  lexicon: HALOT
  rationale: La expresión temporal introduce el período de obligación agrícola; en español, «Durante seis años» comunica mejor la duración de la norma que un inicio coordinado literal con «Y seis años».
- source_word: תִּזְרַע
  english_pob_choice: you shall sow
  chosen_spanish: sembrarás
  alternatives_spanish:
  - sembrarás tú
  - deberás sembrar
  - sembrarás
  lexicon: HALOT
  rationale: El imperfecto 2ms en contexto legal tiene fuerza prescriptiva. «Sembrarás» conserva el mandato sin sobrecargar con perífrasis más largas.
- source_word: אַרְצֶךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu tierra
  - tu país
  - tu terreno
  lexicon: HALOT
  rationale: En este contexto agrícola, אֶרֶץ apunta a la tierra cultivable del destinatario. «Tu tierra» es natural en español y mantiene el referente territorial/agropecuario.
- source_word: וְאָסַפְתָּ
  english_pob_choice: and gather
  chosen_spanish: y recogerás
  alternatives_spanish:
  - y reunirás
  - y juntarás
  - y cosecharás
  lexicon: HALOT
  rationale: אָסַף puede significar recoger, reunir o juntar. «Recogerás» expresa bien la acción de retirar el producto del campo sin añadir el matiz más técnico de «cosechar» que podría forzar el sentido.
- source_word: תְּבוּאָתָהּ
  english_pob_choice: its produce
  chosen_spanish: su producto
  alternatives_spanish:
  - su cosecha
  - su rendimiento
  - su fruto
  lexicon: HALOT
  rationale: תְּבוּאָה designa el producto o rendimiento agrícola. «Producto» preserva la generalidad del hebreo mejor que «cosecha», y el posesivo «su» refleja el femenino singular referido a «tierra».
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones sustantivas; el consenso posterior fue de alta concordancia y sin cambios. La redacción española mantiene esa estabilidad, ajustando solo la naturalidad sintáctica del imperativo legal en español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece en este versículo; el texto hebreo habla directamente de la tierra y su producto.
  - Se prefirió un verbo de acción agrícola general («recogerás») en lugar de un tecnicismo que estreche indebidamente el hebreo.
  - El posesivo singular femenino en «su producto» se refiere a «tu tierra», conservando la cohesión gramatical del hebreo.
