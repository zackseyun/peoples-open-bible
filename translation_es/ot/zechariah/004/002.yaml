  to: 'Y me dijo: «¿Qué ves?». Y yo dije: «Veo, y he aquí, un candelero[a] todo de oro, con su copa encima, y siete lámparas sobre él, y siete y siete conductos[b] para las lámparas que están arriba de él».'
  rationale: Se revisó «candelabro» a «candelero» para representar mejor מְנוֹרָה en un contexto de lámparas; «respondí» a «dije» para seguir más de cerca el hebreo; y se aligeraron varias repeticiones de «de él» para mejorar la naturalidad del español sin perder el sentido locativo. Se mantuvieron «veo», «y he aquí», «todo de oro», «siete y siete», «copa» y «conductos» por buena correspondencia con el original y el rastro POB.
