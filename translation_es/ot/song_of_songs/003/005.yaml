base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/003/005.yaml
  text: I adjure you[a], daughters of Jerusalem, by the gazelles or by the does of the field[b], that you not stir up or awaken love until it desires.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'until it pleases.' The Hebrew literally has a feminine singular verb, agreeing with 'love'; some take the line more personally as 'until she pleases' or 'until he pleases.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew likely refers literally to gazelles and does of the field; the wording may also echo 'hosts,' creating a poetic wordplay in the oath formula.
    reason: cultural_note
