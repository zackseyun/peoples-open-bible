lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - puso nombre a
  lexicon: HALOT
  rationale: קרא con שֵׁם expresa la acción de llamar por nombre; en español, «llamó el nombre de» conserva el giro hebreo y la relación entre el acto y el nombre sin volverlo demasiado rígido.
- source_word: שֵׁם
  english_pob_choice: the name of
  chosen_spanish: el nombre de
  alternatives_spanish:
  - nombre
  lexicon: HALOT
  rationale: Se mantiene explícito el sustantivo «nombre» porque el hebreo dice literalmente que Abraham llamó «el nombre de» su hijo.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo indica pertenencia; «su hijo» es natural en español y preserva la referencia a Abraham.
- source_word: הַנּוֹלַד לוֹ
  english_pob_choice: who was born to him
  chosen_spanish: el que le nació
  alternatives_spanish:
  - el nacido para él
  - el que nació para él
  lexicon: HALOT
  rationale: La forma pasiva/participial hebrea se expresa de modo natural con «el que le nació», que conserva la relación indirecta «a/para él» sin perder claridad.
- source_word: אֲשֶׁר יָלְדָה לּוֹ שָׂרָה
  english_pob_choice: whom Sarah bore to him
  chosen_spanish: al que Sara le dio a luz
  alternatives_spanish:
  - que Sara le dio a luz
  - que Sara le parió
  lexicon: HALOT
  rationale: «Yaldá» con dativo repite que Sara lo dio a luz para Abraham; «dio a luz» es formal y fiel, y «al que» permite mantener el antecedente sin forzar la sintaxis.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
translation_notes:
  revision_awareness: El inglés auditado movió y luego restauró «Isaac» al final para reflejar mejor que los relativos modifican a «su hijo»; el español sigue esa estructura, manteniendo el nombre al final. Se añadió una sola nota con anclaje explícito para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponda; este verso no contiene el tetragrámaton.
  - Se evita «Cristo» porque el texto solo contiene un nombre propio.
  - Se conserva un tono bíblico claro sin arcaizar innecesariamente.
  - La nota [a] está anclada en el sintagma «su hijo[a]» para cumplir la validación y ofrecer la alternativa idiomática.
