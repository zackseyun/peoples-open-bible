translation:
  language: es
  text: ¿Qué hay más resplandeciente que el sol? Sin embargo, aun esto se apaga[a], y carne y sangre[b] maquina el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se eclipsa» o «desaparece»; el verbo griego puede indicar fallar, cesar o quedar eclipsado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «carne y sangre», un modismo para seres humanos mortales.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Quién?
  lexicon: LSJ
  rationale: La pregunta es comparativa e impersonal; «qué» expresa mejor la comparación de brillo que «quién».
- source_word: φωτεινότερον
  english_pob_choice: brighter
  chosen_spanish: más resplandeciente
  alternatives_spanish:
  - más brillante
  - más luminoso
  lexicon: LSJ
  rationale: Se busca un comparativo natural en español que conserve la idea de mayor luminosidad sin sonar mecánico.
- source_word: ἡλίου
  english_pob_choice: than the sun
  chosen_spanish: que el sol
  alternatives_spanish:
  - del sol
  lexicon: LSJ
  rationale: El genitivo comparativo griego se vierte de forma natural con «que» en español.
- source_word: καὶ τοῦτο ἐκλείπει
  english_pob_choice: Yet even this fails
  chosen_spanish: Y aun esto se apaga
  alternatives_spanish:
  - Y aun esto falla
  - Y aun esto se eclipsa
  - Y aun esto desaparece
  lexicon: LSJ
  rationale: ἐκλείπει puede significar cesar, fallar o ser eclipsado; «se apaga» preserva la caducidad/declive sin fijar indebidamente un eclipse astronómico.
- source_word: πονηρὸς
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el impío
  - el perverso
  lexicon: LSJ
  rationale: Aquí funciona con fuerza moral como sustantivo/predicativo; «el mal» mantiene esa carga sin añadir una etiqueta moral más interpretativa.
- source_word: ἐνθυμήσεται
  english_pob_choice: devises
  chosen_spanish: piensa
  alternatives_spanish:
  - maquina
  - planea
  - concibe
  lexicon: LSJ
  rationale: El verbo puede ser ponderar interiormente o concebir algo; en este contexto, el español «piensa el mal» mantiene la brevedad del dicho sapiencial y la tensión semántica del griego.
- source_word: σάρκα καὶ αἷμα
  english_pob_choice: flesh and blood
  chosen_spanish: carne y sangre
  alternatives_spanish:
  - seres humanos
  - humanidad mortal
  lexicon: LSJ
  rationale: Se preserva la expresión idiomática concreta del griego. En español «carne y sangre» es inteligible y conserva la antropología encarnada sin sustituirla por una abstracción.
theological_decisions:
- issue: Expresión antropológica σάρκα καὶ αἷμα
  english_pob_reading: flesh and blood
  chosen_spanish_reading: carne y sangre
  alternative_spanish_readings:
  - seres humanos
  - humanidad mortal
  rationale: La frase subraya la fragilidad moral y corporal del ser humano. Mantener el modismo conserva la tensión antropológica del texto sin suavizarla ni convertirla en una glosa.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; contested term σάρξ normally rendered ''flesh'' when literal'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparece exactamente en el texto español. No se introdujeron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - Se preservó el modismo «carne y sangre» para σάρκα καὶ αἷμα, coherente con el criterio POB de no desactivar expresiones antropológicas concretas.
  - Se evitó «Cristo/Mesías» porque no aparecen en el versículo.
  - La solución «se apaga» intenta equilibrar las opciones de ἐκλείπει sin cerrar la polisemia a un solo sentido técnico.
