  text: וַ/יֹּ֜אמֶר הִנֶּ֣ה נָּא אֲדֹנַ֗/י ס֣וּרוּ נָ֠א אֶל בֵּ֨ית עַבְדְּ/כֶ֤ם וְ/לִ֨ינוּ֙ וְ/רַחֲצ֣וּ רַגְלֵי/כֶ֔ם וְ/הִשְׁכַּמְתֶּ֖ם וַ/הֲלַכְתֶּ֣ם לְ/דַרְכְּ/כֶ֑ם וַ/יֹּאמְר֣וּ לֹּ֔א כִּ֥י בָ/רְח֖וֹב נָלִֽין־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/019/002.yaml
  text: And he said[a], “Please, my lords, turn aside to your servant’s house, and spend the night, and wash your feet. Then you may rise early and go on your way.” But they said, “No[d][c][b], but we will spend the night in the square.”
  footnotes:
  - marker: a
    text: Or 'my lord' if אֲדֹנַי is taken as a singular honorific; here the plural sense fits the immediate context of Lot addressing the two visitors.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term refers to an open public area of the city, such as a square or plaza.
    reason: cultural_note
  - marker: c
    text: Or 'Please, my lords, turn aside, please,'.
    reason: previous_rendering
  - marker: d
    text: Or 'please turn aside, to your servant’s house'.
    reason: previous_rendering
