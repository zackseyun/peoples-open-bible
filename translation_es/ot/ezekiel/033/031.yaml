    rationale: El hebreo עֲגָבִים es raro, pero el contexto de la boca favorece algo dicho verbalmente con matiz sensual o seductor. «Cosas sensuales» comunica mejor en el texto, mientras la nota puede preservar «deseos» y «cantos amorosos» como alternativas.
