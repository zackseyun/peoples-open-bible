id: JHN.8.3
reference: John 8:3
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἄγουσιν δὲ οἱ γραμματεῖς καὶ οἱ Φαρισαῖοι πρὸς αὐτὸν γυναῖκα ἐν μοιχείᾳ κατειλημμένην·
    καὶ στήσαντες αὐτὴν ἐν μέσῳ,
  language: Greek
translation:
  text: Then[a] the scribes and the Pharisees brought to him a woman caught in adultery,
    and having set her in the midst,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuation of the story of the woman caught in adultery (John 7:53–8:11).
      See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: ἄγω
  chosen: brought
  alternatives:
  - bring
  - lead
  lexicon: BDAG
  rationale: The Greek uses the historical present ('they bring'), which is translated
    here as a simple past ('brought') to maintain natural English narrative flow.
- source_word: καταλαμβάνω
  chosen: caught
  alternatives:
  - seized
  - apprehended
  - overtaken
  lexicon: BDAG
  rationale: The perfect passive participle indicates she was discovered in the act;
    'caught' is the standard and most natural English idiom for this context.
- source_word: ἵστημι
  chosen: having set
  alternatives:
  - having placed
  - making stand
  - stood
  lexicon: BDAG
  rationale: The aorist active participle describes the action of positioning her
    before the crowd. 'Having set' conveys this deliberate placement.
- source_word: μέσος
  chosen: the midst
  alternatives:
  - the middle
  - the center
  lexicon: BDAG
  rationale: Translated as 'the midst' to reflect her being placed centrally among
    the gathered group of people.
