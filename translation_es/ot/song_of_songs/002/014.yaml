  to: Paloma mía, en las hendiduras de la roca, en el escondite del precipicio[a], muéstrame tu aspecto[b]; déjame oír tu voz, porque tu voz es dulce, y tu aspecto es hermoso.
  rationale: Se corrige el vocativo a 'Paloma mía' para reflejar literalmente יוֹנָתִי sin añadir un diminutivo interpretativo. Se reubica la nota [a] al sintagma topográfico difícil, en conformidad con la auditoría inglesa. Se sustituye 'suave' por 'dulce' para reflejar mejor עָרֵב en contexto poético. Se cambia 'apariencia' por 'aspecto' para mantener la amplitud semántica de מַרְאֶה con mejor naturalidad en español, conservando la repetición en ambas ocurrencias.
