translation:
  language: es
  text: Es una señal perpetua entre mí y los hijos de Israel[a], porque en seis días Yahvé hizo los cielos y la tierra, y en el séptimo día cesó[b] y recobró aliento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» para «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «descansó»; el verbo hebreo significa más literalmente «cesó».
    reason: lexical_alternative
  - marker: c
    text: O «fue renovado»; o «tomó aliento». El hebreo usa un lenguaje antropomórfico vívido.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּינִי וּבֵין
  english_pob_choice: between me and
  chosen_spanish: entre yo y
  alternatives_spanish:
  - entre mí y
  - entre yo y entre
  lexicon: HALOT
  rationale: La construcción correlative indica relación entre dos partes; en español la forma natural y transparente es «entre yo y», conservando la referencia directa de primera persona sin suavizarla.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar masculina del hebreo. «Los israelitas» es más idiomático, pero atenúa la transparencia formal de la frase de origen.
- source_word: אוֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - marca
  - token
  lexicon: HALOT
  rationale: «Señal» es el equivalente natural en español para un signo de pacto o confirmación visible y duradera.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: perpetua
  alternatives_spanish:
  - para siempre
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: 'Se traduce como adjetivo para que el español fluya con naturalidad: «señal perpetua» comunica la duración continua del hebreo sin perder el valor de permanencia.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa del signo del sábado; «porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: in six days
  chosen_spanish: en seis días
  alternatives_spanish:
  - durante seis días
  - seis días
  lexicon: HALOT
  rationale: La frase temporal se mantiene de modo directo y natural, reflejando el marco temporal de la creación.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  lexicon: HALOT
  rationale: «Hizo» preserva la amplitud del verbo hebreo, que en este contexto abarca la obra creadora sin restringirla a un tecnicismo teológico específico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el nombre divino en el texto principal en español.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra creada
  lexicon: HALOT
  rationale: Se conserva el merismo habitual de la creación. En español, «los cielos» refleja mejor el plural hebreo que «el cielo».
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: and on the seventh day
  chosen_spanish: y en el séptimo día
  alternatives_spanish:
  - y el séptimo día
  - pero en el séptimo día
  lexicon: HALOT
  rationale: La coordinación temporal se expresa de manera directa sin introducir contraste no marcado por el hebreo.
- source_word: שָׁבַת
  english_pob_choice: he ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - descansó
  - se detuvo
  lexicon: HALOT
  rationale: «Cesó» preserva el sentido básico de dejar de obrar, evitando la implicación de cansancio que podría sugerir «descansó».
- source_word: וַיִּנָּפַשׁ
  english_pob_choice: was refreshed
  chosen_spanish: fue refrescado
  alternatives_spanish:
  - tomó aliento
  - fue renovado
  - se refrescó
  lexicon: HALOT
  rationale: Se mantiene el lenguaje corporal/antropomórfico del hebreo. «Fue refrescado» conserva la pasividad del verbo y la imagen viva del texto, aunque resulte menos idiomático que «se refrescó».
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios en el cierre del versículo
  english_pob_reading: he ceased and was refreshed
  chosen_spanish_reading: cesó y fue refrescado
  alternative_spanish_readings:
  - descansó y fue refrescado
  - cesó y tomó aliento
  rationale: 'Se preserva la tensión del hebreo: Dios es presentado con lenguaje humano sin convertir la frase en una abstracción. «Cesó» retiene el matiz de parar la obra, y «fue refrescado» mantiene la imagen concreta.'
  doctrine_reference: Translation philosophy §3
- issue: Expresión filial y representativa de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina/familiar del original, siguiendo la política del proyecto de no neutralizar sin razón una expresión lexical marcada.
  doctrine_reference: Translation philosophy §4
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se aplica el default del proyecto para el Tetragrámaton en español, evitando sustituirlo por una convención de ocultamiento.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el auditorial inglés, manteniendo las decisiones revisadas sin cambios sustantivos respecto del pase más reciente. Se conserva la traducción de יְהוָה como Yahvé, el matiz de שָׁבַת como «cesó» y la imagen antropomórfica de וַיִּנָּפַשׁ con una solución española que preserva su fuerza.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Los hijos de Israel» mantiene la fórmula heredada del hebreo; se ofrece «los israelitas» como alternativa en nota.
  - «Cesó» evita sustituir el matiz léxico por el tradicional «descansó» en el cuerpo principal.
  - La pasiva «fue refrescado» conserva la imagen antropomórfica y la voz del original, aun si suena menos corriente que una activa media en español.
