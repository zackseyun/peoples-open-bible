translation:
  language: es
  text: Dios entregó en su mano a los príncipes de Madián[a], Oreb y Zeeb; ¿y qué pude yo hacer comparado con ustedes? Entonces su espíritu se calmó respecto de él cuando dijo estas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «su enojo contra él se calmó». El hebreo dice literalmente: «su espíritu se relajó de sobre él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיֶדְכֶם
  english_pob_choice: Into your hand
  chosen_spanish: En vuestra mano
  alternatives_spanish:
  - En vuestras manos
  - En vuestro poder
  lexicon: HALOT
  rationale: Conservo la imagen singular de 'mano' como hebraísmo de poder/control, pero en español natural se expresa mejor con la preposición 'en'. Mantengo el plural de segunda persona para corresponder al destinatario colectivo.
- source_word: נָתַן אֱלֹהִים
  english_pob_choice: God gave
  chosen_spanish: entregó Dios
  alternatives_spanish:
  - dio Dios
  - Dios entregó
  lexicon: HALOT
  rationale: '''Entregó'' comunica mejor el valor narrativo de victoria concedida por Dios en este contexto, sin perder la simplicidad del perfecto hebreo. Coloco ''Dios'' después del verbo para reflejar el orden enfático posible del hebreo.'
- source_word: שָׂרֵי מִדְיָן
  english_pob_choice: the princes of Midian
  chosen_spanish: los príncipes de Madián
  alternatives_spanish:
  - los jefes de Madián
  - los líderes de Madián
  lexicon: HALOT
  rationale: '''Príncipes'' conserva el rango elevado de שָׂרִים y coincide con el carácter de los enemigos nombrados. ''Madián'' sigue la forma castellana habitual del topónimo.'
- source_word: עֹרֵב וְאֶת זְאֵב
  english_pob_choice: Oreb and Zeeb
  chosen_spanish: Oreb y Zeeb
  alternatives_spanish:
  - Oreb y Zeeb
  - Oréb y Zeeb
  lexicon: transliteration convention
  rationale: Uso la transliteración asentada en español bíblico para los nombres propios, sin adaptar innecesariamente la ortografía.
- source_word: וּמַה יָּכֹלְתִּי עֲשׂוֹת כָּכֶם
  english_pob_choice: and what was I able to do compared with you?
  chosen_spanish: ¿y qué pude yo hacer comparado con vosotros?
  alternatives_spanish:
  - ¿y qué pude yo hacer como vosotros?
  - ¿y qué habría podido yo hacer frente a vosotros?
  lexicon: HALOT
  rationale: La comparación despectiva del hebreo pide una formulación natural que preserve la deferencia política de Gedeón. 'Comparado con vosotros' reproduce la fuerza comparativa de כָכֶם sin endurecer el sentido.
- source_word: רָפְתָה רוּחָם מֵעָלָיו
  english_pob_choice: their spirit relaxed toward him
  chosen_spanish: su espíritu se aplacó de él
  alternatives_spanish:
  - su enojo se aplacó contra él
  - su espíritu se relajó respecto de él
  lexicon: HALOT
  rationale: Mantengo 'espíritu' para conservar la imagen hebrea, pero 'se aplacó' hace inteligible el efecto idiomático de la frase en español. 'De él' refleja literalmente מֵעָלָיו, conservando la dirección de la hostilidad que se retira de Gedeón.
- source_word: בְּדַבְּרוֹ הַדָּבָר הַזֶּה
  english_pob_choice: when he spoke this word
  chosen_spanish: cuando habló esta palabra
  alternatives_spanish:
  - cuando dijo esta cosa
  - al decir esta palabra
  lexicon: HALOT
  rationale: '''Palabra'' corresponde a דָבָר sin diluir su concreción; ''habló'' respeta el aspecto verbal y mantiene la cadencia narrativa. Evito ''cosa'' porque debilita el paralelismo semítico del original.'
theological_decisions:
- issue: El valor idiomático de רוּחָם en la clausura del verso
  english_pob_reading: their spirit relaxed toward him
  chosen_spanish_reading: su espíritu se aplacó de él
  alternative_spanish_readings:
  - su enojo se aplacó contra él
  - su espíritu se relajó respecto de él
  rationale: El hebreo permite una lectura literal de 'espíritu' y una lectura idiomática de enfriamiento de hostilidad. En español, 'se aplacó' preserva la tensión entre la imagen literal y el sentido pragmático, sin borrar la posibilidad de que se trate de enojo mitigado.
  doctrine_reference: No aplica; cuestión semántica e idiomática del texto narrativo.
translation_notes:
  revision_awareness: Se ajustó la traducción para anclar explícitamente la nota [a] en el texto principal, corrigiendo la omisión señalada por la validación previa. No se introdujeron cambios de contenido fuera de la correspondencia necesaria entre la cláusula final y su alternativa idiomática.
  spanish_consistency_notes:
  - Se mantuvo la segunda persona plural 'vosotros' para corresponder al discurso dirigido a un grupo; si el proyecto prefiere uniformidad con 'ustedes', puede revisarse en bloque en otros versículos.
  - '''Madián'' conserva la transliteración bíblica estándar en español.'
  - No se usó 'SEÑOR' para el nombre divino porque el hebreo aquí dice אֱלֹהִים, no יהוה.
