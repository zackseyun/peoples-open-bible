translation:
  language: es
  text: Y Saúl miró con recelo[a] a David desde aquel día en adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «puso los ojos en David desde aquel día en adelante»; la expresión puede implicar una mirada de envidia o de sospecha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... kept
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce la cláusula de modo narrativo. En español, un conector simple conserva el flujo sin forzar una fórmula arcaica.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Nombre propio bíblico
  rationale: Se adapta a la grafía española habitual del nombre propio, manteniendo identificación clara y lectura natural.
- source_word: עון
  english_pob_choice: eyed
  chosen_spanish: miró con recelo
  alternatives_spanish:
  - miró
  - observó
  - lo estuvo mirando
  lexicon: HALOT
  rationale: El verbo en este contexto no expresa una mirada neutral, sino una atención hostil, envidiosa o suspicaz. 'Miró con recelo' comunica esa carga sin añadir más de lo que el contexto inmediato sostiene.
- source_word: אֶת
  english_pob_choice: 'on'
  alternatives_spanish:
  - —
  lexicon: Marcador de objeto directo
  rationale: No se traduce directamente; la relación objeto-verbo queda expresada en español por la construcción verbal elegida.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español.
- source_word: מֵהַיּוֹם הַהוּא
  english_pob_choice: from that day
  chosen_spanish: desde aquel día
  alternatives_spanish:
  - desde ese día
  - desde aquel día en adelante
  lexicon: HALOT
  rationale: La expresión fija el punto de inicio de una actitud continua. 'Desde aquel día' reproduce bien el valor temporal de arranque.
- source_word: וָהָלְאָה
  english_pob_choice: forward
  chosen_spanish: y en adelante
  alternatives_spanish:
  - en adelante
  - desde entonces
  lexicon: HALOT
  rationale: La adverbial añade continuidad hacia el futuro. 'Y en adelante' preserva esa prolongación temporal de manera natural en español.
translation_notes:
  revision_awareness: La POB inglesa pasó de una paráfrasis más interpretiva ('kept a jealous eye on') a una formulación más directa ('eyed'). La versión española sigue esa revisión evitando añadir explícitamente 'celoso' y manteniendo, sin embargo, la tensión contextual de sospecha o recelo que el verbo sugiere en el relato.
  spanish_consistency_notes:
  - Se conserva el nombre propio Saúl con tilde según uso español.
  - No se usa 'SEÑOR' ni terminología teológica adicional porque el versículo no contiene nombres divinos ni conceptos doctrinales explícitos.
  - La nota alternativa mantiene la ambigüedad semántica documentada por la fuente y el audit trail inglés.
