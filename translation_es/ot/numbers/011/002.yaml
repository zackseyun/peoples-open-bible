review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del hebreo: el pueblo clama a Moisés, Moisés ora a Yahvé, y el fuego cesa. También respeta correctamente יְהוָה como «Yahvé». Sin embargo, el anclaje de la nota al pie está puesto en «clamó», cuando la nota inglesa y la evidencia léxica corresponden a וַתִּשְׁקַע («el fuego died down / subsided»), no a וַיִּצְעַק («clamó»). Además, «se apagó» tiende un poco más a extinción que a abatimiento o disminución.'
  spanish_quality_summary: El español es claro, natural y digno. «Entonces el pueblo clamó a Moisés, y Moisés oró a Yahvé» fluye bien. La mejora principal es mover la nota al lugar correcto y preferir una formulación algo más cercana al matiz de fuego que amaina, como «disminuyó» o «cedió», en vez de «se apagó», que en español puede sugerir apagarse por completo.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יְהוָה, «el pueblo» para הָעָם, «oró» para וַיִּתְפַּלֵּל. El único ajuste léxico importante es וַתִּשְׁקַע, donde conviene una opción española que preserve mejor la idea de que el fuego amainó/subsidió.'
  issues:
  - severity: high
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: La nota explica alternativas para וַתִּשְׁקַע («subsided / sank down»), pero en el borrador aparece en «clamó», que corresponde a וַיִּצְעַק. Esto desalinearía al lector respecto de la evidencia fuente y del audit trail inglés.
  - severity: medium
    issue: «Se apagó» puede sonar más fuerte que el hebreo.
    rationale: שקע con «el fuego» sugiere que el fuego bajó, cedió o disminuyó. «Se apagó» es posible, pero en español suele implicar extinción completa más naturalmente que «disminuyó» o «cedió».
  - severity: low
    issue: El contenido de la nota puede afinarse para reflejar mejor el inglés auditado.
    rationale: La nota inglesa dice «the fire subsided / sank down» y explica que el verbo sugiere abatimiento. En español, «disminuyó» o «cedió» conecta mejor con el texto principal revisado que «se abatió», que suena algo menos natural con «fuego».
  revised_spanish_text: Entonces el pueblo clamó a Moisés, y Moisés oró a Yahvé, y el fuego disminuyó[a].
  revised_footnotes:
  - marker: a
    text: O «el fuego cedió» o «el fuego se hundió». El verbo hebreo sugiere que el fuego amainó o disminuyó.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al verbo hebreo וַתִּשְׁקַע y se ajusta «se apagó» a «disminuyó» para preservar mejor la idea de que el fuego cedió o amainó, no necesariamente que fue extinguido de forma instantánea o total.
