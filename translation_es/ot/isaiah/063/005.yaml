    issue: Marcador de nota [a] reutilizado en dos lugares distintos
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados para notas diferentes dentro del mismo registro. Aquí hay una sola nota [a], pero aparece anclada tanto en «Miré[a]» como en «pasmado[a]», y además la nota solo explica la alternativa de וְאֶשְׁתּוֹמֵם, no la de וְאַבִּיט.
  - severity: medium
    issue: Falta el objeto en «no había quien sostuviera»
    rationale: El hebreo «no había quien apoyara/sostuviera» se entiende en paralelismo con el hablante como objeto implícito. En español, «no había quien me sostuviera» expresa mejor ese sentido y evita una elipsis áspera.
  - severity: low
    issue: Anclaje innecesario de nota en «Miré»
    rationale: La nota [a] no documenta una alternativa de «Miré», sino de «quedé pasmado / quedé asombrado». Debe quedar solo en la palabra pertinente.
