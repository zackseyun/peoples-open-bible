translation:
  language: es
  text: Hay espíritus creados para juicio[a], y en su ira mueven montes; en el tiempo de la ira muestran su poder[b], y levantan una tormenta desde campo abierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vientos creados para castigo'. Tanto רוחות como πνεύματα pueden significar 'vientos' o 'espíritus'.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final aparece entre corchetes en el testimonio hebreo de la Cairo Geniza, señal de cierta incertidumbre textual; el testimonio griego apoya su inclusión.
    reason: textual_variant
lexical_decisions:
- source_word: רוחות / πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - vientos
  lexicon: HALOT; Greek πνεύματα
  rationale: Tanto el hebreo רוחות como el griego πνεύματα pueden referirse a 'vientos' o 'espíritus'. En este contexto, la función asignada —'creados para juicio'— favorece agentes personales o cuasi personales de castigo divino. 'Espíritus' preserva esa fuerza, mientras que la nota mantiene abierta la alternativa meteorológica.
- source_word: למשפט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para justicia
  - para castigo
  lexicon: HALOT
  rationale: '''Juicio'' conserva el sentido amplio del término: una acción evaluativa y punitiva de Dios. Evita estrechar demasiado el alcance a ''castigo'' y mantiene la tensión semántica que el inglés POB también deja abierta.'
- source_word: נוצרו / ἔκτισται
  english_pob_choice: created
  chosen_spanish: creados
  alternatives_spanish:
  - formados
  lexicon: HALOT; Greek ἔκτισται
  rationale: '''Creados'' refleja con naturalidad tanto el hebreo pasivo como el griego ''han sido creados''. Es claro en español moderno y conserva la agencia divina implícita.'
- source_word: ובאפם / ἐν θυμῷ αὐτῶν
  english_pob_choice: in their anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su furia
  - con su enojo
  lexicon: HALOT; Greek θυμός
  rationale: El hebreo idiomático 'en su nariz' / 'en su ira' y el griego θυμός convergen en el campo de 'ira/furia'. 'Ira' es la opción más sobria y bíblicamente reconocible en español.
- source_word: הרים יעתיקו
  english_pob_choice: they move mountains
  chosen_spanish: hacen temblar montes
  alternatives_spanish:
  - mueven montes
  - desplazan montes
  lexicon: HALOT
  rationale: El hebreo sugiere desarraigar, mover o desplazar montes; el inglés POB eligió una expresión idiomática para esa fuerza. En español, 'hacen temblar montes' comunica el impacto devastador sin sonar demasiado literal o artificial, y conserva la imagen de poder desmedido.
- source_word: בעת זעם / ἐν καιρῷ συντελείας
  english_pob_choice: at the time of wrath
  chosen_spanish: en el tiempo de la furia
  alternatives_spanish:
  - en el tiempo de la ira
  - al tiempo del juicio
  lexicon: HALOT; Greek συντέλεια
  rationale: La tradición hebrea habla de 'tiempo de furia', y el griego añade el marco de 'consumación/final'. Dado que el inglés POB optó por 'time of wrath' y el contexto inmediato enfatiza la manifestación del poder, 'tiempo de la furia' mantiene el tono escatológico y punitivo sin introducir más de lo que el texto exige.
- source_word: גבורתם יראו / ἰσχὺν ἐκχεοῦσιν
  english_pob_choice: they display their might
  chosen_spanish: muestran su poder
  alternatives_spanish:
  - despliegan su fuerza
  - hacen ver su poder
  lexicon: HALOT; Greek ἰσχύς
  rationale: El hebreo y el griego coinciden en la manifestación de fuerza/poder. 'Muestran su poder' es natural en español y conserva la idea de una fuerza hecha visible o efectiva.
- source_word: וסער מן שדה יעוררו / τὸν θυμὸν... κοπάσουσιν
  english_pob_choice: they stir up a storm from the open country
  chosen_spanish: provocan una tormenta desde el campo abierto
  alternatives_spanish:
  - levantan una tormenta desde el campo abierto
  - desatan una tempestad desde el campo abierto
  lexicon: HALOT; Greek κοπάσουσιν
  rationale: '''Tormenta'' captura סער y ''desde el campo abierto'' refleja fielmente שדה, siguiendo la revisión del inglés POB que prefirió ''open country'' a ''wasteland''. La expresión mantiene el movimiento de la imagen sin forzar un español arcaizante.'
theological_decisions:
- issue: Si רוחות / πνεύματα debe leerse como seres personales o como vientos meteorológicos
  english_pob_reading: personalized 'spirits' created for judgment, with a footnote retaining the wind alternative
  chosen_spanish_reading: espíritus creados para juicio, con nota que conserva 'vientos'
  alternative_spanish_readings:
  - vientos creados para castigo
  - vientos creados para juicio
  rationale: La frase 'creados para juicio' favorece agentes con función divina, no solo fenómenos atmosféricos. Por eso el texto principal usa 'espíritus', pero la nota conserva la ambigüedad léxica porque tanto el hebreo como el griego la permiten.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Cómo tratar el material hebreo entre corchetes y su apoyo griego
  english_pob_reading: include the fuller second colon in the main translation with a note about textual uncertainty
  chosen_spanish_reading: incluir el segundo colon en el texto principal y señalar la incertidumbre textual
  alternative_spanish_readings:
  - omitir el segundo colon por ser secundario
  - dejarlo solo en nota
  rationale: La testificación hebrea marcada y el paralelo griego permiten incluir la cláusula, pero sin ocultar que el hebreo la presenta con incertidumbre. La transparencia editorial exige dejar visible esa tensión textual.
  doctrine_reference: PHILOSOPHY.md transparency principle
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó the rendering of שדה from 'wasteland' to 'open country'. Por eso el español usa 'campo abierto' en la cláusula final. También se preservó la decisión principal de mantener 'spirits'/'espíritus' como lectura preferente, dejando la alternativa meteorológica en nota.
  spanish_consistency_notes:
  - Se mantiene 'juicio' para למשפט, evitando alternar con 'castigo' en el cuerpo principal.
  - '''Ira'' y ''furia'' se distinguen solo por la variación estilística del texto, no por un cambio doctrinal.'
  - '''Poder'' y ''fuerza'' quedan como equivalentes funcionales; el texto principal usa ''poder'' por naturalidad en español.'
  - '''Campo abierto'' conserva el valor de שדה según la revisión auditada y evita ''yermo'' o ''desierto'', que estrecharían indebidamente la imagen.'
