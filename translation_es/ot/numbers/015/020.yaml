source:
  edition: WLC
  text: רֵאשִׁית֙ עֲרִסֹ֣תֵ/כֶ֔ם חַלָּ֖ה תָּרִ֣ימוּ תְרוּמָ֑ה כִּ/תְרוּמַ֣ת גֹּ֔רֶן כֵּ֖ן תָּרִ֥ימוּ אֹתָֽ/הּ׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/020.yaml
  text: From the first of your dough you shall lift up a loaf as a contribution[a]; like the contribution of the threshing floor[b], so you shall lift it up.
  footnotes:
  - marker: a
    text: Or 'the first part of your kneading dough'; the Hebrew term may refer to dough itself or, by extension, the kneading bowl/trough.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'heave offering.' The Hebrew term denotes a contribution set apart and presented.
    reason: lexical_alternative
