translation:
  language: es
  text: A Obed-edom, el sur; y a sus hijos, la casa de los almacenes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa de los depósitos» o «la casa de las colecciones». El hebreo se refiere a un área de almacenamiento o a repositorios.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֹבֵד אֱדֹם
  english_pob_choice: To Obed-edom
  chosen_spanish: A Obed-edom
  alternatives_spanish:
  - Para Obed-edom
  lexicon: HALOT
  rationale: El ל prefijado marca asignación en el reparto de funciones; en español, «a» comunica naturalmente el destinatario de la asignación. Mantiene el valor distributivo sin forzar una preposición menos idiomática.
- source_word: נֶגְבָּה
  english_pob_choice: the south
  chosen_spanish: el sur
  alternatives_spanish:
  - hacia el sur
  - al sur
  - la parte sur
  lexicon: HALOT
  rationale: El término direccional señala el lado sur asignado. «El sur» conserva la concisión del hebreo y corresponde al valor topográfico del contexto.
- source_word: וּלְבָנָיו
  english_pob_choice: and to his sons
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y para sus hijos
  lexicon: HALOT
  rationale: בנים se refiere aquí a los hijos de Obed-edom como receptores de otra porción asignada. «Hijos» respeta el género y el valor familiar del hebreo.
- source_word: בֵּית הָאֲסֻפִּים
  english_pob_choice: the house of stores
  chosen_spanish: la casa de los depósitos
  alternatives_spanish:
  - la casa de los almacenes
  - la casa de las provisiones
  - la casa de los almacenajes
  lexicon: HALOT
  rationale: La construcción en estado constructo se mantiene con «casa de». Para הָאֲסֻפִּים, el campo semántico apunta a cosas reunidas/almacenadas; «depósitos» comunica la idea de almacenamiento sin sobreespecificar «almacenes» como si fuera necesariamente un edificio distinto del expresado por בית.
translation_notes:
  revision_awareness: El inglés POB entiende לְעֹבֵד אֱדֹם como fórmula de asignación («To Obed-edom»), נֶגְבָּה como dirección meridional y הָאֲסֻפִּים como un término de almacenamiento. No hubo revisiones posteriores; se conservó la misma lectura con ajuste natural al español.
  spanish_consistency_notes:
  - Se conserva «Obed-edom» como nombre propio sin adaptar la grafía.
  - «A» rinde mejor el dativo/beneficiario de la distribución que una traducción literal «para» en esta fórmula breve.
  - «Casa de los depósitos» mantiene la imagen de un lugar destinado a reunir y guardar, en línea con el valor lexical documentado.
