    text: 'Hebreo: ‘comieron pan’, un modismo para compartir una comida.'
    reason: lexical_alternative
  - marker: b
    text: O ‘de descendencia real’ para ‘de linaje real’.
    reason: lexical_alternative
  - marker: c
    text: O ‘uno de los nobles del rey’ para ‘uno de los altos oficiales del rey’.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] para que ancle correctamente la expresión ‘pan’, que es la frase explicada por la nota. También se mejoró la fluidez quitando la coma antes de ‘en Mizpa’ al final, mientras se conserva la repetición del topónimo presente en el hebreo.
