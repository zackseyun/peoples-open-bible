translation:
  language: es
  text: Ahora, Tatanai, gobernador de Más Allá del Río[b], Setar-Boznai, y tus asociados, los funcionarios que están más allá del Río[c], manténganse lejos de allí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «estén lejos de allí».
    reason: lexical_alternative
  - marker: b
    text: «Más Allá del Río» es el nombre administrativo persa para la región al oeste del Éufrates.
    reason: cultural_note
  - marker: c
    text: El término traducido como «funcionarios» también puede transliterarse como «Apharsachitas».
    reason: alternative_reading
lexical_decisions:
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Entonces
  - Ahora pues
  lexicon: HALOT
  rationale: El marcador discursivo arameo introduce la orden real con transición inmediata. «Ahora» conserva esa función sin sobrerinterpretar una inferencia lógica más fuerte.
- source_word: תַּתְּנַי
  english_pob_choice: Tattenai
  chosen_spanish: Tatanai
  alternatives_spanish:
  - Tattenai
  lexicon: Transliteración propia del nombre
  rationale: Se translitera el nombre propio al español con ortografía natural y reconocible, manteniendo fidelidad fonética y legibilidad.
- source_word: פַּחַת עֲבַר נַהֲרָה
  english_pob_choice: governor of Beyond the River
  chosen_spanish: gobernador de Más Allá del Río
  alternatives_spanish:
  - gobernador de más allá del Río
  - gobernador de Trans-Eufrates
  - gobernador del territorio Más Allá del Río
  lexicon: HALOT
  rationale: פַּחַת expresa un cargo administrativo; «gobernador» refleja bien la función. Para עֲבַר נַהֲרָה, se conserva el nombre provincial persa como «Más Allá del Río», que en español comunica la designación oficial sin ocultarla tras una paráfrasis geográfica.
- source_word: שְׁתַר בּוֹזְנַי
  english_pob_choice: Shethar-bozenai
  chosen_spanish: Setar-Boznai
  alternatives_spanish:
  - Shetar-Boznai
  - Shetar-bozenai
  lexicon: Transliteración propia del nombre
  rationale: Nombre propio compuesto transliterado de modo claro y consistente para español.
- source_word: וּכְנָוָתְהוֹן
  english_pob_choice: and your associates
  chosen_spanish: y sus asociados
  alternatives_spanish:
  - y sus compañeros
  - y sus asociados de ustedes
  - y sus colegas
  lexicon: HALOT
  rationale: El término indica compañeros/asociados. Aunque el sufijo es de segunda persona plural, en español la coordinación con la lista de destinatarios hace natural «sus asociados»; se evita una construcción forzada que sonaría menos idiomática.
- source_word: אֲפַרְסְכָיֵא
  english_pob_choice: the officials who are beyond the River
  chosen_spanish: los funcionarios que están más allá del Río
  alternatives_spanish:
  - los Apharsachitas que están más allá del Río
  - los oficiales que están más allá del Río
  lexicon: HALOT
  rationale: La POB inglesa decidió el sentido administrativo en vez de la mera transliteración. En español, «funcionarios» comunica mejor ese valor institucional; se preserva en nota la posibilidad transliterada porque el término puede aludir también a una designación étnico-administrativa.
- source_word: דִּי בַּעֲבַר נַהֲרָה
  english_pob_choice: who are beyond the River
  chosen_spanish: que están más allá del Río
  alternatives_spanish:
  - que están en Más Allá del Río
  - que son de Más Allá del Río
  lexicon: HALOT
  rationale: La cláusula relativa identifica a esos funcionarios por ubicación dentro del distrito imperial. Se conserva el sentido locativo del título provincial con una redacción natural en español.
- source_word: רַחִיקִין הֲוֹו מִן תַּמָּה
  english_pob_choice: keep far away from there
  chosen_spanish: aléjense de allí
  alternatives_spanish:
  - manténganse lejos de allí
  - estén lejos de allí
  - apártense de allí
  lexicon: HALOT
  rationale: El arameo tiene fuerza imperativa/prohibitiva. «Aléjense de allí» transmite la orden con naturalidad en español; la POB inglesa señaló que el sentido literal es «ser/estar lejos de allí», pero la función pragmática es una prohibición oficial.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «of the province» y «of Persia» por no estar sustentados aquí, y simplificó la cláusula relativa a una formulación más natural. La redacción española sigue esa revisión: conserva el título administrativo «Más Allá del Río» sin añadir «provincia» ni «Persia», y mantiene la orden final breve y directa.'
  spanish_consistency_notes:
  - Se usa «Río» con mayúscula en «Más Allá del Río» para reproducir el título provincial fijo y su función administrativa.
  - Se prefirió «funcionarios» por el matiz de cargo oficial, evitando un término eclesiástico o más genérico que diluya el contexto persa.
  - La transliteración de nombres propios se adaptó a ortografía española sin alterar su identidad reconocible.
  - No se añadió ninguna glosa doctrinal porque el versículo es puramente administrativo y de mandato.
