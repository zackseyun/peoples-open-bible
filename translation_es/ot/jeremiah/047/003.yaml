translation:
  language: es
  text: Al sonido del golpear de los cascos de sus caballos poderosos[a], al retumbar de sus carros, al estruendo de sus ruedas, los padres no se vuelven hacia sus hijos a causa del desvalimiento de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por la flaqueza/debilidad de las manos», un modismo para la debilidad o el desvalimiento producidos por el pánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al sonido de
  alternatives_spanish:
  - Por el sonido de
  - A causa del sonido de
  lexicon: HALOT
  rationale: La preposición hebrea con קוֹל puede marcar fuente o causa. En español, «Al sonido de» conserva el desencadenante auditivo sin volver la frase pesada o demasiado explicativa.
- source_word: שַׁעֲטַת
  english_pob_choice: the stamping
  chosen_spanish: el golpear
  alternatives_spanish:
  - el galope
  - el correr
  lexicon: HALOT
  rationale: El sustantivo expresa el ruido/impulso de las patas. «Golpear» mantiene el impacto sonoro en español y se ajusta al encadenamiento de imágenes auditivas del verso.
- source_word: פַּרְסוֹת
  english_pob_choice: the hooves
  chosen_spanish: los cascos
  alternatives_spanish:
  - los cascos de los caballos
  - las pezuñas
  lexicon: HALOT
  rationale: Aunque el hebreo nombra literalmente las pezuñas/cascos, en español «cascos» es el término natural para caballos y evita una traducción zoológicamente extraña.
- source_word: אַבִּירָיו
  english_pob_choice: his mighty horses
  chosen_spanish: sus caballos poderosos
  alternatives_spanish:
  - sus caballos fuertes
  - sus corceles poderosos
  lexicon: HALOT
  rationale: אַבִּיר puede referirse a «poderoso» y, en contexto militar-poético, a caballos de guerra. «Caballos poderosos» mantiene el referente explícito y el tono épico sin forzar un arcaísmo.
- source_word: מֵרַעַשׁ
  english_pob_choice: at the rumbling of
  chosen_spanish: al retumbar de
  alternatives_spanish:
  - por el ruido de
  - al estrépito de
  lexicon: HALOT
  rationale: רַעַשׁ denota ruido fuerte, sacudida o retumbo. «Retumbar» comunica bien la pesadez de los carros en movimiento y se corresponde con el paralelo sonoro del verso.
- source_word: לְרִכְבּוֹ
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - su carro
  - sus carros de guerra
  lexicon: HALOT
  rationale: 'Aunque la forma es singular con sufijo, el sentido colectivo en este contexto bélico se expresa naturalmente en plural en español: «sus carros».'
- source_word: הֲמוֹן
  english_pob_choice: the roar
  chosen_spanish: el estruendo
  alternatives_spanish:
  - el tumulto
  - el clamor
  lexicon: HALOT
  rationale: הֲמוֹן puede indicar tumulto, multitud sonora o gran estrépito. «Estruendo» reproduce bien la fuerza auditiva del movimiento de las ruedas.
- source_word: גַּלְגִּלָּיו
  english_pob_choice: his wheels
  chosen_spanish: sus ruedas
  alternatives_spanish:
  - sus ruedas giratorias
  - el rodar de sus ruedas
  lexicon: HALOT
  rationale: El término se refiere de manera directa a las ruedas del carro. «Ruedas» es la correspondencia más clara y fiel en español.
- source_word: לֹא הִפְנוּ
  english_pob_choice: do not turn
  chosen_spanish: no vuelven hacia
  alternatives_spanish:
  - no se vuelven hacia
  - no se vuelven a
  lexicon: HALOT
  rationale: El verbo significa girar o volverse hacia. «No vuelven hacia» preserva el movimiento direccional implícito y resulta idiomático en español.
- source_word: אָבוֹת אֶל בָּנִים
  english_pob_choice: fathers ... to their sons
  chosen_spanish: los padres ... hacia sus hijos
  alternatives_spanish:
  - los padres ... hacia sus hijos varones
  - los padres ... a sus hijos
  lexicon: HALOT
  rationale: El hebreo usa términos masculinos específicos, pero en español «padres ... hijos» comunica el mismo vínculo familiar con mayor naturalidad. No se neutraliza el parentesco, pero sí se evita una rigidez innecesaria en la línea poética.
- source_word: מֵרִפְיוֹן יָדָיִם
  english_pob_choice: because of the helplessness of their hands
  chosen_spanish: a causa de la debilidad de sus manos
  alternatives_spanish:
  - por la flaqueza de sus manos
  - a causa del desfallecimiento de sus manos
  lexicon: HALOT
  rationale: La expresión idiomática alude a manos flojas/débiles, es decir, pérdida de fuerza o de ánimo por el pánico. «Debilidad de sus manos» conserva la imagen corporal y la hace inteligible sin exagerar la interpretación.
theological_decisions:
- issue: Kinship terms are masculine in Hebrew
  english_pob_reading: fathers ... sons
  chosen_spanish_reading: los padres ... hacia sus hijos
  alternative_spanish_readings:
  - los padres ... hacia sus hijos varones
  - los padres ... hacia sus muchachos
  rationale: 'El hebreo dice específicamente «padres» y «hijos». En español, «hijos» puede ser genérico pero aquí mantiene la relación familiar sin forzar un masculino exclusivo que suene artificial en la línea poética. No altera la imagen central: el terror desordena incluso el vínculo paterno.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Idiomatic expression for panic-induced weakness
  english_pob_reading: because of the helplessness of their hands
  chosen_spanish_reading: a causa de la debilidad de sus manos
  alternative_spanish_readings:
  - por la debilidad de sus manos
  - por la flaqueza de sus manos
  rationale: La frase hebrea literalmente habla de manos flojas o debilitadas. La versión española conserva el cuerpo como imagen y comunica el efecto de pánico sin diluir la fuerza idiomática del original.
  doctrine_reference: Lexical policy on idioms / source transparency
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión menor que añadió la repetición de «at» antes de «the roar of his wheels» para reflejar el paralelismo del hebreo. La línea española conserva ese paralelismo con tres miembros introducidos por «Al / al / al», y mantiene el valor idiomático de la expresión final sin ocultar su sentido literal mediante la nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» no requerido en este versículo porque el texto no contiene el nombre divino.
  - Se preservó el campo semántico auditivo con «sonido», «retumbar» y «estruendo» para reflejar la acumulación del hebreo.
  - Se mantuvo la secuencia de movimientos sonoros con paralelismo ternario para corresponder a la estructura del verso.
  - Se eligió «hijos» como término natural en español, aunque el hebreo sea masculino específico; la nota de decisión explica la cuestión de género.
