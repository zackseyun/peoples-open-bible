translation:
  language: es
  text: 'Hijo del hombre[a], habla a los ancianos de Israel y diles: Así dice el Señor Yahvé: ¿Es para consultarme que ustedes han venido? Vivo yo, no seré consultado por ustedes[b], declara el Señor Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ser humano» o «mortal». El hebreo בֶּן־אָדָם conserva un giro idiomático de dirección profética.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «si soy consultado por ustedes»; la partícula de juramento expresa aquí una negación enfática: «no seré consultado por ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo usado en Ezequiel y mantiene la forma representativa singular sin reducirla a una mera explicación dinámica.
- source_word: דַּבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - dirige la palabra
  - comunica
  lexicon: HALOT
  rationale: Imperativo directo y natural en español; refleja el mandato de hablar a los ancianos sin añadir matiz no presente en el hebreo.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los ancianos israelitas
  - los ancianos de Israel
  lexicon: HALOT
  rationale: “Ancianos” es el equivalente normal para זִקְנֵי y conserva el grupo de liderazgo reconocido de Israel.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Yavé
  - Así dice el Señor Yahweh
  lexicon: HALOT
  rationale: כֹּה אָמַר se rinde con la fórmula profética “Así dice”. YHWH se traduce como “Yahvé” conforme al criterio del proyecto, y אֲדֹנָי se conserva como “Señor” para mantener el doble título divino.
- source_word: הֲלִדְרֹשׁ אֹתִי
  english_pob_choice: Is it to inquire of me
  chosen_spanish: ¿Es para consultarme
  alternatives_spanish:
  - ¿Es para inquirir de mí
  - ¿Es para buscarme
  lexicon: HALOT
  rationale: En este contexto דָּרַשׁ expresa consultar un oráculo o pedir dirección divina; “consultarme” comunica mejor esa fuerza en español que un simple “buscarme”.
- source_word: בָּאִים
  english_pob_choice: you have come
  chosen_spanish: habéis venido
  alternatives_spanish:
  - habéis llegado
  - venís
  lexicon: HALOT
  rationale: Aunque formalmente es participio, en esta pregunta de propósito se entiende naturalmente como acción de llegada ya cumplida.
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Por mi vida
  - Mientras yo vivo
  lexicon: HALOT
  rationale: Mantiene la fórmula de juramento divina con un giro español solemne y transparente.
- source_word: אִם אִדָּרֵשׁ לָכֶם
  english_pob_choice: I will not be inquired of by you
  chosen_spanish: no seré consultado por vosotros
  alternatives_spanish:
  - no permitiré que me consultéis
  - no os responderé
  lexicon: HALOT
  rationale: La secuencia de juramento con אִם funciona como negación enfática; “consultado” conserva el vínculo léxico con דרשׁ y su sentido oracular.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - afirma el Señor Yahvé
  lexicon: HALOT
  rationale: נְאֻם introduce una declaración profética solemne; “declara” es idiomático y fiel a la fuerza enunciativa.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Yavé
  - Señor Yahweh
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como “Yahvé” en el texto principal, evitando el ocultamiento del nombre divino. אֲדֹנָי permanece como “Señor”, de modo que el título compuesto no se aplana.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la construcción de juramento חַי אָנִי ... אִם
  english_pob_reading: As I live, I will not be inquired of by you
  chosen_spanish_reading: Vivo yo, no seré consultado por vosotros
  alternative_spanish_readings:
  - Mientras yo vivo, no seré consultado por vosotros
  - Por mi vida, no seré consultado por vosotros
  rationale: El hebreo usa un juramento que funciona como negación enfática; la traducción directa al español debe expresar con claridad la negativa divina sin conservar una forma condicional ambigua.
  doctrine_reference: Hebrew oath formula in Ezekiel 20:3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: conserva la fórmula profética, el valor oracular de דרשׁ, y la negación enfática del juramento. No se introdujeron revisiones adicionales respecto del texto fuente ni cambios textuales señalados en el expediente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al criterio del proyecto, manteniendo «Señor» para אֲדֹנָי.
  - «Consultar» se eligió para דרשׁ por su matiz oracular; se evitó «buscar» para no diluir el sentido.
  - «Hijo de hombre» conserva la fórmula profética tradicional sin convertirla en paráfrasis interpretativa.
  - La segunda cláusula refleja la negación enfática hebrea con español natural y solemne.
