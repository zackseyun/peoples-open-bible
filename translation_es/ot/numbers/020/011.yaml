translation:
  language: es
  text: Entonces Moisés levantó su mano y golpeó la roca con su vara dos veces, y salió mucha agua, y la congregación bebió, junto con su ganado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּרֶם
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - levantó en alto
  lexicon: HALOT
  rationale: רוּם en este contexto expresa el acto físico de alzar la mano. «Levantó» es natural en español y conserva la imagen sin añadir matices no presentes en el hebreo.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina singular se expresa de forma directa y natural en español con «su mano».
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  lexicon: HALOT
  rationale: נכה puede significar golpear o herir. Aquí el contexto narrativo pide el acto físico sobre la roca; «golpeó» es claro y digno en español, sin la arcaización de «hirió» ni la informalidad de «pegó».
- source_word: הַסֶּלַע
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - la peña
  - el peñasco
  lexicon: HALOT
  rationale: סֶלַע designa una roca/peñasco. «La roca» es la forma más natural y fiel para el objeto que Moisés golpea.
- source_word: בְּמַטֵּהוּ
  english_pob_choice: with his staff
  chosen_spanish: con su vara
  alternatives_spanish:
  - con su bastón
  - con su cayado
  lexicon: HALOT
  rationale: מַטֶּה puede ser «vara» o «bastón/cayado». Dado el uso narrativo de un instrumento de autoridad en Moisés, «vara» reproduce bien la fuerza lexical y evita reducirlo a un simple bastón.
- source_word: פַּעֲמָיִם
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - por dos veces
  lexicon: HALOT
  rationale: El valor dual se expresa de manera idiomática en español con «dos veces».
- source_word: וַיֵּצְאוּ מַיִם רַבִּים
  english_pob_choice: abundant water came out
  chosen_spanish: salió mucha agua
  alternatives_spanish:
  - salieron aguas abundantes
  - brotó mucha agua
  lexicon: HALOT
  rationale: מַיִם רַבִּים comunica abundancia. «Salió mucha agua» conserva la sencillez narrativa y la cantidad sin sobrecargar el estilo.
- source_word: וַתֵּשְׁתְּ
  english_pob_choice: drank
  chosen_spanish: bebió
  alternatives_spanish:
  - tomó
  - bebieron
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa singular femenino por concordancia con עֵדָה, el español permite mantener el sujeto colectivo «la congregación» con verbo en singular narrativo: «bebió». Esto preserva la estructura colectiva del original.'
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la comunidad
  - la asamblea
  lexicon: HALOT
  rationale: עֵדָה suele referirse al pueblo reunido de Israel. «La congregación» mantiene el uso pentateucal y la referencia colectiva.
- source_word: וּבְעִירָם
  english_pob_choice: along with their livestock
  chosen_spanish: junto con su ganado
  alternatives_spanish:
  - y su ganado
  - junto con sus animales
  lexicon: HALOT
  rationale: בְּעִירָם alude a los animales domésticos/livestock del grupo. «Ganado» es breve, natural y suficientemente amplio en español bíblico; «junto con» refleja bien el valor inclusivo del hebreo.
theological_decisions:
- issue: Descripción de la acción de Moisés sin añadir comentario interpretativo
  english_pob_reading: Retain the plain historical description 'struck the rock with his staff twice' without importing interpretive judgment into the verse itself.
  chosen_spanish_reading: 'Mantener la narración simple: «golpeó la roca con su vara dos veces», sin insertar en el versículo una evaluación teológica implícita.'
  alternative_spanish_readings:
  - «desobedeció al golpear la roca»
  - «hirió la roca en rebeldía»
  rationale: El hebreo del versículo narra el hecho y su resultado. La evaluación de la conducta de Moisés pertenece al contexto mayor, no a esta línea aislada; por eso la traducción no debe cargarla de juicio interpretativo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue de cerca el sentido del texto hebreo masorético y el expediente auditado en inglés. No se introdujeron notas de variante textual ni alternativas doctrinales porque el versículo presenta una lectura estable y directa, sin divergencias relevantes en el paquete de fuente proporcionado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se prefirió «vara» para מַטֶּה por coherencia con el uso mosaico y por ser más fiel al registro bíblico que «bastón».
  - «Congregación» conserva la terminología pentateucal estándar del proyecto.
  - No se añadieron corchetes de nota porque no había una alternativa que requiriera anclaje en el texto.
