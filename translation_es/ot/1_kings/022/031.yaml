translation:
  language: es
  text: 'Ahora bien, el rey de Aram había ordenado a los treinta y dos comandantes[a] de carros que eran suyos, diciendo: «No peleen ni con pequeños ni con grandes, sino solo con el rey de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capitanes». El hebreo שָׂרֵי הָרֶכֶב designa jefes militares vinculados a los carros; «comandantes» conserva bien ese valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ אֲרָם
  english_pob_choice: Now the king of Aram
  chosen_spanish: Ahora el rey de Aram
  alternatives_spanish:
  - Y el rey de Aram
  - Entonces el rey de Aram
  lexicon: HALOT
  rationale: Se conserva el nombre propio semítico «Aram» por la primacía de la fuente original; «Ahora» funciona como marcador narrativo natural para anteceder el trasfondo de la acción sin añadir contenido sustancial.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había ordenado
  alternatives_spanish:
  - había mandado
  - mandó
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien la acción previa al episodio inmediato. «Ordenado» mantiene el valor de comando formal del verbo hebreo sin sonar excesivamente rígido.
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the thirty-two chariot commanders
  chosen_spanish: los treinta y dos comandantes de los carros
  alternatives_spanish:
  - los treinta y dos capitanes de los carros
  - los treinta y dos oficiales de los carros
  - los treinta y dos comandantes de carro
  lexicon: HALOT
  rationale: שָׂרִים denota jefes/mandos militares; «comandantes» es una solución clara y digna. «De los carros» conserva la referencia al cuerpo de carros sin forzar una expresión ajena al español.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: who belonged to him
  chosen_spanish: que eran suyos
  alternatives_spanish:
  - que le pertenecían
  - bajo su mando
  lexicon: HALOT
  rationale: La cláusula expresa pertenencia o asociación; «que eran suyos» mantiene esa relación sin convertirla en una explicación jerárquica que el hebreo no explicita.
- source_word: לֹא תִּלָּחֲמוּ
  english_pob_choice: Do not fight
  chosen_spanish: No peleen
  alternatives_spanish:
  - No luchen
  - No hagan guerra
  lexicon: HALOT
  rationale: La forma directa de prohibición en español se expresa de manera natural con «No peleen». «Luchen» puede sonar menos concreto para contexto militar; «hagan guerra» sería demasiado idiomático en este verso.
- source_word: אֶת קָטֹן וְאֶת גָּדוֹל
  english_pob_choice: with either small or great
  chosen_spanish: con ni pequeños ni grandes
  alternatives_spanish:
  - con pequeños o grandes
  - contra pequeños o grandes
  - con cualquiera, pequeño o grande
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de contraste de rango/status. En español, la construcción negativa «con ni pequeños ni grandes» comunica la exclusión de personas de cualquier condición, aunque suene algo marcada; por eso se mantiene la tensión idiomática en vez de sustituirla por una paráfrasis plenamente explicativa.
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - excepto solo
  - pero solo
  lexicon: HALOT
  rationale: «Sino solo» transmite la exclusión enfática y el contraste adversativo del hebreo, respetando la estructura de la prohibición precedente.
- source_word: אֶת מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: with the king of Israel
  chosen_spanish: con el rey de Israel
  alternatives_spanish:
  - contra el rey de Israel
  lexicon: HALOT
  rationale: Se conserva la preposición «con» para reflejar la construcción hebrea y la decisión auditada del POB inglés, donde la naturalidad de «fight with» se prefiere a una aclaración excesiva; el contexto militar deja claro el valor adversarial.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: él solo
  alternatives_spanish:
  - solamente él
  - solo
  lexicon: HALOT
  rationale: «Él solo» explicita la exclusividad personal del objetivo y suena natural en español, conservando el énfasis de aislamiento del rey de Israel.
translation_notes:
  revision_awareness: 'El inglés POB mantuvo la construcción literal de combate con «with» para conservar la preposición hebrea y luego ajustó una formulación más ambigua a favor de la naturalidad. En español seguí esa misma línea: conservé la relación sintáctica del original, pero la expresé con una frase militar idiomática y clara. También mantuve el nombre «Aram» según la política original-language primacy y reflejé la exclusividad final con una repetición enfática («él solo») que corresponde al cierre hebreo.'
  spanish_consistency_notes:
  - Se usa «Aram» y no «Siria» para mantener la transliteración del topónimo original.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Comandantes» mantiene coherencia con el valor militar de שָׂרֵי.
  - La estructura «No peleen... sino solo...» preserva la lógica prohibitiva del hebreo sin convertir el verso en una paráfrasis.
  - «Él solo» refuerza la exclusividad de לְבַדּוֹ sin añadir interpretación doctrinal.
