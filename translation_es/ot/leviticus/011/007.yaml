revisions:
- from: Y el cerdo[a], porque tiene pezuña partida y hendida la pezuña, pero no rumia[b], es impuro para ustedes.
  to: Y el cerdo[a], porque tiene pezuña partida y la pezuña está hendida, pero no rumia[b], es impuro para ustedes.
  rationale: Se revisa únicamente para reparar una construcción española poco natural en la segunda descripción de la pezuña y para pulir la nota literal sobre 'rumiar'. El resto del versículo preserva adecuadamente el sentido fuente y las decisiones léxicas auditadas.
