translation:
  language: es
  text: Bienaventurado el que fue resguardado de ella[a], el que no pasó por su furor, el que no tiró de su yugo, y el que no fue atado en sus cadenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa pronombres femeninos en todo el versículo, en referencia a la lengua destructiva del contexto anterior; se conserva 'ella' para reflejar esa personificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: BDAG
  rationale: Conserva el tono sapiencial y de bienaventuranza sin reducirlo a un estado emocional subjetivo.
- source_word: σκεπασθεὶς
  english_pob_choice: sheltered
  chosen_spanish: fue resguardado
  alternatives_spanish:
  - fue cubierto
  - fue protegido
  - fue guardado
  lexicon: BDAG
  rationale: El participio pasivo expresa haber sido puesto a salvo de un peligro; 'resguardado' suena natural en español y preserva la imagen de protección.
- source_word: ἀπʼ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ello
  - de él
  lexicon: BDAG
  rationale: El griego usa pronombres femeninos concordando con el antecedente femenino del contexto; en español se mantiene 'ella' para conservar el enlace referencial y la personificación.
- source_word: διῆλθεν
  english_pob_choice: has not passed through
  chosen_spanish: no pasó por
  alternatives_spanish:
  - no atravesó
  - no entró en
  - no fue por
  lexicon: BDAG
  rationale: La idea es atravesar o sufrir una experiencia; 'pasó por' transmite bien esa imagen sin volverla abstracta.
- source_word: θυμῷ
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - enojo
  - rabia
  lexicon: BDAG
  rationale: En este contexto de daño destructivo, 'furor' comunica mejor la intensidad del término que 'enojo'; evita suavizar la fuerza del griego.
- source_word: εἵλκυσεν
  english_pob_choice: has not drawn
  chosen_spanish: no arrastró
  alternatives_spanish:
  - no tiró de
  - no llevó
  - no tomó
  lexicon: BDAG
  rationale: Aunque literalmente significa 'tirar de/arrastrar', en esta cadena metafórica 'arrastró su yugo' reproduce con claridad la imagen de asumir una esclavitud opresiva.
- source_word: ζυγὸν
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  - opresión
  lexicon: BDAG
  rationale: Se mantiene el símbolo literal y metafórico de sujeción; 'yugo' es la equivalencia directa y más transparente.
- source_word: δεσμοῖς
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - grilletes
  - ataduras
  lexicon: BDAG
  rationale: '''Cadenas'' conserva la imagen concreta de cautiverio y funciona bien con ''yugo'' en español.'
- source_word: ἐδέθη
  english_pob_choice: has not been bound
  chosen_spanish: no fue atado
  alternatives_spanish:
  - no fue encadenado
  - no quedó sujeto
  - no fue aprisionado
  lexicon: BDAG
  rationale: El pasivo conserva la idea de quedar sometido por fuerza externa; 'atado' empareja naturalmente con 'cadenas' y evita introducir una imagen distinta.
theological_decisions:
- issue: Referente femenino de los pronombres
  english_pob_reading: The pronouns refer to the destructive tongue/slanderous speech personified in the immediate context, rendered with English impersonal pronouns.
  chosen_spanish_reading: Se mantiene la personificación femenina con 'ella' para no borrar la referencia gramatical del griego.
  alternative_spanish_readings:
  - de ello / sus cadenas
  - de él
  rationale: El griego usa femenino por el antecedente del contexto; el español puede conservar esa tensión y así dejar visible la personificación de la lengua destructiva.
  doctrine_reference: 'Principio POB: preservar tensiones textuales y personificación del original cuando son audibles en español.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del texto griego con el audit trail inglés y conserva la personificación femenina del antecedente, a la vez que adapta 'sheltered', 'wrath' y la secuencia de imágenes ('yoke', 'chains', 'bound') a un español natural y publicable.
  spanish_consistency_notes:
  - '''Bienaventurado'' mantiene el registro sapiencial coherente con otros pasajes de POB.'
  - Se conserva la cadena metafórica 'furor / yugo / cadenas / atado' sin interpretar ni suavizar la esclavitud implícita.
  - '''Ella'' en la nota y el texto principal mantiene la concordancia con el antecedente femenino del griego.'
  - No se introduce 'Cristo', 'SEÑOR' ni otras equivalencias no presentes en el texto fuente.
