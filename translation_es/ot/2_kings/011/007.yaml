revisions:
- from: Y las dos divisiones entre ustedes[a], todos los que salen de turno en el sábado[b], guardarán la vigilancia de la casa de Yahvé, para el rey[c].
  to: Y las dos divisiones entre ustedes[a], todos los que salen de turno el sábado[b], harán guardia en la casa de Yahvé para el rey[c].
