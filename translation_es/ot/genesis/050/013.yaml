base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/013.yaml
  text: His sons carried him to the land of Canaan and buried him in the cave of the field of Machpelah[a], which Abraham had bought with the field as a burial property from Ephron the Hittite[c][b], opposite Mamre.
  footnotes:
  - marker: a
    text: Or 'for a burial possession.' The Hebrew emphasizes that Abraham acquired the field as a permanent holding for burial.
    reason: lexical_alternative
  - marker: b
    text: Or 'facing Mamre.' The Hebrew phrase indicates location relative to Mamre.
    reason: lexical_alternative
  - marker: c
    text: Or 'which Abraham had bought with the field'.
    reason: previous_rendering
