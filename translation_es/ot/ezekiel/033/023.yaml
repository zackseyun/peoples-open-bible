translation:
  language: es
  text: Y la palabra de Yahvé[a] vino a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se vierte «el SEÑOR». Aquí se conserva el nombre divino como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: En la fórmula profética narrativa, el hebreo usa una introducción secuencial estándar. En español, 'vino' comunica de forma natural la llegada de la palabra sin forzar un calco como 'aconteció', que aquí sería más pesado que el giro bíblico original.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la construcción fija דְבַר יְהוָה, 'palabra' preserva el enlace formal y recurrente con la fórmula profética. 'Mensaje' explicaría el sentido, pero debilitaría la correspondencia léxica con el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: usar ''Yahvé'' en el texto principal, manteniendo el nombre propio divino y evitando la sustitución por un título.'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular se expresa de manera directa como 'a mí'. Es la forma natural y transparente en español moderno.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: '''Diciendo'' conserva la función introductoria del infinitivo constructo sin adelantar ni parafrasear el contenido de la cita que empieza en el versículo siguiente.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo nombra explícitamente a YHWH. En español, 'Yahvé' preserva el nombre personal del pacto y sigue la práctica terminológica del proyecto, en vez de ocultarlo tras un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la lectura inglesa auditada: la fórmula profética breve no requiere ajustes textuales ni decisiones de variante. La única decisión sensible es la representación del nombre divino, resuelta conforme a la terminología del proyecto.'
  spanish_consistency_notes:
  - 'Se mantiene el orden natural del español: conjunción + sujeto + verbo + complemento.'
  - Se conserva el paralelismo formal de la fórmula profética sin añadir el contenido del versículo siguiente.
  - El nombre divino se normaliza como «Yahvé» en todo el texto principal, coherente con la pauta del proyecto.
