revisions:
- from: Los hijos de tus siervos habitarán[a], y su descendencia será establecida delante de ti.
  to: Los hijos de tus siervos habitarán[a], y su descendencia quedará firme delante de ti.
  rationale: Se mantiene la estructura y el sentido del borrador, pero se reemplaza «será establecida» por «quedará firme» para un español más natural y digno, mientras se preserva el valor de estabilidad de יִכּוֹן. También se ajusta la nota para que la alternativa literal siga la redacción revisada.
