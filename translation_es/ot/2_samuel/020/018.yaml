translation:
  language: es
  text: 'Entonces ella dijo[a]: «En tiempos antiguos[b] solían decir: “Que consulten en Abel, y así daban fin al asunto”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces ella dijo: “En tiempos antiguos se solía decir: ‘Que pregunten en Abel, y así ponían fin al asunto’”». El hebreo usa construcciones de infinitivo absoluto con imperfecto para intensificar ambos verbos; la cláusula final también puede traducirse más literalmente como «dar fin» o «poner fin».'
    reason: lexical_alternative
  - marker: b
    text: «Abel» es la forma abreviada de Abel-bet-maacá, la ciudad sitiada en este contexto.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then she said
  chosen_spanish: Entonces ella dijo
  alternatives_spanish:
  - Y ella dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la continuación narrativa del discurso de la mujer; «Entonces» conserva la secuencia sin forzar un calco.
- source_word: לֵאמֹר
  english_pob_choice: quotation introducer
  chosen_spanish: dos puntos y comillas directas
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: En español, el infinitivo constructo funciona mejor como apertura de cita directa, no como gerundio o subordinada pesada.
- source_word: דַּבֵּר יְדַבְּרוּ
  english_pob_choice: They used to say
  chosen_spanish: solían decir
  alternatives_spanish:
  - decían con certeza
  - seguro decían
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto expresa énfasis y costumbre; «solían decir» comunica bien el valor habitual en pasado, manteniendo la fuerza enfatizada del hebreo en el contexto.
- source_word: בָרִאשֹׁנָה
  english_pob_choice: in former times
  chosen_spanish: en tiempos antiguos
  alternatives_spanish:
  - antiguamente
  - en otros tiempos
  lexicon: HALOT
  rationale: La frase apunta a una práctica anterior o proverbial; «en tiempos antiguos» expresa esa referencia temporal y su tono sentencioso con naturalidad en español.
- source_word: שָׁאֹל יְשָׁאֲל֛וּ
  english_pob_choice: Let them surely ask
  chosen_spanish: Que pregunten con certeza
  alternatives_spanish:
  - Que inquieran con certeza
  - Que pregunten seguramente
  lexicon: HALOT
  rationale: La duplicación verbal intensifica la petición. «Pregunten con certeza» conserva la fuerza enfática sin introducir una lectura demasiado interpretativa; «inquiran» es viable, pero menos natural para lectores amplios.
- source_word: בְּאָבֵל
  english_pob_choice: at Abel
  chosen_spanish: en Abel
  alternatives_spanish:
  - en Abel-bet-maacá
  - en la ciudad de Abel
  lexicon: HALOT
  rationale: El topónimo aparece abreviado; «en Abel» reproduce la forma del texto y deja visible la abreviación, como hace la nota contextual en el audit trail.
- source_word: וְכֵן
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - y de ese modo
  - así
  lexicon: HALOT
  rationale: Conecta la consulta con su resultado práctico; «y así» mantiene la relación consecutiva de manera clara y breve.
- source_word: הֵתַמּוּ
  english_pob_choice: they ended the matter
  chosen_spanish: terminaron el asunto
  alternatives_spanish:
  - acabaron el asunto
  - dieron fin al asunto
  lexicon: HALOT
  rationale: El perfecto hifil de תמם aquí expresa llevar algo a su conclusión. «Terminaron el asunto» refleja esa culminación de forma directa y equivalente en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «ended the matter» sobre «settled the matter» para reflejar con mayor inmediatez el cierre del asunto; por eso se traduce con «terminaron el asunto» y no con una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Abel» como topónimo abreviado, coherente con el expediente inglés y con la nota cultural.
  - Se conserva el contraste entre el dicho proverbial y su resultado final mediante una estructura española natural y formal.
  - Se evita «SEÑOR» u այլ terminología no pertinente; no hay vocabulario teológico especial en este verso.
