translation:
  language: es
  text: Así pues[a], la razón es una mente que, con conducta recta, prefiere el discurso de la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el principio de la sabiduría» o «la palabra de la sabiduría». El griego λόγος puede significar «palabra», «discurso», «explicación», «razón» o «principio».
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  lexicon: LSJ
  rationale: En este contexto definitorio, λογισμός designa la facultad o principio de deliberación racional; 'la razón' es la forma más natural y precisa en español para conservar ese valor conceptual sin volverlo demasiado procesual.
- source_word: νοῦς
  english_pob_choice: mind
  chosen_spanish: una mente
  alternatives_spanish:
  - un entendimiento
  - un intelecto
  lexicon: LSJ
  rationale: νοῦς nombra la facultad mental; 'mente' comunica bien esa facultad en español contemporáneo y evita un tecnicismo innecesario.
- source_word: μετὰ ὀρθοῦ βίου
  english_pob_choice: with right conduct
  chosen_spanish: con conducta recta
  alternatives_spanish:
  - con vida recta
  - con comportamiento recto
  lexicon: LSJ
  rationale: La frase une la racionalidad con una vida moralmente correcta. 'Conducta recta' preserva el matiz ético de ὀρθός y el sentido vivencial de βίος con naturalidad en español.
- source_word: προτιμῶν
  english_pob_choice: prefers
  chosen_spanish: prefiere
  alternatives_spanish:
  - da preferencia a
  - estima por encima
  lexicon: LSJ
  rationale: El participio expresa preferencia activa o elección de una cosa sobre otra. 'Prefiere' conserva esa fuerza comparativa de manera clara y idiomática.
- source_word: τὸν σοφίας λόγον
  english_pob_choice: the discourse of wisdom
  chosen_spanish: el discurso de la sabiduría
  alternatives_spanish:
  - la palabra de la sabiduría
  - el principio de la sabiduría
  lexicon: LSJ
  rationale: λόγος puede significar palabra, discurso, explicación o principio. 'El discurso de la sabiduría' mantiene la amplitud del término y resulta más fiel al matiz filosófico-retórico que 'palabra' en este contexto.
theological_decisions:
- issue: Amplitud semántica de λόγος en una definición filosófico-ética
  english_pob_reading: the discourse of wisdom
  chosen_spanish_reading: el discurso de la sabiduría
  alternative_spanish_readings:
  - la palabra de la sabiduría
  - el principio de la sabiduría
  rationale: El verso define la razón en relación con la sabiduría. Como λόγος admite varios matices, la versión española conserva esa amplitud y evita fijar prematuramente un sentido técnico o doctrinal que el griego no obliga aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente inglés: ''right conduct'' se ha reflejado como ''conducta recta'', y ''prefers the discourse of wisdom'' como ''prefiere el discurso de la sabiduría'', manteniendo la amplitud de λόγος y el tono formal del verso.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra terminología de máscara porque no aparece el tetragrámaton ni κύριος en este verso.
  - Se prefirió 'razón' para λογισμός y 'mente' para νοῦς, manteniendo la distinción conceptual entre facultad racional y facultad mental.
  - '''Conducta recta'' conserva el vínculo entre ética y racionalidad sin introducir un giro más libre como ''vida correcta''.'
  - '''Discurso de la sabiduría'' preserva la apertura semántica de λόγος que el expediente inglés documenta explícitamente.'
