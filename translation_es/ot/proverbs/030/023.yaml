translation:
  language: es
  text: bajo una mujer odiada cuando se casa[a], y una esclava cuando hereda de su señora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando es casada». El hebreo puede entenderse de manera más formal como un pasivo, aunque en español «cuando se casa» expresa mejor el cambio de estado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo la condición de
  lexicon: HALOT
  rationale: Mantiene la relación espacial/condicional del hebreo sin convertir la línea en una explicación. En español, "bajo" reproduce bien la fuerza idiomática de תַּחַת en este proverbio.
- source_word: שְׂנוּאָה
  english_pob_choice: hated woman
  chosen_spanish: mujer odiada
  alternatives_spanish:
  - mujer aborrecida
  - mujer despreciada
  - mujer no amada
  lexicon: HALOT
  rationale: El participio pasivo expresa rechazo u odio. "Odiada" conserva la fuerza más directa; "no amada" suavizaría demasiado el término.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - que
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal de la reversión social, no una causa explicativa. "Cuando" es la equivalencia natural en español.
- source_word: תִבָּעֵל
  english_pob_choice: is married
  chosen_spanish: es casada
  alternatives_spanish:
  - se casa
  - ha sido casada
  - contrae matrimonio
  lexicon: HALOT
  rationale: El nifal indica el estado de llegar a estar casada. "Es casada" mantiene el pasivo formal del audit trail inglés y el cambio de estado, aunque suene más solemne que "se casa".
- source_word: שִׁפְחָה
  english_pob_choice: female slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - sirvienta
  - criada
  lexicon: HALOT
  rationale: Dado el valor de estatus servil del término y la preferencia del proyecto por reflejar la esclavitud cuando es semánticamente relevante, "esclava" es la opción más fiel.
- source_word: תִירַשׁ
  english_pob_choice: inherits
  chosen_spanish: hereda
  alternatives_spanish:
  - toma posesión
  - se apodera de
  - sucede a
  lexicon: HALOT
  rationale: El verbo puede significar heredar o tomar posesión. En este contexto social, "hereda" conserva la literalidad semántica que el audit trail inglés decidió privilegiar, sin adelantar la interpretación de desplazamiento.
- source_word: גְּבִרְתָּהּ
  english_pob_choice: her mistress
  chosen_spanish: su señora
  alternatives_spanish:
  - su ama
  - su dueña
  - su señora y dueña
  lexicon: HALOT
  rationale: El término designa a la superior femenina del hogar. "Señora" es claro y digno en español, y evita una sobrecarga moderna de "dueña" que podría sonar más posesiva de lo que exige el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste auditado del inglés POB: se conservó la lectura formal pasiva de תִבָּעֵל y la elección de un verbo de posesión/herencia para תִירַשׁ. En español se optó por una formulación que preserve el tono proverbial y el contraste social del paralelismo, sin convertir el verso en paráfrasis.'
  spanish_consistency_notes:
  - Se mantiene "esclava" para שִׁפְחָה en coherencia con el tratamiento del estatus servil cuando el matiz social es central.
  - Se usa "Yahvé" como norma del proyecto solo cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - No se introduce terminología eclesiástica tradicional que atenúe el contraste social del proverbio.
