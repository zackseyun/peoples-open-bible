translation:
  language: es
  text: 'Pero se hallaron entre ellos[a] diez hombres, y dijeron a Ismael: «No nos quites la vida, porque tenemos reservas escondidas[b] en el campo: trigo y cebada, aceite y miel». Entonces desistió y no les dio muerte en medio de sus hermanos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de ellos». El hebreo puede expresar que estos diez hombres fueron hallados como parte del grupo.
    reason: alternative_reading
  - marker: b
    text: O «tesoros». La palabra hebrea puede referirse a cosas escondidas en general, pero aquí el contexto favorece provisiones o reservas ocultas más que riquezas.
    reason: lexical_alternative
  - marker: c
    text: O «entre sus hermanos». La expresión probablemente significa entre sus compañeros del grupo que estaban siendo muertos.
    reason: cultural_note
lexical_decisions:
- source_word: וַעֲשָׂרָה אֲנָשִׁים
  english_pob_choice: But ten men
  chosen_spanish: Pero se hallaron entre ellos diez hombres
  alternatives_spanish:
  - Y se hallaron entre ellos diez hombres
  - Ahora bien, se hallaron entre ellos diez hombres
  lexicon: HALOT
  rationale: El hebreo introduce una excepción dentro del relato anterior; en español, «Pero» comunica mejor ese giro adversativo. «Hombres» conserva אֲנָשִׁים de manera directa y natural.
- source_word: נִמְצְאוּ בָם
  english_pob_choice: were found among them
  chosen_spanish: se hallaron entre ellos
  alternatives_spanish:
  - fueron hallados entre ellos
  - se encontraron entre ellos
  lexicon: HALOT
  rationale: La pasiva de מצא admite en español tanto «fueron hallados» como «se hallaron». Se eligió la forma pronominal por fluidez y porque conserva el sentido de ser descubiertos dentro del grupo.
- source_word: אַל תְּמִתֵנוּ
  english_pob_choice: Do not put us to death
  chosen_spanish: No nos mates
  alternatives_spanish:
  - No nos pongas a muerte
  - No nos hagas morir
  lexicon: HALOT
  rationale: El hebreo usa el causativo de מות. En español, «No nos mates» es la forma más natural y clara; el matiz causativo queda suficientemente representado por el contexto de ejecución violenta sin volver la frase artificial.
- source_word: מַטְמֹנִים
  english_pob_choice: hidden stores
  chosen_spanish: escondidos
  alternatives_spanish:
  - escondidos provisiones
  - ocultos tesoros
  - escondidos depósitos
  lexicon: HALOT
  rationale: El inglés POB entiende מַטְמֹנִים como provisiones escondidas, no como riquezas. En español, «escondidos» funciona aquí como adjetivo que remite a esas reservas ocultas; el complemento explícito se expresa en la lista siguiente. Otra posibilidad sería «provisiones escondidas», pero resultaría más pesada en la oración.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la tierra de labranza
  lexicon: HALOT
  rationale: «Campo» es el equivalente más natural en español para שדה y mantiene la referencia agrícola concreta del texto.
- source_word: חִטִּים וּשְׂעֹרִים וְשֶׁמֶן וּדְבָשׁ
  english_pob_choice: wheat and barley, oil and honey
  chosen_spanish: trigo y cebada, aceite y miel
  alternatives_spanish:
  - trigo, cebada, aceite y miel
  - trigo y cebada; aceite y miel
  lexicon: HALOT
  rationale: Se conserva la lista de alimentos/provisiones de forma directa. «Aceite» deja abierta la referencia contextual al aceite de oliva sin añadir especificación no expresada en el hebreo.
- source_word: וַיֶּחְדַּל
  english_pob_choice: So he refrained
  chosen_spanish: Él desistió
  alternatives_spanish:
  - Entonces se abstuvo
  - Así que se detuvo
  lexicon: HALOT
  rationale: חדל significa cesar o desistir. «Desistió» comunica bien el cese voluntario de la acción homicida y suena natural en español literario.
- source_word: וְלֹא הֱמִיתָם
  english_pob_choice: and did not put them to death
  chosen_spanish: y no los mató
  alternatives_spanish:
  - y no les dio muerte
  - y no los puso a muerte
  lexicon: HALOT
  rationale: Aunque la traducción inglesa mantiene «put them to death» para reproducir el causativo, en español «no los mató» es la expresión más idiomática y suficientemente fiel dentro de una misma unidad narrativa.
- source_word: בְּתוֹךְ אֲחֵיהֶם
  english_pob_choice: among their brothers
  chosen_spanish: en medio de sus hermanos
  alternatives_spanish:
  - entre sus hermanos
  - en medio de sus parientes
  lexicon: HALOT
  rationale: Se conserva la imagen espacial de תוֹךְ con «en medio de», que refleja de forma más cercana el hebreo que un simple «entre». «Hermanos» mantiene el término de parentesco del texto, aunque en contexto puede abarcar a sus compañeros de grupo.
theological_decisions:
- issue: Sentido de אַל תְּמִתֵנוּ en una escena de ejecución
  english_pob_reading: Do not put us to death
  chosen_spanish_reading: No nos mates
  alternative_spanish_readings:
  - No nos pongas a muerte
  - No nos hagas morir
  rationale: 'No hay una cuestión doctrinal distintiva, pero sí un matiz semántico importante: el hebreo usa el causativo. En español, la forma más natural sigue siendo «No nos mates», sin perder la gravedad del acto narrado.'
  doctrine_reference: none
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y el estado de acuerdo del control cruzado es alto; no se registraron cambios aplicados. Esta propuesta conserva el sentido del hebreo y la lectura auditada en inglés, ajustando la redacción a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Ismael» para יִשְׁמָעֵאל conforme al nombre propio estándar.
  - Se evita «SEÑOR» porque no aparece un tetragrámaton en este versículo.
  - Se conserva la lista de alimentos en orden y con puntuación clara.
  - Se distingue la formulación narrativa «Él desistió» para reflejar el cambio de acción sin añadir interpretación.
  - Las notas al pie marcan alternativas reales de traducción y una ambigüedad cultural del hebreo, sin duplicar marcadores.
