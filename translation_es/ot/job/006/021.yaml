translation:
  language: es
  text: Porque ahora han llegado a ser nada[a]; ven el terror[b] y tienen miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «han llegado a ser no» o algo parecido. Muchos entienden el sentido como «han llegado a ser nada» o «han llegado a ser como eso», es decir, como los arroyos poco confiables de los versículos anteriores.'
    reason: textual_variant
  - marker: b
    text: O «calamidad». El sustantivo puede denotar terror, consternación o un desastre devastador.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque ahora
  lexicon: HALOT
  rationale: Introduce la explicación o conclusión de Job respecto de la comparación anterior. «Porque» conserva la relación discursiva sin volverla excesivamente causal ni añadir interpretación.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - en la actualidad
  lexicon: HALOT
  rationale: Adverbio temporal que contrasta la situación presente con la expectativa anterior.
- source_word: הֱיִיתֶם
  english_pob_choice: you have become
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - han llegado a ser
  - han venido a ser
  - son
  lexicon: HALOT
  rationale: Verbo de cambio de estado. «Se han vuelto» expresa mejor en español que los amigos han pasado a ser algo distinto, en línea con la lectura contextual de la metáfora.
- source_word: לא
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - 'no'
  - nada de ayuda
  - para nada
  lexicon: HALOT
  rationale: Sigue la decisión inglesa de reflejar el sentido contextual tradicional de inutilidad o vaciedad. «Nada» comunica el valor interpretativo sin caer en un calco opaco como «no».
- source_word: תִּרְאוּ
  english_pob_choice: you see
  chosen_spanish: ven
  alternatives_spanish:
  - ven ustedes
  - miran
  - perciben
  lexicon: HALOT
  rationale: En español, con sujeto implícito de segunda persona plural, «ven» es natural y directo. Mantiene la referencia a la percepción de la desgracia o terror.
- source_word: חֲתַת
  english_pob_choice: terror
  chosen_spanish: el terror
  alternatives_spanish:
  - la consternación
  - la calamidad
  - el espanto
  lexicon: HALOT
  rationale: Conserva la fuerza emotiva del sustantivo, que puede abarcar terror, consternación o una calamidad estremecedora. «El terror» funciona bien con la reacción inmediata del versículo.
- source_word: וַתִּירָאוּ
  english_pob_choice: and you are afraid
  chosen_spanish: y tienen miedo
  alternatives_spanish:
  - y temen
  - y se asustan
  - y sienten temor
  lexicon: HALOT
  rationale: Verbo de reacción temerosa. «Tienen miedo» es idiomático y claro en español; mantiene el paralelismo con la visión del terror.
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase revisado: el hebreo presenta la secuencia difícil הֱיִיתֶם לא, y la decisión sigue la lectura contextual aceptada por la POB inglesa. No se registraron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin cambio porque este verso no los contiene.
  - Se conserva el tono sobrio y acusatorio del discurso de Job sin suavizar el reproche.
  - La decisión de traducir חֲתַת por «terror» se alinea con el audit trail inglés; la nota preserva las alternativas semánticas relevantes.
