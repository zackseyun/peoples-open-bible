review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del griego y del rastro POB en casi todos los elementos clave: la comparación con ἀδάμαντινον, la dirección de εἰς ἀθανασίαν, la intensificación de μᾶλλον, y la combinación de προετρέπετο + ἱκετεύουσα. Sin embargo, «ánimo» para νοῦν desplaza el sentido desde ‘mente/entendimiento’ hacia ‘valor/aliento’, y «encaminando ... el número de sus hijos» suena algo opaco en español para una imagen ya difícil. También «por causa de la piedad» conserva el término tradicional, pero en este contexto puede sonar menos claramente orientado a Dios que «por la devoción a Dios» o «por la piedad hacia Dios».'
  spanish_quality_summary: 'El español es generalmente digno y legible, pero tiene dos puntos mejorables: «teniendo un ánimo como de adamante» suena algo forzado, y «encaminando hacia la inmortalidad el número de sus hijos» resulta pesado y ligeramente abstracto. Una revisión menor puede mantener la metáfora y mejorar la naturalidad: «teniendo una mente como de adamante» y «encaminando a sus hijos hacia la inmortalidad». Además, «suplicándoles» funciona bien, pero conviene mantener la nota alternativa sobre la imagen metafórica más que sobre νοῦν.'
  glossary_alignment: No hay conflicto con terminología de proyecto mayor. εὐσέβεια como «piedad» es defendible, pero aquí sería más claro «devoción a Dios» en español contemporáneo eclesial amplio. El resto de los términos está alineado con el enfoque POB.
  issues:
  - severity: medium
    issue: «ánimo» para νοῦν
    rationale: νοῦν se refiere más directamente a la mente, entendimiento o disposición mental. «Ánimo» en español suele sugerir aliento, valentía o estado emocional, lo que introduce un matiz no primario del griego.
  - severity: medium
    issue: La nota al pie está anclada al término menos necesitado de nota
    rationale: La mayor dificultad exegética en el versículo no es νοῦν sino ἀντικτυποῦσα. El inglés POB documenta precisamente esa rareza metafórica; la nota española debería reflejarla para preservar el rastro auditado.
  - severity: low
    issue: «encaminando hacia la inmortalidad el número de sus hijos» es poco natural
    rationale: Aunque intenta respetar la densidad metafórica, en español la frase queda rígida y oscura. Puede simplificarse sin resolver en exceso la imagen, por ejemplo trasladando el complemento a los hijos mismos y explicando la metáfora en nota.
  - severity: low
    issue: «por causa de la piedad» puede sonar ambiguo
    rationale: En español actual, «piedad» no siempre comunica con claridad la orientación explícita a Dios que εὐσέβεια tiene en 4 Macabeos.
  revised_spanish_text: Pero, teniendo una mente como de adamante, y encaminando[a] a sus hijos hacia la inmortalidad, tanto más los exhortaba a la muerte por la devoción a Dios, suplicándoles.
  revised_footnotes:
  - marker: a
    text: O «haciendo resonar de vuelta el número de sus hijos hacia la inmortalidad». El participio griego es inusual y metafórico, por lo que la imagen exacta es difícil de reproducir con claridad en español.
    reason: lexical_alternative
  revision_rationale: La revisión corrige «ánimo» a «mente» para reflejar mejor νοῦν, traslada la nota a la cláusula realmente difícil (ἀντικτυποῦσα), suaviza una construcción española rígida, y hace más explícita la orientación teológica de εὐσεβείας con «devoción a Dios». Son ajustes menores y seguros; no requieren adjudicación adicional.
