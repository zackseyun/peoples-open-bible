review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: la imagen del ave de rapiña que sube, vuela y extiende sus alas sobre Bosra, y el símil final del corazón de los guerreros de Edom como el de una mujer en dolores de parto. También conserva correctamente la apertura del sujeto implícito. Sin embargo, hay un ajuste menor de estilo y fidelidad funcional: ''se elevará'' duplica en español la idea ascendente ya expresada por ''subirá'', mientras que el verbo hebreo siguiente apunta más naturalmente al vuelo/planeo sostenido. Además, la puntuación con coma tras ''águila'' y punto y coma suena algo rígida.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y fluido. 'He aquí' es admisible en registro bíblico; 'Bosra' es una transliteración aceptable; 'mujer en parto' se entiende, aunque 'con dolores de parto' comunica mejor el valor de מְצֵרָה sin exceso interpretativo. La revisión propuesta mejora naturalidad y precisión sin alejarse del texto fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. Se mantiene 'corazón' en vez de interpretarlo como 'ánimo', en línea con la decisión auditada. La nota léxica sobre נֶשֶׁר está bien preservada.
  issues:
  - severity: medium
    issue: '''se elevará'' no es la mejor correspondencia para וְיִדְאֶה'
    rationale: Después de 'subirá', 'se elevará' repite la noción de ascenso más que la de vuelo sostenido/planeo. 'volará' o 'planeará' representan mejor el segundo verbo sin introducir descenso.
  - severity: low
    issue: '''mujer en parto'' es comprensible pero menos idiomático que alternativas más naturales'
    rationale: En español general y eclesial, 'una mujer con dolores de parto' expresa con mayor claridad la angustia activa del participio מְצֵרָה, evitando una frase algo dura.
  - severity: low
    issue: Puntuación algo calcada
    rationale: La coma tras 'águila' y el punto y coma antes de la segunda cláusula no son necesarios en español moderno; una puntuación más simple mejora legibilidad.
  revised_spanish_text: He aquí[a], como un águila subirá, volará y extenderá sus alas sobre Bosra, y el corazón de los guerreros de Edom en aquel día será como el corazón de una mujer con dolores de parto.
  revised_footnotes:
  - marker: a
    text: O 'como un buitre'; el hebreo puede designar de manera más amplia un ave grande de presa, aunque 'águila' es la traducción convencional en este contexto.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'se elevará' a 'volará' para reflejar mejor el segundo verbo hebreo tras 'subirá'. Se suaviza la puntuación para un español más natural y se cambia 'mujer en parto' por 'mujer con dolores de parto' para expresar con mayor claridad el matiz de angustia/labor del participio hebreo.
