lexical_decisions:
- source_word: δαπάνην
  english_pob_choice: expense
  chosen_spanish: gasto
  alternatives_spanish:
  - costo
  - erogación
  lexicon: LSJ
  rationale: El griego δαπάνη denota un desembolso, costo o gasto. En este contexto se refiere al costo de mantener las provisiones de Bel; «gasto» es natural en español moderno y conserva la referencia económica sin explicarla de más.
- source_word: ἀποθανεῖσθε
  english_pob_choice: you will die
  chosen_spanish: moriréis
  alternatives_spanish:
  - morirán
  - habréis de morir
  lexicon: BDAG
  rationale: La forma expresa una amenaza judicial o sentencia. «Moriréis» conserva la fuerza directa de la advertencia y se ajusta al plural dirigido a los interlocutores.
- source_word: δείξητε
  english_pob_choice: you show
  chosen_spanish: mostráis
  alternatives_spanish:
  - probáis
  - demostráis
  lexicon: BDAG
  rationale: δείκνυμι significa mostrar o demostrar. «Mostráis» mantiene la cercanía léxica al griego y funciona bien en un desafío probatorio.
- source_word: κατεσθίει
  english_pob_choice: eats
  chosen_spanish: se los come
  alternatives_spanish:
  - los devora
  - los consume
  lexicon: LSJ
  rationale: Aunque el verbo griego puede intensificarse como «devorar» o «consumir», el contexto admite un español claro y natural. «Se los come» conserva el acto de comer sin sobrecargar el tono.
- source_word: ἐβλασφήμησεν εἰς τὸν Βήλ
  english_pob_choice: he has blasphemed against Bel
  chosen_spanish: ha blasfemado contra Bel
  alternatives_spanish:
  - blasfemó contra Bel
  - ha hablado con irreverencia contra Bel
  lexicon: BDAG
  rationale: «Blasfemar» preserva la carga religiosa de la acusación. «Contra Bel» refleja bien el movimiento hostil del griego εἰς, y el perfecto compuesto español comunica adecuadamente la causa de la condena.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - —
  lexicon: LSJ
  rationale: El griego termina en καὶ, señalando continuidad con el versículo siguiente. En español debe conservarse como «Y» para respetar la apertura sintáctica del texto.
theological_decisions:
- issue: Uso de «blasfemar» en un contexto pagano
  english_pob_reading: blasphemed against Bel
  chosen_spanish_reading: ha blasfemado contra Bel
  alternative_spanish_readings:
  - ha hablado sacrílegamente contra Bel
  - ha ultrajado a Bel con sus palabras
  rationale: Aunque el término suele aparecer en contextos del Dios verdadero, aquí la acusación se formula respecto de una deidad pagana. «Blasfemado» conserva la fuerza del cargo sin afirmar la divinidad de Bel; simplemente reproduce la lógica del relato.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla ni normalizarla con lenguaje devocional posterior.
translation_notes:
  revision_awareness: La redacción incorpora la corrección auditada del inglés POB que añadió «for» antes de «this expense»; por eso la apertura española usa «Por este gasto» para reflejar con naturalidad la relación causal/preposicional del griego. También se conserva la conjunción final «Y», porque el texto griego termina en καὶ y deja la oración abierta hacia el siguiente versículo.
  spanish_consistency_notes:
  - Se mantiene «Bel» como nombre propio, siguiendo el paquete fuente y el audit trail inglés.
  - Se usa español plural directo («moriréis», «mostráis») porque el griego se dirige a varios interlocutores.
  - No se introduce terminología eclesiástica ajena al relato; el texto conserva el registro judicial y acusatorio del original.
