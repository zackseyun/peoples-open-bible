translation:
  language: es
  text: 'Y dijeron: «Cuando el rey se levante, le entregarán el escrito; y a aquel a quien el rey y los tres nobles de Persia juzguen que su palabra[a] es más sabia, a él se le dará la victoria, como está escrito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «cuya palabra / declaración sea más sabia». El griego dice literalmente: «que su λόγος es más sabio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθῇ
  english_pob_choice: rises
  chosen_spanish: se levante
  alternatives_spanish:
  - se alce
  - se despierte
  lexicon: BDAG
  rationale: El griego puede referirse a incorporarse o levantarse de donde está. «Se levante» es natural en español y conserva la apertura temporal sin precisar si viene del sueño o del asiento.
- source_word: τὸ γράμμα
  english_pob_choice: the writing
  chosen_spanish: el escrito
  alternatives_spanish:
  - la carta
  - el documento
  lexicon: BDAG
  rationale: γράφμμα puede ser carta, escrito o documento. Aquí se trata de una pieza redactada para el concurso; «el escrito» mantiene la referencia abierta y evita reducirlo indebidamente a correspondencia privada.
- source_word: κρίνῃ
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - decidan
  - determinen
  lexicon: BDAG
  rationale: El verbo conserva un matiz de evaluación formal. «Juzguen» reproduce mejor esa función adjudicativa que una simple decisión informal.
- source_word: μεγιστᾶνες
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes
  lexicon: LSJ
  rationale: Se refiere a altos dignatarios persas. «Nobles» comunica bien el rango social y funciona de manera clara en español contemporáneo.
- source_word: Περσίδος
  english_pob_choice: of Persia
  chosen_spanish: de Persia
  alternatives_spanish:
  - de los persas
  lexicon: LSJ
  rationale: El genitivo señala el ámbito persa o la corte persa. «De Persia» es la forma más natural en español para este contexto.
- source_word: ὁ λόγος αὐτοῦ σοφώτερος
  english_pob_choice: whose word is wiser
  chosen_spanish: de palabra más sabia
  alternatives_spanish:
  - cuyo dicho es más sabio
  - cuya declaración es más sabia
  lexicon: BDAG
  rationale: λόγος aquí puede ser palabra, declaración o argumento. Siguiendo la cautela del audit trail inglés, «de palabra más sabia» conserva la relación literal con λόγος sin forzar «argumento» ni volverlo demasiado libre; la nota recoge la alternativa semántica.
- source_word: τὸ νῖκος
  english_pob_choice: the victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - el triunfo
  - el premio
  lexicon: LSJ
  rationale: νῖκος significa victoria/triunfo. «La victoria» sigue de cerca el término griego y mantiene el lenguaje del certamen.
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - como ha sido escrito
  - según está escrito
  lexicon: BDAG
  rationale: La fórmula remite a algo fijado por escrito. «Como está escrito» es la equivalencia natural en español y conserva el carácter formular.
theological_decisions:
- issue: Naturaleza de la “victoria”
  english_pob_reading: to him the victory will be given
  chosen_spanish_reading: a él se le dará la victoria
  alternative_spanish_readings:
  - se le dará el triunfo
  - él recibirá el premio
  rationale: No hay una decisión doctrinal explícita, pero conviene mantener el sentido competitivo del texto. «Victoria» conserva el valor del griego νῖκος sin introducir un premio distinto.
  doctrine_reference: No aplica; observación de sentido textual/competitivo.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: ἐγερθῇ se mantiene en una forma natural equivalente a “rises”; τὸ γράμμα se conserva como una referencia abierta a un escrito; κρίνῃ mantiene el matiz de juicio formal; λόγος se traduce de manera suficientemente literal para no perder la tensión entre “palabra”, “declaración” y “argumento”; νῖκος se expresa como “victoria” y la fórmula καθὼς γέγραπται se vierte con la idiomática bíblica española “como está escrito”.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino, lo cual no ocurre en este versículo.
  - Se evitó «Cristo»/«Mesías» porque no hay ese término en el pasaje.
  - Se mantuvo un registro bíblico claro pero moderno, sin arcaísmos innecesarios.
  - Las comillas españolas y la puntuación se ajustan a norma editorial en español.
  - El marcador [a] se ancla en la apertura narrativa; [b] en la frase de λόγος, donde hay una verdadera alternativa léxica.
