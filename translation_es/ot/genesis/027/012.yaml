translation:
  language: es
  text: Tal vez mi padre me palpe[a], y le pareceré como un engañador[b], y traeré sobre mí una maldición y no una bendición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me tocará'. El verbo hebreo se refiere a sentir o tocar con la mano, en el contexto del intento de Isaac de verificar físicamente la identidad de Jacob.
    reason: lexical_alternative
  - marker: b
    text: O 'como uno que se burla' o 'como un tramposo'. La expresión hebrea describe a alguien que engaña o hace caer en error a otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - Quizá
  - Quizás
  lexicon: HALOT
  rationale: Expresa la incertidumbre prudente de Jacob en español natural y conserva el matiz de posibilidad sin añadir más fuerza de la que tiene el hebreo.
- source_word: יְמֻשֵּׁנִי
  english_pob_choice: will feel me
  chosen_spanish: me palpe
  alternatives_spanish:
  - me toque
  - me sienta con la mano
  lexicon: HALOT
  rationale: El verbo apunta a un contacto táctil para comprobar identidad; 'palpar' comunica bien esa verificación física en español y mantiene la idea de tocar/examinar por el tacto.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi papá
  lexicon: HALOT
  rationale: Es la forma natural y reverente en este contexto narrativo; conserva el vínculo familiar sin tono coloquial excesivo.
- source_word: וְהָיִיתִי בְעֵינָיו
  english_pob_choice: and I will seem to him
  chosen_spanish: y yo le pareceré
  alternatives_spanish:
  - y estaré en sus ojos
  - y me veré ante él
  lexicon: HALOT
  rationale: La idiomática hebrea 'en sus ojos' se vierte como percepción/estimación en español. 'Le pareceré' evita un calco duro y mantiene el sentido evaluativo.
- source_word: כִּמְתַעְתֵּעַ
  english_pob_choice: like a deceiver
  chosen_spanish: como un engañador
  alternatives_spanish:
  - como un tramposo
  - como un burlador
  lexicon: HALOT
  rationale: La forma participial expresa a alguien que engaña o induce a error. 'Engañador' conserva la fuerza personal y la tensión moral del pasaje.
- source_word: וְהֵבֵאתִי עָלַי
  english_pob_choice: and I will bring on myself
  chosen_spanish: y traeré sobre mí
  alternatives_spanish:
  - y provocaré sobre mí
  - y me acarrearé
  lexicon: HALOT
  rationale: Refleja con fidelidad el movimiento causativo de 'traer sobre uno mismo' y suena natural en español bíblico contemporáneo.
- source_word: קְלָלָה
  english_pob_choice: a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - una condena
  - una imprecación
  lexicon: HALOT
  rationale: Es la equivalencia directa y esperable para el contraste con bendición en este contexto.
- source_word: וְלֹא בְרָכָה
  english_pob_choice: and not a blessing
  chosen_spanish: y no una bendición
  alternatives_spanish:
  - y no bendición
  - en vez de una bendición
  lexicon: HALOT
  rationale: Preserva el paralelismo hebreo y el contraste explícito entre maldición y bendición.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y el rastro auditado en inglés; se conservan las dos ambigüedades léxicas principales del verso: el tacto físico de יְמֻשֵּׁנִי y el valor de כִּמְתַעְתֵּעַ como persona que engaña o desorienta. No se requieren revisiones adicionales respecto del último pase auditado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - '''Maldición'' y ''bendición'' mantienen el contraste lexical del hebreo.'
  - '''Palpar'' se eligió por claridad contextual, sin perder la alternativa de ''tocar'' indicada en nota.'
  - La puntuación sigue el orden retórico del hebreo con coordinación repetida por 'y'.
