review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: condición hipotética, expansión de la afección, presentación al sacerdote para evaluación de limpieza ritual y nueva comparecencia. Sin embargo, ''se extiende de verdad'' no suena idiomático en español bíblico-natural y no transmite tan bien la intensificación hebrea como ''ciertamente se extiende'' o una formulación equivalente. También conviene conservar la nota léxica sobre הַמִּסְפַּחַת, ya presente en el rastro inglés, porque el español ''erupción escamosa'' sigue siendo una decisión interpretativa que merece documentarse.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero 'de verdad' resulta coloquial y algo débil para un registro digno. 'Para su purificación' es entendible, aunque en este contexto levítico 'para su limpieza' o 'para ser declarado limpio' se acerca más a la lógica de inspección ritual; no obstante, con nota explicativa puede mantenerse. La sintaxis general es buena.
  glossary_alignment: No hay términos del glosario mayor comprometidos. La decisión 'erupción escamosa' concuerda con la rationale del POB. 'Purificación' es aceptable contextualizada por nota, aunque algo menos precisa que una formulación centrada en limpieza ritual/declaración de limpieza. Se deben preservar las alternativas léxicas documentadas por el POB inglés, incluida la nota sobre הַמִּסְפַּחַת.
  issues:
  - severity: medium
    issue: '''se extiende de verdad'' suena coloquial y poco idiomático'
    rationale: La intensificación de פָּשֹׂה תִפְשֶׂה debe reflejarse con una expresión natural y digna en español. 'Ciertamente se extiende' o 'realmente se extiende' funcionan mejor que 'de verdad'.
  - severity: low
    issue: Falta la nota léxica correspondiente a הַמִּסְפַּחַת
    rationale: El POB inglés conserva alternativas significativas ('eruption,' 'rash,' tradicionalmente 'scab'). Dado que 'erupción escamosa' es una elección interpretativa, conviene preservar esa información en nota también en español.
