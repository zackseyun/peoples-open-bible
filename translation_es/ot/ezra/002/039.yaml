translation:
  language: es
  text: los hijos de Harim[a], 1.017.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Harim». La expresión hebrea «hijos de» suele designar una línea familiar o clan más amplia que los hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos / la casa de
  lexicon: HALOT
  rationale: En listas censales y genealógicas, בְּנֵי puede designar un grupo familiar o clánico amplio. «Hijos de» conserva la forma heredada por el original y mantiene la transparencia formal; en español se entiende naturalmente como pertenencia a una línea o casa, no solo como hijos inmediatos.
- source_word: חָרִם
  english_pob_choice: Harim
  chosen_spanish: Harim
  alternatives_spanish:
  - Jarim
  lexicon: HALOT
  rationale: Es un nombre propio de familia; se translitera como nombre bíblico. Se conserva «Harim» por continuidad con la tradición de nombres propios en español bíblico y por fidelidad al original.
- source_word: אֶלֶף וְשִׁבְעָה עָשָׂר
  english_pob_choice: 1,017
  chosen_spanish: '1.017'
  alternatives_spanish:
  - mil diecisiete
  - 1,017
  lexicon: HALOT
  rationale: 'El valor numérico es inequívoco: mil diecisiete. En español editorial puede escribirse con punto como separador de millares en contexto latinoamericano; se mantiene la lectura numérica de lista censal sin ampliar el texto.'
translation_notes:
  revision_awareness: El texto inglés POB y la revisión más reciente coinciden sin cambios; la versión española sigue el mismo estado estable, conservando la nota lexical sobre el valor amplio de «hijos de» en genealogías y censos.
  spanish_consistency_notes:
  - Se mantiene «Harim» como nombre propio transliterado, en línea con la práctica del proyecto.
  - Se conserva el valor corporativo de «hijos de» sin forzarlo a una traducción interpretativa más explícita.
  - La cifra se presenta como numeral para facilitar la lectura en un listado censal.
