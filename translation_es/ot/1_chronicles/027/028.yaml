translation:
  language: es
  text: Sobre los olivos y los sicómoros[a] que estaban en la Sefelá[b] estaba Baal-hanán el gederita; y sobre los depósitos de aceite estaba Joás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sicómoros» también puede traducirse «sicómoros-higueras».
    reason: lexical_alternative
  - marker: b
    text: O «en la llanura baja». «La Sefelá» se refiere a la región de las estribaciones de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: Over
  chosen_spanish: Sobre
  alternatives_spanish:
  - Encargado de
  - Al frente de
  - Sobre
  lexicon: HALOT
  rationale: En este listado administrativo, עַל introduce la esfera de responsabilidad. En español, «sobre» conserva esa idea de supervisión de manera natural y concisa, sin forzar una paráfrasis más explícita que el hebreo no exige.
- source_word: הַזֵּיתִים
  english_pob_choice: the olive trees
  chosen_spanish: los olivos
  alternatives_spanish:
  - los árboles de olivo
  - los árboles olivos
  lexicon: HALOT
  rationale: El sustantivo plural se refiere aquí a árboles, no al fruto. «Olivos» es una forma natural y fiel en español; mantiene el valor botánico y evita una expresión más pesada.
- source_word: וְהַשִּׁקְמִים
  english_pob_choice: and the sycamore trees
  chosen_spanish: los sicómoros
  alternatives_spanish:
  - los árboles de sicómoro
  - los sicómoros-իգ
  lexicon: HALOT
  rationale: שִׁקְמִים designa los árboles conocidos como sicómoros. En español, el plural simple «sicómoros» comunica bien la referencia arbórea sin añadir una glosa innecesaria en el texto principal.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  english_pob_choice: in the Shephelah
  chosen_spanish: en la Sefelá
  alternatives_spanish:
  - en el llano
  - en la llanura
  - en la región baja de Judá
  lexicon: HALOT
  rationale: La forma hebrea funciona como designación geográfica específica de Judá. Se conserva el nombre propio regional «Sefelá» en el cuerpo del texto para respetar el valor toponímico; las alternativas descriptivas quedan como posibles notas o paráfrasis, no como sustituto principal.
- source_word: בַּעַל חָנָן
  english_pob_choice: Baal-hanan
  chosen_spanish: Baal-hanán
  alternatives_spanish:
  - Baal-hanan
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español se mantiene la grafía con tilde normativa en la última sílaba para la pronunciación natural, sin alterar la forma del nombre.
- source_word: הַגְּדֵרִי
  english_pob_choice: the Gederite
  chosen_spanish: el gederita
  alternatives_spanish:
  - el de Geder
  - el hombre de Geder
  lexicon: HALOT
  rationale: El gentilicio se vierte con un equivalente español transparente. «Gederita» conserva el valor demótico del hebreo sin expandirlo más de lo que el texto requiere.
- source_word: אֹצְרוֹת
  english_pob_choice: the stores
  chosen_spanish: los depósitos
  alternatives_spanish:
  - los almacenes
  - las reservas
  - los tesoros
  lexicon: HALOT
  rationale: En este contexto administrativo, el término apunta a lugares o ámbitos de almacenamiento bajo supervisión. «Depósitos» mantiene la amplitud semántica y funciona bien en español sin concretar indebidamente la clase exacta de instalación.
- source_word: הַשֶּׁמֶן
  english_pob_choice: of oil
  chosen_spanish: de aceite
  alternatives_spanish:
  - de aceite de oliva
  - del aceite
  lexicon: HALOT
  rationale: En español, «aceite» transmite naturalmente el contenido almacenado. Aunque el contexto agrícola favorece aceite de oliva, el hebreo no lo explicita; por eso se mantiene la forma general y fiel «de aceite».
- source_word: יוֹעָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Joash
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española tradicional y ampliamente reconocible. Se adapta a la ortografía española estándar sin cambiar la identidad del nombre.
translation_notes:
  revision_awareness: 'El texto inglés auditado no muestra revisiones sustantivas: la concordancia es alta y el pasaje se mantiene en una formulación administrativa simple. Se conservó esa sobriedad en español, con decisiones léxicas puntuales para toponimia y gentilicio, sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Baal-hanán» y «Joás» con adaptación ortográfica española consistente para nombres propios.
  - «Sefelá» se conserva como nombre regional para no perder la referencia geográfica específica del hebreo.
  - 'El orden de elementos sigue la estructura hebrea y la del texto inglés auditado: responsabilidad sobre árboles, región, persona encargada y luego depósitos de aceite.'
