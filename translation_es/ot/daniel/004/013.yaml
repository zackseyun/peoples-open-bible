revisions:
- from: Sea cambiado[a] su corazón de hombre, y sea dado a él el corazón de bestia, y pasen sobre él siete tiempos.
  to: Sea cambiado[a] su corazón para que deje de ser de hombre, y le sea dado corazón de bestia, y pasen sobre él siete tiempos.
  rationale: Se ajusta la sintaxis para un español más natural sin perder la estructura ni la ambigüedad del arameo. «para que deje de ser de hombre» aclara el valor de מִן אֱנוֹשָׁא sin añadir una interpretación doctrinal específica; «le sea dado» corrige un calco poco idiomático. Se conserva «siete tiempos» y la nota léxica correspondiente.
  reviewer_model: gpt-5.4
