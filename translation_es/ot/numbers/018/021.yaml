    reason: lexical_alternative
  - marker: b
    text: O «en lugar del servicio» o «como compensación por el servicio».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el servicio del tabernáculo, donde los levitas cumplían sus tareas asignadas.
    reason: cultural_note
  revision_rationale: Se reemplazó «mira» por «he aquí» para conservar el énfasis solemne de הִנֵּה en un español bíblico digno. Se cambió «en pago del servicio» por «a cambio del servicio» para reflejar mejor חֵלֶף como intercambio/compensación, evitando un matiz demasiado comercial. Se ajustó la nota a para alinearla mejor con la alternativa auditada en inglés.
