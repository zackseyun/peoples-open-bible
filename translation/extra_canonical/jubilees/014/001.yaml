translation:
  text: And after this new moon[a], in the fourth year of this week, on the new moon of the third month, the word of the LORD came to Abram in a dream, saying, “Do not fear, Abram; I am your protector, and your reward will be very great.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez term can mean 'at dawn' or 'at the beginning', but in Jubilees' calendrical system it frequently designates the 'new moon' of the month.
    reason: cultural_note
    anchor_ref: '14:1'
  - marker: b
    text: Or 'I am your protector.”'.
    reason: previous_rendering
  - marker: c
    text: Or 'matter'.
    reason: previous_rendering
