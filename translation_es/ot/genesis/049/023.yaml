translation:
  language: es
  text: 'Lo atacaron amargamente[a], le dispararon y lo odiaron: los arqueros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo amargaron, le dispararon y lo odiaron —los arqueros». El hebreo del segundo verbo es difícil; también puede entenderse de manera más general como «contendieron con él» o «lo asaltaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָרֲרֻהוּ
  english_pob_choice: they bitterly attacked him
  chosen_spanish: Lo amargaron[a]
  alternatives_spanish:
  - Lo amargaron
  - Lo trataron con amargura
  - Lo hostigaron con amargura
  lexicon: HALOT
  rationale: El verbo piel de מרר comunica causar amargura o tratar con dureza. En español, "lo amargaron" conserva la raíz semántica de amargura sin forzar una imagen que el hebreo no exige de manera explícita. Se mantiene la opción de nota porque el contexto también admite un matiz de hostigamiento o ataque hostil, como reflejó el inglés POB.
- source_word: וָרֹבּוּ
  english_pob_choice: and shot at him
  chosen_spanish: lo atacaron
  alternatives_spanish:
  - y le dispararon
  - y contuvieron contra él
  - y lo acosaron
  lexicon: HALOT
  rationale: La forma es difícil y el inglés POB optó por una solución interpretativa que expresa agresión hostil. En español, "lo atacaron" comunica esa hostilidad de manera natural sin añadir el detalle de armas de forma demasiado específica. La ambigüedad del verbo se conserva en la nota del primer miembro, que recoge las alternativas posibles.
- source_word: וַיִּשְׂטְמֻהוּ
  english_pob_choice: and hated him
  chosen_spanish: y lo odiaron
  alternatives_spanish:
  - y le guardaron rencor
  - y fueron hostiles contra él
  lexicon: HALOT
  rationale: שטם expresa enemistad u odio. "Lo odiaron" es la equivalencia más directa y clara en español, y preserva la progresión de hostilidad del verso.
- source_word: בַּעֲלֵי חִצִּים
  english_pob_choice: the archers
  chosen_spanish: los arqueros
  alternatives_spanish:
  - los dueños de flechas
  - los poseedores de flechas
  lexicon: HALOT
  rationale: La construcción idiomática literalmente significa "los que tienen flechas" o "dueños de flechas", pero el sentido establecido es "arqueros". En español, el sustantivo compuesto transmite mejor el valor idiomático que una traducción palabra por palabra.
theological_decisions:
- issue: Imagen poética de agresión contra José en una bendición profética
  english_pob_reading: They bitterly attacked him, and shot at him, and hated him—the archers.
  chosen_spanish_reading: 'Lo amargaron, lo atacaron y lo odiaron: los arqueros.'
  alternative_spanish_readings:
  - 'Lo amargaron, lo acosaron y lo odiaron: los arqueros.'
  - 'Lo trataron con amargura, lo atacaron y lo odiaron: los arqueros.'
  rationale: No hay cambio doctrinal, pero sí una decisión de mantener el tono de hostilidad acumulativa del verso sin suavizarlo. La traducción conserva la imagen de persecución que forma parte de la bendición profética sobre José.
  doctrine_reference: Génesis 49:22-26; Joseph cycle narrative (Genesis 37–50)
translation_notes:
  revision_awareness: El texto inglés revisado añadió el artículo en "the archers" por naturalidad del apuesto; en español se expresa con el equivalente natural "los arqueros". Se siguió la revisión más reciente sin introducir una lectura más interpretativa que la ya adoptada por el POB inglés.
  spanish_consistency_notes:
  - Se usó "lo" como objeto directo uniforme para mantener la cadena de agresiones.
  - Se evitó "SEÑOR" y otras convenciones no presentes en el hebreo de este versículo.
  - '"Arqueros" se mantuvo como equivalente idiomático de la construcción constructa, sin partirla en una glosa literal dentro del texto principal.'
  - El orden verbal reproduce la secuencia hostil del hebreo y del inglés POB.
