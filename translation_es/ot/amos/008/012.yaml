translation:
  language: es
  text: Vagarán de mar a mar, y desde el norte hasta el oriente; andarán de un lado para otro[a], buscando la palabra de Yahvé[b], pero no la encontrarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «correrán de aquí para allá»; el hebreo también puede expresar un ir y venir inquieto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la palabra de Yahvé»; es decir, un mensaje o revelación divina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָעוּ
  english_pob_choice: they will wander
  chosen_spanish: Andarán errantes
  alternatives_spanish:
  - vagarán
  - tambalearán
  - andarán de un lado para otro
  lexicon: HALOT
  rationale: El hebreo נוּעַ puede expresar tanto vagar como tambalearse/reelarse. En este contexto de búsqueda desesperada, «andarán errantes» conserva el movimiento inquieto sin introducir con fuerza la idea de embriaguez o desmayo.
- source_word: מִיָּם עַד יָם
  english_pob_choice: from sea to sea
  chosen_spanish: de mar a mar
  alternatives_spanish:
  - de un mar a otro
  - de mar en mar
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conviene mantener su amplitud geográfica. «De mar a mar» conserva la forma figurada de manera natural en español.
- source_word: וּמִצָּפוֹן וְעַד מִזְרָח
  english_pob_choice: and from north to east
  chosen_spanish: desde el norte hasta el oriente
  alternatives_spanish:
  - y desde el norte hasta el este
  - y desde el norte hasta el amanecer
  lexicon: HALOT
  rationale: מִזְרָח se refiere literalmente al oriente o al lugar del nacimiento del sol. «Oriente» mantiene el valor direccional con un registro bíblico claro y natural en español.
- source_word: יְשׁוֹטְטוּ
  english_pob_choice: they will roam about
  chosen_spanish: andarán de un lado para otro
  alternatives_spanish:
  - irán de aquí para allá
  - merodearán
  - vagarán
  lexicon: HALOT
  rationale: El verbo expresa movimiento repetido, inquieto y de búsqueda. «Andarán de un lado para otro» comunica bien esa idea en español y evita una connotación demasiado negativa de «merodear».
- source_word: לְבַקֵּשׁ
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - para buscar
  - en busca de
  lexicon: HALOT
  rationale: 'El infinitivo de propósito se vierte con un gerundio natural en español: «buscando», manteniendo la finalidad de la acción precedente.'
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahweh
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, asunto o mensaje. Aquí, siguiendo el audit trail de POB, se entiende como revelación o mensaje profético; en español se conserva «palabra» por la fuerza tradicional y la claridad del sintagma, y se usa «Yahvé» para el nombre divino, conforme a la política del proyecto.
- source_word: וְלֹא יִמְצָאוּ
  english_pob_choice: but they will not find it
  chosen_spanish: pero no la encontrarán
  alternatives_spanish:
  - y no la encontrarán
  - pero no encontrarán ninguna
  lexicon: HALOT
  rationale: El objeto tácito del hebreo se recupera en español como «la», retomando «la palabra de Yahvé» y haciendo explícita la referencia sin añadir contenido nuevo. Se preserva el valor adversativo con «pero».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la guía del proyecto, se translitera como «Yahvé» en el texto principal para preservar el nombre propio de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de דְּבַר יְהוָה
  english_pob_reading: the word of Yahweh; that is, a divine message or revelation
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - el mensaje de Yahvé
  - la revelación de Yahvé
  rationale: En contexto profético, דָּבָר no se limita a una unidad léxica de «palabra», sino que puede abarcar mensaje o revelación. Se conserva «palabra» en el texto por ser la formulación más directa y por mantener la ambigüedad reverente, mientras la nota puede aclarar el alcance revelacional.
  doctrine_reference: HALOT; uso profético de דָּבָר
- issue: Valor del movimiento descrito por וְנָעוּ y יְשׁוֹטְטוּ
  english_pob_reading: wander / roam about
  chosen_spanish_reading: andarán errantes / andarán de un lado para otro
  alternative_spanish_readings:
  - vagarán / irán de aquí para allá
  - tambalearán / irán y vendrán
  rationale: 'Los dos verbos hebreos no son idénticos: el primero admite la idea de errancia o vacilación, y el segundo añade el ir y venir ansioso. En español se distinguen con dos expresiones relacionadas para no borrar la intensificación verbal del hebreo.'
  doctrine_reference: HALOT
- issue: Dirección geográfica מִזְרָח
  english_pob_reading: east
  chosen_spanish_reading: oriente
  alternative_spanish_readings:
  - este
  - amanecer
  rationale: «Oriente» es una forma plenamente comprensible y bíblicamente sobria en español, y además conserva la amplitud semántica de «este/oriente» sin reducirla a un punto cardinal moderno rígido.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail en inglés, que conservó «from sea to sea» y explicó el valor de דְּבַר יְהוָה como mensaje o revelación divina. También se consideró la revisión sin cambios y el dictamen de alta concordancia; por ello se mantuvo una traducción directa, con ajuste natural al español y sin borrar la tensión entre «palabra» y «mensaje».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «palabra» en el texto principal por fidelidad al sintagma profético, con aclaración en nota del valor de revelación o mensaje.
  - «Mar a mar» y «desde el norte hasta el oriente» conservan el paralelismo geográfico del hebreo.
  - Se distingue el movimiento errante general de וְנָעוּ de la búsqueda inquieta de יְשׁוֹטְטוּ mediante dos giros españoles cercanos pero no idénticos.
