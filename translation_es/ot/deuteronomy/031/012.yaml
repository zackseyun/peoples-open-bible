translation:
  language: es
  text: 'Reúnan al pueblo: los hombres, las mujeres, los niños pequeños y el forastero[a] que está dentro de sus ciudades[b], para que oigan, y para que aprendan y teman a Yahvé su Dios[c], y cuiden de poner por obra todas las palabras de esta ley[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el residente extranjero» para «el forastero». El término hebreo se refiere a una persona no nativa que vive entre Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dentro de tus puertas», un modismo que alude a quienes viven dentro de tus ciudades o de tu comunidad.'
    reason: cultural_note
  - marker: c
    text: O «reverencien a Yahvé su Dios». El verbo hebreo incluye el sentido de temor reverente y obediencia.
    reason: lexical_alternative
  - marker: d
    text: O «esta instrucción». La palabra hebrea torah puede significar «instrucción» además de «ley»; aquí «ley» encaja con el contexto pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְהֵל
  english_pob_choice: Assemble
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Assemble
  - Convoquen
  - Reúnan juntos
  lexicon: HALOT
  rationale: El imperativo hifil pide hacer que el pueblo se congregue como asamblea. En español, «Reúnan» conserva la fuerza de convocatoria formal y suena natural en registro bíblico sin volverse arcaico.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la asamblea
  lexicon: HALOT
  rationale: Aquí עָם designa a la comunidad del pacto en conjunto. «El pueblo» preserva ese sentido colectivo y es claro en español bíblico contemporáneo.
- source_word: הָאֲנָשִׁים וְהַנָּשִׁים וְהַטַּף
  english_pob_choice: the men, the women, the little children
  chosen_spanish: los hombres, las mujeres, los niños pequeños
  alternatives_spanish:
  - los hombres, las mujeres y los niños
  - los varones, las mujeres y los pequeños
  lexicon: HALOT
  rationale: El hebreo enumera grupos distintos. «Niños pequeños» transmite mejor טַף que el genérico «niños», manteniendo la precisión de la POB inglesa y la diferencia entre dependientes y niños en general.
- source_word: וְגֵרְךָ
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el extranjero residente
  - el sojourner
  lexicon: HALOT
  rationale: La POB inglesa opta por «sojourner» con nota explicativa. En español, «forastero» comunica la condición de no nativo, pero por sí solo puede ser más amplio; por eso se acompaña con la aclaración contextual en la nota sobre su presencia dentro de las puertas.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: que está dentro de tus puertas
  alternatives_spanish:
  - que está dentro de tus ciudades
  - que habita en tus aldeas
  - dentro de tus puertas
  lexicon: HALOT
  rationale: Se conserva el idiomático «dentro de tus puertas» para reflejar el hebreo literal y su matiz comunitario/jurídico. Se evita normalizarlo demasiado para no perder la textura de Deuteronomio.
- source_word: לְמַעַן יִשְׁמְעוּ
  english_pob_choice: so that they may hear
  chosen_spanish: para que oigan
  alternatives_spanish:
  - para que escuchen
  - a fin de que oigan
  lexicon: HALOT
  rationale: יִשְׁמְעוּ se traduce con «oigan» para mantener la relación verbal con la escucha del pacto. En español, «oigan» es natural y no introduce una lectura más interpretativa que «escuchen».
- source_word: וּלְמַעַן יִלְמְדוּ
  english_pob_choice: and so that they may learn
  chosen_spanish: y para que aprendan
  alternatives_spanish:
  - y para que aprendan por instrucción
  - y para que sean enseñados
  lexicon: HALOT
  rationale: La repetición de לְמַעַן se conserva con «y para que». «Aprendan» refleja el proceso de adquisición de conocimiento sin añadir pasividad que el hebreo no requiere explícitamente.
- source_word: וְיָרְאוּ אֶת יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: and fear Yahweh your God
  chosen_spanish: y teman a Yahvé su Dios
  alternatives_spanish:
  - y reverencien a Yahvé su Dios
  - y tengan temor de Yahvé su Dios
  lexicon: HALOT
  rationale: ירא en contexto de pacto incluye temor reverente y obediencia. Se eligió «teman» porque conserva la fuerza directa del verbo; la nota puede recoger la alternativa «reverencien» para el matiz de reverencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el default doctrinal del proyecto para el Tetragrámaton. «Yahvé» mantiene el nombre divino propio y evita la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - el Dios de ustedes
  lexicon: HALOT
  rationale: Aunque el hebreo marca segunda persona plural, el español bíblico de registro amplio puede usar «su» de cortesía/posesión colectiva cuando el contexto ya identifica a los oyentes. Aun así, la forma queda abierta a lectura comunitaria sin sonar regional.
- source_word: וְשָׁמְר֣וּ לַ/עֲשׂ֔וֹת
  english_pob_choice: and be careful to do
  chosen_spanish: y cuiden de poner por obra
  alternatives_spanish:
  - y cuiden de hacer
  - y observen para hacer
  - y procuren hacer
  lexicon: HALOT
  rationale: La combinación שמר + infinitivo expresa vigilancia obediente. «Cuiden de poner por obra» preserva la idea de observancia activa y suena idiomática en español bíblico moderno.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  english_pob_choice: all the words of this law
  chosen_spanish: todas las palabras de esta ley
  alternatives_spanish:
  - todas las palabras de esta instrucción
  - todo lo que dice esta ley
  lexicon: HALOT
  rationale: Se retiene «palabras» para דִּבְרֵי, porque el hebreo no dice simplemente «todo» o «lo que dice». «Ley» sigue la decisión de la POB inglesa en el marco pactual de Deuteronomio, aunque «instrucción» sigue siendo una alternativa viable.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el SEÑOR
  rationale: La fuente hebrea usa el Tetragrámaton directamente. La POB inglesa decidió transliterarlo como Yahweh; en español, «Yahvé» es la transliteración estable y lectura doctrinal consistente con esa decisión.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: El matiz de ירא
  english_pob_reading: fear Yahweh your God
  chosen_spanish_reading: teman a Yahvé su Dios
  alternative_spanish_readings:
  - reverencien a Yahvé su Dios
  - tengan temor reverente de Yahvé su Dios
  rationale: El verbo incluye temor, reverencia y obediencia. Se conserva «teman» por transparencia semántica, sin negar que el sentido pactual abarca reverencia; la nota puede explicitar la alternativa.
  doctrine_reference: HALOT / uso contextual de ירא en Deuteronomio
- issue: Traducción de תּוֹרָה
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: En Deuteronomio, תּוֹרָה se sitúa en un marco pactual y normativo. «Ley» reproduce la opción de la POB inglesa y mantiene el peso jurídico-covenantal del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: La redacción sigue de cerca la decisión inglesa aprobada y la revisa para un español natural y publicable. Se preservan las cuatro unidades demográficas, el modismo «dentro de tus puertas», el doble propósito («oigan» / «aprendan») y la opción doctrinal por el nombre divino. No se detectaron revisiones pendientes en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene la enumeración explícita de grupos sin resumirla en un colectivo genérico.
  - «Ley» y «palabras» se conservan juntos para reflejar דִּבְרֵי הַתּוֹרָה.
  - El posesivo «su» en «su Dios» se entiende comunitariamente en el español del pasaje y evita regionalismos.
  - Las notas a pie usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
