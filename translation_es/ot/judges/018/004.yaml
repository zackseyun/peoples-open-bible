translation:
  language: es
  text: 'Él les dijo[a]: «Micah hizo así y así por mí, me contrató y llegué a ser su sacerdote».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tal y tal»; el hebreo usa un modismo que resume acciones ya narradas sin repetirlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él les dijo
  alternatives_spanish:
  - Y dijo
  - Les dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce una réplica narrativa; en español, «les dijo» comunica con naturalidad el acto de hablar y conserva la dirección del discurso sin forzar un «y» inicial innecesario.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a estos hombres
  lexicon: HALOT
  rationale: El dativo de destinatario se expresa de forma natural con el clítico indirecto «les» en una apertura de discurso directo.
- source_word: כָּזֹה וְכָזֶה
  english_pob_choice: thus and so
  chosen_spanish: Así y así
  alternatives_spanish:
  - Así y así
  - Tal y tal
  - Esto y esto
  lexicon: HALOT
  rationale: La fórmula hebrea es idiomática y resume acciones ya descritas sin repetirlas. «Así y así» mantiene el carácter resumitivo e indefinido mejor que una paráfrasis explicativa.
- source_word: עָשָׂה לִי
  english_pob_choice: did for me
  chosen_spanish: hizo ... conmigo
  alternatives_spanish:
  - hizo ... para mí
  - me hizo
  lexicon: HALOT
  rationale: El hebreo con לִי puede expresar lo que alguien hizo en relación con el hablante. Aquí «hizo conmigo» reproduce esa relación sin añadir una interpretación más precisa de la que el texto exige; el complemento «conmigo» también evita reducirlo sólo a beneficio material.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Micah
  alternatives_spanish:
  - Micaías
  lexicon: Nombre propio
  rationale: Se conserva la forma transcrita usada por la POB en inglés, sin castellanizar innecesariamente el nombre.
- source_word: וַיִּשְׂכְּרֵנִי
  english_pob_choice: he hired me
  chosen_spanish: me contrató
  alternatives_spanish:
  - me alquiló
  - me dio salario
  lexicon: HALOT
  rationale: שׂכר en este contexto significa tomar a alguien a sueldo. «Me contrató» es claro en español moderno y preserva la relación laboral sin introducir una especificación de salario que el texto no explicita.
- source_word: וָאֱהִי לוֹ
  english_pob_choice: and I became his
  chosen_spanish: y llegué a ser su
  alternatives_spanish:
  - y fui suyo
  - y pasé a ser su
  lexicon: HALOT
  rationale: El verbo היה aquí expresa ingreso en un nuevo estado/función tras el contrato. «Llegué a ser su» conserva ese matiz de transición mejor que un simple «fui su».
- source_word: לְכֹהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdote
  - sacerdote cultual
  lexicon: HALOT
  rationale: כֹּהֵן se traduce con el término estándar «sacerdote». Aunque el arreglo es irregular, el texto nombra la función, y no conviene sustituirla por una perífrasis que diluya la fuerza del término.
theological_decisions:
- issue: Naturaleza del cargo sacerdotal en un contexto irregular
  english_pob_reading: I became his priest
  chosen_spanish_reading: llegué a ser su sacerdote
  alternative_spanish_readings:
  - me hice su sacerdote
  - fui su sacerdote
  rationale: La frase mantiene la relación personal y funcional sin resolver la tensión teológica del episodio. El texto describe el hecho de que el levita se convirtió en sacerdote para Micah; no se suaviza ni se legitima la situación.
  doctrine_reference: Preservar la tensión teológica sin armonización interpretativa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado aprobado en inglés, especialmente la decisión revisada de reflejar el modismo hebreo con una fórmula resumitiva natural. Se mantuvo la progresión narrativa completa: habla, resumen de acciones, contratación y establecimiento como sacerdote.'
  spanish_consistency_notes:
  - Se usa «Micah» de manera consistente con la transliteración de la POB inglesa.
  - Se prefirió «sacerdote» para כֹּהֵן y no «cura» ni otras equivalencias eclesiásticas, para conservar la función bíblica específica.
  - La frase final mantiene la transición de estado de וָאֱהִי con un giro español natural («llegué a ser»).
  - Se evitó convertir el modismo hebreo en una explicación extensa dentro del texto principal; la aclaración queda en la nota.
