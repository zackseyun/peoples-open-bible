  text: אוּלַ֣י יִשְׁמְע֔וּ וְ/יָשֻׁ֕בוּ אִ֖ישׁ מִ/דַּרְכּ֣/וֹ הָ/רָעָ֑ה וְ/נִחַמְתִּ֣י אֶל הָ/רָעָ֗ה אֲשֶׁ֨ר אָנֹכִ֤י חֹשֵׁב֙ לַ/עֲשׂ֣וֹת לָ/הֶ֔ם מִ/פְּנֵ֖י רֹ֥עַ מַעַלְלֵי/הֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/026/003.yaml
  text: Perhaps they will listen[a], and each man will turn from his evil way[c][b], and I will relent concerning the disaster that I am planning to bring on them because of the evil of their deeds.
  footnotes:
  - marker: a
    text: Or 'hear'; the Hebrew verb can mean both hearing and heeding in prophetic contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'return' or 'repent' from his evil way.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will change my mind concerning the disaster'; Hebrew 'relent' uses human language for God's withholding of announced judgment.
    reason: lexical_alternative
