translation:
  language: es
  text: Y hubo un regocijo muy grande entre el pueblo, y el oprobio de las naciones[a] fue apartado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la afrenta de las naciones fue quitada».'
