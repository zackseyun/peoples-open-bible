translation:
  language: es
  text: los que creen que no mueren ante Dios[a], sino que viven ante Dios, así como nuestros patriarcas Abraham, Isaac y Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los ojos de Dios»; la dativa griega puede expresar relación o esfera, no solo dirección simple.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πιστεύοντες
  english_pob_choice: those who believe
  chosen_spanish: los que creen
  alternatives_spanish:
  - los creyentes
  - los que tienen fe
  lexicon: BDAG
  rationale: El participio sustantivado expresa personas caracterizadas por creer; en español, «los que creen» conserva ese valor procesual y suena natural, mejor que una etiqueta estática como «los creyentes».
- source_word: θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - delante de Dios
  - en relación con Dios
  lexicon: BDAG
  rationale: La dativa griega aquí expresa relación o esfera. «Para Dios» permite mantener el paralelismo con «viven para Dios» y evita cerrar el sentido en una sola paráfrasis interpretativa.
- source_word: οὐκ ἀποθνήσκουσιν
  english_pob_choice: do not die
  chosen_spanish: no mueren
  alternatives_spanish:
  - no están muriendo
  - no perecen
  lexicon: BDAG
  rationale: El presente indicativo pide una traducción directa y sobria. «No mueren» conserva la afirmación sin debilitarla ni ampliarla.
- source_word: ὥσπερ γὰρ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - pues así como
  - porque así como
  lexicon: LSJ
  rationale: Introduce la comparación con los patriarcas; «así como» es la correspondencia española más natural y mantiene la transición comparativa sin añadir peso explicativo.
- source_word: οἱ πατριάρχαι ἡμῶν
  english_pob_choice: our patriarchs
  chosen_spanish: nuestros patriarcas
  alternatives_spanish:
  - nuestros padres
  - nuestros antepasados
  lexicon: BDAG
  rationale: «Patriarcas» preserva el valor histórico-covenantal de πατριάρχαι, más preciso que «padres» o «antepasados».
- source_word: ἀλλὰ ζῶσιν
  english_pob_choice: but live
  chosen_spanish: sino que viven
  alternatives_spanish:
  - pero viven
  - más bien viven
  lexicon: BDAG
  rationale: «Sino que» reproduce con claridad el contraste después de la negación anterior y mantiene la antítesis del griego; «viven» es el equivalente directo de ζῶσιν.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - delante de Dios
  - en relación con Dios
  lexicon: BDAG
  rationale: Se repite la misma dativa relacional del primer miembro. Repetir «para Dios» preserva la simetría retórica del verso y la lectura relacional propuesta por el POB inglés.
theological_decisions:
- issue: Sentido teológico de la dativa con θεῷ / τῷ θεῷ
  english_pob_reading: Rendered relationally as 'to God,' expressing that the faithful are not dead in God's regard but live in relation to him.
  chosen_spanish_reading: «para Dios», expresando una relación con Dios sin resolver la dativa en una sola paráfrasis explicativa.
  alternative_spanish_readings:
  - delante de Dios
  - en la presencia de Dios
  - a los ojos de Dios
  rationale: 'La cláusula conserva la tensión teológica: no se afirma simplemente una localización espacial, sino una relación con Dios. «Para Dios» es breve, consistente y deja abierta la fuerza relacional de la dativa.'
  doctrine_reference: Preservar la tensión teológica sin simplificarla en exceso.
translation_notes:
  revision_awareness: El inglés POB revisó la construcción para dejar la dativa con ambos verbos ('do not die to God, but live to God') y mover la comparación con los patriarcas al final. La versión española sigue esa misma orientación relacional y conserva el contraste con una sintaxis natural en español.
  spanish_consistency_notes:
  - He mantenido «Dios» en ambas ocurrencias para conservar la simetría del griego y del audit trail inglés.
  - He evitado «SEÑOR» porque el texto griego usa θεός, no κύριος.
  - «Patriarcas» se conserva como término técnico histórico-covenantal.
  - La nota al pie se ancla en la primera aparición de «para Dios» para reflejar la ambigüedad dativa compartida por ambas cláusulas.
