translation:
  language: es
  text: Y ahora Yahvé, su Dios, ha dado reposo a sus hermanos[b], tal como les habló[a]. Así que ahora vuélvanse y vayan a sus tiendas[c], a la tierra de su posesión, que Moisés, siervo de Yahvé, les dio al otro lado del Jordán[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''tal como les prometió''. El hebreo dice literalmente: ''tal como les habló''.'
    reason: lexical_alternative
  - marker: b
    text: '''Hermanos'' se refiere a sus compañeros israelitas.'
    reason: lexical_alternative
  - marker: c
    text: O 'a sus casas'. Literalmente, 'a sus tiendas'.
    reason: lexical_alternative
  - marker: d
    text: O 'más allá del Jordán'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵנִיחַ
  english_pob_choice: has given rest
  chosen_spanish: ha dado reposo
  alternatives_spanish:
  - ha hecho descansar
  - ha concedido reposo
  lexicon: HALOT
  rationale: El hifil de נוח expresa dar reposo o alivio. 'Ha dado reposo' conserva el sentido verbal y suena natural en español bíblico moderno sin perder la idea de cese de conflicto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino 'Yahvé' en la línea editorial de POB en español, preservando el nombre del pacto en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: el Dios de ustedes
  alternatives_spanish:
  - su Dios
  - el Dios de ellos
  lexicon: HALOT
  rationale: En contexto singular se refiere al Dios de Israel. 'El Dios de ustedes' expresa la segunda persona plural sin perder claridad ni naturalidad en español.
- source_word: לַאֲחֵיכֶם
  english_pob_choice: to your brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos israelitas
  - a sus parientes
  lexicon: HALOT
  rationale: El hebreo usa plural masculino y en este contexto tribal designa a los demás israelitas. 'Hermanos' conserva la solidaridad de pacto y evita ampliar innecesariamente el sentido.
- source_word: כַּאֲשֶׁר דִּבֶּר לָהֶם
  english_pob_choice: just as he spoke to them
  chosen_spanish: tal como les habló
  alternatives_spanish:
  - tal como les prometió
  - como les dijo
  lexicon: HALOT
  rationale: דִּבֶּר significa literalmente 'habló / dijo'. 'Les habló' mantiene la literalidad; 'prometió' sería una interpretación no exigida por el verbo.
- source_word: פְּנוּ
  english_pob_choice: turn
  chosen_spanish: vuélvanse
  alternatives_spanish:
  - dense vuelta
  - retornen
  lexicon: HALOT
  rationale: El imperativo expresa cambio de dirección. 'Vuélvanse' reproduce bien la imagen y funciona de forma fluida en una exhortación plural.
- source_word: וּלְכוּ לָכֶם
  english_pob_choice: and go
  chosen_spanish: y vayan
  alternatives_spanish:
  - y váyanse
  - y partan
  lexicon: HALOT
  rationale: El hebreo añade un dativo ético ('para ustedes'), pero en español puede quedar implícito. 'Y vayan' es idiomático y suficientemente cercano al original.
- source_word: לְאָהֳלֵיכֶם
  english_pob_choice: to your tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus casas
  - a sus hogares
  lexicon: HALOT
  rationale: Se conserva 'tiendas' porque el hebreo dice literalmente eso y mantiene el trasfondo histórico; 'casas/hogares' suavizaría el rasgo concreto del texto.
- source_word: אֶל אֶרֶץ אֲחֻזַּתְכֶם
  english_pob_choice: to the land of your possession
  chosen_spanish: a la tierra de su posesión
  alternatives_spanish:
  - a la tierra de su heredad
  - a su propio territorio
  lexicon: HALOT
  rationale: אֲחֻזָּה es una posesión o tenencia de tierra. 'Posesión' refleja el término sin introducir por defecto la carga teológica de 'heredad'.
- source_word: אֲשֶׁר נָתַן לָכֶם מֹשֶׁה
  english_pob_choice: which Moses ... gave you
  chosen_spanish: que Moisés ... les dio
  alternatives_spanish:
  - que Moisés ... les asignó
  lexicon: HALOT
  rationale: נתן es el verbo básico 'dar'. 'Les dio' sigue de cerca el hebreo y evita una paráfrasis administrativa como 'asignó'.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of the LORD
  chosen_spanish: siervo de Yahvé
  alternatives_spanish:
  - esclavo de Yahvé
  - servidor de Yahvé
  lexicon: HALOT
  rationale: Aunque עבד puede significar 'esclavo', en el título honorífico de Moisés la función de siervo es la lectura más natural y reverente en español. Se conserva 'Yahvé' para mantener la coherencia con el nombre divino.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión señala el lado transjordano desde la perspectiva del narrador. 'Al otro lado del Jordán' es claro, natural y conserva la referencia espacial bíblica.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en español para reflejar el Tetragrámaton, de acuerdo con la línea doctrinal y editorial de POB, evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Sentido de 'hermanos'
  english_pob_reading: brothers refers to their fellow Israelites
  chosen_spanish_reading: hermanos = los demás israelitas
  alternative_spanish_readings:
  - parientes
  - compatriotas
  rationale: '''Hermanos'' conserva el lenguaje de pacto y la relación fraterna intraisraelita. En español no se expande a una formulación inclusiva más allá de lo que el hebreo y el contexto militar-tribal sustentan.'
  doctrine_reference: 'DOCTRINE.md: covenant community / solidarity language'
- issue: '''Siervo'' frente a ''esclavo'' en el título de Moisés'
  english_pob_reading: servant of the LORD
  chosen_spanish_reading: siervo de Yahvé
  alternative_spanish_readings:
  - esclavo de Yahvé
  rationale: En este título fijo de honor, 'siervo' comunica sumisión leal sin introducir una dureza semántica que el contexto honorífico no enfatiza. La opción 'esclavo' se reserva para contextos donde la fuerza léxica sea decisiva.
  doctrine_reference: 'DOCTRINE.md: δοῦλος / עבד'
translation_notes:
  revision_awareness: 'Coincide con el cierre de revisión más reciente: no se registraron cambios necesarios y el resumen de concordancia fue de alta coincidencia. La redacción española sigue esa lectura estable, manteniendo las decisiones léxicas clave del audit trail en forma natural para el público hispanohablante.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - '''Hermanos'' conserva el valor comunitario de pacto sin añadir inclusividad no indicada por el hebreo.'
  - '''Tiendas'' se preserva por literalidad histórica.'
  - '''Posesión'' traduce אֲחֻזָּה sin sobrerreligiosizarlo como ''heredad''.'
  - La puntuación refleja una exhortación continua y no introduce divisiones inexistentes en el hebreo.
