  text: מִ/קּ֗וֹל שַֽׁעֲטַת֙ פַּרְס֣וֹת אַבִּירָ֔י/ו מֵ/רַ֣עַשׁ לְ/רִכְבּ֔/וֹ הֲמ֖וֹן גַּלְגִּלָּ֑י/ו לֹֽא הִפְנ֤וּ אָבוֹת֙ אֶל בָּנִ֔ים מֵֽ/רִפְי֖וֹן יָדָֽיִם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/047/003.yaml
  text: At the sound of the stamping of the hooves of his mighty horses[a], at the rumbling of his chariots, at the roar of his wheels, fathers do not turn to their sons because of the helplessness of their hands.
  footnotes:
  - marker: a
    text: Literally, 'because of slackness/feebleness of hands,' an idiom for panic-induced weakness or helplessness.
    reason: lexical_alternative
