base_translation:
  language: en
  yaml_path: translation/ot/micah/006/002.yaml
  text: Hear[a], O mountains, the case of Yahweh, and you enduring foundations of the earth; for Yahweh has a case against his people[c][b], and he will contend with Israel.
  footnotes:
  - marker: a
    text: Or 'dispute,' 'lawsuit,' or 'controversy' for 'case' (Hebrew רִיב), a term often used for a covenant-legal accusation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with his people'; in this legal context, the sense is 'against his people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'strong' or 'ancient' foundations of the earth' for 'enduring foundations of the earth.'
    reason: lexical_alternative
