translation:
  language: es
  text: '¡Mira![a] yo estoy junto a la fuente de agua, y sea que la joven[b] que salga a sacar agua, a quien yo le diga[c]: «Por favor, dame de beber un poco de agua de tu cántaro»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí»; la partícula hebrea הִנֵּה introduce la escena con viveza, sin exigir un tono arcaico.
    reason: lexical_alternative
  - marker: b
    text: O «muchacha» o «doncella»; el hebreo עַלְמָה se refiere a una mujer joven en edad de casarse y no significa explícitamente «virgen».
    reason: lexical_alternative
  - marker: c
    text: 'O «le diga: “Por favor, déjame beber un poco de agua de tu cántaro”».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Mira aquí
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce la escena con viveza. «¡Mira!» conserva la inmediatez del inglés POB «Look» y suena natural en español moderno sin caer en un calco arcaizante como «He aquí».
- source_word: עֵין הַמָּיִם
  english_pob_choice: the spring of water
  chosen_spanish: la fuente de agua
  alternatives_spanish:
  - el manantial de agua
  - la fuente
  - el manantial
  lexicon: HALOT
  rationale: עֵין designa literalmente una fuente/manantial. «Fuente de agua» mantiene la imagen y la precisión lexical mejor que «pozo», que sería menos fiel al término hebreo.
- source_word: הָעַלְמָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la doncella
  - la joven mujer
  lexicon: HALOT
  rationale: עַלְמָה señala a una mujer joven en edad de casarse, sin exigir por sí mismo «virgen». «La joven» preserva esa amplitud semántica con claridad en español.
- source_word: הַיֹּצֵאת
  english_pob_choice: who comes out
  chosen_spanish: que salga
  alternatives_spanish:
  - que está saliendo
  - que salga afuera
  lexicon: HALOT
  rationale: El participio relativo se vierte de forma prospectiva en la escena hipotética. «Que salga» transmite bien la acción esperada en español.
- source_word: לִשְׁאֹב
  english_pob_choice: to draw
  chosen_spanish: a sacar agua
  alternatives_spanish:
  - a sacar
  - a extraer agua
  - a sacar agua para beber
  lexicon: HALOT
  rationale: En este contexto el infinitivo se refiere a sacar agua. «A sacar agua» es idiomático y explicita el objeto implícito del verbo.
- source_word: הַשְׁקִינִי
  english_pob_choice: Please let me drink
  chosen_spanish: dame de beber
  alternatives_spanish:
  - permíteme beber
  - hazme beber
  - déjame beber
  lexicon: HALOT
  rationale: El causativo de שקה expresa dar de beber o hacer beber. «Dame de beber» reproduce la fuerza peticional con naturalidad en español y evita una construcción pesada.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - por favor te pido
  lexicon: HALOT
  rationale: La partícula de cortesía se expresa de manera directa con «Por favor», equivalente moderno y sobrio.
- source_word: מְעַט מַיִם
  english_pob_choice: a little water
  chosen_spanish: un poco de agua
  alternatives_spanish:
  - algo de agua
  - poquita agua
  lexicon: HALOT
  rationale: La expresión cuantitativa se traduce de forma natural como «un poco de agua», manteniendo la restricción mínima del original.
- source_word: מִכַּדֵּךְ
  english_pob_choice: from your jar
  chosen_spanish: de tu cántaro
  alternatives_spanish:
  - de tu jarra
  - de tu vasija
  - de tu jarro
  lexicon: HALOT
  rationale: כד es un recipiente para llevar agua; «cántaro» es un equivalente castellano claro y tradicional, más específico que «vasija» y más natural que «jarra» en este contexto.
theological_decisions:
- issue: Sentido de עַלְמָה
  english_pob_reading: young woman
  chosen_spanish_reading: la joven
  alternative_spanish_readings:
  - la virgen
  - la muchacha
  - la doncella
  rationale: Se evita introducir «virgen» en el texto principal porque el hebreo עַלְמָה no lo exige de manera explícita. La elección principal mantiene la tensión lexical documentada en la nota del POB inglés.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor del verbo causativo הַשְׁקִינִי
  english_pob_reading: Please let me drink
  chosen_spanish_reading: dame de beber
  alternative_spanish_readings:
  - permíteme beber
  - hazme beber
  - déjame beber
  rationale: El hebreo expresa una solicitud de proporcionar bebida. «Dame de beber» conserva la dinámica peticional y la relación entre el solicitante y la posible anfitriona sin forzar una construcción literal poco natural.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «well» por «spring of water» para reflejar con mayor precisión עֵין הַמָּיִם. La presente redacción española sigue esa decisión con «fuente de agua» y mantiene el resto del análisis lexical y sintáctico del POB audit trail.
  spanish_consistency_notes:
  - Se conserva el registro bíblico narrativo sin arcaísmos innecesarios.
  - Se evita «SEÑOR»/«Cristo» porque no corresponden a este versículo.
  - «La joven» preserva la amplitud semántica de עַלְמָה y deja abierta la nota lexical.
  - El verbo peticional se formula de manera natural en español sin perder la fuerza causativa del hebreo.
  - «Fuente de agua» y «cántaro» ofrecen un registro claro y publicable para lectores bíblicos hispanohablantes.
