revisions:
- from: 'Y vino un hombre de Dios a Elí, y le dijo[a]: «Así dice Yahvé: ¿Me revelé acaso de verdad a la casa de tu padre, cuando estaban en Egipto, en la casa de Faraón?»'
  to: 'Y vino un hombre de Dios a Elí, y le dijo: «Así dice Yahvé: ¿De veras me revelé a la casa de tu padre, cuando estaban en Egipto, en la casa de Faraón?[a]»'
  rationale: Se ajusta la redacción principal para una mejor naturalidad en español sin perder el énfasis del hebreo, y se corrige la nota al pie para preservar la alternativa léxica real del audit trail inglés (‘aparecí’) junto con la variante espacial/subordinativa documentada (‘bajo la casa de Faraón’).
