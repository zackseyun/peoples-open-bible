  glossary_alignment: Buena alineación global con el POB. "Señor" para Κύριον está bien justificado aquí, sin imponer "Yahvé" al texto griego. "Ceniza", "turbantes", y "casa de Israel" preservan la terminología y el sentido corporativo. La nota léxica sobre ἐπισκέψασθαι / εἰς ἀγαθόν debe conservarse, pero anclada a la frase relevante.
