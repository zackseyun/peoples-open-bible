translation:
  language: es
  text: Mi alma está satisfecha como con grasa y abundancia[a], y mi boca te alaba con labios de cantos de júbilo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi alma será satisfecha como con grasa y comida abundante».

      '
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «con labios de alegrías» o «con labios de gritos de júbilo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹ
  english_pob_choice: as with
  chosen_spanish: como con
  alternatives_spanish:
  - como
  - al modo de
  lexicon: HALOT
  rationale: La comparación introduce la imagen de alimento abundante; «como con» conserva el valor comparativo y suena natural en español ante la metáfora de saciedad.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - grosura
  - grasa de animal
  lexicon: HALOT
  rationale: El hebreo designa literalmente grasa o sebo; «grasa» preserva la imagen concreta sin volverla inmediatamente abstracta.
- source_word: דֶּשֶׁן
  english_pob_choice: richness
  chosen_spanish: riqueza
  alternatives_spanish:
  - abundancia
  - lozanía
  - opulencia
  lexicon: HALOT
  rationale: El término evoca abundancia, lozanía y riqueza. «Riqueza» mantiene la idea de plenitud y evita una repetición torpe con «grasa».
- source_word: תִּשְׂבַּע
  english_pob_choice: is satisfied
  chosen_spanish: está satisfecha
  alternatives_spanish:
  - será satisfecha
  - se sacia
  - queda satisfecha
  lexicon: HALOT
  rationale: El imperfecto poético admite valor presente/vivencial. En español, el presente transmite mejor la experiencia actual de saciedad que un futuro.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - yo mismo
  lexicon: HALOT
  rationale: «Alma» es la equivalencia más natural en español para el ser interior del salmista y preserva la profundidad antropológica del hebreo.
- source_word: שִׂפְתֵי רְנָנוֹת
  english_pob_choice: with lips of joyful songs
  chosen_spanish: con labios de cantos de júbilo
  alternatives_spanish:
  - con labios de regocijo
  - con labios de alegría
  - con labios jubilosos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «labios de gritos/cantos de alegría». «Cantos de júbilo» comunica la vocalidad festiva sin perder la imagen de los labios.
- source_word: יְהַלֶּל
  english_pob_choice: praises you
  chosen_spanish: te alaba
  alternatives_spanish:
  - te alabará
  - alaba
  - te celebrará
  lexicon: HALOT
  rationale: El verbo se entiende con Dios como destinatario implícito por el contexto de dirección del salmo; «te alaba» en presente conserva el valor poético habitual.
- source_word: פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca
  - mi hablar
  - mis labios
  lexicon: HALOT
  rationale: «Boca» mantiene la imagen corporal concreta y encaja naturalmente con «labios» en el paralelismo poético.
theological_decisions:
- issue: Objeto implícito de la alabanza
  english_pob_reading: 'Added ''you'' in English: ''my mouth praises you'''
  chosen_spanish_reading: «te alaba»
  alternative_spanish_readings:
  - mi boca alaba
  - mi boca te alaba
  rationale: El hebreo no expresa el objeto de forma explícita en la cláusula, pero el salmo es una oración dirigida a Dios. En español, el pronombre «te» hace explícito el destinatario sin añadir contenido ajeno al texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Valor aspectual del imperfecto poético
  english_pob_reading: Present-tense rendering ('is satisfied,' 'praises')
  chosen_spanish_reading: 'Presente: «está satisfecha», «te alaba»'
  alternative_spanish_readings:
  - será satisfecha / alabará
  - queda satisfecha / alabará
  rationale: El imperfecto hebreo en poesía puede expresar estado actual o habitual. El presente español comunica mejor la vivencia inmediata del salmista y sigue de cerca la lectura auditada del POB inglés.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Imagen de abundancia alimentaria
  english_pob_reading: '''fat and richness'' with a lexical note about ''rich food'''
  chosen_spanish_reading: «grasa y riqueza»
  alternative_spanish_readings:
  - grasa y comida rica
  - grasa y alimento abundante
  - sebo y abundancia
  rationale: Se conserva la tensión léxica entre la concreción corporal de חֵלֶב y la amplitud semántica de דֶשֶׁן. La formulación evita diluir el paralelismo, pero sigue siendo inteligible en español.
  doctrine_reference: HALOT; poética hebrea
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. La decisión léxica principal mantiene la imagen concreta de «grasa» y la amplía con «riqueza», conforme al audit trail inglés, sin mecanizar desde el inglés.
  spanish_consistency_notes:
  - Se mantuvo un español neutral y publicable, con sintaxis natural y registro bíblico digno.
  - Se prefirió «mi alma» y «mi boca» para conservar el paralelismo corporal del hebreo.
  - Se evitó «SEÑOR» para no introducir la convención de sustitución del nombre divino; este versículo no contiene el Tetragrámaton.
  - Las notas al pie están ancladas correctamente en el texto con [a] y [b].
