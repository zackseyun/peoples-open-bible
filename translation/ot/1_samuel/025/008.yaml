id: 1SA.25.8
reference: 1 Samuel 25:8
source:
  edition: WLC
  text: שְׁאַ֨ל אֶת נְעָרֶ֜י/ךָ וְ/יַגִּ֣ידוּ לָ֗/ךְ וְ/יִמְצְא֨וּ הַ/נְּעָרִ֥ים חֵן֙ בְּ/עֵינֶ֔י/ךָ כִּֽי עַל י֥וֹם ט֖וֹב בָּ֑נוּ תְּנָ/ה נָּ֗א אֵת֩ אֲשֶׁ֨ר תִּמְצָ֤א יָֽדְ/ךָ֙ לַ/עֲבָדֶ֔י/ךָ וּ/לְ/בִנְ/ךָ֖ לְ/דָוִֽד־־־־׃
translation:
  text: Ask your young men[a], and they will tell you. So let the young men find favor in your eyes, for we have come on a festive day[b]. Please give whatever your hand finds to your servants and to your son David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever you can spare'; literally, 'whatever your hand finds.'
    reason: lexical_alternative
  - marker: b
    text: '''Festive day'' reflects the celebratory context of sheep-shearing; literally, ''a good day.'''
    reason: cultural_note
lexical_decisions:
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Inquire of
  lexicon: HALOT
  rationale: Imperative 2ms from שאל, a direct request to consult Nabal's own servants. 'Ask' is natural modern English and preserves the command force.
- source_word: נְעָרֶיךָ
  chosen: your young men
  alternatives:
  - your servants
  - your attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context. Here it refers to Nabal's men who can verify David's conduct. 'Young men' preserves the lexical link with הַנְּעָרִים later in the verse and avoids over-specifying status.
- source_word: וְיַגִּידוּ לָךְ
  chosen: and they will tell you
  alternatives:
  - and they will report to you
  - and they will inform you
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell or declare. 'Tell you' is idiomatic and sufficient in context.
- source_word: וְיִמְצְאוּ הַנְּעָרִים חֵן בְּעֵינֶיךָ
  chosen: So let the young men find favor in your eyes
  alternatives:
  - and let the young men find favor in your sight
  - may the young men find favor with you
  lexicon: HALOT
  rationale: The idiom מצא חן בעיני means to find favor in someone's eyes/sight. 'In your eyes' keeps the Hebrew imagery; the jussive nuance is conveyed by 'let.' Initial 'So' captures the connective force in context.
- source_word: כִּי עַל יוֹם טוֹב בָּאנוּ
  chosen: for we have come on a festive day
  alternatives:
  - for we have come on a good day
  - for we have come at a feast time
  lexicon: HALOT
  rationale: יוֹם טוֹב literally 'good day,' but in this setting of sheep-shearing celebration it denotes an auspicious or festive occasion. 'Festive day' communicates the social context without over-paraphrasing.
- source_word: תְּנָה נָּא
  chosen: Please give
  alternatives:
  - Give, please
  - Please grant
  lexicon: HALOT
  rationale: Imperative with particle נָא expresses polite entreaty. 'Please give' is clear modern English.
- source_word: אֵת אֲשֶׁר תִּמְצָא יָדְךָ
  chosen: whatever your hand finds
  alternatives:
  - whatever you can spare
  - whatever comes to hand
  lexicon: HALOT
  rationale: Literally 'what your hand finds.' The idiom refers to what is available or within one's means to give. The main text keeps the Hebrew image; a more idiomatic alternative is worth preserving in a footnote.
- source_word: לַעֲבָדֶיךָ
  chosen: to your servants
  alternatives:
  - to your slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave. Here David speaks deferentially to Nabal, and the bonded-status nuance is not the main point; 'servants' best fits the social politeness of the appeal.
- source_word: וּלְבִנְךָ לְדָוִד
  chosen: and to your son David
  alternatives:
  - and to David your son
  lexicon: HALOT
  rationale: David refers to himself humbly as Nabal's 'son,' a deferential self-designation rather than a literal filial claim. Preserving 'your son David' keeps the rhetoric of humility explicit.
