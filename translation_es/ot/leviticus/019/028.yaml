translation:
  language: es
  text: No harás cortes en tu carne por los muertos[a], ni te harás una marca tatuada[b]. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por una persona muerta». La expresión hebrea es idiomática y normalmente se refiere al duelo por los muertos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una marca inscrita» o «un tatuaje». La expresión hebrea es rara y probablemente se refiere a una marca permanente en el cuerpo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׂרֶט
  english_pob_choice: cuts
  chosen_spanish: cortes
  alternatives_spanish:
  - incisiones
  - cortes en la piel
  - heridas
  lexicon: HALOT
  rationale: El término denota un corte o incisión hecha en el cuerpo. «Cortes» conserva la fuerza concreta y prohibitiva sin agregar más de lo que el hebreo dice.
- source_word: לָנֶפֶשׁ
  english_pob_choice: for the dead
  chosen_spanish: por los muertos
  alternatives_spanish:
  - por un muerto
  - por el difunto
  - por una persona muerta
  lexicon: HALOT
  rationale: En este contexto legal, la expresión es idiomática y alude al duelo por los muertos. «Por los muertos» transmite ese sentido natural en español sin fijarlo demasiado en una sola formulación.
- source_word: בִּבְשַׂרְכֶם
  english_pob_choice: in your flesh
  chosen_spanish: en tu carne
  alternatives_spanish:
  - en vuestra carne
  - en su carne
  - en vuestro cuerpo
  lexicon: HALOT
  rationale: «Carne» preserva el lenguaje corporal concreto del hebreo. Se opta por segunda persona singular genérica para una lectura fluida y bíblica en español, sin perder el valor colectivo del mandamiento.
- source_word: כְתֹבֶת קַעֲקַע
  english_pob_choice: tattoo mark
  chosen_spanish: marca tatuada
  alternatives_spanish:
  - inscripción tatuada
  - marca inscrita
  - tatuaje
  lexicon: HALOT
  rationale: La expresión hebrea rara combina la idea de escribir/marcar con קַעֲקַע. «Marca tatuada» mantiene la idea de una señal permanente sobre el cuerpo sin imponer un tecnicismo moderno más fuerte que el texto.
- source_word: לֹא תִתְּנוּ ... בָּכֶם
  english_pob_choice: you shall not put ... on yourselves
  chosen_spanish: ni pondrás sobre ti
  alternatives_spanish:
  - ni pondréis sobre vosotros
  - ni colocarás sobre ti
  - ni te pondrás
  lexicon: HALOT
  rationale: El verbo נתן con ב expresa aplicar o poner algo sobre el cuerpo. «Pondrás sobre ti» suena natural en español y conserva la prohibición directa. Se usa singular genérico por estilo normativo bíblico en español.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy el Yahvé
  - Yo soy el SEÑOR
  - Yo soy Yahvéh
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según la terminología del proyecto para יהוה, en vez de sustituirlo por «SEÑOR». «Yo soy Yahvé» reproduce la fórmula de autoidentificación de forma clara y reverente.
theological_decisions:
- issue: Alcance de la prohibición sobre marcas corporales
  english_pob_reading: Translate the Hebrew practice-language directly as a prohibition of cuttings for the dead and a tattoo mark on the body
  chosen_spanish_reading: 'Traducir directamente la práctica prohibida: cortes por duelo por los muertos y una marca tatuada sobre el cuerpo'
  alternative_spanish_readings:
  - Limitarlo solo a ritos funerarios paganos
  - Entenderlo como una prohibición universal de todo tatuaje moderno
  rationale: El versículo relaciona explícitamente la primera prohibición con el duelo por los muertos y luego prohíbe la marca tatuada sin repetir esa explicación. La traducción debe exponer lo que dice el hebreo sin estrechar ni ampliar su alcance interpretativo.
  doctrine_reference: Primacía del texto original; preservar la tensión interpretativa sin resolverla en la traducción.
translation_notes:
  revision_awareness: El contexto inglés del POB muestra una revisión menor de estilo («cuts» frente a «cuttings») sin cambio de sentido. En español, «cortes» mantiene la naturalidad y la fidelidad semántica. También se conserva la decisión auditada de traducir יהוה como «Yahvé» y de no resolver el debate interpretativo sobre tatuajes modernos dentro del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יהוה, conforme al estándar del proyecto.
  - Se conserva «carne» para בשר para respetar la imaginería corporal concreta.
  - La primera prohibición queda vinculada al duelo; la segunda se expresa de modo separado, como en el hebreo.
  - Las notas al pie usan marcadores únicos y aparecen ancladas en el texto con formato [a] y [b].
