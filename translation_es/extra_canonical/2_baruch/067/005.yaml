translation:
  language: es
  text: Pero después de estas cosas, serán apresados por la tribulación en la dispersión entre las naciones, y habitarán en vergüenza en todo lugar.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: net'aḥdūn / seized by tribulation
  english_pob_choice: they will be seized by tribulation
  chosen_spanish: serán alcanzados por la tribulación
  alternatives_spanish:
  - serán apresados por la tribulación
  - serán atrapados por la tribulación
  lexicon: No inventar número de léxico; decisión basada en el valor de captura/ser tomado por una aflicción que sobreviene.
  rationale: En español, 'ser alcanzados por' conserva la idea pasiva de quedar sorprendidos o tomados por una tribulación sin volverlo excesivamente interpretativo. 'Apresados' o 'atrapados' son posibles, pero suenan más abruptos o menos solemnes para este contexto apocalíptico.
- source_word: dispersion among the nations
  english_pob_choice: in the dispersion among the nations
  chosen_spanish: en la dispersión entre las naciones
  alternatives_spanish:
  - en el destierro entre las naciones
  - en la diáspora entre las naciones
  lexicon: No inventar número de léxico; mantener el sustantivo de dispersión con el complemento entre las naciones.
  rationale: '''Dispersión'' refleja bien la idea de dispersión/exilio colectivo sin imponer una terminología eclesiástica. ''Diáspora'' sería posible, pero ''dispersión'' es más transparente y directamente informativa en español.'
- source_word: dwell in shame
  english_pob_choice: they will dwell in shame
  chosen_spanish: habitarán en vergüenza
  alternatives_spanish:
  - vivirán en vergüenza
  - morarán en vergüenza
  lexicon: No inventar número de léxico; preservar el verbo de residencia con el sustantivo de deshonra.
  rationale: '''Habitarán'' mantiene el tono bíblico y literal de residir permanentemente. ''En vergüenza'' reproduce la condición de deshonra sin suavizarla.'
- source_word: in every place
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - por todos lados
  lexicon: No inventar número de léxico; equivalencia adverbial común.
  rationale: '''En todo lugar'' es la forma más natural y fiel en español para expresar universalidad espacial.'
- source_word: Yet after these things
  english_pob_choice: Yet after these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Y después de estas cosas
  - Pero después de estas cosas
  lexicon: No inventar número de léxico; conector temporal que introduce la secuencia profética.
  rationale: Se omite 'Yet/pero' porque aquí el giro temporal ya queda bien marcado por 'Después de estas cosas' y evita una dureza innecesaria en español, sin perder el valor de transición del original.
theological_decisions:
- issue: Suffering of the dispersed among the nations
  english_pob_reading: they will be seized by tribulation in the dispersion among the nations
  chosen_spanish_reading: serán alcanzados por la tribulación en la dispersión entre las naciones
  alternative_spanish_readings:
  - serán apresados por la tribulación en la dispersión entre las naciones
  - serán envueltos por la tribulación en la dispersión entre las naciones
  rationale: La lectura mantiene que la tribulación es algo que sobreviene a los dispersos, sin convertirla en una idea abstracta ni suavizar su fuerza punitiva. No se introducen explicaciones adicionales sobre causalidad o propósito que no están en el texto.
  doctrine_reference: 2 Baruch apocalyptic judgment and dispersion motif
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió un error grave: reemplazó una traducción truncada y ajena al siríaco (''they will understand...[b]'') por una lectura de aflicción y dispersión. El español sigue esa lectura corregida y evita cualquier remanente del texto truncado o del marcador huérfano.'
  spanish_consistency_notes:
  - Se usa 'dispersión' de manera consistente con el motivo de exilio entre las naciones.
  - Se mantiene el registro bíblico con 'habitarán' para 'dwell'.
  - No se introduce 'SEÑOR' ni otras sustituciones devocionales no atestiguadas en este versículo.
