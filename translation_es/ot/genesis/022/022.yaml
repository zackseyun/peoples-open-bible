lexical_decisions:
- source_word: כֶּשֶׂד
  english_pob_choice: Kesed
  chosen_spanish: Kesed
  alternatives_spanish:
  - Chesed
  lexicon: HALOT
  rationale: Nombre propio en una lista genealógica; se translitera, no se traduce. Mantengo 'Kesed' como forma básica, y señalo 'Chesed' como alternativa fonética posible en español.
- source_word: חֲזוֹ
  english_pob_choice: Hazo
  chosen_spanish: Hazo
  alternatives_spanish:
  - Jazo
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración habitual. En español podría sonar 'Jazo' si se adaptara la grafía al valor de la h aspirada inglesa, pero 'Hazo' respeta mejor la forma del POB en inglés.
- source_word: פִּלְדָּשׁ
  english_pob_choice: Pildash
  chosen_spanish: Pildash
  lexicon: HALOT
  rationale: Nombre propio; la transliteración directa es la opción adecuada. No hay base para traducirlo.
- source_word: יִדְלָף
  english_pob_choice: Jidlaph
  chosen_spanish: Jidlaf
  alternatives_spanish:
  - Yidlaf
  lexicon: HALOT
  rationale: Nombre propio; mantengo la transliteración del POB con adaptación ortográfica española de la consonante final a 'f'. En español, la inicial puede representarse con 'J' por convención bíblica tradicional, y 'Yidlaf' queda como alternativa más fonética.
- source_word: בְּתוּאֵל
  english_pob_choice: Bethuel
  chosen_spanish: Betuel
  alternatives_spanish:
  - Bethuel
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico la forma natural es 'Betuel'. Conservo la equivalencia de nombre propio sin añadir contenido interpretativo.
- source_word: וְאֶת / וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La secuencia waw + marcador de objeto introduce cada elemento de la lista. En español genealógico se expresa con coordinación simple. 'Y' es la forma normal; 'e' sería posible solo por eufonía ante ciertos sonidos, pero aquí no es necesario.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alta concordancia y no muestran revisiones aplicadas; por eso la versión española sigue de cerca la transliteración establecida, sin añadir notas textuales ni variantes críticas.
  spanish_consistency_notes:
  - Conservo la lista nominal con coma serial y 'y' final, como corresponde a una genealogía breve.
  - Uso mayúscula inicial en todos los nombres propios y no añado artículos ni glosas.
  - Evito 'SEÑOR', 'Cristo' u այլ terminología doctrinal porque el versículo contiene solo nombres propios.
