  text: 「화가 있으리니, 서기관들과 바리새인들, 위선자들아! 너희가 과부들의 집을 삼키며 핑계 삼아 길게 기도하니, 그러므로 더 무거운 심판을 받게 될 것입니다.」
  philosophy: optimal-equivalence
