revisions:
- from: Y pondré un lugar para mi pueblo Israel, y lo plantaré[a]; y habitará en su propio lugar y no será perturbado más. Y los hijos de maldad[b] no seguirán desgastándolo, como al principio[c].
  to: Y pondré un lugar para mi pueblo Israel, y los plantaré; y habitarán en su propio lugar y no serán perturbados nunca más. Y los hijos de maldad[a] no seguirán desgastándolos, como al principio[b].
  rationale: Se revisa para alinearse con la decisión documentada del POB de explicitar en plural las referencias colectivas a Israel, evitando ambigüedades poco naturales en español. Se conservan las elecciones léxicas principales ('lugar', 'plantar', 'habitar', 'hijos de maldad') y se mantienen las alternativas pertinentes en notas. También se mejora la fluidez de עוֹד con 'nunca más'.
  reviewer_model: gpt-5.4
