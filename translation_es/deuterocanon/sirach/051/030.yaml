revisions:
- from: Hagan su trabajo en justicia[a], y él les dará su recompensa en su tiempo. Bendito sea Yahvé para siempre, y alabado su nombre de generación en generación.
  to: Hagan su trabajo con rectitud, y él les dará su recompensa en su tiempo[a]. Bendito sea Yahvé para siempre, y alabado sea su nombre de generación en generación.
  rationale: Se corrige la ubicación de la nota para que ancle la expresión que realmente explica ('en su tiempo'). Se ajusta 'en justicia' a 'con rectitud' por naturalidad y fidelidad al matiz ético de בִצְדָקָה en español. También se añade 'sea' en la segunda cláusula doxológica para mejorar paralelismo y fluidez sin alterar el sentido.
