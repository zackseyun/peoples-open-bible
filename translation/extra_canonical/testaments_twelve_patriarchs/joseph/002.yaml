theological_decisions:
- issue: Reference of 'the God of my father'
  chosen_reading: Singular 'my father' retained
  alternative_readings:
  - the God of my fathers
  rationale: The Greek witness is singular and suits Joseph’s personal filial appeal to Jacob in this autobiographical section. Retaining the singular preserves the intimacy of the testimony.
  doctrine_reference: Original-language primacy over translation tradition
- issue: Metaphorical force of 'burning flame'
  chosen_reading: Kept as metaphor rather than explicated as lust
  alternative_readings:
  - from the fire of lust
  - from adulterous passion
  rationale: The Greek image is vivid and the context makes its moral reference clear. Preserving the metaphor respects the source and avoids interpretive over-paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Scope of divine help in 'he stands over us'
  chosen_reading: Rendered with protective oversight language
  alternative_readings:
  - he leads
  - he stands by
  - he rules
  rationale: The Greek allows several nuances. The chosen rendering keeps the image broad enough to include oversight and support without narrowing it to governance alone.
  doctrine_reference: Preserve theological tension rather than resolve it
