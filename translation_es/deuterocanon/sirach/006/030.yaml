translation:
  language: es
  text: Su yugo es un adorno de oro[a], y sus ataduras son un cordón azul[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conserva aquí la imagen de ''yugo'', mientras que el griego paralelo enfatiza el sentido de adorno (''un adorno de oro sobre ella''). La traducción procura conservar ambos sentidos: es un yugo que también es un adorno de oro.'
    reason: alternative_reading
  - marker: b
    text: O 'un cordón azul violáceo' o 'un cordón azul jacinto'. El término alude a un hilo teñido de azul-violeta de gran valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻלֵּי / עֻלָּהּ; κόσμος ... ἐπ᾽ αὐτῆς
  english_pob_choice: yoke / ornament
  chosen_spanish: yugo / adorno
  alternatives_spanish:
  - yugo / ornamento
  - collar / adorno
  lexicon: HALOT; LXX paralelo de Sirach 6:30
  rationale: El hebreo conserva la imagen de yugo, mientras que el griego destaca el sentido de adorno sobre ella. En español, 'yugo' mantiene la tensión de disciplina o sujeción, y 'adorno' recoge el matiz ornamental del paralelo griego sin borrar la imagen hebrea.
- source_word: זָהָב; χρυσὸς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorado
  - de oro fino
  lexicon: HALOT
  rationale: '''De oro'' es natural en español y preserva el valor material explícito sin añadir matices no presentes en el texto.'
- source_word: מוֹסְרוֹתֶיהָ; δεσμοὶ αὐτῆς
  english_pob_choice: bonds
  chosen_spanish: vínculos
  alternatives_spanish:
  - lazos
  - ataduras
  - bonds
  lexicon: HALOT; LXX paralelo de Sirach 6:30
  rationale: '''Vínculos'' comunica la idea de unión o sujeción de modo claro y digno en español. ''Ataduras'' sería más áspero; ''lazos'' puede sonar más afectivo que el término hebreo.'
- source_word: פְּתִיל; κλῶσμα
  english_pob_choice: cord
  chosen_spanish: cordón
  alternatives_spanish:
  - cordel
  - hilo
  - cuerda
  lexicon: HALOT
  rationale: '''Cordón'' es un término intermedio adecuado: conserva la imagen de hilo trenzado o cordel y suena más natural y publicable que ''hilo'' para esta metáfora.'
- source_word: תְּכֵלֶת; ὑάκινθινον
  english_pob_choice: blue thread
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - azul jacinto
  - hilo azul
  lexicon: HALOT; LXX paralelo de Sirach 6:30
  rationale: El término designa un tinte azul-violeta valioso, pero en una lectura pública española 'azul' comunica el color básico con claridad. Se evita sobrecargar el verso con un tecnicismo cromático en el texto principal.
theological_decisions:
- issue: Tensión entre disciplina y ornamento en la metáfora de Sabiduría
  english_pob_reading: Preserve both the 'yoke/bonds' imagery and the beautifying language in the same verse
  chosen_spanish_reading: Mantener 'yugo' junto con 'adorno' y 'vínculos' para no resolver la imagen en una sola dirección
  alternative_spanish_readings:
  - '''Su ornamento es de oro, y sus lazos son un cordón azul'' (solo ornamental)'
  - '''Su yugo es de oro, y sus vínculos son una atadura azul'' (solo restrictiva)'
  rationale: 'El hebreo y el griego sostienen una tensión intencional: la relación con la Sabiduría implica sujeción, pero una sujeción valiosa y hermosa. El español conserva esa ambivalencia sin diluirla.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador permanece estable y coincide sustancialmente con el estado auditado previo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y se mantiene la terminología concreta del pasaje, ya que no interviene el tetragrámaton ni un título divino aquí.
  - '''Adorno'' y ''vínculos'' conservan la doble línea semántica del hebreo y del paralelo griego sin forzar una paráfrasis.'
  - El color se simplifica a 'azul' en el texto principal por claridad pública, pero la nota retiene la alternativa cromática más precisa.
