translation:
  language: es
  text: Yo seré condenado[a]; ¿por qué entonces he de esforzarme en vano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seré malvado». El verbo hebreo puede expresar tanto un sentido moral («ser malvado») como un sentido forense («ser declarado culpable» o «ser condenado»).'
    reason: alternative_reading
lexical_decisions:
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - yo
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente se conserva en español para mantener el énfasis del hebreo. Se antepone sin necesidad de repetirlo luego en la conjugación.
- source_word: אֶרְשָׁע
  english_pob_choice: will be condemned
  chosen_spanish: sería condenado
  alternatives_spanish:
  - seré condenado
  - sería declarado culpable
  - sería hallado culpable
  - sería malo
  lexicon: HALOT
  rationale: 'Se adopta el sentido forense documentado por la POB inglesa: no una descripción moral simple, sino la idea de ser declarado culpable/condenado. En español, el condicional con valor potencial en la pregunta retórica refleja mejor la fuerza contextual que un futuro rígido.'
- source_word: לָמָה זֶּה
  english_pob_choice: why then
  chosen_spanish: ¿por qué, pues?
  alternatives_spanish:
  - ¿por qué entonces?
  - ¿por qué, en ese caso?
  - ¿para qué, pues?
  lexicon: HALOT
  rationale: La partícula idiomática se vierte de manera natural en español con 'pues' para expresar la inferencia del contexto, equivalente al 'then' inglés de la POB.
- source_word: הֶבֶל
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - vanamente
  - sin provecho
  - para nada
  lexicon: HALOT
  rationale: '''En vano'' expresa bien la futility/emptiness del sustantivo hebreo en este contexto y es el equivalente español más idiomático y fiel.'
- source_word: אִיגָע
  english_pob_choice: should I labor
  chosen_spanish: me fatigaría
  alternatives_spanish:
  - me esforzaría
  - me cansaría
  - trabajaría
  - me afanaría
  lexicon: HALOT
  rationale: יגע comunica trabajo acompañado de desgaste. 'Fatigaría' mantiene el matiz de esfuerzo penoso y evita reducirlo a simple 'trabajaría'.
theological_decisions:
- issue: Sentido forense versus moral de רשע
  english_pob_reading: 'forensic: ''I will be condemned'''
  chosen_spanish_reading: 'forense: ''sería condenado'''
  alternative_spanish_readings:
  - 'moral: ''sería malo'''
  - '''sería culpable'''
  - '''sería declarado perverso'''
  rationale: El contexto de Job 9:28-31 trata del intento de Job por mostrarse inocente ante Dios; por eso conviene conservar la tensión judicial del verbo y no moralizarlo sin necesidad. El español 'sería condenado' mantiene esa ambigüedad judicial con naturalidad.
  doctrine_reference: Mantener la tensión exegética del original; primacía del hebreo sobre la tradición devocional.
translation_notes:
  revision_awareness: El texto sigue la evaluación de alta concordancia del audit trail inglés, sin cambios revisados posteriores; se conserva la decisión forense principal y la nota alternativa del hebreo.
  spanish_consistency_notes:
  - Se evita 'pecador' o 'malo' en el cuerpo principal para no borrar la tensión judicial documentada.
  - '''En vano'' mantiene la equivalencia natural de הבל sin añadir una paráfrasis interpretativa.'
  - '''Yo'' se conserva para reflejar el énfasis del pronombre independiente אָנֹכִי.'
  - La puntuación reproduce una pregunta retórica fluida en español, con el valor inferencial de לָמָה זֶּה expresado por 'pues'.
