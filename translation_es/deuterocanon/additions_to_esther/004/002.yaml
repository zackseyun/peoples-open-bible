- from: Y cuando se había hecho visible[a], habiendo invocado a Dios, el supervisor[b] de todos y Salvador, tomó a las dos doncellas[c].
  to: Y cuando apareció[a], habiendo invocado a Dios, el que vela por todos[b] y Salvador, tomó a las dos doncellas[c].
