revisions:
- from: Sus puertas se hundieron en la tierra; él[a] destruyó y rompió sus cerrojos. Su rey y sus príncipes están entre las naciones; no hay ley. Hasta sus profetas no encontraron visión de Yahvé.
  to: Sus puertas se hundieron en la tierra; destruyó y rompió sus cerrojos. Su rey y sus príncipes están entre las naciones; no hay ley[a]. Hasta sus profetas no encontraron visión de Yahvé.
  rationale: La revisión elimina la explicitación indebida del sujeto («él[a]») para preservar la ambigüedad del hebreo y la decisión auditada. También reemplaza la nota teológica innecesaria por la nota léxica documentada sobre תּוֹרָה, manteniendo «ley» en el texto principal y «instrucción» como alternativa. No se requiere adjudicación adicional.
