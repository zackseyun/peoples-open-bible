translation:
  language: es
  text: Reyes serán tus padres de crianza[a], y sus princesas tus nodrizas. Con el rostro en tierra se inclinarán ante ti, y lamerán el polvo de tus pies. Entonces sabrás que yo soy Yahvé; no serán avergonzados los que esperan en mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tus padres adoptivos’. El término hebreo puede designar a quienes crían, sostienen o protegen.
    reason: lexical_alternative
  - marker: b
    text: O ‘los que ponen su esperanza en mí’. El verbo hebreo incluye tanto espera como expectativa confiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְנַיִךְ
  english_pob_choice: your foster fathers
  chosen_spanish: tus padres de crianza
  alternatives_spanish:
  - tus padres adoptivos
  - tus tutores
  - tus criadores
  lexicon: HALOT
  rationale: El sustantivo puede denotar a quienes crían, sostienen o protegen. ‘Padres de crianza’ conserva el vínculo de crianza y patrocinio sin reducirlo a una tutela legal moderna. Se evita ‘tutores’ por perder la imagen parental paralela a ‘nodrizas’.
- source_word: שָׂרוֹתֵיהֶם
  english_pob_choice: their princesses
  chosen_spanish: sus princesas
  alternatives_spanish:
  - sus reinas
  - sus nobles
  lexicon: HALOT
  rationale: El plural femenino de שׂר designa mujeres de rango o autoridad. ‘Princesas’ es natural en español junto a ‘reyes’ y mantiene la correspondencia de estatus. ‘Reinas’ podría sonar más interpretativo.
- source_word: מֵינִיקֹתַיִךְ
  english_pob_choice: your nursing mothers
  chosen_spanish: tus nodrizas
  alternatives_spanish:
  - tus madres lactantes
  - las que te amamantan
  lexicon: HALOT
  rationale: ‘Nodrizas’ es el equivalente más directo y digno para la figura de mujeres que crían/amamantan. Conserva mejor el matiz histórico que ‘madres lactantes’, que suena explicativo.
- source_word: אַפַּיִם אֶרֶץ
  english_pob_choice: with faces to the ground
  chosen_spanish: con el rostro hacia la tierra
  alternatives_spanish:
  - con la cara en tierra
  - postrados hasta el suelo
  lexicon: HALOT
  rationale: La locución expresa postración. ‘Con el rostro hacia la tierra’ comunica la imagen de manera clara y solemne en español, sin perder el componente corporal del hebreo.
- source_word: יִשְׁתַּחֲווּ לָךְ
  english_pob_choice: they will bow down to you
  chosen_spanish: se inclinarán ante ti
  alternatives_spanish:
  - se postrarán ante ti
  - te rendirán homenaje
  lexicon: HALOT
  rationale: ‘Inclinarse ante’ expresa homenaje y postración sin sugerir por sí mismo adoración divina, que no es lo que el contexto inmediato exige. Se preserva así la tensión política/social del gesto.
- source_word: וַעֲפַר רַגְלַיִךְ יְלַחֵכוּ
  english_pob_choice: they will lick the dust of your feet
  chosen_spanish: lamerán el polvo de tus pies
  alternatives_spanish:
  - lamerán el polvo de tus pies
  - lamerán el polvo junto a tus pies
  lexicon: HALOT
  rationale: Se mantiene la imagen intensa de humillación y sumisión total. ‘Polvo de tus pies’ es la forma más natural en español y conserva la relación directa con los pies.
- source_word: וְיָדַעַתְּ
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrás
  alternatives_spanish:
  - Y sabrás entonces
  - Así sabrás
  lexicon: HALOT
  rationale: En este contexto profético, la conjunción aporta consecuencia. ‘Entonces’ refleja mejor el valor resultativo que un simple ‘y’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto de transliterar el Nombre divino como ‘Yahvé’, preservando la designación personal de Dios en lugar de sustituirla por un título.
- source_word: לֹא יֵבֹשׁוּ
  english_pob_choice: will not be put to shame
  chosen_spanish: no serán avergonzados
  alternatives_spanish:
  - no quedarán avergonzados
  - no serán puestos en vergüenza
  lexicon: HALOT
  rationale: La forma pasiva en español transmite bien la idea de no acabar en deshonra pública. ‘No serán avergonzados’ es idiomático y suficientemente fuerte.
- source_word: קוָֹי
  english_pob_choice: those who wait for me
  chosen_spanish: los que esperan en mí
  alternatives_spanish:
  - los que aguardan en mí
  - los que confían en mí
  - los que esperan por mí
  lexicon: HALOT
  rationale: El participio puede implicar espera confiada y anhelante. ‘Esperan en mí’ conserva la dimensión temporal y la de confianza; ‘en mí’ refleja mejor la orientación de dependencia que un simple ‘por mí’.
theological_decisions:
- issue: Cómo traducir la postración de los reyes y princesas ante Sion
  english_pob_reading: Rendered as political/social homage ('bow down to you') rather than divine worship.
  chosen_spanish_reading: se inclinarán ante ti
  alternative_spanish_readings:
  - se postrarán ante ti
  - te adorarán
  rationale: El hebreo admite postración y homenaje. En este contexto se trata de honor hacia Sion restaurada, no de culto divino. ‘Se inclinarán ante ti’ evita introducir adoración donde el texto no la exige.
  doctrine_reference: Mantener la tensión teológica del texto sin sobreinterpretar el gesto.
- issue: Cómo verter el Nombre divino יְהוָה
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Aunque el expediente inglés usa ‘the LORD’ por convención, la política del proyecto en español pide ‘Yahvé’ para el Nombre revelado. Esta decisión preserva la transparencia con el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador inicial del expediente en inglés pasó de ‘guardians’ a ‘foster fathers’ para ajustar mejor אֹמְנַיִךְ en paralelo con ‘nursing mothers’. En español se optó por ‘padres de crianza’ para conservar esa misma relación de crianza y protección sin perder naturalidad. También se siguió la directriz del proyecto español de usar ‘Yahvé’ para יְהוָה, aunque el audit trail inglés use ‘the LORD’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para יְהוָה según la norma del proyecto español.
  - ‘Padres de crianza’ conserva la imagen parental y la idea de crianza/protección del hebreo.
  - ‘Nodrizas’ es un equivalente sobrio y claro para מֵינִיקֹתַיִךְ.
  - La frase final mantiene la doble posibilidad de espera/confianza mediante la nota.
  - Se evitó ‘adorarán’ para יִשְׁתַּחֲווּ porque el contexto inmediato es de homenaje político-social.
