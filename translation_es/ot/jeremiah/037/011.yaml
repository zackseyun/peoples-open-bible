review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura temporal, el sentido causal de מִפְּנֵי, y preserva correctamente «caldeos» para הַכַּשְׂדִּים. También refleja la decisión auditada del inglés de mantener de forma más literal el verbo «subir/ir arriba» en vez de explicitar «retirarse». Sin embargo, «había subido de Jerusalén» suena poco natural en español para este contexto de sitio y no reproduce bien la locución inglesa auditada «had gone up from Jerusalem».
  spanish_quality_summary: 'La principal dificultad es de legibilidad idiomática: «había subido de Jerusalén» resulta extraño en español moderno; «había salido de Jerusalén» o «había partido de Jerusalén» sería más natural, pero diluiría la decisión inglesa de conservar עלה. Una solución fiel y más clara es «había levantado el campamento de Jerusalén», pero eso ya interpreta más. Dado que el inglés auditado mantuvo «had gone up», la mejor reparación mínima en español es «había partido de Jerusalén» solo si se priorizara claridad; pero como se debe respetar el audit trail léxico, conviene usar una forma que conserve la nota explicativa y mejore algo la naturalidad: «había subido desde Jerusalén» sigue siendo raro. Por ello se recomienda una revisión moderada con formulación más natural y una nota que preserve la tensión léxica.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «caldeos», «ejército» y «faraón» están bien. No hay términos teológicos especiales en este versículo.
  issues:
  - severity: medium
    issue: «había subido de Jerusalén» es poco idiomático en español
    rationale: Aunque intenta seguir de cerca עלה y el inglés revisado «had gone up», en español esa combinación con «de Jerusalén» suena forzada y puede confundir al lector sobre la dirección o la acción militar.
  - severity: low
    issue: La frase queda como fragmento con punto final
    rationale: El hebreo y el inglés también presentan un arranque de oración dependiente del v. 12, así que no es un error; pero en español conviene mantener la coma final para señalar continuidad en vez de cerrar con punto.
  revised_spanish_text: Ahora bien, cuando el ejército de los caldeos[a] había salido[b] de Jerusalén por causa del ejército del faraón,
  revised_footnotes:
  - marker: a
    text: «caldeos» conserva el etnónimo del hebreo; en el contexto histórico se refiere a la fuerza imperial babilónica, pero la traducción mantiene el término fuente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «había subido». En contexto militar, la expresión alude a que el ejército levantó el sitio y se retiró por causa del ejército del faraón.
    reason: lexical_alternative
  revision_rationale: Se ajusta «había subido» a «había salido» para lograr español natural y comprensible, mientras la nota conserva la elección léxica hebrea literal y el matiz contextual de retirada. También se cambia «a causa del» por «por causa del» y se deja coma final para reflejar que el versículo continúa en la siguiente línea narrativa.
