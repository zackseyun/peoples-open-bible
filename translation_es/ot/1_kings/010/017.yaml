    text: Hebrew literally, 'three minas of gold went up on the one shield,' that is, each shield had three minas of gold applied to it.
    reason: lexical_alternative
  - marker: c
    text: The House of the Forest of Lebanon was a named royal building or armory associated with Solomon's palace complex (cf. 1 Kgs 7:2).
