translation:
  language: es
  text: Pero el corazón de Faraón se endureció[a], y no los escuchó, tal como Yahvé había hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el corazón de Faraón se puso duro'. El verbo hebreo puede traducirse más literalmente como 'se volvió fuerte/firme', aquí en el sentido de endurecimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  english_pob_choice: was hardened
  chosen_spanish: se endureció
  alternatives_spanish:
  - se hizo fuerte
  - se fortaleció
  - se volvió duro
  lexicon: HALOT
  rationale: El verbo חזק aquí expresa el estado resultante del corazón de Faraón. En español, 'se endureció' comunica con naturalidad la idea de endurecimiento del corazón sin forzar una pasiva explícita ni introducir agente no expresado en el hebreo.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - mente
  - interior
  lexicon: HALOT
  rationale: '''Corazón'' conserva el antropologismo hebreo de lֵב y es idiomático en español bíblico para la sede de la voluntad y la disposición interior.'
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón
  lexicon: Transliteración estándar
  rationale: Nombre/título propio tradicional y claro en español.
- source_word: שָׁמַע אֲלֵהֶם
  english_pob_choice: did not listen to them
  chosen_spanish: no les hizo caso
  alternatives_spanish:
  - no los escuchó
  - no les prestó atención
  - no obedeció a ellos
  lexicon: HALOT
  rationale: שׁמע con אֶל indica atender, escuchar con obediencia. 'No les hizo caso' comunica bien esa falta de atención/obediencia en español moderno, sin perder el matiz relacional.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - justo como
  - así como
  lexicon: HALOT
  rationale: '''Tal como'' expresa correspondencia y cumplimiento con naturalidad en español, equivalente a la función comparativa/confirmatoria de כַּאֲשֶׁר.'
- source_word: דִּבֶּר
  english_pob_choice: had spoken
  chosen_spanish: había hablado
  alternatives_spanish:
  - había dicho
  - habló
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja la prioridad de la palabra divina pronunciada antes del cumplimiento narrado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: POB project default
  rationale: Se conserva el nombre divino del tetragrámaton según el estándar del proyecto, en lugar de sustituirlo por 'Señor'.
theological_decisions:
- issue: Agencia en el endurecimiento del corazón de Faraón
  english_pob_reading: Render the clause as a state/result ('Pharaoh's heart was hardened') without explicitly naming God as the direct agent in this verse.
  chosen_spanish_reading: 'Presentar el endurecimiento como estado/resultante: ''el corazón de Faraón se endureció'', sin nombrar aquí un agente directo.'
  alternative_spanish_readings:
  - Dios endureció el corazón de Faraón
  - Faraón endureció su corazón
  - el corazón de Faraón se puso duro
  rationale: El hebreo no explicita en este versículo un sujeto agente; por eso la traducción debe preservar la tensión narrativa de Éxodo entre endurecimiento humano y divino sin resolverla prematuramente. La forma reflexiva en español mantiene el foco en el estado del corazón.
  doctrine_reference: Preservar la tensión teológica de Éxodo sin sobreespecificar la agencia en este versículo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios; la formulación española sigue de cerca el valor aspectual/resultativo del hebreo y el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - '''Corazón'' conserva el valor antropológico bíblico de לֵב.'
  - La nota al pie mantiene la alternativa léxica del hebreo חזק sin convertirla en una interpretación doctrinal distinta.
