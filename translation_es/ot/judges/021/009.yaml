translation:
  language: es
  text: Y se pasó revista al pueblo[a], y he aquí, no había allí hombre alguno de entre los habitantes de Jabes-Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no había allí nadie de entre los habitantes de Jabes-Galaad». El hebreo dice más literalmente: «no había allí un hombre», con lenguaje masculino que probablemente refleja el contexto representativo o militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפָּקֵד
  english_pob_choice: were mustered
  chosen_spanish: fue pasado revista
  alternatives_spanish:
  - fue reunido
  - fue contado
  - fue inspeccionado
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto militar/corporativo expresa pasar lista o hacer un recuento organizado de los presentes. «Pasado revista» comunica bien la acción de muster sin reducirlo a un simple conteo, y mantiene el matiz administrativo-militar que el contexto exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  - la asamblea
  lexicon: HALOT
  rationale: עָם designa al cuerpo colectivo del Israel reunido. «El pueblo» conserva esa referencia sin sobreespecificar «ejército», aunque el marco sea militar.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y, de pronto
  - y resulta que
  lexicon: HALOT
  rationale: La partícula introduce un descubrimiento repentino. «Y he aquí» preserva el golpe narrativo y la fuerza de atención que tiene la fórmula hebrea.
- source_word: אֵין שָׁם אִישׁ
  english_pob_choice: there was not a man there
  chosen_spanish: no había allí hombre alguno
  alternatives_spanish:
  - no había allí nadie
  - no estaba allí ningún hombre
  - no había allí un hombre
  lexicon: HALOT
  rationale: Se conserva el singular masculino «hombre» porque el hebreo dice literalmente אִישׁ y el texto mantiene la referencia masculina en un contexto de varones aptos para la acción/representación. «Hombre alguno» expresa la negación con naturalidad en español.
- source_word: מִיּוֹשְׁבֵי
  english_pob_choice: from the inhabitants of
  chosen_spanish: de entre los habitantes de
  alternatives_spanish:
  - de los habitantes de
  - de entre quienes habitaban en
  - procedente de los habitantes de
  lexicon: HALOT
  rationale: El participio plural indica a los que moran en el lugar. «De entre los habitantes de» refleja bien el valor distributivo/partitivo del hebreo y resulta idiomático en español.
- source_word: יָבֵשׁ גִּלְעָד
  english_pob_choice: Jabesh-gilead
  chosen_spanish: Jabes-galaad
  alternatives_spanish:
  - Jabes de Galaad
  - Jabes de Galaad
  - Jabes-gilead
  lexicon: HALOT
  rationale: 'Se vierte el topónimo según uso español bíblico transparente: «Jabes-galaad». Mantiene el nombre propio compuesto sin necesidad de calcado inglés.'
theological_decisions:
- issue: Lenguaje masculino singular en la negación existencial
  english_pob_reading: The Hebrew more literally says, 'there was not a man there,' using masculine language that likely reflects the representative or military context.
  chosen_spanish_reading: 'Se conserva «hombre» en singular masculino: «no había allí hombre alguno».'
  alternative_spanish_readings:
  - no había allí nadie
  - no había allí ninguna persona
  rationale: El hebreo usa אִישׁ, y el POB ya señaló que esa formulación masculina probablemente refleja el contexto representativo o militar. Neutralizarla borraría una tensión lexical documentada. En español, mantener «hombre» preserva la forma del original sin impedir la comprensión.
  doctrine_reference: Principio de equivalencia formal con atención al valor lexical del hebreo; política POB sobre lenguaje masculino representativo cuando el contexto lo justifica.
translation_notes:
  revision_awareness: El testimonio de revisión más reciente indica que no fueron necesarias modificaciones adicionales; la concordancia externa fue alta y el sentido del versículo quedó estable. Se ha mantenido la lectura del auditor inglés respecto de la fuerza militar de «were mustered» y la nota sobre el singular masculino.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo del hebreo con una coordinación simple («Y… y he aquí…»).
  - Se preserva el topónimo como nombre propio bíblico en forma española usual.
  - La nota al pie recoge la alternativa neutra sin borrar la precisión masculina del texto base.
