id: MRK.7.30
reference: Mark 7:30
source:
  edition: SBLGNT
  text: καὶ ἀπελθοῦσα εἰς τὸν οἶκον αὐτῆς εὗρεν τὸ ⸂παιδίον βεβλημένον ἐπὶ τὴν κλίνην καὶ τὸ δαιμόνιον ἐξεληλυθός⸃.
translation:
  text: And when she went away to her house, she found the child lying on the bed[a], and the demon gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the demon having gone out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθοῦσα
  chosen: when she went away
  alternatives:
  - after she left
  - having gone away
  lexicon: BDAG
  rationale: Aorist participle of ἀπέρχομαι, temporally prior to the main verb εὗρεν. 'When she went away' gives natural English while preserving the sequence. 'Went away' reflects the departure sense better than a bare 'went.'
- source_word: εἰς τὸν οἶκον αὐτῆς
  chosen: to her house
  alternatives:
  - into her house
  - home
  lexicon: BDAG
  rationale: The phrase denotes movement to/into her dwelling. 'To her house' is a transparent rendering of the Greek components and avoids over-idiomatizing as 'home,' though that would also fit contextually.
- source_word: εὗρεν
  chosen: she found
  alternatives:
  - she discovered
  lexicon: BDAG
  rationale: Standard rendering of εὑρίσκω in narrative context.
- source_word: παιδίον
  chosen: the child
  alternatives:
  - the little child
  - the girl
  lexicon: BDAG
  rationale: παιδίον can mean 'child' or, contextually, a young child. Since the immediate Greek here uses the neutral term rather than explicitly 'daughter' or 'girl,' 'the child' best preserves the source wording while remaining natural. The context makes clear this is her daughter.
- source_word: βεβλημένον
  chosen: lying
  alternatives:
  - thrown
  - laid
  lexicon: BDAG
  rationale: Perfect passive participle of βάλλω literally suggests 'having been thrown/placed,' but in this idiom with ἐπὶ τὴν κλίνην it describes the child's state on the bed. 'Lying' is the most natural English result-state rendering without implying violence not required by the context. The more literal 'laid' is possible but less idiomatic here.
- source_word: ἐπὶ τὴν κλίνην
  chosen: on the bed
  alternatives:
  - upon the bed
  - in the bed
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates position/rest as part of the participial description in idiomatic narrative Greek. 'On the bed' is the straightforward rendering; 'in the bed' would be more idiomatic in some English contexts but is less formally aligned to the preposition.
- source_word: δαιμόνιον
  chosen: the demon
  alternatives:
  - the unclean spirit
  - the demon spirit
  lexicon: BDAG
  rationale: δαιμόνιον is best rendered 'demon.' Although the broader context has spoken of an unclean spirit, this verse specifically uses δαιμόνιον, so the translation should reflect that lexical choice.
- source_word: ἐξεληλυθός
  chosen: gone
  alternatives:
  - having gone out
  - departed
  lexicon: BDAG
  rationale: 'Perfect active participle of ἐξέρχομαι describes the completed result: the demon had gone out and was absent. ''Gone'' is concise, natural English that captures the resultant state. The fuller ''having gone out'' is more formally explicit and preserved in a footnote.'
