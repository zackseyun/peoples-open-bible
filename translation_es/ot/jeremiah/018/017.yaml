  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni otros términos sensibles del glosario. La elección 'rostro' mantiene mejor el registro bíblico que 'cara', y 'desastre' concuerda con la decisión auditada para אֵידָם.
