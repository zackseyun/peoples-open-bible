id: ROM.13.1
reference: Romans 13:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πᾶσα ψυχὴ ἐξουσίαις ὑπερεχούσαις ὑποτασσέσθω, οὐ γὰρ ἔστιν ἐξουσία εἰ μὴ ὑπὸ θεοῦ, αἱ δὲ ⸀οὖσαι ⸀ὑπὸ θεοῦ τεταγμέναι εἰσίν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/001.yaml
  text: Let every person be subject to the governing authorities[a], for there is no authority except from God[b], and those that exist have been appointed by God.
translation:
  language: ko
  text: 각 사람은 위에 있는 권세들[a]에 복종하십시오. 하나님으로부터 나오지 않은 권세가 없고, 현존하는 권세들은 하나님께서 세우신 것입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「더 높은 권세들」 「위에 선 권세들」. 헬라어 ἐξουσίαι ὑπερέχουσαι는 위에서 다스리는 통치 권세를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님께서 정하신 것」 「하나님께서 질서지우신 것」. 헬라어 τεταγμέναι(완료 수동태)는 하나님의 질서 안에 두어진 상태를 나타낸다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶσα ψυχὴ
  english_pob_choice: every person
  chosen_korean: 각 사람
  alternatives_korean:
  - 모든 영혼
  - 모든 사람
  lexicon: BDAG
  rationale: '문자적으로는 「모든 영혼」이지만, 코이네 관용에서 분배적 의미의 「각 사람」을 뜻한다. πᾶσα의 분배적 무게를 살린다.'
- source_word: ἐξουσίαις ὑπερεχούσαις
  english_pob_choice: the governing authorities
  chosen_korean: 위에 있는 권세들
  alternatives_korean:
  - 다스리는 권세들
  - 더 높은 권세들
  lexicon: BDAG
  rationale: '정책 지시에 따라 ἐξουσίαι ὑπερέχουσαι→「위에 있는 권세들」로 옮긴다. ὑπερέχω 분사가 「위에 자리한」 통치적 위치를 가리킨다.'
- source_word: ὑποτασσέσθω
  english_pob_choice: be subject
  chosen_korean: 복종하십시오
  alternatives_korean:
  - 순복하십시오
  - 복속하십시오
  lexicon: BDAG
  rationale: '정책 지시에 따라 ὑποτασσέσθω→「복종하십시오」로 옮긴다. 현재 명령법의 질서 안에 자리잡는 복종을 합쇼체로 표현한다.'
- source_word: ὑπὸ θεοῦ
  english_pob_choice: from God / by God
  chosen_korean: 하나님으로부터 / 하나님께서
  alternatives_korean:
  - 하나님께로부터
  lexicon: BDAG
  rationale: '첫 ὑπὸ θεοῦ는 「~로부터」(근원)로, 둘째 τεταγμέναι ὑπὸ θεοῦ는 「하나님께서 세우신」(행위자)으로 자연스럽게 분리한다.'
- source_word: τεταγμέναι
  english_pob_choice: have been appointed
  chosen_korean: 세우신 것
  alternatives_korean:
  - 정해 두신 것
  - 질서지어 두신 것
  lexicon: BDAG
  rationale: τάσσω 완료 수동태는 하나님의 질서지움에서 비롯된 현재 상태를 나타낸다. 「세우신」이 인격적·통치적 문맥에 자연스럽다.
theological_decisions:
- issue: 통치 권세에 대한 바울의 진술의 범위와 강도
  chosen_reading: 위에 있는 권세들이 하나님으로부터 권위를 받으며, 현존하는 권세들이 하나님의 질서 안에 두어져 있다는 본문의 진술을 그대로 보존한다. 모든 통치자의 모든 행위에 대한 무조건적 인정으로 확장하지 않는다.
  alternative_readings:
  - 모든 구체적 정권과 행위가 하나님께 적극 승인받았다는 더 강한 읽기
  - 바울이 추상적 권위 원리만 말한다는 더 약한 읽기
  rationale: '본문은 구체적인 통치 권세를 언급하고, 현존하는 것들이 하나님께 τεταγμέναι 되었다고 말한다. 번역은 그 주장을 보존하되 본문을 넘어서는 신학적 결론을 더하지 않는다.'
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
