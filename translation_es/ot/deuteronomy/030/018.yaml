translation:
  language: es
  text: Les declaro hoy que ciertamente perecerán[a][c]; no prolongarán sus días en la tierra que están cruzando el Jordán para entrar y poseer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite la misma raíz en una construcción enfática: «perecer perecerán», es decir, «perecerán ciertamente».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo se dirige a Israel en singular, tratándolo como un solo pueblo; el español aquí lo expresa en plural para concordar con un destinatario colectivo.
    reason: cultural_note
lexical_decisions:
- source_word: הִגַּדְתִּי
  english_pob_choice: I declare
  chosen_spanish: Les declaro
  alternatives_spanish:
  - Les anuncio
  - Les digo
  lexicon: HALOT
  rationale: El הִגִּיד en hiphil expresa hacer saber o declarar. «Declaro» conserva el tono solemne y jurídico-profético del aviso, mejor que un simple «digo».
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El hebreo usa segunda persona plural. En español, «les» mantiene el destinatario plural sin añadir marca regional.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la opción natural y fiel para el adverbio temporal inmediato.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de la declaración; en español, «que» reproduce bien la subordinación informativa.
- source_word: אָבֹד תֹּאבֵדוּן
  english_pob_choice: you will surely perish
  chosen_spanish: ciertamente perecerán
  alternatives_spanish:
  - perecerán de seguro
  - sin duda perecerán
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la certeza. «Ciertamente perecerán» expresa ese énfasis sin repetición mecánica.
- source_word: לֹא תַאֲרִיכֻן יָמִים
  english_pob_choice: you will not prolong your days
  chosen_spanish: no prolongarán sus días
  alternatives_spanish:
  - no vivirán muchos días
  - no alargarán sus días
  lexicon: HALOT
  rationale: «Prolongar los días» reproduce la metáfora hebrea de manera transparente y mantiene la resonancia pactual del texto.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por «land» por el contexto pactal, en español «sobre la tierra» resulta más natural y sigue el valor espacial de עַל sin perder la referencia territorial.
- source_word: אֲשֶׁר אַתָּה עֹבֵר אֶת־הַיַּרְדֵּן
  english_pob_choice: that you are crossing the Jordan
  chosen_spanish: que están cruzando el Jordán
  alternatives_spanish:
  - que cruzan el Jordán
  - que vas cruzando el Jordán
  lexicon: HALOT
  rationale: El hebreo usa singular, pero el español normal para el destinatario colectivo suena mejor en plural. Se mantiene el sentido corporativo de Israel como un solo pueblo, explícito en la lectura auditada del POB.
- source_word: לָבֹא
  english_pob_choice: to enter
  chosen_spanish: para entrar
  alternatives_spanish:
  - para ir a entrar
  - para ingresar
  lexicon: HALOT
  rationale: El infinitivo de בוא se rinde de forma directa y sobria con «entrar».
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: and possess it
  chosen_spanish: y poseer
  alternatives_spanish:
  - y tomar posesión de
  - y heredar
  lexicon: HALOT
  rationale: ירש en contextos de tierra prometida puede ser «poseer» o «tomar posesión de». Aquí «poseer» es breve y fiel al valor de ocupación hereditaria sin sobrecargar la frase.
theological_decisions:
- issue: Singular/corporate address to Israel
  english_pob_reading: Retain singular 'you' in English while understanding it as Israel collectively
  chosen_spanish_reading: Expresar el destinatario en plural español, manteniendo la idea de Israel como pueblo corporativo
  alternative_spanish_readings:
  - Conservar un singular literal ('tú')
  - Usar un plural explícito ('ustedes')
  rationale: El hebreo habla a Israel como un solo pueblo, pero el español idiomático exige concordancia natural con el destinatario plural. El sentido corporativo se conserva sin forzar un singular poco natural en todo el verso.
  doctrine_reference: Deuteronomio 30:18; filosofía de traducción POB sobre consistencia y legibilidad
- issue: Terminología de la tierra pactal
  english_pob_reading: Render הָאֲדָמָה here as 'the land'
  chosen_spanish_reading: «la tierra» como referencia a la tierra prometida al otro lado del Jordán
  alternative_spanish_readings:
  - «la tierra» sin nota
  - «el suelo»
  rationale: En este contexto no se trata de suelo en abstracto, sino del territorio pactal. «La tierra» preserva esa carga teológica y narrativa, más natural en español que un calco rígido de la preposición.
  doctrine_reference: Deuteronomio 30:18; coherencia con el tema de la tierra prometida
- issue: Intensificación verbal de אָבֹד תֹּאבֵדוּן
  english_pob_reading: you will surely perish
  chosen_spanish_reading: «ciertamente perecerán»
  alternative_spanish_readings:
  - «perecerán, sí, perecerán»
  - «sin duda perecerán»
  rationale: La estructura enfática hebrea se preserva en español con un adverbio de certeza que comunica el carácter inevitable del juicio sin sonar redundante o artificial.
  doctrine_reference: HALOT; recurso retórico del infinitivo absoluto
- issue: Referencia al cruce del Jordán
  english_pob_reading: that you are crossing the Jordan
  chosen_spanish_reading: «que están cruzando el Jordán»
  alternative_spanish_readings:
  - «que cruzan el Jordán»
  - «que van a cruzar el Jordán»
  rationale: Se mantiene la acción de transición geográfica e histórica como parte del contexto de entrada a la tierra. El plural español es una acomodación gramatical, no un cambio del referente colectivo.
  doctrine_reference: Lectura corporativa de Israel en Deuteronomio
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que eliminó añadidos explícitos innecesarios («there», «it») y simplificó la cláusula final. En español se evitó introducir equivalentes no requeridos y se mantuvo una sintaxis sobria y transparente.
  spanish_consistency_notes:
  - Se usó «Jordán» con artículo implícito, conforme al uso bíblico español natural.
  - Se prefirió «perecer» para preservar el valor fuerte del juicio, no un eufemismo.
  - Se eligió «poseer» en vez de «heredar» para mantener la nuance de ocupación/posesión de la tierra.
  - La nota de plural corporativo explica la concordancia española sin borrar la unidad de Israel en el texto.
