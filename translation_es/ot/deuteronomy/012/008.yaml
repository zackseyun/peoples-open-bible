translation:
  language: es
  text: No harán como nosotros hacemos aquí hoy[a], cada hombre lo que es recto ante sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre»; la expresión es distributiva y significa que cada persona actúa según su propio juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשׂוּן
  english_pob_choice: you shall not do
  chosen_spanish: No harán
  alternatives_spanish:
  - No deben hacer
  - No han de hacer
  lexicon: HALOT
  rationale: En negación, el imperfecto 2mp expresa una prohibición/instrucción futura. «No harán» conserva el tono jurídico y resulta natural en español.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - según todo lo que
  - tal como
  lexicon: HALOT
  rationale: La comparación introduce modo o semejanza. «Como» reproduce de forma breve y clara la relación con la práctica actual.
- source_word: עֹשִׂים פֹּה הַיּוֹם
  english_pob_choice: are doing here today
  chosen_spanish: hacemos aquí hoy
  alternatives_spanish:
  - estamos haciendo aquí hoy
  - hacemos aquí este día
  lexicon: HALOT
  rationale: El participio con adverbios temporales y locativos describe la práctica presente. En español, «hacemos aquí hoy» mantiene la referencia actual sin forzar una perífrasis progresiva innecesaria.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino distributivo. «Cada hombre» preserva esa forma representativa y refleja el matiz del texto fuente.
- source_word: כָּל הַיָּשָׁר
  english_pob_choice: whatever is right
  chosen_spanish: lo que es recto
  alternatives_spanish:
  - lo que es justo
  - todo lo que es recto
  lexicon: HALOT
  rationale: La frase apunta a lo que se considera recto/correcto. «Lo que es recto» es fiel y natural; «justo» es posible, pero aquí «recto» mantiene mejor el campo semántico del hebreo.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: a sus propios ojos
  alternatives_spanish:
  - en sus propios ojos
  - a su propio juicio
  lexicon: HALOT
  rationale: El hebreo emplea un modismo para juicio o evaluación personal. «A sus propios ojos» conserva la imagen idiomática y su carga moral en español.
theological_decisions:
- issue: Construcción distributiva masculina אִישׁ ... בְּעֵינָיו
  english_pob_reading: each man ... in his own eyes
  chosen_spanish_reading: cada hombre ... a sus propios ojos
  alternative_spanish_readings:
  - cada uno ... a sus propios ojos
  - todos ... a sus propios ojos
  rationale: El hebreo presenta un singular masculino distributivo. Se conserva en la línea principal para no diluir la forma del original; el español pluralizado quedaría más neutral, pero menos fuente-dependiente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: La redacción española sigue de cerca el audit trail inglés, pero ajusta la sintaxis para sonar natural en español. Se mantuvo la fuerza prohibitiva, la comparación de modo, el presente de práctica y el modismo de evaluación personal sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se usó «recto» para preservar el campo semántico de יָשָׁר, evitando sustituirlo por «justo» en el texto principal.
  - Se conservó el distributivo masculino singular con «cada hombre», coherente con la política de fidelidad de forma cuando el original lo marca.
  - El modismo «a sus propios ojos» mantiene la imagen hebrea y evita una explicación interpretativa en el cuerpo del versículo.
