translation:
  language: es
  text: Rodearán al rey por todos lados, cada hombre con sus armas en la mano. Todo el que entre en las filas[a] será muerto. Permanezcan con el rey cuando salga y cuando entre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las líneas» o «en los rangos». El término hebreo probablemente se refiere a las filas ordenadas de la guardia.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en su salir y en su entrar», un modismo para acompañarlo y protegerlo en todos sus movimientos.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִקַּפְתֶּם
  english_pob_choice: You shall surround
  chosen_spanish: Rodearán
  alternatives_spanish:
  - Debéis rodear
  - Encerraréis
  lexicon: HALOT
  rationale: El hiphil expresa hacer un cerco alrededor; en español, «rodearán» comunica bien la acción militar de cercar sin sonar forzado. Se mantiene el sentido de encierro protector del mandato.
- source_word: עַל הַמֶּלֶךְ סָבִיב
  english_pob_choice: the king on every side
  chosen_spanish: al rey por todos lados
  alternatives_spanish:
  - alrededor del rey
  - al rey en derredor
  lexicon: HALOT
  rationale: «Por todos lados» reproduce la idea distributiva de סָבִיב sin volverlo rígido. Conserva la imagen de cobertura completa alrededor del rey.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada guardia
  lexicon: HALOT
  rationale: El singular distributivo pide un equivalente igualmente distributivo. «Cada hombre» mantiene la referencia individual dentro del grupo armado, como en el contexto militar.
- source_word: וְכֵלָיו בְּיָדוֹ
  english_pob_choice: with his weapons in his hand
  chosen_spanish: con sus armas en la mano
  alternatives_spanish:
  - con sus instrumentos en la mano
  - con su arma en la mano
  lexicon: HALOT
  rationale: En este contexto de guardia armada, כֵלִים se entiende naturalmente como armas o pertrechos de combate. «Armas» preserva la fuerza militar del pasaje mejor que un término más general.
- source_word: וְהַבָּא אֶל הַשְּׂדֵרוֹת
  english_pob_choice: Whoever comes within the ranks
  chosen_spanish: Todo el que entre en las filas
  alternatives_spanish:
  - Todo el que llegue a los puestos
  - Quien se acerque a las líneas
  lexicon: HALOT
  rationale: שְׂדֵרוֹת alude a filas o formaciones ordenadas; «las filas» es la opción española más natural y suficientemente literal para la disposición militar. Se conserva el valor de acceso indebido a la formación guardia.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - deberá morir
  lexicon: HALOT
  rationale: El pasivo causativo pide una formulación pasiva. «Será muerto» mantiene la severidad legal del hebreo sin suavizarlo a un simple «morirá».
- source_word: וִהְי֥וּ אֶת הַמֶּלֶךְ
  english_pob_choice: Stay with the king
  chosen_spanish: Permaneced con el rey
  alternatives_spanish:
  - Quedaos con el rey
  - Estad con el rey
  lexicon: HALOT
  rationale: El contexto da una orden de acompañamiento y protección. «Permaneced con» conserva la idea de continuar junto al rey en todo momento, evitando una paráfrasis excesiva.
- source_word: בְּצֵאתוֹ וּבְבֹאוֹ
  english_pob_choice: when he goes out and when he comes in
  chosen_spanish: cuando salga y cuando entre
  alternatives_spanish:
  - al salir y al entrar
  - en su salir y su entrar
  lexicon: HALOT
  rationale: Se preserva el par idiomático hebreo con una construcción natural en español. La forma verbal mantiene el sentido de acompañarlo en todas sus salidas y entradas.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: se conserva el cerco alrededor del rey, la referencia militar a las filas/rangos, la pasiva de ejecución y el par idiomático «salga/entre» para בְּצֵאתוֹ וּבְבֹאוֹ. Se optó por una versión española publicación-readable, evitando calcos duros como «en su salir y en su entrar».'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí, sino conforme a la terminología general del proyecto cuando corresponda.
  - Se prefirió «armas» por el contexto bélico inmediato; no se introdujo una equivalencia más amplia como «instrumentos» porque debilitaría la escena.
  - «Filas» traduce de manera natural el campo semántico de שְּׂדֵרוֹת sin perder la imagen de formación militar.
  - La forma «será muerto» mantiene la severidad jurídica del pasivo hebreo, coherente con el tono del mandato.
