revisions:
- from: 'Por tanto, así dice Yahvé de los ejércitos: He aquí[a], voy a castigarles. Los jóvenes morirán a espada; sus hijos y sus hijas morirán de hambre.'
  to: 'Por tanto así dice Yahvé de los ejércitos: He aquí[a], voy a castigarles. Los jóvenes morirán a espada; sus hijos y sus hijas morirán por hambre.'
  rationale: Se ajusta la puntuación para mejor fluidez formal y se cambia «de hambre» por «por hambre» para preservar mejor el sentido de רָעָב como calamidad de hambre/hambruna y el paralelismo con «a espada», en línea con la auditoría inglesa y el hebreo fuente. Se conserva la nota léxica sobre פקד porque sigue siendo pertinente y bien anclada en «He aquí[a]».
