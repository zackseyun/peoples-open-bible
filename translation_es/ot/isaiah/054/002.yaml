review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia imperativa y preserva la metáfora de la tienda del hebreo: ensanchar el lugar, extender las cortinas, no retraerse, alargar cuerdas y afirmar estacas. Sin embargo, hay un problema de anclaje de nota: la nota [a] está puesta sobre «tienda», pero la alternativa léxica corresponde a אַל תַּחְשֹׂכִי («no te detengas / no escatimes / no te restrinjas»), no a «tienda». Además, la nota cultural sobre cuerdas/estacas puede afinarse para reflejar mejor que las estacas son clavijas o estacas de tienda, no «soportes» en general.'
  spanish_quality_summary: El español es claro, natural y digno. «Ensancha», «moradas», «cuerdas» y «estacas» leen bien en registro bíblico contemporáneo. «No te detengas» es aceptable, aunque «no te retraigas» o «no escatimes» sería más cercano al campo semántico de retener/escatimar; no exige cambio obligatorio. La reparación necesaria es principalmente de notas y su ubicación.
  glossary_alignment: No aparecen términos del glosario mayor en disputa en este versículo. La decisión de mantener «tienda», «moradas», «cuerdas» y «estacas» concuerda con la filosofía POB de preservar la metáfora concreta. «Moradas» reproduce bien מִשְׁכְּנוֹתַיִךְ como plural poético. «Refuerza» para חַזֵּקִי es defendible y natural en español.
  issues:
  - severity: high
    issue: La nota [a] está anclada al término equivocado.
    rationale: La nota léxica explica alternativas para אַל תַּחְשֹׂכִי, pero en el borrador aparece después de «tu tienda». Esto desinforma al lector y rompe la correspondencia exigida entre nota y palabra/frase comentada.
  - severity: medium
    issue: El contenido de la nota [a] mezcla una alternativa principal con el texto ya adoptado.
    rationale: Si el texto principal conserva «no te detengas», la nota debe presentar alternativas al hebreo como «no te restrinjas» o «no escatimes», no repetir o confundir el valor principal en un anclaje incorrecto.
  - severity: low
    issue: La nota [b] puede ser más precisa culturalmente.
    rationale: «Estacas» no son meramente «soportes clavados al suelo», sino específicamente clavijas o estacas de tienda que aseguran las cuerdas. Conviene mantener la imaginería de campamento/tienda.
  revised_spanish_text: Ensancha el lugar de tu tienda, y extiéndanse las cortinas de tus moradas; no te detengas[a]. Alarga tus cuerdas[b], y refuerza tus estacas.
