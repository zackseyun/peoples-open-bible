  text: עַ֣ד דִּֽי אֲתָ֗ה עַתִּיק֙ יֽוֹמַיָּ֔/א וְ/דִינָ֣/א יְהִ֔ב לְ/קַדִּישֵׁ֖י עֶלְיוֹנִ֑ין וְ/זִמְנָ֣/א מְטָ֔ה וּ/מַלְכוּתָ֖/א הֶחֱסִ֥נוּ קַדִּישִֽׁין־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/007/022.yaml
  text: until the Ancient of Days came[a], and judgment was given to the saints of the Most High, and the time arrived[c][b], and the saints took possession of the kingdom.
  footnotes:
  - marker: a
    text: Or 'judgment was given to the saints of the Most High.' The Aramaic preposition can be understood either as benefactive ('for,' in their favor) or as indirect object ('to').
    reason: alternative_reading
  - marker: b
    text: Or 'the holy ones of the Most High.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the saints possessed the kingdom.'
    reason: lexical_alternative
