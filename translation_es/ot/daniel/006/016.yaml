base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/016.yaml
  text: Then these men came by agreement to the king and said to the king[a], "Know, O king[b], that it is a law of the Medes and Persians that any injunction or statute that the king establishes cannot be changed."
  footnotes:
  - marker: a
    text: Or 'came by agreement against the king.' The Aramaic verb can suggest coordinated, insistent action, not merely approach.
    reason: lexical_alternative
  - marker: b
    text: Or 'decree' for 'injunction' and 'ordinance' for 'statute.' The pair emphasizes the full range of legally binding royal enactments.
    reason: lexical_alternative
