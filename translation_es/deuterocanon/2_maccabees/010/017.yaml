lexical_decisions:
- source_word: Ἰωάνης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Joanes
  lexicon: nombre propio
  rationale: Se mantiene la forma española común del nombre propio, equivalente al 'John' del texto inglés, sin forzar una transliteración menos natural.
- source_word: Ἀβεσσαλώμ
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Abessalom
  lexicon: nombre propio
  rationale: Se usa la forma española tradicional y reconocible del nombre, equivalente al 'Absalom' inglés.
- source_word: οἱ πεμφθέντες
  english_pob_choice: who were sent
  chosen_spanish: los que fueron enviados
  alternatives_spanish:
  - los enviados
  - habiendo sido enviados
  lexicon: BDAG
  rationale: El participio aoristo pasivo se vierte como relativa natural en español, conservando la pasividad y la referencia a los dos hombres.
- source_word: παρʼ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - de ustedes
  - por vosotros
  lexicon: BDAG
  rationale: Aquí παρά con genitivo expresa origen/agente del envío; 'por ustedes' preserva ese matiz de procedencia en español moderno.
- source_word: ἐπιδόντες
  english_pob_choice: after delivering
  chosen_spanish: después de entregar
  alternatives_spanish:
  - habiendo entregado
  - presentando
  lexicon: BDAG
  rationale: El participio de acción previa se traduce con una secuencia temporal natural en español, sin perder el orden de los eventos.
- source_word: τὸν ὑπογεγραμμένον χρηματισμόν
  english_pob_choice: the written document
  chosen_spanish: el documento escrito
  alternatives_spanish:
  - la comunicación escrita
  - el decreto escrito
  lexicon: BDAG
  rationale: Se conserva el sentido documental y oficial del término griego sin decidir más de lo que exige el contexto entre 'comunicación', 'documento' o 'decreto'.
- source_word: ἠξίουν
  english_pob_choice: asked about
  chosen_spanish: preguntaron acerca de
  alternatives_spanish:
  - pidieron sobre
  - inquirieron acerca de
  lexicon: BDAG
  rationale: El imperfecto se vierte como acción en curso en español; 'preguntaron acerca de' expresa claramente la solicitud/inquiry implícita.
- source_word: περὶ τῶν διʼ αὐτοῦ σημαινομένων
  english_pob_choice: about the matters indicated by it
  chosen_spanish: acerca de los asuntos indicados por él
  alternatives_spanish:
  - acerca de las cosas significadas por él
  - acerca de lo que él hacía saber
  lexicon: BDAG
  rationale: '''Asuntos indicados'' mantiene el valor de σημαινομένων como cosas señaladas o dadas a entender, y ''por él'' remite al documento sin ambigüedad excesiva.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan sustancialmente; la única tensión relevante es la amplitud semántica de χρηματισμός, que en español se resuelve con una fórmula neutra ('documento escrito') y nota de alternativas.
  spanish_consistency_notes:
  - Se mantiene 'Juan' y 'Absalón' como formas españolas de nombres propios.
  - Se conserva la referencia al documento mediante 'él' al final, siguiendo el antecedente inmediato del texto español.
  - No se introduce terminología eclesiástica ajena al sentido del pasaje.
  - La puntuación y el orden de cláusulas siguen una sintaxis española fluida, sin añadir información interpretativa.
