translation:
  language: es
  text: 'A medida que las multitudes se reunían, comenzó a decir: «Esta generación es una generación malvada[a]. Busca una señal[b], y no se le dará ninguna señal, sino la señal de Jonás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «generación perversa».
    reason: lexical_alternative
  - marker: b
    text: La «señal de Jonás» puede referirse a Jonás mismo como señal por medio de su misión profética y, a la luz de los paralelos de los Evangelios, también puede evocar conexiones tipológicas con la muerte y resurrección de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαθροιζομένων
  english_pob_choice: were gathering
  chosen_spanish: se agolpaban
  alternatives_spanish:
  - se reunían
  - se juntaban
  - iban reuniéndose
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa acción concurrente y en desarrollo. «Se agolpaban» comunica bien la acumulación de gente con naturalidad en español, conservando la escena de afluencia sin volverla más interpretativa de lo necesario.
- source_word: ἤρξατο λέγειν
  english_pob_choice: began to say
  chosen_spanish: comenzó a decir
  alternatives_spanish:
  - empezó a decir
  - comenzó diciendo
  lexicon: BDAG
  rationale: Es una construcción inceptiva normal. «Comenzó a decir» preserva el inicio del discurso sin introducir una repetición o matiz aspectual ajeno al griego.
- source_word: γενεά
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente
  - pueblo
  - los de esta época
  lexicon: BDAG
  rationale: «Generación» mantiene el sentido temporal y moral-colectivo del dicho de Jesús. Otras opciones suavizan o desplazan el alcance corporativo del término.
- source_word: πονηρά
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  - maligna
  lexicon: BDAG
  rationale: En español, «mala» es directo y suficientemente fuerte, pero algo menos cargado que «malvada» o «perversa». El griego puede abarcar una evaluación moral negativa general; por eso se evita cerrar demasiado el campo semántico.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - señal milagrosa
  - milagro
  - signo
  lexicon: BDAG
  rationale: «Señal» es la opción más natural y amplia en español para el valor teológico de σημεῖον. «Signo» es posible, pero menos usual en este registro; «señal milagrosa» añadiría una especificación no explícita en cada ocurrencia.
- source_word: ζητεῖ
  english_pob_choice: seeks
  chosen_spanish: Busca
  alternatives_spanish:
  - busca con insistencia
  - exige
  - anda buscando
  lexicon: BDAG
  rationale: El verbo significa literalmente «buscar». Aquí la mayúscula inicial responde al inicio de cita; el contexto de reproche deja percibir la actitud demandante sin necesitar un verbo más interpretativo.
- source_word: δοθήσεται
  english_pob_choice: will be given
  chosen_spanish: se le dará
  alternatives_spanish:
  - le será dada
  - será dada a ella
  lexicon: BDAG
  rationale: La pasiva futura se vierte de modo natural con «se le dará». Mantiene la referencia al destinatario femenino implícito en αὐτῇ sin recargar la sintaxis.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  - a no ser que
  lexicon: BDAG
  rationale: 'Después de una negación, «sino» expresa con precisión la exclusión: «no se le dará señal alguna, sino...». Es el equivalente idiomático más claro en español.'
- source_word: τὸ σημεῖον Ἰωνᾶ
  english_pob_choice: the sign of Jonah
  chosen_spanish: la señal de Jonás
  alternatives_spanish:
  - la señal de Jonás el profeta
  - la señal dada por Jonás
  - la señal de Jonás
  lexicon: BDAG
  rationale: Se conserva la expresión genitiva abierta como en el griego y en el POB inglés. «De Jonás» funciona de forma natural en español y deja espacio para la interpretación inmediata y para los paralelos evangélicos.
theological_decisions:
- issue: Fuerza de la condena a «esta generación»
  english_pob_reading: A corporate moral assessment of Jesus's contemporaries, rendered without softening.
  chosen_spanish_reading: Una evaluación moral corporativa y frontal de los contemporáneos de Jesús, sin atenuarla.
  alternative_spanish_readings:
  - Una referencia solo a algunos opositores presentes
  - Una denuncia más generalizada pero suavizada
  rationale: La repetición «Esta generación es una generación mala» conserva el golpe retórico del griego y del POB inglés. No se reduce el alcance a unos pocos adversarios, porque el texto apunta a un juicio colectivo sobre la generación contemporánea.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Sentido de «la señal de Jonás»
  english_pob_reading: Retained as an untranslated genitival expression in the main text.
  chosen_spanish_reading: Se mantiene como expresión genitiva abierta en el texto principal.
  alternative_spanish_readings:
  - Una referencia directa a la predicación de Jonás
  - Una lectura tipológica explícita sobre la muerte y resurrección de Jesús
  rationale: Como en el POB inglés, el texto principal no adelanta toda la interpretación. Lucas aclara el sentido inmediato en el contexto, mientras que los paralelos evangélicos permiten una lectura tipológica más amplia. La traducción conserva esa tensión.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se revisó el texto a la luz del griego SBLGNT, la morfología y el audit trail inglés del POB. No fue necesario introducir revisiones textuales ni resolver de manera cerrada la ambigüedad de «la señal de Jonás»; se conservó la apertura interpretativa documentada.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - Se usó «generación» para γενεά por consistencia con el valor corporativo y temporal del término.
  - Se eligió «señal» para σημεῖον, manteniendo la terminología POB y un registro bíblico natural en español.
  - Se conservó la pasiva impersonal con «se le dará» para reflejar la estructura griega sin sonar forzado.
  - La puntuación de la cita sigue normas del español y mantiene el contraste retórico del enunciado.
