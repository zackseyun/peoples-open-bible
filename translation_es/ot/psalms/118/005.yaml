translation:
  language: es
  text: Desde mi angustia invoqué a Yahvé[a]; Yahvé me respondió con amplitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde el lugar estrecho invoqué a Yahvé; Yahvé me respondió en un lugar amplio». El hebreo usa imágenes espaciales para la angustia y el alivio.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִן
  english_pob_choice: Out of
  chosen_spanish: Desde
  alternatives_spanish:
  - De
  - Fuera de
  lexicon: HALOT
  rationale: La preposición expresa origen o punto de partida. «Desde» comunica con naturalidad que la oración nace en una condición de aflicción, sin perder la imagen espacial del hebreo.
- source_word: הַמֵּצַר
  english_pob_choice: my distress
  chosen_spanish: mi angustia
  alternatives_spanish:
  - mi aflicción
  - el lugar estrecho
  - el lugar angosto
  lexicon: HALOT
  rationale: El sustantivo describe literalmente un espacio estrecho y figuradamente la opresión o angustia. «Mi angustia» transmite el sentido idiomático en español, y el contraste espacial se conserva por «en amplitud» al final del verso.
- source_word: קָרָאתִי
  english_pob_choice: I called on
  chosen_spanish: invoqué
  alternatives_spanish:
  - llamé
  - clamé
  lexicon: HALOT
  rationale: En contexto de oración, קרא significa invocar o llamar sobre el nombre divino. «Invoqué» hace explícita esa relación de plegaria sin añadir contenido ajeno al hebreo.
- source_word: יָּהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto usa la forma poética breve del nombre divino, no el tetragrámaton completo. Mantener «Yah» preserva la distinción léxica y el paralelismo del verso.
- source_word: עָנָנִי
  english_pob_choice: answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me contestó a mí
  lexicon: HALOT
  rationale: El verbo significa responder. «Me respondió» es la equivalencia directa y natural en español para la construcción con sufijo pronominal.
- source_word: בַמֶּרְחָב
  english_pob_choice: with spaciousness
  chosen_spanish: en amplitud
  alternatives_spanish:
  - en un lugar espacioso
  - en un espacio ancho
  - con amplitud
  lexicon: HALOT
  rationale: מֶרְחָב designa amplitud, espacio abierto o alivio de la constricción. «En amplitud» conserva la imagen espacial y la contraposición con «mi angustia»; evita una paráfrasis demasiado interpretativa.
theological_decisions:
- issue: Tratamiento de la forma divina breve יָהּ / יָּהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La forma hebrea es la abreviatura poética del nombre divino, no simplemente un título. Traducirla como «Yahvé» o «el SEÑOR» borraría esa distinción textual; por eso se conserva la transliteración.
  doctrine_reference: 'DOCTRINE.md: los nombres propios se transliteran; la convención de «YHWH → Yahvé» aplica al tetragrámaton, no a la forma breve poética.'
- issue: Imagen espacial de angustia y alivio
  english_pob_reading: my distress ... with spaciousness
  chosen_spanish_reading: mi angustia ... en amplitud
  alternative_spanish_readings:
  - mi aflicción ... en un lugar espacioso
  - mi angustia ... con libertad
  rationale: El verso presenta una metáfora de constricción y liberación. «En amplitud» conserva la tensión entre estrechez y expansión sin convertirla en una explicación abstracta o doctrinal.
  doctrine_reference: Salmo 118:5; léxico poético de espacio/constricción en el hebreo bíblico.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete auditado; la redacción sigue el último pase con alto acuerdo y mantiene la distinción entre la forma breve divina «Yah» y la convención habitual para YHWH.
  spanish_consistency_notes:
  - Se mantiene «Yah» de forma consistente para יָּהּ / יָהּ en todo el versículo.
  - Se evita «SEÑOR» para no ocultar la forma poética del nombre divino.
  - «En amplitud» conserva la imagen de espacialidad del final del verso y permite la nota alternativa más concreta.
