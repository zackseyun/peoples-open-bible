translation:
  language: es
  text: Yo soy madre del bello amor[a], y del temor, y del conocimiento, y de la santa esperanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amor bueno» o «amor noble»; καλῆς puede llevar fuerza moral además de estética.
    reason: lexical_alternative
  - marker: b
    text: O «reverencia»; φόβου en literatura sapiencial a menudo denota temor reverente, especialmente hacia Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - origen
  - fuente
  lexicon: LSJ
  rationale: μήτηρ es literalmente «madre». En este contexto personificado de la Sabiduría, conservar la metáfora familiar es más fiel y expresivo que abstraerla a «origen» o «fuente».
- source_word: καλῆς
  english_pob_choice: beautiful
  chosen_spanish: bello
  alternatives_spanish:
  - bueno
  - noble
  - hermoso
  - bello
  lexicon: LSJ
  rationale: καλός puede significar bueno, noble o bello. Aquí, unido a ἀγάπη en una autodescripción poética, «bello» conserva el matiz estético y moral sin reducirlo a una mera cualidad ética.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: LSJ
  rationale: Siguiendo el uso del proyecto para ἀγάπη, «amor» es la opción más directa y natural en español. «Caridad» sería más restringido y eclesiástico.
- source_word: φόβου
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - reverencia
  lexicon: LSJ
  rationale: φόβος es literalmente «miedo/temor». En literatura sapiencial puede implicar reverencia, pero el griego no la explicita; «temor» preserva mejor la tensión semántica y teológica.
- source_word: γνώσεως
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: LSJ
  rationale: γνῶσις denota de manera más directa «conocimiento». «Entendimiento» sería posible, pero menos exacto aquí.
- source_word: ἁγίας
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  - santo
  lexicon: LSJ
  rationale: ἅγιος se vierte normalmente como «santo/santa» en español bíblico. En concordancia con «esperanza» en género femenino, «santa» es la forma natural y fiel.
- source_word: ἐλπίδος
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: LSJ
  rationale: ἐλπίς se traduce de forma directa como «esperanza». «Expectativa» sería más débil y menos idiomática en este contexto.
theological_decisions:
- issue: Sentido de φόβου en contexto sapiencial
  english_pob_reading: fear
  chosen_spanish_reading: temor
  alternative_spanish_readings:
  - reverencia
  rationale: La sabiduría bíblica suele usar «temor» con resonancia reverente, especialmente delante de Dios. Sin embargo, el texto griego dice simplemente φόβου; traducirlo como «temor» mantiene la forma del original y deja abierta la tensión entre temor y reverencia.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Sin cambios respecto al último repaso: el texto griego y el audit trail inglés están en alto acuerdo, y la solución española conserva la metáfora de «madre» y la tensión de φόβου sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene «amor» para ἀγάπη conforme al estándar del proyecto.
  - Se usa «temor» para φόβος para conservar la tensión entre miedo y reverencia.
  - «Santa esperanza» refleja el adjetivo femenino ἁγίας con naturalidad en español.
  - La puntuación con punto y coma final reproduce la cadencia del original griego.
