base_translation:
  language: en
  yaml_path: translation/ot/exodus/035/002.yaml
  text: Work may be done for six days[a], but on the seventh day there shall be for you a holy Sabbath, a complete rest to Yahweh[b]. Whoever does work on it shall surely be put to death.
  footnotes:
  - marker: a
    text: Or 'a Sabbath of solemn rest.' The Hebrew expression 'Sabbath, sabbath-rest' intensifies the idea of full cessation from work.
    reason: lexical_alternative
  - marker: b
