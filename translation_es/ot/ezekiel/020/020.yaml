translation:
  language: es
  text: Santifiquen mis sábados, y que sean una señal entre mí y ustedes, para que sepan que yo soy Yahvé, su Dios.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "YHWH"; el texto principal usa la forma española estándar del proyecto, "Yahvé".'
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁבְּתוֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de reposo
  - mis sábados sagrados
  lexicon: HALOT
  rationale: El hebreo plural con sufijo de primera persona expresa la institución repetida de los sábados de Yahvé. En español, 'sábados' conserva la referencia institucional de forma más directa y natural que una abstracción singular; se añade 'sagrados' por el matiz del verbo siguiente y para reflejar la exigencia de tratar esos días como santos.
- source_word: קַדֵּשׁוּ
  english_pob_choice: Keep ... holy
  chosen_spanish: Guardad ... sagrados
  alternatives_spanish:
  - santificad
  - tratad como santos
  - consagrad
  lexicon: HALOT
  rationale: El piel de קדשׁ aquí pide tratar los sábados como santos. 'Guardad ... sagrados' comunica en español la obligación de observarlos como apartados para Dios sin sonar tan técnico o arcaico como 'santificad'.
- source_word: וְהָיוּ
  english_pob_choice: let them be
  chosen_spanish: y que sean
  alternatives_spanish:
  - y serán
  - y sean
  lexicon: HALOT
  rationale: La continuidad volitiva/resultativa del hebreo se expresa mejor en español con 'que sean', que mantiene el valor exhortativo sin convertir la frase en un futuro plano.
- source_word: לְאוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - como señal
  - por señal
  lexicon: HALOT
  rationale: '''אות'' designa un signo o marca relacional. ''Señal'' es la opción española más clara y natural en este contexto de pacto.'
- source_word: בֵּינִי וּבֵינֵיכֶם
  english_pob_choice: between me and you
  chosen_spanish: entre mí y vosotros
  alternatives_spanish:
  - entre mí y ustedes
  - entre yo y vosotros
  lexicon: HALOT
  rationale: Se conserva la relación de pacto marcada por la expresión hebrea. 'Vosotros' se usa aquí para reflejar el plural explícito del texto sin perder dignidad bíblica; 'ustedes' es posible en otro registro, pero 'vosotros' mantiene mejor la simetría con 'mí'.
- source_word: לָדַעַת
  english_pob_choice: so that you may know
  chosen_spanish: para que sepáis
  alternatives_spanish:
  - para que conozcáis
  - a fin de que sepáis
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. 'Para que sepáis' reproduce naturalmente el propósito y la relación de conocimiento pactal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se adopta la forma programática española 'Yahvé' para el Tetragrámaton, de acuerdo con la política del proyecto en español. Conserva el nombre divino personal y evita la sustitución por un título.
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: vuestro Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural de construcción, el referente es singular. 'Vuestro Dios' mantiene la relación de pacto dirigida al pueblo y concuerda con el tratamiento plural elegido en la segunda persona.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el proyecto pide una transliteración auditables del nombre divino; 'Yahvé' preserva la referencia personal del pacto sin sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no hacía falta ningún cambio y que el acuerdo textual era alto; por eso la propuesta española sigue de cerca las decisiones auditadas y solo ajusta la forma natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de acuerdo con la terminología del proyecto para el nombre divino.
  - '''Señal'' se usa para ''אוֹת'' por claridad y por continuidad con el campo semántico pactal.'
  - '''Para que sepáis'' conserva la finalidad del infinitivo hebreo sin añadir matices doctrinales no presentes en el texto.'
