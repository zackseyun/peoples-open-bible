translation:
  language: es
  text: La persona generosa será enriquecida[a], y el que refresca a otros también será refrescado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Un alma de bendición será engordada». El hebreo usa una imagen de abundancia y florecimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «el que riega será regado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: alma
  alternatives_spanish:
  - persona
  - vida
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona idiomáticamente como el sujeto humano, pero en español 'alma' conserva mejor la imagen proverbial y la resonancia semántica del hebreo sin sonar tan abstracto como 'persona'. Se mantiene la tensión entre sentido literal e idiomático mediante la nota.
- source_word: בְּרָכָה
  english_pob_choice: generous
  chosen_spanish: generosa
  alternatives_spanish:
  - bendición
  - benéfica
  - bendita
  lexicon: HALOT
  rationale: El sustantivo literalmente es 'bendición', pero en esta construcción describe a quien es fuente de bendición para otros. 'Generosa' expresa esa cualidad ética en español con naturalidad, evitando el calco 'alma de bendición'.
- source_word: תְדֻשָּׁן
  english_pob_choice: will be enriched
  chosen_spanish: será enriquecida
  alternatives_spanish:
  - será engordada
  - prosperará
  - será saciada
  lexicon: HALOT
  rationale: El verbo דשׁן en esta forma pasiva transmite abundancia/florecimiento mediante la imagen de 'engordar'. En español, 'enriquecida' conserva la idea de abundancia de manera clara y digna, sin cargar la frase con connotaciones corporales extrañas.
- source_word: וּמַרְוֶה
  english_pob_choice: whoever refreshes others
  chosen_spanish: el que riega a otros
  alternatives_spanish:
  - el que da de beber
  - el que refresca a otros
  - el que sacia
  lexicon: HALOT
  rationale: El participio hifil de רוה conserva la imagen de dar de beber/regar. 'Riega a otros' es lo bastante literal para sostener el paralelismo hebreo y, a la vez, comprensible en español.
- source_word: יוֹרֶא
  english_pob_choice: will himself be refreshed
  chosen_spanish: será regado
  alternatives_spanish:
  - será refrescado
  - será bebido por
  - será saciado
  lexicon: HALOT
  rationale: La forma recíproca final retoma la metáfora del riego. 'Será regado' preserva la imagen de manera más directa que 'será refrescado', aunque esta última sería una equivalencia interpretativa posible.
- source_word: גַּם הוּא
  english_pob_choice: will himself
  chosen_spanish: también él mismo
  alternatives_spanish:
  - él también
  - incluso él
  - él mismo también
  lexicon: HALOT
  rationale: 'La expresión intensifica la reciprocidad: quien da, recibe. ''También él mismo'' reproduce ese énfasis en español y mantiene la correspondencia con el sujeto anterior.'
translation_notes:
  revision_awareness: El cotejo disponible indica alta concordancia y ningún cambio reciente sustantivo; por ello la redacción sigue de cerca la decisión inglesa POB, pero reexpresada en español con la metáfora de abundancia y riego preservada.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' en toda la serie cuando corresponda, aunque este versículo no lo contiene.
  - Se conserva un tono proverbial sobrio y moderno, evitando arcaísmos innecesarios.
  - La nota[a] mantiene la tensión entre el sentido idiomático ('generosa') y la imagen hebrea literal ('alma de bendición').
  - La nota[b] preserva el paralelismo hídrico del hebreo, útil para lectores que deseen ver la metáfora subyacente.
