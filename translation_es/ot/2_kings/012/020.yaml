translation:
  language: es
  text: Ahora bien, el resto de los hechos de Joás[a], y todo lo que hizo, ¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los anales de los reyes de Judá». La expresión hebrea puede denotar un registro real oficial o una crónica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora bien, el resto de
  alternatives_spanish:
  - Y el resto de
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda o resta. En una fórmula regia de resumen, «el resto de» conserva el valor semántico. «Ahora bien» reproduce de manera natural el matiz discursivo inicial de וְ sin añadir contenido nuevo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - cosas
  - palabras
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «palabras/materias», en esta fórmula histórica la referencia es a las acciones registradas del rey. «Hechos» comunica bien ese valor en español sin perder la relación con el expediente histórico.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  lexicon: uso bíblico estándar
  rationale: «Joás» es la forma bíblica habitual en español para este rey de Judá y corresponde al nombre propio del hebreo.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y cuanto hizo
  - y todas las cosas que hizo
  lexicon: HALOT
  rationale: La construcción relativizada con כָל pide una inclusión total. «Todo lo que hizo» conserva esa amplitud de manera natural en español.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no está
  alternatives_spanish:
  - ¿acaso no está
  - ¿no se encuentra
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con expectativa afirmativa. En español, la formulación singular «¿no está escrito?» funciona de modo idiomático con el sujeto colectivo implícito del registro.
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: está escrito
  alternatives_spanish:
  - están escritos
  - se halla escrito
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural («son escritos»), el español puede integrar el plural conceptual dentro de «el resto... y todo lo que hizo» con una pasiva impersonal más natural. Se mantiene la idea de registro escrito sin forzar la concordancia.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en un libro
  - en el rollo
  lexicon: HALOT
  rationale: En esta fórmula de archivo real, «Libro» conserva el valor convencional de סֵפֶר sin necesidad de calcar la preposición literal «sobre». En español, «en el Libro» es la correspondencia natural.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: de las Crónicas
  alternatives_spanish:
  - de los anales
  - de los anales históricos
  lexicon: HALOT
  rationale: El giro hebreo designa los registros cronísticos/annales del reino. «Crónicas» es la forma más reconocible y adecuada en español para ese título de archivo.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: El לְ aquí funciona de modo genitivo dentro del nombre del registro. «De los reyes de Judá» expresa correctamente la relación posesiva/titular en español.
translation_notes:
  revision_awareness: No se observaron revisiones textuales ni cambios en el pasaje respecto del control auditado; la traducción sigue de cerca la fórmula regia estándar confirmada por el análisis inglés y el hebreo masorético.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo exige; en este versículo no aparece el nombre divino.
  - Se usó «Crónicas» como título de archivo histórico, coherente con la fórmula regia del hebreo.
  - Se optó por «hechos» para דִּבְרֵי en el contexto de resumen real, preservando el sentido histórico del registro.
