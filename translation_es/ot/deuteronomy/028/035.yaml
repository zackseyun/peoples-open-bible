translation:
  language: es
  text: Yahvé te herirá con forúnculos graves en las rodillas y en las piernas[a], de las cuales no podrás ser sanado, desde la planta de tu pie hasta la coronilla de tu cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'espinillas' para 'piernas'; el término hebreo se refiere más específicamente a la parte baja de la pierna.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del nombre divino en el texto fuente y la convención del proyecto para el Tetragrámaton; en español, 'Yahvé' preserva el nombre propio y evita sustituirlo por un título.
- source_word: יַכְּכָה
  english_pob_choice: will strike you
  chosen_spanish: te herirá
  alternatives_spanish:
  - te golpeará
  - te castigará
  - te herirá con
  lexicon: HALOT
  rationale: El causativo de נכה expresa un golpe o herida infligidos por Dios. 'Te herirá' conserva la fuerza directa y funciona de modo natural en español bíblico moderno.
- source_word: בִּשְׁחִין רָע
  english_pob_choice: with severe boils
  chosen_spanish: con úlceras malignas
  alternatives_spanish:
  - con forúnculos graves
  - con llagas malignas
  - con una llaga maligna
  lexicon: HALOT
  rationale: שְׁחִין designa una afección cutánea grave, no solo un bulto superficial; 'úlceras' comunica mejor la lesión abierta y persistente en español. רָע intensifica la gravedad; 'malignas' transmite ese carácter dañino/severo, aunque mantiene una leve tensión con el sentido literal 'malo' que el contexto médico ya aclara.
- source_word: עַל הַבִּרְכַּיִם
  english_pob_choice: on the knees
  chosen_spanish: en las rodillas
  alternatives_spanish:
  - sobre las rodillas
  - en las rodillas
  lexicon: HALOT
  rationale: Referencia anatómica directa; 'en las rodillas' es la forma más clara y natural en español.
- source_word: וְעַל הַשֹּׁקַיִם
  english_pob_choice: and on the legs
  chosen_spanish: y en las piernas
  alternatives_spanish:
  - y en las espinillas
  - y en las piernas inferiores
  - y en las canillas
  lexicon: HALOT
  rationale: שׁוֹק apunta más específicamente a la parte baja de la pierna. 'Piernas' es la opción más idiomática en español general, y se preserva la alternativa más específica en nota.
- source_word: אֲשֶׁר לֹא תוּכַל לְהֵרָפֵא
  english_pob_choice: from which you cannot be healed
  chosen_spanish: de las cuales no podrás ser sanado
  alternatives_spanish:
  - que no podrás sanar
  - que no podrán curarte
  - de las cuales no podrás curarte
  lexicon: HALOT
  rationale: La cláusula expresa imposibilidad de curación. El pasivo 'ser sanado' mantiene el foco en la condición incurable, como en el inglés auditado.
- source_word: מִכַּף רַגְלְךָ
  english_pob_choice: from the sole of your foot
  chosen_spanish: desde la planta de tu pie
  alternatives_spanish:
  - desde la planta de tu pie
  - desde la suela de tu pie
  lexicon: HALOT
  rationale: כַּף de pie se refiere idiomáticamente a la planta/sole. 'Planta de tu pie' es natural y preciso en español; 'suela' sonaría menos orgánico para el cuerpo humano.
- source_word: וְעַד קָדְקֳדֶךָ
  english_pob_choice: to the crown of your head
  chosen_spanish: hasta la coronilla de tu cabeza
  alternatives_spanish:
  - hasta la coronilla de tu cabeza
  - hasta la parte superior de tu cabeza
  lexicon: HALOT
  rationale: קָדְקֹד refiere la parte alta/cima de la cabeza. 'Coronilla de tu cabeza' reproduce bien la imagen totalizante del extremo del cuerpo al extremo superior.
theological_decisions:
- issue: Nombre divino יְהוָה en una fórmula de juicio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino según la política del proyecto. No se oculta bajo un sustituto, y el contexto de juicio no cambia la identidad del sujeto que actúa.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el audit trail más reciente; el pasaje muestra alto acuerdo entre las pasadas de revisión y la lectura fuente. La redacción española se ajusta directamente al hebreo y al análisis léxico auditado, sin necesidad de cambios por crítica textual.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Úlceras malignas'' busca captar tanto la afección cutánea grave como la intensificación de רָע; se reconoce la tensión con ''boils'' y se preserva en la nota y en la decisión léxica.'
  - '''Piernas'' es una generalización idiomática del término hebreo más específico para la parte baja de la pierna; la nota conserva la alternativa.'
  - '''Coronilla'' traduce el alcance total desde abajo hacia arriba, en paralelo al ''crown of your head'' del audit trail inglés.'
