revisions:
- from: Porque si un hombre vive muchos años, que se alegre[a] en todos ellos; pero que recuerde los días de oscuridad, porque serán muchos. Todo lo que viene es vapor.
  to: Porque si un hombre vive muchos años, que se alegre en todos ellos; pero que recuerde los días de oscuridad, porque serán muchos. Todo lo que llega es vapor[a].
  rationale: Se conserva la traducción básica del borrador, pero se corrige la nota al pie para alinearla con la decisión léxica central del POB sobre הָבֶל. También se ajusta «viene» a «llega» por naturalidad española sin cambiar el sentido general.
