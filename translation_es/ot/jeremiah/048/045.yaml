revisions:
- from: A la sombra de Hesbón se detuvieron los fugitivos[a], porque un fuego ha salido de Hesbón, y una llama de en medio de Sihón[b]; ha consumido el extremo de Moab[c] y la coronilla de los hijos de tumulto[d].
