    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica «Misrefot-maim», pero en el texto aparece tras «Israel[a]». Esto rompe la correspondencia exigida entre marcador y palabra anotada.
  - severity: medium
    issue: «Los hirieron» atenúa demasiado נכה en contexto de batalla.
    rationale: En este versículo, el verbo se usa dos veces en una descripción de derrota militar total. «Hirieron» puede sugerir solo lesión, mientras que el POB auditado justificó una expresión más fuerte.
  - severity: low
    issue: «Sidón la Grande» es menos idiomático que «la gran Sidón».
    rationale: Ambas opciones son posibles, pero «la gran Sidón» suena más natural en español amplio y conserva el valor calificativo de רבה.
