translation:
  language: es
  text: ¡Tiembla[a], tierra, delante del Señor, delante del Dios de Jacob!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Retuércete, tierra», preservando la imagen más fuerte de sacudida convulsiva del verbo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: 'La expresión hebrea indica estar frente a la presencia de alguien. En español, «delante de» comunica de manera natural la relación espacial y causal: la tierra tiembla ante la presencia de Dios. «Ante» también sería posible, pero «delante de» suena más fluido en esta línea poética.'
- source_word: אָדוֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  - el soberano
  lexicon: HALOT
  rationale: אָדוֹן es un título y no el nombre divino YHWH. En español, «el Señor» preserva el valor de título de autoridad y refleja bien el uso reverencial del término sin sustituirlo por el nombre propio de Yahvé.
- source_word: חוּלִי
  english_pob_choice: Tremble
  chosen_spanish: ¡Tiemble!
  alternatives_spanish:
  - ¡Vibra!
  - ¡Estremécete!
  - ¡Retuércete!
  lexicon: HALOT
  rationale: El verbo puede expresar temblor, agitación o retorcimiento convulsivo. «Tiemble» reproduce el sentido principal y funciona bien en español poético; se conserva la nota de una sacudida intensa mediante la alternativa en nota.
- source_word: אָרֶץ
  english_pob_choice: O earth
  chosen_spanish: oh tierra
  alternatives_spanish:
  - tierra
  - suelo
  - mundo
  lexicon: HALOT
  rationale: La forma vocativa pide un llamamiento directo a la tierra como entidad personificada. «Oh tierra» mantiene el tono poético y la personificación del hebreo.
- source_word: אֱלוֹהַּ יַעֲקֹב
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - Dios de Jacob
  lexicon: HALOT
  rationale: La construcción posesiva identifica al Dios de Jacob en relación de pacto. «El Dios de Jacob» es la equivalencia más clara y fiel en español.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: standard proper name
  rationale: Los nombres propios se transliteran de forma estándar; «Jacob» es la forma española establecida.
theological_decisions:
- issue: Distinguir אָדוֹן de YHWH sin importar la convención de 'SEÑOR' en mayúsculas
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Soberano
  rationale: El texto hebreo usa אָדוֹן, no el nombre divino YHWH. En español, «el Señor» conserva el título y evita confundirlo con el uso reservado para Yahvé cuando el hebreo sí lo nombra.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for YHWH; render titles according to the source word'
- issue: Preservar la fuerza imagética del verbo חוּלִי sin sobreatenuarla
  english_pob_reading: Tremble[a] ... Or 'Writhe, O earth,' preserving the stronger image of convulsive shaking in the Hebrew verb.
  chosen_spanish_reading: ¡Tiemble[a] ...!
  alternative_spanish_readings:
  - ¡Retuércete, oh tierra!
  - ¡Estremécete, oh tierra!
  rationale: «Tiemble» es idiomático y claro, pero la nota conserva la posibilidad de un matiz más fuerte, cercano a convulsión o retorcimiento, para no borrar la tensión lexical del hebreo.
  doctrine_reference: Poetic imagery and lexical force in HALOT for חול
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se reportaron cambios necesarios y el consenso de revisión fue alto.'
  spanish_consistency_notes:
  - Se usa «Señor» como título, no como sustituto de Yahvé, porque el hebreo aquí dice אָדוֹן.
  - Se mantiene «Dios de Jacob» sin añadir artículos innecesarios en el cuerpo, aunque el inglés los usa por fluidez.
  - La puntuación reproduce la estructura paralela del hebreo con una única línea poética y vocativos marcados por comas y exclamación inicial.
