    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo que aquí se vierte como «le dio entendimiento» también puede sugerir «lo cuidó con atención» o «le prestó atención».
    reason: alternative_reading
  revision_rationale: Se corrige el anglicismo 'waste' por 'desolación', que refleja bien תֹהוּ en contexto poético. Se mueve la nota [a] para que ancle correctamente en 'pupila de su ojo', que es la frase a la que realmente corresponde la alternativa tradicional. También se suaviza 'en tierra de desierto' a 'en una tierra de desierto' para mejorar la naturalidad sin alejarse del hebreo ni del audit trail inglés.
