translation:
  language: es
  text: Y ensanchó los límites de su nación, y tomó el control de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπλάτυνεν
  english_pob_choice: enlarged
  chosen_spanish: ensanchó
  alternatives_spanish:
  - amplió
  - extendió
  lexicon: LSJ
  rationale: πλατύνω significa literalmente hacer más ancho o ensanchar. En español, «ensanchó» conserva la imagen concreta de ampliar límites territoriales sin sonar artificial.
- source_word: τὰ ὅρια
  english_pob_choice: the borders
  chosen_spanish: los límites
  alternatives_spanish:
  - las fronteras
  - los bordes
  lexicon: LSJ
  rationale: ὅρια denota límites o fronteras. «Límites» es natural en español y mantiene el sentido geopolítico del pasaje, sin cargarlo innecesariamente con un matiz moderno de frontera estatal rígida.
- source_word: τῷ ἔθνει αὐτοῦ
  english_pob_choice: of his nation
  chosen_spanish: de su nación
  alternatives_spanish:
  - de su pueblo
  - de su gente
  lexicon: LSJ
  rationale: ἔθνος puede referirse a nación, pueblo o grupo étnico. Aquí el contexto político favorece «nación», que reproduce bien el enfoque administrativo del enunciado.
- source_word: ἐκράτησεν
  english_pob_choice: took control of
  chosen_spanish: tomó control de
  alternatives_spanish:
  - se apoderó de
  - dominó
  lexicon: LSJ
  rationale: κρατέω con genitivo expresa tomar dominio o ejercer control. «Tomó control de» sigue de cerca el valor verbal y evita introducir una idea más fuerte de posesión legal o de dominio absoluto.
- source_word: τῆς χώρας
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: LSJ
  rationale: χώρα puede significar tierra, país o región. Dado que la primera cola ya habló de los límites, «la tierra» ofrece una continuación natural y fiel al ámbito territorial del texto.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «gained control of the country» a «took control of the land» para reflejar más directamente ἐκράτησεν τῆς χώρας. La redacción española sigue esa misma preferencia por un equivalente más directo y territorial, sin suavizar la fuerza del verbo griego.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con español natural.
  - Se evita «SEÑOR» y otras sustituciones no pertinentes, pues el versículo no contiene lenguaje divino.
  - «Límites» y «tierra» preservan el paralelismo territorial del griego con fluidez en español.
