  text: XVI. *Ἡ δὲ Μεμφὶς εἶπε τῷ ἀνδρὶ αὐτῆς¹· *Ἀγόρασον τὸν νεανίαν², ἀκούω γάρ, φησίν³, ὅτι πωλοῦσιν αὐτόν. 2. Εὐθέως δὲ ἀπέστειλεν εὐνοῦχον ἐν τοῖς Ἰσμαϊλίταις, αἰτοῦσά με εἰς διάπρασιν. 3. Ὁ δὲ εὐνοῦχος *μὴ θελήσας ἀγοράσαι με⁴ ἀνεχώρησεν πειράσας αὐτούς, καὶ δηλοῖ τῇ δεσποίνῃ αὐτοῦ, ὅτι πολλὴν τιμὴν αἰτοῦσιν τοῦ παιδός. 4. ⌜*Ἡ δὲ ἀπέστειλεν¹² *εὐνοῦχον ἕτερον¹³⌉, λέγουσα¹⁴, Ἐὰν καὶ δύο¹⁵ μνᾶς¹⁶ ζητοῦσι¹⁷ ⌜παρέχετε⌉¹⁸. μὴ φείσασθε¹⁹ χρυσίου. ⌜Χρυσίου· μόνον²⁰ πριασάμενος²¹ τὸν παῖδα ἄγαγε²² *πρός με⌉. 5. Ἐλθὼν οὖν ὁ εὐνοῦχος⁷ καὶ²³ δοὺς²⁴ αὐτοῖς²⁵ ὀγδοήκοντα²⁶ χρυσοῦς²⁷ *ἀνελάβετό με· τῇ δὲ Αἰγυπτίᾳ εἶπεν ὅτι δέδωκα ἑκατόν. 6. Ἐγὼ δὲ²⁸ εἰδὼς²⁹ ἐσιώπησα³⁰ ἵνα μὴ αἰσχυνθῇ³¹ *ὁ εὐνοῦχος³².
