translation:
  language: es
  text: 'Yahvé habló a Moisés y a Aarón[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo introduce una nueva escena de discurso. En español, «habló» conserva el valor de acto de habla de manera natural y solemne, equivalente al inglés POB «spoke»; «dijo» también es posible, pero aquí suena menos marcado como fórmula narrativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma editorial POB «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición señala destinatario directo del habla. En español, «a» es la equivalencia natural y clara.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y para
  lexicon: HALOT
  rationale: La coordinación explicita que ambos, Moisés y Aarón, son destinatarios directos. «Y a» preserva esa estructura sin sobretraducirla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: N/A
  rationale: Nombre propio estándar en español bíblico.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: N/A
  rationale: Nombre propio estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Conserva la fórmula introductoria de discurso directo sin paráfrasis, equivalente al inglés POB «saying».
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea editorial POB conserva el nombre propio divino. En español, «Yahvé» es la forma coherente con esa decisión y evita la sustitución por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a «Aarón». No se añadieron notas sin ancla textual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la política terminológica del proyecto.
  - Se preservó la fórmula narrativa breve con «habló... diciendo» sin añadir contenido inexistente.
  - 'Los nombres propios se adaptaron a la ortografía española usual: Moisés, Aarón.'
