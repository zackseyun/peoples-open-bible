source:
  edition: SBLGNT
  text: Γράφω ὑμῖν, τεκνία, ὅτι ἀφέωνται ὑμῖν αἱ ἁμαρτίαι διὰ τὸ ὄνομα αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/012.yaml
  text: I am writing to you[a], little children[c][b], because your sins have been forgiven for the sake of his name.
  footnotes:
  - marker: a
    text: Or 'I write to you.' The Greek present may be rendered either as a simple present or as 'I am writing' in epistolary context.
    reason: lexical_alternative
  - marker: b
    text: Or 'that your sins have been forgiven.' The conjunction can be read as introducing content, though here it likely gives the reason for John's writing.
    reason: alternative_reading
  - marker: c
    text: The referent of 'his' may be understood from context as God or as Jesus; the Greek leaves it implicit.
    reason: alternative_reading
translation:
  language: ko
  text: 자녀들이여, 내가 여러분에게 쓰는 것은 그분의 이름으로 인하여 여러분의 죄들이 용서되었기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφέωνται
  english_pob_choice: have been forgiven
  chosen_korean: 용서되었기
  alternatives_korean:
  - 사함받았기
  lexicon: BDAG
  rationale: 완료 수동 — 용서가 이미 이루어졌고 그 효력이 지속됨. 「용서되었다」로 완료의 무게를 살린다.
- source_word: διὰ τὸ ὄνομα αὐτοῦ
  english_pob_choice: for the sake of his name
  chosen_korean: 그분의 이름으로 인하여
  alternatives_korean:
  - 그분의 이름 때문에
  - 그분의 이름을 위하여
  lexicon: BDAG
  rationale: 「이름」은 그분의 인격·권위 전체를 가리키는 셈어적 환유. 「이름으로 인하여」가 그 인과를 분명히 표현한다.
