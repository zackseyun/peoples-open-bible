translation:
  language: es
  text: 'Y la razón parece prevalecer aun sobre las pasiones más violentas: amor al poder, gloria vacía[a], fanfarronería, arrogancia y envidia[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vanagloria» para «gloria vacía». El griego significa literalmente «gloria vacía».
    reason: lexical_alternative
  - marker: b
    text: «Envidia» también puede abarcar malquerencia o el sentido del «ojo maligno».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τῶν βιαιοτέρων ... παθῶν
  english_pob_choice: over the more violent passions
  chosen_spanish: sobre las pasiones más violentas
  alternatives_spanish:
  - a través de las pasiones más violentas
  - contra las pasiones más violentas
  lexicon: LSJ
  rationale: Con κρατεῖν, διά con genitivo expresa extensión o relación de dominio, no medio instrumental. En español, «sobre» comunica mejor la superioridad de la razón respecto de las pasiones.
- source_word: κρατεῖν
  english_pob_choice: to prevail
  chosen_spanish: prevalecer
  alternatives_spanish:
  - dominar
  - vencer
  - controlar
  lexicon: LSJ
  rationale: «Prevalecer» conserva la idea de superioridad o victoria de la razón sin sobrecargar el verbo con un matiz mecánico de control.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - el razonamiento
  - la mente
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad racional o el juicio recto; «la razón» es la forma más natural y fiel en español para ese registro filosófico.
- source_word: φαίνεται
  english_pob_choice: is seen
  chosen_spanish: parece
  alternatives_spanish:
  - se ve
  - se muestra
  - es evidente
  lexicon: LSJ
  rationale: El verbo expresa que algo se hace evidente o se presenta como observable. «Parece» mantiene la fuerza de apariencia/manifestación en un español fluido; el contexto ya apunta a una conclusión demostrable.
- source_word: φιλαρχίας
  english_pob_choice: love of power
  chosen_spanish: amor al poder
  alternatives_spanish:
  - amor al mando
  - ambición de dominio
  - amor a la autoridad
  lexicon: LSJ
  rationale: El compuesto denota deseo de mando o preeminencia. «Amor al poder» reproduce bien el valor del término y mantiene la serie de vicios con paralelismo claro.
- source_word: κενοδοξίας
  english_pob_choice: empty glory
  chosen_spanish: gloria vacía
  alternatives_spanish:
  - vanagloria
  - gloria vana
  - vano honor
  lexicon: LSJ
  rationale: El griego significa literalmente «gloria vacía». «Gloria vacía» conserva esa transparencia; «vanagloria» sería una alternativa válida pero menos transparente para lectores modernos.
- source_word: ἀλαζονίας
  english_pob_choice: boastfulness
  chosen_spanish: fanfarronería
  alternatives_spanish:
  - jactancia
  - boastfulness
  - presunción
  lexicon: LSJ
  rationale: El término implica autoafirmación ostentosa y jactanciosa. «Fanfarronería» comunica con claridad la dimensión verbal y exhibicionista del vicio en español actual.
- source_word: μεγαλαυχίας
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - altivez
  - altanería
  - orgullo
  lexicon: LSJ
  rationale: Este vocablo expresa ensalzamiento orgulloso de sí. «Arrogancia» distingue este término de ἀλαζονία y mantiene el contraste entre vicios cercanos sin reducirlos a un solo concepto.
- source_word: βασκανίας
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - malicia
  - malévola envidia
  - ojo maligno
  lexicon: LSJ
  rationale: En esta lista de pasiones, el sentido central es la envidia. El matiz de malquerencia o «ojo maligno» se preserva en nota para no perder la amplitud semántica del término.
theological_decisions:
- issue: Traducción de λογισμός como facultad racional en 4 Macabeos
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el juicio racional
  - la facultad racional
  rationale: El libro contrapone la racionalidad disciplinada a las pasiones. «La razón» conserva el tono filosófico del argumento sin introducir terminología técnica ajena al español común.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Diferenciación de la lista de vicios cercanos
  english_pob_reading: love of power / empty glory / boastfulness / arrogance / envy
  chosen_spanish_reading: amor al poder / gloria vacía / fanfarronería / arrogancia / envidia
  alternative_spanish_readings:
  - amor al mando / vanagloria / jactancia / altivez / malicia envidiosa
  rationale: La enumeración griega acumula vicios relacionados pero no idénticos. Se procuró diferenciarlos en español para preservar la progresión retórica y no diluir la tensión lexical que el texto presenta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se detectaron cambios necesarios y la solución mantiene la alta concordancia con el griego y con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «la razón» para λογισμός y no se sustituye por «mente» o «juicio» para conservar el registro filosófico de 4 Macabeos.
  - Se distingue «gloria vacía», «fanfarronería» y «arrogancia» para respetar la acumulación de vicios del original.
  - Se usa «envidia» como centro semántico de βασκανία, con la ampliación explicativa reservada a la nota.
  - La puntuación con dos puntos reproduce la relación de conclusión entre la afirmación general y la lista de pasiones.
