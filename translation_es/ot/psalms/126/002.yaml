  text: אָ֤ז יִמָּלֵ֪א שְׂח֡וֹק פִּי/נוּ֮ וּ/לְשׁוֹנֵ֪/נוּ רִ֫נָּ֥ה אָ֭ז יֹאמְר֣וּ בַ/גּוֹיִ֑ם הִגְדִּ֥יל יְ֝הוָ֗ה לַ/עֲשׂ֥וֹת עִם אֵֽלֶּה־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/126/002.yaml
  text: Then our mouth was filled with laughter[a], and our tongue with joyful shouting; then they said among the nations[b], “Yahweh has done great things for them.”
  footnotes:
