translation:
  language: es
  text: Ellos le provocaron celos con extraños[a]; con abominaciones provocaron su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con dioses extraños» o «con dioses extranjeros»; el hebreo dice literalmente «con extraños/extranjeros».
    reason: alternative_reading
lexical_decisions:
- source_word: יַקְנִאֻהוּ
  english_pob_choice: made him jealous
  chosen_spanish: lo hicieron celoso
  alternatives_spanish:
  - lo provocaron a celos
  - excitaron su celo
  lexicon: HALOT
  rationale: El hiphil de קנא expresa causar celos o celo en alguien. En español, «lo hicieron celoso» comunica de forma natural ese efecto sin perder la fuerza relacional/covenantal del hebreo. «Provocaron a celos» es posible, pero suena menos idiomático aquí.
- source_word: בְּזָרִים
  english_pob_choice: with strangers
  chosen_spanish: con extraños
  alternatives_spanish:
  - con extranjeros
  - con dioses extraños
  - con dioses extranjeros
  lexicon: HALOT
  rationale: זָרִים literalmente significa «extraños» o «foráneos». Como el hebreo no dice explícitamente «dioses», se conserva el término literal en el texto principal. El contexto de idolatría queda insinuado, y la alternativa más interpretativa se reserva para la nota.
- source_word: בְּתוֹעֵבֹת
  english_pob_choice: with abominations
  chosen_spanish: con abominaciones
  alternatives_spanish:
  - con cosas detestables
  - con cosas abominables
  lexicon: HALOT
  rationale: תּוֹעֵבָה designa algo abominable o detestable, muy frecuentemente en contextos de idolatría. «Abominaciones» mantiene el peso semántico y la resonancia bíblica que busca el texto.
- source_word: יַכְעִיסֻהוּ
  english_pob_choice: they provoked him to anger
  chosen_spanish: lo provocaron a ira
  alternatives_spanish:
  - lo irritaron
  - lo hicieron enojar
  lexicon: HALOT
  rationale: 'El hiphil de כעס tiene valor causativo: provocar a ira. «Lo provocaron a ira» conserva esa fuerza verbal y el paralelismo con el primer hemistiquio mejor que una formulación más débil.'
theological_decisions:
- issue: Si hacer explícita la idea de «dioses» en זָרִים
  english_pob_reading: Retain the literal 'strangers' in the main text
  chosen_spanish_reading: Mantener «extraños» en el texto principal
  alternative_spanish_readings:
  - dioses extraños
  - dioses extranjeros
  - ídolos extranjeros
  rationale: El hebreo dice literalmente «extraños/foráneos» y no añade «dioses». Para respetar la primacía del texto fuente, la redacción principal conserva el término literal. La implicación idólatra queda apoyada por el contexto amplio y se explicita solo como alternativa en la nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el pasaje quedó estable. El borrador español sigue esa lectura estable sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; este versículo no lo contiene.
  - «Ira» se usa para preservar el paralelismo con «celoso/celos» y la fuerza del causativo hebreo.
  - Se evita añadir «ídolos» o «dioses» al cuerpo principal porque el hebreo no los expresa de manera explícita en esta línea.
