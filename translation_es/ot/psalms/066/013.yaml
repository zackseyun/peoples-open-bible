review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del hebreo: entrada a la casa de Dios, acompañada de holocaustos, y cumplimiento de votos. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con la auditoría inglesa: (1) אָבוֹא fue auditado como ''I will come'', con ''enter'' solo como alternativa; en español ''Entraré'' puede aceptarse en el texto principal, pero entonces la nota alternativa no puede repetir exactamente el mismo texto. (2) לְךָ significa ''a ti'', no ''contigo''; ''cumpliré mis votos contigo'' altera la relación semántica del dativo/receptor.'
  spanish_quality_summary: El español es mayormente natural y digno. 'Con holocaustos' y 'cumpliré mis votos' son claros y apropiados. Pero 'contigo' suena incorrecto en este contexto; en español bíblico y general debe ser 'a ti'. Además, la nota a es defectuosa porque ofrece como alternativa exactamente la misma redacción que el texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Holocaustos' para עולות y 'votos' para נדרי son adecuados. 'Tu casa' preserva correctamente בֵיתְךָ según la decisión teológica auditada. La corrección clave es ajustar לְךָ a 'a ti' y alinear la nota léxica de אָבוֹא con una alternativa real ('vendré' o 'iré a').
  issues:
  - severity: high
    issue: '''contigo'' traduce incorrectamente לְךָ'
    rationale: 'La preposición hebrea ל marca destinatario/addressee: ''a ti''. ''Contigo'' cambia el sentido a compañía/asociación, lo cual no está en el hebreo ni en la auditoría inglesa.'
  - severity: medium
    issue: La nota [a] no presenta una alternativa real
    rationale: El texto principal dice 'Entraré en tu casa', y la nota a repite 'entraré en tu casa'. Debe ofrecer una alternativa distinta, idealmente 'vendré a tu casa' o similar, conforme a la auditoría inglesa.
  - severity: low
    issue: La nota [c] con 'contigo' repite el problema semántico del texto principal
    rationale: La alternativa auditada es 'I will pay my vows to you'; en español debe ser 'pagaré mis votos a ti' o más naturalmente 'te pagaré mis votos'/'pagaré mis votos que te hice', no 'contigo'.
  revised_spanish_text: Entraré en tu casa con holocaustos[a]; cumpliré mis votos[a][b] a ti[c].
  revised_footnotes:
  - marker: a
    text: 'O: «Vendré a tu casa».'
    reason: lexical_alternative
  - marker: b
    text: «Tu casa» probablemente se refiere al santuario o templo de Dios.
    reason: cultural_note
  - marker: c
    text: 'O: «pagaré mis votos a ti».'
    reason: lexical_alternative
  revision_rationale: Se corrige el dativo לְךָ de 'contigo' a 'a ti', que preserva fielmente el sentido del hebreo. Se reemplaza la nota [a] por una alternativa verdadera para אָבוֹא. Se mantiene 'Entraré' en el texto principal como opción española natural, pero con una nota que refleja la alternativa de 'venir'. Se conserva 'tu casa' y 'holocaustos' por fidelidad a la evidencia fuente y a la auditoría POB. Se reordenan las notas para que los marcadores sean únicos y aparezcan anclados en el lugar pertinente del texto.
