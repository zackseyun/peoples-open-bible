translation:
  language: es
  text: 'Y dijo[a]: «¿Qué vieron en tu casa?» Y Ezequías dijo: «Vieron todo lo que hay en mi casa. No hubo nada que no les mostré entre mis tesorerías[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu palacio». El hebreo dice «en tu casa».
    reason: lexical_alternative
  - marker: b
    text: O «depósitos» o «almacenes». El término hebreo puede referirse a lugares donde se guardan valores o provisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué cosa
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español; mantiene la brevedad y la fuerza de la pregunta original.
- source_word: רָאוּ
  english_pob_choice: did they see / saw
  chosen_spanish: vieron
  alternatives_spanish:
  - han visto
  - miraron
  lexicon: HALOT
  rationale: El perfecto narrativo hebreo se expresa de forma natural con pretérito simple en español.
- source_word: בְּבֵיתֶךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu palacio
  lexicon: HALOT
  rationale: «Casa» reproduce el sentido literal del hebreo y evita introducir «palacio» sin necesidad; el contexto real puede sugerir residencia real, pero el texto dice «casa».
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: Nombre propio bíblico estándar
  rationale: Forma castellana usual y reconocible del nombre.
- source_word: אֵת כָּל אֲשֶׁר בְּבֵיתִי
  english_pob_choice: everything that is in my house
  chosen_spanish: todo lo que hay en mi casa
  alternatives_spanish:
  - todo lo que está en mi casa
  - todo lo que hay en mi hogar
  lexicon: HALOT
  rationale: Conserva la idea de totalidad de la expresión hebrea. «Hay» suena más natural que una relativa pesada, sin perder el alcance inclusivo.
- source_word: לֹא הָיָה דָבָר
  english_pob_choice: There was nothing
  chosen_spanish: No hubo nada
  alternatives_spanish:
  - No había nada
  - No existió nada
  lexicon: HALOT
  rationale: Equivale bien al negativo existencial hebreo y encaja con el flujo narrativo del español.
- source_word: אֲשֶׁר לֹא הִרְאִיתִם
  english_pob_choice: that I did not show them
  chosen_spanish: que no les haya mostrado
  alternatives_spanish:
  - que no les mostré
  - que no les dejé ver
  lexicon: HALOT
  rationale: El hifil de ראה implica ‘hacer ver/mostrar’; en español, «mostrar» preserva ese valor causal. El subjuntivo perfecto en la relativa negativa funciona bien después de «nada».
- source_word: בְּאֹצְרֹתָי
  english_pob_choice: among my treasuries
  chosen_spanish: entre mis tesoros
  alternatives_spanish:
  - entre mis tesorerías
  - en mis tesoros
  lexicon: HALOT
  rationale: «אוצרות» puede ser depósitos/tesoros. En español, «tesoros» comunica el contenido valioso del lugar; «entre» refleja el matiz contextual que la POB inglesa señaló con «among».
theological_decisions:
- issue: Valor de בְּבֵיתֶךָ en contexto real
  english_pob_reading: Or “in your palace.” Hebrew “in your house.”
  chosen_spanish_reading: «en tu casa» en el texto; posible nota de que puede entenderse como «palacio»
  alternative_spanish_readings:
  - en tu palacio
  - en tu residencia real
  rationale: Mantener «casa» respeta la forma hebrea y la decisión auditada de la POB inglesa. El sentido de palacio es contextual, no una sustitución obligatoria en el texto principal.
  doctrine_reference: Ninguno; decisión léxica-contextual.
- issue: Alcance de בְּאֹצְרֹתָי
  english_pob_reading: Or “storehouses.” The Hebrew term can refer to places where valuables or supplies are kept.
  chosen_spanish_reading: «entre mis tesoros» como texto principal; posible nota alternativa «depósitos»/«almacenes»
  alternative_spanish_readings:
  - entre mis depósitos
  - entre mis almacenes
  rationale: El contexto inmediato trata de bienes mostrados a mensajeros; «tesoros» capta mejor el matiz de riqueza que «almacenes», sin excluir la amplitud semántica del hebreo.
  doctrine_reference: Ninguno; decisión léxica-contextual.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo de WLC y toma en cuenta el audit trail inglés de la POB: mantiene la pregunta breve, conserva la repetición de «mi casa», y refleja la revisión aprobada que prefirió una expresión equivalente a «among my treasuries».'
  spanish_consistency_notes:
  - Se usa «Ezequías» como forma bíblica estándar en español.
  - Se conserva la distinción entre «casa» y «tesoros» para no fusionar dos imágenes distintas del hebreo.
  - «Mostrar» se usa para rendir el causativo de ראה, no simplemente «ver».
  - El español evita arcaísmos innecesarios, pero mantiene un registro reverente y publicable.
