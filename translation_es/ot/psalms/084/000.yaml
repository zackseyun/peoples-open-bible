translation:
  language: es
  text: 'Para el director del coro: según la Guitit[a][b]. Salmo de los hijos de Coré[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Guitit; el término probablemente se refiere a una indicación musical, una melodía o un instrumento, pero su sentido preciso es incierto.
    reason: lexical_alternative
  - marker: b
    text: 'O: «la Guitit».'
    reason: previous_rendering
  - marker: c
    text: 'O: «para los hijos de Coré». La preposición hebrea puede indicar autoría, asociación o dedicación en los encabezados de salmos.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el músico principal
  - Para el director musical
  - Para el líder
  lexicon: HALOT
  rationale: En encabezados de salmos, el participio señala a la persona que dirige la ejecución musical. «Director del coro» comunica bien esa función en español moderno y mantiene el contexto cultual-musical sin volverlo demasiado técnico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - al son de
  - con
  - sobre
  lexicon: HALOT
  rationale: En títulos musicales, la preposición introduce con frecuencia una indicación de melodía, estilo o instrumento. «Según» conserva la ambigüedad mejor que resolverla como una indicación más específica.
- source_word: הַגִּתִּית
  english_pob_choice: the Gittith
  chosen_spanish: la Guitít
  alternatives_spanish:
  - el instrumento de Gat
  - la melodía de Gat
  - la Guitit
  lexicon: HALOT
  rationale: Se translitera el término para preservar la incertidumbre del hebreo. La forma española mantiene el valor de nombre técnico sin fingir que el referente exacto está claro.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: of the sons of Korah
  chosen_spanish: de los hijos de Coré
  alternatives_spanish:
  - para los hijos de Coré
  - perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: La preposición puede indicar autoría, asociación o dedicación. «De los hijos de Coré» conserva esa amplitud con una fórmula natural en español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Poema
  - Melodía
  lexicon: HALOT
  rationale: «Salmo» es el equivalente de género más estable y comprensible en español para este encabezado litúrgico-musical.
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo «the Gittith» con transliteración por la incertidumbre del término y aclaró en nota que su sentido exacto es inseguro. También preservó la ambigüedad de לִבְנֵי קֹרַח con una nota alternativa; la redacción española sigue esas mismas decisiones sin resolver indebidamente el término técnico.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se prefiere «Coré» como forma española estable del nombre propio bíblico.
  - Se conserva el registro litúrgico breve y sobrio propio de un título de salmo.
