base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/011.yaml
  text: Therefore[a], let all who are so minded set out together, just as it has been decided by me and my seven friends who are counselors[b];
  footnotes:
  - marker: a
    text: Or, 'let all who intend it go forth together.' The Greek verb ἐνθυμοῦνται can mean 'intend' or 'have in mind,' and συνεξορμάσθωσαν can be rendered more literally 'go forth together.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the seven friends who are my counselors' reflects court language. 'Friends' may denote an official rank at a royal court, not merely personal companions.
    reason: cultural_note
