review_pass:
  verdict: revise
  source_alignment_summary: La cláusula principal está bien encaminada al seguir la revisión auditada de συνείδισαν como 'insultaron' y al conservar 'trono de gloria'. Sin embargo, 'en su humillación' no preserva suficientemente la imagen concreta de ἐν καταπατήσει ('en su pisoteo / mientras era pisoteada'), y 'derribaron' cambia el sujeto implícito singular de κατέσπασεν a plural. Conviene mantener la fuerza de la imagen de pisoteo y evitar introducir un plural no presente en el griego.
  spanish_quality_summary: El borrador es legible y digno, pero 'en su humillación' suaviza demasiado la metáfora física del original. Además, la segunda cláusula suena mejor en español con sujeto singular implícito si se evita atribuirla explícitamente a 'las naciones'. La nota textual actual es útil, pero puede formularse con más precisión y menos metacomentario técnico.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Jerusalén'', ''esplendor'' y ''trono de gloria'' están bien. El ajuste principal es léxico: ἐν καταπατήσει debe reflejar ''pisoteo/pisoteada'' más que una abstracción como ''humillación''.'
  issues:
  - severity: medium
    issue: '''en su humillación'' debilita ἐν καταπατήσει'
    rationale: El sustantivo griego conserva la imagen concreta de ser hollada o pisoteada. 'Humillación' comunica vergüenza o abatimiento, pero borra el cuadro físico central que el inglés auditado quiso preservar con 'in her trampling'.
  - severity: medium
    issue: '''derribaron'' introduce sujeto plural para κατέσπασεν'
    rationale: El griego tiene verbo singular. Aunque el sujeto pueda entenderse de forma impersonal o colectiva, el español puede evitar imponer 'las naciones' como sujeto directo usando una forma singular más cercana al original, como 'derribó'.
  - severity: low
    issue: La nota b contiene metacomentario innecesario
    rationale: '''La lectura griega está textualmente tensionada'' suena técnico y poco natural para una nota de lector. Basta explicar la alternativa y que la traducción sigue la lectura auditada ''insultaron/reprocharon''.'
  revised_spanish_text: Pues las naciones insultaron a Jerusalén en su pisoteo[a]; derribó su esplendor del trono de gloria[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Pues las naciones vieron a Jerusalén pisoteada». La traducción sigue la revisión auditada que entiende el verbo como «insultaron/reprocharon».'
    reason: textual_variant
  - marker: b
    text: Lit. «del trono de gloria»; también puede entenderse «de un trono glorioso».
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'humillación' por 'pisoteo' para conservar la imagen concreta de ἐν καταπατήσει y se ajusta la segunda cláusula a singular ('derribó') para no introducir un sujeto plural que el griego no expresa. También se simplifican y reordenan las notas para que el anclaje corresponda mejor al texto revisado.
