translation:
  language: es
  text: Entonces Betel[a] envió a Sharezer, a Regem-melec y a sus hombres, para implorar el favor[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Betel. Algunos entienden esto como «la casa de Dios», pero aquí lo más probable es el nombre del lugar.
    reason: alternative_reading
  - marker: b
    text: O «buscar el favor de Yahvé». El modismo hebreo literalmente implica «ablandar» o «aplacar el rostro» de Yahvé, es decir, buscar su favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - había enviado
  lexicon: HALOT
  rationale: El waw consecutivo narra una acción pasada simple; en español, «envió» comunica el valor narrativo sin forzar una secuencia verbal más marcada de lo que exige el hebreo.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - la casa de Dios
  - Bet-el
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio de lugar/comunidad. «Betel» conserva el topónimo y evita introducir la lectura explicativa «la casa de Dios», que el contexto no exige.
- source_word: שַׂר אֶצֶר
  english_pob_choice: Sharezer
  chosen_spanish: Sharezer
  alternatives_spanish:
  - Sar-ezer
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. Se conserva una forma reconocible en español sin traducirlo como título o apelativo.
- source_word: וְרֶגֶם מֶלֶךְ
  english_pob_choice: Regem-melech
  chosen_spanish: Regem-melec
  alternatives_spanish:
  - Regem-melech
  lexicon: HALOT
  rationale: También es nombre propio compuesto. En español, «Regem-melec» mantiene la transliteración y adapta la grafía final a una forma más natural para lectores hispanos, sin convertirlo en una frase como «oficial del rey».
- source_word: וַאֲנָשָׁיו
  english_pob_choice: and his men
  chosen_spanish: y a sus hombres
  alternatives_spanish:
  - y sus hombres
  - y los hombres con él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular se refleja naturalmente como «sus». Se mantiene la relación inmediata con el personaje nombrado antes, sin reanalizar el antecedente como «Betel» de forma explícita.
- source_word: לְחַלּוֹת אֶת־פְּנֵי
  english_pob_choice: to entreat the favor of
  chosen_spanish: para implorar el favor de
  alternatives_spanish:
  - para buscar el favor de
  - para apaciguar
  lexicon: HALOT
  rationale: La expresión idiomática literalmente involucra «suavizar/entregar el rostro» y en español la idea se comunica con un verbo de súplica. «Implorar el favor de» conserva el sentido de petición reverente sin perder la fuerza idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino sin sustituirlo por un título genérico como «Señor».
theological_decisions:
- issue: Identificación de בֵּית אֵל como sujeto
  english_pob_reading: Bethel as the sender
  chosen_spanish_reading: Betel como el remitente
  alternative_spanish_readings:
  - la casa de Dios como el remitente
  - Betel como una designación de lugar o comunidad
  rationale: El hebreo presenta a בֵּית אֵל con verbo singular, lo que favorece tratarlo como sujeto colectivo/topónimo. La traducción evita imponer una lectura devocional («la casa de Dios») donde el contexto parece referirse a la comunidad o lugar llamado Betel.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; translate titles, transliterate names'
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Nombre propio. En español se conserva como «Yahvé» para mantener la identidad del nombre de pacto y evitar el reemplazo por una designación funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la decisión auditada en inglés POB: Betel como topónimo, nombres propios transliterados, y el modismo לְחַלּוֹת אֶת־פְּנֵי expresado en español mediante una construcción de súplica con nota alternativa. No se detectaron revisiones aplicadas en el paquete fuente; el pasaje muestra alto acuerdo entre auditorías.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se transliteran los nombres propios sin traducirlos como frases comunes.
  - «Favor» se conserva por la fuerza idiomática del hebreo y por coherencia con el inglés auditado, mientras la nota preserva la alternativa literal semántica.
  - La puntuación y el orden siguen el español natural sin perder los referentes del hebreo.
