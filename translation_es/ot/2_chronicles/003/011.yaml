translation:
  language: es
  text: 'Las alas de los querubines medían veinte codos: un ala medía cinco codos[a], llegando a la pared de la casa[b], y la otra ala medía cinco codos, llegando al ala del otro querubín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tocando». El participio hebreo puede enfatizar tanto el contacto real como la extensión hasta un punto.
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí se refiere al edificio del templo.
    reason: cultural_note
lexical_decisions:
- source_word: וְכַנְפֵי הַכְּרוּבִים
  english_pob_choice: The wings of the cherubim
  chosen_spanish: Las alas de los querubines
  alternatives_spanish:
  - Y las alas de los querubines
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto "alas" y el transliterado tradicional "querubines" para los seres celestiales. Se omite la conjunción inicial por fluidez española, sin perder el sentido del enunciado descriptivo.
- source_word: אָרְכָּם
  english_pob_choice: were ... long
  chosen_spanish: medían
  alternatives_spanish:
  - tenían una longitud de
  lexicon: HALOT
  rationale: El hebreo expresa la longitud de manera nominal; en español, "medían" comunica con naturalidad la medida arquitectónica sin añadir contenido nuevo.
- source_word: אַמּוֹת עֶשְׂרִים
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad antigua "codos" para mantener el registro del texto fuente y su terminología arquitectónica.
- source_word: כְּנַף הָאֶחָד
  english_pob_choice: one wing
  chosen_spanish: una ala
  alternatives_spanish:
  - la una ala
  lexicon: HALOT
  rationale: Aunque el hebreo marca definidamente la unidad, en español la expresión más idiomática en una descripción de medidas es "una ala".
- source_word: לְאַמּוֹת חָמֵשׁ
  english_pob_choice: was five cubits
  chosen_spanish: medía cinco codos
  alternatives_spanish:
  - tenía cinco codos
  lexicon: HALOT
  rationale: El hebreo elide la cópula; en español conviene suplir la idea de medida con "medía" para mantener claridad y naturalidad.
- source_word: מַגַּעַת
  english_pob_choice: reaching
  chosen_spanish: llegando
  alternatives_spanish:
  - tocando
  - alcanzando
  lexicon: HALOT
  rationale: '"Llegando" conserva la idea de extensión hasta un límite y deja abierta la posibilidad de contacto real, como señala el audit trail inglés.'
- source_word: לְקִיר הַבַּיִת
  english_pob_choice: to the wall of the house
  chosen_spanish: a la pared de la casa
  alternatives_spanish:
  - a la pared del templo
  lexicon: HALOT
  rationale: Se mantiene la lectura literal de "casa" en concordancia con el hebreo. El contexto arquitectónico del templo queda claro en la perícopa sin necesidad de sustituir el término fuente.
- source_word: וְהַכָּנָף הָאַחֶרֶת
  english_pob_choice: and the other wing
  chosen_spanish: y la otra ala
  alternatives_spanish:
  - y la segunda ala
  lexicon: HALOT
  rationale: '"Otra" corresponde mejor a אַחֶרֶת que "segunda", la cual sería más interpretativa.'
- source_word: לִכְנַף הַכְּרוּב הָאַחֵר
  english_pob_choice: to the wing of the other cherub
  chosen_spanish: al ala del otro querubín
  alternatives_spanish:
  - al ala del segundo querubín
  lexicon: HALOT
  rationale: Se mantiene la correspondencia léxica entre el plural colectivo "querubines" y el singular distributivo "otro querubín"; "otro" refleja mejor el hebreo que "segundo".
theological_decisions:
- issue: Referente de "la casa"
  english_pob_reading: '"House" here refers to the temple building.'
  chosen_spanish_reading: '"La casa" se conserva literalmente, entendida en el contexto como el edificio del templo.'
  alternative_spanish_readings:
  - '"el templo"'
  - '"la casa del templo"'
  rationale: No se reemplaza el término fuente por una glosa interpretativa en el texto principal. La nota puede aclarar que el referente es el edificio del templo, preservando así la forma hebrea y la inteligibilidad contextual.
  doctrine_reference: 2 Crónicas 3:11; uso contextual de בַּיִת en literatura del templo
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo y el audit trail inglés sin cambios sustanciales respecto a la solución previa; la única adaptación principal es el traslado al español con medidas idiomáticas y conservación del valor literal de "casa" con nota aclaratoria.
  spanish_consistency_notes:
  - Se mantiene "querubines/querubín" de manera consistente para reflejar el colectivo y el singular del hebreo.
  - Se conserva "codos" como unidad antigua de medida, en paralelo con el inglés "cubits".
  - '"Otra" se usa uniformemente para אַחֶרֶת/הָאַחֵר, evitando convertirlo en "segunda" sin base textual.'
  - La nota sobre la pared conserva la alternativa de contacto/alcance, ya presente en el audit trail inglés.
