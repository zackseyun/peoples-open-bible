translation:
  language: es
  text: Y los reyes que nos rodeaban combatieron contra nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘nos hicieron guerra’; el verbo griego puede abarcar el sentido más pleno de emprender guerra contra alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπολέμησαν
  english_pob_choice: fought against
  chosen_spanish: nos hicieron guerra
  alternatives_spanish:
  - combatieron contra nosotros
  - lucharon contra nosotros
  - nos atacaron
  lexicon: BDAG; πολεμέω
  rationale: El aoristo de πολεμέω puede expresar ‘hacer guerra’ o ‘combatir’. En español, ‘nos hicieron guerra’ conserva con claridad el sentido bélico pleno y la orientación hostil hacia ‘ἡμᾶς’, sin sonar demasiado técnico.
- source_word: οἱ βασιλεῖς
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los monarcas
  - los soberanos
  lexicon: BDAG; βασιλεύς
  rationale: ‘Reyes’ es la equivalencia natural y directa de βασιλεῖς. Mantiene el referente político-militar del texto sin añadir matices ajenos.
- source_word: οἱ κύκλῳ ἡμῶν
  english_pob_choice: around us
  chosen_spanish: de alrededor de nosotros
  alternatives_spanish:
  - que nos rodeaban
  - que estaban a nuestro alrededor
  - vecinos a nosotros
  lexicon: BDAG; κύκλῳ
  rationale: La expresión indica ubicación circundante o envolvente. ‘De alrededor de nosotros’ preserva el valor espacial y la referencia geopolítica, aunque en español suena algo más literal que ‘que nos rodeaban’.
translation_notes:
  revision_awareness: El texto griego es breve y el auditorio inglés ya registró la alternativa lexical de πολεμέω (‘made war on us’). La redacción española conserva esa tensión semántica con una forma idiomática que sigue siendo fiel al campo bélico del original. No se introdujeron cambios textuales ni decisiones doctrinales.
  spanish_consistency_notes:
  - Se mantuvo ‘reyes’ para βασιλεῖς, sin sustituirlo por un término más interpretativo.
  - Se evitó ‘SEÑOR’ u otras convenciones de ocultamiento porque el versículo no contiene el nombre divino.
  - La nota al pie refleja la alternativa verbal del audit trail inglés y no introduce una nueva interpretación.
  - La preposición ‘de alrededor de nosotros’ sigue la idea de circundancia de κύκλῳ ἡμῶν, aunque otra redacción más idiomática posible sería ‘que nos rodeaban’.
