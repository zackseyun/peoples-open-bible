base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/005.yaml
  text: And you shall prepare a quarter of a hin of wine for the drink offering[a], with the burnt offering or the sacrifice[b], for each lamb.
  footnotes:
  - marker: a
    text: Or, more literally, 'upon the burnt offering.' The Hebrew preposition can be rendered more formally, but here likely indicates accompaniment in the sacrificial rite.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the one lamb'; the translation 'for each lamb' brings out the distributive force in the instruction.
    reason: lexical_alternative
