- from: Pero el séptimo día es sábado[a] para Yahvé tu Dios. No harás ninguna obra tú, ni tu hijo, ni tu hija, ni tu esclavo[b], ni tu esclava, ni tu buey, ni tu asno, ni ninguno de tus animales[c], ni el extranjero que está dentro de tus puertas[d], para que tu esclavo y tu esclava descansen como tú.
  to: 'Pero el séptimo día es sábado[a] para Yahvé tu Dios. No harás ningún trabajo: ni tú, ni tu hijo, ni tu hija, ni tu esclavo[b], ni tu esclava, ni tu buey, ni tu asno, ni ninguno de tus animales domésticos[c], ni el extranjero[d] que está dentro de tus puertas[e], para que tu esclavo y tu esclava descansen como tú.'
