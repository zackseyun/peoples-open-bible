base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/038.yaml
  text: You, in righteousness and uprightness, shall be righteous, and all your plantings shall prosper. For thus Enoch, the father of your father, commanded Methuselah his son, and Methuselah his son Lamech, and Lamech...
  footnotes:
  - marker: a
    text: Or 'Enoch commanded your father Methuselah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:54Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Geez text: addressed ''you,'' includes ''righteousness and uprightness,'' renders the verb about being righteous, includes ''all your plantings,'' and preserves the chain of command from Enoch to Methuselah to Lamech. Kept the final clause unfinished with ellipsis because the provided source text ends abruptly.'
translation:
  language: es
  text: Ustedes, en justicia y rectitud, serán justos, y todos sus plantíos prosperarán. Porque así Enoc, el padre de su padre, mandó a Matusalén su hijo, y Matusalén a su hijo Lamec, y Lamec...
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: በጽድቅ / በርትዕ
  english_pob_choice: in righteousness and uprightness
  chosen_spanish: en justicia y rectitud
  alternatives_spanish:
  - en justicia y en rectitud
  - con justicia y rectitud
  - en justicia y en integridad
  lexicon: justicia; rectitud
  rationale: El par ge'ez distingue una cualidad de justicia/covenantal y otra de rectitud o integridad. En español, 'justicia y rectitud' conserva la doblez sin volverlo redundante ni demasiado interpretativo.
- source_word: ትጸድቁ
  english_pob_choice: shall be righteous
  chosen_spanish: serás justo
  alternatives_spanish:
  - serás recto
  - serás declarado justo
  - te mostrarás justo
  lexicon: justo / recto
  rationale: La POB inglesa mantiene el valor de 'be righteous'. En español, 'serás justo' comunica el estado ético sin introducir un matiz forense no explícito en el contexto inmediato.
- source_word: ኵሉ፡ ተክሊክሙ
  english_pob_choice: all your plantings
  chosen_spanish: todos tus plantíos
  alternatives_spanish:
  - todas tus plantaciones
  - todas tus siembras
  - todo lo plantado por ti
  lexicon: plantíos; plantar
  rationale: '''Plantings'' se refiere a lo plantado/cultivado. ''Plantíos'' es natural en español bíblico moderno y conserva la referencia agrícola sin explicitar más de lo que da el texto.'
- source_word: አንትሙ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Vosotros
  - Ustedes
  lexicon: segunda persona singular
  rationale: El destinatario es singular en la forma española porque el inglés POB también lo trata así y el contexto inmediato apunta a un interlocutor individual.
- source_word: እስመ ...
  english_pob_choice: For thus ...
  chosen_spanish: Porque así ...
  alternatives_spanish:
  - Pues así ...
  - Porque de esta manera ...
  lexicon: causal conjunction
  rationale: '''Porque así'' reproduce la relación causal/explicativa de la partícula introduciendo la cadena genealógica y el mandato transmitido.'
- source_word: አቡሁ ለአቡክሙ
  english_pob_choice: the father of your father
  chosen_spanish: el padre de tu padre
  alternatives_spanish:
  - el antepasado de tu padre
  - el padre de vuestro padre
  lexicon: parentesco genealógico
  rationale: Se conserva la formulación directa del texto y la precisión genealógica de que Enoc es 'el padre de tu padre', es decir, el antepasado de la línea.
- source_word: ወልዱ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  - el propio hijo
  lexicon: relación filial
  rationale: '''His son'' se traduce de manera directa y natural en español, manteniendo la cadena Enoc → Matusalén → Lamec.'
theological_decisions:
- issue: Justicia/rectitud como respuesta ética, no título ceremonial
  english_pob_reading: You, in righteousness and uprightness, shall be righteous
  chosen_spanish_reading: Tú, en justicia y rectitud, serás justo
  alternative_spanish_readings:
  - Tú, en justicia e integridad, serás justo
  - Tú, con justicia y rectitud, vivirás rectamente
  rationale: El texto exhorta o describe una condición moral vinculada a 'justicia y rectitud'. No hay razón para convertirlo en lenguaje litúrgico o sacramental; la traducción debe conservar la tensión ética simple del original.
  doctrine_reference: Ética de la justicia/rectitud en el lenguaje sapiencial y exhortativo bíblico
- issue: Transmisión genealógica explícita
  english_pob_reading: For thus Enoch, the father of your father, commanded Methuselah his son, and Methuselah his son Lamech
  chosen_spanish_reading: Porque así Enoc, el padre de tu padre, mandó a Matusalén su hijo, y Matusalén a Lamec
  alternative_spanish_readings:
  - Porque así Enoc mandó a tu padre Matusalén, y Matusalén a Lamec
  - Porque así Enoc, antepasado de tu padre, mandó a Matusalén, su hijo, y éste a Lamec
  rationale: Se preserva la cadena genealógica con sus relaciones exactas, ya que el audit trail corrigió una confusión previa que mezclaba los vínculos familiares. Mantenerlos evita borrar la función de transmisión de mandato entre generaciones.
  doctrine_reference: Genealogía patriarcal y transmisión de instrucción
- issue: Final abrupto del fragmento
  english_pob_reading: and Lamech...
  chosen_spanish_reading: y Lamec...
  alternative_spanish_readings:
  - y Lamec…
  - y Lamec, ...
  rationale: La fuente proporcionada termina de forma abrupta; la traducción debe respetar el corte sin completar el contenido.
  doctrine_reference: Integridad textual frente a laguna de fuente
translation_notes:
  revision_awareness: Se atendió la corrección del audit trail que exige conservar la distinción entre «el padre de tu padre» y «Matusalén su hijo», evitando la confusión genealógica previa. También se mantuvo el final inconcluso con puntos suspensivos porque el texto fuente termina abruptamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en la colección, pero este versículo no contiene el nombre divino.
  - Se conservó «Matusalén» y «Lamec» en forma castellana estándar y consistente con el registro bíblico.
  - «Justicia y rectitud» mantiene el paralelo semántico del ge'ez sin forzar tecnicismos.
  - La nota [a] está anclada en «justo» para ofrecer la alternativa de lectura sin duplicar marcadores.
