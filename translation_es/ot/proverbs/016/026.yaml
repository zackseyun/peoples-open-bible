review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: נֶפֶשׁ como «apetito», conservación de la imagen «su boca», y causalidad correcta en la segunda cola. También preserva las alternativas principales en notas. Sin embargo, la combinación «trabajador labora» suena algo forzada en español y no reproduce del modo más natural el juego hebreo; además, el orden de las notas en el texto no coincide con el orden del POB inglés, donde la nota sobre «presses him on» está anclada a la primera cláusula final. Conviene un ajuste menor para mejorar legibilidad y precisión estilística sin alterar el sentido.'
  spanish_quality_summary: 'El español es claro y comprensible, pero «labora» resulta más rígido y menos idiomático en registro bíblico actual que «trabaja». «El apetito del trabajador trabaja para él» mantiene el paralelismo léxico de forma natural. «Porque su boca lo impulsa» es aceptable, aunque «lo apremia» reflejaría mejor la presión del hebreo; aun así, el cambio mínimo más necesario es la primera cláusula. Hay además pequeños detalles formales en notas: comillas y glosa hebrea innecesariamente incrustada al inicio.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No intervienen Yahvé/Mesías/esclavo, etc. «Apetito» para נֶפֶשׁ está bien justificado; «su boca» preserva la imagen literal; «para él» mantiene la elección principal con nota reflexiva alternativa.
  issues:
  - severity: medium
    issue: «Trabajador labora» suena poco natural en español
    rationale: Aunque intenta conservar el juego de palabras hebreo, «labora» es más marcado y menos idiomático; «trabaja» conserva suficientemente el paralelismo con mejor fluidez y legibilidad eclesial amplia.
  - severity: low
    issue: Anclaje y orden de notas mejorables
    rationale: El texto español pone [a][b] tras «para él» y [c] al final, mientras que el POB inglés ancla también la alternativa de «presses him on» junto a la primera cláusula. No es un error grave de sentido, pero conviene uniformidad de auditoría.
  - severity: low
    issue: Nota c usa «acosa», que puede sugerir hostigamiento interpersonal
    rationale: Entre las alternativas para אָכַף, «urge», «apremia» o «constriñe» reflejan mejor presión/compulsión que «acosa», que en español moderno puede desviar el matiz.
  revised_spanish_text: El apetito[a] del trabajador trabaja para él[b][c], porque su boca lo impulsa.
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «El alma» o «el deseo» del trabajador trabaja para él. נֶפֶשׁ puede significar «alma», «vida» o «apetito»; aquí el contexto de «su boca» favorece «apetito».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para sí». El hebreo dice literalmente «para él», aunque algunos entienden aquí un sentido reflexivo.'
    reason: alternative_reading
  - marker: c
    text: 'O: «su boca lo urge», «lo apremia» o «lo constriñe». El verbo hebreo expresa presión o impulso coercitivo.'
    reason: lexical_alternative
