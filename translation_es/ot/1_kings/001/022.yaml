- from: Y he aquí[a], todavía estaba hablando con el rey, cuando Natán el profeta entró.
  to: Y he aquí[a], mientras ella todavía hablaba con el rey, Natán el profeta entró.
  rationale: Se ajusta la sintaxis para reflejar mejor la simultaneidad continua del hebreo («mientras ella todavía hablaba») y se corrige la nota para que presente una alternativa real al ancla textual.
