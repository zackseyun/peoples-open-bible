translation:
  language: es
  text: 'Y dijo al hombre[a]: «He aquí, el temor del Señor es sabiduría, y apartarse del mal es entendimiento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la humanidad». El hebreo אָדָם está en singular y se usa de manera representativa para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y él dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la declaración conclusiva; en español, «Y dijo» conserva la continuidad narrativa sin añadir una secuencia temporal más fuerte de la que exige el hebreo.
- source_word: לָאָדָם
  english_pob_choice: to man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - a la gente
  lexicon: HALOT
  rationale: אָדָם aparece en singular con fuerza representativa para la humanidad. «Al hombre» mantiene la forma singular del hebreo y la amplitud referencial.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la sentencia. «Mira» comunica bien ese carácter exhortativo y solemne en español actual.
- source_word: יִרְאַת אֲדֹנָי
  english_pob_choice: the fear of the Lord
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - el miedo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene «temor» para conservar la fuerza de reverencia y asombro del hebreo, y «Yahvé» por la política terminológica del proyecto para el nombre divino. En Job 28:28 el hebreo usa אֲדֹנָי en sentido divino; la equivalencia habitual en este proyecto es Yahvé, no una máscara reverencial.
- source_word: הִיא
  english_pob_choice: that is
  chosen_spanish: es
  alternatives_spanish:
  - eso es
  - esa es
  lexicon: HALOT
  rationale: El pronombre independiente funciona como ecuación enfática. En español, la copula simple «es» puede sostener la identificación sin forzar una glosa innecesaria; la puntuación con coma preserva el valor explicativo.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - conocimiento sabio
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente estándar y más directo para el término sapiencial del pasaje, sin pérdida de su fuerza teológica.
- source_word: וְסוּר
  english_pob_choice: and to turn away
  chosen_spanish: y apartarse
  alternatives_spanish:
  - y alejarse
  - y desviarse
  lexicon: HALOT
  rationale: El infinitivo constructo expresa una acción moral deliberada. «Apartarse» es natural en español y conserva la idea de alejarse activamente del mal.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - de la maldad
  lexicon: HALOT
  rationale: En este contexto sapiencial, רָע tiene sentido ético. «Del mal» mantiene el paralelismo tradicional y la carga moral del hebreo.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - comprensión
  lexicon: HALOT
  rationale: «Entendimiento» refleja bien בינה en literatura sapiencial y se coordina naturalmente con «sabiduría» en español.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: Aunque el texto consonántico presenta אֲדֹנָי, el proyecto español traduce el nombre divino como «Yahvé» de forma transparente. Aquí el audit trail inglés usa «the Lord» por convención de la tradición, pero la política del proyecto evita la máscara reverencial y explicita el nombre divino donde el contexto lo señala.
  doctrine_reference: Project terminology defaults; translation policy for יהוה / YHWH
- issue: Sentido representativo de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la humanidad
  - a la persona humana
  rationale: El singular masculino hebreo funciona de manera representativa. Se conserva esa forma para no borrar la elección léxica y antropológica del texto, aunque el referente abarque a la humanidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en el audit trail inglés, sin revisiones aplicadas. La redacción española sigue de cerca las decisiones léxicas ya verificadas, ajustándolas a la política terminológica española del proyecto, especialmente en el nombre divino y el valor representativo de אָדָם.
  spanish_consistency_notes:
  - Se conservó una estructura breve y sapiencial, con puntuación que reproduce la relación explicativa del hebreo.
  - «Temor» se mantuvo sin suavizarlo a «reverencia» para no atenuar la densidad semántica del término.
  - Se usó «Yahvé» conforme al estándar español del proyecto para el nombre divino.
  - El paralelismo «sabiduría / entendimiento» se mantuvo explícito y natural en español.
