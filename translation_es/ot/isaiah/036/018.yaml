translation:
  language: es
  text: 'No dejen que Ezequías los extravíe[a], diciendo: «Yahvé nos librará». ¿Han librado los dioses de las naciones, cada uno[b], a su tierra de la mano del rey de Asiria?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no sea que Ezequías los incite/extravíe, diciendo»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Han librado los dioses de las naciones, alguno de ellos, a su tierra de la mano del rey de Asiria?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: Do not let
  chosen_spanish: No permitas que
  alternatives_spanish:
  - No dejes que
  - No consientas que
  - No sea que
  lexicon: HALOT
  rationale: En este aviso de advertencia, פֶּן introduce una prevención negativa. En español, «No permitas que» reproduce mejor la fuerza exhortativa y fluye de manera natural que un calco como «no sea que» en este contexto directo.
- source_word: יַסִּית
  english_pob_choice: mislead
  chosen_spanish: engañe
  alternatives_spanish:
  - desvíe
  - incite
  - seduzca
  lexicon: HALOT
  rationale: El hifil de סות puede abarcar la idea de incitar o desviar. «Engañe» comunica adecuadamente el intento de apartarlos de confiar en Yahvé sin cargar el verbo más de lo que permite el contexto.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: standard proper-name convention
  rationale: Se usa la forma española habitual del nombre propio bíblico para legibilidad e पहचानación eclesial, manteniendo la referencia histórica exacta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la convención del proyecto. «Yahvé» preserva la referencia al nombre personal de Dios en el original, sin sustituirlo por un título.
- source_word: יַצִּילֵנוּ
  english_pob_choice: will deliver us
  chosen_spanish: nos librará
  alternatives_spanish:
  - nos salvará
  - nos rescatará
  lexicon: HALOT
  rationale: El hifil de נצל en este marco bélico expresa liberar o rescatar. «Librará» es natural en español y conserva la fuerza de rescate frente al peligro militar.
- source_word: הַהִצִּילוּ
  english_pob_choice: Have any ... delivered
  chosen_spanish: ¿Han librado ...?
  alternatives_spanish:
  - ¿Han rescatado ...?
  - ¿Han salvado ...?
  lexicon: HALOT
  rationale: La partícula interrogativa con el verbo perfecto forma una pregunta retórica sobre si algún dios nacional ha logrado liberar su tierra. «Han librado» mantiene la forma de pregunta y la idea de éxito en la liberación.
- source_word: אֱלֹהֵי הַגּוֹיִם
  english_pob_choice: the gods of the nations
  chosen_spanish: los dioses de las naciones
  alternatives_spanish:
  - los dioses de los pueblos
  - los dioses nacionales
  lexicon: HALOT
  rationale: Es la traducción directa del constructo, y «naciones» conserva el matiz político-étnico de גוים en este reproche assirio.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada dios
  - cualquiera de ellos
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente, intensificando la idea de uno por uno. «Cada uno» expresa esa distribución con naturalidad en español.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: Se conserva el singular con sufijo tal como aparece en hebreo, pero en español «su tierra» suena más natural que «su tierra de él». El referente sigue siendo distributivo para cada dios.
- source_word: מִיַּד מֶלֶךְ אַשּׁוּר
  english_pob_choice: from the hand of the king of Assyria
  chosen_spanish: de la mano del rey de Asiria
  alternatives_spanish:
  - del poder del rey de Asiria
  - del control del rey de Asiria
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «de la mano de» porque en español es comprensible y mantiene la imagen de poder/control presente en el original.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene explícitamente el Tetragrámaton. Se conserva como nombre propio divino en español mediante «Yahvé», evitando la sustitución por un título. Esto sigue la política terminológica del proyecto y preserva la identidad pactual del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo de forma directa y refleja la revisión reciente del POB inglés: se mantiene la construcción breve de advertencia para פֶּן, se conserva el nombre divino como Yahvé, y se respeta la pregunta retórica distributiva con el valor de אִישׁ. También se tomó en cuenta el ajuste editorial que prefirió una subordinada simple con «diciendo» en lugar de una forma más perifrástica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en toda la sección, conforme al estándar del proyecto.
  - «Librará/librado» se usa para נצל en un contexto militar de rescate, sin cambiarlo a «salvar» salvo que el contexto lo exigiera.
  - «Los» en «engañe, diciendo» mantiene el complemento directo implícito del hebreo y evita sobreexplicación.
  - Se conserva la imagen hebrea «de la mano» por consistencia con otros pasajes de amenaza imperial.
