    issue: La nota [a] está colocada en «dos codos» en vez de en la medida final.
    rationale: 'La nota dice «Hebreo: “un codo y medio”», por lo que debe anclarse a la tercera dimensión, no a la primera. Tal como está, induce a error y no preserva correctamente la auditoría inglesa.'
  revised_spanish_text: Hizo la mesa de madera de acacia; su largo era de dos codos, su ancho de un codo y su alto de un codo y medio[a].
