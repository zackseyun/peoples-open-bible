- from: 'Tú dices[a]: «¡Solo una palabra de labios!». El consejo y la fuerza son para la guerra. Ahora, ¿en quién has confiado, para que te hayas rebelado contra mí?'
  to: 'Tú dices[a]: «¡Solo una palabra de los labios!». El consejo y la fuerza son para la guerra. Ahora, ¿en quién has confiado, que te has rebelado contra mí?'
  rationale: Se ajusta la última cláusula para reflejar mejor el valor de כִּי en la pregunta retórica, siguiendo la documentación del POB inglés («that you have rebelled») y evitando una lectura de propósito no presente en el hebreo. También se suaviza «de labios» a «de los labios» para conservar la imagen fuente con español más natural. La nota alternativa se actualiza para mantener consistencia con el texto revisado.
