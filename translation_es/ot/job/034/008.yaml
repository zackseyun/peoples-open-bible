translation:
  language: es
  text: y se asocia[a] con obradores de iniquidad,[b] y camina con hombres de maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «anda en compañía de». El verbo hebreo puede expresar ir en compañía de otros o unirse a ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «obradores de maldad» o «hombres malvados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָרַח
  english_pob_choice: and keeps company
  chosen_spanish: y anda en compañía
  alternatives_spanish:
  - y va en compañía
  - y se asocia
  - y acompaña
  lexicon: HALOT
  rationale: El verbo aquí, junto con לְחֶבְרָה, expresa asociación o compañía más que simple desplazamiento físico. «Anda en compañía» conserva la imagen de ir con otros y el matiz relacional del contexto.
- source_word: לְ֭/חֶבְרָה
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - compañerismo
  - asociación
  lexicon: HALOT
  rationale: El sustantivo apunta a compañerismo/asociación. «Compañía» funciona de manera natural en español y mantiene la idea de cercanía social.
- source_word: פֹּ֣עֲלֵי אָ֑וֶן
  english_pob_choice: workers of wickedness
  chosen_spanish: los que hacen iniquidad
  alternatives_spanish:
  - obreros de maldad
  - hacedores de maldad
  - obradores de injusticia
  lexicon: HALOT
  rationale: La construcción literalmente dice «hacedores/obreros de ...». En español, «los que hacen iniquidad» preserva bien la estructura verbal y el peso moral de אָוֶן sin sonar forzado.
- source_word: וְ֝/לָ/לֶ֗כֶת
  english_pob_choice: and walks
  chosen_spanish: y camina
  alternatives_spanish:
  - y anda
  - y procede
  lexicon: HALOT
  rationale: «Camina» conserva la metáfora sapiencial de la conducta de vida y su paralelismo con «anda en compañía».
- source_word: אַנְשֵׁי רֶֽשַׁע
  english_pob_choice: men of evil
  chosen_spanish: hombres de maldad
  alternatives_spanish:
  - hombres perversos
  - varones malvados
  - los malvados
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino explícito, por lo que «hombres de maldad» mantiene la forma constructa y la precisión de género. «Maldad» comunica bien רֶשַׁע en español bíblico contemporáneo.
theological_decisions:
- issue: Mantenimiento del paralelismo moral y social
  english_pob_reading: keeps company ... and walks with ...
  chosen_spanish_reading: anda en compañía ... y camina con ...
  alternative_spanish_readings:
  - se asocia ... y convive con ...
  - va con ... y anda con ...
  rationale: El versículo enlaza dos imágenes paralelas de asociación moral. Mantener dos verbos de movimiento/conducta en español preserva la fuerza poética y el juicio ético del original.
  doctrine_reference: Poética sapiencial hebrea; paralelismo sintético/pareado
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; el acuerdo entre revisiones fue alto. La versión española sigue la misma decisión de mantener el paralelismo y la fuerza moral del hebreo, sin suavizar la estructura constructa ni neutralizar el masculino explícito.
  spanish_consistency_notes:
  - Se mantuvo «maldad» para רֶשַׁע y «iniquidad» para אָוֶן, respetando la distinción semántica aunque ambos pertenecen al campo moral negativo.
  - Se evitó «Cristo/Señor» u otra terminología no pertinente; el texto trata de conducta humana y asociación moral.
  - Los marcadores de nota aparecen en el texto exactamente donde corresponden y se usan una sola vez cada uno.
