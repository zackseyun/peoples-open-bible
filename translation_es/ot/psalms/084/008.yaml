review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca las decisiones auditadas en inglés: יֵלְכוּ como movimiento progresivo, מֵחַיִל אֶל חָיִל como modismo principal «de fuerza en fuerza», y יֵרָאֶה en sentido cultual de comparecer ante Dios. Sin embargo, no preserva explícitamente el distributivo singular documentado en el inglés («each one appears»), ya que «cada uno se presenta» sí lo hace, pero conviene mantenerlo; el asunto principal a corregir no es de alineación semántica mayor sino de terminología del topónimo.'
  spanish_quality_summary: El español es claro y natural. «Van de fuerza en fuerza» y «cada uno se presenta ante Dios» son legibles y dignos. La principal mejora necesaria es ajustar «Sion» a la forma más estándar y ampliamente reconocible en español bíblico actual, «Sión», con tilde. También conviene afinar la nota b para no repetir casi la misma frase entre texto y nota, sino explicar mejor el valor literal «a Dios» frente al idiomático «ante Dios».
  glossary_alignment: No hay conflicto con los términos troncales del proyecto salvo el topónimo. «Dios» está bien para אֱלֹהִים. No aparece Yahvé, Mesías, Cristo, Espíritu, etc. Para צִיּוֹן, la forma española preferible aquí es «Sión», más natural y ortográficamente estándar que «Sion».
  issues:
  - severity: medium
    issue: 'Topónimo sin tilde: «Sion»'
    rationale: En español general y bíblico contemporáneo, la forma normal es «Sión». «Sion» no es imposible, pero resulta menos estándar y menos natural para la meta de español eclesial amplio.
  - severity: low
    issue: Nota b puede expresar mejor la relación entre lo literal y lo idiomático
    rationale: La nota actual dice «Literalmente, “se presenta a Dios”», pero el punto del inglés auditado es que la preposición es literalmente «a Dios», mientras que el sentido contextual es «ante Dios». Conviene formularlo con más precisión para reflejar la evidencia fuente.
  revised_spanish_text: Van de fuerza en fuerza[a]; cada uno se presenta ante Dios en Sión[b].
  revised_footnotes:
  - marker: a
    text: O «de tropa en tropa» o «de victoria en victoria»; el hebreo para «fuerza» también puede denotar fuerza, valor o ejército.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a Dios»; en este contexto, la idea probable es «ante Dios», es decir, presentarse delante de él en adoración.
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción principal porque es fiel al hebreo y a la auditoría inglesa, pero se corrige «Sion» a «Sión» por naturalidad y ortografía estándar en español, y se precisa la nota sobre «ante Dios» para reflejar mejor la diferencia entre la preposición literal y el sentido idiomático cultual.
