    text: El sujeto implícito de «estarán» se entiende por el contexto inmediato como las maldiciones del pacto.
    reason: cross_reference
  revision_rationale: 'La revisión hace ajustes menores de naturalidad y precisión sin cambiar el sentido: se elimina una coma innecesaria, se simplifica la coordinación a ''señal y prodigio'', y se corrige la nota léxica para que ofrezca alternativas reales al término elegido.'
