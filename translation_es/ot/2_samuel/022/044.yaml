translation:
  language: es
  text: Tú me libraste de las contiendas de mi pueblo[a]; me guardaste como cabeza de naciones[b]; un pueblo que yo no conocía me sirvió[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los conflictos de mi pueblo». El hebreo puede referirse a conflicto interno entre los propios miembros del pueblo de David o a disputas que los involucraban.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me preservaste como jefe sobre naciones».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un pueblo que yo no conocía me servirá». El imperfecto hebreo también puede llevar un matiz de futuro en un contexto poético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּפַלְּטֵנִי
  english_pob_choice: You delivered me
  chosen_spanish: Tú me libraste
  alternatives_spanish:
  - Tú me rescataste
  - Tú me salvaste
  lexicon: HALOT
  rationale: פלט en hifil expresa hacer escapar o librar. «Libraste» comunica bien la acción de Dios de sacar al rey del peligro sin perder el matiz de liberación.
- source_word: מֵרִיבֵי
  english_pob_choice: from the strivings
  chosen_spanish: de las contiendas
  alternatives_spanish:
  - de las disputas
  - de los pleitos
  - de las querellas
  lexicon: HALOT
  rationale: ריב puede abarcar contienda, disputa o conflicto. «Contiendas» conserva amplitud y no restringe el sentido a un litigio formal.
- source_word: עַמִּי
  english_pob_choice: of my people
  chosen_spanish: de mi pueblo
  alternatives_spanish:
  - de mi gente
  - entre mi pueblo
  lexicon: HALOT
  rationale: La construcción hebrea permite una referencia amplia a conflictos dentro del propio pueblo. «Mi pueblo» mantiene esa amplitud y suena natural en español.
- source_word: תִּשְׁמְרֵנִי
  english_pob_choice: you kept me
  chosen_spanish: me guardaste
  alternatives_spanish:
  - me preservaste
  - me protegiste
  lexicon: HALOT
  rationale: שׁמר significa guardar, vigilar o preservar. «Me guardaste» conserva la idea de protección sostenida y encaja con el paralelismo del versículo.
- source_word: לְרֹאשׁ גּוֹיִם
  english_pob_choice: as the head of nations
  chosen_spanish: como cabeza de naciones
  alternatives_spanish:
  - como jefe sobre naciones
  - como principal entre naciones
  lexicon: HALOT
  rationale: 'רֹאשׁ es aquí metafórico: jefe o cabeza. «Cabeza de naciones» mantiene la metáfora y el carácter real del texto hebreo.'
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este contexto real, גּוֹיִם designa naciones. «Naciones» es la opción menos ambigua en español moderno.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - un pueblo entero
  lexicon: HALOT
  rationale: El sustantivo singular colectivo es indefinido. «Un pueblo» preserva esa forma y funciona de manera natural en español.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I had not known
  chosen_spanish: yo no conocía
  alternatives_spanish:
  - yo no había conocido
  - yo no había llegado a conocer
  lexicon: HALOT
  rationale: El hebreo expresa ausencia previa de conocimiento o relación. En español, el imperfecto «no conocía» comunica bien la idea de no haber tenido trato previo, sin sobrecargar el tiempo verbal.
- source_word: יַעַבְדֻנִי
  english_pob_choice: served me
  chosen_spanish: me servirá
  alternatives_spanish:
  - me servirá
  - me servirán
  - me servirán / me servía
  lexicon: HALOT
  rationale: עבד puede expresar servicio o sujeción política. En poesía hebrea el imperfecto admite matiz futuro o resultativo; «me servirá» conserva la posibilidad futura que la POB inglesa anotó en nota.
theological_decisions:
- issue: Lenguaje real sobre dominio de naciones
  english_pob_reading: Retain the historical-royal sense without importing later messianic expansion into the main text.
  chosen_spanish_reading: Mantener el sentido histórico-real de la entronización y el dominio del rey, sin introducir explícitamente una lectura mesiánica en el texto principal.
  alternative_spanish_readings:
  - Leerlo directamente como mesiánico en el texto principal
  - Neutralizar el lenguaje real para hacerlo más general
  rationale: El contexto inmediato es el cántico de David sobre su liberación y exaltación. La traducción debe reflejar ese sentido primario y dejar la posible tipología para una nota o lectura canónica más amplia, no para el texto principal.
  doctrine_reference: Primacía del sentido histórico-gramatical; mantener la tensión tipológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el análisis auditado de la POB en inglés. Se mantiene la tensión semántica de ריב, el metáfora de «cabeza», y el posible matiz futuro de יַעַבְדֻנִי, sin resolverlos de forma excesiva. No se registraron revisiones previas aplicadas en el paquete base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo no contiene el tetragrámaton.
  - Se prefirió «Libraste» para פלט y «guardaste» para שׁמר conforme al valor léxico básico, evitando lenguaje devocional más interpretativo.
  - «Cabeza de naciones» conserva la metáfora del hebreo, con nota para la alternativa explicativa.
  - Se mantiene «naciones» para גּוֹיִם y «pueblo» para עַם para respetar la distinción entre plural colectivo y singular colectivo.
  - El futuro «me servirá» se eligió para reflejar la alternativa poética señalada por la POB inglesa, sin excluir una lectura de pasado/resultativo en la nota.
