  lexicon: BDAG
  rationale: 현재형의 지속을 합쇼체 현재로 살린다.
- source_word: ἐν πίστει … τῇ τοῦ υἱοῦ τοῦ θεοῦ
  english_pob_choice: by faith in the Son of God
  chosen_korean: 하나님의 아들의 믿음 안에서
