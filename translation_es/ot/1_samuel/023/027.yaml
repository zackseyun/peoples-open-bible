    reason: lexical_alternative
  - marker: b
    text: O «han asaltado la tierra» o «han invadido la tierra». El verbo hebreo puede denotar una incursión de saqueo o un avance hostil contra el territorio.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal de la acción filistea para reflejar con mayor fidelidad פָשְׁטוּ como incursión/raid, no como invasión plena. Se elimina una nota redundante sobre «Saúl» que no preservaba ninguna alternativa significativa. Se conserva «ven» como decisión contextual válida, con una nota mejor enfocada.
