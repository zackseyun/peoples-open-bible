translation:
  language: es
  text: Porque los hijos santos de hombres buenos ofrecían sacrificios en secreto[a], y en armonía acordaron la ley divina[b], para que los santos[c] participaran igualmente de las mismas cosas buenas y de los peligros, mientras sus padres ya cantaban de antemano alabanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secretamente». El griego κρυφῇ enfatiza que la acción sacrificial se realizaba de manera oculta.
    reason: lexical_alternative
  - marker: b
    text: O «la ley de la divinidad». La expresión griega es inusual; «la ley divina» se ha elegido como la opción más clara en español para τὸν τῆς θειότητος νόμον.
    reason: lexical_alternative
  - marker: c
    text: O «los consagrados». El griego τοὺς ἁγίους significa más literalmente «los santos», es decir, «los santos/consagrados» o «los santos» en el sentido de «los santos de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: κρυφῇ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - privadamente
  lexicon: LSJ
  rationale: El adverbio griego indica modo clandestino. «En secreto» es natural en español y conserva el matiz de ocultamiento sin volverlo más interpretativo de lo necesario.
- source_word: ἐθυσίαζον
  english_pob_choice: were ... offering sacrifices
  chosen_spanish: ofrecían sacrificios
  alternatives_spanish:
  - estaban sacrificando
  - ofrecían sacrificio
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua o repetida. En español, «ofrecían sacrificios» mantiene el sentido cultual y el valor aspectual sin sonar forzado.
- source_word: ὅσιοι
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - piadosos
  - devotos
  - santos
  lexicon: LSJ
  rationale: Aquí el término describe personas reverentes y fieles a Dios. «Santos» conserva el tono sagrado del pasaje y dialoga bien con τοὺς ἁγίους más adelante.
- source_word: παῖδες ἀγαθῶν
  english_pob_choice: children of good men
  chosen_spanish: hijos de hombres buenos
  alternatives_spanish:
  - hijos de los buenos
  - nobles hijos
  - descendientes de hombres buenos
  lexicon: LSJ
  rationale: παῖδες puede significar hijos o descendientes; ἀγαθῶν aquí se refiere de manera más natural a padres/antepasados dignos. «Hijos de hombres buenos» conserva la relación genealógica sin sobreespecificar.
- source_word: τὸν τῆς θειότητος νόμον
  english_pob_choice: the divine law
  chosen_spanish: la ley de la divinidad
  alternatives_spanish:
  - la ley divina
  - la ley de Dios
  - la ley de la piedad
  lexicon: LSJ
  rationale: La construcción griega es inusual y el audit trail inglés opta por «the divine law» para no diluir θειότης. En español, «la ley de la divinidad» preserva esa rareza de forma auditable; «la ley divina» sería más idiomático pero menos transparente respecto al original.
- source_word: ἐν ὁμονοίᾳ
  english_pob_choice: in harmony
  chosen_spanish: en armonía
  alternatives_spanish:
  - en unidad
  - de común acuerdo
  - en un mismo sentir
  lexicon: LSJ
  rationale: La frase enfatiza concordia colectiva. «En armonía» refleja bien el acuerdo comunitario y sigue de cerca la revisión inglesa más reciente.
- source_word: διέθεντο
  english_pob_choice: they agreed on / they established
  chosen_spanish: establecieron
  alternatives_spanish:
  - acordaron
  - concertaron
  - dispusieron
  lexicon: LSJ
  rationale: El medio verbal sugiere una disposición solemne y mutua, casi de pacto. «Establecieron» mantiene esa fuerza; en combinación con «en armonía» no requiere una perífrasis más amplia.
- source_word: τοὺς ἁγίους
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos
  - los consagrados
  - los santos de Dios
  lexicon: LSJ
  rationale: El inglés de POB preserva «holy ones» para evitar la carga eclesial posterior de «saints». En español, «los santos» es la opción más natural y sigue siendo fiel al adjetivo sustantivado; se mantiene la alternativa doctrinalmente más literal en la nota.
- source_word: πατέρων
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus padres
  - sus antepasados
  - los padres
  lexicon: LSJ
  rationale: El genitivo remite a los progenitores del grupo presente. «Sus padres» es claro y relacional; «antepasados» explicaría más de lo que dice el texto.
- source_word: προαναμελπόντων αἴνους
  english_pob_choice: were already singing beforehand praises
  chosen_spanish: iban cantando de antemano alabanzas
  alternatives_spanish:
  - cantaban ya de antemano alabanzas
  - ya entonaban alabanzas previamente
  - iban pre-cantando alabanzas
  lexicon: LSJ
  rationale: La forma compuesta combina anticipación y canto. «Iban cantando de antemano alabanzas» conserva el movimiento progresivo y el sentido de anticipación, sin añadir «himnos» que no está en el griego.
theological_decisions:
- issue: Identidad del grupo en el contexto de Pascua/Éxodo
  english_pob_reading: The verse refers to the faithful Israelites/Jews acting in secret and binding themselves to shared solidarity under God's law.
  chosen_spanish_reading: El verso describe a los fieles israelitas actuando en secreto y comprometiéndose en común bajo la ley de Dios.
  alternative_spanish_readings:
  - Describe de forma más general a los justos sin referencia histórica específica.
  - Se refiere solo a una práctica devocional abstracta.
  rationale: El contexto inmediato de Sabiduría 18 está en la noche de Pascua y el éxodo. La traducción no añade explicación histórica, pero mantiene ese marco implícito y la solidaridad comunitaria del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Traducción de τὸν τῆς θειότητος νόμον
  english_pob_reading: the divine law
  chosen_spanish_reading: la ley de la divinidad
  alternative_spanish_readings:
  - la ley divina
  - la ley de Dios
  - la ley de la piedad
  rationale: La expresión griega es extraña y merece conservar cierta aspereza. «La ley de la divinidad» deja visible la construcción del original; una paráfrasis más corriente suavizaría una tensión léxica que el texto efectivamente presenta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Traducción de τοὺς ἁγίους
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los santos
  - los consagrados
  - los santos de Dios
  rationale: Aunque «santos» puede sugerir uso eclesial posterior, en español es la forma más natural y clara para un sustantivo plural referido a personas santas. La nota preserva la alternativa literal «los santos/los consagrados» para mantener auditable la decisión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al preferir una formulación que refleje mejor ἐν ὁμονοίᾳ διέθεντο mediante «en armonía establecieron», y al evitar expandir αἴνους con «himnos»; por eso se usa «alabanzas» sin ampliación adicional. También se ha preservado la tensión de τῆς θειότητος con una solución explícita en la nota, para no perder la rareza del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del verso porque el texto griego aquí no usa κύριος ni un reemplazo del nombre divino.
  - Se prefirió «santos» para ὅσιοι y para τοὺς ἁγίους, pero con notas distintas para distinguir el adjetivo y el sustantivo griego.
  - Se evitó «Cristo» y cualquier terminología eclesial posterior que no esté sustentada por el griego de este pasaje.
  - El orden de los elementos sigue de cerca el griego, pero con sintaxis española fluida y publicación-readable.
