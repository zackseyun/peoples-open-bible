base_translation:
  language: en
  yaml_path: translation/ot/proverbs/013/024.yaml
  text: Whoever withholds his rod hates his son[b][a], but whoever loves him diligently seeks discipline.
  footnotes:
  - marker: a
    text: Or 'spares his rod.' The Hebrew verb can mean 'withholds' or 'spares,' but 'withholds' better reflects the sense in contemporary English.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seeks him early discipline'; the expression means to seek discipline for him earnestly or diligently.
    reason: lexical_alternative
