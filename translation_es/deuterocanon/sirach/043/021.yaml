translation:
  language: es
  text: Abrasa el fruto de los montes con sequía[a][b], y el pasto de las plantas con llama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice de modo más general: «Consumirá los montes y quemará el desierto, y apagará la hierba verde como fuego». El hebreo detrás de esta traducción es más compacto y usa otra imaginería.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea que aquí se traduce como «sequía» emplea una palabra con el sentido de «sequedad». «Sequedad» sería una alternativa más literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יבול
  english_pob_choice: produce
  chosen_spanish: produce
  alternatives_spanish:
  - fruto
  - cosecha
  - producto
  lexicon: HALOT
  rationale: Sigo el sentido amplio de lo que la tierra produce. En español, 'produce' conserva esa amplitud, aunque suene ligeramente menos idiomático que 'fruto' o 'cosecha'; evita restringir la imagen a agricultura humana.
- source_word: הרים
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - colinas
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego apuntan a una referencia geográfica elevada. 'Montes' es natural en español poético y puede abarcar bien la imagen de relieve alto sin perder el sentido de 'mountains'.
- source_word: בחרב
  english_pob_choice: with drought
  chosen_spanish: con sequía
  alternatives_spanish:
  - con sequedad
  - con aridez
  - con calor
  lexicon: HALOT
  rationale: La base semántica es 'sequedad/dryness'. En español, 'sequía' comunica mejor la fuerza devastadora del término en este contexto que una mera 'sequedad', y mantiene el valor de desecación destructiva.
- source_word: ישיק
  english_pob_choice: it scorches
  chosen_spanish: Hace arder
  alternatives_spanish:
  - quema
  - chamusca
  - abrasa
  lexicon: HALOT
  rationale: El verbo describe una acción destructiva de fuego/ardor. 'Hace arder' conserva el dinamismo poético y evita concretar demasiado el modo exacto, como hace la traducción inglesa con 'scorches'.
- source_word: נוה
  english_pob_choice: pasture
  chosen_spanish: pastizal
  alternatives_spanish:
  - pastura
  - pradera
  - meadow
  lexicon: HALOT
  rationale: Aquí el término se relaciona con el mundo vegetal, no con una vivienda humana. 'Pastizal' expresa bien la idea de terreno cubierto de hierba o plantas y funciona mejor en español que 'pastura' o 'pradera'.
- source_word: צמחים
  english_pob_choice: plants
  chosen_spanish: de las plantas
  alternatives_spanish:
  - de la vegetación
  - de los brotes
  - de la hierba
  lexicon: HALOT
  rationale: El plural de brotes/crecimiento vegetal se puede decir de forma directa como 'las plantas'. Mantiene la sencillez imagética del hebreo y se integra bien con 'pastizal'.
- source_word: בלהבה
  english_pob_choice: with flame
  chosen_spanish: con llama
  alternatives_spanish:
  - con fuego
  - en llama
  - con incendio
  lexicon: HALOT
  rationale: '''Llama'' conserva la imagen compacta y poética del hebreo, además de corresponder al paralelo griego que habla de fuego. Es más preciso y menos abstracto que ''fuego'' en este verso.'
theological_decisions:
- issue: Relación entre el hebreo compacto y el paralelo griego más expansivo
  english_pob_reading: The Hebrew text behind this translation is more compact and differs in imagery; the Greek parallel reads more generally, 'It will consume mountains and burn up the wilderness, and extinguish the green grass like fire.'
  chosen_spanish_reading: Sigo principalmente el hebreo, manteniendo su compacidad e imaginería vegetal, y aludo al paralelo griego en nota.
  alternative_spanish_readings:
  - 'Adoptar la imaginería griega: ''consume los montes y quema el desierto...'''
  - Hibridar ambas imágenes sin base clara en un solo testigo
  rationale: El testimonio hebreo es el texto base principal en el expediente, mientras que el griego funciona como control de consistencia. La traducción española debe reflejar la redacción hebrea sin borrar la diferencia documentada con el griego.
  doctrine_reference: Principio de primacía del testimonio base y conservación de variantes textuales documentadas.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el expediente mantiene alta concordancia. Por eso conservo la lectura hebrea base y solo documento en nota la diferencia con el paralelo griego y la alternativa léxica de 'sequedad'.
  spanish_consistency_notes:
  - Evito 'SEÑOR' y otros términos de máscara, porque este versículo no contiene el nombre divino.
  - Mantengo un registro poético y sobrio, acorde con la literatura sapiencial.
  - Conservo la tensión entre el hebreo compacto y el griego más amplio mediante nota, sin fusionar indebidamente ambas imágenes.
