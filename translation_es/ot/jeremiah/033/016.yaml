    text: 'O, más formalmente: «y este es el nombre con que será llamada».'
    reason: lexical_alternative
  - marker: b
    text: Jeremías 23:6 aplica el título estrechamente relacionado «Yahvé es nuestra justicia» al rey davídico venidero; aquí la gramática lo aplica a Jerusalén, probablemente en eco de esa promesa anterior.
    reason: cross_reference
  revision_rationale: Se restaura en el texto principal la decisión auditada de mantener una fórmula menos interpretativa para וְזֶה אֲשֶׁר יִקְרָא לָהּ, dejando «el nombre con que será llamada» como alternativa de nota. También se corrige la ubicación de los marcadores para que cada nota ancle exactamente el elemento que comenta.
