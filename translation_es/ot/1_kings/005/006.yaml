revisions:
- from: Y tenía Salomón cuarenta mil pesebres[a] de caballos para sus carros, y doce mil jinetes.
  to: Y Salomón tenía cuarenta mil establos[a] de caballos para sus carros, y doce mil jinetes.
  rationale: Se cambia «pesebres» por «establos» para evitar un sentido engañoso en español, y se preserva la precisión léxica del hebreo en la nota. También se ajusta el orden a «Y Salomón tenía» para una lectura más natural sin alterar el sentido.
