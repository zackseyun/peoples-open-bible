translation:
  language: es
  text: ¿No castigaré por estas cosas? declara Yahvé. Y sobre una nación como esta[a], ¿no me vengaré yo mismo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y si sobre una nación como esta…». El hebreo puede leerse más literalmente con «y si», aunque aquí introduce una segunda pregunta retórica que refuerza la primera.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «mi alma», una manera vívida de referirse a Yahvé mismo en términos personales.
    reason: cultural_note
lexical_decisions:
- source_word: הַעַל אֵלֶּה
  english_pob_choice: Shall I not punish for these things?
  chosen_spanish: ¿No castigaré por estas cosas?
  alternatives_spanish:
  - ¿No castigaré por estas cosas?
  - ¿No tomaré cuenta de estas cosas?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea expresa intervención judicial sobre faltas ya descritas. En español, «castigaré» comunica de forma clara el sentido punitivo de פקד en este contexto sin recurrir a un calco opaco. «Por estas cosas» conserva el valor causal/relacional de עַל y la referencia plural de אֵלֶּה.
- source_word: אֶפְקֹד
  english_pob_choice: punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - castigaré
  - tomaré cuenta de
  - visitaré con juicio
  lexicon: HALOT
  rationale: En contextos de juicio, פקד implica actuar con sanción. «Castigaré» es la opción más natural y fiel para una Biblia en español; «tomaré cuenta de» conserva el matiz de rendición de cuentas, pero es menos directo.
- source_word: נְאֻם יְהֹוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino conforme al estándar del proyecto. «Declara» preserva el tono profético solemne de נְאֻם mejor que un simple «dice».
- source_word: וְאִם
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y
  - Y si
  lexicon: HALOT
  rationale: Aquí וְאִם funciona de manera enlazante en un segundo interrogante retórico. «Y» conserva la continuidad y evita introducir una condicionalidad excesiva en español; «Y si» sigue siendo posible, pero sugiere más fuertemente una subordinación condicional.
- source_word: בְּגוֹי אֲשֶׁר כָּזֶה
  english_pob_choice: on a nation such as this
  chosen_spanish: sobre una nación como esta
  alternatives_spanish:
  - contra una nación como esta
  - sobre una nación así
  lexicon: HALOT
  rationale: Con נקם, la preposición puede marcar el objeto de la venganza. «Sobre» reproduce la imagen y el paralelismo sin sonar forzado; «contra» explicita la hostilidad, pero cambia ligeramente el matiz idiomático.
- source_word: תִתְנַקֵּם
  english_pob_choice: avenge myself
  chosen_spanish: me vengaré yo mismo
  alternatives_spanish:
  - me vengaré
  - tomaré venganza yo mismo
  - me tomaré venganza
  lexicon: HALOT
  rationale: 'El hitpael de נקם es reflexivo: «me vengaré» es fiel y natural. Se añadió «yo mismo» para reflejar el énfasis del hebreo y mantener la fuerza del paralelismo con la primera pregunta.'
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: yo mismo
  alternatives_spanish:
  - mi alma
  - mi ser
  - yo mismo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «mi alma», en español esa formulación puede sonar demasiado extraña o llevar a una lectura antropológica indebida. Aquí la POB inglesa ya optó por una solución idiomática («myself»). En español, «yo mismo» conserva la referencia a Yahvé mismo y evita perder el sentido discursivo.
theological_decisions:
- issue: Antropopatismo en נַפְשִׁי
  english_pob_reading: retain 'my soul' in the main text / clarify with a note
  chosen_spanish_reading: resolverlo idiomáticamente en el texto principal como «yo mismo», sin negar la imagen hebrea
  alternative_spanish_readings:
  - mi alma
  - mi ser
  - yo mismo
  rationale: El hebreo usa una auto-referencia vívida y personal. En español, «yo mismo» transmite la identidad del sujeto divino y conserva el énfasis reflexivo del hitpael, mientras que una nota no es necesaria en esta sección breve. Se evita «mi alma» en el texto principal por claridad idiomática.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than flatten it
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, manteniendo el nombre propio divino en lugar de una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que prefirió «avenge myself» en lugar de una formulación más literal con «my soul». La presente versión española sigue esa misma orientación idiomática en el texto principal, pero mantiene la tensión semántica del hebreo con una nota de alternativa más literal.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como sustitución, porque el nombre divino es explícito en el texto fuente.
  - Se tradujo פקד en sentido judicial como «castigar», no como «visitar».
  - Se preservó el paralelismo interrogativo con una segunda cláusula introducida por «Y».
  - La nota [a] recoge la alternativa más literal con «mi alma» para no borrar la tensión antropopática del hebreo.
