translation:
  language: es
  text: Yo[a], yo soy el que borra[b] tus transgresiones por causa de mí mismo, y no recordaré[c] tus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo, incluso yo, soy el que borra tus transgresiones».'
    reason: lexical_alternative
  - marker: b
    text: «Borra» también puede traducirse «borra por completo» o «elimina».
    reason: lexical_alternative
  - marker: c
    text: «No recordaré» significa que Dios ya no tendrá estos pecados en cuenta contra su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי אָנֹכִי
  english_pob_choice: I, I
  chosen_spanish: Yo, yo
  alternatives_spanish:
  - Yo, incluso yo
  - Yo —yo
  lexicon: HALOT
  rationale: La repetición del pronombre de primera persona es enfática. En español, duplicar «Yo, yo» conserva esa autoafirmación divina sin volverla excesivamente interpretativa.
- source_word: הוּא
  english_pob_choice: am he
  chosen_spanish: soy el que
  alternatives_spanish:
  - soy aquel que
  - soy yo
  lexicon: HALOT
  rationale: El hebreo funciona como fórmula enfática de autoidentificación. «Soy el que» mantiene la identificación personal y el tono solemne en español, evitando una construcción demasiado rígida.
- source_word: מֹחֶה
  english_pob_choice: blots out
  chosen_spanish: borra
  alternatives_spanish:
  - borra del todo
  - cancela
  - borra de la memoria
  lexicon: HALOT
  rationale: El verbo hebreo expresa la imagen de borrar/eliminar. «Borra» es natural en español y conserva la metáfora de supresión; se evita una paráfrasis más larga que exceda el alcance del texto.
- source_word: פְשָׁעֶיךָ
  english_pob_choice: your transgressions
  chosen_spanish: tus transgresiones
  alternatives_spanish:
  - tus rebeliones
  - tus ofensas
  lexicon: HALOT
  rationale: «Transgresiones» preserva el peso moral y de pacto de פשע, y corresponde al término ya asentado en el audit trail inglés.
- source_word: לְמַעֲנִי
  english_pob_choice: for my own sake
  chosen_spanish: por amor de mí mismo
  alternatives_spanish:
  - por mí mismo
  - por mi propio nombre
  lexicon: HALOT
  rationale: La expresión indica que Yahvé funda su perdón en su propio propósito y honor. «Por amor de mí mismo» comunica bien esa motivación reflexiva en español sin reducirla a una mera preferencia subjetiva.
- source_word: וְחַטֹּאתֶיךָ
  english_pob_choice: and your sins
  chosen_spanish: y tus pecados
  alternatives_spanish:
  - y tus culpas
  - y tus faltas
  lexicon: HALOT
  rationale: חטאות es el término común para pecados. «Pecados» es claro y distingue este miembro del anterior, donde aparece «transgresiones».
- source_word: לֹא אֶזְכֹּר
  english_pob_choice: I will not remember
  chosen_spanish: no recordaré
  alternatives_spanish:
  - no me acordaré
  - no los traeré a la memoria
  lexicon: HALOT
  rationale: El futuro imperfecto expresa resolución futura. «No recordaré» es directo y mantiene la idea covenantal de no tener los pecados en cuenta para juicio, sin añadir más que el texto.
theological_decisions:
- issue: Motivación divina del perdón
  english_pob_reading: God forgives 'for my own sake,' grounding pardon in his own character and purpose.
  chosen_spanish_reading: Yahvé perdona «por amor de mí mismo», fundando el perdón en su propio propósito y honor.
  alternative_spanish_readings:
  - Yahvé perdona porque sí
  - Yahvé perdona por causa de su nombre
  rationale: El hebreo dice explícitamente לְמַעֲנִי, y la traducción debe retener ese fundamento en Dios mismo. «Por amor de mí mismo» conserva la autogestión del motivo sin introducir una condición humana no mencionada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fórmula enfática de autoidentificación divina
  english_pob_reading: I, I am he...
  chosen_spanish_reading: «Yo, yo soy el que...» conserva el énfasis del hebreo.
  alternative_spanish_readings:
  - «Yo, incluso yo...»
  - «Yo soy yo...»
  rationale: La repetición de אָנֹכִי es significativa y no debe diluirse. El español elegido mantiene la solemnidad y el énfasis sin oscurecer la sintaxis.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se mantuvo el sentido auditado del inglés POB: repetición enfática de «I, I», identidad divina con «am he», metáfora de borrar, distinción entre transgressions y sins, y el fundamento del perdón «for my own sake». No se detectaron revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el sujeto implícito del hablante divino, conforme al estándar del proyecto.
  - Se conserva la distinción léxica entre «transgresiones» y «pecados» para reflejar פשע y חטאות.
  - «No recordaré» se entiende en sentido covenantal, no como amnesia literal.
