translation:
  language: es
  text: Y que la asamblea de los pueblos te rodee[a][b]; y sobre ellos vuelve a lo alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "naciones" para "pueblos".
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también puede entenderse con referencia singular: "y sobre ella vuelve a lo alto", refiriéndose a la asamblea como un todo colectivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲדַת
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - reunión
  lexicon: HALOT
  rationale: אֲדַת/עֲדַת designa un grupo reunido; "asamblea" preserva el sentido colectivo sin el matiz eclesiástico que "congregación" puede tener en español.
- source_word: לְאֻמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: El plural apunta a grupos étnicos o colectivos; "pueblos" conserva bien esa pluralidad distributiva y suena natural en español bíblico moderno.
- source_word: תְּסוֹבְבֶךָּ
  english_pob_choice: let ... surround you
  chosen_spanish: te rodee
  alternatives_spanish:
  - te окружe
  - te circunde
  - te rodearán
  lexicon: HALOT
  rationale: El verbo de סבב expresa rodear/encerrar. En este contexto la forma funciona como deseo o súplica; "te rodee" mantiene ese valor volitivo y es idiomático en español.
- source_word: וְעָלֶיהָ
  english_pob_choice: and over them
  chosen_spanish: sobre ella
  alternatives_spanish:
  - sobre ellos
  - sobre ellas
  - sobre ello
  lexicon: HALOT
  rationale: El sufijo es formalmente femenino singular y remite a la asamblea. En español, para respetar la referencia gramatical inmediata, "ella" refleja mejor la forma hebrea; la nota textual explica que también puede entenderse colectivamente.
- source_word: לַמָּרוֹם
  english_pob_choice: on high
  chosen_spanish: a lo alto
  alternatives_spanish:
  - en lo alto
  - a la altura
  - al cielo
  lexicon: HALOT
  rationale: מָרוֹם denota altura o lugar exaltado. "A lo alto" conserva la metáfora espacial sin convertirla en una localización más específica como "al cielo".
- source_word: שׁוּבָה
  english_pob_choice: return
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  - vuelve de nuevo
  lexicon: HALOT
  rationale: El imperativo de שוב pide volver/retornar. "Vuelve" es breve, natural y mantiene la fuerza de petición; no añade la idea de entronización que el hebreo no expresa explícitamente.
theological_decisions:
- issue: Si el verso describe un movimiento físico o una petición poética sobre el lugar de gobierno/juzgamiento de Dios
  english_pob_reading: A poetic appeal for God to resume his exalted position of rule/judgment over the gathered peoples
  chosen_spanish_reading: Una súplica poética para que Dios vuelva a su posición exaltada sobre la asamblea de los pueblos
  alternative_spanish_readings:
  - Una petición de que Dios ascienda físicamente por encima de la asamblea
  - Una afirmación de que la asamblea rodeará a Dios y él volverá arriba
  rationale: La forma imperativa y el contexto poético favorecen una súplica. "A lo alto" preserva la metáfora de exaltación sin especificar más de lo que el hebreo dice.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera excesiva
translation_notes:
  revision_awareness: El texto hebreo y la audit trail inglesa muestran alta coincidencia y no requieren revisiones textuales; la única tensión relevante es la referencia singular/plural del sufijo final, preservada en la nota b. La elección española mantiene la petición poética y evita sobreinterpretar el movimiento como ascensión física o entronización explícita.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el tetragrámaton; este verso no lo contiene.
  - '"Pueblos" conserva el plural colectivo de לְאֻמִּים; la nota a ofrece "naciones" como alternativa válida.'
  - La construcción con "te rodee" reproduce el valor volitivo de la forma hebrea.
  - '"Sobre ella" refleja el femenino singular del sufijo hebreo, aunque la nota b aclara la posibilidad colectiva.'
  - '"A lo alto" evita introducir un término más doctrinalmente cargado como "cielo" o "entronizado".'
