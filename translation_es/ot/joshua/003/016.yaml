review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: las aguas de arriba se detienen, se amontonan, las aguas hacia el Mar del Arabá quedan totalmente cortadas, y el pueblo cruza frente a Jericó. Sin embargo, falta una nota del rastro inglés sobre «el mar de la Sal» = mar Muerto, y «quedaron completamente cortadas» suena menos natural en español para aguas que «fueron completamente cortadas» o «quedaron completamente interrumpidas».'
  spanish_quality_summary: 'El español es claro y digno. Hay dos reparaciones menores: añadir la nota cultural que el inglés conservó para «el mar de la Sal», y ajustar ligeramente la expresión de corte total del flujo para mayor naturalidad. El resto —«se detuvieron», «un solo montón», «junto a Zaretán», «frente a Jericó»— es legible y fiel.'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Los topónimos «Adam», «Zaretán», «Arabá», «Jericó» están bien tratados. «Mar de la Sal» preserva correctamente יָם הַמֶּלַח y debe mantenerse en el texto principal, con nota aclaratoria sobre el mar Muerto según el audit trail inglés.
  issues:
  - severity: medium
    issue: Falta la nota cultural correspondiente a «el mar de la Sal».
    rationale: El English POB preserva explícitamente una nota que identifica este cuerpo de agua como el posteriormente llamado mar Muerto. Esa información debe conservarse también en español.
  - severity: low
    issue: «Quedaron completamente cortadas» es algo forzado para referirse a aguas.
    rationale: Aunque es fiel al sentido de תַּמּוּ נִכְרָתוּ, en español suena más natural «fueron completamente cortadas» o «quedaron completamente interrumpidas». Conviene una mejora estilística menor sin perder la fuerza del doble verbo.
  revised_spanish_text: Las aguas que descendían desde arriba se detuvieron[a]; se levantaron en un solo montón, muy lejos, en Adam, la ciudad junto a Zaretán. Y las que descendían hacia el mar del Arabá, el mar de la Sal[b], fueron completamente cortadas, y el pueblo pasó frente a Jericó.
  revised_footnotes:
