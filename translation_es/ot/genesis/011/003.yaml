translation:
  language: es
  text: 'Y cada hombre dijo a su vecino[a]: «Ven, hagamos ladrillos y quemémoslos bien». Y el ladrillo les sirvió en lugar de piedra, y el betún les sirvió de mortero[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y un hombre dijo a otro».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo חֵמָר se refiere a una sustancia bituminosa, como betún o asfalto, usada en construcción.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: each man said to his neighbor
  chosen_spanish: cada hombre dijo a su vecino
  alternatives_spanish:
  - uno le dijo a otro
  - cada uno dijo a su compañero
  lexicon: HALOT
  rationale: 'La construcción distributiva conserva en español el valor de un sujeto plural distribuido: ‘cada hombre’ refleja bien אִישׁ, y ‘a su vecino’ reproduce el matiz relacional de אֶל רֵעֵהוּ sin volverlo demasiado formal o eclesiástico.'
- source_word: הָבָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Vamos, pues
  lexicon: HALOT
  rationale: La partícula introduce una exhortación inmediata. ‘Ven’ es natural, breve y fiel al tono exhortativo del hebreo, sin introducir un matiz más interpretativo que ‘vamos, pues’.
- source_word: נִלְבְּנָה לְבֵנִים
  english_pob_choice: let us make bricks
  chosen_spanish: hagamos ladrillos
  alternatives_spanish:
  - moldeemos ladrillos
  - hagamos adobes
  lexicon: HALOT
  rationale: El verbo denominativo expresa fabricar ladrillos. ‘Hagamos ladrillos’ es la forma más natural en español y conserva el sentido industrial/técnico del texto.
- source_word: וְנִשְׂרְפָה לִשְׂרֵפָה
  english_pob_choice: and burn them thoroughly
  chosen_spanish: y queimémoslos bien
  alternatives_spanish:
  - y quemémoslos completamente
  - y quemémoslos a fondo
  lexicon: HALOT
  rationale: La intención es intensiva, pero en español ‘quemémoslos bien’ suena más natural y comunica la acción completa sin añadir explicaciones. Se evita una paráfrasis excesiva como ‘a fondo’.
- source_word: וַתְּהִי לָהֶם הַלְּבֵנָה לְאָבֶן
  english_pob_choice: the brick served them for stone
  chosen_spanish: el ladrillo les sirvió en lugar de piedra
  alternatives_spanish:
  - el ladrillo les sirvió de piedra
  - el ladrillo les fue como piedra
  lexicon: HALOT
  rationale: El hebreo expresa sustitución funcional. ‘Les sirvió en lugar de piedra’ reproduce con claridad ese valor idiomático y mantiene la tensión entre materiales de construcción.
- source_word: הַחֵמָר
  english_pob_choice: the bitumen
  chosen_spanish: el betún
  alternatives_spanish:
  - el bitumen
  - la brea
  lexicon: HALOT
  rationale: חֵמָר designa una sustancia bituminosa usada en construcción. ‘Betún’ es comprensible en español y mantiene el referente material; ‘bitumen’ sería más técnico, pero menos idiomático para lectura pública.
- source_word: לַחֹמֶר
  english_pob_choice: mortar
  chosen_spanish: mortero
  alternatives_spanish:
  - argamasa
  - mezcla
  lexicon: HALOT
  rationale: En el contexto constructivo, חֹמֶר funciona como material de unión. ‘Mortero’ es el equivalente técnico más claro en español y conserva el sentido funcional del texto.
translation_notes:
  revision_awareness: Se siguió el cambio del POB inglés revisado en la cláusula final, que prefiere la relación funcional de servicio/sustitución (‘served them for stone/mortar’) sobre una traducción estática de ‘became’. En español se reflejó con ‘les sirvió en lugar de piedra’ y ‘les sirvió de mortero’. También se conservó la fuerza intensiva de ‘burn them thoroughly’ con una expresión natural en español.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca en este versículo, sino como norma del proyecto para el Tetragrámaton cuando corresponda.
  - Se mantuvo ‘ladrillo’ y ‘piedra’ en un contraste material directo, sin suavizarlo a términos arquitectónicos más abstractos.
  - El término ‘betún’ se eligió por claridad pública; ‘bitumen’ queda implícito en la nota para lectores que prefieran el tecnicismo.
  - No se añadió una nota teológica porque el verso no presenta una decisión doctrinal explícita, solo un contraste lexical y cultural.
