base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/022/017.yaml
  text: and look[a], he has charged her with shameful words, saying, “I did not find your daughter a virgin.” Yet these are the proofs of my daughter’s virginity[c][b]. And they shall spread out the garment before the elders of the city.
  footnotes:
  - marker: a
    text: Hebrew literally, “I did not find virginities for your daughter,” an idiom meaning that he claims she was not a virgin.
    reason: lexical_alternative
  - marker: b
    text: Or “tokens/evidence of my daughter’s virginity.”
    reason: lexical_alternative
  - marker: c
    text: The “garment” refers to the cloth presented as legal evidence in this case.
    reason: cultural_note
