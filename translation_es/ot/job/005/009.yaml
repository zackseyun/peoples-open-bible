lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: who does
  chosen_spanish: el que hace
  alternatives_spanish:
  - quien hace
  - el que obra
  - el que realiza
  lexicon: HALOT
  rationale: El participio qal funciona como una descripción relativa de Dios. «El que hace» conserva la fuerza relacional y suena natural en español sin perder el valor verbal continuo.
- source_word: גְדֹלוֹת
  english_pob_choice: great things
  chosen_spanish: cosas grandes
  alternatives_spanish:
  - grandes cosas
  - grandes obras
  - grandes hechos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural se entiende de manera directa como acciones o realidades grandes. «Cosas grandes» sigue de cerca la forma hebrea y evita añadir un matiz interpretativo fuerte.
- source_word: וְאֵין חֵקֶר
  english_pob_choice: beyond searching out
  chosen_spanish: no hay investigación
  alternatives_spanish:
  - insondable
  - no se puede investigar
  - no hay pesquisa
  lexicon: HALOT
  rationale: La frase hebrea afirma la ausencia de un acto de indagación que lo agote. «No hay investigación» preserva el contenido básico y mantiene la tensión de incomprensibilidad, sin convertirlo en un adjetivo abstracto.
- source_word: נִפְלָאוֹת
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - portentos
  - cosas maravillosas
  lexicon: HALOT
  rationale: El término designa actos extraordinarios y admirables. «Maravillas» es un equivalente natural y solemne en español bíblico contemporáneo.
- source_word: עַד אֵין מִסְפָּר
  english_pob_choice: beyond number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - sin contar
  - más allá de todo número
  lexicon: HALOT
  rationale: El modismo expresa innumerabilidad. «Sin número» conserva la economía poética y es fiel a la estructura hebrea, sin exigir una paráfrasis más larga.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando cada nota al texto: [a] aparece en «no hay [a] investigación» y [b] en «maravillas [b] sin número».'
  spanish_consistency_notes:
  - Se mantuvo el orden poético hebreo en dos miembros paralelos.
  - Se evitó «SEÑOR» o «Cristo» porque el verso no contiene esos términos.
  - «Maravillas» y «sin número» preservan el paralelismo con «cosas grandes» y la segunda cola del hebreo.
  - La nota [a] explica la alternativa «insondable» sin imponerla en el texto principal.
