translation:
  language: es
  text: Y todos llegaron en paz a la tierra de Judá, e hicieron duelo por Jonatán y por los que estaban con él, y tuvieron gran temor; e Israel hizo gran duelo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Israel hizo un gran duelo”. El griego emplea una construcción enfática con cognados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: LSJ
  rationale: El aoristo de ἔρχομαι se vierte de modo natural aquí con “llegaron”, que conserva el movimiento de retorno al territorio de Judá sin sonar forzado en español.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos
  lexicon: LSJ
  rationale: Se mantiene el valor distributivo del sujeto griego con un español breve y claro.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - salvos
  lexicon: LSJ
  rationale: “En paz” conserva la forma preposicional del griego y comunica bien la idea de retorno seguro sin añadir una paráfrasis excesiva.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - Judá
  - la tierra de Judea
  lexicon: LSJ
  rationale: Con γῆ + nombre propio, “la tierra de” es la equivalencia más natural. “Judá” sigue de cerca Ἰούδα y evita introducir el matiz histórico-administrativo de “Judea”.
- source_word: ἐπένθησαν
  english_pob_choice: they mourned
  chosen_spanish: lloraron
  alternatives_spanish:
  - lamentaron
  - estuvieron de duelo
  lexicon: LSJ
  rationale: En este contexto de duelo por muertos, “lloraron” es una forma idiomática y sobria en español; la mención posterior de “gran duelo” mantiene el campo semántico del luto.
- source_word: τὸν Ἰωνάθαν
  english_pob_choice: for Jonathan
  chosen_spanish: por Jonatán
  alternatives_spanish:
  - a Jonatán
  - sobre Jonatán
  lexicon: LSJ
  rationale: El español suele expresar el objeto del lamento con “por”. Se conserva así la relación directa del duelo con Jonatán.
- source_word: τοὺς μετʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los que fueron con él
  lexicon: LSJ
  rationale: “Los que estaban con él” preserva la referencia abierta del griego sin especificar más de lo que el texto dice sobre su identidad.
- source_word: ἐφοβήθησαν σφόδρα
  english_pob_choice: they were greatly afraid
  chosen_spanish: tuvieron gran temor
  alternatives_spanish:
  - temieron mucho
  - estuvieron muy atemorizados
  lexicon: LSJ
  rationale: La construcción verbal se vierte con naturalidad en español manteniendo el intensificador σφόδρα mediante “gran”. Se evita suavizar el impacto del temor.
- source_word: ἐπένθησεν Ἰσραὴλ πένθος μέγα
  english_pob_choice: Israel mourned with great mourning
  chosen_spanish: Israel hizo gran duelo
  alternatives_spanish:
  - Israel tuvo un gran duelo
  - Israel lloró con gran llanto
  lexicon: LSJ
  rationale: El griego usa una construcción enfática con cognados. “Hizo gran duelo” preserva el carácter enfático y el sentido de duelo público mejor que una simple repetición literal, sin perder la intensidad del original.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (1909), en acuerdo alto con el audit trail inglés. La versión española mantiene el paralelismo del original, ajustando solo lo necesario para un español natural y conservando la intensificación final del duelo de Israel.
  spanish_consistency_notes:
  - Se mantuvo “Judá” para γῆν Ἰούδα, en línea con la decisión inglesa de evitar “Judea” por su matiz histórico posterior.
  - Se eligió “lloraron / gran duelo” para reflejar el campo semántico del lamento sin perder la fuerza del cognado griego.
  - No hay términos cristológicos ni vocabulario divino en este versículo; por tanto, no aplica ninguna convención especial de Yahvé/Mesías.
