base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/021/010.yaml
  text: So Edom rebelled from under the hand of Judah to this day[a]. At that time Libnah also rebelled from under his hand, because he had forsaken Yahweh[c][b], the God of his fathers.
  footnotes:
  - marker: a
    text: Or 'revolted' / 'broke away' for 'rebelled.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the hand of Judah' and 'from under his hand,' an idiom for escaping rule or control.
    reason: cultural_note
  - marker: c
    text: The causal clause may explain Jehoram's troubles generally, or more specifically Libnah's rebellion.
    reason: alternative_reading
