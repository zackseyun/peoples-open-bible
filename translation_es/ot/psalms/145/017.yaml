review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: צַדִּיק = «justo», יְהוָה = «Yahvé», בְּכָל… = «en todos/todas», דְּרָכָיו = «sus caminos», חָסִיד = «fiel», מַעֲשָׂיו = «sus obras». También preserva correctamente la nota sobre la variante/tradición que lee «santo».'
  spanish_quality_summary: 'El texto principal es natural y claro en español bíblico moderno. La única reparación necesaria está en la nota: «amable» no representa bien el campo semántico de חָסִיד, y «constante» debilita la explicación inglesa «faithful/steadfast». Conviene ajustar la nota para mantener mejor la racionalidad léxica y teológica del POB.'
  glossary_alignment: 'Alineación adecuada con la terminología del proyecto: «Yahvé» para יהוה, «justo» para צַדִּיק, «fiel» para חָסִיד en el texto principal. No hay conflicto con los defaults del glosario.'
  issues:
  - severity: medium
    issue: La nota usa «amable» como alternativa para חָסִיד.
    rationale: «Amable» sugiere cortesía o trato afable, pero no comunica bien la lealtad de pacto / bondad firme que subyace a חָסִיד. El inglés auditado ofrece «kind» o «gracious»; en español convienen mejor «bondadoso» o «misericordioso/gracioso», no «amable».
  - severity: low
    issue: La nota explica la lectura masorética con «fiel o constante».
    rationale: '«Constante» es comprensible, pero se aleja del matiz documentado en el inglés: «faithful/steadfast». En español, «fiel» o «leal» / «constante en su amor» sería más preciso. Dado que la nota ya contrasta tradiciones textuales, conviene una formulación más exacta y menos ambigua.'
  revised_spanish_text: Yahvé es justo en todos sus caminos, y fiel en todas sus obras[a].
  revised_footnotes:
  - marker: a
    text: O «bondadoso» o «misericordioso»; algunas traducciones leen «santo» aquí, reflejando una tradición textual distinta del sentido «fiel» o «constante» del Texto Masorético.
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, claro y bien formulado. Solo se corrige la nota para que las alternativas españolas correspondan mejor al campo semántico de חָסִיד y a la explicación auditada en inglés, evitando «amable», que resulta demasiado débil y poco preciso.
