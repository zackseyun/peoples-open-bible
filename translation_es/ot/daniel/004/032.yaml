translation:
  language: es
  text: 'Y todos los habitantes de la tierra son considerados como nada; él hace conforme a su voluntad entre la hueste[a] del cielo y entre los habitantes de la tierra; y no hay nadie que pueda detener su mano[b], ni decirle: «¿Qué has hecho?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el ejército del cielo». La expresión también puede traducirse «la hueste del cielo», sin precisar si se refiere a ángeles, astros o ambos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «golpear su mano»; es decir, impedirlo o detenerlo. Inglés tradicional: «stay his hand».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דארי אַרְעָא
  english_pob_choice: the inhabitants of the earth
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los que habitan en la tierra
  - los moradores de la tierra
  lexicon: HALOT
  rationale: El participio arameo nombra a quienes viven en la tierra/país. «Habitantes de la tierra» comunica con naturalidad el alcance universal del texto y conserva el sentido colectivo.
- source_word: כְּלָה חֲשִׁיבִין
  english_pob_choice: are regarded as nothing
  chosen_spanish: son considerados como nada
  alternatives_spanish:
  - son tenidos por nada
  - son estimados como nada
  lexicon: HALOT
  rationale: La frase expresa valoración o estima, no inexistencia. «Son considerados como nada» mantiene la idea de que, ante la soberanía divina, su peso o valor es nulo.
- source_word: וּכְמִצְבְּיֵהּ
  english_pob_choice: according to his will
  chosen_spanish: conforme a su voluntad
  alternatives_spanish:
  - según su voluntad
  - como le place
  lexicon: HALOT
  rationale: El sustantivo transmite voluntad, deseo o placer. «Conforme a su voluntad» es claro, solemne y fiel al matiz de soberanía.
- source_word: עָבֵד
  english_pob_choice: he does
  chosen_spanish: él actúa
  alternatives_spanish:
  - él hace
  - él obra
  lexicon: HALOT
  rationale: El verbo puede significar hacer/actuar. «Él actúa» suena natural en español y conserva la fuerza directa de la afirmación.
- source_word: בְּחֵיל שְׁמַיָּא
  english_pob_choice: the host of heaven
  chosen_spanish: el ejército del cielo
  alternatives_spanish:
  - el host del cielo
  - la hueste del cielo
  lexicon: HALOT
  rationale: חֵיל puede denotar fuerza, ejército o host. Se eligió «ejército del cielo» para conservar la imagen de poder celestial con un español claro y digno; se evita una traducción eclesiástica fija que no esté exigida por el arameo.
- source_word: וְלָא אִיתַי דִּי
  english_pob_choice: there is no one who
  chosen_spanish: no hay nadie que
  alternatives_spanish:
  - no existe quien
  - no hay quien
  lexicon: HALOT
  rationale: La construcción existencial introduce la imposibilidad siguiente. «No hay nadie que» preserva la estructura y la intensidad negativa.
- source_word: יְמַחֵא בִידֵהּ
  english_pob_choice: restrain his hand
  chosen_spanish: refrene su mano
  alternatives_spanish:
  - detenga su mano
  - le estorbe la mano
  lexicon: HALOT
  rationale: El verbo es literalmente «golpear/sacudir la mano», pero la función idiomática es impedir o frenar. «Refrene su mano» expresa el sentido figurado reconocido en la auditoría inglesa sin perder la imagen corporal.
- source_word: מָה עֲבַדְתְּ
  english_pob_choice: What have you done?
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué has hecho tú?
  - ¿Qué hiciste?
  lexicon: HALOT
  rationale: La pregunta retórica confronta la acción divina de forma directa. El perfecto se vierte naturalmente como «¿Qué has hecho?» en español.
theological_decisions:
- issue: Referente del agente soberano
  english_pob_reading: The verse refers to the Most High/God acting with absolute sovereignty over heaven and earth, while preserving the pronoun 'he'.
  chosen_spanish_reading: El versículo presenta a Dios actuando con soberanía absoluta sobre el cielo y la tierra, preservando el pronombre «él» en vez de añadir un sujeto explicativo.
  alternative_spanish_readings:
  - Dios hace todo conforme a su voluntad
  - el Altísimo actúa conforme a su voluntad
  rationale: El contexto inmediato de Daniel 4 identifica al agente. En español se conserva la referencia implícita sin insertar una glosa que sustituya la sintaxis del texto base.
  doctrine_reference: Daniel 4; principios de fidelidad textual y sobriedad exegética
- issue: Alcance de בְּחֵיל שְׁמַיָּא
  english_pob_reading: Rendered generically as 'the host of heaven' without specifying angels or stars.
  chosen_spanish_reading: Se traduce de forma genérica como «el ejército del cielo», sin resolver si alude a ángeles, cuerpos celestes o ambos.
  alternative_spanish_readings:
  - la hueste del cielo entendida como ángeles
  - la hueste del cielo entendida como astros
  rationale: El arameo permite una referencia amplia. La traducción mantiene esa amplitud y no estrecha el sentido más allá de lo que exige el texto.
  doctrine_reference: Daniel 4:32; equivalencia óptima y cautela semántica
- issue: La imagen de la mano en יְמַחֵא בִידֵהּ
  english_pob_reading: Literally 'strike his hand'; that is, hinder or restrain him.
  chosen_spanish_reading: Se conserva la metáfora funcional con «refrene su mano», evitando una explicación más larga en el cuerpo del texto.
  alternative_spanish_readings:
  - detenga su mano
  - le impida la mano
  rationale: La expresión aramea es idiomática. En español, «refrene su mano» comunica el obstáculo al acto soberano y mantiene un registro bíblico claro.
  doctrine_reference: Daniel 4:32; nota idiomática y semántica
translation_notes:
  revision_awareness: La auditoría inglesa revisó la imagen de 'strike his hand' hacia 'restrain his hand' por ser más idiomática; la versión española sigue esa misma decisión con «refrene su mano». También se optó por un equivalente solemne y natural para בְּחֵיל שְׁמַיָּא sin estrechar innecesariamente el referente.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el contexto, sin sustituir el pronombre del texto por una paráfrasis.
  - «Habitanes de la tierra» y «ejército del cielo» conservan el paralelismo del arameo.
  - Se usa «mano» en singular como en el original, respetando la imagen idiomática de restricción.
