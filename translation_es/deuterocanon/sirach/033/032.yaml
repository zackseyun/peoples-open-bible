revisions:
- from: En el día en que se cumplan los días de tu vida[a], y en el tiempo de la muerte, da una herencia.
  to: El día en que se cumplan los días de tu vida[a], y en el momento de la muerte, da una herencia.
  rationale: Se corrige la construcción temporal para que el español sea natural y fiel al griego, evitando la mezcla poco idiomática de 'en el día' con 'en que'. También se ajusta 'el tiempo de la muerte' a 'el momento de la muerte' por claridad y fluidez, sin alterar el sentido fuente. Se conserva 'da una herencia' por su cercanía al imperativo griego y a la decisión léxica auditada.
