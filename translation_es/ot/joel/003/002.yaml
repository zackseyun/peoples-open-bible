review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido general del hebreo: inclusión enfática, paralelismo social masculino/femenino, marco temporal profético y la promesa de derramar el Espíritu de Dios. Sin embargo, «Y aun» suena algo forzado en español actual, y la asimetría «los esclavos varones ... las esclavas» explicita género solo en el primer miembro cuando el hebreo marca ambos por la pareja léxica. También la nota alternativa «las esclavas mujeres» es poco idiomática y no corresponde bien a la alternativa inglesa.'
  spanish_quality_summary: El texto es comprensible y bastante fiel, pero puede ganar naturalidad y simetría con «Y también sobre los esclavos y sobre las esclavas». Esto conserva el énfasis inclusivo sin rigidez. La redacción revisada suena más natural en español bíblico contemporáneo y mantiene dignidad e inteligibilidad eclesial.
  glossary_alignment: Alinea bien con las directrices del proyecto en «esclavos/esclavas» para preservar el estado servil y en «mi Espíritu» para רוּחִי. No hay conflicto con la terminología base. La revisión propuesta mejora la implementación del contraste de género sin añadir explicaciones innecesarias dentro del texto.
  issues:
  - severity: medium
    issue: «Y aun» es menos natural que alternativas contemporáneas.
    rationale: Aunque no es incorrecto, en español neutral actual «Y también» comunica mejor el valor aditivo de וְגַם sin sonar rígido o arcaizante.
  - severity: medium
    issue: Asimetría en «los esclavos varones ... las esclavas».
    rationale: El hebreo ya marca la distinción por dos sustantivos de género; en español, «esclavos ... esclavas» preserva esa oposición con mejor equilibrio y sin sobrecargar el primer miembro con «varones».
  - severity: low
    issue: La nota «las esclavas mujeres» es poco idiomática.
    rationale: No es una alternativa natural en español. Conviene ofrecer una alternativa como «las siervas» o explicar la posibilidad más amplia de «las esclavas y las siervas», manteniendo la razón léxica documentada.
  revised_spanish_text: Y también sobre los esclavos y sobre las esclavas[a], en aquellos días derramaré mi Espíritu.
  revised_footnotes:
  - marker: a
    text: O «los esclavos y las siervas». Los términos hebreos denotan personas, hombres y mujeres, en estado servil; aquí se usa «esclavos/esclavas» para conservar esa realidad social.
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el significado fuente y las decisiones léxicas del POB, pero mejora la naturalidad del español y la simetría del paralelismo social y de género. También corrige la alternativa de la nota para que sea idiomática y útil al lector.
