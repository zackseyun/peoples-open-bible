    rationale: Para ἀπὸ φοβουμένων Κύριον, en español bíblico natural es preferible «de entre los que temen al Señor» o «apartados de los que temen al Señor». Esto expresa mejor la separación de los maldicientes respecto de la comunidad fiel.
  - severity: low
