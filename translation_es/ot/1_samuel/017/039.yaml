revisions:
- from: 'Y David se ciñó su espada sobre su armadura y quiso ir[a], porque no la había probado. Pero David dijo a Saúl: «No puedo ir con éstas, porque no las he probado». Entonces David se las quitó de encima.'
  to: 'Y David se ciñó su espada sobre su armadura y trató de avanzar[a], porque no las había probado. Pero David dijo a Saúl: «No puedo ir con estas, porque no las he probado». Entonces David se las quitó.'
  rationale: Se corrige el pronombre a plural para reflejar con fidelidad el referente implícito del hebreo y la decisión documentada del POB inglés. Se elimina la tilde innecesaria en 'estas'. Además, se sustituye 'quiso ir' por 'trató de avanzar' para reflejar mejor el valor narrativo de intento de movimiento en la armadura, y se simplifica el cierre a 'se las quitó' para un registro más sobrio y natural en español.
