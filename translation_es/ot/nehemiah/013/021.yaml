base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/013/021.yaml
  text: So I warned them and said to them[a], “Why are you spending the night opposite the wall? If you do so again, I will lay hands on you.” From that time on they did not come on the Sabbath.
  footnotes:
