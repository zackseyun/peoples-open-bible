translation:
  language: es
  text: Y ató a los nobles de Jehoiaquim[a], y, después de prender a Zario, su hermano, lo hizo subir desde Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «ató a los nobles de Jehoiaquim»; la cláusula es condensada, y el contexto más amplio junto con el paralelo hebreo indican que el sujeto agente es el rey de Egipto, no Jehoiaquim mismo.'
    reason: alternative_reading
  - marker: b
    text: μεγιστᾶνας también puede traducirse como «grandes» o «magnates».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδησεν
  english_pob_choice: bound
  chosen_spanish: ató
  alternatives_spanish:
  - lo encadenó
  - lo sujetó
  lexicon: LSJ
  rationale: δέω significa básicamente 'atar, amarrar, sujetar'. 'Ató' conserva la fuerza concreta sin añadir necesariamente la imagen de cadenas o de una prisión formal.
- source_word: τοὺς μεγιστᾶνας
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los grandes
  - los magnates
  - los principales
  lexicon: LSJ
  rationale: μεγιστᾶνες designa a hombres de rango alto o de la elite. 'Nobles' es natural en español y refleja bien la idea de figuras cortesanas prominentes.
- source_word: Ἰωακεὶμ
  english_pob_choice: Jehoiakim
  chosen_spanish: Jehoiaquim
  alternatives_spanish:
  - Joacim
  - Joaquim
  lexicon: source transliteration
  rationale: La forma griega corresponde al nombre bíblico conocido como Jehoiakim; en español, 'Jehoiaquim' conserva la identificación histórica y se ajusta a la tradición bíblica en castellano.
- source_word: Ζάριον
  english_pob_choice: Zarius
  chosen_spanish: Zario
  alternatives_spanish:
  - Zarión
  lexicon: source transliteration
  rationale: El nombre griego Ζάριον se translitera de manera directa como 'Zario' en español, manteniéndose cercano a la forma fuente y sin añadir una terminación latina innecesaria.
- source_word: συλλαβών
  english_pob_choice: after seizing
  chosen_spanish: después de prender
  alternatives_spanish:
  - después de apresar
  - después de capturar
  lexicon: LSJ
  rationale: El participio indica tomar bajo control o detener. 'Prender' comunica bien la idea de aprehensión en español bíblico contemporáneo sin sobrerregularizar el matiz legal.
- source_word: ἀνήγαγεν
  english_pob_choice: brought him up
  chosen_spanish: lo sacó
  alternatives_spanish:
  - lo trajo de regreso
  - lo llevó arriba
  lexicon: LSJ
  rationale: En este contexto con ἐξ Αἰγύπτου, la dirección importa más que una traducción literal de 'subir'. 'Lo sacó' transmite con claridad el movimiento de salida desde Egipto.
- source_word: ἐξ Αἰγύπτου
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: LSJ
  rationale: La preposición expresa origen. 'De Egipto' es la forma más natural en español y mantiene el dato geográfico sin intensificarlo con una glosa innecesaria.
theological_decisions:
- issue: Sujeto implícito en un enunciado histórico comprimido
  english_pob_reading: The English keeps 'he' without expanding the subject, because the Greek is compressed and the broader context / Hebrew parallel indicates the king of Egypt is the actor, not Jehoiakim.
  chosen_spanish_reading: El español conserva la referencia implícita en 'ató' y 'sacó', sin insertar explícitamente 'el rey de Egipto' en el texto principal.
  alternative_spanish_readings:
  - Y el rey de Egipto ató a los nobles de Jehoiaquim...
  - Y Jehoiaquim ató a los nobles...
  rationale: La secuencia griega es breve y, leída aisladamente, puede resultar ambigua; sin embargo, el paralelo hebreo y el contexto narrativo señalan al rey de Egipto como agente. En el texto principal se evita añadir un sujeto que no aparece en la cláusula griega, pero tampoco se deja una lectura engañosa.
  doctrine_reference: Preservar la tensión de la fuente y dejar que el contexto histórico corrija la ambigüedad; evitar resolverla con una expansión no anclada en el verso.
translation_notes:
  revision_awareness: Se siguió el texto griego como ancla principal y se tuvo en cuenta el paralelo hebreo para la identificación del actor histórico. No hubo revisiones previas aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se mantuvo un registro consistente de nombres propios bíblicos en transliteración española.
  - '''Ató'' y ''sacó'' preservan la concisión narrativa del griego sin introducir explicaciones en el cuerpo del verso.'
