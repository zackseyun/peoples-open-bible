translation:
  language: es
  text: 'Así dice el gran rey, el señor de toda la tierra: He aquí, saldrás de mi presencia, y tomarás contigo hombres confiados en su fuerza, ciento veinte mil soldados de infantería, y una multitud de caballos con jinetes, ciento veinte mil[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego final dice literalmente «doce miríadas», es decir, 120.000.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τάδε λέγει
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así habla
  lexicon: LSJ
  rationale: Fórmula solemne de proclamación; «Así dice» preserva el tono oficial y es natural en español bíblico contemporáneo.
- source_word: ὁ βασιλεὺς ὁ μέγας
  english_pob_choice: the great king
  chosen_spanish: el gran rey
  alternatives_spanish:
  - el rey grande
  - el rey poderoso
  lexicon: LSJ
  rationale: Conserva el título real directo y el matiz de grandeza exaltada del original sin añadir una interpretación no explicitada.
- source_word: ὁ κύριος πάσης τῆς γῆς
  english_pob_choice: the lord of all the earth
  chosen_spanish: el señor de toda la tierra
  alternatives_spanish:
  - el dueño de toda la tierra
  - el soberano de toda la tierra
  lexicon: LSJ
  rationale: «Señor» reproduce κύριος en un contexto de autoexaltación real humana, no como título divino; «de toda la tierra» mantiene el universalismo de πάσης τῆς γῆς.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: LSJ
  rationale: Marca deíctica de atención. «Mira» es más natural para el español actual, aunque menos formal que «He aquí».
- source_word: ἐξελεύσῃ ἐκ τοῦ προσώπου μου
  english_pob_choice: you shall go out from my presence
  chosen_spanish: saldrás de mi presencia
  alternatives_spanish:
  - saldrás de delante de mí
  - te irás de mi presencia
  lexicon: LSJ
  rationale: «Presencia» conserva el modismo de πρόσωπον sin traducirlo de forma corporalista; el futuro mantiene el tono de mandato/expulsión solemne.
- source_word: λήμψῃ μετὰ σεαυτοῦ
  english_pob_choice: you shall take with yourself
  chosen_spanish: tomarás contigo
  alternatives_spanish:
  - llevarás contigo
  - te llevarás contigo
  lexicon: LSJ
  rationale: Forma idiomática y concisa que refleja la fuerza media del verbo y la construcción con μετὰ σεαυτοῦ.
- source_word: ἄνδρας πεποιθότας ἐν ἰσχύι αὐτῶν
  english_pob_choice: men confident in their strength
  chosen_spanish: hombres confiados en su fuerza
  alternatives_spanish:
  - hombres que confían en su fuerza
  - hombres que se apoyan en su fuerza
  lexicon: LSJ
  rationale: «Confiados en su fuerza» reproduce la confianza/reliance de πεποιθότας y conserva el sentido militar y de autosuficiencia.
- source_word: πεζῶν
  english_pob_choice: foot soldiers
  chosen_spanish: soldados de infantería
  alternatives_spanish:
  - infantes
  - soldados a pie
  lexicon: LSJ
  rationale: «Infantería» aclara el sentido militar en español sin perder la referencia a tropas de a pie.
- source_word: εἰς χιλιάδας ἑκατὸν εἴκοσι
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - ciento veinte millares
  - ciento veinte millares de hombres
  lexicon: LSJ
  rationale: Expresa de forma natural el total numérico indicado por la construcción griega.
- source_word: πλῆθος ἵππων σὺν ἀναβάταις
  english_pob_choice: a multitude of horses with riders
  chosen_spanish: una multitud de caballos con jinetes
  alternatives_spanish:
  - gran número de caballos con sus jinetes
  - una multitud de caballos y jinetes
  lexicon: LSJ
  rationale: Preserva la imagen concreta de caballos y montados; «jinetes» comunica el sentido de ἀναβάταις de modo claro en español.
- source_word: μυριάδας δέκα δύο
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - doce miríadas
  - doce decenas de millar
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «doce miríadas», el total equivalente es 120.000; se prioriza la claridad numérica en español sin perder fidelidad al valor del número.
theological_decisions:
- issue: κύριος como título humano y no divino
  english_pob_reading: lord
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - dueño
  - soberano
  rationale: El contexto es el discurso arrogante de un rey humano; por eso «señor» conserva el título sin activar la convención bíblica de mayúscula o de referencia divina.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Tratamiento del doble valor numérico final
  english_pob_reading: one hundred twenty thousand
  chosen_spanish_reading: ciento veinte mil
  alternative_spanish_readings:
  - doce miríadas
  - doce diezmiles
  rationale: El texto griego finaliza con una unidad numérica distinta («doce miríadas»), pero su valor es el mismo; la traducción española opta por el valor aritmético explícito para evitar opacidad innecesaria en la lectura pública.
  doctrine_reference: Numerical rendering policy for transparent source equivalence
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «Look» por «Behold» para un registro más formal y normalizó el número final a 120,000; esta versión española sigue ese mismo criterio de registro y claridad numérica, pero mantiene el equivalente natural «Mira» y «ciento veinte mil» para lectura pública.
  spanish_consistency_notes:
  - Se mantiene «señor» en minúscula porque el referente es un rey humano; no se usa la convención de mayúscula para el nombre divino.
  - «Caballos con jinetes» conserva la imagen concreta del griego frente a un término abstracto como «caballería».
  - La cifra final se armoniza con el valor total del griego y con la decisión revisada del inglés, evitando una transliteración numérica opaca.
  - La puntuación con dos puntos después de «tierra» refleja bien la transición de fórmula proclamatoria a discurso directo.
