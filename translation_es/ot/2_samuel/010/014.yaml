translation:
  language: es
  text: Y cuando los hijos de Amón[a] vieron que Aram[b] había huido, huyeron ante Abisai y entraron en la ciudad. Entonces Joab volvió de su ataque contra los hijos de Amón[c] y llegó a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los amonitas' para 'los hijos de Amón'.
    reason: lexical_alternative
  - marker: b
    text: O 'los arameos'; hebreo 'Aram'.
    reason: lexical_alternative
  - marker: c
    text: La expresión 'de su ataque contra los hijos de Amón' comunica la retirada de Joab del combate contra ellos.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Conservo la expresión genealógica del hebreo, igual que el POB inglés mantiene 'sons of Ammon'. 'Hijos de Amón' es natural en español bíblico y deja visible la forma fuente; 'amonitas' sería más idiomático pero menos transparente.
- source_word: רָאוּ כִּי
  english_pob_choice: saw that
  chosen_spanish: vieron que
  alternatives_spanish:
  - se dieron cuenta de que
  - vieron cuando
  lexicon: HALOT
  rationale: 'El hebreo presenta percepción seguida de contenido proposicional. ''Vieron que'' reproduce bien esa estructura sin añadir una interpretación más dinámica de ''se dieron cuenta''. '
- source_word: נָס
  english_pob_choice: had fled
  chosen_spanish: había huido
  alternatives_spanish:
  - había fugitado
  - huía
  lexicon: HALOT
  rationale: El qatal אחרי 'vieron que' señala acción anterior; en español, el pluscuamperfecto 'había huido' preserva esa anterioridad. 'Huir' comunica mejor el valor narrativo que una perífrasis más pesada.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Mantengo el nombre propio semítico 'Aram', como hace el POB inglés, para evitar la sustitución interpretiva 'Siria' y conservar la forma del texto fuente.
- source_word: וַיָּנֻסוּ מִפְּנֵי אֲבִישַׁי
  english_pob_choice: they fled before Abishai
  chosen_spanish: ellos huyeron delante de Abisai
  alternatives_spanish:
  - huyeron de delante de Abisai
  - huyeron ante Abisai
  lexicon: HALOT
  rationale: '''Delante de'' expresa bien el valor de מִפְּנֵי en contexto militar, indicando retirada en presencia de Abisai. El sujeto explícito ''ellos'' ayuda a la fluidez del español y evita ambigüedad tras la cláusula anterior.'
- source_word: וַיָּבֹאוּ הָעִיר
  english_pob_choice: entered the city
  chosen_spanish: entraron en la ciudad
  alternatives_spanish:
  - vinieron a la ciudad
  - se metieron en la ciudad
  lexicon: HALOT
  rationale: '''Entraron en la ciudad'' es la equivalencia española más natural y fiel para el movimiento hacia dentro de una urbe fortificada. Mantiene el carácter narrativo sin sobreexplicar.'
- source_word: וַיָּשָׁב יוֹאָב
  english_pob_choice: Then Joab returned
  chosen_spanish: Entonces Joab se retiró
  alternatives_spanish:
  - Entonces Joab volvió
  - Entonces Joab regresó
  lexicon: HALOT
  rationale: Aunque el verbo base es 'volver/retornar', el contexto militar y la nota inglesa indican una retirada de combate. 'Se retiró' comunica con precisión ese matiz contextual sin perder la idea de volver desde la acción.
- source_word: מֵעַל בְּנֵי עַמּוֹן
  english_pob_choice: from against the sons of Ammon
  chosen_spanish: de en medio de los hijos de Amón
  alternatives_spanish:
  - de los hijos de Amón
  - desde delante de los hijos de Amón
  lexicon: HALOT
  rationale: La expresión inglesa 'from against' señala retirada respecto del enfrentamiento. 'De en medio de' conserva la idea de apartarse del campo de acción contra ellos, evitando la lectura demasiado simple de 'de' o la calca dura 'desde sobre'.
- source_word: וַיָּבֹא יְרוּשָׁלִָם
  english_pob_choice: came to Jerusalem
  chosen_spanish: llegó a Jerusalén
  alternatives_spanish:
  - vino a Jerusalén
  - arribó a Jerusalén
  lexicon: HALOT
  rationale: '''Llegó a Jerusalén'' es una solución natural en español para la llegada final del relato. No añado ''volvió'' porque el hebreo aquí solo dice que llegó, y el contexto ya señaló la retirada previa.'
theological_decisions:
- issue: Tratamiento del nombre divino y ausencia de mención explícita de Yahvé
  english_pob_reading: No divine name appears in this verse.
  chosen_spanish_reading: No se introduce ninguna equivalencia reverencial ni sustitución teológica.
  alternative_spanish_readings:
  - introducir 'SEÑOR' por convención
  - añadir 'Yahvé' por estilo general
  rationale: El versículo no contiene ni alude directamente al nombre divino; por tanto, no corresponde insertar 'Yahvé' ni una máscara reverencial. La traducción debe permanecer estrictamente ceñida al contenido del hebreo.
  doctrine_reference: Transparencia textual y fidelidad al contenido léxico del versículo
- issue: Valor militar de וַיָּשָׁב יוֹאָב / מֵעַל בְּנֵי עַמּוֹן
  english_pob_reading: Then Joab returned from against the sons of Ammon
  chosen_spanish_reading: Entonces Joab se retiró de en medio de los hijos de Amón
  alternative_spanish_readings:
  - Entonces Joab volvió de los hijos de Amón
  - Entonces Joab regresó de contra los hijos de Amón
  rationale: El POB inglés interpreta la construcción como retirada del combate. En español, 'se retiró' expresa mejor esa dimensión militar que un simple 'volvió' o una calca de 'contra'.
  doctrine_reference: Principio de equivalencia óptima con preservación del matiz contextual
- issue: Identificación de ארם
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - los arameos
  - Siria
  rationale: Se preserva el nombre histórico-bíblico 'Aram' para no desplazar el referente mediante una etiqueta geopolítica posterior ('Siria') ni convertirlo en una glosa interpretativa ('arameos').
  doctrine_reference: Nombres propios bíblicos y continuidad con el hebreo fuente
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios de revisión aplicados; el estado de revisión más reciente indica que no hubo modificaciones necesarias y el acuerdo de revisión fue alto. La traducción española conserva las mismas decisiones centrales: hijos de Amón, Aram, huida antes de Abisai, entrada en la ciudad y retirada de Joab del enfrentamiento.'
  spanish_consistency_notes:
  - Se mantiene 'Aram' de forma consistente, sin alternar con 'arameos' en el texto principal.
  - '''Hijos de Amón'' conserva la expresión genealógica del hebreo y del POB inglés; la alternativa ''amonitas'' queda solo en nota.'
  - '''Se retiró'' traduce el matiz militar del retorno de Joab, mientras la nota aclara la construcción hebrea.'
  - No se introduce ninguna terminología de Yahvé/Cristo/Espíritu que no aparece en el versículo.
  - 'La puntuación sigue el ritmo narrativo de dos acciones consecutivas: huida/entrada y retirada/llegada.'
