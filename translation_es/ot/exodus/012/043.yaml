review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: Yahvé habla a Moisés y Aarón, introduce una regulación de la Pascua, y prohíbe que un extranjero participe de ella. También mantiene correctamente «Yahvé» para יְהוָה y «extranjero» para בֶּן נֵכָר, con una nota léxica útil. Sin embargo, «estatuta» no es una forma adecuada en español estándar para חֻקַּת en este contexto; debe reemplazarse por «estatuto» u otra opción jurídica natural.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero contiene dos problemas de calidad: (1) la palabra «estatuta» suena incorrecta/no estándar en español bíblico general; «estatuto» es la forma natural y fiel. (2) La nota [a] es innecesaria y engañosa: «y Aarón» no requiere nota, pues no preserva una alternativa significativa ni resuelve una ambigüedad. El resto del verso lee con naturalidad.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto en «Yahvé», «Pascua» y «extranjero». La principal desviación es léxica/estilística en חֻקַּת: «estatuta» no cumple bien el objetivo de español moderno y eclesialmente legible; «estatuto» sí. No hay conflicto teológico que requiera adjudicación adicional.'
  issues:
  - severity: high
    issue: «estatuta» para חֻקַּת
    rationale: Aunque busca reflejar el tono legal, «estatuta» no es la opción estándar ni natural en español general. «Estatuto» preserva el registro jurídico y la legibilidad sin pérdida semántica.
  - severity: medium
    issue: Nota [a] innecesaria sobre «y Aarón»
    rationale: La presencia de Aarón forma parte normal del texto fuente y no requiere una nota literal. La nota no aporta información léxica, textual ni traductológica útil, y añade ruido editorial.
  - severity: low
    issue: «comerá de ella» podría entenderse como futuro simple más que prohibición
    rationale: No es incorrecto, y en contexto legal funciona. Sin embargo, «podrá comer de ella» expresaría con más claridad la prohibición modal del inglés POB. Aun así, «ningún extranjero comerá de ella» sigue siendo aceptable en español bíblico.
  revised_spanish_text: 'Yahvé dijo a Moisés y a Aarón: «Este es el estatuto de la Pascua: ningún extranjero[a] comerá de ella»'
  revised_footnotes:
  - marker: a
    text: Literalmente, «hijo de extranjería». La frase designa a un extranjero, es decir, a alguien fuera de la comunidad del pacto.
    reason: lexical_alternative
  revision_rationale: Se corrige «estatuta» a «estatuto» para lograr fidelidad léxica con español natural y jurídicamente claro. También se elimina la nota innecesaria sobre «y Aarón». Se ajusta «Esta es» a «Este es» para concordar con «estatuto». No se requieren cambios teológicos ni textuales mayores.
