translation:
  language: es
  text: Harás acercar a los levitas delante de Yahvé, y los hijos de Israel[a] pondrán sus manos sobre los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel», una expresión colectiva habitual para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  english_pob_choice: You shall bring
  chosen_spanish: Harás acercar
  alternatives_spanish:
  - Presentarás
  - Harás venir
  lexicon: HALOT
  rationale: El hifil de קרב expresa hacer que algo se acerque o presentarlo ante alguien. En español, «harás acercar» conserva la fuerza direccional del verbo sin perder la claridad ritual; «presentarás» es posible, pero suena algo más interpretativo en este contexto.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Es el nombre tribal/clánico habitual en español. Mantiene transparencia y reconocimiento inmediato para el lector.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en la presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי se expresa naturalmente como «delante de» o «ante». Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto, sin sustituirlo por una máscara litúrgica.
- source_word: וְסָמְכוּ
  english_pob_choice: shall lay
  chosen_spanish: pondrán
  alternatives_spanish:
  - apoyarán
  - colocarán
  lexicon: HALOT
  rationale: En la fórmula ritual de la imposición de manos, סמך puede traducirse como «poner» las manos. «Pondrán» es claro y idiomático en español; «apoyarán» podría sugerir peso o inclinación más que la acción ritual.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de Israel». Se conserva la forma masculina plural porque el texto la usa explícitamente; en español puede entenderse de modo colectivo sin borrar la forma fuente.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: Traducción directa y natural del plural con sufijo pronominal.
- source_word: עַל הַלְוִיִּם
  english_pob_choice: on the Levites
  chosen_spanish: sobre los levitas
  alternatives_spanish:
  - encima de los levitas
  lexicon: HALOT
  rationale: La preposición עַל en la fórmula de imposición de manos se traduce mejor como «sobre», que preserva la imagen ritual de colocar las manos encima de la persona.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre de pacto revelado y evita la sustitución por una designación genérica.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión colectiva בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La lectura inglesa conserva la forma masculina explícita del hebreo. En español, mantener «los hijos de Israel» preserva la transparencia formal y permite una nota implícita de sentido colectivo sin neutralizar el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español y quede anclado a la expresión correspondiente. La redacción principal se mantiene alineada con el hebreo y con el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה conforme al estándar del proyecto.
  - Se mantiene la expresión fuente «los hijos de Israel» para preservar la forma masculina plural explícita del hebreo.
  - «Poner sus manos sobre» refleja mejor la fórmula ritual de imposición de manos en español que un calco demasiado rígido.
