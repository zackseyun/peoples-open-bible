id: PHP.1.29
reference: Philippians 1:29
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ὑμῖν ἐχαρίσθη τὸ ὑπὲρ Χριστοῦ, οὐ μόνον τὸ εἰς αὐτὸν πιστεύειν ἀλλὰ καὶ τὸ ὑπὲρ αὐτοῦ πάσχειν),
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/029.yaml
  text: For it has been graciously granted to you on behalf of Messiah not only to believe in him, but also to suffer for him,
translation:
  language: ko
  text: 이는 여러분에게 메시아[a]를 위하여 은혜로 베풀어진 것이니, 곧 그를 믿는 것[b]뿐만 아니라 그를 위하여 고난받는 것[c]까지 함께 주어진 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 칭호 Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그를 신뢰하는 것」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「그의 이름을 위하여」 또는 「그를 대신하여」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_korean: 이는 ~이니
  alternatives_korean:
  - 왜냐하면
  - 그것은
  lexicon: BDAG
  rationale: 앞 절의 담대함의 근거를 도입하므로 「이는 ~이니」로 인과의 흐름을 자연스럽게 살린다.
- source_word: ἐχαρίσθη
  english_pob_choice: it has been graciously granted
  chosen_korean: 은혜로 베풀어진 것
  alternatives_korean:
  - 은혜로 주어진 것
  - 거저 주신 것
  lexicon: BDAG
  rationale: χαρίζομαι는 단순한 「허용」이 아니라 「은혜로 주심」을 의미한다. 「은혜로 베풀어진 것」이 신적 주체와 은혜의 함의를 함께 담는다.
- source_word: τὸ ὑπὲρ Χριστοῦ
  english_pob_choice: on behalf of Messiah
  chosen_korean: 메시아를 위하여
  alternatives_korean:
  - 메시아를 대신하여
  - 메시아 때문에
  lexicon: BDAG
  rationale: ὑπέρ + 속격은 「~을 위하여」를 표현한다. 믿음과 고난 모두가 메시아와 연결됨을 나타낸다.
- source_word: πιστεύειν εἰς αὐτόν
  english_pob_choice: to believe in him
  chosen_korean: 그를 믿는 것
  alternatives_korean:
  - 그를 신뢰하는 것
  - 그분께 믿음을 두는 것
  lexicon: BDAG
  rationale: 신약의 정형 표현 「~을 믿다」를 「그를 믿는 것」으로 자연스럽게 옮긴다.
- source_word: πάσχειν
  english_pob_choice: to suffer
  chosen_korean: 고난받는 것
  alternatives_korean:
  - 고난을 당하는 것
  - 수난하는 것
  lexicon: BDAG
  rationale: πάσχω의 수동적 함의를 「고난받다」로 옮긴다.
- source_word: ὑπὲρ αὐτοῦ
  english_pob_choice: for him
  chosen_korean: 그를 위하여
  alternatives_korean:
  - 그를 대신하여
  - 그의 이름을 위하여
  lexicon: BDAG
  rationale: 앞의 「메시아를 위하여」와 일관되게 「그를 위하여」로 옮긴다.
theological_decisions:
- issue: 믿음과 고난이 모두 신적으로 은혜로 주어진 것이라는 진술의 무게를 약화시키지 않기
  chosen_reading: 믿음과 고난 모두에 대해 명시적 은혜의 언어를 보존
  alternative_readings:
  - ἐχαρίσθη를 「허락되었다」로 약화시키거나, 신적 행위 주체를 모호하게 처리
  rationale: 헬라어는 메시아를 믿는 것과 그를 위해 고난받는 것 모두를 은혜로 주어진 것으로 묶어 표현한다. 번역은 이 신학적 긴장을 그대로 보존해야 한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
