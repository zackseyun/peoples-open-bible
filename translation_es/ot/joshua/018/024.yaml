translation:
  language: es
  text: 'Y Chefar-amoni[a], Ofni y Geba: doce ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Chefar-amoni también puede transliterarse «Chefar-haamoní» o de manera similar en algunas versiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְפַר העמני
  english_pob_choice: Chephar-ammoni
  chosen_spanish: Chefar-ammoní
  alternatives_spanish:
  - Chefar-haamoní
  - Kefar-ammoní
  - aldea del amonita
  lexicon: HALOT
  rationale: Se trata de un topónimo fijo en una lista territorial. Conservé la transliteración en español en lugar de traducir el sentido literal de כפר como 'aldea', porque el contexto muestra un nombre propio asentado. La forma con acento final ayuda a la lectura en español y mantiene la huella del nombre hebreo.
- source_word: הָעָפְנִי
  english_pob_choice: Ophni
  chosen_spanish: Ofni
  alternatives_spanish:
  - Ofni
  - Ha-ofni
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera. Omití el artículo hebreo como parte del topónimo convencional en una lista de ciudades, siguiendo el valor onomástico del término.
- source_word: גָבַע
  english_pob_choice: Geba
  chosen_spanish: Geba
  alternatives_spanish:
  - Gaba
  lexicon: HALOT
  rationale: Topónimo conocido en español bíblico; 'Geba' preserva la forma usual de transliteración y evita una traducción semántica como 'colina', que aquí no corresponde por tratarse de un nombre de lugar.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - pueblos
  - aldeas
  lexicon: HALOT
  rationale: En listas de reparto territorial, 'ciudades' conserva mejor el registro formal del original y del uso bíblico tradicional que 'pueblos' o 'aldeas'.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - '12'
  lexicon: HALOT
  rationale: Numeral cardinal simple que modifica a 'ciudades'; se traduce de forma directa.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus pueblos
  - sus asentamientos
  - sus caseríos
  lexicon: HALOT
  rationale: El término designa poblados dependientes o anexos rurales. 'Aldeas' es claro en español y conserva la distinción entre la ciudad principal y sus asentamientos subordinados. 'Sus' mantiene el referente plural femenino del sufijo hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de una forma más cercana a la transliteración estándar de כפר העמני ('Chephar-ammoni'). La versión española sigue esa decisión onomástica y conserva el orden enumerativo y la fórmula final del versículo.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los tres nombres propios, sin traducirlos semánticamente.
  - Se usó 'ciudades' y 'aldeas' para reflejar la fórmula territorial del hebreo.
  - La conjunción inicial 'Y' reproduce el arranque coordinante del versículo en español natural.
  - Se evitó capitalización innecesaria en nombres comunes y se normalizó la puntuación con dos puntos antes del recuento final.
