id: JOB.29.1
reference: Job 29:1
source:
  edition: WLC
  text: וַ/יֹּ֣סֶף אִ֭יּוֹב שְׂאֵ֥ת מְשָׁל֗/וֹ וַ/יֹּאמַֽר׃
translation:
  text: And Job continued, taking up his discourse, and said:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his proverb,' 'his parable,' or 'his oracle.' The Hebrew mashal has a broad range; here it introduces Job's extended poetic speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: continued
  alternatives:
  - added
  - proceeded further
  lexicon: HALOT
  rationale: The verb יסף literally means 'to add' or 'to continue.' In this narrative idiom with a following infinitive ('continued, taking up...'), 'continued' best conveys the sense in natural English without losing the sequential force.
- source_word: אִיּוֹב
  chosen: Job
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: שְׂאֵת
  chosen: taking up
  alternatives:
  - lifting up
  - uttering
  lexicon: HALOT
  rationale: From נשׂא ('to lift, carry, take up'). In the idiom נשׂא משל, the sense is to 'take up' or 'utter' a discourse/proverb. 'Taking up' preserves the Hebrew imagery while remaining idiomatic in English.
- source_word: מְשָׁלוֹ
  chosen: his discourse
  alternatives:
  - his proverb
  - his parable
  - his oracle
  lexicon: HALOT
  rationale: מָשָׁל can mean proverb, parable, taunt, or discourse depending on context. In Job it introduces an extended poetic speech rather than a brief proverb, so 'his discourse' best fits the literary setting. Traditional 'parable' is misleading in modern English, and 'proverb' is too narrow.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. 'And said' is the most straightforward and natural rendering.
