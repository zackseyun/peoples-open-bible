translation:
  language: es
  text: Y al levita que está en tus ciudades[a][b][c] no lo descuides, porque no tiene parte ni herencia contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. hebreo, «dentro de tus puertas»; modismo para tus ciudades o comunidades locales.
    reason: cultural_note
  - marker: b
    text: O «no lo abandones» o «no lo dejes».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el levita no tiene un reparto tribal normal de tierra entre Israel.
    reason: cross_reference
lexical_decisions:
- source_word: וְהַלֵּוִי
  english_pob_choice: And the Levite
  chosen_spanish: Y al levita
  alternatives_spanish:
  - Y el levita
  - Y al levita miembro de la tribu de Leví
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo definido en singular como representante de la clase levítica. «Levita» conserva la referencia técnica sin añadir «sacerdote», que sería demasiado específico y no está en el texto.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  english_pob_choice: who is within your gates
  chosen_spanish: que está dentro de tus ciudades
  alternatives_spanish:
  - que está en tus pueblos
  - que está dentro de tus puertas
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para la comunidad local o las ciudades del pueblo. Se traduce con «ciudades» para comunicar el sentido idiomático en español, mientras una nota preserva la imagen literal de «puertas».
- source_word: לֹא תַעַזְבֶנּוּ
  english_pob_choice: you shall not neglect him
  chosen_spanish: no lo descuides
  alternatives_spanish:
  - no lo abandones
  - no lo dejes
  lexicon: HALOT
  rationale: עזב puede significar abandonar, dejar o descuidar. En este contexto de provisión comunitaria, «descuides» expresa mejor la omisión práctica que la mera separación física.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» es la correspondencia natural y clara en español.
- source_word: אֵין לוֹ
  english_pob_choice: he has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no le corresponde
  - no posee
  lexicon: HALOT
  rationale: La construcción existencial se expresa de manera idiomática en español con «no tiene».
- source_word: חֵלֶק וְנַחֲלָה
  english_pob_choice: portion or inheritance
  chosen_spanish: parte ni herencia
  alternatives_spanish:
  - porción ni herencia
  - participación ni heredad
  lexicon: HALOT
  rationale: «Parte» y «herencia» conservan la distinción semántica entre participación y asignación hereditaria territorial, sin tecnicismo innecesario. El uso de «ni» refleja el paralelismo enfático del hebreo.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - entre ustedes
  lexicon: HALOT
  rationale: La preposición con sufijo de segunda persona se vierte naturalmente como «contigo», manteniendo la relación covenantal/comunitaria implícita.
theological_decisions:
- issue: La falta del levita y su base socio-teológica
  english_pob_reading: The verse refers to the Levite lacking a normal tribal land-share in Israel and therefore requiring ongoing communal support.
  chosen_spanish_reading: El versículo alude a que el levita no tiene una porción territorial normal en Israel y, por eso, depende del cuidado sostenido de la comunidad.
  alternative_spanish_readings:
  - El versículo habla solo de marginación social general, sin referencia específica a la tierra
  - El versículo se limita a una obligación de hospitalidad local
  rationale: En Deuteronomio, «parte y herencia» apunta de manera consistente a la falta de reparto territorial para los levitas. La traducción mantiene ese trasfondo sin sobreexplicarlo en el texto principal.
  doctrine_reference: Números 18:20-24; Deuteronomio 10:9; Deuteronomio 18:1-2
translation_notes:
  revision_awareness: 'La versión sigue el consenso alto del audit trail inglés y no introduce cambios de sentido respecto de la revisión más reciente, que no requirió ajustes. Se preservan los dos ejes interpretativos documentados: el modismo de «dentro de tus puertas» y la falta de una porción territorial para el levita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otras secciones cuando el texto tenga el nombre divino; aquí no aparece.
  - Se mantiene «levita» como término técnico, sin sustituirlo por «sacerdote».
  - Se prefirió un español natural pero sobrio, evitando calcos como «dentro de tus puertas» en el cuerpo principal y dejándolo en nota.
  - «Parte ni herencia» conserva el paralelismo hebreo y la carga legal-territorial del pasaje.
