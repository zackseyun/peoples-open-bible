review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: universalidad («Todos»), negación proverbial («no vuelven»), y la meta no alcanzada («los senderos de la vida»). Sin embargo, «van a ella» debilita de forma innecesaria בָּאֶיהָ, que en contexto apunta a entrar/ir a ella con matiz sexual; el POB inglés preserva ese matiz en el texto principal, no solo en nota. Además, la nota b está mal formulada porque repite «alcanzan» como alternativa de «alcanzan».'
  spanish_quality_summary: El español es claro y legible, pero «van a ella» suena más débil y menos preciso que «entran en ella» en este contexto sapiencial sobre la mujer extraña. «Todos los que entran en ella» sigue siendo natural y más fiel. El resto de la línea suena bien en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones para «senderos de la vida» y «no vuelven» son adecuadas. La principal corrección es alinear mejor בָּאֶיהָ con el matiz contextual documentado por el POB inglés.
  issues:
  - severity: medium
    issue: «van a ella» atenúa demasiado בָּאֶיהָ
    rationale: El hebreo בוא con sufijo femenino, en este contexto de la mujer prohibida, comunica más que simple dirección; «go in to her» en el POB inglés preserva el matiz idiomático/sexual. En español, «entran en ella» lo refleja mejor sin volverse ininteligible.
  - severity: medium
    issue: La nota b repite el término principal como alternativa
    rationale: La nota dice «O ‘llegan’ o ‘alcanzan…’» cuando el texto ya usa «alcanzan». Una nota de alternativas debe aportar opciones reales distintas del término principal.
  - severity: low
    issue: Anclaje de notas mejorable
    rationale: Conviene colocar la nota a junto a la expresión que traduce בָּאֶיהָ y la nota b junto al verbo «alcanzan», ya que las notas explican esas decisiones léxicas concretas.
  revised_spanish_text: Todos los que entran en ella[a] no vuelven, ni alcanzan[b] los senderos de la vida.
  revised_footnotes:
