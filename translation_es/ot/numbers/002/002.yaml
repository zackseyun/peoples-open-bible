translation:
  language: es
  text: Los hijos de Israel acamparán, cada hombre junto a su bandera, conforme a las señales de la casa de sus padres; acamparán[a] frente a la tienda de reunión[b], alrededor de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se repite el verbo para reflejar la estructura del hebreo, que subraya la misma acción en la disposición general del campamento.
    reason: source_note
  - marker: b
    text: Tradicionalmente, «tabernáculo de reunión». El hebreo אֹהֶל מוֹעֵד significa literalmente «tienda de reunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en sentido distributivo; «cada hombre» conserva el valor singular sin neutralizar el género ni perder la distribución individual del campamento.
- source_word: דִּגְלוֹ
  english_pob_choice: his banner
  chosen_spanish: su bandera
  alternatives_spanish:
  - su estandarte
  - su pendón
  lexicon: HALOT
  rationale: דֶּגֶל designa un distintivo tribal o militar. «Bandera» es el equivalente natural en español y conserva la idea de insignia visible sin forzar un tecnicismo.
- source_word: בְאֹתֹת
  english_pob_choice: according to the signs
  chosen_spanish: conforme a las señales
  alternatives_spanish:
  - según las señales
  - de acuerdo con las señales
  - con los emblemas
  lexicon: HALOT
  rationale: La preposición בְ aquí expresa conformidad o arreglo según un patrón. «Conforme a» reproduce bien ese valor, y «señales» conserva el término básico sin precisar indebidamente si se trata de emblemas, marcas o insignias.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: of their fathers’ houses
  chosen_spanish: de la casa de sus padres
  alternatives_spanish:
  - de las casas de sus padres
  - según la casa de sus padres
  - de sus casas paternas
  lexicon: HALOT
  rationale: La expresión hebrea apunta a la unidad familiar/clánica paterna. «Casa de sus padres» mantiene la imagen social del original con naturalidad en español.
- source_word: יַחֲנוּ
  english_pob_choice: shall camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - deberán acampar
  - camparán
  - se acamparán
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza prescriptiva en este contexto. «Acamparán» comunica la disposición ordenada sin sonar forzado; el mismo verbo se repite para conservar la estructura del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: The sons of Israel
  chosen_spanish: Los hijos de Israel
  alternatives_spanish:
  - Los israelitas
  - Los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva el idiomático parentesco covenantal del hebreo. «Hijos de Israel» es más transparente al texto fuente que «israelitas».
- source_word: מִנֶּגֶד
  english_pob_choice: facing
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrentados a
  - opuestos a
  - delante de
  lexicon: HALOT
  rationale: La idea espacial es de oposición/ubicación en vis-à-vis. «Frente a» es la opción más clara y natural en español para el arreglo del campamento.
- source_word: סָבִיב
  english_pob_choice: all around it
  chosen_spanish: todo alrededor de él
  alternatives_spanish:
  - alrededor de él
  - en derredor de él
  - rodeándolo
  lexicon: HALOT
  rationale: El adverbio expresa encierro perimetral. «Todo alrededor de él» preserva el sentido distributivo y la referencia al tabernáculo con claridad.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Aunque la traducción más transparente sería «tienda de reunión», en español eclesial «tabernáculo de reunión» comunica con precisión la función cultual y mantiene continuidad terminológica tradicional sin ocultar el hebreo subyacente.
theological_decisions:
- issue: Lenguaje masculino distributivo y colectivo
  english_pob_reading: each man / The sons of Israel
  chosen_spanish_reading: cada hombre / Los hijos de Israel
  alternative_spanish_readings:
  - cada uno / Los israelitas
  - cada persona / El pueblo de Israel
  rationale: Se mantiene el masculino distributivo y la fórmula filial del hebreo, porque no se trata de una neutralización genérica sino de una forma deliberada del original. Esto preserva la transparencia del texto fuente y su organización tribal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Término cultual אֹהֶל מוֹעֵד
  english_pob_reading: tent of meeting
  chosen_spanish_reading: tabernáculo de reunión
  alternative_spanish_readings:
  - tienda de reunión
  - tabernáculo
  rationale: El inglés POB evita «tabernacle» por tradición inglesa y prefiere transparencia. En español, «tabernáculo de reunión» es un término eclesial comprensible que no oscurece la referencia cultual y conserva la asociación tradicional sin sustituir el sentido del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Valor preposicional de בְאֹתֹת
  english_pob_reading: according to the signs
  chosen_spanish_reading: conforme a las señales
  alternative_spanish_readings:
  - según las señales
  - con las señales
  - de acuerdo con las señales
  rationale: La revisión inglesa corrigió «with» a «according to» para reflejar mejor la preposición. En español se sigue esa lectura de conformidad normativa u organizativa, evitando una traducción meramente asociativa que debilitaría el orden prescrito del campamento.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en בְאֹתֹת: de «with the signs» a «according to the signs», para reflejar mejor la preposición. La versión española adopta explícitamente esa lectura con «conforme a las señales». También se tomó nota de la preferencia inglesa por «tent of meeting» frente a «tabernacle»; en español se optó por «tabernáculo de reunión» por inteligibilidad eclesial, dejando constancia de la alternativa más transparente en la nota.'
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal del hebreo con dos ocurrencias de «acamparán».
  - «Hijos de Israel» mantiene la formulación bíblica de filiación colectiva, coherente con el registro del proyecto.
  - «Señales» traduce el término de manera amplia para no fijar indebidamente la clase exacta de emblema.
  - La elección «tabernáculo de reunión» se usa con conciencia de que otros pasajes del proyecto pueden preferir «tienda de reunión»; aquí se prioriza la recepción eclesial sin perder la referencia al hebreo.
