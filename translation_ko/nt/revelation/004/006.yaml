id: REV.4.6
reference: 'Revelation 4:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐνώπιον τοῦ θρόνου ὡς θάλασσα ὑαλίνη ὁμοία κρυστάλλῳ. Καὶ ἐν μέσῳ τοῦ θρόνου καὶ κύκλῳ τοῦ θρόνου τέσσαρα ζῷα γέμοντα ὀφθαλμῶν ἔμπροσθεν καὶ ὄπισθεν·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/006.yaml
  text: 'And before the throne was something like a sea of glass[a], like crystal. And in the midst of the throne and around the throne were four living creatures[c][b], full of eyes in front and behind.'
  footnotes:
  - marker: a
    text: 'Or ''a glassy sea.'' The Greek presents a comparison: ''something like a sea of glass.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'four living beings.' The Greek word does not mean the hostile 'beasts' of later Revelation passages.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in the midst of the throne and around the throne' is spatially difficult; the Greek likely reflects visionary perspective and is left intentionally close to the source.
    reason: alternative_reading
translation:
  language: ko
  text: '또 보좌 앞에는 수정같이 맑은 유리 바다 같은 것이 있었습니다[a]. 그리고 보좌 한가운데와 보좌 둘레에 네 생물[b]이 있었는데, 앞과 뒤에 눈이 가득하였습니다[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「유리 바다」. 헬라어는 비교 표현이다: 「유리 바다 같은 것」.'
    reason: lexical_alternative
  - marker: b
    text: '또는 「네 살아 있는 존재」. 헬라어 ζῷον은 계시록 후반의 적대적 「짐승」(θηρίον)을 의미하지 않는다.'
    reason: lexical_alternative
  - marker: c
    text: '「보좌 한가운데와 보좌 둘레에」라는 공간적 표현은 환상적 시점을 반영하므로 본문에 가깝게 둔다.'
    reason: alternative_reading
lexical_decisions:
- source_word: ζῷα
  english_pob_choice: living creatures
  chosen_korean: 생물
  alternatives_korean:
  - 살아 있는 존재
  lexicon: BDAG
  rationale: '계시록 후반의 적대적 짐승(θηρίον)과 구별하기 위해 보좌 주위의 ζῷον은 일관되게 「생물」로 옮긴다. 「짐승」으로 옮기지 않는다.'
theological_decisions:
- issue: ζῷον(생물) vs θηρίον(짐승) 어휘 구별 일관성
  chosen_reading: ζῷον=생물 / θηρίον=짐승
  alternative_readings:
  - '둘 다 「짐승」'
  rationale: '계시록 본문은 보좌 앞의 거룩한 「생물」(ζῷον)과 적대적 「짐승」(θηρίον)을 분명히 구별한다. 한국어 번역도 이 어휘적 구별을 끝까지 유지하여 신학적 혼동을 막는다.'
  doctrine_reference: 'DOCTRINE.md: 어휘 일관성 보존'
