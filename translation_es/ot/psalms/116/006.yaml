translation:
  language: es
  text: Yahvé protege a los sencillos[a]; yo fui abatido[b], y me salvó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ingenuos» o «los inexpertos». El hebreo se refiere a personas simples o sin cautela, no necesariamente a necios morales.
    reason: lexical_alternative
  - marker: b
    text: O «yo estaba débil» o «quedé abatido». El hebreo puede expresar reducción, debilitamiento o humillación.
    reason: lexical_alternative
  - marker: c
    text: O «me libró».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  english_pob_choice: preserves
  chosen_spanish: protege
  alternatives_spanish:
  - guarda
  - preserva
  - cuida
  lexicon: HALOT
  rationale: El participio expresa una acción continua de cuidado y resguardo. En español, "protege" comunica bien esa función sin sonar rígido; mantiene el matiz de atención sostenida que el hebreo sugiere.
- source_word: פְּתָאיִם
  english_pob_choice: the simple
  chosen_spanish: los sencillos
  alternatives_spanish:
  - los simples
  - los ingenuos
  - los inexpertos
  lexicon: HALOT
  rationale: El término hebreo puede referirse a personas sin sofisticación o sin cautela, no necesariamente moralmente necias. "Los sencillos" es natural en español bíblico actual y conserva esa amplitud semántica mejor que opciones más cargadas.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La pauta del proyecto para el Tetragrámaton es usar "Yahvé" en el texto principal. Se mantiene el nombre del pacto de forma transparente, en lugar de sustituirlo por un título como "Señor".
- source_word: דַּלּוֹתִי
  english_pob_choice: I was brought low
  chosen_spanish: yo estaba abatido
  alternatives_spanish:
  - yo fui humillado
  - yo estaba debilitado
  - yo fui reducido
  lexicon: HALOT
  rationale: La forma hebrea puede expresar estar reducido, debilitado o humillado. "Abatido" conserva el sentido de estar caído o reducido en condición, y funciona con naturalidad en español sin estrecharlo a pobreza material.
- source_word: יְהוֹשִׁיעַ
  english_pob_choice: he saved me
  chosen_spanish: me salvó
  alternatives_spanish:
  - me libró
  - me rescató
  - me entregó la salvación
  lexicon: HALOT
  rationale: El hiphil de ישׁע significa salvar o librar. "Me salvó" es la equivalencia directa y clara en español, coherente con el uso del verbo en el contexto de rescate personal.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La decisión del proyecto preserva el nombre divino en lugar de ocultarlo tras una sustitución litúrgica; "Yahvé" es la forma española adoptada para esa transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de פְּתָאיִם
  english_pob_reading: the simple
  chosen_spanish_reading: los sencillos
  alternative_spanish_readings:
  - los ingenuos
  - los inexpertos
  - los simples
  rationale: La expresión no implica automáticamente necedad moral. En español, "los sencillos" mantiene abierto el rango entre simpleza, falta de experiencia y vulnerabilidad, sin introducir una condena que el hebreo no exige.
  doctrine_reference: HALOT, פְּתִי / פְּתָאִים
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado y quedó sin cambios sustanciales; la presente versión española sigue esa lectura de alta concordancia, preservando las tres ideas principales: protección continua, condición de abatimiento y salvación personal.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma española del nombre divino, en línea con el criterio del proyecto.
  - '"Los sencillos" evita cargar el hebreo con una idea de necedad moral más fuerte de la que el contexto requiere.'
  - '"Abatido" conserva el campo semántico de estar rebajado o debilitado sin restringirlo a pobreza económica.'
  - '"Me salvó" deja abierta la posibilidad de "me libró" indicada en la nota, sin perder claridad en el texto principal.'
