  text: וַ/יֹּ֣אמֶר אֵלַ֡/י דָּנִיֵּ֣אל אִישׁ חֲ֠מֻדוֹת הָבֵ֨ן בַּ/דְּבָרִ֜ים אֲשֶׁר֩ אָנֹכִ֨י דֹבֵ֤ר אֵלֶ֨י/ךָ֙ וַ/עֲמֹ֣ד עַל עָמְדֶ֔/ךָ כִּ֥י עַתָּ֖ה שֻׁלַּ֣חְתִּי אֵלֶ֑י/ךָ וּ/בְ/דַבְּר֥/וֹ עִמִּ֛/י אֶת הַ/דָּבָ֥ר הַ/זֶּ֖ה עָמַ֥דְתִּי מַרְעִֽיד־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/010/011.yaml
  text: And he said to me[a], “Daniel, man greatly beloved, understand the words that I am speaking to you, and stand in your place, for now I have been sent to you.” And when he spoke this word to me[c][b], I stood trembling.
  footnotes:
  - marker: a
    text: Or “highly esteemed man.” The Hebrew expression literally describes Daniel as a man of preciousness or desirability, functioning here as an honorific.
    reason: lexical_alternative
  - marker: b
    text: Or “stand upright” or “stand at your station.” The Hebrew idiom is literally “stand upon your standing/place.”
    reason: lexical_alternative
  - marker: c
    text: Or “when he spoke this message to me.” Hebrew has “this word,” which can also mean “this matter” or “this message.”
    reason: lexical_alternative
