translation:
  language: es
  text: Hay quien calla[a] porque no hay respuesta[b], y hay quien calla porque ve el momento oportuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guarda silencio» / «permanece callado».'
    reason: lexical_alternative
  - marker: b
    text: 'Paralelo griego: «Un hombre sabio callará hasta el momento oportuno, pero un charlatán y un necio se pasarán del momento oportuno». El hebreo y el griego de este proverbio difieren notablemente; el texto principal sigue el testimonio hebreo conservado, y el griego aporta la matización de oportunidad.'
    reason: textual_variant
lexical_decisions:
- source_word: מַחֲרִישׁ
  english_pob_choice: keeps silent
  chosen_spanish: calla
  alternatives_spanish:
  - guarda silencio
  - permanece callado
  lexicon: HALOT
  rationale: El participio hebreo expresa una actitud durativa de no hablar. En español, «calla» conserva la brevedad proverbial y suena natural; «guarda silencio» es una alternativa válida pero algo más explícita.
- source_word: מֵאֵין מַעֲנֶה
  english_pob_choice: because there is no answer
  chosen_spanish: porque no tiene respuesta
  alternatives_spanish:
  - porque no hay respuesta
  - por falta de respuesta
  lexicon: HALOT
  rationale: La idea hebrea es la ausencia de respuesta/reply. «Porque no tiene respuesta» mantiene esa fuerza de forma idiomática en español, sin restringir demasiado el sujeto.
- source_word: עֵת
  english_pob_choice: the right time
  chosen_spanish: el momento oportuno
  alternatives_spanish:
  - el tiempo justo
  - el tiempo adecuado
  lexicon: HALOT
  rationale: En contexto sapiencial, עֵת no es solo «tiempo» en sentido cronológico sino el momento apropiado. «Momento oportuno» comunica bien esa noción y conserva el matiz de juicio prudente.
- source_word: רֹאֶה עֵת
  english_pob_choice: sees the right time
  chosen_spanish: ve el momento oportuno
  alternatives_spanish:
  - reconoce el momento oportuno
  - discierne el momento oportuno
  lexicon: HALOT
  rationale: «Ve» conserva la imagen hebrea literal de «ver tiempo», mientras que «momento oportuno» expresa la idea idiomática del pasaje. Es una combinación transparente y fiel.
theological_decisions:
- issue: Diferencia textual entre el hebreo conservado y el paralelo griego sobre el silencio sabio y el exceso de habla
  english_pob_reading: The main text follows the extant Hebrew witness, with the Greek informing the timing nuance in 'the right time.'
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado, y la mención del «momento oportuno» recoge la matización de sabiduría del paralelo griego.
  alternative_spanish_readings:
  - 'Seguir la formulación griega: «Un hombre sabio callará hasta el momento oportuno…»'
  - Homogeneizar ambos testigos en una sola paráfrasis sapiencial
  rationale: Sirach 20:6 presenta una divergencia real entre el hebreo y el griego. Mantener la lectura hebrea evita borrar esa tensión documentada, mientras que «momento oportuno» preserva el valor sapiencial que el griego refuerza.
  doctrine_reference: Textual criticism / witness harmonization caution
translation_notes:
  revision_awareness: 'El pasaje se mantiene en acuerdo alto con el expediente inglés: se conserva la base hebrea como texto principal y se incorpora la sensibilidad del paralelo griego en la noción de tiempo oportuno. No se registran revisiones posteriores que obliguen a modificar esta línea.'
  spanish_consistency_notes:
  - Se mantuvo «calla» como equivalente natural y proverbial de מַחֲרִישׁ.
  - Se evitó «SEÑOR» u otra terminología no pertinente; no hay nombres divinos en este versículo.
  - «Momento oportuno» traduce la noción de עֵת con una solución idiomática, no mecánica.
  - La nota textual distingue claramente entre el testimonio hebreo principal y el paralelo griego sin armonizarlos indebidamente.
