base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/003/018.yaml
  text: And Judas said[a], “It is easy for many to be hemmed in by the hands of a few[b], and in the sight of heaven there is no difference between saving by many or by few.”
  footnotes:
  - marker: a
    text: Or 'to be delivered into the hands of a few.' The Greek verb literally means 'to be shut up/enclosed,' here in the sense of being trapped in another's power.
    reason: lexical_alternative
  - marker: b
    text: '''Heaven'' likely functions as a reverential way of referring to God; compare ''before God'' as an interpretive alternative.'
    reason: alternative_reading
