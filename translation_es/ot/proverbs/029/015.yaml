translation:
  language: es
  text: La vara y la reprensión dan sabiduría, pero el muchacho dejado a sí mismo[a] avergüenza a su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dejado sin control' o 'dejado sin disciplina'. El hebreo tiene literalmente la idea de un muchacho 'dejado ir' o 'dejado solo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁבֶט
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - cetro
  - bastón disciplinario
  lexicon: HALOT
  rationale: En este contexto sapiencial y disciplinario, שֵׁבֶט puede ser vara, bastón o cetro. 'Vara' conserva la imagen concreta de disciplina sin sonar tan técnica como 'bastón disciplinario' ni introducir una lectura regia como 'cetro'.
- source_word: וְתוֹכַחַת
  english_pob_choice: and reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - corrección
  - reproche
  lexicon: HALOT
  rationale: תוֹכַחַת apunta a corrección verbal, reprensión o reprobación. 'Reprensión' mantiene el paralelo con la disciplina física de 'vara' y refleja bien la fuerza verbal del término.
- source_word: יִתֵּן חָכְמָה
  english_pob_choice: give wisdom
  chosen_spanish: dan sabiduría
  alternatives_spanish:
  - imparten sabiduría
  - producen sabiduría
  lexicon: HALOT
  rationale: El hebreo usa el verbo simple dar con sabiduría; el plural español naturaliza el sujeto compuesto 'la vara y la reprensión' sin alterar el sentido. 'Dan sabiduría' conserva la concisión proverbial.
- source_word: נַעַר
  english_pob_choice: boy
  chosen_spanish: muchacho
  alternatives_spanish:
  - niño
  - joven
  - muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde niño hasta joven adulto. Aquí el marco familiar y disciplinario favorece 'muchacho', que sugiere un hijo todavía bajo formación sin perder la referencia masculina.
- source_word: מְשֻׁלָּח
  english_pob_choice: left to himself
  chosen_spanish: dejado a sí mismo
  alternatives_spanish:
  - dejado sin control
  - abandonado a su propia voluntad
  - dejado suelto
  lexicon: HALOT
  rationale: El participio pasivo de שלח literalmente implica 'enviado lejos' o 'dejado ir'. 'Dejado a sí mismo' reproduce de forma natural la idea de falta de restricción parental que el POB inglés expresó como 'left to himself'.
- source_word: מֵבִישׁ
  english_pob_choice: brings shame to
  chosen_spanish: avergüenza a
  alternatives_spanish:
  - trae vergüenza a
  - causa vergüenza a
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar vergüenza o deshonra. 'Avergüenza a' es directo y conserva la fuerza causativa sin alargar la frase proverbial.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - a su madre
  - a la madre de él
  lexicon: HALOT
  rationale: El sufijo masculino singular queda naturalmente incluido en el antecedente 'el muchacho'. 'Su madre' es el español más idiomático y mantiene la referencia posesiva.
translation_notes:
  revision_awareness: Se revisó el problema previo de validación asegurando que cada marcador de nota aparezca exactamente en el texto español. Además, se alineó la elección léxica con el campo semántico del hebreo y con la solución auditada en inglés, evitando calcos innecesarios.
  spanish_consistency_notes:
  - Se prefirió ‘vara’ para שֵׁבֶט por su naturalidad bíblica en español y su referencia concreta a disciplina.
  - Se mantuvo el paralelismo entre disciplina física y corrección verbal con ‘vara y reprensión’.
  - Se evitó ‘SEÑOR’ o terminología teológica no presente en el versículo.
  - 'La estructura del proverbio respeta el contraste adversativo del hebreo: primera cola positiva y segunda cola negativa.'
