    issue: «porque santo es» suena forzado en español contemporáneo
    rationale: Aunque formalmente comprensible, la inversión predicativa es innecesariamente rígida y menos natural que «porque es santo», sin aportar fidelidad adicional al hebreo.
  - severity: low
