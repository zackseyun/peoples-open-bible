source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח שָׁא֣וּל מַלְאָכִים֮ לָ/קַ֣חַת אֶת דָּוִד֒ וַ/יַּ֗רְא אֶֽת לַהֲקַ֤ת הַ/נְּבִיאִים֙ נִבְּאִ֔ים וּ/שְׁמוּאֵ֕ל עֹמֵ֥ד נִצָּ֖ב עֲלֵי/הֶ֑ם וַ/תְּהִ֞י עַֽל מַלְאֲכֵ֤י שָׁאוּל֙ ר֣וּחַ אֱלֹהִ֔ים וַ/יִּֽתְנַבְּא֖וּ גַּם הֵֽמָּה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/019/020.yaml
  text: Then Saul sent messengers to seize David[a]. When they saw the company of prophets prophesying, with Samuel standing over them, the Spirit of God came upon Saul’s messengers[b], and they also prophesied.
  footnotes:
  - marker: a
    text: Or 'band of prophets.' The Hebrew term refers to a gathered group or company.
    reason: lexical_alternative
  - marker: b
    text: Or 'standing among them'; the Hebrew may also suggest Samuel was positioned over them in a leading or supervisory role.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: aab7b9df496d17887e83fed85aa58315b64da89619af3c8b56d63832db522183
    timestamp: '2026-04-19T09:34:43Z'
    output_hash: a1a18536016345aabec8284376ee1039fde5c5b0dd15c9b20fe63deb5b6eece4
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:11:16Z'
    unchanged: false
    changes_summary: Removed 'But' to better reflect the Hebrew sequence without adding contrast not explicit in the source. Otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: Entonces Saúl envió mensajeros para prender a David. Cuando vieron la compañía de profetas profetizando, con Samuel de pie sobre ellos[a], el Espíritu de Dios vino sobre los mensajeros de Saúl, y ellos también profetizaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de pie entre ellos'; el hebreo también puede sugerir que Samuel estaba colocado sobre ellos en un papel de dirección o supervisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים / מַלְאֲכֵי
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de seres humanos enviados por Saúl, no de ángeles. "Mensajeros" conserva con naturalidad ese valor y corresponde bien al uso contextual del hebreo.
- source_word: לָקַחַת
  english_pob_choice: to seize
  chosen_spanish: apoderarse de
  alternatives_spanish:
  - tomar
  - capturar
  - prender
  lexicon: HALOT
  rationale: 'El verbo básico es "tomar", pero aquí la misión es hostil: detener a David. "Apoderarse de" comunica la intención de captura sin introducir una interpretación ajena al texto.'
- source_word: לַהֲקַת הַנְּבִיאִים
  english_pob_choice: the company of prophets
  chosen_spanish: la compañía de profetas
  alternatives_spanish:
  - el grupo de profetas
  - la banda de profetas
  - la asamblea de profetas
  lexicon: HALOT
  rationale: La expresión señala un grupo reunido. "Compañía" mantiene el sentido colectivo y suena natural en español bíblico contemporáneo; "profetas" conserva el genitivo objetivo del hebreo.
- source_word: נִבְּאִים
  english_pob_choice: prophesying
  chosen_spanish: profetizando
  alternatives_spanish:
  - actuando como profetas
  - hablando proféticamente
  lexicon: HALOT
  rationale: Es un participio verbal que describe actividad en curso. "Profetizando" reproduce esa fuerza verbal y mantiene la repetición con el verbo final del versículo.
- source_word: עֹמֵד נִצָּב עֲלֵיהֶם
  english_pob_choice: standing over them
  chosen_spanish: de pie sobre ellos
  alternatives_spanish:
  - de pie entre ellos
  - de pie sobre ellos en posición de autoridad
  - de pie al frente de ellos
  lexicon: HALOT
  rationale: La combinación hebrea sugiere una posición fija y posiblemente supervisora de Samuel respecto del grupo. "De pie sobre ellos" preserva la relación espacial; en español, "de pie" hace más natural la imagen que un calco como "estando sobre ellos".
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - el espíritu de Dios
  lexicon: HALOT
  rationale: En este relato la expresión denota la acción poderosa y divina que impulsa a profetizar. "Espíritu" con mayúscula respeta el referente personal/divino que la tradición de traducción del POB ya reconoce aquí.
- source_word: וַתְּהִי עַל
  english_pob_choice: came upon
  chosen_spanish: vino sobre
  alternatives_spanish:
  - descendió sobre
  - fue sobre
  - llegó sobre
  lexicon: HALOT
  rationale: El hebreo expresa la irrupción de una influencia divina sobre el grupo. "Vino sobre" conserva el movimiento eventivo y suena bíblico sin perder claridad.
- source_word: וַיִּתְנַבְּאוּ גַּם הֵמָּה
  english_pob_choice: they also prophesied
  chosen_spanish: ellos también profetizaron
  alternatives_spanish:
  - también profetizaron
  - hasta ellos profetizaron
  lexicon: HALOT
  rationale: '"También" reproduce el énfasis de גַּם y deja claro que los mensajeros se sumaron inesperadamente a la actividad profética.'
theological_decisions:
- issue: Naturaleza de רוּחַ אֱלֹהִים en esta escena
  english_pob_reading: The Spirit of God came upon Saul’s messengers.
  chosen_spanish_reading: El Espíritu de Dios vino sobre los mensajeros de Saúl.
  alternative_spanish_readings:
  - Un espíritu de Dios vino sobre los mensajeros de Saúl.
  - El Espíritu de Dios cayó sobre los mensajeros de Saúl.
  rationale: La frase en Samuel describe una acción divina real y eficaz que provoca profecía. Mantener "Espíritu de Dios" conserva la lectura teológica fuerte del pasaje sin convertirla en una explicación doctrinal posterior; "vino sobre" sigue el dinamismo del hebreo.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Relación espacial de Samuel con el grupo
  english_pob_reading: with Samuel standing over them
  chosen_spanish_reading: con Samuel de pie sobre ellos
  alternative_spanish_readings:
  - con Samuel de pie entre ellos
  - con Samuel en posición de autoridad sobre ellos
  rationale: El hebreo puede expresar tanto ubicación física como una postura de liderazgo/supervisión. La formulación española preserva esa tensión sin cerrarla excesivamente; "sobre ellos" deja abierta la posibilidad de una relación jerárquica implícita.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB, que eliminó el contraste añadido por ''But'' para reflejar mejor la secuencia hebrea. También conserva las dos decisiones clave del audit trail: ''company of prophets'' como grupo reunido y ''came upon'' como llegada efectiva del Espíritu de Dios.'
  spanish_consistency_notes:
  - Se usó "Espíritu" con mayúscula por tratarse del referente divino en el contexto narrativo.
  - '"Profetizaron" mantiene la coherencia verbal con "profetizando" en la primera cláusula.'
  - No se introdujo "Señor" ni otra sustitución de Yahvé porque el versículo no contiene el nombre divino directo.
  - '"Mensajeros de Saúl" conserva la relación posesiva explícita del hebreo y del inglés auditado.'
