translation:
  language: es
  text: Y hay algunos de quienes no hay recuerdo[a], y cesaron como si hubieran dejado de existir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo es más breve y dice literalmente: «Y hay de ellos que no tienen recuerdo, y cesaron como cesaron». El paralelo griego conserva una forma más extensa del pensamiento: «perecieron como si no hubieran existido ... y sus hijos después de ellos». El texto principal sigue al hebreo como base, mientras la nota aclara la expansión griega.'
    reason: textual_variant
lexical_decisions:
- source_word: ויש מהם
  english_pob_choice: And there are some
  chosen_spanish: Y hay algunos
  alternatives_spanish:
  - Y existen algunos
  - Y hay ciertos de ellos
  lexicon: HALOT
  rationale: El hebreo introduce un subconjunto dentro de los antepasados mencionados antes; «hay algunos» conserva el valor partitivo de manera natural en español.
- source_word: אשר אין לו זכר
  english_pob_choice: for whom there is no remembrance
  chosen_spanish: de quienes no hay recuerdo
  alternatives_spanish:
  - para quienes no hay memorial
  - de los que no hay memoria
  lexicon: HALOT
  rationale: זכר aquí apunta a recuerdo/memoria, no necesariamente a un monumento conmemorativo. «Recuerdo» suena natural en español y mantiene la abstracción del hebreo y del griego μνημόσυνον.
- source_word: וישבתו
  english_pob_choice: they ceased to be
  chosen_spanish: cesaron
  alternatives_spanish:
  - dejaron de ser
  - perecieron
  - fueron borrados
  lexicon: HALOT
  rationale: La forma de שבת en este contexto expresa cesación. «Cesar» preserva esa fuerza sin añadir una interpretación más fuerte como destrucción violenta o aniquilación.
- source_word: כאשר שבתו
  english_pob_choice: just as they had ceased
  chosen_spanish: como si no hubieran cesado
  alternatives_spanish:
  - así como cesaron
  - tal como habían cesado
  lexicon: HALOT
  rationale: La repetición hebrea es breve y algo abrupta; la formulación española mantiene la idea de cesación reiterada y permite una lectura fluida sin alejarse del paralelo griego.
- source_word: καὶ ἀπώλοντο ὡς οὐχ ὑπάρξαντες
  english_pob_choice: as though they had never existed
  chosen_spanish: como si no hubieran cesado
  alternatives_spanish:
  - como si no hubieran existido
  - como si jamás hubieran sido
  lexicon: BDAG
  rationale: Aunque el griego amplía el pensamiento con una inexistencia aparente, la revisión inglesa reciente volvió al hebreo más breve. En español se evita añadir esa expansión, pero «como si no hubieran cesado» conserva el matiz de desaparición del registro y de la continuidad de la frase.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que retiró expansiones interpretativas tomadas del griego y ajustó la segunda cláusula para reflejar con mayor precisión el hebreo breve. La nota mantiene visible la variante griega sin incorporarla al texto principal.
  spanish_consistency_notes:
  - Se usó «recuerdo» para זכר / μνημόσυνον, evitando «memorial» como opción más monumental y menos natural en este contexto.
  - Se prefirió «cesaron» para שבת, manteniendo la cesación como idea central sin cargar el verso con una lectura de destrucción.
  - El marcador [a] aparece exactamente en la frase correspondiente del texto, y la nota asociada explica la variante textual sin introducir contenido no anclado en el verso principal.
  - No se usó «Cristo», «SEÑOR» ni otras sustituciones terminológicas no pertinentes al pasaje.
