translation:
  language: es
  text: Y tomará los dos cabríos y los pondrá delante de Yahvé[a], a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «delante de Yahvé». Se mantiene el nombre divino conforme a la convención del proyecto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: And he shall take
  chosen_spanish: Y tomará
  alternatives_spanish:
  - Y ha de tomar
  - Y deberá tomar
  lexicon: HALOT
  rationale: En español, el futuro simple comunica bien la instrucción ritual secuencial del hebreo en este contexto legal-litúrgico, sin sonar forzado.
- source_word: שְׁנֵי הַשְּׂעִירִם
  english_pob_choice: the two goats
  chosen_spanish: los dos machos cabríos
  alternatives_spanish:
  - los dos cabros
  - las dos cabras
  lexicon: HALOT
  rationale: שָׂעִיר se refiere a un macho cabrío; en español, «machos cabríos» preserva el rasgo masculino que el inglés POB explicó en su análisis lexical.
- source_word: וְהֶעֱמִיד אֹתָם
  english_pob_choice: and set them
  chosen_spanish: y los pondrá
  alternatives_spanish:
  - y los presentará
  - y los hará estar de pie
  lexicon: HALOT
  rationale: El hiphil de עמד implica hacer poner en pie o colocar/presentar. «Pondrá» mantiene la acción concreta y resulta natural en español, sin perder el matiz ritual de colocarlos ante alguien.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al estándar del proyecto, y «delante de» reproduce adecuadamente el sentido espacial-relacional de לִפְנֵי.
- source_word: פֶּתַח
  english_pob_choice: at the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - en la entrada de
  - junto a la entrada de
  lexicon: HALOT
  rationale: «Entrada» es la forma natural y fiel para פֶּתַח en este contexto de ubicación ritual.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» conserva el valor técnico del designador hebreo sin imponer la terminología eclesiástica tradicional de «tabernáculo» cuando el hebreo dice literalmente «tienda».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; por la norma del proyecto se traduce con el nombre divino «Yahvé», no con una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto hebreo y el aparato inglés están en alto acuerdo; no se requieren revisiones textuales ni cambios de sentido. La principal decisión auditada es la conservación de la forma del nombre divino y la traducción literal-natural de los dos machos cabríos colocados delante de Yahvé.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera coherente con la convención del proyecto.
  - Se prefirió «tienda de reunión» para mantener el término técnico del santuario.
  - «Machos cabríos» explicita el rasgo masculino incluido en שְׂעִירִם.
  - La nota al pie solo documenta la convención sobre el nombre divino, sin introducir una variante de sentido.
