    issue: «por un cambio de ánimo» para ἐκ μεταβολῆς
    rationale: En contexto se trata de reversión de decisión o cambio de parecer, no de estado anímico. «Ánimo» en español puede sugerir humor, disposición emocional o aliento, y desvía el sentido administrativo/político del pasaje.
  - severity: medium
    issue: «en el asunto de ahora» para ἐπὶ τῶν πραγμάτων
    rationale: La frase es comprensible, pero suena poco idiomática en español. El griego apunta al caso presente o al asunto en cuestión; «en este asunto» o «en el asunto presente» conserva mejor el sentido con mejor naturalidad.
  - severity: low
