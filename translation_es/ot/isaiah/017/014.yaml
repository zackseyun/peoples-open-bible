translation:
  language: es
  text: Al atardecer, he aquí, terror; antes de la mañana, ya no está[a]. Esta es la porción de los que nos saquean, y la suerte de los que nos despojan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no existe». La expresión hebrea puede referirse al enemigo como un colectivo personificado o, más impersonalmente, a la amenaza o al ejército.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְעֵת עֶרֶב
  english_pob_choice: At evening time
  chosen_spanish: Al atardecer
  alternatives_spanish:
  - En el tiempo de la tarde
  - Por la tarde
  lexicon: HALOT
  rationale: La construcción temporal con לְעֵת pide un marco de tiempo; עֶרֶב es 'atardecer/tarde'. 'Al atardecer' conserva la marca temporal y suena natural en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mirad
  lexicon: HALOT
  rationale: הִנֵּה introduce una exclamación deíctica y de sorpresa. 'He aquí' mantiene ese valor enfático y un registro digno, equivalente al 'behold' revisado en inglés.
- source_word: בַלָּהָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - espanto
  - pánico
  - horror
  lexicon: HALOT
  rationale: El sustantivo expresa pavor repentino o consternación. 'Terror' reproduce bien la fuerza abrupta del contexto de juicio.
- source_word: בְּטֶרֶם בֹּקֶר
  english_pob_choice: Before morning
  chosen_spanish: antes de la mañana
  alternatives_spanish:
  - antes del amanecer
  - antes del alba
  lexicon: HALOT
  rationale: בְּטֶרֶם significa 'antes de' y בֹקֶר es 'mañana'. 'Antes de la mañana' sigue de cerca el hebreo sin añadir una precisión interpretativa mayor que el texto.
- source_word: אֵינֶנּוּ
  english_pob_choice: he is no more
  chosen_spanish: ya no existe
  alternatives_spanish:
  - ya no está
  - no hay más de él
  - ya no es
  lexicon: HALOT
  rationale: El hebreo permite una referencia singular personal o más impersonal/colectiva. 'Ya no existe' mantiene la desaparición total sin forzar en español la personificación masculina, dejando abierta la tensión documentada en el audit trail.
- source_word: חֵלֶק
  english_pob_choice: the portion
  chosen_spanish: la porción
  alternatives_spanish:
  - la parte
  - la herencia
  - la suerte
  lexicon: HALOT
  rationale: חֵלֶק significa literalmente 'porción/parte'. 'La porción' preserva la imagen léxica y la paralela con 'suerte' en la segunda cola.
- source_word: שׁוֹסֵינוּ
  english_pob_choice: those who plunder us
  chosen_spanish: de los que nos saquean
  alternatives_spanish:
  - de nuestros saqueadores
  - de los que nos despojan
  lexicon: HALOT
  rationale: El participio verbal expresa a quienes nos saquean o despojan. 'Saquean' es un equivalente vivo y preciso para la acción de robar por la fuerza.
- source_word: וְגוֹרָל
  english_pob_choice: and the lot
  chosen_spanish: y la suerte
  alternatives_spanish:
  - y el lote
  - y el destino
  - y la porción asignada
  lexicon: HALOT
  rationale: גוֹרָל es literalmente 'suerte/lote' y por extensión el destino asignado. 'Suerte' conserva la imagen de asignación por sorteo y funciona bien en paralelo con 'porción'.
- source_word: לְבֹזְזֵינוּ
  english_pob_choice: of those who loot us
  chosen_spanish: de los que nos despojan
  alternatives_spanish:
  - de los que nos saquean
  - de nuestros despojadores
  - para los que nos despojan
  lexicon: HALOT
  rationale: בזז denota tomar botín o despojar. 'Despojan' es preciso y, junto con 'saquean', mantiene la pareja semántica del paralelismo hebreo.
theological_decisions:
- issue: Referente de אֵינֶנּוּ (singular vs. colectivo/impersonal)
  english_pob_reading: '''he is no more,'' referring to the enemy power as a collective singular/personified foe.'
  chosen_spanish_reading: '''ya no existe'', sin especificar un sujeto masculino singular'
  alternative_spanish_readings:
  - '''ya no está'''
  - '''ya no es más'''
  - '''él ya no existe'''
  rationale: El hebreo admite tanto una lectura personificada como una más impersonal/colectiva. En español, 'ya no existe' conserva la brusca desaparición sin cerrar indebidamente la ambigüedad documentada en el texto y el aparato inglés.
  doctrine_reference: Mantener la tensión interpretativa donde el hebreo no la resuelve explícitamente.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'look' por 'behold' para reflejar mejor el registro de הִנֵּה; la presente redacción sigue ese ajuste con 'he aquí'. También se preservó la ambigüedad de אֵינֶנּוּ sin resolverla en exceso.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''He aquí'' conserva el valor deíctico y solemne de הִנֵּה sin recurrir a calco áspero.'
  - '''Porción'' y ''suerte'' reproducen el paralelismo léxico entre חֵלֶק y גוֹרָל.'
  - '''Saquean'' y ''despojan'' distinguen los dos verbos hebreos relacionados con pillaje y botín.'
