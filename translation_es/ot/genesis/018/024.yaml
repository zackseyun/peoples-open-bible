translation:
  language: es
  text: Supón[a] que hay cincuenta justos dentro de la ciudad[c]. ¿De veras la barrerás y no la perdonarás[b], por causa de los cincuenta justos que están en ella?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quizá hay cincuenta justos dentro de la ciudad»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no la ahorrarás»; también, «y no perdonarás el lugar».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que están en ella».'
    reason: previous_rendering
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Suppose
  chosen_spanish: Supón
  alternatives_spanish:
  - Quizá
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: Expresa la apertura hipotética de la súplica de Abraham. En español, la forma imperativa de 'suponer' comunica con naturalidad el valor condicional/hipotético que POB vio en 'Suppose'.
- source_word: יֵשׁ
  english_pob_choice: there are
  chosen_spanish: hay
  alternatives_spanish:
  - existen
  - hay quizás
  lexicon: HALOT
  rationale: Es la construcción existencial natural en español para 'there are' y conserva el valor simple de existencia.
- source_word: חֲמִשִּׁים צַדִּיקִם
  english_pob_choice: fifty righteous people
  chosen_spanish: cincuenta justos
  alternatives_spanish:
  - cincuenta personas justas
  - cincuenta hombres justos
  lexicon: HALOT
  rationale: צַדִּיקִים designa personas justas sin marcar varón; 'justos' preserva la referencia general sin añadir 'personas' de forma innecesaria.
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: within the city
  chosen_spanish: dentro de la ciudad
  alternatives_spanish:
  - en medio de la ciudad
  - dentro de la urbe
  lexicon: HALOT
  rationale: '''Dentro de la ciudad'' reproduce bien la localización interna y resulta natural en español; mantiene el sentido espacial de בתוך.'
- source_word: הַאַף
  english_pob_choice: indeed
  chosen_spanish: ¿De veras
  alternatives_spanish:
  - ¿Realmente
  - ¿Acaso
  lexicon: HALOT
  rationale: La partícula intensifica la pregunta retórica. '¿De veras' expresa bien la fuerza enfática sin volver la frase artificial.
- source_word: תִּסְפֶּה
  english_pob_choice: sweep it away
  chosen_spanish: barrerás
  alternatives_spanish:
  - arrasarás
  - destruirás por completo
  lexicon: HALOT
  rationale: En este contexto de juicio, ספָה tiene la imagen de barrer/consumir. 'Barrerás' conserva el color metafórico y el efecto de destrucción total.
- source_word: וְלֹא תִשָּׂא לַמָּקוֹם
  english_pob_choice: and not spare the place
  chosen_spanish: y no perdonarás el lugar
  alternatives_spanish:
  - y no perdonarás a la ciudad
  - y no dejarás al lugar
  lexicon: HALOT
  rationale: POB documentó también la alternativa 'forgive the place' para נשא. En español, 'perdonar' mantiene esa tensión lexical y refleja la posibilidad de leer el verbo como no conceder clemencia, sin borrar el matiz judicial.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - a favor de
  lexicon: HALOT
  rationale: Equivale bien al valor motivacional de לְמַעַן y suena idiomático en español bíblico sin ser arcaizante en exceso.
- source_word: אֲשֶׁר בְּקִרְבָּהּ
  english_pob_choice: who are within it
  chosen_spanish: que están en ella
  alternatives_spanish:
  - que están dentro de ella
  - que están en medio de ella
  lexicon: HALOT
  rationale: Preserva la cláusula relativa explícita del hebreo y la referencia de la ciudad con concordancia natural en español. 'En ella' evita repetir 'ciudad' y mantiene la relación locativa.
theological_decisions:
- issue: Valor de תִשָּׂא en la cláusula negativa
  english_pob_reading: and not spare the place
  chosen_spanish_reading: y no perdonarás el lugar
  alternative_spanish_readings:
  - y no ahorrarás el lugar
  - y no dejarás al lugar
  rationale: El contexto inmediato contrapone destruir/arrasar con abstenerse de hacerlo por causa de los justos. 'Perdonar' conserva la alternativa interpretativa documentada por POB ('forgive the place') sin imponer una doctrina específica de absolución moral; comunica clemencia judicial en el marco narrativo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente hizo explícita la cláusula relativa ('who are within it') sin cambiar el sentido. La versión española refleja esa explicitud con 'que están en ella', manteniendo el grado de formalidad y la relación sintáctica del hebreo. También se atendió la tensión lexical de נשא en contexto de juicio, donde POB permitió 'spare' y su alternativa 'forgive'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto cuando el hebreo lo requiera, pero este versículo no contiene el Tetragrámaton.
  - '''Justos'' se usa como término general de personas justas; no se restringe a varones.'
  - Se conserva la cláusula relativa explícita para reflejar el hebreo y el audit trail inglés.
