  - severity: medium
    issue: ‘te acariciaban’ suaviza la explicitud sexual del original
    rationale: El inglés auditado optó por ‘fondled’ precisamente para reforzar la carga erótica. En español, ‘acariciar’ puede sonar demasiado tierno o neutral; ‘te manoseaban los pechos’ preserva mejor la crudeza sexual del pasaje y coincide con la nota existente.
  - severity: low
    issue: El artículo en ‘los pechos’ funciona, pero ‘tus pechos’ encaja mejor con la sintaxis directa
    rationale: Dado que el hebreo tiene sufijo posesivo explícito, ‘tus pechos’ suena más directo y natural en español dentro de esta cláusula.
  revised_spanish_text: Así volviste a la lascivia[a] de tu juventud, cuando en Egipto te manoseaban[b][c] tus pechos, los pechos de tu juventud.
