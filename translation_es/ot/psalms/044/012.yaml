    rationale: 'El texto ancla «Nos entregas[a]», pero la nota dice «También: “Nos entregas”». Esto incumple la función de una nota de alternativa léxica y puede confundir al lector/editor.'
  - severity: low
    issue: «Para alimento» suena menos natural en español que «como alimento» en este contexto metafórico.
    rationale: Ambas opciones son fieles, pero «como alimento» expresa de forma más idiomática la idea de presa destinada a ser consumida, sin introducir «matanza» ni otra intensificación no presente en מַאֲכָל.
  revised_spanish_text: Nos entregas[a] como ovejas como alimento, y entre las naciones nos has dispersado.
