revisions:
- from: 'Y los hijos de Gomer: Askenaz[a], Rifat y Togarma.'
  to: 'Y los hijos de Gomer: Ashkenaz[a], Rifat y Togarmá.'
  rationale: 'Se mantiene la estructura genealógica y la nota textual del borrador, pero se corrigen dos nombres propios para una transliteración más fiel y reconocible: «Ashkenaz» en lugar de «Askenaz», siguiendo más de cerca el nombre auditado, y «Togarmá» en lugar de «Togarma», para reflejar mejor la pronunciación y forma del hebreo. No se requieren cambios doctrinales ni estructurales.'
