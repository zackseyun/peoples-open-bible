translation:
  language: es
  text: 'y el plano de todo lo que estaba en el Espíritu con él: para los atrios de la casa de Yahvé[a], para todas las cámaras circundantes, para las tesorerías de la casa de Dios y para las tesorerías de las cosas santas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que estaba en su espíritu con él», es decir, lo que estaba en la mente o el corazón de David.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַבְנִית
  english_pob_choice: plan
  chosen_spanish: diseño
  alternatives_spanish:
  - plan
  - patrón
  lexicon: HALOT
  rationale: En este contexto arquitectónico, תַבְנִית expresa la configuración o disposición proyectada. 'Diseño' suena natural en español y conserva la idea de una forma concebida de antemano sin forzar un tecnicismo.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo aquello que
  - cuanto
  lexicon: HALOT
  rationale: La construcción hebrea acumula el sentido de totalidad. 'Todo lo que' reproduce esa amplitud en español con buena fluidez.
- source_word: הָיָה בָרוּחַ עִמּוֹ
  english_pob_choice: was in the Spirit with him
  chosen_spanish: estaba en el Espíritu con él
  alternatives_spanish:
  - estaba en su espíritu con él
  - estaba en su mente con él
  - le había sido dado por el Espíritu
  lexicon: HALOT
  rationale: Se conserva la lectura del POB en inglés, manteniendo 'Espíritu' con mayúscula para reflejar la probable referencia al Espíritu divino. La formulación deja abierta la tensión documentada con la lectura antropológica sin resolverla por paráfrasis.
- source_word: לְחַצְרוֹת
  english_pob_choice: for the courts
  chosen_spanish: para los atrios
  alternatives_spanish:
  - para los patios
  - para los recintos
  lexicon: HALOT
  rationale: En contexto del templo, 'atrios' es el equivalente español más claro y usual para las áreas exteriores/recintos sagrados.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: YHWH se vierte como ''Yahvé''. ''Casa'' conserva la forma hebrea y su sentido cultual.'
- source_word: לְּשָׁכוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - dependencias
  - salas
  lexicon: HALOT
  rationale: '''Cámaras'' es una solución natural en español bíblico para los cuartos o dependencias del templo, sin perder la referencia arquitectónica.'
- source_word: סָבִיב
  english_pob_choice: surrounding
  chosen_spanish: alrededor
  alternatives_spanish:
  - circundantes
  - en torno
  lexicon: HALOT
  rationale: El adverbio modifica a las cámaras y expresa su distribución perimetral. 'Alrededor' es la opción más transparente en español.
- source_word: אֹצְרוֹת
  english_pob_choice: treasuries
  chosen_spanish: tesoros
  alternatives_spanish:
  - almacenes
  - depósitos
  - tesorerías
  lexicon: HALOT
  rationale: En español, 'tesoros' puede sonar menos técnico que 'tesorerías', pero mantiene bien la función de depósito valioso y se ajusta al paralelismo del verso. Se evita sobreespecificar como almacenes.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea 'casa de Dios' para mantener el paralelismo con 'casa de Yahvé' y la estructura del texto.
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - los objetos santos
  lexicon: HALOT
  rationale: La pluralidad hebrea apunta a objetos o bienes consagrados. 'Las cosas santas' es fiel, sobrio y suficientemente amplio para el contexto del tesoro del templo.
theological_decisions:
- issue: Sentido de בָרוּחַ עִמּוֹ
  english_pob_reading: 'reference to the divine Spirit: ''was in the Spirit with him'''
  chosen_spanish_reading: 'referencia al Espíritu divino: ''estaba en el Espíritu con él'''
  alternative_spanish_readings:
  - 'referencia al propio espíritu/mente de David: ''estaba en su espíritu con él'''
  rationale: El contexto inmediato y cercano habla de los planos del templo como algo entendido o mostrado por Yahvé, por lo que la lectura pneumatológica se mantiene. A la vez, el español conserva la ambigüedad documental sin eliminar la opción antropológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se introducen cambios respecto de la última revisión inglesa; la redacción española sigue el mismo estado textual y conserva la tensión interpretativa documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al criterio del proyecto.
  - Se conserva mayúscula en Espíritu por la lectura divinal documentada.
  - Se evita 'Señor' como sustituto de Yahvé.
  - '''Casa de Dios'' y ''casa de Yahvé'' reproducen el paralelismo del hebreo.'
  - '''Atrios'', ''cámaras'' y ''tesoros'' mantienen el campo semántico arquitectónico-templario.'
