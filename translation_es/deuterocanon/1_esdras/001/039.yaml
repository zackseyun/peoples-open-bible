translation:
  language: es
  text: Y Nabucodonosor tomó algunos[a] de los vasos sagrados del Señor y se los llevó y los depositó en su templo en Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los vasos sagrados del Señor». El griego también puede leerse más literalmente como «de entre los vasos sagrados del Señor», pero el sentido probable es partitivo: tomó algunos de ellos, no todos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: some of
  chosen_spanish: algunos de
  alternatives_spanish:
  - de
  - desde entre
  lexicon: LSJ
  rationale: 'El griego con genitivo expresa fuerza partitiva: Nabucodonosor tomó una parte de los vasos, no necesariamente todos. «Algunos de» transmite esa lectura de forma natural en español y evita un literalismo que podría sugerir procedencia espacial más que selección parcial.'
- source_word: ἱερῶν σκευῶν
  english_pob_choice: sacred vessels
  chosen_spanish: vasos sagrados
  alternatives_spanish:
  - vasos sagrados del templo
  - vasos santos
  lexicon: LSJ
  rationale: σκεύη se refiere a recipientes/utensilios/vasos de uso cultual; «vasos» conserva el tipo de objeto, y «sagrados» comunica su consagración. «Sagrados» resulta más natural que «santos» en español para objetos rituales y mantiene el registro formal del original.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - pertenecientes al Señor
  lexicon: LSJ
  rationale: Aquí el texto griego usa κύριος. En el español POB, la convención para κύριος en este tipo de contexto es «Señor». No se introduce «Yahvé» porque el testimonio inmediato es griego y el audit trail inglés conserva «Lord», no una transcripción del nombre divino.
- source_word: λαβὼν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - habiendo tomado
  - recibió
  lexicon: LSJ
  rationale: El participio se integra de manera fluida con un verbo finito en español narrativo. «Tomó» preserva la secuencia sin forzar un gerundio o participio absoluto poco natural.
- source_word: ἀπενέγκας
  english_pob_choice: carried them away
  chosen_spanish: se los llevó
  alternatives_spanish:
  - los llevó lejos
  - los transportó
  lexicon: LSJ
  rationale: El compuesto indica llevar fuera/retirar con los objetos consigo. «Se los llevó» expresa de forma idiomática el traslado posesivo y la apropiación del objeto; además evita redundancia con «tomó».
- source_word: ἀπηνείσατο
  english_pob_choice: deposited
  chosen_spanish: depositó
  alternatives_spanish:
  - colocó
  - puso
  lexicon: LSJ
  rationale: El verbo comunica la acción de poner/ubicar los vasos en un lugar destinado a guardarlos. «Depositó» conserva el matiz formal de colocación de objetos sagrados capturados y corresponde bien al registro del pasaje.
- source_word: ἐν τῷ ναῷ αὐτοῦ
  english_pob_choice: in his temple
  chosen_spanish: en su templo
  alternatives_spanish:
  - en su santuario
  - en su casa
  lexicon: LSJ
  rationale: ναός aquí se refiere al templo de Nabucodonosor en Babilonia. «Templo» es la correspondencia más clara y respetuosa con el ámbito cultual del contexto.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilonia la Grande
  lexicon: LSJ
  rationale: Nombre propio estándar en español bíblico y geográfico. No se amplía ni interpreta el topónimo.
theological_decisions:
- issue: Tratamiento de κύριος en un relato histórico deuterocanónico griego
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El griego usa κύριος en un contexto de posesión cultual. En este versículo, el español natural y el criterio POB para κύριος favorecen «Señor». Aunque la colección POB usa «Yahvé» para el hebreo יְהוָה, aquí la base inmediata es griega y la forma auditada en inglés es «Lord», por lo que no se desplaza el término a una transcripción del nombre divino.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord/Señor; יְהוָה → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de «holy vessels» a «sacred vessels» para reflejar mejor ἱερῶν y su registro formal. La versión española sigue esa misma dirección con «vasos sagrados». También se evitó un calco excesivo del participio griego, optando por una narración española fluida que mantiene la secuencia: tomó, se los llevó, depositó.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en continuidad con el uso POB para el griego cuando no se trata de una representación explícita del tetragrámaton hebreo.
  - «Vasos sagrados» conserva el valor cultual de σκεύη ἱερά sin introducir terminología eclesiástica ajena al contexto.
  - La puntuación final con nota al pie refleja la alternativa partitiva documentada en el audit trail inglés.
