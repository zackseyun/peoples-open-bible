id: 1CH.24.31
reference: 1 Chronicles 24:31
source:
  edition: WLC
  text: וַ/יַּפִּילוּ֩ גַם הֵ֨ם גּוֹרָל֜וֹת לְ/עֻמַּ֣ת אֲחֵי/הֶ֣ם בְּנֵֽי אַהֲרֹ֗ן לִ/פְנֵ֨י דָוִ֤יד הַ/מֶּ֨לֶךְ֙ וְ/צָד֣וֹק וַ/אֲחִימֶ֔לֶךְ וְ/רָאשֵׁי֙ הָֽ/אָב֔וֹת לַ/כֹּהֲנִ֖ים וְ/לַ/לְוִיִּ֑ם אָב֣וֹת הָ/רֹ֔אשׁ לְ/עֻמַּ֖ת אָחִ֥י/ו הַ/קָּטָֽן־׀־׃ס
translation:
  text: These also cast lots alongside their brothers[a], the sons of Aaron, before King David, Zadok, Ahimelech[b], and the heads of the fathers’ houses of the priests and of the Levites—the chief fathers’ houses as well as those of their younger brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corresponding to their brothers, the sons of Aaron.' The Hebrew expression can denote standing opposite, corresponding to, or alongside.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the chief fathers’ houses corresponding to his younger brother.' The singular forms are likely distributive, expressing that the principal family branches and the lesser/junior branches were treated alike in the casting of lots.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפִּילוּ ... גּוֹרָלוֹת
  chosen: cast lots
  alternatives:
  - caused lots to fall
  - threw lots
  lexicon: HALOT
  rationale: The idiom נפל + גורלות means to cast lots. 'Cast lots' is standard, natural English and preserves the procedural sense without woodenly reproducing the causative form.
- source_word: גַם הֵם
  chosen: These also
  alternatives:
  - They also
  - Even they
  lexicon: HALOT
  rationale: Refers back to the Levitical groups just discussed and marks that they too participated in lot-casting. 'These also' fits the discourse flow and points to the immediately preceding referents.
- source_word: לְעֻמַּת אֲחֵיהֶם בְּנֵי אַהֲרֹן
  chosen: alongside their brothers, the sons of Aaron
  alternatives:
  - corresponding to their brothers, the sons of Aaron
  - opposite their brothers, the sons of Aaron
  lexicon: HALOT
  rationale: לְעֻמַּת can mean 'opposite, corresponding to, alongside.' In this administrative context of matching Levitical divisions with priestly ones, 'alongside' communicates parallel standing without over-specifying a technical arrangement.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: A straightforward rendering indicating the public, official setting of the lot-casting.
- source_word: דָוִיד הַמֶּלֶךְ
  chosen: King David
  alternatives:
  - David the king
  lexicon: HALOT
  rationale: English title-name order is more natural while preserving the royal designation.
- source_word: וְצָדוֹק וַאֲחִימֶלֶךְ
  chosen: Zadok, Ahimelech
  alternatives:
  - Zadok and Ahimelech
  lexicon: HALOT
  rationale: Names are transliterated per philosophy. Comma coordination works naturally in the witness list following 'before.'
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the chiefs of the families
  lexicon: HALOT
  rationale: This phrase denotes clan leaders. 'Fathers’ houses' preserves the Hebrew social structure more closely than the flatter 'families,' while remaining understandable.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: of the priests and of the Levites
  alternatives:
  - for the priests and the Levites
  - belonging to the priests and the Levites
  lexicon: HALOT
  rationale: The phrase identifies the groups whose fathers' houses are in view. 'Of' is the most natural relational rendering in English here.
- source_word: אָבוֹת הָרֹאשׁ
  chosen: the chief fathers’ houses
  alternatives:
  - the chief fathers
  - the head ancestral houses
  lexicon: HALOT
  rationale: Though literally 'the father-houses, the chief,' the sense is the principal clan units. Rendering the phrase as 'the chief fathers’ houses' keeps the institutional focus rather than shifting to individuals alone.
- source_word: לְעֻמַּת אָחִיו הַקָּטָן
  chosen: as well as those of their younger brothers
  alternatives:
  - corresponding to his younger brother
  - equally with his younger brother
  - one like his younger brother
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat elliptical. In context it expresses parity between senior and junior family branches in the lot-casting process. Because English requires expansion, 'as well as those of their younger brothers' conveys that both major and lesser branches were included. The singular suffix is taken distributively.
