    text: O «los israelitas dijeron».
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula penal final para reflejar el sentido judicial pasivo de מוֹת יוּמָת y alinearla con la evidencia fuente y el razonamiento léxico documentado por el POB. También se elimina la nota [b] por redundante e injustificada en español, conservando solo la alternativa útil para 'los hijos de Israel'.
