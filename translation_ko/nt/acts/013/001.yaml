  text: 안디옥에 있는 교회에는 예언자들과 교사들이 있었으니, 바나바와, 니게르라 하는 시므온과, 키레네 사람 루기오와, 분봉왕 헤롯의 어릴 적 친구 마나엔과, 그리고 사울이었습니다.
