    rationale: El hebreo מקדש es comprimido y el POB inglés eligió 'from the sacred offering', no un término tan específico como 'sacrificio'. 'Ofrenda sagrada' preserva mejor la cautela léxica documentada y sigue siendo natural en español.
  - severity: medium
    issue: La nota b describe de forma imprecisa el aporte del griego
    rationale: El griego no dice que sea 'una ofrenda/sacrificio separado'; más bien hace más explícito el marco sacrificial ('ofrenda de bienestar/comunión') y la separación en la segunda mitad. La nota debe reflejar eso con precisión.
  - severity: low
    issue: La nota a ofrece 'sebo' como alternativa técnica, pero no es necesario enfatizarla tanto
    rationale: No es un error, pero en español bíblico general 'grasa' basta. Puede mantenerse una nota breve, siempre que no distraiga del sentido principal.
  revised_spanish_text: Como la grasa[a] separada de la ofrenda sagrada[b], así fue David de entre los hijos de Israel.
