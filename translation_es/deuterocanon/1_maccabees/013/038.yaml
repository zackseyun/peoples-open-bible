translation:
  language: es
  text: Y todo lo que establecimos con ustedes queda firme[a], y las fortalezas que construyeron serán suyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «permanece en vigor». El griego deja implícito el objeto de «establecimos»; por eso el español conserva una formulación amplia sin añadir «acuerdos» explícitamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσα
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - lo que
  - cuanto
  lexicon: LSJ
  rationale: El griego neutro plural ὅσα funciona de manera amplia como 'todo lo que / cuanto'. En español, 'todo lo que' conserva esa amplitud sin añadir un sustantivo explícito que el texto no da.
- source_word: ἐστήσαμεν
  english_pob_choice: we established
  chosen_spanish: establecimos
  alternatives_spanish:
  - pusimos en vigor
  - fijamos
  - acordamos
  lexicon: LSJ
  rationale: El aoristo de ἵστημι puede aludir a poner algo en firme o establecerlo. 'Establecimos' mantiene el matiz formal y administrativo del contexto sin introducir un sustantivo no expresado en griego.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - para ustedes
  - hacia ustedes
  lexicon: LSJ
  rationale: En este contexto relacional y diplomático, πρὸς con personas expresa la relación entre dos partes. 'Con ustedes' es la formulación natural en español.
- source_word: ἔστηκεν
  english_pob_choice: stands
  chosen_spanish: queda firme
  alternatives_spanish:
  - permanece en vigor
  - está en pie
  - permanece
  lexicon: LSJ
  rationale: El perfecto de ἵστημι señala permanencia o continuidad de validez. 'Queda firme' conserva la imagen de algo fijado y vigente, sin forzar una paráfrasis demasiado interpretativa.
- source_word: ὀχυρώματα
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortificaciones
  - plazas fuertes
  - castillos
  lexicon: LSJ
  rationale: ὀχυρώματα designa obras fortificadas. 'Fortalezas' es un equivalente claro y sobrio en español, compatible con el rango semántico del término.
- source_word: ᾠκοδομήσατε
  english_pob_choice: you built
  chosen_spanish: construyeron
  alternatives_spanish:
  - edificaron
  - edificaron y fortificaron
  - levantaron
  lexicon: LSJ
  rationale: El verbo significa 'construir/edificar'. Como el griego no añade explícitamente 'fortificar', 'construyeron' evita sobretraducir y se ajusta al objeto ya descrito como fortificaciones.
- source_word: ὑπαρχέτω ὑμῖν
  english_pob_choice: shall remain yours
  chosen_spanish: quedarán para ustedes
  alternatives_spanish:
  - serán de ustedes
  - les pertenecerán
  - quedarán como suyos
  lexicon: LSJ
  rationale: La forma expresa continuación de posesión o pertenencia. 'Quedarán para ustedes' comunica continuidad y propiedad sin elevar el registro a una fórmula más pesada.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que retiró la explicitación de 'agreements' por no estar en el griego, y conserva el tono formal y diplomático del texto.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural en forma respetuosa ('ustedes').
  - No se introduce 'Mesías', 'Yahvé' ni terminología teológica ajena porque el versículo es diplomático y no contiene esos términos.
  - '''Fortalezas'' se usa como equivalente natural de ὀχυρώματα sin precisar más de lo que el griego indica.'
