review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: תְּהוֹם...תְּהוֹם = imagen poética de profundidades; קוֹרֵא = presente vívido; לְקוֹל = marco auditivo; צִנּוֹרֶיךָ = cascadas/cataratas; מִשְׁבָּרֶיךָ וְגַלֶּיךָ = dos términos acuáticos coordinados; עָלַי עָבָרוּ = aguas que pasan por encima del salmista. Sin embargo, la formulación española de la segunda cola repite ''olas'' de forma torpe y no refleja con suficiente distinción la pareja ''breakers / waves''.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero necesita un ajuste de naturalidad y precisión léxica: ''todas tus olas rompientes y tus olas'' suena redundante y poco elegante. ''Tus rompientes y tus olas'' conserva mejor el paralelismo. Además, una nota contiene el anglicismo incorrecto ''aguaspouts'', impropio en español. Conviene repararlo a ''mangas de agua'' si se quiere preservar la alternativa tradicional equivalente a ''waterspouts''.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: ''cascadas'' para צִנּוֹרֶיךָ es defendible y natural; ''lo profundo'' es posible aunque algo menos idiomático que ''abismo''. La revisión propuesta mantiene la elección base del borrador y mejora la legibilidad sin apartarse del audit trail inglés.'
  issues:
  - severity: medium
    issue: Redundancia y falta de distinción en 'todas tus olas rompientes y tus olas'
    rationale: El hebreo usa dos términos distintos, מִשְׁבָּרֶיךָ y גַלֶּיךָ. La redacción actual suena repetitiva en español y debilita el paralelismo poético. 'Tus rompientes y tus olas' distingue mejor ambos términos.
  - severity: medium
    issue: Nota al pie con anglicismo erróneo 'aguaspouts'
    rationale: La nota debe ser español natural y fiel al audit trail. 'Aguaspouts' no es español; la alternativa adecuada para older English 'waterspouts' sería 'mangas de agua', aunque en este contexto conviene presentarla solo como alternativa léxica tradicional.
  - severity: low
    issue: La nota [b] actual no añade una alternativa realmente distinta al texto base
    rationale: Si el texto revisado usa 'rompientes', la variante útil es 'olas rompientes' o 'han barrido sobre mí', reflejando mejor la nota inglesa sobre una formulación alternativa.
  revised_spanish_text: Lo profundo llama a lo profundo al sonido de tus cascadas[a]; todas tus rompientes y tus olas han pasado sobre mí[b].
