translation:
  language: es
  text: 'Mientras todavía estaba hablando[a], llegó alguien de parte del dirigente de la sinagoga, diciendo: «Tu hija ha muerto; no molestes más al maestro[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mientras él todavía estaba hablando».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no molestes más al maestro» también puede expresarse como «no sigas molestando al maestro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι αὐτοῦ λαλοῦντος
  english_pob_choice: While he was still speaking
  chosen_spanish: Mientras todavía estaba hablando
  alternatives_spanish:
  - Mientras aún hablaba
  - Cuando todavía hablaba
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción simultánea; «mientras» conserva la simultaneidad y «todavía» reproduce ἔτι sin endurecer el español.
- source_word: ἔρχεταί τις
  english_pob_choice: someone came
  chosen_spanish: llegó uno
  alternatives_spanish:
  - vino alguien
  - llegó alguien
  lexicon: BDAG
  rationale: El presente histórico se vierte naturalmente en pasado narrativo en español. El indefinido τις puede expresarse como «uno» o «alguien»; aquí «uno» mantiene la indefinición con sobriedad narrativa.
- source_word: παρὰ τοῦ ἀρχισυναγώγου
  english_pob_choice: from the synagogue leader
  chosen_spanish: desde parte del dirigente de la sinagoga
  alternatives_spanish:
  - de parte del dirigente de la sinagoga
  - desde el dirigente de la sinagoga
  - del dirigente de la sinagoga
  lexicon: BDAG
  rationale: παρά con genitivo marca procedencia/fuente. «Desde parte de» explicita que el mensajero viene con autorización o desde la esfera del dirigente, sin convertir la frase en un simple genitivo posesivo.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio presente introduce la cita; «diciendo» conserva la relación verbal sin añadir una subordinación innecesaria.
- source_word: Τέθνηκεν
  english_pob_choice: has died
  chosen_spanish: ha muerto
  alternatives_spanish:
  - ha fallecido
  - está muerta
  lexicon: BDAG
  rationale: El perfecto expresa un hecho consumado con resultado presente; «ha muerto» mantiene ese valor mejor que un simple pretérito o un estado estático.
- source_word: ἡ θυγάτηρ σου
  english_pob_choice: Your daughter
  chosen_spanish: Tu hija
  alternatives_spanish:
  - Su hija
  lexicon: BDAG
  rationale: Traducción directa del sujeto con posesivo de segunda persona. Se conserva la proximidad del mensaje.
- source_word: μηκέτι
  english_pob_choice: any longer
  chosen_spanish: no sigas
  alternatives_spanish:
  - ya no
  - no más
  lexicon: BDAG
  rationale: El adverbio restringe la prohibición a partir de este punto; «no sigas» integra bien la idea de cese en español, aunque «ya no» también es posible.
- source_word: σκύλλε
  english_pob_choice: do not trouble
  chosen_spanish: molestando
  alternatives_spanish:
  - perturbando
  - incomodando
  - molestes
  lexicon: BDAG
  rationale: σκύλλω puede significar molestar, incomodar o causar dificultad. Se eligió una forma verbal que suena natural en la prohibición española y conserva el tono respetuoso del aviso.
- source_word: τὸν διδάσκαλον
  english_pob_choice: the teacher
  chosen_spanish: al maestro
  alternatives_spanish:
  - al maestro
  - al maestro/doctor
  lexicon: BDAG
  rationale: διδάσκαλος se vierte por su sentido ordinario. «Maestro» es idiomático en español bíblico y evita el calco demasiado literal de «el profesor».
theological_decisions:
- issue: Rendering of ἀρχισυνάγωγος in relation to Jairus
  english_pob_reading: the synagogue leader
  chosen_spanish_reading: el dirigente de la sinagoga
  alternative_spanish_readings:
  - el líder de la sinagoga
  - el jefe de la sinagoga
  - el ruler de la sinagoga
  rationale: Se trata de un cargo institucional, no de una categoría teológica. «Dirigente» comunica función y evita arcaísmos; «de la sinagoga» preserva la referencia institucional.
  doctrine_reference: 'Translation philosophy: readable modern Spanish, not ecclesiastical traditionalism.'
- issue: Rendering of διδάσκαλος
  english_pob_reading: the teacher
  chosen_spanish_reading: el maestro
  alternative_spanish_readings:
  - el maestro
  - el enseñante
  rationale: El griego usa un título ordinario; «maestro» es una equivalencia natural en español y no añade matiz doctrinal que el texto no exige.
  doctrine_reference: Original-language primacy over inherited renderings.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español. También se mantuvo la fuerza temporal de ἔτι y la relación de procedencia en παρά, evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usa «ha muerto» para el perfecto Τέθνηκεν, conservando resultado presente.
  - Se mantiene «maestro» para διδάσκαλος, conforme al valor ordinario del término.
  - «Dirigente de la sinagoga» conserva el cargo institucional de ἀρχισυνάγωγος sin cargarlo de terminología eclesiástica.
  - Las notas [a] y [b] están ancladas exactamente en el texto para cumplir la validación.
