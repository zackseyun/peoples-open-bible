review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el contraste de וְאַתֶּם con «Pero ustedes», conserva correctamente «Yahvé» para יהוה, y comunica el sentido general de permanencia y supervivencia presente en el verso. Sin embargo, «se mantienen unidos a» atenúa el matiz de apego/adhesión fuerte de דבקים, y la nota al pie contiene un error grave de español («clingan») y una alternativa poco natural («se pegan»).
  spanish_quality_summary: La redacción principal es clara y legible, pero puede afinarse para sonar más natural y más fiel al valor léxico del hebreo. «Los que se aferran a Yahvé su Dios» expresa mejor la adhesión de pacto que «se mantienen unidos». También conviene corregir la nota al pie para que use alternativas idiomáticas en español y mantenga un tono digno.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> «Yahvé» correctamente; אֱלֹהֵיכֶם -> «su Dios» aceptable; חַיִּים -> «están vivos» natural. La principal mejora es lexical: דבק en este contexto debe reflejar apego firme de pacto, mejor con «se aferran a» o «se adhieren a» que con «se mantienen unidos».'
  issues:
  - severity: medium
    issue: La expresión «se mantienen unidos» debilita el matiz de דבקים.
    rationale: El participio de דבק en contexto de pacto transmite adherirse, aferrarse, apegarse firmemente. «Mantenerse unido» puede sonar más relacional o social que pactal y menos intenso que el hebreo.
  - severity: high
    issue: La nota al pie contiene el error «clingan».
    rationale: Es una forma incorrecta en español y hace inaceptable la nota tal como está.
  - severity: medium
    issue: La alternativa de nota «se pegan» no tiene registro bíblico-digno suficiente.
    rationale: Aunque intenta reflejar el sentido literal de דבק, en español actual suena coloquial y puede desviar el sentido hacia contacto físico más que adhesión de pacto.
  revised_spanish_text: Pero ustedes, los que se aferran[a] a Yahvé su Dios, todos están vivos hoy.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «los que se adhieren a» o «los que se apegan a»; la expresión señala una estrecha adhesión de pacto a Yahvé.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «se mantienen unidos» por «se aferran» para reflejar con más fuerza y naturalidad el valor de דבק en contexto de lealtad y apego de pacto. Se corrige y dignifica la nota al pie, preservando las alternativas léxicas relevantes sin errores ni coloquialismos impropios. No se requieren cambios doctrinales ni estructurales adicionales.
