review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la secuencia principal: el ángel habla, manda abrir/cortar el pez, tomar corazón, hígado y χολή, y luego guardarlos. Sin embargo, «Corta el pez» queda algo menos preciso que Ἀνάτεμε («abre/corta para abrir»), y sobre todo «ponlos a salvo» desplaza el sentido de θὲς ἀσφαλῶς desde guardar/reservar con seguridad hacia rescatar o poner fuera de peligro. Además, el inglés auditado conserva una nota léxica para χολή como alternativa ''bile'', que conviene preservar en español.'
  spanish_quality_summary: El español es claro y natural, pero «ponlos a salvo» suena menos idiomático para órganos extraídos y puede sugerir protegerlos de un peligro inmediato, no guardarlos. «Abre el pez» y «guárdalos bien» o «guárdalos en lugar seguro» es más natural y fiel. El resto del verso lee con dignidad y claridad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El ángel», «el corazón», «el hígado» y «la hiel» son aceptables. Conviene mantener una nota sobre «hiel»/«bilis» por χολή, en línea con el rastro de auditoría inglés.
  issues:
  - severity: medium
    issue: «ponlos a salvo» no refleja con precisión θὲς ἀσφαλῶς
    rationale: El griego manda guardar/poner aparte con seguridad para uso posterior. En español, «poner a salvo» suele significar librar de peligro, lo que introduce un matiz distinto.
  - severity: low
    issue: «Corta el pez» es menos preciso que la idea de abrir el pez
    rationale: Ἀνάτεμε implica cortar/abrir el pez para extraer sus órganos. «Abre el pez» expresa mejor la acción en contexto y suena más natural.
  - severity: low
    issue: Falta la nota léxica sobre χολή
    rationale: 'El inglés POB preserva la alternativa ''bile''. En español, «hiel» puede acompañarse con nota «o: bilis» para mantener la transparencia léxica.'
  revised_spanish_text: 'Y el ángel le dijo: «Abre el pez, y toma el corazón, el hígado y la hiel[a], y guárdalos bien».'
  revised_footnotes:
  - marker: a
    text: 'O: «la bilis».'
    reason: lexical_alternative
  revision_rationale: Se ajusta Ἀνάτεμε a «Abre» para expresar mejor la acción contextual de cortar para abrir el pez; se reemplaza «ponlos a salvo» por «guárdalos bien» para reflejar θὲς ἀσφαλῶς como almacenamiento seguro; y se añade la nota léxica sobre χολή en continuidad con la auditoría inglesa.
