translation:
  language: es
  text: 'Por tanto, he aquí, estoy abriendo el flanco[a] de Moab, desde sus ciudades, desde sus ciudades fronterizas, la gloria[b] de la tierra: Bet-jesimot, Baal-meón y Quiriatáyim[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lado de Moab», o más literalmente «el hombro de Moab».
    reason: lexical_alternative
  - marker: b
    text: O «la belleza de la tierra».
    reason: lexical_alternative
  - marker: c
    text: El texto hebreo tiene una forma ortográfica para este nombre final que corresponde a Quiriatáyim, una conocida ciudad moabita.
    reason: textual_variant
lexical_decisions:
- source_word: הִנְנִי פֹתֵחַ
  english_pob_choice: I am opening
  chosen_spanish: estoy abriendo
  alternatives_spanish:
  - abriré
  - voy a abrir
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa inmediatez profética; en español, «estoy abriendo» conserva esa vivacidad sin perder naturalidad. «Abriré» sería más simple, pero menos enfático en el matiz de acción inminente.
- source_word: כֶּתֶף מוֹאָב
  english_pob_choice: the flank of Moab
  chosen_spanish: el flanco de Moab
  alternatives_spanish:
  - el lado de Moab
  - el hombro de Moab
  lexicon: HALOT
  rationale: En contexto territorial y militar, כֶּתֶף funciona como metáfora espacial de una parte vulnerable o expuesta. «Flanco» reproduce bien ese valor; «hombro» es más literal, pero menos idiomático en español.
- source_word: מֵהֶעָרִים / מֵעָרָיו מִקָּצֵהוּ
  english_pob_choice: from its cities, from its frontier cities
  chosen_spanish: desde sus ciudades, desde sus ciudades fronterizas
  alternatives_spanish:
  - desde las ciudades
  - desde las ciudades de su extremo
  - desde las ciudades de su frontera
  lexicon: HALOT
  rationale: La secuencia hebrea avanza de lo general a lo específico. «Sus ciudades» y «sus ciudades fronterizas» preservan esa progresión y el sentido de límite territorial mejor que una paráfrasis más libre.
- source_word: צְבִי אֶרֶץ
  english_pob_choice: the glory of the land
  chosen_spanish: la gloria de la tierra
  alternatives_spanish:
  - la belleza de la tierra
  - el esplendor de la tierra
  lexicon: HALOT
  rationale: צְבִי puede referirse a belleza, esplendor o gloria. Aquí funciona como apposición honorífica de los lugares nombrados; «gloria» mantiene el tono elevado profético que el POB inglés también privilegia.
- source_word: בֵּית הַיְשִׁימֹת
  english_pob_choice: Beth-jeshimoth
  chosen_spanish: Bet-jesimot
  alternatives_spanish:
  - Beth-jesimot
  lexicon: HALOT
  rationale: Se translitera el topónimo según el uso común en español bíblico, adaptando la grafía al patrón español con «Bet» y conservando el nombre propio sin traducirlo.
- source_word: בַּעַל מְעוֹן
  english_pob_choice: Baal-meon
  chosen_spanish: Baal-meón
  alternatives_spanish:
  - Baal-meon
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado. La tilde en «meón» refleja la acentuación natural del español para facilitar lectura y pronunciación.
- source_word: ו/קריתמ/ה
  english_pob_choice: and Kiriathaim
  chosen_spanish: y Quiriataim
  alternatives_spanish:
  - y Kiriataim
  lexicon: HALOT
  rationale: El texto hebreo presenta una forma ortográfica variante para este topónimo conocido. En español se conserva el nombre tradicional transliterado como «Quiriataim», reflejando la forma reconocible del lugar sin traducirlo.
theological_decisions:
- issue: Alcance de la expresión territorial metafórica
  english_pob_reading: the flank of Moab
  chosen_spanish_reading: el flanco de Moab
  alternative_spanish_readings:
  - el lado de Moab
  - el hombro de Moab
  rationale: 'No se suaviza la metáfora: la imagen de una parte expuesta del territorio se conserva como tal. «Flanco» comunica el sentido militar/territorial que el contexto exige.'
  doctrine_reference: No aplica; decisión semántica y contextual
- issue: Valor de צְבִי en la frase apposicional
  english_pob_reading: the glory of the land
  chosen_spanish_reading: la gloria de la tierra
  alternative_spanish_readings:
  - la belleza de la tierra
  - el esplendor de la tierra
  rationale: Se mantiene la fuerza exaltada del sustantivo sin reducirlo a mera estética. «Gloria» es compatible con el tono oracular y con la enumeración de ciudades destacadas.
  doctrine_reference: No aplica; decisión semántica y literaria
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la línea inglesa auditada, incluyendo la progresión «desde sus ciudades» → «desde sus ciudades fronterizas» y la enumeración final de topónimos. Se ha incorporado una adaptación española natural de los nombres propios y de la metáfora territorial, sin introducir notas textuales porque el pasaje no requiere desambiguación adicional en esta forma de presentación.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se prefieren transliteraciones estables para topónimos, con adaptación ortográfica española cuando mejora la lectura.
  - Se conserva el paralelo semántico entre «sus ciudades» y «sus ciudades fronterizas» para no perder la gradación del hebreo.
  - La puntuación mantiene el cierre en dos puntos antes de la lista de nombres, acorde con el valor apposicional de la frase final.
