lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - hubo un
  - se produjo
  lexicon: BDAG
  rationale: La fórmula narrativa expresa existencia/ocurrencia. «Hubo» comunica de manera natural el evento sin volverlo mecánico, conservando el valor idiomático del griego y del inglés POB.
- source_word: πένθος μέγα
  english_pob_choice: great mourning
  chosen_spanish: gran duelo
  alternatives_spanish:
  - gran luto
  - gran lamentación
  lexicon: BDAG
  rationale: «Duelo» en español transmite lamento por calamidad o muerte y mantiene el sentido comunitario y solemne de πένθος. «Gran» reproduce μέγα con naturalidad.
- source_word: ἐπὶ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - sobre Israel
  - contra Israel
  lexicon: BDAG
  rationale: Aunque ἐπί puede sugerir peso o recaer sobre, el audit trail inglés revisado optó por una lectura más natural en inglés («in Israel»). En español, «en Israel» conserva la ubicuidad del duelo sin forzar una preposición menos idiomática. Se deja constancia de la tensión direccional del griego en la nota.
- source_word: ἐν παντὶ τόπῳ αὐτῶν
  english_pob_choice: in all their places
  chosen_spanish: en todos sus lugares
  alternatives_spanish:
  - por todos sus lugares
  - en cada uno de sus lugares
  - en todos los lugares donde habitaban
  lexicon: BDAG
  rationale: La frase es distributiva y alude a las distintas localidades del pueblo. «En todos sus lugares» sigue de cerca la estructura del griego y suena natural en español, preservando el matiz de dispersión/localización.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «upon Israel» a «in Israel» para mayor naturalidad, manteniendo el sentido del griego ἐπὶ Ἰσραήλ. La versión española sigue esa decisión de superficie, pero conserva en la nota la posibilidad distributiva de «por todos sus lugares» que refleja mejor la extensión local del original.
  spanish_consistency_notes:
  - Se usó «duelo» en vez de «dolor» o «tristeza» para mantener el tono funerario/aflictivo de πένθος.
  - Se mantuvo «Israel» sin artículo, conforme al uso bíblico habitual.
  - «Sus lugares» conserva el plural distributivo del griego y evita generalizar a un simple «por todas partes».
