translation:
  language: es
  text: Por tanto, porque nuestros padres provocaron la ira del Dios del cielo[a], él los entregó en manos de Nabucodonosor, rey de Babilonia, el caldeo, y destruyó esta casa[b] y llevó al pueblo a Babilonia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «airaron al Dios del cielo».
    reason: lexical_alternative
  - marker: b
    text: Arameo «esta casa», es decir, el templo.
    reason: cultural_note
  - marker: c
    text: O «exilió al pueblo a Babilonia».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָהֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: Marca una conclusión inferida del contexto previo. «Por tanto» conserva el valor consecutivo con tono bíblico natural en español.
- source_word: מִן דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La construcción aramea funciona causalmente. «Porque» es la correspondencia más clara y directa en español.
- source_word: הַרְגִּזוּ
  english_pob_choice: provoked ... to wrath
  chosen_spanish: provocaron a ira
  alternatives_spanish:
  - irritaron
  - airaron
  lexicon: HALOT
  rationale: El causativo de רגז expresa causar ira o agitación. «Provocaron a ira» mantiene la fuerza causal y el registro solemne sin suavizar el juicio divino.
- source_word: אֲבָהֳתַנָא
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: La forma literal es «nuestros padres». En español bíblico «nuestros padres» preserva mejor la fórmula ancestral que «nuestros antepasados».
- source_word: לֶאֱלָהּ שְׁמַיָּא
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios de los cielos
  lexicon: HALOT
  rationale: La expresión postexílica designa al Dios de Israel. «El Dios del cielo» reproduce bien el título sin alterar su sentido.
- source_word: יְהַב הִמּוֹ בְּיַד
  english_pob_choice: he gave them into the hand of
  chosen_spanish: los entregó en mano de
  alternatives_spanish:
  - los entregó en poder de
  - los puso en manos de
  lexicon: HALOT
  rationale: El modismo bíblico se conserva con «entregó en mano de», que mantiene la idea de poner a alguien bajo el poder de otro.
- source_word: נְבוּכַדְנֶצַּר מֶלֶךְ בָּבֶל
  english_pob_choice: Nebuchadnezzar king of Babylon
  chosen_spanish: Nabucodonosor, rey de Babilonia
  alternatives_spanish:
  - Nebucadnezar, rey de Babilonia
  lexicon: HALOT
  rationale: «Nabucodonosor» es la forma habitual y más inteligible en español. El título real se conserva de manera directa.
- source_word: כסדיא
  english_pob_choice: the Chaldean
  chosen_spanish: el caldeo
  alternatives_spanish:
  - el chaldeo
  - el de los caldeos
  lexicon: HALOT
  rationale: El gentilicio arameo apposicional a Nabucodonosor se rinde con «el caldeo», que reproduce el valor étnico sin interpretar a «babilonio».
- source_word: וּבַיְתָה דְנָה
  english_pob_choice: and this house
  chosen_spanish: y esta casa
  alternatives_spanish:
  - y este templo
  lexicon: HALOT
  rationale: El texto dice literalmente «casa». En español se conserva esa forma para no sustituir el término bíblico por una interpretación explicativa.
- source_word: סַתְרֵהּ
  english_pob_choice: he destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - derribó
  - demolió
  lexicon: HALOT
  rationale: El verbo indica derribar o destruir una estructura. «Destruyó» es amplio, fiel y natural en español bíblico.
- source_word: וְעַמָּה הַגְלִי
  english_pob_choice: and carried the people away
  chosen_spanish: y llevó al pueblo
  alternatives_spanish:
  - y exilió al pueblo
  - y deportó al pueblo
  lexicon: HALOT
  rationale: El causativo de גלה expresa llevar al exilio. «Llevó al pueblo» mantiene el movimiento del original; el contexto de exilio queda explicitado por «a Babilonia».
- source_word: לְבָבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - hacia Babilonia
  lexicon: HALOT
  rationale: La dirección simple se expresa naturalmente con «a Babilonia».
theological_decisions:
- issue: Causación divina en el juicio
  english_pob_reading: he gave them into the hand of Nebuchadnezzar
  chosen_spanish_reading: los entregó en mano de Nabucodonosor
  alternative_spanish_readings:
  - permitió que cayeran en manos de Nabucodonosor
  rationale: El hebreo/arameo atribuye la acción directamente al Dios del cielo como juicio por la provocación. Se mantiene la causalidad fuerte y no se atenúa con una lectura meramente permisiva.
  doctrine_reference: Translation philosophy §1, §3
- issue: Terminología de la casa de Dios
  english_pob_reading: this house
  chosen_spanish_reading: esta casa
  alternative_spanish_readings:
  - este templo
  rationale: El original usa «casa». Conservarlo respeta la dicción bíblica y evita introducir interpretación en el cuerpo principal del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se revisó el texto auditado en inglés y no se detectaron cambios posteriores relevantes; la versión sigue la misma lectura básica y conserva las decisiones léxicas y teológicas documentadas, ajustadas al español.
  spanish_consistency_notes:
  - Se mantiene «Dios del cielo» para לֶאֱלָהּ שְׁמַיָּא, conforme al título postexílico estándar.
  - Se conserva el modismo «entregó en mano de» para reflejar la fuerza del hebreo/arameo sin domesticarlo.
  - «Casa» se retiene en el texto principal y se explica en nota para no perder la terminología bíblica.
  - Se usa «caldeo» como gentilicio singular apposicional, paralelo al inglés auditado y al valor arameo del término.
