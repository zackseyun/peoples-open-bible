translation:
  language: es
  text: Y hasta los sacerdotes que se acercan a Yahvé deben consagrarse[a], no sea que Yahvé irrumpa contra ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deben santificarse» o «deben hacerse santos». El hebreo expresa una acción reflexiva de apartarse para la presencia de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «estalle contra ellos» o «rompa sobre ellos». El hebreo describe una irrupción repentina del juicio de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And even
  chosen_spanish: Y aun
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: 'La partícula añade énfasis inclusivo: no solo el pueblo, sino también los sacerdotes están bajo la advertencia. «Aun» conserva ese matiz de inclusión reforzada con español natural.'
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes cultuales
  - los presbíteros
  lexicon: HALOT
  rationale: En este contexto cultual, כֹּהֲנִים se refiere a los sacerdotes del santuario. «Sacerdotes» es la equivalencia española estándar y clara.
- source_word: הַנִּגָּשִׁים אֶל יְהוָה
  english_pob_choice: who come near to Yahweh
  chosen_spanish: que se acercan a Yahvé
  alternatives_spanish:
  - que se aproximan a Yahvé
  - que se allegan a Yahvé
  lexicon: HALOT
  rationale: El participio de נגשׁ expresa acceso cultual a la presencia divina. «Se acercan» comunica bien ese valor en español y mantiene la sencillez del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el Nombre divino, conforme a la pauta española solicitada y al audit trail inglés que distingue el Nombre de una máscara litúrgica.
- source_word: יִתְקַדָּשׁוּ
  english_pob_choice: must consecrate themselves
  chosen_spanish: deben consagrarse
  alternatives_spanish:
  - deben santificarse
  - deben hacerse santos
  lexicon: HALOT
  rationale: 'El hitpael indica acción reflexiva: apartarse para estar aptos ante la presencia de Yahvé. «Consagrarse» conserva la fuerza cultual sin volverlo mecánicamente «santificarse».'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - si no
  lexicon: HALOT
  rationale: Introduce la consecuencia negativa prevenible. «No sea que» es el equivalente español más natural para advertencia cautelar.
- source_word: יִפְרֹץ
  english_pob_choice: break out against them
  chosen_spanish: rompa contra ellos
  alternatives_spanish:
  - estalle contra ellos
  - irrumpa contra ellos
  - se abra paso contra ellos
  lexicon: HALOT
  rationale: El verbo transmite una irrupción súbita y peligrosa del juicio divino. «Rompa contra ellos» conserva la imagen de ruptura/estallido y la dirección hostil implícita en el contexto.
- source_word: בָּהֶם יְהוָה
  english_pob_choice: Yahweh break out against them
  chosen_spanish: Yahvé rompa contra ellos
  alternatives_spanish:
  - Yahvé estalle contra ellos
  - Yahvé irrumpa contra ellos
  lexicon: HALOT
  rationale: Se mantiene el sujeto explícito al final, como en hebreo, para preservar el énfasis y la solemnidad del Nombre repetido.
theological_decisions:
- issue: Nombre divino יְהוָה en una escena de Sinaí
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama; por la política del proyecto en español, se conserva el Nombre propio en vez de una sustitución reverencial. Esto mantiene la transparencia textual y el enlace con el pacto de Sinaí.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza del peligro expresado por יִפְרֹץ בָּהֶם
  english_pob_reading: a sudden outbreak of the LORD's judgment
  chosen_spanish_reading: una irrupción súbita del juicio de Yahvé contra ellos
  alternative_spanish_readings:
  - que Yahvé se abalance contra ellos
  - que Yahvé los hiera
  rationale: La expresión hebrea es vívida y amenazante; no se reduce a un castigo genérico. «Rompa contra ellos» conserva la imagen de una irrupción repentina sin especificar una modalidad que el verso no nombra.
  doctrine_reference: 'DOCTRINE.md: Divine holiness and warning at Sinai'
translation_notes:
  revision_awareness: 'El estado de revisión más reciente indica que el texto inglés aprobado no requirió cambios y que el acuerdo con la verificación cruzada fue alto. La versión española sigue ese perfil estable: conserva el énfasis inclusivo de וְגַם, el valor cultual de נגשׁ, el reflexivo de יִתְקַדָּשׁוּ y la imagen peligrosa de יִפְרֹץ sin suavizarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefiere «consagrarse» para el matiz reflexivo cultual de יִתְקַדָּשׁוּ, manteniendo una alternativa en nota para «santificarse».
  - La sintaxis española conserva la advertencia final con sujeto explícito, imitando el énfasis del hebreo sin sonar forzada.
  - «Los sacerdotes» se mantiene en plural definido, sin introducir términos eclesiásticos posteriores que no están en el hebreo.
