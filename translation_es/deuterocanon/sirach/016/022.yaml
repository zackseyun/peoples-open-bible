    reason: lexical_alternative
  - marker: c
    text: El hebreo parece apuntar a 'lo decretado' o 'un estatuto'; el griego lee 'el pacto'.
    reason: alternative_reading
  revision_rationale: Se ajusta el segundo miembro para reflejar mejor el sustantivo hebreo תִּקְוַת ('esperanza') según la revisión inglesa auditada, y se corrigen las notas para preservar con más precisión la dificultad del hebreo y la lectura griega 'el pacto'.
