lexical_decisions:
- source_word: לְ/לֵוִי
  english_pob_choice: for Levi
  chosen_spanish: para Leví
  alternatives_spanish:
  - de Leví
  - para los levitas
  lexicon: HALOT
  rationale: El לְ prefijado en esta lista administrativa indica asignación o representación; en español, «para» conserva mejor esa función que «de». Se mantiene el nombre ancestral «Leví» porque el hebreo usa el nombre del antepasado, no el plural gentilicio.
- source_word: חֲשַׁבְיָה
  english_pob_choice: Hashabiah
  chosen_spanish: Hasabías
  alternatives_spanish:
  - Jasabías
  lexicon: convención transliterativa
  rationale: Nombre propio transliterado de forma readable en español. Se adapta la grafía al uso castellano sin añadir significado no presente en el hebreo.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: HALOT
  rationale: Equivale a la relación genealógica normal en español y conserva el sentido simple del hebreo.
- source_word: קְמוּאֵל
  english_pob_choice: Kemuel
  chosen_spanish: Quemuel
  alternatives_spanish:
  - Kemuel
  lexicon: convención transliterativa
  rationale: Se translitera el nombre propio con una grafía española natural, sin alterar la forma nominal.
- source_word: לְ/אַהֲרֹן
  english_pob_choice: for Aaron
  chosen_spanish: para Aarón[a]
  alternatives_spanish:
  - de Aarón
  - para los aarónidas
  lexicon: HALOT
  rationale: Se conserva la forma literal del hebreo con el nombre ancestral «Aarón». El valor metonímico probable del nombre se explica en la nota, pero no se desarrolla en el texto principal para no sobreinterpretar la frase.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  lexicon: convención transliterativa
  rationale: Nombre propio transliterado en una forma española estable y pronunciable.
theological_decisions:
- issue: Si hacer explícito que «Aarón» representa al linaje sacerdotal aarónico
  english_pob_reading: Retain the literal ancestral name 'Aaron' in the main text
  chosen_spanish_reading: Mantener «Aarón» en el texto principal y explicar su valor representativo en nota
  alternative_spanish_readings:
  - para la casa de Aarón
  - para los aarónidas
  rationale: El hebreo dice simplemente «para Aarón». La lectura administrativa apunta al grupo sacerdotal, pero el texto no lo expande. La traducción conserva la forma heredada y aclara el posible sentido colectivo mediante una nota, siguiendo la primacía del original.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §2 (translate titles; transliterate names), §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se corrige la validación anterior: el marcador [a] ahora aparece en el texto principal junto a «Aarón», por lo que la nota queda debidamente anclada. No se introducen otras notas no ancladas.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de la lista breve: «para Leví ...; para Aarón, ...».'
  - Se prefieren transliteraciones españolas consistentes para los nombres propios.
  - No se sustituye «Aarón» por una glosa interpretativa en el texto principal, para preservar la forma hebrea documentada.
