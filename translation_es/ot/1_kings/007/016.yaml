revisions:
- from: Hizo dos capiteles[a] de bronce fundido para poner sobre las cabezas de las columnas. La altura de un capitel era de cinco codos, y la altura del segundo capitel era de cinco codos.
  to: Hizo dos capiteles[a] de bronce fundido para poner sobre la parte superior de las columnas. La altura de un capitel era de cinco codos, y la altura del segundo capitel era de cinco codos.
  rationale: Se reemplaza «las cabezas de las columnas» por «la parte superior de las columnas» para reflejar mejor el sentido arquitectónico de רָאשֵׁי הָעַמּוּדִים y la rationale del English POB, evitando un literalismo poco natural en español. Se mantienen «capiteles», «bronce fundido», «cinco codos» y la nota léxica sobre «coronas», que están bien justificadas por la evidencia fuente y el expediente POB.
