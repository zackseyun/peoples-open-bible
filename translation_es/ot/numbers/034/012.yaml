translation:
  language: es
  text: Entonces el límite[b] descenderá hasta el Jordán, y su término[c] estará en el Mar de la Sal[d]. Esta será su tierra, según sus límites alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «Límite» traduce el valor geográfico de גְּבוּל; también puede entenderse como «frontera».
    reason: lexical_alternative
  - marker: c
    text: 'O: «sus extremidades». El hebreo puede denotar los puntos terminales o extremidades del límite.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «el Mar de la Sal», es decir, el cuerpo de agua comúnmente llamado Mar Muerto.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיָרַד
  english_pob_choice: Then ... shall go down
  chosen_spanish: Entonces ... descenderá
  alternatives_spanish:
  - y ... descenderá
  - entonces ... bajará
  lexicon: HALOT
  rationale: En este contexto de descripción territorial, ירד expresa movimiento hacia abajo de una línea fronteriza. «Descenderá» conserva el valor direccional y mantiene un registro digno y natural en español; «entonces» refleja la secuencia del itinerario.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el lindero
  lexicon: HALOT
  rationale: גְּבוּל puede ser «límite» o «frontera». «Límite» funciona bien en una descripción geográfica formal y evita un matiz demasiado moderno o político que a veces tiene «frontera».
- source_word: הַיַּרְדֵּנָה
  english_pob_choice: to the Jordan
  chosen_spanish: hasta el Jordán
  alternatives_spanish:
  - al Jordán
  - hacia el Jordán
  - hasta el río Jordán
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el Jordán. «Hasta el Jordán» comunica la meta del desplazamiento y suena natural en español sin añadir «río» como glosa innecesaria.
- source_word: וְהָיוּ
  english_pob_choice: and ... shall be
  chosen_spanish: y ... estará
  alternatives_spanish:
  - y ... será
  - y ... quedará
  lexicon: HALOT
  rationale: En una cláusula descriptiva de localización, el español suele preferir «estará» para expresar ubicación resultante. Mantiene el valor futuro-modal del hebreo sin forzar una construcción más pesada.
- source_word: תוֹצְאֹתָיו
  english_pob_choice: its end
  chosen_spanish: su término
  alternatives_spanish:
  - su extremo
  - su salida
  - su terminación
  lexicon: HALOT
  rationale: El hebreo puede referirse a los puntos terminales de un límite. La revisión inglesa optó por el singular «end»; «su término» conserva esa singularidad y evita una paráfrasis más interpretativa como «extremos».
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: el Mar de la Sal
  alternatives_spanish:
  - el Mar Salado
  - el Mar Muerto
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «Mar de la sal». «Mar de la Sal» preserva de cerca la expresión fuente y deja visible la denominación hebrea; «Mar Muerto» sería un nombre tradicional, pero no el valor léxico inmediato del hebreo.
- source_word: זֹאת תִּהְיֶה לָכֶם הָאָרֶץ
  english_pob_choice: This shall be your land
  chosen_spanish: Esta será para ustedes la tierra
  alternatives_spanish:
  - Esta será su tierra
  - Esta les será la tierra
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula de resumen y asignación territorial. «Para ustedes» refleja לָכֶם de manera clara y directa; «la tierra» conserva el orden y el sustantivo del original sin añadir interpretaciones.
- source_word: לִגְבֻלֹתֶיהָ סָבִיב
  english_pob_choice: according to its borders all around
  chosen_spanish: según sus fronteras alrededor
  alternatives_spanish:
  - con sus fronteras alrededor
  - dentro de sus fronteras por todos lados
  - en torno a sus fronteras
  lexicon: HALOT
  rationale: La frase delimita la tierra en relación con sus límites circundantes. «Según sus fronteras alrededor» mantiene el sentido delimitador de la construcción hebrea sin convertirla en un giro más explicativo de lo necesario.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió el singular «end» frente a una lectura pluralizada. También conserva la decisión de no sustituir la denominación hebrea «Salt Sea» por el nombre tradicional «Dead Sea», salvo en nota cultural.
  spanish_consistency_notes:
  - Se usa «Jordán» como nombre propio del río sin añadir «río» en el texto principal, en línea con el inglés auditado.
  - «Límite» y «fronteras» mantienen la terminología territorial del pasaje sin introducir vocabulario eclesiástico o doctrinal.
  - Se preserva la singularidad de תוֹצְאֹתָיו con «su término», aunque en nota se reconoce la posibilidad de «su extremo».
