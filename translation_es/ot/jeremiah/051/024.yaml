translation:
  language: es
  text: Y les pagaré a Babilonia y a todos los habitantes de Caldea por toda su maldad[a] que hicieron en Sion ante sus ojos, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por todo el mal que hicieron». El término hebreo puede enfatizar tanto la maldad moral como el daño o la acción perjudicial misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּמְתִּי
  english_pob_choice: I will repay
  chosen_spanish: yo pagaré
  alternatives_spanish:
  - yo repagaré
  - yo les retribuiré
  - yo les pagaré de vuelta
  lexicon: HALOT
  rationale: El piel de שׁלם aquí expresa retribución o pago en respuesta a lo hecho. En español, «pagaré» comunica con naturalidad la idea retributiva y puede sostener el sentido judicial del contexto sin sonar arcaico. Se evita «requeriré» o formas demasiado literarias.
- source_word: לְבָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonia
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español bíblico. Mantiene la referencia histórica sin necesidad de transliteración.
- source_word: וּלְכֹל יוֹשְׁבֵי כַשְׂדִּים
  english_pob_choice: and all the inhabitants of Chaldea
  chosen_spanish: y a todos los habitantes de Caldea
  alternatives_spanish:
  - y a todos los que habitan en Caldea
  - y a todos los moradores de Caldea
  lexicon: HALOT
  rationale: יוֹשְׁבֵי es un participio sustantivado que indica quienes habitan allí. «Habitantes de Caldea» es natural y conserva el valor territorial/étnico de כַשְׂדִּים.
- source_word: אֵת כָּל רָעָתָם
  english_pob_choice: for all their evil
  chosen_spanish: por toda su maldad
  alternatives_spanish:
  - por todo el mal que hicieron
  - por toda su perversidad
  - por todo el daño que causaron
  lexicon: HALOT
  rationale: רָעָה puede abarcar mal moral o acciones dañinas. En este contexto de juicio, «maldad» preserva la carga moral que el POB inglés decidió no reducir solo a daño material. Se mantiene la amplitud semántica con una expresión natural en español.
- source_word: אֲשֶׁר עָשׂוּ בְצִיּוֹן
  english_pob_choice: that they have done in Zion
  chosen_spanish: que hicieron en Sion
  alternatives_spanish:
  - que cometieron en Sion
  - que realizaron en Sion
  - que hicieron contra Sion
  lexicon: HALOT
  rationale: El hebreo usa בְ־ («en»), y la formulación más cercana y clara en español es «en Sion». «Hicieron» mantiene la ambigüedad deliberada del original y no fuerza un complemento adversativo que el hebreo no expresa explícitamente.
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ustedes
  - en presencia de ustedes
  - ante sus ojos
  lexicon: HALOT
  rationale: El hebreo idiomático señala lo presenciado abiertamente. «Delante de sus ojos» reproduce con claridad la imagen y funciona de manera natural en español bíblico contemporáneo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - dice el Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la norma del proyecto. Para נְאֻם, «dice» es una fórmula profética breve y reconocible en español; evita sobrecargar el cierre con una perífrasis más técnica que sería menos fluida aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: El tetragrámaton se vierte con el nombre propio divino «Yahvé», conforme a la directriz del proyecto y a la decisión inglesa de no sustituirlo por un título.
theological_decisions:
- issue: Referencia del juicio retributivo sobre Babilonia/Caldea
  english_pob_reading: I will repay Babylon and all the inhabitants of Chaldea for all their evil that they have done in Zion before your eyes.
  chosen_spanish_reading: Y yo pagaré a Babilonia y a todos los habitantes de Caldea por toda su maldad que hicieron en Sion delante de sus ojos.
  alternative_spanish_readings:
  - Y yo les retribuiré a Babilonia y a todos los habitantes de Caldea por todo el mal que hicieron en Sion delante de sus ojos.
  - Y yo pagaré a Babilonia y a todos los habitantes de Caldea por todo el daño que causaron en Sion delante de sus ojos.
  rationale: El verso presenta un acto divino de retribución judicial. «Pagaré» conserva esa fuerza sin desdibujarla en una paráfrasis demasiado genérica. Se mantiene la ambivalencia de רָעָה entre mal moral y daño causado, tal como lo preservó el texto inglés con su nota lexical.
  doctrine_reference: Jeremías 51:24; nota lexical sobre רָעָה en el POB inglés
translation_notes:
  revision_awareness: 'Se siguió el estado revisado sin cambios del registro inglés (latest_revision_pass: unchanged=true). La propuesta española mantiene el mismo sentido base y la misma tensión lexical de רָעָה, sin introducir una reinterpretación doctrinal ni una expansión explicativa no apoyada por el original.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «Babilonia» y «Caldea» como topónimos/etnónimos establecidos en español bíblico.
  - Se mantuvo «Sion» sin tilde por la forma tradicional usada en contextos bíblicos en español.
  - La relación entre «por toda su maldad» y la nota al pie preserva la alternativa entre mal moral y daño causado, reflejando el audit trail inglés.
