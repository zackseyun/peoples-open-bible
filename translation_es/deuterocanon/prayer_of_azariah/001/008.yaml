  - marker: a
    text: 'O: «todo lo que has traído sobre nosotros ... todo lo que nos has hecho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con verdadero juicio», «en juicio recto» o «en juicio justo».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «todo lo que has hecho con nosotros» por «todo lo que nos has hecho» para reflejar mejor el valor adversativo/contextual de ἐποίησας ἡμῖν y el inglés auditado «all that you have done to us», manteniendo a la vez un español natural y claro. Se conservan la estructura, el tono confesional, la repetición enfática y «en verdadero juicio» como traducción principal de ἐν ἀληθινῇ κρίσει.
