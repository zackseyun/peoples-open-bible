translation:
  language: es
  text: Joaquín tenía ocho años[a] cuando comenzó a reinar, y reinó tres meses y diez días en Jerusalén. Hizo lo malo ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 2 Reyes 24:8 dice «dieciocho años» en lugar de «ocho años».
    reason: textual_variant
lexical_decisions:
- source_word: בֶּן שְׁמוֹנֶה שָׁנִים
  english_pob_choice: was eight years old
  chosen_spanish: tenía ocho años
  alternatives_spanish:
  - era un hijo de ocho años
  - tenía ocho años de edad
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de edad; en español, «tenía ocho años» comunica con naturalidad el mismo dato sin perder precisión. Se evita una calca como «era un hijo de ocho años», que sería extraña en español.
- source_word: יְהוֹיָכִין
  english_pob_choice: Jehoiachin
  chosen_spanish: Joaquín
  alternatives_spanish:
  - Jeyojín
  - Jeconías
  lexicon: Conventional Spanish biblical name form
  rationale: Se prefiere la forma española bíblica tradicional «Joaquín» para este nombre, ampliamente reconocible en español y alineada con el referente histórico del texto.
- source_word: בְּמָלְכ֔וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - cuando fue hecho rey
  - en su reinado
  lexicon: HALOT
  rationale: La construcción temporal del hebreo marca el inicio del reinado; «comenzó a reinar» conserva esa fuerza inceptiva de manera natural en español.
- source_word: וּשְׁלֹשָׁ֤ה חֳדָשִׁים֙ וַעֲשֶׂ֣רֶת יָמִ֔ים
  english_pob_choice: three months and ten days
  chosen_spanish: tres meses y diez días
  alternatives_spanish:
  - tres meses, y diez días
  lexicon: HALOT
  rationale: La duración se vierte de forma directa y sobria, manteniendo la exactitud cronológica del hebreo.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: «Reinó» es el equivalente verbal estándar para מלך en fórmulas regales, y reproduce bien el tono de la nota histórica.
- source_word: בִּירוּשָׁלִָ֑ם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: Standard geographic rendering
  rationale: La preposición locativa se traduce de manera directa y transparente.
- source_word: וַיַּ֥עַשׂ הָרַ֖ע
  english_pob_choice: He did what was evil
  chosen_spanish: Hizo lo malo
  alternatives_spanish:
  - Hizo el mal
  - Actuó mal
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de evaluación moral. «Hizo lo malo» es natural en español y refleja la carga ética de la expresión hebrea sin suavizarla.
- source_word: בְּעֵינֵ֥י יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La imagen hebrea de valoración divina puede expresarse en español con «ante Yahvé», que comunica evaluación y juicio delante de Dios. Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Project terminology default
  rationale: Se conserva la transliteración «Yahvé», según la pauta del proyecto para el nombre divino, evitando la sustitución por un título.
theological_decisions:
- issue: Discrepancia cronológica entre 2 Crónicas 36:9 y 2 Reyes 24:8
  english_pob_reading: Retain the Masoretic wording 'eight years old' in the main text, with a footnote noting the parallel 'eighteen years old' in 2 Kings 24:8
  chosen_spanish_reading: Mantener «tenía ocho años» en el texto principal, con nota sobre la lectura paralela de 2 Reyes 24:8 («dieciocho años»).
  alternative_spanish_readings:
  - tenía dieciocho años
  - era de dieciocho años
  rationale: La traducción debe reflejar la fuente hebrea dada, no armonizarla silenciosamente con el pasaje paralelo. La nota preserva la tensión textual documentada y permite al lector conocer la variante sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition) and §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del texto inglés al colocar «en Jerusalén» después de «reinó», reproduciendo mejor el orden hebreo sin alterar el sentido. También se conserva la variante textual documentada en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se mantiene un registro sobrio y bíblico, pero con español natural, evitando calcos como «en los ojos de» o «hizo el mal» si resultan menos idiomáticos.
  - La nota de variante textual está anclada en el marcador [a] junto a la edad para reflejar el punto de tensión del pasaje.
