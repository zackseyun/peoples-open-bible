translation:
  language: es
  text: Todas las ciudades eran diez[a], con sus tierras de pasto[b], para los clanes de los hijos de Coat[c] restantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diez ciudades». La forma hebrea funciona como fórmula de cierre del listado.
    reason: lexical_alternative
  - marker: b
    text: «Tierras de pasto» se refiere al terreno abierto perteneciente a las ciudades, usado especialmente para el pastoreo y otros usos relacionados.
    reason: cultural_note
  - marker: c
    text: O «los coatitas» para «los hijos de Coat».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  - El total de las
  lexicon: HALOT
  rationale: En la fórmula conclusiva hebrea, כָּל resume el conjunto total de las ciudades. «Todas» comunica bien la suma total sin añadir explicaciones ajenas al texto.
- source_word: עָרִים עֶשֶׂר
  english_pob_choice: the cities were ten
  chosen_spanish: las ciudades eran diez
  alternatives_spanish:
  - diez ciudades
  - las ciudades sumaban diez
  lexicon: HALOT
  rationale: Mantengo el orden resumitivo del hebreo, que funciona como cierre del listado. «Eran diez» conserva el matiz de recuento final mejor que una simple reordenación nominal.
- source_word: מִגְרְשֵׁיהֶן
  english_pob_choice: their pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus pastizales
  - sus tierras comunes
  - sus alrededores
  lexicon: HALOT
  rationale: En los textos sobre ciudades levíticas, מִגְרָשׁ designa el terreno abierto asociado a la ciudad para uso, especialmente de pastoreo. «Tierras de pasto» preserva esa función sin perder claridad en español.
- source_word: לְמִשְׁפְּחוֹת
  english_pob_choice: for the clans of
  chosen_spanish: para los clanes de
  alternatives_spanish:
  - para las familias de
  - según los clanes de
  lexicon: HALOT
  rationale: «Clanes» refleja mejor el nivel social de מִשְׁפָּחוֹת que «familias» en este contexto tribal. La preposición «para» comunica la distribución/posesión implícita en ל.
- source_word: בְּנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los coatitas
  - los descendientes de Coat
  lexicon: HALOT
  rationale: Se conserva la genealogía literal «hijos de» como en el hebreo. «Coat» sigue la forma castellana habitual del nombre propio, clara y reconocible.
- source_word: הַנּוֹתָרִים
  english_pob_choice: the remaining
  chosen_spanish: los que quedaban
  alternatives_spanish:
  - los restantes
  - los que restaban
  lexicon: HALOT
  rationale: El participio señala a los descendientes/cohortes no tratados en la lista anterior. «Los que quedaban» expresa bien esa idea relacional sin endurecerla en una etiqueta más abstracta.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo resumitivo y la revisión en inglés no introdujo cambios sustanciales. Se mantiene la estructura de cierre del listado y la equivalencia contextual de מִגְרָשׁ como terreno abierto asociado a la ciudad.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «Coat» como forma española tradicional del nombre propio, coherente con el uso bíblico en español.
  - «Clanes» se usa de manera consistente para מִשְׁפְּחוֹת en contextos tribales, evitando «familias» cuando sería menos preciso.
