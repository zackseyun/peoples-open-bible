translation:
  language: es
  text: 'Esto pueden comer de todo lo que hay en las aguas: todo lo que tiene aletas y escamas pueden comer[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Esto comerán de todo lo que hay en las aguas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת זֶה
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Este
  - Esto podrán comer
  lexicon: HALOT
  rationale: El demostrativo neutro/objetal hebreo se vierte con un neutro deíctico en español. 'Esto' conserva la presentación categórica de la norma sin forzar un sustantivo implícito.
- source_word: תֹּאכְלוּ
  english_pob_choice: you may eat
  chosen_spanish: podrán comer
  alternatives_spanish:
  - podrán comer
  - comerán
  - deberán comer
  lexicon: HALOT
  rationale: En un mandato legal de permiso, el español natural transmite mejor la fuerza permisiva con 'podrán' que con un futuro simple o un deber. Mantiene el valor normativo sin volverlo coercitivo.
- source_word: מִכֹּל אֲשֶׁר בַּמָּיִם
  english_pob_choice: from all that are in the waters
  chosen_spanish: de todo lo que hay en las aguas
  alternatives_spanish:
  - de todo lo que está en las aguas
  - de todo lo que hay en el agua
  lexicon: HALOT
  rationale: '''מִן + כֹּל'' expresa selección de un conjunto total; ''de todo lo que hay en las aguas'' refleja bien esa relación y conserva el plural hebreo de ''aguas'' sin sonar artificial.'
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: everything that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo aquel que
  - todo lo cual
  lexicon: HALOT
  rationale: La construcción generalizadora se comunica de modo claro y natural con 'todo lo que', que preserva la amplitud de la regla alimentaria.
- source_word: לוֹ
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  - lleva
  lexicon: HALOT
  rationale: El hebreo usa una posesión idiomática; en español, 'tiene' expresa de manera directa y sobria la pertenencia de aletas y escamas al animal.
- source_word: סְנַפִּיר
  english_pob_choice: fins
  chosen_spanish: aletas
  alternatives_spanish:
  - aleta
  - aletas
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, el español idiomático describe la característica anatómica con plural cuando se trata del rasgo de una clase de animales.
- source_word: וְקַשְׂקֶשֶׂת
  english_pob_choice: scales
  chosen_spanish: escamas
  alternatives_spanish:
  - escama
  - escamas
  lexicon: HALOT
  rationale: Como con 'aletas', el plural español comunica mejor la característica zoológica requerida por la ley.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you may eat
  chosen_spanish: podrán comer
  alternatives_spanish:
  - comerán
  - comerán ustedes
  lexicon: HALOT
  rationale: Se repite la misma fuerza permisiva al final de la norma para mantener la correspondencia con el hebreo y con la decisión inglesa de conservar el permiso legal.
theological_decisions:
- issue: 'Fuerza legal: permiso vs. obligación'
  english_pob_reading: you may eat
  chosen_spanish_reading: podrán comer
  alternative_spanish_readings:
  - comerán
  - deberán comer
  rationale: El hebreo imperfecto en este contexto es una instrucción dietética permisiva. En español, 'podrán' comunica con precisión la autorización sin introducir obligación ni simple predicción.
  doctrine_reference: Ley dietética de Deuteronomio 14; lectura normativa del texto legal
- issue: 'Forma deíctica inicial: ''This'' / ''Esto'''
  english_pob_reading: This you may eat
  chosen_spanish_reading: Esto podrán comer
  alternative_spanish_readings:
  - Esto lo podrán comer
  - Esto ustedes lo podrán comer
  rationale: Se conserva el orden más cercano al hebreo y a la revisión inglesa, manteniendo el arranque demostrativo como encabezado de la categoría permitida.
  doctrine_reference: Estructura legal apodíctica y enumerativa en el Pentateuco
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de 'You may eat this' a 'This you may eat' para reflejar mejor el orden hebreo y el registro formal. La propuesta española sigue esa revisión al comenzar con 'Esto' y conservar la estructura demostrativo + verbo permisivo + complemento de origen.
  spanish_consistency_notes:
  - Se mantiene 'aguas' en plural para reflejar el hebreo מַיִם y no uniformarlo a singular.
  - Se usa 'aletas' y 'escamas' en plural por idiomaticidad zoológica en español, sin perder el valor genérico del hebreo singular.
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene el Tetragrámaton ni vocabulario divino.
  - El registro es legal y sobrio; 'podrán' funciona aquí como permiso normativo, no como simple futuro.
