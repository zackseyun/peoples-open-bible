translation:
  language: es
  text: 'Puso cada rebaño aparte[d] en manos de sus siervos[a], y dijo a sus siervos: «Pasen delante de mí, y pongan un espacio entre rebaño y rebaño[b][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo el cuidado de sus siervos». El hebreo dice literalmente «en la mano de sus siervos», una expresión idiomática de encomendar algo al control de alguien.
    reason: lexical_alternative
  - marker: b
    text: O «entre un rebaño y otro».
    reason: lexical_alternative
  - marker: c
    text: O «pongan un intervalo entre un rebaño y otro».
    reason: lexical_alternative
  - marker: d
    text: O «cada hato aparte». La frase hebrea repetida subraya que los grupos de animales fueron dispuestos separadamente, uno por uno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He put
  chosen_spanish: Puso
  alternatives_spanish:
  - Puso
  - Colocó
  - Entregó
  lexicon: HALOT
  rationale: נתן aquí va con בְּיַד y expresa la entrega de los animales al control de otros. «Puso» conserva la acción concreta sin volverla demasiado abstracta; «entregó» podría enfatizar la transferencia de control, pero en español suena menos natural con el objeto directo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en manos de
  - bajo el cuidado de
  - bajo la responsabilidad de
  lexicon: HALOT
  rationale: La imagen literal de «mano» es idiomática en hebreo para encomendar algo a la autoridad o control de alguien. «En manos de» conserva la metáfora y su sentido de encargo; «bajo el cuidado de» explicita la idea, pero suaviza la imagen original.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus sirvientes
  - sus esclavos
  lexicon: HALOT
  rationale: En este contexto narrativo, la relación de servicio doméstico/household attendants es la más probable y coincide con la decisión inglesa de no cargar el pasaje con esclavitud cuando no es el foco. «Siervos» conserva el tono bíblico y la subordinación funcional.
- source_word: עֵדֶר עֵדֶר לְבַדּוֹ
  english_pob_choice: each herd by itself
  chosen_spanish: cada rebaño aparte
  alternatives_spanish:
  - cada rebaño por sí mismo
  - rebaño por rebaño, aparte
  - cada hato aparte
  lexicon: HALOT
  rationale: La repetición distributiva expresa separación de grupo en grupo. «Cada rebaño aparte» condensa la fuerza distributiva y el valor de לְבַדּוֹ («separadamente/por sí solo») en un español natural. «Hato» sería posible, pero «rebaño» es más directo y transparente para el lector.
- source_word: עִבְרוּ לְפָנַי
  english_pob_choice: Pass on ahead of me
  chosen_spanish: Pasen delante de mí
  alternatives_spanish:
  - Pasen adelante de mí
  - Vayan delante de mí
  - Crucen delante de mí
  lexicon: HALOT
  rationale: עבר en este contexto de desplazamiento significa pasar delante/seguir adelante. «Pasen delante de mí» es idiomático en español y conserva la relación espacial; «crucen» introduciría una noción de cruce que el contexto no requiere.
- source_word: וְרֶוַח
  english_pob_choice: a space
  chosen_spanish: un espacio
  alternatives_spanish:
  - un intervalo
  - una separación
  - un hueco
  lexicon: HALOT
  rationale: רֶוַח denota espacio o intervalo. «Un espacio» es la opción más clara y sobria; «intervalo» preserva el matiz formal, pero suena menos natural en la orden directa.
- source_word: תָּשִׂימוּ
  english_pob_choice: put
  chosen_spanish: pongan
  alternatives_spanish:
  - pongan
  - coloquen
  - establezcan
  lexicon: HALOT
  rationale: שׂים es el verbo común «poner/colocar». En imperativo plural, «pongan» mantiene la sencillez y el mandato directo; «coloquen» sería un poco más formal.
- source_word: בֵּין עֵדֶר וּבֵין עֵדֶר
  english_pob_choice: between herd and herd
  chosen_spanish: entre rebaño y rebaño
  alternatives_spanish:
  - entre un rebaño y otro
  - entre cada rebaño
  - entre rebaño y rebaño
  lexicon: HALOT
  rationale: La repetición hebrea enfatiza la separación entre unidades. «Entre rebaño y rebaño» conserva esa repetición y el paralelismo; «entre un rebaño y otro» explicita el sentido distributivo, pero atenúa la forma del original.
theological_decisions:
- issue: Tratamiento de עֲבָדָיו y el peso de la subordinación social
  english_pob_reading: his servants; the bonded status is not theologically or narratively salient
  chosen_spanish_reading: sus siervos
  alternative_spanish_readings:
  - sus esclavos
  - sus sirvientes
  rationale: La escena describe personal de Jacob cumpliendo instrucciones logísticas; el pasaje no enfatiza esclavitud como tema teológico. «Siervos» conserva la subordinación y el registro bíblico sin introducir un énfasis social que el contexto no destaca.
  doctrine_reference: Contexto narrativo de Génesis 32; principio POB sobre δοῦλος/עבד por contexto.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa vigente que reordenó la primera cláusula para una sintaxis más natural: primero el objeto distributivo («cada rebaño aparte»), luego el complemento idiomático («en manos de sus siervos»). No se adoptó una paráfrasis más libre; se mantuvo la repetición hebrea en la segunda mitad para reflejar el paralelismo de בֵּין עֵדֶר וּבֵין עֵדֶר.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Siervos» se mantuvo por coherencia contextual con el uso no-teológico de עבד en esta narración.
  - Se conservó la repetición «rebaño y rebaño» para reflejar el énfasis distributivo del hebreo y evitar una normalización excesiva.
