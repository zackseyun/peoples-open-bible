translation:
  language: es
  text: Saúl se encontraba en las afueras de Gibeá[a], bajo el granado[b] que está en Migrón, y el pueblo que estaba con él era de unos seiscientos hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el extremo de Gibeá». El hebreo puede expresar la idea de borde, extremo o afueras del lugar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo el granado». En español, «granado» ya puede referirse al árbol, por lo que no es necesario añadir «árbol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב
  english_pob_choice: was staying
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba permaneciendo
  - se hallaba
  - estaba sentado
  lexicon: HALOT
  rationale: El participio puede expresar postura o permanencia. En este contexto narrativo, ‘estaba’ comunica bien el estado de ubicación continua sin forzar la imagen de una postura sentada, aunque esa opción sigue siendo posible.
- source_word: בִּקְצֵה
  english_pob_choice: at the outskirts of
  chosen_spanish: al borde de
  alternatives_spanish:
  - en los alrededores de
  - en el extremo de
  - a las afueras de
  lexicon: HALOT
  rationale: קצה denota ‘extremo/borde’. ‘Al borde de’ conserva la idea espacial sin introducir más específicamente ‘afueras’ si el contexto no exige un matiz urbano.
- source_word: הַגִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Gibeá
  alternatives_spanish:
  - la colina
  - Guibeá
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio del lugar asociado con Saúl; por eso se translitera. ‘La colina’ perdería la referencia geográfica concreta.
- source_word: תַּחַת הָרִמּוֹן
  english_pob_choice: under the pomegranate tree
  chosen_spanish: bajo el granado
  alternatives_spanish:
  - bajo el granado de granadas
  - debajo del árbol de granado
  - bajo el granado (árbol)
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘bajo el granado’, en español ‘granado’ ya puede designar el árbol, por lo que no es necesario añadir ‘árbol’. La supuesta alusión al árbol se mantiene sin sobrecargar la frase.
- source_word: אֲשֶׁר בְּמִגְרוֹן
  english_pob_choice: that is at Migron
  chosen_spanish: que está en Migrón
  alternatives_spanish:
  - que estaba en Migrón
  - que se halla en Migrón
  lexicon: HALOT
  rationale: La cláusula relativa describe la ubicación del granado. El presente descriptivo es natural en español para topónimos dentro de una narración pasada y sigue la práctica del POB en inglés.
- source_word: וְהָעָם אֲשֶׁר עִמּוֹ
  english_pob_choice: and the people who were with him
  chosen_spanish: y el pueblo que estaba con él
  alternatives_spanish:
  - y la gente que estaba con él
  - y las tropas que estaban con él
  - y los hombres que estaban con él
  lexicon: HALOT
  rationale: עָם es amplio y no debe reducirse sin necesidad a ‘tropas’ u ‘hombres’. ‘Pueblo’ conserva la amplitud del término hebreo, aunque en contexto militar puede referirse a su grupo de acompañantes.
- source_word: כְּשֵׁשׁ מֵאוֹת אִישׁ
  english_pob_choice: were about six hundred men
  chosen_spanish: era como seiscientos hombres
  alternatives_spanish:
  - eran unos seiscientos hombres
  - eran aproximadamente seiscientos hombres
  - eran como unos seiscientos hombres
  lexicon: HALOT
  rationale: El prefijo כ introduce aproximación; por eso ‘como seiscientos’ comunica la indeterminación del número. Se mantiene ‘hombres’ para reflejar אִישׁ tras numeral. El singular verbal con ‘el pueblo’ se ajusta al sujeto colectivo del español.
theological_decisions:
- issue: Forma verbal aproximada con sujeto colectivo
  english_pob_reading: were about six hundred men
  chosen_spanish_reading: era como seiscientos hombres
  alternative_spanish_readings:
  - eran unos seiscientos hombres
  - eran aproximadamente seiscientos hombres
  rationale: No hay una cuestión doctrinal fuerte, pero sí una decisión de concordancia y de fidelidad al matiz aproximativo del hebreo. El sujeto colectivo ‘el pueblo’ admite verbo singular en español; el comparativo ‘como’ preserva el valor de כ.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió ‘outskirts’ para בִּקְצֵה; en español se optó por ‘al borde de’ para mantener la idea de borde/extremo sin imponer una noción urbana demasiado específica. También se preservó la aclaración implícita sobre el granado sin añadir ‘árbol’ al texto principal.
  spanish_consistency_notes:
  - Se translitera Gibeah como ‘Gibeá’ y Migron como ‘Migrón’ para mantener consistencia con topónimos hebreos en español.
  - Se conservó ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó ‘siervos’ o ‘tropas’ porque el hebreo dice ‘pueblo’, término más amplio.
  - La aproximación numérica se marcó con ‘como’, coherente con el כ hebreo.
