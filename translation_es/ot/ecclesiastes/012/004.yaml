translation:
  language: es
  text: y las puertas que dan a la calle están cerradas cuando se debilita el sonido de la molienda, y uno se levanta al sonido de un pájaro, y todas las hijas del canto[a] son abatidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «todas las hijas del canto». Puede referirse a mujeres cantoras, a las facultades o capacidades de cantar, o a los sonidos asociados con el canto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסֻגְּרוּ
  english_pob_choice: are shut
  chosen_spanish: están cerradas
  alternatives_spanish:
  - están abiertas
  - se cierran
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante/pasivo; en español, «están cerradas» comunica bien ese estado. Se evita «se cierran» porque suena menos estático y puede sugerir proceso más que resultado.
- source_word: דְלָתַיִם
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las puertas dobles
  - las puertas de los labios
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «puertas» sin resolver en el texto principal la posible metáfora corporal. «Puertas» es fiel y natural en español.
- source_word: בַּשּׁוּק
  english_pob_choice: on the street
  chosen_spanish: de la calle
  alternatives_spanish:
  - en la calle
  - del mercado
  lexicon: HALOT
  rationale: «שׁוּק» puede referir calle o espacio público/mercado. «De la calle» mantiene la idea de puertas exteriores y evita especificar de más.
- source_word: בִּשְׁפַל קוֹל הַטַּחֲנָה
  english_pob_choice: when the sound of the grinding is low
  chosen_spanish: cuando el sonido de la molienda se vuelve bajo
  alternatives_spanish:
  - cuando el sonido del molino se apaga
  - cuando el sonido de la molienda se hace débil
  lexicon: HALOT
  rationale: Se conserva la noción de disminución del sonido. «Molienda» refleja mejor la acción verbal del hebreo que «molino», y «se vuelve bajo» expresa la lowness sin perder naturalidad.
- source_word: וְיָקוּם
  english_pob_choice: one rises
  chosen_spanish: uno se levanta
  alternatives_spanish:
  - él se levanta
  - se levanta
  lexicon: HALOT
  rationale: El hebreo es tercera persona singular genérica; «uno se levanta» preserva el valor indefinido y evita fijar un sujeto específico.
- source_word: לְקוֹל הַצִּפּוֹר
  english_pob_choice: at the sound of a bird
  chosen_spanish: al sonido de un pájaro
  alternatives_spanish:
  - al sonido del pájaro
  - al canto de un pájaro
  lexicon: HALOT
  rationale: El singular con artículo en hebreo puede sonar a «el pájaro», pero el contexto idiomático en español fluye mejor con «un pájaro», acorde con la revisión inglesa reciente.
- source_word: וְיִשַּׁחוּ
  english_pob_choice: are brought low
  chosen_spanish: son abatidas
  alternatives_spanish:
  - se inclinan
  - se humillan
  - se debilitan
  lexicon: HALOT
  rationale: «Abatidas» conserva la idea de ser puestas abajo o rebajadas y sirve para el sentido poético de debilitamiento o humillación sin decidir demasiado el referente físico.
- source_word: כָּל בְּנוֹת הַשִּׁיר
  english_pob_choice: all the daughters of song
  chosen_spanish: todas las hijas del canto
  alternatives_spanish:
  - todas las hijas de la canción
  - todas las cantoras
  - todos los sonidos del canto
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea literal en español. «Del canto» suena más amplio y poético que «de la canción», y mantiene abierta la tensión interpretativa documentada por POB.
theological_decisions:
- issue: Imagen poética de la vejez en Eclesiastés 12:4
  english_pob_reading: Preserve the poetic imagery literally rather than resolving each image into a specific bodily referent in the main text.
  chosen_spanish_reading: Conservar las imágenes poéticas sin identificarlas explícitamente en el texto principal.
  alternative_spanish_readings:
  - puertas = labios
  - molienda = dientes
  - hijas del canto = facultades vocales o sonidos del canto
  rationale: El pasaje se lee ampliamente como alegoría de la vejez, pero los correlatos exactos son discutidos. La redacción española mantiene la tensión hermenéutica y deja las identificaciones más específicas para notas o estudio.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «the bird» por «a bird» para mayor naturalidad. La redacción española adopta ese matiz con «un pájaro». También conserva la decisión del POB de no resolver en el texto principal las posibles metáforas corporales de «puertas», «molienda» y «hijas del canto».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin calcos innecesarios.
  - «Puertas», «molienda» y «hijas del canto» preservan la imaginería hebrea sin forzar una equivalencia interpretativa única.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, y no aparecen términos cristianizados que alteren el hebreo.
  - La puntuación coordina las cláusulas poéticas sin añadir conectores inexistentes en el original.
