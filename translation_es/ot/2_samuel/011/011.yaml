revisions:
- from: 'Urías dijo a David: «El arca, e Israel y Judá, están en refugios temporales; mi señor Joab y los siervos de mi señor están acampados en campo abierto. ¿Y yo he de ir a mi casa[a] para comer y beber y acostarme con mi esposa? ¡Vive Yahvé, y vive tu alma[b], no haré tal cosa!»'
  to: 'Urías dijo a David: «El arca, e Israel y Judá, están en refugios temporales[a], y mi señor Joab y los siervos de mi señor están acampados en el campo abierto. ¿He de ir yo a mi casa[b] para comer y beber y acostarme con mi esposa? Tan cierto como que tú vives, y como que vive tu alma[c], no haré tal cosa».'
  rationale: 'La revisión corrige la alteración principal del sentido al eliminar la mención no textual de Yahvé en el juramento y restaurar la fórmula dirigida a David. También alinea las notas con el audit trail inglés: refugios temporales, la pregunta retórica, y la cláusula de juramento con negación implícita. Se pulen dos detalles de español natural: ''en el campo abierto'' y ''¿He de ir yo...?'''
  reviewer_model: gpt-5.4
