translation:
  language: es
  text: 'Laban dijo: «No se hace así entre nosotros,[a] el dar a la menor[b] antes que a la mayor[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nuestra región» o «en nuestro lugar»; el hebreo dice literalmente «en nuestro lugar», refiriéndose a la costumbre local.
    reason: lexical_alternative
  - marker: b
    text: «Dar» aquí significa dar en matrimonio; el hebreo deja «en matrimonio» implícito.
    reason: lexical_alternative
  - marker: c
    text: O «la primogénita» o «la hija mayor»; «la mayor» sigue mejor el contraste comparativo entre las dos hermanas en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa naturalmente en español con «dijo». Mantiene la sencillez narrativa del hebreo sin añadir matices no presentes.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Laban
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: לֹא יֵעָשֶׂה כֵן
  english_pob_choice: It is not done this way
  chosen_spanish: No se hace así
  alternatives_spanish:
  - No es costumbre hacerlo así
  - Así no se hace
  lexicon: HALOT
  rationale: La pasiva impersonal en español comunica mejor la norma social/costumbre que una traducción más literal y pesada. «No se hace así» conserva el sentido de práctica aceptada o no aceptada.
- source_word: בִּמְקוֹמֵנוּ
  english_pob_choice: in our place
  chosen_spanish: en nuestro lugar
  alternatives_spanish:
  - en nuestra región
  - entre nosotros
  lexicon: HALOT
  rationale: «Lugar» conserva la concreción del hebreo מָקוֹם y su uso idiomático para costumbre local. «En nuestro lugar» es natural en español y deja abierta la referencia a ámbito local o comunitario.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - dar en matrimonio
  lexicon: HALOT
  rationale: El infinitivo de נתן se mantiene como «dar»; el contexto matrimonial está implícito, como en el hebreo, sin explicitarlo en el texto principal.
- source_word: הַצְּעִירָה
  english_pob_choice: the younger
  chosen_spanish: la menor
  alternatives_spanish:
  - la más joven
  - la menor de las dos
  lexicon: HALOT
  rationale: En este contexto la forma sustantivada femenina compara a dos hermanas. «La menor» expresa con naturalidad la relación de edad/orden entre ambas y evita un calco menos idiomático.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - antes de
  - por delante de
  lexicon: HALOT
  rationale: Aquí marca prioridad de orden, no espacio. «Antes que» es la forma española más clara para comparar dos elementos en secuencia.
- source_word: הַבְּכִירָה
  english_pob_choice: the older
  chosen_spanish: la mayor
  alternatives_spanish:
  - la mayor de edad
  - la primogénita
  lexicon: HALOT
  rationale: La revisión inglesa optó por «the older» para reflejar el valor comparativo en contexto. En español, «la mayor» es la correspondencia más natural y mantiene la comparación con «la menor».
theological_decisions:
- issue: Costo teológico/semántico de traducir הַבְּכִירָה como “primogénita” frente a una comparación de edad/orden
  english_pob_reading: the older
  chosen_spanish_reading: la mayor
  alternative_spanish_readings:
  - la primogénita
  - la mayor de las dos
  rationale: El contexto contrasta dos hermanas y la revisión del POB inglés prefirió el comparativo «the older» sobre «the firstborn». En español, «la mayor» reproduce ese contraste de forma natural sin introducir una lectura más técnica de primogenitura que el contexto inmediato no exige.
  doctrine_reference: Orden familiar y costumbre local en el relato; no implica doctrina específica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «the firstborn» por «the older» para reflejar de manera más natural el contraste comparativo de הַבְּכִירָה en este versículo. La versión española sigue esa revisión con «la mayor», manteniendo el paralelismo con «la menor» y conservando la sobriedad del enunciado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - Se evita explicitar «en matrimonio» en el texto principal porque el hebreo lo deja implícito y el audit trail inglés también lo preserva implícito.
  - Se usa «lugar» para מָקוֹם conforme al sentido de costumbre local, sin convertirlo en una paráfrasis geográfica más amplia.
