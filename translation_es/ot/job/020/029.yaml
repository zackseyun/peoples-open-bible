translation:
  language: es
  text: Esta es la porción de un hombre impío de Dios, la herencia asignada para él del Poderoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la herencia de su palabra». El hebreo puede leerse más literalmente como «su palabra» o «su dicho», pero aquí probablemente se refiere a lo que Dios ha dicho o decretado para él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este
  lexicon: HALOT
  rationale: El demostrativo introduce una sentencia conclusiva; en español, la cópula explícita es natural y mantiene el valor sentencioso del hebreo y del inglés POB.
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: lote
  alternatives_spanish:
  - porción
  - parte
  - heredad
  lexicon: HALOT
  rationale: El término apunta a una asignación o destino fijado. 'Lote' conserva la idea de asignación/juramento de suerte sin sonar demasiado devocional ni diluir el sentido judicial.
- source_word: אָדָם רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un hombre impío
  alternatives_spanish:
  - una persona impía
  - humanidad impía
  lexicon: HALOT
  rationale: El hebreo usa singular masculino con fuerza representativa. 'Hombre' conserva esa forma; 'impío' comunica la valoración moral del término רָשָׁע sin convertirlo en una frase más general de lo que exige el texto.
- source_word: מֵאֱלֹהִים
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  lexicon: HALOT
  rationale: La preposición expresa procedencia/origen en el marco del juicio divino. 'De parte de Dios' mantiene ese origen personal y judicial, con buena claridad en español.
- source_word: וְנַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión
  - la heredad
  lexicon: HALOT
  rationale: Se conserva el campo semántico de patrimonio asignado. 'Herencia' es la opción más idiomática y formal en español, y permite el paralelismo con 'lote'.
- source_word: אִמְרוֹ
  english_pob_choice: appointed for him
  chosen_spanish: asignada para él
  alternatives_spanish:
  - decretada para él
  - su palabra
  - su dicho
  lexicon: HALOT
  rationale: La base léxica puede remitir a 'palabra/dicho', pero el contexto de retribución hace que el sentido de lo dispuesto o designado sea preferible. 'Asignada' refleja esa decisión sin borrar la ambigüedad subyacente.
- source_word: מֵאֵל
  english_pob_choice: from the Mighty One
  chosen_spanish: de parte del Poderoso
  alternatives_spanish:
  - del Poderoso
  - de El
  lexicon: HALOT
  rationale: '''El'' es un título divino poético; ''el Poderoso'' conserva su fuerza y evita una transliteración innecesaria. También mantiene la variación poética respecto de ''Dios'' en el cola anterior.'
theological_decisions:
- issue: Singular masculino genérico en אָדָם רָשָׁע
  english_pob_reading: a wicked man
  chosen_spanish_reading: un hombre impío
  alternative_spanish_readings:
  - una persona impía
  - humanidad impía
  rationale: El hebreo es singular masculino y funciona de modo representativo. La traducción conserva esa forma para no neutralizar innecesariamente el texto, pero lo entiende como genérico, no restrictivo a un individuo concreto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Interpretación de אִמְרוֹ
  english_pob_reading: appointed for him
  chosen_spanish_reading: asignada para él
  alternative_spanish_readings:
  - su palabra
  - su dicho
  - decretada para él
  rationale: La lectura literal 'su palabra/dicho' es posible, pero en el paralelismo del versículo la referencia es al destino fijado del impío. 'Asignada' comunica esa idea sin exceder el alcance del texto; la ambigüedad léxica queda preservada en la nota.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3, 6
- issue: Repetición del origen divino en dos cola
  english_pob_reading: from God ... from the Mighty One
  chosen_spanish_reading: de parte de Dios ... de parte del Poderoso
  alternative_spanish_readings:
  - de Dios ... del Poderoso
  - de Dios ... de El
  rationale: 'El hebreo usa variación poética: אֱלֹהִים y אֵל. La versión española conserva la distinción para no aplanar el paralelismo, manteniendo un primer referente más directo (''Dios'') y un segundo más titulado/poético (''el Poderoso'').'
  doctrine_reference: Poética hebrea y coherencia léxica POB
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al preferir una formulación natural y formal de destino asignado, evitando sobreespecificar el valor de 'decretado' y manteniendo la ambigüedad léxica de אִמְרוֹ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים y 'el Poderoso' para אֵל, preservando la variación poética del hebreo.
  - '''Lote'' y ''herencia'' se mantienen en paralelo para reflejar la estructura de asignación del versículo.'
  - La nota se ancla en 'el' para señalar la alternativa de lectura sin interrumpir el flujo principal del texto.
