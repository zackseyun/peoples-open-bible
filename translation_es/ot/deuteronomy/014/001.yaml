translation:
  language: es
  text: Ustedes son hijos de Yahvé, su Dios[a]. No se hagan cortes, y no se rapen una calva entre sus ojos[b] por un muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «hijos»; la frase expresa filiación de pacto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «entre sus ojos»; es decir, en la frente.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos
  lexicon: HALOT
  rationale: El hebreo está en masculino plural y la POB inglesa preserva el valor de filiación covenantal sin neutralizarlo. En español, «hijos» comunica de forma natural esa relación de pertenencia y filiación; «hijos varones» sería demasiado explicativo y pesado en el verso.
- source_word: לַֽ/יהוָה
  english_pob_choice: of Yahweh / the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Yahvé
  - pertenecientes a Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto. La relación posesiva/covenantal del lamed se expresa con «de» en español, que es la opción más idiomática y fiel.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo pronominal indica posesión o relación de pacto; «su Dios» reproduce bien la fórmula, mientras que «Dios de ustedes» es posible pero menos compacto.
- source_word: תִתְגֹּֽדְד֗וּ
  english_pob_choice: cut yourselves
  chosen_spanish: se hagan cortes
  alternatives_spanish:
  - se corten
  - se hagan heridas
  lexicon: HALOT
  rationale: El verbo reflexivo comunica la automutilación ritual o de duelo. «Se hagan cortes» preserva el sentido sin sonar excesivamente abrupto; «se corten» también es posible, pero puede leerse más coloquial y menos preciso.
- source_word: תָשִׂ֧ימוּ קָרְחָ֛ה
  english_pob_choice: make a bald spot
  chosen_spanish: se hagan una calva
  alternatives_spanish:
  - se afeiten una calva
  - se hagan un baldío
  lexicon: HALOT
  rationale: La expresión hebrea describe una calva o parche rapado como señal de duelo. «Calva» es un equivalente natural y concreto en español; «se afeiten una calva» explica más de lo necesario.
- source_word: בֵּ֥ין עֵינֵי/כֶ֖ם
  english_pob_choice: between your eyes
  chosen_spanish: entre sus ojos
  alternatives_spanish:
  - entre sus ojos
  - en la frente
  lexicon: HALOT
  rationale: Se conserva la imagen literal del hebreo, tal como hace la POB inglesa, porque el giro es transparente y luego puede entenderse como la zona de la frente. «En la frente» interpreta, pero reduce la fuerza literal del texto.
- source_word: לָ/מֵֽת
  english_pob_choice: for the dead
  chosen_spanish: por un muerto
  alternatives_spanish:
  - por los muertos
  - en honor de un muerto
  lexicon: HALOT
  rationale: El singular hebreo puede entenderse de manera colectiva o representativa en el contexto funerario. «Por un muerto» mantiene la referencia al difunto sin forzar una pluralización; «por los muertos» suena más general.
theological_decisions:
- issue: Identidad covenantal de los destinatarios
  english_pob_reading: You are sons of Yahweh your God
  chosen_spanish_reading: Ustedes son hijos de Yahvé, su Dios
  alternative_spanish_readings:
  - Ustedes son hijos de Yahvé, su Dios
  - Ustedes son hijos de Yahvé, el Dios de ustedes
  rationale: Se preserva la filiación del pacto con lenguaje directo y reverente. No se sustituye por un término neutral como «hijos» entendido solo genéricamente; aquí el énfasis es relacional y covenantal, no meramente biológico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Prohibición de duelo ritual con automutilación
  english_pob_reading: Do not cut yourselves, and do not make a bald spot between your eyes for the dead.
  chosen_spanish_reading: No se hagan cortes, y no se hagan una calva entre sus ojos por un muerto.
  alternative_spanish_readings:
  - No se corten, y no se rapen una calva entre sus ojos por un muerto.
  - No se hagan cortes ni se rapen la cabeza por un muerto.
  rationale: La lectura mantiene la prohibición concreta de prácticas funerarias paganas o ritualizadas, sin suavizar el valor corporal del verbo. No se interpreta como mera aflicción interior, sino como una acción visible prohibida.
  doctrine_reference: Levítico 19:27; Deuteronomio 14:1
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo los marcadores de nota [a] y [b] directamente en el texto español y ajustando la redacción para que cada nota tenga anclaje exacto. No se introdujeron notas sin marcador ni marcadores sin nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton, coherente con la pauta del proyecto.
  - «Hijos» conserva el masculino plural del hebreo sin añadir neutralización innecesaria.
  - La frase «entre sus ojos» conserva la imagen hebrea y admite la aclaración nota al pie.
  - Se evitó «SEÑOR» y también «Cristo», que no corresponden a este verso.
