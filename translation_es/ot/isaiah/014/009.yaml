translation:
  language: es
  text: El Seol desde abajo se agita por ti, para salir a tu encuentro cuando llegas; despierta por ti a las sombras[a], a todos los jefes[b] de la tierra; hace levantar de sus tronos a todos los reyes de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los muertos», «los espíritus difuntos» o «los refaím» para el hebreo רְפָאִים.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los machos cabríos de la tierra», una metáfora para gobernantes o personajes prominentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  - el infierno
  lexicon: HALOT
  rationale: Conservo la transliteración para preservar el concepto hebreo del ámbito de los muertos sin importar asociaciones doctrinales posteriores de «infierno» ni reducirlo a «sepulcro».
- source_word: מִתַּחַת
  english_pob_choice: beneath
  chosen_spanish: desde abajo
  alternatives_spanish:
  - por debajo
  - debajo
  lexicon: HALOT
  rationale: La frase expresa dirección espacial descendente. «Desde abajo» mantiene la imagen poética y suena natural en español.
- source_word: רָגְזָה
  english_pob_choice: is stirred up
  chosen_spanish: se agita
  alternatives_spanish:
  - tiembla
  - se estremece
  - se conmueve
  lexicon: HALOT
  rationale: El verbo comunica conmoción/agitación. «Se agita» conserva la personificación activa de Sheol al recibir al rey que llega.
- source_word: לִקְרַאת בּוֹאֶךָ
  english_pob_choice: to meet your coming
  chosen_spanish: para recibir tu llegada
  alternatives_spanish:
  - para encontrarse con tu venida
  - al recibirte cuando llegues
  - para salir a tu encuentro
  lexicon: HALOT
  rationale: En español, «recibir tu llegada» expresa la idea de prepararse para el arribo con un tono sobrio y fiel al cuadro dramático.
- source_word: עוֹרֵר
  english_pob_choice: it rouses
  chosen_spanish: despierta
  alternatives_spanish:
  - despierta a
  - reanima
  - agita
  lexicon: HALOT
  rationale: El verbo presenta a Sheol causando que sus habitantes se alcen. «Despierta» comunica bien el efecto en español y conserva el movimiento figurado.
- source_word: רְפָאִים
  english_pob_choice: the shades
  chosen_spanish: los refaím
  alternatives_spanish:
  - las sombras
  - los muertos
  - los espíritus difuntos
  lexicon: HALOT
  rationale: Conservo el término hebreo para no borrar la tensión lexical documentada por el inglés POB. Dado que «refaím» puede referir poéticamente a los muertos, mantengo la forma transliterada en el texto y explico su sentido en nota.
- source_word: עַתּוּדֵי אָרֶץ
  english_pob_choice: the leaders of the earth
  chosen_spanish: los jefes de la tierra
  alternatives_spanish:
  - los líderes de la tierra
  - los machos cabríos de la tierra
  - los principales de la tierra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «machos cabríos de la tierra», una metáfora para personajes prominentes. «Jefes» comunica el valor figurado en español sin perder la referencia al poder político.
- source_word: הֵקִים
  english_pob_choice: it raises
  chosen_spanish: hace levantar
  alternatives_spanish:
  - levanta
  - pone en pie
  - hace surgir
  lexicon: HALOT
  rationale: El hiphil expresa causar que se pongan en pie. «Hace levantar» refleja la causación y encaja con la imagen de reyes que se alzan de sus tronos.
- source_word: מִכִּסְאוֹתָם
  english_pob_choice: from their thrones
  chosen_spanish: de sus tronos
  alternatives_spanish:
  - desde sus tronos
  - de sus asientos
  lexicon: HALOT
  rationale: «Tronos» es el equivalente natural para asientos reales y armoniza con la mención siguiente de reyes.
- source_word: כֹּל מַלְכֵי גוֹיִם
  english_pob_choice: all the kings of the nations
  chosen_spanish: todos los reyes de las naciones
  alternatives_spanish:
  - todos los reyes de los pueblos
  - cada rey de las naciones
  lexicon: HALOT
  rationale: Mantengo la formulación directa para conservar el alcance universal y la imagen política del pasaje.
theological_decisions:
- issue: Cómo renderizar שְׁאוֹל en un cuadro poético del mundo de los muertos
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - el infierno
  - el reino de los muertos
  rationale: La escena personifica a Sheol como un ámbito activo que recibe al soberbio caído. La transliteración evita cargar el texto con nociones posteriores de «infierno» y preserva la tensión bíblica original.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical/theological tension rather than smoothing it away.'
- issue: Cómo reflejar רְפָאִים sin resolverlo prematuramente como un término genérico
  english_pob_reading: the shades
  chosen_spanish_reading: los refaím
  alternative_spanish_readings:
  - las sombras
  - los muertos
  - los espíritus difuntos
  rationale: El inglés POB opta por «the shades» y deja la alternativa en nota. En español, mantener «refaím» conserva la ambigüedad poética y permite una nota explicativa sin perder la huella del hebreo.
  doctrine_reference: Preserve documented ambiguity in poetic underworld language; do not flatten to a single doctrinally loaded term.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail en inglés, sin aplicar revisiones posteriores. Se conserva la imagen personificada de Sheol y la ambigüedad poética de רְפָאִים, con una nota que explica la metáfora de עַתּוּדֵי אָרֶץ.
  spanish_consistency_notes:
  - Se usa «Sheol» como transliteración consistente con la política POB para שְׁאוֹל.
  - Se conserva «refaím» para respetar la tensión lexical del hebreo poético.
  - «Jefes de la tierra» funciona como equivalencia idiomática de una metáfora de poder y se aclara en nota.
  - La puntuación reproduce la estructura en dos miembros del verso con punto y coma, conforme al ritmo del original.
