translation:
  language: es
  text: Bendito en todo es nuestro Dios[a], que entregó a los que actuaron impíamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego suministrado para este versículo es inusualmente breve y fue marcado en los datos de origen como una discrepancia importante; esta traducción sigue esa redacción atestiguada y no reconstruye un texto más amplio de otras ediciones.
