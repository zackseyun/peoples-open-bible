    reason: lexical_alternative
  - marker: b
    text: Hebreo «en el corazón de un hombre». El singular «hombre» es representativo.
    reason: lexical_alternative
  revision_rationale: Se recomienda un ajuste menor para mejorar la naturalidad del español y alinearlo mejor con la fuerza semántica documentada del verbo hebreo. «Deprime» comunica con claridad el descenso interior causado por la ansiedad, mientras que las notas revisadas preservan la alternativa metafórica y el valor representativo del singular hebreo.
