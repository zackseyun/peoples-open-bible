  consult_excerpt: 16 The Gospel of Truth is a joy for those who’ve received grace
    from the Father of Truth, that they might know him through the power of the Word
    that came from the fullness – the one who’s in the thought and mind of the Father.
    They call him “Savior.” That’s the name of the work he’ll do to redeem those who
    had become 17 ignorant of the Father. And the term “the Gospel” is the revelation
    of hope, the discovery of those who search for him.
translation:
  text: The Gospel of Truth is joy for those who have received grace from the Father
    of Truth[a], so that they might know him through the power of the Word that came
    forth from the Pleroma—the one who is in the thought and the mind of the Father.
    He is called “Savior”; that is the name of the work he will do to save those who
    had become ignorant of the Father. And the name “Gospel” is the revelation of
    hope, the discovery for those who seek him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the word “Gospel”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ
  chosen: Gospel
  alternatives:
  - good news
  lexicon: Crum; Greek loan εὐαγγέλιον in Coptic
  rationale: Used here as a titular theological term; retaining “Gospel” preserves
    the text’s self-referential usage and early Christian resonance.
- source_word: ⲧⲙⲏⲉ
  chosen: truth
  alternatives: []
  lexicon: Crum
  rationale: Uncontested core meaning in Coptic; standard rendering.
- source_word: (ⲭⲁⲣⲓⲥ, implied) ⲛⲛⲉⲧⲛ̄ⲧⲁϣⲓ …
  chosen: grace
  alternatives:
  - favor
  - gift
  lexicon: Greek loan χάρις; Crum/BDAG
  rationale: The opening formula in this text includes ‘received grace.’ “Grace” reflects
    established semantic range and theological weight.
- source_word: ⲡⲓⲱⲧ
  chosen: Father
  alternatives: []
  lexicon: Crum
  rationale: Direct and consistent rendering of the divine title throughout the tractate.
- source_word: ⲧϭⲁⲙ
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: Crum
  rationale: Context favors the effective power by which knowing occurs; “power” is
    idiomatic and accurate.
- source_word: ⲡⲥⲁϫⲉ
  chosen: Word
  alternatives:
  - word
  - message
  lexicon: Crum
  rationale: While ⲥⲁϫⲉ is the common noun “word,” this passage personifies it in
    a Logos-like way. Capitalizing “Word” signals the theological usage without over-interpreting.
- source_word: ⲡⲡⲗⲏⲣⲱⲙⲁ
  chosen: Pleroma
  alternatives:
  - Fullness
  lexicon: Greek loan πλήρωμα; Crum/BDAG
  rationale: Valentinian technical term for the divine fullness; transliteration preserves
    the conceptual network better than “Fullness.”
- source_word: ⲛⲟⲩⲥ
  chosen: mind
  alternatives:
  - Nous
  lexicon: Greek loan νοῦς
  rationale: We render in English as “mind” for readability; the Greek loan is the
    philosophical term νοῦς; nuance noted in footnote.
- source_word: '(cognitive pair: ⲛⲟⲩⲥ / noetic term)'
  chosen: thought
  alternatives:
  - purpose
  - intention
  lexicon: Greek loan (e.g., ἐννόια/νόησις) reflected in Coptic
  rationale: The text pairs two cognitive terms for the Father; “thought and mind”
    preserves the duality without collapsing distinct nuances.
- source_word: ⲡⲥⲱⲧⲏⲣ
  chosen: Savior
  alternatives:
  - Deliverer
  lexicon: Greek loan σωτήρ; Crum/BDAG
  rationale: Title is explicit in the text; “Savior” is standard and matches the described
    work.
- source_word: ⲟⲩⲱⲛϩ ⲃⲁⲗ (phrase)
  chosen: revelation
  alternatives:
  - opening
  - unsealing
  lexicon: Crum
  rationale: Idiomatic Coptic expression for an opening/unsealing; in context, “revelation”
    renders both the act and result of disclosure.
- source_word: ⲕⲱⲧⲉ ⲛⲥⲱϥ
  chosen: seek him
  alternatives:
  - search for him
  lexicon: Crum
  rationale: Both are viable; “seek him” is concise and idiomatic while retaining
    the volitional sense.
technical_vocabulary_note: 'We retain several technical terms to preserve the tractate’s
  theological architecture: (1) Gospel for ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ, because the work self-identifies
  under this title; (2) Pleroma for ⲡⲡⲗⲏⲣⲱⲙⲁ, a core Valentinian term denoting the
  divine Fullness; (3) Savior for ⲡⲥⲱⲧⲏⲣ, a direct title; and (4) the cognitive pair
  as “thought and mind” to reflect the two distinct Greek-loan concepts (e.g., ennoia/noēsis
  and nous) without collapsing them. We capitalize “Word” to indicate the personified
  utterance proceeding from the Pleroma, acknowledging the Logos-like usage in context.'
textual_note: 'Primary base is Codex I, pp. 16–17. The opening line is clearly legible
  in its essentials (ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ ⲛ̄ⲧⲙⲏⲉ … ⲡⲉ), reading “The Gospel of Truth is joy.”
  The following sequence is partially degraded on p.16, but key lexemes are visible:
  ⲙ̄ⲡⲓⲱⲧ ⲛ̄ⲧⲉ ⲧⲙⲏⲉ (“from the Father of Truth”), ⲁⲧⲣⲟⲩⲥⲟⲩⲱⲛϥ (“that they might know
  him”), ⲧϭⲁⲙ (“power”), ⲡⲥⲁϫⲉ (“word/Word”), and ⲡⲡⲗⲏⲣⲱⲙⲁ (“Pleroma”). Page 17 supplies
  the titular repetition and the hope motif: ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ … ⲡⲟⲩⲱⲛϩ ⲃⲁⲗ ⲛ̄ⲧⲉ ⲧϩⲉⲗⲡⲓⲥ
  (“the Gospel is the revelation/opening of the hope”) and the seekers: ⲛⲛⲉⲉⲓⲉⲧⲕⲱⲧⲉ
  ⲛⲥⲱϥ (“those who seek him”). The cognitive pair is present as Greek-loan semantics;
  Codex I shows νοῦς (ⲛⲟⲩⲥ), and a second noetic term represented in the lineation
  near ⲟⲩϩⲣⲧⲉ/ⲡⲛⲟⲩϣⲡ; we render the pair as “thought and mind.” No Codex XII overlap
  fragments exist for this section.'
