base_translation:
  language: en
  yaml_path: translation/ot/proverbs/031/026.yaml
  text: She opens her mouth with wisdom[b][a], and the instruction of kindness is on her tongue.
  footnotes:
  - marker: a
    text: Or 'the law of kindness is on her tongue.' The Hebrew תּוֹרָה can mean 'law,' but here likely refers more broadly to instruction or teaching.
    reason: lexical_alternative
  - marker: b
    text: Or 'steadfast love,' 'mercy,' or 'faithful love' for 'kindness' (חֶסֶד), depending on context.
    reason: lexical_alternative
