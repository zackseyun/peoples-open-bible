  text: '1 Et factum est secunda nocte, et uidi somnium et ecce ascendebat de mari aquila, cui erant duodecim alae pennarum et capita tria.

    2 Et uidi et ecce expandebat alas suas in omnem terram, et omnes uenti caeli insufflabant ad eam et [nubes ad eam] colligebantur.

    3 Et uidi et de pennis eius nascebantur contrariae pennae, et ipsae fiebant in pennaculis minutis et modicis.

    4 Nam capita eius erant quiescentia, et medium caput erat maius aliorum capitum, sed et ipsa quiescebat cum eis.

    5 Et uidi et ecce aquila uolauit in pennis suis ut regnaret super terram et super eos qui habitant in ea.

    6 Et uidi quomodo subiecti erant ei omnia sub caelo, et nemo illi contradicebat neque unus de creatura, quae est super terram.

    7 Et uidi et ecce surrexit aquila super ungues suos et misit uocem pennis suis dicens:

    8 Nolite omnes simul uigilare, dormite unusquisque in loco suo et per tempus uigilate:

    9 Capita autem in nouissimo seruentur.

    10 Et uidi et ecce uox non exiebat de capitibus eius, sed de medietate corporis eius.

    11 Et numeraui contrarias pennas eius, et ecce ipsae erant octo.

    12 Et uidi et ecce a dextera parte surrexit una penna et regnauit super omnem terram.

    13 Et factum est cum regnaret et uenit ei finis et non apparuit, ita ut non appareret locus eius; et sequens exsurrexit et regnauit et ipsa multum tenuit tempus.

    14 ipsa multum tenuit tempus. Et factum est cum regnaret et

    15 ueniebat finis eius, ut non appareret sicut prior. Et ecce uox

    16 emissa est illi dicens: Audi tu quae toto tempore tenuisti terram,

    17 hoc annuntio antequam incipias non parere. Nemo post te

    18 tenebit tempus tuum, sed nec dimidium eius. Et leuauit se tertia et tenuit principatum sicut et priores et non apparuit et

    19 ipsa. Et sic contingebat omnibus alis singulatim principatum

    20 gerere et iterum nusquam conparere. Et uidi et ecce in tempore sequentes pennae erigebantur et ipsae a dextera parte, ut tenerent principatum; et ex his erant quae tenebant, sed

    21 statim non conparescebant. Nam et aliquae ex eis erigebantur,

    22 sed non tenebant principatum. Et uidi post haec et ecce non

    23 conparuerunt duodecim pennae et duo pennacula. Et nihil superauit in corpore aquilae, nisi tria capita quiescentia et sex

    24 pennacula. Et uidi et ecce de sex pennaculis diuisa sunt duo et manserunt sub capite, quod est ad dexteram partem; nam

    25 quattuor manserunt in loco suo. Et uidi et ecce hae subalares

    26 cogitabant se erigere et tenere principatus. Et uidi et ecce una erecta est, sed statim non conparuit ; Et secunda, et haec

    27 uelocius quam prior non conparuit. Et uidi et ecce duae quae

    28 superauerunt apud semetipsas cogitabant et ipsae regnare ; Et in eo cum cogitarent, ecce unum de quiescentium capitum,

    29 quod erat medium, euigilabat, hoc enim erat duorum capitum maius. Et uidi quomodo conplexa est duo capita secum,

    30 Et ecce conuersum est caput cum his qui cum eo erant et

    31 comedit duas subalares quae cogitabant regnare. Hoc autem

    32 caput percontinuit omnem terram et dominauit qui inhabitant in ea cum labore multo et potentatum tenuit orbis terrarum super omnes alas quae fuerunt. Et uidi post haec et ecce

    33 medium caput subito non conparuit et hoc sicut alae. Super-

    34 auerunt autem duo capita quae et ipsa regnauerunt super terram et super eos qui inhabitant in ea. Et uidi et ecce

    35 deuorauit caput a dextera parte illud quod est a laeua. Et audiui uocem dicentem mihi : conspice contra te et con-

    36 sidera quod uides. Et uidi et ecce sicut leo suscitatus de silua

    37 mugiens, et audiui quomodo emisit uocem hominis ad aquilam et dixit dicens : Audi tu et loquar ad te ; dicit altissimus tibi :

    38 Nonne tu es qui superasti de quattuor animalibus quae feceram

    39 regnare in saeculo meo, et ut per ea ueniret finis temporum

    40 meorum ? Et quartus ueniens †deuicit† omnia animalia quae transierunt, et potentatu tenens saeculum cum tremore multo et omnem orbem cum labore pessimo, et †inhabitabant† tot

    41 temporibus orbem terrarum cum dolo, Et iudicasti terram non

    42 cum ueritate ; Tribulasti enim mansuetos et laesisti quiescentes, odisti uerum dicentes et dilexisti mendaces, et destruxisti habitationes eorum qui fructificabant, et humiliasti muros eorum

    43 qui te non nocuerunt. Et ascendit contumelia tua ad altissimum et superbia tua ad fortem. Et respexit altissimus super sua tempora, et ecce finita sunt, et saecula eius conpleta sunt.

    44 et respexit Altissimus super sua tempora, et ecce finita sunt et saecula eius conpleta sunt.

    45 Propterea non apparens non appareas tu aquila et alae tuae horribiles et pennacula tua pessima et capita tua maligna et

    46 ungues tui pessimi et omne corpus tuum uanum, Vti refrigeret omnis terra et releuetur liberata de tua ui et speret iudicium et misericordiam eius qui fecit eam.'
