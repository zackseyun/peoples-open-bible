  text: 'Therefore thus says Yahweh: You have not listened to me[a], to proclaim liberty, each man to his brother and each man to his neighbor. Behold, I am proclaiming liberty for you, declares Yahweh—to the sword, to the pestilence[c][b], and to the famine—and I will make you a horror to all the kingdoms of the earth.'
  footnotes:
