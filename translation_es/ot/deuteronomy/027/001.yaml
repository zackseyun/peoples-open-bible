revisions:
- from: 'Entonces Moisés y los ancianos de Israel mandaron al pueblo[a], diciendo: «Guarden[b] todo el mandamiento[c] que hoy les[d] estoy mandando».'
  to: 'Entonces Moisés y los ancianos de Israel mandaron al pueblo, diciendo: «Guarda toda[a] el mandamiento que hoy te estoy mandando».[b]'
  rationale: Se ajusta el imperativo y los pronombres a la segunda persona singular colectiva para reflejar mejor שָׁמֹר y la forma del discurso hebreo. Se eliminan notas no sustentadas por el expediente inglés y se corrige la nota sobre הָעָם. Se conserva el singular colectivo de «mandamiento», con nota breve útil para el lector español.
