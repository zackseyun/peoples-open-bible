  text: וַ֠/יֹּאמֶר אַל נָ֞א יִ֤חַר לַֽ/אדֹנָ/י֙ וַ/אֲדַבְּרָ֣ה אַךְ הַ/פַּ֔עַם אוּלַ֛י יִמָּצְא֥וּ/ן שָׁ֖ם עֲשָׂרָ֑ה וַ/יֹּ֨אמֶר֙ לֹ֣א אַשְׁחִ֔ית בַּ/עֲב֖וּר הָ/עֲשָׂרָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/018/032.yaml
  text: Then he said[a], “Please, let not my lord be angry, and I will speak only this once more. Perhaps ten will be found there.” And he said[c][b], “I will not destroy it for the sake of the ten.”
  footnotes:
