revisions:
- from: 'Pero un hombre tensó su arco[a] al azar y hirió al rey de Israel entre las junturas de la armadura y la coraza[c]. Entonces dijo al conductor del carro: «Vuelve tu mano[b] y sáquenme del campamento, porque estoy herido».'
  to: 'Pero un hombre tensó su arco[a] al azar y golpeó al rey de Israel entre las junturas de la armadura y la coraza[c]. Entonces dijo al conductor del carro: «Vuelve tu mano[b] y sácame del campamento, porque estoy herido».'
  rationale: 'Se corrigen dos puntos necesarios para reflejar mejor el hebreo y el POB auditado: «golpeó» preserva la distinción entre el impacto inicial y la posterior afirmación «estoy herido», y «sácame» restaura el singular dirigido al conductor. También se mejora la nota c para que explique la incertidumbre real de la terminología de la armadura en vez de simplemente repetir la frase principal.'
