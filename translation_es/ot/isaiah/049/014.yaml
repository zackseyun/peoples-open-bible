translation:
  language: es
  text: 'Pero Sion[a] dijo: «Yahvé me ha abandonado; mi Señor me ha olvidado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Sion dijo» o «Y aun así Sion dijo»; la conjunción hebrea puede reflejar continuidad o contraste según el flujo del discurso.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo distingue dos designaciones divinas: «Yahvé me ha abandonado; mi Señor me ha olvidado». Algunas traducciones suavizan ambas con una sola forma de «Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: But Zion said
  chosen_spanish: Pero Sion dijo
  alternatives_spanish:
  - Y Sion dijo
  - Y sin embargo Sion dijo
  lexicon: HALOT
  rationale: El waw discursivo puede marcar continuidad o contraste. Aquí, como en el inglés POB, el giro se entiende mejor en español con una conjunción adversativa que conecte con el contexto previo de promesas y la queja de Sion. "Pero" preserva ese avance discursivo sin añadir más interpretación que la requerida.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Se conserva el nombre propio del texto hebreo. En español bíblico suele escribirse "Sion" sin tilde cuando se translitera el topónimo; "Jerusalén" sería una identificación interpretativa que el hebreo no usa aquí.
- source_word: עֲזָבַנִי
  english_pob_choice: has forsaken me
  chosen_spanish: me ha abandonado
  alternatives_spanish:
  - me ha desamparado
  - me ha dejado
  lexicon: HALOT
  rationale: עָזַב expresa 'abandonar, dejar, desamparar'. "Abandonado" comunica bien la carga afectiva y relacional de la queja; "dejado" sería más débil y menos marcado, y "desamparado" es válido pero algo más marcado en español religioso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: usar el nombre divino transliterado en español, no la sustitución por "SEÑOR". "Yahvé" es la forma establecida en español bíblico del proyecto y preserva el nombre personal del pacto.'
- source_word: וַאדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - mi Señor
  - el Soberano
  lexicon: HALOT
  rationale: Aquí el texto hebreo distingue el tetragrámaton de la segunda designación divina. Dado el auditable ajuste del inglés POB, el español mantiene esa distinción con "el Señor" para la segunda cláusula. "Mi Señor" no sigue la revisión final del auditrack y sugeriría una lectura posesiva que no está asentada en el texto final.
- source_word: שְׁכֵחָנִי
  english_pob_choice: has forgotten me
  chosen_spanish: me ha olvidado
  alternatives_spanish:
  - me ha olvidado por completo
  - me ha descuidado
  lexicon: HALOT
  rationale: שָׁכַח significa 'olvidar'. "Me ha olvidado" reproduce el valor perfecto de manera natural en español y evita ampliar el sentido hacia "descuidar", que sería más interpretativo.
theological_decisions:
- issue: Distinción entre יְהוָה y אֲדֹנָי en la queja de Sion
  english_pob_reading: Render יְהוָה as 'Yahweh' and the second divine designation as 'the Lord,' preserving the distinction in the Hebrew text.
  chosen_spanish_reading: Renderizar יְהוָה como "Yahvé" y la segunda designación como "el Señor", preservando la diferencia entre ambos referentes divinos.
  alternative_spanish_readings:
  - '"Yahvé ... mi Señor"'
  - '"Señor ... Señor"'
  rationale: El hebreo distingue claramente el nombre propio divino de la segunda designación. La versión española debe mantener esa tensión textual y no homogeneizar ambas formas en una sola traducción, porque la diferencia forma parte del sentido auditable del versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor discursivo de la conjunción inicial
  english_pob_reading: '"But Zion said" / "And Zion said" / "Yet Zion said"'
  chosen_spanish_reading: '"Pero Sion dijo"'
  alternative_spanish_readings:
  - '"Y Sion dijo"'
  - '"Y aun así Sion dijo"'
  rationale: La conjunción inicial no debe reducirse a una mera continuidad mecánica. En este contexto de lamento frente a promesas previas, "Pero" transmite mejor el contraste discursivo sin forzar una lectura teológica adicional.
  doctrine_reference: 'DOCTRINE.md: discourse particles and contextual rendering'
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó por una revisión que sustituyó "my Lord" por "the Lord" para reflejar la lectura definitiva de la segunda designación divina. Esta versión española sigue esa decisión revisada y conserva la distinción entre Yahvé y el Señor, sin volver a una lectura posesiva no respaldada por el estado final del auditrack.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el tetragrámaton, conforme al estándar del proyecto.
  - Se usa "el Señor" solo para la segunda designación divina del verso, para respetar la distinción hebrea.
  - Se translitera "Sion" sin modernizarla a "Jerusalén".
  - Se evita lenguaje más fuerte que el hebreo en "abandonado/olvidado"; no se introduce "desamparado" ni "descuidado" en el texto base.
