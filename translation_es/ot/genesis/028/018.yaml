translation:
  language: es
  text: Jacob se levantó temprano por la mañana, tomó la piedra que había puesto a su cabecera, la erigió como un pilar[a], y derramó aceite sobre su parte superior[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'piedra erguida'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'sobre su cabeza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se alzó temprano
  lexicon: HALOT
  rationale: El verbo expresa levantarse temprano; en español, 'se levantó temprano' es natural y conserva el énfasis temporal sin volver el texto arcaico.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La frase temporal hebrea se expresa con claridad en español como 'por la mañana', manteniendo el sentido adverbial del original.
- source_word: הָאֶבֶן
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la roca
  - el pedrusco
  lexicon: HALOT
  rationale: El sustantivo definido singular se traduce de forma directa como 'la piedra', sin generalizar ni suavizar el referente.
- source_word: אֲשֶׁר שָׂם מְרַאֲשֹׁתָיו
  english_pob_choice: that he had placed at his head
  chosen_spanish: que había puesto a la cabecera de su cama
  alternatives_spanish:
  - que había puesto junto a su cabeza
  - que había colocado en su cabecera
  lexicon: HALOT
  rationale: El hebreo alude a la piedra usada junto a la cabeza de Jacob al dormir; 'a la cabecera de su cama' hace explícita la referencia narrativa del contexto inmediato sin añadir un elemento ajeno al pasaje.
- source_word: וַיָּשֶׂם אֹתָהּ מַצֵּבָה
  english_pob_choice: he set it up as a pillar
  chosen_spanish: la levantó como una estela
  alternatives_spanish:
  - la erigió como una columna
  - la puso como un pilar
  lexicon: HALOT
  rationale: מַצֵּבָה puede referirse a una piedra erguida o estela. 'Estela' comunica mejor el objeto cultual/monumental del hebreo que 'pilar', que en español puede sonar arquitectónico o demasiado genérico.
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: estela
  alternatives_spanish:
  - piedra erguida
  - pilar
  lexicon: HALOT
  rationale: Se conserva la idea de una piedra erguida con función memorial/cultual. 'Estela' es la opción más cercana y culturalmente comprensible en español para ese objeto.
- source_word: וַיִּצֹק שֶׁמֶן
  english_pob_choice: poured oil
  chosen_spanish: derramó aceite
  alternatives_spanish:
  - vertió aceite
  - ungió con aceite
  lexicon: HALOT
  rationale: El verbo hebreo dice literalmente 'derramar'; por eso se prefiere 'derramó aceite'. 'Ungió' introduciría una interpretación no expresada por el verbo mismo.
- source_word: עַל רֹאשָׁהּ
  english_pob_choice: on its top
  chosen_spanish: sobre su parte superior
  alternatives_spanish:
  - sobre su cabeza
  - encima de ella
  lexicon: HALOT
  rationale: El hebreo dice 'sobre su cabeza', pero en español, tratándose de una piedra/estela, 'su parte superior' evita una literalidad extraña sin perder la imagen del acto.
theological_decisions:
- issue: Sentido cultual de מַצֵּבָה y del aceite derramado
  english_pob_reading: Render descriptively without importing later theological evaluation
  chosen_spanish_reading: Traducir de manera descriptiva, sin convertir la estela en un término interpretativo más cargado ni llamar 'unción' al derramamiento
  alternative_spanish_readings:
  - la erigió como un monumento
  - la ungió con aceite
  rationale: El versículo narra la acción de Jacob sin evaluar aún su legitimidad o significado teológico posterior. 'Estela' y 'derramó aceite' mantienen esa neutralidad descriptiva y respetan la tensión textual.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó repeticiones innecesarias para reflejar la secuencia rápida de verbos en hebreo; la redacción española conserva ese ritmo mediante una serie fluida de acciones sin repetir sujetos innecesariamente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología por defecto solo cuando el hebreo lo requiere; este versículo no contiene el nombre divino.
  - '''Estela'' se usa aquí en sentido de piedra erguida cultual/monumental, coherente con el valor de מַצֵּבָה en el texto.'
  - Se evitó 'ungió' para no desplazar el verbo de derramar con una interpretación litúrgica no explicitada.
