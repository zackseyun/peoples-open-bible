translation:
  language: es
  text: 'Pero Moisés dijo a los hijos de Gad y a los hijos de Rubén: «¿Sus hermanos[b] irán a la guerra[a] mientras ustedes se quedarán sentados aquí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la batalla». El hebreo dice literalmente «ir a la guerra», una expresión idiomática común para entrar en conflicto militar.
    reason: lexical_alternative
  - marker: b
    text: «Sus hermanos» se refiere a los israelitas de las otras tribus.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «dijo» comunica naturalmente la introducción del discurso sin necesidad de repetir una conjunción inicial.
- source_word: לִבְנֵי גָד וְלִבְנֵי רְאוּבֵן
  english_pob_choice: to the sons of Gad and to the sons of Reuben
  chosen_spanish: a los hijos de Gad y a los hijos de Rubén
  alternatives_spanish:
  - a los gaditas y a los rubenitas
  - a los descendientes de Gad y a los descendientes de Rubén
  lexicon: HALOT
  rationale: Se conserva la forma literal «hijos de» porque el hebreo nombra a los grupos tribales de ese modo; además, esta expresión mantiene la dirección directa del discurso a esos clanes.
- source_word: הַאַחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y parientes
  - sus compatriotas
  lexicon: HALOT
  rationale: El término es literalmente «sus hermanos». En contexto alude a los demás israelitas de las otras tribus; en español, «sus hermanos» preserva la imagen familiar sin neutralizarla.
- source_word: יָבֹאוּ
  english_pob_choice: shall ... go
  chosen_spanish: irán
  alternatives_spanish:
  - vendrán
  - entrarán
  lexicon: HALOT
  rationale: Con לַמִּלְחָמָה, el verbo expresa el ingreso a la acción bélica. «Irán» reproduce bien la pregunta retórica y permite que la frase siguiente complete la contraposición.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to war
  chosen_spanish: a la guerra
  alternatives_spanish:
  - a la batalla
  - al combate
  lexicon: HALOT
  rationale: «Guerra» refleja el sustantivo hebreo con su sentido amplio de conflicto militar. Es más natural que un calco como «a la guerra» y mantiene la contundencia del original.
- source_word: וְאַתֶּם תֵּשְׁבוּ פֹה
  english_pob_choice: while you sit here
  chosen_spanish: mientras ustedes se quedan aquí
  alternatives_spanish:
  - y ustedes se quedan aquí
  - mientras ustedes permanecen aquí
  - mientras ustedes están aquí
  lexicon: HALOT
  rationale: ישב puede significar sentarse, habitar o permanecer. En este contraste retórico, «se quedan aquí» transmite la idea de permanecer sin forzar un castellano demasiado literal con «sentarse».
theological_decisions:
- issue: Referencia a los demás israelitas como «hermanos»
  english_pob_reading: “Your brothers” refers to their fellow Israelites from the other tribes.
  chosen_spanish_reading: «Sus hermanos» se entiende como los israelitas de las otras tribus, no como hermanos biológicos inmediatos.
  alternative_spanish_readings:
  - «sus hermanos» sin aclaración contextual
  - «sus compatriotas»
  rationale: El contexto tribal define la referencia. Se conserva el parentesco fraterno porque el texto lo usa para subrayar la solidaridad pactal entre las tribus.
  doctrine_reference: Unidad del pueblo del pacto / solidaridad tribal en Israel
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «go to war» en vez de la forma más literal «go to the war» por naturalidad; en español se siguió el mismo principio, optando por «a la guerra». También se mantuvo la fuerza retórica del contraste entre ir a pelear y quedarse en el lugar.
  spanish_consistency_notes:
  - Se mantuvo «hijos de» para las designaciones tribales, en coherencia con el hebreo.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - Se preservó el tono de reproche de la pregunta retórica.
  - «A la guerra» conserva el valor idiomático del hebreo sin perder naturalidad en español.
