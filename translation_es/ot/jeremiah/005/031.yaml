  to: Los profetas profetizan falsamente[a], y los sacerdotes gobiernan por su autoridad, y a mi pueblo le gusta que sea así. Pero ¿qué harán cuando llegue su fin?[b]
  rationale: Se ajusta la cláusula sobre la reacción del pueblo para lograr un español más natural sin perder el sentido de aprobación de כֵן. Se corrige la nota b para reflejar fielmente la alternativa documentada en el English POB y en la decisión teológica sobre el sufijo femenino. También se traslada la nota de la frase difícil עַל יְדֵיהֶם al lugar donde realmente corresponde en español, ya que la nota actual anclada en 'falsamente' no coincide con el contenido de la nota.
