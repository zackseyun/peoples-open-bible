translation:
  language: es
  text: Y Samuel no volvió a ver a Saúl hasta el día de su muerte[a], porque Samuel estuvo de duelo por Saúl. Y Yahvé lamentó[b] haber hecho rey a Saúl sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el día en que murió».
    reason: lexical_alternative
  - marker: b
    text: O «se sintió apenado» o «se retractó». El verbo hebreo puede abarcar varios sentidos según el contexto; aquí expresa el pesar de Yahvé por haber hecho rey a Saúl.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא יָסַף ... לִרְאוֹת
  english_pob_choice: did not see ... again
  chosen_spanish: no volvió a ver
  alternatives_spanish:
  - no siguió viendo
  - no añadió a ver
  lexicon: HALOT
  rationale: La combinación negada de יָסַף con infinitivo expresa que la acción no se repitió. En español, «no volvió a ver» comunica de forma natural la idea de que Samuel no tuvo otro encuentro visual con Saúl, sin volver mecánicamente al hebreo.
- source_word: לִרְאוֹת אֶת שָׁאוּל
  english_pob_choice: see Saul
  chosen_spanish: ver a Saúl
  alternatives_spanish:
  - encontrarse con Saúl
  - comparecer ante Saúl
  lexicon: HALOT
  rationale: ראה es el verbo común «ver». Aquí conserva el sentido básico de no volver a tener contacto personal con Saúl; «ver a Saúl» mantiene la correspondencia léxica y resulta natural en español.
- source_word: עַד י֣וֹם מוֹת֔וֹ
  english_pob_choice: until the day of his death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta el día en que murió
  lexicon: HALOT
  rationale: Se conserva la construcción solemne y formal del hebreo con una frase igualmente natural en español.
- source_word: הִתְאַבֵּל
  english_pob_choice: mourned
  chosen_spanish: hizo duelo
  alternatives_spanish:
  - mantuvo luto
  - lloró
  lexicon: HALOT
  rationale: El verbo hitpael de אבל denota duelo/luto. «Hizo duelo» transmite con precisión el acto de lamentar la muerte o ruina de alguien, con un registro digno y bíblico.
- source_word: אֶל שָׁאוּל
  english_pob_choice: over Saul
  chosen_spanish: por Saúl
  alternatives_spanish:
  - sobre Saúl
  - con respecto a Saúl
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es אֶל, el español no usa normalmente «duelo sobre». «Por Saúl» expresa bien el motivo del duelo sin perder la referencia directa a Saúl.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: נִחָם
  english_pob_choice: regretted
  chosen_spanish: se arrepintió
  alternatives_spanish:
  - se lamentó
  - se sintió apenado
  - se retractó
  lexicon: HALOT
  rationale: El contexto («de haber hecho rey a Saúl») permite en español «se arrepintió» como equivalente del campo semántico de נִחָם. Aunque puede abarcar matices como «sentir pesar» o «relentirse», aquí se mantiene la tensión antropopática sin suavizarla.
- source_word: הִמְלִיךְ
  english_pob_choice: had made ... king
  chosen_spanish: de haber hecho rey a Saúl
  alternatives_spanish:
  - de haber establecido rey a Saúl
  - de haber puesto a Saúl como rey
  lexicon: HALOT
  rationale: La forma causativa de מלך significa «hacer rey». «Haber hecho rey a Saúl» es directo y conserva el contenido verbal del hebreo.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - para Israel
  lexicon: HALOT
  rationale: «Sobre Israel» preserva la imagen de gobierno real expresada por עַל en este contexto y corresponde al uso político-monárquico del texto.
theological_decisions:
- issue: Lenguaje antropopático aplicado a Yahvé en נִחָם
  english_pob_reading: regretted
  chosen_spanish_reading: se arrepintió
  alternative_spanish_readings:
  - se lamentó
  - se sintió apenado
  - se retractó
  rationale: 'Se mantiene la atribución personal y afectiva a Yahvé sin convertirla en una fórmula administrativa. «Se arrepintió» conserva la tensión teológica que el hebreo presenta: Yahvé reacciona con pesar respecto de haber hecho rey a Saúl. La nota evita cerrar el pasaje con una explicación doctrinal que no está en la frase misma.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms table for יְהוָה
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se mantiene la lectura de alta concordancia con el audit trail inglés y con el criterio del proyecto para el nombre divino y el verbo נִחָם.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva «Saúl» y «Israel» como nombres propios sin adaptación adicional.
  - «Hizo duelo» y «se arrepintió» mantienen un registro bíblico claro y no arcaizante.
  - La nota del marcador b recoge la tensión semántica de נִחָם sin resolverla de forma interpretativa.
