    issue: La nota [a] está anclada en «se propuso» en vez de en «ha cumplido».
    rationale: En la auditoría inglesa, la alternativa «carried out/executed» corresponde a בִּצַּע («ha cumplido»), no a זָמָם («planeó / se propuso»). Tal como está, la nota documenta el lexema equivocado.
  - severity: low
    issue: «Hizo que el enemigo se alegrara sobre ti» es demasiado calcado y poco idiomático en español.
    rationale: Aunque refleja la preposición hebrea, en español «sobre ti» con «alegrarse» suena extraño. Se necesita una expresión natural que mantenga el sentido de regocijo hostil, como «a costa de ti».
