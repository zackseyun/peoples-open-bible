    text: Or, more literally, 'and he came to his father’s house, to Ophrah.'
    reason: lexical_alternative
  - marker: b
    text: '''On one stone'' may refer to a single stone at which the executions were carried out, emphasizing that the seventy were killed together in one place.'
    reason: cultural_note
  - marker: c
    text: Or 'was left alive.'
    reason: lexical_alternative
