  yaml_path: translation/ot/psalms/060/000.yaml
  text: 'For the choirmaster: according to “Lily of Testimony.”[a] A miktam[b] of David[c], for teaching when he fought against Aram-naharaim and Aram-zobah, and Joab returned and struck down twelve thousand of Edom in the Valley of Salt.'
  footnotes:
  - marker: a
    text: Or possibly, “to the tune of ‘Lily of Testimony.’” The Hebrew likely preserves a musical or liturgical title, but its exact sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The term “miktam” is a Hebrew genre label of uncertain meaning; some take it as a musical or literary designation rather than translating it.
    reason: lexical_alternative
  - marker: c
    text: “Of David” may also mean “by David” or “for David”; the Hebrew construction can indicate authorship, association, or dedication.
    reason: alternative_reading
  - marker: d
    text: Or '“Lily of Testimony.” A miktam of David[a], for teaching when he fought against Aram-naharaim and Aram-zobah[c][b]'.
    reason: previous_rendering
