  - severity: medium
    issue: «Ashera» en lugar de «Aserá»
    rationale: La transliteración del nombre de la deidad en español eclesial y académico suele ser «Aserá». Esta forma mejora legibilidad y naturalidad sin alterar la decisión teológica del audit trail.
  - severity: low
