translation:
  language: es
  text: Y allí vimos a los Nephilim[a] —los hijos de Anac, de los Nephilim—, y parecíamos a nuestros propios ojos como saltamontes; y así éramos a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «gigantes» para «Nephilim». El término hebreo es incierto y por eso se deja transliterado en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּפִילִים
  english_pob_choice: the Nephilim
  chosen_spanish: los Nephilim
  alternatives_spanish:
  - los gigantes
  - los caídos
  lexicon: HALOT
  rationale: Se mantiene la transliteración porque el término hebreo es incierto y culturalmente cargado; traducirlo como «gigantes» interpretaría más de lo que el hebreo exige. En español, «Nephilim» preserva la misma cautela auditada en la POB inglesa.
- source_word: בְּנֵי עֲנָק
  english_pob_choice: the sons of Anak
  chosen_spanish: los hijos de Anac
  alternatives_spanish:
  - los descendientes de Anac
  lexicon: HALOT
  rationale: «Hijos de» reproduce de cerca la relación filial/clánica del hebreo. «Anac» conserva el nombre propio en forma española habitual, sin perder la referencia genealógica.
- source_word: מִן הַנְּפִלִים
  english_pob_choice: from the Nephilim
  chosen_spanish: de entre los Nephilim
  alternatives_spanish:
  - de los Nephilim
  - entre los Nephilim
  lexicon: HALOT
  rationale: El מן hebreo aquí puede sugerir procedencia o pertenencia respecto del grupo nombrado. «De entre» mantiene esa ambigüedad sin decidir en exceso si es origen directo o inclusión clánica, y suena natural en español.
- source_word: וַנְּהִי
  english_pob_choice: we seemed
  chosen_spanish: parecíamos
  alternatives_spanish:
  - nos volvimos
  - éramos
  lexicon: HALOT
  rationale: En la construcción idiomática con «en nuestros ojos», el sentido es perceptivo, no ontológico. «Parecíamos» comunica la auto-percepción con naturalidad en español.
- source_word: בְעֵינֵינוּ
  english_pob_choice: in our own eyes
  chosen_spanish: ante nuestros propios ojos
  alternatives_spanish:
  - en nuestros ojos
  - a nuestros propios ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la percepción o estimación propia. «Ante nuestros propios ojos» conserva la imagen idiomática y el énfasis reflexivo del posesivo.
- source_word: כַּחֲגָבִים
  english_pob_choice: like grasshoppers
  chosen_spanish: como saltamontes
  alternatives_spanish:
  - como langostas
  - como chapulines
  lexicon: HALOT
  rationale: El término puede referirse a insectos del tipo saltamontes/langosta. Se elige «saltamontes» por ser claro y natural en español en esta comparación de pequeñez.
- source_word: וְכֵן
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - y de ese modo
  - y por eso
  lexicon: HALOT
  rationale: «Y así» conserva el valor inferencial y la simetría con la cláusula anterior sin añadir causalidad no explicitada.
- source_word: בְעֵינֵיהֶם
  english_pob_choice: in their eyes
  chosen_spanish: ante los ojos de ellos
  alternatives_spanish:
  - a sus ojos
  - en su estimación
  lexicon: HALOT
  rationale: Se mantiene el paralelismo idiomático con la primera mitad del verso. «Ante los ojos de ellos» preserva la imagen hebrea y la relación de percepción externa.
theological_decisions:
- issue: Sentido de נְפִילִים
  english_pob_reading: Nephilim, left transliterated because the Hebrew term is uncertain; traditional 'giants' preserved as note
  chosen_spanish_reading: Nephilim, transliterado en el texto principal; «gigantes» solo como alternativa interpretativa
  alternative_spanish_readings:
  - gigantes
  - caídos
  rationale: No se resuelve la identidad del término hebreo más allá de lo que el texto permite. La transliteración evita imponer una interpretación tradicional específica y conserva la tensión lexical documentada en la POB inglesa.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve interpretive tension rather than resolving it'
- issue: Imagen de percepción en vez de afirmación ontológica
  english_pob_reading: we seemed in our own eyes ... and so we were in their eyes
  chosen_spanish_reading: parecíamos ante nuestros propios ojos ... y así éramos ante los ojos de ellos
  alternative_spanish_readings:
  - nos veíamos como
  - éramos como
  rationale: El hebreo describe percepción y evaluación, no una transformación literal. La traducción española conserva esa ambigüedad retórica sin convertirla en afirmación ontológica.
  doctrine_reference: Hebrew idiom and discourse sense
translation_notes:
  revision_awareness: 'Se siguió el registro auditado de la POB inglesa: transliteración de Nephilim por incertidumbre léxica, mantenimiento del paralelo idiomático de percepción («in our eyes / in their eyes»), y preferencia por una equivalencia óptima en español que conserve la tensión interpretativa documentada sin sobretraducir.'
  spanish_consistency_notes:
  - Se prefirió «Anac» como forma española breve y reconocible del nombre propio.
  - Se evitó «SEÑOR» o cualquier sustitución teológica no presente en el verso.
  - Se mantuvo la simetría «nuestros propios ojos / los ojos de ellos» para reflejar el paralelismo del hebreo.
  - «Saltamontes» se eligió por claridad; no introduce una interpretación doctrinal.
  - La puntuación con punto y coma ayuda a reflejar la estructura poética del hebreo sin fragmentar indebidamente la frase.
