id: PSS.16.14
reference: Psalms of Solomon 16:14
source:
  edition: lxx-swete-1909
  text: ἐὰν ἐλέγχηται ψυχήν ἐν χειρὶ ἀπωλίας αὐτοῦ; ἡ δοκιμασία σου ἐν σαρκὶ αὐτοῦ καὶ ἐν πενίᾳς.
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: If a person is rebuked by means of his ruin[b][a], your testing is in his flesh and in poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If a life is reproved in the power of his ruin.' The Greek of this clause is difficult.
    reason: alternative_reading
  - marker: b
    text: Or 'If a soul is rebuked by the hand of his destruction, your testing is in his flesh'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλέγχηται
  lemma: ἐλέγχω
  chosen: is rebuked
  alternatives:
  - is reproved
  - is exposed
  - is convicted
  lexicon: BDAG
  rationale: The verb ἐλέγχω commonly carries the sense of exposing or reproving wrongdoing. In this poetic context, 'is rebuked' preserves the corrective nuance without over-specifying legal condemnation.
- source_word: ψυχήν
  chosen: a soul
  alternatives:
  - a life
  - the soul
  lexicon: BDAG
  rationale: ψυχή can mean either 'soul' or 'life.' I chose 'soul' because the line contrasts inward affliction with bodily and material testing in the next clause; the broader semantic option 'life' is preserved as an alternative.
- source_word: ἐν χειρὶ
  chosen: by the hand of
  alternatives:
  - in the hand of
  - in the power of
  lexicon: BDAG
  rationale: This is a common idiom for agency or control. 'By the hand of' is slightly formal but transparent and keeps the metaphor visible.
- source_word: ἀπωλίας
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: ἀπώλεια denotes destruction or ruin. 'Destruction' is the most direct and broadly intelligible rendering, though the phrase as a whole remains syntactically difficult in this witness.
- source_word: δοκιμασία
  chosen: testing
  alternatives:
  - trial
  - proving
  lexicon: BDAG
  rationale: δοκιμασία refers to testing that proves or reveals quality. 'Testing' is clear modern English and preserves the evaluative sense.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: Per project policy, σάρξ is rendered 'flesh' in literal contexts unless a metaphorical sense is clearly demanded. Here the contrast is with poverty, so a literal bodily sense fits best.
- source_word: πενίᾳς
  chosen: poverty
  alternatives:
  - want
  - need
  lexicon: LSJ
  rationale: Despite the slightly irregular form in the supplied text, the sense is plainly 'poverty' or material lack. 'Poverty' is the most straightforward English equivalent.
