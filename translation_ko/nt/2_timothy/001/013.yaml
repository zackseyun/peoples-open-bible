  text: ὑποτύπωσιν ἔχε ὑγιαινόντων λόγων ὧν παρ’ ἐμοῦ ἤκουσας ἐν πίστει καὶ ἀγάπῃ τῇ ἐν Χριστῷ Ἰησοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/013.yaml
  text: Hold to the pattern of sound words that you heard from me, in the faith and love that are in Messiah Jesus.
translation:
  language: ko
  text: 그대는 나에게서 들은 건전한 말씀의 본을 굳게 지키십시오. 메시아 예수 안에 있는 믿음과 사랑으로 그리하십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑποτύπωσιν ἔχε
  english_pob_choice: Hold to the pattern
  chosen_korean: 본을 굳게 지키십시오
  alternatives_korean:
  - 본을 가지고 있으십시오
  - 모범을 따르십시오
  lexicon: BDAG
  rationale: ὑποτύπωσις는 「본·모형」을 가리키며, ἔχε(가지라)는 단순한 소유가 아니라 「잡고 있으라」의 명령. 「본을 굳게 지키십시오」가 그 강한 권면을 살린다.
- source_word: ὑγιαινόντων λόγων
  english_pob_choice: sound words
  chosen_korean: 건전한 말씀
  alternatives_korean:
  - 바른 말씀
  - 건강한 가르침의 말
  lexicon: BDAG
  rationale: ὑγιαίνω는 「건강한」을 본의로 하며, 목회서신에서 정통 교훈의 「온전함·건전함」을 가리키는 비유로 쓰인다. 「건전한」이 그 의미를 자연스럽게 담는다.
- source_word: ἐν πίστει καὶ ἀγάπῃ τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in the faith and love that are in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는 믿음과 사랑으로
  alternatives_korean:
  - 메시아 예수 안에 있는 믿음과 사랑 안에서
  - 메시아 예수께 대한 믿음과 사랑으로
  lexicon: BDAG
  rationale: 관사+전치사구 「τῇ ἐν Χριστῷ Ἰησοῦ」가 「믿음과 사랑」을 함께 한정한다. 한국어 「~안에 있는 ~으로」가 그 한정 구조와 도구적 의미를 함께 담는다.
