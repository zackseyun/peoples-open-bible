translation:
  language: es
  text: Así que edificó la casa y la terminó[a], y cubrió la casa con vigas y tablas de cedro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la techó con vigas y tablas de cedro», o «la revistió con vigas y tablas de cedro». El verbo hebreo puede referirse de manera más general a cubrir o panelar una estructura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El verbo hebreo בנה describe la acción de edificar/ construir una estructura. «Edificó» es natural en español bíblico y mantiene el sentido arquitectónico de forma fiel y digna.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: בית significa literalmente «casa». Aunque aquí alude al templo, «la casa» preserva la formulación hebrea y evita introducir una aclaración interpretativa no explícita en el verso.
- source_word: וַיְכַלֵּהוּ
  english_pob_choice: finished it
  chosen_spanish: la terminó
  alternatives_spanish:
  - la completó
  - la llevó a su fin
  lexicon: HALOT
  rationale: כלה expresa completar o terminar. «La terminó» es idiomático en español y conserva el referente al edificio, sin añadir matices ajenos.
- source_word: וַיִּסְפֹּן
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - techó
  - forró
  - revistió
  lexicon: HALOT
  rationale: ספן puede abarcar cubrir, revestir o panelar una construcción. «Cubrió» mantiene la amplitud semántica que la POB inglesa retuvo para no decidir prematuramente entre techo, revestimiento o panelado.
- source_word: גֵּבִים
  english_pob_choice: beams
  chosen_spanish: vigas
  alternatives_spanish:
  - rafters
  - maderos
  lexicon: HALOT
  rationale: El plural גֵּבִים se refiere a elementos estructurales de madera. «Vigas» es el término arquitectónico más claro y natural en español.
- source_word: שְׂדֵרֹת
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablones
  - hileras
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «boards» por ser más natural y precisa en este contexto constructivo. En español, «tablas» transmite bien esa misma idea material de piezas de madera trabajada.
- source_word: בָּאֲרָזִים
  english_pob_choice: of cedar
  chosen_spanish: de cedro
  alternatives_spanish:
  - con cedro
  - en cedro
  lexicon: HALOT
  rationale: La preposición marca material. «De cedro» es la solución española más idiomática para expresar de qué material estaban hechas las vigas y tablas.
translation_notes:
  revision_awareness: La POB inglesa revisó la segunda mitad del verso desde «rows of cedar» a «boards of cedar» para reflejar mejor שְׂדֵרֹת en este contexto constructivo. La versión española sigue esa decisión y mantiene la amplitud de וַיִּסְפֹּן con «cubrió», como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «la casa» para בית, conservando el hebraísmo arquitectónico sin sustituirlo por «templo».
  - Se evita «SEÑOR» o términos litúrgicos no presentes, porque el verso no contiene lenguaje divino.
  - «Cedro» se usa de forma consistente como material de construcción, en paralelo con la solución inglesa de material en genitivo.
  - La nota textual/lexical en la nota al pie recoge la alternativa de techado o revestimiento, ya que el hebreo de וַיִּסְפֹּן admite más de una lectura constructiva.
