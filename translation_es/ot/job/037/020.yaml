translation:
  language: es
  text: ¿Se le debe informar[a] que yo hablaría? Si un hombre habla[b], ciertamente sería tragado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a Él», refiriéndose a Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un hombre»; también podría ser «alguien» o «cualquiera» en sentido genérico.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo de este versículo es difícil. Otra posible traducción es: «¿Se le debe informar que yo hablo? ¿O si un hombre habla, sería tragado?»'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיְסֻפַּר
  english_pob_choice: Should it be told
  chosen_spanish: ¿Se le debe informar
  alternatives_spanish:
  - ¿Debe contársele
  - ¿Se le debe decir
  lexicon: HALOT
  rationale: El pasivo interrogativo de ספר se expresa mejor en español con una construcción impersonal/pasiva natural; «informar» conserva la idea de comunicar algo, y «se le debe» mantiene el matiz interrogativo retórico.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - a Él
  lexicon: HALOT
  rationale: El referente es Dios en el contexto, pero en español la forma clítica impersonal evita forzar mayúscula devocional y conserva la referencia indirecta del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que de
  - de que
  lexicon: HALOT
  rationale: Introduce el contenido de lo que se comunicaría; «que» es la equivalencia más natural y precisa en español.
- source_word: אֲדַבֵּר
  english_pob_choice: I would speak
  chosen_spanish: yo hablaría
  alternatives_spanish:
  - yo hablo
  - yo debería hablar
  lexicon: HALOT
  rationale: El imperfecto tiene aquí fuerza modal/hipotética; «hablaría» conserva ese valor contemplado en el contexto retórico.
- source_word: אִם אָמַר אִישׁ
  english_pob_choice: If a man speaks
  chosen_spanish: Si un hombre habla
  alternatives_spanish:
  - Si alguien habla
  - Si un hombre dijera
  lexicon: HALOT
  rationale: «אִישׁ» se mantiene como «un hombre» por fidelidad al singular masculino del hebreo; «habla» refleja la forma verbal breve que el audit trail inglés finalmente fijó, sin añadir material no sustentado.
- source_word: כִּי יְבֻלָּע
  english_pob_choice: surely he would be swallowed up
  chosen_spanish: ciertamente sería tragado
  alternatives_spanish:
  - seguramente sería tragado
  - sería consumido
  lexicon: HALOT
  rationale: El pasivo de בלע se conserva con la imagen corporal de «tragado», cercana a «swallowed up»; «ciertamente» reproduce la fuerza enfática que el inglés audit trail atribuye a כִּי en este contexto.
theological_decisions:
- issue: Referente divino de לוֹ
  english_pob_reading: Render לוֹ as 'to him' rather than capitalized 'to Him'
  chosen_spanish_reading: 'Mantener una referencia indirecta sin capitalización devocional: «se le»'
  alternative_spanish_readings:
  - a Él
  - para Él
  rationale: En español, capitalizar el pronombre para Dios introduciría una convención ajena al hebreo y no requerida por el texto; la referencia divina permanece por el contexto de la perícopa.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
- issue: Ambigüedad sintáctica del versículo
  english_pob_reading: Preserve the rhetorical and conditional ambiguity rather than smoothing it into a more interpretive paraphrase
  chosen_spanish_reading: Conservar la estructura interrogativa y condicional sin resolver la sintaxis de forma especulativa
  alternative_spanish_readings:
  - ¿Se le contaría que yo hablaría? Si un hombre habla, sería tragado.
  - ¿Se le anunciaría que yo hablaría? Si alguien habla, sería consumido.
  rationale: Job 37:20 es difícil y compacto; la versión española mantiene la tensión y no decide entre reconstrucciones que el hebreo no obliga a fijar.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Valor genérico de אִישׁ
  english_pob_reading: Hebrew 'a man'; alternatively, 'someone' or 'anyone' in a generic sense.
  chosen_spanish_reading: «un hombre» en el texto principal
  alternative_spanish_readings:
  - alguien
  - cualquiera
  rationale: Se conserva la forma masculina singular del hebreo; las alternativas inclusivas siguen disponibles, pero no reemplazan la huella léxica original en el texto principal.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que afina אָמַר y refuerza כִּי con «ciertamente». La redacción española evita depender mecánicamente del inglés anterior y conserva la dificultad sintáctica del hebreo, con los marcadores de nota ahora anclados en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero en este versículo no aparece un nombre divino explícito; la referencia pronominal se deja contextual.
  - «Tragado» conserva la imagen verbal de בלע y evita diluirla en «consumido» sin necesidad.
  - La sintaxis española busca ser publicable y natural sin resolver la ambigüedad hebrea del versículo.
