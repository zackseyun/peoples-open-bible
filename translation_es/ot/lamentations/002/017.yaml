base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/017.yaml
  text: Yahweh has done what he planned[a]; he has fulfilled his word, which he commanded from days of old. He has torn down and has not shown pity; he has made the enemy rejoice over you[c][b]; he has exalted the horn of your foes.
  footnotes:
