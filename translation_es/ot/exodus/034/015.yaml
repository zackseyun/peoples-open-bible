translation:
  language: es
  text: No sea que hagas un pacto con los habitantes de la tierra, y ellos se prostituyan[a] tras sus dioses y sacrifiquen a sus dioses, y alguno de ellos te invite[b], y comas de su sacrificio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «jueguen a la prostituta tras sus dioses». El hebreo usa la imagen de infidelidad sexual para la idolatría.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «y él te invite»; el singular probablemente tiene sentido distributivo: «alguno de ellos te invite».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y comas de su sacrificio», es decir, comida asociada con su ofrenda sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - no sea que ocurra que
  lexicon: HALOT
  rationale: En español, «No sea que» transmite bien la advertencia preventiva del hebreo y conserva el matiz de posible consecuencia indeseada.
- source_word: תִּכְרֹת בְּרִית
  english_pob_choice: make a covenant
  chosen_spanish: hagas un pacto
  alternatives_spanish:
  - hagas un convenio
  - entres en un pacto
  lexicon: HALOT
  rationale: «Hacer un pacto» es natural en español y conserva la idea del idiomático hebreo sin volverlo excesivamente literal con «cortar».
- source_word: לְיוֹשֵׁב הָאָרֶץ
  english_pob_choice: with the inhabitants of the land
  chosen_spanish: con los habitantes de la tierra
  alternatives_spanish:
  - con los moradores de la tierra
  - con los residentes de la tierra
  lexicon: HALOT
  rationale: «Habitantes de la tierra» reproduce con claridad el referente colectivo del hebreo y funciona bien en español bíblico moderno.
- source_word: וְזָנ֣וּ אַחֲרֵי אֱלֹהֵיהֶם
  english_pob_choice: and they prostitute themselves after their gods
  chosen_spanish: y ellos se prostituyan tras sus dioses
  alternatives_spanish:
  - y ellos se prostituyan en pos de sus dioses
  - y ellos cometan infidelidad tras sus dioses
  lexicon: HALOT
  rationale: Se conserva la metáfora sexual de infidelidad del hebreo. «Tras sus dioses» sigue de cerca el valor direccional de אַחֲרֵי sin perder inteligibilidad; «prostituyan» mantiene la fuerza del verbo זנה.
- source_word: וְזָבְחוּ לֵאלֹהֵיהֶם
  english_pob_choice: and sacrifice to their gods
  chosen_spanish: y sacrifiquen a sus dioses
  alternatives_spanish:
  - y ofrezcan sacrificios a sus dioses
  - y inmolen a sus dioses
  lexicon: HALOT
  rationale: «Sacrifiquen a sus dioses» es directo y fiel al verbo sacrificial, sin añadir elementos no presentes en el hebreo.
- source_word: וְקָרָא לְךָ
  english_pob_choice: and one of them invites you
  chosen_spanish: y alguno de ellos te invite
  alternatives_spanish:
  - y uno de ellos te invite
  - y él te invite
  lexicon: HALOT
  rationale: El singular hebreo puede tener sentido distributivo; «alguno de ellos» hace explícito en español ese valor sin imponer un sujeto colectivo uniforme.
- source_word: וְאָכַלְתָּ מִזִּבְחֽוֹ
  english_pob_choice: and you eat from his sacrifice
  chosen_spanish: y comas de su sacrificio
  alternatives_spanish:
  - y comas de su ofrenda
  - y comas de lo sacrificado
  lexicon: HALOT
  rationale: «De su sacrificio» mantiene la proximidad formal al hebreo y deja abierta la referencia al alimento asociado con la víctima sacrificial, como en el audit trail inglés.
theological_decisions:
- issue: Metáfora de infidelidad sexual aplicada a la idolatría
  english_pob_reading: Retain the metaphor explicitly with 'prostitute themselves' rather than flattening to 'go astray' or 'commit idolatry.'
  chosen_spanish_reading: Conservar explícitamente la metáfora con «se prostituyan» en lugar de suavizarla a «se aparten» o «practiquen idolatría».
  alternative_spanish_readings:
  - se desvíen tras sus dioses
  - se aparten tras sus dioses
  - cometan idolatría tras sus dioses
  rationale: El hebreo usa intencionalmente lenguaje de infidelidad sexual para describir la idolatría; la traducción española debe preservar esa carga teológica y retórica.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor distributivo del singular en «וְקָרָא לְךָ»
  english_pob_reading: Render distributively as 'one of them invites you.'
  chosen_spanish_reading: Expresar el singular distributivo con «alguno de ellos te invite».
  alternative_spanish_readings:
  - uno de ellos te invite
  - él te invite
  rationale: El hebreo singular no obliga a un individuo específico; en español, «alguno de ellos» comunica bien la invitación posible de cualquier miembro del grupo y evita perder el valor distributivo.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: Se mantuvo alta concordancia con el audit trail inglés; no se aplicaron revisiones posteriores, y la versión inglesa más reciente quedó sin cambios. La redacción española sigue la misma decisión de conservar la advertencia, la metáfora de prostitución idolátrica, el valor distributivo del singular y la ambigüedad de «su sacrificio».
  spanish_consistency_notes:
  - Se usa «dioses» para אֱלֹהֵי־הֶם conforme al plural del texto hebreo.
  - «No sea que» conserva el matiz preventivo de פֶּן.
  - Se mantuvo «sacrificio» en singular para reflejar מִזִּבְחוֹ, dejando en nota la posibilidad de referirse a la comida ligada a la ofrenda.
  - La puntuación separa las cláusulas como advertencias encadenadas, siguiendo la sintaxis hebrea y el patrón del texto inglés auditado.
