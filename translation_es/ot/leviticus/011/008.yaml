revisions:
- from: No comerán nada de su carne[a], ni tocarán sus cadáveres; son impuros para ustedes.
  to: No comerán nada de su carne[a], ni tocarán sus cuerpos muertos; son inmundos para ustedes.
  rationale: Se revisa 'cadáveres' a 'cuerpos muertos' para evitar una referencia que en español suele sonar humana y para reflejar mejor נְבֵלָה en contexto animal. Se ajusta la nota para preservar la alternativa léxica con precisión. Se cambia 'impuros' a 'inmundos' por mejor adecuación al registro ritual de Levítico y mayor estabilidad terminológica en este contexto.
