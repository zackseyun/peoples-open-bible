translation:
  language: es
  text: Todos los hijos de Pérez que vivían en Jerusalén eran cuatrocientos sesenta y ocho hombres valientes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hombres de valor”. La expresión hebrea puede designar hombres distinguidos por fuerza, capacidad o valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - La totalidad de
  - Todos los
  lexicon: HALOT
  rationale: El valor totalizador/distributivo introduce naturalmente el recuento completo del grupo. En español, «Todos» comunica con claridad ese sentido de totalidad en un registro de censo.
- source_word: בְּנֵי פֶרֶץ
  english_pob_choice: the sons of Perez
  chosen_spanish: los hijos de Pérez
  alternatives_spanish:
  - los descendientes de Pérez
  lexicon: HALOT
  rationale: La expresión genealógica se puede entender como descendientes, pero «los hijos de Pérez» conserva más de cerca la construcción hebrea y sigue siendo natural en español bíblico.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who lived
  chosen_spanish: que vivían
  alternatives_spanish:
  - que habitaban
  - que residían
  lexicon: HALOT
  rationale: El participio en contexto de asentamiento expresa residencia. «Vivían» es idiomático y mantiene el sentido de población asentada sin cargar con un tono demasiado arcaico.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Correspondencia locativa directa con el nombre propio de la ciudad.
- source_word: אַרְבַּע מֵאוֹת שִׁשִּׁים וּשְׁמֹנָה
  english_pob_choice: four hundred sixty-eight
  chosen_spanish: cuatrocientos sesenta y ocho
  alternatives_spanish:
  - '468'
  lexicon: HALOT
  rationale: Se mantiene la redacción normal de los numerales en español en vez de cifras, como en la traducción inglesa de referencia.
- source_word: אַנְשֵׁי חָיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres capaces
  - hombres esforzados
  lexicon: HALOT
  rationale: La frase puede denotar fuerza, capacidad o valor. En español, «hombres valientes» conserva el matiz encomiástico y suena natural en un registro bíblico actual; se preserva la alternativa semántica en nota.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio respecto del borrador anterior; por eso esta propuesta sigue de cerca el juicio lexical ya auditado para «אַנְשֵׁי חָיִל» y mantiene la estructura del registro censal sin añadir matices no respaldados por el texto.
  spanish_consistency_notes:
  - Se conserva el patrón genealógico «los hijos de Pérez» para alinear con el hebreo y con el uso consistente de genealogías en el proyecto.
  - «Vivían» evita un calco demasiado rígido de «dwelt» y mantiene el sentido de residencia estable en Jerusalén.
  - El numeral se escribe con palabras por coherencia editorial en esta clase de versículos listados.
  - No se introduce ninguna nota teológica porque el verso es puramente censal y no presenta una decisión doctrinal específica.
