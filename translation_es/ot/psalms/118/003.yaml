translation:
  language: es
  text: 'Que los de la casa de Aarón digan ahora: «Su amor fiel[a] perdura para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Su fidelidad de pacto perdura para siempre». El hebreo חֶסֶד (jesed) puede abarcar amor fiel, misericordia o fidelidad de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמְרוּ
  english_pob_choice: Let ... say
  chosen_spanish: Que ... diga
  alternatives_spanish:
  - Diga ahora
  - Que ... digan
  lexicon: HALOT
  rationale: El imperfecto qal plural en este refrán funciona como exhortación litúrgica. En español, una construcción con «Que» expresa mejor el valor jussivo/convocatorio que un futuro simple.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - ciertamente
  lexicon: HALOT
  rationale: La partícula añade urgencia o insistencia en una convocatoria pública. «Ahora» mantiene ese matiz sin sonar demasiado cortés o ajeno al tono del salmo.
- source_word: בֵית אַהֲרֹן
  english_pob_choice: the house of Aaron
  chosen_spanish: la casa de Aarón
  alternatives_spanish:
  - la casa de Aarón
  - el linaje de Aarón
  - la familia de Aarón
  lexicon: HALOT
  rationale: La expresión constructa designa corporativamente al grupo sacerdotal. «La casa de Aarón» conserva el idiomatismo bíblico y su paralelismo con el versículo siguiente.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: perdura para siempre
  alternatives_spanish:
  - permanece para siempre
  - es para siempre
  - dura para siempre
  lexicon: HALOT
  rationale: El hebreo expresa duración ilimitada. «Perdura para siempre» comunica bien la continuidad y evita una formulación demasiado literal o rígida en español.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su fidelidad de pacto
  lexicon: HALOT
  rationale: חֶסֶד abarca amor leal, misericordia y fidelidad pactal. «Amor leal» preserva la amplitud semántica sin reducir el término solo a emoción o solo a fidelidad jurídica.
theological_decisions:
- issue: Renderizar חֶסֶד en una fórmula litúrgica de alabanza
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - fidelidad de pacto
  - amor constante
  rationale: La frase celebra la lealtad pactal duradera de Dios. «Amor leal» mantiene la tensión entre afecto y fidelidad, sin estrechar el sentido a una sola faceta doctrinal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto inglés revisado eliminó «For» para reflejar mejor el hebreo como estribillo natural. En español, se evitó introducir un «porque» o «pues» equivalente, manteniendo la frase como exhortación directa con el contenido confesional implícito.
  spanish_consistency_notes:
  - Se mantuvo «Aarón» como nombre propio bíblico estándar en español.
  - Se usó «amor leal» para חֶסֶד en coherencia con la amplitud semántica indicada por el audit trail, dejando una nota con la alternativa de «fidelidad de pacto».
  - La puntuación conserva el carácter de refrán citado, con dos puntos y comillas para introducir la confesión.
