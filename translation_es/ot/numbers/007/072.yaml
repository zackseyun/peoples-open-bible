translation:
  language: es
  text: En el undécimo día, el líder[a] de los hijos de Aser era Paguiel hijo de Ocrán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el líder de los hijos de Aser». Esto señala al jefe tribal que representaba a Aser.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/יוֹם ... י֔וֹם
  english_pob_choice: On the eleventh day
  chosen_spanish: En el undécimo día
  alternatives_spanish:
  - En el día once
  - En el onceavo día
  lexicon: HALOT
  rationale: La construcción hebrea marca un día específico dentro de la secuencia narrativa. En español, «en el undécimo día» comunica de manera natural el valor ordinal sin volver la frase rígida o redundante.
- source_word: עַשְׁתֵּי עָשָׂר
  english_pob_choice: eleventh
  chosen_spanish: undécimo
  alternatives_spanish:
  - onceavo
  - día once
  lexicon: HALOT
  rationale: Aquí el numeral funciona como ordinal. «Undécimo» es la forma más clara y digna en español bíblico contemporáneo; evita la ambigüedad de «onceavo» en algunos registros y conserva el sentido ordinal del hebreo.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  - jefe tribal
  lexicon: HALOT
  rationale: En el contexto de Números 7, נָשִׂיא designa al representante reconocido de la tribu. «Líder» refleja bien esa función sin introducir connotaciones monárquicas o cortesanas que «príncipe» podría sugerir en español.
- source_word: לִ/בְנֵי אָשֵׁר
  english_pob_choice: of the sons of Asher
  chosen_spanish: de los hijos de Aser
  alternatives_spanish:
  - de los descendientes de Aser
  - de la tribu de Aser
  - de Aser
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo («hijos de») porque forma parte de la designación tribal del texto. «Aser» es la transliteración española usual del nombre de la tribu.
- source_word: פַּגְעִיאֵל
  english_pob_choice: Pagiel
  chosen_spanish: Paguiel
  alternatives_spanish:
  - Pagiel
  lexicon: HALOT
  rationale: Se adapta la transliteración al uso fonético español más natural, con «gu» para mantener el valor oclusivo de la consonante velar antes de «e». Esto favorece la pronunciación sin alterar el nombre propio.
- source_word: בֶּן עָכְרָן
  english_pob_choice: son of Ocran
  chosen_spanish: hijo de Ocrán
  alternatives_spanish:
  - hijo de Ocran
  - ben Ocrán
  lexicon: HALOT
  rationale: El patronímico בֶּן se traduce de forma directa como «hijo de». Se acentúa «Ocrán» para reflejar la prosodia española y mantener la transliteración del nombre propio.
theological_decisions:
- issue: Designación tribal de נָשִׂיא
  english_pob_reading: leader of the sons of Asher refers to the tribal chief representing Asher
  chosen_spanish_reading: líder de los hijos de Aser, es decir, el jefe representativo de la tribu
  alternative_spanish_readings:
  - príncipe de los hijos de Aser
  - jefe de la tribu de Aser
  rationale: No hay tensión doctrinal, pero sí una decisión de matiz léxico. «Líder» mantiene la función representativa indicada en el audit trail inglés y evita cargar el término con resonancias aristocráticas ajenas al contexto.
  doctrine_reference: Números 7; organización tribal de Israel
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios aplicados y el último pase quedó sin modificaciones; por tanto, la versión española sigue de cerca la lectura estable del original, sin introducir variantes textuales ni reinterpretaciones.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita indirecta que requiera esa decisión.
  - Se prefirió «hijos de Aser» para conservar la fórmula tribal del hebreo y la coherencia interna con otras listas censales y de dedicación.
  - 'Los nombres propios se transliteran de forma española habitual: Paguiel, Ocrán, Aser.'
  - No se añadió puntuación interpretativa más allá de la necesaria para una frase narrativa breve.
