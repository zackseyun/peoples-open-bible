translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: aún se sentarán hombres mayores y mujeres mayores en las calles[a] de Jerusalén, cada uno con su bastón en la mano, por la avanzada edad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las plazas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética estándar; «Así dice» conserva el tono solemne y directo sin arcaísmo innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los anfitriones
  - de las huestes
  lexicon: HALOT
  rationale: En español, «los ejércitos» comunica de manera clara y reverente la idea del título divino; «huestes» sería más tradicional pero menos inmediato para lectura pública.
- source_word: עֹד
  english_pob_choice: yet
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - de nuevo
  lexicon: HALOT
  rationale: Aquí expresa continuidad futura/restauración; «aún» conserva bien la idea de que esta escena volverá a verse.
- source_word: יֵשְׁבוּ
  english_pob_choice: will ... sit
  chosen_spanish: se sentarán
  alternatives_spanish:
  - morarán
  - permanecerán sentados
  lexicon: HALOT
  rationale: En este contexto urbano y visual, el verbo concreto «sentarse» reproduce la escena con naturalidad; «morarán» sería demasiado general.
- source_word: זְקֵנִים וּזְקֵנוֹת
  english_pob_choice: Old men and old women
  chosen_spanish: los ancianos y las ancianas
  alternatives_spanish:
  - hombres mayores y mujeres mayores
  - viejos y viejas
  lexicon: HALOT
  rationale: El hebreo nombra varones y mujeres de edad avanzada, no un cargo de «ancianos» eclesiales. En español, el binomio «los ancianos y las ancianas» es natural y mantiene la referencia a edad.
- source_word: בִּרְחֹבוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los espacios abiertos
  lexicon: HALOT
  rationale: «Calles» comunica bien el espacio público urbano y mantiene la imagen. La alternativa «plazas» queda implícitamente preservada en nota por la amplitud semántica de רחובות.
- source_word: וְאִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - y cada hombre
  - y cada persona
  lexicon: HALOT
  rationale: En construcción distributiva, אִישׁ funciona como «cada uno». «Cada uno» evita la repetición masculina y reproduce el sentido distributivo.
- source_word: מִשְׁעַנְתּוֹ
  english_pob_choice: staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cayado
  - apoyo
  lexicon: HALOT
  rationale: La imagen es la de un apoyo para la vejez; «bastón» es el equivalente más natural en español moderno y conserva la concreción del objeto.
- source_word: בְּיָדוֹ
  english_pob_choice: in hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en su mano
  lexicon: HALOT
  rationale: «En la mano» es la forma idiomática y fluida en español; mantiene la imagen sin recargar la frase.
- source_word: מֵרֹב יָמִים
  english_pob_choice: because of great age
  chosen_spanish: por la mucha edad
  alternatives_spanish:
  - a causa de sus muchos años
  - por la abundancia de días
  lexicon: HALOT
  rationale: El hebreo es un modismo de avanzada edad; «por la mucha edad» comunica el sentido de forma clara y digna, manteniendo el valor causal de la preposición.
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por un título, conforme a la política del POB y a la transparencia frente al texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: ¿«ejércitos» o un equivalente más tradicional para צְבָאוֹת?
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: «Ejércitos» es fiel, transparente y entendible para lectores amplios; preserva la idea de poder soberano del título divino sin recurrir a un tecnicismo menos común.
  doctrine_reference: 'DOCTRINE.md: Titles of God — preserve semantic force of divine epithets'
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés, incluyendo la revisión que suavizó la formulación posesiva del bastón para una lectura más natural. La versión española mantiene la misma elección distributiva y concreta: «cada uno con su bastón en la mano».'
  spanish_consistency_notes:
  - Se evitó traducir «ancianos» como un cargo eclesial, ya que el hebreo describe edad, no oficio.
  - 'Se conservó una imagen concreta y pública: personas mayores sentadas en espacios urbanos de Jerusalén.'
  - Se prefirió un español digno y claro, sin calcos innecesarios del inglés ni del hebreo cuando el modismo era explícito.
