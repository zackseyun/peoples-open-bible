translation:
  language: es
  text: Pero si lo empujó por odio, o le arrojó algo deliberadamente[a], y murió,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con malicia» o «mientras estaba al acecho»; el término hebreo lleva un matiz de intención hostil deliberada, posiblemente incluyendo emboscada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula abre un caso legal contrastivo; «Pero si» conserva el matiz adversativo del inglés POB y su función de transición en el contexto jurídico.
- source_word: בְּשִׂנְאָה
  english_pob_choice: in hatred
  chosen_spanish: por odio
  alternatives_spanish:
  - en odio
  - con odio
  - con malicia
  lexicon: HALOT
  rationale: El hebreo expresa motivo o disposición hostil. «Por odio» suena natural en español jurídico y conserva la causalidad del acto sin desplazar el matiz de enemistad.
- source_word: יֶהְדָּפֶנּוּ
  english_pob_choice: he pushed him
  chosen_spanish: lo empujó
  alternatives_spanish:
  - lo shovedeó
  - lo arrojó
  - lo derribó
  lexicon: HALOT
  rationale: El verbo denota empujar o dar un empujón. «Empujó» es el equivalente más directo y evita intensificar indebidamente la acción.
- source_word: הִשְׁלִיךְ עָלָיו
  english_pob_choice: threw something at him
  chosen_spanish: le arrojó algo
  alternatives_spanish:
  - le lanzó algo
  - tiró algo contra él
  - le arrojó una cosa
  lexicon: HALOT
  rationale: El objeto es implícito en hebreo. En español conviene mantener la indefinición con «algo»; «le arrojó» conserva la dirección hostil sin añadir precisión que el texto no da.
- source_word: בִּצְדִיָּה
  english_pob_choice: intentionally
  chosen_spanish: intencionalmente
  alternatives_spanish:
  - deliberadamente
  - a propósito
  - con intención
  lexicon: HALOT
  rationale: La palabra hebrea expresa acción premeditada u hostil. «Intencionalmente» comunica la fuerza legal central de forma clara y moderna; el posible matiz de emboscada queda implícito en la nota textual.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y falleció a causa de ello
  lexicon: HALOT
  rationale: La forma narrativa simple «y murió» sigue de cerca el hebreo y evita suavizar el resultado legal.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se requieren revisiones sustantivas. La única decisión sensible es cómo verter בְּשִׂנְאָה y בִּצְדִיָּה en un español jurídico-natural sin perder el matiz de hostilidad deliberada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto no aplicable aquí por no aparecer el nombre divino.
  - Se evitó «Cristo», «Señor» y otros términos teológicos no presentes en el versículo.
  - La frase final queda abierta como en el hebreo, sin añadir la sanción legal que continúa en el contexto inmediato.
