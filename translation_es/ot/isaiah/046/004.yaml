review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y preserva la imaginería de la vejez/canas y el cierre con liberación. Sin embargo, se aparta de dos decisiones importantes del rastro POB: (1) אֲנִי הוּא se vertió como «yo soy él», que en español suena poco idiomático y además puede sugerir identidad con un tercero, mientras que una forma como «yo soy el mismo» preserva mejor la autoidentificación solemne; (2) la secuencia verbal final cambia innecesariamente la correspondencia documentada entre «bear / carry» y usa «te sostendré» donde el inglés auditado prefirió «bear». También la nota [a] está anclada en «vejez» pero comenta una alternativa para וְעַד, no para זִקְנָה, y no preserva la alternativa léxica documentada para «carry/sustain».'
  spanish_quality_summary: El español es claro y digno, pero «yo soy él» resulta torpe y potencialmente confuso en lectura eclesial hispana. «Aun hasta» funciona, aunque «Hasta en tu vejez» o «Aun en tu vejez» sería más natural; no obstante, puede conservarse sin problema. «Yo te hice» es natural y fiel. La secuencia «yo te sostendré; yo te llevaré» suena bien, pero conviene alinearla más de cerca con el patrón semántico del original y la auditoría inglesa.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. El punto principal es la autoidentificación divina: conviene evitar tanto una paráfrasis teológica expansiva («yo soy el que soy») como una forma española extraña («yo soy él»). «Yo soy el mismo» mantiene la sobriedad y solemnidad mejor en español. Además, debe preservarse la alternativa léxica documentada para סבל como «sostener» en nota, no desplazarla a una nota sobre «vejez».'
  issues:
  - severity: high
    issue: «yo soy él» para אֲנִי הוּא
    rationale: Aunque formalmente cercano al inglés «I am he», en español contemporáneo y bíblico común suena antinatural y puede malentenderse. «Yo soy el mismo» conserva la fuerza de autoidentificación sin sobreinterpretar.
  - severity: medium
    issue: La nota [a] está mal enfocada
    rationale: El marcador en «vejez» comenta «ancianidad» y extensión temporal, pero la nota inglesa [a] documenta la alternativa de «carry/sustain» para אֶסְבֹּל. Debe moverse al verbo correspondiente y reflejar esa alternativa.
  - severity: medium
    issue: Desalineación parcial en la secuencia verbal final
    rationale: El inglés auditado distingue «I will bear; I will carry», mientras el borrador usa «te sostendré; te llevaré». «Sostendré» es posible, pero la revisión debería reflejar mejor la progresión documentada y reservar «sostener» como alternativa en nota.
  revised_spanish_text: Aun hasta tu vejez, yo soy el mismo, y hasta las canas te llevaré[a]. Yo te hice, y yo te soportaré; yo te llevaré, y te rescataré[b].
