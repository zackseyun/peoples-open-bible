lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Luego ... habló
  lexicon: HALOT
  rationale: El waw consecutivo con דבר avanza la narración. En español, «Entonces» conserva el valor secuencial natural sin volver la frase rígida ni añadir contenido no presente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: La directriz del proyecto para יהוה es usar «Yahvé» en el texto principal, preservando el nombre propio divino del pacto y evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el complemento indirecto; en español, «a» es la equivalencia simple y natural con Moisés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosis
  lexicon: HALOT
  rationale: Forma española estándar del nombre propio מֹשֶׁה.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La construcción introductoria de discurso directo se conserva de forma idiomática con «diciendo», manteniendo la estructura hebrea sin sobreparáfrasis.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh, with a note that the Hebrew reads YHWH and tradition renders it 'the LORD.'
  chosen_spanish_reading: Yahvé, con nota que indica que el hebreo tiene YHWH y que la traducción tradicional usa «el SEÑOR».
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La política española del proyecto pide «Yahvé» como forma principal del Tetragrámaton. La nota preserva la transparencia textual y registra la forma hebrea, además de la alternativa tradicional, sin ocultar la tensión terminológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto base inglés no requirió cambios en la revisión más reciente; por eso el español sigue la misma decisión auditable para el nombre divino, adaptándola a la convención terminológica del proyecto en español.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - «Yahvé» se usa de forma consistente con el estándar español del proyecto para יהוה.
  - La estructura «habló ... diciendo» conserva el enlace narrativo y de discurso directo del hebreo.
  - No se introduce puntuación o léxico interpretativo ajeno al verso.
