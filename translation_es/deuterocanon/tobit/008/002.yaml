translation:
  language: es
  text: Al entrar[a], se acordó de las palabras de Rafael, y tomó las cenizas del incienso y puso sobre ellas el corazón del pez y el hígado, y los hizo humear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras iba». El participio griego puede expresar simplemente movimiento en curso; el contexto inmediato y la tradición semítica paralela favorecen aquí la idea de entrar en la habitación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευόμενος
  english_pob_choice: as he went in
  chosen_spanish: y mientras entraba[a]
  alternatives_spanish:
  - y mientras iba
  - y cuando entraba
  - y al entrar
  lexicon: BDAG
  rationale: El participio griego expresa movimiento en curso; en este contexto narrativo y de alcoba nupcial, «entraba» comunica con naturalidad la acción concreta de entrar sin agregar contenido ajeno. Mantiene la apertura a la lectura más general de movimiento, pero refleja bien la dirección implícita en el pasaje.
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - trajo a la memoria
  lexicon: BDAG
  rationale: «Se acordó» es el equivalente más natural y directo en español para un recuerdo puntual en narrativa pasada, conservando la simple relación con las palabras previas de Rafael.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las instrucciones
  - los dichos
  lexicon: BDAG
  rationale: «Palabras» sigue de cerca el valor léxico básico y evita sobredeterminar el contenido como técnica o mandamiento, aunque el contexto muestra que eran instrucciones.
- source_word: τέφραν
  english_pob_choice: ashes
  chosen_spanish: las cenizas[b]
  alternatives_spanish:
  - la ceniza
  - las brasas ya hechas ceniza
  lexicon: LSJ
  rationale: El plural griego se refleja de forma natural con «las cenizas». En español bíblico contemporáneo suena más fluido que el singular, y mantiene la idea del residuo del incienso quemado.
- source_word: θυμιαμάτων
  english_pob_choice: of the incense
  chosen_spanish: del incienso
  alternatives_spanish:
  - de los perfumes quemados
  - de las ofrendas de incienso
  lexicon: LSJ
  rationale: «Incienso» expresa de manera clara el genitivo de materia o pertenencia. «Del incienso» conserva el referente cultual sin imponer una formulación más técnica de la necesaria.
- source_word: ἐπέθηκεν
  english_pob_choice: placed ... on them
  chosen_spanish: puso sobre ellas
  alternatives_spanish:
  - colocó sobre ellas
  - las puso encima
  lexicon: BDAG
  rationale: «Puso sobre ellas» reproduce bien la acción de colocar algo encima de las cenizas, manteniendo la relación entre el soporte y lo colocado.
- source_word: καρδίαν τοῦ ἰχθύος
  english_pob_choice: the fish’s heart
  chosen_spanish: el corazón del pez
  alternatives_spanish:
  - el corazón del pescado
  lexicon: BDAG
  rationale: «Corazón del pez» es la traducción más directa y literal, sin cambiar el referente zoológico ni introducir una naturalización innecesaria.
- source_word: ἧπαρ
  english_pob_choice: liver
  chosen_spanish: el hígado
  lexicon: BDAG
  rationale: Término anatómico estándar en español; no requiere ajuste contextual.
- source_word: ἐκάπνισεν
  english_pob_choice: made them smoke
  chosen_spanish: los hizo echar humo
  alternatives_spanish:
  - los fumigó
  - hizo que echaran humo
  lexicon: LSJ
  rationale: «Los hizo echar humo» conserva el efecto verbal de producir humo sin convertirlo en un tecnicismo ritual que el griego no exige. Mantiene el carácter concreto y narrativo de la acción.
theological_decisions:
- issue: Valor narrativo de πορευόμενος en el contexto nupcial
  english_pob_reading: as he went in, informed by the parallel Semitic tradition to mean entering the room
  chosen_spanish_reading: mientras entraba
  alternative_spanish_readings:
  - mientras iba
  - al entrar
  - mientras iba entrando
  rationale: La fuente griega permite una acción en curso, y el contexto paralelo confirma que se trata de su ingreso a la cámara. «Mientras entraba» deja visible el movimiento y evita forzar una expansión interpretativa mayor que la del texto base.
  doctrine_reference: 'PHILOSOPHY.md: la fuente griega es primaria; la tradición paralela solo orienta una aclaración contextual prudente.'
- issue: Relación entre las cenizas del incienso y los elementos del pez
  english_pob_reading: took the ashes of the incense and placed the fish’s heart and liver on them
  chosen_spanish_reading: tomó las cenizas del incienso y puso sobre ellas el corazón del pez y el hígado
  alternative_spanish_readings:
  - tomó las cenizas del incienso y colocó encima el corazón del pez y el hígado
  - tomó las cenizas del incienso y las usó para poner sobre ellas el corazón del pez y el hígado
  rationale: El griego presenta primero las cenizas y luego los órganos del pez sobre ellas; la traducción conserva esa secuencia y la relación espacial sin añadir explicación ritual. Se mantiene la tensión entre acción concreta y posible valor medicinal/ritual, sin resolverla artificialmente.
  doctrine_reference: 'POB: preservar la concreción del acto descrito y no suavizar la rareza del gesto con lenguaje eclesiástico no atestiguado.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje base griego de Swete y la auditoría inglesa POB, incluyendo su elección de «as he went in» y la nota que permite traducir el participio de manera más general, apoyada por la tradición semítica paralela. No se añadieron elementos del relato largo ajenos a este versículo.
  spanish_consistency_notes:
  - Se mantiene «Rafael» como nombre propio sin transliteración alternativa.
  - Se usa el registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
  - «Incienso» y «cenizas» conservan el tono cultual sin imponer terminología ritual posterior.
  - La frase final «los hizo echar humo» refleja el verbo griego sin tecnicismo interpretativo excesivo.
