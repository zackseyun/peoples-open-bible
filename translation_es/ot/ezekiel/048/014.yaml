revisions:
- from: No venderán nada de ello[a], ni lo cambiarán, ni pasará la primicia de la tierra, porque es cosa santa para Yahvé.
  to: No venderán nada de ello[a], ni lo intercambiarán, ni pasará la primicia de la tierra, porque es santo para Yahvé.
  rationale: 'Se ajustó el español para reflejar con más fidelidad y naturalidad el hebreo: ''lo intercambiarán'' suena mejor que ''lo cambiarán'' en contexto legal; ''es santo para Yahvé'' evita la adición innecesaria de ''cosa'' y conserva la fuerza predicativa de קֹדֶשׁ לַיהוָה. Se amplió la nota para incluir la alternativa ''las primicias de la tierra'', ya preservada en la auditoría inglesa.'
