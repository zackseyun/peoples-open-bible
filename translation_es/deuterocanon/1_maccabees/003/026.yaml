  yaml_path: translation/deuterocanon/1_maccabees/003/026.yaml
  text: And his name reached even to the king[c][b][a], and every nation spoke of the battle lines of Judah.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'his fame reached the king.' The Greek reads literally, 'his name came near to the king.'
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase 'above every battle line' is difficult. It may mean that every nation spoke of Judas in connection with his military formations or victories.
    reason: alternative_reading
  - marker: c
    text: Greek Ἰούδα here refers to Judas Maccabeus; 'Judah' reflects a closer transliteration of the form, while 'Judas' is the standard English name for this figure.
    reason: lexical_alternative
