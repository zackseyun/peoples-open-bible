revisions:
- from: La Roca[a], perfecta es su obra, porque todos sus caminos son justicia. Dios de fidelidad[b] y sin injusticia[c], justo y recto es él.
  to: La Roca[a], perfecta es su obra, porque todos sus caminos son justicia. Dios de fidelidad[b] y sin injusticia alguna[c], justo y recto es él.
  rationale: La revisión es menor y busca mejorar la naturalidad del español y la precisión de la nota lexical sin alterar el sentido fuente ni las decisiones documentadas de la auditoría inglesa.
