translation:
  language: es
  text: Y Yahvé lo apartará de entre todas las tribus de Israel para calamidad,[a] conforme a todas las maldiciones del pacto escritas en este libro de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las maldiciones juramentadas del pacto». El hebreo puede referirse específicamente a maldiciones de pacto invocadas por juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִבְדִּילוֹ
  english_pob_choice: will single him out
  chosen_spanish: lo apartará
  alternatives_spanish:
  - lo separará
  - lo señalará aparte
  lexicon: HALOT
  rationale: El hifil de בדל expresa causar separación o distinción. En este contexto de juicio, «lo apartará» conserva la idea de ser sacado o distinguido del conjunto, con una fuerza natural en español y sin suavizar el sentido punitivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino YHWH: «Yahvé», manteniendo el nombre del pacto en vez de ocultarlo tras un título.'
- source_word: לְרָעָה
  english_pob_choice: for disaster
  chosen_spanish: para desastre
  alternatives_spanish:
  - para mal
  - para daño
  - para calamidad
  lexicon: HALOT
  rationale: Aquí רָעָה no describe mal moral, sino un resultado de juicio y ruina. «Desastre» comunica bien esa fuerza punitiva en español actual.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de entre todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - fuera de todas las tribus de Israel
  lexicon: HALOT
  rationale: La preposición מִן marca separación desde el grupo mayor. «De entre» reproduce mejor esa relación que un simple «de».
- source_word: כְּכֹל
  english_pob_choice: according to all
  chosen_spanish: conforme a todas
  alternatives_spanish:
  - según todas
  - de acuerdo con todas
  lexicon: HALOT
  rationale: כְּ expresa correspondencia o conformidad. «Conforme a» es formal y fiel, y enlaza bien la sentencia con las maldiciones ya escritas.
- source_word: אָלוֹת
  english_pob_choice: the curses
  chosen_spanish: las maldiciones
  alternatives_spanish:
  - las maldiciones juramentadas
  - las imprecaciones
  lexicon: HALOT
  rationale: En contexto de pacto, אָלוֹת son maldiciones sancionadas por el pacto. «Maldiciones» es claro y directo; la posible carga juramentada se preserva en nota.
- source_word: הַבְּרִית
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: «Pacto» es el término bíblico-teológico más estable en español para בְּרִית, y conserva la relación formal de alianza estipulada por Dios.
- source_word: הַכְּתוּבָה
  english_pob_choice: written
  chosen_spanish: escritas
  alternatives_spanish:
  - que están escritas
  - registradas
  lexicon: HALOT
  rationale: 'El participio pasivo concuerda con «maldiciones» y se integra naturalmente: las maldiciones están escritas en el libro. Esto evita una construcción pesada en español.'
- source_word: בְּסֵפֶר הַתּוֹרָה הַזֶּה
  english_pob_choice: in this book of the law
  chosen_spanish: en este libro de la ley
  alternatives_spanish:
  - en este rollo de la ley
  - en el libro de esta ley
  lexicon: HALOT
  rationale: סֵפֶר puede ser libro o rollo; «libro» es natural y fiel. תּוֹרָה aquí designa la ley/corpus legal del pacto, por lo que «la ley» resulta apropiado.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton de forma directa. La traducción mantiene el nombre propio del Dios del pacto, evitando la sustitución honorífica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לְרָעָה
  english_pob_reading: for disaster
  chosen_spanish_reading: para desastre
  alternative_spanish_readings:
  - para mal
  - para daño
  - para calamidad
  rationale: No se trata de atribuir mal moral a Dios, sino de juicio y ruina covenantales. «Desastre» conserva ese sentido sin introducir una carga doctrinal ajena.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English; do not import doctrinal claims the text does not make'
- issue: Áלוֹת en contexto de pacto
  english_pob_reading: the curses
  chosen_spanish_reading: las maldiciones
  alternative_spanish_readings:
  - las maldiciones juramentadas
  - las imprecaciones
  rationale: El término puede apuntar específicamente a maldiciones de pacto invocadas por juramento. El texto principal retiene «maldiciones» por claridad, y la nota preserva la alternativa.
  doctrine_reference: DOCTRINE.md lexical note on covenant curse language
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés POB al colocar la expresión de separación antes del complemento de procedencia, reflejando con más naturalidad el orden hebreo: Dios aparta al hombre de entre las tribus para desastre. No se introdujeron cambios doctrinales ni variantes textuales nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Pacto» y «ley» se usan de manera consistente con el vocabulario bíblico-teológico del corpus.
  - «De entre» reproduce la separación desde el conjunto, evitando una ambigüedad que tendría un simple «de».
  - La nota al pie preserva la tensión léxica de אָלוֹת sin cargar el texto principal con una formulación demasiado técnica.
