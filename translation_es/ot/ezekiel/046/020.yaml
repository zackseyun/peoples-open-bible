    issue: Se pierde la distinción entre יְבַשְּׁלוּ y יֹאפוּ
    rationale: 'El hebreo usa dos verbos culinarios distintos: uno para hervir/cocer las ofrendas por la culpa y por el pecado, y otro para hornear la ofrenda vegetal. Traducir ambos como ''cocerán'' borra un detalle semántico preservado por el English POB.'
  - severity: low
    issue: '''sacarlos'' tiene antecedente implícito poco claro'
    rationale: Aunque el objeto está elidido en hebreo y puede suplirse en español, 'sacarlos' después de una lista de ofrendas no es tan claro ni natural como hacer explícito 'las ofrendas'.
  - severity: low
    issue: La nota léxica sobre מִנְחָה justifica 'cocerán' como si el hebreo no distinguiera el método
