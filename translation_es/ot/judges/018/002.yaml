translation:
  language: es
  text: 'Así que los hijos de Dan enviaron cinco hombres de su clan[a], de entre todo su número, hombres valientes de Zora y de Estaol, para reconocer la tierra y explorarla[b]. Y les dijeron: «Vayan, exploren la tierra». Entonces llegaron a la región montañosa de Efraín, hasta la casa de Mica[c], y pasaron allí la noche.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres capaces» o «hombres de valor» para «hombres valientes».
    reason: lexical_alternative
  - marker: b
    text: O «escudriñarla» o «investigarla» para «explorarla».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la casa de Micah», que puede referirse al complejo doméstico o propiedad de Mica.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los danitas
  - el pueblo de Dan
  lexicon: HALOT
  rationale: Conservo la construcción filial del hebreo para mantener transparencia formal. «Danitas» sería más idiomático, pero «hijos de Dan» refleja mejor el idiomático hebreo y sigue siendo natural en español bíblico moderno.
- source_word: מִמִּשְׁפַּחְתָּם
  english_pob_choice: from their clan
  chosen_spanish: de su clan
  alternatives_spanish:
  - de su familia
  - de su tribu
  lexicon: HALOT
  rationale: מִשְׁפָּחָה apunta aquí a una unidad kinship menor que la tribu; «clan» preserva esa escala. «Familia» suena demasiado pequeño en español actual, y «tribu» demasiado amplio.
- source_word: חֲמִשָּׁה אֲנָשִׁים
  english_pob_choice: five men
  chosen_spanish: cinco hombres
  alternatives_spanish:
  - cinco personas
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «hombres». Mantengo el valor masculino y no lo neutralizo.
- source_word: מִקְצוֹתָם
  english_pob_choice: from among their number
  chosen_spanish: de entre todo su número
  alternatives_spanish:
  - de entre ellos
  - de entre su grupo
  lexicon: HALOT
  rationale: Sigo la decisión auditada de expresar el sentido partitivo, no literal, de la raíz. «De entre todo su número» conserva la idea de selección desde el conjunto.
- source_word: אֲנָשִׁים בְּנֵי חַיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres capaces
  - hombres esforzados
  - hombres de valor
  lexicon: HALOT
  rationale: En este contexto de exploración, «valientes» conserva la fuerza de בְּנֵי חַיִל sin convertirlo en un tecnicismo militar rígido. Mantiene bien la valoración positiva del grupo.
- source_word: מִצָּרְעָה וּמֵאֶשְׁתָּאֹל
  english_pob_choice: from Zorah and from Eshtaol
  chosen_spanish: de Zora y de Estaol
  alternatives_spanish:
  - desde Zora y desde Estaol
  lexicon: HALOT
  rationale: Translitero los topónimos de forma estándar y clara para lectores hispanos. Uso «de» para conservar la procedencia sin cargar el texto con preposiciones demasiado marcadas.
- source_word: לְרַגֵּל
  english_pob_choice: to spy out
  chosen_spanish: para reconocer
  alternatives_spanish:
  - para espiar
  - para explorar
  lexicon: HALOT
  rationale: «Reconocer» expresa la misión de inspección/averiguación de modo natural en español, sin introducir la connotación negativa que «espiar» puede tener. Mantiene el matiz de reconocimiento territorial.
- source_word: וּלְחָקְרָהּ / חִקְרוּ
  english_pob_choice: to explore it / explore the land
  chosen_spanish: explorarla / exploren la tierra
  alternatives_spanish:
  - investigarla / investiguen la tierra
  - buscarla / busquen la tierra
  lexicon: HALOT
  rationale: Sostengo la consistencia léxica auditada con «explorar». El verbo refleja bien la idea de examen cuidadoso y evita sobretraducir con un término más técnico que el contexto no exige.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el territorio
  lexicon: HALOT
  rationale: «La tierra» es la equivalencia más natural y bíblicamente habitual en español. «Territorio» sería posible, pero menos solemne y menos acorde con el estilo del pasaje.
- source_word: הַר אֶפְרַיִם
  english_pob_choice: the hill country of Ephraim
  chosen_spanish: la región montañosa de Efraín
  alternatives_spanish:
  - la serranía de Efraín
  - los montes de Efraín
  lexicon: HALOT
  rationale: Conservo el sentido geográfico del hebreo como zona elevada, no como una sola montaña. «Región montañosa» es claro en español y equivalente a «hill country».
- source_word: עַד בֵּית מִיכָה
  english_pob_choice: as far as the house of Micah
  chosen_spanish: hasta la casa de Micaía
  alternatives_spanish:
  - hasta la casa de Miqueas
  - hasta la casa de Micah
  lexicon: HALOT
  rationale: Sigo la forma hispana del nombre con una vocalización común y transparente. «Casa» mantiene la lectura literal; el posible sentido de complejo doméstico se deja para nota.
- source_word: וַיָּלִינוּ שָׁם
  english_pob_choice: spent the night there
  chosen_spanish: pasaron allí la noche
  alternatives_spanish:
  - se alojaron allí
  - pernoctaron allí
  lexicon: HALOT
  rationale: «Pasaron allí la noche» es claro, natural y fiel al valor de לון. Evita un registro excesivamente técnico sin perder la referencia temporal.
theological_decisions:
- issue: Relación entre «espía/espiar» y la función narrativa de reconocimiento territorial
  english_pob_reading: to spy out the land
  chosen_spanish_reading: para reconocer la tierra
  alternative_spanish_readings:
  - para espiar la tierra
  - para explorar la tierra
  rationale: La misión es de reconocimiento previo a ocupación; en español «reconocer» comunica la acción sin añadir una connotación moral negativa que no está en el hebreo. Mantengo «explorar» en la segunda mitad porque refleja la pareja verbal del texto y la decisión auditada del POB.
  doctrine_reference: No doctrinal issue; lexical and pragmatic clarity only.
- issue: Topónimo y referencia cultural de «la casa de Micah»
  english_pob_reading: the house of Micah, which may refer to Micah’s household compound
  chosen_spanish_reading: la casa de Micaía[b]
  alternative_spanish_readings:
  - la casa de Miqueas
  - la casa de Micah
  rationale: Conservo la literalidad del hebreo sin decidir de forma fuerte entre casa-hogar y complejo doméstico en el texto principal. La ambigüedad cultural se documenta en nota para no ocultarla.
  doctrine_reference: No doctrinal issue; cultural-historical note.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «de entre todo su número» para reflejar mejor מִקְצוֹתָם y cambió «capable men» por «valiant men». La traducción española adopta ambas precisiones con «de entre todo su número» y «hombres valientes», manteniendo además la distinción entre «reconocer» y «explorar» para reflejar la doble secuencia verbal del hebreo.
  spanish_consistency_notes:
  - 'He mantenido una terminología estable para los topónimos: Zora, Estaol y Efraín.'
  - He evitado alternar entre «explorar» y «examinar» para conservar la correspondencia con la auditoría inglesa.
  - He usado «hijos de Dan» para seguir la estructura semítica sin recurrir a un etnónimo más libre.
  - La nota sobre la casa de Micaía preserva la ambigüedad cultural del hebreo sin convertirla en explicación interpretativa en el cuerpo del versículo.
