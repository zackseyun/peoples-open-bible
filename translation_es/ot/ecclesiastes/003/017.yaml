  text: אָמַ֤רְתִּֽי אֲנִי֙ בְּ/לִבִּ֔/י אֶת הַ/צַּדִּיק֙ וְ/אֶת הָ֣/רָשָׁ֔ע יִשְׁפֹּ֖ט הָ/אֱלֹהִ֑ים כִּי עֵ֣ת לְ/כָל חֵ֔פֶץ וְ/עַ֥ל כָּל הַֽ/מַּעֲשֶׂ֖ה שָֽׁם־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/003/017.yaml
  text: I said in my heart[a], “God will judge the righteous and the wicked[b], for there is a time for every matter and for every deed there.”
  footnotes:
  - marker: a
    text: Or, 'for there is an appointed time for every purpose and for every work.' The Hebrew terms can also be rendered more formally as 'purpose' and 'work.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew includes 'there' at the end of the clause. It may point to the place or occasion of God's judgment; some translations smooth it out in English.
    reason: alternative_reading
