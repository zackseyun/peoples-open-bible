review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Yahvé es exaltado, habita en lo alto y ha llenado Sion de משפט וצדקה. Conserva correctamente el nombre divino como «Yahvé», mantiene el perfecto en «ha llenado» y distingue los dos sustantivos finales. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece sobre «exaltado», pero el contenido de la nota alternativa corresponde a «mora en las alturas», siguiendo la auditoría inglesa para שֹׁכֵן מָרוֹם.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. «Yahvé está exaltado» y «ha llenado a Sion con justicia y rectitud» suenan naturales. «Mora en las alturas» es aceptable, aunque algo más idiomático sería «habita en lo alto»; no obstante, no es necesario cambiarlo. La reparación necesaria es técnica y editorial: mover el marcador de nota al segmento correcto. También conviene escribir «Sion» sin preposición personal: «ha llenado Sion», no «ha llenado a Sion», para ajustarse mejor al uso con complemento directo no personal en este contexto.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> «Yahvé»; מִשְׁפָּט -> «justicia»; צְדָקָה -> «rectitud» como distinción válida frente a «justicia». No hay conflicto doctrinal. El único desajuste es de aparato crítico/nota, no de terminología.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie anclado a la palabra equivocada
    rationale: La nota «O «mora en las alturas»» corresponde a שֹׁכֵן מָרוֹם, no a נִשְׂגָּב. Debe aparecer junto a «mora en las alturas», no junto a «exaltado». Esto afecta la fidelidad editorial al rastro de auditoría inglés.
  - severity: low
    issue: Uso de «a» personal en «ha llenado a Sion»
    rationale: En español, con «llenar» y un complemento directo no personal como un lugar, lo más natural es «ha llenado Sion con...». La forma actual no impide la comprensión, pero suena menos idiomática.
  revised_spanish_text: Yahvé está exaltado, porque mora en las alturas[a]; ha llenado Sion con justicia y rectitud.
  revised_footnotes:
  - marker: a
    text: O «mora en lo alto».
    reason: lexical_alternative
  revision_rationale: Se revisa para corregir la ubicación del marcador de nota, de modo que la alternativa léxica se aplique a שֹׁכֵן מָרוֹם y no a «exaltado». También se mejora levemente la naturalidad del español eliminando la preposición personal en «ha llenado Sion». La nota se formula como verdadera alternativa breve en español para la expresión espacial hebrea.
