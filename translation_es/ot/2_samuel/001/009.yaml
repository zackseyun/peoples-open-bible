translation:
  language: es
  text: 'Y él me dijo: «Por favor, ponte sobre mí y dame muerte, porque la angustia se ha apoderado de mí[a], aunque mi vida aún está en mí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque calambres/convulsiones se han apoderado de mí'; el término hebreo traducido como 'angustia' es raro y su sentido preciso es incierto.
    reason: lexical_alternative
  - marker: b
    text: Lit., 'porque toda mi vida/alma aún está en mí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y él me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y me dijo
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa del hebreo con una fórmula natural en español. El sujeto se explicita con 'él' por claridad referencial en español, sin añadir contenido nuevo.
- source_word: עֲמָד נָא עָלַי
  english_pob_choice: Please stand over me
  chosen_spanish: Por favor, ponte sobre mí
  alternatives_spanish:
  - Por favor, ponte junto a mí
  - Por favor, párate sobre mí
  lexicon: HALOT
  rationale: עָמַד con עַל en este contexto indica colocarse encima o sobre una persona herida en el campo de batalla. 'Ponerte sobre mí' mantiene la imagen espacial y la súplica cortés de נָא con 'Por favor'.
- source_word: וּמֹתְתֵנִי
  english_pob_choice: put me to death
  chosen_spanish: ponme a muerte
  alternatives_spanish:
  - dame muerte
  - mátame
  lexicon: HALOT
  rationale: Se busca una forma formal que conserve el sentido causativo de 'hacer morir'. 'Ponme a muerte' suena algo más elevado y evita perder la fuerza directa del ruego; se mantiene la violencia del acto sin suavizarla.
- source_word: הַשָּׁבָץ
  english_pob_choice: anguish
  chosen_spanish: la angustia
  alternatives_spanish:
  - los calambres
  - las convulsiones
  - el dolor
  lexicon: HALOT
  rationale: El término hebreo es raro y su sentido preciso es incierto. Se conserva 'angustia' como opción amplia y sobria, mientras que las alternativas fisiológicas quedan implícitamente abiertas por la nota.
- source_word: אֲחָזַנִי
  english_pob_choice: has seized me
  chosen_spanish: me ha atrapado
  alternatives_spanish:
  - me ha asido
  - me ha agarrado
  - me ha apoderado
  lexicon: HALOT
  rationale: אָחַז expresa tomar o aprehender con fuerza. 'Me ha atrapado' comunica bien la idea de una condición que lo domina súbitamente, con buena naturalidad en español.
- source_word: כִּי כָל עוֹד נַפְשִׁי בִּי
  english_pob_choice: though my life is still in me
  chosen_spanish: aunque mi vida todavía está en mí
  alternatives_spanish:
  - pues toda mi vida sigue en mí
  - porque todavía tengo vida en mí
  - aunque mi alma todavía está en mí
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se entiende como vida animada, no como 'alma' en sentido técnico. Se conserva la lectura concesiva de la frase en el contexto, con un español claro y sobrio.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en la última cláusula
  english_pob_reading: my life is still in me
  chosen_spanish_reading: mi vida todavía está en mí
  alternative_spanish_readings:
  - mi alma todavía está en mí
  - todavía tengo vida en mí
  rationale: Se evita cargar 'alma' con una lectura teológica ajena al contexto inmediato. La frase habla de la vida que aún permanece en el cuerpo del herido, no de una afirmación doctrinal sobre el alma.
  doctrine_reference: Antropología bíblica / uso contextual de נֶפֶשׁ
- issue: Tensión semántica de הַשָּׁבָץ
  english_pob_reading: anguish
  chosen_spanish_reading: angustia
  alternative_spanish_readings:
  - calambres
  - convulsiones
  rationale: El hebreo es raro y admite varias posibilidades. Se mantiene una traducción amplia que no cierre indebidamente la incertidumbre del término, preservando la tensión léxica documentada.
  doctrine_reference: Crítica textual y semántica léxica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que elevó 'kill me' a 'put me to death' para un registro más formal. La versión española adopta un registro igualmente formal y mantiene la fuerza directa del ruego, sin atenuar la imagen bélica ni añadir interpretación doctrinal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó 'vida' para נֶפֶשׁ en lugar de 'alma' para respetar el valor contextual de la expresión.
  - Se conservó la incertidumbre de הַשָּׁבָץ mediante una traducción amplia y una nota con alternativas.
  - El tono es sobrio y publicable, evitando arcaísmos innecesarios y sin suavizar la petición de muerte.
