id: 1CO.5.1
reference: '1 Corinthians 5:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὅλως ἀκούεται ἐν ὑμῖν πορνεία, καὶ τοιαύτη πορνεία ἥτις οὐδὲ ἐν τοῖς ⸀ἔθνεσιν, ὥστε γυναῖκά τινα τοῦ πατρὸς ἔχειν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/005/001.yaml
  text: 'It is actually reported that there is sexual immorality among you, and sexual immorality of such a kind as is not even found among the Gentiles: a man has his father’s wife.'
  footnotes:
  - marker: a
    text: 'Or ''not even among the nations''; some translations render ''not even among the pagans.'''
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''to have his father’s wife''; that is, to be in a sexual relationship with his father’s wife. Possibly his stepmother.'
    reason: lexical_alternative
translation:
  language: ko
  text: 실제로 여러분 가운데 음행이 있다는 보고가 있는데, 그것도 이방인 가운데서도 없는 종류의 음행입니다. 곧 한 사람이 자기 아버지의 아내를 취하고 있다는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_korean: 음행
  alternatives_korean:
  - 성적 부도덕
  lexicon: BDAG
  rationale: 한국 성서 정착어. 「음행」은 광의의 성적 죄를 포괄한다(글로사리).
- source_word: γυναῖκά τινα τοῦ πατρὸς ἔχειν
  english_pob_choice: a man has his father’s wife
  chosen_korean: 한 사람이 자기 아버지의 아내를 취하고 있다
  alternatives_korean:
  - 어떤 사람이 자기 아버지의 부인을 데리고 있다
  lexicon: BDAG
  rationale: 동사 ἔχω를 「취하고 있다」로 번역하여 지속적 동거 관계를 명시. 본문의 충격적 어조를 완화하지 않는다.
theological_decisions:
- issue: 5장 근친상간 사례에 대한 회중 권징의 어조 보존
  chosen_reading: 본문의 충격적·직설적 어조를 그대로 살려 「자기 아버지의 아내를 취하고 있다」로 옮긴다
  alternative_readings:
  - 「자기 계모와 부적절한 관계에 있다」 등 완곡 표현
  rationale: '바울은 본 절을 의도적으로 직설적·충격적으로 서술한다(이방인 사이에도 없는 일!). 한국어 번역도 완곡화하지 않고 본문 무게 그대로 옮긴다. 6:9–11의 죄 목록과 8장의 우상 제물 문제와 마찬가지로, 본 POB의 북극성 원칙은 부드러운 전통을 따르지 않고 본문의 강한 의미를 그대로 드러내는 것이다.'
  doctrine_reference: 'DOCTRINE.md §1: 원저자 의도; §5: 본문의 강한 어조를 약화시키지 않는다'
