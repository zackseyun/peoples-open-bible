review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: ἐν ταῖς ἡμέραις ἐκείναις = «En aquellos días», ἐγενήθη = «hubo», y αὐτομόλησεν conserva la idea de cambio de bando con «se pasó». Sin embargo, «una hambre muy grande» no es la forma más natural ni más precisa en español bíblico actual para λιμὸς μεγάλη σφόδρα; «una gran hambre» o mejor «una hambruna muy grave» serían más idiomáticas. Además, «la tierra se pasó a ellos» suena poco natural en español; conviene explicitar el sentido de alineación política con una formulación más clara.'
  spanish_quality_summary: 'La redacción es generalmente comprensible, pero tiene dos tropiezos de naturalidad: «una hambre muy grande» y «se pasó a ellos». En español neutro y eclesial, «hubo una gran hambruna» y «la tierra se pasó a su lado» o «el país se pasó a su lado» leen mejor. Dado que χώρα aquí probablemente apunta al territorio/población del país más que a suelo físico, «la tierra» puede malentenderse como terreno; «el país» suena más natural, aunque «la tierra» puede conservarse si se aclara el sentido en nota. La mejor solución equilibrada es mantener una formulación principal idiomática y dejar la alternativa más literal en nota.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión sobre αὐτομόλησεν está bien encaminada. La principal mejora léxica es usar «hambruna» o «gran hambre» para λιμός, y una expresión de alineación más idiomática para χώρα ... μετʼ αὐτῶν.
  issues:
  - severity: medium
    issue: «una hambre muy grande» suena poco idiomático
    rationale: Aunque comprensible, no es la forma más natural en español contemporáneo para una escasez generalizada; «hambruna muy grave» o «gran hambre» comunican mejor λιμὸς μεγάλη σφόδρα.
  - severity: medium
    issue: «la tierra se pasó a ellos» es forzado y ambiguo
    rationale: En español puede sonar como movimiento físico o calco. El griego expresa defección/alineación; «el país se pasó a su lado» o «la tierra se pasó a su lado» transmite mejor ese sentido.
  - severity: low
    issue: «la tierra» puede sugerir suelo físico más que país/territorio/población
    rationale: χώρα es amplio, pero en este contexto histórico-político probablemente refiere a la región o país y sus habitantes rurales. Conviene una opción más clara en español principal o al menos en nota.
  revised_spanish_text: En aquellos días hubo una hambruna muy grave, y el país se pasó a su lado.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «la tierra se pasó con ellos» o «al otro bando». El verbo griego indica defección o deserción hacia otra parte.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la frase para que el español suene natural y siga fielmente el griego y la auditoría inglesa: «hambruna muy grave» expresa mejor λιμὸς μεγάλη σφόδρα que «hambre muy grande», y «el país se pasó a su lado» comunica con claridad el sentido de αὐτομόλησεν μετʼ αὐτῶν como cambio de lealtad/alineación. Se conserva en nota una alternativa más cercana a la amplitud del griego.'
