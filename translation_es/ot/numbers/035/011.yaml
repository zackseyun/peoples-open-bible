translation:
  language: es
  text: Entonces designarán ciudades para ustedes[a]; serán ciudades de refugio para ustedes[b], y el homicida que mate a una persona sin intención huirá allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apartar» o «asignar» ciudades para ustedes.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el homicida que mate a una persona sin intención»; es decir, alguien culpable de homicidio involuntario, no de asesinato deliberado.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִקְרִיתֶם
  english_pob_choice: you shall designate
  chosen_spanish: designarán
  alternatives_spanish:
  - deberán designar
  - apontarán
  - señalarán
  lexicon: HALOT
  rationale: El hebreo en este contexto legal tiene fuerza de asignación/establecimiento de ciudades. «Designarán» mantiene el sentido institucional y resulta natural en español jurídico-bíblico.
- source_word: עָרִים ... עָרֵי מִקְלָט
  english_pob_choice: cities ... cities of refuge
  chosen_spanish: ciudades ... ciudades de refugio
  alternatives_spanish:
  - pueblos ... pueblos de refugio
  - ciudades ... ciudades de asilo
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo para claridad legal. «Ciudades de refugio» es la equivalencia más precisa y reconocible para עָרֵי מִקְלָט.
- source_word: מִקְלָט
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - asilo
  - amparo
  - shelter
  lexicon: HALOT
  rationale: En este marco jurídico, el término designa un lugar protegido para escapar. «Refugio» comunica bien esa función sin sonar forzado.
- source_word: וְנָס שָׁמָּה
  english_pob_choice: shall flee there
  chosen_spanish: huirá allí
  alternatives_spanish:
  - huirá hacia allí
  - deberá huir allí
  - podrá huir allí
  lexicon: HALOT
  rationale: La forma verbal en secuencia legal expresa consecuencia/prescripción futura. «Huirá allí» refleja esa fuerza con naturalidad en español.
- source_word: רֹצֵחַ
  english_pob_choice: manslayer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  - persona que ha dado muerte
  lexicon: HALOT
  rationale: Aunque el término puede asociarse a homicidio culpable, aquí está inmediatamente restringido por la cláusula de inadvertencia. «Homicida» preserva la fuerza legal sin imponer deliberación asesina.
- source_word: מַכֵּה נֶפֶשׁ
  english_pob_choice: who kills a person
  chosen_spanish: que mate a una persona
  alternatives_spanish:
  - que mata a una persona
  - que da muerte a una persona
  - que hiere mortalmente a una persona
  lexicon: HALOT
  rationale: Se traduce el sentido directo del conjunto verbal como acto mortal sobre una persona. «Mate» mantiene el carácter resultativo del hebreo dentro de la cláusula relativa.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: una persona
  alternatives_spanish:
  - una vida
  - un ser humano
  - un alma
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ designa al ser humano como objeto de la violencia, no al alma inmortal. «Una persona» es la opción más precisa y clara en español.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: sin intención
  alternatives_spanish:
  - por accidente
  - inadvertidamente
  - sin querer
  lexicon: HALOT
  rationale: El término expresa inadvertencia y ausencia de intención en el marco legal. «Sin intención» conserva la distinción entre homicidio accidental y asesinato deliberado.
theological_decisions:
- issue: Distinción legal entre homicidio accidental y asesinato deliberado
  english_pob_reading: Render רֹצֵחַ as 'manslayer' rather than 'murderer' because the phrase is explicitly qualified by בִּשְׁגָגָה ('unintentionally').
  chosen_spanish_reading: Traducir רֹצֵחַ como «homicida» y aclarar con «sin intención» para no convertirlo automáticamente en «asesino».
  alternative_spanish_readings:
  - asesino
  - matador
  - culpable de muerte
  rationale: 'El versículo conserva una tensión legal importante: la persona ha causado una muerte, pero no con intención homicida deliberada. La traducción mantiene esa distinción sin suavizarla ni resolverla artificialmente.'
  doctrine_reference: 'Principio de la POB: preservar la tensión lexical y jurídica del texto fuente; primacía del hebreo sobre la tradición devocional.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió «kills a person» sobre una formulación más perifrástica. En español se refleja esa precisión con «mate a una persona», conservando la cláusula de inadvertencia y la terminología legal de refugio.
  spanish_consistency_notes:
  - Se usa «ciudades de refugio» como término fijo para עָרֵי מִקְלָט.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
  - «Sin intención» comunica בִּשְׁגָגָה sin introducir explicaciones interpretativas excesivas.
  - La nota del homicida preserva la distinción entre muerte accidental y homicidio deliberado.
