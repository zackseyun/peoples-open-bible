revisions:
- from: Y cuando el reino de Roboam estuvo establecido[a], y cuando él se había fortalecido, abandonó la ley de Yahvé[b]—y con él, todo Israel.
  to: Y cuando el reino de Roboam quedó establecido, y él se había fortalecido, abandonó la ley de Yahvé[a]—y todo Israel con él.
  rationale: Se ajusta la expresión principal a un español más natural y fiel al sentido de consolidación de כְּהָכִין, se simplifica la cláusula temporal de fortalecimiento, se mejora la fluidez de la frase final sin perder la elipsis hebrea, y se conserva solo la nota léxica verdaderamente significativa sobre תּוֹרָה.
