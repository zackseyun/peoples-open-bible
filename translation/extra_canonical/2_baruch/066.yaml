  from: 'And the tenth bright waters that you saw—these are the purity of the generation of Josiah king of Judah[a], who alone at that time was found steadfast in the law of the Mighty One with all his heart and with all his soul. And he purified the land from idols, and sanctified all the vessels that had been polluted, and restored the offerings to the altar, and exalted the righteous, and honored all those who were wise in understanding. And he destroyed the sorcerers, and the enchanters, and the deceivers from the land. And not only those living and impious did he kill, but he also brought out their bones from the graves and burned them with fire. And he burned the workers of magic with fire, and those false prophets who were leading the people astray, these also he burned with fire; and the people who listened to them while they were alive[e][d][c][b], he cast into the brook Kidron.'
