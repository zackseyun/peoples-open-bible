translation:
  language: es
  text: Y Saba[a] cayó sobre ellos y se los llevó; y a los jóvenes[c] los mataron al filo de la espada[b]; y solo yo he escapado para decírtelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sabeos cayeron sobre ellos». El hebreo usa el nombre propio «Saba», probablemente en referencia a asaltantes provenientes de Saba.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la boca de la espada», un giro idiomático que significa «al filo de la espada».'
    reason: lexical_alternative
  - marker: c
    text: «Los jóvenes» probablemente se refiere a los servidores de Job que atendían los animales.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּפֹּל
  english_pob_choice: fell upon
  chosen_spanish: cayó sobre
  alternatives_spanish:
  - vino sobre
  - atacó
  lexicon: HALOT
  rationale: En contexto hostil, נפל expresa un ataque sorpresivo. «Cayó sobre» conserva la imagen hebrea y su fuerza de incursión sin volverlo demasiado interpretativo.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Saba
  alternatives_spanish:
  - los sabeos
  - Sheba
  lexicon: HALOT
  rationale: El hebreo presenta un nombre propio. En español, «Saba» mantiene la transliteración del nombre propio y deja abierta la referencia al grupo de raiders del contexto, como en la nota inglesa.
- source_word: וַתִּקָּחֵם
  english_pob_choice: took them
  chosen_spanish: se los llevó
  alternatives_spanish:
  - los tomó
  - los arrebató
  lexicon: HALOT
  rationale: לקח con sufijo pronominal en un contexto de saqueo implica tomar/llevarse a las víctimas o el botín. «Se los llevó» comunica el resultado del asalto con naturalidad en español.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los siervos
  lexicon: HALOT
  rationale: נערים puede significar jóvenes o servidores. Dado que el POB inglés mantuvo «young men» por cercanía léxica, «los jóvenes» conserva esa elección sin cerrar la referencia contextual a los trabajadores del ganado.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: al filo de la espada
  alternatives_spanish:
  - con el filo de la espada
  - a filo de espada
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «por la boca de la espada». En español, el equivalente idiomático fiel es «al filo de la espada», que preserva la imagen de la arista cortante sin sonar forzado.
- source_word: וָאִמָּלְטָה
  english_pob_choice: I ... have escaped
  chosen_spanish: he escapado
  alternatives_spanish:
  - escapé
  - me he librado
  lexicon: HALOT
  rationale: 'מלט expresa escape. El perfecto compuesto funciona bien en el discurso del mensajero y mantiene el estado resultante actual: el hablante ha quedado con vida tras el ataque.'
- source_word: רַק אֲנִי לְבַדִּי
  english_pob_choice: I alone
  chosen_spanish: yo solo
  alternatives_spanish:
  - solo yo
  - yo únicamente
  lexicon: HALOT
  rationale: La duplicación intensifica la exclusividad. «Yo solo» es natural en español y conserva que no sobrevivió nadie más para traer la noticia.
- source_word: לְהַגִּיד לָךְ
  english_pob_choice: to tell you
  chosen_spanish: para darte la noticia
  alternatives_spanish:
  - para informarte
  - para decírtelo
  lexicon: HALOT
  rationale: נגד en este contexto introduce el propósito de comunicar lo ocurrido. «Dar la noticia» transmite bien el anuncio formal del mensajero y suena adecuado en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura y las notas del POB inglés, preservando las tres tensiones principales del verso: el nombre propio Saba frente a «los sabeos», el modismo «boca/filo de la espada» y la referencia contextual de «los jóvenes» como servidores de Job. No se introdujeron cambios de revisión adicionales porque el pasaje fue marcado como sin cambios sustantivos en la última pasada.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este verso no contiene el tetragrámaton.
  - Se prefirió «Saba» como transliteración del nombre propio, consistente con el criterio de no ocultar el término hebreo cuando el texto lo usa como designación directa.
  - «Al filo de la espada» conserva el idiomatismo hebreo sin perder legibilidad en español.
  - La combinación «yo solo» y «he escapado» reproduce la exclusividad y el estado resultante del mensajero de forma natural en español.
  - «Para darte la noticia» expresa finalidad de comunicación y evita una paráfrasis más amplia que diluiría el tono urgente del relato.
