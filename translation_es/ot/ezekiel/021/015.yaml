base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/021/015.yaml
  text: So that it may slaughter a slaughter[a], it is sharpened; so that it may have a flash, it is polished[b]. Or shall we rejoice? The scepter of my son despises every tree.
  footnotes:
  - marker: a
    text: Hebrew is difficult in the final clause. 'My son' follows the Masoretic Text; some interpreters understand it more broadly of Judah or my people, and 'every tree' may mean every wooden staff or weapon.
    reason: alternative_reading
  - marker: b
    text: Or 'it may have lightning' or 'it may flash'; the Hebrew expression is elliptical, describing the sword gleaming after polishing.
    reason: lexical_alternative
