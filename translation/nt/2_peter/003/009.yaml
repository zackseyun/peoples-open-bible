theological_decisions:
- issue: Scope of 'you,' 'any,' and 'all' in relation to divine patience and salvation
  chosen_reading: 'Render the verse straightforwardly without narrowing the referents beyond the Greek: ''toward you ... not wanting any to perish but all to come to repentance.'''
  alternative_readings:
  - Interpret 'any' and 'all' as limited to the letter's believing audience/elect
  - Interpret 'any' and 'all' as universally inclusive of all humanity
  rationale: The verse is often pressed into later doctrinal debates about the extent of God's salvific will. The Greek itself presents the statement without explicit theological qualification. In keeping with the project's principle of preserving theological tension rather than resolving it, the translation leaves the scope as stated in the text and does not import a denominationally specific limitation or expansion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Force of βουλόμενός with respect to God's will
  chosen_reading: Translate as 'not wanting' rather than a stronger systematic-theological term such as 'decreeing' or a weaker paraphrase.
  alternative_readings:
  - not willing
  - not intending
  rationale: The participle expresses volition/desire, but the verse does not itself specify a technical distinction between kinds of divine willing. 'Not wanting' preserves the text's claim without importing later theological categories.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the text does not make.'
