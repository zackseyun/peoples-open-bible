  rationale: Se corrige la nota [a] para reflejar con precisión la alternativa léxica documentada («cuerda de arco»). Se reemplaza «cordón» por «cuerda» por fidelidad y naturalidad. En la segunda cláusula se lleva al texto el sentido idiomático principal del hebreo, como hace el POB inglés, y se conserva la imagen literal de la rienda en nota.
