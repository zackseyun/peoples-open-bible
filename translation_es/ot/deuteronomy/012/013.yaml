- from: Ten cuidado, no sea que ofrezcas tus holocaustos en todo lugar que veas.[a]
  to: Ten cuidado, no sea que ofrezcas tus holocaustos en cualquier lugar que veas.[a]
  rationale: Se hace una reparación menor para mejorar la naturalidad del español en la frase locativa, sin apartarse del sentido hebreo ni de la decisión teológica documentada. Se conserva la advertencia principal y se mantiene la alternativa auditada en una nota más pulida.
