review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura judicial del hebreo: oír desde el cielo, actuar, juzgar a los siervos, hacer volver la conducta del malvado sobre su cabeza y vindicar al justo conforme a su justicia. Sin embargo, hay dos ajustes importantes para mayor fidelidad y español natural: en contexto de súplica dirigida a Dios, ''oye'' suena más idiomático que ''escucha''; y ''desde los cielos'' resulta menos natural que ''desde el cielo'', aun si el hebreo tiene forma plural, porque el sentido en español bíblico e idiomático es singular colectivo.'
  spanish_quality_summary: 'El texto es claro y digno, pero ''vindicando'' suena menos natural en español eclesial general que ''dando la razón al justo'' o ''declarando justo al justo''. Además, el borrador mezcla texto y nota: la nota explica el valor forense, pero el cuerpo con ''vindicando'' puede sonar latinizante. También conviene ajustar ''su camino'' a ''su conducta'' en la nota para aclarar el modismo, aunque el texto puede conservar ''camino'' por cercanía al hebreo.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Siervos' es defendible para עבד en este contexto. 'Justicia' para צדקה está bien. La principal observación léxica es preferir 'desde el cielo' por idiomaticidad española, y una formulación más natural para הצדיק que mantenga el sentido forense sin tecnicismo innecesario.
  issues:
  - severity: medium
    issue: '''escucha desde los cielos'' es poco idiomático en español bíblico natural'
    rationale: Aunque שׁמים es formalmente plural, el inglés auditado ya razonó 'from heaven' por idiomaticidad. En español, 'desde el cielo' preserva el sentido con mejor fluidez y registro.
  - severity: medium
    issue: '''vindicando al justo'' suena latinizante y menos transparente'
    rationale: La decisión teológica forense es correcta, pero en español común de iglesia 'vindicar' no siempre comunica con claridad. 'dando la razón al justo[a]' mantiene el sentido judicial y permite conservar la alternativa 'justificando al justo' en nota.
  - severity: low
    issue: La nota b puede expresar mejor el sentido de 'camino' como conducta
    rationale: El texto puede conservar la imagen hebrea, pero la nota debe ayudar al lector hispano a entender el modismo con mayor claridad.
