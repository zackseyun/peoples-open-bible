review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y conserva correctamente el antropomorfismo: ‘oye mi voz’ y ‘que tus oídos estén atentos’. También mantiene la repetición de ‘voz’. Sin embargo, no es fiel al valor léxico de אֲדֹנָי, que en este versículo es el título vocativo ‘Señor’, no el nombre divino Yahvé. El rastro inglés documenta explícitamente ‘Lord’ porque no se trata del Tetragrámaton. Además, ‘mis súplicas por misericordia’ suena menos natural en español que una formulación más directa como ‘mis súplicas de misericordia’ o mejor ‘mis ruegos por misericordia’; pero la opción con ‘súplicas’ puede mantenerse con ajuste mínimo.'
  spanish_quality_summary: 'El español es claro y reverente, pero presenta dos puntos mejorables: (1) ‘Yahvé’ aquí introduce una decisión terminológica contra la evidencia fuente inmediata y crea una nota innecesaria; (2) ‘mis súplicas por misericordia’ es comprensible, pero algo pesado y poco idiomático en comparación con ‘mis ruegos por misericordia’ o ‘mis súplicas de misericordia’. Una reparación pequeña deja el verso más fiel y más natural.'
  glossary_alignment: 'Alinea bien con varias pautas del proyecto (Dios, imaginería concreta, tono de súplica), pero falla en una excepción importante: la preferencia por ‘Yahvé’ aplica a יהוה/YHWH, no a אֲדֹנָי. Aquí corresponde ‘Señor’. No hay otros conflictos mayores con el glosario.'
  issues:
  - severity: high
    issue: אֲדֹנָי fue traducido como ‘Yahvé’
    rationale: La fuente hebrea usa אֲדֹנָי, no יהוה. El audit trail inglés lo documenta como ‘Lord’ precisamente por ser un título vocativo, no el nombre divino. Cambiarlo a ‘Yahvé’ altera el significado léxico y requiere corrección.
  - severity: medium
    issue: La nota [a] justifica una sustitución terminológica incorrecta
    rationale: La nota afirma una norma del proyecto que no corresponde a este caso. Mantenerla consolidaría una lectura errónea de la evidencia fuente.
  - severity: low
    issue: ‘mis súplicas por misericordia’ es algo poco natural
    rationale: Aunque comunica el sentido general, en español suena más idiomático ‘mis ruegos por misericordia’ o ‘mis súplicas de misericordia’. Dado que el borrador ya usa ‘súplicas’, puede mantenerse el sustantivo y aclarar la alternativa en nota.
  revised_spanish_text: Señor, oye mi voz; que tus oídos estén atentos a la voz de mis súplicas[a] por misericordia.
  revised_footnotes:
  - marker: a
    text: 'O: «mis ruegos». El hebreo תַּחֲנוּנַי se refiere a súplicas intensas que piden favor o misericordia.'
