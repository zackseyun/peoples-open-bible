base_translation:
  language: en
  yaml_path: translation/ot/proverbs/014/002.yaml
  text: Whoever walks in uprightness fears Yahweh[b][a], but the one whose ways are crooked despises him.
  footnotes:
  - marker: a
    text: Or, 'but he who is devious in his ways'; the Hebrew describes a person twisted or crooked in conduct.
    reason: lexical_alternative
  - marker: b
    text: The pronoun in 'despises him' most naturally refers to the LORD; alternatively, some take it more generally.
    reason: alternative_reading
