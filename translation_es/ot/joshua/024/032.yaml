    issue: '''habían subido de Egipto'' no traduce bien הֶעֱלוּ en este contexto'
    rationale: 'El hebreo hifil es transitivo: los hijos de Israel hicieron subir/transportaron los huesos desde Egipto. En español, ''habían subido de Egipto'' se entiende naturalmente como que ellos mismos subieron de Egipto. Esto altera la relación verbal con ''los huesos''.'
  - severity: medium
    issue: La nota [a] está anclada en 'José' pero comenta 'huesos'
    rationale: La disciplina del proyecto exige que el marcador aparezca en la palabra o frase pertinente. La alternativa 'restos' corresponde a עַצְמוֹת, no al nombre José.
  - severity: low
    issue: '''vino a ser heredad'' suena algo menos natural en español actual'
    rationale: No es infiel, pero 'llegó a ser heredad' o simplemente 'fue heredad' fluye mejor en español moderno digno. Puede mejorarse sin cambiar el sentido.
