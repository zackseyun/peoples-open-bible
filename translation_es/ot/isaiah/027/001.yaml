translation:
  language: es
  text: En aquel día Yahvé castigará a Leviatán, la serpiente huidiza[a], a Leviatán, la serpiente retorcida[b], con su espada feroz y grande y fuerte; y matará al dragón[c] que está en el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la serpiente veloz' para 'la serpiente huidiza'.
    reason: lexical_alternative
  - marker: b
    text: O 'la serpiente torcida' para 'la serpiente retorcida'.
    reason: lexical_alternative
  - marker: c
    text: O 'el monstruo marino' para 'el dragón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva de manera idiomática en español con 'En aquel día', que mantiene el valor escatológico y literario sin calco duro.
- source_word: יִפְקֹד
  english_pob_choice: will punish
  chosen_spanish: castigará
  alternatives_spanish:
  - visitará
  - tomará cuenta de
  - traerá juicio sobre
  lexicon: HALOT
  rationale: En contexto judicial y hostil con עַל, פקד expresa la idea de intervenir para castigar. 'Castigará' comunica claramente ese sentido en español moderno sin perder el matiz de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino conforme al criterio del proyecto. 'Yahvé' es la forma española establecida para el Tetragrámaton y evita la sustitución por un título.
- source_word: בְּחַרְבוֹ
  english_pob_choice: with his ... sword
  chosen_spanish: con su espada
  alternatives_spanish:
  - por su espada
  - con la espada de él
  lexicon: HALOT
  rationale: La preposición instrumental se vierte naturalmente con 'con'. 'Su espada' preserva la imagen concreta del arma atribuida a Yahvé.
- source_word: הַקָּשָׁה וְהַגְּדוֹלָה וְהַחֲזָקָה
  english_pob_choice: fierce and great and strong
  chosen_spanish: feroz, grande y fuerte
  alternatives_spanish:
  - dura, grande y fuerte
  - cruel, grande y poderosa
  - fiera, grande y fuerte
  lexicon: HALOT
  rationale: La acumulación adjetival se mantiene en español con una secuencia natural. 'Feroz' recoge el valor intenso de קָשָׁה en contexto de arma/juicio, mientras 'grande' y 'fuerte' conservan la progresión del hebreo.
- source_word: לִוְיָתָן
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - Leviathan
  lexicon: HALOT
  rationale: Se translitera el nombre propio mítico en forma española corriente, conservando el carácter poético y no explicándolo de antemano.
- source_word: נָחָשׁ בָּרִחַ
  english_pob_choice: the fleeing serpent
  chosen_spanish: la serpiente huidiza
  alternatives_spanish:
  - la serpiente fugitiva
  - la serpiente que huye
  - la serpiente veloz
  lexicon: HALOT
  rationale: נָחָשׁ se traduce 'serpiente' por el registro elevado y poético. בָּרִחַ admite 'huidiza' o 'fugitiva'; 'huidiza' conserva la idea de escape/movimiento sin imponerse demasiado sobre el hebreo.
- source_word: נָחָשׁ עֲקַלָּתוֹן
  english_pob_choice: the twisting serpent
  chosen_spanish: la serpiente retorcida
  alternatives_spanish:
  - la serpiente torcida
  - la serpiente enroscada
  - la serpiente sinuosa
  lexicon: HALOT
  rationale: El adjetivo denota algo torcido, doblado o sinuoso. 'Retorcida' reproduce bien la imagen y mantiene el paralelismo con la primera designación de Leviatán.
- source_word: וְהָרַג
  english_pob_choice: and he will kill
  chosen_spanish: y matará
  alternatives_spanish:
  - y matará de muerte
  - y asesinará
  - y dará muerte a
  lexicon: HALOT
  rationale: En esta secuencia profética el verbo continúa con valor futuro. 'Matará' es claro y directo en español contemporáneo.
- source_word: הַתַּנִּין
  english_pob_choice: the dragon
  chosen_spanish: el dragón
  alternatives_spanish:
  - el monstruo marino
  - la serpiente monstruosa
  - el monstruo
  lexicon: HALOT
  rationale: En este contexto poético y mítico, 'dragón' preserva mejor la imaginería elevada vinculada con Leviatán que una expresión más explicativa.
- source_word: אֲשֶׁר בַּיָּם
  english_pob_choice: that is in the sea
  chosen_spanish: que está en el mar
  alternatives_spanish:
  - que está en el mar
  - que está en el mar
  - que está en el océano
  lexicon: HALOT
  rationale: Se conserva la cláusula relativa simple con 'mar', que es la equivalencia natural de בַּיָּם en este contexto poético.
theological_decisions:
- issue: Imaginería mítica de Leviatán y el dragón
  english_pob_reading: Retain the mythic-poetic creatures as literary realities within the prophetic image without identifying them explicitly with Satan or a specific historical empire in the main text.
  chosen_spanish_reading: Mantener a Leviatán y al dragón como figuras mítico-poéticas dentro de la imagen profética, sin identificarlos explícitamente con Satanás ni con un imperio histórico concreto en el texto principal.
  alternative_spanish_readings:
  - Interpretar a Leviatán como símbolo del mal caótico
  - Interpretar a Leviatán como símbolo de naciones o imperios hostiles
  - Interpretar a Leviatán como Satanás
  rationale: El hebreo nombra a Leviatán y al dragón del mar, pero no precisa aquí su referente último. La traducción conserva la tensión teológica y literaria del pasaje, evitando resolverla con una identificación que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de forma anticipada.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que reordenó la frase de la espada para reflejar mejor la estructura hebrea y mantener la puntería de la acción contra Leviatán en sus dos descripciones. La redacción española sigue ese arreglo sintáctico y conserva el carácter formal del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el criterio del proyecto para יהוה.
  - '''Leviatán'' conserva la transliteración española habitual del nombre propio.'
  - '''Serpiente'' se mantiene para נָחָשׁ por el registro poético; no se rebaja a ''víbora'' o ''culebra''.'
  - '''Dragón'' se usa como equivalente poético de הַתַּנִּין, con nota alternativa para ''monstruo marino''.'
  - 'La puntuación refleja dos acciones coordinadas: castigo contra Leviatán y muerte del dragón que está en el mar.'
