translation:
  language: es
  text: Uno edifica y otro derriba—¿qué provecho tuvieron sino fatiga?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué ganaron aparte de fatiga?». El griego pregunta qué beneficio quedó cuando lo que uno edificó fue deshecho por otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομῶν
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - levanta
  lexicon: LSJ
  rationale: El participio presente tiene valor gnómico/proverbial. «Edifica» conserva la imagen concreta de construir y suena natural en español bíblico sin perder precisión.
- source_word: καθαιρῶν
  english_pob_choice: tears down
  chosen_spanish: derriba
  alternatives_spanish:
  - demuele
  - destruye
  lexicon: LSJ
  rationale: Καθαιρέω aquí expresa deshacer o derribar una estructura. «Derriba» mantiene el contraste directo con «edifica» y evita una paráfrasis más fuerte de lo que exige el griego.
- source_word: τί ὠφέλησαν
  english_pob_choice: what did they gain
  chosen_spanish: ¿qué ganaron
  alternatives_spanish:
  - ¿qué provecho tuvieron?
  - ¿qué beneficio obtuvieron?
  lexicon: LSJ
  rationale: Ὠφελέω pregunta por el beneficio o provecho resultante. «Ganaron» es breve, idiomático y conserva el tono retórico de la pregunta.
- source_word: πλεῖον
  english_pob_choice: beyond
  chosen_spanish: más que
  alternatives_spanish:
  - aparte de
  - además de
  lexicon: LSJ
  rationale: La comparación con κόπους pide un matiz de exceso o de saldo restante. «Más que» reproduce bien la idea de que no quedó nada superior a la fatiga.
- source_word: κόπους
  english_pob_choice: toil
  chosen_spanish: fatiga
  alternatives_spanish:
  - trabajo penoso
  - fatiga laboriosa
  - esfuerzo
  lexicon: LSJ
  rationale: Κόπος suele denotar labor agotadora o penosa. «Fatiga» comunica bien el costo físico y deja oír la inutilidad de un esfuerzo cancelado por la demolición posterior.
theological_decisions:
- issue: Sujeto genérico singular en un dicho gnómico
  english_pob_reading: One builds and another tears down
  chosen_spanish_reading: Uno edifica y otro derriba
  alternative_spanish_readings:
  - Un hombre edifica y otro derriba
  - Alguien edifica y otro derriba
  rationale: El griego usa participios singulares sin sustantivo expreso; «uno... otro...» conserva el carácter proverbial y evita introducir un sujeto más específico de lo que el texto da.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Fuerza retórica de la pregunta
  english_pob_reading: what did they gain beyond toil?
  chosen_spanish_reading: ¿qué ganaron más que fatiga?
  alternative_spanish_readings:
  - ¿qué provecho tuvieron sino fatiga?
  - ¿qué obtuvieron aparte de fatiga?
  rationale: La pregunta enfatiza la inutilidad del trabajo cuando la edificación se deshace. «Más que fatiga» conserva el golpe retórico sin añadir explicación interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: sin cambios necesarios; el borrador sigue el acuerdo alto entre el texto griego y el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - «Edifica/derriba» preserva el paralelismo concreto del original y armoniza con el estilo proverbial de POB.
  - Se evita «trabajo» para κόπους porque en español puede sonar demasiado neutral; «fatiga» refleja mejor el esfuerzo penoso implicado.
