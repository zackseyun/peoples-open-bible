lexical_decisions:
- source_word: ἐγκατέλιπες
  english_pob_choice: you abandoned
  chosen_spanish: abandonaste
  alternatives_spanish:
  - dejaste
  - desertaste
  - te apartaste de
  lexicon: BDAG
  rationale: El aoristo de ἐγκαταλείπω expresa un dejar atrás con fuerza real de ruptura. «Abandonaste» comunica mejor esa intensidad que un simple «dejaste», y es natural en español bíblico contemporáneo.
- source_word: πηγήν
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - surgente
  - origen
  lexicon: LSJ
  rationale: Aunque el inglés POB escogió «fountain» para preservar la imagen concreta, en español «fuente» transmite la misma metáfora con dignidad y claridad. «Manantial» es viable, pero «fuente» resulta más amplio y reconocible en registro bíblico.
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sabiduría divina
  lexicon: LSJ
  rationale: «Sabiduría» es la correspondencia directa y conserva la sobriedad del griego. No se amplía a «divina» en el texto principal porque el griego dice simplemente σοφίας; la precisión teológica se mantiene en el contexto sin sobreexplicar.
theological_decisions:
- issue: Metáfora de la «fuente» de sabiduría
  english_pob_reading: Retain the metaphor directly rather than interpret it as 'the source of wisdom' in the main text.
  chosen_spanish_reading: Conservar la metáfora de la «fuente de la sabiduría» sin convertirla en una explicación abstracta.
  alternative_spanish_readings:
  - la fuente de sabiduría
  - el manantial de la sabiduría
  - el origen de la sabiduría
  rationale: El griego usa una imagen concreta (πηγή). En español, «fuente» mantiene esa imagen y permite que el lector perciba el valor poético y teológico del texto sin perder fidelidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: 'La revisión final indicada como sin cambios se refleja en esta propuesta: se conserva la imagen concreta del original y no se introducen ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «sabiduría» de forma uniforme para σοφίας.
  - Se usa «fuente» como equivalente funcional de πηγή, preservando la metáfora del texto griego.
  - El tratamiento de ἐγκατέλιπες como «abandonaste» refleja la fuerza del verbo sin arcaísmo.
