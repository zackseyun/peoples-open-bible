review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: duración temporal, expiación del altar, purificación y consagración. Sin embargo, la nota al pie no coincide del todo con el matiz del inglés auditado y del hebreo idiomático, porque «dedicar para el servicio» desplaza el campo semántico documentado de instalación/consagración/ordenación hacia una opción menos precisa.'
  spanish_quality_summary: 'El español principal es claro, natural y de registro bíblico moderno. «Por siete días» es comprensible, pero «Durante siete días» suena más idiomático en español general. La frase principal necesita además anclar correctamente la nota: el marcador [a] debe acompañar la expresión idiomática final, no «lo purificarán», porque la nota explica וּמִלְאוּ יָדוֹ, no וְטִהֲרוּ אֹתוֹ.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Expiación», «altar», «purificarán» y «consagrarán» son adecuados. La revisión solo corrige la colocación del marcador y afina la nota para ajustarla al rationale léxico y teológico documentado.
  issues:
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota [a] está puesta sobre «lo purificarán», pero el contenido de la nota explica el modismo hebreo «llenar su mano», correspondiente a וּמִלְאוּ יָדוֹ / «lo consagrarán».
  - severity: low
    issue: Redacción de la nota ligeramente desviada del rationale auditado
    rationale: «Dedicar para el servicio» no es incorrecto, pero el rastro auditado prioriza «instalar, consagrar o ordenar para el servicio». Conviene conservar ese abanico semántico más fiel.
  - severity: low
    issue: Mejora estilística menor en la expresión temporal
    rationale: «Durante siete días» suena más natural que «Por siete días» en español neutro, manteniendo el mismo valor de duración.
  revised_spanish_text: Durante siete días harán expiación por el altar, lo purificarán y lo consagrarán[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «llenar su mano», un modismo cultual que significa instalar, consagrar u ordenar para el servicio.'
