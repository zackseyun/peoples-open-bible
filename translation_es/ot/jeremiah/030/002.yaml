translation:
  language: es
  text: 'Así dice Yahvé[a], el Dios de Israel: Escribe para ti en un rollo todas las palabras que te he dicho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en un libro'; el hebreo סֵפֶר se refiere a un documento escrito, a menudo un rollo en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética fija כֹּה אָמַר se expresa de manera natural en español con 'Así dice', que conserva el tono solemne y oracular sin volverse rígido.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en la fórmula profética funciona como presente de proclamación; 'dice' mantiene esa equivalencia estilística en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino, evitando la máscara 'SEÑOR' y preservando la forma auditivamente reconocible en español.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: La frase de constructo identifica a Yahvé de manera pactual e histórica; 'el Dios de Israel' es la equivalencia más clara y estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: En este contexto, el infinitivo introductorio funciona como marcador de cita; el uso de dos puntos comunica en español la transición al discurso directo con naturalidad.
- source_word: כְּתָב
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Anota
  - Escribe por escrito
  lexicon: HALOT
  rationale: El imperativo dirigido a Jeremías se traduce de forma directa; 'Escribe' es la correspondencia más breve y fiel.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para tu propio uso
  - para ti mismo
  lexicon: HALOT
  rationale: El dativo de interés/personalidad se conserva de manera idiomática con 'para ti', que mantiene el matiz sin forzar una explicación innecesaria.
- source_word: כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todos los dichos
  lexicon: HALOT
  rationale: En un contexto de discurso escrito, דְּבָרִים se entiende naturalmente como 'palabras'; el plural femenino concuerda con 'palabras' en español.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֵלֶיךָ
  english_pob_choice: that I have spoken to you
  chosen_spanish: que te he hablado
  alternatives_spanish:
  - que te hablé
  - que he hablado contigo
  lexicon: HALOT
  rationale: '''He hablado'' conserva la conexión entre la palabra ya dada y su vigencia para ser escrita; ''hablado a ti'' se vuelve en español más natural como ''te he hablado''.'
- source_word: אֶל־סֵפֶר
  english_pob_choice: in a scroll
  chosen_spanish: en un rollo
  alternatives_spanish:
  - en un libro
  - en un escrito
  lexicon: HALOT
  rationale: Se prefiere 'rollo' para reflejar el soporte material probable de סֵפֶר en este marco histórico, en consonancia con la nota auditada del POB inglés.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el proyecto POB lo rinde con el Nombre propio y no con una sustitución litúrgica. En español, 'Yahvé' mantiene esa decisión y evita ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de סֵפֶר en el contexto
  english_pob_reading: in a scroll
  chosen_spanish_reading: en un rollo
  alternative_spanish_readings:
  - en un libro
  - en un escrito
  rationale: La nota inglesa señala que סֵפֶר se refiere a un documento escrito, frecuentemente un rollo en este entorno. 'Rollo' preserva mejor el soporte histórico que 'libro', sin negar que puede abarcar un documento escrito.
  doctrine_reference: Nota lexical del POB inglés sobre סֵפֶר
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantiene la fórmula profética, el nombre divino con la forma exigida por el proyecto, el valor imperativo de ''Write'', el dativo de interés y la nota lexical sobre סֵפֶר. No se detectaron revisiones posteriores que obliguen a ajustar la traducción.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - Se mantiene 'rollo' para סֵפֶר por fidelidad al soporte escrito histórico y para armonía con la nota auditada.
  - '''Te he hablado'' preserva el vínculo entre la palabra ya pronunciada y la orden de escribirla sin introducir paráfrasis doctrinal.'
  - La puntuación con dos puntos sigue la función del לֵאמֹר introductorio, como en el inglés auditado.
