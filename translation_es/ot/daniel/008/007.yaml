base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/007.yaml
  text: And I saw him come up to the ram[a], and he was enraged against him, and he struck the ram and broke its two horns. And there was no strength in the ram to stand before him; he threw him to the ground and trampled him[d][c][b], and there was no one to rescue the ram from his hand.
  footnotes:
  - marker: a
    text: Or 'approach the ram.' The Hebrew verb can denote coming near or reaching to.
    reason: lexical_alternative
  - marker: b
    text: Or 'he became bitter against him.' The Hebrew expression conveys intense hostility or embittered rage.
    reason: lexical_alternative
  - marker: c
    text: '''To stand before him'' can also mean ''to withstand him'' in this conflict setting.'
    reason: lexical_alternative
  - marker: d
    text: '''From his hand'' is a Hebrew idiom for being under someone''s power or control.'
    reason: cultural_note
