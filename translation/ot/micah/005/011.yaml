theological_decisions:
- issue: Nature of the condemned practices
  chosen_reading: The verse condemns occult/magical practices and their practitioners as things God will remove from his people.
  alternative_readings:
  - The terms could be rendered more specifically as omen-readers or astrologers in some contexts.
  rationale: The Hebrew terms are broad enough to cover illicit magical and divinatory practices without requiring a narrower technical identification in the main text. The translation keeps the denunciation clear while not over-specifying the exact method of divination.
  doctrine_reference: 'Translation philosophy: preserve what the source text plainly says without importing extra doctrinal claims.'
