translation:
  language: es
  text: Levantaos, y subamos de noche, y destruyamos sus palacios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ciudadelas» o «sus fortalezas». El término hebreo puede designar tanto construcciones destacadas de tipo palaciego como estructuras fortificadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וּמוּ
  english_pob_choice: Rise up
  chosen_spanish: Levantaos
  alternatives_spanish:
  - Alzaos
  - Poneos en pie
  lexicon: HALOT
  rationale: El imperativo plural de קום pide una exhortación enérgica. En español, «Levantaos» transmite la urgencia militar de forma natural y digna. «Alzaos» es posible, pero suena menos común; «Poneos en pie» es más explicativo que imperativo directo.
- source_word: וְ/נַעֲלֶ֣ה
  english_pob_choice: and let us go up
  chosen_spanish: y subamos
  alternatives_spanish:
  - y vayamos arriba
  - y subamos contra ella
  lexicon: HALOT
  rationale: La cohortativa expresa una invitación/exhortación conjunta. «Subamos» conserva el valor volitivo y el hebraísmo del movimiento ascendente. Se evita añadir «contra ella» porque el contexto militar ya está claro y el hebreo no lo dice explícitamente aquí.
- source_word: בַ/לָּ֔יְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: La expresión temporal se vierte de forma idiomática en español. «De noche» es natural, breve y fiel al marco temporal nocturno del asalto.
- source_word: וְ/נַשְׁחִ֖יתָה
  english_pob_choice: and let us destroy
  chosen_spanish: y destruyamos
  alternatives_spanish:
  - y arruinemos
  - y asolamos
  lexicon: HALOT
  rationale: La cohortativa de שׁחת en este contexto exige un verbo de destrucción deliberada. «Destruyamos» es claro y mantiene la fuerza destructiva del hebreo sin suavizarla.
- source_word: אַרְמְנוֹתֶֽי/הָ
  english_pob_choice: her palaces
  chosen_spanish: sus palacios
  alternatives_spanish:
  - sus fortalezas
  - sus ciudadelas
  lexicon: HALOT
  rationale: El POB inglés preserva la amplitud semántica con una nota («palaces / citadels / fortresses»). En español, «palacios» es la equivalencia principal más natural para אַרְמְנוֹת, y el posesivo femenino se mantiene como «sus» por la personificación de la ciudad.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y el pasaje mantiene alta concordancia con el texto fuente y el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene un registro directo y militar, acorde con la escena de asalto implícita en el hebreo.
  - Se evita la paráfrasis expansiva y se conserva la personificación femenina del objeto con «sus palacios».
  - La nota reproduce la alternativa léxica documentada por el POB en inglés sin introducir sentidos ajenos al hebreo.
