theological_decisions:
- issue: Relation of the Hebrew prayer for Shimon and the Greek parallel text
  chosen_reading: Translate the extant Hebrew as primary, while allowing the Greek to inform the choice of 'mercy' for חסדו.
  alternative_readings:
  - A Greek-based rendering such as 'May he entrust his mercy with us, and in his days may he redeem us'
  rationale: For Sirach, where Hebrew survives, project policy gives Hebrew primacy. Here the Greek differs substantially and likely reflects a variant Vorlage or a freer rendering. The main text therefore follows the Hebrew petition concerning Shimon and the Phinehas covenant, while the Greek's ἔλεος supports rendering חסד as 'mercy.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives; original-language primacy over translation tradition.'
