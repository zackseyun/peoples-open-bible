translation:
  language: es
  text: Y a Sem también, el padre de todos los hijos de Éber, el hermano de Jafet el mayor[a], le nacieron hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hermano mayor de Jafet». El adjetivo hebreo «grande/mayor» puede referirse tanto a Sem como a Jafet.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/לְ/שֵׁם
  english_pob_choice: And to Shem also
  chosen_spanish: Y a Sem también
  alternatives_spanish:
  - Y para Sem también
  - Y a Sem asimismo
  lexicon: HALOT
  rationale: La preposición con prefijo introduce a Sem como otro miembro de la genealogía; en español, «a Sem» conserva la relación sintáctica con el dativo hebreo, y «también» mantiene el valor aditivo de גַּם sin recargar el orden.
- source_word: יֻלַּד
  english_pob_choice: children were born
  chosen_spanish: le nacieron hijos
  alternatives_spanish:
  - nacieron hijos
  - le fueron nacidos hijos
  lexicon: HALOT
  rationale: El pasivo de ילד en contexto genealógico se expresa de manera natural en español con la construcción «le nacieron hijos», que comunica descendencia sin forzar un pasivo poco idiomático.
- source_word: גַּם הוּא
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - él también
  - asimismo
  lexicon: HALOT
  rationale: El valor enfático recae en que Sem igualmente recibió descendencia; en español, «también» reproduce ese énfasis de modo sobrio y claro, sin necesidad de repetir «él» en la cláusula principal.
- source_word: אֲבִי כָּל בְּנֵי עֵבֶר
  english_pob_choice: the father of all the sons of Eber
  chosen_spanish: el padre de todos los hijos de Éber
  alternatives_spanish:
  - el antepasado de todos los hijos de Éber
  - el padre de todos los descendientes de Éber
  lexicon: HALOT
  rationale: En genealogías, אָב puede señalar progenitor; «padre» es la equivalencia más directa y transparente. Se mantiene «hijos de Éber» para conservar la referencia formal a Éber, en lugar de generalizar a «descendientes».
- source_word: אֲחִי יֶפֶת
  english_pob_choice: the brother of Japheth
  chosen_spanish: el hermano de Jafet
  alternatives_spanish:
  - el hermano de Jafet el mayor
  - el hermano de Jafet, el mayor
  lexicon: HALOT
  rationale: La relación básica es fraternal; en español, «el hermano de Jafet» refleja fielmente la construcción de genitivo sin adelantar la ambigüedad del adjetivo final.
- source_word: הַ/גָּדֽוֹל
  english_pob_choice: the older
  chosen_spanish: el mayor
  alternatives_spanish:
  - el mayor de edad
  - el anciano
  - el elder
  lexicon: HALOT
  rationale: En contexto de parentesco, גדול suele referirse a antigüedad/seniority, no a «grandeza»; «el mayor» es la forma más natural en español para esa idea. Se evita resolver el adjunto de manera más fuerte de lo que el hebreo exige.
theological_decisions:
- issue: A qué nombre se adjunta el adjetivo final גדול
  english_pob_reading: 'The Hebrew permits either attachment: it may describe Shem (''the older brother of Japheth'') or Japheth (''the brother of Japheth the elder'').'
  chosen_spanish_reading: Se deja en la traducción principal como «el hermano de Jafet el mayor», manteniendo la ambigüedad sintáctica del hebreo sobre si «el mayor» describe a Jafet o al hermano.
  alternative_spanish_readings:
  - el hermano mayor de Jafet
  - el hermano de Jafet, el mayor
  rationale: El hebreo permite más de una lectura; en vez de resolverla con exceso de certeza, la redacción principal conserva la tensión sintáctica. Así se respeta el dato genealógico sin imponer una adjudicación que el texto no obliga a hacer.
  doctrine_reference: 'Principio de la POB: preservar ambigüedad real del original cuando no afecta la claridad doctrinal.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente reordenó la frase final para reflejar mejor la ambigüedad hebrea: «the brother of Japheth the elder» en lugar de «the older brother of Japheth». La versión española adopta una formulación igualmente abierta («el hermano de Jafet el mayor») y la acompaña con nota alternativa para no fijar indebidamente una sola relación sintáctica.'
  spanish_consistency_notes:
  - Se usa «Sem» y «Jafet» como formas españolas estándar y consistentes en la genealogía.
  - Se prefiere «hijos» para בני en continuidad con la terminología genealógica del pasaje.
  - «El mayor» mantiene el sentido de senioridad familiar sin introducir una lectura doctrinal o interpretativa adicional.
