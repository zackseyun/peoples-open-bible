translation:
  language: es
  text: Efraín ha provocado amarga ira; su culpa de sangre[a] quedará sobre él, y su Señor le pagará por su vergüenza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su sangre» o «su derramamiento de sangre». En contextos judiciales, el hebreo «sangres» suele llevar el sentido de culpa de sangre.
    reason: lexical_alternative
  - marker: b
    text: O «su amo le devolverá su reproche». El hebreo también puede expresarse más literalmente como un retorno de su deshonra sobre él.
    reason: alternative_reading
lexical_decisions:
- source_word: הִכְעִ֥יס
  english_pob_choice: has provoked
  chosen_spanish: ha provocado
  alternatives_spanish:
  - ha irritado
  - ha provocado a ira
  - ha amargado
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar provocación/ira. «Ha provocado» reproduce bien esa fuerza causal en español sin añadir matices que el hebreo no exige.
- source_word: תַּמְרוּרִ֑ים
  english_pob_choice: bitter anger
  chosen_spanish: amarga ira
  alternatives_spanish:
  - amargura
  - ira amarga
  - amarga provocación
  lexicon: HALOT
  rationale: El plural intensivo ligado a מרר comunica intensidad y amargura. «Amarga ira» mantiene el efecto adverbial/intensivo sin volverlo demasiado abstracto.
- source_word: וְדָמָיו
  english_pob_choice: his bloodguilt
  chosen_spanish: su culpabilidad de sangre
  alternatives_spanish:
  - su sangre
  - su derramamiento de sangre
  - su sangre derramada
  - su culpa de sangre
  lexicon: HALOT
  rationale: En contexto judicial-profético, דמים puede referirse a sangre derramada o a culpa de sangre. «Culpabilidad de sangre» preserva ese sentido forense sin ocultar la literalidad subyacente.
- source_word: עָלָיו יִטּוֹשׁ
  english_pob_choice: will be left on him
  chosen_spanish: quedará sobre él
  alternatives_spanish:
  - permanecerá sobre él
  - será dejado sobre él
  - será arrojado sobre él
  lexicon: HALOT
  rationale: El valor aquí es de permanencia de una carga/culpa sobre alguien. «Quedará sobre él» transmite ese estado resultante con naturalidad en español.
- source_word: וְחֶרְפָּתוֹ
  english_pob_choice: his disgrace
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su reproche
  - su deshonra
  - su oprobio
  lexicon: HALOT
  rationale: חרפה puede ser reproche, vergüenza o deshonra. «Vergüenza» es claro y conserva el sentido de deshonra pública; se mantiene la tensión léxica con posibles alternativas más forenses o más sociales.
- source_word: יָשִׁ֥יב ל֖וֹ
  english_pob_choice: will repay him for
  chosen_spanish: le pagará por
  alternatives_spanish:
  - le devolverá
  - le retribuirá por
  - le hará volver
  lexicon: HALOT
  rationale: 'El hifil de שוב con ל tiene fuerza retributiva: devolver/repagar. «Le pagará por» comunica bien esa retribución en español moderno y mantiene el paralelismo judicial.'
- source_word: אֲדֹנָֽי/ו
  english_pob_choice: his Lord
  chosen_spanish: su Señor
  alternatives_spanish:
  - su dueño
  - su amo
  - su Señor
  lexicon: HALOT
  rationale: Aunque la forma puede leerse como título singular, el contexto profético apunta a Dios como juez. «Señor» conserva la dignidad del título sin sustituir por el nombre divino no escrito aquí.
theological_decisions:
- issue: Referente de אֲדֹנָיו
  english_pob_reading: A divine title referring to God, rendered 'his Lord'
  chosen_spanish_reading: Un título divino que se refiere a Dios, renderizado como «su Señor»
  alternative_spanish_readings:
  - su dueño
  - su amo
  rationale: En Oseas, el que deja la culpabilidad sobre Efraín y le paga por su vergüenza es Dios. «Su Señor» preserva el carácter de título divino y evita forzar el nombre Yahvé donde el hebreo usa אֲדֹנָיו.
  doctrine_reference: 'Translation philosophy: traducir títulos; transliterar nombres'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se omitió cualquier conector inferido como «por lo tanto», porque no está explícito en el hebreo. Se conservó la estructura de juicio: provocación, permanencia de la culpa y retribución por la vergüenza.'
  spanish_consistency_notes:
  - Se usa «Efraín» como sujeto del juicio, siguiendo el hebreo y la POB inglesa.
  - Se evita «SEÑOR» como máscara tipográfica; se traduce el título como «Señor» por tratarse de una referencia divina contextual.
  - «Culpabilidad de sangre» mantiene la tensión entre literalidad («sangres») y sentido forense.
  - No se introduce lenguaje eclesiástico adicional; el verso conserva un tono profético y judicial.
