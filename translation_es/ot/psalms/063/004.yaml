translation:
  language: es
  text: Porque tu amor leal[a] es mejor que la vida; mis labios te alabarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amor constante' o 'amor de pacto'. El hebreo חֶסֶד denota un amor fiel y leal, a menudo en relación de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación siguiente en español natural. 'Porque' conserva la relación causal o explicativa que el inglés POB expresa con 'For'.
- source_word: טוֹב
  english_pob_choice: better than
  chosen_spanish: es mejor que
  alternatives_spanish:
  - es bueno más que
  - supera a
  lexicon: HALOT
  rationale: Con la comparación implícita con מֵחַיִּים, el sentido es comparativo. 'Es mejor que' comunica de forma clara y fiel la idea de superioridad.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu amor constante
  - tu misericordia
  - tu amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד expresa amor fiel, leal y relacional. 'Amor leal' preserva esa fuerza sin recurrir a un giro demasiado técnico; mantiene la tensión entre afecto y fidelidad que el POB inglés quiso resguardar con 'steadfast love'.
- source_word: מֵחַיִּים
  english_pob_choice: than life
  chosen_spanish: que la vida
  alternatives_spanish:
  - que vivir
  - que las vidas
  lexicon: HALOT
  rationale: El plural hebreo funciona idiomáticamente como 'vida' en singular. 'Que la vida' conserva el valor abstracto y la comparación.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi boca
  - mi habla
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo en lugar de abstraerla a 'habla' o 'voz'.
- source_word: יְשַׁבְּחוּנְךָ
  english_pob_choice: will praise you
  chosen_spanish: te alabarán
  alternatives_spanish:
  - te ensalzarán
  - te alabarán con himnos
  lexicon: HALOT
  rationale: El piel de שׁבח significa alabar/ensalzar. 'Te alabarán' es natural en español y conserva el futuro de la acción poética.
theological_decisions:
- issue: Traducción de חֶסֶד en contexto de adoración
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - amor de pacto
  - bondad constante
  rationale: La elección busca preservar la idea de fidelidad amorosa, no solo benevolencia emocional. 'Amor leal' comunica la constancia relacional que está en juego en el salmo y evita reducir el término a 'misericordia'.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El inglés POB mantiene una equivalencia óptima con nota léxica para חֶסֶד. La versión española conserva esa misma tensión semántica con 'amor leal' y mantiene la estructura poética del verso sin suavizar el contraste con 'la vida'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el verso no contiene el nombre divino.
  - '''Alabar'' conserva la fuerza verbal estándar para שׁבח en registros litúrgicos y poéticos.'
  - La puntuación reproduce la pausa del hemistiquio hebreo y la coordinación final del verso.
