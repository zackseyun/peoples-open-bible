lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: En esta lista de conquista, מֶלֶךְ introduce a cada gobernante de ciudad-estado. En español, la forma natural y fiel es 'el rey de', manteniendo la estructura nominal repetida del hebreo y la función de encabezado para cada entrada.
- source_word: מַקֵּדָה
  english_pob_choice: Makkedah
  chosen_spanish: Makeda
  alternatives_spanish:
  - Makkedá
  - Makkeda
  lexicon: HALOT
  rationale: Es un topónimo propio. Se translitera de manera consistente al español como 'Makeda', sin intentar traducirlo etimológicamente.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - uno solo
  lexicon: HALOT
  rationale: Aquí אֶחָד funciona como cifra de conteo después de cada rey derrotado. 'Uno' conserva la brevedad del hebreo y la enumeración repetitiva del pasaje.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  - casa de Dios
  lexicon: HALOT
  rationale: Aunque el nombre procede de 'casa de Dios', aquí funciona claramente como topónimo. En español bíblico es más natural y reconocible 'Betel'.
translation_notes:
  revision_awareness: El texto base y el aparato inglés muestran alta concordancia y no requieren revisión sustantiva; se conserva el estilo telegráfico del hebreo con una transliteración estable de los topónimos.
  spanish_consistency_notes:
  - Se mantuvo la estructura repetida 'el rey de ... , uno' para reflejar el conteo breve del hebreo.
  - Se transliteró מַקֵּדָה como 'Makeda' y בֵּית אֵל como 'Betel' siguiendo uso bíblico español natural.
  - No se añadió puntuación explicativa en el texto principal más allá de la necesaria para la enumeración.
