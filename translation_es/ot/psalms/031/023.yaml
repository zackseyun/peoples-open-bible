revisions:
- from: 'En cuanto a mí[a], yo dije en mi alarma[b]: «Estoy apartado de delante de tus ojos». Pero tú escuchaste la voz de mis ruegos, cuando clamé a ti por ayuda.'
  to: 'En cuanto a mí, yo dije en mi alarma[a]: «He sido excluido de delante de tus ojos[b]». Pero tú escuchaste la voz de mis ruegos cuando clamé a ti por ayuda.'
  rationale: Se corrigen los anclajes de las notas para que correspondan a las frases explicadas; se fortalece נִגְרַזְתִּי con «He sido excluido», que preserva mejor la sensación de haber sido removido/cortado de la vista de Dios sin sonar torpe; y se mantiene el resto del verso con ajustes mínimos para conservar fidelidad, claridad y tono poético.
