lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: En un contexto genealógico, בְנֵי se expresa de forma natural en español como 'los hijos de'. Conservo la conjunción inicial 'Y' para reflejar la continuación de la lista genealógica, como hace la POB en inglés.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reuben
  lexicon: Convención española bíblica estándar
  rationale: El nombre propio tiene forma castellana asentada 'Rubén', más natural y reconocible para lectores bíblicos en español que una transliteración más cercana al inglés.
- source_word: חֲנוֹךְ
  english_pob_choice: Hanoch
  chosen_spanish: Hanoch
  alternatives_spanish:
  - Enoc
  - Hanoc
  lexicon: HALOT
  rationale: Se conserva una transliteración cercana al hebreo, siguiendo la decisión de la POB inglesa de evitar la forma tradicionalizada 'Enoch'. La nota explica la alternativa histórica 'Enoc' en algunas traducciones.
- source_word: וּ/פַלּוּא
  english_pob_choice: Pallu
  chosen_spanish: Pallu
  alternatives_spanish:
  - Falu
  - Phallu
  lexicon: HALOT
  rationale: Se mantiene la transliteración simple del nombre propio. El prefijo conjuntivo hebreo queda absorbido por la sintaxis española de la enumeración, como en la traducción inglesa auditada.
- source_word: וְ/חֶצְר֥וֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Jezrón
  - Hezron
  lexicon: HALOT
  rationale: 'Se translitera el nombre con acento gráfico en español: ''Hezrón''. Esta forma preserva la cercanía al hebreo y resulta legible en español, manteniendo la decisión inglesa de no usar una equivalencia tradicional distinta.'
- source_word: וְ/כַרְמִי
  english_pob_choice: Carmi
  chosen_spanish: Carmi
  alternatives_spanish:
  - Karmi
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa. 'Carmi' es transparente y coincide con la forma internacional más difundida; el hebreo conjuntivo queda reflejado por la coordinación española.
translation_notes:
  revision_awareness: El audit trail inglés no introduce variantes textuales ni cambios doctrinales; la única decisión relevante es la transliteración del nombre חֲנוֹךְ frente a la forma tradicionalizada. Se mantiene la estructura genealógica simple del hebreo y de la POB inglesa.
  spanish_consistency_notes:
  - Se conserva el estilo genealógico enumerativo con coordinación simple.
  - 'Los nombres propios se tratan con consistencia: Rubén como forma castellana asentada; Hanoch, Pallu, Hezrón y Carmi como transliteraciones cercanas al hebreo.'
  - La nota al pie se ancla únicamente en Hanoch, porque allí existe una alternativa lexical documentada en el audit trail inglés.
