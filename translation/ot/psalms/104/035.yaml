id: PSA.104.35
reference: Psalms 104:35
source:
  edition: WLC
  text: יִתַּ֤מּוּ חַטָּאִ֨ים מִן הָ/אָ֡רֶץ וּ/רְשָׁעִ֤ים ע֤וֹד אֵינָ֗/ם בָּרֲכִ֣י נַ֭פְשִׁ/י אֶת יְהוָ֗ה הַֽלְלוּ יָֽהּ׀־׀־־׃
translation:
  text: May sinners be finished from the earth[a], and may the wicked be no more. Bless Yahweh, O my soul[b]. Hallelujah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'May sinners come to an end from the earth.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Praise Yah!'' The expression is traditionally transliterated ''Hallelujah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתַּמּוּ
  chosen: may ... be consumed
  alternatives:
  - may come to an end
  - may be finished
  - let ... vanish
  lexicon: HALOT
  rationale: The verb from תמם in the Qal imperfect 3mp can denote coming to an end or being consumed/completed. In this imprecatory-wish context with 'from the earth,' 'be consumed' best conveys removal rather than moral improvement, while preserving the jussive-like force with 'may.'
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive meaning those characterized by sin. 'Sinners' is concise and idiomatic.
- source_word: מִן הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' in Psalm 104 the scope is cosmic/creational, so 'earth' fits the psalm's broader frame better than a localized 'land.'
- source_word: וּרְשָׁעִים
  chosen: and the wicked
  alternatives:
  - and wicked people
  lexicon: HALOT
  rationale: Substantival plural adjective regularly rendered 'the wicked.' This preserves the moral category without unnecessary expansion.
- source_word: עוֹד אֵינָם
  chosen: be no more
  alternatives:
  - be no longer
  - exist no more
  lexicon: HALOT
  rationale: The phrase expresses cessation of existence/presence. 'Be no more' is natural English and matches the poetic register.
- source_word: בָּרֲכִי נַפְשִׁי
  chosen: Bless the LORD, O my soul
  alternatives:
  - Praise the LORD, O my soul
  lexicon: HALOT
  rationale: ברך with God as object is traditionally and accurately rendered 'bless.' Retaining 'O my soul' preserves the psalm's self-exhortation and poetic continuity with earlier refrains in the psalm.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַלְלוּ יָהּ
  chosen: Hallelujah!
  alternatives:
  - Praise Yah!
  - Praise the LORD!
  lexicon: HALOT
  rationale: This fixed liturgical expression is well established in English as 'Hallelujah.' Since יָהּ is a shortened divine name, 'Hallelujah' preserves the recognizable doxological force; an alternative more transparently literal rendering is worth preserving in a footnote.
