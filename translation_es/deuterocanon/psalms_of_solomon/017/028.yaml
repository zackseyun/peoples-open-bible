review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega: futuro doble (''reunirá... juzgará''), ''un pueblo santo'', liderazgo del pueblo y santificación pasiva por parte de Dios. Sin embargo, hay ajustes necesarios: ἐν δικαιοσύνῃ está mejor como «en rectitud» o «en justicia», pero la nota actual repite exactamente el texto principal; además, «al cual lo conducirá» suena redundante en español. También conviene alinear la política general del proyecto sobre κύριος/YHWH con una formulación principal en español que no enmascare indebidamente el nombre divino.'
  spanish_quality_summary: El español es claro, pero «al cual lo conducirá» es poco natural por el doble marcado del objeto; «a quien conducirá» o «al que conducirá» lee mejor. La nota [b] es defectuosa porque ofrece como alternativa la misma frase del texto. «Pueblo santificado por Yahvé su Dios» es legible y más coherente con la terminología del proyecto. El registro general es digno y moderno.
  glossary_alignment: Buen uso de «pueblo santo», «juzgará» y «santificado». El principal desajuste terminológico es «Señor» en vez de «Yahvé» en el texto principal, dado que la política del proyecto pide «Yahvé» cuando κύριος representa el nombre divino; aquí no hay una razón suficiente para mantener la convención de enmascaramiento en español. Para δικαιοσύνη, «rectitud» funciona mejor como principal porque evita repetir una alternativa idéntica y conserva el matiz ético; «justicia» puede quedar en nota.
  issues:
  - severity: medium
    issue: La frase «al cual lo conducirá» es poco natural en español.
    rationale: Combina relativo con duplicación pronominal innecesaria. «a quien conducirá» expresa el mismo sentido con mejor fluidez y dignidad.
  - severity: medium
    issue: 'La nota [b] repite exactamente el texto principal: «O “en justicia”».'
    rationale: Una nota de alternativa no puede duplicar la lectura principal. Debe ofrecer una opción real, como «en rectitud», o el texto principal debe cambiar.
  - severity: medium
    issue: «por el Señor su Dios» no sigue la terminología por defecto del proyecto para el nombre divino.
    rationale: Aunque la fuente inmediata es griega, el sintagma claramente refiere al Dios de Israel y la política general pide «Yahvé» en el texto principal salvo razón documentada fuerte. Aquí «por Yahvé, su Dios» preserva mejor esa política y sigue siendo natural.
  revised_spanish_text: Y reunirá un pueblo santo, a quien conducirá en rectitud[a]; y juzgará las tribus del pueblo santificado por Yahvé, su Dios.[b]
  revised_footnotes:
  - marker: a
    text: O «en justicia».
    reason: lexical_alternative
  - marker: b
    text: O «santificado por el Señor su Dios».
    reason: lexical_alternative
  revision_rationale: Se mejoró la naturalidad de la relativa («a quien conducirá»), se corrigió la nota defectuosa sobre δικαιοσύνη colocando «en rectitud» en el texto y «en justicia» como alternativa real, y se alineó el texto principal con la política del proyecto usando «Yahvé» para la referencia divina, conservando en nota la alternativa más cercana al audit trail inglés.
