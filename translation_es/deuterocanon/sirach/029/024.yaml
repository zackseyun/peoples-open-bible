translation:
  language: es
  text: Una vida miserable es andar de casa en casa[a], y donde se hospeda como forastero[b], no abrirá la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una vida desdichada». El griego permite una traducción más literal («una vida mala»), pero el sentido aquí es la inseguridad y la penuria de ir cambiando de hogar.
    reason: lexical_alternative
  - marker: b
    text: «Se hospeda como forastero» traduce un verbo que expresa residir como huésped, foráneo o alguien sin pertenencia estable a la casa.
    reason: cultural_note
lexical_decisions:
- source_word: ζωὴ πονηρά
  english_pob_choice: a miserable life
  chosen_spanish: una vida miserable
  alternatives_spanish:
  - una vida desdichada
  - una vida desgraciada
  - una vida wretched
  lexicon: LSJ
  rationale: En este contexto, πονηρά califica la condición de la vida como penosa e insegura, no como «moralmente mala». «Miserable» conserva el juicio sobre la calidad de vida y sigue de cerca la decisión auditada en inglés.
- source_word: ἐξ οἰκίας εἰς οἰκίαν
  english_pob_choice: to go from house to house
  chosen_spanish: andar de casa en casa
  alternatives_spanish:
  - ir de casa en casa
  - de casa en casa
  - pasar de casa en casa
  lexicon: LSJ
  rationale: La expresión describe un movimiento inestable entre hogares. «Andar de casa en casa» mantiene la imagen idiomática y sugiere tránsito continuo sin volverla demasiado literal o rígida en español.
- source_word: παροικήσει
  english_pob_choice: stays as a stranger
  chosen_spanish: mora como forastero
  alternatives_spanish:
  - vive como extraño
  - habita como extranjero
  - reside como forastero
  lexicon: LSJ
  rationale: παροικέω indica residir sin pertenencia plena, como alguien de paso o sin estatus de miembro de la casa. «Forastero» comunica bien la extranjería social; «mora» conserva el valor de residencia temporal.
- source_word: οὐκ ἀνοίξει στόμα
  english_pob_choice: he will not open his mouth
  chosen_spanish: no abrirá la boca
  alternatives_spanish:
  - no hablará
  - no se atreverá a abrir la boca
  - no abrirá su boca
  lexicon: LSJ
  rationale: La frase es idiomática y literalmente significa abstenerse de hablar. «No abrirá la boca» preserva la imagen, la fuerza expresiva y la posible idea de falta de libertad o de estatus para hablar.
translation_notes:
  revision_awareness: 'El texto griego coincide sustancialmente con el testimonio auditado en inglés; se conserva la misma estructura de dos miembros y las mismas dos decisiones interpretativas clave: ζωὴ πονηρά como condición miserable, y παροικήσει como residencia sin pertenencia. No se requiere revisión textual adicional.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo del griego con dos cláusulas coordinadas.
  - Se evita «SEÑOR» u otra terminología teológica irrelevante aquí, pues el versículo no contiene el nombre divino ni títulos cristológicos.
  - «Forastero» se usa en sentido social de outsider/sojourner, no de turista o visitante casual.
  - La puntuación con coma reproduce el corte natural del enunciado griego.
