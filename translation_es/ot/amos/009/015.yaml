translation:
  language: es
  text: Yo los plantaré en su tierra[a], y nunca más serán arrancados de la tierra que les he dado, dice Yahvé, tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu Dios» en singular; algunos entienden aquí un tratamiento dirigido a Israel como pueblo, mientras que «su Dios» es una suavización posible.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּנְטַעְתִּים
  english_pob_choice: I will plant them
  chosen_spanish: Yo los plantaré
  alternatives_spanish:
  - los estableceré
  - los asentaré
  lexicon: HALOT
  rationale: נטע conserva en español el verbo concreto «plantar», que mantiene la imagen agrícola de restauración del texto hebreo. «Establecer» o «asentar» explican la idea de permanencia, pero atenúan la metáfora original.
- source_word: עַל אַדְמָתָם
  english_pob_choice: on their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - sobre su suelo
  - en su terreno
  lexicon: HALOT
  rationale: אדמה puede significar suelo, terreno o tierra. En este contexto de promesa de restauración, «tierra» expresa mejor el sentido de posesión y herencia. «En» es la preposición más natural en español con este valor local.
- source_word: וְלֹא יִנָּתְשׁוּ עוֹד
  english_pob_choice: and they will never again be uprooted
  chosen_spanish: y nunca más serán arrancados
  alternatives_spanish:
  - y nunca más serán desarraigados
  - y no volverán a ser arrancados
  lexicon: HALOT
  rationale: El nifal de נתש expresa ser arrancado o arrancado de raíz. «Serán arrancados» preserva la fuerza verbal y la metáfora de la plantación. «Desarraigados» es posible, pero suena más interpretativo en español.
- source_word: מֵעַל אַדְמָתָם
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - fuera de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «de encima de». En español, «de la tierra» transmite de manera natural la idea de remoción sin introducir aspereza sintáctica. Repetir «tierra» mantiene el enlace temático con la frase anterior.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם
  english_pob_choice: that I have given them
  chosen_spanish: que les he dado
  alternatives_spanish:
  - que les di
  - que yo les he dado
  lexicon: HALOT
  rationale: El perfecto hebreo admite un valor vigente. «Les he dado» resalta que el don divino permanece válido. «Les di» es posible, pero en español puede sonar menos enfático respecto a la permanencia del regalo.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - ha dicho Yahvé
  lexicon: HALOT
  rationale: El fórmula profética se vierte naturalmente en presente en español. Se conserva «Yahvé» según la convención del proyecto para יהוה, sin sustituirlo por «el SEÑOR».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El texto masorético tiene sufijo singular de segunda persona. En español, «tu Dios» refleja ese dato textual de forma directa. Aunque el referente colectivo puede sugerir «su Dios», esa lectura suaviza el detalle textual que el POB inglés decidió conservar.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en transliteración, conforme a la convención del proyecto y al valor del Tetragrámaton en el hebreo. No se sustituye por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pronombre final en אֱלֹהֶיךָ
  english_pob_reading: your God
  chosen_spanish_reading: tu Dios
  alternative_spanish_readings:
  - su Dios
  - de ustedes, Dios
  rationale: Se mantiene la lectura masorética singular en el texto principal. Aunque el contexto favorece un destinatario colectivo, no hay base para nivelar la forma textual en la línea principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo consonántico/masorético y el audit trail inglés sin cambios revisionales pendientes; la única tensión textual relevante es el sufijo singular de אֱלֹהֶיךָ, mantenido en el texto principal y señalado en nota.
  spanish_consistency_notes:
  - Se preserva la metáfora agrícola con «plantar» / «arrancados».
  - «Tierra» se usa de manera coherente para אַדְמָה en ambas ocurrencias.
  - El nombre divino se translitera como «Yahvé» según la terminología del proyecto.
  - 'La fórmula profética se mantiene en presente: «dice Yahvé».'
  - Se conserva el sufijo singular textual en «tu Dios» con nota explicativa.
