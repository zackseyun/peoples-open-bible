translation:
  language: es
  text: Roboam vivió en Jerusalén, y edificó ciudades fortificadas[a] en Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ciudades para defensa' o 'ciudades como fortalezas'; el hebreo dice literalmente 'ciudades para fortificación/defensa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - habitó
  - residió
  - se estableció
  lexicon: HALOT
  rationale: ישב puede significar vivir, morar o habitar. En este contexto narrativo, 'vivió' suena natural en español moderno y conserva la idea de residencia sin añadir una transición no explicitada por el hebreo.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Es una frase locativa directa. Se conserva el nombre propio convencional en español y la preposición simple 'en'.
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: בנה es 'construir/edificar'. 'Edificó' mantiene el valor verbal de construcción y suena bien en registro bíblico español sin volverse arcaico.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - fortalezas
  lexicon: HALOT
  rationale: El plural de עִיר se rinde normalmente como 'ciudades'. 'Poblaciones' es posible pero menos preciso; 'fortalezas' ya pertenecen al valor del complemento siguiente, no al sustantivo base.
- source_word: לְמָצוֹר
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades para defensa
  - ciudades como fortalezas
  - ciudades fortaleza
  lexicon: HALOT
  rationale: מָצוֹר puede referirse a fortificación/defensa/sitio. El inglés POB optó por 'fortified cities', y en español 'ciudades fortificadas' reproduce con naturalidad el valor funcional sin exagerar el matiz militar más allá del hebreo.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - dentro de Judá
  lexicon: HALOT
  rationale: Se conserva la localización regional estándar con el nombre propio 'Judá'.
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó 'cities for defense' por 'fortified cities' para reflejar con más naturalidad לְמָצוֹר. La redacción española sigue esa decisión revisada, usando 'ciudades fortificadas' como equivalente natural y fiel.
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' y 'Judá' como topónimos bíblicos estándar en español.
  - '''Edificó'' se usa con el sentido bíblico de construir, sin implicar necesariamente arquitectura monumental.'
  - La nota al pie conserva la alternativa semántica del hebreo y la tensión entre defensa, fortificación y ciudad fortaleza.
