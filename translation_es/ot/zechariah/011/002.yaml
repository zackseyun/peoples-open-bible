review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la imaginería arbórea, la causalidad con «porque», y la ambigüedad final de ה/בצור. Conserva correctamente «ciprés», «cedro», «Basán» y la metáfora sin explicitar gobernantes. Sin embargo, hay dos desajustes importantes con el audit trail: la nota [a] está anclada al verbo «Lamenta» aunque la alternativa «abeto» corresponde a בְּרוֹשׁ («ciprés»), y el orden de las notas/correspondencias en la segunda cláusula inglesa sugiere que la alternativa sobre «los poderosos» pertenece a אַדִּרִים, no al lugar actual si no se aclara bien. Además, «ha descendido el bosque denso» suena menos natural en español para un bosque abatido; «ha venido abajo» o «se ha venido abajo» preserva mejor יָרַד sin implicar lectura demasiado literal de movimiento voluntario.'
  spanish_quality_summary: El español es mayormente claro y digno, pero hay detalles de naturalidad y precisión editorial que conviene reparar. «Lamenta» funciona, aunque «gime» o «aúlla» serían más fuertes; no es un error. «Encinos de Basán» es viable en América Latina, pero «robles de Basán» es más ampliamente reconocible en registro bíblico panhispánico. Lo más problemático es la colocación de la nota [a] y la frase «ha descendido el bosque denso», que resulta algo rígida. Conviene también ajustar la nota [a] para que diga «O “abeto” por “ciprés”» y anclarla en «ciprés[a]».
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. La preservación de la imaginería arbórea coincide con la decisión teológica documentada. «Ciprés» sigue la preferencia POB para בְּרוֹשׁ. «Los majestuosos» es aceptable aunque poco idiomático; se mantiene la intención de no resolver la metáfora. «Robles» se recomienda por claridad amplia, aunque «encinos» no contradice el sentido.
  issues:
  - severity: high
    issue: La nota [a] está anclada al verbo equivocado.
    rationale: La nota «O “abeto” para בְּרוֹשׁ» corresponde al sustantivo «ciprés», no a «Lamenta». Esto rompe la trazabilidad léxica exigida y puede confundir al lector.
  - severity: medium
    issue: «Ha descendido el bosque denso» suena poco natural en español.
    rationale: Aunque intenta reflejar יָרַד, en español un bosque no suele «descender» en este contexto. «Se ha venido abajo» o «ha venido abajo» conserva mejor la idea de abatimiento/caída del bosque.
  - severity: low
    issue: «Encinos de Basán» es regionalmente válido pero menos universal que «robles de Basán».
    rationale: Para una Biblia de lectura eclesial amplia en español neutro, «robles» será más inmediatamente reconocible en la mayoría de regiones. No es un error semántico, pero sí una mejora de alcance.
  revised_spanish_text: ¡Lamenta, ciprés[a], porque cayó el cedro, porque los majestuosos[b] han sido destruidos! ¡Lamenten, robles de Basán, porque el bosque denso[c] ha venido abajo!
  revised_footnotes:
