review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: imperfecto pasivo de ἐβαπτίζοντο, locativo explícito «en el río Jordán», agencia «por él», y participio concomitante «confesando sus pecados». Sin embargo, la nota al pie no preserva correctamente la alternativa inglesa: pone como texto principal y alternativa la misma frase, y la opción «eran siendo bautizados» es español antinatural y no corresponde a una alternativa útil.'
  spanish_quality_summary: 'El texto principal es claro, natural y fiel: «y eran bautizados por él en el río Jordán, confesando sus pecados». La única reparación necesaria es la nota, para que el español sea idiomático y para que la distinción aspectual quede bien expresada.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Bautizados», «pecados» y la sintaxis general son adecuadas. No aplica terminología especial como «Yahvé» o «Mesías» en este versículo.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal como si fuera alternativa.
    rationale: La nota dice «O «eran bautizados»», pero esa ya es la redacción principal, así que no ofrece una variante real ni preserva la lógica de la nota inglesa.
  - severity: medium
    issue: La frase de nota «eran siendo bautizados» es antinatural en español.
    rationale: Aunque intenta reflejar el aspecto imperfecto/progresivo, esa formulación no es español estándar ni digno para una Biblia legible. Conviene explicar el matiz aspectual en la nota con una alternativa natural como «fueron bautizados».
  revised_spanish_text: y eran bautizados por él en el río Jordán[a], confesando sus pecados.
  revised_footnotes:
  - marker: a
    text: 'O «fueron bautizados»; el imperfecto griego puede enfatizar una acción continua o repetida: «eran bautizados».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Se corrige únicamente la nota al pie para que presente una alternativa real, refleje correctamente la diferencia aspectual del imperfecto griego y evite una formulación española antinatural.
