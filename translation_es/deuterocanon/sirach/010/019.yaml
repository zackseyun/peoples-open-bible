    text: 'Paralelo griego: «¿Qué descendencia es deshonrosa? La descendencia humana». El testimonio hebreo, en cambio, lee: «¿Qué descendencia es honrada? Los que guardan el mandamiento».'
    reason: textual_variant
  - marker: b
    text: El griego dice «los que temen al Señor», mientras que el hebreo lee «los que temen a Dios».
    reason: alternative_reading
  revision_rationale: 'Se recomienda una reparación menor para mejorar la naturalidad del español: cambiar «honorable» por «honrada» en las tres repeticiones, manteniendo intacto el contenido, la estructura retórica y las notas textuales. También se armoniza la cita interna de la nota [a] con esa mejora estilística.'
