translation:
  language: es
  text: Hijo de Adán[a], pon tu rostro contra el monte Seír y profetiza contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mortal, pon tu rostro contra el monte Seír y profetiza contra él».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conserva el giro idiomático propio de Ezequiel y su repetición característica en el libro. En español, «hijo de hombre» reproduce con fidelidad la forma tradicional del apelativo sin deshacer la imagen, mientras que «mortal» interpreta el sentido pero pierde la estructura lexical repetida.
- source_word: שִׂים פָּנֶיךָ
  english_pob_choice: set your face
  chosen_spanish: pon tu rostro
  alternatives_spanish:
  - dirige tu rostro
  - vuelve tu rostro
  lexicon: HALOT
  rationale: El hebreo usa la imagen concreta de colocar el rostro como gesto de determinación y oposición. «Pon tu rostro» mantiene esa metáfora con naturalidad en español; «dirige» o «vuelve» suavizan demasiado el cuerpo de la expresión.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: En este contexto profético, la preposición tiene fuerza adversativa. «Contra» expresa mejor la orientación hostil del mandato y corresponde al uso doble del versículo con el mismo valor.
- source_word: הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: el monte Seír
  alternatives_spanish:
  - el monte Seir
  - la serranía de Seír
  lexicon: HALOT
  rationale: Se trata de un nombre geográfico propio; por eso se conserva la referencia toponímica. «Seír» sigue la forma española habitual de transliteración, y «monte» refleja bien הַר.
- source_word: וְהִנָּבֵא
  english_pob_choice: and prophesy
  chosen_spanish: y profetiza
  alternatives_spanish:
  - y habla proféticamente
  - y anuncia profecía
  lexicon: HALOT
  rationale: El imperativo nifal de נבא funciona aquí como el mandato estándar de proclamación profética. «Profetiza» es la equivalencia más directa, clara y digna en español.
- source_word: עָלָיו
  english_pob_choice: against it
  chosen_spanish: contra él
  alternatives_spanish:
  - contra ello
  - contra esa montaña
  lexicon: HALOT
  rationale: El pronombre hebreo es masculino singular y concuerda con «monte Seír». En español, «él» mantiene esa concordancia gramatical; aunque el referente sea un monte, el texto hebreo personaliza el objeto del oráculo. La preposición «contra» conserva la hostilidad del mandato.
theological_decisions:
- issue: Valor idiomático de «hijo de hombre» como vocativo profético
  english_pob_reading: The English POB keeps 'Son of man' and notes 'Mortal' as an alternative.
  chosen_spanish_reading: «Hijo de hombre» se mantiene como apelativo profético literal e idiomático, con «Mortal» como alternativa interpretativa.
  alternative_spanish_readings:
  - «Mortal»
  - «Ser humano»
  rationale: El texto hebreo no describe solo la condición humana de Ezequiel, sino que lo interpela con un título recurrente en el libro. Mantener la forma literal preserva la tensión lexical y la intertextualidad del libro, mientras que «Mortal» explicita el sentido pero borra la fórmula fija.
  doctrine_reference: Uso profético del vocativo en Ezequiel; no introduce una doctrina adicional, sino la conservación de un rasgo literario-teológico del libro.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran total acuerdo textual y ninguna revisión aplicada; por eso el español sigue de cerca la lectura establecida sin introducir variantes no documentadas.
  spanish_consistency_notes:
  - Se conserva la imaginería corporal de «rostro» para respetar el hebreo פָּנִים.
  - «Contra» se usa de forma consistente para ambos valores de עַל en el versículo.
  - Se mantiene la transliteración «Seír» como topónimo propio, con artículo y sustantivo comunes en español.
  - La nota al pie recoge la alternativa interpretativa documentada por el POB inglés sin añadir nuevas lecturas.
