review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y sigue de cerca el POB inglés: respuesta de Jesús, pregunta retórica afirmativa, caminar en el día, no tropezar, y ver la luz de este mundo. Sin embargo, la nota a introduce una alternativa española poco natural y semánticamente desajustada (''Tienen doce horas el día''), cuando la alternativa documentada en inglés es simplemente ''doce horas del día''.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial moderno. '¿No hay doce horas en el día?' funciona bien, aunque '¿No tiene el día doce horas?' también sería posible. 'Si alguien anda en el día' es aceptable; 'anda' conserva bien el paralelismo y la amplitud semántica. La puntuación y el registro son buenos. El único problema real de calidad está en la redacción de la nota a, que suena antinatural y no representa bien la alternativa.
  glossary_alignment: No hay términos del glosario principal en disputa aquí. 'Jesús', 'luz', y el resto del vocabulario están alineados con las decisiones del proyecto. La decisión de mantener 'la luz de este mundo' sin glosa interpretativa en el texto principal coincide con la justificación teológica auditada.
  issues:
  - severity: medium
    issue: 'La nota a da una alternativa española incorrecta o muy poco natural: ''Tienen doce horas el día''.'
    rationale: El inglés auditado solo preserva la alternativa lexical 'twelve hours of the day'. En español, la forma natural equivalente es 'doce horas del día', no una reestructuración con 'tienen' que además cambia el sujeto y suena impropia.
  revised_spanish_text: 'Jesús respondió[a]: «¿No hay doce horas en el día? Si alguien anda en el día, no tropieza[c][b], porque ve la luz de este mundo».'
  revised_footnotes:
  - marker: a
    text: O «doce horas del día».
    reason: lexical_alternative
  - marker: b
    text: La expresión «la luz de este mundo» puede tener una resonancia joánica más amplia sobre la iluminación divina, aunque aquí se deja como está.
    reason: cross_reference
  - marker: c
    text: 'El griego usa el singular representativo: «si alguien ... él».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural. Solo se corrige la nota a para que refleje con precisión la alternativa lexical documentada y suene idiomática en español.
