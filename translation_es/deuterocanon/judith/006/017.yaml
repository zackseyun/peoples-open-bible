translation:
  language: es
  text: Y en contestación les informó las palabras del consejo de Holofernes[a], y todas las palabras que había hablado en medio de los gobernantes de los hijos de Assur[b], y cuanto había dicho Holofernes con jactancia[c] contra la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la asamblea». El griego συνεδρεία se refiere al consejo o reunión deliberativa de Holofernes.
    reason: lexical_alternative
  - marker: b
    text: O «de los asirios». El griego dice literalmente «de los hijos de Assur».
    reason: lexical_alternative
  - marker: c
    text: O «había presumido» o «había hablado con arrogancia». El verbo griego denota habla orgullosa o jactanciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: in answer
  chosen_spanish: en respuesta
  alternatives_spanish:
  - respondiendo
  - en contestación
  lexicon: BDAG
  rationale: La participial griega introduce la acción de responder antes del informe. «En respuesta» conserva esa relación sin sonar forzado en español.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: les informó
  alternatives_spanish:
  - les reportó
  - les comunicó
  lexicon: BDAG
  rationale: El verbo expresa llevar de vuelta un informe. «Les informó» comunica bien ese valor narrativo y evita un calco poco natural.
- source_word: τὰ ῥήματα
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las declaraciones
  lexicon: BDAG
  rationale: Se mantiene la repetición del sustantivo «palabras», que el griego repite para enfatizar el contenido verbal transmitido.
- source_word: τῆς συνεδρείας
  english_pob_choice: council
  chosen_spanish: del consejo
  alternatives_spanish:
  - de la asamblea
  - de la deliberación
  lexicon: LSJ
  rationale: En este contexto se trata del cuerpo deliberativo de Holofernes. «Consejo» es la equivalencia más clara y natural en español.
- source_word: ἐν μέσῳ τῶν ἀρχόντων
  english_pob_choice: in the midst of the rulers
  chosen_spanish: en medio de los gobernantes
  alternatives_spanish:
  - entre los gobernantes
  - delante de los gobernantes
  lexicon: BDAG
  rationale: «En medio de» refleja de cerca la expresión griega, y «gobernantes» traduce con naturalidad ἀρχόντων en este marco político.
- source_word: υἱῶν Ἀσσούρ
  english_pob_choice: the sons of Asshur
  chosen_spanish: de los hijos de Assur
  alternatives_spanish:
  - de los asirios
  - de los hijos de Asiria
  lexicon: LSJ
  rationale: Se conserva la forma más literal del etnónimo, como hace la traducción inglesa auditada, para no borrar el matiz estilizado del griego. «Assur» mantiene la transliteración del nombre propio.
- source_word: ἐμεγαλορρημόνησεν
  english_pob_choice: had spoken boastful things
  chosen_spanish: había dicho con jactancia
  alternatives_spanish:
  - había hablado con arrogancia
  - había proferido grandes jactancias
  lexicon: LSJ
  rationale: El verbo raro indica hablar con orgullo o jactancia. «Con jactancia» preserva esa carga sin convertirla en un sustantivo abstracto.
- source_word: εἰς τὸν οἶκον Ἰσραήλ
  english_pob_choice: against the house of Israel
  chosen_spanish: contra la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - acerca de la casa de Israel
  lexicon: BDAG
  rationale: Por el contexto hostil, «contra» expresa mejor la dirección adversativa del griego y coincide con la lectura inglesa auditada.
theological_decisions:
- issue: Ethnic designation υἱῶν Ἀσσούρ
  english_pob_reading: the sons of Asshur
  chosen_spanish_reading: los hijos de Assur
  alternative_spanish_readings:
  - los asirios
  - los hijos de Asiria
  rationale: No es un punto doctrinal mayor, pero sí afecta la fidelidad al texto. Se preserva la designación literal para mantener la textura etnográfica del griego, como en el POB inglés.
  doctrine_reference: Principio de primacía del texto original y consistencia terminológica documentada.
translation_notes:
  revision_awareness: El texto griego y la audit trail inglesa coinciden estrechamente; no se documentaron revisiones sustantivas. La versión española sigue esa misma línea, conservando el paralelismo de «palabras» y la referencia literal a «los hijos de Assur», con una nota para la alternativa etnónima.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «Assur» como transliteración del etnónimo para reflejar el griego Ἀσσούρ.
  - «Consejo» traduce συνεδρεία; se anota la alternativa «asamblea» porque el término admite ese matiz.
  - «Con jactancia» mantiene la fuerza del verbo raro ἐμεγαλορρημόνησεν sin suavizarlo a simple «habló».
