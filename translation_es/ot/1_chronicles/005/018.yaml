base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/005/018.yaml
  text: The sons of Reuben and the Gadites and the half-tribe of Manasseh[a], valiant men, men who carried shield and sword, who drew the bow, and who were trained for war, were forty-four thousand seven hundred sixty[c][b], able to go out to war.
  footnotes:
  - marker: a
    text: Or 'mighty men' or 'men of valor' for 'valiant men.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'who bent/trod the bow,' a Hebrew idiom for drawing a bow to shoot.
    reason: cultural_note
  - marker: c
    text: Or 'fit for military service' for 'able to go out to war.'
    reason: lexical_alternative
