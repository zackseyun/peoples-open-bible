  to: Porque tus ruinas, tus lugares desolados y tu tierra devastada—ciertamente ahora serás demasiado estrecha[a] para los habitantes, y los que te devoran[b] estarán lejos.
  rationale: 'Se corrige el valor de מְבַלְּעָיִךְ para evitar un imperfecto pasado español no justificado (''devoraban'') y se restauran las notas léxicas alineadas con el expediente inglés: una sobre la cláusula de estrechez por habitantes y otra sobre la imaginería de ''tragar/devorar''. El resto del texto puede mantenerse.'
