translation:
  language: es
  text: Cuando terminaron, llevaron ante el rey y Joiada el resto de la plata, y con ella hizo utensilios para la casa de Yahvé, utensilios para el servicio[b] y para ofrecer[c], y cuencos, y utensilios de oro y de plata[a]. Y ofrecían holocaustos en la casa de Yahvé continuamente, todos los días de Joiada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo de ella vasijas»; el verbo hebreo está en singular con un sufijo singular que se refiere a la plata restante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de servicio». El término hebreo puede entenderse como servicio cultual o ministerial.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para la ofrenda» o «para ofrecer». El hebreo no explicita aquí el objeto del ofrecer.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּכְכַלּוֹתָם
  english_pob_choice: When they had finished
  chosen_spanish: Cuando terminaron
  alternatives_spanish:
  - Y cuando acabaron
  - Al terminar ellos
  lexicon: HALOT
  rationale: La construcción temporal introduce la circunstancia previa a la acción principal. «Cuando terminaron» conserva el valor circunstancial sin cargar el texto con un sujeto explícito innecesario en español.
- source_word: הֵבִיאוּ
  english_pob_choice: they brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - llevaron
  lexicon: HALOT
  rationale: El verbo básico es traer/traer allí. «Trajeron» es fiel y natural en español para el acto de llevar la plata ante la autoridad mencionada.
- source_word: שְׁאָר הַכֶּסֶף
  english_pob_choice: the rest of the silver
  chosen_spanish: el resto de la plata
  alternatives_spanish:
  - el remanente del dinero
  - la plata sobrante
  lexicon: HALOT
  rationale: כֶּסֶף aquí conserva mejor el sentido material de plata, en vista de los utensilios de oro y plata que siguen. «Resto» mantiene שְׁאָר como lo que queda.
- source_word: וַיַּעֲשֵׂהוּ
  english_pob_choice: with it he made
  chosen_spanish: y con ella hizo
  alternatives_spanish:
  - y la hizo en
  - y de ella hizo
  lexicon: HALOT
  rationale: El sufijo pronominal retoma la plata restante, y el verbo singular admite una referencia institucional o genérica. «Con ella hizo» preserva la relación instrumental sin forzar el sujeto.
- source_word: כֵלִים
  english_pob_choice: articles
  chosen_spanish: utensilios
  alternatives_spanish:
  - artículos
  - vesseles
  - vasos
  lexicon: HALOT
  rationale: כֵלִים es un término amplio para implementos/objetos de uso. «Utensilios» comunica bien la función cultual sin reducirlo a una forma específica.
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para el templo de Yahvé
  - para la casa de Yahveh
  lexicon: HALOT
  rationale: Se mantiene la expresión «casa de Yahvé» como traducción directa de בֵּית יְהוָה, siguiendo el nombre divino del proyecto.
- source_word: כְּלֵי שָׁרֵת
  english_pob_choice: articles for service
  chosen_spanish: utensilios para el servicio
  alternatives_spanish:
  - utensilios de servicio
  - vasos para ministrar
  lexicon: HALOT
  rationale: שָׁרֵת en contexto cultual expresa servicio ministerial/ritual. «Servicio» conserva la amplitud del POB inglés sin introducir un tecnicismo más cerrado.
- source_word: וְהַעֲלוֹת
  english_pob_choice: for offering
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para ofrecer sacrificios
  - para la ofrenda
  lexicon: HALOT
  rationale: El infinitivo no explicita el objeto; por eso «para ofrecer» respeta la indeterminación del hebreo. Evita adelantar «holocaustos» antes de que el texto lo haga explícito al final.
- source_word: וְכַפּוֹת
  english_pob_choice: bowls
  chosen_spanish: tazones
  alternatives_spanish:
  - copas
  - cuencos
  - palanganas
  lexicon: HALOT
  rationale: Es un recipiente cultual de forma no precisa; «tazones» es amplio y comprensible en español contemporáneo.
- source_word: וּכְלֵי זָהָב וָכָסֶף
  english_pob_choice: articles of gold and silver
  chosen_spanish: utensilios de oro y de plata
  alternatives_spanish:
  - vasos de oro y plata
  - artículos de oro y de plata
  lexicon: HALOT
  rationale: Se mantiene el paralelismo material del hebreo, con una formulación natural en español. «Utensilios» abarca tanto recipientes como implementos.
- source_word: עֹלֹות
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas holocaustas
  lexicon: HALOT
  rationale: El término sacrificial específico es el holocausto; «holocaustos» es la forma bíblica tradicional y precisa en español. No se sustituye por una paráfrasis más vaga.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - de continuo
  - siempre
  lexicon: HALOT
  rationale: Adverbio de continuidad cultual. «Continuamente» reproduce bien la idea de regularidad sostenida y encaja con el ritmo narrativo.
- source_word: כֹּל יְמֵי יְהוֹיָדָע
  english_pob_choice: all the days of Jehoiada
  chosen_spanish: todos los días de Joiada
  alternatives_spanish:
  - durante toda la vida de Joiada
  - mientras vivió Joiada
  lexicon: HALOT
  rationale: La traducción literal conserva la estructura hebrea y resulta clara en español. Se mantiene el nombre «Joiada» de forma coherente con la adaptación hispana del nombre propio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. En el POB en español se usa «Yahvé» como forma principal para preservar el nombre divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del cierre sacrificial con תָּמִיד
  english_pob_reading: ongoing/customary offering of burnt offerings during Jehoiada's lifetime
  chosen_spanish_reading: ofrecieron holocaustos en la casa de Yahvé continuamente, todos los días de Joiada
  alternative_spanish_readings:
  - estaban ofreciendo holocaustos continuamente
  - ofrecieron holocaustos regularmente
  rationale: La secuencia narrativa y תָּמִיד indican continuidad cultual, no un acto aislado. La redacción española conserva esa regularidad sin añadir interpretación extra.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
- issue: Relación entre כְּלֵי שָׁרֵת y וְהַעֲלוֹת
  english_pob_reading: articles for service and for offering
  chosen_spanish_reading: utensilios para el servicio y para ofrecer
  alternative_spanish_readings:
  - utensilios de servicio y de ofrenda
  - utensilios para el servicio y para la ofrenda
  rationale: 'El hebreo distingue dos destinos: servicio cultual general y el acto de ofrecer. Se preserva esa distinción y se evita concretar demasiado el segundo término antes de su mención explícita en el verso.'
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió una formulación más natural y sobria para כְּלֵי שָׁרֵת como «utensilios para el servicio», y se mantuvo la indeterminación de וְהַעֲלוֹת con «para ofrecer», sin adelantar el contenido sacrificial hasta la cláusula final. También se preservó el sentido durativo de תָּמִיד con un adverbio de continuidad claro en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se mantuvo «Joiada» para el nombre propio, coherente con la tradición hispana del personaje.
  - «Holocaustos» se empleó para עֹלֹות en contexto sacrificial, sin sustituirlo por una paráfrasis menos precisa.
  - La puntuación sigue la sintaxis española y conserva la coordinación del hebreo sin volverla rígidamente literal.
