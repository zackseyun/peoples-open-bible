revisions:
- from: '«¿Quién es este que oculta consejo sin conocimiento?». Por tanto, he declarado lo que no entendía: cosas demasiado maravillosas para mí[a], que yo no conocía.'
  to: '«¿Quién es este que oculta el consejo[a] sin conocimiento?». Por tanto, he declarado lo que no entendía: cosas demasiado maravillosas para mí[b], que no sabía.'
