translation:
  language: es
  text: 'Y dijo: «Por favor, no nos dejes, pues tú sabes dónde debemos acampar en el desierto, y serás ojos[a] para nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, serás un guía para nosotros por tu conocimiento del desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa introducida por wayyiqtol se expresa con un verbo de habla simple en español. Añadir «él» aclara el referente sin cargar el texto más de lo necesario.
- source_word: אַל נָא
  english_pob_choice: Please do not
  chosen_spanish: Por favor, no
  alternatives_spanish:
  - No, por favor
  - Te ruego que no
  lexicon: HALOT
  rationale: אַל marca prohibición y נָא añade ruego o cortesía. «Por favor, no» conserva el tono de súplica de forma natural y digna en español.
- source_word: תַּעֲזֹב אֹתָנוּ
  english_pob_choice: leave us
  chosen_spanish: nos dejes
  alternatives_spanish:
  - nos abandones
  - nos dejes atrás
  lexicon: HALOT
  rationale: En este contexto de viaje, «dejar» es la opción más directa y natural. «Abandonar» intensifica demasiado el matiz y puede sonar más teológico de lo que el pasaje exige.
- source_word: כִּי עַל כֵּן
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: La combinación introduce la razón de la petición. «Pues» mantiene un registro formal y el matiz causal sin sonar mecánico.
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - tú conoces
  - has sabido
  lexicon: HALOT
  rationale: El perfecto hebreo aquí comunica conocimiento vigente. En español, el presente «sabes» expresa mejor esa validez actual.
- source_word: חֲנֹתֵנוּ
  english_pob_choice: where we should camp
  chosen_spanish: dónde debemos acampar
  alternatives_spanish:
  - nuestro campamento
  - cómo acampar
  lexicon: HALOT
  rationale: El sustantivo verbal de חנה apunta al acto de acampar. En español, la formulación con «dónde debemos acampar» hace explícito el sentido locativo implícito y conserva la referencia al encampamento.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en la estepa
  - en la tierra baldía
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede traducirse «desierto» o «wilderness», en español bíblico «desierto» es claro y comprensible, y en este contexto de travesía comunica bien la región árida.
- source_word: וְהָיִיתָ לָּנוּ לְעֵינַיִם
  english_pob_choice: and you will be eyes for us
  chosen_spanish: y serás ojos para nosotros
  alternatives_spanish:
  - y serás como ojos para nosotros
  - y nos servirás de ojos
  lexicon: HALOT
  rationale: La imagen hebrea se conserva literalmente para no perder la metáfora de guía/visión. «Ojos» mantiene el valor figurado y evita reemplazarlo por una glosa interpretativa demasiado pronto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una formulación más literal para la última cláusula (“you will be eyes for us”) y un registro más formal; por eso la versión española conserva la metáfora y usa una causalidad sobria con «pues».
  spanish_consistency_notes:
  - Se conserva el tono de súplica con «Por favor».
  - Se mantiene la metáfora de «ojos» en el texto principal, con aclaración en nota.
  - Se eligió «desierto» como equivalente funcional de מִדְבָּר en español bíblico, sin forzar una explicación adicional en el cuerpo del versículo.
