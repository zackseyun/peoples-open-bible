translation:
  language: es
  text: entonces les declara sus hechos y sus transgresiones[a], que han actuado con arrogancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «que se han hecho fuertes»; en contexto, el sentido probablemente es de autoexaltación o arrogancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: then he declares
  chosen_spanish: entonces les declara
  alternatives_spanish:
  - y les dice
  - entonces les da a conocer
  - y les declara
  lexicon: HALOT
  rationale: נגד en Hifil significa comunicar, declarar o hacer saber. «Declara» conserva el matiz formal y revelador del verbo, y «entonces» refleja el valor narrativo de la waw en el flujo del contexto.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos/ellas
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma natural con el clítico indirecto «les» en español.
- source_word: פָּעֳלָם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - su trabajo
  - sus acciones
  lexicon: HALOT
  rationale: פֹּעַל / פָּעַל puede referirse a obra, acción o acto. En paralelo con «sus transgresiones», «obras» comunica adecuadamente el alcance moral del término sin volverlo demasiado técnico; «hechos» o «acciones» también serían posibles, pero menos marcados como paralelo solemne.
- source_word: וּפִשְׁעֵיהֶם
  english_pob_choice: and their transgressions
  chosen_spanish: y sus transgresiones
  alternatives_spanish:
  - y sus rebeliones
  - y sus ofensas
  lexicon: HALOT
  rationale: פשע conserva el sentido de transgresión, rebelión o falta grave contra la autoridad legítima. «Transgresiones» preserva bien la gravedad moral y el paralelismo con el miembro anterior.
- source_word: יִתְגַּבָּרוּ
  english_pob_choice: they have acted arrogantly
  chosen_spanish: se han vuelto arrogantes
  alternatives_spanish:
  - se han engrandecido
  - se han exaltado
  - han crecido en fuerza
  lexicon: HALOT
  rationale: La forma hitpael de גבר puede significar literalmente «hacerse fuerte», pero en este contexto moral el inglés POB entiende la idea como autoexaltación soberbia. «Se han vuelto arrogantes» comunica esa tensión sin borrar el sentido más literal de fortalecerse o engrandecerse, que queda como trasfondo posible.
theological_decisions:
- issue: Sentido ético de יִתְגַּבָּרוּ
  english_pob_reading: they have acted arrogantly
  chosen_spanish_reading: se han vuelto arrogantes
  alternative_spanish_readings:
  - se han hecho fuertes
  - se han exaltado
  - han prevalecido
  rationale: 'El contexto inmediato une este verbo con «sus transgresiones», por lo que la lectura no es simplemente física o militar, sino moral: autoafirmación soberbia. La traducción mantiene esa carga ética sin eliminar la tensión lexical entre «hacerse fuerte» y «volverse arrogante».'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; no hay revisiones aplicadas que obliguen a ajustar el español. La presente propuesta sigue el consenso alto del cotejo y conserva la alternativa lexical documentada para יִתְגַּבָּרוּ en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Transgresiones» se mantiene para פשע, en coherencia con el léxico POB documentado.
  - La nota reproduce la tensión entre la lectura idiomática ética y la posibilidad más literal de «hacerse fuertes».
