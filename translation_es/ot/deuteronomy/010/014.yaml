translation:
  language: es
  text: He aquí[a], a Yahvé tu Dios pertenecen los cielos, incluso los más altos cielos, la tierra y todo lo que hay en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los cielos y los cielos de los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula marca atención y énfasis solemne. «¡Mira!» comunica esa fuerza exhortativa/deíctica en español moderno sin sonar artificial. Se conserva el arranque enfático del hebreo, equivalente al «Behold» inglés.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh ... belong
  chosen_spanish: A Yahvé ... pertenecen
  alternatives_spanish:
  - De Yahvé ... son
  - Pertenecen a Yahvé
  lexicon: HALOT
  rationale: El ל prefijado expresa relación posesiva/dativa; en español, la estructura más natural y fiel es «a Yahvé ... pertenecen». Se mantiene el nombre divino «Yahvé» según el criterio doctrinal del proyecto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo de 2ms conserva el trato de pacto a Israel. «Tu Dios» reproduce directamente la relación posesiva sin añadir matices que el texto no expresa.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El hebreo plural requiere plural en español. «Los cielos» preserva mejor la forma y el alcance cósmico que «el cielo», que sería más restringido.
- source_word: וּשְׁמֵי הַשָּׁמָיִם
  english_pob_choice: even the highest heavens
  chosen_spanish: incluso los más altos cielos
  alternatives_spanish:
  - y los cielos de los cielos
  - los cielos de los cielos
  lexicon: HALOT
  rationale: La construcción intensiva literalmente expresa «los cielos de los cielos». En español, «los más altos cielos» comunica la superlación de forma clara y digna; «incluso» mantiene el valor enfático de la coordinación. Se preserva la alternativa más literal en la nota.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En paralelo con «los cielos» y seguido de «todo lo que hay en ella», el sentido es cósmico/global. «La tierra» es natural en español y refleja ese alcance mejor que «el país».
- source_word: וְכָל אֲשֶׁר בָּהּ
  english_pob_choice: and all that is in it
  chosen_spanish: y todo lo que hay en ella
  alternatives_spanish:
  - y todo lo que está en ella
  - y todo lo que contiene
  lexicon: HALOT
  rationale: La cláusula relativa denota la totalidad de lo contenido en la tierra. «Hay en ella» suena idiomático en español y mantiene el valor inclusivo del hebreo sin sobreexplicar.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide «Yahvé» como forma principal en español para preservar el nombre del pacto, en continuidad con la decisión doctrinal del POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético y con la versión inglesa auditada; no se documentan revisiones textuales adicionales ni cambios de sentido en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se conserva el plural «cielos» para הַשָּׁמַיִם.
  - La nota a pie de página preserva la alternativa literal intensiva «los cielos de los cielos».
  - La preposición posesiva/dativa hebrea se refleja con la estructura española natural «a Yahvé ... pertenecen».
