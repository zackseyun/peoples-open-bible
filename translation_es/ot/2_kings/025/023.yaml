  text: וַ/יִּשְׁמְעוּ֩ כָל שָׂרֵ֨י הַ/חֲיָלִ֜ים הֵ֣מָּה וְ/הָ/אֲנָשִׁ֗ים כִּֽי הִפְקִ֤יד מֶֽלֶךְ בָּבֶל֙ אֶת גְּדַלְיָ֔הוּ וַ/יָּבֹ֥אוּ אֶל גְּדַלְיָ֖הוּ הַ/מִּצְפָּ֑ה וְ/יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֡ה וְ/יוֹחָנָ֣ן בֶּן קָ֠רֵחַ וּ/שְׂרָיָ֨ה בֶן תַּנְחֻ֜מֶת הַ/נְּטֹפָתִ֗י וְ/יַֽאֲזַנְיָ֨הוּ֙ בֶּן הַ/מַּ֣עֲכָתִ֔י הֵ֖מָּה וְ/אַנְשֵׁי/הֶֽם־־־־־־־־־׃
