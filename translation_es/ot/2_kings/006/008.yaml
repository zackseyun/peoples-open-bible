translation:
  language: es
  text: 'Ahora el rey de Aram estaba guerreando contra Israel[a], y consultó con sus siervos, diciendo: «En tal y tal lugar estará mi campamento»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Contra Israel» expresa el valor idiomático de נִלְחָם בְּ, donde el hebreo marca con ב al adversario del conflicto.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «En tal y tal lugar está mi campamento». El hebreo emplea un modismo para una ubicación no especificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ אֲרָם
  english_pob_choice: Now the king of Aram
  chosen_spanish: Ahora el rey de Aram
  alternatives_spanish:
  - Y el rey de Aram
  - Entonces el rey de Aram
  lexicon: HALOT
  rationale: Se conserva el nombre propio geográfico «Aram», conforme al criterio del POB en inglés. «Ahora» funciona como partícula narrativa de transición sin añadir contenido, y es natural en español bíblico moderno.
- source_word: הָיָה נִלְחָם
  english_pob_choice: was warring
  chosen_spanish: estaba haciendo guerra
  alternatives_spanish:
  - estaba guerreando
  - estaba en guerra
  lexicon: HALOT
  rationale: La construcción imperfectiva expresa acción continua o habitual en el pasado. «Estaba haciendo guerra» mantiene ese aspecto durativo y el carácter bélico del hebreo sin neutralizarlo demasiado en una simple copula.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  lexicon: HALOT
  rationale: Con נלחם, la preposición marca al oponente; en español el equivalente idiomático y claro es «contra Israel».
- source_word: וַיִּוָּעַץ
  english_pob_choice: he consulted
  chosen_spanish: consultó
  alternatives_spanish:
  - tomó consejo
  - deliberó
  lexicon: HALOT
  rationale: El verbo indica tomar consejo o consultar. «Consultó» es directo y fiel al sentido del contexto político-militar.
- source_word: אֶל עֲבָדָיו
  english_pob_choice: with his servants
  chosen_spanish: con sus siervos
  alternatives_spanish:
  - con sus servidores
  - ante sus siervos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a/para sus siervos», en español la consulta se expresa naturalmente con «con». Se conserva «siervos» para reflejar el término amplio עֲבָדָיו, sin convertirlo en «oficiales» sin base explícita.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Fórmula quotativa estándar para introducir la cita.
- source_word: אֶל מְקוֹם פְּלֹנִי אַלְמֹנִי
  english_pob_choice: At such-and-such a place
  chosen_spanish: En tal y tal lugar
  alternatives_spanish:
  - En un lugar determinado
  - En cierto lugar
  lexicon: HALOT
  rationale: La expresión duplicada es un modismo para un lugar no especificado. «En tal y tal lugar» reproduce mejor el carácter idiomático e indefinido que una versión más genérica.
- source_word: תַּחֲנֹתִי
  english_pob_choice: shall my camp be
  chosen_spanish: estará mi campamento
  alternatives_spanish:
  - será mi campamento
  - estará mi campamento acampado
  lexicon: HALOT
  rationale: El término apunta a campamento/encampamiento. «Estará mi campamento» refleja la lectura propuesta por el POB, con un futuro natural en español y sin perder el matiz de ubicación militar.
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del POB en inglés, que prefirió el orden «shall my camp be»; en español se optó por «estará mi campamento», que conserva la misma relación predicativa en una construcción más natural. Se mantuvo además la expresión idiomática para el lugar indefinido.
  spanish_consistency_notes:
  - Se usó «Aram» como transliteración del topónimo, en línea con el POB en inglés.
  - Se preservó el término «siervos» para עֲבָדָיו por fidelidad lexical, sin introducir una jerarquía distinta.
  - El verso no contiene lenguaje teológico directo; por tanto, no se añadieron decisiones doctrinales.
