review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: una invitación proverbial dirigida al simple y al falto de entendimiento. Sin embargo, «¿Quién es simple...?» introduce una interrogación que no refleja bien el uso idiomático de מִי aquí, que funciona mejor como invitación general («Quien sea simple...» / «El que sea simple...»). Además, la nota [a] está anclada en «¿Quién», pero explica חֲסַר לֵב, por lo que el anclaje actual no corresponde al lugar pertinente del texto.'
  spanish_quality_summary: El español es comprensible, pero «que se aparte para acá» suena algo forzado en registro bíblico-natural; «que entre aquí» suena más idiomático y además encaja con el contexto de entrar en la casa. También conviene evitar la puntuación interrogativa inicial, ya que el español puede expresar la convocatoria proverbial sin convertirla en pregunta. El resto del verso lee con claridad y dignidad.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la categoría sapiencial פֶתִי, bien vertida como «simple». La interpretación idiomática de חֲסַר לֵב está correctamente llevada a «le falta entendimiento», y la alternativa literal debe mantenerse en nota, pero anclada a esa frase.
  issues:
  - severity: medium
    issue: מִי se vertió como interrogativo («¿Quién...?») en lugar de una fórmula de invitación general.
    rationale: En este contexto sapiencial, מִי introduce una convocatoria general equivalente a «quien sea» o «el que sea», no una pregunta real. La interrogación altera el tono y la sintaxis del original.
  - severity: medium
    issue: La nota [a] está colocada en «¿Quién» pero explica «falto de corazón».
    rationale: El marcador debe aparecer en la frase correspondiente a חֲסַר לֵב para que la nota sea fiel y útil al lector.
  - severity: low
    issue: «que se aparte para acá» es menos natural que una opción como «que entre aquí».
    rationale: Aunque conserva parte del matiz direccional de סור, en español suena algo torpe. «Entre aquí» comunica mejor la invitación a pasar al espacio de la mujer en este contexto.
  revised_spanish_text: 'El que sea simple, que entre aquí; y al que le falta entendimiento[a], ella le dice:'
  revised_footnotes:
  - marker: a
    text: Literalmente, «falto de corazón». En Proverbios, «corazón» suele referirse al entendimiento, el juicio o el discernimiento interior.
    reason: lexical_alternative
