translation:
  language: es
  text: Estos son los hijos[a] de la provincia que subieron del cautiverio de los exiliados[b], a quienes Nabucodonosor[c], rey de Babilonia, había llevado cautivos a Babilonia, y regresaron a Jerusalén y a Judá, cada uno a su ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Hijos de’ reproduce el hebreo בני como fórmula idiomática para los miembros de un grupo o comunidad; podría expresarse como ‘miembros de’, pero se conserva la forma literal por fidelidad al texto fuente.
    reason: lexical_alternative
  - marker: b
    text: O ‘del exilio’ o ‘del cautiverio’. La expresión hebrea es más plena, literalmente ‘del cautiverio de los exiliados’.
    reason: lexical_alternative
  - marker: c
    text: Nabucodonosor también se escribe ‘Nabucadrezar’ en algunas transliteraciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - personas de
  - descendientes de
  lexicon: HALOT
  rationale: Conservo el valor idiomático de pertenencia/grupo, pero en español bíblico moderno 'hijos de' suena más natural y respetable que una traducción demasiado mecánica. Mantiene la forma masculina plural del hebreo sin convertirla en un genérico abstracto.
- source_word: הַמְּדִינָה
  english_pob_choice: the province
  chosen_spanish: la provincia
  alternatives_spanish:
  - el distrito
  - la región
  lexicon: HALOT
  rationale: En contexto persa-postexílico, 'provincia' comunica mejor la unidad administrativa que el hebreo designa. Es la opción más fiel y comprensible en español.
- source_word: הָעֹלִים
  english_pob_choice: who came up
  chosen_spanish: que subieron
  alternatives_spanish:
  - que venían subiendo
  - que regresaron
  lexicon: HALOT
  rationale: El participio hebreo conserva la imagen de ascenso; 'subieron' mantiene esa huella sin perder naturalidad en español. No lo reduzco a 'regresaron' porque el verbo de retorno aparece después con וַיָּשׁוּבוּ.
- source_word: מִשְּׁבִי הַגּוֹלָה
  english_pob_choice: from the captivity of the exiles
  chosen_spanish: del cautiverio de los exiliados
  alternatives_spanish:
  - de la cautividad de los exiliados
  - del cautiverio del exilio
  lexicon: HALOT
  rationale: 'Preservo ambos sustantivos del hebreo: שְׁבִי como ''cautiverio'' y גּוֹלָה como ''exiliados''. ''Cautiverio de los exiliados'' refleja la construcción doble sin aplanarla en una sola noción.'
- source_word: הֶגְלָה
  english_pob_choice: had carried away
  chosen_spanish: había llevado cautivos
  alternatives_spanish:
  - había exiliado
  - había deportado
  lexicon: HALOT
  rationale: La forma causativa expresa traslado forzado al exilio. 'Había llevado cautivos' es idiomático en español y conserva la idea de deportación sin tecnicismos innecesarios.
- source_word: נבוכדנצור
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodonosor/Nebucodonosor
  lexicon: HALOT
  rationale: Uso la transliteración bíblica estándar en español. Mantiene la identificación del rey y la lectura eclesial ampliamente reconocible.
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: and they returned
  chosen_spanish: y regresaron
  alternatives_spanish:
  - y volvieron
  - y retornaron
  lexicon: HALOT
  rationale: Este verbo expresa el acto explícito de volver; 'regresaron' es natural en español y mantiene la fuerza de retorno sin duplicar artificialmente la imagen de 'subir'.
- source_word: לִירוּשָׁלַם וִיהוּדָה
  english_pob_choice: to Jerusalem and Judah
  chosen_spanish: a Jerusalén y a Judá
  alternatives_spanish:
  - a Jerusalén y Judá
  - a Jerusalén y a Judá
  lexicon: HALOT
  rationale: Conservo ambos destinos en español con preposición repetida para mayor claridad y fidelidad sintáctica.
- source_word: אִישׁ לְעִירוֹ
  english_pob_choice: each to his own city
  chosen_spanish: cada uno a su ciudad
  alternatives_spanish:
  - cada hombre a su ciudad
  - cada uno a su propia ciudad
  lexicon: HALOT
  rationale: '''Cada uno'' reproduce la función distributiva de אִישׁ de forma natural en español. ''Su ciudad'' conserva el singular posesivo del hebreo sin forzar una expresión arcaizante.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto hebreo, el audit trail inglés y la revisión más reciente; no se registran cambios textuales relevantes. La decisión principal en español es mantener la doble estructura de 'cautiverio de los exiliados' sin diluirla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando el texto lo requiera, pero aquí no aparece el Tetragrámaton.
  - Se mantiene 'Judá' como nombre geográfico-histórico y 'Jerusalén' como topónimo tradicional.
  - Se prefiere un registro bíblico contemporáneo, claro y reverente, evitando arcaísmos innecesarios.
