translation:
  language: es
  text: Así vine a ser para ellos como un león[a]; como un leopardo aceché junto al camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un leopardo observé junto al camino» o «como un leopardo me aposté junto a la ruta». El verbo final es difícil y puede entenderse como un verbo de vigilar o acechar en primera persona, más que como el nombre propio «Asiria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  english_pob_choice: So I became
  chosen_spanish: Así llegué a ser
  alternatives_spanish:
  - Y fui
  - Entonces llegué a ser
  lexicon: HALOT
  rationale: El verbo הָיָה en wayyiqtol permite un valor ingresivo; en español, «llegué a ser» preserva ese matiz de cambio de estado mejor que un simple «fui». «Así» conserva la fuerza consecutiva de la waw en este contexto de juicio.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - de parte de ellos
  lexicon: HALOT
  rationale: Con «llegué a ser», el dativo relacional de ל se expresa con naturalidad en español como «para ellos», manteniendo la idea de relación dirigida hacia Israel sin forzar una construcción extraña.
- source_word: שָׁחַל
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - león joven
  lexicon: HALOT
  rationale: El término hebreo designa un león, a veces con matiz de fiereza; «león» es la equivalencia clara y suficiente en español. No se añade «joven» porque el contexto no lo exige.
- source_word: כְּנָמֵר
  english_pob_choice: like a leopard
  chosen_spanish: como un leopardo
  alternatives_spanish:
  - como una pantera
  lexicon: HALOT
  rationale: נָמֵר corresponde al felino moteado normalmente llamado «leopardo». Se mantiene la comparación directa y la imagen predatoria.
- source_word: עַל דֶּרֶךְ
  english_pob_choice: by the way
  chosen_spanish: junto al camino
  alternatives_spanish:
  - por el camino
  - a lo largo del camino
  lexicon: HALOT
  rationale: La expresión evoca una emboscada al borde de una ruta transitada. «Junto al camino» comunica bien esa posición sin perder naturalidad en español.
- source_word: אָשׁוּר
  english_pob_choice: I lurked
  chosen_spanish: aceché
  alternatives_spanish:
  - observé
  - me aposté
  lexicon: HALOT
  rationale: La forma es difícil y el contexto favorece un verbo de vigilancia/emboscada en primera persona antes que el nombre propio «Asiria». «Aceché» preserva el tono de depredador en espera. Se mantiene la tensión textual sin resolverla artificialmente.
theological_decisions:
- issue: Imagen antropomórfica de Dios como depredador en juicio
  english_pob_reading: Retain the similes directly ('like a lion ... like a leopard I lurked') without softening.
  chosen_spanish_reading: 'Mantener sin atenuación: «como un león... como un leopardo aceché»'
  alternative_spanish_readings:
  - suavizar con «vigilé»
  - neutralizar la imagen con «estuve atento»
  rationale: El hebreo presenta una imagen dura de juicio. La traducción debe conservar esa fuerza y la tensión teológica, sin sustituirla por una formulación más suave.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones sustantivas; se conservó la lectura principal de imagen predatoria y la nota sobre la dificultad del verbo final, trasladándola al español sin resolver artificialmente la ambigüedad.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no está explícito.
  - Se conservó el paralelismo de las dos comparaciones animales y la acción de acechar para reflejar el tono judicial del hebreo.
  - «Leopardo» se mantiene por precisión zoológica y coherencia con la decisión inglesa.
  - La nota al pie se ancla en «león[a]» para señalar que la segunda mitad del versículo contiene la principal dificultad lexical.
