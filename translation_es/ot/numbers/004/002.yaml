review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: el modismo נָשָׂא אֶת־רֹאשׁ se vierte correctamente como acción censal; בְּנֵי קְהָת / בְּנֵי לֵוִי conserva la formulación genealógica; מִתּוֹךְ expresa pertenencia dentro de un grupo mayor; y las divisiones por clanes y casas paternas están presentes. Sin embargo, hay pequeños ajustes de naturalidad y precisión formal en español.'
  spanish_quality_summary: 'La redacción es clara y generalmente digna, pero «Haz un censo» suena menos idiomático en contexto bíblico que «Haz el censo» o «Toma un censo». Además, la nota al pie contiene un error gramatical: debe ser «la cabeza», no «el cabeza». También «de entre» expresa mejor מִתּוֹךְ que el simple «entre» en este contexto de selección censal.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Coat» y «Leví» son aceptables en contexto genealógico. «Clanes» para מִשְׁפְּחֹתָם y «casas de sus padres» para לְבֵית אֲבֹתָם están alineados con la justificación auditada. La única corrección léxica necesaria está en la nota literal del modismo.
  issues:
  - severity: medium
    issue: La expresión «Haz un censo» es comprensible pero menos natural y menos ajustada al artículo definido esperado en español bíblico-administrativo.
    rationale: En este tipo de mandato de enumeración, «Haz el censo» suena más idiomático y formal en español, manteniendo el mismo sentido de ‘take a census’. También evita una ligera sensación de indefinición.
  - severity: low
    issue: «entre los hijos de Leví» podría mejorarse a «de entre los hijos de Leví».
    rationale: מִתּוֹךְ indica selección desde dentro de un grupo. «De entre» comunica esa matización con mayor precisión en español que el simple «entre».
  - severity: medium
    issue: La nota al pie dice «Levanta el cabeza», que es gramaticalmente incorrecto.
    rationale: La forma literal correcta en español es «levanta la cabeza». Dado que la nota documenta la decisión léxica principal, conviene corregirla.
  revised_spanish_text: Haz el censo de los hijos de Coat[a] de entre los hijos de Leví, por sus clanes y por las casas de sus padres.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Levanta la cabeza de los hijos de Coat», un modismo que significa contar o hacer un censo.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron correcciones menores para mejorar la naturalidad y precisión del español sin alterar el sentido: «Haz el censo» en lugar de «Haz un censo», «de entre» para reflejar mejor מִתּוֹךְ, y corrección gramatical de la nota literal a «la cabeza».'
