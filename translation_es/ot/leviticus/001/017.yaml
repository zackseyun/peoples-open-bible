revisions:
- from: Lo partirá por las alas[a], pero no lo dividirá; y el sacerdote lo quemará sobre el altar, sobre la leña que está sobre el fuego. Es un holocausto, una ofrenda encendida, aroma agradable para Yahvé.
  to: Lo abrirá[a] por las alas, pero no lo dividirá; y el sacerdote lo quemará sobre el altar, sobre la leña que está sobre el fuego. Es un holocausto, una ofrenda de alimento[b], aroma agradable para Yahvé.
  rationale: Se revisa «Lo partirá» a «Lo abrirá» para reflejar mejor שִׁסַּע y evitar tensión innecesaria con «no lo dividirá». Se revisa «ofrenda encendida» a «ofrenda de alimento» para seguir la decisión lexical auditada del POB sobre אִשֵּׁה, preservando en nota las alternativas tradicionales relacionadas con fuego. El resto del versículo puede mantenerse.
