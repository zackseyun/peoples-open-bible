    rationale: Si el texto principal se corrige a «Aclamen», la alternativa útil puede ser «Griten a Dios, toda la tierra» para reflejar una opción más literal de fuerza vocal y mantener la trazabilidad con el inglés auditado.
  revised_spanish_text: Para el director del coro[a]. Cántico, salmo. Aclamen a Dios[b], toda la tierra.
  revised_footnotes:
