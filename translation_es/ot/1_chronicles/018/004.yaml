base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/018/004.yaml
  text: David captured from him 1,000 chariots[a], 7,000 horsemen, and 20,000 foot soldiers. Then David hamstrung all the chariot horses[b], but left enough of them for 100 chariots.
  footnotes:
  - marker: a
    text: Hebrew 'all the chariotry/chariots'; because the verb means to hamstring, the phrase is understood metonymically of the horses belonging to the chariot force.
    reason: lexical_alternative
  - marker: b
    text: 2 Samuel 8:4 has '1,700 horsemen' rather than '7,000 horsemen.' This is a parallel-passage numerical difference in the textual tradition.
    reason: textual_variant
