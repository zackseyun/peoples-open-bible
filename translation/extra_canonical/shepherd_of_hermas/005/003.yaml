translation:
  text: And after I rose from prayer, I see before me the elderly woman whom I had also seen last year,
    walking and reading a little book. And she says to me, “Are you able to report these things to the
    elect of God?” I say to her, “Lady, I am not able to remember so many things; but give me the little
    book, so that I may copy it.” “Take it,” she says, “and you will give it back to me.”
