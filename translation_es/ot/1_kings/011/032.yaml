translation:
  language: es
  text: Pero una tribu[a] quedará para él, por amor a mi siervo David y por amor a Jerusalén, la ciudad que he elegido de entre todas las tribus de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una tribu». A menudo se entiende con Benjamín unido a Judá, especialmente por la ubicación de Jerusalén, pero el texto mismo dice «una tribu».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַשֵּׁבֶט הָאֶחָד
  english_pob_choice: But one tribe
  chosen_spanish: Pero una tribu
  alternatives_spanish:
  - Y la tribu una
  - Sin embargo, una tribu
  lexicon: HALOT
  rationale: שֵׁבֶט aquí designa una unidad tribal/política, no un objeto literal. El prefijo conjuntivo se vierte adversativamente como «Pero» para conservar el contraste con la división previa del reino, y «una tribu» mantiene el texto hebreo sin armonizarlo.
- source_word: יִהְיֶה לּוֹ
  english_pob_choice: will remain his
  chosen_spanish: quedará para él
  alternatives_spanish:
  - será suya
  - permanecerá suya
  lexicon: HALOT
  rationale: La construcción hebrea «ser/le ser» en este contexto expresa posesión o retención tras la ruptura del reino. «Quedará para él» comunica ese valor contextual con naturalidad en español sin añadir más de lo que el texto dice.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor a
  alternatives_spanish:
  - por causa de
  - en atención a
  lexicon: HALOT
  rationale: La expresión marca motivo/consideración en favor de David y Jerusalén. «Por amor a» es idiomática en español bíblico y conserva la idea de actuar en consideración favorable a ambos referidos.
- source_word: עַבְדִּי דָוִד
  english_pob_choice: my servant David
  chosen_spanish: mi siervo David
  alternatives_spanish:
  - David, mi siervo
  - mi servidor David
  lexicon: HALOT
  rationale: עֶבֶד en esta fórmula real y pactal se expresa mejor como «siervo»; «esclavo» sería demasiado fuerte y desajustado al honorífico aquí. La posesión divina se mantiene con «mi».
- source_word: יְרוּשָׁלִַם הָעִיר
  english_pob_choice: Jerusalem, the city
  chosen_spanish: Jerusalén, la ciudad
  alternatives_spanish:
  - la ciudad de Jerusalén
  - Jerusalén, ciudad
  lexicon: HALOT
  rationale: La aposición se conserva con coma en español. «La ciudad» mantiene la identificación explícita sin forzar una paráfrasis.
- source_word: אֲשֶׁר בָּחַרְתִּי בָהּ
  english_pob_choice: that I have chosen
  chosen_spanish: que he elegido
  alternatives_spanish:
  - que escogí
  - que he escogido
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa con el perfecto compuesto español para conservar la elección ya realizada y su vigencia. El clítico «en ella» queda sobrentendido por el español y no necesita sobreexplicación.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from all the tribes of Israel
  chosen_spanish: de entre todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - entre todas las tribus de Israel
  lexicon: HALOT
  rationale: La preposición «min» con בחר marca selección desde un conjunto. «De entre» reproduce mejor la idea de elección dentro de un grupo mayor que un simple «de».
theological_decisions:
- issue: Tensión numérica entre «una tribu» aquí y otras referencias históricas que suelen implicar a Benjamín unido a Judá
  english_pob_reading: 'Translate the Hebrew as written: ''one tribe'''
  chosen_spanish_reading: Traducir como «una tribu» sin armonizar el número
  alternative_spanish_readings:
  - una sola tribu entendida como Judá con Benjamín implícito
  - un reino
  rationale: El hebreo dice explícitamente «una tribu», y la traducción debe preservar esa formulación aun cuando surja la tensión interpretativa. La posible explicación histórica se deja para la nota, no para el texto principal.
  doctrine_reference: Preservar la tensión textual; no resolverla en la traducción.
translation_notes:
  revision_awareness: El repaso final coincide con el texto base en alto grado de acuerdo; no se introdujeron revisiones sustantivas. La principal decisión se mantiene en conservar «una tribu» y la nota explicativa sobre la posible lectura histórica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «mi siervo» para עבד en su valor honorífico/pactual, no «esclavo», conforme al contexto.
  - Se preservó la tensión textual de «una tribu» con una nota, sin armonización en el cuerpo del versículo.
  - «Por amor a» se eligió como equivalente idiomático de לְמַעַן en este contexto de motivo benevolente.
