translation:
  language: es
  text: Tengan cuidado de no olvidar el pacto de Yahvé su Dios, que hizo con ustedes, y de hacerse una imagen tallada, la semejanza de cualquier cosa que Yahvé su Dios les ha mandado no hacer.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: הִשָּׁמְרוּ לָכֶם
  english_pob_choice: Watch yourselves
  chosen_spanish: Guárdense de
  alternatives_spanish:
  - Vigílense
  - Estén atentos a sí mismos
  - Cuídense
  lexicon: HALOT
  rationale: El imperativo niphal con לָכֶם expresa advertencia reflexiva/benefactiva; en español, «guárdense de» comunica con naturalidad la idea de mantenerse alerta ante un peligro moral o espiritual sin perder el matiz exhortativo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: de no
  alternatives_spanish:
  - para que no
  - no sea que
  lexicon: HALOT
  rationale: פֶּן introduce una cláusula de prevención negativa. En español, «de no olvidar» funciona bien tras «guárdense de» y mantiene el carácter de advertencia solemne.
- source_word: תִּשְׁכְּחוּ
  english_pob_choice: you forget
  chosen_spanish: olvidar
  alternatives_spanish:
  - olviden
  - se olviden
  lexicon: HALOT
  rationale: 'El verbo se integra de forma idiomática como infinitivo dependiente en la advertencia: «guárdense de no olvidar». Conserva el sentido básico de perder de vista o dejar de tener presente el pacto.'
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente más claro y ampliamente entendido en español bíblico para ברית, preservando el sentido relacional y vinculante del término sin forzar un tecnicismo menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé» como transliteración del nombre divino, evitando la sustitución por un título genérico.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios, de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo plural se traduce con el posesivo de cortesía/registro neutral «su» en español contemporáneo; el contexto deja claro que se dirige al pueblo. Se evita una duplicación pesada como «de ustedes» en el texto principal.
- source_word: אֲשֶׁר כָּרַת עִמָּכֶם
  english_pob_choice: that he made with you
  chosen_spanish: que hizo con ustedes
  alternatives_spanish:
  - que cortó con ustedes
  - que estableció con ustedes
  lexicon: HALOT
  rationale: כרת ברית es el idiomatismo para «hacer/cerrar un pacto». «Hizo con ustedes» transmite la acción pactal sin introducir un calco opaco como «cortó».
- source_word: וַעֲשִׂיתֶם לָכֶם
  english_pob_choice: and make for yourselves
  chosen_spanish: y de hacerse
  alternatives_spanish:
  - y hacerse
  - y hacer para sí
  lexicon: HALOT
  rationale: El valor reflexivo-benefactivo de לָכֶם se conserva en «hacerse», mientras que la coordinación con «de» mantiene el paralelismo con la advertencia anterior y suena natural en español.
- source_word: פֶּסֶל
  english_pob_choice: a carved image
  chosen_spanish: una imagen tallada
  alternatives_spanish:
  - un ídolo tallado
  - una imagen esculpida
  - un grabado
  lexicon: HALOT
  rationale: «Imagen tallada» conserva el rasgo concreto de objeto fabricado por talla, evitando el arcaísmo de «imagen de escultura» y manteniendo la especificidad material del término.
- source_word: תְּמ֣וּנַת כֹּל
  english_pob_choice: the likeness of anything
  chosen_spanish: la semejanza de cualquier cosa
  alternatives_spanish:
  - la forma de cualquier cosa
  - la representación de cualquier cosa
  lexicon: HALOT
  rationale: תְּמוּנָה remite a forma/representación/semejanza. «Semejanza» conserva el paralelismo conceptual con la imagen tallada y es plenamente comprensible en español bíblico.
- source_word: אֲשֶׁר צִוְּךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: that Yahweh your God has commanded you not to make
  chosen_spanish: que Yahvé su Dios les ha mandado no hacer
  alternatives_spanish:
  - que Yahvé su Dios les ha mandado
  - que Yahvé su Dios les ha prohibido hacer
  lexicon: HALOT
  rationale: 'Se hace explícita la negación implícita del contexto: el mandato es no hacer la imagen, no mandarla hacer. «Les ha mandado no hacer» preserva el valor prohibitivo sin añadir una paráfrasis doctrinal ajena al texto.'
theological_decisions:
- issue: Negación implícita en la cláusula final
  english_pob_reading: that the LORD your God has commanded you not to make
  chosen_spanish_reading: que Yahvé su Dios les ha mandado no hacer
  alternative_spanish_readings:
  - que Yahvé su Dios les ha mandado
  - que Yahvé su Dios les ha prohibido hacer
  rationale: El hebreo transmitido omite una negación explícita, pero el contexto inmediato y Deuteronomio 4:16 muestran que el sentido es prohibitivo. En español, omitir la negación produciría una frase engañosa; por eso se la explicita de manera sobria en el texto principal.
  doctrine_reference: 'Principio de equivalencia óptima: comunicar el sentido claro del texto fuente sin atribuir a Dios un mandamiento que el pasaje no afirma'
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La política del proyecto pide transliterar el Tetragrámaton como «Yahvé». Se evita la sustitución por un título, porque aquí el texto enfatiza el nombre personal del Dios del pacto.
  doctrine_reference: Uso consistente del nombre divino en la POB española
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail inglés y no introduce cambios textuales respecto de la lectura ya aprobada; solo adapta al español la advertencia reflexiva, el pacto y la negación implícita con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se traduce ברית como «pacto», término habitual y teológicamente estable en español bíblico.
  - La cláusula final explicita la negación implícita para evitar una lectura errónea.
  - Se conserva el paralelismo advertencia → olvido del pacto → fabricación de imagen, sin suavizar la prohibición.
