translation:
  language: es
  text: para instruir acerca del día de la impureza y del día de la pureza[a]. Esta es la ley de la enfermedad de la piel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «lepra». El término hebreo abarca con más amplitud varias condiciones de impureza relacionadas con la piel, no necesariamente la lepra moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/הוֹרֹת
  english_pob_choice: to instruct concerning
  chosen_spanish: para instruir acerca de
  alternatives_spanish:
  - para enseñar acerca de
  - para dar instrucción sobre
  - para hacer una declaración normativa sobre
  lexicon: HALOT
  rationale: El infinitivo causativo expresa finalidad legal/instructiva. "Para instruir acerca de" conserva el valor didáctico y normativo sin volver demasiado técnico el enunciado.
- source_word: בְּ/י֥וֹם הַ/טָּמֵ֖א
  english_pob_choice: the day of uncleanness
  chosen_spanish: el día de la impureza
  alternatives_spanish:
  - el día de lo impuro
  - el día de inmundicia
  - el día de la impureza ritual
  lexicon: HALOT
  rationale: En este contexto, el adjetivo hebreo funciona sustantivamente dentro del sistema de pureza. "Impureza" comunica mejor el campo ritual que un adjetivo español suelto y evita una lectura meramente moral.
- source_word: וּ/בְ/י֣וֹם הַ/טָּהֹ֑ר
  english_pob_choice: the day of cleanness
  chosen_spanish: el día de la pureza
  alternatives_spanish:
  - el día de la limpieza
  - el día de lo puro
  - el día de la limpieza ritual
  lexicon: HALOT
  rationale: '"Pureza" es la forma natural y digna en español para el campo ritual correspondiente. Mantiene el paralelismo con "impureza" y suena más idiomático que "limpieza" en este marco cultual.'
- source_word: זֹ֥את
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Tal es
  lexicon: HALOT
  rationale: La fórmula conclusiva demostrativa se expresa de manera directa y natural en español con "Esta es".
- source_word: תּוֹרַ֖ת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la norma de
  - la regulación de
  lexicon: HALOT
  rationale: En el cierre formular de Levítico, "ley de" reproduce bien el carácter jurídico-sapiencial de תּוֹרָה en este contexto, sin perder claridad en español.
- source_word: הַ/צָּרָעַת
  english_pob_choice: the skin disease
  chosen_spanish: la afección cutánea
  alternatives_spanish:
  - la enfermedad de la piel
  - la dolencia cutánea
  - la lepra
  lexicon: HALOT
  rationale: Siguiendo la decisión auditada de no igualar צָרַעַת con lepra moderna, "afección cutánea" evita el anacronismo médico y mantiene el alcance más amplio del término. Es algo más técnico que "enfermedad de la piel" y más neutral que "lepra".
theological_decisions:
- issue: Cómo traducir צָרָעַת sin importar la categoría médica moderna de lepra
  english_pob_reading: skin disease
  chosen_spanish_reading: afección cutánea
  alternative_spanish_readings:
  - lepra
  - enfermedad de la piel
  - impureza cutánea
  rationale: El término hebreo designa un conjunto más amplio de condiciones de impureza relacionadas con la piel; no conviene identificarlo sin más con la lepra moderna. "Afección cutánea" preserva la amplitud semántica y el marco ritual.
  doctrine_reference: Translation philosophy §1; coherencia léxica de Levítico 13–14
- issue: Valor ritual de טָמֵא / טָהֹר
  english_pob_reading: uncleanness / cleanness
  chosen_spanish_reading: impureza / pureza
  alternative_spanish_readings:
  - inmundicia / limpieza
  - inmundo / limpio
  rationale: En español bíblico contemporáneo, "impureza" y "pureza" comunican de forma más precisa el sistema cultual de Levítico que "limpieza", que puede sonar demasiado higiénico. Así se preserva la dimensión ritual y teológica del texto.
  doctrine_reference: Translation philosophy §5; marco sacerdotal de pureza en Levítico
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió 'about' por 'concerning' para un registro más formal; la versión española adopta 'acerca de' en un tono igualmente formal y natural. También se preservó la decisión editorial de evitar 'lepra' en el texto principal, aunque se documenta como alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene la terminología ritual 'impureza/pureza' para טָמֵא / טָהֹר a fin de conservar la coherencia de Levítico.
  - Se evita 'SEÑOR' porque en este versículo no aparece el tetragrámaton ni una sustitución por κύριος.
  - '"Ley" se usa como fórmula legal final, en línea con el cierre formular de Levítico.'
  - La nota al pie conserva la alternativa tradicional 'lepra' sin adoptarla en el texto principal.
