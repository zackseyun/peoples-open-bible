base_translation:
  language: en
  yaml_path: translation/nt/luke/004/020.yaml
  text: And after rolling up the scroll and giving it back to the attendant[a], he sat down[b]. And the eyes of everyone in the synagogue were fixed on him.
  footnotes:
  - marker: a
    text: Or 'book.' The Greek word can mean a written document more generally, but in this synagogue setting it would have been a scroll.
    reason: lexical_alternative
  - marker: b
    text: That is, the synagogue attendant responsible for handling the scrolls.
    reason: cultural_note
