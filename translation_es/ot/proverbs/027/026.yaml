translation:
  language: es
  text: Los corderos son para tu vestimenta, y los machos cabríos[a] son el precio de un campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo עַתּוּדִים designa específicamente el «macho cabrío» (chivo), no el género caprino en general. La versión inglesa usa el término genérico «cabras» (goats) por fluidez; el texto español prefiere la forma más precisa «machos cabríos» para reflejar el hebreo. O simplemente: «las cabras son el precio de un campo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבָשִׂים
  english_pob_choice: Lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas
  - borregos
  lexicon: HALOT
  rationale: El hebreo כֶּבֶשׂ (lemma 3532) designa específicamente la oveja joven o cordero. 'Corderos' es el equivalente más preciso en español neutro y capta mejor el matiz lexical que el genérico 'ovejas'. En el contexto de la provisión de lana para la vestimenta (vv. 23-27), el término subraya la dependencia del pastor en sus animales jóvenes. 'Borregos' sería igualmente aceptable en algunas regiones pero 'corderos' es más ampliamente reconocido.
- source_word: לִלְבוּשֶׁךָ
  english_pob_choice: for your clothing
  chosen_spanish: para tu vestimenta
  alternatives_spanish:
  - para tu vestido
  - para tu ropa
  - para tu vestidura
  lexicon: HALOT
  rationale: 'El sintagma לְבוּשׁ (lemma 3830) con preposición ל de finalidad y sufijo 2ms expresa el propósito: el rebaño provee lo necesario para la vestimenta del dueño. ''Vestimenta'' en español es sustantivo colectivo que cubre el concepto general de ''ropa/prendas'', sin la ambigüedad que ''vestido'' puede tener (en muchas variedades del español ''vestido'' evoca exclusivamente un traje o prenda femenina). ''Ropa'' sería demasiado coloquial para el registro de un proverbio; ''vestidura'' es arcaico. ''Vestimenta'' equilibra dignidad y claridad.'
- source_word: וּמְחִיר
  english_pob_choice: and ... are the price
  chosen_spanish: son el precio
  alternatives_spanish:
  - y el precio
  - y para el pago
  lexicon: HALOT
  rationale: 'מְחִיר (lemma 4242) significa ''precio, pago, precio de compra''. El hebreo bíblico omite cópula, por lo que el español debe suplir ''son''. La cláusula nominal hebrea עַתּוּדִים [son] מְחִיר שָׂדֶה se vierte con el orden natural del español: ''los machos cabríos son el precio de un campo''. La conjunción ו se traduce simplemente con la ''y'' inicial integrada en la estructura oracional.'
- source_word: שָׂדֶה
  english_pob_choice: a field
  chosen_spanish: un campo
  alternatives_spanish:
  - una parcela
  - tierra
  - una pieza de tierra
  lexicon: HALOT
  rationale: 'שָׂדֶה (lemma 7704b) significa ordinariamente ''campo, terreno abierto''. ''Un campo'' es la traducción más directa y encaja con la imagen económica del proverbio: el ganado caprino sirve como moneda de cambio para la adquisición de terrenos. ''Parcela'' o ''tierra'' son equivalentes posibles pero menos naturales en este registro proverbial.'
- source_word: עַתּוּדִים
  english_pob_choice: goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras
  - chivos
  - cabritos
  lexicon: HALOT
  rationale: 'עַתּוּד (lemma 6260) designa específicamente el macho cabrío o chivo adulto (he-goat, buck), no el género caprino en general. El POB inglés optó por el genérico ''goats'' por fluidez y preservó la especificidad en nota al pie. El español ''machos cabríos'' recupera la precisión del hebreo directamente en el texto principal, puesto que en español la forma es igualmente fluida y el dato tiene relevancia económica: el macho cabrío tenía mayor valor de mercado para cría y venta, lo que explica que sea el ''precio'' adecuado para comprar un campo. Se preserva ''cabras'' como alternativa más genérica en nota al pie para lectores que desconozcan el término preciso.'
translation_notes:
  revision_awareness: El paso de revisión más reciente del POB inglés (modelo gpt-5.4, 2026-04-23) no introdujo cambios. La revisión cruzada (gemini-3.1-pro-preview) registró acuerdo pleno (1.0). No hay revisiones aplicadas que afecten el borrador español. La traducción española sigue el texto hebreo WLC directamente; el borrador inglés se usa como contexto auditado, no como texto base. La única diferencia deliberada respecto al inglés es el uso de «machos cabríos» en el texto principal (en lugar del genérico «goats») para mayor fidelidad al hebreo עַתּוּדִים, con nota al pie que preserva la alternativa genérica.
  spanish_consistency_notes:
  - Este versículo no contiene el nombre divino (יהוה), títulos mesiánicos ni vocabulario teológico especializado; las convenciones terminológicas del proyecto no se activan aquí.
  - 'El proverbio pertenece a la sección de instrucción agrícola de Proverbios 27:23-27. El vocabulario es económico-pastoral: corderos, vestimenta, precio, campo, machos cabríos.'
  - No se emplean arcaísmos de la Reina-Valera; el español es moderno y neutral latinoamericano, manteniendo dignidad de registro proverbial.
  - La cópula hebrea omitida se suple en español con 'son', siguiendo el mismo procedimiento que el POB inglés.
