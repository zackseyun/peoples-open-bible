id: 2TI.2.13
reference: 2 Timothy 2:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ ἀπιστοῦμεν, ἐκεῖνος πιστὸς μένει· ⸀ἀρνήσασθαι ἑαυτὸν οὐ δύναται.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/013.yaml
  text: If we are faithless, he remains faithful, for he cannot deny himself.
translation:
  language: ko
  text: 우리가 신실하지 못할지라도, 그분은 여전히 신실하십니다. 그분은 자기 자신을 부인하실 수 없기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπιστοῦμεν
  english_pob_choice: we are faithless
  chosen_korean: 신실하지 못할지라도
  alternatives_korean:
  - 믿지 않을지라도
  - 신실치 못할지라도
  lexicon: BDAG
  rationale: ἀπιστέω는 「믿지 않다·신실하지 못하다」 모두 가능. 본문은 「그분은 πιστός로 머무신다」와 대조를 이루므로, 「신실하지 못함」(πιστός의 부정)으로 읽는 것이 운율적·신학적으로 자연스럽다.
- source_word: πιστὸς μένει
  english_pob_choice: he remains faithful
  chosen_korean: 여전히 신실하십니다
  alternatives_korean:
  - 미쁘심으로 계속하십니다
  - 신실하게 머무십니다
  lexicon: BDAG
  rationale: μένω는 「머물러 있다·계속되다」를 뜻한다. 「여전히 신실하시다」가 그 지속성을 자연스럽게 담는다.
- source_word: ἀρνήσασθαι ἑαυτὸν οὐ δύναται
  english_pob_choice: he cannot deny himself
  chosen_korean: 자기 자신을 부인하실 수 없기 때문입니다
  alternatives_korean:
  - 자기를 부인하실 수 없습니다
  - 스스로를 부정하실 수 없습니다
  lexicon: BDAG
  rationale: 12절의 「부인하다」(ἀρνέομαι)와 일관되게 「부인하다」로 옮긴다. 한국어 「자기 자신」은 ἑαυτόν의 재귀적 강조를 살린다.
theological_decisions:
- issue: 2:11-13 찬가의 절정 — 그리스도의 비대칭적 신실하심
  chosen_reading: 우리가 신실하지 못할지라도 그분은 여전히 신실하십니다
  alternative_readings:
  - 우리가 믿지 않을지라도 그분은 여전히 신실하십니다
  - 우리가 미덥지 못할지라도 그분은 미쁘심으로 머무십니다
  rationale: 11-13절 찬가의 네 짝 중 마지막 짝은 비대칭으로 마무리된다. 12절의 「부인↔부인」 대칭이 13절에서 「우리의 불신실↔그분의 신실」로 깨지며, 그리스도의 절대적 신실하심(자기 자신을 부인하실 수 없음)이 강조된다. πιστός를 일관되게 「신실하다」로 옮겨, ἀπιστέω(신실하지 못함)와의 어휘적 짝(α-πιστ-)을 한국어로도 살린다. 「믿음↔신실」을 섞으면 짝이 깨지므로 「신실」로 통일한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological force and literary structure'
