review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien la súplica, preserva Yahvé y mantiene el sentido general de לְמַעַן שְׁמֶךָ, חַסְדְּךָ y הַצִּילֵנִי. Sin embargo, la doble apelación divina יְהוָה אֲדֹנָי queda algo debilitada por la puntuación y el orden, y trátame puede sonar ambiguo en español moderno, incluso con matiz negativo. Además, falta reflejar en nota la alternativa literal/documentada sobre la doble titulación, presente en la auditoría inglesa.
  spanish_quality_summary: El español es legible y digno, pero Señor mío tras Yahvé con comas suena menos natural que una invocación más directa. Trátame no es la mejor opción estilística aquí porque en español puede sugerir mero trato personal o incluso maltrato, más que intervención favorable. amor fiel funciona, pero conviene mantener una nota que aclare el peso de חֶסֶד. La frase revisada mejora fluidez y precisión sin alejarse del hebreo.
  glossary_alignment: YHWH como Yahvé está correctamente alineado con el proyecto. אֲדֹנָי debe conservarse como segundo título distinto; en español aquí conviene mi Señor para reflejar mejor la apelación personal documentada. חֶסֶד puede verterse como amor fiel con nota explicativa. הַצִּילֵנִי → líbrame está bien alineado.
  issues:
