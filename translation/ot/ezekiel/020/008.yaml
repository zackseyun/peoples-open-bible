theological_decisions:
- issue: Anthropopathic language for divine judgment
  chosen_reading: Retain 'wrath' and 'anger' as distinct but related expressions of God's judicial response
  alternative_readings:
  - Flatten both to 'anger'
  - Soften to 'punishment' or 'judgment'
  rationale: The Hebrew uses both חֵמָה and אַף in close proximity for rhetorical intensity. Preserving both avoids muting the text's portrayal of God's holy opposition to idolatry while not importing later systematic distinctions beyond the verse.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Representative force of אִישׁ
  chosen_reading: Use 'No man' in the main text
  alternative_readings:
  - '''No one'''
  - '''Not one of them'''
  rationale: The Hebrew singular distributive is masculine in form with representative force. The doctrine excerpt directs gender-accurate rendering over gender-neutral smoothing where the source uses masculine grammar generically.
  doctrine_reference: Translation philosophy §4
