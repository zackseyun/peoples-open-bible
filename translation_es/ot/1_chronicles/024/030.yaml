  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: introduce la línea genealógica de Musi, enumera tres nombres y cierra con la fórmula recapitulativa sobre los levitas según sus casas paternas. Sin embargo, hay un desajuste importante entre el texto y la nota: el texto principal dice «Jeremot», mientras que la auditoría inglesa eligió «Jeremoth» con nota alternativa «Jerimoth».'
  spanish_quality_summary: El español es claro y legible. «Y los hijos de Mushi» y «Estos eran...» funcionan bien en registro genealógico. «Según las casas de sus padres» es entendible, aunque «según sus casas paternas» sonaría algo más idiomático; no obstante, no es necesario cambiarlo. La principal corrección requerida es normalizar la transliteración del tercer nombre y alinear la nota con el texto.
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. La fórmula genealógica «hijos de los levitas» preserva adecuadamente בְּנֵי הַלְוִיִּם. La transliteración de nombres propios debe seguir la decisión documentada del POB cuando no haya razón fuerte para apartarse de ella; aquí conviene mantener «Jeremoth» en el texto y reservar «Jerimoth» como alternativa en nota.
  issues:
  - severity: medium
    issue: La transliteración principal «Jeremot» no sigue la elección documentada del POB inglés («Jeremoth»).
    rationale: El registro auditado ya fijó «Jeremoth» como forma principal y «Jerimoth» como variante. Cambiar la forma base en español sin necesidad fuerte debilita la trazabilidad del nombre propio frente a la auditoría.
  - severity: medium
    issue: La nota al pie introduce una alternativa innecesaria y desalineada al incluir «Jeremoth» como si fuera solo variante, cuando debería ser la forma principal en el texto.
    rationale: La nota inglesa solo preserva la alternativa «Jerimoth». En español, si el texto adopta «Jeremoth», la nota debe limitarse a la variante relevante para evitar confusión.
  revised_spanish_text: 'Y los hijos de Mushi: Mahli, Eder y Jeremoth[a]. Estos eran los hijos de los levitas según las casas de sus padres.'
  revised_footnotes:
