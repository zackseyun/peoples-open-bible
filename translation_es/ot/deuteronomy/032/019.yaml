translation:
  language: es
  text: Y Yahvé vio y los despreció[a], por la provocación de sus hijos y sus hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los desechó' o 'los trató con desprecio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre pactual divino según el estándar del proyecto en español, conservando la referencia explícita a יהוה en lugar de una sustitución por un título genérico.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - percibió
  lexicon: HALOT
  rationale: רא en qal se traduce naturalmente como 'ver'; 'vio' es claro y fiel al valor básico del verbo sin añadir interpretación.
- source_word: וַיִּנְאָץ
  english_pob_choice: spurned / treated with contempt
  chosen_spanish: lo despreció
  alternatives_spanish:
  - lo desechó
  - lo rechazó
  - lo menospreció
  lexicon: HALOT
  rationale: נאץ expresa desprecio, repudio o desdén. 'Lo despreció' comunica la fuerza relacional de rechazo con desprecio, sin suavizarla ni llevarla a una paráfrasis excesiva. Se conserva el objeto implícito del hebreo como 'lo', en referencia al pueblo por el contexto.
- source_word: מִכַּעַס
  english_pob_choice: because of the provocation of
  chosen_spanish: por la provocación de
  alternatives_spanish:
  - a causa de la provocación de
  - por el enojo causado por
  lexicon: HALOT
  rationale: כעס aquí nombra la provocación que suscita ira. La preposición מן funciona causalmente; 'por la provocación de' reproduce bien la relación causal de manera idiomática en español.
- source_word: בָּנָיו וּבְנֹתָיו
  english_pob_choice: his sons and daughters
  chosen_spanish: sus hijos y de sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - sus hijos y sus hijas
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo menciona explícitamente varones y mujeres. 'Sus hijos y de sus hijas' conserva esa explicitud de forma legible en español, sin reducirla al genérico 'sus hijos'.
theological_decisions:
- issue: Objeto implícito de וַיִּנְאָץ
  english_pob_reading: The object is Israel/his people, supplied as 'them' in English.
  chosen_spanish_reading: Se expresa con 'lo' y se deja que el contexto identifique al pueblo aludido.
  alternative_spanish_readings:
  - Y Yahvé vio y los despreció
  - Y Yahvé vio y despreció
  rationale: El hebreo no nombra el objeto; la línea anterior identifica claramente al pueblo. En español, 'lo' funciona como objeto neutro de referencia contextual y evita introducir una pluralidad explícita que no está en el hebreo inmediato.
  doctrine_reference: Translation philosophy §1, §6
- issue: Intensidad de la reacción divina
  english_pob_reading: Use 'spurned' and 'provoked to anger' without softening or over-intensifying.
  chosen_spanish_reading: '''Lo despreció'' y ''por la provocación de'' conservan el tono grave sin exageración.'
  alternative_spanish_readings:
  - lo aborreció
  - lo rechazó con desprecio
  - lo tuvo en menos
  rationale: La escena expresa juicio real ante infidelidad de pacto. 'Despreció' mantiene el peso de נאץ y permite un español natural sin convertir el verso en una glosa interpretativa.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés auditado, que ajustó la fuerza de וַיִּנְאָץ hacia 'spurned' y afinó la frase causal final; por eso el español evita suavizar el verbo y conserva la relación causal explícita con 'por la provocación de'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se conserva la explicitud de 'sus hijos y de sus hijas' para reflejar el hebreo masculino/femenino.
  - El objeto implícito del verbo final se dejó en 'lo' para respetar la elipsis del hebreo y la identificación contextual del referente.
