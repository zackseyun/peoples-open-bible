revisions:
- from: Lo veo[a], pero no ahora; lo observo, pero no cerca. Una estrella saldrá de Jacob, y un cetro[b] se levantará de Israel[c]; aplastará las esquinas de Moab y derribará a todos los hijos de Set.
  to: Lo veo, pero no ahora; lo contemplo, pero no cerca. Una estrella saldrá de Jacob, y un cetro se levantará de Israel; aplastará los rincones[a] de Moab y derribará a todos los hijos de Set[b].
  rationale: Se revisa para alinear mejor las notas con el audit trail inglés y mejorar la naturalidad del español sin alterar el sentido fuente. Se elimina una nota alternativa no sustentada por el expediente, se reemplaza «lo observo» por «lo contemplo» por registro profético, se ajusta «esquinas» a «rincones» como equivalente más idiomático de la metáfora, y se documenta correctamente la dificultad de «Set/Seth».
