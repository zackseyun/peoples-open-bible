translation:
  language: es
  text: Y Noé, con sus hijos, su esposa y las esposas de sus hijos con él, entró en el arca a causa de las aguas del diluvio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - se metió
  - ingresó
  lexicon: HALOT
  rationale: El hebreo בוא puede significar ‘venir’, ‘ir’ o ‘entrar’ según el contexto. Aquí, con אֶל הַתֵּבָה, el sentido direccional es claramente de entrada; ‘entró’ comunica ese movimiento de forma natural y fiel en español.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noa
  lexicon: uso bíblico estándar
  rationale: El nombre propio se adapta a la forma bíblica usual en español, ‘Noé’, que mantiene reconocimiento inmediato y no altera el referente hebreo.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo precisa ‘hijos varones’, en español bíblico ‘sus hijos’ conserva el parentesco y resulta natural; el contexto inmediato con ‘las esposas de sus hijos’ deja clara la referencia masculina.
- source_word: וְאִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: En este contexto, אִשָּׁה con sufijo posesivo significa ‘esposa’. ‘Su esposa’ es preciso, digno y idiomático.
- source_word: וּנְשֵׁי בָנָיו
  english_pob_choice: his sons’ wives
  chosen_spanish: las esposas de sus hijos
  alternatives_spanish:
  - sus nueras
  - las mujeres de sus hijos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘las esposas de sus hijos’. Se conserva esa relación de manera transparente. ‘Nueras’ es semánticamente válida, pero introduce un vocabulario más interpretativo que el hebreo no exige.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: El pronombre señala acompañamiento explícito. En español, ‘con él’ reproduce esa relación sin forzar la sintaxis.
- source_word: אֶל הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - al arca
  - dentro del arca
  lexicon: HALOT
  rationale: Como ‘entró’ ya expresa la direccionalidad, ‘en el arca’ evita una repetición pesada de ‘al arca’ y refleja de modo natural el resultado del movimiento. ‘Arca’ es la forma bíblica tradicional y clara en español.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: La preposición expresa causa u ocasión. ‘A causa de’ conserva con claridad la relación causal que el inglés POB también destacó con ‘because of’.
- source_word: מֵי הַמַּבּוּל
  english_pob_choice: the waters of the flood
  chosen_spanish: las aguas del diluvio
  alternatives_spanish:
  - las aguas del desastre
  - las aguas del juicio
  lexicon: HALOT
  rationale: 'Se preservan ambos elementos del hebreo: ‘aguas’ y ‘diluvio’. ‘Diluvio’ es el equivalente bíblico natural de מַבּוּל; ‘las aguas del diluvio’ sería más literal, pero ‘las aguas del diluvio’/‘las aguas del diluvio’ suena más pesado en español y ‘las aguas del diluvio’ se mantiene suficientemente transparente como construcción.'
theological_decisions:
- issue: Relación de acompañamiento de la familia de Noé
  english_pob_reading: with him
  chosen_spanish_reading: con él
  alternative_spanish_readings:
  - junto con él
  - acompañándolo
  rationale: El texto hebreo subraya que la familia entra junto con Noé. ‘Con él’ mantiene el carácter simple y directo del acompañamiento sin añadir matices no presentes.
  doctrine_reference: Narrativa histórica de Génesis 7; no implica decisión doctrinal controvertida.
- issue: Causalidad del ingreso al arca
  english_pob_reading: because of the waters of the flood
  chosen_spanish_reading: a causa de las aguas del diluvio
  alternative_spanish_readings:
  - por las aguas del diluvio
  - debido a las aguas del diluvio
  rationale: Se conserva la causalidad explícita de מִפְּנֵי. La expresión no debe suavizarse a una mera circunstancia temporal; el motivo inmediato es el avance de las aguas del diluvio.
  doctrine_reference: Lectura narrativa literal de Génesis 7:7.
translation_notes:
  revision_awareness: 'El antecedente inglés revisado reordenó la cláusula para reflejar más de cerca la secuencia hebrea y restauró explícitamente ‘with him’ (אִתּוֹ). La redacción española sigue esa misma estructura: primero el sujeto y su grupo familiar, luego el ingreso al arca y finalmente la causa, conservando el acompañamiento explícito.'
  spanish_consistency_notes:
  - Se mantiene ‘Noé’ como forma bíblica estándar en español.
  - Se usa ‘arca’ para תֵּבָה, coherente con el uso bíblico tradicional y con el registro del texto.
  - ‘Aguas del diluvio’ conserva la duplicación hebrea de sustantivos más que reducirla a un compuesto más libre.
  - No se introduce ‘SEÑOR’ ni ninguna sustitución teológica ajena al verso.
