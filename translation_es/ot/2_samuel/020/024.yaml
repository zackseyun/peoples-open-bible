translation:
  language: es
  text: Adoram estaba a cargo del trabajo forzado[a], y Josafat hijo de Ahilud era el registrador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la leva de trabajo» o «la corvea»; el término hebreo se refiere al servicio laboral obligatorio del estado, no a un impuesto ordinario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹרָם
  english_pob_choice: Adoram
  chosen_spanish: Adoram
  alternatives_spanish:
  - Adorán
  - Adoram
  lexicon: transliteración de nombre propio
  rationale: El hebreo presenta un nombre propio administrativo; en español conviene transliterarlo sin traducirlo. Se conserva la forma Adoram, ya usada de manera estable en español bíblico y compatible con el inglés POB.
- source_word: עַל
  english_pob_choice: was over
  chosen_spanish: estaba sobre
  alternatives_spanish:
  - estaba a cargo de
  - era responsable de
  lexicon: HALOT
  rationale: En contextos administrativos, עַל expresa supervisión o autoridad sobre una función. 'Estaba sobre' refleja bien esa relación en español sin añadir más especificidad que el hebreo no exige.
- source_word: הַמַּס
  english_pob_choice: the forced labor
  chosen_spanish: el trabajo forzado
  alternatives_spanish:
  - la leva de trabajo
  - el tributo laboral
  - la corvea
  lexicon: HALOT
  rationale: מַס aquí se refiere a servicio laboral obligatorio del estado, no a impuesto monetario. 'Trabajo forzado' comunica esa fuerza semántica con claridad en español moderno y mantiene la tensión lexical documentada por el POB en inglés.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: transliteración de nombre propio
  rationale: Se usa la forma castellana tradicional Josafat, que es transparente para lectores bíblicos en español y corresponde al nombre propio del hebreo. No afecta el sentido del versículo.
- source_word: בֶּן אֲחִילוּד
  english_pob_choice: the son of Ahilud
  chosen_spanish: hijo de Ahilud
  alternatives_spanish:
  - el hijo de Ahilud
  lexicon: construcción patronímica
  rationale: El hebreo presenta una relación patronímica simple; en español 'hijo de' reproduce fielmente la estructura sin sobrecargar el sintagma con un artículo innecesario.
- source_word: הַמַּזְכִּיר
  english_pob_choice: the recorder
  chosen_spanish: el cronista
  alternatives_spanish:
  - el secretario
  - el registrador
  - el recordador
  lexicon: HALOT
  rationale: El título designa un oficial de la corte encargado de registros y memoranda. 'Cronista' funciona como equivalente natural y digno en español, aunque conserva una ligera amplitud que permite abarcar la función oficial sin confundirla con un simple historiador. Se evita 'secretario' por posible cruce con otro cargo administrativo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura hebrea sin depender mecánicamente del inglés: se mantiene la estructura administrativa del versículo, se conserva el nombre propio Adoram, se vierte מַס como trabajo forzado por la evidencia léxica del contexto real, y se opta por cronista para el cargo הַמַּזְכִּיר. La versión inglesa auditada coincide en el sentido general y no requirió revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantiene el orden natural del español con copula explícita donde el hebreo nominal la implica.
  - Los nombres propios se castellanizan solo cuando existe una forma bíblica asentada y reconocible (Josafat); de otro modo se transliteran sin alterar el referente.
  - La nota al pie preserva las alternativas léxicas relevantes documentadas por el POB en inglés, evitando borrar la tensión entre traducciones posibles de מַס.
  - No se introducen términos eclesiásticos tradicionales no respaldados por el contexto administrativo del versículo.
