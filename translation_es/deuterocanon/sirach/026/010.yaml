translation:
  language: es
  text: La inmoralidad sexual de una mujer se conoce por la elevación de sus ojos[a], y por sus párpados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la inquietud / altivez / vagar de sus ojos». La expresión griega es difícil y puede referirse a una mirada alzada, errante o insinuante.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en sus párpados»; la frase probablemente alude a lo que se revela por la expresión o el mirar de los ojos.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - prostitución
  - fornicación
  - impureza sexual
  lexicon: BDAG
  rationale: La expresión griega abarca conducta sexual ilícita en general. «Inmoralidad sexual» conserva ese alcance amplio en español sin restringirlo indebidamente a prostitución o a un solo tipo de falta.
- source_word: γυναικός
  english_pob_choice: a woman's
  chosen_spanish: de una mujer
  alternatives_spanish:
  - de la mujer
  - mujer
  lexicon: LSJ
  rationale: El genitivo es genérico y proverbial. «De una mujer» mantiene el valor no específico del griego y suena natural en español.
- source_word: ἐν
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - en
  - mediante
  lexicon: BDAG
  rationale: Aquí ἐν marca el rasgo o indicio por el cual algo se reconoce. «Por» comunica bien ese valor instrumental/indicativo en español.
- source_word: μετεωρισμοῖς
  english_pob_choice: the lifting
  chosen_spanish: el levantamiento
  alternatives_spanish:
  - la elevación
  - el vagar
  - la inquietud
  lexicon: LSJ
  rationale: El término puede sugerir elevación, movimiento errante o altivez. «El levantamiento» preserva la imagen visual sin decidir demasiado entre las posibles connotaciones.
- source_word: ὀφθαλμῶν
  english_pob_choice: of her eyes
  chosen_spanish: de sus ojos
  alternatives_spanish:
  - de sus ojos
  - de los ojos
  lexicon: BDAG
  rationale: Se conserva el sustantivo explícito para mantener la imagen griega ligada al movimiento de los ojos.
- source_word: βλεφάροις
  english_pob_choice: her eyelids
  chosen_spanish: sus párpados
  alternatives_spanish:
  - sus pestañas
  - su mirada
  lexicon: LSJ
  rationale: El griego nombra literalmente los párpados; en español, «párpados» reproduce con precisión la concreción del original y evita suavizar la imagen a «mirada».
- source_word: γνωσθήσεται
  english_pob_choice: is known
  chosen_spanish: se conoce
  alternatives_spanish:
  - será conocido
  - se reconoce
  - se pone de manifiesto
  lexicon: BDAG
  rationale: El futuro pasivo griego funciona proverbialmente. El presente gnómico «se conoce» transmite bien esa fuerza general y sentenciosa en español.
theological_decisions:
- issue: Alcance moral de πορνεία en literatura sapiencial
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - prostitución
  - fornicación
  - impureza sexual
  rationale: El contexto es proverbial y observacional, no una definición legal estrecha. «Inmoralidad sexual» conserva el sentido moral amplio sin imponer una precisión doctrinal que el griego no exige aquí.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y el estado de revisión más reciente: no hubo cambios aplicados en la última pasada y el dictamen de concordancia fue alto con objeciones menores. La redacción española conserva la imagen doble de ojos y párpados, y mantiene la amplitud semántica de πορνεία.'
  spanish_consistency_notes:
  - Se eligió «inmoralidad sexual» como equivalente amplio y neutral, coherente con el tratamiento auditado de πορνεία.
  - «Levantamiento de sus ojos» preserva la imagen literal y deja abierta la tensión entre elevación, vagar y altivez indicada por el aparato inglés.
  - «Párpados» mantiene la concreción del griego βλεφάροις sin reducirla a una simple «mirada».
