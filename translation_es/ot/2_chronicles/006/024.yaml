translation:
  language: es
  text: Si tu pueblo de Israel es derrotado[a] delante de un enemigo, porque ha pecado contra ti, y se vuelve[b] y confiesa tu nombre, y ora e implora tu favor[c] delante de ti en esta casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'es abatido'. El hebreo puede expresar ser golpeado o vencido en contexto de guerra.
    reason: lexical_alternative
  - marker: b
    text: O 'regresa' o 'se arrepiente'. El hebreo שׁוב puede abarcar retorno y arrepentimiento en contexto de pacto.
    reason: lexical_alternative
  - marker: c
    text: O 'hace súplica' o 'pide misericordia'. El verbo expresa súplica intensa por gracia o favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִנָּגֵף
  english_pob_choice: are struck down
  chosen_spanish: es derrotado
  alternatives_spanish:
  - es abatido
  - es golpeado
  lexicon: HALOT
  rationale: El nifal comunica la idea de ser vencido o derribado en contexto militar. 'Es derrotado' transmite bien el resultado sin sonar arcaico, y en español conserva el pasivo/resultativo que la POB inglesa quiso preservar.
- source_word: לִפְנֵי אוֹיֵב
  english_pob_choice: before an enemy
  chosen_spanish: delante de un enemigo
  alternatives_spanish:
  - ante un enemigo
  - frente a un enemigo
  lexicon: HALOT
  rationale: '''Delante de'' reproduce de manera natural el valor espacial/idiomático de לִפְנֵי y mantiene el indefinido singular de ''enemy''.'
- source_word: כִּי יֶחֶטְאוּ לָךְ
  english_pob_choice: because they have sinned against you
  chosen_spanish: porque pecaron contra ti
  alternatives_spanish:
  - porque han pecado contra ti
  - pues pecan contra ti
  lexicon: HALOT
  rationale: En español, 'pecar contra ti' expresa con claridad la dirección personal del pecado hacia Dios. El perfecto simple es aceptable en un contexto de cláusula causal general; también podría leerse como perfecto compuesto.
- source_word: וְשָׁבוּ
  english_pob_choice: they turn back
  chosen_spanish: se vuelven
  alternatives_spanish:
  - vuelven
  - regresan
  - se arrepienten
  lexicon: HALOT
  rationale: '''Se vuelven'' conserva la imagen verbal de שׁוב sin resolverla demasiado pronto como término técnico. Así queda abierta la tensión entre retorno concreto y arrepentimiento covenantal, como en la POB inglesa.'
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  english_pob_choice: confess your name
  chosen_spanish: confiesan tu nombre
  alternatives_spanish:
  - dan gracias a tu nombre
  - alaban tu nombre
  lexicon: HALOT
  rationale: El hifil de ידה admite varias posibilidades. Siguiendo la revisión inglesa más reciente, 'confiesan' es la opción más precisa aquí, porque en el marco de arrepentimiento/restauración resalta el reconocimiento verbal de Dios. Se conserva 'tu nombre' para mantener el valor de su nombre revelado y su reputación.
- source_word: וְהִתְפַּלְלוּ
  english_pob_choice: pray
  chosen_spanish: oran
  alternatives_spanish:
  - oran a ti
  - hacen oración
  lexicon: HALOT
  rationale: '''Oran'' es la forma más natural y fiel en español contemporáneo para el hitpael de פלל en este contexto.'
- source_word: וְהִתְחַנְּנוּ
  english_pob_choice: plead for favor
  chosen_spanish: te suplican
  alternatives_spanish:
  - te imploran
  - piden misericordia
  - suplican favor
  lexicon: HALOT
  rationale: El hitpael de חנן expresa súplica intensa por gracia o favor. 'Te suplican' conserva la intensidad y la orientación directa a Dios sin forzar una perífrasis menos natural.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: Es un equivalente idiomático claro y cercano al hebreo, y funciona bien junto con 'en esta casa'.
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: in this house
  chosen_spanish: en esta casa
  alternatives_spanish:
  - en este templo
  lexicon: HALOT
  rationale: '''Casa'' sigue de cerca el hebreo בַּיִת y preserva el lenguaje dedicatorio de la oración de Salomón. ''Templo'' sería interpretativo y menos pegado al texto.'
theological_decisions:
- issue: Alcance de וְשָׁבוּ
  english_pob_reading: they turn back
  chosen_spanish_reading: se vuelven
  alternative_spanish_readings:
  - regresan
  - se arrepienten
  rationale: La escena implica restauración covenantal tras el pecado y la derrota, pero el verbo hebreo es más amplio que el término técnico 'arrepentirse'. 'Se vuelven' deja visible esa amplitud sin perder la dirección teológica del retorno a Dios.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla por encima del texto.'
- issue: Sentido de וְהוֹדוּ אֶת שְׁמֶךָ
  english_pob_reading: confess your name
  chosen_spanish_reading: confiesan tu nombre
  alternative_spanish_readings:
  - dan gracias a tu nombre
  - alaban tu nombre
  rationale: En el contexto de humillación, confesión y petición, el verbo se entiende mejor como reconocimiento verbal de Dios. En español, 'confesar tu nombre' comunica esa admisión pública y evita diluir el matiz en una acción meramente devocional o doxológica.
  doctrine_reference: Revisión léxica POB sobre ידה en contextos de restauración y confesión.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en el punto clave de וְהוֹדוּ: se adopta ''confiesan tu nombre'' en lugar de una formulación de alabanza o acción de gracias, porque el contexto de restauración y reconocimiento verbal lo favorece. También se mantiene la tensión de וְשָׁבוּ con ''se vuelven'', en línea con la POB inglesa que evita resolver de antemano el matiz entre regreso y arrepentimiento.'
  spanish_consistency_notes:
  - Se mantiene 'nombre' sin explicitar 'tu santo nombre' para no añadir contenido no presente.
  - '''En esta casa'' conserva el lenguaje del hebreo y evita ''templo'' como interpretación.'
  - Se usa 'delante de ti' en ambos marcadores espaciales para reflejar el paralelismo del verso.
  - El tono es formal y bíblico, pero con sintaxis natural para lectura pública en español.
