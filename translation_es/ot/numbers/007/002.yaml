translation:
  language: es
  text: Entonces presentaron[a] los líderes de Israel, los jefes de las casas paternas[b]. Ellos eran los líderes de las tribus; ellos eran los que estaban sobre los censados[c].
  philosophy: formal
  footnotes:
  - marker: a
    text: O 'acercaron'. El verbo hebreo literalmente significa 'hicieron acercar' o 'presentaron'; en este contexto se refiere a presentar dones de dedicación, sin que el objeto se exprese en este versículo.
    reason: lexical_alternative
  - marker: b
    text: '''Casas paternas'' se refiere a las unidades familiares ancestrales o clanes dentro de Israel.'
    reason: cultural_note
  - marker: c
    text: O 'los contados' / 'los registrados'. La expresión hebrea se refiere a los que habían sido inscritos en el censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִיבוּ
  english_pob_choice: brought near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - presentaron
  - trajeron cerca
  lexicon: HALOT
  rationale: La forma causativa de קרב conserva la idea básica de acercar o presentar. En español, en este contexto de presentación ante Yahvé, 'se acercaron' comunica la acción sin añadir explícitamente 'ofrendas', que no aparece en el versículo.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: the leaders of Israel
  chosen_spanish: los líderes de Israel
  alternatives_spanish:
  - los jefes de Israel
  - los príncipes de Israel
  lexicon: HALOT
  rationale: נָשִׂיא designa un jefe o líder elevado; 'líderes' es claro y evita el matiz aristocrático de 'príncipes', que en español puede sonar más monárquico que tribal.
- source_word: רָאשֵׁי בֵּית אֲבֹתָם
  english_pob_choice: the heads of their fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de sus casas ancestrales
  - los jefes de sus familias
  lexicon: HALOT
  rationale: La expresión preserva la unidad de clan/linaje. 'Casas paternas' mantiene la textura semítica y refleja bien el equivalente cultural de 'fathers’ houses'.
- source_word: הֵם נְשִׂיאֵי הַמַּטֹּת
  english_pob_choice: They were the leaders of the tribes
  chosen_spanish: ellos, los líderes de las tribus
  alternatives_spanish:
  - ellos, los jefes de las tribus
  - ellos, los líderes de los grupos tribales
  lexicon: HALOT
  rationale: מַטּוֹת puede significar literalmente 'bastones', pero aquí funciona como 'tribus'. 'Líderes de las tribus' transmite el referente social sin forzar la metáfora del bastón.
- source_word: הֵם הָעֹמְדִים עַל
  english_pob_choice: they were the ones over
  chosen_spanish: ellos, los que estaban sobre
  alternatives_spanish:
  - ellos, los encargados de
  - ellos, los que tenían autoridad sobre
  lexicon: HALOT
  rationale: La construcción עמד על puede indicar estar al frente, sobre o a cargo de. 'Estaban sobre' conserva la imagen de autoridad presente en el hebreo, sin convertirla del todo en una explicación idiomática.
- source_word: הַפְּקֻדִים
  english_pob_choice: those who were counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los censados
  lexicon: HALOT
  rationale: El participio pasivo de פקד remite a quienes han sido contados/registrados en el censo. 'Los contados' es breve y fiel; en español bíblico suena natural y conserva la relación con el registro censal.
theological_decisions:
- issue: Referencia implícita a Yahvé en el contexto de acercarse/presentarse
  english_pob_reading: brought near
  chosen_spanish_reading: se acercaron
  alternative_spanish_readings:
  - se presentaron
  - se acercaron para la ofrenda
  rationale: Aunque el verbo no menciona el objeto, el contexto inmediato de Números 7 es de dedicación ante Yahvé. Se evita añadir 'ofrenda' en el texto principal; la formulación queda abierta pero cultual.
  doctrine_reference: Números 7:1-3; coherencia contextual del culto levítico
- issue: Autoridad tribal expresada por 'over those who were counted'
  english_pob_reading: they were the ones over those who were counted
  chosen_spanish_reading: ellos, los que estaban sobre los contados
  alternative_spanish_readings:
  - ellos, los encargados de los contados
  - ellos, los que presidían a los contados
  rationale: Se preserva la tensión entre la imagen literal de 'estar sobre' y el sentido funcional de autoridad. 'Los contados' reproduce el pasivo de 'mustered/counted' sin introducir un matiz militar excesivo.
  doctrine_reference: Números 1:2-3, 16-19; vocabulario del censo
- issue: Cultura de clan en 'fathers’ houses'
  english_pob_reading: the heads of their fathers’ houses
  chosen_spanish_reading: los jefes de las casas paternas
  alternative_spanish_readings:
  - los jefes de las casas ancestrales
  - los jefes de familia
  rationale: Se mantiene la estructura de parentesco patriarcal propia del texto hebreo. 'Casas paternas' es comprensible y preserva la organización tribal/corporal.
  doctrine_reference: Números 1:4, 18
translation_notes:
  revision_awareness: 'El texto inglés del POB pasó de ''brought offerings'' a ''brought near'' para evitar añadir un objeto no explícito, y afinó ''standing over'' a ''over'' por naturalidad. La versión española sigue esa revisión reciente: mantiene la literalidad controlada de ''se acercaron'' y ''los que estaban sobre'', sin introducir ''ofrendas'' ni ''mustered men''.'
  spanish_consistency_notes:
  - Se mantiene 'líderes' para נָשִׂיא y no 'príncipes', en continuidad con la preferencia del proyecto por claridad moderna.
  - '''Casas paternas'' conserva el paralelismo con el inglés auditado y la estructura de clan.'
  - No se usa 'SEÑOR' como sustituto del nombre divino; aunque no aparece Yahvé en este versículo, la redacción queda compatible con el marco cultual del capítulo.
  - '''Los contados'' sigue el valor pasivo del hebreo sin sobredeterminarlo como terminología militar.'
