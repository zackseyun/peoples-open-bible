review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido básico del hebreo: el contraste proverbial entre animales que conocen la fuente de su cuidado y Israel que no conoce ni entiende. También mantiene correctamente el objeto implícito sin explicitarlo en el texto principal, en línea con la decisión teológica auditada. Sin embargo, la nota a sobre אֵבוּס no preserva fielmente la alternativa inglesa, porque introduce el anglicismo «manger» en vez de una alternativa española como «comedero».'
  spanish_quality_summary: El texto es claro, natural y digno en español. «Buey», «dueño», «asno», «pesebre», «amo», «Israel no conoce», «mi pueblo no entiende» leen bien y mantienen el paralelismo. La única reparación necesaria es la nota léxica para que sea idiomática y útil en español.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparece el nombre divino en el texto base; la nota b usa correctamente «Yahvé». «Conoce» preserva bien יָדַע, y «entiende» es una opción aceptable para הִתְבּוֹנָן.
  issues:
  - severity: medium
    issue: La nota al pie [a] usa el anglicismo «manger».
    rationale: La nota inglesa dice «Or “manger” for “feeding trough”», pero en revisión española no debe copiarse el término inglés. Debe ofrecer una alternativa española pertinente para «pesebre», por ejemplo «comedero», o reformularse como nota de equivalencia léxica.
  revised_spanish_text: Un buey conoce[a] a su dueño, y un asno el pesebre de su amo; Israel no conoce[b]; mi pueblo no entiende.
  revised_footnotes:
  - marker: a
    text: O «comedero» para «pesebre».
    reason: lexical_alternative
  - marker: b
    text: El sentido implícito es que Israel no conoce a Yahvé, aunque el hebreo deja el objeto sin expresar.
    reason: alternative_reading
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, y se corrige únicamente la nota [a] para eliminar el anglicismo y ofrecer una alternativa léxica española acorde con la evidencia y el estilo del proyecto.
