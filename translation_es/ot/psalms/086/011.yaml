translation:
  language: es
  text: Enséñame tu camino, oh Yahvé, para que yo camine en tu verdad[a]; une mi corazón[b] para temer tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu fidelidad». El hebreo אֱמֶת puede denotar tanto «verdad» como «fidelidad».
    reason: lexical_alternative
  - marker: b
    text: O «haz indiviso mi corazón para temer tu nombre». El verbo hebreo expresa unir o hacer uno, sugiriendo libertad de lealtades divididas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ה֘וֹרֵנִי
  english_pob_choice: Teach me
  chosen_spanish: Enséñame
  alternatives_spanish:
  - Instrúyeme
  - Muéstrame
  lexicon: HALOT
  rationale: El imperativo hifil con sufijo de primera persona expresa pedir instrucción divina. «Enséñame» es natural en español y conserva con claridad la petición de enseñanza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio divino en lugar de sustituirlo por un título. En español, «Yahvé» preserva ese nombre revelado y corresponde al estándar del proyecto.
- source_word: דַּרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu manera
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino o forma de proceder. «Tu camino» es la equivalencia más directa y natural en español, manteniendo el singular metafórico del hebreo.
- source_word: אֲהַלֵּךְ
  english_pob_choice: that I may walk
  chosen_spanish: para que yo camine
  alternatives_spanish:
  - para que ande
  - y pueda caminar
  lexicon: HALOT
  rationale: El imperfecto aquí expresa propósito respecto a la petición previa. «Para que yo camine» conserva esa relación final sin forzar una traducción demasiado literal del inglés.
- source_word: בַּאֲמִתֶּךָ
  english_pob_choice: in your truth
  chosen_spanish: en tu verdad
  alternatives_spanish:
  - en tu fidelidad
  - según tu verdad
  lexicon: HALOT
  rationale: אֱמֶת abarca verdad y fidelidad. «Verdad» mantiene la amplitud léxica y la formulación bíblica común; la alternativa «fidelidad» queda como posibilidad contextual.
- source_word: יַחֵד
  english_pob_choice: unite
  chosen_spanish: une
  alternatives_spanish:
  - haz uno
  - haz indiviso
  lexicon: HALOT
  rationale: El piel imperativo de יחד pide unir o hacer uno. «Une» es breve, fiel y comunica la idea de un corazón no dividido.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: לֵבָב designa el centro interior de la persona, incluyendo voluntad y afectos. «Corazón» es el equivalente bíblico claro y estándar en español.
- source_word: לְיִרְאָה
  english_pob_choice: to fear
  chosen_spanish: para temer
  alternatives_spanish:
  - para reverenciar
  - para mostrar temor
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. Se conserva «temer» para no suavizar el peso teológico de ירא; el matiz de reverencia queda implicado por el contexto.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu Nombre
  lexicon: HALOT
  rationale: «Nombre» debe mantenerse literalmente porque en hebreo designa la persona y su revelación. En la oración, «tu nombre» conserva la carga teológica del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. Se conserva como nombre propio en español, evitando la sustitución por un título y manteniendo la referencia pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de ירא en relación con el nombre de Dios
  english_pob_reading: fear your name
  chosen_spanish_reading: temer tu nombre
  alternative_spanish_readings:
  - reverenciar tu nombre
  - temer reverentemente tu nombre
  rationale: Se preserva «temer» para no diluir la fuerza bíblica de ירא. El contexto de adoración permite entender este temor como reverencia y asombro, sin reemplazarlo por un término más débil.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo externo informó alta concordancia (1.0). No hubo revisiones aplicadas en el pasaje; la redacción española sigue de cerca la lectura auditada del inglés POB y el hebreo fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se conserva «temer» en lugar de «reverenciar» para no atenuar el peso del hebreo ירא.
  - «Verdad» se deja en el texto principal y «fidelidad» se reserva para la nota, preservando la amplitud semántica de אֱמֶת.
  - El imperativo final se expresa como finalidad en español («para que yo camine») para reflejar la función del imperfecto hebreo sin sonar forzado.
