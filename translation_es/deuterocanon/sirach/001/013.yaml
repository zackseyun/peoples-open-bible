translation:
  language: es
  text: El que teme a Yahvé, su fin será bueno; y al final de sus días será bendecido.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego de este versículo difiere de manera importante: «El principio de la sabiduría es temer al Señor, y con los fieles fue creada en el vientre para ellos». El texto principal sigue el hebreo conservado; se tiene en cuenta la lectura griega por la discrepancia entre las fuentes.'
    reason: textual_variant
lexical_decisions:
- source_word: יְרֵא / φοβεῖσθαι
  english_pob_choice: One who fears
  chosen_spanish: El que teme
  alternatives_spanish:
  - El que reverencia
  - Quien teme
  lexicon: HALOT; LXX φοβεῖσθαι
  rationale: La forma participial hebrea funciona como designación de persona. En español, «El que teme» conserva el sentido substantival y el temor reverente implícito sin añadir paráfrasis.
- source_word: יְהֹוָה / τὸν κύριον
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT; política terminológica del proyecto
  rationale: El proyecto pide representar el nombre divino como «Yahvé» en el texto principal. Aunque el griego dice κύριος, aquí refleja el nombre divino del hebreo subyacente, por lo que se evita el reemplazo reverencial por «el Señor».
- source_word: תִּיטַב אַחֲרִיתוֹ
  english_pob_choice: his end will be good
  chosen_spanish: su fin será bueno
  alternatives_spanish:
  - su final será bueno
  - su desenlace será bueno
  - su futuro será bueno
  lexicon: HALOT
  rationale: «Fin» comunica con claridad el valor de אַחֲרִית como desenlace u outcome final. «Será bueno» mantiene la valoración positiva sin sobreespecificar prosperidad material.
- source_word: וּבְאַחֲרִית יָמָיו
  english_pob_choice: at the end of his days
  chosen_spanish: al final de sus días
  alternatives_spanish:
  - al término de sus días
  - en el final de sus días
  - en sus últimos días
  lexicon: HALOT
  rationale: «Al final de sus días» es natural en español y conserva la concreción temporal del hebreo.
- source_word: יִתְבָּרָךְ
  english_pob_choice: he will be blessed
  chosen_spanish: será bendecido
  alternatives_spanish:
  - será bendito
  - recibirá bendición
  lexicon: HALOT
  rationale: La pasiva expresa mejor el sentido contextual de recibir bendición. «Bendecido» es idiomático y evita la ambigüedad reflexiva de la raíz.
theological_decisions:
- issue: Diferencia textual entre el hebreo conservado y el paralelo griego de Sirácida 1:13
  english_pob_reading: The main text follows the extant Hebrew witness, with the Greek kept in view because of the source mismatch.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado, y se preserva la discrepancia griega en nota.
  alternative_spanish_readings:
  - Harmonizar hebreo y griego en una sola redacción
  - Adoptar el griego como texto principal
  rationale: La política del proyecto da prioridad al testimonio hebreo donde se conserva. Dado que el griego ofrece una sentencia sustancialmente distinta, se mantiene la transparencia textual mediante nota en lugar de fusionar o silenciar la variante.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo cuando sobreviva; conservar honestamente el paralelo griego como evidencia de variante textual.'
translation_notes:
  revision_awareness: Se revisó el par hebreo-griego y no se detectaron cambios necesarios respecto del pase más reciente; la redacción final conserva la prioridad del hebreo y la nota transparente sobre la variante griega.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para el nombre divino.
  - «Fin» se usa para אַחֲרִית por su valor de desenlace final, no solo de término cronológico.
  - La nota refleja explícitamente la tensión textual sin armonización artificial entre hebreo y griego.
