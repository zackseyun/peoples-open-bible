translation:
  language: es
  text: Pero si no expulsan[a] a los habitantes de la tierra de delante de ustedes, entonces los que de entre ellos dejen quedar serán púas[b] en sus ojos y espinas[c] en sus costados, y los hostigarán[d] sobre la tierra en la que ustedes habitan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echan fuera» / «desalojan». El hebreo del hifil de ירשׁ apunta a hacer perder la posesión y remover a los habitantes; «expulsar» expresa bien esa fuerza.
    reason: lexical_alternative
  - marker: b
    text: O «pinchazos en sus ojos» para «púas en sus ojos». El sustantivo hebreo es raro y denota algo agudo que perfora.
    reason: lexical_alternative
  - marker: c
    text: O «espinas en sus costados» / «garfios en sus costados». Las dos imágenes describen una aflicción persistente y dolorosa causada por los habitantes que queden.
    reason: lexical_alternative
  - marker: d
    text: O «los afligirán» o «los oprimirán». El verbo hebreo puede abarcar una gama de aflicción hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹרִישׁוּ
  english_pob_choice: drive out
  chosen_spanish: expulsan
  alternatives_spanish:
  - desalojan
  - echan fuera
  lexicon: HALOT
  rationale: El hifil de ירשׁ expresa hacer salir o quitar de la posesión. En español, «expulsar» comunica con naturalidad la acción de remover a los habitantes sin diluir la fuerza activa del verbo.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los moradores de la tierra
  - los residentes de la tierra
  lexicon: HALOT
  rationale: «Habitantes» reproduce bien el participio sustantivado y mantiene un tono formal y claro para el contexto de advertencia.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es espacial e idiomática; «de delante de ustedes» conserva esa imagen de remoción frente al avance del pueblo, con español natural.
- source_word: תּוֹתִירוּ
  english_pob_choice: you let remain
  chosen_spanish: dejen
  alternatives_spanish:
  - dejen permanecer
  - dejen quedar
  lexicon: HALOT
  rationale: El hifil de יתר significa dejar sobrante o dejar que permanezca. «Dejen» funciona aquí con el complemento implícito y mantiene la idea de permitir que algunos queden.
- source_word: לְשִׂכִּים
  english_pob_choice: barbs
  chosen_spanish: espinas
  alternatives_spanish:
  - aguijones
  - púas
  lexicon: HALOT
  rationale: La primera imagen alude a algo agudo y punzante. «Espinas» es una opción clara y bíblicamente reconocible en español; no elimina la tensión del hebreo, aunque la imagen exacta sea rara.
- source_word: בְּעֵינֵיכֶם
  english_pob_choice: in your eyes
  chosen_spanish: en sus ojos
  alternatives_spanish:
  - a sus ojos
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal literal. Se prefirió «sus» para concordar con el tratamiento plural de cortesía en español bíblico moderno.
- source_word: לִצְנִינִם
  english_pob_choice: thorns
  chosen_spanish: aguijones
  alternatives_spanish:
  - espinas
  - púas
  lexicon: HALOT
  rationale: El término paralelo refuerza la idea de algo punzante que hiere. «Aguijones» preserva la distinción respecto del primer término y comunica bien la agresión persistente.
- source_word: בְּצִדֵּיכֶם
  english_pob_choice: in your sides
  chosen_spanish: en sus costados
  alternatives_spanish:
  - en sus lados
  - en sus flancos
  lexicon: HALOT
  rationale: «Costados» es el equivalente español más natural y digno para la metáfora corporal, más claro que «flancos» y más preciso que «lados».
- source_word: וְצָרֲרוּ
  english_pob_choice: they will harass you
  chosen_spanish: los hostigarán
  alternatives_spanish:
  - los acosarán
  - les causarán aflicción
  lexicon: HALOT
  rationale: El verbo צרר puede expresar hostilidad, aflicción u opresión. «Hostigar» recoge la idea de hostilidad continua y encaja con las imágenes previas sin exagerar hacia una opresión más técnica.
- source_word: עַל הָאָרֶץ אֲשֶׁר אַתֶּם יֹשְׁבִים בָּהּ
  english_pob_choice: on the land where you are living
  chosen_spanish: sobre la tierra en la que ustedes habitan
  alternatives_spanish:
  - en la tierra en la que ustedes viven
  - sobre la tierra donde habitan
  lexicon: HALOT
  rationale: Se conserva el matiz de עַל con «sobre», como en el texto hebreo, mientras «habitan» mantiene el valor participial de residencia estable.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa, manteniendo la estructura condicional, la doble imagen de daño punzante y el cierre locativo con עַל como «sobre». Se ajustó la dicción para español bíblico moderno, con equivalentes naturales y consistentes en la metáfora corporal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde el texto no lo requería; en este versículo no aparece el nombre divino explícito.
  - Se conservó la distinción entre los dos términos punzantes con «espinas» y «aguijones», evitando colapsarlos en una sola imagen.
  - Se prefirió el trato plural de cortesía «ustedes» para coherencia en español bíblico contemporáneo.
  - «Habitan» traduce el participio durativo y evita un pasado o una acción puntual.
