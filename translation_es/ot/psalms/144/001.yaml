translation:
  language: es
  text: De David. Bendito sea Yahvé[a], mi roca, que adiestra mis manos para la batalla, mis dedos para la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «De David» como encabezamiento de autoría, o «Para David» como dedicación; la preposición hebrea puede indicar autoría, asociación o destino.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición ל en encabezamientos puede indicar autoría, asociación o dedicación. «De David» conserva esa ambigüedad sin imponer una sola relación.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Sea bendito
  - Alabado sea
  lexicon: HALOT
  rationale: 'Como participio pasivo con fuerza doxológica, funciona en español de manera natural como una bendición exclamativa: «Bendito sea». Mantiene el valor litúrgico sin volverlo rígido.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peñasco
  - mi refugio
  lexicon: HALOT
  rationale: La metáfora concreta de roca se mantiene en español. «Mi roca» es fiel, clara y conserva la imagen de estabilidad y protección.
- source_word: הַמְלַמֵּד
  english_pob_choice: who trains
  chosen_spanish: que adiestra
  alternatives_spanish:
  - que enseña
  - que entrena
  lexicon: HALOT
  rationale: En este contexto militar, el participio expresa preparación práctica para la acción, no solo instrucción. «Adiestra» comunica mejor esa capacitación concreta y sostenida.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis brazos
  lexicon: HALOT
  rationale: Se conserva el lenguaje corporal literal del hebreo. En español, «manos» es natural y mantiene la imagen poética.
- source_word: לַקְרָב
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para el combate
  - para pelear
  lexicon: HALOT
  rationale: «Batalla» reproduce bien קְרָב y encaja con el tono poético y militar del verso.
- source_word: אֶצְבְּעוֹתַי
  english_pob_choice: my fingers
  chosen_spanish: mis dedos
  alternatives_spanish:
  - mis dedos de la mano
  lexicon: HALOT
  rationale: El hebreo nombra específicamente los dedos; no se generaliza a «manos» para preservar el paralelismo poético.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la guerra armada
  - para el combate
  lexicon: HALOT
  rationale: «Guerra» conserva la tersura y la paralelismo con «batalla»; evita diluir el término en una abstracción más general.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; se preserva como nombre propio en español con la forma estándar del proyecto, en lugar de una sustitución titulizante. Esto mantiene la distinción entre el nombre divino y otros títulos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje bélico aplicado a Dios
  english_pob_reading: Retain literal military imagery ('trains my hands for battle, my fingers for war')
  chosen_spanish_reading: Conservar la imagen militar literal («adiestra mis manos para la batalla, mis dedos para la guerra»)
  alternative_spanish_readings:
  - Suavizarlo como capacitación general
  - Espiritualizarlo como fortaleza interior
  rationale: El hebreo presenta preparación concreta para el conflicto armado; la traducción no debe deshistorizar ni espiritualizar el lenguaje. «Adiestra» mantiene el matiz de preparación eficaz y específica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de control cruzado fue alto, por lo que esta propuesta sigue de cerca la lectura auditada del inglés POB y ajusta solo la formulación al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en todo el texto.
  - Se conserva el paralelismo poético entre «mis manos» / «mis dedos» y «batalla» / «guerra».
  - Se usa un registro sobrio y bíblico moderno, sin calco rígido del inglés.
  - La nota de encabezamiento se ancla solo en «De David», donde la ambigüedad del ל es relevante.
