review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea general: poner a los levitas delante de Aarón y de sus hijos, y presentarlos como תְּנוּפָה a Yahvé. También preserva correctamente el nombre divino como «Yahvé» y la idea ritual de presentación en vez de un mecimiento físicamente crudo. Sin embargo, «sus hijos» debilita un matiz importante del hebreo בָנָיו y del inglés auditado, que especifica «his sons» por tratarse de los descendientes varones sacerdotales de Aarón.'
  spanish_quality_summary: 'El español es claro y digno, pero «Y harás que los levitas se pongan» suena algo más perifrástico y menos natural que una formulación directa como «pondrás a los levitas». Además, «sus hijos» puede sonar ambiguo en español moderno, mientras que «sus hijos varones» o «sus hijos» con nota no es necesario aquí; el texto principal puede expresar el sentido con claridad usando «sus hijos» solo si el contexto fuera suficiente, pero dado el registro sacerdotal conviene explicitar «sus hijos» como varones en español principal mediante «sus hijos» no basta. La mejor reparación mínima es usar «sus hijos»? No; más fiel y claro es «sus hijos» -> «sus hijos» remains ambiguous. Therefore revise to «sus hijos»? Actually needed is «sus hijos» to «sus hijos»? Better: «sus hijos» to «sus hijos» is no change. Use «sus hijos»? No. Use «sus hijos»? The source means sons, so «sus hijos» should become «sus hijos»? Spanish requires «sus hijos» but that can include daughters. So revise
    to «sus hijos»? impossible. Best is «sus hijos» -> «sus hijos» with note, but principal text can more directly say «sus hijos»? No. Use «sus hijos varones» would be accurate but slightly heavy. Better stylistically: «sus hijos» is common in Bible contexts, but the audited rationale explicitly requires gender-accurate rendering. So a revision is warranted.'
  glossary_alignment: Alinea bien con el glosario del proyecto en «Yahvé». La decisión «presentarás» para וְהֵנַפְתָּ concuerda con la justificación teológica/lexical del POB, y «ofrenda mecida» preserva la categoría técnica de תְּנוּפָה de forma aceptable. El principal desajuste con la auditoría inglesa está en בָנָיו, donde debe mantenerse la especificación masculina.
  issues:
  - severity: medium
    issue: בָנָיו se tradujo «sus hijos» en vez de una forma inequívocamente masculina.
    rationale: La auditoría inglesa documenta expresamente «his sons» por precisión de género en el contexto sacerdotal. En español, «hijos» puede funcionar genéricamente; aquí conviene una formulación que preserve la referencia a los descendientes varones de Aarón.
  - severity: low
    issue: «Harás que los levitas se pongan» es algo perifrástico y menos natural que una forma verbal directa.
    rationale: וְהַעֲמַדְתָּ es causativo de ‘poner/hacer estar’. «Pondrás a los levitas» o «colocarás a los levitas» suena más natural en español bíblico moderno y mantiene la fuerza ritual de colocación.
  - severity: low
    issue: La nota al pie literal es demasiado larga y desplaza innecesariamente el anclaje a «sus hijos».
    rationale: La nota inglesa explica la alternativa ritual «wave them as a wave offering». En español conviene anclar la nota en la acción ritual, no en «sus hijos», para que corresponda mejor al contenido de la observación.
  revised_spanish_text: Y pondrás a los levitas delante de Aarón y delante de sus hijos varones, y los presentarás[a] como ofrenda mecida a Yahvé.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «los mecerás como ofrenda mecida a Yahvé». El hebreo usa el verbo ritual de mecer/presentar junto con el sustantivo técnico «ofrenda mecida».
    reason: lexical_alternative
