translation:
  language: es
  text: Y harás el patio del tabernáculo; para el lado del sur, hacia el sur, habrá cortinas[a] para el patio, de lino fino torcido, de cien codos de largo para un lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tapices' o 'lienzos colgantes'. El hebreo se refiere a paneles de tela que formaban el límite del patio.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲצַר
  english_pob_choice: court
  chosen_spanish: patio
  alternatives_spanish:
  - atrio
  - corte
  lexicon: HALOT
  rationale: En español, 'patio' comunica con naturalidad el espacio abierto y cercado. 'Atrio' también es posible en contexto sagrado, pero puede sonar más eclesiástico o técnico; 'patio' mantiene mejor la imagen arquitectónica del recinto.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - dwelling
  lexicon: HALOT
  rationale: '''Tabernáculo'' conserva el referente cultual establecido en español y evita diluir el término técnico del santuario. ''Morada'' sería más literal al valor de la raíz, pero menos preciso aquí.'
- source_word: לִפְאַת נֶגֶב תֵּימָנָה
  english_pob_choice: For the south side, southward
  chosen_spanish: al lado del sur, hacia el sur
  alternatives_spanish:
  - para el lado del sur, hacia el sur
  - en el lado sur, hacia el sur
  lexicon: HALOT
  rationale: La doble orientación del hebreo se preserva con dos expresiones coordinadas. 'Al lado del sur' refleja לִפְאַת נֶגֶב y 'hacia el sur' reproduce תֵּימָנָה sin fusionar ambos matices.
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos
  - hangares
  lexicon: HALOT
  rationale: Aunque el inglés optó por 'hangings' para la función arquitectónica, en español 'cortinas' es la forma más natural y comprensible para paneles textiles colgantes del recinto. Se mantiene el sentido de separación perimetral sin forzar un calco extraño.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: finely twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino torcido fino
  - lino finamente torcido
  lexicon: HALOT
  rationale: '''Lino fino torcido'' conserva el material y la cualidad de elaboración con un orden natural en español bíblico contemporáneo. ''Finamente torcido'' sería también válido, pero menos directo.'
- source_word: מֵאָה בָאַמָּה
  english_pob_choice: a hundred cubits
  chosen_spanish: de cien codos
  alternatives_spanish:
  - de un centenar de codos
  - de cien codos de medida
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codos' para no perder el valor cultural e histórico del texto. 'De cien codos' corresponde bien al genitivo de medida del hebreo.
- source_word: אֹרֶךְ
  english_pob_choice: long
  chosen_spanish: de largo
  alternatives_spanish:
  - en longitud
  - de extensión
  lexicon: HALOT
  rationale: '''De largo'' integra naturalmente la medida en español y reproduce la función del sustantivo hebreo sin una construcción rígida.'
- source_word: לַפֵּאָה הָאֶחָת
  english_pob_choice: for one side
  chosen_spanish: para un lado
  alternatives_spanish:
  - para un costado
  - para un lado único
  lexicon: HALOT
  rationale: '''Para un lado'' expresa la referencia singular del perímetro con claridad. ''Costado'' es posible, pero menos idiomático en este contexto de medidas del recinto.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y tiene en cuenta la revisión del inglés POB que prefería 'For the south side, southward' para reflejar mejor la introducción de la especificación direccional. Se mantuvo esa doble orientación en español con 'al lado del sur, hacia el sur'.
  spanish_consistency_notes:
  - Se usó 'Y harás' para reflejar el futuro exhortativo/jussivo hebreo en estilo bíblico natural.
  - Se conservó 'tabernáculo' como término técnico estable en español para הַמִּשְׁכָּן.
  - Se mantuvo la unidad 'codos' sin conversión métrica para preservar la medida antigua del texto.
