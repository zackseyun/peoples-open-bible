base_translation:
  language: en
  yaml_path: translation/ot/exodus/004/021.yaml
  text: Then Yahweh said to Moses[a], “When you go back to Egypt, see that you do before Pharaoh all the wonders that I have put in your hand. But I will harden his heart[b], and he will not let the people go.”
  footnotes:
  - marker: a
    text: Or 'I will strengthen his heart' or 'I will make his heart firm.' The Hebrew verb can carry the sense of strengthening; here it describes Pharaoh being confirmed in stubborn refusal.
    reason: lexical_alternative
  - marker: b
    text: Or 'the signs' or 'the miracles.' The Hebrew word refers to extraordinary acts that function as displays of divine power.
    reason: lexical_alternative
