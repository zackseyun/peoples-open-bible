translation:
  language: es
  text: Pero un deseo irracional por el agua entre los enemigos[a], apretándolo, lo marchitó, y al aflojarlo[b], lo abrasó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el agua en el campamento de los enemigos». La frase griega dice literalmente «entre/con los enemigos».'
    reason: lexical_alternative
  - marker: b
    text: 'La imagen está condensada: el deseo se presenta como si primero lo apretara y luego lo aflojara, para terminar abrasándolo; así se expresan los efectos corporales contradictorios de una sed intensa.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: LSJ
  rationale: La adversativa simple conserva el contraste con el contexto inmediato y suena natural en español contemporáneo.
- source_word: τις
  english_pob_choice: an irrational desire
  chosen_spanish: un deseo
  alternatives_spanish:
  - un cierto deseo
  - algún deseo
  lexicon: LSJ
  rationale: Aunque el inglés final suaviza el indefinido, en español queda más natural como artículo indefinido. Mantiene la indefinición sin introducir precisión inexistente.
- source_word: ἀλόγιστος
  english_pob_choice: irrational
  chosen_spanish: irracional
  alternatives_spanish:
  - sin razón
  - insensato
  lexicon: LSJ
  rationale: En 4 Macabeos el contraste entre razón y pasiones es central; 'irracional' conserva ese matiz filosófico mejor que una opción más general.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - ansia
  - codicia
  lexicon: LSJ
  rationale: '''Deseo'' es suficientemente amplio para el contexto de sed, sin cargar el término con un matiz sexual o moral que aquí no es primario.'
- source_word: τοῦ παρὰ τοῖς πολεμίοις ὕδατος
  english_pob_choice: for the water among the enemy
  chosen_spanish: por el agua entre los enemigos
  alternatives_spanish:
  - por el agua en territorio enemigo
  - por el agua en el campamento de los enemigos
  lexicon: LSJ
  rationale: '''Entre los enemigos'' conserva de cerca la relación local de παρὰ τοῖς πολεμίοις y deja visible la ambigüedad que el inglés anota en la nota textual. Se evita una paráfrasis demasiado interpretativa.'
- source_word: ἐπιτείνουσα
  english_pob_choice: tightening its grip on him
  chosen_spanish: tensando su presa sobre él
  alternatives_spanish:
  - apretando su agarre sobre él
  - oprimiéndolo
  lexicon: LSJ
  rationale: El participio tiene la idea de tensar/estrechar. 'Tensando su presa' intenta conservar la imagen de presión ejercida por el deseo, sin perder el carácter figurado y violento del griego.
- source_word: συνέφρυγε
  english_pob_choice: shriveled him
  chosen_spanish: lo resecó
  alternatives_spanish:
  - lo arrugó
  - lo secó
  lexicon: LSJ
  rationale: '''Resecó'' comunica el efecto físico de la sed y la desecación corporal. Es un equivalente dinámico aceptable del deterioro expresado por el verbo griego.'
- source_word: λύουσα
  english_pob_choice: while relaxing him
  chosen_spanish: al aflojarlo
  alternatives_spanish:
  - al soltarlo
  - al debilitarlo
  lexicon: LSJ
  rationale: '''Aflojarlo'' preserva la idea literal de soltar/relajar, manteniendo la tensión entre dos efectos opuestos del deseo.'
- source_word: κατέφλεγεν
  english_pob_choice: burned him up
  chosen_spanish: lo consumió con fuego
  alternatives_spanish:
  - lo quemó por completo
  - lo abrasó
  lexicon: LSJ
  rationale: '''Consumió con fuego'' conserva la intensidad del compuesto y sugiere una quema devastadora sin sonar excesivamente coloquial.'
theological_decisions:
- issue: Contraste razón/pasión en 4 Macabeos
  english_pob_reading: Rendered ἀλόγιστος as 'irrational' rather than a more generic 'senseless' or 'unreasoning.'
  chosen_spanish_reading: Se traduce ἀλόγιστος como 'irracional'.
  alternative_spanish_readings:
  - insensato
  - sin razón
  rationale: El libro articula una oposición conceptual entre la razón y las pasiones. 'Irracional' preserva mejor ese marco filosófico-teológico que una palabra más vaga.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 and 5
- issue: Imagen personificada del deseo que tensa y luego afloja
  english_pob_reading: 'The imagery is compressed: desire is personified as both tightening and loosening him, then burning him up—depicting the contradictory bodily effects of intense thirst.'
  chosen_spanish_reading: Se conserva la personificación del deseo como fuerza que tensa, afloja y quema.
  alternative_spanish_readings:
  - interpretarlo como simple intensificación emocional
  - suavizar la imagen a efectos físicos generales
  rationale: La expresión comprimida del griego presenta una tensión deliberada que no debe diluirse. Mantener la personificación ayuda a no perder el peso retórico y corporal del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 3
translation_notes:
  revision_awareness: Tomé como base la última revisión inglesa, que prefirió 'an' en lugar de 'some', 'enemies' en plural, y una imagen más natural para ἐπιτείνουσα. En español se mantiene esa dirección, pero se conserva la ambigüedad local de παρὰ τοῖς πολεμίοις con una nota, y se busca una formulación idiomática que no borre la personificación del deseo.
  spanish_consistency_notes:
  - Se usa 'irracional' para ἀλόγιστος, coherente con el lenguaje filosófico de 4 Macabeos.
  - '''Deseo'' se mantiene como término amplio, evitando ''lujuria'' o ''codicia'' que estrecharían indebidamente el contexto de sed.'
  - '''Entre los enemigos'' conserva la localización del griego y deja abierta la nota alternativa.'
  - '''Lo aflojarlo'' refleja el valor de λύουσα sin reemplazarlo por una explicación excesiva.'
  - '''Lo consumió con fuego'' mantiene la fuerza del compuesto κατέφλεγεν sin volverlo redundante.'
