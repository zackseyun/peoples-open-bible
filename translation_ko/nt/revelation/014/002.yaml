  text: καὶ ἤκουσα φωνὴν ἐκ τοῦ οὐρανοῦ ὡς φωνὴν ὑδάτων πολλῶν καὶ ὡς φωνὴν βροντῆς μεγάλης, καὶ ἡ φωνὴ ἣν ἤκουσα ὡς κιθαρῳδῶν κιθαριζόντων ἐν ταῖς κιθάραις αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/002.yaml
  text: And I heard a sound from heaven like the sound of many waters and like the sound of loud thunder[c][b][a], and the sound that I heard was like harpists playing on their harps.
  footnotes:
  - marker: a
    text: Or 'voice' in each occurrence of 'sound'; the Greek word φωνή can mean either, depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Many waters'' is a biblical image for a vast, overwhelming roar; compare Ezekiel 43:2.'
    reason: cross_reference
  - marker: c
    text: The Greek κιθάρα refers to an ancient stringed instrument, closer to a lyre; traditionally rendered 'harp.'
    reason: cultural_note
translation:
  language: ko
  text: 그리고 나는 하늘에서 나는 소리를 들었는데, 그것은 많은 물의 소리 같기도 하고 큰 천둥의 소리 같기도 하였으며, 또 내가 들은 그 소리는 수금 타는 자들이 자기 수금을 타는 소리 같았습니다.
  philosophy: optimal-equivalence
