  rationale: Se corrige la precisión de género en «sus hijos varones» para reflejar mejor וּלְבָנָיו según la auditoría POB; se mejora la frase final a «para servirme como sacerdote» para una finalidad más natural en español; se cambia «cinto» por «faja» para ajustarse mejor a אַבְנֵט como banda textil ceremonial; y se depura la nota del «pectoral» eliminando el anglicismo innecesario.
