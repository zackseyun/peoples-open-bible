translation:
  language: es
  text: No pondré delante de mis ojos ninguna cosa vil[a]; aborrezco la obra de los que se apartan[b]; no se me pegará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ninguna cosa inútil» o «ninguna cosa de Belial». El hebreo בְּלִיָּעַל aquí probablemente significa «inutilidad moral» o «vileza», no un nombre propio.
    reason: lexical_alternative
  - marker: b
    text: O «la obra de los apóstatas» o «la práctica de los perversos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשִׁית
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - poneré
  lexicon: HALOT
  rationale: שׂים en futuro volitivo se expresa con naturalidad en español con «poner»; «pondré» conserva la decisión intencional de fijar algo ante la vista.
- source_word: לְנֶגֶד עֵינַי
  english_pob_choice: before my eyes
  chosen_spanish: delante de mis ojos
  alternatives_spanish:
  - ante mis ojos
  - frente a mis ojos
  lexicon: HALOT
  rationale: La imagen es espacial y concreta. «Delante de mis ojos» mantiene la metáfora visual y la intención moral de colocar algo en el campo de visión.
- source_word: דְּבַר בְּלִיָּעַל
  english_pob_choice: any worthless thing
  chosen_spanish: ninguna cosa vil
  alternatives_spanish:
  - ninguna cosa inútil
  - ninguna cosa perversa
  - ninguna cosa de Belial
  lexicon: HALOT
  rationale: La combinación funciona aquí como sustantivo/adjetivo de vileza o inutilidad moral, no como nombre propio. «Cosa vil» preserva la fuerza ética sin introducir una lectura personificada que el hebreo no exige.
- source_word: עֲשֹׂה סֵטִים
  english_pob_choice: the work of those who turn aside
  chosen_spanish: la obra de los que se apartan
  alternatives_spanish:
  - la acción de los que se desvían
  - las obras de los apóstatas
  - la práctica de los perversos
  lexicon: HALOT
  rationale: El sustantivo verbal עֲשֹׂה se entiende como «obra» y סֵטִים conserva la idea de apartarse/desviarse. «Los que se apartan» respeta la imagen de desviación y evita sobreinterpretar con términos más técnicos.
- source_word: שָׂנֵאתִי
  english_pob_choice: I hate
  chosen_spanish: aborrezco
  alternatives_spanish:
  - odio
  - he aborrecido
  lexicon: HALOT
  rationale: Aunque el perfecto hebreo puede ser estativo o confesional, en español «aborrezco» expresa una postura estable y enfática. Se evita el calco temporal innecesario.
- source_word: לֹא יִדְבַּק בִּי
  english_pob_choice: it will not cling to me
  chosen_spanish: no se pegará a mí
  alternatives_spanish:
  - no se adherirá a mí
  - no se me pegará
  - no se aferrará a mí
  lexicon: HALOT
  rationale: דבק significa adherirse/pegarse. «Se pegará a mí» reproduce la metáfora de algo contaminante que se adhiere y suena natural en español.
theological_decisions:
- issue: Sentido de בליעל
  english_pob_reading: common noun/adjectival sense ('worthless') rather than proper name ('Belial')
  chosen_spanish_reading: cosa vil / vileza moral, no nombre propio
  alternative_spanish_readings:
  - Belial
  - cosa de Belial
  - cosa malvada
  rationale: En este versículo la construcción hebrea describe cualidad moral, no un personaje. Mantener un equivalente común evita importar una personificación posterior y conserva la tensión lexical documentada por la POB inglesa.
  doctrine_reference: Psalm 101:3; lexical note on בליעל
- issue: Valor aspectual de שָׂנֵאתִי
  english_pob_reading: I hate
  chosen_spanish_reading: aborrezco
  alternative_spanish_readings:
  - he odiado
  - odio
  rationale: El perfecto hebreo expresa una disposición asentada del salmista. «Aborrezco» comunica una repulsión continua sin forzar un tiempo compuesto que debilitaría el tono proverbial/decidido del verso.
  doctrine_reference: Psalm 101:3; Hebrew aspect in poetic discourse
translation_notes:
  revision_awareness: Se siguió el análisis del hebreo WLC y el audit trail inglés sin cambios posteriores relevantes; la versión española preserva la tensión lexical de בליעל y la imagen concreta de «pegarse» en יִדְבַּק, con ajuste idiomático natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» o terminología eclesial no pertinente al verso.
  - «Aborrezco» se eligió por tono fuerte y estable, coherente con el perfecto hebreo poético.
  - La nota a pie de página marca explícitamente las alternativas documentadas por la POB inglesa y no introduce lecturas ajenas.
