    text: Or 'happy is the man' or 'fortunate is the man'; the Hebrew beatitude formula denotes an enviable state of blessedness.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' renders a generic singular Hebrew term for a human being or mortal person.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whom God corrects' or 'whom God rebukes.'
    reason: lexical_alternative
  - marker: d
    text: Or 'instruction,' 'correction,' or 'chastening' for 'discipline.'
    reason: lexical_alternative
  - marker: e
    text: Hebrew 'Shaddai,' traditionally rendered 'the Almighty.'
    reason: lexical_alternative
