    rationale: 'El hebreo no dice literalmente que las palabras «no tienen» entendimiento. La nota debe reflejar mejor la construcción alternativa documentada por la POB inglesa: «sus palabras no son con entendimiento» suena rígido, así que en español conviene una opción que señale la literalidad sin introducir una idea distinta.'
