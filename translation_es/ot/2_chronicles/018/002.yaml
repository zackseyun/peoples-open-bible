base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/002.yaml
  text: At the end of some years[a], he went down to Ahab in Samaria, and Ahab slaughtered sheep and cattle in abundance for him and for the people who were with him[b], and persuaded him to go up against Ramoth-gilead.
  footnotes:
  - marker: a
    text: Or 'enticed him' or 'incited him' to go up to Ramoth-gilead.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to Ramoth-gilead'; the sense in context is a military move against the city.
    reason: lexical_alternative
