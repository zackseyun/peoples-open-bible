revisions:
- from: Así hará expiación por el santuario[a] del lugar santo, por la Tienda del Encuentro y por el altar[b]; hará expiación por los sacerdotes y por todo el pueblo de la asamblea.
  to: Así[a] hará expiación por el santuario santo, por la Tienda del Encuentro y por el altar; hará expiación por los sacerdotes y por todo el pueblo de la asamblea[b].
  rationale: Se corrige «el santuario del lugar santo» a «el santuario santo» para reflejar mejor el hebreo y la decisión auditada «the Holy Sanctuary» sin sobreespecificar «lugar santísimo». También se reubica la nota [a] a la expresión verbal inicial, ya que explica כפר y no «santuario». Se elimina el marcador [b] de «altar» y se ancla correctamente a «asamblea», que es donde aplica la alternativa léxica.
