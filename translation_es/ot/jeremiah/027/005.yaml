translation:
  language: es
  text: Yo mismo hice la tierra, la humanidad[a], y los animales que están sobre la faz de la tierra, con mi gran poder y con mi brazo extendido, y la doy a quien es recto a mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el hombre’ o ‘el género humano’; el singular hebreo אָדָם puede funcionar de manera representativa para la raza humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - Yo soy el que
  lexicon: HALOT
  rationale: אָנֹכִי añade énfasis al sujeto verbal; ‘Yo mismo’ conserva esa fuerza enfática en español de manera natural.
- source_word: עָשִׂיתִי
  english_pob_choice: made
  chosen_spanish: hice
  alternatives_spanish:
  - he hecho
  - creé
  lexicon: HALOT
  rationale: עשה puede significar ‘hacer’. ‘Hice’ reproduce el acto en forma simple y evita introducir una terminología de creación más específica que ברא.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el país
  lexicon: HALOT
  rationale: En este contexto cósmico junto con la humanidad y los animales, ‘la tierra’ comunica mejor el alcance general que ‘el país’.
- source_word: הָאָדָם
  english_pob_choice: mankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el hombre
  - el género humano
  lexicon: HALOT
  rationale: El hebreo es singular con valor representativo; en español, ‘la humanidad’ expresa con claridad el sentido genérico sin perder la referencia humana colectiva. Se evita ‘el hombre’ por la posible ambigüedad moderna.
- source_word: הַבְּהֵמָה
  english_pob_choice: the animals
  chosen_spanish: los animales
  alternatives_spanish:
  - las bestias
  - el ganado
  - las bestias domésticas
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo es colectivo y singular en forma, ‘los animales’ es la equivalencia natural y amplia en español para este contexto de creación.
- source_word: אֲשֶׁר עַל־פְּנֵי הָאָרֶץ
  english_pob_choice: that are on the face of the earth
  chosen_spanish: que están sobre la faz de la tierra
  alternatives_spanish:
  - que están sobre la tierra
  - que están en la tierra
  lexicon: HALOT
  rationale: ‘Sobre la faz de la tierra’ conserva el giro idiomático hebreo y mantiene el registro elevado del texto.
- source_word: בְּכֹחִי הַגָּדוֹל
  english_pob_choice: by my great power
  chosen_spanish: con mi gran poder
  alternatives_spanish:
  - por mi gran poder
  - mediante mi gran poder
  lexicon: HALOT
  rationale: El prefijo instrumental puede expresarse naturalmente como ‘con’ en español, sin perder el sentido de medio/agency. ‘Gran poder’ corresponde bien a הַגָּדוֹל.
- source_word: וּבִזְרוֹעִי הַנְּטוּיָה
  english_pob_choice: and by my outstretched arm
  chosen_spanish: y con mi brazo extendido
  alternatives_spanish:
  - y con mi brazo alzado
  - y con mi brazo tendido
  lexicon: HALOT
  rationale: El hebreo usa una imagen antropomórfica estable para el poder divino. ‘Brazo extendido’ reproduce la imagen con naturalidad en español; ‘extendido’ evita una paráfrasis excesiva.
- source_word: וּנְתַתִּיהָ
  english_pob_choice: and I give it
  chosen_spanish: y la doy
  alternatives_spanish:
  - y se la doy
  - y la he dado
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto expresa una prerrogativa soberana vigente; el presente español ‘la doy’ comunica mejor esa autoridad continua que un pasado simple.
- source_word: לַאֲשֶׁר יָשַׁר בְּעֵינַי
  english_pob_choice: to whomever is right in my eyes
  chosen_spanish: a quien es recto ante mis ojos
  alternatives_spanish:
  - a quien me parece bien
  - a quien es justo a mis ojos
  lexicon: HALOT
  rationale: El hebreo idiomático expresa lo que es recto/adecuado desde la perspectiva divina. ‘Recto ante mis ojos’ conserva la fuerza de ‘ante mis ojos’ y evita suavizar el criterio moral del texto.
theological_decisions:
- issue: Rendering of אָדָם in a generic-singular creation statement
  english_pob_reading: mankind
  chosen_spanish_reading: la humanidad
  alternative_spanish_readings:
  - el hombre
  - el género humano
  rationale: 'Aunque el singular hebreo puede funcionar representativamente, en español contemporáneo ‘la humanidad’ comunica con precisión el alcance genérico y evita una lectura exclusivamente masculina. El marco del versículo es universal: tierra, humanidad y animales.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Idiomatic expression יָשַׁר בְּעֵינַי
  english_pob_reading: is right in my eyes
  chosen_spanish_reading: es recto ante mis ojos
  alternative_spanish_readings:
  - es justo a mis ojos
  - me parece bien
  rationale: ‘Recto’ conserva el componente moral de יָשַׁר mejor que un mero ‘me parece bien’. ‘Ante mis ojos’ mantiene el hebraísmo sin oscurecer el sentido.
  doctrine_reference: HALOT entry for יָשַׁר; contextual idiom note
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB: se decidió reflejar el valor genérico de הָאָדָם con ‘la humanidad’ y el matiz moral de יָשַׁר בְּעֵינַי con ‘es recto ante mis ojos’, evitando la alternativa más débil ‘me parece bien’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar solo cuando el hebreo lo exige explícitamente; aquí no aparece el Tetragrámaton, así que no se introduce.
  - Se usa ‘la tierra’ para הָאָרֶץ en armonía con el alcance cósmico del versículo.
  - ‘Brazo extendido’ conserva la imagen bíblica estable sin sustituirla por un equivalente más interpretativo.
  - La puntuación sigue el estilo bíblico en español con coordinación clara y ritmo solemne.
