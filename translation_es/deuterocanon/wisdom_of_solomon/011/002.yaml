translation:
  language: es
  text: Atravesaron una región desierta, inhabitada, y en lugares sin senda levantaron tiendas;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διώδευσαν
  english_pob_choice: They traveled through
  chosen_spanish: Atravesaron
  alternatives_spanish:
  - Viajaron a través de
  - Pasaron por
  lexicon: LSJ
  rationale: El verbo compuesto indica el paso por una región, no solo la llegada. «Atravesaron» conserva el movimiento a través del territorio con naturalidad en español.
- source_word: ἔρημον
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - desierto agreste
  - wilderness
  lexicon: LSJ
  rationale: Aquí ἔρημον puede significar desierto o región desolada. Opto por «desierto» porque en español expresa bien la extensión despoblada; se acompaña de «deshabitado» para evitar restringir indebidamente la imagen a arena o clima específico.
- source_word: ἀοίκητον
  english_pob_choice: uninhabited
  chosen_spanish: deshabitado
  alternatives_spanish:
  - sin habitantes
  - inhabitado
  lexicon: LSJ
  rationale: El adjetivo significa literalmente que no está habitado. «Deshabitado» es natural y fiel; mantiene el carácter vacío de la región sin sonar técnico.
- source_word: ἀβάτοις
  english_pob_choice: trackless places
  chosen_spanish: lugares sin senda
  alternatives_spanish:
  - lugares sin camino
  - parajes sin huella
  - lugares intransitables
  lexicon: LSJ
  rationale: El término puede implicar lugares no transitados o inaccesibles. «Sin senda» conserva la idea de terreno sin camino trazado y evita cargar el texto con una interpretación más fuerte que la del griego.
- source_word: ἔπηξαν
  english_pob_choice: they pitched
  chosen_spanish: levantaron
  alternatives_spanish:
  - plantaron
  - montaron
  - alzaron
  lexicon: LSJ
  rationale: Con σκηνάς, el sentido es establecer tiendas. «Levantaron» es la collocation natural en español y mantiene el acto concreto de instalar campamento.
- source_word: σκηνάς
  english_pob_choice: tents
  chosen_spanish: tiendas
  alternatives_spanish:
  - tiendas de campaña
  - carpas
  - tabernáculos
  lexicon: LSJ
  rationale: El sustantivo se refiere a moradas portátiles de viaje. «Tiendas» es breve y fiel; «tabernáculos» sería engañoso en este contexto.
theological_decisions:
- issue: Imaginería del éxodo sin interpretación añadida
  english_pob_reading: Retain concrete travel language without importing additional theological interpretation.
  chosen_spanish_reading: Mantener el lenguaje concreto del viaje sin añadir una lectura interpretativa sobre el campamento o el desierto.
  alternative_spanish_readings:
  - Se instalaron en el desierto
  - Acamparon en el desierto
  rationale: El griego describe el desplazamiento y el establecimiento de tiendas de manera sobria. «Atravesaron... y... levantaron tiendas» conserva esa sobriedad y evita ampliar el texto más allá de su evidencia lingüística.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No hay notas textuales ni revisiones aplicadas en el expediente inglés; el borrador sigue la lectura acordada de alta concordancia sin introducir variantes adicionales.
  spanish_consistency_notes:
  - Se mantiene un español neutral y litúrgicamente respetable, evitando arcaísmos innecesarios.
  - Se conserva el paralelismo narrativo del griego con dos miembros coordinados por «y».
  - No se usa «tabernáculos» para σκηνάς, porque en español moderno desviaría el sentido hacia terminología cultual.
