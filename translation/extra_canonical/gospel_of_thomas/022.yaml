translation:
  text: Jesus saw some little ones being suckled[a]. He said to his disciples, “These
    little ones who are being suckled are like those who are to enter the Kingdom.”
    They said to him, “Shall we, being little ones, enter the Kingdom?” Jesus said
    to them, “When you make the two one; and when you make the inner like the outer
    and the outer like the inner, and the upper like the lower; and when you make
    the male and the female into a single one, so that the male is not male and the
    female not female; and when you make eyes in the place of an eye, and a hand in
    the place of a hand, and a foot in the place of a foot[h][g][f][e][d][c][b], and
    an image in the place of an image—then you will enter the Kingdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'being suckled' renders ϫⲓⲉⲣⲱⲧⲉ, a specific breastfeeding verb;
      alternatives like 'nursing' are more idiomatic but less specific.
    reason: lexical_alternative
  - marker: b
    text: '''Kingdom'' translates ⲙⲛⲧⲣⲣⲟ, an abstract ''kingship/reign''; Thomas often
      uses it as a locale/state of entry.'
    reason: lexical_alternative
  - marker: c
    text: '''Upper/lower'' translate ⲡϩⲉ/ⲡⲡⲉ; some read these as ''heaven/earth.''
      We avoid canonical coloring here.'
    reason: cross_reference
  - marker: d
    text: '''Back/front'' involves ⲡⲓⲧⲛ (back) and ⲡⲥⲁ (face/side). The Coptic structure
      is elliptical; we supply the natural pairing.'
    reason: dialect_note
  - marker: e
    text: '''Image'' (ϩⲓⲕⲱⲛ) could be rendered ''icon'' given the Greek loanword;
      ''image'' is broader and more transparent.'
    reason: lexical_alternative
  - marker: f
    text: End-of-saying 'Kingdom' is restored from Dilley’s normalized reading; the
      codex line shows minor damage.
    reason: lacuna_or_restoration
  - marker: g
    text: Or 'and the upper like the lower, and the back like the front;'.
    reason: previous_rendering
  - marker: h
    text: Or 'Are we to become little ones, so that we may enter the Kingdom?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲕⲟⲩⲓ
  chosen: little ones
  alternatives:
  - infants
  - children
  - babies
  lexicon: Crum, Coptic Dictionary s.v. ⲕⲟⲩⲓ
  rationale: Crum notes ⲕⲟⲩⲓ as 'small, little'; context of suckling suggests infants,
    but Thomas’s diction often uses 'little ones'—we preserve the strangeness and
    inclusivity.
- source_word: ⲧⲟⲟⲩϫⲓⲉⲣⲱⲧⲉ
  chosen: being suckled
  alternatives:
  - being breast-fed
  - nursing
  lexicon: Crum s.v. ϫⲓⲉⲣⲱⲧⲉ
  rationale: Verbal-nominal construction describing infants feeding at the breast;
    'being suckled' captures passive aspect and ancient setting without modern smoothing.
- source_word: ⲛⲧⲟⲟⲩⲧⲟⲛⲧⲛ
  chosen: like those
  alternatives:
  - as those
  - equal to those
  lexicon: Layton, Coptic Grammar (usage of ⲛⲧⲟⲟⲩⲧⲟⲛ as 'like')
  rationale: Comparative 'like' in Thomas; plural suffix marks the group 'those' entering
    the Kingdom.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: Kingdom
  alternatives:
  - kingship
  - royal rule
  - reign
  lexicon: Crum s.v. ⲙⲛⲧⲣⲣⲟ; Lambdin, Introduction to Sahidic Coptic (abstract nouns)
  rationale: Although the term is an abstract 'kingship,' Thomas consistently uses
    it in the eschatological/ontological sense. 'Kingdom' is idiomatic in English
    while retaining formal sense.
- source_word: ⲁⲛⲟⲛⲛⲁⲃⲱⲕ
  chosen: we may enter
  alternatives:
  - shall we go in
  - are we to enter
  lexicon: Lambdin (modal future with ⲛⲁ + infinitive); Crum s.v. ⲃⲱⲕ
  rationale: The disciples’ question uses futurity/purpose nuance; 'may enter' balances
    modality and impending action.
- source_word: ⲡⲥⲛⲁⲩ ⲟⲩⲁ
  chosen: make the two one
  alternatives:
  - unify the two
  - turn the two into one
  lexicon: Layton (construction with ⲡⲥⲛⲁⲩ 'two' + ⲟⲩⲁ 'one')
  rationale: Thomas’s hallmark phrase; keep concise, imperative flavor in temporal
    clause ('when you make').
- source_word: ⲛϩⲟⲩⲛ / ⲛⲃⲟⲗ
  chosen: inner / outer
  alternatives:
  - inside / outside
  lexicon: Crum s.v. ϩⲟⲩⲛ; s.v. ⲃⲟⲗ
  rationale: Locatives used adverbially; 'inner/outer' preserves Thomas’s striking
    antithesis with minimal smoothing.
- source_word: ⲡϩⲉ / ⲡⲡⲉ
  chosen: upper / lower
  alternatives:
  - heaven / the below
  - above / below
