- from: He aquí[a] que he hecho tu rostro fuerte frente a sus rostros, y tu frente fuerte frente a sus frentes.
  to: He aquí[a] que he hecho tu rostro firme ante sus rostros, y tu frente firme ante sus frentes.
  rationale: Revisión menor para mejorar la naturalidad y la legibilidad del español sin alterar el sentido fuente ni la rationale del POB. «Firme» expresa mejor la firmeza otorgada por Dios en contexto de oposición, y «ante» evita una repetición dura de «frente» como sustantivo y preposición en la segunda cláusula.
