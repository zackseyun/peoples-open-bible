id: GEN.42.36
reference: Genesis 42:36
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ יַעֲקֹ֣ב אֲבִי/הֶ֔ם אֹתִ֖/י שִׁכַּלְתֶּ֑ם יוֹסֵ֤ף אֵינֶ֨/נּוּ֙ וְ/שִׁמְע֣וֹן אֵינֶ֔/נּוּ וְ/אֶת בִּנְיָמִ֣ן תִּקָּ֔חוּ עָלַ֖/י הָי֥וּ כֻלָּֽ/נָה־׃
translation:
  text: 'And Jacob their father said to them[a], “You have bereaved me: Joseph is no more, and Simeon is no more, and you would take Benjamin[b]. All these things have come against me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You have made me childless.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'All of them are against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁכַּלְתֶּם
  lemma: שׁכל
  chosen: have bereaved me of my children
  alternatives:
  - have made me childless
  - have deprived me of my children
  lexicon: HALOT
  rationale: The verb שׁכל in the Piel conveys causing bereavement or making childless. 'Bereaved me of my children' preserves the emotional force and the object 'me' plus the implied loss of sons better than the flatter 'deprived me.'
- source_word: אֵינֶנּוּ
  chosen: is no more
  alternatives:
  - is not
  - is gone
  lexicon: HALOT
  rationale: The idiom here expresses absence/loss, not mere existential negation. 'Is no more' is natural English and fits Jacob's lament over Joseph and Simeon.
- source_word: תִּקָּחוּ
  chosen: you would take
  alternatives:
  - you will take
  - you are taking
  lexicon: HALOT
  rationale: Although morphologically imperfect, in this context it expresses intended action from Jacob's perspective. 'Would take' captures his protest and impending proposal more idiomatically than a simple future.
- source_word: עָלַי הָיוּ כֻלָּנָה
  chosen: All these things have come against me
  alternatives:
  - All of them are against me
  - They have all happened to me
  lexicon: HALOT
  rationale: The phrase conveys that these events have turned against Jacob or fallen upon him adversely. 'Have come against me' preserves both the cumulative sense and the adversative force of עָלַי better than the more static 'are against me.'
- source_word: אֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Retained explicitly in English because the Hebrew fronting emphasizes Jacob as the one suffering the bereavement.
- source_word: יַעֲקֹב אֲבִיהֶם
  chosen: Jacob their father
  alternatives:
  - their father Jacob
  lexicon: HALOT
  rationale: Both are possible in English; 'Jacob their father' follows the Hebrew order smoothly without awkwardness.
