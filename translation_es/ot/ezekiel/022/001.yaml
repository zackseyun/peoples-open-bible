lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: En la fórmula profética hebrea, וַיְהִי introduce la secuencia narrativa. En español, 'Y vino' reproduce de forma natural y fiel la llegada de la palabra sin recurrir a un giro más pesado como 'sucedió'. The English audit trail uses a natural prophetic formula rather than a wooden equivalent, and Spanish can do the same.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: HALOT
  rationale: En la construcción דְבַר יְהוָה, 'la palabra' es la correspondencia más directa y estable para la revelación profética. 'Mensaje' es posible, pero debilita la fórmula tradicional y el vínculo con el hebreo constructo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' conforme al criterio del proyecto para preservar el nombre divino. 'SEÑOR' ocultaría el nombre propio; 'Jehová' no refleja la forma adoptada en la política terminológica del POB en español.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa dirección hacia el profeta. 'A mí' es la opción natural y clara en español; 'hacia mí' añade matiz innecesario.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso directo siguiente. 'Diciendo' conserva la fórmula profética de manera directa y plenamente inteligible en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura acordada en la fuente inglesa es la transliteración del nombre divino, no una sustitución titulativa. En español, 'Yahvé' mantiene esa decisión y evita borrar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando una sola nota al pie, anclada exactamente en el texto con [a], y se evitó crear marcadores no presentes en la traducción.
  spanish_consistency_notes:
  - Se mantiene el orden natural del español sin perder la fórmula profética hebrea.
  - '''Yahvé'' se usa de forma consistente con la terminología del proyecto para el nombre divino.'
  - No se introducen notas sin anclaje textual; el único marcador [a] aparece en 'vino[a]' y está explicado en la nota.
