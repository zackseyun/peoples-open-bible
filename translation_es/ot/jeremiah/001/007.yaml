translation:
  language: es
  text: 'Pero Yahvé me dijo: «No digas: “Soy joven[a]”, porque a todo lo que yo te envíe[b], irás, y todo lo que yo te mande, hablarás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Soy un joven», «Soy un muchacho». El hebreo נַעַר puede denotar distintos grados de juventud o inexperiencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «adondequiera que yo te envíe, irás». La expresión hebrea también puede entenderse en un sentido más general, refiriéndose a todo destino o encargo al que Yahvé envía a Jeremías.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms / proyecto POB
  rationale: El texto hebreo usa el nombre divino directo, no un sustituto. En español, el proyecto pide 'Yahvé' como forma principal para יְהוָה, preservando el nombre del pacto sin esconderlo bajo una convención editorial.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - dijo
  lexicon: HALOT אמר
  rationale: El hebreo introduce discurso directo narrativo. 'Me dijo' es natural en español y conserva la relación personal del destinatario del mensaje.
- source_word: נַעַר
  english_pob_choice: youth
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un muchacho joven
  - un niño
  lexicon: HALOT נַעַר
  rationale: El rango semántico de נַעַר incluye juventud e inexperiencia. 'Un joven' comunica bien la objeción de Jeremías sin forzar una edad más baja o un matiz demasiado coloquial.
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No andes diciendo
  - No digas nunca
  lexicon: HALOT + prohibición con אַל
  rationale: La prohibición se expresa de manera directa y breve en español. 'No digas' conserva la fuerza imperativa del hebreo sin añadir énfasis no documentado.
- source_word: כִּי עַל כָּל אֲשֶׁר אֶשְׁלָחֲךָ תֵּלֵךְ
  english_pob_choice: for to all to whom I send you, you shall go
  chosen_spanish: porque a todo aquel a quien yo te envíe, irás
  alternatives_spanish:
  - porque dondequiera que yo te envíe, irás
  - porque a todo lugar adonde yo te envíe, irás
  lexicon: HALOT על + אשר + שלח
  rationale: La construcción hebrea puede entenderse como personas, destinos o comisiones. El español 'a todo aquel a quien yo te envíe' sigue de cerca la relación sintáctica y mantiene la amplitud semántica sin reducirla solo a lugares.
- source_word: תֵּלֵךְ
  english_pob_choice: you shall go
  chosen_spanish: irás
  alternatives_spanish:
  - te irás
  - deberás ir
  lexicon: HALOT הלך
  rationale: El imperfecto en este contexto funciona como consecuencia/mandato de la comisión. 'Irás' conserva la forma sucinta y solemne del hebreo mejor que una perífrasis.
- source_word: וְאֵת כָּל אֲשֶׁר אֲצַוְּךָ תְּדַבֵּר
  english_pob_choice: and all that I command you, you shall speak
  chosen_spanish: y todo lo que yo te mande, hablarás
  alternatives_spanish:
  - y todo cuanto yo te ordene, lo dirás
  - y todo lo que yo te mande, lo hablarás
  lexicon: HALOT צוה + דבר
  rationale: צוה se rinde mejor como 'mandar' en un contexto de comisión profética. דּבר en piel aquí significa 'hablar'. El español conserva el paralelismo breve 'irás / hablarás' y evita añadir un objeto explícito innecesario.
- source_word: רצף הדיבור כולו
  english_pob_choice: But Yahweh said to me...
  chosen_spanish: Pero Yahvé me dijo...
  alternatives_spanish:
  - Y Yahvé me dijo...
  - Entonces Yahvé me dijo...
  lexicon: Discourse context / narrative contrast
  rationale: '''Pero'' refleja el contraste con la objeción inmediata de Jeremías en el contexto anterior, siguiendo la lectura discursiva del audit trail inglés. Mantiene fluidez sin alterar el contenido.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en vez del sustituto litúrgico, de acuerdo con la decisión del proyecto POB para el Tetragrámaton. 'Yahvé' es la forma española estable en este marco editorial y evita ocultar el nombre divino del texto fuente.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El audit trail inglés eliminó ''only'' de una versión previa porque no estaba en el hebreo. La versión española evita cualquier equivalente de ''only'' y conserva el enunciado simple: ''Soy un joven''. También sigue la revisión que prefirió una formulación más sobria para la comisión: ir/speaking sin añadidos interpretativos.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - 'Se mantuvo el paralelismo verbal breve del hebreo: ''irás'' / ''hablarás''.'
  - '''Mandar'' se empleó para צוה por su fuerza normativa y su naturalidad en español bíblico contemporáneo.'
  - No se añadió 'solo' ni otro intensificador no presente en el hebreo.
  - Las comillas y la puntuación siguen el estilo español moderno con discurso directo claro.
