revisions:
- from: 'Y el rey volvió del jardín del palacio a la casa del banquete del vino, y Amán estaba caído sobre el diván donde estaba Ester. Entonces dijo el rey: «¿También va a violentar[a] a la reina en mi presencia, en la casa?» Apenas salió la palabra de la boca del rey, cubrieron el rostro de Amán.'
  to: 'Y el rey volvió del jardín del palacio a la casa del banquete del vino, y Amán había caído sobre el diván donde estaba Ester. Entonces dijo el rey: «¿También va a violentar[a] a la reina mientras yo estoy en la casa?» Apenas salió la palabra de la boca del rey[b], cubrieron el rostro de Amán.'
  rationale: 'Se ajusta la sintaxis al sentido del hebreo y a un español más natural: «había caído» reemplaza la expresión poco idiomática «estaba caído», y «mientras yo estoy en la casa» refleja con fidelidad עִמִּי בַּבָּיִת sin añadir el matiz extra de «en mi presencia». Se conserva «violentar» con nota alternativa porque mantiene la gravedad de la acusación sin fijar en exceso el verbo, y se repone la nota cultural documentada sobre cubrir el rostro de Amán.'
  reviewer_model: gpt-5.4
