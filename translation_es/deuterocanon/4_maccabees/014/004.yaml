translation:
  language: es
  text: Ninguno de los siete jóvenes se volvió cobarde[a], ni retrocedieron ante la muerte;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa un verbo singular en la segunda cláusula, literalmente: ''ni retrocedió ante la muerte''; la idea es distributiva: ni uno de ellos se echó atrás.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: none
  chosen_spanish: ninguno
  alternatives_spanish:
  - nadie
  - ninguno de ellos
  lexicon: LSJ
  rationale: En una construcción partitiva con ἐκ, 'ninguno' reproduce bien la negación total sin sonar forzado en español.
- source_word: ἐκ τῶν ἑπτὰ μειρακίων
  english_pob_choice: of the seven young men
  chosen_spanish: de los siete jóvenes
  alternatives_spanish:
  - de entre los siete jóvenes
  - de los siete muchachos
  lexicon: LSJ
  rationale: μειράκιον designa a un joven varón; 'jóvenes' conserva la referencia masculina sin el matiz infantil de 'muchachos'.
- source_word: ἐδειλίασεν
  english_pob_choice: became cowardly
  chosen_spanish: se volvió cobarde
  alternatives_spanish:
  - actuó cobardemente
  - perdió el valor
  - tuvo miedo
  lexicon: LSJ
  rationale: El verbo expresa no solo miedo, sino cobardía moral; 'se volvió cobarde' mantiene ese matiz.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni tampoco
  alternatives_spanish:
  - ni
  - y no
  lexicon: LSJ
  rationale: '''Ni tampoco'' enlaza con naturalidad la segunda negación y conserva el énfasis coordinativo del griego.'
- source_word: πρὸς τὸν θάνατον
  english_pob_choice: from death
  chosen_spanish: ante la muerte
  alternatives_spanish:
  - frente a la muerte
  - de la muerte
  - ante la muerte
  lexicon: LSJ
  rationale: Con ὀκνέω, la preposición expresa la relación con la muerte como objeto de retroceso o vacilación; 'ante la muerte' comunica bien ese contexto.
- source_word: ὤκνησεν
  english_pob_choice: shrink back
  chosen_spanish: retrocedió
  alternatives_spanish:
  - vaciló
  - se echó atrás
  - reculó
  lexicon: LSJ
  rationale: '''Retrocedió'' conserva la imagen de dar un paso atrás o rehuir, apropiada para el contexto martirial y natural en español.'
theological_decisions:
- issue: Sujeto colectivo y verbo singular/plural implícito
  english_pob_reading: English audit trail first rendered the second clause with singular 'he' to reflect the Greek distributive singular, then revised to plural 'they' for agreement with the plural subject.
  chosen_spanish_reading: 'Se usa un plural coordinado natural en español: ''ni tampoco retrocedió'' mantiene el valor distributivo dentro de una redacción fluida.'
  alternative_spanish_readings:
  - ni tampoco retrocedió
  - ni tampoco retrocedieron
  rationale: El español exige decidir entre transparencia formal y concordancia idiomática. Aquí la formulación con sujeto plural y verbo en singular en la segunda cláusula no sería natural; la traducción conserva el sentido distributivo sin hacer visible una discordancia innecesaria.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto inglés del expediente fue revisado desde una formulación con singular distributivo en la segunda cláusula a una con plural por concordancia. La presente redacción española opta por una solución idiomática que mantiene la fuerza distributiva del griego sin reproducir una discordancia poco natural.
  spanish_consistency_notes:
  - Se mantuvo 'jóvenes' para μειράκιον, evitando 'muchachos' por su posible tono infantil.
  - '''Cobarde'' conserva la carga moral del verbo griego mejor que un simple ''asustado''.'
  - '''Ante la muerte'' y ''retrocedió'' juntos reproducen la idea de rehuir o vacilar frente a la muerte sin sobrecargar la sintaxis.'
