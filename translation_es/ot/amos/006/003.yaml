    issue: '''el asiento de violencia'' es poco natural en español'
    rationale: Aunque intenta reflejar 'seat', en español contemporáneo y eclesial 'asiento' se entiende primero como silla o lugar para sentarse, no como sede o asiento de poder. Esto debilita legibilidad y puede distraer del sentido profético.
  - severity: low
    issue: La nota b no ofrece una alternativa genuina
    rationale: 'Dice ''O: «el asiento de violencia», es decir...'' cuando ''el asiento de violencia'' ya es el texto principal. La nota debería listar alternativas reales como ''el trono'' o ''el reinado de violencia''.'
