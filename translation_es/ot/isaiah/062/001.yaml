translation:
  language: es
  text: Por amor a Sión no callaré[a], y por amor a Jerusalén no estaré quieto[c][b], hasta que su justicia[d] salga como resplandor, y su salvación arda como una antorcha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no guardaré silencio’. El hebreo puede significar callar o guardar silencio.
    reason: lexical_alternative
  - marker: b
    text: O ‘no reposaré’. El hebreo de este verbo puede implicar estar quieto, estar en calma o descansar; aquí el paralelismo favorece la idea de no cesar.
    reason: lexical_alternative
  - marker: c
    text: El hablante no se identifica explícitamente en este versículo; los intérpretes difieren sobre si habla el profeta, Yahvé u otra voz representativa.
    reason: alternative_reading
  - marker: d
    text: O ‘su vindicación’. En este contexto, el hebreo puede referirse a justicia en sentido moral y de pacto, o a la vindicación pública de Sión.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: for … sake
  chosen_spanish: por amor a
  alternatives_spanish:
  - por causa de
  - por el bien de
  lexicon: HALOT
  rationale: Expresa bien la motivación o razón a favor de Sión y Jerusalén sin sonar forzado en español. Conserva el paralelismo y la fuerza idiomática del hebreo mejor que una construcción demasiado literal.
- source_word: אֶחֱשֶׁה
  english_pob_choice: I will not keep silent
  chosen_spanish: no callaré
  alternatives_spanish:
  - no guardaré silencio
  - no me callaré
  lexicon: HALOT
  rationale: ‘Callar’ comunica de manera natural la idea de no guardar silencio y mantiene el futuro volitivo. ‘No guardaré silencio’ es válido, pero ‘no callaré’ resulta más directo y fluido en español.
- source_word: אֶשְׁקֹט
  english_pob_choice: I will not be quiet
  chosen_spanish: no estaré quieto
  alternatives_spanish:
  - no me aquietaré
  - no reposaré
  lexicon: HALOT
  rationale: La raíz puede abarcar quietud, calma o reposo. Se eligió ‘no estaré quieto’ para conservar el paralelismo con ‘no callaré’ y la idea de persistencia. ‘No reposaré’ inclinaría el sentido hacia descanso/fatiga, como advierte la POB inglesa.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: HALOT
  rationale: Marca con claridad la persistencia temporal hasta el evento descrito.
- source_word: יֵצֵא
  english_pob_choice: goes out
  chosen_spanish: salga
  alternatives_spanish:
  - saldrá
  - salga afuera
  - aparezca
  lexicon: HALOT
  rationale: En español, el subjuntivo tras ‘hasta que’ expresa bien la acción esperada futura. ‘Salir’ reproduce de forma sobria el movimiento hacia la manifestación pública.
- source_word: כַנֹּגַהּ
  english_pob_choice: like brightness
  chosen_spanish: como resplandor
  alternatives_spanish:
  - como brillo
  - como luz radiante
  - como aurora
  lexicon: HALOT
  rationale: ‘Resplandor’ transmite la cualidad luminosa sin especificar innecesariamente ‘aurora’, que sería más concreta de lo que permite el hebreo. Mantiene una imagen vívida y sobria.
- source_word: צִדְקָהּ
  english_pob_choice: her righteousness
  chosen_spanish: su justicia[c]
  alternatives_spanish:
  - su justicia y rectitud
  - su vindicación
  - su rectitud
  lexicon: HALOT
  rationale: En este contexto profético, צדקה puede abarcar justicia y vindicación pública. Se eligió ‘justicia’ como término base en español por su amplitud bíblica, dejando nota de la alternativa de vindicación.
- source_word: וִישׁוּעָתָהּ
  english_pob_choice: and her salvation
  chosen_spanish: y su salvación
  alternatives_spanish:
  - y su liberación
  - y su rescate
  lexicon: HALOT
  rationale: ‘Salvación’ preserva la amplitud teológica del término hebreo y encaja con el paralelismo del verso. ‘Liberación’ o ‘rescate’ enfatizan solo un aspecto de la idea.
- source_word: כְלַפִּיד
  english_pob_choice: like a torch
  chosen_spanish: como una antorcha
  alternatives_spanish:
  - como una tea
  - como una antorcha encendida
  lexicon: HALOT
  rationale: ‘Antorcha’ reproduce bien el objeto de luz pública y ardiente del hebreo. ‘Tea’ es posible, pero menos neutral y menos clara para lectores amplios.
- source_word: יִבְעָר
  english_pob_choice: burns
  chosen_spanish: arda
  alternatives_spanish:
  - arde
  - quemará
  - estalle en llamas
  lexicon: HALOT
  rationale: Tras ‘como una antorcha’, el subjuntivo ‘arda’ suena natural en español y conserva la imagen de combustión intensa sin exagerarla.
theological_decisions:
- issue: Identidad del hablante en primera persona
  english_pob_reading: Left implicit as in the Hebrew; no explicit identification inserted into the translation.
  chosen_spanish_reading: Se deja implícito, sin identificar al hablante.
  alternative_spanish_readings:
  - ‘yo’ explícito con una identificación interpretativa del hablante
  - atribuir la voz al profeta
  - atribuir la voz a Yahvé
  rationale: El hebreo no nombra al hablante en este versículo. Para preservar la tensión teológica y no resolver una cuestión interpretativa, la traducción mantiene la primera persona sin añadir identificación.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de צִדְקָהּ en contexto profético
  english_pob_reading: ‘her righteousness’ with possible nuance of ‘vindication’
  chosen_spanish_reading: ‘su justicia’ con posible matiz de vindicación pública
  alternative_spanish_readings:
  - su vindicación
  - su rectitud
  rationale: El término puede referirse tanto a justicia como a vindicación. En español, ‘justicia’ conserva mejor la amplitud bíblica y permite que la nota explique la alternativa sin cerrar el sentido.
  doctrine_reference: Lexical decision on צדקה in prophetic restoration contexts
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del borrador inglés sin cambios sustantivos: el texto conserva la primera persona implícita, el paralelismo entre silencio y quietud, y la ambigüedad productiva de צדקה entre justicia y vindicación. No se introdujeron elementos no atestiguados por el hebreo ni por el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto solo cuando el nombre divino aparece explícitamente; este versículo no lo contiene.
  - Se prefirió ‘justicia’ como término base para צדקה, con nota de la alternativa ‘vindicación’, siguiendo la tensión documentada en la POB inglesa.
  - ‘Antorcha’ mantiene un registro bíblico claro y común para lectores hispanohablantes.
  - Se evitó traducir אֶשְׁקֹט como ‘reposaré’ para no desplazar indebidamente el matiz hacia descanso físico.
  - La puntuación y el paralelismo respetan la estructura poética del hebreo.
