translation:
  language: es
  text: 'Mira: no pone confianza en sus siervos, y a sus mensajeros[a] les atribuye error[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus ángeles». La palabra hebrea puede referirse tanto a mensajeros humanos como celestiales; en este contexto, probablemente apunta a seres celestiales.'
    reason: alternative_reading
  - marker: b
    text: 'O: «necedad», «falta» o «imperfección» para «error».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: El hebreo introduce una afirmación enfática y de llamado a la atención. "Mira" conserva ese impulso exclamativo en un español natural y digno, sin volver arcaica la frase con "He aquí".
- source_word: בַּעֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aunque עבדים puede significar "esclavos", aquí el contexto de relación subordinada en la esfera de Dios favorece un término más natural en español eclesial. "Siervos" mantiene la idea de dependencia sin cargar innecesariamente el matiz social de esclavitud.
- source_word: לֹא יַאֲמִין
  english_pob_choice: he puts no trust
  chosen_spanish: no pone confianza
  alternatives_spanish:
  - no confía
  - no cree
  - no deposita confianza
  lexicon: HALOT
  rationale: El hiphil de אמן expresa confianza, no mera creencia intelectual. "No pone confianza" reproduce bien la fuerza relacional e idiomática del hebreo y sigue de cerca la decisión inglesa de "puts no trust".
- source_word: וּבְמַלְאָכָיו
  english_pob_choice: his messengers
  chosen_spanish: sus mensajeros
  alternatives_spanish:
  - sus ángeles
  lexicon: HALOT
  rationale: El lexema מלאך significa básicamente "mensajero" y puede abarcar seres humanos o celestiales. "Mensajeros" conserva esa amplitud lexical; la lectura específica "ángeles" se reserva para nota, como en el auditable POB inglés.
- source_word: יָשִׂים
  english_pob_choice: he charges
  chosen_spanish: les atribuye
  alternatives_spanish:
  - les adjudica
  - les imputa
  - les pone
  lexicon: HALOT
  rationale: La construcción con שׂים y un sustantivo abstracto tiene el sentido de atribuir o poner algo en la cuenta de alguien. "Les atribuye" expresa bien esa imputación de una cualidad negativa.
- source_word: תָּהֳלָה
  english_pob_choice: error
  chosen_spanish: error
  alternatives_spanish:
  - necedad
  - falta
  - imperfección
  lexicon: HALOT
  rationale: El sustantivo es raro y admite varios matices. "Error" es el equivalente más claro y sobrio en español, y preserva la tensión de que aun los mensajeros de Dios no están libres de defecto frente a él.
theological_decisions:
- issue: אם / האם מלאכיו debe entenderse como mensajeros humanos o como ángeles
  english_pob_reading: messengers, with a footnote noting that 'angels' is likely in context
  chosen_spanish_reading: mensajeros, con nota que señala que 'ángeles' es probablemente el referente contextual
  alternative_spanish_readings:
  - ángeles
  - mensajeros humanos
  rationale: La prioridad es no cerrar el rango semántico de מלאך más allá de lo que exige el hebreo. En este contexto poético, la referencia probablemente es a seres celestiales, pero la traducción principal mantiene el término más amplio y deja la precisión interpretativa en la nota.
  doctrine_reference: Preservar la tensión lexical y teológica; primacía del hebreo sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto del audit trail inglés y no introduce revisiones nuevas; se mantiene la ambigüedad de מלאך y la rareza semántica de תָּהֳלָה mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo porque el texto hebreo no contiene el tetragrámaton.
  - Se evita «SEÑOR» como máscara y se conserva la distinción entre confianza relacional y creencia intelectual.
  - «Siervos» se adopta por coherencia con el contexto divino y la decisión inglesa de evitar una traducción socialmente más cargada como «esclavos».
  - La puntuación reproduce una exclamación inicial equivalente a הֵן y mantiene paralelismo sintáctico en español.
