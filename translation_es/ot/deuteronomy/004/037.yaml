    text: O «a su descendencia después de él». El hebreo usa sufijos singulares, probablemente tratando «tus padres» como un colectivo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por su rostro» o «delante de él»; aquí la expresión comunica la presencia misma de Dios en la liberación.
    reason: lexical_alternative
