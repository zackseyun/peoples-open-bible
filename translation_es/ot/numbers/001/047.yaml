translation:
  language: es
  text: Pero los levitas, según la tribu de sus padres[a], no fueron contados[b] entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «conforme a la tribu de sus padres».
    reason: lexical_alternative
  - marker: b
    text: O «no fueron registrados» o «no fueron alistados» entre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: But the Levites
  chosen_spanish: Pero los levitas
  alternatives_spanish:
  - Y los levitas
  - Ahora bien, los levitas
  lexicon: HALOT
  rationale: El וְ inicial es adversativo por el contraste con el censo de las demás tribus; en español, 'Pero' comunica mejor ese giro. 'Levitas' es el nombre tribal estándar y natural en español.
- source_word: לְמַטֵּה אֲבֹתָם
  english_pob_choice: by their fathers' tribe
  chosen_spanish: según la tribu de sus padres
  alternatives_spanish:
  - conforme a la tribu de sus padres
  - según la tribu ancestral de ellos
  lexicon: HALOT
  rationale: מַטֶּה en este contexto censal significa 'tribu'. La expresión de 'sus padres' conserva la referencia a la línea paterna/ancestral sin volver la frase artificial en español.
- source_word: לֹא הָתְפָּקְדוּ
  english_pob_choice: were not counted
  chosen_spanish: no fueron contados
  alternatives_spanish:
  - no fueron registrados
  - no fueron musteados
  lexicon: HALOT
  rationale: El hitpael de פקד en contexto de censo indica inclusión en un conteo oficial. 'No fueron contados' es fiel, claro y mantiene el valor censal inmediato.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  lexicon: HALOT
  rationale: La idea es de inclusión dentro del grupo contado; 'entre ellos' expresa bien esa pertenencia al conjunto en español actual.
translation_notes:
  revision_awareness: El texto inglés POB revisó 'ancestral tribe' a 'fathers' tribe' para reflejar más directamente la estructura hebrea paterna/ancestral; la versión española sigue esa revisión con 'la tribu de sus padres' para mantener la cercanía al hebreo y la naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene 'levitas' como nombre tribal estándar.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - '''Contados'' preserva el marco censal del capítulo sin añadir connotaciones ajenas.'
