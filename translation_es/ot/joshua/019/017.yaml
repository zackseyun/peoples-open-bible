translation:
  language: es
  text: Para Isacar[a], salió la cuarta suerte, para los hijos de Isacar, según sus clanes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para los descendientes de Isacar». El hebreo dice literalmente «para los hijos de Isacar», una expresión tribal estándar de descendencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «según sus familias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְיִשָּׂשכָר
  english_pob_choice: For Issachar
  chosen_spanish: Para Isacar
  alternatives_spanish:
  - A Isacar
  - En favor de Isacar
  lexicon: HALOT
  rationale: El ל prefijado marca al destinatario o asignado de la suerte. «Para Isacar» conserva ese valor distributivo en español y encaja de forma natural en el contexto del reparto de la tierra.
- source_word: יָצָא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino a salir
  - fue sacada
  lexicon: HALOT
  rationale: En el contexto de echar suertes, el verbo expresa que la suerte «salió». «Salió» mantiene la imagen del texto hebreo sin introducir una interpretación ajena.
- source_word: הַגּוֹרָל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - porción
  lexicon: HALOT
  rationale: En español bíblico, «suerte» reproduce bien el instrumento/resultado del sorteo. También evita que «lote» suene demasiado técnico o material en este contexto de distribución tribal.
- source_word: הָרְבִיעִי
  english_pob_choice: the fourth
  chosen_spanish: la cuarta
  alternatives_spanish:
  - el cuarto
  lexicon: HALOT
  rationale: El hebreo usa el ordinal con artículo; en español, «la cuarta» concuerda naturalmente con «suerte» y conserva el orden secuencial del reparto.
- source_word: לִבְנֵי יִשָּׂשכָר
  english_pob_choice: for the sons of Issachar
  chosen_spanish: para los hijos de Isacar
  alternatives_spanish:
  - para los descendientes de Isacar
  - para el pueblo de Isacar
  lexicon: HALOT
  rationale: «Hijos de» refleja con precisión בני como expresión de descendencia tribal. Se evita neutralizar el lenguaje genealógico del hebreo, pero en español se mantiene claro y legible.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contextos de reparto tribal, מִשְׁפָּחוֹת denota subdivisiones internas de la tribu; «clanes» preserva mejor esa estructura que «familias», que en español puede sonar más amplia o doméstica.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail en inglés POB. No se aplicaron revisiones textuales ni cambios de sentido; se conservó la imagen del sorteo y el lenguaje de descendencia tribal.
  spanish_consistency_notes:
  - Se mantuvo «Isacar» para el nombre tribal, en consonancia con la forma castellana estándar del nombre bíblico.
  - Se prefirió «suerte» para גּוֹרָל por ser la opción más transparente en castellano bíblico y coherente con la escena del reparto por sorteo.
  - «Clanes» se usó de manera consistente con la terminología tribal de POB para מִשְׁפְּחוֹת en contextos de herencia y distribución.
