review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: David llega a saber algo, Saul está tramando hostilidad contra él, y David ordena a Abiatar traer el efod. También preserva correctamente la nota alternativa sobre מַחֲרִישׁ הָרָעָה y la nota cultural sobre el efod.'
  spanish_quality_summary: La traducción es clara y fiel, pero la colocación adverbial «estaba secretamente tramando» suena menos natural en español que «estaba tramando en secreto». Además, en la nota cultural suena más idiomático «para buscar orientación de Dios» que «asociado con buscar orientación de Dios».
  glossary_alignment: No hay términos del glosario mayor en juego salvo «Dios», que está bien en la nota. «Efod» conserva adecuadamente el término técnico auditado. «Abiatar», «sacerdote», «daño» y «contra él» están bien alineados con la evidencia y con el razonamiento léxico documentado.
  issues:
  - severity: medium
    issue: Colocación poco natural en «estaba secretamente tramando»
    rationale: Aunque es comprensible y fiel, en español natural y digno suena mejor «estaba tramando en secreto», que conserva tanto el matiz conspirativo como el de secreto documentado para מַחֲרִישׁ.
  - severity: low
    issue: Redacción algo forzada en la nota cultural
    rationale: «Asociado con buscar orientación de Dios» es entendible, pero «asociado con la búsqueda de orientación de Dios» o «utilizado para buscar orientación de Dios» resulta más idiomático en español.
  revised_spanish_text: 'Cuando David supo que Saúl estaba tramando en secreto daño contra él[a], dijo a Abiatar el sacerdote[b]: «Trae aquí el efod».'
  revised_footnotes:
  - marker: a
    text: O «estaba maquinando daño contra él».
    reason: alternative_reading
  - marker: b
    text: El efod era un objeto sacerdotal asociado con la búsqueda de orientación de Dios en este contexto narrativo.
    reason: cultural_note
  revision_rationale: Se propone una reparación menor de estilo para lograr un español más natural sin alterar el sentido fuente ni las decisiones léxicas auditadas. «Tramando en secreto» expresa mejor el valor del participio hebreo con matiz de conspiración secreta, y la nota sobre el efod se ajusta a una redacción más idiomática.
