review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: el hijo maltrata gravemente al padre, hace huir/aleja a la madre, y queda caracterizado como un hijo que causa vergüenza y reproche. Sin embargo, «acarrea oprobio» introduce una nominalización algo más interpretativa que la pareja verbal-participial hebrea y se aleja del inglés auditado, que finalmente fijó «reproach».'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y paralelismo semántico. «Avergüenza y acarrea oprobio» mezcla un verbo directo con una perífrasis menos compacta. «Causa vergüenza y reproche» suena más proverbial, mantiene el paralelismo y evita una leve rigidez. El resto del verso está bien logrado.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «arruina», «ahuyenta», «su padre», «su madre» y «un hijo» son compatibles con la evidencia fuente. Conviene alinear el último binomio con el rastro auditado en inglés usando «reproche» como equivalente principal de וּמַחְפִּיר, dejando alternativas en nota.
  issues:
  - severity: medium
    issue: «y acarrea oprobio» no refleja del modo más fiel y directo el cierre hebreo ni la revisión final inglesa.
    rationale: El hebreo presenta una segunda expresión paralela de vergüenza/reproche; la revisión inglesa cambió deliberadamente a «reproach». En español, «causa vergüenza y reproche» o «avergüenza y causa reproche» preserva mejor el paralelismo y la decisión auditada.
  - severity: low
    issue: La nota usa «reproche», pero el texto principal usa «oprobio», creando una leve desalineación interna.
    rationale: No es incorrecto, pero conviene que el texto principal y la nota alternativa muestren con claridad cuál es la opción preferida y cuál la variante.
  revised_spanish_text: El que arruina a su padre y ahuyenta a su madre es un hijo que causa vergüenza y reproche[a].
  revised_footnotes:
  - marker: a
    text: 'O: «El que despoja a su padre y hace huir a su madre es un hijo que avergüenza y causa oprobio»'
    reason: lexical_alternative
  revision_rationale: Se ajusta el último binomio a «vergüenza y reproche» para seguir más de cerca la revisión final del inglés POB y el paralelismo semántico del hebreo. También se armoniza la nota alternativa para conservar las opciones léxicas documentadas sin introducir desalineación con el texto principal.
