  source_alignment_summary: 'El borrador sigue de cerca la sintaxis y el sentido del hebreo: mantiene el acto sexual explícito, el ocultamiento ante el marido, la falta de testigo y la idea de que no fue descubierta/capturada. También conserva las notas alternativas relevantes. Sin embargo, omite explícitamente el sujeto indefinido ''un hombre'' (אִישׁ), y ''se ha contaminado'' no refleja tan bien como ''ha quedado impura'' la categoría de pureza ritual de נִטְמָאָה.'
  spanish_quality_summary: El español es mayormente claro y natural, pero el inicio 'y se acuesta con ella...' suena incompleto por faltar 'un hombre'. Además, 'la acostada de semen' en la nota es poco idiomático; conviene una formulación literal más comprensible. 'Permanece escondida' y 'no fue sorprendida' son legibles, aunque 'queda escondida' y 'no fue descubierta'/'no fue atrapada' serían también posibles.
  glossary_alignment: No hay conflictos con términos de proyecto como Yahvé/Mesías. Sí conviene alinear נִטְמָאָה con el registro de pureza ritual usando 'impura' en vez de 'contaminada', en coherencia con la decisión teológica inglesa 'has become unclean'.
  issues:
